version: '1.0'
provider: oci
service: multicloud
services:
  client: multicloud
  module: oci.multicloud
discovery:
- discovery_id: oci.multicloud.get_resource_anchor
  calls:
  - action: get_resource_anchor
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
