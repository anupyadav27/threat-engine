version: '1.0'
provider: oci
service: optimizer
services:
  client: optimizer
  module: oci.optimizer
discovery:
- discovery_id: oci.optimizer.get_recommendation
  calls:
  - action: get_recommendation
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.optimizer.get_category
  calls:
  - action: get_category
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.optimizer.get_profile
  calls:
  - action: get_profile
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.optimizer.get_resource_action
  calls:
  - action: get_resource_action
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.optimizer.get_enrollment_status
  calls:
  - action: get_enrollment_status
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.optimizer.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.optimizer.list_resource_action_queryable_fields
  for_each: oci.optimizer.get_recommendation
  calls:
  - action: list_resource_action_queryable_fields
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.optimizer.list_histories
  for_each: oci.optimizer.get_recommendation
  calls:
  - action: list_histories
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.optimizer.list_recommendation_strategies
  for_each: oci.optimizer.get_recommendation
  calls:
  - action: list_recommendation_strategies
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.optimizer.list_profiles
  for_each: oci.optimizer.get_recommendation
  calls:
  - action: list_profiles
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.optimizer.list_work_request_errors
  for_each: oci.optimizer.get_recommendation
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.optimizer.list_enrollment_statuses
  for_each: oci.optimizer.get_recommendation
  calls:
  - action: list_enrollment_statuses
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.optimizer.list_profile_levels
  for_each: oci.optimizer.get_recommendation
  calls:
  - action: list_profile_levels
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.optimizer.list_work_request_logs
  for_each: oci.optimizer.get_recommendation
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
