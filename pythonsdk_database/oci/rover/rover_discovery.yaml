version: '1.0'
provider: oci
service: rover
services:
  client: rover
  module: oci.rover
discovery:
- discovery_id: oci.rover.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.rover.list_work_request_errors
  for_each: oci.rover.get_work_request
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.rover.list_work_request_logs
  for_each: oci.rover.get_work_request
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
