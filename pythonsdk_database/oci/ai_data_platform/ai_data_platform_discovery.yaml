version: '1.0'
provider: oci
service: ai_data_platform
services:
  client: ai_data_platform
  module: oci.ai_data_platform
discovery:
- discovery_id: oci.ai_data_platform.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.ai_data_platform.get_ai_data_platform
  calls:
  - action: get_ai_data_platform
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.ai_data_platform.list_work_request_errors
  for_each: oci.ai_data_platform.get_work_request
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.ai_data_platform.list_work_request_logs
  for_each: oci.ai_data_platform.get_work_request
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
