version: '1.0'
provider: oci
service: managed_kafka
services:
  client: managed_kafka
  module: oci.managed_kafka
discovery:
- discovery_id: oci.managed_kafka.get_kafka_cluster_config_version
  calls:
  - action: get_kafka_cluster_config_version
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.managed_kafka.get_kafka_cluster
  calls:
  - action: get_kafka_cluster
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.managed_kafka.get_kafka_cluster_config
  calls:
  - action: get_kafka_cluster_config
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.managed_kafka.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.managed_kafka.list_work_request_errors
  for_each: oci.managed_kafka.get_kafka_cluster_config_version
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.managed_kafka.list_work_request_logs
  for_each: oci.managed_kafka.get_kafka_cluster_config_version
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
