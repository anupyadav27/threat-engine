version: '1.0'
provider: oci
service: secrets
services:
  client: secrets
  module: oci.secrets
discovery:
- discovery_id: oci.secrets.get_secret_bundle_by_name
  calls:
  - action: get_secret_bundle_by_name
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.secrets.get_secret_bundle
  calls:
  - action: get_secret_bundle
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.secrets.list_secret_bundle_versions
  for_each: oci.secrets.get_secret_bundle_by_name
  calls:
  - action: list_secret_bundle_versions
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
