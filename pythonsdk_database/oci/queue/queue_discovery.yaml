version: '1.0'
provider: oci
service: queue
services:
  client: queue
  module: oci.queue
discovery:
- discovery_id: oci.queue.get_messages
  calls:
  - action: get_messages
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.queue.get_stats
  calls:
  - action: get_stats
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.queue.list_channels
  for_each: oci.queue.get_messages
  calls:
  - action: list_channels
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
