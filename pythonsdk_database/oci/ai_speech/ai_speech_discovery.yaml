version: '1.0'
provider: oci
service: ai_speech
services:
  client: ai_speech
  module: oci.ai_speech
discovery:
- discovery_id: oci.ai_speech.get_transcription_task
  calls:
  - action: get_transcription_task
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.ai_speech.get_customization
  calls:
  - action: get_customization
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.ai_speech.get_transcription_job
  calls:
  - action: get_transcription_job
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.ai_speech.list_voices
  for_each: oci.ai_speech.get_transcription_task
  calls:
  - action: list_voices
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
