version: '1.0'
provider: oci
service: monitoring
services:
  client: monitoring
  module: oci.monitoring
discovery:
- discovery_id: oci.monitoring.get_alarm_history
  calls:
  - action: get_alarm_history
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.monitoring.get_alarm_suppression
  calls:
  - action: get_alarm_suppression
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.monitoring.get_alarm
  calls:
  - action: get_alarm
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.monitoring.list_alarms_status
  for_each: oci.monitoring.get_alarm_history
  calls:
  - action: list_alarms_status
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.monitoring.list_metrics
  for_each: oci.monitoring.get_alarm_history
  calls:
  - action: list_metrics
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
