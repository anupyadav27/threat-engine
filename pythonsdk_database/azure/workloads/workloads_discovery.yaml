version: '1.0'
provider: azure
service: workloads
services:
  client: workloads
  module: azure.mgmt.workloads
discovery:
- discovery_id: azure.workloads.monitors.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.workloads.monitors.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.workloads.sapvirtualinstances.list_by_subscription
  calls:
  - action: list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.workloads.sapvirtualinstances.list_by_subscription
  calls:
  - action: list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.workloads.monitors.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.workloads.workloadsmgmtclientmixin.sap_availability_zone_details
  calls:
  - action: sap_availability_zone_details
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.availability_zone_pairs }}'
- discovery_id: azure.workloads.workloadsmgmtclientmixin.sap_supported_sku
  calls:
  - action: sap_supported_sku
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.supported_skus }}'
- discovery_id: azure.workloads.workloadsmgmtclientmixin.sap_sizing_recommendations
  calls:
  - action: sap_sizing_recommendations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.deployment_type }}'
- discovery_id: azure.workloads.workloadsmgmtclientmixin.sap_disk_configurations
  calls:
  - action: sap_disk_configurations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.volume_configurations }}'
checks: []
