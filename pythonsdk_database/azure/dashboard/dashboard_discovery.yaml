version: '1.0'
provider: azure
service: dashboard
services:
  client: dashboard
  module: azure.mgmt.dashboard
discovery:
- discovery_id: azure.dashboard.grafana.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.dashboard.grafana.begin_update
  calls:
  - action: begin_update
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.dashboard.grafana.check_enterprise_details
  calls:
  - action: check_enterprise_details
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.saas_subscription_details }}'
- discovery_id: azure.dashboard.manageddashboards.update
  calls:
  - action: update
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.properties }}'
checks: []
