version: '1.0'
provider: azure
service: frontdoor
services:
  client: frontdoor
  module: azure.mgmt.frontdoor
discovery:
- discovery_id: azure.frontdoor.frontdoors.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.frontdoor.frontdoors.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.frontdoor.policies.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.frontdoor.managedrulesets.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.frontdoor.networkexperimentprofiles.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.frontdoor.frontdoornameavailability.check
  calls:
  - action: check
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.name_availability }}'
checks: []
