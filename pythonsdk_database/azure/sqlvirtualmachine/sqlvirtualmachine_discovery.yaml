version: '1.0'
provider: azure
service: sqlvirtualmachine
services:
  client: sqlvirtualmachine
  module: azure.mgmt.sqlvirtualmachine
discovery:
- discovery_id: azure.sqlvirtualmachine.sqlvirtualmachines.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.sqlvirtualmachine.sqlvirtualmachinegroups.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.sqlvirtualmachine.sqlvirtualmachinegroups.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.sqlvirtualmachine.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
