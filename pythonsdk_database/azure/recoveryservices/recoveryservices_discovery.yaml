version: '1.0'
provider: azure
service: recoveryservices
services:
  client: recoveryservices
  module: azure.mgmt.recoveryservices
discovery:
- discovery_id: azure.recoveryservices.vaults.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.recoveryservices.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.recoveryservices.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.recoveryservices.recoveryservices.check_name_availability
  calls:
  - action: check_name_availability
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.name_available }}'
- discovery_id: azure.recoveryservices.recoveryservices.capabilities
  calls:
  - action: capabilities
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.properties }}'
checks: []
