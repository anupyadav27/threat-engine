version: '1.0'
provider: azure
service: orbital
services:
  client: orbital
  module: azure.mgmt.orbital
discovery:
- discovery_id: azure.orbital.contactprofiles.list_by_subscription
  calls:
  - action: list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.orbital.contactprofiles.list_by_subscription
  calls:
  - action: list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.orbital.spacecrafts.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.orbital.availablegroundstations.list_by_capability
  calls:
  - action: list_by_capability
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.orbital.availablegroundstations.list_by_capability
  calls:
  - action: list_by_capability
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.orbital.contactprofiles.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
