version: '1.0'
provider: azure
service: batchai
services:
  client: batchai
  module: azure.mgmt.batchai
discovery:
- discovery_id: azure.batchai.workspaces.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
