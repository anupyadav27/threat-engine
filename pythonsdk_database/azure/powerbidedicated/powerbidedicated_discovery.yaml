version: '1.0'
provider: azure
service: powerbidedicated
services:
  client: powerbidedicated
  module: azure.mgmt.powerbidedicated
discovery:
- discovery_id: azure.powerbidedicated.capacities.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.powerbidedicated.capacities.check_name_availability
  calls:
  - action: check_name_availability
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.name_available }}'
- discovery_id: azure.powerbidedicated.capacities.list_skus
  calls:
  - action: list_skus
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.powerbidedicated.capacities.list_skus
  calls:
  - action: list_skus
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
