version: '1.0'
provider: azure
service: fluidrelay
services:
  client: fluidrelay
  module: azure.mgmt.fluidrelay
discovery:
- discovery_id: azure.fluidrelay.fluidrelayservers.list_by_subscription
  calls:
  - action: list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
