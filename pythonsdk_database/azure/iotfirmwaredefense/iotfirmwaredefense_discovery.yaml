version: '1.0'
provider: azure
service: iotfirmwaredefense
services:
  client: iotfirmwaredefense
  module: azure.mgmt.iotfirmwaredefense
discovery:
- discovery_id: azure.iotfirmwaredefense.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.iotfirmwaredefense.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.iotfirmwaredefense.workspaces.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.iotfirmwaredefense.workspaces.create
  calls:
  - action: create
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.properties }}'
- discovery_id: azure.iotfirmwaredefense.workspaces.generate_upload_url
  calls:
  - action: generate_upload_url
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.url }}'
checks: []
