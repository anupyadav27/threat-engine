version: '1.0'
provider: azure
service: resourcegraph
services:
  client: resourcegraph
  module: azure.mgmt.resourcegraph
discovery:
- discovery_id: azure.resourcegraph.graphquery.list_by_subscription
  calls:
  - action: list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.resourcegraph.graphquery.list_by_subscription
  calls:
  - action: list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.resourcegraph.graphquery.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
