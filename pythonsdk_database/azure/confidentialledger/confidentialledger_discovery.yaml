version: '1.0'
provider: azure
service: confidentialledger
services:
  client: confidentialledger
  module: azure.mgmt.confidentialledger
discovery:
- discovery_id: azure.confidentialledger.ledger.list_by_subscription
  calls:
  - action: list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.confidentialledger.confidentialledgermixin.check_name_availability
  calls:
  - action: check_name_availability
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.name_available }}'
checks: []
