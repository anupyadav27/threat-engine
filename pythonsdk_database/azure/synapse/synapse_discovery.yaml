version: '1.0'
provider: azure
service: synapse
services:
  client: synapse
  module: azure.mgmt.synapse
discovery:
- discovery_id: azure.synapse.integrationruntimeauthkeys.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.auth_key1 }}'
- discovery_id: azure.synapse.integrationruntimeauthkeys.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.auth_key1 }}'
- discovery_id: azure.synapse.privatelinkhubs.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
- discovery_id: azure.synapse.check_name_availability
  calls:
  - action: check_name_availability
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.message }}'
checks: []
