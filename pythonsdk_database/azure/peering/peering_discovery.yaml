version: '1.0'
provider: azure
service: peering
services:
  client: peering
  module: azure.mgmt.peering
discovery:
- discovery_id: azure.peering.peerings.list_by_subscription
  calls:
  - action: list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
