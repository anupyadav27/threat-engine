version: '1.0'
provider: azure
service: scheduler
services:
  client: scheduler
  module: azure.mgmt.scheduler
discovery:
- discovery_id: azure.scheduler.jobcollections.list_by_subscription
  calls:
  - action: list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
checks: []
