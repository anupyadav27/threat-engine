version: '1.0'
provider: ibm
service: dns
services:
  client: dns
  module: ibm_cloud_sdk.dns
discovery:
- discovery_id: ibm.dns.get-zone
  calls:
  - action: get-zone
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.dns.list-records
  calls:
  - action: list-records
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.dns.list-zones
  calls:
  - action: list-zones
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
