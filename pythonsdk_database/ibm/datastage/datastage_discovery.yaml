version: '1.0'
provider: ibm
service: datastage
services:
  client: datastage
  module: ibm_cloud_sdk.datastage
discovery:
- discovery_id: ibm.datastage.get-job
  calls:
  - action: get-job
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.datastage.list-jobs
  calls:
  - action: list-jobs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
