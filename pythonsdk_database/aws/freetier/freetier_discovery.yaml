version: '1.0'
provider: aws
service: freetier
services:
  client: freetier
  module: boto3.client
discovery:
- discovery_id: aws.freetier.get_free_tier_usage
  calls:
  - action: get_free_tier_usage
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.freeTierUsages }}'
- discovery_id: aws.freetier.get_account_plan_state
  calls:
  - action: get_account_plan_state
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.accountPlanRemainingCredits }}'
- discovery_id: aws.freetier.list_account_activities
  calls:
  - action: list_account_activities
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.activities }}'
- discovery_id: aws.freetier.get_account_activity
  for_each: aws.freetier.list_account_activities
  calls:
  - action: get_account_activity
    save_as: response
    on_error: continue
    params:
      activityId: '{{ item.activityActivityId }}'
  emit:
    as: item
    items_for: '{{ response.reward }}'
checks: []
