version: '1.0'
provider: aws
service: securityhub
services:
  client: securityhub
  module: boto3.client
discovery:
- discovery_id: aws.securityhub.get_findings
  calls:
  - action: get_findings
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Findings }}'
- discovery_id: aws.securityhub.get_resources_v2
  calls:
  - action: get_resources_v2
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Resources }}'
- discovery_id: aws.securityhub.describe_products
  calls:
  - action: describe_products
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Products }}'
- discovery_id: aws.securityhub.list_automation_rules
  calls:
  - action: list_automation_rules
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.AutomationRulesMetadata }}'
- discovery_id: aws.securityhub.list_automation_rules_v2
  calls:
  - action: list_automation_rules_v2
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Rules }}'
- discovery_id: aws.securityhub.list_security_control_definitions
  calls:
  - action: list_security_control_definitions
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.SecurityControlDefinitions }}'
- discovery_id: aws.securityhub.list_members
  calls:
  - action: list_members
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Members }}'
- discovery_id: aws.securityhub.describe_products_v2
  calls:
  - action: describe_products_v2
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ProductsV2 }}'
- discovery_id: aws.securityhub.list_configuration_policy_associations
  calls:
  - action: list_configuration_policy_associations
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ConfigurationPolicyAssociationSummaries }}'
- discovery_id: aws.securityhub.get_enabled_standards
  calls:
  - action: get_enabled_standards
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.StandardsSubscriptions }}'
- discovery_id: aws.securityhub.list_configuration_policies
  calls:
  - action: list_configuration_policies
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ConfigurationPolicySummaries }}'
- discovery_id: aws.securityhub.list_connectors_v2
  calls:
  - action: list_connectors_v2
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Connectors }}'
- discovery_id: aws.securityhub.get_insights
  calls:
  - action: get_insights
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Insights }}'
- discovery_id: aws.securityhub.describe_standards
  calls:
  - action: describe_standards
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Standards }}'
- discovery_id: aws.securityhub.get_master_account
  calls:
  - action: get_master_account
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Master }}'
- discovery_id: aws.securityhub.get_administrator_account
  calls:
  - action: get_administrator_account
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Administrator }}'
- discovery_id: aws.securityhub.describe_action_targets
  calls:
  - action: describe_action_targets
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ActionTargets }}'
- discovery_id: aws.securityhub.describe_organization_configuration
  calls:
  - action: describe_organization_configuration
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.OrganizationConfiguration }}'
- discovery_id: aws.securityhub.describe_security_hub_v2
  calls:
  - action: describe_security_hub_v2
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.HubV2Arn }}'
- discovery_id: aws.securityhub.list_aggregators_v2
  calls:
  - action: list_aggregators_v2
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.AggregatorsV2 }}'
- discovery_id: aws.securityhub.list_finding_aggregators
  calls:
  - action: list_finding_aggregators
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.FindingAggregators }}'
- discovery_id: aws.securityhub.get_invitations_count
  calls:
  - action: get_invitations_count
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.InvitationsCount }}'
- discovery_id: aws.securityhub.describe_standards_controls
  for_each: aws.securityhub.get_enabled_standards
  calls:
  - action: describe_standards_controls
    save_as: response
    on_error: continue
    params:
      StandardsSubscriptionArn: '{{ item.standardsSubscriptionArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Controls }}'
- discovery_id: aws.securityhub.get_connector_v2
  for_each: aws.securityhub.list_connectors_v2
  calls:
  - action: get_connector_v2
    save_as: response
    on_error: continue
    params:
      ConnectorId: '{{ item.connectorConnectorId }}'
  emit:
    as: item
    items_for: '{{ response.Health }}'
- discovery_id: aws.securityhub.list_standards_control_associations
  for_each: aws.securityhub.list_security_control_definitions
  calls:
  - action: list_standards_control_associations
    save_as: response
    on_error: continue
    params:
      SecurityControlId: '{{ item.securityControlDefinitionSecurityControlId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.StandardsControlAssociationSummaries }}'
- discovery_id: aws.securityhub.get_automation_rule_v2
  calls:
  - action: get_automation_rule_v2
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Actions }}'
- discovery_id: aws.securityhub.get_resources_trends_v2
  calls:
  - action: get_resources_trends_v2
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.TrendsMetrics }}'
- discovery_id: aws.securityhub.get_insight_results
  for_each: aws.securityhub.get_insights
  calls:
  - action: get_insight_results
    save_as: response
    on_error: continue
    params:
      InsightArn: '{{ item.insightInsightArn }}'
  emit:
    as: item
    items_for: '{{ response.InsightResults }}'
- discovery_id: aws.securityhub.get_finding_statistics_v2
  calls:
  - action: get_finding_statistics_v2
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.GroupByResults }}'
- discovery_id: aws.securityhub.get_configuration_policy
  calls:
  - action: get_configuration_policy
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ConfigurationPolicy }}'
checks: []
