- discovery_id: aws.config.get_aggregate_resource_config
  for_each: aws.config.describe_configuration_aggregators
  calls:
  - action: get_aggregate_resource_config
    save_as: response
    on_error: continue
    params:
      ConfigurationAggregatorName: '{{ item.configurationAggregatorConfigurationAggregatorName }}'
  emit:
    as: item
    items_for: '{{ response.ConfigurationItem }}'
- discovery_id: aws.config.describe_remediation_configurations
  calls:
  - action: describe_remediation_configurations
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.RemediationConfigurations }}'
