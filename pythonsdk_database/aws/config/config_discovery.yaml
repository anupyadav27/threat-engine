  calls:
  - action: describe_conformance_pack_compliance
    save_as: response
    on_error: continue
    params:
      ConformancePackName: '{{ item.conformancePackStatusDetailConformancePackName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ConformancePackRuleComplianceList }}'
- discovery_id: aws.config.list_discovered_resources
  for_each: aws.config.get_discovered_resource_counts
  calls:
  - action: list_discovered_resources
    save_as: response
    on_error: continue
    params:
      resourceType: '{{ item.resourceCountResourceType }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.resourceIdentifiers }}'
- discovery_id: aws.config.get_conformance_pack_compliance_summary
  calls:
  - action: get_conformance_pack_compliance_summary
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ConformancePackComplianceSummaryList }}'
checks: []
