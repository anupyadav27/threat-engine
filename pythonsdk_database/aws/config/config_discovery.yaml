  calls:
  - action: get_organization_config_rule_detailed_status
    save_as: response
    on_error: continue
    params:
      OrganizationConfigRuleName: '{{ item.organizationConfigRuleStatusOrganizationConfigRuleName }}'
  emit:
    as: item
    items_for: '{{ response.OrganizationConfigRuleDetailedStatus }}'
- discovery_id: aws.config.get_resource_evaluation_summary
  for_each: aws.config.list_resource_evaluations
  calls:
  - action: get_resource_evaluation_summary
    save_as: response
    on_error: continue
    params:
      ResourceEvaluationId: '{{ item.resourceEvaluationResourceEvaluationId }}'
  emit:
