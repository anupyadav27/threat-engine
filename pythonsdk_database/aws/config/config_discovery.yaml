  calls:
  - action: get_stored_query
    save_as: response
    on_error: continue
    params:
      QueryName: '{{ item.storedQueryMetadataQueryName }}'
  emit:
    as: item
    items_for: '{{ response.StoredQuery }}'
- discovery_id: aws.config.list_tags_for_resource
  calls:
