  emit:
    as: item
    items_for: '{{ response.DeliveryChannelsStatus }}'
- discovery_id: aws.config.list_resource_evaluations
  calls:
  - action: list_resource_evaluations
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ResourceEvaluations }}'
