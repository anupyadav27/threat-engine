version: '1.0'
provider: aws
service: config
services:
  client: config
  module: boto3.client
discovery:
- discovery_id: aws.config.describe_config_rule_evaluation_status
  calls:
  - action: describe_config_rule_evaluation_status
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ConfigRulesEvaluationStatus }}'
- discovery_id: aws.config.describe_config_rules
  calls:
  - action: describe_config_rules
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ConfigRules }}'
