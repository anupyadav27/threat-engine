  for_each: aws.config.describe_configuration_aggregators
  calls:
  - action: describe_configuration_aggregator_sources_status
    save_as: response
    on_error: continue
    params:
      ConfigurationAggregatorName: '{{ item.configurationAggregatorConfigurationAggregatorName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.AggregatedSourceStatusList }}'
- discovery_id: aws.config.describe_remediation_execution_status
  for_each: aws.config.describe_config_rule_evaluation_status
  calls:
  - action: describe_remediation_execution_status
    save_as: response
    on_error: continue
    params:
      ConfigRuleName: '{{ item.complianceByConfigRulConfigRuleName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.RemediationExecutionStatuses }}'
- discovery_id: aws.config.list_aggregate_discovered_resources
  for_each: aws.config.describe_compliance_by_resource
  calls:
  - action: list_aggregate_discovered_resources
    save_as: response
    on_error: continue
    params:
      ConfigurationAggregatorName: '{{ item.configurationAggregatorConfigurationAggregatorName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ResourceIdentifiers }}'
- discovery_id: aws.config.get_aggregate_discovered_resource_counts
  for_each: aws.config.describe_configuration_aggregators
  calls:
  - action: get_aggregate_discovered_resource_counts
    save_as: response
    on_error: continue
    params:
      ConfigurationAggregatorName: '{{ item.configurationAggregatorConfigurationAggregatorName }}'
  emit:
    as: item
    items_for: '{{ response.GroupedResourceCounts }}'
- discovery_id: aws.config.get_aggregate_compliance_details_by_config_rule
  for_each: aws.config.describe_config_rule_evaluation_status
  calls:
  - action: get_aggregate_compliance_details_by_config_rule
    save_as: response
    on_error: continue
    params:
      AccountId: '{{ item.accountId }}'
      ConfigurationAggregatorName: '{{ item.configurationAggregatorConfigurationAggregatorName }}'
  emit:
    as: item
    items_for: '{{ response.AggregateEvaluationResults }}'
- discovery_id: aws.config.describe_remediation_exceptions
  for_each: aws.config.describe_config_rule_evaluation_status
