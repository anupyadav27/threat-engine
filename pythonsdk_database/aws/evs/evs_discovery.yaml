version: '1.0'
provider: aws
service: evs
services:
  client: evs
  module: boto3.client
discovery:
- discovery_id: aws.evs.list_environments
  calls:
  - action: list_environments
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.environmentSummaries }}'
- discovery_id: aws.evs.get_environment
  for_each: aws.evs.list_environments
  calls:
  - action: get_environment
    save_as: response
    on_error: continue
    params:
      environmentId: '{{ item.environmentSummaryEnvironmentId }}'
  emit:
    as: item
    items_for: '{{ response.environment }}'
- discovery_id: aws.evs.list_environment_vlans
  for_each: aws.evs.list_environments
  calls:
  - action: list_environment_vlans
    save_as: response
    on_error: continue
    params:
      environmentId: '{{ item.environmentSummaryEnvironmentId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.environmentVlans }}'
- discovery_id: aws.evs.list_environment_hosts
  for_each: aws.evs.list_environments
  calls:
  - action: list_environment_hosts
    save_as: response
    on_error: continue
    params:
      environmentId: '{{ item.environmentSummaryEnvironmentId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.environmentHosts }}'
checks: []
