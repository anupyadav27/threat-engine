version: '1.0'
provider: aws
service: neptune
services:
  client: neptune
  module: boto3.client
discovery:
- discovery_id: aws.neptune.describe_db_instances
  calls:
  - action: describe_db_instances
    save_as: response
    on_error: continue
    params:
      MaxRecords: 1000
  emit:
    as: item
    items_for: '{{ response.DBInstances }}'
- discovery_id: aws.neptune.describe_db_clusters
  calls:
  - action: describe_db_clusters
    save_as: response
    on_error: continue
    params:
      MaxRecords: 1000
  emit:
    as: item
    items_for: '{{ response.DBClusters }}'
- discovery_id: aws.neptune.describe_db_cluster_snapshots
  calls:
  - action: describe_db_cluster_snapshots
    save_as: response
    on_error: continue
    params:
      MaxRecords: 1000
  emit:
    as: item
    items_for: '{{ response.DBClusterSnapshots }}'
- discovery_id: aws.neptune.describe_db_engine_versions
  calls:
  - action: describe_db_engine_versions
    save_as: response
    on_error: continue
    params:
      MaxRecords: 1000
  emit:
    as: item
    items_for: '{{ response.DBEngineVersions }}'
- discovery_id: aws.neptune.describe_event_subscriptions
  calls:
  - action: describe_event_subscriptions
    save_as: response
    on_error: continue
    params:
      MaxRecords: 1000
  emit:
    as: item
    items_for: '{{ response.EventSubscriptionsList }}'
- discovery_id: aws.neptune.describe_db_cluster_endpoints
  calls:
  - action: describe_db_cluster_endpoints
    save_as: response
    on_error: continue
    params:
      MaxRecords: 1000
  emit:
    as: item
    items_for: '{{ response.DBClusterEndpoints }}'
- discovery_id: aws.neptune.describe_global_clusters
  calls:
  - action: describe_global_clusters
    save_as: response
    on_error: continue
    params:
      MaxRecords: 1000
  emit:
    as: item
    items_for: '{{ response.GlobalClusters }}'
- discovery_id: aws.neptune.describe_db_subnet_groups
  calls:
  - action: describe_db_subnet_groups
    save_as: response
    on_error: continue
    params:
      MaxRecords: 1000
  emit:
    as: item
    items_for: '{{ response.DBSubnetGroups }}'
- discovery_id: aws.neptune.describe_events
  calls:
  - action: describe_events
    save_as: response
    on_error: continue
    params:
      MaxRecords: 1000
  emit:
    as: item
    items_for: '{{ response.Events }}'
- discovery_id: aws.neptune.describe_db_parameter_groups
  calls:
  - action: describe_db_parameter_groups
    save_as: response
    on_error: continue
    params:
      MaxRecords: 1000
  emit:
    as: item
    items_for: '{{ response.DBParameterGroups }}'
- discovery_id: aws.neptune.describe_db_cluster_parameter_groups
  calls:
  - action: describe_db_cluster_parameter_groups
    save_as: response
    on_error: continue
    params:
      MaxRecords: 1000
  emit:
    as: item
    items_for: '{{ response.DBClusterParameterGroups }}'
- discovery_id: aws.neptune.describe_pending_maintenance_actions
  calls:
  - action: describe_pending_maintenance_actions
    save_as: response
    on_error: continue
    params:
      MaxRecords: 1000
  emit:
    as: item
    items_for: '{{ response.PendingMaintenanceActions }}'
- discovery_id: aws.neptune.describe_event_categories
  calls:
  - action: describe_event_categories
    save_as: response
    on_error: continue
    params:
      MaxRecords: 1000
  emit:
    as: item
    items_for: '{{ response.EventCategoriesMapList }}'
- discovery_id: aws.neptune.describe_orderable_db_instance_options
  for_each: aws.neptune.describe_db_instances
  calls:
  - action: describe_orderable_db_instance_options
    save_as: response
    on_error: continue
    params:
      Engine: '{{ item.dbClusterSnapshotEngine }}'
      MaxRecords: 1000
  emit:
    as: item
    items_for: '{{ response.OrderableDBInstanceOptions }}'
- discovery_id: aws.neptune.describe_db_cluster_parameters
  for_each: aws.neptune.describe_db_cluster_parameter_groups
  calls:
  - action: describe_db_cluster_parameters
    save_as: response
    on_error: continue
    params:
      DBClusterParameterGroupName: '{{ item.dbClusterParameterGroupDbClusterParameterGroupName }}'
      MaxRecords: 1000
  emit:
    as: item
    items_for: '{{ response.Parameters }}'
- discovery_id: aws.neptune.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
    params:
      MaxRecords: 1000
  emit:
    as: item
    items_for: '{{ response.TagList }}'
- discovery_id: aws.neptune.describe_db_cluster_snapshot_attributes
  for_each: aws.neptune.describe_db_cluster_snapshots
  calls:
  - action: describe_db_cluster_snapshot_attributes
    save_as: response
    on_error: continue
    params:
      DBClusterSnapshotIdentifier: '{{ item.dbClusterSnapshotDbClusterSnapshotIdentifier }}'
      MaxRecords: 1000
  emit:
    as: item
    items_for: '{{ response.DBClusterSnapshotAttributesResult }}'
- discovery_id: aws.neptune.describe_valid_db_instance_modifications
  for_each: aws.neptune.describe_db_instances
  calls:
  - action: describe_valid_db_instance_modifications
    save_as: response
    on_error: continue
    params:
      DBInstanceIdentifier: '{{ item.dbInstancDbInstanceIdentifier }}'
      MaxRecords: 1000
  emit:
    as: item
    items_for: '{{ response.ValidDBInstanceModificationsMessage }}'
checks: []
