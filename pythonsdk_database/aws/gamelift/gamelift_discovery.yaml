    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.GameSessions }}'
- discovery_id: aws.gamelift.list_game_servers
  for_each: aws.gamelift.list_game_server_groups
  calls:
  - action: list_game_servers
    save_as: response
    on_error: continue
    params:
      GameServerGroupName: '{{ item.gameServerGroupGameServerGroupName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.GameServers }}'
- discovery_id: aws.gamelift.describe_scaling_policies
  calls:
