- discovery_id: aws.gamelift.describe_compute
  for_each: aws.gamelift.list_compute
  calls:
  - action: describe_compute
    save_as: response
    on_error: continue
    params:
      FleetId: '{{ item.computeComputeName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Compute }}'
- discovery_id: aws.gamelift.describe_container_group_definition
  calls:
