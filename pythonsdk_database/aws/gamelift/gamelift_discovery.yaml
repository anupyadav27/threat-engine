- discovery_id: aws.gamelift.describe_build
  for_each: aws.gamelift.describe_fleet_attributes
  calls:
  - action: describe_build
    save_as: response
    on_error: continue
    params:
      BuildId: '{{ item.fleetAttributBuildId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Build }}'
- discovery_id: aws.gamelift.describe_alias
  for_each: aws.gamelift.list_aliases
