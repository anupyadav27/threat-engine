- discovery_id: aws.gamelift.get_compute_access
  for_each: aws.gamelift.list_compute
  calls:
  - action: get_compute_access
    save_as: response
    on_error: continue
    params:
      FleetId: '{{ item.computeComputeName }}'
  emit:
    as: item
    items_for: '{{ response.ContainerIdentifiers }}'
- discovery_id: aws.gamelift.describe_runtime_configuration
  calls:
