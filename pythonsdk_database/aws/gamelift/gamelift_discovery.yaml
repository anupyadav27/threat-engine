version: '1.0'
provider: aws
service: gamelift
services:
  client: gamelift
  module: boto3.client
discovery:
- discovery_id: aws.gamelift.describe_fleet_attributes
  calls:
  - action: describe_fleet_attributes
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.FleetAttributes }}'
- discovery_id: aws.gamelift.list_container_fleets
  calls:
  - action: list_container_fleets
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ContainerFleets }}'
