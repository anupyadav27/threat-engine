version: '1.0'
provider: aws
service: observabilityadmin
services:
  client: observabilityadmin
  module: boto3.client
discovery:
- discovery_id: aws.observabilityadmin.list_centralization_rules_for_organization
  calls:
  - action: list_centralization_rules_for_organization
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.CentralizationRuleSummaries }}'
- discovery_id: aws.observabilityadmin.list_resource_telemetry_for_organization
  calls:
  - action: list_resource_telemetry_for_organization
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.TelemetryConfigurations }}'
- discovery_id: aws.observabilityadmin.list_telemetry_rules
  calls:
  - action: list_telemetry_rules
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.TelemetryRuleSummaries }}'
- discovery_id: aws.observabilityadmin.get_telemetry_enrichment_status
  calls:
  - action: get_telemetry_enrichment_status
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Status }}'
- discovery_id: aws.observabilityadmin.get_telemetry_rule
  calls:
  - action: get_telemetry_rule
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.TelemetryRule }}'
- discovery_id: aws.observabilityadmin.get_centralization_rule_for_organization
  calls:
  - action: get_centralization_rule_for_organization
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.CentralizationRule }}'
checks: []
