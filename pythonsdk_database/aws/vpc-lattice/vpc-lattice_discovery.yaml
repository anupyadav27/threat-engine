version: '1.0'
provider: aws
service: vpc-lattice
services:
  client: vpc-lattice
  module: boto3.client
discovery:
- discovery_id: aws.vpc-lattice.list_service_network_resource_associations
  calls:
  - action: list_service_network_resource_associations
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.items }}'
