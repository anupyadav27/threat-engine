version: '1.0'
provider: aws
service: pinpoint
services:
  client: pinpoint
  module: boto3.client
discovery:
- discovery_id: aws.pinpoint.get_apps
  calls:
  - action: get_apps
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ApplicationsResponse }}'
- discovery_id: aws.pinpoint.get_recommender_configurations
  calls:
  - action: get_recommender_configurations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ListRecommenderConfigurationsResponse }}'
- discovery_id: aws.pinpoint.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.TagsModel }}'
checks: []
