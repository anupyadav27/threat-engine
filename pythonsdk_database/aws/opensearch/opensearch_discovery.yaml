version: '1.0'
provider: aws
service: opensearch
services:
  client: opensearch
  module: boto3.client
discovery:
- discovery_id: aws.opensearch.describe_packages
  calls:
  - action: describe_packages
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.PackageDetailsList }}'
- discovery_id: aws.opensearch.describe_reserved_instances
  calls:
  - action: describe_reserved_instances
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ReservedInstances }}'
- discovery_id: aws.opensearch.describe_outbound_connections
  calls:
  - action: describe_outbound_connections
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Connections }}'
- discovery_id: aws.opensearch.list_direct_query_data_sources
  calls:
  - action: list_direct_query_data_sources
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.DirectQueryDataSources }}'
- discovery_id: aws.opensearch.list_applications
  calls:
  - action: list_applications
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ApplicationSummaries }}'
- discovery_id: aws.opensearch.list_vpc_endpoints
  calls:
  - action: list_vpc_endpoints
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.VpcEndpointSummaryList }}'
- discovery_id: aws.opensearch.list_domain_names
  calls:
  - action: list_domain_names
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.DomainNames }}'
- discovery_id: aws.opensearch.get_compatible_versions
  calls:
  - action: get_compatible_versions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.CompatibleVersions }}'
- discovery_id: aws.opensearch.get_default_application_setting
  calls:
  - action: get_default_application_setting
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.applicationArn }}'
- discovery_id: aws.opensearch.describe_domain
  for_each: aws.opensearch.list_domain_names
  calls:
  - action: describe_domain
    save_as: response
    on_error: continue
    params:
      DomainName: '{{ item.domainNamDomainName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.DomainStatus }}'
- discovery_id: aws.opensearch.describe_domain_change_progress
  for_each: aws.opensearch.list_domain_names
  calls:
  - action: describe_domain_change_progress
    save_as: response
    on_error: continue
    params:
      DomainName: '{{ item.domainNamDomainName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ChangeProgressStatus }}'
- discovery_id: aws.opensearch.list_scheduled_actions
  for_each: aws.opensearch.list_domain_names
  calls:
  - action: list_scheduled_actions
    save_as: response
    on_error: continue
    params:
      DomainName: '{{ item.domainNamDomainName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ScheduledActions }}'
- discovery_id: aws.opensearch.list_instance_type_details
  for_each: aws.opensearch.describe_packages
  calls:
  - action: list_instance_type_details
    save_as: response
    on_error: continue
    params:
      EngineVersion: '{{ item.packageDetailsListEngineVersion }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.InstanceTypeDetails }}'
- discovery_id: aws.opensearch.describe_domain_nodes
  for_each: aws.opensearch.list_domain_names
  calls:
  - action: describe_domain_nodes
    save_as: response
    on_error: continue
    params:
      DomainName: '{{ item.domainNamDomainName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.DomainNodesStatusList }}'
- discovery_id: aws.opensearch.list_packages_for_domain
  for_each: aws.opensearch.list_domain_names
  calls:
  - action: list_packages_for_domain
    save_as: response
    on_error: continue
    params:
      DomainName: '{{ item.domainNamDomainName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.DomainPackageDetailsList }}'
- discovery_id: aws.opensearch.describe_dry_run_progress
  for_each: aws.opensearch.list_domain_names
  calls:
  - action: describe_dry_run_progress
    save_as: response
    on_error: continue
    params:
      DomainName: '{{ item.domainNamDomainName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.DryRunProgressStatus }}'
- discovery_id: aws.opensearch.list_domain_maintenances
  for_each: aws.opensearch.list_domain_names
  calls:
  - action: list_domain_maintenances
    save_as: response
    on_error: continue
    params:
      DomainName: '{{ item.domainNamDomainName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.DomainMaintenances }}'
- discovery_id: aws.opensearch.get_upgrade_history
  for_each: aws.opensearch.list_domain_names
  calls:
  - action: get_upgrade_history
    save_as: response
    on_error: continue
    params:
      DomainName: '{{ item.domainNamDomainName }}'
  emit:
    as: item
    items_for: '{{ response.UpgradeHistories }}'
- discovery_id: aws.opensearch.get_package_version_history
  for_each: aws.opensearch.describe_packages
  calls:
  - action: get_package_version_history
    save_as: response
    on_error: continue
    params:
      PackageID: '{{ item.packageDetailsListPackageId }}'
  emit:
    as: item
    items_for: '{{ response.PackageVersionHistoryList }}'
- discovery_id: aws.opensearch.get_application
  for_each: aws.opensearch.list_applications
  calls:
  - action: get_application
    save_as: response
    on_error: continue
    params:
      id: '{{ item.applicationSummaryId }}'
  emit:
    as: item
    items_for: '{{ response.dataSources }}'
- discovery_id: aws.opensearch.list_tags
  for_each: aws.opensearch.describe_domain
  calls:
  - action: list_tags
    save_as: response
    on_error: continue
    params:
      ARN: '{{ item.domainStatuArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.TagList }}'
- discovery_id: aws.opensearch.list_vpc_endpoint_access
  for_each: aws.opensearch.list_domain_names
  calls:
  - action: list_vpc_endpoint_access
    save_as: response
    on_error: continue
    params:
      DomainName: '{{ item.domainNamDomainName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.AuthorizedPrincipalList }}'
- discovery_id: aws.opensearch.describe_domain_auto_tunes
  for_each: aws.opensearch.list_domain_names
  calls:
  - action: describe_domain_auto_tunes
    save_as: response
    on_error: continue
    params:
      DomainName: '{{ item.domainNamDomainName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.AutoTunes }}'
- discovery_id: aws.opensearch.describe_vpc_endpoints
  calls:
  - action: describe_vpc_endpoints
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.VpcEndpoints }}'
- discovery_id: aws.opensearch.list_data_sources
  for_each: aws.opensearch.list_domain_names
  calls:
  - action: list_data_sources
    save_as: response
    on_error: continue
    params:
      DomainName: '{{ item.domainNamDomainName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.DataSources }}'
- discovery_id: aws.opensearch.get_data_source
  for_each: aws.opensearch.list_data_sources
  calls:
  - action: get_data_source
    save_as: response
    on_error: continue
    params:
      DomainName: '{{ item.domainNamDomainName }}'
  emit:
    as: item
    items_for: '{{ response.DataSourceType }}'
- discovery_id: aws.opensearch.describe_domain_health
  for_each: aws.opensearch.list_domain_names
  calls:
  - action: describe_domain_health
    save_as: response
    on_error: continue
    params:
      DomainName: '{{ item.domainNamDomainName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.EnvironmentInformation }}'
checks: []
