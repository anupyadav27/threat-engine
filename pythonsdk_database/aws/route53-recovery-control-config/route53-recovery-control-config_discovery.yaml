version: '1.0'
provider: aws
service: route53-recovery-control-config
services:
  client: route53-recovery-control-config
  module: boto3.client
discovery:
- discovery_id: aws.route53-recovery-control-config.list_control_panels
  calls:
  - action: list_control_panels
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ControlPanels }}'
- discovery_id: aws.route53-recovery-control-config.list_clusters
  calls:
  - action: list_clusters
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Clusters }}'
- discovery_id: aws.route53-recovery-control-config.list_safety_rules
  for_each: aws.route53-recovery-control-config.list_control_panels
  calls:
  - action: list_safety_rules
    save_as: response
    on_error: continue
    params:
      ControlPanelArn: '{{ item.controlPanelControlPanelArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.SafetyRules }}'
- discovery_id: aws.route53-recovery-control-config.list_routing_controls
  for_each: aws.route53-recovery-control-config.list_control_panels
  calls:
  - action: list_routing_controls
    save_as: response
    on_error: continue
    params:
      ControlPanelArn: '{{ item.controlPanelControlPanelArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.RoutingControls }}'
- discovery_id: aws.route53-recovery-control-config.get_resource_policy
  calls:
  - action: get_resource_policy
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Policy }}'
checks: []
