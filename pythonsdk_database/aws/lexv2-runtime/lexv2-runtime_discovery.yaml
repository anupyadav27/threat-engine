version: '1.0'
provider: aws
service: lexv2-runtime
services:
  client: lexv2-runtime
  module: boto3.client
discovery:
- discovery_id: aws.lexv2-runtime.get_session
  calls:
  - action: get_session
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.messages }}'
checks: []
