version: '1.0'
provider: aws
service: lexv2-models
services:
  client: lexv2-models
  module: boto3.client
discovery:
- discovery_id: aws.lexv2-models.list_imports
  calls:
  - action: list_imports
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.importSummaries }}'
- discovery_id: aws.lexv2-models.list_test_sets
  calls:
  - action: list_test_sets
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
