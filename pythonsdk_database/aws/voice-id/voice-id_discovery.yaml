version: '1.0'
provider: aws
service: voice-id
services:
  client: voice-id
  module: boto3.client
discovery:
- discovery_id: aws.voice-id.list_domains
  calls:
  - action: list_domains
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.DomainSummaries }}'
- discovery_id: aws.voice-id.list_speaker_enrollment_jobs
  for_each: aws.voice-id.list_domains
  calls:
  - action: list_speaker_enrollment_jobs
    save_as: response
    on_error: continue
    params:
      DomainId: '{{ item.domainSummaryDomainId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.JobSummaries }}'
- discovery_id: aws.voice-id.describe_fraudster_registration_job
  for_each: aws.voice-id.list_domains
  calls:
  - action: describe_fraudster_registration_job
    save_as: response
    on_error: continue
    params:
      DomainId: '{{ item.jobJobId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Job }}'
- discovery_id: aws.voice-id.describe_speaker
  for_each: aws.voice-id.list_domains
  calls:
  - action: describe_speaker
    save_as: response
    on_error: continue
    params:
      DomainId: '{{ item.domainSummaryDomainId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Speaker }}'
- discovery_id: aws.voice-id.list_watchlists
  for_each: aws.voice-id.list_domains
  calls:
  - action: list_watchlists
    save_as: response
    on_error: continue
    params:
      DomainId: '{{ item.domainSummaryDomainId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.WatchlistSummaries }}'
- discovery_id: aws.voice-id.describe_fraudster
  for_each: aws.voice-id.list_domains
  calls:
  - action: describe_fraudster
    save_as: response
    on_error: continue
    params:
      DomainId: '{{ item.domainSummaryDomainId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Fraudster }}'
- discovery_id: aws.voice-id.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Tags }}'
- discovery_id: aws.voice-id.describe_speaker_enrollment_job
  for_each: aws.voice-id.list_domains
  calls:
  - action: describe_speaker_enrollment_job
    save_as: response
    on_error: continue
    params:
      DomainId: '{{ item.jobJobId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Job }}'
- discovery_id: aws.voice-id.describe_domain
  for_each: aws.voice-id.list_domains
  calls:
  - action: describe_domain
    save_as: response
    on_error: continue
    params:
      DomainId: '{{ item.domainSummaryDomainId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Domain }}'
- discovery_id: aws.voice-id.describe_watchlist
  for_each: aws.voice-id.list_domains
  calls:
  - action: describe_watchlist
    save_as: response
    on_error: continue
    params:
      DomainId: '{{ item.watchlistWatchlistId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Watchlist }}'
checks: []
