version: '1.0'
provider: aws
service: ebs
services:
  client: ebs
  module: boto3.client
discovery:
- discovery_id: aws.ebs.list_changed_blocks
  calls:
  - action: list_changed_blocks
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ChangedBlocks }}'
checks: []
