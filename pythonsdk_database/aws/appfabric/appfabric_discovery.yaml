version: '1.0'
provider: aws
service: appfabric
services:
  client: appfabric
  module: boto3.client
discovery:
- discovery_id: aws.appfabric.list_app_bundles
  calls:
  - action: list_app_bundles
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.appBundleSummaryList }}'
- discovery_id: aws.appfabric.get_app_authorization
  calls:
  - action: get_app_authorization
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.appAuthorization }}'
- discovery_id: aws.appfabric.get_ingestion_destination
  calls:
  - action: get_ingestion_destination
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ingestionDestination }}'
- discovery_id: aws.appfabric.get_ingestion
  calls:
  - action: get_ingestion
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ingestion }}'
- discovery_id: aws.appfabric.get_app_bundle
  calls:
  - action: get_app_bundle
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.appBundle }}'
- discovery_id: aws.appfabric.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.tags }}'
checks: []
