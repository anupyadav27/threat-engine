version: '1.0'
provider: aws
service: geo-places
services:
  client: geo-places
  module: boto3.client
discovery:
- discovery_id: aws.geo-places.get_place
  calls:
  - action: get_place
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.PostalCodeDetails }}'
checks: []
