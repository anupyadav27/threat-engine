version: '1.0'
provider: aws
service: workspaces
services:
  client: workspaces
  module: boto3.client
discovery:
- discovery_id: aws.workspaces.describe_workspace_directories
  calls:
  - action: describe_workspace_directories
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Directories }}'
- discovery_id: aws.workspaces.describe_workspaces
  calls:
  - action: describe_workspaces
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Workspaces }}'
- discovery_id: aws.workspaces.describe_workspaces_pools
  calls:
  - action: describe_workspaces_pools
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.WorkspacesPools }}'
- discovery_id: aws.workspaces.describe_workspace_bundles
  calls:
  - action: describe_workspace_bundles
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Bundles }}'
- discovery_id: aws.workspaces.describe_workspace_images
  calls:
  - action: describe_workspace_images
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Images }}'
- discovery_id: aws.workspaces.describe_applications
  calls:
  - action: describe_applications
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Applications }}'
- discovery_id: aws.workspaces.describe_connection_aliases
  calls:
  - action: describe_connection_aliases
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ConnectionAliases }}'
- discovery_id: aws.workspaces.describe_account_modifications
  calls:
  - action: describe_account_modifications
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.AccountModifications }}'
- discovery_id: aws.workspaces.describe_ip_groups
  calls:
  - action: describe_ip_groups
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Result }}'
- discovery_id: aws.workspaces.get_account_link
  calls:
  - action: get_account_link
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.AccountLink }}'
- discovery_id: aws.workspaces.describe_workspaces_connection_status
  calls:
  - action: describe_workspaces_connection_status
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.WorkspacesConnectionStatus }}'
- discovery_id: aws.workspaces.describe_account
  calls:
  - action: describe_account
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.DedicatedTenancySupport }}'
- discovery_id: aws.workspaces.describe_workspaces_pool_sessions
  for_each: aws.workspaces.describe_workspaces_pools
  calls:
  - action: describe_workspaces_pool_sessions
    save_as: response
    on_error: continue
    params:
      PoolId: '{{ item.poolId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Sessions }}'
- discovery_id: aws.workspaces.describe_application_associations
  for_each: aws.workspaces.describe_applications
  calls:
  - action: describe_application_associations
    save_as: response
    on_error: continue
    params:
      ApplicationId: '{{ item.applicationApplicationId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Associations }}'
- discovery_id: aws.workspaces.describe_connection_alias_permissions
  for_each: aws.workspaces.describe_connection_aliases
  calls:
  - action: describe_connection_alias_permissions
    save_as: response
    on_error: continue
    params:
      AliasId: '{{ item.aliasId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ConnectionAliasPermissions }}'
- discovery_id: aws.workspaces.describe_client_properties
  calls:
  - action: describe_client_properties
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ClientPropertiesList }}'
- discovery_id: aws.workspaces.describe_client_branding
  for_each: aws.workspaces.describe_client_properties
  calls:
  - action: describe_client_branding
    save_as: response
    on_error: continue
    params:
      ResourceId: '{{ item.clientPropertiesListResourceId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.DeviceTypeWindows }}'
- discovery_id: aws.workspaces.describe_connect_client_add_ins
  for_each: aws.workspaces.describe_client_properties
  calls:
  - action: describe_connect_client_add_ins
    save_as: response
    on_error: continue
    params:
      ResourceId: '{{ item.clientPropertiesListResourceId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.AddIns }}'
- discovery_id: aws.workspaces.describe_tags
  for_each: aws.workspaces.describe_client_properties
  calls:
  - action: describe_tags
    save_as: response
    on_error: continue
    params:
      ResourceId: '{{ item.clientPropertiesListResourceId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.TagList }}'
- discovery_id: aws.workspaces.describe_workspace_snapshots
  for_each: aws.workspaces.describe_workspaces
  calls:
  - action: describe_workspace_snapshots
    save_as: response
    on_error: continue
    params:
      WorkspaceId: '{{ item.workspacWorkspaceId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.RebuildSnapshots }}'
checks: []
