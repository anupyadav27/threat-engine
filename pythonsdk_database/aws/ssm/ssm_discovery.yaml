version: '1.0'
provider: aws
service: ssm
services:
  client: ssm
  module: boto3.client
discovery:
- discovery_id: aws.ssm.describe_automation_executions
  calls:
  - action: describe_automation_executions
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.AutomationExecutionMetadataList }}'
