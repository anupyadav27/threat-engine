version: '1.0'
provider: aws
service: license-manager-user-subscriptions
services:
  client: license-manager-user-subscriptions
  module: boto3.client
discovery:
- discovery_id: aws.license-manager-user-subscriptions.list_license_server_endpoints
  calls:
  - action: list_license_server_endpoints
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.LicenseServerEndpoints }}'
- discovery_id: aws.license-manager-user-subscriptions.list_instances
  calls:
  - action: list_instances
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.InstanceSummaries }}'
- discovery_id: aws.license-manager-user-subscriptions.list_identity_providers
  calls:
  - action: list_identity_providers
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.IdentityProviderSummaries }}'
- discovery_id: aws.license-manager-user-subscriptions.list_product_subscriptions
  for_each: aws.license-manager-user-subscriptions.list_instances
  calls:
  - action: list_product_subscriptions
    save_as: response
    on_error: continue
    params:
      IdentityProvider: '{{ item.identityProviderSummaryIdentityProvider }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ProductUserSummaries }}'
- discovery_id: aws.license-manager-user-subscriptions.list_user_associations
  for_each: aws.license-manager-user-subscriptions.list_instances
  calls:
  - action: list_user_associations
    save_as: response
    on_error: continue
    params:
      InstanceId: '{{ item.instanceSummaryInstanceId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.InstanceUserSummaries }}'
checks: []
