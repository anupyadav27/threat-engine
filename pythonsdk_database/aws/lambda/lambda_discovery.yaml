version: '1.0'
provider: aws
service: lambda
services:
  client: lambda
  module: boto3.client
discovery:
- discovery_id: aws.lambda.list_functions
  calls:
  - action: list_functions
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Functions }}'
- discovery_id: aws.lambda.list_event_source_mappings
  calls:
  - action: list_event_source_mappings
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.EventSourceMappings }}'
- discovery_id: aws.lambda.list_code_signing_configs
  calls:
  - action: list_code_signing_configs
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.CodeSigningConfigs }}'
- discovery_id: aws.lambda.get_account_settings
  calls:
  - action: get_account_settings
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.AccountLimit }}'
- discovery_id: aws.lambda.list_layers
  calls:
  - action: list_layers
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Layers }}'
- discovery_id: aws.lambda.get_function_url_config
  for_each: aws.lambda.list_functions
  calls:
  - action: get_function_url_config
    save_as: response
    on_error: continue
    params:
      FunctionName: '{{ item.functionFunctionName }}'
  emit:
    as: item
    items_for: '{{ response.Cors }}'
- discovery_id: aws.lambda.get_layer_version
  for_each: aws.lambda.list_layers
  calls:
  - action: get_layer_version
    save_as: response
    on_error: continue
    params:
      LayerName: '{{ item.layerLayerName }}'
  emit:
    as: item
    items_for: '{{ response.CompatibleRuntimes }}'
- discovery_id: aws.lambda.list_provisioned_concurrency_configs
  for_each: aws.lambda.list_functions
  calls:
  - action: list_provisioned_concurrency_configs
    save_as: response
    on_error: continue
    params:
      FunctionName: '{{ item.functionFunctionName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ProvisionedConcurrencyConfigs }}'
- discovery_id: aws.lambda.list_aliases
  for_each: aws.lambda.list_functions
  calls:
  - action: list_aliases
    save_as: response
    on_error: continue
    params:
      FunctionName: '{{ item.functionFunctionName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Aliases }}'
- discovery_id: aws.lambda.get_function_event_invoke_config
  for_each: aws.lambda.list_functions
  calls:
  - action: get_function_event_invoke_config
    save_as: response
    on_error: continue
    params:
      FunctionName: '{{ item.functionFunctionName }}'
  emit:
    as: item
    items_for: '{{ response.DestinationConfig }}'
- discovery_id: aws.lambda.get_function
  for_each: aws.lambda.list_functions
  calls:
  - action: get_function
    save_as: response
    on_error: continue
    params:
      FunctionName: '{{ item.functionFunctionName }}'
  emit:
    as: item
    items_for: '{{ response.Configuration }}'
- discovery_id: aws.lambda.get_function_configuration
  for_each: aws.lambda.list_functions
  calls:
  - action: get_function_configuration
    save_as: response
    on_error: continue
    params:
      FunctionName: '{{ item.functionFunctionName }}'
  emit:
    as: item
    items_for: '{{ response.Layers }}'
- discovery_id: aws.lambda.get_alias
  for_each: aws.lambda.list_aliases
  calls:
  - action: get_alias
    save_as: response
    on_error: continue
    params:
      FunctionName: '{{ item.functionFunctionName }}'
  emit:
    as: item
    items_for: '{{ response.RoutingConfig }}'
- discovery_id: aws.lambda.get_policy
  for_each: aws.lambda.list_functions
  calls:
  - action: get_policy
    save_as: response
    on_error: continue
    params:
      FunctionName: '{{ item.functionFunctionName }}'
  emit:
    as: item
    items_for: '{{ response.Policy }}'
- discovery_id: aws.lambda.get_function_concurrency
  for_each: aws.lambda.list_functions
  calls:
  - action: get_function_concurrency
    save_as: response
    on_error: continue
    params:
      FunctionName: '{{ item.functionFunctionName }}'
  emit:
    as: item
    items_for: '{{ response.ReservedConcurrentExecutions }}'
checks: []
