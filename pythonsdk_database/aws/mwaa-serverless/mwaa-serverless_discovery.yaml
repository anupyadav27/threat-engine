version: '1.0'
provider: aws
service: mwaa-serverless
services:
  client: mwaa-serverless
  module: boto3.client
discovery:
- discovery_id: aws.mwaa-serverless.list_workflows
  calls:
  - action: list_workflows
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Workflows }}'
- discovery_id: aws.mwaa-serverless.get_workflow
  for_each: aws.mwaa-serverless.list_workflows
  calls:
  - action: get_workflow
    save_as: response
    on_error: continue
    params:
      WorkflowArn: '{{ item.workflowWorkflowArn }}'
  emit:
    as: item
    items_for: '{{ response.EncryptionConfiguration }}'
- discovery_id: aws.mwaa-serverless.list_workflow_runs
  for_each: aws.mwaa-serverless.list_workflows
  calls:
  - action: list_workflow_runs
    save_as: response
    on_error: continue
    params:
      WorkflowArn: '{{ item.workflowWorkflowArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.WorkflowRuns }}'
- discovery_id: aws.mwaa-serverless.get_workflow_run
  for_each: aws.mwaa-serverless.list_workflow_runs
  calls:
  - action: get_workflow_run
    save_as: response
    on_error: continue
    params:
      WorkflowArn: '{{ item.workflowWorkflowArn }}'
  emit:
    as: item
    items_for: '{{ response.RunDetail }}'
- discovery_id: aws.mwaa-serverless.list_task_instances
  for_each: aws.mwaa-serverless.list_workflow_runs
  calls:
  - action: list_task_instances
    save_as: response
    on_error: continue
    params:
      WorkflowArn: '{{ item.workflowWorkflowArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.TaskInstances }}'
- discovery_id: aws.mwaa-serverless.get_task_instance
  for_each: aws.mwaa-serverless.list_workflow_runs
  calls:
  - action: get_task_instance
    save_as: response
    on_error: continue
    params:
      WorkflowArn: '{{ item.workflowWorkflowArn }}'
  emit:
    as: item
    items_for: '{{ response.WorkflowArn }}'
- discovery_id: aws.mwaa-serverless.list_workflow_versions
  for_each: aws.mwaa-serverless.list_workflows
  calls:
  - action: list_workflow_versions
    save_as: response
    on_error: continue
    params:
      WorkflowArn: '{{ item.workflowWorkflowArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.WorkflowVersions }}'
checks: []
