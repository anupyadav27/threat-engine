version: '1.0'
provider: aws
service: kinesis-video-archived-media
services:
  client: kinesis-video-archived-media
  module: boto3.client
discovery:
- discovery_id: aws.kinesis-video-archived-media.list_fragments
  calls:
  - action: list_fragments
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Fragments }}'
- discovery_id: aws.kinesis-video-archived-media.get_hls_streaming_session_url
  calls:
  - action: get_hls_streaming_session_url
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.HLSStreamingSessionURL }}'
- discovery_id: aws.kinesis-video-archived-media.get_dash_streaming_session_url
  calls:
  - action: get_dash_streaming_session_url
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.DASHStreamingSessionURL }}'
- discovery_id: aws.kinesis-video-archived-media.get_images
  calls:
  - action: get_images
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Images }}'
checks: []
