version: '1.0'
provider: aws
service: parameterstore
services:
  client: parameterstore
  module: boto3.client
discovery:
- discovery_id: aws.parameterstore.describe_patch_baselines
  calls:
  - action: describe_patch_baselines
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.BaselineIdentities }}'
- discovery_id: aws.parameterstore.get_default_patch_baseline
