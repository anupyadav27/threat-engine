version: '1.0'
provider: aws
service: ssm-quicksetup
services:
  client: ssm-quicksetup
  module: boto3.client
discovery:
- discovery_id: aws.ssm-quicksetup.list_configurations
  calls:
  - action: list_configurations
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ConfigurationsList }}'
- discovery_id: aws.ssm-quicksetup.list_configuration_managers
  calls:
  - action: list_configuration_managers
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ConfigurationManagersList }}'
- discovery_id: aws.ssm-quicksetup.list_quick_setup_types
  calls:
  - action: list_quick_setup_types
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.QuickSetupTypeList }}'
- discovery_id: aws.ssm-quicksetup.get_service_settings
  calls:
  - action: get_service_settings
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ServiceSettings }}'
- discovery_id: aws.ssm-quicksetup.get_configuration
  calls:
  - action: get_configuration
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.StatusSummaries }}'
- discovery_id: aws.ssm-quicksetup.get_configuration_manager
  for_each: aws.ssm-quicksetup.list_configurations
  calls:
  - action: get_configuration_manager
    save_as: response
    on_error: continue
    params:
      ManagerArn: '{{ item.configurationManagersListManagerArn }}'
  emit:
    as: item
    items_for: '{{ response.ConfigurationDefinitions }}'
- discovery_id: aws.ssm-quicksetup.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Tags }}'
checks: []
