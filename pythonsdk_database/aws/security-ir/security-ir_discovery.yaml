version: '1.0'
provider: aws
service: security-ir
services:
  client: security-ir
  module: boto3.client
discovery:
- discovery_id: aws.security-ir.list_cases
  calls:
  - action: list_cases
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.items }}'
- discovery_id: aws.security-ir.list_memberships
  calls:
  - action: list_memberships
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.items }}'
- discovery_id: aws.security-ir.get_case
  for_each: aws.security-ir.list_cases
  calls:
  - action: get_case
    save_as: response
    on_error: continue
    params:
      caseId: '{{ item.itemCaseId }}'
  emit:
    as: item
    items_for: '{{ response.impactedAwsRegions }}'
- discovery_id: aws.security-ir.list_investigations
  for_each: aws.security-ir.list_cases
  calls:
  - action: list_investigations
    save_as: response
    on_error: continue
    params:
      caseId: '{{ item.itemCaseId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.investigationActions }}'
- discovery_id: aws.security-ir.get_membership
  for_each: aws.security-ir.list_memberships
  calls:
  - action: get_membership
    save_as: response
    on_error: continue
    params:
      membershipId: '{{ item.itemMembershipId }}'
  emit:
    as: item
    items_for: '{{ response.incidentResponseTeam }}'
- discovery_id: aws.security-ir.list_comments
  for_each: aws.security-ir.list_cases
  calls:
  - action: list_comments
    save_as: response
    on_error: continue
    params:
      caseId: '{{ item.itemCaseId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.items }}'
- discovery_id: aws.security-ir.list_case_edits
  for_each: aws.security-ir.list_cases
  calls:
  - action: list_case_edits
    save_as: response
    on_error: continue
    params:
      caseId: '{{ item.itemCaseId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.items }}'
- discovery_id: aws.security-ir.get_case_attachment_upload_url
  for_each: aws.security-ir.list_cases
  calls:
  - action: get_case_attachment_upload_url
    save_as: response
    on_error: continue
    params:
      caseId: '{{ item.itemCaseId }}'
  emit:
    as: item
    items_for: '{{ response.attachmentPresignedUrl }}'
checks: []
