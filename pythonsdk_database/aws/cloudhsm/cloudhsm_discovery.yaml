version: '1.0'
provider: aws
service: cloudhsm
services:
  client: cloudhsm
  module: boto3.client
discovery:
- discovery_id: aws.cloudhsm.describe_hsm
  calls:
  - action: describe_hsm
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Partitions }}'
- discovery_id: aws.cloudhsm.describe_luna_client
  calls:
  - action: describe_luna_client
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ClientArn }}'
- discovery_id: aws.cloudhsm.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.TagList }}'
checks: []
