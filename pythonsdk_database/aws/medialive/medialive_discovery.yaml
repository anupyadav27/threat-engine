version: '1.0'
provider: aws
service: medialive
services:
  client: medialive
  module: boto3.client
discovery:
- discovery_id: aws.medialive.list_inputs
  calls:
  - action: list_inputs
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Inputs }}'
- discovery_id: aws.medialive.list_channels
  calls:
  - action: list_channels
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Channels }}'
- discovery_id: aws.medialive.list_reservations
  calls:
  - action: list_reservations
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Reservations }}'
- discovery_id: aws.medialive.list_input_devices
  calls:
  - action: list_input_devices
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.InputDevices }}'
- discovery_id: aws.medialive.list_cloud_watch_alarm_templates
  calls:
  - action: list_cloud_watch_alarm_templates
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.CloudWatchAlarmTemplates }}'
- discovery_id: aws.medialive.list_event_bridge_rule_templates
  calls:
  - action: list_event_bridge_rule_templates
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.EventBridgeRuleTemplates }}'
- discovery_id: aws.medialive.list_multiplexes
  calls:
  - action: list_multiplexes
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Multiplexes }}'
- discovery_id: aws.medialive.list_signal_maps
  calls:
  - action: list_signal_maps
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.SignalMaps }}'
- discovery_id: aws.medialive.list_cloud_watch_alarm_template_groups
  calls:
  - action: list_cloud_watch_alarm_template_groups
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.CloudWatchAlarmTemplateGroups }}'
- discovery_id: aws.medialive.list_sdi_sources
  calls:
  - action: list_sdi_sources
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.SdiSources }}'
- discovery_id: aws.medialive.list_clusters
  calls:
  - action: list_clusters
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Clusters }}'
- discovery_id: aws.medialive.list_networks
  calls:
  - action: list_networks
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Networks }}'
- discovery_id: aws.medialive.list_input_security_groups
  calls:
  - action: list_input_security_groups
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.InputSecurityGroups }}'
- discovery_id: aws.medialive.describe_account_configuration
  calls:
  - action: describe_account_configuration
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.AccountConfiguration }}'
- discovery_id: aws.medialive.list_versions
  calls:
  - action: list_versions
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Versions }}'
- discovery_id: aws.medialive.describe_offering
  for_each: aws.medialive.list_reservations
  calls:
  - action: describe_offering
    save_as: response
    on_error: continue
    params:
      OfferingId: '{{ item.offeringOfferingId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ResourceSpecification }}'
- discovery_id: aws.medialive.list_alerts
  for_each: aws.medialive.list_inputs
  calls:
  - action: list_alerts
    save_as: response
    on_error: continue
    params:
      ChannelId: '{{ item.channelId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Alerts }}'
- discovery_id: aws.medialive.describe_channel
  for_each: aws.medialive.list_inputs
  calls:
  - action: describe_channel
    save_as: response
    on_error: continue
    params:
      ChannelId: '{{ item.channelId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Destinations }}'
- discovery_id: aws.medialive.describe_schedule
  for_each: aws.medialive.list_inputs
  calls:
  - action: describe_schedule
    save_as: response
    on_error: continue
    params:
      ChannelId: '{{ item.channelId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ScheduleActions }}'
- discovery_id: aws.medialive.describe_reservation
  for_each: aws.medialive.list_reservations
  calls:
  - action: describe_reservation
    save_as: response
    on_error: continue
    params:
      ReservationId: '{{ item.reservationReservationId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.RenewalSettings }}'
- discovery_id: aws.medialive.list_multiplex_programs
  calls:
  - action: list_multiplex_programs
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.MultiplexPrograms }}'
- discovery_id: aws.medialive.describe_network
  calls:
  - action: describe_network
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.IpPools }}'
- discovery_id: aws.medialive.describe_multiplex_program
  for_each: aws.medialive.list_multiplex_programs
  calls:
  - action: describe_multiplex_program
    save_as: response
    on_error: continue
    params:
      MultiplexId: '{{ item.multiplexProgramProgramName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.PipelineDetails }}'
- discovery_id: aws.medialive.describe_thumbnails
  for_each: aws.medialive.list_inputs
  calls:
  - action: describe_thumbnails
    save_as: response
    on_error: continue
    params:
      ChannelId: '{{ item.channelId }}'
      ThumbnailType: '{{ item.pipelineDetailPipelineId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ThumbnailDetails }}'
- discovery_id: aws.medialive.describe_input_device_thumbnail
  calls:
  - action: describe_input_device_thumbnail
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Body }}'
checks: []
