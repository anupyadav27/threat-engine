version: '1.0'
provider: aws
service: appflow
services:
  client: appflow
  module: boto3.client
discovery:
- discovery_id: aws.appflow.list_flows
  calls:
  - action: list_flows
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.flows }}'
- discovery_id: aws.appflow.describe_connectors
  calls:
  - action: describe_connectors
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.connectors }}'
- discovery_id: aws.appflow.describe_connector_profiles
  calls:
  - action: describe_connector_profiles
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.connectorProfileDetails }}'
- discovery_id: aws.appflow.describe_connector
  for_each: aws.appflow.describe_connectors
  calls:
  - action: describe_connector
    save_as: response
    on_error: continue
    params:
      connectorType: '{{ item.connectorProfileDetailConnectorType }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.connectorConfiguration }}'
- discovery_id: aws.appflow.describe_connector_entity
  calls:
  - action: describe_connector_entity
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.connectorEntityFields }}'
- discovery_id: aws.appflow.describe_flow_execution_records
  for_each: aws.appflow.list_flows
  calls:
  - action: describe_flow_execution_records
    save_as: response
    on_error: continue
    params:
      flowName: '{{ item.flowFlowName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.flowExecutions }}'
- discovery_id: aws.appflow.describe_flow
  for_each: aws.appflow.list_flows
  calls:
  - action: describe_flow
    save_as: response
    on_error: continue
    params:
      flowName: '{{ item.flowFlowName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.destinationFlowConfigList }}'
checks: []
