version: '1.0'
provider: aws
service: application-insights
services:
  client: application-insights
  module: boto3.client
discovery:
- discovery_id: aws.application-insights.list_problems
  calls:
  - action: list_problems
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ProblemList }}'
- discovery_id: aws.application-insights.list_applications
  calls:
  - action: list_applications
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ApplicationInfoList }}'
- discovery_id: aws.application-insights.list_configuration_history
  calls:
  - action: list_configuration_history
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.EventList }}'
- discovery_id: aws.application-insights.describe_observation
  calls:
  - action: describe_observation
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Observation }}'
- discovery_id: aws.application-insights.list_components
  for_each: aws.application-insights.list_problems
  calls:
  - action: list_components
    save_as: response
    on_error: continue
    params:
      ResourceGroupName: '{{ item.applicationInfoListResourceGroupName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ApplicationComponentList }}'
- discovery_id: aws.application-insights.list_log_patterns
  for_each: aws.application-insights.list_problems
  calls:
  - action: list_log_patterns
    save_as: response
    on_error: continue
    params:
      ResourceGroupName: '{{ item.applicationInfoListResourceGroupName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.LogPatterns }}'
- discovery_id: aws.application-insights.list_workloads
  for_each: aws.application-insights.list_components
  calls:
  - action: list_workloads
    save_as: response
    on_error: continue
    params:
      ResourceGroupName: '{{ item.applicationInfoListResourceGroupName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.WorkloadList }}'
- discovery_id: aws.application-insights.describe_problem
  calls:
  - action: describe_problem
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Problem }}'
- discovery_id: aws.application-insights.describe_application
  for_each: aws.application-insights.list_problems
  calls:
  - action: describe_application
    save_as: response
    on_error: continue
    params:
      ResourceGroupName: '{{ item.applicationInfoListResourceGroupName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ApplicationInfo }}'
- discovery_id: aws.application-insights.describe_workload
  for_each: aws.application-insights.list_components
  calls:
  - action: describe_workload
    save_as: response
    on_error: continue
    params:
      ResourceGroupName: '{{ item.workloadListWorkloadId }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.WorkloadConfiguration }}'
- discovery_id: aws.application-insights.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Tags }}'
- discovery_id: aws.application-insights.describe_problem_observations
  calls:
  - action: describe_problem_observations
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.RelatedObservations }}'
checks: []
