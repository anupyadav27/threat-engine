version: '1.0'
provider: aws
service: appconfig
services:
  client: appconfig
  module: boto3.client
discovery:
- discovery_id: aws.appconfig.list_deployment_strategies
  calls:
  - action: list_deployment_strategies
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.appconfig.list_extensions
  calls:
  - action: list_extensions
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.appconfig.list_extension_associations
  calls:
  - action: list_extension_associations
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Items }}'
- discovery_id: aws.appconfig.get_account_settings
  calls:
  - action: get_account_settings
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.DeletionProtection }}'
- discovery_id: aws.appconfig.get_configuration
  calls:
  - action: get_configuration
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Content }}'
checks: []
