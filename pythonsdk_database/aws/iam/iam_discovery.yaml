version: '1.0'
provider: aws
service: iam
services:
  client: iam
  module: boto3.client
discovery:
- discovery_id: aws.iam.list_delegation_requests
  calls:
  - action: list_delegation_requests
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.DelegationRequests }}'
    item:
      ApproverId: '{{ item.ApproverId }}'
      CreateDate: '{{ item.CreateDate }}'
      DelegationRequestId: '{{ item.DelegationRequestId }}'
      Description: '{{ item.Description }}'
      Notes: '{{ item.Notes }}'
      OnlySendByOwner: '{{ item.OnlySendByOwner }}'
      OwnerAccountId: '{{ item.OwnerAccountId }}'
      OwnerId: '{{ item.OwnerId }}'
      PermissionPolicy: '{{ item.PermissionPolicy }}'
      Permissions: '{{ item.Permissions }}'
      RedirectUrl: '{{ item.RedirectUrl }}'
      RejectionReason: '{{ item.RejectionReason }}'
      RequestMessage: '{{ item.RequestMessage }}'
      RequestorId: '{{ item.RequestorId }}'
      RequestorName: '{{ item.RequestorName }}'
      RolePermissionRestrictionArns: '{{ item.RolePermissionRestrictionArns }}'
      SessionDuration: '{{ item.SessionDuration }}'
      State: '{{ item.State }}'
      UpdatedTime: '{{ item.UpdatedTime }}'
- discovery_id: aws.iam.list_policies
  calls:
  - action: list_policies
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Policies }}'
    item:
      Arn: '{{ item.Arn }}'
      AttachmentCount: '{{ item.AttachmentCount }}'
      CreateDate: '{{ item.CreateDate }}'
      DefaultVersionId: '{{ item.DefaultVersionId }}'
      Description: '{{ item.Description }}'
      IsAttachable: '{{ item.IsAttachable }}'
      Path: '{{ item.Path }}'
      PermissionsBoundaryUsageCount: '{{ item.PermissionsBoundaryUsageCount }}'
      PolicyId: '{{ item.PolicyId }}'
      PolicyName: '{{ item.PolicyName }}'
      Tags: '{{ item.Tags }}'
      UpdateDate: '{{ item.UpdateDate }}'
- discovery_id: aws.iam.list_roles
  calls:
  - action: list_roles
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Roles }}'
    item:
      Arn: '{{ item.Arn }}'
      AssumeRolePolicyDocument: '{{ item.AssumeRolePolicyDocument }}'
      CreateDate: '{{ item.CreateDate }}'
      Description: '{{ item.Description }}'
      MaxSessionDuration: '{{ item.MaxSessionDuration }}'
      Path: '{{ item.Path }}'
      PermissionsBoundary: '{{ item.PermissionsBoundary }}'
      RoleId: '{{ item.RoleId }}'
      RoleLastUsed: '{{ item.RoleLastUsed }}'
      RoleName: '{{ item.RoleName }}'
      Tags: '{{ item.Tags }}'
- discovery_id: aws.iam.get_account_authorization_details
  calls:
  - action: get_account_authorization_details
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.UserDetailList }}'
    item:
      Arn: '{{ item.Arn }}'
      AttachedManagedPolicies: '{{ item.AttachedManagedPolicies }}'
      CreateDate: '{{ item.CreateDate }}'
      GroupList: '{{ item.GroupList }}'
      Path: '{{ item.Path }}'
      PermissionsBoundary: '{{ item.PermissionsBoundary }}'
      Tags: '{{ item.Tags }}'
      UserId: '{{ item.UserId }}'
      UserName: '{{ item.UserName }}'
      UserPolicyList: '{{ item.UserPolicyList }}'
- discovery_id: aws.iam.get_account_password_policy
  calls:
  - action: get_account_password_policy
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.PasswordPolicy }}'
    item:
      AllowUsersToChangePassword: '{{ item.AllowUsersToChangePassword }}'
      ExpirePasswords: '{{ item.ExpirePasswords }}'
      HardExpiry: '{{ item.HardExpiry }}'
      MaxPasswordAge: '{{ item.MaxPasswordAge }}'
      MinimumPasswordLength: '{{ item.MinimumPasswordLength }}'
      PasswordReusePrevention: '{{ item.PasswordReusePrevention }}'
      RequireLowercaseCharacters: '{{ item.RequireLowercaseCharacters }}'
      RequireNumbers: '{{ item.RequireNumbers }}'
      RequireSymbols: '{{ item.RequireSymbols }}'
      RequireUppercaseCharacters: '{{ item.RequireUppercaseCharacters }}'
- discovery_id: aws.iam.list_users
  calls:
  - action: list_users
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Users }}'
    item:
      Arn: '{{ item.Arn }}'
      CreateDate: '{{ item.CreateDate }}'
      PasswordLastUsed: '{{ item.PasswordLastUsed }}'
      Path: '{{ item.Path }}'
      PermissionsBoundary: '{{ item.PermissionsBoundary }}'
      Tags: '{{ item.Tags }}'
      UserId: '{{ item.UserId }}'
      UserName: '{{ item.UserName }}'
- discovery_id: aws.iam.list_service_specific_credentials
  calls:
  - action: list_service_specific_credentials
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ServiceSpecificCredentials }}'
    item:
      CreateDate: '{{ item.CreateDate }}'
      ExpirationDate: '{{ item.ExpirationDate }}'
      ServiceCredentialAlias: '{{ item.ServiceCredentialAlias }}'
      ServiceName: '{{ item.ServiceName }}'
      ServiceSpecificCredentialId: '{{ item.ServiceSpecificCredentialId }}'
      ServiceUserName: '{{ item.ServiceUserName }}'
      Status: '{{ item.Status }}'
      UserName: '{{ item.UserName }}'
- discovery_id: aws.iam.list_instance_profiles
  calls:
  - action: list_instance_profiles
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.InstanceProfiles }}'
    item:
      Arn: '{{ item.Arn }}'
      CreateDate: '{{ item.CreateDate }}'
      InstanceProfileId: '{{ item.InstanceProfileId }}'
      InstanceProfileName: '{{ item.InstanceProfileName }}'
      Path: '{{ item.Path }}'
      Roles: '{{ item.Roles }}'
      Tags: '{{ item.Tags }}'
- discovery_id: aws.iam.get_user
  calls:
  - action: get_user
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.User }}'
    item:
      Arn: '{{ item.Arn }}'
      CreateDate: '{{ item.CreateDate }}'
      PasswordLastUsed: '{{ item.PasswordLastUsed }}'
      Path: '{{ item.Path }}'
      PermissionsBoundary: '{{ item.PermissionsBoundary }}'
      Tags: '{{ item.Tags }}'
      UserId: '{{ item.UserId }}'
      UserName: '{{ item.UserName }}'
- discovery_id: aws.iam.list_virtual_mfa_devices
  calls:
  - action: list_virtual_mfa_devices
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.VirtualMFADevices }}'
    item:
      Base32StringSeed: '{{ item.Base32StringSeed }}'
      EnableDate: '{{ item.EnableDate }}'
      QRCodePNG: '{{ item.QRCodePNG }}'
      SerialNumber: '{{ item.SerialNumber }}'
      Tags: '{{ item.Tags }}'
      User: '{{ item.User }}'
- discovery_id: aws.iam.list_server_certificates
  calls:
  - action: list_server_certificates
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ServerCertificateMetadataList }}'
    item:
      Arn: '{{ item.Arn }}'
      Expiration: '{{ item.Expiration }}'
      Path: '{{ item.Path }}'
      ServerCertificateId: '{{ item.ServerCertificateId }}'
      ServerCertificateName: '{{ item.ServerCertificateName }}'
      UploadDate: '{{ item.UploadDate }}'
- discovery_id: aws.iam.list_groups
  calls:
  - action: list_groups
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Groups }}'
    item:
      Arn: '{{ item.Arn }}'
      CreateDate: '{{ item.CreateDate }}'
      GroupId: '{{ item.GroupId }}'
      GroupName: '{{ item.GroupName }}'
      Path: '{{ item.Path }}'
- discovery_id: aws.iam.list_signing_certificates
  calls:
  - action: list_signing_certificates
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Certificates }}'
    item:
      CertificateBody: '{{ item.CertificateBody }}'
      CertificateId: '{{ item.CertificateId }}'
      Status: '{{ item.Status }}'
      UploadDate: '{{ item.UploadDate }}'
      UserName: '{{ item.UserName }}'
- discovery_id: aws.iam.list_ssh_public_keys
  calls:
  - action: list_ssh_public_keys
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.SSHPublicKeys }}'
    item:
      SSHPublicKeyId: '{{ item.SSHPublicKeyId }}'
      Status: '{{ item.Status }}'
      UploadDate: '{{ item.UploadDate }}'
      UserName: '{{ item.UserName }}'
- discovery_id: aws.iam.list_access_keys
  calls:
  - action: list_access_keys
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.AccessKeyMetadata }}'
    item:
      AccessKeyId: '{{ item.AccessKeyId }}'
      CreateDate: '{{ item.CreateDate }}'
      Status: '{{ item.Status }}'
      UserName: '{{ item.UserName }}'
- discovery_id: aws.iam.get_login_profile
  calls:
  - action: get_login_profile
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.LoginProfile }}'
    item:
      CreateDate: '{{ item.CreateDate }}'
      PasswordResetRequired: '{{ item.PasswordResetRequired }}'
      UserName: '{{ item.UserName }}'
- discovery_id: aws.iam.list_saml_providers
  calls:
  - action: list_saml_providers
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.SAMLProviderList }}'
    item:
      Arn: '{{ item.Arn }}'
      CreateDate: '{{ item.CreateDate }}'
      ValidUntil: '{{ item.ValidUntil }}'
- discovery_id: aws.iam.get_outbound_web_identity_federation_info
  calls:
  - action: get_outbound_web_identity_federation_info
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.IssuerIdentifier }}'
- discovery_id: aws.iam.get_credential_report
  calls:
  - action: get_credential_report
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Content }}'
- discovery_id: aws.iam.get_account_summary
  calls:
  - action: get_account_summary
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.SummaryMap }}'
- discovery_id: aws.iam.get_service_last_accessed_details
  calls:
  - action: get_service_last_accessed_details
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ServicesLastAccessed }}'
    item:
      LastAuthenticated: '{{ item.LastAuthenticated }}'
      LastAuthenticatedEntity: '{{ item.LastAuthenticatedEntity }}'
      LastAuthenticatedRegion: '{{ item.LastAuthenticatedRegion }}'
      ServiceName: '{{ item.ServiceName }}'
      ServiceNamespace: '{{ item.ServiceNamespace }}'
      TotalAuthenticatedEntities: '{{ item.TotalAuthenticatedEntities }}'
      TrackedActionsLastAccessed: '{{ item.TrackedActionsLastAccessed }}'
- discovery_id: aws.iam.get_organizations_access_report
  calls:
  - action: get_organizations_access_report
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.AccessDetails }}'
    item:
      EntityPath: '{{ item.EntityPath }}'
      LastAuthenticatedTime: '{{ item.LastAuthenticatedTime }}'
      Region: '{{ item.Region }}'
      ServiceName: '{{ item.ServiceName }}'
      ServiceNamespace: '{{ item.ServiceNamespace }}'
      TotalAuthenticatedEntities: '{{ item.TotalAuthenticatedEntities }}'
- discovery_id: aws.iam.get_ssh_public_key
  for_each: aws.iam.list_ssh_public_keys
  calls:
  - action: get_ssh_public_key
    save_as: response
    on_error: continue
    params:
      UserName: '{{ item.userDetailListUserName }}'
  emit:
    as: item
    items_for: '{{ response.SSHPublicKey }}'
    item:
      Fingerprint: '{{ item.Fingerprint }}'
      SSHPublicKeyBody: '{{ item.SSHPublicKeyBody }}'
      SSHPublicKeyId: '{{ item.SSHPublicKeyId }}'
      Status: '{{ item.Status }}'
      UploadDate: '{{ item.UploadDate }}'
      UserName: '{{ item.UserName }}'
- discovery_id: aws.iam.get_saml_provider
  calls:
  - action: get_saml_provider
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.PrivateKeyList }}'
    item:
      KeyId: '{{ item.KeyId }}'
      Timestamp: '{{ item.Timestamp }}'
- discovery_id: aws.iam.get_human_readable_summary
  calls:
  - action: get_human_readable_summary
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.SummaryContent }}'
- discovery_id: aws.iam.list_role_tags
  for_each: aws.iam.list_roles
  calls:
  - action: list_role_tags
    save_as: response
    on_error: continue
    params:
      RoleName: '{{ item.rolRoleName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Tags }}'
    item:
      Key: '{{ item.Key }}'
      Value: '{{ item.Value }}'
- discovery_id: aws.iam.get_access_key_last_used
  for_each: aws.iam.list_access_keys
  calls:
  - action: get_access_key_last_used
    save_as: response
    on_error: continue
    params:
      AccessKeyId: '{{ item.accessKeyMetadataAccessKeyId }}'
  emit:
    as: item
    items_for: '{{ response.AccessKeyLastUsed }}'
    item:
      LastUsedDate: '{{ item.LastUsedDate }}'
      Region: '{{ item.Region }}'
      ServiceName: '{{ item.ServiceName }}'
- discovery_id: aws.iam.get_server_certificate
  for_each: aws.iam.list_server_certificates
  calls:
  - action: get_server_certificate
    save_as: response
    on_error: continue
    params:
      ServerCertificateName: '{{ item.serverCertificateMetadataListServerCertificateName }}'
  emit:
    as: item
    items_for: '{{ response.ServerCertificate }}'
    item:
      CertificateBody: '{{ item.CertificateBody }}'
      CertificateChain: '{{ item.CertificateChain }}'
      ServerCertificateMetadata: '{{ item.ServerCertificateMetadata }}'
      Tags: '{{ item.Tags }}'
- discovery_id: aws.iam.get_service_linked_role_deletion_status
  calls:
  - action: get_service_linked_role_deletion_status
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Reason }}'
    item:
      Reason: '{{ item.Reason }}'
      RoleUsageList: '{{ item.RoleUsageList }}'
- discovery_id: aws.iam.get_role
  for_each: aws.iam.list_roles
  calls:
  - action: get_role
    save_as: response
    on_error: continue
    params:
      RoleName: '{{ item.rolRoleName }}'
  emit:
    as: item
    items_for: '{{ response.Role }}'
    item:
      Arn: '{{ item.Arn }}'
      AssumeRolePolicyDocument: '{{ item.AssumeRolePolicyDocument }}'
      CreateDate: '{{ item.CreateDate }}'
      Description: '{{ item.Description }}'
      MaxSessionDuration: '{{ item.MaxSessionDuration }}'
      Path: '{{ item.Path }}'
      PermissionsBoundary: '{{ item.PermissionsBoundary }}'
      RoleId: '{{ item.RoleId }}'
      RoleLastUsed: '{{ item.RoleLastUsed }}'
      RoleName: '{{ item.RoleName }}'
      Tags: '{{ item.Tags }}'
- discovery_id: aws.iam.get_mfa_device
  for_each: aws.iam.list_virtual_mfa_devices
  calls:
  - action: get_mfa_device
    save_as: response
    on_error: continue
    params:
      SerialNumber: '{{ item.mfaDevicSerialNumber }}'
  emit:
    as: item
    items_for: '{{ response.UserName }}'
- discovery_id: aws.iam.list_attached_user_policies
  for_each: aws.iam.get_account_authorization_details
  calls:
  - action: list_attached_user_policies
    save_as: response
    on_error: continue
    params:
      UserName: '{{ item.userDetailListUserName }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.AttachedPolicies }}'
    item:
      PolicyArn: '{{ item.PolicyArn }}'
      PolicyName: '{{ item.PolicyName }}'
- discovery_id: aws.iam.list_policy_versions
  for_each: aws.iam.list_attached_user_policies
  calls:
  - action: list_policy_versions
    save_as: response
    on_error: continue
    params:
      PolicyArn: '{{ item.attachedPolicyPolicyArn }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.Versions }}'
    item:
      CreateDate: '{{ item.CreateDate }}'
      Document: '{{ item.Document }}'
      IsDefaultVersion: '{{ item.IsDefaultVersion }}'
      VersionId: '{{ item.VersionId }}'
- discovery_id: aws.iam.get_policy
  for_each: aws.iam.list_attached_user_policies
  calls:
  - action: get_policy
    save_as: response
    on_error: continue
    params:
      PolicyArn: '{{ item.attachedPolicyPolicyArn }}'
  emit:
    as: item
    items_for: '{{ response.Policy }}'
    item:
      Arn: '{{ item.Arn }}'
      AttachmentCount: '{{ item.AttachmentCount }}'
      CreateDate: '{{ item.CreateDate }}'
      DefaultVersionId: '{{ item.DefaultVersionId }}'
      Description: '{{ item.Description }}'
      IsAttachable: '{{ item.IsAttachable }}'
      Path: '{{ item.Path }}'
      PermissionsBoundaryUsageCount: '{{ item.PermissionsBoundaryUsageCount }}'
      PolicyId: '{{ item.PolicyId }}'
      PolicyName: '{{ item.PolicyName }}'
      Tags: '{{ item.Tags }}'
      UpdateDate: '{{ item.UpdateDate }}'
- discovery_id: aws.iam.get_policy_version
  for_each: aws.iam.list_attached_user_policies
  calls:
  - action: get_policy_version
    save_as: response
    on_error: continue
    params:
      PolicyArn: '{{ item.policyVersionVersionId }}'
  emit:
    as: item
    items_for: '{{ response.PolicyVersion }}'
    item:
      CreateDate: '{{ item.CreateDate }}'
      Document: '{{ item.Document }}'
      IsDefaultVersion: '{{ item.IsDefaultVersion }}'
      VersionId: '{{ item.VersionId }}'
- discovery_id: aws.iam.get_service_last_accessed_details_with_entities
  for_each: aws.iam.get_service_last_accessed_details
  calls:
  - action: get_service_last_accessed_details_with_entities
    save_as: response
    on_error: continue
    params:
      JobId: '{{ item.accessDetailServiceNamespace }}'
  emit:
    as: item
    items_for: '{{ response.EntityDetailsList }}'
    item:
      EntityInfo: '{{ item.EntityInfo }}'
      LastAuthenticated: '{{ item.LastAuthenticated }}'
- discovery_id: aws.iam.get_role_policy
  for_each: aws.iam.list_policies
  calls:
  - action: get_role_policy
    save_as: response
    on_error: continue
    params:
      RoleName: '{{ item.rolRoleName }}'
  emit:
    as: item
    items_for: '{{ response.RoleName }}'
- discovery_id: aws.iam.get_open_id_connect_provider
  calls:
  - action: get_open_id_connect_provider
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ClientIDList }}'
checks: []
