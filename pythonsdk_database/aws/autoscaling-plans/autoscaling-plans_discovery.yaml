version: '1.0'
provider: aws
service: autoscaling-plans
services:
  client: autoscaling-plans
  module: boto3.client
discovery:
- discovery_id: aws.autoscaling-plans.describe_scaling_plans
  calls:
  - action: describe_scaling_plans
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ScalingPlans }}'
- discovery_id: aws.autoscaling-plans.describe_scaling_plan_resources
  for_each: aws.autoscaling-plans.describe_scaling_plans
  calls:
  - action: describe_scaling_plan_resources
    save_as: response
    on_error: continue
    params:
      ScalingPlanName: '{{ item.scalingPlanScalingPlanVersion }}'
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.ScalingPlanResources }}'
- discovery_id: aws.autoscaling-plans.get_scaling_plan_resource_forecast_data
  for_each: aws.autoscaling-plans.describe_scaling_plan_resources
  calls:
  - action: get_scaling_plan_resource_forecast_data
    save_as: response
    on_error: continue
    params:
      ScalingPlanName: '{{ item.scalingPlanScalingPlanVersion }}'
  emit:
    as: item
    items_for: '{{ response.Datapoints }}'
checks: []
