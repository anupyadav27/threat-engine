version: '1.0'
provider: aws
service: costexplorer
services:
  client: costexplorer
  module: boto3.client
discovery:
- discovery_id: aws.costexplorer.list_cost_allocation_tag_backfill_history
  calls:
  - action: list_cost_allocation_tag_backfill_history
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.BackfillRequests }}'
- discovery_id: aws.costexplorer.list_commitment_purchase_analyses
  calls:
  - action: list_commitment_purchase_analyses
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.AnalysisSummaryList }}'
- discovery_id: aws.costexplorer.get_anomaly_subscriptions
  calls:
  - action: get_anomaly_subscriptions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.AnomalySubscriptions }}'
- discovery_id: aws.costexplorer.list_cost_allocation_tags
  calls:
  - action: list_cost_allocation_tags
    save_as: response
    on_error: continue
    params:
      MaxResults: 1000
  emit:
    as: item
    items_for: '{{ response.CostAllocationTags }}'
- discovery_id: aws.costexplorer.get_anomaly_monitors
  calls:
  - action: get_anomaly_monitors
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.AnomalyMonitors }}'
- discovery_id: aws.costexplorer.get_anomalies
  calls:
  - action: get_anomalies
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Anomalies }}'
- discovery_id: aws.costexplorer.get_reservation_purchase_recommendation
  calls:
  - action: get_reservation_purchase_recommendation
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Recommendations }}'
- discovery_id: aws.costexplorer.get_savings_plan_purchase_recommendation_details
  calls:
  - action: get_savings_plan_purchase_recommendation_details
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.RecommendationDetailData }}'
checks: []
