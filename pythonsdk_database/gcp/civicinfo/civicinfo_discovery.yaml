version: '1.0'
provider: gcp
service: civicinfo
services:
  client: civicinfo
  module: googleapiclient.discovery.build('civicinfo', 'v1')
discovery:
- discovery_id: gcp.civicinfo.divisions.query_division_by_address
  calls:
  - action: query_division_by_address
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.civicinfo.divisions.search
  calls:
  - action: search
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.civicinfo.elections.election_query
  calls:
  - action: election_query
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.civicinfo.elections.voter_info_query
  calls:
  - action: voter_info_query
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
