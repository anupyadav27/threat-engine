version: '1.0'
provider: gcp
service: people
services:
  client: people
  module: googleapiclient.discovery.build('people', 'v1')
discovery:
- discovery_id: gcp.people.contactGroups.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
