version: '1.0'
provider: gcp
service: books
services:
  client: books
  module: googleapiclient.discovery.build('books', 'v1')
discovery:
- discovery_id: gcp.books.onboarding.list_category_volumes
  calls:
  - action: list_category_volumes
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
