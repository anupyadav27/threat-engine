version: '1.0'
provider: gcp
service: dataflow
services:
  client: dataflow
  module: googleapiclient.discovery.build('dataflow', 'v1')
discovery:
- discovery_id: gcp.dataflow.projects.templates.get
  calls:
  - action: projects.templates.get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.dataflow.projects.snapshots.list
  calls:
  - action: projects.snapshots.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.dataflow.projects.jobs.list
  calls:
  - action: projects.jobs.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
