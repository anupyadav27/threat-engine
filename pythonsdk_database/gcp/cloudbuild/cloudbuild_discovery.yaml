version: '1.0'
provider: gcp
service: cloudbuild
services:
  client: cloudbuild
  module: googleapiclient.discovery.build('cloudbuild', 'v1')
discovery:
- discovery_id: gcp.cloudbuild.projects.githubEnterpriseConfigs.list
  calls:
  - action: projects.githubEnterpriseConfigs.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.cloudbuild.projects.triggers.list
  calls:
  - action: projects.triggers.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.cloudbuild.operations.get
  calls:
  - action: get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.cloudbuild.projects.builds.list
  calls:
  - action: projects.builds.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.cloudbuild.projects.locations.getDefaultServiceAccount
  calls:
  - action: projects.locations.getDefaultServiceAccount
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
