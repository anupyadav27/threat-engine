version: '1.0'
provider: gcp
service: runtimeconfig
services:
  client: runtimeconfig
  module: googleapiclient.discovery.build('runtimeconfig', 'v1')
discovery:
- discovery_id: gcp.runtimeconfig.operations.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
