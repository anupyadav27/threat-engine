version: '1.0'
provider: gcp
service: driveactivity
services:
  client: driveactivity
  module: googleapiclient.discovery.build('driveactivity', 'v1')
discovery:
- discovery_id: gcp.driveactivity.activity.query
  calls:
  - action: query
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
