version: '1.0'
provider: gcp
service: androiddeviceprovisioning
services:
  client: androiddeviceprovisioning
  module: googleapiclient.discovery.build('androiddeviceprovisioning', 'v1')
discovery:
- discovery_id: gcp.androiddeviceprovisioning.customers.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
