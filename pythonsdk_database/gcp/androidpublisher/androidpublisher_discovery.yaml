version: '1.0'
provider: gcp
service: androidpublisher
services:
  client: androidpublisher
  module: googleapiclient.discovery.build('androidpublisher', 'v1')
discovery:
- discovery_id: gcp.androidpublisher.externaltransactions.getexternaltransaction
  calls:
  - action: getexternaltransaction
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
