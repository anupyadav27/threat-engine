version: '1.0'
provider: gcp
service: firestore
services:
  client: firestore
  module: googleapiclient.discovery.build('firestore', 'v1')
discovery:
- discovery_id: gcp.firestore.projects.databases.list
  calls:
  - action: projects.databases.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: gcp.firestore.projects.locations.list
  calls:
  - action: projects.locations.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
