version: '1.0'
provider: gcp
service: docs
services:
  client: docs
  module: googleapiclient.discovery.build('docs', 'v1')
discovery:
- discovery_id: gcp.docs.documents.get
  calls:
  - action: get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
