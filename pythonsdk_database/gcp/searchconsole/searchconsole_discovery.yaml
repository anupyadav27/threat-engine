version: '1.0'
provider: gcp
service: searchconsole
services:
  client: searchconsole
  module: googleapiclient.discovery.build('searchconsole', 'v1')
discovery:
- discovery_id: gcp.searchconsole.sitemaps.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
