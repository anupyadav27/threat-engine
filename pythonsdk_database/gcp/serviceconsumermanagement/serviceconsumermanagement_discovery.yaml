version: '1.0'
provider: gcp
service: serviceconsumermanagement
services:
  client: serviceconsumermanagement
  module: googleapiclient.discovery.build('serviceconsumermanagement', 'v1')
discovery:
- discovery_id: gcp.serviceconsumermanagement.operations.get
  calls:
  - action: get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
