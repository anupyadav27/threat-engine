version: '1.0'
provider: gcp
service: workflows
services:
  client: workflows
  module: googleapiclient.discovery.build('workflows', 'v1')
discovery:
- discovery_id: gcp.workflows.projects.locations.list
  calls:
  - action: projects.locations.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
