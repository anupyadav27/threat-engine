version: '1.0'
provider: gcp
service: ml
services:
  client: ml
  module: googleapiclient.discovery.build('ml', 'v1')
discovery:
- discovery_id: gcp.ml.projects.get_config
  calls:
  - action: get_config
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
