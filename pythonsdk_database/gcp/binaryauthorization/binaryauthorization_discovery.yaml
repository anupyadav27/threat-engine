version: '1.0'
provider: gcp
service: binaryauthorization
services:
  client: binaryauthorization
  module: googleapiclient.discovery.build('binaryauthorization', 'v1')
discovery:
- discovery_id: gcp.binaryauthorization.systempolicy.get_policy
  calls:
  - action: get_policy
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
