version: '1.0'
provider: gcp
service: firebasedynamiclinks
services:
  client: firebasedynamiclinks
  module: googleapiclient.discovery.build('firebasedynamiclinks', 'v1')
discovery:
- discovery_id: gcp.firebasedynamiclinks.v1.get_link_stats
  calls:
  - action: get_link_stats
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
