version: '1.0'
provider: gcp
service: kgsearch
services:
  client: kgsearch
  module: googleapiclient.discovery.build('kgsearch', 'v1')
discovery:
- discovery_id: gcp.kgsearch.entities.search
  calls:
  - action: search
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
