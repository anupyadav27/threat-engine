version: '1.0'
provider: gcp
service: firebase
services:
  client: firebase
  module: googleapiclient.discovery.build('firebase', 'v1')
discovery:
- discovery_id: gcp.firebase.operations.get
  calls:
  - action: get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
