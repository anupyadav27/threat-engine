version: '1.0'
provider: gcp
service: speech
services:
  client: speech
  module: googleapiclient.discovery.build('speech', 'v1')
discovery:
- discovery_id: gcp.speech.operations.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
