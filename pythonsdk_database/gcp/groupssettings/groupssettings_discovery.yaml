version: '1.0'
provider: gcp
service: groupssettings
services:
  client: groupssettings
  module: googleapiclient.discovery.build('groupssettings', 'v1')
discovery:
- discovery_id: gcp.groupssettings.groups.get
  calls:
  - action: get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
