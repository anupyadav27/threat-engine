version: '1.0'
provider: gcp
service: doubleclicksearch
services:
  client: doubleclicksearch
  module: googleapiclient.discovery.build('doubleclicksearch', 'v1')
discovery:
- discovery_id: gcp.doubleclicksearch.reports.get
  calls:
  - action: get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
