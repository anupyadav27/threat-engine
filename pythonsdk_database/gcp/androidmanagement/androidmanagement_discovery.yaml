version: '1.0'
provider: gcp
service: androidmanagement
services:
  client: androidmanagement
  module: googleapiclient.discovery.build('androidmanagement', 'v1')
discovery:
- discovery_id: gcp.androidmanagement.provisioningInfo.get
  calls:
  - action: get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
