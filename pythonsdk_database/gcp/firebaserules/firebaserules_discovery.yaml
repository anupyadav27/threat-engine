version: '1.0'
provider: gcp
service: firebaserules
services:
  client: firebaserules
  module: googleapiclient.discovery.build('firebaserules', 'v1')
discovery:
- discovery_id: gcp.firebaserules.projects.test
  calls:
  - action: test
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
