version: '1.0'
provider: alicloud
service: bss
services:
  client: bss
  module: aliyunsdkbss
discovery:
- discovery_id: alicloud.bss.DescribeCouponDetail
  calls:
  - action: DescribeCouponDetail
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.bss.DescribeCashDetail
  calls:
  - action: DescribeCashDetail
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.bss.DescribeCouponList
  calls:
  - action: DescribeCouponList
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
