version: '1.0'
provider: alicloud
service: cr
services:
  client: cr
  module: aliyunsdkcr
discovery:
- discovery_id: alicloud.cr.GetRepo
  calls:
  - action: GetRepo
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cr.GetNamespaceList
  calls:
  - action: GetNamespaceList
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cr.GetRegionList
  calls:
  - action: GetRegionList
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cr.GetRepoBuildList
  calls:
  - action: GetRepoBuildList
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cr.GetImageManifest
  calls:
  - action: GetImageManifest
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cr.GetNamespace
  calls:
  - action: GetNamespace
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cr.GetAuthorizationToken
  calls:
  - action: GetAuthorizationToken
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cr.GetImageLayer
  calls:
  - action: GetImageLayer
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cr.GetRegion
  for_each: alicloud.cr.get_repo
  calls:
  - action: GetRegion
    save_as: response
    on_error: continue
    params:
      RegionId: '{{ item.RegionId }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
