version: '1.0'
provider: alicloud
service: cdn
services:
  client: cdn
  module: aliyunsdkcdn
discovery:
- discovery_id: alicloud.cdn.DescribeCdnDomainDetail
  calls:
  - action: DescribeCdnDomainDetail
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
