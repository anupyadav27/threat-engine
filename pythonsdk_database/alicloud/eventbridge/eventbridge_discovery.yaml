version: '1.0'
provider: alicloud
service: eventbridge
services:
  client: eventbridge
  module: aliyunsdkeventbridge
discovery:
- discovery_id: alicloud.eventbridge.GetConnection
  calls:
  - action: GetConnection
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.eventbridge.ListAliyunOfficialEventSources
  calls:
  - action: ListAliyunOfficialEventSources
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.eventbridge.ListEventBuses
  calls:
  - action: ListEventBuses
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.eventbridge.ListApiDestinations
  calls:
  - action: ListApiDestinations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.eventbridge.GetEventStreaming
  calls:
  - action: GetEventStreaming
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.eventbridge.GetRule
  calls:
  - action: GetRule
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.eventbridge.GetEventBus
  calls:
  - action: GetEventBus
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
