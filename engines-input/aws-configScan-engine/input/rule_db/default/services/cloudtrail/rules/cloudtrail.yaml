    op: equals
    value: ApiCallRateInsight
- rule_id: aws.cloudtrail.kms.encryption_enabled
  for_each: aws.cloudtrail.describe_trails
  conditions:
    var: item.KmsKeyId
    op: exists
    value: null
- rule_id: aws.cloudtrail.log.file_validation_enabled
  for_each: aws.cloudtrail.describe_trails
  conditions:
    var: item.LogFileValidationEnabled
    op: equals
    value: 'true'
