    - var: item.IsOrganizationTrail
      op: equals
      value: 'true'
    - var: item.HasInsightSelectors
      op: equals
      value: 'true'
    - var: item.CloudWatchLogsLogGroupArn
      op: exists
      value: null
- rule_id: aws.cloudtrail.policy.change_monitoring_configured
  for_each: aws.cloudtrail.get_insight_selectors
  conditions:
    all:
    - var: item.InsightType
      op: equals
