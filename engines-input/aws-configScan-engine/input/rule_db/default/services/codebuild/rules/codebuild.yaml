version: '1.0'
provider: aws
service: codebuild
services:
  client: codebuild
  module: boto3.client
discovery:
- discovery_id: aws.codebuild.list_projects
  calls:
  - action: list_projects
    save_as: response
  emit:
    items_for: '{{ response.projects }}'
    as: item
    item:
      name: '{{ item }}'
- discovery_id: aws.codebuild.batch_get_projects
  for_each: '{{ aws.codebuild.list_projects }}'
  calls:
  - action: batch_get_projects
    params:
      names:
      - '{{ item.name }}'
    on_error: continue
    save_as: response
  emit:
    items_for: '{{ response.projects }}'
    as: item
    item:
      name: '{{ item.name }}'
      arn: '{{ item.arn }}'
      description: '{{ item.description }}'
      source: '{{ item.source }}'
      secondarySources: '{{ item.secondarySources }}'
      sourceVersion: '{{ item.sourceVersion }}'
      secondarySourceVersions: '{{ item.secondarySourceVersions }}'
      artifacts: '{{ item.artifacts }}'
      secondaryArtifacts: '{{ item.secondaryArtifacts }}'
      cache: '{{ item.cache }}'
      environment: '{{ item.environment }}'
      serviceRole: '{{ item.serviceRole }}'
      timeoutInMinutes: '{{ item.timeoutInMinutes }}'
      queuedTimeoutInMinutes: '{{ item.queuedTimeoutInMinutes }}'
      encryptionKey: '{{ item.encryptionKey }}'
      tags: '{{ item.tags }}'
      created: '{{ item.created }}'
      lastModified: '{{ item.lastModified }}'
      webhook: '{{ item.webhook }}'
      vpcConfig: '{{ item.vpcConfig }}'
      logsConfig: '{{ item.logsConfig }}'
checks:
- rule_id: aws.codebuild.group.codebuild_export_encrypted
  for_each: aws.codebuild.batch_get_projects
  conditions:
    var: item.encryptionKey
    op: exists
    value: 'true'
- rule_id: aws.codebuild.project.codebuild_older_90_days_configured
  for_each: aws.codebuild.batch_get_projects
  conditions:
    all:
    - var: item.created
      op: less_than
      value: 90 days ago
    - var: item.lastModified
      op: greater_than
      value: 90 days ago
- rule_id: aws.codebuild.projectartifact.encryption_enabled
  for_each: aws.codebuild.batch_get_projects
  conditions:
    var: item.artifacts.encryptionKey
    op: exists
    value: 'true'
- rule_id: aws.codebuild.resource.codebuild_project_envvar_awscred_configured
  for_each: aws.codebuild.batch_get_projects
  conditions:
    all:
    - var: item.environment
      op: exists
      value: null
    - var: item.serviceRole
      op: exists
      value: null
- rule_id: aws.codebuild.resource.codebuild_project_s3_logs_encrypted
  for_each: aws.codebuild.batch_get_projects
  conditions:
    var: item.logsConfig.s3Logs.encryptionDisabled
    op: equals
    value: 'false'
- rule_id: aws.codebuild.resource.codebuild_project_source_repo_url_configured
  for_each: aws.codebuild.batch_get_projects
  conditions:
    var: item.source
    op: exists
    value: null
- rule_id: aws.codebuild.resource.project_logging_enabled
  for_each: aws.codebuild.batch_get_projects
  conditions:
    var: item.logsConfig
    op: exists
    value: null
- rule_id: aws.codebuild.user.codebuild_controlled_buildspec_configured
  for_each: aws.codebuild.batch_get_projects
  conditions:
    var: item.source.buildspec
    op: exists
    value: null

