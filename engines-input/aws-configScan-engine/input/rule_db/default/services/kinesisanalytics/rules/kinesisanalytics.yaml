version: '1.0'
provider: aws
service: kinesisanalytics
services:
  client: kinesisanalytics
  module: boto3.client
discovery:
- discovery_id: aws.kinesisanalytics.list_applications
  calls:
  - action: list_applications
    save_as: response
  emit:
    items_for: '{{ response.ApplicationSummaries }}'
    as: item
    item:
      ApplicationName: '{{ item.ApplicationName }}'
      ApplicationARN: '{{ item.ApplicationARN }}'
      ApplicationStatus: '{{ item.ApplicationStatus }}'
- discovery_id: aws.kinesisanalytics.describe_application
  for_each: aws.kinesisanalytics.list_applications
  calls:
  - action: describe_application
    params:
      ApplicationName: '{{ item.ApplicationName }}'
    save_as: response
  emit:
    item:
      ApplicationName: '{{ response.ApplicationDetail.ApplicationName }}'
      ApplicationDescription: '{{ response.ApplicationDetail.ApplicationDescription }}'
      ApplicationARN: '{{ response.ApplicationDetail.ApplicationARN }}'
      ApplicationStatus: '{{ response.ApplicationDetail.ApplicationStatus }}'
      CreateTimestamp: '{{ response.ApplicationDetail.CreateTimestamp }}'
      LastUpdateTimestamp: '{{ response.ApplicationDetail.LastUpdateTimestamp }}'
      InputDescriptions: '{{ response.ApplicationDetail.InputDescriptions }}'
      OutputDescriptions: '{{ response.ApplicationDetail.OutputDescriptions }}'
      ReferenceDataSourceDescriptions: '{{ response.ApplicationDetail.ReferenceDataSourceDescriptions }}'
      CloudWatchLoggingOptionDescriptions: '{{ response.ApplicationDetail.CloudWatchLoggingOptionDescriptions }}'
      ApplicationCode: '{{ response.ApplicationDetail.ApplicationCode }}'
      ApplicationVersionId: '{{ response.ApplicationDetail.ApplicationVersionId }}'
      ServiceExecutionRole: '{{ response.ApplicationDetail.ServiceExecutionRole }}'
      ApplicationConfigurationDescription: '{{ response.ApplicationDetail.ApplicationConfigurationDescription }}'
checks:
- rule_id: aws.kinesisanalytics.application.role_least_privilege
  for_each: aws.kinesisanalytics.describe_application
  conditions:
    var: item.ServiceExecutionRole
    op: exists
    value: null
- rule_id: aws.kinesisanalytics.application.security_check_checkpoints_and_outputs_encrypted_configured
  for_each: aws.kinesisanalytics.describe_application
  conditions:
    all:
    - var: item.ApplicationConfigurationDescription.ApplicationCodeConfigurationDescription.CodeContentDescription.CodeContentType
      op: equals
      value: ZIPFILE
    - var: item.ApplicationConfigurationDescription.EnvironmentPropertiesDescription.PropertyGroups
      op: exists
      value: null
    - var: item.ApplicationConfigurationDescription.ApplicationSnapshotConfigurationDescription.SnapshotsEnabled
      op: equals
      value: 'true'
    - var: item.ApplicationConfigurationDescription.CheckpointConfigurationDescription.CheckpointingEnabled
      op: equals
      value: 'true'
    - var: item.ApplicationConfigurationDescription.CheckpointConfigurationDescription.CheckpointInterval
      op: greater_than
      value: '60000'
    - var: item.ApplicationConfigurationDescription.CheckpointConfigurationDescription.MinPauseBetweenCheckpoints
      op: greater_than
      value: '5000'
    - var: item.ApplicationConfigurationDescription.OutputDescriptions
      op: exists
      value: null
- rule_id: aws.kinesisanalytics.application.network_private_only_configured
  for_each: aws.kinesisanalytics.describe_application
  conditions:
    all:
    - var: item.ApplicationConfigurationDescription.VpcConfigurationDescriptions
      op: exists
      value: null
