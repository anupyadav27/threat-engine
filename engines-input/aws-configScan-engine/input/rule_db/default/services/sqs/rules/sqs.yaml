version: '1.0'
provider: aws
service: sqs
services:
  client: sqs
  module: boto3.client
discovery:
- discovery_id: aws.sqs.list_queues
  calls:
  - action: list_queues
    save_as: response
  emit:
    items_for: '{{ response.QueueUrls }}'
    as: queue_url
    item:
      QueueUrl: '{{ queue_url }}'
- discovery_id: aws.sqs.get_queue_attributes
  for_each: aws.sqs.list_queues
  calls:
  - action: get_queue_attributes
    params:
      QueueUrl: '{{ item.QueueUrl }}'
    save_as: response
  emit:
    item:
      QueueUrl: '{{ item.QueueUrl }}'
      QueueArn: '{{ response.Attributes.QueueArn }}'
      Policy: '{{ response.Attributes.Policy }}'
      RedrivePolicy: '{{ response.Attributes.RedrivePolicy }}'
      KmsMasterKeyId: '{{ response.Attributes.KmsMasterKeyId }}'
      SqsManagedSseEnabled: '{{ response.Attributes.SqsManagedSseEnabled }}'
checks:
- rule_id: aws.sqs.queue.private_network_only_if_supported
  for_each: aws.sqs.get_queue_attributes
  conditions:
    all:
    - var: item.QueueArn
      op: exists
      value: null
    - var: item.Policy
      op: exists
      value: null
    - var: item.RedrivePolicy
      op: exists
      value: null
- rule_id: aws.sqs.queue.cross_account_send_receive_restricted
  for_each: aws.sqs.get_queue_attributes
  conditions:
    all:
    - var: item.Policy
      op: exists
      value: null
    - var: item.Policy
      op: not_contains
      value: AWS
- rule_id: aws.sqs.queues_not_publicly_accessible.queues_not_publicly_accessible_configured
  for_each: aws.sqs.get_queue_attributes
  conditions:
    var: item.Policy
    op: not_contains
    value: '*'
- rule_id: aws.sqs.queue.encryption_at_rest_enabled
  for_each: aws.sqs.get_queue_attributes
  conditions:
    any:
    - var: item.KmsMasterKeyId
      op: exists
      value: null
    - var: item.SqsManagedSseEnabled
      op: equals
      value: 'true'
- rule_id: aws.sqs.queue.auth_required
  for_each: aws.sqs.get_queue_attributes
  conditions:
    var: item.Policy
    op: exists
    value: null
- rule_id: aws.sqs.resource.queues_server_side_encryption_enabled
  for_each: aws.sqs.get_queue_attributes
  conditions:
    var: item.SqsManagedSseEnabled
    op: equals
    value: 'true'
