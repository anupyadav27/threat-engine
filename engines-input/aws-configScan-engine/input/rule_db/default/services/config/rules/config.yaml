version: '1.0'
provider: aws
service: config
services:
  client: config
  module: boto3.client
discovery:
- discovery_id: aws.config.describe_aggregation_authorizations
  calls:
  - action: describe_aggregation_authorizations
    save_as: response
  emit:
    items_for: '{{ response.AggregationAuthorizations }}'
    as: item
    item:
      AggregationAuthorizationArn: '{{ item.AggregationAuthorizationArn }}'
      AuthorizedAccountId: '{{ item.AuthorizedAccountId }}'
      AuthorizedAwsRegion: '{{ item.AuthorizedAwsRegion }}'
      CreationTime: '{{ item.CreationTime }}'
- discovery_id: aws.config.describe_delivery_channels
  calls:
  - action: describe_delivery_channels
    save_as: response
  emit:
    items_for: '{{ response.DeliveryChannels }}'
    as: item
    item:
      name: '{{ item.name }}'
      s3BucketName: '{{ item.s3BucketName }}'
      s3KeyPrefix: '{{ item.s3KeyPrefix }}'
      s3KmsKeyArn: '{{ item.s3KmsKeyArn }}'
      snsTopicARN: '{{ item.snsTopicARN }}'
      configSnapshotDeliveryProperties: '{{ item.configSnapshotDeliveryProperties }}'
- discovery_id: aws.config.describe_compliance_by_config_rule
  calls:
  - action: describe_compliance_by_config_rule
    save_as: response
  emit:
    items_for: '{{ response.ComplianceByConfigRules }}'
    as: item
    item:
      ConfigRuleName: '{{ item.ConfigRuleName }}'
      Compliance: '{{ item.Compliance }}'
- discovery_id: aws.config.describe_config_rules
  calls:
  - action: describe_config_rules
    save_as: response
  emit:
    items_for: '{{ response.ConfigRules }}'
    as: item
    item:
      ConfigRuleName: '{{ item.ConfigRuleName }}'
      ConfigRuleArn: '{{ item.ConfigRuleArn }}'
      ConfigRuleId: '{{ item.ConfigRuleId }}'
      Description: '{{ item.Description }}'
      Scope: '{{ item.Scope }}'
      Source: '{{ item.Source }}'
      InputParameters: '{{ item.InputParameters }}'
      MaximumExecutionFrequency: '{{ item.MaximumExecutionFrequency }}'
      ConfigRuleState: '{{ item.ConfigRuleState }}'
      CreatedBy: '{{ item.CreatedBy }}'
      EvaluationModes: '{{ item.EvaluationModes }}'
- discovery_id: aws.config.describe_configuration_aggregators
  calls:
  - action: describe_configuration_aggregators
    save_as: response
  emit:
    items_for: '{{ response.ConfigurationAggregators }}'
    as: item
    item:
      ConfigurationAggregatorName: '{{ item.ConfigurationAggregatorName }}'
      ConfigurationAggregatorArn: '{{ item.ConfigurationAggregatorArn }}'
      AccountAggregationSources: '{{ item.AccountAggregationSources }}'
      OrganizationAggregationSource: '{{ item.OrganizationAggregationSource }}'
      CreationTime: '{{ item.CreationTime }}'
      LastUpdatedTime: '{{ item.LastUpdatedTime }}'
      CreatedBy: '{{ item.CreatedBy }}'
      AggregatorFilters: '{{ item.AggregatorFilters }}'
- discovery_id: aws.config.describe_configuration_recorder_status
  calls:
  - action: describe_configuration_recorder_status
    save_as: response
  emit:
    items_for: '{{ response.ConfigurationRecordersStatus }}'
    as: item
    item:
      arn: '{{ item.arn }}'
      name: '{{ item.name }}'
      lastStartTime: '{{ item.lastStartTime }}'
      lastStopTime: '{{ item.lastStopTime }}'
      recording: '{{ item.recording }}'
      lastStatus: '{{ item.lastStatus }}'
      lastErrorCode: '{{ item.lastErrorCode }}'
      lastErrorMessage: '{{ item.lastErrorMessage }}'
      lastStatusChangeTime: '{{ item.lastStatusChangeTime }}'
      servicePrincipal: '{{ item.servicePrincipal }}'
- discovery_id: aws.config.describe_configuration_recorders
  calls:
  - action: describe_configuration_recorders
    save_as: response
  emit:
    items_for: '{{ response.ConfigurationRecorders }}'
    as: item
    item:
      arn: '{{ item.arn }}'
      name: '{{ item.name }}'
      roleARN: '{{ item.roleARN }}'
      recordingGroup: '{{ item.recordingGroup }}'
      recordingMode: '{{ item.recordingMode }}'
      recordingScope: '{{ item.recordingScope }}'
      servicePrincipal: '{{ item.servicePrincipal }}'
- discovery_id: aws.config.describe_remediation_configurations
  for_each: aws.config.describe_config_rules
  calls:
  - action: describe_remediation_configurations
    save_as: response
    params:
      ConfigRuleNames:
        - '{{ item.ConfigRuleName }}'
  emit:
    items_for: '{{ response.RemediationConfigurations }}'
    as: item
    item:
      ConfigRuleName: '{{ item.ConfigRuleName }}'
      TargetType: '{{ item.TargetType }}'
      TargetId: '{{ item.TargetId }}'
      TargetVersion: '{{ item.TargetVersion }}'
      Parameters: '{{ item.Parameters }}'
      ResourceType: '{{ item.ResourceType }}'
      Automatic: '{{ item.Automatic }}'
      ExecutionControls: '{{ item.ExecutionControls }}'
      MaximumAutomaticAttempts: '{{ item.MaximumAutomaticAttempts }}'
      RetryAttemptSeconds: '{{ item.RetryAttemptSeconds }}'
      Arn: '{{ item.Arn }}'
      CreatedByService: '{{ item.CreatedByService }}'
checks:
- rule_id: aws.config.aggregation_authorization.certificate_not_expired_or_revoked_valid
  for_each: aws.config.describe_aggregation_authorizations
  conditions:
    all:
    - var: item.AggregationAuthorizationArn
      op: exists
      value: null
    - var: item.AuthorizedAccountId
      op: exists
      value: null
    - var: item.AuthorizedAwsRegion
      op: exists
      value: null
- rule_id: aws.config.aggregation_authorization.config_target_accounts_correct_configured
  for_each: aws.config.describe_aggregation_authorizations
  conditions:
    all:
    - var: item.AggregationAuthorizationArn
      op: exists
      value: null
    - var: item.AuthorizedAccountId
      op: exists
      value: null
    - var: item.AuthorizedAwsRegion
      op: exists
      value: null
- rule_id: aws.config.aggregation_authorization.config_trusts_least_privilege
  for_each: aws.config.describe_aggregation_authorizations
  conditions:
    all:
    - var: item.AggregationAuthorizationArn
      op: exists
      value: null
    - var: item.AuthorizedAccountId
      op: exists
      value: null
    - var: item.AuthorizedAwsRegion
      op: exists
      value: null
- rule_id: aws.config.configrule.alerts_configured
  for_each: aws.config.describe_delivery_channels
  conditions:
    var: item.snsTopicARN
    op: exists
    value: null
- rule_id: aws.config.configrule.config_rule_critical_resources_drift_detection_enabled
  for_each: aws.config.describe_config_rules
  conditions:
    all:
    - var: item.ConfigRuleName
      op: equals
      value: CriticalResourcesDriftDetection
    - var: item.ConfigRuleState
      op: equals
      value: ACTIVE
- rule_id: aws.config.configrule.config_rule_evidence_export_configured
  for_each: aws.config.describe_delivery_channels
  conditions:
    all:
    - var: item.s3BucketName
      op: exists
      value: null
    - var: item.s3KeyPrefix
      op: exists
      value: null
- rule_id: aws.config.configrule.config_rule_reporting_dashboards_enabled
  for_each: aws.config.describe_config_rules
  conditions:
    all:
    - var: item.ConfigRuleName
      op: exists
      value: null
    - var: item.Description
      op: exists
      value: null
- rule_id: aws.config.configrule.config_rule_required_rules_present
  for_each: aws.config.describe_config_rules
  conditions:
    all:
    - var: item.ConfigRuleName
      op: exists
      value: null
    - var: item.ConfigRuleState
      op: equals
      value: ACTIVE
- rule_id: aws.config.configrule.remediation_rule_remediation_targets_bound_configured
  for_each: aws.config.describe_remediation_configurations
  conditions:
    all:
    - var: item.ConfigRuleName
      op: exists
      value: null
    - var: item.TargetId
      op: exists
      value: null
- rule_id: aws.config.configrule.rule_config_rules_enabled
  for_each: aws.config.describe_config_rules
  conditions:
    var: item.ConfigRuleState
    op: equals
    value: ACTIVE
- rule_id: aws.config.configuration_aggregator.configuration_auto_enroll_new_accounts_configured
  for_each: aws.config.describe_configuration_aggregators
  conditions:
    all:
    - var: item.AccountAggregationSources
      op: exists
      value: null
    - var: item.OrganizationAggregationSource
      op: exists
      value: null
- rule_id: aws.config.configuration_aggregator.configuration_org_aggregator_enabled
  for_each: aws.config.describe_configuration_aggregators
  conditions:
    var: item.OrganizationAggregationSource
    op: exists
    value: null
- rule_id: aws.config.configuration_aggregator.configuration_present_and_valid
  for_each: aws.config.describe_configuration_aggregators
  conditions:
    all:
    - var: item.ConfigurationAggregatorName
      op: exists
      value: null
    - var: item.ConfigurationAggregatorArn
      op: exists
      value: null
    - var: item.AccountAggregationSources
      op: exists
      value: null
    - var: item.OrganizationAggregationSource
      op: exists
      value: null
- rule_id: aws.config.configuration_recorder.configuration_config_recorder_enabled
  for_each: aws.config.describe_configuration_recorder_status
  conditions:
    var: item.recording
    op: equals
    value: 'true'
- rule_id: aws.config.configuration_recorder.configuration_global_resource_types_tracked_configured
  for_each: aws.config.describe_configuration_recorders
  conditions:
    var: item.recordingGroup
    op: exists
    value: null
- rule_id: aws.config.configuration_recorder.configuration_secure_destination_configured
  for_each: aws.config.describe_delivery_channels
  conditions:
    all:
    - var: item.s3BucketName
      op: exists
      value: null
    - var: item.s3KmsKeyArn
      op: exists
      value: null
- rule_id: aws.config.deliverychannel.destination_access_least_privilege
  for_each: aws.config.describe_delivery_channels
  conditions:
    all:
    - var: item.s3BucketName
      op: exists
      value: null
    - var: item.snsTopicARN
      op: exists
      value: null
- rule_id: aws.config.deliverychannel.kms_encryption_enabled
  for_each: aws.config.describe_delivery_channels
  conditions:
    var: item.s3KmsKeyArn
    op: exists
    value: null
- rule_id: aws.config.recorder.config_all_regions_enabled
  for_each: aws.config.describe_configuration_recorders
  conditions:
    all:
    - var: item.recordingGroup.allSupported
      op: equals
      value: 'true'
    - var: item.recordingGroup.includeGlobalResourceTypes
      op: equals
      value: 'true'
- rule_id: aws.config.remediation_configuration.auto_remediation_enabled_for_high
  for_each: aws.config.describe_remediation_configurations
  conditions:
    var: item.Automatic
    op: equals
    value: 'true'
- rule_id: aws.config.remediation_configuration.manual_runbooks_enabled
  for_each: aws.config.describe_remediation_configurations
  conditions:
    var: item.ExecutionControls
    op: exists
    value: null
- rule_id: aws.config.resource.config_lambda_config_recording_enabled
  for_each: aws.config.describe_configuration_recorder_status
  conditions:
    var: item.recording
    op: equals
    value: 'true'
- rule_id: aws.config.resource.config_recorder_all_regions_enabled
  for_each: aws.config.describe_configuration_recorder_status
  conditions:
    var: item.recording
    op: equals
    value: 'true'
