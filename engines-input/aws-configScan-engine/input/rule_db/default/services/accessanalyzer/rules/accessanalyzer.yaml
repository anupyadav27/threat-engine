version: '1.0'
provider: aws
service: accessanalyzer
services:
  client: accessanalyzer
  module: boto3.client
discovery:
- discovery_id: aws.accessanalyzer.get_access_preview
  for_each: aws.accessanalyzer.list_access_previews
  calls:
  - action: get_access_preview
    params:
      accessPreviewId: '{{ item.id }}'
      analyzerArn: '{{ item.analyzerArn }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.accessPreview }}'
    item:
      id: '{{ item.id }}'
      analyzerArn: '{{ item.analyzerArn }}'
      configurations: '{{ item.configurations }}'
      createdAt: '{{ item.createdAt }}'
      status: '{{ item.status }}'
      statusReason: '{{ item.statusReason }}'
- discovery_id: aws.accessanalyzer.get_finding
  for_each: aws.accessanalyzer.list_findings
  calls:
  - action: get_finding
    params:
      analyzerArn: '{{ item.analyzerArn }}'
      id: '{{ item.id }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.finding }}'
    item:
      id: '{{ item.id }}'
      principal: '{{ item.principal }}'
      action: '{{ item.action }}'
      resource: '{{ item.resource }}'
      isPublic: '{{ item.isPublic }}'
      resourceType: '{{ item.resourceType }}'
      condition: '{{ item.condition }}'
      createdAt: '{{ item.createdAt }}'
      analyzedAt: '{{ item.analyzedAt }}'
      updatedAt: '{{ item.updatedAt }}'
      status: '{{ item.status }}'
      resourceOwnerAccount: '{{ item.resourceOwnerAccount }}'
      error: '{{ item.error }}'
      sources: '{{ item.sources }}'
      resourceControlPolicyRestriction: '{{ item.resourceControlPolicyRestriction
        }}'
- discovery_id: aws.accessanalyzer.get_generated_policy
  for_each: aws.accessanalyzer.list_policy_generations
  calls:
  - action: get_generated_policy
    params:
      jobId: '{{ item.jobId }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.jobDetails }}'
    item:
      jobId: '{{ item.jobId }}'
      status: '{{ item.status }}'
      startedOn: '{{ item.startedOn }}'
      completedOn: '{{ item.completedOn }}'
      jobError: '{{ item.jobError }}'
- discovery_id: aws.accessanalyzer.list_analyzers
  calls:
  - action: list_analyzers
    save_as: response
  emit:
    as: item
    items_for: '{{ response.analyzers }}'
    item:
      arn: '{{ item.arn }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      createdAt: '{{ item.createdAt }}'
      lastResourceAnalyzed: '{{ item.lastResourceAnalyzed }}'
      lastResourceAnalyzedAt: '{{ item.lastResourceAnalyzedAt }}'
      tags: '{{ item.tags }}'
      status: '{{ item.status }}'
      statusReason: '{{ item.statusReason }}'
      configuration: '{{ item.configuration }}'
- discovery_id: aws.accessanalyzer.get_analyzer
  for_each: aws.accessanalyzer.list_analyzers
  calls:
  - action: get_analyzer
    params:
      analyzerName: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.analyzer }}'
    item:
      arn: '{{ item.arn }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      createdAt: '{{ item.createdAt }}'
      lastResourceAnalyzed: '{{ item.lastResourceAnalyzed }}'
      lastResourceAnalyzedAt: '{{ item.lastResourceAnalyzedAt }}'
      tags: '{{ item.tags }}'
      status: '{{ item.status }}'
      statusReason: '{{ item.statusReason }}'
      configuration: '{{ item.configuration }}'
- discovery_id: aws.accessanalyzer.list_findings
  for_each: aws.accessanalyzer.list_analyzers
  calls:
  - action: list_findings
    params:
      analyzerArn: '{{ item.arn }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.findings }}'
    item:
      id: '{{ item.id }}'
      principal: '{{ item.principal }}'
      action: '{{ item.action }}'
      resource: '{{ item.resource }}'
      isPublic: '{{ item.isPublic }}'
      resourceType: '{{ item.resourceType }}'
      condition: '{{ item.condition }}'
      createdAt: '{{ item.createdAt }}'
      analyzedAt: '{{ item.analyzedAt }}'
      updatedAt: '{{ item.updatedAt }}'
      status: '{{ item.status }}'
      resourceOwnerAccount: '{{ item.resourceOwnerAccount }}'
      error: '{{ item.error }}'
      sources: '{{ item.sources }}'
      resourceControlPolicyRestriction: '{{ item.resourceControlPolicyRestriction
        }}'
      analyzerArn: '{{ item.arn }}'
- discovery_id: aws.accessanalyzer.list_findings_v2
  for_each: aws.accessanalyzer.list_analyzers
  calls:
  - action: list_findings_v2
    params:
      analyzerArn: '{{ item.arn }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.findings }}'
    item:
      analyzedAt: '{{ item.analyzedAt }}'
      createdAt: '{{ item.createdAt }}'
      error: '{{ item.error }}'
      id: '{{ item.id }}'
      resource: '{{ item.resource }}'
      resourceType: '{{ item.resourceType }}'
      resourceOwnerAccount: '{{ item.resourceOwnerAccount }}'
      status: '{{ item.status }}'
      updatedAt: '{{ item.updatedAt }}'
      findingType: '{{ item.findingType }}'
      analyzerArn: '{{ item.arn }}'
- discovery_id: aws.accessanalyzer.list_policy_generations
  calls:
  - action: list_policy_generations
    save_as: response
  emit:
    as: item
    items_for: '{{ response.policyGenerations }}'
    item:
      jobId: '{{ item.jobId }}'
      principalArn: '{{ item.principalArn }}'
      status: '{{ item.status }}'
      startedOn: '{{ item.startedOn }}'
      completedOn: '{{ item.completedOn }}'
- discovery_id: aws.accessanalyzer.list_access_previews
  for_each: aws.accessanalyzer.list_analyzers
  calls:
  - action: list_access_previews
    params:
      analyzerArn: '{{ item.arn }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.accessPreviews }}'
    item:
      id: '{{ item.id }}'
      analyzerArn: '{{ item.analyzerArn }}'
      createdAt: '{{ item.createdAt }}'
      status: '{{ item.status }}'
      statusReason: '{{ item.statusReason }}'
- discovery_id: aws.accessanalyzer.list_access_preview_findings
  for_each: aws.accessanalyzer.list_access_previews
  calls:
  - action: list_access_preview_findings
    params:
      accessPreviewId: '{{ item.id }}'
      analyzerArn: '{{ item.analyzerArn }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.findings }}'
    item:
      id: '{{ item.id }}'
      existingFindingId: '{{ item.existingFindingId }}'
      existingFindingStatus: '{{ item.existingFindingStatus }}'
      principal: '{{ item.principal }}'
      action: '{{ item.action }}'
      condition: '{{ item.condition }}'
      resource: '{{ item.resource }}'
      isPublic: '{{ item.isPublic }}'
      resourceType: '{{ item.resourceType }}'
      createdAt: '{{ item.createdAt }}'
      changeType: '{{ item.changeType }}'
      status: '{{ item.status }}'
      resourceOwnerAccount: '{{ item.resourceOwnerAccount }}'
      error: '{{ item.error }}'
      sources: '{{ item.sources }}'
      resourceControlPolicyRestriction: '{{ item.resourceControlPolicyRestriction
        }}'
      accessPreviewId: '{{ item.id }}'
      analyzerArn: '{{ item.analyzerArn }}'
- discovery_id: aws.accessanalyzer.get_analyzed_resource
  for_each: aws.accessanalyzer.list_findings
  calls:
  - action: get_analyzed_resource
    params:
      analyzerArn: '{{ item.analyzerArn }}'
      resourceArn: '{{ item.resource }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.resource }}'
    item:
      resourceArn: '{{ item.resourceArn }}'
      resourceType: '{{ item.resourceType }}'
      createdAt: '{{ item.createdAt }}'
      analyzedAt: '{{ item.analyzedAt }}'
      updatedAt: '{{ item.updatedAt }}'
      isPublic: '{{ item.isPublic }}'
      actions: '{{ item.actions }}'
      sharedVia: '{{ item.sharedVia }}'
      status: '{{ item.status }}'
      resourceOwnerAccount: '{{ item.resourceOwnerAccount }}'
      error: '{{ item.error }}'
checks:
- rule_id: aws.accessanalyzer.resource.access_analyzer_enabled
  for_each: aws.accessanalyzer.list_analyzers
  conditions:
    var: item.status
    op: equals
    value: ACTIVE
- rule_id: aws.accessanalyzer.resource.access_analyzer_enabled_without_findings
  for_each: aws.accessanalyzer.list_analyzers
  conditions:
    all:
    - var: item.status
      op: equals
      value: ACTIVE
    - var: item.statusReason
      op: not_exists
      value: null
  # Note: This check verifies analyzer is ACTIVE with no statusReason (errors).
  # To fully verify "no findings", the engine would need to check that
  # list_access_preview_findings returns empty for each analyzer.
  # Current implementation uses statusReason as a proxy indicator.
