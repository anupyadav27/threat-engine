version: '1.0'
provider: aws
service: opensearch
services:
  client: opensearch
  module: boto3.client
discovery:
- discovery_id: aws.opensearch.describe_packages
  calls:
  - action: describe_packages
    save_as: response
  emit:
    item:
      PackageID: '{{ response.PackageDetailsList.PackageID }}'
      PackageName: '{{ response.PackageDetailsList.PackageName }}'
      PackageType: '{{ response.PackageDetailsList.PackageType }}'
      PackageDescription: '{{ response.PackageDetailsList.PackageDescription }}'
      PackageStatus: '{{ response.PackageDetailsList.PackageStatus }}'
      CreatedAt: '{{ response.PackageDetailsList.CreatedAt }}'
      LastUpdatedAt: '{{ response.PackageDetailsList.LastUpdatedAt }}'
      AvailablePackageVersion: '{{ response.PackageDetailsList.AvailablePackageVersion
        }}'
      ErrorDetails: '{{ response.PackageDetailsList.ErrorDetails }}'
      EngineVersion: '{{ response.PackageDetailsList.EngineVersion }}'
      AvailablePluginProperties: '{{ response.PackageDetailsList.AvailablePluginProperties
        }}'
      AvailablePackageConfiguration: '{{ response.PackageDetailsList.AvailablePackageConfiguration
        }}'
      AllowListedUserList: '{{ response.PackageDetailsList.AllowListedUserList }}'
      PackageOwner: '{{ response.PackageDetailsList.PackageOwner }}'
      PackageVendingOptions: '{{ response.PackageDetailsList.PackageVendingOptions
        }}'
      PackageEncryptionOptions: '{{ response.PackageDetailsList.PackageEncryptionOptions
        }}'
- discovery_id: aws.opensearch.list_domain_names
  calls:
  - action: list_domain_names
    save_as: response
  emit:
    items_for: '{{ response.DomainNames }}'
    as: item
    item:
      DomainName: '{{ item.DomainName }}'
- discovery_id: aws.opensearch.describe_domain
  for_each: aws.opensearch.list_domain_names
  calls:
  - action: describe_domain
    params:
      DomainName: '{{ item.DomainName }}'
    save_as: response
  emit:
    item:
      DomainId: '{{ response.DomainStatus.DomainId }}'
      DomainName: '{{ response.DomainStatus.DomainName }}'
      ARN: '{{ response.DomainStatus.ARN }}'
      Created: '{{ response.DomainStatus.Created }}'
      Deleted: '{{ response.DomainStatus.Deleted }}'
      Endpoint: '{{ response.DomainStatus.Endpoint }}'
      EndpointV2: '{{ response.DomainStatus.EndpointV2 }}'
      Endpoints: '{{ response.DomainStatus.Endpoints }}'
      DomainEndpointV2HostedZoneId: '{{ response.DomainStatus.DomainEndpointV2HostedZoneId
        }}'
      Processing: '{{ response.DomainStatus.Processing }}'
      UpgradeProcessing: '{{ response.DomainStatus.UpgradeProcessing }}'
      EngineVersion: '{{ response.DomainStatus.EngineVersion }}'
      ClusterConfig: '{{ response.DomainStatus.ClusterConfig }}'
      EBSOptions: '{{ response.DomainStatus.EBSOptions }}'
      AccessPolicies: '{{ response.DomainStatus.AccessPolicies }}'
      IPAddressType: '{{ response.DomainStatus.IPAddressType }}'
      SnapshotOptions: '{{ response.DomainStatus.SnapshotOptions }}'
      VPCOptions: '{{ response.DomainStatus.VPCOptions }}'
      CognitoOptions: '{{ response.DomainStatus.CognitoOptions }}'
      EncryptionAtRestOptions: '{{ response.DomainStatus.EncryptionAtRestOptions }}'
      NodeToNodeEncryptionOptions: '{{ response.DomainStatus.NodeToNodeEncryptionOptions
        }}'
      EndpointOptions: '{{ response.DomainStatus.EndpointOptions }}'
      LogPublishingOptions: '{{ response.DomainStatus.LogPublishingOptions }}'
      AdvancedSecurityOptions: '{{ response.DomainStatus.AdvancedSecurityOptions }}'
- discovery_id: aws.opensearch.describe_reserved_instances
  calls:
  - action: describe_reserved_instances
    save_as: response
  emit:
    items_for: '{{ response.ReservedInstances }}'
    as: item
    item:
      ReservationName: '{{ item.ReservationName }}'
      ReservedInstanceId: '{{ item.ReservedInstanceId }}'
      BillingSubscriptionId: '{{ item.BillingSubscriptionId }}'
      ReservedInstanceOfferingId: '{{ item.ReservedInstanceOfferingId }}'
      InstanceType: '{{ item.InstanceType }}'
      StartTime: '{{ item.StartTime }}'
      Duration: '{{ item.Duration }}'
      FixedPrice: '{{ item.FixedPrice }}'
      UsagePrice: '{{ item.UsagePrice }}'
      CurrencyCode: '{{ item.CurrencyCode }}'
      InstanceCount: '{{ item.InstanceCount }}'
      State: '{{ item.State }}'
      PaymentOption: '{{ item.PaymentOption }}'
      RecurringCharges: '{{ item.RecurringCharges }}'
checks:
- rule_id: aws.opensearch.service.domains_encryption_at_rest_enabled
  for_each: aws.opensearch.describe_domain
  conditions:
    var: item.EncryptionAtRestOptions.Enabled
    op: equals
    value: true
- rule_id: aws.opensearch.service.opensearch_domains_https_communications_enforced
  for_each: aws.opensearch.describe_domain
  conditions:
    var: item.EndpointOptions.EnforceHTTPS
    op: equals
    value: true
- rule_id: aws.opensearch.service.domains_node_to_node_encryption_enabled
  for_each: aws.opensearch.describe_domain
  conditions:
    var: item.NodeToNodeEncryptionOptions.Enabled
    op: equals
    value: true
- rule_id: aws.opensearch.service.domains_not_publicly_accessible_configured
  for_each: aws.opensearch.describe_domain
  conditions:
    var: item.AccessPolicies
    op: exists
    value: null
- rule_id: aws.opensearch.service.domains_fault_tolerant_data_nodes_configured
  for_each: aws.opensearch.describe_domain
  conditions:
    all:
    - var: item.ClusterConfig.InstanceCount
      op: greater_than
      value: 3
    - var: item.ClusterConfig.ZoneAwarenessEnabled
      op: equals
      value: true
- rule_id: aws.opensearch.service.domains_audit_logging_enabled
  for_each: aws.opensearch.describe_domain
  conditions:
    var: item.LogPublishingOptions.AUDIT_LOGS.Enabled
    op: equals
    value: true
- rule_id: aws.opensearch.service.domains_access_control_enabled
  for_each: aws.opensearch.describe_domain
  conditions:
    all:
    - var: item.AccessPolicies
      op: exists
      value: null
    - var: item.NodeToNodeEncryptionOptions.Enabled
      op: equals
      value: true
    - var: item.EncryptionAtRestOptions.Enabled
      op: equals
      value: true
- rule_id: aws.opensearch.service.domains_cloudwatch_logging_enabled
  for_each: aws.opensearch.describe_domain
  conditions:
    all:
    - var: item.LogPublishingOptions.ES_APPLICATION_LOGS.Enabled
      op: equals
      value: true
    - var: item.LogPublishingOptions.SEARCH_SLOW_LOGS.Enabled
      op: equals
      value: true
    - var: item.LogPublishingOptions.INDEX_SLOW_LOGS.Enabled
      op: equals
      value: true
    - var: item.LogPublishingOptions.AUDIT_LOGS.Enabled
      op: equals
      value: true
- rule_id: aws.opensearch.service.domains_internal_user_database_enabled
  for_each: aws.opensearch.describe_domain
  conditions:
    var: item.AdvancedSecurityOptions.InternalUserDatabaseEnabled
    op: equals
    value: true
- rule_id: aws.opensearch.service.domains_fault_tolerant_master_nodes_configured
  for_each: aws.opensearch.describe_domain
  conditions:
    all:
    - var: item.ClusterConfig.DedicatedMasterEnabled
      op: equals
      value: true
    - var: item.ClusterConfig.ZoneAwarenessEnabled
      op: equals
      value: true
    - var: item.ClusterConfig.DedicatedMasterType
      op: exists
      value: null
    - var: item.ClusterConfig.DedicatedMasterCount
      op: greater_than
      value: 3

# ✅ Tested and verified against actual AWS resources
