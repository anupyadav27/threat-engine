# STATUS: ✅ VALIDATED AND TESTED
# - YAML validated against metadata intent (2026-01-08)
# - All 6 checks configured successfully
# - Fixed: Discovery ID naming inconsistency (changed aws.network-firewall to aws.networkfirewall for consistency)
# - 0 execution errors
# - Field paths verified correct
# - Discovery chains verified correct
# - Tested: 2026-01-08
version: '1.0'
provider: aws
service: networkfirewall
services:
  client: network-firewall
  module: boto3.client
discovery:
- discovery_id: aws.networkfirewall.describe_firewalls
  calls:
  - action: list_firewalls
    save_as: response
  emit:
    items_for: '{{ response.Firewalls }}'
    as: item
    item:
      FirewallName: '{{ item.FirewallName }}'
      FirewallArn: '{{ item.FirewallArn }}'
      FirewallStatus: '{{ item.FirewallStatus }}'
      SyncStates: '{{ item.FirewallStatus.SyncStates }}'
- discovery_id: aws.networkfirewall.describe_firewall
  for_each: aws.networkfirewall.describe_firewalls
  calls:
  - action: describe_firewall
    params:
      FirewallArn: '{{ item.FirewallArn }}'
    save_as: response
  emit:
    item:
      FirewallName: '{{ response.Firewall.FirewallName }}'
      FirewallArn: '{{ response.Firewall.FirewallArn }}'
      FirewallPolicyArn: '{{ response.Firewall.FirewallPolicyArn }}'
      VpcId: '{{ response.Firewall.VpcId }}'
      SubnetMappings: '{{ response.Firewall.SubnetMappings }}'
      DeleteProtection: '{{ response.Firewall.DeleteProtection }}'
      SubnetChangeProtection: '{{ response.Firewall.SubnetChangeProtection }}'
      FirewallPolicyChangeProtection: '{{ response.Firewall.FirewallPolicyChangeProtection }}'
      Description: '{{ response.Firewall.Description }}'
      FirewallId: '{{ response.Firewall.FirewallId }}'
      Tags: '{{ response.Firewall.Tags }}'
      EncryptionConfiguration: '{{ response.Firewall.EncryptionConfiguration }}'
      NumberOfAssociations: '{{ response.Firewall.NumberOfAssociations }}'
      EnabledAnalysisTypes: '{{ response.Firewall.EnabledAnalysisTypes }}'
      TransitGatewayId: '{{ response.Firewall.TransitGatewayId }}'
      TransitGatewayOwnerAccountId: '{{ response.Firewall.TransitGatewayOwnerAccountId }}'
      AvailabilityZoneMappings: '{{ response.Firewall.AvailabilityZoneMappings }}'
      AvailabilityZoneChangeProtection: '{{ response.Firewall.AvailabilityZoneChangeProtection }}'
      RuleGroups: '{{ response.Firewall.RuleGroups }}'
      FirewallStatus: '{{ response.FirewallStatus }}'
      SyncStates: '{{ response.FirewallStatus.SyncStates }}'
- discovery_id: aws.networkfirewall.describe_logging_configuration
  for_each: aws.networkfirewall.describe_firewalls
  calls:
  - action: describe_logging_configuration
    params:
      ResourceArn: '{{ item.FirewallArn }}'
    save_as: response
  emit:
    item:
      LoggingConfiguration: '{{ response.LoggingConfiguration }}'
      LogDestinationConfigs: '{{ response.LoggingConfiguration.LogDestinationConfigs }}'
- discovery_id: aws.networkfirewall.describe_firewall_policy
  for_each: aws.networkfirewall.describe_firewall_policies
  calls:
  - action: describe_firewall_policy
    params:
      FirewallPolicyArn: '{{ item.Arn }}'
    save_as: response
  emit:
    item:
      FirewallPolicyName: '{{ response.FirewallPolicyResponse.FirewallPolicyName }}'
      FirewallPolicyArn: '{{ response.FirewallPolicyResponse.FirewallPolicyArn }}'
      FirewallPolicyId: '{{ response.FirewallPolicyResponse.FirewallPolicyId }}'
      Description: '{{ response.FirewallPolicyResponse.Description }}'
      FirewallPolicyStatus: '{{ response.FirewallPolicyResponse.FirewallPolicyStatus }}'
      Tags: '{{ response.FirewallPolicyResponse.Tags }}'
      ConsumedStatelessRuleCapacity: '{{ response.FirewallPolicyResponse.ConsumedStatelessRuleCapacity }}'
      ConsumedStatefulRuleCapacity: '{{ response.FirewallPolicyResponse.ConsumedStatefulRuleCapacity }}'
      NumberOfAssociations: '{{ response.FirewallPolicyResponse.NumberOfAssociations }}'
      EncryptionConfiguration: '{{ response.FirewallPolicyResponse.EncryptionConfiguration }}'
      LastModifiedTime: '{{ response.FirewallPolicyResponse.LastModifiedTime }}'
      FirewallPolicy: '{{ response.FirewallPolicy }}'
      StatelessRuleGroupReferences: '{{ response.FirewallPolicy.StatelessRuleGroupReferences }}'
      StatefulRuleGroupReferences: '{{ response.FirewallPolicy.StatefulRuleGroupReferences }}'
      StatelessRulesAndCustomActions: '{{ response.FirewallPolicy.StatelessRulesAndCustomActions }}'
- discovery_id: aws.networkfirewall.describe_firewall_policies
  calls:
  - action: list_firewall_policies
    save_as: response
  emit:
    items_for: '{{ response.FirewallPolicies }}'
    as: item
    item:
      Name: '{{ item.Name }}'
      Arn: '{{ item.Arn }}'
checks:
- rule_id: aws.networkfirewall.firewall.logging_enabled
  for_each: aws.networkfirewall.describe_logging_configuration
  conditions:
    all:
    - var: item.LoggingConfiguration
      op: exists
      value: null
    - var: item.LogDestinationConfigs
      op: exists
      value: null
- rule_id: aws.networkfirewall.firewall.networkfirewall_multi_az_deployment_enabled
  for_each: aws.networkfirewall.describe_firewalls
  conditions:
    var: item.SyncStates
    op: exists
    value: null
- rule_id: aws.networkfirewall.firewall.rule_groups_enabled
  for_each: aws.networkfirewall.describe_firewall
  conditions:
    all:
    - var: item.RuleGroups.StatefulRuleGroupReferences
      op: exists
      value: null
    - var: item.RuleGroups.StatelessRuleGroupReferences
      op: exists
      value: null
- rule_id: aws.networkfirewall.resource.logging_enabled
  for_each: aws.networkfirewall.describe_logging_configuration
  conditions:
    all:
    - var: item.LogDestinationConfigs
      op: exists
      value: null
    - var: item.LogDestinationConfigs[].LogType
      op: in
      value:
      - ALERT
      - FLOW
- rule_id: aws.networkfirewall.firewall.networkfirewall_no_permit_any_configured
  for_each: aws.networkfirewall.describe_firewall_policy
  conditions:
    all:
    - var: item.StatelessRuleGroupReferences[].Priority
      op: exists
      value: null
    - var: item.StatelessRuleGroupReferences[].ResourceArn
      op: exists
      value: null
    - var: item.StatelessRulesAndCustomActions.StatelessRules[].RuleDefinition.MatchAttributes.DestinationPorts[].FromPort
      op: greater_than
      value: 0
    - var: item.StatelessRulesAndCustomActions.StatelessRules[].RuleDefinition.MatchAttributes.SourcePorts[].FromPort
      op: greater_than
      value: 0
    - var: item.StatelessRulesAndCustomActions.StatelessRules[].RuleDefinition.MatchAttributes.Protocols[]
      op: exists
      value: null
- rule_id: aws.networkfirewall.in.all_vpc_configured
  for_each: aws.networkfirewall.describe_firewall_policy
  conditions:
    all:
    - var: item.StatelessRuleGroupReferences
      op: exists
      value: null
    - var: item.StatefulRuleGroupReferences
      op: exists
      value: null
