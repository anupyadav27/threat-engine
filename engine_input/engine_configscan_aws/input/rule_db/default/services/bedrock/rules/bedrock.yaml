version: '1.0'
provider: aws
service: bedrock
services:
  client: bedrock
  module: boto3.client
discovery:
- discovery_id: aws.bedrock.list_custom_models
  calls:
  - action: list_custom_models
    save_as: response
  emit:
    items_for: '{{ response.modelSummaries }}'
    as: item
    item:
      modelArn: '{{ item.modelArn }}'
      modelName: '{{ item.modelName }}'
      baseModelArn: '{{ item.baseModelArn }}'
      baseModelName: '{{ item.baseModelName }}'
      customizationType: '{{ item.customizationType }}'
      modelStatus: '{{ item.modelStatus }}'
      creationTime: '{{ item.creationTime }}'
- discovery_id: aws.bedrock.get_custom_model
  for_each: aws.bedrock.list_custom_models
  calls:
  - action: get_custom_model
    params:
      modelIdentifier: '{{ item.modelArn }}'
    save_as: response
  emit:
    item:
      modelArn: '{{ response.modelArn }}'
      modelName: '{{ response.modelName }}'
      modelKmsKeyArn: '{{ response.modelKmsKeyArn }}'
      validationLoss: '{{ response.validationMetrics.validationLoss }}'
- discovery_id: aws.bedrock.get_model_invocation_logging_configuration
  calls:
  - action: get_model_invocation_logging_configuration
    save_as: response
  emit:
    item:
      loggingConfig: '{{ response.loggingConfig }}'
      cloudWatchConfig: '{{ response.loggingConfig.cloudWatchConfig }}'
      s3Config: '{{ response.loggingConfig.s3Config }}'
      textDataDeliveryEnabled: '{{ response.loggingConfig.textDataDeliveryEnabled
        }}'
      imageDataDeliveryEnabled: '{{ response.loggingConfig.imageDataDeliveryEnabled
        }}'
      embeddingDataDeliveryEnabled: '{{ response.loggingConfig.embeddingDataDeliveryEnabled
        }}'
      videoDataDeliveryEnabled: '{{ response.loggingConfig.videoDataDeliveryEnabled
        }}'
- discovery_id: aws.bedrock.list_enforced_guardrails_configuration
  calls:
  - action: list_enforced_guardrails_configuration
    save_as: response
    on_error: continue
  emit:
    items_for: '{{ response.guardrailsConfig }}'
    as: item
    item:
      configId: '{{ item.configId }}'
      guardrailArn: '{{ item.guardrailArn }}'
      guardrailId: '{{ item.guardrailId }}'
      inputTags: '{{ item.inputTags }}'
      guardrailVersion: '{{ item.guardrailVersion }}'
      createdAt: '{{ item.createdAt }}'
      createdBy: '{{ item.createdBy }}'
      updatedAt: '{{ item.updatedAt }}'
      updatedBy: '{{ item.updatedBy }}'
      owner: '{{ item.owner }}'
- discovery_id: aws.bedrock.list_model_invocation_jobs
  calls:
  - action: list_model_invocation_jobs
    save_as: response
  emit:
    items_for: '{{ response.invocationJobSummaries }}'
    as: item
    item:
      jobArn: '{{ item.jobArn }}'
      jobName: '{{ item.jobName }}'
      modelId: '{{ item.modelId }}'
      clientRequestToken: '{{ item.clientRequestToken }}'
      roleArn: '{{ item.roleArn }}'
      status: '{{ item.status }}'
      message: '{{ item.message }}'
      submitTime: '{{ item.submitTime }}'
      lastModifiedTime: '{{ item.lastModifiedTime }}'
      endTime: '{{ item.endTime }}'
      inputDataConfig: '{{ item.inputDataConfig }}'
      outputDataConfig: '{{ item.outputDataConfig }}'
      vpcConfig: '{{ item.vpcConfig }}'
      timeoutDurationInHours: '{{ item.timeoutDurationInHours }}'
      jobExpirationTime: '{{ item.jobExpirationTime }}'
