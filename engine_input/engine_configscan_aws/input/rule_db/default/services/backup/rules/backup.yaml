      BackupPlanId: '{{ item.BackupPlanId }}'
      CreationDate: '{{ item.CreationDate }}'
      DeletionDate: '{{ item.DeletionDate }}'
      VersionId: '{{ item.VersionId }}'
      BackupPlanName: '{{ item.BackupPlanName }}'
      CreatorRequestId: '{{ item.CreatorRequestId }}'
      LastExecutionDate: '{{ item.LastExecutionDate }}'
      AdvancedBackupSettings: '{{ item.AdvancedBackupSettings }}'
