version: '1.0'
provider: aws
service: dms
services:
  client: dms
  module: boto3.client
discovery:
- discovery_id: aws.dms.describe_replication_instances
  calls:
  - action: describe_replication_instances
    save_as: response
  emit:
    items_for: '{{ response.ReplicationInstances }}'
    as: item
    item:
      ReplicationInstanceIdentifier: '{{ item.ReplicationInstanceIdentifier }}'
      ReplicationInstanceClass: '{{ item.ReplicationInstanceClass }}'
      ReplicationInstanceStatus: '{{ item.ReplicationInstanceStatus }}'
      AllocatedStorage: '{{ item.AllocatedStorage }}'
      InstanceCreateTime: '{{ item.InstanceCreateTime }}'
      VpcSecurityGroups: '{{ item.VpcSecurityGroups }}'
      AvailabilityZone: '{{ item.AvailabilityZone }}'
      ReplicationSubnetGroup: '{{ item.ReplicationSubnetGroup }}'
      PreferredMaintenanceWindow: '{{ item.PreferredMaintenanceWindow }}'
      PendingModifiedValues: '{{ item.PendingModifiedValues }}'
      MultiAZ: '{{ item.MultiAZ }}'
      EngineVersion: '{{ item.EngineVersion }}'
      AutoMinorVersionUpgrade: '{{ item.AutoMinorVersionUpgrade }}'
      KmsKeyId: '{{ item.KmsKeyId }}'
      ReplicationInstanceArn: '{{ item.ReplicationInstanceArn }}'
      ReplicationInstancePublicIpAddress: '{{ item.ReplicationInstancePublicIpAddress
        }}'
      ReplicationInstancePrivateIpAddress: '{{ item.ReplicationInstancePrivateIpAddress
        }}'
      ReplicationInstancePublicIpAddresses: '{{ item.ReplicationInstancePublicIpAddresses
        }}'
      ReplicationInstancePrivateIpAddresses: '{{ item.ReplicationInstancePrivateIpAddresses
        }}'
      ReplicationInstanceIpv6Addresses: '{{ item.ReplicationInstanceIpv6Addresses
        }}'
- discovery_id: aws.dms.describe_instance_profiles
  calls:
  - action: describe_instance_profiles
    save_as: response
  emit:
    items_for: '{{ response.InstanceProfiles }}'
    as: item
    item:
      InstanceProfileArn: '{{ item.InstanceProfileArn }}'
      AvailabilityZone: '{{ item.AvailabilityZone }}'
      KmsKeyArn: '{{ item.KmsKeyArn }}'
      PubliclyAccessible: '{{ item.PubliclyAccessible }}'
      NetworkType: '{{ item.NetworkType }}'
      InstanceProfileName: '{{ item.InstanceProfileName }}'
      Description: '{{ item.Description }}'
      InstanceProfileCreationTime: '{{ item.InstanceProfileCreationTime }}'
      SubnetGroupIdentifier: '{{ item.SubnetGroupIdentifier }}'
      VpcSecurityGroups: '{{ item.VpcSecurityGroups }}'
- discovery_id: aws.dms.describe_endpoint_types
  calls:
  - action: describe_endpoint_types
    save_as: response
  emit:
    items_for: '{{ response.SupportedEndpointTypes }}'
    as: item
    item:
      EngineName: '{{ item.EngineName }}'
      SupportsCDC: '{{ item.SupportsCDC }}'
      EndpointType: '{{ item.EndpointType }}'
      ReplicationInstanceEngineMinimumVersion: '{{ item.ReplicationInstanceEngineMinimumVersion
        }}'
      EngineDisplayName: '{{ item.EngineDisplayName }}'
- discovery_id: aws.dms.describe_replication_tasks
  calls:
  - action: describe_replication_tasks
    save_as: response
  emit:
    items_for: '{{ response.ReplicationTasks }}'
    as: item
    item:
      ReplicationTaskIdentifier: '{{ item.ReplicationTaskIdentifier }}'
      SourceEndpointArn: '{{ item.SourceEndpointArn }}'
      TargetEndpointArn: '{{ item.TargetEndpointArn }}'
      ReplicationInstanceArn: '{{ item.ReplicationInstanceArn }}'
      MigrationType: '{{ item.MigrationType }}'
      TableMappings: '{{ item.TableMappings }}'
      ReplicationTaskSettings: '{{ item.ReplicationTaskSettings }}'
      Status: '{{ item.Status }}'
      LastFailureMessage: '{{ item.LastFailureMessage }}'
      StopReason: '{{ item.StopReason }}'
      ReplicationTaskCreationDate: '{{ item.ReplicationTaskCreationDate }}'
      ReplicationTaskStartDate: '{{ item.ReplicationTaskStartDate }}'
      CdcStartPosition: '{{ item.CdcStartPosition }}'
      CdcStopPosition: '{{ item.CdcStopPosition }}'
      RecoveryCheckpoint: '{{ item.RecoveryCheckpoint }}'
      ReplicationTaskArn: '{{ item.ReplicationTaskArn }}'
      ReplicationTaskStats: '{{ item.ReplicationTaskStats }}'
      TaskData: '{{ item.TaskData }}'
      TargetReplicationInstanceArn: '{{ item.TargetReplicationInstanceArn }}'
