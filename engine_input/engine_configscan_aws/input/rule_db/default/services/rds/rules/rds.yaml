version: '1.0'
provider: aws
service: rds
services:
  client: rds
  module: boto3.client
discovery:
- discovery_id: aws.rds.describe_db_security_groups
  calls:
  - action: describe_db_security_groups
    save_as: response
  emit:
    items_for: '{{ response.DBSecurityGroups }}'
    as: item
    item:
      DBSecurityGroupName: '{{ item.DBSecurityGroupName }}'
      DBSecurityGroupDescription: '{{ item.DBSecurityGroupDescription }}'
      OwnerId: '{{ item.OwnerId }}'
      DBSecurityGroupArn: '{{ item.DBSecurityGroupArn }}'
      EC2SecurityGroups: '{{ item.EC2SecurityGroups }}'
      IPRanges: '{{ item.IPRanges }}'
      VpcId: '{{ item.VpcId }}'
- discovery_id: aws.rds.describe_d_b_cluster_automated_backups
  calls:
  - action: describe_db_cluster_automated_backups
    save_as: response
  emit:
    items_for: '{{ response.DBClusterAutomatedBackups }}'
    as: item
    item:
      Engine: '{{ item.Engine }}'
      VpcId: '{{ item.VpcId }}'
      DBClusterAutomatedBackupsArn: '{{ item.DBClusterAutomatedBackupsArn }}'
      DBClusterIdentifier: '{{ item.DBClusterIdentifier }}'
      RestoreWindow: '{{ item.RestoreWindow }}'
      MasterUsername: '{{ item.MasterUsername }}'
      DbClusterResourceId: '{{ item.DbClusterResourceId }}'
      Region: '{{ item.Region }}'
      LicenseModel: '{{ item.LicenseModel }}'
      Status: '{{ item.Status }}'
      IAMDatabaseAuthenticationEnabled: '{{ item.IAMDatabaseAuthenticationEnabled
        }}'
      ClusterCreateTime: '{{ item.ClusterCreateTime }}'
      StorageEncrypted: '{{ item.StorageEncrypted }}'
      AllocatedStorage: '{{ item.AllocatedStorage }}'
      EngineVersion: '{{ item.EngineVersion }}'
      DBClusterArn: '{{ item.DBClusterArn }}'
      BackupRetentionPeriod: '{{ item.BackupRetentionPeriod }}'
      EngineMode: '{{ item.EngineMode }}'
      AvailabilityZones: '{{ item.AvailabilityZones }}'
      Port: '{{ item.Port }}'
- discovery_id: aws.rds.describe_d_b_clusters
  calls:
  - action: describe_db_clusters
    save_as: response
  emit:
    items_for: '{{ response.DBClusters }}'
    as: item
    item:
      AllocatedStorage: '{{ item.AllocatedStorage }}'
      AvailabilityZones: '{{ item.AvailabilityZones }}'
      BackupRetentionPeriod: '{{ item.BackupRetentionPeriod }}'
      CharacterSetName: '{{ item.CharacterSetName }}'
      DatabaseName: '{{ item.DatabaseName }}'
      DBClusterIdentifier: '{{ item.DBClusterIdentifier }}'
      DBClusterParameterGroup: '{{ item.DBClusterParameterGroup }}'
      DBSubnetGroup: '{{ item.DBSubnetGroup }}'
      Status: '{{ item.Status }}'
      PercentProgress: '{{ item.PercentProgress }}'
      EarliestRestorableTime: '{{ item.EarliestRestorableTime }}'
      Endpoint: '{{ item.Endpoint }}'
      ReaderEndpoint: '{{ item.ReaderEndpoint }}'
      CustomEndpoints: '{{ item.CustomEndpoints }}'
      MultiAZ: '{{ item.MultiAZ }}'
      Engine: '{{ item.Engine }}'
      EngineVersion: '{{ item.EngineVersion }}'
      LatestRestorableTime: '{{ item.LatestRestorableTime }}'
      Port: '{{ item.Port }}'
      MasterUsername: '{{ item.MasterUsername }}'
- discovery_id: aws.rds.describe_option_groups
  calls:
  - action: describe_option_groups
    save_as: response
  emit:
    items_for: '{{ response.OptionGroupsList }}'
    as: item
    item:
      OptionGroupName: '{{ item.OptionGroupName }}'
      OptionGroupDescription: '{{ item.OptionGroupDescription }}'
      EngineName: '{{ item.EngineName }}'
      MajorEngineVersion: '{{ item.MajorEngineVersion }}'
      Options: '{{ item.Options }}'
      AllowsVpcAndNonVpcInstanceMemberships: '{{ item.AllowsVpcAndNonVpcInstanceMemberships
        }}'
      VpcId: '{{ item.VpcId }}'
      OptionGroupArn: '{{ item.OptionGroupArn }}'
      SourceOptionGroup: '{{ item.SourceOptionGroup }}'
      SourceAccountId: '{{ item.SourceAccountId }}'
      CopyTimestamp: '{{ item.CopyTimestamp }}'
- discovery_id: aws.rds.describe_d_b_parameter_groups
  calls:
  - action: describe_db_parameter_groups
    save_as: response
  emit:
    items_for: '{{ response.DBParameterGroups }}'
    as: item
    item:
      DBParameterGroupName: '{{ item.DBParameterGroupName }}'
      DBParameterGroupFamily: '{{ item.DBParameterGroupFamily }}'
      Description: '{{ item.Description }}'
      DBParameterGroupArn: '{{ item.DBParameterGroupArn }}'
- discovery_id: aws.rds.describe_d_b_instances
  calls:
  - action: describe_db_instances
    save_as: response
  emit:
    items_for: '{{ response.DBInstances }}'
    as: item
    item:
      DBInstanceIdentifier: '{{ item.DBInstanceIdentifier }}'
      DBInstanceClass: '{{ item.DBInstanceClass }}'
      Engine: '{{ item.Engine }}'
      DBInstanceStatus: '{{ item.DBInstanceStatus }}'
      MasterUsername: '{{ item.MasterUsername }}'
      DBName: '{{ item.DBName }}'
      Endpoint: '{{ item.Endpoint }}'
      AllocatedStorage: '{{ item.AllocatedStorage }}'
      InstanceCreateTime: '{{ item.InstanceCreateTime }}'
      PreferredBackupWindow: '{{ item.PreferredBackupWindow }}'
      BackupRetentionPeriod: '{{ item.BackupRetentionPeriod }}'
      DBSecurityGroups: '{{ item.DBSecurityGroups }}'
      VpcSecurityGroups: '{{ item.VpcSecurityGroups }}'
      DBParameterGroups: '{{ item.DBParameterGroups }}'
      AvailabilityZone: '{{ item.AvailabilityZone }}'
      DBSubnetGroup: '{{ item.DBSubnetGroup }}'
      PreferredMaintenanceWindow: '{{ item.PreferredMaintenanceWindow }}'
      UpgradeRolloutOrder: '{{ item.UpgradeRolloutOrder }}'
      PendingModifiedValues: '{{ item.PendingModifiedValues }}'
      LatestRestorableTime: '{{ item.LatestRestorableTime }}'
- discovery_id: aws.rds.describe_d_b_instance_automated_backups
  calls:
  - action: describe_db_instance_automated_backups
    save_as: response
  emit:
    items_for: '{{ response.DBInstanceAutomatedBackups }}'
    as: item
    item:
      DBInstanceArn: '{{ item.DBInstanceArn }}'
      DbiResourceId: '{{ item.DbiResourceId }}'
      Region: '{{ item.Region }}'
      DBInstanceIdentifier: '{{ item.DBInstanceIdentifier }}'
      RestoreWindow: '{{ item.RestoreWindow }}'
      AllocatedStorage: '{{ item.AllocatedStorage }}'
      Status: '{{ item.Status }}'
      Port: '{{ item.Port }}'
      AvailabilityZone: '{{ item.AvailabilityZone }}'
      VpcId: '{{ item.VpcId }}'
      InstanceCreateTime: '{{ item.InstanceCreateTime }}'
      MasterUsername: '{{ item.MasterUsername }}'
      Engine: '{{ item.Engine }}'
      EngineVersion: '{{ item.EngineVersion }}'
      LicenseModel: '{{ item.LicenseModel }}'
      Iops: '{{ item.Iops }}'
      StorageThroughput: '{{ item.StorageThroughput }}'
      OptionGroupName: '{{ item.OptionGroupName }}'
      TdeCredentialArn: '{{ item.TdeCredentialArn }}'
      Encrypted: '{{ item.Encrypted }}'
- discovery_id: aws.rds.describe_d_b_snapshots
  calls:
  - action: describe_db_snapshots
    save_as: response
  emit:
    items_for: '{{ response.DBSnapshots }}'
    as: item
    item:
      DBSnapshotIdentifier: '{{ item.DBSnapshotIdentifier }}'
      DBInstanceIdentifier: '{{ item.DBInstanceIdentifier }}'
      SnapshotCreateTime: '{{ item.SnapshotCreateTime }}'
      Engine: '{{ item.Engine }}'
      AllocatedStorage: '{{ item.AllocatedStorage }}'
      Status: '{{ item.Status }}'
      Port: '{{ item.Port }}'
      AvailabilityZone: '{{ item.AvailabilityZone }}'
      VpcId: '{{ item.VpcId }}'
      InstanceCreateTime: '{{ item.InstanceCreateTime }}'
      MasterUsername: '{{ item.MasterUsername }}'
      EngineVersion: '{{ item.EngineVersion }}'
      LicenseModel: '{{ item.LicenseModel }}'
      SnapshotType: '{{ item.SnapshotType }}'
      Iops: '{{ item.Iops }}'
      StorageThroughput: '{{ item.StorageThroughput }}'
      OptionGroupName: '{{ item.OptionGroupName }}'
      PercentProgress: '{{ item.PercentProgress }}'
      SourceRegion: '{{ item.SourceRegion }}'
      SourceDBSnapshotIdentifier: '{{ item.SourceDBSnapshotIdentifier }}'
- discovery_id: aws.rds.describe_reserved_d_b_instances
  calls:
  - action: describe_reserved_db_instances
    save_as: response
  emit:
    items_for: '{{ response.ReservedDBInstances }}'
    as: item
    item:
      ReservedDBInstanceId: '{{ item.ReservedDBInstanceId }}'
      ReservedDBInstancesOfferingId: '{{ item.ReservedDBInstancesOfferingId }}'
      DBInstanceClass: '{{ item.DBInstanceClass }}'
      StartTime: '{{ item.StartTime }}'
      Duration: '{{ item.Duration }}'
      FixedPrice: '{{ item.FixedPrice }}'
      UsagePrice: '{{ item.UsagePrice }}'
      CurrencyCode: '{{ item.CurrencyCode }}'
      DBInstanceCount: '{{ item.DBInstanceCount }}'
      ProductDescription: '{{ item.ProductDescription }}'
      OfferingType: '{{ item.OfferingType }}'
      MultiAZ: '{{ item.MultiAZ }}'
      State: '{{ item.State }}'
      RecurringCharges: '{{ item.RecurringCharges }}'
      ReservedDBInstanceArn: '{{ item.ReservedDBInstanceArn }}'
      LeaseId: '{{ item.LeaseId }}'
- discovery_id: aws.rds.describe_option_group_options
  calls:
  - action: describe_db_snapshot_tenant_databases
    save_as: response
  emit:
    items_for: '{{ response.DBSnapshotTenantDatabases }}'
    as: item
    item:
      DBSnapshotIdentifier: '{{ item.DBSnapshotIdentifier }}'
      DBInstanceIdentifier: '{{ item.DBInstanceIdentifier }}'
      DbiResourceId: '{{ item.DbiResourceId }}'
      EngineName: '{{ item.EngineName }}'
      SnapshotType: '{{ item.SnapshotType }}'
      TenantDatabaseCreateTime: '{{ item.TenantDatabaseCreateTime }}'
      TenantDBName: '{{ item.TenantDBName }}'
      MasterUsername: '{{ item.MasterUsername }}'
      TenantDatabaseResourceId: '{{ item.TenantDatabaseResourceId }}'
      CharacterSetName: '{{ item.CharacterSetName }}'
      DBSnapshotTenantDatabaseARN: '{{ item.DBSnapshotTenantDatabaseARN }}'
      NcharCharacterSetName: '{{ item.NcharCharacterSetName }}'
      TagList: '{{ item.TagList }}'
- discovery_id: aws.rds.describe_db_cluster_snapshots
  calls:
  - action: describe_db_cluster_snapshots
    save_as: response
  emit:
    items_for: '{{ response.DBClusterSnapshots }}'
    as: item
    item:
      DBClusterSnapshots: '{{ item }}'
- discovery_id: aws.rds.describe_d_b_cluster_parameters
  for_each: aws.rds.describe_d_b_clusters
  calls:
  - action: describe_db_cluster_parameters
    params:
      DBClusterParameterGroupName: '{{ item.DBClusterParameterGroup }}'
    save_as: response
  emit:
    items_for: '{{ response.Parameters }}'
    as: item
    item:
      ParameterName: '{{ item.ParameterName }}'
      ParameterValue: '{{ item.ParameterValue }}'
      Description: '{{ item.Description }}'
      Source: '{{ item.Source }}'
      ApplyType: '{{ item.ApplyType }}'
      DataType: '{{ item.DataType }}'
      AllowedValues: '{{ item.AllowedValues }}'
      IsModifiable: '{{ item.IsModifiable }}'
      MinimumEngineVersion: '{{ item.MinimumEngineVersion }}'
      ApplyMethod: '{{ item.ApplyMethod }}'
      SupportedEngineModes: '{{ item.SupportedEngineModes }}'
- discovery_id: aws.rds.describe_blue_green_deployments
  calls:
  - action: describe_blue_green_deployments
    save_as: response
  emit:
    item:
      BlueGreenDeploymentIdentifier: '{{ response.BlueGreenDeployments.BlueGreenDeploymentIdentifier
        }}'
      BlueGreenDeploymentName: '{{ response.BlueGreenDeployments.BlueGreenDeploymentName
        }}'
      Source: '{{ response.BlueGreenDeployments.Source }}'
      Target: '{{ response.BlueGreenDeployments.Target }}'
      SwitchoverDetails: '{{ response.BlueGreenDeployments.SwitchoverDetails }}'
      Tasks: '{{ response.BlueGreenDeployments.Tasks }}'
      Status: '{{ response.BlueGreenDeployments.Status }}'
      StatusDetails: '{{ response.BlueGreenDeployments.StatusDetails }}'
      CreateTime: '{{ response.BlueGreenDeployments.CreateTime }}'
      DeleteTime: '{{ response.BlueGreenDeployments.DeleteTime }}'
      TagList: '{{ response.BlueGreenDeployments.TagList }}'
