version: '1.0'
provider: aws
service: ssm
services:
  client: ssm
  module: boto3.client
discovery:
- discovery_id: aws.ssm.describe_patch_groups
  calls:
  - action: describe_patch_groups
    save_as: response
  emit:
    items_for: '{{ response.Mappings }}'
    as: item
    item:
      PatchGroup: '{{ item.PatchGroup }}'
      BaselineIdentity: '{{ item.BaselineIdentity }}'
- discovery_id: aws.ssm.describe_patch_baselines
  calls:
  - action: describe_patch_baselines
    save_as: response
  emit:
    items_for: '{{ response.BaselineIdentities }}'
    as: item
    item:
      BaselineId: '{{ item.BaselineId }}'
      BaselineName: '{{ item.BaselineName }}'
      OperatingSystem: '{{ item.OperatingSystem }}'
      BaselineDescription: '{{ item.BaselineDescription }}'
      DefaultBaseline: '{{ item.DefaultBaseline }}'
- discovery_id: aws.ssm.describe_maintenance_windows
  calls:
  - action: describe_maintenance_windows
    save_as: response
  emit:
    items_for: '{{ response.WindowIdentities }}'
    as: item
    item:
      WindowId: '{{ item.WindowId }}'
      Name: '{{ item.Name }}'
      Description: '{{ item.Description }}'
      Enabled: '{{ item.Enabled }}'
      Duration: '{{ item.Duration }}'
      Cutoff: '{{ item.Cutoff }}'
      Schedule: '{{ item.Schedule }}'
      ScheduleTimezone: '{{ item.ScheduleTimezone }}'
      ScheduleOffset: '{{ item.ScheduleOffset }}'
      EndDate: '{{ item.EndDate }}'
      StartDate: '{{ item.StartDate }}'
      NextExecutionTime: '{{ item.NextExecutionTime }}'
- discovery_id: aws.ssm.describe_maintenance_window_schedule
  for_each: aws.ssm.describe_maintenance_windows
  calls:
  - action: describe_maintenance_window_schedule
    params:
      WindowId: '{{ item.WindowId }}'
    save_as: response
    on_error: continue
  emit:
    items_for: '{{ response.ScheduledWindowExecutions }}'
    as: item
    item:
      WindowId: '{{ item.WindowId }}'
      Name: '{{ item.Name }}'
      ExecutionTime: '{{ item.ExecutionTime }}'
- discovery_id: aws.ssm.list_resource_compliance_summaries
  calls:
  - action: list_compliance_items
    save_as: response
  emit:
    items_for: '{{ response.ComplianceItems }}'
    as: item
    item:
      ComplianceType: '{{ item.ComplianceType }}'
      ResourceType: '{{ item.ResourceType }}'
      ResourceId: '{{ item.ResourceId }}'
      Id: '{{ item.Id }}'
      Title: '{{ item.Title }}'
      Status: '{{ item.Status }}'
      Severity: '{{ item.Severity }}'
      ExecutionSummary: '{{ item.ExecutionSummary }}'
      Details: '{{ item.Details }}'
- discovery_id: aws.ssm.list_commands
  calls:
  - action: describe_automation_executions
    save_as: response
  emit:
    items_for: '{{ response.AutomationExecutionMetadataList }}'
    as: item
    item:
      AutomationExecutionId: '{{ item.AutomationExecutionId }}'
      DocumentName: '{{ item.DocumentName }}'
      DocumentVersion: '{{ item.DocumentVersion }}'
      AutomationExecutionStatus: '{{ item.AutomationExecutionStatus }}'
      ExecutionStartTime: '{{ item.ExecutionStartTime }}'
      ExecutionEndTime: '{{ item.ExecutionEndTime }}'
      ExecutedBy: '{{ item.ExecutedBy }}'
      LogFile: '{{ item.LogFile }}'
      Outputs: '{{ item.Outputs }}'
      Mode: '{{ item.Mode }}'
      ParentAutomationExecutionId: '{{ item.ParentAutomationExecutionId }}'
      CurrentStepName: '{{ item.CurrentStepName }}'
      CurrentAction: '{{ item.CurrentAction }}'
      FailureMessage: '{{ item.FailureMessage }}'
      TargetParameterName: '{{ item.TargetParameterName }}'
      Targets: '{{ item.Targets }}'
      TargetMaps: '{{ item.TargetMaps }}'
      ResolvedTargets: '{{ item.ResolvedTargets }}'
      MaxConcurrency: '{{ item.MaxConcurrency }}'
      MaxErrors: '{{ item.MaxErrors }}'
- discovery_id: aws.ssm.list_nodes
  calls:
  - action: list_documents
    save_as: response
  emit:
    items_for: '{{ response.DocumentIdentifiers }}'
    as: item
    item:
      Name: '{{ item.Name }}'
      CreatedDate: '{{ item.CreatedDate }}'
      DisplayName: '{{ item.DisplayName }}'
      Owner: '{{ item.Owner }}'
      VersionName: '{{ item.VersionName }}'
      PlatformTypes: '{{ item.PlatformTypes }}'
      DocumentVersion: '{{ item.DocumentVersion }}'
      DocumentType: '{{ item.DocumentType }}'
      SchemaVersion: '{{ item.SchemaVersion }}'
      DocumentFormat: '{{ item.DocumentFormat }}'
      TargetType: '{{ item.TargetType }}'
      Tags: '{{ item.Tags }}'
      Requires: '{{ item.Requires }}'
      ReviewStatus: '{{ item.ReviewStatus }}'
      Author: '{{ item.Author }}'
- discovery_id: aws.ssm.describe_automation_executions
  calls:
  - action: describe_automation_executions
    save_as: response
  emit:
    items_for: '{{ response.AutomationExecutionMetadataList }}'
    as: item
    item:
      AutomationExecutionId: '{{ item.AutomationExecutionId }}'
      DocumentName: '{{ item.DocumentName }}'
      DocumentVersion: '{{ item.DocumentVersion }}'
      AutomationExecutionStatus: '{{ item.AutomationExecutionStatus }}'
      ExecutionStartTime: '{{ item.ExecutionStartTime }}'
      ExecutionEndTime: '{{ item.ExecutionEndTime }}'
      ExecutedBy: '{{ item.ExecutedBy }}'
      LogFile: '{{ item.LogFile }}'
      Outputs: '{{ item.Outputs }}'
      Mode: '{{ item.Mode }}'
      ParentAutomationExecutionId: '{{ item.ParentAutomationExecutionId }}'
      CurrentStepName: '{{ item.CurrentStepName }}'
      CurrentAction: '{{ item.CurrentAction }}'
      FailureMessage: '{{ item.FailureMessage }}'
      TargetParameterName: '{{ item.TargetParameterName }}'
      Targets: '{{ item.Targets }}'
      TargetMaps: '{{ item.TargetMaps }}'
      ResolvedTargets: '{{ item.ResolvedTargets }}'
      MaxConcurrency: '{{ item.MaxConcurrency }}'
      MaxErrors: '{{ item.MaxErrors }}'
- discovery_id: aws.ssm.list_documents
  calls:
  - action: list_documents
    save_as: response
  emit:
    items_for: '{{ response.DocumentIdentifiers }}'
    as: item
    item:
      Name: '{{ item.Name }}'
      CreatedDate: '{{ item.CreatedDate }}'
      DisplayName: '{{ item.DisplayName }}'
      Owner: '{{ item.Owner }}'
      VersionName: '{{ item.VersionName }}'
      PlatformTypes: '{{ item.PlatformTypes }}'
      DocumentVersion: '{{ item.DocumentVersion }}'
      DocumentType: '{{ item.DocumentType }}'
      SchemaVersion: '{{ item.SchemaVersion }}'
      DocumentFormat: '{{ item.DocumentFormat }}'
      TargetType: '{{ item.TargetType }}'
      Tags: '{{ item.Tags }}'
      Requires: '{{ item.Requires }}'
      ReviewStatus: '{{ item.ReviewStatus }}'
      Author: '{{ item.Author }}'
- discovery_id: aws.ssm.list_associations
  calls:
  - action: list_associations
    save_as: response
  emit:
    items_for: '{{ response.Associations }}'
    as: item
    item:
      Name: '{{ item.Name }}'
      InstanceId: '{{ item.InstanceId }}'
      AssociationId: '{{ item.AssociationId }}'
      AssociationVersion: '{{ item.AssociationVersion }}'
      DocumentVersion: '{{ item.DocumentVersion }}'
      Targets: '{{ item.Targets }}'
      LastExecutionDate: '{{ item.LastExecutionDate }}'
      Overview: '{{ item.Overview }}'
      ScheduleExpression: '{{ item.ScheduleExpression }}'
      AssociationName: '{{ item.AssociationName }}'
- discovery_id: aws.ssm.list_document_versions
  for_each: aws.ssm.list_associations
  calls:
  - action: describe_association
    params:
      AssociationId: '{{ item.AssociationId }}'
      InstanceId: '{{ item.InstanceId }}'
      Name: '{{ item.Name }}'
    save_as: response
    on_error: continue
  emit:
    item:
      Name: '{{ response.AssociationDescription.Name }}'
      InstanceId: '{{ response.AssociationDescription.InstanceId }}'
      AssociationVersion: '{{ response.AssociationDescription.AssociationVersion }}'
      Date: '{{ response.AssociationDescription.Date }}'
      LastUpdateAssociationDate: '{{ response.AssociationDescription.LastUpdateAssociationDate
        }}'
      Status: '{{ response.AssociationDescription.Status }}'
      Overview: '{{ response.AssociationDescription.Overview }}'
      DocumentVersion: '{{ response.AssociationDescription.DocumentVersion }}'
      AutomationTargetParameterName: '{{ response.AssociationDescription.AutomationTargetParameterName
        }}'
      Parameters: '{{ response.AssociationDescription.Parameters }}'
      AssociationId: '{{ response.AssociationDescription.AssociationId }}'
      Targets: '{{ response.AssociationDescription.Targets }}'
      ScheduleExpression: '{{ response.AssociationDescription.ScheduleExpression }}'
      OutputLocation: '{{ response.AssociationDescription.OutputLocation }}'
      LastExecutionDate: '{{ response.AssociationDescription.LastExecutionDate }}'
      LastSuccessfulExecutionDate: '{{ response.AssociationDescription.LastSuccessfulExecutionDate
        }}'
      AssociationName: '{{ response.AssociationDescription.AssociationName }}'
      MaxErrors: '{{ response.AssociationDescription.MaxErrors }}'
      MaxConcurrency: '{{ response.AssociationDescription.MaxConcurrency }}'
      ComplianceSeverity: '{{ response.AssociationDescription.ComplianceSeverity }}'
