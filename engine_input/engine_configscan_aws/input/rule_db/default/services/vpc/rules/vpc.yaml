- discovery_id: aws.ec2.list_volumes_in_recycle_bin
  calls:
  - action: describe_capacity_block_extension_history
    save_as: response
  emit:
    item:
      CapacityReservationId: '{{ response.CapacityBlockExtensions.CapacityReservationId
        }}'
      InstanceType: '{{ response.CapacityBlockExtensions.InstanceType }}'
      InstanceCount: '{{ response.CapacityBlockExtensions.InstanceCount }}'
      AvailabilityZone: '{{ response.CapacityBlockExtensions.AvailabilityZone }}'
      AvailabilityZoneId: '{{ response.CapacityBlockExtensions.AvailabilityZoneId
        }}'
      CapacityBlockExtensionOfferingId: '{{ response.CapacityBlockExtensions.CapacityBlockExtensionOfferingId
        }}'
      CapacityBlockExtensionDurationHours: '{{ response.CapacityBlockExtensions.CapacityBlockExtensionDurationHours
        }}'
      CapacityBlockExtensionStatus: '{{ response.CapacityBlockExtensions.CapacityBlockExtensionStatus
        }}'
      CapacityBlockExtensionPurchaseDate: '{{ response.CapacityBlockExtensions.CapacityBlockExtensionPurchaseDate
        }}'
      CapacityBlockExtensionStartDate: '{{ response.CapacityBlockExtensions.CapacityBlockExtensionStartDate
        }}'
      CapacityBlockExtensionEndDate: '{{ response.CapacityBlockExtensions.CapacityBlockExtensionEndDate
        }}'
