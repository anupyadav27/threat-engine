      Tags: '{{ item.Tags }}'
      BlockPublicAccessStates: '{{ item.BlockPublicAccessStates }}'
      VpcId: '{{ item.VpcId }}'
      State: '{{ item.State }}'
      CidrBlock: '{{ item.CidrBlock }}'
      DhcpOptionsId: '{{ item.DhcpOptionsId }}'
