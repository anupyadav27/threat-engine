apiVersion: v1
kind: ConfigMap
metadata:
  name: s3-mount-config
  namespace: threat-engine-engines
data:
  s3-bucket: "cspm-lgtech"
  s3-region: "ap-south-1"
  # Engine output paths in S3
  aws-output-path: "aws-compliance-engine/output"
  azure-output-path: "azure-compliance-engine/output"
  gcp-output-path: "gcp-compliance-engine/output"
  alicloud-output-path: "alicloud-compliance-engine/output"
  oci-output-path: "oci-compliance-engine/output"
  ibm-output-path: "ibm-compliance-engine/output"
  yaml-builder-output-path: "yaml-rule-builder/output"

