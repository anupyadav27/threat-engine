apiVersion: v1
kind: Service
metadata:
  name: onboarding-api-lb
  namespace: threat-engine-engines
  labels:
    app: onboarding-api
    service-type: loadbalancer
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"  # Network Load Balancer (cheaper)
    # Or use: "external" for Classic Load Balancer
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: onboarding-api
  sessionAffinity: None

