apiVersion: v1
kind: Service
metadata:
  name: yaml-rule-builder-lb
  namespace: threat-engine-engines
  labels:
    app: yaml-rule-builder
    service-type: loadbalancer
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: yaml-rule-builder
  sessionAffinity: None


