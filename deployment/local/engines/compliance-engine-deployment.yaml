apiVersion: apps/v1
kind: Deployment
metadata:
  name: compliance-engine
  namespace: threat-engine-engines
  labels:
    app: compliance-engine
    tier: engine
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # Single-node clusters can't afford a surge pod. Replace in-place.
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: compliance-engine
  template:
    metadata:
      labels:
        app: compliance-engine
        tier: engine
    spec:
      serviceAccountName: aws-compliance-engine-sa  # Reuse existing SA with S3 permissions
      containers:
      - name: compliance-engine
        image: yadavanup84/threat-engine-compliance-engine:latest
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: PYTHONPATH
          value: /app
        - name: LOG_LEVEL
          value: "INFO"
        - name: S3_BUCKET
          valueFrom:
            configMapKeyRef:
              name: s3-mount-config
              key: s3-bucket
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: s3-mount-config
              key: s3-region
        - name: OUTPUT_DIR
          value: "/output"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 30
          timeoutSeconds: 5
          periodSeconds: 10
          failureThreshold: 6
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 10
          timeoutSeconds: 5
          periodSeconds: 5
          failureThreshold: 6
      volumes:
      - name: output-volume
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: compliance-engine
  namespace: threat-engine-engines
  labels:
    app: compliance-engine
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: compliance-engine
---
apiVersion: v1
kind: Service
metadata:
  name: compliance-engine-lb
  namespace: threat-engine-engines
  labels:
    app: compliance-engine
    service-type: loadbalancer
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: compliance-engine
  sessionAffinity: None

