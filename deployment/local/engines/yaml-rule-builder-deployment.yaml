apiVersion: apps/v1
kind: Deployment
metadata:
  name: yaml-rule-builder
  namespace: threat-engine-engines
  labels:
    app: yaml-rule-builder
    tier: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: yaml-rule-builder
  template:
    metadata:
      labels:
        app: yaml-rule-builder
        tier: api
    spec:
      # Reuse existing IRSA-enabled service account with S3 access
      serviceAccountName: aws-compliance-engine-sa
      containers:
      - name: yaml-builder
        image: yadavanup84/threat-engine-yaml-rule-builder:latest
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: PYTHONPATH
          value: /app
        - name: OUTPUT_DIR
          value: "/output"
        volumeMounts:
        - name: output-volume
          mountPath: /output
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
      - name: s3-sync
        image: amazon/aws-cli:latest
        command:
          - /bin/sh
          - -c
          - |
            while true; do
              if [ -d "/output" ] && [ "$(ls -A /output 2>/dev/null)" ]; then
                echo "$(date): Syncing /output to s3://${S3_BUCKET}/${S3_OUTPUT_PATH}/"
                aws s3 sync /output "s3://${S3_BUCKET}/${S3_OUTPUT_PATH}/" \
                  --delete \
                  --exclude "*.tmp" \
                  --exclude "*.lock" \
                  --region "${AWS_REGION:-ap-south-1}" || true
              fi
              sleep 30
            done
        env:
        - name: S3_BUCKET
          valueFrom:
            configMapKeyRef:
              name: s3-mount-config
              key: s3-bucket
        - name: S3_OUTPUT_PATH
          valueFrom:
            configMapKeyRef:
              name: s3-mount-config
              key: yaml-builder-output-path
        - name: AWS_REGION
          value: "ap-south-1"
        volumeMounts:
        - name: output-volume
          mountPath: /output
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
      volumes:
      - name: output-volume
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: yaml-rule-builder
  namespace: threat-engine-engines
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
  selector:
    app: yaml-rule-builder

