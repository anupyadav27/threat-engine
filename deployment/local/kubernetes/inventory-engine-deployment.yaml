apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-engine
  namespace: threat-engine-engines
  labels:
    app: inventory-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-engine
  template:
    metadata:
      labels:
        app: inventory-engine
    spec:
      containers:
      - name: inventory-engine
        image: yadavanup84/inventory-engine:latest
        ports:
        - containerPort: 8000
        env:
        - name: USE_S3
          value: "false"
        - name: INVENTORY_OUTPUT_DIR
          value: "/data"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: database-url
        - name: PORT
          value: "8000"
        - name: LOG_LEVEL
          value: "INFO"
        volumeMounts:
        - name: inventory-output
          mountPath: /data
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: inventory-output
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-engine
  namespace: threat-engine-engines
  labels:
    app: inventory-engine
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: inventory-engine

