apiVersion: apps/v1
kind: Deployment
metadata:
  name: threat-engine
  namespace: threat-engine-engines
  labels:
    app: threat-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: threat-engine
  template:
    metadata:
      labels:
        app: threat-engine
    spec:
      containers:
      - name: threat-engine
        image: yadavanup84/threat-engine:latest
        ports:
        - containerPort: 8000
        env:
        - name: USE_S3
          value: "false"
        - name: SCAN_RESULTS_DIR
          value: "/data"
        - name: PORT
          value: "8000"
        - name: LOG_LEVEL
          value: "INFO"
        volumeMounts:
        - name: scan-results
          mountPath: /data
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: scan-results
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: threat-engine
  namespace: threat-engine-engines
  labels:
    app: threat-engine
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: threat-engine

