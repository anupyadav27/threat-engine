apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: threat-engine-local
data:
  DATABASE_HOST: "postgres-service"
  DATABASE_PORT: "5432"
  DATABASE_USER: "postgres"
  COMPLIANCE_DATABASE_URL: "postgresql://postgres:postgres@postgres-service:5432/compliance_engine"
  ONBOARDING_DATABASE_URL: "postgresql://postgres:postgres@postgres-service:5432/threat_engine"

