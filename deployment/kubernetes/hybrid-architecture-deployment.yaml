apiVersion: v1
kind: Namespace
metadata:
  name: threat-engine-hybrid
  labels:
    app: threat-engine
    architecture: hybrid

---
# ConfigMap for centralized database configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: centralized-db-config
  namespace: threat-engine-hybrid
data:
  # Centralized Database Settings
  USE_CENTRALIZED_DB: "true"
  
  # ConfigScan Database
  CONFIGSCAN_DB_HOST: "postgres-service"
  CONFIGSCAN_DB_PORT: "5432"
  CONFIGSCAN_DB_NAME: "threat_engine_configscan"
  CONFIGSCAN_DB_USER: "configscan_user"
  
  # Compliance Database (when implemented)
  COMPLIANCE_DB_HOST: "postgres-service"
  COMPLIANCE_DB_PORT: "5432" 
  COMPLIANCE_DB_NAME: "threat_engine_compliance"
  COMPLIANCE_DB_USER: "compliance_user"
  
  # Inventory Database (when implemented)
  INVENTORY_DB_HOST: "postgres-service"
  INVENTORY_DB_PORT: "5432"
  INVENTORY_DB_NAME: "threat_engine_inventory"
  INVENTORY_DB_USER: "inventory_user"

---
# Secret for database passwords
apiVersion: v1
kind: Secret
metadata:
  name: centralized-db-secrets
  namespace: threat-engine-hybrid
type: Opaque
stringData:
  CONFIGSCAN_DB_PASSWORD: "configscan_password"
  COMPLIANCE_DB_PASSWORD: "compliance_password"
  INVENTORY_DB_PASSWORD: "inventory_password"
  THREAT_DB_PASSWORD: "threat_password"
  ONBOARDING_DB_PASSWORD: "onboarding_password"

---
# API Gateway Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: threat-engine-hybrid
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        tier: gateway
    spec:
      containers:
      - name: api-gateway
        image: threat-engine/api-gateway:latest
        ports:
        - containerPort: 8000
        env:
        - name: PORT
          value: "8000"
        # Service URLs for hybrid architecture
        - name: CONFIGSCAN_AWS_URL
          value: "http://configscan-aws-service:8001"
        - name: CONFIGSCAN_AZURE_URL
          value: "http://configscan-azure-service:8002"
        - name: CONFIGSCAN_GCP_URL
          value: "http://configscan-gcp-service:8003"
        - name: ONBOARDING_ENGINE_URL
          value: "http://onboarding-service:8010"
        - name: RULE_ENGINE_URL
          value: "http://rule-service:8011"
        envFrom:
        - configMapRef:
            name: centralized-db-config
        - secretRef:
            name: centralized-db-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /gateway/health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /gateway/health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5

---
# ConfigScan AWS Engine Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: configscan-aws
  namespace: threat-engine-hybrid
spec:
  replicas: 1
  selector:
    matchLabels:
      app: configscan-aws
  template:
    metadata:
      labels:
        app: configscan-aws
        tier: engine
        csp: aws
    spec:
      containers:
      - name: configscan-aws
        image: threat-engine/configscan-aws:latest
        ports:
        - containerPort: 8001
        env:
        - name: PORT
          value: "8001"
        envFrom:
        - configMapRef:
            name: centralized-db-config
        - secretRef:
            name: centralized-db-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 10

---
# Onboarding Engine Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: onboarding-engine
  namespace: threat-engine-hybrid
spec:
  replicas: 1
  selector:
    matchLabels:
      app: onboarding-engine
  template:
    metadata:
      labels:
        app: onboarding-engine
        tier: engine
    spec:
      containers:
      - name: onboarding-engine
        image: threat-engine/onboarding:latest
        ports:
        - containerPort: 8010
        env:
        - name: API_PORT
          value: "8010"
        envFrom:
        - configMapRef:
            name: centralized-db-config
        - secretRef:
            name: centralized-db-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"

---
# Services
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
  namespace: threat-engine-hybrid
spec:
  selector:
    app: api-gateway
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  type: LoadBalancer

---
apiVersion: v1
kind: Service
metadata:
  name: configscan-aws-service
  namespace: threat-engine-hybrid
spec:
  selector:
    app: configscan-aws
  ports:
  - name: http
    port: 8001
    targetPort: 8001
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: onboarding-service
  namespace: threat-engine-hybrid
spec:
  selector:
    app: onboarding-engine
  ports:
  - name: http
    port: 8010
    targetPort: 8010
  type: ClusterIP