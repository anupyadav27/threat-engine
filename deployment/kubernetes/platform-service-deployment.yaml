---
# Platform Service Deployment  
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-service
  labels:
    app: platform-service
    tier: platform
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: platform-service
  template:
    metadata:
      labels:
        app: platform-service
        tier: platform
        version: v1
    spec:
      containers:
      - name: platform-service
        image: threat-engine/platform-service:latest
        ports:
        - containerPort: 8003
          name: http
        env:
        # Database configuration
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: url
        # Module configuration  
        - name: INVENTORY_MODULE_ENABLED
          value: "true"
        - name: ONBOARDING_MODULE_ENABLED
          value: "true"
        - name: ADMIN_MODULE_ENABLED
          value: "true"
        # Performance tuning
        - name: MAX_WORKERS
          value: "5"
        - name: CACHE_TTL_SECONDS
          value: "300"
        # Storage configuration
        - name: SCAN_RESULTS_DIR
          value: "/app/engine_output"
        # Logging
        - name: LOG_LEVEL
          value: "INFO"
        - name: ENVIRONMENT
          value: "production"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        volumeMounts:
        - name: scan-results-storage
          mountPath: /app/engine_output
          readOnly: true
        livenessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 45
          periodSeconds: 30
          timeoutSeconds: 10
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        # Security context
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
      volumes:
      - name: scan-results-storage
        persistentVolumeClaim:
          claimName: scan-results-pvc

---
# Platform Service
apiVersion: v1
kind: Service
metadata:
  name: platform-service
  labels:
    app: platform-service
    tier: platform
spec:
  selector:
    app: platform-service
  ports:
  - port: 8003
    targetPort: 8003
    protocol: TCP
    name: http
  type: ClusterIP

---
# Platform Service Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: platform-service-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: platform-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
      - type: Percent
        value: 25
        periodSeconds: 60