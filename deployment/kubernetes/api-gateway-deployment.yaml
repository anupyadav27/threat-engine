---
# API Gateway Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: api-gateway
    tier: gateway
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        tier: gateway
        version: v1
    spec:
      containers:
      - name: api-gateway
        image: threat-engine/api-gateway:latest
        ports:
        - containerPort: 8000
          name: http
        env:
        # Service Discovery URLs
        - name: THREAT_ENGINE_URL
          value: "http://core-engine-service:8001"
        - name: COMPLIANCE_ENGINE_URL
          value: "http://core-engine-service:8001"
        - name: CONFIGSCAN_ENGINE_URL
          value: "http://configscan-service:8002"
        - name: INVENTORY_ENGINE_URL
          value: "http://platform-service:8003"
        - name: ADMIN_ENGINE_URL
          value: "http://platform-service:8003"
        - name: USER_ENGINE_URL
          value: "http://data-secops-service:8004"
        - name: ONBOARDING_ENGINE_URL
          value: "http://platform-service:8003"
        - name: DATASEC_ENGINE_URL
          value: "http://data-secops-service:8004"
        - name: SECOPS_ENGINE_URL
          value: "http://data-secops-service:8004"
        # Logging and monitoring
        - name: LOG_LEVEL
          value: "INFO"
        - name: ENVIRONMENT
          value: "production"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /gateway/health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /gateway/health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        # Security context
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL

---
# API Gateway Service
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  labels:
    app: api-gateway
    tier: gateway
spec:
  selector:
    app: api-gateway
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  type: LoadBalancer
  sessionAffinity: None

---
# API Gateway Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80