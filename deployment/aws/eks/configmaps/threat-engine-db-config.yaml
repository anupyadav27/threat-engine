apiVersion: v1
kind: ConfigMap
metadata:
  name: threat-engine-db-config
  namespace: threat-engine-engines
data:
  # All engines use same RDS host (postgres-vulnerability-db), different databases
  DB_HOST: "postgres-vulnerability-db.cbm92xowvx2t.ap-south-1.rds.amazonaws.com"
  DB_PORT: "5432"
  
  # Check Engine DB (check_results, rule_metadata)
  CHECK_DB_HOST: "postgres-vulnerability-db.cbm92xowvx2t.ap-south-1.rds.amazonaws.com"
  CHECK_DB_PORT: "5432"
  CHECK_DB_NAME: "threat_engine_check"
  CHECK_DB_USER: "postgres"
  
  # Discoveries Engine DB (scans, discoveries, discovery_history)
  DISCOVERIES_DB_HOST: "postgres-vulnerability-db.cbm92xowvx2t.ap-south-1.rds.amazonaws.com"
  DISCOVERIES_DB_PORT: "5432"
  DISCOVERIES_DB_NAME: "threat_engine_discoveries"
  DISCOVERIES_DB_USER: "postgres"
  
  # Compliance DB (compliance outputs, control mappings, analysis views)
  COMPLIANCE_DB_HOST: "postgres-vulnerability-db.cbm92xowvx2t.ap-south-1.rds.amazonaws.com"
  COMPLIANCE_DB_PORT: "5432"
  COMPLIANCE_DB_NAME: "threat_engine_compliance"
  COMPLIANCE_DB_USER: "postgres"
  
  # IAM Engine Database
  IAM_DB_HOST: "postgres-vulnerability-db.cbm92xowvx2t.ap-south-1.rds.amazonaws.com"
  IAM_DB_PORT: "5432"
  IAM_DB_NAME: "threat_engine_iam"
  IAM_DB_USER: "postgres"
  
  # DataSec Engine Database
  DATASEC_DB_HOST: "postgres-vulnerability-db.cbm92xowvx2t.ap-south-1.rds.amazonaws.com"
  DATASEC_DB_PORT: "5432"
  DATASEC_DB_NAME: "threat_engine_datasec"
  DATASEC_DB_USER: "postgres"
  
  # Inventory DB (asset inventory, relationships)
  INVENTORY_DB_HOST: "postgres-vulnerability-db.cbm92xowvx2t.ap-south-1.rds.amazonaws.com"
  INVENTORY_DB_PORT: "5432"
  INVENTORY_DB_NAME: "threat_engine_inventory"
  INVENTORY_DB_USER: "postgres"
  
  # Threat DB (threat intelligence, detections, analysis)
  THREAT_DB_HOST: "postgres-vulnerability-db.cbm92xowvx2t.ap-south-1.rds.amazonaws.com"
  THREAT_DB_PORT: "5432"
  THREAT_DB_NAME: "threat_engine_threat"
  THREAT_DB_USER: "postgres"
  
  # Shared DB (tenants, customers, orchestration, audit)
  SHARED_DB_HOST: "postgres-vulnerability-db.cbm92xowvx2t.ap-south-1.rds.amazonaws.com"
  SHARED_DB_PORT: "5432"
  SHARED_DB_NAME: "threat_engine_shared"
  SHARED_DB_USER: "postgres"
