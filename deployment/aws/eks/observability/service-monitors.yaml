# ServiceMonitors for Prometheus Operator — scrapes /api/v1/metrics from all engines.
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: threat-engine-engines
  namespace: threat-engine-engines
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      component: engine
  namespaceSelector:
    matchNames:
      - threat-engine-engines
  endpoints:
    - port: http
      path: /api/v1/metrics
      interval: 30s
      scrapeTimeout: 10s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: threat-engine-collectors
  namespace: threat-engine-engines
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      component: collector
  namespaceSelector:
    matchNames:
      - threat-engine-engines
  endpoints:
    - port: http
      path: /api/v1/metrics
      interval: 30s
      scrapeTimeout: 10s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: otel-collector-metrics
  namespace: threat-engine-engines
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: otel-collector
  namespaceSelector:
    matchNames:
      - threat-engine-engines
  endpoints:
    - port: prom-exporter
      path: /metrics
      interval: 30s
