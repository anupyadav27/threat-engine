# AlertManager configuration — routes alerts to Slack and PagerDuty.
# Replace placeholder tokens/URLs before deploying.
---
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-threat-engine
  namespace: threat-engine-engines
type: Opaque
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m
      slack_api_url: 'https://hooks.slack.com/services/REPLACE/WITH/WEBHOOK'

    route:
      receiver: default-slack
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 10s
      group_interval: 5m
      repeat_interval: 12h
      routes:
        - receiver: pagerduty-critical
          match:
            severity: critical
          continue: true
        - receiver: slack-warnings
          match:
            severity: warning

    receivers:
      - name: default-slack
        slack_configs:
          - channel: '#threat-engine-alerts'
            send_resolved: true
            title: '{{ .CommonAnnotations.summary }}'
            text: '{{ .CommonAnnotations.description }}'

      - name: slack-warnings
        slack_configs:
          - channel: '#threat-engine-warnings'
            send_resolved: true
            title: '[WARNING] {{ .CommonAnnotations.summary }}'
            text: '{{ .CommonAnnotations.description }}'

      - name: pagerduty-critical
        pagerduty_configs:
          - service_key: 'REPLACE_WITH_PAGERDUTY_SERVICE_KEY'
            description: '{{ .CommonAnnotations.summary }}'
            severity: critical
            details:
              description: '{{ .CommonAnnotations.description }}'
              runbook: '{{ .CommonAnnotations.runbook_url }}'

    inhibit_rules:
      - source_match:
          severity: critical
        target_match:
          severity: warning
        equal: ['alertname', 'cluster']
