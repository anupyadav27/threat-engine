# Fluent-bit DaemonSet — ships pod logs from threat-engine-engines namespace to CloudWatch
# Log groups:
#   /threat-engine/engines/{engine-name}    ← one group per engine (structured)
#   /threat-engine/argo                     ← Argo workflow step logs
#
# Requires IAM permissions on the node role:
#   logs:CreateLogGroup, logs:CreateLogStream,
#   logs:PutLogEvents, logs:DescribeLogStreams
#
# Apply: kubectl apply -f deployment/aws/eks/logging/fluent-bit.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: amazon-cloudwatch
  labels:
    name: amazon-cloudwatch
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluent-bit
  namespace: amazon-cloudwatch
  annotations:
    # If using IRSA instead of node role, add your IRSA role ARN here:
    # eks.amazonaws.com/role-arn: arn:aws:iam::588989875114:role/fluent-bit-cw-role
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fluent-bit
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods", "nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fluent-bit
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fluent-bit
subjects:
  - kind: ServiceAccount
    name: fluent-bit
    namespace: amazon-cloudwatch
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: amazon-cloudwatch
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Daemon        Off
        Log_Level     info
        Parsers_File  parsers.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020

    # ── Engine pod logs (threat-engine-engines namespace) ──────────────────
    [INPUT]
        Name              tail
        Tag               engine.*
        Path              /var/log/containers/*_threat-engine-engines_*.log
        Parser            docker
        DB                /var/log/flb_engine.db
        Mem_Buf_Limit     50MB
        Skip_Long_Lines   On
        Refresh_Interval  10

    # ── Argo workflow step logs ─────────────────────────────────────────────
    [INPUT]
        Name              tail
        Tag               argo.*
        Path              /var/log/containers/*_argo_*.log
        Parser            docker
        DB                /var/log/flb_argo.db
        Mem_Buf_Limit     20MB
        Skip_Long_Lines   On
        Refresh_Interval  10

    # ── Enrich with K8s metadata (pod name, labels, engine name) ───────────
    [FILTER]
        Name                kubernetes
        Match               engine.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     engine.var.log.containers.
        Merge_Log           On
        Keep_Log            Off
        Annotations         Off
        Labels              On

    [FILTER]
        Name                kubernetes
        Match               argo.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     argo.var.log.containers.
        Merge_Log           On
        Keep_Log            Off
        Annotations         Off
        Labels              On

    # ── Parse log level + timing fields from Python log lines ──────────────
    # extract_level() also handles TIMING_JSON: lines, extracting numeric
    # fields (timing_total_s, timing_phase1_s, etc.) as top-level record keys
    # so CloudWatch Logs Insights can filter/aggregate them directly.
    [FILTER]
        Name    lua
        Match   engine.*
        script  /fluent-bit/scripts/extract_level.lua
        call    extract_level

    # ── Route engine logs → CloudWatch (one log group per engine) ──────────
    [OUTPUT]
        Name                cloudwatch_logs
        Match               engine.*
        region              ap-south-1
        log_group_name      /threat-engine/engines
        log_stream_prefix   ${kubernetes['labels']['app']}/
        auto_create_group   true
        log_retention_days  7

    # ── Route Argo logs → CloudWatch ────────────────────────────────────────
    [OUTPUT]
        Name                cloudwatch_logs
        Match               argo.*
        region              ap-south-1
        log_group_name      /threat-engine/argo
        log_stream_prefix   workflow/
        auto_create_group   true
        log_retention_days  3

  parsers.conf: |
    [PARSER]
        Name        docker
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L
        Time_Keep   On

    [PARSER]
        Name        python_log
        Format      regex
        Regex       ^(?<time>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d{3}) \[(?<level>\w+)\s*\] (?<logger>[\w.]+) (?<message>.*)$
        Time_Key    time
        Time_Format %Y-%m-%d %H:%M:%S,%L

  # Lua script: extract log level + structured timing fields from Python log lines
  extract_level.lua: |
    function extract_level(tag, timestamp, record)
        local log = record["log"] or record["message"] or ""

        -- ── Log level ────────────────────────────────────────────────────────
        if     string.find(log, "ERROR")    then record["level"] = "ERROR"
        elseif string.find(log, "WARNING")  then record["level"] = "WARNING"
        elseif string.find(log, "CRITICAL") then record["level"] = "CRITICAL"
        elseif string.find(log, "INFO")     then record["level"] = "INFO"
        elseif string.find(log, "DEBUG")    then record["level"] = "DEBUG"
        else                                     record["level"] = "INFO"
        end

        -- ── scan_run_id (UUID pattern) ───────────────────────────────────────
        local srn = string.match(log, "([0-9a-f]+-[0-9a-f]+-[0-9a-f]+-[0-9a-f]+-[0-9a-f]+)")
        if srn then record["scan_run_id"] = srn end

        -- ── TIMING_JSON: structured timing line ──────────────────────────────
        -- Emitted by ScanTimer.log_summary() at the end of every discovery scan.
        -- Format:  TIMING_JSON: {"scan_run_id": "...", "total_s": 1847, ...}
        -- We extract top-level numeric fields so CloudWatch Logs Insights can
        -- query them with: filter event_type = "scan_timing" | stats avg(total_s)
        local json_str = string.match(log, "TIMING_JSON: (.+)$")
        if json_str then
            record["event_type"] = "scan_timing"
            record["timing_json"] = json_str   -- full JSON blob for storage

            -- Extract key numeric fields with simple pattern matching
            -- (avoids pulling in a full JSON library)
            local function num(key)
                return tonumber(string.match(json_str, '"' .. key .. '":%s*([%d%.]+)'))
            end
            local function str_val(key)
                return string.match(json_str, '"' .. key .. '":%s*"([^"]+)"')
            end

            record["timing_total_s"]         = num("total_s")
            record["timing_phase1_s"]        = num("phase1_scan_s")
            record["timing_phase2_s"]        = num("phase2_upload_s")
            record["timing_accounts"]        = num("accounts")
            record["timing_global_svcs"]     = num("global_services")
            record["timing_regional_svcs"]   = num("regional_services")
            record["timing_regions"]         = num("regions")
            record["timing_work_items"]      = num("work_items_per_account")
            record["timing_discoveries"]     = num("total_discoveries")
            record["timing_scan_start"]      = str_val("scan_start")
            record["timing_scan_end"]        = str_val("scan_end")
        end

        return 1, timestamp, record
    end
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: amazon-cloudwatch
  labels:
    app: fluent-bit
    version: v2.2.2
    component: log-shipper
    managed-by: kubectl
spec:
  selector:
    matchLabels:
      app: fluent-bit
  template:
    metadata:
      labels:
        app: fluent-bit
        version: v2.2.2
    spec:
      serviceAccountName: fluent-bit
      tolerations:
        # Run on spot scanner nodes too so their job logs are captured
        - key: spot-scanner
          operator: Exists
          effect: NoSchedule
      containers:
        - name: fluent-bit
          image: public.ecr.aws/aws-observability/aws-for-fluent-bit:2.32.0
          imagePullPolicy: Always
          ports:
            - containerPort: 2020
              name: http-metrics
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: varlog
              mountPath: /var/log
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: fluent-bit-config
              mountPath: /fluent-bit/etc/
            - name: fluent-bit-scripts
              mountPath: /fluent-bit/scripts/
          livenessProbe:
            httpGet:
              path: /
              port: 2020
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 2020
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: fluent-bit-config
          configMap:
            name: fluent-bit-config
            items:
              - key: fluent-bit.conf
                path: fluent-bit.conf
              - key: parsers.conf
                path: parsers.conf
        - name: fluent-bit-scripts
          configMap:
            name: fluent-bit-config
            items:
              - key: extract_level.lua
                path: extract_level.lua
      terminationGracePeriodSeconds: 10
---
# Health check service for monitoring
apiVersion: v1
kind: Service
metadata:
  name: fluent-bit
  namespace: amazon-cloudwatch
  labels:
    app: fluent-bit
spec:
  selector:
    app: fluent-bit
  ports:
    - name: http-metrics
      port: 2020
      targetPort: 2020
