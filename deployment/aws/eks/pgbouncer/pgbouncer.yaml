# PgBouncer — connection pooler for all 9 engine databases.
#
# Architecture:
#   Engine pods → pgbouncer:5432 (ClusterIP) → RDS:5432
#
# Pool mode: TRANSACTION — connections are returned to the pool after each
# transaction, not each session. Ideal for microservices that issue short
# discrete queries. Reduces RDS max_connections from ~9×pool_size (direct)
# to pool_size (shared).
#
# Effective RDS connections:  9 databases × 10 pool_size = 90 total
# Client connections accepted: 400 (across all engine pods)
#
# Deploy:
#   kubectl apply -f deployment/aws/eks/pgbouncer/pgbouncer.yaml -n threat-engine-engines
#
# Verify:
#   kubectl exec -it deploy/pgbouncer -n threat-engine-engines -- \
#     psql -h 127.0.0.1 -p 5432 -U postgres pgbouncer -c "SHOW POOLS;"
#
# After deploying, update threat-engine-db-config so all *_DB_HOST = pgbouncer.
# See: deployment/aws/eks/configmaps/threat-engine-db-config.yaml

---
# ── ConfigMap: pgbouncer.ini template ────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-config
  namespace: threat-engine-engines
  labels:
    app: pgbouncer
    component: connection-pooler
data:
  pgbouncer.ini.template: |
    [databases]
    ; All 9 engine databases forwarded to RDS.
    ; ${RDS_HOST} is substituted by the init container from the RDS_HOST env var.
    threat_engine_check       = host=${RDS_HOST} port=5432 dbname=threat_engine_check
    threat_engine_discoveries = host=${RDS_HOST} port=5432 dbname=threat_engine_discoveries
    threat_engine_compliance  = host=${RDS_HOST} port=5432 dbname=threat_engine_compliance
    threat_engine_inventory   = host=${RDS_HOST} port=5432 dbname=threat_engine_inventory
    threat_engine_threat      = host=${RDS_HOST} port=5432 dbname=threat_engine_threat
    threat_engine_onboarding  = host=${RDS_HOST} port=5432 dbname=threat_engine_onboarding
    threat_engine_iam         = host=${RDS_HOST} port=5432 dbname=threat_engine_iam
    threat_engine_datasec     = host=${RDS_HOST} port=5432 dbname=threat_engine_datasec
    threat_engine_secops      = host=${RDS_HOST} port=5432 dbname=threat_engine_secops
    threat_engine_shared      = host=${RDS_HOST} port=5432 dbname=threat_engine_shared
    threat_engine_pythonsdk   = host=${RDS_HOST} port=5432 dbname=threat_engine_pythonsdk

    [pgbouncer]
    listen_addr            = 0.0.0.0
    listen_port            = 5432
    auth_type              = md5
    auth_file              = /etc/pgbouncer/userlist.txt

    ; TRANSACTION mode: connection returned to pool after each transaction.
    ; WARNING: SET, LISTEN, NOTIFY, PREPARE are not supported in transaction mode.
    ; Use SESSION mode if any engine requires these (currently none do).
    pool_mode              = transaction

    ; Client-side limits
    max_client_conn        = 400
    client_idle_timeout    = 300
    client_login_timeout   = 15

    ; Server-side pool sizing
    default_pool_size      = 10
    min_pool_size          = 2
    reserve_pool_size      = 5
    reserve_pool_timeout   = 3

    ; RDS connection management
    server_idle_timeout    = 600
    server_connect_timeout = 15
    server_login_retry     = 5
    server_tls_sslmode     = require

    ; Logging — keep low in production for performance
    log_connections        = 0
    log_disconnections     = 0
    log_pooler_errors      = 1
    stats_period           = 60

    ; Admin access (connect with user pgbouncer to database pgbouncer)
    admin_users            = postgres
    stats_users            = postgres

---
# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: threat-engine-engines
  labels:
    app: pgbouncer
    component: connection-pooler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgbouncer
  template:
    metadata:
      labels:
        app: pgbouncer
        component: connection-pooler
      annotations:
        # Force pod restart when ConfigMap changes
        checksum/config: "v1"
    spec:
      # Pin to on-demand nodes — pgbouncer must not be interrupted
      tolerations: []
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node-type
                    operator: NotIn
                    values: ["spot"]

      # ── Init container: render pgbouncer.ini and userlist.txt ──────────────
      initContainers:
        - name: config-renderer
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              set -e
              # Substitute ${RDS_HOST} in the template
              export RDS_HOST="${RDS_HOST}"
              # busybox envsubst is not available — use sed
              sed "s|\${RDS_HOST}|${RDS_HOST}|g" \
                /templates/pgbouncer.ini.template \
                > /etc/pgbouncer/pgbouncer.ini

              # Write userlist.txt: "user" "plain-text-password"
              # PgBouncer will hash it at startup with auth_type = md5
              echo "\"postgres\" \"${DB_PASSWORD}\"" > /etc/pgbouncer/userlist.txt

              echo "Config rendered:"
              head -5 /etc/pgbouncer/pgbouncer.ini
          env:
            - name: RDS_HOST
              valueFrom:
                configMapKeyRef:
                  name: pgbouncer-rds-config
                  key: RDS_HOST
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: external-secret-db-passwords
                  key: CHECK_DB_PASSWORD   # All DBs share same password
          volumeMounts:
            - name: templates
              mountPath: /templates
              readOnly: true
            - name: pgbouncer-conf
              mountPath: /etc/pgbouncer

      # ── Main container ──────────────────────────────────────────────────────
      containers:
        - name: pgbouncer
          image: pgbouncer/pgbouncer:1.23.1
          imagePullPolicy: IfNotPresent
          args: ["/etc/pgbouncer/pgbouncer.ini"]

          ports:
            - name: pgbouncer
              containerPort: 5432
              protocol: TCP

          # Liveness: can we connect to the admin console?
          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3

          # Readiness: accept traffic only when pgbouncer is fully up
          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          volumeMounts:
            - name: pgbouncer-conf
              mountPath: /etc/pgbouncer

      volumes:
        - name: templates
          configMap:
            name: pgbouncer-config
        - name: pgbouncer-conf
          emptyDir: {}

---
# ── Service: expose pgbouncer to all engine pods ──────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer
  namespace: threat-engine-engines
  labels:
    app: pgbouncer
    component: connection-pooler
spec:
  type: ClusterIP
  selector:
    app: pgbouncer
  ports:
    - name: pgbouncer
      port: 5432
      targetPort: 5432
      protocol: TCP

---
# ── Separate ConfigMap: holds the actual RDS endpoint ────────────────────────
# Kept separate from pgbouncer-config so the RDS host can be updated without
# triggering a pgbouncer rolling restart (only the init container reads it).
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-rds-config
  namespace: threat-engine-engines
  labels:
    app: pgbouncer
    component: connection-pooler
data:
  # This is the ONLY place that points at the real RDS endpoint.
  # All engine pods point at pgbouncer (see threat-engine-db-config.yaml).
  RDS_HOST: "postgres-vulnerability-db.cbm92xowvx2t.ap-south-1.rds.amazonaws.com"
  RDS_PORT: "5432"
