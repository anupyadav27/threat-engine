# Sync engine DB passwords from AWS Secrets Manager into threat-engine-db-passwords (used by engine deployments via envFrom).
# Requires: External Secrets Operator + ClusterSecretStore for AWS.
# Secret in Secrets Manager: threat-engine/rds-credentials
# All engines use the same RDS instance with the same master password.
# Required Secrets Manager keys: CHECK_DB_PASSWORD, DISCOVERIES_DB_PASSWORD, COMPLIANCE_DB_PASSWORD,
#   INVENTORY_DB_PASSWORD, THREAT_DB_PASSWORD, SHARED_DB_PASSWORD, PYTHONSDK_DB_PASSWORD,
#   ONBOARDING_DB_PASSWORD, IAM_DB_PASSWORD, DATASEC_DB_PASSWORD, SECOPS_DB_PASSWORD
# Apply: kubectl apply -f deployment/aws/eks/secrets/external-secret-db-passwords.yaml -n threat-engine-engines
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: threat-engine-db-passwords
  namespace: threat-engine-engines
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager-store
    kind: ClusterSecretStore
  target:
    name: threat-engine-db-passwords
    creationPolicy: Owner
  data:
    - secretKey: CHECK_DB_PASSWORD
      remoteRef:
        key: threat-engine/rds-credentials
        property: CHECK_DB_PASSWORD
    - secretKey: DISCOVERIES_DB_PASSWORD
      remoteRef:
        key: threat-engine/rds-credentials
        property: DISCOVERIES_DB_PASSWORD
    - secretKey: DISCOVERY_DB_PASSWORD
      remoteRef:
        key: threat-engine/rds-credentials
        property: DISCOVERIES_DB_PASSWORD  # same DB, singular alias
    - secretKey: COMPLIANCE_DB_PASSWORD
      remoteRef:
        key: threat-engine/rds-credentials
        property: COMPLIANCE_DB_PASSWORD
    - secretKey: INVENTORY_DB_PASSWORD
      remoteRef:
        key: threat-engine/rds-credentials
        property: INVENTORY_DB_PASSWORD
    - secretKey: THREAT_DB_PASSWORD
      remoteRef:
        key: threat-engine/rds-credentials
        property: THREAT_DB_PASSWORD
    - secretKey: IAM_DB_PASSWORD
      remoteRef:
        key: threat-engine/rds-credentials
        property: IAM_DB_PASSWORD
    - secretKey: DATASEC_DB_PASSWORD
      remoteRef:
        key: threat-engine/rds-credentials
        property: DATASEC_DB_PASSWORD
    - secretKey: SECOPS_DB_PASSWORD
      remoteRef:
        key: threat-engine/rds-credentials
        property: SECOPS_DB_PASSWORD
    - secretKey: PYTHONSDK_DB_PASSWORD
      remoteRef:
        key: threat-engine/rds-credentials
        property: PYTHONSDK_DB_PASSWORD
    - secretKey: ONBOARDING_DB_PASSWORD
      remoteRef:
        key: threat-engine/rds-credentials
        property: ONBOARDING_DB_PASSWORD
    - secretKey: SHARED_DB_PASSWORD
      remoteRef:
        key: threat-engine/rds-credentials
        property: SHARED_DB_PASSWORD  # DEPRECATED - kept for backward compatibility
    - secretKey: VULN_DB_PASSWORD
      remoteRef:
        key: threat-engine/rds-credentials
        property: VULN_DB_PASSWORD