# Sync RDS credentials from AWS Secrets Manager into K8s secret used by init-threat-engine-databases Job.
# Requires: External Secrets Operator installed + ClusterSecretStore for AWS (ap-south-1).
# Secret in Secrets Manager must exist, e.g. name: threat-engine/rds-credentials, keys: RDS_HOST, RDS_PORT, RDS_SUPERUSER, RDS_SUPERUSER_PASSWORD.
# Apply: kubectl apply -f deployment/aws/eks/secrets/external-secret-rds-credentials.yaml -n threat-engine-engines
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: threat-engine-rds-credentials
  namespace: threat-engine-engines
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager-store
    kind: ClusterSecretStore
  target:
    name: threat-engine-rds-credentials
    creationPolicy: Owner
  data:
    - secretKey: RDS_HOST
      remoteRef:
        key: threat-engine/rds-credentials
        property: RDS_HOST
    - secretKey: RDS_PORT
      remoteRef:
        key: threat-engine/rds-credentials
        property: RDS_PORT
    - secretKey: RDS_SUPERUSER
      remoteRef:
        key: threat-engine/rds-credentials
        property: RDS_SUPERUSER
    - secretKey: RDS_SUPERUSER_PASSWORD
      remoteRef:
        key: threat-engine/rds-credentials
        property: RDS_SUPERUSER_PASSWORD
    - secretKey: DB_PASSWORD
      remoteRef:
        key: threat-engine/rds-credentials
        property: RDS_SUPERUSER_PASSWORD  # generic DB_PASSWORD alias for engines that use it
