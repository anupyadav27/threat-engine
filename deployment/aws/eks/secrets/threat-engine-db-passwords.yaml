# DO NOT APPLY THIS FILE DIRECTLY.
#
# This static Secret has been superseded by the ExternalSecret in:
#   external-secret-db-passwords.yaml
#
# That ExternalSecret pulls all DB passwords from AWS Secrets Manager
# (secret: threat-engine/rds-credentials, region: ap-south-1) and
# creates the K8s secret "threat-engine-db-passwords" automatically.
#
# To apply the proper secret:
#   kubectl apply -f deployment/aws/eks/secrets/external-secret-db-passwords.yaml
#
# Required keys in AWS Secrets Manager (threat-engine/rds-credentials):
#   CHECK_DB_PASSWORD, DISCOVERIES_DB_PASSWORD, COMPLIANCE_DB_PASSWORD,
#   INVENTORY_DB_PASSWORD, THREAT_DB_PASSWORD, IAM_DB_PASSWORD,
#   DATASEC_DB_PASSWORD, SECOPS_DB_PASSWORD, PYTHONSDK_DB_PASSWORD,
#   ONBOARDING_DB_PASSWORD, SHARED_DB_PASSWORD, VULN_DB_PASSWORD
