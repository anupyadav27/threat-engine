# CIEM Dedicated Pipeline — Argo CronWorkflow
#
# PURPOSE:
#   Runs CIEM log collection + detection for ALL active cloud accounts
#   on a fixed schedule (every 6h), completely independent of the CSPM
#   full scan pipeline.
#
# HOW IT WORKS:
#   1. CronWorkflow fires every 6h.
#   2. It calls POST /api/v1/scan/all on the CIEM API pod (always-on).
#   3. The CIEM API queries cloud_accounts WHERE account_status='active'
#      and spawns one K8s Job per account (on-demand nodes).
#   4. Each Job handles ALL regions for that account — LogSourceFinder
#      queries discovery_findings/inventory tables for log bucket locations
#      across every region the account has been discovered in.
#   5. Watermarks ensure each Job only reads new logs since last run.
#
# ADDING ACCOUNTS:
#   Just onboard the account through the normal onboarding flow.
#   The next CronWorkflow run will automatically include it — no YAML changes.
#
# REGIONS:
#   No per-region configuration needed. S3 log buckets (CloudTrail, VPC Flow)
#   use per-region key prefixes. LogSourceFinder returns one LogSource per
#   region found in discovery data; each Job processes all of them.
#
# APPLY:
#   kubectl apply -f deployment/aws/eks/argo/ciem-cron-pipeline.yaml
#
# MANUAL TRIGGER:
#   argo submit --from cronworkflow/ciem-cron-pipeline -n threat-engine-engines
#
# MONITOR:
#   kubectl get jobs -n threat-engine-engines -l app=log-collection-scanner
#   kubectl logs -l app=log-collection-scanner -n threat-engine-engines --tail=50
#
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: ciem-cron-pipeline
  namespace: threat-engine-engines
  labels:
    app: ciem-pipeline
    pipeline: ciem-dedicated
spec:
  # Every hour — CloudTrail delivers files within 5-15min, so 1h gives
  # near-real-time detection. Watermarks ensure each run only reads new events.
  schedule: "0 * * * *"
  timezone: "UTC"
  concurrencyPolicy: Forbid        # skip run if previous is still active
  startingDeadlineSeconds: 300     # if late >5min, skip this run
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 5

  workflowSpec:
    serviceAccountName: default
    entrypoint: trigger-ciem-all

    # Argo step pod runs on on-demand nodes (no spot toleration).
    # CIEM scanner K8s Jobs also use on-demand nodes via use_spot=False
    # in engine_common.job_creator.create_engine_job.

    podGC:
      strategy: OnPodCompletion
      deleteDelayDuration: "60s"

    templates:

    - name: trigger-ciem-all
      script:
        image: python:3.11-slim
        command: [python3, -u]
        source: |
          import subprocess
          subprocess.run(["pip", "install", "-q", "urllib3"], check=True)

          import urllib.request, json, sys

          url = "http://engine-ciem/api/v1/scan/all"
          try:
              req = urllib.request.Request(
                  url,
                  data=b"{}",
                  headers={"Content-Type": "application/json"},
                  method="POST",
              )
              with urllib.request.urlopen(req, timeout=30) as resp:
                  body = json.loads(resp.read())
              jobs = body.get("jobs_created", 0)
              skipped = body.get("jobs_skipped", 0)
              print(f"CIEM scan/all triggered: {jobs} Jobs created, {skipped} skipped")
              for acct in body.get("accounts", []):
                  print(f"  → {acct['provider']} account={acct['account_id']} scan={acct['scan_run_id']} job={acct['job']}")
          except Exception as e:
              print(f"ERROR: could not trigger CIEM scan/all: {e}", file=sys.stderr)
              sys.exit(1)
