# RBAC: no longer needed.
#
# Previously this granted Argo workflow pods permission to scale engine
# Deployments up/down per scan. That pattern was removed — engine API pods
# are always-on Deployments on on-demand nodes and must never be scaled to 0
# (the UI BFF depends on them). Scanning work runs as ephemeral K8s Jobs on
# spot nodes, created by each engine's API pod via job_creator.py.
#
