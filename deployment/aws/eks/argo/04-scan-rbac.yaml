# RBAC: allow Argo workflow pods (default SA in threat-engine-engines)
# to scale engine Deployments up/down during scan lifecycle.
#
# Apply once:
#   kubectl apply -f deployment/aws/eks/argo/04-scan-rbac.yaml
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-engine-scaler
  namespace: threat-engine-engines
rules:
- apiGroups: ["apps"]
  resources: ["deployments", "deployments/scale"]
  verbs: ["get", "list", "patch", "update"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-engine-scaler
  namespace: threat-engine-engines
subjects:
- kind: ServiceAccount
  name: default
  namespace: threat-engine-engines
roleRef:
  kind: Role
  name: argo-engine-scaler
  apiGroup: rbac.authorization.k8s.io
