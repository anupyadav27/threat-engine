  # ── MITRE Batch Enrichment — AP-ENHANCE-01 ────────────────────────────────
  # Fills mitre_technique_id + mitre_tactic in security_findings rows that
  # still have NULL after engine scans, by joining with rule_metadata (check DB).
  # Non-fatal: exits 0 even on error so graph-build is never blocked.
  - name: mitre-enrich
    inputs:
      parameters:
      - name: scan-run-id
      - name: tenant-id
    retryStrategy:
      limit: 1
      retryPolicy: OnFailure
    timeout: "300s"
    script:
      image: python:3.11-slim
      command: [python3, -u]
      env:
      - name: DI_DB_HOST
        valueFrom:
          configMapKeyRef:
            name: threat-engine-db-config
            key: DI_DB_HOST
      - name: DI_DB_PASSWORD
        valueFrom:
          secretKeyRef:
            name: threat-engine-db-passwords
            key: DI_DB_PASSWORD
      - name: CHECK_DB_HOST
        valueFrom:
          configMapKeyRef:
            name: threat-engine-db-config
            key: CHECK_DB_HOST
      - name: CHECK_DB_PASSWORD
        valueFrom:
          secretKeyRef:
            name: threat-engine-db-passwords
            key: CHECK_DB_PASSWORD
      source: |
        import subprocess; subprocess.run(["pip", "install", "-q", "psycopg2-binary"], check=True)
        import psycopg2, os, sys

        SCAN_RUN_ID = "{{inputs.parameters.scan-run-id}}"
        TENANT_ID   = "{{inputs.parameters.tenant-id}}"

        def conn(host_key, db_name, pwd_key):
            return psycopg2.connect(
                host=os.getenv(host_key, "localhost"),
                port=5432,
                database=db_name,
                user="postgres",
                password=os.getenv(pwd_key, ""),
                sslmode="require",
                connect_timeout=10,
            )

        try:
            inv_conn  = conn("DI_DB_HOST", "threat_engine_di", "DI_DB_PASSWORD")
            chk_conn  = conn("CHECK_DB_HOST",     "threat_engine_check",     "CHECK_DB_PASSWORD")

            # Fetch all rule_ids in security_findings with NULL mitre_technique_id for this scan
            with inv_conn.cursor() as ic:
                ic.execute(
                    """
                    SELECT DISTINCT rule_id
                    FROM security_findings
                    WHERE tenant_id = %s
                      AND scan_run_id = %s
                      AND mitre_technique_id IS NULL
                      AND rule_id IS NOT NULL AND rule_id != ''
                    """,
                    (TENANT_ID, SCAN_RUN_ID),
                )
                rule_ids = [r[0] for r in ic.fetchall()]

            if not rule_ids:
                print(f"[mitre-enrich] No NULL mitre_technique_id rows for scan {SCAN_RUN_ID}")
                sys.exit(0)

            # Fetch MITRE data from check DB rule_metadata
            with chk_conn.cursor() as cc:
                cc.execute(
                    "SELECT rule_id, mitre_attack_id, mitre_tactic FROM rule_metadata WHERE rule_id = ANY(%s)",
                    (rule_ids,),
                )
                mitre_map = {r[0]: (r[1], r[2]) for r in cc.fetchall() if r[1]}

            if not mitre_map:
                print(f"[mitre-enrich] No rule_metadata MITRE data for {len(rule_ids)} rules")
                sys.exit(0)

            # Batch UPDATE security_findings
            updated = 0
            with inv_conn.cursor() as ic:
                for rule_id, (tech_id, tactic) in mitre_map.items():
                    ic.execute(
                        """
                        UPDATE security_findings
                        SET mitre_technique_id = %s,
                            mitre_tactic        = %s
                        WHERE tenant_id = %s
                          AND scan_run_id = %s
                          AND rule_id = %s
                          AND mitre_technique_id IS NULL
                        """,
                        (tech_id, tactic, TENANT_ID, SCAN_RUN_ID, rule_id),
                    )
                    updated += ic.rowcount
            inv_conn.commit()

            print(f"[mitre-enrich] Updated {updated} security_findings rows for {len(mitre_map)} rules (scan={SCAN_RUN_ID})")
            inv_conn.close()
            chk_conn.close()
            sys.exit(0)
        except Exception as exc:
            print(f"[mitre-enrich] Non-fatal error: {exc}")
            sys.exit(0)  # always exit 0 — never block graph-build

