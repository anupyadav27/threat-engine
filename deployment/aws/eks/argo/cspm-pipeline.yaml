# CSPM Scan Pipeline — Full Pipeline DAG
#
# PURPOSE:
#   Pipeline topology: engine execution order, dependencies, and CSP gating.
#   All shared mechanics (polling, DB writes, phase-2 verification) live in
#   cspm-templates-primitives.yaml and are referenced via templateRef.
#
# WHEN TO EDIT THIS FILE:
#   - Adding a new engine to the pipeline (add task + templateRef block)
#   - Changing engine execution order or dependencies
#   - Expanding CSP support for an engine (update the `when:` condition)
#   - Changing pipeline parameters or timeouts
#
# CSP SUPPORT MATRIX (update `when:` conditions as new CSP support is added):
#   ┌──────────────────────┬───────────────────────────────────────────────┐
#   │ Engine               │ Supported providers                           │
#   ├──────────────────────┼───────────────────────────────────────────────┤
#   │ di (discovery+inv)   │ all (aws, azure, gcp, k8s, alicloud, oci, ibm)│
#   │ check                │ all                                           │
#   │ compliance           │ all                                           │
#   │ iam                  │ all (AWS-specific policy parsing skipped)     │
#   │ datasec              │ aws, azure, gcp                               │
#   │ encryption           │ all (graceful 0 for non-AWS)                  │
#   │ database-security    │ aws, azure, gcp                               │
#   │ container-security   │ aws, azure, gcp, k8s                          │
#   │ ai-security          │ aws, azure, gcp                               │
#   │ network-security     │ aws, azure, gcp, k8s, oci, alicloud (all 6)   │
#   │ risk                 │ all (aggregates whatever other engines wrote) │
#   │ threat-narrative     │ all (best-effort; skips if LLM key not configured)  │
#   └──────────────────────┴───────────────────────────────────────────────┘
#
# ADDING A NEW ENGINE:
#   1. Add trigger URL to ENGINE_URLS in cspm-templates-primitives.yaml
#   2. Add DB config entry to ENGINE_DB_CONFIG in cspm-templates-primitives.yaml
#   3. Add task block here (copy any existing task, update name/urls/when)
#   4. Add engine name to the engines list in create-orch-record (primitives)
#   5. Add engine name to the `risk` depends clause below
#
# ADDING A NEW CSP:
#   1. Update `when:` conditions for engines that support the new CSP
#   2. No other changes needed — engines already handle new providers gracefully
#
# DEPLOYMENT:
#   kubectl apply -f deployment/aws/eks/argo/cspm-templates-primitives.yaml
#   kubectl apply -f deployment/aws/eks/argo/cspm-pipeline.yaml
#   (primitives must be applied first)
#
# ARCHITECTURE NOTE:
#   Engine API pods (engine-check, engine-threat, etc.) are always-on Deployments
#   on on-demand nodes. They are NEVER scaled down by this pipeline — the UI BFF
#   depends on them at all times. Actual scanning runs as ephemeral K8s Jobs on
#   spot nodes, created by each engine's job_creator.py.
#
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: cspm-scan-pipeline
  namespace: threat-engine-engines
  labels:
    app: cspm-pipeline
spec:
  serviceAccountName: default
  entrypoint: full-pipeline
  onExit: pipeline-exit-handler

  # Argo step pods run on spot nodes (lightweight Python orchestration scripts)
  tolerations:
  - key: spot-scanner
    operator: Equal
    value: "true"
    effect: NoSchedule
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: eks.amazonaws.com/nodegroup
            operator: In
            values: [vulnerability-spot-scanners]

  arguments:
    parameters:
    - name: scan-run-id
      description: "Pipeline-wide UUID (from scan_runs)"
    - name: tenant-id
      description: "Tenant identifier"
    - name: account-id
      description: "Cloud account ID"
    - name: provider
      value: "aws"
      description: "Cloud provider: aws | azure | gcp | k8s | alicloud | oci | ibm"
    - name: credential-type
      value: "access_key"
    - name: credential-ref
      value: "threat-engine/account/588989875114"
    - name: include-services
      value: ""
      description: "Comma-separated services to scan (empty = all). e.g. ec2,iam,s3"
    - name: exclude-services
      value: ""
      description: "Comma-separated services to skip (empty = none skipped). e.g. glacier,snowball"
    - name: include-regions
      value: ""
      description: "Comma-separated regions (empty = all). e.g. us-east-1,eu-west-1"
    - name: exclude-regions
      value: ""
      description: "Comma-separated regions to skip (empty = none skipped). e.g. ap-east-1,me-south-1"
    - name: region
      value: ""
      description: "Single region override for engines that accept a region param (empty = all)"
    - name: di-image-tag
      value: "v-di-timeline1"
      description: "engine-di Docker image tag for scan Jobs. Update when pushing a new DI image."

  podGC:
    strategy: OnPodCompletion
    deleteDelayDuration: "60s"

  templates:

  # ── Full pipeline DAG ──────────────────────────────────────────────────────
  - name: full-pipeline
    dag:
      tasks:

      # Step 1: create scan record (auto-provisions tenant + account if needed)
      - name: create-orchestration-record
        templateRef:
          name: cspm-templates-primitives
          template: create-orch-record

      # Step 2: di — unified discovery+inventory as K8s Job on spot nodes.
      - name: di
        depends: "create-orchestration-record"
        template: di-k8s-job

      # Step 3: check — evaluates compliance rules for all CSPs
      - name: check
        depends: "di.Succeeded || di.Skipped"
        templateRef:
          name: cspm-templates-primitives
          template: trigger-and-poll
        arguments:
          parameters:
          - name: engine
            value: check
          - name: trigger-url
            value: "http://engine-check/api/v1/scan"
          - name: poll-url
            value: "http://engine-check/api/v1/check/{{workflow.parameters.scan-run-id}}/status"
          - name: payload
            value: |
              {
                "scan_run_id": "{{workflow.parameters.scan-run-id}}",
                "tenant_id": "{{workflow.parameters.tenant-id}}",
                "account_id": "{{workflow.parameters.account-id}}",
                "provider": "{{workflow.parameters.provider}}",
                "credential_type": "{{workflow.parameters.credential-type}}",
                "credential_ref": "{{workflow.parameters.credential-ref}}"
              }
          - name: timeout
            value: "3600"

      # ── Domain engines (run in parallel after check) ──────────────────────
      # Each has a `when:` condition for CSP gating.
      # Skipped tasks (when=false) are treated as Succeeded by downstream depends.
      # To expand a `when:` condition: add the new provider with || operator.

      - name: compliance
        depends: "check"
        # No `when:` — compliance runs for all CSPs (framework mappings exist for all)
        templateRef:
          name: cspm-templates-primitives
          template: trigger-and-poll
        arguments:
          parameters:
          - name: engine
            value: compliance
          - name: trigger-url
            value: "http://engine-compliance/api/v1/scan"
          - name: poll-url
            value: "http://engine-compliance/api/v1/compliance/{{workflow.parameters.scan-run-id}}/status"
          - name: payload
            value: |
              {
                "scan_run_id": "{{workflow.parameters.scan-run-id}}",
                "tenant_id": "{{workflow.parameters.tenant-id}}",
                "account_id": "{{workflow.parameters.account-id}}",
                "provider": "{{workflow.parameters.provider}}",
                "credential_type": "{{workflow.parameters.credential-type}}",
                "credential_ref": "{{workflow.parameters.credential-ref}}",
                "trigger_type": "orchestrated",
                "export_to_db": true
              }
          - name: timeout
            value: "1800"

      - name: iam
        depends: "check"
        # No `when:` — IAM runs for all CSPs (AWS-specific policy parsing is skipped
        # internally for non-AWS; CSP-aware IAMReporter handles the rest)
        templateRef:
          name: cspm-templates-primitives
          template: trigger-and-poll
        arguments:
          parameters:
          - name: engine
            value: iam
          - name: trigger-url
            value: "http://engine-iam/api/v1/iam-security/scan"
          - name: poll-url
            value: "http://engine-iam/api/v1/iam-security/{{workflow.parameters.scan-run-id}}/status"
          - name: payload
            value: |
              {
                "scan_run_id": "{{workflow.parameters.scan-run-id}}",
                "tenant_id": "{{workflow.parameters.tenant-id}}",
                "account_id": "{{workflow.parameters.account-id}}",
                "provider": "{{workflow.parameters.provider}}",
                "credential_type": "{{workflow.parameters.credential-type}}",
                "credential_ref": "{{workflow.parameters.credential-ref}}",
                "csp": "{{workflow.parameters.provider}}",
                "max_findings": 5000
              }
          - name: timeout
            value: "14400"

      - name: datasec
        depends: "check"
        # All CSPs now have data_security rules in rule_metadata (oci=432, ibm=36, alicloud=14)
        when: >-
          "{{workflow.parameters.provider}}" == "aws" ||
          "{{workflow.parameters.provider}}" == "azure" ||
          "{{workflow.parameters.provider}}" == "gcp" ||
          "{{workflow.parameters.provider}}" == "oci" ||
          "{{workflow.parameters.provider}}" == "ibm" ||
          "{{workflow.parameters.provider}}" == "alicloud"
        templateRef:
          name: cspm-templates-primitives
          template: trigger-and-poll
        arguments:
          parameters:
          - name: engine
            value: datasec
          - name: trigger-url
            value: "http://engine-datasec/api/v1/data-security/scan"
          - name: poll-url
            value: "http://engine-datasec/api/v1/data-security/{{workflow.parameters.scan-run-id}}/status"
          - name: payload
            value: |
              {
                "scan_run_id": "{{workflow.parameters.scan-run-id}}",
                "tenant_id": "{{workflow.parameters.tenant-id}}",
                "account_id": "{{workflow.parameters.account-id}}",
                "provider": "{{workflow.parameters.provider}}",
                "credential_type": "{{workflow.parameters.credential-type}}",
                "credential_ref": "{{workflow.parameters.credential-ref}}",
                "csp": "{{workflow.parameters.provider}}",
                "include_classification": true,
                "include_lineage": true,
                "include_residency": true,
                "include_activity": true,
                "max_findings": 5000
              }
          - name: timeout
            value: "1800"

      - name: encryption
        depends: "check"
        # No `when:` — encryption runs for all CSPs (graceful 0 findings for
        # providers where KMS/ACM equivalents haven't been wired up yet)
        # NOTE: use risk.depends (.Failed || .Errored) to handle failures, not continueOn
        templateRef:
          name: cspm-templates-primitives
          template: trigger-and-poll
        arguments:
          parameters:
          - name: engine
            value: encryption
          - name: trigger-url
            value: "http://engine-encryption/api/v1/encryption/scan"
          - name: poll-url
            value: "http://engine-encryption/api/v1/encryption/{{workflow.parameters.scan-run-id}}/status"
          - name: payload
            value: |
              {
                "scan_run_id": "{{workflow.parameters.scan-run-id}}",
                "tenant_id": "{{workflow.parameters.tenant-id}}",
                "account_id": "{{workflow.parameters.account-id}}",
                "provider": "{{workflow.parameters.provider}}",
                "credential_type": "{{workflow.parameters.credential-type}}",
                "credential_ref": "{{workflow.parameters.credential-ref}}",
                "csp": "{{workflow.parameters.provider}}",
                "max_findings": 5000
              }
          - name: timeout
            value: "1800"

      - name: database-security
        depends: "check"
        # oci=235, alicloud=4 database_security rules added; ibm=0 stays excluded
        when: >-
          "{{workflow.parameters.provider}}" == "aws" ||
          "{{workflow.parameters.provider}}" == "azure" ||
          "{{workflow.parameters.provider}}" == "gcp" ||
          "{{workflow.parameters.provider}}" == "oci" ||
          "{{workflow.parameters.provider}}" == "alicloud"
        templateRef:
          name: cspm-templates-primitives
          template: trigger-and-poll
        arguments:
          parameters:
          - name: engine
            value: database-security
          - name: trigger-url
            value: "http://engine-dbsec/api/v1/scan"
          - name: poll-url
            value: "http://engine-dbsec/api/v1/scan/{{workflow.parameters.scan-run-id}}/status"
          - name: payload
            value: |
              {
                "scan_run_id": "{{workflow.parameters.scan-run-id}}",
                "tenant_id": "{{workflow.parameters.tenant-id}}",
                "account_id": "{{workflow.parameters.account-id}}",
                "provider": "{{workflow.parameters.provider}}",
                "credential_type": "{{workflow.parameters.credential-type}}",
                "credential_ref": "{{workflow.parameters.credential-ref}}",
                "csp": "{{workflow.parameters.provider}}",
                "max_findings": 5000
              }
          - name: timeout
            value: "1800"

      - name: container-security
        depends: "check"
        # oci=74, alicloud=14, ibm=15 container_security rules added
        when: >-
          "{{workflow.parameters.provider}}" == "aws" ||
          "{{workflow.parameters.provider}}" == "azure" ||
          "{{workflow.parameters.provider}}" == "gcp" ||
          "{{workflow.parameters.provider}}" == "k8s" ||
          "{{workflow.parameters.provider}}" == "kubernetes" ||
          "{{workflow.parameters.provider}}" == "oci" ||
          "{{workflow.parameters.provider}}" == "alicloud" ||
          "{{workflow.parameters.provider}}" == "ibm"
        templateRef:
          name: cspm-templates-primitives
          template: trigger-and-poll
        arguments:
          parameters:
          - name: engine
            value: container-security
          - name: trigger-url
            value: "http://engine-container-sec/api/v1/container-security/scan"
          - name: poll-url
            value: "http://engine-container-sec/api/v1/container-security/{{workflow.parameters.scan-run-id}}/status"
          - name: payload
            value: |
              {
                "scan_run_id": "{{workflow.parameters.scan-run-id}}",
                "tenant_id": "{{workflow.parameters.tenant-id}}",
                "account_id": "{{workflow.parameters.account-id}}",
                "provider": "{{workflow.parameters.provider}}",
                "credential_type": "{{workflow.parameters.credential-type}}",
                "credential_ref": "{{workflow.parameters.credential-ref}}",
                "csp": "{{workflow.parameters.provider}}",
                "max_findings": 5000
              }
          - name: timeout
            value: "1800"

      - name: ai-security
        depends: "check"
        # oci=3 ai_security rules added; alicloud=0 and ibm=0 stay excluded
        when: >-
          "{{workflow.parameters.provider}}" == "aws" ||
          "{{workflow.parameters.provider}}" == "azure" ||
          "{{workflow.parameters.provider}}" == "gcp" ||
          "{{workflow.parameters.provider}}" == "oci"
        templateRef:
          name: cspm-templates-primitives
          template: trigger-and-poll
        arguments:
          parameters:
          - name: engine
            value: ai-security
          - name: trigger-url
            value: "http://engine-ai-security/api/v1/ai-security/scan"
          - name: poll-url
            value: "http://engine-ai-security/api/v1/ai-security/{{workflow.parameters.scan-run-id}}/status"
          - name: payload
            value: |
              {
                "scan_run_id": "{{workflow.parameters.scan-run-id}}",
                "tenant_id": "{{workflow.parameters.tenant-id}}",
                "account_id": "{{workflow.parameters.account-id}}",
                "provider": "{{workflow.parameters.provider}}",
                "credential_type": "{{workflow.parameters.credential-type}}",
                "credential_ref": "{{workflow.parameters.credential-ref}}",
                "csp": "{{workflow.parameters.provider}}",
                "max_findings": 5000
              }
          - name: timeout
            value: "1800"

      - name: network-security
        depends: "check"
        # providers/ pattern: all 6 CSPs now have 7-layer implementation (v-net-fix11)
        when: >-
          "{{workflow.parameters.provider}}" == "aws" ||
          "{{workflow.parameters.provider}}" == "azure" ||
          "{{workflow.parameters.provider}}" == "gcp" ||
          "{{workflow.parameters.provider}}" == "k8s" ||
          "{{workflow.parameters.provider}}" == "kubernetes" ||
          "{{workflow.parameters.provider}}" == "oci" ||
          "{{workflow.parameters.provider}}" == "alicloud"
        templateRef:
          name: cspm-templates-primitives
          template: trigger-and-poll
        arguments:
          parameters:
          - name: engine
            value: network-security
          - name: trigger-url
            value: "http://engine-network/api/v1/network-security/scan"
          - name: poll-url
            value: "http://engine-network/api/v1/network-security/{{workflow.parameters.scan-run-id}}/status"
          - name: payload
            value: |
              {
                "scan_run_id": "{{workflow.parameters.scan-run-id}}",
                "tenant_id": "{{workflow.parameters.tenant-id}}",
                "account_id": "{{workflow.parameters.account-id}}",
                "provider": "{{workflow.parameters.provider}}",
                "credential_type": "{{workflow.parameters.credential-type}}",
                "credential_ref": "{{workflow.parameters.credential-ref}}",
                "csp": "{{workflow.parameters.provider}}",
                "max_findings": 5000
              }
          - name: timeout
            value: "14400"

      # Step 5b-pre: mitre-enrich — fills NULL mitre_technique_id in security_findings
      # by joining with rule_metadata (check DB). Non-fatal: always exits 0.
      # AP-ENHANCE-01
      - name: mitre-enrich
        depends: >-
          (compliance.Succeeded || compliance.Failed || compliance.Errored || compliance.Skipped) &&
          (iam.Succeeded || iam.Failed || iam.Errored || iam.Skipped) &&
          (datasec.Succeeded || datasec.Failed || datasec.Errored || datasec.Skipped) &&
          (encryption.Succeeded || encryption.Failed || encryption.Errored || encryption.Skipped) &&
          (database-security.Succeeded || database-security.Failed || database-security.Errored || database-security.Skipped) &&
          (container-security.Succeeded || container-security.Failed || container-security.Errored || container-security.Skipped) &&
          (ai-security.Succeeded || ai-security.Failed || ai-security.Errored || ai-security.Skipped) &&
          (network-security.Succeeded || network-security.Failed || network-security.Errored || network-security.Skipped)
        templateRef:
          name: cspm-templates-primitives
          template: mitre-enrich
        arguments:
          parameters:
          - name: scan-run-id
            value: "{{workflow.parameters.scan-run-id}}"
          - name: tenant-id
            value: "{{workflow.parameters.tenant-id}}"

      # Step 5: api-security — API gateway OWASP analysis (parallel with IAM, DataSec, Network)
      - name: api-security
        depends: "check"
        when: >-
          "{{workflow.parameters.provider}}" == "aws" ||
          "{{workflow.parameters.provider}}" == "azure" ||
          "{{workflow.parameters.provider}}" == "gcp" ||
          "{{workflow.parameters.provider}}" == "oci" ||
          "{{workflow.parameters.provider}}" == "alicloud"
        templateRef:
          name: cspm-templates-primitives
          template: call-engine-api-security
        arguments:
          parameters:
          - name: scan-run-id
            value: "{{workflow.parameters.scan-run-id}}"
          - name: tenant-id
            value: "{{workflow.parameters.tenant-id}}"
          - name: account-id
            value: "{{workflow.parameters.account-id}}"
          - name: provider
            value: "{{workflow.parameters.provider}}"
          - name: credential-ref
            value: "{{workflow.parameters.credential-ref}}"
          - name: credential-type
            value: "{{workflow.parameters.credential-type}}"
          - name: region
            value: "{{workflow.parameters.region}}"

      # Step 6.5: attack-path-scan — reverse BFS from crown jewels to entry points.
      # Depends on mitre-enrich (so security_findings have MITRE data before BFS scoring).
      # The attack-path engine builds its own Neo4j graph internally via EdgeBuilder.
      # retry: 0 — Argo does NOT retry on failure (PRD section 5.2).
      - name: attack-path-scan
        depends: >-
          (mitre-enrich.Succeeded || mitre-enrich.Failed || mitre-enrich.Errored || mitre-enrich.Skipped)
        templateRef:
          name: cspm-templates-primitives
          template: attack-path-scan
        arguments:
          parameters:
          - name: scan-run-id
            value: "{{workflow.parameters.scan-run-id}}"
          - name: tenant-id
            value: "{{workflow.parameters.tenant-id}}"
          - name: account-id
            value: "{{workflow.parameters.account-id}}"

      # Step 6: risk — aggregates all engine findings, computes FAIR scores
      # Runs for all CSPs. Waits for attack-path-scan; continues regardless of outcome.
      # .Errored covers pod-level timeouts (activeDeadlineSeconds); .Failed covers script sys.exit(1).
      - name: risk
        # Wait for attack-path-scan + domain engines; continue regardless of outcome.
        # Parentheses are required — && binds tighter than || in Argo expression syntax.
        depends: >-
          (attack-path-scan.Succeeded || attack-path-scan.Failed || attack-path-scan.Errored || attack-path-scan.Skipped) &&
          (compliance.Succeeded || compliance.Failed || compliance.Errored || compliance.Skipped) &&
          (iam.Succeeded || iam.Failed || iam.Errored || iam.Skipped) &&
          (datasec.Succeeded || datasec.Failed || datasec.Errored || datasec.Skipped) &&
          (encryption.Succeeded || encryption.Failed || encryption.Errored || encryption.Skipped) &&
          (database-security.Succeeded || database-security.Failed || database-security.Errored || database-security.Skipped) &&
          (container-security.Succeeded || container-security.Failed || container-security.Errored || container-security.Skipped) &&
          (ai-security.Succeeded || ai-security.Failed || ai-security.Errored || ai-security.Skipped) &&
          (network-security.Succeeded || network-security.Failed || network-security.Errored || network-security.Skipped) &&
          (api-security.Succeeded || api-security.Failed || api-security.Errored || api-security.Skipped)
        templateRef:
          name: cspm-templates-primitives
          template: trigger-and-poll
        arguments:
          parameters:
          - name: engine
            value: risk
          - name: trigger-url
            value: "http://engine-risk:8009/api/v1/scan"
          - name: poll-url
            value: "http://engine-risk:8009/api/v1/risk/{{workflow.parameters.scan-run-id}}/status"
          - name: payload
            value: |
              {
                "scan_run_id": "{{workflow.parameters.scan-run-id}}",
                "tenant_id": "{{workflow.parameters.tenant-id}}",
                "account_id": "{{workflow.parameters.account-id}}",
                "provider": "{{workflow.parameters.provider}}",
                "credential_type": "{{workflow.parameters.credential-type}}",
                "credential_ref": "{{workflow.parameters.credential-ref}}"
              }
          - name: timeout
            value: "14400"

      # Step 7: threat-narrative — LLM narrative generation (best-effort)
      # Runs only after risk succeeds. If this step fails, the pipeline is
      # still marked complete — narrative columns remain NULL and frontend
      # renders fallback text. Do NOT add this to mark-complete depends.
      - name: threat-narrative
        depends: "risk.Succeeded"
        templateRef:
          name: cspm-templates-primitives
          template: trigger-and-poll
        arguments:
          parameters:
          - name: engine
            value: attack-path-narrative
          - name: trigger-url
            value: "http://engine-attack-path-narrative/api/v1/generate/{{workflow.parameters.scan-run-id}}"
          - name: poll-url
            value: "http://engine-attack-path-narrative/api/v1/health/ready"
          - name: payload
            value: |
              {
                "scan_run_id": "{{workflow.parameters.scan-run-id}}",
                "tenant_id":   "{{workflow.parameters.tenant-id}}"
              }
          - name: timeout
            value: "3600"

      # Step 8: mark complete — always runs after risk (success or failure)
      # NOTE: threat-narrative is intentionally NOT in this depends clause.
      # The pipeline must complete regardless of narrative generation outcome.
      - name: mark-complete
        depends: "risk.Succeeded || risk.Failed || risk.Errored"
        templateRef:
          name: cspm-templates-primitives
          template: update-orch-status
        arguments:
          parameters:
          - name: status
            value: "completed"

      # Step 9: cdr-nudge — fire-and-forget CDR trigger after pipeline completes.
      # CDR runs independently on its own cron but nudging it immediately after a
      # completed posture scan aligns behavioral detection with each scan.
      # Always exits 0 — CDR outage must never fail the main pipeline.
      - name: cdr-nudge
        depends: "mark-complete.Succeeded || mark-complete.Failed || mark-complete.Errored"
        templateRef:
          name: cspm-templates-primitives
          template: cdr-nudge
        arguments:
          parameters:
          - name: scan-run-id
            value: "{{workflow.parameters.scan-run-id}}"
          - name: tenant-id
            value: "{{workflow.parameters.tenant-id}}"
          - name: account-id
            value: "{{workflow.parameters.account-id}}"
          - name: provider
            value: "{{workflow.parameters.provider}}"
          - name: credential-ref
            value: "{{workflow.parameters.credential-ref}}"
          - name: credential-type
            value: "{{workflow.parameters.credential-type}}"

  # ── DI K8s Job template ───────────────────────────────────────────────────
  # Creates a K8s Job on the di-scan-spot spot node group.
  # Argo watches Job status: succeeded==1 → step passes, failed>=1 → step fails.
  # backoffLimit:1 → one automatic retry on spot interruption.
  # ttlSecondsAfterFinished:3600 → auto-cleans Job after 1 hour.
  # Workers tuned for m5.2xlarge (8 vCPU, 32 GB): MAX_GLOBAL_WORKERS=20, MAX_REGIONAL_WORKERS=60.
  - name: di-k8s-job
    resource:
      action: create
      successCondition: status.succeeded == 1
      failureCondition: status.failed > 0
      manifest: |
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: di-scan-{{workflow.parameters.scan-run-id}}
          namespace: threat-engine-engines
          labels:
            app: di-scan
            scan-run-id: "{{workflow.parameters.scan-run-id}}"
            tier: scan-job
        spec:
          ttlSecondsAfterFinished: 3600
          backoffLimit: 0
          template:
            spec:
              restartPolicy: Never
              serviceAccountName: engine-sa
              nodeSelector:
                workload-type: di-scan
                lifecycle: spot
              tolerations:
                - key: workload-type
                  operator: Equal
                  value: di-scan
                  effect: NoSchedule
                - key: aws.amazon.com/spot
                  operator: Exists
                  effect: NoSchedule
              containers:
                - name: di-scan
                  image: yadavanup84/engine-di:{{workflow.parameters.di-image-tag}}
                  command: ["python3", "/app/run_scan.py", "--scan-run-id", "{{workflow.parameters.scan-run-id}}"]
                  resources:
                    requests:
                      cpu: "2000m"
                      memory: "4Gi"
                    limits:
                      cpu: "4000m"
                      memory: "8Gi"
                  envFrom:
                    - configMapRef:
                        name: threat-engine-db-config
                    - secretRef:
                        name: threat-engine-db-passwords
                  env:
                    - name: PYTHONPATH
                      value: /app
                    - name: LOG_LEVEL
                      value: "INFO"
                    - name: ENGINE_NAME
                      value: "di"
                    - name: MAX_GLOBAL_WORKERS
                      value: "20"
                    - name: MAX_REGIONAL_WORKERS
                      value: "60"
                    - name: AWS_RETRY_MODE
                      value: "adaptive"
                    - name: AWS_MAX_ATTEMPTS
                      value: "10"
                    - name: DI_DB_HOST
                      value: "postgres-vulnerability-db.cbm92xowvx2t.ap-south-1.rds.amazonaws.com"
                    - name: DI_DB_PORT
                      value: "5432"
                    - name: DI_DB_NAME
                      value: "threat_engine_di"
                    - name: DI_DB_USER
                      value: "postgres"
                    - name: DI_DB_PASSWORD
                      valueFrom:
                        secretKeyRef:
                          name: threat-engine-db-passwords
                          key: DI_DB_PASSWORD
                    - name: ONBOARDING_DB_HOST
                      value: "postgres-vulnerability-db.cbm92xowvx2t.ap-south-1.rds.amazonaws.com"
                    - name: ONBOARDING_DB_PORT
                      value: "5432"
                    - name: ONBOARDING_DB_NAME
                      value: "threat_engine_onboarding"
                    - name: ONBOARDING_DB_USER
                      value: "postgres"
                    - name: ONBOARDING_DB_PASSWORD
                      valueFrom:
                        secretKeyRef:
                          name: threat-engine-db-passwords
                          key: ONBOARDING_DB_PASSWORD
                    - name: CHECK_DB_HOST
                      value: "postgres-vulnerability-db.cbm92xowvx2t.ap-south-1.rds.amazonaws.com"
                    - name: CHECK_DB_PORT
                      value: "5432"
                    - name: CHECK_DB_NAME
                      value: "threat_engine_check"
                    - name: CHECK_DB_USER
                      value: "postgres"
                    - name: CHECK_DB_PASSWORD
                      valueFrom:
                        secretKeyRef:
                          name: threat-engine-db-passwords
                          key: CHECK_DB_PASSWORD
                    - name: AWS_REGION
                      valueFrom:
                        configMapKeyRef:
                          name: s3-mount-config
                          key: s3-region

  # ── Exit handler ───────────────────────────────────────────────────────────
  # Must be a local template (onExit cannot use templateRef directly).
  # Runs on every workflow exit — marks scan failed if mark-complete was skipped.
  - name: pipeline-exit-handler
    script:
      image: python:3.11-slim
      command: [python3, -u]
      envFrom:
      - configMapRef:
          name: threat-engine-db-config
      - secretRef:
          name: threat-engine-db-passwords
          optional: true
      source: |
        import subprocess; subprocess.run(["pip", "install", "-q", "psycopg2-binary"], check=True)
        import psycopg2, os

        workflow_status = '{{workflow.status}}'
        scan_run_id     = '{{workflow.parameters.scan-run-id}}'

        host = os.getenv('ONBOARDING_DB_HOST', os.getenv('DB_HOST', 'localhost'))
        port = int(os.getenv('ONBOARDING_DB_PORT', os.getenv('DB_PORT', '5432')))
        db   = os.getenv('ONBOARDING_DB_NAME', 'threat_engine_onboarding')
        user = os.getenv('ONBOARDING_DB_USER', os.getenv('DB_USER', 'postgres'))
        pw   = os.getenv('ONBOARDING_DB_PASSWORD', os.getenv('DB_PASSWORD', ''))

        try:
            conn = psycopg2.connect(host=host, port=port, database=db, user=user, password=pw)
            cur  = conn.cursor()

            if workflow_status != 'Succeeded':
                cur.execute("""
                    UPDATE scan_runs SET overall_status='failed', completed_at=NOW()
                    WHERE scan_run_id=%s AND overall_status NOT IN ('completed','failed')
                """, (scan_run_id,))
                conn.commit()
                print(f'Pipeline {workflow_status} — scan_run_id={scan_run_id} marked failed')
            else:
                cur.execute("SELECT overall_status FROM scan_runs WHERE scan_run_id=%s", (scan_run_id,))
                row = cur.fetchone()
                db_status = row[0] if row else 'unknown'
                if db_status == 'running':
                    cur.execute("""
                        UPDATE scan_runs SET overall_status='failed', completed_at=NOW()
                        WHERE scan_run_id=%s
                    """, (scan_run_id,))
                    conn.commit()
                    print(f'Workflow Succeeded but DB still running — mark-complete was skipped, marked failed')
                else:
                    print(f'Pipeline completed — DB status: {db_status}')

            conn.close()
        except Exception as e:
            print(f'Warning: could not update scan status: {e}')

        if workflow_status != 'Succeeded':
            exit(1)
