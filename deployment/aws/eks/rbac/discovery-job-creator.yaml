# RBAC: Allow engine-sa to create/manage discovery scanner Jobs.
# The Discovery API pod creates K8s Jobs on-demand for scans.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: discovery-job-creator
  namespace: threat-engine-engines
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "delete", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: discovery-job-creator-binding
  namespace: threat-engine-engines
subjects:
  - kind: ServiceAccount
    name: engine-sa
    namespace: threat-engine-engines
roleRef:
  kind: Role
  name: discovery-job-creator
  apiGroup: rbac.authorization.k8s.io
