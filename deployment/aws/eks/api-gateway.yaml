apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: threat-engine-engines
  labels:
    app: api-gateway
    tier: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        tier: gateway
    spec:
      serviceAccountName: engine-sa
      tolerations:
      - key: "spot-scanner"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      containers:
      - name: api-gateway
        image: yadavanup84/api-gateway:v-inv-panel5
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: PYTHONPATH
          value: /app
        - name: LOG_LEVEL
          value: "INFO"
        - name: BFF_MOCK_FALLBACK
          value: "false"
        - name: NEXT_PUBLIC_VULN_API_KEY
          value: "threat-engine-internal-key"
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: s3-mount-config
              key: s3-region
        # Engine URLs (uniform naming)
        - name: THREAT_ENGINE_URL
          value: "http://engine-threat.threat-engine-engines.svc.cluster.local"
        - name: COMPLIANCE_ENGINE_URL
          value: "http://engine-compliance.threat-engine-engines.svc.cluster.local"
        - name: INVENTORY_ENGINE_URL
          value: "http://engine-inventory.threat-engine-engines.svc.cluster.local"
        - name: ONBOARDING_ENGINE_URL
          value: "http://engine-onboarding.threat-engine-engines.svc.cluster.local"
        - name: RULE_ENGINE_URL
          value: "http://engine-rule.threat-engine-engines.svc.cluster.local"
        - name: DISCOVERIES_ENGINE_URL
          value: "http://engine-discoveries.threat-engine-engines.svc.cluster.local"
        - name: CHECK_ENGINE_URL
          value: "http://engine-check.threat-engine-engines.svc.cluster.local"
        - name: IAM_ENGINE_URL
          value: "http://engine-iam.threat-engine-engines.svc.cluster.local"
        - name: DATASEC_ENGINE_URL
          value: "http://engine-datasec.threat-engine-engines.svc.cluster.local"
        - name: SECOPS_ENGINE_URL
          value: "http://engine-secops.threat-engine-engines.svc.cluster.local"
        - name: RISK_ENGINE_URL
          value: "http://engine-risk.threat-engine-engines.svc.cluster.local:8009"
        - name: ENCRYPTION_ENGINE_URL
          value: "http://engine-encryption.threat-engine-engines.svc.cluster.local"
        - name: CDR_ENGINE_URL
          value: "http://engine-cdr.threat-engine-engines.svc.cluster.local"
        - name: AI_SECURITY_ENGINE_URL
          value: "http://engine-ai-security.threat-engine-engines.svc.cluster.local"
        - name: CONTAINER_SEC_ENGINE_URL
          value: "http://engine-container-sec.threat-engine-engines.svc.cluster.local"
        - name: CNAPP_ENGINE_URL
          value: "http://engine-cnapp.threat-engine-engines.svc.cluster.local"
        - name: CWPP_ENGINE_URL
          value: "http://engine-cwpp.threat-engine-engines.svc.cluster.local"
        - name: NETWORK_ENGINE_URL
          value: "http://engine-network.threat-engine-engines.svc.cluster.local"
        - name: VULNERABILITY_ENGINE_URL
          value: "http://engine-vulnerability.threat-engine-engines.svc.cluster.local"
        - name: VUL_ENGINE_EXTERNAL_URL
          value: "http://a248499a3e9da47248ad0adca7dac106-365a099e4a3b2214.elb.ap-south-1.amazonaws.com/vulnerability"
        - name: DBSEC_ENGINE_URL
          value: "http://engine-dbsec.threat-engine-engines.svc.cluster.local"
        - name: PIPELINE_MONITOR_URL
          value: "http://engine-pipeline-monitor.threat-engine-engines.svc.cluster.local"
        - name: BILLING_ENGINE_URL
          value: "http://engine-billing.threat-engine-engines.svc.cluster.local:8040"
        - name: PLATFORM_ADMIN_ENGINE_URL
          value: "http://engine-platform-admin.threat-engine-engines.svc.cluster.local:8041"
        - name: ARGO_SERVER_URL
          value: "http://argo-server.argo.svc.cluster.local:2746"
        - name: ATTACK_PATH_ENGINE_URL
          value: "http://engine-attack-path.threat-engine-engines.svc.cluster.local:80"
        - name: API_SECURITY_ENGINE_URL
          value: "http://engine-api-security.threat-engine-engines.svc.cluster.local"
        - name: DI_ENGINE_URL
          value: "http://engine-di.threat-engine-engines.svc.cluster.local"
        - name: DI_ENGINE_ENABLED
          value: "true"
        - name: DI_DB_HOST
          value: "postgres-vulnerability-db.cbm92xowvx2t.ap-south-1.rds.amazonaws.com"
        - name: DI_DB_PORT
          value: "5432"
        - name: DI_DB_NAME
          value: "threat_engine_di"
        - name: DI_DB_USER
          value: "postgres"
        - name: DI_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: threat-engine-db-passwords
              key: DI_DB_PASSWORD
        # Inventory DB — used by asset_posture BFF endpoint (AP-P4-04)
        - name: INVENTORY_DB_HOST
          valueFrom:
            configMapKeyRef:
              name: threat-engine-db-config
              key: INVENTORY_DB_HOST
        - name: INVENTORY_DB_PORT
          valueFrom:
            configMapKeyRef:
              name: threat-engine-db-config
              key: INVENTORY_DB_PORT
        - name: INVENTORY_DB_NAME
          valueFrom:
            configMapKeyRef:
              name: threat-engine-db-config
              key: INVENTORY_DB_NAME
        - name: INVENTORY_DB_USER
          valueFrom:
            configMapKeyRef:
              name: threat-engine-db-config
              key: INVENTORY_DB_USER
        - name: INVENTORY_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: threat-engine-db-passwords
              key: INVENTORY_DB_PASSWORD
        # CSP ConfigScan Engine URLs
        - name: CONFIGSCAN_AWS_URL
          value: "http://engine-configscan-aws.threat-engine-engines.svc.cluster.local"
        - name: CONFIGSCAN_AZURE_URL
          value: "http://engine-configscan-azure.threat-engine-engines.svc.cluster.local"
        - name: CONFIGSCAN_GCP_URL
          value: "http://engine-configscan-gcp.threat-engine-engines.svc.cluster.local"
        - name: CONFIGSCAN_ALICLOUD_URL
          value: "http://engine-configscan-alicloud.threat-engine-engines.svc.cluster.local"
        - name: CONFIGSCAN_OCI_URL
          value: "http://engine-configscan-oci.threat-engine-engines.svc.cluster.local"
        - name: CONFIGSCAN_IBM_URL
          value: "http://engine-configscan-ibm.threat-engine-engines.svc.cluster.local"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /gateway/health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /gateway/health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: threat-engine-engines
  labels:
    app: api-gateway
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: api-gateway
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-lb
  namespace: threat-engine-engines
  labels:
    app: api-gateway
    service-type: loadbalancer
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: api-gateway
