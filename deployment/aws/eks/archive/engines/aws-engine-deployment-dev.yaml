apiVersion: apps/v1
kind: Deployment
metadata:
  name: aws-compliance-engine
  namespace: threat-engine-engines
  labels:
    app: aws-compliance-engine
    tier: engine
    environment: development
spec:
  replicas: 1  # Reduced from 3 for dev
  selector:
    matchLabels:
      app: aws-compliance-engine
  template:
    metadata:
      labels:
        app: aws-compliance-engine
        tier: engine
        environment: development
    spec:
      serviceAccountName: aws-compliance-engine-sa
      containers:
      - name: aws-engine
        image: yadavanup84/threat-engine-aws-compliance:latest
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: PYTHONPATH
          value: /app
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "256Mi"  # Reduced from 512Mi
            cpu: "100m"      # Reduced from 250m
          limits:
            memory: "1Gi"    # Reduced from 2Gi
            cpu: "500m"      # Reduced from 1000m
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: aws-compliance-engine
  namespace: threat-engine-engines
  labels:
    app: aws-compliance-engine
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: aws-compliance-engine

