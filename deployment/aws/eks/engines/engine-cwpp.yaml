apiVersion: apps/v1
kind: Deployment
metadata:
  name: engine-cwpp
  namespace: threat-engine-engines
  labels:
    app: engine-cwpp
    tier: engine
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: engine-cwpp
  template:
    metadata:
      labels:
        app: engine-cwpp
        tier: engine
    spec:
      serviceAccountName: engine-sa
      containers:
      - name: engine-cwpp
        image: yadavanup84/engine-cwpp:v-cwpp-graceful
        imagePullPolicy: Always
        ports:
        - containerPort: 8016
          name: http
        env:
        - name: PYTHONPATH
          value: /app
        - name: LOG_LEVEL
          value: "INFO"
        - name: CWPP_PORT
          value: "8016"

        # ── Source engine URLs (internal K8s ClusterIP services) ────────────
        # Containers / Images / Serverless / Runtime
        - name: CONTAINER_SEC_URL
          value: "http://engine-container-sec"
        # Host OS / Middleware CVEs (agent-based)
        - name: VUL_ENGINE_URL
          value: "http://engine-vul"
        # Dependency / SBOM CVEs
        - name: SBOM_ENGINE_URL
          value: "http://engine-sbom"
        # Image scanning placeholder
        - name: SECOPS_ENGINE_URL
          value: "http://engine-secops"

        # ── OpenTelemetry ────────────────────────────────────────────────────
        - name: OTEL_SERVICE_NAME
          value: "engine-cwpp"
        - name: OTEL_ENABLED
          valueFrom:
            configMapKeyRef:
              name: otel-config
              key: OTEL_ENABLED
              optional: true
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: otel-config
              key: OTEL_EXPORTER_OTLP_ENDPOINT
              optional: true
        - name: OTEL_EXPORTER_OTLP_INSECURE
          valueFrom:
            configMapKeyRef:
              name: otel-config
              key: OTEL_EXPORTER_OTLP_INSECURE
              optional: true

        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"

        livenessProbe:
          httpGet:
            path: /api/v1/health/live
            port: 8016
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 6

        readinessProbe:
          httpGet:
            path: /api/v1/health/ready
            port: 8016
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: engine-cwpp
  namespace: threat-engine-engines
  labels:
    app: engine-cwpp
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8016
    protocol: TCP
    name: http
  selector:
    app: engine-cwpp
