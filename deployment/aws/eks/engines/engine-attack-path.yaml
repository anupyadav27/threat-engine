# Attack Path Engine — K8s Deployment + Service
# Pipeline stage 6.5: runs after graph-build, before risk.
# Port 8025 (svc port 80 → targetPort 8025).
# DB: threat_engine_attack_path (new database).
# Image tag: yadavanup84/engine-attack-path:v-attack-path1
apiVersion: apps/v1
kind: Deployment
metadata:
  name: engine-attack-path
  namespace: threat-engine-engines
  labels:
    app: engine-attack-path
    tier: engine
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: engine-attack-path
  template:
    metadata:
      labels:
        app: engine-attack-path
        tier: engine
    spec:
      serviceAccountName: engine-sa
      tolerations:
      - key: spot-scanner
        operator: Equal
        value: "true"
        effect: NoSchedule
      containers:
      - name: engine-attack-path
        image: yadavanup84/engine-attack-path:v-di-catalog1
        imagePullPolicy: Always
        ports:
        - containerPort: 8025
          name: http
        envFrom:
        - configMapRef:
            name: threat-engine-db-config
        - secretRef:
            name: threat-engine-db-passwords
        - secretRef:
            name: threat-engine-secrets
        env:
        - name: PYTHONPATH
          value: /app
        - name: LOG_LEVEL
          value: "INFO"
        - name: ENGINE_NAME
          value: "attack-path"
        # ── Attack Path DB ─────────────────────────────────────────────────
        - name: ATTACK_PATH_DB_HOST
          valueFrom:
            configMapKeyRef:
              name: threat-engine-db-config
              key: DB_HOST
        - name: ATTACK_PATH_DB_PORT
          value: "5432"
        - name: ATTACK_PATH_DB_USER
          value: "postgres"
        - name: ATTACK_PATH_DB_NAME
          value: "threat_engine_attack_path"
        - name: ATTACK_PATH_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: threat-engine-db-passwords
              key: ATTACK_PATH_DB_PASSWORD
              optional: true
        # ── Inventory DB (resource_security_posture) ────────────────────────
        - name: INVENTORY_DB_HOST
          valueFrom:
            configMapKeyRef:
              name: threat-engine-db-config
              key: DB_HOST
        - name: INVENTORY_DB_PORT
          value: "5432"
        - name: INVENTORY_DB_USER
          value: "postgres"
        - name: INVENTORY_DB_NAME
          value: "threat_engine_inventory"
        - name: INVENTORY_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: threat-engine-db-passwords
              key: INVENTORY_DB_PASSWORD
              optional: true
        # ── Onboarding DB (scan_runs metadata) ─────────────────────────────
        - name: ONBOARDING_DB_HOST
          valueFrom:
            configMapKeyRef:
              name: threat-engine-db-config
              key: DB_HOST
        - name: ONBOARDING_DB_PORT
          value: "5432"
        - name: ONBOARDING_DB_USER
          value: "postgres"
        - name: ONBOARDING_DB_NAME
          value: "threat_engine_onboarding"
        - name: ONBOARDING_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: threat-engine-db-passwords
              key: DISCOVERIES_DB_PASSWORD
              optional: true
        # ── Threat DB (threat_scenario_incidents for enrichment) ───────────
        - name: THREAT_DB_HOST
          valueFrom:
            configMapKeyRef:
              name: threat-engine-db-config
              key: DB_HOST
        - name: THREAT_DB_PORT
          value: "5432"
        - name: THREAT_DB_USER
          value: "postgres"
        - name: THREAT_DB_NAME
          value: "threat_engine_threat"
        - name: THREAT_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: threat-engine-db-passwords
              key: THREAT_DB_PASSWORD
              optional: true
        # ── Neo4j ──────────────────────────────────────────────────────────
        - name: NEO4J_URI
          valueFrom:
            secretKeyRef:
              name: threat-engine-db-passwords
              key: NEO4J_URI
              optional: true
        - name: NEO4J_USER
          valueFrom:
            secretKeyRef:
              name: threat-engine-db-passwords
              key: NEO4J_USER
              optional: true
        - name: NEO4J_PASSWORD
          valueFrom:
            secretKeyRef:
              name: threat-engine-db-passwords
              key: NEO4J_PASSWORD
              optional: true
        # ── Internal scan secret (Argo trigger auth) ────────────────────────
        - name: X_INTERNAL_SECRET
          valueFrom:
            secretKeyRef:
              name: threat-engine-secrets
              key: X_INTERNAL_SECRET
              optional: true
        # ── DI engine feature flag + DB credentials ────────────
        - name: DI_ENGINE_ENABLED
          value: "true"
        - name: DI_DB_HOST
          value: "postgres-vulnerability-db.cbm92xowvx2t.ap-south-1.rds.amazonaws.com"
        - name: DI_DB_PORT
          value: "5432"
        - name: DI_DB_NAME
          value: "threat_engine_di"
        - name: DI_DB_USER
          value: "postgres"
        - name: DI_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: threat-engine-db-passwords
              key: DI_DB_PASSWORD
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /api/v1/health/live
            port: 8025
          initialDelaySeconds: 30
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/v1/health/ready
            port: 8025
          initialDelaySeconds: 15
          periodSeconds: 15
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: engine-attack-path
  namespace: threat-engine-engines
  labels:
    app: engine-attack-path
spec:
  selector:
    app: engine-attack-path
  ports:
  - name: http
    port: 80
    targetPort: 8025
    protocol: TCP
  type: ClusterIP
