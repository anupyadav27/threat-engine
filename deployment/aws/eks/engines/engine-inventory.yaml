apiVersion: apps/v1
kind: Deployment
metadata:
  name: engine-inventory
  namespace: threat-engine-engines
  labels:
    app: engine-inventory
    tier: engine
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: engine-inventory
  template:
    metadata:
      labels:
        app: engine-inventory
        tier: engine
    spec:
      serviceAccountName: engine-sa
      containers:
      - name: engine-inventory
        image: yadavanup84/inventory-engine:v-refactor
        imagePullPolicy: Always
        ports:
        - containerPort: 8022
          name: http
        envFrom:
        - configMapRef:
            name: threat-engine-db-config
        - secretRef:
            name: threat-engine-db-passwords
        env:
        - name: PYTHONPATH
          value: /app
        - name: LOG_LEVEL
          value: "INFO"
        # ── OpenTelemetry ─────────────────────────────────────────────────
        - name: OTEL_SERVICE_NAME
          value: "engine-inventory"
        - name: OTEL_ENABLED
          valueFrom:
            configMapKeyRef:
              name: otel-config
              key: OTEL_ENABLED
              optional: true
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: otel-config
              key: OTEL_EXPORTER_OTLP_ENDPOINT
              optional: true
        - name: OTEL_EXPORTER_OTLP_INSECURE
          valueFrom:
            configMapKeyRef:
              name: otel-config
              key: OTEL_EXPORTER_OTLP_INSECURE
              optional: true
        - name: OTEL_TRACES_SAMPLER
          valueFrom:
            configMapKeyRef:
              name: otel-config
              key: OTEL_TRACES_SAMPLER
              optional: true
        - name: OTEL_PROPAGATORS
          valueFrom:
            configMapKeyRef:
              name: otel-config
              key: OTEL_PROPAGATORS
              optional: true
        - name: PORT
          value: "8022"
        - name: ENGINE_NAME
          value: "inventory"
        - name: USE_DATABASE
          value: "true"
        # ── Scanner Job config ────────────────────────────────────────────
        - name: INVENTORY_SCANNER_IMAGE
          value: "yadavanup84/inventory-engine:v-refactor"
        - name: SCANNER_CPU_REQUEST
          value: "250m"
        - name: SCANNER_MEM_REQUEST
          value: "1Gi"
        - name: SCANNER_CPU_LIMIT
          value: "1"
        - name: SCANNER_MEM_LIMIT
          value: "2Gi"
        # ── Onboarding DB (for orchestration metadata) ────────────────────
        - name: ONBOARDING_DB_HOST
          valueFrom:
            configMapKeyRef:
              name: threat-engine-db-config
              key: ONBOARDING_DB_HOST
        - name: ONBOARDING_DB_PORT
          valueFrom:
            configMapKeyRef:
              name: threat-engine-db-config
              key: ONBOARDING_DB_PORT
        - name: ONBOARDING_DB_NAME
          valueFrom:
            configMapKeyRef:
              name: threat-engine-db-config
              key: ONBOARDING_DB_NAME
        - name: ONBOARDING_DB_USER
          valueFrom:
            configMapKeyRef:
              name: threat-engine-db-config
              key: ONBOARDING_DB_USER
        - name: ONBOARDING_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: threat-engine-db-passwords
              key: ONBOARDING_DB_PASSWORD
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /api/v1/health/live
            port: 8022
          initialDelaySeconds: 30
          periodSeconds: 15
          failureThreshold: 20
        readinessProbe:
          httpGet:
            path: /api/v1/health/ready
            port: 8022
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: engine-inventory
  namespace: threat-engine-engines
  labels:
    app: engine-inventory
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8022
    protocol: TCP
    name: http
  selector:
    app: engine-inventory
