apiVersion: apps/v1
kind: Deployment
metadata:
  name: engine-chat
  namespace: threat-engine-engines
  labels:
    app: engine-chat
    tier: engine
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: engine-chat
  template:
    metadata:
      labels:
        app: engine-chat
        tier: engine
    spec:
      serviceAccountName: engine-sa
      containers:
      - name: engine-chat
        image: yadavanup84/engine-chat:v-chat-1
        imagePullPolicy: Always
        ports:
        - containerPort: 8036
          name: http
        envFrom:
        - configMapRef:
            name: threat-engine-db-config
        - secretRef:
            name: threat-engine-db-passwords
        env:
        - name: PYTHONPATH
          value: /app
        - name: ENGINE_NAME
          value: "chat"
        - name: AWS_REGION
          value: "ap-south-1"
        - name: BEDROCK_MODEL_ID
          value: "anthropic.claude-3-5-sonnet-20241022-v2:0"
        - name: COMPLIANCE_ENGINE_URL
          value: "http://engine-compliance:8010"
        - name: ONBOARDING_ENGINE_URL
          value: "http://engine-onboarding:8008"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/v1/health/live
            port: 8036
          initialDelaySeconds: 20
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /api/v1/health/ready
            port: 8036
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: engine-chat
  namespace: threat-engine-engines
  labels:
    app: engine-chat
spec:
  selector:
    app: engine-chat
  ports:
  - port: 80
    targetPort: 8036
    protocol: TCP
    name: http
  type: ClusterIP
