apiVersion: apps/v1
kind: Deployment
metadata:
  name: engine-datasec-enhanced
  namespace: threat-engine-engines
  labels:
    app: engine-datasec-enhanced
    engine: datasec-enhanced
    layer: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: engine-datasec-enhanced
  template:
    metadata:
      labels:
        app: engine-datasec-enhanced
        engine: datasec-enhanced
        layer: "3"
    spec:
      containers:
        - name: engine-datasec-enhanced
          image: yadavanup84/engine-datasec-enhanced:v1.0
          ports:
            - containerPort: 8033
          env:
            - name: DATASEC_ENHANCED_DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: threat-engine-db-config
                  key: DB_HOST
            - name: DATASEC_ENHANCED_DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: threat-engine-db-config
                  key: DB_PORT
            - name: DATASEC_ENHANCED_DB_NAME
              value: "threat_engine_datasec_enhanced"
            - name: DATASEC_ENHANCED_DB_USER
              valueFrom:
                secretKeyRef:
                  name: external-secret-db-passwords
                  key: DB_USER
            - name: DATASEC_ENHANCED_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: external-secret-db-passwords
                  key: DB_PASSWORD
            - name: DISCOVERY_DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: threat-engine-db-config
                  key: DB_HOST
            - name: DISCOVERY_DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: threat-engine-db-config
                  key: DB_PORT
            - name: DISCOVERY_DB_NAME
              value: "threat_engine_discoveries"
            - name: DISCOVERY_DB_USER
              valueFrom:
                secretKeyRef:
                  name: external-secret-db-passwords
                  key: DB_USER
            - name: DISCOVERY_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: external-secret-db-passwords
                  key: DB_PASSWORD
            - name: LOG_DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: threat-engine-db-config
                  key: DB_HOST
            - name: LOG_DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: threat-engine-db-config
                  key: DB_PORT
            - name: LOG_DB_NAME
              value: "threat_engine_logs"
            - name: LOG_DB_USER
              valueFrom:
                secretKeyRef:
                  name: external-secret-db-passwords
                  key: DB_USER
            - name: LOG_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: external-secret-db-passwords
                  key: DB_PASSWORD
            - name: DATASEC_DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: threat-engine-db-config
                  key: DB_HOST
            - name: DATASEC_DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: threat-engine-db-config
                  key: DB_PORT
            - name: DATASEC_DB_NAME
              value: "threat_engine_datasec"
            - name: DATASEC_DB_USER
              valueFrom:
                secretKeyRef:
                  name: external-secret-db-passwords
                  key: DB_USER
            - name: DATASEC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: external-secret-db-passwords
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: 8033
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 8033
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: engine-datasec-enhanced
  namespace: threat-engine-engines
  labels:
    app: engine-datasec-enhanced
spec:
  type: ClusterIP
  ports:
    - port: 8033
      targetPort: 8033
      protocol: TCP
  selector:
    app: engine-datasec-enhanced
