apiVersion: apps/v1
kind: Deployment
metadata:
  name: engine-discoveries
  namespace: threat-engine-engines
  labels:
    app: engine-discoveries
    tier: engine
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: engine-discoveries
  template:
    metadata:
      labels:
        app: engine-discoveries
        tier: engine
    spec:
      serviceAccountName: engine-sa
      containers:
      - name: engine-discoveries
        image: yadavanup84/engine-discoveries-aws:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8001
          name: http
        envFrom:
        - configMapRef:
            name: threat-engine-db-config
        - secretRef:
            name: threat-engine-db-passwords
        env:
        - name: PYTHONPATH
          value: /app
        - name: LOG_LEVEL
          value: "INFO"
        - name: S3_BUCKET
          valueFrom:
            configMapKeyRef:
              name: s3-mount-config
              key: s3-bucket
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: s3-mount-config
              key: s3-region
        - name: OUTPUT_DIR
          value: "/output"
        - name: INPUT_DIR
          value: "/input"
        - name: ENGINE_NAME
          value: "discoveries"
        - name: DISCOVERY_MODE
          value: "database"
        - name: DISCOVERY_CONFIG_SOURCE
          value: "database"
        - name: MAX_SERVICE_WORKERS
          value: "5"
        - name: MAX_REGION_WORKERS
          value: "3"
        # Onboarding database environment variables for orchestration integration
        # MOVED: scan_orchestration table moved from shared to onboarding DB
        - name: ONBOARDING_DB_HOST
          value: "postgres-vulnerability-db.cbm92xowvx2t.ap-south-1.rds.amazonaws.com"
        - name: ONBOARDING_DB_PORT
          value: "5432"
        - name: ONBOARDING_DB_NAME
          value: "threat_engine_onboarding"
        - name: ONBOARDING_DB_USER
          value: "postgres"
        - name: ONBOARDING_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: threat-engine-db-passwords
              key: ONBOARDING_DB_PASSWORD
        - name: ORCHESTRATION_ENABLED
          value: "true"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/v1/health/live
            port: 8001
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 10
        readinessProbe:
          httpGet:
            path: /api/v1/health/ready
            port: 8001
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6

      # No sidecar needed — discoveries writes directly to DB
---
apiVersion: v1
kind: Service
metadata:
  name: engine-discoveries
  namespace: threat-engine-engines
  labels:
    app: engine-discoveries
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8001
    protocol: TCP
    name: http
  selector:
    app: engine-discoveries
