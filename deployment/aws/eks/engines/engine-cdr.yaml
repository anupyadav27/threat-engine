apiVersion: apps/v1
kind: Deployment
metadata:
  name: engine-cdr
  namespace: threat-engine-engines
  labels:
    app: engine-cdr
    tier: engine
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: engine-cdr
  template:
    metadata:
      labels:
        app: engine-cdr
        tier: engine
    spec:
      serviceAccountName: engine-sa
      containers:
      - name: engine-cdr
        image: yadavanup84/engine-cdr:v-cdr-internal-auth1
        imagePullPolicy: Always
        ports:
        - containerPort: 8025
          name: http
        envFrom:
        - configMapRef:
            name: threat-engine-db-config
        - secretRef:
            name: threat-engine-db-passwords
        env:
        - name: PYTHONPATH
          value: /app
        - name: ENGINE_NAME
          value: "cdr"
        - name: LOG_LOOKBACK_HOURS
          value: "1"          # fallback for first run (no watermark yet); 1h = safe for CloudTrail delivery lag
        - name: LOG_MAX_EVENTS
          value: "500000"     # 1h window is far below this; raised so cap is never a limiting factor
        - name: LOG_EVENTS_RETAIN_DAYS
          value: "7"          # raw events in DB (hot); older events archived to S3 by retention system
        - name: CDR_SCANNER_IMAGE
          value: "yadavanup84/engine-cdr:v-cdr-internal-auth1"
        - name: DISCOVERIES_API_URL
          value: "http://engine-discoveries"

        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/v1/health/live
            port: 8025
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /api/v1/health/ready
            port: 8025
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: engine-cdr
  namespace: threat-engine-engines
spec:
  selector:
    app: engine-cdr
  ports:
  - port: 80
    targetPort: 8025
    name: http
