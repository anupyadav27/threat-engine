apiVersion: apps/v1
kind: Deployment
metadata:
  name: oci-compliance-engine
  namespace: threat-engine-engines
  labels:
    app: oci-compliance-engine
    tier: engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oci-compliance-engine
  template:
    metadata:
      labels:
        app: oci-compliance-engine
        tier: engine
    spec:
      containers:
      - name: oci-engine
        image: yadavanup84/threat-engine-oci-compliance:latest
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: PYTHONPATH
          value: /app
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: oci-compliance-engine
  namespace: threat-engine-engines
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
  selector:
    app: oci-compliance-engine

