# ============================================================================
# Network Security Engine K8s Manifest (v2 — layered architecture)
# Deployment + Service — Port 8004 (container) / 80 (service)
# ============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: engine-network
  namespace: threat-engine-engines
  labels:
    app: engine-network
    engine: network-security
    tier: layer-3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: engine-network
  template:
    metadata:
      labels:
        app: engine-network
        engine: network-security
    spec:
      serviceAccountName: engine-sa
      containers:
        - name: engine-network
          image: yadavanup84/engine-network-security:v-rule-enrich
          imagePullPolicy: Always
          ports:
            - containerPort: 8004
          envFrom:
            - configMapRef:
                name: threat-engine-db-config
          env:
            - name: PYTHONPATH
              value: /app
            - name: DB_SSLMODE
              value: require
            # Network DB
            - name: NETWORK_DB_NAME
              value: threat_engine_network
            - name: NETWORK_DB_HOST
              value: postgres-vulnerability-db.cbm92xowvx2t.ap-south-1.rds.amazonaws.com
            - name: NETWORK_DB_PORT
              value: "5432"
            - name: NETWORK_DB_USER
              value: postgres
            - name: NETWORK_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: threat-engine-db-passwords
                  key: NETWORK_DB_PASSWORD
            # Discoveries DB
            - name: DISCOVERIES_DB_NAME
              value: threat_engine_discoveries
            - name: DISCOVERIES_DB_HOST
              value: postgres-vulnerability-db.cbm92xowvx2t.ap-south-1.rds.amazonaws.com
            - name: DISCOVERIES_DB_PORT
              value: "5432"
            - name: DISCOVERIES_DB_USER
              value: postgres
            - name: DISCOVERIES_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: threat-engine-db-passwords
                  key: DISCOVERIES_DB_PASSWORD
            # Check DB
            - name: CHECK_DB_NAME
              value: threat_engine_check
            - name: CHECK_DB_HOST
              value: postgres-vulnerability-db.cbm92xowvx2t.ap-south-1.rds.amazonaws.com
            - name: CHECK_DB_PORT
              value: "5432"
            - name: CHECK_DB_USER
              value: postgres
            - name: CHECK_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: threat-engine-db-passwords
                  key: CHECK_DB_PASSWORD
            # Inventory DB
            - name: INVENTORY_DB_NAME
              value: threat_engine_inventory
            - name: INVENTORY_DB_HOST
              value: postgres-vulnerability-db.cbm92xowvx2t.ap-south-1.rds.amazonaws.com
            - name: INVENTORY_DB_PORT
              value: "5432"
            - name: INVENTORY_DB_USER
              value: postgres
            - name: INVENTORY_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: threat-engine-db-passwords
                  key: INVENTORY_DB_PASSWORD
            # Onboarding DB
            - name: ONBOARDING_DB_NAME
              value: threat_engine_onboarding
            - name: ONBOARDING_DB_HOST
              value: postgres-vulnerability-db.cbm92xowvx2t.ap-south-1.rds.amazonaws.com
            - name: ONBOARDING_DB_PORT
              value: "5432"
            - name: ONBOARDING_DB_USER
              value: postgres
            - name: ONBOARDING_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: threat-engine-db-passwords
                  key: ONBOARDING_DB_PASSWORD
            # Scanner image
            - name: NETWORK_SCANNER_IMAGE
              value: yadavanup84/engine-network-security:v-rule-enrich
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: 8004
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 8004
            initialDelaySeconds: 10
            periodSeconds: 5
      restartPolicy: Always

---

apiVersion: v1
kind: Service
metadata:
  name: engine-network
  namespace: threat-engine-engines
  labels:
    app: engine-network
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8004
      protocol: TCP
  selector:
    app: engine-network
