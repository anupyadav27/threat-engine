apiVersion: apps/v1
kind: Deployment
metadata:
  name: engine-datasec
  namespace: threat-engine-engines
  labels:
    app: engine-datasec
    tier: engine
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: engine-datasec
  template:
    metadata:
      labels:
        app: engine-datasec
        tier: engine
    spec:
      serviceAccountName: engine-sa
      containers:
      - name: engine-datasec
        image: yadavanup84/engine-datasec:v-no-arn
        imagePullPolicy: Always
        ports:
        - containerPort: 8004
          name: http
        envFrom:
        - configMapRef:
            name: threat-engine-db-config
        - secretRef:
            name: threat-engine-db-passwords
        env:
        - name: PYTHONPATH
          value: /app
        - name: LOG_LEVEL
          value: "INFO"
        # ── OpenTelemetry ─────────────────────────────────────────────────
        - name: OTEL_SERVICE_NAME
          value: "engine-datasec"
        - name: OTEL_ENABLED
          valueFrom:
            configMapKeyRef:
              name: otel-config
              key: OTEL_ENABLED
              optional: true
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: otel-config
              key: OTEL_EXPORTER_OTLP_ENDPOINT
              optional: true
        - name: OTEL_EXPORTER_OTLP_INSECURE
          valueFrom:
            configMapKeyRef:
              name: otel-config
              key: OTEL_EXPORTER_OTLP_INSECURE
              optional: true
        - name: OTEL_TRACES_SAMPLER
          valueFrom:
            configMapKeyRef:
              name: otel-config
              key: OTEL_TRACES_SAMPLER
              optional: true
        - name: OTEL_PROPAGATORS
          valueFrom:
            configMapKeyRef:
              name: otel-config
              key: OTEL_PROPAGATORS
              optional: true
        - name: S3_BUCKET
          valueFrom:
            configMapKeyRef:
              name: s3-mount-config
              key: s3-bucket
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: s3-mount-config
              key: s3-region
        - name: OUTPUT_DIR
          value: "/output"
        - name: ENGINE_NAME
          value: "datasec"
        volumeMounts:
        - name: output
          mountPath: /output
        - name: input
          mountPath: /input
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "2Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/v1/health/live
            port: 8004
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 6
        readinessProbe:
          httpGet:
            path: /api/v1/health/ready
            port: 8004
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 6

      - name: s3-sync
        image: amazon/aws-cli:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            while true; do
              if [ -d "/output" ] && [ "$(ls -A /output 2>/dev/null)" ]; then
                aws s3 sync /output "s3://${S3_BUCKET}/engine_output/${ENGINE_NAME}/" \
                  --region ${AWS_REGION} --exclude "*.tmp" --exclude "*.lock" --delete 2>/dev/null
              fi
              sleep 30
            done
        env:
        - name: S3_BUCKET
          valueFrom:
            configMapKeyRef:
              name: s3-mount-config
              key: s3-bucket
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: s3-mount-config
              key: s3-region
        - name: ENGINE_NAME
          value: "datasec"
        volumeMounts:
        - name: output
          mountPath: /output
        resources:
          requests:
            memory: "64Mi"
            cpu: "25m"
          limits:
            memory: "128Mi"
            cpu: "100m"

      volumes:
      - name: output
        emptyDir: {}
      - name: input
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: engine-datasec
  namespace: threat-engine-engines
  labels:
    app: engine-datasec
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8004
    protocol: TCP
    name: http
  selector:
    app: engine-datasec
