apiVersion: apps/v1
kind: Deployment
metadata:
  name: engine-datasec
  namespace: threat-engine-engines
  labels:
    app: engine-datasec
    tier: engine
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: engine-datasec
  template:
    metadata:
      labels:
        app: engine-datasec
        tier: engine
    spec:
      serviceAccountName: engine-sa
      containers:
      - name: engine-datasec
        image: yadavanup84/engine-datasec:v-refactor
        imagePullPolicy: Always
        ports:
        - containerPort: 8004
          name: http
        envFrom:
        - configMapRef:
            name: threat-engine-db-config
        - secretRef:
            name: threat-engine-db-passwords
        env:
        - name: PYTHONPATH
          value: /app
        - name: LOG_LEVEL
          value: "INFO"
        # ── Scanner Job config ─────────────────────────────────────────────
        - name: DATASEC_SCANNER_IMAGE
          value: "yadavanup84/engine-datasec:v-refactor"
        - name: SCANNER_CPU_REQUEST
          value: "100m"
        - name: SCANNER_MEM_REQUEST
          value: "512Mi"
        - name: SCANNER_CPU_LIMIT
          value: "250m"
        - name: SCANNER_MEM_LIMIT
          value: "1Gi"
        - name: SCANNER_NAMESPACE
          value: "threat-engine-engines"
        - name: SCANNER_SERVICE_ACCOUNT
          value: "engine-sa"
        # ── Onboarding DB (for orchestration queries) ───────────────────────
        - name: ONBOARDING_DB_HOST
          value: "postgres-vulnerability-db.cbm92xowvx2t.ap-south-1.rds.amazonaws.com"
        - name: ONBOARDING_DB_PORT
          value: "5432"
        - name: ONBOARDING_DB_USER
          value: "postgres"
        - name: ONBOARDING_DB_NAME
          value: "threat_engine_onboarding"
        - name: ONBOARDING_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: threat-engine-db-passwords
              key: ONBOARDING_DB_PASSWORD
              optional: true
        # ── OpenTelemetry ─────────────────────────────────────────────────
        - name: OTEL_SERVICE_NAME
          value: "engine-datasec"
        - name: OTEL_ENABLED
          valueFrom:
            configMapKeyRef:
              name: otel-config
              key: OTEL_ENABLED
              optional: true
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: otel-config
              key: OTEL_EXPORTER_OTLP_ENDPOINT
              optional: true
        - name: OTEL_EXPORTER_OTLP_INSECURE
          valueFrom:
            configMapKeyRef:
              name: otel-config
              key: OTEL_EXPORTER_OTLP_INSECURE
              optional: true
        - name: OTEL_TRACES_SAMPLER
          valueFrom:
            configMapKeyRef:
              name: otel-config
              key: OTEL_TRACES_SAMPLER
              optional: true
        - name: OTEL_PROPAGATORS
          valueFrom:
            configMapKeyRef:
              name: otel-config
              key: OTEL_PROPAGATORS
              optional: true
        - name: S3_BUCKET
          valueFrom:
            configMapKeyRef:
              name: s3-mount-config
              key: s3-bucket
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: s3-mount-config
              key: s3-region
        - name: OUTPUT_DIR
          value: "/output"
        - name: ENGINE_NAME
          value: "datasec"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /api/v1/health/live
            port: 8004
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 6
        readinessProbe:
          httpGet:
            path: /api/v1/health/ready
            port: 8004
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 6

      volumes:
      - name: output
        emptyDir: {}
      - name: input
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: engine-datasec
  namespace: threat-engine-engines
  labels:
    app: engine-datasec
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8004
    protocol: TCP
    name: http
  selector:
    app: engine-datasec
