apiVersion: apps/v1
kind: Deployment
metadata:
  name: engine-threat
  namespace: threat-engine-engines
  labels:
    app: engine-threat
    tier: engine
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: engine-threat
  template:
    metadata:
      labels:
        app: engine-threat
        tier: engine
    spec:
      serviceAccountName: engine-sa
      containers:
      - name: engine-threat
        image: yadavanup84/engine-threat:v-blast-radius-fix
        imagePullPolicy: Always
        ports:
        - containerPort: 8020
          name: http
        envFrom:
        - configMapRef:
            name: threat-engine-db-config
        - secretRef:
            name: threat-engine-db-passwords
        env:
        - name: PYTHONPATH
          value: /app
        - name: LOG_LEVEL
          value: "INFO"
        # ── Scanner Job config ─────────────────────────────────────────────
        - name: THREAT_SCANNER_IMAGE
          value: "yadavanup84/engine-threat:v-scan-runs"
        - name: SCANNER_CPU_REQUEST
          value: "250m"
        - name: SCANNER_MEM_REQUEST
          value: "1Gi"
        - name: SCANNER_CPU_LIMIT
          value: "1"
        - name: SCANNER_MEM_LIMIT
          value: "2Gi"
        # ── Onboarding DB (for orchestration metadata) ─────────────────────
        - name: ONBOARDING_DB_HOST
          value: "postgres-vulnerability-db.cbm92xowvx2t.ap-south-1.rds.amazonaws.com"
        - name: ONBOARDING_DB_PORT
          value: "5432"
        - name: ONBOARDING_DB_NAME
          value: "threat_engine_onboarding"
        - name: ONBOARDING_DB_USER
          value: "postgres"
        - name: ONBOARDING_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: threat-engine-db-passwords
              key: ONBOARDING_DB_PASSWORD
        # ── OpenTelemetry ─────────────────────────────────────────────────
        - name: OTEL_SERVICE_NAME
          value: "engine-threat"
        - name: OTEL_ENABLED
          valueFrom:
            configMapKeyRef:
              name: otel-config
              key: OTEL_ENABLED
              optional: true
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: otel-config
              key: OTEL_EXPORTER_OTLP_ENDPOINT
              optional: true
        - name: OTEL_EXPORTER_OTLP_INSECURE
          valueFrom:
            configMapKeyRef:
              name: otel-config
              key: OTEL_EXPORTER_OTLP_INSECURE
              optional: true
        - name: OTEL_TRACES_SAMPLER
          valueFrom:
            configMapKeyRef:
              name: otel-config
              key: OTEL_TRACES_SAMPLER
              optional: true
        - name: OTEL_PROPAGATORS
          valueFrom:
            configMapKeyRef:
              name: otel-config
              key: OTEL_PROPAGATORS
              optional: true
        - name: PORT
          value: "8020"
        - name: ENGINE_NAME
          value: "threat"
        - name: NEO4J_URI
          valueFrom:
            secretKeyRef:
              name: threat-engine-db-passwords
              key: NEO4J_URI
              optional: true
        - name: NEO4J_USER
          valueFrom:
            secretKeyRef:
              name: threat-engine-db-passwords
              key: NEO4J_USER
              optional: true
        - name: NEO4J_PASSWORD
          valueFrom:
            secretKeyRef:
              name: threat-engine-db-passwords
              key: NEO4J_PASSWORD
              optional: true
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "2Gi"
            cpu: "1"
        livenessProbe:
          httpGet:
            path: /api/v1/health/live
            port: 8020
          initialDelaySeconds: 30
          periodSeconds: 15
          failureThreshold: 20
        readinessProbe:
          httpGet:
            path: /api/v1/health/ready
            port: 8020
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: engine-threat
  namespace: threat-engine-engines
  labels:
    app: engine-threat
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8020
    protocol: TCP
    name: http
  selector:
    app: engine-threat
