# Check Engine — lightweight API pod that creates K8s Jobs for scans.
# The actual check scan runs as a Job on spot nodes (reads discovery_findings, evaluates rules).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: engine-check
  namespace: threat-engine-engines
  labels:
    app: engine-check
    tier: engine
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: engine-check
  template:
    metadata:
      labels:
        app: engine-check
        tier: engine
    spec:
      serviceAccountName: engine-sa
      containers:
      - name: engine-check
        image: yadavanup84/engine-check:v-std-cols
        imagePullPolicy: Always
        ports:
        - containerPort: 8002
          name: http
        envFrom:
        - configMapRef:
            name: threat-engine-db-config
        - secretRef:
            name: threat-engine-db-passwords
        env:
        - name: PYTHONPATH
          value: /app
        - name: LOG_LEVEL
          value: "INFO"
        - name: ENGINE_NAME
          value: "check"
        - name: CHECK_MODE
          value: "database"
        - name: AWS_REGION
          value: "ap-south-1"
        # ── Scanner Job config (used when creating K8s Jobs) ────
        - name: CHECK_SCANNER_IMAGE
          value: "yadavanup84/engine-check:v-refactor2"
        - name: SCANNER_CPU_REQUEST
          value: "500m"
        - name: SCANNER_MEM_REQUEST
          value: "2Gi"
        - name: SCANNER_CPU_LIMIT
          value: "1"
        - name: SCANNER_MEM_LIMIT
          value: "4Gi"
        # ── Onboarding DB (for orchestration metadata) ──────────
        - name: ONBOARDING_DB_HOST
          value: "postgres-vulnerability-db.cbm92xowvx2t.ap-south-1.rds.amazonaws.com"
        - name: ONBOARDING_DB_PORT
          value: "5432"
        - name: ONBOARDING_DB_NAME
          value: "threat_engine_onboarding"
        - name: ONBOARDING_DB_USER
          value: "postgres"
        - name: ONBOARDING_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: threat-engine-db-passwords
              key: ONBOARDING_DB_PASSWORD
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /api/v1/health/live
            port: 8002
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /api/v1/health/ready
            port: 8002
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: engine-check
  namespace: threat-engine-engines
  labels:
    app: engine-check
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8002
    protocol: TCP
    name: http
  selector:
    app: engine-check
