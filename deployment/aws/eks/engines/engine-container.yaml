# ============================================================================
# Container Engine K8s Manifest — Task 1.8 [Seq 54 | DO]
# Deployment + Service — Port 8006
# ============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: engine-container
  namespace: threat-engine-engines
  labels:
    app: engine-container
    component: engine
    tier: layer-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: engine-container
  template:
    metadata:
      labels:
        app: engine-container
        component: engine
        tier: layer-1
    spec:
      serviceAccountName: threat-engine-sa
      containers:
        - name: engine-container
          image: yadavanup84/engine-container:v1.0
          ports:
            - containerPort: 8006
              protocol: TCP
          envFrom:
            - configMapRef:
                name: threat-engine-db-config
          env:
            - name: CONTAINER_DB_NAME
              value: "threat_engine_container"
            - name: DISCOVERY_DB_NAME
              value: "threat_engine_discovery"
            - name: EXTERNAL_DB_NAME
              value: "threat_engine_external"
            - name: ONBOARDING_DB_NAME
              value: "threat_engine_onboarding"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: external-secret-db-passwords
                  key: container-db-password
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: 8006
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 8006
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
      restartPolicy: Always

---

apiVersion: v1
kind: Service
metadata:
  name: engine-container
  namespace: threat-engine-engines
  labels:
    app: engine-container
spec:
  type: ClusterIP
  ports:
    - port: 8006
      targetPort: 8006
      protocol: TCP
      name: http
  selector:
    app: engine-container
