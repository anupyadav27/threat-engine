apiVersion: apps/v1
kind: Deployment
metadata:
  name: engine-onboarding
  namespace: threat-engine-engines
  labels:
    app: engine-onboarding
    tier: engine
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: engine-onboarding
  template:
    metadata:
      labels:
        app: engine-onboarding
        tier: engine
    spec:
      serviceAccountName: engine-sa
      containers:
      - name: engine-onboarding
        image: yadavanup84/threat-engine-onboarding-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8008
          name: http
        envFrom:
        - configMapRef:
            name: threat-engine-db-config
        - secretRef:
            name: threat-engine-db-passwords
        env:
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: aws-region
        - name: SECRETS_MANAGER_PREFIX
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: secrets-manager-prefix
        - name: SECRETS_MANAGER_KMS_KEY_ID
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: secrets-manager-kms-key-id
              optional: true
        - name: PLATFORM_AWS_ACCOUNT_ID
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: aws-account-id
        - name: DYNAMODB_TENANTS_TABLE
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: dynamodb-tenants-table
        - name: DYNAMODB_PROVIDERS_TABLE
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: dynamodb-providers-table
        - name: DYNAMODB_ACCOUNTS_TABLE
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: dynamodb-accounts-table
        - name: DYNAMODB_SCHEDULES_TABLE
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: dynamodb-schedules-table
        - name: DYNAMODB_EXECUTIONS_TABLE
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: dynamodb-executions-table
        - name: DYNAMODB_SCAN_RESULTS_TABLE
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: dynamodb-scan-results-table
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: log-level
        - name: DATABASE_URL
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: database-url
        # Override: onboarding has its own DB with tables in public schema
        - name: SHARED_DB_NAME
          value: "threat_engine_onboarding"
        - name: DB_SCHEMA
          value: "public"
        - name: ROOT_PATH
          value: "/onboarding"
        - name: PORT
          value: "8008"
        # Engine URLs — all CSPs route through unified discoveries engine
        - name: AWS_ENGINE_URL
          value: "http://engine-discoveries.threat-engine-engines.svc.cluster.local"
        - name: AZURE_ENGINE_URL
          value: "http://engine-discoveries.threat-engine-engines.svc.cluster.local"
        - name: GCP_ENGINE_URL
          value: "http://engine-discoveries.threat-engine-engines.svc.cluster.local"
        - name: ALICLOUD_ENGINE_URL
          value: "http://engine-discoveries.threat-engine-engines.svc.cluster.local"
        - name: OCI_ENGINE_URL
          value: "http://engine-discoveries.threat-engine-engines.svc.cluster.local"
        - name: IBM_ENGINE_URL
          value: "http://engine-discoveries.threat-engine-engines.svc.cluster.local"
        - name: K8S_ENGINE_URL
          value: "http://engine-discoveries.threat-engine-engines.svc.cluster.local"
        - name: YAML_RULE_BUILDER_URL
          value: "http://engine-rule.threat-engine-engines.svc.cluster.local"
        - name: SCHEDULER_INTERVAL_SECONDS
          value: "60"
        - name: ENGINE_SCAN_POLL_INTERVAL_SECONDS
          value: "10"
        - name: ENGINE_SCAN_MAX_WAIT_SECONDS
          value: "7200"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8008
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8008
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: engine-onboarding
  namespace: threat-engine-engines
  labels:
    app: engine-onboarding
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8008
    protocol: TCP
    name: http
  selector:
    app: engine-onboarding
