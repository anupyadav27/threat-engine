apiVersion: apps/v1
kind: Deployment
metadata:
  name: engine-onboarding
  namespace: threat-engine-engines
  labels:
    app: engine-onboarding
    tier: engine
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: engine-onboarding
  template:
    metadata:
      labels:
        app: engine-onboarding
        tier: engine
    spec:
      serviceAccountName: engine-sa
      containers:
      - name: engine-onboarding
        image: yadavanup84/threat-engine-onboarding-api:v-onboarding-fix4
        imagePullPolicy: Always
        ports:
        - containerPort: 8008
          name: http
        envFrom:
        - configMapRef:
            name: threat-engine-db-config
        - secretRef:
            name: threat-engine-db-passwords
        env:
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: aws-region
        - name: SECRETS_MANAGER_PREFIX
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: secrets-manager-prefix
        - name: SECRETS_MANAGER_KMS_KEY_ID
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: secrets-manager-kms-key-id
              optional: true
        - name: PLATFORM_AWS_ACCOUNT_ID
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: aws-account-id
        - name: X_INTERNAL_SECRET
          valueFrom:
            secretKeyRef:
              name: threat-engine-secrets
              key: X_INTERNAL_SECRET
              optional: true
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: log-level
        # ── OpenTelemetry ─────────────────────────────────────────────────
        - name: OTEL_SERVICE_NAME
          value: "engine-onboarding"
        - name: OTEL_ENABLED
          valueFrom:
            configMapKeyRef:
              name: otel-config
              key: OTEL_ENABLED
              optional: true
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: otel-config
              key: OTEL_EXPORTER_OTLP_ENDPOINT
              optional: true
        - name: OTEL_EXPORTER_OTLP_INSECURE
          valueFrom:
            configMapKeyRef:
              name: otel-config
              key: OTEL_EXPORTER_OTLP_INSECURE
              optional: true
        - name: OTEL_TRACES_SAMPLER
          valueFrom:
            configMapKeyRef:
              name: otel-config
              key: OTEL_TRACES_SAMPLER
              optional: true
        - name: OTEL_PROPAGATORS
          valueFrom:
            configMapKeyRef:
              name: otel-config
              key: OTEL_PROPAGATORS
              optional: true
        - name: DATABASE_URL
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: database-url
        # Override: onboarding has its own DB with tables in public schema
        - name: SHARED_DB_NAME
          value: "threat_engine_onboarding"
        - name: DB_SCHEMA
          value: "public"
        # ── SQS async pipeline (optional — enables async mode when set) ──────
        - name: SQS_PIPELINE_QUEUE_URL
          valueFrom:
            configMapKeyRef:
              name: sqs-config
              key: SQS_PIPELINE_QUEUE_URL
              optional: true
        - name: SQS_EVENTS_QUEUE_URL
          valueFrom:
            configMapKeyRef:
              name: sqs-config
              key: SQS_EVENTS_QUEUE_URL
              optional: true
        - name: ROOT_PATH
          value: "/onboarding"
        - name: PORT
          value: "8008"
        # Engine URLs — all CSPs route through unified discoveries engine
        - name: AWS_ENGINE_URL
          value: "http://engine-discoveries.threat-engine-engines.svc.cluster.local"
        - name: AZURE_ENGINE_URL
          value: "http://engine-discoveries.threat-engine-engines.svc.cluster.local"
        - name: GCP_ENGINE_URL
          value: "http://engine-discoveries.threat-engine-engines.svc.cluster.local"
        - name: ALICLOUD_ENGINE_URL
          value: "http://engine-discoveries.threat-engine-engines.svc.cluster.local"
        - name: OCI_ENGINE_URL
          value: "http://engine-discoveries.threat-engine-engines.svc.cluster.local"
        - name: IBM_ENGINE_URL
          value: "http://engine-discoveries.threat-engine-engines.svc.cluster.local"
        - name: K8S_ENGINE_URL
          value: "http://engine-discoveries.threat-engine-engines.svc.cluster.local"
        - name: YAML_RULE_BUILDER_URL
          value: "http://engine-rule.threat-engine-engines.svc.cluster.local"
        - name: SCHEDULER_INTERVAL_SECONDS
          value: "60"
        - name: ARGO_SERVER_URL
          value: "http://argo-server.argo.svc.cluster.local:2746"
        - name: ARGO_NAMESPACE
          value: "threat-engine-engines"
        - name: ARGO_WORKFLOW_TEMPLATE
          value: "cspm-scan-pipeline"
        - name: ARGO_TOKEN
          valueFrom:
            secretKeyRef:
              name: argo-access-token
              key: token
        - name: ENGINE_SCAN_POLL_INTERVAL_SECONDS
          value: "10"
        - name: ENGINE_SCAN_MAX_WAIT_SECONDS
          value: "7200"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /api/v1/health/live
            port: 8008
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/v1/health/ready
            port: 8008
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: engine-onboarding
  namespace: threat-engine-engines
  labels:
    app: engine-onboarding
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8008
    protocol: TCP
    name: http
  selector:
    app: engine-onboarding
---
# Weekly credential expiry health-check CronJob.
# Replaces the former Celery beat Deployment — no Celery broker or worker is
# deployed in this cluster. The task function is invoked directly via Python.
# Schedule: every Monday at 03:00 UTC (matches original celery_app.py beat_schedule).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: onboarding-credential-health-check
  namespace: threat-engine-engines
  labels:
    app: onboarding-credential-health-check
    tier: engine
spec:
  schedule: "0 3 * * 1"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: onboarding-credential-health-check
            tier: engine
        spec:
          serviceAccountName: engine-sa
          restartPolicy: OnFailure
          containers:
          - name: credential-health-check
            image: yadavanup84/threat-engine-onboarding-api:v-onboarding-fix4
            command:
              - python
              - -c
              - "from engine_onboarding.tasks.credential_health_check import run_credential_health_check; run_credential_health_check()"
            envFrom:
            - configMapRef:
                name: threat-engine-db-config
            - secretRef:
                name: threat-engine-db-passwords
            env:
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: aws-region
            - name: FROM_EMAIL
              valueFrom:
                secretKeyRef:
                  name: threat-engine-secrets
                  key: FROM_EMAIL
                  optional: true
            - name: PLATFORM_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: threat-engine-secrets
                  key: PLATFORM_ADMIN_EMAIL
                  optional: true
            resources:
              requests:
                memory: "256Mi"
                cpu: "100m"
              limits:
                memory: "512Mi"
                cpu: "200m"
