# =============================================================================
# API Security Engine — Port 8035 | Pipeline Step 5 (parallel)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: engine-api-security
  namespace: threat-engine-engines
  labels:
    app: engine-api-security
spec:
  replicas: 1
  selector:
    matchLabels:
      app: engine-api-security
  template:
    metadata:
      labels:
        app: engine-api-security
    spec:
      serviceAccountName: engine-sa
      containers:
        - name: engine-api-security
          image: yadavanup84/engine-api-security:v-apisec-3
          imagePullPolicy: Always
          ports:
            - containerPort: 8035
          envFrom:
            - configMapRef:
                name: threat-engine-db-config
            - secretRef:
                name: threat-engine-db-passwords
          env:
            - name: X_INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: threat-engine-secrets
                  key: X_INTERNAL_SECRET
                  optional: true
            - name: API_SECURITY_DB_NAME
              value: "threat_engine_api_security"
            - name: CHECK_DB_NAME
              value: "threat_engine_check"
            - name: CDR_DB_NAME
              value: "threat_engine_cdr"
            - name: INVENTORY_DB_NAME
              value: "threat_engine_inventory"
            - name: DISCOVERIES_DB_NAME
              value: "threat_engine_discoveries"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: 8035
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 8035
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: engine-api-security
  namespace: threat-engine-engines
  labels:
    app: engine-api-security
spec:
  selector:
    app: engine-api-security
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8035
