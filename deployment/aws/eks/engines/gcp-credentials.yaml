# GCP Service Account credentials for discovery scanning.
#
# USAGE (manual test — before onboarding UI is wired up):
#
#   1. Export your GCP service account key JSON:
#        gcloud iam service-accounts keys create /tmp/sa-key.json \
#          --iam-account=<sa-name>@cloudsecurityapp-437319.iam.gserviceaccount.com
#
#   2. Base64-encode the JSON:
#        SA_JSON_B64=$(base64 -i /tmp/sa-key.json | tr -d '\n')
#
#   3. Apply this secret (substitute the placeholder):
#        kubectl apply -f gcp-credentials.yaml
#        kubectl patch secret gcp-sa-key -n threat-engine-engines \
#          -p "{\"data\":{\"service-account.json\":\"${SA_JSON_B64}\"}}"
#
#   4. Store in Secrets Manager for the scanner Job (run_scan.py reads from here):
#        python - <<'EOF'
#        import boto3, json
#        sa = json.load(open('/tmp/sa-key.json'))
#        secret = {"credential_type": "service_account", "credentials": sa}
#        boto3.client('secretsmanager', region_name='ap-south-1').create_secret(
#            Name='threat-engine/account/cloudsecurityapp-437319',
#            SecretString=json.dumps(secret),
#        )
#        EOF
#
#   5. Trigger pipeline:
#        bash deployment/aws/eks/argo/trigger-scan.sh \
#          $(python3 -c "import uuid; print(uuid.uuid4())") \
#          test-tenant-001 \
#          cloudsecurityapp-437319 \
#          gcp \
#          threat-engine/account/cloudsecurityapp-437319
#
# PRODUCTION path (onboarding UI):
#   POST /api/v1/cloud-accounts        → creates account record
#   POST /api/v1/cloud-accounts/{id}/credentials
#        body: {"credential_type": "service_account", "credentials": {<SA JSON>}}
#   → validates against GCP, stores in Secrets Manager at threat-engine/account/{account_id}
#   → onboarding scheduler reads account, triggers cspm-scan-pipeline with provider=gcp
#
# NOTE: This K8s secret is for local inspection / fallback ADC only.
#       The scanner Job resolves credentials from AWS Secrets Manager, not this secret.
#
apiVersion: v1
kind: Secret
metadata:
  name: gcp-sa-key
  namespace: threat-engine-engines
  labels:
    app: engine-discoveries
    provider: gcp
type: Opaque
data:
  # Replace with: base64 -i /path/to/sa-key.json | tr -d '\n'
  service-account.json: REPLACE_WITH_BASE64_SA_JSON
