apiVersion: apps/v1
kind: Deployment
metadata:
  name: engine-secops
  namespace: threat-engine-engines
  labels:
    app: engine-secops
    tier: engine
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: engine-secops
  template:
    metadata:
      labels:
        app: engine-secops
        tier: engine
    spec:
      serviceAccountName: engine-sa
      containers:
      - name: engine-secops
        image: yadavanup84/secops-scanner:v-secops-findings1
        imagePullPolicy: Always
        ports:
        - containerPort: 8009
          name: http
        envFrom:
        - configMapRef:
            name: threat-engine-db-config
        - secretRef:
            name: threat-engine-db-passwords
        env:
        - name: PYTHONPATH
          value: /app
        - name: LOG_LEVEL
          value: "INFO"
        # ── OpenTelemetry ─────────────────────────────────────────────────
        - name: OTEL_SERVICE_NAME
          value: "engine-secops"
        - name: OTEL_ENABLED
          valueFrom:
            configMapKeyRef:
              name: otel-config
              key: OTEL_ENABLED
              optional: true
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: otel-config
              key: OTEL_EXPORTER_OTLP_ENDPOINT
              optional: true
        - name: OTEL_EXPORTER_OTLP_INSECURE
          valueFrom:
            configMapKeyRef:
              name: otel-config
              key: OTEL_EXPORTER_OTLP_INSECURE
              optional: true
        - name: OTEL_TRACES_SAMPLER
          valueFrom:
            configMapKeyRef:
              name: otel-config
              key: OTEL_TRACES_SAMPLER
              optional: true
        - name: OTEL_PROPAGATORS
          valueFrom:
            configMapKeyRef:
              name: otel-config
              key: OTEL_PROPAGATORS
              optional: true
        - name: SCAN_INPUT_PATH
          value: "/app/scan_input"
        - name: SCAN_OUTPUT_PATH
          value: "/app/scan_output"
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: S3_BUCKET
          valueFrom:
            configMapKeyRef:
              name: s3-mount-config
              key: s3-bucket
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: s3-mount-config
              key: s3-region
        - name: ENGINE_NAME
          value: "secops"
        - name: ONBOARDING_ENGINE_URL
          value: "http://engine-onboarding"
        # ── SecOps Engine DB config ────────────────────────────────
        # Main pool (SAST + DAST + SCA output): threat_engine_secops
        - name: DB_HOST
          value: "postgres-vulnerability-db.cbm92xowvx2t.ap-south-1.rds.amazonaws.com"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "threat_engine_secops"
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: threat-engine-db-passwords
              key: SECOPS_DB_PASSWORD
        # SAST engine explicit vars (fallback chain: SECOPS_DB_* → SHARED_DB_* → DB_*)
        - name: SECOPS_DB_HOST
          value: "postgres-vulnerability-db.cbm92xowvx2t.ap-south-1.rds.amazonaws.com"
        - name: SECOPS_DB_NAME
          value: "threat_engine_secops"
        - name: SECOPS_DB_USER
          value: "postgres"
        - name: SECOPS_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: threat-engine-db-passwords
              key: SECOPS_DB_PASSWORD
        # Vulnerability pool (SCA SBOM osv_advisory enrichment): vulnerability_db
        - name: VULN_DB_HOST
          value: "postgres-vulnerability-db.cbm92xowvx2t.ap-south-1.rds.amazonaws.com"
        - name: VULN_DB_PORT
          value: "5432"
        - name: VULN_DB_NAME
          value: "vulnerability_db"
        - name: VULN_DB_USER
          value: "postgres"
        - name: VULN_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: threat-engine-db-passwords
              key: SECOPS_DB_PASSWORD
        # ── AI Fix Engine (Mistral) ────────────────────────────────────────
        - name: MISTRAL_API_KEY
          valueFrom:
            secretKeyRef:
              name: threat-engine-db-passwords
              key: MISTRAL_API_KEY
              optional: true
        - name: MISTRAL_MODEL
          value: "mistral-medium"
        - name: MISTRAL_TIMEOUT
          value: "120"
        volumeMounts:
        - name: scan-input
          mountPath: /app/scan_input
        - name: scan-output
          mountPath: /app/scan_output
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/v1/health/live
            port: 8009
          initialDelaySeconds: 30
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/v1/health/ready
            port: 8009
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3

      volumes:
      - name: scan-input
        emptyDir: {}
      - name: scan-output
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: engine-secops
  namespace: threat-engine-engines
  labels:
    app: engine-secops
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8009
    protocol: TCP
    name: http
  selector:
    app: engine-secops
