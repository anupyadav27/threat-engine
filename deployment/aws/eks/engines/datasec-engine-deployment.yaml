apiVersion: apps/v1
kind: Deployment
metadata:
  name: datasec-engine
  namespace: threat-engine-engines
  labels:
    app: datasec-engine
    tier: engine
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: datasec-engine
  template:
    metadata:
      labels:
        app: datasec-engine
        tier: engine
    spec:
      serviceAccountName: aws-compliance-engine-sa  # Reuse existing SA with S3 permissions
      containers:
      - name: datasec-engine
        image: yadavanup84/threat-engine-datasec:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8004
          name: http
        envFrom:
        - configMapRef:
            name: threat-engine-db-config
        - secretRef:
            name: threat-engine-db-passwords
        env:
        - name: PYTHONPATH
          value: /app
        - name: LOG_LEVEL
          value: "INFO"
        - name: S3_BUCKET
          valueFrom:
            configMapKeyRef:
              name: s3-mount-config
              key: s3-bucket
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: s3-mount-config
              key: s3-region
        - name: OUTPUT_DIR
          value: "/output"
        - name: INPUT_DIR
          value: "/input"
        - name: ENGINE_NAME
          value: "datasec"
        volumeMounts:
        - name: output
          mountPath: /output
        - name: input
          mountPath: /input
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "512Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 30
          timeoutSeconds: 5
          periodSeconds: 10
          failureThreshold: 6
        readinessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 10
          timeoutSeconds: 5
          periodSeconds: 5
          failureThreshold: 6
      
      # S3 sync sidecar
      - name: s3-sync
        image: amazon/aws-cli:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "S3 Sync Sidecar starting for DataSec Engine..."
            echo "Bucket: s3://${S3_BUCKET}"
            echo "Output: /output -> s3://${S3_BUCKET}/engine_output/${ENGINE_NAME}/"
            
            while true; do
              if [ -d "/output" ] && [ "$(ls -A /output 2>/dev/null)" ]; then
                echo "$(date): Syncing DataSec output to S3..."
                aws s3 sync /output "s3://${S3_BUCKET}/engine_output/${ENGINE_NAME}/" \
                  --region ${AWS_REGION} \
                  --exclude "*.tmp" \
                  --exclude "*.lock" \
                  --delete || echo "Sync failed, retrying..."
              fi
              sleep 30
            done
        env:
        - name: S3_BUCKET
          valueFrom:
            configMapKeyRef:
              name: s3-mount-config
              key: s3-bucket
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: s3-mount-config
              key: s3-region
        - name: ENGINE_NAME
          value: "datasec"
        volumeMounts:
        - name: output
          mountPath: /output
        resources:
          requests:
            memory: "64Mi"
            cpu: "25m"
          limits:
            memory: "128Mi"
            cpu: "100m"
      
      volumes:
      - name: output
        emptyDir: {}
      - name: input
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: datasec-engine
  namespace: threat-engine-engines
  labels:
    app: datasec-engine
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8004
    protocol: TCP
    name: http
  selector:
    app: datasec-engine
---
apiVersion: v1
kind: Service
metadata:
  name: datasec-engine-lb
  namespace: threat-engine-engines
  labels:
    app: datasec-engine
    service-type: loadbalancer
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8004
    protocol: TCP
    name: http
  selector:
    app: datasec-engine
  sessionAffinity: None
