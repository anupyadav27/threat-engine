# ---------------------------------------------------------------------------
# External Collector Secrets — Task 0.3.16 [Seq 40 | DO]
# CloudFormation template for AWS Secrets Manager entries
# ---------------------------------------------------------------------------
AWSTemplateFormatVersion: "2010-09-09"
Description: "Secrets Manager entries for Threat Engine External Collector"

Parameters:
  EKSRoleArn:
    Type: String
    Description: "ARN of the EKS IRSA role for external-collector"
  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging, development]

Resources:
  DockerHubToken:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: threat-engine/dockerhub-token
      Description: "Docker Hub PAT (read-only, image list/pull)"
      Tags:
        - Key: service
          Value: external-collector
        - Key: environment
          Value: !Ref Environment

  GitHubToken:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: threat-engine/github-token
      Description: "GitHub PAT or App credentials (repo read access)"
      Tags:
        - Key: service
          Value: external-collector
        - Key: environment
          Value: !Ref Environment

  GitLabToken:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: threat-engine/gitlab-token
      Description: "GitLab PAT (api access, read_repository)"
      Tags:
        - Key: service
          Value: external-collector
        - Key: environment
          Value: !Ref Environment

  NVDApiKey:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: threat-engine/nvd-api-key
      Description: "NVD API key (from nvd.nist.gov, increases rate limit)"
      Tags:
        - Key: service
          Value: external-collector
        - Key: environment
          Value: !Ref Environment

  ThreatIntelKeys:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: threat-engine/threatintel-keys
      Description: "JSON object with threat intel API keys"
      SecretString: '{"abuseipdb_key": "", "otx_api_key": ""}'
      Tags:
        - Key: service
          Value: external-collector
        - Key: environment
          Value: !Ref Environment

  # Resource-based policy allowing EKS role to read secrets
  DockerHubTokenPolicy:
    Type: AWS::SecretsManager::ResourcePolicy
    Properties:
      SecretId: !Ref DockerHubToken
      ResourcePolicy:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Ref EKSRoleArn
            Action: secretsmanager:GetSecretValue
            Resource: "*"

  GitHubTokenPolicy:
    Type: AWS::SecretsManager::ResourcePolicy
    Properties:
      SecretId: !Ref GitHubToken
      ResourcePolicy:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Ref EKSRoleArn
            Action: secretsmanager:GetSecretValue
            Resource: "*"

  GitLabTokenPolicy:
    Type: AWS::SecretsManager::ResourcePolicy
    Properties:
      SecretId: !Ref GitLabToken
      ResourcePolicy:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Ref EKSRoleArn
            Action: secretsmanager:GetSecretValue
            Resource: "*"

  NVDApiKeyPolicy:
    Type: AWS::SecretsManager::ResourcePolicy
    Properties:
      SecretId: !Ref NVDApiKey
      ResourcePolicy:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Ref EKSRoleArn
            Action: secretsmanager:GetSecretValue
            Resource: "*"

  ThreatIntelKeysPolicy:
    Type: AWS::SecretsManager::ResourcePolicy
    Properties:
      SecretId: !Ref ThreatIntelKeys
      ResourcePolicy:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Ref EKSRoleArn
            Action: secretsmanager:GetSecretValue
            Resource: "*"

Outputs:
  DockerHubTokenArn:
    Value: !Ref DockerHubToken
  GitHubTokenArn:
    Value: !Ref GitHubToken
  GitLabTokenArn:
    Value: !Ref GitLabToken
  NVDApiKeyArn:
    Value: !Ref NVDApiKey
  ThreatIntelKeysArn:
    Value: !Ref ThreatIntelKeys
