# Discovery YAML — ibm_cloud_shell (IBM Cloud)
# Generated: 2026-02-21T04:45:39Z
version: '1.0'
provider: ibm
service: ibm_cloud_shell
services:
  client: ibm_cloud_shell
  module: ibm_platform_services.ibm_cloud_shell
discovery:
  # ── Dependent ops ──
  # ── get_account_settings [dependent] ──
  - discovery_id: ibm.ibm_cloud_shell.get-account-settings
    calls:
      - action: get-account-settings
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        created_at: '{{ response.created_at }}'
        crn: '{{ response.crn }}'
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        status: '{{ response.status }}'
        tags: '{{ response.tags }}'
