version: '1.0'
provider: ibm
service: event_streams
services:
  client: event_streams
  module: ibm_cloud_sdk.event_streams
discovery:
- discovery_id: ibm.event_streams.get-topic
  calls:
  - action: get-topic
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.event_streams.list-topics
  calls:
  - action: list-topics
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
