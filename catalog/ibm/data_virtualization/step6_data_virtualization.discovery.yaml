# Discovery YAML — data_virtualization (IBM Cloud)
# Generated: 2026-02-21T04:45:38Z
version: '1.0'
provider: ibm
service: data_virtualization
services:
  client: data_virtualization
  module: ibm_platform_services.data_virtualization
discovery:
  # ── get_table ──
  - discovery_id: ibm.data_virtualization.get-table
    calls:
      - action: get-table
        save_as: response
        on_error: continue
    emit:
      as: item
  # ── list_tables ──
  - discovery_id: ibm.data_virtualization.list-tables
    calls:
      - action: list-tables
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
  # ── query_data ──
  - discovery_id: ibm.data_virtualization.query-data
    calls:
      - action: query-data
        save_as: response
        on_error: continue
    emit:
      as: item
