version: '1.0'
provider: ibm
service: containers
services:
  client: containers
  module: ibm_cloud_sdk.containers
discovery:
- discovery_id: ibm.containers.get-cluster
  calls:
  - action: get-cluster
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.containers.list-clusters
  calls:
  - action: list-clusters
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.containers.list-workers
  calls:
  - action: list-workers
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
