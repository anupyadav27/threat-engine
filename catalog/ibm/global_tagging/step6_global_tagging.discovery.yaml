# Discovery YAML — global_tagging (IBM Cloud)
# Generated: 2026-02-21T04:45:39Z
version: '1.0'
provider: ibm
service: global_tagging
services:
  client: global_tagging
  module: ibm_platform_services.global_tagging
discovery:
  # ── list_tags ──
  - discovery_id: ibm.global_tagging.list-tags
    calls:
      - action: list-tags
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        created_at: '{{ item.created_at }}'
        crn: '{{ item.crn }}'
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        tags: '{{ item.tags }}'
