version: '1.0'
provider: ibm
service: global_tagging
services:
  client: global_tagging
  module: boto3.client
discovery:
- discovery_id: ibm.global_tagging.listTags
  calls:
  - action: listTags
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      status: '{{ item.status }}'
      created_at: '{{ item.created_at }}'
      tags: '{{ item.tags }}'
- discovery_id: ibm.global_tagging.getAuthenticator
  calls:
  - action: getAuthenticator
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      status: '{{ item.status }}'
      created_at: '{{ item.created_at }}'
      tags: '{{ item.tags }}'
- discovery_id: ibm.global_tagging.getEnableGzipCompression
  calls:
  - action: getEnableGzipCompression
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      status: '{{ item.status }}'
      created_at: '{{ item.created_at }}'
      tags: '{{ item.tags }}'
- discovery_id: ibm.global_tagging.getHttpClient
  calls:
  - action: getHttpClient
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      status: '{{ item.status }}'
      created_at: '{{ item.created_at }}'
      tags: '{{ item.tags }}'
checks: []
