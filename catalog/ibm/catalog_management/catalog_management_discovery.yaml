version: '1.0'
provider: ibm
service: catalog_management
services:
  client: catalog_management
  module: boto3.client
discovery:
- discovery_id: ibm.catalog_management.listCatalogs
  calls:
  - action: listCatalogs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      status: '{{ item.status }}'
      created_at: '{{ item.created_at }}'
      tags: '{{ item.tags }}'
