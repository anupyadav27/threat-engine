# Discovery YAML — s3transfer (IBM Cloud)
# Generated: 2026-02-21T04:45:39Z
version: '1.0'
provider: ibm
service: s3transfer
services:
  client: s3transfer
  module: ibm_platform_services.s3transfer
discovery:
  # ── get_name ──
  - discovery_id: ibm.s3transfer.get-name
    calls:
      - action: get-name
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        created_at: '{{ response.created_at }}'
        crn: '{{ response.crn }}'
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        status: '{{ response.status }}'
        tags: '{{ response.tags }}'
