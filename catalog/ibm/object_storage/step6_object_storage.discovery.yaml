# Discovery YAML — object_storage (IBM Cloud)
# Generated: 2026-02-21T04:45:39Z
version: '1.0'
provider: ibm
service: object_storage
services:
  client: object_storage
  module: ibm_platform_services.object_storage
discovery:
  # ── get_bucket ──
  - discovery_id: ibm.object_storage.get-bucket
    calls:
      - action: get-bucket
        save_as: response
        on_error: continue
    emit:
      as: item
  # ── list_buckets ──
  - discovery_id: ibm.object_storage.list-buckets
    calls:
      - action: list-buckets
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
  # ── list_objects ──
  - discovery_id: ibm.object_storage.list-objects
    calls:
      - action: list-objects
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
