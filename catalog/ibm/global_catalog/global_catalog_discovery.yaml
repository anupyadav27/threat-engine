version: '1.0'
provider: ibm
service: global_catalog
services:
  client: global_catalog
  module: boto3.client
discovery:
- discovery_id: ibm.global_catalog.listCatalogEntries
  calls:
  - action: listCatalogEntries
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      status: '{{ item.status }}'
      created_at: '{{ item.created_at }}'
      tags: '{{ item.tags }}'
