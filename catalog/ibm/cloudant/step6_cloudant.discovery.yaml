# Discovery YAML — cloudant (IBM Cloud)
# Generated: 2026-02-21T04:45:38Z
version: '1.0'
provider: ibm
service: cloudant
services:
  client: cloudant
  module: ibm_platform_services.cloudant
discovery:
  # ── get_database ──
  - discovery_id: ibm.cloudant.get-database
    calls:
      - action: get-database
        save_as: response
        on_error: continue
    emit:
      as: item
  # ── get_document ──
  - discovery_id: ibm.cloudant.get-document
    calls:
      - action: get-document
        save_as: response
        on_error: continue
    emit:
      as: item
  # ── list_databases ──
  - discovery_id: ibm.cloudant.list-databases
    calls:
      - action: list-databases
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
  # ── list_documents ──
  - discovery_id: ibm.cloudant.list-documents
    calls:
      - action: list-documents
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
