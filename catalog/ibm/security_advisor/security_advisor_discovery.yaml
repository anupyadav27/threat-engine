version: '1.0'
provider: ibm
service: security_advisor
services:
  client: security_advisor
  module: ibm_cloud_sdk.security_advisor
discovery:
- discovery_id: ibm.security_advisor.get-finding
  calls:
  - action: get-finding
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.security_advisor.list-findings
  calls:
  - action: list-findings
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
