# Discovery YAML — container_registry (IBM Cloud)
# Generated: 2026-02-21T04:45:38Z
version: '1.0'
provider: ibm
service: container_registry
services:
  client: container_registry
  module: ibm_platform_services.container_registry
discovery:
  # ── get_image ──
  - discovery_id: ibm.container_registry.get-image
    calls:
      - action: get-image
        save_as: response
        on_error: continue
    emit:
      as: item
  # ── get_namespace ──
  - discovery_id: ibm.container_registry.get-namespace
    calls:
      - action: get-namespace
        save_as: response
        on_error: continue
    emit:
      as: item
  # ── list_images ──
  - discovery_id: ibm.container_registry.list-images
    calls:
      - action: list-images
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
  # ── list_namespaces ──
  - discovery_id: ibm.container_registry.list-namespaces
    calls:
      - action: list-namespaces
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
