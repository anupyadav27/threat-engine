# Discovery YAML — continuous_delivery (IBM Cloud)
# Generated: 2026-02-21T04:45:38Z
version: '1.0'
provider: ibm
service: continuous_delivery
services:
  client: continuous_delivery
  module: ibm_platform_services.continuous_delivery
discovery:
  # ── get_pipeline ──
  - discovery_id: ibm.continuous_delivery.get-pipeline
    calls:
      - action: get-pipeline
        save_as: response
        on_error: continue
    emit:
      as: item
  # ── list_pipelines ──
  - discovery_id: ibm.continuous_delivery.list-pipelines
    calls:
      - action: list-pipelines
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
