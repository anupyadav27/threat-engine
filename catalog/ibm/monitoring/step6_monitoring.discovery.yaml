# Discovery YAML — monitoring (IBM Cloud)
# Generated: 2026-02-21T04:45:39Z
version: '1.0'
provider: ibm
service: monitoring
services:
  client: monitoring
  module: ibm_platform_services.monitoring
discovery:
  # ── get_metric ──
  - discovery_id: ibm.monitoring.get-metric
    calls:
      - action: get-metric
        save_as: response
        on_error: continue
    emit:
      as: item
  # ── list_metrics ──
  - discovery_id: ibm.monitoring.list-metrics
    calls:
      - action: list-metrics
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
  # ── query_metrics ──
  - discovery_id: ibm.monitoring.query-metrics
    calls:
      - action: query-metrics
        save_as: response
        on_error: continue
    emit:
      as: item
