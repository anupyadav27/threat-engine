version: '1.0'
provider: ibm
service: file_storage
services:
  client: file_storage
  module: ibm_cloud_sdk.file_storage
discovery:
- discovery_id: ibm.file_storage.get-share
  calls:
  - action: get-share
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.file_storage.list-shares
  calls:
  - action: list-shares
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
