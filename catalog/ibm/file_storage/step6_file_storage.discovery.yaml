# Discovery YAML — file_storage (IBM Cloud)
# Generated: 2026-02-21T04:45:39Z
version: '1.0'
provider: ibm
service: file_storage
services:
  client: file_storage
  module: ibm_platform_services.file_storage
discovery:
  # ── get_share ──
  - discovery_id: ibm.file_storage.get-share
    calls:
      - action: get-share
        save_as: response
        on_error: continue
    emit:
      as: item
  # ── list_shares ──
  - discovery_id: ibm.file_storage.list-shares
    calls:
      - action: list-shares
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
