# Discovery YAML — cdn (IBM Cloud)
# Generated: 2026-02-21T04:45:38Z
version: '1.0'
provider: ibm
service: cdn
services:
  client: cdn
  module: ibm_platform_services.cdn
discovery:
  # ── get_distribution ──
  - discovery_id: ibm.cdn.get-distribution
    calls:
      - action: get-distribution
        save_as: response
        on_error: continue
    emit:
      as: item
  # ── list_distributions ──
  - discovery_id: ibm.cdn.list-distributions
    calls:
      - action: list-distributions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
