# Discovery YAML — billing (IBM Cloud)
# Generated: 2026-02-21T04:45:38Z
version: '1.0'
provider: ibm
service: billing
services:
  client: billing
  module: ibm_platform_services.billing
discovery:
  # ── get_invoice ──
  - discovery_id: ibm.billing.get-invoice
    calls:
      - action: get-invoice
        save_as: response
        on_error: continue
    emit:
      as: item
  # ── get_usage ──
  - discovery_id: ibm.billing.get-usage
    calls:
      - action: get-usage
        save_as: response
        on_error: continue
    emit:
      as: item
  # ── list_invoices ──
  - discovery_id: ibm.billing.list-invoices
    calls:
      - action: list-invoices
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
