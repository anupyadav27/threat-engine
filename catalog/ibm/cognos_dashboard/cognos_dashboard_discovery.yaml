version: '1.0'
provider: ibm
service: cognos_dashboard
services:
  client: cognos_dashboard
  module: ibm_cloud_sdk.cognos_dashboard
discovery:
- discovery_id: ibm.cognos_dashboard.get-dashboard
  calls:
  - action: get-dashboard
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.cognos_dashboard.list-dashboards
  calls:
  - action: list-dashboards
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
