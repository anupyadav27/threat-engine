version: '1.0'
provider: ibm
service: certificate_manager
services:
  client: certificate_manager
  module: ibm_cloud_sdk.certificate_manager
discovery:
- discovery_id: ibm.certificate_manager.get-certificate
  calls:
  - action: get-certificate
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.certificate_manager.list-certificates
  calls:
  - action: list-certificates
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
