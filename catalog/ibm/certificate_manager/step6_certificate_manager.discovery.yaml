# Discovery YAML — certificate_manager (IBM Cloud)
# Generated: 2026-02-21T04:45:38Z
version: '1.0'
provider: ibm
service: certificate_manager
services:
  client: certificate_manager
  module: ibm_platform_services.certificate_manager
discovery:
  # ── get_certificate ──
  - discovery_id: ibm.certificate_manager.get-certificate
    calls:
      - action: get-certificate
        save_as: response
        on_error: continue
    emit:
      as: item
  # ── list_certificates ──
  - discovery_id: ibm.certificate_manager.list-certificates
    calls:
      - action: list-certificates
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
