# Discovery YAML — watson_ml (IBM Cloud)
# Generated: 2026-02-21T04:45:39Z
version: '1.0'
provider: ibm
service: watson_ml
services:
  client: watson_ml
  module: ibm_platform_services.watson_ml
discovery:
  # ── get_model ──
  - discovery_id: ibm.watson_ml.get-model
    calls:
      - action: get-model
        save_as: response
        on_error: continue
    emit:
      as: item
  # ── list_models ──
  - discovery_id: ibm.watson_ml.list-models
    calls:
      - action: list-models
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
