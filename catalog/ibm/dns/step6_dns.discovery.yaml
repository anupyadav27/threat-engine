# Discovery YAML — dns (IBM Cloud)
# Generated: 2026-02-21T04:45:38Z
version: '1.0'
provider: ibm
service: dns
services:
  client: dns
  module: ibm_platform_services.dns
discovery:
  # ── get_zone ──
  - discovery_id: ibm.dns.get-zone
    calls:
      - action: get-zone
        save_as: response
        on_error: continue
    emit:
      as: item
  # ── list_records ──
  - discovery_id: ibm.dns.list-records
    calls:
      - action: list-records
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
  # ── list_zones ──
  - discovery_id: ibm.dns.list-zones
    calls:
      - action: list-zones
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
