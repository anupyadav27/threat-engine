# Discovery YAML — databases (IBM Cloud)
# Generated: 2026-02-21T04:45:38Z
version: '1.0'
provider: ibm
service: databases
services:
  client: databases
  module: ibm_platform_services.databases
discovery:
  # ── get_backup ──
  - discovery_id: ibm.databases.get-backup
    calls:
      - action: get-backup
        save_as: response
        on_error: continue
    emit:
      as: item
  # ── get_deployment ──
  - discovery_id: ibm.databases.get-deployment
    calls:
      - action: get-deployment
        save_as: response
        on_error: continue
    emit:
      as: item
  # ── list_backups ──
  - discovery_id: ibm.databases.list-backups
    calls:
      - action: list-backups
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
  # ── list_deployments ──
  - discovery_id: ibm.databases.list-deployments
    calls:
      - action: list-deployments
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
