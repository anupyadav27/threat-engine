# Discovery YAML — account (IBM Cloud)
# Generated: 2026-02-21T04:45:38Z
version: '1.0'
provider: ibm
service: account
services:
  client: account
  module: ibm_platform_services.account
discovery:
  # ── get_account ──
  - discovery_id: ibm.account.get-account
    calls:
      - action: get-account
        save_as: response
        on_error: continue
    emit:
      as: item
  # ── list_accounts ──
  - discovery_id: ibm.account.list-accounts
    calls:
      - action: list-accounts
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
