# Discovery YAML — api_gateway (IBM Cloud)
# Generated: 2026-02-21T04:45:38Z
version: '1.0'
provider: ibm
service: api_gateway
services:
  client: api_gateway
  module: ibm_platform_services.api_gateway
discovery:
  # ── get_api ──
  - discovery_id: ibm.api_gateway.get-api
    calls:
      - action: get-api
        save_as: response
        on_error: continue
    emit:
      as: item
  # ── list_apis ──
  - discovery_id: ibm.api_gateway.list-apis
    calls:
      - action: list-apis
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
