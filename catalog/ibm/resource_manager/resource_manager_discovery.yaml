version: '1.0'
provider: ibm
service: resource_manager
services:
  client: resource_manager
  module: boto3.client
discovery:
- discovery_id: ibm.resource_manager.listQuotaDefinitions
  calls:
  - action: listQuotaDefinitions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      status: '{{ item.status }}'
      created_at: '{{ item.created_at }}'
      tags: '{{ item.tags }}'
- discovery_id: ibm.resource_manager.listResourceGroups
