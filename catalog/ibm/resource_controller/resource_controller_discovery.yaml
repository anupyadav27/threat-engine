version: '1.0'
provider: ibm
service: resource_controller
services:
  client: resource_controller
  module: boto3.client
discovery:
- discovery_id: ibm.resource_controller.listReclamations
  calls:
  - action: listReclamations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      status: '{{ item.status }}'
      created_at: '{{ item.created_at }}'
      tags: '{{ item.tags }}'
