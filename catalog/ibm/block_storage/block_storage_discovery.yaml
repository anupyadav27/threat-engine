version: '1.0'
provider: ibm
service: block_storage
services:
  client: block_storage
  module: ibm_cloud_sdk.block_storage
discovery:
- discovery_id: ibm.block_storage.get-volume
  calls:
  - action: get-volume
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.block_storage.list-volumes
  calls:
  - action: list-volumes
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
