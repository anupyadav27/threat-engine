# Discovery YAML — block_storage (IBM Cloud)
# Generated: 2026-02-21T04:45:38Z
version: '1.0'
provider: ibm
service: block_storage
services:
  client: block_storage
  module: ibm_platform_services.block_storage
discovery:
  # ── get_volume ──
  - discovery_id: ibm.block_storage.get-volume
    calls:
      - action: get-volume
        save_as: response
        on_error: continue
    emit:
      as: item
  # ── list_volumes ──
  - discovery_id: ibm.block_storage.list-volumes
    calls:
      - action: list-volumes
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
