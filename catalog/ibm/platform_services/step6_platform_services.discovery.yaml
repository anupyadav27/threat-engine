# Discovery YAML — platform_services (IBM Cloud)
# Generated: 2026-02-21T04:45:39Z
version: '1.0'
provider: ibm
service: platform_services
services:
  client: platform_services
  module: ibm_platform_services.platform_services
discovery:
  # ── get_cases ──
  - discovery_id: ibm.platform_services.get-cases
    calls:
      - action: get-cases
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        created_at: '{{ response.created_at }}'
        crn: '{{ response.crn }}'
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        status: '{{ response.status }}'
        tags: '{{ response.tags }}'
  # ── Dependent ops ──
  # ── get_case [dependent] ──
  - discovery_id: ibm.platform_services.get-case
    calls:
      - action: get-case
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        created_at: '{{ response.created_at }}'
        crn: '{{ response.crn }}'
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        status: '{{ response.status }}'
        tags: '{{ response.tags }}'
