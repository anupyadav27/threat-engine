version: '1.0'
provider: ibm
service: platform_services
services:
  client: platform_services
  module: boto3.client
discovery:
- discovery_id: ibm.platform_services.getAuthenticator
  calls:
  - action: getAuthenticator
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      status: '{{ item.status }}'
      created_at: '{{ item.created_at }}'
      tags: '{{ item.tags }}'
- discovery_id: ibm.platform_services.getCase
  calls:
