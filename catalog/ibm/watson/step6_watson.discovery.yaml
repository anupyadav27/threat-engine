# Discovery YAML — watson (IBM Cloud)
# Generated: 2026-02-21T04:45:39Z
version: '1.0'
provider: ibm
service: watson
services:
  client: watson
  module: ibm_platform_services.watson
discovery:
  # ── list_workspaces ──
  - discovery_id: ibm.watson.list-workspaces
    calls:
      - action: list-workspaces
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        created_at: '{{ item.created_at }}'
        crn: '{{ item.crn }}'
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        tags: '{{ item.tags }}'
