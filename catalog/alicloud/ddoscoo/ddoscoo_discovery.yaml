- discovery_id: alicloud.ddoscoo.getddoscoo
  calls:
  - action: getddoscoo
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ddoscoo.queryddoscoo
  calls:
  - action: queryddoscoo
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ddoscoo.describeddoscooattribute
  calls:
  - action: describeddoscooattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
