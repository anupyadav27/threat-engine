version: '1.0'
provider: alicloud
service: ddoscoo
services:
  client: ddoscoo
  module: boto3.client
discovery:
- discovery_id: alicloud.ddoscoo.describeddoscoos
  calls:
  - action: describeddoscoos
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ddoscoo.listddoscoos
  calls:
  - action: listddoscoos
    save_as: response
    on_error: continue
