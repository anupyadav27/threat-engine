# Discovery YAML — slb (AliCloud)
# Generated: 2026-02-21T06:19:57Z
version: '1.0'
provider: alicloud
service: slb
services:
  client: slb
  module: alibabacloud_python_sdk.slb
discovery:
  # ── DescribeAccessControlListAttribute ──
  - discovery_id: alicloud.slb.DescribeAccessControlListAttribute
    calls:
      - action: DescribeAccessControlListAttribute
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        access_control_list_attribute_status: '{{ item.access_control_list_attribute_status }}'
        creation_time: '{{ item.creation_time }}'
        instance_id: '{{ item.instance_id }}'
        instance_name: '{{ item.instance_name }}'
        region_id: '{{ item.region_id }}'
        tags: '{{ item.tags }}'
        zone_id: '{{ item.zone_id }}'
