version: '1.0'
provider: alicloud
service: slb
services:
  client: slb
  module: boto3.client
discovery:
- discovery_id: alicloud.slb.describeslbs
  calls:
  - action: describeslbs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.slb.listslbs
  calls:
  - action: listslbs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.slb.getslb
  calls:
  - action: getslb
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.slb.queryslb
  calls:
  - action: queryslb
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.slb.describeslbattribute
  calls:
  - action: describeslbattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
