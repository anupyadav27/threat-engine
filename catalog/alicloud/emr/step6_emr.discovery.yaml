discovery:
  # ── DescribeClusterBasicInfo [dependent] ──
  - discovery_id: alicloud.emr.DescribeClusterBasicInfo
    calls:
      - action: DescribeClusterBasicInfo
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        cluster_basic_info_status: '{{ response.cluster_basic_info_status }}'
        creation_time: '{{ response.creation_time }}'
        instance_id: '{{ response.instance_id }}'
        instance_name: '{{ response.instance_name }}'
        region_id: '{{ response.region_id }}'
        tags: '{{ response.tags }}'
        zone_id: '{{ response.zone_id }}'
