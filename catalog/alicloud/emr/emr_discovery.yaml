version: '1.0'
provider: alicloud
service: emr
services:
  client: emr
  module: boto3.client
discovery:
- discovery_id: alicloud.emr.describeemrs
  calls:
  - action: describeemrs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.emr.listemrs
  calls:
  - action: listemrs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.emr.getemr
  calls:
  - action: getemr
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.emr.queryemr
  calls:
  - action: queryemr
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.emr.describeemrattribute
  calls:
  - action: describeemrattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
