version: '1.0'
provider: alicloud
service: luban
services:
  client: luban
  module: boto3.client
discovery:
- discovery_id: alicloud.luban.describelubans
  calls:
  - action: describelubans
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.luban.listlubans
  calls:
  - action: listlubans
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.luban.getluban
  calls:
  - action: getluban
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.luban.queryluban
  calls:
  - action: queryluban
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.luban.describelubanattribute
  calls:
  - action: describelubanattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
