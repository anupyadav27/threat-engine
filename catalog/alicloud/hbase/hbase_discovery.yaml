version: '1.0'
provider: alicloud
service: hbase
services:
  client: hbase
  module: boto3.client
discovery:
- discovery_id: alicloud.hbase.describehbases
  calls:
  - action: describehbases
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.hbase.listhbases
  calls:
  - action: listhbases
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.hbase.gethbase
  calls:
  - action: gethbase
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.hbase.queryhbase
  calls:
  - action: queryhbase
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.hbase.describehbaseattribute
  calls:
  - action: describehbaseattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
