  - discovery_id: alicloud.ims.GetAppSecret
    calls:
      - action: GetAppSecret
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        app_secret_status: '{{ response.app_secret_status }}'
        creation_time: '{{ response.creation_time }}'
        instance_id: '{{ response.instance_id }}'
        instance_name: '{{ response.instance_name }}'
        region_id: '{{ response.region_id }}'
        tags: '{{ response.tags }}'
