version: '1.0'
provider: alicloud
service: cccvn
services:
  client: cccvn
  module: boto3.client
discovery:
- discovery_id: alicloud.cccvn.describecccvns
  calls:
  - action: describecccvns
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cccvn.listcccvns
  calls:
  - action: listcccvns
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cccvn.getcccvn
  calls:
  - action: getcccvn
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cccvn.querycccvn
  calls:
  - action: querycccvn
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cccvn.describecccvnattribute
  calls:
  - action: describecccvnattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
