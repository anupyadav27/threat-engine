version: '1.0'
provider: alicloud
service: pvtz
services:
  client: pvtz
  module: boto3.client
discovery:
- discovery_id: alicloud.pvtz.describepvtzs
  calls:
  - action: describepvtzs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.pvtz.listpvtzs
  calls:
  - action: listpvtzs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.pvtz.getpvtz
  calls:
  - action: getpvtz
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.pvtz.querypvtz
  calls:
  - action: querypvtz
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.pvtz.describepvtzattribute
  calls:
  - action: describepvtzattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
