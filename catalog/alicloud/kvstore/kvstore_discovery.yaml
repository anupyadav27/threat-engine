version: '1.0'
provider: alicloud
service: kvstore
services:
  client: kvstore
  module: boto3.client
discovery:
- discovery_id: alicloud.kvstore.describekvstores
  calls:
  - action: describekvstores
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.kvstore.listkvstores
  calls:
  - action: listkvstores
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.kvstore.getkvstore
  calls:
  - action: getkvstore
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.kvstore.querykvstore
  calls:
  - action: querykvstore
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.kvstore.describekvstoreattribute
  calls:
  - action: describekvstoreattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
