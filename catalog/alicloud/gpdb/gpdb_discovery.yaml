version: '1.0'
provider: alicloud
service: gpdb
services:
  client: gpdb
  module: boto3.client
discovery:
- discovery_id: alicloud.gpdb.describegpdbs
  calls:
  - action: describegpdbs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.gpdb.listgpdbs
  calls:
  - action: listgpdbs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.gpdb.getgpdb
  calls:
  - action: getgpdb
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.gpdb.querygpdb
  calls:
  - action: querygpdb
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.gpdb.describegpdbattribute
  calls:
  - action: describegpdbattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
