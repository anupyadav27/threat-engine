version: '1.0'
provider: alicloud
service: hdm
services:
  client: hdm
  module: alibabacloud_python_sdk.hdm
discovery:
  # ── DescribeHdms ──
  - discovery_id: alicloud.hdm.DescribeHdms
    calls:
      - action: DescribeHdms
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        CreateTime: '{{ item.CreateTime }}'
        InstanceId: '{{ item.InstanceId }}'
        Name: '{{ item.Name }}'
        RegionId: '{{ item.RegionId }}'
        Status: '{{ item.Status }}'
        Tags: '{{ item.Tags }}'
        Description: '{{ item.Description }}'
        ExpireTime: '{{ item.ExpireTime }}'
        OwnerId: '{{ item.OwnerId }}'
        ResourceGroupId: '{{ item.ResourceGroupId }}'
        ZoneId: '{{ item.ZoneId }}'
  # ── Dependent ops ──
  # ── DescribeHdm [dependent] ──
  - discovery_id: alicloud.hdm.DescribeHdm
    calls:
      - action: DescribeHdm
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        CreateTime: '{{ response.CreateTime }}'
        InstanceId: '{{ response.InstanceId }}'
        Name: '{{ response.Name }}'
        RegionId: '{{ response.RegionId }}'
        Status: '{{ response.Status }}'
        Tags: '{{ response.Tags }}'
        Description: '{{ response.Description }}'
        ExpireTime: '{{ response.ExpireTime }}'
        OwnerId: '{{ response.OwnerId }}'
