version: '1.0'
provider: alicloud
service: alidfs
services:
  client: alidfs
  module: boto3.client
discovery:
- discovery_id: alicloud.alidfs.describealidfss
  calls:
  - action: describealidfss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.alidfs.listalidfss
  calls:
  - action: listalidfss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.alidfs.getalidfs
  calls:
  - action: getalidfs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.alidfs.queryalidfs
  calls:
  - action: queryalidfs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.alidfs.describealidfsattribute
  calls:
  - action: describealidfsattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
