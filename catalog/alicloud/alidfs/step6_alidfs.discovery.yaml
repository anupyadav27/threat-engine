version: '1.0'
provider: alicloud
service: alidfs
services:
  client: alidfs
  module: alibabacloud_python_sdk.alidfs
discovery:
  # ── DescribeAlidfss ──
  - discovery_id: alicloud.alidfs.DescribeAlidfss
    calls:
      - action: DescribeAlidfss
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        CreateTime: '{{ item.CreateTime }}'
        InstanceId: '{{ item.InstanceId }}'
        Name: '{{ item.Name }}'
        RegionId: '{{ item.RegionId }}'
        Status: '{{ item.Status }}'
        Tags: '{{ item.Tags }}'
        Description: '{{ item.Description }}'
        ExpireTime: '{{ item.ExpireTime }}'
        OwnerId: '{{ item.OwnerId }}'
        ResourceGroupId: '{{ item.ResourceGroupId }}'
        ZoneId: '{{ item.ZoneId }}'
  # ── Dependent ops ──
  # ── DescribeAlidfs [dependent] ──
  - discovery_id: alicloud.alidfs.DescribeAlidfs
    calls:
      - action: DescribeAlidfs
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        CreateTime: '{{ response.CreateTime }}'
        InstanceId: '{{ response.InstanceId }}'
        Name: '{{ response.Name }}'
        RegionId: '{{ response.RegionId }}'
        Status: '{{ response.Status }}'
        Tags: '{{ response.Tags }}'
        Description: '{{ response.Description }}'
        ExpireTime: '{{ response.ExpireTime }}'
        OwnerId: '{{ response.OwnerId }}'
        ResourceGroupId: '{{ response.ResourceGroupId }}'
        ZoneId: '{{ response.ZoneId }}'
