# Discovery YAML — bss (AliCloud)
# Generated: 2026-02-21T06:19:57Z
version: '1.0'
provider: alicloud
service: bss
services:
  client: bss
  module: alibabacloud_python_sdk.bss
discovery:
  # ── DescribeCouponList ──
  - discovery_id: alicloud.bss.DescribeCouponList
    calls:
      - action: DescribeCouponList
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        coupon_list_status: '{{ item.coupon_list_status }}'
        creation_time: '{{ item.creation_time }}'
        instance_id: '{{ item.instance_id }}'
        instance_name: '{{ item.instance_name }}'
        region_id: '{{ item.region_id }}'
        tags: '{{ item.tags }}'
        zone_id: '{{ item.zone_id }}'
  # ── Dependent ops ──
  # ── DescribeCashDetail [dependent] ──
  - discovery_id: alicloud.bss.DescribeCashDetail
    calls:
      - action: DescribeCashDetail
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        cash_detail_status: '{{ response.cash_detail_status }}'
        creation_time: '{{ response.creation_time }}'
        instance_id: '{{ response.instance_id }}'
        instance_name: '{{ response.instance_name }}'
        region_id: '{{ response.region_id }}'
        tags: '{{ response.tags }}'
        zone_id: '{{ response.zone_id }}'
    # required_params: ['cash_detail_id']
  # ── DescribeCouponDetail [dependent] ──
  - discovery_id: alicloud.bss.DescribeCouponDetail
    calls:
      - action: DescribeCouponDetail
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        coupon_detail_status: '{{ response.coupon_detail_status }}'
        creation_time: '{{ response.creation_time }}'
        instance_id: '{{ response.instance_id }}'
        instance_name: '{{ response.instance_name }}'
        region_id: '{{ response.region_id }}'
        tags: '{{ response.tags }}'
        zone_id: '{{ response.zone_id }}'
    # required_params: ['coupon_detail_id']
