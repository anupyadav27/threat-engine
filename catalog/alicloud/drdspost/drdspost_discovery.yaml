version: '1.0'
provider: alicloud
service: drdspost
services:
  client: drdspost
  module: boto3.client
discovery:
- discovery_id: alicloud.drdspost.describedrdsposts
  calls:
  - action: describedrdsposts
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.drdspost.listdrdsposts
  calls:
  - action: listdrdsposts
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.drdspost.getdrdspost
  calls:
  - action: getdrdspost
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.drdspost.querydrdspost
  calls:
  - action: querydrdspost
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.drdspost.describedrdspostattribute
  calls:
  - action: describedrdspostattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
