# Discovery YAML — sts (AliCloud)
# Generated: 2026-02-21T06:19:57Z
version: '1.0'
provider: alicloud
service: sts
services:
  client: sts
  module: alibabacloud_python_sdk.sts
discovery:
  # ── GetCallerIdentity ──
  - discovery_id: alicloud.sts.GetCallerIdentity
    calls:
      - action: GetCallerIdentity
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        creation_time: '{{ response.creation_time }}'
        instance_id: '{{ response.instance_id }}'
        instance_name: '{{ response.instance_name }}'
        region_id: '{{ response.region_id }}'
        status: '{{ response.status }}'
        tags: '{{ response.tags }}'
        zone_id: '{{ response.zone_id }}'
