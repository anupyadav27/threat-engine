version: '1.0'
provider: alicloud
service: nlp
services:
  client: nlp
  module: boto3.client
discovery:
- discovery_id: alicloud.nlp.describenlps
  calls:
  - action: describenlps
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.nlp.listnlps
  calls:
  - action: listnlps
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.nlp.getnlp
  calls:
  - action: getnlp
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.nlp.querynlp
  calls:
  - action: querynlp
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.nlp.describenlpattribute
  calls:
  - action: describenlpattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
