version: '1.0'
provider: alicloud
service: dds
services:
  client: dds
  module: boto3.client
discovery:
- discovery_id: alicloud.dds.describeddss
  calls:
  - action: describeddss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.dds.listddss
  calls:
  - action: listddss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.dds.getdds
  calls:
  - action: getdds
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.dds.querydds
  calls:
  - action: querydds
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.dds.describeddsattribute
  calls:
  - action: describeddsattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
