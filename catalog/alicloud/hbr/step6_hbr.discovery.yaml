  - discovery_id: alicloud.hbr.DescribeBackupClients
    calls:
      - action: DescribeBackupClients
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        backup_client_status: '{{ response.backup_client_status }}'
        creation_time: '{{ response.creation_time }}'
        instance_id: '{{ response.instance_id }}'
        instance_name: '{{ response.instance_name }}'
