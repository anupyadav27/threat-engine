# Discovery YAML — httpdns (AliCloud)
# Generated: 2026-02-21T06:19:57Z
version: '1.0'
provider: alicloud
service: httpdns
services:
  client: httpdns
  module: alibabacloud_python_sdk.httpdns
discovery:
  # ── DescribeDomains ──
  - discovery_id: alicloud.httpdns.DescribeDomains
    calls:
      - action: DescribeDomains
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        creation_time: '{{ item.creation_time }}'
        instance_id: '{{ item.instance_id }}'
        instance_name: '{{ item.instance_name }}'
        region_id: '{{ item.region_id }}'
        status: '{{ item.status }}'
        tags: '{{ item.tags }}'
        zone_id: '{{ item.zone_id }}'
