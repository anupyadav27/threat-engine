version: '1.0'
provider: alicloud
service: alikafka
services:
  client: alikafka
  module: boto3.client
discovery:
- discovery_id: alicloud.alikafka.describealikafkas
  calls:
  - action: describealikafkas
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.alikafka.listalikafkas
  calls:
  - action: listalikafkas
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.alikafka.getalikafka
  calls:
  - action: getalikafka
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.alikafka.queryalikafka
  calls:
  - action: queryalikafka
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.alikafka.describealikafkaattribute
  calls:
  - action: describealikafkaattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
