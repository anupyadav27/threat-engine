# Discovery YAML — alb (AliCloud)
# Generated: 2026-02-21T06:19:57Z
version: '1.0'
provider: alicloud
service: alb
services:
  client: alb
  module: alibabacloud_python_sdk.alb
discovery:
  # ── DescribeRegions [dependent] ──
  - discovery_id: alicloud.alb.DescribeRegions
    calls:
      - action: DescribeRegions
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        creation_time: '{{ response.creation_time }}'
        instance_id: '{{ response.instance_id }}'
        instance_name: '{{ response.instance_name }}'
        region_id: '{{ response.region_id }}'
        region_status: '{{ response.region_status }}'
        tags: '{{ response.tags }}'
        zone_id: '{{ response.zone_id }}'
    # required_params: ['region_id']
  # ── DescribeZones [dependent] ──
  - discovery_id: alicloud.alb.DescribeZones
    calls:
      - action: DescribeZones
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        creation_time: '{{ response.creation_time }}'
        instance_id: '{{ response.instance_id }}'
        instance_name: '{{ response.instance_name }}'
        region_id: '{{ response.region_id }}'
        tags: '{{ response.tags }}'
        zon_status: '{{ response.zon_status }}'
        zone_id: '{{ response.zone_id }}'
    # required_params: ['zon_id']
  # ── GetHealthCheckTemplateAttribute [dependent] ──
  - discovery_id: alicloud.alb.GetHealthCheckTemplateAttribute
    calls:
      - action: GetHealthCheckTemplateAttribute
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        creation_time: '{{ response.creation_time }}'
        health_check_template_attribute_status: '{{ response.health_check_template_attribute_status }}'
        instance_id: '{{ response.instance_id }}'
        instance_name: '{{ response.instance_name }}'
        region_id: '{{ response.region_id }}'
        tags: '{{ response.tags }}'
        zone_id: '{{ response.zone_id }}'
    # required_params: ['health_check_template_attribute_id']
