# Discovery YAML — ess (AliCloud)
# Generated: 2026-02-21T06:19:57Z
version: '1.0'
provider: alicloud
service: ess
services:
  client: ess
  module: alibabacloud_python_sdk.ess
discovery:
  # ── DescribeAlarms [dependent] ──
  - discovery_id: alicloud.ess.DescribeAlarms
    calls:
      - action: DescribeAlarms
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        alarm_status: '{{ response.alarm_status }}'
        creation_time: '{{ response.creation_time }}'
        instance_id: '{{ response.instance_id }}'
        instance_name: '{{ response.instance_name }}'
        region_id: '{{ response.region_id }}'
        tags: '{{ response.tags }}'
        zone_id: '{{ response.zone_id }}'
    # required_params: ['alarm_id']
