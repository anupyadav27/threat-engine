version: '1.0'
provider: alicloud
service: pts
services:
  client: pts
  module: boto3.client
discovery:
- discovery_id: alicloud.pts.describeptss
  calls:
  - action: describeptss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.pts.listptss
  calls:
  - action: listptss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.pts.getpts
  calls:
  - action: getpts
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.pts.querypts
  calls:
  - action: querypts
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.pts.describeptsattribute
  calls:
  - action: describeptsattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
