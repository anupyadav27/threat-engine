version: '1.0'
provider: alicloud
service: ivision
services:
  client: ivision
  module: boto3.client
discovery:
- discovery_id: alicloud.ivision.describeivisions
  calls:
  - action: describeivisions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ivision.listivisions
  calls:
  - action: listivisions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ivision.getivision
  calls:
  - action: getivision
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ivision.queryivision
  calls:
  - action: queryivision
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ivision.describeivisionattribute
  calls:
  - action: describeivisionattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
