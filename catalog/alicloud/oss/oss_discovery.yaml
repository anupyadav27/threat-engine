version: '1.0'
provider: alicloud
service: oss
services:
  client: oss
  module: boto3.client
discovery:
- discovery_id: alicloud.oss.describeosss
  calls:
  - action: describeosss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.oss.listosss
  calls:
  - action: listosss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.oss.getoss
  calls:
  - action: getoss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.oss.queryoss
  calls:
  - action: queryoss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.oss.describeossattribute
  calls:
  - action: describeossattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
