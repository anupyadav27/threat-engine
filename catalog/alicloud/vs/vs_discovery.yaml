version: '1.0'
provider: alicloud
service: vs
services:
  client: vs
  module: boto3.client
discovery:
- discovery_id: alicloud.vs.describevss
  calls:
  - action: describevss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.vs.listvss
  calls:
  - action: listvss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.vs.getvs
  calls:
  - action: getvs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.vs.queryvs
  calls:
  - action: queryvs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.vs.describevsattribute
  calls:
  - action: describevsattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
