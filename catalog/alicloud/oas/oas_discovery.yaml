version: '1.0'
provider: alicloud
service: oas
services:
  client: oas
  module: boto3.client
discovery:
- discovery_id: alicloud.oas.describeoass
  calls:
  - action: describeoass
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.oas.listoass
  calls:
  - action: listoass
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.oas.getoas
  calls:
  - action: getoas
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.oas.queryoas
  calls:
  - action: queryoas
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.oas.describeoasattribute
  calls:
  - action: describeoasattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
