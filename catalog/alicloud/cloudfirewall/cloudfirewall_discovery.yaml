version: '1.0'
provider: alicloud
service: cloudfirewall
services:
  client: cloudfirewall
  module: boto3.client
discovery:
- discovery_id: alicloud.cloudfirewall.describecloudfirewalls
  calls:
  - action: describecloudfirewalls
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cloudfirewall.listcloudfirewalls
  calls:
  - action: listcloudfirewalls
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cloudfirewall.getcloudfirewall
  calls:
  - action: getcloudfirewall
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cloudfirewall.querycloudfirewall
  calls:
  - action: querycloudfirewall
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cloudfirewall.describecloudfirewallattribute
  calls:
  - action: describecloudfirewallattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
