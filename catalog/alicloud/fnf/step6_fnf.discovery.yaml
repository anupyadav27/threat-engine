# Discovery YAML — fnf (AliCloud)
# Generated: 2026-02-21T06:19:57Z
version: '1.0'
provider: alicloud
service: fnf
services:
  client: fnf
  module: alibabacloud_python_sdk.fnf
discovery:
  # ── ListExecutions ──
  - discovery_id: alicloud.fnf.ListExecutions
    calls:
      - action: ListExecutions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        creation_time: '{{ item.creation_time }}'
        execution_status: '{{ item.execution_status }}'
        instance_id: '{{ item.instance_id }}'
        instance_name: '{{ item.instance_name }}'
        region_id: '{{ item.region_id }}'
        tags: '{{ item.tags }}'
        zone_id: '{{ item.zone_id }}'
