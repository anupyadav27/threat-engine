version: '1.0'
provider: alicloud
service: baas
services:
  client: baas
  module: boto3.client
discovery:
- discovery_id: alicloud.baas.describebaass
  calls:
  - action: describebaass
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.baas.listbaass
  calls:
  - action: listbaass
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.baas.getbaas
  calls:
  - action: getbaas
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.baas.querybaas
  calls:
  - action: querybaas
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.baas.describebaasattribute
  calls:
  - action: describebaasattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
