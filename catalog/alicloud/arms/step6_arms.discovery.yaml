# Discovery YAML — arms (AliCloud)
# Generated: 2026-02-21T06:19:57Z
version: '1.0'
provider: alicloud
service: arms
services:
  client: arms
  module: alibabacloud_python_sdk.arms
discovery:
  # ── DescribeAddonRelease [dependent] ──
  - discovery_id: alicloud.arms.DescribeAddonRelease
    calls:
      - action: DescribeAddonRelease
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        addon_release_status: '{{ response.addon_release_status }}'
        creation_time: '{{ response.creation_time }}'
        instance_id: '{{ response.instance_id }}'
        instance_name: '{{ response.instance_name }}'
        region_id: '{{ response.region_id }}'
        tags: '{{ response.tags }}'
        zone_id: '{{ response.zone_id }}'
    # required_params: ['addon_release_id']
  # ── DescribeContactGroups [dependent] ──
  - discovery_id: alicloud.arms.DescribeContactGroups
    calls:
      - action: DescribeContactGroups
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        contact_group_status: '{{ response.contact_group_status }}'
        creation_time: '{{ response.creation_time }}'
        instance_id: '{{ response.instance_id }}'
        instance_name: '{{ response.instance_name }}'
        region_id: '{{ response.region_id }}'
        tags: '{{ response.tags }}'
        zone_id: '{{ response.zone_id }}'
    # required_params: ['contact_group_id']
  # ── DescribeContacts [dependent] ──
  - discovery_id: alicloud.arms.DescribeContacts
    calls:
      - action: DescribeContacts
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        contact_status: '{{ response.contact_status }}'
        creation_time: '{{ response.creation_time }}'
        instance_id: '{{ response.instance_id }}'
        instance_name: '{{ response.instance_name }}'
        region_id: '{{ response.region_id }}'
        tags: '{{ response.tags }}'
        zone_id: '{{ response.zone_id }}'
    # required_params: ['contact_id']
  # ── DescribeDispatchRule [dependent] ──
  - discovery_id: alicloud.arms.DescribeDispatchRule
    calls:
      - action: DescribeDispatchRule
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        creation_time: '{{ response.creation_time }}'
        dispatch_rule_status: '{{ response.dispatch_rule_status }}'
        instance_id: '{{ response.instance_id }}'
        instance_name: '{{ response.instance_name }}'
        region_id: '{{ response.region_id }}'
        tags: '{{ response.tags }}'
        zone_id: '{{ response.zone_id }}'
    # required_params: ['dispatch_rule_id']
