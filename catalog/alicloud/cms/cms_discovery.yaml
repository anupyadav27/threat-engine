version: '1.0'
provider: alicloud
service: cms
services:
  client: cms
  module: boto3.client
discovery:
- discovery_id: alicloud.cms.describecmss
  calls:
  - action: describecmss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cms.listcmss
  calls:
  - action: listcmss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cms.getcms
  calls:
  - action: getcms
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cms.querycms
  calls:
  - action: querycms
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cms.describecmsattribute
  calls:
  - action: describecmsattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
