version: '1.0'
provider: alicloud
service: odpsmayi
services:
  client: odpsmayi
  module: boto3.client
discovery:
- discovery_id: alicloud.odpsmayi.describeodpsmayis
  calls:
  - action: describeodpsmayis
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.odpsmayi.listodpsmayis
  calls:
  - action: listodpsmayis
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.odpsmayi.getodpsmayi
  calls:
  - action: getodpsmayi
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.odpsmayi.queryodpsmayi
  calls:
  - action: queryodpsmayi
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.odpsmayi.describeodpsmayiattribute
  calls:
  - action: describeodpsmayiattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
