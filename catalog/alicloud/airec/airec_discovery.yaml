version: '1.0'
provider: alicloud
service: airec
services:
  client: airec
  module: boto3.client
discovery:
- discovery_id: alicloud.airec.describeairecs
  calls:
  - action: describeairecs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.airec.listairecs
  calls:
  - action: listairecs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.airec.getairec
  calls:
  - action: getairec
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.airec.queryairec
  calls:
  - action: queryairec
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.airec.describeairecattribute
  calls:
  - action: describeairecattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
