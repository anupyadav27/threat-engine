version: '1.0'
provider: alicloud
service: petadata
services:
  client: petadata
  module: boto3.client
discovery:
- discovery_id: alicloud.petadata.describepetadatas
  calls:
  - action: describepetadatas
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.petadata.listpetadatas
  calls:
  - action: listpetadatas
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.petadata.getpetadata
  calls:
  - action: getpetadata
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.petadata.querypetadata
  calls:
  - action: querypetadata
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.petadata.describepetadataattribute
  calls:
  - action: describepetadataattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
