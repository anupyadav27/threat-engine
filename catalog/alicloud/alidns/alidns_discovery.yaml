version: '1.0'
provider: alicloud
service: alidns
services:
  client: alidns
  module: boto3.client
discovery:
- discovery_id: alicloud.alidns.describealidnss
  calls:
  - action: describealidnss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.alidns.listalidnss
  calls:
  - action: listalidnss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.alidns.getalidns
  calls:
  - action: getalidns
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.alidns.queryalidns
  calls:
  - action: queryalidns
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.alidns.describealidnsattribute
  calls:
  - action: describealidnsattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
