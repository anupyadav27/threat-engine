version: '1.0'
provider: alicloud
service: jaq
services:
  client: jaq
  module: boto3.client
discovery:
- discovery_id: alicloud.jaq.describejaqs
  calls:
  - action: describejaqs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.jaq.listjaqs
  calls:
  - action: listjaqs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.jaq.getjaq
  calls:
  - action: getjaq
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.jaq.queryjaq
  calls:
  - action: queryjaq
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.jaq.describejaqattribute
  calls:
  - action: describejaqattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
