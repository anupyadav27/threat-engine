version: '1.0'
provider: alicloud
service: kms
services:
  client: kms
  module: boto3.client
discovery:
- discovery_id: alicloud.kms.describekmss
  calls:
  - action: describekmss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.kms.listkmss
  calls:
  - action: listkmss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.kms.getkms
  calls:
  - action: getkms
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.kms.querykms
  calls:
  - action: querykms
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.kms.describekmsattribute
  calls:
  - action: describekmsattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
