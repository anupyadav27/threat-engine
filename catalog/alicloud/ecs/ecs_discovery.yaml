version: '1.0'
provider: alicloud
service: ecs
services:
  client: ecs
  module: boto3.client
discovery:
- discovery_id: alicloud.ecs.describeecss
  calls:
  - action: describeecss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ecs.listecss
  calls:
  - action: listecss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ecs.getecs
  calls:
  - action: getecs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ecs.queryecs
  calls:
  - action: queryecs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ecs.describeecsattribute
  calls:
  - action: describeecsattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
