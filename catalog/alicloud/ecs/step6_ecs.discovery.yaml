  - discovery_id: alicloud.ecs.DescribeAccessPoints
    calls:
      - action: DescribeAccessPoints
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        access_point_status: '{{ response.access_point_status }}'
        creation_time: '{{ response.creation_time }}'
        instance_id: '{{ response.instance_id }}'
        instance_name: '{{ response.instance_name }}'
        region_id: '{{ response.region_id }}'
        tags: '{{ response.tags }}'
