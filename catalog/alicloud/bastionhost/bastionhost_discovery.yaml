version: '1.0'
provider: alicloud
service: bastionhost
services:
  client: bastionhost
  module: boto3.client
discovery:
- discovery_id: alicloud.bastionhost.describebastionhosts
  calls:
  - action: describebastionhosts
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.bastionhost.listbastionhosts
  calls:
  - action: listbastionhosts
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.bastionhost.getbastionhost
  calls:
  - action: getbastionhost
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.bastionhost.querybastionhost
  calls:
  - action: querybastionhost
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.bastionhost.describebastionhostattribute
  calls:
  - action: describebastionhostattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
