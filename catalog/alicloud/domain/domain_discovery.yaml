version: '1.0'
provider: alicloud
service: domain
services:
  client: domain
  module: boto3.client
discovery:
- discovery_id: alicloud.domain.describedomains
  calls:
  - action: describedomains
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.domain.listdomains
  calls:
  - action: listdomains
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.domain.getdomain
  calls:
  - action: getdomain
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.domain.querydomain
  calls:
  - action: querydomain
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.domain.describedomainattribute
  calls:
  - action: describedomainattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
