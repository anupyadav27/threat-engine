version: '1.0'
provider: alicloud
service: hcs_mgw
services:
  client: hcs_mgw
  module: boto3.client
discovery:
- discovery_id: alicloud.hcs_mgw.describehcsMgws
  calls:
  - action: describehcsMgws
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.hcs_mgw.listhcsMgws
  calls:
  - action: listhcsMgws
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.hcs_mgw.gethcsMgw
  calls:
  - action: gethcsMgw
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.hcs_mgw.queryhcsMgw
  calls:
  - action: queryhcsMgw
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.hcs_mgw.describehcsMgwattribute
  calls:
  - action: describehcsMgwattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
