version: '1.0'
provider: alicloud
service: redisa
services:
  client: redisa
  module: boto3.client
discovery:
- discovery_id: alicloud.redisa.describeredisas
  calls:
  - action: describeredisas
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.redisa.listredisas
  calls:
  - action: listredisas
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.redisa.getredisa
  calls:
  - action: getredisa
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.redisa.queryredisa
  calls:
  - action: queryredisa
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.redisa.describeredisaattribute
  calls:
  - action: describeredisaattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
