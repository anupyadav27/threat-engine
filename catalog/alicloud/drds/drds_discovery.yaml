version: '1.0'
provider: alicloud
service: drds
services:
  client: drds
  module: boto3.client
discovery:
- discovery_id: alicloud.drds.describedrdss
  calls:
  - action: describedrdss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.drds.listdrdss
  calls:
  - action: listdrdss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.drds.getdrds
  calls:
  - action: getdrds
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.drds.querydrds
  calls:
  - action: querydrds
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.drds.describedrdsattribute
  calls:
  - action: describedrdsattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
