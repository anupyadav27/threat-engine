version: '1.0'
provider: alicloud
service: rds
services:
  client: rds
  module: alibabacloud_python_sdk.rds
discovery:
  # ── DescribeADInfo [dependent] ──
  - discovery_id: alicloud.rds.DescribeADInfo
    calls:
      - action: DescribeADInfo
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        ad_info_status: '{{ response.ad_info_status }}'
        creation_time: '{{ response.creation_time }}'
        instance_id: '{{ response.instance_id }}'
        instance_name: '{{ response.instance_name }}'
        region_id: '{{ response.region_id }}'
        tags: '{{ response.tags }}'
        zone_id: '{{ response.zone_id }}'
    # required_params: ['ad_info_id']
