# Discovery YAML — ots (AliCloud)
# Generated: 2026-02-21T06:19:57Z
version: '1.0'
provider: alicloud
service: ots
services:
  client: ots
  module: alibabacloud_python_sdk.ots
discovery:
  # ── GetInstance ──
  - discovery_id: alicloud.ots.GetInstance
    calls:
      - action: GetInstance
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        creation_time: '{{ response.creation_time }}'
        instance_id: '{{ response.instance_id }}'
        instance_name: '{{ response.instance_name }}'
        region_id: '{{ response.region_id }}'
        status: '{{ response.status }}'
        tags: '{{ response.tags }}'
        zone_id: '{{ response.zone_id }}'
  # ── ListClusterType ──
  - discovery_id: alicloud.ots.ListClusterType
    calls:
      - action: ListClusterType
        save_as: response
        on_error: continue
    emit:
