version: '1.0'
provider: alicloud
service: ddosrewards
services:
  client: ddosrewards
  module: boto3.client
discovery:
- discovery_id: alicloud.ddosrewards.describeddosrewardss
  calls:
  - action: describeddosrewardss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ddosrewards.listddosrewardss
  calls:
  - action: listddosrewardss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ddosrewards.getddosrewards
  calls:
  - action: getddosrewards
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ddosrewards.queryddosrewards
  calls:
  - action: queryddosrewards
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ddosrewards.describeddosrewardsattribute
  calls:
  - action: describeddosrewardsattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
