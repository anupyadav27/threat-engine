version: '1.0'
provider: alicloud
service: cloudfw
services:
  client: cloudfw
  module: alibabacloud_python_sdk.cloudfw
discovery:
  # ── DescribeAssetList ──
  - discovery_id: alicloud.cloudfw.DescribeAssetList
    calls:
      - action: DescribeAssetList
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        asset_list_status: '{{ item.asset_list_status }}'
        creation_time: '{{ item.creation_time }}'
        instance_id: '{{ item.instance_id }}'
        instance_name: '{{ item.instance_name }}'
        region_id: '{{ item.region_id }}'
        tags: '{{ item.tags }}'
        zone_id: '{{ item.zone_id }}'
