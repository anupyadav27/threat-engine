version: '1.0'
provider: alicloud
service: sca
services:
  client: sca
  module: boto3.client
discovery:
- discovery_id: alicloud.sca.describescas
  calls:
  - action: describescas
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.sca.listscas
  calls:
  - action: listscas
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.sca.getsca
  calls:
  - action: getsca
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.sca.querysca
  calls:
  - action: querysca
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.sca.describescaattribute
  calls:
  - action: describescaattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
