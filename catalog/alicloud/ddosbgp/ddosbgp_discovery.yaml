version: '1.0'
provider: alicloud
service: ddosbgp
services:
  client: ddosbgp
  module: boto3.client
discovery:
- discovery_id: alicloud.ddosbgp.describeddosbgps
  calls:
  - action: describeddosbgps
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ddosbgp.listddosbgps
  calls:
  - action: listddosbgps
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ddosbgp.getddosbgp
  calls:
  - action: getddosbgp
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ddosbgp.queryddosbgp
  calls:
  - action: queryddosbgp
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ddosbgp.describeddosbgpattribute
  calls:
  - action: describeddosbgpattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
