version: '1.0'
provider: alicloud
service: gameshield
services:
  client: gameshield
  module: boto3.client
discovery:
- discovery_id: alicloud.gameshield.describegameshields
  calls:
  - action: describegameshields
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.gameshield.listgameshields
  calls:
  - action: listgameshields
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.gameshield.getgameshield
  calls:
  - action: getgameshield
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.gameshield.querygameshield
  calls:
  - action: querygameshield
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.gameshield.describegameshieldattribute
  calls:
  - action: describegameshieldattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
