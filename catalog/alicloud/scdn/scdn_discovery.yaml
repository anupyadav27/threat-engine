version: '1.0'
provider: alicloud
service: scdn
services:
  client: scdn
  module: boto3.client
discovery:
- discovery_id: alicloud.scdn.describescdns
  calls:
  - action: describescdns
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.scdn.listscdns
  calls:
  - action: listscdns
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.scdn.getscdn
  calls:
  - action: getscdn
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.scdn.queryscdn
  calls:
  - action: queryscdn
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.scdn.describescdnattribute
  calls:
  - action: describescdnattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
