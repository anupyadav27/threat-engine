version: '1.0'
provider: alicloud
service: foas
services:
  client: foas
  module: boto3.client
discovery:
- discovery_id: alicloud.foas.describefoass
  calls:
  - action: describefoass
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.foas.listfoass
  calls:
  - action: listfoass
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.foas.getfoas
  calls:
  - action: getfoas
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.foas.queryfoas
  calls:
  - action: queryfoas
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.foas.describefoasattribute
  calls:
  - action: describefoasattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
