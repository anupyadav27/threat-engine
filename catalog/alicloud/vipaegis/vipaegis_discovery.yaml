version: '1.0'
provider: alicloud
service: vipaegis
services:
  client: vipaegis
  module: boto3.client
discovery:
- discovery_id: alicloud.vipaegis.describevipaegiss
  calls:
  - action: describevipaegiss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.vipaegis.listvipaegiss
  calls:
  - action: listvipaegiss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.vipaegis.getvipaegis
  calls:
  - action: getvipaegis
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.vipaegis.queryvipaegis
  calls:
  - action: queryvipaegis
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.vipaegis.describevipaegisattribute
  calls:
  - action: describevipaegisattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
