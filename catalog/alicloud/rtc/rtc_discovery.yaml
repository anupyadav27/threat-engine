version: '1.0'
provider: alicloud
service: rtc
services:
  client: rtc
  module: boto3.client
discovery:
- discovery_id: alicloud.rtc.describertcs
  calls:
  - action: describertcs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.rtc.listrtcs
  calls:
  - action: listrtcs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.rtc.getrtc
  calls:
  - action: getrtc
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.rtc.queryrtc
  calls:
  - action: queryrtc
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.rtc.describertcattribute
  calls:
  - action: describertcattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
