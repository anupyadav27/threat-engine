version: '1.0'
provider: alicloud
service: imagesearch
services:
  client: imagesearch
  module: boto3.client
discovery:
- discovery_id: alicloud.imagesearch.describeimagesearchs
  calls:
  - action: describeimagesearchs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.imagesearch.listimagesearchs
  calls:
  - action: listimagesearchs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.imagesearch.getimagesearch
  calls:
  - action: getimagesearch
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.imagesearch.queryimagesearch
  calls:
  - action: queryimagesearch
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.imagesearch.describeimagesearchattribute
  calls:
  - action: describeimagesearchattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
