version: '1.0'
provider: alicloud
service: cdn
services:
  client: cdn
  module: boto3.client
discovery:
- discovery_id: alicloud.cdn.describecdns
  calls:
  - action: describecdns
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cdn.listcdns
  calls:
  - action: listcdns
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cdn.getcdn
  calls:
  - action: getcdn
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cdn.querycdn
  calls:
  - action: querycdn
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cdn.describecdnattribute
  calls:
  - action: describecdnattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
