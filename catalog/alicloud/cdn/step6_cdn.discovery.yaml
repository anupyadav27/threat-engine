version: '1.0'
provider: alicloud
service: cdn
services:
  client: cdn
  module: alibabacloud_python_sdk.cdn
discovery:
  # ── DescribeCdnCertificateList ──
  - discovery_id: alicloud.cdn.DescribeCdnCertificateList
    calls:
      - action: DescribeCdnCertificateList
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        cdn_certificate_list_status: '{{ item.cdn_certificate_list_status }}'
        creation_time: '{{ item.creation_time }}'
        instance_id: '{{ item.instance_id }}'
        instance_name: '{{ item.instance_name }}'
        region_id: '{{ item.region_id }}'
        tags: '{{ item.tags }}'
