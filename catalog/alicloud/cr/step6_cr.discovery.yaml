  # ── GetAuthorizationToken [dependent] ──
  - discovery_id: alicloud.cr.GetAuthorizationToken
    calls:
      - action: GetAuthorizationToken
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        authorization_token_status: '{{ response.authorization_token_status }}'
        creation_time: '{{ response.creation_time }}'
        instance_id: '{{ response.instance_id }}'
        instance_name: '{{ response.instance_name }}'
        region_id: '{{ response.region_id }}'
        tags: '{{ response.tags }}'
        zone_id: '{{ response.zone_id }}'
