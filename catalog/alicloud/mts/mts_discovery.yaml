version: '1.0'
provider: alicloud
service: mts
services:
  client: mts
  module: boto3.client
discovery:
- discovery_id: alicloud.mts.describemtss
  calls:
  - action: describemtss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.mts.listmtss
  calls:
  - action: listmtss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.mts.getmts
  calls:
  - action: getmts
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.mts.querymts
  calls:
  - action: querymts
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.mts.describemtsattribute
  calls:
  - action: describemtsattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
