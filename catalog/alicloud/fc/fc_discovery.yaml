version: '1.0'
provider: alicloud
service: fc
services:
  client: fc
  module: boto3.client
discovery:
- discovery_id: alicloud.fc.describefcs
  calls:
  - action: describefcs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.fc.listfcs
  calls:
  - action: listfcs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.fc.getfc
  calls:
  - action: getfc
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.fc.queryfc
  calls:
  - action: queryfc
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.fc.describefcattribute
  calls:
  - action: describefcattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
