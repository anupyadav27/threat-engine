# Discovery YAML — elasticsearch (AliCloud)
# Generated: 2026-02-21T06:19:57Z
version: '1.0'
provider: alicloud
service: elasticsearch
services:
  client: elasticsearch
  module: alibabacloud_python_sdk.elasticsearch
discovery:
  # ── DescribeAckOperator [dependent] ──
  - discovery_id: alicloud.elasticsearch.DescribeAckOperator
    calls:
      - action: DescribeAckOperator
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        ack_operator_status: '{{ response.ack_operator_status }}'
        creation_time: '{{ response.creation_time }}'
        instance_id: '{{ response.instance_id }}'
        instance_name: '{{ response.instance_name }}'
        region_id: '{{ response.region_id }}'
        tags: '{{ response.tags }}'
        zone_id: '{{ response.zone_id }}'
    # required_params: ['ack_operator_id']
