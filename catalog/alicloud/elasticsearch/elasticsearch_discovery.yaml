version: '1.0'
provider: alicloud
service: elasticsearch
services:
  client: elasticsearch
  module: boto3.client
discovery:
- discovery_id: alicloud.elasticsearch.describeelasticsearchs
  calls:
  - action: describeelasticsearchs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.elasticsearch.listelasticsearchs
  calls:
  - action: listelasticsearchs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.elasticsearch.getelasticsearch
  calls:
  - action: getelasticsearch
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.elasticsearch.queryelasticsearch
  calls:
  - action: queryelasticsearch
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.elasticsearch.describeelasticsearchattribute
  calls:
  - action: describeelasticsearchattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
