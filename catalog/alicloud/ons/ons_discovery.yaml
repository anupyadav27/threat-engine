version: '1.0'
provider: alicloud
service: ons
services:
  client: ons
  module: boto3.client
discovery:
- discovery_id: alicloud.ons.describeonss
  calls:
  - action: describeonss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ons.listonss
  calls:
  - action: listonss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ons.getons
  calls:
  - action: getons
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ons.queryons
  calls:
  - action: queryons
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ons.describeonsattribute
  calls:
  - action: describeonsattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
