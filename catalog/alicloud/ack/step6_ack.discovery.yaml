version: '1.0'
provider: alicloud
service: ack
services:
  client: ack
  module: alibabacloud_python_sdk.ack
discovery:
  # ── DescribeAddons [dependent] ──
  - discovery_id: alicloud.ack.DescribeAddons
    calls:
      - action: DescribeAddons
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        addon_status: '{{ response.addon_status }}'
        creation_time: '{{ response.creation_time }}'
        instance_id: '{{ response.instance_id }}'
        instance_name: '{{ response.instance_name }}'
        region_id: '{{ response.region_id }}'
        tags: '{{ response.tags }}'
        zone_id: '{{ response.zone_id }}'
