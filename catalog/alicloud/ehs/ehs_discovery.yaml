version: '1.0'
provider: alicloud
service: ehs
services:
  client: ehs
  module: boto3.client
discovery:
- discovery_id: alicloud.ehs.describeehss
  calls:
  - action: describeehss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ehs.listehss
  calls:
  - action: listehss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ehs.getehs
  calls:
  - action: getehs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ehs.queryehs
  calls:
  - action: queryehs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ehs.describeehsattribute
  calls:
  - action: describeehsattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
