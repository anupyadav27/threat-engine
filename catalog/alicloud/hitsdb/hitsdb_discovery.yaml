version: '1.0'
provider: alicloud
service: hitsdb
services:
  client: hitsdb
  module: boto3.client
discovery:
- discovery_id: alicloud.hitsdb.describehitsdbs
  calls:
  - action: describehitsdbs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.hitsdb.listhitsdbs
  calls:
  - action: listhitsdbs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.hitsdb.gethitsdb
  calls:
  - action: gethitsdb
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.hitsdb.queryhitsdb
  calls:
  - action: queryhitsdb
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.hitsdb.describehitsdbattribute
  calls:
  - action: describehitsdbattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
