# Discovery YAML — cloudauth (AliCloud)
# Generated: 2026-02-21T06:19:57Z
version: '1.0'
provider: alicloud
service: cloudauth
services:
  client: cloudauth
  module: alibabacloud_python_sdk.cloudauth
discovery:
  # ── DescribeDeviceInfo ──
  - discovery_id: alicloud.cloudauth.DescribeDeviceInfo
    calls:
      - action: DescribeDeviceInfo
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        creation_time: '{{ item.creation_time }}'
        instance_id: '{{ item.instance_id }}'
        instance_name: '{{ item.instance_name }}'
        region_id: '{{ item.region_id }}'
        status: '{{ item.status }}'
        tags: '{{ item.tags }}'
        zone_id: '{{ item.zone_id }}'
