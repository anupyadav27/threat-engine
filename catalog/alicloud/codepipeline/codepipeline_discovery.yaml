version: '1.0'
provider: alicloud
service: codepipeline
services:
  client: codepipeline
  module: boto3.client
discovery:
- discovery_id: alicloud.codepipeline.describecodepipelines
  calls:
  - action: describecodepipelines
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.codepipeline.listcodepipelines
  calls:
  - action: listcodepipelines
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.codepipeline.getcodepipeline
  calls:
  - action: getcodepipeline
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.codepipeline.querycodepipeline
  calls:
  - action: querycodepipeline
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.codepipeline.describecodepipelineattribute
  calls:
  - action: describecodepipelineattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
