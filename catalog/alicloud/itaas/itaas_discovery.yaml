version: '1.0'
provider: alicloud
service: itaas
services:
  client: itaas
  module: boto3.client
discovery:
- discovery_id: alicloud.itaas.describeitaass
  calls:
  - action: describeitaass
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.itaas.listitaass
  calls:
  - action: listitaass
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.itaas.getitaas
  calls:
  - action: getitaas
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.itaas.queryitaas
  calls:
  - action: queryitaas
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.itaas.describeitaasattribute
  calls:
  - action: describeitaasattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
