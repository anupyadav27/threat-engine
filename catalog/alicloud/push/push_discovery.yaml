version: '1.0'
provider: alicloud
service: push
services:
  client: push
  module: boto3.client
discovery:
- discovery_id: alicloud.push.describepushs
  calls:
  - action: describepushs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.push.listpushs
  calls:
  - action: listpushs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.push.getpush
  calls:
  - action: getpush
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.push.querypush
  calls:
  - action: querypush
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.push.describepushattribute
  calls:
  - action: describepushattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
