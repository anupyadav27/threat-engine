version: '1.0'
provider: alicloud
service: vpc
services:
  client: vpc
  module: boto3.client
discovery:
- discovery_id: alicloud.vpc.describevpcs
  calls:
  - action: describevpcs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.vpc.listvpcs
  calls:
  - action: listvpcs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.vpc.getvpc
  calls:
  - action: getvpc
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.vpc.queryvpc
  calls:
  - action: queryvpc
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.vpc.describevpcattribute
  calls:
  - action: describevpcattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
