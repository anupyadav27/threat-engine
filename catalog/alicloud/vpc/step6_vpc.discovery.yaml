# Discovery YAML — vpc (AliCloud)
# Generated: 2026-02-21T06:19:57Z
version: '1.0'
provider: alicloud
service: vpc
services:
  client: vpc
  module: alibabacloud_python_sdk.vpc
discovery:
  # ── Describe95Traffic [dependent] ──
  - discovery_id: alicloud.vpc.Describe95Traffic
    calls:
      - action: Describe95Traffic
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        95_traffic_status: '{{ response.95_traffic_status }}'
        creation_time: '{{ response.creation_time }}'
        instance_id: '{{ response.instance_id }}'
        instance_name: '{{ response.instance_name }}'
        region_id: '{{ response.region_id }}'
        tags: '{{ response.tags }}'
        zone_id: '{{ response.zone_id }}'
    # required_params: ['95_traffic_id']
