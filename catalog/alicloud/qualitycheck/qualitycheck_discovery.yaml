version: '1.0'
provider: alicloud
service: qualitycheck
services:
  client: qualitycheck
  module: boto3.client
discovery:
- discovery_id: alicloud.qualitycheck.describequalitychecks
  calls:
  - action: describequalitychecks
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.qualitycheck.listqualitychecks
  calls:
  - action: listqualitychecks
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.qualitycheck.getqualitycheck
  calls:
  - action: getqualitycheck
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.qualitycheck.queryqualitycheck
  calls:
  - action: queryqualitycheck
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.qualitycheck.describequalitycheckattribute
  calls:
  - action: describequalitycheckattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
