version: '1.0'
provider: alicloud
service: dts
services:
  client: dts
  module: boto3.client
discovery:
- discovery_id: alicloud.dts.describedtss
  calls:
  - action: describedtss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.dts.listdtss
  calls:
  - action: listdtss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.dts.getdts
  calls:
  - action: getdts
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.dts.querydts
  calls:
  - action: querydts
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.dts.describedtsattribute
  calls:
  - action: describedtsattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
