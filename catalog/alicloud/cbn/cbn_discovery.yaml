version: '1.0'
provider: alicloud
service: cbn
services:
  client: cbn
  module: boto3.client
discovery:
- discovery_id: alicloud.cbn.describecbns
  calls:
  - action: describecbns
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cbn.listcbns
  calls:
  - action: listcbns
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cbn.getcbn
  calls:
  - action: getcbn
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cbn.querycbn
  calls:
  - action: querycbn
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cbn.describecbnattribute
  calls:
  - action: describecbnattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
