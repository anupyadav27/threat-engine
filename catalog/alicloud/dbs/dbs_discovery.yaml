version: '1.0'
provider: alicloud
service: dbs
services:
  client: dbs
  module: boto3.client
discovery:
- discovery_id: alicloud.dbs.describedbss
  calls:
  - action: describedbss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.dbs.listdbss
  calls:
  - action: listdbss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.dbs.getdbs
  calls:
  - action: getdbs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.dbs.querydbs
  calls:
  - action: querydbs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.dbs.describedbsattribute
  calls:
  - action: describedbsattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
