version: '1.0'
provider: alicloud
service: imm
services:
  client: imm
  module: boto3.client
discovery:
- discovery_id: alicloud.imm.describeimms
  calls:
  - action: describeimms
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.imm.listimms
  calls:
  - action: listimms
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.imm.getimm
  calls:
  - action: getimm
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.imm.queryimm
  calls:
  - action: queryimm
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.imm.describeimmattribute
  calls:
  - action: describeimmattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
