version: '1.0'
provider: alicloud
service: dybaseapi
services:
  client: dybaseapi
  module: boto3.client
discovery:
- discovery_id: alicloud.dybaseapi.describedybaseapis
  calls:
  - action: describedybaseapis
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.dybaseapi.listdybaseapis
  calls:
  - action: listdybaseapis
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.dybaseapi.getdybaseapi
  calls:
  - action: getdybaseapi
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.dybaseapi.querydybaseapi
  calls:
  - action: querydybaseapi
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.dybaseapi.describedybaseapiattribute
  calls:
  - action: describedybaseapiattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
