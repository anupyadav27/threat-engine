version: '1.0'
provider: alicloud
service: cloudwf
services:
  client: cloudwf
  module: boto3.client
discovery:
- discovery_id: alicloud.cloudwf.describecloudwfs
  calls:
  - action: describecloudwfs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cloudwf.listcloudwfs
  calls:
  - action: listcloudwfs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cloudwf.getcloudwf
  calls:
  - action: getcloudwf
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cloudwf.querycloudwf
  calls:
  - action: querycloudwf
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cloudwf.describecloudwfattribute
  calls:
  - action: describecloudwfattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
