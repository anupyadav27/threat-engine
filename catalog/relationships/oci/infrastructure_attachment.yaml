---
# OCI infrastructure attachment relationships
# Loaded by: catalog/relationships/upload_relationship_catalog.py
# Destination: resource_relationship_catalog in threat_engine_di
# category: infrastructure

csp: oci
category: infrastructure
rules:

  # ── Compute Instance → VNIC ──────────────────────────────────────────────────
  - source_resource_type: compute.instance
    target_resource_type: core.vnic
    relation_type: ATTACHED_TO
    field_path: "vnicAttachments[*].vnicId"
    field_path_type: array_field_ref
    attack_path_category: lateral_movement
    graph_role: context
    description: OCI compute instance attached to VNICs

  # ── Compute Instance → Boot Volume ────────────────────────────────────────────
  - source_resource_type: compute.instance
    target_resource_type: blockstorage.boot_volume
    relation_type: ATTACHED_TO
    field_path: "bootVolumeAttachments[*].bootVolumeId"
    field_path_type: array_field_ref
    attack_path_category: lateral_movement
    graph_role: context
    description: OCI compute instance attached to boot volume

  # ── Compute Instance → Block Volume ───────────────────────────────────────────
  - source_resource_type: compute.instance
    target_resource_type: blockstorage.volume
    relation_type: ATTACHED_TO
    field_path: "volumeAttachments[*].volumeId"
    field_path_type: array_field_ref
    attack_path_category: lateral_movement
    graph_role: context
    description: OCI compute instance attached to block volumes

  # ── VNIC → Subnet ─────────────────────────────────────────────────────────────
  - source_resource_type: core.vnic
    target_resource_type: core.subnet
    relation_type: PLACED_IN
    field_path: "subnetId"
    field_path_type: field_ref
    attack_path_category: lateral_movement
    graph_role: context
    description: OCI VNIC placed in subnet

  # ── VNIC → NSG (Network Security Group) ──────────────────────────────────────
  - source_resource_type: core.vnic
    target_resource_type: core.network_security_group
    relation_type: GOVERNED_BY
    field_path: "nsgIds[*]"
    field_path_type: array_field_ref
    attack_path_category: lateral_movement
    graph_role: context
    description: OCI VNIC governed by network security groups

  # ── OKE Cluster → Node Pool ───────────────────────────────────────────────────
  - source_resource_type: containerengine.cluster
    target_resource_type: containerengine.node_pool
    relation_type: CONTAINS
    field_path: "nodePools[*].id"
    field_path_type: array_field_ref
    attack_path_category: lateral_movement
    graph_role: attack_traversal
    description: OKE cluster contains node pools

  # ── Load Balancer → Backend Set ───────────────────────────────────────────────
  - source_resource_type: loadbalancer.load_balancer
    target_resource_type: loadbalancer.backend_set
    relation_type: ROUTES_TO
    field_path: "backendSets"
    field_path_type: field_ref
    attack_path_category: internet_exposure
    graph_role: attack_traversal
    description: OCI load balancer routes to backend sets

  # ── Autonomous DB → VCN ────────────────────────────────────────────────────────
  - source_resource_type: database.autonomous_database
    target_resource_type: core.vcn
    relation_type: PLACED_IN
    field_path: "subnetId"
    field_path_type: field_ref
    attack_path_category: data_access
    graph_role: context
    description: OCI Autonomous Database in VCN

  # ── OCI Management Agent → Compute Instance (MANAGED_BY_AGENT) ───────────────
  # OCI Management Agent (oracle-cloud-agent) enables remote command execution
  # via OCI Bastion sessions and Run Command. Instances with this agent are
  # reachable without SSH key if the agent is active.
  # attack-path BFS seeds ENDPOINT_AGENT_ENTRY from target_uid of these edges.
  # Prerequisite: add catalog/discovery_generator_data/oci/step6_managementagent.discovery.yaml
  # Source field: hostId links to the compute instance OCID.
  - source_resource_type: managementagent_management_agent
    target_resource_type: compute.instance
    relation_type: MANAGED_BY_AGENT
    field_path: "hostId"
    field_path_type: field_ref
    attack_path_category: lateral_movement
    graph_role: attack_traversal
    description: OCI compute instance managed by Oracle Cloud Agent (Run Command capable)

  # ── OCI Compute Instance → Security List ─────────────────────────────────────
  - source_resource_type: oci.core/Instance
    target_resource_type: oci.core/SecurityList
    relation_type: GOVERNED_BY
    field_path: "subnetId"
    field_path_type: field_ref
    attack_path_category: lateral_movement
    graph_role: context
    description: OCI compute instance governed by security list via subnet

  # ── OCI Compute Instance → VCN ───────────────────────────────────────────────
  - source_resource_type: oci.core/Instance
    target_resource_type: oci.core/Vcn
    relation_type: PLACED_IN
    field_path: "compartmentId"
    field_path_type: field_ref
    attack_path_category: lateral_movement
    graph_role: context
    description: OCI compute instance placed in VCN compartment

  # ── OCI Object Storage → Vault (CMK) ─────────────────────────────────────────
  - source_resource_type: oci.objectstorage/Bucket
    target_resource_type: oci.key_management/Vault
    relation_type: ENCRYPTED_BY
    field_path: "kmsKeyId"
    field_path_type: field_ref
    attack_path_category: data_access
    graph_role: context
    description: OCI Object Storage bucket encrypted by Vault key

  # ── OCI Autonomous Database → Vault (CMK) ────────────────────────────────────
  - source_resource_type: oci.database/AutonomousDatabase
    target_resource_type: oci.key_management/Vault
    relation_type: ENCRYPTED_BY
    field_path: "kmsKeyId"
    field_path_type: field_ref
    attack_path_category: data_access
    graph_role: context
    description: OCI Autonomous Database encrypted by Vault key
