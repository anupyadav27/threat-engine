# Discovery YAML — automation (Azure)
# Generated: 2026-02-21T05:02:43Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: automation
services:
  client: automation
  module: azure.mgmt.automation
discovery:
  # ── list ──
  - discovery_id: azure.automation.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        creation_time: '{{ item.creation_time }}'
        frequency: '{{ item.frequency }}'
        last_modified_time: '{{ item.last_modified_time }}'
        next_run: '{{ item.next_run }}'
        start_time: '{{ item.start_time }}'
        update_configuration: '{{ item.update_configuration }}'
    # required_params: ['automation_account_name']
  # ── list_by_resource_group ──
  - discovery_id: azure.automation.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── Dependent ops ──
  # ── get_by_id [dependent] ──
  - discovery_id: azure.automation.get_by_id
