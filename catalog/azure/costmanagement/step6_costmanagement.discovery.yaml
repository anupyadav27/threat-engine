# Discovery YAML — costmanagement (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: costmanagement
services:
  client: costmanagement
  module: azure.mgmt.costmanagement
discovery:
  # ── list ──
  - discovery_id: azure.costmanagement.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        accumulated: '{{ item.accumulated }}'
        chart: '{{ item.chart }}'
        created_on: '{{ item.created_on }}'
        currency: '{{ item.currency }}'
        data_set: '{{ item.data_set }}'
        date_range: '{{ item.date_range }}'
        display_name: '{{ item.display_name }}'
        e_tag: '{{ item.e_tag }}'
        include_monetary_commitment: '{{ item.include_monetary_commitment }}'
        kpis: '{{ item.kpis }}'
        metric: '{{ item.metric }}'
        modified_on: '{{ item.modified_on }}'
        pivots: '{{ item.pivots }}'
        scope: '{{ item.scope }}'
        time_period: '{{ item.time_period }}'
        timeframe: '{{ item.timeframe }}'
        type_properties_query_type: '{{ item.type_properties_query_type }}'
