# Discovery YAML — education (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: education
services:
  client: education
  module: azure.mgmt.education
discovery:
  # ── list [dependent] ──
  - discovery_id: azure.education.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        subscription_id: '{{ item.subscription_id }}'
        type: '{{ item.type }}'
        budget: '{{ item.budget }}'
        effective_date: '{{ item.effective_date }}'
        email: '{{ item.email }}'
        expiration_date: '{{ item.expiration_date }}'
        first_name: '{{ item.first_name }}'
        last_name: '{{ item.last_name }}'
        role: '{{ item.role }}'
        subscription_alias: '{{ item.subscription_alias }}'
        subscription_invite_last_sent_date: '{{ item.subscription_invite_last_sent_date }}'
        system_data: '{{ item.system_data }}'
    # required_params: ['billing_account_name', 'billing_profile_name', 'invoice_section_name']
  # ── list_all [dependent] ──
  - discovery_id: azure.education.list_all
    calls:
      - action: list_all
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        type: '{{ item.type }}'
        budget_per_student: '{{ item.budget_per_student }}'
        currency_properties_total_allocated_budget_currency: '{{ item.currency_properties_total_allocated_budget_currency }}'
        currency_properties_total_budget_currency: '{{ item.currency_properties_total_budget_currency }}'
        description: '{{ item.description }}'
        display_name: '{{ item.display_name }}'
        effective_date: '{{ item.effective_date }}'
        expiration_date: '{{ item.expiration_date }}'
        invitation_code: '{{ item.invitation_code }}'
        max_student_count: '{{ item.max_student_count }}'
        system_data: '{{ item.system_data }}'
        value_properties_total_allocated_budget_value: '{{ item.value_properties_total_allocated_budget_value }}'
        value_properties_total_budget_value: '{{ item.value_properties_total_budget_value }}'
    # required_params: ['billing_account_name', 'billing_profile_name']
