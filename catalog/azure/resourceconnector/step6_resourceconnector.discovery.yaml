# Discovery YAML — resourceconnector (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: resourceconnector
services:
  client: resourceconnector
  module: azure.mgmt.resourceconnector
discovery:
  # ── list_by_resource_group ──
  - discovery_id: azure.resourceconnector.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        status: '{{ item.status }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        distro: '{{ item.distro }}'
        infrastructure_config: '{{ item.infrastructure_config }}'
        public_key: '{{ item.public_key }}'
        system_data: '{{ item.system_data }}'
        version: '{{ item.version }}'
  # ── list_by_subscription ──
  - discovery_id: azure.resourceconnector.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        status: '{{ item.status }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        distro: '{{ item.distro }}'
        infrastructure_config: '{{ item.infrastructure_config }}'
        public_key: '{{ item.public_key }}'
        system_data: '{{ item.system_data }}'
        version: '{{ item.version }}'
  # ── list_cluster_user_credential ──
  - discovery_id: azure.resourceconnector.list_cluster_user_credential
    calls:
      - action: list_cluster_user_credential
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.hybrid_connection_config }}'
      item:
        hybrid_connection_config: '{{ item.hybrid_connection_config }}'
        kubeconfigs: '{{ item.kubeconfigs }}'
    # required_params: ['resource_name']
  # ── list_keys ──
  - discovery_id: azure.resourceconnector.list_keys
    calls:
      - action: list_keys
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.artifact_profiles }}'
      item:
        artifact_profiles: '{{ item.artifact_profiles }}'
        kubeconfigs: '{{ item.kubeconfigs }}'
        ssh_keys: '{{ item.ssh_keys }}'
    # required_params: ['resource_name']
  # ── list_operations ──
  - discovery_id: azure.resourceconnector.list_operations
    calls:
      - action: list_operations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        name: '{{ item.name }}'
        description: '{{ item.description }}'
        is_data_action: '{{ item.is_data_action }}'
        operation: '{{ item.operation }}'
        origin: '{{ item.origin }}'
        provider: '{{ item.provider }}'
        resource: '{{ item.resource }}'
  # ── Dependent ops ──
  # ── get_telemetry_config [dependent] ──
  - discovery_id: azure.resourceconnector.get_telemetry_config
    calls:
      - action: get_telemetry_config
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        telemetry_instrumentation_key: '{{ response.telemetry_instrumentation_key }}'
  # ── get_upgrade_graph [dependent] ──
  - discovery_id: azure.resourceconnector.get_upgrade_graph
    calls:
      - action: get_upgrade_graph
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        properties: '{{ response.properties }}'
    # required_params: ['resource_name', 'upgrade_graph']
