# Discovery YAML — streamanalytics (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: streamanalytics
services:
  client: streamanalytics
  module: azure.mgmt.streamanalytics
discovery:
  # ── list ──
  - discovery_id: azure.streamanalytics.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── list_by_cluster ──
  - discovery_id: azure.streamanalytics.list_by_cluster
    calls:
      - action: list_by_cluster
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
    # required_params: ['cluster_name']
  # ── list_by_resource_group ──
  - discovery_id: azure.streamanalytics.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── list_by_streaming_job ──
  - discovery_id: azure.streamanalytics.list_by_streaming_job
    calls:
      - action: list_by_streaming_job
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
