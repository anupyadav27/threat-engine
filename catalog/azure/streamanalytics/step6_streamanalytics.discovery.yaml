  # ── list_by_subscription ──
  - discovery_id: azure.streamanalytics.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── list_quotas ──
  - discovery_id: azure.streamanalytics.list_quotas
    calls:
      - action: list_quotas
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        current_count: '{{ item.current_count }}'
        max_count: '{{ item.max_count }}'
