# Discovery YAML — networkcloud (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: networkcloud
services:
  client: networkcloud
  module: azure.mgmt.networkcloud
discovery:
  # ── list ──
  - discovery_id: azure.networkcloud.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        name: '{{ item.name }}'
        action_type: '{{ item.action_type }}'
        display: '{{ item.display }}'
        is_data_action: '{{ item.is_data_action }}'
        origin: '{{ item.origin }}'
  # ── list_by_cluster ──
  - discovery_id: azure.networkcloud.list_by_cluster
    calls:
      - action: list_by_cluster
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        collection_interval: '{{ item.collection_interval }}'
        detailed_status: '{{ item.detailed_status }}'
        detailed_status_message: '{{ item.detailed_status_message }}'
        disabled_metrics: '{{ item.disabled_metrics }}'
        enabled_metrics: '{{ item.enabled_metrics }}'
        extended_location: '{{ item.extended_location }}'
        system_data: '{{ item.system_data }}'
    # required_params: ['cluster_name']
  # ── list_by_kubernetes_cluster ──
  - discovery_id: azure.networkcloud.list_by_kubernetes_cluster
    calls:
      - action: list_by_kubernetes_cluster
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        availability_lifecycle: '{{ item.availability_lifecycle }}'
        detailed_status: '{{ item.detailed_status }}'
        detailed_status_message: '{{ item.detailed_status_message }}'
        options: '{{ item.options }}'
        required: '{{ item.required }}'
        system_data: '{{ item.system_data }}'
        version: '{{ item.version }}'
    # required_params: ['kubernetes_cluster_name']
  # ── list_by_resource_group ──
