# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: machinelearning
services:
  client: machinelearning
  module: azure.mgmt.machinelearning
discovery:
  # ── Operations_List ──
  - discovery_id: azure.machinelearning.Operations_List
    calls:
      - action: Operations_List
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        etag: '{{ item.etag }}'
        kind: '{{ item.kind }}'
        plan: '{{ item.plan }}'
        properties: '{{ item.properties }}'
