# Discovery YAML — securityinsight (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: securityinsight
services:
  client: securityinsight
  module: azure.mgmt.securityinsight
discovery:
  # ── list [dependent] ──
  - discovery_id: azure.securityinsight.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
    # required_params: ['workspace_name', 'watchlist_alias']
  # ── list_alerts [dependent] ──
  - discovery_id: azure.securityinsight.list_alerts
    calls:
      - action: list_alerts
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        type: '{{ item.type }}'
        additional_data: '{{ item.additional_data }}'
        alert_display_name: '{{ item.alert_display_name }}'
        alert_link: '{{ item.alert_link }}'
        alert_type: '{{ item.alert_type }}'
        compromised_entity: '{{ item.compromised_entity }}'
        confidence_level: '{{ item.confidence_level }}'
        confidence_reasons: '{{ item.confidence_reasons }}'
        confidence_score: '{{ item.confidence_score }}'
        confidence_score_status: '{{ item.confidence_score_status }}'
        description: '{{ item.description }}'
        end_time_utc: '{{ item.end_time_utc }}'
        friendly_name: '{{ item.friendly_name }}'
        intent: '{{ item.intent }}'
        kind: '{{ item.kind }}'
        processing_end_time: '{{ item.processing_end_time }}'
        product_component_name: '{{ item.product_component_name }}'
        product_name: '{{ item.product_name }}'
        product_version: '{{ item.product_version }}'
        provider_alert_id: '{{ item.provider_alert_id }}'
        remediation_steps: '{{ item.remediation_steps }}'
        resource_identifiers: '{{ item.resource_identifiers }}'
        severity: '{{ item.severity }}'
        start_time_utc: '{{ item.start_time_utc }}'
        system_alert_id: '{{ item.system_alert_id }}'
        system_data: '{{ item.system_data }}'
        tactics: '{{ item.tactics }}'
        time_generated: '{{ item.time_generated }}'
        vendor_name: '{{ item.vendor_name }}'
    # required_params: ['workspace_name', 'incident_id']
  # ── list_bookmarks [dependent] ──
  - discovery_id: azure.securityinsight.list_bookmarks
    calls:
      - action: list_bookmarks
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        additional_data: '{{ item.additional_data }}'
        created: '{{ item.created }}'
        created_by: '{{ item.created_by }}'
        display_name: '{{ item.display_name }}'
        event_time: '{{ item.event_time }}'
        friendly_name: '{{ item.friendly_name }}'
        incident_info: '{{ item.incident_info }}'
        kind: '{{ item.kind }}'
        labels: '{{ item.labels }}'
        notes: '{{ item.notes }}'
        query: '{{ item.query }}'
        query_result: '{{ item.query_result }}'
        system_data: '{{ item.system_data }}'
        updated: '{{ item.updated }}'
        updated_by: '{{ item.updated_by }}'
    # required_params: ['workspace_name', 'incident_id']
  # ── list_by_alert_rule [dependent] ──
  - discovery_id: azure.securityinsight.list_by_alert_rule
    calls:
      - action: list_by_alert_rule
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
    # required_params: ['workspace_name', 'rule_id']
  # ── list_entities [dependent] ──
  - discovery_id: azure.securityinsight.list_entities
    calls:
      - action: list_entities
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.entities }}'
      item:
        entities: '{{ item.entities }}'
        meta_data: '{{ item.meta_data }}'
    # required_params: ['workspace_name', 'incident_id']
