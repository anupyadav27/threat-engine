# Discovery YAML — consumption (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: consumption
services:
  client: consumption
  module: azure.mgmt.consumption
discovery:
  # ── list_by_billing_account ──
  - discovery_id: azure.consumption.list_by_billing_account
    calls:
      - action: list_by_billing_account
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
    # required_params: ['billing_account_id']
  # ── Dependent ops ──
  # ── get_by_billing_account [dependent] ──
  - discovery_id: azure.consumption.get_by_billing_account
    calls:
      - action: get_by_billing_account
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        tags: '{{ response.tags }}'
        type: '{{ response.type }}'
        adjustment_details: '{{ response.adjustment_details }}'
        adjustments: '{{ response.adjustments }}'
        azure_marketplace_service_charges: '{{ response.azure_marketplace_service_charges }}'
        beginning_balance: '{{ response.beginning_balance }}'
        billing_frequency: '{{ response.billing_frequency }}'
        charges_billed_separately: '{{ response.charges_billed_separately }}'
        currency: '{{ response.currency }}'
        ending_balance: '{{ response.ending_balance }}'
        new_purchases: '{{ response.new_purchases }}'
        new_purchases_details: '{{ response.new_purchases_details }}'
        price_hidden: '{{ response.price_hidden }}'
        service_overage: '{{ response.service_overage }}'
        total_overage: '{{ response.total_overage }}'
        total_usage: '{{ response.total_usage }}'
        utilized: '{{ response.utilized }}'
    # required_params: ['billing_account_id']
