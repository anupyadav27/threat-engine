# Discovery YAML — batch (Azure)
# Generated: 2026-02-21T05:02:43Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: batch
services:
  client: batch
  module: azure.mgmt.batch
discovery:
  # ── list_by_batch_account ──
  - discovery_id: azure.batch.list_by_batch_account
    calls:
      - action: list_by_batch_account
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        group_id: '{{ item.group_id }}'
        required_members: '{{ item.required_members }}'
        required_zone_names: '{{ item.required_zone_names }}'
    # required_params: ['account_name']
  # ── list_by_resource_group ──
  - discovery_id: azure.batch.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        encryption: '{{ item.encryption }}'
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        private_endpoint_connections: '{{ item.private_endpoint_connections }}'
        provisioning_state: '{{ item.provisioning_state }}'
        public_network_access: '{{ item.public_network_access }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        account_endpoint: '{{ item.account_endpoint }}'
        active_job_and_job_schedule_quota: '{{ item.active_job_and_job_schedule_quota }}'
        allowed_authentication_modes: '{{ item.allowed_authentication_modes }}'
        auto_storage: '{{ item.auto_storage }}'
        dedicated_core_quota: '{{ item.dedicated_core_quota }}'
        dedicated_core_quota_per_vm_family: '{{ item.dedicated_core_quota_per_vm_family }}'
        dedicated_core_quota_per_vm_family_enforced: '{{ item.dedicated_core_quota_per_vm_family_enforced }}'
        key_vault_reference: '{{ item.key_vault_reference }}'
        low_priority_core_quota: '{{ item.low_priority_core_quota }}'
        network_profile: '{{ item.network_profile }}'
        node_management_endpoint: '{{ item.node_management_endpoint }}'
        pool_allocation_mode: '{{ item.pool_allocation_mode }}'
        pool_quota: '{{ item.pool_quota }}'
  # ── list_configurations ──
  - discovery_id: azure.batch.list_configurations
    calls:
      - action: list_configurations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        system_data: '{{ item.system_data }}'
    # required_params: ['account_name']
  # ── list_detectors ──
  - discovery_id: azure.batch.list_detectors
    calls:
      - action: list_detectors
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        value: '{{ item.value }}'
    # required_params: ['account_name']
  # ── list_outbound_network_dependencies_endpoints ──
  - discovery_id: azure.batch.list_outbound_network_dependencies_endpoints
    calls:
      - action: list_outbound_network_dependencies_endpoints
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        category: '{{ item.category }}'
        endpoints: '{{ item.endpoints }}'
    # required_params: ['account_name']
  # ── list_supported_virtual_machine_skus ──
  - discovery_id: azure.batch.list_supported_virtual_machine_skus
    calls:
      - action: list_supported_virtual_machine_skus
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        name: '{{ item.name }}'
        batch_support_end_of_life: '{{ item.batch_support_end_of_life }}'
        capabilities: '{{ item.capabilities }}'
        family_name: '{{ item.family_name }}'
    # required_params: ['location_name']
  # ── Dependent ops ──
  # ── check_name_availability [dependent] ──
  - discovery_id: azure.batch.check_name_availability
    calls:
      - action: check_name_availability
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        message: '{{ response.message }}'
        name_available: '{{ response.name_available }}'
        reason: '{{ response.reason }}'
    # required_params: ['location_name', 'parameters']
  # ── get_configuration [dependent] ──
  - discovery_id: azure.batch.get_configuration
    calls:
      - action: get_configuration
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        type: '{{ response.type }}'
        properties: '{{ response.properties }}'
        system_data: '{{ response.system_data }}'
    # required_params: ['account_name', 'network_security_perimeter_configuration_name']
  # ── get_detector [dependent] ──
  - discovery_id: azure.batch.get_detector
    calls:
      - action: get_detector
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        tags: '{{ response.tags }}'
        type: '{{ response.type }}'
        value: '{{ response.value }}'
    # required_params: ['account_name', 'detector_id']
  # ── get_keys [dependent] ──
  - discovery_id: azure.batch.get_keys
    calls:
      - action: get_keys
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        account_name: '{{ response.account_name }}'
        primary: '{{ response.primary }}'
        secondary: '{{ response.secondary }}'
    # required_params: ['account_name']
  # ── get_quotas [dependent] ──
  - discovery_id: azure.batch.get_quotas
    calls:
      - action: get_quotas
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        account_quota: '{{ response.account_quota }}'
    # required_params: ['location_name']
  # ── list [dependent] ──
  - discovery_id: azure.batch.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        format: '{{ item.format }}'
        last_activation_time: '{{ item.last_activation_time }}'
        state: '{{ item.state }}'
        storage_url: '{{ item.storage_url }}'
        storage_url_expiry: '{{ item.storage_url_expiry }}'
    # required_params: ['account_name', 'application_name']
