# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: desktopvirtualization
services:
  client: desktopvirtualization
  module: azure.mgmt.desktopvirtualization
discovery:
  # ── list_by_host_pool ──
  - discovery_id: azure.desktopvirtualization.list_by_host_pool
    calls:
      - action: list_by_host_pool
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        object_id: '{{ item.object_id }}'
        type: '{{ item.type }}'
        active_directory_user_name: '{{ item.active_directory_user_name }}'
        application_type: '{{ item.application_type }}'
        create_time: '{{ item.create_time }}'
        session_state: '{{ item.session_state }}'
        system_data: '{{ item.system_data }}'
        user_principal_name: '{{ item.user_principal_name }}'
    # required_params: ['host_pool_name']
