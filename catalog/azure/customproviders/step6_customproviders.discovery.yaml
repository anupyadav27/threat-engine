  - discovery_id: azure.customproviders.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── list_by_subscription ──
  - discovery_id: azure.customproviders.list_by_subscription
    calls:
      - action: list_by_subscription
