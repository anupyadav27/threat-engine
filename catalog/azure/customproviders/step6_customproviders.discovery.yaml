# Discovery YAML — customproviders (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: customproviders
services:
  client: customproviders
  module: azure.mgmt.customproviders
discovery:
  # ── list ──
  - discovery_id: azure.customproviders.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── list_all ──
  - discovery_id: azure.customproviders.list_all
    calls:
      - action: list_all
        save_as: response
        on_error: continue
