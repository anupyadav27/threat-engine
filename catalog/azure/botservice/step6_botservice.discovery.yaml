# Discovery YAML — botservice (Azure)
# Generated: 2026-02-21T05:02:43Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: botservice
services:
  client: botservice
  module: azure.mgmt.botservice
discovery:
  # ── list ──
  - discovery_id: azure.botservice.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        type: '{{ item.type }}'
        group_ids: '{{ item.group_ids }}'
        private_endpoint: '{{ item.private_endpoint }}'
        private_link_service_connection_state: '{{ item.private_link_service_connection_state }}'
    # required_params: ['resource_name']
  # ── list_by_bot_resource ──
  - discovery_id: azure.botservice.list_by_bot_resource
    calls:
      - action: list_by_bot_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        group_id: '{{ item.group_id }}'
        required_members: '{{ item.required_members }}'
        required_zone_names: '{{ item.required_zone_names }}'
    # required_params: ['resource_name']
  # ── list_by_bot_service ──
  - discovery_id: azure.botservice.list_by_bot_service
    calls:
      - action: list_by_bot_service
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        kind: '{{ item.kind }}'
        properties: '{{ item.properties }}'
        sku: '{{ item.sku }}'
        zones: '{{ item.zones }}'
    # required_params: ['resource_name']
  # ── list_by_resource_group ──
  - discovery_id: azure.botservice.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        kind: '{{ item.kind }}'
        properties: '{{ item.properties }}'
        sku: '{{ item.sku }}'
        zones: '{{ item.zones }}'
    # required_params: ['resource_name']
  # ── list_service_providers ──
  - discovery_id: azure.botservice.list_service_providers
    calls:
      - action: list_service_providers
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        properties: '{{ item.properties }}'
  # ── Dependent ops ──
  # ── begin_get [dependent] ──
  - discovery_id: azure.botservice.begin_get
    calls:
      - action: begin_get
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        status: '{{ response.status }}'
        start_time: '{{ response.start_time }}'
    # required_params: ['operation_result_id']
  # ── get_check_name_availability [dependent] ──
  - discovery_id: azure.botservice.get_check_name_availability
    calls:
      - action: get_check_name_availability
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        abs_code: '{{ response.abs_code }}'
        message: '{{ response.message }}'
        valid: '{{ response.valid }}'
    # required_params: ['parameters']
  # ── list_with_keys [dependent] ──
  - discovery_id: azure.botservice.list_with_keys
    calls:
      - action: list_with_keys
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.id }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        changed_time: '{{ item.changed_time }}'
        entity_tag: '{{ item.entity_tag }}'
        kind: '{{ item.kind }}'
        properties: '{{ item.properties }}'
        resource: '{{ item.resource }}'
        setting: '{{ item.setting }}'
        sku: '{{ item.sku }}'
        zones: '{{ item.zones }}'
    # required_params: ['resource_name', 'channel_name']
  # ── list_with_secrets [dependent] ──
  - discovery_id: azure.botservice.list_with_secrets
    calls:
      - action: list_with_secrets
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.id }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        kind: '{{ item.kind }}'
        properties: '{{ item.properties }}'
        sku: '{{ item.sku }}'
        zones: '{{ item.zones }}'
    # required_params: ['resource_name', 'connection_name']
