# Discovery YAML — containerinstance (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: containerinstance
services:
  client: containerinstance
  module: azure.mgmt.containerinstance
discovery:
  # ── list ──
  - discovery_id: azure.containerinstance.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        name: '{{ item.name }}'
        display: '{{ item.display }}'
        origin: '{{ item.origin }}'
        properties: '{{ item.properties }}'
  # ── list_by_resource_group ──
  - discovery_id: azure.containerinstance.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        confidential_compute_properties: '{{ item.confidential_compute_properties }}'
        containers: '{{ item.containers }}'
        diagnostics: '{{ item.diagnostics }}'
        dns_config: '{{ item.dns_config }}'
        encryption_properties: '{{ item.encryption_properties }}'
        extensions: '{{ item.extensions }}'
        image_registry_credentials: '{{ item.image_registry_credentials }}'
        init_containers: '{{ item.init_containers }}'
        instance_view: '{{ item.instance_view }}'
        ip_address: '{{ item.ip_address }}'
        os_type: '{{ item.os_type }}'
        priority: '{{ item.priority }}'
        restart_policy: '{{ item.restart_policy }}'
        sku: '{{ item.sku }}'
        subnet_ids: '{{ item.subnet_ids }}'
        volumes: '{{ item.volumes }}'
        zones: '{{ item.zones }}'
  # ── list_cached_images ──
  - discovery_id: azure.containerinstance.list_cached_images
    calls:
      - action: list_cached_images
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        image: '{{ item.image }}'
        os_type: '{{ item.os_type }}'
    # required_params: ['location']
  # ── list_capabilities ──
  - discovery_id: azure.containerinstance.list_capabilities
    calls:
      - action: list_capabilities
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        location: '{{ item.location }}'
        capabilities: '{{ item.capabilities }}'
        gpu: '{{ item.gpu }}'
        ip_address_type: '{{ item.ip_address_type }}'
        os_type: '{{ item.os_type }}'
        resource_type: '{{ item.resource_type }}'
    # required_params: ['location']
  # ── list_usage ──
  - discovery_id: azure.containerinstance.list_usage
    calls:
      - action: list_usage
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        current_value: '{{ item.current_value }}'
        limit: '{{ item.limit }}'
        unit: '{{ item.unit }}'
    # required_params: ['location']
  # ── Dependent ops ──
  # ── get_outbound_network_dependencies_endpoints [dependent] ──
  - discovery_id: azure.containerinstance.get_outbound_network_dependencies_endpoints
    calls:
      - action: get_outbound_network_dependencies_endpoints
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        identity: '{{ response.identity }}'
        location: '{{ response.location }}'
        name: '{{ response.name }}'
        provisioning_state: '{{ response.provisioning_state }}'
        tags: '{{ response.tags }}'
        type: '{{ response.type }}'
        Enabled: '{{ response.Enabled }}'
        Name: '{{ response.Name }}'
        PrincipalId: '{{ response.PrincipalId }}'
        Statement: '{{ response.Statement }}'
        Status: '{{ response.Status }}'
        Tier: '{{ response.Tier }}'
        Type: '{{ response.Type }}'
        Version: '{{ response.Version }}'
        capabilities: '{{ response.capabilities }}'
        confidential_compute_properties: '{{ response.confidential_compute_properties }}'
        containers: '{{ response.containers }}'
        content: '{{ response.content }}'
        current_value: '{{ response.current_value }}'
        diagnostics: '{{ response.diagnostics }}'
        display: '{{ response.display }}'
        dns_config: '{{ response.dns_config }}'
        encryption_properties: '{{ response.encryption_properties }}'
        extensions: '{{ response.extensions }}'
        gpu: '{{ response.gpu }}'
        image: '{{ response.image }}'
        image_registry_credentials: '{{ response.image_registry_credentials }}'
        init_containers: '{{ response.init_containers }}'
        instance_view: '{{ response.instance_view }}'
        ip_address: '{{ response.ip_address }}'
        ip_address_type: '{{ response.ip_address_type }}'
        limit: '{{ response.limit }}'
        origin: '{{ response.origin }}'
        os_type: '{{ response.os_type }}'
        priority: '{{ response.priority }}'
        properties: '{{ response.properties }}'
        resource_type: '{{ response.resource_type }}'
        restart_policy: '{{ response.restart_policy }}'
        sku: '{{ response.sku }}'
        subnet_ids: '{{ response.subnet_ids }}'
        unit: '{{ response.unit }}'
        volumes: '{{ response.volumes }}'
        zones: '{{ response.zones }}'
    # required_params: ['container_group_name']
  # ── list_logs [dependent] ──
  - discovery_id: azure.containerinstance.list_logs
    calls:
      - action: list_logs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.content }}'
      item:
        content: '{{ item.content }}'
    # required_params: ['container_group_name', 'container_name']
