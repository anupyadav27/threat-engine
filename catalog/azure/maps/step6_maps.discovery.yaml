# Discovery YAML — maps (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: maps
services:
  client: maps
  module: azure.mgmt.maps
discovery:
  # ── list_by_account ──
  - discovery_id: azure.maps.list_by_account
    calls:
      - action: list_by_account
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        system_data: '{{ item.system_data }}'
    # required_params: ['account_name']
  # ── list_by_resource_group ──
  - discovery_id: azure.maps.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        kind: '{{ item.kind }}'
        properties: '{{ item.properties }}'
        sku: '{{ item.sku }}'
        system_data: '{{ item.system_data }}'
  # ── list_by_subscription ──
  - discovery_id: azure.maps.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        kind: '{{ item.kind }}'
        properties: '{{ item.properties }}'
        sku: '{{ item.sku }}'
        system_data: '{{ item.system_data }}'
  # ── list_keys ──
  - discovery_id: azure.maps.list_keys
    calls:
      - action: list_keys
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.primary_key_last_updated }}'
      item:
        primary_key: '{{ item.primary_key }}'
        primary_key_last_updated: '{{ item.primary_key_last_updated }}'
        secondary_key: '{{ item.secondary_key }}'
        secondary_key_last_updated: '{{ item.secondary_key_last_updated }}'
    # required_params: ['account_name']
  # ── list_operations ──
  - discovery_id: azure.maps.list_operations
    calls:
      - action: list_operations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        name: '{{ item.name }}'
        display: '{{ item.display }}'
        is_data_action: '{{ item.is_data_action }}'
        origin: '{{ item.origin }}'
        service_specification: '{{ item.service_specification }}'
  # ── list_subscription_operations ──
  - discovery_id: azure.maps.list_subscription_operations
    calls:
      - action: list_subscription_operations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        name: '{{ item.name }}'
        display: '{{ item.display }}'
        is_data_action: '{{ item.is_data_action }}'
        origin: '{{ item.origin }}'
        service_specification: '{{ item.service_specification }}'
  # ── Dependent ops ──
  # ── list_sas [dependent] ──
  - discovery_id: azure.maps.list_sas
    calls:
      - action: list_sas
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.account_sas_token }}'
      item:
        account_sas_token: '{{ item.account_sas_token }}'
    # required_params: ['account_name', 'maps_account_sas_parameters']
