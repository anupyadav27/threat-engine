# Discovery YAML — agrifood (Azure)
# Generated: 2026-02-21T05:02:43Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: agrifood
services:
  client: agrifood
  module: azure.mgmt.agrifood
discovery:
  # ── list ──
  - discovery_id: azure.agrifood.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        e_tag: '{{ item.e_tag }}'
        properties: '{{ item.properties }}'
        system_data: '{{ item.system_data }}'
    # required_params: ['farm_beats_resource_name']
  # ── list_by_farm_beats ──
  - discovery_id: azure.agrifood.list_by_farm_beats
    calls:
      - action: list_by_farm_beats
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        additional_api_properties: '{{ item.additional_api_properties }}'
        e_tag: '{{ item.e_tag }}'
        extension_api_docs_link: '{{ item.extension_api_docs_link }}'
        extension_auth_link: '{{ item.extension_auth_link }}'
        extension_category: '{{ item.extension_category }}'
        extension_id: '{{ item.extension_id }}'
        installed_extension_version: '{{ item.installed_extension_version }}'
        system_data: '{{ item.system_data }}'
    # required_params: ['farm_beats_resource_name']
  # ── list_by_resource ──
  - discovery_id: azure.agrifood.list_by_resource
    calls:
      - action: list_by_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        group_id: '{{ item.group_id }}'
        required_members: '{{ item.required_members }}'
        required_zone_names: '{{ item.required_zone_names }}'
        system_data: '{{ item.system_data }}'
    # required_params: ['farm_beats_resource_name']
  # ── list_by_resource_group ──
  - discovery_id: azure.agrifood.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        private_endpoint_connections: '{{ item.private_endpoint_connections }}'
        provisioning_state: '{{ item.provisioning_state }}'
        public_network_access: '{{ item.public_network_access }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        instance_uri: '{{ item.instance_uri }}'
        sensor_integration: '{{ item.sensor_integration }}'
        system_data: '{{ item.system_data }}'
  # ── list_by_subscription ──
  - discovery_id: azure.agrifood.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        private_endpoint_connections: '{{ item.private_endpoint_connections }}'
        provisioning_state: '{{ item.provisioning_state }}'
        public_network_access: '{{ item.public_network_access }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        instance_uri: '{{ item.instance_uri }}'
        sensor_integration: '{{ item.sensor_integration }}'
        system_data: '{{ item.system_data }}'
  # ── Dependent ops ──
  # ── check_name_availability [dependent] ──
  - discovery_id: azure.agrifood.check_name_availability
    calls:
      - action: check_name_availability
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        message: '{{ response.message }}'
        name_available: '{{ response.name_available }}'
        reason: '{{ response.reason }}'
    # required_params: ['body']
  # ── get_operation_result [dependent] ──
  - discovery_id: azure.agrifood.get_operation_result
    calls:
      - action: get_operation_result
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        status: '{{ response.status }}'
    # required_params: ['farm_beats_resource_name', 'operation_results_id']
