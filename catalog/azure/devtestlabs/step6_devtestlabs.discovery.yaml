# Discovery YAML — devtestlabs (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: devtestlabs
services:
  client: devtestlabs
  module: azure.mgmt.devtestlabs
discovery:
  # ── list_by_resource_group ──
  - discovery_id: azure.devtestlabs.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── list_by_subscription ──
  - discovery_id: azure.devtestlabs.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── list_vhds ──
  - discovery_id: azure.devtestlabs.list_vhds
    calls:
      - action: list_vhds
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
    # required_params: ['name']
  # ── Dependent ops ──
  # ── get_rdp_file_contents [dependent] ──
  - discovery_id: azure.devtestlabs.get_rdp_file_contents
    calls:
      - action: get_rdp_file_contents
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        contents: '{{ response.contents }}'
    # required_params: ['lab_name', 'name']
  # ── list [dependent] ──
  - discovery_id: azure.devtestlabs.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
    # required_params: ['lab_name', 'virtual_machine_name']
  # ── list_applicable [dependent] ──
  - discovery_id: azure.devtestlabs.list_applicable
    calls:
      - action: list_applicable
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
    # required_params: ['lab_name', 'name']
  # ── list_applicable_schedules [dependent] ──
  - discovery_id: azure.devtestlabs.list_applicable_schedules
    calls:
      - action: list_applicable_schedules
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.id }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        lab_vms_shutdown: '{{ item.lab_vms_shutdown }}'
        lab_vms_startup: '{{ item.lab_vms_startup }}'
    # required_params: ['lab_name', 'name']
