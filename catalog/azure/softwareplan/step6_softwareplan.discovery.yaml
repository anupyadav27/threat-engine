# Discovery YAML — softwareplan (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: softwareplan
services:
  client: softwareplan
  module: azure.mgmt.softwareplan
discovery:
  # ── HybridUseBenefit_Get [dependent] ──
  - discovery_id: azure.softwareplan.HybridUseBenefit_Get
    calls:
      - action: HybridUseBenefit_Get
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        identity: '{{ response.identity }}'
        location: '{{ response.location }}'
        name: '{{ response.name }}'
        provisioning_state: '{{ response.provisioning_state }}'
        tags: '{{ response.tags }}'
        type: '{{ response.type }}'
        etag: '{{ response.etag }}'
        kind: '{{ response.kind }}'
        plan: '{{ response.plan }}'
        properties: '{{ response.properties }}'
        sku: '{{ response.sku }}'
        zones: '{{ response.zones }}'
    # required_params: ['id']
