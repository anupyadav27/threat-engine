# Discovery YAML — storageactions (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: storageactions
services:
  client: storageactions
  module: azure.mgmt.storageactions
discovery:
  # ── list ──
  - discovery_id: azure.storageactions.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        properties: '{{ item.properties }}'
    # required_params: ['storage_task_name']
  # ── list_by_resource_group ──
  - discovery_id: azure.storageactions.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        identity: '{{ item.identity }}'
        properties: '{{ item.properties }}'
  # ── list_by_subscription ──
  - discovery_id: azure.storageactions.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        identity: '{{ item.identity }}'
        properties: '{{ item.properties }}'
