# Discovery YAML — healthbot (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: healthbot
services:
  client: healthbot
  module: azure.mgmt.healthbot
discovery:
  # ── list ──
  - discovery_id: azure.healthbot.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        name: '{{ item.name }}'
        display: '{{ item.display }}'
        is_data_action: '{{ item.is_data_action }}'
        origin: '{{ item.origin }}'
        properties: '{{ item.properties }}'
  # ── list_by_resource_group ──
  - discovery_id: azure.healthbot.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        sku: '{{ item.sku }}'
        system_data: '{{ item.system_data }}'
  # ── list_secrets ──
  - discovery_id: azure.healthbot.list_secrets
    calls:
      - action: list_secrets
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.secrets }}'
      item:
        secrets: '{{ item.secrets }}'
    # required_params: ['bot_name']
