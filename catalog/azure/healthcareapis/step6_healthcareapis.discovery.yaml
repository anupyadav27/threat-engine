      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        type: '{{ item.type }}'
        fhir_mapping: '{{ item.fhir_mapping }}'
        fhir_service_resource_id: '{{ item.fhir_service_resource_id }}'
        resource_identity_resolution_type: '{{ item.resource_identity_resolution_type }}'
        system_data: '{{ item.system_data }}'
    # required_params: ['workspace_name', 'iot_connector_name']
