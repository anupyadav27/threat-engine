# Discovery YAML — healthcareapis (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: healthcareapis
services:
  client: healthcareapis
  module: azure.mgmt.healthcareapis
discovery:
  # ── list ──
  - discovery_id: azure.healthcareapis.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        kind: '{{ item.kind }}'
        properties: '{{ item.properties }}'
        system_data: '{{ item.system_data }}'
  # ── list_by_resource_group ──
  - discovery_id: azure.healthcareapis.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        system_data: '{{ item.system_data }}'
  # ── list_by_service ──
  - discovery_id: azure.healthcareapis.list_by_service
    calls:
      - action: list_by_service
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        group_id: '{{ item.group_id }}'
        required_members: '{{ item.required_members }}'
        required_zone_names: '{{ item.required_zone_names }}'
        system_data: '{{ item.system_data }}'
    # required_params: ['resource_name']
  # ── list_by_subscription ──
  - discovery_id: azure.healthcareapis.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        system_data: '{{ item.system_data }}'
  # ── list_by_workspace ──
  - discovery_id: azure.healthcareapis.list_by_workspace
    calls:
      - action: list_by_workspace
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        group_id: '{{ item.group_id }}'
        required_members: '{{ item.required_members }}'
        required_zone_names: '{{ item.required_zone_names }}'
        system_data: '{{ item.system_data }}'
    # required_params: ['workspace_name']
  # ── Dependent ops ──
  # ── check_name_availability [dependent] ──
  - discovery_id: azure.healthcareapis.check_name_availability
    calls:
      - action: check_name_availability
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        message: '{{ response.message }}'
        name_available: '{{ response.name_available }}'
        reason: '{{ response.reason }}'
    # required_params: ['check_name_availability_inputs']
  # ── list_by_iot_connector [dependent] ──
  - discovery_id: azure.healthcareapis.list_by_iot_connector
