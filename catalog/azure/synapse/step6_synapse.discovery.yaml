# Discovery YAML — synapse (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: synapse
services:
  client: synapse
  module: azure.mgmt.synapse
discovery:
  # ── list_by_resource_group ──
  - discovery_id: azure.synapse.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── list_by_workspace ──
  - discovery_id: azure.synapse.list_by_workspace
    calls:
      - action: list_by_workspace
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
    # required_params: ['workspace_name']
  # ── Dependent ops ──
  # ── check_name_availability [dependent] ──
  - discovery_id: azure.synapse.check_name_availability
    calls:
      - action: check_name_availability
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        name: '{{ response.name }}'
        available: '{{ response.available }}'
        message: '{{ response.message }}'
        reason: '{{ response.reason }}'
    # required_params: ['request']
  # ── get_azure_async_header_result [dependent] ──
  - discovery_id: azure.synapse.get_azure_async_header_result
    calls:
      - action: get_azure_async_header_result
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        status: '{{ response.status }}'
        end_time: '{{ response.end_time }}'
        error: '{{ response.error }}'
        percent_complete: '{{ response.percent_complete }}'
        properties: '{{ response.properties }}'
        start_time: '{{ response.start_time }}'
    # required_params: ['workspace_name', 'operation_id']
  # ── get_by_name [dependent] ──
  - discovery_id: azure.synapse.get_by_name
    calls:
      - action: get_by_name
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        location: '{{ response.location }}'
        name: '{{ response.name }}'
        type: '{{ response.type }}'
        is_termination_allowed: '{{ response.is_termination_allowed }}'
        partner_database: '{{ response.partner_database }}'
        partner_location: '{{ response.partner_location }}'
        partner_role: '{{ response.partner_role }}'
        partner_server: '{{ response.partner_server }}'
        percent_complete: '{{ response.percent_complete }}'
