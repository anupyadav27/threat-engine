# Discovery YAML — trafficmanager (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: trafficmanager
services:
  client: trafficmanager
  module: azure.mgmt.trafficmanager
discovery:
  # ── list_by_resource_group ──
  - discovery_id: azure.trafficmanager.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        allowed_endpoint_record_types: '{{ item.allowed_endpoint_record_types }}'
        dns_config: '{{ item.dns_config }}'
        endpoints: '{{ item.endpoints }}'
        max_return: '{{ item.max_return }}'
        monitor_config: '{{ item.monitor_config }}'
        profile_status: '{{ item.profile_status }}'
        traffic_routing_method: '{{ item.traffic_routing_method }}'
        traffic_view_enrollment_status: '{{ item.traffic_view_enrollment_status }}'
  # ── list_by_subscription ──
  - discovery_id: azure.trafficmanager.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        allowed_endpoint_record_types: '{{ item.allowed_endpoint_record_types }}'
        dns_config: '{{ item.dns_config }}'
        endpoints: '{{ item.endpoints }}'
        max_return: '{{ item.max_return }}'
        monitor_config: '{{ item.monitor_config }}'
        profile_status: '{{ item.profile_status }}'
        traffic_routing_method: '{{ item.traffic_routing_method }}'
        traffic_view_enrollment_status: '{{ item.traffic_view_enrollment_status }}'
  # ── Dependent ops ──
  # ── get_default [dependent] ──
  - discovery_id: azure.trafficmanager.get_default
    calls:
      - action: get_default
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        type: '{{ response.type }}'
        geographic_hierarchy: '{{ response.geographic_hierarchy }}'
