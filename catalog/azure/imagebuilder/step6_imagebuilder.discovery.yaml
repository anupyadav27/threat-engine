# Discovery YAML — imagebuilder (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: imagebuilder
services:
  client: imagebuilder
  module: azure.mgmt.imagebuilder
discovery:
  # ── list ──
  - discovery_id: azure.imagebuilder.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        auto_run: '{{ item.auto_run }}'
        build_timeout_in_minutes: '{{ item.build_timeout_in_minutes }}'
        customize: '{{ item.customize }}'
        distribute: '{{ item.distribute }}'
        error_handling: '{{ item.error_handling }}'
        exact_staging_resource_group: '{{ item.exact_staging_resource_group }}'
        last_run_status: '{{ item.last_run_status }}'
        managed_resource_tags: '{{ item.managed_resource_tags }}'
        optimize: '{{ item.optimize }}'
        provisioning_error: '{{ item.provisioning_error }}'
        source: '{{ item.source }}'
        staging_resource_group: '{{ item.staging_resource_group }}'
        system_data: '{{ item.system_data }}'
        validate: '{{ item.validate }}'
        vm_profile: '{{ item.vm_profile }}'
  # ── list_by_image_template ──
  - discovery_id: azure.imagebuilder.list_by_image_template
    calls:
      - action: list_by_image_template
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        status: '{{ item.status }}'
        type: '{{ item.type }}'
        kind: '{{ item.kind }}'
        system_data: '{{ item.system_data }}'
    # required_params: ['image_template_name']
  # ── list_by_resource_group ──
  - discovery_id: azure.imagebuilder.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        auto_run: '{{ item.auto_run }}'
        build_timeout_in_minutes: '{{ item.build_timeout_in_minutes }}'
        customize: '{{ item.customize }}'
        distribute: '{{ item.distribute }}'
        error_handling: '{{ item.error_handling }}'
        exact_staging_resource_group: '{{ item.exact_staging_resource_group }}'
        last_run_status: '{{ item.last_run_status }}'
        managed_resource_tags: '{{ item.managed_resource_tags }}'
        optimize: '{{ item.optimize }}'
        provisioning_error: '{{ item.provisioning_error }}'
        source: '{{ item.source }}'
        staging_resource_group: '{{ item.staging_resource_group }}'
        system_data: '{{ item.system_data }}'
        validate: '{{ item.validate }}'
        vm_profile: '{{ item.vm_profile }}'
  # ── list_run_outputs ──
  - discovery_id: azure.imagebuilder.list_run_outputs
    calls:
      - action: list_run_outputs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        type: '{{ item.type }}'
        artifact_id: '{{ item.artifact_id }}'
        artifact_uri: '{{ item.artifact_uri }}'
        system_data: '{{ item.system_data }}'
    # required_params: ['image_template_name']
  # ── Dependent ops ──
  # ── get_run_output [dependent] ──
  - discovery_id: azure.imagebuilder.get_run_output
    calls:
      - action: get_run_output
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        provisioning_state: '{{ response.provisioning_state }}'
        type: '{{ response.type }}'
        artifact_id: '{{ response.artifact_id }}'
        artifact_uri: '{{ response.artifact_uri }}'
        system_data: '{{ response.system_data }}'
    # required_params: ['image_template_name', 'run_output_name']
