# Discovery YAML — relay (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: relay
services:
  client: relay
  module: azure.mgmt.relay
discovery:
  # ── list ──
  - discovery_id: azure.relay.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── list_by_namespace ──
  - discovery_id: azure.relay.list_by_namespace
    calls:
      - action: list_by_namespace
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
    # required_params: ['namespace_name']
  # ── list_by_resource_group ──
  - discovery_id: azure.relay.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── Dependent ops ──
  # ── check_name_availability [dependent] ──
  - discovery_id: azure.relay.check_name_availability
    calls:
      - action: check_name_availability
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        message: '{{ response.message }}'
        name_available: '{{ response.name_available }}'
        reason: '{{ response.reason }}'
    # required_params: ['parameters']
  # ── get_authorization_rule [dependent] ──
  - discovery_id: azure.relay.get_authorization_rule
    calls:
      - action: get_authorization_rule
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        type: '{{ response.type }}'
        rights: '{{ response.rights }}'
    # required_params: ['namespace_name', 'relay_name', 'authorization_rule_name']
  # ── list_authorization_rules [dependent] ──
  - discovery_id: azure.relay.list_authorization_rules
    calls:
      - action: list_authorization_rules
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
    # required_params: ['namespace_name', 'relay_name']
  # ── list_keys [dependent] ──
  - discovery_id: azure.relay.list_keys
    calls:
      - action: list_keys
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.primary_connection_string }}'
      item:
        key_name: '{{ item.key_name }}'
        primary_connection_string: '{{ item.primary_connection_string }}'
        primary_key: '{{ item.primary_key }}'
        secondary_connection_string: '{{ item.secondary_connection_string }}'
        secondary_key: '{{ item.secondary_key }}'
    # required_params: ['namespace_name', 'relay_name', 'authorization_rule_name']
