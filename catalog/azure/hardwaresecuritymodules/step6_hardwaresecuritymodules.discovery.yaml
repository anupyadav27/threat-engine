# Discovery YAML — hardwaresecuritymodules (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: hardwaresecuritymodules
services:
  client: hardwaresecuritymodules
  module: azure.mgmt.hardwaresecuritymodules
discovery:
  # ── list ──
  - discovery_id: azure.hardwaresecuritymodules.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        name: '{{ item.name }}'
        action_type: '{{ item.action_type }}'
        display: '{{ item.display }}'
        is_data_action: '{{ item.is_data_action }}'
        origin: '{{ item.origin }}'
  # ── list_by_cloud_hsm_cluster ──
  - discovery_id: azure.hardwaresecuritymodules.list_by_cloud_hsm_cluster
    calls:
      - action: list_by_cloud_hsm_cluster
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        properties: '{{ item.properties }}'
    # required_params: ['cloud_hsm_cluster_name']
  # ── list_by_resource_group ──
  - discovery_id: azure.hardwaresecuritymodules.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        properties: '{{ item.properties }}'
        sku: '{{ item.sku }}'
        zones: '{{ item.zones }}'
  # ── list_by_subscription ──
  - discovery_id: azure.hardwaresecuritymodules.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        properties: '{{ item.properties }}'
        sku: '{{ item.sku }}'
        zones: '{{ item.zones }}'
  # ── list_outbound_network_dependencies_endpoints ──
  - discovery_id: azure.hardwaresecuritymodules.list_outbound_network_dependencies_endpoints
    calls:
      - action: list_outbound_network_dependencies_endpoints
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        category: '{{ item.category }}'
        endpoints: '{{ item.endpoints }}'
    # required_params: ['name']
  # ── Dependent ops ──
  # ── begin_get [dependent] ──
  - discovery_id: azure.hardwaresecuritymodules.begin_get
    calls:
      - action: begin_get
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        identity: '{{ response.identity }}'
        name: '{{ response.name }}'
        Enabled: '{{ response.Enabled }}'
        Name: '{{ response.Name }}'
        PrincipalId: '{{ response.PrincipalId }}'
        Status: '{{ response.Status }}'
        Tier: '{{ response.Tier }}'
        Type: '{{ response.Type }}'
        action_type: '{{ response.action_type }}'
        category: '{{ response.category }}'
        display: '{{ response.display }}'
        endpoints: '{{ response.endpoints }}'
        is_data_action: '{{ response.is_data_action }}'
        origin: '{{ response.origin }}'
        properties: '{{ response.properties }}'
        sku: '{{ response.sku }}'
        zones: '{{ response.zones }}'
    # required_params: ['cloud_hsm_cluster_name', 'job_id']
