# Discovery YAML — labservices (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: labservices
services:
  client: labservices
  module: azure.mgmt.labservices
discovery:
  # ── list ──
  - discovery_id: azure.labservices.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        name: '{{ item.name }}'
        capabilities: '{{ item.capabilities }}'
        capacity: '{{ item.capacity }}'
        costs: '{{ item.costs }}'
        family: '{{ item.family }}'
        locations: '{{ item.locations }}'
        resource_type: '{{ item.resource_type }}'
        restrictions: '{{ item.restrictions }}'
        size: '{{ item.size }}'
        tier: '{{ item.tier }}'
  # ── list_by_lab ──
  - discovery_id: azure.labservices.list_by_lab
    calls:
      - action: list_by_lab
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        type: '{{ item.type }}'
        claimed_by_user_id: '{{ item.claimed_by_user_id }}'
        connection_profile: '{{ item.connection_profile }}'
        state: '{{ item.state }}'
        system_data: '{{ item.system_data }}'
        vm_type: '{{ item.vm_type }}'
    # required_params: ['lab_name']
  # ── list_by_lab_plan ──
  - discovery_id: azure.labservices.list_by_lab_plan
    calls:
      - action: list_by_lab_plan
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        type: '{{ item.type }}'
        author: '{{ item.author }}'
        available_regions: '{{ item.available_regions }}'
        description: '{{ item.description }}'
        display_name: '{{ item.display_name }}'
        enabled_state: '{{ item.enabled_state }}'
        icon_url: '{{ item.icon_url }}'
        offer: '{{ item.offer }}'
        os_state: '{{ item.os_state }}'
        os_type: '{{ item.os_type }}'
        plan: '{{ item.plan }}'
        publisher: '{{ item.publisher }}'
        shared_gallery_id: '{{ item.shared_gallery_id }}'
        sku: '{{ item.sku }}'
        system_data: '{{ item.system_data }}'
        terms_status: '{{ item.terms_status }}'
        version: '{{ item.version }}'
    # required_params: ['lab_plan_name']
  # ── list_by_location ──
  - discovery_id: azure.labservices.list_by_location
    calls:
      - action: list_by_location
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        current_value: '{{ item.current_value }}'
        limit: '{{ item.limit }}'
        unit: '{{ item.unit }}'
    # required_params: ['location']
  # ── list_by_resource_group ──
  - discovery_id: azure.labservices.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        auto_shutdown_profile: '{{ item.auto_shutdown_profile }}'
        connection_profile: '{{ item.connection_profile }}'
        description: '{{ item.description }}'
        lab_plan_id: '{{ item.lab_plan_id }}'
        network_profile: '{{ item.network_profile }}'
        roster_profile: '{{ item.roster_profile }}'
        security_profile: '{{ item.security_profile }}'
        state: '{{ item.state }}'
        system_data: '{{ item.system_data }}'
        title: '{{ item.title }}'
        virtual_machine_profile: '{{ item.virtual_machine_profile }}'
  # ── list_by_subscription ──
  - discovery_id: azure.labservices.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        auto_shutdown_profile: '{{ item.auto_shutdown_profile }}'
        connection_profile: '{{ item.connection_profile }}'
        description: '{{ item.description }}'
        lab_plan_id: '{{ item.lab_plan_id }}'
        network_profile: '{{ item.network_profile }}'
        roster_profile: '{{ item.roster_profile }}'
        security_profile: '{{ item.security_profile }}'
        state: '{{ item.state }}'
        system_data: '{{ item.system_data }}'
        title: '{{ item.title }}'
        virtual_machine_profile: '{{ item.virtual_machine_profile }}'
