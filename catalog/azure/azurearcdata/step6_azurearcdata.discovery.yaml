# Discovery YAML — azurearcdata (Azure)
# Generated: 2026-02-21T05:02:43Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: azurearcdata
services:
  client: azurearcdata
  module: azure.mgmt.azurearcdata
discovery:
  # ── list ──
  - discovery_id: azure.azurearcdata.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── list_by_resource_group ──
  - discovery_id: azure.azurearcdata.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── list_in_group ──
  - discovery_id: azure.azurearcdata.list_in_group
    calls:
      - action: list_in_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── list_in_subscription ──
  - discovery_id: azure.azurearcdata.list_in_subscription
    calls:
      - action: list_in_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── Dependent ops ──
  # ── get_data_controller [dependent] ──
  - discovery_id: azure.azurearcdata.get_data_controller
    calls:
      - action: get_data_controller
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        location: '{{ response.location }}'
        name: '{{ response.name }}'
        tags: '{{ response.tags }}'
        type: '{{ response.type }}'
        extended_location: '{{ response.extended_location }}'
        properties: '{{ response.properties }}'
        system_data: '{{ response.system_data }}'
    # required_params: ['data_controller_name']
