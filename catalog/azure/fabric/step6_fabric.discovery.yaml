# Discovery YAML — fabric (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: fabric
services:
  client: fabric
  module: azure.mgmt.fabric
discovery:
  # ── list ──
  - discovery_id: azure.fabric.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        name: '{{ item.name }}'
        action_type: '{{ item.action_type }}'
        display: '{{ item.display }}'
        is_data_action: '{{ item.is_data_action }}'
        origin: '{{ item.origin }}'
  # ── list_by_resource_group ──
  - discovery_id: azure.fabric.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        properties: '{{ item.properties }}'
        sku: '{{ item.sku }}'
  # ── list_by_subscription ──
  - discovery_id: azure.fabric.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        properties: '{{ item.properties }}'
        sku: '{{ item.sku }}'
  # ── list_skus ──
  - discovery_id: azure.fabric.list_skus
    calls:
      - action: list_skus
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        name: '{{ item.name }}'
        locations: '{{ item.locations }}'
        resource_type: '{{ item.resource_type }}'
  # ── list_skus_for_capacity ──
  - discovery_id: azure.fabric.list_skus_for_capacity
    calls:
      - action: list_skus_for_capacity
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        resource_type: '{{ item.resource_type }}'
        sku: '{{ item.sku }}'
    # required_params: ['capacity_name']
  # ── Dependent ops ──
  # ── check_name_availability [dependent] ──
  - discovery_id: azure.fabric.check_name_availability
    calls:
      - action: check_name_availability
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        message: '{{ response.message }}'
        name_available: '{{ response.name_available }}'
        reason: '{{ response.reason }}'
    # required_params: ['location', 'body']
