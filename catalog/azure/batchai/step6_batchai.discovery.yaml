# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: batchai
services:
  client: batchai
  module: azure.mgmt.batchai
discovery:
  # ── list ──
  - discovery_id: azure.batchai.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
