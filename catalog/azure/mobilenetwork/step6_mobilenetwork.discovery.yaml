# Discovery YAML — mobilenetwork (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: mobilenetwork
services:
  client: mobilenetwork
  module: azure.mgmt.mobilenetwork
discovery:
  # ── list ──
  - discovery_id: azure.mobilenetwork.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        last_read_at: '{{ item.last_read_at }}'
        rat_type: '{{ item.rat_type }}'
        system_data: '{{ item.system_data }}'
        ue_ip_addresses: '{{ item.ue_ip_addresses }}'
        ue_state: '{{ item.ue_state }}'
    # required_params: ['packet_core_control_plane_name']
  # ── list_by_group ──
  - discovery_id: azure.mobilenetwork.list_by_group
    calls:
      - action: list_by_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        type: '{{ item.type }}'
        authentication_key: '{{ item.authentication_key }}'
        device_type: '{{ item.device_type }}'
        integrated_circuit_card_identifier: '{{ item.integrated_circuit_card_identifier }}'
        international_mobile_subscriber_identity: '{{ item.international_mobile_subscriber_identity }}'
        operator_key_code: '{{ item.operator_key_code }}'
        sim_policy: '{{ item.sim_policy }}'
        sim_state: '{{ item.sim_state }}'
        site_provisioning_state: '{{ item.site_provisioning_state }}'
        static_ip_configuration: '{{ item.static_ip_configuration }}'
        system_data: '{{ item.system_data }}'
        vendor_key_fingerprint: '{{ item.vendor_key_fingerprint }}'
        vendor_name: '{{ item.vendor_name }}'
