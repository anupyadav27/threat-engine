# Discovery YAML — kusto (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: kusto
services:
  client: kusto
  module: azure.mgmt.kusto
discovery:
  # ── list_by_cluster ──
  - discovery_id: azure.kusto.list_by_cluster
    calls:
      - action: list_by_cluster
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        type: '{{ item.type }}'
        base_image_name: '{{ item.base_image_name }}'
        language: '{{ item.language }}'
        language_version: '{{ item.language_version }}'
        requirements_file_content: '{{ item.requirements_file_content }}'
    # required_params: ['cluster_name']
  # ── list_by_resource_group ──
  - discovery_id: azure.kusto.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        key_vault_properties: '{{ item.key_vault_properties }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        private_endpoint_connections: '{{ item.private_endpoint_connections }}'
        provisioning_state: '{{ item.provisioning_state }}'
        public_network_access: '{{ item.public_network_access }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        accepted_audiences: '{{ item.accepted_audiences }}'
        allowed_fqdn_list: '{{ item.allowed_fqdn_list }}'
        allowed_ip_range_list: '{{ item.allowed_ip_range_list }}'
        callout_policies: '{{ item.callout_policies }}'
        data_ingestion_uri: '{{ item.data_ingestion_uri }}'
        enable_auto_stop: '{{ item.enable_auto_stop }}'
        enable_disk_encryption: '{{ item.enable_disk_encryption }}'
        enable_double_encryption: '{{ item.enable_double_encryption }}'
        enable_purge: '{{ item.enable_purge }}'
        enable_streaming_ingest: '{{ item.enable_streaming_ingest }}'
        engine_type: '{{ item.engine_type }}'
        language_extensions: '{{ item.language_extensions }}'
        migration_cluster: '{{ item.migration_cluster }}'
        optimized_autoscale: '{{ item.optimized_autoscale }}'
        public_ip_type: '{{ item.public_ip_type }}'
        restrict_outbound_network_access: '{{ item.restrict_outbound_network_access }}'
        sku: '{{ item.sku }}'
        state: '{{ item.state }}'
        state_reason: '{{ item.state_reason }}'
        system_data: '{{ item.system_data }}'
        trusted_external_tenants: '{{ item.trusted_external_tenants }}'
        uri: '{{ item.uri }}'
        virtual_cluster_graduation_properties: '{{ item.virtual_cluster_graduation_properties }}'
        virtual_network_configuration: '{{ item.virtual_network_configuration }}'
        zone_status: '{{ item.zone_status }}'
        zones: '{{ item.zones }}'
  # ── list_callout_policies ──
  - discovery_id: azure.kusto.list_callout_policies
    calls:
      - action: list_callout_policies
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        callout_id: '{{ item.callout_id }}'
        callout_type: '{{ item.callout_type }}'
        callout_uri_regex: '{{ item.callout_uri_regex }}'
        outbound_access: '{{ item.outbound_access }}'
    # required_params: ['cluster_name']
  # ── list_follower_databases ──
  - discovery_id: azure.kusto.list_follower_databases
    calls:
      - action: list_follower_databases
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        attached_database_configuration_name: '{{ item.attached_database_configuration_name }}'
        cluster_resource_id: '{{ item.cluster_resource_id }}'
        database_name: '{{ item.database_name }}'
        database_share_origin: '{{ item.database_share_origin }}'
        table_level_sharing_properties: '{{ item.table_level_sharing_properties }}'
    # required_params: ['cluster_name']
  # ── list_follower_databases_get ──
  - discovery_id: azure.kusto.list_follower_databases_get
    calls:
      - action: list_follower_databases_get
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        attached_database_configuration_name: '{{ item.attached_database_configuration_name }}'
        cluster_resource_id: '{{ item.cluster_resource_id }}'
        database_name: '{{ item.database_name }}'
        database_share_origin: '{{ item.database_share_origin }}'
        table_level_sharing_properties: '{{ item.table_level_sharing_properties }}'
    # required_params: ['cluster_name']
  # ── list_language_extensions ──
  - discovery_id: azure.kusto.list_language_extensions
    calls:
      - action: list_language_extensions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        language_extension_custom_image_name: '{{ item.language_extension_custom_image_name }}'
        language_extension_image_name: '{{ item.language_extension_image_name }}'
        language_extension_name: '{{ item.language_extension_name }}'
    # required_params: ['cluster_name']
  # ── list_outbound_network_dependencies_endpoints ──
  - discovery_id: azure.kusto.list_outbound_network_dependencies_endpoints
    calls:
      - action: list_outbound_network_dependencies_endpoints
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        type: '{{ item.type }}'
        category: '{{ item.category }}'
        endpoints: '{{ item.endpoints }}'
    # required_params: ['cluster_name']
  # ── list_skus ──
  - discovery_id: azure.kusto.list_skus
    calls:
      - action: list_skus
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        name: '{{ item.name }}'
        location_info: '{{ item.location_info }}'
        locations: '{{ item.locations }}'
        resource_type: '{{ item.resource_type }}'
        restrictions: '{{ item.restrictions }}'
        tier: '{{ item.tier }}'
  # ── list_skus_by_resource ──
  - discovery_id: azure.kusto.list_skus_by_resource
    calls:
      - action: list_skus_by_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        capacity: '{{ item.capacity }}'
        resource_type: '{{ item.resource_type }}'
        sku: '{{ item.sku }}'
    # required_params: ['cluster_name']
  # ── Dependent ops ──
  # ── check_name_availability [dependent] ──
  - discovery_id: azure.kusto.check_name_availability
    calls:
      - action: check_name_availability
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        name: '{{ response.name }}'
        message: '{{ response.message }}'
        name_available: '{{ response.name_available }}'
        reason: '{{ response.reason }}'
    # required_params: ['cluster_name', 'database_name', 'script_name']
  # ── list [dependent] ──
  - discovery_id: azure.kusto.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        principal_id: '{{ item.principal_id }}'
        provisioning_state: '{{ item.provisioning_state }}'
        type: '{{ item.type }}'
        aad_object_id: '{{ item.aad_object_id }}'
        principal_name: '{{ item.principal_name }}'
        principal_type: '{{ item.principal_type }}'
        role: '{{ item.role }}'
        tenant_id: '{{ item.tenant_id }}'
        tenant_name: '{{ item.tenant_name }}'
    # required_params: ['cluster_name', 'database_name']
  # ── list_by_database [dependent] ──
  - discovery_id: azure.kusto.list_by_database
    calls:
      - action: list_by_database
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        type: '{{ item.type }}'
        continue_on_errors: '{{ item.continue_on_errors }}'
        force_update_tag: '{{ item.force_update_tag }}'
        principal_permissions_action: '{{ item.principal_permissions_action }}'
        script_content: '{{ item.script_content }}'
        script_level: '{{ item.script_level }}'
        script_url: '{{ item.script_url }}'
        script_url_sas_token: '{{ item.script_url_sas_token }}'
        system_data: '{{ item.system_data }}'
    # required_params: ['cluster_name', 'database_name']
  # ── list_principals [dependent] ──
  - discovery_id: azure.kusto.list_principals
    calls:
      - action: list_principals
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        app_id: '{{ item.app_id }}'
        email: '{{ item.email }}'
        fqn: '{{ item.fqn }}'
        role: '{{ item.role }}'
        tenant_name: '{{ item.tenant_name }}'
    # required_params: ['cluster_name', 'database_name']
