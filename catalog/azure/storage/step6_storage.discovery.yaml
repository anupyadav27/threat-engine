# Discovery YAML — storage (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: storage
services:
  client: storage
  module: azure.mgmt.storage
discovery:
  # ── list_by_location ──
  - discovery_id: azure.storage.list_by_location
    calls:
      - action: list_by_location
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        name: '{{ item.name }}'
        current_value: '{{ item.current_value }}'
        limit: '{{ item.limit }}'
        unit: '{{ item.unit }}'
    # required_params: ['location']
  # ── list_by_resource_group ──
  - discovery_id: azure.storage.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        allow_cross_tenant_replication: '{{ item.allow_cross_tenant_replication }}'
        enable_https_traffic_only: '{{ item.enable_https_traffic_only }}'
        encryption: '{{ item.encryption }}'
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        minimum_tls_version: '{{ item.minimum_tls_version }}'
        name: '{{ item.name }}'
        network_rule_set: '{{ item.network_rule_set }}'
        private_endpoint_connections: '{{ item.private_endpoint_connections }}'
        provisioning_state: '{{ item.provisioning_state }}'
        public_network_access: '{{ item.public_network_access }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        access_tier: '{{ item.access_tier }}'
        account_migration_in_progress: '{{ item.account_migration_in_progress }}'
        allow_blob_public_access: '{{ item.allow_blob_public_access }}'
        allow_shared_key_access: '{{ item.allow_shared_key_access }}'
        allowed_copy_scope: '{{ item.allowed_copy_scope }}'
        azure_files_identity_based_authentication: '{{ item.azure_files_identity_based_authentication }}'
        blob_restore_status: '{{ item.blob_restore_status }}'
        creation_time: '{{ item.creation_time }}'
        custom_domain: '{{ item.custom_domain }}'
        default_to_o_auth_authentication: '{{ item.default_to_o_auth_authentication }}'
        dns_endpoint_type: '{{ item.dns_endpoint_type }}'
        dual_stack_endpoint_preference: '{{ item.dual_stack_endpoint_preference }}'
        enable_extended_groups: '{{ item.enable_extended_groups }}'
        enable_nfs_v3: '{{ item.enable_nfs_v3 }}'
        extended_location: '{{ item.extended_location }}'
        failover_in_progress: '{{ item.failover_in_progress }}'
        geo_priority_replication_status: '{{ item.geo_priority_replication_status }}'
        geo_replication_stats: '{{ item.geo_replication_stats }}'
        immutable_storage_with_versioning: '{{ item.immutable_storage_with_versioning }}'
        is_hns_enabled: '{{ item.is_hns_enabled }}'
        is_local_user_enabled: '{{ item.is_local_user_enabled }}'
        is_sftp_enabled: '{{ item.is_sftp_enabled }}'
        is_sku_conversion_blocked: '{{ item.is_sku_conversion_blocked }}'
        key_creation_time: '{{ item.key_creation_time }}'
        key_policy: '{{ item.key_policy }}'
        kind: '{{ item.kind }}'
        large_file_shares_state: '{{ item.large_file_shares_state }}'
        last_geo_failover_time: '{{ item.last_geo_failover_time }}'
        placement: '{{ item.placement }}'
        primary_endpoints: '{{ item.primary_endpoints }}'
        primary_location: '{{ item.primary_location }}'
        routing_preference: '{{ item.routing_preference }}'
        sas_policy: '{{ item.sas_policy }}'
        secondary_endpoints: '{{ item.secondary_endpoints }}'
        secondary_location: '{{ item.secondary_location }}'
        sku: '{{ item.sku }}'
        status_of_primary: '{{ item.status_of_primary }}'
        status_of_secondary: '{{ item.status_of_secondary }}'
        storage_account_sku_conversion_status: '{{ item.storage_account_sku_conversion_status }}'
        zones: '{{ item.zones }}'
  # ── list_by_storage_account ──
  - discovery_id: azure.storage.list_by_storage_account
    calls:
      - action: list_by_storage_account
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        group_id: '{{ item.group_id }}'
        required_members: '{{ item.required_members }}'
        required_zone_names: '{{ item.required_zone_names }}'
    # required_params: ['account_name']
  # ── list_service_usages ──
  - discovery_id: azure.storage.list_service_usages
    calls:
      - action: list_service_usages
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
    # required_params: ['account_name']
  # ── Dependent ops ──
  # ── check_name_availability [dependent] ──
  - discovery_id: azure.storage.check_name_availability
    calls:
      - action: check_name_availability
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        message: '{{ response.message }}'
        name_available: '{{ response.name_available }}'
        reason: '{{ response.reason }}'
    # required_params: ['account_name']
  # ── get_customer_initiated_migration [dependent] ──
  - discovery_id: azure.storage.get_customer_initiated_migration
    calls:
      - action: get_customer_initiated_migration
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        type: '{{ response.type }}'
        migration_failed_detailed_reason: '{{ response.migration_failed_detailed_reason }}'
        migration_failed_reason: '{{ response.migration_failed_reason }}'
        migration_status: '{{ response.migration_status }}'
        target_sku_name: '{{ response.target_sku_name }}'
    # required_params: ['account_name', 'migration_name']
  # ── get_immutability_policy [dependent] ──
  - discovery_id: azure.storage.get_immutability_policy
    calls:
      - action: get_immutability_policy
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        type: '{{ response.type }}'
        allow_protected_append_writes: '{{ response.allow_protected_append_writes }}'
        allow_protected_append_writes_all: '{{ response.allow_protected_append_writes_all }}'
        immutability_period_since_creation_in_days: '{{ response.immutability_period_since_creation_in_days }}'
        state: '{{ response.state }}'
    # required_params: ['account_name', 'container_name']
  # ── get_properties [dependent] ──
  - discovery_id: azure.storage.get_properties
    calls:
      - action: get_properties
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        allow_cross_tenant_replication: '{{ response.allow_cross_tenant_replication }}'
        enable_https_traffic_only: '{{ response.enable_https_traffic_only }}'
        encryption: '{{ response.encryption }}'
        id: '{{ response.id }}'
        identity: '{{ response.identity }}'
        location: '{{ response.location }}'
        minimum_tls_version: '{{ response.minimum_tls_version }}'
        name: '{{ response.name }}'
        network_rule_set: '{{ response.network_rule_set }}'
        private_endpoint_connections: '{{ response.private_endpoint_connections }}'
        provisioning_state: '{{ response.provisioning_state }}'
        public_network_access: '{{ response.public_network_access }}'
        tags: '{{ response.tags }}'
        type: '{{ response.type }}'
        access_tier: '{{ response.access_tier }}'
        account_migration_in_progress: '{{ response.account_migration_in_progress }}'
        allow_blob_public_access: '{{ response.allow_blob_public_access }}'
        allow_shared_key_access: '{{ response.allow_shared_key_access }}'
        allowed_copy_scope: '{{ response.allowed_copy_scope }}'
        azure_files_identity_based_authentication: '{{ response.azure_files_identity_based_authentication }}'
        blob_restore_status: '{{ response.blob_restore_status }}'
        creation_time: '{{ response.creation_time }}'
        custom_domain: '{{ response.custom_domain }}'
        default_to_o_auth_authentication: '{{ response.default_to_o_auth_authentication }}'
        dns_endpoint_type: '{{ response.dns_endpoint_type }}'
        dual_stack_endpoint_preference: '{{ response.dual_stack_endpoint_preference }}'
        enable_extended_groups: '{{ response.enable_extended_groups }}'
        enable_nfs_v3: '{{ response.enable_nfs_v3 }}'
        extended_location: '{{ response.extended_location }}'
        failover_in_progress: '{{ response.failover_in_progress }}'
        geo_priority_replication_status: '{{ response.geo_priority_replication_status }}'
        geo_replication_stats: '{{ response.geo_replication_stats }}'
        immutable_storage_with_versioning: '{{ response.immutable_storage_with_versioning }}'
        is_hns_enabled: '{{ response.is_hns_enabled }}'
        is_local_user_enabled: '{{ response.is_local_user_enabled }}'
        is_sftp_enabled: '{{ response.is_sftp_enabled }}'
        is_sku_conversion_blocked: '{{ response.is_sku_conversion_blocked }}'
        key_creation_time: '{{ response.key_creation_time }}'
        key_policy: '{{ response.key_policy }}'
        kind: '{{ response.kind }}'
        large_file_shares_state: '{{ response.large_file_shares_state }}'
        last_geo_failover_time: '{{ response.last_geo_failover_time }}'
        placement: '{{ response.placement }}'
        primary_endpoints: '{{ response.primary_endpoints }}'
        primary_location: '{{ response.primary_location }}'
        routing_preference: '{{ response.routing_preference }}'
        sas_policy: '{{ response.sas_policy }}'
        secondary_endpoints: '{{ response.secondary_endpoints }}'
        secondary_location: '{{ response.secondary_location }}'
        sku: '{{ response.sku }}'
        status_of_primary: '{{ response.status_of_primary }}'
        status_of_secondary: '{{ response.status_of_secondary }}'
        storage_account_sku_conversion_status: '{{ response.storage_account_sku_conversion_status }}'
        zones: '{{ response.zones }}'
    # required_params: ['account_name']
  # ── get_service_properties [dependent] ──
  - discovery_id: azure.storage.get_service_properties
    calls:
      - action: get_service_properties
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        type: '{{ response.type }}'
        cors: '{{ response.cors }}'
    # required_params: ['account_name']
  # ── get_service_usage [dependent] ──
  - discovery_id: azure.storage.get_service_usage
    calls:
      - action: get_service_usage
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        type: '{{ response.type }}'
        properties: '{{ response.properties }}'
    # required_params: ['account_name']
  # ── list [dependent] ──
  - discovery_id: azure.storage.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
    # required_params: ['account_name', 'storage_task_assignment_name']
  # ── list_account_sas [dependent] ──
  - discovery_id: azure.storage.list_account_sas
    calls:
      - action: list_account_sas
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.account_sas_token }}'
      item:
        account_sas_token: '{{ item.account_sas_token }}'
    # required_params: ['account_name', 'parameters']
  # ── list_keys [dependent] ──
  - discovery_id: azure.storage.list_keys
    calls:
      - action: list_keys
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ssh_authorized_keys }}'
      item:
        shared_key: '{{ item.shared_key }}'
        ssh_authorized_keys: '{{ item.ssh_authorized_keys }}'
    # required_params: ['account_name', 'username']
  # ── list_service_sas [dependent] ──
  - discovery_id: azure.storage.list_service_sas
    calls:
      - action: list_service_sas
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.service_sas_token }}'
      item:
        service_sas_token: '{{ item.service_sas_token }}'
    # required_params: ['account_name', 'parameters']
