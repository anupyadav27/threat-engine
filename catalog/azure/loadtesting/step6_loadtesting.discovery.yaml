# Discovery YAML — loadtesting (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: loadtesting
services:
  client: loadtesting
  module: azure.mgmt.loadtesting
discovery:
  # ── list ──
  - discovery_id: azure.loadtesting.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        type: '{{ item.type }}'
        limit: '{{ item.limit }}'
        system_data: '{{ item.system_data }}'
        usage: '{{ item.usage }}'
    # required_params: ['location']
  # ── list_by_resource_group ──
  - discovery_id: azure.loadtesting.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        encryption: '{{ item.encryption }}'
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        data_plane_uri: '{{ item.data_plane_uri }}'
        description: '{{ item.description }}'
        system_data: '{{ item.system_data }}'
  # ── list_by_subscription ──
  - discovery_id: azure.loadtesting.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        encryption: '{{ item.encryption }}'
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        data_plane_uri: '{{ item.data_plane_uri }}'
        description: '{{ item.description }}'
        system_data: '{{ item.system_data }}'
  # ── list_outbound_network_dependencies_endpoints ──
  - discovery_id: azure.loadtesting.list_outbound_network_dependencies_endpoints
    calls:
      - action: list_outbound_network_dependencies_endpoints
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        category: '{{ item.category }}'
        endpoints: '{{ item.endpoints }}'
    # required_params: ['load_test_name']
