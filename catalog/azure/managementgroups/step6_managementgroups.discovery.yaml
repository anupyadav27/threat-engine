# Discovery YAML — managementgroups (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: managementgroups
services:
  client: managementgroups
  module: azure.mgmt.managementgroups
discovery:
  # ── list ──
  - discovery_id: azure.managementgroups.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── Dependent ops ──
  # ── check_name_availability [dependent] ──
  - discovery_id: azure.managementgroups.check_name_availability
    calls:
      - action: check_name_availability
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        message: '{{ response.message }}'
        name_available: '{{ response.name_available }}'
        reason: '{{ response.reason }}'
    # required_params: ['check_name_availability_request']
  # ── get_descendants [dependent] ──
  - discovery_id: azure.managementgroups.get_descendants
    calls:
      - action: get_descendants
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        value: '{{ response.value }}'
    # required_params: ['group_id']
  # ── get_subscription [dependent] ──
  - discovery_id: azure.managementgroups.get_subscription
    calls:
      - action: get_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        type: '{{ response.type }}'
        display_name: '{{ response.display_name }}'
        parent: '{{ response.parent }}'
        state: '{{ response.state }}'
        tenant: '{{ response.tenant }}'
    # required_params: ['group_id']
  # ── get_subscriptions_under_management_group [dependent] ──
  - discovery_id: azure.managementgroups.get_subscriptions_under_management_group
    calls:
      - action: get_subscriptions_under_management_group
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        value: '{{ response.value }}'
    # required_params: ['group_id']
