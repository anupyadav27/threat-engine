# Discovery YAML — machinelearningservices (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: machinelearningservices
services:
  client: machinelearningservices
  module: azure.mgmt.machinelearningservices
discovery:
  # ── list ──
  - discovery_id: azure.machinelearningservices.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
    # required_params: ['workspace_name']
  # ── list_by_resource_group ──
  - discovery_id: azure.machinelearningservices.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── list_by_subscription ──
  - discovery_id: azure.machinelearningservices.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── list_by_workspace ──
  - discovery_id: azure.machinelearningservices.list_by_workspace
    calls:
      - action: list_by_workspace
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        group_id: '{{ item.group_id }}'
        required_members: '{{ item.required_members }}'
        required_zone_names: '{{ item.required_zone_names }}'
        sku: '{{ item.sku }}'
    # required_params: ['workspace_name']
  # ── list_skus ──
  - discovery_id: azure.machinelearningservices.list_skus
    calls:
      - action: list_skus
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── Dependent ops ──
  # ── list_keys [dependent] ──
  - discovery_id: azure.machinelearningservices.list_keys
    calls:
      - action: list_keys
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.compute_type }}'
      item:
        compute_type: '{{ item.compute_type }}'
    # required_params: ['workspace_name', 'compute_name']
  # ── list_nodes [dependent] ──
  - discovery_id: azure.machinelearningservices.list_nodes
    calls:
      - action: list_nodes
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.compute_type }}'
      item:
        compute_type: '{{ item.compute_type }}'
        nodes: '{{ item.nodes }}'
    # required_params: ['workspace_name', 'compute_name']
