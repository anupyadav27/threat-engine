        sql_image_offer: '{{ item.sql_image_offer }}'
        sql_image_sku: '{{ item.sql_image_sku }}'
        sql_management: '{{ item.sql_management }}'
        sql_server_license_type: '{{ item.sql_server_license_type }}'
        sql_virtual_machine_group_resource_id: '{{ item.sql_virtual_machine_group_resource_id }}'
        storage_configuration_settings: '{{ item.storage_configuration_settings }}'
        virtual_machine_resource_id: '{{ item.virtual_machine_resource_id }}'
