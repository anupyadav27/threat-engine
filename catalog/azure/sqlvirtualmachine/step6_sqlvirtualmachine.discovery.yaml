# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: sqlvirtualmachine
services:
  client: sqlvirtualmachine
  module: azure.mgmt.sqlvirtualmachine
discovery:
  # ── list ──
  - discovery_id: azure.sqlvirtualmachine.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
