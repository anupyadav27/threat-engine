# Discovery YAML — storagecache (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: storagecache
services:
  client: storagecache
  module: azure.mgmt.storagecache
discovery:
  # ── list ──
  - discovery_id: azure.storagecache.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        display: '{{ item.display }}'
        model_name: '{{ item.model_name }}'
        target_type: '{{ item.target_type }}'
  # ── list_by_aml_filesystem ──
  - discovery_id: azure.storagecache.list_by_aml_filesystem
    calls:
      - action: list_by_aml_filesystem
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        admin_status: '{{ item.admin_status }}'
        blobs_imported_per_second: '{{ item.blobs_imported_per_second }}'
        blobs_walked_per_second: '{{ item.blobs_walked_per_second }}'
        conflict_resolution_mode: '{{ item.conflict_resolution_mode }}'
        import_prefixes: '{{ item.import_prefixes }}'
        imported_directories: '{{ item.imported_directories }}'
        imported_files: '{{ item.imported_files }}'
        imported_symlinks: '{{ item.imported_symlinks }}'
        last_completion_time: '{{ item.last_completion_time }}'
        last_started_time: '{{ item.last_started_time }}'
        maximum_errors: '{{ item.maximum_errors }}'
        preexisting_directories: '{{ item.preexisting_directories }}'
        preexisting_files: '{{ item.preexisting_files }}'
        preexisting_symlinks: '{{ item.preexisting_symlinks }}'
        state: '{{ item.state }}'
        status_message: '{{ item.status_message }}'
        system_data: '{{ item.system_data }}'
        total_blobs_imported: '{{ item.total_blobs_imported }}'
        total_blobs_walked: '{{ item.total_blobs_walked }}'
        total_conflicts: '{{ item.total_conflicts }}'
        total_errors: '{{ item.total_errors }}'
    # required_params: ['aml_filesystem_name']
  # ── list_by_cache ──
  - discovery_id: azure.storagecache.list_by_cache
    calls:
      - action: list_by_cache
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        type: '{{ item.type }}'
        allocation_percentage: '{{ item.allocation_percentage }}'
        blob_nfs: '{{ item.blob_nfs }}'
        clfs: '{{ item.clfs }}'
        junctions: '{{ item.junctions }}'
        nfs3: '{{ item.nfs3 }}'
        state: '{{ item.state }}'
        system_data: '{{ item.system_data }}'
        target_type: '{{ item.target_type }}'
        unknown: '{{ item.unknown }}'
    # required_params: ['cache_name']
  # ── list_by_resource_group ──
  - discovery_id: azure.storagecache.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        encryption_settings: '{{ item.encryption_settings }}'
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        cache_size_gb: '{{ item.cache_size_gb }}'
        directory_services_settings: '{{ item.directory_services_settings }}'
        health: '{{ item.health }}'
        mount_addresses: '{{ item.mount_addresses }}'
        network_settings: '{{ item.network_settings }}'
        priming_jobs: '{{ item.priming_jobs }}'
        security_settings: '{{ item.security_settings }}'
        sku: '{{ item.sku }}'
        space_allocation: '{{ item.space_allocation }}'
        subnet: '{{ item.subnet }}'
        system_data: '{{ item.system_data }}'
        upgrade_settings: '{{ item.upgrade_settings }}'
        upgrade_status: '{{ item.upgrade_status }}'
        zones: '{{ item.zones }}'
