# Discovery YAML — redis (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: redis
services:
  client: redis
  module: azure.mgmt.redis
discovery:
  # ── list ──
  - discovery_id: azure.redis.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        type: '{{ item.type }}'
        private_endpoint: '{{ item.private_endpoint }}'
        private_link_service_connection_state: '{{ item.private_link_service_connection_state }}'
    # required_params: ['cache_name']
  # ── list_by_redis_cache ──
  - discovery_id: azure.redis.list_by_redis_cache
    calls:
      - action: list_by_redis_cache
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        group_id: '{{ item.group_id }}'
        required_members: '{{ item.required_members }}'
        required_zone_names: '{{ item.required_zone_names }}'
    # required_params: ['cache_name']
  # ── list_by_redis_resource ──
  - discovery_id: azure.redis.list_by_redis_resource
    calls:
      - action: list_by_redis_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        schedule_entries: '{{ item.schedule_entries }}'
    # required_params: ['cache_name']
  # ── list_by_resource_group ──
  - discovery_id: azure.redis.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
