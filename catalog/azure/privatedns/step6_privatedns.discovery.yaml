# Discovery YAML — privatedns (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: privatedns
services:
  client: privatedns
  module: azure.mgmt.privatedns
discovery:
  # ── list ──
  - discovery_id: azure.privatedns.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        registration_enabled: '{{ item.registration_enabled }}'
        resolution_policy: '{{ item.resolution_policy }}'
        virtual_network: '{{ item.virtual_network }}'
        virtual_network_link_state: '{{ item.virtual_network_link_state }}'
    # required_params: ['private_zone_name']
  # ── list_by_resource_group ──
  - discovery_id: azure.privatedns.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        internal_id: '{{ item.internal_id }}'
        max_number_of_record_sets: '{{ item.max_number_of_record_sets }}'
        max_number_of_virtual_network_links: '{{ item.max_number_of_virtual_network_links }}'
        max_number_of_virtual_network_links_with_registration: '{{ item.max_number_of_virtual_network_links_with_registration }}'
        number_of_record_sets: '{{ item.number_of_record_sets }}'
        number_of_virtual_network_links: '{{ item.number_of_virtual_network_links }}'
        number_of_virtual_network_links_with_registration: '{{ item.number_of_virtual_network_links_with_registration }}'
  # ── Dependent ops ──
  # ── list_by_type [dependent] ──
  - discovery_id: azure.privatedns.list_by_type
    calls:
      - action: list_by_type
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        a_records: '{{ item.a_records }}'
        aaaa_records: '{{ item.aaaa_records }}'
        cname_record: '{{ item.cname_record }}'
        fqdn: '{{ item.fqdn }}'
        is_auto_registered: '{{ item.is_auto_registered }}'
        metadata: '{{ item.metadata }}'
        mx_records: '{{ item.mx_records }}'
        ptr_records: '{{ item.ptr_records }}'
        soa_record: '{{ item.soa_record }}'
        srv_records: '{{ item.srv_records }}'
        ttl: '{{ item.ttl }}'
        txt_records: '{{ item.txt_records }}'
    # required_params: ['private_zone_name', 'record_type']
