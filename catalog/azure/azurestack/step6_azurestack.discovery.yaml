# Discovery YAML — azurestack (Azure)
# Generated: 2026-02-21T05:02:43Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: azurestack
services:
  client: azurestack
  module: azure.mgmt.azurestack
discovery:
  # ── list_by_resource_group ──
  - discovery_id: azure.azurestack.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
    # required_params: ['resource_group']
  # ── list_by_subscription ──
  - discovery_id: azure.azurestack.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── Dependent ops ──
  # ── get_activation_key [dependent] ──
  - discovery_id: azure.azurestack.get_activation_key
    calls:
      - action: get_activation_key
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        activation_key: '{{ response.activation_key }}'
    # required_params: ['resource_group', 'registration_name']
  # ── get_product [dependent] ──
  - discovery_id: azure.azurestack.get_product
    calls:
      - action: get_product
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        type: '{{ response.type }}'
        billing_part_number: '{{ response.billing_part_number }}'
        compatibility: '{{ response.compatibility }}'
        description: '{{ response.description }}'
        display_name: '{{ response.display_name }}'
        gallery_item_identity: '{{ response.gallery_item_identity }}'
        icon_uris: '{{ response.icon_uris }}'
        legal_terms: '{{ response.legal_terms }}'
        links: '{{ response.links }}'
        offer: '{{ response.offer }}'
        offer_version: '{{ response.offer_version }}'
        payload_length: '{{ response.payload_length }}'
        privacy_policy: '{{ response.privacy_policy }}'
        product_kind: '{{ response.product_kind }}'
        product_properties: '{{ response.product_properties }}'
        publisher_display_name: '{{ response.publisher_display_name }}'
        publisher_identifier: '{{ response.publisher_identifier }}'
        sku: '{{ response.sku }}'
        system_data: '{{ response.system_data }}'
        vm_extension_type: '{{ response.vm_extension_type }}'
    # required_params: ['resource_group', 'registration_name', 'product_name']
  # ── get_products [dependent] ──
  - discovery_id: azure.azurestack.get_products
    calls:
      - action: get_products
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        type: '{{ response.type }}'
        billing_part_number: '{{ response.billing_part_number }}'
        compatibility: '{{ response.compatibility }}'
        description: '{{ response.description }}'
        display_name: '{{ response.display_name }}'
        gallery_item_identity: '{{ response.gallery_item_identity }}'
        icon_uris: '{{ response.icon_uris }}'
        legal_terms: '{{ response.legal_terms }}'
        links: '{{ response.links }}'
        offer: '{{ response.offer }}'
        offer_version: '{{ response.offer_version }}'
        payload_length: '{{ response.payload_length }}'
        privacy_policy: '{{ response.privacy_policy }}'
        product_kind: '{{ response.product_kind }}'
        product_properties: '{{ response.product_properties }}'
        publisher_display_name: '{{ response.publisher_display_name }}'
        publisher_identifier: '{{ response.publisher_identifier }}'
        sku: '{{ response.sku }}'
        system_data: '{{ response.system_data }}'
        vm_extension_type: '{{ response.vm_extension_type }}'
    # required_params: ['resource_group', 'registration_name', 'product_name']
  # ── list [dependent] ──
  - discovery_id: azure.azurestack.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
    # required_params: ['resource_group', 'registration_name']
  # ── list_details [dependent] ──
  - discovery_id: azure.azurestack.list_details
    calls:
      - action: list_details
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.gallery_package_blob_sas_uri }}'
      item:
        compute_role: '{{ item.compute_role }}'
        data_disk_images: '{{ item.data_disk_images }}'
        gallery_package_blob_sas_uri: '{{ item.gallery_package_blob_sas_uri }}'
        is_system_extension: '{{ item.is_system_extension }}'
        os_disk_image: '{{ item.os_disk_image }}'
        product_kind: '{{ item.product_kind }}'
        support_multiple_extensions: '{{ item.support_multiple_extensions }}'
        uri: '{{ item.uri }}'
        version: '{{ item.version }}'
        version_properties_version: '{{ item.version_properties_version }}'
        vm_os_type: '{{ item.vm_os_type }}'
        vm_scale_set_enabled: '{{ item.vm_scale_set_enabled }}'
    # required_params: ['resource_group', 'registration_name', 'product_name']
