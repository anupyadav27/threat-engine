  - discovery_id: azure.confluent.get_cluster_by_id
    calls:
      - action: get_cluster_by_id
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        status: '{{ response.status }}'
        kind: '{{ response.kind }}'
        metadata: '{{ response.metadata }}'
        spec: '{{ response.spec }}'
    # required_params: ['organization_name', 'environment_id', 'cluster_id']
