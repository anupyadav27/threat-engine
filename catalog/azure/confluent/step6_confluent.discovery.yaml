# Discovery YAML — confluent (Azure)
# Generated: 2026-02-21T05:02:43Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: confluent
services:
  client: confluent
  module: azure.mgmt.confluent
discovery:
  # ── list ──
  - discovery_id: azure.confluent.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        name: '{{ item.name }}'
        display: '{{ item.display }}'
        is_data_action: '{{ item.is_data_action }}'
  # ── list_by_resource_group ──
  - discovery_id: azure.confluent.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        created_time: '{{ item.created_time }}'
        link_organization: '{{ item.link_organization }}'
        offer_detail: '{{ item.offer_detail }}'
        organization_id: '{{ item.organization_id }}'
        sso_url: '{{ item.sso_url }}'
        system_data: '{{ item.system_data }}'
        user_detail: '{{ item.user_detail }}'
  # ── list_by_subscription ──
  - discovery_id: azure.confluent.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        created_time: '{{ item.created_time }}'
        link_organization: '{{ item.link_organization }}'
        offer_detail: '{{ item.offer_detail }}'
        organization_id: '{{ item.organization_id }}'
        sso_url: '{{ item.sso_url }}'
        system_data: '{{ item.system_data }}'
        user_detail: '{{ item.user_detail }}'
  # ── Dependent ops ──
  # ── get_cluster_api_key [dependent] ──
  - discovery_id: azure.confluent.get_cluster_api_key
    calls:
      - action: get_cluster_api_key
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        kind: '{{ response.kind }}'
        metadata: '{{ response.metadata }}'
        spec: '{{ response.spec }}'
    # required_params: ['organization_name', 'api_key_id']
