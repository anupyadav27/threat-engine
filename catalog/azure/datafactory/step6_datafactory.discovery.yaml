# Discovery YAML — datafactory (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: datafactory
services:
  client: datafactory
  module: azure.mgmt.datafactory
discovery:
  # ── list ──
  - discovery_id: azure.datafactory.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        name: '{{ item.name }}'
        display: '{{ item.display }}'
        origin: '{{ item.origin }}'
        service_specification: '{{ item.service_specification }}'
  # ── list_by_resource_group ──
  - discovery_id: azure.datafactory.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        encryption: '{{ item.encryption }}'
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        public_network_access: '{{ item.public_network_access }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        create_time: '{{ item.create_time }}'
        e_tag: '{{ item.e_tag }}'
        global_parameters: '{{ item.global_parameters }}'
        purview_configuration: '{{ item.purview_configuration }}'
        repo_configuration: '{{ item.repo_configuration }}'
        version: '{{ item.version }}'
  # ── Dependent ops ──
  # ── get_connection_info [dependent] ──
  - discovery_id: azure.datafactory.get_connection_info
    calls:
      - action: get_connection_info
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        host_service_uri: '{{ response.host_service_uri }}'
        identity_cert_thumbprint: '{{ response.identity_cert_thumbprint }}'
        is_identity_cert_exprired: '{{ response.is_identity_cert_exprired }}'
        public_key: '{{ response.public_key }}'
        service_token: '{{ response.service_token }}'
        version: '{{ response.version }}'
    # required_params: ['factory_name', 'integration_runtime_name']
  # ── get_data_plane_access [dependent] ──
  - discovery_id: azure.datafactory.get_data_plane_access
    calls:
      - action: get_data_plane_access
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        access_token: '{{ response.access_token }}'
        data_plane_url: '{{ response.data_plane_url }}'
        policy: '{{ response.policy }}'
    # required_params: ['factory_name', 'policy']
  # ── get_event_subscription_status [dependent] ──
  - discovery_id: azure.datafactory.get_event_subscription_status
    calls:
      - action: get_event_subscription_status
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        status: '{{ response.status }}'
        trigger_name: '{{ response.trigger_name }}'
    # required_params: ['factory_name', 'trigger_name']
  # ── get_feature_value [dependent] ──
  - discovery_id: azure.datafactory.get_feature_value
    calls:
      - action: get_feature_value
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        feature_name: '{{ response.feature_name }}'
        value: '{{ response.value }}'
    # required_params: ['location_id', 'exposure_control_request']
  # ── get_feature_value_by_factory [dependent] ──
  - discovery_id: azure.datafactory.get_feature_value_by_factory
    calls:
      - action: get_feature_value_by_factory
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        feature_name: '{{ response.feature_name }}'
        value: '{{ response.value }}'
    # required_params: ['factory_name', 'exposure_control_request']
  # ── get_git_hub_access_token [dependent] ──
  - discovery_id: azure.datafactory.get_git_hub_access_token
    calls:
      - action: get_git_hub_access_token
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        git_hub_access_token: '{{ response.git_hub_access_token }}'
    # required_params: ['factory_name', 'git_hub_access_token_request']
  # ── get_ip_address [dependent] ──
  - discovery_id: azure.datafactory.get_ip_address
    calls:
      - action: get_ip_address
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        ip_address: '{{ response.ip_address }}'
    # required_params: ['factory_name', 'integration_runtime_name', 'node_name']
  # ── get_monitoring_data [dependent] ──
  - discovery_id: azure.datafactory.get_monitoring_data
    calls:
      - action: get_monitoring_data
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        name: '{{ response.name }}'
        nodes: '{{ response.nodes }}'
    # required_params: ['factory_name', 'integration_runtime_name']
  # ── get_status [dependent] ──
  - discovery_id: azure.datafactory.get_status
    calls:
      - action: get_status
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        name: '{{ response.name }}'
        properties: '{{ response.properties }}'
    # required_params: ['factory_name', 'integration_runtime_name']
  # ── list_auth_keys [dependent] ──
  - discovery_id: azure.datafactory.list_auth_keys
    calls:
      - action: list_auth_keys
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.auth_key1 }}'
      item:
        auth_key1: '{{ item.auth_key1 }}'
        auth_key2: '{{ item.auth_key2 }}'
    # required_params: ['factory_name', 'integration_runtime_name']
  # ── list_by_factory [dependent] ──
  - discovery_id: azure.datafactory.list_by_factory
    calls:
      - action: list_by_factory
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
    # required_params: ['factory_name', 'managed_virtual_network_name']
  # ── list_outbound_network_dependencies_endpoints [dependent] ──
  - discovery_id: azure.datafactory.list_outbound_network_dependencies_endpoints
    calls:
      - action: list_outbound_network_dependencies_endpoints
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        category: '{{ item.category }}'
        endpoints: '{{ item.endpoints }}'
    # required_params: ['factory_name', 'integration_runtime_name']
