# Discovery YAML — dns (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: dns
services:
  client: dns
  module: azure.mgmt.dns
discovery:
  # ── list ──
  - discovery_id: azure.dns.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        max_number_of_record_sets: '{{ item.max_number_of_record_sets }}'
        max_number_of_records_per_record_set: '{{ item.max_number_of_records_per_record_set }}'
        name_servers: '{{ item.name_servers }}'
        number_of_record_sets: '{{ item.number_of_record_sets }}'
        registration_virtual_networks: '{{ item.registration_virtual_networks }}'
        resolution_virtual_networks: '{{ item.resolution_virtual_networks }}'
        zone_type: '{{ item.zone_type }}'
  # ── list_all_by_dns_zone ──
  - discovery_id: azure.dns.list_all_by_dns_zone
    calls:
      - action: list_all_by_dns_zone
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        type: '{{ item.type }}'
        a_records: '{{ item.a_records }}'
        aaaa_records: '{{ item.aaaa_records }}'
        caa_records: '{{ item.caa_records }}'
        cname_record: '{{ item.cname_record }}'
        fqdn: '{{ item.fqdn }}'
        metadata: '{{ item.metadata }}'
        mx_records: '{{ item.mx_records }}'
        ns_records: '{{ item.ns_records }}'
        ptr_records: '{{ item.ptr_records }}'
        soa_record: '{{ item.soa_record }}'
        srv_records: '{{ item.srv_records }}'
        target_resource: '{{ item.target_resource }}'
        ttl: '{{ item.ttl }}'
        txt_records: '{{ item.txt_records }}'
    # required_params: ['zone_name']
  # ── list_by_dns_zone ──
  - discovery_id: azure.dns.list_by_dns_zone
    calls:
      - action: list_by_dns_zone
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        type: '{{ item.type }}'
        a_records: '{{ item.a_records }}'
        aaaa_records: '{{ item.aaaa_records }}'
        caa_records: '{{ item.caa_records }}'
        cname_record: '{{ item.cname_record }}'
        fqdn: '{{ item.fqdn }}'
        metadata: '{{ item.metadata }}'
        mx_records: '{{ item.mx_records }}'
        ns_records: '{{ item.ns_records }}'
        ptr_records: '{{ item.ptr_records }}'
        soa_record: '{{ item.soa_record }}'
        srv_records: '{{ item.srv_records }}'
        target_resource: '{{ item.target_resource }}'
        ttl: '{{ item.ttl }}'
        txt_records: '{{ item.txt_records }}'
    # required_params: ['zone_name']
  # ── list_by_resource_group ──
  - discovery_id: azure.dns.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        max_number_of_record_sets: '{{ item.max_number_of_record_sets }}'
        max_number_of_records_per_record_set: '{{ item.max_number_of_records_per_record_set }}'
        name_servers: '{{ item.name_servers }}'
        number_of_record_sets: '{{ item.number_of_record_sets }}'
        registration_virtual_networks: '{{ item.registration_virtual_networks }}'
        resolution_virtual_networks: '{{ item.resolution_virtual_networks }}'
        zone_type: '{{ item.zone_type }}'
  # ── Dependent ops ──
  # ── get_by_target_resources [dependent] ──
  - discovery_id: azure.dns.get_by_target_resources
    calls:
      - action: get_by_target_resources
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        dns_resource_references: '{{ response.dns_resource_references }}'
    # required_params: ['parameters']
  # ── list_by_type [dependent] ──
  - discovery_id: azure.dns.list_by_type
    calls:
      - action: list_by_type
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        type: '{{ item.type }}'
        a_records: '{{ item.a_records }}'
        aaaa_records: '{{ item.aaaa_records }}'
        caa_records: '{{ item.caa_records }}'
        cname_record: '{{ item.cname_record }}'
        fqdn: '{{ item.fqdn }}'
        metadata: '{{ item.metadata }}'
        mx_records: '{{ item.mx_records }}'
        ns_records: '{{ item.ns_records }}'
        ptr_records: '{{ item.ptr_records }}'
        soa_record: '{{ item.soa_record }}'
        srv_records: '{{ item.srv_records }}'
        target_resource: '{{ item.target_resource }}'
        ttl: '{{ item.ttl }}'
        txt_records: '{{ item.txt_records }}'
    # required_params: ['zone_name', 'record_type']
