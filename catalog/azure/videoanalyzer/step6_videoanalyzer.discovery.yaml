# Discovery YAML — videoanalyzer (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: videoanalyzer
services:
  client: videoanalyzer
  module: azure.mgmt.videoanalyzer
discovery:
  # ── list ──
  - discovery_id: azure.videoanalyzer.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
    # required_params: ['account_name']
  # ── list_by_subscription ──
  - discovery_id: azure.videoanalyzer.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        encryption: '{{ item.encryption }}'
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        private_endpoint_connections: '{{ item.private_endpoint_connections }}'
        provisioning_state: '{{ item.provisioning_state }}'
        public_network_access: '{{ item.public_network_access }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        endpoints: '{{ item.endpoints }}'
        iot_hubs: '{{ item.iot_hubs }}'
        network_access_control: '{{ item.network_access_control }}'
        storage_accounts: '{{ item.storage_accounts }}'
        system_data: '{{ item.system_data }}'
  # ── Dependent ops ──
  # ── check_name_availability [dependent] ──
  - discovery_id: azure.videoanalyzer.check_name_availability
    calls:
      - action: check_name_availability
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        message: '{{ response.message }}'
        name_available: '{{ response.name_available }}'
        reason: '{{ response.reason }}'
    # required_params: ['location_name', 'parameters']
  # ── list_content_token [dependent] ──
  - discovery_id: azure.videoanalyzer.list_content_token
    calls:
      - action: list_content_token
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.expiration_date }}'
      item:
        expiration_date: '{{ item.expiration_date }}'
        token: '{{ item.token }}'
    # required_params: ['account_name', 'video_name']
  # ── list_provisioning_token [dependent] ──
  - discovery_id: azure.videoanalyzer.list_provisioning_token
    calls:
      - action: list_provisioning_token
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.expiration_date }}'
      item:
        expiration_date: '{{ item.expiration_date }}'
        token: '{{ item.token }}'
    # required_params: ['account_name', 'edge_module_name', 'parameters']
