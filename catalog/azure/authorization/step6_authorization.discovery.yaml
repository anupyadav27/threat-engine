# Discovery YAML — authorization (Azure)
# Generated: 2026-02-21T05:02:43Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: authorization
services:
  client: authorization
  module: azure.mgmt.authorization
discovery:
  # ── list ──
  - discovery_id: azure.authorization.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        assignable_scopes: '{{ item.assignable_scopes }}'
        description: '{{ item.description }}'
        permissions: '{{ item.permissions }}'
        role_name: '{{ item.role_name }}'
        role_type: '{{ item.role_type }}'
    # required_params: ['scope']
  # ── list_for_resource_group ──
  - discovery_id: azure.authorization.list_for_resource_group
    calls:
      - action: list_for_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        principal_id: '{{ item.principal_id }}'
        type: '{{ item.type }}'
        can_delegate: '{{ item.can_delegate }}'
        role_definition_id: '{{ item.role_definition_id }}'
        scope: '{{ item.scope }}'
  # ── list_for_scope ──
  - discovery_id: azure.authorization.list_for_scope
    calls:
      - action: list_for_scope
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        principal_id: '{{ item.principal_id }}'
        type: '{{ item.type }}'
        can_delegate: '{{ item.can_delegate }}'
        role_definition_id: '{{ item.role_definition_id }}'
        scope: '{{ item.scope }}'
    # required_params: ['scope']
  # ── Dependent ops ──
  # ── get_by_id [dependent] ──
  - discovery_id: azure.authorization.get_by_id
    calls:
      - action: get_by_id
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        type: '{{ response.type }}'
        assignable_scopes: '{{ response.assignable_scopes }}'
        description: '{{ response.description }}'
        permissions: '{{ response.permissions }}'
        role_name: '{{ response.role_name }}'
        role_type: '{{ response.role_type }}'
    # required_params: ['role_id']
  # ── list_for_resource [dependent] ──
  - discovery_id: azure.authorization.list_for_resource
    calls:
      - action: list_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        principal_id: '{{ item.principal_id }}'
        type: '{{ item.type }}'
        can_delegate: '{{ item.can_delegate }}'
        role_definition_id: '{{ item.role_definition_id }}'
        scope: '{{ item.scope }}'
    # required_params: ['resource_provider_namespace', 'parent_resource_path', 'resource_type', 'resource_name']
