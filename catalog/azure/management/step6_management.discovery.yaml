# Discovery YAML — management (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: management
services:
  client: management
  module: azure.mgmt.management
discovery:
  # ── Entities_List ──
  - discovery_id: azure.management.Entities_List
    calls:
      - action: Entities_List
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        etag: '{{ item.etag }}'
        kind: '{{ item.kind }}'
        plan: '{{ item.plan }}'
        properties: '{{ item.properties }}'
        sku: '{{ item.sku }}'
        zones: '{{ item.zones }}'
  # ── ManagementGroups_List ──
  - discovery_id: azure.management.ManagementGroups_List
    calls:
      - action: ManagementGroups_List
        save_as: response
