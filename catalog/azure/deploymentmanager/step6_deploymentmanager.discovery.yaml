# Discovery YAML — deploymentmanager (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: deploymentmanager
services:
  client: deploymentmanager
  module: azure.mgmt.deploymentmanager
discovery:
  # ── list [dependent] ──
  - discovery_id: azure.deploymentmanager.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        artifacts: '{{ item.artifacts }}'
        deployment_mode: '{{ item.deployment_mode }}'
        target_resource_group: '{{ item.target_resource_group }}'
    # required_params: ['service_topology_name', 'service_name']
