# Discovery YAML — certificateregistration (Azure)
# Generated: 2026-02-21T05:02:43Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: certificateregistration
services:
  client: certificateregistration
  module: azure.mgmt.certificateregistration
discovery:
  # ── AppServiceCertificateOrders_List ──
  - discovery_id: azure.certificateregistration.AppServiceCertificateOrders_List
    calls:
      - action: AppServiceCertificateOrders_List
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        etag: '{{ item.etag }}'
        kind: '{{ item.kind }}'
        plan: '{{ item.plan }}'
        properties: '{{ item.properties }}'
        sku: '{{ item.sku }}'
        zones: '{{ item.zones }}'
  # ── AppServiceCertificateOrders_ListByResourceGroup ──
  - discovery_id: azure.certificateregistration.AppServiceCertificateOrders_ListByResourceGroup
    calls:
      - action: AppServiceCertificateOrders_ListByResourceGroup
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        etag: '{{ item.etag }}'
        kind: '{{ item.kind }}'
        plan: '{{ item.plan }}'
        properties: '{{ item.properties }}'
        sku: '{{ item.sku }}'
        zones: '{{ item.zones }}'
  # ── Dependent ops ──
  # ── AppServiceCertificateOrders_Get [dependent] ──
  - discovery_id: azure.certificateregistration.AppServiceCertificateOrders_Get
    calls:
      - action: AppServiceCertificateOrders_Get
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        identity: '{{ response.identity }}'
        location: '{{ response.location }}'
        name: '{{ response.name }}'
        provisioning_state: '{{ response.provisioning_state }}'
        tags: '{{ response.tags }}'
        type: '{{ response.type }}'
        etag: '{{ response.etag }}'
        kind: '{{ response.kind }}'
        plan: '{{ response.plan }}'
        properties: '{{ response.properties }}'
        sku: '{{ response.sku }}'
        zones: '{{ response.zones }}'
