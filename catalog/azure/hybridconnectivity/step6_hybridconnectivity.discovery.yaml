# Discovery YAML — hybridconnectivity (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: hybridconnectivity
services:
  client: hybridconnectivity
  module: azure.mgmt.hybridconnectivity
discovery:
  # ── list ──
  - discovery_id: azure.hybridconnectivity.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        name: '{{ item.name }}'
        action_type: '{{ item.action_type }}'
        display: '{{ item.display }}'
        is_data_action: '{{ item.is_data_action }}'
        origin: '{{ item.origin }}'
  # ── Dependent ops ──
  # ── list_by_endpoint_resource [dependent] ──
  - discovery_id: azure.hybridconnectivity.list_by_endpoint_resource
    calls:
      - action: list_by_endpoint_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        type: '{{ item.type }}'
        port: '{{ item.port }}'
        resource_id: '{{ item.resource_id }}'
        service_name: '{{ item.service_name }}'
        system_data: '{{ item.system_data }}'
    # required_params: ['resource_uri', 'endpoint_name']
  # ── list_credentials [dependent] ──
  - discovery_id: azure.hybridconnectivity.list_credentials
    calls:
      - action: list_credentials
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.namespace_name }}'
      item:
        access_key: '{{ item.access_key }}'
        expires_on: '{{ item.expires_on }}'
        hybrid_connection_name: '{{ item.hybrid_connection_name }}'
        namespace_name: '{{ item.namespace_name }}'
        namespace_name_suffix: '{{ item.namespace_name_suffix }}'
        service_configuration_token: '{{ item.service_configuration_token }}'
    # required_params: ['resource_uri', 'endpoint_name']
  # ── list_ingress_gateway_credentials [dependent] ──
  - discovery_id: azure.hybridconnectivity.list_ingress_gateway_credentials
    calls:
      - action: list_ingress_gateway_credentials
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.hostname }}'
      item:
        access_key: '{{ item.access_key }}'
        expires_on: '{{ item.expires_on }}'
        hostname: '{{ item.hostname }}'
        hybrid_connection_name: '{{ item.hybrid_connection_name }}'
        namespace_name: '{{ item.namespace_name }}'
        namespace_name_suffix: '{{ item.namespace_name_suffix }}'
        server_id: '{{ item.server_id }}'
        service_configuration_token: '{{ item.service_configuration_token }}'
        tenant_id: '{{ item.tenant_id }}'
    # required_params: ['resource_uri', 'endpoint_name']
  # ── list_managed_proxy_details [dependent] ──
  - discovery_id: azure.hybridconnectivity.list_managed_proxy_details
    calls:
      - action: list_managed_proxy_details
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.proxy }}'
      item:
        expires_on: '{{ item.expires_on }}'
        proxy: '{{ item.proxy }}'
    # required_params: ['resource_uri', 'endpoint_name', 'managed_proxy_request']
