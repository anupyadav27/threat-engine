# Discovery YAML — devcenter (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: devcenter
services:
  client: devcenter
  module: azure.mgmt.devcenter
discovery:
  # ── list ──
  - discovery_id: azure.devcenter.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        status: '{{ item.status }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        creator_role_assignment: '{{ item.creator_role_assignment }}'
        deployment_target_id: '{{ item.deployment_target_id }}'
        display_name: '{{ item.display_name }}'
        environment_count: '{{ item.environment_count }}'
        system_data: '{{ item.system_data }}'
        user_role_assignments: '{{ item.user_role_assignments }}'
    # required_params: ['project_name']
