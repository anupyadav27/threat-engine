# Discovery YAML — managednetworkfabric (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: managednetworkfabric
services:
  client: managednetworkfabric
  module: azure.mgmt.managednetworkfabric
discovery:
  # ── list ──
  - discovery_id: azure.managednetworkfabric.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        name: '{{ item.name }}'
        action_type: '{{ item.action_type }}'
        display: '{{ item.display }}'
        is_data_action: '{{ item.is_data_action }}'
        origin: '{{ item.origin }}'
  # ── list_by_l3_isolation_domain ──
  - discovery_id: azure.managednetworkfabric.list_by_l3_isolation_domain
    calls:
      - action: list_by_l3_isolation_domain
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        type: '{{ item.type }}'
        administrative_state: '{{ item.administrative_state }}'
        annotation: '{{ item.annotation }}'
        bgp_configuration: '{{ item.bgp_configuration }}'
        configuration_state: '{{ item.configuration_state }}'
        connected_i_pv4_subnets: '{{ item.connected_i_pv4_subnets }}'
