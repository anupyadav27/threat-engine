# Discovery YAML — extendedlocation (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: extendedlocation
services:
  client: extendedlocation
  module: azure.mgmt.extendedlocation
discovery:
  # ── list_by_resource_group ──
  - discovery_id: azure.extendedlocation.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        authentication: '{{ item.authentication }}'
        cluster_extension_ids: '{{ item.cluster_extension_ids }}'
        display_name: '{{ item.display_name }}'
        host_resource_id: '{{ item.host_resource_id }}'
        host_type: '{{ item.host_type }}'
        namespace: '{{ item.namespace }}'
        system_data: '{{ item.system_data }}'
  # ── list_by_subscription ──
  - discovery_id: azure.extendedlocation.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        authentication: '{{ item.authentication }}'
        cluster_extension_ids: '{{ item.cluster_extension_ids }}'
        display_name: '{{ item.display_name }}'
        host_resource_id: '{{ item.host_resource_id }}'
        host_type: '{{ item.host_type }}'
        namespace: '{{ item.namespace }}'
        system_data: '{{ item.system_data }}'
  # ── list_enabled_resource_types ──
  - discovery_id: azure.extendedlocation.list_enabled_resource_types
    calls:
      - action: list_enabled_resource_types
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        cluster_extension_id: '{{ item.cluster_extension_id }}'
        extension_type: '{{ item.extension_type }}'
        system_data: '{{ item.system_data }}'
        types_metadata: '{{ item.types_metadata }}'
    # required_params: ['resource_name']
  # ── list_operations ──
  - discovery_id: azure.extendedlocation.list_operations
    calls:
      - action: list_operations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        name: '{{ item.name }}'
        description: '{{ item.description }}'
        is_data_action: '{{ item.is_data_action }}'
        operation: '{{ item.operation }}'
        origin: '{{ item.origin }}'
        provider: '{{ item.provider }}'
        resource: '{{ item.resource }}'
