# Discovery YAML — network (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: network
services:
  client: network
  module: azure.mgmt.network
discovery:
  # ── list_all ──
  - discovery_id: azure.network.list_all
    calls:
      - action: list_all
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        application_gateway_for_containers: '{{ item.application_gateway_for_containers }}'
        application_gateways: '{{ item.application_gateways }}'
        custom_rules: '{{ item.custom_rules }}'
        http_listeners: '{{ item.http_listeners }}'
        managed_rules: '{{ item.managed_rules }}'
        path_based_rules: '{{ item.path_based_rules }}'
        policy_settings: '{{ item.policy_settings }}'
        resource_state: '{{ item.resource_state }}'
  # ── list_auto_approved_private_link_services ──
  - discovery_id: azure.network.list_auto_approved_private_link_services
    calls:
      - action: list_auto_approved_private_link_services
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        private_link_service: '{{ item.private_link_service }}'
    # required_params: ['location']
  # ── list_auto_approved_private_link_services_by_resource_group ──
