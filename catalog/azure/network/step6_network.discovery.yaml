    calls:
      - action: list_auto_approved_private_link_services_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        private_link_service: '{{ item.private_link_service }}'
    # required_params: ['location']
  # ── list_available_request_headers ──
