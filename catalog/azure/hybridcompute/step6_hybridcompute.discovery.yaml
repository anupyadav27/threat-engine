# Discovery YAML — hybridcompute (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: hybridcompute
services:
  client: hybridcompute
  module: azure.mgmt.hybridcompute
discovery:
  # ── list_by_private_link_scope ──
  - discovery_id: azure.hybridcompute.list_by_private_link_scope
    calls:
      - action: list_by_private_link_scope
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        system_data: '{{ item.system_data }}'
    # required_params: ['scope_name']
  # ── list_by_resource_group ──
  - discovery_id: azure.hybridcompute.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        system_data: '{{ item.system_data }}'
  # ── list_by_subscription ──
  - discovery_id: azure.hybridcompute.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        status: '{{ item.status }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        ad_fqdn: '{{ item.ad_fqdn }}'
        agent_configuration: '{{ item.agent_configuration }}'
        agent_upgrade: '{{ item.agent_upgrade }}'
        agent_version: '{{ item.agent_version }}'
        client_public_key: '{{ item.client_public_key }}'
        cloud_metadata: '{{ item.cloud_metadata }}'
        detected_properties: '{{ item.detected_properties }}'
        display_name: '{{ item.display_name }}'
        dns_fqdn: '{{ item.dns_fqdn }}'
        domain_name: '{{ item.domain_name }}'
        error_details: '{{ item.error_details }}'
        extensions: '{{ item.extensions }}'
        kind: '{{ item.kind }}'
        last_status_change: '{{ item.last_status_change }}'
        license_profile: '{{ item.license_profile }}'
        location_data: '{{ item.location_data }}'
        machine_fqdn: '{{ item.machine_fqdn }}'
        mssql_discovered: '{{ item.mssql_discovered }}'
        network_profile: '{{ item.network_profile }}'
        os_edition: '{{ item.os_edition }}'
        os_name: '{{ item.os_name }}'
        os_profile: '{{ item.os_profile }}'
        os_sku: '{{ item.os_sku }}'
        os_type: '{{ item.os_type }}'
        os_version: '{{ item.os_version }}'
        parent_cluster_resource_id: '{{ item.parent_cluster_resource_id }}'
        private_link_scope_resource_id: '{{ item.private_link_scope_resource_id }}'
        resources: '{{ item.resources }}'
        service_statuses: '{{ item.service_statuses }}'
        system_data: '{{ item.system_data }}'
        vm_id: '{{ item.vm_id }}'
        vm_uuid: '{{ item.vm_uuid }}'
  # ── Dependent ops ──
  # ── get_by_private_link_scope [dependent] ──
  - discovery_id: azure.hybridcompute.get_by_private_link_scope
    calls:
      - action: get_by_private_link_scope
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        provisioning_state: '{{ response.provisioning_state }}'
        type: '{{ response.type }}'
        network_security_perimeter: '{{ response.network_security_perimeter }}'
        profile: '{{ response.profile }}'
        provisioning_issues: '{{ response.provisioning_issues }}'
        resource_association: '{{ response.resource_association }}'
    # required_params: ['scope_name', 'perimeter_name']
  # ── get_validation_details [dependent] ──
  - discovery_id: azure.hybridcompute.get_validation_details
    calls:
      - action: get_validation_details
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        public_network_access: '{{ response.public_network_access }}'
        connection_details: '{{ response.connection_details }}'
    # required_params: ['location', 'private_link_scope_id']
  # ── get_validation_details_for_machine [dependent] ──
  - discovery_id: azure.hybridcompute.get_validation_details_for_machine
    calls:
      - action: get_validation_details_for_machine
        save_as: response
        on_error: continue
    emit:
