      item:
        id: '{{ response.id }}'
        public_network_access: '{{ response.public_network_access }}'
        connection_details: '{{ response.connection_details }}'
    # required_params: ['machine_name']
  # ── list [dependent] ──
  - discovery_id: azure.hybridcompute.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        extension_type: '{{ item.extension_type }}'
        publisher: '{{ item.publisher }}'
        system_data: '{{ item.system_data }}'
        version: '{{ item.version }}'
    # required_params: ['location', 'publisher', 'extension_type']
