# Discovery YAML — logz (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: logz
services:
  client: logz
  module: azure.mgmt.logz
discovery:
  # ── list_by_resource_group ──
  - discovery_id: azure.logz.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        system_data: '{{ item.system_data }}'
  # ── list_by_subscription ──
  - discovery_id: azure.logz.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        system_data: '{{ item.system_data }}'
  # ── list_user_roles ──
  - discovery_id: azure.logz.list_user_roles
    calls:
      - action: list_user_roles
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        role: '{{ item.role }}'
    # required_params: ['monitor_name']
  # ── Dependent ops ──
  # ── list [dependent] ──
  - discovery_id: azure.logz.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        system_data: '{{ item.system_data }}'
    # required_params: ['monitor_name', 'sub_account_name']
  # ── list_monitored_resources [dependent] ──
  - discovery_id: azure.logz.list_monitored_resources
    calls:
      - action: list_monitored_resources
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        reason_for_logs_status: '{{ item.reason_for_logs_status }}'
        reason_for_metrics_status: '{{ item.reason_for_metrics_status }}'
        sending_logs: '{{ item.sending_logs }}'
        sending_metrics: '{{ item.sending_metrics }}'
        system_data: '{{ item.system_data }}'
    # required_params: ['monitor_name', 'sub_account_name']
  # ── list_vm_host_update [dependent] ──
  - discovery_id: azure.logz.list_vm_host_update
    calls:
      - action: list_vm_host_update
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        agent_version: '{{ item.agent_version }}'
    # required_params: ['monitor_name', 'sub_account_name']
  # ── list_vm_hosts [dependent] ──
  - discovery_id: azure.logz.list_vm_hosts
    calls:
      - action: list_vm_hosts
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        agent_version: '{{ item.agent_version }}'
    # required_params: ['monitor_name', 'sub_account_name']
