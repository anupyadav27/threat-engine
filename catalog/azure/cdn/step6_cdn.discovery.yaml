# Discovery YAML — cdn (Azure)
# Generated: 2026-02-21T05:02:43Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: cdn
services:
  client: cdn
  module: azure.mgmt.cdn
discovery:
  # ── list ──
  - discovery_id: azure.cdn.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        current_value: '{{ item.current_value }}'
        limit: '{{ item.limit }}'
        resource_type: '{{ item.resource_type }}'
        unit: '{{ item.unit }}'
  # ── list_by_profile ──
  - discovery_id: azure.cdn.list_by_profile
    calls:
      - action: list_by_profile
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        type: '{{ item.type }}'
        deployment_status: '{{ item.deployment_status }}'
        parameters: '{{ item.parameters }}'
        profile_name: '{{ item.profile_name }}'
        system_data: '{{ item.system_data }}'
    # required_params: ['profile_name']
  # ── list_by_resource_group ──
  - discovery_id: azure.cdn.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        extended_properties: '{{ item.extended_properties }}'
        front_door_id: '{{ item.front_door_id }}'
        kind: '{{ item.kind }}'
        log_scrubbing: '{{ item.log_scrubbing }}'
        origin_response_timeout_seconds: '{{ item.origin_response_timeout_seconds }}'
        resource_state: '{{ item.resource_state }}'
        sku: '{{ item.sku }}'
        system_data: '{{ item.system_data }}'
  # ── list_supported_optimization_types ──
  - discovery_id: azure.cdn.list_supported_optimization_types
    calls:
      - action: list_supported_optimization_types
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.supported_optimization_types }}'
      item:
        supported_optimization_types: '{{ item.supported_optimization_types }}'
    # required_params: ['profile_name']
  # ── Dependent ops ──
  # ── check_name_availability [dependent] ──
  - discovery_id: azure.cdn.check_name_availability
    calls:
      - action: check_name_availability
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        message: '{{ response.message }}'
        name_available: '{{ response.name_available }}'
        reason: '{{ response.reason }}'
    # required_params: ['check_name_availability_input']
  # ── get_log_analytics_locations [dependent] ──
  - discovery_id: azure.cdn.get_log_analytics_locations
    calls:
      - action: get_log_analytics_locations
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        continents: '{{ response.continents }}'
        country_or_regions: '{{ response.country_or_regions }}'
    # required_params: ['profile_name']
  # ── get_log_analytics_metrics [dependent] ──
  - discovery_id: azure.cdn.get_log_analytics_metrics
    calls:
      - action: get_log_analytics_metrics
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        date_time_begin: '{{ response.date_time_begin }}'
        date_time_end: '{{ response.date_time_end }}'
        granularity: '{{ response.granularity }}'
        series: '{{ response.series }}'
    # required_params: ['profile_name', 'metrics', 'date_time_begin', 'date_time_end', 'granularity', 'custom_domains', 'protocols']
  # ── get_log_analytics_rankings [dependent] ──
  - discovery_id: azure.cdn.get_log_analytics_rankings
    calls:
      - action: get_log_analytics_rankings
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        date_time_begin: '{{ response.date_time_begin }}'
        date_time_end: '{{ response.date_time_end }}'
        tables: '{{ response.tables }}'
    # required_params: ['profile_name', 'rankings', 'metrics', 'max_ranking', 'date_time_begin', 'date_time_end']
  # ── get_log_analytics_resources [dependent] ──
  - discovery_id: azure.cdn.get_log_analytics_resources
    calls:
      - action: get_log_analytics_resources
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        custom_domains: '{{ response.custom_domains }}'
        endpoints: '{{ response.endpoints }}'
    # required_params: ['profile_name']
  # ── get_waf_log_analytics_metrics [dependent] ──
  - discovery_id: azure.cdn.get_waf_log_analytics_metrics
    calls:
      - action: get_waf_log_analytics_metrics
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        date_time_begin: '{{ response.date_time_begin }}'
        date_time_end: '{{ response.date_time_end }}'
        granularity: '{{ response.granularity }}'
        series: '{{ response.series }}'
    # required_params: ['profile_name', 'metrics', 'date_time_begin', 'date_time_end', 'granularity']
  # ── get_waf_log_analytics_rankings [dependent] ──
  - discovery_id: azure.cdn.get_waf_log_analytics_rankings
    calls:
      - action: get_waf_log_analytics_rankings
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        group_values: '{{ response.group_values }}'
        metrics: '{{ response.metrics }}'
    # required_params: ['profile_name', 'metrics', 'date_time_begin', 'date_time_end', 'max_ranking', 'rankings']
  # ── list_by_endpoint [dependent] ──
  - discovery_id: azure.cdn.list_by_endpoint
    calls:
      - action: list_by_endpoint
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        type: '{{ item.type }}'
        cache_configuration: '{{ item.cache_configuration }}'
        custom_domains: '{{ item.custom_domains }}'
        deployment_status: '{{ item.deployment_status }}'
        enabled_state: '{{ item.enabled_state }}'
        endpoint_name: '{{ item.endpoint_name }}'
        forwarding_protocol: '{{ item.forwarding_protocol }}'
        https_redirect: '{{ item.https_redirect }}'
        link_to_default_domain: '{{ item.link_to_default_domain }}'
        origin_group: '{{ item.origin_group }}'
        origin_path: '{{ item.origin_path }}'
        patterns_to_match: '{{ item.patterns_to_match }}'
        rule_sets: '{{ item.rule_sets }}'
        supported_protocols: '{{ item.supported_protocols }}'
        system_data: '{{ item.system_data }}'
    # required_params: ['profile_name', 'endpoint_name']
  # ── list_by_origin_group [dependent] ──
  - discovery_id: azure.cdn.list_by_origin_group
    calls:
      - action: list_by_origin_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        type: '{{ item.type }}'
        azure_origin: '{{ item.azure_origin }}'
        deployment_status: '{{ item.deployment_status }}'
        enabled_state: '{{ item.enabled_state }}'
        enforce_certificate_name_check: '{{ item.enforce_certificate_name_check }}'
        host_name: '{{ item.host_name }}'
        http_port: '{{ item.http_port }}'
        https_port: '{{ item.https_port }}'
        origin_group_name: '{{ item.origin_group_name }}'
        origin_host_header: '{{ item.origin_host_header }}'
        priority: '{{ item.priority }}'
        shared_private_link_resource: '{{ item.shared_private_link_resource }}'
        system_data: '{{ item.system_data }}'
        weight: '{{ item.weight }}'
    # required_params: ['profile_name', 'origin_group_name']
  # ── list_by_rule_set [dependent] ──
  - discovery_id: azure.cdn.list_by_rule_set
    calls:
      - action: list_by_rule_set
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        type: '{{ item.type }}'
        actions: '{{ item.actions }}'
        conditions: '{{ item.conditions }}'
        deployment_status: '{{ item.deployment_status }}'
        match_processing_behavior: '{{ item.match_processing_behavior }}'
        order: '{{ item.order }}'
        rule_set_name: '{{ item.rule_set_name }}'
        system_data: '{{ item.system_data }}'
    # required_params: ['profile_name', 'rule_set_name']
  # ── list_resource_usage [dependent] ──
  - discovery_id: azure.cdn.list_resource_usage
    calls:
      - action: list_resource_usage
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        current_value: '{{ item.current_value }}'
        limit: '{{ item.limit }}'
        unit: '{{ item.unit }}'
    # required_params: ['profile_name', 'rule_set_name']
