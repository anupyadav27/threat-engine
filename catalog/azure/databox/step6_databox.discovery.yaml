# Discovery YAML — databox (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: databox
services:
  client: databox
  module: azure.mgmt.databox
discovery:
  # ── list ──
  - discovery_id: azure.databox.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        name: '{{ item.name }}'
        display: '{{ item.display }}'
        is_data_action: '{{ item.is_data_action }}'
        origin: '{{ item.origin }}'
        properties: '{{ item.properties }}'
  # ── list_by_resource_group ──
  - discovery_id: azure.databox.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        all_devices_lost: '{{ item.all_devices_lost }}'
        cancellation_reason: '{{ item.cancellation_reason }}'
        delayed_stage: '{{ item.delayed_stage }}'
        delivery_info: '{{ item.delivery_info }}'
        delivery_type: '{{ item.delivery_type }}'
        details: '{{ item.details }}'
        error: '{{ item.error }}'
        is_cancellable: '{{ item.is_cancellable }}'
        is_cancellable_without_fee: '{{ item.is_cancellable_without_fee }}'
        is_deletable: '{{ item.is_deletable }}'
        is_prepare_to_ship_enabled: '{{ item.is_prepare_to_ship_enabled }}'
        is_shipping_address_editable: '{{ item.is_shipping_address_editable }}'
        reverse_shipping_details_update: '{{ item.reverse_shipping_details_update }}'
        reverse_transport_preference_update: '{{ item.reverse_transport_preference_update }}'
        sku: '{{ item.sku }}'
        start_time: '{{ item.start_time }}'
        system_data: '{{ item.system_data }}'
        transfer_type: '{{ item.transfer_type }}'
  # ── list_credentials ──
  - discovery_id: azure.databox.list_credentials
    calls:
      - action: list_credentials
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        job_name: '{{ item.job_name }}'
        job_secrets: '{{ item.job_secrets }}'
    # required_params: ['job_name']
  # ── Dependent ops ──
  # ── list_available_skus_by_resource_group [dependent] ──
  - discovery_id: azure.databox.list_available_skus_by_resource_group
    calls:
      - action: list_available_skus_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        api_versions: '{{ item.api_versions }}'
        capacity: '{{ item.capacity }}'
        costs: '{{ item.costs }}'
        countries_within_commerce_boundary: '{{ item.countries_within_commerce_boundary }}'
        data_location_to_service_location_map: '{{ item.data_location_to_service_location_map }}'
        disabled_reason: '{{ item.disabled_reason }}'
        disabled_reason_message: '{{ item.disabled_reason_message }}'
        enabled: '{{ item.enabled }}'
        required_feature: '{{ item.required_feature }}'
        sku: '{{ item.sku }}'
    # required_params: ['location', 'available_sku_request']
