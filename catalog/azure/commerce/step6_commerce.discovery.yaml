# Discovery YAML — commerce (Azure)
# Generated: 2026-02-21T05:02:43Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: commerce
services:
  client: commerce
  module: azure.mgmt.commerce
discovery:
  # ── list [dependent] ──
  - discovery_id: azure.commerce.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
    # required_params: ['reported_start_time', 'reported_end_time']
