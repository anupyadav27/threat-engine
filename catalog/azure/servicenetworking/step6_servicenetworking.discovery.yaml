# Discovery YAML — servicenetworking (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: servicenetworking
services:
  client: servicenetworking
  module: azure.mgmt.servicenetworking
discovery:
  # ── list ──
  - discovery_id: azure.servicenetworking.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        name: '{{ item.name }}'
        action_type: '{{ item.action_type }}'
        display: '{{ item.display }}'
        is_data_action: '{{ item.is_data_action }}'
        origin: '{{ item.origin }}'
  # ── list_by_resource_group ──
  - discovery_id: azure.servicenetworking.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        properties: '{{ item.properties }}'
  # ── list_by_subscription ──
  - discovery_id: azure.servicenetworking.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        properties: '{{ item.properties }}'
  # ── list_by_traffic_controller ──
  - discovery_id: azure.servicenetworking.list_by_traffic_controller
    calls:
      - action: list_by_traffic_controller
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        properties: '{{ item.properties }}'
