# Discovery YAML — containerregistry (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: containerregistry
services:
  client: containerregistry
  module: azure.mgmt.containerregistry
discovery:
  # ── list ──
  - discovery_id: azure.containerregistry.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        status: '{{ item.status }}'
        type: '{{ item.type }}'
        creation_date: '{{ item.creation_date }}'
        credentials: '{{ item.credentials }}'
        scope_map_id: '{{ item.scope_map_id }}'
        system_data: '{{ item.system_data }}'
    # required_params: ['registry_name']
