# Discovery YAML — databricks (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: databricks
services:
  client: databricks
  module: azure.mgmt.databricks
discovery:
  # ── list ──
  - discovery_id: azure.databricks.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
    # required_params: ['workspace_name']
  # ── list_by_resource_group ──
  - discovery_id: azure.databricks.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        encryption: '{{ item.encryption }}'
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        private_endpoint_connections: '{{ item.private_endpoint_connections }}'
        provisioning_state: '{{ item.provisioning_state }}'
        public_network_access: '{{ item.public_network_access }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        authorizations: '{{ item.authorizations }}'
        created_by: '{{ item.created_by }}'
        created_date_time: '{{ item.created_date_time }}'
        disk_encryption_set_id: '{{ item.disk_encryption_set_id }}'
        managed_disk_identity: '{{ item.managed_disk_identity }}'
        managed_resource_group_id: '{{ item.managed_resource_group_id }}'
        parameters: '{{ item.parameters }}'
        required_nsg_rules: '{{ item.required_nsg_rules }}'
        sku: '{{ item.sku }}'
        storage_account_identity: '{{ item.storage_account_identity }}'
        system_data: '{{ item.system_data }}'
        ui_definition_uri: '{{ item.ui_definition_uri }}'
        updated_by: '{{ item.updated_by }}'
        workspace_id: '{{ item.workspace_id }}'
        workspace_url: '{{ item.workspace_url }}'
  # ── list_by_subscription ──
  - discovery_id: azure.databricks.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        encryption: '{{ item.encryption }}'
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        private_endpoint_connections: '{{ item.private_endpoint_connections }}'
        provisioning_state: '{{ item.provisioning_state }}'
        public_network_access: '{{ item.public_network_access }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        authorizations: '{{ item.authorizations }}'
        created_by: '{{ item.created_by }}'
        created_date_time: '{{ item.created_date_time }}'
        disk_encryption_set_id: '{{ item.disk_encryption_set_id }}'
        managed_disk_identity: '{{ item.managed_disk_identity }}'
        managed_resource_group_id: '{{ item.managed_resource_group_id }}'
        parameters: '{{ item.parameters }}'
        required_nsg_rules: '{{ item.required_nsg_rules }}'
        sku: '{{ item.sku }}'
        storage_account_identity: '{{ item.storage_account_identity }}'
        system_data: '{{ item.system_data }}'
        ui_definition_uri: '{{ item.ui_definition_uri }}'
        updated_by: '{{ item.updated_by }}'
        workspace_id: '{{ item.workspace_id }}'
        workspace_url: '{{ item.workspace_url }}'
  # ── list_by_workspace ──
  - discovery_id: azure.databricks.list_by_workspace
    calls:
      - action: list_by_workspace
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        type: '{{ item.type }}'
        allow_forwarded_traffic: '{{ item.allow_forwarded_traffic }}'
        allow_gateway_transit: '{{ item.allow_gateway_transit }}'
        allow_virtual_network_access: '{{ item.allow_virtual_network_access }}'
        databricks_address_space: '{{ item.databricks_address_space }}'
        databricks_virtual_network: '{{ item.databricks_virtual_network }}'
        peering_state: '{{ item.peering_state }}'
        remote_address_space: '{{ item.remote_address_space }}'
        remote_virtual_network: '{{ item.remote_virtual_network }}'
        use_remote_gateways: '{{ item.use_remote_gateways }}'
    # required_params: ['workspace_name']
