# Discovery YAML — keyvault (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: keyvault
services:
  client: keyvault
  module: azure.mgmt.keyvault
discovery:
  # ── list ──
  - discovery_id: azure.keyvault.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        location: '{{ item.location }}'
        tags: '{{ item.tags }}'
  # ── list_by_mhsm_resource ──
  - discovery_id: azure.keyvault.list_by_mhsm_resource
    calls:
      - action: list_by_mhsm_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
    # required_params: ['name']
  # ── list_by_resource ──
  - discovery_id: azure.keyvault.list_by_resource
    calls:
      - action: list_by_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        location: '{{ item.location }}'
        tags: '{{ item.tags }}'
        properties: '{{ item.properties }}'
    # required_params: ['vault_name']
  # ── list_by_resource_group ──
  - discovery_id: azure.keyvault.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        location: '{{ item.location }}'
        tags: '{{ item.tags }}'
        properties: '{{ item.properties }}'
  # ── list_by_subscription ──
  - discovery_id: azure.keyvault.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        location: '{{ item.location }}'
        tags: '{{ item.tags }}'
        properties: '{{ item.properties }}'
  # ── list_by_vault ──
  - discovery_id: azure.keyvault.list_by_vault
    calls:
      - action: list_by_vault
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
    # required_params: ['vault_name']
  # ── list_deleted ──
  - discovery_id: azure.keyvault.list_deleted
    calls:
      - action: list_deleted
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        properties: '{{ item.properties }}'
  # ── Dependent ops ──
  # ── check_name_availability [dependent] ──
  - discovery_id: azure.keyvault.check_name_availability
    calls:
      - action: check_name_availability
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        message: '{{ response.message }}'
        name_available: '{{ response.name_available }}'
        reason: '{{ response.reason }}'
    # required_params: ['vault_name']
  # ── get_deleted [dependent] ──
  - discovery_id: azure.keyvault.get_deleted
    calls:
      - action: get_deleted
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        properties: '{{ response.properties }}'
    # required_params: ['vault_name', 'location']
  # ── get_version [dependent] ──
  - discovery_id: azure.keyvault.get_version
    calls:
      - action: get_version
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        tags: '{{ response.tags }}'
        properties: '{{ response.properties }}'
    # required_params: ['name', 'key_name', 'key_version']
  # ── list_versions [dependent] ──
  - discovery_id: azure.keyvault.list_versions
    calls:
      - action: list_versions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        tags: '{{ item.tags }}'
        properties: '{{ item.properties }}'
    # required_params: ['name', 'key_name']
