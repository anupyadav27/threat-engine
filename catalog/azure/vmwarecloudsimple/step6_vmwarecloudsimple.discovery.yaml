# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: vmwarecloudsimple
services:
  client: vmwarecloudsimple
  module: azure.mgmt.vmwarecloudsimple
discovery:
  # ── list_by_resource_group ──
  - discovery_id: azure.vmwarecloudsimple.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        status: '{{ item.status }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        amount_of_ram: '{{ item.amount_of_ram }}'
        controllers: '{{ item.controllers }}'
        customization: '{{ item.customization }}'
        disks: '{{ item.disks }}'
        dnsname: '{{ item.dnsname }}'
        expose_to_guest_vm: '{{ item.expose_to_guest_vm }}'
        folder: '{{ item.folder }}'
        guest_os: '{{ item.guest_os }}'
        guest_os_type: '{{ item.guest_os_type }}'
        nics: '{{ item.nics }}'
        number_of_cores: '{{ item.number_of_cores }}'
        password: '{{ item.password }}'
        private_cloud_id: '{{ item.private_cloud_id }}'
        public_ip: '{{ item.public_ip }}'
        resource_pool: '{{ item.resource_pool }}'
        template_id: '{{ item.template_id }}'
