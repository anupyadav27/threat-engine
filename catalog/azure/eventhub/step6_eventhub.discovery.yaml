# Discovery YAML — eventhub (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: eventhub
services:
  client: eventhub
  module: azure.mgmt.eventhub
discovery:
  # ── list ──
  - discovery_id: azure.eventhub.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        type: '{{ item.type }}'
        private_endpoint: '{{ item.private_endpoint }}'
        private_link_service_connection_state: '{{ item.private_link_service_connection_state }}'
    # required_params: ['namespace_name']
  # ── list_available_cluster_region ──
  - discovery_id: azure.eventhub.list_available_cluster_region
    calls:
      - action: list_available_cluster_region
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        location: '{{ item.location }}'
  # ── list_by_namespace ──
  - discovery_id: azure.eventhub.list_by_namespace
    calls:
      - action: list_by_namespace
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        type: '{{ item.type }}'
        capture_description: '{{ item.capture_description }}'
        created_at: '{{ item.created_at }}'
        message_retention_in_days: '{{ item.message_retention_in_days }}'
        partition_count: '{{ item.partition_count }}'
        partition_ids: '{{ item.partition_ids }}'
        updated_at: '{{ item.updated_at }}'
    # required_params: ['namespace_name']
  # ── list_by_resource_group ──
  - discovery_id: azure.eventhub.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        encryption: '{{ item.encryption }}'
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        status: '{{ item.status }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        zone_redundant: '{{ item.zone_redundant }}'
        cluster_arm_id: '{{ item.cluster_arm_id }}'
        created_at: '{{ item.created_at }}'
        is_auto_inflate_enabled: '{{ item.is_auto_inflate_enabled }}'
        kafka_enabled: '{{ item.kafka_enabled }}'
        maximum_throughput_units: '{{ item.maximum_throughput_units }}'
        metric_id: '{{ item.metric_id }}'
        service_bus_endpoint: '{{ item.service_bus_endpoint }}'
        sku: '{{ item.sku }}'
        updated_at: '{{ item.updated_at }}'
  # ── list_by_sku ──
  - discovery_id: azure.eventhub.list_by_sku
    calls:
      - action: list_by_sku
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
    # required_params: ['sku']
  # ── list_ip_filter_rules ──
  - discovery_id: azure.eventhub.list_ip_filter_rules
    calls:
      - action: list_ip_filter_rules
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        action: '{{ item.action }}'
        filter_name: '{{ item.filter_name }}'
        ip_mask: '{{ item.ip_mask }}'
    # required_params: ['namespace_name']
  # ── list_namespaces ──
  - discovery_id: azure.eventhub.list_namespaces
    calls:
      - action: list_namespaces
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
    # required_params: ['cluster_name']
  # ── list_virtual_network_rules ──
  - discovery_id: azure.eventhub.list_virtual_network_rules
    calls:
      - action: list_virtual_network_rules
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        virtual_network_subnet_id: '{{ item.virtual_network_subnet_id }}'
    # required_params: ['namespace_name']
  # ── Dependent ops ──
  # ── check_name_availability [dependent] ──
  - discovery_id: azure.eventhub.check_name_availability
    calls:
      - action: check_name_availability
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        message: '{{ response.message }}'
        name_available: '{{ response.name_available }}'
        reason: '{{ response.reason }}'
    # required_params: ['parameters']
  # ── get_authorization_rule [dependent] ──
  - discovery_id: azure.eventhub.get_authorization_rule
    calls:
      - action: get_authorization_rule
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        type: '{{ response.type }}'
        rights: '{{ response.rights }}'
    # required_params: ['namespace_name', 'authorization_rule_name']
  # ── get_ip_filter_rule [dependent] ──
  - discovery_id: azure.eventhub.get_ip_filter_rule
    calls:
      - action: get_ip_filter_rule
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        type: '{{ response.type }}'
        action: '{{ response.action }}'
        filter_name: '{{ response.filter_name }}'
        ip_mask: '{{ response.ip_mask }}'
    # required_params: ['namespace_name', 'ip_filter_rule_name']
  # ── get_network_rule_set [dependent] ──
  - discovery_id: azure.eventhub.get_network_rule_set
    calls:
      - action: get_network_rule_set
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        default_action: '{{ response.default_action }}'
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        type: '{{ response.type }}'
        virtual_network_rules: '{{ response.virtual_network_rules }}'
        ip_rules: '{{ response.ip_rules }}'
        trusted_service_access_enabled: '{{ response.trusted_service_access_enabled }}'
    # required_params: ['namespace_name']
  # ── get_virtual_network_rule [dependent] ──
  - discovery_id: azure.eventhub.get_virtual_network_rule
    calls:
      - action: get_virtual_network_rule
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        type: '{{ response.type }}'
        virtual_network_subnet_id: '{{ response.virtual_network_subnet_id }}'
    # required_params: ['namespace_name', 'virtual_network_rule_name']
  # ── list_authorization_rules [dependent] ──
  - discovery_id: azure.eventhub.list_authorization_rules
    calls:
      - action: list_authorization_rules
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        rights: '{{ item.rights }}'
    # required_params: ['namespace_name', 'event_hub_name']
  # ── list_by_event_hub [dependent] ──
  - discovery_id: azure.eventhub.list_by_event_hub
    calls:
      - action: list_by_event_hub
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        created_at: '{{ item.created_at }}'
        updated_at: '{{ item.updated_at }}'
        user_metadata: '{{ item.user_metadata }}'
    # required_params: ['namespace_name', 'event_hub_name']
  # ── list_keys [dependent] ──
  - discovery_id: azure.eventhub.list_keys
    calls:
      - action: list_keys
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.primary_connection_string }}'
      item:
        alias_primary_connection_string: '{{ item.alias_primary_connection_string }}'
        alias_secondary_connection_string: '{{ item.alias_secondary_connection_string }}'
        key_name: '{{ item.key_name }}'
        primary_connection_string: '{{ item.primary_connection_string }}'
        primary_key: '{{ item.primary_key }}'
        secondary_connection_string: '{{ item.secondary_connection_string }}'
        secondary_key: '{{ item.secondary_key }}'
    # required_params: ['namespace_name', 'authorization_rule_name']
