# Discovery YAML — testbase (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: testbase
services:
  client: testbase
  module: azure.mgmt.testbase
discovery:
  # ── list_by_resource_group ──
  - discovery_id: azure.testbase.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        access_level: '{{ item.access_level }}'
        sku: '{{ item.sku }}'
        system_data: '{{ item.system_data }}'
  # ── list_by_subscription ──
  - discovery_id: azure.testbase.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        access_level: '{{ item.access_level }}'
        sku: '{{ item.sku }}'
        system_data: '{{ item.system_data }}'
  # ── list_by_test_base_account ──
  - discovery_id: azure.testbase.list_by_test_base_account
    calls:
      - action: list_by_test_base_account
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        application_name: '{{ item.application_name }}'
        blob_path: '{{ item.blob_path }}'
        flighting_ring: '{{ item.flighting_ring }}'
        is_enabled: '{{ item.is_enabled }}'
        last_modified_time: '{{ item.last_modified_time }}'
        package_status: '{{ item.package_status }}'
        system_data: '{{ item.system_data }}'
        target_os_list: '{{ item.target_os_list }}'
        test_types: '{{ item.test_types }}'
        tests: '{{ item.tests }}'
        validation_results: '{{ item.validation_results }}'
        version: '{{ item.version }}'
    # required_params: ['test_base_account_name']
  # ── Dependent ops ──
  # ── get_console_log_download_url [dependent] ──
  - discovery_id: azure.testbase.get_console_log_download_url
    calls:
      - action: get_console_log_download_url
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        download_url: '{{ response.download_url }}'
        expiration_time: '{{ response.expiration_time }}'
    # required_params: ['test_base_account_name', 'package_name', 'test_result_name', 'parameters']
  # ── get_download_url [dependent] ──
  - discovery_id: azure.testbase.get_download_url
    calls:
      - action: get_download_url
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        download_url: '{{ response.download_url }}'
        expiration_time: '{{ response.expiration_time }}'
    # required_params: ['test_base_account_name', 'package_name', 'test_result_name']
  # ── get_file_upload_url [dependent] ──
  - discovery_id: azure.testbase.get_file_upload_url
    calls:
      - action: get_file_upload_url
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        blob_path: '{{ response.blob_path }}'
        upload_url: '{{ response.upload_url }}'
    # required_params: ['test_base_account_name']
  # ── get_free_hour_balance [dependent] ──
  - discovery_id: azure.testbase.get_free_hour_balance
    calls:
      - action: get_free_hour_balance
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        increment_entries: '{{ response.increment_entries }}'
        total_remaining_free_hours: '{{ response.total_remaining_free_hours }}'
    # required_params: ['test_base_account_name']
  # ── get_usage [dependent] ──
  - discovery_id: azure.testbase.get_usage
    calls:
      - action: get_usage
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        next_request: '{{ response.next_request }}'
        package_usage_entries: '{{ response.package_usage_entries }}'
        total_charges: '{{ response.total_charges }}'
        total_used_billable_hours: '{{ response.total_used_billable_hours }}'
        total_used_free_hours: '{{ response.total_used_free_hours }}'
    # required_params: ['test_base_account_name']
  # ── get_video_download_url [dependent] ──
  - discovery_id: azure.testbase.get_video_download_url
    calls:
      - action: get_video_download_url
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        download_url: '{{ response.download_url }}'
        expiration_time: '{{ response.expiration_time }}'
    # required_params: ['test_base_account_name', 'package_name', 'test_result_name']
  # ── list [dependent] ──
  - discovery_id: azure.testbase.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        analysis_summaries: '{{ item.analysis_summaries }}'
        application_name: '{{ item.application_name }}'
        application_version: '{{ item.application_version }}'
        baseline_test_result_id: '{{ item.baseline_test_result_id }}'
        build_revision: '{{ item.build_revision }}'
        build_version: '{{ item.build_version }}'
        execution_status: '{{ item.execution_status }}'
        flighting_ring: '{{ item.flighting_ring }}'
        grade: '{{ item.grade }}'
        interop_media_type: '{{ item.interop_media_type }}'
        interop_media_version: '{{ item.interop_media_version }}'
        is_download_data_available: '{{ item.is_download_data_available }}'
        is_video_available: '{{ item.is_video_available }}'
        kb_number: '{{ item.kb_number }}'
        os_name: '{{ item.os_name }}'
        package_id: '{{ item.package_id }}'
        package_version: '{{ item.package_version }}'
        release_name: '{{ item.release_name }}'
        release_version_date: '{{ item.release_version_date }}'
        system_data: '{{ item.system_data }}'
        test_run_time: '{{ item.test_run_time }}'
        test_status: '{{ item.test_status }}'
        test_type: '{{ item.test_type }}'
    # required_params: ['test_base_account_name', 'package_name', 'os_update_type']
