# Discovery YAML — servicebus (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: servicebus
services:
  client: servicebus
  module: azure.mgmt.servicebus
discovery:
  # ── list ──
  - discovery_id: azure.servicebus.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        type: '{{ item.type }}'
        private_endpoint: '{{ item.private_endpoint }}'
        private_link_service_connection_state: '{{ item.private_link_service_connection_state }}'
        system_data: '{{ item.system_data }}'
    # required_params: ['namespace_name']
