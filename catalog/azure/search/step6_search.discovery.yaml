# Discovery YAML — search (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: search
services:
  client: search
  module: azure.mgmt.search
discovery:
  # ── list ──
  - discovery_id: azure.search.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        name: '{{ item.name }}'
        action_type: '{{ item.action_type }}'
        display: '{{ item.display }}'
        is_data_action: '{{ item.is_data_action }}'
        origin: '{{ item.origin }}'
  # ── list_by_resource_group ──
  - discovery_id: azure.search.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        network_rule_set: '{{ item.network_rule_set }}'
        private_endpoint_connections: '{{ item.private_endpoint_connections }}'
        provisioning_state: '{{ item.provisioning_state }}'
        public_network_access: '{{ item.public_network_access }}'
        status: '{{ item.status }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        auth_options: '{{ item.auth_options }}'
        compute_type: '{{ item.compute_type }}'
        data_exfiltration_protections: '{{ item.data_exfiltration_protections }}'
        disable_local_auth: '{{ item.disable_local_auth }}'
        e_tag: '{{ item.e_tag }}'
        encryption_with_cmk: '{{ item.encryption_with_cmk }}'
        endpoint: '{{ item.endpoint }}'
        hosting_mode: '{{ item.hosting_mode }}'
        partition_count: '{{ item.partition_count }}'
        replica_count: '{{ item.replica_count }}'
        semantic_search: '{{ item.semantic_search }}'
        service_upgraded_at: '{{ item.service_upgraded_at }}'
        shared_private_link_resources: '{{ item.shared_private_link_resources }}'
        sku: '{{ item.sku }}'
        status_details: '{{ item.status_details }}'
        system_data: '{{ item.system_data }}'
        upgrade_available: '{{ item.upgrade_available }}'
  # ── list_by_search_service ──
  - discovery_id: azure.search.list_by_search_service
    calls:
      - action: list_by_search_service
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        name: '{{ item.name }}'
        key: '{{ item.key }}'
    # required_params: ['search_service_name']
  # ── list_by_service ──
  - discovery_id: azure.search.list_by_service
    calls:
      - action: list_by_service
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        system_data: '{{ item.system_data }}'
    # required_params: ['search_service_name']
  # ── list_by_subscription ──
  - discovery_id: azure.search.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        current_value: '{{ item.current_value }}'
        limit: '{{ item.limit }}'
        unit: '{{ item.unit }}'
    # required_params: ['location']
  # ── list_supported ──
  - discovery_id: azure.search.list_supported
    calls:
      - action: list_supported
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        system_data: '{{ item.system_data }}'
    # required_params: ['search_service_name']
  # ── Dependent ops ──
  # ── check_name_availability [dependent] ──
  - discovery_id: azure.search.check_name_availability
    calls:
      - action: check_name_availability
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        is_name_available: '{{ response.is_name_available }}'
        message: '{{ response.message }}'
        reason: '{{ response.reason }}'
    # required_params: ['name']
