# Discovery YAML — recoveryservices (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: recoveryservices
services:
  client: recoveryservices
  module: azure.mgmt.recoveryservices
discovery:
  # ── list ──
  - discovery_id: azure.recoveryservices.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        jobs_summary: '{{ item.jobs_summary }}'
        monitoring_summary: '{{ item.monitoring_summary }}'
        protected_item_count: '{{ item.protected_item_count }}'
        recovery_plan_count: '{{ item.recovery_plan_count }}'
        recovery_services_provider_auth_type: '{{ item.recovery_services_provider_auth_type }}'
        registered_servers_count: '{{ item.registered_servers_count }}'
    # required_params: ['vault_name']
  # ── list_by_resource_group ──
  - discovery_id: azure.recoveryservices.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        identity: '{{ item.identity }}'
        properties: '{{ item.properties }}'
        sku: '{{ item.sku }}'
  # ── list_by_subscription_id ──
  - discovery_id: azure.recoveryservices.list_by_subscription_id
    calls:
      - action: list_by_subscription_id
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        identity: '{{ item.identity }}'
        properties: '{{ item.properties }}'
        sku: '{{ item.sku }}'
  # ── list_by_vaults ──
  - discovery_id: azure.recoveryservices.list_by_vaults
    calls:
      - action: list_by_vaults
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        name: '{{ item.name }}'
        current_value: '{{ item.current_value }}'
        limit: '{{ item.limit }}'
        next_reset_time: '{{ item.next_reset_time }}'
        quota_period: '{{ item.quota_period }}'
        unit: '{{ item.unit }}'
    # required_params: ['vault_name']
  # ── Dependent ops ──
  # ── check_name_availability [dependent] ──
  - discovery_id: azure.recoveryservices.check_name_availability
    calls:
      - action: check_name_availability
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        message: '{{ response.message }}'
        name_available: '{{ response.name_available }}'
        reason: '{{ response.reason }}'
    # required_params: ['location', 'input']
  # ── get_operation_status [dependent] ──
  - discovery_id: azure.recoveryservices.get_operation_status
    calls:
      - action: get_operation_status
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        status: '{{ response.status }}'
        end_time: '{{ response.end_time }}'
        error: '{{ response.error }}'
        start_time: '{{ response.start_time }}'
    # required_params: ['location', 'deleted_vault_name', 'operation_id']
