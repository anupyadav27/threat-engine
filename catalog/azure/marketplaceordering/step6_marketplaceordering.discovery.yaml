# Discovery YAML — marketplaceordering (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: marketplaceordering
services:
  client: marketplaceordering
  module: azure.mgmt.marketplaceordering
discovery:
  # ── list ──
  - discovery_id: azure.marketplaceordering.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── Dependent ops ──
  # ── get_agreement [dependent] ──
  - discovery_id: azure.marketplaceordering.get_agreement
    calls:
      - action: get_agreement
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        type: '{{ response.type }}'
        accepted: '{{ response.accepted }}'
        license_text_link: '{{ response.license_text_link }}'
        marketplace_terms_link: '{{ response.marketplace_terms_link }}'
        plan: '{{ response.plan }}'
        privacy_policy_link: '{{ response.privacy_policy_link }}'
        product: '{{ response.product }}'
        publisher: '{{ response.publisher }}'
        retrieve_datetime: '{{ response.retrieve_datetime }}'
        signature: '{{ response.signature }}'
        system_data: '{{ response.system_data }}'
    # required_params: ['publisher_id', 'offer_id', 'plan_id']
