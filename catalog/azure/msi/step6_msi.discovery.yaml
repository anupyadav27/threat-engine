# Discovery YAML — msi (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: msi
services:
  client: msi
  module: azure.mgmt.msi
discovery:
  # ── list ──
  - discovery_id: azure.msi.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        name: '{{ item.name }}'
        display: '{{ item.display }}'
  # ── list_associated_resources ──
  - discovery_id: azure.msi.list_associated_resources
    calls:
      - action: list_associated_resources
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        resource_group: '{{ item.resource_group }}'
        subscription_id: '{{ item.subscription_id }}'
        type: '{{ item.type }}'
        subscription_display_name: '{{ item.subscription_display_name }}'
    # required_params: ['resource_name']
  # ── list_by_resource_group ──
  - discovery_id: azure.msi.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        client_id: '{{ item.client_id }}'
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        principal_id: '{{ item.principal_id }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        tenant_id: '{{ item.tenant_id }}'
  # ── list_by_subscription ──
  - discovery_id: azure.msi.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        client_id: '{{ item.client_id }}'
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        principal_id: '{{ item.principal_id }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        tenant_id: '{{ item.tenant_id }}'
  # ── Dependent ops ──
  # ── get_by_scope [dependent] ──
  - discovery_id: azure.msi.get_by_scope
    calls:
      - action: get_by_scope
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        client_id: '{{ response.client_id }}'
        id: '{{ response.id }}'
        location: '{{ response.location }}'
        name: '{{ response.name }}'
        principal_id: '{{ response.principal_id }}'
        tags: '{{ response.tags }}'
        type: '{{ response.type }}'
        client_secret_url: '{{ response.client_secret_url }}'
        tenant_id: '{{ response.tenant_id }}'
    # required_params: ['scope']
