# Discovery YAML — datamigration (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: datamigration
services:
  client: datamigration
  module: azure.mgmt.datamigration
discovery:
  # ── list_auth_keys ──
  - discovery_id: azure.datamigration.list_auth_keys
    calls:
      - action: list_auth_keys
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.auth_key1 }}'
      item:
        auth_key1: '{{ item.auth_key1 }}'
        auth_key2: '{{ item.auth_key2 }}'
    # required_params: ['sql_migration_service_name']
  # ── list_by_resource_group ──
  - discovery_id: azure.datamigration.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        integration_runtime_state: '{{ item.integration_runtime_state }}'
        system_data: '{{ item.system_data }}'
  # ── list_by_subscription ──
  - discovery_id: azure.datamigration.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        integration_runtime_state: '{{ item.integration_runtime_state }}'
        system_data: '{{ item.system_data }}'
  # ── list_migrations ──
  - discovery_id: azure.datamigration.list_migrations
    calls:
      - action: list_migrations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        system_data: '{{ item.system_data }}'
    # required_params: ['sql_migration_service_name']
  # ── list_monitoring_data ──
  - discovery_id: azure.datamigration.list_monitoring_data
    calls:
      - action: list_monitoring_data
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.name }}'
      item:
        name: '{{ item.name }}'
        nodes: '{{ item.nodes }}'
    # required_params: ['sql_migration_service_name']
  # ── Dependent ops ──
  # ── check_name_availability [dependent] ──
  - discovery_id: azure.datamigration.check_name_availability
    calls:
      - action: check_name_availability
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        message: '{{ response.message }}'
        name_available: '{{ response.name_available }}'
        reason: '{{ response.reason }}'
    # required_params: ['location', 'parameters']
  # ── get_for_scope [dependent] ──
  - discovery_id: azure.datamigration.get_for_scope
    calls:
      - action: get_for_scope
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        provisioning_state: '{{ response.provisioning_state }}'
        type: '{{ response.type }}'
        collection_list: '{{ response.collection_list }}'
        ended_on: '{{ response.ended_on }}'
        kind: '{{ response.kind }}'
        migration_failure_error: '{{ response.migration_failure_error }}'
        migration_operation_id: '{{ response.migration_operation_id }}'
        migration_service: '{{ response.migration_service }}'
        migration_status: '{{ response.migration_status }}'
        provisioning_error: '{{ response.provisioning_error }}'
        scope: '{{ response.scope }}'
        source_mongo_connection: '{{ response.source_mongo_connection }}'
        started_on: '{{ response.started_on }}'
        system_data: '{{ response.system_data }}'
        target_mongo_connection: '{{ response.target_mongo_connection }}'
    # required_params: ['target_resource_name']
  # ── list [dependent] ──
  - discovery_id: azure.datamigration.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        system_data: '{{ item.system_data }}'
    # required_params: ['group_name', 'service_name', 'project_name']
  # ── list_skus [dependent] ──
  - discovery_id: azure.datamigration.list_skus
    calls:
      - action: list_skus
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        capacity: '{{ item.capacity }}'
        resource_type: '{{ item.resource_type }}'
        sku: '{{ item.sku }}'
    # required_params: ['group_name', 'service_name']
