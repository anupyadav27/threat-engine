# Discovery YAML — advisor (Azure)
# Generated: 2026-02-21T05:02:43Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: advisor
services:
  client: advisor
  module: azure.mgmt.advisor
discovery:
  # ── list ──
  - discovery_id: azure.advisor.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── list_by_resource_group ──
  - discovery_id: azure.advisor.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
    # required_params: ['resource_group']
  # ── list_by_subscription ──
  - discovery_id: azure.advisor.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── Dependent ops ──
  # ── get_generate_status [dependent] ──
  - discovery_id: azure.advisor.get_generate_status
    calls:
      - action: get_generate_status
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        identity: '{{ response.identity }}'
        location: '{{ response.location }}'
        name: '{{ response.name }}'
        provisioning_state: '{{ response.provisioning_state }}'
        tags: '{{ response.tags }}'
        type: '{{ response.type }}'
        etag: '{{ response.etag }}'
        kind: '{{ response.kind }}'
        plan: '{{ response.plan }}'
        properties: '{{ response.properties }}'
        sku: '{{ response.sku }}'
        zones: '{{ response.zones }}'
    # required_params: ['operation_id']
