      - action: get_resource_group_level_task
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        type: '{{ response.type }}'
        creation_time_utc: '{{ response.creation_time_utc }}'
        last_state_change_time_utc: '{{ response.last_state_change_time_utc }}'
        security_task_parameters: '{{ response.security_task_parameters }}'
        state: '{{ response.state }}'
        sub_state: '{{ response.sub_state }}'
    # required_params: ['asc_location', 'task_name']
  # ── get_subscription_level_task [dependent] ──
  - discovery_id: azure.security.get_subscription_level_task
    calls:
      - action: get_subscription_level_task
