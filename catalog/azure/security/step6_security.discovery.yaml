# Discovery YAML — security (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: security
services:
  client: security
  module: azure.mgmt.security
discovery:
  # ── list ──
  - discovery_id: azure.security.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        creation_time_utc: '{{ item.creation_time_utc }}'
        last_state_change_time_utc: '{{ item.last_state_change_time_utc }}'
        security_task_parameters: '{{ item.security_task_parameters }}'
        state: '{{ item.state }}'
        sub_state: '{{ item.sub_state }}'
  # ── list_by_home_region ──
  - discovery_id: azure.security.list_by_home_region
    calls:
      - action: list_by_home_region
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        creation_time_utc: '{{ item.creation_time_utc }}'
        last_state_change_time_utc: '{{ item.last_state_change_time_utc }}'
        security_task_parameters: '{{ item.security_task_parameters }}'
        state: '{{ item.state }}'
        sub_state: '{{ item.sub_state }}'
    # required_params: ['asc_location']
  # ── list_by_resource_group ──
  - discovery_id: azure.security.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        creation_time_utc: '{{ item.creation_time_utc }}'
        last_state_change_time_utc: '{{ item.last_state_change_time_utc }}'
        security_task_parameters: '{{ item.security_task_parameters }}'
        state: '{{ item.state }}'
        sub_state: '{{ item.sub_state }}'
    # required_params: ['asc_location']
  # ── Dependent ops ──
  # ── get_resource_group_level_task [dependent] ──
  - discovery_id: azure.security.get_resource_group_level_task
