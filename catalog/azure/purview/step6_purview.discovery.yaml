# Discovery YAML — purview (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: purview
services:
  client: purview
  module: azure.mgmt.purview
discovery:
  # ── list ──
  - discovery_id: azure.purview.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── list_by_account ──
  - discovery_id: azure.purview.list_by_account
    calls:
      - action: list_by_account
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
    # required_params: ['account_name']
  # ── list_by_resource_group ──
  - discovery_id: azure.purview.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── list_by_subscription ──
  - discovery_id: azure.purview.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── list_keys ──
  - discovery_id: azure.purview.list_keys
    calls:
      - action: list_keys
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.atlas_kafka_primary_endpoint }}'
      item:
        atlas_kafka_primary_endpoint: '{{ item.atlas_kafka_primary_endpoint }}'
        atlas_kafka_secondary_endpoint: '{{ item.atlas_kafka_secondary_endpoint }}'
    # required_params: ['account_name']
  # ── Dependent ops ──
  # ── check_name_availability [dependent] ──
  - discovery_id: azure.purview.check_name_availability
    calls:
      - action: check_name_availability
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        message: '{{ response.message }}'
        name_available: '{{ response.name_available }}'
        reason: '{{ response.reason }}'
    # required_params: ['check_name_availability_request']
  # ── get_by_group_id [dependent] ──
  - discovery_id: azure.purview.get_by_group_id
    calls:
      - action: get_by_group_id
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        type: '{{ response.type }}'
        properties: '{{ response.properties }}'
    # required_params: ['account_name', 'group_id']
