# Discovery YAML — redisenterprise (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: redisenterprise
services:
  client: redisenterprise
  module: azure.mgmt.redisenterprise
discovery:
  # ── list_by_cluster ──
  - discovery_id: azure.redisenterprise.list_by_cluster
    calls:
      - action: list_by_cluster
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        group_id: '{{ item.group_id }}'
        required_members: '{{ item.required_members }}'
        required_zone_names: '{{ item.required_zone_names }}'
    # required_params: ['cluster_name']
  # ── list_by_resource_group ──
  - discovery_id: azure.redisenterprise.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        encryption: '{{ item.encryption }}'
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        minimum_tls_version: '{{ item.minimum_tls_version }}'
        name: '{{ item.name }}'
        private_endpoint_connections: '{{ item.private_endpoint_connections }}'
        provisioning_state: '{{ item.provisioning_state }}'
        public_network_access: '{{ item.public_network_access }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        high_availability: '{{ item.high_availability }}'
        host_name: '{{ item.host_name }}'
        kind: '{{ item.kind }}'
        redis_version: '{{ item.redis_version }}'
        redundancy_mode: '{{ item.redundancy_mode }}'
        resource_state: '{{ item.resource_state }}'
        sku: '{{ item.sku }}'
        zones: '{{ item.zones }}'
  # ── list_skus_for_scaling ──
  - discovery_id: azure.redisenterprise.list_skus_for_scaling
    calls:
      - action: list_skus_for_scaling
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.skus }}'
      item:
        skus: '{{ item.skus }}'
    # required_params: ['cluster_name']
  # ── Dependent ops ──
  # ── list [dependent] ──
  - discovery_id: azure.redisenterprise.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        type: '{{ item.type }}'
        access_policy_name: '{{ item.access_policy_name }}'
        user: '{{ item.user }}'
    # required_params: ['cluster_name', 'database_name']
  # ── list_keys [dependent] ──
  - discovery_id: azure.redisenterprise.list_keys
    calls:
      - action: list_keys
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.primary_key }}'
      item:
        primary_key: '{{ item.primary_key }}'
        secondary_key: '{{ item.secondary_key }}'
    # required_params: ['cluster_name', 'database_name']
