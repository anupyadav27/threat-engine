# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: scheduler
services:
  client: scheduler
  module: azure.mgmt.scheduler
discovery:
  # ── list ──
  - discovery_id: azure.scheduler.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
    # required_params: ['job_collection_name']
  # ── list_by_resource_group ──
  - discovery_id: azure.scheduler.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── list_by_subscription ──
  - discovery_id: azure.scheduler.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── Dependent ops ──
  # ── list_job_history [dependent] ──
  - discovery_id: azure.scheduler.list_job_history
    calls:
      - action: list_job_history
