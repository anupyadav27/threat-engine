# Discovery YAML — hdinsight (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: hdinsight
services:
  client: hdinsight
  module: azure.mgmt.hdinsight
discovery:
  # ── list ──
  - discovery_id: azure.hdinsight.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── list_billing_specs ──
  - discovery_id: azure.hdinsight.list_billing_specs
    calls:
      - action: list_billing_specs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.vm_sizes }}'
      item:
        billing_resources: '{{ item.billing_resources }}'
        vm_size_filters: '{{ item.vm_size_filters }}'
        vm_size_properties: '{{ item.vm_size_properties }}'
        vm_sizes: '{{ item.vm_sizes }}'
        vm_sizes_with_encryption_at_host: '{{ item.vm_sizes_with_encryption_at_host }}'
    # required_params: ['location']
  # ── list_by_cluster ──
  - discovery_id: azure.hdinsight.list_by_cluster
    calls:
      - action: list_by_cluster
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
    # required_params: ['cluster_name']
  # ── list_by_resource_group ──
  - discovery_id: azure.hdinsight.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── list_hosts ──
  - discovery_id: azure.hdinsight.list_hosts
    calls:
      - action: list_hosts
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        name: '{{ item.name }}'
        effective_disk_encryption_key_url: '{{ item.effective_disk_encryption_key_url }}'
        fqdn: '{{ item.fqdn }}'
    # required_params: ['cluster_name']
  # ── list_usages ──
  - discovery_id: azure.hdinsight.list_usages
    calls:
      - action: list_usages
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        name: '{{ item.name }}'
        current_value: '{{ item.current_value }}'
        limit: '{{ item.limit }}'
        unit: '{{ item.unit }}'
    # required_params: ['location']
  # ── Dependent ops ──
  # ── check_name_availability [dependent] ──
  - discovery_id: azure.hdinsight.check_name_availability
    calls:
      - action: check_name_availability
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        message: '{{ response.message }}'
        name_available: '{{ response.name_available }}'
        reason: '{{ response.reason }}'
    # required_params: ['location', 'parameters']
  # ── get_async_operation_status [dependent] ──
  - discovery_id: azure.hdinsight.get_async_operation_status
    calls:
      - action: get_async_operation_status
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        status: '{{ response.status }}'
        error: '{{ response.error }}'
    # required_params: ['cluster_name', 'operation_id']
  # ── get_azure_async_operation_status [dependent] ──
  - discovery_id: azure.hdinsight.get_azure_async_operation_status
    calls:
      - action: get_azure_async_operation_status
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        status: '{{ response.status }}'
        error: '{{ response.error }}'
    # required_params: ['location', 'operation_id']
  # ── get_azure_monitor_status [dependent] ──
  - discovery_id: azure.hdinsight.get_azure_monitor_status
    calls:
      - action: get_azure_monitor_status
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        cluster_monitoring_enabled: '{{ response.cluster_monitoring_enabled }}'
        selected_configurations: '{{ response.selected_configurations }}'
        workspace_id: '{{ response.workspace_id }}'
    # required_params: ['cluster_name']
  # ── get_capabilities [dependent] ──
  - discovery_id: azure.hdinsight.get_capabilities
    calls:
      - action: get_capabilities
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        features: '{{ response.features }}'
        quota: '{{ response.quota }}'
        regions: '{{ response.regions }}'
        versions: '{{ response.versions }}'
    # required_params: ['location']
  # ── get_execution_async_operation_status [dependent] ──
  - discovery_id: azure.hdinsight.get_execution_async_operation_status
    calls:
      - action: get_execution_async_operation_status
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        status: '{{ response.status }}'
        error: '{{ response.error }}'
    # required_params: ['cluster_name', 'operation_id']
  # ── get_execution_detail [dependent] ──
  - discovery_id: azure.hdinsight.get_execution_detail
    calls:
      - action: get_execution_detail
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        name: '{{ response.name }}'
        status: '{{ response.status }}'
        application_name: '{{ response.application_name }}'
        debug_information: '{{ response.debug_information }}'
        end_time: '{{ response.end_time }}'
        execution_summary: '{{ response.execution_summary }}'
        operation: '{{ response.operation }}'
        parameters: '{{ response.parameters }}'
        roles: '{{ response.roles }}'
        script_execution_id: '{{ response.script_execution_id }}'
        start_time: '{{ response.start_time }}'
        uri: '{{ response.uri }}'
    # required_params: ['cluster_name', 'script_execution_id']
  # ── get_gateway_settings [dependent] ──
  - discovery_id: azure.hdinsight.get_gateway_settings
    calls:
      - action: get_gateway_settings
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        is_credential_enabled: '{{ response.is_credential_enabled }}'
        password: '{{ response.password }}'
        user_name: '{{ response.user_name }}'
    # required_params: ['cluster_name']
  # ── get_monitoring_status [dependent] ──
  - discovery_id: azure.hdinsight.get_monitoring_status
    calls:
      - action: get_monitoring_status
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        cluster_monitoring_enabled: '{{ response.cluster_monitoring_enabled }}'
        workspace_id: '{{ response.workspace_id }}'
    # required_params: ['cluster_name']
