        next_reset_time: '{{ item.next_reset_time }}'
        quota_period: '{{ item.quota_period }}'
        unit: '{{ item.unit }}'
    # required_params: ['account_name']
  # ── Dependent ops ──
  # ── get_association [dependent] ──
  - discovery_id: azure.cognitiveservices.get_association
