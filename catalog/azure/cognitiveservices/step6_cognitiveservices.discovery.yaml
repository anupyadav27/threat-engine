      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        kind: '{{ item.kind }}'
        properties: '{{ item.properties }}'
        sku: '{{ item.sku }}'
        system_data: '{{ item.system_data }}'
  # ── list_plans_by_subscription ──
  - discovery_id: azure.cognitiveservices.list_plans_by_subscription
    calls:
      - action: list_plans_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        kind: '{{ item.kind }}'
        properties: '{{ item.properties }}'
        sku: '{{ item.sku }}'
        system_data: '{{ item.system_data }}'
  # ── list_usages ──
  - discovery_id: azure.cognitiveservices.list_usages
