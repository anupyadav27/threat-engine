# Discovery YAML — cognitiveservices (Azure)
# Generated: 2026-02-21T05:02:43Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: cognitiveservices
services:
  client: cognitiveservices
  module: azure.mgmt.cognitiveservices
discovery:
  # ── list_associations ──
  - discovery_id: azure.cognitiveservices.list_associations
    calls:
      - action: list_associations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        account_id: '{{ item.account_id }}'
        system_data: '{{ item.system_data }}'
    # required_params: ['commitment_plan_name']
  # ── list_by_resource_group ──
  - discovery_id: azure.cognitiveservices.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        kind: '{{ item.kind }}'
        properties: '{{ item.properties }}'
        sku: '{{ item.sku }}'
        system_data: '{{ item.system_data }}'
  # ── list_by_subscription ──
  - discovery_id: azure.cognitiveservices.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        system_data: '{{ item.system_data }}'
  # ── list_keys ──
  - discovery_id: azure.cognitiveservices.list_keys
    calls:
      - action: list_keys
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.key1 }}'
      item:
        key1: '{{ item.key1 }}'
        key2: '{{ item.key2 }}'
    # required_params: ['account_name']
  # ── list_models ──
  - discovery_id: azure.cognitiveservices.list_models
    calls:
      - action: list_models
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        name: '{{ item.name }}'
        base_model: '{{ item.base_model }}'
        call_rate_limit: '{{ item.call_rate_limit }}'
        capabilities: '{{ item.capabilities }}'
        deprecation: '{{ item.deprecation }}'
        finetune_capabilities: '{{ item.finetune_capabilities }}'
        format: '{{ item.format }}'
        is_default_version: '{{ item.is_default_version }}'
        lifecycle_status: '{{ item.lifecycle_status }}'
        max_capacity: '{{ item.max_capacity }}'
        model_catalog_asset_id: '{{ item.model_catalog_asset_id }}'
        publisher: '{{ item.publisher }}'
        replacement_config: '{{ item.replacement_config }}'
        skus: '{{ item.skus }}'
        source: '{{ item.source }}'
        source_account: '{{ item.source_account }}'
        system_data: '{{ item.system_data }}'
        version: '{{ item.version }}'
    # required_params: ['account_name']
  # ── list_plans_by_resource_group ──
  - discovery_id: azure.cognitiveservices.list_plans_by_resource_group
    calls:
      - action: list_plans_by_resource_group
        save_as: response
        on_error: continue
    emit:
