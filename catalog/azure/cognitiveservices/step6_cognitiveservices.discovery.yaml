        tags: '{{ response.tags }}'
        type: '{{ response.type }}'
        account_id: '{{ response.account_id }}'
        system_data: '{{ response.system_data }}'
    # required_params: ['commitment_plan_name', 'commitment_plan_association_name']
  # ── get_plan [dependent] ──
  - discovery_id: azure.cognitiveservices.get_plan
    calls:
      - action: get_plan
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        location: '{{ response.location }}'
        name: '{{ response.name }}'
        tags: '{{ response.tags }}'
        type: '{{ response.type }}'
        kind: '{{ response.kind }}'
        properties: '{{ response.properties }}'
        sku: '{{ response.sku }}'
        system_data: '{{ response.system_data }}'
    # required_params: ['commitment_plan_name']
  # ── list [dependent] ──
  - discovery_id: azure.cognitiveservices.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
