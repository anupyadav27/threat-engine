# Discovery YAML — subscription (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: subscription
services:
  client: subscription
  module: azure.mgmt.subscription
discovery:
  # ── list ──
  - discovery_id: azure.subscription.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        tenant_id: '{{ item.tenant_id }}'
  # ── list_locations ──
  - discovery_id: azure.subscription.list_locations
    calls:
      - action: list_locations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        subscription_id: '{{ item.subscription_id }}'
        display_name: '{{ item.display_name }}'
        latitude: '{{ item.latitude }}'
        longitude: '{{ item.longitude }}'
  # ── list_policy_for_tenant ──
  - discovery_id: azure.subscription.list_policy_for_tenant
    calls:
      - action: list_policy_for_tenant
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        system_data: '{{ item.system_data }}'
  # ── Dependent ops ──
  # ── get_policy [dependent] ──
  - discovery_id: azure.subscription.get_policy
    calls:
      - action: get_policy
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        type: '{{ response.type }}'
        properties: '{{ response.properties }}'
        system_data: '{{ response.system_data }}'
    # required_params: ['billing_account_id']
  # ── get_policy_for_tenant [dependent] ──
  - discovery_id: azure.subscription.get_policy_for_tenant
    calls:
      - action: get_policy_for_tenant
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        type: '{{ response.type }}'
        properties: '{{ response.properties }}'
        system_data: '{{ response.system_data }}'
