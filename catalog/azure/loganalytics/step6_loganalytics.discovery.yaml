# Discovery YAML — loganalytics (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: loganalytics
services:
  client: loganalytics
  module: azure.mgmt.loganalytics
discovery:
  # ── list ──
  - discovery_id: azure.loganalytics.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        created_date: '{{ item.created_date }}'
        customer_id: '{{ item.customer_id }}'
        default_data_collection_rule_resource_id: '{{ item.default_data_collection_rule_resource_id }}'
        failover: '{{ item.failover }}'
        features: '{{ item.features }}'
        force_cmk_for_query: '{{ item.force_cmk_for_query }}'
        modified_date: '{{ item.modified_date }}'
        private_link_scoped_resources: '{{ item.private_link_scoped_resources }}'
        public_network_access_for_ingestion: '{{ item.public_network_access_for_ingestion }}'
        public_network_access_for_query: '{{ item.public_network_access_for_query }}'
        replication: '{{ item.replication }}'
        retention_in_days: '{{ item.retention_in_days }}'
        sku: '{{ item.sku }}'
        system_data: '{{ item.system_data }}'
        workspace_capping: '{{ item.workspace_capping }}'
  # ── list_by_resource_group ──
  - discovery_id: azure.loganalytics.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        created_date: '{{ item.created_date }}'
        customer_id: '{{ item.customer_id }}'
        default_data_collection_rule_resource_id: '{{ item.default_data_collection_rule_resource_id }}'
        failover: '{{ item.failover }}'
        features: '{{ item.features }}'
        force_cmk_for_query: '{{ item.force_cmk_for_query }}'
        modified_date: '{{ item.modified_date }}'
        private_link_scoped_resources: '{{ item.private_link_scoped_resources }}'
        public_network_access_for_ingestion: '{{ item.public_network_access_for_ingestion }}'
        public_network_access_for_query: '{{ item.public_network_access_for_query }}'
        replication: '{{ item.replication }}'
        retention_in_days: '{{ item.retention_in_days }}'
        sku: '{{ item.sku }}'
        system_data: '{{ item.system_data }}'
        workspace_capping: '{{ item.workspace_capping }}'
  # ── list_nsp ──
  - discovery_id: azure.loganalytics.list_nsp
    calls:
      - action: list_nsp
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        system_data: '{{ item.system_data }}'
    # required_params: ['workspace_name']
  # ── Dependent ops ──
  # ── get_nsp [dependent] ──
  - discovery_id: azure.loganalytics.get_nsp
    calls:
      - action: get_nsp
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        type: '{{ response.type }}'
        properties: '{{ response.properties }}'
        system_data: '{{ response.system_data }}'
    # required_params: ['workspace_name', 'network_security_perimeter_configuration_name']
  # ── get_purge_status [dependent] ──
  - discovery_id: azure.loganalytics.get_purge_status
    calls:
      - action: get_purge_status
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        status: '{{ response.status }}'
    # required_params: ['workspace_name', 'purge_id']
  # ── get_shared_keys [dependent] ──
  - discovery_id: azure.loganalytics.get_shared_keys
    calls:
      - action: get_shared_keys
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        primary_shared_key: '{{ response.primary_shared_key }}'
        secondary_shared_key: '{{ response.secondary_shared_key }}'
    # required_params: ['workspace_name']
  # ── list_by_workspace [dependent] ──
  - discovery_id: azure.loganalytics.list_by_workspace
    calls:
      - action: list_by_workspace
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        kind: '{{ item.kind }}'
        properties: '{{ item.properties }}'
    # required_params: ['workspace_name', 'filter']
