# Discovery YAML — servicefabric (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: servicefabric
services:
  client: servicefabric
  module: azure.mgmt.servicefabric
discovery:
  # ── list_by_resource_group ──
  - discovery_id: azure.servicefabric.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        add_on_features: '{{ item.add_on_features }}'
        application_type_versions_cleanup_policy: '{{ item.application_type_versions_cleanup_policy }}'
        available_cluster_versions: '{{ item.available_cluster_versions }}'
        azure_active_directory: '{{ item.azure_active_directory }}'
        certificate: '{{ item.certificate }}'
        certificate_common_names: '{{ item.certificate_common_names }}'
        client_certificate_common_names: '{{ item.client_certificate_common_names }}'
        client_certificate_thumbprints: '{{ item.client_certificate_thumbprints }}'
        cluster_code_version: '{{ item.cluster_code_version }}'
        cluster_endpoint: '{{ item.cluster_endpoint }}'
        cluster_id: '{{ item.cluster_id }}'
        cluster_state: '{{ item.cluster_state }}'
        diagnostics_storage_account_config: '{{ item.diagnostics_storage_account_config }}'
        event_store_service_enabled: '{{ item.event_store_service_enabled }}'
        fabric_settings: '{{ item.fabric_settings }}'
        infrastructure_service_manager: '{{ item.infrastructure_service_manager }}'
        management_endpoint: '{{ item.management_endpoint }}'
        node_types: '{{ item.node_types }}'
        notifications: '{{ item.notifications }}'
        reliability_level: '{{ item.reliability_level }}'
        reverse_proxy_certificate: '{{ item.reverse_proxy_certificate }}'
        reverse_proxy_certificate_common_names: '{{ item.reverse_proxy_certificate_common_names }}'
        sf_zonal_upgrade_mode: '{{ item.sf_zonal_upgrade_mode }}'
        system_data: '{{ item.system_data }}'
        upgrade_description: '{{ item.upgrade_description }}'
        upgrade_mode: '{{ item.upgrade_mode }}'
        upgrade_pause_end_timestamp_utc: '{{ item.upgrade_pause_end_timestamp_utc }}'
        upgrade_pause_start_timestamp_utc: '{{ item.upgrade_pause_start_timestamp_utc }}'
        upgrade_wave: '{{ item.upgrade_wave }}'
        vm_image: '{{ item.vm_image }}'
        vmss_zonal_upgrade_mode: '{{ item.vmss_zonal_upgrade_mode }}'
        wave_upgrade_paused: '{{ item.wave_upgrade_paused }}'
  # ── list_upgradable_versions ──
  - discovery_id: azure.servicefabric.list_upgradable_versions
    calls:
      - action: list_upgradable_versions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.supported_path }}'
      item:
        supported_path: '{{ item.supported_path }}'
    # required_params: ['cluster_name']
  # ── Dependent ops ──
  # ── get_by_environment [dependent] ──
  - discovery_id: azure.servicefabric.get_by_environment
    calls:
      - action: get_by_environment
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        type: '{{ response.type }}'
        code_version: '{{ response.code_version }}'
        environment: '{{ response.environment }}'
        support_expiry_utc: '{{ response.support_expiry_utc }}'
    # required_params: ['location', 'environment', 'cluster_version']
  # ── list [dependent] ──
  - discovery_id: azure.servicefabric.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        correlation_scheme: '{{ item.correlation_scheme }}'
        default_move_cost: '{{ item.default_move_cost }}'
        partition_description: '{{ item.partition_description }}'
        placement_constraints: '{{ item.placement_constraints }}'
        service_dns_name: '{{ item.service_dns_name }}'
        service_kind: '{{ item.service_kind }}'
        service_load_metrics: '{{ item.service_load_metrics }}'
        service_package_activation_mode: '{{ item.service_package_activation_mode }}'
        service_placement_policies: '{{ item.service_placement_policies }}'
        service_type_name: '{{ item.service_type_name }}'
        system_data: '{{ item.system_data }}'
    # required_params: ['cluster_name', 'application_name']
  # ── list_by_environment [dependent] ──
  - discovery_id: azure.servicefabric.list_by_environment
    calls:
      - action: list_by_environment
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        code_version: '{{ item.code_version }}'
        environment: '{{ item.environment }}'
        support_expiry_utc: '{{ item.support_expiry_utc }}'
    # required_params: ['location', 'environment']
