# Discovery YAML — alertsmanagement (Azure)
# Generated: 2026-02-21T05:02:43Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: alertsmanagement
services:
  client: alertsmanagement
  module: azure.mgmt.alertsmanagement
discovery:
  # ── get_all ──
  - discovery_id: azure.alertsmanagement.get_all
    calls:
      - action: get_all
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        value: '{{ response.value }}'
  # ── list ──
  - discovery_id: azure.alertsmanagement.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── list_by_resource_group ──
  - discovery_id: azure.alertsmanagement.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── list_by_subscription ──
  - discovery_id: azure.alertsmanagement.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── Dependent ops ──
  # ── get_by_id [dependent] ──
  - discovery_id: azure.alertsmanagement.get_by_id
    calls:
      - action: get_by_id
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        type: '{{ response.type }}'
        alert_severities: '{{ response.alert_severities }}'
        alert_states: '{{ response.alert_states }}'
        alerts_count: '{{ response.alerts_count }}'
        last_modified_date_time: '{{ response.last_modified_date_time }}'
        last_modified_user_name: '{{ response.last_modified_user_name }}'
        monitor_conditions: '{{ response.monitor_conditions }}'
        monitor_services: '{{ response.monitor_services }}'
        resource_groups: '{{ response.resource_groups }}'
        resource_types: '{{ response.resource_types }}'
        resources: '{{ response.resources }}'
        severity: '{{ response.severity }}'
        smart_group_state: '{{ response.smart_group_state }}'
        start_date_time: '{{ response.start_date_time }}'
    # required_params: ['smart_group_id']
  # ── get_by_name [dependent] ──
  - discovery_id: azure.alertsmanagement.get_by_name
    calls:
      - action: get_by_name
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        location: '{{ response.location }}'
        name: '{{ response.name }}'
        tags: '{{ response.tags }}'
        type: '{{ response.type }}'
        properties: '{{ response.properties }}'
    # required_params: ['action_rule_name']
  # ── get_history [dependent] ──
  - discovery_id: azure.alertsmanagement.get_history
    calls:
      - action: get_history
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        type: '{{ response.type }}'
        properties: '{{ response.properties }}'
    # required_params: ['smart_group_id']
  # ── get_summary [dependent] ──
  - discovery_id: azure.alertsmanagement.get_summary
    calls:
      - action: get_summary
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        type: '{{ response.type }}'
        properties: '{{ response.properties }}'
    # required_params: ['groupby']
