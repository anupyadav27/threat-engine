# Discovery YAML — dynatrace (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: dynatrace
services:
  client: dynatrace
  module: azure.mgmt.dynatrace
discovery:
  # ── list ──
  - discovery_id: azure.dynatrace.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        type: '{{ item.type }}'
        log_rules: '{{ item.log_rules }}'
        metric_rules: '{{ item.metric_rules }}'
        system_data: '{{ item.system_data }}'
    # required_params: ['monitor_name']
  # ── list_app_services ──
  - discovery_id: azure.dynatrace.list_app_services
    calls:
      - action: list_app_services
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        auto_update_setting: '{{ item.auto_update_setting }}'
        availability_state: '{{ item.availability_state }}'
        host_group: '{{ item.host_group }}'
        host_name: '{{ item.host_name }}'
        log_module: '{{ item.log_module }}'
        monitoring_type: '{{ item.monitoring_type }}'
        resource_id: '{{ item.resource_id }}'
        update_status: '{{ item.update_status }}'
        version: '{{ item.version }}'
    # required_params: ['monitor_name']
  # ── list_by_resource_group ──
  - discovery_id: azure.dynatrace.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        dynatrace_environment_properties: '{{ item.dynatrace_environment_properties }}'
        liftr_resource_category: '{{ item.liftr_resource_category }}'
        liftr_resource_preference: '{{ item.liftr_resource_preference }}'
        marketplace_subscription_status: '{{ item.marketplace_subscription_status }}'
        monitoring_status: '{{ item.monitoring_status }}'
        plan_data: '{{ item.plan_data }}'
        system_data: '{{ item.system_data }}'
        user_info: '{{ item.user_info }}'
  # ── list_by_subscription_id ──
  - discovery_id: azure.dynatrace.list_by_subscription_id
    calls:
      - action: list_by_subscription_id
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        dynatrace_environment_properties: '{{ item.dynatrace_environment_properties }}'
        liftr_resource_category: '{{ item.liftr_resource_category }}'
        liftr_resource_preference: '{{ item.liftr_resource_preference }}'
        marketplace_subscription_status: '{{ item.marketplace_subscription_status }}'
        monitoring_status: '{{ item.monitoring_status }}'
        plan_data: '{{ item.plan_data }}'
        system_data: '{{ item.system_data }}'
        user_info: '{{ item.user_info }}'
  # ── list_hosts ──
  - discovery_id: azure.dynatrace.list_hosts
    calls:
      - action: list_hosts
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        auto_update_setting: '{{ item.auto_update_setting }}'
        availability_state: '{{ item.availability_state }}'
        host_group: '{{ item.host_group }}'
        host_name: '{{ item.host_name }}'
        log_module: '{{ item.log_module }}'
        monitoring_type: '{{ item.monitoring_type }}'
        resource_id: '{{ item.resource_id }}'
        update_status: '{{ item.update_status }}'
        version: '{{ item.version }}'
    # required_params: ['monitor_name']
  # ── list_monitored_resources ──
  - discovery_id: azure.dynatrace.list_monitored_resources
    calls:
      - action: list_monitored_resources
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        reason_for_logs_status: '{{ item.reason_for_logs_status }}'
        reason_for_metrics_status: '{{ item.reason_for_metrics_status }}'
        sending_logs: '{{ item.sending_logs }}'
        sending_metrics: '{{ item.sending_metrics }}'
    # required_params: ['monitor_name']
  # ── Dependent ops ──
  # ── get_marketplace_saa_s_resource_details [dependent] ──
  - discovery_id: azure.dynatrace.get_marketplace_saa_s_resource_details
    calls:
      - action: get_marketplace_saa_s_resource_details
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        marketplace_saa_s_resource_id: '{{ response.marketplace_saa_s_resource_id }}'
        marketplace_subscription_status: '{{ response.marketplace_subscription_status }}'
        plan_id: '{{ response.plan_id }}'
    # required_params: ['request']
  # ── get_metric_status [dependent] ──
  - discovery_id: azure.dynatrace.get_metric_status
    calls:
      - action: get_metric_status
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        azure_resource_ids: '{{ response.azure_resource_ids }}'
    # required_params: ['monitor_name']
  # ── get_sso_details [dependent] ──
  - discovery_id: azure.dynatrace.get_sso_details
    calls:
      - action: get_sso_details
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        aad_domains: '{{ response.aad_domains }}'
        admin_users: '{{ response.admin_users }}'
        is_sso_enabled: '{{ response.is_sso_enabled }}'
        metadata_url: '{{ response.metadata_url }}'
        single_sign_on_url: '{{ response.single_sign_on_url }}'
    # required_params: ['monitor_name']
  # ── get_vm_host_payload [dependent] ──
  - discovery_id: azure.dynatrace.get_vm_host_payload
    calls:
      - action: get_vm_host_payload
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        environment_id: '{{ response.environment_id }}'
        ingestion_key: '{{ response.ingestion_key }}'
    # required_params: ['monitor_name']
  # ── list_linkable_environments [dependent] ──
  - discovery_id: azure.dynatrace.list_linkable_environments
    calls:
      - action: list_linkable_environments
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        environment_id: '{{ item.environment_id }}'
        environment_name: '{{ item.environment_name }}'
        plan_data: '{{ item.plan_data }}'
    # required_params: ['monitor_name', 'request']
