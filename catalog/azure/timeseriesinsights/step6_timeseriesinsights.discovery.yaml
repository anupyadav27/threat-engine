# Discovery YAML — timeseriesinsights (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: timeseriesinsights
services:
  client: timeseriesinsights
  module: azure.mgmt.timeseriesinsights
discovery:
  # ── list ──
  - discovery_id: azure.timeseriesinsights.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── list_by_environment ──
  - discovery_id: azure.timeseriesinsights.list_by_environment
    calls:
      - action: list_by_environment
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        creation_time: '{{ item.creation_time }}'
        data_string_comparison_behavior: '{{ item.data_string_comparison_behavior }}'
        key_properties: '{{ item.key_properties }}'
    # required_params: ['environment_name']
  # ── list_by_resource_group ──
  - discovery_id: azure.timeseriesinsights.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        kind: '{{ item.kind }}'
        sku: '{{ item.sku }}'
  # ── list_by_subscription ──
  - discovery_id: azure.timeseriesinsights.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        kind: '{{ item.kind }}'
        sku: '{{ item.sku }}'
