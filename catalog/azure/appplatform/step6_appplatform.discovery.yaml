# Discovery YAML — appplatform (Azure)
# Generated: 2026-02-21T05:02:43Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: appplatform
services:
  client: appplatform
  module: azure.mgmt.appplatform
discovery:
  # ── list_build_services ──
  - discovery_id: azure.appplatform.list_build_services
    calls:
      - action: list_build_services
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        system_data: '{{ item.system_data }}'
    # required_params: ['service_name']
  # ── list_by_subscription ──
  - discovery_id: azure.appplatform.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        sku: '{{ item.sku }}'
        system_data: '{{ item.system_data }}'
  # ── list_for_cluster ──
  - discovery_id: azure.appplatform.list_for_cluster
