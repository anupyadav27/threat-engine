# Discovery YAML — chaos (Azure)
# Generated: 2026-02-21T05:02:43Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: chaos
services:
  client: chaos
  module: azure.mgmt.chaos
discovery:
  # ── list_all ──
  - discovery_id: azure.chaos.list_all
    calls:
      - action: list_all
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        name: '{{ item.name }}'
        action_type: '{{ item.action_type }}'
        display: '{{ item.display }}'
        is_data_action: '{{ item.is_data_action }}'
        origin: '{{ item.origin }}'
  # ── list_all_executions ──
  - discovery_id: azure.chaos.list_all_executions
    calls:
      - action: list_all_executions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        type: '{{ item.type }}'
        started_at: '{{ item.started_at }}'
        stopped_at: '{{ item.stopped_at }}'
        system_data: '{{ item.system_data }}'
    # required_params: ['experiment_name']
  # ── Dependent ops ──
  # ── get_execution [dependent] ──
  - discovery_id: azure.chaos.get_execution
    calls:
      - action: get_execution
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        status: '{{ response.status }}'
        type: '{{ response.type }}'
        started_at: '{{ response.started_at }}'
        stopped_at: '{{ response.stopped_at }}'
        system_data: '{{ response.system_data }}'
    # required_params: ['experiment_name', 'execution_id']
  # ── list [dependent] ──
  - discovery_id: azure.chaos.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        system_data: '{{ item.system_data }}'
    # required_params: ['parent_provider_namespace', 'parent_resource_type', 'parent_resource_name']
