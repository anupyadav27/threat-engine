# Discovery YAML — orbital (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: orbital
services:
  client: orbital
  module: azure.mgmt.orbital
discovery:
  # ── list ──
  - discovery_id: azure.orbital.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        links: '{{ item.links }}'
        norad_id: '{{ item.norad_id }}'
        system_data: '{{ item.system_data }}'
        title_line: '{{ item.title_line }}'
        tle_line1: '{{ item.tle_line1 }}'
        tle_line2: '{{ item.tle_line2 }}'
  # ── list_by_capability ──
  - discovery_id: azure.orbital.list_by_capability
    calls:
      - action: list_by_capability
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        altitude_meters: '{{ item.altitude_meters }}'
        city: '{{ item.city }}'
        latitude_degrees: '{{ item.latitude_degrees }}'
        longitude_degrees: '{{ item.longitude_degrees }}'
        provider_name: '{{ item.provider_name }}'
        release_mode: '{{ item.release_mode }}'
    # required_params: ['capability']
  # ── list_by_subscription ──
  - discovery_id: azure.orbital.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        links: '{{ item.links }}'
        norad_id: '{{ item.norad_id }}'
        system_data: '{{ item.system_data }}'
        title_line: '{{ item.title_line }}'
        tle_line1: '{{ item.tle_line1 }}'
        tle_line2: '{{ item.tle_line2 }}'
  # ── Dependent ops ──
  # ── begin_get [dependent] ──
  - discovery_id: azure.orbital.begin_get
    calls:
      - action: begin_get
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        status: '{{ response.status }}'
        end_time: '{{ response.end_time }}'
        error: '{{ response.error }}'
        percent_complete: '{{ response.percent_complete }}'
        properties: '{{ response.properties }}'
        start_time: '{{ response.start_time }}'
        value: '{{ response.value }}'
    # required_params: ['location', 'operation_id']
