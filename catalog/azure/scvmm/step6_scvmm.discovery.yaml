# Discovery YAML — scvmm (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: scvmm
services:
  client: scvmm
  module: azure.mgmt.scvmm
discovery:
  # ── list ──
  - discovery_id: azure.scvmm.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        extended_location: '{{ item.extended_location }}'
        properties: '{{ item.properties }}'
        system_data: '{{ item.system_data }}'
    # required_params: ['resource_uri']
