# Discovery YAML — iothub (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: iothub
services:
  client: iothub
  module: azure.mgmt.iothub
discovery:
  # ── list ──
  - discovery_id: azure.iothub.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        name: '{{ item.name }}'
        display: '{{ item.display }}'
  # ── list_by_iot_hub ──
  - discovery_id: azure.iothub.list_by_iot_hub
    calls:
      - action: list_by_iot_hub
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
    # required_params: ['resource_name']
  # ── list_by_resource_group ──
  - discovery_id: azure.iothub.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        sku: '{{ item.sku }}'
  # ── list_by_subscription ──
  - discovery_id: azure.iothub.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        sku: '{{ item.sku }}'
  # ── list_jobs ──
  - discovery_id: azure.iothub.list_jobs
    calls:
      - action: list_jobs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        status: '{{ item.status }}'
        type: '{{ item.type }}'
        end_time_utc: '{{ item.end_time_utc }}'
        failure_reason: '{{ item.failure_reason }}'
        job_id: '{{ item.job_id }}'
        parent_job_id: '{{ item.parent_job_id }}'
        start_time_utc: '{{ item.start_time_utc }}'
        status_message: '{{ item.status_message }}'
    # required_params: ['resource_name']
  # ── list_keys ──
  - discovery_id: azure.iothub.list_keys
    calls:
      - action: list_keys
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        key_name: '{{ item.key_name }}'
        primary_key: '{{ item.primary_key }}'
        rights: '{{ item.rights }}'
        secondary_key: '{{ item.secondary_key }}'
    # required_params: ['resource_name']
  # ── Dependent ops ──
  # ── check_name_availability [dependent] ──
  - discovery_id: azure.iothub.check_name_availability
    calls:
      - action: check_name_availability
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        message: '{{ response.message }}'
        name_available: '{{ response.name_available }}'
        reason: '{{ response.reason }}'
    # required_params: ['operation_inputs']
  # ── get_endpoint_health [dependent] ──
  - discovery_id: azure.iothub.get_endpoint_health
    calls:
      - action: get_endpoint_health
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        endpoint_id: '{{ response.endpoint_id }}'
        health_status: '{{ response.health_status }}'
    # required_params: ['iot_hub_name']
  # ── get_event_hub_consumer_group [dependent] ──
  - discovery_id: azure.iothub.get_event_hub_consumer_group
    calls:
      - action: get_event_hub_consumer_group
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        type: '{{ response.type }}'
        properties: '{{ response.properties }}'
    # required_params: ['resource_name', 'event_hub_endpoint_name', 'name']
  # ── get_job [dependent] ──
  - discovery_id: azure.iothub.get_job
    calls:
      - action: get_job
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        status: '{{ response.status }}'
        type: '{{ response.type }}'
        end_time_utc: '{{ response.end_time_utc }}'
        failure_reason: '{{ response.failure_reason }}'
        job_id: '{{ response.job_id }}'
        parent_job_id: '{{ response.parent_job_id }}'
        start_time_utc: '{{ response.start_time_utc }}'
        status_message: '{{ response.status_message }}'
    # required_params: ['resource_name', 'job_id']
  # ── get_keys_for_key_name [dependent] ──
  - discovery_id: azure.iothub.get_keys_for_key_name
    calls:
      - action: get_keys_for_key_name
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        key_name: '{{ response.key_name }}'
        primary_key: '{{ response.primary_key }}'
        rights: '{{ response.rights }}'
        secondary_key: '{{ response.secondary_key }}'
    # required_params: ['resource_name', 'key_name']
  # ── get_quota_metrics [dependent] ──
  - discovery_id: azure.iothub.get_quota_metrics
    calls:
      - action: get_quota_metrics
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        name: '{{ response.name }}'
        current_value: '{{ response.current_value }}'
        max_value: '{{ response.max_value }}'
    # required_params: ['resource_name']
  # ── get_stats [dependent] ──
  - discovery_id: azure.iothub.get_stats
    calls:
      - action: get_stats
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        disabled_device_count: '{{ response.disabled_device_count }}'
        enabled_device_count: '{{ response.enabled_device_count }}'
        total_device_count: '{{ response.total_device_count }}'
    # required_params: ['resource_name']
  # ── get_subscription_quota [dependent] ──
  - discovery_id: azure.iothub.get_subscription_quota
    calls:
      - action: get_subscription_quota
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        type: '{{ response.type }}'
        current_value: '{{ response.current_value }}'
        limit: '{{ response.limit }}'
        unit: '{{ response.unit }}'
  # ── get_valid_skus [dependent] ──
  - discovery_id: azure.iothub.get_valid_skus
    calls:
      - action: get_valid_skus
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        capacity: '{{ response.capacity }}'
        resource_type: '{{ response.resource_type }}'
        sku: '{{ response.sku }}'
    # required_params: ['resource_name']
  # ── list_event_hub_consumer_groups [dependent] ──
  - discovery_id: azure.iothub.list_event_hub_consumer_groups
    calls:
      - action: list_event_hub_consumer_groups
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
    # required_params: ['resource_name', 'event_hub_endpoint_name']
