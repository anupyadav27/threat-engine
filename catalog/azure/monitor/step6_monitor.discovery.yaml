# Discovery YAML — monitor (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: monitor
services:
  client: monitor
  module: azure.mgmt.monitor
discovery:
  # ── list ──
  - discovery_id: azure.monitor.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        status: '{{ item.status }}'
        subscription_id: '{{ item.subscription_id }}'
        authorization: '{{ item.authorization }}'
        caller: '{{ item.caller }}'
        category: '{{ item.category }}'
        claims: '{{ item.claims }}'
        correlation_id: '{{ item.correlation_id }}'
        description: '{{ item.description }}'
        event_data_id: '{{ item.event_data_id }}'
        event_name: '{{ item.event_name }}'
        event_timestamp: '{{ item.event_timestamp }}'
        http_request: '{{ item.http_request }}'
        level: '{{ item.level }}'
        operation_id: '{{ item.operation_id }}'
        operation_name: '{{ item.operation_name }}'
        properties: '{{ item.properties }}'
        resource_group_name: '{{ item.resource_group_name }}'
        resource_id: '{{ item.resource_id }}'
        resource_provider_name: '{{ item.resource_provider_name }}'
        resource_type: '{{ item.resource_type }}'
        sub_status: '{{ item.sub_status }}'
        submission_timestamp: '{{ item.submission_timestamp }}'
        tenant_id: '{{ item.tenant_id }}'
  # ── list_at_subscription_scope ──
  - discovery_id: azure.monitor.list_at_subscription_scope
    calls:
      - action: list_at_subscription_scope
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        display_description: '{{ item.display_description }}'
        error_code: '{{ item.error_code }}'
        error_message: '{{ item.error_message }}'
        timeseries: '{{ item.timeseries }}'
        unit: '{{ item.unit }}'
    # required_params: ['region']
  # ── list_at_subscription_scope_post ──
  - discovery_id: azure.monitor.list_at_subscription_scope_post
