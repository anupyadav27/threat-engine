# Discovery YAML — guestconfig (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: guestconfig
services:
  client: guestconfig
  module: azure.mgmt.guestconfig
discovery:
  # ── list [dependent] ──
  - discovery_id: azure.guestconfig.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        properties: '{{ item.properties }}'
    # required_params: ['guest_configuration_assignment_name', 'machine_name']
  # ── rg_list [dependent] ──
  - discovery_id: azure.guestconfig.rg_list
    calls:
      - action: rg_list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        system_data: '{{ item.system_data }}'
  # ── subscription_list [dependent] ──
  - discovery_id: azure.guestconfig.subscription_list
    calls:
      - action: subscription_list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        system_data: '{{ item.system_data }}'
