# Discovery YAML — webpubsub (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: webpubsub
services:
  client: webpubsub
  module: azure.mgmt.webpubsub
discovery:
  # ── list_by_resource_group ──
  - discovery_id: azure.webpubsub.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        private_endpoint_connections: '{{ item.private_endpoint_connections }}'
        provisioning_state: '{{ item.provisioning_state }}'
        public_network_access: '{{ item.public_network_access }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        disable_aad_auth: '{{ item.disable_aad_auth }}'
        disable_local_auth: '{{ item.disable_local_auth }}'
        external_ip: '{{ item.external_ip }}'
        host_name: '{{ item.host_name }}'
        host_name_prefix: '{{ item.host_name_prefix }}'
        kind: '{{ item.kind }}'
        live_trace_configuration: '{{ item.live_trace_configuration }}'
        network_ac_ls: '{{ item.network_ac_ls }}'
        public_port: '{{ item.public_port }}'
        region_endpoint_enabled: '{{ item.region_endpoint_enabled }}'
        resource_log_configuration: '{{ item.resource_log_configuration }}'
        resource_stopped: '{{ item.resource_stopped }}'
        server_port: '{{ item.server_port }}'
        shared_private_link_resources: '{{ item.shared_private_link_resources }}'
        sku: '{{ item.sku }}'
        socket_io: '{{ item.socket_io }}'
        system_data: '{{ item.system_data }}'
        tls: '{{ item.tls }}'
        version: '{{ item.version }}'
  # ── list_by_subscription ──
  - discovery_id: azure.webpubsub.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        private_endpoint_connections: '{{ item.private_endpoint_connections }}'
        provisioning_state: '{{ item.provisioning_state }}'
