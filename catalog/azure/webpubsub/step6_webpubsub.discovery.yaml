        resource_stopped: '{{ item.resource_stopped }}'
        server_port: '{{ item.server_port }}'
        shared_private_link_resources: '{{ item.shared_private_link_resources }}'
        sku: '{{ item.sku }}'
        socket_io: '{{ item.socket_io }}'
        system_data: '{{ item.system_data }}'
        tls: '{{ item.tls }}'
        version: '{{ item.version }}'
  # ── list_keys ──
  - discovery_id: azure.webpubsub.list_keys
    calls:
      - action: list_keys
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.primary_key }}'
      item:
        primary_connection_string: '{{ item.primary_connection_string }}'
        primary_key: '{{ item.primary_key }}'
        secondary_connection_string: '{{ item.secondary_connection_string }}'
        secondary_key: '{{ item.secondary_key }}'
