  # ── list_skus ──
  - discovery_id: azure.webpubsub.list_skus
    calls:
      - action: list_skus
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        capacity: '{{ item.capacity }}'
        resource_type: '{{ item.resource_type }}'
        sku: '{{ item.sku }}'
    # required_params: ['resource_name']
  # ── Dependent ops ──
  # ── check_name_availability [dependent] ──
  - discovery_id: azure.webpubsub.check_name_availability
    calls:
      - action: check_name_availability
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        message: '{{ response.message }}'
        name_available: '{{ response.name_available }}'
