        type: '{{ item.type }}'
        group_id: '{{ item.group_id }}'
        private_link_resource_id: '{{ item.private_link_resource_id }}'
        request_message: '{{ item.request_message }}'
        system_data: '{{ item.system_data }}'
    # required_params: ['resource_name', 'replica_name']
  # ── list_replica_skus [dependent] ──
  - discovery_id: azure.webpubsub.list_replica_skus
