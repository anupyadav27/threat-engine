# Discovery YAML — workloads (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: workloads
services:
  client: workloads
  module: azure.mgmt.workloads
discovery:
  # ── list ──
  - discovery_id: azure.workloads.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        type: '{{ item.type }}'
        grouping: '{{ item.grouping }}'
        system_data: '{{ item.system_data }}'
        top_metrics_thresholds: '{{ item.top_metrics_thresholds }}'
    # required_params: ['monitor_name']
  # ── list_by_resource_group ──
  - discovery_id: azure.workloads.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        status: '{{ item.status }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        configuration: '{{ item.configuration }}'
        environment: '{{ item.environment }}'
        errors: '{{ item.errors }}'
        health: '{{ item.health }}'
        managed_resource_group_configuration: '{{ item.managed_resource_group_configuration }}'
        sap_product: '{{ item.sap_product }}'
        state: '{{ item.state }}'
        system_data: '{{ item.system_data }}'
  # ── list_by_subscription ──
  - discovery_id: azure.workloads.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        status: '{{ item.status }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        configuration: '{{ item.configuration }}'
        environment: '{{ item.environment }}'
        errors: '{{ item.errors }}'
        health: '{{ item.health }}'
        managed_resource_group_configuration: '{{ item.managed_resource_group_configuration }}'
        sap_product: '{{ item.sap_product }}'
        state: '{{ item.state }}'
        system_data: '{{ item.system_data }}'
