# Discovery YAML — communication (Azure)
# Generated: 2026-02-21T05:02:43Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: communication
services:
  client: communication
  module: azure.mgmt.communication
discovery:
  # ── list ──
  - discovery_id: azure.communication.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        name: '{{ item.name }}'
        action_type: '{{ item.action_type }}'
        display: '{{ item.display }}'
        is_data_action: '{{ item.is_data_action }}'
        origin: '{{ item.origin }}'
  # ── list_by_email_service_resource ──
  - discovery_id: azure.communication.list_by_email_service_resource
    calls:
      - action: list_by_email_service_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        data_location: '{{ item.data_location }}'
        domain_management: '{{ item.domain_management }}'
        from_sender_domain: '{{ item.from_sender_domain }}'
        mail_from_sender_domain: '{{ item.mail_from_sender_domain }}'
        system_data: '{{ item.system_data }}'
        user_engagement_tracking: '{{ item.user_engagement_tracking }}'
        verification_records: '{{ item.verification_records }}'
        verification_states: '{{ item.verification_states }}'
    # required_params: ['email_service_name']
  # ── list_by_resource_group ──
  - discovery_id: azure.communication.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        data_location: '{{ item.data_location }}'
        system_data: '{{ item.system_data }}'
  # ── list_by_subscription ──
  - discovery_id: azure.communication.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        data_location: '{{ item.data_location }}'
        system_data: '{{ item.system_data }}'
  # ── list_keys ──
  - discovery_id: azure.communication.list_keys
    calls:
      - action: list_keys
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.primary_key }}'
      item:
        primary_connection_string: '{{ item.primary_connection_string }}'
        primary_key: '{{ item.primary_key }}'
        secondary_connection_string: '{{ item.secondary_connection_string }}'
        secondary_key: '{{ item.secondary_key }}'
    # required_params: ['communication_service_name']
  # ── list_verified_exchange_online_domains ──
  - discovery_id: azure.communication.list_verified_exchange_online_domains
    calls:
      - action: list_verified_exchange_online_domains
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        PrincipalId: '{{ item.PrincipalId }}'
        Type: '{{ item.Type }}'
        action_type: '{{ item.action_type }}'
        data_location: '{{ item.data_location }}'
        display: '{{ item.display }}'
        display_name: '{{ item.display_name }}'
        domain_management: '{{ item.domain_management }}'
        from_sender_domain: '{{ item.from_sender_domain }}'
        host_name: '{{ item.host_name }}'
        immutable_resource_id: '{{ item.immutable_resource_id }}'
        is_data_action: '{{ item.is_data_action }}'
        linked_domains: '{{ item.linked_domains }}'
        mail_from_sender_domain: '{{ item.mail_from_sender_domain }}'
        notification_hub_id: '{{ item.notification_hub_id }}'
        origin: '{{ item.origin }}'
        primary_connection_string: '{{ item.primary_connection_string }}'
        primary_key: '{{ item.primary_key }}'
        secondary_connection_string: '{{ item.secondary_connection_string }}'
        secondary_key: '{{ item.secondary_key }}'
        system_data: '{{ item.system_data }}'
        user_engagement_tracking: '{{ item.user_engagement_tracking }}'
        username: '{{ item.username }}'
        verification_records: '{{ item.verification_records }}'
        verification_states: '{{ item.verification_states }}'
        version: '{{ item.version }}'
  # ── Dependent ops ──
  # ── check_name_availability [dependent] ──
  - discovery_id: azure.communication.check_name_availability
    calls:
      - action: check_name_availability
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        message: '{{ response.message }}'
        name_available: '{{ response.name_available }}'
        reason: '{{ response.reason }}'
    # required_params: ['name_availability_parameters']
  # ── list_by_domains [dependent] ──
  - discovery_id: azure.communication.list_by_domains
    calls:
      - action: list_by_domains
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        type: '{{ item.type }}'
        data_location: '{{ item.data_location }}'
        display_name: '{{ item.display_name }}'
        system_data: '{{ item.system_data }}'
        username: '{{ item.username }}'
    # required_params: ['email_service_name', 'domain_name']
