# Discovery YAML — frontdoor (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: frontdoor
services:
  client: frontdoor
  module: azure.mgmt.frontdoor
discovery:
  # ── list ──
  - discovery_id: azure.frontdoor.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        backend: '{{ item.backend }}'
        description: '{{ item.description }}'
        endpoint: '{{ item.endpoint }}'
        endpoint_type: '{{ item.endpoint_type }}'
    # required_params: ['profile_name']
  # ── list_by_front_door ──
  - discovery_id: azure.frontdoor.list_by_front_door
    calls:
      - action: list_by_front_door
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        resource_state: '{{ item.resource_state }}'
        rules: '{{ item.rules }}'
    # required_params: ['front_door_name']
  # ── list_by_profile ──
  - discovery_id: azure.frontdoor.list_by_profile
    calls:
      - action: list_by_profile
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        description: '{{ item.description }}'
        enabled_state: '{{ item.enabled_state }}'
        endpoint_a: '{{ item.endpoint_a }}'
        endpoint_b: '{{ item.endpoint_b }}'
        resource_state: '{{ item.resource_state }}'
        script_file_uri: '{{ item.script_file_uri }}'
    # required_params: ['profile_name']
  # ── list_by_resource_group ──
  - discovery_id: azure.frontdoor.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        enabled_state: '{{ item.enabled_state }}'
        resource_state: '{{ item.resource_state }}'
  # ── list_by_subscription ──
  - discovery_id: azure.frontdoor.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        custom_rules: '{{ item.custom_rules }}'
        frontend_endpoint_links: '{{ item.frontend_endpoint_links }}'
        managed_rules: '{{ item.managed_rules }}'
        policy_settings: '{{ item.policy_settings }}'
        resource_state: '{{ item.resource_state }}'
        routing_rule_links: '{{ item.routing_rule_links }}'
        security_policy_links: '{{ item.security_policy_links }}'
        sku: '{{ item.sku }}'
  # ── Dependent ops ──
  # ── get_latency_scorecards [dependent] ──
  - discovery_id: azure.frontdoor.get_latency_scorecards
    calls:
      - action: get_latency_scorecards
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        location: '{{ response.location }}'
        name: '{{ response.name }}'
        tags: '{{ response.tags }}'
        type: '{{ response.type }}'
        country: '{{ response.country }}'
        description: '{{ response.description }}'
        end_date_time_utc: '{{ response.end_date_time_utc }}'
        endpoint_a: '{{ response.endpoint_a }}'
        endpoint_b: '{{ response.endpoint_b }}'
        id_properties_id: '{{ response.id_properties_id }}'
        latency_metrics: '{{ response.latency_metrics }}'
        name_properties_name: '{{ response.name_properties_name }}'
        start_date_time_utc: '{{ response.start_date_time_utc }}'
    # required_params: ['profile_name', 'experiment_name', 'aggregation_interval']
  # ── get_timeseries [dependent] ──
  - discovery_id: azure.frontdoor.get_timeseries
    calls:
      - action: get_timeseries
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        location: '{{ response.location }}'
        name: '{{ response.name }}'
        tags: '{{ response.tags }}'
        type: '{{ response.type }}'
        aggregation_interval: '{{ response.aggregation_interval }}'
        country: '{{ response.country }}'
        end_date_time_utc: '{{ response.end_date_time_utc }}'
        endpoint: '{{ response.endpoint }}'
        start_date_time_utc: '{{ response.start_date_time_utc }}'
        timeseries_data: '{{ response.timeseries_data }}'
        timeseries_type: '{{ response.timeseries_type }}'
    # required_params: ['profile_name', 'experiment_name', 'start_date_time_utc', 'end_date_time_utc', 'aggregation_interval', 'timeseries_type']
