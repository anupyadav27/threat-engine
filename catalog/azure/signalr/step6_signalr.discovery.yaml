# Discovery YAML — signalr (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: signalr
services:
  client: signalr
  module: azure.mgmt.signalr
discovery:
  # ── list ──
  - discovery_id: azure.signalr.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        current_value: '{{ item.current_value }}'
        limit: '{{ item.limit }}'
        unit: '{{ item.unit }}'
    # required_params: ['location']
  # ── list_by_resource_group ──
  - discovery_id: azure.signalr.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        private_endpoint_connections: '{{ item.private_endpoint_connections }}'
        provisioning_state: '{{ item.provisioning_state }}'
        public_network_access: '{{ item.public_network_access }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        cors: '{{ item.cors }}'
        disable_aad_auth: '{{ item.disable_aad_auth }}'
        disable_local_auth: '{{ item.disable_local_auth }}'
        external_ip: '{{ item.external_ip }}'
        features: '{{ item.features }}'
        host_name: '{{ item.host_name }}'
        host_name_prefix: '{{ item.host_name_prefix }}'
        kind: '{{ item.kind }}'
        live_trace_configuration: '{{ item.live_trace_configuration }}'
        network_ac_ls: '{{ item.network_ac_ls }}'
        public_port: '{{ item.public_port }}'
        resource_log_configuration: '{{ item.resource_log_configuration }}'
        server_port: '{{ item.server_port }}'
        serverless: '{{ item.serverless }}'
        shared_private_link_resources: '{{ item.shared_private_link_resources }}'
        sku: '{{ item.sku }}'
        system_data: '{{ item.system_data }}'
        tls: '{{ item.tls }}'
        upstream: '{{ item.upstream }}'
        version: '{{ item.version }}'
  # ── list_by_subscription ──
  - discovery_id: azure.signalr.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        private_endpoint_connections: '{{ item.private_endpoint_connections }}'
        provisioning_state: '{{ item.provisioning_state }}'
        public_network_access: '{{ item.public_network_access }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        cors: '{{ item.cors }}'
        disable_aad_auth: '{{ item.disable_aad_auth }}'
        disable_local_auth: '{{ item.disable_local_auth }}'
        external_ip: '{{ item.external_ip }}'
        features: '{{ item.features }}'
        host_name: '{{ item.host_name }}'
        host_name_prefix: '{{ item.host_name_prefix }}'
        kind: '{{ item.kind }}'
        live_trace_configuration: '{{ item.live_trace_configuration }}'
        network_ac_ls: '{{ item.network_ac_ls }}'
        public_port: '{{ item.public_port }}'
        resource_log_configuration: '{{ item.resource_log_configuration }}'
        server_port: '{{ item.server_port }}'
        serverless: '{{ item.serverless }}'
        shared_private_link_resources: '{{ item.shared_private_link_resources }}'
        sku: '{{ item.sku }}'
        system_data: '{{ item.system_data }}'
        tls: '{{ item.tls }}'
        upstream: '{{ item.upstream }}'
        version: '{{ item.version }}'
  # ── list_keys ──
  - discovery_id: azure.signalr.list_keys
    calls:
      - action: list_keys
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.primary_key }}'
      item:
        primary_connection_string: '{{ item.primary_connection_string }}'
        primary_key: '{{ item.primary_key }}'
        secondary_connection_string: '{{ item.secondary_connection_string }}'
        secondary_key: '{{ item.secondary_key }}'
    # required_params: ['resource_name']
  # ── list_skus ──
  - discovery_id: azure.signalr.list_skus
    calls:
      - action: list_skus
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        capacity: '{{ item.capacity }}'
        resource_type: '{{ item.resource_type }}'
        sku: '{{ item.sku }}'
    # required_params: ['resource_name']
  # ── Dependent ops ──
  # ── check_name_availability [dependent] ──
  - discovery_id: azure.signalr.check_name_availability
    calls:
      - action: check_name_availability
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        message: '{{ response.message }}'
        name_available: '{{ response.name_available }}'
        reason: '{{ response.reason }}'
    # required_params: ['location', 'parameters']
