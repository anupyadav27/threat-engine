# Discovery YAML — media (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: media
services:
  client: media
  module: azure.mgmt.media
discovery:
  # ── list_by_subscription ──
  - discovery_id: azure.media.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        encryption: '{{ item.encryption }}'
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        private_endpoint_connections: '{{ item.private_endpoint_connections }}'
        provisioning_state: '{{ item.provisioning_state }}'
        public_network_access: '{{ item.public_network_access }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        key_delivery: '{{ item.key_delivery }}'
        media_service_id: '{{ item.media_service_id }}'
        storage_accounts: '{{ item.storage_accounts }}'
        storage_authentication: '{{ item.storage_authentication }}'
        system_data: '{{ item.system_data }}'
  # ── Dependent ops ──
  # ── check_name_availability [dependent] ──
  - discovery_id: azure.media.check_name_availability
    calls:
      - action: check_name_availability
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        message: '{{ response.message }}'
        name_available: '{{ response.name_available }}'
        reason: '{{ response.reason }}'
    # required_params: ['location_name', 'parameters']
  # ── get_encryption_key [dependent] ──
  - discovery_id: azure.media.get_encryption_key
    calls:
      - action: get_encryption_key
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        asset_file_encryption_metadata: '{{ response.asset_file_encryption_metadata }}'
        key: '{{ response.key }}'
    # required_params: ['account_name', 'asset_name']
  # ── get_policy_properties_with_secrets [dependent] ──
  - discovery_id: azure.media.get_policy_properties_with_secrets
    calls:
      - action: get_policy_properties_with_secrets
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        created: '{{ response.created }}'
        description: '{{ response.description }}'
        last_modified: '{{ response.last_modified }}'
        options: '{{ response.options }}'
        policy_id: '{{ response.policy_id }}'
    # required_params: ['account_name', 'content_key_policy_name']
  # ── list [dependent] ──
  - discovery_id: azure.media.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        type: '{{ item.type }}'
        track: '{{ item.track }}'
    # required_params: ['account_name', 'asset_name']
  # ── list_container_sas [dependent] ──
  - discovery_id: azure.media.list_container_sas
    calls:
      - action: list_container_sas
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.asset_container_sas_urls }}'
      item:
        asset_container_sas_urls: '{{ item.asset_container_sas_urls }}'
    # required_params: ['account_name', 'asset_name', 'parameters']
  # ── list_content_keys [dependent] ──
  - discovery_id: azure.media.list_content_keys
    calls:
      - action: list_content_keys
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.content_keys }}'
      item:
        content_keys: '{{ item.content_keys }}'
    # required_params: ['account_name', 'streaming_locator_name']
  # ── list_edge_policies [dependent] ──
  - discovery_id: azure.media.list_edge_policies
    calls:
      - action: list_edge_policies
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.usage_data_collection_policy }}'
      item:
        usage_data_collection_policy: '{{ item.usage_data_collection_policy }}'
    # required_params: ['account_name', 'parameters']
  # ── list_paths [dependent] ──
  - discovery_id: azure.media.list_paths
    calls:
      - action: list_paths
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.streaming_paths }}'
      item:
        download_paths: '{{ item.download_paths }}'
        streaming_paths: '{{ item.streaming_paths }}'
    # required_params: ['account_name', 'streaming_locator_name']
  # ── list_streaming_locators [dependent] ──
  - discovery_id: azure.media.list_streaming_locators
    calls:
      - action: list_streaming_locators
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.streaming_locators }}'
      item:
        streaming_locators: '{{ item.streaming_locators }}'
    # required_params: ['account_name', 'asset_name']
