# Discovery YAML — applicationinsights (Azure)
# Generated: 2026-02-21T05:02:43Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: applicationinsights
services:
  client: applicationinsights
  module: azure.mgmt.applicationinsights
discovery:
  # ── list ──
  - discovery_id: azure.applicationinsights.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        configuration: '{{ item.configuration }}'
        description: '{{ item.description }}'
        enabled: '{{ item.enabled }}'
        frequency: '{{ item.frequency }}'
        kind: '{{ item.kind }}'
        locations: '{{ item.locations }}'
        request: '{{ item.request }}'
        retry_enabled: '{{ item.retry_enabled }}'
        synthetic_monitor_id: '{{ item.synthetic_monitor_id }}'
        timeout: '{{ item.timeout }}'
        validation_rules: '{{ item.validation_rules }}'
        web_test_kind: '{{ item.web_test_kind }}'
        web_test_name: '{{ item.web_test_name }}'
  # ── list_by_component ──
  - discovery_id: azure.applicationinsights.list_by_component
    calls:
      - action: list_by_component
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        configuration: '{{ item.configuration }}'
        description: '{{ item.description }}'
        enabled: '{{ item.enabled }}'
        frequency: '{{ item.frequency }}'
        kind: '{{ item.kind }}'
        locations: '{{ item.locations }}'
        request: '{{ item.request }}'
        retry_enabled: '{{ item.retry_enabled }}'
        synthetic_monitor_id: '{{ item.synthetic_monitor_id }}'
        timeout: '{{ item.timeout }}'
        validation_rules: '{{ item.validation_rules }}'
        web_test_kind: '{{ item.web_test_kind }}'
        web_test_name: '{{ item.web_test_name }}'
    # required_params: ['component_name']
  # ── list_by_resource_group ──
  - discovery_id: azure.applicationinsights.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        configuration: '{{ item.configuration }}'
        description: '{{ item.description }}'
        enabled: '{{ item.enabled }}'
        frequency: '{{ item.frequency }}'
        kind: '{{ item.kind }}'
        locations: '{{ item.locations }}'
        request: '{{ item.request }}'
        retry_enabled: '{{ item.retry_enabled }}'
        synthetic_monitor_id: '{{ item.synthetic_monitor_id }}'
        timeout: '{{ item.timeout }}'
        validation_rules: '{{ item.validation_rules }}'
        web_test_kind: '{{ item.web_test_kind }}'
        web_test_name: '{{ item.web_test_name }}'
  # ── Dependent ops ──
  # ── get_purge_status [dependent] ──
  - discovery_id: azure.applicationinsights.get_purge_status
    calls:
      - action: get_purge_status
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        status: '{{ response.status }}'
