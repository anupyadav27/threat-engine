# Discovery YAML — notificationhubs (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: notificationhubs
services:
  client: notificationhubs
  module: azure.mgmt.notificationhubs
discovery:
  # ── list ──
  - discovery_id: azure.notificationhubs.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── list_all ──
  - discovery_id: azure.notificationhubs.list_all
    calls:
      - action: list_all
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── Dependent ops ──
  # ── get_authorization_rule [dependent] ──
  - discovery_id: azure.notificationhubs.get_authorization_rule
    calls:
      - action: get_authorization_rule
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        location: '{{ response.location }}'
        name: '{{ response.name }}'
        tags: '{{ response.tags }}'
        type: '{{ response.type }}'
        claim_type: '{{ response.claim_type }}'
        claim_value: '{{ response.claim_value }}'
        created_time: '{{ response.created_time }}'
        key_name: '{{ response.key_name }}'
        modified_time: '{{ response.modified_time }}'
        primary_key: '{{ response.primary_key }}'
        revision: '{{ response.revision }}'
        rights: '{{ response.rights }}'
        secondary_key: '{{ response.secondary_key }}'
        sku: '{{ response.sku }}'
    # required_params: ['namespace_name', 'notification_hub_name', 'authorization_rule_name']
  # ── get_pns_credentials [dependent] ──
  - discovery_id: azure.notificationhubs.get_pns_credentials
    calls:
      - action: get_pns_credentials
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        location: '{{ response.location }}'
        name: '{{ response.name }}'
        tags: '{{ response.tags }}'
        type: '{{ response.type }}'
        adm_credential: '{{ response.adm_credential }}'
        apns_credential: '{{ response.apns_credential }}'
        baidu_credential: '{{ response.baidu_credential }}'
        gcm_credential: '{{ response.gcm_credential }}'
        mpns_credential: '{{ response.mpns_credential }}'
        sku: '{{ response.sku }}'
        wns_credential: '{{ response.wns_credential }}'
    # required_params: ['namespace_name', 'notification_hub_name']
  # ── list_authorization_rules [dependent] ──
  - discovery_id: azure.notificationhubs.list_authorization_rules
    calls:
      - action: list_authorization_rules
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
    # required_params: ['namespace_name', 'notification_hub_name']
  # ── list_keys [dependent] ──
  - discovery_id: azure.notificationhubs.list_keys
    calls:
      - action: list_keys
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.primary_connection_string }}'
      item:
        key_name: '{{ item.key_name }}'
        primary_connection_string: '{{ item.primary_connection_string }}'
        primary_key: '{{ item.primary_key }}'
        secondary_connection_string: '{{ item.secondary_connection_string }}'
        secondary_key: '{{ item.secondary_key }}'
    # required_params: ['namespace_name', 'notification_hub_name', 'authorization_rule_name']
