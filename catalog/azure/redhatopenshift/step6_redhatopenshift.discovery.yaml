# Discovery YAML — redhatopenshift (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: redhatopenshift
services:
  client: redhatopenshift
  module: azure.mgmt.redhatopenshift
discovery:
  # ── list ──
  - discovery_id: azure.redhatopenshift.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        resources: '{{ item.resources }}'
        system_data: '{{ item.system_data }}'
    # required_params: ['resource_name']
  # ── list_admin_credentials ──
  - discovery_id: azure.redhatopenshift.list_admin_credentials
    calls:
      - action: list_admin_credentials
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.kubeconfig }}'
      item:
        kubeconfig: '{{ item.kubeconfig }}'
    # required_params: ['resource_name']
  # ── list_by_resource_group ──
  - discovery_id: azure.redhatopenshift.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        apiserver_profile: '{{ item.apiserver_profile }}'
        cluster_profile: '{{ item.cluster_profile }}'
        console_profile: '{{ item.console_profile }}'
        ingress_profiles: '{{ item.ingress_profiles }}'
        master_profile: '{{ item.master_profile }}'
        network_profile: '{{ item.network_profile }}'
        service_principal_profile: '{{ item.service_principal_profile }}'
        system_data: '{{ item.system_data }}'
        worker_profiles: '{{ item.worker_profiles }}'
        worker_profiles_status: '{{ item.worker_profiles_status }}'
  # ── list_credentials ──
  - discovery_id: azure.redhatopenshift.list_credentials
    calls:
      - action: list_credentials
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.kubeadmin_username }}'
      item:
        kubeadmin_password: '{{ item.kubeadmin_password }}'
        kubeadmin_username: '{{ item.kubeadmin_username }}'
    # required_params: ['resource_name']
