# Discovery YAML — playwrighttesting (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: playwrighttesting
services:
  client: playwrighttesting
  module: azure.mgmt.playwrighttesting
discovery:
  # ── list ──
  - discovery_id: azure.playwrighttesting.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        name: '{{ item.name }}'
        action_type: '{{ item.action_type }}'
        display: '{{ item.display }}'
        is_data_action: '{{ item.is_data_action }}'
        origin: '{{ item.origin }}'
  # ── list_by_account ──
  - discovery_id: azure.playwrighttesting.list_by_account
    calls:
      - action: list_by_account
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        properties: '{{ item.properties }}'
    # required_params: ['account_name']
  # ── list_by_resource_group ──
  - discovery_id: azure.playwrighttesting.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        properties: '{{ item.properties }}'
  # ── list_by_subscription ──
  - discovery_id: azure.playwrighttesting.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        properties: '{{ item.properties }}'
    # required_params: ['location']
  # ── Dependent ops ──
  # ── check_name_availability [dependent] ──
  - discovery_id: azure.playwrighttesting.check_name_availability
    calls:
      - action: check_name_availability
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        message: '{{ response.message }}'
        name_available: '{{ response.name_available }}'
        reason: '{{ response.reason }}'
    # required_params: ['body']
