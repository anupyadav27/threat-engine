# Discovery YAML — workloadmonitor (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: workloadmonitor
services:
  client: workloadmonitor
  module: azure.mgmt.workloadmonitor
discovery:
  # ── get_state_change [dependent] ──
  - discovery_id: azure.workloadmonitor.get_state_change
    calls:
      - action: get_state_change
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        type: '{{ response.type }}'
        current_monitor_state: '{{ response.current_monitor_state }}'
        current_state_first_observed_timestamp: '{{ response.current_state_first_observed_timestamp }}'
        evaluation_timestamp: '{{ response.evaluation_timestamp }}'
        evidence: '{{ response.evidence }}'
        monitor_configuration: '{{ response.monitor_configuration }}'
        monitor_name: '{{ response.monitor_name }}'
        monitor_type: '{{ response.monitor_type }}'
        monitored_object: '{{ response.monitored_object }}'
        previous_monitor_state: '{{ response.previous_monitor_state }}'
    # required_params: ['provider_name', 'resource_collection_name', 'resource_name', 'monitor_id', 'timestamp_unix']
  # ── list [dependent] ──
  - discovery_id: azure.workloadmonitor.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        current_monitor_state: '{{ item.current_monitor_state }}'
        current_state_first_observed_timestamp: '{{ item.current_state_first_observed_timestamp }}'
        evaluation_timestamp: '{{ item.evaluation_timestamp }}'
        evidence: '{{ item.evidence }}'
        last_reported_timestamp: '{{ item.last_reported_timestamp }}'
        monitor_configuration: '{{ item.monitor_configuration }}'
        monitor_name: '{{ item.monitor_name }}'
        monitor_type: '{{ item.monitor_type }}'
        monitored_object: '{{ item.monitored_object }}'
        parent_monitor_name: '{{ item.parent_monitor_name }}'
        previous_monitor_state: '{{ item.previous_monitor_state }}'
    # required_params: ['provider_name', 'resource_collection_name', 'resource_name']
  # ── list_state_changes [dependent] ──
  - discovery_id: azure.workloadmonitor.list_state_changes
    calls:
      - action: list_state_changes
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        current_monitor_state: '{{ item.current_monitor_state }}'
        current_state_first_observed_timestamp: '{{ item.current_state_first_observed_timestamp }}'
        evaluation_timestamp: '{{ item.evaluation_timestamp }}'
        evidence: '{{ item.evidence }}'
        monitor_configuration: '{{ item.monitor_configuration }}'
        monitor_name: '{{ item.monitor_name }}'
        monitor_type: '{{ item.monitor_type }}'
        monitored_object: '{{ item.monitored_object }}'
        previous_monitor_state: '{{ item.previous_monitor_state }}'
    # required_params: ['provider_name', 'resource_collection_name', 'resource_name', 'monitor_id']
