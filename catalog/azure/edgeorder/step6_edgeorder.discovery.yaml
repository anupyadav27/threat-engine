    calls:
      - action: list_addresses_at_resource_group_level
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        address_validation_status: '{{ item.address_validation_status }}'
        contact_details: '{{ item.contact_details }}'
