# Discovery YAML — edgeorder (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: edgeorder
services:
  client: edgeorder
  module: azure.mgmt.edgeorder
