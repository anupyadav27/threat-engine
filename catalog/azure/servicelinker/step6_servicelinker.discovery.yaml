# Discovery YAML — servicelinker (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: servicelinker
services:
  client: servicelinker
  module: azure.mgmt.servicelinker
discovery:
  # ── list ──
  - discovery_id: azure.servicelinker.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── Dependent ops ──
  # ── list_configurations [dependent] ──
  - discovery_id: azure.servicelinker.list_configurations
    calls:
      - action: list_configurations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.configurations }}'
      item:
        configurations: '{{ item.configurations }}'
    # required_params: ['resource_uri', 'linker_name']
