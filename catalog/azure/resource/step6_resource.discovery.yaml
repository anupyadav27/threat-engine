# Discovery YAML — resource (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: resource
services:
  client: resource
  module: azure.mgmt.resource
discovery:
  # ── list_by_resource_group ──
  - discovery_id: azure.resource.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        application_resource_id: '{{ item.application_resource_id }}'
        created_by: '{{ item.created_by }}'
        jit_authorization_policies: '{{ item.jit_authorization_policies }}'
        jit_request_state: '{{ item.jit_request_state }}'
        jit_scheduling_policy: '{{ item.jit_scheduling_policy }}'
        publisher_tenant_id: '{{ item.publisher_tenant_id }}'
        updated_by: '{{ item.updated_by }}'
  # ── list_by_subscription ──
  - discovery_id: azure.resource.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        application_resource_id: '{{ item.application_resource_id }}'
        created_by: '{{ item.created_by }}'
        jit_authorization_policies: '{{ item.jit_authorization_policies }}'
        jit_request_state: '{{ item.jit_request_state }}'
        jit_scheduling_policy: '{{ item.jit_scheduling_policy }}'
        publisher_tenant_id: '{{ item.publisher_tenant_id }}'
        updated_by: '{{ item.updated_by }}'
  # ── list_operations ──
  - discovery_id: azure.resource.list_operations
    calls:
      - action: list_operations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        name: '{{ item.name }}'
        action_type: '{{ item.action_type }}'
        display: '{{ item.display }}'
        is_data_action: '{{ item.is_data_action }}'
        origin: '{{ item.origin }}'
  # ── Dependent ops ──
  # ── get_by_id [dependent] ──
  - discovery_id: azure.resource.get_by_id
    calls:
      - action: get_by_id
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        identity: '{{ response.identity }}'
        location: '{{ response.location }}'
        name: '{{ response.name }}'
        provisioning_state: '{{ response.provisioning_state }}'
        tags: '{{ response.tags }}'
        type: '{{ response.type }}'
        application_definition_id: '{{ response.application_definition_id }}'
        artifacts: '{{ response.artifacts }}'
        authorizations: '{{ response.authorizations }}'
        billing_details: '{{ response.billing_details }}'
        created_by: '{{ response.created_by }}'
        customer_support: '{{ response.customer_support }}'
        jit_access_policy: '{{ response.jit_access_policy }}'
        kind: '{{ response.kind }}'
        managed_by: '{{ response.managed_by }}'
        managed_resource_group_id: '{{ response.managed_resource_group_id }}'
        management_mode: '{{ response.management_mode }}'
        outputs: '{{ response.outputs }}'
        parameters: '{{ response.parameters }}'
        plan: '{{ response.plan }}'
        publisher_tenant_id: '{{ response.publisher_tenant_id }}'
        sku: '{{ response.sku }}'
        support_urls: '{{ response.support_urls }}'
        updated_by: '{{ response.updated_by }}'
    # required_params: ['application_id']
