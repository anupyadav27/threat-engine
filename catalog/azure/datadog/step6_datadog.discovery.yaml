# Discovery YAML — datadog (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: datadog
services:
  client: datadog
  module: azure.mgmt.datadog
discovery:
  # ── list ──
  - discovery_id: azure.datadog.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        system_data: '{{ item.system_data }}'
    # required_params: ['monitor_name']
  # ── list_api_keys ──
  - discovery_id: azure.datadog.list_api_keys
    calls:
      - action: list_api_keys
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        name: '{{ item.name }}'
        created: '{{ item.created }}'
        created_by: '{{ item.created_by }}'
        key: '{{ item.key }}'
    # required_params: ['monitor_name']
  # ── list_by_resource_group ──
  - discovery_id: azure.datadog.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        identity: '{{ item.identity }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        sku: '{{ item.sku }}'
        system_data: '{{ item.system_data }}'
  # ── list_hosts ──
  - discovery_id: azure.datadog.list_hosts
    calls:
      - action: list_hosts
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        name: '{{ item.name }}'
        aliases: '{{ item.aliases }}'
        apps: '{{ item.apps }}'
        meta: '{{ item.meta }}'
    # required_params: ['monitor_name']
  # ── list_linked_resources ──
  - discovery_id: azure.datadog.list_linked_resources
    calls:
      - action: list_linked_resources
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
    # required_params: ['monitor_name']
  # ── list_monitored_resources ──
  - discovery_id: azure.datadog.list_monitored_resources
    calls:
      - action: list_monitored_resources
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        reason_for_logs_status: '{{ item.reason_for_logs_status }}'
        reason_for_metrics_status: '{{ item.reason_for_metrics_status }}'
        sending_logs: '{{ item.sending_logs }}'
        sending_metrics: '{{ item.sending_metrics }}'
    # required_params: ['monitor_name']
  # ── Dependent ops ──
  # ── get_default_key [dependent] ──
  - discovery_id: azure.datadog.get_default_key
    calls:
      - action: get_default_key
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        name: '{{ response.name }}'
        created: '{{ response.created }}'
        created_by: '{{ response.created_by }}'
        key: '{{ response.key }}'
    # required_params: ['monitor_name']
