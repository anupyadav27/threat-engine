# Discovery YAML — resourcegraph (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: resourcegraph
services:
  client: resourcegraph
  module: azure.mgmt.resourcegraph
discovery:
  # ── list ──
  - discovery_id: azure.resourcegraph.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        name: '{{ item.name }}'
        display: '{{ item.display }}'
        origin: '{{ item.origin }}'
  # ── list_by_subscription ──
  - discovery_id: azure.resourcegraph.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        description: '{{ item.description }}'
        query: '{{ item.query }}'
        result_kind: '{{ item.result_kind }}'
        time_modified: '{{ item.time_modified }}'
