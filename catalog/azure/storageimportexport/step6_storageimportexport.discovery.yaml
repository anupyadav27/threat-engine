# Discovery YAML — storageimportexport (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: storageimportexport
services:
  client: storageimportexport
  module: azure.mgmt.storageimportexport
discovery:
  # ── list ──
  - discovery_id: azure.storageimportexport.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        name: '{{ item.name }}'
        description: '{{ item.description }}'
        operation: '{{ item.operation }}'
        provider: '{{ item.provider }}'
        resource: '{{ item.resource }}'
  # ── list_by_resource_group ──
  - discovery_id: azure.storageimportexport.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
  # ── list_by_subscription ──
  - discovery_id: azure.storageimportexport.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
