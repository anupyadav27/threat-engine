# Discovery YAML — logic (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: logic
services:
  client: logic
  module: azure.mgmt.logic
discovery:
  # ── list_by_resource_group ──
  - discovery_id: azure.logic.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── list_by_subscription ──
  - discovery_id: azure.logic.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── list_swagger ──
  - discovery_id: azure.logic.list_swagger
    calls:
      - action: list_swagger
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        Enabled: '{{ item.Enabled }}'
        Name: '{{ item.Name }}'
        PrincipalId: '{{ item.PrincipalId }}'
        Status: '{{ item.Status }}'
        Tier: '{{ item.Tier }}'
        Type: '{{ item.Type }}'
        base_path: '{{ item.base_path }}'
        inputs: '{{ item.inputs }}'
        method: '{{ item.method }}'
        queries: '{{ item.queries }}'
        relative_path: '{{ item.relative_path }}'
        relative_path_parameters: '{{ item.relative_path_parameters }}'
    # required_params: ['workflow_name']
  # ── Dependent ops ──
  # ── get_schema_json [dependent] ──
  - discovery_id: azure.logic.get_schema_json
    calls:
      - action: get_schema_json
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        content: '{{ response.content }}'
        title: '{{ response.title }}'
    # required_params: ['workflow_name', 'trigger_name']
  # ── list [dependent] ──
  - discovery_id: azure.logic.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
    # required_params: ['workflow_name', 'trigger_name']
  # ── list_callback_url [dependent] ──
  - discovery_id: azure.logic.list_callback_url
    calls:
      - action: list_callback_url
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        base_path: '{{ item.base_path }}'
        method: '{{ item.method }}'
        queries: '{{ item.queries }}'
        relative_path: '{{ item.relative_path }}'
        relative_path_parameters: '{{ item.relative_path_parameters }}'
        value: '{{ item.value }}'
    # required_params: ['workflow_name', 'list_callback_url']
  # ── list_content_callback_url [dependent] ──
  - discovery_id: azure.logic.list_content_callback_url
    calls:
      - action: list_content_callback_url
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        base_path: '{{ item.base_path }}'
        method: '{{ item.method }}'
        queries: '{{ item.queries }}'
        relative_path: '{{ item.relative_path }}'
        relative_path_parameters: '{{ item.relative_path_parameters }}'
        value: '{{ item.value }}'
    # required_params: ['integration_account_name', 'schema_name', 'list_content_callback_url']
  # ── list_expression_traces [dependent] ──
  - discovery_id: azure.logic.list_expression_traces
    calls:
      - action: list_expression_traces
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        inputs: '{{ item.inputs }}'
    # required_params: ['workflow_name', 'run_name', 'action_name']
  # ── list_key_vault_keys [dependent] ──
  - discovery_id: azure.logic.list_key_vault_keys
    calls:
      - action: list_key_vault_keys
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        skip_token: '{{ item.skip_token }}'
        value: '{{ item.value }}'
    # required_params: ['integration_account_name', 'list_key_vault_keys']
