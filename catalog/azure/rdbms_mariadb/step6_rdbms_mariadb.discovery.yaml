# Discovery YAML — rdbms_mariadb (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: rdbms_mariadb
services:
  client: rdbms_mariadb
  module: azure.mgmt.rdbms_mariadb
discovery:
  # ── list_by_resource_group ──
  - discovery_id: azure.rdbms_mariadb.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        private_endpoint_connections: '{{ item.private_endpoint_connections }}'
        public_network_access: '{{ item.public_network_access }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        administrator_login: '{{ item.administrator_login }}'
        earliest_restore_date: '{{ item.earliest_restore_date }}'
        fully_qualified_domain_name: '{{ item.fully_qualified_domain_name }}'
        master_server_id: '{{ item.master_server_id }}'
        minimal_tls_version: '{{ item.minimal_tls_version }}'
        replica_capacity: '{{ item.replica_capacity }}'
        replication_role: '{{ item.replication_role }}'
        sku: '{{ item.sku }}'
        ssl_enforcement: '{{ item.ssl_enforcement }}'
        storage_profile: '{{ item.storage_profile }}'
        user_visible_state: '{{ item.user_visible_state }}'
        version: '{{ item.version }}'
  # ── Dependent ops ──
  # ── list [dependent] ──
  - discovery_id: azure.rdbms_mariadb.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        action_id: '{{ item.action_id }}'
        advisor_name: '{{ item.advisor_name }}'
        created_time: '{{ item.created_time }}'
        details: '{{ item.details }}'
        expiration_time: '{{ item.expiration_time }}'
        reason: '{{ item.reason }}'
        recommendation_type: '{{ item.recommendation_type }}'
        session_id: '{{ item.session_id }}'
    # required_params: ['location_name', 'operation_id']
  # ── list_by_server [dependent] ──
  - discovery_id: azure.rdbms_mariadb.list_by_server
    calls:
      - action: list_by_server
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        database_name: '{{ item.database_name }}'
        end_time: '{{ item.end_time }}'
        event_name: '{{ item.event_name }}'
        event_type_name: '{{ item.event_type_name }}'
        query_id: '{{ item.query_id }}'
        start_time: '{{ item.start_time }}'
        total_time_in_ms: '{{ item.total_time_in_ms }}'
        user_id: '{{ item.user_id }}'
    # required_params: ['server_name', 'parameters']
