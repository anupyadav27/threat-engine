# Discovery YAML — recoveryservicesbackup (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: recoveryservicesbackup
services:
  client: recoveryservicesbackup
  module: azure.mgmt.recoveryservicesbackup
discovery:
  # ── get_operation_status [dependent] ──
  - discovery_id: azure.recoveryservicesbackup.get_operation_status
    calls:
      - action: get_operation_status
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        status: '{{ response.status }}'
        end_time: '{{ response.end_time }}'
        error: '{{ response.error }}'
        properties: '{{ response.properties }}'
        start_time: '{{ response.start_time }}'
    # required_params: ['vault_name', 'private_endpoint_connection_name', 'operation_id']
  # ── list [dependent] ──
  - discovery_id: azure.recoveryservicesbackup.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        e_tag: '{{ item.e_tag }}'
        properties: '{{ item.properties }}'
    # required_params: ['vault_name', 'fabric_name', 'container_name', 'protected_item_name', 'parameters']
