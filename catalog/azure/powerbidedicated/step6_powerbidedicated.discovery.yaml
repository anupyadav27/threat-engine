# Discovery YAML — powerbidedicated (Azure)
# Generated: 2026-02-21T05:02:44Z
# Actions use Azure Python SDK snake_case names (azure-mgmt-*)
version: '1.0'
provider: azure
service: powerbidedicated
services:
  client: powerbidedicated
  module: azure.mgmt.powerbidedicated
discovery:
  # ── list ──
  - discovery_id: azure.powerbidedicated.list
    calls:
      - action: list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── list_by_resource_group ──
  - discovery_id: azure.powerbidedicated.list_by_resource_group
    calls:
      - action: list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── list_by_subscription ──
  - discovery_id: azure.powerbidedicated.list_by_subscription
    calls:
      - action: list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        value: '{{ item.value }}'
  # ── list_skus ──
  - discovery_id: azure.powerbidedicated.list_skus
    calls:
      - action: list_skus
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        name: '{{ item.name }}'
        tier: '{{ item.tier }}'
  # ── list_skus_for_capacity ──
  - discovery_id: azure.powerbidedicated.list_skus_for_capacity
    calls:
      - action: list_skus_for_capacity
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        sku: '{{ item.sku }}'
    # required_params: ['dedicated_capacity_name']
  # ── Dependent ops ──
  # ── check_name_availability [dependent] ──
  - discovery_id: azure.powerbidedicated.check_name_availability
    calls:
      - action: check_name_availability
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        message: '{{ response.message }}'
        name_available: '{{ response.name_available }}'
        reason: '{{ response.reason }}'
    # required_params: ['location', 'capacity_parameters']
  # ── get_details [dependent] ──
  - discovery_id: azure.powerbidedicated.get_details
    calls:
      - action: get_details
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        location: '{{ response.location }}'
        name: '{{ response.name }}'
        provisioning_state: '{{ response.provisioning_state }}'
        tags: '{{ response.tags }}'
        type: '{{ response.type }}'
        administration: '{{ response.administration }}'
        mode: '{{ response.mode }}'
        sku: '{{ response.sku }}'
        state: '{{ response.state }}'
        system_data: '{{ response.system_data }}'
    # required_params: ['dedicated_capacity_name']
