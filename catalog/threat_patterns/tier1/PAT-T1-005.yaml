id: PAT-T1-005
version: 2
deprecated_at: null
description: >
  Audit trail disabled or misconfigured — attacker can conduct operations
  without generating a forensic record, preventing detection of lateral
  movement or data exfiltration.

tier: 1
severity_base: critical
confidence: confirmed

mitre_tactics:      [TA0005]
mitre_techniques:   [T1562.008, T1562.001]
tactic_chain_order: [defense_evasion]

csps: [aws, azure, gcp, alicloud, oci]

entry:
  node_type: Resource
  resource_types: []
  conditions:
    has_no_audit_trail: true

target:
  node_type: Resource
  resource_types: []
  conditions: {}

min_hops_for_tier2: null

cdr_watch:
  techniques:     [T1562.008, T1562.001]
  window_minutes: 15
  min_coverage:   0.5
  tactic_order_required: false

scoring:
  posture_severity:  critical
  active_severity:   critical
  path_length_bonus: false

tests:
  positive:
    description: "CloudTrail not enabled with log validation off"
    expected_tier: 1
    expected_severity: critical
  negative:
    description: "CloudTrail enabled in all regions with validation and SNS alerts"
    expected_tier: null
