id: PAT-T1-004
version: 2
deprecated_at: null
description: >
  Database instance publicly accessible with no encryption at rest.
  Direct database exposure: unauthenticated network access to an
  unencrypted database.

tier: 1
severity_base: critical
confidence: confirmed

mitre_tactics:      [TA0001, TA0009]
mitre_techniques:   [T1190, T1213.006]
tactic_chain_order: [initial_access, collection]

csps: [aws, azure, gcp, alicloud, oci]

entry:
  node_type: Resource
  resource_types: []
  conditions:
    internet_exposed: true

target:
  node_type: Resource
  resource_types: []
  conditions:
    is_crown_jewel: true

min_hops_for_tier2: null

cdr_watch:
  techniques:     [T1213.006, T1530]
  window_minutes: 60
  min_coverage:   0.5
  tactic_order_required: false

scoring:
  posture_severity:  critical
  active_severity:   critical
  path_length_bonus: false

tests:
  positive:
    description: "Database publicly accessible"
    expected_tier: 1
    expected_severity: critical
  negative:
    description: "Database in private subnet with encryption enabled"
    expected_tier: null
