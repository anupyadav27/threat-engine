id: PAT-T1-007
version: 2
deprecated_at: null
description: >
  Encryption key with rotation disabled. Long-lived static keys increase
  blast radius of a key compromise — any data encrypted under the key
  is permanently at risk if the key material is ever exfiltrated.

tier: 1
severity_base: high
confidence: confirmed

mitre_tactics:      [TA0006, TA0009]
mitre_techniques:   [T1552, T1530]
tactic_chain_order: [credential_access, collection]

csps: [aws, azure, gcp, alicloud, oci]

entry:
  node_type: Resource
  resource_types: []
  conditions:
    has_no_rotation: true

target:
  node_type: Resource
  resource_types: []
  conditions: {}

min_hops_for_tier2: null

cdr_watch:
  techniques:     [T1552, T1530]
  window_minutes: 30
  min_coverage:   0.5
  tactic_order_required: false

scoring:
  posture_severity:  high
  active_severity:   critical
  path_length_bonus: false

tests:
  positive:
    description: "KMS key with rotation disabled"
    expected_tier: 1
    expected_severity: high
  negative:
    description: "KMS key with auto-rotation enabled"
    expected_tier: null
