id: PAT-T1-014
version: 1
deprecated_at: null
description: >
  IAM user or service principal with admin/privileged access has no MFA
  configured. Password-only admin accounts are the top account-takeover
  vector across all CSPs.

tier: 1
severity_base: critical
confidence: confirmed

mitre_tactics:      [TA0004, TA0001]
mitre_techniques:   [T1078.004]
tactic_chain_order: [initial_access, privilege_escalation]

csps: [aws, azure, gcp, oci, alicloud]

entry:
  node_type: Resource
  resource_types: []
  conditions:
    is_admin_role: true
    has_no_mfa: true

hops: []

scoring:
  posture_severity: critical
  active_severity:  critical
  path_length_bonus: false
