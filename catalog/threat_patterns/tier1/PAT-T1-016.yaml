id: PAT-T1-016
version: 1
deprecated_at: null
description: >
  IAM user or service principal with admin/privileged access has credentials
  not rotated within policy window (90 days). Long-lived admin keys are the
  top credential-compromise vector in cloud breaches.

tier: 1
severity_base: high
confidence: confirmed

mitre_tactics:      [TA0001, TA0004]
mitre_techniques:   [T1078.004]
tactic_chain_order: [initial_access, privilege_escalation]

csps: [aws, azure, gcp, oci, alicloud]

entry:
  node_type: Resource
  resource_types: []
  conditions:
    is_admin_role: true
    has_stale_credentials: true

hops: []

scoring:
  posture_severity: high
  active_severity:  critical
  path_length_bonus: false
