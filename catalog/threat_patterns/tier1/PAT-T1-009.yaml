id: PAT-T1-009
version: 2
deprecated_at: null
description: >
  Secrets Manager / vault secret with rotation disabled. Long-lived
  plaintext secrets that are never rotated represent persistent
  credential exposure if the secret value is ever leaked.

tier: 1
severity_base: critical
confidence: confirmed

mitre_tactics:      [TA0006]
mitre_techniques:   [T1555.006, T1552.001]
tactic_chain_order: [credential_access]

csps: [aws, azure, gcp, alicloud, oci]

entry:
  node_type: Resource
  resource_types: []
  conditions:
    has_no_rotation: true

target:
  node_type: Resource
  resource_types: []
  conditions: {}

min_hops_for_tier2: null

cdr_watch:
  techniques:     [T1555.006, T1552.001]
  window_minutes: 30
  min_coverage:   0.5
  tactic_order_required: false

scoring:
  posture_severity:  critical
  active_severity:   critical
  path_length_bonus: false

tests:
  positive:
    description: "Secrets Manager secret with rotation disabled"
    expected_tier: 1
    expected_severity: critical
  negative:
    description: "Secret with auto-rotation every 30 days"
    expected_tier: null
