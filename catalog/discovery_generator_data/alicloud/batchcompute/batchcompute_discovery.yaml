version: '1.0'
provider: alicloud
service: batchcompute
services:
  client: batchcompute
  module: boto3.client
discovery:
- discovery_id: alicloud.batchcompute.describebatchcomputes
  calls:
  - action: describebatchcomputes
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.batchcompute.listbatchcomputes
  calls:
  - action: listbatchcomputes
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.batchcompute.getbatchcompute
  calls:
  - action: getbatchcompute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.batchcompute.querybatchcompute
  calls:
  - action: querybatchcompute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.batchcompute.describebatchcomputeattribute
  calls:
  - action: describebatchcomputeattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
