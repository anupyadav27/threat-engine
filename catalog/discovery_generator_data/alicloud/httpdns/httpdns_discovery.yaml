version: '1.0'
provider: alicloud
service: httpdns
services:
  client: httpdns
  module: boto3.client
discovery:
- discovery_id: alicloud.httpdns.describehttpdnss
  calls:
  - action: describehttpdnss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.httpdns.listhttpdnss
  calls:
  - action: listhttpdnss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.httpdns.gethttpdns
  calls:
  - action: gethttpdns
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.httpdns.queryhttpdns
  calls:
  - action: queryhttpdns
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.httpdns.describehttpdnsattribute
  calls:
  - action: describehttpdnsattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
