version: '1.0'
provider: alicloud
service: linkwan
services:
  client: linkwan
  module: boto3.client
discovery:
- discovery_id: alicloud.linkwan.describelinkwans
  calls:
  - action: describelinkwans
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.linkwan.listlinkwans
  calls:
  - action: listlinkwans
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.linkwan.getlinkwan
  calls:
  - action: getlinkwan
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.linkwan.querylinkwan
  calls:
  - action: querylinkwan
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.linkwan.describelinkwanattribute
  calls:
  - action: describelinkwanattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
