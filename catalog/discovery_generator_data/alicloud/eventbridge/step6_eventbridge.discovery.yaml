version: '1.0'
provider: alicloud
service: eventbridge
services:
  client: eventbridge
  module: alibabacloud_python_sdk.eventbridge
discovery:
- discovery_id: alicloud.eventbridge.data
  calls:
  - action: DescribeDatas
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Datas.Data }}'
    item:
      id: '{{ item.DataId }}'
      name: '{{ item.DataId }}'
      resource_type: data
      region: '{{ region }}'
      encrypted: '{{ item.Encrypted }}'
      kms_key_id: '{{ item.KMSKeyId }}'
      public_ip_address: '{{ item.PublicIpAddress }}'
      vpc_id: '{{ item.VpcId }}'
      status: '{{ item.Status }}'
      tags: '{{ item.Tags }}'
      internet_facing: '{{ item.InternetFacing }}'
      permissions: '{{ item.Permissions }}'
      security_group_rules: '{{ item.SecurityGroupRules }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
  uid_template: alicloud:{context.account_id}:{context.region}:{item.id}
- discovery_id: alicloud.eventbridge.ListEventBuses
  calls:
  - action: ListEventBuses
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{EventBuses.EventBus}}'
    item:
      id: '{{ item.EventbusId }}'
      name: '{{ item.EventbusName }}'
      resource_type: eventbus
      region: '{{ region }}'
      encrypted: '{{ item.Encrypted }}'
      kms_key_id: '{{ item.KMSKeyId }}'
      public_ip_address: '{{ item.PublicIpAddress }}'
      vpc_id: '{{ item.VpcId }}'
      status: '{{ item.Status }}'
      tags: '{{ item.Tags }}'
      internet_facing: '{{ item.InternetFacing }}'
      permissions: '{{ item.Permissions }}'
      security_group_rules: '{{ item.SecurityGroupRules }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
  uid_template: alicloud:{context.account_id}:{context.region}:{item.id}
