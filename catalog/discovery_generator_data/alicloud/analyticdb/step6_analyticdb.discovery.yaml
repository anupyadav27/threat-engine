# Discovery YAML — analyticdb (AliCloud)
# Generated: 2026-04-14T07:46:30Z
version: '1.0'
provider: alicloud
service: analyticdb
services:
  client: analyticdb
  module: alibabacloud_python_sdk.analyticdb
discovery:
  # ── alicloud.analyticdb.backup ──
  - discovery_id: alicloud.analyticdb.backup
    calls:
      - action: DescribeBackups
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Backups.Backup }}'
      item:
        id: '{{ item.BackupId }}'
        name: '{{ item.BackupId }}'
        resource_type: 'backup'
        region: '{{ region }}'
        encrypted: '{{ item.Encrypted }}'
        kms_key_id: '{{ item.KMSKeyId }}'
        public_ip_address: '{{ item.PublicIpAddress }}'
        vpc_id: '{{ item.VpcId }}'
        status: '{{ item.Status }}'
        tags: '{{ item.Tags }}'
        internet_facing: '{{ item.InternetFacing }}'
        permissions: '{{ item.Permissions }}'
        security_group_rules: '{{ item.SecurityGroupRules }}'
        backup_enabled: '{{ item.BackupEnabled }}'
        logging_enabled: '{{ item.LoggingEnabled }}'
        mfa_enabled: '{{ item.MfaEnabled }}'
        ssl_enabled: '{{ item.SslEnabled }}'
        versioning_enabled: '{{ item.VersioningEnabled }}'
        min_tls_version: '{{ item.MinTlsVersion }}'
  # ── alicloud.analyticdb.cluster ──
