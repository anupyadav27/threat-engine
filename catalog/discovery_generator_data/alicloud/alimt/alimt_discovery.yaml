version: '1.0'
provider: alicloud
service: alimt
services:
  client: alimt
  module: boto3.client
discovery:
- discovery_id: alicloud.alimt.describealimts
  calls:
  - action: describealimts
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.alimt.listalimts
  calls:
  - action: listalimts
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.alimt.getalimt
  calls:
  - action: getalimt
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.alimt.queryalimt
  calls:
  - action: queryalimt
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.alimt.describealimtattribute
  calls:
  - action: describealimtattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
