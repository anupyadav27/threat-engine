# Discovery YAML — vod (AliCloud)
# Generated: 2026-04-14T07:46:30Z
version: '1.0'
provider: alicloud
service: vod
services:
  client: vod
  module: alibabacloud_python_sdk.vod
discovery:
  # ── alicloud.vod.live_stream ──
  - discovery_id: alicloud.vod.live_stream
    calls:
      - action: DescribeLiveStreams
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.LiveStreams.LiveStream }}'
      item:
        id: '{{ item.LiveStreamId }}'
        name: '{{ item.LiveStreamId }}'
        resource_type: 'live_stream'
        region: '{{ region }}'
        encrypted: '{{ item.Encrypted }}'
        kms_key_id: '{{ item.KMSKeyId }}'
        public_ip_address: '{{ item.PublicIpAddress }}'
        vpc_id: '{{ item.VpcId }}'
        status: '{{ item.Status }}'
        tags: '{{ item.Tags }}'
        internet_facing: '{{ item.InternetFacing }}'
        permissions: '{{ item.Permissions }}'
        security_group_rules: '{{ item.SecurityGroupRules }}'
        backup_enabled: '{{ item.BackupEnabled }}'
        logging_enabled: '{{ item.LoggingEnabled }}'
        mfa_enabled: '{{ item.MfaEnabled }}'
        ssl_enabled: '{{ item.SslEnabled }}'
        versioning_enabled: '{{ item.VersioningEnabled }}'
        min_tls_version: '{{ item.MinTlsVersion }}'
  # ── alicloud.apsaravideo.DescribeVodStorageData ──
  - discovery_id: alicloud.apsaravideo.DescribeVodStorageData
    calls:
      - action: DescribeVodStorageData
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.VodStorageDatas.VodStorageData }}'
      item:
        id: '{{ item.DescribeVodStorageDataId }}'
        name: '{{ item.DescribeVodStorageDataName }}'
        resource_type: 'DescribeVodStorageData'
        region: '{{ region }}'
        encrypted: '{{ item.Encrypted }}'
        kms_key_id: '{{ item.KMSKeyId }}'
        public_ip_address: '{{ item.PublicIpAddress }}'
        vpc_id: '{{ item.VpcId }}'
        status: '{{ item.Status }}'
        tags: '{{ item.Tags }}'
        internet_facing: '{{ item.InternetFacing }}'
        permissions: '{{ item.Permissions }}'
        security_group_rules: '{{ item.SecurityGroupRules }}'
        backup_enabled: '{{ item.BackupEnabled }}'
        logging_enabled: '{{ item.LoggingEnabled }}'
        mfa_enabled: '{{ item.MfaEnabled }}'
        ssl_enabled: '{{ item.SslEnabled }}'
        versioning_enabled: '{{ item.VersioningEnabled }}'
        min_tls_version: '{{ item.MinTlsVersion }}'
  # ── alicloud.apsaravideo.live_stream ──
  - discovery_id: alicloud.apsaravideo.live_stream
    calls:
      - action: DescribeLiveStreams
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.LiveStreams.LiveStream }}'
      item:
        id: '{{ item.LiveStreamId }}'
        name: '{{ item.LiveStreamName }}'
        resource_type: 'live_stream'
        region: '{{ region }}'
        encrypted: '{{ item.Encrypted }}'
        kms_key_id: '{{ item.KMSKeyId }}'
        public_ip_address: '{{ item.PublicIpAddress }}'
        vpc_id: '{{ item.VpcId }}'
        status: '{{ item.Status }}'
        tags: '{{ item.Tags }}'
        internet_facing: '{{ item.InternetFacing }}'
        permissions: '{{ item.Permissions }}'
        security_group_rules: '{{ item.SecurityGroupRules }}'
        backup_enabled: '{{ item.BackupEnabled }}'
        logging_enabled: '{{ item.LoggingEnabled }}'
        mfa_enabled: '{{ item.MfaEnabled }}'
        ssl_enabled: '{{ item.SslEnabled }}'
        versioning_enabled: '{{ item.VersioningEnabled }}'
        min_tls_version: '{{ item.MinTlsVersion }}'
