version: '1.0'
provider: alicloud
service: vod
services:
  client: vod
  module: boto3.client
discovery:
- discovery_id: alicloud.vod.describevods
  calls:
  - action: describevods
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.vod.listvods
  calls:
  - action: listvods
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.vod.getvod
  calls:
  - action: getvod
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.vod.queryvod
  calls:
  - action: queryvod
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.vod.describevodattribute
  calls:
  - action: describevodattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
