version: '1.0'
provider: alicloud
service: sts
services:
  client: sts
  module: boto3.client
discovery:
- discovery_id: alicloud.sts.describestss
  calls:
  - action: describestss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.sts.liststss
  calls:
  - action: liststss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.sts.getsts
  calls:
  - action: getsts
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.sts.querysts
  calls:
  - action: querysts
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.sts.describestsattribute
  calls:
  - action: describestsattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
