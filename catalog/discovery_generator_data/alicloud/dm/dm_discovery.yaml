version: '1.0'
provider: alicloud
service: dm
services:
  client: dm
  module: boto3.client
discovery:
- discovery_id: alicloud.dm.describedms
  calls:
  - action: describedms
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.dm.listdms
  calls:
  - action: listdms
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.dm.getdm
  calls:
  - action: getdm
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.dm.querydm
  calls:
  - action: querydm
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.dm.describedmattribute
  calls:
  - action: describedmattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
