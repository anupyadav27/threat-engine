version: '1.0'
provider: alicloud
service: hitsdb
services:
  client: hitsdb
  module: alibabacloud_python_sdk.hitsdb
discovery:
  # ── alicloud.hitsdb.database ──
  - discovery_id: alicloud.hitsdb.database
    calls:
      - action: DescribeDatabases
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Databases.Database }}'
      item:
        id: '{{ item.DatabaseId }}'
        name: '{{ item.DatabaseId }}'
        resource_type: 'database'
        region: '{{ region }}'
        encrypted: '{{ item.Encrypted }}'
        kms_key_id: '{{ item.KMSKeyId }}'
        public_ip_address: '{{ item.PublicIpAddress }}'
        vpc_id: '{{ item.VpcId }}'
        status: '{{ item.Status }}'
        tags: '{{ item.Tags }}'
        internet_facing: '{{ item.InternetFacing }}'
        permissions: '{{ item.Permissions }}'
        security_group_rules: '{{ item.SecurityGroupRules }}'
        backup_enabled: '{{ item.BackupEnabled }}'
        logging_enabled: '{{ item.LoggingEnabled }}'
        mfa_enabled: '{{ item.MfaEnabled }}'
        ssl_enabled: '{{ item.SslEnabled }}'
        versioning_enabled: '{{ item.VersioningEnabled }}'
        min_tls_version: '{{ item.MinTlsVersion }}'
