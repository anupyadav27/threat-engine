version: '1.0'
provider: alicloud
service: linkedmall
services:
  client: linkedmall
  module: boto3.client
discovery:
- discovery_id: alicloud.linkedmall.describelinkedmalls
  calls:
  - action: describelinkedmalls
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.linkedmall.listlinkedmalls
  calls:
  - action: listlinkedmalls
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.linkedmall.getlinkedmall
  calls:
  - action: getlinkedmall
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.linkedmall.querylinkedmall
  calls:
  - action: querylinkedmall
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.linkedmall.describelinkedmallattribute
  calls:
  - action: describelinkedmallattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
