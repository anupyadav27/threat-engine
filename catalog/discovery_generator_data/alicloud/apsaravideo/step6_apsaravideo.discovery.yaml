version: '1.0'
provider: alicloud
service: apsaravideo
discovery:
- discovery_id: alicloud.apsaravideo.live_stream
  calls:
  - action: DescribeLiveStreams
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.LiveStreams.LiveStream }}'
    item:
      live_stream: '{{ item.live_stream }}'
