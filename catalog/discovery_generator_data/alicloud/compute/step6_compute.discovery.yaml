version: '1.0'
provider: alicloud
service: compute
discovery:
- discovery_id: alicloud.ecs.custom_image
  calls:
  - action: DescribeCustomImages
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.CustomImages.CustomImage }}'
    item:
      id: '{{ item.CustomImageId }}'
      name: '{{ item.CustomImageId }}'
      resource_type: custom_image
      region: '{{ region }}'
      encrypted: '{{ item.Encrypted }}'
      kms_key_id: '{{ item.KMSKeyId }}'
      public_ip_address: '{{ item.PublicIpAddress }}'
      vpc_id: '{{ item.VpcId }}'
      status: '{{ item.Status }}'
      tags: '{{ item.Tags }}'
      internet_facing: '{{ item.InternetFacing }}'
      permissions: '{{ item.Permissions }}'
      security_group_rules: '{{ item.SecurityGroupRules }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
  _used_by_rules:
  - alicloud.ecs.image.encrypted_system_disk_configured
  uid_template: alicloud:{context.account_id}:{context.region}:{item.id}
- discovery_id: alicloud.ecs.disk
  calls:
  - action: DescribeDisks
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Disks.Disk }}'
    item:
      id: '{{ item.DiskId }}'
      name: '{{ item.DiskId }}'
      resource_type: disk
      region: '{{ region }}'
      encrypted: '{{ item.Encrypted }}'
      kms_key_id: '{{ item.KMSKeyId }}'
      public_ip_address: '{{ item.PublicIpAddress }}'
      vpc_id: '{{ item.VpcId }}'
      status: '{{ item.Status }}'
      tags: '{{ item.Tags }}'
      internet_facing: '{{ item.InternetFacing }}'
      permissions: '{{ item.Permissions }}'
      security_group_rules: '{{ item.SecurityGroupRules }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
  _used_by_rules:
  - alicloud.ecs.disk.delete_with_instance_configured
  uid_template: alicloud:{context.account_id}:{context.region}:{item.id}
- discovery_id: alicloud.ecs.instance_managed_by_ssm_agent_installed
  calls:
  - action: DescribeInstanceManagedBySsmAgentInstalleds
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.InstanceManagedBySsmAgentInstalleds.InstanceManagedBySsmAgentInstalled
      }}'
    item:
      id: '{{ item.InstanceManagedBySsmAgentInstalledId }}'
      name: '{{ item.InstanceManagedBySsmAgentInstalledId }}'
      resource_type: instance_managed_by_ssm_agent_installed
      region: '{{ region }}'
      encrypted: '{{ item.Encrypted }}'
      kms_key_id: '{{ item.KMSKeyId }}'
      public_ip_address: '{{ item.PublicIpAddress }}'
      vpc_id: '{{ item.VpcId }}'
      status: '{{ item.Status }}'
      tags: '{{ item.Tags }}'
      internet_facing: '{{ item.InternetFacing }}'
      permissions: '{{ item.Permissions }}'
      security_group_rules: '{{ item.SecurityGroupRules }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
  _used_by_rules:
  - alicloud.ecs.instance.cloud_monitor_agent_configured
  uid_template: alicloud:{context.account_id}:{context.region}:{item.id}
- discovery_id: alicloud.ecs.securitygroup_ingress_tcp_3389_from_internet_blocked
  calls:
  - action: DescribeSecuritygroupIngressTcp3389FromInternetBlockeds
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.SecuritygroupIngressTcp3389FromInternetBlockeds.SecuritygroupIngressTcp3389FromInternetBlocked
      }}'
    item:
      id: '{{ item.SecuritygroupIngressTcp3389FromInternetBlockedId }}'
      name: '{{ item.SecuritygroupIngressTcp3389FromInternetBlockedId }}'
      resource_type: securitygroup_ingress_tcp_3389_from_internet_blocked
      region: '{{ region }}'
      encrypted: '{{ item.Encrypted }}'
      kms_key_id: '{{ item.KMSKeyId }}'
      public_ip_address: '{{ item.PublicIpAddress }}'
      vpc_id: '{{ item.VpcId }}'
      status: '{{ item.Status }}'
      tags: '{{ item.Tags }}'
      internet_facing: '{{ item.InternetFacing }}'
      permissions: '{{ item.Permissions }}'
      security_group_rules: '{{ item.SecurityGroupRules }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
  _used_by_rules:
  - alicloud.ecs.securitygroup.with_many_ingress_egress_rules_configured
  uid_template: alicloud:{context.account_id}:{context.region}:{item.id}
