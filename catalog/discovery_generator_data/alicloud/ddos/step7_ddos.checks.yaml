checks:
- rule_id: alicloud.ddos.advanced.protection_in_internet_facing_load_balancers
  for_each: alicloud.cfw.DescribePolicyAdvancedConfig
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: alicloud.ddos.log.collection_status
  for_each: alicloud.ack.DescribeClusterLogs
  conditions:
    var: item.logging_enabled
    op: equals
    value: 'true'
