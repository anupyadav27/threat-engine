version: '1.0'
provider: alicloud
service: ddos
services:
  client: ddos
  module: alibabacloud_python_sdk.ddos
discovery:
- discovery_id: alicloud.ddos.advanced
  calls:
  - action: DescribeAdvanceds
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Advanceds.Advanced }}'
    item:
      id: '{{ item.AdvancedId }}'
      name: '{{ item.AdvancedId }}'
      resource_type: advanced
      region: '{{ region }}'
      encrypted: '{{ item.Encrypted }}'
      kms_key_id: '{{ item.KMSKeyId }}'
      public_ip_address: '{{ item.PublicIpAddress }}'
      vpc_id: '{{ item.VpcId }}'
      status: '{{ item.Status }}'
      tags: '{{ item.Tags }}'
      internet_facing: '{{ item.InternetFacing }}'
      permissions: '{{ item.Permissions }}'
      security_group_rules: '{{ item.SecurityGroupRules }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
  uid_template: alicloud:{context.account_id}:{context.region}:{item.id}
- discovery_id: alicloud.ddos.log
  calls:
  - action: DescribeLogs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Logs.Log }}'
    item:
      id: '{{ item.LogId }}'
      name: '{{ item.LogId }}'
      resource_type: log
      region: '{{ region }}'
      encrypted: '{{ item.Encrypted }}'
      kms_key_id: '{{ item.KMSKeyId }}'
      public_ip_address: '{{ item.PublicIpAddress }}'
      vpc_id: '{{ item.VpcId }}'
      status: '{{ item.Status }}'
      tags: '{{ item.Tags }}'
      internet_facing: '{{ item.InternetFacing }}'
      permissions: '{{ item.Permissions }}'
      security_group_rules: '{{ item.SecurityGroupRules }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
  uid_template: alicloud:{context.account_id}:{context.region}:{item.id}
