version: '1.0'
provider: alicloud
service: ddos
services:
  client: ddos
  module: boto3.client
discovery:
- discovery_id: alicloud.ddos.describeddoss
  calls:
  - action: describeddoss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ddos.listddoss
  calls:
  - action: listddoss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ddos.getddos
  calls:
  - action: getddos
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ddos.queryddos
  calls:
  - action: queryddos
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ddos.describeddosattribute
  calls:
  - action: describeddosattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
