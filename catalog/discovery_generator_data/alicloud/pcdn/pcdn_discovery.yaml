version: '1.0'
provider: alicloud
service: pcdn
services:
  client: pcdn
  module: boto3.client
discovery:
- discovery_id: alicloud.pcdn.describepcdns
  calls:
  - action: describepcdns
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.pcdn.listpcdns
  calls:
  - action: listpcdns
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.pcdn.getpcdn
  calls:
  - action: getpcdn
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.pcdn.querypcdn
  calls:
  - action: querypcdn
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.pcdn.describepcdnattribute
  calls:
  - action: describepcdnattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
