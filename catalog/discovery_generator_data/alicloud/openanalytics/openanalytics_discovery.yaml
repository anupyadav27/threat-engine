version: '1.0'
provider: alicloud
service: openanalytics
services:
  client: openanalytics
  module: boto3.client
discovery:
- discovery_id: alicloud.openanalytics.describeopenanalyticss
  calls:
  - action: describeopenanalyticss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.openanalytics.listopenanalyticss
  calls:
  - action: listopenanalyticss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.openanalytics.getopenanalytics
  calls:
  - action: getopenanalytics
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.openanalytics.queryopenanalytics
  calls:
  - action: queryopenanalytics
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.openanalytics.describeopenanalyticsattribute
  calls:
  - action: describeopenanalyticsattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
