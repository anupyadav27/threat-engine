version: '1.0'
provider: alicloud
service: ddosbasic
services:
  client: ddosbasic
  module: boto3.client
discovery:
- discovery_id: alicloud.ddosbasic.describeddosbasics
  calls:
  - action: describeddosbasics
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ddosbasic.listddosbasics
  calls:
  - action: listddosbasics
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ddosbasic.getddosbasic
  calls:
  - action: getddosbasic
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ddosbasic.queryddosbasic
  calls:
  - action: queryddosbasic
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ddosbasic.describeddosbasicattribute
  calls:
  - action: describeddosbasicattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
