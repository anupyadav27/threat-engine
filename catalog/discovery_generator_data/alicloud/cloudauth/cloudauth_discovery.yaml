version: '1.0'
provider: alicloud
service: cloudauth
services:
  client: cloudauth
  module: boto3.client
discovery:
- discovery_id: alicloud.cloudauth.describecloudauths
  calls:
  - action: describecloudauths
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cloudauth.listcloudauths
  calls:
  - action: listcloudauths
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cloudauth.getcloudauth
  calls:
  - action: getcloudauth
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cloudauth.querycloudauth
  calls:
  - action: querycloudauth
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cloudauth.describecloudauthattribute
  calls:
  - action: describecloudauthattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
