version: '1.0'
provider: alicloud
service: artifacts
discovery:
- discovery_id: alicloud.artifacts.ListRepository
  calls:
  - action: ListRepository
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Repositorys.Repository }}'
    item:
      ListRepository: '{{ item.ListRepository }}'
