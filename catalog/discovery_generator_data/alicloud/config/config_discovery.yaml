version: '1.0'
provider: alicloud
service: config
services:
  client: config
  module: aliyunsdkconfig
discovery:
- discovery_id: alicloud.config.GetAggregateCompliancePackReport
  calls:
  - action: GetAggregateCompliancePackReport
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
