# Discovery YAML — ons (AliCloud)
# Generated: 2026-02-21T06:19:57Z
version: '1.0'
provider: alicloud
service: ons
services:
  client: ons
  module: alibabacloud_python_sdk.ons
discovery:
  # ── ListTagResources ──
  - discovery_id: alicloud.ons.ListTagResources
    calls:
      - action: ListTagResources
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Data }}'
      item:
        creation_time: '{{ item.CreationTime }}'
        instance_id: '{{ item.InstanceId }}'
        instance_name: '{{ item.InstanceName }}'
        region_id: '{{ item.RegionId }}'
        status: '{{ item.Status }}'
        tags: '{{ item.Tags }}'
        zone_id: '{{ item.ZoneId }}'
        internet_facing: '{{ item.InternetFacing }}'
        permissions: '{{ item.Permissions }}'
        security_group_rules: '{{ item.SecurityGroupRules }}'
        backup_enabled: '{{ item.BackupEnabled }}'
        logging_enabled: '{{ item.LoggingEnabled }}'
        mfa_enabled: '{{ item.MfaEnabled }}'
        ssl_enabled: '{{ item.SslEnabled }}'
        versioning_enabled: '{{ item.VersioningEnabled }}'
        min_tls_version: '{{ item.MinTlsVersion }}'
