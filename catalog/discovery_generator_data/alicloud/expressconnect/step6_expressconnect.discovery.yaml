version: '1.0'
provider: alicloud
service: expressconnect
discovery:
- discovery_id: alicloud.expressconnect.DescribePhysicalConnections
  calls:
  - action: DescribePhysicalConnections
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.PhysicalConnectionss.PhysicalConnections }}'
    item:
      DescribePhysicalConnections: '{{ item.DescribePhysicalConnections }}'
- discovery_id: alicloud.expressconnect.DescribeVirtualBorderRouters
  calls:
  - action: DescribeVirtualBorderRouters
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.VirtualBorderRouterss.VirtualBorderRouters }}'
    item:
      DescribeVirtualBorderRouters: '{{ item.DescribeVirtualBorderRouters }}'
