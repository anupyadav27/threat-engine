version: '1.0'
provider: alicloud
service: alidnsgtm
services:
  client: alidnsgtm
  module: alibabacloud_python_sdk.alidnsgtm
discovery:
- discovery_id: alicloud.alidnsgtm.traffic_manager_policy
  calls:
  - action: DescribeTrafficManagerPolicys
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.TrafficManagerPolicys.TrafficManagerPolicy }}'
    item:
      id: '{{ item.TrafficManagerPolicyId }}'
      name: '{{ item.TrafficManagerPolicyId }}'
      resource_type: traffic_manager_policy
      region: '{{ region }}'
      encrypted: '{{ item.Encrypted }}'
      kms_key_id: '{{ item.KMSKeyId }}'
      public_ip_address: '{{ item.PublicIpAddress }}'
      vpc_id: '{{ item.VpcId }}'
      status: '{{ item.Status }}'
      tags: '{{ item.Tags }}'
      internet_facing: '{{ item.InternetFacing }}'
      permissions: '{{ item.Permissions }}'
      security_group_rules: '{{ item.SecurityGroupRules }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
  uid_template: alicloud:{context.account_id}:{context.region}:{item.id}
- discovery_id: alicloud.gtm.traffic_manager_policy
  calls:
  - action: DescribeTrafficManagerPolicys
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.TrafficManagerPolicys.TrafficManagerPolicy }}'
    item:
      id: '{{ item.TrafficManagerPolicyId }}'
      name: '{{ item.TrafficManagerPolicyName }}'
      resource_type: traffic_manager_policy
      region: '{{ region }}'
      encrypted: '{{ item.Encrypted }}'
      kms_key_id: '{{ item.KMSKeyId }}'
      public_ip_address: '{{ item.PublicIpAddress }}'
      vpc_id: '{{ item.VpcId }}'
      status: '{{ item.Status }}'
      tags: '{{ item.Tags }}'
      internet_facing: '{{ item.InternetFacing }}'
      permissions: '{{ item.Permissions }}'
      security_group_rules: '{{ item.SecurityGroupRules }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
  uid_template: alicloud:{context.account_id}:{context.region}:{item.id}
