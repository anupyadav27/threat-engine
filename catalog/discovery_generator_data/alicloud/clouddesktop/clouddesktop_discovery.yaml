version: '1.0'
provider: alicloud
service: clouddesktop
services:
  client: clouddesktop
  module: boto3.client
discovery:
- discovery_id: alicloud.clouddesktop.describeclouddesktops
  calls:
  - action: describeclouddesktops
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.clouddesktop.listclouddesktops
  calls:
  - action: listclouddesktops
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.clouddesktop.getclouddesktop
  calls:
  - action: getclouddesktop
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.clouddesktop.queryclouddesktop
  calls:
  - action: queryclouddesktop
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.clouddesktop.describeclouddesktopattribute
  calls:
  - action: describeclouddesktopattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
