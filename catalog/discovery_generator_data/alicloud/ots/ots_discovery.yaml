version: '1.0'
provider: alicloud
service: ots
services:
  client: ots
  module: boto3.client
discovery:
- discovery_id: alicloud.ots.describeotss
  calls:
  - action: describeotss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ots.listotss
  calls:
  - action: listotss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ots.getots
  calls:
  - action: getots
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ots.queryots
  calls:
  - action: queryots
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ots.describeotsattribute
  calls:
  - action: describeotsattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
