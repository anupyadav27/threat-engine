version: '1.0'
provider: alicloud
service: dts
services:
  client: dts
  module: alibabacloud_python_sdk.dts
discovery:
- discovery_id: alicloud.dts.accelerator_cluster_encryption_at_rest_enabled
  calls:
  - action: DescribeAcceleratorClusterEncryptionAtRestEnableds
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.AcceleratorClusterEncryptionAtRestEnableds.AcceleratorClusterEncryptionAtRestEnabled
      }}'
    item:
      id: '{{ item.AcceleratorClusterEncryptionAtRestEnabledId }}'
      name: '{{ item.AcceleratorClusterEncryptionAtRestEnabledId }}'
      resource_type: accelerator_cluster_encryption_at_rest_enabled
      region: '{{ region }}'
      encrypted: '{{ item.Encrypted }}'
      kms_key_id: '{{ item.KMSKeyId }}'
      public_ip_address: '{{ item.PublicIpAddress }}'
      vpc_id: '{{ item.VpcId }}'
      status: '{{ item.Status }}'
      tags: '{{ item.Tags }}'
      internet_facing: '{{ item.InternetFacing }}'
      permissions: '{{ item.Permissions }}'
      security_group_rules: '{{ item.SecurityGroupRules }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
  uid_template: alicloud:{context.account_id}:{context.region}:{item.id}
