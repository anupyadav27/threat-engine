version: '1.0'
provider: alicloud
service: domain-intl
services:
  client: domain-intl
  module: boto3.client
discovery:
- discovery_id: alicloud.domain-intl.describedomain-intls
  calls:
  - action: describedomain-intls
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.domain-intl.listdomain-intls
  calls:
  - action: listdomain-intls
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.domain-intl.getdomain-intl
  calls:
  - action: getdomain-intl
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.domain-intl.querydomain-intl
  calls:
  - action: querydomain-intl
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.domain-intl.describedomain-intlattribute
  calls:
  - action: describedomain-intlattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
