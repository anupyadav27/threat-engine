version: '1.0'
provider: alicloud
service: cs
services:
  client: cs
  module: boto3.client
discovery:
- discovery_id: alicloud.cs.describecss
  calls:
  - action: describecss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cs.listcss
  calls:
  - action: listcss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cs.getcs
  calls:
  - action: getcs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cs.querycs
  calls:
  - action: querycs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cs.describecsattribute
  calls:
  - action: describecsattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
