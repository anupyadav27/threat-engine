version: '1.0'
provider: alicloud
service: uis
services:
  client: uis
  module: boto3.client
discovery:
- discovery_id: alicloud.uis.describeuiss
  calls:
  - action: describeuiss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.uis.listuiss
  calls:
  - action: listuiss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.uis.getuis
  calls:
  - action: getuis
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.uis.queryuis
  calls:
  - action: queryuis
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.uis.describeuisattribute
  calls:
  - action: describeuisattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
