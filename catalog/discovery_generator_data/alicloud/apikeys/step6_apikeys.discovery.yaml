version: '1.0'
provider: alicloud
service: apikeys
discovery:
- discovery_id: alicloud.apikeys.ListAccessKeys
  calls:
  - action: ListAccessKeys
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.AccessKeyss.AccessKeys }}'
    item:
      ListAccessKeys: '{{ item.ListAccessKeys }}'
