version: '1.0'
provider: alicloud
service: apsaramq
discovery:
- discovery_id: alicloud.apsaramq.broker
  calls:
  - action: DescribeBrokers
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Brokers.Broker }}'
    item:
      broker: '{{ item.broker }}'
- discovery_id: alicloud.apsaramq.connector
  calls:
  - action: DescribeConnectors
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Connectors.Connector }}'
    item:
      connector: '{{ item.connector }}'
- discovery_id: alicloud.apsaramq.fleet
  calls:
  - action: DescribeFleets
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Fleets.Fleet }}'
    item:
      fleet: '{{ item.fleet }}'
- discovery_id: alicloud.apsaramq.kafka_topic
  calls:
  - action: DescribeKafkaTopics
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.KafkaTopics.KafkaTopic }}'
    item:
      kafka_topic: '{{ item.kafka_topic }}'
