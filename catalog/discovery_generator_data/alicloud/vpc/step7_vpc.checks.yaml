checks:
- rule_id: alicloud.eip.attached.configured
  for_each: alicloud.eip.attached
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: alicloud.expressconnect.connect.vpn_ike_phase_encryption_strong
  for_each: alicloud.expressconnect.DescribePhysicalConnections
  conditions:
    var: item.encrypted
    op: equals
    value: 'true'
- rule_id: alicloud.expressconnect.connect.vpn_pre_shared_keys_rotation_policy_defined
  for_each: alicloud.expressconnect.DescribePhysicalConnections
  conditions:
    var: item.ssl_enabled
    op: equals
    value: 'true'
- rule_id: alicloud.expressconnect.connection.redundancy
  for_each: alicloud.expressconnect.DescribePhysicalConnections
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: alicloud.expressconnect.virtual.interface_redundancy
  for_each: alicloud.expressconnect.DescribeVirtualBorderRouters
  conditions:
    var: item.status
    op: equals
    value: Active
