version: '1.0'
provider: alicloud
service: vpc
services:
  client: vpc
  module: alibabacloud_python_sdk.vpc
discovery:
- discovery_id: alicloud.vpc.connect
  calls:
  - action: DescribeConnects
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Connects.Connect }}'
    item:
      id: '{{ item.ConnectId }}'
      name: '{{ item.ConnectId }}'
      resource_type: connect
      region: '{{ region }}'
      encrypted: '{{ item.Encrypted }}'
      kms_key_id: '{{ item.KMSKeyId }}'
      public_ip_address: '{{ item.PublicIpAddress }}'
      vpc_id: '{{ item.VpcId }}'
      status: '{{ item.Status }}'
      tags: '{{ item.Tags }}'
      internet_facing: '{{ item.InternetFacing }}'
      permissions: '{{ item.Permissions }}'
      security_group_rules: '{{ item.SecurityGroupRules }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
  uid_template: alicloud:{context.account_id}:{context.region}:{item.id}
- discovery_id: alicloud.vpc.connection
  calls:
  - action: DescribeConnections
    save_as: response
    on_error: continue
