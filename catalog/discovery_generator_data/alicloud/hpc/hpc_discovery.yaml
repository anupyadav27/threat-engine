version: '1.0'
provider: alicloud
service: hpc
services:
  client: hpc
  module: boto3.client
discovery:
- discovery_id: alicloud.hpc.describehpcs
  calls:
  - action: describehpcs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.hpc.listhpcs
  calls:
  - action: listhpcs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.hpc.gethpc
  calls:
  - action: gethpc
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.hpc.queryhpc
  calls:
  - action: queryhpc
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.hpc.describehpcattribute
  calls:
  - action: describehpcattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
