version: '1.0'
provider: alicloud
service: hdm
services:
  client: hdm
  module: boto3.client
discovery:
- discovery_id: alicloud.hdm.describehdms
  calls:
  - action: describehdms
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.hdm.listhdms
  calls:
  - action: listhdms
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.hdm.gethdm
  calls:
  - action: gethdm
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.hdm.queryhdm
  calls:
  - action: queryhdm
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.hdm.describehdmattribute
  calls:
  - action: describehdmattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
