version: '1.0'
provider: alicloud
service: dlf
discovery:
- discovery_id: alicloud.dlf.ListDatabases
  calls:
  - action: ListDatabases
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Databasess.Databases }}'
    item:
      ListDatabases: '{{ item.ListDatabases }}'
- discovery_id: alicloud.dlf.classifiers
  calls:
  - action: DescribeClassifierss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Classifierss.Classifiers }}'
    item:
      classifiers: '{{ item.classifiers }}'
- discovery_id: alicloud.dlf.crawlers
  calls:
  - action: DescribeCrawlerss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Crawlerss.Crawlers }}'
    item:
      crawlers: '{{ item.crawlers }}'
- discovery_id: alicloud.dlf.dataworks_crawlers
  calls:
  - action: DescribeDataworksCrawlerss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.DataworksCrawlerss.DataworksCrawlers }}'
    item:
      dataworks_crawlers: '{{ item.dataworks_crawlers }}'
- discovery_id: alicloud.dlf.endpoint
  calls:
  - action: DescribeEndpoints
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Endpoints.Endpoint }}'
    item:
      endpoint: '{{ item.endpoint }}'
