version: '1.0'
provider: alicloud
service: smartag
services:
  client: smartag
  module: boto3.client
discovery:
- discovery_id: alicloud.smartag.describesmartags
  calls:
  - action: describesmartags
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.smartag.listsmartags
  calls:
  - action: listsmartags
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.smartag.getsmartag
  calls:
  - action: getsmartag
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.smartag.querysmartag
  calls:
  - action: querysmartag
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.smartag.describesmartagattribute
  calls:
  - action: describesmartagattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
