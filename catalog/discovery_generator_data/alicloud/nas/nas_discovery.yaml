version: '1.0'
provider: alicloud
service: nas
services:
  client: nas
  module: boto3.client
discovery:
- discovery_id: alicloud.nas.describenass
  calls:
  - action: describenass
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.nas.listnass
  calls:
  - action: listnass
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.nas.getnas
  calls:
  - action: getnas
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.nas.querynas
  calls:
  - action: querynas
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.nas.describenasattribute
  calls:
  - action: describenasattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
