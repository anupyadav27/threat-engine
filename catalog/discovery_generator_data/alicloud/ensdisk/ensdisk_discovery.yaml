version: '1.0'
provider: alicloud
service: ensdisk
services:
  client: ensdisk
  module: boto3.client
discovery:
- discovery_id: alicloud.ensdisk.describeensdisks
  calls:
  - action: describeensdisks
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ensdisk.listensdisks
  calls:
  - action: listensdisks
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ensdisk.getensdisk
  calls:
  - action: getensdisk
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ensdisk.queryensdisk
  calls:
  - action: queryensdisk
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ensdisk.describeensdiskattribute
  calls:
  - action: describeensdiskattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
