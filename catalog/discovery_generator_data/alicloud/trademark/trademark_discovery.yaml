version: '1.0'
provider: alicloud
service: trademark
services:
  client: trademark
  module: boto3.client
discovery:
- discovery_id: alicloud.trademark.describetrademarks
  calls:
  - action: describetrademarks
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.trademark.listtrademarks
  calls:
  - action: listtrademarks
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.trademark.gettrademark
  calls:
  - action: gettrademark
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.trademark.querytrademark
  calls:
  - action: querytrademark
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.trademark.describetrademarkattribute
  calls:
  - action: describetrademarkattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
