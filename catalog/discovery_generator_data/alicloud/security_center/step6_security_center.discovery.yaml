version: '1.0'
provider: alicloud
service: security_center
discovery:
- discovery_id: alicloud.security_center.get_config
  calls:
  - action: GetSuspEventDetail
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
  uid_template: alicloud:{context.account_id}:{context.region}:{item.id}
