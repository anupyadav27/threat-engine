version: '1.0'
provider: alicloud
service: hologres
discovery:
- discovery_id: alicloud.hologres.parameter
  calls:
  - action: DescribeParameters
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Parameters.Parameter }}'
    item:
      parameter: '{{ item.parameter }}'
- discovery_id: alicloud.hologres.snapshot
  calls:
  - action: DescribeSnapshots
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Snapshots.Snapshot }}'
    item:
      snapshot: '{{ item.snapshot }}'
- discovery_id: alicloud.hologres.snapshot_kms
  calls:
  - action: DescribeSnapshotKmss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.SnapshotKmss.SnapshotKms }}'
    item:
      snapshot_kms: '{{ item.snapshot_kms }}'
