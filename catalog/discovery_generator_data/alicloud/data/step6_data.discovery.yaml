version: '1.0'
provider: alicloud
service: data
discovery:
- discovery_id: alicloud.data.lake_formation_catalog
  calls:
  - action: DescribeLakeFormationCatalogs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.LakeFormationCatalogs.LakeFormationCatalog }}'
    item:
      lake_formation_catalog: '{{ item.lake_formation_catalog }}'
