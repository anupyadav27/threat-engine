version: '1.0'
provider: alicloud
service: mns
discovery:
- discovery_id: alicloud.mns.list
  calls:
  - action: ListQueue
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.queues }}'
    item:
      queue_url: '{{ item.queueUrl }}'
      queue_name: '{{ item.queueName }}'
