checks:
- rule_id: alicloud.accessanalyzer.enabled.configured
  for_each: alicloud.accessanalyzer.enabled
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: alicloud.accessanalyzer.enabled.without_findings
  for_each: alicloud.accessanalyzer.enabled
  conditions:
    var: item.status
    op: equals
    value: Active
