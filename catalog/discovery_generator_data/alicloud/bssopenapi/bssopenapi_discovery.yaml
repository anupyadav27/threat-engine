version: '1.0'
provider: alicloud
service: bssopenapi
services:
  client: bssopenapi
  module: boto3.client
discovery:
- discovery_id: alicloud.bssopenapi.describebssopenapis
  calls:
  - action: describebssopenapis
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.bssopenapi.listbssopenapis
  calls:
  - action: listbssopenapis
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.bssopenapi.getbssopenapi
  calls:
  - action: getbssopenapi
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.bssopenapi.querybssopenapi
  calls:
  - action: querybssopenapi
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.bssopenapi.describebssopenapiattribute
  calls:
  - action: describebssopenapiattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
