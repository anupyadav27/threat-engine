version: '1.0'
provider: alicloud
service: ddosdip
services:
  client: ddosdip
  module: alibabacloud_python_sdk.ddosdip
discovery:
- discovery_id: alicloud.ddosdip.DescribeDdosdips
  calls:
  - action: DescribeDdosdips
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Data }}'
    item:
      CreateTime: '{{ item.CreateTime }}'
      InstanceId: '{{ item.InstanceId }}'
      Name: '{{ item.Name }}'
      RegionId: '{{ item.RegionId }}'
      Status: '{{ item.Status }}'
      Tags: '{{ item.Tags }}'
      Description: '{{ item.Description }}'
      ExpireTime: '{{ item.ExpireTime }}'
      OwnerId: '{{ item.OwnerId }}'
      ResourceGroupId: '{{ item.ResourceGroupId }}'
      ZoneId: '{{ item.ZoneId }}'
      internet_facing: '{{ item.InternetFacing }}'
      permissions: '{{ item.Permissions }}'
      security_group_rules: '{{ item.SecurityGroupRules }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
  uid_template: alicloud:{context.account_id}:{context.region}:{item.InstanceId}
- discovery_id: alicloud.ddosdip.DescribeDdosdip
  calls:
  - action: DescribeDdosdip
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      CreateTime: '{{ response.CreateTime }}'
      InstanceId: '{{ response.InstanceId }}'
      Name: '{{ response.Name }}'
      RegionId: '{{ response.RegionId }}'
      Status: '{{ response.Status }}'
      Tags: '{{ response.Tags }}'
      Description: '{{ response.Description }}'
      ExpireTime: '{{ response.ExpireTime }}'
      OwnerId: '{{ response.OwnerId }}'
      ResourceGroupId: '{{ response.ResourceGroupId }}'
      ZoneId: '{{ response.ZoneId }}'
      internet_facing: '{{ item.InternetFacing }}'
      permissions: '{{ item.Permissions }}'
      security_group_rules: '{{ item.SecurityGroupRules }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
  uid_template: alicloud:{context.account_id}:{context.region}:{item.InstanceId}
