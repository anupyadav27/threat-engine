version: '1.0'
provider: alicloud
service: ddosdip
services:
  client: ddosdip
  module: boto3.client
discovery:
- discovery_id: alicloud.ddosdip.describeddosdips
  calls:
  - action: describeddosdips
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ddosdip.listddosdips
  calls:
  - action: listddosdips
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ddosdip.getddosdip
  calls:
  - action: getddosdip
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ddosdip.queryddosdip
  calls:
  - action: queryddosdip
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ddosdip.describeddosdipattribute
  calls:
  - action: describeddosdipattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
