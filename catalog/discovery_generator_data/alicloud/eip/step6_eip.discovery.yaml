version: '1.0'
provider: alicloud
service: eip
discovery:
- discovery_id: alicloud.eip.attached
  calls:
  - action: DescribeAttacheds
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Attacheds.Attached }}'
    item:
      attached: '{{ item.attached }}'
