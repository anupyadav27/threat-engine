version: '1.0'
provider: alicloud
service: waf
services:
  client: waf
  module: boto3.client
discovery:
- discovery_id: alicloud.waf.describewafs
  calls:
  - action: describewafs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.waf.listwafs
  calls:
  - action: listwafs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.waf.getwaf
  calls:
  - action: getwaf
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.waf.querywaf
  calls:
  - action: querywaf
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.waf.describewafattribute
  calls:
  - action: describewafattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
