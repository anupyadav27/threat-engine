version: '1.0'
provider: alicloud
service: dcdn
services:
  client: dcdn
  module: boto3.client
discovery:
- discovery_id: alicloud.dcdn.describedcdns
  calls:
  - action: describedcdns
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.dcdn.listdcdns
  calls:
  - action: listdcdns
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.dcdn.getdcdn
  calls:
  - action: getdcdn
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.dcdn.querydcdn
  calls:
  - action: querydcdn
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.dcdn.describedcdnattribute
  calls:
  - action: describedcdnattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
