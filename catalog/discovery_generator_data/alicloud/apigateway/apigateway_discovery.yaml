version: '1.0'
provider: alicloud
service: apigateway
services:
  client: apigateway
  module: boto3.client
discovery:
- discovery_id: alicloud.apigateway.describeapigateways
  calls:
  - action: describeapigateways
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.apigateway.listapigateways
  calls:
  - action: listapigateways
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.apigateway.getapigateway
  calls:
  - action: getapigateway
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.apigateway.queryapigateway
  calls:
  - action: queryapigateway
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.apigateway.describeapigatewayattribute
  calls:
  - action: describeapigatewayattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
