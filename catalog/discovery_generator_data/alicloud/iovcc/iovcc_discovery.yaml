version: '1.0'
provider: alicloud
service: iovcc
services:
  client: iovcc
  module: boto3.client
discovery:
- discovery_id: alicloud.iovcc.describeiovccs
  calls:
  - action: describeiovccs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.iovcc.listiovccs
  calls:
  - action: listiovccs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.iovcc.getiovcc
  calls:
  - action: getiovcc
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.iovcc.queryiovcc
  calls:
  - action: queryiovcc
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.iovcc.describeiovccattribute
  calls:
  - action: describeiovccattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
