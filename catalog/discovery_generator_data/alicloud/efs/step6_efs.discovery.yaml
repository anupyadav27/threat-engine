version: '1.0'
provider: alicloud
service: efs
discovery:
- discovery_id: alicloud.efs.encryption
  calls:
  - action: DescribeEncryptions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Encryptions.Encryption }}'
    item:
      encryption: '{{ item.encryption }}'
- discovery_id: alicloud.efs.have
  calls:
  - action: DescribeHaves
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Haves.Have }}'
    item:
      have: '{{ item.have }}'
- discovery_id: alicloud.efs.multi
  calls:
  - action: DescribeMultis
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Multis.Multi }}'
    item:
      multi: '{{ item.multi }}'
- discovery_id: alicloud.efs.windows
  calls:
  - action: DescribeWindowss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Windowss.Windows }}'
    item:
      windows: '{{ item.windows }}'
