version: '1.0'
provider: alicloud
service: apsaradb
discovery:
- discovery_id: alicloud.apsaradb.mongodb_cluster
  calls:
  - action: DescribeMongodbClusters
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.MongodbClusters.MongodbCluster }}'
    item:
      mongodb_cluster: '{{ item.mongodb_cluster }}'
- discovery_id: alicloud.apsaradb.rds_instance
  calls:
  - action: DescribeRdsInstances
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.RdsInstances.RdsInstance }}'
    item:
      rds_instance: '{{ item.rds_instance }}'
- discovery_id: alicloud.apsaradb.redis
  calls:
  - action: DescribeRediss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Rediss.Redis }}'
    item:
      redis: '{{ item.redis }}'
- discovery_id: alicloud.apsaradb.redis_mongodb_instance
  calls:
  - action: DescribeRedisMongodbInstances
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.RedisMongodbInstances.RedisMongodbInstance }}'
    item:
      redis_mongodb_instance: '{{ item.redis_mongodb_instance }}'
