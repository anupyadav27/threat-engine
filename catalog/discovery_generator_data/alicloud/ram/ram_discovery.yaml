version: '1.0'
provider: alicloud
service: ram
services:
  client: ram
  module: boto3.client
discovery:
- discovery_id: alicloud.ram.describerams
  calls:
  - action: describerams
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ram.listrams
  calls:
  - action: listrams
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ram.getram
  calls:
  - action: getram
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ram.queryram
  calls:
  - action: queryram
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ram.describeramattribute
  calls:
  - action: describeramattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
