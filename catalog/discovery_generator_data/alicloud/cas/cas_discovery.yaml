version: '1.0'
provider: alicloud
service: cas
services:
  client: cas
  module: boto3.client
discovery:
- discovery_id: alicloud.cas.describecass
  calls:
  - action: describecass
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cas.listcass
  calls:
  - action: listcass
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cas.getcas
  calls:
  - action: getcas
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cas.querycas
  calls:
  - action: querycas
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cas.describecasattribute
  calls:
  - action: describecasattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
