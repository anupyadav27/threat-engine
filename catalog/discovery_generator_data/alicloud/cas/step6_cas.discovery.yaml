# Discovery YAML — cas (AliCloud)
# Generated: 2026-04-14T07:46:30Z
version: '1.0'
provider: alicloud
service: cas
services:
  client: cas
  module: alibabacloud_python_sdk.cas
discovery:
  # ── alicloud.cas.cas ──
  - discovery_id: alicloud.cas.cas
    calls:
      - action: DescribeCass
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Cass.Cas }}'
      item:
        id: '{{ item.CasId }}'
        name: '{{ item.CasId }}'
        resource_type: 'cas'
        region: '{{ region }}'
        encrypted: '{{ item.Encrypted }}'
        kms_key_id: '{{ item.KMSKeyId }}'
        public_ip_address: '{{ item.PublicIpAddress }}'
        vpc_id: '{{ item.VpcId }}'
        status: '{{ item.Status }}'
        tags: '{{ item.Tags }}'
        internet_facing: '{{ item.InternetFacing }}'
        permissions: '{{ item.Permissions }}'
        security_group_rules: '{{ item.SecurityGroupRules }}'
        backup_enabled: '{{ item.BackupEnabled }}'
        logging_enabled: '{{ item.LoggingEnabled }}'
        mfa_enabled: '{{ item.MfaEnabled }}'
        ssl_enabled: '{{ item.SslEnabled }}'
        versioning_enabled: '{{ item.VersioningEnabled }}'
        min_tls_version: '{{ item.MinTlsVersion }}'
  # ── alicloud.cas.cas_private_ca ──
  - discovery_id: alicloud.cas.cas_private_ca
