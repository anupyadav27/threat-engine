version: '1.0'
provider: alicloud
service: ims
services:
  client: ims
  module: boto3.client
discovery:
- discovery_id: alicloud.ims.describeimss
  calls:
  - action: describeimss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ims.listimss
  calls:
  - action: listimss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ims.getims
  calls:
  - action: getims
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ims.queryims
  calls:
  - action: queryims
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ims.describeimsattribute
  calls:
  - action: describeimsattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
