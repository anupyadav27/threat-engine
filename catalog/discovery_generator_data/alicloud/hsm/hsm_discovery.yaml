version: '1.0'
provider: alicloud
service: hsm
services:
  client: hsm
  module: boto3.client
discovery:
- discovery_id: alicloud.hsm.describehsms
  calls:
  - action: describehsms
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.hsm.listhsms
  calls:
  - action: listhsms
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.hsm.gethsm
  calls:
  - action: gethsm
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.hsm.queryhsm
  calls:
  - action: queryhsm
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.hsm.describehsmattribute
  calls:
  - action: describehsmattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
