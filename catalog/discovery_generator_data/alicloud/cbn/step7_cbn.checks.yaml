version: '1.0'
provider: alicloud
service: cbn
checks:
- rule_id: alicloud.cen.network.eni_security_groups_present
  for_each: alicloud.ack.network_policy
  conditions:
    var: item.security_group_rules
    op: not_contains
    value: 0.0.0.0/0
- rule_id: alicloud.cen.network.eni_security_groups_restrictive
  for_each: alicloud.ack.network_policy
  conditions:
    var: item.security_group_rules
    op: not_contains
    value: 0.0.0.0/0
