version: '1.0'
provider: alicloud
service: dns
discovery:
- discovery_id: alicloud.dns.DescribeDomainRecords
  calls:
  - action: DescribeDomainRecords
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.DomainRecordss.DomainRecords }}'
    item:
      DescribeDomainRecords: '{{ item.DescribeDomainRecords }}'
- discovery_id: alicloud.dns.dnssec
  calls:
  - action: DescribeDnssecs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Dnssecs.Dnssec }}'
    item:
      dnssec: '{{ item.dnssec }}'
- discovery_id: alicloud.dns.rsasha1
  calls:
  - action: DescribeRsasha1s
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Rsasha1s.Rsasha1 }}'
    item:
      rsasha1: '{{ item.rsasha1 }}'
