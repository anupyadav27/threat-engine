version: '1.0'
provider: alicloud
service: iam
discovery:
- discovery_id: alicloud.ram.GetAccessKeyLastUsed
  calls:
  - action: GetAccessKeyLastUsed
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      access_key_last_used_status: '{{ response.Status }}'
      creation_time: '{{ response.CreationTime }}'
      instance_id: '{{ response.InstanceId }}'
      instance_name: '{{ response.InstanceName }}'
      region_id: '{{ response.RegionId }}'
      tags: '{{ response.Tags }}'
      zone_id: '{{ response.ZoneId }}'
      internet_facing: '{{ item.InternetFacing }}'
      permissions: '{{ item.Permissions }}'
      security_group_rules: '{{ item.SecurityGroupRules }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
  _used_by_rules:
  - alicloud.ram.no.guest_accounts_with_permissions_restricted
  - alicloud.ram.root.hardware_mfa_enabled
- discovery_id: alicloud.ram.GetGroup
  calls:
  - action: GetGroup
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      creation_time: '{{ response.CreationTime }}'
      group_status: '{{ response.Status }}'
      instance_id: '{{ response.InstanceId }}'
      instance_name: '{{ response.InstanceName }}'
      region_id: '{{ response.RegionId }}'
      tags: '{{ response.Tags }}'
      zone_id: '{{ response.ZoneId }}'
      internet_facing: '{{ item.InternetFacing }}'
      permissions: '{{ item.Permissions }}'
      security_group_rules: '{{ item.SecurityGroupRules }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
  _used_by_rules:
  - alicloud.ram.group.has_users_check
  - alicloud.ram.notification.group_mapping_configured
- discovery_id: alicloud.ram.GetLoginProfile
  calls:
  - action: GetLoginProfile
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      creation_time: '{{ response.CreationTime }}'
      instance_id: '{{ response.InstanceId }}'
      instance_name: '{{ response.InstanceName }}'
      login_profile_status: '{{ response.Status }}'
      region_id: '{{ response.RegionId }}'
      tags: '{{ response.Tags }}'
      zone_id: '{{ response.ZoneId }}'
      internet_facing: '{{ item.InternetFacing }}'
      permissions: '{{ item.Permissions }}'
      security_group_rules: '{{ item.SecurityGroupRules }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
  _used_by_rules:
  - alicloud.ram.user.allow_login_profile_restricted
  - alicloud.ram.user.login_profile_max_session_hours_configured
- discovery_id: alicloud.ram.GetPasswordPolicy
  calls:
  - action: GetPasswordPolicy
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      creation_time: '{{ response.CreationTime }}'
      instance_id: '{{ response.InstanceId }}'
      instance_name: '{{ response.InstanceName }}'
      password_policy_status: '{{ response.Status }}'
      region_id: '{{ response.RegionId }}'
      tags: '{{ response.Tags }}'
      zone_id: '{{ response.ZoneId }}'
      internet_facing: '{{ item.InternetFacing }}'
      permissions: '{{ item.Permissions }}'
      security_group_rules: '{{ item.SecurityGroupRules }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
  _used_by_rules:
  - alicloud.ram.password.policy_compliance_enabled
  - alicloud.ram.password.policy_lowercase_check
  - alicloud.ram.password.policy_minimum_length_check
  - alicloud.ram.password.policy_require_numbers_check
  - alicloud.ram.password.policy_require_symbols_configured
  - alicloud.ram.password.policy_require_uppercase_configured
  - alicloud.ram.password_policy.hide_feedback_configured
  - alicloud.ram.password_policy.login_attempt_limit_configured
