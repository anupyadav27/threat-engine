version: '1.0'
provider: alicloud
service: slb
services:
  client: slb
  module: alibabacloud_python_sdk.slb
discovery:
- discovery_id: alicloud.slb.DescribeAccessControlListAttribute
  calls:
  - action: DescribeAccessControlListAttribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Data }}'
    item:
      access_control_list_attribute_status: '{{ item.Status }}'
      creation_time: '{{ item.CreationTime }}'
      instance_id: '{{ item.InstanceId }}'
      instance_name: '{{ item.InstanceName }}'
      region_id: '{{ item.RegionId }}'
      tags: '{{ item.Tags }}'
      zone_id: '{{ item.ZoneId }}'
      internet_facing: '{{ item.InternetFacing }}'
      permissions: '{{ item.Permissions }}'
      security_group_rules: '{{ item.SecurityGroupRules }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
- discovery_id: alicloud.slb.describe_load_balancers
  calls:
  - action: DescribeLoadBalancers
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.LoadBalancers.LoadBalancer }}'
    item:
      load_balancer_id: '{{ item.LoadBalancerId }}'
      load_balancer_name: '{{ item.LoadBalancerName }}'
      address: '{{ item.Address }}'
      region_id: '{{ item.RegionId }}'
