version: '1.0'
provider: alicloud
service: polardb
services:
  client: polardb
  module: boto3.client
discovery:
- discovery_id: alicloud.polardb.describepolardbs
  calls:
  - action: describepolardbs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.polardb.listpolardbs
  calls:
  - action: listpolardbs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.polardb.getpolardb
  calls:
  - action: getpolardb
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.polardb.querypolardb
  calls:
  - action: querypolardb
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.polardb.describepolardbattribute
  calls:
  - action: describepolardbattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
