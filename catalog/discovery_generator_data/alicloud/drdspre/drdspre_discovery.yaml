version: '1.0'
provider: alicloud
service: drdspre
services:
  client: drdspre
  module: boto3.client
discovery:
- discovery_id: alicloud.drdspre.describedrdspres
  calls:
  - action: describedrdspres
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.drdspre.listdrdspres
  calls:
  - action: listdrdspres
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.drdspre.getdrdspre
  calls:
  - action: getdrdspre
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.drdspre.querydrdspre
  calls:
  - action: querydrdspre
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.drdspre.describedrdspreattribute
  calls:
  - action: describedrdspreattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
