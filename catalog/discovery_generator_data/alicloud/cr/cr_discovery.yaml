version: '1.0'
provider: alicloud
service: cr
services:
  client: cr
  module: boto3.client
discovery:
- discovery_id: alicloud.cr.describecrs
  calls:
  - action: describecrs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cr.listcrs
  calls:
  - action: listcrs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cr.getcr
  calls:
  - action: getcr
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cr.querycr
  calls:
  - action: querycr
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cr.describecrattribute
  calls:
  - action: describecrattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
