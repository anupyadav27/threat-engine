version: '1.0'
provider: alicloud
service: cloudmonitor
discovery:
- discovery_id: alicloud.cloudmonitor.actiontrail_config_changes_log_metric_filter_and_alarm_enabled
  calls:
  - action: DescribeActiontrailConfigChangesLogMetricFilterAndAlarmEnableds
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ActiontrailConfigChangesLogMetricFilterAndAlarmEnableds.ActiontrailConfigChangesLogMetricFilterAndAlarmEnabled
      }}'
    item:
      actiontrail_config_changes_log_metric_filter_and_alarm_enabled: '{{ item.actiontrail_config_changes_log_metric_filter_and_alarm_enabled
        }}'
- discovery_id: alicloud.cloudmonitor.alerts
  calls:
  - action: DescribeAlertss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Alertss.Alerts }}'
    item:
      alerts: '{{ item.alerts }}'
- discovery_id: alicloud.cloudmonitor.config_changes_log_metric_filter_and_alarm_enabled
  calls:
  - action: DescribeConfigChangesLogMetricFilterAndAlarmEnableds
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ConfigChangesLogMetricFilterAndAlarmEnableds.ConfigChangesLogMetricFilterAndAlarmEnabled
      }}'
    item:
      config_changes_log_metric_filter_and_alarm_enabled: '{{ item.config_changes_log_metric_filter_and_alarm_enabled
        }}'
- discovery_id: alicloud.cloudmonitor.diagnostic_settings
  calls:
  - action: DescribeDiagnosticSettingss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.DiagnosticSettingss.DiagnosticSettings }}'
    item:
      diagnostic_settings: '{{ item.diagnostic_settings }}'
- discovery_id: alicloud.cloudmonitor.diagnostic_settings_presence_verified
  calls:
  - action: DescribeDiagnosticSettingsPresenceVerifieds
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.DiagnosticSettingsPresenceVerifieds.DiagnosticSettingsPresenceVerified
      }}'
    item:
      diagnostic_settings_presence_verified: '{{ item.diagnostic_settings_presence_verified
        }}'
