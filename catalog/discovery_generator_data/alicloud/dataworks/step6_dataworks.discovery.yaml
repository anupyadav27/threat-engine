version: '1.0'
provider: alicloud
service: dataworks
discovery:
- discovery_id: alicloud.dataworks.ai_services
  calls:
  - action: DescribeAiServicess
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.AiServicess.AiServices }}'
    item:
      ai_services: '{{ item.ai_services }}'
- discovery_id: alicloud.dataworks.data_classification
  calls:
  - action: DescribeDataClassifications
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.DataClassifications.DataClassification }}'
    item:
      data_classification: '{{ item.data_classification }}'
- discovery_id: alicloud.dataworks.data_integration
  calls:
  - action: DescribeDataIntegrations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.DataIntegrations.DataIntegration }}'
    item:
      data_integration: '{{ item.data_integration }}'
- discovery_id: alicloud.dataworks.data_quality
  calls:
  - action: DescribeDataQualitys
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.DataQualitys.DataQuality }}'
    item:
      data_quality: '{{ item.data_quality }}'
- discovery_id: alicloud.dataworks.datamap
  calls:
  - action: DescribeDatamaps
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Datamaps.Datamap }}'
    item:
      datamap: '{{ item.datamap }}'
