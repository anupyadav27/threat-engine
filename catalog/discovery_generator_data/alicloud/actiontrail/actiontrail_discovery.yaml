version: '1.0'
provider: alicloud
service: actiontrail
services:
  client: actiontrail
  module: boto3.client
discovery:
- discovery_id: alicloud.actiontrail.describeactiontrails
  calls:
  - action: describeactiontrails
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.actiontrail.listactiontrails
  calls:
  - action: listactiontrails
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.actiontrail.getactiontrail
  calls:
  - action: getactiontrail
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.actiontrail.queryactiontrail
  calls:
  - action: queryactiontrail
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.actiontrail.describeactiontrailattribute
  calls:
  - action: describeactiontrailattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
