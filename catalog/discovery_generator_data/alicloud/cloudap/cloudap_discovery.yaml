version: '1.0'
provider: alicloud
service: cloudap
services:
  client: cloudap
  module: boto3.client
discovery:
- discovery_id: alicloud.cloudap.describecloudaps
  calls:
  - action: describecloudaps
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cloudap.listcloudaps
  calls:
  - action: listcloudaps
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cloudap.getcloudap
  calls:
  - action: getcloudap
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cloudap.querycloudap
  calls:
  - action: querycloudap
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cloudap.describecloudapattribute
  calls:
  - action: describecloudapattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
