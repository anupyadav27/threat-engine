version: '1.0'
provider: alicloud
service: devops
discovery:
- discovery_id: alicloud.devops.ListOrganizations
  calls:
  - action: ListOrganizations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Organizationss.Organizations }}'
    item:
      ListOrganizations: '{{ item.ListOrganizations }}'
