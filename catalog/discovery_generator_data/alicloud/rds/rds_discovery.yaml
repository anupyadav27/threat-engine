version: '1.0'
provider: alicloud
service: rds
services:
  client: rds
  module: boto3.client
discovery:
- discovery_id: alicloud.rds.describerdss
  calls:
  - action: describerdss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.rds.listrdss
  calls:
  - action: listrdss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.rds.getrds
  calls:
  - action: getrds
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.rds.queryrds
  calls:
  - action: queryrds
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.rds.describerdsattribute
  calls:
  - action: describerdsattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
