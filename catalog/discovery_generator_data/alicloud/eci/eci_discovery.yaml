version: '1.0'
provider: alicloud
service: eci
services:
  client: eci
  module: boto3.client
discovery:
- discovery_id: alicloud.eci.describeecis
  calls:
  - action: describeecis
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.eci.listecis
  calls:
  - action: listecis
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.eci.geteci
  calls:
  - action: geteci
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.eci.queryeci
  calls:
  - action: queryeci
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.eci.describeeciattribute
  calls:
  - action: describeeciattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
