version: '1.0'
provider: alicloud
service: arms
services:
  client: arms
  module: alibabacloud_python_sdk.arms
discovery:
- discovery_id: alicloud.arms.api
  calls:
  - action: DescribeApis
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Apis.Api }}'
    item:
      id: '{{ item.ApiId }}'
      name: '{{ item.ApiId }}'
      resource_type: api
      region: '{{ region }}'
      encrypted: '{{ item.Encrypted }}'
      kms_key_id: '{{ item.KMSKeyId }}'
      public_ip_address: '{{ item.PublicIpAddress }}'
      vpc_id: '{{ item.VpcId }}'
      status: '{{ item.Status }}'
      tags: '{{ item.Tags }}'
      internet_facing: '{{ item.InternetFacing }}'
      permissions: '{{ item.Permissions }}'
      security_group_rules: '{{ item.SecurityGroupRules }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
  uid_template: alicloud:{context.account_id}:{context.region}:{item.id}
- discovery_id: alicloud.arms.ml
  calls:
  - action: DescribeMls
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Mls.Ml }}'
    item:
      id: '{{ item.MlId }}'
      name: '{{ item.MlId }}'
      resource_type: ml
      region: '{{ region }}'
      encrypted: '{{ item.Encrypted }}'
      kms_key_id: '{{ item.KMSKeyId }}'
      public_ip_address: '{{ item.PublicIpAddress }}'
      vpc_id: '{{ item.VpcId }}'
      status: '{{ item.Status }}'
      tags: '{{ item.Tags }}'
      internet_facing: '{{ item.InternetFacing }}'
      permissions: '{{ item.Permissions }}'
      security_group_rules: '{{ item.SecurityGroupRules }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
  uid_template: alicloud:{context.account_id}:{context.region}:{item.id}
- discovery_id: alicloud.arms.tracing_analysis
  calls:
  - action: DescribeTracingAnalysiss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.TracingAnalysiss.TracingAnalysis }}'
    item:
      id: '{{ item.TracingAnalysisId }}'
      name: '{{ item.TracingAnalysisId }}'
      resource_type: tracing_analysis
      region: '{{ region }}'
      encrypted: '{{ item.Encrypted }}'
      kms_key_id: '{{ item.KMSKeyId }}'
      public_ip_address: '{{ item.PublicIpAddress }}'
      vpc_id: '{{ item.VpcId }}'
      status: '{{ item.Status }}'
      tags: '{{ item.Tags }}'
      internet_facing: '{{ item.InternetFacing }}'
      permissions: '{{ item.Permissions }}'
      security_group_rules: '{{ item.SecurityGroupRules }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
  uid_template: alicloud:{context.account_id}:{context.region}:{item.id}
- discovery_id: alicloud.arms.tracing_sampling_rule
  calls:
  - action: DescribeTracingSamplingRules
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.TracingSamplingRules.TracingSamplingRule }}'
    item:
      id: '{{ item.TracingSamplingRuleId }}'
      name: '{{ item.TracingSamplingRuleId }}'
      resource_type: tracing_sampling_rule
      region: '{{ region }}'
      encrypted: '{{ item.Encrypted }}'
      kms_key_id: '{{ item.KMSKeyId }}'
      public_ip_address: '{{ item.PublicIpAddress }}'
      vpc_id: '{{ item.VpcId }}'
      status: '{{ item.Status }}'
      tags: '{{ item.Tags }}'
      internet_facing: '{{ item.InternetFacing }}'
      permissions: '{{ item.Permissions }}'
      security_group_rules: '{{ item.SecurityGroupRules }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
  uid_template: alicloud:{context.account_id}:{context.region}:{item.id}
- discovery_id: alicloud.arms.DescribeDispatchRule
  calls:
  - action: DescribeDispatchRule
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ item.DispatchRuleId }}'
      name: '{{ item.DispatchRuleName }}'
      resource_type: dispatch_rule
      region: '{{ region }}'
      encrypted: '{{ item.Encrypted }}'
      kms_key_id: '{{ item.KMSKeyId }}'
      public_ip_address: '{{ item.PublicIpAddress }}'
      vpc_id: '{{ item.VpcId }}'
      status: '{{ item.Status }}'
      tags: '{{ item.Tags }}'
      internet_facing: '{{ item.InternetFacing }}'
      permissions: '{{ item.Permissions }}'
      security_group_rules: '{{ item.SecurityGroupRules }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
  uid_template: alicloud:{context.account_id}:{context.region}:{item.id}
