version: '1.0'
provider: alicloud
service: arms
services:
  client: arms
  module: boto3.client
discovery:
- discovery_id: alicloud.arms.describearmss
  calls:
  - action: describearmss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.arms.listarmss
  calls:
  - action: listarmss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.arms.getarms
  calls:
  - action: getarms
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.arms.queryarms
  calls:
  - action: queryarms
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.arms.describearmsattribute
  calls:
  - action: describearmsattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
