version: '1.0'
provider: alicloud
service: csb
services:
  client: csb
  module: boto3.client
discovery:
- discovery_id: alicloud.csb.describecsbs
  calls:
  - action: describecsbs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.csb.listcsbs
  calls:
  - action: listcsbs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.csb.getcsb
  calls:
  - action: getcsb
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.csb.querycsb
  calls:
  - action: querycsb
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.csb.describecsbattribute
  calls:
  - action: describecsbattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
