version: '1.0'
provider: alicloud
service: ccc
services:
  client: ccc
  module: boto3.client
discovery:
- discovery_id: alicloud.ccc.describecccs
  calls:
  - action: describecccs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ccc.listcccs
  calls:
  - action: listcccs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ccc.getccc
  calls:
  - action: getccc
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ccc.queryccc
  calls:
  - action: queryccc
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ccc.describecccattribute
  calls:
  - action: describecccattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
