version: '1.0'
provider: alicloud
service: ccs
services:
  client: ccs
  module: boto3.client
discovery:
- discovery_id: alicloud.ccs.describeccss
  calls:
  - action: describeccss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ccs.listccss
  calls:
  - action: listccss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ccs.getccs
  calls:
  - action: getccs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ccs.queryccs
  calls:
  - action: queryccs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ccs.describeccsattribute
  calls:
  - action: describeccsattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
