version: '1.0'
provider: alicloud
service: faas
services:
  client: faas
  module: boto3.client
discovery:
- discovery_id: alicloud.faas.describefaass
  calls:
  - action: describefaass
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.faas.listfaass
  calls:
  - action: listfaass
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.faas.getfaas
  calls:
  - action: getfaas
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.faas.queryfaas
  calls:
  - action: queryfaas
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.faas.describefaasattribute
  calls:
  - action: describefaasattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
