version: '1.0'
provider: alicloud
service: threat
discovery:
- discovery_id: alicloud.sas.list_sass
  calls:
  - action: ListResources
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      id: '{{ item.Id }}'
      name: '{{ item.Name }}'
      resource_type: '''{{ resource_type }}'''
      region: '{{ region }}'
      encrypted: '{{ item.Encrypted }}'
      kms_key_id: '{{ item.KMSKeyId }}'
      status: '{{ item.Status }}'
      enabled: '{{ item.Enabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      internet_facing: '{{ item.InternetFacing }}'
      public_ip_address: '{{ item.PublicIpAddress }}'
      tags: '{{ item.Tags }}'
      permissions: '{{ item.Permissions }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      retention_days: '{{ item.RetentionDays }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
  _used_by_rules:
  - alicloud.sas.anti_ransomware.enabled
  - alicloud.sas.check.periodic_configured
  - alicloud.sas.service_status_configured
  - alicloud.securitycenter.service.is_activated_check
  - alicloud.securitycenter.automatic.quarantine_check
  - alicloud.securitycenter.notifications.highrisk_check
  uid_template: alicloud:{context.account_id}:{context.region}:{item.id}
