version: '1.0'
provider: alicloud
service: log
discovery:
- discovery_id: alicloud.log.list
  calls:
  - action: ListProject
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.projects }}'
    item:
      project_name: '{{ item.projectName }}'
      status: '{{ item.status }}'
      region: '{{ item.region }}'
