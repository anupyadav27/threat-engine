version: '1.0'
provider: alicloud
service: gtm
discovery:
- discovery_id: alicloud.gtm.traffic_manager_policy
  calls:
  - action: DescribeTrafficManagerPolicys
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.TrafficManagerPolicys.TrafficManagerPolicy }}'
    item:
      traffic_manager_policy: '{{ item.traffic_manager_policy }}'
