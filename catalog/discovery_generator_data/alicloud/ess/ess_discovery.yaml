version: '1.0'
provider: alicloud
service: ess
services:
  client: ess
  module: boto3.client
discovery:
- discovery_id: alicloud.ess.describeesss
  calls:
  - action: describeesss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ess.listesss
  calls:
  - action: listesss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ess.getess
  calls:
  - action: getess
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ess.queryess
  calls:
  - action: queryess
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ess.describeessattribute
  calls:
  - action: describeessattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
