checks:
- rule_id: alicloud.ess.group.capacity_rebalance_enforced
  for_each: alicloud.alb.hologres_parameter_group
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: alicloud.ess.group.health_check_configured
  for_each: alicloud.alb.hologres_parameter_group
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: alicloud.ess.group.multi_az_deployment
  for_each: alicloud.alb.hologres_parameter_group
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: alicloud.ess.group.properly_configured
  for_each: alicloud.alb.hologres_parameter_group
  conditions:
    var: item.status
    op: equals
    value: Active
