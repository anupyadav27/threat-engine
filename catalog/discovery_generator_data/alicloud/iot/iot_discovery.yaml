version: '1.0'
provider: alicloud
service: iot
services:
  client: iot
  module: boto3.client
discovery:
- discovery_id: alicloud.iot.describeiots
  calls:
  - action: describeiots
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.iot.listiots
  calls:
  - action: listiots
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.iot.getiot
  calls:
  - action: getiot
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.iot.queryiot
  calls:
  - action: queryiot
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.iot.describeiotattribute
  calls:
  - action: describeiotattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
