version: '1.0'
provider: alicloud
service: ros
services:
  client: ros
  module: boto3.client
discovery:
- discovery_id: alicloud.ros.describeross
  calls:
  - action: describeross
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ros.listross
  calls:
  - action: listross
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ros.getros
  calls:
  - action: getros
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ros.queryros
  calls:
  - action: queryros
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ros.describerosattribute
  calls:
  - action: describerosattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
