version: '1.0'
provider: alicloud
service: api
discovery:
- discovery_id: alicloud.api.app_credential
  calls:
  - action: DescribeAppCredentials
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.AppCredentials.AppCredential }}'
    item:
      app_credential: '{{ item.app_credential }}'
- discovery_id: alicloud.api.authorizer
  calls:
  - action: DescribeAuthorizers
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Authorizers.Authorizer }}'
    item:
      authorizer: '{{ item.authorizer }}'
- discovery_id: alicloud.api.field
  calls:
  - action: DescribeFields
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Fields.Field }}'
    item:
      field: '{{ item.field }}'
- discovery_id: alicloud.api.hosting
  calls:
  - action: DescribeHostings
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Hostings.Hosting }}'
    item:
      hosting: '{{ item.hosting }}'
- discovery_id: alicloud.api.http
  calls:
  - action: DescribeHttps
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Https.Http }}'
    item:
      http: '{{ item.http }}'
- discovery_id: alicloud.apigateway.restapi_access_logging_enabled_90_day_retention
  calls:
  - action: DescribeRestapiAccessLoggingEnabled90DayRetentions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{RestapiAccessLoggingEnabled90DayRetentions.RestapiAccessLoggingEnabled90DayRetention}}'
    item:
      id: '{{ item.RestapiAccessLoggingEnabled90DayRetentionId }}'
      name: '{{ item.RestapiAccessLoggingEnabled90DayRetentionName }}'
      resource_type: restapi_access_logging_enabled_90_day_retention
      region: '{{ region }}'
      encrypted: '{{ item.Encrypted }}'
      kms_key_id: '{{ item.KMSKeyId }}'
      public_ip_address: '{{ item.PublicIpAddress }}'
      vpc_id: '{{ item.VpcId }}'
      status: '{{ item.Status }}'
      tags: '{{ item.Tags }}'
      internet_facing: '{{ item.InternetFacing }}'
      permissions: '{{ item.Permissions }}'
      security_group_rules: '{{ item.SecurityGroupRules }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
  _used_by_rules:
  - alicloud.api.gateway.authorization_enabled
