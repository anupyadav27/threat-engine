version: '1.0'
provider: alicloud
service: onsvip
services:
  client: onsvip
  module: boto3.client
discovery:
- discovery_id: alicloud.onsvip.describeonsvips
  calls:
  - action: describeonsvips
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.onsvip.listonsvips
  calls:
  - action: listonsvips
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.onsvip.getonsvip
  calls:
  - action: getonsvip
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.onsvip.queryonsvip
  calls:
  - action: queryonsvip
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.onsvip.describeonsvipattribute
  calls:
  - action: describeonsvipattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
