checks:
- rule_id: alicloud.cfw.ipset.ip_set_cidrs_valid_and_minimized
  for_each: alicloud.cfw.ipset
  conditions:
    var: item.security_group_rules
    op: not_contains
    value: 0.0.0.0/0
- rule_id: alicloud.cfw.ipset.ip_set_cross_account_sharing_restricted
  for_each: alicloud.cfw.ipset
  conditions:
    var: item.permissions
    op: not_contains
    value: '*'
- rule_id: alicloud.cfw.microsegmentation.microseg_endpoint_policies_applied
  for_each: alicloud.cfw.microsegmentation
  conditions:
    var: item.security_group_rules
    op: not_contains
    value: 0.0.0.0/0
- rule_id: alicloud.cfw.microsegmentation.microseg_identity_aware_policies_enabled
  for_each: alicloud.cfw.microsegmentation
  conditions:
    var: item.permissions
    op: not_contains
    value: '*'
- rule_id: alicloud.cfw.network.firewall_logging_enabled
  for_each: alicloud.ack.network_policy
  conditions:
    var: item.logging_enabled
    op: equals
    value: 'true'
- rule_id: alicloud.cfw.network.firewall_no_permit_any_any
  for_each: alicloud.ack.network_policy
  conditions:
    var: item.security_group_rules
    op: not_contains
    value: 0.0.0.0/0
- rule_id: alicloud.cfw.policy.access_control_no_permit_all
  for_each: alicloud.cfw.DescribePolicyAdvancedConfig
  conditions:
    var: item.security_group_rules
    op: not_contains
    value: 0.0.0.0/0
- rule_id: alicloud.cfw.policy.access_control_policies_present
  for_each: alicloud.cfw.DescribePolicyAdvancedConfig
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: alicloud.cfw.policy.access_control_policy_store_encrypted
  for_each: alicloud.cfw.DescribePolicyAdvancedConfig
  conditions:
    var: item.encrypted
    op: equals
    value: 'true'
- rule_id: alicloud.cfw.threat_analysis.anomaly_destinations_encrypted
  for_each: alicloud.cfw.threat_analysis
  conditions:
    var: item.encrypted
    op: equals
    value: 'true'
- rule_id: alicloud.cfw.threat_analysis.anomaly_detectors_enabled
  for_each: alicloud.cfw.threat_analysis
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: alicloud.cfw.traffic_analysis.alert_destinations_configured
  for_each: alicloud.cfw.traffic_analysis
  conditions:
    var: item.logging_enabled
    op: equals
    value: 'true'
- rule_id: alicloud.cfw.traffic_analysis.ids_ips_enabled_where_supported
  for_each: alicloud.cfw.traffic_analysis
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: alicloud.cfw.waf_ip_sets.ip_set_sources_trusted
  for_each: alicloud.cfw.waf_ip_sets
  conditions:
    var: item.security_group_rules
    op: not_contains
    value: 0.0.0.0/0
- rule_id: alicloud.cfw.waf_ip_sets.ip_set_storage_encrypted
  for_each: alicloud.cfw.waf_ip_sets
  conditions:
    var: item.encrypted
    op: equals
    value: 'true'
- rule_id: alicloud.cloudfw.deployed_across_all_vpcs.configured
  for_each: alicloud.cloudfw.deployed_across_all_vpcs
  conditions:
    var: item.vpc_id
    op: exists
- rule_id: alicloud.cloudfw.in.all_vpc
  for_each: alicloud.cloudfw.DescribeDomainResolve
  conditions:
    var: item.vpc_id
    op: exists
- rule_id: alicloud.cloudfw.instance.automated_backups
  for_each: alicloud.cloudfw.DescribeInstanceMembers
  conditions:
    var: item.backup_enabled
    op: equals
    value: 'true'
- rule_id: alicloud.cloudfw.instance.postgres_log_connections_flag
  for_each: alicloud.cloudfw.DescribeInstanceMembers
  conditions:
    var: item.logging_enabled
    op: equals
    value: 'true'
- rule_id: alicloud.cloudfw.instance.postgres_log_disconnections_flag
  for_each: alicloud.cloudfw.DescribeInstanceMembers
  conditions:
    var: item.logging_enabled
    op: equals
    value: 'true'
- rule_id: alicloud.cloudfw.instance.postgres_log_error_verbosity_flag
  for_each: alicloud.cloudfw.DescribeInstanceMembers
  conditions:
    var: item.logging_enabled
    op: equals
    value: 'true'
- rule_id: alicloud.cloudfw.instance.postgres_log_min_duration_statement_flag
  for_each: alicloud.cloudfw.DescribeInstanceMembers
  conditions:
    var: item.logging_enabled
    op: equals
    value: 'true'
- rule_id: alicloud.cloudfw.instance.postgres_log_min_error_statement_flag
  for_each: alicloud.cloudfw.DescribeInstanceMembers
  conditions:
    var: item.logging_enabled
    op: equals
    value: 'true'
- rule_id: alicloud.cloudfw.instance.postgres_log_min_messages_flag
  for_each: alicloud.cloudfw.DescribeInstanceMembers
  conditions:
    var: item.logging_enabled
    op: equals
    value: 'true'
- rule_id: alicloud.cloudfw.instance.postgres_log_statement_flag
  for_each: alicloud.cloudfw.DescribeInstanceMembers
  conditions:
    var: item.logging_enabled
    op: equals
    value: 'true'
- rule_id: alicloud.cloudfw.instance.public_access
  for_each: alicloud.cloudfw.DescribeInstanceMembers
  conditions:
    var: item.permissions
    op: not_contains
    value: '*'
- rule_id: alicloud.cloudfw.instance.public_ip
  for_each: alicloud.cloudfw.DescribeInstanceMembers
  conditions:
    var: item.internet_facing
    op: not_equals
    value: 'true'
- rule_id: alicloud.cloudfw.instance.ssl_connections
  for_each: alicloud.cloudfw.DescribeInstanceMembers
  conditions:
    var: item.encrypted
    op: equals
    value: 'true'
- rule_id: alicloud.cloudfw.log.analysis_status_check
  for_each: alicloud.cloudfw.logging
  conditions:
    var: item.logging_enabled
    op: equals
    value: 'true'
- rule_id: alicloud.cloudfw.logging.enabled
  for_each: alicloud.cloudfw.logging
  conditions:
    var: item.logging_enabled
    op: equals
    value: 'true'
- rule_id: alicloud.cloudfw.logging_enabled.configured
  for_each: alicloud.cloudfw.logging_enabled
  conditions:
    var: item.logging_enabled
    op: equals
    value: 'true'
- rule_id: alicloud.cloudfw.logging_enabled_for_all_traffic.configured
  for_each: alicloud.cloudfw.logging_enabled_for_all_traffic
  conditions:
    var: item.logging_enabled
    op: equals
    value: 'true'
- rule_id: alicloud.cloudfw.multi.az
  for_each: alicloud.cloudfw.multi
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: alicloud.cloudfw.multi_az_with_auto_scaling.configured
  for_each: alicloud.cloudfw.multi_az_with_auto_scaling
  conditions:
    var: item.status
    op: equals
    value: Active
