version: '1.0'
provider: alicloud
service: live
services:
  client: live
  module: boto3.client
discovery:
- discovery_id: alicloud.live.describelives
  calls:
  - action: describelives
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.live.listlives
  calls:
  - action: listlives
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.live.getlive
  calls:
  - action: getlive
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.live.querylive
  calls:
  - action: querylive
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.live.describeliveattribute
  calls:
  - action: describeliveattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
