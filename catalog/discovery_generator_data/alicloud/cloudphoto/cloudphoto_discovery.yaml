version: '1.0'
provider: alicloud
service: cloudphoto
services:
  client: cloudphoto
  module: boto3.client
discovery:
- discovery_id: alicloud.cloudphoto.describecloudphotos
  calls:
  - action: describecloudphotos
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cloudphoto.listcloudphotos
  calls:
  - action: listcloudphotos
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cloudphoto.getcloudphoto
  calls:
  - action: getcloudphoto
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cloudphoto.querycloudphoto
  calls:
  - action: querycloudphoto
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cloudphoto.describecloudphotoattribute
  calls:
  - action: describecloudphotoattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
