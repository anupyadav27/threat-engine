version: '1.0'
provider: alicloud
service: ens
services:
  client: ens
  module: boto3.client
discovery:
- discovery_id: alicloud.ens.describeenss
  calls:
  - action: describeenss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ens.listenss
  calls:
  - action: listenss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ens.getens
  calls:
  - action: getens
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ens.queryens
  calls:
  - action: queryens
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.ens.describeensattribute
  calls:
  - action: describeensattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
