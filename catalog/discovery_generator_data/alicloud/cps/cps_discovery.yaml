version: '1.0'
provider: alicloud
service: cps
services:
  client: cps
  module: boto3.client
discovery:
- discovery_id: alicloud.cps.describecpss
  calls:
  - action: describecpss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cps.listcpss
  calls:
  - action: listcpss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cps.getcps
  calls:
  - action: getcps
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cps.querycps
  calls:
  - action: querycps
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.cps.describecpsattribute
  calls:
  - action: describecpsattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
