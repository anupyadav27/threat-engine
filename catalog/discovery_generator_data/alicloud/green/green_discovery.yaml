version: '1.0'
provider: alicloud
service: green
services:
  client: green
  module: boto3.client
discovery:
- discovery_id: alicloud.green.describegreens
  calls:
  - action: describegreens
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.green.listgreens
  calls:
  - action: listgreens
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.green.getgreen
  calls:
  - action: getgreen
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.green.querygreen
  calls:
  - action: querygreen
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.green.describegreenattribute
  calls:
  - action: describegreenattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
