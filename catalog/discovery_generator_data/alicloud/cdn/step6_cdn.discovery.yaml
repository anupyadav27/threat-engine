# Discovery YAML — cdn (AliCloud)
# Generated: 2026-04-14T07:46:30Z
version: '1.0'
provider: alicloud
service: cdn
services:
  client: cdn
  module: alibabacloud_python_sdk.cdn
discovery:
  # ── alicloud.cdn.cache_policy ──
  - discovery_id: alicloud.cdn.cache_policy
    calls:
      - action: DescribeCachePolicys
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.CachePolicys.CachePolicy }}'
      item:
        id: '{{ item.CachePolicyId }}'
        name: '{{ item.CachePolicyId }}'
        resource_type: 'cache_policy'
        region: '{{ region }}'
        encrypted: '{{ item.Encrypted }}'
        kms_key_id: '{{ item.KMSKeyId }}'
        public_ip_address: '{{ item.PublicIpAddress }}'
        vpc_id: '{{ item.VpcId }}'
        status: '{{ item.Status }}'
        tags: '{{ item.Tags }}'
        internet_facing: '{{ item.InternetFacing }}'
        permissions: '{{ item.Permissions }}'
        security_group_rules: '{{ item.SecurityGroupRules }}'
        backup_enabled: '{{ item.BackupEnabled }}'
        logging_enabled: '{{ item.LoggingEnabled }}'
        mfa_enabled: '{{ item.MfaEnabled }}'
        ssl_enabled: '{{ item.SslEnabled }}'
        versioning_enabled: '{{ item.VersioningEnabled }}'
        min_tls_version: '{{ item.MinTlsVersion }}'
