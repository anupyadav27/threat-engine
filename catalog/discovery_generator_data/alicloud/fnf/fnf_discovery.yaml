version: '1.0'
provider: alicloud
service: fnf
services:
  client: fnf
  module: aliyunsdkfnf
discovery:
- discovery_id: alicloud.fnf.ListFlows
  calls:
  - action: ListFlows
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.fnf.ListSchedules
  calls:
  - action: ListSchedules
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.fnf.ListExecutions
  calls:
  - action: ListExecutions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.fnf.GetExecutionHistory
  calls:
  - action: GetExecutionHistory
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.fnf.DescribeSchedule
  calls:
  - action: DescribeSchedule
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
