version: '1.0'
provider: alicloud
service: beebot
services:
  client: beebot
  module: boto3.client
discovery:
- discovery_id: alicloud.beebot.describebeebots
  calls:
  - action: describebeebots
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.beebot.listbeebots
  calls:
  - action: listbeebots
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.beebot.getbeebot
  calls:
  - action: getbeebot
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.beebot.querybeebot
  calls:
  - action: querybeebot
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.beebot.describebeebotattribute
  calls:
  - action: describebeebotattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
