version: '1.0'
provider: alicloud
service: cfw
discovery:
- discovery_id: alicloud.cfw.DescribePolicyAdvancedConfig
  calls:
  - action: DescribePolicyAdvancedConfig
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.PolicyAdvancedConfigs.PolicyAdvancedConfig }}'
    item:
      DescribePolicyAdvancedConfig: '{{ item.DescribePolicyAdvancedConfig }}'
- discovery_id: alicloud.cfw.DescribeVpcFirewallControlPolicy
  calls:
  - action: DescribeVpcFirewallControlPolicy
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.VpcFirewallControlPolicys.VpcFirewallControlPolicy }}'
    item:
      DescribeVpcFirewallControlPolicy: '{{ item.DescribeVpcFirewallControlPolicy
        }}'
- discovery_id: alicloud.cfw.ipset
  calls:
  - action: DescribeIpsets
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Ipsets.Ipset }}'
    item:
      ipset: '{{ item.ipset }}'
- discovery_id: alicloud.cfw.microsegmentation
  calls:
  - action: DescribeMicrosegmentations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Microsegmentations.Microsegmentation }}'
    item:
      microsegmentation: '{{ item.microsegmentation }}'
- discovery_id: alicloud.cfw.threat_analysis
  calls:
  - action: DescribeThreatAnalysiss
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ThreatAnalysiss.ThreatAnalysis }}'
    item:
      threat_analysis: '{{ item.threat_analysis }}'
