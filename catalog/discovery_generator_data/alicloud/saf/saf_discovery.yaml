version: '1.0'
provider: alicloud
service: saf
services:
  client: saf
  module: boto3.client
discovery:
- discovery_id: alicloud.saf.describesafs
  calls:
  - action: describesafs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.saf.listsafs
  calls:
  - action: listsafs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.saf.getsaf
  calls:
  - action: getsaf
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.saf.querysaf
  calls:
  - action: querysaf
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.saf.describesafattribute
  calls:
  - action: describesafattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
