version: '1.0'
provider: alicloud
service: emas
services:
  client: emas
  module: boto3.client
discovery:
- discovery_id: alicloud.emas.describeemass
  calls:
  - action: describeemass
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.emas.listemass
  calls:
  - action: listemass
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.emas.getemas
  calls:
  - action: getemas
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.emas.queryemas
  calls:
  - action: queryemas
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: alicloud.emas.describeemasattribute
  calls:
  - action: describeemasattribute
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
