version: '1.0'
provider: oci
service: generative_ai_agent_runtime
services:
  client: generative_ai_agent_runtime
  module: oci.generative_ai_agent_runtime
discovery:
- discovery_id: oci.generative_ai_agent_runtime.get_session
  calls:
  - action: get_session
    params:
      session_id: '{{ item.ocid }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      ocid: '{{ response.data.ocid }}'
      compartment_id: '{{ response.data.compartment_id }}'
      name: '{{ response.data.name }}'
      status: '{{ response.data.status }}'
      time_created: '{{ response.data.time_created }}'
      freeform_tags: '{{ response.data.freeform_tags }}'
      defined_tags: '{{ response.data.defined_tags }}'
  uid_template: '{item.ocid}'
