version: '1.0'
provider: oci
service: container_engine
services:
  client: container_engine
  module: oci.container_engine
discovery:
- discovery_id: oci.container_engine.list_addon_options
  calls:
  - action: list_addon_options
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  uid_template: '{item.ocid}'
