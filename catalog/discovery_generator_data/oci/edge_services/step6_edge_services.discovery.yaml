version: '1.0'
provider: oci
service: edge_services
services:
  client: edge_services
  module: oci.edge_services
discovery:
- discovery_id: oci.edge_services.list_distributions
  calls:
  - action: list_distributions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
      web_app_firewall_id: '{{ item.web_app_firewall_id }}'
      backend_type: '{{ item.backend_type }}'
  uid_template: '{item.ocid}'
- discovery_id: oci.edge_services.list_web_app_acceleration_policies
  calls:
  - action: list_web_app_acceleration_policies
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  uid_template: '{item.ocid}'
- discovery_id: oci.edge_services.get_distribution
  calls:
  - action: get_distribution
    params:
      distribution_id: '{{ item.ocid }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      ocid: '{{ response.data.ocid }}'
      compartment_id: '{{ response.data.compartment_id }}'
      name: '{{ response.data.name }}'
      status: '{{ response.data.status }}'
      time_created: '{{ response.data.time_created }}'
      freeform_tags: '{{ response.data.freeform_tags }}'
      defined_tags: '{{ response.data.defined_tags }}'
      web_app_firewall_id: '{{ response.data.web_app_firewall_id }}'
      backend_type: '{{ response.data.backend_type }}'
  uid_template: '{item.ocid}'
