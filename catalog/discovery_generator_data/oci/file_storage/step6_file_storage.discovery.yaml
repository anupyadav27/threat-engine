version: '1.0'
provider: oci
service: file_storage
services:
  client: file_storage
  module: oci.file_storage
discovery:
- discovery_id: oci.file_storage.list_export_sets
  calls:
  - action: list_export_sets
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  uid_template: '{item.ocid}'
