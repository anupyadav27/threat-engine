        status: '{{ response.data.status }}'
        time_created: '{{ response.data.time_created }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        defined_tags: '{{ response.data.defined_tags }}'
  # ── get_generic_artifact_content_by_path [dependent] ──
  - discovery_id: oci.generic_artifacts_content.get_generic_artifact_content_by_path
    calls:
      - action: get_generic_artifact_content_by_path
        params:
          generic_artifact_content_by_path_id: '{{ item.ocid }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        ocid: '{{ response.data.ocid }}'
        compartment_id: '{{ response.data.compartment_id }}'
        name: '{{ response.data.name }}'
        status: '{{ response.data.status }}'
