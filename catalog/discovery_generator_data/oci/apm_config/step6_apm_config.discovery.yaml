# ============================================================
# Discovery YAML — apm_config (OCI)
# Generated: 2026-04-16T10:18:52Z
# Actions use OCI Python SDK method names (snake_case)
# ============================================================
version: '1.0'
provider: oci
service: apm_config
services:
  client: apm_config
  module: oci.apm_config
discovery:
  # ── list_configs [independent] ──
  - discovery_id: oci.apm_config.list_configs
    calls:
      - action: list_configs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        ocid: '{{ item.ocid }}'
        compartment_id: '{{ item.compartment_id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        time_created: '{{ item.time_created }}'
        freeform_tags: '{{ item.freeform_tags }}'
        defined_tags: '{{ item.defined_tags }}'
  # ── get_config [dependent] ──
  - discovery_id: oci.apm_config.get_config
    calls:
      - action: get_config
        params:
          config_id: '{{ item.ocid }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        ocid: '{{ response.data.ocid }}'
        compartment_id: '{{ response.data.compartment_id }}'
        name: '{{ response.data.name }}'
        status: '{{ response.data.status }}'
        time_created: '{{ response.data.time_created }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        defined_tags: '{{ response.data.defined_tags }}'
  # ── get_match_agents_with_attribute_key [dependent] ──
  - discovery_id: oci.apm_config.get_match_agents_with_attribute_key
    calls:
      - action: get_match_agents_with_attribute_key
        params:
          match_agents_with_attribute_key_id: '{{ item.ocid }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        ocid: '{{ response.data.ocid }}'
        compartment_id: '{{ response.data.compartment_id }}'
        name: '{{ response.data.name }}'
        status: '{{ response.data.status }}'
        time_created: '{{ response.data.time_created }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        defined_tags: '{{ response.data.defined_tags }}'
