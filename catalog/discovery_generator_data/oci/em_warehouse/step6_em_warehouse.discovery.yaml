version: '1.0'
provider: oci
service: em_warehouse
services:
  client: em_warehouse
  module: oci.em_warehouse
discovery:
  # ── list_em_warehouses [independent] ──
  - discovery_id: oci.em_warehouse.list_em_warehouses
    calls:
      - action: list_em_warehouses
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        ocid: '{{ item.ocid }}'
        compartment_id: '{{ item.compartment_id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        time_created: '{{ item.time_created }}'
        freeform_tags: '{{ item.freeform_tags }}'
        defined_tags: '{{ item.defined_tags }}'
