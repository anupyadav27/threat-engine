version: '1.0'
provider: oci
service: healthchecks
services:
  client: healthchecks
  module: oci.healthchecks
discovery:
  # ── list_health_checks_vantage_points [independent] ──
  - discovery_id: oci.healthchecks.list_health_checks_vantage_points
    calls:
      - action: list_health_checks_vantage_points
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        ocid: '{{ item.ocid }}'
        compartment_id: '{{ item.compartment_id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        time_created: '{{ item.time_created }}'
        freeform_tags: '{{ item.freeform_tags }}'
        defined_tags: '{{ item.defined_tags }}'
