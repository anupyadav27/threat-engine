  # ── list_work_request_errors [independent] ──
  - discovery_id: oci.container_instances.list_work_request_errors
    calls:
      - action: list_work_request_errors
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
