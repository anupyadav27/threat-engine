version: '1.0'
provider: oci
service: container_instances
services:
  client: container_instances
  module: oci.container_instances
discovery:
- discovery_id: oci.container_instances.get_container_instance
  calls:
  - action: get_container_instance
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.container_instances.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.container_instances.get_container
  calls:
  - action: get_container
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.container_instances.list_work_request_errors
  for_each: oci.container_instances.get_container_instance
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.container_instances.list_container_instance_shapes
  for_each: oci.container_instances.get_container_instance
  calls:
  - action: list_container_instance_shapes
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.container_instances.list_container_instances
  for_each: oci.container_instances.get_container_instance
  calls:
  - action: list_container_instances
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.container_instances.list_work_request_logs
  for_each: oci.container_instances.get_container_instance
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
