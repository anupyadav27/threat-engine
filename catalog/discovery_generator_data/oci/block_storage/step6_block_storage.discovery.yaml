version: '1.0'
provider: oci
service: block_storage
services:
  client: block_storage
  module: oci.block_storage
discovery:
- discovery_id: oci.block_storage.list_block_volume_replicas
  calls:
  - action: list_block_volume_replicas
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  uid_template: '{item.ocid}'
