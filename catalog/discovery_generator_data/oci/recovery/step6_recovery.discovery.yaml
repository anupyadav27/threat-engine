version: '1.0'
provider: oci
service: recovery
services:
  client: recovery
  module: oci.recovery
discovery:
- discovery_id: oci.recovery.list_protected_databases
  calls:
  - action: list_protected_databases
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  uid_template: '{item.ocid}'
- discovery_id: oci.recovery.list_protection_policies
  calls:
  - action: list_protection_policies
    save_as: response
    on_error: continue
  emit:
