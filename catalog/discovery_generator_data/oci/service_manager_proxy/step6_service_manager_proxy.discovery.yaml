# ============================================================
# Discovery YAML — service_manager_proxy (OCI)
# Generated: 2026-04-16T10:18:53Z
# Actions use OCI Python SDK method names (snake_case)
# ============================================================
version: '1.0'
provider: oci
service: service_manager_proxy
services:
  client: service_manager_proxy
  module: oci.service_manager_proxy
discovery:
  # ── list_service_environments [independent] ──
  - discovery_id: oci.service_manager_proxy.list_service_environments
    calls:
      - action: list_service_environments
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        ocid: '{{ item.ocid }}'
        compartment_id: '{{ item.compartment_id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        time_created: '{{ item.time_created }}'
        freeform_tags: '{{ item.freeform_tags }}'
        defined_tags: '{{ item.defined_tags }}'
  # ── get_service_environment [dependent] ──
  - discovery_id: oci.service_manager_proxy.get_service_environment
    calls:
      - action: get_service_environment
        params:
          service_environment_id: '{{ item.ocid }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        ocid: '{{ response.data.ocid }}'
        compartment_id: '{{ response.data.compartment_id }}'
        name: '{{ response.data.name }}'
        status: '{{ response.data.status }}'
        time_created: '{{ response.data.time_created }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        defined_tags: '{{ response.data.defined_tags }}'
