        name: '{{ item.name }}'
        status: '{{ item.status }}'
        time_created: '{{ item.time_created }}'
        freeform_tags: '{{ item.freeform_tags }}'
        defined_tags: '{{ item.defined_tags }}'
  # ── list_work_request_errors [independent] ──
  - discovery_id: oci.nosql.list_work_request_errors
    calls:
      - action: list_work_request_errors
        save_as: response
