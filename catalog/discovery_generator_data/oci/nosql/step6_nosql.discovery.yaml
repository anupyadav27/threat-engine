version: '1.0'
provider: oci
service: nosql
services:
  client: nosql
  module: oci.nosql
discovery:
  # ── list_indexes [independent] ──
  - discovery_id: oci.nosql.list_indexes
    calls:
      - action: list_indexes
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        ocid: '{{ item.ocid }}'
        compartment_id: '{{ item.compartment_id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        time_created: '{{ item.time_created }}'
        freeform_tags: '{{ item.freeform_tags }}'
        defined_tags: '{{ item.defined_tags }}'
  # ── list_table_usage [independent] ──
  - discovery_id: oci.nosql.list_table_usage
    calls:
      - action: list_table_usage
