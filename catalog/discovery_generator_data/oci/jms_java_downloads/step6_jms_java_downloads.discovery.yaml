version: '1.0'
provider: oci
service: jms_java_downloads
services:
  client: jms_java_downloads
  module: oci.jms_java_downloads
discovery:
- discovery_id: oci.jms_java_downloads.list_java_download_records
  calls:
  - action: list_java_download_records
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  uid_template: '{item.ocid}'
