version: '1.0'
provider: oci
service: apm_traces
services:
  client: apm_traces
  module: oci.apm_traces
discovery:
- discovery_id: oci.apm_traces.get_aggregated_snapshot
  calls:
  - action: get_aggregated_snapshot
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.apm_traces.get_log
  calls:
  - action: get_log
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.apm_traces.get_span
  calls:
  - action: get_span
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.apm_traces.get_trace_snapshot
  calls:
  - action: get_trace_snapshot
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.apm_traces.get_trace
  calls:
  - action: get_trace
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
