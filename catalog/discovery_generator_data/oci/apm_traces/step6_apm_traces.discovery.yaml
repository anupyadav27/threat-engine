version: '1.0'
provider: oci
service: apm_traces
services:
  client: apm_traces
  module: oci.apm_traces
discovery:
- discovery_id: oci.apm_traces.get_aggregated_snapshot
  calls:
  - action: get_aggregated_snapshot
    params:
      aggregated_snapshot_id: '{{ item.ocid }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      ocid: '{{ response.data.ocid }}'
      compartment_id: '{{ response.data.compartment_id }}'
      name: '{{ response.data.name }}'
      status: '{{ response.data.status }}'
      time_created: '{{ response.data.time_created }}'
      freeform_tags: '{{ response.data.freeform_tags }}'
      defined_tags: '{{ response.data.defined_tags }}'
  uid_template: '{item.ocid}'
- discovery_id: oci.apm_traces.get_log
  calls:
  - action: get_log
    params:
      log_id: '{{ item.ocid }}'
    save_as: response
    on_error: continue
  emit:
