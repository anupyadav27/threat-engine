version: '1.0'
provider: oci
service: stack_monitoring
services:
  client: stack_monitoring
  module: oci.stack_monitoring
discovery:
- discovery_id: oci.stack_monitoring.get_monitoring_template
  calls:
  - action: get_monitoring_template
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.stack_monitoring.get_monitored_resource_task
  calls:
  - action: get_monitored_resource_task
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.stack_monitoring.get_alarm_condition
  calls:
  - action: get_alarm_condition
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.stack_monitoring.get_metric_extension
  calls:
  - action: get_metric_extension
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.stack_monitoring.get_maintenance_window
  calls:
  - action: get_maintenance_window
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.stack_monitoring.get_process_set
  calls:
  - action: get_process_set
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.stack_monitoring.get_config
  calls:
  - action: get_config
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.stack_monitoring.get_discovery_job
  calls:
  - action: get_discovery_job
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.stack_monitoring.get_monitored_resource
  calls:
  - action: get_monitored_resource
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.stack_monitoring.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.stack_monitoring.get_monitored_resource_type
  calls:
  - action: get_monitored_resource_type
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.stack_monitoring.get_baselineable_metric
  calls:
  - action: get_baselineable_metric
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.stack_monitoring.list_monitored_resource_types
  for_each: oci.stack_monitoring.get_monitoring_template
  calls:
  - action: list_monitored_resource_types
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.stack_monitoring.list_work_request_errors
  for_each: oci.stack_monitoring.get_monitoring_template
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.stack_monitoring.list_monitored_resources
  for_each: oci.stack_monitoring.get_monitoring_template
  calls:
  - action: list_monitored_resources
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.stack_monitoring.list_work_request_logs
  for_each: oci.stack_monitoring.get_monitoring_template
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.stack_monitoring.list_discovery_job_logs
  for_each: oci.stack_monitoring.get_monitoring_template
  calls:
  - action: list_discovery_job_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.stack_monitoring.list_defined_monitoring_templates
  for_each: oci.stack_monitoring.get_monitoring_template
  calls:
  - action: list_defined_monitoring_templates
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.stack_monitoring.list_monitoring_templates
  for_each: oci.stack_monitoring.get_monitoring_template
  calls:
  - action: list_monitoring_templates
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
