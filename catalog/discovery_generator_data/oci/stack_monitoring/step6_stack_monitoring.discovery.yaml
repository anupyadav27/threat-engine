version: '1.0'
provider: oci
service: stack_monitoring
services:
  client: stack_monitoring
  module: oci.stack_monitoring
discovery:
- discovery_id: oci.stack_monitoring.list_alarm_conditions
  calls:
  - action: list_alarm_conditions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  uid_template: '{item.ocid}'
