# ============================================================
# Discovery YAML — api_platform (OCI)
# Generated: 2026-04-16T10:18:52Z
# Actions use OCI Python SDK method names (snake_case)
# ============================================================
version: '1.0'
provider: oci
service: api_platform
services:
  client: api_platform
  module: oci.api_platform
discovery:
  # ── list_api_platform_instances [independent] ──
  - discovery_id: oci.api_platform.list_api_platform_instances
    calls:
      - action: list_api_platform_instances
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        ocid: '{{ item.ocid }}'
        compartment_id: '{{ item.compartment_id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        time_created: '{{ item.time_created }}'
        freeform_tags: '{{ item.freeform_tags }}'
        defined_tags: '{{ item.defined_tags }}'
  # ── list_work_request_errors [independent] ──
  - discovery_id: oci.api_platform.list_work_request_errors
    calls:
      - action: list_work_request_errors
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        ocid: '{{ item.ocid }}'
        compartment_id: '{{ item.compartment_id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        time_created: '{{ item.time_created }}'
        freeform_tags: '{{ item.freeform_tags }}'
        defined_tags: '{{ item.defined_tags }}'
  # ── list_work_request_logs [independent] ──
  - discovery_id: oci.api_platform.list_work_request_logs
    calls:
      - action: list_work_request_logs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        ocid: '{{ item.ocid }}'
        compartment_id: '{{ item.compartment_id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        time_created: '{{ item.time_created }}'
        freeform_tags: '{{ item.freeform_tags }}'
        defined_tags: '{{ item.defined_tags }}'
  # ── list_work_requests [independent] ──
  - discovery_id: oci.api_platform.list_work_requests
    calls:
      - action: list_work_requests
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        ocid: '{{ item.ocid }}'
        compartment_id: '{{ item.compartment_id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        time_created: '{{ item.time_created }}'
        freeform_tags: '{{ item.freeform_tags }}'
        defined_tags: '{{ item.defined_tags }}'
  # ── get_api_platform_instance [dependent → list_api_platform_instances] ──
  - discovery_id: oci.api_platform.get_api_platform_instance
    for_each: oci.api_platform.list_api_platform_instances
    calls:
      - action: get_api_platform_instance
        params:
          api_platform_instance_id: '{{ item.ocid }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        ocid: '{{ response.data.ocid }}'
        compartment_id: '{{ response.data.compartment_id }}'
        name: '{{ response.data.name }}'
        status: '{{ response.data.status }}'
        time_created: '{{ response.data.time_created }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        defined_tags: '{{ response.data.defined_tags }}'
  # ── get_work_request [dependent] ──
  - discovery_id: oci.api_platform.get_work_request
    calls:
      - action: get_work_request
        params:
          work_request_id: '{{ item.ocid }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        ocid: '{{ response.data.ocid }}'
        compartment_id: '{{ response.data.compartment_id }}'
        name: '{{ response.data.name }}'
        status: '{{ response.data.status }}'
        time_created: '{{ response.data.time_created }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        defined_tags: '{{ response.data.defined_tags }}'
