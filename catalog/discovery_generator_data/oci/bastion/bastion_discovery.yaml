version: '1.0'
provider: oci
service: bastion
services:
  client: bastion
  module: oci.bastion
discovery:
- discovery_id: oci.bastion.get_session
  calls:
  - action: get_session
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.bastion.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.bastion.get_bastion
  calls:
  - action: get_bastion
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.bastion.list_work_request_errors
  for_each: oci.bastion.get_session
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.bastion.list_work_request_logs
  for_each: oci.bastion.get_session
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
