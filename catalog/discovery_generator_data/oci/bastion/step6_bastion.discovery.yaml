version: '1.0'
provider: oci
service: bastion
services:
  client: bastion
  module: oci.bastion
discovery:
  # ── list_bastions [independent] ──
  - discovery_id: oci.bastion.list_bastions
    calls:
      - action: list_bastions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        ocid: '{{ item.ocid }}'
        compartment_id: '{{ item.compartment_id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        time_created: '{{ item.time_created }}'
        freeform_tags: '{{ item.freeform_tags }}'
        defined_tags: '{{ item.defined_tags }}'
  # ── list_sessions [independent] ──
  - discovery_id: oci.bastion.list_sessions
    calls:
      - action: list_sessions
        save_as: response
        on_error: continue
    emit:
