version: '1.0'
provider: oci
service: media_services
services:
  client: media_services
  module: boto3.client
discovery:
- discovery_id: oci.media_services.listMediaServices
  calls:
  - action: listMediaServices
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.media_services.listMediaServicesByCompartment
  calls:
  - action: listMediaServicesByCompartment
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.media_services.getMediaServices
  calls:
  - action: getMediaServices
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.media_services.getMediaServicesDetails
  calls:
  - action: getMediaServicesDetails
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
