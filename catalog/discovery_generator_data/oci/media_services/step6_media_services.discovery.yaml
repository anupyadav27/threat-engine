version: '1.0'
provider: oci
service: media_services
services:
  client: media_services
  module: oci.media_services
discovery:
  # ── list_media_assets [independent] ──
  - discovery_id: oci.media_services.list_media_assets
    calls:
      - action: list_media_assets
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        ocid: '{{ item.ocid }}'
        compartment_id: '{{ item.compartment_id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        time_created: '{{ item.time_created }}'
        freeform_tags: '{{ item.freeform_tags }}'
        defined_tags: '{{ item.defined_tags }}'
        type: '{{ item.type }}'
        bucket_name: '{{ item.bucket_name }}'
        namespace_name: '{{ item.namespace_name }}'
        object_name: '{{ item.object_name }}'
        media_workflow_job_id: '{{ item.media_workflow_job_id }}'
