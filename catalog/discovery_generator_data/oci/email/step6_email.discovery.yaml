      - action: list_dkims
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        ocid: '{{ item.ocid }}'
        compartment_id: '{{ item.compartment_id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        time_created: '{{ item.time_created }}'
