version: '1.0'
provider: oci
service: database_migration
services:
  client: database_migration
  module: oci.database_migration
discovery:
- discovery_id: oci.database_migration.get_migration
  calls:
  - action: get_migration
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.database_migration.get_job
  calls:
  - action: get_job
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.database_migration.get_parameter_file_version
  calls:
  - action: get_parameter_file_version
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.database_migration.get_advisor_report
  calls:
  - action: get_advisor_report
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.database_migration.get_job_output_content
  calls:
  - action: get_job_output_content
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.database_migration.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.database_migration.get_connection
  calls:
  - action: get_connection
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.database_migration.list_work_request_errors
  for_each: oci.database_migration.get_migration
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.database_migration.list_migration_objects
  for_each: oci.database_migration.get_migration
  calls:
  - action: list_migration_objects
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.database_migration.list_excluded_objects
  for_each: oci.database_migration.get_migration
  calls:
  - action: list_excluded_objects
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.database_migration.list_work_request_logs
  for_each: oci.database_migration.get_migration
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.database_migration.list_migration_object_types
  for_each: oci.database_migration.get_migration
  calls:
  - action: list_migration_object_types
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.database_migration.list_job_outputs
  for_each: oci.database_migration.get_migration
  calls:
  - action: list_job_outputs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.database_migration.list_migration_parameters
  for_each: oci.database_migration.get_migration
  calls:
  - action: list_migration_parameters
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
