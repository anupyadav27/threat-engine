version: '1.0'
provider: oci
service: work_requests
services:
  client: work_requests
  module: oci.work_requests
discovery:
- discovery_id: oci.work_requests.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.work_requests.list_work_request_errors
  for_each: oci.work_requests.get_work_request
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.work_requests.list_work_request_logs
  for_each: oci.work_requests.get_work_request
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
