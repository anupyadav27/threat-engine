version: '1.0'
provider: oci
service: object_storage
services:
  client: object_storage
  module: oci.object_storage
discovery:
- discovery_id: oci.object_storage.list_buckets
  calls:
  - action: list_buckets
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
      namespace: '{{ item.namespace }}'
      public_access_type: '{{ item.public_access_type }}'
      storage_tier: '{{ item.storage_tier }}'
      versioning: '{{ item.versioning }}'
  uid_template: '{item.ocid}'
