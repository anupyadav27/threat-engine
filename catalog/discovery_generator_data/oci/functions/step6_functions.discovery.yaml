        status: '{{ item.status }}'
        time_created: '{{ item.time_created }}'
        freeform_tags: '{{ item.freeform_tags }}'
        defined_tags: '{{ item.defined_tags }}'
  # ── list_pbf_listings [independent] ──
  - discovery_id: oci.functions.list_pbf_listings
    calls:
