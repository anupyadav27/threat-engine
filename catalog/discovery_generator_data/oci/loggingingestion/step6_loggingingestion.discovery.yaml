# ============================================================
# Discovery YAML — loggingingestion (OCI)
# Generated: 2026-04-16T10:18:53Z
# Actions use OCI Python SDK method names (snake_case)
# ============================================================
version: '1.0'
provider: oci
service: loggingingestion
services:
  client: loggingingestion
  module: oci.loggingingestion
discovery:
  # ── list_log_groups [independent] ──
  - discovery_id: oci.loggingingestion.list_log_groups
    calls:
      - action: list_log_groups
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        ocid: '{{ item.ocid }}'
        compartment_id: '{{ item.compartment_id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        time_created: '{{ item.time_created }}'
        freeform_tags: '{{ item.freeform_tags }}'
        defined_tags: '{{ item.defined_tags }}'
        description: '{{ item.description }}'
        time_last_modified: '{{ item.time_last_modified }}'
  # ── get_log_group [dependent] ──
  - discovery_id: oci.loggingingestion.get_log_group
    calls:
      - action: get_log_group
        params:
          log_group_id: '{{ item.ocid }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        ocid: '{{ response.data.ocid }}'
        compartment_id: '{{ response.data.compartment_id }}'
        name: '{{ response.data.name }}'
        status: '{{ response.data.status }}'
        time_created: '{{ response.data.time_created }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        defined_tags: '{{ response.data.defined_tags }}'
        description: '{{ response.data.description }}'
        time_last_modified: '{{ response.data.time_last_modified }}'
  # ── list_logs [dependent] ──
  - discovery_id: oci.loggingingestion.list_logs
    calls:
      - action: list_logs
        params:
          log_group_id: '{{ item.ocid }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        ocid: '{{ response.data.ocid }}'
        compartment_id: '{{ response.data.compartment_id }}'
        name: '{{ response.data.name }}'
        status: '{{ response.data.status }}'
        time_created: '{{ response.data.time_created }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        defined_tags: '{{ response.data.defined_tags }}'
        log_type: '{{ response.data.log_type }}'
        is_enabled: '{{ response.data.is_enabled }}'
        retention_duration: '{{ response.data.retention_duration }}'
        log_group_id: '{{ response.data.log_group_id }}'
