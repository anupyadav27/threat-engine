version: '1.0'
provider: oci
service: license_manager
services:
  client: license_manager
  module: oci.license_manager
discovery:
- discovery_id: oci.license_manager.list_license_records
  calls:
  - action: list_license_records
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  uid_template: '{item.ocid}'
- discovery_id: oci.license_manager.list_product_license_consumers
  calls:
  - action: list_product_license_consumers
    save_as: response
    on_error: continue
  emit:
