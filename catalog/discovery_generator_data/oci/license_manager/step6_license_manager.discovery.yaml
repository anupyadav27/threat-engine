- discovery_id: oci.license_manager.get_product_license
  for_each: oci.license_manager.list_product_licenses
  calls:
  - action: get_product_license
    params:
      product_license_id: '{{ item.ocid }}'
    save_as: response
    on_error: continue
  emit:
