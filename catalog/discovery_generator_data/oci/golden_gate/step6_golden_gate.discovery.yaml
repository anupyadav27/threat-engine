version: '1.0'
provider: oci
service: golden_gate
services:
  client: golden_gate
  module: oci.golden_gate
discovery:
- discovery_id: oci.golden_gate.list_certificates
  calls:
  - action: list_certificates
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  uid_template: '{item.ocid}'
