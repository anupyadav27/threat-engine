version: '1.0'
provider: oci
service: golden_gate
services:
  client: golden_gate
  module: oci.golden_gate
discovery:
- discovery_id: oci.golden_gate.get_deployment_upgrade
  calls:
  - action: get_deployment_upgrade
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
