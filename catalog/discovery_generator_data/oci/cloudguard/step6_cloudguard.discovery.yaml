version: '1.0'
provider: oci
service: cloudguard
discovery:
- discovery_id: oci.cloud_guard.list_target_detector_recipe_detector_rules
  calls:
  - action: list_target_detector_recipe_detector_rules
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  _used_by_rules:
  - oci.cloudguard.detector_recipe.enabled
  - oci.cloudguard.target.enabled
  uid_template: '{item.ocid}'
