version: '1.0'
provider: oci
service: cloud_bridge
services:
  client: cloud_bridge
  module: oci.cloud_bridge
discovery:
  # ── list_agent_dependencies [independent] ──
  - discovery_id: oci.cloud_bridge.list_agent_dependencies
    calls:
      - action: list_agent_dependencies
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        ocid: '{{ item.ocid }}'
        compartment_id: '{{ item.compartment_id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        time_created: '{{ item.time_created }}'
        freeform_tags: '{{ item.freeform_tags }}'
        defined_tags: '{{ item.defined_tags }}'
  # ── list_agents [independent] ──
  - discovery_id: oci.cloud_bridge.list_agents
    calls:
      - action: list_agents
        save_as: response
        on_error: continue
    emit:
