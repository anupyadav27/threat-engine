version: '1.0'
provider: oci
service: osub_billing_schedule
services:
  client: osub_billing_schedule
  module: oci.osub_billing_schedule
discovery:
- discovery_id: oci.osub_billing_schedule.list_billing_schedules
  calls:
  - action: list_billing_schedules
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  uid_template: '{item.ocid}'
