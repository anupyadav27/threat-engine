version: '1.0'
provider: oci
service: managed_kafka
services:
  client: managed_kafka
  module: oci.managed_kafka
discovery:
- discovery_id: oci.managed_kafka.list_kafka_cluster_config_versions
  calls:
  - action: list_kafka_cluster_config_versions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  uid_template: '{item.ocid}'
