# ============================================================
# Discovery YAML — model_deployment (OCI)
# Generated: 2026-04-16T10:18:53Z
# Actions use OCI Python SDK method names (snake_case)
# ============================================================
version: '1.0'
provider: oci
service: model_deployment
services:
  client: model_deployment
  module: oci.model_deployment
discovery:
  # ── list_model_deployments [independent] ──
  - discovery_id: oci.model_deployment.list_model_deployments
    calls:
      - action: list_model_deployments
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        ocid: '{{ item.ocid }}'
        compartment_id: '{{ item.compartment_id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        time_created: '{{ item.time_created }}'
        freeform_tags: '{{ item.freeform_tags }}'
        defined_tags: '{{ item.defined_tags }}'
        project_id: '{{ item.project_id }}'
        created_by: '{{ item.created_by }}'
        model_deployment_url: '{{ item.model_deployment_url }}'
        category_log_details: '{{ item.category_log_details }}'
  # ── list_model_version_sets [independent] ──
  - discovery_id: oci.model_deployment.list_model_version_sets
    calls:
      - action: list_model_version_sets
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        ocid: '{{ item.ocid }}'
        compartment_id: '{{ item.compartment_id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        time_created: '{{ item.time_created }}'
        freeform_tags: '{{ item.freeform_tags }}'
        defined_tags: '{{ item.defined_tags }}'
        project_id: '{{ item.project_id }}'
        created_by: '{{ item.created_by }}'
  # ── list_pipeline_runs [independent] ──
  - discovery_id: oci.model_deployment.list_pipeline_runs
    calls:
      - action: list_pipeline_runs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        ocid: '{{ item.ocid }}'
        compartment_id: '{{ item.compartment_id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        time_created: '{{ item.time_created }}'
        freeform_tags: '{{ item.freeform_tags }}'
        defined_tags: '{{ item.defined_tags }}'
        pipeline_id: '{{ item.pipeline_id }}'
        created_by: '{{ item.created_by }}'
        time_started: '{{ item.time_started }}'
        time_finished: '{{ item.time_finished }}'
  # ── get_model_deployment [dependent] ──
  - discovery_id: oci.model_deployment.get_model_deployment
    calls:
      - action: get_model_deployment
        params:
          model_deployment_id: '{{ item.ocid }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        ocid: '{{ response.data.ocid }}'
        compartment_id: '{{ response.data.compartment_id }}'
        name: '{{ response.data.name }}'
        status: '{{ response.data.status }}'
        time_created: '{{ response.data.time_created }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        defined_tags: '{{ response.data.defined_tags }}'
        project_id: '{{ response.data.project_id }}'
        created_by: '{{ response.data.created_by }}'
        model_deployment_url: '{{ response.data.model_deployment_url }}'
        category_log_details: '{{ response.data.category_log_details }}'
        model_deployment_configuration_details: '{{ response.data.model_deployment_configuration_details }}'
        deployment_mode: '{{ response.data.deployment_mode }}'
