version: '1.0'
provider: oci
service: loggingsearch
services:
  client: loggingsearch
  module: boto3.client
discovery:
- discovery_id: oci.loggingsearch.listLoggingsearch
  calls:
  - action: listLoggingsearch
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.loggingsearch.listLoggingsearchByCompartment
  calls:
  - action: listLoggingsearchByCompartment
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.loggingsearch.getLoggingsearch
  calls:
  - action: getLoggingsearch
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.loggingsearch.getLoggingsearchDetails
  calls:
  - action: getLoggingsearchDetails
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
