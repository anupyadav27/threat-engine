version: '1.0'
provider: oci
service: loggingsearch
services:
  client: loggingsearch
  module: oci.loggingsearch
discovery:
- discovery_id: oci.loggingsearch.list_log_saved_searches
  calls:
  - action: list_log_saved_searches
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
      description: '{{ item.description }}'
      query: '{{ item.query }}'
  uid_template: '{item.ocid}'
- discovery_id: oci.loggingsearch.search_logs
  calls:
  - action: search_logs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      log_group_id: '{{ item.log_group_id }}'
      log_id: '{{ item.log_id }}'
      subject: '{{ item.subject }}'
      source: '{{ item.source }}'
      type: '{{ item.type }}'
      data: '{{ item.data }}'
  uid_template: '{item.ocid}'
- discovery_id: oci.loggingsearch.get_log_saved_search
  calls:
  - action: get_log_saved_search
    params:
      log_saved_search_id: '{{ item.ocid }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      ocid: '{{ response.data.ocid }}'
      compartment_id: '{{ response.data.compartment_id }}'
      name: '{{ response.data.name }}'
      status: '{{ response.data.status }}'
      time_created: '{{ response.data.time_created }}'
      freeform_tags: '{{ response.data.freeform_tags }}'
      defined_tags: '{{ response.data.defined_tags }}'
      description: '{{ response.data.description }}'
      query: '{{ response.data.query }}'
  uid_template: '{item.ocid}'
