version: '1.0'
provider: oci
service: email_data_plane
services:
  client: email_data_plane
  module: oci.email_data_plane
discovery:
- discovery_id: oci.email_data_plane.list_email_domains
  calls:
  - action: list_email_domains
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
      is_spf: '{{ item.is_spf }}'
      is_dkim: '{{ item.is_dkim }}'
      is_dmarc: '{{ item.is_dmarc }}'
  uid_template: '{item.ocid}'
- discovery_id: oci.email_data_plane.list_senders
  calls:
  - action: list_senders
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      email_address: '{{ item.email_address }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  uid_template: '{item.ocid}'
- discovery_id: oci.email_data_plane.list_suppressions
  calls:
  - action: list_suppressions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      email_address: '{{ item.email_address }}'
      reason: '{{ item.reason }}'
      time_created: '{{ item.time_created }}'
  uid_template: '{item.ocid}'
- discovery_id: oci.email_data_plane.get_sender
  calls:
  - action: get_sender
    params:
      sender_id: '{{ item.ocid }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      ocid: '{{ response.data.ocid }}'
      compartment_id: '{{ response.data.compartment_id }}'
      email_address: '{{ response.data.email_address }}'
      status: '{{ response.data.status }}'
      time_created: '{{ response.data.time_created }}'
      freeform_tags: '{{ response.data.freeform_tags }}'
      defined_tags: '{{ response.data.defined_tags }}'
      email_domain_id: '{{ response.data.email_domain_id }}'
      is_spf: '{{ response.data.is_spf }}'
  uid_template: '{item.ocid}'
