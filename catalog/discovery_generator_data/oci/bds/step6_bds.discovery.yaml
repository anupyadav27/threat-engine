version: '1.0'
provider: oci
service: bds
services:
  client: bds
  module: oci.bds
discovery:
- discovery_id: oci.bds.list_auto_scaling_configurations
  calls:
  - action: list_auto_scaling_configurations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  uid_template: '{item.ocid}'
