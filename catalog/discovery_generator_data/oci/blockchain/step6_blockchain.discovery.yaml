version: '1.0'
provider: oci
service: blockchain
services:
  client: blockchain
  module: oci.blockchain
discovery:
  # ── list_blockchain_platform_patches [independent] ──
  - discovery_id: oci.blockchain.list_blockchain_platform_patches
    calls:
      - action: list_blockchain_platform_patches
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        ocid: '{{ item.ocid }}'
        compartment_id: '{{ item.compartment_id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        time_created: '{{ item.time_created }}'
        freeform_tags: '{{ item.freeform_tags }}'
        defined_tags: '{{ item.defined_tags }}'
