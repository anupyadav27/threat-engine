version: '1.0'
provider: oci
service: cloud_migrations
services:
  client: cloud_migrations
  module: oci.cloud_migrations
discovery:
- discovery_id: oci.cloud_migrations.list_available_shapes
  calls:
  - action: list_available_shapes
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  uid_template: '{item.ocid}'
