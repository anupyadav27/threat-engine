version: '1.0'
provider: oci
service: oke
discovery:
- _stub: true
  discovery_id: oci.oke.list_okes
  _note: STUB — generated by step2, needs real SDK review for oci.oke
  _rules:
  - oci.oke.cluster.rbac_enabled
  - oci.oke.endpoints.not_publicly_accessible_enforced
  _client: oci.container_engine
  calls:
  - action: ListResources
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      id: '{{ item.Id }}'
      name: '{{ item.Name }}'
      resource_type: '''{{ resource_type }}'''
      region: '{{ region }}'
      encrypted: '{{ item.Encrypted }}'
      kms_key_id: '{{ item.KMSKeyId }}'
      status: '{{ item.Status }}'
      enabled: '{{ item.Enabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      internet_facing: '{{ item.InternetFacing }}'
      public_ip_address: '{{ item.PublicIpAddress }}'
      tags: '{{ item.Tags }}'
      permissions: '{{ item.Permissions }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      retention_days: '{{ item.RetentionDays }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
- discovery_id: oci.oke.list_clusters
  calls:
  - action: list_clusters
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.id }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.lifecycle_state }}'
      kubernetes_version: '{{ item.kubernetes_version }}'
      time_created: '{{ item.metadata.time_created }}'
      vcn_id: '{{ item.vcn_id }}'
      endpoint_config: '{{ item.endpoint_config }}'
      endpoints: '{{ item.endpoints }}'
      options: '{{ item.options }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
      cluster_pod_network_options: '{{ item.cluster_pod_network_options }}'
      image_policy_config: '{{ item.image_policy_config }}'
      kms_key_id: '{{ item.kms_key_id }}'
  _used_by_rules:
  - oci.oke.cluster.rbac_enabled
  - oci.oke.endpoints.not_publicly_accessible_enforced
  uid_template: '{item.ocid}'
