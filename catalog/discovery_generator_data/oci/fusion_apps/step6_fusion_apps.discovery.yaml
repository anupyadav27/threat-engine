version: '1.0'
provider: oci
service: fusion_apps
services:
  client: fusion_apps
  module: oci.fusion_apps
discovery:
- discovery_id: oci.fusion_apps.list_admin_users
  calls:
  - action: list_admin_users
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  uid_template: '{item.ocid}'
