version: '1.0'
provider: oci
service: fusion_apps
services:
  client: fusion_apps
  module: oci.fusion_apps
discovery:
- discovery_id: oci.fusion_apps.get_fusion_environment_status
  calls:
  - action: get_fusion_environment_status
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.fusion_apps.get_fusion_environment_family_subscription_detail
  calls:
  - action: get_fusion_environment_family_subscription_detail
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.fusion_apps.get_scheduled_activity
  calls:
  - action: get_scheduled_activity
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.fusion_apps.get_service_attachment
  calls:
  - action: get_service_attachment
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.fusion_apps.get_fusion_environment
  calls:
  - action: get_fusion_environment
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.fusion_apps.get_fusion_environment_family
  calls:
  - action: get_fusion_environment_family
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.fusion_apps.get_refresh_activity
  calls:
  - action: get_refresh_activity
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.fusion_apps.get_data_masking_activity
  calls:
  - action: get_data_masking_activity
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.fusion_apps.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.fusion_apps.get_fusion_environment_family_limits_and_usage
  calls:
  - action: get_fusion_environment_family_limits_and_usage
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.fusion_apps.list_work_request_errors
  for_each: oci.fusion_apps.get_fusion_environment_status
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.fusion_apps.list_work_request_logs
  for_each: oci.fusion_apps.get_fusion_environment_status
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.fusion_apps.list_admin_users
  for_each: oci.fusion_apps.get_fusion_environment_status
  calls:
  - action: list_admin_users
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.fusion_apps.list_time_available_for_refreshes
  for_each: oci.fusion_apps.get_fusion_environment_status
  calls:
  - action: list_time_available_for_refreshes
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
