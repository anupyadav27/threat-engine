version: '1.0'
provider: oci
service: osub_organization_subscription
services:
  client: osub_organization_subscription
  module: oci.osub_organization_subscription
discovery:
- discovery_id: oci.osub_organization_subscription.list_organization_subscriptions
  calls:
  - action: list_organization_subscriptions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  uid_template: '{item.ocid}'
