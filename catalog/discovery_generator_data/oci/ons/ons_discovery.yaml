version: '1.0'
provider: oci
service: ons
services:
  client: ons
  module: oci.ons
discovery:
- discovery_id: oci.ons.get_unsubscription
  calls:
  - action: get_unsubscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.ons.get_confirm_subscription
  calls:
  - action: get_confirm_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.ons.get_subscription
  calls:
  - action: get_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
