version: '1.0'
provider: oci
service: redis
services:
  client: redis
  module: oci.redis
discovery:
- discovery_id: oci.redis.list_clusters
  calls:
  - action: list_clusters
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
      node_count: '{{ item.node_count }}'
      node_memory_in_gbs: '{{ item.node_memory_in_gbs }}'
      primary_fqdn: '{{ item.primary_fqdn }}'
      software_version: '{{ item.software_version }}'
      cluster_mode: '{{ item.cluster_mode }}'
  uid_template: '{item.ocid}'
- discovery_id: oci.redis.list_redis_clusters
  calls:
  - action: list_redis_clusters
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
      node_count: '{{ item.node_count }}'
      node_memory_in_gbs: '{{ item.node_memory_in_gbs }}'
      primary_fqdn: '{{ item.primary_fqdn }}'
      primary_endpoint_ip_address: '{{ item.primary_endpoint_ip_address }}'
      software_version: '{{ item.software_version }}'
  uid_template: '{item.ocid}'
- discovery_id: oci.redis.get_redis_cluster
  calls:
  - action: get_redis_cluster
    params:
      redis_cluster_id: '{{ item.ocid }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      ocid: '{{ response.data.ocid }}'
      compartment_id: '{{ response.data.compartment_id }}'
      name: '{{ response.data.name }}'
      status: '{{ response.data.status }}'
      time_created: '{{ response.data.time_created }}'
      freeform_tags: '{{ response.data.freeform_tags }}'
      defined_tags: '{{ response.data.defined_tags }}'
      node_count: '{{ response.data.node_count }}'
      node_memory_in_gbs: '{{ response.data.node_memory_in_gbs }}'
      primary_fqdn: '{{ response.data.primary_fqdn }}'
      primary_endpoint_ip_address: '{{ response.data.primary_endpoint_ip_address }}'
      replicas_endpoint_ip_address: '{{ response.data.replicas_endpoint_ip_address
        }}'
      software_version: '{{ response.data.software_version }}'
      cluster_mode: '{{ response.data.cluster_mode }}'
      shard_count: '{{ response.data.shard_count }}'
  uid_template: '{item.ocid}'
