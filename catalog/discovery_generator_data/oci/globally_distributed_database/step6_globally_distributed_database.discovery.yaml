  # ── list_work_requests [independent] ──
  - discovery_id: oci.globally_distributed_database.list_work_requests
    calls:
      - action: list_work_requests
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        ocid: '{{ item.ocid }}'
        compartment_id: '{{ item.compartment_id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        time_created: '{{ item.time_created }}'
        freeform_tags: '{{ item.freeform_tags }}'
        defined_tags: '{{ item.defined_tags }}'
  # ── get_private_endpoint [dependent] ──
  - discovery_id: oci.globally_distributed_database.get_private_endpoint
    calls:
      - action: get_private_endpoint
        params:
          private_endpoint_id: '{{ item.ocid }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        ocid: '{{ response.data.ocid }}'
        compartment_id: '{{ response.data.compartment_id }}'
        name: '{{ response.data.name }}'
        status: '{{ response.data.status }}'
        time_created: '{{ response.data.time_created }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        defined_tags: '{{ response.data.defined_tags }}'
  # ── get_sharded_database [dependent → list_sharded_databases] ──
  - discovery_id: oci.globally_distributed_database.get_sharded_database
    for_each: oci.globally_distributed_database.list_sharded_databases
    calls:
      - action: get_sharded_database
        params:
          sharded_database_id: '{{ item.ocid }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        ocid: '{{ response.data.ocid }}'
        compartment_id: '{{ response.data.compartment_id }}'
        name: '{{ response.data.name }}'
        status: '{{ response.data.status }}'
        time_created: '{{ response.data.time_created }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        defined_tags: '{{ response.data.defined_tags }}'
  # ── get_work_request [dependent] ──
  - discovery_id: oci.globally_distributed_database.get_work_request
