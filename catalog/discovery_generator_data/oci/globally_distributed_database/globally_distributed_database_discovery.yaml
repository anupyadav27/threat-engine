version: '1.0'
provider: oci
service: globally_distributed_database
services:
  client: globally_distributed_database
  module: oci.globally_distributed_database
discovery:
- discovery_id: oci.globally_distributed_database.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.globally_distributed_database.get_sharded_database
  calls:
  - action: get_sharded_database
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.globally_distributed_database.get_private_endpoint
  calls:
  - action: get_private_endpoint
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.globally_distributed_database.list_sharded_databases
  for_each: oci.globally_distributed_database.get_work_request
  calls:
  - action: list_sharded_databases
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.globally_distributed_database.list_work_request_errors
  for_each: oci.globally_distributed_database.get_work_request
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.globally_distributed_database.list_work_request_logs
  for_each: oci.globally_distributed_database.get_work_request
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
