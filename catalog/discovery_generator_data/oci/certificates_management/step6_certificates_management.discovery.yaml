version: '1.0'
provider: oci
service: certificates_management
services:
  client: certificates_management
  module: oci.certificates_management
discovery:
- discovery_id: oci.certificates_management.list_associations
  calls:
  - action: list_associations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  uid_template: '{item.ocid}'
- discovery_id: oci.certificates_management.list_ca_bundles
  calls:
  - action: list_ca_bundles
    save_as: response
    on_error: continue
  emit:
