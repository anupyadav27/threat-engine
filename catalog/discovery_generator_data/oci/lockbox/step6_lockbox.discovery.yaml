version: '1.0'
provider: oci
service: lockbox
services:
  client: lockbox
  module: oci.lockbox
discovery:
  # ── list_access_requests [independent] ──
  - discovery_id: oci.lockbox.list_access_requests
    calls:
      - action: list_access_requests
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        ocid: '{{ item.ocid }}'
        compartment_id: '{{ item.compartment_id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        time_created: '{{ item.time_created }}'
        freeform_tags: '{{ item.freeform_tags }}'
        defined_tags: '{{ item.defined_tags }}'
