# ============================================================
# Discovery YAML — identity_domains (OCI)
# Generated: 2026-04-16T10:18:53Z
# Actions use OCI Python SDK method names (snake_case)
# ============================================================
version: '1.0'
provider: oci
service: identity_domains
services:
  client: identity_domains
  module: oci.identity_domains
discovery:
  # ── list_apps [independent] ──
  - discovery_id: oci.identity_domains.list_apps
    calls:
      - action: list_apps
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        ocid: '{{ item.ocid }}'
        compartment_id: '{{ item.compartment_id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        time_created: '{{ item.time_created }}'
        freeform_tags: '{{ item.freeform_tags }}'
        defined_tags: '{{ item.defined_tags }}'
        display_name: '{{ item.display_name }}'
        active: '{{ item.active }}'
        client_type: '{{ item.client_type }}'
        is_oauth_client: '{{ item.is_oauth_client }}'
  # ── list_domains [independent] ──
  - discovery_id: oci.identity_domains.list_domains
    calls:
      - action: list_domains
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        ocid: '{{ item.ocid }}'
        compartment_id: '{{ item.compartment_id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        time_created: '{{ item.time_created }}'
        freeform_tags: '{{ item.freeform_tags }}'
        defined_tags: '{{ item.defined_tags }}'
        home_region: '{{ item.home_region }}'
        type: '{{ item.type }}'
        url: '{{ item.url }}'
        replica_regions: '{{ item.replica_regions }}'
  # ── list_groups [independent] ──
  - discovery_id: oci.identity_domains.list_groups
    calls:
      - action: list_groups
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        ocid: '{{ item.ocid }}'
        compartment_id: '{{ item.compartment_id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        time_created: '{{ item.time_created }}'
        freeform_tags: '{{ item.freeform_tags }}'
        defined_tags: '{{ item.defined_tags }}'
        display_name: '{{ item.display_name }}'
        members: '{{ item.members }}'
        external_id: '{{ item.external_id }}'
  # ── list_my_authentication_factor_settings [independent] ──
  - discovery_id: oci.identity_domains.list_my_authentication_factor_settings
    calls:
      - action: list_my_authentication_factor_settings
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        ocid: '{{ item.ocid }}'
        compartment_id: '{{ item.compartment_id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        time_created: '{{ item.time_created }}'
        freeform_tags: '{{ item.freeform_tags }}'
        defined_tags: '{{ item.defined_tags }}'
        mfa_status: '{{ item.mfa_status }}'
        bypass_code_enabled: '{{ item.bypass_code_enabled }}'
  # ── list_password_policies [independent] ──
  - discovery_id: oci.identity_domains.list_password_policies
    calls:
      - action: list_password_policies
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        ocid: '{{ item.ocid }}'
        compartment_id: '{{ item.compartment_id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        time_created: '{{ item.time_created }}'
        freeform_tags: '{{ item.freeform_tags }}'
        defined_tags: '{{ item.defined_tags }}'
        min_length: '{{ item.min_length }}'
        max_length: '{{ item.max_length }}'
        min_upper_case: '{{ item.min_upper_case }}'
        min_lower_case: '{{ item.min_lower_case }}'
        min_numerals: '{{ item.min_numerals }}'
        expires_after: '{{ item.expires_after }}'
  # ── list_users [independent] ──
  - discovery_id: oci.identity_domains.list_users
    calls:
      - action: list_users
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        ocid: '{{ item.ocid }}'
        compartment_id: '{{ item.compartment_id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        time_created: '{{ item.time_created }}'
        freeform_tags: '{{ item.freeform_tags }}'
        defined_tags: '{{ item.defined_tags }}'
        user_name: '{{ item.user_name }}'
        display_name: '{{ item.display_name }}'
        emails: '{{ item.emails }}'
        is_mfa_activated: '{{ item.is_mfa_activated }}'
  # ── get_domain [dependent] ──
  - discovery_id: oci.identity_domains.get_domain
    calls:
      - action: get_domain
        params:
          domain_id: '{{ item.ocid }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        ocid: '{{ response.data.ocid }}'
        compartment_id: '{{ response.data.compartment_id }}'
        name: '{{ response.data.name }}'
        status: '{{ response.data.status }}'
        time_created: '{{ response.data.time_created }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        defined_tags: '{{ response.data.defined_tags }}'
        home_region: '{{ response.data.home_region }}'
        type: '{{ response.data.type }}'
        url: '{{ response.data.url }}'
        replica_regions: '{{ response.data.replica_regions }}'
        is_hidden_on_login: '{{ response.data.is_hidden_on_login }}'
        license_type: '{{ response.data.license_type }}'
