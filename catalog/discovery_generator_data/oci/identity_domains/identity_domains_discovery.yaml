version: '1.0'
provider: oci
service: identity_domains
services:
  client: identity_domains
  module: boto3.client
discovery:
- discovery_id: oci.identity_domains.listIdentityDomains
  calls:
  - action: listIdentityDomains
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.identity_domains.listIdentityDomainsByCompartment
  calls:
  - action: listIdentityDomainsByCompartment
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.identity_domains.getIdentityDomains
  calls:
  - action: getIdentityDomains
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.identity_domains.getIdentityDomainsDetails
  calls:
  - action: getIdentityDomainsDetails
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
