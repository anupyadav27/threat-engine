version: '1.0'
provider: oci
service: compute_instance_agent
services:
  client: compute_instance_agent
  module: oci.compute_instance_agent
discovery:
- discovery_id: oci.compute_instance_agent.list_instanceagent_available_plugins
  calls:
  - action: list_instanceagent_available_plugins
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  uid_template: '{item.ocid}'
