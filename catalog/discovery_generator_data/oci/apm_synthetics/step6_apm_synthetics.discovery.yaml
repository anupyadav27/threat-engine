version: '1.0'
provider: oci
service: apm_synthetics
services:
  client: apm_synthetics
  module: oci.apm_synthetics
discovery:
- discovery_id: oci.apm_synthetics.list_dedicated_vantage_points
  calls:
  - action: list_dedicated_vantage_points
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  uid_template: '{item.ocid}'
