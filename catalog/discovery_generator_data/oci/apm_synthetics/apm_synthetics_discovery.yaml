version: '1.0'
provider: oci
service: apm_synthetics
services:
  client: apm_synthetics
  module: oci.apm_synthetics
discovery:
- discovery_id: oci.apm_synthetics.get_script
  calls:
  - action: get_script
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.apm_synthetics.get_worker
  calls:
  - action: get_worker
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.apm_synthetics.get_dedicated_vantage_point
  calls:
  - action: get_dedicated_vantage_point
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.apm_synthetics.get_monitor
  calls:
  - action: get_monitor
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.apm_synthetics.get_on_premise_vantage_point
  calls:
  - action: get_on_premise_vantage_point
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.apm_synthetics.get_monitor_result
  calls:
  - action: get_monitor_result
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.apm_synthetics.list_public_vantage_points
  for_each: oci.apm_synthetics.get_script
  calls:
  - action: list_public_vantage_points
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
