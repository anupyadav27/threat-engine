version: '1.0'
provider: oci
service: resource_manager
services:
  client: resource_manager
  module: oci.resource_manager
discovery:
- discovery_id: oci.resource_manager.list_configuration_source_providers
  calls:
  - action: list_configuration_source_providers
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  uid_template: '{item.ocid}'
