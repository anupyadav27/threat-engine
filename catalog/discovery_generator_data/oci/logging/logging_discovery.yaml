version: '1.0'
provider: oci
service: logging
services:
  client: logging
  module: oci.logging
discovery:
- discovery_id: oci.logging.get_unified_agent_configuration
  calls:
  - action: get_unified_agent_configuration
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.logging.get_log_saved_search
  calls:
  - action: get_log_saved_search
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.logging.get_log
  calls:
  - action: get_log
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.logging.get_log_group
  calls:
  - action: get_log_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.logging.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.logging.list_work_request_errors
  for_each: oci.logging.get_unified_agent_configuration
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.logging.list_services
  for_each: oci.logging.get_unified_agent_configuration
  calls:
  - action: list_services
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.logging.list_work_request_logs
  for_each: oci.logging.get_unified_agent_configuration
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
