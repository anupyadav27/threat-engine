version: '1.0'
provider: oci
service: capacity_management
services:
  client: capacity_management
  module: oci.capacity_management
discovery:
- discovery_id: oci.capacity_management.get_internal_occm_demand_signal_catalog
  calls:
  - action: get_internal_occm_demand_signal_catalog
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.capacity_management.get_internal_occm_demand_signal
  calls:
  - action: get_internal_occm_demand_signal
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.capacity_management.get_internal_occm_demand_signal_delivery
  calls:
  - action: get_internal_occm_demand_signal_delivery
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.capacity_management.list_internal_occm_demand_signal_catalog_resources
  for_each: oci.capacity_management.get_internal_occm_demand_signal_catalog
  calls:
  - action: list_internal_occm_demand_signal_catalog_resources
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.capacity_management.list_internal_occm_demand_signal_items
  for_each: oci.capacity_management.get_internal_occm_demand_signal_catalog
  calls:
  - action: list_internal_occm_demand_signal_items
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
