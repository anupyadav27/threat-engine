version: '1.0'
provider: oci
service: vcn
discovery:
- discovery_id: oci.core.list_network_security_group_security_rules
  calls:
  - action: list_network_security_group_security_rules
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  _used_by_rules:
  - oci.vcn.network_security_group.configured
  uid_template: '{item.ocid}'
