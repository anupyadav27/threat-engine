# ============================================================
# Discovery YAML — secrets (OCI)
# Generated: 2026-04-16T10:18:53Z
# Actions use OCI Python SDK method names (snake_case)
# ============================================================
version: '1.0'
provider: oci
service: secrets
services:
  client: secrets
  module: oci.secrets
discovery:
  # ── list_secret_bundle_versions [independent] ──
  - discovery_id: oci.secrets.list_secret_bundle_versions
    calls:
      - action: list_secret_bundle_versions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        ocid: '{{ item.ocid }}'
        compartment_id: '{{ item.compartment_id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        time_created: '{{ item.time_created }}'
        freeform_tags: '{{ item.freeform_tags }}'
        defined_tags: '{{ item.defined_tags }}'
  # ── get_secret_bundle [dependent] ──
  - discovery_id: oci.secrets.get_secret_bundle
    calls:
      - action: get_secret_bundle
        params:
          secret_bundle_id: '{{ item.ocid }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        ocid: '{{ response.data.ocid }}'
        compartment_id: '{{ response.data.compartment_id }}'
        name: '{{ response.data.name }}'
        status: '{{ response.data.status }}'
        time_created: '{{ response.data.time_created }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        defined_tags: '{{ response.data.defined_tags }}'
  # ── get_secret_bundle_by_name [dependent] ──
  - discovery_id: oci.secrets.get_secret_bundle_by_name
    calls:
      - action: get_secret_bundle_by_name
        params:
          secret_bundle_by_name_id: '{{ item.ocid }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        ocid: '{{ response.data.ocid }}'
        compartment_id: '{{ response.data.compartment_id }}'
        name: '{{ response.data.name }}'
        status: '{{ response.data.status }}'
        time_created: '{{ response.data.time_created }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        defined_tags: '{{ response.data.defined_tags }}'
