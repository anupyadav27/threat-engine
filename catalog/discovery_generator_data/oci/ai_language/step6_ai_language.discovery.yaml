version: '1.0'
provider: oci
service: ai_language
services:
  client: ai_language
  module: oci.ai_language
discovery:
- discovery_id: oci.ai_language.list_endpoints
  calls:
  - action: list_endpoints
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  uid_template: '{item.ocid}'
