version: '1.0'
provider: oci
service: network_firewall
services:
  client: network_firewall
  module: oci.network_firewall
discovery:
- discovery_id: oci.network_firewall.get_application
  calls:
  - action: get_application
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.network_firewall.get_mapped_secret
