version: '1.0'
provider: oci
service: database_tools
services:
  client: database_tools
  module: oci.database_tools.models
discovery:
- discovery_id: oci.database_tools.get_subtype
  calls:
  - action: get_subtype
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
