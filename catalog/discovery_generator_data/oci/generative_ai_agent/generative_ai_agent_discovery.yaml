version: '1.0'
provider: oci
service: generative_ai_agent
services:
  client: generative_ai_agent
  module: oci.generative_ai_agent
discovery:
- discovery_id: oci.generative_ai_agent.get_agent_endpoint
  calls:
  - action: get_agent_endpoint
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.generative_ai_agent.get_tool
  calls:
  - action: get_tool
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.generative_ai_agent.get_knowledge_base
  calls:
  - action: get_knowledge_base
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.generative_ai_agent.get_data_ingestion_job_log_content
  calls:
  - action: get_data_ingestion_job_log_content
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.generative_ai_agent.get_data_ingestion_job
  calls:
  - action: get_data_ingestion_job
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.generative_ai_agent.get_data_source
  calls:
  - action: get_data_source
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.generative_ai_agent.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.generative_ai_agent.get_agent
  calls:
  - action: get_agent
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.generative_ai_agent.list_data_sources
  for_each: oci.generative_ai_agent.get_agent_endpoint
  calls:
  - action: list_data_sources
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.generative_ai_agent.list_work_request_errors
  for_each: oci.generative_ai_agent.get_agent_endpoint
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.generative_ai_agent.list_knowledge_bases
  for_each: oci.generative_ai_agent.get_agent_endpoint
  calls:
  - action: list_knowledge_bases
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.generative_ai_agent.list_work_request_logs
  for_each: oci.generative_ai_agent.get_agent_endpoint
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
