version: '1.0'
provider: oci
service: iam
discovery:
- discovery_id: oci.identity.list_allowed_domain_license_types
  calls:
  - action: list_allowed_domain_license_types
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  _used_by_rules:
  - oci.iam.role.kms_enforce_separation_of_duties_configured
  - oci.iam.role.sa_enforce_separation_of_duties_configured
  uid_template: '{item.ocid}'
- discovery_id: oci.identity.list_customer_secret_keys
  calls:
  - action: list_customer_secret_keys
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  _used_by_rules:
  - oci.iam.user.allow_customer_secret_keys_restricted
  uid_template: '{item.ocid}'
- discovery_id: oci.identity.list_user_group_memberships
  calls:
  - action: list_user_group_memberships
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  _used_by_rules:
  - oci.iam.user.anonymous_auth_disabled
  - oci.iam.user.last_successful_login_configured
  - oci.iam.user.name_configured
  - oci.iam.user.security_key_enforcement_configured
  - oci.iam.user.service_account_default_check
  uid_template: '{item.ocid}'
