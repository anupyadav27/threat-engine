version: '1.0'
provider: oci
service: blockstorage
discovery:
- discovery_id: oci.block_storage.get_volume_backup_policy
  calls:
  - action: get_volume_backup_policy
    params:
      volume_backup_policy_id: '{{ item.ocid }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      ocid: '{{ response.data.ocid }}'
      compartment_id: '{{ response.data.compartment_id }}'
      name: '{{ response.data.name }}'
      status: '{{ response.data.status }}'
      time_created: '{{ response.data.time_created }}'
      freeform_tags: '{{ response.data.freeform_tags }}'
      defined_tags: '{{ response.data.defined_tags }}'
  _used_by_rules:
  - oci.blockstorage.volume.backup_policy_configured
  uid_template: '{item.ocid}'
- discovery_id: oci.block_storage.list_block_volume_replicas
  calls:
  - action: list_block_volume_replicas
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  _used_by_rules:
  - oci.blockstorage.volume.encryption_at_rest_configured
  uid_template: '{item.ocid}'
