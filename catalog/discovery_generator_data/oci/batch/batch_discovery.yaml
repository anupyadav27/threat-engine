version: '1.0'
provider: oci
service: batch
services:
  client: batch
  module: boto3.client
discovery:
- discovery_id: oci.batch.listBatch
  calls:
  - action: listBatch
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.batch.listBatchByCompartment
  calls:
  - action: listBatchByCompartment
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.batch.getBatch
  calls:
  - action: getBatch
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.batch.getBatchDetails
  calls:
  - action: getBatchDetails
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
