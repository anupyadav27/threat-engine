# ============================================================
# Discovery YAML — batch (OCI)
# Generated: 2026-04-16T10:18:52Z
# Actions use OCI Python SDK method names (snake_case)
# ============================================================
version: '1.0'
provider: oci
service: batch
services:
  client: batch
  module: oci.batch
discovery:
  # ── list_job_definitions [independent] ──
  - discovery_id: oci.batch.list_job_definitions
    calls:
      - action: list_job_definitions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        ocid: '{{ item.ocid }}'
        compartment_id: '{{ item.compartment_id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        time_created: '{{ item.time_created }}'
        freeform_tags: '{{ item.freeform_tags }}'
        defined_tags: '{{ item.defined_tags }}'
        job_infrastructure_configuration_details: '{{ item.job_infrastructure_configuration_details }}'
  # ── list_job_runs [independent] ──
  - discovery_id: oci.batch.list_job_runs
    calls:
      - action: list_job_runs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        ocid: '{{ item.ocid }}'
        compartment_id: '{{ item.compartment_id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        time_created: '{{ item.time_created }}'
        freeform_tags: '{{ item.freeform_tags }}'
        defined_tags: '{{ item.defined_tags }}'
        job_id: '{{ item.job_id }}'
        created_by: '{{ item.created_by }}'
        time_started: '{{ item.time_started }}'
        time_finished: '{{ item.time_finished }}'
  # ── list_jobs [independent] ──
  - discovery_id: oci.batch.list_jobs
    calls:
      - action: list_jobs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        ocid: '{{ item.ocid }}'
        compartment_id: '{{ item.compartment_id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        time_created: '{{ item.time_created }}'
        freeform_tags: '{{ item.freeform_tags }}'
        defined_tags: '{{ item.defined_tags }}'
        job_definition_id: '{{ item.job_definition_id }}'
        job_definition_name: '{{ item.job_definition_name }}'
  # ── get_job [dependent] ──
  - discovery_id: oci.batch.get_job
    calls:
      - action: get_job
        params:
          job_id: '{{ item.ocid }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        ocid: '{{ response.data.ocid }}'
        compartment_id: '{{ response.data.compartment_id }}'
        name: '{{ response.data.name }}'
        status: '{{ response.data.status }}'
        time_created: '{{ response.data.time_created }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        defined_tags: '{{ response.data.defined_tags }}'
        job_definition_id: '{{ response.data.job_definition_id }}'
        job_infrastructure_configuration_details: '{{ response.data.job_infrastructure_configuration_details }}'
        artifact_content_length: '{{ response.data.artifact_content_length }}'
  # ── get_job_definition [dependent] ──
  - discovery_id: oci.batch.get_job_definition
    calls:
      - action: get_job_definition
        params:
          job_definition_id: '{{ item.ocid }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        ocid: '{{ response.data.ocid }}'
        compartment_id: '{{ response.data.compartment_id }}'
        name: '{{ response.data.name }}'
        status: '{{ response.data.status }}'
        time_created: '{{ response.data.time_created }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        defined_tags: '{{ response.data.defined_tags }}'
        job_type: '{{ response.data.job_type }}'
        job_infrastructure_configuration_details: '{{ response.data.job_infrastructure_configuration_details }}'
  # ── get_job_run [dependent] ──
  - discovery_id: oci.batch.get_job_run
    calls:
      - action: get_job_run
        params:
          job_run_id: '{{ item.ocid }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        ocid: '{{ response.data.ocid }}'
        compartment_id: '{{ response.data.compartment_id }}'
        name: '{{ response.data.name }}'
        status: '{{ response.data.status }}'
        time_created: '{{ response.data.time_created }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        defined_tags: '{{ response.data.defined_tags }}'
        job_id: '{{ response.data.job_id }}'
        created_by: '{{ response.data.created_by }}'
        time_started: '{{ response.data.time_started }}'
        time_finished: '{{ response.data.time_finished }}'
        log_details: '{{ response.data.log_details }}'
