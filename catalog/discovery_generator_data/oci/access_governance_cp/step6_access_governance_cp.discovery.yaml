# ============================================================
# Discovery YAML — access_governance_cp (OCI)
# Generated: 2026-04-16T10:18:52Z
# Actions use OCI Python SDK method names (snake_case)
# ============================================================
version: '1.0'
provider: oci
service: access_governance_cp
services:
  client: access_governance_cp
  module: oci.access_governance_cp
discovery:
  # ── list_governance_instances [independent] ──
  - discovery_id: oci.access_governance_cp.list_governance_instances
    calls:
      - action: list_governance_instances
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        ocid: '{{ item.ocid }}'
        compartment_id: '{{ item.compartment_id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        time_created: '{{ item.time_created }}'
        freeform_tags: '{{ item.freeform_tags }}'
        defined_tags: '{{ item.defined_tags }}'
  # ── get_governance_instance [dependent → list_governance_instances] ──
  - discovery_id: oci.access_governance_cp.get_governance_instance
    for_each: oci.access_governance_cp.list_governance_instances
    calls:
      - action: get_governance_instance
        params:
          governance_instance_id: '{{ item.ocid }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        ocid: '{{ response.data.ocid }}'
        compartment_id: '{{ response.data.compartment_id }}'
        name: '{{ response.data.name }}'
        status: '{{ response.data.status }}'
        time_created: '{{ response.data.time_created }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        defined_tags: '{{ response.data.defined_tags }}'
  # ── get_governance_instance_configuration [dependent] ──
  - discovery_id: oci.access_governance_cp.get_governance_instance_configuration
    calls:
      - action: get_governance_instance_configuration
        params:
          governance_instance_configuration_id: '{{ item.ocid }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        ocid: '{{ response.data.ocid }}'
        compartment_id: '{{ response.data.compartment_id }}'
        name: '{{ response.data.name }}'
        status: '{{ response.data.status }}'
        time_created: '{{ response.data.time_created }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        defined_tags: '{{ response.data.defined_tags }}'
