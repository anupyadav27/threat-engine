version: '1.0'
provider: oci
service: oce
services:
  client: oce
  module: oci.oce
discovery:
- discovery_id: oci.oce.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.oce.get_oce_instance
  calls:
  - action: get_oce_instance
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.oce.list_oce_instances
  for_each: oci.oce.get_work_request
  calls:
  - action: list_oce_instances
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.oce.list_work_request_errors
  for_each: oci.oce.get_work_request
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.oce.list_work_request_logs
  for_each: oci.oce.get_work_request
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
