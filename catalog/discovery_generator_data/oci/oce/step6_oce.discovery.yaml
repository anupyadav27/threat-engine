version: '1.0'
provider: oci
service: oce
services:
  client: oce
  module: oci.oce
discovery:
- discovery_id: oci.oce.list_oce_instances
  calls:
  - action: list_oce_instances
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  uid_template: '{item.ocid}'
- discovery_id: oci.oce.list_work_request_errors
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  uid_template: '{item.ocid}'
- discovery_id: oci.oce.list_work_request_logs
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  uid_template: '{item.ocid}'
- discovery_id: oci.oce.list_work_requests
  calls:
  - action: list_work_requests
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  uid_template: '{item.ocid}'
- discovery_id: oci.oce.get_oce_instance
  for_each: oci.oce.list_oce_instances
  calls:
  - action: get_oce_instance
    params:
      oce_instance_id: '{{ item.ocid }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      ocid: '{{ response.data.ocid }}'
      compartment_id: '{{ response.data.compartment_id }}'
      name: '{{ response.data.name }}'
      status: '{{ response.data.status }}'
      time_created: '{{ response.data.time_created }}'
      freeform_tags: '{{ response.data.freeform_tags }}'
      defined_tags: '{{ response.data.defined_tags }}'
- discovery_id: oci.oce.get_work_request
  calls:
  - action: get_work_request
    params:
      work_request_id: '{{ item.ocid }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      ocid: '{{ response.data.ocid }}'
      compartment_id: '{{ response.data.compartment_id }}'
      name: '{{ response.data.name }}'
      status: '{{ response.data.status }}'
      time_created: '{{ response.data.time_created }}'
      freeform_tags: '{{ response.data.freeform_tags }}'
      defined_tags: '{{ response.data.defined_tags }}'
  uid_template: '{item.ocid}'
