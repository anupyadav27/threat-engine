version: '1.0'
provider: oci
service: identity_data_plane
services:
  client: identity_data_plane
  module: oci.identity_data_plane
discovery:
- discovery_id: oci.identity_data_plane.list_auth_tokens
  calls:
  - action: list_auth_tokens
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
      user_id: '{{ item.user_id }}'
      description: '{{ item.description }}'
      time_expires: '{{ item.time_expires }}'
  uid_template: '{item.ocid}'
- discovery_id: oci.identity_data_plane.list_customer_secret_keys
  calls:
  - action: list_customer_secret_keys
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
      user_id: '{{ item.user_id }}'
      display_name: '{{ item.display_name }}'
      time_expires: '{{ item.time_expires }}'
  uid_template: '{item.ocid}'
- discovery_id: oci.identity_data_plane.list_smtp_credentials
  calls:
  - action: list_smtp_credentials
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
      user_id: '{{ item.user_id }}'
      username: '{{ item.username }}'
      description: '{{ item.description }}'
  uid_template: '{item.ocid}'
- discovery_id: oci.identity_data_plane.list_user_db_credentials
  calls:
  - action: list_user_db_credentials
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
      user_id: '{{ item.user_id }}'
      db_user_name: '{{ item.db_user_name }}'
  uid_template: '{item.ocid}'
