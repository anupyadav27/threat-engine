version: '1.0'
provider: oci
service: identity_data_plane
services:
  client: identity_data_plane
  module: oci.identity_data_plane
discovery:
  # ── list_auth_tokens [independent] ──
  - discovery_id: oci.identity_data_plane.list_auth_tokens
    calls:
      - action: list_auth_tokens
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        ocid: '{{ item.ocid }}'
        compartment_id: '{{ item.compartment_id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        time_created: '{{ item.time_created }}'
        freeform_tags: '{{ item.freeform_tags }}'
        defined_tags: '{{ item.defined_tags }}'
        user_id: '{{ item.user_id }}'
        description: '{{ item.description }}'
        time_expires: '{{ item.time_expires }}'
