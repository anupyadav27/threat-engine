version: '1.0'
provider: oci
service: identity_data_plane
services:
  client: identity_data_plane
  module: boto3.client
discovery:
- discovery_id: oci.identity_data_plane.listIdentityDataPlane
  calls:
  - action: listIdentityDataPlane
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.identity_data_plane.listIdentityDataPlaneByCompartment
  calls:
  - action: listIdentityDataPlaneByCompartment
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.identity_data_plane.getIdentityDataPlane
  calls:
  - action: getIdentityDataPlane
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.identity_data_plane.getIdentityDataPlaneDetails
  calls:
  - action: getIdentityDataPlaneDetails
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
