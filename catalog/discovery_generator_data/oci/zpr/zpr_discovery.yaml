version: '1.0'
provider: oci
service: zpr
services:
  client: zpr
  module: oci.zpr
discovery:
- discovery_id: oci.zpr.get_zpr_policy_work_request
  calls:
  - action: get_zpr_policy_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.zpr.get_zpr_policy
  calls:
  - action: get_zpr_policy
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.zpr.get_configuration
  calls:
  - action: get_configuration
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.zpr.get_zpr_configuration_work_request
  calls:
  - action: get_zpr_configuration_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.zpr.list_zpr_policy_work_request_logs
  for_each: oci.zpr.get_zpr_policy_work_request
  calls:
  - action: list_zpr_policy_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.zpr.list_zpr_configuration_work_request_logs
  for_each: oci.zpr.get_zpr_policy_work_request
  calls:
  - action: list_zpr_configuration_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.zpr.list_zpr_policy_work_request_errors
  for_each: oci.zpr.get_zpr_policy_work_request
  calls:
  - action: list_zpr_policy_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.zpr.list_zpr_configuration_work_request_errors
  for_each: oci.zpr.get_zpr_policy_work_request
  calls:
  - action: list_zpr_configuration_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
