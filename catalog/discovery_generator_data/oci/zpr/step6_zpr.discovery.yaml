version: '1.0'
provider: oci
service: zpr
services:
  client: zpr
  module: oci.zpr
discovery:
- discovery_id: oci.zpr.list_zpr_configuration_work_request_errors
  calls:
  - action: list_zpr_configuration_work_request_errors
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  uid_template: '{item.ocid}'
