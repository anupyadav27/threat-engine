version: '1.0'
provider: oci
service: vn_monitoring
services:
  client: vn_monitoring
  module: oci.vn_monitoring
discovery:
- discovery_id: oci.vn_monitoring.list_path_analyzer_tests
  calls:
  - action: list_path_analyzer_tests
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  uid_template: '{item.ocid}'
- discovery_id: oci.vn_monitoring.list_work_request_errors
  calls:
  - action: list_work_request_errors
    save_as: response
