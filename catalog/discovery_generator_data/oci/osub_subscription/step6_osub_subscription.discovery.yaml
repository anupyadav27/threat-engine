version: '1.0'
provider: oci
service: osub_subscription
services:
  client: osub_subscription
  module: oci.osub_subscription
discovery:
  # ── list_subscriptions [independent] ──
  - discovery_id: oci.osub_subscription.list_subscriptions
    calls:
      - action: list_subscriptions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        ocid: '{{ item.ocid }}'
        compartment_id: '{{ item.compartment_id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        time_created: '{{ item.time_created }}'
        freeform_tags: '{{ item.freeform_tags }}'
        defined_tags: '{{ item.defined_tags }}'
