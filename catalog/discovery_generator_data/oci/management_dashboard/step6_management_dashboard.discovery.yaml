version: '1.0'
provider: oci
service: management_dashboard
services:
  client: management_dashboard
  module: oci.management_dashboard
discovery:
- discovery_id: oci.management_dashboard.list_management_dashboards
  calls:
  - action: list_management_dashboards
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  uid_template: '{item.ocid}'
- discovery_id: oci.management_dashboard.list_management_saved_searches
  calls:
  - action: list_management_saved_searches
