version: '1.0'
provider: oci
service: ai_vision
services:
  client: ai_vision
  module: oci.ai_vision
discovery:
- discovery_id: oci.ai_vision.list_models
  calls:
  - action: list_models
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  uid_template: '{item.ocid}'
- discovery_id: oci.ai_vision.list_projects
