version: '1.0'
provider: oci
service: resource_analytics
services:
  client: resource_analytics
  module: oci.resource_analytics
discovery:
- discovery_id: oci.resource_analytics.get_tenancy_attachment
  calls:
  - action: get_tenancy_attachment
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
