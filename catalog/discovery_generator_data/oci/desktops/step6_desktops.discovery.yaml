version: '1.0'
provider: oci
service: desktops
services:
  client: desktops
  module: oci.desktops
discovery:
- discovery_id: oci.desktops.list_desktop_pool_desktops
  calls:
  - action: list_desktop_pool_desktops
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  uid_template: '{item.ocid}'
- discovery_id: oci.desktops.list_desktop_pool_volumes
