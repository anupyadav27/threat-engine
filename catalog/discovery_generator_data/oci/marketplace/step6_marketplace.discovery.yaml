version: '1.0'
provider: oci
service: marketplace
services:
  client: marketplace
  module: oci.marketplace
discovery:
- discovery_id: oci.marketplace.list_accepted_agreements
  calls:
  - action: list_accepted_agreements
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  uid_template: '{item.ocid}'
