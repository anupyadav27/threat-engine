version: '1.0'
provider: oci
service: management_agent
services:
  client: management_agent
  module: oci.management_agent
discovery:
- discovery_id: oci.management_agent.list_availability_histories
  calls:
  - action: list_availability_histories
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  uid_template: '{item.ocid}'
