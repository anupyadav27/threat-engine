version: '1.0'
provider: oci
service: ai_data_platform
services:
  client: ai_data_platform
  module: oci.ai_data_platform
discovery:
  # ── list_ai_data_platforms [independent] ──
  - discovery_id: oci.ai_data_platform.list_ai_data_platforms
    calls:
      - action: list_ai_data_platforms
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        ocid: '{{ item.ocid }}'
        compartment_id: '{{ item.compartment_id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        time_created: '{{ item.time_created }}'
        freeform_tags: '{{ item.freeform_tags }}'
        defined_tags: '{{ item.defined_tags }}'
  # ── list_work_request_errors [independent] ──
  - discovery_id: oci.ai_data_platform.list_work_request_errors
    calls:
      - action: list_work_request_errors
