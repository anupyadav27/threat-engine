version: '1.0'
provider: oci
service: oda
services:
  client: oda
  module: oci.oda
discovery:
- discovery_id: oci.oda.get_imported_package
  calls:
  - action: get_imported_package
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.oda.get_package
  calls:
  - action: get_package
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.oda.list_packages
  for_each: oci.oda.get_imported_package
  calls:
  - action: list_packages
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.oda.list_imported_packages
  for_each: oci.oda.get_imported_package
  calls:
  - action: list_imported_packages
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
