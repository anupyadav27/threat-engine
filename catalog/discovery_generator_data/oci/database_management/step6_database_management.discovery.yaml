version: '1.0'
provider: oci
service: database_management
services:
  client: database_management
  module: oci.database_management
discovery:
- discovery_id: oci.database_management.list_sql_tuning_advisor_task_findings
  calls:
  - action: list_sql_tuning_advisor_task_findings
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  uid_template: '{item.ocid}'
- discovery_id: oci.database_management.list_sql_tuning_advisor_task_recommendations
  calls:
  - action: list_sql_tuning_advisor_task_recommendations
    save_as: response
