version: '1.0'
provider: oci
service: jms_utils
services:
  client: jms_utils
  module: oci.jms_utils
discovery:
- discovery_id: oci.jms_utils.list_java_migration_analysis
  calls:
  - action: list_java_migration_analysis
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  uid_template: '{item.ocid}'
