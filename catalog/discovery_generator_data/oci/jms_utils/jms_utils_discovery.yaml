version: '1.0'
provider: oci
service: jms_utils
services:
  client: jms_utils
  module: oci.jms_utils
discovery:
- discovery_id: oci.jms_utils.get_java_migration_analysis
  calls:
  - action: get_java_migration_analysis
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.jms_utils.get_analyze_applications_configuration
  calls:
  - action: get_analyze_applications_configuration
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.jms_utils.get_subscription_acknowledgment_configuration
  calls:
  - action: get_subscription_acknowledgment_configuration
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.jms_utils.get_performance_tuning_analysis
  calls:
  - action: get_performance_tuning_analysis
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.jms_utils.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.jms_utils.list_work_request_errors
  for_each: oci.jms_utils.get_java_migration_analysis
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.jms_utils.list_work_items
  for_each: oci.jms_utils.get_java_migration_analysis
  calls:
  - action: list_work_items
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.jms_utils.list_work_request_logs
  for_each: oci.jms_utils.get_java_migration_analysis
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
