version: '1.0'
provider: oci
service: generative_ai_inference
services:
  client: generative_ai_inference
  module: oci.generative_ai_inference
discovery:
- discovery_id: oci.generative_ai_inference.list_dedicated_ai_clusters
  calls:
  - action: list_dedicated_ai_clusters
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
      type: '{{ item.type }}'
      unit_shape: '{{ item.unit_shape }}'
      unit_count: '{{ item.unit_count }}'
      capacity: '{{ item.capacity }}'
  uid_template: '{item.ocid}'
- discovery_id: oci.generative_ai_inference.list_endpoints
  calls:
  - action: list_endpoints
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
      model_id: '{{ item.model_id }}'
      dedicated_ai_cluster_id: '{{ item.dedicated_ai_cluster_id }}'
      content_moderation_config: '{{ item.content_moderation_config }}'
  uid_template: '{item.ocid}'
- discovery_id: oci.generative_ai_inference.list_models
  calls:
  - action: list_models
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
      vendor: '{{ item.vendor }}'
      version: '{{ item.version }}'
      capabilities: '{{ item.capabilities }}'
      is_long_term_supported: '{{ item.is_long_term_supported }}'
  uid_template: '{item.ocid}'
- discovery_id: oci.generative_ai_inference.get_dedicated_ai_cluster
  calls:
  - action: get_dedicated_ai_cluster
    params:
      dedicated_ai_cluster_id: '{{ item.ocid }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      ocid: '{{ response.data.ocid }}'
      compartment_id: '{{ response.data.compartment_id }}'
      name: '{{ response.data.name }}'
      status: '{{ response.data.status }}'
      time_created: '{{ response.data.time_created }}'
      freeform_tags: '{{ response.data.freeform_tags }}'
      defined_tags: '{{ response.data.defined_tags }}'
      type: '{{ response.data.type }}'
      unit_shape: '{{ response.data.unit_shape }}'
      unit_count: '{{ response.data.unit_count }}'
      capacity: '{{ response.data.capacity }}'
      previous_state: '{{ response.data.previous_state }}'
  uid_template: '{item.ocid}'
- discovery_id: oci.generative_ai_inference.get_endpoint
  calls:
  - action: get_endpoint
    params:
      endpoint_id: '{{ item.ocid }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      ocid: '{{ response.data.ocid }}'
      compartment_id: '{{ response.data.compartment_id }}'
      name: '{{ response.data.name }}'
      status: '{{ response.data.status }}'
      time_created: '{{ response.data.time_created }}'
      freeform_tags: '{{ response.data.freeform_tags }}'
      defined_tags: '{{ response.data.defined_tags }}'
      model_id: '{{ response.data.model_id }}'
      dedicated_ai_cluster_id: '{{ response.data.dedicated_ai_cluster_id }}'
      content_moderation_config: '{{ response.data.content_moderation_config }}'
      previous_state: '{{ response.data.previous_state }}'
  uid_template: '{item.ocid}'
