version: '1.0'
provider: oci
service: apm_control_plane
services:
  client: apm_control_plane
  module: oci.apm_control_plane
discovery:
- discovery_id: oci.apm_control_plane.get_apm_domain
  calls:
  - action: get_apm_domain
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.apm_control_plane.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.apm_control_plane.list_apm_domain_work_requests
  for_each: oci.apm_control_plane.get_apm_domain
  calls:
  - action: list_apm_domain_work_requests
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.apm_control_plane.list_work_request_errors
  for_each: oci.apm_control_plane.get_apm_domain
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.apm_control_plane.list_data_keys
  for_each: oci.apm_control_plane.get_apm_domain
  calls:
  - action: list_data_keys
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.apm_control_plane.list_work_request_logs
  for_each: oci.apm_control_plane.get_apm_domain
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
