version: '1.0'
provider: oci
service: generative_ai
services:
  client: generative_ai
  module: oci.generative_ai
discovery:
- discovery_id: oci.generative_ai.get_endpoint
  calls:
  - action: get_endpoint
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.generative_ai.get_imported_model
  calls:
  - action: get_imported_model
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.generative_ai.get_generative_ai_private_endpoint
  calls:
  - action: get_generative_ai_private_endpoint
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.generative_ai.get_model
  calls:
  - action: get_model
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.generative_ai.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.generative_ai.get_dedicated_ai_cluster
  calls:
  - action: get_dedicated_ai_cluster
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.generative_ai.list_work_request_errors
  for_each: oci.generative_ai.get_endpoint
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.generative_ai.list_work_request_logs
  for_each: oci.generative_ai.get_endpoint
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
