version: '1.0'
provider: oci
service: generative_ai
services:
  client: generative_ai
  module: oci.generative_ai
discovery:
- discovery_id: oci.generative_ai.list_dedicated_ai_clusters
  calls:
  - action: list_dedicated_ai_clusters
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  uid_template: '{item.ocid}'
