version: '1.0'
provider: oci
service: load_balancer
services:
  client: load_balancer
  module: oci.load_balancer
discovery:
- discovery_id: oci.load_balancer.get_hostname
  calls:
  - action: get_hostname
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.load_balancer.get_backend_set_health
  calls:
  - action: get_backend_set_health
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.load_balancer.get_rule_set
  calls:
  - action: get_rule_set
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.load_balancer.get_health_checker
  calls:
  - action: get_health_checker
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.load_balancer.get_ssl_cipher_suite
  calls:
  - action: get_ssl_cipher_suite
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.load_balancer.get_backend_health
  calls:
  - action: get_backend_health
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.load_balancer.get_load_balancer_health
  calls:
  - action: get_load_balancer_health
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.load_balancer.get_path_route_set
  calls:
  - action: get_path_route_set
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.load_balancer.get_load_balancer
  calls:
  - action: get_load_balancer
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.load_balancer.get_backend
  calls:
  - action: get_backend
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.load_balancer.get_backend_set
  calls:
  - action: get_backend_set
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.load_balancer.get_routing_policy
  calls:
  - action: get_routing_policy
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.load_balancer.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.load_balancer.list_protocols
  for_each: oci.load_balancer.get_hostname
  calls:
  - action: list_protocols
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.load_balancer.list_hostnames
  for_each: oci.load_balancer.get_hostname
  calls:
  - action: list_hostnames
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.load_balancer.list_policies
  for_each: oci.load_balancer.get_hostname
  calls:
  - action: list_policies
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.load_balancer.list_ssl_cipher_suites
  for_each: oci.load_balancer.get_hostname
  calls:
  - action: list_ssl_cipher_suites
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.load_balancer.list_certificates
  for_each: oci.load_balancer.get_hostname
  calls:
  - action: list_certificates
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.load_balancer.list_shapes
  for_each: oci.load_balancer.get_hostname
  calls:
  - action: list_shapes
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.load_balancer.list_listener_rules
  for_each: oci.load_balancer.get_hostname
  calls:
  - action: list_listener_rules
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
