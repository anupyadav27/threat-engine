version: '1.0'
provider: oci
service: load_balancer
services:
  client: load_balancer
  module: oci.load_balancer
discovery:
- discovery_id: oci.load_balancer.list_backend_sets
  calls:
  - action: list_backend_sets
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  uid_template: '{item.ocid}'
