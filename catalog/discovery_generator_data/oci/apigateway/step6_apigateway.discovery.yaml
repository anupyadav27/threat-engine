version: '1.0'
provider: oci
service: apigateway
services:
  client: apigateway
  module: oci.apigateway
discovery:
- discovery_id: oci.apigateway.list_apis
  calls:
  - action: list_apis
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
      specification_type: '{{ item.specification_type }}'
  uid_template: '{item.ocid}'
- discovery_id: oci.apigateway.list_certificates
  calls:
  - action: list_certificates
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
      subject_names: '{{ item.subject_names }}'
      time_not_valid_after: '{{ item.time_not_valid_after }}'
  uid_template: '{item.ocid}'
- discovery_id: oci.apigateway.list_deployments
  calls:
  - action: list_deployments
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
      gateway_id: '{{ item.gateway_id }}'
      path_prefix: '{{ item.path_prefix }}'
  uid_template: '{item.ocid}'
- discovery_id: oci.apigateway.list_gateways
  calls:
  - action: list_gateways
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
      endpoint_type: '{{ item.endpoint_type }}'
      hostname: '{{ item.hostname }}'
      subnet_id: '{{ item.subnet_id }}'
  uid_template: '{item.ocid}'
- discovery_id: oci.apigateway.list_sdk_languages
  calls:
  - action: list_sdk_languages
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  uid_template: '{item.ocid}'
- discovery_id: oci.apigateway.get_api
  calls:
  - action: get_api
    params:
      api_id: '{{ item.ocid }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      ocid: '{{ response.data.ocid }}'
      compartment_id: '{{ response.data.compartment_id }}'
      name: '{{ response.data.name }}'
      status: '{{ response.data.status }}'
      time_created: '{{ response.data.time_created }}'
      freeform_tags: '{{ response.data.freeform_tags }}'
      defined_tags: '{{ response.data.defined_tags }}'
      specification_type: '{{ response.data.specification_type }}'
      validation_results: '{{ response.data.validation_results }}'
  uid_template: '{item.ocid}'
- discovery_id: oci.apigateway.get_gateway
  calls:
  - action: get_gateway
    params:
      gateway_id: '{{ item.ocid }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      ocid: '{{ response.data.ocid }}'
      compartment_id: '{{ response.data.compartment_id }}'
      name: '{{ response.data.name }}'
      status: '{{ response.data.status }}'
      time_created: '{{ response.data.time_created }}'
      freeform_tags: '{{ response.data.freeform_tags }}'
      defined_tags: '{{ response.data.defined_tags }}'
      endpoint_type: '{{ response.data.endpoint_type }}'
      hostname: '{{ response.data.hostname }}'
      subnet_id: '{{ response.data.subnet_id }}'
      network_security_group_ids: '{{ response.data.network_security_group_ids }}'
      ip_addresses: '{{ response.data.ip_addresses }}'
  uid_template: '{item.ocid}'
