version: '1.0'
provider: oci
service: disaster_recovery
services:
  client: disaster_recovery
  module: oci.disaster_recovery
discovery:
- discovery_id: oci.disaster_recovery.list_automatic_dr_configurations
  calls:
  - action: list_automatic_dr_configurations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  uid_template: '{item.ocid}'
