version: '1.0'
provider: oci
service: disaster_recovery
services:
  client: disaster_recovery
  module: oci.disaster_recovery
discovery:
- discovery_id: oci.disaster_recovery.get_dr_plan
  calls:
  - action: get_dr_plan
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.disaster_recovery.get_dr_protection_group
  calls:
  - action: get_dr_protection_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.disaster_recovery.get_automatic_dr_configuration
  calls:
  - action: get_automatic_dr_configuration
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.disaster_recovery.get_dr_plan_execution
  calls:
  - action: get_dr_plan_execution
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.disaster_recovery.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.disaster_recovery.list_work_request_errors
  for_each: oci.disaster_recovery.get_dr_plan
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.disaster_recovery.list_work_request_logs
  for_each: oci.disaster_recovery.get_dr_plan
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
