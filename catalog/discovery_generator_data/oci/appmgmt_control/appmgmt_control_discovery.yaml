version: '1.0'
provider: oci
service: appmgmt_control
services:
  client: appmgmt_control
  module: oci.appmgmt_control
discovery:
- discovery_id: oci.appmgmt_control.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.appmgmt_control.get_monitored_instance
  calls:
  - action: get_monitored_instance
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.appmgmt_control.list_monitored_instances
  for_each: oci.appmgmt_control.get_work_request
  calls:
  - action: list_monitored_instances
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.appmgmt_control.list_work_request_errors
  for_each: oci.appmgmt_control.get_work_request
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.appmgmt_control.list_work_request_logs
  for_each: oci.appmgmt_control.get_work_request
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
