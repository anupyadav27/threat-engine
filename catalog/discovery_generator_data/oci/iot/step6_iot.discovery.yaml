version: '1.0'
provider: oci
service: iot
services:
  client: iot
  module: oci.iot
discovery:
- discovery_id: oci.iot.list_digital_twin_adapters
  calls:
  - action: list_digital_twin_adapters
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  uid_template: '{item.ocid}'
