version: '1.0'
provider: oci
service: iot
services:
  client: iot
  module: oci.iot
discovery:
- discovery_id: oci.iot.get_digital_twin_adapter
  calls:
  - action: get_digital_twin_adapter
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.iot.get_iot_domain
  calls:
  - action: get_iot_domain
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.iot.get_digital_twin_model_spec
  calls:
  - action: get_digital_twin_model_spec
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.iot.get_iot_domain_group
  calls:
  - action: get_iot_domain_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.iot.get_digital_twin_instance_content
  calls:
  - action: get_digital_twin_instance_content
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.iot.get_digital_twin_relationship
  calls:
  - action: get_digital_twin_relationship
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.iot.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.iot.get_digital_twin_model
  calls:
  - action: get_digital_twin_model
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.iot.get_digital_twin_instance
  calls:
  - action: get_digital_twin_instance
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.iot.list_work_request_errors
  for_each: oci.iot.get_digital_twin_adapter
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.iot.list_digital_twin_instances
  for_each: oci.iot.get_digital_twin_adapter
  calls:
  - action: list_digital_twin_instances
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.iot.list_work_request_logs
  for_each: oci.iot.get_digital_twin_adapter
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
