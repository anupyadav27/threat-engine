# ============================================================
# Discovery YAML — demand_signal (OCI)
# Generated: 2026-04-16T10:18:53Z
# Actions use OCI Python SDK method names (snake_case)
# ============================================================
version: '1.0'
provider: oci
service: demand_signal
services:
  client: demand_signal
  module: oci.demand_signal
discovery:
  # ── list_occ_demand_signals [independent] ──
  - discovery_id: oci.demand_signal.list_occ_demand_signals
    calls:
      - action: list_occ_demand_signals
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        ocid: '{{ item.ocid }}'
        compartment_id: '{{ item.compartment_id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        time_created: '{{ item.time_created }}'
        freeform_tags: '{{ item.freeform_tags }}'
        defined_tags: '{{ item.defined_tags }}'
  # ── get_occ_demand_signal [dependent] ──
  - discovery_id: oci.demand_signal.get_occ_demand_signal
    calls:
      - action: get_occ_demand_signal
        params:
          occ_demand_signal_id: '{{ item.ocid }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        ocid: '{{ response.data.ocid }}'
        compartment_id: '{{ response.data.compartment_id }}'
        name: '{{ response.data.name }}'
        status: '{{ response.data.status }}'
        time_created: '{{ response.data.time_created }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        defined_tags: '{{ response.data.defined_tags }}'
