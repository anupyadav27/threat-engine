version: '1.0'
provider: oci
service: demand_signal
services:
  client: demand_signal
  module: oci.demand_signal
discovery:
- discovery_id: oci.demand_signal.get_occ_demand_signal
  calls:
  - action: get_occ_demand_signal
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
