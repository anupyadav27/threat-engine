version: '1.0'
provider: oci
service: budget
services:
  client: budget
  module: oci.budget
discovery:
- discovery_id: oci.budget.get_alert_rule
  calls:
  - action: get_alert_rule
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.budget.get_budget
  calls:
  - action: get_budget
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.budget.list_alert_rules
  for_each: oci.budget.get_alert_rule
  calls:
  - action: list_alert_rules
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
