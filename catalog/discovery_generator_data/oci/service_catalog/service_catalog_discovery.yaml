version: '1.0'
provider: oci
service: service_catalog
services:
  client: service_catalog
  module: oci.service_catalog
discovery:
- discovery_id: oci.service_catalog.get_private_application_package_action_download_config
  calls:
  - action: get_private_application_package_action_download_config
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.service_catalog.get_private_application_action_download_logo
  calls:
  - action: get_private_application_action_download_logo
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.service_catalog.get_service_catalog
  calls:
  - action: get_service_catalog
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.service_catalog.get_service_catalog_association
  calls:
  - action: get_service_catalog_association
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.service_catalog.get_private_application
  calls:
  - action: get_private_application
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.service_catalog.get_configuration
  calls:
  - action: get_configuration
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.service_catalog.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.service_catalog.get_private_application_package
  calls:
  - action: get_private_application_package
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.service_catalog.list_private_application_packages
  for_each: oci.service_catalog.get_private_application_package_action_download_config
  calls:
  - action: list_private_application_packages
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.service_catalog.list_work_request_errors
  for_each: oci.service_catalog.get_private_application_package_action_download_config
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.service_catalog.list_applications
  for_each: oci.service_catalog.get_private_application_package_action_download_config
  calls:
  - action: list_applications
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.service_catalog.list_all_applications
  for_each: oci.service_catalog.get_private_application_package_action_download_config
  calls:
  - action: list_all_applications
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.service_catalog.list_work_request_logs
  for_each: oci.service_catalog.get_private_application_package_action_download_config
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
