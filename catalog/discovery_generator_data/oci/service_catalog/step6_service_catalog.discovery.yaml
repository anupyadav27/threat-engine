version: '1.0'
provider: oci
service: service_catalog
services:
  client: service_catalog
  module: oci.service_catalog
discovery:
- discovery_id: oci.service_catalog.list_all_applications
  calls:
  - action: list_all_applications
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.data }}'
    item:
      ocid: '{{ item.ocid }}'
      compartment_id: '{{ item.compartment_id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      time_created: '{{ item.time_created }}'
      freeform_tags: '{{ item.freeform_tags }}'
      defined_tags: '{{ item.defined_tags }}'
  uid_template: '{item.ocid}'
- discovery_id: oci.service_catalog.list_applications
