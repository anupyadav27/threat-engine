      id: '{{ item.id }}'
- discovery_id: azure.keyvault.keys.get_version
  for_each: azure.keyvault.vaults.list_by_subscription
  calls:
  - action: keys.get_version
    save_as: response
    on_error: continue
    params:
      vault_name: '{{ item.name }}'
  emit:
    as: item
    item:
      identity: '{{ response.identity }}'
      type: '{{ response.type }}'
      properties: '{{ response.properties }}'
      location: '{{ response.location }}'
      sku: '{{ response.sku }}'
      name: '{{ response.name }}'
      provisioning_state: '{{ response.provisioning_state }}'
      zones: '{{ response.zones }}'
      kind: '{{ response.kind }}'
      id: '{{ response.id }}'
      tags: '{{ response.tags }}'
