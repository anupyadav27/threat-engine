version: '1.0'
provider: azure
service: keyvault
services:
  client: keyvault
  module: azure.mgmt.keyvault
discovery:
- discovery_id: azure.keyvault.managedhsms.list_by_resource_group
  calls:
  - action: managedhsms.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
- discovery_id: azure.keyvault.managedhsms.list_by_subscription
  calls:
  - action: managedhsms.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
- discovery_id: azure.keyvault.managedhsms.list_deleted
  calls:
  - action: managedhsms.list_deleted
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
- discovery_id: azure.keyvault.vaults.list
