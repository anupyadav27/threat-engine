  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      admin_status: '{{ item.admin_status }}'
      blobs_imported_per_second: '{{ item.blobs_imported_per_second }}'
      blobs_walked_per_second: '{{ item.blobs_walked_per_second }}'
