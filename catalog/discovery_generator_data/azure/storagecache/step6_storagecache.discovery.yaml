version: '1.0'
provider: azure
service: storagecache
services:
  client: storagecache
  module: azure.mgmt.storagecache
discovery:
- discovery_id: azure.storagecache.amlfilesystems.list
  calls:
  - action: amlfilesystems.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      display: '{{ item.display }}'
      model_name: '{{ item.model_name }}'
      target_type: '{{ item.target_type }}'
  uid_template: '{item.id}'
- discovery_id: azure.storagecache.amlfilesystems.list_by_resource_group
  calls:
  - action: amlfilesystems.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      cache_size_gb: '{{ item.cache_size_gb }}'
      directory_services_settings: '{{ item.directory_services_settings }}'
      encryption_settings: '{{ item.encryption_settings }}'
      health: '{{ item.health }}'
      mount_addresses: '{{ item.mount_addresses }}'
      network_settings: '{{ item.network_settings }}'
      priming_jobs: '{{ item.priming_jobs }}'
      security_settings: '{{ item.security_settings }}'
      space_allocation: '{{ item.space_allocation }}'
      subnet: '{{ item.subnet }}'
      system_data: '{{ item.system_data }}'
      upgrade_settings: '{{ item.upgrade_settings }}'
      upgrade_status: '{{ item.upgrade_status }}'
  uid_template: '{item.id}'
- discovery_id: azure.storagecache.caches.list
  calls:
  - action: caches.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      display: '{{ item.display }}'
      model_name: '{{ item.model_name }}'
      target_type: '{{ item.target_type }}'
  uid_template: '{item.id}'
- discovery_id: azure.storagecache.caches.list_by_resource_group
  calls:
  - action: caches.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      cache_size_gb: '{{ item.cache_size_gb }}'
      directory_services_settings: '{{ item.directory_services_settings }}'
      encryption_settings: '{{ item.encryption_settings }}'
      health: '{{ item.health }}'
      mount_addresses: '{{ item.mount_addresses }}'
      network_settings: '{{ item.network_settings }}'
      priming_jobs: '{{ item.priming_jobs }}'
      security_settings: '{{ item.security_settings }}'
      space_allocation: '{{ item.space_allocation }}'
      subnet: '{{ item.subnet }}'
      system_data: '{{ item.system_data }}'
      upgrade_settings: '{{ item.upgrade_settings }}'
      upgrade_status: '{{ item.upgrade_status }}'
  uid_template: '{item.id}'
- discovery_id: azure.storagecache.skus.list
  calls:
  - action: skus.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      display: '{{ item.display }}'
      model_name: '{{ item.model_name }}'
      target_type: '{{ item.target_type }}'
  uid_template: '{item.id}'
- discovery_id: azure.storagecache.usagemodels.list
  calls:
  - action: usagemodels.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      display: '{{ item.display }}'
      model_name: '{{ item.model_name }}'
      target_type: '{{ item.target_type }}'
  uid_template: '{item.id}'
- discovery_id: azure.storagecache.autoexportjobs.list_by_aml_filesystem
  for_each: azure.storagecache.amlfilesystems.list
  calls:
  - action: autoexportjobs.list_by_aml_filesystem
