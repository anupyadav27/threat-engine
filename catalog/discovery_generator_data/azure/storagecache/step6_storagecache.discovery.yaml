      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      admin_status: '{{ item.admin_status }}'
      blobs_imported_per_second: '{{ item.blobs_imported_per_second }}'
      blobs_walked_per_second: '{{ item.blobs_walked_per_second }}'
      conflict_resolution_mode: '{{ item.conflict_resolution_mode }}'
      import_prefixes: '{{ item.import_prefixes }}'
      imported_directories: '{{ item.imported_directories }}'
      imported_files: '{{ item.imported_files }}'
      imported_symlinks: '{{ item.imported_symlinks }}'
      last_completion_time: '{{ item.last_completion_time }}'
      last_started_time: '{{ item.last_started_time }}'
      maximum_errors: '{{ item.maximum_errors }}'
      preexisting_directories: '{{ item.preexisting_directories }}'
      preexisting_files: '{{ item.preexisting_files }}'
      preexisting_symlinks: '{{ item.preexisting_symlinks }}'
      state: '{{ item.state }}'
      status_message: '{{ item.status_message }}'
      system_data: '{{ item.system_data }}'
      total_blobs_imported: '{{ item.total_blobs_imported }}'
      total_blobs_walked: '{{ item.total_blobs_walked }}'
      total_conflicts: '{{ item.total_conflicts }}'
      total_errors: '{{ item.total_errors }}'
- discovery_id: azure.storagecache.autoimportjobs.list_by_aml_filesystem
  for_each: azure.storagecache.amlfilesystems.list
  calls:
  - action: autoimportjobs.list_by_aml_filesystem
