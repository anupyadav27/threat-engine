      import_prefixes: '{{ item.import_prefixes }}'
      imported_directories: '{{ item.imported_directories }}'
      imported_files: '{{ item.imported_files }}'
      imported_symlinks: '{{ item.imported_symlinks }}'
      last_completion_time: '{{ item.last_completion_time }}'
      last_started_time: '{{ item.last_started_time }}'
      maximum_errors: '{{ item.maximum_errors }}'
      preexisting_directories: '{{ item.preexisting_directories }}'
      preexisting_files: '{{ item.preexisting_files }}'
