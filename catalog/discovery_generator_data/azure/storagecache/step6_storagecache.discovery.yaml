- discovery_id: azure.storagecache.storagetargets.list_by_cache
  for_each: azure.storagecache.caches.list
  calls:
  - action: storagetargets.list_by_cache
    save_as: response
    on_error: continue
    params:
      cache_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      allocation_percentage: '{{ item.allocation_percentage }}'
      blob_nfs: '{{ item.blob_nfs }}'
      clfs: '{{ item.clfs }}'
      junctions: '{{ item.junctions }}'
      nfs3: '{{ item.nfs3 }}'
      state: '{{ item.state }}'
      system_data: '{{ item.system_data }}'
      target_type: '{{ item.target_type }}'
      unknown: '{{ item.unknown }}'
