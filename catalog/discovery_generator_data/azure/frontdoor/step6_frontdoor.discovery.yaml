version: '1.0'
provider: azure
service: frontdoor
services:
  client: frontdoor
  module: azure.mgmt.frontdoor
discovery:
- discovery_id: azure.frontdoor.frontdoors.list
  calls:
  - action: frontdoors.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      backend: '{{ item.backend }}'
      description: '{{ item.description }}'
      endpoint: '{{ item.endpoint }}'
      endpoint_type: '{{ item.endpoint_type }}'
  uid_template: '{item.id}'
- discovery_id: azure.frontdoor.frontdoors.list_by_resource_group
  calls:
  - action: frontdoors.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      enabled_state: '{{ item.enabled_state }}'
      etag: '{{ item.etag }}'
      resource_state: '{{ item.resource_state }}'
  uid_template: '{item.id}'
- discovery_id: azure.frontdoor.managedrulesets.list
  calls:
  - action: managedrulesets.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      backend: '{{ item.backend }}'
      description: '{{ item.description }}'
      endpoint: '{{ item.endpoint }}'
      endpoint_type: '{{ item.endpoint_type }}'
  uid_template: '{item.id}'
- discovery_id: azure.frontdoor.networkexperimentprofiles.list
  calls:
  - action: networkexperimentprofiles.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      backend: '{{ item.backend }}'
      description: '{{ item.description }}'
      endpoint: '{{ item.endpoint }}'
      endpoint_type: '{{ item.endpoint_type }}'
  uid_template: '{item.id}'
- discovery_id: azure.frontdoor.networkexperimentprofiles.list_by_resource_group
  calls:
  - action: networkexperimentprofiles.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      enabled_state: '{{ item.enabled_state }}'
      etag: '{{ item.etag }}'
      resource_state: '{{ item.resource_state }}'
  uid_template: '{item.id}'
- discovery_id: azure.frontdoor.policies.list
  calls:
  - action: policies.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      backend: '{{ item.backend }}'
      description: '{{ item.description }}'
      endpoint: '{{ item.endpoint }}'
      endpoint_type: '{{ item.endpoint_type }}'
  uid_template: '{item.id}'
- discovery_id: azure.frontdoor.policies.list_by_subscription
  calls:
  - action: policies.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      custom_rules: '{{ item.custom_rules }}'
      etag: '{{ item.etag }}'
      frontend_endpoint_links: '{{ item.frontend_endpoint_links }}'
      managed_rules: '{{ item.managed_rules }}'
      policy_settings: '{{ item.policy_settings }}'
      resource_state: '{{ item.resource_state }}'
      routing_rule_links: '{{ item.routing_rule_links }}'
      security_policy_links: '{{ item.security_policy_links }}'
  uid_template: '{item.id}'
- discovery_id: azure.frontdoor.experiments.list_by_profile
  for_each: azure.frontdoor.networkexperimentprofiles.list
  calls:
  - action: experiments.list_by_profile
    save_as: response
    on_error: continue
    params:
      profile_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      description: '{{ item.description }}'
      enabled_state: '{{ item.enabled_state }}'
      endpoint_a: '{{ item.endpoint_a }}'
      endpoint_b: '{{ item.endpoint_b }}'
      resource_state: '{{ item.resource_state }}'
      script_file_uri: '{{ item.script_file_uri }}'
- discovery_id: azure.frontdoor.frontendendpoints.list_by_front_door
  for_each: azure.frontdoor.frontdoors.list
  calls:
  - action: frontendendpoints.list_by_front_door
    save_as: response
    on_error: continue
    params:
      front_door_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      resource_state: '{{ item.resource_state }}'
      rules: '{{ item.rules }}'
- discovery_id: azure.frontdoor.preconfiguredendpoints.list
  for_each: azure.frontdoor.networkexperimentprofiles.list
  calls:
  - action: preconfiguredendpoints.list
    save_as: response
    on_error: continue
    params:
      profile_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      backend: '{{ item.backend }}'
      description: '{{ item.description }}'
      endpoint: '{{ item.endpoint }}'
      endpoint_type: '{{ item.endpoint_type }}'
- discovery_id: azure.frontdoor.reports.get_latency_scorecards
  for_each: azure.frontdoor.networkexperimentprofiles.list
  calls:
  - action: reports.get_latency_scorecards
    save_as: response
    on_error: continue
    params:
      profile_name: '{{ item.name }}'
      experiment_name: '{{ item.name }}'
      aggregation_interval: '{{ item.aggregation_interval }}'
  emit:
    as: item
    item:
      identity: '{{ response.identity }}'
      type: '{{ response.type }}'
      properties: '{{ response.properties }}'
      location: '{{ response.location }}'
      sku: '{{ response.sku }}'
      name: '{{ response.name }}'
      provisioning_state: '{{ response.provisioning_state }}'
      zones: '{{ response.zones }}'
      kind: '{{ response.kind }}'
      id: '{{ response.id }}'
      tags: '{{ response.tags }}'
- discovery_id: azure.frontdoor.reports.get_timeseries
  for_each: azure.frontdoor.networkexperimentprofiles.list
  calls:
  - action: reports.get_timeseries
    save_as: response
    on_error: continue
    params:
      profile_name: '{{ item.name }}'
      experiment_name: '{{ item.name }}'
      start_date_time_utc: '{{ item.start_date_time_utc }}'
      end_date_time_utc: '{{ item.end_date_time_utc }}'
  emit:
    as: item
    item:
      identity: '{{ response.identity }}'
      type: '{{ response.type }}'
      properties: '{{ response.properties }}'
      location: '{{ response.location }}'
      sku: '{{ response.sku }}'
      name: '{{ response.name }}'
      provisioning_state: '{{ response.provisioning_state }}'
      zones: '{{ response.zones }}'
      kind: '{{ response.kind }}'
      id: '{{ response.id }}'
      tags: '{{ response.tags }}'
- discovery_id: azure.frontdoor.rulesengines.list_by_front_door
  for_each: azure.frontdoor.frontdoors.list
  calls:
  - action: rulesengines.list_by_front_door
    save_as: response
    on_error: continue
    params:
      front_door_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      resource_state: '{{ item.resource_state }}'
      rules: '{{ item.rules }}'
