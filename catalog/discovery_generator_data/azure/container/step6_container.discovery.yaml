version: '1.0'
provider: azure
service: container
services:
  client: container
  module: azure.mgmt.container
discovery:
- discovery_id: azure.container.list
  calls:
  - action: list
    save_as: list_response
  emit:
    items_for: '{{ list_response.value }}'
    as: item
    item:
      identity: '{{ item.identity }}'
      provisioning_state: '{{ item.provisioning_state }}'
      containers: '{{ item.containers }}'
      image_registry_credentials: '{{ item.image_registry_credentials }}'
      restart_policy: '{{ item.restart_policy }}'
      ip_address: '{{ item.ip_address }}'
      os_type: '{{ item.os_type }}'
      volumes: '{{ item.volumes }}'
      instance_view: '{{ item.instance_view }}'
      diagnostics: '{{ item.diagnostics }}'
      subnet_ids: '{{ item.subnet_ids }}'
      dns_config: '{{ item.dns_config }}'
      sku: '{{ item.sku }}'
      encryption_properties: '{{ item.encryption_properties }}'
      init_containers: '{{ item.init_containers }}'
      extensions: '{{ item.extensions }}'
      confidential_compute_properties: '{{ item.confidential_compute_properties }}'
      priority: '{{ item.priority }}'
      id: '{{ item.id }}'
      name: '{{ item.name }}'
  uid_template: '{item.id}'
- discovery_id: azure.containerinstance.containergroups.list
  calls:
  - action: containergroups.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      provisioning_state: '{{ item.provisioning_state }}'
      containers: '{{ item.containers }}'
      image_registry_credentials: '{{ item.image_registry_credentials }}'
      restart_policy: '{{ item.restart_policy }}'
      ip_address: '{{ item.ip_address }}'
      os_type: '{{ item.os_type }}'
      volumes: '{{ item.volumes }}'
      instance_view: '{{ item.instance_view }}'
      diagnostics: '{{ item.diagnostics }}'
      subnet_ids: '{{ item.subnet_ids }}'
      dns_config: '{{ item.dns_config }}'
      sku: '{{ item.sku }}'
      encryption_properties: '{{ item.encryption_properties }}'
      init_containers: '{{ item.init_containers }}'
      extensions: '{{ item.extensions }}'
      confidential_compute_properties: '{{ item.confidential_compute_properties }}'
      priority: '{{ item.priority }}'
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      zones: '{{ item.zones }}'
  uid_template: '{item.id}'
- discovery_id: azure.containerregistry.root.list
  calls:
  - action: root.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      system_data: '{{ item.system_data }}'
      description: '{{ item.description }}'
      type_properties_type: '{{ item.type_properties_type }}'
      creation_date: '{{ item.creation_date }}'
      provisioning_state: '{{ item.provisioning_state }}'
      actions: '{{ item.actions }}'
  uid_template: '{item.id}'
