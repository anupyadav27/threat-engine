version: '1.0'
provider: azure
service: site
discovery:
- discovery_id: azure.recoveryservices.vaults.list_by_subscription_id
  calls:
  - action: vaults.list_by_subscription_id
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      properties: '{{ item.properties }}'
      identity: '{{ item.identity }}'
      sku: '{{ item.sku }}'
      etag: '{{ item.etag }}'
- discovery_id: azure.recoveryservicessiterecovery.replicationalertsettings.list
  calls:
  - action: replicationalertsettings.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      properties: '{{ item.properties }}'
  uid_template: '{item.id}'
- discovery_id: azure.recoveryservicessiterecovery.replicationpolicies.list
  calls:
  - action: replicationpolicies.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      properties: '{{ item.properties }}'
  uid_template: '{item.id}'
- discovery_id: azure.recoveryservicessiterecovery.replicationrecoveryplans.list
  calls:
  - action: replicationrecoveryplans.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      properties: '{{ item.properties }}'
  uid_template: '{item.id}'
