version: '1.0'
provider: azure
service: agrifood
services:
  client: agrifood
  module: azure.mgmt.agrifood
discovery:
- discovery_id: azure.agrifood.farmbeatsextensions.list
  calls:
  - action: farmbeatsextensions.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      e_tag: '{{ item.e_tag }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.agrifood.farmbeatsmodels.list_by_resource_group
  calls:
  - action: farmbeatsmodels.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      public_network_access: '{{ item.public_network_access }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      instance_uri: '{{ item.instance_uri }}'
      private_endpoint_connections: '{{ item.private_endpoint_connections }}'
      sensor_integration: '{{ item.sensor_integration }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.agrifood.farmbeatsmodels.list_by_subscription
  calls:
  - action: farmbeatsmodels.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      public_network_access: '{{ item.public_network_access }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      instance_uri: '{{ item.instance_uri }}'
      private_endpoint_connections: '{{ item.private_endpoint_connections }}'
      sensor_integration: '{{ item.sensor_integration }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.agrifood.solutionsdiscoverability.list
  calls:
  - action: solutionsdiscoverability.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      e_tag: '{{ item.e_tag }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.agrifood.extensions.list_by_farm_beats
  for_each: azure.agrifood.farmbeatsmodels.list_by_subscription
  calls:
  - action: extensions.list_by_farm_beats
    save_as: response
    on_error: continue
    params:
      farm_beats_resource_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      additional_api_properties: '{{ item.additional_api_properties }}'
      e_tag: '{{ item.e_tag }}'
      extension_api_docs_link: '{{ item.extension_api_docs_link }}'
      extension_auth_link: '{{ item.extension_auth_link }}'
      extension_category: '{{ item.extension_category }}'
      extension_id: '{{ item.extension_id }}'
      installed_extension_version: '{{ item.installed_extension_version }}'
      system_data: '{{ item.system_data }}'
- discovery_id: azure.agrifood.farmbeatsmodels.get_operation_result
  for_each: azure.agrifood.farmbeatsmodels.list_by_subscription
  calls:
  - action: farmbeatsmodels.get_operation_result
    save_as: response
    on_error: continue
    params:
      farm_beats_resource_name: '{{ item.name }}'
  emit:
    as: item
    item:
      identity: '{{ response.identity }}'
      type: '{{ response.type }}'
      properties: '{{ response.properties }}'
      location: '{{ response.location }}'
      sku: '{{ response.sku }}'
      name: '{{ response.name }}'
      provisioning_state: '{{ response.provisioning_state }}'
      zones: '{{ response.zones }}'
      kind: '{{ response.kind }}'
      id: '{{ response.id }}'
      tags: '{{ response.tags }}'
- discovery_id: azure.agrifood.privateendpointconnections.list_by_resource
  for_each: azure.agrifood.farmbeatsmodels.list_by_subscription
  calls:
  - action: privateendpointconnections.list_by_resource
    save_as: response
    on_error: continue
    params:
      farm_beats_resource_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      group_id: '{{ item.group_id }}'
      required_members: '{{ item.required_members }}'
      required_zone_names: '{{ item.required_zone_names }}'
      system_data: '{{ item.system_data }}'
- discovery_id: azure.agrifood.privatelinkresources.list_by_resource
  for_each: azure.agrifood.farmbeatsmodels.list_by_subscription
  calls:
  - action: privatelinkresources.list_by_resource
    save_as: response
    on_error: continue
    params:
      farm_beats_resource_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      group_id: '{{ item.group_id }}'
      required_members: '{{ item.required_members }}'
      required_zone_names: '{{ item.required_zone_names }}'
      system_data: '{{ item.system_data }}'
- discovery_id: azure.agrifood.solutions.list
  for_each: azure.agrifood.farmbeatsmodels.list_by_subscription
  calls:
  - action: solutions.list
    save_as: response
    on_error: continue
    params:
      farm_beats_resource_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      e_tag: '{{ item.e_tag }}'
      system_data: '{{ item.system_data }}'
