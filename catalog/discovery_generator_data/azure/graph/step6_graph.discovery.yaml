version: '1.0'
provider: azure
service: graph
discovery:
- discovery_id: azure.graph.identity_conditional_access_policies.list
  calls:
  - action: identity_conditional_access_policies.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      displayName: '{{ item.displayName }}'
      state: '{{ item.state }}'
      properties: '{{ item.properties }}'
      conditions: '{{ item.conditions }}'
      grantControls: '{{ item.grantControls }}'
      sessionControls: '{{ item.sessionControls }}'
  uid_template: '{item.id}'
