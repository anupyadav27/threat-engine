version: '1.0'
provider: azure
service: webapp
discovery:
- discovery_id: azure.web.webapps.list_slots
  calls:
  - action: webapps.list_slots
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      sku: '{{ item.sku }}'
      identity: '{{ item.identity }}'
      kind: '{{ item.kind }}'
      extended_location: '{{ item.extended_location }}'
      state: '{{ item.state }}'
      host_names: '{{ item.host_names }}'
      repository_site_name: '{{ item.repository_site_name }}'
      usage_state: '{{ item.usage_state }}'
      enabled: '{{ item.enabled }}'
      enabled_host_names: '{{ item.enabled_host_names }}'
      availability_state: '{{ item.availability_state }}'
      host_name_ssl_states: '{{ item.host_name_ssl_states }}'
      server_farm_id: '{{ item.server_farm_id }}'
      reserved: '{{ item.reserved }}'
      is_xenon: '{{ item.is_xenon }}'
      slot_swap_status.destination_slot_name: '{{ item.slot_swap_status.destination_slot_name
        }}'
  uid_template: '{item.id}'
- discovery_id: azure.web.webapps.list
  calls:
  - action: webapps.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      sku: '{{ item.sku }}'
      identity: '{{ item.identity }}'
      kind: '{{ item.kind }}'
      extended_location: '{{ item.extended_location }}'
      state: '{{ item.state }}'
      host_names: '{{ item.host_names }}'
      repository_site_name: '{{ item.repository_site_name }}'
      usage_state: '{{ item.usage_state }}'
      enabled: '{{ item.enabled }}'
      enabled_host_names: '{{ item.enabled_host_names }}'
      availability_state: '{{ item.availability_state }}'
      host_name_ssl_states: '{{ item.host_name_ssl_states }}'
      server_farm_id: '{{ item.server_farm_id }}'
      reserved: '{{ item.reserved }}'
      is_xenon: '{{ item.is_xenon }}'
      slot_swap_status.destination_slot_name: '{{ item.slot_swap_status.destination_slot_name
        }}'
  uid_template: '{item.id}'
