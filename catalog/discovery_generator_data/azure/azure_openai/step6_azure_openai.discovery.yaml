version: '1.0'
provider: azure
service: azure_openai
services:
  client: cognitiveservices
  module: azure.mgmt.cognitiveservices
discovery:
- discovery_id: azure.cognitiveservices.accounts.list
  calls:
  - action: accounts.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      tags: '{{ item.tags }}'
      properties: '{{ item.properties }}'
      etag: '{{ item.etag }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.cognitiveservices.deployments.list
  for_each: azure.cognitiveservices.accounts.list
  calls:
  - action: deployments.list
    save_as: response
    on_error: continue
    params:
      account_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      tags: '{{ item.tags }}'
      properties: '{{ item.properties }}'
      etag: '{{ item.etag }}'
      system_data: '{{ item.system_data }}'
