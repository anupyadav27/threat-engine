# Discovery YAML — azure_openai (Azure)
# Generated: 2026-04-15T09:58:00Z
# Backend namespace: cognitiveservices
# Source: step1b + step4 dependency chain for check rules
version: '1.0'
provider: azure
service: azure_openai
services:
  client: cognitiveservices
  module: azure.mgmt.cognitiveservices
discovery:
  # ════════════════════════════════════════
  # Root (independent) operations
  # ════════════════════════════════════════
  # ── accounts.list [root] ──
  - discovery_id: azure.cognitiveservices.accounts.list
    calls:
      - action: accounts.list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        tags: '{{ item.tags }}'
        properties: '{{ item.properties }}'
        etag: '{{ item.etag }}'
        system_data: '{{ item.system_data }}'
  # ════════════════════════════════════════
  # Dependent operations (for_each + params)
  # ════════════════════════════════════════
  # ── deployments.list [dependent] ──
  - discovery_id: azure.cognitiveservices.deployments.list
    for_each: azure.cognitiveservices.accounts.list
    calls:
      - action: deployments.list
        save_as: response
        on_error: continue
        params:
          account_name: '{{ item.name }}'
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        tags: '{{ item.tags }}'
        properties: '{{ item.properties }}'
        etag: '{{ item.etag }}'
        system_data: '{{ item.system_data }}'
