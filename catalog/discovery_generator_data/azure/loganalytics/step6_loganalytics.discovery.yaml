version: '1.0'
provider: azure
service: loganalytics
services:
  client: loganalytics
  module: azure.mgmt.loganalytics
discovery:
- discovery_id: azure.loganalytics.clusters.list
  calls:
  - action: clusters.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      created_date: '{{ item.created_date }}'
      customer_id: '{{ item.customer_id }}'
      default_data_collection_rule_resource_id: '{{ item.default_data_collection_rule_resource_id
        }}'
      etag: '{{ item.etag }}'
      failover: '{{ item.failover }}'
      features: '{{ item.features }}'
      force_cmk_for_query: '{{ item.force_cmk_for_query }}'
      modified_date: '{{ item.modified_date }}'
      private_link_scoped_resources: '{{ item.private_link_scoped_resources }}'
      public_network_access_for_ingestion: '{{ item.public_network_access_for_ingestion
        }}'
      public_network_access_for_query: '{{ item.public_network_access_for_query }}'
      replication: '{{ item.replication }}'
      retention_in_days: '{{ item.retention_in_days }}'
      system_data: '{{ item.system_data }}'
      workspace_capping: '{{ item.workspace_capping }}'
