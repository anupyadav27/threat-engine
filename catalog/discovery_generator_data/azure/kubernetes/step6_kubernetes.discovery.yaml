version: '1.0'
provider: azure
service: kubernetes
discovery:
- discovery_id: azure.kubernetes.clusters.list
  calls:
  - action: managed_clusters.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      properties: '{{ item.properties }}'
      addonProfiles: '{{ item.addonProfiles }}'
      agentPoolProfiles: '{{ item.agentPoolProfiles }}'
      networkProfile: '{{ item.networkProfile }}'
      apiServerAccessProfile: '{{ item.apiServerAccessProfile }}'
- discovery_id: azure.kubernetes.deployments.list
  calls:
  - action: deployments.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      metadata: '{{ item.metadata }}'
      spec: '{{ item.spec }}'
      status: '{{ item.status }}'
      name: '{{ item.name }}'
      namespace: '{{ item.namespace }}'
      replicas: '{{ item.replicas }}'
      containers: '{{ item.containers }}'
- discovery_id: azure.kubernetes.list_agent_pools
