      properties: '{{ item.properties }}'
      count: '{{ item.count }}'
      vmSize: '{{ item.vmSize }}'
      osDiskSizeGB: '{{ item.osDiskSizeGB }}'
      osType: '{{ item.osType }}'
      agentPoolType: '{{ item.agentPoolType }}'
      mode: '{{ item.mode }}'
      nodeLabels: '{{ item.nodeLabels }}'
- discovery_id: azure.kubernetes.list_cluster_role_bindings
