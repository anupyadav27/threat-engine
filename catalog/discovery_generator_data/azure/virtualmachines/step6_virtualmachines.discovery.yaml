version: '1.0'
provider: azure
service: virtualmachines
discovery:
- discovery_id: azure.compute.virtualmachines.list
  calls:
  - action: virtualmachines.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      identity: '{{ item.identity }}'
      provisioning_state: '{{ item.provisioning_state }}'
      etag: '{{ item.etag }}'
      zones: '{{ item.zones }}'
      system_data: '{{ item.system_data }}'
      plan: '{{ item.plan }}'
      resources: '{{ item.resources }}'
      extended_location: '{{ item.extended_location }}'
      managed_by: '{{ item.managed_by }}'
      placement: '{{ item.placement }}'
      hardware_profile: '{{ item.hardware_profile }}'
      scheduled_events_policy: '{{ item.scheduled_events_policy }}'
      storage_profile: '{{ item.storage_profile }}'
      additional_capabilities: '{{ item.additional_capabilities }}'
      os_profile: '{{ item.os_profile }}'
      vm_id: '{{ item.vm_id }}'
- discovery_id: azure.compute.virtualmachines.list_all
  calls:
  - action: virtualmachines.list_all
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      identity: '{{ item.identity }}'
      provisioning_state: '{{ item.provisioning_state }}'
      etag: '{{ item.etag }}'
      zones: '{{ item.zones }}'
      system_data: '{{ item.system_data }}'
      plan: '{{ item.plan }}'
      resources: '{{ item.resources }}'
      extended_location: '{{ item.extended_location }}'
      managed_by: '{{ item.managed_by }}'
      placement: '{{ item.placement }}'
      hardware_profile: '{{ item.hardware_profile }}'
      scheduled_events_policy: '{{ item.scheduled_events_policy }}'
      storage_profile: '{{ item.storage_profile }}'
      additional_capabilities: '{{ item.additional_capabilities }}'
      os_profile: '{{ item.os_profile }}'
      vm_id: '{{ item.vm_id }}'
