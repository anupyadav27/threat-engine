version: '1.0'
provider: azure
service: recoveryservices
services:
  client: recoveryservices
  module: azure.mgmt.recoveryservices
discovery:
- discovery_id: azure.recoveryservices.vaults.list_by_resource_group
  calls:
  - action: vaults.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      etag: '{{ item.etag }}'
  uid_template: '{item.id}'
- discovery_id: azure.recoveryservices.vaults.list_by_subscription_id
  calls:
  - action: vaults.list_by_subscription_id
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      etag: '{{ item.etag }}'
  uid_template: '{item.id}'
- discovery_id: azure.recoveryservices.privatelinkresources.list
  for_each: azure.recoveryservices.usages.list_by_vaults
  calls:
  - action: privatelinkresources.list
    save_as: response
    on_error: continue
    params:
      vault_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      jobs_summary: '{{ item.jobs_summary }}'
      monitoring_summary: '{{ item.monitoring_summary }}'
      protected_item_count: '{{ item.protected_item_count }}'
      recovery_plan_count: '{{ item.recovery_plan_count }}'
      recovery_services_provider_auth_type: '{{ item.recovery_services_provider_auth_type
        }}'
      registered_servers_count: '{{ item.registered_servers_count }}'
- discovery_id: azure.recoveryservices.replicationusages.list
  for_each: azure.recoveryservices.usages.list_by_vaults
  calls:
  - action: replicationusages.list
    save_as: response
    on_error: continue
    params:
      vault_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      jobs_summary: '{{ item.jobs_summary }}'
      monitoring_summary: '{{ item.monitoring_summary }}'
      protected_item_count: '{{ item.protected_item_count }}'
      recovery_plan_count: '{{ item.recovery_plan_count }}'
      recovery_services_provider_auth_type: '{{ item.recovery_services_provider_auth_type
        }}'
      registered_servers_count: '{{ item.registered_servers_count }}'
- discovery_id: azure.recoveryservices.operations_list
  calls:
  - action: Operations_List
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.id}'
