version: '1.0'
provider: azure
service: marketplaceordering
services:
  client: marketplaceordering
  module: azure.mgmt.marketplaceordering
discovery:
- discovery_id: azure.marketplaceordering.marketplaceagreements.list
  calls:
  - action: marketplaceagreements.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      accepted: '{{ item.accepted }}'
      license_text_link: '{{ item.license_text_link }}'
      marketplace_terms_link: '{{ item.marketplace_terms_link }}'
      plan: '{{ item.plan }}'
      privacy_policy_link: '{{ item.privacy_policy_link }}'
      product: '{{ item.product }}'
      publisher: '{{ item.publisher }}'
      retrieve_datetime: '{{ item.retrieve_datetime }}'
      signature: '{{ item.signature }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.marketplaceordering.marketplaceagreements.get_agreement
  for_each: azure.marketplaceordering.marketplaceagreements.list
  calls:
  - action: marketplaceagreements.get_agreement
    save_as: response
    on_error: continue
    params:
      publisher_id: '{{ item.id }}'
  emit:
    as: item
    item:
      identity: '{{ response.identity }}'
      type: '{{ response.type }}'
      properties: '{{ response.properties }}'
      location: '{{ response.location }}'
      sku: '{{ response.sku }}'
      name: '{{ response.name }}'
      provisioning_state: '{{ response.provisioning_state }}'
      zones: '{{ response.zones }}'
      kind: '{{ response.kind }}'
      id: '{{ response.id }}'
      tags: '{{ response.tags }}'
