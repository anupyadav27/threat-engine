version: '1.0'
provider: azure
service: dns
services:
  client: dns
  module: azure.mgmt.dns
discovery:
- discovery_id: azure.dns.zones.list
  calls:
  - action: zones.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      etag: '{{ item.etag }}'
      max_number_of_record_sets: '{{ item.max_number_of_record_sets }}'
      max_number_of_records_per_record_set: '{{ item.max_number_of_records_per_record_set
        }}'
      name_servers: '{{ item.name_servers }}'
      number_of_record_sets: '{{ item.number_of_record_sets }}'
      registration_virtual_networks: '{{ item.registration_virtual_networks }}'
      resolution_virtual_networks: '{{ item.resolution_virtual_networks }}'
      zone_type: '{{ item.zone_type }}'
  uid_template: '{item.id}'
- discovery_id: azure.dns.zones.list_by_resource_group
  calls:
  - action: zones.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      etag: '{{ item.etag }}'
      max_number_of_record_sets: '{{ item.max_number_of_record_sets }}'
      max_number_of_records_per_record_set: '{{ item.max_number_of_records_per_record_set
        }}'
      name_servers: '{{ item.name_servers }}'
      number_of_record_sets: '{{ item.number_of_record_sets }}'
      registration_virtual_networks: '{{ item.registration_virtual_networks }}'
      resolution_virtual_networks: '{{ item.resolution_virtual_networks }}'
      zone_type: '{{ item.zone_type }}'
  uid_template: '{item.id}'
- discovery_id: azure.dns.recordsets.list_all_by_dns_zone
  for_each: azure.dns.zones.list
  calls:
  - action: recordsets.list_all_by_dns_zone
    save_as: response
    on_error: continue
    params:
      zone_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      a_records: '{{ item.a_records }}'
      aaaa_records: '{{ item.aaaa_records }}'
      caa_records: '{{ item.caa_records }}'
      cname_record: '{{ item.cname_record }}'
      etag: '{{ item.etag }}'
      fqdn: '{{ item.fqdn }}'
      metadata: '{{ item.metadata }}'
      mx_records: '{{ item.mx_records }}'
      ns_records: '{{ item.ns_records }}'
      ptr_records: '{{ item.ptr_records }}'
      soa_record: '{{ item.soa_record }}'
      srv_records: '{{ item.srv_records }}'
      target_resource: '{{ item.target_resource }}'
      ttl: '{{ item.ttl }}'
      txt_records: '{{ item.txt_records }}'
- discovery_id: azure.dns.recordsets.list_by_dns_zone
  for_each: azure.dns.zones.list
  calls:
  - action: recordsets.list_by_dns_zone
    save_as: response
    on_error: continue
    params:
      zone_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      a_records: '{{ item.a_records }}'
      aaaa_records: '{{ item.aaaa_records }}'
      caa_records: '{{ item.caa_records }}'
      cname_record: '{{ item.cname_record }}'
      etag: '{{ item.etag }}'
      fqdn: '{{ item.fqdn }}'
      metadata: '{{ item.metadata }}'
      mx_records: '{{ item.mx_records }}'
      ns_records: '{{ item.ns_records }}'
      ptr_records: '{{ item.ptr_records }}'
      soa_record: '{{ item.soa_record }}'
      srv_records: '{{ item.srv_records }}'
      target_resource: '{{ item.target_resource }}'
      ttl: '{{ item.ttl }}'
      txt_records: '{{ item.txt_records }}'
- discovery_id: azure.dns.recordsets.list_by_type
  for_each: azure.dns.zones.list
  calls:
  - action: recordsets.list_by_type
    save_as: response
    on_error: continue
    params:
      zone_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      a_records: '{{ item.a_records }}'
      aaaa_records: '{{ item.aaaa_records }}'
      caa_records: '{{ item.caa_records }}'
      cname_record: '{{ item.cname_record }}'
      etag: '{{ item.etag }}'
      fqdn: '{{ item.fqdn }}'
      metadata: '{{ item.metadata }}'
      mx_records: '{{ item.mx_records }}'
      ns_records: '{{ item.ns_records }}'
      ptr_records: '{{ item.ptr_records }}'
      soa_record: '{{ item.soa_record }}'
      srv_records: '{{ item.srv_records }}'
      target_resource: '{{ item.target_resource }}'
      ttl: '{{ item.ttl }}'
      txt_records: '{{ item.txt_records }}'
