version: '1.0'
provider: azure
service: servicenetworking
services:
  client: servicenetworking
  module: azure.mgmt.servicenetworking
discovery:
- discovery_id: azure.servicenetworking.trafficcontrollerinterface.list_by_resource_group
  calls:
  - action: trafficcontrollerinterface.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
  uid_template: '{item.id}'
- discovery_id: azure.servicenetworking.trafficcontrollerinterface.list_by_subscription
  calls:
  - action: trafficcontrollerinterface.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
  uid_template: '{item.id}'
- discovery_id: azure.servicenetworking.associationsinterface.list_by_traffic_controller
  for_each: azure.servicenetworking.trafficcontrollerinterface.list_by_subscription
  calls:
  - action: associationsinterface.list_by_traffic_controller
    save_as: response
    on_error: continue
    params:
      traffic_controller_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
- discovery_id: azure.servicenetworking.frontendsinterface.list_by_traffic_controller
  for_each: azure.servicenetworking.trafficcontrollerinterface.list_by_subscription
  calls:
  - action: frontendsinterface.list_by_traffic_controller
    save_as: response
    on_error: continue
    params:
      traffic_controller_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
- discovery_id: azure.servicenetworking.securitypoliciesinterface.list_by_traffic_controller
  for_each: azure.servicenetworking.trafficcontrollerinterface.list_by_subscription
  calls:
  - action: securitypoliciesinterface.list_by_traffic_controller
    save_as: response
    on_error: continue
    params:
      traffic_controller_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
