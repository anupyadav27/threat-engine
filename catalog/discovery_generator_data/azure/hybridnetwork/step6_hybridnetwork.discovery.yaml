version: '1.0'
provider: azure
service: hybridnetwork
services:
  client: hybridnetwork
  module: azure.mgmt.hybridnetwork
discovery:
- discovery_id: azure.hybridnetwork.configurationgroupvalues.list_by_resource_group
  calls:
  - action: configurationgroupvalues.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
