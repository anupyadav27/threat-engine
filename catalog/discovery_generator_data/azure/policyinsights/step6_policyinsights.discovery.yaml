version: '1.0'
provider: azure
service: policyinsights
services:
  client: policyinsights
  module: azure.mgmt.policyinsights
discovery:
- discovery_id: azure.policyinsights.policyevents.list_query_results_for_resource_group
  calls:
  - action: policyevents.list_query_results_for_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.id}'
