version: '1.0'
provider: azure
service: machine
discovery:
- discovery_id: azure.machinelearningservices.workspaces.list_by_subscription
  calls:
  - action: workspaces.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      identity: '{{ item.identity }}'
      location: '{{ item.location }}'
      type: '{{ item.type }}'
      tags: '{{ item.tags }}'
      sku: '{{ item.sku }}'
      workspace_id: '{{ item.workspace_id }}'
      description: '{{ item.description }}'
      friendly_name: '{{ item.friendly_name }}'
      creation_time: '{{ item.creation_time }}'
      key_vault: '{{ item.key_vault }}'
      application_insights: '{{ item.application_insights }}'
      container_registry: '{{ item.container_registry }}'
      storage_account: '{{ item.storage_account }}'
      discovery_url: '{{ item.discovery_url }}'
      provisioning_state: '{{ item.provisioning_state }}'
      encryption: '{{ item.encryption }}'
      hbi_workspace: '{{ item.hbi_workspace }}'
      service_provisioned_resource_group: '{{ item.service_provisioned_resource_group
        }}'
      private_link_count: '{{ item.private_link_count }}'
      image_build_compute: '{{ item.image_build_compute }}'
      allow_public_access_when_behind_vnet: '{{ item.allow_public_access_when_behind_vnet
        }}'
      private_endpoint_connections: '{{ item.private_endpoint_connections }}'
      shared_private_link_resources: '{{ item.shared_private_link_resources }}'
      notebook_info: '{{ item.notebook_info }}'
