version: '1.0'
provider: azure
service: extendedlocation
services:
  client: extendedlocation
  module: azure.mgmt.extendedlocation
discovery:
- discovery_id: azure.extendedlocation.customlocations.list_by_resource_group
  calls:
  - action: customlocations.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      authentication: '{{ item.authentication }}'
      cluster_extension_ids: '{{ item.cluster_extension_ids }}'
      display_name: '{{ item.display_name }}'
      host_resource_id: '{{ item.host_resource_id }}'
      host_type: '{{ item.host_type }}'
      namespace: '{{ item.namespace }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.extendedlocation.customlocations.list_by_subscription
  calls:
  - action: customlocations.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      authentication: '{{ item.authentication }}'
      cluster_extension_ids: '{{ item.cluster_extension_ids }}'
      display_name: '{{ item.display_name }}'
      host_resource_id: '{{ item.host_resource_id }}'
      host_type: '{{ item.host_type }}'
      namespace: '{{ item.namespace }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.extendedlocation.customlocations.list_operations
  calls:
  - action: customlocations.list_operations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      description: '{{ item.description }}'
      is_data_action: '{{ item.is_data_action }}'
      operation: '{{ item.operation }}'
      origin: '{{ item.origin }}'
      provider: '{{ item.provider }}'
      resource: '{{ item.resource }}'
  uid_template: '{item.id}'
- discovery_id: azure.extendedlocation.customlocations.list_enabled_resource_types
  for_each: azure.extendedlocation.customlocations.list_by_subscription
  calls:
  - action: customlocations.list_enabled_resource_types
    save_as: response
    on_error: continue
    params:
      resource_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      cluster_extension_id: '{{ item.cluster_extension_id }}'
      extension_type: '{{ item.extension_type }}'
      system_data: '{{ item.system_data }}'
      types_metadata: '{{ item.types_metadata }}'
