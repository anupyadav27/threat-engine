version: '1.0'
provider: azure
service: rdbms_postgresql
services:
  client: rdbms_postgresql
  module: azure.mgmt.rdbms.postgresql
discovery:
- discovery_id: azure.rdbms_postgresql.servers.list
  calls:
  - action: servers.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      public_network_access: '{{ item.public_network_access }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      administrator_login: '{{ item.administrator_login }}'
      byok_enforcement: '{{ item.byok_enforcement }}'
      earliest_restore_date: '{{ item.earliest_restore_date }}'
      fully_qualified_domain_name: '{{ item.fully_qualified_domain_name }}'
      infrastructure_encryption: '{{ item.infrastructure_encryption }}'
      master_server_id: '{{ item.master_server_id }}'
      minimal_tls_version: '{{ item.minimal_tls_version }}'
      private_endpoint_connections: '{{ item.private_endpoint_connections }}'
      replica_capacity: '{{ item.replica_capacity }}'
      replication_role: '{{ item.replication_role }}'
      ssl_enforcement: '{{ item.ssl_enforcement }}'
      storage_profile: '{{ item.storage_profile }}'
      user_visible_state: '{{ item.user_visible_state }}'
      version: '{{ item.version }}'
  uid_template: '{item.id}'
- discovery_id: azure.rdbms_postgresql.servers.list_by_resource_group
  calls:
  - action: servers.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      public_network_access: '{{ item.public_network_access }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      administrator_login: '{{ item.administrator_login }}'
      byok_enforcement: '{{ item.byok_enforcement }}'
      earliest_restore_date: '{{ item.earliest_restore_date }}'
      fully_qualified_domain_name: '{{ item.fully_qualified_domain_name }}'
      infrastructure_encryption: '{{ item.infrastructure_encryption }}'
      master_server_id: '{{ item.master_server_id }}'
      minimal_tls_version: '{{ item.minimal_tls_version }}'
      private_endpoint_connections: '{{ item.private_endpoint_connections }}'
      replica_capacity: '{{ item.replica_capacity }}'
      replication_role: '{{ item.replication_role }}'
      ssl_enforcement: '{{ item.ssl_enforcement }}'
      storage_profile: '{{ item.storage_profile }}'
      user_visible_state: '{{ item.user_visible_state }}'
      version: '{{ item.version }}'
  uid_template: '{item.id}'
- discovery_id: azure.rdbms_postgresql.configurations.list_by_server
  for_each: azure.rdbms_postgresql.servers.list
  calls:
  - action: configurations.list_by_server
    save_as: response
    on_error: continue
    params:
      server_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      ignore_missing_vnet_service_endpoint: '{{ item.ignore_missing_vnet_service_endpoint
        }}'
      state: '{{ item.state }}'
      virtual_network_subnet_id: '{{ item.virtual_network_subnet_id }}'
