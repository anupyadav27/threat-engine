version: '1.0'
provider: azure
service: key
discovery:
- discovery_id: azure.keyvault.keys.list
  calls:
  - action: keys.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
- discovery_id: azure.keyvault.vaults.list
  calls:
  - action: vaults.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      tags: '{{ item.tags }}'
      location: '{{ item.location }}'
- discovery_id: azure.keyvault.vaults.list_by_subscription
  calls:
  - action: vaults.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
