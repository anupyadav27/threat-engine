version: '1.0'
provider: azure
service: managedidentity
services:
  client: managedidentity
  module: azure.mgmt.managedidentity
discovery:
- discovery_id: azure.managedidentity.list
  calls:
  - action: list
    save_as: list_response
  emit:
    items_for: '{{ list_response.value }}'
    as: item
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
  uid_template: '{item.id}'
- discovery_id: azure.msi.root.list
  calls:
  - action: root.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      name: '{{ item.name }}'
      display: '{{ item.display }}'
- discovery_id: azure.managedidentity.list_by_subscription
  calls:
  - action: list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.id}'
