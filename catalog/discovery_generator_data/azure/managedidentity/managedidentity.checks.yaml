version: '1.0'
provider: azure
service: msi
checks:
# ═══════════════════════════════════════════
# User-Assigned Identities — azure.msi.userassignedidentities.list_by_subscription
# Fields: id, name, type, location, tags, principal_id, client_id, tenant_id
# ═══════════════════════════════════════════
- rule_id: azure.msi.identity.principal_id_present
  for_each: azure.msi.userassignedidentities.list_by_subscription
  conditions:
    var: item.principal_id
    op: not_empty

- rule_id: azure.msi.identity.client_id_present
  for_each: azure.msi.userassignedidentities.list_by_subscription
  conditions:
    var: item.client_id
    op: not_empty

- rule_id: azure.msi.identity.tenant_id_present
  for_each: azure.msi.userassignedidentities.list_by_subscription
  conditions:
    var: item.tenant_id
    op: not_empty

- rule_id: azure.msi.identity.tags_configured
  for_each: azure.msi.userassignedidentities.list_by_subscription
  conditions:
    var: item.tags
    op: not_empty
