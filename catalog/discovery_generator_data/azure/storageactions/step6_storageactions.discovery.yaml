version: '1.0'
provider: azure
service: storageactions
services:
  client: storageactions
  module: azure.mgmt.storageactions
discovery:
- discovery_id: azure.storageactions.storagetasks.list_by_resource_group
  calls:
  - action: storagetasks.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
  uid_template: '{item.id}'
- discovery_id: azure.storageactions.storagetasks.list_by_subscription
  calls:
  - action: storagetasks.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
  uid_template: '{item.id}'
- discovery_id: azure.storageactions.storagetaskassignment.list
  for_each: azure.storageactions.storagetasks.list_by_subscription
  calls:
  - action: storagetaskassignment.list
    save_as: response
    on_error: continue
    params:
      storage_task_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
- discovery_id: azure.storageactions.storagetasksreport.list
  for_each: azure.storageactions.storagetasks.list_by_subscription
  calls:
  - action: storagetasksreport.list
    save_as: response
    on_error: continue
    params:
      storage_task_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
