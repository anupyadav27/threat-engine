version: '1.0'
provider: azure
service: scvmm
services:
  client: scvmm
  module: azure.mgmt.scvmm
discovery:
- discovery_id: azure.scvmm.availabilitysets.list_by_resource_group
  calls:
  - action: availabilitysets.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      extended_location: '{{ item.extended_location }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
