# Discovery YAML — maps (Azure)
# Generated: 2026-04-15T10:39:30Z
# Source: step1b_operation_registry.json (qualified ops + dependency chains)
# Actions use {category}.{method} format for SDK method resolution
version: '1.0'
provider: azure
service: maps
services:
  client: maps
  module: azure.mgmt.maps
discovery:
  # ── accounts.list_by_resource_group [root] ──
  - discovery_id: azure.maps.accounts.list_by_resource_group
    calls:
      - action: accounts.list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        identity: '{{ item.identity }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        location: '{{ item.location }}'
        sku: '{{ item.sku }}'
        name: '{{ item.name }}'
        kind: '{{ item.kind }}'
        id: '{{ item.id }}'
        tags: '{{ item.tags }}'
        system_data: '{{ item.system_data }}'
  # ── accounts.list_by_subscription [root] ──
  - discovery_id: azure.maps.accounts.list_by_subscription
    calls:
      - action: accounts.list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        identity: '{{ item.identity }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        location: '{{ item.location }}'
        sku: '{{ item.sku }}'
        name: '{{ item.name }}'
        kind: '{{ item.kind }}'
        id: '{{ item.id }}'
        tags: '{{ item.tags }}'
        system_data: '{{ item.system_data }}'
  # ── maps.list_operations [root] ──
  - discovery_id: azure.maps.maps.list_operations
    calls:
      - action: maps.list_operations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        type: '{{ item.type }}'
        name: '{{ item.name }}'
        id: '{{ item.id }}'
        display: '{{ item.display }}'
        is_data_action: '{{ item.is_data_action }}'
        origin: '{{ item.origin }}'
        service_specification: '{{ item.service_specification }}'
  # ── maps.list_subscription_operations [root] ──
  - discovery_id: azure.maps.maps.list_subscription_operations
    calls:
      - action: maps.list_subscription_operations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        type: '{{ item.type }}'
        name: '{{ item.name }}'
        id: '{{ item.id }}'
        display: '{{ item.display }}'
        is_data_action: '{{ item.is_data_action }}'
        origin: '{{ item.origin }}'
        service_specification: '{{ item.service_specification }}'
  # ════════════════════════════════════════
  # Dependent operations (for_each + params)
  # ════════════════════════════════════════
  # ── accounts.list_keys [dependent] ──
  - discovery_id: azure.maps.accounts.list_keys
    for_each: azure.maps.accounts.list_by_subscription
    calls:
      - action: accounts.list_keys
        save_as: response
        on_error: continue
        params:
          account_name: '{{ item.name }}'
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        identity: '{{ item.identity }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        location: '{{ item.location }}'
        sku: '{{ item.sku }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        zones: '{{ item.zones }}'
        kind: '{{ item.kind }}'
        id: '{{ item.id }}'
        tags: '{{ item.tags }}'
  # ── accounts.list_sas [dependent] ──
