        zones: '{{ item.zones }}'
        kind: '{{ item.kind }}'
        id: '{{ item.id }}'
        tags: '{{ item.tags }}'
  # ── creators.list_by_account [dependent] ──
  - discovery_id: azure.maps.creators.list_by_account
    for_each: azure.maps.accounts.list_by_subscription
    calls:
