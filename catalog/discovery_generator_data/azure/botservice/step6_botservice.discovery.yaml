version: '1.0'
provider: azure
service: botservice
services:
  client: botservice
  module: azure.mgmt.botservice
discovery:
- discovery_id: azure.botservice.botconnection.list_service_providers
  calls:
  - action: botconnection.list_service_providers
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
  uid_template: '{item.id}'
- discovery_id: azure.botservice.bots.list
  calls:
  - action: bots.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      group_ids: '{{ item.group_ids }}'
      private_endpoint: '{{ item.private_endpoint }}'
      private_link_service_connection_state: '{{ item.private_link_service_connection_state
        }}'
  uid_template: '{item.id}'
- discovery_id: azure.botservice.bots.list_by_resource_group
  calls:
  - action: bots.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      etag: '{{ item.etag }}'
  uid_template: '{item.id}'
- discovery_id: azure.botservice.botconnection.list_by_bot_service
  for_each: azure.botservice.bots.list
  calls:
  - action: botconnection.list_by_bot_service
    save_as: response
    on_error: continue
    params:
      resource_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      etag: '{{ item.etag }}'
- discovery_id: azure.botservice.botconnection.list_with_secrets
  for_each: azure.botservice.bots.list
  calls:
  - action: botconnection.list_with_secrets
    save_as: response
    on_error: continue
    params:
      resource_name: '{{ item.name }}'
      connection_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
- discovery_id: azure.botservice.channels.list_by_resource_group
  for_each: azure.botservice.bots.list
  calls:
  - action: channels.list_by_resource_group
    save_as: response
    on_error: continue
    params:
      resource_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      etag: '{{ item.etag }}'
- discovery_id: azure.botservice.channels.list_with_keys
  for_each: azure.botservice.bots.list
  calls:
  - action: channels.list_with_keys
    save_as: response
    on_error: continue
    params:
      resource_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
- discovery_id: azure.botservice.privateendpointconnections.list
  for_each: azure.botservice.bots.list
  calls:
  - action: privateendpointconnections.list
    save_as: response
    on_error: continue
    params:
      resource_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      group_ids: '{{ item.group_ids }}'
      private_endpoint: '{{ item.private_endpoint }}'
      private_link_service_connection_state: '{{ item.private_link_service_connection_state
        }}'
- discovery_id: azure.botservice.privatelinkresources.list_by_bot_resource
  for_each: azure.botservice.bots.list
  calls:
  - action: privatelinkresources.list_by_bot_resource
    save_as: response
    on_error: continue
    params:
      resource_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      group_id: '{{ item.group_id }}'
      required_members: '{{ item.required_members }}'
      required_zone_names: '{{ item.required_zone_names }}'
