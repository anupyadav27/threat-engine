version: '1.0'
provider: azure
service: rdbms_mysql
services:
  client: rdbms_mysql
  module: azure.mgmt.rdbms.mysql
discovery:
- discovery_id: azure.rdbms_mysql.servers.list
  calls:
  - action: servers.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      action_id: '{{ item.action_id }}'
      advisor_name: '{{ item.advisor_name }}'
      created_time: '{{ item.created_time }}'
      details: '{{ item.details }}'
      expiration_time: '{{ item.expiration_time }}'
      reason: '{{ item.reason }}'
      recommendation_type: '{{ item.recommendation_type }}'
      session_id: '{{ item.session_id }}'
  uid_template: '{item.id}'
- discovery_id: azure.rdbms_mysql.servers.list_by_resource_group
  calls:
  - action: servers.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      public_network_access: '{{ item.public_network_access }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      administrator_login: '{{ item.administrator_login }}'
      byok_enforcement: '{{ item.byok_enforcement }}'
      earliest_restore_date: '{{ item.earliest_restore_date }}'
      fully_qualified_domain_name: '{{ item.fully_qualified_domain_name }}'
      infrastructure_encryption: '{{ item.infrastructure_encryption }}'
      master_server_id: '{{ item.master_server_id }}'
      minimal_tls_version: '{{ item.minimal_tls_version }}'
      private_endpoint_connections: '{{ item.private_endpoint_connections }}'
      replica_capacity: '{{ item.replica_capacity }}'
      replication_role: '{{ item.replication_role }}'
      ssl_enforcement: '{{ item.ssl_enforcement }}'
      storage_profile: '{{ item.storage_profile }}'
      user_visible_state: '{{ item.user_visible_state }}'
      version: '{{ item.version }}'
  uid_template: '{item.id}'
- discovery_id: azure.rdbms_mysql.advisors.list_by_server
  for_each: azure.rdbms_mysql.servers.list
  calls:
  - action: advisors.list_by_server
    save_as: response
    on_error: continue
    params:
      server_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      count: '{{ item.count }}'
      database_name: '{{ item.database_name }}'
      end_time: '{{ item.end_time }}'
      event_name: '{{ item.event_name }}'
      event_type_name: '{{ item.event_type_name }}'
      query_id: '{{ item.query_id }}'
      start_time: '{{ item.start_time }}'
      total_time_in_ms: '{{ item.total_time_in_ms }}'
      user_id: '{{ item.user_id }}'
