version: '1.0'
provider: azure
service: securityinsight
services:
  client: securityinsight
  module: azure.mgmt.securityinsight
discovery:
- discovery_id: azure.securityinsight.actions.list_by_alert_rule
  for_each: azure.securityinsight.incidents.list
  calls:
  - action: actions.list_by_alert_rule
    save_as: response
    on_error: continue
    params:
      workspace_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
