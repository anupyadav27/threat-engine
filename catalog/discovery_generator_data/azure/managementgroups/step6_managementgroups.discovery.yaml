version: '1.0'
provider: azure
service: managementgroups
services:
  client: managementgroups
  module: azure.mgmt.managementgroups
discovery:
- discovery_id: azure.managementgroups.entities.list
  calls:
  - action: entities.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      count: '{{ item.count }}'
- discovery_id: azure.managementgroups.managementgroups.list
  calls:
  - action: managementgroups.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
- discovery_id: azure.managementgroups.hierarchysettings.list
  for_each: azure.managementgroups.managementgroupsubscriptions.get_subscription
  calls:
  - action: hierarchysettings.list
    save_as: response
    on_error: continue
    params:
      group_id: '{{ item.id }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      default_management_group: '{{ item.default_management_group }}'
      require_authorization_for_group_creation: '{{ item.require_authorization_for_group_creation
        }}'
      tenant_id: '{{ item.tenant_id }}'
- discovery_id: azure.managementgroups.managementgroups.get_descendants
  for_each: azure.managementgroups.managementgroupsubscriptions.get_subscription
  calls:
  - action: managementgroups.get_descendants
    save_as: response
    on_error: continue
    params:
      group_id: '{{ item.id }}'
  emit:
    as: item
    item:
      identity: '{{ response.identity }}'
      type: '{{ response.type }}'
      properties: '{{ response.properties }}'
      location: '{{ response.location }}'
      sku: '{{ response.sku }}'
      name: '{{ response.name }}'
      provisioning_state: '{{ response.provisioning_state }}'
      zones: '{{ response.zones }}'
      kind: '{{ response.kind }}'
      id: '{{ response.id }}'
      tags: '{{ response.tags }}'
- discovery_id: azure.managementgroups.managementgroupsubscriptions.get_subscriptions_under_management_group
  for_each: azure.managementgroups.managementgroupsubscriptions.get_subscription
  calls:
  - action: managementgroupsubscriptions.get_subscriptions_under_management_group
    save_as: response
    on_error: continue
    params:
      group_id: '{{ item.id }}'
  emit:
    as: item
    item:
      identity: '{{ response.identity }}'
      type: '{{ response.type }}'
      properties: '{{ response.properties }}'
      location: '{{ response.location }}'
      sku: '{{ response.sku }}'
      name: '{{ response.name }}'
      provisioning_state: '{{ response.provisioning_state }}'
      zones: '{{ response.zones }}'
      kind: '{{ response.kind }}'
      id: '{{ response.id }}'
      tags: '{{ response.tags }}'
- discovery_id: azure.management.list
  calls:
  - action: list
    save_as: list_response
  emit:
    items_for: '{{ list_response.value }}'
    as: item
    item:
      value: '{{ item.value }}'
      count: '{{ item.count }}'
      next_link: '{{ item.next_link }}'
- discovery_id: azure.managementgroup.list
  calls:
  - action: list
    save_as: list_response
  emit:
    items_for: '{{ list_response.value }}'
    as: item
    item:
      value: '{{ item.value }}'
      count: '{{ item.count }}'
      next_link: '{{ item.next_link }}'
