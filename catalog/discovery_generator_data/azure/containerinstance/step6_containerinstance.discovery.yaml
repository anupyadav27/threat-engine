        ip_address_type: '{{ item.ip_address_type }}'
        os_type: '{{ item.os_type }}'
        resource_type: '{{ item.resource_type }}'
  # ── location.list_usage [dependent] ──
  - discovery_id: azure.containerinstance.location.list_usage
    for_each: azure.containerinstance.containergroups.list
    calls:
      - action: location.list_usage
