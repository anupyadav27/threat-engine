version: '1.0'
provider: azure
service: guestconfig
services:
  client: guestconfig
  module: azure.mgmt.guestconfig
discovery:
- discovery_id: azure.guestconfig.guestconfigurationassignments.list_by_subscription
  calls:
  - action: guestconfigurationassignments.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
  uid_template: '{item.id}'
- discovery_id: azure.guestconfig.guestconfigurationassignmentreports.list
  for_each: azure.guestconfig.guestconfigurationassignments.list_by_subscription
  calls:
  - action: guestconfigurationassignmentreports.list
    save_as: response
    on_error: continue
    params:
      guest_configuration_assignment_name: '{{ item.name }}'
      vm_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
- discovery_id: azure.guestconfig.guestconfigurationassignmentreportsvmss.list
  for_each: azure.guestconfig.guestconfigurationassignmentsvmss.list
  calls:
  - action: guestconfigurationassignmentreportsvmss.list
    save_as: response
    on_error: continue
    params:
      vmss_name: '{{ item.name }}'
      name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
- discovery_id: azure.guestconfig.guestconfigurationhcrpassignmentreports.list
  for_each: azure.guestconfig.guestconfigurationhcrpassignments.list
  calls:
  - action: guestconfigurationhcrpassignmentreports.list
    save_as: response
    on_error: continue
    params:
      machine_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
