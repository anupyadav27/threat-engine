version: '1.0'
provider: azure
service: costmanagement
services:
  client: costmanagement
  module: azure.mgmt.costmanagement
discovery:
- discovery_id: azure.costmanagement.scheduledactions.list
  calls:
  - action: scheduledactions.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      accumulated: '{{ item.accumulated }}'
      chart: '{{ item.chart }}'
      created_on: '{{ item.created_on }}'
      currency: '{{ item.currency }}'
      data_set: '{{ item.data_set }}'
      date_range: '{{ item.date_range }}'
      display_name: '{{ item.display_name }}'
      e_tag: '{{ item.e_tag }}'
      include_monetary_commitment: '{{ item.include_monetary_commitment }}'
      kpis: '{{ item.kpis }}'
      metric: '{{ item.metric }}'
      modified_on: '{{ item.modified_on }}'
      pivots: '{{ item.pivots }}'
      scope: '{{ item.scope }}'
      time_period: '{{ item.time_period }}'
      timeframe: '{{ item.timeframe }}'
      type_properties_query_type: '{{ item.type_properties_query_type }}'
  uid_template: '{item.id}'
- discovery_id: azure.costmanagement.views.list
