# Source: step1b_operation_registry.json (qualified ops + dependency chains)
# Actions use {category}.{method} format for SDK method resolution
version: '1.0'
provider: azure
service: confluent
services:
  client: confluent
  module: azure.mgmt.confluent
discovery:
  # ── marketplaceagreements.list [root] ──
  - discovery_id: azure.confluent.marketplaceagreements.list
    calls:
      - action: marketplaceagreements.list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        type: '{{ item.type }}'
        name: '{{ item.name }}'
        id: '{{ item.id }}'
        display: '{{ item.display }}'
        is_data_action: '{{ item.is_data_action }}'
  # ── organization.list [root] ──
  - discovery_id: azure.confluent.organization.list
    calls:
      - action: organization.list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        type: '{{ item.type }}'
        name: '{{ item.name }}'
        id: '{{ item.id }}'
        display: '{{ item.display }}'
        is_data_action: '{{ item.is_data_action }}'
  # ════════════════════════════════════════
  # Dependent operations (for_each + params)
  # ════════════════════════════════════════
  # ── access.list_clusters [dependent] ──
  - discovery_id: azure.confluent.access.list_clusters
    for_each: azure.confluent.access.list_environments
    calls:
      - action: access.list_clusters
        save_as: response
        on_error: continue
        params:
          organization_name: '{{ item.name }}'
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        type: '{{ item.type }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        kind: '{{ item.kind }}'
        id: '{{ item.id }}'
        display_name: '{{ item.display_name }}'
        metadata: '{{ item.metadata }}'
