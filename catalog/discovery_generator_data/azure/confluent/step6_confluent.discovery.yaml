version: '1.0'
provider: azure
service: confluent
services:
  client: confluent
  module: azure.mgmt.confluent
discovery:
- discovery_id: azure.confluent.marketplaceagreements.list
  calls:
  - action: marketplaceagreements.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      display: '{{ item.display }}'
      is_data_action: '{{ item.is_data_action }}'
  uid_template: '{item.id}'
- discovery_id: azure.confluent.organization.list
  calls:
  - action: organization.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      display: '{{ item.display }}'
      is_data_action: '{{ item.is_data_action }}'
  uid_template: '{item.id}'
- discovery_id: azure.confluent.access.list_clusters
  for_each: azure.confluent.access.list_environments
  calls:
  - action: access.list_clusters
    save_as: response
    on_error: continue
    params:
      organization_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      display_name: '{{ item.display_name }}'
      metadata: '{{ item.metadata }}'
      spec: '{{ item.spec }}'
- discovery_id: azure.confluent.access.list_invitations
  for_each: azure.confluent.access.list_environments
  calls:
  - action: access.list_invitations
    save_as: response
    on_error: continue
    params:
      organization_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      accepted_at: '{{ item.accepted_at }}'
      auth_type: '{{ item.auth_type }}'
      email: '{{ item.email }}'
      expires_at: '{{ item.expires_at }}'
      metadata: '{{ item.metadata }}'
- discovery_id: azure.confluent.access.list_role_binding_name_list
  for_each: azure.confluent.access.list_environments
  calls:
  - action: access.list_role_binding_name_list
    save_as: response
    on_error: continue
    params:
      organization_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
- discovery_id: azure.confluent.access.list_role_bindings
  for_each: azure.confluent.access.list_environments
  calls:
  - action: access.list_role_bindings
    save_as: response
    on_error: continue
    params:
      organization_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      crn_pattern: '{{ item.crn_pattern }}'
      metadata: '{{ item.metadata }}'
      principal: '{{ item.principal }}'
      role_name: '{{ item.role_name }}'
- discovery_id: azure.confluent.access.list_service_accounts
  for_each: azure.confluent.access.list_environments
  calls:
  - action: access.list_service_accounts
    save_as: response
    on_error: continue
    params:
      organization_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      description: '{{ item.description }}'
      display_name: '{{ item.display_name }}'
      metadata: '{{ item.metadata }}'
- discovery_id: azure.confluent.access.list_users
  for_each: azure.confluent.access.list_environments
  calls:
  - action: access.list_users
    save_as: response
    on_error: continue
    params:
      organization_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      auth_type: '{{ item.auth_type }}'
      email: '{{ item.email }}'
      full_name: '{{ item.full_name }}'
      metadata: '{{ item.metadata }}'
