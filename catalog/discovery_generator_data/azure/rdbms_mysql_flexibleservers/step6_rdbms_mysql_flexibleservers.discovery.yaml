version: '1.0'
provider: azure
service: rdbms_mysql_flexibleservers
services:
  client: rdbms_mysql_flexibleservers
  module: azure.mgmt.rdbms.mysql_flexibleservers
discovery:
- discovery_id: azure.rdbms_mysql_flexibleservers.servers.list
  calls:
  - action: servers.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      administrator_login: '{{ item.administrator_login }}'
      administrator_login_password: '{{ item.administrator_login_password }}'
      availability_zone: '{{ item.availability_zone }}'
      backup: '{{ item.backup }}'
      create_mode: '{{ item.create_mode }}'
      data_encryption: '{{ item.data_encryption }}'
      fully_qualified_domain_name: '{{ item.fully_qualified_domain_name }}'
      high_availability: '{{ item.high_availability }}'
      maintenance_window: '{{ item.maintenance_window }}'
      network: '{{ item.network }}'
      replica_capacity: '{{ item.replica_capacity }}'
      replication_role: '{{ item.replication_role }}'
      restore_point_in_time: '{{ item.restore_point_in_time }}'
      source_server_resource_id: '{{ item.source_server_resource_id }}'
      state: '{{ item.state }}'
      storage: '{{ item.storage }}'
      system_data: '{{ item.system_data }}'
      version: '{{ item.version }}'
  uid_template: '{item.id}'
