version: '1.0'
provider: azure
service: securitycenter
discovery:
- discovery_id: azure.securitycenter.list
  calls:
  - action: alerts.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      properties: '{{ item.properties }}'
  uid_template: '{item.id}'
