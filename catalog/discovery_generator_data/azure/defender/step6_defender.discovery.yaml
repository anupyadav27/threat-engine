version: '1.0'
provider: azure
service: defender
discovery:
- discovery_id: azure.compute.virtualmachines.list
  calls:
  - action: virtualmachines.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      system_data: '{{ item.system_data }}'
      tags: '{{ item.tags }}'
      location: '{{ item.location }}'
      plan: '{{ item.plan }}'
      resources: '{{ item.resources }}'
      identity: '{{ item.identity }}'
      zones: '{{ item.zones }}'
      extended_location: '{{ item.extended_location }}'
      managed_by: '{{ item.managed_by }}'
      etag: '{{ item.etag }}'
      placement: '{{ item.placement }}'
      hardware_profile: '{{ item.hardware_profile }}'
      scheduled_events_policy: '{{ item.scheduled_events_policy }}'
      storage_profile: '{{ item.storage_profile }}'
      additional_capabilities: '{{ item.additional_capabilities }}'
      os_profile: '{{ item.os_profile }}'
      network_profile: '{{ item.network_profile }}'
      security_profile: '{{ item.security_profile }}'
      diagnostics_profile: '{{ item.diagnostics_profile }}'
      availability_set: '{{ item.availability_set }}'
      virtual_machine_scale_set: '{{ item.virtual_machine_scale_set }}'
      proximity_placement_group: '{{ item.proximity_placement_group }}'
      priority: '{{ item.priority }}'
      eviction_policy: '{{ item.eviction_policy }}'
      billing_profile: '{{ item.billing_profile }}'
      host: '{{ item.host }}'
      host_group: '{{ item.host_group }}'
      provisioning_state: '{{ item.provisioning_state }}'
      instance_view: '{{ item.instance_view }}'
      license_type: '{{ item.license_type }}'
      vm_id: '{{ item.vm_id }}'
      extensions_time_budget: '{{ item.extensions_time_budget }}'
      platform_fault_domain: '{{ item.platform_fault_domain }}'
      scheduled_events_profile: '{{ item.scheduled_events_profile }}'
      user_data: '{{ item.user_data }}'
      capacity_reservation: '{{ item.capacity_reservation }}'
      application_profile: '{{ item.application_profile }}'
      time_created: '{{ item.time_created }}'
  uid_template: '{item.id}'
- discovery_id: azure.security.tasks.list
  calls:
  - action: tasks.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      state: '{{ item.state }}'
      creation_time_utc: '{{ item.creation_time_utc }}'
      security_task_parameters: '{{ item.security_task_parameters }}'
      last_state_change_time_utc: '{{ item.last_state_change_time_utc }}'
      sub_state: '{{ item.sub_state }}'
  uid_template: '{item.id}'
