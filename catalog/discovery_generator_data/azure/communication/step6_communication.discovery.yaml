version: '1.0'
provider: azure
service: communication
services:
  client: communication
  module: azure.mgmt.communication
discovery:
- discovery_id: azure.communication.communicationservices.list_by_resource_group
  calls:
  - action: communicationservices.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      data_location: '{{ item.data_location }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.communication.communicationservices.list_by_subscription
  calls:
  - action: communicationservices.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      data_location: '{{ item.data_location }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.communication.emailservices.list_by_resource_group
  calls:
  - action: emailservices.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      data_location: '{{ item.data_location }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.communication.emailservices.list_by_subscription
  calls:
  - action: emailservices.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      data_location: '{{ item.data_location }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.communication.emailservices.list_verified_exchange_online_domains
  calls:
  - action: emailservices.list_verified_exchange_online_domains
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.id}'
- discovery_id: azure.communication.communicationservices.list_keys
  for_each: azure.communication.communicationservices.list_by_subscription
  calls:
  - action: communicationservices.list_keys
    save_as: response
    on_error: continue
    params:
      communication_service_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
- discovery_id: azure.communication.domains.list_by_email_service_resource
  for_each: azure.communication.emailservices.list_by_subscription
  calls:
  - action: domains.list_by_email_service_resource
    save_as: response
    on_error: continue
    params:
      email_service_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      data_location: '{{ item.data_location }}'
      domain_management: '{{ item.domain_management }}'
      from_sender_domain: '{{ item.from_sender_domain }}'
      mail_from_sender_domain: '{{ item.mail_from_sender_domain }}'
      system_data: '{{ item.system_data }}'
      user_engagement_tracking: '{{ item.user_engagement_tracking }}'
      verification_records: '{{ item.verification_records }}'
      verification_states: '{{ item.verification_states }}'
- discovery_id: azure.communication.senderusernames.list_by_domains
  for_each: azure.communication.emailservices.list_by_subscription
  calls:
  - action: senderusernames.list_by_domains
    save_as: response
    on_error: continue
    params:
      email_service_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      data_location: '{{ item.data_location }}'
      display_name: '{{ item.display_name }}'
      system_data: '{{ item.system_data }}'
      username: '{{ item.username }}'
