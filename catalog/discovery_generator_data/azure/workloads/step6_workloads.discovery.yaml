version: '1.0'
provider: azure
service: workloads
services:
  client: workloads
  module: azure.mgmt.workloads
discovery:
- discovery_id: azure.workloads.monitors.list
  calls:
  - action: monitors.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      grouping: '{{ item.grouping }}'
      system_data: '{{ item.system_data }}'
      top_metrics_thresholds: '{{ item.top_metrics_thresholds }}'
  uid_template: '{item.id}'
- discovery_id: azure.workloads.monitors.list_by_resource_group
  calls:
  - action: monitors.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      status: '{{ item.status }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      configuration: '{{ item.configuration }}'
      environment: '{{ item.environment }}'
      errors: '{{ item.errors }}'
      health: '{{ item.health }}'
      managed_resource_group_configuration: '{{ item.managed_resource_group_configuration
        }}'
      sap_product: '{{ item.sap_product }}'
      state: '{{ item.state }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.workloads.sapvirtualinstances.list_by_resource_group
  calls:
  - action: sapvirtualinstances.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      status: '{{ item.status }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      configuration: '{{ item.configuration }}'
      environment: '{{ item.environment }}'
      errors: '{{ item.errors }}'
      health: '{{ item.health }}'
      managed_resource_group_configuration: '{{ item.managed_resource_group_configuration
        }}'
      sap_product: '{{ item.sap_product }}'
      state: '{{ item.state }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.workloads.sapvirtualinstances.list_by_subscription
  calls:
  - action: sapvirtualinstances.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      status: '{{ item.status }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      configuration: '{{ item.configuration }}'
      environment: '{{ item.environment }}'
      errors: '{{ item.errors }}'
      health: '{{ item.health }}'
      managed_resource_group_configuration: '{{ item.managed_resource_group_configuration
        }}'
      sap_product: '{{ item.sap_product }}'
      state: '{{ item.state }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.workloads.providerinstances.list
  for_each: azure.workloads.monitors.list
  calls:
  - action: providerinstances.list
    save_as: response
    on_error: continue
    params:
      monitor_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      grouping: '{{ item.grouping }}'
      system_data: '{{ item.system_data }}'
      top_metrics_thresholds: '{{ item.top_metrics_thresholds }}'
- discovery_id: azure.workloads.sapapplicationserverinstances.list
  for_each: azure.workloads.sapvirtualinstances.list_by_subscription
  calls:
  - action: sapapplicationserverinstances.list
    save_as: response
    on_error: continue
