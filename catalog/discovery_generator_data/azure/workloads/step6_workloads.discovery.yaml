      top_metrics_thresholds: '{{ item.top_metrics_thresholds }}'
- discovery_id: azure.workloads.saplandscapemonitor.list
  for_each: azure.workloads.monitors.list
  calls:
  - action: saplandscapemonitor.list
    save_as: response
    on_error: continue
    params:
      monitor_name: '{{ item.name }}'
  emit:
    as: item
