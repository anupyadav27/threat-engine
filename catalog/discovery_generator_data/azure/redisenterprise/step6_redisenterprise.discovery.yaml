version: '1.0'
provider: azure
service: redisenterprise
services:
  client: redisenterprise
  module: azure.mgmt.redisenterprise
discovery:
- discovery_id: azure.redisenterprise.redisenterprise.list
  calls:
  - action: redisenterprise.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      access_policy_name: '{{ item.access_policy_name }}'
      user: '{{ item.user }}'
  uid_template: '{item.id}'
- discovery_id: azure.redisenterprise.redisenterprise.list_by_resource_group
  calls:
  - action: redisenterprise.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      public_network_access: '{{ item.public_network_access }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      minimum_tls_version: '{{ item.minimum_tls_version }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      encryption: '{{ item.encryption }}'
      tags: '{{ item.tags }}'
      high_availability: '{{ item.high_availability }}'
      host_name: '{{ item.host_name }}'
      private_endpoint_connections: '{{ item.private_endpoint_connections }}'
      redis_version: '{{ item.redis_version }}'
      redundancy_mode: '{{ item.redundancy_mode }}'
      resource_state: '{{ item.resource_state }}'
  uid_template: '{item.id}'
- discovery_id: azure.redisenterprise.accesspolicyassignment.list
  for_each: azure.redisenterprise.redisenterprise.list
  calls:
  - action: accesspolicyassignment.list
    save_as: response
    on_error: continue
    params:
      cluster_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      access_policy_name: '{{ item.access_policy_name }}'
      user: '{{ item.user }}'
- discovery_id: azure.redisenterprise.databases.list_by_cluster
  for_each: azure.redisenterprise.redisenterprise.list
  calls:
  - action: databases.list_by_cluster
    save_as: response
    on_error: continue
    params:
      cluster_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      group_id: '{{ item.group_id }}'
      required_members: '{{ item.required_members }}'
      required_zone_names: '{{ item.required_zone_names }}'
- discovery_id: azure.redisenterprise.databases.list_keys
  for_each: azure.redisenterprise.redisenterprise.list
  calls:
  - action: databases.list_keys
    save_as: response
    on_error: continue
    params:
      cluster_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
- discovery_id: azure.redisenterprise.privateendpointconnections.list
  for_each: azure.redisenterprise.redisenterprise.list
  calls:
  - action: privateendpointconnections.list
    save_as: response
    on_error: continue
    params:
      cluster_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      access_policy_name: '{{ item.access_policy_name }}'
      user: '{{ item.user }}'
- discovery_id: azure.redisenterprise.privatelinkresources.list_by_cluster
  for_each: azure.redisenterprise.redisenterprise.list
  calls:
  - action: privatelinkresources.list_by_cluster
    save_as: response
    on_error: continue
    params:
      cluster_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      group_id: '{{ item.group_id }}'
      required_members: '{{ item.required_members }}'
      required_zone_names: '{{ item.required_zone_names }}'
- discovery_id: azure.redisenterprise.redisenterprise.list_skus_for_scaling
  for_each: azure.redisenterprise.redisenterprise.list
  calls:
  - action: redisenterprise.list_skus_for_scaling
    save_as: response
    on_error: continue
    params:
      cluster_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
