version: '1.0'
provider: azure
service: recoveryservicesbackup
services:
  client: recoveryservicesbackup
  module: azure.mgmt.recoveryservicesbackup
discovery:
- discovery_id: azure.recoveryservicesbackup.backupengines.list
  for_each: azure.recoveryservicesbackup.backupjobs.list
  calls:
  - action: backupengines.list
    save_as: response
    on_error: continue
    params:
      vault_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      e_tag: '{{ item.e_tag }}'
