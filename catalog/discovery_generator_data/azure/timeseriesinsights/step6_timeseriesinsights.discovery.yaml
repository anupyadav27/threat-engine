version: '1.0'
provider: azure
service: timeseriesinsights
services:
  client: timeseriesinsights
  module: azure.mgmt.timeseriesinsights
discovery:
- discovery_id: azure.timeseriesinsights.environments.list_by_resource_group
  calls:
  - action: environments.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.id}'
- discovery_id: azure.timeseriesinsights.environments.list_by_subscription
  calls:
  - action: environments.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.id}'
- discovery_id: azure.timeseriesinsights.accesspolicies.list_by_environment
  for_each: azure.timeseriesinsights.environments.list_by_subscription
  calls:
  - action: accesspolicies.list_by_environment
    save_as: response
    on_error: continue
    params:
      environment_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      creation_time: '{{ item.creation_time }}'
      data_string_comparison_behavior: '{{ item.data_string_comparison_behavior }}'
      key_properties: '{{ item.key_properties }}'
- discovery_id: azure.timeseriesinsights.eventsources.list_by_environment
  for_each: azure.timeseriesinsights.environments.list_by_subscription
  calls:
  - action: eventsources.list_by_environment
    save_as: response
    on_error: continue
    params:
      environment_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      creation_time: '{{ item.creation_time }}'
      data_string_comparison_behavior: '{{ item.data_string_comparison_behavior }}'
      key_properties: '{{ item.key_properties }}'
- discovery_id: azure.timeseriesinsights.referencedatasets.list_by_environment
  for_each: azure.timeseriesinsights.environments.list_by_subscription
  calls:
  - action: referencedatasets.list_by_environment
    save_as: response
    on_error: continue
    params:
      environment_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      creation_time: '{{ item.creation_time }}'
      data_string_comparison_behavior: '{{ item.data_string_comparison_behavior }}'
      key_properties: '{{ item.key_properties }}'
