version: '1.0'
provider: azure
service: automation
services:
  client: automation
  module: azure.mgmt.automation
discovery:
- discovery_id: azure.automation.automationaccount.list
  calls:
  - action: automationaccount.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      creation_time: '{{ item.creation_time }}'
      frequency: '{{ item.frequency }}'
      last_modified_time: '{{ item.last_modified_time }}'
      next_run: '{{ item.next_run }}'
      start_time: '{{ item.start_time }}'
      update_configuration: '{{ item.update_configuration }}'
  uid_template: '{item.id}'
- discovery_id: azure.automation.automationaccount.list_by_resource_group
