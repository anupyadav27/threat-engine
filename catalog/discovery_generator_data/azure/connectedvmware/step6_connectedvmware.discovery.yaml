version: '1.0'
provider: azure
service: connectedvmware
services:
  client: connectedvmware
  module: azure.mgmt.connectedvmware
discovery:
- discovery_id: azure.connectedvmware.clusters.clusters_list
  calls:
  - action: clusters.Clusters_List
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.id}'
