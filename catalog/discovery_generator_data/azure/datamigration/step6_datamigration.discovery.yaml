  - action: sqlmigrationservices.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      integration_runtime_state: '{{ item.integration_runtime_state }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.datamigration.sqlmigrationservices.list_by_subscription
  calls:
  - action: sqlmigrationservices.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      integration_runtime_state: '{{ item.integration_runtime_state }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.datamigration.databasemigrationsmongotocosmosdbrumongo.get_for_scope
  for_each: azure.datamigration.databasemigrationsmongotocosmosdbvcoremongo.get_for_scope
  calls:
  - action: databasemigrationsmongotocosmosdbrumongo.get_for_scope
    save_as: response
    on_error: continue
    params:
      target_resource_name: '{{ item.name }}'
  emit:
    as: item
    item:
      type: '{{ response.type }}'
      name: '{{ response.name }}'
      provisioning_state: '{{ response.provisioning_state }}'
      kind: '{{ response.kind }}'
      id: '{{ response.id }}'
      collection_list: '{{ response.collection_list }}'
      ended_on: '{{ response.ended_on }}'
      migration_failure_error: '{{ response.migration_failure_error }}'
      migration_operation_id: '{{ response.migration_operation_id }}'
      migration_service: '{{ response.migration_service }}'
      migration_status: '{{ response.migration_status }}'
      provisioning_error: '{{ response.provisioning_error }}'
      scope: '{{ response.scope }}'
      source_mongo_connection: '{{ response.source_mongo_connection }}'
      started_on: '{{ response.started_on }}'
      system_data: '{{ response.system_data }}'
      target_mongo_connection: '{{ response.target_mongo_connection }}'
- discovery_id: azure.datamigration.files.list
  for_each: azure.datamigration.services.list
  calls:
  - action: files.list
    save_as: response
    on_error: continue
    params:
      group_name: '{{ item.name }}'
