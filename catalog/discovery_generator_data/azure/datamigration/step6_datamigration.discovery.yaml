version: '1.0'
provider: azure
service: datamigration
services:
  client: datamigration
  module: azure.mgmt.datamigration
discovery:
- discovery_id: azure.datamigration.migrationservices.list_by_resource_group
  calls:
  - action: migrationservices.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      integration_runtime_state: '{{ item.integration_runtime_state }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.datamigration.migrationservices.list_by_subscription
  calls:
  - action: migrationservices.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      integration_runtime_state: '{{ item.integration_runtime_state }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.datamigration.resourceskus.list_skus
