version: '1.0'
provider: azure
service: storagemover
services:
  client: storagemover
  module: azure.mgmt.storagemover
discovery:
- discovery_id: azure.storagemover.storagemovers.list
  calls:
  - action: storagemovers.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
  uid_template: '{item.id}'
- discovery_id: azure.storagemover.storagemovers.list_by_subscription
  calls:
  - action: storagemovers.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
  uid_template: '{item.id}'
- discovery_id: azure.storagemover.agents.list
  for_each: azure.storagemover.storagemovers.list_by_subscription
  calls:
  - action: agents.list
    save_as: response
    on_error: continue
    params:
      storage_mover_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
- discovery_id: azure.storagemover.endpoints.list
  for_each: azure.storagemover.storagemovers.list_by_subscription
  calls:
  - action: endpoints.list
    save_as: response
    on_error: continue
    params:
      storage_mover_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
- discovery_id: azure.storagemover.jobdefinitions.list
  for_each: azure.storagemover.storagemovers.list_by_subscription
  calls:
  - action: jobdefinitions.list
    save_as: response
    on_error: continue
    params:
      storage_mover_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
- discovery_id: azure.storagemover.jobruns.list
  for_each: azure.storagemover.storagemovers.list_by_subscription
  calls:
  - action: jobruns.list
    save_as: response
    on_error: continue
    params:
      storage_mover_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
- discovery_id: azure.storagemover.projects.list
  for_each: azure.storagemover.storagemovers.list_by_subscription
  calls:
  - action: projects.list
    save_as: response
    on_error: continue
    params:
      storage_mover_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
