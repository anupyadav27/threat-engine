version: '1.0'
provider: azure
service: logz
services:
  client: logz
  module: azure.mgmt.logz
discovery:
- discovery_id: azure.logz.monitors.list_by_resource_group
  calls:
  - action: monitors.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.logz.monitors.list_by_subscription
  calls:
  - action: monitors.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.logz.monitor.list_vm_host_update
  for_each: azure.logz.monitors.list_by_subscription
  calls:
  - action: monitor.list_vm_host_update
    save_as: response
    on_error: continue
    params:
      monitor_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      agent_version: '{{ item.agent_version }}'
- discovery_id: azure.logz.monitor.list_vm_hosts
  for_each: azure.logz.monitors.list_by_subscription
