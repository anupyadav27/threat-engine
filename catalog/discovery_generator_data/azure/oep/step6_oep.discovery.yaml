# Discovery YAML — oep (Azure)
# Generated: 2026-04-15T10:39:31Z
# Source: step1b_operation_registry.json (qualified ops + dependency chains)
# Actions use {category}.{method} format for SDK method resolution
version: '1.0'
provider: azure
service: oep
services:
  client: oep
  module: azure.mgmt.oep
discovery:
  # ── energyservices.list_by_resource_group [root] ──
  - discovery_id: azure.oep.energyservices.list_by_resource_group
    calls:
      - action: energyservices.list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        id: '{{ item.id }}'
        tags: '{{ item.tags }}'
        system_data: '{{ item.system_data }}'
  # ── energyservices.list_by_subscription [root] ──
  - discovery_id: azure.oep.energyservices.list_by_subscription
    calls:
      - action: energyservices.list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        id: '{{ item.id }}'
        tags: '{{ item.tags }}'
        system_data: '{{ item.system_data }}'
  # ════════════════════════════════════════
  # Dependent operations (for_each + params)
  # ════════════════════════════════════════
  # ── energyservices.list_partitions [dependent] ──
  - discovery_id: azure.oep.energyservices.list_partitions
    for_each: azure.oep.energyservices.list_by_subscription
    calls:
      - action: energyservices.list_partitions
        save_as: response
        on_error: continue
        params:
          resource_name: '{{ item.name }}'
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        identity: '{{ item.identity }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        location: '{{ item.location }}'
        sku: '{{ item.sku }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        zones: '{{ item.zones }}'
        kind: '{{ item.kind }}'
        id: '{{ item.id }}'
        tags: '{{ item.tags }}'
