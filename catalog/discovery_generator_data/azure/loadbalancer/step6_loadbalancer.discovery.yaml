version: '1.0'
provider: azure
service: loadbalancer
discovery:
- discovery_id: azure.network.loadbalancers.list_all
  calls:
  - action: loadbalancers.list_all
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      extended_location: '{{ item.extended_location }}'
      sku: '{{ item.sku }}'
      etag: '{{ item.etag }}'
      frontend_ip_configurations: '{{ item.frontend_ip_configurations }}'
      backend_address_pools: '{{ item.backend_address_pools }}'
      load_balancing_rules: '{{ item.load_balancing_rules }}'
      probes: '{{ item.probes }}'
      inbound_nat_rules: '{{ item.inbound_nat_rules }}'
      inbound_nat_pools: '{{ item.inbound_nat_pools }}'
      outbound_rules: '{{ item.outbound_rules }}'
      resource_guid: '{{ item.resource_guid }}'
      provisioning_state: '{{ item.provisioning_state }}'
      scope: '{{ item.scope }}'
  uid_template: '{item.id}'
