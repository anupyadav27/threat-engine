version: '1.0'
provider: azure
service: disk
discovery:
- discovery_id: azure.compute.disks.list
  calls:
  - action: disks.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      system_data: '{{ item.system_data }}'
      tags: '{{ item.tags }}'
      location: '{{ item.location }}'
      managed_by: '{{ item.managed_by }}'
      managed_by_extended: '{{ item.managed_by_extended }}'
      sku: '{{ item.sku }}'
      zones: '{{ item.zones }}'
      extended_location: '{{ item.extended_location }}'
      time_created: '{{ item.time_created }}'
      os_type: '{{ item.os_type }}'
      hyper_v_generation: '{{ item.hyper_v_generation }}'
      purchase_plan: '{{ item.purchase_plan }}'
      supported_capabilities: '{{ item.supported_capabilities }}'
      creation_data: '{{ item.creation_data }}'
      disk_size_gb: '{{ item.disk_size_gb }}'
      disk_size_bytes: '{{ item.disk_size_bytes }}'
      unique_id: '{{ item.unique_id }}'
      encryption_settings_collection: '{{ item.encryption_settings_collection }}'
      provisioning_state: '{{ item.provisioning_state }}'
      disk_iops_read_write: '{{ item.disk_iops_read_write }}'
      disk_m_bps_read_write: '{{ item.disk_m_bps_read_write }}'
      disk_iops_read_only: '{{ item.disk_iops_read_only }}'
      disk_m_bps_read_only: '{{ item.disk_m_bps_read_only }}'
      disk_state: '{{ item.disk_state }}'
      encryption: '{{ item.encryption }}'
      max_shares: '{{ item.max_shares }}'
      share_info: '{{ item.share_info }}'
      network_access_policy: '{{ item.network_access_policy }}'
      disk_access_id: '{{ item.disk_access_id }}'
      bursting_enabled_time: '{{ item.bursting_enabled_time }}'
      tier: '{{ item.tier }}'
      bursting_enabled: '{{ item.bursting_enabled }}'
      property_updates_in_progress: '{{ item.property_updates_in_progress }}'
      supports_hibernation: '{{ item.supports_hibernation }}'
      security_profile: '{{ item.security_profile }}'
      completion_percent: '{{ item.completion_percent }}'
      public_network_access: '{{ item.public_network_access }}'
      data_access_auth_mode: '{{ item.data_access_auth_mode }}'
      optimized_for_frequent_attach: '{{ item.optimized_for_frequent_attach }}'
      last_ownership_update_time: '{{ item.last_ownership_update_time }}'
      availability_policy: '{{ item.availability_policy }}'
