# Discovery YAML — reservations (Azure)
# Generated: 2026-04-15T10:39:31Z
# Source: step1b_operation_registry.json (qualified ops + dependency chains)
# Actions use {category}.{method} format for SDK method resolution
version: '1.0'
provider: azure
service: reservations
services:
  client: reservations
  module: azure.mgmt.reservations
discovery:
  # ── azurereservationapimixin.get_applied_reservation_list [root] ──
  - discovery_id: azure.reservations.azurereservationapimixin.get_applied_reservation_list
    calls:
      - action: azurereservationapimixin.get_applied_reservation_list
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        identity: '{{ response.identity }}'
        type: '{{ response.type }}'
        properties: '{{ response.properties }}'
        location: '{{ response.location }}'
        sku: '{{ response.sku }}'
        name: '{{ response.name }}'
        provisioning_state: '{{ response.provisioning_state }}'
        zones: '{{ response.zones }}'
        kind: '{{ response.kind }}'
        id: '{{ response.id }}'
        tags: '{{ response.tags }}'
  # ── azurereservationapimixin.get_catalog [root] ──
  - discovery_id: azure.reservations.azurereservationapimixin.get_catalog
    calls:
      - action: azurereservationapimixin.get_catalog
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        name: '{{ response.name }}'
        billing_plans: '{{ response.billing_plans }}'
        capabilities: '{{ response.capabilities }}'
        locations: '{{ response.locations }}'
        msrp: '{{ response.msrp }}'
        resource_type: '{{ response.resource_type }}'
        restrictions: '{{ response.restrictions }}'
        size: '{{ response.size }}'
        sku_properties: '{{ response.sku_properties }}'
        terms: '{{ response.terms }}'
        tier: '{{ response.tier }}'
  # ── operation.list [root] ──
  - discovery_id: azure.reservations.operation.list
    calls:
      - action: operation.list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        type: '{{ item.type }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        id: '{{ item.id }}'
        message: '{{ item.message }}'
        request_submit_time: '{{ item.request_submit_time }}'
  # ── reservation.list_all [root] ──
  - discovery_id: azure.reservations.reservation.list_all
    calls:
      - action: reservation.list_all
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        location: '{{ item.location }}'
        sku: '{{ item.sku }}'
        name: '{{ item.name }}'
        kind: '{{ item.kind }}'
        id: '{{ item.id }}'
        etag: '{{ item.etag }}'
        system_data: '{{ item.system_data }}'
  # ── reservationorder.list [root] ──
  - discovery_id: azure.reservations.reservationorder.list
    calls:
      - action: reservationorder.list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        type: '{{ item.type }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        id: '{{ item.id }}'
        message: '{{ item.message }}'
        request_submit_time: '{{ item.request_submit_time }}'
  # ════════════════════════════════════════
  # Dependent operations (for_each + params)
  # ════════════════════════════════════════
  # ── quota.list [dependent] ──
  - discovery_id: azure.reservations.quota.list
    for_each: azure.reservations.quotarequeststatus.list
    calls:
      - action: quota.list
        save_as: response
        on_error: continue
        params:
          provider_id: '{{ item.id }}'
          location: '{{ item.location }}'
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        type: '{{ item.type }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        id: '{{ item.id }}'
        message: '{{ item.message }}'
        request_submit_time: '{{ item.request_submit_time }}'
  # ── reservation.list [dependent] ──
  - discovery_id: azure.reservations.reservation.list
    for_each: azure.reservations.reservation.list_all
    calls:
      - action: reservation.list
        save_as: response
        on_error: continue
        params:
          reservation_order_id: '{{ item.id }}'
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        type: '{{ item.type }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        id: '{{ item.id }}'
        message: '{{ item.message }}'
        request_submit_time: '{{ item.request_submit_time }}'
  # ── reservation.list_revisions [dependent] ──
  - discovery_id: azure.reservations.reservation.list_revisions
    for_each: azure.reservations.reservation.list_all
    calls:
      - action: reservation.list_revisions
        save_as: response
        on_error: continue
        params:
          reservation_order_id: '{{ item.id }}'
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        location: '{{ item.location }}'
        sku: '{{ item.sku }}'
        name: '{{ item.name }}'
        kind: '{{ item.kind }}'
        id: '{{ item.id }}'
        etag: '{{ item.etag }}'
        system_data: '{{ item.system_data }}'

  # ── Unwired dependent ops (no root producer found) ──
  # SKIP: azure.reservations.quotarequeststatus.list — required_params: ['provider_id', 'location']
