version: '1.0'
provider: azure
service: hdinsightcontainers
services:
  client: hdinsightcontainers
  module: azure.mgmt.hdinsightcontainers
discovery:
- discovery_id: azure.hdinsightcontainers.clusterpools.list_by_resource_group
  calls:
  - action: clusterpools.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.hdinsightcontainers.clusterpools.list_by_subscription
  calls:
  - action: clusterpools.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.hdinsightcontainers.clusteravailableupgrades.list
  for_each: azure.hdinsightcontainers.clusterpools.list_by_subscription
  calls:
  - action: clusteravailableupgrades.list
    save_as: response
    on_error: continue
    params:
      cluster_pool_name: '{{ item.name }}'
      cluster_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      system_data: '{{ item.system_data }}'
- discovery_id: azure.hdinsightcontainers.clusterjobs.list
