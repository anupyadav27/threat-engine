version: '1.0'
provider: azure
service: kusto
services:
  client: kusto
  module: azure.mgmt.kusto
discovery:
- discovery_id: azure.kusto.clusters.list
  calls:
  - action: clusters.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      principal_id: '{{ item.principal_id }}'
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      aad_object_id: '{{ item.aad_object_id }}'
      principal_name: '{{ item.principal_name }}'
      principal_type: '{{ item.principal_type }}'
      role: '{{ item.role }}'
      tenant_id: '{{ item.tenant_id }}'
      tenant_name: '{{ item.tenant_name }}'
- discovery_id: azure.kusto.clusters.list_by_resource_group
  calls:
  - action: clusters.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      public_network_access: '{{ item.public_network_access }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      accepted_audiences: '{{ item.accepted_audiences }}'
      allowed_fqdn_list: '{{ item.allowed_fqdn_list }}'
      allowed_ip_range_list: '{{ item.allowed_ip_range_list }}'
      callout_policies: '{{ item.callout_policies }}'
      data_ingestion_uri: '{{ item.data_ingestion_uri }}'
      enable_auto_stop: '{{ item.enable_auto_stop }}'
      enable_disk_encryption: '{{ item.enable_disk_encryption }}'
      enable_double_encryption: '{{ item.enable_double_encryption }}'
      enable_purge: '{{ item.enable_purge }}'
      enable_streaming_ingest: '{{ item.enable_streaming_ingest }}'
      engine_type: '{{ item.engine_type }}'
      etag: '{{ item.etag }}'
      key_vault_properties: '{{ item.key_vault_properties }}'
      language_extensions: '{{ item.language_extensions }}'
      migration_cluster: '{{ item.migration_cluster }}'
      optimized_autoscale: '{{ item.optimized_autoscale }}'
      private_endpoint_connections: '{{ item.private_endpoint_connections }}'
      public_ip_type: '{{ item.public_ip_type }}'
      restrict_outbound_network_access: '{{ item.restrict_outbound_network_access
        }}'
      state: '{{ item.state }}'
      state_reason: '{{ item.state_reason }}'
      system_data: '{{ item.system_data }}'
      trusted_external_tenants: '{{ item.trusted_external_tenants }}'
      uri: '{{ item.uri }}'
      virtual_cluster_graduation_properties: '{{ item.virtual_cluster_graduation_properties
        }}'
      virtual_network_configuration: '{{ item.virtual_network_configuration }}'
      zone_status: '{{ item.zone_status }}'
