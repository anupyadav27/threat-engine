version: '1.0'
provider: azure
service: iam
discovery:
- _stub: true
  discovery_id: azure.iam.list_iams
  _note: STUB — generated by step2, needs real SDK review for azure.iam
  _rules:
  - azure.iam.role.least_privilege_enforced
  - azure.iam.role.wildcard_action_configured
  _client: azure_iam_client
  calls:
  - action: ListResources
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      id: '{{ item.Id }}'
      name: '{{ item.Name }}'
      resource_type: '''{{ resource_type }}'''
      region: '{{ region }}'
      encrypted: '{{ item.Encrypted }}'
      kms_key_id: '{{ item.KMSKeyId }}'
      status: '{{ item.Status }}'
      enabled: '{{ item.Enabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      internet_facing: '{{ item.InternetFacing }}'
      public_ip_address: '{{ item.PublicIpAddress }}'
      tags: '{{ item.Tags }}'
      permissions: '{{ item.Permissions }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      retention_days: '{{ item.RetentionDays }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
- discovery_id: azure.authorization.roleassignments.list
  calls:
  - action: roleassignments.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      scope: '{{ item.scope }}'
      role_definition_id: '{{ item.role_definition_id }}'
      principal_id: '{{ item.principal_id }}'
      can_delegate: '{{ item.can_delegate }}'
- discovery_id: azure.authorization.roledefinitions.list
  calls:
  - action: roledefinitions.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      role_name: '{{ item.role_name }}'
      description: '{{ item.description }}'
      role_type: '{{ item.role_type }}'
      permissions: '{{ item.permissions }}'
      assignable_scopes: '{{ item.assignable_scopes }}'
- discovery_id: azure.iam.list_users
  calls:
  - action: users.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      userPrincipalName: '{{ item.userPrincipalName }}'
      accountEnabled: '{{ item.accountEnabled }}'
      mfaEnabled: '{{ item.mfaEnabled }}'
      assignedRoles: '{{ item.assignedRoles }}'
      Properties: '{{ item.Properties }}'
- discovery_id: azure.aad.list_aads
  calls:
  - action: ListResources
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      id: '{{ item.Id }}'
      name: '{{ item.Name }}'
      resource_type: '''{{ resource_type }}'''
      region: '{{ region }}'
      encrypted: '{{ item.Encrypted }}'
      kms_key_id: '{{ item.KMSKeyId }}'
      status: '{{ item.Status }}'
      enabled: '{{ item.Enabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      internet_facing: '{{ item.InternetFacing }}'
      public_ip_address: '{{ item.PublicIpAddress }}'
      tags: '{{ item.Tags }}'
      permissions: '{{ item.Permissions }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      retention_days: '{{ item.RetentionDays }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
  _used_by_rules:
  - azure.aad.password_policy.hide_feedback_configured
  - azure.aad.user.account_management_enabled
  - azure.aad.user.allow_guest_invites_restricted
  - azure.aad.user.password_policy_enforce_change_configured
  - azure.aad.user.user_principal_name_configured
  - azure.aad.user.anonymous_auth_disabled
  - azure.iam.role.least_privilege_enforced
  - azure.iam.role.wildcard_action_configured
  - azure.aad.service_principal.key_credentials_configured
  - azure.aad.service_principal.oauth2_permissions_restricted
  - azure.aad.user.security_key_enforcement_configured
