version: '1.0'
provider: azure
service: edge
services:
  client: edge
  module: azure.mgmt.edge
discovery:
  # ── operations.Operations_List [root] ──
  - discovery_id: azure.edge.operations.operations_list
    calls:
      - action: operations.Operations_List
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        identity: '{{ item.identity }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        location: '{{ item.location }}'
        sku: '{{ item.sku }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        zones: '{{ item.zones }}'
        kind: '{{ item.kind }}'
        id: '{{ item.id }}'
        tags: '{{ item.tags }}'
  # ── sitesbysubscription.SitesBySubscription_List [root] ──
  - discovery_id: azure.edge.sitesbysubscription.sitesbysubscription_list
