version: '1.0'
provider: azure
service: cosmos
discovery:
- discovery_id: azure.cosmosdb.databaseaccounts.list
  calls:
  - action: databaseaccounts.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      kind: '{{ item.kind }}'
      identity: '{{ item.identity }}'
      system_data: '{{ item.system_data }}'
      provisioning_state: '{{ item.provisioning_state }}'
      document_endpoint: '{{ item.document_endpoint }}'
      database_account_offer_type: '{{ item.database_account_offer_type }}'
      ip_rules: '{{ item.ip_rules }}'
      is_virtual_network_filter_enabled: '{{ item.is_virtual_network_filter_enabled
        }}'
      enable_automatic_failover: '{{ item.enable_automatic_failover }}'
      consistency_policy: '{{ item.consistency_policy }}'
      capabilities: '{{ item.capabilities }}'
      write_locations: '{{ item.write_locations }}'
      read_locations: '{{ item.read_locations }}'
      locations: '{{ item.locations }}'
      failover_policies: '{{ item.failover_policies }}'
      virtual_network_rules: '{{ item.virtual_network_rules }}'
      private_endpoint_connections: '{{ item.private_endpoint_connections }}'
      enable_multiple_write_locations: '{{ item.enable_multiple_write_locations }}'
      enable_cassandra_connector: '{{ item.enable_cassandra_connector }}'
      connector_offer: '{{ item.connector_offer }}'
      disable_key_based_metadata_write_access: '{{ item.disable_key_based_metadata_write_access
        }}'
      key_vault_key_uri: '{{ item.key_vault_key_uri }}'
      default_identity: '{{ item.default_identity }}'
      public_network_access: '{{ item.public_network_access }}'
      enable_free_tier: '{{ item.enable_free_tier }}'
      api_properties: '{{ item.api_properties }}'
      enable_analytical_storage: '{{ item.enable_analytical_storage }}'
      analytical_storage_configuration: '{{ item.analytical_storage_configuration
        }}'
      instance_id: '{{ item.instance_id }}'
      create_mode: '{{ item.create_mode }}'
      restore_parameters: '{{ item.restore_parameters }}'
      backup_policy: '{{ item.backup_policy }}'
      cors: '{{ item.cors }}'
      network_acl_bypass: '{{ item.network_acl_bypass }}'
      network_acl_bypass_resource_ids: '{{ item.network_acl_bypass_resource_ids }}'
      disable_local_auth: '{{ item.disable_local_auth }}'
      capacity: '{{ item.capacity }}'
      keys_metadata: '{{ item.keys_metadata }}'
      enable_partition_merge: '{{ item.enable_partition_merge }}'
      minimal_tls_version: '{{ item.minimal_tls_version }}'
      enable_burst_capacity: '{{ item.enable_burst_capacity }}'
      customer_managed_key_status: '{{ item.customer_managed_key_status }}'
      enable_per_region_per_partition_autoscale: '{{ item.enable_per_region_per_partition_autoscale
        }}'
      key_vault_key_uri_version: '{{ item.key_vault_key_uri_version }}'
      enable_priority_based_execution: '{{ item.enable_priority_based_execution }}'
      default_priority_level: '{{ item.default_priority_level }}'
  uid_template: '{item.id}'
