version: '1.0'
provider: azure
service: event
discovery:
- discovery_id: azure.eventgrid.eventsubscriptions.list_by_resource
  calls:
  - action: eventsubscriptions.list_by_resource
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      system_data: '{{ item.system_data }}'
      topic: '{{ item.topic }}'
      provisioning_state: '{{ item.provisioning_state }}'
      destination: '{{ item.destination }}'
      delivery_with_resource_identity: '{{ item.delivery_with_resource_identity }}'
      filter: '{{ item.filter }}'
      labels: '{{ item.labels }}'
      expiration_time_utc: '{{ item.expiration_time_utc }}'
      event_delivery_schema: '{{ item.event_delivery_schema }}'
      retry_policy: '{{ item.retry_policy }}'
      dead_letter_destination: '{{ item.dead_letter_destination }}'
      dead_letter_with_resource_identity: '{{ item.dead_letter_with_resource_identity
        }}'
- discovery_id: azure.eventhub.eventhubs.list_by_namespace
  calls:
  - action: eventhubs.list_by_namespace
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      partition_ids: '{{ item.partition_ids }}'
      created_at: '{{ item.created_at }}'
      updated_at: '{{ item.updated_at }}'
      message_retention_in_days: '{{ item.message_retention_in_days }}'
      partition_count: '{{ item.partition_count }}'
      status: '{{ item.status }}'
      capture_description: '{{ item.capture_description }}'
- discovery_id: azure.eventhub.namespaces.list
  calls:
  - action: namespaces.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      sku: '{{ item.sku }}'
      identity: '{{ item.identity }}'
      provisioning_state: '{{ item.provisioning_state }}'
      status: '{{ item.status }}'
      created_at: '{{ item.created_at }}'
      updated_at: '{{ item.updated_at }}'
      service_bus_endpoint: '{{ item.service_bus_endpoint }}'
      cluster_arm_id: '{{ item.cluster_arm_id }}'
      metric_id: '{{ item.metric_id }}'
      is_auto_inflate_enabled: '{{ item.is_auto_inflate_enabled }}'
      maximum_throughput_units: '{{ item.maximum_throughput_units }}'
      kafka_enabled: '{{ item.kafka_enabled }}'
      zone_redundant: '{{ item.zone_redundant }}'
      encryption: '{{ item.encryption }}'
