version: '1.0'
provider: azure
service: workloadmonitor
services:
  client: workloadmonitor
  module: azure.mgmt.workloadmonitor
discovery:
- discovery_id: azure.workloadmonitor.healthmonitors.list
  calls:
  - action: healthmonitors.list
    save_as: response
    on_error: continue
    params:
      provider_name: ''
      resource_collection_name: ''
      resource_name: ''
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      type: '{{ item.type }}'
  uid_template: '{item.id}'
- discovery_id: azure.workloadmonitor.healthmonitors.get_state_change
  for_each: azure.workloadmonitor.healthmonitors.list
  calls:
  - action: healthmonitors.get_state_change
    save_as: response
    on_error: continue
    params:
      provider_name: '{{ item.name }}'
      monitor_id: '{{ item.id }}'
  emit:
    as: item
    item:
      identity: '{{ response.identity }}'
      type: '{{ response.type }}'
      properties: '{{ response.properties }}'
      location: '{{ response.location }}'
      sku: '{{ response.sku }}'
      name: '{{ response.name }}'
      provisioning_state: '{{ response.provisioning_state }}'
      zones: '{{ response.zones }}'
      kind: '{{ response.kind }}'
      id: '{{ response.id }}'
      tags: '{{ response.tags }}'
- discovery_id: azure.workloadmonitor.healthmonitors.list_state_changes
  for_each: azure.workloadmonitor.healthmonitors.list
  calls:
  - action: healthmonitors.list_state_changes
    save_as: response
    on_error: continue
    params:
      provider_name: '{{ item.name }}'
      monitor_id: '{{ item.id }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      current_monitor_state: '{{ item.current_monitor_state }}'
      current_state_first_observed_timestamp: '{{ item.current_state_first_observed_timestamp
        }}'
      evaluation_timestamp: '{{ item.evaluation_timestamp }}'
      evidence: '{{ item.evidence }}'
      monitor_configuration: '{{ item.monitor_configuration }}'
      monitor_name: '{{ item.monitor_name }}'
      monitor_type: '{{ item.monitor_type }}'
      monitored_object: '{{ item.monitored_object }}'
      previous_monitor_state: '{{ item.previous_monitor_state }}'
