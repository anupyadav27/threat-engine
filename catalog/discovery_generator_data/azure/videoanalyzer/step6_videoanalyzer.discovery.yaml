version: '1.0'
provider: azure
service: videoanalyzer
services:
  client: videoanalyzer
  module: azure.mgmt.videoanalyzer
discovery:
- discovery_id: azure.videoanalyzer.videoanalyzers.list
  calls:
  - action: videoanalyzers.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      public_network_access: '{{ item.public_network_access }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      encryption: '{{ item.encryption }}'
      tags: '{{ item.tags }}'
      endpoints: '{{ item.endpoints }}'
      iot_hubs: '{{ item.iot_hubs }}'
      network_access_control: '{{ item.network_access_control }}'
      private_endpoint_connections: '{{ item.private_endpoint_connections }}'
      storage_accounts: '{{ item.storage_accounts }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.videoanalyzer.videoanalyzers.list_by_subscription
  calls:
  - action: videoanalyzers.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      public_network_access: '{{ item.public_network_access }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      encryption: '{{ item.encryption }}'
      tags: '{{ item.tags }}'
      endpoints: '{{ item.endpoints }}'
      iot_hubs: '{{ item.iot_hubs }}'
      network_access_control: '{{ item.network_access_control }}'
      private_endpoint_connections: '{{ item.private_endpoint_connections }}'
      storage_accounts: '{{ item.storage_accounts }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.videoanalyzer.accesspolicies.list
  for_each: azure.videoanalyzer.videoanalyzers.list_by_subscription
  calls:
  - action: accesspolicies.list
    save_as: response
    on_error: continue
    params:
      account_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
