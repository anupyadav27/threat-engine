version: '1.0'
provider: azure
service: hardwaresecuritymodules
services:
  client: hardwaresecuritymodules
  module: azure.mgmt.hardwaresecuritymodules
discovery:
- discovery_id: azure.hardwaresecuritymodules.cloudhsmclusters.list_by_resource_group
  calls:
  - action: cloudhsmclusters.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      zones: '{{ item.zones }}'
      id: '{{ item.id }}'
  uid_template: '{item.id}'
- discovery_id: azure.hardwaresecuritymodules.cloudhsmclusters.list_by_subscription
  calls:
  - action: cloudhsmclusters.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      zones: '{{ item.zones }}'
      id: '{{ item.id }}'
  uid_template: '{item.id}'
- discovery_id: azure.hardwaresecuritymodules.dedicatedhsm.list_by_resource_group
  calls:
  - action: dedicatedhsm.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      zones: '{{ item.zones }}'
      id: '{{ item.id }}'
  uid_template: '{item.id}'
- discovery_id: azure.hardwaresecuritymodules.dedicatedhsm.list_by_subscription
  calls:
  - action: dedicatedhsm.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      zones: '{{ item.zones }}'
      id: '{{ item.id }}'
  uid_template: '{item.id}'
- discovery_id: azure.hardwaresecuritymodules.cloudhsmclusterbackupstatus.begin_get
  for_each: azure.hardwaresecuritymodules.cloudhsmclusters.list_by_subscription
  calls:
  - action: cloudhsmclusterbackupstatus.begin_get
    save_as: response
    on_error: continue
    params:
      cloud_hsm_cluster_name: '{{ item.name }}'
  emit:
    as: item
    item:
      identity: '{{ response.identity }}'
      type: '{{ response.type }}'
      properties: '{{ response.properties }}'
      location: '{{ response.location }}'
      sku: '{{ response.sku }}'
      name: '{{ response.name }}'
      provisioning_state: '{{ response.provisioning_state }}'
      zones: '{{ response.zones }}'
      kind: '{{ response.kind }}'
      id: '{{ response.id }}'
      tags: '{{ response.tags }}'
- discovery_id: azure.hardwaresecuritymodules.cloudhsmclusterprivatelinkresources.list_by_cloud_hsm_cluster
  for_each: azure.hardwaresecuritymodules.cloudhsmclusters.list_by_subscription
  calls:
  - action: cloudhsmclusterprivatelinkresources.list_by_cloud_hsm_cluster
    save_as: response
    on_error: continue
    params:
      cloud_hsm_cluster_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      etag: '{{ item.etag }}'
- discovery_id: azure.hardwaresecuritymodules.cloudhsmclusterrestorestatus.begin_get
  for_each: azure.hardwaresecuritymodules.cloudhsmclusters.list_by_subscription
  calls:
  - action: cloudhsmclusterrestorestatus.begin_get
    save_as: response
    on_error: continue
    params:
      cloud_hsm_cluster_name: '{{ item.name }}'
  emit:
    as: item
    item:
      identity: '{{ response.identity }}'
      type: '{{ response.type }}'
      properties: '{{ response.properties }}'
      location: '{{ response.location }}'
      sku: '{{ response.sku }}'
      name: '{{ response.name }}'
      provisioning_state: '{{ response.provisioning_state }}'
      zones: '{{ response.zones }}'
      kind: '{{ response.kind }}'
      id: '{{ response.id }}'
      tags: '{{ response.tags }}'
- discovery_id: azure.hardwaresecuritymodules.privateendpointconnections.list_by_cloud_hsm_cluster
  for_each: azure.hardwaresecuritymodules.cloudhsmclusters.list_by_subscription
  calls:
  - action: privateendpointconnections.list_by_cloud_hsm_cluster
    save_as: response
    on_error: continue
    params:
      cloud_hsm_cluster_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      etag: '{{ item.etag }}'
