version: '1.0'
provider: azure
service: certificateregistration
services:
  client: certificateregistration
  module: azure.mgmt.certificateregistration
discovery:
- discovery_id: azure.certificateregistration.appservicecertificateorders.appservicecertificateorders_list
  calls:
  - action: appservicecertificateorders.AppServiceCertificateOrders_List
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.id}'
