version: '1.0'
provider: azure
service: iot
discovery:
- discovery_id: azure.iothub.iothubresource.list_by_subscription
  calls:
  - action: iothubresource.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      etag: '{{ item.etag }}'
      properties: '{{ item.properties }}'
      sku: '{{ item.sku }}'
