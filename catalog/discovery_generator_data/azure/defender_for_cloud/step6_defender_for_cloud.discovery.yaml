version: '1.0'
provider: azure
service: defender_for_cloud
services:
  client: security
  module: azure.mgmt.security
discovery:
- discovery_id: azure.security.locations.list
  calls:
  - action: locations.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      creation_time_utc: '{{ item.creation_time_utc }}'
      last_state_change_time_utc: '{{ item.last_state_change_time_utc }}'
      security_task_parameters: '{{ item.security_task_parameters }}'
      state: '{{ item.state }}'
      sub_state: '{{ item.sub_state }}'
  uid_template: '{item.id}'
- discovery_id: azure.security.root.list
  calls:
  - action: root.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      creation_time_utc: '{{ item.creation_time_utc }}'
      last_state_change_time_utc: '{{ item.last_state_change_time_utc }}'
      security_task_parameters: '{{ item.security_task_parameters }}'
      state: '{{ item.state }}'
      sub_state: '{{ item.sub_state }}'
  uid_template: '{item.id}'
- discovery_id: azure.security.tasks.list
  calls:
  - action: tasks.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      creation_time_utc: '{{ item.creation_time_utc }}'
      last_state_change_time_utc: '{{ item.last_state_change_time_utc }}'
      security_task_parameters: '{{ item.security_task_parameters }}'
      state: '{{ item.state }}'
      sub_state: '{{ item.sub_state }}'
  uid_template: '{item.id}'
