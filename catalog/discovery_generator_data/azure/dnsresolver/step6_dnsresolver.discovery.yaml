version: '1.0'
provider: azure
service: dnsresolver
services:
  client: dnsresolver
  module: azure.mgmt.dnsresolver
discovery:
- discovery_id: azure.dnsresolver.dnsforwardingrulesets.dnsforwardingrulesets_list
  calls:
  - action: dnsforwardingrulesets.DnsForwardingRulesets_List
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.id}'
- discovery_id: azure.dnsresolver.dnsresolverdomainlists.dnsresolverdomainlists_list
  calls:
  - action: dnsresolverdomainlists.DnsResolverDomainLists_List
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.id}'
- discovery_id: azure.dnsresolver.dnsresolverpolicies.dnsresolverpolicies_list
  calls:
  - action: dnsresolverpolicies.DnsResolverPolicies_List
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.id}'
- discovery_id: azure.dnsresolver.dnsresolvers.dnsresolvers_list
  calls:
  - action: dnsresolvers.DnsResolvers_List
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.id}'
