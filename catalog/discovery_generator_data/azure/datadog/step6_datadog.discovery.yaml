version: '1.0'
provider: azure
service: datadog
services:
  client: datadog
  module: azure.mgmt.datadog
discovery:
- discovery_id: azure.datadog.marketplaceagreements.list
  calls:
  - action: marketplaceagreements.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.datadog.monitors.list
  calls:
  - action: monitors.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.datadog.monitors.list_by_resource_group
  calls:
  - action: monitors.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.datadog.monitoredsubscriptions.list
  for_each: azure.datadog.monitors.list
  calls:
  - action: monitoredsubscriptions.list
    save_as: response
    on_error: continue
    params:
      monitor_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      system_data: '{{ item.system_data }}'
- discovery_id: azure.datadog.monitors.get_default_key
  for_each: azure.datadog.monitors.list
  calls:
  - action: monitors.get_default_key
    save_as: response
    on_error: continue
    params:
      monitor_name: '{{ item.name }}'
  emit:
    as: item
    item:
      identity: '{{ response.identity }}'
      type: '{{ response.type }}'
      properties: '{{ response.properties }}'
      location: '{{ response.location }}'
      sku: '{{ response.sku }}'
      name: '{{ response.name }}'
      provisioning_state: '{{ response.provisioning_state }}'
      zones: '{{ response.zones }}'
      kind: '{{ response.kind }}'
      id: '{{ response.id }}'
      tags: '{{ response.tags }}'
- discovery_id: azure.datadog.monitors.list_api_keys
  for_each: azure.datadog.monitors.list
  calls:
  - action: monitors.list_api_keys
    save_as: response
    on_error: continue
    params:
      monitor_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      created: '{{ item.created }}'
      created_by: '{{ item.created_by }}'
      key: '{{ item.key }}'
- discovery_id: azure.datadog.monitors.list_hosts
  for_each: azure.datadog.monitors.list
  calls:
  - action: monitors.list_hosts
    save_as: response
    on_error: continue
    params:
      monitor_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      aliases: '{{ item.aliases }}'
      apps: '{{ item.apps }}'
      meta: '{{ item.meta }}'
- discovery_id: azure.datadog.monitors.list_linked_resources
  for_each: azure.datadog.monitors.list
  calls:
  - action: monitors.list_linked_resources
    save_as: response
    on_error: continue
    params:
      monitor_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
- discovery_id: azure.datadog.monitors.list_monitored_resources
  for_each: azure.datadog.monitors.list
  calls:
  - action: monitors.list_monitored_resources
    save_as: response
    on_error: continue
    params:
      monitor_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      reason_for_logs_status: '{{ item.reason_for_logs_status }}'
      reason_for_metrics_status: '{{ item.reason_for_metrics_status }}'
      sending_logs: '{{ item.sending_logs }}'
      sending_metrics: '{{ item.sending_metrics }}'
- discovery_id: azure.datadog.singlesignonconfigurations.list
  for_each: azure.datadog.monitors.list
  calls:
  - action: singlesignonconfigurations.list
    save_as: response
    on_error: continue
    params:
      monitor_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      system_data: '{{ item.system_data }}'
- discovery_id: azure.datadog.tagrules.list
  for_each: azure.datadog.monitors.list
  calls:
  - action: tagrules.list
    save_as: response
    on_error: continue
    params:
      monitor_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      system_data: '{{ item.system_data }}'
