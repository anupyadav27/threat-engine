version: '1.0'
provider: azure
service: redhatopenshift
services:
  client: redhatopenshift
  module: azure.mgmt.redhatopenshift
discovery:
- discovery_id: azure.redhatopenshift.openshiftclusters.list
  calls:
  - action: openshiftclusters.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      resources: '{{ item.resources }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.redhatopenshift.openshiftclusters.list_by_resource_group
  calls:
  - action: openshiftclusters.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      apiserver_profile: '{{ item.apiserver_profile }}'
      cluster_profile: '{{ item.cluster_profile }}'
      console_profile: '{{ item.console_profile }}'
      ingress_profiles: '{{ item.ingress_profiles }}'
      master_profile: '{{ item.master_profile }}'
      network_profile: '{{ item.network_profile }}'
      service_principal_profile: '{{ item.service_principal_profile }}'
      system_data: '{{ item.system_data }}'
      worker_profiles: '{{ item.worker_profiles }}'
      worker_profiles_status: '{{ item.worker_profiles_status }}'
  uid_template: '{item.id}'
- discovery_id: azure.redhatopenshift.machinepools.list
  for_each: azure.redhatopenshift.openshiftclusters.list
  calls:
  - action: machinepools.list
    save_as: response
    on_error: continue
    params:
      resource_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      resources: '{{ item.resources }}'
      system_data: '{{ item.system_data }}'
- discovery_id: azure.redhatopenshift.openshiftclusters.list_admin_credentials
  for_each: azure.redhatopenshift.openshiftclusters.list
  calls:
  - action: openshiftclusters.list_admin_credentials
    save_as: response
    on_error: continue
    params:
      resource_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
- discovery_id: azure.redhatopenshift.openshiftclusters.list_credentials
  for_each: azure.redhatopenshift.openshiftclusters.list
  calls:
  - action: openshiftclusters.list_credentials
    save_as: response
    on_error: continue
    params:
      resource_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
- discovery_id: azure.redhatopenshift.secrets.list
  for_each: azure.redhatopenshift.openshiftclusters.list
  calls:
  - action: secrets.list
    save_as: response
    on_error: continue
    params:
      resource_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      resources: '{{ item.resources }}'
      system_data: '{{ item.system_data }}'
- discovery_id: azure.redhatopenshift.syncidentityproviders.list
  for_each: azure.redhatopenshift.openshiftclusters.list
  calls:
  - action: syncidentityproviders.list
    save_as: response
    on_error: continue
    params:
      resource_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      resources: '{{ item.resources }}'
      system_data: '{{ item.system_data }}'
- discovery_id: azure.redhatopenshift.syncsets.list
  for_each: azure.redhatopenshift.openshiftclusters.list
  calls:
  - action: syncsets.list
    save_as: response
    on_error: continue
    params:
      resource_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      resources: '{{ item.resources }}'
      system_data: '{{ item.system_data }}'
