# Discovery YAML — dashboard (Azure)
# Generated: 2026-04-15T10:39:30Z
# Source: step1b_operation_registry.json (qualified ops + dependency chains)
# Actions use {category}.{method} format for SDK method resolution
version: '1.0'
provider: azure
service: dashboard
services:
  client: dashboard
  module: azure.mgmt.dashboard
discovery:
  # ── grafana.list [root] ──
  - discovery_id: azure.dashboard.grafana.list
    calls:
      - action: grafana.list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        name: '{{ item.name }}'
        id: '{{ item.id }}'
  # ── grafana.list_by_resource_group [root] ──
  - discovery_id: azure.dashboard.grafana.list_by_resource_group
    calls:
      - action: grafana.list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        identity: '{{ item.identity }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        location: '{{ item.location }}'
        sku: '{{ item.sku }}'
        name: '{{ item.name }}'
        id: '{{ item.id }}'
        tags: '{{ item.tags }}'
  # ── manageddashboards.list [root] ──
  - discovery_id: azure.dashboard.manageddashboards.list
    calls:
      - action: manageddashboards.list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        name: '{{ item.name }}'
        id: '{{ item.id }}'
  # ── manageddashboards.list_by_subscription [root] ──
  - discovery_id: azure.dashboard.manageddashboards.list_by_subscription
    calls:
      - action: manageddashboards.list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        name: '{{ item.name }}'
        id: '{{ item.id }}'

