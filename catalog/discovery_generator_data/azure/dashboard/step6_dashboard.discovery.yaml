version: '1.0'
provider: azure
service: dashboard
services:
  client: dashboard
  module: azure.mgmt.dashboard
discovery:
- discovery_id: azure.dashboard.grafana.list
  calls:
  - action: grafana.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
  uid_template: '{item.id}'
- discovery_id: azure.dashboard.grafana.list_by_resource_group
  calls:
  - action: grafana.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.id}'
- discovery_id: azure.dashboard.manageddashboards.list
  calls:
  - action: manageddashboards.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
  uid_template: '{item.id}'
- discovery_id: azure.dashboard.manageddashboards.list_by_subscription
  calls:
  - action: manageddashboards.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
  uid_template: '{item.id}'
