version: '1.0'
provider: azure
service: hdinsight
services:
  client: hdinsight
  module: azure.mgmt.hdinsight
discovery:
- discovery_id: azure.hdinsight.clusters.list
  calls:
  - action: clusters.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
- discovery_id: azure.hdinsight.clusters.list_by_resource_group
