version: '1.0'
provider: azure
service: healthcareapis
services:
  client: healthcareapis
  module: azure.mgmt.healthcareapis
discovery:
- discovery_id: azure.healthcareapis.services.list
  calls:
  - action: services.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      etag: '{{ item.etag }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.healthcareapis.services.list_by_resource_group
  calls:
  - action: services.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      etag: '{{ item.etag }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.healthcareapis.workspaces.list_by_resource_group
  calls:
  - action: workspaces.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      etag: '{{ item.etag }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.healthcareapis.workspaces.list_by_subscription
  calls:
  - action: workspaces.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      etag: '{{ item.etag }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.healthcareapis.dicomservices.list_by_workspace
  for_each: azure.healthcareapis.workspaces.list_by_subscription
  calls:
  - action: dicomservices.list_by_workspace
    save_as: response
    on_error: continue
    params:
      workspace_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      group_id: '{{ item.group_id }}'
      required_members: '{{ item.required_members }}'
      required_zone_names: '{{ item.required_zone_names }}'
      system_data: '{{ item.system_data }}'
- discovery_id: azure.healthcareapis.fhirdestinations.list_by_iot_connector
  for_each: azure.healthcareapis.workspaces.list_by_subscription
  calls:
  - action: fhirdestinations.list_by_iot_connector
    save_as: response
    on_error: continue
    params:
      workspace_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      etag: '{{ item.etag }}'
      fhir_mapping: '{{ item.fhir_mapping }}'
      fhir_service_resource_id: '{{ item.fhir_service_resource_id }}'
      resource_identity_resolution_type: '{{ item.resource_identity_resolution_type
        }}'
      system_data: '{{ item.system_data }}'
- discovery_id: azure.healthcareapis.fhirservices.list_by_workspace
