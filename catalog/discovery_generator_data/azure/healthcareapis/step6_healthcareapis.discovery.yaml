      - action: services.list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        identity: '{{ item.identity }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        kind: '{{ item.kind }}'
        id: '{{ item.id }}'
        tags: '{{ item.tags }}'
        etag: '{{ item.etag }}'
