    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      allow_tracing: '{{ item.allow_tracing }}'
      created_date: '{{ item.created_date }}'
