version: '1.0'
provider: azure
service: cognitiveservices
services:
  client: cognitiveservices
  module: azure.mgmt.cognitiveservices
discovery:
- discovery_id: azure.cognitiveservices.accounts.list
  calls:
  - action: accounts.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      etag: '{{ item.etag }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
