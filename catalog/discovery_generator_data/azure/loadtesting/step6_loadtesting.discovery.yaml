# Discovery YAML — loadtesting (Azure)
# Generated: 2026-04-15T10:39:30Z
# Source: step1b_operation_registry.json (qualified ops + dependency chains)
# Actions use {category}.{method} format for SDK method resolution
version: '1.0'
provider: azure
service: loadtesting
services:
  client: loadtesting
  module: azure.mgmt.loadtesting
discovery:
  # ── loadtests.list_by_resource_group [root] ──
  - discovery_id: azure.loadtesting.loadtests.list_by_resource_group
    calls:
      - action: loadtests.list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        identity: '{{ item.identity }}'
        type: '{{ item.type }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        id: '{{ item.id }}'
        encryption: '{{ item.encryption }}'
        tags: '{{ item.tags }}'
        data_plane_uri: '{{ item.data_plane_uri }}'
        description: '{{ item.description }}'
        system_data: '{{ item.system_data }}'
  # ── loadtests.list_by_subscription [root] ──
  - discovery_id: azure.loadtesting.loadtests.list_by_subscription
    calls:
      - action: loadtests.list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        identity: '{{ item.identity }}'
        type: '{{ item.type }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        id: '{{ item.id }}'
        encryption: '{{ item.encryption }}'
        tags: '{{ item.tags }}'
        data_plane_uri: '{{ item.data_plane_uri }}'
        description: '{{ item.description }}'
        system_data: '{{ item.system_data }}'
  # ════════════════════════════════════════
  # Dependent operations (for_each + params)
  # ════════════════════════════════════════
  # ── loadtests.list_outbound_network_dependencies_endpoints [dependent] ──
  - discovery_id: azure.loadtesting.loadtests.list_outbound_network_dependencies_endpoints
    for_each: azure.loadtesting.loadtests.list_by_subscription
    calls:
      - action: loadtests.list_outbound_network_dependencies_endpoints
        save_as: response
        on_error: continue
        params:
          load_test_name: '{{ item.name }}'
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        type: '{{ item.type }}'
        name: '{{ item.name }}'
        id: '{{ item.id }}'
        category: '{{ item.category }}'
        endpoints: '{{ item.endpoints }}'

  # ── Unwired dependent ops (no root producer found) ──
