version: '1.0'
provider: azure
service: intune
discovery:
- discovery_id: azure.intune.list_diagnostic_settings
  calls:
  - action: diagnostic_settings.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      logAnalyticsDestinationType: '{{ item.logAnalyticsDestinationType }}'
      logs: '{{ item.logs }}'
      metrics: '{{ item.metrics }}'
      workspaceId: '{{ item.workspaceId }}'
      storageAccountId: '{{ item.storageAccountId }}'
  uid_template: '{item.id}'
