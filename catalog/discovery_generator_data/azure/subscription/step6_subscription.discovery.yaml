version: '1.0'
provider: azure
service: subscription
services:
  client: subscription
  module: azure.mgmt.subscription
discovery:
- discovery_id: azure.subscription.alias.list
  calls:
  - action: alias.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tenant_id: '{{ item.tenant_id }}'
- discovery_id: azure.subscription.subscriptionpolicy.get_policy_for_tenant
  calls:
  - action: subscriptionpolicy.get_policy_for_tenant
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      identity: '{{ response.identity }}'
      type: '{{ response.type }}'
      properties: '{{ response.properties }}'
      location: '{{ response.location }}'
      sku: '{{ response.sku }}'
      name: '{{ response.name }}'
      provisioning_state: '{{ response.provisioning_state }}'
      zones: '{{ response.zones }}'
      kind: '{{ response.kind }}'
      id: '{{ response.id }}'
      tags: '{{ response.tags }}'
- discovery_id: azure.subscription.subscriptionpolicy.list_policy_for_tenant
  calls:
  - action: subscriptionpolicy.list_policy_for_tenant
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      system_data: '{{ item.system_data }}'
- discovery_id: azure.subscription.subscriptions.list
  calls:
  - action: subscriptions.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tenant_id: '{{ item.tenant_id }}'
- discovery_id: azure.subscription.subscriptions.list_locations
  calls:
  - action: subscriptions.list_locations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      display_name: '{{ item.display_name }}'
      latitude: '{{ item.latitude }}'
      longitude: '{{ item.longitude }}'
      subscription_id: '{{ item.subscription_id }}'
- discovery_id: azure.subscription.tenants.list
  calls:
  - action: tenants.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tenant_id: '{{ item.tenant_id }}'
- discovery_id: azure.resource.list
  calls:
  - action: list
    save_as: list_response
  emit:
    items_for: '{{ list_response.value }}'
    as: item
    item:
      id: '{{ item.id }}'
      subscription_id: '{{ item.subscription_id }}'
      display_name: '{{ item.display_name }}'
      state: '{{ item.state }}'
      subscription_policies: '{{ item.subscription_policies }}'
      authorization_source: '{{ item.authorization_source }}'
- discovery_id: azure.subscription.list
  calls:
  - action: list
    save_as: list_response
  emit:
    items_for: '{{ list_response.value }}'
    as: item
    item:
      id: '{{ item.id }}'
      subscription_id: '{{ item.subscription_id }}'
      display_name: '{{ item.display_name }}'
      state: '{{ item.state }}'
      subscription_policies: '{{ item.subscription_policies }}'
      authorization_source: '{{ item.authorization_source }}'
- discovery_id: azure.subscription.list_locations
  calls:
  - action: list_locations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
