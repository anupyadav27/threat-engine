version: '1.0'
provider: azure
service: functionapp
discovery:
- _stub: true
  discovery_id: azure.functionapp.list_functionapps
  _note: STUB — generated by step2, needs real SDK review for azure.functionapp
  _rules:
  - azure.functionapp.secrets_in_keyvault_configured
  _client: azure.mgmt.web
  calls:
  - action: ListFunctions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      id: '{{ item.Id }}'
      name: '{{ item.Name }}'
      resource_type: '''{{ resource_type }}'''
      region: '{{ region }}'
      encrypted: '{{ item.Encrypted }}'
      kms_key_id: '{{ item.KMSKeyId }}'
      status: '{{ item.Status }}'
      enabled: '{{ item.Enabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      internet_facing: '{{ item.InternetFacing }}'
      public_ip_address: '{{ item.PublicIpAddress }}'
      tags: '{{ item.Tags }}'
      permissions: '{{ item.Permissions }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      retention_days: '{{ item.RetentionDays }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
- discovery_id: azure.functionapp.webapps.list
  calls:
  - action: webapps.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value | selectattr(''kind'', ''search'', ''functionapp'')
      | list }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      kind: '{{ item.kind }}'
      location: '{{ item.location }}'
      resource_group: '{{ item.resource_group }}'
      status: '{{ item.state }}'
      https_only: '{{ item.https_only }}'
      site_config: '{{ item.site_config }}'
      identity: '{{ item.identity }}'
      client_cert_enabled: '{{ item.client_cert_enabled }}'
      key_vault_reference_identity: '{{ item.key_vault_reference_identity }}'
      enabled: '{{ item.enabled }}'
      tags: '{{ item.tags }}'
  _used_by_rules:
  - azure.functionapp.secrets_in_keyvault_configured
  uid_template: '{item.id}'
- discovery_id: azure.web.webapps.list
  calls:
  - action: webapps.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      kind: '{{ item.kind }}'
      location: '{{ item.location }}'
      type: '{{ item.type }}'
      tags: '{{ item.tags }}'
      identity: '{{ item.identity }}'
      extended_location: '{{ item.extended_location }}'
      state: '{{ item.state }}'
      host_names: '{{ item.host_names }}'
      repository_site_name: '{{ item.repository_site_name }}'
      usage_state: '{{ item.usage_state }}'
      enabled: '{{ item.enabled }}'
      enabled_host_names: '{{ item.enabled_host_names }}'
      availability_state: '{{ item.availability_state }}'
      host_name_ssl_states: '{{ item.host_name_ssl_states }}'
      server_farm_id: '{{ item.server_farm_id }}'
      reserved: '{{ item.reserved }}'
      is_xenon: '{{ item.is_xenon }}'
      hyper_v: '{{ item.hyper_v }}'
      last_modified_time_utc: '{{ item.last_modified_time_utc }}'
      dns_configuration: '{{ item.dns_configuration }}'
      outbound_vnet_routing: '{{ item.outbound_vnet_routing }}'
      site_config: '{{ item.site_config }}'
      function_app_config: '{{ item.function_app_config }}'
      dapr_config: '{{ item.dapr_config }}'
      workload_profile_name: '{{ item.workload_profile_name }}'
      resource_config: '{{ item.resource_config }}'
      traffic_manager_host_names: '{{ item.traffic_manager_host_names }}'
      scm_site_also_stopped: '{{ item.scm_site_also_stopped }}'
      target_swap_slot: '{{ item.target_swap_slot }}'
      hosting_environment_profile: '{{ item.hosting_environment_profile }}'
      client_affinity_enabled: '{{ item.client_affinity_enabled }}'
      client_affinity_partitioning_enabled: '{{ item.client_affinity_partitioning_enabled
        }}'
      client_affinity_proxy_enabled: '{{ item.client_affinity_proxy_enabled }}'
      client_cert_enabled: '{{ item.client_cert_enabled }}'
      client_cert_mode: '{{ item.client_cert_mode }}'
      client_cert_exclusion_paths: '{{ item.client_cert_exclusion_paths }}'
      ip_mode: '{{ item.ip_mode }}'
      end_to_end_encryption_enabled: '{{ item.end_to_end_encryption_enabled }}'
      ssh_enabled: '{{ item.ssh_enabled }}'
      host_names_disabled: '{{ item.host_names_disabled }}'
      custom_domain_verification_id: '{{ item.custom_domain_verification_id }}'
      outbound_ip_addresses: '{{ item.outbound_ip_addresses }}'
