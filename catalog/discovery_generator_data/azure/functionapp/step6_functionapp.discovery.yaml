      suspended_till: '{{ item.suspended_till }}'
      max_number_of_workers: '{{ item.max_number_of_workers }}'
      cloning_info: '{{ item.cloning_info }}'
      resource_group: '{{ item.resource_group }}'
      is_default_container: '{{ item.is_default_container }}'
      default_host_name: '{{ item.default_host_name }}'
      slot_swap_status: '{{ item.slot_swap_status }}'
      https_only: '{{ item.https_only }}'
      redundancy_mode: '{{ item.redundancy_mode }}'
      in_progress_operation_id: '{{ item.in_progress_operation_id }}'
      public_network_access: '{{ item.public_network_access }}'
      storage_account_required: '{{ item.storage_account_required }}'
      key_vault_reference_identity: '{{ item.key_vault_reference_identity }}'
      auto_generated_domain_name_label_scope: '{{ item.auto_generated_domain_name_label_scope
        }}'
      virtual_network_subnet_id: '{{ item.virtual_network_subnet_id }}'
      managed_environment_id: '{{ item.managed_environment_id }}'
      sku: '{{ item.sku }}'
  uid_template: '{item.id}'
