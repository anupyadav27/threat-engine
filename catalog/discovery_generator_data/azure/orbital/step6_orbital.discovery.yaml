version: '1.0'
provider: azure
service: orbital
services:
  client: orbital
  module: azure.mgmt.orbital
discovery:
- discovery_id: azure.orbital.contactprofiles.list
  calls:
  - action: contactprofiles.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      links: '{{ item.links }}'
      norad_id: '{{ item.norad_id }}'
      system_data: '{{ item.system_data }}'
      title_line: '{{ item.title_line }}'
      tle_line1: '{{ item.tle_line1 }}'
      tle_line2: '{{ item.tle_line2 }}'
  uid_template: '{item.id}'
- discovery_id: azure.orbital.contactprofiles.list_by_subscription
  calls:
  - action: contactprofiles.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      links: '{{ item.links }}'
      norad_id: '{{ item.norad_id }}'
      system_data: '{{ item.system_data }}'
      title_line: '{{ item.title_line }}'
      tle_line1: '{{ item.tle_line1 }}'
      tle_line2: '{{ item.tle_line2 }}'
  uid_template: '{item.id}'
- discovery_id: azure.orbital.spacecrafts.list
  calls:
  - action: spacecrafts.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      links: '{{ item.links }}'
      norad_id: '{{ item.norad_id }}'
      system_data: '{{ item.system_data }}'
      title_line: '{{ item.title_line }}'
      tle_line1: '{{ item.tle_line1 }}'
      tle_line2: '{{ item.tle_line2 }}'
  uid_template: '{item.id}'
- discovery_id: azure.orbital.spacecrafts.list_by_subscription
  calls:
  - action: spacecrafts.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      links: '{{ item.links }}'
      norad_id: '{{ item.norad_id }}'
      system_data: '{{ item.system_data }}'
      title_line: '{{ item.title_line }}'
      tle_line1: '{{ item.tle_line1 }}'
      tle_line2: '{{ item.tle_line2 }}'
  uid_template: '{item.id}'
- discovery_id: azure.orbital.contacts.list
  for_each: azure.orbital.spacecrafts.list_by_subscription
  calls:
  - action: contacts.list
    save_as: response
    on_error: continue
    params:
      spacecraft_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      links: '{{ item.links }}'
      norad_id: '{{ item.norad_id }}'
      system_data: '{{ item.system_data }}'
      title_line: '{{ item.title_line }}'
      tle_line1: '{{ item.tle_line1 }}'
      tle_line2: '{{ item.tle_line2 }}'
- discovery_id: azure.orbital.results.begin_get
  for_each: azure.orbital.contactprofiles.list_by_subscription
  calls:
  - action: results.begin_get
    save_as: response
    on_error: continue
    params:
      location: '{{ item.location }}'
  emit:
    as: item
    item:
      properties: '{{ response.properties }}'
      name: '{{ response.name }}'
      status: '{{ response.status }}'
      id: '{{ response.id }}'
      end_time: '{{ response.end_time }}'
      error: '{{ response.error }}'
      percent_complete: '{{ response.percent_complete }}'
      start_time: '{{ response.start_time }}'
- discovery_id: azure.orbital.spacecrafts.begin_list_available_contacts
  for_each: azure.orbital.spacecrafts.list_by_subscription
  calls:
  - action: spacecrafts.begin_list_available_contacts
    save_as: response
    on_error: continue
    params:
      spacecraft_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      end_azimuth_degrees: '{{ item.end_azimuth_degrees }}'
      end_elevation_degrees: '{{ item.end_elevation_degrees }}'
      ground_station_name: '{{ item.ground_station_name }}'
      maximum_elevation_degrees: '{{ item.maximum_elevation_degrees }}'
      rx_end_time: '{{ item.rx_end_time }}'
      rx_start_time: '{{ item.rx_start_time }}'
      spacecraft: '{{ item.spacecraft }}'
      start_azimuth_degrees: '{{ item.start_azimuth_degrees }}'
      start_elevation_degrees: '{{ item.start_elevation_degrees }}'
      tx_end_time: '{{ item.tx_end_time }}'
      tx_start_time: '{{ item.tx_start_time }}'
