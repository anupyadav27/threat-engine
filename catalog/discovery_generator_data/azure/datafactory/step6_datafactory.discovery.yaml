version: '1.0'
provider: azure
service: datafactory
services:
  client: datafactory
  module: azure.mgmt.datafactory
discovery:
- discovery_id: azure.datafactory.factories.list
  calls:
  - action: factories.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      display: '{{ item.display }}'
      origin: '{{ item.origin }}'
      service_specification: '{{ item.service_specification }}'
  uid_template: '{item.id}'
- discovery_id: azure.datafactory.factories.list_by_resource_group
  calls:
  - action: factories.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      public_network_access: '{{ item.public_network_access }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      encryption: '{{ item.encryption }}'
      tags: '{{ item.tags }}'
      create_time: '{{ item.create_time }}'
      e_tag: '{{ item.e_tag }}'
      global_parameters: '{{ item.global_parameters }}'
      purview_configuration: '{{ item.purview_configuration }}'
      repo_configuration: '{{ item.repo_configuration }}'
      version: '{{ item.version }}'
  uid_template: '{item.id}'
- discovery_id: azure.datafactory.changedatacapture.list_by_factory
  for_each: azure.datafactory.factories.list
  calls:
  - action: changedatacapture.list_by_factory
    save_as: response
    on_error: continue
    params:
      factory_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      etag: '{{ item.etag }}'
