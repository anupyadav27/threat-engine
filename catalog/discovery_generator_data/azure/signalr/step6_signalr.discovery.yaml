version: '1.0'
provider: azure
service: signalr
services:
  client: signalr
  module: azure.mgmt.signalr
discovery:
- discovery_id: azure.signalr.signalr.list_by_resource_group
  calls:
  - action: signalr.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      public_network_access: '{{ item.public_network_access }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      cors: '{{ item.cors }}'
      disable_aad_auth: '{{ item.disable_aad_auth }}'
      disable_local_auth: '{{ item.disable_local_auth }}'
      external_ip: '{{ item.external_ip }}'
      features: '{{ item.features }}'
      host_name: '{{ item.host_name }}'
      host_name_prefix: '{{ item.host_name_prefix }}'
      live_trace_configuration: '{{ item.live_trace_configuration }}'
      network_ac_ls: '{{ item.network_ac_ls }}'
      private_endpoint_connections: '{{ item.private_endpoint_connections }}'
      public_port: '{{ item.public_port }}'
      resource_log_configuration: '{{ item.resource_log_configuration }}'
      server_port: '{{ item.server_port }}'
      serverless: '{{ item.serverless }}'
      shared_private_link_resources: '{{ item.shared_private_link_resources }}'
      system_data: '{{ item.system_data }}'
      tls: '{{ item.tls }}'
      upstream: '{{ item.upstream }}'
      version: '{{ item.version }}'
- discovery_id: azure.signalr.signalr.list_by_subscription
  calls:
  - action: signalr.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      public_network_access: '{{ item.public_network_access }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      cors: '{{ item.cors }}'
      disable_aad_auth: '{{ item.disable_aad_auth }}'
      disable_local_auth: '{{ item.disable_local_auth }}'
      external_ip: '{{ item.external_ip }}'
      features: '{{ item.features }}'
      host_name: '{{ item.host_name }}'
      host_name_prefix: '{{ item.host_name_prefix }}'
      live_trace_configuration: '{{ item.live_trace_configuration }}'
      network_ac_ls: '{{ item.network_ac_ls }}'
      private_endpoint_connections: '{{ item.private_endpoint_connections }}'
      public_port: '{{ item.public_port }}'
      resource_log_configuration: '{{ item.resource_log_configuration }}'
      server_port: '{{ item.server_port }}'
      serverless: '{{ item.serverless }}'
      shared_private_link_resources: '{{ item.shared_private_link_resources }}'
      system_data: '{{ item.system_data }}'
      tls: '{{ item.tls }}'
      upstream: '{{ item.upstream }}'
      version: '{{ item.version }}'
- discovery_id: azure.signalr.signalr.list_keys
  for_each: azure.signalr.signalr.list_by_subscription
  calls:
  - action: signalr.list_keys
    save_as: response
    on_error: continue
    params:
      resource_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
- discovery_id: azure.signalr.signalr.list_skus
  for_each: azure.signalr.signalr.list_by_subscription
  calls:
  - action: signalr.list_skus
    save_as: response
    on_error: continue
    params:
      resource_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      capacity: '{{ item.capacity }}'
      resource_type: '{{ item.resource_type }}'
- discovery_id: azure.signalr.signalrcustomcertificates.list
  for_each: azure.signalr.signalr.list_by_subscription
  calls:
  - action: signalrcustomcertificates.list
    save_as: response
    on_error: continue
    params:
      resource_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      current_value: '{{ item.current_value }}'
      limit: '{{ item.limit }}'
      unit: '{{ item.unit }}'
- discovery_id: azure.signalr.signalrcustomdomains.list
  for_each: azure.signalr.signalr.list_by_subscription
  calls:
  - action: signalrcustomdomains.list
    save_as: response
    on_error: continue
    params:
      resource_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      current_value: '{{ item.current_value }}'
      limit: '{{ item.limit }}'
      unit: '{{ item.unit }}'
- discovery_id: azure.signalr.signalrprivateendpointconnections.list
  for_each: azure.signalr.signalr.list_by_subscription
  calls:
  - action: signalrprivateendpointconnections.list
    save_as: response
    on_error: continue
    params:
      resource_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      current_value: '{{ item.current_value }}'
      limit: '{{ item.limit }}'
      unit: '{{ item.unit }}'
- discovery_id: azure.signalr.signalrprivatelinkresources.list
  for_each: azure.signalr.signalr.list_by_subscription
  calls:
  - action: signalrprivatelinkresources.list
    save_as: response
    on_error: continue
    params:
      resource_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      current_value: '{{ item.current_value }}'
      limit: '{{ item.limit }}'
      unit: '{{ item.unit }}'
- discovery_id: azure.signalr.signalrsharedprivatelinkresources.list
  for_each: azure.signalr.signalr.list_by_subscription
  calls:
  - action: signalrsharedprivatelinkresources.list
    save_as: response
    on_error: continue
    params:
      resource_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      current_value: '{{ item.current_value }}'
      limit: '{{ item.limit }}'
      unit: '{{ item.unit }}'
- discovery_id: azure.signalr.list
  calls:
  - action: list
    save_as: list_response
  emit:
    items_for: '{{ list_response.value }}'
    as: item
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
