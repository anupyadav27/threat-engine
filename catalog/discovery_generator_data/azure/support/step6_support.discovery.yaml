version: '1.0'
provider: azure
service: support
services:
  client: support
  module: azure.mgmt.support
discovery:
- discovery_id: azure.support.services.list
  calls:
  - action: services.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      id: '{{ item.id }}'
      advanced_diagnostic_consent: '{{ item.advanced_diagnostic_consent }}'
      contact_details: '{{ item.contact_details }}'
      created_date: '{{ item.created_date }}'
      description: '{{ item.description }}'
      enrollment_id: '{{ item.enrollment_id }}'
      file_workspace_name: '{{ item.file_workspace_name }}'
      is_temporary_ticket: '{{ item.is_temporary_ticket }}'
      modified_date: '{{ item.modified_date }}'
      problem_classification_display_name: '{{ item.problem_classification_display_name
        }}'
      problem_classification_id: '{{ item.problem_classification_id }}'
      problem_scoping_questions: '{{ item.problem_scoping_questions }}'
      problem_start_time: '{{ item.problem_start_time }}'
      quota_ticket_details: '{{ item.quota_ticket_details }}'
      require24_x7_response: '{{ item.require24_x7_response }}'
      secondary_consent: '{{ item.secondary_consent }}'
      service_display_name: '{{ item.service_display_name }}'
      service_id: '{{ item.service_id }}'
      service_level_agreement: '{{ item.service_level_agreement }}'
      severity: '{{ item.severity }}'
      support_engineer: '{{ item.support_engineer }}'
      support_plan_display_name: '{{ item.support_plan_display_name }}'
      support_plan_id: '{{ item.support_plan_id }}'
      support_plan_type: '{{ item.support_plan_type }}'
      support_ticket_id: '{{ item.support_ticket_id }}'
      technical_ticket_details: '{{ item.technical_ticket_details }}'
      title: '{{ item.title }}'
  uid_template: '{item.id}'
