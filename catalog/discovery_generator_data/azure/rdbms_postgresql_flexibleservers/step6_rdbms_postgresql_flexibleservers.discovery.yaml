version: '1.0'
provider: azure
service: rdbms_postgresql_flexibleservers
services:
  client: rdbms_postgresql_flexibleservers
  module: azure.mgmt.rdbms.postgresql_flexibleservers
discovery:
- discovery_id: azure.rdbms_postgresql_flexibleservers.servers.list
  calls:
  - action: servers.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      administrator_login: '{{ item.administrator_login }}'
      administrator_login_password: '{{ item.administrator_login_password }}'
      availability_zone: '{{ item.availability_zone }}'
      backup: '{{ item.backup }}'
      create_mode: '{{ item.create_mode }}'
      fully_qualified_domain_name: '{{ item.fully_qualified_domain_name }}'
      high_availability: '{{ item.high_availability }}'
      maintenance_window: '{{ item.maintenance_window }}'
      minor_version: '{{ item.minor_version }}'
      network: '{{ item.network }}'
      point_in_time_utc: '{{ item.point_in_time_utc }}'
      source_server_resource_id: '{{ item.source_server_resource_id }}'
      state: '{{ item.state }}'
      storage: '{{ item.storage }}'
      system_data: '{{ item.system_data }}'
      version: '{{ item.version }}'
  uid_template: '{item.id}'
- discovery_id: azure.rdbms_postgresql_flexibleservers.servers.list_by_resource_group
  calls:
  - action: servers.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      administrator_login: '{{ item.administrator_login }}'
      administrator_login_password: '{{ item.administrator_login_password }}'
      availability_zone: '{{ item.availability_zone }}'
      backup: '{{ item.backup }}'
      create_mode: '{{ item.create_mode }}'
      fully_qualified_domain_name: '{{ item.fully_qualified_domain_name }}'
      high_availability: '{{ item.high_availability }}'
      maintenance_window: '{{ item.maintenance_window }}'
      minor_version: '{{ item.minor_version }}'
      network: '{{ item.network }}'
      point_in_time_utc: '{{ item.point_in_time_utc }}'
      source_server_resource_id: '{{ item.source_server_resource_id }}'
      state: '{{ item.state }}'
      storage: '{{ item.storage }}'
      system_data: '{{ item.system_data }}'
      version: '{{ item.version }}'
  uid_template: '{item.id}'
- discovery_id: azure.rdbms_postgresql_flexibleservers.configurations.list_by_server
  for_each: azure.rdbms_postgresql_flexibleservers.servers.list
  calls:
  - action: configurations.list_by_server
    save_as: response
    on_error: continue
    params:
      server_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      end_ip_address: '{{ item.end_ip_address }}'
      start_ip_address: '{{ item.start_ip_address }}'
      system_data: '{{ item.system_data }}'
- discovery_id: azure.rdbms_postgresql_flexibleservers.databases.list_by_server
  for_each: azure.rdbms_postgresql_flexibleservers.servers.list
  calls:
  - action: databases.list_by_server
    save_as: response
    on_error: continue
    params:
      server_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      end_ip_address: '{{ item.end_ip_address }}'
      start_ip_address: '{{ item.start_ip_address }}'
      system_data: '{{ item.system_data }}'
- discovery_id: azure.rdbms_postgresql_flexibleservers.firewallrules.list_by_server
  for_each: azure.rdbms_postgresql_flexibleservers.servers.list
  calls:
  - action: firewallrules.list_by_server
    save_as: response
    on_error: continue
    params:
      server_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      end_ip_address: '{{ item.end_ip_address }}'
      start_ip_address: '{{ item.start_ip_address }}'
      system_data: '{{ item.system_data }}'
