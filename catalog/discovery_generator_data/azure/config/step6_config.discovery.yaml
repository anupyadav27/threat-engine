version: '1.0'
provider: azure
service: config
discovery:
- discovery_id: azure.appconfiguration.configurationstores.configurationstores_list
  calls:
  - action: configurationstores.ConfigurationStores_List
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      tags: '{{ item.tags }}'
      location: '{{ item.location }}'
      identity: '{{ item.identity }}'
      sku: '{{ item.sku }}'
      system_data: '{{ item.system_data }}'
      provisioning_state: '{{ item.provisioning_state }}'
      creation_date: '{{ item.creation_date }}'
      endpoint: '{{ item.endpoint }}'
      encryption: '{{ item.encryption }}'
      private_endpoint_connections: '{{ item.private_endpoint_connections }}'
      public_network_access: '{{ item.public_network_access }}'
      disable_local_auth: '{{ item.disable_local_auth }}'
      soft_delete_retention_in_days: '{{ item.soft_delete_retention_in_days }}'
      default_key_value_revision_retention_period_in_seconds: '{{ item.default_key_value_revision_retention_period_in_seconds
        }}'
      enable_purge_protection: '{{ item.enable_purge_protection }}'
      data_plane_proxy: '{{ item.data_plane_proxy }}'
      create_mode: '{{ item.create_mode }}'
  uid_template: '{item.id}'
