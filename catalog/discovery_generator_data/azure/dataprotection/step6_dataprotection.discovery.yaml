      e_tag: '{{ response.e_tag }}'
- discovery_id: azure.dataprotection.backupinstances.get_backup_instance_operation_result
  for_each: azure.dataprotection.backupvaults.get_in_resource_group
  calls:
  - action: backupinstances.get_backup_instance_operation_result
    save_as: response
    on_error: continue
    params:
      vault_name: '{{ item.name }}'
  emit:
    as: item
    item:
      identity: '{{ response.identity }}'
      type: '{{ response.type }}'
      properties: '{{ response.properties }}'
      location: '{{ response.location }}'
      sku: '{{ response.sku }}'
      name: '{{ response.name }}'
      provisioning_state: '{{ response.provisioning_state }}'
      zones: '{{ response.zones }}'
      kind: '{{ response.kind }}'
      id: '{{ response.id }}'
      tags: '{{ response.tags }}'
