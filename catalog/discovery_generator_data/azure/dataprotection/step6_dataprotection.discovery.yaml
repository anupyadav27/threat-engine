version: '1.0'
provider: azure
service: dataprotection
services:
  client: dataprotection
  module: azure.mgmt.dataprotection
discovery:
- discovery_id: azure.dataprotection.backupvaults.get_in_resource_group
  calls:
  - action: backupvaults.get_in_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      identity: '{{ response.identity }}'
      properties: '{{ response.properties }}'
      e_tag: '{{ response.e_tag }}'
- discovery_id: azure.dataprotection.backupvaults.get_in_subscription
  calls:
  - action: backupvaults.get_in_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      identity: '{{ response.identity }}'
      properties: '{{ response.properties }}'
      e_tag: '{{ response.e_tag }}'
- discovery_id: azure.dataprotection.dataprotection.list
  calls:
  - action: dataprotection.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
- discovery_id: azure.dataprotection.resourceguards.get_resources_in_resource_group
  calls:
  - action: resourceguards.get_resources_in_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      properties: '{{ response.properties }}'
      e_tag: '{{ response.e_tag }}'
