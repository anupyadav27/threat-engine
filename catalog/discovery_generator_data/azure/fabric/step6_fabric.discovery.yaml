version: '1.0'
provider: azure
service: fabric
services:
  client: fabric
  module: azure.mgmt.fabric
discovery:
- discovery_id: azure.fabric.fabriccapacities.list_by_resource_group
  calls:
  - action: fabriccapacities.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
  uid_template: '{item.id}'
- discovery_id: azure.fabric.fabriccapacities.list_by_subscription
  calls:
  - action: fabriccapacities.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
  uid_template: '{item.id}'
- discovery_id: azure.fabric.fabriccapacities.list_skus
  calls:
  - action: fabriccapacities.list_skus
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      locations: '{{ item.locations }}'
      resource_type: '{{ item.resource_type }}'
  uid_template: '{item.id}'
