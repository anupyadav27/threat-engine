version: '1.0'
provider: azure
service: msi
services:
  client: msi
  module: azure.mgmt.msi.v2021_09_30_preview
discovery:
- discovery_id: azure.msi.userassignedidentities.list_by_resource_group
  calls:
  - action: userassignedidentities.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      principal_id: '{{ item.principal_id }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      client_id: '{{ item.client_id }}'
      tenant_id: '{{ item.tenant_id }}'
  uid_template: '{item.id}'
- discovery_id: azure.msi.userassignedidentities.list_by_subscription
  calls:
  - action: userassignedidentities.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      principal_id: '{{ item.principal_id }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      client_id: '{{ item.client_id }}'
      tenant_id: '{{ item.tenant_id }}'
  uid_template: '{item.id}'
- discovery_id: azure.msi.userassignedidentities.list_associated_resources
  for_each: azure.msi.userassignedidentities.list_by_subscription
  calls:
  - action: userassignedidentities.list_associated_resources
    save_as: response
    on_error: continue
    params:
      resource_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      resource_group: '{{ item.resource_group }}'
      subscription_display_name: '{{ item.subscription_display_name }}'
      subscription_id: '{{ item.subscription_id }}'
