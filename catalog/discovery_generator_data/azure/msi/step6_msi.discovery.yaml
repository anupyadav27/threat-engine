version: '1.0'
provider: azure
service: msi
services:
  client: msi
  module: azure.mgmt.msi.v2021_09_30_preview
discovery:
  # ── userassignedidentities.list_by_resource_group [root] ──
  - discovery_id: azure.msi.userassignedidentities.list_by_resource_group
    calls:
      - action: userassignedidentities.list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
