version: '1.0'
provider: azure
service: api
services:
  client: api
  module: azure.mgmt.api
discovery:
- discovery_id: azure.api.list
  calls:
  - action: list
    save_as: list_response
  emit:
    items_for: '{{ list_response.value }}'
    as: item
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      tags: '{{ item.tags }}'
      sku: '{{ item.sku }}'
      system_data: '{{ item.system_data }}'
      location: '{{ item.location }}'
      etag: '{{ item.etag }}'
      provisioning_state: '{{ item.provisioning_state }}'
      target_provisioning_state: '{{ item.target_provisioning_state }}'
      created_at_utc: '{{ item.created_at_utc }}'
      frontend: '{{ item.frontend }}'
      backend: '{{ item.backend }}'
      configuration_api: '{{ item.configuration_api }}'
      virtual_network_type: '{{ item.virtual_network_type }}'
- discovery_id: azure.apimanagement.api.list_by_service
  calls:
  - action: api.list_by_service
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      description: '{{ item.description }}'
      authentication_settings: '{{ item.authentication_settings }}'
      subscription_key_parameter_names: '{{ item.subscription_key_parameter_names
        }}'
      api_type: '{{ item.api_type }}'
      api_revision: '{{ item.api_revision }}'
      api_version: '{{ item.api_version }}'
      is_current: '{{ item.is_current }}'
      is_online: '{{ item.is_online }}'
      api_revision_description: '{{ item.api_revision_description }}'
      api_version_description: '{{ item.api_version_description }}'
      api_version_set_id: '{{ item.api_version_set_id }}'
      subscription_required: '{{ item.subscription_required }}'
      terms_of_service_url: '{{ item.terms_of_service_url }}'
      contact: '{{ item.contact }}'
      license: '{{ item.license }}'
      source_api_id: '{{ item.source_api_id }}'
      display_name: '{{ item.display_name }}'
      service_url: '{{ item.service_url }}'
      path: '{{ item.path }}'
      protocols: '{{ item.protocols }}'
      api_version_set: '{{ item.api_version_set }}'
      provisioning_state: '{{ item.provisioning_state }}'
