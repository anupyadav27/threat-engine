version: '1.0'
provider: azure
service: functions
discovery:
- discovery_id: azure.web.webapps.list_functions
  calls:
  - action: webapps.list_functions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      kind: '{{ item.kind }}'
      type: '{{ item.type }}'
      function_app_id: '{{ item.function_app_id }}'
      script_root_path_href: '{{ item.script_root_path_href }}'
      script_href: '{{ item.script_href }}'
      config_href: '{{ item.config_href }}'
      test_data_href: '{{ item.test_data_href }}'
      secrets_file_href: '{{ item.secrets_file_href }}'
      href: '{{ item.href }}'
      config: '{{ item.config }}'
      files: '{{ item.files }}'
      test_data: '{{ item.test_data }}'
      invoke_url_template: '{{ item.invoke_url_template }}'
      language: '{{ item.language }}'
      is_disabled: '{{ item.is_disabled }}'
  uid_template: '{item.id}'
