version: '1.0'
provider: azure
service: purview
services:
  client: purview
  module: azure.mgmt.purview
discovery:
- discovery_id: azure.purview.accounts.list_by_resource_group
  calls:
  - action: accounts.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      count: '{{ item.count }}'
  uid_template: '{item.id}'
- discovery_id: azure.purview.accounts.list_by_subscription
  calls:
  - action: accounts.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      count: '{{ item.count }}'
  uid_template: '{item.id}'
- discovery_id: azure.purview.accounts.list_keys
  for_each: azure.purview.privatelinkresources.get_by_group_id
  calls:
  - action: accounts.list_keys
    save_as: response
    on_error: continue
    params:
      account_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
- discovery_id: azure.purview.privateendpointconnections.list_by_account
  for_each: azure.purview.privatelinkresources.get_by_group_id
  calls:
  - action: privateendpointconnections.list_by_account
    save_as: response
    on_error: continue
    params:
      account_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      count: '{{ item.count }}'
- discovery_id: azure.purview.privatelinkresources.list_by_account
  for_each: azure.purview.privatelinkresources.get_by_group_id
  calls:
  - action: privatelinkresources.list_by_account
    save_as: response
    on_error: continue
    params:
      account_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      count: '{{ item.count }}'
