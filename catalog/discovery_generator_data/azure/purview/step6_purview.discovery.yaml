# Discovery YAML — purview (Azure)
# Generated: 2026-04-15T10:39:31Z
# Source: step1b_operation_registry.json (qualified ops + dependency chains)
# Actions use {category}.{method} format for SDK method resolution
version: '1.0'
provider: azure
service: purview
services:
  client: purview
  module: azure.mgmt.purview
discovery:
  # ── accounts.list_by_resource_group [root] ──
  - discovery_id: azure.purview.accounts.list_by_resource_group
    calls:
      - action: accounts.list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        type: '{{ item.type }}'
        name: '{{ item.name }}'
        id: '{{ item.id }}'
        count: '{{ item.count }}'
  # ── accounts.list_by_subscription [root] ──
  - discovery_id: azure.purview.accounts.list_by_subscription
    calls:
      - action: accounts.list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        type: '{{ item.type }}'
        name: '{{ item.name }}'
        id: '{{ item.id }}'
        count: '{{ item.count }}'
  # ════════════════════════════════════════
  # Dependent operations (for_each + params)
  # ════════════════════════════════════════
  # ── accounts.list_keys [dependent] ──
  - discovery_id: azure.purview.accounts.list_keys
    for_each: azure.purview.privatelinkresources.get_by_group_id
    calls:
      - action: accounts.list_keys
        save_as: response
        on_error: continue
        params:
          account_name: '{{ item.name }}'
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        identity: '{{ item.identity }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        location: '{{ item.location }}'
        sku: '{{ item.sku }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        zones: '{{ item.zones }}'
        kind: '{{ item.kind }}'
        id: '{{ item.id }}'
        tags: '{{ item.tags }}'
  # ── privateendpointconnections.list_by_account [dependent] ──
  - discovery_id: azure.purview.privateendpointconnections.list_by_account
    for_each: azure.purview.privatelinkresources.get_by_group_id
    calls:
      - action: privateendpointconnections.list_by_account
        save_as: response
        on_error: continue
        params:
          account_name: '{{ item.name }}'
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        type: '{{ item.type }}'
        name: '{{ item.name }}'
        id: '{{ item.id }}'
        count: '{{ item.count }}'
  # ── privatelinkresources.list_by_account [dependent] ──
  - discovery_id: azure.purview.privatelinkresources.list_by_account
    for_each: azure.purview.privatelinkresources.get_by_group_id
    calls:
      - action: privatelinkresources.list_by_account
        save_as: response
        on_error: continue
        params:
          account_name: '{{ item.name }}'
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        type: '{{ item.type }}'
        name: '{{ item.name }}'
        id: '{{ item.id }}'
        count: '{{ item.count }}'

  # ── Unwired dependent ops (no root producer found) ──
  # SKIP: azure.purview.privatelinkresources.get_by_group_id — required_params: ['account_name', 'group_id']
