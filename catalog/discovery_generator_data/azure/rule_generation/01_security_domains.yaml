# Security Domains — CSP-Agnostic (same 14 domains used for AWS, Azure, GCP)
# These define the TOP-LEVEL security categories for all check rules.
# Source: AWS engine_check_aws metadata (2,300 rules across 403 services)

domains:
  - id: identity_and_access_management
    name: Identity & Access Management
    description: Authentication, authorization, RBAC, MFA, least privilege, service accounts
    assertion_domains:
      - identity_access.least_privilege
      - identity_access.authentication
      - identity_access.federation
      - identity_access.passwordless_authn
      - iam.access_control
      - rbac_entitlements.least_privilege

  - id: network_security_and_connectivity
    name: Network Security & Connectivity
    description: Network isolation, firewalls, NSGs, private endpoints, VNet, public access
    assertion_domains:
      - network_security.network_access
      - network_security.monitoring
      - network_perimeter.intrusion_detection

  - id: data_protection_and_privacy
    name: Data Protection & Privacy
    description: Encryption at rest/transit, key management, data lifecycle, public exposure
    assertion_domains:
      - data_protection.encryption_rest
      - data_protection.encryption_transit
      - data_protection.data_lifecycle
      - data_protection_storage.public_exposure
      - data_protection_storage.backup_recovery

  - id: logging_monitoring_and_alerting
    name: Logging, Monitoring & Alerting
    description: Audit logging, diagnostic settings, activity logs, metric alerts
    assertion_domains:
      - logging_monitoring.logging
      - logging_monitoring.monitoring

  - id: configuration_and_change_management
    name: Configuration & Change Management
    description: Resource configuration baselines, drift detection, compliance posture
    assertion_domains:
      - security.configuration
      - compliance.policy_enforcement

  - id: resilience_and_disaster_recovery
    name: Resilience & Disaster Recovery
    description: Backup, geo-redundancy, zone redundancy, soft delete, purge protection
    assertion_domains:
      - resilience.backup_recovery
      - resilience_recovery.disaster_recovery
      - resilience_recovery.ransomware_protection

  - id: secrets_and_key_management
    name: Secrets & Key Management
    description: Key Vault, CMK encryption, key rotation, certificate management
    assertion_domains:
      - secrets_key_mgmt.secret_storage
      - key_management.acm_pca_certificateauthority_cloudwatch_audit_logging
      - key_management.acm_pca_certificateauthority_enabled_and_active
      - key_management.acm_pca_certificateauthority_revocation_configured

  - id: storage_and_database_security
    name: Storage & Database Security
    description: Storage accounts, databases, data warehouses, access controls
    assertion_domains:
      - db.security
      - storage_datastores.storage_security
      - data_warehouse.security
      - data_catalog.security

  - id: container_and_kubernetes_security
    name: Container & Kubernetes Security
    description: AKS, container registries, RBAC, network policies, pod security
    assertion_domains:
      - containers_kubernetes.monitoring

  - id: application_and_api_security
    name: Application & API Security
    description: App Service, Functions, API Management, WAF, TLS
    assertion_domains:
      - api_security.monitoring
      - api_security.rate_limiting
      - api_security.validation

  - id: serverless_and_faas_security
    name: Serverless & FaaS Security
    description: Functions, Logic Apps, managed identity, secret management
    assertion_domains:
      - serverless_paas.secret_management
      - serverless_paas.secret_hygiene

  - id: threat_detection_and_incident_response
    name: Threat Detection & Incident Response
    description: Defender for Cloud, alerts, incident workflows, threat intelligence
    assertion_domains:
      - monitoring_security.threat_detection
      - monitoring_security.siem
      - monitoring_security.forensics
      - incident_response.notification

  - id: compliance_and_governance
    name: Compliance & Governance
    description: Azure Policy, management groups, tagging, resource locks
    assertion_domains:
      - compliance.policy_enforcement
      - platform_surfaces_versions.platform_monitoring

  - id: ai_ml_and_model_security
    name: AI/ML & Model Security
    description: Machine learning workspaces, model security, data analytics
    assertion_domains:
      - machine_learning.model_security
      - data_analytics.monitoring
      - data_lake.catalog
