      private_link_service_connection_state: '{{ item.private_link_service_connection_state
        }}'
- discovery_id: azure.redis.privatelinkresources.list_by_redis_cache
  for_each: azure.redis.redis.list_by_subscription
  calls:
  - action: privatelinkresources.list_by_redis_cache
    save_as: response
    on_error: continue
    params:
      cache_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      group_id: '{{ item.group_id }}'
      required_members: '{{ item.required_members }}'
      required_zone_names: '{{ item.required_zone_names }}'
- discovery_id: azure.redis.redis.list_keys
  for_each: azure.redis.redis.list_by_subscription
  calls:
  - action: redis.list_keys
    save_as: response
    on_error: continue
    params:
      name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
- discovery_id: azure.redis.redis.list_upgrade_notifications
  for_each: azure.redis.redis.list_by_subscription
  calls:
  - action: redis.list_upgrade_notifications
    save_as: response
    on_error: continue
    params:
      name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      timestamp: '{{ item.timestamp }}'
      upsell_notification: '{{ item.upsell_notification }}'
- discovery_id: azure.redis.list_by_subscription
  calls:
  - action: list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
