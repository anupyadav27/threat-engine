    save_as: response
    on_error: continue
    params:
      cache_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      private_endpoint: '{{ item.private_endpoint }}'
      private_link_service_connection_state: '{{ item.private_link_service_connection_state
        }}'
- discovery_id: azure.redis.linkedserver.list
  for_each: azure.redis.redis.list_by_subscription
  calls:
  - action: linkedserver.list
    save_as: response
    on_error: continue
    params:
      name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      private_endpoint: '{{ item.private_endpoint }}'
      private_link_service_connection_state: '{{ item.private_link_service_connection_state
        }}'
- discovery_id: azure.redis.patchschedules.list_by_redis_resource
  for_each: azure.redis.redis.list_by_subscription
  calls:
  - action: patchschedules.list_by_redis_resource
    save_as: response
    on_error: continue
    params:
      cache_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      schedule_entries: '{{ item.schedule_entries }}'
- discovery_id: azure.redis.privateendpointconnections.list
  for_each: azure.redis.redis.list_by_subscription
  calls:
  - action: privateendpointconnections.list
    save_as: response
