version: '1.0'
provider: azure
service: trafficmanager
services:
  client: trafficmanager
  module: azure.mgmt.trafficmanager
discovery:
  # ── geographichierarchies.get_default [root] ──
  - discovery_id: azure.trafficmanager.geographichierarchies.get_default
    calls:
      - action: geographichierarchies.get_default
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        identity: '{{ response.identity }}'
        type: '{{ response.type }}'
        properties: '{{ response.properties }}'
        location: '{{ response.location }}'
        sku: '{{ response.sku }}'
        name: '{{ response.name }}'
        provisioning_state: '{{ response.provisioning_state }}'
        zones: '{{ response.zones }}'
        kind: '{{ response.kind }}'
        id: '{{ response.id }}'
        tags: '{{ response.tags }}'
  # ── profiles.list_by_resource_group [root] ──
  - discovery_id: azure.trafficmanager.profiles.list_by_resource_group
    calls:
      - action: profiles.list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        type: '{{ item.type }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        id: '{{ item.id }}'
        tags: '{{ item.tags }}'
        allowed_endpoint_record_types: '{{ item.allowed_endpoint_record_types }}'
        dns_config: '{{ item.dns_config }}'
        endpoints: '{{ item.endpoints }}'
        max_return: '{{ item.max_return }}'
        monitor_config: '{{ item.monitor_config }}'
        profile_status: '{{ item.profile_status }}'
        traffic_routing_method: '{{ item.traffic_routing_method }}'
        traffic_view_enrollment_status: '{{ item.traffic_view_enrollment_status }}'
  # ── profiles.list_by_subscription [root] ──
  - discovery_id: azure.trafficmanager.profiles.list_by_subscription
    calls:
      - action: profiles.list_by_subscription
        save_as: response
