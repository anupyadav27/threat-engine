    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        type: '{{ item.type }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        id: '{{ item.id }}'
        tags: '{{ item.tags }}'
