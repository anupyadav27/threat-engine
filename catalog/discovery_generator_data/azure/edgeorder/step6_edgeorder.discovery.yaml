version: '1.0'
provider: azure
service: edgeorder
services:
  client: edgeorder
  module: azure.mgmt.edgeorder
discovery:
- discovery_id: azure.edgeorder.edgeordermanagementclientmixin.list_addresses_at_resource_group_level
  calls:
  - action: edgeordermanagementclientmixin.list_addresses_at_resource_group_level
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      address_validation_status: '{{ item.address_validation_status }}'
      contact_details: '{{ item.contact_details }}'
      shipping_address: '{{ item.shipping_address }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.edgeorder.edgeordermanagementclientmixin.list_addresses_at_subscription_level
  calls:
  - action: edgeordermanagementclientmixin.list_addresses_at_subscription_level
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      address_validation_status: '{{ item.address_validation_status }}'
      contact_details: '{{ item.contact_details }}'
      shipping_address: '{{ item.shipping_address }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.edgeorder.edgeordermanagementclientmixin.list_operations
  calls:
  - action: edgeordermanagementclientmixin.list_operations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      action_type: '{{ item.action_type }}'
      display: '{{ item.display }}'
      is_data_action: '{{ item.is_data_action }}'
      origin: '{{ item.origin }}'
  uid_template: '{item.id}'
- discovery_id: azure.edgeorder.edgeordermanagementclientmixin.list_order_at_resource_group_level
  calls:
  - action: edgeordermanagementclientmixin.list_order_at_resource_group_level
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      current_stage: '{{ item.current_stage }}'
      order_item_ids: '{{ item.order_item_ids }}'
      order_stage_history: '{{ item.order_stage_history }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.edgeorder.edgeordermanagementclientmixin.list_order_at_subscription_level
  calls:
  - action: edgeordermanagementclientmixin.list_order_at_subscription_level
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      current_stage: '{{ item.current_stage }}'
      order_item_ids: '{{ item.order_item_ids }}'
      order_stage_history: '{{ item.order_stage_history }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.edgeorder.edgeordermanagementclientmixin.list_order_items_at_resource_group_level
  calls:
  - action: edgeordermanagementclientmixin.list_order_items_at_resource_group_level
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      address_details: '{{ item.address_details }}'
      order_id: '{{ item.order_id }}'
      order_item_details: '{{ item.order_item_details }}'
      start_time: '{{ item.start_time }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.edgeorder.edgeordermanagementclientmixin.list_order_items_at_subscription_level
  calls:
  - action: edgeordermanagementclientmixin.list_order_items_at_subscription_level
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      address_details: '{{ item.address_details }}'
      order_id: '{{ item.order_id }}'
      order_item_details: '{{ item.order_item_details }}'
      start_time: '{{ item.start_time }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.edgeorder.edgeordermanagementclientmixin.list_product_families_metadata
  calls:
  - action: edgeordermanagementclientmixin.list_product_families_metadata
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      availability_information: '{{ item.availability_information }}'
      cost_information: '{{ item.cost_information }}'
      description: '{{ item.description }}'
      display_name: '{{ item.display_name }}'
      filterable_properties: '{{ item.filterable_properties }}'
      hierarchy_information: '{{ item.hierarchy_information }}'
      image_information: '{{ item.image_information }}'
      product_lines: '{{ item.product_lines }}'
      resource_provider_details: '{{ item.resource_provider_details }}'
  uid_template: '{item.id}'
- discovery_id: azure.edgeorder.edgeordermanagementclientmixin.get_address_by_name
  for_each: azure.edgeorder.edgeordermanagementclientmixin.list_addresses_at_resource_group_level
  calls:
  - action: edgeordermanagementclientmixin.get_address_by_name
    save_as: response
    on_error: continue
    params:
      address_name: '{{ item.name }}'
  emit:
    as: item
    item:
      identity: '{{ response.identity }}'
      type: '{{ response.type }}'
      properties: '{{ response.properties }}'
      location: '{{ response.location }}'
      sku: '{{ response.sku }}'
      name: '{{ response.name }}'
      provisioning_state: '{{ response.provisioning_state }}'
      zones: '{{ response.zones }}'
      kind: '{{ response.kind }}'
      id: '{{ response.id }}'
      tags: '{{ response.tags }}'
- discovery_id: azure.edgeorder.edgeordermanagementclientmixin.get_order_by_name
  for_each: azure.edgeorder.edgeordermanagementclientmixin.list_addresses_at_resource_group_level
  calls:
  - action: edgeordermanagementclientmixin.get_order_by_name
    save_as: response
    on_error: continue
    params:
      order_name: '{{ item.name }}'
      location: '{{ item.location }}'
  emit:
    as: item
    item:
      identity: '{{ response.identity }}'
      type: '{{ response.type }}'
      properties: '{{ response.properties }}'
      location: '{{ response.location }}'
      sku: '{{ response.sku }}'
      name: '{{ response.name }}'
      provisioning_state: '{{ response.provisioning_state }}'
      zones: '{{ response.zones }}'
      kind: '{{ response.kind }}'
      id: '{{ response.id }}'
      tags: '{{ response.tags }}'
