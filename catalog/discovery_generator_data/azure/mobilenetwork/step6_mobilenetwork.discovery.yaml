version: '1.0'
provider: azure
service: mobilenetwork
services:
  client: mobilenetwork
  module: azure.mgmt.mobilenetwork
discovery:
- discovery_id: azure.mobilenetwork.mobilenetworks.list_by_resource_group
  calls:
  - action: mobilenetworks.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      encryption_key: '{{ item.encryption_key }}'
      mobile_network: '{{ item.mobile_network }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
