version: '1.0'
provider: azure
service: blueprint
services:
  client: blueprint
  module: boto3.client
discovery:
- discovery_id: azure.blueprint.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
  uid_template: '{item.id}'
