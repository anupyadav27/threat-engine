version: '1.0'
provider: azure
service: newrelic
services:
  client: newrelic
  module: azure.mgmt.newrelic
discovery:
- discovery_id: azure.newrelic.accounts.accounts_list
  calls:
  - action: accounts.Accounts_List
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.id}'
- discovery_id: azure.newrelic.operations.operations_list
  calls:
  - action: operations.Operations_List
    save_as: response
    on_error: continue
  emit:
