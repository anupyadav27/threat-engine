version: '1.0'
provider: azure
service: application
discovery:
- discovery_id: azure.network.applicationgateways.list_all
  calls:
  - action: applicationgateways.list_all
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      etag: '{{ item.etag }}'
      zones: '{{ item.zones }}'
      identity: '{{ item.identity }}'
      sku: '{{ item.sku }}'
      ssl_policy: '{{ item.ssl_policy }}'
      operational_state: '{{ item.operational_state }}'
      gateway_ip_configurations: '{{ item.gateway_ip_configurations }}'
      authentication_certificates: '{{ item.authentication_certificates }}'
      trusted_root_certificates: '{{ item.trusted_root_certificates }}'
      trusted_client_certificates: '{{ item.trusted_client_certificates }}'
      ssl_certificates: '{{ item.ssl_certificates }}'
      frontend_ip_configurations: '{{ item.frontend_ip_configurations }}'
      frontend_ports: '{{ item.frontend_ports }}'
      probes: '{{ item.probes }}'
      backend_address_pools: '{{ item.backend_address_pools }}'
      backend_http_settings_collection: '{{ item.backend_http_settings_collection
        }}'
      backend_settings_collection: '{{ item.backend_settings_collection }}'
      http_listeners: '{{ item.http_listeners }}'
      listeners: '{{ item.listeners }}'
      ssl_profiles: '{{ item.ssl_profiles }}'
      url_path_maps: '{{ item.url_path_maps }}'
      request_routing_rules: '{{ item.request_routing_rules }}'
      routing_rules: '{{ item.routing_rules }}'
      rewrite_rule_sets: '{{ item.rewrite_rule_sets }}'
      redirect_configurations: '{{ item.redirect_configurations }}'
      web_application_firewall_configuration: '{{ item.web_application_firewall_configuration
        }}'
      firewall_policy: '{{ item.firewall_policy }}'
      enable_http2: '{{ item.enable_http2 }}'
      enable_fips: '{{ item.enable_fips }}'
      autoscale_configuration: '{{ item.autoscale_configuration }}'
      private_link_configurations: '{{ item.private_link_configurations }}'
      private_endpoint_connections: '{{ item.private_endpoint_connections }}'
      resource_guid: '{{ item.resource_guid }}'
      provisioning_state: '{{ item.provisioning_state }}'
      custom_error_configurations: '{{ item.custom_error_configurations }}'
      force_firewall_policy_association: '{{ item.force_firewall_policy_association
        }}'
      load_distribution_policies: '{{ item.load_distribution_policies }}'
      entra_jwt_validation_configs: '{{ item.entra_jwt_validation_configs }}'
      global_configuration: '{{ item.global_configuration }}'
      default_predefined_ssl_policy: '{{ item.default_predefined_ssl_policy }}'
  uid_template: '{item.id}'
- discovery_id: azure.network.webapplicationfirewallpolicies.list
  calls:
  - action: webapplicationfirewallpolicies.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      etag: '{{ item.etag }}'
      policy_settings: '{{ item.policy_settings }}'
      custom_rules: '{{ item.custom_rules }}'
      application_gateways: '{{ item.application_gateways }}'
      provisioning_state: '{{ item.provisioning_state }}'
      resource_state: '{{ item.resource_state }}'
      managed_rules: '{{ item.managed_rules }}'
      http_listeners: '{{ item.http_listeners }}'
      path_based_rules: '{{ item.path_based_rules }}'
      application_gateway_for_containers: '{{ item.application_gateway_for_containers
        }}'
  uid_template: '{item.id}'
