version: '1.0'
provider: azure
service: nginx
services:
  client: nginx
  module: azure.mgmt.nginx
discovery:
- discovery_id: azure.nginx.deployments.list
  calls:
  - action: deployments.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      display: '{{ item.display }}'
      is_data_action: '{{ item.is_data_action }}'
  uid_template: '{item.id}'
- discovery_id: azure.nginx.deployments.list_by_resource_group
  calls:
  - action: deployments.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.nginx.certificates.list
  for_each: azure.nginx.deployments.list
  calls:
  - action: certificates.list
    save_as: response
    on_error: continue
    params:
      deployment_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      display: '{{ item.display }}'
      is_data_action: '{{ item.is_data_action }}'
- discovery_id: azure.nginx.configurations.list
  for_each: azure.nginx.deployments.list
  calls:
  - action: configurations.list
    save_as: response
    on_error: continue
    params:
      deployment_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      display: '{{ item.display }}'
      is_data_action: '{{ item.is_data_action }}'
