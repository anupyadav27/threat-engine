# Discovery YAML — nginx (Azure)
# Generated: 2026-04-15T10:39:31Z
# Source: step1b_operation_registry.json (qualified ops + dependency chains)
# Actions use {category}.{method} format for SDK method resolution
version: '1.0'
provider: azure
service: nginx
services:
  client: nginx
  module: azure.mgmt.nginx
discovery:
  # ── deployments.list [root] ──
  - discovery_id: azure.nginx.deployments.list
    calls:
      - action: deployments.list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        type: '{{ item.type }}'
        name: '{{ item.name }}'
        id: '{{ item.id }}'
        display: '{{ item.display }}'
        is_data_action: '{{ item.is_data_action }}'
  # ── deployments.list_by_resource_group [root] ──
  - discovery_id: azure.nginx.deployments.list_by_resource_group
    calls:
      - action: deployments.list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        identity: '{{ item.identity }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        location: '{{ item.location }}'
        sku: '{{ item.sku }}'
        name: '{{ item.name }}'
        id: '{{ item.id }}'
        tags: '{{ item.tags }}'
        system_data: '{{ item.system_data }}'
  # ════════════════════════════════════════
  # Dependent operations (for_each + params)
  # ════════════════════════════════════════
  # ── certificates.list [dependent] ──
  - discovery_id: azure.nginx.certificates.list
    for_each: azure.nginx.deployments.list
    calls:
      - action: certificates.list
        save_as: response
        on_error: continue
        params:
          deployment_name: '{{ item.name }}'
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        type: '{{ item.type }}'
        name: '{{ item.name }}'
        id: '{{ item.id }}'
        display: '{{ item.display }}'
        is_data_action: '{{ item.is_data_action }}'
  # ── configurations.list [dependent] ──
  - discovery_id: azure.nginx.configurations.list
    for_each: azure.nginx.deployments.list
    calls:
      - action: configurations.list
        save_as: response
        on_error: continue
        params:
          deployment_name: '{{ item.name }}'
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        type: '{{ item.type }}'
        name: '{{ item.name }}'
        id: '{{ item.id }}'
        display: '{{ item.display }}'
        is_data_action: '{{ item.is_data_action }}'
