version: '1.0'
provider: azure
service: iotcentral
services:
  client: iotcentral
  module: azure.mgmt.iotcentral
discovery:
  # ── apps.list_by_resource_group [root] ──
  - discovery_id: azure.iotcentral.apps.list_by_resource_group
    calls:
      - action: apps.list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        identity: '{{ item.identity }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        location: '{{ item.location }}'
        sku: '{{ item.sku }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        zones: '{{ item.zones }}'
        kind: '{{ item.kind }}'
        id: '{{ item.id }}'
        tags: '{{ item.tags }}'
