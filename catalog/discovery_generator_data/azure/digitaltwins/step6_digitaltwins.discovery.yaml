version: '1.0'
provider: azure
service: digitaltwins
services:
  client: digitaltwins
  module: azure.mgmt.digitaltwins
discovery:
- discovery_id: azure.digitaltwins.digitaltwins.list
  calls:
  - action: digitaltwins.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.digitaltwins.digitaltwins.list_by_resource_group
  calls:
  - action: digitaltwins.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      public_network_access: '{{ item.public_network_access }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      created_time: '{{ item.created_time }}'
      host_name: '{{ item.host_name }}'
      last_updated_time: '{{ item.last_updated_time }}'
      private_endpoint_connections: '{{ item.private_endpoint_connections }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.digitaltwins.digitaltwinsendpoint.list
  for_each: azure.digitaltwins.digitaltwins.list
  calls:
  - action: digitaltwinsendpoint.list
    save_as: response
    on_error: continue
    params:
      resource_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      system_data: '{{ item.system_data }}'
- discovery_id: azure.digitaltwins.privateendpointconnections.list
  for_each: azure.digitaltwins.digitaltwins.list
  calls:
  - action: privateendpointconnections.list
    save_as: response
    on_error: continue
    params:
      resource_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      system_data: '{{ item.system_data }}'
- discovery_id: azure.digitaltwins.privatelinkresources.list
  for_each: azure.digitaltwins.digitaltwins.list
  calls:
  - action: privatelinkresources.list
    save_as: response
    on_error: continue
    params:
      resource_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      system_data: '{{ item.system_data }}'
- discovery_id: azure.digitaltwins.timeseriesdatabaseconnections.list
  for_each: azure.digitaltwins.digitaltwins.list
  calls:
  - action: timeseriesdatabaseconnections.list
    save_as: response
    on_error: continue
    params:
      resource_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      system_data: '{{ item.system_data }}'
