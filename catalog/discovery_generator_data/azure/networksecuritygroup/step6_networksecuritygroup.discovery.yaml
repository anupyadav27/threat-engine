version: '1.0'
provider: azure
service: networksecuritygroup
discovery:
- discovery_id: azure.network.networksecuritygroups.list_all
  calls:
  - action: networksecuritygroups.list_all
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      etag: '{{ item.etag }}'
      flush_connection: '{{ item.flush_connection }}'
      security_rules: '{{ item.security_rules }}'
      default_security_rules: '{{ item.default_security_rules }}'
      network_interfaces: '{{ item.network_interfaces }}'
      subnets: '{{ item.subnets }}'
      flow_logs: '{{ item.flow_logs }}'
      resource_guid: '{{ item.resource_guid }}'
      provisioning_state: '{{ item.provisioning_state }}'
