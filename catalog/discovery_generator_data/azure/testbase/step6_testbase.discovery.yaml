version: '1.0'
provider: azure
service: testbase
services:
  client: testbase
  module: azure.mgmt.testbase
discovery:
- discovery_id: azure.testbase.skus.list
  calls:
  - action: skus.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      analysis_summaries: '{{ item.analysis_summaries }}'
      application_name: '{{ item.application_name }}'
      application_version: '{{ item.application_version }}'
      baseline_test_result_id: '{{ item.baseline_test_result_id }}'
