      grade: '{{ item.grade }}'
      interop_media_type: '{{ item.interop_media_type }}'
      interop_media_version: '{{ item.interop_media_version }}'
      is_download_data_available: '{{ item.is_download_data_available }}'
      is_video_available: '{{ item.is_video_available }}'
      kb_number: '{{ item.kb_number }}'
      os_name: '{{ item.os_name }}'
      package_id: '{{ item.package_id }}'
