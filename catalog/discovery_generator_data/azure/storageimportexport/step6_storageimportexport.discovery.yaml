version: '1.0'
provider: azure
service: storageimportexport
services:
  client: storageimportexport
  module: azure.mgmt.storageimportexport
discovery:
- discovery_id: azure.storageimportexport.jobs.list_by_resource_group
  calls:
  - action: jobs.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.id}'
- discovery_id: azure.storageimportexport.jobs.list_by_subscription
  calls:
  - action: jobs.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.id}'
- discovery_id: azure.storageimportexport.locations.list
  calls:
  - action: locations.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      description: '{{ item.description }}'
      operation: '{{ item.operation }}'
      provider: '{{ item.provider }}'
      resource: '{{ item.resource }}'
  uid_template: '{item.id}'
- discovery_id: azure.storageimportexport.bitlockerkeys.list
  for_each: azure.storageimportexport.jobs.list_by_subscription
  calls:
  - action: bitlockerkeys.list
    save_as: response
    on_error: continue
    params:
      job_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      description: '{{ item.description }}'
      operation: '{{ item.operation }}'
      provider: '{{ item.provider }}'
      resource: '{{ item.resource }}'
