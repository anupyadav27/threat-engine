version: '1.0'
provider: azure
service: aisearch
discovery:
- discovery_id: azure.search.services.list_by_subscription
  calls:
  - action: services.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      system_data: '{{ item.system_data }}'
      tags: '{{ item.tags }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      identity: '{{ item.identity }}'
      replica_count: '{{ item.replica_count }}'
      partition_count: '{{ item.partition_count }}'
      endpoint: '{{ item.endpoint }}'
      hosting_mode: '{{ item.hosting_mode }}'
      compute_type: '{{ item.compute_type }}'
      public_network_access: '{{ item.public_network_access }}'
      status: '{{ item.status }}'
      status_details: '{{ item.status_details }}'
      provisioning_state: '{{ item.provisioning_state }}'
      network_rule_set: '{{ item.network_rule_set }}'
      data_exfiltration_protections: '{{ item.data_exfiltration_protections }}'
      encryption_with_cmk: '{{ item.encryption_with_cmk }}'
      disable_local_auth: '{{ item.disable_local_auth }}'
      auth_options: '{{ item.auth_options }}'
      semantic_search: '{{ item.semantic_search }}'
      private_endpoint_connections: '{{ item.private_endpoint_connections }}'
      shared_private_link_resources: '{{ item.shared_private_link_resources }}'
      e_tag: '{{ item.e_tag }}'
      upgrade_available: '{{ item.upgrade_available }}'
      service_upgraded_at: '{{ item.service_upgraded_at }}'
  uid_template: '{item.id}'
