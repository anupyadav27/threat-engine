- discovery_id: azure.databricks.outboundnetworkdependenciesendpoints.list
  for_each: azure.databricks.workspaces.list_by_subscription
  calls:
  - action: outboundnetworkdependenciesendpoints.list
    save_as: response
    on_error: continue
    params:
      workspace_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
