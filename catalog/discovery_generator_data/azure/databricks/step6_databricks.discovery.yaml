      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      allow_forwarded_traffic: '{{ item.allow_forwarded_traffic }}'
      allow_gateway_transit: '{{ item.allow_gateway_transit }}'
      allow_virtual_network_access: '{{ item.allow_virtual_network_access }}'
      databricks_address_space: '{{ item.databricks_address_space }}'
      databricks_virtual_network: '{{ item.databricks_virtual_network }}'
      peering_state: '{{ item.peering_state }}'
      remote_address_space: '{{ item.remote_address_space }}'
      remote_virtual_network: '{{ item.remote_virtual_network }}'
      use_remote_gateways: '{{ item.use_remote_gateways }}'
- discovery_id: azure.databricks.access_connectors_list_by_resource_group
  calls:
  - action: AccessConnectors_ListByResourceGroup
    save_as: response
