version: '1.0'
provider: azure
service: aad
discovery:
- _stub: true
  discovery_id: azure.aad.list_aads
  _note: STUB — generated by step2, needs real SDK review for azure.aad
  _rules:
  - azure.aad.password_policy.hide_feedback_configured
  - azure.aad.user.account_management_enabled
  - azure.aad.user.allow_guest_invites_restricted
  - azure.aad.user.password_policy_enforce_change_configured
  - azure.aad.user.user_principal_name_configured
  - azure.aad.user.anonymous_auth_disabled
  - azure.aad.service_principal.key_credentials_configured
  - azure.aad.service_principal.oauth2_permissions_restricted
  - azure.aad.user.security_key_enforcement_configured
  _client: azure.mgmt.graphrbac
  calls:
  - action: ListResources
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      id: '{{ item.Id }}'
      name: '{{ item.Name }}'
      resource_type: '''{{ resource_type }}'''
      region: '{{ region }}'
      encrypted: '{{ item.Encrypted }}'
      kms_key_id: '{{ item.KMSKeyId }}'
      status: '{{ item.Status }}'
      enabled: '{{ item.Enabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      internet_facing: '{{ item.InternetFacing }}'
      public_ip_address: '{{ item.PublicIpAddress }}'
      tags: '{{ item.Tags }}'
      permissions: '{{ item.Permissions }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      retention_days: '{{ item.RetentionDays }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
- discovery_id: azure.aad.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ list_response.value }}'
    item:
      type: '{{ item.type }}'
      permissions: '{{ item.permissions }}'
      oidc_issuer: '{{ item.oidc_issuer }}'
      discovery_endpoint: '{{ item.discovery_endpoint }}'
      password_policies: '{{ item.password_policies }}'
      updated_on: '{{ item.updated_on }}'
      saml_certificates: '{{ item.saml_certificates }}'
      id: '{{ item.id }}'
  uid_template: '{item.id}'
