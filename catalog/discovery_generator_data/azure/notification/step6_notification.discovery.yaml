version: '1.0'
provider: azure
service: notification
discovery:
- discovery_id: azure.notificationhubs.notificationhubs.list
  calls:
  - action: notificationhubs.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      sku: '{{ item.sku }}'
      name_properties_name: '{{ item.name_properties_name }}'
      registration_ttl: '{{ item.registration_ttl }}'
      authorization_rules: '{{ item.authorization_rules }}'
      apns_credential: '{{ item.apns_credential }}'
      wns_credential: '{{ item.wns_credential }}'
      gcm_credential: '{{ item.gcm_credential }}'
      mpns_credential: '{{ item.mpns_credential }}'
      adm_credential: '{{ item.adm_credential }}'
      baidu_credential: '{{ item.baidu_credential }}'
