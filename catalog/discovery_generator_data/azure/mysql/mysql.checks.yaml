version: '1.0'
provider: azure
service: mysql
checks:
# ═══════════════════════════════════════════
# MySQL Servers — azure.mysql.servers.servers_list
# Fields: id, name, type, location, tags, sku, identity, properties, provisioning_state, kind, zones
# Note: Security config (ssl_enforcement, geo_redundant_backup, public_network_access,
#       minimal_tls_version, infrastructure_encryption) is inside the properties blob
# ═══════════════════════════════════════════
- rule_id: azure.mysql.server.sku_configured
  for_each: azure.mysql.servers.servers_list
  conditions:
    var: item.sku
    op: not_empty

- rule_id: azure.mysql.server.properties_configured
  for_each: azure.mysql.servers.servers_list
  conditions:
    var: item.properties
    op: not_empty

- rule_id: azure.mysql.server.managed_identity_enabled
  for_each: azure.mysql.servers.servers_list
  conditions:
    var: item.identity
    op: not_empty

- rule_id: azure.mysql.server.availability_zones_configured
  for_each: azure.mysql.servers.servers_list
  conditions:
    var: item.zones
    op: not_empty

- rule_id: azure.mysql.server.provisioning_succeeded
  for_each: azure.mysql.servers.servers_list
  conditions:
    var: item.provisioning_state
    op: equals
    value: Succeeded

- rule_id: azure.mysql.server.tags_configured
  for_each: azure.mysql.servers.servers_list
  conditions:
    var: item.tags
    op: not_empty
