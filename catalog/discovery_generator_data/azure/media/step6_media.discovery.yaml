version: '1.0'
provider: azure
service: media
services:
  client: media
  module: azure.mgmt.media
discovery:
- discovery_id: azure.media.mediaservices.list
  calls:
  - action: mediaservices.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      track: '{{ item.track }}'
  uid_template: '{item.id}'
- discovery_id: azure.media.mediaservices.list_by_subscription
  calls:
  - action: mediaservices.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      public_network_access: '{{ item.public_network_access }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      encryption: '{{ item.encryption }}'
      tags: '{{ item.tags }}'
      key_delivery: '{{ item.key_delivery }}'
      media_service_id: '{{ item.media_service_id }}'
      private_endpoint_connections: '{{ item.private_endpoint_connections }}'
      storage_accounts: '{{ item.storage_accounts }}'
      storage_authentication: '{{ item.storage_authentication }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.media.accountfilters.list
  for_each: azure.media.mediaservices.list_by_subscription
  calls:
  - action: accountfilters.list
    save_as: response
    on_error: continue
    params:
      account_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      track: '{{ item.track }}'
