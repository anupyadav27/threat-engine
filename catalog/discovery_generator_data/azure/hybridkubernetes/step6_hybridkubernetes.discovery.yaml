# Discovery YAML — hybridkubernetes (Azure)
# Generated: 2026-04-15T10:39:30Z
# Source: step1b_operation_registry.json (qualified ops + dependency chains)
# Actions use {category}.{method} format for SDK method resolution
version: '1.0'
provider: azure
service: hybridkubernetes
services:
  client: hybridkubernetes
  module: azure.mgmt.hybridkubernetes
discovery:
  # ── connectedcluster.list_by_resource_group [root] ──
  - discovery_id: azure.hybridkubernetes.connectedcluster.list_by_resource_group
    calls:
      - action: connectedcluster.list_by_resource_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        identity: '{{ item.identity }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        location: '{{ item.location }}'
        sku: '{{ item.sku }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        zones: '{{ item.zones }}'
        kind: '{{ item.kind }}'
        id: '{{ item.id }}'
        tags: '{{ item.tags }}'
  # ── connectedcluster.list_by_subscription [root] ──
  - discovery_id: azure.hybridkubernetes.connectedcluster.list_by_subscription
    calls:
      - action: connectedcluster.list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        identity: '{{ item.identity }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        location: '{{ item.location }}'
        sku: '{{ item.sku }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        zones: '{{ item.zones }}'
        kind: '{{ item.kind }}'
        id: '{{ item.id }}'
        tags: '{{ item.tags }}'
  # ════════════════════════════════════════
  # Dependent operations (for_each + params)
  # ════════════════════════════════════════
  # ── connectedcluster.list_cluster_user_credential [dependent] ──
  - discovery_id: azure.hybridkubernetes.connectedcluster.list_cluster_user_credential
    for_each: azure.hybridkubernetes.connectedcluster.list_by_subscription
    calls:
      - action: connectedcluster.list_cluster_user_credential
        save_as: response
        on_error: continue
        params:
          cluster_name: '{{ item.name }}'
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        identity: '{{ item.identity }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        location: '{{ item.location }}'
        sku: '{{ item.sku }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        zones: '{{ item.zones }}'
        kind: '{{ item.kind }}'
        id: '{{ item.id }}'
        tags: '{{ item.tags }}'
