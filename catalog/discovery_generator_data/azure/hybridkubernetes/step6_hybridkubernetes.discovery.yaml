version: '1.0'
provider: azure
service: hybridkubernetes
services:
  client: hybridkubernetes
  module: azure.mgmt.hybridkubernetes
discovery:
- discovery_id: azure.hybridkubernetes.connectedcluster.list_by_resource_group
  calls:
  - action: connectedcluster.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.id}'
- discovery_id: azure.hybridkubernetes.connectedcluster.list_by_subscription
  calls:
  - action: connectedcluster.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.id}'
- discovery_id: azure.hybridkubernetes.connectedcluster.list_cluster_user_credential
  for_each: azure.hybridkubernetes.connectedcluster.list_by_subscription
  calls:
  - action: connectedcluster.list_cluster_user_credential
    save_as: response
    on_error: continue
    params:
      cluster_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
