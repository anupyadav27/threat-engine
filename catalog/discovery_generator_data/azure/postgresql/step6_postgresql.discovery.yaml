version: '1.0'
provider: azure
service: postgresql
services:
  client: postgresql
  module: azure.mgmt.postgresql
discovery:
- discovery_id: azure.postgresql.operations.operations_list
  calls:
  - action: operations.Operations_List
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.id}'
- discovery_id: azure.postgresql.servers.servers_list
  calls:
  - action: servers.Servers_List
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.id}'
- discovery_id: azure.postgresql.list
  calls:
  - action: list
    save_as: list_response
  emit:
    items_for: '{{ list_response.value }}'
    as: item
    item:
      name: '{{ item.name }}'
      display: '{{ item.display }}'
      origin: '{{ item.origin }}'
      properties: '{{ item.properties }}'
- discovery_id: azure.rdbms_postgresql.servers.list
  calls:
  - action: servers.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      tags: '{{ item.tags }}'
      location: '{{ item.location }}'
      identity: '{{ item.identity }}'
      sku: '{{ item.sku }}'
      administrator_login: '{{ item.administrator_login }}'
      version: '{{ item.version }}'
      ssl_enforcement: '{{ item.ssl_enforcement }}'
      minimal_tls_version: '{{ item.minimal_tls_version }}'
      byok_enforcement: '{{ item.byok_enforcement }}'
      infrastructure_encryption: '{{ item.infrastructure_encryption }}'
      user_visible_state: '{{ item.user_visible_state }}'
      fully_qualified_domain_name: '{{ item.fully_qualified_domain_name }}'
      earliest_restore_date: '{{ item.earliest_restore_date }}'
      storage_profile: '{{ item.storage_profile }}'
      replication_role: '{{ item.replication_role }}'
      master_server_id: '{{ item.master_server_id }}'
      replica_capacity: '{{ item.replica_capacity }}'
      public_network_access: '{{ item.public_network_access }}'
      private_endpoint_connections: '{{ item.private_endpoint_connections }}'
  uid_template: '{item.id}'
- discovery_id: azure.postgresql.servers_list_by_resource_group
  calls:
  - action: Servers_ListByResourceGroup
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.id}'
- discovery_id: azure.postgresql.servers_list
  calls:
  - action: Servers_List
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.id}'
