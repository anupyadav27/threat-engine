version: '1.0'
provider: azure
service: power
discovery:
- discovery_id: azure.power.bi.datasets.list
  calls:
  - action: datasets.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      Encryption: '{{ item.Encryption }}'
      RowLevelSecurityEnabled: '{{ item.RowLevelSecurityEnabled }}'
      properties: '{{ item.properties }}'
      isPublic: '{{ item.isPublic }}'
      configuredBy: '{{ item.configuredBy }}'
      users: '{{ item.users }}'
  uid_template: '{item.id}'
- discovery_id: azure.power.bi.list_datasets
  calls:
  - action: datasets.list
    save_as: response
    on_error: continue
  emit:
    as: item
