version: '1.0'
provider: azure
service: appplatform
services:
  client: appplatform
  module: azure.mgmt.appplatform
discovery:
- discovery_id: azure.appplatform.runtimeversions.list_runtime_versions
  calls:
  - action: runtimeversions.list_runtime_versions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      platform: '{{ item.platform }}'
      version: '{{ item.version }}'
  uid_template: '{item.id}'
- discovery_id: azure.appplatform.services.list
  calls:
  - action: services.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
