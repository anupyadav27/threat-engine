version: '1.0'
provider: azure
service: dynatrace
services:
  client: dynatrace
  module: azure.mgmt.dynatrace
discovery:
- discovery_id: azure.dynatrace.monitors.list_by_resource_group
  calls:
  - action: monitors.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      dynatrace_environment_properties: '{{ item.dynatrace_environment_properties
        }}'
      liftr_resource_category: '{{ item.liftr_resource_category }}'
      liftr_resource_preference: '{{ item.liftr_resource_preference }}'
      marketplace_subscription_status: '{{ item.marketplace_subscription_status }}'
      monitoring_status: '{{ item.monitoring_status }}'
      plan_data: '{{ item.plan_data }}'
      system_data: '{{ item.system_data }}'
      user_info: '{{ item.user_info }}'
  uid_template: '{item.id}'
- discovery_id: azure.dynatrace.monitors.list_by_subscription_id
  calls:
  - action: monitors.list_by_subscription_id
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      dynatrace_environment_properties: '{{ item.dynatrace_environment_properties
        }}'
      liftr_resource_category: '{{ item.liftr_resource_category }}'
      liftr_resource_preference: '{{ item.liftr_resource_preference }}'
      marketplace_subscription_status: '{{ item.marketplace_subscription_status }}'
      monitoring_status: '{{ item.monitoring_status }}'
      plan_data: '{{ item.plan_data }}'
      system_data: '{{ item.system_data }}'
      user_info: '{{ item.user_info }}'
  uid_template: '{item.id}'
- discovery_id: azure.dynatrace.monitors.get_metric_status
  for_each: azure.dynatrace.monitors.list_by_subscription_id
  calls:
  - action: monitors.get_metric_status
    save_as: response
    on_error: continue
    params:
      monitor_name: '{{ item.name }}'
  emit:
    as: item
    item:
      identity: '{{ response.identity }}'
      type: '{{ response.type }}'
      properties: '{{ response.properties }}'
      location: '{{ response.location }}'
      sku: '{{ response.sku }}'
      name: '{{ response.name }}'
      provisioning_state: '{{ response.provisioning_state }}'
      zones: '{{ response.zones }}'
      kind: '{{ response.kind }}'
      id: '{{ response.id }}'
      tags: '{{ response.tags }}'
