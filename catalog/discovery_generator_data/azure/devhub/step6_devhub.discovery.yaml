version: '1.0'
provider: azure
service: devhub
services:
  client: devhub
  module: azure.mgmt.devhub
discovery:
- discovery_id: azure.devhub.workflow.list
  calls:
  - action: workflow.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      acr: '{{ item.acr }}'
      aks_resource_id: '{{ item.aks_resource_id }}'
      app_name: '{{ item.app_name }}'
      auth_status: '{{ item.auth_status }}'
      branch_name: '{{ item.branch_name }}'
      builder_version: '{{ item.builder_version }}'
      deployment_properties: '{{ item.deployment_properties }}'
      docker_build_context: '{{ item.docker_build_context }}'
      dockerfile: '{{ item.dockerfile }}'
      dockerfile_generation_mode: '{{ item.dockerfile_generation_mode }}'
      dockerfile_output_directory: '{{ item.dockerfile_output_directory }}'
      generation_language: '{{ item.generation_language }}'
      image_name: '{{ item.image_name }}'
      image_tag: '{{ item.image_tag }}'
      language_version: '{{ item.language_version }}'
      last_workflow_run: '{{ item.last_workflow_run }}'
      manifest_generation_mode: '{{ item.manifest_generation_mode }}'
      manifest_output_directory: '{{ item.manifest_output_directory }}'
      manifest_type: '{{ item.manifest_type }}'
      namespace_properties_artifact_generation_properties_namespace: '{{ item.namespace_properties_artifact_generation_properties_namespace
        }}'
      namespace_properties_github_workflow_profile_namespace: '{{ item.namespace_properties_github_workflow_profile_namespace
        }}'
      oidc_credentials: '{{ item.oidc_credentials }}'
      port: '{{ item.port }}'
      pr_status: '{{ item.pr_status }}'
      pr_url: '{{ item.pr_url }}'
      pull_number: '{{ item.pull_number }}'
      repository_name: '{{ item.repository_name }}'
      repository_owner: '{{ item.repository_owner }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.devhub.workflow.list_by_resource_group
  calls:
  - action: workflow.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      acr: '{{ item.acr }}'
      aks_resource_id: '{{ item.aks_resource_id }}'
      app_name: '{{ item.app_name }}'
      auth_status: '{{ item.auth_status }}'
      branch_name: '{{ item.branch_name }}'
      builder_version: '{{ item.builder_version }}'
      deployment_properties: '{{ item.deployment_properties }}'
      docker_build_context: '{{ item.docker_build_context }}'
      dockerfile: '{{ item.dockerfile }}'
      dockerfile_generation_mode: '{{ item.dockerfile_generation_mode }}'
      dockerfile_output_directory: '{{ item.dockerfile_output_directory }}'
      generation_language: '{{ item.generation_language }}'
      image_name: '{{ item.image_name }}'
      image_tag: '{{ item.image_tag }}'
      language_version: '{{ item.language_version }}'
      last_workflow_run: '{{ item.last_workflow_run }}'
      manifest_generation_mode: '{{ item.manifest_generation_mode }}'
      manifest_output_directory: '{{ item.manifest_output_directory }}'
      manifest_type: '{{ item.manifest_type }}'
      namespace_properties_artifact_generation_properties_namespace: '{{ item.namespace_properties_artifact_generation_properties_namespace
        }}'
      namespace_properties_github_workflow_profile_namespace: '{{ item.namespace_properties_github_workflow_profile_namespace
        }}'
      oidc_credentials: '{{ item.oidc_credentials }}'
      port: '{{ item.port }}'
      pr_status: '{{ item.pr_status }}'
      pr_url: '{{ item.pr_url }}'
      pull_number: '{{ item.pull_number }}'
      repository_name: '{{ item.repository_name }}'
      repository_owner: '{{ item.repository_owner }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
