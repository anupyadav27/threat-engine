version: '1.0'
provider: azure
service: managementgroup
discovery:
- _stub: true
  discovery_id: azure.managementgroup.list_managementgroups
  _note: STUB — generated by step2, needs real SDK review for azure.managementgroup
  _rules:
  - azure.managementgroup.subscription.entra_tenant_transfer_restriction_configured
  _client: azure.mgmt.managementgroups
  calls:
  - action: ListGroups
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      id: '{{ item.Id }}'
      name: '{{ item.Name }}'
      resource_type: '''{{ resource_type }}'''
      region: '{{ region }}'
      encrypted: '{{ item.Encrypted }}'
      kms_key_id: '{{ item.KMSKeyId }}'
      status: '{{ item.Status }}'
      enabled: '{{ item.Enabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      internet_facing: '{{ item.InternetFacing }}'
      public_ip_address: '{{ item.PublicIpAddress }}'
      tags: '{{ item.Tags }}'
      permissions: '{{ item.Permissions }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      retention_days: '{{ item.RetentionDays }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
- discovery_id: azure.subscription.subscriptions.list
  calls:
  - action: subscriptions.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      subscription_id: '{{ item.subscription_id }}'
      display_name: '{{ item.display_name }}'
      state: '{{ item.state }}'
      subscription_policies: '{{ item.subscription_policies }}'
      authorization_source: '{{ item.authorization_source }}'
