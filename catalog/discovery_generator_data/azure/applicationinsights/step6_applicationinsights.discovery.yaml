version: '1.0'
provider: azure
service: applicationinsights
services:
  client: applicationinsights
  module: azure.mgmt.applicationinsights.v2018_05_01_preview
discovery:
- discovery_id: azure.applicationinsights.components.list
  calls:
  - action: components.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      configuration: '{{ item.configuration }}'
      description: '{{ item.description }}'
      enabled: '{{ item.enabled }}'
      frequency: '{{ item.frequency }}'
      locations: '{{ item.locations }}'
      request: '{{ item.request }}'
      retry_enabled: '{{ item.retry_enabled }}'
      synthetic_monitor_id: '{{ item.synthetic_monitor_id }}'
      timeout: '{{ item.timeout }}'
      validation_rules: '{{ item.validation_rules }}'
      web_test_kind: '{{ item.web_test_kind }}'
      web_test_name: '{{ item.web_test_name }}'
  uid_template: '{item.id}'
- discovery_id: azure.applicationinsights.components.list_by_resource_group
  calls:
  - action: components.list_by_resource_group
    save_as: response
    on_error: continue
