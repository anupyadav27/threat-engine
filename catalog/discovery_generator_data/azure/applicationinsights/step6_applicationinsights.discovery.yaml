      web_test_name: '{{ item.web_test_name }}'
  uid_template: '{item.id}'
- discovery_id: azure.applicationinsights.components.get_purge_status
  for_each: azure.applicationinsights.components.list
  calls:
  - action: components.get_purge_status
    save_as: response
    on_error: continue
    params:
      resource_name: '{{ item.name }}'
  emit:
    as: item
    item:
      identity: '{{ response.identity }}'
      type: '{{ response.type }}'
      properties: '{{ response.properties }}'
      location: '{{ response.location }}'
      sku: '{{ response.sku }}'
      name: '{{ response.name }}'
      provisioning_state: '{{ response.provisioning_state }}'
      zones: '{{ response.zones }}'
      kind: '{{ response.kind }}'
      id: '{{ response.id }}'
      tags: '{{ response.tags }}'
