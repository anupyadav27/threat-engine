version: '1.0'
provider: azure
service: resourceconnector
services:
  client: resourceconnector
  module: azure.mgmt.resourceconnector
discovery:
- discovery_id: azure.resourceconnector.appliances.get_telemetry_config
  calls:
  - action: appliances.get_telemetry_config
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      identity: '{{ response.identity }}'
      type: '{{ response.type }}'
      properties: '{{ response.properties }}'
      location: '{{ response.location }}'
      sku: '{{ response.sku }}'
      name: '{{ response.name }}'
      provisioning_state: '{{ response.provisioning_state }}'
      zones: '{{ response.zones }}'
      kind: '{{ response.kind }}'
      id: '{{ response.id }}'
      tags: '{{ response.tags }}'
  uid_template: '{item.id}'
- discovery_id: azure.resourceconnector.appliances.list_by_resource_group
  calls:
  - action: appliances.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      status: '{{ item.status }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      distro: '{{ item.distro }}'
      infrastructure_config: '{{ item.infrastructure_config }}'
      public_key: '{{ item.public_key }}'
      system_data: '{{ item.system_data }}'
      version: '{{ item.version }}'
  uid_template: '{item.id}'
- discovery_id: azure.resourceconnector.appliances.list_by_subscription
  calls:
  - action: appliances.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      status: '{{ item.status }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      distro: '{{ item.distro }}'
      infrastructure_config: '{{ item.infrastructure_config }}'
      public_key: '{{ item.public_key }}'
      system_data: '{{ item.system_data }}'
      version: '{{ item.version }}'
  uid_template: '{item.id}'
- discovery_id: azure.resourceconnector.appliances.list_operations
  calls:
  - action: appliances.list_operations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      description: '{{ item.description }}'
      is_data_action: '{{ item.is_data_action }}'
      operation: '{{ item.operation }}'
      origin: '{{ item.origin }}'
      provider: '{{ item.provider }}'
      resource: '{{ item.resource }}'
  uid_template: '{item.id}'
- discovery_id: azure.resourceconnector.appliances.get_upgrade_graph
  for_each: azure.resourceconnector.appliances.list_by_subscription
  calls:
  - action: appliances.get_upgrade_graph
    save_as: response
    on_error: continue
    params:
      resource_name: '{{ item.name }}'
  emit:
    as: item
    item:
      identity: '{{ response.identity }}'
      type: '{{ response.type }}'
      properties: '{{ response.properties }}'
      location: '{{ response.location }}'
      sku: '{{ response.sku }}'
      name: '{{ response.name }}'
      provisioning_state: '{{ response.provisioning_state }}'
      zones: '{{ response.zones }}'
      kind: '{{ response.kind }}'
      id: '{{ response.id }}'
      tags: '{{ response.tags }}'
- discovery_id: azure.resourceconnector.appliances.list_cluster_user_credential
  for_each: azure.resourceconnector.appliances.list_by_subscription
  calls:
  - action: appliances.list_cluster_user_credential
    save_as: response
    on_error: continue
    params:
      resource_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
- discovery_id: azure.resourceconnector.appliances.list_keys
  for_each: azure.resourceconnector.appliances.list_by_subscription
  calls:
  - action: appliances.list_keys
    save_as: response
    on_error: continue
    params:
      resource_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
