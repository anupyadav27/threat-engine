version: '1.0'
provider: azure
service: hybridconnectivity
services:
  client: hybridconnectivity
  module: azure.mgmt.hybridconnectivity
discovery:
- discovery_id: azure.hybridconnectivity.endpoints.list
  calls:
  - action: endpoints.list
    save_as: response
    on_error: continue
    params:
      resource_uri: ''
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
  uid_template: '{item.id}'
- discovery_id: azure.hybridconnectivity.endpoints.list_credentials
  for_each: azure.hybridconnectivity.endpoints.list
  calls:
  - action: endpoints.list_credentials
    save_as: response
    on_error: continue
    params:
      endpoint_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
- discovery_id: azure.hybridconnectivity.endpoints.list_ingress_gateway_credentials
  for_each: azure.hybridconnectivity.endpoints.list
  calls:
  - action: endpoints.list_ingress_gateway_credentials
    save_as: response
    on_error: continue
    params:
      endpoint_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
- discovery_id: azure.hybridconnectivity.endpoints.list_managed_proxy_details
  for_each: azure.hybridconnectivity.endpoints.list
  calls:
  - action: endpoints.list_managed_proxy_details
    save_as: response
    on_error: continue
    params:
      endpoint_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
- discovery_id: azure.hybridconnectivity.serviceconfigurations.list_by_endpoint_resource
  for_each: azure.hybridconnectivity.endpoints.list
  calls:
  - action: serviceconfigurations.list_by_endpoint_resource
    save_as: response
    on_error: continue
    params:
      endpoint_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      port: '{{ item.port }}'
      resource_id: '{{ item.resource_id }}'
      service_name: '{{ item.service_name }}'
      system_data: '{{ item.system_data }}'
