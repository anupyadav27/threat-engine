version: '1.0'
provider: azure
service: entra_id_governance
services:
  client: azureactivedirectory
  module: azure.graphservices
discovery:
- discovery_id: azure.graph.identity_conditional_access_policies.list
  calls:
  - action: identity_conditional_access_policies.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      managed_by: '{{ item.managed_by }}'
      sku: '{{ item.sku }}'
      system_data: '{{ item.system_data }}'
      diagnostic_settings: '{{ item.diagnostic_settings }}'
      id: '{{ item.id }}'
      type: '{{ item.type }}'
      etag: '{{ item.etag }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      properties: '{{ item.properties }}'
      identity: '{{ item.identity }}'
      tags: '{{ item.tags }}'
      private_endpoint_connections: '{{ item.private_endpoint_connections }}'
      encryption: '{{ item.encryption }}'
      location: '{{ item.location }}'
      kind: '{{ item.kind }}'
      disable_local_auth: '{{ item.disable_local_auth }}'
      network_rule_set: '{{ item.network_rule_set }}'
      public_network_access: '{{ item.public_network_access }}'
      name: '{{ item.name }}'
      minimum_tls_version: '{{ item.minimum_tls_version }}'
      network_acls: '{{ item.network_acls }}'
  uid_template: '{item.id}'
- discovery_id: azure.graph.identity_governance_access_reviews_definitions.list
  calls:
