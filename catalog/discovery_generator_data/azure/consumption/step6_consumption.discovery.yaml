version: '1.0'
provider: azure
service: consumption
services:
  client: consumption
  module: azure.mgmt.consumption
discovery:
- discovery_id: azure.consumption.aggregatedcost.get_by_management_group
  calls:
  - action: aggregatedcost.get_by_management_group
    save_as: response
    on_error: continue
    params:
      management_group_id: ''
  emit:
    as: item
    item:
      identity: '{{ response.identity }}'
      type: '{{ response.type }}'
      properties: '{{ response.properties }}'
      location: '{{ response.location }}'
      sku: '{{ response.sku }}'
      name: '{{ response.name }}'
      provisioning_state: '{{ response.provisioning_state }}'
      zones: '{{ response.zones }}'
      kind: '{{ response.kind }}'
      id: '{{ response.id }}'
      tags: '{{ response.tags }}'
  uid_template: '{item.id}'
- discovery_id: azure.consumption.aggregatedcost.get_for_billing_period_by_management_group
  for_each: azure.consumption.aggregatedcost.get_by_management_group
  calls:
  - action: aggregatedcost.get_for_billing_period_by_management_group
    save_as: response
    on_error: continue
    params:
      billing_period_name: '{{ item.name }}'
  emit:
    as: item
    item:
      identity: '{{ response.identity }}'
      type: '{{ response.type }}'
      properties: '{{ response.properties }}'
      location: '{{ response.location }}'
      sku: '{{ response.sku }}'
      name: '{{ response.name }}'
      provisioning_state: '{{ response.provisioning_state }}'
      zones: '{{ response.zones }}'
      kind: '{{ response.kind }}'
      id: '{{ response.id }}'
      tags: '{{ response.tags }}'
- discovery_id: azure.consumption.balances.get_by_billing_account
  for_each: azure.consumption.balances.get_for_billing_period_by_billing_account
  calls:
  - action: balances.get_by_billing_account
    save_as: response
    on_error: continue
    params:
      billing_account_id: '{{ item.id }}'
