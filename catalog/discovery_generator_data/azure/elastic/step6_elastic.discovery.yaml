version: '1.0'
provider: azure
service: elastic
services:
  client: elastic
  module: azure.mgmt.elastic
discovery:
- discovery_id: azure.elastic.monitors.list
  calls:
  - action: monitors.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      vm_resource_id: '{{ item.vm_resource_id }}'
  uid_template: '{item.id}'
- discovery_id: azure.elastic.monitors.list_by_resource_group
  calls:
  - action: monitors.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.elastic.organizations.get_api_key
  calls:
  - action: organizations.get_api_key
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      identity: '{{ response.identity }}'
      type: '{{ response.type }}'
      properties: '{{ response.properties }}'
      location: '{{ response.location }}'
      sku: '{{ response.sku }}'
      name: '{{ response.name }}'
      provisioning_state: '{{ response.provisioning_state }}'
      zones: '{{ response.zones }}'
      kind: '{{ response.kind }}'
      id: '{{ response.id }}'
      tags: '{{ response.tags }}'
  uid_template: '{item.id}'
- discovery_id: azure.elastic.organizations.get_elastic_to_azure_subscription_mapping
  calls:
  - action: organizations.get_elastic_to_azure_subscription_mapping
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      identity: '{{ response.identity }}'
      type: '{{ response.type }}'
      properties: '{{ response.properties }}'
      location: '{{ response.location }}'
      sku: '{{ response.sku }}'
      name: '{{ response.name }}'
      provisioning_state: '{{ response.provisioning_state }}'
      zones: '{{ response.zones }}'
      kind: '{{ response.kind }}'
      id: '{{ response.id }}'
      tags: '{{ response.tags }}'
  uid_template: '{item.id}'
- discovery_id: azure.elastic.alltrafficfilters.list
  for_each: azure.elastic.monitors.list
  calls:
  - action: alltrafficfilters.list
    save_as: response
    on_error: continue
    params:
      monitor_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      vm_resource_id: '{{ item.vm_resource_id }}'
