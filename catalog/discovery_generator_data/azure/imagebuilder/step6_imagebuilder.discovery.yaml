        last_run_status: '{{ item.last_run_status }}'
        managed_resource_tags: '{{ item.managed_resource_tags }}'
        optimize: '{{ item.optimize }}'
        provisioning_error: '{{ item.provisioning_error }}'
        source: '{{ item.source }}'
        staging_resource_group: '{{ item.staging_resource_group }}'
        system_data: '{{ item.system_data }}'
        validate: '{{ item.validate }}'
