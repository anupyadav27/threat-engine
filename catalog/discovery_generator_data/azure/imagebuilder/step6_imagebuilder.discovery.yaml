  - discovery_id: azure.imagebuilder.virtualmachineimagetemplates.list
    calls:
      - action: virtualmachineimagetemplates.list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        identity: '{{ item.identity }}'
        type: '{{ item.type }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        id: '{{ item.id }}'
        tags: '{{ item.tags }}'
