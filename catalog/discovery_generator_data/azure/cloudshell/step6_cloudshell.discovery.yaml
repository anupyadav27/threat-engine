version: '1.0'
provider: azure
service: cloudshell
services:
  client: cloudshell
  module: boto3.client
discovery:
- discovery_id: azure.cloudshell.getusersettingswithlocation
  calls:
  - action: getusersettingswithlocation
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: azure.cloudshell.getconsolewithlocation
  calls:
  - action: getconsolewithlocation
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: azure.cloudshell.getusersettings
  calls:
  - action: getusersettings
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: azure.cloudshell.getconsole
  calls:
  - action: getconsole
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
