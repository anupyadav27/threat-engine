version: '1.0'
provider: azure
service: datalakeanalytics
services:
  client: datalakeanalytics
  module: boto3.client
discovery:
- discovery_id: azure.datalakeanalytics.accounts.list
  calls:
  - action: accounts.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      properties: '{{ item.properties }}'
  uid_template: '{item.id}'
