version: '1.0'
provider: azure
service: iotfirmwaredefense
services:
  client: iotfirmwaredefense
  module: azure.mgmt.iotfirmwaredefense
discovery:
- discovery_id: azure.iotfirmwaredefense.workspaces.list_by_resource_group
  calls:
  - action: workspaces.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
  uid_template: '{item.id}'
- discovery_id: azure.iotfirmwaredefense.workspaces.list_by_subscription
  calls:
  - action: workspaces.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
  uid_template: '{item.id}'
- discovery_id: azure.iotfirmwaredefense.binaryhardening.list_by_firmware
  for_each: azure.iotfirmwaredefense.workspaces.list_by_subscription
  calls:
  - action: binaryhardening.list_by_firmware
    save_as: response
    on_error: continue
    params:
      workspace_name: '{{ item.name }}'
  emit:
