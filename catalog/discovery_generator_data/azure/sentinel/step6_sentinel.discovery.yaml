# Discovery YAML — sentinel (Azure)
# Generated: 2026-04-15T09:58:00Z
# Backend namespace: operationalinsights
# Source: step1b + step4 dependency chain for check rules
version: '1.0'
provider: azure
service: sentinel
services:
  client: operationalinsights
  module: azure.mgmt.loganalytics
discovery:
  # ════════════════════════════════════════
  # Root (independent) operations
  # ════════════════════════════════════════
  # ── workspaces.Workspaces_List [root] ──
  - discovery_id: azure.operationalinsights.workspaces.workspaces_list
    calls:
      - action: workspaces.Workspaces_List
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        location: '{{ item.location }}'
        tags: '{{ item.tags }}'
        kind: '{{ item.kind }}'
        sku: '{{ item.sku }}'
        zones: '{{ item.zones }}'
        identity: '{{ item.identity }}'
        properties: '{{ item.properties }}'
        provisioning_state: '{{ item.provisioning_state }}'
        encryption: '{{ item.encryption }}'
        network_rule_set: '{{ item.network_rule_set }}'
        public_network_access: '{{ item.public_network_access }}'
        diagnostic_settings: '{{ item.diagnostic_settings }}'
        disable_local_auth: '{{ item.disable_local_auth }}'
        etag: '{{ item.etag }}'
        managed_by: '{{ item.managed_by }}'
        minimum_tls_version: '{{ item.minimum_tls_version }}'
        network_acls: '{{ item.network_acls }}'
        private_endpoint_connections: '{{ item.private_endpoint_connections }}'
        system_data: '{{ item.system_data }}'
