version: '1.0'
provider: azure
service: billing
services:
  client: billing
  module: azure.mgmt.billing
discovery:
- discovery_id: azure.billing.billingaccounts.list
  calls:
  - action: billingaccounts.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      canceled_by: '{{ item.canceled_by }}'
      detailed_transfer_status: '{{ item.detailed_transfer_status }}'
      expiration_time: '{{ item.expiration_time }}'
      initiator_email_id: '{{ item.initiator_email_id }}'
      recipient_email_id: '{{ item.recipient_email_id }}'
      system_data: '{{ item.system_data }}'
      transfer_status: '{{ item.transfer_status }}'
  uid_template: '{item.id}'
