version: '1.0'
provider: azure
service: netappfiles
discovery:
- discovery_id: azure.netapp.netappresourcequotalimits.netappresourcequotalimits_list
  calls:
  - action: netappresourcequotalimits.NetAppResourceQuotaLimits_List
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
  _used_by_rules:
  - azure.netappfiles.encryption.key_source_cmk_check
  uid_template: '{item.id}'
