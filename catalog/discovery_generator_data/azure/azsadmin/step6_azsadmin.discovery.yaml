version: '1.0'
provider: azure
service: azsadmin
services:
  client: azsadmin
  module: azure.mgmt.azsadmin
discovery:
- discovery_id: azure.azsadmin.backuplocations.backuplocations_list
  calls:
  - action: backuplocations.BackupLocations_List
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.id}'
