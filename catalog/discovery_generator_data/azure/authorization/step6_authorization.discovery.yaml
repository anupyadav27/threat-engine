version: '1.0'
provider: azure
service: authorization
services:
  client: authorization
  module: azure.mgmt.authorization.v2018_01_01_preview
discovery:
- discovery_id: azure.authorization.permissions.list_for_resource_group
  calls:
  - action: permissions.list_for_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      principal_id: '{{ item.principal_id }}'
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      can_delegate: '{{ item.can_delegate }}'
      role_definition_id: '{{ item.role_definition_id }}'
      scope: '{{ item.scope }}'
- discovery_id: azure.authorization.providermetadata.list
  calls:
  - action: providermetadata.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      assignable_scopes: '{{ item.assignable_scopes }}'
      description: '{{ item.description }}'
      permissions: '{{ item.permissions }}'
      role_name: '{{ item.role_name }}'
      role_type: '{{ item.role_type }}'
- discovery_id: azure.authorization.roleassignments.list
