    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      assignable_scopes: '{{ item.assignable_scopes }}'
      description: '{{ item.description }}'
      permissions: '{{ item.permissions }}'
      role_name: '{{ item.role_name }}'
      role_type: '{{ item.role_type }}'
- discovery_id: azure.authorization.roleassignments.list_for_resource_group
