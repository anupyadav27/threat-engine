    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      principal_id: '{{ item.principal_id }}'
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      can_delegate: '{{ item.can_delegate }}'
      role_definition_id: '{{ item.role_definition_id }}'
      scope: '{{ item.scope }}'
- discovery_id: azure.authorization.roleassignments.get_by_id
  for_each: azure.authorization.roleassignments.list
  calls:
  - action: roleassignments.get_by_id
    save_as: response
    on_error: continue
    params:
      role_id: '{{ item.id }}'
  emit:
    as: item
    item:
      identity: '{{ response.identity }}'
      type: '{{ response.type }}'
      properties: '{{ response.properties }}'
      location: '{{ response.location }}'
      sku: '{{ response.sku }}'
      name: '{{ response.name }}'
      provisioning_state: '{{ response.provisioning_state }}'
      zones: '{{ response.zones }}'
      kind: '{{ response.kind }}'
      id: '{{ response.id }}'
      tags: '{{ response.tags }}'
- discovery_id: azure.authorization.roleassignments.list_for_scope
  for_each: azure.authorization.roleassignments.list
  calls:
  - action: roleassignments.list_for_scope
    save_as: response
    on_error: continue
