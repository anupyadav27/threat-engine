version: '1.0'
provider: azure
service: networkfunction
services:
  client: networkfunction
  module: azure.mgmt.networkfunction
discovery:
- discovery_id: azure.networkfunction.azuretrafficcollectorsbyresourcegroup.azuretrafficcollectorsbyresourcegroup_list
  calls:
  - action: azuretrafficcollectorsbyresourcegroup.AzureTrafficCollectorsByResourceGroup_List
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.id}'
- discovery_id: azure.networkfunction.azuretrafficcollectorsbysubscription.azuretrafficcollectorsbysubscription_list
  calls:
  - action: azuretrafficcollectorsbysubscription.AzureTrafficCollectorsBySubscription_List
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.id}'
