version: '1.0'
provider: azure
service: containerregistry
services:
  client: containerregistry
  module: azure.mgmt.containerregistry.v2019_05_01_preview
discovery:
- discovery_id: azure.containerregistry.scopemaps.list
  for_each: azure.containerregistry.tokens.list
  calls:
  - action: scopemaps.list
    save_as: response
    on_error: continue
    params:
      registry_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      status: '{{ item.status }}'
      id: '{{ item.id }}'
      creation_date: '{{ item.creation_date }}'
      credentials: '{{ item.credentials }}'
      scope_map_id: '{{ item.scope_map_id }}'
      system_data: '{{ item.system_data }}'
- discovery_id: azure.containerregistry.root.list
  calls:
  - action: root.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      system_data: '{{ item.system_data }}'
      description: '{{ item.description }}'
      type_properties_type: '{{ item.type_properties_type }}'
      creation_date: '{{ item.creation_date }}'
      provisioning_state: '{{ item.provisioning_state }}'
      actions: '{{ item.actions }}'
  uid_template: '{item.id}'
- discovery_id: azure.containerregistry.list_by_resource_group
  calls:
  - action: list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.id}'
