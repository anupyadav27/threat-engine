version: '1.0'
provider: azure
service: resourcehealth
services:
  client: resourcehealth
  module: azure.mgmt.resourcehealth
discovery:
- discovery_id: azure.resourcehealth.availabilitystatuses.list_by_resource_group
  calls:
  - action: availabilitystatuses.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
  uid_template: '{item.id}'
- discovery_id: azure.resourcehealth.availabilitystatuses.list_by_subscription_id
  calls:
  - action: availabilitystatuses.list_by_subscription_id
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      id: '{{ item.id }}'
      additional_information: '{{ item.additional_information }}'
      arg_query: '{{ item.arg_query }}'
      article: '{{ item.article }}'
      description: '{{ item.description }}'
      duration: '{{ item.duration }}'
      enable_chat_with_us: '{{ item.enable_chat_with_us }}'
      enable_microsoft_support: '{{ item.enable_microsoft_support }}'
      event_level: '{{ item.event_level }}'
      event_source: '{{ item.event_source }}'
      event_sub_type: '{{ item.event_sub_type }}'
      event_type: '{{ item.event_type }}'
      external_incident_id: '{{ item.external_incident_id }}'
      faqs: '{{ item.faqs }}'
      header: '{{ item.header }}'
      hir_stage: '{{ item.hir_stage }}'
      impact: '{{ item.impact }}'
      impact_mitigation_time: '{{ item.impact_mitigation_time }}'
      impact_start_time: '{{ item.impact_start_time }}'
      impact_type: '{{ item.impact_type }}'
      is_hir: '{{ item.is_hir }}'
      last_update_time: '{{ item.last_update_time }}'
      level: '{{ item.level }}'
      links: '{{ item.links }}'
      maintenance_id: '{{ item.maintenance_id }}'
      maintenance_type: '{{ item.maintenance_type }}'
      platform_initiated: '{{ item.platform_initiated }}'
      priority: '{{ item.priority }}'
      reason: '{{ item.reason }}'
      recommended_actions: '{{ item.recommended_actions }}'
      summary: '{{ item.summary }}'
      system_data: '{{ item.system_data }}'
      title: '{{ item.title }}'
  uid_template: '{item.id}'
