version: '1.0'
provider: azure
service: entra_permissions_management
services:
  client: graphservices
  module: azure.graphservices
discovery:
- discovery_id: azure.graphservices.accounts.list_by_subscription
  calls:
  - action: accounts.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      properties: '{{ item.properties }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
