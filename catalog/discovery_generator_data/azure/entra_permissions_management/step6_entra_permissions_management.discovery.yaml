# Discovery YAML — entra_permissions_management (Azure)
# Generated: 2026-04-15T09:58:00Z
# Backend namespace: graphservices
# Source: step1b + step4 dependency chain for check rules
version: '1.0'
provider: azure
service: entra_permissions_management
services:
  client: graphservices
  module: azure.graphservices
discovery:
  # ════════════════════════════════════════
  # Root (independent) operations
  # ════════════════════════════════════════
  # ── accounts.list_by_subscription [root] ──
  - discovery_id: azure.graphservices.accounts.list_by_subscription
    calls:
      - action: accounts.list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        location: '{{ item.location }}'
        tags: '{{ item.tags }}'
        properties: '{{ item.properties }}'
        system_data: '{{ item.system_data }}'
