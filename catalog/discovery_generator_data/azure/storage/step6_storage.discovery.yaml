version: '1.0'
provider: azure
service: storage
services:
  client: storage
  module: azure.mgmt.storage
discovery:
- discovery_id: azure.storage.deletedaccounts.list
  calls:
  - action: deletedaccounts.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
- discovery_id: azure.storage.skus.list
  calls:
