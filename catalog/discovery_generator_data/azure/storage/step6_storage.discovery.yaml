      primary_location: '{{ item.primary_location }}'
      private_endpoint_connections: '{{ item.private_endpoint_connections }}'
      routing_preference: '{{ item.routing_preference }}'
      sas_policy: '{{ item.sas_policy }}'
      secondary_endpoints: '{{ item.secondary_endpoints }}'
      secondary_location: '{{ item.secondary_location }}'
