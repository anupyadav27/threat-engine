version: '1.0'
provider: azure
service: newrelicobservability
services:
  client: newrelicobservability
  module: azure.mgmt.newrelicobservability
discovery:
- discovery_id: azure.newrelicobservability.monitors.list_by_resource_group
  calls:
  - action: monitors.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      account_creation_source: '{{ item.account_creation_source }}'
      liftr_resource_category: '{{ item.liftr_resource_category }}'
      liftr_resource_preference: '{{ item.liftr_resource_preference }}'
      marketplace_subscription_id: '{{ item.marketplace_subscription_id }}'
      marketplace_subscription_status: '{{ item.marketplace_subscription_status }}'
      monitoring_status: '{{ item.monitoring_status }}'
      new_relic_account_properties: '{{ item.new_relic_account_properties }}'
      org_creation_source: '{{ item.org_creation_source }}'
      plan_data: '{{ item.plan_data }}'
      saa_s_azure_subscription_status: '{{ item.saa_s_azure_subscription_status }}'
      subscription_state: '{{ item.subscription_state }}'
      system_data: '{{ item.system_data }}'
      user_info: '{{ item.user_info }}'
  uid_template: '{item.id}'
- discovery_id: azure.newrelicobservability.monitors.list_by_subscription
  calls:
  - action: monitors.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      account_creation_source: '{{ item.account_creation_source }}'
      liftr_resource_category: '{{ item.liftr_resource_category }}'
      liftr_resource_preference: '{{ item.liftr_resource_preference }}'
      marketplace_subscription_id: '{{ item.marketplace_subscription_id }}'
      marketplace_subscription_status: '{{ item.marketplace_subscription_status }}'
      monitoring_status: '{{ item.monitoring_status }}'
      new_relic_account_properties: '{{ item.new_relic_account_properties }}'
      org_creation_source: '{{ item.org_creation_source }}'
      plan_data: '{{ item.plan_data }}'
      saa_s_azure_subscription_status: '{{ item.saa_s_azure_subscription_status }}'
      subscription_state: '{{ item.subscription_state }}'
      system_data: '{{ item.system_data }}'
      user_info: '{{ item.user_info }}'
  uid_template: '{item.id}'
- discovery_id: azure.newrelicobservability.plans.list
  calls:
  - action: plans.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      billing_source: '{{ item.billing_source }}'
      organization_id: '{{ item.organization_id }}'
      organization_name: '{{ item.organization_name }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.newrelicobservability.accounts.list
  for_each: azure.newrelicobservability.monitors.get_metric_rules
  calls:
  - action: accounts.list
    save_as: response
    on_error: continue
    params:
      user_email: '{{ item.user_email }}'
      location: '{{ item.location }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      billing_source: '{{ item.billing_source }}'
      organization_id: '{{ item.organization_id }}'
      organization_name: '{{ item.organization_name }}'
      system_data: '{{ item.system_data }}'
- discovery_id: azure.newrelicobservability.connectedpartnerresources.list
  for_each: azure.newrelicobservability.monitors.list_by_subscription
  calls:
  - action: connectedpartnerresources.list
    save_as: response
    on_error: continue
    params:
      monitor_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
