# Discovery YAML — resourcegraph (Azure)
# Generated: 2026-04-15T10:39:31Z
# Source: step1b_operation_registry.json (qualified ops + dependency chains)
# Actions use {category}.{method} format for SDK method resolution
version: '1.0'
provider: azure
service: resourcegraph
services:
  client: resourcegraph
  module: azure.mgmt.resourcegraph
discovery:
  # ── graphquery.list [root] ──
  - discovery_id: azure.resourcegraph.graphquery.list
    calls:
      - action: graphquery.list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        type: '{{ item.type }}'
        name: '{{ item.name }}'
        id: '{{ item.id }}'
        display: '{{ item.display }}'
        origin: '{{ item.origin }}'
  # ── graphquery.list_by_subscription [root] ──
  - discovery_id: azure.resourcegraph.graphquery.list_by_subscription
    calls:
      - action: graphquery.list_by_subscription
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        type: '{{ item.type }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        id: '{{ item.id }}'
        tags: '{{ item.tags }}'
        description: '{{ item.description }}'
        etag: '{{ item.etag }}'
        query: '{{ item.query }}'
        result_kind: '{{ item.result_kind }}'
        time_modified: '{{ item.time_modified }}'
