version: '1.0'
provider: azure
service: entra
discovery:
- _stub: true
  discovery_id: azure.entra.list_entras
  _note: STUB — generated by step2, needs real SDK review for azure.entra
  _rules:
  - azure.entra.user.unused_credentials_configured
  - azure.entra.user.tenant_admin_api_keys_absent_configured
  - azure.entra.notification.group_mapping_configured
  _client: azure.mgmt.graphrbac
  calls:
  - action: ListResources
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      id: '{{ item.Id }}'
      name: '{{ item.Name }}'
      resource_type: '''{{ resource_type }}'''
      region: '{{ region }}'
      encrypted: '{{ item.Encrypted }}'
      kms_key_id: '{{ item.KMSKeyId }}'
      status: '{{ item.Status }}'
      enabled: '{{ item.Enabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      internet_facing: '{{ item.InternetFacing }}'
      public_ip_address: '{{ item.PublicIpAddress }}'
      tags: '{{ item.Tags }}'
      permissions: '{{ item.Permissions }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      retention_days: '{{ item.RetentionDays }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
- discovery_id: azure.entra.get_authentication_methods_policies
  calls:
  - action: authentication_methods_policies.get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      authenticationMethodsConfigurations: '{{ item.authenticationMethodsConfigurations
        }}'
      AuthenticationMethodsRegistrationCampaign: '{{ item.AuthenticationMethodsRegistrationCampaign
        }}'
      id: '{{ item.id }}'
- discovery_id: azure.entra.get_tenant_password_policy
  calls:
  - action: tenant_password_policies.get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      LockoutThreshold: '{{ item.LockoutThreshold }}'
      passwordExpirationDays: '{{ item.passwordExpirationDays }}'
      minimumPasswordLength: '{{ item.minimumPasswordLength }}'
      passwordHistoryCount: '{{ item.passwordHistoryCount }}'
      banComplexPasswords: '{{ item.banComplexPasswords }}'
- discovery_id: azure.entra.id.get_authentication_policies
  calls:
  - action: authentication_policies.get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      authenticationMethodsConfigurations: '{{ item.authenticationMethodsConfigurations
        }}'
      defaultMfaMethod: '{{ item.defaultMfaMethod }}'
      registrationCampaign: '{{ item.registrationCampaign }}'
- discovery_id: azure.entra.id.list_app_registrations
  calls:
  - action: app_registrations.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      displayName: '{{ item.displayName }}'
      appId: '{{ item.appId }}'
      owners: '{{ item.owners }}'
      passwordCredentials: '{{ item.passwordCredentials }}'
      keyCredentials: '{{ item.keyCredentials }}'
      signInAudience: '{{ item.signInAudience }}'
      requiredResourceAccess: '{{ item.requiredResourceAccess }}'
- discovery_id: azure.entra.id.list_diagnostic_settings
  calls:
  - action: diagnostic_settings.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      logs: '{{ item.logs }}'
      metrics: '{{ item.metrics }}'
      storageAccountId: '{{ item.storageAccountId }}'
      workspaceId: '{{ item.workspaceId }}'
      eventHubName: '{{ item.eventHubName }}'
- discovery_id: azure.entra.id.list_tenant_policies
