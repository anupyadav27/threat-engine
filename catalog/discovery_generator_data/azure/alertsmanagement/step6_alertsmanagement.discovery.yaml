version: '1.0'
provider: azure
service: alertsmanagement
services:
  client: alertsmanagement
  module: azure.mgmt.alertsmanagement
discovery:
- discovery_id: azure.alertsmanagement.actionrules.list_by_resource_group
  calls:
  - action: actionrules.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.id}'
- discovery_id: azure.alertsmanagement.actionrules.list_by_subscription
  calls:
  - action: actionrules.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.id}'
- discovery_id: azure.alertsmanagement.alerts.get_all
  calls:
  - action: alerts.get_all
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      identity: '{{ response.identity }}'
      type: '{{ response.type }}'
      properties: '{{ response.properties }}'
      location: '{{ response.location }}'
      sku: '{{ response.sku }}'
      name: '{{ response.name }}'
      provisioning_state: '{{ response.provisioning_state }}'
      zones: '{{ response.zones }}'
      kind: '{{ response.kind }}'
      id: '{{ response.id }}'
      tags: '{{ response.tags }}'
  uid_template: '{item.id}'
- discovery_id: azure.alertsmanagement.smartdetectoralertrules.list
  calls:
  - action: smartdetectoralertrules.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.id}'
- discovery_id: azure.alertsmanagement.smartdetectoralertrules.list_by_resource_group
  calls:
  - action: smartdetectoralertrules.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.id}'
- discovery_id: azure.alertsmanagement.smartgroups.get_all
  calls:
  - action: smartgroups.get_all
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      identity: '{{ response.identity }}'
      type: '{{ response.type }}'
      properties: '{{ response.properties }}'
      location: '{{ response.location }}'
      sku: '{{ response.sku }}'
      name: '{{ response.name }}'
      provisioning_state: '{{ response.provisioning_state }}'
      zones: '{{ response.zones }}'
      kind: '{{ response.kind }}'
      id: '{{ response.id }}'
      tags: '{{ response.tags }}'
  uid_template: '{item.id}'
- discovery_id: azure.alertsmanagement.actionrules.get_by_name
  for_each: azure.alertsmanagement.actionrules.list_by_subscription
  calls:
  - action: actionrules.get_by_name
    save_as: response
    on_error: continue
    params:
      action_rule_name: '{{ item.name }}'
  emit:
    as: item
    item:
      identity: '{{ response.identity }}'
      type: '{{ response.type }}'
      properties: '{{ response.properties }}'
      location: '{{ response.location }}'
      sku: '{{ response.sku }}'
      name: '{{ response.name }}'
      provisioning_state: '{{ response.provisioning_state }}'
      zones: '{{ response.zones }}'
      kind: '{{ response.kind }}'
      id: '{{ response.id }}'
      tags: '{{ response.tags }}'
- discovery_id: azure.alertsmanagement.alerts.get_by_id
  for_each: azure.alertsmanagement.alerts.get_history
  calls:
  - action: alerts.get_by_id
    save_as: response
    on_error: continue
    params:
      alert_id: '{{ item.id }}'
  emit:
    as: item
    item:
      identity: '{{ response.identity }}'
      type: '{{ response.type }}'
      properties: '{{ response.properties }}'
      location: '{{ response.location }}'
      sku: '{{ response.sku }}'
      name: '{{ response.name }}'
      provisioning_state: '{{ response.provisioning_state }}'
      zones: '{{ response.zones }}'
      kind: '{{ response.kind }}'
      id: '{{ response.id }}'
      tags: '{{ response.tags }}'
- discovery_id: azure.alertsmanagement.smartgroups.get_by_id
  for_each: azure.alertsmanagement.smartgroups.get_history
  calls:
  - action: smartgroups.get_by_id
    save_as: response
    on_error: continue
    params:
      smart_group_id: '{{ item.id }}'
  emit:
    as: item
    item:
      identity: '{{ response.identity }}'
      type: '{{ response.type }}'
      properties: '{{ response.properties }}'
      location: '{{ response.location }}'
      sku: '{{ response.sku }}'
      name: '{{ response.name }}'
      provisioning_state: '{{ response.provisioning_state }}'
      zones: '{{ response.zones }}'
      kind: '{{ response.kind }}'
      id: '{{ response.id }}'
      tags: '{{ response.tags }}'
