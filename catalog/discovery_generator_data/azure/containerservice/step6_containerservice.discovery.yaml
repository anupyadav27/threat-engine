    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      zones: '{{ item.zones }}'
      id: '{{ item.id }}'
