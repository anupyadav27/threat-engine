version: '1.0'
provider: azure
service: cost
discovery:
- discovery_id: azure.billing.billingaccounts.list
  calls:
  - action: billingaccounts.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      system_data: '{{ item.system_data }}'
      tags: '{{ item.tags }}'
      properties: '{{ item.properties }}'
  uid_template: '{item.id}'
- discovery_id: azure.costmanagement.alerts.list
  calls:
  - action: alerts.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      e_tag: '{{ item.e_tag }}'
      definition: '{{ item.definition }}'
      description: '{{ item.description }}'
      source: '{{ item.source }}'
      details: '{{ item.details }}'
      cost_entity_id: '{{ item.cost_entity_id }}'
      status: '{{ item.status }}'
      creation_time: '{{ item.creation_time }}'
      close_time: '{{ item.close_time }}'
      modification_time: '{{ item.modification_time }}'
      status_modification_user_name: '{{ item.status_modification_user_name }}'
      status_modification_time: '{{ item.status_modification_time }}'
  uid_template: '{item.id}'
- discovery_id: azure.costmanagement.exports.list
  calls:
  - action: exports.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      e_tag: '{{ item.e_tag }}'
      format: '{{ item.format }}'
      delivery_info: '{{ item.delivery_info }}'
      definition: '{{ item.definition }}'
      run_history: '{{ item.run_history }}'
      partition_data: '{{ item.partition_data }}'
      next_run_time_estimate: '{{ item.next_run_time_estimate }}'
      schedule: '{{ item.schedule }}'
  uid_template: '{item.id}'
