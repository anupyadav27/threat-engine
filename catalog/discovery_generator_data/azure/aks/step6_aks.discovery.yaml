version: '1.0'
provider: azure
service: aks
discovery:
- _stub: true
  discovery_id: azure.aks.list_akss
  _note: STUB — generated by step2, needs real SDK review for azure.aks
  _rules:
  - azure.aks.cluster.rbac_enabled
  _client: azure.mgmt.containerservice
  calls:
  - action: ListResources
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      id: '{{ item.Id }}'
      name: '{{ item.Name }}'
      resource_type: '''{{ resource_type }}'''
      region: '{{ region }}'
      encrypted: '{{ item.Encrypted }}'
      kms_key_id: '{{ item.KMSKeyId }}'
      status: '{{ item.Status }}'
      enabled: '{{ item.Enabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      internet_facing: '{{ item.InternetFacing }}'
      public_ip_address: '{{ item.PublicIpAddress }}'
      tags: '{{ item.Tags }}'
      permissions: '{{ item.Permissions }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      retention_days: '{{ item.RetentionDays }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
- discovery_id: azure.containerservice.managedclusters.list
  uid_template: "{item.id}"
  calls:
  - action: managedclusters.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      system_data: '{{ item.system_data }}'
      tags: '{{ item.tags }}'
      location: '{{ item.location }}'
      e_tag: '{{ item.e_tag }}'
      sku: '{{ item.sku }}'
      extended_location: '{{ item.extended_location }}'
      identity: '{{ item.identity }}'
      kind: '{{ item.kind }}'
      provisioning_state: '{{ item.provisioning_state }}'
      power_state: '{{ item.power_state }}'
      max_agent_pools: '{{ item.max_agent_pools }}'
      kubernetes_version: '{{ item.kubernetes_version }}'
      current_kubernetes_version: '{{ item.current_kubernetes_version }}'
      dns_prefix: '{{ item.dns_prefix }}'
      fqdn_subdomain: '{{ item.fqdn_subdomain }}'
      fqdn: '{{ item.fqdn }}'
      private_fqdn: '{{ item.private_fqdn }}'
      azure_portal_fqdn: '{{ item.azure_portal_fqdn }}'
      agent_pool_profiles: '{{ item.agent_pool_profiles }}'
      linux_profile: '{{ item.linux_profile }}'
      windows_profile: '{{ item.windows_profile }}'
      service_principal_profile: '{{ item.service_principal_profile }}'
      addon_profiles: '{{ item.addon_profiles }}'
      pod_identity_profile: '{{ item.pod_identity_profile }}'
      oidc_issuer_profile: '{{ item.oidc_issuer_profile }}'
      node_resource_group: '{{ item.node_resource_group }}'
      node_resource_group_profile: '{{ item.node_resource_group_profile }}'
      enable_rbac: '{{ item.enable_rbac }}'
      support_plan: '{{ item.support_plan }}'
      network_profile: '{{ item.network_profile }}'
      aad_profile: '{{ item.aad_profile }}'
      auto_upgrade_profile: '{{ item.auto_upgrade_profile }}'
      upgrade_settings: '{{ item.upgrade_settings }}'
      auto_scaler_profile: '{{ item.auto_scaler_profile }}'
      api_server_access_profile: '{{ item.api_server_access_profile }}'
      disk_encryption_set_id: '{{ item.disk_encryption_set_id }}'
      identity_profile: '{{ item.identity_profile }}'
      private_link_resources: '{{ item.private_link_resources }}'
      disable_local_accounts: '{{ item.disable_local_accounts }}'
      http_proxy_config: '{{ item.http_proxy_config }}'
      security_profile: '{{ item.security_profile }}'
      storage_profile: '{{ item.storage_profile }}'
      ingress_profile: '{{ item.ingress_profile }}'
      public_network_access: '{{ item.public_network_access }}'
      workload_auto_scaler_profile: '{{ item.workload_auto_scaler_profile }}'
      azure_monitor_profile: '{{ item.azure_monitor_profile }}'
      service_mesh_profile: '{{ item.service_mesh_profile }}'
      resource_uid: '{{ item.resource_uid }}'
      metrics_profile: '{{ item.metrics_profile }}'
      node_provisioning_profile: '{{ item.node_provisioning_profile }}'
      bootstrap_profile: '{{ item.bootstrap_profile }}'
      ai_toolchain_operator_profile: '{{ item.ai_toolchain_operator_profile }}'
      status: '{{ item.status }}'
