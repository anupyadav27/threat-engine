version: '1.0'
provider: azure
service: healthbot
services:
  client: healthbot
  module: azure.mgmt.healthbot
discovery:
- discovery_id: azure.healthbot.bots.list
  calls:
  - action: bots.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      display: '{{ item.display }}'
      is_data_action: '{{ item.is_data_action }}'
      origin: '{{ item.origin }}'
  uid_template: '{item.id}'
- discovery_id: azure.healthbot.bots.list_by_resource_group
  calls:
  - action: bots.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.healthbot.bots.list_secrets
  for_each: azure.healthbot.bots.list
  calls:
  - action: bots.list_secrets
    save_as: response
    on_error: continue
    params:
      bot_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
