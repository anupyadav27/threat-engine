version: '1.0'
provider: azure
service: education
services:
  client: education
  module: azure.mgmt.education
discovery:
- discovery_id: azure.education.grants.list_all
  calls:
  - action: grants.list_all
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      id: '{{ item.id }}'
      budget_per_student: '{{ item.budget_per_student }}'
      currency_properties_total_allocated_budget_currency: '{{ item.currency_properties_total_allocated_budget_currency
        }}'
      currency_properties_total_budget_currency: '{{ item.currency_properties_total_budget_currency
        }}'
      description: '{{ item.description }}'
      display_name: '{{ item.display_name }}'
      effective_date: '{{ item.effective_date }}'
      expiration_date: '{{ item.expiration_date }}'
      invitation_code: '{{ item.invitation_code }}'
      max_student_count: '{{ item.max_student_count }}'
      system_data: '{{ item.system_data }}'
      value_properties_total_allocated_budget_value: '{{ item.value_properties_total_allocated_budget_value
        }}'
      value_properties_total_budget_value: '{{ item.value_properties_total_budget_value
        }}'
  uid_template: '{item.id}'
- discovery_id: azure.education.studentlabs.list_all
  calls:
  - action: studentlabs.list_all
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      id: '{{ item.id }}'
      budget_per_student: '{{ item.budget_per_student }}'
      currency_properties_total_allocated_budget_currency: '{{ item.currency_properties_total_allocated_budget_currency
        }}'
      currency_properties_total_budget_currency: '{{ item.currency_properties_total_budget_currency
        }}'
      description: '{{ item.description }}'
      display_name: '{{ item.display_name }}'
      effective_date: '{{ item.effective_date }}'
      expiration_date: '{{ item.expiration_date }}'
      invitation_code: '{{ item.invitation_code }}'
      max_student_count: '{{ item.max_student_count }}'
      system_data: '{{ item.system_data }}'
      value_properties_total_allocated_budget_value: '{{ item.value_properties_total_allocated_budget_value
        }}'
      value_properties_total_budget_value: '{{ item.value_properties_total_budget_value
        }}'
  uid_template: '{item.id}'
- discovery_id: azure.education.grants.list
  for_each: azure.education.grants.list_all
  calls:
  - action: grants.list
    save_as: response
    on_error: continue
    params:
      billing_account_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      id: '{{ item.id }}'
      budget: '{{ item.budget }}'
      effective_date: '{{ item.effective_date }}'
      email: '{{ item.email }}'
      expiration_date: '{{ item.expiration_date }}'
      first_name: '{{ item.first_name }}'
      last_name: '{{ item.last_name }}'
      role: '{{ item.role }}'
      subscription_alias: '{{ item.subscription_alias }}'
      subscription_id: '{{ item.subscription_id }}'
      subscription_invite_last_sent_date: '{{ item.subscription_invite_last_sent_date
        }}'
      system_data: '{{ item.system_data }}'
