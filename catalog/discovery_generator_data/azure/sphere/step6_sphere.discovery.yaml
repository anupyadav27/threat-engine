version: '1.0'
provider: azure
service: sphere
services:
  client: sphere
  module: azure.mgmt.sphere
discovery:
- discovery_id: azure.sphere.catalogs.list_by_resource_group
  calls:
  - action: catalogs.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.sphere.catalogs.list_by_subscription
  calls:
  - action: catalogs.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.sphere.catalogs.list_deployments
  for_each: azure.sphere.catalogs.list_by_subscription
  calls:
  - action: catalogs.list_deployments
    save_as: response
    on_error: continue
    params:
      catalog_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      system_data: '{{ item.system_data }}'
