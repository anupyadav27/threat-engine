version: '1.0'
provider: azure
service: securityandcompliance
services:
  client: securityandcompliance
  module: azure.mgmt.securityandcompliance
discovery:
- discovery_id: azure.securityandcompliance.operations.operations_list
  calls:
  - action: operations.Operations_List
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      zones: '{{ item.zones }}'
      kind: '{{ item.kind }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.id}'
