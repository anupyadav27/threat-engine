version: '1.0'
provider: azure
service: eventhub
services:
  client: eventhub
  module: azure.mgmt.eventhub.v2018_01_01_preview
discovery:
- discovery_id: azure.eventhub.clusters.list_available_cluster_region
  calls:
  - action: clusters.list_available_cluster_region
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
- discovery_id: azure.eventhub.clusters.list_by_resource_group
  calls:
  - action: clusters.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      status: '{{ item.status }}'
      id: '{{ item.id }}'
      encryption: '{{ item.encryption }}'
      tags: '{{ item.tags }}'
      cluster_arm_id: '{{ item.cluster_arm_id }}'
      created_at: '{{ item.created_at }}'
      is_auto_inflate_enabled: '{{ item.is_auto_inflate_enabled }}'
      kafka_enabled: '{{ item.kafka_enabled }}'
      maximum_throughput_units: '{{ item.maximum_throughput_units }}'
      metric_id: '{{ item.metric_id }}'
      service_bus_endpoint: '{{ item.service_bus_endpoint }}'
      updated_at: '{{ item.updated_at }}'
      zone_redundant: '{{ item.zone_redundant }}'
