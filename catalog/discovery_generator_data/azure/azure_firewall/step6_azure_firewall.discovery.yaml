version: '1.0'
provider: azure
service: azure_firewall
services:
  client: network
  module: azure.mgmt.network
discovery:
- discovery_id: azure.network.azurefirewalls.list_all
  calls:
  - action: azurefirewalls.list_all
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      provisioning_state: '{{ item.provisioning_state }}'
      managed_rules: '{{ item.managed_rules }}'
      policy_settings: '{{ item.policy_settings }}'
      custom_rules: '{{ item.custom_rules }}'
      application_gateway_for_containers: '{{ item.application_gateway_for_containers
        }}'
      application_gateways: '{{ item.application_gateways }}'
      etag: '{{ item.etag }}'
      http_listeners: '{{ item.http_listeners }}'
      path_based_rules: '{{ item.path_based_rules }}'
      resource_state: '{{ item.resource_state }}'
  uid_template: '{item.id}'
- discovery_id: azure.network.firewallpolicies.list_all
  calls:
  - action: firewallpolicies.list_all
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      provisioning_state: '{{ item.provisioning_state }}'
      managed_rules: '{{ item.managed_rules }}'
      policy_settings: '{{ item.policy_settings }}'
      custom_rules: '{{ item.custom_rules }}'
      application_gateway_for_containers: '{{ item.application_gateway_for_containers
        }}'
      application_gateways: '{{ item.application_gateways }}'
      etag: '{{ item.etag }}'
      http_listeners: '{{ item.http_listeners }}'
      path_based_rules: '{{ item.path_based_rules }}'
      resource_state: '{{ item.resource_state }}'
  uid_template: '{item.id}'
