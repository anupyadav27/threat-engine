version: '1.0'
provider: azure
service: maintenance
services:
  client: maintenance
  module: azure.mgmt.maintenance
discovery:
- discovery_id: azure.maintenance.applyupdateforresourcegroup.list
  calls:
  - action: applyupdateforresourcegroup.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      id: '{{ item.id }}'
      impact_duration_in_sec: '{{ item.impact_duration_in_sec }}'
      impact_type: '{{ item.impact_type }}'
      maintenance_scope: '{{ item.maintenance_scope }}'
      not_before: '{{ item.not_before }}'
      resource_id: '{{ item.resource_id }}'
  uid_template: '{item.id}'
- discovery_id: azure.maintenance.applyupdates.list
  calls:
  - action: applyupdates.list
    save_as: response
    on_error: continue
