    save_as: response
    on_error: continue
    params:
      provider_name: '{{ item.name }}'
      resource_name: '{{ item.name }}'
      apply_update_name: '{{ item.name }}'
  emit:
    as: item
    item:
      identity: '{{ response.identity }}'
      type: '{{ response.type }}'
      properties: '{{ response.properties }}'
      location: '{{ response.location }}'
      sku: '{{ response.sku }}'
      name: '{{ response.name }}'
