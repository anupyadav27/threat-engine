version: '1.0'
provider: azure
service: deviceupdate
services:
  client: deviceupdate
  module: azure.mgmt.deviceupdate
discovery:
- discovery_id: azure.deviceupdate.accounts.list_by_resource_group
  calls:
  - action: accounts.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      public_network_access: '{{ item.public_network_access }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      encryption: '{{ item.encryption }}'
      tags: '{{ item.tags }}'
      host_name: '{{ item.host_name }}'
      locations: '{{ item.locations }}'
      private_endpoint_connections: '{{ item.private_endpoint_connections }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.deviceupdate.accounts.list_by_subscription
  calls:
  - action: accounts.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      public_network_access: '{{ item.public_network_access }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      sku: '{{ item.sku }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      encryption: '{{ item.encryption }}'
      tags: '{{ item.tags }}'
      host_name: '{{ item.host_name }}'
      locations: '{{ item.locations }}'
      private_endpoint_connections: '{{ item.private_endpoint_connections }}'
      system_data: '{{ item.system_data }}'
  uid_template: '{item.id}'
- discovery_id: azure.deviceupdate.instances.list_by_account
  for_each: azure.deviceupdate.accounts.list_by_subscription
  calls:
  - action: instances.list_by_account
    save_as: response
    on_error: continue
    params:
      account_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      group_id: '{{ item.group_id }}'
      required_members: '{{ item.required_members }}'
      required_zone_names: '{{ item.required_zone_names }}'
      system_data: '{{ item.system_data }}'
- discovery_id: azure.deviceupdate.privateendpointconnectionproxies.list_by_account
  for_each: azure.deviceupdate.accounts.list_by_subscription
  calls:
  - action: privateendpointconnectionproxies.list_by_account
    save_as: response
    on_error: continue
    params:
      account_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      group_id: '{{ item.group_id }}'
      required_members: '{{ item.required_members }}'
      required_zone_names: '{{ item.required_zone_names }}'
      system_data: '{{ item.system_data }}'
- discovery_id: azure.deviceupdate.privateendpointconnections.list_by_account
  for_each: azure.deviceupdate.accounts.list_by_subscription
  calls:
  - action: privateendpointconnections.list_by_account
    save_as: response
    on_error: continue
    params:
      account_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      group_id: '{{ item.group_id }}'
      required_members: '{{ item.required_members }}'
      required_zone_names: '{{ item.required_zone_names }}'
      system_data: '{{ item.system_data }}'
- discovery_id: azure.deviceupdate.privatelinkresources.list_by_account
  for_each: azure.deviceupdate.accounts.list_by_subscription
  calls:
  - action: privatelinkresources.list_by_account
    save_as: response
    on_error: continue
    params:
      account_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      group_id: '{{ item.group_id }}'
      required_members: '{{ item.required_members }}'
      required_zone_names: '{{ item.required_zone_names }}'
      system_data: '{{ item.system_data }}'
