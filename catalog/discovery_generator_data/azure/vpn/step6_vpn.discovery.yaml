version: '1.0'
provider: azure
service: vpn
discovery:
- _stub: true
  discovery_id: azure.vpn.list_vpns
  _note: "STUB \u2014 generated by step2, needs real SDK review for azure.vpn"
  _rules:
  - azure.vpn.virtual_network_gateway.split_tunnel_configured
  _client: azure.mgmt.network
  calls:
  - action: ListResources
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      id: '{{ item.Id }}'
      name: '{{ item.Name }}'
      resource_type: '''{{ resource_type }}'''
      region: '{{ region }}'
      encrypted: '{{ item.Encrypted }}'
      kms_key_id: '{{ item.KMSKeyId }}'
      status: '{{ item.Status }}'
      enabled: '{{ item.Enabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      internet_facing: '{{ item.InternetFacing }}'
      public_ip_address: '{{ item.PublicIpAddress }}'
      tags: '{{ item.Tags }}'
      permissions: '{{ item.Permissions }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      retention_days: '{{ item.RetentionDays }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
- discovery_id: azure.network.vpngateways.list
  calls:
  - action: vpngateways.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      provisioning_state: '{{ item.provisioning_state }}'
      etag: '{{ item.etag }}'
      connections: '{{ item.connections }}'
      vpn_gateway_scale_unit: '{{ item.vpn_gateway_scale_unit }}'
      ip_configurations: '{{ item.ip_configurations }}'
      enable_bgp_route_translation_for_nat: '{{ item.enable_bgp_route_translation_for_nat
        }}'
      is_routing_preference_internet: '{{ item.is_routing_preference_internet }}'
      nat_rules: '{{ item.nat_rules }}'
      virtual_hub.id: '{{ item.virtual_hub.id }}'
      bgp_settings.asn: '{{ item.bgp_settings.asn }}'
      bgp_settings.bgp_peering_address: '{{ item.bgp_settings.bgp_peering_address
        }}'
      bgp_settings.peer_weight: '{{ item.bgp_settings.peer_weight }}'
      bgp_settings.bgp_peering_addresses: '{{ item.bgp_settings.bgp_peering_addresses
        }}'
