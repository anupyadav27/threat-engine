    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      current_value: '{{ item.current_value }}'
      limit: '{{ item.limit }}'
      resource_type: '{{ item.resource_type }}'
      unit: '{{ item.unit }}'
