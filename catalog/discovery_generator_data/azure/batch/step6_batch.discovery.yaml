version: '1.0'
provider: azure
service: batch
services:
  client: batch
  module: azure.mgmt.batch
discovery:
- discovery_id: azure.batch.batchaccount.list
  calls:
  - action: batchaccount.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      etag: '{{ item.etag }}'
      format: '{{ item.format }}'
      last_activation_time: '{{ item.last_activation_time }}'
      state: '{{ item.state }}'
      storage_url: '{{ item.storage_url }}'
      storage_url_expiry: '{{ item.storage_url_expiry }}'
- discovery_id: azure.batch.batchaccount.list_by_resource_group
  calls:
  - action: batchaccount.list_by_resource_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      identity: '{{ item.identity }}'
      public_network_access: '{{ item.public_network_access }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      provisioning_state: '{{ item.provisioning_state }}'
      id: '{{ item.id }}'
      encryption: '{{ item.encryption }}'
      tags: '{{ item.tags }}'
      account_endpoint: '{{ item.account_endpoint }}'
      active_job_and_job_schedule_quota: '{{ item.active_job_and_job_schedule_quota
        }}'
      allowed_authentication_modes: '{{ item.allowed_authentication_modes }}'
      auto_storage: '{{ item.auto_storage }}'
      dedicated_core_quota: '{{ item.dedicated_core_quota }}'
      dedicated_core_quota_per_vm_family: '{{ item.dedicated_core_quota_per_vm_family
        }}'
      dedicated_core_quota_per_vm_family_enforced: '{{ item.dedicated_core_quota_per_vm_family_enforced
        }}'
      key_vault_reference: '{{ item.key_vault_reference }}'
      low_priority_core_quota: '{{ item.low_priority_core_quota }}'
      network_profile: '{{ item.network_profile }}'
      node_management_endpoint: '{{ item.node_management_endpoint }}'
      pool_allocation_mode: '{{ item.pool_allocation_mode }}'
      pool_quota: '{{ item.pool_quota }}'
      private_endpoint_connections: '{{ item.private_endpoint_connections }}'
- discovery_id: azure.batch.application.list
  for_each: azure.batch.batchaccount.list
  calls:
  - action: application.list
    save_as: response
    on_error: continue
    params:
      account_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      etag: '{{ item.etag }}'
      format: '{{ item.format }}'
      last_activation_time: '{{ item.last_activation_time }}'
      state: '{{ item.state }}'
      storage_url: '{{ item.storage_url }}'
      storage_url_expiry: '{{ item.storage_url_expiry }}'
- discovery_id: azure.batch.applicationpackage.list
  for_each: azure.batch.batchaccount.list
  calls:
  - action: applicationpackage.list
    save_as: response
    on_error: continue
    params:
      account_name: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
      tags: '{{ item.tags }}'
      etag: '{{ item.etag }}'
      format: '{{ item.format }}'
      last_activation_time: '{{ item.last_activation_time }}'
      state: '{{ item.state }}'
      storage_url: '{{ item.storage_url }}'
      storage_url_expiry: '{{ item.storage_url_expiry }}'
- discovery_id: azure.batch.batchaccount.get_detector
  for_each: azure.batch.batchaccount.list
  calls:
  - action: batchaccount.get_detector
    save_as: response
    on_error: continue
    params:
      account_name: '{{ item.name }}'
      detector_id: '{{ item.id }}'
  emit:
    as: item
    item:
      identity: '{{ response.identity }}'
      type: '{{ response.type }}'
      properties: '{{ response.properties }}'
      location: '{{ response.location }}'
      sku: '{{ response.sku }}'
      name: '{{ response.name }}'
      provisioning_state: '{{ response.provisioning_state }}'
      zones: '{{ response.zones }}'
      kind: '{{ response.kind }}'
      id: '{{ response.id }}'
      tags: '{{ response.tags }}'
- discovery_id: azure.batch.batchaccount.get_keys
  for_each: azure.batch.batchaccount.list
  calls:
  - action: batchaccount.get_keys
    save_as: response
    on_error: continue
    params:
      account_name: '{{ item.name }}'
  emit:
    as: item
    item:
      identity: '{{ response.identity }}'
      type: '{{ response.type }}'
      properties: '{{ response.properties }}'
      location: '{{ response.location }}'
      sku: '{{ response.sku }}'
      name: '{{ response.name }}'
      provisioning_state: '{{ response.provisioning_state }}'
      zones: '{{ response.zones }}'
      kind: '{{ response.kind }}'
      id: '{{ response.id }}'
      tags: '{{ response.tags }}'
- discovery_id: azure.batch.batchaccount.list_detectors
  for_each: azure.batch.batchaccount.list
  calls:
