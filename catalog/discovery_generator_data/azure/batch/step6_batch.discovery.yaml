- discovery_id: azure.batch.location.get_quotas
  for_each: azure.batch.location.list_supported_virtual_machine_skus
  calls:
  - action: location.get_quotas
    save_as: response
    on_error: continue
    params:
      location_name: '{{ item.name }}'
  emit:
    as: item
    item:
      identity: '{{ response.identity }}'
      type: '{{ response.type }}'
      properties: '{{ response.properties }}'
      location: '{{ response.location }}'
      sku: '{{ response.sku }}'
      name: '{{ response.name }}'
      provisioning_state: '{{ response.provisioning_state }}'
      zones: '{{ response.zones }}'
      kind: '{{ response.kind }}'
      id: '{{ response.id }}'
      tags: '{{ response.tags }}'
- discovery_id: azure.batch.networksecurityperimeter.get_configuration
  for_each: azure.batch.batchaccount.list
  calls:
  - action: networksecurityperimeter.get_configuration
    save_as: response
    on_error: continue
