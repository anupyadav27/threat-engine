version: '1.0'
provider: azure
service: network
services:
  client: network
  module: azure.mgmt.network
discovery:
- discovery_id: azure.network.applicationgateways.list
  calls:
  - action: applicationgateways.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      type: '{{ item.type }}'
      properties: '{{ item.properties }}'
      name: '{{ item.name }}'
      id: '{{ item.id }}'
- discovery_id: azure.network.applicationgateways.list_all
