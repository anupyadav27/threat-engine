# ═══════════════════════════════════════════
# SSL Predefined Policies — azure.network.applicationgateways.list_available_ssl_predefined_policies
# Fields: name, id, cipher_suites, min_protocol_version
# ═══════════════════════════════════════════
- rule_id: azure.network.ssl_policy.cipher_suites_configured
  for_each: azure.network.applicationgateways.list_available_ssl_predefined_policies
  conditions:
    var: item.cipher_suites
    op: not_empty

- rule_id: azure.network.ssl_policy.min_protocol_version_set
  for_each: azure.network.applicationgateways.list_available_ssl_predefined_policies
  conditions:
    var: item.min_protocol_version
    op: not_empty
