version: '1.0'
provider: azure
service: network
checks:
# ═══════════════════════════════════════════
# NSGs — azure.network.networksecuritygroups.list_all
# Fields: id, name, type, location, tags, provisioning_state, etag,
#         custom_rules, managed_rules, policy_settings, resource_state,
#         application_gateways, http_listeners, path_based_rules
# ═══════════════════════════════════════════
- rule_id: azure.network.nsg.custom_rules_configured
  for_each: azure.network.networksecuritygroups.list_all
  conditions:
    var: item.custom_rules
    op: not_empty

- rule_id: azure.network.nsg.provisioning_succeeded
  for_each: azure.network.networksecuritygroups.list_all
  conditions:
    var: item.provisioning_state
    op: equals
    value: Succeeded

- rule_id: azure.network.nsg.tags_configured
  for_each: azure.network.networksecuritygroups.list_all
  conditions:
    var: item.tags
    op: not_empty

# ═══════════════════════════════════════════
# Virtual Networks — azure.network.virtualnetworks.list_all
# Fields: same set as NSGs (generic network resource set)
# Note: VNet-specific fields (address_space, subnets, peerings, ddos_protection)
#       are inside the properties blob on full get operations
# ═══════════════════════════════════════════
- rule_id: azure.network.vnet.provisioning_succeeded
  for_each: azure.network.virtualnetworks.list_all
  conditions:
    var: item.provisioning_state
    op: equals
    value: Succeeded

- rule_id: azure.network.vnet.tags_configured
  for_each: azure.network.virtualnetworks.list_all
  conditions:
    var: item.tags
    op: not_empty

# ═══════════════════════════════════════════
# WAF Policies — azure.network.webapplicationfirewallpolicies.list_all
# Fields: id, name, type, location, tags, provisioning_state,
#         custom_rules, managed_rules, policy_settings, resource_state
# ═══════════════════════════════════════════
- rule_id: azure.network.waf.custom_rules_configured
  for_each: azure.network.webapplicationfirewallpolicies.list_all
  conditions:
    var: item.custom_rules
    op: not_empty

- rule_id: azure.network.waf.managed_rules_configured
  for_each: azure.network.webapplicationfirewallpolicies.list_all
  conditions:
    var: item.managed_rules
    op: not_empty

- rule_id: azure.network.waf.policy_settings_configured
  for_each: azure.network.webapplicationfirewallpolicies.list_all
  conditions:
    var: item.policy_settings
    op: not_empty

- rule_id: azure.network.waf.provisioning_succeeded
  for_each: azure.network.webapplicationfirewallpolicies.list_all
  conditions:
    var: item.provisioning_state
    op: equals
    value: Succeeded

- rule_id: azure.network.waf.tags_configured
  for_each: azure.network.webapplicationfirewallpolicies.list_all
  conditions:
    var: item.tags
    op: not_empty

# ═══════════════════════════════════════════
# Application Gateways — azure.network.applicationgateways.list_all
# Fields: same generic set
