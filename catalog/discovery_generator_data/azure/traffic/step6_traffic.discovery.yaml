version: '1.0'
provider: azure
service: traffic
discovery:
- discovery_id: azure.trafficmanager.profiles.list_by_subscription
  calls:
  - action: profiles.list_by_subscription
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.value }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      profile_status: '{{ item.profile_status }}'
      traffic_routing_method: '{{ item.traffic_routing_method }}'
      dns_config: '{{ item.dns_config }}'
      monitor_config: '{{ item.monitor_config }}'
      endpoints: '{{ item.endpoints }}'
      traffic_view_enrollment_status: '{{ item.traffic_view_enrollment_status }}'
      allowed_endpoint_record_types: '{{ item.allowed_endpoint_record_types }}'
      max_return: '{{ item.max_return }}'
  uid_template: '{item.id}'
