    calls:
      - action: attestationproviders.AttestationProviders_List
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        identity: '{{ item.identity }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        location: '{{ item.location }}'
        sku: '{{ item.sku }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
        zones: '{{ item.zones }}'
        kind: '{{ item.kind }}'
        id: '{{ item.id }}'
        tags: '{{ item.tags }}'
  # ── operations.Operations_List [root] ──
  - discovery_id: azure.attestation.operations.operations_list
    calls:
      - action: operations.Operations_List
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        identity: '{{ item.identity }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        location: '{{ item.location }}'
        sku: '{{ item.sku }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
