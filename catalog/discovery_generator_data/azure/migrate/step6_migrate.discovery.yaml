  # ── hypervsites.HyperVSites_List [root] ──
  - discovery_id: azure.migrate.hypervsites.hypervsites_list
    calls:
      - action: hypervsites.HyperVSites_List
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.value }}'
      item:
        identity: '{{ item.identity }}'
        type: '{{ item.type }}'
        properties: '{{ item.properties }}'
        location: '{{ item.location }}'
        sku: '{{ item.sku }}'
        name: '{{ item.name }}'
        provisioning_state: '{{ item.provisioning_state }}'
