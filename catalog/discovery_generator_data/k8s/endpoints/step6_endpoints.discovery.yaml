version: '1.0'
provider: k8s
service: endpoints
services:
  client: endpoints
  module: kubernetes.client
discovery:
- discovery_id: k8s.endpoints.list_endpoints_for_all_namespaces
  calls:
  - action: list_endpoints_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      apiVersion: '{{ item.apiVersion }}'
      kind: '{{ item.kind }}'
      metadata.uid: '{{ item.metadata.uid }}'
      metadata.name: '{{ item.metadata.name }}'
      metadata.namespace: '{{ item.metadata.namespace }}'
      metadata.labels: '{{ item.metadata.labels }}'
      metadata.annotations: '{{ item.metadata.annotations }}'
      metadata.creationTimestamp: '{{ item.metadata.creationTimestamp }}'
      metadata.resourceVersion: '{{ item.metadata.resourceVersion }}'
      metadata.ownerReferences: '{{ item.metadata.ownerReferences }}'
      subsets: '{{ item.subsets }}'
      subsets[].addresses: '{{ item.subsets[].addresses }}'
      subsets[].notReadyAddresses: '{{ item.subsets[].notReadyAddresses }}'
      subsets[].ports: '{{ item.subsets[].ports }}'
