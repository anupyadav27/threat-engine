version: '1.0'
provider: k8s
service: endpoints
services:
  client: endpoints
  module: kubernetes.client
discovery:
- discovery_id: k8s.endpoints.list_endpoints_for_all_namespaces
  calls:
  - action: list_endpoints_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
