version: '1.0'
provider: k8s
service: node
services:
  client: node
  module: kubernetes.client
discovery:
- discovery_id: k8s.node.list_node
  calls:
  - action: list_node
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      apiVersion: '{{ item.apiVersion }}'
      kind: '{{ item.kind }}'
      metadata.uid: '{{ item.metadata.uid }}'
      metadata.name: '{{ item.metadata.name }}'
      metadata.namespace: '{{ item.metadata.namespace }}'
      metadata.labels: '{{ item.metadata.labels }}'
      metadata.annotations: '{{ item.metadata.annotations }}'
      metadata.creationTimestamp: '{{ item.metadata.creationTimestamp }}'
      metadata.resourceVersion: '{{ item.metadata.resourceVersion }}'
      metadata.ownerReferences: '{{ item.metadata.ownerReferences }}'
      spec.podCIDR: '{{ item.spec.podCIDR }}'
      spec.podCIDRs: '{{ item.spec.podCIDRs }}'
      spec.providerID: '{{ item.spec.providerID }}'
      spec.taints: '{{ item.spec.taints }}'
      spec.unschedulable: '{{ item.spec.unschedulable }}'
      status.addresses: '{{ item.status.addresses }}'
      status.allocatable: '{{ item.status.allocatable }}'
      status.capacity: '{{ item.status.capacity }}'
      status.conditions: '{{ item.status.conditions }}'
      status.nodeInfo: '{{ item.status.nodeInfo }}'
      status.nodeInfo.kubeletVersion: '{{ item.status.nodeInfo.kubeletVersion }}'
      status.nodeInfo.containerRuntimeVersion: '{{ item.status.nodeInfo.containerRuntimeVersion }}'
      status.nodeInfo.osImage: '{{ item.status.nodeInfo.osImage }}'
      status.nodeInfo.kernelVersion: '{{ item.status.nodeInfo.kernelVersion }}'
      status.images: '{{ item.status.images }}'
