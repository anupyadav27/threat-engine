version: '1.0'
provider: k8s
service: namespace
services:
  client: namespace
  module: boto3.client
discovery:
- discovery_id: k8s.namespace.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      metadata: '{{ item.metadata }}'
      metadata.name: '{{ item.metadata.name }}'
      metadata.labels: '{{ item.metadata.labels }}'
      metadata.annotations: '{{ item.metadata.annotations }}'
      spec: '{{ item.spec }}'
      spec.finalizers: '{{ item.spec.finalizers }}'
      status: '{{ item.status }}'
      status.phase: '{{ item.status.phase }}'
- discovery_id: k8s.namespace.get
  calls:
  - action: get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      metadata: '{{ item.metadata }}'
      metadata.name: '{{ item.metadata.name }}'
      metadata.labels: '{{ item.metadata.labels }}'
      metadata.annotations: '{{ item.metadata.annotations }}'
      spec: '{{ item.spec }}'
      spec.finalizers: '{{ item.spec.finalizers }}'
      status: '{{ item.status }}'
      status.phase: '{{ item.status.phase }}'
checks: []
