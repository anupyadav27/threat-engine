# Discovery YAML — namespace (final_discovery v1)
# Generated: 2026-04-16T09:36:43Z
# Check rules: 7 | ops in scope: 1
# ============================================================
version: '1.0'
provider: k8s
service: namespace

services:
  client: core_v1_api
  module: kubernetes.client
  api_class: CoreV1Api

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: 
    identifier_op: k8s.namespace.list
    identifier_field: metadata.name
    item_var_path: item.metadata.name
    identifier_template: '{name}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── k8s.namespace.list ──
  - discovery_id: k8s.namespace.list
    calls:
      - action: list_namespace
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        metadata: '{{ item.metadata }}'
        metadata.annotations: '{{ item.metadata.annotations }}'
        metadata.labels: '{{ item.metadata.labels }}'
        metadata.name: '{{ item.metadata.name }}'
        spec: '{{ item.spec }}'
        spec.finalizers: '{{ item.spec.finalizers }}'
        status: '{{ item.status }}'
        status.phase: '{{ item.status.phase }}'

