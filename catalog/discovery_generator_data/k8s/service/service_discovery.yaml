version: '1.0'
provider: k8s
service: service
services:
  client: service
  module: boto3.client
discovery:
- discovery_id: k8s.service.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      metadata: '{{ item.metadata }}'
      metadata.name: '{{ item.metadata.name }}'
      metadata.namespace: '{{ item.metadata.namespace }}'
      metadata.annotations: '{{ item.metadata.annotations }}'
      spec: '{{ item.spec }}'
      spec.type: '{{ item.spec.type }}'
      spec.selector: '{{ item.spec.selector }}'
      spec.ports: '{{ item.spec.ports }}'
      spec.externalTrafficPolicy: '{{ item.spec.externalTrafficPolicy }}'
- discovery_id: k8s.service.get
  calls:
  - action: get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      metadata: '{{ item.metadata }}'
      metadata.name: '{{ item.metadata.name }}'
      metadata.namespace: '{{ item.metadata.namespace }}'
      metadata.annotations: '{{ item.metadata.annotations }}'
      spec: '{{ item.spec }}'
      spec.type: '{{ item.spec.type }}'
      spec.selector: '{{ item.spec.selector }}'
      spec.ports: '{{ item.spec.ports }}'
      spec.externalTrafficPolicy: '{{ item.spec.externalTrafficPolicy }}'
checks: []
