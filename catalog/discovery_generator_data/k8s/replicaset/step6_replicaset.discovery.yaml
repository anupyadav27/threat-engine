version: '1.0'
provider: k8s
service: replicaset
services:
  client: replicaset
  module: kubernetes.client
discovery:
- discovery_id: k8s.replicaset.list_replica_set_for_all_namespaces
  calls:
  - action: list_replica_set_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
