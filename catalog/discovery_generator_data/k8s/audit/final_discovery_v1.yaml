version: '1.0'
provider: k8s
service: audit

services:
  client: core_v1_api
  module: kubernetes.client
  api_class: CoreV1Api

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: 
    identifier_op: k8s.audit.list_event_for_all_namespaces
    identifier_field: metadata.name
    item_var_path: item.metadata.name
    identifier_template: '{namespace}/{name}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── k8s.audit.list_event_for_all_namespaces ──
  - discovery_id: k8s.audit.list_event_for_all_namespaces
    calls:
      - action: list_event_for_all_namespaces
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        count: '{{ item.count }}'
        involvedObject.kind: '{{ item.involvedObject.kind }}'
        involvedObject.name: '{{ item.involvedObject.name }}'
        message: '{{ item.message }}'
        metadata.name: '{{ item.metadata.name }}'
        metadata.namespace: '{{ item.metadata.namespace }}'
        reason: '{{ item.reason }}'
        type: '{{ item.type }}'

