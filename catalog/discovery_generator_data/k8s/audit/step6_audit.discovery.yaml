version: '1.0'
provider: k8s
service: audit
services:
  client: audit
  module: kubernetes.client
discovery:
- discovery_id: k8s.audit.list_audit_sink
  calls:
  - action: list_audit_sink
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: k8s.audit.list_event_for_all_namespaces
  calls:
  - action: list_event_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
