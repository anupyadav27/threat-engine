version: '1.0'
provider: k8s
service: persistentvolume
services:
  client: persistentvolume
  module: boto3.client
discovery:
- discovery_id: k8s.persistentvolume.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      metadata: '{{ item.metadata }}'
      spec: '{{ item.spec }}'
      spec.capacity: '{{ item.spec.capacity }}'
      spec.accessModes: '{{ item.spec.accessModes }}'
      spec.persistentVolumeReclaimPolicy: '{{ item.spec.persistentVolumeReclaimPolicy
        }}'
      spec.storageClassName: '{{ item.spec.storageClassName }}'
- discovery_id: k8s.persistentvolume.get
  calls:
  - action: get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      metadata: '{{ item.metadata }}'
      spec: '{{ item.spec }}'
      spec.capacity: '{{ item.spec.capacity }}'
      spec.accessModes: '{{ item.spec.accessModes }}'
      spec.persistentVolumeReclaimPolicy: '{{ item.spec.persistentVolumeReclaimPolicy
        }}'
      spec.storageClassName: '{{ item.spec.storageClassName }}'
checks: []
