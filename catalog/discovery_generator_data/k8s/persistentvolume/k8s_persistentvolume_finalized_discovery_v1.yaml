version: '1.0'
provider: k8s
service: persistentvolume
services:
  client: core_v1_api
  module: kubernetes.client
  api_class: CoreV1Api
discovery:
- discovery_id: k8s.persistentvolume.list
  calls:
  - action: list_persistent_volume
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
- discovery_id: k8s.persistentvolume.get
  for_each: k8s.persistentvolume.list
  calls:
  - action: read_persistent_volume
    save_as: response
    on_error: continue
    params:
      name: '{{ item.metadata.name }}'
  emit:
    as: item
    item:
      persistent_volume: '{{ response }}'
