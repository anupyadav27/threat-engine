version: '1.0'
provider: k8s
service: persistentvolume

services:
  client: core_v1_api
  module: kubernetes.client
  api_class: CoreV1Api

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: 
    identifier_op: k8s.persistentvolume.list
    identifier_field: metadata.name
    item_var_path: item.metadata.name
    identifier_template: '{name}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── k8s.persistentvolume.list ──
  - discovery_id: k8s.persistentvolume.list
    calls:
      - action: list_persistent_volume
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        metadata: '{{ item.metadata }}'
        spec: '{{ item.spec }}'
        spec.accessModes: '{{ item.spec.accessModes }}'
        spec.capacity: '{{ item.spec.capacity }}'
        spec.persistentVolumeReclaimPolicy: '{{ item.spec.persistentVolumeReclaimPolicy }}'
        spec.storageClassName: '{{ item.spec.storageClassName }}'

