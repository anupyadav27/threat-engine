# ============================================================
# Discovery YAML — serviceaccount (final_discovery v1)
# Generated: 2026-04-16T09:36:43Z
# Check rules: 3 | ops in scope: 1
# ============================================================
version: '1.0'
provider: k8s
service: serviceaccount

services:
  client: core_v1_api
  module: kubernetes.client
  api_class: CoreV1Api

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: 
    identifier_op: k8s.serviceaccount.list
    identifier_field: metadata.name
    item_var_path: item.metadata.name
    identifier_template: '{namespace}/{name}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── k8s.serviceaccount.list ──
  - discovery_id: k8s.serviceaccount.list
    calls:
      - action: list_service_account_for_all_namespaces
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        apiVersion: '{{ item.apiVersion }}'
        automountServiceAccountToken: '{{ item.automountServiceAccountToken }}'
        imagePullSecrets: '{{ item.imagePullSecrets }}'
        kind: '{{ item.kind }}'
        metadata: '{{ item.metadata }}'
        metadata.annotations: '{{ item.metadata.annotations }}'
        metadata.creationTimestamp: '{{ item.metadata.creationTimestamp }}'
        metadata.deletionGracePeriodSeconds: '{{ item.metadata.deletionGracePeriodSeconds }}'
        metadata.deletionTimestamp: '{{ item.metadata.deletionTimestamp }}'
        metadata.finalizers: '{{ item.metadata.finalizers }}'
        metadata.generateName: '{{ item.metadata.generateName }}'
        metadata.generation: '{{ item.metadata.generation }}'
        metadata.labels: '{{ item.metadata.labels }}'
        metadata.managedFields: '{{ item.metadata.managedFields }}'
        metadata.name: '{{ item.metadata.name }}'
        metadata.namespace: '{{ item.metadata.namespace }}'
        metadata.ownerReferences: '{{ item.metadata.ownerReferences }}'
        metadata.resourceVersion: '{{ item.metadata.resourceVersion }}'
        metadata.selfLink: '{{ item.metadata.selfLink }}'
        metadata.uid: '{{ item.metadata.uid }}'
        secrets: '{{ item.secrets }}'

