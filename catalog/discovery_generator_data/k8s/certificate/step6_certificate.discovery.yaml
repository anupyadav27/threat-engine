version: '1.0'
provider: k8s
service: certificate
services:
  client: certificate
  module: kubernetes.client
discovery:
- discovery_id: k8s.certificate.list_certificate_signing_request
  calls:
  - action: list_certificate_signing_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      apiVersion: '{{ item.apiVersion }}'
      kind: '{{ item.kind }}'
      metadata.uid: '{{ item.metadata.uid }}'
      metadata.name: '{{ item.metadata.name }}'
      metadata.namespace: '{{ item.metadata.namespace }}'
      metadata.labels: '{{ item.metadata.labels }}'
      metadata.annotations: '{{ item.metadata.annotations }}'
      metadata.creationTimestamp: '{{ item.metadata.creationTimestamp }}'
      metadata.resourceVersion: '{{ item.metadata.resourceVersion }}'
      metadata.ownerReferences: '{{ item.metadata.ownerReferences }}'
      spec.request: '{{ item.spec.request }}'
      spec.signerName: '{{ item.spec.signerName }}'
      spec.expirationSeconds: '{{ item.spec.expirationSeconds }}'
      spec.usages: '{{ item.spec.usages }}'
      spec.username: '{{ item.spec.username }}'
      spec.uid: '{{ item.spec.uid }}'
      spec.groups: '{{ item.spec.groups }}'
      status.conditions: '{{ item.status.conditions }}'
      status.certificate: '{{ item.status.certificate }}'
