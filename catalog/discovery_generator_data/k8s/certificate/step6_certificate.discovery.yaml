version: '1.0'
provider: k8s
service: certificate
services:
  client: certificate
  module: kubernetes.client
discovery:
- discovery_id: k8s.certificate.list_certificate_signing_request
  calls:
  - action: list_certificate_signing_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
