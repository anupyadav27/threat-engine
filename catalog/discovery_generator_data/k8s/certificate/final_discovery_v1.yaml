# ============================================================
# Discovery YAML — certificate (final_discovery v1)
# Generated: 2026-04-16T09:36:43Z
# Check rules: 2 | ops in scope: 1
# ============================================================
version: '1.0'
provider: k8s
service: certificate

services:
  client: core_v1_api
  module: kubernetes.client
  api_class: CoreV1Api

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: 
    identifier_op: k8s.certificate.list_certificate_signing_request
    identifier_field: metadata.name
    item_var_path: item.metadata.name
    identifier_template: '{name}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── k8s.certificate.list_certificate_signing_request ──
  - discovery_id: k8s.certificate.list_certificate_signing_request
    calls:
      - action: list_certificate_signing_request
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        metadata.annotations: '{{ item.metadata.annotations }}'
        metadata.name: '{{ item.metadata.name }}'
        spec.expirationSeconds: '{{ item.spec.expirationSeconds }}'
        spec.signerName: '{{ item.spec.signerName }}'
        spec.usages: '{{ item.spec.usages }}'
        status.certificate: '{{ item.status.certificate }}'
        status.conditions: '{{ item.status.conditions }}'

