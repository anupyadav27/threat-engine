version: '1.0'
provider: k8s
service: rolebinding
services:
  client: rbac_authorization_v1_api
  module: kubernetes.client
  api_class: RbacAuthorizationV1Api
discovery:
- discovery_id: k8s.rolebinding.list
  calls:
  - action: list_role_binding_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
- discovery_id: k8s.rolebinding.get
  for_each: k8s.rolebinding.list
  calls:
  - action: read_namespaced_role_binding
    save_as: response
    on_error: continue
    params:
      name: '{{ item.metadata.name }}'
      namespace: '{{ item.metadata.namespace }}'
  emit:
    as: item
    item:
      role_binding: '{{ response }}'
