version: '1.0'
provider: k8s
service: rolebinding
services:
  client: rolebinding
  module: kubernetes.client
discovery:
- discovery_id: k8s.rolebinding.list_role_binding_for_all_namespaces
  calls:
  - action: list_role_binding_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      metadata: '{{ item.metadata }}'
      roleRef: '{{ item.roleRef }}'
      subjects: '{{ item.subjects }}'
