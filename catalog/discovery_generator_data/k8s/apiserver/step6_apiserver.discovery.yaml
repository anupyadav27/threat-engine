version: '1.0'
provider: k8s
service: apiserver
services:
  client: apiserver
  module: kubernetes.client
discovery:
- discovery_id: k8s.apiserver.list_component_status
  calls:
  - action: list_component_status
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      metadata.name: '{{ item.metadata.name }}'
      metadata.uid: '{{ item.metadata.uid }}'
      conditions: '{{ item.conditions }}'
- discovery_id: k8s.apiserver.list_api_service
  calls:
  - action: list_api_service
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      apiVersion: '{{ item.apiVersion }}'
      kind: '{{ item.kind }}'
      metadata.uid: '{{ item.metadata.uid }}'
      metadata.name: '{{ item.metadata.name }}'
      metadata.namespace: '{{ item.metadata.namespace }}'
      metadata.labels: '{{ item.metadata.labels }}'
      metadata.annotations: '{{ item.metadata.annotations }}'
      metadata.creationTimestamp: '{{ item.metadata.creationTimestamp }}'
      metadata.resourceVersion: '{{ item.metadata.resourceVersion }}'
      metadata.ownerReferences: '{{ item.metadata.ownerReferences }}'
      spec.group: '{{ item.spec.group }}'
      spec.groupPriorityMinimum: '{{ item.spec.groupPriorityMinimum }}'
      spec.service: '{{ item.spec.service }}'
      spec.version: '{{ item.spec.version }}'
      spec.versionPriority: '{{ item.spec.versionPriority }}'
      spec.insecureSkipTLSVerify: '{{ item.spec.insecureSkipTLSVerify }}'
      spec.caBundle: '{{ item.spec.caBundle }}'
      status.conditions: '{{ item.status.conditions }}'
