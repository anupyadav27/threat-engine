version: '1.0'
provider: k8s
service: apiserver
services:
  client: apiserver
  module: kubernetes.client
discovery:
- discovery_id: k8s.apiserver.list_component_status
  calls:
  - action: list_component_status
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: k8s.apiserver.list_api_service
  calls:
  - action: list_api_service
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
