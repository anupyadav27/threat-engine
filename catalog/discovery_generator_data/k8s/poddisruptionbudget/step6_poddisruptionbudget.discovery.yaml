version: '1.0'
provider: k8s
service: poddisruptionbudget
services:
  client: poddisruptionbudget
  module: kubernetes.client
discovery:
- discovery_id: k8s.poddisruptionbudget.list_pod_disruption_budget_for_all_namespaces
  calls:
  - action: list_pod_disruption_budget_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
