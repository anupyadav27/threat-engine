version: '1.0'
provider: k8s
service: secret
services:
  client: secret
  module: kubernetes.client
discovery:
- discovery_id: k8s.secret.list_secret_for_all_namespaces
  calls:
  - action: list_secret_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      metadata: '{{ item.metadata }}'
      metadata.name: '{{ item.metadata.name }}'
      metadata.namespace: '{{ item.metadata.namespace }}'
      type: '{{ item.type }}'
      data: '{{ item.data }}'
      stringData: '{{ item.stringData }}'
      immutable: '{{ item.immutable }}'
