version: '1.0'
provider: k8s
service: secret

services:
  client: core_v1_api
  module: kubernetes.client
  api_class: CoreV1Api

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: 
    identifier_op: k8s.secret.list
    identifier_field: metadata.name
    item_var_path: item.metadata.name
    identifier_template: '{namespace}/{name}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── k8s.secret.list ──
  - discovery_id: k8s.secret.list
    calls:
      - action: list_secret_for_all_namespaces
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        data: '{{ item.data }}'
        immutable: '{{ item.immutable }}'
        metadata: '{{ item.metadata }}'
        metadata.name: '{{ item.metadata.name }}'
        metadata.namespace: '{{ item.metadata.namespace }}'
        stringData: '{{ item.stringData }}'
        type: '{{ item.type }}'

