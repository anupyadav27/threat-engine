version: '1.0'
provider: k8s
service: general
services:
  client: general
  module: kubernetes.client
discovery:
- discovery_id: k8s.general.list_node
  calls:
  - action: list_node
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: k8s.general.list_namespace
  calls:
  - action: list_namespace
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: k8s.general.list_pod_for_all_namespaces
  calls:
  - action: list_pod_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
