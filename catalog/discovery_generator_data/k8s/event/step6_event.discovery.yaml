version: '1.0'
provider: k8s
service: event
services:
  client: event
  module: kubernetes.client
discovery:
- discovery_id: k8s.event.list_event_for_all_namespaces
  calls:
  - action: list_event_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
