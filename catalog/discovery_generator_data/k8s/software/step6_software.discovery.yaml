version: '1.0'
provider: k8s
service: software
services:
  client: software
  module: kubernetes.client
discovery:
- discovery_id: k8s.software.list_pod_for_all_namespaces
  calls:
  - action: list_pod_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: k8s.software.list_daemon_set_for_all_namespaces
  calls:
  - action: list_daemon_set_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
