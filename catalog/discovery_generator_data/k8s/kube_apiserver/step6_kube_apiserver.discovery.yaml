version: '1.0'
provider: k8s
service: kube_apiserver
discovery:
- _stub: true
  discovery_id: k8s.kube_apiserver.list_kube_apiservers
  _note: STUB — generated by step2, needs real SDK review for k8s.kube_apiserver
  _rules:
  - k8s.kube_apiserver.argument.streaming_connection_idle_timeout_configured
  _client: kubernetes.client.CoreV1Api
  calls:
  - action: ListResources
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      id: '{{ item.Id }}'
      name: '{{ item.Name }}'
      resource_type: '''{{ resource_type }}'''
      region: '{{ region }}'
      encrypted: '{{ item.Encrypted }}'
      kms_key_id: '{{ item.KMSKeyId }}'
      status: '{{ item.Status }}'
      enabled: '{{ item.Enabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      internet_facing: '{{ item.InternetFacing }}'
      public_ip_address: '{{ item.PublicIpAddress }}'
      tags: '{{ item.Tags }}'
      permissions: '{{ item.Permissions }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      retention_days: '{{ item.RetentionDays }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
- discovery_id: k8s.kube_apiserver.list_pods_kube_system
  calls:
  - action: list_namespaced_pod
    params:
      namespace: kube-system
      label_selector: component=kube-apiserver
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      name: '{{ item.metadata.name }}'
      namespace: '{{ item.metadata.namespace }}'
      uid: '{{ item.metadata.uid }}'
      labels: '{{ item.metadata.labels }}'
      node_name: '{{ item.spec.node_name }}'
      containers: '{{ item.spec.containers }}'
      command: '{{ item.spec.containers[0].command }}'
      status: '{{ item.status.phase }}'
      conditions: '{{ item.status.conditions }}'
  _used_by_rules:
  - k8s.kube_apiserver.argument.streaming_connection_idle_timeout_configured
