# Source: k8s_field_rule_catalog.csv
# Ops: 1 list  +  1 get  =  2 total
# ============================================================

version: '1.0'
provider: k8s
service: pod
services:
  client: core_v1_api
  module: kubernetes.client
  api_class: CoreV1Api
discovery:
- discovery_id: k8s.pod.list
  calls:
  - action: list_pod_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
- discovery_id: k8s.pod.get
  for_each: k8s.pod.list
  calls:
  - action: read_namespaced_pod
    save_as: response
    on_error: continue
    params:
      name: '{{ item.metadata.name }}'
      namespace: '{{ item.metadata.namespace }}'
  emit:
    as: item
    item:
      pod: '{{ response }}'
