version: '1.0'
provider: k8s
service: replicationcontroller
services:
  client: replicationcontroller
  module: kubernetes.client
discovery:
- discovery_id: k8s.replicationcontroller.list_replication_controller_for_all_namespaces
  calls:
  - action: list_replication_controller_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      apiVersion: '{{ item.apiVersion }}'
      kind: '{{ item.kind }}'
      metadata.uid: '{{ item.metadata.uid }}'
      metadata.name: '{{ item.metadata.name }}'
      metadata.namespace: '{{ item.metadata.namespace }}'
      metadata.labels: '{{ item.metadata.labels }}'
      metadata.annotations: '{{ item.metadata.annotations }}'
      metadata.creationTimestamp: '{{ item.metadata.creationTimestamp }}'
      metadata.resourceVersion: '{{ item.metadata.resourceVersion }}'
      metadata.ownerReferences: '{{ item.metadata.ownerReferences }}'
      spec.replicas: '{{ item.spec.replicas }}'
      spec.minReadySeconds: '{{ item.spec.minReadySeconds }}'
      spec.selector: '{{ item.spec.selector }}'
      spec.template: '{{ item.spec.template }}'
      status.replicas: '{{ item.status.replicas }}'
      status.availableReplicas: '{{ item.status.availableReplicas }}'
      status.fullyLabeledReplicas: '{{ item.status.fullyLabeledReplicas }}'
      status.readyReplicas: '{{ item.status.readyReplicas }}'
      status.observedGeneration: '{{ item.status.observedGeneration }}'
      status.conditions: '{{ item.status.conditions }}'
