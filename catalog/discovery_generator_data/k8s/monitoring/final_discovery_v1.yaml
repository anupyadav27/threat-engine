version: '1.0'
provider: k8s
service: monitoring

services:
  client: core_v1_api
  module: kubernetes.client
  api_class: CoreV1Api

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: 
    identifier_op: k8s.monitoring.list_config_map_for_all_namespaces
    identifier_field: metadata.name
    item_var_path: item.metadata.name
    identifier_template: '{namespace}/{name}'
  - resource_type: 
    identifier_op: k8s.monitoring.list_service_for_all_namespaces
    identifier_field: metadata.name
    item_var_path: item.metadata.name
    identifier_template: '{namespace}/{name}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── k8s.monitoring.list_config_map_for_all_namespaces ──
  - discovery_id: k8s.monitoring.list_config_map_for_all_namespaces
    calls:
      - action: list_config_map_for_all_namespaces
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        binaryData: '{{ item.binaryData }}'
        data: '{{ item.data }}'
        immutable: '{{ item.immutable }}'
        metadata: '{{ item.metadata }}'
        metadata.name: '{{ item.metadata.name }}'
        metadata.namespace: '{{ item.metadata.namespace }}'

  # ════ INDEPENDENT (root) operations ════
  # ── k8s.monitoring.list_service_for_all_namespaces ──
  - discovery_id: k8s.monitoring.list_service_for_all_namespaces
    calls:
      - action: list_service_for_all_namespaces
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        metadata: '{{ item.metadata }}'
        metadata.annotations: '{{ item.metadata.annotations }}'
        metadata.name: '{{ item.metadata.name }}'
        metadata.namespace: '{{ item.metadata.namespace }}'
        spec: '{{ item.spec }}'
        spec.externalTrafficPolicy: '{{ item.spec.externalTrafficPolicy }}'
        spec.ports: '{{ item.spec.ports }}'
        spec.selector: '{{ item.spec.selector }}'
        spec.type: '{{ item.spec.type }}'

