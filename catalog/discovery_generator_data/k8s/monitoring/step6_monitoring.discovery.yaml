version: '1.0'
provider: k8s
service: monitoring
services:
  client: monitoring
  module: kubernetes.client
discovery:
- discovery_id: k8s.monitoring.list_service_for_all_namespaces
  calls:
  - action: list_service_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: k8s.monitoring.list_config_map_for_all_namespaces
  calls:
  - action: list_config_map_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
