version: '1.0'
provider: k8s
service: disaster_recovery
services:
  client: disaster_recovery
  module: kubernetes.client
discovery:
- discovery_id: k8s.disaster_recovery.list_persistent_volume
  calls:
  - action: list_persistent_volume
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      metadata: '{{ item.metadata }}'
      spec.capacity: '{{ item.spec.capacity }}'
      spec.accessModes: '{{ item.spec.accessModes }}'
      spec.persistentVolumeReclaimPolicy: '{{ item.spec.persistentVolumeReclaimPolicy }}'
      spec.storageClassName: '{{ item.spec.storageClassName }}'
- discovery_id: k8s.disaster_recovery.list_persistent_volume_claim_for_all_namespaces
  calls:
  - action: list_persistent_volume_claim_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      apiVersion: '{{ item.apiVersion }}'
      kind: '{{ item.kind }}'
      metadata.annotations: '{{ item.metadata.annotations }}'
      metadata.creationTimestamp: '{{ item.metadata.creationTimestamp }}'
      metadata.deletionGracePeriodSeconds: '{{ item.metadata.deletionGracePeriodSeconds }}'
      metadata.deletionTimestamp: '{{ item.metadata.deletionTimestamp }}'
      metadata.finalizers: '{{ item.metadata.finalizers }}'
      metadata.generateName: '{{ item.metadata.generateName }}'
      metadata.generation: '{{ item.metadata.generation }}'
      metadata.labels: '{{ item.metadata.labels }}'
      metadata.managedFields: '{{ item.metadata.managedFields }}'
      metadata.name: '{{ item.metadata.name }}'
      metadata.namespace: '{{ item.metadata.namespace }}'
      metadata.ownerReferences: '{{ item.metadata.ownerReferences }}'
      metadata.resourceVersion: '{{ item.metadata.resourceVersion }}'
      metadata.selfLink: '{{ item.metadata.selfLink }}'
      metadata.uid: '{{ item.metadata.uid }}'
      spec.accessModes: '{{ item.spec.accessModes }}'
      spec.dataSource: '{{ item.spec.dataSource }}'
      spec.dataSource.apiGroup: '{{ item.spec.dataSource.apiGroup }}'
      spec.dataSource.kind: '{{ item.spec.dataSource.kind }}'
      spec.dataSource.name: '{{ item.spec.dataSource.name }}'
      spec.dataSourceRef: '{{ item.spec.dataSourceRef }}'
      spec.dataSourceRef.apiGroup: '{{ item.spec.dataSourceRef.apiGroup }}'
      spec.dataSourceRef.kind: '{{ item.spec.dataSourceRef.kind }}'
      spec.dataSourceRef.name: '{{ item.spec.dataSourceRef.name }}'
      spec.dataSourceRef.namespace: '{{ item.spec.dataSourceRef.namespace }}'
      spec.resources: '{{ item.spec.resources }}'
      spec.resources.limits: '{{ item.spec.resources.limits }}'
      spec.resources.requests: '{{ item.spec.resources.requests }}'
      spec.selector: '{{ item.spec.selector }}'
      spec.selector.matchExpressions: '{{ item.spec.selector.matchExpressions }}'
      spec.selector.matchLabels: '{{ item.spec.selector.matchLabels }}'
      spec.storageClassName: '{{ item.spec.storageClassName }}'
      spec.volumeAttributesClassName: '{{ item.spec.volumeAttributesClassName }}'
      spec.volumeMode: '{{ item.spec.volumeMode }}'
      spec.volumeName: '{{ item.spec.volumeName }}'
      status.accessModes: '{{ item.status.accessModes }}'
      status.allocatedResourceStatuses: '{{ item.status.allocatedResourceStatuses }}'
      status.allocatedResources: '{{ item.status.allocatedResources }}'
      status.capacity: '{{ item.status.capacity }}'
      status.conditions: '{{ item.status.conditions }}'
      status.currentVolumeAttributesClassName: '{{ item.status.currentVolumeAttributesClassName }}'
      status.modifyVolumeStatus: '{{ item.status.modifyVolumeStatus }}'
      status.modifyVolumeStatus.status: '{{ item.status.modifyVolumeStatus.status }}'
      status.modifyVolumeStatus.targetVolumeAttributesClassName: '{{ item.status.modifyVolumeStatus.targetVolumeAttributesClassName
        }}'
      status.phase: '{{ item.status.phase }}'
- discovery_id: k8s.disaster_recovery.list_storage_class
  calls:
  - action: list_storage_class
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      apiVersion: '{{ item.apiVersion }}'
      kind: '{{ item.kind }}'
      metadata.name: '{{ item.metadata.name }}'
      metadata.uid: '{{ item.metadata.uid }}'
      metadata.labels: '{{ item.metadata.labels }}'
      metadata.annotations: '{{ item.metadata.annotations }}'
      provisioner: '{{ item.provisioner }}'
      parameters: '{{ item.parameters }}'
      reclaimPolicy: '{{ item.reclaimPolicy }}'
      mountOptions: '{{ item.mountOptions }}'
      allowVolumeExpansion: '{{ item.allowVolumeExpansion }}'
      volumeBindingMode: '{{ item.volumeBindingMode }}'
      allowedTopologies: '{{ item.allowedTopologies }}'
