version: '1.0'
provider: k8s
service: disaster_recovery
services:
  client: disaster_recovery
  module: kubernetes.client
discovery:
- discovery_id: k8s.disaster_recovery.list_persistent_volume
  calls:
  - action: list_persistent_volume
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: k8s.disaster_recovery.list_persistent_volume_claim_for_all_namespaces
  calls:
  - action: list_persistent_volume_claim_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: k8s.disaster_recovery.list_storage_class
  calls:
  - action: list_storage_class
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
