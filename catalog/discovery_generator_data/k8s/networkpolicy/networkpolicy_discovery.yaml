version: '1.0'
provider: k8s
service: networkpolicy
services:
  client: networkpolicy
  module: boto3.client
discovery:
- discovery_id: k8s.networkpolicy.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      metadata: '{{ item.metadata }}'
      spec: '{{ item.spec }}'
      spec.podSelector: '{{ item.spec.podSelector }}'
      spec.policyTypes: '{{ item.spec.policyTypes }}'
      spec.ingress: '{{ item.spec.ingress }}'
      spec.egress: '{{ item.spec.egress }}'
- discovery_id: k8s.networkpolicy.get
  calls:
  - action: get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      metadata: '{{ item.metadata }}'
      spec: '{{ item.spec }}'
      spec.podSelector: '{{ item.spec.podSelector }}'
      spec.policyTypes: '{{ item.spec.policyTypes }}'
      spec.ingress: '{{ item.spec.ingress }}'
      spec.egress: '{{ item.spec.egress }}'
checks: []
