version: '1.0'
provider: k8s
service: job
services:
  client: job
  module: kubernetes.client
discovery:
- discovery_id: k8s.job.list_job_for_all_namespaces
  calls:
  - action: list_job_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      apiVersion: '{{ item.apiVersion }}'
      kind: '{{ item.kind }}'
      metadata.uid: '{{ item.metadata.uid }}'
      metadata.name: '{{ item.metadata.name }}'
      metadata.namespace: '{{ item.metadata.namespace }}'
      metadata.labels: '{{ item.metadata.labels }}'
      metadata.annotations: '{{ item.metadata.annotations }}'
      metadata.creationTimestamp: '{{ item.metadata.creationTimestamp }}'
      metadata.resourceVersion: '{{ item.metadata.resourceVersion }}'
      metadata.ownerReferences: '{{ item.metadata.ownerReferences }}'
      spec.activeDeadlineSeconds: '{{ item.spec.activeDeadlineSeconds }}'
      spec.backoffLimit: '{{ item.spec.backoffLimit }}'
      spec.completions: '{{ item.spec.completions }}'
      spec.parallelism: '{{ item.spec.parallelism }}'
      spec.suspend: '{{ item.spec.suspend }}'
      spec.template: '{{ item.spec.template }}'
      spec.ttlSecondsAfterFinished: '{{ item.spec.ttlSecondsAfterFinished }}'
      status.active: '{{ item.status.active }}'
      status.succeeded: '{{ item.status.succeeded }}'
      status.failed: '{{ item.status.failed }}'
      status.conditions: '{{ item.status.conditions }}'
      status.startTime: '{{ item.status.startTime }}'
      status.completionTime: '{{ item.status.completionTime }}'
