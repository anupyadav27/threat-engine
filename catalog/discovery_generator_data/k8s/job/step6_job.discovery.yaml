version: '1.0'
provider: k8s
service: job
services:
  client: job
  module: kubernetes.client
discovery:
- discovery_id: k8s.job.list_job_for_all_namespaces
  calls:
  - action: list_job_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
