version: '1.0'
provider: k8s
service: daemonset

services:
  client: apps_v1_api
  module: kubernetes.client
  api_class: AppsV1Api

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: 
    identifier_op: k8s.daemonset.list
    identifier_field: metadata.name
    item_var_path: item.metadata.name
    identifier_template: '{namespace}/{name}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── k8s.daemonset.list ──
  - discovery_id: k8s.daemonset.list
    calls:
      - action: list_daemon_set_for_all_namespaces
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        apiVersion: '{{ item.apiVersion }}'
        kind: '{{ item.kind }}'
        metadata: '{{ item.metadata }}'
        metadata.annotations: '{{ item.metadata.annotations }}'
        metadata.creationTimestamp: '{{ item.metadata.creationTimestamp }}'
        metadata.deletionGracePeriodSeconds: '{{ item.metadata.deletionGracePeriodSeconds }}'
        metadata.deletionTimestamp: '{{ item.metadata.deletionTimestamp }}'
        metadata.finalizers: '{{ item.metadata.finalizers }}'
        metadata.generateName: '{{ item.metadata.generateName }}'
        metadata.generation: '{{ item.metadata.generation }}'
        metadata.labels: '{{ item.metadata.labels }}'
        metadata.managedFields: '{{ item.metadata.managedFields }}'
        metadata.name: '{{ item.metadata.name }}'
        metadata.namespace: '{{ item.metadata.namespace }}'
        metadata.ownerReferences: '{{ item.metadata.ownerReferences }}'
        metadata.resourceVersion: '{{ item.metadata.resourceVersion }}'
        metadata.selfLink: '{{ item.metadata.selfLink }}'
        metadata.uid: '{{ item.metadata.uid }}'
        spec: '{{ item.spec }}'
        spec.minReadySeconds: '{{ item.spec.minReadySeconds }}'
        spec.revisionHistoryLimit: '{{ item.spec.revisionHistoryLimit }}'
        spec.selector: '{{ item.spec.selector }}'
        spec.template: '{{ item.spec.template }}'
        spec.updateStrategy: '{{ item.spec.updateStrategy }}'
        status: '{{ item.status }}'
        status.collisionCount: '{{ item.status.collisionCount }}'
        status.conditions: '{{ item.status.conditions }}'
        status.currentNumberScheduled: '{{ item.status.currentNumberScheduled }}'
        status.desiredNumberScheduled: '{{ item.status.desiredNumberScheduled }}'
        status.numberAvailable: '{{ item.status.numberAvailable }}'
        status.numberMisscheduled: '{{ item.status.numberMisscheduled }}'
        status.numberReady: '{{ item.status.numberReady }}'
        status.numberUnavailable: '{{ item.status.numberUnavailable }}'
        status.observedGeneration: '{{ item.status.observedGeneration }}'
        status.updatedNumberScheduled: '{{ item.status.updatedNumberScheduled }}'

