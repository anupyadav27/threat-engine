version: '1.0'
provider: k8s
service: pod_security
services:
  client: pod_security
  module: kubernetes.client
discovery:
- discovery_id: k8s.pod_security.list_pod_for_all_namespaces
  calls:
  - action: list_pod_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: k8s.pod_security.list_pod_security_policy
  calls:
  - action: list_pod_security_policy
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
