# Discovery YAML — kubelet (final_discovery v1)
# Generated: 2026-04-16T09:36:43Z
# Check rules: 5 | ops in scope: 1
# ============================================================
version: '1.0'
provider: k8s
service: kubelet

services:
  client: core_v1_api
  module: kubernetes.client
  api_class: CoreV1Api

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: 
    identifier_op: k8s.kubelet.list_node
    identifier_field: metadata.name
    item_var_path: item.metadata.name
    identifier_template: '{name}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── k8s.kubelet.list_node ──
  - discovery_id: k8s.kubelet.list_node
    calls:
      - action: list_node
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        metadata.annotations: '{{ item.metadata.annotations }}'
        metadata.labels: '{{ item.metadata.labels }}'
        metadata.name: '{{ item.metadata.name }}'
        spec.podCIDR: '{{ item.spec.podCIDR }}'
        spec.taints: '{{ item.spec.taints }}'
        spec.unschedulable: '{{ item.spec.unschedulable }}'
        status.conditions: '{{ item.status.conditions }}'

