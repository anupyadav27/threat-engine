version: '1.0'
provider: k8s
service: podtemplate
services:
  client: podtemplate
  module: kubernetes.client
discovery:
- discovery_id: k8s.podtemplate.list_pod_template_for_all_namespaces
  calls:
  - action: list_pod_template_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
