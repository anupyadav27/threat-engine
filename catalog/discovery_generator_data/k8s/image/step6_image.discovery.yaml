version: '1.0'
provider: k8s
service: image
services:
  client: image
  module: kubernetes.client
discovery:
- discovery_id: k8s.image.list_pod_for_all_namespaces
  calls:
  - action: list_pod_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: k8s.image.list_node
  calls:
  - action: list_node
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
