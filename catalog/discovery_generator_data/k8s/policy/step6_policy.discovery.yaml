version: '1.0'
provider: k8s
service: policy
services:
  client: policy
  module: kubernetes.client
discovery:
- discovery_id: k8s.policy.list_network_policy_for_all_namespaces
  calls:
  - action: list_network_policy_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      metadata: '{{ item.metadata }}'
      spec.podSelector: '{{ item.spec.podSelector }}'
      spec.policyTypes: '{{ item.spec.policyTypes }}'
      spec.ingress: '{{ item.spec.ingress }}'
      spec.egress: '{{ item.spec.egress }}'
- discovery_id: k8s.policy.list_pod_disruption_budget_for_all_namespaces
  calls:
  - action: list_pod_disruption_budget_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      apiVersion: '{{ item.apiVersion }}'
      kind: '{{ item.kind }}'
      metadata.uid: '{{ item.metadata.uid }}'
      metadata.name: '{{ item.metadata.name }}'
      metadata.namespace: '{{ item.metadata.namespace }}'
      metadata.labels: '{{ item.metadata.labels }}'
      metadata.annotations: '{{ item.metadata.annotations }}'
      metadata.creationTimestamp: '{{ item.metadata.creationTimestamp }}'
      metadata.resourceVersion: '{{ item.metadata.resourceVersion }}'
      metadata.ownerReferences: '{{ item.metadata.ownerReferences }}'
      spec.minAvailable: '{{ item.spec.minAvailable }}'
      spec.maxUnavailable: '{{ item.spec.maxUnavailable }}'
      spec.selector: '{{ item.spec.selector }}'
      status.currentHealthy: '{{ item.status.currentHealthy }}'
      status.desiredHealthy: '{{ item.status.desiredHealthy }}'
      status.disruptionsAllowed: '{{ item.status.disruptionsAllowed }}'
      status.expectedPods: '{{ item.status.expectedPods }}'
      status.conditions: '{{ item.status.conditions }}'
