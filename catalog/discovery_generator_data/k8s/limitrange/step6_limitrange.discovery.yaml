version: '1.0'
provider: k8s
service: limitrange
services:
  client: limitrange
  module: kubernetes.client
discovery:
- discovery_id: k8s.limitrange.list_limit_range_for_all_namespaces
  calls:
  - action: list_limit_range_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
