version: '1.0'
provider: k8s
service: configmap
services:
  client: configmap
  module: kubernetes.client
discovery:
- discovery_id: k8s.configmap.list_config_map_for_all_namespaces
  calls:
  - action: list_config_map_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      metadata: '{{ item.metadata }}'
      metadata.name: '{{ item.metadata.name }}'
      metadata.namespace: '{{ item.metadata.namespace }}'
      data: '{{ item.data }}'
      binaryData: '{{ item.binaryData }}'
      immutable: '{{ item.immutable }}'
