version: '1.0'
provider: k8s
service: scheduler
services:
  client: scheduler
  module: kubernetes.client
discovery:
- discovery_id: k8s.scheduler.list_component_status
  calls:
  - action: list_component_status
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
