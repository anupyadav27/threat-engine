# Discovery YAML — role (final_discovery v1)
# Generated: 2026-04-16T09:36:43Z
# Check rules: 3 | ops in scope: 1
# ============================================================
version: '1.0'
provider: k8s
service: role

services:
  client: rbac_authorization_v1_api
  module: kubernetes.client
  api_class: RbacAuthorizationV1Api

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: 
    identifier_op: k8s.role.list
    identifier_field: metadata.name
    item_var_path: item.metadata.name
    identifier_template: '{name}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── k8s.role.list ──
  - discovery_id: k8s.role.list
    calls:
      - action: list_role_for_all_namespaces
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        metadata: '{{ item.metadata }}'
        rules: '{{ item.rules }}'
        rules[].apiGroups: '{{ item.rules[].apiGroups }}'
        rules[].resources: '{{ item.rules[].resources }}'
        rules[].verbs: '{{ item.rules[].verbs }}'

