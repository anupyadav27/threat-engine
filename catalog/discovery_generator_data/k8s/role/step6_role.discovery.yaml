version: '1.0'
provider: k8s
service: role
services:
  client: role
  module: kubernetes.client
discovery:
- discovery_id: k8s.role.list_role_for_all_namespaces
  calls:
  - action: list_role_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      metadata: '{{ item.metadata }}'
      rules: '{{ item.rules }}'
      rules[].apiGroups: '{{ item.rules[].apiGroups }}'
      rules[].resources: '{{ item.rules[].resources }}'
      rules[].verbs: '{{ item.rules[].verbs }}'
