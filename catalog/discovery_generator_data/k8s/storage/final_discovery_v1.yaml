version: '1.0'
provider: k8s
service: storage

services:
  client: core_v1_api
  module: kubernetes.client
  api_class: CoreV1Api

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: 
    identifier_op: k8s.storage.list_storage_class
    identifier_field: metadata.name
    item_var_path: item.metadata.name
    identifier_template: '{name}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── k8s.storage.list_storage_class ──
  - discovery_id: k8s.storage.list_storage_class
    calls:
      - action: list_storage_class
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        allowVolumeExpansion: '{{ item.allowVolumeExpansion }}'
        metadata.name: '{{ item.metadata.name }}'
        parameters: '{{ item.parameters }}'
        provisioner: '{{ item.provisioner }}'
        reclaimPolicy: '{{ item.reclaimPolicy }}'
        volumeBindingMode: '{{ item.volumeBindingMode }}'

