version: '1.0'
provider: k8s
service: workload
services:
  client: workload
  module: kubernetes.client
discovery:
- discovery_id: k8s.workload.list_deployment_for_all_namespaces
  calls:
  - action: list_deployment_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: k8s.workload.list_stateful_set_for_all_namespaces
  calls:
  - action: list_stateful_set_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: k8s.workload.list_daemon_set_for_all_namespaces
  calls:
  - action: list_daemon_set_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: k8s.workload.list_replica_set_for_all_namespaces
  calls:
  - action: list_replica_set_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: k8s.workload.list_job_for_all_namespaces
  calls:
  - action: list_job_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: k8s.workload.list_cron_job_for_all_namespaces
  calls:
  - action: list_cron_job_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
