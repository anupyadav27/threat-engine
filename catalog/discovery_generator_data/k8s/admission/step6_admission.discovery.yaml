version: '1.0'
provider: k8s
service: admission
services:
  client: admission
  module: kubernetes.client
discovery:
- discovery_id: k8s.admission.list_validating_webhook_configuration
  calls:
  - action: list_validating_webhook_configuration
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      apiVersion: '{{ item.apiVersion }}'
      kind: '{{ item.kind }}'
      metadata.uid: '{{ item.metadata.uid }}'
      metadata.name: '{{ item.metadata.name }}'
      metadata.namespace: '{{ item.metadata.namespace }}'
      metadata.labels: '{{ item.metadata.labels }}'
      metadata.annotations: '{{ item.metadata.annotations }}'
      metadata.creationTimestamp: '{{ item.metadata.creationTimestamp }}'
      metadata.resourceVersion: '{{ item.metadata.resourceVersion }}'
      metadata.ownerReferences: '{{ item.metadata.ownerReferences }}'
      webhooks: '{{ item.webhooks }}'
      webhooks[].name: '{{ item.webhooks[].name }}'
      webhooks[].clientConfig: '{{ item.webhooks[].clientConfig }}'
      webhooks[].rules: '{{ item.webhooks[].rules }}'
      webhooks[].failurePolicy: '{{ item.webhooks[].failurePolicy }}'
      webhooks[].sideEffects: '{{ item.webhooks[].sideEffects }}'
      webhooks[].admissionReviewVersions: '{{ item.webhooks[].admissionReviewVersions }}'
- discovery_id: k8s.admission.list_mutating_webhook_configuration
  calls:
  - action: list_mutating_webhook_configuration
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      apiVersion: '{{ item.apiVersion }}'
      kind: '{{ item.kind }}'
      metadata.uid: '{{ item.metadata.uid }}'
      metadata.name: '{{ item.metadata.name }}'
      metadata.namespace: '{{ item.metadata.namespace }}'
      metadata.labels: '{{ item.metadata.labels }}'
      metadata.annotations: '{{ item.metadata.annotations }}'
      metadata.creationTimestamp: '{{ item.metadata.creationTimestamp }}'
      metadata.resourceVersion: '{{ item.metadata.resourceVersion }}'
      metadata.ownerReferences: '{{ item.metadata.ownerReferences }}'
      webhooks: '{{ item.webhooks }}'
      webhooks[].name: '{{ item.webhooks[].name }}'
      webhooks[].clientConfig: '{{ item.webhooks[].clientConfig }}'
      webhooks[].rules: '{{ item.webhooks[].rules }}'
      webhooks[].failurePolicy: '{{ item.webhooks[].failurePolicy }}'
      webhooks[].reinvocationPolicy: '{{ item.webhooks[].reinvocationPolicy }}'
      webhooks[].sideEffects: '{{ item.webhooks[].sideEffects }}'
