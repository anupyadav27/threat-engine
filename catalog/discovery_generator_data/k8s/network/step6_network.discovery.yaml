version: '1.0'
provider: k8s
service: network
services:
  client: network
  module: kubernetes.client
discovery:
- discovery_id: k8s.network.list_service_for_all_namespaces
  calls:
  - action: list_service_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      metadata.name: '{{ item.metadata.name }}'
      metadata.namespace: '{{ item.metadata.namespace }}'
      metadata.annotations: '{{ item.metadata.annotations }}'
      spec.type: '{{ item.spec.type }}'
      spec.selector: '{{ item.spec.selector }}'
      spec.ports: '{{ item.spec.ports }}'
      spec.externalTrafficPolicy: '{{ item.spec.externalTrafficPolicy }}'
- discovery_id: k8s.network.list_ingress_for_all_namespaces
  calls:
  - action: list_ingress_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      metadata: '{{ item.metadata }}'
      spec.rules: '{{ item.spec.rules }}'
      spec.tls: '{{ item.spec.tls }}'
- discovery_id: k8s.network.list_network_policy_for_all_namespaces
  calls:
  - action: list_network_policy_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      metadata: '{{ item.metadata }}'
      spec.podSelector: '{{ item.spec.podSelector }}'
      spec.policyTypes: '{{ item.spec.policyTypes }}'
      spec.ingress: '{{ item.spec.ingress }}'
      spec.egress: '{{ item.spec.egress }}'
