version: '1.0'
provider: k8s
service: network
services:
  client: network
  module: kubernetes.client
discovery:
- discovery_id: k8s.network.list_service_for_all_namespaces
  calls:
  - action: list_service_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: k8s.network.list_ingress_for_all_namespaces
  calls:
  - action: list_ingress_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: k8s.network.list_network_policy_for_all_namespaces
  calls:
  - action: list_network_policy_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
