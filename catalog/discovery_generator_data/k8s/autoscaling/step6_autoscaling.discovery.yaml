version: '1.0'
provider: k8s
service: autoscaling
services:
  client: autoscaling
  module: kubernetes.client
discovery:
- discovery_id: k8s.autoscaling.list_horizontal_pod_autoscaler_for_all_namespaces
  calls:
  - action: list_horizontal_pod_autoscaler_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
