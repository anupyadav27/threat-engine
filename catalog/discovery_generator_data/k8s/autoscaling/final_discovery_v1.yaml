version: '1.0'
provider: k8s
service: autoscaling

services:
  client: core_v1_api
  module: kubernetes.client
  api_class: CoreV1Api

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: 
    identifier_op: k8s.autoscaling.list_horizontal_pod_autoscaler_for_all_namespaces
    identifier_field: metadata.name
    item_var_path: item.metadata.name
    identifier_template: '{namespace}/{name}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── k8s.autoscaling.list_horizontal_pod_autoscaler_for_all_namespaces ──
  - discovery_id: k8s.autoscaling.list_horizontal_pod_autoscaler_for_all_namespaces
    calls:
      - action: list_horizontal_pod_autoscaler_for_all_namespaces
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        metadata.name: '{{ item.metadata.name }}'
        metadata.namespace: '{{ item.metadata.namespace }}'
        spec.maxReplicas: '{{ item.spec.maxReplicas }}'
        spec.metrics: '{{ item.spec.metrics }}'
        spec.minReplicas: '{{ item.spec.minReplicas }}'
        spec.scaleTargetRef: '{{ item.spec.scaleTargetRef }}'
        status.currentReplicas: '{{ item.status.currentReplicas }}'

