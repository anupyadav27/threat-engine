version: '1.0'
provider: k8s
service: cluster
services:
  client: cluster
  module: kubernetes.client
discovery:
- discovery_id: k8s.cluster.list_node
  calls:
  - action: list_node
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: k8s.cluster.list_namespace
  calls:
  - action: list_namespace
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
