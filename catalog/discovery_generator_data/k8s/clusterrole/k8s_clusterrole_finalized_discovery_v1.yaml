version: '1.0'
provider: k8s
service: clusterrole
services:
  client: rbac_authorization_v1_api
  module: kubernetes.client
  api_class: RbacAuthorizationV1Api
discovery:
- discovery_id: k8s.clusterrole.list
  calls:
  - action: list_cluster_role
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
- discovery_id: k8s.clusterrole.get
  for_each: k8s.clusterrole.list
  calls:
  - action: read_cluster_role
    save_as: response
    on_error: continue
    params:
      name: '{{ item.metadata.name }}'
  emit:
    as: item
    item:
      cluster_role: '{{ response }}'
