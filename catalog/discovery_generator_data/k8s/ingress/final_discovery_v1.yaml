version: '1.0'
provider: k8s
service: ingress

services:
  client: networking_v1_api
  module: kubernetes.client
  api_class: NetworkingV1Api

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: 
    identifier_op: k8s.ingress.list
    identifier_field: metadata.name
    item_var_path: item.metadata.name
    identifier_template: '{name}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── k8s.ingress.list ──
  - discovery_id: k8s.ingress.list
    calls:
      - action: list_ingress_for_all_namespaces
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        metadata: '{{ item.metadata }}'
        spec: '{{ item.spec }}'
        spec.rules: '{{ item.spec.rules }}'
        spec.tls: '{{ item.spec.tls }}'

