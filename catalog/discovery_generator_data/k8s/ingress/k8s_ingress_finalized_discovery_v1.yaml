version: '1.0'
provider: k8s
service: ingress
services:
  client: networking_v1_api
  module: kubernetes.client
  api_class: NetworkingV1Api
discovery:
- discovery_id: k8s.ingress.list
  calls:
  - action: list_ingress_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
- discovery_id: k8s.ingress.get
  for_each: k8s.ingress.list
  calls:
  - action: read_namespaced_ingress
    save_as: response
    on_error: continue
    params:
      name: '{{ item.metadata.name }}'
      namespace: '{{ item.metadata.namespace }}'
  emit:
    as: item
    item:
      ingress: '{{ response }}'
