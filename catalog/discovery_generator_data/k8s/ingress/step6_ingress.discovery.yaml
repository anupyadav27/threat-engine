version: '1.0'
provider: k8s
service: ingress
services:
  client: ingress
  module: kubernetes.client
discovery:
- discovery_id: k8s.ingress.list_ingress_for_all_namespaces
  calls:
  - action: list_ingress_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      metadata: '{{ item.metadata }}'
      spec.rules: '{{ item.spec.rules }}'
      spec.tls: '{{ item.spec.tls }}'
