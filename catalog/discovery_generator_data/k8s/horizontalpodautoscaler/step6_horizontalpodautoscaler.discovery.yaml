version: '1.0'
provider: k8s
service: horizontalpodautoscaler
services:
  client: horizontalpodautoscaler
  module: kubernetes.client
discovery:
- discovery_id: k8s.horizontalpodautoscaler.list_horizontal_pod_autoscaler_for_all_namespaces
  calls:
  - action: list_horizontal_pod_autoscaler_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      apiVersion: '{{ item.apiVersion }}'
      kind: '{{ item.kind }}'
      metadata.uid: '{{ item.metadata.uid }}'
      metadata.name: '{{ item.metadata.name }}'
      metadata.namespace: '{{ item.metadata.namespace }}'
      metadata.labels: '{{ item.metadata.labels }}'
      metadata.annotations: '{{ item.metadata.annotations }}'
      metadata.creationTimestamp: '{{ item.metadata.creationTimestamp }}'
      metadata.resourceVersion: '{{ item.metadata.resourceVersion }}'
      metadata.ownerReferences: '{{ item.metadata.ownerReferences }}'
      spec.scaleTargetRef: '{{ item.spec.scaleTargetRef }}'
      spec.minReplicas: '{{ item.spec.minReplicas }}'
      spec.maxReplicas: '{{ item.spec.maxReplicas }}'
      spec.metrics: '{{ item.spec.metrics }}'
      spec.behavior: '{{ item.spec.behavior }}'
      status.currentReplicas: '{{ item.status.currentReplicas }}'
      status.desiredReplicas: '{{ item.status.desiredReplicas }}'
      status.conditions: '{{ item.status.conditions }}'
