version: '1.0'
provider: k8s
service: rbac
services:
  client: rbac
  module: kubernetes.client
discovery:
- discovery_id: k8s.rbac.list_cluster_role
  calls:
  - action: list_cluster_role
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: k8s.rbac.list_cluster_role_binding
  calls:
  - action: list_cluster_role_binding
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: k8s.rbac.list_role_for_all_namespaces
  calls:
  - action: list_role_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: k8s.rbac.list_role_binding_for_all_namespaces
  calls:
  - action: list_role_binding_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
