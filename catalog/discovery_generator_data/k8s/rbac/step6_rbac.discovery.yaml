version: '1.0'
provider: k8s
service: rbac
services:
  client: rbac
  module: kubernetes.client
discovery:
- discovery_id: k8s.rbac.list_cluster_role
  calls:
  - action: list_cluster_role
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      aggregationRule.clusterRoleSelectors: '{{ item.aggregationRule.clusterRoleSelectors }}'
      apiVersion: '{{ item.apiVersion }}'
      kind: '{{ item.kind }}'
      metadata.annotations: '{{ item.metadata.annotations }}'
      metadata.creationTimestamp: '{{ item.metadata.creationTimestamp }}'
      metadata.deletionGracePeriodSeconds: '{{ item.metadata.deletionGracePeriodSeconds }}'
      metadata.deletionTimestamp: '{{ item.metadata.deletionTimestamp }}'
      metadata.finalizers: '{{ item.metadata.finalizers }}'
      metadata.generateName: '{{ item.metadata.generateName }}'
      metadata.generation: '{{ item.metadata.generation }}'
      metadata.labels: '{{ item.metadata.labels }}'
      metadata.managedFields: '{{ item.metadata.managedFields }}'
      metadata.name: '{{ item.metadata.name }}'
      metadata.namespace: '{{ item.metadata.namespace }}'
      metadata.ownerReferences: '{{ item.metadata.ownerReferences }}'
      metadata.resourceVersion: '{{ item.metadata.resourceVersion }}'
      metadata.selfLink: '{{ item.metadata.selfLink }}'
      metadata.uid: '{{ item.metadata.uid }}'
      rules: '{{ item.rules }}'
- discovery_id: k8s.rbac.list_cluster_role_binding
  calls:
  - action: list_cluster_role_binding
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      apiVersion: '{{ item.apiVersion }}'
      kind: '{{ item.kind }}'
      metadata.annotations: '{{ item.metadata.annotations }}'
      metadata.creationTimestamp: '{{ item.metadata.creationTimestamp }}'
      metadata.deletionGracePeriodSeconds: '{{ item.metadata.deletionGracePeriodSeconds }}'
      metadata.deletionTimestamp: '{{ item.metadata.deletionTimestamp }}'
      metadata.finalizers: '{{ item.metadata.finalizers }}'
      metadata.generateName: '{{ item.metadata.generateName }}'
      metadata.generation: '{{ item.metadata.generation }}'
      metadata.labels: '{{ item.metadata.labels }}'
      metadata.managedFields: '{{ item.metadata.managedFields }}'
      metadata.name: '{{ item.metadata.name }}'
      metadata.namespace: '{{ item.metadata.namespace }}'
      metadata.ownerReferences: '{{ item.metadata.ownerReferences }}'
      metadata.resourceVersion: '{{ item.metadata.resourceVersion }}'
      metadata.selfLink: '{{ item.metadata.selfLink }}'
      metadata.uid: '{{ item.metadata.uid }}'
      roleRef.apiGroup: '{{ item.roleRef.apiGroup }}'
      roleRef.kind: '{{ item.roleRef.kind }}'
      roleRef.name: '{{ item.roleRef.name }}'
      subjects: '{{ item.subjects }}'
- discovery_id: k8s.rbac.list_role_for_all_namespaces
  calls:
  - action: list_role_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      metadata: '{{ item.metadata }}'
      rules: '{{ item.rules }}'
      rules[].apiGroups: '{{ item.rules[].apiGroups }}'
      rules[].resources: '{{ item.rules[].resources }}'
      rules[].verbs: '{{ item.rules[].verbs }}'
- discovery_id: k8s.rbac.list_role_binding_for_all_namespaces
  calls:
  - action: list_role_binding_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      metadata: '{{ item.metadata }}'
      roleRef: '{{ item.roleRef }}'
      subjects: '{{ item.subjects }}'
