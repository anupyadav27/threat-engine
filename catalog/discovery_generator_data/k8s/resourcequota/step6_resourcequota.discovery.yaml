version: '1.0'
provider: k8s
service: resourcequota
services:
  client: resourcequota
  module: kubernetes.client
discovery:
- discovery_id: k8s.resourcequota.list_resource_quota_for_all_namespaces
  calls:
  - action: list_resource_quota_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      apiVersion: '{{ item.apiVersion }}'
      kind: '{{ item.kind }}'
      metadata.uid: '{{ item.metadata.uid }}'
      metadata.name: '{{ item.metadata.name }}'
      metadata.namespace: '{{ item.metadata.namespace }}'
      metadata.labels: '{{ item.metadata.labels }}'
      metadata.annotations: '{{ item.metadata.annotations }}'
      metadata.creationTimestamp: '{{ item.metadata.creationTimestamp }}'
      metadata.resourceVersion: '{{ item.metadata.resourceVersion }}'
      metadata.ownerReferences: '{{ item.metadata.ownerReferences }}'
      spec.hard: '{{ item.spec.hard }}'
      spec.scopes: '{{ item.spec.scopes }}'
      spec.scopeSelector: '{{ item.spec.scopeSelector }}'
      status.hard: '{{ item.status.hard }}'
      status.used: '{{ item.status.used }}'
