version: '1.0'
provider: k8s
service: resourcequota
services:
  client: resourcequota
  module: kubernetes.client
discovery:
- discovery_id: k8s.resourcequota.list_resource_quota_for_all_namespaces
  calls:
  - action: list_resource_quota_for_all_namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
