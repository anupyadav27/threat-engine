version: '1.0'
provider: k8s
service: storageclass
services:
  client: storageclass
  module: kubernetes.client
discovery:
- discovery_id: k8s.storageclass.list_storage_class
  calls:
  - action: list_storage_class
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
