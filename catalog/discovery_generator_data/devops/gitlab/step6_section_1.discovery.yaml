version: '1.0'
provider: devops
engine: gitlab
category: section_1
cis_section: '1'
description: >
  gitlab CIS Section 1 — any change to code receives approval of two strongly authenticated users

discovery:

  - discovery_id: gitlab.section_1.any_change_to_code_receives_approval_of_two
    description: Ensure any change to code receives approval of two strongly authenticated users
    calls:
      - action: http_get
        endpoint: "# TODO: map to vendor API endpoint"
        auth_type: bearer_token
        base_url_var: GITLAB_API_BASE_URL
        save_as: result
    emit:
      as: item
      item:
        check: any_change_to_code_receives_approval_of_two
        value: "{{ result }}"
        expected: ""

