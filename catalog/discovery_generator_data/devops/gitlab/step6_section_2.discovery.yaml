version: '1.0'
provider: devops
engine: gitlab
category: section_2
cis_section: '2'
description: >
  gitlab CIS Section 2 — scanners are in place to identify and prevent sensitive data in pipeline files

discovery:

  - discovery_id: gitlab.section_2.scanners_are_in_place_to_identify_and_prevent
    description: Ensure scanners are in place to identify and prevent sensitive data in pipeline files
    calls:
      - action: http_get
        endpoint: "# TODO: map to vendor API endpoint"
        auth_type: bearer_token
        base_url_var: GITLAB_API_BASE_URL
        save_as: result
    emit:
      as: item
      item:
        check: scanners_are_in_place_to_identify_and_prevent
        value: "{{ result }}"
        expected: ""

