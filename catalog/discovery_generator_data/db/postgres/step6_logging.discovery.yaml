version: '1.0'
provider: db
engine: postgres
category: logging
cis_section: '3'
description: PostgreSQL CIS Section 3 — Logging

discovery:
  - discovery_id: db.postgres.logging.log_connections
    calls:
      - action: query_setting
        query: "SHOW log_connections;"
        save_as: result
    emit:
      as: item
      item:
        setting_name: log_connections
        value: "{{ result.log_connections }}"
        expected: "on"

  - discovery_id: db.postgres.logging.log_disconnections
    calls:
      - action: query_setting
        query: "SHOW log_disconnections;"
        save_as: result
    emit:
      as: item
      item:
        setting_name: log_disconnections
        value: "{{ result.log_disconnections }}"
        expected: "on"

  - discovery_id: db.postgres.logging.log_duration
    calls:
      - action: query_setting
        query: "SHOW log_duration;"
        save_as: result
    emit:
      as: item
      item:
        setting_name: log_duration
        value: "{{ result.log_duration }}"
        expected: "on"

  - discovery_id: db.postgres.logging.log_error_verbosity
    calls:
      - action: query_setting
        query: "SHOW log_error_verbosity;"
        save_as: result
    emit:
      as: item
      item:
        setting_name: log_error_verbosity
        value: "{{ result.log_error_verbosity }}"
        expected: verbose

  - discovery_id: db.postgres.logging.log_hostname
    calls:
      - action: query_setting
        query: "SHOW log_hostname;"
        save_as: result
    emit:
      as: item
      item:
        setting_name: log_hostname
        value: "{{ result.log_hostname }}"
        expected: "on"

  - discovery_id: db.postgres.logging.log_line_prefix
    calls:
      - action: query_setting
        query: "SHOW log_line_prefix;"
        save_as: result
    emit:
      as: item
      item:
        setting_name: log_line_prefix
        value: "{{ result.log_line_prefix }}"
        expected_contains: "%t"

  - discovery_id: db.postgres.logging.log_statement
    calls:
      - action: query_setting
        query: "SHOW log_statement;"
        save_as: result
    emit:
      as: item
      item:
        setting_name: log_statement
        value: "{{ result.log_statement }}"
        expected: ddl
