version: '1.0'
provider: db
engine: mssql
category: surface_reduction
cis_section: '2'
description: SQL Server CIS Section 2 — Surface Area Reduction

discovery:
  - discovery_id: db.mssql.surface.ad_hoc_queries
    calls:
      - action: query_table
        query: "SELECT value_in_use FROM sys.configurations WHERE name = 'Ad Hoc Distributed Queries';"
        save_as: rows
    emit:
      as: items
      items: "{{ rows }}"
      item:
        setting_name: ad_hoc_distributed_queries
        value: "{{ item.value_in_use }}"
        expected: 0

  - discovery_id: db.mssql.surface.xp_cmdshell
    calls:
      - action: query_table
        query: "SELECT value_in_use FROM sys.configurations WHERE name = 'xp_cmdshell';"
        save_as: rows
    emit:
      as: items
      items: "{{ rows }}"
      item:
        setting_name: xp_cmdshell
        value: "{{ item.value_in_use }}"
        expected: 0

  - discovery_id: db.mssql.surface.remote_access
    calls:
      - action: query_table
        query: "SELECT value_in_use FROM sys.configurations WHERE name = 'remote access';"
        save_as: rows
    emit:
      as: items
      items: "{{ rows }}"
      item:
        setting_name: remote_access
        value: "{{ item.value_in_use }}"
        expected: 0

  - discovery_id: db.mssql.surface.ole_automation
    calls:
      - action: query_table
        query: "SELECT value_in_use FROM sys.configurations WHERE name = 'Ole Automation Procedures';"
        save_as: rows
    emit:
      as: items
      items: "{{ rows }}"
      item:
        setting_name: ole_automation_procedures
        value: "{{ item.value_in_use }}"
        expected: 0
