version: '1.0'
provider: technology
category: db
tech_type: mssql
display_name: SQL Server
action_type: query_table
cis_benchmark: CIS SQL Server 2019
cis_section: '3'

# ─── Authentication & Access ───────────────────────────────────────────────────
discovery:
  - discovery_id: mssql.auth.local_accounts
    description: Enumerate local user accounts and privilege levels
    calls:
      - action: query_table
        target: auth.accounts
        save_as: accounts
    emit:
      as: items
      items: "{{ accounts }}"
      item:
        resource_uid: "{{ item.username or item.name or item.id }}"
        resource_type: mssql.user_account
        username: "{{ item.username or item.name }}"
        is_admin: "{{ item.is_admin or item.privileged }}"
        last_login: "{{ item.last_login }}"

  - discovery_id: mssql.auth.password_policy
    description: Retrieve password policy configuration
    calls:
      - action: query_table
        target: auth.password_policy
        save_as: policy
    emit:
      as: item
      item:
        resource_uid: "mssql.password_policy"
        resource_type: mssql.policy
        min_length: "{{ policy.min_length }}"
        require_complexity: "{{ policy.complexity_enabled }}"
        max_age_days: "{{ policy.max_age_days }}"

# ─── Logging & Auditing ────────────────────────────────────────────────────────
  - discovery_id: mssql.logging.audit_config
    description: Retrieve audit/logging configuration
    calls:
      - action: query_table
        target: logging.audit_config
        save_as: audit_cfg
    emit:
      as: item
      item:
        resource_uid: "mssql.audit_config"
        resource_type: mssql.config
        audit_enabled: "{{ audit_cfg.enabled }}"
        log_destination: "{{ audit_cfg.destination }}"
        log_level: "{{ audit_cfg.level }}"

# ─── Encryption & Transport ────────────────────────────────────────────────────
  - discovery_id: mssql.encryption.transport
    description: Check transport encryption (TLS/SSL) configuration
    calls:
      - action: query_table
        target: encryption.transport
        save_as: tls_cfg
    emit:
      as: item
      item:
        resource_uid: "mssql.transport_encryption"
        resource_type: mssql.config
        tls_enabled: "{{ tls_cfg.enabled }}"
        tls_version: "{{ tls_cfg.min_version }}"
        cert_path: "{{ tls_cfg.cert_path }}"

# ─── Access Controls ──────────────────────────────────────────────────────────
  - discovery_id: mssql.acl.admin_privileges
    description: Identify accounts with administrative or superuser privileges
    calls:
      - action: query_table
        target: acl.admin_accounts
        save_as: admins
    emit:
      as: items
      items: "{{ admins }}"
      item:
        resource_uid: "{{ item.username or item.name }}"
        resource_type: mssql.privileged_account
        username: "{{ item.username or item.name }}"
        privilege_level: "{{ item.role or item.level }}"
