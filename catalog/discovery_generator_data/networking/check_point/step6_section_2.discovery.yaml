    description: Ensure 'Message Of The Day (MOTD)' is set
    calls:
      - action: http_get
        endpoint: "# TODO: map to vendor API endpoint"
        auth_type: bearer_token
        base_url_var: CHECK_POINT_API_BASE_URL
        save_as: result
    emit:
      as: item
      item:
        check: message_of_the_day_motd_is_set
        value: "{{ result }}"
        expected: ""

