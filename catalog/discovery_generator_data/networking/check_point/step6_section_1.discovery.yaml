version: '1.0'
provider: networking
engine: check_point
category: section_1
cis_section: '1'
description: >
  check_point CIS Section 1 — Minimum Password Length is set to 14 or higher

discovery:

  - discovery_id: check_point.section_1.minimum_password_length_is_set_to_14_or_higher
    description: Ensure Minimum Password Length is set to 14 or higher
    calls:
      - action: http_get
        endpoint: "# TODO: map to vendor API endpoint"
        auth_type: bearer_token
        base_url_var: CHECK_POINT_API_BASE_URL
        save_as: result
    emit:
      as: item
      item:
        check: minimum_password_length_is_set_to_14_or_higher
        value: "{{ result }}"
        expected: ""

