version: '1.0'
provider: networking
engine: cisco_ios_xe
category: section_3
cis_section: '3'
description: >
  cisco_ios_xe CIS Section 3 — Set 'no ip proxy-arp'

discovery:

  - discovery_id: cisco_ios_xe.section_3.set_no_ip_proxy_arp
    description: Set 'no ip proxy-arp'
    calls:
      - action: run_command
        command: "Verify the proxy ARP status hostname#sh ip int {\u003cem\u003einterface\u003c/em\u003e} | incl proxy-arp"
        save_as: result
    emit:
      as: item
      item:
        check: set_no_ip_proxy_arp
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: cisco_ios_xe.section_3.set_key_chain
    description: Set 'key chain'
    calls:
      - action: run_command
        command: "Verify the appropriate key chain is defined hostname#sh run | sec key chain"
        save_as: result
    emit:
      as: item
      item:
        check: set_key_chain
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: cisco_ios_xe.section_3.set_key
    description: Set 'key'
    calls:
      - action: run_command
        command: "Verify the appropriate key chain is defined hostname#sh run | sec key chain"
        save_as: result
    emit:
      as: item
      item:
        check: set_key
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: cisco_ios_xe.section_3.set_key_string
    description: Set 'key-string'
    calls:
      - action: run_command
        command: "Verify the appropriate key chain is defined hostname#sh run | sec key chain"
        save_as: result
    emit:
      as: item
      item:
        check: set_key_string
        value: "{{ result.stdout }}"
        expected: ""

