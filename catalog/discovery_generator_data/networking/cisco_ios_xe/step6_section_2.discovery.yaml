version: '1.0'
provider: networking
engine: cisco_ios_xe
category: section_2
cis_section: '2'
description: >
  cisco_ios_xe CIS Section 2 — Set the 'hostname'

discovery:

  - discovery_id: cisco_ios_xe.section_2.set_the_hostname
    description: Set the 'hostname'
    calls:
      - action: run_command
        command: "Perform the following to determine if the local time zone is configured: Verify the result shows the summer-time recurrence is configured properly. hostname#sh run | incl hostname"
        save_as: result
    emit:
      as: item
      item:
        check: set_the_hostname
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: cisco_ios_xe.section_2.set_the_ip_domain_name
