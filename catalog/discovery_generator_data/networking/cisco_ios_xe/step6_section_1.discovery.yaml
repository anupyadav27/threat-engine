version: '1.0'
provider: networking
engine: cisco_ios_xe
category: section_1
cis_section: '1'
description: >
  cisco_ios_xe CIS Section 1 — Set 'aaa accounting exec'

discovery:

  - discovery_id: cisco_ios_xe.section_1.set_aaa_accounting_exec
    description: Set 'aaa accounting exec'
    calls:
      - action: run_command
        command: "Perform the following to determine if aaa accounting for EXEC shell session is required: Verify a command string result returns hostname#show running-config | incl aaa accounting exec"
        save_as: result
    emit:
      as: item
      item:
        check: set_aaa_accounting_exec
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: cisco_ios_xe.section_1.set_aaa_accounting_network
    description: Set 'aaa accounting network'
    calls:
      - action: run_command
        command: "Perform the following to determine if aaa accounting for connection is required: Verify a command string result returns hostname#show running-config | incl aaa accounting network"
        save_as: result
    emit:
      as: item
      item:
        check: set_aaa_accounting_network
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: cisco_ios_xe.section_1.set_aaa_accounting_system
    description: Set 'aaa accounting system'
    calls:
      - action: run_command
        command: "Perform the following to determine if aaa accounting system is required: Verify a command string result returns hostname#show running-config | incl aaa accounting system"
        save_as: result
    emit:
      as: item
      item:
        check: set_aaa_accounting_system
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: cisco_ios_xe.section_1.set_transport_input_ssh_for_line_vty_connections
    description: Set 'transport input ssh' for 'line vty' connections
    calls:
      - action: run_command
        command: "Perform the following to determine if SSH is the only transport method for incoming VTY logins: The result should show only \u0027ssh\u0027 for \u0027transport input\u0027 hostname#show running-config | sec vty"
        save_as: result
    emit:
      as: item
      item:
        check: set_transport_input_ssh_for_line_vty_connections
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: cisco_ios_xe.section_1.set_no_exec_for_line_aux_0
    description: Set 'no exec' for 'line aux 0'
    calls:
      - action: run_command
        command: "Perform the following to determine if the EXEC process for the aux port is disabled: Verify no exec hostname#show running-config all | sec aux Verify you see the following \u0027no exec\u0027"
        save_as: result
    emit:
      as: item
      item:
        check: set_no_exec_for_line_aux_0
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: cisco_ios_xe.section_1.set_exec_timeout_to_less_than_or_equal_to_10
    description: Set 'exec-timeout' to less than or equal to 10 minutes for 'line aux 0'
    calls:
      - action: run_command
        command: "Perform the following to determine if the timeout is configured: Verify you return a result hostname#show running-config all | sec line aux 0"
        save_as: result
    emit:
      as: item
      item:
        check: set_exec_timeout_to_less_than_or_equal_to_10
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: cisco_ios_xe.section_1.set_exec_timeout_to_less_than_or_equal_to_10_min
    description: Set 'exec-timeout' to less than or equal to 10 min on 'ip http'
    calls:
      - action: run_command
        command: "Perform the following to determine if the timeout is configured: sh run | beg ip http timeout-policy"
        save_as: result
    emit:
      as: item
      item:
        check: set_exec_timeout_to_less_than_or_equal_to_10_min
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: cisco_ios_xe.section_1.set_password_for_enable_secret
    description: Set 'password' for 'enable secret'
    calls:
      - action: run_command
        command: "Perform the following to determine enable secret is set: If the command does not return a result, the enable password is not set. hostname#sh run | incl enable secret"
        save_as: result
    emit:
      as: item
      item:
        check: set_password_for_enable_secret
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: cisco_ios_xe.section_1.enable_service_password_encryption
    description: Enable 'service password-encryption'
    calls:
      - action: run_command
        command: "Perform the following to determine if a user with an encrypted password is enabled: Ensure a result that matches the command return hostname#sh run | incl service password-encryption"
        save_as: result
    emit:
      as: item
      item:
        check: enable_service_password_encryption
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: cisco_ios_xe.section_1.set_username_secret_for_all_local_users
    description: Set 'username secret' for all local users
    calls:
      - action: run_command
        command: "Perform the following to determine if a user with an encrypted password is enabled: If a result does not return with secret, the feature is not enabled hostname#show run | incl username"
        save_as: result
    emit:
      as: item
      item:
        check: set_username_secret_for_all_local_users
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: cisco_ios_xe.section_1.set_snmp_server_host_when_using_snmp
    description: Set 'snmp-server host' when using SNMP
    calls:
      - action: run_command
        command: "Perform the following to determine if SNMP traps are enabled: If the command returns configuration values, then SNMP is enabled. hostname#show run | incl snmp-server"
        save_as: result
    emit:
      as: item
      item:
        check: set_snmp_server_host_when_using_snmp
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: cisco_ios_xe.section_1.set_snmp_server_enable_traps_snmp
    description: Set 'snmp-server enable traps snmp'
    calls:
      - action: run_command
        command: "Perform the following to determine if SNMP traps are enabled: If the command returns configuration values, then SNMP is enabled. hostname#show run | incl snmp-server"
        save_as: result
    emit:
      as: item
      item:
        check: set_snmp_server_enable_traps_snmp
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: cisco_ios_xe.section_1.set_priv_for_each_snmp_server_group_using_snmpv3
    description: Set 'priv' for each 'snmp-server group' using SNMPv3
    calls:
      - action: run_command
        command: "Verify the result show the appropriate group name and security model hostname#show snmp group"
        save_as: result
    emit:
      as: item
      item:
        check: set_priv_for_each_snmp_server_group_using_snmpv3
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: cisco_ios_xe.section_1.set_transport_input_none_for_line_aux_0
    description: Set 'transport input none' for 'line aux 0'
    calls:
      - action: run_command
        command: "Perform the following to determine if inbound connections for the aux port are disabled: Verify you see the following \u0027Allowed input transports are none hostname#sh line aux 0 | incl input transports"
        save_as: result
    emit:
      as: item
      item:
        check: set_transport_input_none_for_line_aux_0
        value: "{{ result.stdout }}"
        expected: ""

