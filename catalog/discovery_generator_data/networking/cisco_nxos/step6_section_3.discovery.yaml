description: >
  cisco_nxos CIS Section 3 — Disable ICMP Redirects on all Layer 3 Interfaces

discovery:

  - discovery_id: cisco_nxos.section_3.disable_icmp_redirects_on_all_layer_3_interfaces
    description: Disable ICMP Redirects on all Layer 3 Interfaces
    calls:
      - action: run_command
        command: ""
        save_as: result
    emit:
      as: item
      item:
        check: disable_icmp_redirects_on_all_layer_3_interfaces
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: cisco_nxos.section_3.disable_proxy_arp_on_all_layer_3_interfaces
    description: Disable Proxy ARP on all Layer 3 Interfaces
    calls:
      - action: run_command
        command: "Since Proxy ARP should be disabled on all routed interfaces, and if disabled it does not show in the configuration, any occurence of the keyword \u0027proxy-arp\u0027 in the configuration is an audit failure for this check: switch# Show running-config | inc proxy-arp More completely, an interface state can be viewed, filtering only for Proxy ARP settings (note that the case of the word \u0027proxy\u0027 varies, so the \u0027P\u0027 is removed from the filter): switch# sho ip int vlan 1 | i roxy IP proxy ARP : disabled IP Local Proxy ARP : disabled Or to quickly view the Proxy ARP status of all interfaces: switch# sho ip int | i roxy IP proxy ARP : disabled IP Local Proxy ARP : disabled IP proxy ARP : disabled IP Local Proxy ARP : disabled In these last two examples, the desired state is that all entries should be \u0027disabled\u0027. The presence of the word \u0027enabled\u0027 is an audit failure."
        save_as: result
    emit:
      as: item
      item:
        check: disable_proxy_arp_on_all_layer_3_interfaces
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: cisco_nxos.section_3.disable_ip_source_routing
    description: Disable IP Source-Routing
    calls:
      - action: run_command
        command: ""
        save_as: result
    emit:
      as: item
      item:
        check: disable_ip_source_routing
        value: "{{ result.stdout }}"
        expected: ""

