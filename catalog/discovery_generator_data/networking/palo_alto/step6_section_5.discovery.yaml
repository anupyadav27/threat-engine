version: '1.0'
provider: networking
engine: palo_alto
category: section_5
cis_section: '5'
description: >
  palo_alto CIS Section 5 — WildFire file size upload limits are maximized

discovery:

  - discovery_id: palo_alto.section_5.wildfire_file_size_upload_limits_are_maximized
    description: Ensure that WildFire file size upload limits are maximized
    calls:
      - action: run_command
        command: "Navigate to Device \u003e Setup \u003e WildFire. Navigate to the General Settings sections. Verify the maximum size for each file type at the defaults or larger, to a size that is as large enough to account for \u0027large\u0027 files, but not large enough to affect performance of the hardware."
        save_as: result
    emit:
      as: item
      item:
        check: wildfire_file_size_upload_limits_are_maximized
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: palo_alto.section_5.a_wildfire_analysis_profile_is_enabled_for_all
    description: Ensure a WildFire Analysis profile is enabled for all security policies
    calls:
      - action: run_command
        command: "To verify WildFire Analysis Profile: \u2022 Navigate to Objects \u003e Security Profiles \u003e WildFire Analysis Profile verify that a profile exists. To verify File Blocking Rules: \u2022 For each Security Policy were the action is set to Allow, edit the Rule and navigate to Actions \u003e Profile Setting. Ensure that the WildFire Analysis is set to Allow and verify that a profile is set. If Group Profiles are used: \u2022 Navigate to Policies \u003e Security \u2022 For each Security Policy were the action is set to Allow, edit the Rule and navigate to Actions \u003e Profile Setting. Ensure that the Profile Type is set to Group. \u2022 Navigate to Objects \u003e Security Profile Groups. Open the Security Profile Group used above, and ensure that the Wildfire Analysis Profile is set."
        save_as: result
    emit:
      as: item
      item:
        check: a_wildfire_analysis_profile_is_enabled_for_all
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: palo_alto.section_5.forwarding_of_decrypted_content_to_wildfire_is
    description: Ensure forwarding of decrypted content to WildFire is enabled
    calls:
      - action: run_command
        command: "Navigate to Device \u003e Setup \u003e Content-ID \u003e Content-ID Settings. Verify that Allow forwarding of decrypted content is checked."
        save_as: result
    emit:
      as: item
      item:
        check: forwarding_of_decrypted_content_to_wildfire_is
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: palo_alto.section_5.all_wildfire_session_information_settings_are
    description: Ensure all WildFire session information settings are enabled
    calls:
      - action: run_command
        command: "Navigate to Device \u003e Setup \u003e WildFire \u003e Session Information Settings. Verify that every option is enabled."
        save_as: result
    emit:
      as: item
      item:
        check: all_wildfire_session_information_settings_are
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: palo_alto.section_5.alerts_are_enabled_for_malicious_files_detected
    description: Ensure alerts are enabled for malicious files detected by WildFire
    calls:
      - action: run_command
        command: "Navigate to Objects \u003e Log Forwarding. Verify that the WildFire log type is configured to generate alerts using the desired alerting mechanism(s)."
        save_as: result
    emit:
      as: item
      item:
        check: alerts_are_enabled_for_malicious_files_detected
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: palo_alto.section_5.wildfire_update_schedule_is_set_to_download_and
    description: Ensure 'WildFire Update Schedule' is set to download and install updates in real-time
    calls:
      - action: run_command
        command: "Navigate to Device \u003e Dynamic Updates \u003e WildFire Update Schedule. Verify that Recurrence is set to Real-time."
        save_as: result
    emit:
      as: item
      item:
        check: wildfire_update_schedule_is_set_to_download_and
        value: "{{ result.stdout }}"
        expected: ""

