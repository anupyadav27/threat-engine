    calls:
      - action: run_command
        command: "Navigate to Network \u003e Network Profiles \u003e Interface Management. In each profile, for each of the target protocols (SNMP, HTTPS, SSH), verify that Permitted IP Addresses is limited to those necessary for device management."
        save_as: result
    emit:
