version: '1.0'
provider: networking
engine: palo_alto
category: section_1
cis_section: '1'
description: >
  palo_alto CIS Section 1 — Syslog logging should be configured

discovery:

  - discovery_id: palo_alto.section_1.syslog_logging_should_be_configured
    description: Syslog logging should be configured
    calls:
      - action: run_command
        command: "Navigate to Device \u003e Server Profiles \u003e Syslog Ensure that a valid Syslog profile is configured, and that it points to a valid Syslog host. Navigate to Device \u003e Log Settings Under System, verify that at least one Syslog entry exists and that at least one entry has \u0027All Logs\u0027 selected. Each Syslog entry must have a valid Syslog Profile attached. Under Configuration, verify that at least one Syslog entry exists and that at least one entry has \u0027All Logs\u0027 selected. Each Syslog entry must have a valid Syslog Profile attached. Under User-ID, verify that at least one Syslog entry exists and that at least one entry has \u0027All Logs\u0027 selected. Each Syslog entry must have a valid Syslog Profile attached. Under HIP Match (Host Information Profile), verify that at least one Syslog entry exists and that at least one entry has \u0027All Logs\u0027 selected. Each Syslog entry must have a valid Syslog Profile attached. Under IP-Tag, verify that at least one Syslog entry exists and that at least one entry has \u0027All Logs\u0027 selected. Each Syslog entry must have a valid Syslog Profile attached."
        save_as: result
    emit:
      as: item
      item:
        check: syslog_logging_should_be_configured
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: palo_alto.section_1.snmpv3_traps_should_be_configured
    description: SNMPv3 traps should be configured
    calls:
      - action: run_command
        command: "Navigate to Device \u003e Server Profiles \u003e SNMP Traps Ensure that a valid SNMP profile is configured, that version V3 is selected, and that it points to a valid SNMPv3 host. User, EngineID and Password fields should be completed appropriately Navigate to Device \u003e Log Settings Under System, verify that at least one SNMP entry exists, corresponding to an SNMPv3 Server Profile and that at least one entry has \u0027All Logs\u0027 selected. Under Configuration, verify that at least one SNMP entry exists, corresponding to an SNMPv3 Server Profile and that at least one entry has \u0027All Logs\u0027 selected. Under User-ID, verify that at least one SNMP entry exists, corresponding to an SNMPv3 Server Profile and that at least one entry has \u0027All Logs\u0027 selected. Under HIP Match (Host Information Profile), verify that at least one SNMP entry exists, corresponding to an SNMPv3 Server Profile and that at least one entry has \u0027All Logs\u0027 selected. Under IP-Tag, verify that at least one SNMP entry exists, corresponding to an SNMPv3 Server Profile and that at least one entry has \u0027All Logs\u0027 selected."
        save_as: result
    emit:
      as: item
      item:
        check: snmpv3_traps_should_be_configured
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: palo_alto.section_1.enable_log_on_high_dp_load_is_enabled
    description: Ensure 'Enable Log on High DP Load' is enabled
    calls:
      - action: run_command
        command: "Navigate to Device \u003e Setup \u003e Management \u003e Logging and Reporting Settings \u003e Log Export and Reporting. Verify Enable Log on High DP Load is checked."
        save_as: result
    emit:
      as: item
