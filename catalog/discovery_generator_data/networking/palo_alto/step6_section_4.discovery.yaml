version: '1.0'
provider: networking
engine: palo_alto
category: section_4
cis_section: '4'
description: >
  palo_alto CIS Section 4 — 'Antivirus Update Schedule' is set to download and install updates hourly

discovery:

  - discovery_id: palo_alto.section_4.antivirus_update_schedule_is_set_to_download_and
    description: Ensure 'Antivirus Update Schedule' is set to download and install updates hourly
    calls:
      - action: run_command
        command: "Navigate to Device \u003e Dynamic Updates \u003e Antivirus Update Schedule. Verify that Action is set to Download and Install. Verify that Recurrence is set to Hourly."
        save_as: result
    emit:
      as: item
      item:
        check: antivirus_update_schedule_is_set_to_download_and
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: palo_alto.section_4.applications_and_threats_update_schedule_is_set
    description: Ensure 'Applications and Threats Update Schedule' is set to download and install updates at daily or shorter intervals
    calls:
      - action: run_command
        command: "Navigate to Device \u003e Dynamic Updates \u003e Application and Threats Update Schedule. Verify that Action is set to Download and Install. Verify that Recurrence is set to Daily, Hourly or Every 30 Minutes"
        save_as: result
    emit:
      as: item
      item:
        check: applications_and_threats_update_schedule_is_set
        value: "{{ result.stdout }}"
        expected: ""

