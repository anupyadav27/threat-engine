version: '1.0'
provider: networking
engine: palo_alto
category: section_3
cis_section: '3'
description: >
  palo_alto CIS Section 3 — a fully-synchronized High Availability peer is configured

discovery:

  - discovery_id: palo_alto.section_3.a_fully_synchronized_high_availability_peer_is
    description: Ensure a fully-synchronized High Availability peer is configured
    calls:
      - action: run_command
        command: "Navigate to Device \u003e High Availability \u003e HA Communications. In the HA Communications. \u003eData Link (HA2) section, verify that the correct interface is selected. Verify the desired protocol (IPv4 or IPv6) is selected. Verify the correct Transport is selected. Verify the Enable Session Synchronization box is checked."
        save_as: result
    emit:
      as: item
      item:
        check: a_fully_synchronized_high_availability_peer_is
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: palo_alto.section_3.high_availability_requires_link_monitoring_and_or
    description: Ensure 'High Availability' requires Link Monitoring and/or Path Monitoring
    calls:
      - action: run_command
        command: "To verify Link Monitoring from GUI: Navigate to Device \u003e High Availability \u003e Link and Path Monitoring. In the Link Monitoring section, verify the correct interfaces are in the Link Group and Group Failure Conditions Under the Link Monitoring section, verify Failure Condition is set to Any. Verify Enabled button is checked. To verify Path Monitoring from GUI: Navigate to Device \u003e High Availability \u003e Link and Path Monitoring. In the Path Monitoring section, verify Option is set correctly. Verify Failure Condition is set to Any. Verify Name, IP Address, Failure Condition is set correctly. Verify Default setting is set to Any. Verify Enabled button is checked."
        save_as: result
    emit:
      as: item
      item:
        check: high_availability_requires_link_monitoring_and_or
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: palo_alto.section_3.passive_link_state_and_preemptive_are_configured
    description: Ensure 'Passive Link State' and 'Preemptive' are configured appropriately
    calls:
      - action: run_command
        command: "To ensure Active/Passive Settings are configured correctly: Navigate to Device \u003e High Availability \u003e General \u003e Active/Passive Settings. Verify Passive Link State is set to auto. To ensure Election Settings are configured correctly: Navigate to Device \u003e High Availability \u003e Election Settings. Verify Preemptive is disabled."
        save_as: result
    emit:
      as: item
      item:
        check: passive_link_state_and_preemptive_are_configured
        value: "{{ result.stdout }}"
        expected: ""

