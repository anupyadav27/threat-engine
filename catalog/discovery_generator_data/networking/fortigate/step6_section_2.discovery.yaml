  - discovery_id: fortigate.section_2.only_snmpv3_is_enabled
    description: Ensure only SNMPv3 is enabled
    calls:
      - action: run_command
        command: "From CLI, check to make sure that there is not any community for SNMPv1 or SNMPv2c and only SNMPv3 users are there. Also make sure that SNMP Agent is enabled. FGT1 # config system snmp sysinfo FGT1 (sysinfo) # show config system snmp sysinfo set status enable ... end FGT1 (sysinfo) # end FGT1 # config system snmp community FGT1 (community) # show config system snmp community end FGT1 (community) # end FGT1 # config system snmp user FGT1 (user) # show config system snmp user edit \u0027snmp_test\u0027 set security-level auth-priv set auth-proto sha256 set auth-pwd ENC xxxxxx set priv-proto aes256 set priv-pwd ENC xxxxxx next end In the GUI, go to System -\u003e SNMP. Make sure that SNMP agent is enabled. Make sure that there is not any SNMPv1/2c community. Make sure that there is at least 1 SNMPv3 user in the list."
        save_as: result
    emit:
      as: item
      item:
        check: only_snmpv3_is_enabled
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: fortigate.section_2.idle_timeout_time_is_configured
    description: Ensure idle timeout time is configured
    calls:
      - action: run_command
        command: "To check the idle timeout in the GUI: 1) Login to FortiGate 2) Go to \u0027System\u0027 \u003e \u0027Settings\u0027. 3) In the \u0027Administration Settings\u0027 section, check the \u0027Idle timeout\u0027 value in minutes. To check the idle timeout in the CLI: get system global check the value of admintimeout in minutes"
        save_as: result
    emit:
      as: item
      item:
        check: idle_timeout_time_is_configured
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: fortigate.section_2.high_availability_configuration_is_enabled
    description: Ensure High Availability configuration is enabled
    calls:
      - action: run_command
        command: "In GUI: 1. Navigate to \u0027System\u0027 and then \u0027HA\u0027 2. Ensure \u0027Mode\u0027 is set to proper setting \u0027Active-Active\u0027 or \u0027Active-Passive\u0027 3. Review Configuration settings: - \u0027Cluster Name\u0027 must match on devices - \u0027Password\u0027 Must match on devices - \u0027Heartbeat Interfaces\u0027 need to be defined on devices 4. Click \u0027OK\u0027 to save changes and exit In CLI: FGT1 # config system ha FGT1 (ha) # set mode a-p ###(Active-Passive) FGT1 (ha) # set group-name \u0027FGT-HA\u0027 ###(Set cluster name) FGT1 (ha) # set password ******* ###(Set password) FGT1 (ha) # set hbdev port10 50 ###(Set Heartbeat Interface and priority) FGT1 (ha) # end To review configuration in CLI: FGT1 # config system ha FGT1 (ha) # show config system ha set group-name \u0027FGT-HA\u0027 set mode a-p set password ENC enrwD467hJmO6j6YW/l6FEOa1YNVYdo8Z5mCcTDEKUFpOVXcNYnPBmQDGX//ViXk6TkwNH0il5aJr /fZY25lq+husndQHZVWp2LIlXmCv/n81U43nkZUWaIKvqkellGFbhv0/IHoOLzQPCsVcBbyrsgopr YMvh6w7F06+nRriBtMNQxpOV5V+e388EcwsOOMsXBZOw== set hbdev \u0027port10\u0027 50 set override disable end"
        save_as: result
    emit:
      as: item
      item:
        check: high_availability_configuration_is_enabled
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: fortigate.section_2.monitor_interfaces_for_high_availability_devices
    description: Ensure 'Monitor Interfaces' for High Availability Devices is Enabled
    calls:
      - action: run_command
        command: "To Validate from GUI: go to System - \u003e HA Under \u0027Monitor Interfaces\u0027 validate all applicable interfaces are selected select \u0027OK\u0027 To Validate from CLI: FGT1 # config system ha FGT1 (ha) # show config system ha set group-name \u0027FGT-HA\u0027 set mode a-p set password ENC enrwD467hJmO6j6YW/l6FEOa1YNVYdo8Z5mCcTDEKUFpOVXcNYnPBmQDGX//ViXk6TkwNH0il5aJr /fZY25lq+husndQHZVWp2LIlXmCv/n81U43nkZUWaIKvqkellGFbhv0/IHoOLzQPCsVcBbyrsgopr YMvh6w7F06+nRriBtMNQxpiTE+12xAHz7lA3EoYZzf8A== set override disable set monitor \u0027port6\u0027 \u0027port7\u0027 ###Validate proper interfaces are present end"
        save_as: result
    emit:
      as: item
      item:
        check: monitor_interfaces_for_high_availability_devices
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: fortigate.section_2.snmp_agent_is_disabled
    description: Ensure SNMP agent is disabled
    calls:
      - action: run_command
        command: "on CLI, run the following commands to check whether SNMP agent is disabled. FGT1 # config system snmp sysinfo FGT1 (sysinfo) # show full config system snmp sysinfo set status disable ... end On the GUI, select System -\u003e SNMP, make sure that SNMP Agent is disabled."
        save_as: result
    emit:
