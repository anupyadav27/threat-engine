      item:
        check: snmp_agent_is_disabled
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: fortigate.section_2.high_availability_configuration
    description: Ensure High Availability Configuration
    calls:
      - action: run_command
        command: "In GUI: Navigate to \u0027System\u0027 and then \u0027HA\u0027 Ensure \u0027Mode\u0027 is set to proper setting \u0027Active-Active\u0027 or \u0027Active-Passive\u0027 Review Configuration settings \u0027Cluster Name\u0027 must match on devices \u0027Password\u0027 Must match on devices \u0027Heartbeat Interfaces\u0027 need to be defined on devices Click \u0027OK\u0027 to save changes and exit In CLI: FGT1 # config system ha FGT1 (ha) # set mode a-p ###(Active-Passive) FGT1 (ha) # set group-name \u0027FGT-HA\u0027 ###(Set cluster name) FGT1 (ha) # set password ******* ###(Set password) FGT1 (ha) # set hbdev port10 50 ###(Set Heartbeat Interface and priority) FGT1 (ha) # end To review configuration in CLI FGT1 # config system ha FGT1 (ha) # show config system ha set group-name \u0027FGT-HA\u0027 set mode a-p set password ENC enrwD467hJmO6j6YW/l6FEOa1YNVYdo8Z5mCcTDEKUFpOVXcNYnPBmQDGX//ViXk6TkwNH0il5aJr /fZY25lq+husndQHZVWp2LIlXmCv/n81U43nkZUWaIKvqkellGFbhv0/IHoOLzQPCsVcBbyrsgopr YMvh6w7F06+nRriBtMNQxpOV5V+e388EcwsOOMsXBZOw== set hbdev \u0027port10\u0027 50 set override disable end"
        save_as: result
    emit:
      as: item
      item:
        check: high_availability_configuration
        value: "{{ result.stdout }}"
        expected: ""

