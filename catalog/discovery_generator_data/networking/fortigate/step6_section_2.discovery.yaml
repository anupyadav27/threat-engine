version: '1.0'
provider: networking
engine: fortigate
category: section_2
cis_section: '2'
description: >
  fortigate CIS Section 2 — correct system time is configured through NTP

discovery:

  - discovery_id: fortigate.section_2.correct_system_time_is_configured_through_ntp
    description: Ensure correct system time is configured through NTP
    calls:
      - action: run_command
        command: "In the CLI: FGT1 # diag sys ntp status synchronized: yes, ntpsync: enabled, server-mode: enabled ipv4 server(ntp2.fortiguard.com) 208.91.114.23 -- reachable(0xff) S:3 T:54 server-version=4, stratum=1 reference time is e12361d5.f27e0322 -- UTC Wed Sep 11 12:06:45 2019 clock offset is -0.001569 sec, root delay is 0.000000 sec root dispersion is 0.010269 sec, peer dispersion is 19 msec ipv4 server(ntp1.fortiguard.com) 208.91.115.123 -- reachable(0xff) S:3 T:54 selected server-version=4, stratum=1 reference time is e12361d4.4f8b22a5 -- UTC Wed Sep 11 12:06:44 2019 clock offset is -0.000652 sec, root delay is 0.000000 sec root dispersion is 0.010284 sec, peer dispersion is 8 msec ipv4 server(ntp2.fortiguard.com) 208.91.113.71 -- reachable(0xff) S:3 T:54 server-version=4, stratum=2 reference time is e12361d6.4caf57ab -- UTC Wed Sep 11 12:06:46 2019 clock offset is -0.004814 sec, root delay is 0.000137 sec root dispersion is 0.011154 sec, peer dispersion is 3 msec ipv4 server(ntp1.fortiguard.com) 208.91.113.70 -- reachable(0xff) S:3 T:54 server-version=4, stratum=2 reference time is e123617b.c98e2059 -- UTC Wed Sep 11 12:05:15 2019 clock offset is -0.005106 sec, root delay is 0.000122 sec root dispersion is 0.013382 sec, peer dispersion is 6 msec"
        save_as: result
    emit:
      as: item
      item:
        check: correct_system_time_is_configured_through_ntp
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: fortigate.section_2.hostname_is_set
    description: Ensure hostname is set
    calls:
      - action: run_command
        command: "In CLI get system global ... hostname : FG1 ... In GUI, go to \u0027System\u0027 -\u003e \u0027Settings\u0027, check the field \u0027Hostname\u0027"
        save_as: result
    emit:
      as: item
      item:
        check: hostname_is_set
        value: "{{ result.stdout }}"
        expected: ""

