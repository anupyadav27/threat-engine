version: '1.0'
provider: networking
engine: fortigate
category: section_4
cis_section: '4'
description: >
  fortigate CIS Section 4 — Antivirus Definition Push Updates are Configured

discovery:

  - discovery_id: fortigate.section_4.antivirus_definition_push_updates_are_configured
    description: Ensure Antivirus Definition Push Updates are Configured
    calls:
      - action: run_command
        command: ""
        save_as: result
    emit:
      as: item
      item:
        check: antivirus_definition_push_updates_are_configured
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: fortigate.section_4.enable_outbreak_prevention_database
    description: Enable Outbreak Prevention Database
    calls:
      - action: run_command
        command: ""
        save_as: result
    emit:
      as: item
      item:
        check: enable_outbreak_prevention_database
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: fortigate.section_4.enable_ai_heuristic_based_malware_detection
    description: Enable AI /heuristic based malware detection
    calls:
      - action: run_command
        command: "Configuration and verification can be only done on CLI. On FortiOS 6.4.x FGT1 # show antivirus heuristic Validate that it is in \u0027block\u0027 mode. On FortiOS 7.x: FGT1 # show antivirus settings | grep machine-learning-detection Validate that it is enabled."
        save_as: result
    emit:
      as: item
      item:
        check: enable_ai_heuristic_based_malware_detection
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: fortigate.section_4.enable_grayware_detection_on_antivirus
    description: Enable grayware detection on antivirus
    calls:
      - action: run_command
        command: ""
        save_as: result
    emit:
      as: item
      item:
        check: enable_grayware_detection_on_antivirus
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: fortigate.section_4.block_applications_running_on_non_default_ports
    description: Block applications running on non-default ports
    calls:
      - action: run_command
        command: ""
        save_as: result
    emit:
      as: item
      item:
        check: block_applications_running_on_non_default_ports
        value: "{{ result.stdout }}"
        expected: ""

