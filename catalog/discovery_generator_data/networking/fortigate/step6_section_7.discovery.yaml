      - action: run_command
        command: "On GUI: 1. Go to Log \u0026 Report \u003e Log Settings. 2. Validate under \u0027Syslog logging\u0027 that logs are being offloaded to another device."
        save_as: result
    emit:
      as: item
      item:
        check: centralized_logging_and_reporting
        value: "{{ result.stdout }}"
        expected: ""

