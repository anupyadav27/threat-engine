version: '1.0'
provider: networking
engine: fortigate
category: section_7
cis_section: '7'
description: >
  fortigate CIS Section 7 — Encrypt Log Transmission to FortiAnalyzer / FortiManager

discovery:

  - discovery_id: fortigate.section_7.encrypt_log_transmission_to_fortianalyzer
    description: Encrypt Log Transmission to FortiAnalyzer / FortiManager
    calls:
      - action: run_command
        command: ""
        save_as: result
    emit:
      as: item
      item:
        check: encrypt_log_transmission_to_fortianalyzer
        value: "{{ result.stdout }}"
