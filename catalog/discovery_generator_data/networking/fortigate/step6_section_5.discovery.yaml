version: '1.0'
provider: networking
engine: fortigate
category: section_5
cis_section: '5'
description: >
  fortigate CIS Section 5 — Enable Compromised Host Quarantine

discovery:

  - discovery_id: fortigate.section_5.enable_compromised_host_quarantine
    description: Enable Compromised Host Quarantine
    calls:
      - action: run_command
        command: "GUI Security Fabric\u003eAutomation\u003e Verify Compromised Host Quarantine is enabled."
        save_as: result
    emit:
      as: item
      item:
        check: enable_compromised_host_quarantine
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: fortigate.section_5.security_fabric_is_configured
    description: Ensure Security Fabric is Configured
    calls:
      - action: run_command
        command: "Review through the GUI: To Validate root FortiGate status go to \u0027Security Fabric\u0027 -\u003e Fabric Connectors and then select \u0027Security Fabric Setup\u0027 Validate that the root FortiGate has status set to enabled and the Security Fabric Role set to \u0027Serve as Fabric Root\u0027 Ensure that FortiAnalyzer settings are correct and that there is a defined Fabric name as well as interfaces selected that will \u0027Allow other Security Fabric Devices to Join\u0027."
        save_as: result
    emit:
      as: item
      item:
        check: security_fabric_is_configured
        value: "{{ result.stdout }}"
        expected: ""

