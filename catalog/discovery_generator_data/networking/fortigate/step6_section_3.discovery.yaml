version: '1.0'
provider: networking
engine: fortigate
category: section_3
cis_section: '3'
description: >
  fortigate CIS Section 3 — policies do not use 'ALL' as Service

discovery:

  - discovery_id: fortigate.section_3.policies_do_not_use_all_as_service
    description: Ensure that policies do not use 'ALL' as Service
    calls:
      - action: run_command
        command: "In CLI: FGT1 # config firewall policy FGT1 (policy) # show TEST-FG-Third (policy) # show config firewall policy edit 1 set uuid d0eed832-bb73-51e6-c3da-3cd2ec201608 set srcintf \u0027internal\u0027 set dstintf \u0027wan\u0027 set srcaddr \u0027all\u0027 set dstaddr \u0027all\u0027 set action accept set schedule \u0027always\u0027 set service \u0027HTTPS\u0027 \u0027HTTP\u0027 set ssl-ssh-profile \u0027__tmp_no-inspection\u0027 set nat enable next end In the GUI, go to Policy \u0026 Objects -\u003e IPv4 Policy. Make sure that none of the policies use \u0027ALL\u0027 as its service"
        save_as: result
    emit:
      as: item
      item:
        check: policies_do_not_use_all_as_service
        value: "{{ result.stdout }}"
        expected: ""

