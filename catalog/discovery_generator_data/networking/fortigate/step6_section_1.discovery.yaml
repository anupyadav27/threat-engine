version: '1.0'
provider: networking
engine: fortigate
category: section_1
cis_section: '1'
description: >
  fortigate CIS Section 1 — DNS server is configured

discovery:

  - discovery_id: fortigate.section_1.dns_server_is_configured
    description: Ensure DNS server is configured
    calls:
      - action: run_command
        command: "In CLI: FGT1 # config system dns FGT1 (dns) # show config system dns set primary \u003cip_address\u003e set secondary \u003cip_address\u003e ... end In the GUI, go to Networks -\u003e DNS. The Fortigate uses either the default FortiGuard DNS or customized DNS"
        save_as: result
    emit:
      as: item
      item:
        check: dns_server_is_configured
        value: "{{ result.stdout }}"
        expected: ""

