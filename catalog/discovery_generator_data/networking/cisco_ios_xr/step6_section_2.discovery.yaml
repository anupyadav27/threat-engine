version: '1.0'
provider: networking
engine: cisco_ios_xr
category: section_2
cis_section: '2'
description: >
  cisco_ios_xr CIS Section 2 — Authentication

discovery:

  - discovery_id: cisco_ios_xr.section_2.authentication
    description: Authentication
    calls:
      - action: run_command
        command: "Verify that authentication is configured: IOSXR#sh run key chain Wed Jul 19 21:48:31.091 UTC key chain CHAIN key 1 key-string password 045802150C2E IOSXR#sh run router eigrp Wed Jul 19 21:48:03.792 UTC router eigrp 100 address-family ipv4 interface Loopback1 authentication keychain CHAIN ! interface MgmtEth0/RP0/CPU0/0 authentication keychain CHAIN"
        save_as: result
    emit:
      as: item
      item:
        check: authentication
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: cisco_ios_xr.section_2.key_chains
    description: Key chains
    calls:
      - action: run_command
        command: ""
        save_as: result
    emit:
      as: item
      item:
        check: key_chains
        value: "{{ result.stdout }}"
        expected: ""

