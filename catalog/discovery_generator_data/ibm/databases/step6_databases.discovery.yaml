version: '1.0'
provider: ibm
service: databases
services:
  client: databases
  module: ibm_platform_services.databases
discovery:
- discovery_id: ibm.databases.get-backup
  calls:
  - action: get-backup
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      crn: '{{ response.crn }}'
      guid: '{{ response.guid }}'
      type: '{{ response.type }}'
      status: '{{ response.status }}'
      state: '{{ response.state }}'
      created_at: '{{ response.created_at }}'
      updated_at: '{{ response.updated_at }}'
      resource_group_id: '{{ response.resource_group_id }}'
      resource_group: '{{ response.resource_group }}'
      region: '{{ response.region }}'
      location: '{{ response.location }}'
      tags: '{{ response.tags }}'
      href: '{{ response.href }}'
      deployment_id: '{{ response.deployment_id }}'
      version: '{{ response.version }}'
      platform: '{{ response.platform }}'
      configuration: '{{ response.configuration }}'
      users: '{{ response.users }}'
      connectionstrings: '{{ response.connectionstrings }}'
      backup_id: '{{ response.backup_id }}'
- discovery_id: ibm.databases.get-deployment
  calls:
  - action: get-deployment
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      crn: '{{ response.crn }}'
      guid: '{{ response.guid }}'
      type: '{{ response.type }}'
      status: '{{ response.status }}'
      state: '{{ response.state }}'
      created_at: '{{ response.created_at }}'
      updated_at: '{{ response.updated_at }}'
      resource_group_id: '{{ response.resource_group_id }}'
      resource_group: '{{ response.resource_group }}'
      region: '{{ response.region }}'
      location: '{{ response.location }}'
      tags: '{{ response.tags }}'
      href: '{{ response.href }}'
      deployment_id: '{{ response.deployment_id }}'
      version: '{{ response.version }}'
      platform: '{{ response.platform }}'
      configuration: '{{ response.configuration }}'
      users: '{{ response.users }}'
      connectionstrings: '{{ response.connectionstrings }}'
      backup_id: '{{ response.backup_id }}'
- discovery_id: ibm.databases.list-backups
  calls:
  - action: list-backups
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      guid: '{{ item.guid }}'
      type: '{{ item.type }}'
      status: '{{ item.status }}'
      state: '{{ item.state }}'
      created_at: '{{ item.created_at }}'
      updated_at: '{{ item.updated_at }}'
      resource_group_id: '{{ item.resource_group_id }}'
      resource_group: '{{ item.resource_group }}'
      region: '{{ item.region }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      href: '{{ item.href }}'
      deployment_id: '{{ item.deployment_id }}'
      version: '{{ item.version }}'
      platform: '{{ item.platform }}'
      configuration: '{{ item.configuration }}'
      users: '{{ item.users }}'
      connectionstrings: '{{ item.connectionstrings }}'
      backup_id: '{{ item.backup_id }}'
- discovery_id: ibm.databases.list-deployments
  calls:
  - action: list-deployments
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      guid: '{{ item.guid }}'
      type: '{{ item.type }}'
      status: '{{ item.status }}'
      state: '{{ item.state }}'
      created_at: '{{ item.created_at }}'
      updated_at: '{{ item.updated_at }}'
      resource_group_id: '{{ item.resource_group_id }}'
      resource_group: '{{ item.resource_group }}'
      region: '{{ item.region }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      href: '{{ item.href }}'
      deployment_id: '{{ item.deployment_id }}'
      version: '{{ item.version }}'
      platform: '{{ item.platform }}'
      configuration: '{{ item.configuration }}'
      users: '{{ item.users }}'
      connectionstrings: '{{ item.connectionstrings }}'
      backup_id: '{{ item.backup_id }}'
