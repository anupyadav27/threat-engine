# Discovery YAML — datastage (IBM Cloud)
# Generated: 2026-02-21T04:45:38Z
version: '1.0'
provider: ibm
service: datastage
services:
  client: datastage
  module: ibm_platform_services.datastage
discovery:
  # ── get_job ──
  - discovery_id: ibm.datastage.get-job
    calls:
      - action: get-job
        save_as: response
        on_error: continue
    emit:
      as: item
  # ── list_jobs ──
  - discovery_id: ibm.datastage.list-jobs
    calls:
      - action: list-jobs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
