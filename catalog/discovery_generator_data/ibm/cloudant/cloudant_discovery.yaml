version: '1.0'
provider: ibm
service: cloudant
services:
  client: cloudant
  module: ibm_cloud_sdk.cloudant
discovery:
- discovery_id: ibm.cloudant.get-database
  calls:
  - action: get-database
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.cloudant.get-document
  calls:
  - action: get-document
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.cloudant.list-databases
  calls:
  - action: list-databases
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.cloudant.list-documents
  calls:
  - action: list-documents
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
