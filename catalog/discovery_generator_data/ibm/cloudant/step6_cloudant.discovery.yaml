version: '1.0'
provider: ibm
service: cloudant
services:
  client: cloudant
  module: ibm_platform_services.cloudant
discovery:
- discovery_id: ibm.cloudant.get-database
  calls:
  - action: get-database
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      crn: '{{ response.crn }}'
      guid: '{{ response.guid }}'
      type: '{{ response.type }}'
      status: '{{ response.status }}'
      state: '{{ response.state }}'
      created_at: '{{ response.created_at }}'
      updated_at: '{{ response.updated_at }}'
      resource_group_id: '{{ response.resource_group_id }}'
      resource_group: '{{ response.resource_group }}'
      region: '{{ response.region }}'
      location: '{{ response.location }}'
      tags: '{{ response.tags }}'
      href: '{{ response.href }}'
      doc_count: '{{ response.doc_count }}'
      disk_size: '{{ response.disk_size }}'
      data_size: '{{ response.data_size }}'
      compact_running: '{{ response.compact_running }}'
      _rev: '{{ response._rev }}'
  uid_template: '{item.crn}'
- discovery_id: ibm.cloudant.get-document
  calls:
  - action: get-document
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      crn: '{{ response.crn }}'
      guid: '{{ response.guid }}'
      type: '{{ response.type }}'
      status: '{{ response.status }}'
      state: '{{ response.state }}'
      created_at: '{{ response.created_at }}'
      updated_at: '{{ response.updated_at }}'
      resource_group_id: '{{ response.resource_group_id }}'
      resource_group: '{{ response.resource_group }}'
      region: '{{ response.region }}'
      location: '{{ response.location }}'
      tags: '{{ response.tags }}'
      href: '{{ response.href }}'
      doc_count: '{{ response.doc_count }}'
      disk_size: '{{ response.disk_size }}'
      data_size: '{{ response.data_size }}'
      compact_running: '{{ response.compact_running }}'
      _rev: '{{ response._rev }}'
  uid_template: '{item.crn}'
- discovery_id: ibm.cloudant.list-databases
  calls:
  - action: list-databases
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      guid: '{{ item.guid }}'
      type: '{{ item.type }}'
      status: '{{ item.status }}'
      state: '{{ item.state }}'
      created_at: '{{ item.created_at }}'
      updated_at: '{{ item.updated_at }}'
      resource_group_id: '{{ item.resource_group_id }}'
      resource_group: '{{ item.resource_group }}'
      region: '{{ item.region }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      href: '{{ item.href }}'
      doc_count: '{{ item.doc_count }}'
      disk_size: '{{ item.disk_size }}'
      data_size: '{{ item.data_size }}'
      compact_running: '{{ item.compact_running }}'
      _rev: '{{ item._rev }}'
  uid_template: '{item.crn}'
- discovery_id: ibm.cloudant.list-documents
  calls:
  - action: list-documents
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      guid: '{{ item.guid }}'
      type: '{{ item.type }}'
      status: '{{ item.status }}'
      state: '{{ item.state }}'
      created_at: '{{ item.created_at }}'
      updated_at: '{{ item.updated_at }}'
      resource_group_id: '{{ item.resource_group_id }}'
      resource_group: '{{ item.resource_group }}'
      region: '{{ item.region }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      href: '{{ item.href }}'
      doc_count: '{{ item.doc_count }}'
      disk_size: '{{ item.disk_size }}'
      data_size: '{{ item.data_size }}'
      compact_running: '{{ item.compact_running }}'
      _rev: '{{ item._rev }}'
  uid_template: '{item.crn}'
