# Discovery YAML — watson_discovery (IBM Cloud)
# Generated: 2026-02-21T04:45:39Z
version: '1.0'
provider: ibm
service: watson_discovery
services:
  client: watson_discovery
  module: ibm_platform_services.watson_discovery
discovery:
  # ── get_collection ──
  - discovery_id: ibm.watson_discovery.get-collection
    calls:
      - action: get-collection
        save_as: response
        on_error: continue
    emit:
      as: item
  # ── get_environment ──
  - discovery_id: ibm.watson_discovery.get-environment
    calls:
      - action: get-environment
        save_as: response
        on_error: continue
    emit:
      as: item
  # ── list_collections ──
  - discovery_id: ibm.watson_discovery.list-collections
    calls:
      - action: list-collections
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
  # ── list_environments ──
  - discovery_id: ibm.watson_discovery.list-environments
    calls:
      - action: list-environments
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
  # ── query ──
  - discovery_id: ibm.watson_discovery.query
    calls:
      - action: query
        save_as: response
        on_error: continue
    emit:
      as: item
