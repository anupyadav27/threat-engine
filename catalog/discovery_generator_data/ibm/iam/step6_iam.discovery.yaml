# Discovery YAML — iam (IBM Cloud)
# Generated: 2026-02-21T04:45:39Z
version: '1.0'
provider: ibm
service: iam
services:
  client: iam
  module: ibm_platform_services.iam
discovery:
  # ── get_policy ──
  - discovery_id: ibm.iam.get-policy
    calls:
      - action: get-policy
        save_as: response
        on_error: continue
    emit:
      as: item
  # ── get_user ──
  - discovery_id: ibm.iam.get-user
    calls:
      - action: get-user
        save_as: response
        on_error: continue
    emit:
      as: item
  # ── list_policies ──
  - discovery_id: ibm.iam.list-policies
    calls:
      - action: list-policies
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
  # ── list_users ──
  - discovery_id: ibm.iam.list-users
    calls:
      - action: list-users
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
