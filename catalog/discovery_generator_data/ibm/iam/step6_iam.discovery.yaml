version: '1.0'
provider: ibm
service: iam
services:
  client: iam
  module: ibm_platform_services.iam
discovery:
- discovery_id: ibm.iam.get-policy
  calls:
  - action: get-policy
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      crn: '{{ response.crn }}'
      guid: '{{ response.guid }}'
      type: '{{ response.type }}'
      status: '{{ response.status }}'
      state: '{{ response.state }}'
      created_at: '{{ response.created_at }}'
      updated_at: '{{ response.updated_at }}'
      resource_group_id: '{{ response.resource_group_id }}'
      resource_group: '{{ response.resource_group }}'
      region: '{{ response.region }}'
      location: '{{ response.location }}'
      tags: '{{ response.tags }}'
      href: '{{ response.href }}'
      iam_id: '{{ response.iam_id }}'
      user_id: '{{ response.user_id }}'
      email: '{{ response.email }}'
      policy_id: '{{ response.policy_id }}'
      subjects: '{{ response.subjects }}'
      roles: '{{ response.roles }}'
      resources: '{{ response.resources }}'
  uid_template: '{item.crn}'
- discovery_id: ibm.iam.get-user
  calls:
  - action: get-user
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      crn: '{{ response.crn }}'
      guid: '{{ response.guid }}'
      type: '{{ response.type }}'
      status: '{{ response.status }}'
      state: '{{ response.state }}'
      created_at: '{{ response.created_at }}'
      updated_at: '{{ response.updated_at }}'
      resource_group_id: '{{ response.resource_group_id }}'
      resource_group: '{{ response.resource_group }}'
      region: '{{ response.region }}'
      location: '{{ response.location }}'
      tags: '{{ response.tags }}'
      href: '{{ response.href }}'
      iam_id: '{{ response.iam_id }}'
      user_id: '{{ response.user_id }}'
      email: '{{ response.email }}'
      policy_id: '{{ response.policy_id }}'
      subjects: '{{ response.subjects }}'
      roles: '{{ response.roles }}'
      resources: '{{ response.resources }}'
  uid_template: '{item.crn}'
- discovery_id: ibm.iam.list-policies
  calls:
  - action: list-policies
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      guid: '{{ item.guid }}'
      type: '{{ item.type }}'
      status: '{{ item.status }}'
      state: '{{ item.state }}'
      created_at: '{{ item.created_at }}'
      updated_at: '{{ item.updated_at }}'
      resource_group_id: '{{ item.resource_group_id }}'
      resource_group: '{{ item.resource_group }}'
      region: '{{ item.region }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      href: '{{ item.href }}'
      iam_id: '{{ item.iam_id }}'
      user_id: '{{ item.user_id }}'
      email: '{{ item.email }}'
      policy_id: '{{ item.policy_id }}'
      subjects: '{{ item.subjects }}'
      roles: '{{ item.roles }}'
      resources: '{{ item.resources }}'
  uid_template: '{item.crn}'
- discovery_id: ibm.iam.list-users
  calls:
  - action: list-users
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      guid: '{{ item.guid }}'
      type: '{{ item.type }}'
      status: '{{ item.status }}'
      state: '{{ item.state }}'
      created_at: '{{ item.created_at }}'
      updated_at: '{{ item.updated_at }}'
      resource_group_id: '{{ item.resource_group_id }}'
      resource_group: '{{ item.resource_group }}'
      region: '{{ item.region }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      href: '{{ item.href }}'
      iam_id: '{{ item.iam_id }}'
      user_id: '{{ item.user_id }}'
      email: '{{ item.email }}'
      policy_id: '{{ item.policy_id }}'
      subjects: '{{ item.subjects }}'
      roles: '{{ item.roles }}'
      resources: '{{ item.resources }}'
  uid_template: '{item.crn}'
