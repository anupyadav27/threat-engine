version: '1.0'
provider: ibm
service: watson
services:
  client: watson
  module: ibm_platform_services.watson
discovery:
- discovery_id: ibm.watson.list-workspaces
  calls:
  - action: list-workspaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      created_at: '{{ item.created_at }}'
      crn: '{{ item.crn }}'
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.crn}'
