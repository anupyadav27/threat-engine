version: '1.0'
provider: ibm
service: enterprise_usage_reports
services:
  client: enterprise_usage_reports
  module: boto3.client
discovery:
- discovery_id: ibm.enterprise_usage_reports.getAuthenticator
  calls:
  - action: getAuthenticator
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      status: '{{ item.status }}'
      created_at: '{{ item.created_at }}'
      tags: '{{ item.tags }}'
- discovery_id: ibm.enterprise_usage_reports.getEnableGzipCompression
  calls:
  - action: getEnableGzipCompression
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      status: '{{ item.status }}'
      created_at: '{{ item.created_at }}'
      tags: '{{ item.tags }}'
- discovery_id: ibm.enterprise_usage_reports.getHttpClient
  calls:
  - action: getHttpClient
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      status: '{{ item.status }}'
      created_at: '{{ item.created_at }}'
      tags: '{{ item.tags }}'
- discovery_id: ibm.enterprise_usage_reports.getResourceUsageReport
  calls:
  - action: getResourceUsageReport
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      status: '{{ item.status }}'
      created_at: '{{ item.created_at }}'
      tags: '{{ item.tags }}'
checks: []
