version: '1.0'
provider: ibm
service: enterprise_usage_reports
services:
  client: enterprise_usage_reports
  module: ibm_platform_services.enterprise_usage_reports
discovery:
- discovery_id: ibm.enterprise_usage_reports.get-resource-usage-report
  calls:
  - action: get-resource-usage-report
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      created_at: '{{ response.created_at }}'
      crn: '{{ response.crn }}'
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      status: '{{ response.status }}'
      tags: '{{ response.tags }}'
  uid_template: '{item.crn}'
