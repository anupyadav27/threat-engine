version: '1.0'
provider: ibm
service: user_management
services:
  client: user_management
  module: boto3.client
discovery:
- discovery_id: ibm.user_management.getAuthenticator
  calls:
  - action: getAuthenticator
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      status: '{{ item.status }}'
      created_at: '{{ item.created_at }}'
      tags: '{{ item.tags }}'
- discovery_id: ibm.user_management.getEnableGzipCompression
  calls:
  - action: getEnableGzipCompression
    save_as: response
