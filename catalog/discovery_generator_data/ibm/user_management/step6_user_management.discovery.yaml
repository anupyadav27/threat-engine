# Discovery YAML — user_management (IBM Cloud)
# Generated: 2026-02-21T04:45:39Z
version: '1.0'
provider: ibm
service: user_management
services:
  client: user_management
  module: ibm_platform_services.user_management
discovery:
  # ── Dependent ops ──
  # ── get_user_profile [dependent] ──
  - discovery_id: ibm.user_management.get-user-profile
    calls:
      - action: get-user-profile
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        created_at: '{{ response.created_at }}'
        crn: '{{ response.crn }}'
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        status: '{{ response.status }}'
        tags: '{{ response.tags }}'
  # ── get_user_settings [dependent] ──
  - discovery_id: ibm.user_management.get-user-settings
    calls:
      - action: get-user-settings
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        created_at: '{{ response.created_at }}'
        crn: '{{ response.crn }}'
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        status: '{{ response.status }}'
        tags: '{{ response.tags }}'
  # ── list_users [dependent] ──
  - discovery_id: ibm.user_management.list-users
    calls:
      - action: list-users
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        created_at: '{{ item.created_at }}'
        crn: '{{ item.crn }}'
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        tags: '{{ item.tags }}'
