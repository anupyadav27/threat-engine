version: '1.0'
provider: ibm
service: object_storage
services:
  client: object_storage
  module: ibm_platform_services.object_storage
discovery:
- discovery_id: ibm.object_storage.get-bucket
  calls:
  - action: get-bucket
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      crn: '{{ response.crn }}'
      guid: '{{ response.guid }}'
      type: '{{ response.type }}'
      status: '{{ response.status }}'
      state: '{{ response.state }}'
      created_at: '{{ response.created_at }}'
      updated_at: '{{ response.updated_at }}'
      resource_group_id: '{{ response.resource_group_id }}'
      resource_group: '{{ response.resource_group }}'
      region: '{{ response.region }}'
      location: '{{ response.location }}'
      tags: '{{ response.tags }}'
      href: '{{ response.href }}'
      bucket_name: '{{ response.bucket_name }}'
      encryption: '{{ response.encryption }}'
      encryption_key: '{{ response.encryption_key }}'
      versioning: '{{ response.versioning }}'
      public_access_block: '{{ response.public_access_block }}'
      lifecycle: '{{ response.lifecycle }}'
- discovery_id: ibm.object_storage.list-buckets
  calls:
  - action: list-buckets
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      guid: '{{ item.guid }}'
      type: '{{ item.type }}'
      status: '{{ item.status }}'
      state: '{{ item.state }}'
      created_at: '{{ item.created_at }}'
      updated_at: '{{ item.updated_at }}'
      resource_group_id: '{{ item.resource_group_id }}'
      resource_group: '{{ item.resource_group }}'
      region: '{{ item.region }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      href: '{{ item.href }}'
      bucket_name: '{{ item.bucket_name }}'
      encryption: '{{ item.encryption }}'
      encryption_key: '{{ item.encryption_key }}'
      versioning: '{{ item.versioning }}'
      public_access_block: '{{ item.public_access_block }}'
      lifecycle: '{{ item.lifecycle }}'
- discovery_id: ibm.object_storage.list-objects
  calls:
  - action: list-objects
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      guid: '{{ item.guid }}'
      type: '{{ item.type }}'
      status: '{{ item.status }}'
      state: '{{ item.state }}'
      created_at: '{{ item.created_at }}'
      updated_at: '{{ item.updated_at }}'
      resource_group_id: '{{ item.resource_group_id }}'
      resource_group: '{{ item.resource_group }}'
      region: '{{ item.region }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      href: '{{ item.href }}'
      bucket_name: '{{ item.bucket_name }}'
      encryption: '{{ item.encryption }}'
      encryption_key: '{{ item.encryption_key }}'
      versioning: '{{ item.versioning }}'
      public_access_block: '{{ item.public_access_block }}'
      lifecycle: '{{ item.lifecycle }}'
