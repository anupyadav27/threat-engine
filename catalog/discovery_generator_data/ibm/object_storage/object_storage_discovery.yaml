version: '1.0'
provider: ibm
service: object_storage
services:
  client: object_storage
  module: ibm_cloud_sdk.object_storage
discovery:
- discovery_id: ibm.object_storage.get-bucket
  calls:
  - action: get-bucket
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.object_storage.list-buckets
  calls:
  - action: list-buckets
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.object_storage.list-objects
  calls:
  - action: list-objects
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
