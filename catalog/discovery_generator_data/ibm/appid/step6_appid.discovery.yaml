version: '1.0'
provider: ibm
service: appid
services:
  client: appid
  module: boto3.client
discovery:
- discovery_id: ibm.appid.list-instances
  calls:
  - action: list-instances
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.resources }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      region_id: '{{ item.region_id }}'
      resource_group_id: '{{ item.resource_group_id }}'
      state: '{{ item.state }}'
      created_at: '{{ item.created_at }}'
  uid_template: '{item.id}'
