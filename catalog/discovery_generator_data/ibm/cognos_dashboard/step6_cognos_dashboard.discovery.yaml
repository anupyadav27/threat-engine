version: '1.0'
provider: ibm
service: cognos_dashboard
services:
  client: cognos_dashboard
  module: ibm_platform_services.cognos_dashboard
discovery:
- discovery_id: ibm.cognos_dashboard.get-dashboard
  calls:
  - action: get-dashboard
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      crn: '{{ response.crn }}'
      guid: '{{ response.guid }}'
      type: '{{ response.type }}'
      status: '{{ response.status }}'
      state: '{{ response.state }}'
      created_at: '{{ response.created_at }}'
      updated_at: '{{ response.updated_at }}'
      resource_group_id: '{{ response.resource_group_id }}'
      resource_group: '{{ response.resource_group }}'
      region: '{{ response.region }}'
      location: '{{ response.location }}'
      tags: '{{ response.tags }}'
      href: '{{ response.href }}'
      dashboard_id: '{{ response.dashboard_id }}'
      owner: '{{ response.owner }}'
      shared_with: '{{ response.shared_with }}'
  uid_template: '{item.crn}'
- discovery_id: ibm.cognos_dashboard.list-dashboards
  calls:
  - action: list-dashboards
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      guid: '{{ item.guid }}'
      type: '{{ item.type }}'
      status: '{{ item.status }}'
      state: '{{ item.state }}'
      created_at: '{{ item.created_at }}'
      updated_at: '{{ item.updated_at }}'
      resource_group_id: '{{ item.resource_group_id }}'
      resource_group: '{{ item.resource_group }}'
      region: '{{ item.region }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      href: '{{ item.href }}'
      dashboard_id: '{{ item.dashboard_id }}'
      owner: '{{ item.owner }}'
      shared_with: '{{ item.shared_with }}'
  uid_template: '{item.crn}'
