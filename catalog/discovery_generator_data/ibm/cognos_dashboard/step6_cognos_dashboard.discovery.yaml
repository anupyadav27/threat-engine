# Discovery YAML — cognos_dashboard (IBM Cloud)
# Generated: 2026-02-21T04:45:38Z
version: '1.0'
provider: ibm
service: cognos_dashboard
services:
  client: cognos_dashboard
  module: ibm_platform_services.cognos_dashboard
discovery:
  # ── get_dashboard ──
  - discovery_id: ibm.cognos_dashboard.get-dashboard
    calls:
      - action: get-dashboard
        save_as: response
        on_error: continue
    emit:
      as: item
  # ── list_dashboards ──
  - discovery_id: ibm.cognos_dashboard.list-dashboards
    calls:
      - action: list-dashboards
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
