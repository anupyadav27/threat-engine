# Discovery YAML — containers (IBM Cloud)
# Generated: 2026-02-21T04:45:38Z
version: '1.0'
provider: ibm
service: containers
services:
  client: containers
  module: ibm_platform_services.containers
discovery:
  # ── get_cluster ──
  - discovery_id: ibm.containers.get-cluster
    calls:
      - action: get-cluster
        save_as: response
        on_error: continue
    emit:
      as: item
  # ── list_clusters ──
  - discovery_id: ibm.containers.list-clusters
    calls:
      - action: list-clusters
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
  # ── list_workers ──
  - discovery_id: ibm.containers.list-workers
    calls:
      - action: list-workers
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
