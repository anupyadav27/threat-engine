# Discovery YAML — load_balancer (IBM Cloud)
# Generated: 2026-02-21T04:45:39Z
version: '1.0'
provider: ibm
service: load_balancer
services:
  client: load_balancer
  module: ibm_platform_services.load_balancer
discovery:
  # ── get_load_balancer ──
  - discovery_id: ibm.load_balancer.get-load-balancer
    calls:
      - action: get-load-balancer
        save_as: response
        on_error: continue
    emit:
      as: item
  # ── list_load_balancers ──
  - discovery_id: ibm.load_balancer.list-load-balancers
    calls:
      - action: list-load-balancers
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
