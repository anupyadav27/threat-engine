version: '1.0'
provider: ibm
service: load_balancer
services:
  client: load_balancer
  module: ibm_platform_services.load_balancer
discovery:
- discovery_id: ibm.load_balancer.get-load-balancer
  calls:
  - action: get-load-balancer
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      crn: '{{ response.crn }}'
      guid: '{{ response.guid }}'
      type: '{{ response.type }}'
      status: '{{ response.status }}'
      state: '{{ response.state }}'
      created_at: '{{ response.created_at }}'
      updated_at: '{{ response.updated_at }}'
      resource_group_id: '{{ response.resource_group_id }}'
      resource_group: '{{ response.resource_group }}'
      region: '{{ response.region }}'
      location: '{{ response.location }}'
      tags: '{{ response.tags }}'
      href: '{{ response.href }}'
      operating_status: '{{ response.operating_status }}'
      provisioning_status: '{{ response.provisioning_status }}'
      is_public: '{{ response.is_public }}'
      listeners: '{{ response.listeners }}'
      pools: '{{ response.pools }}'
      subnets: '{{ response.subnets }}'
      security_groups: '{{ response.security_groups }}'
      hostname: '{{ response.hostname }}'
- discovery_id: ibm.load_balancer.list-load-balancers
  calls:
  - action: list-load-balancers
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      guid: '{{ item.guid }}'
      type: '{{ item.type }}'
      status: '{{ item.status }}'
      state: '{{ item.state }}'
      created_at: '{{ item.created_at }}'
      updated_at: '{{ item.updated_at }}'
      resource_group_id: '{{ item.resource_group_id }}'
      resource_group: '{{ item.resource_group }}'
      region: '{{ item.region }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      href: '{{ item.href }}'
      operating_status: '{{ item.operating_status }}'
      provisioning_status: '{{ item.provisioning_status }}'
      is_public: '{{ item.is_public }}'
      listeners: '{{ item.listeners }}'
      pools: '{{ item.pools }}'
      subnets: '{{ item.subnets }}'
      security_groups: '{{ item.security_groups }}'
      hostname: '{{ item.hostname }}'
