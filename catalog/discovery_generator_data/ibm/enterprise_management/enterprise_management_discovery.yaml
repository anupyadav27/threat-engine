version: '1.0'
provider: ibm
service: enterprise_management
services:
  client: enterprise_management
  module: boto3.client
discovery:
- discovery_id: ibm.enterprise_management.listAccountGroups
  calls:
  - action: listAccountGroups
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      status: '{{ item.status }}'
      created_at: '{{ item.created_at }}'
      tags: '{{ item.tags }}'
