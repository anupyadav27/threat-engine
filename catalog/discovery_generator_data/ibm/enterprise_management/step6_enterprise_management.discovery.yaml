# Discovery YAML — enterprise_management (IBM Cloud)
# Generated: 2026-02-21T04:45:38Z
version: '1.0'
provider: ibm
service: enterprise_management
services:
  client: enterprise_management
  module: ibm_platform_services.enterprise_management
discovery:
  # ── list_account_groups ──
  - discovery_id: ibm.enterprise_management.list-account-groups
    calls:
      - action: list-account-groups
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        created_at: '{{ item.created_at }}'
        crn: '{{ item.crn }}'
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        tags: '{{ item.tags }}'
