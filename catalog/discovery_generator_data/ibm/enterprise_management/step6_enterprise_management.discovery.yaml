version: '1.0'
provider: ibm
service: enterprise_management
services:
  client: enterprise_management
  module: ibm_platform_services.enterprise_management
discovery:
- discovery_id: ibm.enterprise_management.list-account-groups
  calls:
  - action: list-account-groups
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      created_at: '{{ item.created_at }}'
      crn: '{{ item.crn }}'
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.crn}'
- discovery_id: ibm.enterprise_management.list-accounts
