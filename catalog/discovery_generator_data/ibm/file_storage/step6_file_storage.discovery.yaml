version: '1.0'
provider: ibm
service: file_storage
services:
  client: file_storage
  module: ibm_platform_services.file_storage
discovery:
- discovery_id: ibm.file_storage.get-share
  calls:
  - action: get-share
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      crn: '{{ response.crn }}'
      guid: '{{ response.guid }}'
      type: '{{ response.type }}'
      status: '{{ response.status }}'
      state: '{{ response.state }}'
      created_at: '{{ response.created_at }}'
      updated_at: '{{ response.updated_at }}'
      resource_group_id: '{{ response.resource_group_id }}'
      resource_group: '{{ response.resource_group }}'
      region: '{{ response.region }}'
      location: '{{ response.location }}'
      tags: '{{ response.tags }}'
      href: '{{ response.href }}'
      capacity: '{{ response.capacity }}'
      encryption: '{{ response.encryption }}'
      encryption_key: '{{ response.encryption_key }}'
      mount_target: '{{ response.mount_target }}'
      lifecycle_state: '{{ response.lifecycle_state }}'
  uid_template: '{item.crn}'
- discovery_id: ibm.file_storage.list-shares
  calls:
  - action: list-shares
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      guid: '{{ item.guid }}'
      type: '{{ item.type }}'
      status: '{{ item.status }}'
      state: '{{ item.state }}'
      created_at: '{{ item.created_at }}'
      updated_at: '{{ item.updated_at }}'
      resource_group_id: '{{ item.resource_group_id }}'
      resource_group: '{{ item.resource_group }}'
      region: '{{ item.region }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      href: '{{ item.href }}'
      capacity: '{{ item.capacity }}'
      encryption: '{{ item.encryption }}'
      encryption_key: '{{ item.encryption_key }}'
      mount_target: '{{ item.mount_target }}'
      lifecycle_state: '{{ item.lifecycle_state }}'
  uid_template: '{item.crn}'
