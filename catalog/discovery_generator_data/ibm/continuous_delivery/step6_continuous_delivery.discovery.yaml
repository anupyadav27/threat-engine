version: '1.0'
provider: ibm
service: continuous_delivery
services:
  client: continuous_delivery
  module: ibm_platform_services.continuous_delivery
discovery:
- discovery_id: ibm.continuous_delivery.get-pipeline
  calls:
  - action: get-pipeline
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      crn: '{{ response.crn }}'
      guid: '{{ response.guid }}'
      type: '{{ response.type }}'
      status: '{{ response.status }}'
      state: '{{ response.state }}'
      created_at: '{{ response.created_at }}'
      updated_at: '{{ response.updated_at }}'
      resource_group_id: '{{ response.resource_group_id }}'
      resource_group: '{{ response.resource_group }}'
      region: '{{ response.region }}'
      location: '{{ response.location }}'
      tags: '{{ response.tags }}'
      href: '{{ response.href }}'
      pipeline_id: '{{ response.pipeline_id }}'
      toolchain_id: '{{ response.toolchain_id }}'
- discovery_id: ibm.continuous_delivery.list-pipelines
  calls:
  - action: list-pipelines
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      guid: '{{ item.guid }}'
      type: '{{ item.type }}'
      status: '{{ item.status }}'
      state: '{{ item.state }}'
      created_at: '{{ item.created_at }}'
      updated_at: '{{ item.updated_at }}'
      resource_group_id: '{{ item.resource_group_id }}'
      resource_group: '{{ item.resource_group }}'
      region: '{{ item.region }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      href: '{{ item.href }}'
      pipeline_id: '{{ item.pipeline_id }}'
      toolchain_id: '{{ item.toolchain_id }}'
