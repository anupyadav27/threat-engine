version: '1.0'
provider: ibm
service: secrets_manager
services:
  client: secrets_manager
  module: ibm_platform_services.secrets_manager
discovery:
- discovery_id: ibm.secrets_manager.get-secret
  calls:
  - action: get-secret
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      crn: '{{ response.crn }}'
      guid: '{{ response.guid }}'
      type: '{{ response.type }}'
      status: '{{ response.status }}'
      state: '{{ response.state }}'
      created_at: '{{ response.created_at }}'
      updated_at: '{{ response.updated_at }}'
      resource_group_id: '{{ response.resource_group_id }}'
      resource_group: '{{ response.resource_group }}'
      region: '{{ response.region }}'
      location: '{{ response.location }}'
      tags: '{{ response.tags }}'
      href: '{{ response.href }}'
      secret_id: '{{ response.secret_id }}'
      secret_type: '{{ response.secret_type }}'
      secret_group_id: '{{ response.secret_group_id }}'
      rotation: '{{ response.rotation }}'
      expiration_date: '{{ response.expiration_date }}'
      ttl: '{{ response.ttl }}'
- discovery_id: ibm.secrets_manager.list-secrets
  calls:
  - action: list-secrets
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      guid: '{{ item.guid }}'
      type: '{{ item.type }}'
      status: '{{ item.status }}'
      state: '{{ item.state }}'
      created_at: '{{ item.created_at }}'
      updated_at: '{{ item.updated_at }}'
      resource_group_id: '{{ item.resource_group_id }}'
      resource_group: '{{ item.resource_group }}'
      region: '{{ item.region }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      href: '{{ item.href }}'
      secret_id: '{{ item.secret_id }}'
      secret_type: '{{ item.secret_type }}'
      secret_group_id: '{{ item.secret_group_id }}'
      rotation: '{{ item.rotation }}'
      expiration_date: '{{ item.expiration_date }}'
      ttl: '{{ item.ttl }}'
