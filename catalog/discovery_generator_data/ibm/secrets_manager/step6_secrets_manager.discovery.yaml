# Discovery YAML — secrets_manager (IBM Cloud)
# Generated: 2026-02-21T04:45:39Z
version: '1.0'
provider: ibm
service: secrets_manager
services:
  client: secrets_manager
  module: ibm_platform_services.secrets_manager
discovery:
  # ── get_secret ──
  - discovery_id: ibm.secrets_manager.get-secret
    calls:
      - action: get-secret
        save_as: response
        on_error: continue
    emit:
      as: item
  # ── list_secrets ──
  - discovery_id: ibm.secrets_manager.list-secrets
    calls:
      - action: list-secrets
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
