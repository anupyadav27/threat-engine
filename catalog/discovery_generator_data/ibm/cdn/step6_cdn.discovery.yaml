version: '1.0'
provider: ibm
service: cdn
services:
  client: cdn
  module: ibm_platform_services.cdn
discovery:
- discovery_id: ibm.cdn.get-distribution
  calls:
  - action: get-distribution
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      crn: '{{ response.crn }}'
      guid: '{{ response.guid }}'
      type: '{{ response.type }}'
      status: '{{ response.status }}'
      state: '{{ response.state }}'
      created_at: '{{ response.created_at }}'
      updated_at: '{{ response.updated_at }}'
      resource_group_id: '{{ response.resource_group_id }}'
      resource_group: '{{ response.resource_group }}'
      region: '{{ response.region }}'
      location: '{{ response.location }}'
      tags: '{{ response.tags }}'
      href: '{{ response.href }}'
      distribution_id: '{{ response.distribution_id }}'
      domain: '{{ response.domain }}'
      origin: '{{ response.origin }}'
      cname: '{{ response.cname }}'
      https_options: '{{ response.https_options }}'
      tls_version: '{{ response.tls_version }}'
  uid_template: '{item.crn}'
- discovery_id: ibm.cdn.list-distributions
  calls:
  - action: list-distributions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      guid: '{{ item.guid }}'
      type: '{{ item.type }}'
      status: '{{ item.status }}'
      state: '{{ item.state }}'
      created_at: '{{ item.created_at }}'
      updated_at: '{{ item.updated_at }}'
      resource_group_id: '{{ item.resource_group_id }}'
      resource_group: '{{ item.resource_group }}'
      region: '{{ item.region }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      href: '{{ item.href }}'
      distribution_id: '{{ item.distribution_id }}'
      domain: '{{ item.domain }}'
      origin: '{{ item.origin }}'
      cname: '{{ item.cname }}'
      https_options: '{{ item.https_options }}'
      tls_version: '{{ item.tls_version }}'
  uid_template: '{item.crn}'
