version: '1.0'
provider: ibm
service: cdn
services:
  client: cdn
  module: ibm_cloud_sdk.cdn
discovery:
- discovery_id: ibm.cdn.get-distribution
  calls:
  - action: get-distribution
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.cdn.list-distributions
  calls:
  - action: list-distributions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
