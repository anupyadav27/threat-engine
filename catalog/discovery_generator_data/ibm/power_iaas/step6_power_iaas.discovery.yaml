version: '1.0'
provider: ibm
service: power_iaas
services:
  client: power_iaas
  module: boto3.client
discovery:
- discovery_id: ibm.power_iaas.pcloud-pvminstances-getall
  calls:
  - action: pcloud-pvminstances-getall
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.pvmInstances }}'
    item:
      pvmInstanceID: '{{ item.pvmInstanceID }}'
      serverName: '{{ item.serverName }}'
      imageID: '{{ item.imageID }}'
      status: '{{ item.status }}'
      networks: '{{ item.networks }}'
      storageType: '{{ item.storageType }}'
