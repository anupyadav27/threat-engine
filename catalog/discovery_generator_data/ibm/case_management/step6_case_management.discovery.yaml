# Discovery YAML — case_management (IBM Cloud)
# Generated: 2026-02-21T04:45:38Z
version: '1.0'
provider: ibm
service: case_management
services:
  client: case_management
  module: ibm_platform_services.case_management
discovery:
  # ── get_cases ──
  - discovery_id: ibm.case_management.get-cases
    calls:
      - action: get-cases
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        created_at: '{{ response.created_at }}'
        crn: '{{ response.crn }}'
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        status: '{{ response.status }}'
        tags: '{{ response.tags }}'
  # ── Dependent ops ──
  # ── get_case [dependent] ──
  - discovery_id: ibm.case_management.get-case
    calls:
      - action: get-case
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        created_at: '{{ response.created_at }}'
        crn: '{{ response.crn }}'
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        status: '{{ response.status }}'
        tags: '{{ response.tags }}'
