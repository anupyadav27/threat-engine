version: '1.0'
provider: ibm
service: global_search
services:
  client: global_search
  module: boto3.client
discovery:
- discovery_id: ibm.global_search.getAuthenticator
  calls:
  - action: getAuthenticator
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      status: '{{ item.status }}'
      created_at: '{{ item.created_at }}'
      tags: '{{ item.tags }}'
- discovery_id: ibm.global_search.getEnableGzipCompression
  calls:
  - action: getEnableGzipCompression
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      status: '{{ item.status }}'
      created_at: '{{ item.created_at }}'
      tags: '{{ item.tags }}'
- discovery_id: ibm.global_search.getHttpClient
  calls:
  - action: getHttpClient
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      status: '{{ item.status }}'
      created_at: '{{ item.created_at }}'
      tags: '{{ item.tags }}'
- discovery_id: ibm.global_search.search
  calls:
  - action: search
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
