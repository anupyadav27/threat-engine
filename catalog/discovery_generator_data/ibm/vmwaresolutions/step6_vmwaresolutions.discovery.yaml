version: '1.0'
provider: ibm
service: vmwaresolutions
services:
  client: vmwaresolutions
  module: boto3.client
discovery:
- discovery_id: ibm.vmwaresolutions.list-instances
  calls:
  - action: list-instances
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.resources }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      instance_type: '{{ item.instance_type }}'
      status: '{{ item.status }}'
      location: '{{ item.location }}'
      created_at: '{{ item.created_at }}'
  uid_template: '{item.id}'
