version: '1.0'
provider: ibm
service: iks
discovery:
- _stub: true
  discovery_id: ibm.iks.list_ikss
  _note: STUB — generated by step2, needs real SDK review for ibm.iks
  _rules:
  - ibm.iks.cluster.worker_pool_configured
  _client: ibm_container_registry.ContainerRegistryV1
  calls:
  - action: ListResources
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      id: '{{ item.Id }}'
      name: '{{ item.Name }}'
      resource_type: '''{{ resource_type }}'''
      region: '{{ region }}'
      encrypted: '{{ item.Encrypted }}'
      kms_key_id: '{{ item.KMSKeyId }}'
      status: '{{ item.Status }}'
      enabled: '{{ item.Enabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      internet_facing: '{{ item.InternetFacing }}'
      public_ip_address: '{{ item.PublicIpAddress }}'
      tags: '{{ item.Tags }}'
      permissions: '{{ item.Permissions }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      retention_days: '{{ item.RetentionDays }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
- discovery_id: ibm.iks.list-clusters
  calls:
  - action: list-clusters
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      state: '{{ item.state }}'
      status: '{{ item.masterStatus }}'
      kube_version: '{{ item.masterKubeVersion }}'
      region: '{{ item.region }}'
      resource_group_id: '{{ item.resourceGroup }}'
      type: '{{ item.type }}'
      provider: '{{ item.provider }}'
      worker_count: '{{ item.workerCount }}'
      crn: '{{ item.crn }}'
      tags: '{{ item.tags }}'
  _used_by_rules:
  - ibm.iks.cluster.worker_pool_configured
  uid_template: '{item.crn}'
- discovery_id: ibm.iks.list-workerpools
  calls:
  - action: list-workerpools
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.poolName }}'
      cluster_id: '{{ item.clusterID }}'
      state: '{{ item.state }}'
      flavor: '{{ item.flavor }}'
      os: '{{ item.operatingSystem }}'
      worker_count: '{{ item.workerCount }}'
      zones: '{{ item.zones }}'
      isolation: '{{ item.isolation }}'
      labels: '{{ item.labels }}'
      taints: '{{ item.taints }}'
      runtime: '{{ item.runtime }}'
      autoscale_enabled: '{{ item.autoscaleEnabled }}'
  _used_by_rules:
  - ibm.iks.cluster.worker_pool_configured
  uid_template: '{item.id}'
