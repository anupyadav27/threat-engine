version: '1.0'
provider: ibm
service: context_based_restrictions
services:
  client: context_based_restrictions
  module: ibm_platform_services.context_based_restrictions
discovery:
- discovery_id: ibm.context_based_restrictions.list-available-service-operations
  calls:
  - action: list-available-service-operations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      created_at: '{{ item.created_at }}'
      crn: '{{ item.crn }}'
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.crn}'
