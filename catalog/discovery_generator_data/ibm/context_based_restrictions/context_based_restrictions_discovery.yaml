version: '1.0'
provider: ibm
service: context_based_restrictions
services:
  client: context_based_restrictions
  module: boto3.client
discovery:
- discovery_id: ibm.context_based_restrictions.listAvailableServiceOperations
  calls:
  - action: listAvailableServiceOperations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      status: '{{ item.status }}'
      created_at: '{{ item.created_at }}'
      tags: '{{ item.tags }}'
