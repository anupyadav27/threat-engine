version: '1.0'
provider: ibm
service: activity_tracker
services:
  client: activity_tracker
  module: ibm_cloud_sdk.activity_tracker
discovery:
- discovery_id: ibm.activity_tracker.get-event
  calls:
  - action: get-event
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.activity_tracker.list-events
  calls:
  - action: list-events
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.activity_tracker.query-logs
  calls:
  - action: query-logs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
