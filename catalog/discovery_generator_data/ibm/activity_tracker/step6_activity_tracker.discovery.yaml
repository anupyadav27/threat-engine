# Discovery YAML — activity_tracker (IBM Cloud)
# Generated: 2026-02-21T04:45:38Z
version: '1.0'
provider: ibm
service: activity_tracker
services:
  client: activity_tracker
  module: ibm_platform_services.activity_tracker
discovery:
  # ── get_event ──
  - discovery_id: ibm.activity_tracker.get-event
    calls:
      - action: get-event
        save_as: response
        on_error: continue
    emit:
      as: item
  # ── list_events ──
  - discovery_id: ibm.activity_tracker.list-events
    calls:
      - action: list-events
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
  # ── query_logs ──
  - discovery_id: ibm.activity_tracker.query-logs
    calls:
      - action: query-logs
        save_as: response
        on_error: continue
    emit:
      as: item
