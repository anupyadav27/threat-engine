version: '1.0'
provider: ibm
service: activity_tracker
services:
  client: activity_tracker
  module: ibm_platform_services.activity_tracker
discovery:
- discovery_id: ibm.activity_tracker.get-event
  calls:
  - action: get-event
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      crn: '{{ response.crn }}'
      guid: '{{ response.guid }}'
      type: '{{ response.type }}'
      status: '{{ response.status }}'
      state: '{{ response.state }}'
      created_at: '{{ response.created_at }}'
      updated_at: '{{ response.updated_at }}'
      resource_group_id: '{{ response.resource_group_id }}'
      resource_group: '{{ response.resource_group }}'
      region: '{{ response.region }}'
      location: '{{ response.location }}'
      tags: '{{ response.tags }}'
      href: '{{ response.href }}'
      event_id: '{{ response.event_id }}'
      action: '{{ response.action }}'
      outcome: '{{ response.outcome }}'
      severity: '{{ response.severity }}'
      initiator: '{{ response.initiator }}'
      target: '{{ response.target }}'
      event_time: '{{ response.event_time }}'
  uid_template: '{item.crn}'
- discovery_id: ibm.activity_tracker.list-events
  calls:
  - action: list-events
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      guid: '{{ item.guid }}'
      type: '{{ item.type }}'
      status: '{{ item.status }}'
      state: '{{ item.state }}'
      created_at: '{{ item.created_at }}'
      updated_at: '{{ item.updated_at }}'
      resource_group_id: '{{ item.resource_group_id }}'
      resource_group: '{{ item.resource_group }}'
      region: '{{ item.region }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      href: '{{ item.href }}'
      event_id: '{{ item.event_id }}'
      action: '{{ item.action }}'
      outcome: '{{ item.outcome }}'
      severity: '{{ item.severity }}'
      initiator: '{{ item.initiator }}'
      target: '{{ item.target }}'
      event_time: '{{ item.event_time }}'
  uid_template: '{item.crn}'
- discovery_id: ibm.activity_tracker.query-logs
  calls:
  - action: query-logs
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      crn: '{{ response.crn }}'
      guid: '{{ response.guid }}'
      type: '{{ response.type }}'
      status: '{{ response.status }}'
      state: '{{ response.state }}'
      created_at: '{{ response.created_at }}'
      updated_at: '{{ response.updated_at }}'
      resource_group_id: '{{ response.resource_group_id }}'
      resource_group: '{{ response.resource_group }}'
      region: '{{ response.region }}'
      location: '{{ response.location }}'
      tags: '{{ response.tags }}'
      href: '{{ response.href }}'
      event_id: '{{ response.event_id }}'
      action: '{{ response.action }}'
      outcome: '{{ response.outcome }}'
      severity: '{{ response.severity }}'
      initiator: '{{ response.initiator }}'
      target: '{{ response.target }}'
      event_time: '{{ response.event_time }}'
  uid_template: '{item.crn}'
