version: '1.0'
provider: ibm
service: container_registry
services:
  client: container_registry
  module: ibm_platform_services.container_registry
discovery:
- discovery_id: ibm.container_registry.get-image
  calls:
  - action: get-image
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      crn: '{{ response.crn }}'
      guid: '{{ response.guid }}'
      type: '{{ response.type }}'
      status: '{{ response.status }}'
      state: '{{ response.state }}'
      created_at: '{{ response.created_at }}'
      updated_at: '{{ response.updated_at }}'
      resource_group_id: '{{ response.resource_group_id }}'
      resource_group: '{{ response.resource_group }}'
      region: '{{ response.region }}'
      location: '{{ response.location }}'
      tags: '{{ response.tags }}'
      href: '{{ response.href }}'
      namespace: '{{ response.namespace }}'
      repository: '{{ response.repository }}'
      image: '{{ response.image }}'
      digest: '{{ response.digest }}'
      vulnerabilities: '{{ response.vulnerabilities }}'
      size: '{{ response.size }}'
- discovery_id: ibm.container_registry.get-namespace
  calls:
  - action: get-namespace
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      crn: '{{ response.crn }}'
      guid: '{{ response.guid }}'
      type: '{{ response.type }}'
      status: '{{ response.status }}'
      state: '{{ response.state }}'
      created_at: '{{ response.created_at }}'
      updated_at: '{{ response.updated_at }}'
      resource_group_id: '{{ response.resource_group_id }}'
      resource_group: '{{ response.resource_group }}'
      region: '{{ response.region }}'
      location: '{{ response.location }}'
      tags: '{{ response.tags }}'
      href: '{{ response.href }}'
      namespace: '{{ response.namespace }}'
      repository: '{{ response.repository }}'
      image: '{{ response.image }}'
      digest: '{{ response.digest }}'
      vulnerabilities: '{{ response.vulnerabilities }}'
      size: '{{ response.size }}'
- discovery_id: ibm.container_registry.list-images
  calls:
  - action: list-images
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      guid: '{{ item.guid }}'
      type: '{{ item.type }}'
      status: '{{ item.status }}'
      state: '{{ item.state }}'
      created_at: '{{ item.created_at }}'
      updated_at: '{{ item.updated_at }}'
      resource_group_id: '{{ item.resource_group_id }}'
      resource_group: '{{ item.resource_group }}'
      region: '{{ item.region }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      href: '{{ item.href }}'
      namespace: '{{ item.namespace }}'
      repository: '{{ item.repository }}'
      image: '{{ item.image }}'
      digest: '{{ item.digest }}'
      vulnerabilities: '{{ item.vulnerabilities }}'
      size: '{{ item.size }}'
- discovery_id: ibm.container_registry.list-namespaces
  calls:
  - action: list-namespaces
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      guid: '{{ item.guid }}'
      type: '{{ item.type }}'
      status: '{{ item.status }}'
      state: '{{ item.state }}'
      created_at: '{{ item.created_at }}'
      updated_at: '{{ item.updated_at }}'
      resource_group_id: '{{ item.resource_group_id }}'
      resource_group: '{{ item.resource_group }}'
      region: '{{ item.region }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      href: '{{ item.href }}'
      namespace: '{{ item.namespace }}'
      repository: '{{ item.repository }}'
      image: '{{ item.image }}'
      digest: '{{ item.digest }}'
      vulnerabilities: '{{ item.vulnerabilities }}'
      size: '{{ item.size }}'
