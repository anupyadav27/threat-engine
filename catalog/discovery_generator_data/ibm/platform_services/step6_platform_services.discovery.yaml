version: '1.0'
provider: ibm
service: platform_services
services:
  client: platform_services
  module: ibm_platform_services.platform_services
discovery:
- discovery_id: ibm.platform_services.get-cases
  calls:
  - action: get-cases
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      created_at: '{{ response.created_at }}'
      crn: '{{ response.crn }}'
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      status: '{{ response.status }}'
      tags: '{{ response.tags }}'
  uid_template: '{item.crn}'
- discovery_id: ibm.platform_services.get-case
  calls:
  - action: get-case
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      created_at: '{{ response.created_at }}'
      crn: '{{ response.crn }}'
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      status: '{{ response.status }}'
      tags: '{{ response.tags }}'
  uid_template: '{item.crn}'
