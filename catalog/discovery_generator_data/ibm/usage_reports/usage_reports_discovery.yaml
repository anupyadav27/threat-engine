version: '1.0'
provider: ibm
service: usage_reports
services:
  client: usage_reports
  module: boto3.client
discovery:
- discovery_id: ibm.usage_reports.getAccountSummary
  calls:
  - action: getAccountSummary
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      status: '{{ item.status }}'
      created_at: '{{ item.created_at }}'
      tags: '{{ item.tags }}'
