version: '1.0'
provider: ibm
service: internet_services
services:
  client: internet_services
  module: ibm_platform_services.internet_services
discovery:
- discovery_id: ibm.internet_services.get-service
  calls:
  - action: get-service
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      crn: '{{ response.crn }}'
      guid: '{{ response.guid }}'
      type: '{{ response.type }}'
      status: '{{ response.status }}'
      state: '{{ response.state }}'
      created_at: '{{ response.created_at }}'
      updated_at: '{{ response.updated_at }}'
      resource_group_id: '{{ response.resource_group_id }}'
      resource_group: '{{ response.resource_group }}'
      region: '{{ response.region }}'
      location: '{{ response.location }}'
      tags: '{{ response.tags }}'
      href: '{{ response.href }}'
      domain: '{{ response.domain }}'
      ssl: '{{ response.ssl }}'
      waf: '{{ response.waf }}'
      tls_version: '{{ response.tls_version }}'
      min_tls_version: '{{ response.min_tls_version }}'
- discovery_id: ibm.internet_services.list-services
  calls:
  - action: list-services
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      guid: '{{ item.guid }}'
      type: '{{ item.type }}'
      status: '{{ item.status }}'
      state: '{{ item.state }}'
      created_at: '{{ item.created_at }}'
      updated_at: '{{ item.updated_at }}'
      resource_group_id: '{{ item.resource_group_id }}'
      resource_group: '{{ item.resource_group }}'
      region: '{{ item.region }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      href: '{{ item.href }}'
      domain: '{{ item.domain }}'
      ssl: '{{ item.ssl }}'
      waf: '{{ item.waf }}'
      tls_version: '{{ item.tls_version }}'
      min_tls_version: '{{ item.min_tls_version }}'
