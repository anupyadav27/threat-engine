version: '1.0'
provider: ibm
service: direct_link
services:
  client: direct_link
  module: ibm_platform_services.direct_link
discovery:
  # ── get_connection ──
  - discovery_id: ibm.direct_link.get-connection
    calls:
      - action: get-connection
        save_as: response
        on_error: continue
    emit:
      as: item
  # ── list_connections ──
  - discovery_id: ibm.direct_link.list-connections
    calls:
      - action: list-connections
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
