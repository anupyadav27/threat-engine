version: '1.0'
provider: ibm
service: direct_link
services:
  client: direct_link
  module: ibm_platform_services.direct_link
discovery:
- discovery_id: ibm.direct_link.get-connection
  calls:
  - action: get-connection
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      crn: '{{ response.crn }}'
      guid: '{{ response.guid }}'
      type: '{{ response.type }}'
      status: '{{ response.status }}'
      state: '{{ response.state }}'
      created_at: '{{ response.created_at }}'
      updated_at: '{{ response.updated_at }}'
      resource_group_id: '{{ response.resource_group_id }}'
      resource_group: '{{ response.resource_group }}'
      region: '{{ response.region }}'
      location: '{{ response.location }}'
      tags: '{{ response.tags }}'
      href: '{{ response.href }}'
      connection_id: '{{ response.connection_id }}'
      bgp_asn: '{{ response.bgp_asn }}'
      speed_mbps: '{{ response.speed_mbps }}'
      operational_status: '{{ response.operational_status }}'
      macsec_config: '{{ response.macsec_config }}'
  uid_template: '{item.crn}'
- discovery_id: ibm.direct_link.list-connections
  calls:
  - action: list-connections
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      guid: '{{ item.guid }}'
      type: '{{ item.type }}'
      status: '{{ item.status }}'
      state: '{{ item.state }}'
      created_at: '{{ item.created_at }}'
      updated_at: '{{ item.updated_at }}'
      resource_group_id: '{{ item.resource_group_id }}'
      resource_group: '{{ item.resource_group }}'
      region: '{{ item.region }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      href: '{{ item.href }}'
      connection_id: '{{ item.connection_id }}'
      bgp_asn: '{{ item.bgp_asn }}'
      speed_mbps: '{{ item.speed_mbps }}'
      operational_status: '{{ item.operational_status }}'
      macsec_config: '{{ item.macsec_config }}'
  uid_template: '{item.crn}'
