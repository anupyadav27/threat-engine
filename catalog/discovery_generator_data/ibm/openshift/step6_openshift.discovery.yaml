version: '1.0'
provider: ibm
service: openshift
discovery:
- _stub: true
  discovery_id: ibm.openshift.list_openshifts
  _note: "STUB \u2014 generated by step2, needs real SDK review for ibm.openshift"
  _rules:
  - ibm.openshift.admission.securitycontextconstraint_check
  - ibm.openshift.cdi.access_check
  - ibm.openshift.hyperconverged.ksm_configuration_check
  - ibm.openshift.image.provenance_registry_sources_configured
  - ibm.openshift.networkpolicy.check
  - ibm.openshift.vlan.configuration_check
  - ibm.openshift.vm.feature_gate_non_root_enabled
  - ibm.openshift.vm.mac_spoof_filtering_enabled
  - ibm.openshift.vnc.access_restriction_check
  _client: ibm_container_registry.ContainerRegistryV1
  calls:
  - action: ListResources
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      id: '{{ item.Id }}'
      name: '{{ item.Name }}'
      resource_type: '''{{ resource_type }}'''
      region: '{{ region }}'
      encrypted: '{{ item.Encrypted }}'
      kms_key_id: '{{ item.KMSKeyId }}'
      status: '{{ item.Status }}'
      enabled: '{{ item.Enabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      internet_facing: '{{ item.InternetFacing }}'
      public_ip_address: '{{ item.PublicIpAddress }}'
      tags: '{{ item.Tags }}'
      permissions: '{{ item.Permissions }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      retention_days: '{{ item.RetentionDays }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
- discovery_id: ibm.openshift.list-securitycontextconstraints
  calls:
  - action: list_cluster_custom_object
    params:
      group: security.openshift.io
      version: v1
      plural: securitycontextconstraints
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      name: '{{ item.metadata.name }}'
      uid: '{{ item.metadata.uid }}'
      labels: '{{ item.metadata.labels }}'
      allowPrivilegedContainer: '{{ item.allowPrivilegedContainer }}'
      allowPrivilegeEscalation: '{{ item.allowPrivilegeEscalation }}'
      allowedCapabilities: '{{ item.allowedCapabilities }}'
      defaultAddCapabilities: '{{ item.defaultAddCapabilities }}'
      requiredDropCapabilities: '{{ item.requiredDropCapabilities }}'
      volumes: '{{ item.volumes }}'
      users: '{{ item.users }}'
      groups: '{{ item.groups }}'
      runAsUser: '{{ item.runAsUser }}'
      seLinuxContext: '{{ item.seLinuxContext }}'
      fsGroup: '{{ item.fsGroup }}'
  _used_by_rules:
  - ibm.openshift.admission.securitycontextconstraint_check
- discovery_id: ibm.openshift.list-cdis
  calls:
  - action: list_cluster_custom_object
    params:
      group: cdi.kubevirt.io
      version: v1beta1
      plural: cdis
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      name: '{{ item.metadata.name }}'
      uid: '{{ item.metadata.uid }}'
      labels: '{{ item.metadata.labels }}'
      status: '{{ item.status.phase }}'
      config: '{{ item.spec.config }}'
      conditions: '{{ item.status.conditions }}'
  _used_by_rules:
  - ibm.openshift.cdi.access_check
- discovery_id: ibm.openshift.list-hyperconvergeds
  calls:
  - action: list_cluster_custom_object
    params:
      group: hco.kubevirt.io
      version: v1beta1
      plural: hyperconvergeds
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      name: '{{ item.metadata.name }}'
      uid: '{{ item.metadata.uid }}'
      labels: '{{ item.metadata.labels }}'
      status: '{{ item.status.conditions }}'
      feature_gates: '{{ item.spec.featureGates }}'
      ksm_configuration: '{{ item.spec.ksmConfiguration }}'
  _used_by_rules:
  - ibm.openshift.hyperconverged.ksm_configuration_check
- discovery_id: ibm.openshift.list-images
  calls:
  - action: list_cluster_custom_object
    params:
      group: config.openshift.io
      version: v1
      plural: images
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      name: '{{ item.metadata.name }}'
      uid: '{{ item.metadata.uid }}'
      labels: '{{ item.metadata.labels }}'
      registry_sources: '{{ item.spec.registrySources }}'
      allowed_registries_for_import: '{{ item.spec.allowedRegistriesForImport }}'
      external_registry_hostnames: '{{ item.spec.externalRegistryHostnames }}'
      additional_trusted_ca: '{{ item.spec.additionalTrustedCA }}'
  _used_by_rules:
  - ibm.openshift.image.provenance_registry_sources_configured
- discovery_id: ibm.openshift.list-networkpolicies
  calls:
  - action: list_cluster_custom_object
    params:
      group: networking.k8s.io
      version: v1
      plural: networkpolicies
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      name: '{{ item.metadata.name }}'
      namespace: '{{ item.metadata.namespace }}'
      uid: '{{ item.metadata.uid }}'
      labels: '{{ item.metadata.labels }}'
      pod_selector: '{{ item.spec.podSelector }}'
      ingress: '{{ item.spec.ingress }}'
      egress: '{{ item.spec.egress }}'
      policy_types: '{{ item.spec.policyTypes }}'
  _used_by_rules:
  - ibm.openshift.networkpolicy.check
- discovery_id: ibm.openshift.list-featuregates
  calls:
  - action: list_cluster_custom_object
    params:
      group: config.openshift.io
      version: v1
      plural: featuregates
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      name: '{{ item.metadata.name }}'
      uid: '{{ item.metadata.uid }}'
      labels: '{{ item.metadata.labels }}'
      feature_set: '{{ item.spec.featureSet }}'
      custom_no_upgrade: '{{ item.spec.customNoUpgrade }}'
  _used_by_rules:
  - ibm.openshift.vm.feature_gate_non_root_enabled
- discovery_id: ibm.openshift.list-virtual-machines
  calls:
  - action: list_cluster_custom_object
    params:
      group: kubevirt.io
      version: v1
      plural: virtualmachines
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      name: '{{ item.metadata.name }}'
      namespace: '{{ item.metadata.namespace }}'
      uid: '{{ item.metadata.uid }}'
      labels: '{{ item.metadata.labels }}'
      status: '{{ item.status.printableStatus }}'
      interfaces: '{{ item.spec.template.spec.domain.devices.interfaces }}'
      networks: '{{ item.spec.template.spec.networks }}'
      running: '{{ item.spec.running }}'
  _used_by_rules:
  - ibm.openshift.vm.mac_spoof_filtering_enabled
  - ibm.openshift.vnc.access_restriction_check
- discovery_id: ibm.openshift.list-machineconfigs
  calls:
  - action: list_cluster_custom_object
    params:
      group: machineconfiguration.openshift.io
      version: v1
      plural: machineconfigs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      name: '{{ item.metadata.name }}'
      uid: '{{ item.metadata.uid }}'
      labels: '{{ item.metadata.labels }}'
      generation: '{{ item.metadata.generation }}'
      os_image_url: '{{ item.spec.osImageURL }}'
      kernel_arguments: '{{ item.spec.kernelArguments }}'
      config: '{{ item.spec.config }}'
      network_units: '{{ item.spec.config.systemd.units }}'
  _used_by_rules:
  - ibm.openshift.vlan.configuration_check
