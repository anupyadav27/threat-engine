version: '1.0'
provider: ibm
service: dns
services:
  client: dns
  module: ibm_platform_services.dns
discovery:
- discovery_id: ibm.dns.get-zone
  calls:
  - action: get-zone
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      crn: '{{ response.crn }}'
      guid: '{{ response.guid }}'
      type: '{{ response.type }}'
      status: '{{ response.status }}'
      state: '{{ response.state }}'
      created_at: '{{ response.created_at }}'
      updated_at: '{{ response.updated_at }}'
      resource_group_id: '{{ response.resource_group_id }}'
      resource_group: '{{ response.resource_group }}'
      region: '{{ response.region }}'
      location: '{{ response.location }}'
      tags: '{{ response.tags }}'
      href: '{{ response.href }}'
      zone_id: '{{ response.zone_id }}'
      record_id: '{{ response.record_id }}'
      record_type: '{{ response.record_type }}'
      ttl: '{{ response.ttl }}'
      rdata: '{{ response.rdata }}'
  uid_template: '{item.crn}'
- discovery_id: ibm.dns.list-records
  calls:
  - action: list-records
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      guid: '{{ item.guid }}'
      type: '{{ item.type }}'
      status: '{{ item.status }}'
      state: '{{ item.state }}'
      created_at: '{{ item.created_at }}'
      updated_at: '{{ item.updated_at }}'
      resource_group_id: '{{ item.resource_group_id }}'
      resource_group: '{{ item.resource_group }}'
      region: '{{ item.region }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      href: '{{ item.href }}'
      zone_id: '{{ item.zone_id }}'
      record_id: '{{ item.record_id }}'
      record_type: '{{ item.record_type }}'
      ttl: '{{ item.ttl }}'
      rdata: '{{ item.rdata }}'
  uid_template: '{item.crn}'
- discovery_id: ibm.dns.list-zones
  calls:
  - action: list-zones
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      guid: '{{ item.guid }}'
      type: '{{ item.type }}'
      status: '{{ item.status }}'
      state: '{{ item.state }}'
      created_at: '{{ item.created_at }}'
      updated_at: '{{ item.updated_at }}'
      resource_group_id: '{{ item.resource_group_id }}'
      resource_group: '{{ item.resource_group }}'
      region: '{{ item.region }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      href: '{{ item.href }}'
      zone_id: '{{ item.zone_id }}'
      record_id: '{{ item.record_id }}'
      record_type: '{{ item.record_type }}'
      ttl: '{{ item.ttl }}'
      rdata: '{{ item.rdata }}'
  uid_template: '{item.crn}'
