version: '1.0'
provider: ibm
service: global_catalog
services:
  client: global_catalog
  module: ibm_platform_services.global_catalog
discovery:
- discovery_id: ibm.global_catalog.list-catalog-entries
  calls:
  - action: list-catalog-entries
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      created_at: '{{ item.created_at }}'
      crn: '{{ item.crn }}'
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.crn}'
