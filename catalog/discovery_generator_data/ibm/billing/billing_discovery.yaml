version: '1.0'
provider: ibm
service: billing
services:
  client: billing
  module: ibm_cloud_sdk.billing
discovery:
- discovery_id: ibm.billing.get-invoice
  calls:
  - action: get-invoice
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.billing.get-usage
  calls:
  - action: get-usage
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.billing.list-invoices
  calls:
  - action: list-invoices
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
