version: '1.0'
provider: ibm
service: billing
services:
  client: billing
  module: ibm_platform_services.billing
discovery:
- discovery_id: ibm.billing.get-invoice
  calls:
  - action: get-invoice
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      crn: '{{ response.crn }}'
      guid: '{{ response.guid }}'
      type: '{{ response.type }}'
      status: '{{ response.status }}'
      state: '{{ response.state }}'
      created_at: '{{ response.created_at }}'
      updated_at: '{{ response.updated_at }}'
      resource_group_id: '{{ response.resource_group_id }}'
      resource_group: '{{ response.resource_group }}'
      region: '{{ response.region }}'
      location: '{{ response.location }}'
      tags: '{{ response.tags }}'
      href: '{{ response.href }}'
      amount: '{{ response.amount }}'
      currency_code: '{{ response.currency_code }}'
      billing_period: '{{ response.billing_period }}'
      due_date: '{{ response.due_date }}'
  uid_template: '{item.crn}'
- discovery_id: ibm.billing.get-usage
  calls:
  - action: get-usage
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      crn: '{{ response.crn }}'
      guid: '{{ response.guid }}'
      type: '{{ response.type }}'
      status: '{{ response.status }}'
      state: '{{ response.state }}'
      created_at: '{{ response.created_at }}'
      updated_at: '{{ response.updated_at }}'
      resource_group_id: '{{ response.resource_group_id }}'
      resource_group: '{{ response.resource_group }}'
      region: '{{ response.region }}'
      location: '{{ response.location }}'
      tags: '{{ response.tags }}'
      href: '{{ response.href }}'
      amount: '{{ response.amount }}'
      currency_code: '{{ response.currency_code }}'
      billing_period: '{{ response.billing_period }}'
      due_date: '{{ response.due_date }}'
  uid_template: '{item.crn}'
- discovery_id: ibm.billing.list-invoices
  calls:
  - action: list-invoices
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      guid: '{{ item.guid }}'
      type: '{{ item.type }}'
      status: '{{ item.status }}'
      state: '{{ item.state }}'
      created_at: '{{ item.created_at }}'
      updated_at: '{{ item.updated_at }}'
      resource_group_id: '{{ item.resource_group_id }}'
      resource_group: '{{ item.resource_group }}'
      region: '{{ item.region }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      href: '{{ item.href }}'
      amount: '{{ item.amount }}'
      currency_code: '{{ item.currency_code }}'
      billing_period: '{{ item.billing_period }}'
      due_date: '{{ item.due_date }}'
  uid_template: '{item.crn}'
