version: '1.0'
provider: ibm
service: resource_manager
services:
  client: resource_manager
  module: ibm_platform_services.resource_manager
discovery:
- discovery_id: ibm.resource_manager.list-quota-definitions
  calls:
  - action: list-quota-definitions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      created_at: '{{ item.created_at }}'
      crn: '{{ item.crn }}'
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.crn}'
- discovery_id: ibm.resource_manager.list-resource-groups
  calls:
  - action: list-resource-groups
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      created_at: '{{ item.created_at }}'
      crn: '{{ item.crn }}'
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.crn}'
- discovery_id: ibm.resource_manager.get-quota-definition
  calls:
  - action: get-quota-definition
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      created_at: '{{ response.created_at }}'
      crn: '{{ response.crn }}'
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      status: '{{ response.status }}'
      tags: '{{ response.tags }}'
  uid_template: '{item.crn}'
- discovery_id: ibm.resource_manager.get-resource-group
  calls:
  - action: get-resource-group
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      created_at: '{{ response.created_at }}'
      crn: '{{ response.crn }}'
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      status: '{{ response.status }}'
      tags: '{{ response.tags }}'
  uid_template: '{item.crn}'
