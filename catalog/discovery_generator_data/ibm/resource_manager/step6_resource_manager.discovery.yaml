# Discovery YAML — resource_manager (IBM Cloud)
# Generated: 2026-02-21T04:45:39Z
version: '1.0'
provider: ibm
service: resource_manager
services:
  client: resource_manager
  module: ibm_platform_services.resource_manager
discovery:
  # ── list_quota_definitions ──
  - discovery_id: ibm.resource_manager.list-quota-definitions
    calls:
      - action: list-quota-definitions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        created_at: '{{ item.created_at }}'
        crn: '{{ item.crn }}'
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        tags: '{{ item.tags }}'
  # ── list_resource_groups ──
  - discovery_id: ibm.resource_manager.list-resource-groups
    calls:
      - action: list-resource-groups
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        created_at: '{{ item.created_at }}'
        crn: '{{ item.crn }}'
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        tags: '{{ item.tags }}'
  # ── Dependent ops ──
  # ── get_quota_definition [dependent] ──
  - discovery_id: ibm.resource_manager.get-quota-definition
    calls:
      - action: get-quota-definition
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        created_at: '{{ response.created_at }}'
        crn: '{{ response.crn }}'
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        status: '{{ response.status }}'
        tags: '{{ response.tags }}'
  # ── get_resource_group [dependent] ──
  - discovery_id: ibm.resource_manager.get-resource-group
    calls:
      - action: get-resource-group
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        created_at: '{{ response.created_at }}'
        crn: '{{ response.crn }}'
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        status: '{{ response.status }}'
        tags: '{{ response.tags }}'
