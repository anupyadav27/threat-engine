version: '1.0'
provider: ibm
service: account
services:
  client: account
  module: ibm_platform_services.account
discovery:
- discovery_id: ibm.account.get-account
  calls:
  - action: get-account
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      crn: '{{ response.crn }}'
      guid: '{{ response.guid }}'
      type: '{{ response.type }}'
      status: '{{ response.status }}'
      state: '{{ response.state }}'
      created_at: '{{ response.created_at }}'
      updated_at: '{{ response.updated_at }}'
      resource_group_id: '{{ response.resource_group_id }}'
      resource_group: '{{ response.resource_group }}'
      region: '{{ response.region }}'
      location: '{{ response.location }}'
      tags: '{{ response.tags }}'
      href: '{{ response.href }}'
      owner_iam_id: '{{ response.owner_iam_id }}'
      owner_email: '{{ response.owner_email }}'
      country_code: '{{ response.country_code }}'
      currency_code: '{{ response.currency_code }}'
- discovery_id: ibm.account.list-accounts
  calls:
  - action: list-accounts
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      guid: '{{ item.guid }}'
      type: '{{ item.type }}'
      status: '{{ item.status }}'
      state: '{{ item.state }}'
      created_at: '{{ item.created_at }}'
      updated_at: '{{ item.updated_at }}'
      resource_group_id: '{{ item.resource_group_id }}'
      resource_group: '{{ item.resource_group }}'
      region: '{{ item.region }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      href: '{{ item.href }}'
      owner_iam_id: '{{ item.owner_iam_id }}'
      owner_email: '{{ item.owner_email }}'
      country_code: '{{ item.country_code }}'
      currency_code: '{{ item.currency_code }}'
