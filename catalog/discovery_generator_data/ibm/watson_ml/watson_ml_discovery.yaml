version: '1.0'
provider: ibm
service: watson_ml
services:
  client: watson_ml
  module: ibm_cloud_sdk.watson_ml
discovery:
- discovery_id: ibm.watson_ml.get-model
  calls:
  - action: get-model
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.watson_ml.list-models
  calls:
  - action: list-models
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
