version: '1.0'
provider: ibm
service: event_streams
services:
  client: event_streams
  module: ibm_platform_services.event_streams
discovery:
- discovery_id: ibm.event_streams.get-topic
  calls:
  - action: get-topic
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      crn: '{{ response.crn }}'
      guid: '{{ response.guid }}'
      type: '{{ response.type }}'
      status: '{{ response.status }}'
      state: '{{ response.state }}'
      created_at: '{{ response.created_at }}'
      updated_at: '{{ response.updated_at }}'
      resource_group_id: '{{ response.resource_group_id }}'
      resource_group: '{{ response.resource_group }}'
      region: '{{ response.region }}'
      location: '{{ response.location }}'
      tags: '{{ response.tags }}'
      href: '{{ response.href }}'
      topic_name: '{{ response.topic_name }}'
      partitions: '{{ response.partitions }}'
      replication_factor: '{{ response.replication_factor }}'
      retention_ms: '{{ response.retention_ms }}'
  uid_template: '{item.crn}'
- discovery_id: ibm.event_streams.list-topics
  calls:
  - action: list-topics
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      guid: '{{ item.guid }}'
      type: '{{ item.type }}'
      status: '{{ item.status }}'
      state: '{{ item.state }}'
      created_at: '{{ item.created_at }}'
      updated_at: '{{ item.updated_at }}'
      resource_group_id: '{{ item.resource_group_id }}'
      resource_group: '{{ item.resource_group }}'
      region: '{{ item.region }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      href: '{{ item.href }}'
      topic_name: '{{ item.topic_name }}'
      partitions: '{{ item.partitions }}'
      replication_factor: '{{ item.replication_factor }}'
      retention_ms: '{{ item.retention_ms }}'
  uid_template: '{item.crn}'
