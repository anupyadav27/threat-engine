version: '1.0'
provider: ibm
service: iam_policy_management
services:
  client: iam_policy_management
  module: ibm_platform_services.iam_policy_management
discovery:
- discovery_id: ibm.iam_policy_management.list-roles
  calls:
  - action: list-roles
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      created_at: '{{ item.created_at }}'
      crn: '{{ item.crn }}'
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.crn}'
