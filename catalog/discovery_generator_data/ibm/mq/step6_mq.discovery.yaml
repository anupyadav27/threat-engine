version: '1.0'
provider: ibm
service: mq
discovery:
- _stub: true
  discovery_id: ibm.mq.list_mqs
  _note: STUB — generated by step2, needs real SDK review for ibm.mq
  _rules:
  - ibm.mq.broker.logging_enabled
  _client: ibm_mqcloud.MqcloudV1
  calls:
  - action: ListResources
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      id: '{{ item.Id }}'
      name: '{{ item.Name }}'
      resource_type: '''{{ resource_type }}'''
      region: '{{ region }}'
      encrypted: '{{ item.Encrypted }}'
      kms_key_id: '{{ item.KMSKeyId }}'
      status: '{{ item.Status }}'
      enabled: '{{ item.Enabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      internet_facing: '{{ item.InternetFacing }}'
      public_ip_address: '{{ item.PublicIpAddress }}'
      tags: '{{ item.Tags }}'
      permissions: '{{ item.Permissions }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      retention_days: '{{ item.RetentionDays }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
- discovery_id: ibm.mq.list-queue-managers
  calls:
  - action: list-queue-managers
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.queue_managers }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      display_name: '{{ item.display_name }}'
      location: '{{ item.location }}'
      size: '{{ item.size }}'
      status_uri: '{{ item.status_uri }}'
      version: '{{ item.version }}'
      status: '{{ item.status.value }}'
      queue_manager_uri: '{{ item.queue_manager_uri }}'
      logs_enabled: '{{ item.data_instance_details.dataEncryption }}'
  _used_by_rules:
  - ibm.mq.broker.logging_enabled
  uid_template: '{item.id}'
- discovery_id: ibm.mq.get-queue-manager-available-upgrade-versions
  calls:
  - action: get-queue-manager-available-upgrade-versions
    params:
      service_instance_guid: '{{ item.id }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      total_count: '{{ response.total_count }}'
      upgrades: '{{ response.upgrades }}'
