# Discovery YAML — analytics_engine (IBM Cloud)
# Generated: 2026-02-21T04:45:38Z
version: '1.0'
provider: ibm
service: analytics_engine
services:
  client: analytics_engine
  module: ibm_platform_services.analytics_engine
discovery:
  # ── get_cluster ──
  - discovery_id: ibm.analytics_engine.get-cluster
    calls:
      - action: get-cluster
        save_as: response
        on_error: continue
    emit:
      as: item
  # ── list_clusters ──
  - discovery_id: ibm.analytics_engine.list-clusters
    calls:
      - action: list-clusters
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
