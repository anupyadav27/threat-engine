version: '1.0'
provider: ibm
service: analytics_engine
services:
  client: analytics_engine
  module: ibm_platform_services.analytics_engine
discovery:
- discovery_id: ibm.analytics_engine.get-cluster
  calls:
  - action: get-cluster
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      crn: '{{ response.crn }}'
      guid: '{{ response.guid }}'
      type: '{{ response.type }}'
      status: '{{ response.status }}'
      state: '{{ response.state }}'
      created_at: '{{ response.created_at }}'
      updated_at: '{{ response.updated_at }}'
      resource_group_id: '{{ response.resource_group_id }}'
      resource_group: '{{ response.resource_group }}'
      region: '{{ response.region }}'
      location: '{{ response.location }}'
      tags: '{{ response.tags }}'
      href: '{{ response.href }}'
      cluster_id: '{{ response.cluster_id }}'
      service_endpoints: '{{ response.service_endpoints }}'
      private_service_endpoints: '{{ response.private_service_endpoints }}'
  uid_template: '{item.crn}'
- discovery_id: ibm.analytics_engine.list-clusters
  calls:
  - action: list-clusters
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      guid: '{{ item.guid }}'
      type: '{{ item.type }}'
      status: '{{ item.status }}'
      state: '{{ item.state }}'
      created_at: '{{ item.created_at }}'
      updated_at: '{{ item.updated_at }}'
      resource_group_id: '{{ item.resource_group_id }}'
      resource_group: '{{ item.resource_group }}'
      region: '{{ item.region }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      href: '{{ item.href }}'
      cluster_id: '{{ item.cluster_id }}'
      service_endpoints: '{{ item.service_endpoints }}'
      private_service_endpoints: '{{ item.private_service_endpoints }}'
  uid_template: '{item.crn}'
