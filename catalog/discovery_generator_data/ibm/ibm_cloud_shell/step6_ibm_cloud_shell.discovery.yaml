version: '1.0'
provider: ibm
service: ibm_cloud_shell
services:
  client: ibm_cloud_shell
  module: ibm_platform_services.ibm_cloud_shell
discovery:
- discovery_id: ibm.ibm_cloud_shell.get-account-settings
  calls:
  - action: get-account-settings
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      created_at: '{{ response.created_at }}'
      crn: '{{ response.crn }}'
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      status: '{{ response.status }}'
      tags: '{{ response.tags }}'
  uid_template: '{item.crn}'
