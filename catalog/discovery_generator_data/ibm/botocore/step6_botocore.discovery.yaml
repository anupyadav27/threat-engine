# Discovery YAML — botocore (IBM Cloud)
# Generated: 2026-02-21T04:45:38Z
version: '1.0'
provider: ibm
service: botocore
services:
  client: botocore
  module: ibm_platform_services.botocore
discovery:
  # ── get_name ──
  - discovery_id: ibm.botocore.get-name
    calls:
      - action: get-name
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        created_at: '{{ response.created_at }}'
        crn: '{{ response.crn }}'
        id: '{{ response.id }}'
        name: '{{ response.name }}'
        status: '{{ response.status }}'
        tags: '{{ response.tags }}'
