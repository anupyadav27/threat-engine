version: '1.0'
provider: ibm
service: security_compliance_center
services:
  client: security_compliance_center
  module: ibm_platform_services.security_compliance_center
discovery:
  # ── get_assessment ──
  - discovery_id: ibm.security_compliance_center.get-assessment
    calls:
      - action: get-assessment
        save_as: response
        on_error: continue
    emit:
      as: item
  # ── list_assessments ──
  - discovery_id: ibm.security_compliance_center.list-assessments
    calls:
      - action: list-assessments
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
