version: '1.0'
provider: ibm
service: security_compliance_center
services:
  client: security_compliance_center
  module: ibm_platform_services.security_compliance_center
discovery:
- discovery_id: ibm.security_compliance_center.get-assessment
  calls:
  - action: get-assessment
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      crn: '{{ response.crn }}'
      guid: '{{ response.guid }}'
      type: '{{ response.type }}'
      status: '{{ response.status }}'
      state: '{{ response.state }}'
      created_at: '{{ response.created_at }}'
      updated_at: '{{ response.updated_at }}'
      resource_group_id: '{{ response.resource_group_id }}'
      resource_group: '{{ response.resource_group }}'
      region: '{{ response.region }}'
      location: '{{ response.location }}'
      tags: '{{ response.tags }}'
      href: '{{ response.href }}'
      assessment_id: '{{ response.assessment_id }}'
      control_id: '{{ response.control_id }}'
      profile_id: '{{ response.profile_id }}'
      score: '{{ response.score }}'
      result: '{{ response.result }}'
  uid_template: '{item.crn}'
- discovery_id: ibm.security_compliance_center.list-assessments
  calls:
  - action: list-assessments
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      guid: '{{ item.guid }}'
      type: '{{ item.type }}'
      status: '{{ item.status }}'
      state: '{{ item.state }}'
      created_at: '{{ item.created_at }}'
      updated_at: '{{ item.updated_at }}'
      resource_group_id: '{{ item.resource_group_id }}'
      resource_group: '{{ item.resource_group }}'
      region: '{{ item.region }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      href: '{{ item.href }}'
      assessment_id: '{{ item.assessment_id }}'
      control_id: '{{ item.control_id }}'
      profile_id: '{{ item.profile_id }}'
      score: '{{ item.score }}'
      result: '{{ item.result }}'
  uid_template: '{item.crn}'
