version: '1.0'
provider: ibm
service: block_storage
services:
  client: block_storage
  module: ibm_platform_services.block_storage
discovery:
- discovery_id: ibm.block_storage.get-volume
  calls:
  - action: get-volume
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      crn: '{{ response.crn }}'
      guid: '{{ response.guid }}'
      type: '{{ response.type }}'
      status: '{{ response.status }}'
      state: '{{ response.state }}'
      created_at: '{{ response.created_at }}'
      updated_at: '{{ response.updated_at }}'
      resource_group_id: '{{ response.resource_group_id }}'
      resource_group: '{{ response.resource_group }}'
      region: '{{ response.region }}'
      location: '{{ response.location }}'
      tags: '{{ response.tags }}'
      href: '{{ response.href }}'
      capacity: '{{ response.capacity }}'
      iops: '{{ response.iops }}'
      encryption: '{{ response.encryption }}'
      encryption_key: '{{ response.encryption_key }}'
      profile: '{{ response.profile }}'
      zone: '{{ response.zone }}'
      attachment_state: '{{ response.attachment_state }}'
      volume_attachments: '{{ response.volume_attachments }}'
  uid_template: '{item.crn}'
- discovery_id: ibm.block_storage.list-volumes
  calls:
  - action: list-volumes
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      guid: '{{ item.guid }}'
      type: '{{ item.type }}'
      status: '{{ item.status }}'
      state: '{{ item.state }}'
      created_at: '{{ item.created_at }}'
      updated_at: '{{ item.updated_at }}'
      resource_group_id: '{{ item.resource_group_id }}'
      resource_group: '{{ item.resource_group }}'
      region: '{{ item.region }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      href: '{{ item.href }}'
      capacity: '{{ item.capacity }}'
      iops: '{{ item.iops }}'
      encryption: '{{ item.encryption }}'
      encryption_key: '{{ item.encryption_key }}'
      profile: '{{ item.profile }}'
      zone: '{{ item.zone }}'
      attachment_state: '{{ item.attachment_state }}'
      volume_attachments: '{{ item.volume_attachments }}'
  uid_template: '{item.crn}'
