version: '1.0'
provider: ibm
service: log_analysis
services:
  client: log_analysis
  module: ibm_cloud_sdk.log_analysis
discovery:
- discovery_id: ibm.log_analysis.get-log
  calls:
  - action: get-log
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.log_analysis.list-logs
  calls:
  - action: list-logs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.log_analysis.query-logs
  calls:
  - action: query-logs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
