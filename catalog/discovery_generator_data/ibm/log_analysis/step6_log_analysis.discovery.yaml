# Discovery YAML — log_analysis (IBM Cloud)
# Generated: 2026-02-21T04:45:39Z
version: '1.0'
provider: ibm
service: log_analysis
services:
  client: log_analysis
  module: ibm_platform_services.log_analysis
discovery:
  # ── get_log ──
  - discovery_id: ibm.log_analysis.get-log
    calls:
      - action: get-log
        save_as: response
        on_error: continue
    emit:
      as: item
  # ── list_logs ──
  - discovery_id: ibm.log_analysis.list-logs
    calls:
      - action: list-logs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
  # ── query_logs ──
  - discovery_id: ibm.log_analysis.query-logs
    calls:
      - action: query-logs
        save_as: response
        on_error: continue
    emit:
      as: item
