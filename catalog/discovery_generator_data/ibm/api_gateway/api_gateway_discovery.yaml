version: '1.0'
provider: ibm
service: api_gateway
services:
  client: api_gateway
  module: ibm_cloud_sdk.api_gateway
discovery:
- discovery_id: ibm.api_gateway.get-api
  calls:
  - action: get-api
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: ibm.api_gateway.list-apis
  calls:
  - action: list-apis
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
