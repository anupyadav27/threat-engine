version: '1.0'
provider: ibm
service: api_gateway
services:
  client: api_gateway
  module: ibm_platform_services.api_gateway
discovery:
- discovery_id: ibm.api_gateway.get-api
  calls:
  - action: get-api
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      crn: '{{ response.crn }}'
      guid: '{{ response.guid }}'
      type: '{{ response.type }}'
      status: '{{ response.status }}'
      state: '{{ response.state }}'
      created_at: '{{ response.created_at }}'
      updated_at: '{{ response.updated_at }}'
      resource_group_id: '{{ response.resource_group_id }}'
      resource_group: '{{ response.resource_group }}'
      region: '{{ response.region }}'
      location: '{{ response.location }}'
      tags: '{{ response.tags }}'
      href: '{{ response.href }}'
      endpoint_url: '{{ response.endpoint_url }}'
      managed: '{{ response.managed }}'
      shared: '{{ response.shared }}'
      open_api_doc: '{{ response.open_api_doc }}'
  uid_template: '{item.crn}'
- discovery_id: ibm.api_gateway.list-apis
  calls:
  - action: list-apis
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      guid: '{{ item.guid }}'
      type: '{{ item.type }}'
      status: '{{ item.status }}'
      state: '{{ item.state }}'
      created_at: '{{ item.created_at }}'
      updated_at: '{{ item.updated_at }}'
      resource_group_id: '{{ item.resource_group_id }}'
      resource_group: '{{ item.resource_group }}'
      region: '{{ item.region }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      href: '{{ item.href }}'
      endpoint_url: '{{ item.endpoint_url }}'
      managed: '{{ item.managed }}'
      shared: '{{ item.shared }}'
      open_api_doc: '{{ item.open_api_doc }}'
  uid_template: '{item.crn}'
