version: '1.0'
provider: ibm
service: monitoring
services:
  client: monitoring
  module: ibm_platform_services.monitoring
discovery:
- discovery_id: ibm.monitoring.get-metric
  calls:
  - action: get-metric
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      crn: '{{ response.crn }}'
      guid: '{{ response.guid }}'
      type: '{{ response.type }}'
      status: '{{ response.status }}'
      state: '{{ response.state }}'
      created_at: '{{ response.created_at }}'
      updated_at: '{{ response.updated_at }}'
      resource_group_id: '{{ response.resource_group_id }}'
      resource_group: '{{ response.resource_group }}'
      region: '{{ response.region }}'
      location: '{{ response.location }}'
      tags: '{{ response.tags }}'
      href: '{{ response.href }}'
      metric_name: '{{ response.metric_name }}'
      interval: '{{ response.interval }}'
      unit: '{{ response.unit }}'
      alert_id: '{{ response.alert_id }}'
- discovery_id: ibm.monitoring.list-metrics
  calls:
  - action: list-metrics
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      guid: '{{ item.guid }}'
      type: '{{ item.type }}'
      status: '{{ item.status }}'
      state: '{{ item.state }}'
      created_at: '{{ item.created_at }}'
      updated_at: '{{ item.updated_at }}'
      resource_group_id: '{{ item.resource_group_id }}'
      resource_group: '{{ item.resource_group }}'
      region: '{{ item.region }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      href: '{{ item.href }}'
      metric_name: '{{ item.metric_name }}'
      interval: '{{ item.interval }}'
      unit: '{{ item.unit }}'
      alert_id: '{{ item.alert_id }}'
- discovery_id: ibm.monitoring.query-metrics
  calls:
  - action: query-metrics
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      crn: '{{ response.crn }}'
      guid: '{{ response.guid }}'
      type: '{{ response.type }}'
      status: '{{ response.status }}'
      state: '{{ response.state }}'
      created_at: '{{ response.created_at }}'
      updated_at: '{{ response.updated_at }}'
      resource_group_id: '{{ response.resource_group_id }}'
      resource_group: '{{ response.resource_group }}'
      region: '{{ response.region }}'
      location: '{{ response.location }}'
      tags: '{{ response.tags }}'
      href: '{{ response.href }}'
      metric_name: '{{ response.metric_name }}'
      interval: '{{ response.interval }}'
      unit: '{{ response.unit }}'
      alert_id: '{{ response.alert_id }}'
