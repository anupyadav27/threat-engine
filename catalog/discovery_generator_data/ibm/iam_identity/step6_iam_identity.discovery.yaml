version: '1.0'
provider: ibm
service: iam_identity
services:
  client: iam_identity
  module: ibm_platform_services.iam_identity
discovery:
- discovery_id: ibm.iam_identity.get-api-keys-details
  calls:
  - action: get-api-keys-details
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      created_at: '{{ response.created_at }}'
      crn: '{{ response.crn }}'
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      status: '{{ response.status }}'
      tags: '{{ response.tags }}'
  uid_template: '{item.crn}'
