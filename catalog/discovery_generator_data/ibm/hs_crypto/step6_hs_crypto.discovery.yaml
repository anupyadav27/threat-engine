version: '1.0'
provider: ibm
service: hs_crypto
services:
  client: hs_crypto
  module: boto3.client
discovery:
- discovery_id: ibm.hs_crypto.list-instances
  calls:
  - action: list-instances
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.resources }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      state: '{{ item.state }}'
      region_id: '{{ item.region_id }}'
      hsm_info: '{{ item.hsm_info }}'
      compliance_state: '{{ item.compliance_state }}'
  uid_template: '{item.id}'
