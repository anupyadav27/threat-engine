version: '1.0'
provider: ibm
service: certificate_manager
services:
  client: certificate_manager
  module: ibm_platform_services.certificate_manager
discovery:
- discovery_id: ibm.certificate_manager.get-certificate
  calls:
  - action: get-certificate
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      crn: '{{ response.crn }}'
      guid: '{{ response.guid }}'
      type: '{{ response.type }}'
      status: '{{ response.status }}'
      state: '{{ response.state }}'
      created_at: '{{ response.created_at }}'
      updated_at: '{{ response.updated_at }}'
      resource_group_id: '{{ response.resource_group_id }}'
      resource_group: '{{ response.resource_group }}'
      region: '{{ response.region }}'
      location: '{{ response.location }}'
      tags: '{{ response.tags }}'
      href: '{{ response.href }}'
      domains: '{{ response.domains }}'
      issuer: '{{ response.issuer }}'
      expires_on: '{{ response.expires_on }}'
      imported: '{{ response.imported }}'
      key_algorithm: '{{ response.key_algorithm }}'
      algorithm: '{{ response.algorithm }}'
- discovery_id: ibm.certificate_manager.list-certificates
  calls:
  - action: list-certificates
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      guid: '{{ item.guid }}'
      type: '{{ item.type }}'
      status: '{{ item.status }}'
      state: '{{ item.state }}'
      created_at: '{{ item.created_at }}'
      updated_at: '{{ item.updated_at }}'
      resource_group_id: '{{ item.resource_group_id }}'
      resource_group: '{{ item.resource_group }}'
      region: '{{ item.region }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      href: '{{ item.href }}'
      domains: '{{ item.domains }}'
      issuer: '{{ item.issuer }}'
      expires_on: '{{ item.expires_on }}'
      imported: '{{ item.imported }}'
      key_algorithm: '{{ item.key_algorithm }}'
      algorithm: '{{ item.algorithm }}'
