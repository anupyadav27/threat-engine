# Discovery YAML — security_advisor (IBM Cloud)
# Generated: 2026-02-21T04:45:39Z
version: '1.0'
provider: ibm
service: security_advisor
services:
  client: security_advisor
  module: ibm_platform_services.security_advisor
discovery:
  # ── get_finding ──
  - discovery_id: ibm.security_advisor.get-finding
    calls:
      - action: get-finding
        save_as: response
        on_error: continue
    emit:
      as: item
  # ── list_findings ──
  - discovery_id: ibm.security_advisor.list-findings
    calls:
      - action: list-findings
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
