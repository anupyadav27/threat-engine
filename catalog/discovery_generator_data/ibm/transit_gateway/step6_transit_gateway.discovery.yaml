version: '1.0'
provider: ibm
service: transit_gateway
services:
  client: transit_gateway
  module: boto3.client
discovery:
- discovery_id: ibm.transit_gateway.list-transit-gateways
  calls:
  - action: list-transit-gateways
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.transit_gateways }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      location: '{{ item.location }}'
      global: '{{ item.global }}'
      created_at: '{{ item.created_at }}'
  uid_template: '{item.id}'
- discovery_id: ibm.transit_gateway.list-transit-gateway-connections
  for_each: ibm.transit_gateway.list-transit-gateways
  calls:
  - action: list-transit-gateway-connections
    save_as: response
    params:
      transit_gateway_id: '{{ item.id }}'
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.connections }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      network_type: '{{ item.network_type }}'
      status: '{{ item.status }}'
