# Discovery YAML — key_protect (IBM Cloud)
# Generated: 2026-02-21T04:45:39Z
version: '1.0'
provider: ibm
service: key_protect
services:
  client: key_protect
  module: ibm_platform_services.key_protect
discovery:
  # ── get_key ──
  - discovery_id: ibm.key_protect.get-key
    calls:
      - action: get-key
        save_as: response
        on_error: continue
    emit:
      as: item
  # ── list_keys ──
  - discovery_id: ibm.key_protect.list-keys
    calls:
      - action: list-keys
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
