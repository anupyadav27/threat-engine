version: '1.0'
provider: ibm
service: key_protect
services:
  client: key_protect
  module: ibm_platform_services.key_protect
discovery:
- discovery_id: ibm.key_protect.get-key
  calls:
  - action: get-key
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      crn: '{{ response.crn }}'
      guid: '{{ response.guid }}'
      type: '{{ response.type }}'
      status: '{{ response.status }}'
      state: '{{ response.state }}'
      created_at: '{{ response.created_at }}'
      updated_at: '{{ response.updated_at }}'
      resource_group_id: '{{ response.resource_group_id }}'
      resource_group: '{{ response.resource_group }}'
      region: '{{ response.region }}'
      location: '{{ response.location }}'
      tags: '{{ response.tags }}'
      href: '{{ response.href }}'
      key_id: '{{ response.key_id }}'
      key_state: '{{ response.key_state }}'
      key_type: '{{ response.key_type }}'
      rotation_interval: '{{ response.rotation_interval }}'
      extractable: '{{ response.extractable }}'
- discovery_id: ibm.key_protect.list-keys
  calls:
  - action: list-keys
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      guid: '{{ item.guid }}'
      type: '{{ item.type }}'
      status: '{{ item.status }}'
      state: '{{ item.state }}'
      created_at: '{{ item.created_at }}'
      updated_at: '{{ item.updated_at }}'
      resource_group_id: '{{ item.resource_group_id }}'
      resource_group: '{{ item.resource_group }}'
      region: '{{ item.region }}'
      location: '{{ item.location }}'
      tags: '{{ item.tags }}'
      href: '{{ item.href }}'
      key_id: '{{ item.key_id }}'
      key_state: '{{ item.key_state }}'
      key_type: '{{ item.key_type }}'
      rotation_interval: '{{ item.rotation_interval }}'
      extractable: '{{ item.extractable }}'
