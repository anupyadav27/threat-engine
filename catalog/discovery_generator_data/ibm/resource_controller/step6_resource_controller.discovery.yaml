version: '1.0'
provider: ibm
service: resource_controller
services:
  client: resource_controller
  module: ibm_platform_services.resource_controller
discovery:
- discovery_id: ibm.resource_controller.list-reclamations
  calls:
  - action: list-reclamations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      created_at: '{{ item.created_at }}'
      crn: '{{ item.crn }}'
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.crn}'
