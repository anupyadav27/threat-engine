version: '1.0'
provider: ibm
service: code_engine
services:
  client: code_engine
  module: ibm_platform_services.code_engine
discovery:
- discovery_id: ibm.code_engine.get-app
  calls:
  - action: get-app
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      crn: '{{ response.crn }}'
      guid: '{{ response.guid }}'
      type: '{{ response.type }}'
      status: '{{ response.status }}'
      state: '{{ response.state }}'
      created_at: '{{ response.created_at }}'
      updated_at: '{{ response.updated_at }}'
      resource_group_id: '{{ response.resource_group_id }}'
      resource_group: '{{ response.resource_group }}'
      region: '{{ response.region }}'
      location: '{{ response.location }}'
      tags: '{{ response.tags }}'
      href: '{{ response.href }}'
      project_id: '{{ response.project_id }}'
      image_reference: '{{ response.image_reference }}'
      image_secret: '{{ response.image_secret }}'
      scale_min_instances: '{{ response.scale_min_instances }}'
      scale_max_instances: '{{ response.scale_max_instances }}'
      run_service_account: '{{ response.run_service_account }}'
      endpoint: '{{ response.endpoint }}'
  uid_template: '{item.crn}'
- discovery_id: ibm.code_engine.get-job
  calls:
  - action: get-job
    save_as: response
    on_error: continue
  emit:
