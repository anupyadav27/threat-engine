# Discovery YAML — code_engine (IBM Cloud)
# Generated: 2026-02-21T04:45:38Z
version: '1.0'
provider: ibm
service: code_engine
services:
  client: code_engine
  module: ibm_platform_services.code_engine
discovery:
  # ── get_app ──
  - discovery_id: ibm.code_engine.get-app
    calls:
      - action: get-app
        save_as: response
        on_error: continue
    emit:
      as: item
  # ── get_job ──
  - discovery_id: ibm.code_engine.get-job
    calls:
      - action: get-job
        save_as: response
        on_error: continue
    emit:
      as: item
  # ── get_project ──
  - discovery_id: ibm.code_engine.get-project
    calls:
      - action: get-project
        save_as: response
        on_error: continue
    emit:
      as: item
  # ── list_apps ──
  - discovery_id: ibm.code_engine.list-apps
    calls:
      - action: list-apps
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
  # ── list_jobs ──
  - discovery_id: ibm.code_engine.list-jobs
    calls:
      - action: list-jobs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
  # ── list_projects ──
  - discovery_id: ibm.code_engine.list-projects
    calls:
      - action: list-projects
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
