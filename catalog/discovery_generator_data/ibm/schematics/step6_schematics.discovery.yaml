version: '1.0'
provider: ibm
service: schematics
services:
  client: schematics
  module: ibm_platform_services.schematics
discovery:
- discovery_id: ibm.schematics.get-schematics-version
  calls:
  - action: get-schematics-version
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      created_at: '{{ response.created_at }}'
      crn: '{{ response.crn }}'
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      status: '{{ response.status }}'
      tags: '{{ response.tags }}'
  uid_template: '{item.crn}'
