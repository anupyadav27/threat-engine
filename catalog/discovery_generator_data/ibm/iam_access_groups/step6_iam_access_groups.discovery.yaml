version: '1.0'
provider: ibm
service: iam_access_groups
services:
  client: iam_access_groups
  module: ibm_platform_services.iam_access_groups
discovery:
- discovery_id: ibm.iam_access_groups.get-access-group
  calls:
  - action: get-access-group
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      created_at: '{{ response.created_at }}'
      crn: '{{ response.crn }}'
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      status: '{{ response.status }}'
      tags: '{{ response.tags }}'
  uid_template: '{item.crn}'
