version: '1.0'
provider: ibm
service: iam_access_groups
services:
  client: iam_access_groups
  module: boto3.client
discovery:
- discovery_id: ibm.iam_access_groups.getAccessGroup
  calls:
  - action: getAccessGroup
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      status: '{{ item.status }}'
      created_at: '{{ item.created_at }}'
      tags: '{{ item.tags }}'
