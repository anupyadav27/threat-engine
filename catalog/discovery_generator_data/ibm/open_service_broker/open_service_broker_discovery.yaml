version: '1.0'
provider: ibm
service: open_service_broker
services:
  client: open_service_broker
  module: boto3.client
discovery:
- discovery_id: ibm.open_service_broker.listCatalog
  calls:
  - action: listCatalog
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      status: '{{ item.status }}'
      created_at: '{{ item.created_at }}'
      tags: '{{ item.tags }}'
- discovery_id: ibm.open_service_broker.getAuthenticator
  calls:
  - action: getAuthenticator
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.item }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      crn: '{{ item.crn }}'
      status: '{{ item.status }}'
      created_at: '{{ item.created_at }}'
      tags: '{{ item.tags }}'
