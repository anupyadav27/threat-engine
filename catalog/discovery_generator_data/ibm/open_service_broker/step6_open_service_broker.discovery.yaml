version: '1.0'
provider: ibm
service: open_service_broker
services:
  client: open_service_broker
  module: ibm_platform_services.open_service_broker
discovery:
- discovery_id: ibm.open_service_broker.list-catalog
  calls:
  - action: list-catalog
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      created_at: '{{ item.created_at }}'
      crn: '{{ item.crn }}'
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.crn}'
- discovery_id: ibm.open_service_broker.get-last-operation
  calls:
  - action: get-last-operation
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      created_at: '{{ response.created_at }}'
      crn: '{{ response.crn }}'
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      status: '{{ response.status }}'
      tags: '{{ response.tags }}'
  uid_template: '{item.crn}'
- discovery_id: ibm.open_service_broker.get-service-instance-state
  calls:
  - action: get-service-instance-state
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      created_at: '{{ response.created_at }}'
      crn: '{{ response.crn }}'
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      status: '{{ response.status }}'
      tags: '{{ response.tags }}'
  uid_template: '{item.crn}'
