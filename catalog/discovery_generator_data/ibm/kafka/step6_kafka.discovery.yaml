version: '1.0'
provider: ibm
service: kafka
discovery:
- _stub: true
  discovery_id: ibm.kafka.list_kafkas
  _note: "STUB \u2014 generated by step2, needs real SDK review for ibm.kafka"
  _rules:
  - ibm.kafka.cluster.in_transit_encryption_enabled
  _client: ibm_eventstreams_sdk.AdminrestV1
  calls:
  - action: ListResources
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      id: '{{ item.Id }}'
      name: '{{ item.Name }}'
      resource_type: '''{{ resource_type }}'''
      region: '{{ region }}'
      encrypted: '{{ item.Encrypted }}'
      kms_key_id: '{{ item.KMSKeyId }}'
      status: '{{ item.Status }}'
      enabled: '{{ item.Enabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      internet_facing: '{{ item.InternetFacing }}'
      public_ip_address: '{{ item.PublicIpAddress }}'
      tags: '{{ item.Tags }}'
      permissions: '{{ item.Permissions }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      retention_days: '{{ item.RetentionDays }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
- discovery_id: ibm.kafka.list-topics
  calls:
  - action: list-topics
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      name: '{{ item.name }}'
      partitions: '{{ item.partitions }}'
      replicationFactor: '{{ item.replicationFactor }}'
      retentionMs: '{{ item.retentionMs }}'
      cleanupPolicy: '{{ item.cleanupPolicy }}'
      is_ssl_enabled: '{{ item.configs.ssl_enabled }}'
      min_insync_replicas: '{{ item.configs.min_insync_replicas }}'
  _used_by_rules:
  - ibm.kafka.cluster.in_transit_encryption_enabled
- discovery_id: ibm.kafka.get-mirroring-topic-selection
  calls:
  - action: get-mirroring-topic-selection
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      includes: '{{ response.includes }}'
