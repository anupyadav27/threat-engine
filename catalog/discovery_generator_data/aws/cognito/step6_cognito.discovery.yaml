      as: item
      item:
        AccountRecoverySetting: '{{ response.AccountRecoverySetting }}'
        AdminCreateUserConfig: '{{ response.AdminCreateUserConfig }}'
        AliasAttributes: '{{ response.AliasAttributes }}'
        Arn: '{{ response.Arn }}'
