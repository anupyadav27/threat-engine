        CreationDate: '{{ response.CreationDate }}'
        CustomDomain: '{{ response.CustomDomain }}'
        DeletionProtection: '{{ response.DeletionProtection }}'
        DeviceConfiguration: '{{ response.DeviceConfiguration }}'
        Domain: '{{ response.Domain }}'
        EmailConfiguration: '{{ response.EmailConfiguration }}'
        EmailConfigurationFailure: '{{ response.EmailConfigurationFailure }}'
        EmailVerificationMessage: '{{ response.EmailVerificationMessage }}'
        EmailVerificationSubject: '{{ response.EmailVerificationSubject }}'
        EstimatedNumberOfUsers: '{{ response.EstimatedNumberOfUsers }}'
        Id: '{{ response.Id }}'
        LambdaConfig: '{{ response.LambdaConfig }}'
        LastModifiedDate: '{{ response.LastModifiedDate }}'
        MfaConfiguration: '{{ response.MfaConfiguration }}'
        Name: '{{ response.Name }}'
        Policies: '{{ response.Policies }}'
