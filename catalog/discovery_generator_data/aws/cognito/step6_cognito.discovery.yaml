# Auto-generated: minimum discoveries for check rules + inventory identifiers
# Sources: cognito
# 1 ops (1 from checks, +0 for inventory)
version: '1.0'
provider: aws
service: cognito
discovery:
  - calls:
    - action: list_user_pools
      on_error: continue
      params:
        MaxResults: 60
      save_as: response
    discovery_id: aws.cognito.list_user_pools
    emit:
      as: item
      items_for: '{{ response.UserPools }}'
  - calls:
    - action: describe_user_pool
      on_error: continue
      params:
        UserPoolId: '{{ item.Id }}'
      save_as: response
    discovery_id: aws.cognito.describe_user_pool
