# ==========================================================
# Discovery YAML — cloudformation (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 4 | ops: 2 independent, 1 dependent
# ==========================================================
version: '1.0'
provider: aws
service: cloudformation

services:
  client: cloudformation
  module: "boto3.client('cloudformation')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: role
    identifier_op: aws.cloudformation.describe_stacks
    identifier_field: RoleARN
    item_var_path: item.RoleARN
    identifier_template: '{rolearn}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.cloudformation.describe_stacks  ──
  - discovery_id: aws.cloudformation.describe_stacks
    calls:
      - action: describe_stacks
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Stacks }}'
      item:
        Capabilities: '{{ item.Capabilities }}'
        ChangeSetId: '{{ item.ChangeSetId }}'
        DeletionMode: '{{ item.DeletionMode }}'
        Description: '{{ item.Description }}'
        DetailedStatus: '{{ item.DetailedStatus }}'
        DisableRollback: '{{ item.DisableRollback }}'
        DriftInformation: '{{ item.DriftInformation }}'
        EnableTerminationProtection: '{{ item.EnableTerminationProtection }}'
        Enabled: '{{ item.Enabled }}'
        NotificationARNs: '{{ item.NotificationARNs }}'
        Outputs: '{{ item.Outputs }}'
        Parameters: '{{ item.Parameters }}'
        RetainExceptOnCreate: '{{ item.RetainExceptOnCreate }}'
        RoleARN: '{{ item.RoleARN }}'
        RollbackConfiguration: '{{ item.RollbackConfiguration }}'
        StackId: '{{ item.StackId }}'
        StackName: '{{ item.StackName }}'
        StackStatus: '{{ item.StackStatus }}'
        StackStatusReason: '{{ item.StackStatusReason }}'
        Stacks: '{{ item.Stacks }}'
        Tags: '{{ item.Tags }}'
        TimeoutInMinutes: '{{ item.TimeoutInMinutes }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.cloudformation.list_stacks_for_events  ──
  - discovery_id: aws.cloudformation.list_stacks_for_events
    calls:
      - action: list_stacks_for_events
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        item: '{{ item }}'

  # ════ DEPENDENT (enrich) operations ════
  # ── aws.cloudformation.describe_stack_events [dependent] ──
  - discovery_id: aws.cloudformation.describe_stack_events
    for_each: aws.cloudformation.describe_stack_resources
    calls:
      - action: describe_stack_events
        params:
          StackName: "{{ item.StackName }}"
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.StackEvents }}'
      item:
        ClientRequestToken: '{{ item.ClientRequestToken }}'
        DetailedStatus: '{{ item.DetailedStatus }}'
        EventId: '{{ item.EventId }}'
        HookFailureMode: '{{ item.HookFailureMode }}'
        HookInvocationId: '{{ item.HookInvocationId }}'
        HookInvocationPoint: '{{ item.HookInvocationPoint }}'
        HookStatus: '{{ item.HookStatus }}'
        HookStatusReason: '{{ item.HookStatusReason }}'
        HookType: '{{ item.HookType }}'
        LogicalResourceId: '{{ item.LogicalResourceId }}'
        OperationId: '{{ item.OperationId }}'
        PhysicalResourceId: '{{ item.PhysicalResourceId }}'
        ResourceProperties: '{{ item.ResourceProperties }}'
        ResourceStatus: '{{ item.ResourceStatus }}'
        ResourceStatusReason: '{{ item.ResourceStatusReason }}'
        ResourceType: '{{ item.ResourceType }}'
        StackId: '{{ item.StackId }}'
        StackName: '{{ item.StackName }}'
        Timestamp: '{{ item.Timestamp }}'

