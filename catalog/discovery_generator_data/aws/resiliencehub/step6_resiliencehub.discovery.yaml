    params:
      assessmentArn: '{{ item.assessmentArn }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      appArn: '{{ response.assessment.appArn }}'
      appVersion: '{{ response.assessment.appVersion }}'
      assessment: '{{ response.assessment.assessmentArn }}'
      assessmentArn: '{{ response.assessment.assessmentArn }}'
      assessmentName: '{{ response.assessment.assessmentName }}'
      assessmentStatus: '{{ response.assessment.assessmentStatus }}'
      compliance: '{{ response.assessment.compliance }}'
      complianceStatus: '{{ response.assessment.complianceStatus }}'
      cost: '{{ response.assessment.cost }}'
      driftStatus: '{{ response.assessment.driftStatus }}'
      endTime: '{{ response.assessment.endTime }}'
      invoker: '{{ response.assessment.invoker }}'
      message: '{{ response.assessment.message }}'
      policy: '{{ response.assessment.policy.tier }}'
      resiliencyScore: '{{ response.assessment.resiliencyScore.score }}'
      resourceErrorsDetails: '{{ response.assessment.resourceErrorsDetails }}'
      startTime: '{{ response.assessment.startTime }}'
      summary: '{{ response.assessment.summary }}'
