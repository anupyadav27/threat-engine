      creationTime: '{{ response.assessment.policy.creationTime }}'
      dataLocationConstraint: '{{ response.assessment.policy.dataLocationConstraint }}'
      estimatedCostTier: '{{ response.assessment.policy.estimatedCostTier }}'
      policyArn: '{{ response.assessment.policy.policyArn }}'
      policyDescription: '{{ response.assessment.policy.policyDescription }}'
      policyName: '{{ response.assessment.policy.policyName }}'
      tier: '{{ response.assessment.policy.tier }}'
      componentScore: '{{ response.assessment.resiliencyScore.componentScore }}'
      disruptionScore: '{{ response.assessment.resiliencyScore.disruptionScore }}'
