      appArn: '{{ response.appArn }}'
      appVersion: '{{ response.appVersion }}'
      eksSourceName: '{{ response.physicalResource.logicalResourceId.eksSourceName }}'
      identifier: '{{ response.physicalResource.logicalResourceId.identifier }}'
      logicalStackName: '{{ response.physicalResource.logicalResourceId.logicalStackName }}'
      resourceGroupName: '{{ response.physicalResource.logicalResourceId.resourceGroupName }}'
