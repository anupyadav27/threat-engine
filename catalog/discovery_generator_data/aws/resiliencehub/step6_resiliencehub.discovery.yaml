    on_error: continue
  emit:
    as: item
    items_for: '{{ response.resiliencyPolicies }}'
    item:
      creationTime: '{{ item.creationTime }}'
      dataLocationConstraint: '{{ item.dataLocationConstraint }}'
      estimatedCostTier: '{{ item.estimatedCostTier }}'
      policy: '{{ item.policy }}'
      policyArn: '{{ item.policyArn }}'
      policyDescription: '{{ item.policyDescription }}'
      policyName: '{{ item.policyName }}'
      tags: '{{ item.tags }}'
      tier: '{{ item.tier }}'
      nextToken: '{{ response.nextToken }}'
- discovery_id: aws.resiliencehub.describe_app
  for_each: aws.resiliencehub.list_app_assessments
  calls:
  - action: describe_app
    params:
      appArn: '{{ item.appArn }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      appArn: '{{ response.app.appArn }}'
      assessmentSchedule: '{{ response.app.assessmentSchedule }}'
      awsApplicationArn: '{{ response.app.awsApplicationArn }}'
      complianceStatus: '{{ response.app.complianceStatus }}'
      creationTime: '{{ response.app.creationTime }}'
      description: '{{ response.app.description }}'
      driftStatus: '{{ response.app.driftStatus }}'
      eventSubscriptions: '{{ response.app.eventSubscriptions[].name }}'
      lastAppComplianceEvaluationTime: '{{ response.app.lastAppComplianceEvaluationTime }}'
      lastDriftEvaluationTime: '{{ response.app.lastDriftEvaluationTime }}'
      lastResiliencyScoreEvaluationTime: '{{ response.app.lastResiliencyScoreEvaluationTime }}'
      name: '{{ response.app.name }}'
      permissionModel: '{{ response.app.permissionModel.type }}'
      policyArn: '{{ response.app.policyArn }}'
      resiliencyScore: '{{ response.app.resiliencyScore }}'
      rpoInSecs: '{{ response.app.rpoInSecs }}'
      rtoInSecs: '{{ response.app.rtoInSecs }}'
      status: '{{ response.app.status }}'
      tags: '{{ response.app.tags }}'
      invokerRoleName: '{{ response.app.permissionModel.invokerRoleName }}'
      type: '{{ response.app.permissionModel.type }}'
- discovery_id: aws.resiliencehub.describe_app_assessment
