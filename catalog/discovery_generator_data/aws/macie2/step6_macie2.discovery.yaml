  for_each: aws.macie2.list_allow_lists
  calls:
  - action: get_findings_filter
    params:
      id: '{{ item.id }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      criterion: '{{ response.findingCriteria.criterion }}'
      position: '{{ response.findingCriteria.criterion }}'
      action: '{{ response.action }}'
      arn: '{{ response.arn }}'
      description: '{{ response.description }}'
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      tags: '{{ response.tags }}'
- discovery_id: aws.macie2.get_member
  for_each: aws.macie2.list_allow_lists
  calls:
  - action: get_member
    params:
