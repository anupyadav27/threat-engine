    item:
      arn: '{{ response.arn }}'
      createdAt: '{{ response.createdAt }}'
      deleted: '{{ response.deleted }}'
      description: '{{ response.description }}'
      id: '{{ response.id }}'
      maximumMatchDistance: '{{ response.maximumMatchDistance }}'
      name: '{{ response.name }}'
