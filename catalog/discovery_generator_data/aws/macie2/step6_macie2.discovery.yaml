      id: '{{ item.id }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      criteria: '{{ response.criteria.criteria }}'
      regex: '{{ response.criteria.regex }}'
      s3WordsList: '{{ response.criteria.s3WordsList }}'
      arn: '{{ response.arn }}'
      createdAt: '{{ response.createdAt }}'
      bucketName: '{{ response.criteria.s3WordsList.bucketName }}'
      objectKey: '{{ response.criteria.s3WordsList.objectKey }}'
      description: '{{ response.description }}'
      id: '{{ response.id }}'
