version: '1.0'
provider: aws
service: payment-cryptography
services:
  client: payment-cryptography
  module: boto3.client
discovery:
- discovery_id: aws.payment-cryptography.get_default_key_replication_regions
  calls:
  - action: get_default_key_replication_regions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.EnabledReplicationRegions }}'
    item:
      EnabledReplicationRegions: '{{ item.EnabledReplicationRegions }}'
- discovery_id: aws.payment-cryptography.list_aliases
  calls:
  - action: list_aliases
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Aliases }}'
    item:
      AliasName: '{{ item.AliasName }}'
      KeyArn: '{{ item.KeyArn }}'
- discovery_id: aws.payment-cryptography.list_keys
  calls:
  - action: list_keys
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Keys }}'
    item:
      Enabled: '{{ item.Enabled }}'
      Exportable: '{{ item.Exportable }}'
      KeyArn: '{{ item.KeyArn }}'
      KeyAttributes: '{{ item.KeyAttributes }}'
      KeyCheckValue: '{{ item.KeyCheckValue }}'
      KeyState: '{{ item.KeyState }}'
      MultiRegionKeyType: '{{ item.MultiRegionKeyType }}'
      PrimaryRegion: '{{ item.PrimaryRegion }}'
- discovery_id: aws.payment-cryptography.get_alias
  for_each: aws.payment-cryptography.list_aliases
  calls:
  - action: get_alias
    params:
      AliasName: '{{ item.AliasName }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      AliasName: '{{ response.Alias.AliasName }}'
      KeyArn: '{{ response.Alias.KeyArn }}'
- discovery_id: aws.payment-cryptography.get_certificate_signing_request
  calls:
  - action: get_certificate_signing_request
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      CertificateSigningRequest: '{{ response.CertificateSigningRequest }}'
- discovery_id: aws.payment-cryptography.get_key
  calls:
  - action: get_key
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      CreateTimestamp: '{{ response.Key.CreateTimestamp }}'
      DeletePendingTimestamp: '{{ response.Key.DeletePendingTimestamp }}'
      DeleteTimestamp: '{{ response.Key.DeleteTimestamp }}'
      DeriveKeyUsage: '{{ response.Key.DeriveKeyUsage }}'
      Enabled: '{{ response.Key.Enabled }}'
      Exportable: '{{ response.Key.Exportable }}'
      KeyArn: '{{ response.Key.KeyArn }}'
      KeyAttributes: '{{ response.Key.KeyAttributes }}'
      KeyCheckValue: '{{ response.Key.KeyCheckValue }}'
      KeyCheckValueAlgorithm: '{{ response.Key.KeyCheckValueAlgorithm }}'
      KeyOrigin: '{{ response.Key.KeyOrigin }}'
      KeyState: '{{ response.Key.KeyState }}'
      MultiRegionKeyType: '{{ response.Key.MultiRegionKeyType }}'
      PrimaryRegion: '{{ response.Key.PrimaryRegion }}'
      ReplicationStatus: '{{ response.Key.ReplicationStatus }}'
      UsageStartTimestamp: '{{ response.Key.UsageStartTimestamp }}'
      UsageStopTimestamp: '{{ response.Key.UsageStopTimestamp }}'
      UsingDefaultReplicationRegions: '{{ response.Key.UsingDefaultReplicationRegions }}'
      KeyAlgorithm: '{{ response.Key.KeyAttributes.KeyAlgorithm }}'
      KeyClass: '{{ response.Key.KeyAttributes.KeyClass }}'
      Decrypt: '{{ response.Key.KeyAttributes.KeyModesOfUse.Decrypt }}'
      DeriveKey: '{{ response.Key.KeyAttributes.KeyModesOfUse.DeriveKey }}'
      Encrypt: '{{ response.Key.KeyAttributes.KeyModesOfUse.Encrypt }}'
      Generate: '{{ response.Key.KeyAttributes.KeyModesOfUse.Generate }}'
      NoRestrictions: '{{ response.Key.KeyAttributes.KeyModesOfUse.NoRestrictions }}'
      Sign: '{{ response.Key.KeyAttributes.KeyModesOfUse.Sign }}'
      Unwrap: '{{ response.Key.KeyAttributes.KeyModesOfUse.Unwrap }}'
      Verify: '{{ response.Key.KeyAttributes.KeyModesOfUse.Verify }}'
      Wrap: '{{ response.Key.KeyAttributes.KeyModesOfUse.Wrap }}'
      KeyUsage: '{{ response.Key.KeyAttributes.KeyUsage }}'
- discovery_id: aws.payment-cryptography.get_parameters_for_export
  calls:
  - action: get_parameters_for_export
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      ExportToken: '{{ response.ExportToken }}'
      ParametersValidUntilTimestamp: '{{ response.ParametersValidUntilTimestamp }}'
      SigningKeyAlgorithm: '{{ response.SigningKeyAlgorithm }}'
      SigningKeyCertificate: '{{ response.SigningKeyCertificate }}'
      SigningKeyCertificateChain: '{{ response.SigningKeyCertificateChain }}'
- discovery_id: aws.payment-cryptography.get_parameters_for_import
  calls:
  - action: get_parameters_for_import
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      ImportToken: '{{ response.ImportToken }}'
      ParametersValidUntilTimestamp: '{{ response.ParametersValidUntilTimestamp }}'
      WrappingKeyAlgorithm: '{{ response.WrappingKeyAlgorithm }}'
      WrappingKeyCertificate: '{{ response.WrappingKeyCertificate }}'
      WrappingKeyCertificateChain: '{{ response.WrappingKeyCertificateChain }}'
- discovery_id: aws.payment-cryptography.get_public_key_certificate
  calls:
  - action: get_public_key_certificate
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      KeyCertificate: '{{ response.KeyCertificate }}'
      KeyCertificateChain: '{{ response.KeyCertificateChain }}'
- discovery_id: aws.payment-cryptography.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Tags }}'
    item:
      Key: '{{ item.Key }}'
      Value: '{{ item.Value }}'
