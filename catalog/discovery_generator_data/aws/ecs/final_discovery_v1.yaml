# ==========================================================
# Discovery YAML — ecs (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 23 | ops: 7 independent, 1 dependent
# ==========================================================
version: '1.0'
provider: aws
service: ecs

services:
  client: ecs
  module: "boto3.client('ecs')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: provider
    identifier_op: aws.ecs.describe_capacity_providers
    identifier_field: capacityProviderArn
    item_var_path: item.capacityProviderArn
    identifier_template: '{capacityproviderarn}'
  - resource_type: service
    identifier_op: aws.ecs.describe_services
    identifier_field: clusterArn
    item_var_path: item.clusterArn
    identifier_template: '{clusterarn}'
  - resource_type: task
    identifier_op: aws.ecs.describe_tasks
    identifier_field: clusterArn
    item_var_path: item.clusterArn
    identifier_template: '{clusterarn}'
  - resource_type: principal
    identifier_op: aws.ecs.list_account_settings
    identifier_field: principalArn
    item_var_path: item.principalArn
    identifier_template: '{principalarn}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.ecs.describe_capacity_providers  ──
  - discovery_id: aws.ecs.describe_capacity_providers
    calls:
      - action: describe_capacity_providers
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.capacityProviders }}'
      item:
        Tags: '{{ item.Tags }}'
        autoScalingGroupProvider: '{{ item.autoScalingGroupProvider }}'
        capacityProviderArn: '{{ item.capacityProviderArn }}'
        cluster: '{{ item.cluster }}'
        failures: '{{ item.failures }}'
        item: '{{ item }}'
        managedInstancesProvider: '{{ item.managedInstancesProvider }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        updateStatus: '{{ item.updateStatus }}'
        updateStatusReason: '{{ item.updateStatusReason }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.ecs.describe_service_revisions  ──
  - discovery_id: aws.ecs.describe_service_revisions
    calls:
      - action: describe_service_revisions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.serviceRevisions }}'
      item:
        capacityProviderStrategy: '{{ item.capacityProviderStrategy }}'
        clusterArn: '{{ item.clusterArn }}'
        containerImages: '{{ item.containerImages }}'
        createdAt: '{{ item.createdAt }}'
        ecsManagedResources: '{{ item.ecsManagedResources }}'
        fargateEphemeralStorage: '{{ item.fargateEphemeralStorage }}'
        guardDutyEnabled: '{{ item.guardDutyEnabled }}'
        launchType: '{{ item.launchType }}'
        loadBalancers: '{{ item.loadBalancers }}'
        networkConfiguration: '{{ item.networkConfiguration }}'
        platformFamily: '{{ item.platformFamily }}'
        platformVersion: '{{ item.platformVersion }}'
        resolvedConfiguration: '{{ item.resolvedConfiguration }}'
        serviceArn: '{{ item.serviceArn }}'
        serviceConnectConfiguration: '{{ item.serviceConnectConfiguration }}'
        serviceRegistries: '{{ item.serviceRegistries }}'
        serviceRevisionArn: '{{ item.serviceRevisionArn }}'
        taskDefinition: '{{ item.taskDefinition }}'
        taskDefinition.containerDefinitions[].image: '{{ item.taskDefinition.containerDefinitions[].image }}'
        taskDefinition.containerDefinitions[].logConfiguration: '{{ item.taskDefinition.containerDefinitions[].logConfiguration }}'
        taskDefinition.containerDefinitions[].privileged: '{{ item.taskDefinition.containerDefinitions[].privileged }}'
        taskDefinition.containerDefinitions[].readonlyRootFilesystem: '{{ item.taskDefinition.containerDefinitions[].readonlyRootFilesystem }}'
        taskDefinition.containerDefinitions[].secrets: '{{ item.taskDefinition.containerDefinitions[].secrets }}'
        volumeConfigurations: '{{ item.volumeConfigurations }}'
        vpcLatticeConfigurations: '{{ item.vpcLatticeConfigurations }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.ecs.describe_services  ──
  - discovery_id: aws.ecs.describe_services
    calls:
      - action: describe_services
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.services }}'
      item:
        availabilityZoneRebalancing: '{{ item.availabilityZoneRebalancing }}'
        capacityProviderStrategy: '{{ item.capacityProviderStrategy }}'
        clusterArn: '{{ item.clusterArn }}'
        createdAt: '{{ item.createdAt }}'
        createdBy: '{{ item.createdBy }}'
        currentServiceDeployment: '{{ item.currentServiceDeployment }}'
        currentServiceRevisions: '{{ item.currentServiceRevisions }}'
        deploymentConfiguration: '{{ item.deploymentConfiguration }}'
        deploymentController: '{{ item.deploymentController }}'
        deployments: '{{ item.deployments }}'
        desiredCount: '{{ item.desiredCount }}'
        enableECSManagedTags: '{{ item.enableECSManagedTags }}'
        enableExecuteCommand: '{{ item.enableExecuteCommand }}'
        events: '{{ item.events }}'
        healthCheckGracePeriodSeconds: '{{ item.healthCheckGracePeriodSeconds }}'
        launchType: '{{ item.launchType }}'
        loadBalancers: '{{ item.loadBalancers }}'
        networkConfiguration: '{{ item.networkConfiguration }}'
        networkConfiguration.awsvpcConfiguration.assignPublicIp: '{{ item.networkConfiguration.awsvpcConfiguration.assignPublicIp }}'
        pendingCount: '{{ item.pendingCount }}'
        placementConstraints: '{{ item.placementConstraints }}'
        placementStrategy: '{{ item.placementStrategy }}'
        platformFamily: '{{ item.platformFamily }}'
        platformVersion: '{{ item.platformVersion }}'
        propagateTags: '{{ item.propagateTags }}'
        resourceManagementType: '{{ item.resourceManagementType }}'
        roleArn: '{{ item.roleArn }}'
        runningCount: '{{ item.runningCount }}'
        schedulingStrategy: '{{ item.schedulingStrategy }}'
        serviceArn: '{{ item.serviceArn }}'
        serviceName: '{{ item.serviceName }}'
        serviceRegistries: '{{ item.serviceRegistries }}'
        status: '{{ item.status }}'
        tags: '{{ item.tags }}'
        taskDefinition: '{{ item.taskDefinition }}'
        taskSets: '{{ item.taskSets }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.ecs.describe_tasks  ──
  - discovery_id: aws.ecs.describe_tasks
    calls:
      - action: describe_tasks
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        attachments: '{{ item.attachments }}'
        attributes: '{{ item.attributes }}'
        availabilityZone: '{{ item.availabilityZone }}'
        capacityProviderName: '{{ item.capacityProviderName }}'
        clusterArn: '{{ item.clusterArn }}'
        connectivity: '{{ item.connectivity }}'
        connectivityAt: '{{ item.connectivityAt }}'
        containerInstanceArn: '{{ item.containerInstanceArn }}'
        containers: '{{ item.containers }}'
        cpu: '{{ item.cpu }}'
        createdAt: '{{ item.createdAt }}'
        desiredStatus: '{{ item.desiredStatus }}'
        enableExecuteCommand: '{{ item.enableExecuteCommand }}'
        ephemeralStorage: '{{ item.ephemeralStorage }}'
        executionStoppedAt: '{{ item.executionStoppedAt }}'
        fargateEphemeralStorage: '{{ item.fargateEphemeralStorage }}'
        group: '{{ item.group }}'
        healthStatus: '{{ item.healthStatus }}'
        inferenceAccelerators: '{{ item.inferenceAccelerators }}'
        lastStatus: '{{ item.lastStatus }}'
        launchType: '{{ item.launchType }}'
        memory: '{{ item.memory }}'
        overrides: '{{ item.overrides }}'
        platformFamily: '{{ item.platformFamily }}'
        platformVersion: '{{ item.platformVersion }}'
        pullStartedAt: '{{ item.pullStartedAt }}'
        pullStoppedAt: '{{ item.pullStoppedAt }}'
        startedAt: '{{ item.startedAt }}'
        startedBy: '{{ item.startedBy }}'
        stopCode: '{{ item.stopCode }}'
        stoppedAt: '{{ item.stoppedAt }}'
        stoppedReason: '{{ item.stoppedReason }}'
        stoppingAt: '{{ item.stoppingAt }}'
        tags: '{{ item.tags }}'
        taskArn: '{{ item.taskArn }}'
        taskDefinitionArn: '{{ item.taskDefinitionArn }}'
        version: '{{ item.version }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.ecs.list_account_settings  ──
  - discovery_id: aws.ecs.list_account_settings
    calls:
      - action: list_account_settings
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.settings }}'
      item:
        name: '{{ item.name }}'
        principalArn: '{{ item.principalArn }}'
        type: '{{ item.type }}'
        value: '{{ item.value }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.ecs.list_services  ──
  - discovery_id: aws.ecs.list_services
    calls:
      - action: list_services
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        item: '{{ item }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.ecs.list_task_definitions  ──
  - discovery_id: aws.ecs.list_task_definitions
    calls:
      - action: list_task_definitions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        item: '{{ item }}'

  # ════ DEPENDENT (enrich) operations ════
  # ── aws.ecs.describe_task_definition [dependent] ──
  - discovery_id: aws.ecs.describe_task_definition
    for_each: aws.ecs.list_task_definitions
    calls:
      - action: describe_task_definition
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        containerDefinitions: '{{ item.containerDefinitions }}'
        cpu: '{{ item.cpu }}'
        executionRoleArn: '{{ item.executionRoleArn }}'
        family: '{{ item.family }}'
        memory: '{{ item.memory }}'
        networkMode: '{{ item.networkMode }}'
        requiresCompatibilities: '{{ item.requiresCompatibilities }}'
        revision: '{{ item.revision }}'
        status: '{{ item.status }}'
        taskDefinitionArn: '{{ item.taskDefinitionArn }}'
        taskRoleArn: '{{ item.taskRoleArn }}'

