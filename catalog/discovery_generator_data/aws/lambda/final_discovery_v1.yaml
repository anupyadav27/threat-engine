version: '1.0'
provider: aws
service: lambda

services:
  client: lambda
  module: "boto3.client('lambda')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: layer
    identifier_op: aws.lambda.get_function_configuration
    identifier_field: FunctionArn
    item_var_path: item.FunctionArn
    identifier_template: '{functionarn}'
  - resource_type: config
    identifier_op: aws.lambda.list_code_signing_configs
    identifier_field: CodeSigningConfigArn
    item_var_path: item.CodeSigningConfigArn
    identifier_template: '{codesigningconfigarn}'
  - resource_type: mapping
    identifier_op: aws.lambda.list_event_source_mappings
    identifier_field: EventSourceArn
    item_var_path: item.EventSourceArn
    identifier_template: '{eventsourcearn}'
  - resource_type: function
    identifier_op: aws.lambda.list_functions
    identifier_field: FunctionArn
    item_var_path: item.FunctionArn
    identifier_template: '{functionarn}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.lambda.list_code_signing_configs  ──
  - discovery_id: aws.lambda.list_code_signing_configs
    calls:
      - action: list_code_signing_configs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.CodeSigningConfigs }}'
      item:
        AllowedPublishers: '{{ item.AllowedPublishers }}'
        CodeSigningConfigArn: '{{ item.CodeSigningConfigArn }}'
        CodeSigningConfigId: '{{ item.CodeSigningConfigId }}'
        CodeSigningPolicies: '{{ item.CodeSigningPolicies }}'
        Description: '{{ item.Description }}'
        LastModified: '{{ item.LastModified }}'

  # ════ INDEPENDENT (root) operations ════
