# ==========================================================
# Discovery YAML — opensearchserverless (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 2 | ops: 1 independent, 0 dependent
# ==========================================================
version: '1.0'
provider: aws
service: opensearchserverless

services:
  client: opensearchserverless
  module: "boto3.client('opensearchserverless')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: collection
    identifier_op: aws.opensearchserverless.list_collections
    identifier_field: arn
    item_var_path: item.arn
    identifier_template: '{arn}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.opensearchserverless.list_collections  ──
  - discovery_id: aws.opensearchserverless.list_collections
    calls:
      - action: list_collections
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.collectionSummaries }}'
      item:
        Description: '{{ item.Description }}'
        StandbyReplicas: '{{ item.StandbyReplicas }}'
        arn: '{{ item.arn }}'
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'

