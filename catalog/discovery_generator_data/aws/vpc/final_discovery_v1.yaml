# ==========================================================
# Discovery YAML — vpc (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 4 | ops: 3 independent, 0 dependent
# ==========================================================
version: '1.0'
provider: aws
service: vpc

services:
  client: vpc
  module: "boto3.client('vpc')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: customer
    identifier_op: aws.vpc.describe_customer_gateways
    identifier_field: CertificateArn
    item_var_path: item.CertificateArn
    identifier_template: '{certificatearn}'
  - resource_type: nat
    identifier_op: aws.vpc.describe_nat_gateways
    identifier_field: NatGatewayId
    item_var_path: item.NatGatewayId
    identifier_template: '{natgatewayid}'
  - resource_type: route
    identifier_op: aws.vpc.describe_route_tables
    identifier_field: RouteTableId
    item_var_path: item.RouteTableId
    identifier_template: '{routetableid}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.vpc.describe_customer_gateways  ──
  - discovery_id: aws.vpc.describe_customer_gateways
    calls:
      - action: describe_customer_gateways
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        BgpAsn: '{{ item.BgpAsn }}'
        BgpAsnExtended: '{{ item.BgpAsnExtended }}'
        CertificateArn: '{{ item.CertificateArn }}'
        CustomerGatewayId: '{{ item.CustomerGatewayId }}'
        CustomerGateways: '{{ item.CustomerGateways }}'
        DeviceName: '{{ item.DeviceName }}'
        IpAddress: '{{ item.IpAddress }}'
        State: '{{ item.State }}'
        Tags: '{{ item.Tags }}'
        Type: '{{ item.Type }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.vpc.describe_nat_gateways  ──
  - discovery_id: aws.vpc.describe_nat_gateways
    calls:
      - action: describe_nat_gateways
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        AttachedAppliances: '{{ item.AttachedAppliances }}'
        AutoProvisionZones: '{{ item.AutoProvisionZones }}'
        AutoScalingIps: '{{ item.AutoScalingIps }}'
        AvailabilityMode: '{{ item.AvailabilityMode }}'
        ConnectivityType: '{{ item.ConnectivityType }}'
        CreateTime: '{{ item.CreateTime }}'
        DeleteTime: '{{ item.DeleteTime }}'
        FailureCode: '{{ item.FailureCode }}'
        FailureMessage: '{{ item.FailureMessage }}'
        NatGatewayAddresses: '{{ item.NatGatewayAddresses }}'
        NatGatewayId: '{{ item.NatGatewayId }}'
        NatGateways: '{{ item.NatGateways }}'
        ProvisionedBandwidth: '{{ item.ProvisionedBandwidth }}'
        RouteTableId: '{{ item.RouteTableId }}'
        State: '{{ item.State }}'
        Tags: '{{ item.Tags }}'
        VpcId: '{{ item.VpcId }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.vpc.describe_route_tables  ──
  - discovery_id: aws.vpc.describe_route_tables
    calls:
      - action: describe_route_tables
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        Associations: '{{ item.Associations }}'
        Associations.Main: '{{ item.Associations.Main }}'
        PropagatingVgws: '{{ item.PropagatingVgws }}'
        RouteTableId: '{{ item.RouteTableId }}'
        RouteTables: '{{ item.RouteTables }}'
        Routes: '{{ item.Routes }}'
        Routes.GatewayId: '{{ item.Routes.GatewayId }}'
        Tags: '{{ item.Tags }}'
        VpcId: '{{ item.VpcId }}'

