enabled: false
version: '1.0'
provider: aws
service: ecr-public
services:
  client: ecr-public
  module: boto3.client
discovery:
- discovery_id: aws.ecr-public.describe_registries
  calls:
  - action: describe_registries
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.registries }}'
    item:
      aliases: '{{ item.aliases }}'
      registries: '{{ item.registries }}'
      registryArn: '{{ item.registryArn }}'
      registryId: '{{ item.registryId }}'
      registryUri: '{{ item.registryUri }}'
      verified: '{{ item.verified }}'
- discovery_id: aws.ecr-public.describe_repositories
  calls:
  - action: describe_repositories
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.repositories }}'
    item:
      createdAt: '{{ item.createdAt }}'
      registryId: '{{ item.registryId }}'
      repositories: '{{ item.repositories }}'
      repositoryArn: '{{ item.repositoryArn }}'
      repositoryName: '{{ item.repositoryName }}'
      repositoryUri: '{{ item.repositoryUri }}'
- discovery_id: aws.ecr-public.get_authorization_token
  calls:
  - action: get_authorization_token
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      authorizationData: '{{ response.authorizationData.authorizationData }}'
      authorizationToken: '{{ response.authorizationData.authorizationToken }}'
      expiresAt: '{{ response.authorizationData.expiresAt }}'
- discovery_id: aws.ecr-public.get_registry_catalog_data
  calls:
  - action: get_registry_catalog_data
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      catalogData: '{{ response.registryCatalogData.catalogData }}'
      displayName: '{{ response.registryCatalogData.displayName }}'
      registryCatalogData: '{{ response.registryCatalogData.registryCatalogData }}'
- discovery_id: aws.ecr-public.describe_image_tags
  for_each: aws.ecr-public.describe_repositories
  calls:
  - action: describe_image_tags
    params:
      repositoryName: '{{ item.repositoryName }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.imageTagDetails }}'
    item:
      createdAt: '{{ item.createdAt }}'
      imageDetail: '{{ item.imageDetail }}'
      imageTag: '{{ item.imageTag }}'
- discovery_id: aws.ecr-public.describe_images
  for_each: aws.ecr-public.describe_repositories
  calls:
  - action: describe_images
    params:
      repositoryName: '{{ item.repositoryName }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.imageDetails }}'
    item:
      artifactMediaType: '{{ item.artifactMediaType }}'
      imageDigest: '{{ item.imageDigest }}'
      imageManifestMediaType: '{{ item.imageManifestMediaType }}'
      imagePushedAt: '{{ item.imagePushedAt }}'
      imageSizeInBytes: '{{ item.imageSizeInBytes }}'
      imageTags: '{{ item.imageTags }}'
      registryId: '{{ item.registryId }}'
      repositoryName: '{{ item.repositoryName }}'
- discovery_id: aws.ecr-public.get_repository_catalog_data
  for_each: aws.ecr-public.describe_repositories
  calls:
  - action: get_repository_catalog_data
    params:
      repositoryName: '{{ item.repositoryName }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      aboutText: '{{ response.catalogData.aboutText }}'
      architectures: '{{ response.catalogData.architectures }}'
      description: '{{ response.catalogData.description }}'
      logoUrl: '{{ response.catalogData.logoUrl }}'
      marketplaceCertified: '{{ response.catalogData.marketplaceCertified }}'
      operatingSystems: '{{ response.catalogData.operatingSystems }}'
      usageText: '{{ response.catalogData.usageText }}'
- discovery_id: aws.ecr-public.get_repository_policy
  for_each: aws.ecr-public.describe_repositories
  calls:
  - action: get_repository_policy
    params:
      repositoryName: '{{ item.repositoryName }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      policyText: '{{ response.policyText }}'
      registryId: '{{ response.registryId }}'
      repositoryName: '{{ response.repositoryName }}'
- discovery_id: aws.ecr-public.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.tags }}'
    item:
      Key: '{{ item.Key }}'
      Value: '{{ item.Value }}'
