# ==========================================================
# Discovery YAML — approved (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 2 | ops: 1 independent, 0 dependent
# ==========================================================
version: '1.0'
provider: aws
service: approved

services:
  client: approved
  module: "boto3.client('approved')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: instance
    identifier_op: aws.approved.describe_instances
    identifier_field: VpcId
    item_var_path: item.VpcId
    identifier_template: '{vpcid}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.approved.describe_instances  ──
  - discovery_id: aws.approved.describe_instances
    calls:
      - action: describe_instances
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Reservations[].Instances }}'
      item:
        Architecture: '{{ item.Architecture }}'
        BlockDeviceMappings: '{{ item.BlockDeviceMappings }}'
        CapacityReservationGroups: '{{ item.CapacityReservationGroups }}'
        EbsOptimized: '{{ item.EbsOptimized }}'
        Groups: '{{ item.Groups }}'
        IamInstanceProfile: '{{ item.IamInstanceProfile }}'
        ImageId: '{{ item.ImageId }}'
        InstanceId: '{{ item.InstanceId }}'
        InstanceType: '{{ item.InstanceType }}'
        Instances: '{{ item.Instances }}'
        KeyName: '{{ item.KeyName }}'
        LaunchTime: '{{ item.LaunchTime }}'
        MetadataOptions: '{{ item.MetadataOptions }}'
        Monitoring: '{{ item.Monitoring }}'
        NetworkInterfaces: '{{ item.NetworkInterfaces }}'
        Placement: '{{ item.Placement }}'
        Platform: '{{ item.Platform }}'
        PrivateIpAddress: '{{ item.PrivateIpAddress }}'
        PublicDnsName: '{{ item.PublicDnsName }}'
        PublicIpAddress: '{{ item.PublicIpAddress }}'
        RequesterId: '{{ item.RequesterId }}'
        ReservationId: '{{ item.ReservationId }}'
        Reservations: '{{ item.Reservations }}'
        RootDeviceType: '{{ item.RootDeviceType }}'
        SecurityGroups: '{{ item.SecurityGroups }}'
        SourceDestCheck: '{{ item.SourceDestCheck }}'
        State: '{{ item.State }}'
        SubnetId: '{{ item.SubnetId }}'
        Tags: '{{ item.Tags }}'
        VpcId: '{{ item.VpcId }}'
        item: '{{ item }}'

