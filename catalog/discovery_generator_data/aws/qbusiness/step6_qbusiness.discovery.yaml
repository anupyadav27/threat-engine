      errorMessage: '{{ response.error.errorMessage }}'
      identityType: '{{ response.identityType }}'
      personalizationControlMode: '{{ response.personalizationConfiguration.personalizationControlMode }}'
      qAppsControlMode: '{{ response.qAppsConfiguration.qAppsControlMode }}'
