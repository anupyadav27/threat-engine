# generated_from: step6_securityhub.discovery.yaml
# purpose: only discoveries needed by securityhub.checks.yaml for_each chains
version: '1.0'
provider: aws
service: securityhub
services:
  client: securityhub
  module: boto3.client
discovery:
- discovery_id: aws.securityhub.describe_action_targets
  calls:
  - action: describe_action_targets
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ActionTargets }}'
    item:
      Name: '{{ item.Name }}'
      ActionTargetArn: '{{ item.ActionTargetArn }}'
      ActionTargets: '{{ item.ActionTargets }}'
      Description: '{{ item.Description }}'
- discovery_id: aws.securityhub.describe_hub
  calls:
  - action: describe_hub
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      AutoEnableControls: '{{ response.AutoEnableControls }}'
      ControlFindingGenerator: '{{ response.ControlFindingGenerator }}'
      HubArn: '{{ response.HubArn }}'
      SubscribedAt: '{{ response.SubscribedAt }}'
- discovery_id: aws.securityhub.get_findings
  calls:
  - action: get_findings
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Findings }}'
    item:
      Id: '{{ item.Id }}'
      Region: '{{ item.Region }}'
      Action: '{{ item.Action }}'
      AwsAccountId: '{{ item.AwsAccountId }}'
      AwsAccountName: '{{ item.AwsAccountName }}'
      CompanyName: '{{ item.CompanyName }}'
      Compliance: '{{ item.Compliance }}'
      Confidence: '{{ item.Confidence }}'
      CreatedAt: '{{ item.CreatedAt }}'
      Criticality: '{{ item.Criticality }}'
      Description: '{{ item.Description }}'
      Detection: '{{ item.Detection }}'
      FindingProviderFields: '{{ item.FindingProviderFields }}'
      Findings: '{{ item.Findings }}'
      FirstObservedAt: '{{ item.FirstObservedAt }}'
      GeneratorDetails: '{{ item.GeneratorDetails }}'
      GeneratorId: '{{ item.GeneratorId }}'
      LastObservedAt: '{{ item.LastObservedAt }}'
      Malware: '{{ item.Malware }}'
      Network: '{{ item.Network }}'
      NetworkPath: '{{ item.NetworkPath }}'
      Note: '{{ item.Note }}'
      PatchSummary: '{{ item.PatchSummary }}'
      Process: '{{ item.Process }}'
      ProcessedAt: '{{ item.ProcessedAt }}'
      ProductArn: '{{ item.ProductArn }}'
      ProductFields: '{{ item.ProductFields }}'
      ProductName: '{{ item.ProductName }}'
      RecordState: '{{ item.RecordState }}'
      RelatedFindings: '{{ item.RelatedFindings }}'
      Remediation: '{{ item.Remediation }}'
      Resources: '{{ item.Resources }}'
      Sample: '{{ item.Sample }}'
      SchemaVersion: '{{ item.SchemaVersion }}'
      Severity: '{{ item.Severity }}'
      SourceUrl: '{{ item.SourceUrl }}'
      ThreatIntelIndicators: '{{ item.ThreatIntelIndicators }}'
      Threats: '{{ item.Threats }}'
      Title: '{{ item.Title }}'
      Types: '{{ item.Types }}'
      UpdatedAt: '{{ item.UpdatedAt }}'
      UserDefinedFields: '{{ item.UserDefinedFields }}'
      VerificationState: '{{ item.VerificationState }}'
      Vulnerabilities: '{{ item.Vulnerabilities }}'
      Workflow: '{{ item.Workflow }}'
      WorkflowState: '{{ item.WorkflowState }}'
- discovery_id: aws.securityhub.get_master_account
  calls:
  - action: get_master_account
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      AccountId: '{{ response.Master.AccountId }}'
      InvitationId: '{{ response.Master.InvitationId }}'
      InvitedAt: '{{ response.Master.InvitedAt }}'
      Master: '{{ response.Master.Master }}'
      MemberStatus: '{{ response.Master.MemberStatus }}'
