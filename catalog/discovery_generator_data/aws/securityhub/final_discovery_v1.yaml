# ==========================================================
# Discovery YAML — securityhub (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 15 | ops: 4 independent, 0 dependent
# ==========================================================
version: '1.0'
provider: aws
service: securityhub

services:
  client: securityhub
  module: "boto3.client('securityhub')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: target
    identifier_op: aws.securityhub.describe_action_targets
    identifier_field: ActionTargetArn
    item_var_path: item.ActionTargetArn
    identifier_template: '{actiontargetarn}'
  - resource_type: product
    identifier_op: aws.securityhub.get_findings
    identifier_field: ProductArn
    item_var_path: item.ProductArn
    identifier_template: '{productarn}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.securityhub.describe_action_targets  ──
  - discovery_id: aws.securityhub.describe_action_targets
    calls:
      - action: describe_action_targets
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ActionTargets }}'
      item:
        ActionTargetArn: '{{ item.ActionTargetArn }}'
        ActionTargets: '{{ item.ActionTargets }}'
        Description: '{{ item.Description }}'
        Name: '{{ item.Name }}'
        item: '{{ item }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.securityhub.describe_hub  ──
  - discovery_id: aws.securityhub.describe_hub
    calls:
      - action: describe_hub
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        AutoEnableControls: '{{ item.AutoEnableControls }}'
        ControlFindingGenerator: '{{ item.ControlFindingGenerator }}'
        HubArn: '{{ item.HubArn }}'
        SubscribedAt: '{{ item.SubscribedAt }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.securityhub.get_findings  ──
  - discovery_id: aws.securityhub.get_findings
    calls:
      - action: get_findings
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Findings }}'
      item:
        Action: '{{ item.Action }}'
        AwsAccountId: '{{ item.AwsAccountId }}'
        AwsAccountName: '{{ item.AwsAccountName }}'
        CompanyName: '{{ item.CompanyName }}'
        Compliance: '{{ item.Compliance }}'
        Confidence: '{{ item.Confidence }}'
        CreatedAt: '{{ item.CreatedAt }}'
        Criticality: '{{ item.Criticality }}'
        Description: '{{ item.Description }}'
        Detection: '{{ item.Detection }}'
        FindingProviderFields: '{{ item.FindingProviderFields }}'
        Findings: '{{ item.Findings }}'
        FirstObservedAt: '{{ item.FirstObservedAt }}'
        GeneratorDetails: '{{ item.GeneratorDetails }}'
        GeneratorId: '{{ item.GeneratorId }}'
        Id: '{{ item.Id }}'
        LastObservedAt: '{{ item.LastObservedAt }}'
        Malware: '{{ item.Malware }}'
        Network: '{{ item.Network }}'
        NetworkPath: '{{ item.NetworkPath }}'
        Note: '{{ item.Note }}'
        PatchSummary: '{{ item.PatchSummary }}'
        Process: '{{ item.Process }}'
        ProcessedAt: '{{ item.ProcessedAt }}'
        ProductArn: '{{ item.ProductArn }}'
        ProductFields: '{{ item.ProductFields }}'
        ProductName: '{{ item.ProductName }}'
        RecordState: '{{ item.RecordState }}'
        Region: '{{ item.Region }}'
        RelatedFindings: '{{ item.RelatedFindings }}'
        Remediation: '{{ item.Remediation }}'
        Resources: '{{ item.Resources }}'
        Sample: '{{ item.Sample }}'
        SchemaVersion: '{{ item.SchemaVersion }}'
        Severity: '{{ item.Severity }}'
        SourceUrl: '{{ item.SourceUrl }}'
        ThreatIntelIndicators: '{{ item.ThreatIntelIndicators }}'
        Threats: '{{ item.Threats }}'
        Title: '{{ item.Title }}'
        Types: '{{ item.Types }}'
        UpdatedAt: '{{ item.UpdatedAt }}'
        UserDefinedFields: '{{ item.UserDefinedFields }}'
        VerificationState: '{{ item.VerificationState }}'
        Vulnerabilities: '{{ item.Vulnerabilities }}'
        Workflow: '{{ item.Workflow }}'
        WorkflowState: '{{ item.WorkflowState }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.securityhub.get_master_account  ──
  - discovery_id: aws.securityhub.get_master_account
    calls:
      - action: get_master_account
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        AccountId: '{{ item.AccountId }}'
        InvitationId: '{{ item.InvitationId }}'
        InvitedAt: '{{ item.InvitedAt }}'
        Master: '{{ item.Master }}'
        MemberStatus: '{{ item.MemberStatus }}'

