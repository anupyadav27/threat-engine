# Auto-generated: minimum discoveries for check rules + inventory identifiers
# Sources: securityhub
# 12 ops (4 from checks, +8 for inventory)
version: '1.0'
provider: aws
service: securityhub
discovery:
  - calls:
    - action: get_enabled_standards
      on_error: continue
      save_as: response
    discovery_id: aws.securityhub.get_enabled_standards
    emit:
      as: item
      item:
        StandardsArn: '{{ item.StandardsArn }}'
        StandardsControlsUpdatable: '{{ item.StandardsControlsUpdatable }}'
        StandardsInput: '{{ item.StandardsInput }}'
        StandardsStatus: '{{ item.StandardsStatus }}'
        StandardsStatusReason: '{{ item.StandardsStatusReason }}'
        StandardsSubscriptionArn: '{{ item.StandardsSubscriptionArn }}'
        StandardsSubscriptions: '{{ item.StandardsSubscriptions }}'
      items_for: '{{ response.StandardsSubscriptions }}'
  - calls:
    - action: list_configuration_policies
      on_error: continue
      save_as: response
    discovery_id: aws.securityhub.list_configuration_policies
    emit:
      as: item
      item:
        Arn: '{{ item.Arn }}'
        Description: '{{ item.Description }}'
        Id: '{{ item.Id }}'
        Name: '{{ item.Name }}'
        ServiceEnabled: '{{ item.ServiceEnabled }}'
        UpdatedAt: '{{ item.UpdatedAt }}'
      items_for: '{{ response.ConfigurationPolicySummaries }}'
