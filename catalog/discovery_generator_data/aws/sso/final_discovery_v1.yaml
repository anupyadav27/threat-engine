# ==========================================================
# Discovery YAML — sso (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 6 | ops: 1 independent, 1 dependent
# ==========================================================
version: '1.0'
provider: aws
service: sso

services:
  client: sso
  module: "boto3.client('sso')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: get_inline_policy_for_permission_set
    identifier_op: aws.sso-admin.get_inline_policy_for_permission_set
    identifier_field: Statement
    item_var_path: item.Statement
    identifier_template: '{statement}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.sso-admin.get_inline_policy_for_permission_set  ──
  - discovery_id: aws.sso-admin.get_inline_policy_for_permission_set
    calls:
      - action: get_inline_policy_for_permission_set
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        Statement: '{{ item.Statement }}'
        Version: '{{ item.Version }}'

  # ════ DEPENDENT (enrich) operations ════
  # ── aws.sso-admin.describe_permission_set [dependent] ──
  - discovery_id: aws.sso-admin.describe_permission_set
    for_each: aws.sso-admin.list_instances
    calls:
      - action: describe_permission_set
        params:
          InstanceArn: '{{ item.InstanceArn }}'
          PermissionSetArn: '{{ item.PermissionSetArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        CreatedDate: '{{ item.CreatedDate }}'
        Description: '{{ item.Description }}'
        Name: '{{ item.Name }}'
        PermissionSetArn: '{{ item.PermissionSetArn }}'
        RelayState: '{{ item.RelayState }}'
        SessionDuration: '{{ item.SessionDuration }}'

