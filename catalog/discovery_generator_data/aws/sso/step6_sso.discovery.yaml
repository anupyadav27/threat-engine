        AccessControlAttributes: '{{ item.AccessControlAttributes }}'
        AccountAssignmentCreationStatus: '{{ item.AccountAssignmentCreationStatus }}'
        CreatedDate: '{{ item.CreatedDate }}'
        EncryptionConfigurationDetails: '{{ item.EncryptionConfigurationDetails }}'
        IdentityStoreId: '{{ item.IdentityStoreId }}'
        InstanceAccessControlAttributeConfiguration: '{{ item.InstanceAccessControlAttributeConfiguration
          }}'
        InstanceArn: '{{ item.InstanceArn }}'
        Name: '{{ item.Name }}'
        OwnerAccountId: '{{ item.OwnerAccountId }}'
        PermissionSetProvisioningStatus: '{{ item.PermissionSetProvisioningStatus }}'
        Status: '{{ item.Status }}'
        StatusReason: '{{ item.StatusReason }}'
      items_for: '{{ response.Instances }}'
  - calls:
    - action: describe_permission_set
      on_error: continue
      params:
        InstanceArn: '{{ item.InstanceArn }}'
        PermissionSetArn: '{{ item.PermissionSetArn }}'
      save_as: response
    discovery_id: aws.sso-admin.describe_permission_set
    emit:
      as: item
      item:
        CreatedDate: '{{ response.PermissionSet.CreatedDate }}'
        Description: '{{ response.PermissionSet.Description }}'
        Name: '{{ response.PermissionSet.Name }}'
        PermissionSetArn: '{{ response.PermissionSet.PermissionSetArn }}'
        RelayState: '{{ response.PermissionSet.RelayState }}'
