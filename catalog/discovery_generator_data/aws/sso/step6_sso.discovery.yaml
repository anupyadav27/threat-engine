# Auto-generated: minimum discoveries for check rules + inventory identifiers
# Sources: sso-admin
# 3 ops (3 from checks, +0 for inventory)
version: '1.0'
provider: aws
service: sso
discovery:
  - calls:
    - action: get_inline_policy_for_permission_set
      on_error: continue
      save_as: response
    discovery_id: aws.sso-admin.get_inline_policy_for_permission_set
    emit:
      as: item
      item:
        Statement: '{{ response.Statement }}'
        Version: '{{ response.Version }}'
  - calls:
