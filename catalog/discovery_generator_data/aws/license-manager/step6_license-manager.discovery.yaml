version: '1.0'
provider: aws
service: license-manager
services:
  client: license-manager
  module: boto3.client
discovery:
- discovery_id: aws.license-manager.get_service_settings
  calls:
  - action: get_service_settings
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.CrossRegionDiscoverySourceRegions }}'
    item:
      CrossRegionDiscoveryHomeRegion: '{{ item.CrossRegionDiscoveryHomeRegion }}'
      CrossRegionDiscoverySourceRegions: '{{ item.CrossRegionDiscoverySourceRegions
        }}'
      EnableCrossAccountsDiscovery: '{{ item.EnableCrossAccountsDiscovery }}'
      Enabled: '{{ item.Enabled }}'
      LicenseManagerResourceShareArn: '{{ item.LicenseManagerResourceShareArn }}'
      OrganizationConfiguration: '{{ item.OrganizationConfiguration }}'
      S3BucketArn: '{{ item.S3BucketArn }}'
      ServiceStatus: '{{ item.ServiceStatus }}'
      SnsTopicArn: '{{ item.SnsTopicArn }}'
- discovery_id: aws.license-manager.list_distributed_grants
  calls:
  - action: list_distributed_grants
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Grants }}'
    item:
      Grant: '{{ item.Grant }}'
      GrantArn: '{{ item.GrantArn }}'
      GrantName: '{{ item.GrantName }}'
      GrantStatus: '{{ item.GrantStatus }}'
      GrantedOperations: '{{ item.GrantedOperations }}'
      GranteePrincipalArn: '{{ item.GranteePrincipalArn }}'
      HomeRegion: '{{ item.HomeRegion }}'
      LicenseArn: '{{ item.LicenseArn }}'
      Options: '{{ item.Options }}'
      ParentArn: '{{ item.ParentArn }}'
      StatusReason: '{{ item.StatusReason }}'
      Version: '{{ item.Version }}'
- discovery_id: aws.license-manager.list_license_asset_groups
  calls:
  - action: list_license_asset_groups
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.LicenseAssetGroups }}'
    item:
      Name: '{{ item.Name }}'
      Status: '{{ item.Status }}'
      AssociatedLicenseAssetRulesetARNs: '{{ item.AssociatedLicenseAssetRulesetARNs
        }}'
      Description: '{{ item.Description }}'
      LatestResourceDiscoveryTime: '{{ item.LatestResourceDiscoveryTime }}'
      LatestUsageAnalysisTime: '{{ item.LatestUsageAnalysisTime }}'
      LicenseAssetGroupArn: '{{ item.LicenseAssetGroupArn }}'
      LicenseAssetGroupConfigurations: '{{ item.LicenseAssetGroupConfigurations }}'
      Properties: '{{ item.Properties }}'
      StatusMessage: '{{ item.StatusMessage }}'
- discovery_id: aws.license-manager.list_license_asset_rulesets
