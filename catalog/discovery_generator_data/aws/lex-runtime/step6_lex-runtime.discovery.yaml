# ============================================================
# Discovery YAML — lex-runtime (AWS)
# Generated: 2026-02-21T04:56:58Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: lex-runtime
services:
  client: lex-runtime
  module: boto3.client
discovery:
  # ── Dependent read operations (require identifiers) ──
  # ── GetSession ──
  - discovery_id: aws.lex-runtime.get_session
    calls:
      - action: get_session
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.recentIntentSummaryView }}'
      item:
        checkpointLabel: '{{ item.checkpointLabel }}'
        confirmationStatus: '{{ item.confirmationStatus }}'
        dialogActionType: '{{ item.dialogActionType }}'
        fulfillmentState: '{{ item.fulfillmentState }}'
        intentName: '{{ item.intentName }}'
        slotToElicit: '{{ item.slotToElicit }}'
        slots: '{{ item.slots }}'
