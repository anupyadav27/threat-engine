version: '1.0'
provider: aws
service: lex-runtime
services:
  client: lex-runtime
  module: boto3.client
discovery:
- discovery_id: aws.lex-runtime.get_session
  calls:
  - action: get_session
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.recentIntentSummaryView }}'
    item:
      checkpointLabel: '{{ item.checkpointLabel }}'
      confirmationStatus: '{{ item.confirmationStatus }}'
      dialogActionType: '{{ item.dialogAction.type }}'
      fulfillmentState: '{{ item.fulfillmentState }}'
      intentName: '{{ item.intentName }}'
      slotToElicit: '{{ item.slotToElicit }}'
      slots: '{{ item.slots }}'
      message: '{{ response.dialogAction.message }}'
      messageFormat: '{{ response.dialogAction.messageFormat }}'
      type: '{{ response.dialogAction.type }}'
      sessionAttributes: '{{ response.sessionAttributes }}'
      sessionId: '{{ response.sessionId }}'
