# ============================================================
# Discovery YAML — sagemaker-edge (AWS)
# Generated: 2026-02-21T04:56:59Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: sagemaker-edge
services:
  client: sagemaker-edge
  module: boto3.client
discovery:
  # ── Dependent read operations (require identifiers) ──
  # ── GetDeployments ──
  - discovery_id: aws.sagemaker-edge.get_deployments
    calls:
      - action: get_deployments
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Deployments }}'
      item:
        Definitions: '{{ item.Definitions }}'
        DeploymentName: '{{ item.DeploymentName }}'
        Deployments: '{{ item.Deployments }}'
        FailureHandlingPolicy: '{{ item.FailureHandlingPolicy }}'
        Statement: '{{ item.Statement }}'
        Type: '{{ item.Type }}'
        Version: '{{ item.Version }}'
  # ── GetDeviceRegistration ──
  - discovery_id: aws.sagemaker-edge.get_device_registration
    calls:
      - action: get_device_registration
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        CacheTTL: '{{ response.CacheTTL }}'
        DeviceRegistration: '{{ response.DeviceRegistration }}'
