# discoveries_only_check: 4 kept / 7 removed from 11 total
# generated_from: step6_efs.discovery.yaml
# purpose: only discoveries needed by efs.checks.yaml for_each chains
version: '1.0'
provider: aws
service: efs
services:
  client: efs
  module: boto3.client
discovery:
- discovery_id: aws.efs.describe_access_points
  calls:
  - action: describe_access_points
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.AccessPoints }}'
    item:
      Name: '{{ item.Name }}'
      OwnerId: '{{ item.OwnerId }}'
      Policy: '{{ item.Policy }}'
      Tags: '{{ item.Tags }}'
      AccessPointArn: '{{ item.AccessPointArn }}'
      AccessPointId: '{{ item.AccessPointId }}'
      AccessPoints: '{{ item.AccessPoints }}'
      ClientToken: '{{ item.ClientToken }}'
      FileSystemId: '{{ item.FileSystemId }}'
      LifeCycleState: '{{ item.LifeCycleState }}'
      PosixUser: '{{ item.PosixUser }}'
      RootDirectory: '{{ item.RootDirectory }}'
- discovery_id: aws.efs.describe_file_systems
  calls:
  - action: describe_file_systems
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.FileSystems }}'
    item:
      CreationTime: '{{ item.CreationTime }}'
      Encrypted: '{{ item.Encrypted }}'
      KmsKeyId: '{{ item.KmsKeyId }}'
      Name: '{{ item.Name }}'
      OwnerId: '{{ item.OwnerId }}'
      Tags: '{{ item.Tags }}'
      AvailabilityZoneId: '{{ item.AvailabilityZoneId }}'
      AvailabilityZoneName: '{{ item.AvailabilityZoneName }}'
      CreationToken: '{{ item.CreationToken }}'
      FileSystemArn: '{{ item.FileSystemArn }}'
      FileSystemId: '{{ item.FileSystemId }}'
      FileSystemProtection: '{{ item.FileSystemProtection }}'
      FileSystems: '{{ item.FileSystems }}'
      LifeCycleState: '{{ item.LifeCycleState }}'
      NumberOfMountTargets: '{{ item.NumberOfMountTargets }}'
      PerformanceMode: '{{ item.PerformanceMode }}'
      ProvisionedThroughputInMibps: '{{ item.ProvisionedThroughputInMibps }}'
      SizeInBytes: '{{ item.SizeInBytes }}'
      ThroughputMode: '{{ item.ThroughputMode }}'
- discovery_id: aws.efs.describe_mount_targets
  calls:
  - action: describe_mount_targets
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.MountTargets }}'
    item:
      OwnerId: '{{ item.OwnerId }}'
      SubnetId: '{{ item.SubnetId }}'
      VpcId: '{{ item.VpcId }}'
      AvailabilityZoneId: '{{ item.AvailabilityZoneId }}'
      AvailabilityZoneName: '{{ item.AvailabilityZoneName }}'
      FileSystemId: '{{ item.FileSystemId }}'
      IpAddress: '{{ item.IpAddress }}'
      Ipv6Address: '{{ item.Ipv6Address }}'
      LifeCycleState: '{{ item.LifeCycleState }}'
      MountTargetId: '{{ item.MountTargetId }}'
      MountTargets: '{{ item.MountTargets }}'
      NetworkInterfaceId: '{{ item.NetworkInterfaceId }}'
- discovery_id: aws.efs.describe_backup_policy
  for_each: aws.efs.describe_access_points
  calls:
  - action: describe_backup_policy
    params:
      FileSystemId: '{{ item.FileSystemId }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      Status: '{{ response.BackupPolicy.Status }}'
      BackupPolicy: '{{ response.BackupPolicy.BackupPolicy }}'
      Statement: '{{ response.BackupPolicy.Statement }}'
      Version: '{{ response.BackupPolicy.Version }}'
