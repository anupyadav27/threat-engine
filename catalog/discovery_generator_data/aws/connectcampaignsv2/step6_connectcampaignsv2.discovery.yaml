version: '1.0'
provider: aws
service: connectcampaignsv2
services:
  client: connectcampaignsv2
  module: boto3.client
discovery:
- discovery_id: aws.connectcampaignsv2.list_campaigns
  calls:
  - action: list_campaigns
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.campaignSummaryList }}'
    item:
      arn: '{{ item.arn }}'
      campaign: '{{ item.campaign }}'
      channelSubtypeConfig: '{{ item.channelSubtypeConfig }}'
      channelSubtypes: '{{ item.channelSubtypes }}'
      communicationLimitsOverride: '{{ item.communicationLimitsOverride }}'
      communicationTimeConfig: '{{ item.communicationTimeConfig }}'
      connectCampaignFlowArn: '{{ item.connectCampaignFlowArn }}'
      connectInstanceId: '{{ item.connectInstanceId }}'
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      schedule: '{{ item.schedule }}'
      source: '{{ item.source }}'
      tags: '{{ item.tags }}'
      nextToken: '{{ response.nextToken }}'
- discovery_id: aws.connectcampaignsv2.describe_campaign
  for_each: aws.connectcampaignsv2.list_campaigns
  calls:
  - action: describe_campaign
    params:
      id: '{{ item.id }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      arn: '{{ response.campaign.arn }}'
      campaign: '{{ response.campaign.campaign }}'
      channelSubtypeConfig: '{{ response.campaign.channelSubtypeConfig }}'
      communicationLimitsOverride: '{{ response.campaign.communicationLimitsOverride }}'
      communicationTimeConfig: '{{ response.campaign.communicationTimeConfig }}'
      connectCampaignFlowArn: '{{ response.campaign.connectCampaignFlowArn }}'
      connectInstanceId: '{{ response.campaign.connectInstanceId }}'
      id: '{{ response.campaign.id }}'
      name: '{{ response.campaign.name }}'
      schedule: '{{ response.campaign.schedule }}'
      source: '{{ response.campaign.source }}'
      tags: '{{ response.campaign.tags }}'
      capacity: '{{ response.campaign.channelSubtypeConfig.email.capacity }}'
      connectSourceEmailAddress: '{{ response.campaign.channelSubtypeConfig.email.defaultOutboundConfig.connectSourceEmailAddress }}'
      sourceEmailAddressDisplayName: '{{ response.campaign.channelSubtypeConfig.email.defaultOutboundConfig.sourceEmailAddressDisplayName }}'
      wisdomTemplateArn: '{{ response.campaign.channelSubtypeConfig.email.defaultOutboundConfig.wisdomTemplateArn }}'
      connectSourcePhoneNumberArn: '{{ response.campaign.channelSubtypeConfig.sms.defaultOutboundConfig.connectSourcePhoneNumberArn }}'
      connectQueueId: '{{ response.campaign.channelSubtypeConfig.telephony.connectQueueId }}'
      connectContactFlowId: '{{ response.campaign.channelSubtypeConfig.telephony.defaultOutboundConfig.connectContactFlowId }}'
      connectSourcePhoneNumber: '{{ response.campaign.channelSubtypeConfig.telephony.defaultOutboundConfig.connectSourcePhoneNumber }}'
      dailyHours: '{{ response.campaign.communicationTimeConfig.email.openHours.dailyHours }}'
      defaultTimeZone: '{{ response.campaign.communicationTimeConfig.localTimeZoneConfig.defaultTimeZone }}'
      endTime: '{{ response.campaign.schedule.endTime }}'
      refreshFrequency: '{{ response.campaign.schedule.refreshFrequency }}'
      startTime: '{{ response.campaign.schedule.startTime }}'
      customerProfilesSegmentArn: '{{ response.campaign.source.customerProfilesSegmentArn }}'
      customerProfilesDomainArn: '{{ response.campaign.source.eventTrigger.customerProfilesDomainArn }}'
- discovery_id: aws.connectcampaignsv2.get_campaign_state
  for_each: aws.connectcampaignsv2.list_campaigns
  calls:
  - action: get_campaign_state
    params:
      id: '{{ item.id }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      state: '{{ response.state }}'
- discovery_id: aws.connectcampaignsv2.get_campaign_state_batch
  calls:
  - action: get_campaign_state_batch
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.successfulRequests }}'
    item:
      campaignId: '{{ item.campaignId }}'
      state: '{{ item.state }}'
- discovery_id: aws.connectcampaignsv2.get_connect_instance_config
  for_each: aws.connectcampaignsv2.list_campaigns
  calls:
  - action: get_connect_instance_config
    params:
      connectInstanceId: '{{ item.connectInstanceId }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      connectInstanceId: '{{ response.connectInstanceConfig.connectInstanceId }}'
      encryptionConfig: '{{ response.connectInstanceConfig.encryptionConfig.keyArn }}'
      serviceLinkedRoleArn: '{{ response.connectInstanceConfig.serviceLinkedRoleArn }}'
      enabled: '{{ response.connectInstanceConfig.encryptionConfig.enabled }}'
      encryptionType: '{{ response.connectInstanceConfig.encryptionConfig.encryptionType }}'
      keyArn: '{{ response.connectInstanceConfig.encryptionConfig.keyArn }}'
- discovery_id: aws.connectcampaignsv2.get_instance_communication_limits
  for_each: aws.connectcampaignsv2.list_campaigns
  calls:
  - action: get_instance_communication_limits
    params:
      connectInstanceId: '{{ item.connectInstanceId }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      allChannelSubtypes: '{{ response.communicationLimitsConfig.allChannelSubtypes }}'
- discovery_id: aws.connectcampaignsv2.get_instance_onboarding_job_status
  for_each: aws.connectcampaignsv2.list_campaigns
  calls:
  - action: get_instance_onboarding_job_status
    params:
      connectInstanceId: '{{ item.connectInstanceId }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      connectInstanceId: '{{ response.connectInstanceOnboardingJobStatus.connectInstanceId }}'
      failureCode: '{{ response.connectInstanceOnboardingJobStatus.failureCode }}'
      status: '{{ response.connectInstanceOnboardingJobStatus.status }}'
- discovery_id: aws.connectcampaignsv2.list_connect_instance_integrations
  for_each: aws.connectcampaignsv2.list_campaigns
  calls:
  - action: list_connect_instance_integrations
    params:
      connectInstanceId: '{{ item.connectInstanceId }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.integrationSummaryList }}'
    item:
      customerProfiles: '{{ item.customerProfiles }}'
      qConnect: '{{ item.qConnect }}'
      nextToken: '{{ response.nextToken }}'
- discovery_id: aws.connectcampaignsv2.list_tags_for_resource
  for_each: aws.connectcampaignsv2.list_campaigns
  calls:
  - action: list_tags_for_resource
    params:
      arn: '{{ item.arn }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      tags: '{{ response.tags }}'
