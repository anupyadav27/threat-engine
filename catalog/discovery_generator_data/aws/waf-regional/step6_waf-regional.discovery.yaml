    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      Name: '{{ response.XssMatchSet.Name }}'
      XssMatchSetId: '{{ response.XssMatchSet.XssMatchSetId }}'
      XssMatchTuples: '{{ response.XssMatchSet.XssMatchTuples }}'
- discovery_id: aws.waf-regional.list_resources_for_web_acl
  calls:
  - action: list_resources_for_web_acl
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ResourceArns }}'
- discovery_id: aws.waf-regional.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      ResourceARN: '{{ response.TagInfoForResource.ResourceARN }}'
      TagList: '{{ response.TagInfoForResource.TagList }}'
