      WebACLId: '{{ response.WebACLSummary.WebACLId }}'
      WebACLSummary: '{{ response.WebACLSummary.WebACLSummary }}'
- discovery_id: aws.waf-regional.get_xss_match_set
  for_each: aws.waf-regional.list_xss_match_sets
