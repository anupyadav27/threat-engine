      DefaultAction: '{{ response.WebACL.DefaultAction }}'
      MetricName: '{{ response.WebACL.MetricName }}'
      Rules: '{{ response.WebACL.Rules }}'
      WebACLArn: '{{ response.WebACL.WebACLArn }}'
      WebACLId: '{{ response.WebACL.WebACLId }}'
- discovery_id: aws.waf-regional.get_web_acl_for_resource
  for_each: aws.waf-regional.list_logging_configurations
  calls:
  - action: get_web_acl_for_resource
    params:
      ResourceArn: '{{ item.ResourceArn }}'
    save_as: response
    on_error: continue
  emit:
