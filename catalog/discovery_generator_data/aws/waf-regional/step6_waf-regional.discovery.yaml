version: '1.0'
provider: aws
service: waf-regional
services:
  client: waf-regional
  module: boto3.client
discovery:
- discovery_id: aws.waf-regional.get_change_token
  calls:
  - action: get_change_token
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      ChangeToken: '{{ response.ChangeToken }}'
      ChangeTokenStatus: '{{ response.ChangeTokenStatus }}'
- discovery_id: aws.waf-regional.list_activated_rules_in_rule_group
  calls:
  - action: list_activated_rules_in_rule_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ActivatedRules }}'
    item:
      Action: '{{ item.Action }}'
      ExcludedRules: '{{ item.ExcludedRules }}'
      OverrideAction: '{{ item.OverrideAction }}'
      Priority: '{{ item.Priority }}'
      RuleId: '{{ item.RuleId }}'
      Type: '{{ item.Type }}'
- discovery_id: aws.waf-regional.list_byte_match_sets
  calls:
  - action: list_byte_match_sets
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ByteMatchSets }}'
    item:
      Name: '{{ item.Name }}'
      ByteMatchSetId: '{{ item.ByteMatchSetId }}'
- discovery_id: aws.waf-regional.list_geo_match_sets
  calls:
  - action: list_geo_match_sets
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.GeoMatchSets }}'
    item:
      Name: '{{ item.Name }}'
      GeoMatchSetId: '{{ item.GeoMatchSetId }}'
- discovery_id: aws.waf-regional.list_ip_sets
  calls:
  - action: list_ip_sets
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.IPSets }}'
    item:
      Name: '{{ item.Name }}'
      IPSetId: '{{ item.IPSetId }}'
- discovery_id: aws.waf-regional.list_logging_configurations
  calls:
  - action: list_logging_configurations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.LoggingConfigurations }}'
    item:
      ResourceArn: '{{ item.ResourceArn }}'
      Status: '{{ item.Status }}'
      Enabled: '{{ item.Enabled }}'
      LogDestinationConfigs: '{{ item.LogDestinationConfigs }}'
      RedactedFields: '{{ item.RedactedFields }}'
- discovery_id: aws.waf-regional.list_rate_based_rules
  calls:
  - action: list_rate_based_rules
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Rules }}'
    item:
      Name: '{{ item.Name }}'
      RuleId: '{{ item.RuleId }}'
- discovery_id: aws.waf-regional.list_regex_match_sets
  calls:
  - action: list_regex_match_sets
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.RegexMatchSets }}'
    item:
      Name: '{{ item.Name }}'
      RegexMatchSetId: '{{ item.RegexMatchSetId }}'
- discovery_id: aws.waf-regional.list_regex_pattern_sets
  calls:
  - action: list_regex_pattern_sets
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.RegexPatternSets }}'
    item:
      Name: '{{ item.Name }}'
      RegexPatternSetId: '{{ item.RegexPatternSetId }}'
- discovery_id: aws.waf-regional.list_rule_groups
  calls:
  - action: list_rule_groups
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.RuleGroups }}'
    item:
      Name: '{{ item.Name }}'
      RuleGroupId: '{{ item.RuleGroupId }}'
- discovery_id: aws.waf-regional.list_rules
  calls:
  - action: list_rules
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Rules }}'
    item:
      Name: '{{ item.Name }}'
      RuleId: '{{ item.RuleId }}'
- discovery_id: aws.waf-regional.list_size_constraint_sets
  calls:
  - action: list_size_constraint_sets
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.SizeConstraintSets }}'
    item:
      Name: '{{ item.Name }}'
      SizeConstraintSetId: '{{ item.SizeConstraintSetId }}'
- discovery_id: aws.waf-regional.list_sql_injection_match_sets
  calls:
  - action: list_sql_injection_match_sets
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.SqlInjectionMatchSets }}'
    item:
      Name: '{{ item.Name }}'
      SqlInjectionMatchSetId: '{{ item.SqlInjectionMatchSetId }}'
- discovery_id: aws.waf-regional.list_subscribed_rule_groups
  calls:
  - action: list_subscribed_rule_groups
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.RuleGroups }}'
    item:
      Name: '{{ item.Name }}'
      MetricName: '{{ item.MetricName }}'
      RuleGroupId: '{{ item.RuleGroupId }}'
- discovery_id: aws.waf-regional.list_web_ac_ls
  calls:
  - action: list_web_ac_ls
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.WebACLs }}'
    item:
      Name: '{{ item.Name }}'
      WebACLId: '{{ item.WebACLId }}'
- discovery_id: aws.waf-regional.list_xss_match_sets
  calls:
  - action: list_xss_match_sets
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.XssMatchSets }}'
    item:
      Name: '{{ item.Name }}'
      XssMatchSetId: '{{ item.XssMatchSetId }}'
- discovery_id: aws.waf-regional.get_byte_match_set
  for_each: aws.waf-regional.list_byte_match_sets
  calls:
  - action: get_byte_match_set
    params:
      ByteMatchSetId: '{{ item.ByteMatchSetId }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      Name: '{{ response.ByteMatchSet.Name }}'
      ByteMatchSetId: '{{ response.ByteMatchSet.ByteMatchSetId }}'
      ByteMatchTuples: '{{ response.ByteMatchSet.ByteMatchTuples }}'
- discovery_id: aws.waf-regional.get_change_token_status
  for_each: aws.waf-regional.get_change_token
  calls:
  - action: get_change_token_status
    params:
      ChangeToken: '{{ item.ChangeToken }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      ChangeTokenStatus: '{{ response.ChangeTokenStatus }}'
- discovery_id: aws.waf-regional.get_geo_match_set
  for_each: aws.waf-regional.list_geo_match_sets
  calls:
  - action: get_geo_match_set
    params:
      GeoMatchSetId: '{{ item.GeoMatchSetId }}'
    save_as: response
    on_error: continue
  emit:
