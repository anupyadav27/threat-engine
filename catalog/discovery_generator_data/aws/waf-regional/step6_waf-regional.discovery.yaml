    item:
      Name: '{{ response.GeoMatchSet.Name }}'
      GeoMatchConstraints: '{{ response.GeoMatchSet.GeoMatchConstraints }}'
      GeoMatchSetId: '{{ response.GeoMatchSet.GeoMatchSetId }}'
- discovery_id: aws.waf-regional.get_ip_set
  for_each: aws.waf-regional.list_ip_sets
  calls:
  - action: get_ip_set
    params:
      IPSetId: '{{ item.IPSetId }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      Name: '{{ response.IPSet.Name }}'
      IPSetDescriptors: '{{ response.IPSet.IPSetDescriptors }}'
      IPSetId: '{{ response.IPSet.IPSetId }}'
- discovery_id: aws.waf-regional.get_logging_configuration
  for_each: aws.waf-regional.list_logging_configurations
  calls:
  - action: get_logging_configuration
    params:
      ResourceArn: '{{ item.ResourceArn }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      ResourceArn: '{{ response.LoggingConfiguration.ResourceArn }}'
      LogDestinationConfigs: '{{ response.LoggingConfiguration.LogDestinationConfigs
        }}'
      RedactedFields: '{{ response.LoggingConfiguration.RedactedFields }}'
- discovery_id: aws.waf-regional.get_permission_policy
  for_each: aws.waf-regional.list_logging_configurations
  calls:
  - action: get_permission_policy
    params:
      ResourceArn: '{{ item.ResourceArn }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      Policy: '{{ response.Policy }}'
      Statement: '{{ response.Statement }}'
      Version: '{{ response.Version }}'
- discovery_id: aws.waf-regional.get_rate_based_rule
  for_each: aws.waf-regional.list_activated_rules_in_rule_group
  calls:
  - action: get_rate_based_rule
    params:
      RuleId: '{{ item.RuleId }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      Name: '{{ response.Rule.Name }}'
      MatchPredicates: '{{ response.Rule.MatchPredicates }}'
      MetricName: '{{ response.Rule.MetricName }}'
      RateKey: '{{ response.Rule.RateKey }}'
      RateLimit: '{{ response.Rule.RateLimit }}'
      RuleId: '{{ response.Rule.RuleId }}'
- discovery_id: aws.waf-regional.get_rate_based_rule_managed_keys
  for_each: aws.waf-regional.list_activated_rules_in_rule_group
  calls:
  - action: get_rate_based_rule_managed_keys
    params:
      RuleId: '{{ item.RuleId }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ManagedKeys }}'
- discovery_id: aws.waf-regional.get_regex_match_set
  for_each: aws.waf-regional.list_regex_match_sets
  calls:
  - action: get_regex_match_set
    params:
      RegexMatchSetId: '{{ item.RegexMatchSetId }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      Name: '{{ response.RegexMatchSet.Name }}'
      RegexMatchSetId: '{{ response.RegexMatchSet.RegexMatchSetId }}'
      RegexMatchTuples: '{{ response.RegexMatchSet.RegexMatchTuples }}'
- discovery_id: aws.waf-regional.get_regex_pattern_set
  for_each: aws.waf-regional.list_regex_pattern_sets
  calls:
  - action: get_regex_pattern_set
    params:
      RegexPatternSetId: '{{ item.RegexPatternSetId }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      Name: '{{ response.RegexPatternSet.Name }}'
      RegexPatternSetId: '{{ response.RegexPatternSet.RegexPatternSetId }}'
      RegexPatternStrings: '{{ response.RegexPatternSet.RegexPatternStrings }}'
- discovery_id: aws.waf-regional.get_rule
  for_each: aws.waf-regional.list_activated_rules_in_rule_group
  calls:
  - action: get_rule
    params:
      RuleId: '{{ item.RuleId }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      Name: '{{ response.Rule.Name }}'
      MetricName: '{{ response.Rule.MetricName }}'
      Predicates: '{{ response.Rule.Predicates }}'
      RuleId: '{{ response.Rule.RuleId }}'
- discovery_id: aws.waf-regional.get_rule_group
  for_each: aws.waf-regional.list_rule_groups
  calls:
  - action: get_rule_group
    params:
      RuleGroupId: '{{ item.RuleGroupId }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      Name: '{{ response.RuleGroup.Name }}'
      MetricName: '{{ response.RuleGroup.MetricName }}'
      RuleGroupId: '{{ response.RuleGroup.RuleGroupId }}'
- discovery_id: aws.waf-regional.get_sampled_requests
  for_each: aws.waf-regional.list_activated_rules_in_rule_group
  calls:
  - action: get_sampled_requests
    params:
      WebAclId: '{{ item.WebAclId }}'
      RuleId: '{{ item.RuleId }}'
      TimeWindow: '{{ item.TimeWindow }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.SampledRequests }}'
    item:
      Action: '{{ item.Action }}'
      Request: '{{ item.Request }}'
      RuleWithinRuleGroup: '{{ item.RuleWithinRuleGroup }}'
      Timestamp: '{{ item.Timestamp }}'
      Weight: '{{ item.Weight }}'
- discovery_id: aws.waf-regional.get_size_constraint_set
  for_each: aws.waf-regional.list_size_constraint_sets
  calls:
  - action: get_size_constraint_set
    params:
      SizeConstraintSetId: '{{ item.SizeConstraintSetId }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      Name: '{{ response.SizeConstraintSet.Name }}'
      SizeConstraintSetId: '{{ response.SizeConstraintSet.SizeConstraintSetId }}'
      SizeConstraints: '{{ response.SizeConstraintSet.SizeConstraints }}'
- discovery_id: aws.waf-regional.get_sql_injection_match_set
  for_each: aws.waf-regional.list_sql_injection_match_sets
  calls:
  - action: get_sql_injection_match_set
    params:
      SqlInjectionMatchSetId: '{{ item.SqlInjectionMatchSetId }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      Name: '{{ response.SqlInjectionMatchSet.Name }}'
      SqlInjectionMatchSetId: '{{ response.SqlInjectionMatchSet.SqlInjectionMatchSetId
        }}'
      SqlInjectionMatchTuples: '{{ response.SqlInjectionMatchSet.SqlInjectionMatchTuples
        }}'
- discovery_id: aws.waf-regional.get_web_acl
  for_each: aws.waf-regional.list_web_ac_ls
  calls:
