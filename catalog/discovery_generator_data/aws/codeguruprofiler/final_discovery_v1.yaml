version: '1.0'
provider: aws
service: codeguruprofiler

services:
  client: codeguruprofiler
  module: "boto3.client('codeguruprofiler')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  []

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.codeguruprofiler.list_profiling_groups  ──
  - discovery_id: aws.codeguruprofiler.list_profiling_groups
    calls:
      - action: list_profiling_groups
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.profilingGroupNames }}'
      item:
        Tags: '{{ item.Tags }}'

