      PolicyName: '{{ response.AssignmentReviewPolicy.PolicyName }}'
      Statement: '{{ response.AssignmentReviewPolicy.Statement }}'
      Version: '{{ response.AssignmentReviewPolicy.Version }}'
- discovery_id: aws.mturk.list_workers_with_qualification_type
  for_each: aws.mturk.list_qualification_requests
  calls:
  - action: list_workers_with_qualification_type
