    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.referenceStores }}'
    item:
      arn: '{{ item.arn }}'
      creationTime: '{{ item.creationTime }}'
      description: '{{ item.description }}'
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      sseConfig: '{{ item.sseConfig }}'
