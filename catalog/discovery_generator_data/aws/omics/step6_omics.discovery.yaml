      creationTime: '{{ item.creationTime }}'
      definition: '{{ item.definition }}'
      id: '{{ item.id }}'
      items: '{{ item.items }}'
      name: '{{ item.name }}'
      parameters: '{{ item.parameters }}'
      status: '{{ item.status }}'
      nextToken: '{{ response.nextToken }}'
