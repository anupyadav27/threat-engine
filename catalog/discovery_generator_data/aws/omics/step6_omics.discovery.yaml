version: '1.0'
provider: aws
service: omics
services:
  client: omics
  module: boto3.client
discovery:
- discovery_id: aws.omics.list_annotation_import_jobs
  calls:
  - action: list_annotation_import_jobs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.annotationImportJobs }}'
    item:
      annotationFields: '{{ item.annotationFields }}'
      completionTime: '{{ item.completionTime }}'
      creationJobId: '{{ item.creationJobId }}'
      creationTime: '{{ item.creationTime }}'
      destinationName: '{{ item.destinationName }}'
      formatOptions: '{{ item.formatOptions }}'
      id: '{{ item.id }}'
      jobStatus: '{{ item.jobStatus }}'
      roleArn: '{{ item.roleArn }}'
      runLeftNormalization: '{{ item.runLeftNormalization }}'
      source: '{{ item.source }}'
      status: '{{ item.status }}'
      tsvVersionOptions: '{{ item.tsvVersionOptions }}'
      updateTime: '{{ item.updateTime }}'
      versionArn: '{{ item.versionArn }}'
      versionName: '{{ item.versionName }}'
      versionOptions: '{{ item.versionOptions }}'
      versionSizeBytes: '{{ item.versionSizeBytes }}'
      nextToken: '{{ response.nextToken }}'
- discovery_id: aws.omics.list_annotation_stores
  calls:
  - action: list_annotation_stores
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.annotationStores }}'
    item:
      creationTime: '{{ item.creationTime }}'
      description: '{{ item.description }}'
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      reference: '{{ item.reference }}'
      sseConfig: '{{ item.sseConfig }}'
      status: '{{ item.status }}'
      statusMessage: '{{ item.statusMessage }}'
      storeArn: '{{ item.storeArn }}'
      storeFormat: '{{ item.storeFormat }}'
      storeSizeBytes: '{{ item.storeSizeBytes }}'
      updateTime: '{{ item.updateTime }}'
      nextToken: '{{ response.nextToken }}'
- discovery_id: aws.omics.list_reference_stores
  calls:
