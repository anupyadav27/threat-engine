# ==========================================================
# Discovery YAML — lightsail (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 8 | ops: 3 independent, 0 dependent
# ==========================================================
version: '1.0'
provider: aws
service: lightsail

services:
  client: lightsail
  module: "boto3.client('lightsail')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: alarm
    identifier_op: aws.lightsail.get_relational_databases
    identifier_field: arn
    item_var_path: item.arn
    identifier_template: '{arn}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.lightsail.get_disks  ──
  - discovery_id: aws.lightsail.get_disks
    calls:
      - action: get_disks
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.disks }}'
      item:
        addOns: '{{ item.addOns }}'
        arn: '{{ item.arn }}'
        attachedTo: '{{ item.attachedTo }}'
        attachmentState: '{{ item.attachmentState }}'
        autoMountStatus: '{{ item.autoMountStatus }}'
        createdAt: '{{ item.createdAt }}'
        disks: '{{ item.disks }}'
        disks[]: '{{ item.disks[].isSystemDisk }}'
        disks[].isSystemDisk: '{{ item.disks[].isSystemDisk }}'
        gbInUse: '{{ item.gbInUse }}'
        iops: '{{ item.iops }}'
        isAttached: '{{ item.isAttached }}'
        isSystemDisk: '{{ item.isSystemDisk }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        path: '{{ item.path }}'
        resourceType: '{{ item.resourceType }}'
        sizeInGb: '{{ item.sizeInGb }}'
        state: '{{ item.state }}'
        supportCode: '{{ item.supportCode }}'
        tags: '{{ item.tags }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.lightsail.get_instances  ──
  - discovery_id: aws.lightsail.get_instances
    calls:
      - action: get_instances
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.instances }}'
      item:
        addOns: '{{ item.addOns }}'
        arn: '{{ item.arn }}'
        blueprintId: '{{ item.blueprintId }}'
        blueprintName: '{{ item.blueprintName }}'
        bundleId: '{{ item.bundleId }}'
        createdAt: '{{ item.createdAt }}'
        hardware: '{{ item.hardware }}'
        instances: '{{ item.instances }}'
        ipAddressType: '{{ item.ipAddressType }}'
        ipv6Addresses: '{{ item.ipv6Addresses }}'
        isStaticIp: '{{ item.isStaticIp }}'
        location: '{{ item.location }}'
        metadataOptions: '{{ item.metadataOptions }}'
        name: '{{ item.name }}'
        networking: '{{ item.networking }}'
        privateIpAddress: '{{ item.privateIpAddress }}'
        publicIpAddress: '{{ item.publicIpAddress }}'
        resourceType: '{{ item.resourceType }}'
        sshKeyName: '{{ item.sshKeyName }}'
        state: '{{ item.state }}'
        supportCode: '{{ item.supportCode }}'
        tags: '{{ item.tags }}'
        username: '{{ item.username }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.lightsail.get_relational_databases  ──
  - discovery_id: aws.lightsail.get_relational_databases
    calls:
      - action: get_relational_databases
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.relationalDatabases }}'
      item:
        Tags: '{{ item.Tags }}'
        arn: '{{ item.arn }}'
        backupRetentionEnabled: '{{ item.backupRetentionEnabled }}'
        caCertificateIdentifier: '{{ item.caCertificateIdentifier }}'
        createdAt: '{{ item.createdAt }}'
        engine: '{{ item.engine }}'
        engineVersion: '{{ item.engineVersion }}'
        hardware: '{{ item.hardware }}'
        latestRestorableTime: '{{ item.latestRestorableTime }}'
        location: '{{ item.location }}'
        masterDatabaseName: '{{ item.masterDatabaseName }}'
        masterEndpoint: '{{ item.masterEndpoint }}'
        masterUsername: '{{ item.masterUsername }}'
        name: '{{ item.name }}'
        parameterApplyStatus: '{{ item.parameterApplyStatus }}'
        pendingMaintenanceActions: '{{ item.pendingMaintenanceActions }}'
        pendingModifiedValues: '{{ item.pendingModifiedValues }}'
        preferredBackupWindow: '{{ item.preferredBackupWindow }}'
        preferredMaintenanceWindow: '{{ item.preferredMaintenanceWindow }}'
        publiclyAccessible: '{{ item.publiclyAccessible }}'
        relationalDatabaseBlueprintId: '{{ item.relationalDatabaseBlueprintId }}'
        relationalDatabaseBundleId: '{{ item.relationalDatabaseBundleId }}'
        relationalDatabases: '{{ item.relationalDatabases }}'
        resourceType: '{{ item.resourceType }}'
        secondaryAvailabilityZone: '{{ item.secondaryAvailabilityZone }}'
        state: '{{ item.state }}'
        supportCode: '{{ item.supportCode }}'
        tags: '{{ item.tags }}'

