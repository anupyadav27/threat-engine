# ==========================================================
# Discovery YAML — dax (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 2 | ops: 1 independent, 0 dependent
# ==========================================================
version: '1.0'
provider: aws
service: dax

services:
  client: dax
  module: "boto3.client('dax')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: cluster
    identifier_op: aws.dax.describe_clusters
    identifier_field: ClusterArn
    item_var_path: item.ClusterArn
    identifier_template: '{clusterarn}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.dax.describe_clusters  ──
  - discovery_id: aws.dax.describe_clusters
    calls:
      - action: describe_clusters
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Clusters }}'
      item:
        ActiveNodes: '{{ item.ActiveNodes }}'
        ClusterArn: '{{ item.ClusterArn }}'
        ClusterDiscoveryEndpoint: '{{ item.ClusterDiscoveryEndpoint }}'
        ClusterEndpointEncryptionType: '{{ item.ClusterEndpointEncryptionType }}'
        ClusterName: '{{ item.ClusterName }}'
        Clusters: '{{ item.Clusters }}'
        Description: '{{ item.Description }}'
        Enabled: '{{ item.Enabled }}'
        IamRoleArn: '{{ item.IamRoleArn }}'
        NetworkType: '{{ item.NetworkType }}'
        NodeIdsToRemove: '{{ item.NodeIdsToRemove }}'
        NodeType: '{{ item.NodeType }}'
        Nodes: '{{ item.Nodes }}'
        NotificationConfiguration: '{{ item.NotificationConfiguration }}'
        ParameterGroup: '{{ item.ParameterGroup }}'
        PreferredMaintenanceWindow: '{{ item.PreferredMaintenanceWindow }}'
        SSEDescription: '{{ item.SSEDescription }}'
        SecurityGroups: '{{ item.SecurityGroups }}'
        Status: '{{ item.Status }}'
        SubnetGroup: '{{ item.SubnetGroup }}'
        TotalNodes: '{{ item.TotalNodes }}'
        item: '{{ item }}'

