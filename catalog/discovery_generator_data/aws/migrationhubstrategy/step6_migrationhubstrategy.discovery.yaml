version: '1.0'
provider: aws
service: migrationhubstrategy
services:
  client: migrationhubstrategy
  module: boto3.client
discovery:
- discovery_id: aws.migrationhubstrategy.get_latest_assessment_id
  calls:
  - action: get_latest_assessment_id
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ response.id }}'
- discovery_id: aws.migrationhubstrategy.get_portfolio_preferences
  calls:
  - action: get_portfolio_preferences
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      applicationMode: '{{ response.applicationMode }}'
      applicationPreferences: '{{ response.applicationPreferences }}'
      databasePreferences: '{{ response.databasePreferences }}'
      managementPreference: '{{ response.managementPreference }}'
      prioritizeBusinessGoals: '{{ response.prioritizeBusinessGoals }}'
      databaseManagementPreference: '{{ response.databasePreferences.databaseManagementPreference }}'
      licenseCostReduction: '{{ response.prioritizeBusinessGoals.businessGoals.licenseCostReduction }}'
      modernizeInfrastructureWithCloudNativeTechnologies: '{{ response.prioritizeBusinessGoals.businessGoals.modernizeInfrastructureWithCloudNativeTechnologies }}'
      reduceOperationalOverheadWithManagedServices: '{{ response.prioritizeBusinessGoals.businessGoals.reduceOperationalOverheadWithManagedServices }}'
      speedOfMigration: '{{ response.prioritizeBusinessGoals.businessGoals.speedOfMigration }}'
- discovery_id: aws.migrationhubstrategy.get_portfolio_summary
  calls:
  - action: get_portfolio_summary
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      antipatternReportS3Object: '{{ response.assessmentSummary.antipatternReportS3Object.s3key }}'
      antipatternReportStatus: '{{ response.assessmentSummary.antipatternReportStatus }}'
      antipatternReportStatusMessage: '{{ response.assessmentSummary.antipatternReportStatusMessage }}'
      assessmentSummary: '{{ response.assessmentSummary.assessmentSummary }}'
      lastAnalyzedTimestamp: '{{ response.assessmentSummary.lastAnalyzedTimestamp }}'
      listAntipatternSeveritySummary: '{{ response.assessmentSummary.listAntipatternSeveritySummary[].count }}'
      listApplicationComponentStatusSummary: '{{ response.assessmentSummary.listApplicationComponentStatusSummary[].count }}'
      listApplicationComponentStrategySummary: '{{ response.assessmentSummary.listApplicationComponentStrategySummary[].count }}'
      listApplicationComponentSummary: '{{ response.assessmentSummary.listApplicationComponentSummary[].count }}'
      listServerStatusSummary: '{{ response.assessmentSummary.listServerStatusSummary[].count }}'
      listServerStrategySummary: '{{ response.assessmentSummary.listServerStrategySummary[].count }}'
      listServerSummary: '{{ response.assessmentSummary.listServerSummary[].count }}'
      s3Bucket: '{{ response.assessmentSummary.antipatternReportS3Object.s3Bucket }}'
      s3key: '{{ response.assessmentSummary.antipatternReportS3Object.s3key }}'
- discovery_id: aws.migrationhubstrategy.list_analyzable_servers
  calls:
  - action: list_analyzable_servers
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.analyzableServers }}'
    item:
      hostname: '{{ item.hostname }}'
      ipAddress: '{{ item.ipAddress }}'
      source: '{{ item.source }}'
      vmId: '{{ item.vmId }}'
      nextToken: '{{ response.nextToken }}'
- discovery_id: aws.migrationhubstrategy.list_application_components
  calls:
  - action: list_application_components
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.applicationComponentInfos }}'
    item:
      analysisStatus: '{{ item.analysisStatus }}'
      antipatternReportS3Object: '{{ item.antipatternReportS3Object }}'
      antipatternReportStatus: '{{ item.antipatternReportStatus }}'
      antipatternReportStatusMessage: '{{ item.antipatternReportStatusMessage }}'
      appType: '{{ item.appType }}'
      appUnitError: '{{ item.appUnitError }}'
      associatedServerId: '{{ item.associatedServerId }}'
      databaseConfigDetail: '{{ item.databaseConfigDetail }}'
      id: '{{ item.id }}'
      inclusionStatus: '{{ item.inclusionStatus }}'
      lastAnalyzedTimestamp: '{{ item.lastAnalyzedTimestamp }}'
      listAntipatternSeveritySummary: '{{ item.listAntipatternSeveritySummary }}'
      moreServerAssociationExists: '{{ item.moreServerAssociationExists }}'
      name: '{{ item.name }}'
      osDriver: '{{ item.osDriver }}'
      osVersion: '{{ item.osVersion }}'
      recommendationSet: '{{ item.recommendationSet }}'
      resourceSubType: '{{ item.resourceSubType }}'
      resultList: '{{ item.resultList }}'
      runtimeStatus: '{{ item.runtimeStatus }}'
      runtimeStatusMessage: '{{ item.runtimeStatusMessage }}'
      sourceCodeRepositories: '{{ item.sourceCodeRepositories }}'
      statusMessage: '{{ item.statusMessage }}'
      nextToken: '{{ response.nextToken }}'
- discovery_id: aws.migrationhubstrategy.list_collectors
  calls:
  - action: list_collectors
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Collectors }}'
    item:
      Status: '{{ item.Status }}'
      Enabled: '{{ item.Enabled }}'
      collectorHealth: '{{ item.collectorHealth }}'
      collectorId: '{{ item.collectorId }}'
      collectorVersion: '{{ item.collectorVersion }}'
      configurationSummary: '{{ item.configurationSummary }}'
      hostName: '{{ item.hostName }}'
      ipAddress: '{{ item.ipAddress }}'
      lastActivityTimeStamp: '{{ item.lastActivityTimeStamp }}'
      registeredTimeStamp: '{{ item.registeredTimeStamp }}'
      nextToken: '{{ response.nextToken }}'
- discovery_id: aws.migrationhubstrategy.list_import_file_task
  calls:
  - action: list_import_file_task
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.taskInfos }}'
    item:
      completionTime: '{{ item.completionTime }}'
      id: '{{ item.id }}'
      importName: '{{ item.importName }}'
      inputS3Bucket: '{{ item.inputS3Bucket }}'
      inputS3Key: '{{ item.inputS3Key }}'
      numberOfRecordsFailed: '{{ item.numberOfRecordsFailed }}'
      numberOfRecordsSuccess: '{{ item.numberOfRecordsSuccess }}'
      startTime: '{{ item.startTime }}'
      status: '{{ item.status }}'
      statusReportS3Bucket: '{{ item.statusReportS3Bucket }}'
      statusReportS3Key: '{{ item.statusReportS3Key }}'
      nextToken: '{{ response.nextToken }}'
- discovery_id: aws.migrationhubstrategy.list_servers
  calls:
  - action: list_servers
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.serverInfos }}'
    item:
      antipatternReportS3Object: '{{ item.antipatternReportS3Object }}'
      antipatternReportStatus: '{{ item.antipatternReportStatus }}'
      antipatternReportStatusMessage: '{{ item.antipatternReportStatusMessage }}'
      applicationComponentStrategySummary: '{{ item.applicationComponentStrategySummary }}'
      dataCollectionStatus: '{{ item.dataCollectionStatus }}'
      id: '{{ item.id }}'
      lastAnalyzedTimestamp: '{{ item.lastAnalyzedTimestamp }}'
      listAntipatternSeveritySummary: '{{ item.listAntipatternSeveritySummary }}'
      name: '{{ item.name }}'
      recommendationSet: '{{ item.recommendationSet }}'
      serverError: '{{ item.serverError }}'
      serverType: '{{ item.serverType }}'
      statusMessage: '{{ item.statusMessage }}'
      systemInfo: '{{ item.systemInfo }}'
      nextToken: '{{ response.nextToken }}'
- discovery_id: aws.migrationhubstrategy.get_application_component_details
  calls:
  - action: get_application_component_details
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.associatedApplications }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      analysisStatus: '{{ response.applicationComponentDetail.analysisStatus }}'
      s3Bucket: '{{ response.applicationComponentDetail.antipatternReportS3Object.s3Bucket }}'
      s3key: '{{ response.applicationComponentDetail.antipatternReportS3Object.s3key }}'
      antipatternReportStatus: '{{ response.applicationComponentDetail.antipatternReportStatus }}'
      antipatternReportStatusMessage: '{{ response.applicationComponentDetail.antipatternReportStatusMessage }}'
      appType: '{{ response.applicationComponentDetail.appType }}'
      appUnitErrorCategory: '{{ response.applicationComponentDetail.appUnitError.appUnitErrorCategory }}'
      associatedServerId: '{{ response.applicationComponentDetail.associatedServerId }}'
      secretName: '{{ response.applicationComponentDetail.databaseConfigDetail.secretName }}'
      inclusionStatus: '{{ response.applicationComponentDetail.inclusionStatus }}'
      lastAnalyzedTimestamp: '{{ response.applicationComponentDetail.lastAnalyzedTimestamp }}'
      moreServerAssociationExists: '{{ response.applicationComponentDetail.moreServerAssociationExists }}'
      osDriver: '{{ response.applicationComponentDetail.osDriver }}'
      osVersion: '{{ response.applicationComponentDetail.osVersion }}'
      strategy: '{{ response.applicationComponentDetail.recommendationSet.strategy }}'
      targetDestination: '{{ response.applicationComponentDetail.recommendationSet.targetDestination }}'
      description: '{{ response.applicationComponentDetail.recommendationSet.transformationTool.description }}'
      tranformationToolInstallationLink: '{{ response.applicationComponentDetail.recommendationSet.transformationTool.tranformationToolInstallationLink }}'
      resourceSubType: '{{ response.applicationComponentDetail.resourceSubType }}'
      runtimeStatus: '{{ response.applicationComponentDetail.runtimeStatus }}'
      runtimeStatusMessage: '{{ response.applicationComponentDetail.runtimeStatusMessage }}'
      statusMessage: '{{ response.applicationComponentDetail.statusMessage }}'
      moreApplicationResource: '{{ response.moreApplicationResource }}'
- discovery_id: aws.migrationhubstrategy.get_application_component_strategies
  calls:
  - action: get_application_component_strategies
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.applicationComponentStrategies }}'
    item:
      isPreferred: '{{ item.isPreferred }}'
      recommendation: '{{ item.recommendation }}'
      status: '{{ item.status }}'
- discovery_id: aws.migrationhubstrategy.get_assessment
  for_each: aws.migrationhubstrategy.get_latest_assessment_id
  calls:
  - action: get_assessment
    params:
      id: '{{ item.id }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.assessmentTargets }}'
    item:
      condition: '{{ item.condition }}'
      name: '{{ item.name }}'
      values: '{{ item.values }}'
      completionTime: '{{ response.dataCollectionDetails.completionTime }}'
      failed: '{{ response.dataCollectionDetails.failed }}'
      inProgress: '{{ response.dataCollectionDetails.inProgress }}'
      servers: '{{ response.dataCollectionDetails.servers }}'
      startTime: '{{ response.dataCollectionDetails.startTime }}'
      status: '{{ response.dataCollectionDetails.status }}'
      statusMessage: '{{ response.dataCollectionDetails.statusMessage }}'
      success: '{{ response.dataCollectionDetails.success }}'
      id: '{{ response.id }}'
- discovery_id: aws.migrationhubstrategy.get_import_file_task
  for_each: aws.migrationhubstrategy.get_latest_assessment_id
  calls:
  - action: get_import_file_task
    params:
      id: '{{ item.id }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      completionTime: '{{ response.completionTime }}'
      id: '{{ response.id }}'
      importName: '{{ response.importName }}'
      inputS3Bucket: '{{ response.inputS3Bucket }}'
      inputS3Key: '{{ response.inputS3Key }}'
      numberOfRecordsFailed: '{{ response.numberOfRecordsFailed }}'
      numberOfRecordsSuccess: '{{ response.numberOfRecordsSuccess }}'
      startTime: '{{ response.startTime }}'
      status: '{{ response.status }}'
      statusReportS3Bucket: '{{ response.statusReportS3Bucket }}'
      statusReportS3Key: '{{ response.statusReportS3Key }}'
- discovery_id: aws.migrationhubstrategy.get_recommendation_report_details
  for_each: aws.migrationhubstrategy.get_latest_assessment_id
  calls:
  - action: get_recommendation_report_details
    params:
      id: '{{ item.id }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      completionTime: '{{ response.recommendationReportDetails.completionTime }}'
      s3Bucket: '{{ response.recommendationReportDetails.s3Bucket }}'
      s3Keys: '{{ response.recommendationReportDetails.s3Bucket }}'
      startTime: '{{ response.recommendationReportDetails.startTime }}'
      status: '{{ response.recommendationReportDetails.status }}'
      statusMessage: '{{ response.recommendationReportDetails.statusMessage }}'
      id: '{{ response.id }}'
- discovery_id: aws.migrationhubstrategy.get_server_details
  calls:
  - action: get_server_details
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.associatedApplications }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      nextToken: '{{ response.nextToken }}'
      s3Bucket: '{{ response.serverDetail.antipatternReportS3Object.s3Bucket }}'
      s3key: '{{ response.serverDetail.antipatternReportS3Object.s3key }}'
      antipatternReportStatus: '{{ response.serverDetail.antipatternReportStatus }}'
      antipatternReportStatusMessage: '{{ response.serverDetail.antipatternReportStatusMessage }}'
      dataCollectionStatus: '{{ response.serverDetail.dataCollectionStatus }}'
      lastAnalyzedTimestamp: '{{ response.serverDetail.lastAnalyzedTimestamp }}'
      strategy: '{{ response.serverDetail.recommendationSet.strategy }}'
      targetDestination: '{{ response.serverDetail.recommendationSet.targetDestination }}'
      description: '{{ response.serverDetail.recommendationSet.transformationTool.description }}'
      tranformationToolInstallationLink: '{{ response.serverDetail.recommendationSet.transformationTool.tranformationToolInstallationLink }}'
      serverErrorCategory: '{{ response.serverDetail.serverError.serverErrorCategory }}'
      serverType: '{{ response.serverDetail.serverType }}'
      statusMessage: '{{ response.serverDetail.statusMessage }}'
      cpuArchitecture: '{{ response.serverDetail.systemInfo.cpuArchitecture }}'
      fileSystemType: '{{ response.serverDetail.systemInfo.fileSystemType }}'
      type: '{{ response.serverDetail.systemInfo.osInfo.type }}'
      version: '{{ response.serverDetail.systemInfo.osInfo.version }}'
- discovery_id: aws.migrationhubstrategy.get_server_strategies
  calls:
  - action: get_server_strategies
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.serverStrategies }}'
    item:
      isPreferred: '{{ item.isPreferred }}'
      numberOfApplicationComponents: '{{ item.numberOfApplicationComponents }}'
      recommendation: '{{ item.recommendation }}'
      status: '{{ item.status }}'
