    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.offerings }}'
    item:
      description: '{{ item.description }}'
      id: '{{ item.id }}'
      platform: '{{ item.platform }}'
      recurringCharges: '{{ item.recurringCharges }}'
      type: '{{ item.type }}'
      nextToken: '{{ response.nextToken }}'
- discovery_id: aws.devicefarm.list_projects
  calls:
