version: '1.0'
provider: aws
service: devicefarm
services:
  client: devicefarm
  module: boto3.client
discovery:
- discovery_id: aws.devicefarm.get_account_settings
  calls:
  - action: get_account_settings
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      DestinationArn: '{{ response.accountSettings.DestinationArn }}'
      Enabled: '{{ response.accountSettings.Enabled }}'
      Format: '{{ response.accountSettings.Format }}'
      Level: '{{ response.accountSettings.Level }}'
      accountSettings: '{{ response.accountSettings.accountSettings }}'
      awsAccountNumber: '{{ response.accountSettings.awsAccountNumber }}'
      defaultJobTimeoutMinutes: '{{ response.accountSettings.defaultJobTimeoutMinutes }}'
      maxJobTimeoutMinutes: '{{ response.accountSettings.maxJobTimeoutMinutes }}'
      maxSlots: '{{ response.accountSettings.maxSlots }}'
      skipAppResign: '{{ response.accountSettings.skipAppResign }}'
      trialMinutes: '{{ response.accountSettings.trialMinutes.total }}'
      unmeteredDevices: '{{ response.accountSettings.unmeteredDevices }}'
      unmeteredRemoteAccessDevices: '{{ response.accountSettings.unmeteredRemoteAccessDevices }}'
      remaining: '{{ response.accountSettings.trialMinutes.remaining }}'
      total: '{{ response.accountSettings.trialMinutes.total }}'
- discovery_id: aws.devicefarm.get_offering_status
  calls:
  - action: get_offering_status
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      current: '{{ response.current }}'
      nextPeriod: '{{ response.nextPeriod }}'
      nextToken: '{{ response.nextToken }}'
- discovery_id: aws.devicefarm.get_test_grid_session
  calls:
  - action: get_test_grid_session
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      arn: '{{ response.testGridSession.arn }}'
      billingMinutes: '{{ response.testGridSession.billingMinutes }}'
      created: '{{ response.testGridSession.created }}'
      ended: '{{ response.testGridSession.ended }}'
      seleniumProperties: '{{ response.testGridSession.seleniumProperties }}'
      status: '{{ response.testGridSession.status }}'
      testGridSession: '{{ response.testGridSession.testGridSession }}'
- discovery_id: aws.devicefarm.list_device_instances
  calls:
  - action: list_device_instances
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.deviceInstances }}'
    item:
      arn: '{{ item.arn }}'
      deviceArn: '{{ item.deviceArn }}'
      instanceProfile: '{{ item.instanceProfile }}'
      labels: '{{ item.labels }}'
      status: '{{ item.status }}'
      udid: '{{ item.udid }}'
      nextToken: '{{ response.nextToken }}'
- discovery_id: aws.devicefarm.list_devices
  calls:
  - action: list_devices
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.devices }}'
    item:
      arn: '{{ item.arn }}'
      availability: '{{ item.availability }}'
      carrier: '{{ item.carrier }}'
      cpu: '{{ item.cpu }}'
      fleetName: '{{ item.fleetName }}'
      fleetType: '{{ item.fleetType }}'
      formFactor: '{{ item.formFactor }}'
      heapSize: '{{ item.heapSize }}'
      image: '{{ item.image }}'
      instances: '{{ item.instances }}'
      manufacturer: '{{ item.manufacturer }}'
      memory: '{{ item.memory }}'
      model: '{{ item.model }}'
      modelId: '{{ item.modelId }}'
      name: '{{ item.name }}'
      os: '{{ item.os }}'
      platform: '{{ item.platform }}'
      radio: '{{ item.radio }}'
      remoteAccessEnabled: '{{ item.remoteAccessEnabled }}'
      remoteDebugEnabled: '{{ item.remoteDebugEnabled }}'
      resolution: '{{ item.resolution }}'
      nextToken: '{{ response.nextToken }}'
- discovery_id: aws.devicefarm.list_instance_profiles
  calls:
