    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.instanceProfiles }}'
    item:
      arn: '{{ item.arn }}'
      description: '{{ item.description }}'
      excludeAppPackagesFromCleanup: '{{ item.excludeAppPackagesFromCleanup }}'
      name: '{{ item.name }}'
      packageCleanup: '{{ item.packageCleanup }}'
      rebootAfterUse: '{{ item.rebootAfterUse }}'
      nextToken: '{{ response.nextToken }}'
- discovery_id: aws.devicefarm.list_offering_promotions
