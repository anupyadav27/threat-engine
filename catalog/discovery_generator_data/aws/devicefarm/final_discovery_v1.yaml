# ==========================================================
# Discovery YAML — devicefarm (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 2 | ops: 1 independent, 1 dependent
# ==========================================================
version: '1.0'
provider: aws
service: devicefarm

services:
  client: devicefarm
  module: "boto3.client('devicefarm')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: get_test_grid_session
    identifier_op: aws.devicefarm.get_test_grid_session
    identifier_field: arn
    item_var_path: item.arn
    identifier_template: '{arn}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.devicefarm.get_test_grid_session  ──
  - discovery_id: aws.devicefarm.get_test_grid_session
    calls:
      - action: get_test_grid_session
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        Tags: '{{ item.Tags }}'
        arn: '{{ item.arn }}'
        billingMinutes: '{{ item.billingMinutes }}'
        created: '{{ item.created }}'
        ended: '{{ item.ended }}'
        seleniumProperties: '{{ item.seleniumProperties }}'
        status: '{{ item.status }}'
        testGridSession: '{{ item.testGridSession }}'

  # ════ DEPENDENT (enrich) operations ════
  # ── aws.devicefarm.get_project [dependent] ──
  - discovery_id: aws.devicefarm.get_project
    for_each: aws.devicefarm.get_test_grid_session
    calls:
      - action: get_project
        params:
          arn: "{{ item.arn }}"
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        Tags: '{{ item.Tags }}'
        arn: '{{ item.arn }}'
        created: '{{ item.created }}'
        defaultJobTimeoutMinutes: '{{ item.defaultJobTimeoutMinutes }}'
        environmentVariables: '{{ item.environmentVariables }}'
        executionRoleArn: '{{ item.executionRoleArn }}'
        name: '{{ item.name }}'
        vpcConfig: '{{ item.vpcConfig }}'

