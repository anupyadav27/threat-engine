version: '1.0'
provider: aws
service: notificationscontacts
services:
  client: notificationscontacts
  module: boto3.client
discovery:
- discovery_id: aws.notificationscontacts.list_email_contacts
  calls:
  - action: list_email_contacts
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.emailContacts }}'
    item:
      address: '{{ item.address }}'
      arn: '{{ item.arn }}'
      creationTime: '{{ item.creationTime }}'
      emailContact: '{{ item.emailContact }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      updateTime: '{{ item.updateTime }}'
      nextToken: '{{ response.nextToken }}'
- discovery_id: aws.notificationscontacts.get_email_contact
  for_each: aws.notificationscontacts.list_email_contacts
  calls:
  - action: get_email_contact
    params:
      arn: '{{ item.arn }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      address: '{{ response.emailContact.address }}'
      arn: '{{ response.emailContact.arn }}'
      creationTime: '{{ response.emailContact.creationTime }}'
      emailContact: '{{ response.emailContact.emailContact }}'
      name: '{{ response.emailContact.name }}'
      status: '{{ response.emailContact.status }}'
      updateTime: '{{ response.emailContact.updateTime }}'
- discovery_id: aws.notificationscontacts.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      tags: '{{ response.tags }}'
