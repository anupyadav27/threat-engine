version: '1.0'
provider: aws
service: qldb
discovery:
- _stub: true
  discovery_id: aws.qldb.list_qldbs
  _note: STUB — generated by step2, needs real SDK review for aws.qldb
  _rules:
  - aws.qldb.ledger.encryption_at_rest_enabled
  - aws.qldb.ledger.journal_export_configured
  - aws.qldb.logging.and_monitoring_compliance_check
  - aws.qldb.vpc.network_access_secure_configuration_check
  _client: boto3.client('qldb')
  calls:
  - action: ListResources
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      id: '{{ item.Id }}'
      name: '{{ item.Name }}'
      resource_type: '''{{ resource_type }}'''
      region: '{{ region }}'
      encrypted: '{{ item.Encrypted }}'
      kms_key_id: '{{ item.KMSKeyId }}'
      status: '{{ item.Status }}'
      enabled: '{{ item.Enabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      internet_facing: '{{ item.InternetFacing }}'
      public_ip_address: '{{ item.PublicIpAddress }}'
      tags: '{{ item.Tags }}'
      permissions: '{{ item.Permissions }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      retention_days: '{{ item.RetentionDays }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
