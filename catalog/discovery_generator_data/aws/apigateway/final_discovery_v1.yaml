version: '1.0'
provider: aws
service: apigateway

services:
  client: apigateway
  module: "boto3.client('apigateway')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: certificate
    identifier_op: aws.apigateway.get_domain_names
    identifier_field: certificateArn
    item_var_path: item.certificateArn
    identifier_template: '{certificatearn}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.apigateway.get_api_keys  ──
  - discovery_id: aws.apigateway.get_api_keys
    calls:
      - action: get_api_keys
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.warnings }}'
      item:
        createdDate: '{{ item.createdDate }}'
        customerId: '{{ item.customerId }}'
        description: '{{ item.description }}'
        enabled: '{{ item.enabled }}'
        id: '{{ item.id }}'
        items: '{{ item.items }}'
        lastUpdatedDate: '{{ item.lastUpdatedDate }}'
        name: '{{ item.name }}'
        position: '{{ item.position }}'
        stageKeys: '{{ item.stageKeys }}'
        tags: '{{ item.tags }}'
        value: '{{ item.value }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.apigateway.get_authorizers  ──
