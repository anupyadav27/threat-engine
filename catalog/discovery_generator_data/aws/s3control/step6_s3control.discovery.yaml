version: '1.0'
provider: aws
service: s3control
services:
  client: s3control
  module: boto3.client
discovery:
- discovery_id: aws.s3control.describe_job
  calls:
  - action: describe_job
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      CreationTime: '{{ response.Job.CreationTime }}'
      RoleArn: '{{ response.Job.RoleArn }}'
      Status: '{{ response.Job.Status }}'
      ConfirmationRequired: '{{ response.Job.ConfirmationRequired }}'
      Description: '{{ response.Job.Description }}'
      FailureReasons: '{{ response.Job.FailureReasons }}'
      GeneratedManifestDescriptor: '{{ response.Job.GeneratedManifestDescriptor }}'
      Job: '{{ response.Job.Job }}'
      JobArn: '{{ response.Job.JobArn }}'
      JobId: '{{ response.Job.JobId }}'
      Manifest: '{{ response.Job.Manifest }}'
      ManifestGenerator: '{{ response.Job.ManifestGenerator }}'
      Operation: '{{ response.Job.Operation }}'
      Priority: '{{ response.Job.Priority }}'
      ProgressSummary: '{{ response.Job.ProgressSummary }}'
      Report: '{{ response.Job.Report }}'
      StatusUpdateReason: '{{ response.Job.StatusUpdateReason }}'
      SuspendedCause: '{{ response.Job.SuspendedCause }}'
      SuspendedDate: '{{ response.Job.SuspendedDate }}'
      TerminationDate: '{{ response.Job.TerminationDate }}'
- discovery_id: aws.s3control.describe_multi_region_access_point_operation
