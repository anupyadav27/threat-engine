version: '1.0'
provider: aws
service: chime-sdk-meetings
services:
  client: chime-sdk-meetings
  module: boto3.client
discovery:
- discovery_id: aws.chime-sdk-meetings.get_attendee
  calls:
  - action: get_attendee
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      AttendeeId: '{{ response.Attendee.AttendeeId }}'
      Capabilities: '{{ response.Attendee.Capabilities }}'
      ExternalUserId: '{{ response.Attendee.ExternalUserId }}'
      JoinToken: '{{ response.Attendee.JoinToken }}'
- discovery_id: aws.chime-sdk-meetings.get_meeting
  calls:
  - action: get_meeting
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      ExternalMeetingId: '{{ response.Meeting.ExternalMeetingId }}'
      MediaPlacement: '{{ response.Meeting.MediaPlacement }}'
      MediaRegion: '{{ response.Meeting.MediaRegion }}'
      MeetingArn: '{{ response.Meeting.MeetingArn }}'
      MeetingFeatures: '{{ response.Meeting.MeetingFeatures }}'
      MeetingHostId: '{{ response.Meeting.MeetingHostId }}'
      MeetingId: '{{ response.Meeting.MeetingId }}'
      PrimaryMeetingId: '{{ response.Meeting.PrimaryMeetingId }}'
      TenantIds: '{{ response.Meeting.TenantIds }}'
- discovery_id: aws.chime-sdk-meetings.list_attendees
  calls:
  - action: list_attendees
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Attendees }}'
    item:
      AttendeeId: '{{ item.AttendeeId }}'
      Capabilities: '{{ item.Capabilities }}'
      ExternalUserId: '{{ item.ExternalUserId }}'
      JoinToken: '{{ item.JoinToken }}'
- discovery_id: aws.chime-sdk-meetings.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Tags }}'
    item:
      Key: '{{ item.Key }}'
      Value: '{{ item.Value }}'
