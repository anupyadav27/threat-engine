# ==========================================================
# Discovery YAML — required (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 1 | ops: 1 independent, 0 dependent
# ==========================================================
version: '1.0'
provider: aws
service: required

services:
  client: required
  module: "boto3.client('required')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: resource
    identifier_op: aws.required.get_resources
    identifier_field: ResourceARN
    item_var_path: item.ResourceARN
    identifier_template: '{resourcearn}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.required.get_resources  ──
  - discovery_id: aws.required.get_resources
    calls:
      - action: get_resources
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ResourceTagMappingList }}'
      item:
        ComplianceDetails: '{{ item.ComplianceDetails }}'
        ResourceARN: '{{ item.ResourceARN }}'
        Tags: '{{ item.Tags }}'

