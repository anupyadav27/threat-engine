# ============================================================
# Discovery YAML — cloudsearchdomain (AWS)
# Generated: 2026-02-21T04:56:57Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: cloudsearchdomain
services:
  client: cloudsearchdomain
  module: boto3.client
discovery:
  # ── Dependent read operations (require identifiers) ──
  # ── Search ──
  - discovery_id: aws.cloudsearchdomain.search
    calls:
      - action: search
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        facets: '{{ response.facets }}'
        hits: '{{ response.hits }}'
        stats: '{{ response.stats }}'
        status: '{{ response.status }}'
