version: '1.0'
provider: aws
service: datazone
services:
  client: datazone
  module: boto3.client
discovery:
- discovery_id: aws.datazone.list_domains
  calls:
  - action: list_domains
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      arn: '{{ item.arn }}'
      createdAt: '{{ item.createdAt }}'
      description: '{{ item.description }}'
      domainVersion: '{{ item.domainVersion }}'
      items: '{{ item.items }}'
      lastUpdatedAt: '{{ item.lastUpdatedAt }}'
      managedAccountId: '{{ item.managedAccountId }}'
      name: '{{ item.name }}'
      portalUrl: '{{ item.portalUrl }}'
      nextToken: '{{ response.nextToken }}'
- discovery_id: aws.datazone.get_account_pool
  calls:
  - action: get_account_pool
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      accounts: '{{ response.accountSource.accounts }}'
      customAccountPoolHandler: '{{ response.accountSource.customAccountPoolHandler
        }}'
- discovery_id: aws.datazone.get_asset
  calls:
  - action: get_asset
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.formsOutput }}'
    item:
      content: '{{ item.content }}'
      formName: '{{ item.formName }}'
      typeName: '{{ item.typeName }}'
      typeRevision: '{{ item.typeRevision }}'
      createdAt: '{{ response.createdAt }}'
      createdBy: '{{ response.createdBy }}'
      description: '{{ response.description }}'
      domainId: '{{ response.domainId }}'
      externalIdentifier: '{{ response.externalIdentifier }}'
      firstRevisionCreatedAt: '{{ response.firstRevisionCreatedAt }}'
      firstRevisionCreatedBy: '{{ response.firstRevisionCreatedBy }}'
      id: '{{ response.id }}'
      listingId: '{{ response.listing.listingId }}'
      listingStatus: '{{ response.listing.listingStatus }}'
      name: '{{ response.name }}'
      owningProjectId: '{{ response.owningProjectId }}'
      revision: '{{ response.revision }}'
      typeIdentifier: '{{ response.typeIdentifier }}'
- discovery_id: aws.datazone.get_asset_filter
  calls:
  - action: get_asset_filter
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.effectiveColumnNames }}'
    item:
      assetId: '{{ response.assetId }}'
      sensitive: '{{ response.configuration.rowConfiguration.sensitive }}'
      createdAt: '{{ response.createdAt }}'
      description: '{{ response.description }}'
      domainId: '{{ response.domainId }}'
      effectiveRowFilter: '{{ response.effectiveRowFilter }}'
      errorMessage: '{{ response.errorMessage }}'
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      status: '{{ response.status }}'
- discovery_id: aws.datazone.get_asset_type
  calls:
  - action: get_asset_type
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      createdAt: '{{ response.createdAt }}'
      createdBy: '{{ response.createdBy }}'
      description: '{{ response.description }}'
      domainId: '{{ response.domainId }}'
      formsOutput: '{{ response.formsOutput }}'
      name: '{{ response.name }}'
      originDomainId: '{{ response.originDomainId }}'
      originProjectId: '{{ response.originProjectId }}'
      owningProjectId: '{{ response.owningProjectId }}'
      revision: '{{ response.revision }}'
      updatedAt: '{{ response.updatedAt }}'
      updatedBy: '{{ response.updatedBy }}'
