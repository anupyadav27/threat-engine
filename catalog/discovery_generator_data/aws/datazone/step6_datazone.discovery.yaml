  - action: list_subscription_targets
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      applicableAssetTypes: '{{ item.applicableAssetTypes }}'
      authorizedPrincipals: '{{ item.authorizedPrincipals }}'
      createdAt: '{{ item.createdAt }}'
      createdBy: '{{ item.createdBy }}'
      environmentId: '{{ item.environmentId }}'
      manageAccessRole: '{{ item.manageAccessRole }}'
      name: '{{ item.name }}'
      projectId: '{{ item.projectId }}'
      provider: '{{ item.provider }}'
      subscriptionTargetConfig: '{{ item.subscriptionTargetConfig }}'
      updatedAt: '{{ item.updatedAt }}'
      updatedBy: '{{ item.updatedBy }}'
      nextToken: '{{ response.nextToken }}'
- discovery_id: aws.datazone.list_subscriptions
  calls:
  - action: list_subscriptions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      createdAt: '{{ item.createdAt }}'
      createdBy: '{{ item.createdBy }}'
      retainPermissions: '{{ item.retainPermissions }}'
      subscribedListing: '{{ item.subscribedListing }}'
      subscribedPrincipal: '{{ item.subscribedPrincipal }}'
      subscriptionRequestId: '{{ item.subscriptionRequestId }}'
      updatedAt: '{{ item.updatedAt }}'
      updatedBy: '{{ item.updatedBy }}'
      nextToken: '{{ response.nextToken }}'
