# ==========================================================
# Discovery YAML — service (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 2 | ops: 1 independent, 1 dependent
# ==========================================================
version: '1.0'
provider: aws
service: service

services:
  client: service
  module: "boto3.client('service')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: portfolio
    identifier_op: aws.service.list_portfolios
    identifier_field: ARN
    item_var_path: item.ARN
    identifier_template: '{arn}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.service.list_portfolios  ──
  - discovery_id: aws.service.list_portfolios
    calls:
      - action: list_portfolios
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.PortfolioDetails }}'
      item:
        ARN: '{{ item.ARN }}'
        Description: '{{ item.Description }}'
        DisplayName: '{{ item.DisplayName }}'
        Id: '{{ item.Id }}'
        PortfolioShareDetails: '{{ item.PortfolioShareDetails }}'
        ProviderName: '{{ item.ProviderName }}'
        item: '{{ item }}'

  # ════ DEPENDENT (enrich) operations ════
  # ── aws.service.describe_portfolio [dependent] ──
  - discovery_id: aws.service.describe_portfolio
    for_each: aws.service.list_portfolios
    calls:
      - action: describe_portfolio
        params:
          Id: "{{ item.Id }}"
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response }}'
      item:
        PortfolioDetail: '{{ item.PortfolioDetail }}'
        TagOptions: '{{ item.TagOptions }}'
        Tags: '{{ item.Tags }}'

