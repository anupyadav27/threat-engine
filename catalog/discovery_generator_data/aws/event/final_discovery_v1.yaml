# ==========================================================
# Discovery YAML — event (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 1 | ops: 1 independent, 0 dependent
# ==========================================================
version: '1.0'
provider: aws
service: event

services:
  client: event
  module: "boto3.client('event')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: event
    identifier_op: aws.event.list_event_data_stores
    identifier_field: EventDataStoreArn
    item_var_path: item.EventDataStoreArn
    identifier_template: '{eventdatastorearn}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.event.list_event_data_stores  ──
  - discovery_id: aws.event.list_event_data_stores
    calls:
      - action: list_event_data_stores
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.EventDataStores }}'
      item:
        AdvancedEventSelectors: '{{ item.AdvancedEventSelectors }}'
        CreatedTimestamp: '{{ item.CreatedTimestamp }}'
        EventDataStoreArn: '{{ item.EventDataStoreArn }}'
        MultiRegionEnabled: '{{ item.MultiRegionEnabled }}'
        OrganizationEnabled: '{{ item.OrganizationEnabled }}'
        RetentionPeriod: '{{ item.RetentionPeriod }}'
        Status: '{{ item.Status }}'
        TerminationProtectionEnabled: '{{ item.TerminationProtectionEnabled }}'
        UpdatedTimestamp: '{{ item.UpdatedTimestamp }}'
        item: '{{ item }}'

