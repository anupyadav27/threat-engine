        FlowLogStatus: '{{ response.FlowLogStatus }}'
        FlowLogs: '{{ response.FlowLogs }}'
        LogDestination: '{{ response.LogDestination }}'
        LogDestinationType: '{{ response.LogDestinationType }}'
        LogFormat: '{{ response.LogFormat }}'
        LogGroupName: '{{ response.LogGroupName }}'
        MaxAggregationInterval: '{{ response.MaxAggregationInterval }}'
        Tags: '{{ response.Tags }}'
        TrafficType: '{{ response.TrafficType }}'
  - calls:
    - action: describe_flow_logs
      on_error: continue
      save_as: response
    discovery_id: aws.ec2.describe_flow_logs
