      PreviousModelVersionActivatedAt: '{{ response.PreviousModelVersionActivatedAt }}'
      PriorModelMetrics: '{{ response.PriorModelMetrics }}'
      RetrainingSchedulerStatus: '{{ response.RetrainingSchedulerStatus }}'
      RoleArn: '{{ response.RoleArn }}'
      Schema: '{{ response.Schema }}'
