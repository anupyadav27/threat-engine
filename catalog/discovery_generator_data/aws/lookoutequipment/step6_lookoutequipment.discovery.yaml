version: '1.0'
provider: aws
service: lookoutequipment
services:
  client: lookoutequipment
  module: boto3.client
discovery:
- discovery_id: aws.lookoutequipment.list_data_ingestion_jobs
  calls:
  - action: list_data_ingestion_jobs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.DataIngestionJobSummaries }}'
    item:
      RoleArn: '{{ item.RoleArn }}'
      Status: '{{ item.Status }}'
      DataQualitySummary: '{{ item.DataQualitySummary }}'
      DatasetArn: '{{ item.DatasetArn }}'
      DatasetName: '{{ item.DatasetName }}'
      Enabled: '{{ item.Enabled }}'
      IngestedDataSize: '{{ item.IngestedDataSize }}'
      IngestedFilesSummary: '{{ item.IngestedFilesSummary }}'
      IngestionInputConfiguration: '{{ item.IngestionInputConfiguration }}'
      JobId: '{{ item.JobId }}'
      LastUpdatedAt: '{{ item.LastUpdatedAt }}'
      S3InputConfiguration: '{{ item.S3InputConfiguration }}'
      Schema: '{{ item.Schema }}'
      ServerSideKmsKeyId: '{{ item.ServerSideKmsKeyId }}'
      SourceDatasetArn: '{{ item.SourceDatasetArn }}'
      StatusDetail: '{{ item.StatusDetail }}'
- discovery_id: aws.lookoutequipment.list_datasets
  calls:
  - action: list_datasets
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.DatasetSummaries }}'
    item:
      Status: '{{ item.Status }}'
      CreatedAt: '{{ item.CreatedAt }}'
      DatasetArn: '{{ item.DatasetArn }}'
      DatasetName: '{{ item.DatasetName }}'
      LastUpdatedAt: '{{ item.LastUpdatedAt }}'
      Schema: '{{ item.Schema }}'
      ServerSideKmsKeyId: '{{ item.ServerSideKmsKeyId }}'
- discovery_id: aws.lookoutequipment.list_inference_schedulers
  calls:
  - action: list_inference_schedulers
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.InferenceSchedulerSummaries }}'
    item:
      Status: '{{ item.Status }}'
      DataDelayOffsetInMinutes: '{{ item.DataDelayOffsetInMinutes }}'
      DataUploadFrequency: '{{ item.DataUploadFrequency }}'
      InferenceSchedulerArn: '{{ item.InferenceSchedulerArn }}'
      InferenceSchedulerName: '{{ item.InferenceSchedulerName }}'
      LatestInferenceResult: '{{ item.LatestInferenceResult }}'
      ModelArn: '{{ item.ModelArn }}'
      ModelName: '{{ item.ModelName }}'
- discovery_id: aws.lookoutequipment.list_label_groups
  calls:
  - action: list_label_groups
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.LabelGroupSummaries }}'
    item:
      CreatedAt: '{{ item.CreatedAt }}'
      LabelGroupArn: '{{ item.LabelGroupArn }}'
      LabelGroupName: '{{ item.LabelGroupName }}'
      Notes: '{{ item.Notes }}'
      UpdatedAt: '{{ item.UpdatedAt }}'
- discovery_id: aws.lookoutequipment.list_models
  calls:
  - action: list_models
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ModelSummaries }}'
    item:
      Status: '{{ item.Status }}'
      ActiveModelVersion: '{{ item.ActiveModelVersion }}'
      ActiveModelVersionArn: '{{ item.ActiveModelVersionArn }}'
      CreatedAt: '{{ item.CreatedAt }}'
      DatasetArn: '{{ item.DatasetArn }}'
      DatasetName: '{{ item.DatasetName }}'
      LatestScheduledRetrainingModelVersion: '{{ item.LatestScheduledRetrainingModelVersion }}'
      LatestScheduledRetrainingStartTime: '{{ item.LatestScheduledRetrainingStartTime }}'
      LatestScheduledRetrainingStatus: '{{ item.LatestScheduledRetrainingStatus }}'
      ModelArn: '{{ item.ModelArn }}'
      ModelDiagnosticsOutputConfiguration: '{{ item.ModelDiagnosticsOutputConfiguration }}'
      ModelName: '{{ item.ModelName }}'
      ModelQuality: '{{ item.ModelQuality }}'
      NextScheduledRetrainingStartDate: '{{ item.NextScheduledRetrainingStartDate }}'
      PreviousActiveModelVersion: '{{ item.PreviousActiveModelVersion }}'
      RetrainingSchedulerStatus: '{{ item.RetrainingSchedulerStatus }}'
      SourceModelVersionArn: '{{ item.SourceModelVersionArn }}'
      TrainingDataStartTime: '{{ item.TrainingDataStartTime }}'
      TrainingExecutionStartTime: '{{ item.TrainingExecutionStartTime }}'
- discovery_id: aws.lookoutequipment.list_retraining_schedulers
  calls:
  - action: list_retraining_schedulers
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.RetrainingSchedulerSummaries }}'
    item:
      Status: '{{ item.Status }}'
      LookbackWindow: '{{ item.LookbackWindow }}'
      ModelArn: '{{ item.ModelArn }}'
      ModelName: '{{ item.ModelName }}'
      RetrainingFrequency: '{{ item.RetrainingFrequency }}'
      RetrainingStartDate: '{{ item.RetrainingStartDate }}'
- discovery_id: aws.lookoutequipment.describe_data_ingestion_job
  for_each: aws.lookoutequipment.list_data_ingestion_jobs
  calls:
  - action: describe_data_ingestion_job
    params:
      JobId: '{{ item.JobId }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      RoleArn: '{{ response.IngestionInputConfiguration.RoleArn }}'
      DataQualitySummary: '{{ response.IngestionInputConfiguration.DataQualitySummary }}'
      IngestedDataSize: '{{ response.IngestionInputConfiguration.IngestedDataSize }}'
      IngestedFilesSummary: '{{ response.IngestionInputConfiguration.IngestedFilesSummary }}'
      S3InputConfiguration: '{{ response.IngestionInputConfiguration.S3InputConfiguration.Prefix }}'
      Schema: '{{ response.IngestionInputConfiguration.Schema }}'
      SourceDatasetArn: '{{ response.IngestionInputConfiguration.SourceDatasetArn }}'
      StatusDetail: '{{ response.IngestionInputConfiguration.StatusDetail }}'
      CreatedAt: '{{ response.CreatedAt }}'
      DataEndTime: '{{ response.DataEndTime }}'
      TotalNumberOfDuplicateTimestamps: '{{ response.DataQualitySummary.DuplicateTimestamps.TotalNumberOfDuplicateTimestamps }}'
      AffectedSensorCount: '{{ response.DataQualitySummary.InsufficientSensorData.MissingCompleteSensorData.AffectedSensorCount }}'
      TotalNumberOfInvalidValues: '{{ response.DataQualitySummary.InvalidSensorData.TotalNumberOfInvalidValues }}'
      TotalNumberOfMissingValues: '{{ response.DataQualitySummary.MissingSensorData.TotalNumberOfMissingValues }}'
      TotalNumberOfUnsupportedTimestamps: '{{ response.DataQualitySummary.UnsupportedTimestamps.TotalNumberOfUnsupportedTimestamps }}'
      DataStartTime: '{{ response.DataStartTime }}'
      DatasetArn: '{{ response.DatasetArn }}'
      FailedReason: '{{ response.FailedReason }}'
      IngestedNumberOfFiles: '{{ response.IngestedFilesSummary.IngestedNumberOfFiles }}'
      TotalNumberOfFiles: '{{ response.IngestedFilesSummary.TotalNumberOfFiles }}'
      Bucket: '{{ response.IngestionInputConfiguration.S3InputConfiguration.Bucket }}'
      KeyPattern: '{{ response.IngestionInputConfiguration.S3InputConfiguration.KeyPattern }}'
      Prefix: '{{ response.IngestionInputConfiguration.S3InputConfiguration.Prefix }}'
      JobId: '{{ response.JobId }}'
      Status: '{{ response.Status }}'
- discovery_id: aws.lookoutequipment.describe_dataset
  for_each: aws.lookoutequipment.list_data_ingestion_jobs
  calls:
  - action: describe_dataset
    params:
      DatasetName: '{{ item.DatasetName }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      LastUpdatedAt: '{{ response.IngestionInputConfiguration.LastUpdatedAt }}'
      S3InputConfiguration: '{{ response.IngestionInputConfiguration.S3InputConfiguration.Prefix }}'
      Schema: '{{ response.IngestionInputConfiguration.Schema }}'
      ServerSideKmsKeyId: '{{ response.IngestionInputConfiguration.ServerSideKmsKeyId }}'
      CreatedAt: '{{ response.CreatedAt }}'
      DataEndTime: '{{ response.DataEndTime }}'
      TotalNumberOfDuplicateTimestamps: '{{ response.DataQualitySummary.DuplicateTimestamps.TotalNumberOfDuplicateTimestamps }}'
      AffectedSensorCount: '{{ response.DataQualitySummary.InsufficientSensorData.MissingCompleteSensorData.AffectedSensorCount }}'
      TotalNumberOfInvalidValues: '{{ response.DataQualitySummary.InvalidSensorData.TotalNumberOfInvalidValues }}'
      TotalNumberOfMissingValues: '{{ response.DataQualitySummary.MissingSensorData.TotalNumberOfMissingValues }}'
      TotalNumberOfUnsupportedTimestamps: '{{ response.DataQualitySummary.UnsupportedTimestamps.TotalNumberOfUnsupportedTimestamps }}'
      DataStartTime: '{{ response.DataStartTime }}'
      DatasetArn: '{{ response.DatasetArn }}'
      DatasetName: '{{ response.DatasetName }}'
      IngestedNumberOfFiles: '{{ response.IngestedFilesSummary.IngestedNumberOfFiles }}'
      TotalNumberOfFiles: '{{ response.IngestedFilesSummary.TotalNumberOfFiles }}'
      Bucket: '{{ response.IngestionInputConfiguration.S3InputConfiguration.Bucket }}'
      KeyPattern: '{{ response.IngestionInputConfiguration.S3InputConfiguration.KeyPattern }}'
      Prefix: '{{ response.IngestionInputConfiguration.S3InputConfiguration.Prefix }}'
      RoleArn: '{{ response.RoleArn }}'
      SourceDatasetArn: '{{ response.SourceDatasetArn }}'
      Status: '{{ response.Status }}'
- discovery_id: aws.lookoutequipment.describe_inference_scheduler
  for_each: aws.lookoutequipment.list_inference_schedulers
  calls:
  - action: describe_inference_scheduler
    params:
      InferenceSchedulerName: '{{ item.InferenceSchedulerName }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      InferenceInputNameConfiguration: '{{ response.DataInputConfiguration.InferenceInputNameConfiguration.TimestampFormat }}'
      InputTimeZoneOffset: '{{ response.DataInputConfiguration.InputTimeZoneOffset }}'
      S3InputConfiguration: '{{ response.DataInputConfiguration.S3InputConfiguration.Prefix }}'
      CreatedAt: '{{ response.CreatedAt }}'
      DataDelayOffsetInMinutes: '{{ response.DataDelayOffsetInMinutes }}'
      ComponentTimestampDelimiter: '{{ response.DataInputConfiguration.InferenceInputNameConfiguration.ComponentTimestampDelimiter }}'
      TimestampFormat: '{{ response.DataInputConfiguration.InferenceInputNameConfiguration.TimestampFormat }}'
      Bucket: '{{ response.DataInputConfiguration.S3InputConfiguration.Bucket }}'
      Prefix: '{{ response.DataInputConfiguration.S3InputConfiguration.Prefix }}'
      KmsKeyId: '{{ response.DataOutputConfiguration.KmsKeyId }}'
      DataUploadFrequency: '{{ response.DataUploadFrequency }}'
      InferenceSchedulerArn: '{{ response.InferenceSchedulerArn }}'
      InferenceSchedulerName: '{{ response.InferenceSchedulerName }}'
      LatestInferenceResult: '{{ response.LatestInferenceResult }}'
      ModelArn: '{{ response.ModelArn }}'
      ModelName: '{{ response.ModelName }}'
      RoleArn: '{{ response.RoleArn }}'
      ServerSideKmsKeyId: '{{ response.ServerSideKmsKeyId }}'
      Status: '{{ response.Status }}'
      UpdatedAt: '{{ response.UpdatedAt }}'
- discovery_id: aws.lookoutequipment.describe_label
  for_each: aws.lookoutequipment.list_label_groups
  calls:
  - action: describe_label
    params:
      LabelGroupName: '{{ item.LabelGroupName }}'
      LabelId: '{{ item.LabelId }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      Notes: '{{ response.Notes }}'
      CreatedAt: '{{ response.CreatedAt }}'
      EndTime: '{{ response.EndTime }}'
      Equipment: '{{ response.Equipment }}'
      FaultCode: '{{ response.FaultCode }}'
      LabelGroupArn: '{{ response.LabelGroupArn }}'
      LabelGroupName: '{{ response.LabelGroupName }}'
      LabelId: '{{ response.LabelId }}'
      Rating: '{{ response.Rating }}'
      StartTime: '{{ response.StartTime }}'
- discovery_id: aws.lookoutequipment.describe_label_group
  for_each: aws.lookoutequipment.list_label_groups
  calls:
  - action: describe_label_group
    params:
      LabelGroupName: '{{ item.LabelGroupName }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.FaultCodes }}'
    item:
      CreatedAt: '{{ response.CreatedAt }}'
      LabelGroupArn: '{{ response.LabelGroupArn }}'
      LabelGroupName: '{{ response.LabelGroupName }}'
      UpdatedAt: '{{ response.UpdatedAt }}'
