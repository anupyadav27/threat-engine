      TrainingExecutionStartTime: '{{ response.LabelsInputConfiguration.TrainingExecutionStartTime }}'
      AccumulatedInferenceDataEndTime: '{{ response.AccumulatedInferenceDataEndTime }}'
      AccumulatedInferenceDataStartTime: '{{ response.AccumulatedInferenceDataStartTime }}'
      ActiveModelVersion: '{{ response.ActiveModelVersion }}'
      ActiveModelVersionArn: '{{ response.ActiveModelVersionArn }}'
      CreatedAt: '{{ response.CreatedAt }}'
      TargetSamplingRate: '{{ response.DataPreProcessingConfiguration.TargetSamplingRate }}'
      DatasetArn: '{{ response.DatasetArn }}'
      DatasetName: '{{ response.DatasetName }}'
      EvaluationDataEndTime: '{{ response.EvaluationDataEndTime }}'
      EvaluationDataStartTime: '{{ response.EvaluationDataStartTime }}'
      FailedReason: '{{ response.FailedReason }}'
      ImportJobEndTime: '{{ response.ImportJobEndTime }}'
      ImportJobStartTime: '{{ response.ImportJobStartTime }}'
      Bucket: '{{ response.LabelsInputConfiguration.S3InputConfiguration.Bucket }}'
      Prefix: '{{ response.LabelsInputConfiguration.S3InputConfiguration.Prefix }}'
      LastUpdatedTime: '{{ response.LastUpdatedTime }}'
      LatestScheduledRetrainingAvailableDataInDays: '{{ response.LatestScheduledRetrainingAvailableDataInDays }}'
      LatestScheduledRetrainingFailedReason: '{{ response.LatestScheduledRetrainingFailedReason }}'
      LatestScheduledRetrainingModelVersion: '{{ response.LatestScheduledRetrainingModelVersion }}'
      LatestScheduledRetrainingStartTime: '{{ response.LatestScheduledRetrainingStartTime }}'
      LatestScheduledRetrainingStatus: '{{ response.LatestScheduledRetrainingStatus }}'
      ModelArn: '{{ response.ModelArn }}'
      KmsKeyId: '{{ response.ModelDiagnosticsOutputConfiguration.KmsKeyId }}'
      ModelMetrics: '{{ response.ModelMetrics }}'
      ModelName: '{{ response.ModelName }}'
      ModelQuality: '{{ response.ModelQuality }}'
      ModelVersionActivatedAt: '{{ response.ModelVersionActivatedAt }}'
      NextScheduledRetrainingStartDate: '{{ response.NextScheduledRetrainingStartDate }}'
