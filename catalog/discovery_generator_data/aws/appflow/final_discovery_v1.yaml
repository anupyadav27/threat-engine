# ==========================================================
# Discovery YAML — appflow (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 2 | ops: 1 independent, 0 dependent
# ==========================================================
version: '1.0'
provider: aws
service: appflow

services:
  client: appflow
  module: "boto3.client('appflow')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: connector
    identifier_op: aws.appflow.describe_connectors
    identifier_field: connectorName
    item_var_path: item.connectorName
    identifier_template: '{connectorname}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.appflow.describe_connectors  ──
  - discovery_id: aws.appflow.describe_connectors
    calls:
      - action: describe_connectors
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.connectors }}'
      item:
        Enabled: '{{ item.Enabled }}'
        Status: '{{ item.Status }}'
        Tags: '{{ item.Tags }}'
        connectorConfigurations: '{{ item.connectorConfigurations }}'
        connectorDescription: '{{ item.connectorDescription }}'
        connectorLabel: '{{ item.connectorLabel }}'
        connectorModes: '{{ item.connectorModes }}'
        connectorName: '{{ item.connectorName }}'
        connectorOwner: '{{ item.connectorOwner }}'
        connectorProvisioningType: '{{ item.connectorProvisioningType }}'
        connectorType: '{{ item.connectorType }}'
        connectorVersion: '{{ item.connectorVersion }}'
        connectors: '{{ item.connectors }}'
        item: '{{ item }}'

