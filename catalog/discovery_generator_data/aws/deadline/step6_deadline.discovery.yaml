    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      Status: '{{ response.configuration.Status }}'
      Enabled: '{{ response.configuration.Enabled }}'
      capabilities: '{{ response.configuration.capabilities }}'
      customerManaged: '{{ response.configuration.customerManaged }}'
      serviceManagedEc2: '{{ response.configuration.serviceManagedEc2 }}'
