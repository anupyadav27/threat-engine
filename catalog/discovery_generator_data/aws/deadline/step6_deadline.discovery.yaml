version: '1.0'
provider: aws
service: deadline
services:
  client: deadline
  module: boto3.client
discovery:
- discovery_id: aws.deadline.list_available_metered_products
  calls:
  - action: list_available_metered_products
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.meteredProducts }}'
    item:
      family: '{{ item.family }}'
      port: '{{ item.port }}'
      productId: '{{ item.productId }}'
      vendor: '{{ item.vendor }}'
- discovery_id: aws.deadline.list_farms
  calls:
  - action: list_farms
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.farms }}'
    item:
      displayName: '{{ item.displayName }}'
      farmId: '{{ item.farmId }}'
      kmsKeyArn: '{{ item.kmsKeyArn }}'
- discovery_id: aws.deadline.list_license_endpoints
  calls:
  - action: list_license_endpoints
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.licenseEndpoints }}'
    item:
      licenseEndpointId: '{{ item.licenseEndpointId }}'
      statusMessage: '{{ item.statusMessage }}'
      vpcId: '{{ item.vpcId }}'
- discovery_id: aws.deadline.list_monitors
  calls:
  - action: list_monitors
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.monitors }}'
    item:
      displayName: '{{ item.displayName }}'
      identityCenterApplicationArn: '{{ item.identityCenterApplicationArn }}'
      identityCenterInstanceArn: '{{ item.identityCenterInstanceArn }}'
      monitorId: '{{ item.monitorId }}'
      roleArn: '{{ item.roleArn }}'
      subdomain: '{{ item.subdomain }}'
      url: '{{ item.url }}'
- discovery_id: aws.deadline.get_budget
  for_each: aws.deadline.list_farms
  calls:
  - action: get_budget
    params:
      farmId: '{{ item.farmId }}'
      budgetId: '{{ item.budgetId }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.actions }}'
    item:
      description: '{{ item.description }}'
      schedule: '{{ item.schedule }}'
      thresholdPercentage: '{{ item.thresholdPercentage }}'
      type: '{{ item.type }}'
- discovery_id: aws.deadline.get_farm
  for_each: aws.deadline.list_farms
  calls:
  - action: get_farm
    params:
      farmId: '{{ item.farmId }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      createdAt: '{{ response.createdAt }}'
      createdBy: '{{ response.createdBy }}'
      description: '{{ response.description }}'
      displayName: '{{ response.displayName }}'
      farmId: '{{ response.farmId }}'
      kmsKeyArn: '{{ response.kmsKeyArn }}'
      updatedAt: '{{ response.updatedAt }}'
      updatedBy: '{{ response.updatedBy }}'
- discovery_id: aws.deadline.get_fleet
