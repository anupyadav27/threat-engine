# ==========================================================
# Discovery YAML — codebuild (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 8 | ops: 1 independent, 0 dependent
# ==========================================================
version: '1.0'
provider: aws
service: codebuild

services:
  client: codebuild
  module: "boto3.client('codebuild')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  []

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.codebuild.batch_get_projects  ──
  - discovery_id: aws.codebuild.batch_get_projects
    calls:
      - action: 
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.projects }}'
      item:
        artifacts.encryptionKey: '{{ item.artifacts.encryptionKey }}'
        created: '{{ item.created }}'
        encryptionKey: '{{ item.encryptionKey }}'
        environment: '{{ item.environment }}'
        lastModified: '{{ item.lastModified }}'
        logsConfig: '{{ item.logsConfig }}'
        logsConfig.s3Logs.encryptionDisabled: '{{ item.logsConfig.s3Logs.encryptionDisabled }}'
        serviceRole: '{{ item.serviceRole }}'
        source: '{{ item.source }}'
        source.buildspec: '{{ item.source.buildspec }}'

