    item:
      ConditionalForwarders: '{{ item.ConditionalForwarders }}'
      DnsIpAddrs: '{{ item.DnsIpAddrs }}'
      DnsIpv6Addrs: '{{ item.DnsIpv6Addrs }}'
      RemoteDomainName: '{{ item.RemoteDomainName }}'
      ReplicationScope: '{{ item.ReplicationScope }}'
- discovery_id: aws.ds.describe_directory_data_access
  for_each: aws.ds.describe_directories
  calls:
  - action: describe_directory_data_access
    params:
      DirectoryId: '{{ item.DirectoryId }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      DataAccessStatus: '{{ response.DataAccessStatus }}'
- discovery_id: aws.ds.describe_domain_controllers
  for_each: aws.ds.describe_directories
  calls:
  - action: describe_domain_controllers
    params:
      DirectoryId: '{{ item.DirectoryId }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.DomainControllers }}'
    item:
      Status: '{{ item.Status }}'
      SubnetId: '{{ item.SubnetId }}'
      VpcId: '{{ item.VpcId }}'
      AvailabilityZone: '{{ item.AvailabilityZone }}'
      DirectoryId: '{{ item.DirectoryId }}'
      DnsIpAddr: '{{ item.DnsIpAddr }}'
      DnsIpv6Addr: '{{ item.DnsIpv6Addr }}'
      DomainControllerId: '{{ item.DomainControllerId }}'
      DomainControllers: '{{ item.DomainControllers }}'
      LaunchTime: '{{ item.LaunchTime }}'
      StatusLastUpdatedDateTime: '{{ item.StatusLastUpdatedDateTime }}'
      StatusReason: '{{ item.StatusReason }}'
- discovery_id: aws.ds.describe_hybrid_ad_update
  for_each: aws.ds.describe_directories
  calls:
  - action: describe_hybrid_ad_update
    params:
      DirectoryId: '{{ item.DirectoryId }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      HybridAdministratorAccount: '{{ response.UpdateActivities.HybridAdministratorAccount }}'
      SelfManagedInstances: '{{ response.UpdateActivities.SelfManagedInstances }}'
      UpdateActivities: '{{ response.UpdateActivities.UpdateActivities }}'
- discovery_id: aws.ds.describe_ldaps_settings
  for_each: aws.ds.describe_directories
  calls:
  - action: describe_ldaps_settings
    params:
      DirectoryId: '{{ item.DirectoryId }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.LDAPSSettingsInfo }}'
    item:
      LDAPSSettingsInfo: '{{ item.LDAPSSettingsInfo }}'
      LDAPSStatus: '{{ item.LDAPSStatus }}'
      LDAPSStatusReason: '{{ item.LDAPSStatusReason }}'
      LastUpdatedDateTime: '{{ item.LastUpdatedDateTime }}'
- discovery_id: aws.ds.describe_regions
  for_each: aws.ds.describe_directories
  calls:
  - action: describe_regions
    params:
      DirectoryId: '{{ item.DirectoryId }}'
    save_as: response
    on_error: continue
  emit:
