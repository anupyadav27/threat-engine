# ============================================================
# Discovery YAML — workspaces-instances (AWS)
# Generated: 2026-02-21T04:57:00Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: workspaces-instances
services:
  client: workspaces-instances
  module: boto3.client
discovery:
  # ── ListInstanceTypes ──
  - discovery_id: aws.workspaces-instances.list_instance_types
    calls:
      - action: list_instance_types
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.InstanceTypes }}'
      item:
        InstanceType: '{{ item.InstanceType }}'
  # ── ListRegions ──
  - discovery_id: aws.workspaces-instances.list_regions
    calls:
      - action: list_regions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Regions }}'
      item:
        RegionName: '{{ item.RegionName }}'
  # ── ListWorkspaceInstances ──
  - discovery_id: aws.workspaces-instances.list_workspace_instances
    calls:
      - action: list_workspace_instances
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.WorkspaceInstances }}'
      item:
        EC2ManagedInstance: '{{ item.EC2ManagedInstance }}'
        ProvisionState: '{{ item.ProvisionState }}'
        WorkspaceInstanceId: '{{ item.WorkspaceInstanceId }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetWorkspaceInstance ──
  - discovery_id: aws.workspaces-instances.get_workspace_instance
    for_each: aws.workspaces-instances.list_workspace_instances
    calls:
      - action: get_workspace_instance
        params:
          WorkspaceInstanceId: '{{ item.WorkspaceInstanceId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.WorkspaceInstanceErrors }}'
      item:
        ErrorCode: '{{ item.ErrorCode }}'
        ErrorMessage: '{{ item.ErrorMessage }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.workspaces-instances.list_tags_for_resource
    for_each: aws.workspaces-instances.list_workspace_instances
    calls:
      - action: list_tags_for_resource
        params:
          WorkspaceInstanceId: '{{ item.WorkspaceInstanceId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Tags }}'
      item:
        Key: '{{ item.Key }}'
        Value: '{{ item.Value }}'
