  # ════ INDEPENDENT (root) operations ════
  # ── aws.config.describe_aggregation_authorizations  ──
  - discovery_id: aws.config.describe_aggregation_authorizations
    calls:
      - action: describe_aggregation_authorizations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.AggregationAuthorizations }}'
      item:
        AggregateEvaluationResults: '{{ item.AggregateEvaluationResults }}'
        AggregationAuthorizationArn: '{{ item.AggregationAuthorizationArn }}'
        AggregationAuthorizations: '{{ item.AggregationAuthorizations }}'
        AuthorizedAccountId: '{{ item.AuthorizedAccountId }}'
        AuthorizedAwsRegion: '{{ item.AuthorizedAwsRegion }}'
        CreationTime: '{{ item.CreationTime }}'

  # ════ INDEPENDENT (root) operations ════
