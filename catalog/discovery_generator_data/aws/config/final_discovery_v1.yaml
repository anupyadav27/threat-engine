version: '1.0'
provider: aws
service: config

services:
  client: config
  module: "boto3.client('config')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: authorization
    identifier_op: aws.config.describe_aggregation_authorizations
    identifier_field: AggregationAuthorizationArn
    item_var_path: item.AggregationAuthorizationArn
    identifier_template: '{aggregationauthorizationarn}'
  - resource_type: rule
    identifier_op: aws.config.describe_config_rules
    identifier_field: ConfigRuleArn
    item_var_path: item.ConfigRuleArn
    identifier_template: '{configrulearn}'
  - resource_type: aggregator
    identifier_op: aws.config.describe_configuration_aggregators
    identifier_field: ConfigurationAggregatorArn
    item_var_path: item.ConfigurationAggregatorArn
    identifier_template: '{configurationaggregatorarn}'
  - resource_type: statu
    identifier_op: aws.config.describe_configuration_recorder_status
    identifier_field: arn
    item_var_path: item.arn
    identifier_template: '{arn}'
  - resource_type: role
    identifier_op: aws.config.describe_configuration_recorders
    identifier_field: arn
    item_var_path: item.arn
    identifier_template: '{arn}'
  - resource_type: key
    identifier_op: aws.config.describe_delivery_channels
    identifier_field: s3KmsKeyArn
    item_var_path: item.s3KmsKeyArn
    identifier_template: '{s3kmskeyarn}'

checks: []

