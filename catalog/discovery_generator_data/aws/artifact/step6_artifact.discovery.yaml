version: '1.0'
provider: aws
service: artifact
services:
  client: artifact
  module: boto3.client
discovery:
- discovery_id: aws.artifact.get_account_settings
  calls:
  - action: get_account_settings
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      DestinationArn: '{{ response.accountSettings.DestinationArn }}'
      Enabled: '{{ response.accountSettings.Enabled }}'
      Format: '{{ response.accountSettings.Format }}'
      Level: '{{ response.accountSettings.Level }}'
      accountSettings: '{{ response.accountSettings.accountSettings }}'
      notificationSubscriptionStatus: '{{ response.accountSettings.notificationSubscriptionStatus }}'
- discovery_id: aws.artifact.list_customer_agreements
  calls:
  - action: list_customer_agreements
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.customerAgreements }}'
    item:
      acceptanceTerms: '{{ item.acceptanceTerms }}'
      agreementArn: '{{ item.agreementArn }}'
      arn: '{{ item.arn }}'
      awsAccountId: '{{ item.awsAccountId }}'
      description: '{{ item.description }}'
      effectiveEnd: '{{ item.effectiveEnd }}'
      effectiveStart: '{{ item.effectiveStart }}'
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      organizationArn: '{{ item.organizationArn }}'
      state: '{{ item.state }}'
      terminateTerms: '{{ item.terminateTerms }}'
      type: '{{ item.type }}'
      nextToken: '{{ response.nextToken }}'
- discovery_id: aws.artifact.list_reports
  calls:
  - action: list_reports
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.reports }}'
    item:
      acceptanceType: '{{ item.acceptanceType }}'
      arn: '{{ item.arn }}'
      category: '{{ item.category }}'
      companyName: '{{ item.companyName }}'
      description: '{{ item.description }}'
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      periodEnd: '{{ item.periodEnd }}'
      periodStart: '{{ item.periodStart }}'
      productName: '{{ item.productName }}'
      series: '{{ item.series }}'
      state: '{{ item.state }}'
      statusMessage: '{{ item.statusMessage }}'
      uploadState: '{{ item.uploadState }}'
      version: '{{ item.version }}'
      nextToken: '{{ response.nextToken }}'
- discovery_id: aws.artifact.get_report
  calls:
  - action: get_report
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      documentPresignedUrl: '{{ response.documentPresignedUrl }}'
- discovery_id: aws.artifact.get_report_metadata
  calls:
  - action: get_report_metadata
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      acceptanceType: '{{ response.reportDetails.acceptanceType }}'
      arn: '{{ response.reportDetails.arn }}'
      category: '{{ response.reportDetails.category }}'
      companyName: '{{ response.reportDetails.companyName }}'
      createdAt: '{{ response.reportDetails.createdAt }}'
      deletedAt: '{{ response.reportDetails.deletedAt }}'
      description: '{{ response.reportDetails.description }}'
      id: '{{ response.reportDetails.id }}'
      lastModifiedAt: '{{ response.reportDetails.lastModifiedAt }}'
      name: '{{ response.reportDetails.name }}'
      periodEnd: '{{ response.reportDetails.periodEnd }}'
      periodStart: '{{ response.reportDetails.periodStart }}'
      productName: '{{ response.reportDetails.productName }}'
      sequenceNumber: '{{ response.reportDetails.sequenceNumber }}'
      series: '{{ response.reportDetails.series }}'
      state: '{{ response.reportDetails.state }}'
      statusMessage: '{{ response.reportDetails.statusMessage }}'
      termArn: '{{ response.reportDetails.termArn }}'
      uploadState: '{{ response.reportDetails.uploadState }}'
      version: '{{ response.reportDetails.version }}'
- discovery_id: aws.artifact.get_term_for_report
  calls:
  - action: get_term_for_report
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      documentPresignedUrl: '{{ response.documentPresignedUrl }}'
      termToken: '{{ response.termToken }}'
