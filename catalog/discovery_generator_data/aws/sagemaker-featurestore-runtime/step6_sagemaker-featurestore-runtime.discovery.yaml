# ============================================================
# Discovery YAML — sagemaker-featurestore-runtime (AWS)
# Generated: 2026-02-21T04:56:59Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: sagemaker-featurestore-runtime
services:
  client: sagemaker-featurestore-runtime
  module: boto3.client
discovery:
  # ── Dependent read operations (require identifiers) ──
  # ── GetRecord ──
  - discovery_id: aws.sagemaker-featurestore-runtime.get_record
    calls:
      - action: get_record
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Record }}'
      item:
        FeatureName: '{{ item.FeatureName }}'
        ValueAsString: '{{ item.ValueAsString }}'
        ValueAsStringList: '{{ item.ValueAsStringList }}'
