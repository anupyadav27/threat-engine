version: '1.0'
provider: aws
service: proton
services:
  client: proton
  module: boto3.client
discovery:
- discovery_id: aws.proton.get_account_settings
  calls:
  - action: get_account_settings
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      DestinationArn: '{{ response.accountSettings.DestinationArn }}'
      Enabled: '{{ response.accountSettings.Enabled }}'
      Format: '{{ response.accountSettings.Format }}'
      Level: '{{ response.accountSettings.Level }}'
      accountSettings: '{{ response.accountSettings.accountSettings }}'
      pipelineCodebuildRoleArn: '{{ response.accountSettings.pipelineCodebuildRoleArn }}'
      pipelineProvisioningRepository: '{{ response.accountSettings.pipelineProvisioningRepository.arn }}'
      pipelineServiceRoleArn: '{{ response.accountSettings.pipelineServiceRoleArn }}'
      arn: '{{ response.accountSettings.pipelineProvisioningRepository.arn }}'
      branch: '{{ response.accountSettings.pipelineProvisioningRepository.branch }}'
      name: '{{ response.accountSettings.pipelineProvisioningRepository.name }}'
      provider: '{{ response.accountSettings.pipelineProvisioningRepository.provider }}'
- discovery_id: aws.proton.get_resources_summary
  calls:
  - action: get_resources_summary
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      component: '{{ response.counts.component }}'
      components: '{{ response.counts.components.total }}'
      counts: '{{ response.counts.counts }}'
      environmentTemplates: '{{ response.counts.environmentTemplates.total }}'
      environments: '{{ response.counts.environments.total }}'
      pipelines: '{{ response.counts.pipelines }}'
      serviceInstances: '{{ response.counts.serviceInstances.total }}'
      serviceTemplates: '{{ response.counts.serviceTemplates.total }}'
      services: '{{ response.counts.services }}'
      behindMajor: '{{ response.counts.components.behindMajor }}'
      behindMinor: '{{ response.counts.components.behindMinor }}'
      failed: '{{ response.counts.components.failed }}'
      total: '{{ response.counts.components.total }}'
      upToDate: '{{ response.counts.components.upToDate }}'
- discovery_id: aws.proton.list_components
  calls:
  - action: list_components
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.components }}'
    item:
      arn: '{{ item.arn }}'
      createdAt: '{{ item.createdAt }}'
      deploymentStatus: '{{ item.deploymentStatus }}'
      deploymentStatusMessage: '{{ item.deploymentStatusMessage }}'
      environment: '{{ item.environment }}'
      environmentName: '{{ item.environmentName }}'
      id: '{{ item.id }}'
      lastAttemptedDeploymentId: '{{ item.lastAttemptedDeploymentId }}'
      lastDeploymentAttemptedAt: '{{ item.lastDeploymentAttemptedAt }}'
      lastDeploymentSucceededAt: '{{ item.lastDeploymentSucceededAt }}'
      lastModifiedAt: '{{ item.lastModifiedAt }}'
      lastSucceededDeploymentId: '{{ item.lastSucceededDeploymentId }}'
      name: '{{ item.name }}'
      serviceInstanceName: '{{ item.serviceInstanceName }}'
      serviceName: '{{ item.serviceName }}'
      nextToken: '{{ response.nextToken }}'
- discovery_id: aws.proton.list_deployments
  calls:
  - action: list_deployments
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.deployments }}'
    item:
      arn: '{{ item.arn }}'
      completedAt: '{{ item.completedAt }}'
      componentName: '{{ item.componentName }}'
      createdAt: '{{ item.createdAt }}'
      deploymentStatus: '{{ item.deploymentStatus }}'
      environmentName: '{{ item.environmentName }}'
      lastAttemptedDeploymentId: '{{ item.lastAttemptedDeploymentId }}'
      lastModifiedAt: '{{ item.lastModifiedAt }}'
      lastSucceededDeploymentId: '{{ item.lastSucceededDeploymentId }}'
      serviceInstanceName: '{{ item.serviceInstanceName }}'
      serviceName: '{{ item.serviceName }}'
      targetArn: '{{ item.targetArn }}'
      targetResourceCreatedAt: '{{ item.targetResourceCreatedAt }}'
      targetResourceType: '{{ item.targetResourceType }}'
      nextToken: '{{ response.nextToken }}'
- discovery_id: aws.proton.list_environment_templates
  calls:
  - action: list_environment_templates
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.templates }}'
    item:
      arn: '{{ item.arn }}'
      createdAt: '{{ item.createdAt }}'
      description: '{{ item.description }}'
      displayName: '{{ item.displayName }}'
      lastModifiedAt: '{{ item.lastModifiedAt }}'
      name: '{{ item.name }}'
      provisioning: '{{ item.provisioning }}'
      recommendedVersion: '{{ item.recommendedVersion }}'
      nextToken: '{{ response.nextToken }}'
- discovery_id: aws.proton.list_environments
