      name: '{{ item.name }}'
      provider: '{{ item.provider }}'
      nextToken: '{{ response.nextToken }}'
- discovery_id: aws.proton.list_service_instances
  calls:
  - action: list_service_instances
    save_as: response
    on_error: continue
  emit:
