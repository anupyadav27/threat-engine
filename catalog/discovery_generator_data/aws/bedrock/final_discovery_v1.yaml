# ==========================================================
# Discovery YAML — bedrock (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 8 | ops: 4 independent, 0 dependent
# ==========================================================
version: '1.0'
provider: aws
service: bedrock

services:
  client: bedrock
  module: "boto3.client('bedrock')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: guardrail
    identifier_op: aws.bedrock.list_enforced_guardrails_configuration
    identifier_field: arn
    item_var_path: item.arn
    identifier_template: '{arn}'
  - resource_type: job
    identifier_op: aws.bedrock.list_model_invocation_jobs
    identifier_field: jobArn
    item_var_path: item.jobArn
    identifier_template: '{jobarn}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.bedrock.get_custom_model  ──
  - discovery_id: aws.bedrock.get_custom_model
    calls:
      - action: get_custom_model
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.validationMetrics }}'
      item:
        importedModelKmsKeyArn: '{{ item.importedModelKmsKeyArn }}'
        modelKmsKeyArn: '{{ item.modelKmsKeyArn }}'
        outputModelKmsKeyArn: '{{ item.outputModelKmsKeyArn }}'
        trainingDataConfig: '{{ item.trainingDataConfig }}'
        validationDataConfig: '{{ item.validationDataConfig }}'
        validationLoss: '{{ item.validationLoss }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.bedrock.get_model_invocation_logging_configuration  ──
  - discovery_id: aws.bedrock.get_model_invocation_logging_configuration
    calls:
      - action: get_model_invocation_logging_configuration
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        cloudWatchConfig: '{{ item.cloudWatchConfig }}'
        embeddingDataDeliveryEnabled: '{{ item.embeddingDataDeliveryEnabled }}'
        imageDataDeliveryEnabled: '{{ item.imageDataDeliveryEnabled }}'
        loggingConfig: '{{ item.loggingConfig }}'
        loggingConfig.cloudWatchConfig: '{{ item.loggingConfig.cloudWatchConfig }}'
        loggingConfig.imageDataDeliveryEnabled: '{{ item.loggingConfig.imageDataDeliveryEnabled }}'
        s3Config: '{{ item.s3Config }}'
        textDataDeliveryEnabled: '{{ item.textDataDeliveryEnabled }}'
        videoDataDeliveryEnabled: '{{ item.videoDataDeliveryEnabled }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.bedrock.list_enforced_guardrails_configuration  ──
  - discovery_id: aws.bedrock.list_enforced_guardrails_configuration
    calls:
      - action: list_enforced_guardrails_configuration
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.guardrailsConfig }}'
      item:
        arn: '{{ item.arn }}'
        configId: '{{ item.configId }}'
        createdAt: '{{ item.createdAt }}'
        createdBy: '{{ item.createdBy }}'
        guardrailArn: '{{ item.guardrailArn }}'
        guardrailId: '{{ item.guardrailId }}'
        guardrailVersion: '{{ item.guardrailVersion }}'
        id: '{{ item.id }}'
        inputTags: '{{ item.inputTags }}'
        owner: '{{ item.owner }}'
        updatedAt: '{{ item.updatedAt }}'
        updatedBy: '{{ item.updatedBy }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.bedrock.list_model_invocation_jobs  ──
  - discovery_id: aws.bedrock.list_model_invocation_jobs
    calls:
      - action: list_model_invocation_jobs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.invocationJobSummaries }}'
      item:
        SecurityGroupIds: '{{ item.SecurityGroupIds }}'
        SubnetIds: '{{ item.SubnetIds }}'
        clientRequestToken: '{{ item.clientRequestToken }}'
        endTime: '{{ item.endTime }}'
        inputDataConfig: '{{ item.inputDataConfig }}'
        jobArn: '{{ item.jobArn }}'
        jobExpirationTime: '{{ item.jobExpirationTime }}'
        jobName: '{{ item.jobName }}'
        lastModifiedTime: '{{ item.lastModifiedTime }}'
        message: '{{ item.message }}'
        modelId: '{{ item.modelId }}'
        outputDataConfig: '{{ item.outputDataConfig }}'
        roleArn: '{{ item.roleArn }}'
        status: '{{ item.status }}'
        submitTime: '{{ item.submitTime }}'
        timeoutDurationInHours: '{{ item.timeoutDurationInHours }}'
        trainingDataConfig: '{{ item.trainingDataConfig }}'
        validationDataConfig: '{{ item.validationDataConfig }}'
        vpcConfig: '{{ item.vpcConfig }}'

