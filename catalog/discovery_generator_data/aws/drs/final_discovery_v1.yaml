# ==========================================================
# Discovery YAML — drs (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 1 | ops: 1 independent, 0 dependent
# ==========================================================
version: '1.0'
provider: aws
service: drs

services:
  client: drs
  module: "boto3.client('drs')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: bucket
    identifier_op: aws.drs.describe_launch_configuration_templates
    identifier_field: arn
    item_var_path: item.arn
    identifier_template: '{arn}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.drs.describe_launch_configuration_templates  ──
  - discovery_id: aws.drs.describe_launch_configuration_templates
    calls:
      - action: describe_launch_configuration_templates
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        arn: '{{ item.arn }}'
        copyPrivateIp: '{{ item.copyPrivateIp }}'
        copyTags: '{{ item.copyTags }}'
        ec2LaunchTemplateID: '{{ item.ec2LaunchTemplateID }}'
        exportBucketArn: '{{ item.exportBucketArn }}'
        launchConfigurationTemplateID: '{{ item.launchConfigurationTemplateID }}'
        launchDisposition: '{{ item.launchDisposition }}'
        launchIntoSourceInstance: '{{ item.launchIntoSourceInstance }}'
        licensing: '{{ item.licensing }}'
        postLaunchEnabled: '{{ item.postLaunchEnabled }}'
        tags: '{{ item.tags }}'
        targetInstanceTypeRightSizingMethod: '{{ item.targetInstanceTypeRightSizingMethod }}'

