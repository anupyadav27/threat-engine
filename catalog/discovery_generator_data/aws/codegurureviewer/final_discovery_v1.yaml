# ==========================================================
# Discovery YAML — codegurureviewer (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 1 | ops: 1 independent, 0 dependent
# ==========================================================
version: '1.0'
provider: aws
service: codegurureviewer

services:
  client: codegurureviewer
  module: "boto3.client('codegurureviewer')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: repository
    identifier_op: aws.codegurureviewer.list_repository_associations
    identifier_field: AssociationArn
    item_var_path: item.AssociationArn
    identifier_template: '{associationarn}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.codegurureviewer.list_repository_associations  ──
  - discovery_id: aws.codegurureviewer.list_repository_associations
    calls:
      - action: list_repository_associations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.RepositoryAssociationSummaries }}'
      item:
        AssociationArn: '{{ item.AssociationArn }}'
        AssociationId: '{{ item.AssociationId }}'
        ConnectionArn: '{{ item.ConnectionArn }}'
        KMSKeyDetails: '{{ item.KMSKeyDetails }}'
        LastUpdatedTimeStamp: '{{ item.LastUpdatedTimeStamp }}'
        Name: '{{ item.Name }}'
        Owner: '{{ item.Owner }}'
        ProviderType: '{{ item.ProviderType }}'
        RepositoryAssociation: '{{ item.RepositoryAssociation }}'
        S3RepositoryDetails: '{{ item.S3RepositoryDetails }}'
        State: '{{ item.State }}'
        Tags: '{{ item.Tags }}'

