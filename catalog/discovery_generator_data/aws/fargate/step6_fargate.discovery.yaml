# Auto-generated: minimum discoveries for check rules + inventory identifiers
# Sources: ecs, fargate
# 7 ops (4 from checks, +3 for inventory)
version: '1.0'
provider: aws
service: fargate
discovery:
  - calls:
    - action: list_account_settings
      on_error: continue
      save_as: response
    discovery_id: aws.fargate.list_account_settings
    emit:
      as: item
      item:
        name: '{{ response.name }}'
        principalArn: '{{ response.principalArn }}'
        type: '{{ response.type }}'
        value: '{{ response.value }}'
  - calls:
    - action: describe_clusters
      on_error: continue
      save_as: response
    discovery_id: aws.fargate.describe_clusters
    emit:
      as: item
      item:
        activeServicesCount: '{{ response.activeServicesCount }}'
        attachments: '{{ response.attachments }}'
        attachmentsStatus: '{{ response.attachmentsStatus }}'
        capacityProviders: '{{ response.capacityProviders }}'
        clusterArn: '{{ response.clusterArn }}'
        clusterName: '{{ response.clusterName }}'
        clusters: '{{ response.clusters }}'
        configuration: '{{ response.configuration }}'
        defaultCapacityProviderStrategy: '{{ response.defaultCapacityProviderStrategy
          }}'
        pendingTasksCount: '{{ response.pendingTasksCount }}'
        registeredContainerInstancesCount: '{{ response.registeredContainerInstancesCount
          }}'
        runningTasksCount: '{{ response.runningTasksCount }}'
        serviceConnectDefaults: '{{ response.serviceConnectDefaults }}'
        settings: '{{ response.settings }}'
        statistics: '{{ response.statistics }}'
        status: '{{ response.status }}'
        tags: '{{ response.tags }}'
  - calls:
    - action: describe_capacity_providers
      on_error: continue
      save_as: response
    discovery_id: aws.fargate.describe_capacity_providers
