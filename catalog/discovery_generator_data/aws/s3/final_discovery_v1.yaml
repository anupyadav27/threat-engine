        Status: '{{ item.Status }}'
        Tierings: '{{ item.Tierings }}'

  # ════ DEPENDENT (enrich) operations ════
  # ── aws.s3.list_bucket_metrics_configurations [dependent] ──
  - discovery_id: aws.s3.list_bucket_metrics_configurations
    for_each: aws.s3.list_buckets
    calls:
      - action: list_bucket_metrics_configurations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        Filter: '{{ item.Filter }}'
        Id: '{{ item.Id }}'

  # ════ DEPENDENT (enrich) operations ════
  # ── aws.s3.get_bucket_encryption [dependent] ──
  - discovery_id: aws.s3.get_bucket_encryption
    for_each: aws.s3.list_buckets
    calls:
      - action: get_bucket_encryption
