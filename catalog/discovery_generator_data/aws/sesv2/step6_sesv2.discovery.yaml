    params:
      ContactListName: '{{ item.ContactListName }}'
      EmailAddress: '{{ item.EmailAddress }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.TopicPreferences }}'
    item:
      SubscriptionStatus: '{{ item.SubscriptionStatus }}'
      TopicName: '{{ item.TopicName }}'
      AttributesData: '{{ response.AttributesData }}'
      ContactListName: '{{ response.ContactListName }}'
      CreatedTimestamp: '{{ response.CreatedTimestamp }}'
      EmailAddress: '{{ response.EmailAddress }}'
      LastUpdatedTimestamp: '{{ response.LastUpdatedTimestamp }}'
      UnsubscribeAll: '{{ response.UnsubscribeAll }}'
- discovery_id: aws.sesv2.get_contact_list
  for_each: aws.sesv2.list_contact_lists
  calls:
  - action: get_contact_list
    params:
      ContactListName: '{{ item.ContactListName }}'
    save_as: response
