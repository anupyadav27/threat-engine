version: '1.0'
provider: aws
service: sesv2
services:
  client: sesv2
  module: boto3.client
discovery:
- discovery_id: aws.sesv2.get_account
  calls:
  - action: get_account
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      DedicatedIpAutoWarmupEnabled: '{{ response.DedicatedIpAutoWarmupEnabled }}'
      EnforcementStatus: '{{ response.EnforcementStatus }}'
      Max24HourSend: '{{ response.Max24HourSend }}'
      MaxSendRate: '{{ response.MaxSendRate }}'
      ProductionAccessEnabled: '{{ response.ProductionAccessEnabled }}'
      SendQuota: '{{ response.SendQuota }}'
      SentLast24Hours: '{{ response.SentLast24Hours }}'
      SuppressionAttributes: '{{ response.SuppressionAttributes }}'
      ContactLanguage: '{{ response.Details.ContactLanguage }}'
      MailType: '{{ response.Details.MailType }}'
      CaseId: '{{ response.Details.ReviewDetails.CaseId }}'
      Status: '{{ response.Details.ReviewDetails.Status }}'
      UseCaseDescription: '{{ response.Details.UseCaseDescription }}'
      WebsiteURL: '{{ response.Details.WebsiteURL }}'
      SendingEnabled: '{{ response.SendingEnabled }}'
      EngagementMetrics: '{{ response.VdmAttributes.DashboardAttributes.EngagementMetrics
        }}'
      OptimizedSharedDelivery: '{{ response.VdmAttributes.GuardianAttributes.OptimizedSharedDelivery
        }}'
      VdmEnabled: '{{ response.VdmAttributes.VdmEnabled }}'
- discovery_id: aws.sesv2.get_dedicated_ips
  calls:
  - action: get_dedicated_ips
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.DedicatedIps }}'
    item:
      DedicatedIpPool: '{{ item.DedicatedIpPool }}'
      DedicatedIps: '{{ item.DedicatedIps }}'
      Ip: '{{ item.Ip }}'
      PoolName: '{{ item.PoolName }}'
      ScalingMode: '{{ item.ScalingMode }}'
      WarmupPercentage: '{{ item.WarmupPercentage }}'
      WarmupStatus: '{{ item.WarmupStatus }}'
- discovery_id: aws.sesv2.get_deliverability_dashboard_options
  calls:
  - action: get_deliverability_dashboard_options
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ActiveSubscribedDomains }}'
    item:
      AccountStatus: '{{ item.AccountStatus }}'
      ActiveSubscribedDomains: '{{ item.ActiveSubscribedDomains }}'
      DashboardEnabled: '{{ item.DashboardEnabled }}'
      Domain: '{{ item.Domain }}'
      InboxPlacementTrackingOption: '{{ item.InboxPlacementTrackingOption }}'
      PendingExpirationSubscribedDomains: '{{ item.PendingExpirationSubscribedDomains[].Domain
        }}'
      SubscriptionExpiryDate: '{{ item.SubscriptionExpiryDate }}'
      SubscriptionStartDate: '{{ item.SubscriptionStartDate }}'
- discovery_id: aws.sesv2.list_configuration_sets
  calls:
  - action: list_configuration_sets
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ConfigurationSets }}'
- discovery_id: aws.sesv2.list_contact_lists
  calls:
  - action: list_contact_lists
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ContactLists }}'
    item:
      ContactListName: '{{ item.ContactListName }}'
      LastUpdatedTimestamp: '{{ item.LastUpdatedTimestamp }}'
      Topics: '{{ item.Topics }}'
- discovery_id: aws.sesv2.list_custom_verification_email_templates
  calls:
  - action: list_custom_verification_email_templates
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.CustomVerificationEmailTemplates }}'
    item:
      FailureRedirectionURL: '{{ item.FailureRedirectionURL }}'
      FromEmailAddress: '{{ item.FromEmailAddress }}'
      SuccessRedirectionURL: '{{ item.SuccessRedirectionURL }}'
      TemplateName: '{{ item.TemplateName }}'
      TemplateSubject: '{{ item.TemplateSubject }}'
- discovery_id: aws.sesv2.list_dedicated_ip_pools
  calls:
