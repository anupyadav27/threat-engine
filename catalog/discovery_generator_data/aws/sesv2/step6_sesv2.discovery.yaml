      JobId: '{{ item.JobId }}'
      JobStatus: '{{ item.JobStatus }}'
      ProcessedRecordsCount: '{{ item.ProcessedRecordsCount }}'
- discovery_id: aws.sesv2.list_multi_region_endpoints
  calls:
  - action: list_multi_region_endpoints
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.MultiRegionEndpoints }}'
    item:
      Region: '{{ item.Region }}'
      Status: '{{ item.Status }}'
