- discovery_id: aws.sesv2.get_reputation_entity
  for_each: aws.sesv2.list_reputation_entities
  calls:
  - action: get_reputation_entity
    params:
      ReputationEntityReference: '{{ item.ReputationEntityReference }}'
      ReputationEntityType: '{{ item.ReputationEntityType }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      AwsSesManagedStatus: '{{ response.ReputationEntity.AwsSesManagedStatus }}'
      CustomerManagedStatus: '{{ response.ReputationEntity.CustomerManagedStatus }}'
      ReputationEntity: '{{ response.ReputationEntity.ReputationEntity }}'
      ReputationEntityReference: '{{ response.ReputationEntity.ReputationEntityReference
        }}'
      ReputationEntityType: '{{ response.ReputationEntity.ReputationEntityType }}'
      ReputationImpact: '{{ response.ReputationEntity.ReputationImpact }}'
      ReputationManagementPolicy: '{{ response.ReputationEntity.ReputationManagementPolicy
        }}'
      SendingStatusAggregate: '{{ response.ReputationEntity.SendingStatusAggregate
        }}'
- discovery_id: aws.sesv2.get_suppressed_destination
  for_each: aws.sesv2.list_suppressed_destinations
  calls:
  - action: get_suppressed_destination
    params:
      EmailAddress: '{{ item.EmailAddress }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      Attributes: '{{ response.SuppressedDestination.Attributes.MessageId }}'
      EmailAddress: '{{ response.SuppressedDestination.EmailAddress }}'
      LastUpdateTime: '{{ response.SuppressedDestination.LastUpdateTime }}'
      Reason: '{{ response.SuppressedDestination.Reason }}'
      FeedbackId: '{{ response.SuppressedDestination.Attributes.FeedbackId }}'
      MessageId: '{{ response.SuppressedDestination.Attributes.MessageId }}'
- discovery_id: aws.sesv2.get_tenant
  for_each: aws.sesv2.list_tenants
  calls:
  - action: get_tenant
    params:
      TenantName: '{{ item.TenantName }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      Tags: '{{ response.Tenant.Tags }}'
      CreatedTimestamp: '{{ response.Tenant.CreatedTimestamp }}'
      SendingStatus: '{{ response.Tenant.SendingStatus }}'
      Tenant: '{{ response.Tenant.Tenant }}'
      TenantArn: '{{ response.Tenant.TenantArn }}'
      TenantId: '{{ response.Tenant.TenantId }}'
      TenantName: '{{ response.Tenant.TenantName }}'
- discovery_id: aws.sesv2.list_contacts
  for_each: aws.sesv2.list_contact_lists
  calls:
  - action: list_contacts
    params:
      ContactListName: '{{ item.ContactListName }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Contacts }}'
    item:
      EmailAddress: '{{ item.EmailAddress }}'
      LastUpdatedTimestamp: '{{ item.LastUpdatedTimestamp }}'
      TopicDefaultPreferences: '{{ item.TopicDefaultPreferences }}'
      TopicPreferences: '{{ item.TopicPreferences }}'
      UnsubscribeAll: '{{ item.UnsubscribeAll }}'
- discovery_id: aws.sesv2.list_domain_deliverability_campaigns
  calls:
  - action: list_domain_deliverability_campaigns
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.DomainDeliverabilityCampaigns }}'
    item:
      CampaignId: '{{ item.CampaignId }}'
      DeleteRate: '{{ item.DeleteRate }}'
      Esps: '{{ item.Esps }}'
      FirstSeenDateTime: '{{ item.FirstSeenDateTime }}'
      FromAddress: '{{ item.FromAddress }}'
      ImageUrl: '{{ item.ImageUrl }}'
      InboxCount: '{{ item.InboxCount }}'
      LastSeenDateTime: '{{ item.LastSeenDateTime }}'
      ProjectedVolume: '{{ item.ProjectedVolume }}'
      ReadDeleteRate: '{{ item.ReadDeleteRate }}'
      ReadRate: '{{ item.ReadRate }}'
      SendingIps: '{{ item.SendingIps }}'
      SpamCount: '{{ item.SpamCount }}'
      Subject: '{{ item.Subject }}'
- discovery_id: aws.sesv2.list_resource_tenants
  for_each: aws.sesv2.list_recommendations
  calls:
  - action: list_resource_tenants
    params:
      ResourceArn: '{{ item.ResourceArn }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ResourceTenants }}'
    item:
      ResourceArn: '{{ item.ResourceArn }}'
      AssociatedTimestamp: '{{ item.AssociatedTimestamp }}'
      TenantId: '{{ item.TenantId }}'
      TenantName: '{{ item.TenantName }}'
- discovery_id: aws.sesv2.list_tags_for_resource
  for_each: aws.sesv2.list_recommendations
  calls:
  - action: list_tags_for_resource
    params:
      ResourceArn: '{{ item.ResourceArn }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Tags }}'
    item:
      Key: '{{ item.Key }}'
      Value: '{{ item.Value }}'
- discovery_id: aws.sesv2.list_tenant_resources
  for_each: aws.sesv2.list_tenants
  calls:
  - action: list_tenant_resources
    params:
      TenantName: '{{ item.TenantName }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.TenantResources }}'
    item:
      ResourceArn: '{{ item.ResourceArn }}'
      ResourceType: '{{ item.ResourceType }}'
