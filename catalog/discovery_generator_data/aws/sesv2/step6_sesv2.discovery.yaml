      LastUpdateTime: '{{ item.LastUpdateTime }}'
      Reason: '{{ item.Reason }}'
- discovery_id: aws.sesv2.list_tenants
  calls:
  - action: list_tenants
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Tenants }}'
    item:
