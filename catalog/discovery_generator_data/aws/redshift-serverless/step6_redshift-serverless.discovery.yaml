      reservationId: '{{ response.reservation.reservationId }}'
      startDate: '{{ response.reservation.startDate }}'
      status: '{{ response.reservation.status }}'
- discovery_id: aws.redshift-serverless.get_reservation_offering
  for_each: aws.redshift-serverless.list_reservation_offerings
  calls:
  - action: get_reservation_offering
    params:
      offeringId: '{{ item.offeringId }}'
