# ==========================================================
# Discovery YAML — kinesisanalytics (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 3 | ops: 0 independent, 1 dependent
# ==========================================================
version: '1.0'
provider: aws
service: kinesisanalytics

services:
  client: kinesisanalytics
  module: "boto3.client('kinesisanalytics')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  []

checks: []

discovery:

  # ════ DEPENDENT (enrich) operations ════
  # ── aws.kinesisanalytics.describe_application [dependent] ──
  - discovery_id: aws.kinesisanalytics.describe_application
    for_each: aws.kinesisanalytics.list_applications
    calls:
      - action: describe_application
        params:
          ApplicationName: "{{ item.ApplicationName }}"
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        ApplicationARN: '{{ item.ApplicationARN }}'
        ApplicationCode: '{{ item.ApplicationCode }}'
        ApplicationConfigurationDescription: '{{ item.ApplicationConfigurationDescription }}'
        ApplicationConfigurationDescription.ApplicationCodeConfigurationDescription.CodeContentDescription.CodeContentType: '{{ item.ApplicationConfigurationDescription.ApplicationCodeConfigurationDescription.CodeContentDescription.CodeContentType }}'
        ApplicationConfigurationDescription.VpcConfigurationDescriptions: '{{ item.ApplicationConfigurationDescription.VpcConfigurationDescriptions }}'
        ApplicationDescription: '{{ item.ApplicationDescription }}'
        ApplicationDetail: '{{ item.ApplicationDetail }}'
        ApplicationName: '{{ item.ApplicationName }}'
        ApplicationStatus: '{{ item.ApplicationStatus }}'
        ApplicationVersionId: '{{ item.ApplicationVersionId }}'
        CloudWatchLoggingOptionDescriptions: '{{ item.CloudWatchLoggingOptionDescriptions }}'
        CreateTimestamp: '{{ item.CreateTimestamp }}'
        InputDescriptions: '{{ item.InputDescriptions }}'
        LastUpdateTimestamp: '{{ item.LastUpdateTimestamp }}'
        OutputDescriptions: '{{ item.OutputDescriptions }}'
        ReferenceDataSourceDescriptions: '{{ item.ReferenceDataSourceDescriptions }}'
        ServiceExecutionRole: '{{ item.ServiceExecutionRole }}'

