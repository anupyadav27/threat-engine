      IngressPointId: '{{ item.IngressPointId }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      IngressPointPasswordConfiguration: '{{ response.IngressPointAuthConfiguration.IngressPointPasswordConfiguration.SmtpPasswordVersion }}'
      SecretArn: '{{ response.IngressPointAuthConfiguration.SecretArn }}'
      ARecord: '{{ response.ARecord }}'
      CreatedTimestamp: '{{ response.CreatedTimestamp }}'
      IngressPointArn: '{{ response.IngressPointArn }}'
      PreviousSmtpPasswordExpiryTimestamp: '{{ response.IngressPointAuthConfiguration.IngressPointPasswordConfiguration.PreviousSmtpPasswordExpiryTimestamp }}'
      PreviousSmtpPasswordVersion: '{{ response.IngressPointAuthConfiguration.IngressPointPasswordConfiguration.PreviousSmtpPasswordVersion }}'
      SmtpPasswordVersion: '{{ response.IngressPointAuthConfiguration.IngressPointPasswordConfiguration.SmtpPasswordVersion }}'
      IngressPointId: '{{ response.IngressPointId }}'
      IngressPointName: '{{ response.IngressPointName }}'
      LastUpdatedTimestamp: '{{ response.LastUpdatedTimestamp }}'
      VpcEndpointId: '{{ response.NetworkConfiguration.PrivateNetworkConfiguration.VpcEndpointId }}'
      IpType: '{{ response.NetworkConfiguration.PublicNetworkConfiguration.IpType }}'
      RuleSetId: '{{ response.RuleSetId }}'
      Status: '{{ response.Status }}'
      TrafficPolicyId: '{{ response.TrafficPolicyId }}'
      Type: '{{ response.Type }}'
