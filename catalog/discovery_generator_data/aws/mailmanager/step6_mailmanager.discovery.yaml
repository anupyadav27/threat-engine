  emit:
    as: item
    item:
      Authentication: '{{ response.Authentication.Authentication }}'
      NoAuthentication: '{{ response.Authentication.NoAuthentication }}'
      SecretArn: '{{ response.Authentication.SecretArn }}'
      CreatedTimestamp: '{{ response.CreatedTimestamp }}'
      LastModifiedTimestamp: '{{ response.LastModifiedTimestamp }}'
      RelayArn: '{{ response.RelayArn }}'
      RelayId: '{{ response.RelayId }}'
      RelayName: '{{ response.RelayName }}'
