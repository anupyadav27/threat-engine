    on_error: continue
  emit:
    as: item
    item:
      Address: '{{ response.Address }}'
      CreatedTimestamp: '{{ response.CreatedTimestamp }}'
- discovery_id: aws.mailmanager.get_relay
  for_each: aws.mailmanager.list_relays
  calls:
  - action: get_relay
    params:
      RelayId: '{{ item.RelayId }}'
    save_as: response
