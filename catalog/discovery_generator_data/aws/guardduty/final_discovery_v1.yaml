# ==========================================================
# Discovery YAML — guardduty (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 32 | ops: 5 independent, 0 dependent
# ==========================================================
version: '1.0'
provider: aws
service: guardduty

services:
  client: guardduty
  module: "boto3.client('guardduty')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: malware_scan
    identifier_op: aws.guardduty.describe_malware_scans
    identifier_field: AccountId
    item_var_path: item.AccountId
    identifier_template: '{accountid}'
  - resource_type: organization_configuration
    identifier_op: aws.guardduty.describe_organization_configuration
    identifier_field: Name
    item_var_path: item.Name
    identifier_template: '{name}'
  - resource_type: get_detector
    identifier_op: aws.guardduty.get_detector
    identifier_field: Name
    item_var_path: item.Name
    identifier_template: '{name}'
  - resource_type: get_member_detector
    identifier_op: aws.guardduty.get_member_detectors
    identifier_field: AccountId
    item_var_path: item.AccountId
    identifier_template: '{accountid}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.guardduty.describe_malware_scans  ──
  - discovery_id: aws.guardduty.describe_malware_scans
    calls:
      - action: describe_malware_scans
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Scans }}'
      item:
        AccountId: '{{ item.AccountId }}'
        AdminDetectorId: '{{ item.AdminDetectorId }}'
        AttachedVolumes: '{{ item.AttachedVolumes }}'
        DetectorId: '{{ item.DetectorId }}'
        FailureReason: '{{ item.FailureReason }}'
        FileCount: '{{ item.FileCount }}'
        ResourceDetails: '{{ item.ResourceDetails }}'
        ScanEndTime: '{{ item.ScanEndTime }}'
        ScanId: '{{ item.ScanId }}'
        ScanResultDetails: '{{ item.ScanResultDetails }}'
        ScanStartTime: '{{ item.ScanStartTime }}'
        ScanStatus: '{{ item.ScanStatus }}'
        ScanType: '{{ item.ScanType }}'
        TotalBytes: '{{ item.TotalBytes }}'
        TriggerDetails: '{{ item.TriggerDetails }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.guardduty.describe_organization_configuration  ──
  - discovery_id: aws.guardduty.describe_organization_configuration
    calls:
      - action: describe_organization_configuration
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Features }}'
      item:
        AdditionalConfiguration: '{{ item.AdditionalConfiguration }}'
        AutoEnable: '{{ item.AutoEnable }}'
        AutoEnableOrganizationMembers: '{{ item.AutoEnableOrganizationMembers }}'
        DataSources: '{{ item.DataSources }}'
        DataSources.S3Logs.Enable: '{{ item.DataSources.S3Logs.Enable }}'
        Enabled: '{{ item.Enabled }}'
        MemberAccountLimitReached: '{{ item.MemberAccountLimitReached }}'
        Name: '{{ item.Name }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.guardduty.get_detector  ──
  - discovery_id: aws.guardduty.get_detector
    calls:
      - action: get_detector
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Features }}'
      item:
        AdditionalConfiguration: '{{ item.AdditionalConfiguration }}'
        CreatedAt: '{{ item.CreatedAt }}'
        DataSources: '{{ item.DataSources }}'
        DataSources.S3Logs.Enable: '{{ item.DataSources.S3Logs.Enable }}'
        FindingPublishingFrequency: '{{ item.FindingPublishingFrequency }}'
        Name: '{{ item.Name }}'
        ServiceRole: '{{ item.ServiceRole }}'
        Status: '{{ item.Status }}'
        UpdatedAt: '{{ item.UpdatedAt }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.guardduty.get_member_detectors  ──
  - discovery_id: aws.guardduty.get_member_detectors
    calls:
      - action: get_member_detectors
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.MemberDataSourceConfigurations }}'
      item:
        AccountId: '{{ item.AccountId }}'
        DataSources: '{{ item.DataSources }}'
        DataSources.KinesisDataStream.DestinationProperties.DestinationArn: '{{ item.DataSources.KinesisDataStream.DestinationProperties.DestinationArn }}'
        DataSources.MalwareProtection.ScanEc2InstanceWithFindings.EbsVolumes.Status: '{{ item.DataSources.MalwareProtection.ScanEc2InstanceWithFindings.EbsVolumes.Status }}'
        Features: '{{ item.Features }}'
        Features.EKSClusterAuditLogsConfiguration.AutoEnable: '{{ item.Features.EKSClusterAuditLogsConfiguration.AutoEnable }}'
        MemberDataSourceConfigurations: '{{ item.MemberDataSourceConfigurations }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.guardduty.list_detectors  ──
  - discovery_id: aws.guardduty.list_detectors
    calls:
      - action: list_detectors
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        item: '{{ item }}'

