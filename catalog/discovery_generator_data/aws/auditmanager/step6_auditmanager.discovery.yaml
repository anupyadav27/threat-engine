      id: '{{ response.control.id }}'
      lastUpdatedAt: '{{ response.control.lastUpdatedAt }}'
      lastUpdatedBy: '{{ response.control.lastUpdatedBy }}'
      name: '{{ response.control.name }}'
      state: '{{ response.control.state }}'
      tags: '{{ response.control.tags }}'
      testingInformation: '{{ response.control.testingInformation }}'
      type: '{{ response.control.type }}'
- discovery_id: aws.auditmanager.get_evidence
  for_each: aws.auditmanager.get_delegations
  calls:
