version: '1.0'
provider: aws
service: auditmanager
services:
  client: auditmanager
  module: boto3.client
discovery:
- discovery_id: aws.auditmanager.get_account_status
  calls:
  - action: get_account_status
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      status: '{{ response.status }}'
- discovery_id: aws.auditmanager.get_delegations
  calls:
  - action: get_delegations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.delegations }}'
    item:
      assessmentId: '{{ item.assessmentId }}'
      assessmentName: '{{ item.assessmentName }}'
      controlSetName: '{{ item.controlSetName }}'
      creationTime: '{{ item.creationTime }}'
      id: '{{ item.id }}'
      roleArn: '{{ item.roleArn }}'
      status: '{{ item.status }}'
      nextToken: '{{ response.nextToken }}'
- discovery_id: aws.auditmanager.get_insights
  calls:
  - action: get_insights
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      activeAssessmentsCount: '{{ response.insights.activeAssessmentsCount }}'
      assessmentControlsCountByNoncompliantEvidence: '{{ response.insights.assessmentControlsCountByNoncompliantEvidence }}'
      compliantEvidenceCount: '{{ response.insights.compliantEvidenceCount }}'
      inconclusiveEvidenceCount: '{{ response.insights.inconclusiveEvidenceCount }}'
      insights: '{{ response.insights.insights }}'
      lastUpdated: '{{ response.insights.lastUpdated }}'
      noncompliantEvidenceCount: '{{ response.insights.noncompliantEvidenceCount }}'
      totalAssessmentControlsCount: '{{ response.insights.totalAssessmentControlsCount }}'
- discovery_id: aws.auditmanager.get_organization_admin_account
  calls:
  - action: get_organization_admin_account
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      adminAccountId: '{{ response.adminAccountId }}'
      organizationId: '{{ response.organizationId }}'
- discovery_id: aws.auditmanager.get_services_in_scope
  calls:
  - action: get_services_in_scope
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.serviceMetadata }}'
    item:
      category: '{{ item.category }}'
      description: '{{ item.description }}'
      displayName: '{{ item.displayName }}'
      name: '{{ item.name }}'
      serviceMetadata: '{{ item.serviceMetadata }}'
- discovery_id: aws.auditmanager.list_assessment_reports
  calls:
  - action: list_assessment_reports
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.assessmentReports }}'
    item:
      assessment: '{{ item.assessment }}'
      assessmentId: '{{ item.assessmentId }}'
      assessmentName: '{{ item.assessmentName }}'
      author: '{{ item.author }}'
      creationTime: '{{ item.creationTime }}'
      description: '{{ item.description }}'
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      nextToken: '{{ response.nextToken }}'
- discovery_id: aws.auditmanager.list_assessments
  calls:
  - action: list_assessments
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.assessmentMetadata }}'
    item:
      complianceType: '{{ item.complianceType }}'
      creationTime: '{{ item.creationTime }}'
      delegations: '{{ item.delegations }}'
      id: '{{ item.id }}'
      lastUpdated: '{{ item.lastUpdated }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      roles: '{{ item.roles }}'
      status: '{{ item.status }}'
      nextToken: '{{ response.nextToken }}'
- discovery_id: aws.auditmanager.list_control_domain_insights
  calls:
  - action: list_control_domain_insights
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.controlDomainInsights }}'
    item:
      controlsCountByNoncompliantEvidence: '{{ item.controlsCountByNoncompliantEvidence }}'
      evidenceInsights: '{{ item.evidenceInsights }}'
      id: '{{ item.id }}'
      insights: '{{ item.insights }}'
      lastUpdated: '{{ item.lastUpdated }}'
      name: '{{ item.name }}'
      totalControlsCount: '{{ item.totalControlsCount }}'
      nextToken: '{{ response.nextToken }}'
- discovery_id: aws.auditmanager.list_notifications
  calls:
  - action: list_notifications
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.notifications }}'
    item:
      assessmentId: '{{ item.assessmentId }}'
      assessmentName: '{{ item.assessmentName }}'
      controlSetId: '{{ item.controlSetId }}'
      controlSetName: '{{ item.controlSetName }}'
      description: '{{ item.description }}'
      eventTime: '{{ item.eventTime }}'
      id: '{{ item.id }}'
      source: '{{ item.source }}'
      nextToken: '{{ response.nextToken }}'
- discovery_id: aws.auditmanager.get_assessment
  for_each: aws.auditmanager.get_delegations
  calls:
  - action: get_assessment
    params:
      assessmentId: '{{ item.assessmentId }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      arn: '{{ response.assessment.arn }}'
      awsAccount: '{{ response.assessment.awsAccount.id }}'
      framework: '{{ response.assessment.framework.id }}'
      tags: '{{ response.assessment.tags }}'
      emailAddress: '{{ response.assessment.awsAccount.emailAddress }}'
      id: '{{ response.assessment.awsAccount.id }}'
      name: '{{ response.assessment.awsAccount.name }}'
      complianceType: '{{ response.assessment.framework.metadata.complianceType }}'
      description: '{{ response.assessment.framework.metadata.description }}'
      logo: '{{ response.assessment.framework.metadata.logo }}'
      destination: '{{ response.assessment.metadata.assessmentReportsDestination.destination }}'
      destinationType: '{{ response.assessment.metadata.assessmentReportsDestination.destinationType }}'
      creationTime: '{{ response.assessment.metadata.creationTime }}'
      lastUpdated: '{{ response.assessment.metadata.lastUpdated }}'
      status: '{{ response.assessment.metadata.status }}'
      roleArn: '{{ response.userRole.roleArn }}'
      roleType: '{{ response.userRole.roleType }}'
- discovery_id: aws.auditmanager.get_assessment_framework
  calls:
  - action: get_assessment_framework
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      arn: '{{ response.framework.arn }}'
      complianceType: '{{ response.framework.complianceType }}'
      controlSets: '{{ response.framework.controlSets[].id }}'
      controlSources: '{{ response.framework.controlSources }}'
      createdAt: '{{ response.framework.createdAt }}'
      createdBy: '{{ response.framework.createdBy }}'
      description: '{{ response.framework.description }}'
      id: '{{ response.framework.id }}'
      lastUpdatedAt: '{{ response.framework.lastUpdatedAt }}'
      lastUpdatedBy: '{{ response.framework.lastUpdatedBy }}'
      logo: '{{ response.framework.logo }}'
      name: '{{ response.framework.name }}'
      tags: '{{ response.framework.tags }}'
      type: '{{ response.framework.type }}'
- discovery_id: aws.auditmanager.get_assessment_report_url
  for_each: aws.auditmanager.get_delegations
  calls:
  - action: get_assessment_report_url
    params:
      assessmentReportId: '{{ item.assessmentReportId }}'
      assessmentId: '{{ item.assessmentId }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      hyperlinkName: '{{ response.preSignedUrl.hyperlinkName }}'
      link: '{{ response.preSignedUrl.link }}'
- discovery_id: aws.auditmanager.get_change_logs
  for_each: aws.auditmanager.get_delegations
  calls:
  - action: get_change_logs
    params:
      assessmentId: '{{ item.assessmentId }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.changeLogs }}'
    item:
      action: '{{ item.action }}'
      createdAt: '{{ item.createdAt }}'
      createdBy: '{{ item.createdBy }}'
      objectName: '{{ item.objectName }}'
      objectType: '{{ item.objectType }}'
      nextToken: '{{ response.nextToken }}'
- discovery_id: aws.auditmanager.get_control
