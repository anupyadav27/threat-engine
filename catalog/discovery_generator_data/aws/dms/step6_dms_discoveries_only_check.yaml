version: '1.0'
provider: aws
service: dms
services:
  client: dms
  module: boto3.client
discovery:
- discovery_id: aws.dms.describe_endpoints
  calls:
  - action: describe_endpoints
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Endpoints }}'
    item:
      KmsKeyId: '{{ item.KmsKeyId }}'
      Status: '{{ item.Status }}'
      CertificateArn: '{{ item.CertificateArn }}'
      DatabaseName: '{{ item.DatabaseName }}'
      DmsTransferSettings: '{{ item.DmsTransferSettings }}'
