# ==========================================================
# Discovery YAML — appconfig (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 13 | ops: 3 independent, 0 dependent
# ==========================================================
version: '1.0'
provider: aws
service: appconfig

services:
  client: appconfig
  module: "boto3.client('appconfig')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: extension
    identifier_op: aws.appconfig.list_extension_associations
    identifier_field: ResourceArn
    item_var_path: item.ResourceArn
    identifier_template: '{resourcearn}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.appconfig.get_configuration  ──
  - discovery_id: aws.appconfig.get_configuration
    calls:
      - action: get_configuration
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        ConfigurationVersion: '{{ item.ConfigurationVersion }}'
        Content: '{{ item.Content }}'
        ContentType: '{{ item.ContentType }}'
        Description: '{{ item.Description }}'
        Tags: '{{ item.Tags }}'
        Validators: '{{ item.Validators }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.appconfig.list_deployment_strategies  ──
  - discovery_id: aws.appconfig.list_deployment_strategies
    calls:
      - action: list_deployment_strategies
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Items }}'
      item:
        DeploymentDurationInMinutes: '{{ item.DeploymentDurationInMinutes }}'
        Description: '{{ item.Description }}'
        FinalBakeTimeInMinutes: '{{ item.FinalBakeTimeInMinutes }}'
        GrowthFactor: '{{ item.GrowthFactor }}'
        GrowthType: '{{ item.GrowthType }}'
        Id: '{{ item.Id }}'
        LocationUri: '{{ item.LocationUri }}'
        Name: '{{ item.Name }}'
        ReplicateTo: '{{ item.ReplicateTo }}'
        Tags: '{{ item.Tags }}'
        item: '{{ item }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.appconfig.list_extension_associations  ──
  - discovery_id: aws.appconfig.list_extension_associations
    calls:
      - action: list_extension_associations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Items }}'
      item:
        ExtensionArn: '{{ item.ExtensionArn }}'
        Id: '{{ item.Id }}'
        ResourceArn: '{{ item.ResourceArn }}'
        Tags: '{{ item.Tags }}'

