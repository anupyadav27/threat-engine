version: '1.0'
provider: aws
service: sagemaker-geospatial
services:
  client: sagemaker-geospatial
  module: boto3.client
discovery:
- discovery_id: aws.sagemaker-geospatial.list_earth_observation_jobs
  calls:
  - action: list_earth_observation_jobs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.EarthObservationJobSummaries }}'
    item:
      Arn: '{{ item.Arn }}'
      CreationTime: '{{ item.CreationTime }}'
      Name: '{{ item.Name }}'
      Status: '{{ item.Status }}'
      Tags: '{{ item.Tags }}'
      DurationInSeconds: '{{ item.DurationInSeconds }}'
      OperationType: '{{ item.OperationType }}'
- discovery_id: aws.sagemaker-geospatial.list_raster_data_collections
  calls:
  - action: list_raster_data_collections
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.RasterDataCollectionSummaries }}'
    item:
      Arn: '{{ item.Arn }}'
      Name: '{{ item.Name }}'
      Tags: '{{ item.Tags }}'
      Description: '{{ item.Description }}'
      DescriptionPageUrl: '{{ item.DescriptionPageUrl }}'
      SupportedFilters: '{{ item.SupportedFilters }}'
      Type: '{{ item.Type }}'
- discovery_id: aws.sagemaker-geospatial.list_vector_enrichment_jobs
  calls:
  - action: list_vector_enrichment_jobs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.VectorEnrichmentJobSummaries }}'
    item:
      Arn: '{{ item.Arn }}'
      CreationTime: '{{ item.CreationTime }}'
      Name: '{{ item.Name }}'
      Status: '{{ item.Status }}'
      Tags: '{{ item.Tags }}'
      DurationInSeconds: '{{ item.DurationInSeconds }}'
      Type: '{{ item.Type }}'
- discovery_id: aws.sagemaker-geospatial.get_earth_observation_job
  for_each: aws.sagemaker-geospatial.list_earth_observation_jobs
  calls:
  - action: get_earth_observation_job
    params:
      Arn: '{{ item.Arn }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.OutputBands }}'
    item:
      BandName: '{{ item.BandName }}'
      OutputDataType: '{{ item.OutputDataType }}'
      Arn: '{{ response.Arn }}'
      CreationTime: '{{ response.CreationTime }}'
      DurationInSeconds: '{{ response.DurationInSeconds }}'
      Message: '{{ response.ErrorDetails.Message }}'
      Type: '{{ response.ErrorDetails.Type }}'
      ExecutionRoleArn: '{{ response.ExecutionRoleArn }}'
      ExportStatus: '{{ response.ExportStatus }}'
      PreviousEarthObservationJobArn: '{{ response.InputConfig.PreviousEarthObservationJobArn }}'
      LogicalOperator: '{{ response.InputConfig.RasterDataCollectionQuery.PropertyFilters.LogicalOperator }}'
      RasterDataCollectionArn: '{{ response.InputConfig.RasterDataCollectionQuery.RasterDataCollectionArn }}'
      RasterDataCollectionName: '{{ response.InputConfig.RasterDataCollectionQuery.RasterDataCollectionName }}'
      EndTime: '{{ response.InputConfig.RasterDataCollectionQuery.TimeRangeFilter.EndTime }}'
      StartTime: '{{ response.InputConfig.RasterDataCollectionQuery.TimeRangeFilter.StartTime }}'
      AlgorithmName: '{{ response.JobConfig.CloudRemovalConfig.AlgorithmName }}'
      InterpolationValue: '{{ response.JobConfig.CloudRemovalConfig.InterpolationValue }}'
      Unit: '{{ response.JobConfig.ResamplingConfig.OutputResolution.UserDefined.Unit }}'
      Value: '{{ response.JobConfig.ResamplingConfig.OutputResolution.UserDefined.Value }}'
      Predefined: '{{ response.JobConfig.StackConfig.OutputResolution.Predefined }}'
      GroupBy: '{{ response.JobConfig.TemporalStatisticsConfig.GroupBy }}'
      ZoneS3Path: '{{ response.JobConfig.ZonalStatisticsConfig.ZoneS3Path }}'
      ZoneS3PathKmsKeyId: '{{ response.JobConfig.ZonalStatisticsConfig.ZoneS3PathKmsKeyId }}'
      KmsKeyId: '{{ response.KmsKeyId }}'
      Name: '{{ response.Name }}'
      Status: '{{ response.Status }}'
      Tags: '{{ response.Tags }}'
- discovery_id: aws.sagemaker-geospatial.get_raster_data_collection
  for_each: aws.sagemaker-geospatial.list_earth_observation_jobs
  calls:
  - action: get_raster_data_collection
    params:
      Arn: '{{ item.Arn }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ImageSourceBands }}'
    item:
      Arn: '{{ response.Arn }}'
      Description: '{{ response.Description }}'
      DescriptionPageUrl: '{{ response.DescriptionPageUrl }}'
      Name: '{{ response.Name }}'
      Tags: '{{ response.Tags }}'
      Type: '{{ response.Type }}'
- discovery_id: aws.sagemaker-geospatial.get_tile
  calls:
  - action: get_tile
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      BinaryFile: '{{ response.BinaryFile }}'
- discovery_id: aws.sagemaker-geospatial.get_vector_enrichment_job
  for_each: aws.sagemaker-geospatial.list_earth_observation_jobs
  calls:
  - action: get_vector_enrichment_job
    params:
      Arn: '{{ item.Arn }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      ErrorMessage: '{{ response.ErrorDetails.ErrorMessage }}'
      ErrorType: '{{ response.ErrorDetails.ErrorType }}'
      Arn: '{{ response.Arn }}'
      CreationTime: '{{ response.CreationTime }}'
      DurationInSeconds: '{{ response.DurationInSeconds }}'
      ExecutionRoleArn: '{{ response.ExecutionRoleArn }}'
      Message: '{{ response.ExportErrorDetails.Message }}'
      Type: '{{ response.ExportErrorDetails.Type }}'
      ExportStatus: '{{ response.ExportStatus }}'
      KmsKeyId: '{{ response.InputConfig.DataSourceConfig.S3Data.KmsKeyId }}'
      S3Uri: '{{ response.InputConfig.DataSourceConfig.S3Data.S3Uri }}'
      DocumentType: '{{ response.InputConfig.DocumentType }}'
      IdAttributeName: '{{ response.JobConfig.MapMatchingConfig.IdAttributeName }}'
      TimestampAttributeName: '{{ response.JobConfig.MapMatchingConfig.TimestampAttributeName }}'
      XAttributeName: '{{ response.JobConfig.MapMatchingConfig.XAttributeName }}'
      YAttributeName: '{{ response.JobConfig.MapMatchingConfig.YAttributeName }}'
      Name: '{{ response.Name }}'
      Status: '{{ response.Status }}'
      Tags: '{{ response.Tags }}'
- discovery_id: aws.sagemaker-geospatial.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      Tags: '{{ response.Tags }}'
- discovery_id: aws.sagemaker-geospatial.search_raster_data_collection
  calls:
  - action: search_raster_data_collection
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Items }}'
    item:
      ApproximateResultCount: '{{ response.ApproximateResultCount }}'
