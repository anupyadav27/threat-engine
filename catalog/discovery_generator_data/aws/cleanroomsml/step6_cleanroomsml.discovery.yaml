  - action: get_collaboration_ml_input_channel
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.configuredModelAlgorithmAssociations }}'
- discovery_id: aws.cleanroomsml.get_collaboration_trained_model
  calls:
  - action: get_collaboration_trained_model
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.incrementalTrainingDataChannels }}'
    item:
      channelName: '{{ item.channelName }}'
      environment: '{{ item.environment }}'
      hyperparameters: '{{ item.hyperparameters }}'
      modelName: '{{ item.modelName }}'
      versionIdentifier: '{{ item.versionIdentifier }}'
      collaborationIdentifier: '{{ response.collaborationIdentifier }}'
      configuredModelAlgorithmAssociationArn: '{{ response.configuredModelAlgorithmAssociationArn }}'
      createTime: '{{ response.createTime }}'
      creatorAccountId: '{{ response.creatorAccountId }}'
      description: '{{ response.description }}'
      logsStatus: '{{ response.logsStatus }}'
      logsStatusDetails: '{{ response.logsStatusDetails }}'
      membershipIdentifier: '{{ response.membershipIdentifier }}'
      metricsStatus: '{{ response.metricsStatus }}'
      metricsStatusDetails: '{{ response.metricsStatusDetails }}'
