version: '1.0'
provider: aws
service: cleanroomsml
services:
  client: cleanroomsml
  module: boto3.client
discovery:
- discovery_id: aws.cleanroomsml.list_audience_export_jobs
  calls:
  - action: list_audience_export_jobs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.audienceExportJobs }}'
    item:
      audienceGenerationJobArn: '{{ item.audienceGenerationJobArn }}'
      audienceSize: '{{ item.audienceSize }}'
      createTime: '{{ item.createTime }}'
      description: '{{ item.description }}'
      name: '{{ item.name }}'
      outputLocation: '{{ item.outputLocation }}'
      status: '{{ item.status }}'
      statusDetails: '{{ item.statusDetails }}'
      updateTime: '{{ item.updateTime }}'
      nextToken: '{{ response.nextToken }}'
- discovery_id: aws.cleanroomsml.list_audience_generation_jobs
  calls:
  - action: list_audience_generation_jobs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.audienceGenerationJobs }}'
    item:
      audienceGenerationJobArn: '{{ item.audienceGenerationJobArn }}'
      collaborationId: '{{ item.collaborationId }}'
      configuredAudienceModelArn: '{{ item.configuredAudienceModelArn }}'
      createTime: '{{ item.createTime }}'
      description: '{{ item.description }}'
      name: '{{ item.name }}'
      startedBy: '{{ item.startedBy }}'
      status: '{{ item.status }}'
      updateTime: '{{ item.updateTime }}'
      nextToken: '{{ response.nextToken }}'
- discovery_id: aws.cleanroomsml.list_audience_models
  calls:
  - action: list_audience_models
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.audienceModels }}'
    item:
      audienceModelArn: '{{ item.audienceModelArn }}'
      createTime: '{{ item.createTime }}'
      description: '{{ item.description }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      trainingDatasetArn: '{{ item.trainingDatasetArn }}'
      updateTime: '{{ item.updateTime }}'
      nextToken: '{{ response.nextToken }}'
- discovery_id: aws.cleanroomsml.list_configured_audience_models
  calls:
  - action: list_configured_audience_models
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.configuredAudienceModels }}'
    item:
      audienceModelArn: '{{ item.audienceModelArn }}'
      configuredAudienceModelArn: '{{ item.configuredAudienceModelArn }}'
      createTime: '{{ item.createTime }}'
      description: '{{ item.description }}'
      name: '{{ item.name }}'
      outputConfig: '{{ item.outputConfig }}'
      status: '{{ item.status }}'
      updateTime: '{{ item.updateTime }}'
      nextToken: '{{ response.nextToken }}'
- discovery_id: aws.cleanroomsml.list_configured_model_algorithms
  calls:
  - action: list_configured_model_algorithms
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.configuredModelAlgorithms }}'
    item:
      configuredModelAlgorithmArn: '{{ item.configuredModelAlgorithmArn }}'
      createTime: '{{ item.createTime }}'
      description: '{{ item.description }}'
      name: '{{ item.name }}'
      updateTime: '{{ item.updateTime }}'
      nextToken: '{{ response.nextToken }}'
- discovery_id: aws.cleanroomsml.list_training_datasets
  calls:
  - action: list_training_datasets
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.trainingDatasets }}'
    item:
      createTime: '{{ item.createTime }}'
      description: '{{ item.description }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      trainingDatasetArn: '{{ item.trainingDatasetArn }}'
      updateTime: '{{ item.updateTime }}'
      nextToken: '{{ response.nextToken }}'
- discovery_id: aws.cleanroomsml.get_audience_generation_job
  for_each: aws.cleanroomsml.list_audience_export_jobs
  calls:
  - action: get_audience_generation_job
    params:
      audienceGenerationJobArn: '{{ item.audienceGenerationJobArn }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      message: '{{ response.statusDetails.message }}'
      statusCode: '{{ response.statusDetails.statusCode }}'
      audienceGenerationJobArn: '{{ response.audienceGenerationJobArn }}'
      collaborationId: '{{ response.collaborationId }}'
      configuredAudienceModelArn: '{{ response.configuredAudienceModelArn }}'
      createTime: '{{ response.createTime }}'
      description: '{{ response.description }}'
      includeSeedInOutput: '{{ response.includeSeedInOutput }}'
      recallMetric: '{{ response.metrics.recallMetric }}'
      name: '{{ response.name }}'
      protectedQueryIdentifier: '{{ response.protectedQueryIdentifier }}'
      s3Uri: '{{ response.seedAudience.dataSource.s3Uri }}'
      roleArn: '{{ response.seedAudience.roleArn }}'
      number: '{{ response.seedAudience.sqlComputeConfiguration.worker.number }}'
      type: '{{ response.seedAudience.sqlComputeConfiguration.worker.type }}'
      analysisTemplateArn: '{{ response.seedAudience.sqlParameters.analysisTemplateArn }}'
      parameters: '{{ response.seedAudience.sqlParameters.parameters }}'
      queryString: '{{ response.seedAudience.sqlParameters.queryString }}'
      startedBy: '{{ response.startedBy }}'
      status: '{{ response.status }}'
      tags: '{{ response.tags }}'
      updateTime: '{{ response.updateTime }}'
- discovery_id: aws.cleanroomsml.get_audience_model
  for_each: aws.cleanroomsml.list_audience_models
  calls:
  - action: get_audience_model
    params:
      audienceModelArn: '{{ item.audienceModelArn }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      message: '{{ response.statusDetails.message }}'
      statusCode: '{{ response.statusDetails.statusCode }}'
      audienceModelArn: '{{ response.audienceModelArn }}'
      createTime: '{{ response.createTime }}'
      description: '{{ response.description }}'
      kmsKeyArn: '{{ response.kmsKeyArn }}'
      name: '{{ response.name }}'
      status: '{{ response.status }}'
      tags: '{{ response.tags }}'
      trainingDataEndTime: '{{ response.trainingDataEndTime }}'
      trainingDataStartTime: '{{ response.trainingDataStartTime }}'
      trainingDatasetArn: '{{ response.trainingDatasetArn }}'
      updateTime: '{{ response.updateTime }}'
- discovery_id: aws.cleanroomsml.get_collaboration_configured_model_algorithm_association
  calls:
  - action: get_collaboration_configured_model_algorithm_association
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      Status: '{{ response.privacyConfiguration.Status }}'
      Enabled: '{{ response.privacyConfiguration.Enabled }}'
      policies: '{{ response.privacyConfiguration.policies }}'
      collaborationIdentifier: '{{ response.collaborationIdentifier }}'
      configuredModelAlgorithmArn: '{{ response.configuredModelAlgorithmArn }}'
      configuredModelAlgorithmAssociationArn: '{{ response.configuredModelAlgorithmAssociationArn }}'
      createTime: '{{ response.createTime }}'
      creatorAccountId: '{{ response.creatorAccountId }}'
      description: '{{ response.description }}'
      membershipIdentifier: '{{ response.membershipIdentifier }}'
      name: '{{ response.name }}'
