      Description: '{{ response.Description }}'
      FirmwareUpdateImage: '{{ response.FirmwareUpdateImage }}'
      FirmwareUpdateRole: '{{ response.FirmwareUpdateRole }}'
      FragmentIntervalMS: '{{ response.FragmentIntervalMS }}'
      FragmentSizeBytes: '{{ response.FragmentSizeBytes }}'
      Id: '{{ response.Id }}'
      Name: '{{ response.Name }}'
      RedundancyPercent: '{{ response.RedundancyPercent }}'
      Status: '{{ response.Status }}'
- discovery_id: aws.iotwireless.get_multicast_group
  for_each: aws.iotwireless.list_device_profiles
