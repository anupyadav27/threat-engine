    item:
      DlClass: '{{ response.LoRaWAN.DlClass }}'
      NumberOfDevicesInGroup: '{{ response.LoRaWAN.NumberOfDevicesInGroup }}'
      NumberOfDevicesRequested: '{{ response.LoRaWAN.NumberOfDevicesRequested }}'
      ParticipatingGateways: '{{ response.LoRaWAN.ParticipatingGateways }}'
      RfRegion: '{{ response.LoRaWAN.RfRegion }}'
      Arn: '{{ response.Arn }}'
      CreatedAt: '{{ response.CreatedAt }}'
      Description: '{{ response.Description }}'
      Id: '{{ response.Id }}'
      TransmissionInterval: '{{ response.LoRaWAN.ParticipatingGateways.TransmissionInterval }}'
      Name: '{{ response.Name }}'
      Status: '{{ response.Status }}'
- discovery_id: aws.iotwireless.get_multicast_group_session
  for_each: aws.iotwireless.list_device_profiles
  calls:
  - action: get_multicast_group_session
    params:
