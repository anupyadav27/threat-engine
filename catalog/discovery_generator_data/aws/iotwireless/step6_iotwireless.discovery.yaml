      RfRegion: '{{ response.LoRaWAN.RfRegion }}'
      RxDataRate2: '{{ response.LoRaWAN.RxDataRate2 }}'
      RxDelay1: '{{ response.LoRaWAN.RxDelay1 }}'
      RxDrOffset1: '{{ response.LoRaWAN.RxDrOffset1 }}'
      RxFreq2: '{{ response.LoRaWAN.RxFreq2 }}'
