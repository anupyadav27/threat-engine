    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Sidewalk }}'
    item:
      Arn: '{{ item.Arn }}'
      AmazonId: '{{ item.AmazonId }}'
      Fingerprint: '{{ item.Fingerprint }}'
- discovery_id: aws.iotwireless.list_position_configurations
  calls:
