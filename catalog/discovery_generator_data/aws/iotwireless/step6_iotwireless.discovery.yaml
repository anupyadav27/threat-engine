version: '1.0'
provider: aws
service: iotwireless
services:
  client: iotwireless
  module: boto3.client
discovery:
- discovery_id: aws.iotwireless.get_event_configuration_by_resource_types
  calls:
  - action: get_event_configuration_by_resource_types
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      ConnectionStatus: '{{ response.DeviceRegistrationState.ConnectionStatus }}'
      DeviceRegistrationState: '{{ response.DeviceRegistrationState.DeviceRegistrationState }}'
      Join: '{{ response.DeviceRegistrationState.Join }}'
      MessageDeliveryStatus: '{{ response.DeviceRegistrationState.MessageDeliveryStatus }}'
      Proximity: '{{ response.DeviceRegistrationState.Proximity }}'
      Sidewalk: '{{ response.DeviceRegistrationState.Sidewalk }}'
      WirelessGatewayEventTopic: '{{ response.ConnectionStatus.LoRaWAN.WirelessGatewayEventTopic }}'
      WirelessDeviceEventTopic: '{{ response.DeviceRegistrationState.Sidewalk.WirelessDeviceEventTopic }}'
- discovery_id: aws.iotwireless.get_log_levels_by_resource_types
  calls:
  - action: get_log_levels_by_resource_types
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.WirelessGatewayLogOptions }}'
    item:
      DefaultLogLevel: '{{ item.DefaultLogLevel }}'
      Events: '{{ item.Events }}'
      FuotaTaskLogOptions: '{{ item.FuotaTaskLogOptions }}'
      LogLevel: '{{ item.LogLevel }}'
      Type: '{{ item.Type }}'
      WirelessDeviceLogOptions: '{{ item.WirelessDeviceLogOptions[].Type }}'
      WirelessGatewayLogOptions: '{{ item.WirelessGatewayLogOptions[].Type }}'
- discovery_id: aws.iotwireless.get_metric_configuration
  calls:
  - action: get_metric_configuration
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      Status: '{{ response.SummaryMetric.Status }}'
      SummaryMetric: '{{ response.SummaryMetric.SummaryMetric }}'
- discovery_id: aws.iotwireless.get_metrics
  calls:
  - action: get_metrics
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.SummaryMetricQueryResults }}'
    item:
      AggregationPeriod: '{{ item.AggregationPeriod }}'
      Dimensions: '{{ item.Dimensions }}'
      EndTimestamp: '{{ item.EndTimestamp }}'
      Error: '{{ item.Error }}'
      MetricName: '{{ item.MetricName }}'
      QueryId: '{{ item.QueryId }}'
      QueryStatus: '{{ item.QueryStatus }}'
      StartTimestamp: '{{ item.StartTimestamp }}'
      SummaryMetricQueryResults: '{{ item.SummaryMetricQueryResults[].Unit }}'
      Timestamps: '{{ item.Timestamps }}'
      Unit: '{{ item.Unit }}'
      Values: '{{ item.Values }}'
- discovery_id: aws.iotwireless.get_position_estimate
  calls:
  - action: get_position_estimate
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      GeoJsonPayload: '{{ response.GeoJsonPayload }}'
- discovery_id: aws.iotwireless.get_service_endpoint
  calls:
  - action: get_service_endpoint
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      ServerTrust: '{{ response.ServerTrust }}'
      ServiceEndpoint: '{{ response.ServiceEndpoint }}'
      ServiceType: '{{ response.ServiceType }}'
- discovery_id: aws.iotwireless.list_destinations
  calls:
  - action: list_destinations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.DestinationList }}'
    item:
      Arn: '{{ item.Arn }}'
      Name: '{{ item.Name }}'
      RoleArn: '{{ item.RoleArn }}'
      Description: '{{ item.Description }}'
      Expression: '{{ item.Expression }}'
      ExpressionType: '{{ item.ExpressionType }}'
- discovery_id: aws.iotwireless.list_device_profiles
  calls:
  - action: list_device_profiles
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.DeviceProfileList }}'
    item:
      Arn: '{{ item.Arn }}'
      Id: '{{ item.Id }}'
      Name: '{{ item.Name }}'
- discovery_id: aws.iotwireless.list_fuota_tasks
  calls:
  - action: list_fuota_tasks
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.FuotaTaskList }}'
    item:
      Arn: '{{ item.Arn }}'
      Id: '{{ item.Id }}'
      Name: '{{ item.Name }}'
      Descriptor: '{{ item.Descriptor }}'
- discovery_id: aws.iotwireless.list_multicast_groups
  calls:
  - action: list_multicast_groups
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.MulticastGroupList }}'
    item:
      Arn: '{{ item.Arn }}'
      Id: '{{ item.Id }}'
      Name: '{{ item.Name }}'
- discovery_id: aws.iotwireless.list_network_analyzer_configurations
  calls:
  - action: list_network_analyzer_configurations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.NetworkAnalyzerConfigurationList }}'
    item:
      Arn: '{{ item.Arn }}'
      Name: '{{ item.Name }}'
      Enabled: '{{ item.Enabled }}'
- discovery_id: aws.iotwireless.list_partner_accounts
  calls:
  - action: list_partner_accounts
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Sidewalk }}'
    item:
      Arn: '{{ item.Arn }}'
      AmazonId: '{{ item.AmazonId }}'
      Fingerprint: '{{ item.Fingerprint }}'
- discovery_id: aws.iotwireless.list_position_configurations
  calls:
  - action: list_position_configurations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.PositionConfigurationList }}'
    item:
      Accuracy: '{{ item.Accuracy }}'
      Destination: '{{ item.Destination }}'
      Position: '{{ item.Position }}'
      ResourceIdentifier: '{{ item.ResourceIdentifier }}'
      ResourceType: '{{ item.ResourceType }}'
      Solvers: '{{ item.Solvers }}'
- discovery_id: aws.iotwireless.list_service_profiles
  calls:
  - action: list_service_profiles
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ServiceProfileList }}'
    item:
      Arn: '{{ item.Arn }}'
      Id: '{{ item.Id }}'
      Name: '{{ item.Name }}'
- discovery_id: aws.iotwireless.list_wireless_device_import_tasks
  calls:
  - action: list_wireless_device_import_tasks
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.WirelessDeviceImportTaskList }}'
    item:
      Arn: '{{ item.Arn }}'
      CreationTime: '{{ item.CreationTime }}'
      Id: '{{ item.Id }}'
      Status: '{{ item.Status }}'
      DestinationName: '{{ item.DestinationName }}'
      FailedImportedDeviceCount: '{{ item.FailedImportedDeviceCount }}'
      InitializedImportedDeviceCount: '{{ item.InitializedImportedDeviceCount }}'
      OnboardedImportedDeviceCount: '{{ item.OnboardedImportedDeviceCount }}'
      PendingImportedDeviceCount: '{{ item.PendingImportedDeviceCount }}'
      Positioning: '{{ item.Positioning }}'
      Sidewalk: '{{ item.Sidewalk }}'
      StatusReason: '{{ item.StatusReason }}'
- discovery_id: aws.iotwireless.list_wireless_devices
  calls:
  - action: list_wireless_devices
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.WirelessDeviceList }}'
    item:
      Arn: '{{ item.Arn }}'
      Id: '{{ item.Id }}'
      Name: '{{ item.Name }}'
      DestinationName: '{{ item.DestinationName }}'
      FuotaDeviceStatus: '{{ item.FuotaDeviceStatus }}'
      LastUplinkReceivedAt: '{{ item.LastUplinkReceivedAt }}'
      LoRaWAN: '{{ item.LoRaWAN }}'
      McGroupId: '{{ item.McGroupId }}'
      MulticastDeviceStatus: '{{ item.MulticastDeviceStatus }}'
      Positioning: '{{ item.Positioning }}'
      Sidewalk: '{{ item.Sidewalk }}'
      Type: '{{ item.Type }}'
      WirelessDeviceId: '{{ item.WirelessDeviceId }}'
- discovery_id: aws.iotwireless.list_wireless_gateway_task_definitions
  calls:
  - action: list_wireless_gateway_task_definitions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.TaskDefinitions }}'
    item:
      Arn: '{{ item.Arn }}'
      Id: '{{ item.Id }}'
      LoRaWAN: '{{ item.LoRaWAN }}'
- discovery_id: aws.iotwireless.list_wireless_gateways
  calls:
  - action: list_wireless_gateways
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.WirelessGatewayList }}'
    item:
      Arn: '{{ item.Arn }}'
      Id: '{{ item.Id }}'
      Name: '{{ item.Name }}'
      Description: '{{ item.Description }}'
      LastUplinkReceivedAt: '{{ item.LastUplinkReceivedAt }}'
      LoRaWAN: '{{ item.LoRaWAN }}'
      WirelessGatewayId: '{{ item.WirelessGatewayId }}'
- discovery_id: aws.iotwireless.get_destination
  for_each: aws.iotwireless.list_destinations
  calls:
  - action: get_destination
    params:
      Name: '{{ item.Name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      Arn: '{{ response.Arn }}'
      Name: '{{ response.Name }}'
      RoleArn: '{{ response.RoleArn }}'
      Description: '{{ response.Description }}'
      Expression: '{{ response.Expression }}'
      ExpressionType: '{{ response.ExpressionType }}'
- discovery_id: aws.iotwireless.get_device_profile
  for_each: aws.iotwireless.list_device_profiles
  calls:
  - action: get_device_profile
    params:
      Id: '{{ item.Id }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      ClassBTimeout: '{{ response.LoRaWAN.ClassBTimeout }}'
      ClassCTimeout: '{{ response.LoRaWAN.ClassCTimeout }}'
      FactoryPresetFreqsList: '{{ response.LoRaWAN.FactoryPresetFreqsList }}'
      MacVersion: '{{ response.LoRaWAN.MacVersion }}'
      MaxDutyCycle: '{{ response.LoRaWAN.MaxDutyCycle }}'
      MaxEirp: '{{ response.LoRaWAN.MaxEirp }}'
