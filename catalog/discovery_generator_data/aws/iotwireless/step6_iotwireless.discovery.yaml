      SupportsClassB: '{{ response.LoRaWAN.SupportsClassB }}'
      SupportsClassC: '{{ response.LoRaWAN.SupportsClassC }}'
      SupportsJoin: '{{ response.LoRaWAN.SupportsJoin }}'
      Arn: '{{ response.Arn }}'
      Id: '{{ response.Id }}'
      Name: '{{ response.Name }}'
      ApplicationServerPublicKey: '{{ response.Sidewalk.ApplicationServerPublicKey }}'
      QualificationStatus: '{{ response.Sidewalk.QualificationStatus }}'
- discovery_id: aws.iotwireless.get_fuota_task
  for_each: aws.iotwireless.list_device_profiles
