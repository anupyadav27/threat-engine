      Position: '{{ item.Position }}'
      HorizontalAccuracy: '{{ response.Accuracy.HorizontalAccuracy }}'
      VerticalAccuracy: '{{ response.Accuracy.VerticalAccuracy }}'
      SolverProvider: '{{ response.SolverProvider }}'
      SolverType: '{{ response.SolverType }}'
      SolverVersion: '{{ response.SolverVersion }}'
