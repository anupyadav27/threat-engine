# ==========================================================
# Discovery YAML — iotwireless (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 3 | ops: 0 independent, 3 dependent
# ==========================================================
version: '1.0'
provider: aws
service: iotwireless

services:
  client: iotwireless
  module: "boto3.client('iotwireless')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  []

checks: []

discovery:

  # ════ DEPENDENT (enrich) operations ════
  # ── aws.iotwireless.get_fuota_task [dependent] ──
  - discovery_id: aws.iotwireless.get_fuota_task
    for_each: aws.iotwireless.list_device_profiles
    calls:
      - action: get_fuota_task
        params:
          Id: "{{ item.Id }}"
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        Descriptor: '{{ item.Descriptor }}'
        RfRegion: '{{ item.RfRegion }}'
        StartTime: '{{ item.StartTime }}'
        Tags: '{{ item.Tags }}'

  # ════ DEPENDENT (enrich) operations ════
  # ── aws.iotwireless.get_multicast_group [dependent] ──
  - discovery_id: aws.iotwireless.get_multicast_group
    for_each: aws.iotwireless.list_device_profiles
    calls:
      - action: get_multicast_group
        params:
          Id: "{{ item.Id }}"
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        DlClass: '{{ item.DlClass }}'
        NumberOfDevicesInGroup: '{{ item.NumberOfDevicesInGroup }}'
        NumberOfDevicesRequested: '{{ item.NumberOfDevicesRequested }}'
        ParticipatingGateways: '{{ item.ParticipatingGateways }}'
        RfRegion: '{{ item.RfRegion }}'
        Tags: '{{ item.Tags }}'

  # ════ DEPENDENT (enrich) operations ════
  # ── aws.iotwireless.get_service_profile [dependent] ──
  - discovery_id: aws.iotwireless.get_service_profile
    for_each: aws.iotwireless.list_device_profiles
    calls:
      - action: get_service_profile
        params:
          Id: "{{ item.Id }}"
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        AddGwMetadata: '{{ item.AddGwMetadata }}'
        ChannelMask: '{{ item.ChannelMask }}'
        DevStatusReqFreq: '{{ item.DevStatusReqFreq }}'
        DlBucketSize: '{{ item.DlBucketSize }}'
        DlRate: '{{ item.DlRate }}'
        DlRatePolicy: '{{ item.DlRatePolicy }}'
        DrMax: '{{ item.DrMax }}'
        DrMin: '{{ item.DrMin }}'
        HrAllowed: '{{ item.HrAllowed }}'
        MinGwDiversity: '{{ item.MinGwDiversity }}'
        NbTransMax: '{{ item.NbTransMax }}'
        NbTransMin: '{{ item.NbTransMin }}'
        NwkGeoLoc: '{{ item.NwkGeoLoc }}'
        PrAllowed: '{{ item.PrAllowed }}'
        RaAllowed: '{{ item.RaAllowed }}'
        ReportDevStatusBattery: '{{ item.ReportDevStatusBattery }}'
        ReportDevStatusMargin: '{{ item.ReportDevStatusMargin }}'
        Statement: '{{ item.Statement }}'
        Tags: '{{ item.Tags }}'
        TargetPer: '{{ item.TargetPer }}'
        TxPowerIndexMax: '{{ item.TxPowerIndexMax }}'
        TxPowerIndexMin: '{{ item.TxPowerIndexMin }}'
        UlBucketSize: '{{ item.UlBucketSize }}'
        UlRate: '{{ item.UlRate }}'
        UlRatePolicy: '{{ item.UlRatePolicy }}'
        Version: '{{ item.Version }}'

