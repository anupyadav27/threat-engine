version: '1.0'
provider: aws
service: sagemaker-a2i-runtime
services:
  client: sagemaker-a2i-runtime
  module: boto3.client
discovery:
- discovery_id: aws.sagemaker-a2i-runtime.describe_human_loop
  calls:
  - action: describe_human_loop
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      OutputS3Uri: '{{ response.HumanLoopOutput.OutputS3Uri }}'
      CreationTime: '{{ response.CreationTime }}'
      FailureCode: '{{ response.FailureCode }}'
      FailureReason: '{{ response.FailureReason }}'
      FlowDefinitionArn: '{{ response.FlowDefinitionArn }}'
      HumanLoopArn: '{{ response.HumanLoopArn }}'
      HumanLoopName: '{{ response.HumanLoopName }}'
      HumanLoopStatus: '{{ response.HumanLoopStatus }}'
- discovery_id: aws.sagemaker-a2i-runtime.list_human_loops
  calls:
  - action: list_human_loops
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.HumanLoopSummaries }}'
    item:
      CreationTime: '{{ item.CreationTime }}'
      FailureReason: '{{ item.FailureReason }}'
      FlowDefinitionArn: '{{ item.FlowDefinitionArn }}'
      HumanLoopName: '{{ item.HumanLoopName }}'
      HumanLoopStatus: '{{ item.HumanLoopStatus }}'
