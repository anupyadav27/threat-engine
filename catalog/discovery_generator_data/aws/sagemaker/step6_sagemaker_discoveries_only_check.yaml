  for_each: aws.sagemaker.list_pipelines
  calls:
  - action: list_pipeline_versions
    params:
      PipelineName: '{{ item.PipelineName }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.PipelineVersionSummaries }}'
    item:
      CreationTime: '{{ item.CreationTime }}'
      LastExecutionPipelineExecutionArn: '{{ item.LastExecutionPipelineExecutionArn
        }}'
      PipelineArn: '{{ item.PipelineArn }}'
      PipelineVersionDescription: '{{ item.PipelineVersionDescription }}'
      PipelineVersionDisplayName: '{{ item.PipelineVersionDisplayName }}'
      PipelineVersionId: '{{ item.PipelineVersionId }}'
- discovery_id: aws.sagemaker.list_training_jobs_for_hyper_parameter_tuning_job
  for_each: aws.sagemaker.list_hyper_parameter_tuning_jobs
  calls:
  - action: list_training_jobs_for_hyper_parameter_tuning_job
    params:
      HyperParameterTuningJobName: '{{ item.HyperParameterTuningJobName }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.TrainingJobSummaries }}'
    item:
      CreationTime: '{{ item.CreationTime }}'
      FailureReason: '{{ item.FailureReason }}'
      FinalHyperParameterTuningJobObjectiveMetric: '{{ item.FinalHyperParameterTuningJobObjectiveMetric
        }}'
      ObjectiveStatus: '{{ item.ObjectiveStatus }}'
      TrainingEndTime: '{{ item.TrainingEndTime }}'
      TrainingJobArn: '{{ item.TrainingJobArn }}'
      TrainingJobDefinitionName: '{{ item.TrainingJobDefinitionName }}'
      TrainingJobName: '{{ item.TrainingJobName }}'
      TrainingJobStatus: '{{ item.TrainingJobStatus }}'
      TrainingStartTime: '{{ item.TrainingStartTime }}'
      TunedHyperParameters: '{{ item.TunedHyperParameters }}'
      TuningJobName: '{{ item.TuningJobName }}'
