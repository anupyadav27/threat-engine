version: '1.0'
provider: aws
service: sagemaker

services:
  client: sagemaker
  module: "boto3.client('sagemaker')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: algorithm
    identifier_op: aws.sagemaker.list_algorithms
    identifier_field: AlgorithmArn
    item_var_path: item.AlgorithmArn
    identifier_template: '{algorithmarn}'
  - resource_type: config
    identifier_op: aws.sagemaker.list_app_image_configs
    identifier_field: AppImageConfigArn
    item_var_path: item.AppImageConfigArn
    identifier_template: '{appimageconfigarn}'
  - resource_type: artifact
    identifier_op: aws.sagemaker.list_artifacts
    identifier_field: ArtifactArn
    item_var_path: item.ArtifactArn
    identifier_template: '{artifactarn}'
  - resource_type: job
    identifier_op: aws.sagemaker.list_auto_ml_jobs
    identifier_field: AutoMLJobArn
    item_var_path: item.AutoMLJobArn
    identifier_template: '{automljobarn}'
  - resource_type: plans
    identifier_op: aws.sagemaker.list_clusters
    identifier_field: ClusterArn
    item_var_path: item.ClusterArn
    identifier_template: '{clusterarn}'
  - resource_type: job
    identifier_op: aws.sagemaker.list_edge_packaging_jobs
    identifier_field: EdgePackagingJobArn
    item_var_path: item.EdgePackagingJobArn
    identifier_template: '{edgepackagingjobarn}'
  - resource_type: config
    identifier_op: aws.sagemaker.list_endpoint_configs
    identifier_field: EndpointConfigArn
    item_var_path: item.EndpointConfigArn
    identifier_template: '{endpointconfigarn}'
  - resource_type: experiment
    identifier_op: aws.sagemaker.list_experiments
    identifier_field: ExperimentArn
    item_var_path: item.ExperimentArn
    identifier_template: '{experimentarn}'
  - resource_type: group
    identifier_op: aws.sagemaker.list_feature_groups
    identifier_field: FeatureGroupArn
    item_var_path: item.FeatureGroupArn
    identifier_template: '{featuregrouparn}'
  - resource_type: definition
    identifier_op: aws.sagemaker.list_flow_definitions
    identifier_field: FlowDefinitionArn
    item_var_path: item.FlowDefinitionArn
    identifier_template: '{flowdefinitionarn}'
  - resource_type: hub
    identifier_op: aws.sagemaker.list_hubs
    identifier_field: HubArn
    item_var_path: item.HubArn
    identifier_template: '{hubarn}'
  - resource_type: component
    identifier_op: aws.sagemaker.list_inference_components
    identifier_field: EndpointArn
    item_var_path: item.EndpointArn
    identifier_template: '{endpointarn}'
  - resource_type: job
    identifier_op: aws.sagemaker.list_model_card_export_jobs
    identifier_field: ModelCardExportJobArn
    item_var_path: item.ModelCardExportJobArn
    identifier_template: '{modelcardexportjobarn}'
  - resource_type: package
    identifier_op: aws.sagemaker.list_model_packages
    identifier_field: ModelPackageArn
    item_var_path: item.ModelPackageArn
    identifier_template: '{modelpackagearn}'
  - resource_type: instance
    identifier_op: aws.sagemaker.list_notebook_instances
    identifier_field: NotebookInstanceArn
    item_var_path: item.NotebookInstanceArn
    identifier_template: '{notebookinstancearn}'
  - resource_type: pipeline
    identifier_op: aws.sagemaker.list_pipelines
    identifier_field: PipelineArn
    item_var_path: item.PipelineArn
    identifier_template: '{pipelinearn}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
