# ==========================================================
# Discovery YAML — kendra (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 1 | ops: 1 independent, 0 dependent
# ==========================================================
version: '1.0'
provider: aws
service: kendra

services:
  client: kendra
  module: "boto3.client('kendra')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  []

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.kendra.describe_index  ──
  - discovery_id: aws.kendra.describe_index
    calls:
      - action: describe_index
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        Tags: '{{ item.Tags }}'

