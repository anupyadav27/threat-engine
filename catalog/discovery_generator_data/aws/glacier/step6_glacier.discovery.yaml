version: '1.0'
provider: aws
service: glacier
discovery:
- calls:
  - action: get_data_retrieval_policy
    on_error: continue
    save_as: response
  discovery_id: aws.glacier.get_data_retrieval_policy
  emit:
    as: item
    item:
      Rules: '{{ response.Policy.Rules }}'
      Statement: '{{ response.Policy.Statement }}'
      Version: '{{ response.Policy.Version }}'
      policy: '{{ response.Policy.policy }}'
- calls:
  - action: get_vault_lock
    on_error: continue
    save_as: response
  discovery_id: aws.glacier.get_vault_lock
  emit:
    as: item
    item:
      State: '{{ response.State }}'
      CreationDate: '{{ response.CreationDate }}'
      ExpirationDate: '{{ response.ExpirationDate }}'
      Policy: '{{ response.Policy }}'
- calls:
  - action: get_vault_access_policy
    on_error: continue
    save_as: response
  discovery_id: aws.glacier.get_vault_access_policy
  emit:
    as: item
    item:
      Policy: '{{ response.policy.Policy }}'
- calls:
  - action: describe_vault
    on_error: continue
    save_as: response
  discovery_id: aws.glacier.describe_vault
  emit:
    as: item
    item:
      CreationDate: '{{ response.CreationDate }}'
      LastInventoryDate: '{{ response.LastInventoryDate }}'
      NumberOfArchives: '{{ response.NumberOfArchives }}'
      SizeInBytes: '{{ response.SizeInBytes }}'
      VaultARN: '{{ response.VaultARN }}'
      VaultName: '{{ response.VaultName }}'
- calls:
  - action: list_vaults
    on_error: continue
    save_as: response
  discovery_id: aws.glacier.list_vaults
  emit:
    as: item
    item:
      CreationDate: '{{ item.CreationDate }}'
      LastInventoryDate: '{{ item.LastInventoryDate }}'
      NumberOfArchives: '{{ item.NumberOfArchives }}'
      SizeInBytes: '{{ item.SizeInBytes }}'
      VaultARN: '{{ item.VaultARN }}'
      VaultName: '{{ item.VaultName }}'
    items_for: '{{ response.VaultList }}'
