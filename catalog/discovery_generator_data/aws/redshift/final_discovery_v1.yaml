  # ════ INDEPENDENT (root) operations ════
  # ── aws.redshift.describe_hsm_configurations  ──
  - discovery_id: aws.redshift.describe_hsm_configurations
    calls:
      - action: describe_hsm_configurations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.HsmConfigurations }}'
      item:
        Description: '{{ item.Description }}'
        HsmConfigurationIdentifier: '{{ item.HsmConfigurationIdentifier }}'
        HsmConfigurations: '{{ item.HsmConfigurations }}'
        HsmIpAddress: '{{ item.HsmIpAddress }}'
        HsmPartitionName: '{{ item.HsmPartitionName }}'
        Tags: '{{ item.Tags }}'
        item: '{{ item }}'

  # ════ DEPENDENT (enrich) operations ════
  # ── aws.redshift.describe_logging_status [dependent] ──
  - discovery_id: aws.redshift.describe_logging_status
    for_each: aws.redshift.describe_cluster_db_revisions
    calls:
      - action: describe_logging_status
        params:
          ClusterIdentifier: "{{ item.ClusterIdentifier }}"
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        BucketName: '{{ item.BucketName }}'
        LastFailureTime: '{{ item.LastFailureTime }}'
        LastSuccessfulDeliveryTime: '{{ item.LastSuccessfulDeliveryTime }}'
        LoggingEnabled: '{{ item.LoggingEnabled }}'
        S3KeyPrefix: '{{ item.S3KeyPrefix }}'

