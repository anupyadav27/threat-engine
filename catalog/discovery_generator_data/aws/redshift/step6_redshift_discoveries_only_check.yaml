version: '1.0'
provider: aws
service: redshift
services:
  client: redshift
  module: boto3.client
discovery:
- discovery_id: aws.redshift.describe_cluster_db_revisions
  calls:
  - action: describe_cluster_db_revisions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ClusterDbRevisions }}'
    item:
      ClusterDbRevisions: '{{ item.ClusterDbRevisions }}'
      ClusterIdentifier: '{{ item.ClusterIdentifier }}'
      CurrentDatabaseRevision: '{{ item.CurrentDatabaseRevision }}'
      DatabaseRevisionReleaseDate: '{{ item.DatabaseRevisionReleaseDate }}'
      RevisionTargets: '{{ item.RevisionTargets }}'
