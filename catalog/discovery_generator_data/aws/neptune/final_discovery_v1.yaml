version: '1.0'
provider: aws
service: neptune

services:
  client: neptune
  module: "boto3.client('neptune')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: snapshot
    identifier_op: aws.neptune.describe_db_cluster_snapshots
    identifier_field: DBClusterSnapshotArn
    item_var_path: item.DBClusterSnapshotArn
    identifier_template: '{dbclustersnapshotarn}'
  - resource_type: cluster
    identifier_op: aws.neptune.describe_db_clusters
    identifier_field: DBClusterArn
    item_var_path: item.DBClusterArn
    identifier_template: '{dbclusterarn}'
  - resource_type: credential
    identifier_op: aws.neptune.describe_db_instances
    identifier_field: DBInstanceArn
    item_var_path: item.DBInstanceArn
    identifier_template: '{dbinstancearn}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.neptune.describe_db_cluster_snapshots  ──
  - discovery_id: aws.neptune.describe_db_cluster_snapshots
    calls:
      - action: describe_db_cluster_snapshots
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.DBClusterSnapshots }}'
      item:
        AllocatedStorage: '{{ item.AllocatedStorage }}'
        AvailabilityZones: '{{ item.AvailabilityZones }}'
        ClusterCreateTime: '{{ item.ClusterCreateTime }}'
        DBClusterIdentifier: '{{ item.DBClusterIdentifier }}'
        DBClusterSnapshotArn: '{{ item.DBClusterSnapshotArn }}'
        DBClusterSnapshotIdentifier: '{{ item.DBClusterSnapshotIdentifier }}'
        DBClusterSnapshots: '{{ item.DBClusterSnapshots }}'
        Engine: '{{ item.Engine }}'
        EngineVersion: '{{ item.EngineVersion }}'
        IAMDatabaseAuthenticationEnabled: '{{ item.IAMDatabaseAuthenticationEnabled }}'
        KmsKeyId: '{{ item.KmsKeyId }}'
        LicenseModel: '{{ item.LicenseModel }}'
        MasterUsername: '{{ item.MasterUsername }}'
        PercentProgress: '{{ item.PercentProgress }}'
        Port: '{{ item.Port }}'
        SnapshotCreateTime: '{{ item.SnapshotCreateTime }}'
        SnapshotType: '{{ item.SnapshotType }}'
        SourceDBClusterSnapshotArn: '{{ item.SourceDBClusterSnapshotArn }}'
        Status: '{{ item.Status }}'
        StorageEncrypted: '{{ item.StorageEncrypted }}'
        StorageType: '{{ item.StorageType }}'
        VpcId: '{{ item.VpcId }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.neptune.describe_db_clusters  ──
  - discovery_id: aws.neptune.describe_db_clusters
    calls:
      - action: describe_db_clusters
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.DBClusters }}'
      item:
        AllocatedStorage: '{{ item.AllocatedStorage }}'
        AssociatedRoles: '{{ item.AssociatedRoles }}'
        AutomaticRestartTime: '{{ item.AutomaticRestartTime }}'
        AvailabilityZones: '{{ item.AvailabilityZones }}'
        BackupRetentionPeriod: '{{ item.BackupRetentionPeriod }}'
        CharacterSetName: '{{ item.CharacterSetName }}'
        CloneGroupId: '{{ item.CloneGroupId }}'
        ClusterCreateTime: '{{ item.ClusterCreateTime }}'
        CopyTagsToSnapshot: '{{ item.CopyTagsToSnapshot }}'
        CrossAccountClone: '{{ item.CrossAccountClone }}'
        DBClusterArn: '{{ item.DBClusterArn }}'
