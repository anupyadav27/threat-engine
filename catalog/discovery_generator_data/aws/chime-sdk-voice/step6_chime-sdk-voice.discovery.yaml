version: '1.0'
provider: aws
service: chime-sdk-voice
services:
  client: chime-sdk-voice
  module: boto3.client
discovery:
- discovery_id: aws.chime-sdk-voice.get_global_settings
  calls:
  - action: get_global_settings
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      CdrBucket: '{{ response.VoiceConnector.CdrBucket }}'
      VoiceConnector: '{{ response.VoiceConnector.VoiceConnector }}'
- discovery_id: aws.chime-sdk-voice.get_phone_number_settings
  calls:
  - action: get_phone_number_settings
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      CallingName: '{{ response.CallingName }}'
      CallingNameUpdatedTimestamp: '{{ response.CallingNameUpdatedTimestamp }}'
- discovery_id: aws.chime-sdk-voice.list_available_voice_connector_regions
  calls:
  - action: list_available_voice_connector_regions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.VoiceConnectorRegions }}'
- discovery_id: aws.chime-sdk-voice.list_phone_number_orders
  calls:
  - action: list_phone_number_orders
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.PhoneNumberOrders }}'
    item:
      Status: '{{ item.Status }}'
      CreatedTimestamp: '{{ item.CreatedTimestamp }}'
      FocDate: '{{ item.FocDate }}'
      OrderId: '{{ item.OrderId }}'
      OrderType: '{{ item.OrderType }}'
      OrderedPhoneNumbers: '{{ item.OrderedPhoneNumbers }}'
      PhoneNumber: '{{ item.PhoneNumber }}'
      PhoneNumberOrderId: '{{ item.PhoneNumberOrderId }}'
      ProductType: '{{ item.ProductType }}'
      UpdatedTimestamp: '{{ item.UpdatedTimestamp }}'
- discovery_id: aws.chime-sdk-voice.list_phone_numbers
  calls:
  - action: list_phone_numbers
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.PhoneNumbers }}'
    item:
      Name: '{{ item.Name }}'
      Status: '{{ item.Status }}'
      Associations: '{{ item.Associations }}'
      CallingName: '{{ item.CallingName }}'
      CallingNameStatus: '{{ item.CallingNameStatus }}'
      Capabilities: '{{ item.Capabilities }}'
      Country: '{{ item.Country }}'
      CreatedTimestamp: '{{ item.CreatedTimestamp }}'
      DeletionTimestamp: '{{ item.DeletionTimestamp }}'
      E164PhoneNumber: '{{ item.E164PhoneNumber }}'
      PhoneNumber: '{{ item.PhoneNumber }}'
      PhoneNumberId: '{{ item.PhoneNumberId }}'
      ProductType: '{{ item.ProductType }}'
      Type: '{{ item.Type }}'
      UpdatedTimestamp: '{{ item.UpdatedTimestamp }}'
- discovery_id: aws.chime-sdk-voice.list_sip_media_applications
  calls:
  - action: list_sip_media_applications
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.SipMediaApplications }}'
    item:
      Name: '{{ item.Name }}'
      AwsRegion: '{{ item.AwsRegion }}'
      CreatedTimestamp: '{{ item.CreatedTimestamp }}'
      Endpoints: '{{ item.Endpoints }}'
      SipMediaApplicationArn: '{{ item.SipMediaApplicationArn }}'
      SipMediaApplicationId: '{{ item.SipMediaApplicationId }}'
      UpdatedTimestamp: '{{ item.UpdatedTimestamp }}'
- discovery_id: aws.chime-sdk-voice.list_sip_rules
  calls:
  - action: list_sip_rules
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.SipRules }}'
    item:
      Name: '{{ item.Name }}'
      CreatedTimestamp: '{{ item.CreatedTimestamp }}'
      Disabled: '{{ item.Disabled }}'
