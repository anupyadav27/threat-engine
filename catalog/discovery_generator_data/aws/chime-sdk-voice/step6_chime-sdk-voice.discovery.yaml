      Name: '{{ response.PhoneNumber.Name }}'
      Status: '{{ response.PhoneNumber.Status }}'
      Associations: '{{ response.PhoneNumber.Associations[].Name }}'
      CallingName: '{{ response.PhoneNumber.CallingName }}'
      CallingNameStatus: '{{ response.PhoneNumber.CallingNameStatus }}'
      Capabilities: '{{ response.PhoneNumber.Capabilities }}'
      Country: '{{ response.PhoneNumber.Country }}'
      CreatedTimestamp: '{{ response.PhoneNumber.CreatedTimestamp }}'
      DeletionTimestamp: '{{ response.PhoneNumber.DeletionTimestamp }}'
