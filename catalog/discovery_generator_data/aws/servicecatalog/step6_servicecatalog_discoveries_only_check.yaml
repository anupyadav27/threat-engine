# discoveries_only_check: 1 kept / 39 removed from 40 total
# generated_from: step6_servicecatalog.discovery.yaml
# purpose: only discoveries needed by servicecatalog.checks.yaml for_each chains
version: '1.0'
provider: aws
service: servicecatalog
services:
  client: servicecatalog
  module: boto3.client
discovery:
- discovery_id: aws.servicecatalog.list_portfolios
  calls:
  - action: list_portfolios
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.PortfolioDetails }}'
    item:
      ARN: '{{ item.ARN }}'
      Description: '{{ item.Description }}'
      DisplayName: '{{ item.DisplayName }}'
      PortfolioShareDetails: '{{ item.PortfolioShareDetails }}'
      ProviderName: '{{ item.ProviderName }}'
      Id: '{{ item.Id }}'
