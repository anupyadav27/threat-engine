# ==========================================================
# Discovery YAML — acm (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 14 | ops: 2 independent, 1 dependent
# ==========================================================
version: '1.0'
provider: aws
service: acm

services:
  client: acm
  module: "boto3.client('acm')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: certificate
    identifier_op: aws.acm.list_certificates
    identifier_field: CertificateArn
    item_var_path: item.CertificateArn
    identifier_template: '{certificatearn}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.acm.get_account_configuration  ──
  - discovery_id: aws.acm.get_account_configuration
    calls:
      - action: get_account_configuration
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        DaysBeforeExpiry: '{{ item.DaysBeforeExpiry }}'
        ExpiryEvents: '{{ item.ExpiryEvents }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.acm.list_certificates  ──
  - discovery_id: aws.acm.list_certificates
    calls:
      - action: list_certificates
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.CertificateSummaryList }}'
      item:
        Certificate: '{{ item.Certificate }}'
        CertificateArn: '{{ item.CertificateArn }}'
        CertificateChain: '{{ item.CertificateChain }}'
        CreatedAt: '{{ item.CreatedAt }}'
        DomainName: '{{ item.DomainName }}'
        DomainValidationOptions: '{{ item.DomainValidationOptions }}'
        ExportOption: '{{ item.ExportOption }}'
        Exported: '{{ item.Exported }}'
        ExtendedKeyUsages: '{{ item.ExtendedKeyUsages }}'
        FailureReason: '{{ item.FailureReason }}'
        HasAdditionalSubjectAlternativeNames: '{{ item.HasAdditionalSubjectAlternativeNames }}'
        ImportedAt: '{{ item.ImportedAt }}'
        InUse: '{{ item.InUse }}'
        InUseBy: '{{ item.InUseBy }}'
        IssuedAt: '{{ item.IssuedAt }}'
        Issuer: '{{ item.Issuer }}'
        KeyAlgorithm: '{{ item.KeyAlgorithm }}'
        KeyUsages: '{{ item.KeyUsages }}'
        ManagedBy: '{{ item.ManagedBy }}'
        NotAfter: '{{ item.NotAfter }}'
        NotBefore: '{{ item.NotBefore }}'
        Options: '{{ item.Options }}'
        RenewalEligibility: '{{ item.RenewalEligibility }}'
        RenewalSummary: '{{ item.RenewalSummary }}'
        RevocationReason: '{{ item.RevocationReason }}'
        RevokedAt: '{{ item.RevokedAt }}'
        Serial: '{{ item.Serial }}'
        SignatureAlgorithm: '{{ item.SignatureAlgorithm }}'
        Status: '{{ item.Status }}'
        Subject: '{{ item.Subject }}'
        SubjectAlternativeNameSummaries: '{{ item.SubjectAlternativeNameSummaries }}'
        SubjectAlternativeNames: '{{ item.SubjectAlternativeNames }}'
        Type: '{{ item.Type }}'

  # ════ DEPENDENT (enrich) operations ════
  # ── aws.acm.describe_certificate [dependent] ──
  - discovery_id: aws.acm.describe_certificate
    for_each: aws.acm.list_certificates
    calls:
      - action: describe_certificate
        params:
          CertificateArn: "{{ item.CertificateArn }}"
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        Certificate: '{{ item.Certificate }}'
        Certificate.CertificateAuthorityArn: '{{ item.Certificate.CertificateAuthorityArn }}'
        Certificate.Issuer: '{{ item.Certificate.Issuer }}'
        Certificate.Options: '{{ item.Certificate.Options }}'
        CertificateArn: '{{ item.CertificateArn }}'
        CertificateAuthorityArn: '{{ item.CertificateAuthorityArn }}'
        CreatedAt: '{{ item.CreatedAt }}'
        DomainName: '{{ item.DomainName }}'
        DomainValidationOptions: '{{ item.DomainValidationOptions }}'
        ExtendedKeyUsages: '{{ item.ExtendedKeyUsages }}'
        FailureReason: '{{ item.FailureReason }}'
        ImportedAt: '{{ item.ImportedAt }}'
        InUseBy: '{{ item.InUseBy }}'
        IssuedAt: '{{ item.IssuedAt }}'
        Issuer: '{{ item.Issuer }}'
        KeyAlgorithm: '{{ item.KeyAlgorithm }}'
        KeyUsages: '{{ item.KeyUsages }}'
        ManagedBy: '{{ item.ManagedBy }}'
        NotAfter: '{{ item.NotAfter }}'
        NotBefore: '{{ item.NotBefore }}'
        Options: '{{ item.Options }}'
        RenewalEligibility: '{{ item.RenewalEligibility }}'
        RenewalSummary: '{{ item.RenewalSummary }}'
        RevocationReason: '{{ item.RevocationReason }}'
        RevokedAt: '{{ item.RevokedAt }}'
        Serial: '{{ item.Serial }}'
        SignatureAlgorithm: '{{ item.SignatureAlgorithm }}'
        Status: '{{ item.Status }}'
        Subject: '{{ item.Subject }}'
        SubjectAlternativeNames: '{{ item.SubjectAlternativeNames }}'
        Type: '{{ item.Type }}'

