# ==========================================================
# Discovery YAML — inspector2 (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 4 | ops: 4 independent, 0 dependent
# ==========================================================
version: '1.0'
provider: aws
service: inspector2

services:
  client: inspector2
  module: "boto3.client('inspector2')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: finding
    identifier_op: aws.inspector2.list_findings
    identifier_field: findingArn
    item_var_path: item.findingArn
    identifier_template: '{findingarn}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.inspector2.describe_organization_configuration  ──
  - discovery_id: aws.inspector2.describe_organization_configuration
    calls:
      - action: describe_organization_configuration
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        autoEnable: '{{ item.autoEnable }}'
        codeRepository: '{{ item.codeRepository }}'
        ec2: '{{ item.ec2 }}'
        ec2.scanModeStatus: '{{ item.ec2.scanModeStatus }}'
        ecr: '{{ item.ecr }}'
        lambda: '{{ item.lambda }}'
        lambdaCode: '{{ item.lambdaCode }}'
        maxAccountLimitReached: '{{ item.maxAccountLimitReached }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.inspector2.list_coverage  ──
  - discovery_id: aws.inspector2.list_coverage
    calls:
      - action: list_coverage
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.coveredResources }}'
      item:
        accountId: '{{ item.accountId }}'
        lastScannedAt: '{{ item.lastScannedAt }}'
        resourceId: '{{ item.resourceId }}'
        resourceMetadata: '{{ item.resourceMetadata }}'
        resourceType: '{{ item.resourceType }}'
        scanMode: '{{ item.scanMode }}'
        scanStatus: '{{ item.scanStatus }}'
        scanStatus.statusCode: '{{ item.scanStatus.statusCode }}'
        scanType: '{{ item.scanType }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.inspector2.list_findings  ──
  - discovery_id: aws.inspector2.list_findings
    calls:
      - action: list_findings
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.findings }}'
      item:
        awsAccountId: '{{ item.awsAccountId }}'
        codeVulnerabilityDetails: '{{ item.codeVulnerabilityDetails }}'
        exploitAvailable: '{{ item.exploitAvailable }}'
        exploitabilityDetails: '{{ item.exploitabilityDetails }}'
        findingArn: '{{ item.findingArn }}'
        firstObservedAt: '{{ item.firstObservedAt }}'
        fixAvailable: '{{ item.fixAvailable }}'
        inspectorScore: '{{ item.inspectorScore }}'
        inspectorScoreDetails: '{{ item.inspectorScoreDetails }}'
        lastObservedAt: '{{ item.lastObservedAt }}'
        networkReachabilityDetails: '{{ item.networkReachabilityDetails }}'
        packageVulnerabilityDetails: '{{ item.packageVulnerabilityDetails }}'
        remediation: '{{ item.remediation }}'
        resources: '{{ item.resources }}'
        severity: '{{ item.severity }}'
        status: '{{ item.status }}'
        title: '{{ item.title }}'
        type: '{{ item.type }}'
        updatedAt: '{{ item.updatedAt }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.inspector2.get_findings_report_status  ──
  - discovery_id: aws.inspector2.get_findings_report_status
    calls:
      - action: 
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        kmsKeyArn: '{{ item.kmsKeyArn }}'

