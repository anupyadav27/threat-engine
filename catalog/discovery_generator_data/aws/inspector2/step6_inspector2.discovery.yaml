# Auto-generated: minimum discoveries for check rules + inventory identifiers
# Sources: inspector2
# 7 ops (3 from checks, +4 for inventory)
version: '1.0'
provider: aws
service: inspector2
discovery:
  - calls:
    - action: list_filters
      on_error: continue
      save_as: response
    discovery_id: aws.inspector2.list_filters
    emit:
      as: item
      item:
        action: '{{ item.action }}'
        arn: '{{ item.arn }}'
        createdAt: '{{ item.createdAt }}'
        criteria: '{{ item.criteria }}'
        filterCriteria: '{{ item.filterCriteria }}'
        name: '{{ item.name }}'
        ownerId: '{{ item.ownerId }}'
        reason: '{{ item.reason }}'
        tags: '{{ item.tags }}'
        updatedAt: '{{ item.updatedAt }}'
      items_for: '{{ response.filters }}'
