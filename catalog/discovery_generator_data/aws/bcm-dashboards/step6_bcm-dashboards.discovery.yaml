version: '1.0'
provider: aws
service: bcm-dashboards
services:
  client: bcm-dashboards
  module: boto3.client
discovery:
- discovery_id: aws.bcm-dashboards.list_dashboards
  calls:
  - action: list_dashboards
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.dashboards }}'
    item:
      arn: '{{ item.arn }}'
      createdAt: '{{ item.createdAt }}'
      description: '{{ item.description }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      updatedAt: '{{ item.updatedAt }}'
      widgets: '{{ item.widgets }}'
- discovery_id: aws.bcm-dashboards.get_dashboard
  for_each: aws.bcm-dashboards.list_dashboards
  calls:
  - action: get_dashboard
    params:
      arn: '{{ item.arn }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.widgets }}'
    item:
      configs: '{{ item.configs }}'
      description: '{{ item.description }}'
      height: '{{ item.height }}'
      horizontalOffset: '{{ item.horizontalOffset }}'
      title: '{{ item.title }}'
      widgets: '{{ item.widgets }}'
      width: '{{ item.width }}'
- discovery_id: aws.bcm-dashboards.get_resource_policy
  calls:
  - action: get_resource_policy
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      Statement: '{{ response.Statement }}'
      Version: '{{ response.Version }}'
- discovery_id: aws.bcm-dashboards.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.resourceTags }}'
    item:
      key: '{{ item.key }}'
      value: '{{ item.value }}'
