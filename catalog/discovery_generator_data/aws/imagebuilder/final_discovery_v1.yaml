# ==========================================================
# Discovery YAML — imagebuilder (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 5 | ops: 0 independent, 4 dependent
# ==========================================================
version: '1.0'
provider: aws
service: imagebuilder

services:
  client: imagebuilder
  module: "boto3.client('imagebuilder')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  []

checks: []

discovery:

  # ════ DEPENDENT (enrich) operations ════
  # ── aws.imagebuilder.get_distribution_configuration [dependent] ──
  - discovery_id: aws.imagebuilder.get_distribution_configuration
    for_each: aws.imagebuilder.list_image_pipelines
    calls:
      - action: get_distribution_configuration
        params:
          distributionConfigurationArn: "{{ item.distributionConfigurationArn }}"
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        Tags: '{{ item.Tags }}'
        arn: '{{ item.arn }}'
        dateCreated: '{{ item.dateCreated }}'
        dateUpdated: '{{ item.dateUpdated }}'
        description: '{{ item.description }}'
        distributions: '{{ item.distributions }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        timeoutMinutes: '{{ item.timeoutMinutes }}'

  # ════ DEPENDENT (enrich) operations ════
  # ── aws.imagebuilder.get_image_pipeline [dependent] ──
  - discovery_id: aws.imagebuilder.get_image_pipeline
    for_each: aws.imagebuilder.list_image_scan_findings
    calls:
      - action: get_image_pipeline
        params:
          imagePipelineArn: "{{ item.imagePipelineArn }}"
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        Tags: '{{ item.Tags }}'
        arn: '{{ item.arn }}'
        consecutiveFailures: '{{ item.consecutiveFailures }}'
        containerRecipeArn: '{{ item.containerRecipeArn }}'
        dateCreated: '{{ item.dateCreated }}'
        dateLastRun: '{{ item.dateLastRun }}'
        dateNextRun: '{{ item.dateNextRun }}'
        dateUpdated: '{{ item.dateUpdated }}'
        description: '{{ item.description }}'
        distributionConfigurationArn: '{{ item.distributionConfigurationArn }}'
        enhancedImageMetadataEnabled: '{{ item.enhancedImageMetadataEnabled }}'
        executionRole: '{{ item.executionRole }}'
        imagePipeline: '{{ item.imagePipeline }}'
        imageRecipeArn: '{{ item.imageRecipeArn }}'
        imageScanningConfiguration: '{{ item.imageScanningConfiguration }}'
        imageTestsConfiguration: '{{ item.imageTestsConfiguration }}'
        infrastructureConfigurationArn: '{{ item.infrastructureConfigurationArn }}'
        lastRunStatus: '{{ item.lastRunStatus }}'
        loggingConfiguration: '{{ item.loggingConfiguration }}'
        name: '{{ item.name }}'
        platform: '{{ item.platform }}'
        schedule: '{{ item.schedule }}'
        status: '{{ item.status }}'
        tags: '{{ item.tags }}'
        workflows: '{{ item.workflows }}'

  # ════ DEPENDENT (enrich) operations ════
  # ── aws.imagebuilder.get_image_recipe [dependent] ──
  - discovery_id: aws.imagebuilder.get_image_recipe
    for_each: aws.imagebuilder.list_image_pipelines
    calls:
      - action: get_image_recipe
        params:
          imageRecipeArn: "{{ item.imageRecipeArn }}"
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        Tags: '{{ item.Tags }}'
        additionalInstanceConfiguration: '{{ item.additionalInstanceConfiguration }}'
        amiTags: '{{ item.amiTags }}'
        arn: '{{ item.arn }}'
        blockDeviceMappings: '{{ item.blockDeviceMappings }}'
        components: '{{ item.components }}'
        dateCreated: '{{ item.dateCreated }}'
        description: '{{ item.description }}'
        item: '{{ item }}'
        name: '{{ item.name }}'
        owner: '{{ item.owner }}'
        parentImage: '{{ item.parentImage }}'
        platform: '{{ item.platform }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        version: '{{ item.version }}'
        workingDirectory: '{{ item.workingDirectory }}'

  # ════ DEPENDENT (enrich) operations ════
  # ── aws.imagebuilder.get_infrastructure_configuration [dependent] ──
  - discovery_id: aws.imagebuilder.get_infrastructure_configuration
    for_each: aws.imagebuilder.list_image_pipelines
    calls:
      - action: get_infrastructure_configuration
        params:
          infrastructureConfigurationArn: "{{ item.infrastructureConfigurationArn }}"
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        Tags: '{{ item.Tags }}'
        arn: '{{ item.arn }}'
        dateCreated: '{{ item.dateCreated }}'
        dateUpdated: '{{ item.dateUpdated }}'
        description: '{{ item.description }}'
        instanceMetadataOptions: '{{ item.instanceMetadataOptions }}'
        instanceProfileName: '{{ item.instanceProfileName }}'
        instanceTypes: '{{ item.instanceTypes }}'
        keyPair: '{{ item.keyPair }}'
        logging: '{{ item.logging }}'
        name: '{{ item.name }}'
        placement: '{{ item.placement }}'
        resourceTags: '{{ item.resourceTags }}'
        securityGroupIds: '{{ item.securityGroupIds }}'
        snsTopicArn: '{{ item.snsTopicArn }}'
        subnetId: '{{ item.subnetId }}'
        tags: '{{ item.tags }}'
        terminateInstanceOnFailure: '{{ item.terminateInstanceOnFailure }}'

