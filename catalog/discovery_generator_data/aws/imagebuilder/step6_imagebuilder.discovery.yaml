    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.distributionConfigurationSummaryList }}'
    item:
      Status: '{{ item.Status }}'
      Enabled: '{{ item.Enabled }}'
      arn: '{{ item.arn }}'
      dateCreated: '{{ item.dateCreated }}'
      dateUpdated: '{{ item.dateUpdated }}'
      description: '{{ item.description }}'
      name: '{{ item.name }}'
      regions: '{{ item.regions }}'
      tags: '{{ item.tags }}'
      nextToken: '{{ response.nextToken }}'
      requestId: '{{ response.requestId }}'
- discovery_id: aws.imagebuilder.list_image_build_versions
  calls:
  - action: list_image_build_versions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.imageSummaryList }}'
    item:
      arn: '{{ item.arn }}'
      buildType: '{{ item.buildType }}'
      dateCreated: '{{ item.dateCreated }}'
      deprecationTime: '{{ item.deprecationTime }}'
      image: '{{ item.image }}'
      imageSource: '{{ item.imageSource }}'
      lifecycleExecutionId: '{{ item.lifecycleExecutionId }}'
      loggingConfiguration: '{{ item.loggingConfiguration }}'
      name: '{{ item.name }}'
      osVersion: '{{ item.osVersion }}'
      outputResources: '{{ item.outputResources }}'
      owner: '{{ item.owner }}'
      platform: '{{ item.platform }}'
      state: '{{ item.state }}'
      tags: '{{ item.tags }}'
      type: '{{ item.type }}'
      version: '{{ item.version }}'
      nextToken: '{{ response.nextToken }}'
      requestId: '{{ response.requestId }}'
- discovery_id: aws.imagebuilder.list_image_pipelines
  calls:
