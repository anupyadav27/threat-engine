version: '1.0'
provider: aws
service: imagebuilder
services:
  client: imagebuilder
  module: boto3.client
discovery:
- discovery_id: aws.imagebuilder.list_component_build_versions
  calls:
  - action: list_component_build_versions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.componentSummaryList }}'
    item:
      arn: '{{ item.arn }}'
      changeDescription: '{{ item.changeDescription }}'
      component: '{{ item.component }}'
      dateCreated: '{{ item.dateCreated }}'
      description: '{{ item.description }}'
      name: '{{ item.name }}'
      obfuscate: '{{ item.obfuscate }}'
      owner: '{{ item.owner }}'
      platform: '{{ item.platform }}'
      publisher: '{{ item.publisher }}'
      requestId: '{{ item.requestId }}'
      state: '{{ item.state }}'
      supportedOsVersions: '{{ item.supportedOsVersions }}'
      tags: '{{ item.tags }}'
      type: '{{ item.type }}'
      version: '{{ item.version }}'
      nextToken: '{{ response.nextToken }}'
- discovery_id: aws.imagebuilder.list_components
  calls:
  - action: list_components
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.componentVersionList }}'
    item:
      arn: '{{ item.arn }}'
      dateCreated: '{{ item.dateCreated }}'
      description: '{{ item.description }}'
      name: '{{ item.name }}'
      owner: '{{ item.owner }}'
      platform: '{{ item.platform }}'
      productCodes: '{{ item.productCodes }}'
      status: '{{ item.status }}'
      supportedOsVersions: '{{ item.supportedOsVersions }}'
      type: '{{ item.type }}'
      version: '{{ item.version }}'
      nextToken: '{{ response.nextToken }}'
      requestId: '{{ response.requestId }}'
- discovery_id: aws.imagebuilder.list_container_recipes
  calls:
  - action: list_container_recipes
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.containerRecipeSummaryList }}'
    item:
      arn: '{{ item.arn }}'
      containerType: '{{ item.containerType }}'
      dateCreated: '{{ item.dateCreated }}'
      instanceImage: '{{ item.instanceImage }}'
      name: '{{ item.name }}'
      owner: '{{ item.owner }}'
      parentImage: '{{ item.parentImage }}'
      platform: '{{ item.platform }}'
      tags: '{{ item.tags }}'
      nextToken: '{{ response.nextToken }}'
      requestId: '{{ response.requestId }}'
- discovery_id: aws.imagebuilder.list_distribution_configurations
