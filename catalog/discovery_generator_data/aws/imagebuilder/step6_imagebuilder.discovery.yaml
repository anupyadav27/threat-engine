      imagePipelineAggregation: '{{ item.imagePipelineAggregation }}'
      vulnerabilityIdAggregation: '{{ item.vulnerabilityIdAggregation }}'
      aggregationType: '{{ response.aggregationType }}'
      nextToken: '{{ response.nextToken }}'
      requestId: '{{ response.requestId }}'
- discovery_id: aws.imagebuilder.list_image_scan_findings
  calls:
