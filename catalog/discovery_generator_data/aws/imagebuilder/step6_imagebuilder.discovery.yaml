    item:
      arn: '{{ response.component.arn }}'
      changeDescription: '{{ response.component.changeDescription }}'
      component: '{{ response.component.component }}'
      data: '{{ response.component.data }}'
      dateCreated: '{{ response.component.dateCreated }}'
      description: '{{ response.component.description }}'
      encrypted: '{{ response.component.encrypted }}'
      kmsKeyId: '{{ response.component.kmsKeyId }}'
      name: '{{ response.component.name }}'
      obfuscate: '{{ response.component.obfuscate }}'
      owner: '{{ response.component.owner }}'
      parameters: '{{ response.component.parameters[].type }}'
      platform: '{{ response.component.platform }}'
      productCodes: '{{ response.component.productCodes }}'
      publisher: '{{ response.component.publisher }}'
