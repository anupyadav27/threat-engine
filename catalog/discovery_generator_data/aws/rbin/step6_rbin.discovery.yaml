version: '1.0'
provider: aws
service: rbin
services:
  client: rbin
  module: boto3.client
discovery:
- discovery_id: aws.rbin.get_rule
  calls:
  - action: get_rule
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ResourceTags }}'
    item:
      ResourceTagKey: '{{ item.ResourceTagKey }}'
      ResourceTagValue: '{{ item.ResourceTagValue }}'
      Description: '{{ response.Description }}'
      Identifier: '{{ response.Identifier }}'
      UnlockDelayUnit: '{{ response.LockConfiguration.UnlockDelay.UnlockDelayUnit }}'
      UnlockDelayValue: '{{ response.LockConfiguration.UnlockDelay.UnlockDelayValue }}'
      LockEndTime: '{{ response.LockEndTime }}'
      LockState: '{{ response.LockState }}'
      ResourceType: '{{ response.ResourceType }}'
      RetentionPeriodUnit: '{{ response.RetentionPeriod.RetentionPeriodUnit }}'
      RetentionPeriodValue: '{{ response.RetentionPeriod.RetentionPeriodValue }}'
      RuleArn: '{{ response.RuleArn }}'
      Status: '{{ response.Status }}'
- discovery_id: aws.rbin.list_rules
  calls:
  - action: list_rules
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Rules }}'
    item:
      RetentionPeriod: '{{ item.RetentionPeriod }}'
      Description: '{{ item.Description }}'
      Identifier: '{{ item.Identifier }}'
      LockState: '{{ item.LockState }}'
      RuleArn: '{{ item.RuleArn }}'
- discovery_id: aws.rbin.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Tags }}'
    item:
      Key: '{{ item.Key }}'
      Value: '{{ item.Value }}'
