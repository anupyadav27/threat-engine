# ==========================================================
# Discovery YAML — ebs (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 8 | ops: 3 independent, 0 dependent
# ==========================================================
version: '1.0'
provider: aws
service: ebs

services:
  client: ebs
  module: "boto3.client('ebs')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: fast_snapshot_restore
    identifier_op: aws.ec2.describe_fast_snapshot_restores
    identifier_field: AvailabilityZoneId
    item_var_path: item.AvailabilityZoneId
    identifier_template: '{availabilityzoneid}'
  - resource_type: snapshot
    identifier_op: aws.ec2.describe_snapshots
    identifier_field: OutpostArn
    item_var_path: item.OutpostArn
    identifier_template: '{outpostarn}'
  - resource_type: volume
    identifier_op: aws.ec2.describe_volumes
    identifier_field: OutpostArn
    item_var_path: item.OutpostArn
    identifier_template: '{outpostarn}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.ec2.describe_fast_snapshot_restores  ──
  - discovery_id: aws.ec2.describe_fast_snapshot_restores
    calls:
      - action: describe_fast_snapshot_restores
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.FastSnapshotRestores }}'
      item:
        AvailabilityZone: '{{ item.AvailabilityZone }}'
        AvailabilityZoneId: '{{ item.AvailabilityZoneId }}'
        CreateVolumePermissions: '{{ item.CreateVolumePermissions }}'
        DisabledTime: '{{ item.DisabledTime }}'
        DisablingTime: '{{ item.DisablingTime }}'
        EnabledTime: '{{ item.EnabledTime }}'
        EnablingTime: '{{ item.EnablingTime }}'
        FastSnapshotRestores: '{{ item.FastSnapshotRestores }}'
        OptimizingTime: '{{ item.OptimizingTime }}'
        OwnerAlias: '{{ item.OwnerAlias }}'
        ProductCodeId: '{{ item.ProductCodeId }}'
        ProductCodeType: '{{ item.ProductCodeType }}'
        SnapshotId: '{{ item.SnapshotId }}'
        StateTransitionReason: '{{ item.StateTransitionReason }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.ec2.describe_snapshots  ──
  - discovery_id: aws.ec2.describe_snapshots
    calls:
      - action: describe_snapshots
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Snapshots }}'
      item:
        AvailabilityZone: '{{ item.AvailabilityZone }}'
        CompletionDurationMinutes: '{{ item.CompletionDurationMinutes }}'
        CompletionTime: '{{ item.CompletionTime }}'
        DataEncryptionKeyId: '{{ item.DataEncryptionKeyId }}'
        Description: '{{ item.Description }}'
        FullSnapshotSizeInBytes: '{{ item.FullSnapshotSizeInBytes }}'
        KmsKeyId: '{{ item.KmsKeyId }}'
        OutpostArn: '{{ item.OutpostArn }}'
        OwnerAlias: '{{ item.OwnerAlias }}'
        Progress: '{{ item.Progress }}'
        RestoreExpiryTime: '{{ item.RestoreExpiryTime }}'
        Snapshots: '{{ item.Snapshots }}'
        Snapshots.OwnerId: '{{ item.Snapshots.OwnerId }}'
        Snapshots.SnapshotId: '{{ item.Snapshots.SnapshotId }}'
        Snapshots.State: '{{ item.Snapshots.State }}'
        SseType: '{{ item.SseType }}'
        StartTime: '{{ item.StartTime }}'
        StateMessage: '{{ item.StateMessage }}'
        StorageTier: '{{ item.StorageTier }}'
        Tags: '{{ item.Tags }}'
        TransferType: '{{ item.TransferType }}'
        VolumeId: '{{ item.VolumeId }}'
        VolumeSize: '{{ item.VolumeSize }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.ec2.describe_volumes  ──
  - discovery_id: aws.ec2.describe_volumes
    calls:
      - action: describe_volumes
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Volumes }}'
      item:
        Attachments: '{{ item.Attachments }}'
        Attachments.InstanceId: '{{ item.Attachments.InstanceId }}'
        AvailabilityZone: '{{ item.AvailabilityZone }}'
        AvailabilityZoneId: '{{ item.AvailabilityZoneId }}'
        CreateTime: '{{ item.CreateTime }}'
        FastRestored: '{{ item.FastRestored }}'
        KmsKeyId: '{{ item.KmsKeyId }}'
        MultiAttachEnabled: '{{ item.MultiAttachEnabled }}'
        Operator: '{{ item.Operator }}'
        OutpostArn: '{{ item.OutpostArn }}'
        SnapshotId: '{{ item.SnapshotId }}'
        SourceVolumeId: '{{ item.SourceVolumeId }}'
        SseType: '{{ item.SseType }}'
        Tags: '{{ item.Tags }}'
        VolumeInitializationRate: '{{ item.VolumeInitializationRate }}'

