version: '1.0'
provider: aws
service: partnercentral-selling
services:
  client: partnercentral-selling
  module: boto3.client
discovery:
- discovery_id: aws.partnercentral-selling.get_aws_opportunity_summary
  calls:
  - action: get_aws_opportunity_summary
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.OpportunityTeam }}'
    item:
      BusinessTitle: '{{ item.BusinessTitle }}'
      Email: '{{ item.Email }}'
      FirstName: '{{ item.FirstName }}'
      Insights: '{{ item.Insights }}'
      LastName: '{{ item.LastName }}'
      Visibility: '{{ item.Visibility }}'
- discovery_id: aws.partnercentral-selling.get_engagement
  calls:
  - action: get_engagement
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Contexts }}'
    item:
      Contexts: '{{ item.Contexts }}'
      Description: '{{ item.Description }}'
      Payload: '{{ item.Payload }}'
      Type: '{{ item.Type }}'
- discovery_id: aws.partnercentral-selling.get_engagement_invitation
  calls:
  - action: get_engagement_invitation
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ExistingMembers }}'
    item:
      CompanyName: '{{ item.CompanyName }}'
      WebsiteUrl: '{{ item.WebsiteUrl }}'
- discovery_id: aws.partnercentral-selling.get_opportunity
  calls:
  - action: get_opportunity
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.PrimaryNeedsFromAws }}'
- discovery_id: aws.partnercentral-selling.get_resource_snapshot
  calls:
  - action: get_resource_snapshot
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      OpportunitySummary: '{{ response.Payload.OpportunitySummary }}'
- discovery_id: aws.partnercentral-selling.get_resource_snapshot_job
  calls:
  - action: get_resource_snapshot_job
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      Arn: '{{ response.Arn }}'
      Id: '{{ response.Id }}'
      ResourceArn: '{{ response.ResourceArn }}'
      ResourceId: '{{ response.ResourceId }}'
      Status: '{{ response.Status }}'
      Catalog: '{{ response.Catalog }}'
      CreatedAt: '{{ response.CreatedAt }}'
      EngagementId: '{{ response.EngagementId }}'
      LastFailure: '{{ response.LastFailure }}'
      LastSuccessfulExecutionDate: '{{ response.LastSuccessfulExecutionDate }}'
      ResourceSnapshotTemplateName: '{{ response.ResourceSnapshotTemplateName }}'
      ResourceType: '{{ response.ResourceType }}'
- discovery_id: aws.partnercentral-selling.get_selling_system_settings
  calls:
  - action: get_selling_system_settings
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      Catalog: '{{ response.Catalog }}'
      ResourceSnapshotJobRoleArn: '{{ response.ResourceSnapshotJobRoleArn }}'
- discovery_id: aws.partnercentral-selling.list_engagement_by_accepting_invitation_tasks
  calls:
  - action: list_engagement_by_accepting_invitation_tasks
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.TaskSummaries }}'
    item:
      Contexts: '{{ item.Contexts }}'
      Description: '{{ item.Description }}'
      EngagementInvitationId: '{{ item.EngagementInvitationId }}'
      Message: '{{ item.Message }}'
      OpportunityId: '{{ item.OpportunityId }}'
      ReasonCode: '{{ item.ReasonCode }}'
      ResourceSnapshotJobId: '{{ item.ResourceSnapshotJobId }}'
      StartTime: '{{ item.StartTime }}'
      TaskArn: '{{ item.TaskArn }}'
      TaskId: '{{ item.TaskId }}'
      TaskStatus: '{{ item.TaskStatus }}'
- discovery_id: aws.partnercentral-selling.list_engagement_from_opportunity_tasks
  calls:
  - action: list_engagement_from_opportunity_tasks
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.TaskSummaries }}'
    item:
      EngagementId: '{{ item.EngagementId }}'
      EngagementInvitationId: '{{ item.EngagementInvitationId }}'
      Message: '{{ item.Message }}'
      OpportunityId: '{{ item.OpportunityId }}'
      ReasonCode: '{{ item.ReasonCode }}'
      ResourceSnapshotJobId: '{{ item.ResourceSnapshotJobId }}'
      StartTime: '{{ item.StartTime }}'
      TaskArn: '{{ item.TaskArn }}'
      TaskId: '{{ item.TaskId }}'
      TaskStatus: '{{ item.TaskStatus }}'
- discovery_id: aws.partnercentral-selling.list_engagement_invitations
  calls:
  - action: list_engagement_invitations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.EngagementInvitationSummaries }}'
    item:
      Arn: '{{ item.Arn }}'
      Id: '{{ item.Id }}'
      Status: '{{ item.Status }}'
      Catalog: '{{ item.Catalog }}'
      EngagementId: '{{ item.EngagementId }}'
      EngagementTitle: '{{ item.EngagementTitle }}'
      ExpirationDate: '{{ item.ExpirationDate }}'
      InvitationDate: '{{ item.InvitationDate }}'
      ParticipantType: '{{ item.ParticipantType }}'
      PayloadType: '{{ item.PayloadType }}'
      Receiver: '{{ item.Receiver }}'
      SenderAwsAccountId: '{{ item.SenderAwsAccountId }}'
      SenderCompanyName: '{{ item.SenderCompanyName }}'
- discovery_id: aws.partnercentral-selling.list_engagement_members
  calls:
  - action: list_engagement_members
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.EngagementMemberList }}'
    item:
      AccountId: '{{ item.AccountId }}'
      CompanyName: '{{ item.CompanyName }}'
      WebsiteUrl: '{{ item.WebsiteUrl }}'
- discovery_id: aws.partnercentral-selling.list_engagement_resource_associations
  calls:
  - action: list_engagement_resource_associations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.EngagementResourceAssociationSummaries }}'
    item:
      ResourceId: '{{ item.ResourceId }}'
      Catalog: '{{ item.Catalog }}'
      CreatedBy: '{{ item.CreatedBy }}'
      EngagementId: '{{ item.EngagementId }}'
      ResourceType: '{{ item.ResourceType }}'
- discovery_id: aws.partnercentral-selling.list_engagements
  calls:
  - action: list_engagements
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.EngagementSummaryList }}'
    item:
      Arn: '{{ item.Arn }}'
      Id: '{{ item.Id }}'
      CreatedAt: '{{ item.CreatedAt }}'
      CreatedBy: '{{ item.CreatedBy }}'
      MemberCount: '{{ item.MemberCount }}'
      Title: '{{ item.Title }}'
- discovery_id: aws.partnercentral-selling.list_opportunities
  calls:
  - action: list_opportunities
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.OpportunitySummaries }}'
    item:
      Arn: '{{ item.Arn }}'
      Id: '{{ item.Id }}'
      Catalog: '{{ item.Catalog }}'
      CreatedDate: '{{ item.CreatedDate }}'
      Customer: '{{ item.Customer }}'
      LastModifiedDate: '{{ item.LastModifiedDate }}'
      LifeCycle: '{{ item.LifeCycle }}'
      OpportunityType: '{{ item.OpportunityType }}'
      PartnerOpportunityIdentifier: '{{ item.PartnerOpportunityIdentifier }}'
      Project: '{{ item.Project }}'
- discovery_id: aws.partnercentral-selling.list_resource_snapshot_jobs
  calls:
  - action: list_resource_snapshot_jobs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ResourceSnapshotJobSummaries }}'
    item:
      Arn: '{{ item.Arn }}'
      Id: '{{ item.Id }}'
      Status: '{{ item.Status }}'
      EngagementId: '{{ item.EngagementId }}'
- discovery_id: aws.partnercentral-selling.list_resource_snapshots
  calls:
  - action: list_resource_snapshots
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ResourceSnapshotSummaries }}'
    item:
      Arn: '{{ item.Arn }}'
      ResourceId: '{{ item.ResourceId }}'
      CreatedBy: '{{ item.CreatedBy }}'
      ResourceSnapshotTemplateName: '{{ item.ResourceSnapshotTemplateName }}'
      ResourceType: '{{ item.ResourceType }}'
      Revision: '{{ item.Revision }}'
- discovery_id: aws.partnercentral-selling.list_solutions
  calls:
  - action: list_solutions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.SolutionSummaries }}'
    item:
      Arn: '{{ item.Arn }}'
      Id: '{{ item.Id }}'
      Name: '{{ item.Name }}'
      Status: '{{ item.Status }}'
      Catalog: '{{ item.Catalog }}'
      Category: '{{ item.Category }}'
      CreatedDate: '{{ item.CreatedDate }}'
- discovery_id: aws.partnercentral-selling.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Tags }}'
    item:
      Key: '{{ item.Key }}'
      Value: '{{ item.Value }}'
