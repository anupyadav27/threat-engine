version: '1.0'
provider: aws
service: connect
services:
  client: connect
  module: boto3.client
discovery:
- discovery_id: aws.connect.list_instances
  calls:
  - action: list_instances
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.InstanceSummaryList }}'
    item:
      CreationTime: '{{ item.CreationTime }}'
      ReplicationConfiguration: '{{ item.ReplicationConfiguration }}'
      ServiceRole: '{{ item.ServiceRole }}'
      AccessToken: '{{ item.AccessToken }}'
      AccessTokenExpiration: '{{ item.AccessTokenExpiration }}'
      AgentStatus: '{{ item.AgentStatus }}'
      AllowedAccessControlTags: '{{ item.AllowedAccessControlTags }}'
      AllowedIps: '{{ item.AllowedIps }}'
      ApproximateTotalCount: '{{ item.ApproximateTotalCount }}'
      AuthenticationProfile: '{{ item.AuthenticationProfile }}'
      AutoEvaluationConfiguration: '{{ item.AutoEvaluationConfiguration }}'
      BlockedIps: '{{ item.BlockedIps }}'
      Collections: '{{ item.Collections }}'
      Constraints: '{{ item.Constraints }}'
      ContactFlow: '{{ item.ContactFlow }}'
      ContactFlowId: '{{ item.ContactFlowId }}'
      ContactFlowModule: '{{ item.ContactFlowModule }}'
      ContactFlowModuleAlias: '{{ item.ContactFlowModuleAlias }}'
      CreateTimestamp: '{{ item.CreateTimestamp }}'
      DataSetId: '{{ item.DataSetId }}'
      DataSetName: '{{ item.DataSetName }}'
      DataSnapshotTime: '{{ item.DataSnapshotTime }}'
      Dimensions: '{{ item.Dimensions }}'
      EffectiveHoursOfOperationList: '{{ item.EffectiveHoursOfOperationList }}'
      EvaluationForm: '{{ item.EvaluationForm }}'
      Fields: '{{ item.Fields }}'
      HierarchyGroup: '{{ item.HierarchyGroup }}'
      HierarchyRestrictedResources: '{{ item.HierarchyRestrictedResources }}'
      HierarchyStructure: '{{ item.HierarchyStructure }}'
      HoursOfOperation: '{{ item.HoursOfOperation }}'
      HoursOfOperationOverride: '{{ item.HoursOfOperationOverride }}'
      IdentityManagementType: '{{ item.IdentityManagementType }}'
      InboundCallsEnabled: '{{ item.InboundCallsEnabled }}'
      Instance: '{{ item.Instance }}'
      InstanceAccessUrl: '{{ item.InstanceAccessUrl }}'
      InstanceAlias: '{{ item.InstanceAlias }}'
      InstanceStatus: '{{ item.InstanceStatus }}'
      Items: '{{ item.Items }}'
      Key: '{{ item.Key }}'
      LastUpdatedTime: '{{ item.LastUpdatedTime }}'
      LevelFive: '{{ item.LevelFive }}'
      LevelFour: '{{ item.LevelFour }}'
      LevelOne: '{{ item.LevelOne }}'
      LevelThree: '{{ item.LevelThree }}'
      LevelTwo: '{{ item.LevelTwo }}'
      LexBot: '{{ item.LexBot }}'
      LexRegion: '{{ item.LexRegion }}'
      LexV2Bot: '{{ item.LexV2Bot }}'
      Locked: '{{ item.Locked }}'
      MaxSessionDuration: '{{ item.MaxSessionDuration }}'
      MetricResults: '{{ item.MetricResults }}'
      ModifiedTimestamp: '{{ item.ModifiedTimestamp }}'
      Namespace: '{{ item.Namespace }}'
      OutboundCallsEnabled: '{{ item.OutboundCallsEnabled }}'
      PeriodicSessionDuration: '{{ item.PeriodicSessionDuration }}'
      PredefinedAttribute: '{{ item.PredefinedAttribute }}'
      PublishStatus: '{{ item.PublishStatus }}'
      QuickConnect: '{{ item.QuickConnect }}'
      RefreshToken: '{{ item.RefreshToken }}'
      RefreshTokenExpiration: '{{ item.RefreshTokenExpiration }}'
      ResourceShareArn: '{{ item.ResourceShareArn }}'
      ResourceShareId: '{{ item.ResourceShareId }}'
      ResourceShareStatus: '{{ item.ResourceShareStatus }}'
      ScoringStrategy: '{{ item.ScoringStrategy }}'
      SecurityProfile: '{{ item.SecurityProfile }}'
      SelfAssignFlowId: '{{ item.SelfAssignFlowId }}'
      SessionInactivityDuration: '{{ item.SessionInactivityDuration }}'
      SessionInactivityHandlingEnabled: '{{ item.SessionInactivityHandlingEnabled
        }}'
      SignInUrl: '{{ item.SignInUrl }}'
      SingleSelectOptions: '{{ item.SingleSelectOptions }}'
      StatusReason: '{{ item.StatusReason }}'
      TagRestrictedResources: '{{ item.TagRestrictedResources }}'
      TargetAccountId: '{{ item.TargetAccountId }}'
      UserArn: '{{ item.UserArn }}'
