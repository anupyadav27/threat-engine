# ==========================================================
# Discovery YAML — quicksight (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 16 | ops: 7 independent, 0 dependent
# ==========================================================
version: '1.0'
provider: aws
service: quicksight

services:
  client: quicksight
  module: "boto3.client('quicksight')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: account_setting
    identifier_op: aws.quicksight.describe_account_settings
    identifier_field: AccountName
    item_var_path: item.AccountName
    identifier_template: '{accountname}'
  - resource_type: data_set_permission
    identifier_op: aws.quicksight.describe_data_set_permissions
    identifier_field: Actions
    item_var_path: item.Actions
    identifier_template: '{actions}'
  - resource_type: dashboard
    identifier_op: aws.quicksight.list_dashboards
    identifier_field: DashboardId
    item_var_path: item.DashboardId
    identifier_template: '{dashboardid}'
  - resource_type: data_set
    identifier_op: aws.quicksight.list_data_sets
    identifier_field: Arn
    item_var_path: item.Arn
    identifier_template: '{arn}'
  - resource_type: group
    identifier_op: aws.quicksight.list_groups
    identifier_field: GroupName
    item_var_path: item.GroupName
    identifier_template: '{groupname}'
  - resource_type: user
    identifier_op: aws.quicksight.list_users
    identifier_field: ExternalLoginId
    item_var_path: item.ExternalLoginId
    identifier_template: '{externalloginid}'
  - resource_type: action_connector_permission
    identifier_op: aws.quicksight.describe_action_connector_permissions
    identifier_field: Actions
    item_var_path: item.Actions
    identifier_template: '{actions}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.quicksight.describe_account_settings  ──
  - discovery_id: aws.quicksight.describe_account_settings
    calls:
      - action: describe_account_settings
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        AccountName: '{{ item.AccountName }}'
        AccountSettings: '{{ item.AccountSettings }}'
        AccountSettings.DefaultNamespace.LogsRetentionDays: '{{ item.AccountSettings.DefaultNamespace.LogsRetentionDays }}'
        DefaultNamespace: '{{ item.DefaultNamespace }}'
        Edition: '{{ item.Edition }}'
        NotificationEmail: '{{ item.NotificationEmail }}'
        PublicSharingEnabled: '{{ item.PublicSharingEnabled }}'
        TerminationProtectionEnabled: '{{ item.TerminationProtectionEnabled }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.quicksight.describe_data_set_permissions  ──
  - discovery_id: aws.quicksight.describe_data_set_permissions
    calls:
      - action: describe_data_set_permissions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Permissions }}'
      item:
        Actions: '{{ item.Actions }}'
        Principal: '{{ item.Principal }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.quicksight.list_dashboards  ──
  - discovery_id: aws.quicksight.list_dashboards
    calls:
      - action: list_dashboards
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.DashboardSummaryList }}'
      item:
        Dashboard: '{{ item.Dashboard }}'
        DashboardId: '{{ item.DashboardId }}'
        DashboardPublishOptions: '{{ item.DashboardPublishOptions }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.quicksight.list_data_sets  ──
  - discovery_id: aws.quicksight.list_data_sets
    calls:
      - action: list_data_sets
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.DataSetSummaries }}'
      item:
        Arn: '{{ item.Arn }}'
        CreatedTime: '{{ item.CreatedTime }}'
        DataSet: '{{ item.DataSet }}'
        DataSetId: '{{ item.DataSetId }}'
        ImportMode: '{{ item.ImportMode }}'
        LastUpdatedTime: '{{ item.LastUpdatedTime }}'
        Name: '{{ item.Name }}'
        RowLevelPermissionDataSet: '{{ item.RowLevelPermissionDataSet }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.quicksight.list_groups  ──
  - discovery_id: aws.quicksight.list_groups
    calls:
      - action: list_groups
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.GroupList }}'
      item:
        Group: '{{ item.Group }}'
        GroupName: '{{ item.GroupName }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.quicksight.list_users  ──
  - discovery_id: aws.quicksight.list_users
    calls:
      - action: list_users
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.UserList }}'
      item:
        Active: '{{ item.Active }}'
        CustomPermissionsName: '{{ item.CustomPermissionsName }}'
        Email: '{{ item.Email }}'
        ExternalLoginFederationProviderType: '{{ item.ExternalLoginFederationProviderType }}'
        ExternalLoginFederationProviderUrl: '{{ item.ExternalLoginFederationProviderUrl }}'
        ExternalLoginId: '{{ item.ExternalLoginId }}'
        IdentityType: '{{ item.IdentityType }}'
        Role: '{{ item.Role }}'
        User: '{{ item.User }}'
        UserName: '{{ item.UserName }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.quicksight.describe_action_connector_permissions  ──
  - discovery_id: aws.quicksight.describe_action_connector_permissions
    calls:
      - action: describe_action_connector_permissions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Permissions }}'
      item:
        Actions: '{{ item.Actions }}'
        Principal: '{{ item.Principal }}'

