      NetworkEndBlackout: '{{ response.EncoderSettings.BlackoutSlate.NetworkEndBlackout }}'
      NetworkId: '{{ response.EncoderSettings.BlackoutSlate.NetworkId }}'
      InputPrepareScheduleActions: '{{ response.EncoderSettings.FeatureActivations.InputPrepareScheduleActions }}'
      OutputStaticImageOverlayScheduleActions: '{{ response.EncoderSettings.FeatureActivations.OutputStaticImageOverlayScheduleActions }}'
