version: '1.0'
provider: aws
service: medialive
services:
  client: medialive
  module: boto3.client
discovery:
- discovery_id: aws.medialive.describe_account_configuration
  calls:
  - action: describe_account_configuration
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      KmsKeyId: '{{ response.AccountConfiguration.KmsKeyId }}'
      AccountConfiguration: '{{ response.AccountConfiguration.AccountConfiguration }}'
- discovery_id: aws.medialive.list_channels
  calls:
  - action: list_channels
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Channels }}'
    item:
      Arn: '{{ item.Arn }}'
      Id: '{{ item.Id }}'
      Name: '{{ item.Name }}'
      RoleArn: '{{ item.RoleArn }}'
      State: '{{ item.State }}'
      Tags: '{{ item.Tags }}'
      ActionName: '{{ item.ActionName }}'
      AnywhereSettings: '{{ item.AnywhereSettings }}'
      CdiInputSpecification: '{{ item.CdiInputSpecification }}'
      ChannelClass: '{{ item.ChannelClass }}'
      ChannelEngineVersion: '{{ item.ChannelEngineVersion }}'
      Destinations: '{{ item.Destinations }}'
      EgressEndpoints: '{{ item.EgressEndpoints }}'
      InputAttachments: '{{ item.InputAttachments }}'
      InputSpecification: '{{ item.InputSpecification }}'
      LogLevel: '{{ item.LogLevel }}'
      LogicalInterfaceNames: '{{ item.LogicalInterfaceNames }}'
      Maintenance: '{{ item.Maintenance }}'
      MediaPackageSettings: '{{ item.MediaPackageSettings }}'
      PipelinesRunningCount: '{{ item.PipelinesRunningCount }}'
      Settings: '{{ item.Settings }}'
      UsedChannelEngineVersions: '{{ item.UsedChannelEngineVersions }}'
      Vpc: '{{ item.Vpc }}'
- discovery_id: aws.medialive.list_cloud_watch_alarm_template_groups
  calls:
  - action: list_cloud_watch_alarm_template_groups
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.CloudWatchAlarmTemplateGroups }}'
    item:
      Arn: '{{ item.Arn }}'
      Id: '{{ item.Id }}'
      Name: '{{ item.Name }}'
      Tags: '{{ item.Tags }}'
      CreatedAt: '{{ item.CreatedAt }}'
      Description: '{{ item.Description }}'
      ModifiedAt: '{{ item.ModifiedAt }}'
      TemplateCount: '{{ item.TemplateCount }}'
- discovery_id: aws.medialive.list_cloud_watch_alarm_templates
