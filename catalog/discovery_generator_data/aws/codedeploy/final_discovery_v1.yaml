# ==========================================================
# Discovery YAML — codedeploy (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 5 | ops: 1 independent, 0 dependent
# ==========================================================
version: '1.0'
provider: aws
service: codedeploy

services:
  client: codedeploy
  module: "boto3.client('codedeploy')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: tags_for_resource
    identifier_op: aws.codedeploy.list_tags_for_resource
    identifier_field: Key
    item_var_path: item.Key
    identifier_template: '{key}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.codedeploy.list_tags_for_resource  ──
  - discovery_id: aws.codedeploy.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Tags }}'
      item:
        Key: '{{ item.Key }}'
        Value: '{{ item.Value }}'
        autoRollbackConfiguration.enabled: '{{ item.autoRollbackConfiguration.enabled }}'
        item: '{{ item }}'
        outdatedInstancesStrategy: '{{ item.outdatedInstancesStrategy }}'

