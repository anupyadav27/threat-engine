version: '1.0'
provider: aws
service: inspector-scan
services:
  client: inspector-scan
  module: boto3.client
discovery:
  # ── Dependent read operations (require identifiers) ──
  # ── ScanSbom ──
  - discovery_id: aws.inspector-scan.scan_sbom
    calls:
      - action: scan_sbom
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        sbom: '{{ response.sbom }}'
