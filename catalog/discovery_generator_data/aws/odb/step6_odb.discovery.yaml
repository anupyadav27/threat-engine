version: '1.0'
provider: aws
service: odb
services:
  client: odb
  module: boto3.client
discovery:
- discovery_id: aws.odb.get_oci_onboarding_status
  calls:
  - action: get_oci_onboarding_status
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      accountSetupCloudFormationUrl: '{{ response.ociIdentityDomain.accountSetupCloudFormationUrl
        }}'
      existingTenancyActivationLink: '{{ response.ociIdentityDomain.existingTenancyActivationLink
        }}'
      newTenancyActivationLink: '{{ response.ociIdentityDomain.newTenancyActivationLink
        }}'
      ociIdentityDomain: '{{ response.ociIdentityDomain.ociIdentityDomain }}'
