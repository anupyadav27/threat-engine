      RegistrationVersionStatus: '{{ item.RegistrationVersionStatus }}'
      RegistrationVersionStatusHistory: '{{ item.RegistrationVersionStatusHistory }}'
      VersionNumber: '{{ item.VersionNumber }}'
      RegistrationArn: '{{ response.RegistrationArn }}'
      RegistrationId: '{{ response.RegistrationId }}'
- discovery_id: aws.pinpoint-sms-voice-v2.get_protect_configuration_country_rule_set
  for_each: aws.pinpoint-sms-voice-v2.describe_configuration_sets
