    params:
      RegistrationId: '{{ item.RegistrationId }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.RegistrationFieldValues }}'
    item:
      DeniedReason: '{{ item.DeniedReason }}'
      FieldPath: '{{ item.FieldPath }}'
      RegistrationAttachmentId: '{{ item.RegistrationAttachmentId }}'
      SelectChoices: '{{ item.SelectChoices }}'
      TextValue: '{{ item.TextValue }}'
      RegistrationArn: '{{ response.RegistrationArn }}'
      RegistrationId: '{{ response.RegistrationId }}'
      VersionNumber: '{{ response.VersionNumber }}'
- discovery_id: aws.pinpoint-sms-voice-v2.describe_registration_section_definitions
  for_each: aws.pinpoint-sms-voice-v2.describe_registration_type_definitions
