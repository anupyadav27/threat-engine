# ==========================================================
# Discovery YAML — ses (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 11 | ops: 3 independent, 0 dependent
# ==========================================================
version: '1.0'
provider: aws
service: ses

services:
  client: ses
  module: "boto3.client('ses')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: active_receipt_rule_set
    identifier_op: aws.ses.describe_active_receipt_rule_set
    identifier_field: Name
    item_var_path: item.Name
    identifier_template: '{name}'
  - resource_type: configuration_set
    identifier_op: aws.ses.list_configuration_sets
    identifier_field: Name
    item_var_path: item.Name
    identifier_template: '{name}'
  - resource_type: identity_policie
    identifier_op: aws.ses.list_identity_policies
    identifier_field: Policies
    item_var_path: item.Policies
    identifier_template: '{policies}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.ses.describe_active_receipt_rule_set  ──
  - discovery_id: aws.ses.describe_active_receipt_rule_set
    calls:
      - action: describe_active_receipt_rule_set
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Rules }}'
      item:
        Actions: '{{ item.Actions }}'
        Actions.SNSAction: '{{ item.Actions.SNSAction }}'
        Enabled: '{{ item.Enabled }}'
        Metadata: '{{ item.Metadata }}'
        Name: '{{ item.Name }}'
        Recipients: '{{ item.Recipients }}'
        Rules: '{{ item.Rules }}'
        ScanEnabled: '{{ item.ScanEnabled }}'
        Statement: '{{ item.Statement }}'
        TlsPolicy: '{{ item.TlsPolicy }}'
        Version: '{{ item.Version }}'
        item: '{{ item }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.ses.list_configuration_sets  ──
  - discovery_id: aws.ses.list_configuration_sets
    calls:
      - action: list_configuration_sets
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ConfigurationSets }}'
      item:
        Name: '{{ item.Name }}'
        Status: '{{ item.Status }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.ses.list_identity_policies  ──
  - discovery_id: aws.ses.list_identity_policies
    calls:
      - action: list_identity_policies
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.PolicyNames }}'
      item:
        Policies: '{{ item.Policies }}'

