version: '1.0'
provider: aws
service: networkfirewall
services:
  client: networkfirewall
  module: boto3.client
discovery:
- discovery_id: aws.networkfirewall.describe_firewall
  calls:
  - action: describe_firewall
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      Tags: '{{ response.Tags }}'
      VpcId: '{{ response.VpcId }}'
      Age: '{{ response.Age }}'
      AvailabilityZone: '{{ response.AvailabilityZone }}'
      AvailabilityZoneChangeProtection: '{{ response.AvailabilityZoneChangeProtection
        }}'
      AvailabilityZoneMappings: '{{ response.AvailabilityZoneMappings }}'
      ByteCount: '{{ response.ByteCount }}'
      DeleteProtection: '{{ response.DeleteProtection }}'
      Description: '{{ response.Description }}'
      DestinationAddress: '{{ response.DestinationAddress }}'
      DestinationPort: '{{ response.DestinationPort }}'
      EnabledAnalysisTypes: '{{ response.EnabledAnalysisTypes }}'
      EncryptionConfiguration: '{{ response.EncryptionConfiguration }}'
      Firewall: '{{ response.Firewall }}'
      FirewallArn: '{{ response.FirewallArn }}'
      FirewallId: '{{ response.FirewallId }}'
      FirewallName: '{{ response.FirewallName }}'
      FirewallPolicyArn: '{{ response.FirewallPolicyArn }}'
      FirewallPolicyChangeProtection: '{{ response.FirewallPolicyChangeProtection
        }}'
      FirewallStatus: '{{ response.FirewallStatus }}'
      FlowFilters: '{{ response.FlowFilters }}'
      FlowOperation: '{{ response.FlowOperation }}'
      FlowRequestTimestamp: '{{ response.FlowRequestTimestamp }}'
      MinimumFlowAgeInSeconds: '{{ response.MinimumFlowAgeInSeconds }}'
      NumberOfAssociations: '{{ response.NumberOfAssociations }}'
      PacketCount: '{{ response.PacketCount }}'
      SourceAddress: '{{ response.SourceAddress }}'
      SourcePort: '{{ response.SourcePort }}'
      StatusMessage: '{{ response.StatusMessage }}'
      SubnetChangeProtection: '{{ response.SubnetChangeProtection }}'
      SubnetMappings: '{{ response.SubnetMappings }}'
      TransitGatewayId: '{{ response.TransitGatewayId }}'
      TransitGatewayOwnerAccountId: '{{ response.TransitGatewayOwnerAccountId }}'
      UpdateToken: '{{ response.UpdateToken }}'
      VpcEndpointId: '{{ response.VpcEndpointId }}'
      SyncStates: '{{ response.FirewallStatus.SyncStates }}'
      RuleGroups: '{{ response.FirewallStatus.PolicyAndRuleGroupStatus }}'
- discovery_id: aws.networkfirewall.describe_firewall_policy
  calls:
  - action: describe_firewall_policy
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      LastModifiedTime: '{{ response.LastModifiedTime }}'
      Tags: '{{ response.Tags }}'
      ConsumedStatefulRuleCapacity: '{{ response.ConsumedStatefulRuleCapacity }}'
      ConsumedStatelessRuleCapacity: '{{ response.ConsumedStatelessRuleCapacity }}'
      Description: '{{ response.Description }}'
      EncryptionConfiguration: '{{ response.EncryptionConfiguration }}'
      FirewallPolicy: '{{ response.FirewallPolicy }}'
      FirewallPolicyArn: '{{ response.FirewallPolicyArn }}'
      FirewallPolicyId: '{{ response.FirewallPolicyId }}'
      FirewallPolicyName: '{{ response.FirewallPolicyName }}'
      FirewallPolicyResponse: '{{ response.FirewallPolicyResponse }}'
      FirewallPolicyStatus: '{{ response.FirewallPolicyStatus }}'
      NumberOfAssociations: '{{ response.NumberOfAssociations }}'
      StatelessRuleGroupReferences: '{{ response.FirewallPolicy.StatelessRuleGroupReferences }}'
      StatefulRuleGroupReferences: '{{ response.FirewallPolicy.StatefulRuleGroupReferences }}'
      RuleGroups: '{{ response.FirewallPolicy }}'
      StatelessDefaultActions: '{{ response.FirewallPolicy.StatelessDefaultActions }}'
      StatelessFragmentDefaultActions: '{{ response.FirewallPolicy.StatelessFragmentDefaultActions }}'
- discovery_id: aws.networkfirewall.describe_logging_configuration
  calls:
  - action: describe_logging_configuration
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      EnableMonitoringDashboard: '{{ response.EnableMonitoringDashboard }}'
      LogDestinationConfigs: '{{ response.LogDestinationConfigs }}'
      LoggingConfiguration: '{{ response.LoggingConfiguration }}'
- discovery_id: aws.networkfirewall.describe_rule_group
  calls:
  - action: describe_rule_group
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      ReferenceSets: '{{ response.ReferenceSets }}'
      RuleGroup: '{{ response.RuleGroup }}'
      RuleGroupResponse: '{{ response.RuleGroupResponse }}'
      RuleVariables: '{{ response.RuleVariables }}'
      RulesSource: '{{ response.RulesSource }}'
      StatefulRuleOptions: '{{ response.StatefulRuleOptions }}'
      StatelessRulesAndCustomActions: '{{ response.RuleGroup.RulesSource.StatelessRulesAndCustomActions }}'
      StatelessRuleGroupReferences: '{{ response.RuleGroupResponse.StatelessRuleGroupReferences }}'
