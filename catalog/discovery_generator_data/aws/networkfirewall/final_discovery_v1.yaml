  - discovery_id: aws.networkfirewall.list_firewall_policies
    calls:
      - action: list_firewall_policies
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        item: '{{ item }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.networkfirewall.list_firewalls  ──
  - discovery_id: aws.networkfirewall.list_firewalls
    calls:
      - action: list_firewalls
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
