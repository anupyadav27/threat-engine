        TransitGatewayAttachmentId: '{{ item.TransitGatewayAttachmentId }}'
        item: '{{ item }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.networkfirewall.list_rule_groups  ──
  - discovery_id: aws.networkfirewall.list_rule_groups
    calls:
      - action: list_rule_groups
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        Arn: '{{ item.Arn }}'
        Name: '{{ item.Name }}'
        VendorName: '{{ item.VendorName }}'
        item: '{{ item }}'

