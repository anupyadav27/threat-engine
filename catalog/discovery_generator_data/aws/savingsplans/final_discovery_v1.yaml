# ==========================================================
# Discovery YAML — savingsplans (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 3 | ops: 1 independent, 0 dependent
# ==========================================================
version: '1.0'
provider: aws
service: savingsplans

services:
  client: savingsplans
  module: "boto3.client('savingsplans')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: plan
    identifier_op: aws.savingsplans.describe_savings_plans
    identifier_field: savingsPlanArn
    item_var_path: item.savingsPlanArn
    identifier_template: '{savingsplanarn}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.savingsplans.describe_savings_plans  ──
  - discovery_id: aws.savingsplans.describe_savings_plans
    calls:
      - action: describe_savings_plans
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.savingsPlans }}'
      item:
        commitment: '{{ item.commitment }}'
        currency: '{{ item.currency }}'
        description: '{{ item.description }}'
        ec2InstanceFamily: '{{ item.ec2InstanceFamily }}'
        end: '{{ item.end }}'
        offeringId: '{{ item.offeringId }}'
        paymentOption: '{{ item.paymentOption }}'
        productTypes: '{{ item.productTypes }}'
        recurringPaymentAmount: '{{ item.recurringPaymentAmount }}'
        region: '{{ item.region }}'
        returnableUntil: '{{ item.returnableUntil }}'
        savingsPlanArn: '{{ item.savingsPlanArn }}'
        savingsPlanId: '{{ item.savingsPlanId }}'
        savingsPlanType: '{{ item.savingsPlanType }}'
        savingsPlans: '{{ item.savingsPlans }}'
        start: '{{ item.start }}'
        state: '{{ item.state }}'
        tags: '{{ item.tags }}'
        termDurationInSeconds: '{{ item.termDurationInSeconds }}'
        upfrontPaymentAmount: '{{ item.upfrontPaymentAmount }}'

