# ==========================================================
# Discovery YAML — eip (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 1 | ops: 1 independent, 0 dependent
# ==========================================================
version: '1.0'
provider: aws
service: eip

services:
  client: eip
  module: "boto3.client('eip')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: address
    identifier_op: aws.eip.describe_addresses
    identifier_field: AllocationId
    item_var_path: item.AllocationId
    identifier_template: '{allocationid}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.eip.describe_addresses  ──
  - discovery_id: aws.eip.describe_addresses
    calls:
      - action: describe_addresses
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        Addresses: '{{ item.Addresses }}'
        AllocationId: '{{ item.AllocationId }}'
        AssociatePublicIpAddress: '{{ item.AssociatePublicIpAddress }}'
        AssociationId: '{{ item.AssociationId }}'
        CarrierIp: '{{ item.CarrierIp }}'
        CustomerOwnedIp: '{{ item.CustomerOwnedIp }}'
        CustomerOwnedIpv4Pool: '{{ item.CustomerOwnedIpv4Pool }}'
        Domain: '{{ item.Domain }}'
        InstanceId: '{{ item.InstanceId }}'
        NetworkBorderGroup: '{{ item.NetworkBorderGroup }}'
        NetworkInterfaceOwnerId: '{{ item.NetworkInterfaceOwnerId }}'
        PrivateIpAddress: '{{ item.PrivateIpAddress }}'
        PublicIp: '{{ item.PublicIp }}'
        PublicIpv4Pool: '{{ item.PublicIpv4Pool }}'
        ServiceManaged: '{{ item.ServiceManaged }}'
        Tags: '{{ item.Tags }}'

