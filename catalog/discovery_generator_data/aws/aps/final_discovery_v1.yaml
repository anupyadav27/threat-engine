version: '1.0'
provider: aws
service: aps

services:
  client: aps
  module: "boto3.client('aps')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  []

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.aps.list_rule_groups_namespaces  ──
  - discovery_id: aws.aps.list_rule_groups_namespaces
    calls:
      - action: list_rule_groups_namespaces
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        Tags: '{{ item.Tags }}'

