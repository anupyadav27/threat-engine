version: '1.0'
provider: aws
service: dsql
services:
  client: dsql
  module: boto3.client
discovery:
- discovery_id: aws.dsql.list_clusters
  calls:
  - action: list_clusters
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.clusters }}'
    item:
      arn: '{{ item.arn }}'
      identifier: '{{ item.identifier }}'
- discovery_id: aws.dsql.get_cluster
  for_each: aws.dsql.list_clusters
  calls:
  - action: get_cluster
    params:
      identifier: '{{ item.identifier }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      clusters: '{{ response.multiRegionProperties.clusters }}'
      status: '{{ response.multiRegionProperties.status }}'
      witnessRegion: '{{ response.multiRegionProperties.witnessRegion }}'
- discovery_id: aws.dsql.get_cluster_policy
  for_each: aws.dsql.list_clusters
  calls:
  - action: get_cluster_policy
    params:
      identifier: '{{ item.identifier }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      policy: '{{ response.policy }}'
- discovery_id: aws.dsql.get_vpc_endpoint_service_name
  calls:
  - action: get_vpc_endpoint_service_name
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      clusterVpcEndpoint: '{{ response.clusterVpcEndpoint }}'
      serviceName: '{{ response.serviceName }}'
- discovery_id: aws.dsql.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      tags: '{{ response.tags }}'
