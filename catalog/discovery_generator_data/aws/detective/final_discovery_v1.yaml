# ==========================================================
# Discovery YAML — detective (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 4 | ops: 1 independent, 1 dependent
# ==========================================================
version: '1.0'
provider: aws
service: detective

services:
  client: detective
  module: "boto3.client('detective')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: graph
    identifier_op: aws.detective.list_graphs
    identifier_field: Arn
    item_var_path: item.Arn
    identifier_template: '{arn}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.detective.list_graphs  ──
  - discovery_id: aws.detective.list_graphs
    calls:
      - action: list_graphs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.GraphList }}'
      item:
        Arn: '{{ item.Arn }}'
        AutoEnable: '{{ item.AutoEnable }}'
        CreatedTime: '{{ item.CreatedTime }}'
        GraphList: '{{ item.GraphList }}'
        GraphList.Arn: '{{ item.GraphList.Arn }}'
        MemberDetails: '{{ item.MemberDetails }}'
        ScopeEndTime: '{{ item.ScopeEndTime }}'
        ScopeStartTime: '{{ item.ScopeStartTime }}'

  # ════ DEPENDENT (enrich) operations ════
  # ── aws.detective.list_members [dependent] ──
  - discovery_id: aws.detective.list_members
    for_each: aws.detective.list_invitations
    calls:
      - action: list_members
        params:
          GraphArn: "{{ item.GraphArn }}"
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.MemberDetails }}'
      item:
        AccountId: '{{ item.AccountId }}'
        AdministratorId: '{{ item.AdministratorId }}'
        DatasourcePackageIngestStates: '{{ item.DatasourcePackageIngestStates }}'
        DisabledReason: '{{ item.DisabledReason }}'
        EmailAddress: '{{ item.EmailAddress }}'
        GraphArn: '{{ item.GraphArn }}'
        InvitationType: '{{ item.InvitationType }}'
        InvitedTime: '{{ item.InvitedTime }}'
        MasterId: '{{ item.MasterId }}'
        MemberDetails: '{{ item.MemberDetails }}'
        MemberDetails.DatasourcePackageIngestStates: '{{ item.MemberDetails.DatasourcePackageIngestStates }}'
        PercentOfGraphUtilization: '{{ item.PercentOfGraphUtilization }}'
        PercentOfGraphUtilizationUpdatedTime: '{{ item.PercentOfGraphUtilizationUpdatedTime }}'
        Status: '{{ item.Status }}'
        UpdatedTime: '{{ item.UpdatedTime }}'
        VolumeUsageByDatasourcePackage: '{{ item.VolumeUsageByDatasourcePackage }}'
        VolumeUsageInBytes: '{{ item.VolumeUsageInBytes }}'
        VolumeUsageUpdatedTime: '{{ item.VolumeUsageUpdatedTime }}'

