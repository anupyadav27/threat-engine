# ==========================================================
# Discovery YAML — cassandra (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 1 | ops: 1 independent, 0 dependent
# ==========================================================
version: '1.0'
provider: aws
service: cassandra

services:
  client: cassandra
  module: "boto3.client('cassandra')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  []

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.cassandra.list_keyspaces  ──
  - discovery_id: aws.cassandra.list_keyspaces
    calls:
      - action: list_keyspaces
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        Tags: '{{ item.Tags }}'

