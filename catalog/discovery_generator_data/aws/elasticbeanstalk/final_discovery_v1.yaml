# ==========================================================
# Discovery YAML — elasticbeanstalk (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 15 | ops: 2 independent, 1 dependent
# ==========================================================
version: '1.0'
provider: aws
service: elasticbeanstalk

services:
  client: elasticbeanstalk
  module: "boto3.client('elasticbeanstalk')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: build
    identifier_op: aws.elasticbeanstalk.describe_application_versions
    identifier_field: ApplicationVersionArn
    item_var_path: item.ApplicationVersionArn
    identifier_template: '{applicationversionarn}'
  - resource_type: application
    identifier_op: aws.elasticbeanstalk.describe_applications
    identifier_field: ApplicationArn
    item_var_path: item.ApplicationArn
    identifier_template: '{applicationarn}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.elasticbeanstalk.describe_application_versions  ──
  - discovery_id: aws.elasticbeanstalk.describe_application_versions
    calls:
      - action: describe_application_versions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ApplicationVersions }}'
      item:
        ApplicationName: '{{ item.ApplicationName }}'
        ApplicationVersionArn: '{{ item.ApplicationVersionArn }}'
        ApplicationVersions: '{{ item.ApplicationVersions }}'
        BuildArn: '{{ item.BuildArn }}'
        DateCreated: '{{ item.DateCreated }}'
        DateUpdated: '{{ item.DateUpdated }}'
        Description: '{{ item.Description }}'
        SourceBuildInformation: '{{ item.SourceBuildInformation }}'
        SourceBundle: '{{ item.SourceBundle }}'
        Status: '{{ item.Status }}'
        VersionLabel: '{{ item.VersionLabel }}'
        Versions: '{{ item.Versions }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.elasticbeanstalk.describe_applications  ──
  - discovery_id: aws.elasticbeanstalk.describe_applications
    calls:
      - action: describe_applications
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Applications }}'
      item:
        ApplicationArn: '{{ item.ApplicationArn }}'
        ApplicationName: '{{ item.ApplicationName }}'
        Applications: '{{ item.Applications }}'
        ConfigurationTemplates: '{{ item.ConfigurationTemplates }}'
        DateCreated: '{{ item.DateCreated }}'
        DateUpdated: '{{ item.DateUpdated }}'
        Description: '{{ item.Description }}'
        ResourceLifecycleConfig: '{{ item.ResourceLifecycleConfig }}'
        description: '{{ item.description }}'
        item: '{{ item }}'

  # ════ DEPENDENT (enrich) operations ════
  # ── aws.elasticbeanstalk.describe_configuration_settings_for_environment [dependent] ──
  - discovery_id: aws.elasticbeanstalk.describe_configuration_settings_for_environment
    for_each: aws.elasticbeanstalk.describe_environments
    calls:
      - action: describe_configuration_settings
        params:
          ApplicationName: "{{ item.ApplicationName }}"
          EnvironmentName: "{{ item.EnvironmentName }}"
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ConfigurationSettings }}'
      item:
        ApplicationName: '{{ item.ApplicationName }}'
        DateCreated: '{{ item.DateCreated }}'
        DateUpdated: '{{ item.DateUpdated }}'
        DeploymentStatus: '{{ item.DeploymentStatus }}'
        EnvironmentName: '{{ item.EnvironmentName }}'
        OptionSettings: '{{ item.OptionSettings }}'
        OptionSettings[]: '{{ item.OptionSettings[].Namespace }}'
        OptionSettings[].Namespace: '{{ item.OptionSettings[].Namespace }}'
        PlatformArn: '{{ item.PlatformArn }}'
        SolutionStackName: '{{ item.SolutionStackName }}'

