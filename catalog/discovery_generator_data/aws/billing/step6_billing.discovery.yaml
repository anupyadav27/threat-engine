version: '1.0'
provider: aws
service: billing
services:
  client: billing
  module: boto3.client
discovery:
- discovery_id: aws.billing.list_billing_views
  calls:
  - action: list_billing_views
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.billingViews }}'
    item:
      arn: '{{ item.arn }}'
      billingView: '{{ item.billingView }}'
      billingViewType: '{{ item.billingViewType }}'
      createdAt: '{{ item.createdAt }}'
      dataFilterExpression: '{{ item.dataFilterExpression }}'
      derivedViewCount: '{{ item.derivedViewCount }}'
      description: '{{ item.description }}'
      healthStatus: '{{ item.healthStatus }}'
      name: '{{ item.name }}'
      ownerAccountId: '{{ item.ownerAccountId }}'
      sourceAccountId: '{{ item.sourceAccountId }}'
      sourceViewCount: '{{ item.sourceViewCount }}'
      updatedAt: '{{ item.updatedAt }}'
      viewDefinitionLastUpdatedAt: '{{ item.viewDefinitionLastUpdatedAt }}'
- discovery_id: aws.billing.get_billing_view
  for_each: aws.billing.list_billing_views
  calls:
  - action: get_billing_view
    params:
      arn: '{{ item.arn }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      arn: '{{ response.billingView.arn }}'
      billingView: '{{ response.billingView.billingView }}'
      billingViewType: '{{ response.billingView.billingViewType }}'
      createdAt: '{{ response.billingView.createdAt }}'
      dataFilterExpression: '{{ response.billingView.dataFilterExpression }}'
      derivedViewCount: '{{ response.billingView.derivedViewCount }}'
      description: '{{ response.billingView.description }}'
      healthStatus: '{{ response.billingView.healthStatus }}'
      name: '{{ response.billingView.name }}'
      ownerAccountId: '{{ response.billingView.ownerAccountId }}'
      sourceAccountId: '{{ response.billingView.sourceAccountId }}'
      sourceViewCount: '{{ response.billingView.sourceViewCount }}'
      updatedAt: '{{ response.billingView.updatedAt }}'
      viewDefinitionLastUpdatedAt: '{{ response.billingView.viewDefinitionLastUpdatedAt
        }}'
- discovery_id: aws.billing.get_resource_policy
  calls:
  - action: get_resource_policy
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      Statement: '{{ response.Statement }}'
      Version: '{{ response.Version }}'
- discovery_id: aws.billing.list_source_views_for_billing_view
  calls:
  - action: list_source_views_for_billing_view
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.sourceViews }}'
- discovery_id: aws.billing.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.resourceTags }}'
    item:
      key: '{{ item.key }}'
      value: '{{ item.value }}'
