version: '1.0'
provider: aws
service: simspaceweaver
services:
  client: simspaceweaver
  module: boto3.client
discovery:
- discovery_id: aws.simspaceweaver.list_simulations
  calls:
  - action: list_simulations
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Simulations }}'
    item:
      Arn: '{{ item.Arn }}'
      CreationTime: '{{ item.CreationTime }}'
      Name: '{{ item.Name }}'
      Status: '{{ item.Status }}'
      TargetStatus: '{{ item.TargetStatus }}'
- discovery_id: aws.simspaceweaver.describe_app
  calls:
  - action: describe_app
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      Address: '{{ response.EndpointInfo.Address }}'
      Description: '{{ response.EndpointInfo.Description }}'
      IngressPortMappings: '{{ response.EndpointInfo.IngressPortMappings }}'
- discovery_id: aws.simspaceweaver.describe_simulation
  calls:
  - action: describe_simulation
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      Clocks: '{{ response.LiveSimulationState.Clocks }}'
      Domains: '{{ response.LiveSimulationState.Domains }}'
      Enabled: '{{ response.LiveSimulationState.Enabled }}'
- discovery_id: aws.simspaceweaver.list_apps
  calls:
  - action: list_apps
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Apps }}'
    item:
      Name: '{{ item.Name }}'
      Status: '{{ item.Status }}'
      Description: '{{ item.Description }}'
      Domain: '{{ item.Domain }}'
      Simulation: '{{ item.Simulation }}'
      TargetStatus: '{{ item.TargetStatus }}'
- discovery_id: aws.simspaceweaver.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      Tags: '{{ response.Tags }}'
