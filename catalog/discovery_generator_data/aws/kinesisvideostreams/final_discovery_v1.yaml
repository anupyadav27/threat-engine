# ==========================================================
# Discovery YAML — kinesisvideostreams (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 3 | ops: 1 independent, 0 dependent
# ==========================================================
version: '1.0'
provider: aws
service: kinesisvideostreams

services:
  client: kinesisvideostreams
  module: "boto3.client('kinesisvideostreams')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: stream
    identifier_op: aws.kinesisvideostreams.describe_stream
    identifier_field: StreamARN
    item_var_path: item.StreamARN
    identifier_template: '{streamarn}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.kinesisvideostreams.describe_stream  ──
  - discovery_id: aws.kinesisvideostreams.describe_stream
    calls:
      - action: describe_stream
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        CreationTime: '{{ item.CreationTime }}'
        DataRetentionInHours: '{{ item.DataRetentionInHours }}'
        DeviceName: '{{ item.DeviceName }}'
        KmsKeyId: '{{ item.KmsKeyId }}'
        MediaType: '{{ item.MediaType }}'
        Status: '{{ item.Status }}'
        StreamARN: '{{ item.StreamARN }}'
        StreamName: '{{ item.StreamName }}'
        Version: '{{ item.Version }}'

