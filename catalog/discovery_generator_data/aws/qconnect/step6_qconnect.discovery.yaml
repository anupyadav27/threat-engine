    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      assistant: '{{ response.assistantAssociation.assistantId }}'
      assistantAssociation: '{{ response.assistantAssociation.assistantAssociationId }}'
      assistantAssociationArn: '{{ response.assistantAssociation.assistantAssociationArn }}'
      assistantAssociationId: '{{ response.assistantAssociation.assistantAssociationId }}'
