      urlExpiry: '{{ response.content.urlExpiry }}'
      contentArn: '{{ response.content.contentArn }}'
      contentId: '{{ response.content.contentId }}'
      contentType: '{{ response.content.contentType }}'
      knowledgeBaseArn: '{{ response.content.knowledgeBaseArn }}'
      knowledgeBaseId: '{{ response.content.knowledgeBaseId }}'
      metadata: '{{ response.content.metadata }}'
      name: '{{ response.content.name }}'
      revisionId: '{{ response.content.revisionId }}'
