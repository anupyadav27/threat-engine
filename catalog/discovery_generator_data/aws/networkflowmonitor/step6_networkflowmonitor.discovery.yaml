# ============================================================
# Discovery YAML — networkflowmonitor (AWS)
# Generated: 2026-02-21T04:56:59Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: networkflowmonitor
services:
  client: networkflowmonitor
  module: boto3.client
discovery:
  # ── ListMonitors ──
  - discovery_id: aws.networkflowmonitor.list_monitors
    calls:
      - action: list_monitors
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.monitors }}'
      item:
        createdAt: '{{ item.createdAt }}'
        identifier: '{{ item.identifier }}'
        localResources: '{{ item.localResources }}'
        modifiedAt: '{{ item.modifiedAt }}'
        monitorArn: '{{ item.monitorArn }}'
        monitorName: '{{ item.monitorName }}'
        monitorStatus: '{{ item.monitorStatus }}'
        remoteResources: '{{ item.remoteResources }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
  # ── ListScopes ──
  - discovery_id: aws.networkflowmonitor.list_scopes
    calls:
      - action: list_scopes
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.scopes }}'
      item:
        region: '{{ item.region }}'
        scopeArn: '{{ item.scopeArn }}'
        scopeId: '{{ item.scopeId }}'
        status: '{{ item.status }}'
        targets: '{{ item.targets }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetMonitor ──
  - discovery_id: aws.networkflowmonitor.get_monitor
    for_each: aws.networkflowmonitor.list_monitors
    calls:
      - action: get_monitor
        params:
          monitorName: '{{ item.monitorName }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.localResources }}'
      item:
        createdAt: '{{ item.createdAt }}'
        identifier: '{{ item.identifier }}'
        localResources: '{{ item.localResources }}'
        modifiedAt: '{{ item.modifiedAt }}'
        remoteResources: '{{ item.remoteResources }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
  # ── GetQueryResultsMonitorTopContributors ──
  - discovery_id: aws.networkflowmonitor.get_query_results_monitor_top_contributors
    for_each: aws.networkflowmonitor.list_monitors
    calls:
      - action: get_query_results_monitor_top_contributors
        params:
          monitorName: '{{ item.monitorName }}'
          queryId: '{{ item.queryId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.topContributors }}'
      item:
        destinationCategory: '{{ item.destinationCategory }}'
        dnatIp: '{{ item.dnatIp }}'
        kubernetesMetadata: '{{ item.kubernetesMetadata }}'
        localAz: '{{ item.localAz }}'
        localInstanceArn: '{{ item.localInstanceArn }}'
        localInstanceId: '{{ item.localInstanceId }}'
        localIp: '{{ item.localIp }}'
        localRegion: '{{ item.localRegion }}'
        localSubnetArn: '{{ item.localSubnetArn }}'
        localSubnetId: '{{ item.localSubnetId }}'
        localVpcArn: '{{ item.localVpcArn }}'
        localVpcId: '{{ item.localVpcId }}'
        remoteAz: '{{ item.remoteAz }}'
        remoteInstanceArn: '{{ item.remoteInstanceArn }}'
        remoteInstanceId: '{{ item.remoteInstanceId }}'
        remoteIp: '{{ item.remoteIp }}'
        remoteRegion: '{{ item.remoteRegion }}'
        remoteSubnetArn: '{{ item.remoteSubnetArn }}'
        remoteSubnetId: '{{ item.remoteSubnetId }}'
        remoteVpcArn: '{{ item.remoteVpcArn }}'
        remoteVpcId: '{{ item.remoteVpcId }}'
        snatIp: '{{ item.snatIp }}'
        targetPort: '{{ item.targetPort }}'
        traversedConstructs: '{{ item.traversedConstructs }}'
        unit: '{{ item.unit }}'
        value: '{{ item.value }}'
  # ── GetQueryResultsWorkloadInsightsTopContributors ──
  - discovery_id: aws.networkflowmonitor.get_query_results_workload_insights_top_contributors
    for_each: aws.networkflowmonitor.list_scopes
    calls:
      - action: get_query_results_workload_insights_top_contributors
        params:
          scopeId: '{{ item.scopeId }}'
          queryId: '{{ item.queryId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.topContributors }}'
      item:
        accountId: '{{ item.accountId }}'
        localAz: '{{ item.localAz }}'
        localRegion: '{{ item.localRegion }}'
        localSubnetArn: '{{ item.localSubnetArn }}'
        localSubnetId: '{{ item.localSubnetId }}'
        localVpcArn: '{{ item.localVpcArn }}'
        localVpcId: '{{ item.localVpcId }}'
        remoteIdentifier: '{{ item.remoteIdentifier }}'
        value: '{{ item.value }}'
  # ── GetQueryResultsWorkloadInsightsTopContributorsData ──
  - discovery_id: aws.networkflowmonitor.get_query_results_workload_insights_top_contributors_data
    for_each: aws.networkflowmonitor.list_scopes
    calls:
      - action: get_query_results_workload_insights_top_contributors_data
        params:
          scopeId: '{{ item.scopeId }}'
          queryId: '{{ item.queryId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.datapoints }}'
      item:
        datapoints: '{{ item.datapoints }}'
        label: '{{ item.label }}'
        timestamps: '{{ item.timestamps }}'
        values: '{{ item.values }}'
  # ── GetQueryStatusMonitorTopContributors ──
  - discovery_id: aws.networkflowmonitor.get_query_status_monitor_top_contributors
    for_each: aws.networkflowmonitor.list_monitors
    calls:
      - action: get_query_status_monitor_top_contributors
        params:
          monitorName: '{{ item.monitorName }}'
          queryId: '{{ item.queryId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        status: '{{ response.status }}'
  # ── GetQueryStatusWorkloadInsightsTopContributors ──
  - discovery_id: aws.networkflowmonitor.get_query_status_workload_insights_top_contributors
    for_each: aws.networkflowmonitor.list_scopes
    calls:
      - action: get_query_status_workload_insights_top_contributors
        params:
          scopeId: '{{ item.scopeId }}'
          queryId: '{{ item.queryId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        status: '{{ response.status }}'
  # ── GetQueryStatusWorkloadInsightsTopContributorsData ──
  - discovery_id: aws.networkflowmonitor.get_query_status_workload_insights_top_contributors_data
    for_each: aws.networkflowmonitor.list_scopes
    calls:
      - action: get_query_status_workload_insights_top_contributors_data
        params:
          scopeId: '{{ item.scopeId }}'
          queryId: '{{ item.queryId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        status: '{{ response.status }}'
  # ── GetScope ──
  - discovery_id: aws.networkflowmonitor.get_scope
    for_each: aws.networkflowmonitor.list_scopes
    calls:
      - action: get_scope
        params:
          scopeId: '{{ item.scopeId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.targets }}'
      item:
        region: '{{ item.region }}'
        targetIdentifier: '{{ item.targetIdentifier }}'
        targets: '{{ item.targets }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.networkflowmonitor.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        tags: '{{ response.tags }}'
