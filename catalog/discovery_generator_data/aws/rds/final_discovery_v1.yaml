version: '1.0'
provider: aws
service: rds

services:
  client: rds
  module: "boto3.client('rds')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: backups
    identifier_op: aws.rds.describe_db_cluster_automated_backups
    identifier_field: AwsBackupRecoveryPointArn
    item_var_path: item.AwsBackupRecoveryPointArn
    identifier_template: '{awsbackuprecoverypointarn}'
  - resource_type: cluster
    identifier_op: aws.rds.describe_db_clusters
    identifier_field: AwsBackupRecoveryPointArn
    item_var_path: item.AwsBackupRecoveryPointArn
    identifier_template: '{awsbackuprecoverypointarn}'
  - resource_type: backups
    identifier_op: aws.rds.describe_db_instance_automated_backups
    identifier_field: AwsBackupRecoveryPointArn
    item_var_path: item.AwsBackupRecoveryPointArn
    identifier_template: '{awsbackuprecoverypointarn}'
  - resource_type: credential
    identifier_op: aws.rds.describe_db_instances
    identifier_field: AwsBackupRecoveryPointArn
    item_var_path: item.AwsBackupRecoveryPointArn
    identifier_template: '{awsbackuprecoverypointarn}'
  - resource_type: group
    identifier_op: aws.rds.describe_db_parameter_groups
    identifier_field: DBParameterGroupArn
    item_var_path: item.DBParameterGroupArn
    identifier_template: '{dbparametergrouparn}'
  - resource_type: group
    identifier_op: aws.rds.describe_db_security_groups
    identifier_field: DBSecurityGroupArn
    item_var_path: item.DBSecurityGroupArn
    identifier_template: '{dbsecuritygrouparn}'
  - resource_type: snapshot
    identifier_op: aws.rds.describe_db_snapshots
    identifier_field: DBSnapshotArn
    item_var_path: item.DBSnapshotArn
    identifier_template: '{dbsnapshotarn}'
  - resource_type: group
    identifier_op: aws.rds.describe_db_subnet_groups
    identifier_field: DBSubnetGroupArn
    item_var_path: item.DBSubnetGroupArn
    identifier_template: '{dbsubnetgrouparn}'
  - resource_type: subscription
    identifier_op: aws.rds.describe_event_subscriptions
    identifier_field: EventSubscriptionArn
    item_var_path: item.EventSubscriptionArn
    identifier_template: '{eventsubscriptionarn}'
  - resource_type: group
    identifier_op: aws.rds.describe_option_groups
    identifier_field: OptionGroupArn
    item_var_path: item.OptionGroupArn
    identifier_template: '{optiongrouparn}'
  - resource_type: instance
    identifier_op: aws.rds.describe_reserved_db_instances
    identifier_field: ReservedDBInstanceArn
    item_var_path: item.ReservedDBInstanceArn
    identifier_template: '{reserveddbinstancearn}'

checks: []

