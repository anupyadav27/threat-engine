version: '1.0'
provider: aws
service: pipes
services:
  client: pipes
  module: boto3.client
discovery:
- discovery_id: aws.pipes.list_pipes
  calls:
  - action: list_pipes
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Pipes }}'
    item:
      Arn: '{{ item.Arn }}'
      CreationTime: '{{ item.CreationTime }}'
      LastModifiedTime: '{{ item.LastModifiedTime }}'
      Name: '{{ item.Name }}'
      CurrentState: '{{ item.CurrentState }}'
      Description: '{{ item.Description }}'
      DesiredState: '{{ item.DesiredState }}'
      Enrichment: '{{ item.Enrichment }}'
      Source: '{{ item.Source }}'
      StateReason: '{{ item.StateReason }}'
      Target: '{{ item.Target }}'
- discovery_id: aws.pipes.describe_pipe
  for_each: aws.pipes.list_pipes
  calls:
  - action: describe_pipe
    params:
      Name: '{{ item.Name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      Status: '{{ response.SourceParameters.Status }}'
      ActiveMQBrokerParameters: '{{ response.SourceParameters.ActiveMQBrokerParameters
        }}'
      Description: '{{ response.SourceParameters.Description }}'
      DynamoDBStreamParameters: '{{ response.SourceParameters.DynamoDBStreamParameters
        }}'
      Enabled: '{{ response.SourceParameters.Enabled }}'
      FilterCriteria: '{{ response.SourceParameters.FilterCriteria }}'
      KinesisStreamParameters: '{{ response.SourceParameters.KinesisStreamParameters
        }}'
      ManagedStreamingKafkaParameters: '{{ response.SourceParameters.ManagedStreamingKafkaParameters
        }}'
      RabbitMQBrokerParameters: '{{ response.SourceParameters.RabbitMQBrokerParameters
        }}'
      SelfManagedKafkaParameters: '{{ response.SourceParameters.SelfManagedKafkaParameters
        }}'
      SqsQueueParameters: '{{ response.SourceParameters.SqsQueueParameters }}'
- discovery_id: aws.pipes.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      tags: '{{ response.tags }}'
