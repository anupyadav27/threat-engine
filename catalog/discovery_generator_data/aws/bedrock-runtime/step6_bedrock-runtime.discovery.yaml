version: '1.0'
provider: aws
service: bedrock-runtime
services:
  client: bedrock-runtime
  module: boto3.client
discovery:
- discovery_id: aws.bedrock-runtime.list_async_invokes
  calls:
  - action: list_async_invokes
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.asyncInvokeSummaries }}'
    item:
      clientRequestToken: '{{ item.clientRequestToken }}'
      endTime: '{{ item.endTime }}'
      failureMessage: '{{ item.failureMessage }}'
      invocationArn: '{{ item.invocationArn }}'
      lastModifiedTime: '{{ item.lastModifiedTime }}'
      modelArn: '{{ item.modelArn }}'
      outputDataConfig: '{{ item.outputDataConfig }}'
      s3OutputDataConfig: '{{ item.s3OutputDataConfig }}'
      status: '{{ item.status }}'
      submitTime: '{{ item.submitTime }}'
      nextToken: '{{ response.nextToken }}'
- discovery_id: aws.bedrock-runtime.get_async_invoke
  for_each: aws.bedrock-runtime.list_async_invokes
  calls:
  - action: get_async_invoke
    params:
      invocationArn: '{{ item.invocationArn }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      s3OutputDataConfig: '{{ response.outputDataConfig.s3OutputDataConfig.s3Uri }}'
      clientRequestToken: '{{ response.clientRequestToken }}'
      endTime: '{{ response.endTime }}'
      failureMessage: '{{ response.failureMessage }}'
      invocationArn: '{{ response.invocationArn }}'
      lastModifiedTime: '{{ response.lastModifiedTime }}'
      modelArn: '{{ response.modelArn }}'
      bucketOwner: '{{ response.outputDataConfig.s3OutputDataConfig.bucketOwner }}'
      kmsKeyId: '{{ response.outputDataConfig.s3OutputDataConfig.kmsKeyId }}'
      s3Uri: '{{ response.outputDataConfig.s3OutputDataConfig.s3Uri }}'
      status: '{{ response.status }}'
      submitTime: '{{ response.submitTime }}'
