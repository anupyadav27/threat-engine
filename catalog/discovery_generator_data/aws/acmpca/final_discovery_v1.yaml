# ==========================================================
# Discovery YAML — acmpca (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 1 | ops: 0 independent, 1 dependent
# ==========================================================
version: '1.0'
provider: aws
service: acmpca

services:
  client: acmpca
  module: "boto3.client('acmpca')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  []

checks: []

discovery:

  # ════ DEPENDENT (enrich) operations ════
  # ── aws.acmpca.list_tags [dependent] ──
  - discovery_id: aws.acmpca.list_tags
    for_each: aws.acmpca.list_certificate_authorities
    calls:
      - action: list_tags
        params:
          CertificateAuthorityArn: "{{ item.Arn }}"
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response }}'
      item:
        Tags: '{{ item.Tags }}'

