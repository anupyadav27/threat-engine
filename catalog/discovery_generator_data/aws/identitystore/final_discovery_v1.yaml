# ==========================================================
# Discovery YAML — identitystore (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 9 | ops: 2 independent, 0 dependent
# ==========================================================
version: '1.0'
provider: aws
service: identitystore

services:
  client: identitystore
  module: "boto3.client('identitystore')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: group
    identifier_op: aws.identitystore.list_groups
    identifier_field: GroupId
    item_var_path: item.GroupId
    identifier_template: '{groupid}'
  - resource_type: user
    identifier_op: aws.identitystore.list_users
    identifier_field: IdentityStoreId
    item_var_path: item.IdentityStoreId
    identifier_template: '{identitystoreid}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.identitystore.list_groups  ──
  - discovery_id: aws.identitystore.list_groups
    calls:
      - action: list_groups
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Groups }}'
      item:
        CreatedAt: '{{ item.CreatedAt }}'
        CreatedBy: '{{ item.CreatedBy }}'
        Description: '{{ item.Description }}'
        DisplayName: '{{ item.DisplayName }}'
        ExternalIds: '{{ item.ExternalIds }}'
        GroupId: '{{ item.GroupId }}'
        IdentityStoreId: '{{ item.IdentityStoreId }}'
        UpdatedAt: '{{ item.UpdatedAt }}'
        UpdatedBy: '{{ item.UpdatedBy }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.identitystore.list_users  ──
  - discovery_id: aws.identitystore.list_users
    calls:
      - action: list_users
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Users }}'
      item:
        Addresses: '{{ item.Addresses }}'
        Birthdate: '{{ item.Birthdate }}'
        CreatedAt: '{{ item.CreatedAt }}'
        CreatedBy: '{{ item.CreatedBy }}'
        DisplayName: '{{ item.DisplayName }}'
        Emails: '{{ item.Emails }}'
        ExternalIds: '{{ item.ExternalIds }}'
        IdentityStoreId: '{{ item.IdentityStoreId }}'
        Locale: '{{ item.Locale }}'
        Name: '{{ item.Name }}'
        NickName: '{{ item.NickName }}'
        PhoneNumbers: '{{ item.PhoneNumbers }}'
        Photos: '{{ item.Photos }}'
        PreferredLanguage: '{{ item.PreferredLanguage }}'
        ProfileUrl: '{{ item.ProfileUrl }}'
        Timezone: '{{ item.Timezone }}'
        Title: '{{ item.Title }}'
        UpdatedAt: '{{ item.UpdatedAt }}'
        UpdatedBy: '{{ item.UpdatedBy }}'
        UserId: '{{ item.UserId }}'
        UserName: '{{ item.UserName }}'
        UserStatus: '{{ item.UserStatus }}'
        UserType: '{{ item.UserType }}'
        Website: '{{ item.Website }}'

