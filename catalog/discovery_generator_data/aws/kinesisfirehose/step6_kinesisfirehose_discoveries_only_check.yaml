      DeliveryStreamEncryptionConfiguration: '{{ response.DeliveryStreamEncryptionConfiguration
        }}'
      DeliveryStreamName: '{{ response.DeliveryStreamName }}'
      DeliveryStreamStatus: '{{ response.DeliveryStreamStatus }}'
      DeliveryStreamType: '{{ response.DeliveryStreamType }}'
      Destinations: '{{ response.Destinations }}'
      Enabled: '{{ response.Enabled }}'
      FailureDescription: '{{ response.FailureDescription }}'
      HasMoreDestinations: '{{ response.HasMoreDestinations }}'
      LastUpdateTimestamp: '{{ response.LastUpdateTimestamp }}'
      Source: '{{ response.Source }}'
      VersionId: '{{ response.VersionId }}'
      DeliveryStreamDescription: '{{ response.DeliveryStreamDescription }}'
      DestinationDescription: '{{ response.Destinations }}'
      ExtendedS3DestinationDescription: '{{ response.Destinations }}'
