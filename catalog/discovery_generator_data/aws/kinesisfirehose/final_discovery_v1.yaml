version: '1.0'
provider: aws
service: kinesisfirehose

services:
  client: kinesisfirehose
  module: "boto3.client('kinesisfirehose')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: delivery_stream
    identifier_op: aws.kinesisfirehose.describe_delivery_stream
    identifier_field: DeliveryStreamARN
    item_var_path: item.DeliveryStreamARN
    identifier_template: '{deliverystreamarn}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.kinesisfirehose.describe_delivery_stream  ──
  - discovery_id: aws.kinesisfirehose.describe_delivery_stream
    calls:
      - action: describe_delivery_stream
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        CreateTimestamp: '{{ item.CreateTimestamp }}'
        DeliveryStreamARN: '{{ item.DeliveryStreamARN }}'
        DeliveryStreamDescription: '{{ item.DeliveryStreamDescription }}'
        DeliveryStreamDescription.DeliveryStreamStatus: '{{ item.DeliveryStreamDescription.DeliveryStreamStatus }}'
        DeliveryStreamEncryptionConfiguration: '{{ item.DeliveryStreamEncryptionConfiguration }}'
        DeliveryStreamEncryptionConfiguration.Status: '{{ item.DeliveryStreamEncryptionConfiguration.Status }}'
        DeliveryStreamName: '{{ item.DeliveryStreamName }}'
        DeliveryStreamStatus: '{{ item.DeliveryStreamStatus }}'
        DeliveryStreamType: '{{ item.DeliveryStreamType }}'
        DestinationDescription: '{{ item.DestinationDescription }}'
        DestinationDescription.ExtendedS3DestinationDescription.VpcConfiguration: '{{ item.DestinationDescription.ExtendedS3DestinationDescription.VpcConfiguration }}'
        DestinationDescription.RoleARN: '{{ item.DestinationDescription.RoleARN }}'
        Destinations: '{{ item.Destinations }}'
        Enabled: '{{ item.Enabled }}'
        ExtendedS3DestinationDescription: '{{ item.ExtendedS3DestinationDescription }}'
        ExtendedS3DestinationDescription.DataFormatConversionConfiguration.Enabled: '{{ item.ExtendedS3DestinationDescription.DataFormatConversionConfiguration.Enabled }}'
        ExtendedS3DestinationDescription.EncryptionConfiguration.NoEncryptionConfig: '{{ item.ExtendedS3DestinationDescription.EncryptionConfiguration.NoEncryptionConfig }}'
        FailureDescription: '{{ item.FailureDescription }}'
        HasMoreDestinations: '{{ item.HasMoreDestinations }}'
        LastUpdateTimestamp: '{{ item.LastUpdateTimestamp }}'
        Source: '{{ item.Source }}'
        Status: '{{ item.Status }}'
        VersionId: '{{ item.VersionId }}'

