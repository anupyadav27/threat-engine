version: '1.0'
provider: aws
service: cognito-idp

services:
  client: cognito-idp
  module: "boto3.client('cognito-idp')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  []

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.cognito-idp.list_users_in_group  ──
  - discovery_id: aws.cognito-idp.list_users_in_group
    calls:
      - action: 
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        Enabled: '{{ item.Enabled }}'
        UserLastModifiedDate: '{{ item.UserLastModifiedDate }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.cognito-idp.describe_user_pool  ──
  - discovery_id: aws.cognito-idp.describe_user_pool
    calls:
      - action: 
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        Arn: '{{ item.Arn }}'
        LambdaConfig: '{{ item.LambdaConfig }}'
        MfaConfiguration: '{{ item.MfaConfiguration }}'
        Policies: '{{ item.Policies }}'
        UserPoolAddOns: '{{ item.UserPoolAddOns }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.cognito-idp.describe_user_pool_client  ──
  - discovery_id: aws.cognito-idp.describe_user_pool_client
    calls:
      - action: 
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        AllowedOAuthScopes: '{{ item.AllowedOAuthScopes }}'
        ReadAttributes: '{{ item.ReadAttributes }}'
        WriteAttributes: '{{ item.WriteAttributes }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.cognito-idp.list_groups  ──
  - discovery_id: aws.cognito-idp.list_groups
    calls:
      - action: 
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        GroupName: '{{ item.GroupName }}'
        RoleArn: '{{ item.RoleArn }}'

