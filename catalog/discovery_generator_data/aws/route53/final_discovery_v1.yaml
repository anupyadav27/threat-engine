# ==========================================================
# Discovery YAML — route53 (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 20 | ops: 6 independent, 0 dependent
# ==========================================================
version: '1.0'
provider: aws
service: route53

services:
  client: route53
  module: "boto3.client('route53')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: group
    identifier_op: aws.route53.list_query_logging_configs
    identifier_field: CloudWatchLogsLogGroupArn
    item_var_path: item.CloudWatchLogsLogGroupArn
    identifier_template: '{cloudwatchlogsloggrouparn}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.route53.list_health_checks  ──
  - discovery_id: aws.route53.list_health_checks
    calls:
      - action: list_health_checks
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.HealthChecks }}'
      item:
        CallerReference: '{{ item.CallerReference }}'
        CloudWatchAlarmConfiguration: '{{ item.CloudWatchAlarmConfiguration }}'
        Enabled: '{{ item.Enabled }}'
        HealthCheckConfig: '{{ item.HealthCheckConfig }}'
        HealthCheckConfig.IPAddress: '{{ item.HealthCheckConfig.IPAddress }}'
        HealthCheckConfig.Type: '{{ item.HealthCheckConfig.Type }}'
        HealthCheckVersion: '{{ item.HealthCheckVersion }}'
        Id: '{{ item.Id }}'
        LinkedService: '{{ item.LinkedService }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.route53.list_hosted_zones  ──
  - discovery_id: aws.route53.list_hosted_zones
    calls:
      - action: list_hosted_zones
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.HostedZones }}'
      item:
        CallerReference: '{{ item.CallerReference }}'
        Config: '{{ item.Config }}'
        Config.PrivateZone: '{{ item.Config.PrivateZone }}'
        Features: '{{ item.Features }}'
        Features.DNSSEC: '{{ item.Features.DNSSEC }}'
        Id: '{{ item.Id }}'
        LinkedService: '{{ item.LinkedService }}'
        LinkedService.ServicePrincipal: '{{ item.LinkedService.ServicePrincipal }}'
        Name: '{{ item.Name }}'
        ResourceRecordSetCount: '{{ item.ResourceRecordSetCount }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.route53.list_query_logging_configs  ──
  - discovery_id: aws.route53.list_query_logging_configs
    calls:
      - action: list_query_logging_configs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.QueryLoggingConfigs }}'
      item:
        CloudWatchLogsLogGroupArn: '{{ item.CloudWatchLogsLogGroupArn }}'
        HostedZoneId: '{{ item.HostedZoneId }}'
        Id: '{{ item.Id }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.route53.list_traffic_policy_instances  ──
  - discovery_id: aws.route53.list_traffic_policy_instances
    calls:
      - action: list_traffic_policy_instances
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.TrafficPolicyInstances }}'
      item:
        HostedZoneId: '{{ item.HostedZoneId }}'
        Id: '{{ item.Id }}'
        Message: '{{ item.Message }}'
        Name: '{{ item.Name }}'
        State: '{{ item.State }}'
        TTL: '{{ item.TTL }}'
        TrafficPolicyId: '{{ item.TrafficPolicyId }}'
        TrafficPolicyType: '{{ item.TrafficPolicyType }}'
        TrafficPolicyVersion: '{{ item.TrafficPolicyVersion }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.route53.list_clusters  ──
  - discovery_id: aws.route53.list_clusters
    calls:
      - action: list_clusters
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        Tags: '{{ item.Tags }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.route53.list_cells  ──
  - discovery_id: aws.route53.list_cells
    calls:
      - action: list_cells
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        Tags: '{{ item.Tags }}'

