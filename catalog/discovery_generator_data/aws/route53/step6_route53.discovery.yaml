# Auto-generated: minimum discoveries for check rules + inventory identifiers
# Sources: route53
# 5 ops (4 from checks, +1 for inventory)
version: '1.0'
provider: aws
service: route53
discovery:
  - calls:
    - action: list_cidr_collections
      on_error: continue
      save_as: response
    discovery_id: aws.route53.list_cidr_collections
    emit:
      as: item
      item:
        Arn: '{{ item.Arn }}'
        Id: '{{ item.Id }}'
        Name: '{{ item.Name }}'
        Version: '{{ item.Version }}'
      items_for: '{{ response.CidrCollections }}'
  - calls:
