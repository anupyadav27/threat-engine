# ==========================================================
# Discovery YAML — eventbridge (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 2 | ops: 1 independent, 0 dependent
# ==========================================================
version: '1.0'
provider: aws
service: eventbridge

services:
  client: eventbridge
  module: "boto3.client('eventbridge')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: config
    identifier_op: aws.eventbridge.describe_event_bus
    identifier_field: Arn
    item_var_path: item.Arn
    identifier_template: '{arn}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.eventbridge.describe_event_bus  ──
  - discovery_id: aws.eventbridge.describe_event_bus
    calls:
      - action: describe_event_bus
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        Arn: '{{ item.Arn }}'
        KmsKeyIdentifier: '{{ item.KmsKeyIdentifier }}'
        LogConfig: '{{ item.LogConfig }}'
        Statement: '{{ item.Statement }}'
        Version: '{{ item.Version }}'

