# ==========================================================
# Discovery YAML — ssm (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 30 | ops: 9 independent, 1 dependent
# ==========================================================
version: '1.0'
provider: aws
service: ssm

services:
  client: ssm
  module: "boto3.client('ssm')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: automation_execution
    identifier_op: aws.ssm.describe_automation_executions
    identifier_field: AssociationId
    item_var_path: item.AssociationId
    identifier_template: '{associationid}'
  - resource_type: maintenance_window_schedule
    identifier_op: aws.ssm.describe_maintenance_window_schedule
    identifier_field: WindowId
    item_var_path: item.WindowId
    identifier_template: '{windowid}'
  - resource_type: maintenance_window
    identifier_op: aws.ssm.describe_maintenance_windows
    identifier_field: WindowId
    item_var_path: item.WindowId
    identifier_template: '{windowid}'
  - resource_type: parameter
    identifier_op: aws.ssm.describe_parameters
    identifier_field: ARN
    item_var_path: item.ARN
    identifier_template: '{arn}'
  - resource_type: patch_baseline
    identifier_op: aws.ssm.describe_patch_baselines
    identifier_field: BaselineId
    item_var_path: item.BaselineId
    identifier_template: '{baselineid}'
  - resource_type: patch_group
    identifier_op: aws.ssm.describe_patch_groups
    identifier_field: BaselineIdentity
    item_var_path: item.BaselineIdentity
    identifier_template: '{baselineidentity}'
  - resource_type: document
    identifier_op: aws.ssm.list_documents
    identifier_field: DisplayName
    item_var_path: item.DisplayName
    identifier_template: '{displayname}'
  - resource_type: node
    identifier_op: aws.ssm.list_nodes
    identifier_field: Id
    item_var_path: item.Id
    identifier_template: '{id}'
  - resource_type: resource_compliance_summarie
    identifier_op: aws.ssm.list_resource_compliance_summaries
    identifier_field: ResourceId
    item_var_path: item.ResourceId
    identifier_template: '{resourceid}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.ssm.describe_automation_executions  ──
  - discovery_id: aws.ssm.describe_automation_executions
    calls:
      - action: describe_automation_executions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.AutomationExecutionMetadataList }}'
      item:
        AlarmConfiguration: '{{ item.AlarmConfiguration }}'
        AssociationId: '{{ item.AssociationId }}'
        AutomationExecutionId: '{{ item.AutomationExecutionId }}'
        AutomationExecutionMetadataList: '{{ item.AutomationExecutionMetadataList }}'
        AutomationExecutionStatus: '{{ item.AutomationExecutionStatus }}'
        AutomationSubtype: '{{ item.AutomationSubtype }}'
        AutomationType: '{{ item.AutomationType }}'
        ChangeRequestName: '{{ item.ChangeRequestName }}'
        CurrentAction: '{{ item.CurrentAction }}'
        CurrentStepName: '{{ item.CurrentStepName }}'
        DocumentName: '{{ item.DocumentName }}'
        DocumentVersion: '{{ item.DocumentVersion }}'
        ExecutedBy: '{{ item.ExecutedBy }}'
        ExecutionEndTime: '{{ item.ExecutionEndTime }}'
        ExecutionStartTime: '{{ item.ExecutionStartTime }}'
        FailureMessage: '{{ item.FailureMessage }}'
        LogFile: '{{ item.LogFile }}'
        MaxConcurrency: '{{ item.MaxConcurrency }}'
        MaxErrors: '{{ item.MaxErrors }}'
        Mode: '{{ item.Mode }}'
        OpsItemId: '{{ item.OpsItemId }}'
        Outputs: '{{ item.Outputs }}'
        ParentAutomationExecutionId: '{{ item.ParentAutomationExecutionId }}'
        ResolvedTargets: '{{ item.ResolvedTargets }}'
        Runbooks: '{{ item.Runbooks }}'
        ScheduledTime: '{{ item.ScheduledTime }}'
        Target: '{{ item.Target }}'
        TargetLocationsURL: '{{ item.TargetLocationsURL }}'
        TargetMaps: '{{ item.TargetMaps }}'
        TargetParameterName: '{{ item.TargetParameterName }}'
        Targets: '{{ item.Targets }}'
        TriggeredAlarms: '{{ item.TriggeredAlarms }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.ssm.describe_maintenance_window_schedule  ──
  - discovery_id: aws.ssm.describe_maintenance_window_schedule
    calls:
      - action: describe_maintenance_window_schedule
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ScheduledWindowExecutions }}'
      item:
        ExecutionTime: '{{ item.ExecutionTime }}'
        Name: '{{ item.Name }}'
        ScheduledWindowExecutions: '{{ item.ScheduledWindowExecutions }}'
        WindowExecutions: '{{ item.WindowExecutions }}'
        WindowId: '{{ item.WindowId }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.ssm.describe_maintenance_windows  ──
  - discovery_id: aws.ssm.describe_maintenance_windows
    calls:
      - action: describe_maintenance_windows
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.WindowIdentities }}'
      item:
        Cutoff: '{{ item.Cutoff }}'
        Description: '{{ item.Description }}'
        Duration: '{{ item.Duration }}'
        Enabled: '{{ item.Enabled }}'
        EndDate: '{{ item.EndDate }}'
        Name: '{{ item.Name }}'
        NextExecutionTime: '{{ item.NextExecutionTime }}'
        Schedule: '{{ item.Schedule }}'
        ScheduleOffset: '{{ item.ScheduleOffset }}'
        ScheduleTimezone: '{{ item.ScheduleTimezone }}'
        StartDate: '{{ item.StartDate }}'
        WindowId: '{{ item.WindowId }}'
        WindowIdentities: '{{ item.WindowIdentities }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.ssm.describe_parameters  ──
  - discovery_id: aws.ssm.describe_parameters
    calls:
      - action: describe_parameters
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        ARN: '{{ item.ARN }}'
        AllowedPattern: '{{ item.AllowedPattern }}'
        DataType: '{{ item.DataType }}'
        Description: '{{ item.Description }}'
        KeyId: '{{ item.KeyId }}'
        LastModifiedDate: '{{ item.LastModifiedDate }}'
        LastModifiedUser: '{{ item.LastModifiedUser }}'
        Name: '{{ item.Name }}'
        Policies: '{{ item.Policies }}'
        Tier: '{{ item.Tier }}'
        Type: '{{ item.Type }}'
        Version: '{{ item.Version }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.ssm.describe_patch_baselines  ──
  - discovery_id: aws.ssm.describe_patch_baselines
    calls:
      - action: describe_patch_baselines
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.BaselineIdentities }}'
      item:
        ApprovalRules: '{{ item.ApprovalRules }}'
        ApprovedPatches: '{{ item.ApprovedPatches }}'
        ApprovedPatchesComplianceLevel: '{{ item.ApprovedPatchesComplianceLevel }}'
        ApprovedPatchesEnableNonSecurity: '{{ item.ApprovedPatchesEnableNonSecurity }}'
        AvailableSecurityUpdatesComplianceStatus: '{{ item.AvailableSecurityUpdatesComplianceStatus }}'
        BaselineDescription: '{{ item.BaselineDescription }}'
        BaselineId: '{{ item.BaselineId }}'
        BaselineIdentities: '{{ item.BaselineIdentities }}'
        BaselineName: '{{ item.BaselineName }}'
        DefaultBaseline: '{{ item.DefaultBaseline }}'
        EffectivePatches: '{{ item.EffectivePatches }}'
        GlobalFilters: '{{ item.GlobalFilters }}'
        ModifiedDate: '{{ item.ModifiedDate }}'
        OperatingSystem: '{{ item.OperatingSystem }}'
        Patch: '{{ item.Patch }}'
        PatchGroups: '{{ item.PatchGroups }}'
        PatchStatus: '{{ item.PatchStatus }}'
        RejectedPatches: '{{ item.RejectedPatches }}'
        RejectedPatchesAction: '{{ item.RejectedPatchesAction }}'
        Sources: '{{ item.Sources }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.ssm.describe_patch_groups  ──
  - discovery_id: aws.ssm.describe_patch_groups
    calls:
      - action: describe_patch_groups
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Mappings }}'
      item:
        BaselineIdentity: '{{ item.BaselineIdentity }}'
        Mappings: '{{ item.Mappings }}'
        PatchGroup: '{{ item.PatchGroup }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.ssm.list_documents  ──
  - discovery_id: aws.ssm.list_documents
    calls:
      - action: list_documents
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.DocumentIdentifiers }}'
      item:
        Author: '{{ item.Author }}'
        CreatedDate: '{{ item.CreatedDate }}'
        DisplayName: '{{ item.DisplayName }}'
        DocumentFormat: '{{ item.DocumentFormat }}'
        DocumentType: '{{ item.DocumentType }}'
        DocumentVersion: '{{ item.DocumentVersion }}'
        IsDefaultVersion: '{{ item.IsDefaultVersion }}'
        Name: '{{ item.Name }}'
        Owner: '{{ item.Owner }}'
        PlatformTypes: '{{ item.PlatformTypes }}'
        Requires: '{{ item.Requires }}'
        ReviewStatus: '{{ item.ReviewStatus }}'
        SchemaVersion: '{{ item.SchemaVersion }}'
        Tags: '{{ item.Tags }}'
        TargetType: '{{ item.TargetType }}'
        VersionName: '{{ item.VersionName }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.ssm.list_nodes  ──
  - discovery_id: aws.ssm.list_nodes
    calls:
      - action: list_nodes
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Nodes }}'
      item:
        CaptureTime: '{{ item.CaptureTime }}'
        Id: '{{ item.Id }}'
        NodeType: '{{ item.NodeType }}'
        Owner: '{{ item.Owner }}'
        Region: '{{ item.Region }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.ssm.list_resource_compliance_summaries  ──
  - discovery_id: aws.ssm.list_resource_compliance_summaries
    calls:
      - action: list_resource_compliance_summaries
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ResourceComplianceSummaryItems }}'
      item:
        ComplianceType: '{{ item.ComplianceType }}'
        CompliantSummary: '{{ item.CompliantSummary }}'
        ExecutionSummary: '{{ item.ExecutionSummary }}'
        NonCompliantSummary: '{{ item.NonCompliantSummary }}'
        OverallSeverity: '{{ item.OverallSeverity }}'
        ResourceId: '{{ item.ResourceId }}'
        ResourceType: '{{ item.ResourceType }}'
        Status: '{{ item.Status }}'

  # ════ DEPENDENT (enrich) operations ════
  # ── aws.ssm.list_document_versions [dependent] ──
  - discovery_id: aws.ssm.list_document_versions
    for_each: aws.ssm.describe_association
    calls:
      - action: list_document_versions
        params:
          Name: "{{ item.Name }}"
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.DocumentVersions }}'
      item:
        CreatedDate: '{{ item.CreatedDate }}'
        DisplayName: '{{ item.DisplayName }}'
        DocumentFormat: '{{ item.DocumentFormat }}'
        DocumentVersion: '{{ item.DocumentVersion }}'
        IsDefaultVersion: '{{ item.IsDefaultVersion }}'
        Name: '{{ item.Name }}'
        ReviewStatus: '{{ item.ReviewStatus }}'
        Status: '{{ item.Status }}'
        StatusInformation: '{{ item.StatusInformation }}'
        VersionName: '{{ item.VersionName }}'

