# ==========================================================
# Discovery YAML — appsync (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 8 | ops: 3 independent, 0 dependent
# ==========================================================
version: '1.0'
provider: aws
service: appsync

services:
  client: appsync
  module: "boto3.client('appsync')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: acl
    identifier_op: aws.appsync.list_graphql_apis
    identifier_field: arn
    item_var_path: item.arn
    identifier_template: '{arn}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.appsync.get_api_cache  ──
  - discovery_id: aws.appsync.get_api_cache
    calls:
      - action: get_api_cache
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        item: '{{ item }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.appsync.list_graphql_apis  ──
  - discovery_id: aws.appsync.list_graphql_apis
    calls:
      - action: list_graphql_apis
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.graphqlApis }}'
      item:
        additionalAuthenticationProviders: '{{ item.additionalAuthenticationProviders }}'
        apiId: '{{ item.apiId }}'
        apiType: '{{ item.apiType }}'
        arn: '{{ item.arn }}'
        authenticationType: '{{ item.authenticationType }}'
        dns: '{{ item.dns }}'
        enhancedMetricsConfig: '{{ item.enhancedMetricsConfig }}'
        introspectionConfig: '{{ item.introspectionConfig }}'
        item: '{{ item }}'
        lambdaAuthorizerConfig: '{{ item.lambdaAuthorizerConfig }}'
        logConfig: '{{ item.logConfig }}'
        mergedApiExecutionRoleArn: '{{ item.mergedApiExecutionRoleArn }}'
        name: '{{ item.name }}'
        openIDConnectConfig: '{{ item.openIDConnectConfig }}'
        owner: '{{ item.owner }}'
        ownerContact: '{{ item.ownerContact }}'
        queryDepthLimit: '{{ item.queryDepthLimit }}'
        resolverCountLimit: '{{ item.resolverCountLimit }}'
        tags: '{{ item.tags }}'
        uris: '{{ item.uris }}'
        userPoolConfig: '{{ item.userPoolConfig }}'
        visibility: '{{ item.visibility }}'
        wafWebAclArn: '{{ item.wafWebAclArn }}'
        xrayEnabled: '{{ item.xrayEnabled }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.appsync.get_graphql_api  ──
  - discovery_id: aws.appsync.get_graphql_api
    calls:
      - action: get_graphql_api
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        XrayEnabled: '{{ item.XrayEnabled }}'

