version: '1.0'
provider: aws
service: events

services:
  client: events
  module: "boto3.client('events')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  []

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.events.list_endpoints  ──
  - discovery_id: aws.events.list_endpoints
    calls:
      - action: 
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        ReplicationConfig: '{{ item.ReplicationConfig }}'
        RoleArn: '{{ item.RoleArn }}'

  # ════ INDEPENDENT (root) operations ════
