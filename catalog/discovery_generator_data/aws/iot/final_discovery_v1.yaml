# ==========================================================
# Discovery YAML — iot (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 6 | ops: 1 independent, 3 dependent
# ==========================================================
version: '1.0'
provider: aws
service: iot

services:
  client: iot
  module: "boto3.client('iot')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: authorizer
    identifier_op: aws.iot.describe_default_authorizer
    identifier_field: authorizerArn
    item_var_path: item.authorizerArn
    identifier_template: '{authorizerarn}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.iot.describe_default_authorizer  ──
  - discovery_id: aws.iot.describe_default_authorizer
    calls:
      - action: describe_default_authorizer
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        SigningDisabled: '{{ item.SigningDisabled }}'
        authorizerArn: '{{ item.authorizerArn }}'
        authorizerDescription: '{{ item.authorizerDescription }}'
        authorizerFunctionArn: '{{ item.authorizerFunctionArn }}'
        authorizerName: '{{ item.authorizerName }}'
        creationDate: '{{ item.creationDate }}'
        enableCachingForHttp: '{{ item.enableCachingForHttp }}'
        lastModifiedDate: '{{ item.lastModifiedDate }}'
        signingDisabled: '{{ item.signingDisabled }}'
        status: '{{ item.status }}'
        tokenKeyName: '{{ item.tokenKeyName }}'
        tokenSigningPublicKeys: '{{ item.tokenSigningPublicKeys }}'

  # ════ DEPENDENT (enrich) operations ════
  # ── aws.iot.describe_job_template [dependent] ──
  - discovery_id: aws.iot.describe_job_template
    for_each: aws.iot.list_job_templates
    calls:
      - action: describe_job_template
        params:
          jobTemplateId: "{{ item.jobTemplateId }}"
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.maintenanceWindows }}'
      item:
        Tags: '{{ item.Tags }}'
        document: '{{ item.document }}'
        durationInMinutes: '{{ item.durationInMinutes }}'
        maintenanceWindows: '{{ item.maintenanceWindows }}'
        startTime: '{{ item.startTime }}'

  # ════ DEPENDENT (enrich) operations ════
  # ── aws.iot.describe_provisioning_template [dependent] ──
  - discovery_id: aws.iot.describe_provisioning_template
    for_each: aws.iot.list_managed_job_templates
    calls:
      - action: describe_provisioning_template
        params:
          templateName: "{{ item.templateName }}"
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        Description: '{{ item.Description }}'
        Tags: '{{ item.Tags }}'
        TemplateType: '{{ item.TemplateType }}'
        payloadVersion: '{{ item.payloadVersion }}'
        preProvisioningHook: '{{ item.preProvisioningHook }}'
        provisioningRoleArn: '{{ item.provisioningRoleArn }}'
        targetArn: '{{ item.targetArn }}'
        templateBody: '{{ item.templateBody }}'

  # ════ DEPENDENT (enrich) operations ════
  # ── aws.iot.describe_scheduled_audit [dependent] ──
  - discovery_id: aws.iot.describe_scheduled_audit
    for_each: aws.iot.list_scheduled_audits
    calls:
      - action: describe_scheduled_audit
        params:
          scheduledAuditName: "{{ item.scheduledAuditName }}"
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.targetCheckNames }}'
      item:
        Tags: '{{ item.Tags }}'

