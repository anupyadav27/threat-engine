# ==========================================================
# Discovery YAML — fms (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 3 | ops: 1 independent, 0 dependent
# ==========================================================
version: '1.0'
provider: aws
service: fms

services:
  client: fms
  module: "boto3.client('fms')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: policy
    identifier_op: aws.fms.list_policies
    identifier_field: PolicyArn
    item_var_path: item.PolicyArn
    identifier_template: '{policyarn}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.fms.list_policies  ──
  - discovery_id: aws.fms.list_policies
    calls:
      - action: list_policies
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.PolicyList }}'
      item:
        DeleteUnusedFMManagedResources: '{{ item.DeleteUnusedFMManagedResources }}'
        PolicyArn: '{{ item.PolicyArn }}'
        PolicyId: '{{ item.PolicyId }}'
        PolicyName: '{{ item.PolicyName }}'
        PolicyStatus: '{{ item.PolicyStatus }}'
        RemediationEnabled: '{{ item.RemediationEnabled }}'
        ResourceType: '{{ item.ResourceType }}'
        SecurityServiceType: '{{ item.SecurityServiceType }}'
        ServiceType: '{{ item.ServiceType }}'
        Statement: '{{ item.Statement }}'
        Version: '{{ item.Version }}'
        item: '{{ item }}'

