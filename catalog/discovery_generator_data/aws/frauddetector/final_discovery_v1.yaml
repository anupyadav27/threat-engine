# ==========================================================
# Discovery YAML — frauddetector (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 4 | ops: 3 independent, 0 dependent
# ==========================================================
version: '1.0'
provider: aws
service: frauddetector

services:
  client: frauddetector
  module: "boto3.client('frauddetector')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: model_version
    identifier_op: aws.frauddetector.describe_model_versions
    identifier_field: arn
    item_var_path: item.arn
    identifier_template: '{arn}'
  - resource_type: get_outcome
    identifier_op: aws.frauddetector.get_outcomes
    identifier_field: arn
    item_var_path: item.arn
    identifier_template: '{arn}'
  - resource_type: get_variable
    identifier_op: aws.frauddetector.get_variables
    identifier_field: arn
    item_var_path: item.arn
    identifier_template: '{arn}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.frauddetector.describe_model_versions  ──
  - discovery_id: aws.frauddetector.describe_model_versions
    calls:
      - action: describe_model_versions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.modelVersionDetails }}'
      item:
        Tags: '{{ item.Tags }}'
        arn: '{{ item.arn }}'
        createdTime: '{{ item.createdTime }}'
        externalEventsDetail: '{{ item.externalEventsDetail }}'
        ingestedEventsDetail: '{{ item.ingestedEventsDetail }}'
        lastUpdatedTime: '{{ item.lastUpdatedTime }}'
        modelId: '{{ item.modelId }}'
        modelType: '{{ item.modelType }}'
        modelVersionDetails: '{{ item.modelVersionDetails }}'
        modelVersionNumber: '{{ item.modelVersionNumber }}'
        status: '{{ item.status }}'
        trainingDataSchema: '{{ item.trainingDataSchema }}'
        trainingDataSource: '{{ item.trainingDataSource }}'
        trainingResult: '{{ item.trainingResult }}'
        trainingResultV2: '{{ item.trainingResultV2 }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.frauddetector.get_outcomes  ──
  - discovery_id: aws.frauddetector.get_outcomes
    calls:
      - action: get_outcomes
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.outcomes }}'
      item:
        Tags: '{{ item.Tags }}'
        arn: '{{ item.arn }}'
        createdTime: '{{ item.createdTime }}'
        description: '{{ item.description }}'
        lastUpdatedTime: '{{ item.lastUpdatedTime }}'
        name: '{{ item.name }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.frauddetector.get_variables  ──
  - discovery_id: aws.frauddetector.get_variables
    calls:
      - action: get_variables
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.variables }}'
      item:
        Tags: '{{ item.Tags }}'
        arn: '{{ item.arn }}'
        createdTime: '{{ item.createdTime }}'
        dataSource: '{{ item.dataSource }}'
        dataType: '{{ item.dataType }}'
        defaultValue: '{{ item.defaultValue }}'
        description: '{{ item.description }}'
        lastUpdatedTime: '{{ item.lastUpdatedTime }}'
        name: '{{ item.name }}'
        variableType: '{{ item.variableType }}'
        variables: '{{ item.variables }}'

