version: '1.0'
provider: aws
service: mediapackagev2
services:
  client: mediapackagev2
  module: boto3.client
discovery:
- discovery_id: aws.mediapackagev2.list_channel_groups
  calls:
  - action: list_channel_groups
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Items }}'
    item:
      Arn: '{{ item.Arn }}'
      Policy: '{{ item.Policy }}'
      ChannelGroupName: '{{ item.ChannelGroupName }}'
      CreatedAt: '{{ item.CreatedAt }}'
      Description: '{{ item.Description }}'
      ModifiedAt: '{{ item.ModifiedAt }}'
- discovery_id: aws.mediapackagev2.get_channel
  for_each: aws.mediapackagev2.list_channel_groups
  calls:
  - action: get_channel
    params:
      ChannelGroupName: '{{ item.ChannelGroupName }}'
      ChannelName: '{{ item.ChannelName }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.IngestEndpoints }}'
    item:
      Id: '{{ item.Id }}'
      Url: '{{ item.Url }}'
- discovery_id: aws.mediapackagev2.get_channel_group
  for_each: aws.mediapackagev2.list_channel_groups
  calls:
  - action: get_channel_group
    params:
      ChannelGroupName: '{{ item.ChannelGroupName }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      Arn: '{{ response.Arn }}'
      Tags: '{{ response.Tags }}'
      ChannelGroupName: '{{ response.ChannelGroupName }}'
      CreatedAt: '{{ response.CreatedAt }}'
      Description: '{{ response.Description }}'
      ETag: '{{ response.ETag }}'
      EgressDomain: '{{ response.EgressDomain }}'
      ModifiedAt: '{{ response.ModifiedAt }}'
- discovery_id: aws.mediapackagev2.get_channel_policy
  for_each: aws.mediapackagev2.list_channel_groups
  calls:
  - action: get_channel_policy
    params:
      ChannelGroupName: '{{ item.ChannelGroupName }}'
      ChannelName: '{{ item.ChannelName }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      Policy: '{{ response.Policy }}'
      Statement: '{{ response.Statement }}'
      Version: '{{ response.Version }}'
- discovery_id: aws.mediapackagev2.get_harvest_job
  for_each: aws.mediapackagev2.list_channel_groups
  calls:
  - action: get_harvest_job
    params:
      ChannelGroupName: '{{ item.ChannelGroupName }}'
      ChannelName: '{{ item.ChannelName }}'
      OriginEndpointName: '{{ item.OriginEndpointName }}'
      HarvestJobName: '{{ item.HarvestJobName }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      S3Destination: '{{ response.Destination.S3Destination }}'
- discovery_id: aws.mediapackagev2.get_origin_endpoint
  for_each: aws.mediapackagev2.list_channel_groups
  calls:
  - action: get_origin_endpoint
    params:
      ChannelGroupName: '{{ item.ChannelGroupName }}'
      ChannelName: '{{ item.ChannelName }}'
      OriginEndpointName: '{{ item.OriginEndpointName }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.HlsManifests }}'
    item:
      ChildManifestName: '{{ item.ChildManifestName }}'
      FilterConfiguration: '{{ item.FilterConfiguration }}'
      ManifestName: '{{ item.ManifestName }}'
      ManifestWindowSeconds: '{{ item.ManifestWindowSeconds }}'
      ProgramDateTimeIntervalSeconds: '{{ item.ProgramDateTimeIntervalSeconds }}'
      ScteHls: '{{ item.ScteHls }}'
      StartTag: '{{ item.StartTag }}'
      Url: '{{ item.Url }}'
      UrlEncodeChildManifest: '{{ item.UrlEncodeChildManifest }}'
- discovery_id: aws.mediapackagev2.get_origin_endpoint_policy
  for_each: aws.mediapackagev2.list_channel_groups
  calls:
  - action: get_origin_endpoint_policy
    params:
      ChannelGroupName: '{{ item.ChannelGroupName }}'
      ChannelName: '{{ item.ChannelName }}'
      OriginEndpointName: '{{ item.OriginEndpointName }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      CdnIdentifierSecretArns: '{{ response.CdnAuthConfiguration.CdnIdentifierSecretArns
        }}'
      SecretsRoleArn: '{{ response.CdnAuthConfiguration.SecretsRoleArn }}'
- discovery_id: aws.mediapackagev2.list_channels
  for_each: aws.mediapackagev2.list_channel_groups
  calls:
  - action: list_channels
    params:
      ChannelGroupName: '{{ item.ChannelGroupName }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Items }}'
    item:
      Arn: '{{ item.Arn }}'
      ChannelGroupName: '{{ item.ChannelGroupName }}'
      ChannelName: '{{ item.ChannelName }}'
      CreatedAt: '{{ item.CreatedAt }}'
      Description: '{{ item.Description }}'
      InputType: '{{ item.InputType }}'
      ModifiedAt: '{{ item.ModifiedAt }}'
- discovery_id: aws.mediapackagev2.list_harvest_jobs
  for_each: aws.mediapackagev2.list_channel_groups
  calls:
  - action: list_harvest_jobs
    params:
      ChannelGroupName: '{{ item.ChannelGroupName }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Items }}'
    item:
      Arn: '{{ item.Arn }}'
      Status: '{{ item.Status }}'
      ChannelGroupName: '{{ item.ChannelGroupName }}'
      ChannelName: '{{ item.ChannelName }}'
      CreatedAt: '{{ item.CreatedAt }}'
      Description: '{{ item.Description }}'
      Destination: '{{ item.Destination }}'
      ETag: '{{ item.ETag }}'
      ErrorMessage: '{{ item.ErrorMessage }}'
      HarvestJobName: '{{ item.HarvestJobName }}'
      HarvestedManifests: '{{ item.HarvestedManifests }}'
      ModifiedAt: '{{ item.ModifiedAt }}'
      OriginEndpointName: '{{ item.OriginEndpointName }}'
      ScheduleConfiguration: '{{ item.ScheduleConfiguration }}'
- discovery_id: aws.mediapackagev2.list_origin_endpoints
  for_each: aws.mediapackagev2.list_channel_groups
  calls:
  - action: list_origin_endpoints
    params:
      ChannelGroupName: '{{ item.ChannelGroupName }}'
      ChannelName: '{{ item.ChannelName }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Items }}'
    item:
      Arn: '{{ item.Arn }}'
      ChannelGroupName: '{{ item.ChannelGroupName }}'
      ChannelName: '{{ item.ChannelName }}'
      ContainerType: '{{ item.ContainerType }}'
      CreatedAt: '{{ item.CreatedAt }}'
      DashManifests: '{{ item.DashManifests }}'
      Description: '{{ item.Description }}'
      ForceEndpointErrorConfiguration: '{{ item.ForceEndpointErrorConfiguration }}'
      HlsManifests: '{{ item.HlsManifests }}'
      LowLatencyHlsManifests: '{{ item.LowLatencyHlsManifests }}'
      ModifiedAt: '{{ item.ModifiedAt }}'
      MssManifests: '{{ item.MssManifests }}'
      OriginEndpointName: '{{ item.OriginEndpointName }}'
- discovery_id: aws.mediapackagev2.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      Tags: '{{ response.Tags }}'
