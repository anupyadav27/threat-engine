version: '1.0'
provider: aws
service: acm-pca
services:
  client: acm-pca
  module: boto3.client('acm-pca')
inventory_resource_identifiers:
- resource_type: certificate_authority
  identifier_op: aws.acm-pca.list_certificate_authorities
  identifier_field: Arn
  item_var_path: item.Arn
  identifier_template: '{arn}'
checks: []
discovery:
- discovery_id: aws.acm-pca.list_certificate_authorities
  calls:
  - action: null
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.CertificateAuthorities }}'
    item:
      Arn: '{{ item.Arn }}'
      CertificateAuthorityConfiguration.CsrExtensions: '{{ item.CertificateAuthorityConfiguration.CsrExtensions
        }}'
      RevocationConfiguration.CrlConfiguration.Enabled: '{{ item.RevocationConfiguration.CrlConfiguration.Enabled
        }}'
      Status: '{{ item.Status }}'
