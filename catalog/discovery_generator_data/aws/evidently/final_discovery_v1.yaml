# ==========================================================
# Discovery YAML — evidently (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 6 | ops: 2 independent, 0 dependent
# ==========================================================
version: '1.0'
provider: aws
service: evidently

services:
  client: evidently
  module: "boto3.client('evidently')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: project
    identifier_op: aws.evidently.list_projects
    identifier_field: arn
    item_var_path: item.arn
    identifier_template: '{arn}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.evidently.list_projects  ──
  - discovery_id: aws.evidently.list_projects
    calls:
      - action: list_projects
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.projects }}'
      item:
        Description: '{{ item.Description }}'
        Tags: '{{ item.Tags }}'
        activeExperimentCount: '{{ item.activeExperimentCount }}'
        activeLaunchCount: '{{ item.activeLaunchCount }}'
        arn: '{{ item.arn }}'
        createdTime: '{{ item.createdTime }}'
        description: '{{ item.description }}'
        experimentCount: '{{ item.experimentCount }}'
        featureCount: '{{ item.featureCount }}'
        lastUpdatedTime: '{{ item.lastUpdatedTime }}'
        launchCount: '{{ item.launchCount }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        tags: '{{ item.tags }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.evidently.list_segments  ──
  - discovery_id: aws.evidently.list_segments
    calls:
      - action: list_segments
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.segments }}'
      item:
        Description: '{{ item.Description }}'
        Tags: '{{ item.Tags }}'
        arn: '{{ item.arn }}'
        createdTime: '{{ item.createdTime }}'
        description: '{{ item.description }}'
        experimentCount: '{{ item.experimentCount }}'
        lastUpdatedTime: '{{ item.lastUpdatedTime }}'
        launchCount: '{{ item.launchCount }}'
        name: '{{ item.name }}'
        pattern: '{{ item.pattern }}'
        tags: '{{ item.tags }}'

