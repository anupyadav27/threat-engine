      description: '{{ response.project.description }}'
      experimentCount: '{{ response.project.experimentCount }}'
      featureCount: '{{ response.project.featureCount }}'
      lastUpdatedTime: '{{ response.project.lastUpdatedTime }}'
      launchCount: '{{ response.project.launchCount }}'
      name: '{{ response.project.name }}'
      status: '{{ response.project.status }}'
      tags: '{{ response.project.tags }}'
