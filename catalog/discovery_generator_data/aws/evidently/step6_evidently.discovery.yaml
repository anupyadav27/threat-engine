version: '1.0'
provider: aws
service: evidently
services:
  client: evidently
  module: boto3.client
discovery:
- discovery_id: aws.evidently.list_projects
  calls:
  - action: list_projects
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.projects }}'
    item:
      activeExperimentCount: '{{ item.activeExperimentCount }}'
      activeLaunchCount: '{{ item.activeLaunchCount }}'
      arn: '{{ item.arn }}'
      createdTime: '{{ item.createdTime }}'
      description: '{{ item.description }}'
      experimentCount: '{{ item.experimentCount }}'
      featureCount: '{{ item.featureCount }}'
      lastUpdatedTime: '{{ item.lastUpdatedTime }}'
      launchCount: '{{ item.launchCount }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      tags: '{{ item.tags }}'
- discovery_id: aws.evidently.list_segments
  calls:
  - action: list_segments
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.segments }}'
    item:
      arn: '{{ item.arn }}'
      createdTime: '{{ item.createdTime }}'
      description: '{{ item.description }}'
      experimentCount: '{{ item.experimentCount }}'
      lastUpdatedTime: '{{ item.lastUpdatedTime }}'
      launchCount: '{{ item.launchCount }}'
      name: '{{ item.name }}'
      pattern: '{{ item.pattern }}'
      tags: '{{ item.tags }}'
- discovery_id: aws.evidently.get_experiment
  calls:
  - action: get_experiment
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      arn: '{{ response.experiment.arn }}'
      createdTime: '{{ response.experiment.createdTime }}'
      description: '{{ response.experiment.description }}'
      execution: '{{ response.experiment.execution }}'
      experiment: '{{ response.experiment.experiment }}'
      lastUpdatedTime: '{{ response.experiment.lastUpdatedTime }}'
      metricGoals: '{{ response.experiment.metricGoals }}'
      name: '{{ response.experiment.name }}'
      onlineAbDefinition: '{{ response.experiment.onlineAbDefinition }}'
      project: '{{ response.experiment.project }}'
      randomizationSalt: '{{ response.experiment.randomizationSalt }}'
      samplingRate: '{{ response.experiment.samplingRate }}'
      schedule: '{{ response.experiment.schedule }}'
      segment: '{{ response.experiment.segment }}'
      status: '{{ response.experiment.status }}'
      statusReason: '{{ response.experiment.statusReason }}'
      tags: '{{ response.experiment.tags }}'
      treatments: '{{ response.experiment.treatments }}'
      type: '{{ response.experiment.type }}'
- discovery_id: aws.evidently.get_experiment_results
  calls:
  - action: get_experiment_results
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.reports }}'
    item:
      content: '{{ item.content }}'
      metricName: '{{ item.metricName }}'
      reportName: '{{ item.reportName }}'
      reports: '{{ item.reports }}'
      resultsData: '{{ item.resultsData }}'
      timestamps: '{{ item.timestamps }}'
      treatmentName: '{{ item.treatmentName }}'
- discovery_id: aws.evidently.get_feature
  calls:
  - action: get_feature
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      arn: '{{ response.feature.arn }}'
      createdTime: '{{ response.feature.createdTime }}'
      defaultVariation: '{{ response.feature.defaultVariation }}'
      description: '{{ response.feature.description }}'
      entityOverrides: '{{ response.feature.entityOverrides }}'
      evaluationRules: '{{ response.feature.evaluationRules }}'
      evaluationStrategy: '{{ response.feature.evaluationStrategy }}'
      lastUpdatedTime: '{{ response.feature.lastUpdatedTime }}'
      name: '{{ response.feature.name }}'
      project: '{{ response.feature.project }}'
      status: '{{ response.feature.status }}'
      tags: '{{ response.feature.tags }}'
      valueType: '{{ response.feature.valueType }}'
      variations: '{{ response.feature.variations }}'
- discovery_id: aws.evidently.get_launch
  calls:
  - action: get_launch
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      arn: '{{ response.launch.arn }}'
      createdTime: '{{ response.launch.createdTime }}'
      description: '{{ response.launch.description }}'
      execution: '{{ response.launch.execution }}'
      groups: '{{ response.launch.groups }}'
      lastUpdatedTime: '{{ response.launch.lastUpdatedTime }}'
      metricMonitors: '{{ response.launch.metricMonitors }}'
      name: '{{ response.launch.name }}'
      project: '{{ response.launch.project }}'
      randomizationSalt: '{{ response.launch.randomizationSalt }}'
      scheduledSplitsDefinition: '{{ response.launch.scheduledSplitsDefinition }}'
      status: '{{ response.launch.status }}'
      statusReason: '{{ response.launch.statusReason }}'
      tags: '{{ response.launch.tags }}'
      type: '{{ response.launch.type }}'
