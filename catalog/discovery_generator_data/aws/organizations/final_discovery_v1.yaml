version: '1.0'
provider: aws
service: organizations

services:
  client: organizations
  module: "boto3.client('organizations')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: account
    identifier_op: aws.organizations.describe_organization
    identifier_field: Arn
    item_var_path: item.Arn
    identifier_template: '{arn}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.organizations.describe_effective_policy  ──
  - discovery_id: aws.organizations.describe_effective_policy
    calls:
      - action: describe_effective_policy
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        EffectivePolicy: '{{ item.EffectivePolicy }}'
        LastUpdatedTimestamp: '{{ item.LastUpdatedTimestamp }}'
        PolicyContent: '{{ item.PolicyContent }}'
        PolicyType: '{{ item.PolicyType }}'
        TargetId: '{{ item.TargetId }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.organizations.describe_organization  ──
  - discovery_id: aws.organizations.describe_organization
    calls:
      - action: describe_organization
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        Account: '{{ item.Account }}'
        Arn: '{{ item.Arn }}'
        AvailablePolicyTypes: '{{ item.AvailablePolicyTypes }}'
        FeatureSet: '{{ item.FeatureSet }}'
        Id: '{{ item.Id }}'
        MasterAccountArn: '{{ item.MasterAccountArn }}'
        MasterAccountEmail: '{{ item.MasterAccountEmail }}'
        MasterAccountId: '{{ item.MasterAccountId }}'
        Organization: '{{ item.Organization }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.organizations.list_accounts  ──
  - discovery_id: aws.organizations.list_accounts
    calls:
      - action: list_accounts
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Accounts }}'
      item:
        Arn: '{{ item.Arn }}'
        Email: '{{ item.Email }}'
        Id: '{{ item.Id }}'
        JoinedMethod: '{{ item.JoinedMethod }}'
        JoinedTimestamp: '{{ item.JoinedTimestamp }}'
        Name: '{{ item.Name }}'
        State: '{{ item.State }}'
        Status: '{{ item.Status }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.organizations.list_accounts_with_invalid_effective_policy  ──
  - discovery_id: aws.organizations.list_accounts_with_invalid_effective_policy
    calls:
      - action: list_accounts_with_invalid_effective_policy
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Accounts }}'
      item:
        Arn: '{{ item.Arn }}'
        Email: '{{ item.Email }}'
        Id: '{{ item.Id }}'
        JoinedMethod: '{{ item.JoinedMethod }}'
        JoinedTimestamp: '{{ item.JoinedTimestamp }}'
        Name: '{{ item.Name }}'
        State: '{{ item.State }}'
        Status: '{{ item.Status }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.organizations.list_outbound_responsibility_transfers  ──
  - discovery_id: aws.organizations.list_outbound_responsibility_transfers
    calls:
      - action: list_outbound_responsibility_transfers
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ResponsibilityTransfers }}'
      item:
        ActiveHandshakeId: '{{ item.ActiveHandshakeId }}'
        Arn: '{{ item.Arn }}'
        EndTimestamp: '{{ item.EndTimestamp }}'
        Id: '{{ item.Id }}'
        Name: '{{ item.Name }}'
        Source: '{{ item.Source }}'
        StartTimestamp: '{{ item.StartTimestamp }}'
        Status: '{{ item.Status }}'
