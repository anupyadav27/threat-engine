# Auto-generated: minimum discoveries for check rules + inventory identifiers
# Sources: organizations
# 11 ops (10 from checks, +1 for inventory)
version: '1.0'
provider: aws
service: organizations
discovery:
  - calls:
    - action: describe_organization
      on_error: continue
      save_as: response
    discovery_id: aws.organizations.describe_organization
    emit:
      as: item
      item:
        Account: '{{ response.Organization.Account }}'
        Arn: '{{ response.Organization.Arn }}'
        AvailablePolicyTypes: '{{ response.Organization.AvailablePolicyTypes }}'
        FeatureSet: '{{ response.Organization.FeatureSet }}'
        Id: '{{ response.Organization.Id }}'
        MasterAccountArn: '{{ response.Organization.MasterAccountArn }}'
        MasterAccountEmail: '{{ response.Organization.MasterAccountEmail }}'
        MasterAccountId: '{{ response.Organization.MasterAccountId }}'
        Organization: '{{ response.Organization.Organization }}'
  - calls:
    - action: describe_responsibility_transfer
      on_error: continue
      params:
        Id: '{{ item.Id }}'
      save_as: response
    discovery_id: aws.organizations.describe_responsibility_transfer
    emit:
      as: item
      item:
        ActiveHandshakeId: '{{ response.ResponsibilityTransfer.ActiveHandshakeId }}'
        Arn: '{{ response.ResponsibilityTransfer.Arn }}'
        EndTimestamp: '{{ response.ResponsibilityTransfer.EndTimestamp }}'
        Id: '{{ response.ResponsibilityTransfer.Id }}'
        Name: '{{ response.ResponsibilityTransfer.Name }}'
        Source: '{{ response.ResponsibilityTransfer.Source }}'
        StartTimestamp: '{{ response.ResponsibilityTransfer.StartTimestamp }}'
        Status: '{{ response.ResponsibilityTransfer.Status }}'
        Target: '{{ response.ResponsibilityTransfer.Target }}'
        Type: '{{ response.ResponsibilityTransfer.Type }}'
    for_each: aws.organizations.describe_organization
