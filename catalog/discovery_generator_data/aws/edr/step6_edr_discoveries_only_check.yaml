# generated_from: step6_edr.discovery.yaml
# purpose: only discoveries needed by edr.checks.yaml for_each chains
version: '1.0'
provider: aws
service: edr
services:
  client: edr
  module: boto3.client
discovery:
- discovery_id: aws.edr.list_memberships
  calls:
  - action: list_memberships
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      accountId: '{{ response.accountId }}'
      membershipArn: '{{ response.membershipArn }}'
      membershipId: '{{ response.membershipId }}'
      membershipStatus: '{{ response.membershipStatus }}'
      region: '{{ response.region }}'
