version: '1.0'
provider: aws
service: wafv2
services:
  client: wafv2
  module: boto3.client
discovery:
- discovery_id: aws.wafv2.list_ip_sets
  calls:
  - action: list_ip_sets
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.IPSets }}'
    item:
      Id: '{{ item.Id }}'
      Name: '{{ item.Name }}'
      ARN: '{{ item.ARN }}'
      Description: '{{ item.Description }}'
      LockToken: '{{ item.LockToken }}'
