# ==========================================================
# Discovery YAML — wafv2 (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 21 | ops: 5 independent, 0 dependent
# ==========================================================
version: '1.0'
provider: aws
service: wafv2

services:
  client: wafv2
  module: "boto3.client('wafv2')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: ip_set
    identifier_op: aws.wafv2.list_ip_sets
    identifier_field: ARN
    item_var_path: item.ARN
    identifier_template: '{arn}'
  - resource_type: logging_configuration
    identifier_op: aws.wafv2.list_logging_configurations
    identifier_field: ResourceArn
    item_var_path: item.ResourceArn
    identifier_template: '{resourcearn}'
  - resource_type: regex_pattern_set
    identifier_op: aws.wafv2.list_regex_pattern_sets
    identifier_field: ARN
    item_var_path: item.ARN
    identifier_template: '{arn}'
  - resource_type: rule_group
    identifier_op: aws.wafv2.list_rule_groups
    identifier_field: ARN
    item_var_path: item.ARN
    identifier_template: '{arn}'
  - resource_type: web_ac_l
    identifier_op: aws.wafv2.list_web_ac_ls
    identifier_field: ARN
    item_var_path: item.ARN
    identifier_template: '{arn}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.wafv2.list_ip_sets  ──
  - discovery_id: aws.wafv2.list_ip_sets
    calls:
      - action: list_ip_sets
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.IPSets }}'
      item:
        ARN: '{{ item.ARN }}'
        Description: '{{ item.Description }}'
        Id: '{{ item.Id }}'
        LockToken: '{{ item.LockToken }}'
        Name: '{{ item.Name }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.wafv2.list_logging_configurations  ──
  - discovery_id: aws.wafv2.list_logging_configurations
    calls:
      - action: list_logging_configurations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.LoggingConfigurations }}'
      item:
        LogDestinationConfigs: '{{ item.LogDestinationConfigs }}'
        LogScope: '{{ item.LogScope }}'
        LogType: '{{ item.LogType }}'
        LoggingFilter: '{{ item.LoggingFilter }}'
        ManagedByFirewallManager: '{{ item.ManagedByFirewallManager }}'
        RedactedFields: '{{ item.RedactedFields }}'
        ResourceArn: '{{ item.ResourceArn }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.wafv2.list_regex_pattern_sets  ──
  - discovery_id: aws.wafv2.list_regex_pattern_sets
    calls:
      - action: list_regex_pattern_sets
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.RegexPatternSets }}'
      item:
        ARN: '{{ item.ARN }}'
        Description: '{{ item.Description }}'
        Id: '{{ item.Id }}'
        LockToken: '{{ item.LockToken }}'
        Name: '{{ item.Name }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.wafv2.list_rule_groups  ──
  - discovery_id: aws.wafv2.list_rule_groups
    calls:
      - action: list_rule_groups
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.RuleGroups }}'
      item:
        ARN: '{{ item.ARN }}'
        Description: '{{ item.Description }}'
        Id: '{{ item.Id }}'
        LockToken: '{{ item.LockToken }}'
        Name: '{{ item.Name }}'

  # ════ INDEPENDENT (root) operations ════
  # ── aws.wafv2.list_web_ac_ls  ──
  - discovery_id: aws.wafv2.list_web_ac_ls
    calls:
      - action: list_web_ac_ls
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.WebACLs }}'
      item:
        ARN: '{{ item.ARN }}'
        Description: '{{ item.Description }}'
        Id: '{{ item.Id }}'
        LockToken: '{{ item.LockToken }}'
        Name: '{{ item.Name }}'

