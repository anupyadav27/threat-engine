# ==========================================================
# Discovery YAML — elb (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 18 | ops: 1 independent, 1 dependent
# ==========================================================
version: '1.0'
provider: aws
service: elb

services:
  client: elb
  module: "boto3.client('elb')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: load_balancer
    identifier_op: aws.elb.describe_load_balancers
    identifier_field: LoadBalancerArn
    item_var_path: item.LoadBalancerArn
    identifier_template: '{loadbalancerarn}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.elb.describe_load_balancers  ──
  - discovery_id: aws.elb.describe_load_balancers
    calls:
      - action: describe_load_balancers
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.LoadBalancerDescriptions }}'
      item:
        AccessLog: '{{ item.AccessLog }}'
        AvailabilityZones: '{{ item.AvailabilityZones }}'
        BackendServerDescriptions: '{{ item.BackendServerDescriptions }}'
        CanonicalHostedZoneId: '{{ item.CanonicalHostedZoneId }}'
        CreatedTime: '{{ item.CreatedTime }}'
        CustomerOwnedIpv4Pool: '{{ item.CustomerOwnedIpv4Pool }}'
        DNSName: '{{ item.DNSName }}'
        EnablePrefixForIpv6SourceNat: '{{ item.EnablePrefixForIpv6SourceNat }}'
        EnforceSecurityGroupInboundRulesOnPrivateLinkTraffic: '{{ item.EnforceSecurityGroupInboundRulesOnPrivateLinkTraffic }}'
        HealthCheck: '{{ item.HealthCheck }}'
        IpAddressType: '{{ item.IpAddressType }}'
        IpamPools: '{{ item.IpamPools }}'
        ListenerDescriptions: '{{ item.ListenerDescriptions }}'
        ListenerDescriptions[]: '{{ item.ListenerDescriptions[].Listener.Protocol }}'
        ListenerDescriptions[].Listener.Protocol: '{{ item.ListenerDescriptions[].Listener.Protocol }}'
        ListenerDescriptions[].Listener.SSLCertificateId: '{{ item.ListenerDescriptions[].Listener.SSLCertificateId }}'
        LoadBalancerArn: '{{ item.LoadBalancerArn }}'
        LoadBalancerAttributes: '{{ item.LoadBalancerAttributes }}'
        LoadBalancerName: '{{ item.LoadBalancerName }}'
        LoadBalancers: '{{ item.LoadBalancers }}'
        Policies: '{{ item.Policies }}'
        Scheme: '{{ item.Scheme }}'
        SecurityGroups: '{{ item.SecurityGroups }}'
        SourceSecurityGroup: '{{ item.SourceSecurityGroup }}'
        State: '{{ item.State }}'
        Subnets: '{{ item.Subnets }}'
        Tags: '{{ item.Tags }}'
        Type: '{{ item.Type }}'
        VpcId: '{{ item.VpcId }}'
        item: '{{ item }}'
        scheme: '{{ item.scheme }}'

  # ════ DEPENDENT (enrich) operations ════
  # ── aws.elb.describe_load_balancer_attributes [dependent] ──
  - discovery_id: aws.elb.describe_load_balancer_attributes
    for_each: aws.elb.describe_load_balancers
    calls:
      - action: describe_load_balancer_attributes
        params:
          LoadBalancerName: "{{ item.LoadBalancerName }}"
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        AccessLog: '{{ item.AccessLog }}'
        AdditionalAttributes: '{{ item.AdditionalAttributes }}'
        ConnectionDraining: '{{ item.ConnectionDraining }}'
        ConnectionSettings: '{{ item.ConnectionSettings }}'
        CrossZoneLoadBalancing: '{{ item.CrossZoneLoadBalancing }}'
        Key: '{{ item.Key }}'
        LoadBalancerAttributes: '{{ item.LoadBalancerAttributes }}'
        LoadBalancerAttributes.AccessLog.Enabled: '{{ item.LoadBalancerAttributes.AccessLog.Enabled }}'
        Value: '{{ item.Value }}'

