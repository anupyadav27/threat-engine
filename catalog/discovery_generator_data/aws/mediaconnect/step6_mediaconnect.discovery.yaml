      State: '{{ response.RouterInput.State }}'
      Tags: '{{ response.RouterInput.Tags }}'
      AvailabilityZone: '{{ response.RouterInput.AvailabilityZone }}'
      Configuration: '{{ response.RouterInput.Configuration }}'
      CreatedAt: '{{ response.RouterInput.CreatedAt }}'
      InputType: '{{ response.RouterInput.InputType }}'
      IpAddress: '{{ response.RouterInput.IpAddress }}'
      MaintenanceConfiguration: '{{ response.RouterInput.MaintenanceConfiguration }}'
      MaintenanceSchedule: '{{ response.RouterInput.MaintenanceSchedule }}'
