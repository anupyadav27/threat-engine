      RegionName: '{{ response.RouterInput.RegionName }}'
      RoutedOutputs: '{{ response.RouterInput.RoutedOutputs }}'
      RoutingScope: '{{ response.RouterInput.RoutingScope }}'
      StreamDetails: '{{ response.RouterInput.StreamDetails }}'
      Tier: '{{ response.RouterInput.Tier }}'
      TransitEncryption: '{{ response.RouterInput.TransitEncryption }}'
