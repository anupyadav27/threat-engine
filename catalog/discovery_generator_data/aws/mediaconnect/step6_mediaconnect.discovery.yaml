      MaintenanceType: '{{ response.RouterInput.MaintenanceType }}'
      MaximumBitrate: '{{ response.RouterInput.MaximumBitrate }}'
      MaximumRoutedOutputs: '{{ response.RouterInput.MaximumRoutedOutputs }}'
