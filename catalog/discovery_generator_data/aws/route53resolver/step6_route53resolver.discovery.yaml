    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.FirewallConfigs }}'
    item:
      Id: '{{ item.Id }}'
      OwnerId: '{{ item.OwnerId }}'
      ResourceId: '{{ item.ResourceId }}'
      FirewallConfig: '{{ item.FirewallConfig }}'
      FirewallFailOpen: '{{ item.FirewallFailOpen }}'
      ResolverConfig: '{{ item.ResolverConfig }}'
      ResolverDNSSECConfig: '{{ item.ResolverDNSSECConfig }}'
