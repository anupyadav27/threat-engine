version: '1.0'
provider: aws
service: pinpoint
services:
  client: pinpoint
  module: boto3.client
discovery:
- discovery_id: aws.pinpoint.get_apps
  calls:
  - action: get_apps
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      ApplicationsResponse: '{{ response.ApplicationsResponse.ApplicationsResponse
        }}'
      Item: '{{ response.ApplicationsResponse.Item[].Id }}'
- discovery_id: aws.pinpoint.get_recommender_configurations
  calls:
  - action: get_recommender_configurations
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      Status: '{{ response.ListRecommenderConfigurationsResponse.Item[].Name }}'
      Item: '{{ response.ListRecommenderConfigurationsResponse.Item[].Id }}'
      ListRecommenderConfigurationsResponse: '{{ response.ListRecommenderConfigurationsResponse.ListRecommenderConfigurationsResponse
        }}'
- discovery_id: aws.pinpoint.list_templates
