# ==========================================================
# Discovery YAML — mediatailor (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 1 | ops: 0 independent, 1 dependent
# ==========================================================
version: '1.0'
provider: aws
service: mediatailor

services:
  client: mediatailor
  module: "boto3.client('mediatailor')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  []

checks: []

discovery:

  # ════ DEPENDENT (enrich) operations ════
  # ── aws.mediatailor.get_playback_configuration [dependent] ──
  - discovery_id: aws.mediatailor.get_playback_configuration
    for_each: aws.mediatailor.list_playback_configurations
    calls:
      - action: get_playback_configuration
        params:
          Name: "{{ item.Name }}"
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        FillPolicy: '{{ item.FillPolicy }}'
        Mode: '{{ item.Mode }}'
        Tags: '{{ item.Tags }}'
        Value: '{{ item.Value }}'

