# ==========================================================
# Discovery YAML — lakeformation (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 3 | ops: 1 independent, 0 dependent
# ==========================================================
version: '1.0'
provider: aws
service: lakeformation

services:
  client: lakeformation
  module: "boto3.client('lakeformation')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: get_data_lake_setting
    identifier_op: aws.lakeformation.get_data_lake_settings
    identifier_field: DestinationArn
    item_var_path: item.DestinationArn
    identifier_template: '{destinationarn}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.lakeformation.get_data_lake_settings  ──
  - discovery_id: aws.lakeformation.get_data_lake_settings
    calls:
      - action: get_data_lake_settings
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        AllowExternalDataFiltering: '{{ item.AllowExternalDataFiltering }}'
        AllowFullTableExternalDataAccess: '{{ item.AllowFullTableExternalDataAccess }}'
        AuthorizedSessionTagValueList: '{{ item.AuthorizedSessionTagValueList }}'
        CreateDatabaseDefaultPermissions: '{{ item.CreateDatabaseDefaultPermissions }}'
        CreateTableDefaultPermissions: '{{ item.CreateTableDefaultPermissions }}'
        DataLakeAdmins: '{{ item.DataLakeAdmins }}'
        DataLakeSettings: '{{ item.DataLakeSettings }}'
        DestinationArn: '{{ item.DestinationArn }}'
        Enabled: '{{ item.Enabled }}'
        ExternalDataFilteringAllowList: '{{ item.ExternalDataFilteringAllowList }}'
        Format: '{{ item.Format }}'
        Level: '{{ item.Level }}'
        Parameters: '{{ item.Parameters }}'
        ReadOnlyAdmins: '{{ item.ReadOnlyAdmins }}'
        TrustedResourceOwners: '{{ item.TrustedResourceOwners }}'

