version: '1.0'
provider: aws
service: networkmanager
services:
  client: networkmanager
  module: boto3.client
discovery:
- discovery_id: aws.networkmanager.describe_global_networks
  calls:
  - action: describe_global_networks
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.GlobalNetworks }}'
    item:
      State: '{{ item.State }}'
      Tags: '{{ item.Tags }}'
      CreatedAt: '{{ item.CreatedAt }}'
      Description: '{{ item.Description }}'
      GlobalNetworkArn: '{{ item.GlobalNetworkArn }}'
      GlobalNetworkId: '{{ item.GlobalNetworkId }}'
      GlobalNetworks: '{{ item.GlobalNetworks }}'
- discovery_id: aws.networkmanager.list_attachments
  calls:
  - action: list_attachments
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Attachments }}'
    item:
      ResourceArn: '{{ item.ResourceArn }}'
      State: '{{ item.State }}'
      Tags: '{{ item.Tags }}'
      AttachmentId: '{{ item.AttachmentId }}'
      AttachmentPolicyRuleNumber: '{{ item.AttachmentPolicyRuleNumber }}'
      AttachmentType: '{{ item.AttachmentType }}'
      CoreNetworkArn: '{{ item.CoreNetworkArn }}'
      CoreNetworkId: '{{ item.CoreNetworkId }}'
      CreatedAt: '{{ item.CreatedAt }}'
      EdgeLocation: '{{ item.EdgeLocation }}'
      EdgeLocations: '{{ item.EdgeLocations }}'
      LastModificationErrors: '{{ item.LastModificationErrors }}'
      NetworkFunctionGroupName: '{{ item.NetworkFunctionGroupName }}'
      OwnerAccountId: '{{ item.OwnerAccountId }}'
      ProposedNetworkFunctionGroupChange: '{{ item.ProposedNetworkFunctionGroupChange }}'
      ProposedSegmentChange: '{{ item.ProposedSegmentChange }}'
      SegmentName: '{{ item.SegmentName }}'
      Statement: '{{ item.Statement }}'
      UpdatedAt: '{{ item.UpdatedAt }}'
      Version: '{{ item.Version }}'
- discovery_id: aws.networkmanager.list_connect_peers
  calls:
  - action: list_connect_peers
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ConnectPeers }}'
    item:
      Tags: '{{ item.Tags }}'
      ConnectAttachmentId: '{{ item.ConnectAttachmentId }}'
      ConnectPeerId: '{{ item.ConnectPeerId }}'
      ConnectPeerState: '{{ item.ConnectPeerState }}'
      CoreNetworkId: '{{ item.CoreNetworkId }}'
      CreatedAt: '{{ item.CreatedAt }}'
      EdgeLocation: '{{ item.EdgeLocation }}'
      SubnetArn: '{{ item.SubnetArn }}'
- discovery_id: aws.networkmanager.list_core_networks
  calls:
  - action: list_core_networks
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.CoreNetworks }}'
    item:
      State: '{{ item.State }}'
      Tags: '{{ item.Tags }}'
      CoreNetworkArn: '{{ item.CoreNetworkArn }}'
      CoreNetworkId: '{{ item.CoreNetworkId }}'
      Description: '{{ item.Description }}'
      GlobalNetworkId: '{{ item.GlobalNetworkId }}'
      OwnerAccountId: '{{ item.OwnerAccountId }}'
- discovery_id: aws.networkmanager.list_organization_service_access_status
  calls:
  - action: list_organization_service_access_status
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      AccountStatusList: '{{ response.OrganizationStatus.AccountStatusList[].AccountId }}'
      OrganizationAwsServiceAccessStatus: '{{ response.OrganizationStatus.OrganizationAwsServiceAccessStatus }}'
      OrganizationId: '{{ response.OrganizationStatus.OrganizationId }}'
      SLRDeploymentStatus: '{{ response.OrganizationStatus.SLRDeploymentStatus }}'
- discovery_id: aws.networkmanager.list_peerings
  calls:
