    items_for: '{{ response.RuleGroups }}'
    item:
      Name: '{{ item.Name }}'
      RuleGroupId: '{{ item.RuleGroupId }}'
- discovery_id: aws.waf.list_web_ac_ls
  calls:
  - action: list_web_ac_ls
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.WebACLs }}'
    item:
