version: '1.0'
provider: aws
service: mediapackage
services:
  client: mediapackage
  module: boto3.client
discovery:
- discovery_id: aws.mediapackage.list_channels
  calls:
  - action: list_channels
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Channels }}'
    item:
      Arn: '{{ item.Arn }}'
      Id: '{{ item.Id }}'
      Tags: '{{ item.Tags }}'
      CreatedAt: '{{ item.CreatedAt }}'
      Description: '{{ item.Description }}'
      EgressAccessLogs: '{{ item.EgressAccessLogs }}'
      HlsIngest: '{{ item.HlsIngest }}'
      IngressAccessLogs: '{{ item.IngressAccessLogs }}'
- discovery_id: aws.mediapackage.list_harvest_jobs
  calls:
  - action: list_harvest_jobs
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.HarvestJobs }}'
    item:
      Arn: '{{ item.Arn }}'
      Id: '{{ item.Id }}'
      Status: '{{ item.Status }}'
      ChannelId: '{{ item.ChannelId }}'
      CreatedAt: '{{ item.CreatedAt }}'
      EndTime: '{{ item.EndTime }}'
      OriginEndpointId: '{{ item.OriginEndpointId }}'
      S3Destination: '{{ item.S3Destination }}'
      StartTime: '{{ item.StartTime }}'
- discovery_id: aws.mediapackage.list_origin_endpoints
  calls:
  - action: list_origin_endpoints
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.OriginEndpoints }}'
    item:
      Arn: '{{ item.Arn }}'
      Id: '{{ item.Id }}'
      Tags: '{{ item.Tags }}'
      Authorization: '{{ item.Authorization }}'
      ChannelId: '{{ item.ChannelId }}'
      CmafPackage: '{{ item.CmafPackage }}'
      CreatedAt: '{{ item.CreatedAt }}'
      DashPackage: '{{ item.DashPackage }}'
      Description: '{{ item.Description }}'
      HlsPackage: '{{ item.HlsPackage }}'
      ManifestName: '{{ item.ManifestName }}'
      MssPackage: '{{ item.MssPackage }}'
      Origination: '{{ item.Origination }}'
      StartoverWindowSeconds: '{{ item.StartoverWindowSeconds }}'
      TimeDelaySeconds: '{{ item.TimeDelaySeconds }}'
      Url: '{{ item.Url }}'
      Whitelist: '{{ item.Whitelist }}'
- discovery_id: aws.mediapackage.describe_channel
  for_each: aws.mediapackage.list_channels
  calls:
  - action: describe_channel
    params:
      Id: '{{ item.Id }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      LogGroupName: '{{ response.EgressAccessLogs.LogGroupName }}'
      Arn: '{{ response.Arn }}'
      CreatedAt: '{{ response.CreatedAt }}'
      Description: '{{ response.Description }}'
      Id: '{{ response.Id }}'
      Tags: '{{ response.Tags }}'
- discovery_id: aws.mediapackage.describe_harvest_job
  for_each: aws.mediapackage.list_channels
  calls:
  - action: describe_harvest_job
    params:
      Id: '{{ item.Id }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      RoleArn: '{{ response.S3Destination.RoleArn }}'
      BucketName: '{{ response.S3Destination.BucketName }}'
      ManifestKey: '{{ response.S3Destination.ManifestKey }}'
      Arn: '{{ response.Arn }}'
      ChannelId: '{{ response.ChannelId }}'
      CreatedAt: '{{ response.CreatedAt }}'
      EndTime: '{{ response.EndTime }}'
      Id: '{{ response.Id }}'
      OriginEndpointId: '{{ response.OriginEndpointId }}'
      StartTime: '{{ response.StartTime }}'
      Status: '{{ response.Status }}'
- discovery_id: aws.mediapackage.describe_origin_endpoint
  for_each: aws.mediapackage.list_channels
  calls:
  - action: describe_origin_endpoint
    params:
      Id: '{{ item.Id }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Whitelist }}'
    item:
      Arn: '{{ response.Arn }}'
      CdnIdentifierSecret: '{{ response.Authorization.CdnIdentifierSecret }}'
      SecretsRoleArn: '{{ response.Authorization.SecretsRoleArn }}'
      ChannelId: '{{ response.ChannelId }}'
      ConstantInitializationVector: '{{ response.CmafPackage.Encryption.ConstantInitializationVector }}'
      EncryptionMethod: '{{ response.CmafPackage.Encryption.EncryptionMethod }}'
      KeyRotationIntervalSeconds: '{{ response.CmafPackage.Encryption.KeyRotationIntervalSeconds }}'
      CertificateArn: '{{ response.CmafPackage.Encryption.SpekeKeyProvider.CertificateArn }}'
      PresetSpeke20Audio: '{{ response.CmafPackage.Encryption.SpekeKeyProvider.EncryptionContractConfiguration.PresetSpeke20Audio }}'
      PresetSpeke20Video: '{{ response.CmafPackage.Encryption.SpekeKeyProvider.EncryptionContractConfiguration.PresetSpeke20Video }}'
      ResourceId: '{{ response.CmafPackage.Encryption.SpekeKeyProvider.ResourceId }}'
      RoleArn: '{{ response.CmafPackage.Encryption.SpekeKeyProvider.RoleArn }}'
      Url: '{{ response.CmafPackage.Encryption.SpekeKeyProvider.Url }}'
      SegmentDurationSeconds: '{{ response.CmafPackage.SegmentDurationSeconds }}'
      SegmentPrefix: '{{ response.CmafPackage.SegmentPrefix }}'
      MaxVideoBitsPerSecond: '{{ response.CmafPackage.StreamSelection.MaxVideoBitsPerSecond }}'
      MinVideoBitsPerSecond: '{{ response.CmafPackage.StreamSelection.MinVideoBitsPerSecond }}'
      StreamOrder: '{{ response.CmafPackage.StreamSelection.StreamOrder }}'
      CreatedAt: '{{ response.CreatedAt }}'
      AdsOnDeliveryRestrictions: '{{ response.DashPackage.AdsOnDeliveryRestrictions }}'
      IncludeIframeOnlyStream: '{{ response.DashPackage.IncludeIframeOnlyStream }}'
      ManifestLayout: '{{ response.DashPackage.ManifestLayout }}'
      ManifestWindowSeconds: '{{ response.DashPackage.ManifestWindowSeconds }}'
      MinBufferTimeSeconds: '{{ response.DashPackage.MinBufferTimeSeconds }}'
      MinUpdatePeriodSeconds: '{{ response.DashPackage.MinUpdatePeriodSeconds }}'
      Profile: '{{ response.DashPackage.Profile }}'
      SegmentTemplateFormat: '{{ response.DashPackage.SegmentTemplateFormat }}'
      SuggestedPresentationDelaySeconds: '{{ response.DashPackage.SuggestedPresentationDelaySeconds }}'
      UtcTiming: '{{ response.DashPackage.UtcTiming }}'
      UtcTimingUri: '{{ response.DashPackage.UtcTimingUri }}'
      Description: '{{ response.Description }}'
      AdMarkers: '{{ response.HlsPackage.AdMarkers }}'
      RepeatExtXKey: '{{ response.HlsPackage.Encryption.RepeatExtXKey }}'
      IncludeDvbSubtitles: '{{ response.HlsPackage.IncludeDvbSubtitles }}'
      PlaylistType: '{{ response.HlsPackage.PlaylistType }}'
      PlaylistWindowSeconds: '{{ response.HlsPackage.PlaylistWindowSeconds }}'
      ProgramDateTimeIntervalSeconds: '{{ response.HlsPackage.ProgramDateTimeIntervalSeconds }}'
      UseAudioRenditionGroup: '{{ response.HlsPackage.UseAudioRenditionGroup }}'
      Id: '{{ response.Id }}'
      ManifestName: '{{ response.ManifestName }}'
      Origination: '{{ response.Origination }}'
      StartoverWindowSeconds: '{{ response.StartoverWindowSeconds }}'
      Tags: '{{ response.Tags }}'
      TimeDelaySeconds: '{{ response.TimeDelaySeconds }}'
- discovery_id: aws.mediapackage.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      Tags: '{{ response.Tags }}'
