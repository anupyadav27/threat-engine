# ==========================================================
# Discovery YAML — mediapackage (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 1 | ops: 1 independent, 0 dependent
# ==========================================================
version: '1.0'
provider: aws
service: mediapackage

services:
  client: mediapackage
  module: "boto3.client('mediapackage')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: channel
    identifier_op: aws.mediapackage.list_origin_endpoints
    identifier_field: Arn
    item_var_path: item.Arn
    identifier_template: '{arn}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.mediapackage.list_origin_endpoints  ──
  - discovery_id: aws.mediapackage.list_origin_endpoints
    calls:
      - action: list_origin_endpoints
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.OriginEndpoints }}'
      item:
        Arn: '{{ item.Arn }}'
        Authorization: '{{ item.Authorization }}'
        ChannelId: '{{ item.ChannelId }}'
        CmafPackage: '{{ item.CmafPackage }}'
        CreatedAt: '{{ item.CreatedAt }}'
        DashPackage: '{{ item.DashPackage }}'
        Description: '{{ item.Description }}'
        HlsPackage: '{{ item.HlsPackage }}'
        Id: '{{ item.Id }}'
        ManifestName: '{{ item.ManifestName }}'
        MssPackage: '{{ item.MssPackage }}'
        Origination: '{{ item.Origination }}'
        StartoverWindowSeconds: '{{ item.StartoverWindowSeconds }}'
        Tags: '{{ item.Tags }}'
        TimeDelaySeconds: '{{ item.TimeDelaySeconds }}'
        Url: '{{ item.Url }}'
        Whitelist: '{{ item.Whitelist }}'

