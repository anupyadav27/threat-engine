# ==========================================================
# Discovery YAML — mq (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 6 | ops: 1 independent, 1 dependent
# ==========================================================
version: '1.0'
provider: aws
service: mq

services:
  client: mq
  module: "boto3.client('mq')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: broker
    identifier_op: aws.mq.list_brokers
    identifier_field: BrokerArn
    item_var_path: item.BrokerArn
    identifier_template: '{brokerarn}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.mq.list_brokers  ──
  - discovery_id: aws.mq.list_brokers
    calls:
      - action: list_brokers
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.BrokerSummaries }}'
      item:
        BrokerArn: '{{ item.BrokerArn }}'
        BrokerId: '{{ item.BrokerId }}'
        BrokerName: '{{ item.BrokerName }}'
        BrokerState: '{{ item.BrokerState }}'
        Created: '{{ item.Created }}'
        DeploymentMode: '{{ item.DeploymentMode }}'
        EngineType: '{{ item.EngineType }}'
        HostInstanceType: '{{ item.HostInstanceType }}'
        PendingAuthenticationStrategy: '{{ item.PendingAuthenticationStrategy }}'
        PendingHostInstanceType: '{{ item.PendingHostInstanceType }}'
        item: '{{ item }}'

  # ════ DEPENDENT (enrich) operations ════
  # ── aws.mq.describe_broker [dependent] ──
  - discovery_id: aws.mq.describe_broker
    for_each: aws.mq.list_brokers
    calls:
      - action: describe_broker
        params:
          BrokerId: "{{ item.BrokerId }}"
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ActionsRequired }}'
      item:
        ActionRequiredCode: '{{ item.ActionRequiredCode }}'
        ActionRequiredInfo: '{{ item.ActionRequiredInfo }}'
        Logs: '{{ item.Logs }}'
        Logs.General: '{{ item.Logs.General }}'
        PendingAuthenticationStrategy: '{{ item.PendingAuthenticationStrategy }}'
        PendingHostInstanceType: '{{ item.PendingHostInstanceType }}'

