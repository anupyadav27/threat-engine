# ==========================================================
# Discovery YAML — codeartifact (final_discovery v1)
# Generated from: aws_field_rule_catalog.csv
# Check rules: 2 | ops: 1 independent, 0 dependent
# ==========================================================
version: '1.0'
provider: aws
service: codeartifact

services:
  client: codeartifact
  module: "boto3.client('codeartifact')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: repository
    identifier_op: aws.codeartifact.describe_repository
    identifier_field: arn
    item_var_path: item.arn
    identifier_template: '{arn}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── aws.codeartifact.describe_repository  ──
  - discovery_id: aws.codeartifact.describe_repository
    calls:
      - action: describe_repository
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        Tags: '{{ item.Tags }}'
        administratorAccount: '{{ item.administratorAccount }}'
        arn: '{{ item.arn }}'
        createdTime: '{{ item.createdTime }}'
        description: '{{ item.description }}'
        domainName: '{{ item.domainName }}'
        domainOwner: '{{ item.domainOwner }}'
        externalConnections: '{{ item.externalConnections }}'
        name: '{{ item.name }}'
        upstreams: '{{ item.upstreams }}'

