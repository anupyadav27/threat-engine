version: '1.0'
provider: database
engine: sql_server
category: section_5
cis_section: '5'
description: >
  sql_server CIS Section 5 — 'Maximum number of error log files' is set to greater than or equal to '12'

discovery:

  - discovery_id: sql_server.section_5.maximum_number_of_error_log_files_is_set_to
    description: Ensure 'Maximum number of error log files' is set to greater than or equal to '12'
    calls:


      - action: query_setting
        query: "select Configure . 4. Verify the Limit the number of error log files before they are recycled checkbox is checked 5. Verify the Maximum number of error log files is greater than or equal to 12, if a limit is configured. T-SQL Method Run the following T-SQL. The NumberOfLogFiles returned should be greater than or equal to 12, or equal to -1 if no limit is configured. DECLARE @NumErrorLogs int;"
        save_as: result
    emit:
      as: item
      item:
        check: maximum_number_of_error_log_files_is_set_to
        setting_name: maximum_number_of_error_log_files_is_set_to
        value: "{{ result.value }}"
        expected: ""


