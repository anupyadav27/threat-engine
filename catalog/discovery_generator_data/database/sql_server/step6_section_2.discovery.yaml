version: '1.0'
provider: database
engine: sql_server
category: section_2
cis_section: '2'
description: >
  sql_server CIS Section 2 — 'Ad Hoc Distributed Queries' Server Configuration Option is set to '0'

discovery:

  - discovery_id: sql_server.section_2.ad_hoc_distributed_queries_server_configuration
    description: Ensure 'Ad Hoc Distributed Queries' Server Configuration Option is set to '0'
    calls:


      - action: query_setting
        query: "SELECT name, CAST(value as int) as value_configured, CAST(value_in_use as int) as value_in_use FROM sys.configurations WHERE name = 'Ad Hoc Distributed Queries';"
        save_as: result
    emit:
      as: item
      item:
        check: ad_hoc_distributed_queries_server_configuration
        setting_name: ad_hoc_distributed_queries_server_configuration
        value: "{{ result.value }}"
        expected: ""


  - discovery_id: sql_server.section_2.clr_enabled_server_configuration_option_is_set_to
    description: Ensure 'CLR Enabled' Server Configuration Option is set to '0'
    calls:


      - action: query_setting
        query: "SELECT name, CAST(value as int) as value_configured, CAST(value_in_use as int) as value_in_use FROM sys.configurations WHERE name = 'clr strict security';"
        save_as: result
    emit:
      as: item
      item:
        check: clr_enabled_server_configuration_option_is_set_to
        setting_name: clr_enabled_server_configuration_option_is_set_to
        value: "{{ result.value }}"
        expected: ""


