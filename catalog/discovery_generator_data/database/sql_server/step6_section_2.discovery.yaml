  - discovery_id: sql_server.section_2.sql_server_is_configured_to_use_non_standard_ports
    description: Ensure SQL Server is configured to use non-standard ports
    calls:


      - action: query_setting
        query: "select value_data from sys.dm_server_registry where value_name = 'ListenOnAllIPs') = 1 SELECT count(*) FROM sys.dm_server_registry WHERE registry_key like '%IPAll%' and value_name like '%Tcp%' and value_data='1433' ELSE SELECT count(*) FROM sys.dm_server_registry WHERE value_name like '%Tcp%' and value_data='1433';"
        save_as: result
    emit:
      as: item
      item:
        check: sql_server_is_configured_to_use_non_standard_ports
        setting_name: sql_server_is_configured_to_use_non_standard_ports
        value: "{{ result.value }}"
        expected: ""


  - discovery_id: sql_server.section_2.hide_instance_option_is_set_to_yes_for_production
    description: Ensure 'Hide Instance' option is set to 'Yes' for Production SQL Server instances
    calls:


      - action: query_setting
        query: "select Properties . 2. On the Flags tab, in the Hide Instance box, if Yes is selected, it is compliant. T-SQL Method Execute the following T-SQL. DECLARE @getValue INT;"
        save_as: result
    emit:
      as: item
      item:
        check: hide_instance_option_is_set_to_yes_for_production
        setting_name: hide_instance_option_is_set_to_yes_for_production
        value: "{{ result.value }}"
        expected: ""


  - discovery_id: sql_server.section_2.auto_close_is_set_to_off_on_contained_databases
    description: Ensure 'AUTO_CLOSE' is set to 'OFF' on contained databases
    calls:


      - action: query_setting
        query: "SELECT name, containment, containment_desc, is_auto_close_on FROM sys.databases WHERE containment <> 0 and is_auto_close_on = 1;"
        save_as: result
    emit:
      as: item
      item:
        check: auto_close_is_set_to_off_on_contained_databases
        setting_name: auto_close_is_set_to_off_on_contained_databases
        value: "{{ result.value }}"
        expected: ""


