version: '1.0'
provider: database
engine: postgresql
category: section_8
cis_section: '8'
description: >
  postgresql CIS Section 8 — backup and restore tool, 'pgBackRest', is installed and configured

discovery:

  - discovery_id: postgresql.section_8.backup_and_restore_tool_pgbackrest_is_installed
    description: Ensure the backup and restore tool, 'pgBackRest', is installed and configured
    calls:


      - action: query_setting
        query: "SELECT current_setting('backup_and_restore_tool_pgbackrest_is_installed');"
        save_as: result
    emit:
      as: item
      item:
        check: backup_and_restore_tool_pgbackrest_is_installed
        setting_name: backup_and_restore_tool_pgbackrest_is_installed
        value: "{{ result.value }}"
        expected: ""


