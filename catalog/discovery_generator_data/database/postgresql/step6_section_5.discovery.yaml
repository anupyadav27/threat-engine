version: '1.0'
provider: database
engine: postgresql
category: section_5
cis_section: '5'
description: >
  postgresql CIS Section 5 — per-account connection limits are used

discovery:

  - discovery_id: postgresql.section_5.per_account_connection_limits_are_used
    description: Ensure per-account connection limits are used
    calls:


      - action: query_setting
        query: "SELECT rolname, rolconnlimit FROM pg_roles WHERE rolname NOT LIKE 'pg_%';"
        save_as: result
    emit:
      as: item
      item:
        check: per_account_connection_limits_are_used
        setting_name: per_account_connection_limits_are_used
        value: "{{ result.value }}"
        expected: ""


