version: '1.0'
provider: database
engine: postgresql
category: section_3
cis_section: '3'
description: >
  postgresql CIS Section 3 — log destinations are set correctly

discovery:

  - discovery_id: postgresql.section_3.log_destinations_are_set_correctly
    description: Ensure the log destinations are set correctly
    calls:


      - action: query_setting
        query: "SELECT current_setting('log_destination');"
        save_as: result
    emit:
      as: item
      item:
        check: log_destinations_are_set_correctly
        setting_name: log_destination
        value: "{{ result.value }}"
        expected: ""


