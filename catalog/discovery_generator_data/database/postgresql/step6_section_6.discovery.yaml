version: '1.0'
provider: database
engine: postgresql
category: section_6
cis_section: '6'
description: >
  postgresql CIS Section 6 — FIPS 140-2 OpenSSL Cryptography Is Used

discovery:

  - discovery_id: postgresql.section_6.fips_140_2_openssl_cryptography_is_used
    description: Ensure FIPS 140-2 OpenSSL Cryptography Is Used
    calls:


      - action: query_setting
        query: "SELECT current_setting('fips_140_2_openssl_cryptography_is_used');"
        save_as: result
    emit:
      as: item
      item:
        check: fips_140_2_openssl_cryptography_is_used
        setting_name: fips_140_2_openssl_cryptography_is_used
        value: "{{ result.value }}"
        expected: ""


  - discovery_id: postgresql.section_6.tls_is_enabled_and_configured_correctly
    description: Ensure TLS is enabled and configured correctly
    calls:


      - action: query_setting
        query: "SELECT from system catalog view pg_settings as illustrated below. In both cases, ssl is off;"
        save_as: result
    emit:
      as: item
      item:
        check: tls_is_enabled_and_configured_correctly
        setting_name: ssl
        value: "{{ result.value }}"
        expected: ""


  - discovery_id: postgresql.section_6.tlsv1_3_or_later_is_configured
    description: Ensure that TLSv1.3, or later, is configured
    calls:


      - action: query_setting
        query: "SELECT current_setting('ssl_min_protocol_version');"
        save_as: result
    emit:
      as: item
      item:
        check: tlsv1_3_or_later_is_configured
        setting_name: ssl_min_protocol_version
        value: "{{ result.value }}"
        expected: ""


  - discovery_id: postgresql.section_6.weak_ssl_tls_ciphers_are_disabled
    description: Ensure Weak SSL/TLS Ciphers Are Disabled
    calls:


      - action: query_setting
        query: "SELECT current_setting('weak_ssl_tls_ciphers_are_disabled');"
        save_as: result
    emit:
      as: item
      item:
        check: weak_ssl_tls_ciphers_are_disabled
        setting_name: weak_ssl_tls_ciphers_are_disabled
        value: "{{ result.value }}"
        expected: ""


  - discovery_id: postgresql.section_6.pgcrypto_extension_is_installed_and_configured
    description: Ensure the pgcrypto extension is installed and configured correctly
    calls:


      - action: query_setting
        query: "SELECT * FROM pg_available_extensions WHERE name='pgcrypto';"
        save_as: result
    emit:
      as: item
      item:
        check: pgcrypto_extension_is_installed_and_configured
        setting_name: pgcrypto_extension_is_installed_and_configured
        value: "{{ result.value }}"
        expected: ""


  - discovery_id: postgresql.section_6.tlsv1_0_and_tlsv1_1_protocols_are_disabled
    description: Ensure the TLSv1.0 and TLSv1.1 Protocols are Disabled
    calls:


      - action: query_setting
        query: "SELECT current_setting('ssl_min_protocol_version');"
        save_as: result
    emit:
      as: item
      item:
        check: tlsv1_0_and_tlsv1_1_protocols_are_disabled
        setting_name: ssl_min_protocol_version
        value: "{{ result.value }}"
        expected: ""


