version: '1.0'
provider: database
engine: postgresql
category: section_1
cis_section: '1'
description: >
  postgresql CIS Section 1 — systemd Service Files Are Enabled

discovery:

  - discovery_id: postgresql.section_1.systemd_service_files_are_enabled
    description: Ensure systemd Service Files Are Enabled
    calls:


      - action: query_setting
        query: "SELECT current_setting('systemd_service_files_are_enabled');"
        save_as: result
    emit:
      as: item
      item:
        check: systemd_service_files_are_enabled
        setting_name: systemd_service_files_are_enabled
        value: "{{ result.value }}"
        expected: ""


  - discovery_id: postgresql.section_1.data_cluster_initialized_successfully
    description: Ensure Data Cluster Initialized Successfully
    calls:


      - action: query_setting
        query: "SELECT current_setting('data_cluster_initialized_successfully');"
        save_as: result
    emit:
      as: item
      item:
        check: data_cluster_initialized_successfully
        setting_name: data_cluster_initialized_successfully
        value: "{{ result.value }}"
        expected: ""


  - discovery_id: postgresql.section_1.pgpassword_is_not_set_in_users_profiles
    description: Verify That 'PGPASSWORD' is Not Set in Users' Profiles
    calls:


      - action: query_setting
        query: "SELECT current_setting('pgpassword_is_not_set_in_users_profiles');"
        save_as: result
    emit:
      as: item
      item:
        check: pgpassword_is_not_set_in_users_profiles
        setting_name: pgpassword_is_not_set_in_users_profiles
        value: "{{ result.value }}"
        expected: ""


  - discovery_id: postgresql.section_1.the_pgpassword_environment_variable_is_not_in_use
    description: Verify That the 'PGPASSWORD' Environment Variable is Not in Use
    calls:


      - action: query_setting
        query: "SELECT current_setting('the_pgpassword_environment_variable_is_not_in_use');"
        save_as: result
    emit:
      as: item
      item:
        check: the_pgpassword_environment_variable_is_not_in_use
        setting_name: the_pgpassword_environment_variable_is_not_in_use
        value: "{{ result.value }}"
        expected: ""


