version: '1.0'
provider: database
engine: postgresql
category: section_2
cis_section: '2'
description: >
  postgresql CIS Section 2 — extension directory has appropriate ownership and permissions

discovery:

  - discovery_id: postgresql.section_2.extension_directory_has_appropriate_ownership_and
    description: Ensure extension directory has appropriate ownership and permissions
    calls:


      - action: query_setting
        query: "SELECT current_setting('extension_directory_has_appropriate_ownership_and');"
        save_as: result
    emit:
      as: item
      item:
        check: extension_directory_has_appropriate_ownership_and
        setting_name: extension_directory_has_appropriate_ownership_and
        value: "{{ result.value }}"
        expected: ""


  - discovery_id: postgresql.section_2.disable_postgresql_command_history
    description: Disable PostgreSQL Command History
    calls:


      - action: query_setting
        query: "SELECT current_setting('disable_postgresql_command_history');"
        save_as: result
    emit:
      as: item
      item:
        check: disable_postgresql_command_history
        setting_name: disable_postgresql_command_history
        value: "{{ result.value }}"
        expected: ""


