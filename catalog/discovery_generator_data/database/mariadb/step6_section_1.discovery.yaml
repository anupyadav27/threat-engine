version: '1.0'
provider: database
engine: mariadb
category: section_1
cis_section: '1'
description: >
  mariadb CIS Section 1 — the MYSQL_PWD Environment Variable is Not in Use

discovery:

  - discovery_id: mariadb.section_1.the_mysql_pwd_environment_variable_is_not_in_use
    description: Verify That the MYSQL_PWD Environment Variable is Not in Use
    calls:


      - action: query_setting
        query: "SHOW VARIABLES LIKE 'the_mysql_pwd_environment_variable_is_not_in_use';"
        save_as: result
    emit:
      as: item
      item:
        check: the_mysql_pwd_environment_variable_is_not_in_use
        setting_name: "the_mysql_pwd_environment_variable_is_not_in_use"
        value: "{{ result.value }}"
        expected: ""


  - discovery_id: mariadb.section_1.mysql_pwd_is_not_set_in_users_profiles
    description: Verify That 'MYSQL_PWD' is Not Set in Users' Profiles
    calls:


      - action: query_setting
        query: "SHOW VARIABLES LIKE 'mysql_pwd_is_not_set_in_users_profiles';"
        save_as: result
    emit:
      as: item
      item:
        check: mysql_pwd_is_not_set_in_users_profiles
        setting_name: "mysql_pwd_is_not_set_in_users_profiles"
        value: "{{ result.value }}"
        expected: ""


