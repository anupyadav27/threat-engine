version: '1.0'
provider: database
engine: mariadb
category: section_2
cis_section: '2'
description: >
  mariadb CIS Section 2 — Point-in-Time Recovery

discovery:

  - discovery_id: mariadb.section_2.point_in_time_recovery
    description: Point-in-Time Recovery
    calls:


      - action: query_setting
        query: "SELECT VARIABLE_NAME, VARIABLE_VALUE, 'BINLOG - Log Expiration' as Note FROM information_schema.global_variables where variable_name = 'binlog_expire_logs_seconds';"
        save_as: result
    emit:
      as: item
      item:
        check: point_in_time_recovery
        setting_name: "point_in_time_recovery"
        value: "{{ result.value }}"
        expected: ""


  - discovery_id: mariadb.section_2.password_lifetime_is_less_than_or_equal_to_365
    description: Ensure 'password_lifetime' is Less Than or Equal to '365'
    calls:


      - action: query_setting
        query: "SELECT VARIABLE_NAME, VARIABLE_VALUE FROM information_schema.global_variables where VARIABLE_NAME like 'default_password_lifetime';"
        save_as: result
    emit:
      as: item
      item:
        check: password_lifetime_is_less_than_or_equal_to_365
        setting_name: "password_lifetime_is_less_than_or_equal_to_365"
        value: "{{ result.value }}"
        expected: ""


  - discovery_id: mariadb.section_2.mariadb_is_bound_to_an_ip_address
    description: Ensure MariaDB is Bound to an IP Address
    calls:


      - action: query_setting
        query: "SELECT VARIABLE_NAME, VARIABLE_VALUE FROM information_schema.global_variables WHERE VARIABLE_NAME = 'bind_address';"
        save_as: result
    emit:
      as: item
      item:
        check: mariadb_is_bound_to_an_ip_address
        setting_name: "mariadb_is_bound_to_an_ip_address"
        value: "{{ result.value }}"
        expected: ""


  - discovery_id: mariadb.section_2.limit_accepted_transport_layer_security_tls
    description: Limit Accepted Transport Layer Security (TLS) Versions
    calls:


      - action: query_setting
        query: "select @@tls_version;"
        save_as: result
    emit:
      as: item
      item:
        check: limit_accepted_transport_layer_security_tls
        setting_name: "limit_accepted_transport_layer_security_tls"
        value: "{{ result.value }}"
        expected: ""


  - discovery_id: mariadb.section_2.require_client_side_certificates_x_509
    description: Require Client-Side Certificates (X.509)
    calls:


      - action: query_setting
        query: "select user, host, ssl_type from mysql.user where user not in ('mysql', 'root', 'mariadb.sys');"
        save_as: result
    emit:
      as: item
      item:
        check: require_client_side_certificates_x_509
        setting_name: "require_client_side_certificates_x_509"
        value: "{{ result.value }}"
        expected: ""


  - discovery_id: mariadb.section_2.only_approved_ciphers_are_used
    description: Ensure Only Approved Ciphers are Used
    calls:


      - action: query_setting
        query: "SELECT VARIABLE_NAME, VARIABLE_VALUE FROM information_schema.global_variables WHERE VARIABLE_NAME = 'ssl_cipher';"
        save_as: result
    emit:
      as: item
      item:
        check: only_approved_ciphers_are_used
        setting_name: "only_approved_ciphers_are_used"
        value: "{{ result.value }}"
        expected: ""


  - discovery_id: mariadb.section_2.mariadb_is_bound_to_one_or_more_specific_ip
    description: Ensure MariaDB is Bound to One or More Specific IP Addresses
    calls:


      - action: query_setting
        query: "SELECT VARIABLE_NAME, VARIABLE_VALUE FROM information_schema.global_variables WHERE VARIABLE_NAME = 'bind_address';"
        save_as: result
    emit:
      as: item
      item:
        check: mariadb_is_bound_to_one_or_more_specific_ip
        setting_name: "mariadb_is_bound_to_one_or_more_specific_ip"
        value: "{{ result.value }}"
        expected: ""


