version: '1.0'
provider: database
engine: mariadb
category: section_4
cis_section: '4'
description: >
  mariadb CIS Section 4 — Example or Test Databases are Not Installed on Production Servers

discovery:

  - discovery_id: mariadb.section_4.example_or_test_databases_are_not_installed_on
    description: Ensure Example or Test Databases are Not Installed on Production Servers
    calls:


      - action: query_setting
        query: "SELECT * FROM information_schema.SCHEMATA where SCHEMA_NAME not in ('mysql','information_schema', 'sys', 'performance_schema');"
        save_as: result
    emit:
      as: item
      item:
        check: example_or_test_databases_are_not_installed_on
        setting_name: "example_or_test_databases_are_not_installed_on"
        value: "{{ result.value }}"
        expected: ""


  - discovery_id: mariadb.section_4.allow_suspicious_udfs_is_set_to_off
    description: Ensure 'allow-suspicious-udfs' is Set to 'OFF'
    calls:


      - action: query_setting
        query: "SHOW VARIABLES LIKE 'allow_suspicious_udfs_is_set_to_off';"
        save_as: result
    emit:
      as: item
      item:
        check: allow_suspicious_udfs_is_set_to_off
        setting_name: "allow_suspicious_udfs_is_set_to_off"
        value: "{{ result.value }}"
        expected: ""


  - discovery_id: mariadb.section_4.harden_usage_for_local_infile_on_mariadb_clients
    description: Harden Usage for 'local_infile' on MariaDB Clients
    calls:


      - action: query_setting
        query: "SHOW VARIABLES LIKE 'local_infile';"
        save_as: result
    emit:
      as: item
      item:
        check: harden_usage_for_local_infile_on_mariadb_clients
        setting_name: "local_infile"
        value: "{{ result.value }}"
        expected: ""


  - discovery_id: mariadb.section_4.symbolic_links_are_disabled
    description: Ensure Symbolic Links are Disabled
    calls:


      - action: query_setting
        query: "SHOW VARIABLES LIKE 'have_symlink';"
        save_as: result
    emit:
      as: item
      item:
        check: symbolic_links_are_disabled
        setting_name: "have_symlink"
        value: "{{ result.value }}"
        expected: ""


  - discovery_id: mariadb.section_4.secure_file_priv_is_configured_correctly
    description: Ensure the 'secure_file_priv' is Configured Correctly
    calls:


      - action: query_setting
        query: "SHOW VARIABLES LIKE 'secure_file_priv';"
        save_as: result
    emit:
      as: item
      item:
        check: secure_file_priv_is_configured_correctly
        setting_name: "secure_file_priv"
        value: "{{ result.value }}"
        expected: ""


  - discovery_id: mariadb.section_4.sql_mode_contains_strict_all_tables
    description: Ensure 'sql_mode' Contains 'STRICT_ALL_TABLES'
    calls:


      - action: query_setting
        query: "SHOW VARIABLES LIKE 'sql_mode';"
        save_as: result
    emit:
      as: item
      item:
        check: sql_mode_contains_strict_all_tables
        setting_name: "sql_mode"
        value: "{{ result.value }}"
        expected: ""


  - discovery_id: mariadb.section_4.enable_data_at_rest_encryption_in_mariadb
    description: Enable data-at-rest encryption in MariaDB
    calls:


      - action: query_setting
        query: "SELECT VARIABLE_NAME, VARIABLE_VALUE FROM information_schema.global_variables where variable_name like '%ENCRYPT%' ;"
        save_as: result
    emit:
      as: item
      item:
        check: enable_data_at_rest_encryption_in_mariadb
        setting_name: "enable_data_at_rest_encryption_in_mariadb"
        value: "{{ result.value }}"
        expected: ""


