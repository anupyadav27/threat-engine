version: '1.0'
provider: database
engine: mariadb
category: section_9
cis_section: '9'
description: >
  mariadb CIS Section 9 — 'MASTER_SSL_VERIFY_SERVER_CERT' is enabled

discovery:

  - discovery_id: mariadb.section_9.master_ssl_verify_server_cert_is_enabled
    description: Ensure 'MASTER_SSL_VERIFY_SERVER_CERT' is enabled
    calls:


      - action: query_setting
        query: "SHOW VARIABLES LIKE 'replica';"
        save_as: result
    emit:
      as: item
      item:
        check: master_ssl_verify_server_cert_is_enabled
        setting_name: "replica"
        value: "{{ result.value }}"
        expected: ""


