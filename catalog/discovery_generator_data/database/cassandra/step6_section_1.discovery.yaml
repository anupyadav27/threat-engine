version: '1.0'
provider: database
engine: cassandra
category: section_1
cis_section: '1'
description: >
  cassandra CIS Section 1 — latest version of Java is installed

discovery:

  - discovery_id: cassandra.section_1.latest_version_of_java_is_installed
    description: Ensure the latest version of Java is installed
    calls:
      - action: run_command
        command: "To verify that you have the correct version of java installed: # java -version java version '1.8.0_172' Java(TM) SE Runtime Environment (build 1.8.0_172-b11) If an old/unsupported version of Java is installed this is a finding. Apache Cassandra expects a version of 1.8. NOTE: Experimental support for Java 11 was added in Cassandra 4.0 (CASSANDRA- 9608). Running Cassandra on Java 11 is experimental. Do so at your own risk."
        save_as: result
    emit:
      as: item
      item:
        check: latest_version_of_java_is_installed
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: cassandra.section_1.latest_version_of_python_is_installed
    description: Ensure the latest version of Python is installed
    calls:
      - action: run_command
        command: "To verify that you have the correct version of python installed: # python -V or # python --version If an old/unsupported version of Python is installed this is a finding. For using cqlsh, the latest version of Python 3.6+ or Python 2.7 (support deprecated) is required."
        save_as: result
    emit:
      as: item
      item:
        check: latest_version_of_python_is_installed
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: cassandra.section_1.latest_version_of_cassandra_is_installed
    description: Ensure latest version of Cassandra is installed
    calls:
      - action: run_command
        command: "To verify the version of Cassandra you have installed: cassandra -v 4.0.3 (a/o 2022-03-29) Released on 2022-02-17 Maintained until 4.3.0 release (May-July 2024) If an old/unsupported version of Cassandra is installed this is a finding."
        save_as: result
    emit:
      as: item
      item:
        check: latest_version_of_cassandra_is_installed
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: cassandra.section_1.cassandra_service_is_run_as_a_non_root_user
    description: Ensure the Cassandra service is run as a non-root user
    calls:
      - action: run_command
        command: "Logon to the server where Cassandra is running and run the following command ps -aef | grep cassandra | grep java | cut -d' ' -f1 This will show who is running the Cassandra binary. If the user is root or has excessive privileges then this is a finding."
        save_as: result
    emit:
      as: item
      item:
        check: cassandra_service_is_run_as_a_non_root_user
        value: "{{ result.stdout }}"
        expected: ""

