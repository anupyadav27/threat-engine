version: '1.0'
provider: database
engine: cassandra
category: section_2
cis_section: '2'
description: >
  cassandra CIS Section 2 — authentication is enabled for Cassandra databases

discovery:

  - discovery_id: cassandra.section_2.authentication_is_enabled_for_cassandra_databases
    description: Ensure that authentication is enabled for Cassandra databases
    calls:
      - action: run_command
        command: "Run the following command to verify whether authentication is enabled (authenticator values set to PasswordAuthenticator) on the Cassandra server. The Cassandra configuration files can be found in the conf directory of tarballs. For packages, the configuration files will be located in /etc/cassandra. cat cassandra.yaml | grep -in 'authenticator:' If authenticator is set to AllowAllAuthenticator, then this is a finding."
        save_as: result
    emit:
      as: item
      item:
        check: authentication_is_enabled_for_cassandra_databases
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: cassandra.section_2.authorization_is_enabled_for_cassandra_databases
    description: Ensure that authorization is enabled for Cassandra databases
    calls:
      - action: run_command
        command: "Run the following command to verify whether authorization is enabled (authorization values set to CassandraAuthorizer) on the Cassandra server. The Cassandra configuration files can be found in the conf directory of tarballs. For packages, the configuration files will be located in /etc/cassandra. cat cassandra.yaml | grep -in 'authorizer:' If authorizer is set to AllowAllAuthorizer, then this is a finding."
        save_as: result
    emit:
      as: item
      item:
        check: authorization_is_enabled_for_cassandra_databases
        value: "{{ result.stdout }}"
        expected: ""

