version: '1.0'
provider: database
engine: cassandra
category: section_4
cis_section: '4'
description: >
  cassandra CIS Section 4 — logging is enabled

discovery:

  - discovery_id: cassandra.section_4.logging_is_enabled
    description: Ensure that logging is enabled.
    calls:
      - action: run_command
        command: "Execute the following command to confirm the setting is correct: $ nodetool getlogginglevels Logger Name Log Level ROOT INFO org.cisecurity.workbench WARN If set to OFF then this is a finding."
        save_as: result
    emit:
      as: item
      item:
        check: logging_is_enabled
        value: "{{ result.stdout }}"
        expected: ""

