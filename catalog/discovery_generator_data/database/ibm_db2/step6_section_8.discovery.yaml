version: '1.0'
provider: database
engine: ibm_db2
category: section_8
cis_section: '8'
description: >
  ibm_db2 CIS Section 8 — Secure the Configuration File

discovery:

  - discovery_id: ibm_db2.section_8.secure_the_configuration_file
    description: Secure the Configuration File
    calls:


      - action: query_setting
        query: "SHOW VARIABLES LIKE 'secure_the_configuration_file';"
        save_as: result
    emit:
      as: item
      item:
        check: secure_the_configuration_file
        setting_name: secure_the_configuration_file
        value: "{{ result.value }}"
        expected: ""


