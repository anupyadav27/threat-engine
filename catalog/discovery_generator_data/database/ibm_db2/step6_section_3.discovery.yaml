version: '1.0'
provider: database
engine: ibm_db2
category: section_3
cis_section: '3'
description: >
  ibm_db2 CIS Section 3 — Set Diagnostic Logging to Capture Errors and Warnings (DIAGLEVEL)

discovery:

  - discovery_id: ibm_db2.section_3.set_diagnostic_logging_to_capture_errors_and
    description: Set Diagnostic Logging to Capture Errors and Warnings (DIAGLEVEL)
    calls:


      - action: query_setting
        query: "SHOW VARIABLES LIKE 'set_diagnostic_logging_to_capture_errors_and';"
        save_as: result
    emit:
      as: item
      item:
        check: set_diagnostic_logging_to_capture_errors_and
        setting_name: set_diagnostic_logging_to_capture_errors_and
        value: "{{ result.value }}"
        expected: ""


