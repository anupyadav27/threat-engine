version: '1.0'
provider: database
engine: mysql
category: section_4
cis_section: '4'
description: >
  mysql CIS Section 4 — Example or Test Databases are Not Installed on Production Servers

discovery:


  - discovery_id: mysql.section_4.example_or_test_databases_are_not_installed_on
    description: Ensure Example or Test Databases are Not Installed on Production Servers
    applicable_to: ["cloud_managed", "self_hosted"]
    calls:

      - action: query_setting
        query: "SELECT * FROM information_schema.SCHEMATA where SCHEMA_NAME not in ('mysql','information_schema', 'sys', 'performance_schema');"
        save_as: result
    emit:
      as: item
      item:
        check: example_or_test_databases_are_not_installed_on
        setting_name: "example_or_test_databases_are_not_installed_on"
        value: "{{ result.value }}"
        expected: ""



  - discovery_id: mysql.section_4.allow_suspicious_udfs_is_set_to_off
    description: Ensure 'allow-suspicious-udfs' is Set to 'OFF'
    applicable_to: ["cloud_managed", "self_hosted"]
    calls:

      - action: query_setting
        query: "SHOW VARIABLES LIKE 'allow_suspicious_udfs';"
        save_as: result
    emit:
      as: item
      item:
        check: allow_suspicious_udfs_is_set_to_off
        setting_name: "allow_suspicious_udfs"
        value: "{{ result.value }}"
        expected: "OFF"



  - discovery_id: mysql.section_4.harden_usage_for_local_infile_on_mysql_clients
    description: Harden Usage for 'local_infile' on MySQL Clients
    applicable_to: ["cloud_managed", "self_hosted"]
    calls:

      - action: query_setting
        query: "SHOW VARIABLES LIKE 'local_infile';"
        save_as: result
    emit:
      as: item
      item:
        check: harden_usage_for_local_infile_on_mysql_clients
        setting_name: "local_infile"
        value: "{{ result.value }}"
        expected: ""



  - discovery_id: mysql.section_4.symbolic_links_are_disabled
    description: Ensure Symbolic Links are Disabled
    applicable_to: ["cloud_managed", "self_hosted"]
    calls:

      - action: query_setting
        query: "SHOW VARIABLES LIKE 'have_symlink';"
        save_as: result
    emit:
      as: item
      item:
        check: symbolic_links_are_disabled
        setting_name: "have_symlink"
        value: "{{ result.value }}"
        expected: ""



  - discovery_id: mysql.section_4.secure_file_priv_is_configured_correctly
    description: Ensure the 'secure_file_priv' is Configured Correctly
    applicable_to: ["cloud_managed", "self_hosted"]
    calls:

      - action: query_setting
        query: "SHOW VARIABLES LIKE 'secure_file_priv';"
        save_as: result
    emit:
      as: item
      item:
        check: secure_file_priv_is_configured_correctly
        setting_name: "secure_file_priv"
        value: "{{ result.value }}"
        expected: ""



  - discovery_id: mysql.section_4.sql_mode_contains_strict_all_tables
    description: Ensure 'sql_mode' Contains 'STRICT_ALL_TABLES'
    applicable_to: ["cloud_managed", "self_hosted"]
    calls:

      - action: query_setting
        query: "SHOW VARIABLES LIKE 'sql_mode';"
        save_as: result
    emit:
      as: item
      item:
        check: sql_mode_contains_strict_all_tables
        setting_name: "sql_mode"
        value: "{{ result.value }}"
        expected: ""



  - discovery_id: mysql.section_4.use_mysql_tde_for_at_rest_data_encryption
    description: Use MySQL TDE for At-Rest Data Encryption
    applicable_to: ["cloud_managed", "self_hosted"]
    calls:

      - action: query_setting
        query: "SELECT VARIABLE_NAME, VARIABLE_VALUE, 'AT REST ENCRYPTION' as Note, IF(VARIABLE_VALUE = 'AES', 'Encrypted', 'Not Encrypted') as IsEncrypted FROM performance_schema.global_variables where variable_name in ('audit_log_encryption', 'binlog_encryption', 'innodb_redo_log_encrypt', 'innodb_undo_log_encrypt', 'table_encryption_privilege_check');"
        save_as: result
    emit:
      as: item
      item:
        check: use_mysql_tde_for_at_rest_data_encryption
        setting_name: "encryption"
        value: "{{ result.value }}"
        expected: ""


