version: '1.0'
provider: database
engine: mysql
category: section_1
cis_section: '1'
description: >
  mysql CIS Section 1 — Disable MySQL Command History

discovery:

  - discovery_id: mysql.section_1.disable_mysql_command_history
    description: Disable MySQL Command History
    calls:


      - action: query_setting
        query: "SHOW VARIABLES LIKE 'disable_mysql_command_history';"
        save_as: result
    emit:
      as: item
      item:
        check: disable_mysql_command_history
        setting_name: disable_mysql_command_history
        value: "{{ result.value }}"
        expected: ""


  - discovery_id: mysql.section_1.the_mysql_pwd_environment_variable_is_not_in_use
    description: Verify That the MYSQL_PWD Environment Variable is Not in Use
    calls:


      - action: query_setting
        query: "SHOW VARIABLES LIKE 'the_mysql_pwd_environment_variable_is_not_in_use';"
        save_as: result
    emit:
      as: item
      item:
        check: the_mysql_pwd_environment_variable_is_not_in_use
        setting_name: the_mysql_pwd_environment_variable_is_not_in_use
        value: "{{ result.value }}"
        expected: ""


  - discovery_id: mysql.section_1.mysql_pwd_is_not_set_in_users_profiles
    description: Verify That 'MYSQL_PWD' is Not Set in Users' Profiles
    calls:


      - action: query_setting
        query: "SHOW VARIABLES LIKE 'mysql_pwd_is_not_set_in_users_profiles';"
        save_as: result
    emit:
      as: item
      item:
        check: mysql_pwd_is_not_set_in_users_profiles
        setting_name: mysql_pwd_is_not_set_in_users_profiles
        value: "{{ result.value }}"
        expected: ""


