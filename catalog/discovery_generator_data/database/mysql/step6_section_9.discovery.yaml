version: '1.0'
provider: database
engine: mysql
category: section_9
cis_section: '9'
description: >
  mysql CIS Section 9 — 'SOURCE_SSL_VERIFY_SERVER_CERT' is Set to 'YES' or '1'

discovery:

  - discovery_id: mysql.section_9.source_ssl_verify_server_cert_is_set_to_yes_or_1
    description: Ensure 'SOURCE_SSL_VERIFY_SERVER_CERT' is Set to 'YES' or '1'
    calls:


      - action: query_setting
        query: "select ssl_verify_server_cert from mysql.slave_master_info;"
        save_as: result
    emit:
      as: item
      item:
        check: source_ssl_verify_server_cert_is_set_to_yes_or_1
        setting_name: source_ssl_verify_server_cert_is_set_to_yes_or_1
        value: "{{ result.value }}"
        expected: ""


  - discovery_id: mysql.section_9.master_info_repository_is_set_to_table
    description: Ensure 'master_info_repository' is Set to 'TABLE'
    calls:


      - action: query_setting
        query: "SHOW VARIABLES LIKE 'master_info_repository';"
        save_as: result
    emit:
      as: item
      item:
        check: master_info_repository_is_set_to_table
        setting_name: master_info_repository
        value: "{{ result.value }}"
        expected: ""


