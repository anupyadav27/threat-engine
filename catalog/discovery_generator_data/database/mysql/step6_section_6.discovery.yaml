version: '1.0'
provider: database
engine: mysql
category: section_6
cis_section: '6'
description: >
  mysql CIS Section 6 — 'log_error' is configured correctly

discovery:

  - discovery_id: mysql.section_6.log_error_is_configured_correctly
    description: Ensure 'log_error' is configured correctly
    calls:


      - action: query_setting
        query: "SHOW VARIABLES LIKE 'log_error';"
        save_as: result
    emit:
      as: item
      item:
        check: log_error_is_configured_correctly
        setting_name: log_error
        value: "{{ result.value }}"
        expected: ""


  - discovery_id: mysql.section_6.log_files_are_stored_on_a_non_system_partition
    description: Ensure Log Files are Stored on a Non-System Partition
    calls:


      - action: query_setting
        query: "SELECT @@global.log_bin_basename;"
        save_as: result
    emit:
      as: item
      item:
        check: log_files_are_stored_on_a_non_system_partition
        setting_name: log_files_are_stored_on_a_non_system_partition
        value: "{{ result.value }}"
        expected: ""


  - discovery_id: mysql.section_6.log_error_verbosity_is_set_to_2
    description: Ensure 'log_error_verbosity' is Set to '2'
    calls:


      - action: query_setting
        query: "SHOW VARIABLES LIKE 'log_error_verbosity';"
        save_as: result
    emit:
      as: item
      item:
        check: log_error_verbosity_is_set_to_2
        setting_name: log_error_verbosity
        value: "{{ result.value }}"
        expected: ""


  - discovery_id: mysql.section_6.log_raw_is_set_to_off
    description: Ensure 'log-raw' is Set to 'OFF'
    calls:


      - action: query_setting
        query: "SHOW VARIABLES LIKE 'log_raw_is_set_to_off';"
        save_as: result
    emit:
      as: item
      item:
        check: log_raw_is_set_to_off
        setting_name: log_raw_is_set_to_off
        value: "{{ result.value }}"
        expected: ""


