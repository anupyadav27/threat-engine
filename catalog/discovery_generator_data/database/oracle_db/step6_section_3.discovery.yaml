  - discovery_id: oracle_db.section_3.password_life_time_is_less_than_or_equal_to_90
    description: Ensure 'PASSWORD_LIFE_TIME' Is Less than or Equal to '90'
    calls:


      - action: query_setting
        query: "SELECT P.PROFILE, P.RESOURCE_NAME, P.LIMIT FROM DBA_PROFILES P WHERE TO_NUMBER(DECODE(P.LIMIT, 'DEFAULT',(SELECT DISTINCT DECODE(LIMIT,'UNLIMITED',9999,LIMIT) FROM DBA_PROFILES WHERE PROFILE='DEFAULT' AND RESOURCE_NAME='PASSWORD_LIFE_TIME'), 'UNLIMITED','9999',P.LIMIT)) > 90 AND P.RESOURCE_NAME = 'PASSWORD_LIFE_TIME' AND EXISTS ( SELECT 'X' FROM DBA_USERS U WHERE U.PROFILE = P.PROFILE );"
        save_as: result
    emit:
      as: item
      item:
        check: password_life_time_is_less_than_or_equal_to_90
        setting_name: password_life_time_is_less_than_or_equal_to_90
        value: "{{ result.value }}"
        expected: ""


