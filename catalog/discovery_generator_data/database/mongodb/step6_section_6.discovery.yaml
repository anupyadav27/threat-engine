version: '1.0'
provider: database
engine: mongodb
category: section_6
cis_section: '6'
description: >
  mongodb CIS Section 6 — MongoDB uses a non-default port

discovery:

  - discovery_id: mongodb.section_6.mongodb_uses_a_non_default_port
    description: Ensure that MongoDB uses a non-default port
    calls:
      - action: run_command
        command: "To verify the port number used by MongoDB, execute the following command and ensure that the port number is not 27017: On Ubuntu: cat /etc/mongod.conf |grep “port” On Windows: type mongod.conf | findstr “port”"
        save_as: result
    emit:
      as: item
      item:
        check: mongodb_uses_a_non_default_port
        value: "{{ result.stdout }}"
        expected: ""

