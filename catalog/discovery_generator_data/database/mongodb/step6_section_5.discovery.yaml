version: '1.0'
provider: database
engine: mongodb
category: section_5
cis_section: '5'
description: >
  mongodb CIS Section 5 — logging captures as much information as possible

discovery:

  - discovery_id: mongodb.section_5.logging_captures_as_much_information_as_possible
    description: Ensure that logging captures as much information as possible
    calls:
      - action: run_command
        command: "To verify that the SystemLog: quiet=false option is disabled (value of false), run the following command: On Ubuntu: cat /etc/mongod.conf |grep 'quiet' On Windows: type mongod.conf | findstr 'quiet'"
        save_as: result
    emit:
      as: item
      item:
        check: logging_captures_as_much_information_as_possible
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: mongodb.section_5.new_entries_are_appended_to_the_end_of_the_log
    description: Ensure that new entries are appended to the end of the log file
    calls:
      - action: run_command
        command: "To verify that new log entries will be appended to the end of the log file after a restart (systemLog: logAppend: true value set to true), run the following command: On Ubuntu: cat /etc/mongod.conf | grep 'logAppend' On Windows: type mongod.conf | findstr 'logAppend'"
        save_as: result
    emit:
      as: item
      item:
        check: new_entries_are_appended_to_the_end_of_the_log
        value: "{{ result.stdout }}"
        expected: ""

