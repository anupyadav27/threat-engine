version: '1.0'
provider: linux
engine: suse
category: section_6
cis_section: '6'
description: >
  suse CIS Section 6 — AIDE is installed

discovery:

  - discovery_id: suse.section_6.aide_is_installed
    description: Ensure AIDE is installed
    calls:
      - action: run_command
        command: "Run the following command and verify aide is installed: # rpm -q aide aide-\u003cversion\u003e"
        save_as: result
    emit:
      as: item
      item:
        check: aide_is_installed
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: suse.section_6.filesystem_integrity_is_regularly_checked
    description: Ensure filesystem integrity is regularly checked
    calls:
      - action: run_command
        command: "Run the following commands to verify a cron job scheduled to run the aide check. # grep -Ers \u0027^([^#]+\\s+)?(\\/usr\\/s?bin\\/|^\\s*)aide(\\.wrapper)?\\s(--?\\S+\\s)*(- -(check|update)|\\$AIDEARGS)\\b\u0027 /etc/cron.* /etc/crontab /var/spool/cron/ Ensure a cron job in compliance with site policy is returned. - OR - Run the following commands to verify that aidecheck.service and aidecheck.timer are enabled and aidcheck.timer is running # systemctl is-enabled aidecheck.service # systemctl is-enabled aidecheck.timer # systemctl status aidecheck.timer"
        save_as: result
    emit:
      as: item
      item:
        check: filesystem_integrity_is_regularly_checked
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: suse.section_6.journald_service_is_enabled_and_active
    description: Ensure journald service is enabled and active
    calls:
      - action: run_command
        command: "Run the following command to verify systemd-journald is enabled: # systemctl is-enabled systemd-journald.service static Note: By default the systemd-journald service does not have an [Install] section and thus cannot be enabled / disabled. It is meant to be referenced as Requires or Wants by other unit files. As such, if the status of systemd-journald is not static, investigate why Run the following command to verify systemd-journald is active: # systemctl is-active systemd-journald.service active"
        save_as: result
    emit:
      as: item
      item:
        check: journald_service_is_enabled_and_active
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: suse.section_6.only_one_logging_system_is_in_use
    description: Ensure only one logging system is in use
    calls:
      - action: run_command
        command: "Run the following script to ensure only one logging system is in use: #!/usr/bin/env bash { l_output=\u0027\u0027 l_output2=\u0027\u0027 # Check the status of rsyslog and journald if systemctl is-active --quiet rsyslog; then l_output=\u0027$l_output\\n - rsyslog is in use\\n- follow the recommendations in Configure rsyslog subsection only\u0027 elif systemctl is-active --quiet systemd-journald; then l_output=\u0027$l_output\\n - journald is in use\\n- follow the recommendations in Configure journald subsection only\u0027 else echo -e \u201cunable to determine system logging\u201d l_output2=\u0027$l_output2\\n - unable to determine system logging\\n- Configure only ONE system logging: rsyslog OR journald\u0027 fi if [ -z \u0027$l_output2\u0027 ]; then # Provide audit results echo -e \u0027\\n- Audit Result:\\n ** PASS **\\n$l_output\\n\u0027 else echo -e \u0027\\n- Audit Result:\\n ** FAIL **\\n - Reason(s) for audit failure:\\n$l_output2\u0027 fi }"
        save_as: result
    emit:
      as: item
      item:
        check: only_one_logging_system_is_in_use
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: suse.section_6.systemd_journal_remote_is_installed
    description: Ensure systemd-journal-remote is installed
    calls:
      - action: run_command
