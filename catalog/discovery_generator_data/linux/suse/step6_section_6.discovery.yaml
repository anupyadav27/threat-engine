  - discovery_id: suse.section_6.file_deletion_events_by_users_are_collected
    description: Ensure file deletion events by users are collected
    calls:
      - action: run_command
        command: "On disk configuration Run the following command to check the on disk rules: # { UID_MIN=$(awk \u0027/^\\s*UID_MIN/{print $2}\u0027 /etc/login.defs) [ -n \u0027${UID_MIN}\u0027 ] \u0026\u0026 awk \u0027/^ *-a *always,exit/ \\ \u0026\u0026/ -F *arch=b(32|64)/ \\ \u0026\u0026(/ -F *auid!=unset/||/ -F *auid!=-1/||/ -F *auid!=4294967295/) \\ \u0026\u0026/ -F *auid\u003e=${UID_MIN}/ \\ \u0026\u0026/ -S/ \\ \u0026\u0026(/unlink/||/rename/||/unlinkat/||/renameat/) \\ \u0026\u0026(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)\u0027 /etc/audit/rules.d/*.rules \\ || printf \u0027ERROR: Variable \u0027UID_MIN\u0027 is unset.\\n\u0027 } Verify the output matches: -a always,exit -F arch=b64 -S unlink,unlinkat,rename,renameat -F auid\u003e=1000 - F auid!=unset -k delete -a always,exit -F arch=b32 -S unlink,unlinkat,rename,renameat -F auid\u003e=1000 - F auid!=unset -k delete Running configuration Run the following command to check loaded rules: # { UID_MIN=$(awk \u0027/^\\s*UID_MIN/{print $2}\u0027 /etc/login.defs) [ -n \u0027${UID_MIN}\u0027 ] \u0026\u0026 auditctl -l | awk \u0027/^ *-a *always,exit/ \\ \u0026\u0026/ -F *arch=b(32|64)/ \\ \u0026\u0026(/ -F *auid!=unset/||/ -F *auid!=-1/||/ -F *auid!=4294967295/) \\ \u0026\u0026/ -F *auid\u003e=${UID_MIN}/ \\ \u0026\u0026/ -S/ \\ \u0026\u0026(/unlink/||/rename/||/unlinkat/||/renameat/) \\ \u0026\u0026(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)\u0027 \\ || printf \u0027ERROR: Variable \u0027UID_MIN\u0027 is unset.\\n\u0027 } Verify the output matches: -a always,exit -F arch=b64 -S rename,unlink,unlinkat,renameat -F auid\u003e=1000 - F auid!=-1 -F key=delete -a always,exit -F arch=b32 -S unlink,rename,unlinkat,renameat -F auid\u003e=1000 - F auid!=-1 -F key=delete"
        save_as: result
