  - discovery_id: suse.section_4.rsyslog_is_installed
    description: Ensure rsyslog is installed
    calls:
      - action: run_command
        command: "Run the following command to Verify rsyslog is installed: # rpm -q rsyslog rsyslog-\u003cversion\u003e"
        save_as: result
    emit:
      as: item
      item:
        check: rsyslog_is_installed
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: suse.section_4.rsyslog_service_is_enabled_and_running
    description: Ensure rsyslog Service is enabled and running
    calls:
      - action: run_command
        command: "Run one of the following commands to verify rsyslog is enabled: # systemctl is-enabled rsyslog enabled Run the following command to verify that rsyslog is running: # systemctl status rsyslog | grep \u0027active (running) \u0027 Active: active (running) since \u003cDay date time\u003e"
        save_as: result
    emit:
      as: item
      item:
        check: rsyslog_service_is_enabled_and_running
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: suse.section_4.rsyslog_default_file_permissions_configured
    description: Ensure rsyslog default file permissions configured
    calls:
      - action: run_command
        command: "Run the following command and verify that $FileCreateMode is 0640 or more restrictive: # grep ^\\$FileCreateMode /etc/rsyslog.conf /etc/rsyslog.d/*.conf $FileCreateMode 0640 Verify that no results return with a less restrictive file mode"
        save_as: result
    emit:
      as: item
      item:
        check: rsyslog_default_file_permissions_configured
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: suse.section_4.rsyslog_is_configured_to_send_logs_to_a_remote
    description: Ensure rsyslog is configured to send logs to a remote log host
    calls:
      - action: run_command
        command: "Review the /etc/rsyslog.conf and /etc/rsyslog.d/*.conf files and verify that logs are sent to a central host (where loghost.example.com is the name of your central log host): # grep \u0027^*.*[^I][^I]*@\u0027 /etc/rsyslog.conf /etc/rsyslog.d/*.conf *.* @@loghost.example.com"
        save_as: result
    emit:
      as: item
      item:
        check: rsyslog_is_configured_to_send_logs_to_a_remote
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: suse.section_4.journald_is_configured_to_send_logs_to_rsyslog
    description: Ensure journald is configured to send logs to rsyslog
    calls:
      - action: run_command
        command: ""
        save_as: result
    emit:
      as: item
      item:
        check: journald_is_configured_to_send_logs_to_rsyslog
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: suse.section_4.journald_is_configured_to_compress_large_log_files
    description: Ensure journald is configured to compress large log files
    calls:
      - action: run_command
        command: ""
        save_as: result
    emit:
      as: item
      item:
        check: journald_is_configured_to_compress_large_log_files
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: suse.section_4.journald_is_configured_to_write_logfiles_to
    description: Ensure journald is configured to write logfiles to persistent disk
    calls:
      - action: run_command
        command: ""
        save_as: result
    emit:
      as: item
      item:
        check: journald_is_configured_to_write_logfiles_to
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: suse.section_4.permissions_on_all_logfiles_are_configured
    description: Ensure permissions on all logfiles are configured
    calls:
      - action: run_command
        command: "Run the following command and verify that other has no permissions on any files and group does not have write or execute permissions on any files: # find /var/log -type f -perm /g+wx,o+rwx -exec ls -l {} \\; Nothing should be returned."
        save_as: result
    emit:
      as: item
      item:
        check: permissions_on_all_logfiles_are_configured
        value: "{{ result.stdout }}"
        expected: ""

