  - discovery_id: suse.section_1.address_space_layout_randomization_is_enabled
    description: Ensure address space layout randomization is enabled
    calls:
      - action: run_command
        command: "Run the following script to verify the following kernel parameter is set in the running configuration and correctly loaded from a kernel parameter configuration file: \u2022 kernel.randomize_va_space is set to 2 Note: kernel parameters are loaded by file and parameter order precedence. The following script observes this precedence as part of the auditing procedure. The parameters being checked may be set correctly in a file. If that file is superseded, the parameter is overridden by an incorrect setting later in that file, or in a canonically later file, that \u0027correct\u0027 setting will be ignored both by the script and by the system during a normal kernel parameter load sequence. #!/usr/bin/env bash { a_output=(); a_output2=(); a_parlist=(kernel.randomize_va_space=2) l_systemdsysctl=\u0027$(readlink -f /lib/systemd/systemd-sysctl || readlink -f /usr/lib/systemd/systemd-sysctl)\u0027 l_ufwscf=\u0027$([ -f /etc/default/ufw ] \u0026\u0026 awk -F= \u0027/^\\s*IPT_SYSCTL=/ {print $2}\u0027 /etc/default/ufw)\u0027 f_kernel_parameter_chk() { l_running_parameter_value=\u0027$(sysctl \u0027$l_parameter_name\u0027 | awk -F= \u0027{print $2}\u0027 | xargs)\u0027 # Check running configuration if grep -Pq -- \u0027\\b\u0027\u0027$l_parameter_value\u0027\u0027\\b\u0027 \u003c\u003c\u003c \u0027$l_running_parameter_value\u0027; then a_output+=(\u0027 - \\\u0027$l_parameter_name\\\u0027 is correctly set to \\\u0027$l_running_parameter_value\\\u0027\u0027 \u0027 in the running configuration\u0027) else a_output2+=(\u0027 - \\\u0027$l_parameter_name\\\u0027 is incorrectly set to \\\u0027$l_running_parameter_value\\\u0027\u0027 \\ \u0027 in the running configuration\u0027 \\ \u0027 and should have a value of: \\\u0027$l_value_out\\\u0027\u0027) fi unset A_out; declare -A A_out # Check durable setting (files) while read -r l_out; do if [ -n \u0027$l_out\u0027 ]; then if [[ $l_out =~ ^\\s*# ]]; then l_file=\u0027${l_out//# /}\u0027 else l_kpar=\u0027$(awk -F= \u0027{print $1}\u0027 \u003c\u003c\u003c \u0027$l_out\u0027 | xargs)\u0027 [ \u0027$l_kpar\u0027 = \u0027$l_parameter_name\u0027 ] \u0026\u0026 A_out+=([\u0027$l_kpar\u0027]=\u0027$l_file\u0027) fi fi done \u003c \u003c(\u0027$l_systemdsysctl\u0027 --cat-config | grep -Po \u0027^\\h*([^#\\n\\r]+|#\\h*\\/[^#\\n\\r\\h]+\\.conf\\b)\u0027) if [ -n \u0027$l_ufwscf\u0027 ]; then # Account for systems with UFW (Not covered by systemd-sysctl --cat-config) l_kpar=\u0027$(grep -Po \u0027^\\h*$l_parameter_name\\b\u0027 \u0027$l_ufwscf\u0027 | xargs)\u0027 l_kpar=\u0027${l_kpar//\\//.}\u0027 [ \u0027$l_kpar\u0027 = \u0027$l_parameter_name\u0027 ] \u0026\u0026 A_out+=([\u0027$l_kpar\u0027]=\u0027$l_ufwscf\u0027) fi if (( ${#A_out[@]} \u003e 0 )); then # Assess output from files and generate output while IFS=\u0027=\u0027 read -r l_fkpname l_file_parameter_value; do l_fkpname=\u0027${l_fkpname// /}\u0027; l_file_parameter_value=\u0027${l_file_parameter_value// /}\u0027 if grep -Pq -- \u0027\\b\u0027\u0027$l_parameter_value\u0027\u0027\\b\u0027 \u003c\u003c\u003c \u0027$l_file_parameter_value\u0027; then a_output+=(\u0027 - \\\u0027$l_parameter_name\\\u0027 is correctly set to \\\u0027$l_file_parameter_value\\\u0027\u0027 \\ \u0027 in \\\u0027$(printf \u0027%s\u0027 \u0027${A_out[@]}\u0027)\\\u0027\u0027) else a_output2+=(\u0027 - \\\u0027$l_parameter_name\\\u0027 is incorrectly set to \\\u0027$l_file_parameter_value\\\u0027\u0027 \u0027 in \\\u0027$(printf \u0027%s\u0027 \u0027${A_out[@]}\u0027)\\\u0027\u0027 \\ \u0027 and should have a value of: \\\u0027$l_value_out\\\u0027\u0027) fi done \u003c \u003c(grep -Po -- \u0027^\\h*$l_parameter_name\\h*=\\h*\\H+\u0027 \u0027${A_out[@]}\u0027) else a_output2+=(\u0027 - \\\u0027$l_parameter_name\\\u0027 is not set in an included file\u0027 \\ \u0027 ** Note: \\\u0027$l_parameter_name\\\u0027 May be set in a file that\u0027s ignored by load procedure **\u0027) fi } while IFS=\u0027=\u0027 read -r l_parameter_name l_parameter_value; do # Assess and check parameters l_parameter_name=\u0027${l_parameter_name// /}\u0027; l_parameter_value=\u0027${l_parameter_value// /}\u0027 l_value_out=\u0027${l_parameter_value//-/ through }\u0027; l_value_out=\u0027${l_value_out//|/ or }\u0027 l_value_out=\u0027$(tr -d \u0027(){}\u0027 \u003c\u003c\u003c \u0027$l_value_out\u0027)\u0027 f_kernel_parameter_chk done \u003c \u003c(printf \u0027%s\\n\u0027 \u0027${a_parlist[@]}\u0027) if [ \u0027${#a_output2[@]}\u0027 -le 0 ]; then printf \u0027%s\\n\u0027 \u0027\u0027 \u0027- Audit Result:\u0027 \u0027 ** PASS **\u0027 \u0027${a_output[@]}\u0027 \u0027\u0027 else printf \u0027%s\\n\u0027 \u0027\u0027 \u0027- Audit Result:\u0027 \u0027 ** FAIL **\u0027 \u0027 - Reason(s) for audit failure:\u0027 \u0027${a_output2[@]}\u0027 [ \u0027${#a_output[@]}\u0027 -gt 0 ] \u0026\u0026 printf \u0027%s\\n\u0027 \u0027\u0027 \u0027- Correctly set:\u0027 \u0027${a_output[@]}\u0027 \u0027\u0027 fi }"
        save_as: result
