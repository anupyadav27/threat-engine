version: '1.0'
provider: linux
engine: suse
category: section_1
cis_section: '1'
description: >
  suse CIS Section 1 — cramfs kernel module is not available

discovery:

  - discovery_id: suse.section_1.cramfs_kernel_module_is_not_available
    description: Ensure cramfs kernel module is not available
    calls:
      - action: run_command
        command: "Verify the cramfs kernel module is not available on the system - OR - has been disabled. This can be verified by performing the following or by running the audit script included below. 1. Run the following script to determine if the cramfs kernel module is available on the system: #!/usr/bin/env bash { l_mod_name=\u0027cramfs\u0027 l_mod_type=\u0027fs\u0027 while IFS= read -r l_mod_path; do if [ -d \u0027$l_mod_path/${l_mod_name/-/\\/}\u0027 ] \u0026\u0026 [ -n \u0027$(ls -A \u0027$l_mod_path/${l_mod_name/-/\\/}\u0027)\u0027 ]; then printf \u0027%s\\n\u0027 \u0027$l_mod_name exists in $l_mod_path\u0027 fi done \u003c \u003c(readlink -f /usr/lib/modules/**/kernel/$l_mod_type || readlink -f /lib/modules/**/kernel/$l_mod_type) } If nothing is returned, the cramfs kernel module is not available on the system and no further audit steps are required. Note: Some systems may include the cramfs filesystem as part of the kernel opposed to being available as a kernel module. In this case, the above audit will not return anything. This is also considered a passing state. 2. If anything is returned by the above script, verify the cramfs kernel module is not loaded and not loadable by performing the following: a) Run the following command to verify the cramfs kernel module is not loaded: # lsmod | grep \u0027cramfs\u0027 Nothing should be returned b) Run the following command to verify the cramfs kernel module is not loadable: # modprobe --showconfig | grep -P -- \u0027\\b(install|blacklist)\\h+cramfs\\b\u0027 verify the output includes: blacklist cramfs -AND EITHER- install cramfs /bin/false -OR- install cramfs /bin/true Example output: blacklist cramfs install cramfs /bin/false Optional audit script This script will perform the above checks and produce output with passing or failing status #!/usr/bin/env bash { a_output=() a_output2=() a_output3=() l_dl=\u0027\u0027 l_mod_name=\u0027cramfs\u0027 l_mod_type=\u0027fs\u0027 l_mod_path=\u0027$(readlink -f /usr/lib/modules/**/kernel/$l_mod_type || readlink -f /lib/modules/**/kernel/$l_mod_type)\u0027 f_module_chk() { l_dl=\u0027y\u0027 a_showconfig=() while IFS= read -r l_showconfig; do a_showconfig+=(\u0027$l_showconfig\u0027) done \u003c \u003c(modprobe --showconfig | grep -P -- \u0027\\b(install|blacklist)\\h+\u0027\u0027${l_mod_chk_name//-/_}\u0027\u0027\\b\u0027) if ! lsmod | grep \u0027$l_mod_chk_name\u0027 \u0026\u003e /dev/null; then a_output+=(\u0027 - kernel module: \\\u0027$l_mod_name\\\u0027 is not loaded\u0027) else a_output2+=(\u0027 - kernel module: \\\u0027$l_mod_name\\\u0027 is loaded\u0027) fi if grep -Pq -- \u0027\\binstall\\h+\u0027\u0027${l_mod_chk_name//- /_}\u0027\u0027\\h+(\\/usr)?\\/bin\\/(true|false)\\b\u0027 \u003c\u003c\u003c \u0027${a_showconfig[*]}\u0027; then a_output+=(\u0027 - kernel module: \\\u0027$l_mod_name\\\u0027 is not loadable\u0027) else a_output2+=(\u0027 - kernel module: \\\u0027$l_mod_name\\\u0027 is loadable\u0027) fi if grep -Pq -- \u0027\\bblacklist\\h+\u0027\u0027${l_mod_chk_name//-/_}\u0027\u0027\\b\u0027 \u003c\u003c\u003c \u0027${a_showconfig[*]}\u0027; then a_output+=(\u0027 - kernel module: \\\u0027$l_mod_name\\\u0027 is deny listed\u0027) else a_output2+=(\u0027 - kernel module: \\\u0027$l_mod_name\\\u0027 is not deny listed\u0027) fi } for l_mod_base_directory in $l_mod_path; do if [ -d \u0027$l_mod_base_directory/${l_mod_name/-/\\/}\u0027 ] \u0026\u0026 [ -n \u0027$(ls -A \u0027$l_mod_base_directory/${l_mod_name/-/\\/}\u0027)\u0027 ]; then a_output3+=(\u0027 - \\\u0027$l_mod_base_directory\\\u0027\u0027) l_mod_chk_name=\u0027$l_mod_name\u0027 [[ \u0027$l_mod_name\u0027 =~ overlay ]] \u0026\u0026 l_mod_chk_name=\u0027${l_mod_name::-2}\u0027 [ \u0027$l_dl\u0027 != \u0027y\u0027 ] \u0026\u0026 f_module_chk else a_output+=(\u0027 - kernel module: \\\u0027$l_mod_name\\\u0027 doesn\u0027t exist in \\\u0027$l_mod_base_directory\\\u0027\u0027) fi done [ \u0027${#a_output3[@]}\u0027 -gt 0 ] \u0026\u0026 printf \u0027%s\\n\u0027 \u0027\u0027 \u0027 -- INFO --\u0027 \u0027 - module: \\\u0027$l_mod_name\\\u0027 exists in:\u0027 \u0027${a_output3[@]}\u0027 if [ \u0027${#a_output2[@]}\u0027 -le 0 ]; then printf \u0027%s\\n\u0027 \u0027\u0027 \u0027- Audit Result:\u0027 \u0027 ** PASS **\u0027 \u0027${a_output[@]}\u0027 else printf \u0027%s\\n\u0027 \u0027\u0027 \u0027- Audit Result:\u0027 \u0027 ** FAIL **\u0027 \u0027 - Reason(s) for audit failure:\u0027 \u0027${a_output2[@]}\u0027 [ \u0027${#a_output[@]}\u0027 -gt 0 ] \u0026\u0026 printf \u0027%s\\n\u0027 \u0027- Correctly set:\u0027 \u0027${a_output[@]}\u0027 fi }"
        save_as: result
    emit:
      as: item
      item:
        check: cramfs_kernel_module_is_not_available
        value: "{{ result.stdout }}"
        expected: ""

