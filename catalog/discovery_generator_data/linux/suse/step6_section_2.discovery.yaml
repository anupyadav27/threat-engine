  - discovery_id: suse.section_2.mail_transfer_agents_are_configured_for_local
    description: Ensure mail transfer agents are configured for local-only mode
    calls:
      - action: run_command
        command: "Run the following script to verify that the MTA is not listening on any non-loopback address ( 127.0.0.1 or ::1): #!/usr/bin/env bash { a_output=(); a_output2=(); a_port_list=(\u002725\u0027 \u0027465\u0027 \u0027587\u0027) for l_port_number in \u0027${a_port_list[@]}\u0027; do if ss -plntu | grep -P -- \u0027:\u0027\u0027$l_port_number\u0027\u0027\\b\u0027 | grep -Pvq -- \u0027\\h+(127\\.0\\.0\\.1|\\[?::1\\]?):\u0027\u0027$l_port_number\u0027\u0027\\b\u0027; then a_output2+=(\u0027 - Port \\\u0027$l_port_number\\\u0027 is listening on a non- loopback network interface\u0027) else a_output+=(\u0027 - Port \\\u0027$l_port_number\\\u0027 is not listening on a non- loopback network interface\u0027) fi done if command -v postconf \u0026\u003e /dev/null; then l_interfaces=\u0027$(postconf -n inet_interfaces)\u0027 elif command -v exim \u0026\u003e /dev/null; then l_interfaces=\u0027$(exim -bP local_interfaces)\u0027 elif command -v sendmail \u0026\u003e /dev/null; then l_interfaces=\u0027$(grep -i \u00270 DaemonPortOptions=\u0027 /etc/mail/sendmail.cr | grep -oP \u0027?\u003c=Addr=)[^,+]+\u0027)\u0027 fi if [ -n \u0027$l_interfaces\u0027 ]; then if grep -Pqi \u0027\\ball\\b\u0027 \u003c\u003c\u003c \u0027$l_interfaces\u0027; then a_output2+=(\u0027 - MTA is bound to all network interfaces\u0027) elif ! grep -Pqi \u0027(inet_interfaces\\h*=\\h*)?(0\\.0\\.0\\.0|::1|loopback- only|localhost)\u0027 \u003c\u003c\u003c \u0027$l_interfaces\u0027; then a_output2+=(\u0027 - MTA is bound to a network interface\u0027 \u0027 \\\u0027$l_interfaces\\\u0027\u0027) else a_output+=(\u0027 - MTA is not bound to a non loopback network interface\u0027 \u0027 \\\u0027$l_interfaces\\\u0027\u0027) fi else a_output+=(\u0027 - MTA not detected or in use\u0027) fi if [ \u0027${#a_output2[@]}\u0027 -le 0 ]; then printf \u0027%s\\n\u0027 \u0027\u0027 \u0027- Audit Result:\u0027 \u0027 ** PASS **\u0027 \u0027${a_output[@]}\u0027 else printf \u0027%s\\n\u0027 \u0027\u0027 \u0027- Audit Result:\u0027 \u0027 ** FAIL **\u0027 \u0027 * Reasons for audit failure *\u0027 \u0027${a_output2[@]}\u0027 \u0027\u0027 [ \u0027${#a_output[@]}\u0027 -gt 0 ] \u0026\u0026 printf \u0027%s\\n\u0027 \u0027- Correctly set:\u0027 \u0027${a_output[@]}\u0027 fi }"
        save_as: result
    emit:
