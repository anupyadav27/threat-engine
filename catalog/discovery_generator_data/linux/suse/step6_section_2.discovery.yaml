  - discovery_id: suse.section_2.a_single_time_synchronization_daemon_is_in_use
    description: Ensure a single time synchronization daemon is in use
    calls:
      - action: run_command
        command: "On physical systems, and virtual systems where host based time synchronization is not available. One of the two time synchronization daemons should be available; chrony or systemd- timesyncd Run the following script to verify that a single time synchronization daemon is available on the system: #!/usr/bin/env bash { active_enabled_service=() services=(\u0027systemd-timesyncd.service\u0027 \u0027chrony.service\u0027 \u0027chronyd.service\u0027) # Determine which time synchronization daemon is in use for service in \u0027${services[@]}\u0027; do if systemctl is-enabled $service 2\u003e/dev/null | grep -q \u0027^enabled\u0027 \u0026\u0026 systemctl is-active $service 2\u003e/dev/null | grep -q \u0027^active\u0027; then active_enabled_service+=(\u0027$service\u0027) fi done # Display audit results if [ ${#active_enabled_service[@]} -eq 1 ]; then printf \u0027%s\\n\u0027 \u0027\u0027 \u0027Audit Results:\u0027 \u0027 ** PASS **\u0027 \u0027 - A single time synchronization daemon is in use follow the recommendation in ${active_enabled_service[0]} subsection ONLY\u0027 elif [ ${#active_enabled_service[@]} -eq 0 ]; then printf \u0027%s\\n\u0027 \u0027\u0027 \u0027 Audit Results:\u0027 \u0027 ** FAIL **\u0027 \u0027- No time synchronization daemon in use or unable to determine time synchronization daemon status\u0027 else printf \u0027%s\\n\u0027 \u0027\u0027 \u0027 Audit Results:\u0027 \u0027 ** FAIL **\u0027 \u0027 - Multiple services are in use: ${active_enabled_service[*]}\u0027 fi } Note: Follow the guidance in the subsection for the time synchronization daemon available on the system and skip the other time synchronization daemon subsection."
        save_as: result
    emit:
      as: item
      item:
        check: a_single_time_synchronization_daemon_is_in_use
        value: "{{ result.stdout }}"
        expected: ""

