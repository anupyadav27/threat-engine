  - discovery_id: suse.section_5.latest_version_of_pam_is_installed
    description: Ensure latest version of pam is installed
    calls:
      - action: run_command
        command: "Run the following command to verify the version of PAM on the system: # rpm -q pam pam-\u003cversion\u003e"
        save_as: result
