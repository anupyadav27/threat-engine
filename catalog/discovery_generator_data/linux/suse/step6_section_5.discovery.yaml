version: '1.0'
provider: linux
engine: suse
category: section_5
cis_section: '5'
description: >
  suse CIS Section 5 — sshd Ciphers are configured

discovery:

  - discovery_id: suse.section_5.sshd_ciphers_are_configured
    description: Ensure sshd Ciphers are configured
    calls:
      - action: run_command
        command: "Run the following command to verify none of the \u0027weak\u0027 ciphers are being used: # sshd -T | grep -Pi -- \u0027^ciphers\\h+\\\u0027?([^#\\n\\r]+,)?((3des|blowfish|cast128|aes(128|192|256))- cbc|arcfour(128|256)?|rijndael-cbc@lysator\\.liu\\.se|chacha20- poly1305@openssh\\.com)\\b\u0027 - IF - a line is returned, review the list of ciphers. If the line includes chacha20- poly1305@openssh.com, review CVE-2023-48795 and verify the system has been patched. No ciphers in the list below should be returned as they\u0027re considered \u0027weak\u0027: 3des-cbc aes128-cbc aes192-cbc aes256-cbc"
        save_as: result
    emit:
      as: item
      item:
        check: sshd_ciphers_are_configured
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: suse.section_5.sshd_kexalgorithms_is_configured
    description: Ensure sshd KexAlgorithms is configured
    calls:
      - action: run_command
        command: "Run the following command to verify none of the \u0027weak\u0027 Key Exchange algorithms are being used: # sshd -T | grep -Pi -- \u0027kexalgorithms\\h+([^#\\n\\r]+,)?(diffie-hellman-group1- sha1|diffie-hellman-group14-sha1|diffie-hellman-group-exchange-sha1)\\b\u0027 Nothing should be returned. - IF - A line is returned, review the list of Key Exchange Algorithms. The following are considered \u0027weak\u0027 Key Exchange Algorithms, and should not be used: diffie-hellman-group1-sha1 diffie-hellman-group14-sha1 diffie-hellman-group-exchange-sha1"
        save_as: result
    emit:
      as: item
      item:
        check: sshd_kexalgorithms_is_configured
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: suse.section_5.sshd_macs_are_configured
    description: Ensure sshd MACs are configured
    calls:
      - action: run_command
        command: "Run the following command to verify none of the \u0027weak\u0027 MACs are being used: # sshd -T | grep -Pi -- \u0027macs\\h+([^#\\n\\r]+,)?(hmac-md5|hmac-md5-96|hmac- ripemd160|hmac-sha1-96|umac-64@openssh\\.com|hmac-md5-etm@openssh\\.com|hmac- md5-96-etm@openssh\\.com|hmac-ripemd160-etm@openssh\\.com|hmac-sha1-96- etm@openssh\\.com|umac-64-etm@openssh\\.com|umac-128-etm@openssh\\.com)\\b\u0027 Nothing should be returned Note: Review CVE-2023-48795 and verify the system has been patched. If the system has not been patched, review the use of the Encrypt Then Mac (etm) MACs. The following are considered \u0027weak\u0027 MACs, and should not be used: hmac-md5 hmac-md5-96 hmac-ripemd160 hmac-sha1-96 umac-64@openssh.com hmac-md5-etm@openssh.com hmac-md5-96-etm@openssh.com hmac-ripemd160-etm@openssh.com hmac-sha1-96-etm@openssh.com umac-64-etm@openssh.com umac-128-etm@openssh.com"
        save_as: result
    emit:
      as: item
      item:
        check: sshd_macs_are_configured
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: suse.section_5.sshd_banner_is_configured
    description: Ensure sshd Banner is configured
    calls:
      - action: run_command
        command: "Run the following command to verify Banner is set: # sshd -T | grep -Pi -- \u0027^banner\\h+\\/\\H+\u0027 Example: banner /etc/issue.net - IF - Match set statements are used in your environment, specify the connection parameters to use for the -T extended test mode and run the audit to verify the setting is not incorrectly configured in a match block Example additional audit needed for a match block for the user sshuser: # sshd -T -C user=sshuser | grep -Pi -- \u0027^banner\\h+\\/\\H+\u0027 Note: If provided, any Match directives in the configuration file that would apply are applied before the configuration is written to standard output. The connection parameters are supplied as keyword=value pairs and may be supplied in any order, either with multiple -C options or as a comma-separated list. The keywords are addr (source address), user (user), host (resolved source host name), laddr (local address), lport (local port number), and rdomain (routing domain). Run the following command and verify that the contents or the file being called by the Banner argument match site policy: # [ -e \u0027$(sshd -T | awk \u0027$1 == \u0027banner\u0027 {print $2}\u0027)\u0027 ] \u0026\u0026 cat \u0027$(sshd -T | awk \u0027$1 == \u0027banner\u0027 {print $2}\u0027)\u0027 Run the following command and verify no results are returned: # grep -Psi -- \u0027(\\\\\\v|\\\\\\r|\\\\\\m|\\\\\\s|\\b$(grep \u0027^ID=\u0027 /etc/os-release | cut - d= -f2 | sed -e \u0027s/\u0027//g\u0027)\\b)\u0027 \u0027$(sshd -T | awk \u0027$1 == \u0027banner\u0027 {print $2}\u0027)\u0027"
        save_as: result
    emit:
      as: item
      item:
        check: sshd_banner_is_configured
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: suse.section_5.sshd_clientaliveinterval_and_clientalivecountmax
    description: Ensure sshd ClientAliveInterval and ClientAliveCountMax are configured
    calls:
      - action: run_command
        command: "Run the following command and verify ClientAliveInterval and ClientAliveCountMax are greater than zero: # sshd -T | grep -Pi -- \u0027(clientaliveinterval|clientalivecountmax)\u0027 Example Output: clientaliveinterval 15 clientalivecountmax 3 - IF - Match set statements are used in your environment, specify the connection parameters to use for the -T extended test mode and run the audit to verify the setting is not incorrectly configured in a match block Example additional audit needed for a match block for the user sshuser: # sshd -T -C user=sshuser | grep -Pi -- \u0027(clientaliveinterval|clientalivecountmax)\u0027 Note: If provided, any Match directives in the configuration file that would apply are applied before the configuration is written to standard output. The connection parameters are supplied as keyword=value pairs and may be supplied in any order, either with multiple -C options or as a comma-separated list. The keywords are addr (source address), user (user), host (resolved source host name), laddr (local address), lport (local port number), and rdomain (routing domain)."
        save_as: result
    emit:
      as: item
      item:
        check: sshd_clientaliveinterval_and_clientalivecountmax
        value: "{{ result.stdout }}"
        expected: ""

