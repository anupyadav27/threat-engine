    description: Ensure sshd MaxStartups is configured
    calls:
      - action: run_command
        command: "Run the following command to verify MaxStartups is 10:30:60 or more restrictive: # sshd -T | awk \u0027$1 ~ /^\\s*maxstartups/{split($2, a, \u0027:\u0027);{if(a[1] \u003e 10 || a[2] \u003e 30 || a[3] \u003e 60) print $0}}\u0027 Nothing should be returned"
        save_as: result
    emit:
      as: item
      item:
        check: sshd_maxstartups_is_configured
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: suse.section_5.sshd_maxsessions_is_configured
    description: Ensure sshd MaxSessions is configured
    calls:
      - action: run_command
        command: "Run the following command and verify that MaxSessions is 10 or less: # sshd -T | grep maxsessions maxsessions 10 Run the following command and verify the output: grep -Psi -- \u0027^\\h*MaxSessions\\h+\\\u0027?(1[1-9]|[2-9][0-9]|[1-9][0-9][0-9]+)\\b\u0027 /etc/ssh/sshd_config /etc/ssh/sshd_config.d/*.conf Nothing should be returned - IF - Match set statements are used in your environment, specify the connection parameters to use for the -T extended test mode and run the audit to verify the setting is not incorrectly configured in a match block Example additional audit needed for a match block for the user sshuser: # sshd -T -C user=sshuser | grep maxsessions Note: If provided, any Match directives in the configuration file that would apply are applied before the configuration is written to standard output. The connection parameters are supplied as keyword=value pairs and may be supplied in any order, either with multiple -C options or as a comma-separated list. The keywords are addr (source address), user (user), host (resolved source host name), laddr (local address), lport (local port number), and rdomain (routing domain)"
        save_as: result
    emit:
      as: item
      item:
        check: sshd_maxsessions_is_configured
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: suse.section_5.sshd_permituserenvironment_is_disabled
    description: Ensure sshd PermitUserEnvironment is disabled
    calls:
      - action: run_command
        command: "Run the following command to verify PermitUserEnvironment is set to no: # sshd -T | grep permituserenvironment permituserenvironment no"
        save_as: result
    emit:
      as: item
      item:
        check: sshd_permituserenvironment_is_disabled
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: suse.section_5.sshd_usepam_is_enabled
    description: Ensure sshd UsePAM is enabled
    calls:
