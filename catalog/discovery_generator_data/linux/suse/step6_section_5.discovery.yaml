  - discovery_id: suse.section_5.password_dictionary_check_is_enabled
    description: Ensure password dictionary check is enabled
    calls:
      - action: run_command
        command: "Verify that the dictcheck option is enabled: IF the pwquality configuration file(s) are used, run the following script to verify that the dictcheck option is not set to 0 (disabled) in a pwquality configuration file: #!/usr/bin/env bash { if grep -qs \u0027^.+$\u0027 /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf; then if grep -Psi -- \u0027^\\h*dictcheck\\h*=\\h*0\\b\u0027 /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf; then printf \u0027\\n%s\\n\u0027 \u0027 ** FAIL **\u0027 \\ \u0027pam_pwquality configuration file exists and dictcheck is disabled\u0027 else printf \u0027\\n%s\\n\u0027 \u0027 ** PASS **\u0027 \\ \u0027pam_pwquality configuration file exists and dictcheck is not disabled\u0027 fi else printf \u0027\\n%s\\n\u0027 \u0027 ** FAIL **\u0027 \\ \u0027pam_pwquality configuration file does not exist\u0027 fi } Note: \u2022 Settings observe an order of precedence: o module arguments override the settings in the /etc/security/pwquality.conf configuration file o settings in the /etc/security/pwquality.conf configuration file override settings in a .conf file in the /etc/security/pwquality.conf.d/ directory o settings in a .conf file in the /etc/security/pwquality.conf.d/ directory are read in canonical order, with last read file containing the setting taking precedence \u2022 It is recommended that settings be configured in a .conf file in the /etc/security/pwquality.conf.d/ directory for clarity, convenience, and durability. - OR - If the pam-config tool has been used to configure the global PAM configuration files, run the following command to verify the pam_cracklib.so is in use which enables dictcheck automatically: # grep -Psi -- \u0027pam_cracklib.so\u0027 /etc/pam.d/common-password{,-pc} Example Output : /etc/pam.d/common-password:password requisite pam_cracklib.so enforce_for_root difok=2 minlen=14 /etc/pam.d/common-password-pc:password requisite pam_cracklib.so enforce_for_root difok=2 minlen=14"
        save_as: result
    emit:
      as: item
      item:
        check: password_dictionary_check_is_enabled
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: suse.section_5.password_number_of_changed_characters_is
    description: Ensure password number of changed characters is configured
    calls:
      - action: run_command
        command: "Run the following command to verify that the difok option is set to 2 or more and follows local site policy: # grep -Psi -- \u0027^\\h*difok\\h*=\\h*([2-9]|[1-9][0-9]+)\\b\u0027 /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf Example output : /etc/security/pwquality.conf.d/50-pwdifok.conf:difok = 2 Notes: \u2022 Settings should be configured in only one location for clarity \u2022 Settings observe an order of precedence: o module arguments override the settings in the /etc/security/pwquality.conf configuration file o settings in the /etc/security/pwquality.conf configuration file override settings in a .conf file in the /etc/security/pwquality.conf.d/ directory o settings in a .conf file in the /etc/security/pwquality.conf.d/ directory are read in canonical order, with last read file containing the setting taking precedence \u2022 It is recommended that settings be configured in a .conf file in the /etc/security/pwquality.conf.d/ directory for clarity, convenience, and durability. - OR/IF - the pam-config tool has been used to configure the global PAM configuration files. Run the following command to verify that the difok option is set to 2 or more and follows local site policy: # pam-config --query --cracklib --cracklib-difok password: difok=2 Note: If there is no output then the pam-config tool has not been used to configure the cracklib pam module. Remediation should be done by editing a .conf file in the /etc/security/pwquality.conf.d/ directory or the/etc/security/pwquality.conf file."
        save_as: result
    emit:
      as: item
      item:
        check: password_number_of_changed_characters_is
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: suse.section_5.password_length_is_configured
    description: Ensure password length is configured
    calls:
      - action: run_command
        command: "Run the following command to verify that password length is 14 or more characters, and conforms to local site policy: # grep -Psi -- \u0027^\\h*minlen\\h*=\\h*(1[4-9]|[2-9][0-9]|[1-9][0-9]{2,})\\b\u0027 /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf Example output : /etc/security/pwquality.conf.d/50-pwlength.conf:minlen = 14 Verify returned value(s) are no less than 14 characters and meet local site policy. Notes: \u2022 Settings should be configured in only one location for clarity \u2022 Settings observe an order of precedence: o module arguments override the settings in the /etc/security/pwquality.conf configuration file o settings in the /etc/security/pwquality.conf configuration file override settings in a .conf file in the /etc/security/pwquality.conf.d/ directory o settings in a .conf file in the /etc/security/pwquality.conf.d/ directory are read in canonical order, with last read file containing the setting taking precedence \u2022 It is recommended that settings be configured in a .conf file in the /etc/security/pwquality.conf.d/ directory for clarity, convenience, and durability. - OR/IF - the pam-config tool has been used to configure the global PAM configuration files. Run the following command to verify that password length is 14 or more characters, and conforms to local site policy: # pam-config --query --cracklib --cracklib-minlen Example output: password: difok=2 minlen = 14 Note: If there is no output then the pam-config tool has not been used to configure the cracklib pam module. Remediation should be done by editing a .conf file in the /etc/security/pwquality.conf.d/ directory or the/etc/security/pwquality.conf file."
        save_as: result
    emit:
      as: item
      item:
        check: password_length_is_configured
        value: "{{ result.stdout }}"
        expected: ""

