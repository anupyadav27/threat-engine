    description: Ensure password complexity is configured
    calls:
      - action: run_command
        command: "Run the following command to verify that complexity conforms to local site policy: # grep -Psi -- \u0027^\\h*(minclass|[dulo]credit)\\b\u0027 /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf Example output: /etc/security/pwquality.conf.d/50-pwcomplexity.conf:minclass = 4 -- AND/OR -- /etc/security/pwquality.conf.d/50-pwcomplexity.conf:dcredit = -1 /etc/security/pwquality.conf.d/50-pwcomplexity.conf:ucredit = -1 /etc/security/pwquality.conf.d/50-pwcomplexity.conf:ocredit = -1 /etc/security/pwquality.conf.d/50-pwcomplexity.conf:lcredit = -1 Notes: \u2022 Settings should be configured in only one location for clarity \u2022 Settings observe an order of precedence: o module arguments override the settings in the /etc/security/pwquality.conf configuration file o settings in the /etc/security/pwquality.conf configuration file override settings in a .conf file in the /etc/security/pwquality.conf.d/ directory o settings in a .conf file in the /etc/security/pwquality.conf.d/ directory are read in canonical order, with last read file containing the setting taking precedence \u2022 It is recommended that settings be configured in a .conf file in the /etc/security/pwquality.conf.d/ directory for clarity, convenience, and durability. - OR/IF - the pam-config tool has been used to configure the global PAM configuration files. Run the following command to verify that complexity conforms to local site policy: # pam-config --query --cracklib Example outputs: password: difok=2 minlen=14 minclass = 4 -- AND/OR -- password: difok=2 minlen=14 minclass=4 dcredit=-1 ucredit=-1 ocredit=-1 lcredit=-1 Note: If there is no output then the pam-config tool has not been used to configure the cracklib pam module. Remediation should be done by editing a .conf file in the /etc/security/pwquality.conf.d/ directory or the/etc/security/pwquality.conf file."
        save_as: result
    emit:
      as: item
      item:
        check: password_complexity_is_configured
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: suse.section_5.password_same_consecutive_characters_is_configured
    description: Ensure password same consecutive characters is configured
    calls:
      - action: run_command
        command: "Run the following command to verify that the maxrepeat option is set to 3 or less, not 0, and follows local site policy: # grep -Psi -- \u0027^\\h*maxrepeat\\h*=\\h*[1-3]\\b\u0027 /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf Example output: /etc/security/pwquality.conf.d/50-pwrepeat.conf:maxrepeat = 3 Notes: \u2022 Settings should be configured in only one location for clarity \u2022 Settings observe an order of precedence: o module arguments override the settings in the /etc/security/pwquality.conf configuration file o settings in the /etc/security/pwquality.conf configuration file override settings in a .conf file in the /etc/security/pwquality.conf.d/ directory o settings in a .conf file in the /etc/security/pwquality.conf.d/ directory are read in canonical order, with last read file containing the setting taking precedence \u2022 It is recommended that settings be configured in a .conf file in the /etc/security/pwquality.conf.d/ directory for clarity, convenience, and durability. - OR/IF - the pam-config tool has been used to configure the global PAM configuration files. Run the following command to verify that the maxrepeat option is set to 3 or less, not 0, and follows local site policy: # pam-config --query --cracklib --cracklib-maxrepeat Example output: password: difok=2 minlen=14 minclass=4 maxrepeat = 3 Note: If there is no output then the pam-config tool has not been used to configure the cracklib pam module. Remediation should be done by editing a .conf file in the /etc/security/pwquality.conf.d/ directory or the/etc/security/pwquality.conf file."
        save_as: result
    emit:
      as: item
      item:
        check: password_same_consecutive_characters_is_configured
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: suse.section_5.password_maximum_sequential_characters_is
    description: Ensure password maximum sequential characters is configured
    calls:
      - action: run_command
        command: "Run the following command to verify that the maxsequence option is set to 3 or less, not 0, and follows local site policy: # grep -Psi -- \u0027^\\h*maxsequence\\h*=\\h*[1-3]\\b\u0027 /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf Example output: /etc/security/pwquality.conf.d/50-pwmaxsequence.conf:maxsequence = 3 Note: \u2022 Settings should be configured in only one location for clarity \u2022 Settings observe an order of precedence: o module arguments override the settings in the /etc/security/pwquality.conf configuration file o settings in the /etc/security/pwquality.conf configuration file override settings in a .conf file in the /etc/security/pwquality.conf.d/ directory o settings in a .conf file in the /etc/security/pwquality.conf.d/ directory are read in canonical order, with last read file containing the setting taking precedence \u2022 It is recommended that settings be configured in a .conf file in the /etc/security/pwquality.conf.d/ directory for clarity, convenience, and durability. - OR/IF - the pam-config tool has been used to configure the global PAM configuration files. Run the following command to verify that the maxsequence option is set to 3 or less, not 0, and follows local site policy: # pam-config --query --cracklib --cracklib-maxsequence Example output: password: difok=2 minlen=14 minclass=4 maxrepeat=3 maxsequence = 3 Note: If there is no output then the pam-config tool has not been used to configure the cracklib pam module. Remediation should be done by editing a .conf file in the /etc/security/pwquality.conf.d/ directory or the/etc/security/pwquality.conf file."
        save_as: result
    emit:
      as: item
      item:
        check: password_maximum_sequential_characters_is
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: suse.section_5.password_quality_is_enforced_for_the_root_user
