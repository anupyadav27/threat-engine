  - discovery_id: debian.section_5.sshd_banner_is_configured
    description: Ensure sshd Banner is configured
    calls:
      - action: run_command
        command: "Run the following command to verify Banner is set: # sshd -T | grep -Pi -- \u0027^banner\\h+\\/\\H+\u0027 Example: banner /etc/issue.net - IF - Match set statements are used in your environment, specify the connection parameters to use for the -T extended test mode and run the audit to verify the setting is not incorrectly configured in a match block Example additional audit needed for a match block for the user sshuser: # sshd -T -C user=sshuser | grep -Pi -- \u0027^banner\\h+\\/\\H+\u0027 Note: If provided, any Match directives in the configuration file that would apply are applied before the configuration is written to standard output. The connection parameters are supplied as keyword=value pairs and may be supplied in any order, either with multiple -C options or as a comma-separated list. The keywords are addr (source address), user (user), host (resolved source host name), laddr (local address), lport (local port number), and rdomain (routing domain). Run the following command and verify that the contents or the file being called by the Banner argument match site policy: # [ -e \u0027$(sshd -T | awk \u0027$1 == \u0027banner\u0027 {print $2}\u0027)\u0027 ] \u0026\u0026 cat \u0027$(sshd -T | awk \u0027$1 == \u0027banner\u0027 {print $2}\u0027)\u0027 Run the following command and verify no results are returned: # grep -Psi -- \u0027(\\\\\\v|\\\\\\r|\\\\\\m|\\\\\\s|\\b$(grep \u0027^ID=\u0027 /etc/os-release | cut - d= -f2 | sed -e \u0027s/\u0027//g\u0027)\\b)\u0027 \u0027$(sshd -T | awk \u0027$1 == \u0027banner\u0027 {print $2}\u0027)\u0027"
        save_as: result
    emit:
