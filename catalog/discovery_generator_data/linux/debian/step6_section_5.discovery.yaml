version: '1.0'
provider: linux
engine: debian
category: section_5
cis_section: '5'
description: >
  debian CIS Section 5 — permissions on /etc/ssh/sshd_config are configured

discovery:

  - discovery_id: debian.section_5.permissions_on_etc_ssh_sshd_config_are_configured
    description: Ensure permissions on /etc/ssh/sshd_config are configured
    calls:
      - action: run_command
        command: "Run the following script and verify /etc/ssh/sshd_config and files ending in .conf in the /etc/ssh/sshd_config.d directory are: \u2022 Mode 0600 or more restrictive \u2022 Owned by the root user \u2022 Group owned by the group root. #!/usr/bin/env bash { a_output=(); a_output2=() perm_mask=\u00270177\u0027 \u0026\u0026 maxperm=\u0027$( printf \u0027%o\u0027 $(( 0777 \u0026 ~$perm_mask)) )\u0027 f_sshd_files_chk() { while IFS=: read -r l_mode l_user l_group; do a_out2=() [ $(( $l_mode \u0026 $perm_mask )) -gt 0 ] \u0026\u0026 a_out2+=(\u0027 Is mode: \\\u0027$l_mode\\\u0027\u0027 \\ \u0027 should be mode: \\\u0027$maxperm\\\u0027 or more restrictive\u0027) [ \u0027$l_user\u0027 != \u0027root\u0027 ] \u0026\u0026 a_out2+=(\u0027 Is owned by \\\u0027$l_user\\\u0027 should be owned by \\\u0027root\\\u0027\u0027) [ \u0027$l_group\u0027 != \u0027root\u0027 ] \u0026\u0026 a_out2+=(\u0027 Is group owned by \\\u0027$l_user\\\u0027 should be group owned by \\\u0027root\\\u0027\u0027) if [ \u0027${#a_out2[@]}\u0027 -gt \u00270\u0027 ]; then a_output2+=(\u0027 - File: \\\u0027$l_file\\\u0027:\u0027 \u0027${a_out2[@]}\u0027) else a_output+=(\u0027 - File: \\\u0027$l_file\\\u0027:\u0027 \u0027 Correct: mode ($l_mode), owner ($l_user)\u0027 \\ \u0027 and group owner ($l_group) configured\u0027) fi done \u003c \u003c(stat -Lc \u0027%#a:%U:%G\u0027 \u0027$l_file\u0027) } [ -e \u0027/etc/ssh/sshd_config\u0027 ] \u0026\u0026 l_file=\u0027/etc/ssh/sshd_config\u0027 \u0026\u0026 f_sshd_files_chk while IFS= read -r -d $\u0027\\0\u0027 l_file; do [ -e \u0027$l_file\u0027 ] \u0026\u0026 f_sshd_files_chk done \u003c \u003c(find /etc/ssh/sshd_config.d -type f -name \u0027*.conf\u0027 \\( -perm /077 -o ! -user root -o ! -group root \\) -print0 2\u003e/dev/null) if [ \u0027${#a_output2[@]}\u0027 -le 0 ]; then printf \u0027%s\\n\u0027 \u0027\u0027 \u0027- Audit Result:\u0027 \u0027 ** PASS **\u0027 \u0027${a_output[@]}\u0027 \u0027\u0027 else printf \u0027%s\\n\u0027 \u0027\u0027 \u0027- Audit Result:\u0027 \u0027 ** FAIL **\u0027 \u0027 - Reason(s) for audit failure:\u0027 \u0027${a_output2[@]}\u0027 [ \u0027${#a_output[@]}\u0027 -gt 0 ] \u0026\u0026 printf \u0027%s\\n\u0027 \u0027\u0027 \u0027- Correctly set:\u0027 \u0027${a_output[@]}\u0027 \u0027\u0027 fi } - IF - other locations are listed in an Include statement, *.conf files in these locations should also be checked."
        save_as: result
    emit:
      as: item
      item:
        check: permissions_on_etc_ssh_sshd_config_are_configured
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: debian.section_5.permissions_on_ssh_private_host_key_files_are
    description: Ensure permissions on SSH private host key files are configured
    calls:
      - action: run_command
        command: "Run the following script to verify SSH private host key files are owned by the root user and either: \u2022 owned by the group root and mode 0600 or more restrictive - OR - \u2022 owned by the group designated to own openSSH private keys and mode 0640 or more restrictive #!/usr/bin/env bash { a_output=(); a_output2=() l_ssh_group_name=\u0027$(awk -F: \u0027($1 ~ /^(ssh_keys|_?ssh)$/) {print $1}\u0027 /etc/group)\u0027 f_file_chk() { while IFS=: read -r l_file_mode l_file_owner l_file_group; do a_out2=() [ \u0027$l_file_group\u0027 = \u0027$l_ssh_group_name\u0027 ] \u0026\u0026 l_pmask=\u00270137\u0027 || l_pmask=\u00270177\u0027 l_maxperm=\u0027$( printf \u0027%o\u0027 $(( 0777 \u0026 ~$l_pmask )) )\u0027 if [ $(( $l_file_mode \u0026 $l_pmask )) -gt 0 ]; then a_out2+=(\u0027 Mode: \\\u0027$l_file_mode\\\u0027 should be mode: \\\u0027$l_maxperm\\\u0027 or more restrictive\u0027) fi if [ \u0027$l_file_owner\u0027 != \u0027root\u0027 ]; then a_out2+=(\u0027 Owned by: \\\u0027$l_file_owner\\\u0027 should be owned by \\\u0027root\\\u0027\u0027) fi if [[ ! \u0027$l_file_group\u0027 =~ ($l_ssh_group_name|root) ]]; then a_out2+=(\u0027 Owned by group \\\u0027$l_file_group\\\u0027 should be group owned by: \\\u0027$l_ssh_group_name\\\u0027 or \\\u0027root\\\u0027\u0027) fi if [ \u0027${#a_out2[@]}\u0027 -gt \u00270\u0027 ]; then a_output2+=(\u0027 - File: \\\u0027$l_file\\\u0027${a_out2[@]}\u0027) else a_output+=(\u0027 - File: \\\u0027$l_file\\\u0027\u0027 \\ \u0027 Correct: mode: \\\u0027$l_file_mode\\\u0027, owner: \\\u0027$l_file_owner\\\u0027 and group owner: \\\u0027$l_file_group\\\u0027 configured\u0027) fi done \u003c \u003c(stat -Lc \u0027%#a:%U:%G\u0027 \u0027$l_file\u0027) } while IFS= read -r -d $\u0027\\0\u0027 l_file; do if ssh-keygen -lf \u0026\u003e/dev/null \u0027$l_file\u0027; then file \u0027$l_file\u0027 | grep -Piq -- \u0027\\bopenssh\\h+([^#\\n\\r]+\\h+)?private\\h+key\\b\u0027 \u0026\u0026 f_file_chk fi done \u003c \u003c(find -L /etc/ssh -xdev -type f -print0 2\u003e/dev/null) if [ \u0027${#a_output2[@]}\u0027 -le 0 ]; then printf \u0027%s\\n\u0027 \u0027\u0027 \u0027- Audit Result:\u0027 \u0027 ** PASS **\u0027 \u0027${a_output[@]}\u0027 \u0027\u0027 else printf \u0027%s\\n\u0027 \u0027\u0027 \u0027- Audit Result:\u0027 \u0027 ** FAIL **\u0027 \u0027 - Reason(s) for audit failure:\u0027 \u0027${a_output2[@]}\u0027 [ \u0027${#a_output[@]}\u0027 -gt 0 ] \u0026\u0026 printf \u0027%s\\n\u0027 \u0027\u0027 \u0027- Correctly set:\u0027 \u0027${a_output[@]}\u0027 \u0027\u0027 fi }"
        save_as: result
    emit:
      as: item
      item:
        check: permissions_on_ssh_private_host_key_files_are
        value: "{{ result.stdout }}"
        expected: ""

