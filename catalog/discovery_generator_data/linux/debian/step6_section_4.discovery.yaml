version: '1.0'
provider: linux
engine: debian
category: section_4
cis_section: '4'
description: >
  debian CIS Section 4 — a single firewall configuration utility is in use

discovery:

  - discovery_id: debian.section_4.a_single_firewall_configuration_utility_is_in_use
    description: Ensure a single firewall configuration utility is in use
    calls:
      - action: run_command
        command: "Run the following script to verify that a single firewall utility is in use on the system: #!/usr/bin/env bash { active_firewall=() firewalls=(\u0027ufw\u0027 \u0027nftables\u0027 \u0027iptables\u0027) # Determine which firewall is in use for firewall in \u0027${firewalls[@]}\u0027; do case $firewall in nftables) cmd=\u0027nft\u0027 ;; *) cmd=$firewall ;; esac if command -v $cmd \u0026\u003e /dev/null \u0026\u0026 systemctl is-enabled --quiet $firewall \u0026\u0026 systemctl is-active --quiet $firewall; then active_firewall+=(\u0027$firewall\u0027) fi done # Display audit results if [ ${#active_firewall[@]} -eq 1 ]; then printf \u0027%s\\n\u0027 \u0027\u0027 \u0027Audit Results:\u0027 \u0027 ** PASS **\u0027 \u0027 - A single firewall is in use follow the recommendation in ${active_firewall[0]} subsection ONLY\u0027 elif [ ${#active_firewall[@]} -eq 0 ]; then printf \u0027%s\\n\u0027 \u0027\u0027 \u0027 Audit Results:\u0027 \u0027 ** FAIL **\u0027 \u0027- No firewall in use or unable to determine firewall status\u0027 else printf \u0027%s\\n\u0027 \u0027\u0027 \u0027 Audit Results:\u0027 \u0027 ** FAIL **\u0027 \u0027 - Multiple firewalls are in use: ${active_firewall[*]}\u0027 fi }"
        save_as: result
    emit:
      as: item
      item:
        check: a_single_firewall_configuration_utility_is_in_use
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: debian.section_4.ufw_is_installed
