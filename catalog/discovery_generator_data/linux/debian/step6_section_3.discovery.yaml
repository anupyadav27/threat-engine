se_directory/${l_mod_name/-/\\/}\u0027 ] \u0026\u0026 [ -n \u0027$(ls -A \u0027$l_mod_base_directory/${l_mod_name/-/\\/}\u0027)\u0027 ]; then a_output3+=(\u0027 - \\\u0027$l_mod_base_directory\\\u0027\u0027) l_mod_chk_name=\u0027$l_mod_name\u0027 [[ \u0027$l_mod_name\u0027 =~ overlay ]] \u0026\u0026 l_mod_chk_name=\u0027${l_mod_name::-2}\u0027 [ \u0027$l_dl\u0027 != \u0027y\u0027 ] \u0026\u0026 f_module_chk else a_output+=(\u0027 - kernel module: \\\u0027$l_mod_name\\\u0027 doesn\u0027t exist in \\\u0027$l_mod_base_directory\\\u0027\u0027) fi done [ \u0027${#a_output3[@]}\u0027 -gt 0 ] \u0026\u0026 printf \u0027%s\\n\u0027 \u0027\u0027 \u0027 -- INFO --\u0027 \u0027 - module: \\\u0027$l_mod_name\\\u0027 exists in:\u0027 \u0027${a_output3[@]}\u0027 if [ \u0027${#a_output2[@]}\u0027 -le 0 ]; then printf \u0027%s\\n\u0027 \u0027\u0027 \u0027- Audit Result:\u0027 \u0027 ** PASS **\u0027 \u0027${a_output[@]}\u0027 else printf \u0027%s\\n\u0027 \u0027\u0027 \u0027- Audit Result:\u0027 \u0027 ** FAIL **\u0027 \u0027 - Reason(s) for audit failure:\u0027 \u0027${a_output2[@]}\u0027 [ \u0027${#a_output[@]}\u0027 -gt 0 ] \u0026\u0026 printf \u0027%s\\n\u0027 \u0027- Correctly set:\u0027 \u0027${a_output[@]}\u0027 fi }"
