e\\\u0027 is correctly set to \\\u0027$l_file_parameter_value\\\u0027\u0027 \\ \u0027 in \\\u0027$(printf \u0027%s\u0027 \u0027${A_out[@]}\u0027)\\\u0027\u0027) else a_output2+=(\u0027 - \\\u0027$l_parameter_name\\\u0027 is incorrectly set to \\\u0027$l_file_parameter_value\\\u0027\u0027 \u0027 in \\\u0027$(printf \u0027%s\u0027 \u0027${A_out[@]}\u0027)\\\u0027\u0027 \\ \u0027 and should have a value of: \\\u0027$l_value_out\\\u0027\u0027) fi done \u003c \u003c(grep -Po -- \u0027^\\h*$l_parameter_name\\h*=\\h*\\H+\u0027 \u0027${A_out[@]}\u0027) else a_output2+=(\u0027 - \\\u0027$l_parameter_name\\\u0027 is not set in an included file\u0027 \\ \u0027 ** Note: \\\u0027$l_parameter_name\\\u0027 May be set in a file that\u0027s ignored by load procedure **\u0027) fi } l_systemdsysctl=\u0027$(readlink -f /lib/systemd/systemd-sysctl)\u0027 while IFS=\u0027=\u0027 read -r l_parameter_name l_parameter_value; do # Assess and check parameters l_parameter_name=\u0027${l_parameter_name// /}\u0027; l_parameter_value=\u0027${l_parameter_value// /}\u0027 l_value_out=\u0027${l_parameter_value//-/ through }\u0027; l_value_out=\u0027${l_value_out//|/ or }\u0027 l_value_out=\u0027$(tr -d \u0027(){}\u0027 \u003c\u003c\u003c \u0027$l_value_out\u0027)\u0027 if grep -q \u0027^net.ipv6.\u0027 \u003c\u003c\u003c \u0027$l_parameter_name\u0027; then [ -z \u0027$l_ipv6_disabled\u0027 ] \u0026\u0026 f_ipv6_chk if [ \u0027$l_ipv6_disabled\u0027 = \u0027yes\u0027 ]; then a_output+=(\u0027 - IPv6 is disabled on the system, \\\u0027$l_parameter_name\\\u0027 is not applicable\u0027) else f_kernel_parameter_chk fi else f_kernel_parameter_chk fi done \u003c \u003c(printf \u0027%s\\n\u0027 \u0027${a_parlist[@]}\u0027) if [ \u0027${#a_output2[@]}\u0027 -le 0 ]; then printf \u0027%s\\n\u0027 \u0027\u0027 \u0027- Audit Result:\u0027 \u0027 ** PASS **\u0027 \u0027${a_output[@]}\u0027 \u0027\u0027 else printf \u0027%s\\n\u0027 \u0027\u0027 \u0027- Audit Result:\u0027 \u0027 ** FAIL **\u0027 \u0027 - Reason(