  - discovery_id: debian.section_3.tipc_kernel_module_is_not_available
    description: Ensure tipc kernel module is not available
    calls:
      - action: run_command
        command: "Run the following script to verify: - IF - the tipc kernel module is available in ANY installed kernel, verify: \u2022 An entry including /bin/true or /bin/false exists in a file within the /etc/modprobe.d/ directory \u2022 The module is deny listed in a file within the /etc/modprobe.d/ directory \u2022 The module is not loaded in the running kernel - IF - the tipc kernel module is not available on the system, or pre-compiled into the kernel, no additional configuration is necessary #!/usr/bin/env bash { a_output=() a_output2=() a_output3=() l_dl=\u0027\u0027 l_mod_name=\u0027tipc\u0027 l_mod_type=\u0027net\u0027 l_mod_path=\u0027$(readlink -f /lib/modules/**/kernel/$l_mod_type | sort -u)\u0027 f_module_chk() { l_dl=\u0027y\u0027 a_showconfig=() while IFS= read -r l_showconfig; do a_showconfig+=(\u0027$l_showconfig\u0027) done \u003c \u003c(modprobe --showconfig | grep -P -- \u0027\\b(install|blacklist)\\h+\u0027\u0027${l_mod_chk_name//-/_}\u0027\u0027\\b\u0027) if ! lsmod | grep \u0027$l_mod_chk_name\u0027 \u0026\u003e /dev/null; then a_output+=(\u0027 - kernel module: \\\u0027$l_mod_name\\\u0027 is not loaded\u0027) else a_output2+=(\u0027 - kernel module: \\\u0027$l_mod_name\\\u0027 is loaded\u0027) fi if grep -Pq -- \u0027\\binstall\\h+\u0027\u0027${l_mod_chk_name//- /_}\u0027\u0027\\h+(\\/usr)?\\/bin\\/(true|false)\\b\u0027 \u003c\u003c\u003c \u0027${a_showconfig[*]}\u0027; then a_output+=(\u0027 - kernel module: \\\u0027$l_mod_name\\\u0027 is not loadable\u0027) else a_output2+=(\u0027 - kernel module: \\\u0027$l_mod_name\\\u0027 is loadable\u0027) fi if grep -Pq -- \u0027\\bblacklist\\h+\u0027\u0027${l_mod_chk_name//-/_}\u0027\u0027\\b\u0027 \u003c\u003c\u003c \u0027${a_showconfig[*]}\u0027; then a_output+=(\u0027 - kernel module: \\\u0027$l_mod_name\\\u0027 is deny listed\u0027) else a_output2+=(\u0027 - kernel module: \\\u0027$l_mod_name\\\u0027 is not deny listed\u0027) fi } for l_mod_base_directory in $l_mod_path; do if [ -d \u0027$l_mod_base_directory/${l_mod_name/-/\\/}\u0027 ] \u0026\u0026 [ -n \u0027$(ls -A \u0027$l_mod_base_directory/${l_mod_name/-/\\/}\u0027)\u0027 ]; then a_output3+=(\u0027 - \\\u0027$l_mod_base_directory\\\u0027\u0027) l_mod_chk_name=\u0027$l_mod_name\u0027 [[ \u0027$l_mod_name\u0027 =~ overlay ]] \u0026\u0026 l_mod_chk_name=\u0027${l_mod_name::-2}\u0027 [ \u0027$l_dl\u0027 != \u0027y\u0027 ] \u0026\u0026 f_module_chk else a_output+=(\u0027 - kernel module: \\\u0027$l_mod_name\\\u0027 doesn\u0027t exist in \\\u0027$l_mod_base_directory\\\u0027\u0027) fi done [ \u0027${#a_output3[@]}\u0027 -gt 0 ] \u0026\u0026 printf \u0027%s\\n\u0027 \u0027\u0027 \u0027 -- INFO --\u0027 \u0027 - module: \\\u0027$l_mod_name\\\u0027 exists in:\u0027 \u0027${a_output3[@]}\u0027 if [ \u0027${#a_output2[@]}\u0027 -le 0 ]; then printf \u0027%s\\n\u0027 \u0027\u0027 \u0027- Audit Result:\u0027 \u0027 ** PASS **\u0027 \u0027${a_output[@]}\u0027 else printf \u0027%s\\n\u0027 \u0027\u0027 \u0027- Audit Result:\u0027 \u0027 ** FAIL **\u0027 \u0027 - Reason(s) for audit failure:\u0027 \u0027${a_output2[@]}\u0027 [ \u0027${#a_output[@]}\u0027 -gt 0 ] \u0026\u0026 printf \u0027%s\\n\u0027 \u0027- Correctly set:\u0027 \u0027${a_output[@]}\u0027 fi }"
        save_as: result
    emit:
      as: item
      item:
        check: tipc_kernel_module_is_not_available
        value: "{{ result.stdout }}"
        expected: ""

