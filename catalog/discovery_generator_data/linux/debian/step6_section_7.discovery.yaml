  - discovery_id: debian.section_7.local_interactive_user_home_directories_are
    description: Ensure local interactive user home directories are configured
    calls:
      - action: run_command
        command: "Run the following script to Ensure: \u2022 local interactive user home directories exist \u2022 Ensure local interactive users own their home directories \u2022 Ensure local interactive user home directories are mode 750 or more restrictive #!/usr/bin/env bash { l_output=\u0027\u0027 l_output2=\u0027\u0027 l_heout2=\u0027\u0027 l_hoout2=\u0027\u0027 l_haout2=\u0027\u0027 l_valid_shells=\u0027^($( awk -F\\/ \u0027$NF != \u0027nologin\u0027 {print}\u0027 /etc/shells | sed -rn \u0027/^\\//{s,/,\\\\\\\\/,g;p}\u0027 | paste -s -d \u0027|\u0027 - ))$\u0027 unset a_uarr \u0026\u0026 a_uarr=() # Clear and initialize array while read -r l_epu l_eph; do # Populate array with users and user home location a_uarr+=(\u0027$l_epu $l_eph\u0027) done \u003c\u003c\u003c \u0027$(awk -v pat=\u0027$l_valid_shells\u0027 -F: \u0027$(NF) ~ pat { print $1 \u0027 \u0027 $(NF-1) }\u0027 /etc/passwd)\u0027 l_asize=\u0027${#a_uarr[@]}\u0027 # Here if we want to look at number of users before proceeding [ \u0027$l_asize \u0027 -gt \u002710000\u0027 ] \u0026\u0026 echo -e \u0027\\n ** INFO **\\n - \\\u0027$l_asize\\\u0027 Local interactive users found on the system\\n - This may be a long running check\\n\u0027 while read -r l_user l_home; do if [ -d \u0027$l_home\u0027 ]; then l_mask=\u00270027\u0027 l_max=\u0027$( printf \u0027%o\u0027 $(( 0777 \u0026 ~$l_mask)) )\u0027 while read -r l_own l_mode; do [ \u0027$l_user\u0027 != \u0027$l_own\u0027 ] \u0026\u0026 l_hoout2=\u0027$l_hoout2\\n - User: \\\u0027$l_user\\\u0027 Home \\\u0027$l_home\\\u0027 is owned by: \\\u0027$l_own\\\u0027\u0027 if [ $(( $l_mode \u0026 $l_mask )) -gt 0 ]; then l_haout2=\u0027$l_haout2\\n - User: \\\u0027$l_user\\\u0027 Home \\\u0027$l_home\\\u0027 is mode: \\\u0027$l_mode\\\u0027 should be mode: \\\u0027$l_max\\\u0027 or more restrictive\u0027 fi done \u003c\u003c\u003c \u0027$(stat -Lc \u0027%U %#a\u0027 \u0027$l_home\u0027)\u0027 else l_heout2=\u0027$l_heout2\\n - User: \\\u0027$l_user\\\u0027 Home \\\u0027$l_home\\\u0027 Doesn\u0027t exist\u0027 fi done \u003c\u003c\u003c \u0027$(printf \u0027%s\\n\u0027 \u0027${a_uarr[@]}\u0027)\u0027 [ -z \u0027$l_heout2\u0027 ] \u0026\u0026 l_output=\u0027$l_output\\n - home directories exist\u0027 || l_output2=\u0027$l_output2$l_heout2\u0027 [ -z \u0027$l_hoout2\u0027 ] \u0026\u0026 l_output=\u0027$l_output\\n - own their home directory\u0027 || l_output2=\u0027$l_output2$l_hoout2\u0027 [ -z \u0027$l_haout2\u0027 ] \u0026\u0026 l_output=\u0027$l_output\\n - home directories are mode: \\\u0027$l_max\\\u0027 or more restrictive\u0027 || l_output2=\u0027$l_output2$l_haout2\u0027 [ -n \u0027$l_output\u0027 ] \u0026\u0026 l_output=\u0027 - All local interactive users:$l_output\u0027 if [ -z \u0027$l_output2\u0027 ]; then # If l_output2 is empty, we pass echo -e \u0027\\n- Audit Result:\\n ** PASS **\\n - * Correctly configured * :\\n$l_output\u0027 else echo -e \u0027\\n- Audit Result:\\n ** FAIL **\\n - * Reasons for audit failure * :\\n$l_output2\u0027 [ -n \u0027$l_output\u0027 ] \u0026\u0026 echo -e \u0027\\n- * Correctly configured * :\\n$l_output\u0027 fi }"
        save_as: result
    emit:
      as: item
      item:
        check: local_interactive_user_home_directories_are
        value: "{{ result.stdout }}"
        expected: ""

