  - discovery_id: debian.section_7.world_writable_files_and_directories_are_secured
    description: Ensure world writable files and directories are secured
    calls:
      - action: run_command
        command: "Run the following script to verify: \u2022 No world writable files exist \u2022 No world writable directories without the sticky bit exist #!/usr/bin/env bash { l_output=\u0027\u0027 l_output2=\u0027\u0027 l_smask=\u002701000\u0027 a_file=(); a_dir=() # Initialize arrays a_path=(! -path \u0027/run/user/*\u0027 -a ! -path \u0027/proc/*\u0027 -a ! -path \u0027*/containerd/*\u0027 -a ! -path \u0027*/kubelet/pods/*\u0027 -a ! -path \u0027*/kubelet/plugins/*\u0027 -a ! -path \u0027/sys/*\u0027 -a ! -path \u0027/snap/*\u0027) while IFS= read -r l_mount; do while IFS= read -r -d $\u0027\\0\u0027 l_file; do if [ -e \u0027$l_file\u0027 ]; then [ -f \u0027$l_file\u0027 ] \u0026\u0026 a_file+=(\u0027$l_file\u0027) # Add WR files if [ -d \u0027$l_file\u0027 ]; then # Add directories w/o sticky bit l_mode=\u0027$(stat -Lc \u0027%#a\u0027 \u0027$l_file\u0027)\u0027 [ ! $(( $l_mode \u0026 $l_smask )) -gt 0 ] \u0026\u0026 a_dir+=(\u0027$l_file\u0027) fi fi done \u003c \u003c(find \u0027$l_mount\u0027 -xdev \\( \u0027${a_path[@]}\u0027 \\) \\( -type f -o -type d \\) -perm -0002 -print0 2\u003e /dev/null) done \u003c \u003c(findmnt -Dkerno fstype,target | awk \u0027($1 !~ /^\\s*(nfs|proc|smb|vfat|iso9660|efivarfs|selinuxfs)/ \u0026\u0026 $2 !~ /^(\\/run\\/user\\/|\\/tmp|\\/var\\/tmp)/){print $2}\u0027) if ! (( ${#a_file[@]} \u003e 0 )); then l_output=\u0027$l_output\\n - No world writable files exist on the local filesystem.\u0027 else l_output2=\u0027$l_output2\\n - There are \\\u0027$(printf \u0027%s\u0027 \u0027${#a_file[@]}\u0027)\\\u0027 World writable files on the system.\\n - The following is a list of World writable files:\\n$(printf \u0027%s\\n\u0027 \u0027${a_file[@]}\u0027)\\n - end of list\\n\u0027 fi if ! (( ${#a_dir[@]} \u003e 0 )); then l_output=\u0027$l_output\\n - Sticky bit is set on world writable directories on the local filesystem.\u0027 else l_output2=\u0027$l_output2\\n - There are \\\u0027$(printf \u0027%s\u0027 \u0027${#a_dir[@]}\u0027)\\\u0027 World writable directories without the sticky bit on the system.\\n - The following is a list of World writable directories without the sticky bit:\\n$(printf \u0027%s\\n\u0027 \u0027${a_dir[@]}\u0027)\\n - end of list\\n\u0027 fi unset a_path; unset a_arr; unset a_file; unset a_dir # Remove arrays # If l_output2 is empty, we pass if [ -z \u0027$l_output2\u0027 ]; then echo -e \u0027\\n- Audit Result:\\n ** PASS **\\n - * Correctly configured * :\\n$l_output\\n\u0027 else echo -e \u0027\\n- Audit Result:\\n ** FAIL **\\n - * Reasons for audit failure * :\\n$l_output2\u0027 [ -n \u0027$l_output\u0027 ] \u0026\u0026 echo -e \u0027- * Correctly configured * :\\n$l_output\\n\u0027 fi } Note: On systems with a large number of files and/or directories, this audit may be a long running process"
        save_as: result
    emit:
      as: item
      item:
        check: world_writable_files_and_directories_are_secured
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: debian.section_7.no_files_or_directories_without_an_owner_and_a
    description: Ensure no files or directories without an owner and a group exist
    calls:
      - action: run_command
        command: "Run the following script to verify no unowned or ungrouped files or directories exist: #!/usr/bin/env bash { l_output=\u0027\u0027 l_output2=\u0027\u0027 a_nouser=(); a_nogroup=() # Initialize arrays a_path=(! -path \u0027/run/user/*\u0027 -a ! -path \u0027/proc/*\u0027 -a ! -path \u0027*/containerd/*\u0027 -a ! -path \u0027*/kubelet/pods/*\u0027 -a ! -path \u0027*/kubelet/plugins/*\u0027 -a ! -path \u0027/sys/fs/cgroup/memory/*\u0027 -a ! -path \u0027/var/*/private/*\u0027) while IFS= read -r l_mount; do while IFS= read -r -d $\u0027\\0\u0027 l_file; do if [ -e \u0027$l_file\u0027 ]; then while IFS=: read -r l_user l_group; do [ \u0027$l_user\u0027 = \u0027UNKNOWN\u0027 ] \u0026\u0026 a_nouser+=(\u0027$l_file\u0027) [ \u0027$l_group\u0027 = \u0027UNKNOWN\u0027 ] \u0026\u0026 a_nogroup+=(\u0027$l_file\u0027) done \u003c \u003c(stat -Lc \u0027%U:%G\u0027 \u0027$l_file\u0027) fi done \u003c \u003c(find \u0027$l_mount\u0027 -xdev \\( \u0027${a_path[@]}\u0027 \\) \\( -type f -o -type d \\) \\( -nouser -o -nogroup \\) -print0 2\u003e /dev/null) done \u003c \u003c(findmnt -Dkerno fstype,target | awk \u0027($1 !~ /^\\s*(nfs|proc|smb|vfat|iso9660|efivarfs|selinuxfs)/ \u0026\u0026 $2 !~ /^\\/run\\/user\\//){print $2}\u0027) if ! (( ${#a_nouser[@]} \u003e 0 )); then l_output=\u0027$l_output\\n - No files or directories without a owner exist on the local filesystem.\u0027 else l_output2=\u0027$l_output2\\n - There are \\\u0027$(printf \u0027%s\u0027 \u0027${#a_nouser[@]}\u0027)\\\u0027 unowned files or directories on the system.\\n - The following is a list of unowned files and/or directories:\\n$(printf \u0027%s\\n\u0027 \u0027${a_nouser[@]}\u0027)\\n - end of list\u0027 fi if ! (( ${#a_nogroup[@]} \u003e 0 )); then l_output=\u0027$l_output\\n - No files or directories without a group exist on the local filesystem.\u0027 else l_output2=\u0027$l_output2\\n - There are \\\u0027$(printf \u0027%s\u0027 \u0027${#a_nogroup[@]}\u0027)\\\u0027 ungrouped files or directories on the system.\\n - The following is a list of ungrouped files and/or directories:\\n$(printf \u0027%s\\n\u0027 \u0027${a_nogroup[@]}\u0027)\\n - end of list\u0027 fi unset a_path; unset a_arr ; unset a_nouser; unset a_nogroup # Remove arrays if [ -z \u0027$l_output2\u0027 ]; then # If l_output2 is empty, we pass echo -e \u0027\\n- Audit Result:\\n ** PASS **\\n - * Correctly configured * :\\n$l_output\\n\u0027 else echo -e \u0027\\n- Audit Result:\\n ** FAIL **\\n - * Reasons for audit failure * :\\n$l_output2\u0027 [ -n \u0027$l_output\u0027 ] \u0026\u0026 echo -e \u0027\\n- * Correctly configured * :\\n$l_output\\n\u0027 fi } Note: On systems with a large number of files and/or directories, this audit may be a long running process"
        save_as: result
    emit:
      as: item
      item:
        check: no_files_or_directories_without_an_owner_and_a
        value: "{{ result.stdout }}"
        expected: ""

