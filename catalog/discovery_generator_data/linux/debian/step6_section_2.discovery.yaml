version: '1.0'
provider: linux
engine: debian
category: section_2
cis_section: '2'
description: >
  debian CIS Section 2 — autofs services are not in use

discovery:

  - discovery_id: debian.section_2.autofs_services_are_not_in_use
    description: Ensure autofs services are not in use
    calls:
      - action: run_command
        command: "As a preference autofs should not be installed unless other packages depend on it. Run the following command to verify autofs is not installed: # dpkg-query -s autofs \u0026\u003e/dev/null \u0026\u0026 echo \u0027autofs is installed\u0027 Nothing should be returned. - OR - - IF - the package is required for dependencies: Run the following command to verify autofs.service is not enabled: # systemctl is-enabled autofs.service 2\u003e/dev/null | grep \u0027enabled\u0027 Nothing should be returned. Run the following command to verify the autofs.service is not active: # systemctl is-active autofs.service 2\u003e/dev/null | grep \u0027^active\u0027 Nothing should be returned. Note: If the package is required for a dependency \u2022 Ensure the dependent package is approved by local site policy \u2022 Ensure stopping and masking the service and/or socket meets local site policy"
        save_as: result
    emit:
      as: item
      item:
        check: autofs_services_are_not_in_use
        value: "{{ result.stdout }}"
        expected: ""

