et a_ulock # Remove arrays if [ -z \u0027$l_output2\u0027 ]; then echo -e \u0027\\n- Audit Result:\\n ** PASS **\\n - * Correctly configured * :\\n$l_output\\n\u0027 else echo -e \u0027\\n- Audit Result:\\n ** FAIL **\\n - * Reasons for audit failure * :\\n$l_output2\u0027 [ -n \u0027$l_output\u0027 ] \u0026\u0026 echo -e \u0027- * Correctly configured * :\\n$l_output\\n\u0027 fi } Note: \u2022 The root, sync, shutdown, and halt users are exempted from requiring a non- login shell \u2022 root is exempt from being locked"
