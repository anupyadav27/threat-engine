      item:
        check: ufw_loopback_traffic_is_configured
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: ubuntu.section_4.ufw_firewall_rules_exist_for_all_open_ports
    description: Ensure ufw firewall rules exist for all open ports
    calls:
      - action: run_command
        command: "Run the following script to verify a firewall rule exists for all open ports: #!/usr/bin/env bash { unset a_ufwout;unset a_openports while read -r l_ufwport; do [ -n \u0027$l_ufwport\u0027 ] \u0026\u0026 a_ufwout+=(\u0027$l_ufwport\u0027) done \u003c \u003c(ufw status verbose | grep -Po \u0027^\\h*\\d+\\b\u0027 | sort -u) while read -r l_openport; do [ -n \u0027$l_openport\u0027 ] \u0026\u0026 a_openports+=(\u0027$l_openport\u0027) done \u003c \u003c(ss -tuln | awk \u0027($5!~/%lo:/ \u0026\u0026 $5!~/127.0.0.1:/ \u0026\u0026 $5!~/\\[?::1\\]?:/) {split($5, a, \u0027:\u0027); print a[2]}\u0027 | sort -u) a_diff=(\u0027$(printf \u0027%s\\n\u0027 \u0027${a_openports[@]}\u0027 \u0027${a_ufwout[@]}\u0027 \u0027${a_ufwout[@]}\u0027 | sort | uniq -u)\u0027) if [[ -n \u0027${a_diff[*]}\u0027 ]]; then echo -e \u0027\\n- Audit Result:\\n ** FAIL **\\n- The following port(s) don\u0027t have a rule in UFW: $(printf \u0027%s\\n\u0027 \\\\n\u0027${a_diff[*]}\u0027)\\n- End List\u0027 else echo -e \u0027\\n - Audit Passed -\\n- All open ports have a rule in UFW\\n\u0027 fi }"
        save_as: result
    emit:
      as: item
      item:
        check: ufw_firewall_rules_exist_for_all_open_ports
        value: "{{ result.stdout }}"
        expected: ""

