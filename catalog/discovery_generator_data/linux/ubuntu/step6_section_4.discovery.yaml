        command: "Run the following command to verify that Uncomplicated Firewall (UFW) is installed: # dpkg-query -s ufw \u0026\u003e/dev/null \u0026\u0026 echo \u0027ufw is installed\u0027 ufw is installed"
        save_as: result
    emit:
      as: item
      item:
        check: ufw_is_installed
        value: "{{ result.stdout }}"
        expected: ""

