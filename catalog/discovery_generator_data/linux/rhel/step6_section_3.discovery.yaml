version: '1.0'
provider: linux
engine: rhel
category: section_3
cis_section: '3'
description: >
  rhel CIS Section 3 — wireless interfaces are disabled

discovery:

  - discovery_id: rhel.section_3.wireless_interfaces_are_disabled
    description: Ensure wireless interfaces are disabled
    calls:
      - action: run_command
        command: "Run the following script to verify no wireless interfaces are active on the system: #!/usr/bin/env bash { l_output=\u0027\u0027 l_output2=\u0027\u0027 module_chk() { # Check how module will be loaded l_loadable=\u0027$(modprobe -n -v \u0027$l_mname\u0027)\u0027 if grep -Pq -- \u0027^\\h*install \\/bin\\/(true|false)\u0027 \u003c\u003c\u003c \u0027$l_loadable\u0027; then l_output=\u0027$l_output\\n - module: \\\u0027$l_mname\\\u0027 is not loadable: \\\u0027$l_loadable\\\u0027\u0027 else l_output2=\u0027$l_output2\\n - module: \\\u0027$l_mname\\\u0027 is loadable: \\\u0027$l_loadable\\\u0027\u0027 fi # Check is the module currently loaded if ! lsmod | grep \u0027$l_mname\u0027 \u003e /dev/null 2\u003e\u00261; then l_output=\u0027$l_output\\n - module: \\\u0027$l_mname\\\u0027 is not loaded\u0027 else l_output2=\u0027$l_output2\\n - module: \\\u0027$l_mname\\\u0027 is loaded\u0027 fi # Check if the module is deny listed if modprobe --showconfig | grep -Pq -- \u0027^\\h*blacklist\\h+$l_mname\\b\u0027; then l_output=\u0027$l_output\\n - module: \\\u0027$l_mname\\\u0027 is deny listed in: \\\u0027$(grep -Pl -- \u0027^\\h*blacklist\\h+$l_mname\\b\u0027 /etc/modprobe.d/*)\\\u0027\u0027 else l_output2=\u0027$l_output2\\n - module: \\\u0027$l_mname\\\u0027 is not deny listed\u0027 fi } if [ -n \u0027$(find /sys/class/net/*/ -type d -name wireless)\u0027 ]; then l_dname=$(for driverdir in $(find /sys/class/net/*/ -type d -name wireless | xargs -0 dirname); do basename \u0027$(readlink -f \u0027$driverdir\u0027/device/driver/module)\u0027;done | sort -u) for l_mname in $l_dname; do module_chk done fi # Report results. If no failures output in l_output2, we pass if [ -z \u0027$l_output2\u0027 ]; then echo -e \u0027\\n- Audit Result:\\n ** PASS **\u0027 if [ -z \u0027$l_output\u0027 ]; then echo -e \u0027\\n - System has no wireless NICs installed\u0027 else echo -e \u0027\\n$l_output\\n\u0027 fi else echo -e \u0027\\n- Audit Result:\\n ** FAIL **\\n - Reason(s) for audit failure:\\n$l_output2\\n\u0027 [ -n \u0027$l_output\u0027 ] \u0026\u0026 echo -e \u0027\\n- Correctly set:\\n$l_output\\n\u0027 fi }"
        save_as: result
    emit:
      as: item
      item:
        check: wireless_interfaces_are_disabled
        value: "{{ result.stdout }}"
        expected: ""

