  - discovery_id: rhel.section_3.ip_forwarding_is_disabled
    description: Ensure ip forwarding is disabled
    calls:
      - action: run_command
        command: "Run the following script to verify the following kernel parameters are set in the running configuration and correctly loaded from a kernel parameter configuration file: \u2022 net.ipv4.ip_forward is set to 0 \u2022 net.ipv6.conf.all.forwarding is set to 0 Note: \u2022 kernel parameters are loaded by file and parameter order precedence. The following script observes this precedence as part of the auditing procedure. The parameters being checked may be set correctly in a file. If that file is superseded, the parameter is overridden by an incorrect setting later in that file, or in a canonically later file, that \u0027correct\u0027 setting will be ignored both by the script and by the system during a normal kernel parameter load sequence. \u2022 IPv6 kernel parameters only apply to systems where IPv6 is enabled #!/usr/bin/env bash { l_output=\u0027\u0027 l_output2=\u0027\u0027 l_ipv6_disabled=\u0027\u0027 # Clear output variables a_parlist=(\u0027net.ipv4.ip_forward=0\u0027 \u0027net.ipv6.conf.all.forwarding=0\u0027) l_ufwscf=\u0027$([ -f /etc/default/ufw ] \u0026\u0026 awk -F= \u0027/^\\s*IPT_SYSCTL=/ {print $2}\u0027 /etc/default/ufw)\u0027 f_ipv6_chk() { l_ipv6_disabled=\u0027\u0027 ! grep -Pqs -- \u0027^\\h*0\\b\u0027 /sys/module/ipv6/parameters/disable \u0026\u0026 l_ipv6_disabled=\u0027yes\u0027 if sysctl net.ipv6.conf.all.disable_ipv6 | grep -Pqs -- \u0027^\\h*net\\.ipv6\\.conf\\.all\\.disable_ipv6\\h*=\\h*1\\b\u0027 \u0026\u0026 \\ sysctl net.ipv6.conf.default.disable_ipv6 | grep -Pqs -- \u0027^\\h*net\\.ipv6\\.conf\\.default\\.disable_ipv6\\h*=\\h*1\\b\u0027; then l_ipv6_disabled=\u0027yes\u0027 fi [ -z \u0027$l_ipv6_disabled\u0027 ] \u0026\u0026 l_ipv6_disabled=\u0027no\u0027 } f_kernel_parameter_chk() { l_krp=\u0027$(sysctl \u0027$l_kpname\u0027 | awk -F= \u0027{print $2}\u0027 | xargs)\u0027 if [ \u0027$l_krp\u0027 = \u0027$l_kpvalue\u0027 ]; then l_output=\u0027$l_output\\n - \\\u0027$l_kpname\\\u0027 is correctly set to \\\u0027$l_krp\\\u0027 in the running configuration\u0027 else l_output2=\u0027$l_output2\\n - \\\u0027$l_kpname\\\u0027 is incorrectly set to \\\u0027$l_krp\\\u0027 in the running configuration and should have a value of: \\\u0027$l_kpvalue\\\u0027\u0027 fi unset A_out; declare -A A_out # Check durable setting (files) while read -r l_out; do if [ -n \u0027$l_out\u0027 ]; then if [[ $l_out =~ ^\\s*# ]]; then l_file=\u0027${l_out//# /}\u0027 else l_kpar=\u0027$(awk -F= \u0027{print $1}\u0027 \u003c\u003c\u003c \u0027$l_out\u0027 | xargs)\u0027 [ \u0027$l_kpar\u0027 = \u0027$l_kpname\u0027 ] \u0026\u0026 A_out+=([\u0027$l_kpar\u0027]=\u0027$l_file\u0027) fi fi done \u003c \u003c(/usr/lib/systemd/systemd-sysctl --cat-config | grep -Po \u0027^\\h*([^#\\n\\r]+|#\\h*\\/[^#\\n\\r\\h]+\\.conf\\b)\u0027) if [ -n \u0027$l_ufwscf\u0027 ]; then # Account for systems with UFW (Not covered by systemd-sysctl --cat-config) l_kpar=\u0027$(grep -Po \u0027^\\h*$l_kpname\\b\u0027 \u0027$l_ufwscf\u0027 | xargs)\u0027 l_kpar=\u0027${l_kpar//\\//.}\u0027 [ \u0027$l_kpar\u0027 = \u0027$l_kpname\u0027 ] \u0026\u0026 A_out+=([\u0027$l_kpar\u0027]=\u0027$l_ufwscf\u0027) fi if (( ${#A_out[@]} \u003e 0 )); then # Assess output from files and generate output while IFS=\u0027=\u0027 read -r l_fkpname l_fkpvalue; do l_fkpname=\u0027${l_fkpname// /}\u0027; l_fkpvalue=\u0027${l_fkpvalue// /}\u0027 if [ \u0027$l_fkpvalue\u0027 = \u0027$l_kpvalue\u0027 ]; then l_output=\u0027$l_output\\n - \\\u0027$l_kpname\\\u0027 is correctly set to \\\u0027$l_fkpvalue\\\u0027 in \\\u0027$(printf \u0027%s\u0027 \u0027${A_out[@]}\u0027)\\\u0027\\n\u0027 else l_output2=\u0027$l_output2\\n - \\\u0027$l_kpname\\\u0027 is incorrectly set to \\\u0027$l_fkpvalue\\\u0027 in \\\u0027$(printf \u0027%s\u0027 \u0027${A_out[@]}\u0027)\\\u0027 and should have a value of: \\\u0027$l_kpvalue\\\u0027\\n\u0027 fi done \u003c \u003c(grep -Po -- \u0027^\\h*$l_kpname\\h*=\\h*\\H+\u0027 \u0027${A_out[@]}\u0027) else l_output2=\u0027$l_output2\\n - \\\u0027$l_kpname\\\u0027 is not set in an included file\\n ** Note: \\\u0027$l_kpname\\\u0027 May be set in a file that\u0027s ignored by load procedure **\\n\u0027 fi } while IFS=\u0027=\u0027 read -r l_kpname l_kpvalue; do # Assess and check parameters l_kpname=\u0027${l_kpname// /}\u0027; l_kpvalue=\u0027${l_kpvalue// /}\u0027 if grep -q \u0027^net.ipv6.\u0027 \u003c\u003c\u003c \u0027$l_kpname\u0027; then [ -z \u0027$l_ipv6_disabled\u0027 ] \u0026\u0026 f_ipv6_chk if [ \u0027$l_ipv6_disabled\u0027 = \u0027yes\u0027 ]; then l_output=\u0027$l_output\\n - IPv6 is disabled on the system, \\\u0027$l_kpname\\\u0027 is not applicable\u0027 else f_kernel_parameter_chk fi else f_kernel_parameter_chk fi done \u003c \u003c(printf \u0027%s\\n\u0027 \u0027${a_parlist[@]}\u0027) l_ufwscf=\u0027$([ -f /etc/default/ufw ] \u0026\u0026 awk -F= \u0027/^\\s*IPT_SYSCTL=/ {print $2}\u0027 /etc/default/ufw)\u0027 unset a_parlist; unset A_out # unset arrays if [ -z \u0027$l_output2\u0027 ]; then # Provide output from checks echo -e \u0027\\n- Audit Result:\\n ** PASS **\\n$l_output\\n\u0027 else echo -e \u0027\\n- Audit Result:\\n ** FAIL **\\n - Reason(s) for audit failure:\\n$l_output2\\n\u0027 [ -n \u0027$l_output\u0027 ] \u0026\u0026 echo -e \u0027\\n- Correctly set:\\n$l_output\\n\u0027 fi }"
        save_as: result
    emit:
      as: item
      item:
        check: ip_forwarding_is_disabled
        value: "{{ result.stdout }}"
        expected: ""

