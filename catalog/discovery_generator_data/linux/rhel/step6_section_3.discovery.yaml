7$(printf \u0027%s\u0027 \u0027${A_out[@]}\u0027)\\\u0027 and should have a value of: \\\u0027$l_kpvalue\\\u0027\\n\u0027 fi done \u003c \u003c(grep -Po -- \u0027^\\h*$l_kpname\\h*=\\h*\\H+\u0027 \u0027${A_out[@]}\u0027) else l_output2=\u0027$l_output2\\n - \\\u0027$l_kpname\\\u0027 is not set in an included file\\n ** Note: \\\u0027$l_kpname\\\u0027 May be set in a file that\u0027s ignored by load procedure **\\n\u0027 fi } while IFS=\u0027=\u0027 read -r l_kpname l_kpvalue; do # Assess and check parameters l_kpname=\u0027${l_kpname// /}\u0027; l_kpvalue=\u0027${l_kpvalue// /}\u0027 if grep -q \u0027^net.ipv6.\u0027 \u003c\u003c\u003c \u0027$l_kpname\u0027; then [ -z \u0027$l_ipv6_disabled\u0027 ] \u0026\u0026 f_ipv6_chk if [ \u0027$l_ipv6_disabled\u0027 = \u0027yes\u0027 ]; then l_output=\u0027$l_output\\n - IPv6 is disabled on the system, \\\u0027$l_kpname\\\u0027 is not applicable\u0027 else f_kernel_parameter_chk fi else f_kernel_parameter_chk fi done \u003c \u003c(printf \u0027%s\\n\u0027 \u0027${a_parlist[@]}\u0027) l_ufwscf=\u0027$([ -f /etc/default/ufw ] \u0026\u0026 awk -F= \u0027/^\\s*IPT_SYSCTL=/ {print $2}\u0027 /etc/default/ufw)\u0027 unset a_parlist; unset A_out # unset arrays if [ -z \u0027$l_output2\u0027 ]; then # Provide output from checks echo -e \u0027\\n- Audit Result:\\n ** PASS **\\n$l_output\\n\u0027 else echo -e \u0027\\n- Audit Result:\\n ** FAIL **\\n - Reason(s) for audit failure:\\n$l_output2\\n\u0027 [ -n \u0027$l_output\u0027 ] \u0026\u0026 echo -e \u0027\\n- Correctly set:\\n$l_output\\n\u0027 fi }"
