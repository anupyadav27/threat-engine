  - discovery_id: rhel.section_3.a_single_firewall_configuration_utility_is_in_use
    description: Ensure a single firewall configuration utility is in use
    calls:
      - action: run_command
        command: "Run the following script to verify that a single firewall utility is in use on the system: #!/usr/bin/env bash { l_output=\u0027\u0027 l_output2=\u0027\u0027 l_fwd_status=\u0027\u0027 l_nft_status=\u0027\u0027 l_fwutil_status=\u0027\u0027 # Determine FirewallD utility Status rpm -q firewalld \u003e /dev/null 2\u003e\u00261 \u0026\u0026 l_fwd_status=\u0027$(systemctl is-enabled firewalld.service):$(systemctl is-active firewalld.service)\u0027 # Determine NFTables utility Status rpm -q nftables \u003e /dev/null 2\u003e\u00261 \u0026\u0026 l_nft_status=\u0027$(systemctl is-enabled nftables.service):$(systemctl is-active nftables.service)\u0027 l_fwutil_status=\u0027$l_fwd_status:$l_nft_status\u0027 case $l_fwutil_status in enabled:active:masked:inactive|enabled:active:disabled:inactive) l_output=\u0027\\n - FirewallD utility is in use, enabled and active\\n - NFTables utility is correctly disabled or masked and inactive\u0027 ;; masked:inactive:enabled:active|disabled:inactive:enabled:active) l_output=\u0027\\n - NFTables utility is in use, enabled and active\\n - FirewallD utility is correctly disabled or masked and inactive\u0027 ;; enabled:active:enabled:active) l_output2=\u0027\\n - Both FirewallD and NFTables utilities are enabled and active\u0027 ;; enabled:*:enabled:*) l_output2=\u0027\\n - Both FirewallD and NFTables utilities are enabled\u0027 ;; *:active:*:active) l_output2=\u0027\\n - Both FirewallD and NFTables utilities are enabled\u0027 ;; :enabled:active) l_output=\u0027\\n - NFTables utility is in use, enabled, and active\\n - FirewallD package is not installed\u0027 ;; :) l_output2=\u0027\\n - Neither FirewallD or NFTables is installed.\u0027 ;; *:*:) l_output2=\u0027\\n - NFTables package is not installed on the system\u0027 ;; *) l_output2=\u0027\\n - Unable to determine firewall state\u0027 ;; esac if [ -z \u0027$l_output2\u0027 ]; then echo -e \u0027\\n- Audit Results:\\n ** Pass **\\n$l_output\\n\u0027 else echo -e \u0027\\n- Audit Results:\\n ** Fail **\\n$l_output2\\n\u0027 fi }"
        save_as: result
    emit:
      as: item
      item:
        check: a_single_firewall_configuration_utility_is_in_use
        value: "{{ result.stdout }}"
        expected: ""

