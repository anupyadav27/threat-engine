  - discovery_id: rhel.section_4.permissions_on_ssh_private_host_key_files_are
    description: Ensure permissions on SSH private host key files are configured
    calls:
      - action: run_command
        command: "Run the following script to verify SSH private host key files are owned by the root user and either: \u2022 owned by the group root and mode 0600 or more restrictive - OR - \u2022 owned by the group designated to own openSSH private keys and mode 0640 or more restrictive #!/usr/bin/env bash { l_output=\u0027\u0027 l_output2=\u0027\u0027 l_skgn=\u0027$(grep -Po -- \u0027^(ssh_keys|_?ssh)\\b\u0027 /etc/group)\u0027 # Group designated to own openSSH keys l_skgid=\u0027$(awk -F: \u0027($1 == \u0027\u0027\u0027$l_skgn\u0027\u0027\u0027){print $3}\u0027 /etc/group)\u0027 # Get gid of group [ -n \u0027$l_skgid\u0027 ] \u0026\u0026 l_agroup=\u0027(root|$l_skgn)\u0027 || l_agroup=\u0027root\u0027 unset a_skarr \u0026\u0026 a_skarr=() # Clear and initialize array if [ -d /etc/ssh ]; then while IFS= read -r -d $\u0027\\0\u0027 l_file; do # Loop to populate array if grep -Pq \u0027:\\h+OpenSSH\\h+private\\h+key\\b\u0027 \u003c\u003c\u003c \u0027$(file \u0027$l_file\u0027)\u0027; then a_skarr+=(\u0027$(stat -Lc \u0027%n^%#a^%U^%G^%g\u0027 \u0027$l_file\u0027)\u0027) fi done \u003c \u003c(find -L /etc/ssh -xdev -type f -print0) while IFS=\u0027^\u0027 read -r l_file l_mode l_owner l_group l_gid; do l_out2=\u0027\u0027 [ \u0027$l_gid\u0027 = \u0027$l_skgid\u0027 ] \u0026\u0026 l_pmask=\u00270137\u0027 || l_pmask=\u00270177\u0027 l_maxperm=\u0027$( printf \u0027%o\u0027 $(( 0777 \u0026 ~$l_pmask )) )\u0027 if [ $(( $l_mode \u0026 $l_pmask )) -gt 0 ]; then l_out2=\u0027$l_out2\\n - Mode: \\\u0027$l_mode\\\u0027 should be mode: \\\u0027$l_maxperm\\\u0027 or more restrictive\u0027 fi if [ \u0027$l_owner\u0027 != \u0027root\u0027 ]; then l_out2=\u0027$l_out2\\n - Owned by: \\\u0027$l_owner\\\u0027 should be owned by \\\u0027root\\\u0027\u0027 fi if [[ ! \u0027$l_group\u0027 =~ $l_agroup ]]; then l_out2=\u0027$l_out2\\n - Owned by group \\\u0027$l_group\\\u0027 should be group owned by: \\\u0027${l_agroup//|/ or }\\\u0027\u0027 fi if [ -n \u0027$l_out2\u0027 ]; then l_output2=\u0027$l_output2\\n - File: \\\u0027$l_file\\\u0027$l_out2\u0027 else l_output=\u0027$l_output\\n - File: \\\u0027$l_file\\\u0027\\n - Correct: mode ($l_mode), owner ($l_owner), and group owner ($l_group) configured\u0027 fi done \u003c\u003c\u003c \u0027$(printf \u0027%s\\n\u0027 \u0027${a_skarr[@]}\u0027)\u0027 else l_output=\u0027 - openSSH keys not found on the system\u0027 fi unset a_skarr if [ -z \u0027$l_output2\u0027 ]; then echo -e \u0027\\n- Audit Result:\\n *** PASS ***\\n- * Correctly set * :\\n$l_output\\n\u0027 else echo -e \u0027\\n- Audit Result:\\n ** FAIL **\\n - * Reasons for audit failure * :\\n$l_output2\\n\u0027 [ -n \u0027$l_output\u0027 ] \u0026\u0026 echo -e \u0027 - * Correctly set * :\\n$l_output\\n\u0027 fi }"
        save_as: result
    emit:
      as: item
      item:
        check: permissions_on_ssh_private_host_key_files_are
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: rhel.section_4.permissions_on_ssh_public_host_key_files_are
    description: Ensure permissions on SSH public host key files are configured
    calls:
      - action: run_command
        command: "Run the following command and verify Access does not grant write or execute permissions to group or other for all returned files: Run the following script to verify SSH public host key files are mode 0644 or more restrictive, owned be the root user, and owned be the root group: #!/usr/bin/env bash { l_output=\u0027\u0027 l_output2=\u0027\u0027 l_skgn=\u0027$(grep -Po -- \u0027^(ssh_keys|_?ssh)\\b\u0027 /etc/group)\u0027 # Group designated to own openSSH public keys l_skgid=\u0027$(awk -F: \u0027($1 == \u0027\u0027\u0027$l_skgn\u0027\u0027\u0027){print $3}\u0027 /etc/group)\u0027 # Get gid of group [ -n \u0027$l_skgid\u0027 ] \u0026\u0026 l_agroup=\u0027(root|$l_skgn)\u0027 || l_agroup=\u0027root\u0027 unset a_skarr \u0026\u0026 a_skarr=() # Clear and initialize array if [ -d /etc/ssh ]; then while IFS= read -r -d $\u0027\\0\u0027 l_file; do # Loop to populate array if grep -Pq \u0027:\\h+OpenSSH\\h+(\\H+\\h+)public\\h+key\\b\u0027 \u003c\u003c\u003c \u0027$(file \u0027$l_file\u0027)\u0027; then a_skarr+=(\u0027$(stat -Lc \u0027%n^%#a^%U^%G^%g\u0027 \u0027$l_file\u0027)\u0027) fi done \u003c \u003c(find -L /etc/ssh -xdev -type f -print0) while IFS=\u0027^\u0027 read -r l_file l_mode l_owner l_group l_gid; do echo \u0027File: \\\u0027$l_file\\\u0027 Mode: \\\u0027$l_mode\\\u0027 Owner: \\\u0027$l_owner\\\u0027 Group: \\\u0027$l_group\\\u0027 GID: \\\u0027$l_gid\\\u0027\u0027 l_out2=\u0027\u0027 l_pmask=\u00270133\u0027 l_maxperm=\u0027$( printf \u0027%o\u0027 $(( 0777 \u0026 ~$l_pmask )) )\u0027 if [ $(( $l_mode \u0026 $l_pmask )) -gt 0 ]; then l_out2=\u0027$l_out2\\n - Mode: \\\u0027$l_mode\\\u0027 should be mode: \\\u0027$l_maxperm\\\u0027 or more restrictive\u0027 fi if [ \u0027$l_owner\u0027 != \u0027root\u0027 ]; then l_out2=\u0027$l_out2\\n - Owned by: \\\u0027$l_owner\\\u0027 should be owned by \\\u0027root\\\u0027\u0027 fi if [[ ! \u0027$l_group\u0027 =~ $l_agroup ]]; then l_out2=\u0027$l_out2\\n - Owned by group \\\u0027$l_group\\\u0027 should be group owned by: \\\u0027${l_agroup//|/ or }\\\u0027\u0027 fi if [ -n \u0027$l_out2\u0027 ]; then l_output2=\u0027$l_output2\\n - File: \\\u0027$l_file\\\u0027$l_out2\u0027 else l_output=\u0027$l_output\\n - File: \\\u0027$l_file\\\u0027\\n - Correct: mode ($l_mode), owner ($l_owner), and group owner ($l_group) configured\u0027 fi done \u003c\u003c\u003c \u0027$(printf \u0027%s\\n\u0027 \u0027${a_skarr[@]}\u0027)\u0027 else l_output=\u0027 - openSSH keys not found on the system\u0027 fi unset a_skarr if [ -z \u0027$l_output2\u0027 ]; then echo -e \u0027\\n- Audit Result:\\n *** PASS ***\\n- * Correctly set * :\\n$l_output\\n\u0027 else echo -e \u0027\\n- Audit Result:\\n ** FAIL **\\n - * Reasons for audit failure * :\\n$l_output2\\n\u0027 [ -n \u0027$l_output\u0027 ] \u0026\u0026 echo -e \u0027 - * Correctly set * :\\n$l_output\\n\u0027 fi }"
        save_as: result
    emit:
