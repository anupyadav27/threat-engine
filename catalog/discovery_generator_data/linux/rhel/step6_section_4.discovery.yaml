  - discovery_id: rhel.section_4.permissions_on_etc_ssh_sshd_config_are_configured
    description: Ensure permissions on /etc/ssh/sshd_config are configured
    calls:
      - action: run_command
        command: "Run the following script and verify /etc/ssh/sshd_config and files ending in .conf in the /etc/ssh/sshd_config.d directory are: \u2022 Mode 0600 or more restrictive \u2022 Owned by the root user \u2022 Group owned by the group root. #!/usr/bin/env bash { l_output=\u0027\u0027 l_output2=\u0027\u0027 unset a_sshdfiles \u0026\u0026 a_sshdfiles=() [ -e \u0027/etc/ssh/sshd_config\u0027 ] \u0026\u0026 a_sshdfiles+=(\u0027$(stat -Lc \u0027%n^%#a^%U^%G\u0027 \u0027/etc/ssh/sshd_config\u0027)\u0027) while IFS= read -r -d $\u0027\\0\u0027 l_file; do [ -e \u0027$l_file\u0027 ] \u0026\u0026 a_sshdfiles+=(\u0027$(stat -Lc \u0027%n^%#a^%U^%G\u0027 \u0027$l_file\u0027)\u0027) done \u003c \u003c(find /etc/ssh/sshd_config.d -type f \\( -perm /077 -o ! -user root -o ! -group root \\) -print0) if (( ${#a_sshdfiles[@]} != 0 )); then perm_mask=\u00270177\u0027 maxperm=\u0027$( printf \u0027%o\u0027 $(( 0777 \u0026 ~$perm_mask)) )\u0027 while IFS=\u0027^\u0027 read -r l_file l_mode l_user l_group; do l_out2=\u0027\u0027 [ $(( $l_mode \u0026 $perm_mask )) -gt 0 ] \u0026\u0026 l_out2=\u0027$l_out2\\n - Is mode: \\\u0027$l_mode\\\u0027 should be: \\\u0027$maxperm\\\u0027 or more restrictive\u0027 [ \u0027$l_user\u0027 != \u0027root\u0027 ] \u0026\u0026 l_out2=\u0027$l_out2\\n - Is owned by \\\u0027$l_user\\\u0027 should be owned by \\\u0027root\\\u0027\u0027 [ \u0027$l_group\u0027 != \u0027root\u0027 ] \u0026\u0026 l_out2=\u0027$l_out2\\n - Is group owned by \\\u0027$l_user\\\u0027 should be group owned by \\\u0027root\\\u0027\u0027 if [ -n \u0027$l_out2\u0027 ]; then l_output2=\u0027$l_output2\\n - File: \\\u0027$l_file\\\u0027:$l_out2\u0027 else l_output=\u0027$l_output\\n - File: \\\u0027$l_file\\\u0027:\\n - Correct: mode ($l_mode), owner ($l_user), and group owner ($l_group) configured\u0027 fi done \u003c\u003c\u003c \u0027$(printf \u0027%s\\n\u0027 \u0027${a_sshdfiles[@]}\u0027)\u0027 fi unset a_sshdfiles # If l_output2 is empty, we pass if [ -z \u0027$l_output2\u0027 ]; then echo -e \u0027\\n- Audit Result:\\n *** PASS ***\\n- * Correctly set * :\\n$l_output\\n\u0027 else echo -e \u0027\\n- Audit Result:\\n ** FAIL **\\n - * Reasons for audit failure * :\\n$l_output2\\n\u0027 [ -n \u0027$l_output\u0027 ] \u0026\u0026 echo -e \u0027 - * Correctly set * :\\n$l_output\\n\u0027 fi }"
        save_as: result
    emit:
      as: item
