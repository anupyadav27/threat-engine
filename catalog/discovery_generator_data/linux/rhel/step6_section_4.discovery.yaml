  - discovery_id: rhel.section_4.nftables_loopback_traffic_is_configured
    description: Ensure nftables loopback traffic is configured
    calls:
      - action: run_command
        command: "Run the following script to verify that the loopback interface is configured: \u2022 iif lo accept \u2022 iif != lo ip saddr 127.0.0.1/8 drop \u2022 iif != lo ip6 saddr ::1/128 drop #!/usr/bin/env bash { l_output=\u0027\u0027 l_output2=\u0027\u0027 l_hbfw=\u0027\u0027 if systemctl is-enabled firewalld.service 2\u003e/dev/null | grep -q \u0027enabled\u0027; then echo -e \u0027\\n - FirewallD is in use on the system\\n - Recommendation is NA\u0027 \u0026\u0026 l_hbfw=\u0027fwd\u0027 elif systemctl is-enabled nftables.service | grep -q \u0027enabled\u0027; then l_hbfw=\u0027nft\u0027 else echo -e \u0027\\n - Error - Neither FirewallD or NFTables is enabled\\n - Please follow recommendation: \\\u0027Ensure a single firewall configuration utility is in use\\\u0027\u0027 l_output2=\u0027*** FAIL *** Please follow recommendation: Ensure a single firewall configuration utility is in use\u0027 fi if [ \u0027$l_hbfw\u0027 = \u0027nft\u0027 ]; then if nft list ruleset | awk \u0027/hook\\s+input\\s+/,/\\}\\s*(#.*)?$/\u0027 | grep -Pq -- \u0027\\H+\\h+\u0027lo\u0027\\h+accept\u0027; then l_output=\u0027$l_output\\n - Network traffic to the loopback address is correctly set to accept\u0027 else l_output2=\u0027$l_output2\\n - Network traffic to the loopback address is not set to accept\u0027 fi l_ipsaddr=\u0027$(nft list ruleset | awk \u0027/filter_IN_public_deny|hook\\s+input\\s+/,/\\}\\s*(#.*)?$/\u0027 | grep -P -- \u0027ip\\h+saddr\u0027)\u0027 if grep -Pq -- \u0027ip\\h+saddr\\h+127\\.0\\.0\\.0\\/8\\h+(counter\\h+packets\\h+\\d+\\h+bytes\\h+\\d+\\h+)?drop\u0027 \u003c\u003c\u003c \u0027$l_ipsaddr\u0027 || grep -Pq -- \u0027ip\\h+daddr\\h+\\!\\=\\h+127\\.0\\.0\\.1\\h+ip\\h+saddr\\h+127\\.0\\.0\\.1\\h+drop\u0027 \u003c\u003c\u003c \u0027$l_ipsaddr\u0027; then l_output=\u0027$l_output\\n - IPv4 network traffic from loopback address correctly set to drop\u0027 else l_output2=\u0027$l_output2\\n - IPv4 network traffic from loopback address not set to drop\u0027 fi if grep -Pq -- \u0027^\\h*0\\h*$\u0027 /sys/module/ipv6/parameters/disable; then l_ip6saddr=\u0027$(nft list ruleset | awk \u0027/filter_IN_public_deny|hook input/,/}/\u0027 | grep \u0027ip6 saddr\u0027)\u0027 if grep -Pq \u0027ip6\\h+saddr\\h+::1\\h+(counter\\h+packets\\h+\\d+\\h+bytes\\h+\\d+\\h+)?drop\u0027 \u003c\u003c\u003c \u0027$l_ip6saddr\u0027 || grep -Pq -- \u0027ip6\\h+daddr\\h+\\!=\\h+::1\\h+ip6\\h+saddr\\h+::1\\h+drop\u0027 \u003c\u003c\u003c \u0027$l_ip6saddr\u0027; then l_output=\u0027$l_output\\n - IPv6 network traffic from loopback address correctly set to drop\u0027 else l_output2=\u0027$l_output2\\n - IPv6 network traffic from loopback address not set to drop\u0027 fi fi fi if [ \u0027$l_hbfw\u0027 = \u0027fwd\u0027 ] || [ -z \u0027$l_output2\u0027 ]; then echo -e \u0027\\n- Audit Result:\\n *** PASS ***\\n$l_output\u0027 else echo -e \u0027\\n- Audit Result:\\n *** FAIL ***\\n$l_output2\\n\\n - Correctly set:\\n$l_output\u0027 fi }"
        save_as: result
    emit:
      as: item
      item:
        check: nftables_loopback_traffic_is_configured
        value: "{{ result.stdout }}"
        expected: ""

