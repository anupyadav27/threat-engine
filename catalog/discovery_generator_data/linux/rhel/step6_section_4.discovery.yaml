version: '1.0'
provider: linux
engine: rhel
category: section_4
cis_section: '4'
description: >
  rhel CIS Section 4 — nftables is installed

discovery:

  - discovery_id: rhel.section_4.nftables_is_installed
    description: Ensure nftables is installed
    calls:
      - action: run_command
        command: "Run the following command to verify that nftables is installed: # rpm -q nftables nftables-\u003cversion\u003e"
        save_as: result
    emit:
      as: item
      item:
        check: nftables_is_installed
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: rhel.section_4.a_single_firewall_configuration_utility_is_in_use
    description: Ensure a single firewall configuration utility is in use
    calls:
      - action: run_command
        command: "Run the following script to verify that a single firewall utility is in use on the system: #!/usr/bin/env bash { l_output=\u0027\u0027 l_output2=\u0027\u0027 l_fwd_status=\u0027\u0027 l_nft_status=\u0027\u0027 l_fwutil_status=\u0027\u0027 # Determine FirewallD utility Status rpm -q firewalld \u003e /dev/null 2\u003e\u00261 \u0026\u0026 l_fwd_status=\u0027$(systemctl is-enabled firewalld.service):$(systemctl is-active firewalld.service)\u0027 # Determine NFTables utility Status rpm -q nftables \u003e /dev/null 2\u003e\u00261 \u0026\u0026 l_nft_status=\u0027$(systemctl is-enabled nftables.service):$(systemctl is-active nftables.service)\u0027 l_fwutil_status=\u0027$l_fwd_status:$l_nft_status\u0027 case $l_fwutil_status in enabled:active:masked:inactive|enabled:active:disabled:inactive) l_output=\u0027\\n - FirewallD utility is in use, enabled and active\\n - NFTables utility is correctly disabled or masked and inactive\\n - Only configure the recommendations found in the Configure Firewalld subsection\u0027 ;; masked:inactive:enabled:active|disabled:inactive:enabled:active) l_output=\u0027\\n - NFTables utility is in use, enabled and active\\n - FirewallD utility is correctly disabled or masked and inactive\\n - Only configure the recommendations found in the Configure NFTables subsection\u0027 ;; enabled:active:enabled:active) l_output2=\u0027\\n - Both FirewallD and NFTables utilities are enabled and active. Configure only ONE firewall either NFTables OR Firewalld\u0027 ;; enabled:*:enabled:*) l_output2=\u0027\\n - Both FirewallD and NFTables utilities are enabled\\n - Configure only ONE firewall: either NFTables OR Firewalld\u0027 ;; *:active:*:active) l_output2=\u0027\\n - Both FirewallD and NFTables utilities are enabled\\n - Configure only ONE firewall: either NFTables OR Firewalld\u0027 ;; :enabled:active) l_output=\u0027\\n - NFTables utility is in use, enabled, and active\\n - FirewallD package is not installed\\n - Only configure the recommendations found in the Configure NFTables subsection\u0027 ;; :) l_output2=\u0027\\n - Neither FirewallD or NFTables is installed. Configure only ONE firewall either NFTables OR Firewalld\u0027 ;; *:*:) l_output2=\u0027\\n - NFTables package is not installed on the system. Install NFTables and Configure only ONE firewall either NFTables OR Firewalld\u0027 ;; *) l_output2=\u0027\\n - Unable to determine firewall state. Configure only ONE firewall either NFTables OR Firewalld\u0027 ;; esac if [ -z \u0027$l_output2\u0027 ]; then echo -e \u0027\\n- Audit Results:\\n ** Pass **\\n$l_output\\n\u0027 else echo -e \u0027\\n- Audit Results:\\n ** Fail **\\n$l_output2\\n\u0027 fi }"
        save_as: result
    emit:
      as: item
      item:
        check: a_single_firewall_configuration_utility_is_in_use
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: rhel.section_4.firewalld_loopback_traffic_is_configured
    description: Ensure firewalld loopback traffic is configured
    calls:
      - action: run_command
        command: "Run the following script to verify that the loopback interface is configured: \u2022 rule family=ipv4 source address=\u0027127.0.0.1\u0027 destination not address=\u0027127.0.0.1\u0027 drop \u2022 rule family=ipv6 source address=\u0027::1\u0027 destination not address=\u0027::1\u0027 drop \u2022 rule family=ipv6 source address=\u0027::1\u0027 destination not address=\u0027::1\u0027 drop #!/usr/bin/env bash { l_output=\u0027\u0027 l_output2=\u0027\u0027 l_hbfw=\u0027\u0027 if systemctl is-enabled firewalld.service | grep -q \u0027enabled\u0027; then echo -e \u0027\\n - FirewallD is in use on the system\u0027 \u0026\u0026 l_hbfw=\u0027fwd\u0027 elif systemctl is-enabled nftables.service 2\u003e/dev/null | grep -q \u0027enabled\u0027; then echo -e \u0027\\n - nftables is in use on the system \\n - Recommendation is NA\u0027 \u0026\u0026 l_hbfw=\u0027nft\u0027 else echo -e \u0027\\n - Error - Neither FirewallD or NFTables is enabled\\n - Please follow recommendation: \\\u0027Ensure a single firewall configuration utility is in use\\\u0027\u0027 fi if [ \u0027$l_hbfw\u0027 = \u0027fwd\u0027 ]; then if nft list ruleset | awk \u0027/hook\\s+input\\s+/,/\\}\\s*(#.*)?$/\u0027 | grep -Pq -- \u0027\\H+\\h+\u0027lo\u0027\\h+accept\u0027; then l_output=\u0027$l_output\\n - Network traffic to the loopback address is correctly set to accept\u0027 else l_output2=\u0027$l_output2\\n - Network traffic to the loopback address is not set to accept\u0027 fi l_ipsaddr=\u0027$(nft list ruleset | awk \u0027/filter_IN_public_deny|hook\\s+input\\s+/,/\\}\\s*(#.*)?$/\u0027 | grep -P -- \u0027ip\\h+saddr\u0027)\u0027 if grep -Pq -- \u0027ip\\h+saddr\\h+127\\.0\\.0\\.0\\/8\\h+(counter\\h+packets\\h+\\d+\\h+bytes\\h+\\d+\\h+)?drop\u0027 \u003c\u003c\u003c \u0027$l_ipsaddr\u0027 || grep -Pq -- \u0027ip\\h+daddr\\h+\\!\\=\\h+127\\.0\\.0\\.1\\h+ip\\h+saddr\\h+127\\.0\\.0\\.1\\h+drop\u0027 \u003c\u003c\u003c \u0027$l_ipsaddr\u0027; then l_output=\u0027$l_output\\n - IPv4 network traffic from loopback address correctly set to drop\u0027 else l_output2=\u0027$l_output2\\n - IPv4 network traffic from loopback address not set to drop\u0027 fi if grep -Pq -- \u0027^\\h*0\\h*$\u0027 /sys/module/ipv6/parameters/disable; then l_ip6saddr=\u0027$(nft list ruleset | awk \u0027/filter_IN_public_deny|hook input/,/}/\u0027 | grep \u0027ip6 saddr\u0027)\u0027 if grep -Pq \u0027ip6\\h+saddr\\h+::1\\h+(counter\\h+packets\\h+\\d+\\h+bytes\\h+\\d+\\h+)?drop\u0027 \u003c\u003c\u003c \u0027$l_ip6saddr\u0027 || grep -Pq -- \u0027ip6\\h+daddr\\h+\\!=\\h+::1\\h+ip6\\h+saddr\\h+::1\\h+drop\u0027 \u003c\u003c\u003c \u0027$l_ip6saddr\u0027; then l_output=\u0027$l_output\\n - IPv6 network traffic from loopback address correctly set to drop\u0027 else l_output2=\u0027$l_output2\\n - IPv6 network traffic from loopback address not set to drop\u0027 fi fi fi if [ \u0027$l_hbfw\u0027 = \u0027nft\u0027 ] || [ -z \u0027$l_output2\u0027 ]; then echo -e \u0027\\n- Audit Result:\\n *** PASS ***\\n$l_output\u0027 else echo -e \u0027\\n- Audit Result:\\n *** FAIL ***\\n$l_output2\\n\\n - Correctly set:\\n$l_output\u0027 fi }"
        save_as: result
    emit:
      as: item
      item:
        check: firewalld_loopback_traffic_is_configured
        value: "{{ result.stdout }}"
        expected: ""

