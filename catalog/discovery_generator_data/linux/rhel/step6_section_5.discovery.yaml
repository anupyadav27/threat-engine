version: '1.0'
provider: linux
engine: rhel
category: section_5
cis_section: '5'
description: >
  rhel CIS Section 5 — permissions on /etc/ssh/sshd_config are configured

discovery:

  - discovery_id: rhel.section_5.permissions_on_etc_ssh_sshd_config_are_configured
    description: Ensure permissions on /etc/ssh/sshd_config are configured
    calls:
      - action: run_command
        command: "Run the following script and verify /etc/ssh/sshd_config and files ending in .conf in the /etc/ssh/sshd_config.d directory are: \u2022 Mode 0600 or more restrictive \u2022 Owned by the root user \u2022 Group owned by the group root. #!/usr/bin/env bash { l_output=\u0027\u0027 l_output2=\u0027\u0027 perm_mask=\u00270177\u0027 \u0026\u0026 maxperm=\u0027$( printf \u0027%o\u0027 $(( 0777 \u0026 ~$perm_mask)) )\u0027 SSHD_FILES_CHK() { while IFS=: read -r l_mode l_user l_group; do l_out2=\u0027\u0027 [ $(( $l_mode \u0026 $perm_mask )) -gt 0 ] \u0026\u0026 l_out2=\u0027$l_out2\\n - Is mode: \\\u0027$l_mode\\\u0027 should be: \\\u0027$maxperm\\\u0027 or more restrictive\u0027 [ \u0027$l_user\u0027 != \u0027root\u0027 ] \u0026\u0026 l_out2=\u0027$l_out2\\n - Is owned by \\\u0027$l_user\\\u0027 should be owned by \\\u0027root\\\u0027\u0027 [ \u0027$l_group\u0027 != \u0027root\u0027 ] \u0026\u0026 l_out2=\u0027$l_out2\\n - Is group owned by \\\u0027$l_user\\\u0027 should be group owned by \\\u0027root\\\u0027\u0027 if [ -n \u0027$l_out2\u0027 ]; then l_output2=\u0027$l_output2\\n - File: \\\u0027$l_file\\\u0027:$l_out2\u0027 else l_output=\u0027$l_output\\n - File: \\\u0027$l_file\\\u0027:\\n - Correct: mode ($l_mode), owner ($l_user), and group owner ($l_group) configured\u0027 fi done \u003c \u003c(stat -Lc \u0027%#a:%U:%G\u0027 \u0027$l_file\u0027) } [ -e \u0027/etc/ssh/sshd_config\u0027 ] \u0026\u0026 l_file=\u0027/etc/ssh/sshd_config\u0027 \u0026\u0026 SSHD_FILES_CHK while IFS= read -r -d $\u0027\\0\u0027 l_file; do [ -e \u0027$l_file\u0027 ] \u0026\u0026 SSHD_FILES_CHK done \u003c \u003c(find -L /etc/ssh/sshd_config.d -type f \\( -perm /077 -o ! -user root -o ! -group root \\) -print0 2\u003e/dev/null) if [ -z \u0027$l_output2\u0027 ]; then echo -e \u0027\\n- Audit Result:\\n *** PASS ***\\n- * Correctly set * :\\n$l_output\\n\u0027 else echo -e \u0027\\n- Audit Result:\\n ** FAIL **\\n - * Reasons for audit failure * :\\n$l_output2\\n\u0027 [ -n \u0027$l_output\u0027 ] \u0026\u0026 echo -e \u0027 - * Correctly set * :\\n$l_output\\n\u0027 fi } - IF - other locations are listed in an Include statement, *.conf files in these locations should also be checked."
        save_as: result
    emit:
      as: item
      item:
        check: permissions_on_etc_ssh_sshd_config_are_configured
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: rhel.section_5.permissions_on_ssh_private_host_key_files_are
    description: Ensure permissions on SSH private host key files are configured
    calls:
      - action: run_command
        command: "Run the following script to verify SSH private host key files are owned by the root user and either: \u2022 owned by the group root and mode 0600 or more restrictive - OR - \u2022 owned by the group designated to own openSSH private keys and mode 0640 or more restrictive #!/usr/bin/env bash { l_output=\u0027\u0027 l_output2=\u0027\u0027 l_ssh_group_name=\u0027$(awk -F: \u0027($1 ~ /^(ssh_keys|_?ssh)$/) {print $1}\u0027 /etc/group)\u0027 f_file_chk() { while IFS=: read -r l_file_mode l_file_owner l_file_group; do l_out2=\u0027\u0027 [ \u0027$l_file_group\u0027 = \u0027$l_ssh_group_name\u0027 ] \u0026\u0026 l_pmask=\u00270137\u0027 || l_pmask=\u00270177\u0027 l_maxperm=\u0027$( printf \u0027%o\u0027 $(( 0777 \u0026 ~$l_pmask )) )\u0027 if [ $(( $l_file_mode \u0026 $l_pmask )) -gt 0 ]; then l_out2=\u0027$l_out2\\n - Mode: \\\u0027$l_file_mode\\\u0027 should be mode: \\\u0027$l_maxperm\\\u0027 or more restrictive\u0027 fi if [ \u0027$l_file_owner\u0027 != \u0027root\u0027 ]; then l_out2=\u0027$l_out2\\n - Owned by: \\\u0027$l_file_owner\\\u0027 should be owned by \\\u0027root\\\u0027\u0027 fi if [[ ! \u0027$l_file_group\u0027 =~ ($l_ssh_group_name|root) ]]; then l_out2=\u0027$l_out2\\n - Owned by group \\\u0027$l_file_group\\\u0027 should be group owned by: \\\u0027$l_ssh_group_name\\\u0027 or \\\u0027root\\\u0027\u0027 fi if [ -n \u0027$l_out2\u0027 ]; then l_output2=\u0027$l_output2\\n - File: \\\u0027$l_file\\\u0027$l_out2\u0027 else l_output=\u0027$l_output\\n - File: \\\u0027$l_file\\\u0027\\n - Correct: mode: \\\u0027$l_file_mode\\\u0027, owner: \\\u0027$l_file_owner\\\u0027, and group owner: \\\u0027$l_file_group\\\u0027 configured\u0027 fi done \u003c \u003c(stat -Lc \u0027%#a:%U:%G\u0027 \u0027$l_file\u0027) } while IFS= read -r -d $\u0027\\0\u0027 l_file; do if ssh-keygen -lf \u0026\u003e/dev/null \u0027$l_file\u0027; then file \u0027$l_file\u0027 | grep -Piq -- \u0027\\bopenssh\\h+([^#\\n\\r]+\\h+)?private\\h+key\\b\u0027 \u0026\u0026 f_file_chk fi done \u003c \u003c(find -L /etc/ssh -xdev -type f -print0 2\u003e/dev/null) if [ -z \u0027$l_output2\u0027 ]; then [ -z \u0027$l_output\u0027 ] \u0026\u0026 l_output=\u0027\\n - No openSSH private keys found\u0027 echo -e \u0027\\n- Audit Result:\\n ** PASS **\\n - * Correctly configured * :$l_output\u0027 else echo -e \u0027\\n- Audit Result:\\n ** FAIL **\\n - * Reasons for audit failure * :$l_output2\\n\u0027 [ -n \u0027$l_output\u0027 ] \u0026\u0026 echo -e \u0027\\n - * Correctly configured * :\\n$l_output\\n\u0027 fi }"
        save_as: result
    emit:
      as: item
      item:
        check: permissions_on_ssh_private_host_key_files_are
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: rhel.section_5.permissions_on_ssh_public_host_key_files_are
    description: Ensure permissions on SSH public host key files are configured
    calls:
      - action: run_command
        command: "Run the following command and verify Access does not grant write or execute permissions to group or other for all returned files: Run the following script to verify SSH public host key files are mode 0644 or more restrictive, owned by the root user, and owned by the root group: #!/usr/bin/env bash { l_output=\u0027\u0027 l_output2=\u0027\u0027 l_pmask=\u00270133\u0027 \u0026\u0026 l_maxperm=\u0027$( printf \u0027%o\u0027 $(( 0777 \u0026 ~$l_pmask )) )\u0027 FILE_CHK() { while IFS=: read -r l_file_mode l_file_owner l_file_group; do l_out2=\u0027\u0027 if [ $(( $l_file_mode \u0026 $l_pmask )) -gt 0 ]; then l_out2=\u0027$l_out2\\n - Mode: \\\u0027$l_file_mode\\\u0027 should be mode: \\\u0027$l_maxperm\\\u0027 or more restrictive\u0027 fi if [ \u0027$l_file_owner\u0027 != \u0027root\u0027 ]; then l_out2=\u0027$l_out2\\n - Owned by: \\\u0027$l_file_owner\\\u0027 should be owned by \\\u0027root\\\u0027\u0027 fi if [ \u0027$l_file_group\u0027 != \u0027root\u0027 ]; then l_out2=\u0027$l_out2\\n - Owned by group \\\u0027$l_file_group\\\u0027 should be group owned by group: \\\u0027root\\\u0027\u0027 fi if [ -n \u0027$l_out2\u0027 ]; then l_output2=\u0027$l_output2\\n - File: \\\u0027$l_file\\\u0027$l_out2\u0027 else l_output=\u0027$l_output\\n - File: \\\u0027$l_file\\\u0027\\n - Correct: mode: \\\u0027$l_file_mode\\\u0027, owner: \\\u0027$l_file_owner\\\u0027, and group owner: \\\u0027$l_file_group\\\u0027 configured\u0027 fi done \u003c \u003c(stat -Lc \u0027%#a:%U:%G\u0027 \u0027$l_file\u0027) } while IFS= read -r -d $\u0027\\0\u0027 l_file; do if ssh-keygen -lf \u0026\u003e/dev/null \u0027$l_file\u0027; then file \u0027$l_file\u0027 | grep -Piq -- \u0027\\bopenssh\\h+([^#\\n\\r]+\\h+)?public\\h+key\\b\u0027 \u0026\u0026 FILE_CHK fi done \u003c \u003c(find -L /etc/ssh -xdev -type f -print0 2\u003e/dev/null) if [ -z \u0027$l_output2\u0027 ]; then [ -z \u0027$l_output\u0027 ] \u0026\u0026 l_output=\u0027\\n - No openSSH public keys found\u0027 echo -e \u0027\\n- Audit Result:\\n ** PASS **\\n - * Correctly configured * :$l_output\u0027 else echo -e \u0027\\n- Audit Result:\\n ** FAIL **\\n - * Reasons for audit failure * :$l_output2\\n\u0027 [ -n \u0027$l_output\u0027 ] \u0026\u0026 echo -e \u0027\\n - * Correctly configured * :\\n$l_output\\n\u0027 fi }"
        save_as: result
    emit:
      as: item
      item:
        check: permissions_on_ssh_public_host_key_files_are
        value: "{{ result.stdout }}"
        expected: ""

