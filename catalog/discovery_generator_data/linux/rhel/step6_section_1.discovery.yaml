ovide output from checks echo -e \u0027\\n- Audit Result:\\n ** PASS **\\n$l_output\\n\u0027 else echo -e \u0027\\n- Audit Result:\\n ** FAIL **\\n - Reason(s) for audit failure:\\n$l_output2\\n\u0027 [ -n \u0027$l_output\u0027 ] \u0026\u0026 echo -e \u0027\\n- Correctly set:\\n$l_output\\n\u0027 fi }"
