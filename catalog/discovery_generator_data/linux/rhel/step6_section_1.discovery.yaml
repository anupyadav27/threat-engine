  - discovery_id: rhel.section_1.permissions_on_bootloader_config_are_configured
    description: Ensure permissions on bootloader config are configured
    calls:
      - action: run_command
        command: "Run the following script to verify grub configuration files: \u2022 For systems using UEFI (Files located in /boot/efi/EFI/*): o Mode is 0700 or more restrictive \u2022 For systems using BIOS (Files located in /boot/grub2/*): o Mode is 0600 or more restrictive \u2022 Owner is the user root \u2022 Group owner is group root #!/usr/bin/env bash { l_output=\u0027\u0027 l_output2=\u0027\u0027 file_mug_chk() { l_out=\u0027\u0027 l_out2=\u0027\u0027 [[ \u0027$(dirname \u0027$l_file\u0027)\u0027 =~ ^\\/boot\\/efi\\/EFI ]] \u0026\u0026 l_pmask=\u00270077\u0027 || l_pmask=\u00270177\u0027 l_maxperm=\u0027$( printf \u0027%o\u0027 $(( 0777 \u0026 ~$l_pmask )) )\u0027 if [ $(( $l_mode \u0026 $l_pmask )) -gt 0 ]; then l_out2=\u0027$l_out2\\n - Is mode \\\u0027$l_mode\\\u0027 and should be mode: \\\u0027$l_maxperm\\\u0027 or more restrictive\u0027 else l_out=\u0027$l_out\\n - Is correctly mode: \\\u0027$l_mode\\\u0027 which is mode: \\\u0027$l_maxperm\\\u0027 or more restrictive\u0027 fi if [ \u0027$l_user\u0027 = \u0027root\u0027 ]; then l_out=\u0027$l_out\\n - Is correctly owned by user: \\\u0027$l_user\\\u0027\u0027 else l_out2=\u0027$l_out2\\n - Is owned by user: \\\u0027$l_user\\\u0027 and should be owned by user: \\\u0027root\\\u0027\u0027 fi if [ \u0027$l_group\u0027 = \u0027root\u0027 ]; then l_out=\u0027$l_out\\n - Is correctly group-owned by group: \\\u0027$l_user\\\u0027\u0027 else l_out2=\u0027$l_out2\\n - Is group-owned by group: \\\u0027$l_user\\\u0027 and should be group-owned by group: \\\u0027root\\\u0027\u0027 fi [ -n \u0027$l_out\u0027 ] \u0026\u0026 l_output=\u0027$l_output\\n - File: \\\u0027$l_file\\\u0027$l_out\\n\u0027 [ -n \u0027$l_out2\u0027 ] \u0026\u0026 l_output2=\u0027$l_output2\\n - File: \\\u0027$l_file\\\u0027$l_out2\\n\u0027 } while IFS= read -r -d $\u0027\\0\u0027 l_gfile; do while read -r l_file l_mode l_user l_group; do file_mug_chk done \u003c\u003c\u003c \u0027$(stat -Lc \u0027%n %#a %U %G\u0027 \u0027$l_gfile\u0027)\u0027 done \u003c \u003c(find /boot -type f \\( -name \u0027grub*\u0027 -o -name \u0027user.cfg\u0027 \\) - print0) if [ -z \u0027$l_output2\u0027 ]; then echo -e \u0027\\n- Audit Result:\\n *** PASS ***\\n- * Correctly set * :\\n$l_output\\n\u0027 else echo -e \u0027\\n- Audit Result:\\n ** FAIL **\\n - * Reasons for audit failure * :\\n$l_output2\\n\u0027 [ -n \u0027$l_output\u0027 ] \u0026\u0026 echo -e \u0027 - * Correctly set * :\\n$l_output\\n\u0027 fi }"
        save_as: result
    emit:
      as: item
      item:
        check: permissions_on_bootloader_config_are_configured
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: rhel.section_1.address_space_layout_randomization_aslr_is_enabled
    description: Ensure address space layout randomization (ASLR) is enabled
    calls:
      - action: run_command
        command: "Run the following script to verify the following kernel parameter is set in the running configuration and correctly loaded from a kernel parameter configuration file: \u2022 kernel.randomize_va_space is set to 2 Note: kernel parameters are loaded by file and parameter order precedence. The following script observes this precedence as part of the auditing procedure. The parameters being checked may be set correctly in a file. If that file is superseded, the parameter is overridden by an incorrect setting later in that file, or in a canonically later file, that \u0027correct\u0027 setting will be ignored both by the script and by the system during a normal kernel parameter load sequence. #!/usr/bin/env bash { l_output=\u0027\u0027 l_output2=\u0027\u0027 a_parlist=(\u0027kernel.randomize_va_space=2\u0027) l_ufwscf=\u0027$([ -f /etc/default/ufw ] \u0026\u0026 awk -F= \u0027/^\\s*IPT_SYSCTL=/ {print $2}\u0027 /etc/default/ufw)\u0027 kernel_parameter_chk() { l_krp=\u0027$(sysctl \u0027$l_kpname\u0027 | awk -F= \u0027{print $2}\u0027 | xargs)\u0027 # Check running configuration if [ \u0027$l_krp\u0027 = \u0027$l_kpvalue\u0027 ]; then l_output=\u0027$l_output\\n - \\\u0027$l_kpname\\\u0027 is correctly set to \\\u0027$l_krp\\\u0027 in the running configuration\u0027 else l_output2=\u0027$l_output2\\n - \\\u0027$l_kpname\\\u0027 is incorrectly set to \\\u0027$l_krp\\\u0027 in the running configuration and should have a value of: \\\u0027$l_kpvalue\\\u0027\u0027 fi unset A_out; declare -A A_out # Check durable setting (files) while read -r l_out; do if [ -n \u0027$l_out\u0027 ]; then if [[ $l_out =~ ^\\s*# ]]; then l_file=\u0027${l_out//# /}\u0027 else l_kpar=\u0027$(awk -F= \u0027{print $1}\u0027 \u003c\u003c\u003c \u0027$l_out\u0027 | xargs)\u0027 [ \u0027$l_kpar\u0027 = \u0027$l_kpname\u0027 ] \u0026\u0026 A_out+=([\u0027$l_kpar\u0027]=\u0027$l_file\u0027) fi fi done \u003c \u003c(/usr/lib/systemd/systemd-sysctl --cat-config | grep -Po \u0027^\\h*([^#\\n\\r]+|#\\h*\\/[^#\\n\\r\\h]+\\.conf\\b)\u0027) if [ -n \u0027$l_ufwscf\u0027 ]; then # Account for systems with UFW (Not covered by systemd-sysctl - -cat-config) l_kpar=\u0027$(grep -Po \u0027^\\h*$l_kpname\\b\u0027 \u0027$l_ufwscf\u0027 | xargs)\u0027 l_kpar=\u0027${l_kpar//\\//.}\u0027 [ \u0027$l_kpar\u0027 = \u0027$l_kpname\u0027 ] \u0026\u0026 A_out+=([\u0027$l_kpar\u0027]=\u0027$l_ufwscf\u0027) fi if (( ${#A_out[@]} \u003e 0 )); then # Assess output from files and generate output while IFS=\u0027=\u0027 read -r l_fkpname l_fkpvalue; do l_fkpname=\u0027${l_fkpname// /}\u0027; l_fkpvalue=\u0027${l_fkpvalue// /}\u0027 if [ \u0027$l_fkpvalue\u0027 = \u0027$l_kpvalue\u0027 ]; then l_output=\u0027$l_output\\n - \\\u0027$l_kpname\\\u0027 is correctly set to \\\u0027$l_krp\\\u0027 in \\\u0027$(printf \u0027%s\u0027 \u0027${A_out[@]}\u0027)\\\u0027\\n\u0027 else l_output2=\u0027$l_output2\\n - \\\u0027$l_kpname\\\u0027 is incorrectly set to \\\u0027$l_fkpvalue\\\u0027 in \\\u0027$(printf \u0027%s\u0027 \u0027${A_out[@]}\u0027)\\\u0027 and should have a value of: \\\u0027$l_kpvalue\\\u0027\\n\u0027 fi done \u003c \u003c(grep -Po -- \u0027^\\h*$l_kpname\\h*=\\h*\\H+\u0027 \u0027${A_out[@]}\u0027) else l_output2=\u0027$l_output2\\n - \\\u0027$l_kpname\\\u0027 is not set in an included file\\n ** Note: \\\u0027$l_kpname\\\u0027 May be set in a file that\u0027s ignored by load procedure **\\n\u0027 fi } while IFS=\u0027=\u0027 read -r l_kpname l_kpvalue; do # Assess and check parameters l_kpname=\u0027${l_kpname// /}\u0027; l_kpvalue=\u0027${l_kpvalue// /}\u0027 if ! grep -Pqs \u0027^\\h*0\\b\u0027 /sys/module/ipv6/parameters/disable \u0026\u0026 grep -q \u0027^net.ipv6.\u0027 \u003c\u003c\u003c \u0027$l_kpname\u0027; then l_output=\u0027$l_output\\n - IPv6 is disabled on the system, \\\u0027$l_kpname\\\u0027 is not applicable\u0027 else kernel_parameter_chk fi done \u003c \u003c(printf \u0027%s\\n\u0027 \u0027${a_parlist[@]}\u0027) if [ -z \u0027$l_output2\u0027 ]; then # Provide output from checks echo -e \u0027\\n- Audit Result:\\n ** PASS **\\n$l_output\\n\u0027 else echo -e \u0027\\n- Audit Result:\\n ** FAIL **\\n - Reason(s) for audit failure:\\n$l_output2\\n\u0027 [ -n \u0027$l_output\u0027 ] \u0026\u0026 echo -e \u0027\\n- Correctly set:\\n$l_output\\n\u0027 fi }"
        save_as: result
    emit:
      as: item
      item:
        check: address_space_layout_randomization_aslr_is_enabled
        value: "{{ result.stdout }}"
        expected: ""

