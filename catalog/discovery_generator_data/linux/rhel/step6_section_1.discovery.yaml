        command: "Run the following script to verify that autorun-never=true cannot be overridden: #!/usr/bin/env bash { # Check if GNOME Desktop Manager is installed. If package isn\u0027t installed, recommendation is Not Applicable\\n # determine system\u0027s package manager l_pkgoutput=\u0027\u0027 if command -v dpkg-query \u003e /dev/null 2\u003e\u00261; then l_pq=\u0027dpkg-query -W\u0027 elif command -v rpm \u003e /dev/null 2\u003e\u00261; then l_pq=\u0027rpm -q\u0027 fi # Check if GDM is installed l_pcl=\u0027gdm gdm3\u0027 # Space separated list of packages to check for l_pn in $l_pcl; do $l_pq \u0027$l_pn\u0027 \u003e /dev/null 2\u003e\u00261 \u0026\u0026 l_pkgoutput=\u0027$l_pkgoutput\\n - Package: \\\u0027$l_pn\\\u0027 exists on the system\\n - checking configuration\u0027 done # Check configuration (If applicable) if [ -n \u0027$l_pkgoutput\u0027 ]; then l_output=\u0027\u0027 l_output2=\u0027\u0027 echo -e \u0027$l_pkgoutput\\n\u0027 # Look for idle-delay to determine profile in use, needed for remaining tests l_kfd=\u0027/etc/dconf/db/$(grep -Psril \u0027^\\h*autorun-never\\b\u0027 /etc/dconf/db/*/ | awk -F\u0027/\u0027 \u0027{split($(NF-1),a,\u0027.\u0027);print a[1]}\u0027).d\u0027 #set directory of key file to be locked if [ -d \u0027$l_kfd\u0027 ]; then # If key file directory doesn\u0027t exist, options can\u0027t be locked if grep -Priq \u0027^\\h*\\/org/gnome\\/desktop\\/media-handling\\/autorun- never\\b\u0027 \u0027$l_kfd\u0027; then l_output=\u0027$l_output\\n - \\\u0027autorun-never\\\u0027 is locked in \\\u0027$(grep - Pril \u0027^\\h*\\/org/gnome\\/desktop\\/media-handling\\/autorun-never\\b\u0027 \u0027$l_kfd\u0027)\\\u0027\u0027 else l_output2=\u0027$l_output2\\n - \\\u0027autorun-never\\\u0027 is not locked\u0027 fi else l_output2=\u0027$l_output2\\n - \\\u0027autorun-never\\\u0027 is not set so it can not be locked\u0027 fi else l_output=\u0027$l_output\\n - GNOME Desktop Manager package is not installed on the system\\n - Recommendation is not applicable\u0027 fi # Report results. If no failures output in l_output2, we pass if [ -z \u0027$l_output2\u0027 ]; then echo -e \u0027\\n- Audit Result:\\n ** PASS **\\n$l_output\\n\u0027 else echo -e \u0027\\n- Audit Result:\\n ** FAIL **\\n - Reason(s) for audit failure:\\n$l_output2\\n\u0027 [ -n \u0027$l_output\u0027 ] \u0026\u0026 echo -e \u0027\\n- Correctly set:\\n$l_output\\n\u0027 fi }"
        save_as: result
    emit:
      as: item
      item:
        check: gdm_autorun_never_is_not_overridden
