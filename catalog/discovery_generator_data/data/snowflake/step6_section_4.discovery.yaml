version: '1.0'
provider: data
engine: snowflake
category: section_4
cis_section: '4'
description: >
  snowflake CIS Section 4 — yearly rekeying is enabled for a Snowflake account

discovery:

  - discovery_id: snowflake.section_4.yearly_rekeying_is_enabled_for_a_snowflake_account
    description: Ensure yearly rekeying is enabled for a Snowflake account
    calls:
      - action: query_table
        query: "SELECT * FROM SNOWFLAKE.ACCOUNT_USAGE.YEARLY_REKEYING_IS_ENABLED_FOR_A_SNOWFLAKE_ACCOUNT;"
        save_as: rows
    emit:
      as: items
      items: "{{ rows }}"
      item:
        check: yearly_rekeying_is_enabled_for_a_snowflake_account
        value: "{{ item.value }}"
        expected: ""

  - discovery_id: snowflake.section_4.aes_encryption_key_size_used_to_encrypt_files
    description: Ensure AES encryption key size used to encrypt files stored in internal stages is set to 256 bits
    calls:
      - action: query_table
        query: "SELECT * FROM SNOWFLAKE.ACCOUNT_USAGE.AES_ENCRYPTION_KEY_SIZE_USED_TO_ENCRYPT_FILES;"
        save_as: rows
    emit:
      as: items
      items: "{{ rows }}"
      item:
        check: aes_encryption_key_size_used_to_encrypt_files
        value: "{{ item.value }}"
        expected: ""

  - discovery_id: snowflake.section_4.the_min_data_retention_time_in_days_account
    description: Ensure that the MIN_DATA_RETENTION_TIME_IN_DAYS account parameter is set to 7 or higher
    calls:
      - action: query_table
        query: "SELECT * FROM SNOWFLAKE.ACCOUNT_USAGE.THE_MIN_DATA_RETENTION_TIME_IN_DAYS_ACCOUNT;"
        save_as: rows
    emit:
      as: items
      items: "{{ rows }}"
      item:
        check: the_min_data_retention_time_in_days_account
        value: "{{ item.value }}"
        expected: ""

  - discovery_id: snowflake.section_4.the_require_storage_integration_for_stage_operati
    description: Ensure that the REQUIRE_STORAGE_INTEGRATION_FOR_STAGE_OPERATI ON account parameter is set to true
    calls:
      - action: query_table
        query: "SELECT * FROM SNOWFLAKE.ACCOUNT_USAGE.THE_REQUIRE_STORAGE_INTEGRATION_FOR_STAGE_OPERATI;"
        save_as: rows
    emit:
      as: items
      items: "{{ rows }}"
      item:
        check: the_require_storage_integration_for_stage_operati
        value: "{{ item.value }}"
        expected: ""

  - discovery_id: snowflake.section_4.all_external_stages_have_storage_integrations
    description: Ensure that all external stages have storage integrations
    calls:
      - action: query_table
        query: "SELECT * FROM SNOWFLAKE.ACCOUNT_USAGE.ALL_EXTERNAL_STAGES_HAVE_STORAGE_INTEGRATIONS;"
        save_as: rows
    emit:
      as: items
      items: "{{ rows }}"
      item:
        check: all_external_stages_have_storage_integrations
        value: "{{ item.value }}"
        expected: ""

  - discovery_id: snowflake.section_4.the_prevent_unload_to_inline_url_account
    description: Ensure that the PREVENT_UNLOAD_TO_INLINE_URL account parameter is set to true
    calls:
      - action: query_table
        query: "SELECT * FROM SNOWFLAKE.ACCOUNT_USAGE.THE_PREVENT_UNLOAD_TO_INLINE_URL_ACCOUNT;"
        save_as: rows
    emit:
      as: items
      items: "{{ rows }}"
      item:
        check: the_prevent_unload_to_inline_url_account
        value: "{{ item.value }}"
        expected: ""

