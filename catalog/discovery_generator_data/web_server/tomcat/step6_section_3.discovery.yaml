version: '1.0'
provider: web_server
engine: tomcat
category: section_3
cis_section: '3'
description: >
  tomcat CIS Section 3 — Set a nondeterministic Shutdown command value

discovery:

  - discovery_id: tomcat.section_3.set_a_nondeterministic_shutdown_command_value
    description: Set a nondeterministic Shutdown command value
    calls:
      - action: run_command
        command: ""
        save_as: result
    emit:
      as: item
      item:
        check: set_a_nondeterministic_shutdown_command_value
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: tomcat.section_3.disable_the_shutdown_port
    description: Disable the Shutdown port
    calls:
      - action: run_command
        command: ""
        save_as: result
    emit:
      as: item
      item:
        check: disable_the_shutdown_port
        value: "{{ result.stdout }}"
        expected: ""

