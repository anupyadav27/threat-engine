  - discovery_id: tomcat.section_10.setting_security_lifecycle_listener
    description: Setting Security Lifecycle Listener
    calls:
      - action: run_command
        command: "Review server.xml to ensure the Security Lifecycle Listener element is uncommented with the checkedOsUsers and minimumUmask attributes set with expected values. Remediation: Uncomment the listener in $CATALINA_BASE/conf/server.xml. If the operating system supports umask then the line in $CATALINA_HOME/bin/catalina.sh that obtains the umask also needs to be uncommented. Within Server elements add: \u2022 checkedOsUsers: A comma separated list of OS users that must not be used to start Tomcat. If not specified, the default value of root is used. \u2022 minimumUmask: The least restrictive umask that must be configured before Tomcat will start. If not specified, the default value of 0007 is used. \u003cListener className=\u0027org.apache.catalina.security.SecurityListener\u0027 checkedOsUsers=\u0027alex,bob\u0027 minimumUmask=\u00270007\u0027 /\u003e Default Value: The Security Lifecycle Listener is not enabled by default. For checkedOsUsers, the default value is root. For minimumUmask, the default value is 0007. References: 1. https://tomcat.apache.org/tomcat-9.0- doc/config/listeners.html#Security_Lifecycle_Listener_- _org.apache.catalina.security.SecurityListener CIS Controls: Controls Version Control IG 1 IG 2 IG 3 v8 5.4 Restrict Administrator Privileges to Dedicated Administrator Accounts Restrict administrator privileges to dedicated administrator accounts on enterprise assets. Conduct general computing activities, such as internet browsing, email, and productivity suite use, from the user\u2019s primary, non-privileged account. \u25cf \u25cf \u25cf v7 5.1 Establish Secure Configurations Maintain documented, standard security configuration standards for all authorized operating systems and software. \u25cf \u25cf \u25cf"
        save_as: result
    emit:
      as: item
      item:
        check: setting_security_lifecycle_listener
        value: "{{ result.stdout }}"
        expected: ""

