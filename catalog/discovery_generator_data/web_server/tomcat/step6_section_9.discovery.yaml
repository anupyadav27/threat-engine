version: '1.0'
provider: web_server
engine: tomcat
category: section_9
cis_section: '9'
description: >
  tomcat CIS Section 9 — Disabling auto deployment of applications

discovery:

  - discovery_id: tomcat.section_9.disabling_auto_deployment_of_applications
    description: Disabling auto deployment of applications
    calls:
      - action: run_command
        command: ""
        save_as: result
    emit:
      as: item
      item:
        check: disabling_auto_deployment_of_applications
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: tomcat.section_9.disable_deploy_on_startup_of_applications
    description: Disable deploy on startup of applications
    calls:
      - action: run_command
        command: ""
        save_as: result
    emit:
      as: item
      item:
        check: disable_deploy_on_startup_of_applications
        value: "{{ result.stdout }}"
        expected: ""

