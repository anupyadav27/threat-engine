version: '1.0'
provider: web_server
engine: nginx
category: section_1
cis_section: '1'
description: >
  nginx CIS Section 1 — NGINX is installed

discovery:

  - discovery_id: nginx.section_1.nginx_is_installed
    description: Ensure NGINX is installed
    calls:
      - action: run_command
        command: "To check if nginx is installed on your server, run the following command: nginx -v The command output should return the version of nginx that is installed on the server. If there is no output, nginx is not installed."
        save_as: result
    emit:
      as: item
      item:
        check: nginx_is_installed
        value: "{{ result.stdout }}"
        expected: ""

