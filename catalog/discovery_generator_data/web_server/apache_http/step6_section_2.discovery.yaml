version: '1.0'
provider: web_server
engine: apache_http
category: section_2
cis_section: '2'
description: >
  apache_http CIS Section 2 — Log Config Module Is Enabled

discovery:

  - discovery_id: apache_http.section_2.log_config_module_is_enabled
    description: Ensure the Log Config Module Is Enabled
    calls:
      - action: run_command
        command: "Perform the following to determine if the log_config has been loaded: Use the httpd -M option as root to check that the module is loaded. # httpd -M | grep log_config Note : If the module is correctly enabled, the output will include the module name and whether it is loaded statically or as a shared module"
        save_as: result
    emit:
      as: item
      item:
        check: log_config_module_is_enabled
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: apache_http.section_2.webdav_modules_are_disabled
    description: Ensure the WebDAV Modules Are Disabled
    calls:
      - action: run_command
        command: "Perform the following to determine if the WebDAV modules are enabled. Run the httpd server with the -M option to list enabled modules: # httpd -M | grep \u0027 dav_[[:print:]]+module\u0027 Note: If the WebDav modules are correctly disabled, there will be no output when executing the above command."
        save_as: result
    emit:
      as: item
      item:
        check: webdav_modules_are_disabled
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: apache_http.section_2.status_module_is_disabled
    description: Ensure the Status Module Is Disabled
    calls:
      - action: run_command
        command: "Perform the following to determine if the Status module is enabled. Run the httpd server with the -M option to list enabled modules: # httpd -M | egrep \u0027status_module\u0027 Note : If the modules are correctly disabled, there will be no output when executing the above command."
        save_as: result
    emit:
      as: item
      item:
        check: status_module_is_disabled
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: apache_http.section_2.autoindex_module_is_disabled
    description: Ensure the Autoindex Module Is Disabled
    calls:
      - action: run_command
        command: "Perform the following to determine if the module is enabled. Run the httpd server with the -M option to list enabled modules: # httpd -M | grep autoindex_module Note : If the module is correctly disabled, there will be no output when executing the above command."
        save_as: result
    emit:
      as: item
      item:
        check: autoindex_module_is_disabled
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: apache_http.section_2.proxy_modules_are_disabled_if_not_in_use
    description: Ensure the Proxy Modules Are Disabled if not in use
    calls:
      - action: run_command
        command: "Perform the following to determine if the modules are enabled. Run the httpd server with the -M option to list enabled modules: # httpd -M | grep proxy_ Note : If the modules are correctly disabled, there will be no output when executing the above command."
        save_as: result
    emit:
      as: item
      item:
        check: proxy_modules_are_disabled_if_not_in_use
        value: "{{ result.stdout }}"
        expected: ""

