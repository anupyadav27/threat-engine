version: '1.0'
provider: web_server
engine: apache_http
category: section_8
cis_section: '8'
description: >
  apache_http CIS Section 8 — ServerTokens is Set to 'Prod' or 'ProductOnly'

discovery:

  - discovery_id: apache_http.section_8.servertokens_is_set_to_prod_or_productonly
    description: Ensure ServerTokens is Set to 'Prod' or 'ProductOnly'
    calls:
      - action: run_command
        command: "Perform the following steps to determine if the recommended state is implemented: Verify the ServerTokens directive is present in the Apache configuration and has a value of Prod or ProductOnly."
        save_as: result
    emit:
      as: item
      item:
        check: servertokens_is_set_to_prod_or_productonly
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: apache_http.section_8.serversignature_is_not_enabled
    description: Ensure ServerSignature Is Not Enabled
    calls:
      - action: run_command
        command: "Perform the following steps to determine if the recommended state is implemented: Verify the ServerSignature directive is either NOT present in the Apache configuration or has a value of Off."
        save_as: result
    emit:
      as: item
      item:
        check: serversignature_is_not_enabled
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: apache_http.section_8.all_default_apache_content_is_removed
    description: Ensure All Default Apache Content Is Removed
    calls:
      - action: run_command
        command: "Perform the following step to determine if the recommended state is implemented: Verify that there is no alias or directory access to the Apache icons directory in any of the Apache configuration files."
        save_as: result
    emit:
      as: item
      item:
        check: all_default_apache_content_is_removed
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: apache_http.section_8.etag_response_header_fields_do_not_include_inodes
    description: Ensure ETag Response Header Fields Do Not Include Inodes
    calls:
      - action: run_command
        command: "Perform the following step to determine if the recommended state is implemented: For the server and all virtual host and directory configurations verify that either 1. The FileETag directive is not present, or 2. The configured FileETag value does not contain any of the values all or inode or +inode."
        save_as: result
    emit:
      as: item
      item:
        check: etag_response_header_fields_do_not_include_inodes
        value: "{{ result.stdout }}"
        expected: ""

