version: '1.0'
provider: web_server
engine: apache_http
category: section_9
cis_section: '9'
description: >
  apache_http CIS Section 9 — TimeOut Is Set to 10 or Less

discovery:

  - discovery_id: apache_http.section_9.timeout_is_set_to_10_or_less
    description: Ensure the TimeOut Is Set to 10 or Less
    calls:
      - action: run_command
        command: "Perform the following steps to determine if the recommended state is implemented: Verify that the Timeout directive is specified in the Apache configuration files to have a value of 10 seconds or shorter."
        save_as: result
    emit:
      as: item
      item:
        check: timeout_is_set_to_10_or_less
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: apache_http.section_9.keepalive_is_enabled
    description: Ensure KeepAlive Is Enabled
    calls:
      - action: run_command
        command: "Perform the following steps to determine if the recommended state is implemented: Verify that the KeepAlive directive in the Apache configuration to have a value of On, or is not present. If the directive is not present the default value is On."
        save_as: result
    emit:
      as: item
      item:
        check: keepalive_is_enabled
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: apache_http.section_9.maxkeepaliverequests_is_set_to_a_value_of_100_or
    description: Ensure MaxKeepAliveRequests is Set to a Value of 100 or Greater
    calls:
      - action: run_command
        command: "Perform the following steps to determine if the recommended state is implemented: Verify that the MaxKeepAliveRequests directive in the Apache configuration to have a value of 100 or more. If the directive is not present the default value is 100."
        save_as: result
    emit:
      as: item
      item:
        check: maxkeepaliverequests_is_set_to_a_value_of_100_or
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: apache_http.section_9.keepalivetimeout_is_set_to_a_value_of_15_or_less
    description: Ensure KeepAliveTimeout is Set to a Value of 15 or Less
    calls:
      - action: run_command
        command: "Perform the following steps to determine if the recommended state is implemented: Verify that the KeepAliveTimeout directive in the Apache configuration to have a value of 15 or less. If the directive is not present the default value is 5 seconds."
        save_as: result
    emit:
      as: item
      item:
        check: keepalivetimeout_is_set_to_a_value_of_15_or_less
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: apache_http.section_9.timeout_limits_for_request_headers_is_set_to_40
    description: Ensure the Timeout Limits for Request Headers is Set to 40 or Less
    calls:
      - action: run_command
        command: "Perform the following to determine if the recommended state is implemented: 1. Locate the Apache configuration files and included configuration files. 2. Locate any RequestReadTimeout directives and verify that they have a maximum header request timeout of 40 seconds or less. 3. If the configuration does not contain any RequestReadTimeout directives, and the mod_reqtimeout module is being loaded, then the default value of 40 seconds is compliant with the benchmark recommendation."
        save_as: result
    emit:
      as: item
      item:
        check: timeout_limits_for_request_headers_is_set_to_40
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: apache_http.section_9.timeout_limits_for_the_request_body_is_set_to_20
    description: Ensure Timeout Limits for the Request Body is Set to 20 or Less
    calls:
      - action: run_command
        command: "Perform the following to determine if the recommended state is implemented: 1. Locate the Apache configuration files and included configuration files. 2. Locate any RequestReadTimeout directives and verify the configuration has a maximum body request timeout of 20 seconds or less. 3. If the configuration does not contain any RequestReadTimeout directives, and the mod_reqtimeout module is being loaded, then the default value of 20 seconds is compliant with the benchmark recommendation. RequestReadTimeout header=XXXXXX body=20,MinRate=XXXXXXXXXX"
        save_as: result
    emit:
      as: item
      item:
        check: timeout_limits_for_the_request_body_is_set_to_20
        value: "{{ result.stdout }}"
        expected: ""

