version: '1.0'
provider: web_server
engine: apache_http
category: section_10
cis_section: '10'
description: >
  apache_http CIS Section 10 — LimitRequestLine directive is Set to 8190 or less

discovery:

  - discovery_id: apache_http.section_10.limitrequestline_directive_is_set_to_8190_or_less
    description: Ensure the LimitRequestLine directive is Set to 8190 or less
    calls:
      - action: run_command
        command: "Perform the following steps to determine if the recommended state is implemented: Verify that the LimitRequestline directive is in the Apache configuration and has a value of 8190 or less."
        save_as: result
    emit:
      as: item
      item:
        check: limitrequestline_directive_is_set_to_8190_or_less
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: apache_http.section_10.limitrequestfields_directive_is_set_to_100_or_less
    description: Ensure the LimitRequestFields Directive is Set to 100 or Less
    calls:
      - action: run_command
        command: "Perform the following steps to determine if the recommended state is implemented: Verify that the LimitRequestFields directive is in the Apache configuration and has a value of 100 or less."
        save_as: result
    emit:
      as: item
      item:
        check: limitrequestfields_directive_is_set_to_100_or_less
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: apache_http.section_10.limitrequestfieldsize_directive_is_set_to_1024_or
    description: Ensure the LimitRequestFieldsize Directive is Set to 1024 or Less
    calls:
      - action: run_command
        command: "Perform the following steps to determine if the recommended state is implemented: Verify that the LimitRequestFieldsize directive is in the Apache configuration and has a value of 1024 or less."
        save_as: result
    emit:
      as: item
      item:
        check: limitrequestfieldsize_directive_is_set_to_1024_or
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: apache_http.section_10.limitrequestbody_directive_is_set_to_102400_or
    description: Ensure the LimitRequestBody Directive is Set to 102400 or Less
    calls:
      - action: run_command
        command: "Perform the following steps to determine if the recommended state is implemented: Verify that the LimitRequestBody directive in the Apache configuration to have a value of 102400 (100K) or less."
        save_as: result
    emit:
      as: item
      item:
        check: limitrequestbody_directive_is_set_to_102400_or
        value: "{{ result.stdout }}"
        expected: ""

