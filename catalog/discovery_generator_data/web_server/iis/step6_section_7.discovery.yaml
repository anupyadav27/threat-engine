version: '1.0'
provider: web_server
engine: iis
category: section_7
cis_section: '7'
description: >
  iis CIS Section 7 — (L1) Ensure SSLv2 is Disabled

discovery:

  - discovery_id: iis.section_7.l1_ensure_sslv2_is_disabled
    description: (L1) Ensure SSLv2 is Disabled
    calls:
      - action: run_powershell
        command: "Get-WebConfiguration -Filter \"l1_ensure_sslv2_is_disabled\" | Select-Object *"
        save_as: result
    emit:
      as: item
      item:
        check: l1_ensure_sslv2_is_disabled
        value: "{{ result }}"
        expected: ""

