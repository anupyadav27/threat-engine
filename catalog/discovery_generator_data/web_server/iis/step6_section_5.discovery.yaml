version: '1.0'
provider: web_server
engine: iis
category: section_5
cis_section: '5'
description: >
  iis CIS Section 5 — (L1) Ensure Default IIS web log location is moved

discovery:

  - discovery_id: iis.section_5.l1_ensure_default_iis_web_log_location_is_moved
    description: (L1) Ensure Default IIS web log location is moved
    calls:
      - action: run_powershell
        command: "Get-WebConfiguration -Filter \"l1_ensure_default_iis_web_log_location_is_moved\" | Select-Object *"
        save_as: result
    emit:
      as: item
      item:
        check: l1_ensure_default_iis_web_log_location_is_moved
        value: "{{ result }}"
        expected: ""

  - discovery_id: iis.section_5.l1_ensure_advanced_iis_logging_is_enabled
    description: (L1) Ensure Advanced IIS logging is enabled
    calls:
      - action: run_powershell
        command: "Get-WebConfiguration -Filter \"l1_ensure_advanced_iis_logging_is_enabled\" | Select-Object *"
        save_as: result
    emit:
      as: item
      item:
        check: l1_ensure_advanced_iis_logging_is_enabled
        value: "{{ result }}"
        expected: ""

