version: '1.0'
provider: web_server
engine: iis
category: section_3
cis_section: '3'
description: >
  iis CIS Section 3 — (L2) Ensure 'debug' is turned off

discovery:

  - discovery_id: iis.section_3.l2_ensure_debug_is_turned_off
    description: (L2) Ensure 'debug' is turned off
    calls:
      - action: run_powershell
        command: "Get-WebConfiguration -Filter \"l2_ensure_debug_is_turned_off\" | Select-Object *"
        save_as: result
    emit:
      as: item
      item:
        check: l2_ensure_debug_is_turned_off
        value: "{{ result }}"
        expected: ""

  - discovery_id: iis.section_3.l2_ensure_custom_error_messages_are_not_off
    description: (L2) Ensure custom error messages are not off
    calls:
      - action: run_powershell
        command: "Get-WebConfiguration -Filter \"l2_ensure_custom_error_messages_are_not_off\" | Select-Object *"
        save_as: result
    emit:
      as: item
      item:
        check: l2_ensure_custom_error_messages_are_not_off
        value: "{{ result }}"
        expected: ""

  - discovery_id: iis.section_3.l2_ensure_asp_net_stack_tracing_is_not_enabled
    description: (L2) Ensure ASP.NET stack tracing is not enabled
    calls:
      - action: run_powershell
        command: "Get-WebConfiguration -Filter \"l2_ensure_asp_net_stack_tracing_is_not_enabled\" | Select-Object *"
        save_as: result
    emit:
      as: item
      item:
        check: l2_ensure_asp_net_stack_tracing_is_not_enabled
        value: "{{ result }}"
        expected: ""

  - discovery_id: iis.section_3.l2_ensure_httpcookie_mode_is_configured_for
    description: (L2) Ensure 'httpcookie' mode is configured for session state
    calls:
      - action: run_powershell
        command: "Get-WebConfiguration -Filter \"l2_ensure_httpcookie_mode_is_configured_for\" | Select-Object *"
        save_as: result
    emit:
      as: item
      item:
        check: l2_ensure_httpcookie_mode_is_configured_for
        value: "{{ result }}"
        expected: ""

  - discovery_id: iis.section_3.l2_ensure_machinekey_validation_method_net_3_5_is
    description: (L2) Ensure 'MachineKey validation method - .Net 3.5' is configured
    calls:
      - action: run_powershell
        command: "Get-WebConfiguration -Filter \"l2_ensure_machinekey_validation_method_net_3_5_is\" | Select-Object *"
        save_as: result
    emit:
      as: item
      item:
        check: l2_ensure_machinekey_validation_method_net_3_5_is
        value: "{{ result }}"
        expected: ""

  - discovery_id: iis.section_3.l1_ensure_machinekey_validation_method_net_4_5_is
    description: (L1) Ensure 'MachineKey validation method - .Net 4.5' is configured
    calls:
      - action: run_powershell
        command: "Get-WebConfiguration -Filter \"l1_ensure_machinekey_validation_method_net_4_5_is\" | Select-Object *"
        save_as: result
    emit:
      as: item
      item:
        check: l1_ensure_machinekey_validation_method_net_4_5_is
        value: "{{ result }}"
        expected: ""

