version: '1.0'
provider: web_server
engine: iis
category: section_4
cis_section: '4'
description: >
  iis CIS Section 4 — (L2) Ensure 'maxURL request filter' is configured

discovery:

  - discovery_id: iis.section_4.l2_ensure_maxurl_request_filter_is_configured
    description: (L2) Ensure 'maxURL request filter' is configured
    calls:
      - action: run_powershell
        command: "Get-WebConfiguration -Filter \"l2_ensure_maxurl_request_filter_is_configured\" | Select-Object *"
        save_as: result
    emit:
      as: item
      item:
        check: l2_ensure_maxurl_request_filter_is_configured
        value: "{{ result }}"
        expected: ""

  - discovery_id: iis.section_4.l2_ensure_maxquerystring_request_filter_is
    description: (L2) Ensure 'MaxQueryString request filter' is configured
    calls:
      - action: run_powershell
