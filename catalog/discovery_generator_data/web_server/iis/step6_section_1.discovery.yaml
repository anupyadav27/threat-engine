version: '1.0'
provider: web_server
engine: iis
category: section_1
cis_section: '1'
description: >
  iis CIS Section 1 — (L1) Ensure 'Host headers' are on all sites

discovery:

  - discovery_id: iis.section_1.l1_ensure_host_headers_are_on_all_sites
    description: (L1) Ensure 'Host headers' are on all sites
    calls:
      - action: run_powershell
        command: "Get-WebConfiguration -Filter \"l1_ensure_host_headers_are_on_all_sites\" | Select-Object *"
        save_as: result
    emit:
      as: item
      item:
        check: l1_ensure_host_headers_are_on_all_sites
        value: "{{ result }}"
        expected: ""

  - discovery_id: iis.section_1.l1_ensure_directory_browsing_is_set_to_disabled
    description: (L1) Ensure 'Directory browsing' is set to Disabled
    calls:
      - action: run_powershell
        command: "Get-WebConfiguration -Filter \"l1_ensure_directory_browsing_is_set_to_disabled\" | Select-Object *"
        save_as: result
    emit:
      as: item
      item:
        check: l1_ensure_directory_browsing_is_set_to_disabled
        value: "{{ result }}"
        expected: ""

  - discovery_id: iis.section_1.l1_ensure_unique_application_pools_is_set_for
    description: (L1) Ensure 'unique application pools' is set for sites
    calls:
      - action: run_powershell
        command: "Get-WebConfiguration -Filter \"l1_ensure_unique_application_pools_is_set_for\" | Select-Object *"
        save_as: result
    emit:
      as: item
      item:
        check: l1_ensure_unique_application_pools_is_set_for
        value: "{{ result }}"
        expected: ""

  - discovery_id: iis.section_1.l1_ensure_webdav_feature_is_disabled
    description: (L1) Ensure' WebDav' feature is disabled
    calls:
      - action: run_powershell
        command: "Get-WebConfiguration -Filter \"l1_ensure_webdav_feature_is_disabled\" | Select-Object *"
        save_as: result
    emit:
      as: item
      item:
        check: l1_ensure_webdav_feature_is_disabled
        value: "{{ result }}"
        expected: ""

