version: '1.0'
provider: web_server
engine: iis
category: section_2
cis_section: '2'
description: >
  iis CIS Section 2 — (L2) Ensure 'forms authentication' is set to use cookies

discovery:

  - discovery_id: iis.section_2.l2_ensure_forms_authentication_is_set_to_use
    description: (L2) Ensure 'forms authentication' is set to use cookies
    calls:
      - action: run_powershell
        command: "Get-WebConfiguration -Filter \"l2_ensure_forms_authentication_is_set_to_use\" | Select-Object *"
        save_as: result
    emit:
      as: item
      item:
        check: l2_ensure_forms_authentication_is_set_to_use
        value: "{{ result }}"
        expected: ""

  - discovery_id: iis.section_2.l1_ensure_cookie_protection_mode_is_configured
    description: (L1) Ensure 'cookie protection mode' is configured for forms authentication
    calls:
      - action: run_powershell
        command: "Get-WebConfiguration -Filter \"l1_ensure_cookie_protection_mode_is_configured\" | Select-Object *"
        save_as: result
    emit:
      as: item
      item:
        check: l1_ensure_cookie_protection_mode_is_configured
        value: "{{ result }}"
        expected: ""

  - discovery_id: iis.section_2.l1_ensure_passwordformat_is_not_set_to_clear
    description: (L1) Ensure 'passwordFormat' is not set to clear
    calls:
      - action: run_powershell
        command: "Get-WebConfiguration -Filter \"l1_ensure_passwordformat_is_not_set_to_clear\" | Select-Object *"
        save_as: result
    emit:
      as: item
      item:
        check: l1_ensure_passwordformat_is_not_set_to_clear
        value: "{{ result }}"
        expected: ""

  - discovery_id: iis.section_2.l2_ensure_credentials_are_not_stored_in
    description: (L2) Ensure 'credentials' are not stored in configuration files
    calls:
      - action: run_powershell
        command: "Get-WebConfiguration -Filter \"l2_ensure_credentials_are_not_stored_in\" | Select-Object *"
        save_as: result
    emit:
      as: item
      item:
        check: l2_ensure_credentials_are_not_stored_in
        value: "{{ result }}"
        expected: ""

