version: '1.0'
provider: web_server
engine: websphere
category: section_1
cis_section: '1'
description: >
  websphere CIS Section 1 — automated configuration updates are disabled

discovery:

  - discovery_id: websphere.section_1.automated_configuration_updates_are_disabled
    description: Ensure automated configuration updates are disabled
    calls:
      - action: run_command
        command: "Ensure the updateTrigger attribute on the config element controls in the Liberty configuration is set to a value other than polled. grep -w -R -i \u0027updateTrigger\u0027 ${server.config.dir}"
        save_as: result
    emit:
      as: item
      item:
        check: automated_configuration_updates_are_disabled
        value: "{{ result.stdout }}"
        expected: ""

