version: '1.0'
provider: web_server
engine: websphere
category: section_9
cis_section: '9'
description: >
  websphere CIS Section 9 — location attribute in the SSL configurations points to a valid SAF Keyring containing SSL/TLS certificates

discovery:

  - discovery_id: websphere.section_9.location_attribute_in_the_ssl_configurations
    description: Ensure the location attribute in the SSL configurations points to a valid SAF Keyring containing SSL/TLS certificates
    calls:
      - action: run_command
        command: "Ensure the location attribute in the SSL configurations points to a valid SAF Keyring and set the fileBased attribute to false in the Liberty configuration . grep -i -R \u0027safkeyring:\u0027 ${server.config.dir} grep -i -R \u0027fileBased\u0027 ${server.config.dir}"
        save_as: result
    emit:
      as: item
      item:
        check: location_attribute_in_the_ssl_configurations
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: websphere.section_9.safregistry_is_configured
    description: Ensure 'safRegistry' is configured
    calls:
      - action: run_command
        command: "Ensure the zosSecurity-1.0 feature is enabled and the safRegistry element is configured in the Liberty configuration . grep -w -R \u0027zosSecurity-1.0\u0027 ${server.config.dir} grep -w -R \u0027safRegistry\u0027 ${server.config.dir}"
        save_as: result
    emit:
      as: item
      item:
        check: safregistry_is_configured
        value: "{{ result.stdout }}"
        expected: ""

