version: '1.0'
provider: web_server
engine: websphere
category: section_6
cis_section: '6'
description: >
  websphere CIS Section 6 — 'HttpsToken' is set in WS-Security policy

discovery:

  - discovery_id: websphere.section_6.httpstoken_is_set_in_ws_security_policy
    description: Ensure 'HttpsToken' is set in WS-Security policy
    calls:
      - action: run_command
        command: "Ensure the HttpsToken assertion is specified for transport binding in policy specified in wsdl or policy attachment files for each web service. grep -w -R -i \u0027HttpsToken\u0027 ${server.config.dir}"
        save_as: result
    emit:
      as: item
      item:
        check: httpstoken_is_set_in_ws_security_policy
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: websphere.section_6.ensured_hashpassword_is_set_in_usernametoken_ws
    description: Ensured 'HashPassword' is set in UsernameToken WS- Security policy
    calls:
      - action: run_command
        command: "Ensure the HashPassword policy assertion is specified in WS-Security policy for Username token in wsdl or policy attachment files for each web service. grep -w -R -i \u0027HashPassword\u0027 ${server.config.dir}"
        save_as: result
    emit:
      as: item
      item:
        check: ensured_hashpassword_is_set_in_usernametoken_ws
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: websphere.section_6.algorithmsuite_is_set_to_that_strong_algorithms
    description: Ensure 'AlgorithmSuite' is set to that strong algorithms for signing and encrypting messages with WS-Security policy
    calls:
      - action: run_command
        command: "Ensure the AlgorithmSuite in WS-Security policy specifies SHA2 signature algorithm and strong encryption algorithm like AES 256 bits in wsdl or policy attachment files for each web service. grep -w -R -i \u0027AlgorithmSuite\u0027 ${server.config.dir}"
        save_as: result
    emit:
      as: item
      item:
        check: algorithmsuite_is_set_to_that_strong_algorithms
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: websphere.section_6.http_conduit_tlsclientparameters_disablecncheck
    description: Ensure 'http.conduit.tlsClientParameters.disableCNCheck' is set to 'false' to enable hostname verification for JAX-WS applications
    calls:
      - action: run_command
        command: "Ensure the http.conduit.tlsClientParameters.diableCNCheck property is not set to true in the Liberty configuration. . Note that this can be also set in the application\u0027s ibm-ws- bnd.xml binding file. grep -w -R \u0027http.conduit.tlsClientParameters.disableCNCheck\u0027 ${server.config.dir}"
        save_as: result
    emit:
      as: item
      item:
        check: http_conduit_tlsclientparameters_disablecncheck
        value: "{{ result.stdout }}"
        expected: ""

