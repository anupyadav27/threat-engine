version: '1.0'
provider: web_server
engine: websphere
category: section_7
cis_section: '7'
description: >
  websphere CIS Section 7 — `useSSL` attribute is set to `true` for TLS Transport

discovery:

  - discovery_id: websphere.section_7.usessl_attribute_is_set_to_true_for_tls_transport
    description: Ensure the `useSSL` attribute is set to `true` for TLS Transport
    calls:
      - action: run_command
        command: "Ensure the useSSL attribute for the wasJmsOutbound element is set to true in the Liberty configuration . grep -w -R \u0027useSSL\u0027 ${server.config.dir}"
        save_as: result
    emit:
      as: item
      item:
        check: usessl_attribute_is_set_to_true_for_tls_transport
        value: "{{ result.stdout }}"
        expected: ""

