    description: Ensure uncovered http methods are denied
    calls:
      - action: run_command
        command: "Review all of your web applications to ensure that each servlet has an alias associated with security constraints. Review each application\u2019s web.xml file located in the application\u0027s ${wlp.user.dir}/shared/apps/\u003capp_name\u003e/WEB-INF/ directory and determine if a deny- uncovered-http-methods element is set. Applications may also be in the ${server.config.dir}/dropins directory or a custom location. grep -w -R -i \u0027deny-uncovered-http-methods\u0027 ${wlp.user.dir}/shared/apps/\u003capp_name\u003e/WEB-INF/ Note: The security-constraints can also be set in the code using annotations like @ServletSecurity."
