version: '1.0'
provider: web_server
engine: websphere
category: section_4
cis_section: '4'
description: >
  websphere CIS Section 4 — 'cookieSameSite' SameSite attribute is set to 'Strict' for session cookies

discovery:

  - discovery_id: websphere.section_4.cookiesamesite_samesite_attribute_is_set_to
    description: Ensure 'cookieSameSite' SameSite attribute is set to 'Strict' for session cookies
    calls:
      - action: run_command
        command: "Ensure the cookieSameSite attribute is set to Strict in the httpSession element in the Liberty configuration grep -w -R -i \u0027cookieSameSite\u0027 ${server.config.dir}"
        save_as: result
    emit:
      as: item
      item:
        check: cookiesamesite_samesite_attribute_is_set_to
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: websphere.section_4.cookiedomain_cookie_domain_name_attribute_is_set
