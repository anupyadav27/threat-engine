version: '1.0'
provider: container
engine: docker
category: section_3
cis_section: '3'
description: >
  docker CIS Section 3 — the docker.service file ownership is set to root:root

discovery:

  - discovery_id: docker.section_3.the_docker_service_file_ownership_is_set_to_root
    description: Ensure that the docker.service file ownership is set to root:root
    calls:


      - action: docker_api_call
        endpoint: /info
        save_as: result

    emit:
      as: item
      item:
        check: the_docker_service_file_ownership_is_set_to_root
        value: "{{ result }}"
        expected: ""

  - discovery_id: docker.section_3.docker_service_file_permissions_are_appropriately
    description: Ensure that docker.service file permissions are appropriately set
    calls:


      - action: docker_api_call
