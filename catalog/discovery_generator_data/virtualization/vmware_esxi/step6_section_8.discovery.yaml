version: '1.0'
provider: virtualization
engine: vmware_esxi
category: section_8
cis_section: '8'
description: >
  vmware_esxi CIS Section 8 — (L2) Ensure only one remote console connection is permitted to a VM at any time

discovery:

  - discovery_id: vmware_esxi.section_8.l2_ensure_only_one_remote_console_connection_is
    description: (L2) Ensure only one remote console connection is permitted to a VM at any time
    calls:
      - action: run_command
        command: "To verify that only one remote console session is permitted at a time, confirm that RemoteDisplay.maxConnections is set to 1. 1. Select the VM then select Actions followed by Edit Settings. 2. Click on the VM Options tab then expand Advanced. 3. Click on EDIT CONFIGURATION. 4. Verify that RemoteDisplay.maxConnections is set to 1. Alternately, the following PowerCLI command may be used: # List the VMs and their current settings Get-VM | Get-AdvancedSetting -Name \u0027RemoteDisplay.maxConnections\u0027 | Select Entity, Name, Value"
        save_as: result
    emit:
      as: item
      item:
        check: l2_ensure_only_one_remote_console_connection_is
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: vmware_esxi.section_8.l1_ensure_unnecessary_floppy_devices_are
