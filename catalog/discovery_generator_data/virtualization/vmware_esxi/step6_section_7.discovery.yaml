        command: "To verify the policy is set to reject, perform the following: 1. From the vSphere Web Client, select the host. 2. Click Configure then expand Networking. 3. Select Virtual switches then click Edit. 4. Click on Security. 5. Verify that MAC address changes is set to Reject in the dropdown. Alternately, the following PowerCLI command may be used: # List all vSwitches and their Security Settings Get-VirtualSwitch -Standard | Select VMHost, Name, ` @{N=\u0027MacChanges\u0027;E={if ($_.ExtensionData.Spec.Policy.Security.MacChanges) { \u0027Accept\u0027 } Else { \u0027Reject\u0027} }}, ` @{N=\u0027PromiscuousMode\u0027;E={if ($_.ExtensionData.Spec.Policy.Security.PromiscuousMode) { \u0027Accept\u0027 } Else { \u0027Reject\u0027} }}, ` @{N=\u0027ForgedTransmits\u0027;E={if ($_.ExtensionData.Spec.Policy.Security.ForgedTransmits) { \u0027Accept\u0027 } Else { \u0027Reject\u0027} }}"
        save_as: result
    emit:
      as: item
      item:
        check: l1_ensure_the_vswitch_mac_address_change_policy
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: vmware_esxi.section_7.l1_ensure_the_vswitch_promiscuous_mode_policy_is
    description: (L1) Ensure the vSwitch Promiscuous Mode policy is set to reject
    calls:
      - action: run_command
        command: "To verify the policy is set to reject, perform the following: 1. From the vSphere Web Client, select the host. 2. Click Configure then expand Networking. 3. Select Virtual switches then click Edit. 4. Click on Security. 5. Verify that Promiscuous mode is set to Reject in the dropdown. Alternately, the following PowerCLI command may be used: # List all vSwitches and their Security Settings Get-VirtualSwitch -Standard | Select VMHost, Name, ` @{N=\u0027MacChanges\u0027;E={if ($_.ExtensionData.Spec.Policy.Security.MacChanges) { \u0027Accept\u0027 } Else { \u0027Reject\u0027} }}, ` @{N=\u0027PromiscuousMode\u0027;E={if ($_.ExtensionData.Spec.Policy.Security.PromiscuousMode) { \u0027Accept\u0027 } Else { \u0027Reject\u0027} }}, ` @{N=\u0027ForgedTransmits\u0027;E={if ($_.ExtensionData.Spec.Policy.Security.ForgedTransmits) { \u0027Accept\u0027 } Else { \u0027Reject\u0027} }}"
        save_as: result
    emit:
      as: item
      item:
        check: l1_ensure_the_vswitch_promiscuous_mode_policy_is
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: vmware_esxi.section_7.l1_ensure_port_groups_are_not_configured_to_the
    description: (L1) Ensure port groups are not configured to the value of the native VLAN
    calls:
      - action: run_command
        command: "To verify the native VLAN ID is not being used for port groups, perform the following: 1. From the vSphere Web Client, select the host. 2. Click Configure then expand Networking. 3. Select Virtual switches. 4. Expand the Standard vSwitch. 5. View the topology diagram of the switch, which shows the various port groups associated with that switch. 6. For each port group on the vSwitch, verify and record the VLAN IDs used. Alternately, the following PowerCLI command may be used: # List all vSwitches, their Portgroups and VLAN IDs Get-VirtualPortGroup -Standard | Select virtualSwitch, Name, VlanID"
        save_as: result
    emit:
      as: item
      item:
        check: l1_ensure_port_groups_are_not_configured_to_the
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: vmware_esxi.section_7.l1_ensure_port_level_configuration_overrides_are
    description: (L1) Ensure port-level configuration overrides are disabled.
    calls:
      - action: run_command
        command: "Using the vSphere Web Client, 1. Go to the Networking section of vCenter 2. After expanding each individual switch you will need to perform the following for each PortGroup. 3. Go to Configure then expand Settings. 4. Click on Properties. 5. Verify that under Override port policies every items is set to Disabled. Additionally the following PowerCLI command can be used: Get-VDPortgroup | Get-VDPortgroupOverridePolicy"
        save_as: result
    emit:
      as: item
      item:
        check: l1_ensure_port_level_configuration_overrides_are
        value: "{{ result.stdout }}"
        expected: ""

