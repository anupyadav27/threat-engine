version: '1.0'
provider: virtualization
engine: vmware_esxi
category: section_7
cis_section: '7'
description: >
  vmware_esxi CIS Section 7 — (L1) Virtual machines must limit console sharing

discovery:

  - discovery_id: vmware_esxi.section_7.l1_virtual_machines_must_limit_console_sharing
    description: (L1) Virtual machines must limit console sharing.
    calls:
      - action: run_command
        command: "To verify that only one remote console session is permitted at a time, confirm that RemoteDisplay.maxConnections is set to 1. 1. Select the VM then select Actions followed by Edit Settings. 2. Click on the VM Options tab then expand Advanced. 3. Click on EDIT CONFIGURATION. 4. Verify that RemoteDisplay.maxConnections is set to 1. Alternately, the following PowerCLI command may be used: # List the VMs and their current settings Get-VM | Get-AdvancedSetting -Name \u0027RemoteDisplay.maxConnections\u0027 | Select Entity, Name, Value"
        save_as: result
    emit:
      as: item
      item:
        check: l1_virtual_machines_must_limit_console_sharing
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: vmware_esxi.section_7.l1_virtual_machines_must_remove_unnecessary_usb
    description: (L1) Virtual machines must remove unnecessary USB/XHCI devices
    calls:
      - action: run_command
        command: "To verify USB devices are not connected, confirm that the following parameter is either NOT present or is set to FALSE: usb.present Alternately, the following PowerCLI command may be used: # Check for USB Devices attached to VMs Get-VM | Get-USBDevice"
        save_as: result
    emit:
      as: item
      item:
        check: l1_virtual_machines_must_remove_unnecessary_usb
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: vmware_esxi.section_7.l1_virtual_machines_must_remove_unnecessary
    description: (L1) Virtual machines must remove unnecessary serial port devices
    calls:
      - action: run_command
        command: "To verify serial ports are not connected, confirm that the following parameter is either NOT present or is set to FALSE: serialX.present The following PowerCLI command may be used: # In this Example you will need to add the functions from this post: http://blogs.vmware.com/vipowershell/2012/05/working-with-vm-devices-in- powercli.html # Check for Serial ports attached to VMs Get-VM | Get-SerialPort"
        save_as: result
    emit:
      as: item
      item:
        check: l1_virtual_machines_must_remove_unnecessary
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: vmware_esxi.section_7.l2_virtual_machines_must_remove_unnecessary_cd
    description: (L2) Virtual machines must remove unnecessary CD/DVD devices
    calls:
      - action: run_command
        command: "To verify CD/DVD drives are not connected, confirm that the following parameter is either NOT present or is set to FALSE: ideX:Y.present Alternately, the following PowerCLI command may be used: # Check for CD/DVD Drives attached to VMs Get-VM | Get-CDDrive"
        save_as: result
    emit:
      as: item
      item:
        check: l2_virtual_machines_must_remove_unnecessary_cd
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: vmware_esxi.section_7.l1_virtual_machines_must_deactivate_console_drag
    description: (L1) Virtual machines must deactivate console drag and drop operations
    calls:
      - action: run_command
        command: "To verify that VM console drag and drop operations are disabled, verify that isolation.tools.dnd.disable is missing or set to TRUE. 1. Select the VM then select Actions followed by Edit Settings. 2. Click on the VM Options tab then expand Advanced. 3. Click on EDIT CONFIGURATION. 4. Verify that isolation.tools.dnd.disable is set to TRUE or missing. Alternately, the following PowerCLI command may be used: # List the VMs and their current settings Get-VM -Name $VM | Get-AdvancedSetting isolation.tools.dnd.disable"
        save_as: result
    emit:
      as: item
      item:
        check: l1_virtual_machines_must_deactivate_console_drag
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: vmware_esxi.section_7.l1_virtual_machines_must_deactivate_virtual_disk
    description: (L1) Virtual machines must deactivate virtual disk shrinking operations
    calls:
      - action: run_command
        command: "Verify that isolation.tools.diskShrink.disable is set to TRUE. 1. Select the VM then select Actions followed by Edit Settings. 2. Click on the VM Options tab then expand Advanced. 3. Click on EDIT CONFIGURATION. 4. Verify that isolation.tools.diskShrink.disable is set to TRUE. Additionally, the following PowerCLI command may be used: # List the VMs and their current settings Get-VM | Get-AdvancedSetting -Name \u0027isolation.tools.diskShrink.disable\u0027| Select Entity, Name, Value"
        save_as: result
    emit:
      as: item
      item:
        check: l1_virtual_machines_must_deactivate_virtual_disk
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: vmware_esxi.section_7.l1_virtual_machines_must_not_be_able_to_obtain
    description: (L1) Virtual machines must not be able to obtain host information from the hypervisor
    calls:
      - action: run_command
        command: "To verify host information is not sent to guests, verify that tools.guestlib.enableHostInfo is set to FALSE. 1. Select the VM then select Actions followed by Edit Settings. 2. Click on the VM Options tab then expand Advanced. 3. Click on EDIT CONFIGURATION. 4. Verify that tools.guestlib.enableHostInfo is set to FALSE. Alternately, the following PowerCLI command may be used: # List the VMs and their current settings Get-VM | Get-AdvancedSetting -Name \u0027tools.guestlib.enableHostInfo\u0027| Select Entity, Name, Value"
        save_as: result
    emit:
      as: item
      item:
        check: l1_virtual_machines_must_not_be_able_to_obtain
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: vmware_esxi.section_7.l1_virtual_machines_must_limit_the_number_of
    description: (L1) Virtual machines must limit the number of retained diagnostic logs
    calls:
      - action: run_command
        command: "To verify that log files will be created more frequently, verify that log.keepOld is set to 10. 1. Select the VM then select Actions followed by Edit Settings. 2. Click on the VM Options tab then expand Advanced. 3. Click on EDIT CONFIGURATION. 4. Verify that log.keepOld is set to 10. Alternately, the following PowerCLI command may be used: # List the VMs and their current settings Get-VM | Get-AdvancedSetting -Name \u0027log.keepOld\u0027| Select Entity, Name, Value"
        save_as: result
    emit:
      as: item
      item:
        check: l1_virtual_machines_must_limit_the_number_of
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: vmware_esxi.section_7.l1_virtual_machines_must_limit_the_size_of
    description: (L1) Virtual machines must limit the size of diagnostic logs
    calls:
      - action: run_command
        command: "To verify the maximum log file size is limited properly, verify that log.rotateSize is set to 1024000. 1. Select the VM then select Actions followed by Edit Settings. 2. Click on the VM Options tab then expand Advanced. 3. Click on EDIT CONFIGURATION. 4. Verify that log.rotateSize is set to 1024000. Alternately, the following PowerCLI command may be used: # List the VMs and their current settings Get-VM | Get-AdvancedSetting -Name \u0027log.rotateSize\u0027| Select Entity, Name, Value"
        save_as: result
    emit:
      as: item
      item:
        check: l1_virtual_machines_must_limit_the_size_of
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: vmware_esxi.section_7.l1_ensure_the_vswitch_forged_transmits_policy_is
    description: (L1) Ensure the vSwitch Forged Transmits policy is set to reject
    calls:
      - action: run_command
        command: "To verify the policy is set to reject forged transmissions, perform the following: 1. From the vSphere Web Client, select the host. 2. Click Configure then expand Networking. 3. Select Virtual switches then click Edit. 4. Click on Security. 5. Verify that Forged transmits is set to Reject in the dropdown. Alternately, the following PowerCLI command may be used: # List all vSwitches and their Security Settings Get-VirtualSwitch -Standard | Select VMHost, Name, ` @{N=\u0027MacChanges\u0027;E={if ($_.ExtensionData.Spec.Policy.Security.MacChanges) { \u0027Accept\u0027 } Else { \u0027Reject\u0027} }}, ` @{N=\u0027PromiscuousMode\u0027;E={if ($_.ExtensionData.Spec.Policy.Security.PromiscuousMode) { \u0027Accept\u0027 } Else { \u0027Reject\u0027} }}, ` @{N=\u0027ForgedTransmits\u0027;E={if ($_.ExtensionData.Spec.Policy.Security.ForgedTransmits) { \u0027Accept\u0027 } Else { \u0027Reject\u0027} }}"
        save_as: result
    emit:
      as: item
      item:
        check: l1_ensure_the_vswitch_forged_transmits_policy_is
        value: "{{ result.stdout }}"
        expected: ""

