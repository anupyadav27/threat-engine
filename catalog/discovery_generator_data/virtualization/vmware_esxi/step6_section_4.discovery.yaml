version: '1.0'
provider: virtualization
engine: vmware_esxi
category: section_4
cis_section: '4'
description: >
  vmware_esxi CIS Section 4 — (L1) Host must transmit system logs to a remote log collector

discovery:

  - discovery_id: vmware_esxi.section_4.l1_host_must_transmit_system_logs_to_a_remote_log
    description: (L1) Host must transmit system logs to a remote log collector
    calls:
      - action: run_command
        command: "To ensure remote logging is configured properly, perform the following from the vSphere web client: 1. Select the host 2. Click Configure then expand System then select Advanced System Settings. 3. Select Edit then enter Syslog.global.logHost in the filter. 4. Verify the Syslog.global.logHost is set to the hostname of the central log server. Alternately, the following PowerCLI command may be used: # List Syslog.global.logHost for each host Get-VMHost | Select Name, @{N=\u0027Syslog.global.logHost\u0027;E={$_ | Get- AdvancedSetting Syslog.global.logHost}}"
        save_as: result
    emit:
      as: item
      item:
        check: l1_host_must_transmit_system_logs_to_a_remote_log
        value: "{{ result.stdout }}"
        expected: ""

