version: '1.0'
provider: virtualization
engine: vmware_esxi
category: section_6
cis_section: '6'
description: >
  vmware_esxi CIS Section 6 — (L1) Host iSCSI client, if enabled, must employ bidirectional/mutual CHAP authentication

discovery:

  - discovery_id: vmware_esxi.section_6.l1_host_iscsi_client_if_enabled_must_employ
    description: (L1) Host iSCSI client, if enabled, must employ bidirectional/mutual CHAP authentication
    calls:
      - action: run_command
        command: "To verify that bidirectional CHAP authentication is enabled for iSCSI traffic, perform the following: 1. From the vSphere Web Client, select the host. 2. Click Configure then expand Storage. 3. Select Storage Adapters then select the iSCSI Adapter. 4. Under Properties verify that the Authentication method is set to Use bidirectional CHAP. Alternately, the following PowerCLI command may be used: # List Iscsi Initiator and CHAP Name if defined Get-VMHost | Get-VMHostHba | Where {$_.Type -eq \u0027Iscsi\u0027} | Select VMHost, Device, ChapType, @{N=\u0027CHAPName\u0027;E={$_.AuthenticationProperties.ChapName}}"
        save_as: result
    emit:
      as: item
      item:
        check: l1_host_iscsi_client_if_enabled_must_employ
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: vmware_esxi.section_6.l1_ensure_bidirectional_chap_authentication_for
    description: (L1) Ensure bidirectional CHAP authentication for iSCSI traffic is enabled
    calls:
      - action: run_command
        command: "To verify that bidirectional CHAP authentication is enabled for iSCSI traffic, perform the following: 1. From the vSphere Web Client, select the host. 2. Click Configure then expand Storage. 3. Select Storage Adapters then select the iSCSI Adapter. 4. Under Properties verify that the Authentication method is set to Use bidirectional CHAP. Alternately, the following PowerCLI command may be used: # List Iscsi Initiator and CHAP Name if defined Get-VMHost | Get-VMHostHba | Where {$_.Type -eq \u0027Iscsi\u0027} | Select VMHost, Device, ChapType, @{N=\u0027CHAPName\u0027;E={$_.AuthenticationProperties.ChapName}}"
        save_as: result
    emit:
      as: item
      item:
        check: l1_ensure_bidirectional_chap_authentication_for
        value: "{{ result.stdout }}"
        expected: ""

