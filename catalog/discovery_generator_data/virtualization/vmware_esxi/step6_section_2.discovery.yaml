version: '1.0'
provider: virtualization
engine: vmware_esxi
category: section_2
cis_section: '2'
description: >
  vmware_esxi CIS Section 2 — (L1) Host image profile acceptance level must be PartnerSupported or higher

discovery:

  - discovery_id: vmware_esxi.section_2.l1_host_image_profile_acceptance_level_must_be
    description: (L1) Host image profile acceptance level must be PartnerSupported or higher
    calls:
      - action: run_command
        command: "To verify the host image profile acceptance level perform the following: 1. From the vSphere Web Client, select the host. 2. Click Configure, then under System select Security Profile. 3. Under Host Image Profile Acceptance Level ensure it is set to one of the following - \u0027VMware Certified\u0027, \u0027VMware Accepted\u0027, or \u0027Partner Supported\u0027. This may also be performed as follows: 1. Connect to each ESX/ESXi host using the ESXi Shell or vCLI, and execute the command esxcli software acceptance get to verify the acceptance level is at either \u0027VMware Certified\u0027, \u0027VMware Accepted\u0027, or \u0027Partner Supported\u0027. 2. Connect to each ESX/ESXi host using the vCLI, and execute the command esxcli software vib list to verify the acceptance level for each VIB is either \u0027VMware Certified\u0027, \u0027VMware Accepted\u0027, or \u0027Partner Supported\u0027. Additionally, the following PowerCLI command may be used: # List the Software AcceptanceLevel for each host Foreach ($VMHost in Get-VMHost ) { $ESXCli = Get-EsxCli -VMHost $VMHost $VMHost | Select Name, @{N=\u0027AcceptanceLevel\u0027;E={$ESXCli.software.acceptance.get()}} } # List only the vibs which are not at \u0027VMwareCertified\u0027 or \u0027VMwareAccepted\u0027 or \u0027PartnerSupported\u0027 acceptance level Foreach ($VMHost in Get-VMHost ) { $ESXCli = Get-EsxCli -VMHost $VMHost $ESXCli.software.vib.list() | Where { ($_.AcceptanceLevel -ne \u0027VMwareCertified\u0027) -and ($_.AcceptanceLevel -ne \u0027VMwareAccepted\u0027) -and ($_.AcceptanceLevel -ne \u0027PartnerSupported\u0027) } }"
        save_as: result
    emit:
      as: item
      item:
        check: l1_host_image_profile_acceptance_level_must_be
        value: "{{ result.stdout }}"
        expected: ""

  - discovery_id: vmware_esxi.section_2.l1_ensure_managed_object_browser_mob_is_disabled
    description: (L1) Ensure Managed Object Browser (MOB) is disabled
    calls:
      - action: run_command
        command: "To confirm whether MOB is enabled, perform the following from the vSphere Web Client: 1. Select a host 2. Click Configure then expand System then select Advanced System Settings. 3. Click Edit then search for Config.HostAgent.plugins.solo.enableMob 4. Verify the value is set to false. To determine if the MOB is enabled, run the following command from the ESXi shell: vim-cmd proxysvc/service_list Additionally, the following PowerCLI command may be used: Get-VMHost | Get-AdvancedSetting -Name Config.HostAgent.plugins.solo.enableMob"
        save_as: result
    emit:
      as: item
      item:
        check: l1_ensure_managed_object_browser_mob_is_disabled
        value: "{{ result.stdout }}"
        expected: ""

