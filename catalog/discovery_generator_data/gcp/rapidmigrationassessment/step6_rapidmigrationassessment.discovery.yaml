version: '1.0'
provider: gcp
service: rapidmigrationassessment
services:
  client: rapidmigrationassessment
  module: googleapiclient.discovery.build('rapidmigrationassessment', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.rapidmigrationassessment.projects.locations.collectors.list
  calls:
  - action: projects.locations.collectors.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.collectors }}'
    item:
      bucket: '{{ item.bucket }}'
      clientVersion: '{{ item.clientVersion }}'
      collectionDays: '{{ item.collectionDays }}'
      createTime: '{{ item.createTime }}'
      description: '{{ item.description }}'
      displayName: '{{ item.displayName }}'
      eulaUri: '{{ item.eulaUri }}'
      expectedAssetCount: '{{ item.expectedAssetCount }}'
      guestOsScan: '{{ item.guestOsScan }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      serviceAccount: '{{ item.serviceAccount }}'
      state: '{{ item.state }}'
      updateTime: '{{ item.updateTime }}'
      vsphereScan: '{{ item.vsphereScan }}'
  uid_template: '{item.name}'
- discovery_id: gcp.rapidmigrationassessment.projects.locations.get
  calls:
  - action: projects.locations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      displayName: '{{ response.displayName }}'
      labels: '{{ response.labels }}'
      locationId: '{{ response.locationId }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.rapidmigrationassessment.projects.locations.list
  calls:
  - action: projects.locations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.locations }}'
    item:
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      locationId: '{{ item.locationId }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.rapidmigrationassessment.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.rapidmigrationassessment.projects.locations.annotations.get
  calls:
  - action: projects.locations.annotations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      createTime: '{{ response.createTime }}'
      labels: '{{ response.labels }}'
      name: '{{ response.name }}'
      type: '{{ response.type }}'
      updateTime: '{{ response.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.rapidmigrationassessment.projects.locations.collectors.get
  for_each: gcp.rapidmigrationassessment.projects.locations.collectors.list
  calls:
  - action: projects.locations.collectors.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      bucket: '{{ response.bucket }}'
      clientVersion: '{{ response.clientVersion }}'
      collectionDays: '{{ response.collectionDays }}'
      createTime: '{{ response.createTime }}'
      description: '{{ response.description }}'
      displayName: '{{ response.displayName }}'
      eulaUri: '{{ response.eulaUri }}'
      expectedAssetCount: '{{ response.expectedAssetCount }}'
      guestOsScan: '{{ response.guestOsScan }}'
      labels: '{{ response.labels }}'
      name: '{{ response.name }}'
      serviceAccount: '{{ response.serviceAccount }}'
      state: '{{ response.state }}'
      updateTime: '{{ response.updateTime }}'
      vsphereScan: '{{ response.vsphereScan }}'
- discovery_id: gcp.rapidmigrationassessment.projects.locations.operations.get
  for_each: gcp.rapidmigrationassessment.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
