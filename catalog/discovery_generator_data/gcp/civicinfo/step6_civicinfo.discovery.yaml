version: '1.0'
provider: gcp
service: civicinfo
services:
  client: civicinfo
  module: googleapiclient.discovery.build('civicinfo', 'v2')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.civicinfo.divisions.queryDivisionByAddress
  calls:
  - action: divisions.queryDivisionByAddress
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      divisions: '{{ response.divisions }}'
      normalizedInput: '{{ response.normalizedInput }}'
- discovery_id: gcp.civicinfo.divisions.search
  calls:
  - action: divisions.search
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.divisions }}'
    item:
      aliases: '{{ item.aliases }}'
      name: '{{ item.name }}'
      ocdId: '{{ item.ocdId }}'
  uid_template: '{item.name}'
- discovery_id: gcp.civicinfo.elections.electionQuery
  calls:
  - action: elections.electionQuery
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      elections: '{{ response.elections }}'
- discovery_id: gcp.civicinfo.elections.voterInfoQuery
  calls:
  - action: elections.voterInfoQuery
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      contests: '{{ response.contests }}'
      dropOffLocations: '{{ response.dropOffLocations }}'
      earlyVoteSites: '{{ response.earlyVoteSites }}'
      election: '{{ response.election }}'
      mailOnly: '{{ response.mailOnly }}'
      normalizedInput: '{{ response.normalizedInput }}'
      otherElections: '{{ response.otherElections }}'
      pollingLocations: '{{ response.pollingLocations }}'
      precinctId: '{{ response.precinctId }}'
      precincts: '{{ response.precincts }}'
      state: '{{ response.state }}'
