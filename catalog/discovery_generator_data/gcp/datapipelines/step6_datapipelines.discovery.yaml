version: '1.0'
provider: gcp
service: datapipelines
services:
  client: datapipelines
  module: googleapiclient.discovery.build('datapipelines', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.datapipelines.projects.locations.pipelines.jobs.list
  calls:
  - action: projects.locations.pipelines.jobs.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.jobs }}'
    item:
      createTime: '{{ item.createTime }}'
      dataflowJobDetails: '{{ item.dataflowJobDetails }}'
      endTime: '{{ item.endTime }}'
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      state: '{{ item.state }}'
      status: '{{ item.status }}'
  uid_template: '{item.name}'
- discovery_id: gcp.datapipelines.projects.locations.pipelines.list
  calls:
  - action: projects.locations.pipelines.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.pipelines }}'
    item:
      createTime: '{{ item.createTime }}'
      displayName: '{{ item.displayName }}'
      jobCount: '{{ item.jobCount }}'
      lastUpdateTime: '{{ item.lastUpdateTime }}'
      name: '{{ item.name }}'
      pipelineSources: '{{ item.pipelineSources }}'
      scheduleInfo: '{{ item.scheduleInfo }}'
      schedulerServiceAccountEmail: '{{ item.schedulerServiceAccountEmail }}'
      state: '{{ item.state }}'
      type: '{{ item.type }}'
      workload: '{{ item.workload }}'
  uid_template: '{item.name}'
- discovery_id: gcp.datapipelines.projects.locations.pipelines.get
  for_each: gcp.datapipelines.projects.locations.pipelines.list
  calls:
  - action: projects.locations.pipelines.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      createTime: '{{ response.createTime }}'
      displayName: '{{ response.displayName }}'
      jobCount: '{{ response.jobCount }}'
      lastUpdateTime: '{{ response.lastUpdateTime }}'
      name: '{{ response.name }}'
      pipelineSources: '{{ response.pipelineSources }}'
      scheduleInfo: '{{ response.scheduleInfo }}'
      schedulerServiceAccountEmail: '{{ response.schedulerServiceAccountEmail }}'
      state: '{{ response.state }}'
      type: '{{ response.type }}'
      workload: '{{ response.workload }}'
