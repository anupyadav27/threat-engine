version: '1.0'
provider: gcp
service: translate
services:
  client: translate
  module: googleapiclient.discovery.build('translate', 'v3beta1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.translate.projects.getSupportedLanguages
  calls:
  - action: projects.getSupportedLanguages
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      languages: '{{ response.languages }}'
- discovery_id: gcp.translate.projects.locations.get
  calls:
  - action: projects.locations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      displayName: '{{ response.displayName }}'
      labels: '{{ response.labels }}'
      locationId: '{{ response.locationId }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.translate.projects.locations.getSupportedLanguages
  calls:
  - action: projects.locations.getSupportedLanguages
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      languages: '{{ response.languages }}'
- discovery_id: gcp.translate.projects.locations.glossaries.list
  calls:
  - action: projects.locations.glossaries.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.glossaries }}'
    item:
      endTime: '{{ item.endTime }}'
      entryCount: '{{ item.entryCount }}'
      inputConfig: '{{ item.inputConfig }}'
      languageCodesSet: '{{ item.languageCodesSet }}'
      languagePair: '{{ item.languagePair }}'
      name: '{{ item.name }}'
      submitTime: '{{ item.submitTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.translate.projects.locations.list
  calls:
  - action: projects.locations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.locations }}'
    item:
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      locationId: '{{ item.locationId }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.translate.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.translate.projects.locations.glossaries.get
  for_each: gcp.translate.projects.locations.glossaries.list
  calls:
  - action: projects.locations.glossaries.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      endTime: '{{ response.endTime }}'
      entryCount: '{{ response.entryCount }}'
      inputConfig: '{{ response.inputConfig }}'
      languageCodesSet: '{{ response.languageCodesSet }}'
      languagePair: '{{ response.languagePair }}'
      name: '{{ response.name }}'
      submitTime: '{{ response.submitTime }}'
- discovery_id: gcp.translate.projects.locations.operations.get
  for_each: gcp.translate.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
