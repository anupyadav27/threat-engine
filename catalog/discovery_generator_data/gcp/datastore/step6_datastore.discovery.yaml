version: '1.0'
provider: gcp
service: datastore
services:
  client: datastore
  module: googleapiclient.discovery.build('datastore', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.datastore.projects.indexes.list
  calls:
  - action: projects.indexes.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.indexes }}'
    item:
      ancestor: '{{ item.ancestor }}'
      indexId: '{{ item.indexId }}'
      projectId: '{{ item.projectId }}'
      properties: '{{ item.properties }}'
      state: '{{ item.state }}'
- discovery_id: gcp.datastore.projects.lookup
  calls:
  - action: projects.lookup
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      deferred: '{{ response.deferred }}'
      found: '{{ response.found }}'
      missing: '{{ response.missing }}'
      readTime: '{{ response.readTime }}'
      transaction: '{{ response.transaction }}'
- discovery_id: gcp.datastore.projects.operations.list
  calls:
  - action: projects.operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.datastore.projects.indexes.get
  for_each: gcp.datastore.projects.indexes.list
  calls:
  - action: projects.indexes.get
    params:
      indexId: '{{ item.ancestor }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      ancestor: '{{ response.ancestor }}'
      indexId: '{{ response.indexId }}'
      projectId: '{{ response.projectId }}'
      properties: '{{ response.properties }}'
      state: '{{ response.state }}'
- discovery_id: gcp.datastore.projects.operations.get
  for_each: gcp.datastore.projects.operations.list
  calls:
  - action: projects.operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
