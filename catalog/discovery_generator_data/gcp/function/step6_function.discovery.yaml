version: '1.0'
provider: gcp
service: function
discovery:
- discovery_id: gcp.function.list_functions
  calls:
  - action: projects.locations.functions.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      httpsTrigger: '{{ item.httpsTrigger }}'
      eventTrigger: '{{ item.eventTrigger }}'
      entryPoint: '{{ item.entryPoint }}'
      runtime: '{{ item.runtime }}'
      serviceAccountEmail: '{{ item.serviceAccountEmail }}'
      vpcConnector: '{{ item.vpcConnector }}'
      ingressSettings: '{{ item.ingressSettings }}'
      labels: '{{ item.labels }}'
      environmentVariables: '{{ item.environmentVariables }}'
  uid_template: '{item.name}'
- discovery_id: gcp.cloudfunctions.projects.locations.functions.list
  calls:
  - action: projects.locations.functions.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.functions }}'
    item:
      name: '{{ item.name }}'
      updateTime: '{{ item.updateTime }}'
      labels: '{{ item.labels }}'
      status: '{{ item.status }}'
      description: '{{ item.description }}'
      automaticUpdatePolicy: '{{ item.automaticUpdatePolicy }}'
      availableMemoryMb: '{{ item.availableMemoryMb }}'
      buildEnvironmentVariables: '{{ item.buildEnvironmentVariables }}'
      buildId: '{{ item.buildId }}'
      buildName: '{{ item.buildName }}'
      buildServiceAccount: '{{ item.buildServiceAccount }}'
      buildWorkerPool: '{{ item.buildWorkerPool }}'
      dockerRegistry: '{{ item.dockerRegistry }}'
      dockerRepository: '{{ item.dockerRepository }}'
      entryPoint: '{{ item.entryPoint }}'
      environmentVariables: '{{ item.environmentVariables }}'
      eventTrigger: '{{ item.eventTrigger }}'
      httpsTrigger: '{{ item.httpsTrigger }}'
      ingressSettings: '{{ item.ingressSettings }}'
      kmsKeyName: '{{ item.kmsKeyName }}'
  uid_template: '{item.name}'
- discovery_id: gcp.cloudfunctions.projects.locations.list
  calls:
  - action: projects.locations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.locations }}'
    item:
      name: '{{ item.name }}'
      labels: '{{ item.labels }}'
      displayName: '{{ item.displayName }}'
      locationId: '{{ item.locationId }}'
      metadata: '{{ item.metadata }}'
  uid_template: '{item.name}'
- discovery_id: gcp.cloudfunctions.operations.list
  calls:
  - action: operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      name: '{{ item.name }}'
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
