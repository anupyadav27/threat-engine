version: '1.0'
provider: gcp
service: fitness
services:
  client: fitness
  module: googleapiclient.discovery.build('fitness', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.fitness.users.dataSources.dataPointChanges.list
  calls:
  - action: users.dataSources.dataPointChanges.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.dataPointChanges }}'
    item:
      computationTimeMillis: '{{ item.computationTimeMillis }}'
      dataTypeName: '{{ item.dataTypeName }}'
      endTimeNanos: '{{ item.endTimeNanos }}'
      modifiedTimeMillis: '{{ item.modifiedTimeMillis }}'
      originDataSourceId: '{{ item.originDataSourceId }}'
      rawTimestampNanos: '{{ item.rawTimestampNanos }}'
      startTimeNanos: '{{ item.startTimeNanos }}'
      value: '{{ item.value }}'
- discovery_id: gcp.fitness.users.dataSources.datasets.get
  calls:
  - action: users.dataSources.datasets.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      dataSourceId: '{{ response.dataSourceId }}'
      maxEndTimeNs: '{{ response.maxEndTimeNs }}'
      minStartTimeNs: '{{ response.minStartTimeNs }}'
      point: '{{ response.point }}'
- discovery_id: gcp.fitness.users.dataSources.get
  calls:
  - action: users.dataSources.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      application: '{{ response.application }}'
      dataQualityStandard: '{{ response.dataQualityStandard }}'
      dataStreamId: '{{ response.dataStreamId }}'
      dataStreamName: '{{ response.dataStreamName }}'
      dataType: '{{ response.dataType }}'
      device: '{{ response.device }}'
      name: '{{ response.name }}'
      type: '{{ response.type }}'
  uid_template: '{item.name}'
- discovery_id: gcp.fitness.users.dataSources.list
  calls:
  - action: users.dataSources.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.dataSources }}'
    item:
      application: '{{ item.application }}'
      dataQualityStandard: '{{ item.dataQualityStandard }}'
      dataStreamId: '{{ item.dataStreamId }}'
      dataStreamName: '{{ item.dataStreamName }}'
      dataType: '{{ item.dataType }}'
      device: '{{ item.device }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
  uid_template: '{item.name}'
- discovery_id: gcp.fitness.users.sessions.list
  calls:
  - action: users.sessions.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.sessions }}'
    item:
      activeTimeMillis: '{{ item.activeTimeMillis }}'
      activityType: '{{ item.activityType }}'
      application: '{{ item.application }}'
      description: '{{ item.description }}'
      endTimeMillis: '{{ item.endTimeMillis }}'
      id: '{{ item.id }}'
      modifiedTimeMillis: '{{ item.modifiedTimeMillis }}'
      name: '{{ item.name }}'
      startTimeMillis: '{{ item.startTimeMillis }}'
  uid_template: '{item.name}'
