version: '1.0'
provider: gcp
service: mybusinessplaceactions
services:
  client: mybusinessplaceactions
  module: googleapiclient.discovery.build('mybusinessplaceactions', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.mybusinessplaceactions.locations.placeActionLinks.list
  calls:
  - action: locations.placeActionLinks.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.placeActionLinks }}'
    item:
      createTime: '{{ item.createTime }}'
      isEditable: '{{ item.isEditable }}'
      isPreferred: '{{ item.isPreferred }}'
      name: '{{ item.name }}'
      placeActionType: '{{ item.placeActionType }}'
      providerType: '{{ item.providerType }}'
      updateTime: '{{ item.updateTime }}'
      uri: '{{ item.uri }}'
  uid_template: '{item.name}'
- discovery_id: gcp.mybusinessplaceactions.placeActionTypeMetadata.list
  calls:
  - action: placeActionTypeMetadata.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.placeActionTypeMetadata }}'
    item:
      displayName: '{{ item.displayName }}'
      placeActionType: '{{ item.placeActionType }}'
- discovery_id: gcp.mybusinessplaceactions.locations.placeActionLinks.get
  for_each: gcp.mybusinessplaceactions.locations.placeActionLinks.list
  calls:
  - action: locations.placeActionLinks.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      createTime: '{{ response.createTime }}'
      isEditable: '{{ response.isEditable }}'
      isPreferred: '{{ response.isPreferred }}'
      name: '{{ response.name }}'
      placeActionType: '{{ response.placeActionType }}'
      providerType: '{{ response.providerType }}'
      updateTime: '{{ response.updateTime }}'
      uri: '{{ response.uri }}'
