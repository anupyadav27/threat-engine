discovery:
- _stub: true
  discovery_id: gcp.compute.list_computes
  _note: STUB — generated by step2, needs real SDK review for gcp.compute
  _rules:
  - gcp.compute.instance.backup_policy_configured
  - gcp.compute.alb.https_redirect_configured
  - gcp.compute.autoscaler.configured
  - gcp.compute.disk.delete_rule_configured
  - gcp.compute.firewall.deny_all_ingress_restricted
  - gcp.compute.firewall.ingress_restricted
  - gcp.compute.firewall.rule_direction_configured
  - gcp.compute.image.shielded_vm_enabled
  - gcp.compute.instance.automatic_restart_configured
  - gcp.compute.instance.disaster_recovery_enabled
  - gcp.compute.instance.image_scan_enabled
  - gcp.compute.instance.inventory_enabled
  - gcp.compute.instance.ip_forwarding_check
  - gcp.compute.instance.maintenance_behavior_configured
  - gcp.compute.instance.maintenance_policy_configured
  - gcp.compute.instance.older_than_specific_days_configured
  - gcp.compute.instance.os_config_time_sync_configured
  - gcp.compute.instance.patch_management_configured
  - gcp.compute.instance.recovery_automation_configured
  - gcp.compute.instance.required_tags_configured
  - gcp.compute.instance_template.metadata_streaming_connection_idle_timeout_configured
  - gcp.compute.network.default_in_use_configured
  - gcp.compute.network_peering.export_custom_routes_configured
  - gcp.compute.region_backend_services.failover_configured
  _client: gcp_compute_client
  calls:
  - action: ListResources
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      id: '{{ item.Id }}'
      name: '{{ item.Name }}'
      resource_type: '''{{ resource_type }}'''
      region: '{{ region }}'
      encrypted: '{{ item.Encrypted }}'
      kms_key_id: '{{ item.KMSKeyId }}'
      status: '{{ item.Status }}'
      enabled: '{{ item.Enabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      internet_facing: '{{ item.InternetFacing }}'
      public_ip_address: '{{ item.PublicIpAddress }}'
      tags: '{{ item.Tags }}'
      permissions: '{{ item.Permissions }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      retention_days: '{{ item.RetentionDays }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
