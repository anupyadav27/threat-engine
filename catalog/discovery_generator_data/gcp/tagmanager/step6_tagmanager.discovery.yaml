  - action: accounts.permissions.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.permissions }}'
    item:
      accountAccess: '{{ item.accountAccess }}'
      accountId: '{{ item.accountId }}'
      containerAccess: '{{ item.containerAccess }}'
      emailAddress: '{{ item.emailAddress }}'
      permissionId: '{{ item.permissionId }}'
- discovery_id: gcp.tagmanager.accounts.containers.environments.get
  for_each: gcp.tagmanager.accounts.containers.environments.list
