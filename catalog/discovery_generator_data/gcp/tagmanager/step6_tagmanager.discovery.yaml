version: '1.0'
provider: gcp
service: tagmanager
services:
  client: tagmanager
  module: googleapiclient.discovery.build('tagmanager', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.tagmanager.accounts.containers.list
  calls:
  - action: accounts.containers.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.containers }}'
    item:
      accountId: '{{ item.accountId }}'
      containerId: '{{ item.containerId }}'
      domainName: '{{ item.domainName }}'
      enabledBuiltInVariable: '{{ item.enabledBuiltInVariable }}'
      fingerprint: '{{ item.fingerprint }}'
      name: '{{ item.name }}'
      notes: '{{ item.notes }}'
      publicId: '{{ item.publicId }}'
      timeZoneCountryId: '{{ item.timeZoneCountryId }}'
      timeZoneId: '{{ item.timeZoneId }}'
      usageContext: '{{ item.usageContext }}'
  uid_template: '{item.name}'
- discovery_id: gcp.tagmanager.accounts.get
  calls:
  - action: accounts.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      accountId: '{{ response.accountId }}'
      fingerprint: '{{ response.fingerprint }}'
      name: '{{ response.name }}'
      shareData: '{{ response.shareData }}'
  uid_template: '{item.name}'
- discovery_id: gcp.tagmanager.accounts.list
  calls:
  - action: accounts.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.accounts }}'
    item:
      accountId: '{{ item.accountId }}'
      fingerprint: '{{ item.fingerprint }}'
      name: '{{ item.name }}'
      shareData: '{{ item.shareData }}'
  uid_template: '{item.name}'
- discovery_id: gcp.tagmanager.accounts.permissions.list
