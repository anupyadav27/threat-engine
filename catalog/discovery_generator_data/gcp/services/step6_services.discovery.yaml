version: '1.0'
provider: gcp
service: services
discovery:
- discovery_id: gcp.services.list
  calls:
  - action: services.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      name: '{{ item.name }}'
      state: '{{ item.state }}'
      config: '{{ item.config }}'
      parent: '{{ item.parent }}'
  uid_template: '{item.name}'
- discovery_id: gcp.services.list_keys
  calls:
  - action: projects.locations.keys.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      name: '{{ item.name }}'
      displayName: '{{ item.displayName }}'
      keyString: '{{ item.keyString }}'
      restrictions: '{{ item.restrictions }}'
      etag: '{{ item.etag }}'
      createTime: '{{ item.createTime }}'
      updateTime: '{{ item.updateTime }}'
      uid: '{{ item.uid }}'
  uid_template: '{item.name}'
- discovery_id: gcp.services.service.list_keys
  calls:
  - action: projects.locations.keys.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      name: '{{ item.name }}'
      displayName: '{{ item.displayName }}'
      keyString: '{{ item.keyString }}'
      restrictions: '{{ item.restrictions }}'
      etag: '{{ item.etag }}'
      createTime: '{{ item.createTime }}'
      updateTime: '{{ item.updateTime }}'
      uid: '{{ item.uid }}'
  uid_template: '{item.name}'
