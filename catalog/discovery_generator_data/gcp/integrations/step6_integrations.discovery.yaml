    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      properties: '{{ response.properties }}'
- discovery_id: gcp.integrations.projects.locations.authConfigs.list
  calls:
  - action: projects.locations.authConfigs.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.authConfigs }}'
    item:
      certificateId: '{{ item.certificateId }}'
      createTime: '{{ item.createTime }}'
      creatorEmail: '{{ item.creatorEmail }}'
