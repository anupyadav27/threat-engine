version: '1.0'
provider: gcp
service: integrations
services:
  client: integrations
  module: googleapiclient.discovery.build('integrations', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.integrations.callback.generateToken
  calls:
  - action: callback.generateToken
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      message: '{{ response.message }}'
- discovery_id: gcp.integrations.connectorPlatformRegions.enumerate
