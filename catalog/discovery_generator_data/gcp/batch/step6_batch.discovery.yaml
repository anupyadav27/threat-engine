version: '1.0'
provider: gcp
service: batch
services:
  client: batch
  module: googleapiclient.discovery.build('batch', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.batch.projects.locations.get
  calls:
  - action: projects.locations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      displayName: '{{ response.displayName }}'
      labels: '{{ response.labels }}'
      locationId: '{{ response.locationId }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.batch.projects.locations.jobs.list
  calls:
  - action: projects.locations.jobs.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.jobs }}'
    item:
      allocationPolicy: '{{ item.allocationPolicy }}'
      createTime: '{{ item.createTime }}'
      labels: '{{ item.labels }}'
      logsPolicy: '{{ item.logsPolicy }}'
      name: '{{ item.name }}'
      notifications: '{{ item.notifications }}'
      priority: '{{ item.priority }}'
      status: '{{ item.status }}'
      taskGroups: '{{ item.taskGroups }}'
      uid: '{{ item.uid }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.batch.projects.locations.jobs.taskGroups.tasks.list
  calls:
  - action: projects.locations.jobs.taskGroups.tasks.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.tasks }}'
    item:
      name: '{{ item.name }}'
      status: '{{ item.status }}'
  uid_template: '{item.name}'
- discovery_id: gcp.batch.projects.locations.list
  calls:
  - action: projects.locations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.locations }}'
    item:
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      locationId: '{{ item.locationId }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.batch.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.batch.projects.locations.jobs.get
  for_each: gcp.batch.projects.locations.jobs.list
  calls:
  - action: projects.locations.jobs.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      allocationPolicy: '{{ response.allocationPolicy }}'
      createTime: '{{ response.createTime }}'
      labels: '{{ response.labels }}'
      logsPolicy: '{{ response.logsPolicy }}'
      name: '{{ response.name }}'
      notifications: '{{ response.notifications }}'
      priority: '{{ response.priority }}'
      status: '{{ response.status }}'
      taskGroups: '{{ response.taskGroups }}'
      uid: '{{ response.uid }}'
      updateTime: '{{ response.updateTime }}'
- discovery_id: gcp.batch.projects.locations.jobs.taskGroups.tasks.get
  for_each: gcp.batch.projects.locations.jobs.taskGroups.tasks.list
  calls:
  - action: projects.locations.jobs.taskGroups.tasks.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      name: '{{ response.name }}'
      status: '{{ response.status }}'
- discovery_id: gcp.batch.projects.locations.operations.get
  for_each: gcp.batch.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
