version: '1.0'
provider: gcp
service: discovery
services:
  client: discovery
  module: googleapiclient.discovery.build('discovery', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.discovery.apis.list
  calls:
  - action: apis.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.apis }}'
- discovery_id: gcp.discovery.apis.getRest
  calls:
  - action: apis.getRest
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      auth: '{{ response.auth }}'
      basePath: '{{ response.basePath }}'
      baseUrl: '{{ response.baseUrl }}'
      batchPath: '{{ response.batchPath }}'
      canonicalName: '{{ response.canonicalName }}'
      description: '{{ response.description }}'
      discoveryVersion: '{{ response.discoveryVersion }}'
      documentationLink: '{{ response.documentationLink }}'
      endpoints: '{{ response.endpoints }}'
      exponentialBackoffDefault: '{{ response.exponentialBackoffDefault }}'
      features: '{{ response.features }}'
      icons: '{{ response.icons }}'
      id: '{{ response.id }}'
      labels: '{{ response.labels }}'
      methods: '{{ response.methods }}'
      name: '{{ response.name }}'
      ownerDomain: '{{ response.ownerDomain }}'
      ownerName: '{{ response.ownerName }}'
      packagePath: '{{ response.packagePath }}'
      parameters: '{{ response.parameters }}'
      protocol: '{{ response.protocol }}'
      resources: '{{ response.resources }}'
      revision: '{{ response.revision }}'
      rootUrl: '{{ response.rootUrl }}'
      schemas: '{{ response.schemas }}'
      servicePath: '{{ response.servicePath }}'
      title: '{{ response.title }}'
      version: '{{ response.version }}'
      version_module: '{{ response.version_module }}'
  uid_template: '{item.name}'
