version: '1.0'
provider: gcp
service: ml
services:
  client: ml
  module: googleapiclient.discovery.build('ml', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.ml.projects.getConfig
  calls:
  - action: projects.getConfig
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      config: '{{ response.config }}'
      serviceAccount: '{{ response.serviceAccount }}'
      serviceAccountProject: '{{ response.serviceAccountProject }}'
- discovery_id: gcp.ml.projects.jobs.list
  calls:
  - action: projects.jobs.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.jobs }}'
    item:
      createTime: '{{ item.createTime }}'
      endTime: '{{ item.endTime }}'
      errorMessage: '{{ item.errorMessage }}'
      jobId: '{{ item.jobId }}'
      jobPosition: '{{ item.jobPosition }}'
      labels: '{{ item.labels }}'
      predictionInput: '{{ item.predictionInput }}'
      predictionOutput: '{{ item.predictionOutput }}'
      startTime: '{{ item.startTime }}'
      state: '{{ item.state }}'
      trainingInput: '{{ item.trainingInput }}'
      trainingOutput: '{{ item.trainingOutput }}'
- discovery_id: gcp.ml.projects.locations.get
  calls:
  - action: projects.locations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      capabilities: '{{ response.capabilities }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.ml.projects.locations.list
  calls:
  - action: projects.locations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.locations }}'
    item:
      capabilities: '{{ item.capabilities }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.ml.projects.locations.studies.list
  calls:
  - action: projects.locations.studies.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.studies }}'
    item:
      createTime: '{{ item.createTime }}'
      inactiveReason: '{{ item.inactiveReason }}'
      name: '{{ item.name }}'
      state: '{{ item.state }}'
      studyConfig: '{{ item.studyConfig }}'
  uid_template: '{item.name}'
- discovery_id: gcp.ml.projects.locations.studies.trials.list
  calls:
  - action: projects.locations.studies.trials.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.trials }}'
    item:
      clientId: '{{ item.clientId }}'
      endTime: '{{ item.endTime }}'
      finalMeasurement: '{{ item.finalMeasurement }}'
      infeasibleReason: '{{ item.infeasibleReason }}'
      measurements: '{{ item.measurements }}'
      name: '{{ item.name }}'
      parameters: '{{ item.parameters }}'
      startTime: '{{ item.startTime }}'
      state: '{{ item.state }}'
      trialInfeasible: '{{ item.trialInfeasible }}'
  uid_template: '{item.name}'
- discovery_id: gcp.ml.projects.models.list
  calls:
  - action: projects.models.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.models }}'
    item:
      defaultVersion: '{{ item.defaultVersion }}'
      description: '{{ item.description }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      onlinePredictionConsoleLogging: '{{ item.onlinePredictionConsoleLogging }}'
      onlinePredictionLogging: '{{ item.onlinePredictionLogging }}'
      regions: '{{ item.regions }}'
  uid_template: '{item.name}'
- discovery_id: gcp.ml.projects.models.versions.list
  calls:
  - action: projects.models.versions.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.versions }}'
    item:
      acceleratorConfig: '{{ item.acceleratorConfig }}'
      autoScaling: '{{ item.autoScaling }}'
      container: '{{ item.container }}'
      createTime: '{{ item.createTime }}'
      deploymentUri: '{{ item.deploymentUri }}'
      description: '{{ item.description }}'
      errorMessage: '{{ item.errorMessage }}'
      explanationConfig: '{{ item.explanationConfig }}'
      framework: '{{ item.framework }}'
      isDefault: '{{ item.isDefault }}'
      labels: '{{ item.labels }}'
      lastMigrationModelId: '{{ item.lastMigrationModelId }}'
      lastMigrationTime: '{{ item.lastMigrationTime }}'
      lastUseTime: '{{ item.lastUseTime }}'
      machineType: '{{ item.machineType }}'
      manualScaling: '{{ item.manualScaling }}'
      name: '{{ item.name }}'
      packageUris: '{{ item.packageUris }}'
      predictionClass: '{{ item.predictionClass }}'
      pythonVersion: '{{ item.pythonVersion }}'
      requestLoggingConfig: '{{ item.requestLoggingConfig }}'
      routes: '{{ item.routes }}'
      runtimeVersion: '{{ item.runtimeVersion }}'
      serviceAccount: '{{ item.serviceAccount }}'
      state: '{{ item.state }}'
  uid_template: '{item.name}'
- discovery_id: gcp.ml.projects.operations.list
  calls:
  - action: projects.operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.ml.projects.jobs.get
  for_each: gcp.ml.projects.jobs.list
  calls:
  - action: projects.jobs.get
    params:
      name: '{{ item.jobId }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      createTime: '{{ response.createTime }}'
      endTime: '{{ response.endTime }}'
      errorMessage: '{{ response.errorMessage }}'
      jobId: '{{ response.jobId }}'
      jobPosition: '{{ response.jobPosition }}'
      labels: '{{ response.labels }}'
      predictionInput: '{{ response.predictionInput }}'
      predictionOutput: '{{ response.predictionOutput }}'
      startTime: '{{ response.startTime }}'
      state: '{{ response.state }}'
      trainingInput: '{{ response.trainingInput }}'
      trainingOutput: '{{ response.trainingOutput }}'
- discovery_id: gcp.ml.projects.jobs.getIamPolicy
  for_each: gcp.ml.projects.jobs.list
  calls:
  - action: projects.jobs.getIamPolicy
    params:
      resource: '{{ item.jobId }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      auditConfigs: '{{ response.auditConfigs }}'
      bindings: '{{ response.bindings }}'
      version: '{{ response.version }}'
- discovery_id: gcp.ml.projects.locations.operations.get
  for_each: gcp.ml.projects.operations.list
  calls:
  - action: projects.locations.operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
- discovery_id: gcp.ml.projects.locations.studies.get
  for_each: gcp.ml.projects.locations.studies.list
  calls:
  - action: projects.locations.studies.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      createTime: '{{ response.createTime }}'
      inactiveReason: '{{ response.inactiveReason }}'
      name: '{{ response.name }}'
      state: '{{ response.state }}'
      studyConfig: '{{ response.studyConfig }}'
- discovery_id: gcp.ml.projects.locations.studies.trials.get
  for_each: gcp.ml.projects.locations.studies.trials.list
  calls:
  - action: projects.locations.studies.trials.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      clientId: '{{ response.clientId }}'
      endTime: '{{ response.endTime }}'
      finalMeasurement: '{{ response.finalMeasurement }}'
      infeasibleReason: '{{ response.infeasibleReason }}'
      measurements: '{{ response.measurements }}'
      name: '{{ response.name }}'
      parameters: '{{ response.parameters }}'
      startTime: '{{ response.startTime }}'
      state: '{{ response.state }}'
      trialInfeasible: '{{ response.trialInfeasible }}'
- discovery_id: gcp.ml.projects.models.get
  for_each: gcp.ml.projects.models.list
  calls:
  - action: projects.models.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      defaultVersion: '{{ response.defaultVersion }}'
      description: '{{ response.description }}'
      labels: '{{ response.labels }}'
      name: '{{ response.name }}'
      onlinePredictionConsoleLogging: '{{ response.onlinePredictionConsoleLogging
        }}'
      onlinePredictionLogging: '{{ response.onlinePredictionLogging }}'
      regions: '{{ response.regions }}'
- discovery_id: gcp.ml.projects.models.getIamPolicy
  for_each: gcp.ml.projects.models.list
  calls:
  - action: projects.models.getIamPolicy
    params:
      resource: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      auditConfigs: '{{ response.auditConfigs }}'
      bindings: '{{ response.bindings }}'
      version: '{{ response.version }}'
- discovery_id: gcp.ml.projects.models.versions.get
  for_each: gcp.ml.projects.models.versions.list
  calls:
  - action: projects.models.versions.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      acceleratorConfig: '{{ response.acceleratorConfig }}'
      autoScaling: '{{ response.autoScaling }}'
      container: '{{ response.container }}'
      createTime: '{{ response.createTime }}'
      deploymentUri: '{{ response.deploymentUri }}'
      description: '{{ response.description }}'
      errorMessage: '{{ response.errorMessage }}'
      explanationConfig: '{{ response.explanationConfig }}'
      framework: '{{ response.framework }}'
      isDefault: '{{ response.isDefault }}'
      labels: '{{ response.labels }}'
      lastMigrationModelId: '{{ response.lastMigrationModelId }}'
      lastMigrationTime: '{{ response.lastMigrationTime }}'
      lastUseTime: '{{ response.lastUseTime }}'
      machineType: '{{ response.machineType }}'
      manualScaling: '{{ response.manualScaling }}'
      name: '{{ response.name }}'
      packageUris: '{{ response.packageUris }}'
      predictionClass: '{{ response.predictionClass }}'
      pythonVersion: '{{ response.pythonVersion }}'
      requestLoggingConfig: '{{ response.requestLoggingConfig }}'
      routes: '{{ response.routes }}'
      runtimeVersion: '{{ response.runtimeVersion }}'
      serviceAccount: '{{ response.serviceAccount }}'
      state: '{{ response.state }}'
- discovery_id: gcp.ml.projects.operations.get
  for_each: gcp.ml.projects.operations.list
  calls:
  - action: projects.operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
