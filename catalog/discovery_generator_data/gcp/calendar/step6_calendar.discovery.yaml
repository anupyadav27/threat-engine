version: '1.0'
provider: gcp
service: calendar
services:
  client: calendar
  module: googleapiclient.discovery.build('calendar', 'v3')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.calendar.calendarList.list
  calls:
  - action: calendarList.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.calendarList }}'
    item:
      accessRole: '{{ item.accessRole }}'
      autoAcceptInvitations: '{{ item.autoAcceptInvitations }}'
      backgroundColor: '{{ item.backgroundColor }}'
      colorId: '{{ item.colorId }}'
      conferenceProperties: '{{ item.conferenceProperties }}'
      dataOwner: '{{ item.dataOwner }}'
      defaultReminders: '{{ item.defaultReminders }}'
      deleted: '{{ item.deleted }}'
      description: '{{ item.description }}'
      foregroundColor: '{{ item.foregroundColor }}'
      hidden: '{{ item.hidden }}'
      id: '{{ item.id }}'
      location: '{{ item.location }}'
      notificationSettings: '{{ item.notificationSettings }}'
      primary: '{{ item.primary }}'
      selected: '{{ item.selected }}'
      summary: '{{ item.summary }}'
      summaryOverride: '{{ item.summaryOverride }}'
      timeZone: '{{ item.timeZone }}'
  uid_template: '{item.id}'
- discovery_id: gcp.calendar.colors.get
  calls:
  - action: colors.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      calendar: '{{ response.calendar }}'
      event: '{{ response.event }}'
      updated: '{{ response.updated }}'
- discovery_id: gcp.calendar.freebusy.query
  calls:
  - action: freebusy.query
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.freebusy }}'
- discovery_id: gcp.calendar.settings.list
  calls:
  - action: settings.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.settings }}'
    item:
      id: '{{ item.id }}'
      value: '{{ item.value }}'
  uid_template: '{item.id}'
- discovery_id: gcp.calendar.acl.get
  calls:
  - action: acl.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ response.id }}'
      role: '{{ response.role }}'
      scope: '{{ response.scope }}'
  uid_template: '{item.id}'
- discovery_id: gcp.calendar.acl.list
  calls:
  - action: acl.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.acl }}'
    item:
      id: '{{ item.id }}'
      role: '{{ item.role }}'
      scope: '{{ item.scope }}'
  uid_template: '{item.id}'
- discovery_id: gcp.calendar.calendarList.get
  calls:
  - action: calendarList.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      accessRole: '{{ response.accessRole }}'
      autoAcceptInvitations: '{{ response.autoAcceptInvitations }}'
      backgroundColor: '{{ response.backgroundColor }}'
      colorId: '{{ response.colorId }}'
      conferenceProperties: '{{ response.conferenceProperties }}'
      dataOwner: '{{ response.dataOwner }}'
      defaultReminders: '{{ response.defaultReminders }}'
      deleted: '{{ response.deleted }}'
      description: '{{ response.description }}'
      foregroundColor: '{{ response.foregroundColor }}'
      hidden: '{{ response.hidden }}'
      id: '{{ response.id }}'
      location: '{{ response.location }}'
      notificationSettings: '{{ response.notificationSettings }}'
      primary: '{{ response.primary }}'
      selected: '{{ response.selected }}'
      summary: '{{ response.summary }}'
      summaryOverride: '{{ response.summaryOverride }}'
      timeZone: '{{ response.timeZone }}'
  uid_template: '{item.id}'
- discovery_id: gcp.calendar.calendars.get
  calls:
  - action: calendars.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      autoAcceptInvitations: '{{ response.autoAcceptInvitations }}'
      conferenceProperties: '{{ response.conferenceProperties }}'
      dataOwner: '{{ response.dataOwner }}'
      description: '{{ response.description }}'
      id: '{{ response.id }}'
      location: '{{ response.location }}'
      summary: '{{ response.summary }}'
      timeZone: '{{ response.timeZone }}'
  uid_template: '{item.id}'
- discovery_id: gcp.calendar.events.get
  calls:
  - action: events.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      anyoneCanAddSelf: '{{ response.anyoneCanAddSelf }}'
      attachments: '{{ response.attachments }}'
      attendees: '{{ response.attendees }}'
      attendeesOmitted: '{{ response.attendeesOmitted }}'
      birthdayProperties: '{{ response.birthdayProperties }}'
      colorId: '{{ response.colorId }}'
      conferenceData: '{{ response.conferenceData }}'
      created: '{{ response.created }}'
      creator: '{{ response.creator }}'
      description: '{{ response.description }}'
      end: '{{ response.end }}'
      endTimeUnspecified: '{{ response.endTimeUnspecified }}'
      eventType: '{{ response.eventType }}'
      extendedProperties: '{{ response.extendedProperties }}'
      focusTimeProperties: '{{ response.focusTimeProperties }}'
      gadget: '{{ response.gadget }}'
      guestsCanInviteOthers: '{{ response.guestsCanInviteOthers }}'
      guestsCanModify: '{{ response.guestsCanModify }}'
      guestsCanSeeOtherGuests: '{{ response.guestsCanSeeOtherGuests }}'
      hangoutLink: '{{ response.hangoutLink }}'
      htmlLink: '{{ response.htmlLink }}'
      iCalUID: '{{ response.iCalUID }}'
      id: '{{ response.id }}'
      location: '{{ response.location }}'
      locked: '{{ response.locked }}'
      organizer: '{{ response.organizer }}'
      originalStartTime: '{{ response.originalStartTime }}'
      outOfOfficeProperties: '{{ response.outOfOfficeProperties }}'
      privateCopy: '{{ response.privateCopy }}'
      recurrence: '{{ response.recurrence }}'
      recurringEventId: '{{ response.recurringEventId }}'
      reminders: '{{ response.reminders }}'
      sequence: '{{ response.sequence }}'
      source: '{{ response.source }}'
      start: '{{ response.start }}'
      status: '{{ response.status }}'
      summary: '{{ response.summary }}'
      transparency: '{{ response.transparency }}'
      updated: '{{ response.updated }}'
      visibility: '{{ response.visibility }}'
      workingLocationProperties: '{{ response.workingLocationProperties }}'
  uid_template: '{item.id}'
- discovery_id: gcp.calendar.events.instances
  calls:
  - action: events.instances
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      accessRole: '{{ response.accessRole }}'
      defaultReminders: '{{ response.defaultReminders }}'
      description: '{{ response.description }}'
      items: '{{ response.items }}'
      nextSyncToken: '{{ response.nextSyncToken }}'
      summary: '{{ response.summary }}'
      timeZone: '{{ response.timeZone }}'
      updated: '{{ response.updated }}'
- discovery_id: gcp.calendar.events.list
  calls:
  - action: events.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.events }}'
    item:
      anyoneCanAddSelf: '{{ item.anyoneCanAddSelf }}'
      attachments: '{{ item.attachments }}'
      attendees: '{{ item.attendees }}'
      attendeesOmitted: '{{ item.attendeesOmitted }}'
      birthdayProperties: '{{ item.birthdayProperties }}'
      colorId: '{{ item.colorId }}'
      conferenceData: '{{ item.conferenceData }}'
      created: '{{ item.created }}'
      creator: '{{ item.creator }}'
      end: '{{ item.end }}'
      endTimeUnspecified: '{{ item.endTimeUnspecified }}'
      eventType: '{{ item.eventType }}'
      extendedProperties: '{{ item.extendedProperties }}'
      focusTimeProperties: '{{ item.focusTimeProperties }}'
      gadget: '{{ item.gadget }}'
      guestsCanInviteOthers: '{{ item.guestsCanInviteOthers }}'
      guestsCanModify: '{{ item.guestsCanModify }}'
      guestsCanSeeOtherGuests: '{{ item.guestsCanSeeOtherGuests }}'
      hangoutLink: '{{ item.hangoutLink }}'
      htmlLink: '{{ item.htmlLink }}'
      iCalUID: '{{ item.iCalUID }}'
      id: '{{ item.id }}'
      location: '{{ item.location }}'
      locked: '{{ item.locked }}'
      organizer: '{{ item.organizer }}'
      originalStartTime: '{{ item.originalStartTime }}'
      outOfOfficeProperties: '{{ item.outOfOfficeProperties }}'
      privateCopy: '{{ item.privateCopy }}'
      recurrence: '{{ item.recurrence }}'
      recurringEventId: '{{ item.recurringEventId }}'
      reminders: '{{ item.reminders }}'
      sequence: '{{ item.sequence }}'
      source: '{{ item.source }}'
      start: '{{ item.start }}'
      status: '{{ item.status }}'
      transparency: '{{ item.transparency }}'
      visibility: '{{ item.visibility }}'
      workingLocationProperties: '{{ item.workingLocationProperties }}'
  uid_template: '{item.id}'
- discovery_id: gcp.calendar.settings.get
  for_each: gcp.calendar.settings.list
  calls:
  - action: settings.get
    params:
      setting: '{{ item.id }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ response.id }}'
      value: '{{ response.value }}'
