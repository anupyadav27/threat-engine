      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.datacatalog.projects.locations.retrieveEffectiveConfig
  calls:
  - action: projects.locations.retrieveEffectiveConfig
    params: {}
    save_as: response
    on_error: continue
