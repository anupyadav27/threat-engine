      cloudBigtableSystemSpec: '{{ response.cloudBigtableSystemSpec }}'
      dataSource: '{{ response.dataSource }}'
      dataSourceConnectionSpec: '{{ response.dataSourceConnectionSpec }}'
      databaseTableSpec: '{{ response.databaseTableSpec }}'
