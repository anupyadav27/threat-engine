      displayName: '{{ item.displayName }}'
      name: '{{ item.name }}'
      policyTagCount: '{{ item.policyTagCount }}'
      service: '{{ item.service }}'
      taxonomyTimestamps: '{{ item.taxonomyTimestamps }}'
