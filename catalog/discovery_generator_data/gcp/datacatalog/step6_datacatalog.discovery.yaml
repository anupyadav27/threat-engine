version: '1.0'
provider: gcp
service: datacatalog
services:
  client: datacatalog
  module: googleapiclient.discovery.build('datacatalog', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.datacatalog.catalog.search
  calls:
  - action: catalog.search
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.catalog }}'
    item:
      description: '{{ item.description }}'
      displayName: '{{ item.displayName }}'
      fullyQualifiedName: '{{ item.fullyQualifiedName }}'
      integratedSystem: '{{ item.integratedSystem }}'
      linkedResource: '{{ item.linkedResource }}'
      modifyTime: '{{ item.modifyTime }}'
      relativeResourceName: '{{ item.relativeResourceName }}'
      searchResultSubtype: '{{ item.searchResultSubtype }}'
      searchResultType: '{{ item.searchResultType }}'
      userSpecifiedSystem: '{{ item.userSpecifiedSystem }}'
- discovery_id: gcp.datacatalog.entries.lookup
  calls:
  - action: entries.lookup
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      bigqueryDateShardedSpec: '{{ response.bigqueryDateShardedSpec }}'
      bigqueryTableSpec: '{{ response.bigqueryTableSpec }}'
      businessContext: '{{ response.businessContext }}'
      cloudBigtableSystemSpec: '{{ response.cloudBigtableSystemSpec }}'
      dataSource: '{{ response.dataSource }}'
      dataSourceConnectionSpec: '{{ response.dataSourceConnectionSpec }}'
      databaseTableSpec: '{{ response.databaseTableSpec }}'
      datasetSpec: '{{ response.datasetSpec }}'
      description: '{{ response.description }}'
      displayName: '{{ response.displayName }}'
      featureOnlineStoreSpec: '{{ response.featureOnlineStoreSpec }}'
      filesetSpec: '{{ response.filesetSpec }}'
      fullyQualifiedName: '{{ response.fullyQualifiedName }}'
      gcsFilesetSpec: '{{ response.gcsFilesetSpec }}'
      graphSpec: '{{ response.graphSpec }}'
      integratedSystem: '{{ response.integratedSystem }}'
      labels: '{{ response.labels }}'
      linkedResource: '{{ response.linkedResource }}'
      lookerSystemSpec: '{{ response.lookerSystemSpec }}'
      modelSpec: '{{ response.modelSpec }}'
      name: '{{ response.name }}'
      personalDetails: '{{ response.personalDetails }}'
      routineSpec: '{{ response.routineSpec }}'
      schema: '{{ response.schema }}'
      serviceSpec: '{{ response.serviceSpec }}'
      sourceSystemTimestamps: '{{ response.sourceSystemTimestamps }}'
      spannerTableSpec: '{{ response.spannerTableSpec }}'
      sqlDatabaseSystemSpec: '{{ response.sqlDatabaseSystemSpec }}'
      type: '{{ response.type }}'
      usageSignal: '{{ response.usageSignal }}'
      userSpecifiedSystem: '{{ response.userSpecifiedSystem }}'
      userSpecifiedType: '{{ response.userSpecifiedType }}'
  uid_template: '{item.name}'
- discovery_id: gcp.datacatalog.organizations.locations.retrieveConfig
  calls:
  - action: organizations.locations.retrieveConfig
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      config: '{{ response.config }}'
- discovery_id: gcp.datacatalog.organizations.locations.retrieveEffectiveConfig
  calls:
  - action: organizations.locations.retrieveEffectiveConfig
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      catalogUiExperience: '{{ response.catalogUiExperience }}'
      tagTemplateMigration: '{{ response.tagTemplateMigration }}'
      templateMigrationEnabledTime: '{{ response.templateMigrationEnabledTime }}'
- discovery_id: gcp.datacatalog.projects.locations.entryGroups.entries.list
  calls:
  - action: projects.locations.entryGroups.entries.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.entries }}'
    item:
      bigqueryDateShardedSpec: '{{ item.bigqueryDateShardedSpec }}'
      bigqueryTableSpec: '{{ item.bigqueryTableSpec }}'
      businessContext: '{{ item.businessContext }}'
      cloudBigtableSystemSpec: '{{ item.cloudBigtableSystemSpec }}'
      dataSource: '{{ item.dataSource }}'
      dataSourceConnectionSpec: '{{ item.dataSourceConnectionSpec }}'
      databaseTableSpec: '{{ item.databaseTableSpec }}'
      datasetSpec: '{{ item.datasetSpec }}'
      description: '{{ item.description }}'
      displayName: '{{ item.displayName }}'
      featureOnlineStoreSpec: '{{ item.featureOnlineStoreSpec }}'
      filesetSpec: '{{ item.filesetSpec }}'
      fullyQualifiedName: '{{ item.fullyQualifiedName }}'
      gcsFilesetSpec: '{{ item.gcsFilesetSpec }}'
      graphSpec: '{{ item.graphSpec }}'
      integratedSystem: '{{ item.integratedSystem }}'
      labels: '{{ item.labels }}'
      linkedResource: '{{ item.linkedResource }}'
      lookerSystemSpec: '{{ item.lookerSystemSpec }}'
      modelSpec: '{{ item.modelSpec }}'
      name: '{{ item.name }}'
      personalDetails: '{{ item.personalDetails }}'
      routineSpec: '{{ item.routineSpec }}'
      schema: '{{ item.schema }}'
      serviceSpec: '{{ item.serviceSpec }}'
      sourceSystemTimestamps: '{{ item.sourceSystemTimestamps }}'
      spannerTableSpec: '{{ item.spannerTableSpec }}'
      sqlDatabaseSystemSpec: '{{ item.sqlDatabaseSystemSpec }}'
      type: '{{ item.type }}'
      usageSignal: '{{ item.usageSignal }}'
      userSpecifiedSystem: '{{ item.userSpecifiedSystem }}'
      userSpecifiedType: '{{ item.userSpecifiedType }}'
  uid_template: '{item.name}'
- discovery_id: gcp.datacatalog.projects.locations.entryGroups.entries.tags.list
  calls:
  - action: projects.locations.entryGroups.entries.tags.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.tags }}'
    item:
      column: '{{ item.column }}'
      dataplexTransferStatus: '{{ item.dataplexTransferStatus }}'
      fields: '{{ item.fields }}'
      name: '{{ item.name }}'
      template: '{{ item.template }}'
      templateDisplayName: '{{ item.templateDisplayName }}'
  uid_template: '{item.name}'
- discovery_id: gcp.datacatalog.projects.locations.entryGroups.list
  calls:
  - action: projects.locations.entryGroups.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.entryGroups }}'
    item:
      dataCatalogTimestamps: '{{ item.dataCatalogTimestamps }}'
      description: '{{ item.description }}'
      displayName: '{{ item.displayName }}'
      name: '{{ item.name }}'
      transferredToDataplex: '{{ item.transferredToDataplex }}'
  uid_template: '{item.name}'
- discovery_id: gcp.datacatalog.projects.locations.entryGroups.tags.list
  calls:
  - action: projects.locations.entryGroups.tags.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.tags }}'
    item:
      column: '{{ item.column }}'
      dataplexTransferStatus: '{{ item.dataplexTransferStatus }}'
      fields: '{{ item.fields }}'
      name: '{{ item.name }}'
      template: '{{ item.template }}'
      templateDisplayName: '{{ item.templateDisplayName }}'
  uid_template: '{item.name}'
- discovery_id: gcp.datacatalog.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
