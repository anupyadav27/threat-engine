version: '1.0'
provider: gcp
service: datacatalog

services:
  client: datacatalog
  module: "googleapiclient.discovery.build('datacatalog', 'v1')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: taxonomies
    identifier_op: gcp.datacatalog.projects.locations.taxonomies.list
    identifier_field: taxonomies[].name
    item_var_path: item.taxonomies[].name
    identifier_template: '{parent}/taxonomies:export'
  - resource_type: unknown
    identifier_op: gcp.datacatalog.projects.locations.entryGroups.entries.list
    identifier_field: entries[].name
    item_var_path: item.entries[].name
  - resource_type: unknown
    identifier_op: gcp.datacatalog.projects.locations.entryGroups.entries.tags.list
    identifier_field: tags[].name
    item_var_path: item.tags[].name
  - resource_type: unknown
    identifier_op: gcp.datacatalog.projects.locations.entryGroups.list
