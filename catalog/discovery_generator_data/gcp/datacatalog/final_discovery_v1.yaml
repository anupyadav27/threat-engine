    item_var_path: item.entryGroups[].name
  - resource_type: unknown
    identifier_op: gcp.datacatalog.projects.locations.taxonomies.policyTags.list
    identifier_field: policyTags[].name
    item_var_path: item.policyTags[].name

checks: []

