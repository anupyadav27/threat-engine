version: '1.0'
provider: gcp
service: recaptchaenterprise
services:
  client: recaptchaenterprise
  module: googleapiclient.discovery.build('recaptchaenterprise', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.recaptchaenterprise.projects.firewallpolicies.list
  calls:
  - action: projects.firewallpolicies.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.firewallpolicies }}'
    item:
      actions: '{{ item.actions }}'
      condition: '{{ item.condition }}'
      description: '{{ item.description }}'
      name: '{{ item.name }}'
      path: '{{ item.path }}'
  uid_template: '{item.name}'
- discovery_id: gcp.recaptchaenterprise.projects.keys.list
  calls:
  - action: projects.keys.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.keys }}'
    item:
      androidSettings: '{{ item.androidSettings }}'
      createTime: '{{ item.createTime }}'
      displayName: '{{ item.displayName }}'
      expressSettings: '{{ item.expressSettings }}'
      iosSettings: '{{ item.iosSettings }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      testingOptions: '{{ item.testingOptions }}'
      wafSettings: '{{ item.wafSettings }}'
      webSettings: '{{ item.webSettings }}'
  uid_template: '{item.name}'
- discovery_id: gcp.recaptchaenterprise.projects.keys.listIpOverrides
  calls:
  - action: projects.keys.listIpOverrides
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.keys }}'
    item:
      ip: '{{ item.ip }}'
      overrideType: '{{ item.overrideType }}'
- discovery_id: gcp.recaptchaenterprise.projects.relatedaccountgroupmemberships.search
  calls:
  - action: projects.relatedaccountgroupmemberships.search
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.relatedaccountgroupmemberships }}'
    item:
      accountId: '{{ item.accountId }}'
      hashedAccountId: '{{ item.hashedAccountId }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.recaptchaenterprise.projects.relatedaccountgroups.list
  calls:
  - action: projects.relatedaccountgroups.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.relatedaccountgroups }}'
    item:
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.recaptchaenterprise.projects.relatedaccountgroups.memberships.list
  calls:
  - action: projects.relatedaccountgroups.memberships.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.memberships }}'
    item:
      accountId: '{{ item.accountId }}'
      hashedAccountId: '{{ item.hashedAccountId }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.recaptchaenterprise.projects.firewallpolicies.get
  for_each: gcp.recaptchaenterprise.projects.firewallpolicies.list
  calls:
  - action: projects.firewallpolicies.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      actions: '{{ response.actions }}'
      condition: '{{ response.condition }}'
      description: '{{ response.description }}'
      name: '{{ response.name }}'
      path: '{{ response.path }}'
- discovery_id: gcp.recaptchaenterprise.projects.keys.get
  for_each: gcp.recaptchaenterprise.projects.keys.listIpOverrides
  calls:
  - action: projects.keys.get
    params:
      name: '{{ item.ip }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      androidSettings: '{{ response.androidSettings }}'
      createTime: '{{ response.createTime }}'
      displayName: '{{ response.displayName }}'
      expressSettings: '{{ response.expressSettings }}'
      iosSettings: '{{ response.iosSettings }}'
      labels: '{{ response.labels }}'
      name: '{{ response.name }}'
      testingOptions: '{{ response.testingOptions }}'
      wafSettings: '{{ response.wafSettings }}'
      webSettings: '{{ response.webSettings }}'
- discovery_id: gcp.recaptchaenterprise.projects.keys.getMetrics
  for_each: gcp.recaptchaenterprise.projects.keys.listIpOverrides
  calls:
  - action: projects.keys.getMetrics
    params:
      name: '{{ item.ip }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      challengeMetrics: '{{ response.challengeMetrics }}'
      name: '{{ response.name }}'
      scoreMetrics: '{{ response.scoreMetrics }}'
      startTime: '{{ response.startTime }}'
- discovery_id: gcp.recaptchaenterprise.projects.keys.retrieveLegacySecretKey
  for_each: gcp.recaptchaenterprise.projects.keys.listIpOverrides
  calls:
  - action: projects.keys.retrieveLegacySecretKey
    params:
      key: '{{ item.ip }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      legacySecretKey: '{{ response.legacySecretKey }}'
