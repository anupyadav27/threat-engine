version: '1.0'
provider: gcp
service: filestore

services:
  client: file
  module: "googleapiclient.discovery.build('file', 'v1')"

# Anchors: service-level parameters provided by caller
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: unknown
    identifier_op: gcp.file.projects.locations.instances.list
    identifier_field: instances[].name
    item_var_path: item.instances[].name

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.file.projects.locations.instances.list ──
  # python: svc.projects().locations().instances().list(**params).execute()
  - discovery_id: gcp.file.projects.locations.instances.list
    calls:
      - action: projects.locations.instances.list
        params:
          parent: '{{ project_id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.instances }}'
      item:
        capacityStepSizeGb: '{{ item.capacityStepSizeGb }}'
        createTime: '{{ item.createTime }}'
        customPerformanceSupported: '{{ item.customPerformanceSupported }}'
        deletionProtectionEnabled: '{{ item.deletionProtectionEnabled }}'
        deletionProtectionReason: '{{ item.deletionProtectionReason }}'
        description: '{{ item.description }}'
        directoryServices: '{{ item.directoryServices }}'
        fileShares: '{{ item.fileShares }}'
        kmsKeyName: '{{ item.kmsKeyName }}'
        labels: '{{ item.labels }}'
        maxCapacityGb: '{{ item.maxCapacityGb }}'
        minCapacityGb: '{{ item.minCapacityGb }}'
        name: '{{ item.name }}'
        networks: '{{ item.networks }}'
        performanceConfig: '{{ item.performanceConfig }}'
        performanceLimits: '{{ item.performanceLimits }}'
        protocol: '{{ item.protocol }}'
        replication: '{{ item.replication }}'
        satisfiesPzi: '{{ item.satisfiesPzi }}'
        satisfiesPzs: '{{ item.satisfiesPzs }}'
        state: '{{ item.state }}'
        statusMessage: '{{ item.statusMessage }}'
        suspensionReasons: '{{ item.suspensionReasons }}'
        tags: '{{ item.tags }}'
        tier: '{{ item.tier }}'
