    item:
      allowStaleReviews: '{{ item.allowStaleReviews }}'
      annotations: '{{ item.annotations }}'
      createTime: '{{ item.createTime }}'
      disabled: '{{ item.disabled }}'
      includePattern: '{{ item.includePattern }}'
      minimumApprovalsCount: '{{ item.minimumApprovalsCount }}'
      minimumReviewsCount: '{{ item.minimumReviewsCount }}'
      name: '{{ item.name }}'
      requireCommentsResolved: '{{ item.requireCommentsResolved }}'
      requireLinearHistory: '{{ item.requireLinearHistory }}'
      requirePullRequest: '{{ item.requirePullRequest }}'
      requiredStatusChecks: '{{ item.requiredStatusChecks }}'
