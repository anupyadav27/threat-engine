version: '1.0'
provider: gcp
service: securesourcemanager
services:
  client: securesourcemanager
  module: googleapiclient.discovery.build('securesourcemanager', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.securesourcemanager.projects.locations.get
  calls:
  - action: projects.locations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      displayName: '{{ response.displayName }}'
      labels: '{{ response.labels }}'
      locationId: '{{ response.locationId }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.securesourcemanager.projects.locations.instances.list
  calls:
  - action: projects.locations.instances.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.instances }}'
    item:
      createTime: '{{ item.createTime }}'
      hostConfig: '{{ item.hostConfig }}'
      kmsKey: '{{ item.kmsKey }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      privateConfig: '{{ item.privateConfig }}'
      state: '{{ item.state }}'
      stateNote: '{{ item.stateNote }}'
      updateTime: '{{ item.updateTime }}'
      workforceIdentityFederationConfig: '{{ item.workforceIdentityFederationConfig
        }}'
  uid_template: '{item.name}'
- discovery_id: gcp.securesourcemanager.projects.locations.list
  calls:
  - action: projects.locations.list
    params: {}
    save_as: response
    on_error: continue
