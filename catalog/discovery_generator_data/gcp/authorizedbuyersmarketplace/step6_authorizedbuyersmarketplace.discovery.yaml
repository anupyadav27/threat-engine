    items_for: '{{ response.finalizedDeals }}'
    item:
      deal: '{{ item.deal }}'
      dealPausingInfo: '{{ item.dealPausingInfo }}'
      dealServingStatus: '{{ item.dealServingStatus }}'
      name: '{{ item.name }}'
      readyToServe: '{{ item.readyToServe }}'
