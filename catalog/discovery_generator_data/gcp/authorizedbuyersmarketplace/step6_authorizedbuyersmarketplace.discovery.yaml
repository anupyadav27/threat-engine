version: '1.0'
provider: gcp
service: authorizedbuyersmarketplace
services:
  client: authorizedbuyersmarketplace
  module: googleapiclient.discovery.build('authorizedbuyersmarketplace', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.authorizedbuyersmarketplace.bidders.auctionPackages.list
  calls:
  - action: bidders.auctionPackages.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.auctionPackages }}'
    item:
      createTime: '{{ item.createTime }}'
      creator: '{{ item.creator }}'
      dealOwnerSeatId: '{{ item.dealOwnerSeatId }}'
      description: '{{ item.description }}'
      displayName: '{{ item.displayName }}'
      eligibleSeatIds: '{{ item.eligibleSeatIds }}'
      floorPriceCpm: '{{ item.floorPriceCpm }}'
      name: '{{ item.name }}'
      subscribedBuyers: '{{ item.subscribedBuyers }}'
      subscribedClients: '{{ item.subscribedClients }}'
      subscribedMediaPlanners: '{{ item.subscribedMediaPlanners }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.authorizedbuyersmarketplace.bidders.finalizedDeals.list
  calls:
  - action: bidders.finalizedDeals.list
    params: {}
    save_as: response
    on_error: continue
  emit:
