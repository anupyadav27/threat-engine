version: '1.0'
provider: gcp
service: sqladmin
services:
  client: sqladmin
  module: googleapiclient.discovery.build('sqladmin', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.sqladmin.Backups.ListBackups
  calls:
  - action: Backups.ListBackups
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Backups }}'
    item:
      backupInterval: '{{ item.backupInterval }}'
      backupKind: '{{ item.backupKind }}'
      backupRun: '{{ item.backupRun }}'
      databaseVersion: '{{ item.databaseVersion }}'
      description: '{{ item.description }}'
      error: '{{ item.error }}'
      expiryTime: '{{ item.expiryTime }}'
      instance: '{{ item.instance }}'
      instanceDeletionTime: '{{ item.instanceDeletionTime }}'
      instanceSettings: '{{ item.instanceSettings }}'
      kmsKey: '{{ item.kmsKey }}'
      kmsKeyVersion: '{{ item.kmsKeyVersion }}'
      location: '{{ item.location }}'
      maxChargeableBytes: '{{ item.maxChargeableBytes }}'
      name: '{{ item.name }}'
      satisfiesPzi: '{{ item.satisfiesPzi }}'
      satisfiesPzs: '{{ item.satisfiesPzs }}'
      state: '{{ item.state }}'
      timeZone: '{{ item.timeZone }}'
      ttlDays: '{{ item.ttlDays }}'
      type: '{{ item.type }}'
  uid_template: '{item.name}'
- discovery_id: gcp.sqladmin.flags.list
  calls:
  - action: flags.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.flags }}'
    item:
      allowedIntValues: '{{ item.allowedIntValues }}'
      allowedStringValues: '{{ item.allowedStringValues }}'
      appliesTo: '{{ item.appliesTo }}'
      flagScope: '{{ item.flagScope }}'
      inBeta: '{{ item.inBeta }}'
      maxValue: '{{ item.maxValue }}'
      minValue: '{{ item.minValue }}'
      name: '{{ item.name }}'
      recommendedIntValue: '{{ item.recommendedIntValue }}'
      recommendedStringValue: '{{ item.recommendedStringValue }}'
      requiresRestart: '{{ item.requiresRestart }}'
      type: '{{ item.type }}'
  uid_template: '{item.name}'
- discovery_id: gcp.sqladmin.instances.list
  calls:
  - action: instances.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      name: '{{ item.name }}'
      selfLink: '{{ item.selfLink }}'
      region: '{{ item.region }}'
      databaseVersion: '{{ item.databaseVersion }}'
      state: '{{ item.state }}'
      settings: '{{ item.settings }}'
      diskEncryptionConfiguration: '{{ item.diskEncryptionConfiguration }}'
      diskEncryptionStatus: '{{ item.diskEncryptionStatus }}'
  uid_template: '{item.selfLink}'
- discovery_id: gcp.sqladmin.operations.list
  calls:
  - action: operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      acquireSsrsLeaseContext: '{{ item.acquireSsrsLeaseContext }}'
      apiWarning: '{{ item.apiWarning }}'
      backupContext: '{{ item.backupContext }}'
      endTime: '{{ item.endTime }}'
      error: '{{ item.error }}'
      exportContext: '{{ item.exportContext }}'
      importContext: '{{ item.importContext }}'
      insertTime: '{{ item.insertTime }}'
      name: '{{ item.name }}'
      operationType: '{{ item.operationType }}'
      preCheckMajorVersionUpgradeContext: '{{ item.preCheckMajorVersionUpgradeContext
        }}'
      startTime: '{{ item.startTime }}'
      status: '{{ item.status }}'
      subOperationType: '{{ item.subOperationType }}'
      targetId: '{{ item.targetId }}'
      targetLink: '{{ item.targetLink }}'
      targetProject: '{{ item.targetProject }}'
      user: '{{ item.user }}'
  uid_template: '{item.name}'
- discovery_id: gcp.sqladmin.tiers.list
  calls:
  - action: tiers.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.tiers }}'
    item:
      DiskQuota: '{{ item.DiskQuota }}'
      RAM: '{{ item.RAM }}'
      region: '{{ item.region }}'
      tier: '{{ item.tier }}'
- discovery_id: gcp.sqladmin.Backups.GetBackup
  for_each: gcp.sqladmin.Backups.ListBackups
  calls:
  - action: Backups.GetBackup
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      backupInterval: '{{ response.backupInterval }}'
      backupKind: '{{ response.backupKind }}'
      backupRun: '{{ response.backupRun }}'
      databaseVersion: '{{ response.databaseVersion }}'
      description: '{{ response.description }}'
      error: '{{ response.error }}'
      expiryTime: '{{ response.expiryTime }}'
      instance: '{{ response.instance }}'
      instanceDeletionTime: '{{ response.instanceDeletionTime }}'
      instanceSettings: '{{ response.instanceSettings }}'
      kmsKey: '{{ response.kmsKey }}'
      kmsKeyVersion: '{{ response.kmsKeyVersion }}'
      location: '{{ response.location }}'
      maxChargeableBytes: '{{ response.maxChargeableBytes }}'
      name: '{{ response.name }}'
      satisfiesPzi: '{{ response.satisfiesPzi }}'
      satisfiesPzs: '{{ response.satisfiesPzs }}'
      state: '{{ response.state }}'
      timeZone: '{{ response.timeZone }}'
      ttlDays: '{{ response.ttlDays }}'
      type: '{{ response.type }}'
- discovery_id: gcp.sqladmin.backupRuns.get
  for_each: gcp.sqladmin.backupRuns.list
  calls:
  - action: backupRuns.get
    params:
      id: '{{ item.id }}'
      instance: '{{ item.instance }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      backupKind: '{{ response.backupKind }}'
      databaseVersion: '{{ response.databaseVersion }}'
      description: '{{ response.description }}'
      diskEncryptionConfiguration: '{{ response.diskEncryptionConfiguration }}'
      diskEncryptionStatus: '{{ response.diskEncryptionStatus }}'
      endTime: '{{ response.endTime }}'
      enqueuedTime: '{{ response.enqueuedTime }}'
      error: '{{ response.error }}'
      id: '{{ response.id }}'
      instance: '{{ response.instance }}'
      location: '{{ response.location }}'
      maxChargeableBytes: '{{ response.maxChargeableBytes }}'
      startTime: '{{ response.startTime }}'
      status: '{{ response.status }}'
      timeZone: '{{ response.timeZone }}'
      type: '{{ response.type }}'
      windowStartTime: '{{ response.windowStartTime }}'
- discovery_id: gcp.sqladmin.backupRuns.list
  for_each: gcp.sqladmin.instances.list
  calls:
  - action: backupRuns.list
    params:
      instance: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.backupRuns }}'
    item:
      backupKind: '{{ item.backupKind }}'
      databaseVersion: '{{ item.databaseVersion }}'
      description: '{{ item.description }}'
      diskEncryptionConfiguration: '{{ item.diskEncryptionConfiguration }}'
      diskEncryptionStatus: '{{ item.diskEncryptionStatus }}'
      endTime: '{{ item.endTime }}'
      enqueuedTime: '{{ item.enqueuedTime }}'
      error: '{{ item.error }}'
      id: '{{ item.id }}'
      instance: '{{ item.instance }}'
      location: '{{ item.location }}'
      maxChargeableBytes: '{{ item.maxChargeableBytes }}'
      startTime: '{{ item.startTime }}'
      status: '{{ item.status }}'
      timeZone: '{{ item.timeZone }}'
      type: '{{ item.type }}'
      windowStartTime: '{{ item.windowStartTime }}'
- discovery_id: gcp.sqladmin.connect.get
  for_each: gcp.sqladmin.instances.list
  calls:
  - action: connect.get
    params:
      instance: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      backendType: '{{ response.backendType }}'
      customSubjectAlternativeNames: '{{ response.customSubjectAlternativeNames }}'
      databaseVersion: '{{ response.databaseVersion }}'
      dnsName: '{{ response.dnsName }}'
      dnsNames: '{{ response.dnsNames }}'
      ipAddresses: '{{ response.ipAddresses }}'
      mdxProtocolSupport: '{{ response.mdxProtocolSupport }}'
      nodeCount: '{{ response.nodeCount }}'
      nodes: '{{ response.nodes }}'
      pscEnabled: '{{ response.pscEnabled }}'
      region: '{{ response.region }}'
      serverCaCert: '{{ response.serverCaCert }}'
      serverCaMode: '{{ response.serverCaMode }}'
- discovery_id: gcp.sqladmin.databases.get
  for_each: gcp.sqladmin.databases.list
  calls:
  - action: databases.get
    params:
      database: '{{ item.name }}'
      instance: '{{ item.instance }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      charset: '{{ response.charset }}'
      collation: '{{ response.collation }}'
      instance: '{{ response.instance }}'
      name: '{{ response.name }}'
      project: '{{ response.project }}'
      sqlserverDatabaseDetails: '{{ response.sqlserverDatabaseDetails }}'
- discovery_id: gcp.sqladmin.databases.list
  for_each: gcp.sqladmin.instances.list
  calls:
  - action: databases.list
    params:
      instance: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.databases }}'
    item:
      charset: '{{ item.charset }}'
      collation: '{{ item.collation }}'
      instance: '{{ item.instance }}'
      name: '{{ item.name }}'
      project: '{{ item.project }}'
      sqlserverDatabaseDetails: '{{ item.sqlserverDatabaseDetails }}'
- discovery_id: gcp.sqladmin.instances.ListEntraIdCertificates
  for_each: gcp.sqladmin.instances.list
  calls:
  - action: instances.ListEntraIdCertificates
    params:
      instance: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
