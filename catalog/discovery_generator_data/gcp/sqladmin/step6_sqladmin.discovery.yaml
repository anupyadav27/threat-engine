      diskEncryptionStatus: '{{ response.diskEncryptionStatus }}'
      dnsName: '{{ response.dnsName }}'
      dnsNames: '{{ response.dnsNames }}'
      failoverReplica: '{{ response.failoverReplica }}'
      gceZone: '{{ response.gceZone }}'
      geminiConfig: '{{ response.geminiConfig }}'
      includeReplicasForMajorVersionUpgrade: '{{ response.includeReplicasForMajorVersionUpgrade
        }}'
      instanceType: '{{ response.instanceType }}'
      ipAddresses: '{{ response.ipAddresses }}'
      ipv6Address: '{{ response.ipv6Address }}'
      maintenanceVersion: '{{ response.maintenanceVersion }}'
      masterInstanceName: '{{ response.masterInstanceName }}'
      maxDiskSize: '{{ response.maxDiskSize }}'
      name: '{{ response.name }}'
      nodeCount: '{{ response.nodeCount }}'
      nodes: '{{ response.nodes }}'
      onPremisesConfiguration: '{{ response.onPremisesConfiguration }}'
      outOfDiskReport: '{{ response.outOfDiskReport }}'
      primaryDnsName: '{{ response.primaryDnsName }}'
      project: '{{ response.project }}'
      pscServiceAttachmentLink: '{{ response.pscServiceAttachmentLink }}'
      region: '{{ response.region }}'
      replicaConfiguration: '{{ response.replicaConfiguration }}'
      replicaNames: '{{ response.replicaNames }}'
      replicationCluster: '{{ response.replicationCluster }}'
      rootPassword: '{{ response.rootPassword }}'
      satisfiesPzi: '{{ response.satisfiesPzi }}'
      satisfiesPzs: '{{ response.satisfiesPzs }}'
      scheduledMaintenance: '{{ response.scheduledMaintenance }}'
      secondaryGceZone: '{{ response.secondaryGceZone }}'
      serverCaCert: '{{ response.serverCaCert }}'
      serviceAccountEmailAddress: '{{ response.serviceAccountEmailAddress }}'
      settings: '{{ response.settings }}'
      sqlNetworkArchitecture: '{{ response.sqlNetworkArchitecture }}'
      state: '{{ response.state }}'
