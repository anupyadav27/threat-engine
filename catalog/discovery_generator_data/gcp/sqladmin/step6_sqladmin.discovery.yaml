      certSerialNumber: '{{ item.certSerialNumber }}'
      commonName: '{{ item.commonName }}'
      createTime: '{{ item.createTime }}'
      expirationTime: '{{ item.expirationTime }}'
      instance: '{{ item.instance }}'
