version: '1.0'
provider: gcp
service: ids
services:
  client: ids
  module: googleapiclient.discovery.build('ids', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.ids.projects.locations.endpoints.list
  calls:
  - action: projects.locations.endpoints.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.endpoints }}'
    item:
      createTime: '{{ item.createTime }}'
      description: '{{ item.description }}'
      endpointForwardingRule: '{{ item.endpointForwardingRule }}'
      endpointIp: '{{ item.endpointIp }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      network: '{{ item.network }}'
      satisfiesPzi: '{{ item.satisfiesPzi }}'
      satisfiesPzs: '{{ item.satisfiesPzs }}'
      severity: '{{ item.severity }}'
      state: '{{ item.state }}'
      threatExceptions: '{{ item.threatExceptions }}'
      trafficLogs: '{{ item.trafficLogs }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.ids.projects.locations.get
  calls:
  - action: projects.locations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      displayName: '{{ response.displayName }}'
      labels: '{{ response.labels }}'
      locationId: '{{ response.locationId }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.ids.projects.locations.list
  calls:
  - action: projects.locations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.locations }}'
    item:
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      locationId: '{{ item.locationId }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.ids.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.ids.projects.locations.endpoints.get
  for_each: gcp.ids.projects.locations.endpoints.list
  calls:
  - action: projects.locations.endpoints.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      createTime: '{{ response.createTime }}'
      description: '{{ response.description }}'
      endpointForwardingRule: '{{ response.endpointForwardingRule }}'
      endpointIp: '{{ response.endpointIp }}'
      labels: '{{ response.labels }}'
      name: '{{ response.name }}'
      network: '{{ response.network }}'
      satisfiesPzi: '{{ response.satisfiesPzi }}'
      satisfiesPzs: '{{ response.satisfiesPzs }}'
      severity: '{{ response.severity }}'
      state: '{{ response.state }}'
      threatExceptions: '{{ response.threatExceptions }}'
      trafficLogs: '{{ response.trafficLogs }}'
      updateTime: '{{ response.updateTime }}'
- discovery_id: gcp.ids.projects.locations.operations.get
  for_each: gcp.ids.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
