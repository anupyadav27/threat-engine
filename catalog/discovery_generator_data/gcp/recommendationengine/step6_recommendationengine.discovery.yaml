version: '1.0'
provider: gcp
service: recommendationengine
services:
  client: recommendationengine
  module: googleapiclient.discovery.build('recommendationengine', 'v1beta1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.recommendationengine.projects.locations.catalogs.catalogItems.list
  calls:
  - action: projects.locations.catalogs.catalogItems.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.catalogItems }}'
    item:
      categoryHierarchies: '{{ item.categoryHierarchies }}'
      description: '{{ item.description }}'
      id: '{{ item.id }}'
      itemAttributes: '{{ item.itemAttributes }}'
      itemGroupId: '{{ item.itemGroupId }}'
      languageCode: '{{ item.languageCode }}'
      productMetadata: '{{ item.productMetadata }}'
      tags: '{{ item.tags }}'
      title: '{{ item.title }}'
  uid_template: '{item.id}'
- discovery_id: gcp.recommendationengine.projects.locations.catalogs.eventStores.predictionApiKeyRegistrations.list
  calls:
  - action: projects.locations.catalogs.eventStores.predictionApiKeyRegistrations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.predictionApiKeyRegistrations }}'
    item:
      apiKey: '{{ item.apiKey }}'
- discovery_id: gcp.recommendationengine.projects.locations.catalogs.eventStores.userEvents.collect
  calls:
  - action: projects.locations.catalogs.eventStores.userEvents.collect
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      contentType: '{{ response.contentType }}'
      data: '{{ response.data }}'
      extensions: '{{ response.extensions }}'
- discovery_id: gcp.recommendationengine.projects.locations.catalogs.eventStores.userEvents.list
  calls:
  - action: projects.locations.catalogs.eventStores.userEvents.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.userEvents }}'
    item:
      eventDetail: '{{ item.eventDetail }}'
      eventSource: '{{ item.eventSource }}'
      eventTime: '{{ item.eventTime }}'
      eventType: '{{ item.eventType }}'
      productEventDetail: '{{ item.productEventDetail }}'
      userInfo: '{{ item.userInfo }}'
- discovery_id: gcp.recommendationengine.projects.locations.catalogs.list
  calls:
  - action: projects.locations.catalogs.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.catalogs }}'
    item:
      catalogItemLevelConfig: '{{ item.catalogItemLevelConfig }}'
      defaultEventStoreId: '{{ item.defaultEventStoreId }}'
      displayName: '{{ item.displayName }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.recommendationengine.projects.locations.catalogs.catalogItems.get
  for_each: gcp.recommendationengine.projects.locations.catalogs.catalogItems.list
  calls:
  - action: projects.locations.catalogs.catalogItems.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      categoryHierarchies: '{{ response.categoryHierarchies }}'
      description: '{{ response.description }}'
      id: '{{ response.id }}'
      itemAttributes: '{{ response.itemAttributes }}'
      itemGroupId: '{{ response.itemGroupId }}'
      languageCode: '{{ response.languageCode }}'
      productMetadata: '{{ response.productMetadata }}'
      tags: '{{ response.tags }}'
      title: '{{ response.title }}'
- discovery_id: gcp.recommendationengine.projects.locations.catalogs.eventStores.operations.get
  for_each: gcp.recommendationengine.projects.locations.catalogs.eventStores.operations.list
  calls:
  - action: projects.locations.catalogs.eventStores.operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
- discovery_id: gcp.recommendationengine.projects.locations.catalogs.eventStores.operations.list
  for_each: gcp.recommendationengine.projects.locations.catalogs.list
  calls:
  - action: projects.locations.catalogs.eventStores.operations.list
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
- discovery_id: gcp.recommendationengine.projects.locations.catalogs.operations.get
  for_each: gcp.recommendationengine.projects.locations.catalogs.eventStores.operations.list
  calls:
  - action: projects.locations.catalogs.operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
- discovery_id: gcp.recommendationengine.projects.locations.catalogs.operations.list
  for_each: gcp.recommendationengine.projects.locations.catalogs.list
  calls:
  - action: projects.locations.catalogs.operations.list
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
