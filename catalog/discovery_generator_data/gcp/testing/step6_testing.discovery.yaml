version: '1.0'
provider: gcp
service: testing
services:
  client: testing
  module: googleapiclient.discovery.build('testing', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.testing.projects.deviceSessions.list
  calls:
  - action: projects.deviceSessions.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.deviceSessions }}'
    item:
      activeStartTime: '{{ item.activeStartTime }}'
      androidDevice: '{{ item.androidDevice }}'
      createTime: '{{ item.createTime }}'
      displayName: '{{ item.displayName }}'
      expireTime: '{{ item.expireTime }}'
      inactivityTimeout: '{{ item.inactivityTimeout }}'
      name: '{{ item.name }}'
      state: '{{ item.state }}'
      stateHistories: '{{ item.stateHistories }}'
      ttl: '{{ item.ttl }}'
  uid_template: '{item.name}'
- discovery_id: gcp.testing.projects.deviceSessions.get
  for_each: gcp.testing.projects.deviceSessions.list
  calls:
  - action: projects.deviceSessions.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      activeStartTime: '{{ response.activeStartTime }}'
      androidDevice: '{{ response.androidDevice }}'
      createTime: '{{ response.createTime }}'
      displayName: '{{ response.displayName }}'
      expireTime: '{{ response.expireTime }}'
      inactivityTimeout: '{{ response.inactivityTimeout }}'
      name: '{{ response.name }}'
      state: '{{ response.state }}'
      stateHistories: '{{ response.stateHistories }}'
      ttl: '{{ response.ttl }}'
- discovery_id: gcp.testing.projects.testMatrices.get
  calls:
  - action: projects.testMatrices.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      clientInfo: '{{ response.clientInfo }}'
      environmentMatrix: '{{ response.environmentMatrix }}'
      extendedInvalidMatrixDetails: '{{ response.extendedInvalidMatrixDetails }}'
      failFast: '{{ response.failFast }}'
      flakyTestAttempts: '{{ response.flakyTestAttempts }}'
      invalidMatrixDetails: '{{ response.invalidMatrixDetails }}'
      outcomeSummary: '{{ response.outcomeSummary }}'
      projectId: '{{ response.projectId }}'
      resultStorage: '{{ response.resultStorage }}'
      state: '{{ response.state }}'
      testExecutions: '{{ response.testExecutions }}'
      testMatrixId: '{{ response.testMatrixId }}'
      testSpecification: '{{ response.testSpecification }}'
      timestamp: '{{ response.timestamp }}'
- discovery_id: gcp.testing.testEnvironmentCatalog.get
  calls:
  - action: testEnvironmentCatalog.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      androidDeviceCatalog: '{{ response.androidDeviceCatalog }}'
      deviceIpBlockCatalog: '{{ response.deviceIpBlockCatalog }}'
      iosDeviceCatalog: '{{ response.iosDeviceCatalog }}'
      networkConfigurationCatalog: '{{ response.networkConfigurationCatalog }}'
      softwareCatalog: '{{ response.softwareCatalog }}'
