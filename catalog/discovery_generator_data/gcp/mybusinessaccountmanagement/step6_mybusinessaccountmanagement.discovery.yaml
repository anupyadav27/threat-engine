version: '1.0'
provider: gcp
service: mybusinessaccountmanagement
services:
  client: mybusinessaccountmanagement
  module: googleapiclient.discovery.build('mybusinessaccountmanagement', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.mybusinessaccountmanagement.accounts.admins.list
  calls:
  - action: accounts.admins.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.admins }}'
    item:
      account: '{{ item.account }}'
      admin: '{{ item.admin }}'
      name: '{{ item.name }}'
      pendingInvitation: '{{ item.pendingInvitation }}'
      role: '{{ item.role }}'
  uid_template: '{item.name}'
- discovery_id: gcp.mybusinessaccountmanagement.accounts.get
  calls:
  - action: accounts.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      accountName: '{{ response.accountName }}'
      accountNumber: '{{ response.accountNumber }}'
      name: '{{ response.name }}'
      organizationInfo: '{{ response.organizationInfo }}'
      permissionLevel: '{{ response.permissionLevel }}'
      primaryOwner: '{{ response.primaryOwner }}'
      role: '{{ response.role }}'
      type: '{{ response.type }}'
      verificationState: '{{ response.verificationState }}'
      vettedState: '{{ response.vettedState }}'
  uid_template: '{item.name}'
- discovery_id: gcp.mybusinessaccountmanagement.accounts.invitations.list
  calls:
  - action: accounts.invitations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.invitations }}'
    item:
      name: '{{ item.name }}'
      role: '{{ item.role }}'
      targetAccount: '{{ item.targetAccount }}'
      targetLocation: '{{ item.targetLocation }}'
      targetType: '{{ item.targetType }}'
  uid_template: '{item.name}'
- discovery_id: gcp.mybusinessaccountmanagement.accounts.list
  calls:
  - action: accounts.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.accounts }}'
    item:
      accountName: '{{ item.accountName }}'
      accountNumber: '{{ item.accountNumber }}'
      name: '{{ item.name }}'
      organizationInfo: '{{ item.organizationInfo }}'
      permissionLevel: '{{ item.permissionLevel }}'
      primaryOwner: '{{ item.primaryOwner }}'
      role: '{{ item.role }}'
      type: '{{ item.type }}'
      verificationState: '{{ item.verificationState }}'
      vettedState: '{{ item.vettedState }}'
  uid_template: '{item.name}'
- discovery_id: gcp.mybusinessaccountmanagement.locations.admins.list
  calls:
  - action: locations.admins.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.admins }}'
    item:
      account: '{{ item.account }}'
      admin: '{{ item.admin }}'
      name: '{{ item.name }}'
      pendingInvitation: '{{ item.pendingInvitation }}'
      role: '{{ item.role }}'
  uid_template: '{item.name}'
