version: '1.0'
provider: gcp
service: redis
services:
  client: redis
  module: googleapiclient.discovery.build('redis', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.redis.projects.locations.backupCollections.backups.list
  calls:
  - action: projects.locations.backupCollections.backups.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.backups }}'
    item:
      backupFiles: '{{ item.backupFiles }}'
      backupType: '{{ item.backupType }}'
      cluster: '{{ item.cluster }}'
      clusterUid: '{{ item.clusterUid }}'
      createTime: '{{ item.createTime }}'
      encryptionInfo: '{{ item.encryptionInfo }}'
      engineVersion: '{{ item.engineVersion }}'
      expireTime: '{{ item.expireTime }}'
      name: '{{ item.name }}'
      nodeType: '{{ item.nodeType }}'
      replicaCount: '{{ item.replicaCount }}'
      shardCount: '{{ item.shardCount }}'
      state: '{{ item.state }}'
      totalSizeBytes: '{{ item.totalSizeBytes }}'
      uid: '{{ item.uid }}'
  uid_template: '{item.name}'
