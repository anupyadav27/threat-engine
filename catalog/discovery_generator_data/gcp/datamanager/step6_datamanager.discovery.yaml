version: '1.0'
provider: gcp
service: datamanager
services:
  client: datamanager
  module: googleapiclient.discovery.build('datamanager', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.datamanager.accountTypes.accounts.partnerLinks.search
  calls:
  - action: accountTypes.accounts.partnerLinks.search
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.partnerLinks }}'
    item:
      name: '{{ item.name }}'
      owningAccount: '{{ item.owningAccount }}'
      partnerAccount: '{{ item.partnerAccount }}'
      partnerLinkId: '{{ item.partnerLinkId }}'
  uid_template: '{item.name}'
- discovery_id: gcp.datamanager.accountTypes.accounts.userListDirectLicenses.list
  calls:
  - action: accountTypes.accounts.userListDirectLicenses.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.userListDirectLicenses }}'
    item:
      clientAccountDisplayName: '{{ item.clientAccountDisplayName }}'
      clientAccountId: '{{ item.clientAccountId }}'
      clientAccountType: '{{ item.clientAccountType }}'
      historicalPricings: '{{ item.historicalPricings }}'
      metrics: '{{ item.metrics }}'
      name: '{{ item.name }}'
      pricing: '{{ item.pricing }}'
      status: '{{ item.status }}'
      userListDisplayName: '{{ item.userListDisplayName }}'
      userListId: '{{ item.userListId }}'
  uid_template: '{item.name}'
- discovery_id: gcp.datamanager.accountTypes.accounts.userListGlobalLicenses.list
  calls:
  - action: accountTypes.accounts.userListGlobalLicenses.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.userListGlobalLicenses }}'
    item:
      historicalPricings: '{{ item.historicalPricings }}'
      licenseType: '{{ item.licenseType }}'
      metrics: '{{ item.metrics }}'
      name: '{{ item.name }}'
      pricing: '{{ item.pricing }}'
      status: '{{ item.status }}'
      userListDisplayName: '{{ item.userListDisplayName }}'
      userListId: '{{ item.userListId }}'
  uid_template: '{item.name}'
- discovery_id: gcp.datamanager.accountTypes.accounts.userListGlobalLicenses.userListGlobalLicenseCustomerInfos.list
  calls:
  - action: accountTypes.accounts.userListGlobalLicenses.userListGlobalLicenseCustomerInfos.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.userListGlobalLicenseCustomerInfos }}'
    item:
      clientAccountDisplayName: '{{ item.clientAccountDisplayName }}'
      clientAccountId: '{{ item.clientAccountId }}'
      clientAccountType: '{{ item.clientAccountType }}'
      historicalPricings: '{{ item.historicalPricings }}'
      licenseType: '{{ item.licenseType }}'
      metrics: '{{ item.metrics }}'
      name: '{{ item.name }}'
      pricing: '{{ item.pricing }}'
      status: '{{ item.status }}'
      userListDisplayName: '{{ item.userListDisplayName }}'
      userListId: '{{ item.userListId }}'
  uid_template: '{item.name}'
- discovery_id: gcp.datamanager.accountTypes.accounts.userLists.list
  calls:
  - action: accountTypes.accounts.userLists.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.userLists }}'
    item:
      accessReason: '{{ item.accessReason }}'
      accountAccessStatus: '{{ item.accountAccessStatus }}'
      closingReason: '{{ item.closingReason }}'
      description: '{{ item.description }}'
      displayName: '{{ item.displayName }}'
      id: '{{ item.id }}'
      ingestedUserListInfo: '{{ item.ingestedUserListInfo }}'
      integrationCode: '{{ item.integrationCode }}'
      membershipDuration: '{{ item.membershipDuration }}'
      membershipStatus: '{{ item.membershipStatus }}'
      name: '{{ item.name }}'
      readOnly: '{{ item.readOnly }}'
      sizeInfo: '{{ item.sizeInfo }}'
      targetNetworkInfo: '{{ item.targetNetworkInfo }}'
  uid_template: '{item.name}'
- discovery_id: gcp.datamanager.requestStatus.retrieve
  calls:
  - action: requestStatus.retrieve
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      requestStatusPerDestination: '{{ response.requestStatusPerDestination }}'
- discovery_id: gcp.datamanager.accountTypes.accounts.userListDirectLicenses.get
  for_each: gcp.datamanager.accountTypes.accounts.userListDirectLicenses.list
  calls:
  - action: accountTypes.accounts.userListDirectLicenses.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      clientAccountDisplayName: '{{ response.clientAccountDisplayName }}'
      clientAccountId: '{{ response.clientAccountId }}'
      clientAccountType: '{{ response.clientAccountType }}'
      historicalPricings: '{{ response.historicalPricings }}'
      metrics: '{{ response.metrics }}'
      name: '{{ response.name }}'
      pricing: '{{ response.pricing }}'
      status: '{{ response.status }}'
      userListDisplayName: '{{ response.userListDisplayName }}'
      userListId: '{{ response.userListId }}'
- discovery_id: gcp.datamanager.accountTypes.accounts.userListGlobalLicenses.get
  for_each: gcp.datamanager.accountTypes.accounts.userListGlobalLicenses.list
  calls:
  - action: accountTypes.accounts.userListGlobalLicenses.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      historicalPricings: '{{ response.historicalPricings }}'
      licenseType: '{{ response.licenseType }}'
      metrics: '{{ response.metrics }}'
      name: '{{ response.name }}'
      pricing: '{{ response.pricing }}'
      status: '{{ response.status }}'
      userListDisplayName: '{{ response.userListDisplayName }}'
      userListId: '{{ response.userListId }}'
- discovery_id: gcp.datamanager.accountTypes.accounts.userLists.get
  for_each: gcp.datamanager.accountTypes.accounts.userLists.list
  calls:
  - action: accountTypes.accounts.userLists.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      accessReason: '{{ response.accessReason }}'
      accountAccessStatus: '{{ response.accountAccessStatus }}'
      closingReason: '{{ response.closingReason }}'
      description: '{{ response.description }}'
      displayName: '{{ response.displayName }}'
      id: '{{ response.id }}'
      ingestedUserListInfo: '{{ response.ingestedUserListInfo }}'
      integrationCode: '{{ response.integrationCode }}'
      membershipDuration: '{{ response.membershipDuration }}'
      membershipStatus: '{{ response.membershipStatus }}'
      name: '{{ response.name }}'
      readOnly: '{{ response.readOnly }}'
      sizeInfo: '{{ response.sizeInfo }}'
      targetNetworkInfo: '{{ response.targetNetworkInfo }}'
