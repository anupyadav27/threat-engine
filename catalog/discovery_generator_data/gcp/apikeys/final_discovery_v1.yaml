version: '1.0'
provider: gcp
service: apikeys

services:
  client: apikeys
  module: "googleapiclient.discovery.build('apikeys', 'v1')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: unknown
    identifier_op: gcp.apikeys.projects.locations.keys.list
    identifier_field: keys[].name
    item_var_path: item.keys[].name

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.apikeys.projects.locations.keys.list ──
  - discovery_id: gcp.apikeys.projects.locations.keys.list
    calls:
      - action: projects.locations.keys.list
        params:
          parent: '{{ project_id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        annotations: '{{ item.annotations }}'
        createTime: '{{ item.createTime }}'
        deleteTime: '{{ item.deleteTime }}'
        displayName: '{{ item.displayName }}'
        expireTime: '{{ item.expireTime }}'
        keyString: '{{ item.keyString }}'
        name: '{{ item.name }}'
        restrictions: '{{ item.restrictions }}'
        serviceAccountEmail: '{{ item.serviceAccountEmail }}'
        uid: '{{ item.uid }}'
        updateTime: '{{ item.updateTime }}'

