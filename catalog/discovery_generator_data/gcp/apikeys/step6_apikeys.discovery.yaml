version: '1.0'
provider: gcp
service: apikeys
services:
  client: apikeys
  module: googleapiclient.discovery.build('apikeys', 'v2')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.apikeys.keys.lookupKey
  calls:
  - action: keys.lookupKey
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      name: '{{ response.name }}'
      parent: '{{ response.parent }}'
  uid_template: '{item.name}'
- discovery_id: gcp.apikeys.projects.locations.keys.list
  calls:
  - action: projects.locations.keys.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.keys }}'
    item:
      annotations: '{{ item.annotations }}'
      createTime: '{{ item.createTime }}'
      deleteTime: '{{ item.deleteTime }}'
      displayName: '{{ item.displayName }}'
      keyString: '{{ item.keyString }}'
      name: '{{ item.name }}'
      restrictions: '{{ item.restrictions }}'
      serviceAccountEmail: '{{ item.serviceAccountEmail }}'
      uid: '{{ item.uid }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.apikeys.operations.get
  calls:
  - action: operations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.apikeys.projects.locations.keys.get
  for_each: gcp.apikeys.projects.locations.keys.list
  calls:
  - action: projects.locations.keys.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      annotations: '{{ response.annotations }}'
      createTime: '{{ response.createTime }}'
      deleteTime: '{{ response.deleteTime }}'
      displayName: '{{ response.displayName }}'
      keyString: '{{ response.keyString }}'
      name: '{{ response.name }}'
      restrictions: '{{ response.restrictions }}'
      serviceAccountEmail: '{{ response.serviceAccountEmail }}'
      uid: '{{ response.uid }}'
      updateTime: '{{ response.updateTime }}'
- discovery_id: gcp.apikeys.projects.locations.keys.getKeyString
  for_each: gcp.apikeys.projects.locations.keys.list
  calls:
  - action: projects.locations.keys.getKeyString
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      keyString: '{{ response.keyString }}'
