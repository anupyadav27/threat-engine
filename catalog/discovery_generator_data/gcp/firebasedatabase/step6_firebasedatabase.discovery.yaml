version: '1.0'
provider: gcp
service: firebasedatabase
services:
  client: firebasedatabase
  module: googleapiclient.discovery.build('firebasedatabase', 'v1beta')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.firebasedatabase.projects.locations.instances.list
  calls:
  - action: projects.locations.instances.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.instances }}'
    item:
      databaseUrl: '{{ item.databaseUrl }}'
      name: '{{ item.name }}'
      project: '{{ item.project }}'
      state: '{{ item.state }}'
      type: '{{ item.type }}'
  uid_template: '{item.name}'
- discovery_id: gcp.firebasedatabase.projects.locations.instances.get
  for_each: gcp.firebasedatabase.projects.locations.instances.list
  calls:
  - action: projects.locations.instances.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      databaseUrl: '{{ response.databaseUrl }}'
      name: '{{ response.name }}'
      project: '{{ response.project }}'
      state: '{{ response.state }}'
      type: '{{ response.type }}'
