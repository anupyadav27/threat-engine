version: '1.0'
provider: gcp
service: vault
services:
  client: vault
  module: googleapiclient.discovery.build('vault', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.vault.matters.list
  calls:
  - action: matters.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.matters }}'
    item:
      description: '{{ item.description }}'
      matterId: '{{ item.matterId }}'
      matterPermissions: '{{ item.matterPermissions }}'
      matterRegion: '{{ item.matterRegion }}'
      name: '{{ item.name }}'
      state: '{{ item.state }}'
  uid_template: '{item.name}'
- discovery_id: gcp.vault.matters.exports.get
  for_each: gcp.vault.matters.exports.list
  calls:
  - action: matters.exports.get
    params:
      exportId: '{{ item.name }}'
      matterId: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      cloudStorageSink: '{{ response.cloudStorageSink }}'
      createTime: '{{ response.createTime }}'
      exportOptions: '{{ response.exportOptions }}'
      id: '{{ response.id }}'
      matterId: '{{ response.matterId }}'
      name: '{{ response.name }}'
      parentExportId: '{{ response.parentExportId }}'
      query: '{{ response.query }}'
      requester: '{{ response.requester }}'
      stats: '{{ response.stats }}'
      status: '{{ response.status }}'
- discovery_id: gcp.vault.matters.exports.list
  for_each: gcp.vault.matters.list
  calls:
  - action: matters.exports.list
    params:
      matterId: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.exports }}'
    item:
      cloudStorageSink: '{{ item.cloudStorageSink }}'
      createTime: '{{ item.createTime }}'
      exportOptions: '{{ item.exportOptions }}'
      id: '{{ item.id }}'
      matterId: '{{ item.matterId }}'
      name: '{{ item.name }}'
      parentExportId: '{{ item.parentExportId }}'
      query: '{{ item.query }}'
      requester: '{{ item.requester }}'
      stats: '{{ item.stats }}'
      status: '{{ item.status }}'
- discovery_id: gcp.vault.matters.get
  for_each: gcp.vault.matters.list
  calls:
  - action: matters.get
    params:
      matterId: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      description: '{{ response.description }}'
      matterId: '{{ response.matterId }}'
      matterPermissions: '{{ response.matterPermissions }}'
      matterRegion: '{{ response.matterRegion }}'
      name: '{{ response.name }}'
      state: '{{ response.state }}'
- discovery_id: gcp.vault.matters.holds.accounts.list
  for_each: gcp.vault.matters.holds.list
  calls:
  - action: matters.holds.accounts.list
    params:
      holdId: '{{ item.name }}'
      matterId: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.accounts }}'
    item:
      accountId: '{{ item.accountId }}'
      email: '{{ item.email }}'
      firstName: '{{ item.firstName }}'
      holdTime: '{{ item.holdTime }}'
      lastName: '{{ item.lastName }}'
- discovery_id: gcp.vault.matters.holds.get
  for_each: gcp.vault.matters.holds.list
  calls:
  - action: matters.holds.get
    params:
      holdId: '{{ item.name }}'
      matterId: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      accounts: '{{ response.accounts }}'
      corpus: '{{ response.corpus }}'
      holdId: '{{ response.holdId }}'
      name: '{{ response.name }}'
      orgUnit: '{{ response.orgUnit }}'
      query: '{{ response.query }}'
      updateTime: '{{ response.updateTime }}'
- discovery_id: gcp.vault.matters.holds.list
  for_each: gcp.vault.matters.list
  calls:
  - action: matters.holds.list
    params:
      matterId: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.holds }}'
    item:
      accounts: '{{ item.accounts }}'
      corpus: '{{ item.corpus }}'
      holdId: '{{ item.holdId }}'
      name: '{{ item.name }}'
      orgUnit: '{{ item.orgUnit }}'
      query: '{{ item.query }}'
      updateTime: '{{ item.updateTime }}'
- discovery_id: gcp.vault.matters.savedQueries.get
  for_each: gcp.vault.matters.savedQueries.list
  calls:
  - action: matters.savedQueries.get
    params:
      matterId: '{{ item.name }}'
      savedQueryId: '{{ item.query }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      createTime: '{{ response.createTime }}'
      displayName: '{{ response.displayName }}'
      matterId: '{{ response.matterId }}'
      query: '{{ response.query }}'
      savedQueryId: '{{ response.savedQueryId }}'
- discovery_id: gcp.vault.matters.savedQueries.list
  for_each: gcp.vault.matters.list
  calls:
  - action: matters.savedQueries.list
    params:
      matterId: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.savedQueries }}'
    item:
      createTime: '{{ item.createTime }}'
      displayName: '{{ item.displayName }}'
      matterId: '{{ item.matterId }}'
      query: '{{ item.query }}'
      savedQueryId: '{{ item.savedQueryId }}'
- discovery_id: gcp.vault.operations.get
  for_each: gcp.vault.operations.list
  calls:
  - action: operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
- discovery_id: gcp.vault.operations.list
  calls:
  - action: operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
