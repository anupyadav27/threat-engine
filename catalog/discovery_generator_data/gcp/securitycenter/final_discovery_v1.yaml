version: '1.0'
provider: gcp
service: security_command_center

services:
  client: securitycenter
  module: "googleapiclient.discovery.build('securitycenter', 'v1')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: unknown
    identifier_op: gcp.securitycenter.organizations.assets.list
    identifier_field: listAssetsResults[].stateChange
    item_var_path: item.listAssetsResults[].stateChange
  - resource_type: unknown
    identifier_op: gcp.securitycenter.organizations.notificationConfigs.list
    identifier_field: notificationConfigs[].name
    item_var_path: item.notificationConfigs[].name
  - resource_type: unknown
    identifier_op: gcp.securitycenter.organizations.securityHealthAnalyticsSettings.customModules.list
    identifier_field: securityHealthAnalyticsCustomModules[].name
    item_var_path: item.securityHealthAnalyticsCustomModules[].name
  - resource_type: unknown
    identifier_op: gcp.securitycenter.organizations.sources.findings.list
    identifier_field: listFindingsResults[].resource
    item_var_path: item.listFindingsResults[].resource
  - resource_type: unknown
    identifier_op: gcp.securitycenter.organizations.sources.list
    identifier_field: sources[].name
    item_var_path: item.sources[].name

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.securitycenter.organizations.assets.list ──
  - discovery_id: gcp.securitycenter.organizations.assets.list
    calls:
      - action: organizations.assets.list
        params:
          parent: '{{ project_id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        asset: '{{ item.asset }}'
        readTime: '{{ item.readTime }}'
        securityMarks: '{{ item.securityMarks }}'
        stateChange: '{{ item.stateChange }}'
        totalSize: '{{ item.totalSize }}'

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.securitycenter.organizations.notificationConfigs.list ──
  - discovery_id: gcp.securitycenter.organizations.notificationConfigs.list
    calls:
      - action: organizations.notificationConfigs.list
        params:
          parent: '{{ project_id }}'
        save_as: response
        on_error: continue
    emit:
