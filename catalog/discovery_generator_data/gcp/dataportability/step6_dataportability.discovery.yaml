version: '1.0'
provider: gcp
service: dataportability
services:
  client: dataportability
  module: googleapiclient.discovery.build('dataportability', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.dataportability.archiveJobs.getPortabilityArchiveState
  calls:
  - action: archiveJobs.getPortabilityArchiveState
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      exportTime: '{{ response.exportTime }}'
      name: '{{ response.name }}'
      startTime: '{{ response.startTime }}'
      state: '{{ response.state }}'
      urls: '{{ response.urls }}'
  uid_template: '{item.name}'
