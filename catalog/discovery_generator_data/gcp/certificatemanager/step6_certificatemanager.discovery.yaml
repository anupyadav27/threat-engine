      labels: '{{ response.labels }}'
      lifetime: '{{ response.lifetime }}'
      name: '{{ response.name }}'
      rotationWindowPercentage: '{{ response.rotationWindowPercentage }}'
      updateTime: '{{ response.updateTime }}'
