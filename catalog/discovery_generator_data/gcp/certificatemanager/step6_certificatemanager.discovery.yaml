version: '1.0'
provider: gcp
service: certificatemanager
services:
  client: certificatemanager
  module: googleapiclient.discovery.build('certificatemanager', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.certificatemanager.projects.locations.certificateIssuanceConfigs.list
  calls:
  - action: projects.locations.certificateIssuanceConfigs.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.certificateIssuanceConfigs }}'
    item:
      certificateAuthorityConfig: '{{ item.certificateAuthorityConfig }}'
      createTime: '{{ item.createTime }}'
      description: '{{ item.description }}'
      keyAlgorithm: '{{ item.keyAlgorithm }}'
      labels: '{{ item.labels }}'
      lifetime: '{{ item.lifetime }}'
      name: '{{ item.name }}'
      rotationWindowPercentage: '{{ item.rotationWindowPercentage }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.certificatemanager.projects.locations.certificateMaps.certificateMapEntries.list
  calls:
  - action: projects.locations.certificateMaps.certificateMapEntries.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.certificateMapEntries }}'
    item:
      certificates: '{{ item.certificates }}'
      createTime: '{{ item.createTime }}'
      description: '{{ item.description }}'
      hostname: '{{ item.hostname }}'
      labels: '{{ item.labels }}'
      matcher: '{{ item.matcher }}'
      name: '{{ item.name }}'
      state: '{{ item.state }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.certificatemanager.projects.locations.certificateMaps.list
  calls:
  - action: projects.locations.certificateMaps.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.certificateMaps }}'
    item:
      createTime: '{{ item.createTime }}'
      description: '{{ item.description }}'
      gclbTargets: '{{ item.gclbTargets }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.certificatemanager.projects.locations.certificates.list
  calls:
  - action: projects.locations.certificates.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.certificates }}'
    item:
      createTime: '{{ item.createTime }}'
      description: '{{ item.description }}'
      expireTime: '{{ item.expireTime }}'
      labels: '{{ item.labels }}'
      managed: '{{ item.managed }}'
      managedIdentity: '{{ item.managedIdentity }}'
      name: '{{ item.name }}'
      pemCertificate: '{{ item.pemCertificate }}'
      sanDnsnames: '{{ item.sanDnsnames }}'
      scope: '{{ item.scope }}'
      selfManaged: '{{ item.selfManaged }}'
      updateTime: '{{ item.updateTime }}'
      usedBy: '{{ item.usedBy }}'
  uid_template: '{item.name}'
- discovery_id: gcp.certificatemanager.projects.locations.dnsAuthorizations.list
  calls:
  - action: projects.locations.dnsAuthorizations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.dnsAuthorizations }}'
    item:
      createTime: '{{ item.createTime }}'
      description: '{{ item.description }}'
      dnsResourceRecord: '{{ item.dnsResourceRecord }}'
      domain: '{{ item.domain }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.certificatemanager.projects.locations.get
  calls:
  - action: projects.locations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      displayName: '{{ response.displayName }}'
      labels: '{{ response.labels }}'
      locationId: '{{ response.locationId }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.certificatemanager.projects.locations.list
  calls:
  - action: projects.locations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.locations }}'
    item:
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      locationId: '{{ item.locationId }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.certificatemanager.projects.locations.operations.list
