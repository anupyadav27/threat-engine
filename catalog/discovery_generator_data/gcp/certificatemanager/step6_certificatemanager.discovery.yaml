      name: '{{ item.name }}'
      spiffeTrustStores: '{{ item.spiffeTrustStores }}'
      trustStores: '{{ item.trustStores }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.certificatemanager.projects.locations.certificateIssuanceConfigs.get
  for_each: gcp.certificatemanager.projects.locations.certificateIssuanceConfigs.list
  calls:
