version: '1.0'
provider: gcp
service: monitoring

services:
  client: monitoring
  module: "googleapiclient.discovery.build('monitoring', 'v1')"

# Anchors: service-level parameters provided by caller
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: unknown
    identifier_op: gcp.monitoring.projects.alertPolicies.list
    identifier_field: alertPolicies[].name
    item_var_path: item.alertPolicies[].name
  - resource_type: unknown
    identifier_op: gcp.monitoring.projects.notificationChannels.list
    identifier_field: notificationChannels[].name
    item_var_path: item.notificationChannels[].name
  - resource_type: unknown
    identifier_op: gcp.monitoring.projects.uptimeCheckConfigs.list
    identifier_field: uptimeCheckConfigs[].name
    item_var_path: item.uptimeCheckConfigs[].name

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.monitoring.projects.alertPolicies.list ──
  # python: svc.projects().alertPolicies().list(**params).execute()
  - discovery_id: gcp.monitoring.projects.alertPolicies.list
    calls:
      - action: projects.alertPolicies.list
        params:
          name: '{{ name }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.alertPolicies }}'
      item:
        alertStrategy: '{{ item.alertStrategy }}'
        combiner: '{{ item.combiner }}'
        conditions: '{{ item.conditions }}'
        creationRecord: '{{ item.creationRecord }}'
        displayName: '{{ item.displayName }}'
        documentation: '{{ item.documentation }}'
        enabled: '{{ item.enabled }}'
        mutationRecord: '{{ item.mutationRecord }}'
        name: '{{ item.name }}'
        notificationChannels: '{{ item.notificationChannels }}'
        severity: '{{ item.severity }}'
        totalSize: '{{ item.totalSize }}'
        userLabels: '{{ item.userLabels }}'
        validity: '{{ item.validity }}'

  # ── gcp.monitoring.projects.notificationChannels.list ──
  # python: svc.projects().notificationChannels().list(**params).execute()
  - discovery_id: gcp.monitoring.projects.notificationChannels.list
    calls:
      - action: projects.notificationChannels.list
        params:
          name: '{{ name }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.notificationChannels }}'
      item:
        creationRecord: '{{ item.creationRecord }}'
        description: '{{ item.description }}'
        displayName: '{{ item.displayName }}'
        enabled: '{{ item.enabled }}'
        labels: '{{ item.labels }}'
        mutationRecords: '{{ item.mutationRecords }}'
        name: '{{ item.name }}'
        totalSize: '{{ item.totalSize }}'
        type: '{{ item.type }}'
        userLabels: '{{ item.userLabels }}'
        verificationStatus: '{{ item.verificationStatus }}'

  # ── gcp.monitoring.projects.uptimeCheckConfigs.list ──
  # python: svc.projects().uptimeCheckConfigs().list(**params).execute()
  - discovery_id: gcp.monitoring.projects.uptimeCheckConfigs.list
    calls:
      - action: projects.uptimeCheckConfigs.list
        params:
          parent: '{{ project_id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.uptimeCheckConfigs }}'
      item:
        checkerType: '{{ item.checkerType }}'
        contentMatchers: '{{ item.contentMatchers }}'
        disabled: '{{ item.disabled }}'
        displayName: '{{ item.displayName }}'
        httpCheck: '{{ item.httpCheck }}'
        internalCheckers: '{{ item.internalCheckers }}'
        isInternal: '{{ item.isInternal }}'
        logCheckFailures: '{{ item.logCheckFailures }}'
        monitoredResource: '{{ item.monitoredResource }}'
        name: '{{ item.name }}'
        period: '{{ item.period }}'
        resourceGroup: '{{ item.resourceGroup }}'
        selectedRegions: '{{ item.selectedRegions }}'
        syntheticMonitor: '{{ item.syntheticMonitor }}'
        tcpCheck: '{{ item.tcpCheck }}'
        timeout: '{{ item.timeout }}'
        totalSize: '{{ item.totalSize }}'
        userLabels: '{{ item.userLabels }}'

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.monitoring.projects.dashboards.list ──
  - discovery_id: gcp.monitoring.projects.dashboards.list
    calls:
      - action: projects.dashboards.list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        columnLayout: '{{ item.columnLayout }}'
        dashboardFilters: '{{ item.dashboardFilters }}'
        displayName: '{{ item.displayName }}'
        etag: '{{ item.etag }}'
        labels: '{{ item.labels }}'
        mosaicLayout: '{{ item.mosaicLayout }}'
        name: '{{ item.name }}'
        rowLayout: '{{ item.rowLayout }}'
        userLabels: '{{ item.userLabels }}'

