version: '1.0'
provider: gcp
service: monitoring
services:
  client: monitoring
  module: googleapiclient.discovery.build('monitoring', 'v3')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.monitoring.folders.timeSeries.list
  calls:
  - action: folders.timeSeries.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.timeSeries }}'
    item:
      description: '{{ item.description }}'
      metadata: '{{ item.metadata }}'
      metric: '{{ item.metric }}'
      metricKind: '{{ item.metricKind }}'
      points: '{{ item.points }}'
      resource: '{{ item.resource }}'
      valueType: '{{ item.valueType }}'
- discovery_id: gcp.monitoring.organizations.timeSeries.list
  calls:
  - action: organizations.timeSeries.list
    params: {}
    save_as: response
    on_error: continue
  emit:
