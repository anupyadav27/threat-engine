    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.alertPolicies }}'
    item:
      alertStrategy: '{{ item.alertStrategy }}'
      combiner: '{{ item.combiner }}'
      conditions: '{{ item.conditions }}'
      creationRecord: '{{ item.creationRecord }}'
      displayName: '{{ item.displayName }}'
      documentation: '{{ item.documentation }}'
      enabled: '{{ item.enabled }}'
      mutationRecord: '{{ item.mutationRecord }}'
      name: '{{ item.name }}'
      notificationChannels: '{{ item.notificationChannels }}'
      severity: '{{ item.severity }}'
      userLabels: '{{ item.userLabels }}'
      validity: '{{ item.validity }}'
  uid_template: '{item.name}'
