    item:
      description: '{{ item.description }}'
      metadata: '{{ item.metadata }}'
      metric: '{{ item.metric }}'
      metricKind: '{{ item.metricKind }}'
      points: '{{ item.points }}'
      resource: '{{ item.resource }}'
      valueType: '{{ item.valueType }}'
- discovery_id: gcp.monitoring.projects.alertPolicies.list
