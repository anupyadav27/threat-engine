version: '1.0'
provider: gcp
service: composer
services:
  client: composer
  module: googleapiclient.discovery.build('composer', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.composer.projects.locations.environments.list
  calls:
  - action: projects.locations.environments.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.environments }}'
    item:
      config: '{{ item.config }}'
      createTime: '{{ item.createTime }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      satisfiesPzi: '{{ item.satisfiesPzi }}'
      satisfiesPzs: '{{ item.satisfiesPzs }}'
      state: '{{ item.state }}'
      storageConfig: '{{ item.storageConfig }}'
      updateTime: '{{ item.updateTime }}'
      uuid: '{{ item.uuid }}'
  uid_template: '{item.name}'
- discovery_id: gcp.composer.projects.locations.environments.userWorkloadsConfigMaps.list
  calls:
  - action: projects.locations.environments.userWorkloadsConfigMaps.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.userWorkloadsConfigMaps }}'
    item:
      data: '{{ item.data }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.composer.projects.locations.environments.userWorkloadsSecrets.list
  calls:
  - action: projects.locations.environments.userWorkloadsSecrets.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.userWorkloadsSecrets }}'
    item:
      data: '{{ item.data }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.composer.projects.locations.environments.workloads.list
  calls:
  - action: projects.locations.environments.workloads.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.workloads }}'
    item:
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      type: '{{ item.type }}'
  uid_template: '{item.name}'
- discovery_id: gcp.composer.projects.locations.imageVersions.list
  calls:
  - action: projects.locations.imageVersions.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.imageVersions }}'
    item:
      creationDisabled: '{{ item.creationDisabled }}'
      imageVersionId: '{{ item.imageVersionId }}'
      isDefault: '{{ item.isDefault }}'
      releaseDate: '{{ item.releaseDate }}'
      supportedPythonVersions: '{{ item.supportedPythonVersions }}'
      upgradeDisabled: '{{ item.upgradeDisabled }}'
- discovery_id: gcp.composer.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.composer.projects.locations.environments.fetchDatabaseProperties
  for_each: gcp.composer.projects.locations.environments.list
  calls:
  - action: projects.locations.environments.fetchDatabaseProperties
    params:
      environment: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      isFailoverReplicaAvailable: '{{ response.isFailoverReplicaAvailable }}'
      primaryGceZone: '{{ response.primaryGceZone }}'
      secondaryGceZone: '{{ response.secondaryGceZone }}'
- discovery_id: gcp.composer.projects.locations.environments.get
  for_each: gcp.composer.projects.locations.environments.list
  calls:
  - action: projects.locations.environments.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      config: '{{ response.config }}'
      createTime: '{{ response.createTime }}'
      labels: '{{ response.labels }}'
      name: '{{ response.name }}'
      satisfiesPzi: '{{ response.satisfiesPzi }}'
      satisfiesPzs: '{{ response.satisfiesPzs }}'
      state: '{{ response.state }}'
      storageConfig: '{{ response.storageConfig }}'
      updateTime: '{{ response.updateTime }}'
      uuid: '{{ response.uuid }}'
- discovery_id: gcp.composer.projects.locations.environments.userWorkloadsConfigMaps.get
  for_each: gcp.composer.projects.locations.environments.userWorkloadsConfigMaps.list
  calls:
  - action: projects.locations.environments.userWorkloadsConfigMaps.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      data: '{{ response.data }}'
      name: '{{ response.name }}'
- discovery_id: gcp.composer.projects.locations.environments.userWorkloadsSecrets.get
  for_each: gcp.composer.projects.locations.environments.userWorkloadsSecrets.list
  calls:
  - action: projects.locations.environments.userWorkloadsSecrets.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      data: '{{ response.data }}'
      name: '{{ response.name }}'
- discovery_id: gcp.composer.projects.locations.operations.get
  for_each: gcp.composer.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
