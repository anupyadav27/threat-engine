version: '1.0'
provider: gcp
service: endpoints
discovery:
- discovery_id: gcp.endpoints.list_services
  calls:
  - action: services.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      serviceName: '{{ item.serviceName }}'
      producerProjectId: '{{ item.producerProjectId }}'
      usage: '{{ item.usage }}'
      endpoints: '{{ item.endpoints }}'
      documentation: '{{ item.documentation }}'
      quota: '{{ item.quota }}'
      sourceInfo: '{{ item.sourceInfo }}'
- discovery_id: gcp.endpoints.services.list
  calls:
  - action: services.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      serviceName: '{{ item.serviceName }}'
      producerProjectId: '{{ item.producerProjectId }}'
      usage: '{{ item.usage }}'
      endpoints: '{{ item.endpoints }}'
      documentation: '{{ item.documentation }}'
      quota: '{{ item.quota }}'
      sourceInfo: '{{ item.sourceInfo }}'
- discovery_id: list_services
  calls:
  - action: list_services
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      name: '{{ item.name }}'
      createTime: '{{ item.createTime }}'
      labels: '{{ item.labels }}'
      state: '{{ item.state }}'
