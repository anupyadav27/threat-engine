version: '1.0'
provider: gcp
service: firestore

services:
  client: firestore
  module: "googleapiclient.discovery.build('firestore', 'v1')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: unknown
    identifier_op: gcp.firestore.projects.databases.documents.list
    identifier_field: documents[].name
    item_var_path: item.documents[].name
  - resource_type: unknown
    identifier_op: gcp.firestore.projects.databases.list
    identifier_field: databases[].name
    item_var_path: item.databases[].name

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.firestore.projects.databases.documents.list ──
  - discovery_id: gcp.firestore.projects.databases.documents.list
    calls:
      - action: projects.databases.documents.list
        params:
          collectionId: '{{ item.collectionId }}'
          parent: '{{ project_id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        bindings: '{{ item.bindings }}'
        createTime: '{{ item.createTime }}'
        fields: '{{ item.fields }}'
        name: '{{ item.name }}'
        parent_collection: '{{ item.parent_collection }}'
        updateTime: '{{ item.updateTime }}'

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.firestore.projects.databases.list ──
  - discovery_id: gcp.firestore.projects.databases.list
    calls:
      - action: projects.databases.list
        params:
          parent: '{{ project_id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        appEngineIntegrationMode: '{{ item.appEngineIntegrationMode }}'
        backupSchedules: '{{ item.backupSchedules }}'
        cmekConfig: '{{ item.cmekConfig }}'
        concurrencyMode: '{{ item.concurrencyMode }}'
        createTime: '{{ item.createTime }}'
        databaseEdition: '{{ item.databaseEdition }}'
        deleteProtectionState: '{{ item.deleteProtectionState }}'
        deleteTime: '{{ item.deleteTime }}'
        earliestVersionTime: '{{ item.earliestVersionTime }}'
        encryptionConfig: '{{ item.encryptionConfig }}'
        firestoreDataAccessMode: '{{ item.firestoreDataAccessMode }}'
        freeTier: '{{ item.freeTier }}'
        keyPrefix: '{{ item.keyPrefix }}'
        locationId: '{{ item.locationId }}'
        mongodbCompatibleDataAccessMode: '{{ item.mongodbCompatibleDataAccessMode }}'
        name: '{{ item.name }}'
        pointInTimeRecoveryEnablement: '{{ item.pointInTimeRecoveryEnablement }}'
        previousId: '{{ item.previousId }}'
        realtimeUpdatesMode: '{{ item.realtimeUpdatesMode }}'
        sourceInfo: '{{ item.sourceInfo }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        uid: '{{ item.uid }}'
        updateTime: '{{ item.updateTime }}'
        versionRetentionPeriod: '{{ item.versionRetentionPeriod }}'

