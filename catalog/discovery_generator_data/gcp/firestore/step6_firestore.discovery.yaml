version: '1.0'
provider: gcp
service: firestore
services:
  client: firestore
  module: googleapiclient.discovery.build('firestore', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.firestore.projects.databases.backupSchedules.list
  calls:
  - action: projects.databases.backupSchedules.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.backupSchedules }}'
    item:
      createTime: '{{ item.createTime }}'
      dailyRecurrence: '{{ item.dailyRecurrence }}'
      name: '{{ item.name }}'
      retention: '{{ item.retention }}'
      updateTime: '{{ item.updateTime }}'
      weeklyRecurrence: '{{ item.weeklyRecurrence }}'
  uid_template: '{item.name}'
- discovery_id: gcp.firestore.projects.databases.collectionGroups.fields.list
  calls:
  - action: projects.databases.collectionGroups.fields.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.fields }}'
    item:
      indexConfig: '{{ item.indexConfig }}'
      name: '{{ item.name }}'
      ttlConfig: '{{ item.ttlConfig }}'
  uid_template: '{item.name}'
- discovery_id: gcp.firestore.projects.databases.collectionGroups.indexes.list
  calls:
  - action: projects.databases.collectionGroups.indexes.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.indexes }}'
    item:
      apiScope: '{{ item.apiScope }}'
      density: '{{ item.density }}'
      fields: '{{ item.fields }}'
      multikey: '{{ item.multikey }}'
      name: '{{ item.name }}'
      queryScope: '{{ item.queryScope }}'
      shardCount: '{{ item.shardCount }}'
      state: '{{ item.state }}'
      unique: '{{ item.unique }}'
  uid_template: '{item.name}'
- discovery_id: gcp.firestore.projects.databases.list
  calls:
  - action: projects.databases.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.databases }}'
    item:
      appEngineIntegrationMode: '{{ item.appEngineIntegrationMode }}'
      cmekConfig: '{{ item.cmekConfig }}'
      concurrencyMode: '{{ item.concurrencyMode }}'
      createTime: '{{ item.createTime }}'
      databaseEdition: '{{ item.databaseEdition }}'
      deleteProtectionState: '{{ item.deleteProtectionState }}'
      deleteTime: '{{ item.deleteTime }}'
      earliestVersionTime: '{{ item.earliestVersionTime }}'
      firestoreDataAccessMode: '{{ item.firestoreDataAccessMode }}'
      freeTier: '{{ item.freeTier }}'
      keyPrefix: '{{ item.keyPrefix }}'
      locationId: '{{ item.locationId }}'
      mongodbCompatibleDataAccessMode: '{{ item.mongodbCompatibleDataAccessMode }}'
      name: '{{ item.name }}'
      pointInTimeRecoveryEnablement: '{{ item.pointInTimeRecoveryEnablement }}'
      previousId: '{{ item.previousId }}'
      realtimeUpdatesMode: '{{ item.realtimeUpdatesMode }}'
      sourceInfo: '{{ item.sourceInfo }}'
      tags: '{{ item.tags }}'
      type: '{{ item.type }}'
      uid: '{{ item.uid }}'
      updateTime: '{{ item.updateTime }}'
      versionRetentionPeriod: '{{ item.versionRetentionPeriod }}'
  uid_template: '{item.name}'
- discovery_id: gcp.firestore.projects.databases.userCreds.list
