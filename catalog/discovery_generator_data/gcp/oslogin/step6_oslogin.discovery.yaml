version: '1.0'
provider: gcp
service: oslogin
services:
  client: oslogin
  module: googleapiclient.discovery.build('oslogin', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.oslogin.users.getLoginProfile
  calls:
  - action: users.getLoginProfile
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      name: '{{ response.name }}'
      posixAccounts: '{{ response.posixAccounts }}'
      sshPublicKeys: '{{ response.sshPublicKeys }}'
  uid_template: '{item.name}'
- discovery_id: gcp.oslogin.users.sshPublicKeys.get
  calls:
  - action: users.sshPublicKeys.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      expirationTimeUsec: '{{ response.expirationTimeUsec }}'
      fingerprint: '{{ response.fingerprint }}'
      key: '{{ response.key }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
