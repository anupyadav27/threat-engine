version: '1.0'
provider: gcp
service: dns
services:
  client: dns
  module: googleapiclient.discovery.build('dns', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.dns.managedZones.list
  calls:
  - action: managedZones.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.managedZones }}'
    item:
      cloudLoggingConfig: '{{ item.cloudLoggingConfig }}'
      creationTime: '{{ item.creationTime }}'
      description: '{{ item.description }}'
      dnsName: '{{ item.dnsName }}'
      dnssecConfig: '{{ item.dnssecConfig }}'
      forwardingConfig: '{{ item.forwardingConfig }}'
      id: '{{ item.id }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      nameServerSet: '{{ item.nameServerSet }}'
      nameServers: '{{ item.nameServers }}'
      peeringConfig: '{{ item.peeringConfig }}'
      privateVisibilityConfig: '{{ item.privateVisibilityConfig }}'
      reverseLookupConfig: '{{ item.reverseLookupConfig }}'
      serviceDirectoryConfig: '{{ item.serviceDirectoryConfig }}'
      visibility: '{{ item.visibility }}'
  uid_template: '{item.name}'
- discovery_id: gcp.dns.policies.list
  calls:
  - action: policies.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.policies }}'
    item:
      alternativeNameServerConfig: '{{ item.alternativeNameServerConfig }}'
      description: '{{ item.description }}'
      dns64Config: '{{ item.dns64Config }}'
      enableInboundForwarding: '{{ item.enableInboundForwarding }}'
      enableLogging: '{{ item.enableLogging }}'
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      networks: '{{ item.networks }}'
  uid_template: '{item.name}'
- discovery_id: gcp.dns.projects.get
  calls:
  - action: projects.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ response.id }}'
      number: '{{ response.number }}'
      quota: '{{ response.quota }}'
  uid_template: '{item.id}'
- discovery_id: gcp.dns.responsePolicies.list
  calls:
  - action: responsePolicies.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.responsePolicies }}'
    item:
      description: '{{ item.description }}'
      gkeClusters: '{{ item.gkeClusters }}'
      id: '{{ item.id }}'
      labels: '{{ item.labels }}'
      networks: '{{ item.networks }}'
      responsePolicyName: '{{ item.responsePolicyName }}'
  uid_template: '{item.id}'
- discovery_id: gcp.dns.changes.get
  for_each: gcp.dns.changes.list
  calls:
  - action: changes.get
    params:
      changeId: '{{ item.id }}'
      managedZone: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      additions: '{{ response.additions }}'
      deletions: '{{ response.deletions }}'
      id: '{{ response.id }}'
      isServing: '{{ response.isServing }}'
      startTime: '{{ response.startTime }}'
      status: '{{ response.status }}'
- discovery_id: gcp.dns.changes.list
  for_each: gcp.dns.managedZones.list
  calls:
  - action: changes.list
    params:
      managedZone: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.changes }}'
    item:
      additions: '{{ item.additions }}'
      deletions: '{{ item.deletions }}'
      id: '{{ item.id }}'
      isServing: '{{ item.isServing }}'
      startTime: '{{ item.startTime }}'
      status: '{{ item.status }}'
- discovery_id: gcp.dns.dnsKeys.get
  for_each: gcp.dns.dnsKeys.list
  calls:
  - action: dnsKeys.get
    params:
      dnsKeyId: '{{ item.id }}'
      managedZone: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      algorithm: '{{ response.algorithm }}'
      creationTime: '{{ response.creationTime }}'
      description: '{{ response.description }}'
      digests: '{{ response.digests }}'
      id: '{{ response.id }}'
      isActive: '{{ response.isActive }}'
      keyLength: '{{ response.keyLength }}'
      keyTag: '{{ response.keyTag }}'
      publicKey: '{{ response.publicKey }}'
      type: '{{ response.type }}'
- discovery_id: gcp.dns.dnsKeys.list
  for_each: gcp.dns.managedZones.list
  calls:
  - action: dnsKeys.list
    params:
      managedZone: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.dnsKeys }}'
    item:
      algorithm: '{{ item.algorithm }}'
      creationTime: '{{ item.creationTime }}'
      description: '{{ item.description }}'
      digests: '{{ item.digests }}'
      id: '{{ item.id }}'
      isActive: '{{ item.isActive }}'
      keyLength: '{{ item.keyLength }}'
      keyTag: '{{ item.keyTag }}'
      publicKey: '{{ item.publicKey }}'
      type: '{{ item.type }}'
- discovery_id: gcp.dns.managedZoneOperations.get
  calls:
  - action: managedZoneOperations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      dnsKeyContext: '{{ response.dnsKeyContext }}'
      id: '{{ response.id }}'
      startTime: '{{ response.startTime }}'
      status: '{{ response.status }}'
      type: '{{ response.type }}'
      user: '{{ response.user }}'
      zoneContext: '{{ response.zoneContext }}'
  uid_template: '{item.id}'
- discovery_id: gcp.dns.managedZoneOperations.list
  for_each: gcp.dns.managedZones.list
  calls:
  - action: managedZoneOperations.list
    params:
      managedZone: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.managedZoneOperations }}'
    item:
      dnsKeyContext: '{{ item.dnsKeyContext }}'
      id: '{{ item.id }}'
      startTime: '{{ item.startTime }}'
      status: '{{ item.status }}'
      type: '{{ item.type }}'
      user: '{{ item.user }}'
      zoneContext: '{{ item.zoneContext }}'
- discovery_id: gcp.dns.managedZones.get
  for_each: gcp.dns.managedZones.list
  calls:
  - action: managedZones.get
    params:
      managedZone: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      cloudLoggingConfig: '{{ response.cloudLoggingConfig }}'
      creationTime: '{{ response.creationTime }}'
      description: '{{ response.description }}'
      dnsName: '{{ response.dnsName }}'
      dnssecConfig: '{{ response.dnssecConfig }}'
      forwardingConfig: '{{ response.forwardingConfig }}'
      id: '{{ response.id }}'
      labels: '{{ response.labels }}'
      name: '{{ response.name }}'
      nameServerSet: '{{ response.nameServerSet }}'
      nameServers: '{{ response.nameServers }}'
      peeringConfig: '{{ response.peeringConfig }}'
      privateVisibilityConfig: '{{ response.privateVisibilityConfig }}'
      reverseLookupConfig: '{{ response.reverseLookupConfig }}'
      serviceDirectoryConfig: '{{ response.serviceDirectoryConfig }}'
      visibility: '{{ response.visibility }}'
- discovery_id: gcp.dns.policies.get
  for_each: gcp.dns.policies.list
  calls:
  - action: policies.get
    params:
      policy: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      alternativeNameServerConfig: '{{ response.alternativeNameServerConfig }}'
      description: '{{ response.description }}'
      dns64Config: '{{ response.dns64Config }}'
      enableInboundForwarding: '{{ response.enableInboundForwarding }}'
      enableLogging: '{{ response.enableLogging }}'
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      networks: '{{ response.networks }}'
- discovery_id: gcp.dns.resourceRecordSets.get
  for_each: gcp.dns.policies.list
  calls:
  - action: resourceRecordSets.get
    params:
      managedZone: '{{ item.name }}'
      name: '{{ item.name }}'
      type: '{{ item.id }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      name: '{{ response.name }}'
      routingPolicy: '{{ response.routingPolicy }}'
      rrdatas: '{{ response.rrdatas }}'
      signatureRrdatas: '{{ response.signatureRrdatas }}'
      ttl: '{{ response.ttl }}'
      type: '{{ response.type }}'
- discovery_id: gcp.dns.resourceRecordSets.list
  for_each: gcp.dns.managedZones.list
  calls:
  - action: resourceRecordSets.list
    params:
      managedZone: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.resourceRecordSets }}'
    item:
      name: '{{ item.name }}'
      routingPolicy: '{{ item.routingPolicy }}'
      rrdatas: '{{ item.rrdatas }}'
      signatureRrdatas: '{{ item.signatureRrdatas }}'
      ttl: '{{ item.ttl }}'
      type: '{{ item.type }}'
- discovery_id: gcp.dns.responsePolicies.get
  for_each: gcp.dns.responsePolicies.list
  calls:
  - action: responsePolicies.get
    params:
      responsePolicy: '{{ item.id }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      description: '{{ response.description }}'
      gkeClusters: '{{ response.gkeClusters }}'
      id: '{{ response.id }}'
      labels: '{{ response.labels }}'
      networks: '{{ response.networks }}'
      responsePolicyName: '{{ response.responsePolicyName }}'
- discovery_id: gcp.dns.responsePolicyRules.get
  for_each: gcp.dns.responsePolicyRules.list
  calls:
  - action: responsePolicyRules.get
    params:
      responsePolicy: '{{ item.id }}'
      responsePolicyRule: '{{ item.behavior }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      behavior: '{{ response.behavior }}'
      dnsName: '{{ response.dnsName }}'
      localData: '{{ response.localData }}'
      ruleName: '{{ response.ruleName }}'
- discovery_id: gcp.dns.responsePolicyRules.list
  for_each: gcp.dns.responsePolicies.list
  calls:
  - action: responsePolicyRules.list
    params:
      responsePolicy: '{{ item.id }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.responsePolicyRules }}'
    item:
      behavior: '{{ item.behavior }}'
      dnsName: '{{ item.dnsName }}'
      localData: '{{ item.localData }}'
      ruleName: '{{ item.ruleName }}'
