    items_for: '{{ response.repositories }}'
    item:
      cleanupPolicies: '{{ item.cleanupPolicies }}'
      cleanupPolicyDryRun: '{{ item.cleanupPolicyDryRun }}'
      createTime: '{{ item.createTime }}'
      description: '{{ item.description }}'
      disallowUnspecifiedMode: '{{ item.disallowUnspecifiedMode }}'
      dockerConfig: '{{ item.dockerConfig }}'
      format: '{{ item.format }}'
      kmsKeyName: '{{ item.kmsKeyName }}'
      labels: '{{ item.labels }}'
      mavenConfig: '{{ item.mavenConfig }}'
      mode: '{{ item.mode }}'
      name: '{{ item.name }}'
      registryUri: '{{ item.registryUri }}'
      remoteRepositoryConfig: '{{ item.remoteRepositoryConfig }}'
      satisfiesPzi: '{{ item.satisfiesPzi }}'
      satisfiesPzs: '{{ item.satisfiesPzs }}'
      sizeBytes: '{{ item.sizeBytes }}'
      updateTime: '{{ item.updateTime }}'
