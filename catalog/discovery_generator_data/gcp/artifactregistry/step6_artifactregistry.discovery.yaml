version: '1.0'
provider: gcp
service: artifactregistry
services:
  client: artifactregistry
  module: googleapiclient.discovery.build('artifactregistry', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.artifactregistry.projects.getProjectSettings
  calls:
  - action: projects.getProjectSettings
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      legacyRedirectionState: '{{ response.legacyRedirectionState }}'
      name: '{{ response.name }}'
      pullPercent: '{{ response.pullPercent }}'
  uid_template: '{item.name}'
- discovery_id: gcp.artifactregistry.projects.locations.get
  calls:
  - action: projects.locations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      displayName: '{{ response.displayName }}'
      labels: '{{ response.labels }}'
      locationId: '{{ response.locationId }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.artifactregistry.projects.locations.getVpcscConfig
  calls:
  - action: projects.locations.getVpcscConfig
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      name: '{{ response.name }}'
      vpcscPolicy: '{{ response.vpcscPolicy }}'
  uid_template: '{item.name}'
- discovery_id: gcp.artifactregistry.projects.locations.list
  calls:
  - action: projects.locations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.locations }}'
    item:
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      locationId: '{{ item.locationId }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.artifactregistry.projects.locations.repositories.attachments.list
  calls:
  - action: projects.locations.repositories.attachments.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.attachments }}'
    item:
      annotations: '{{ item.annotations }}'
      attachmentNamespace: '{{ item.attachmentNamespace }}'
      createTime: '{{ item.createTime }}'
      files: '{{ item.files }}'
      name: '{{ item.name }}'
      ociVersionName: '{{ item.ociVersionName }}'
      target: '{{ item.target }}'
      type: '{{ item.type }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.artifactregistry.projects.locations.repositories.dockerImages.list
  calls:
  - action: projects.locations.repositories.dockerImages.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.dockerImages }}'
    item:
      artifactType: '{{ item.artifactType }}'
      buildTime: '{{ item.buildTime }}'
      imageManifests: '{{ item.imageManifests }}'
      imageSizeBytes: '{{ item.imageSizeBytes }}'
      mediaType: '{{ item.mediaType }}'
      name: '{{ item.name }}'
      tags: '{{ item.tags }}'
      updateTime: '{{ item.updateTime }}'
      uploadTime: '{{ item.uploadTime }}'
      uri: '{{ item.uri }}'
  uid_template: '{item.name}'
- discovery_id: gcp.artifactregistry.projects.locations.repositories.files.list
  calls:
  - action: projects.locations.repositories.files.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.files }}'
    item:
      annotations: '{{ item.annotations }}'
      createTime: '{{ item.createTime }}'
      fetchTime: '{{ item.fetchTime }}'
      hashes: '{{ item.hashes }}'
      name: '{{ item.name }}'
      owner: '{{ item.owner }}'
      sizeBytes: '{{ item.sizeBytes }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.artifactregistry.projects.locations.repositories.list
