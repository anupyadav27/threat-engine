version: '1.0'
provider: gcp
service: artifactregistry

services:
  client: artifactregistry
  module: "googleapiclient.discovery.build('artifactregistry', 'v1')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: unknown
    identifier_op: gcp.artifactregistry.projects.locations.repositories.list
    identifier_field: repositories[].name
    item_var_path: item.repositories[].name

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.artifactregistry.projects.locations.repositories.list ──
  - discovery_id: gcp.artifactregistry.projects.locations.repositories.list
    calls:
      - action: projects.locations.repositories.list
        params:
          parent: '{{ project_id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        binaryAuthorizationConfig: '{{ item.binaryAuthorizationConfig }}'
        bindings: '{{ item.bindings }}'
        cleanupPolicies: '{{ item.cleanupPolicies }}'
        cleanupPolicyDryRun: '{{ item.cleanupPolicyDryRun }}'
        containerAnalysisConfig: '{{ item.containerAnalysisConfig }}'
        createTime: '{{ item.createTime }}'
        description: '{{ item.description }}'
        disallowUnspecifiedMode: '{{ item.disallowUnspecifiedMode }}'
        dockerConfig: '{{ item.dockerConfig }}'
        encryptionConfig: '{{ item.encryptionConfig }}'
        format: '{{ item.format }}'
        kmsKeyName: '{{ item.kmsKeyName }}'
        labels: '{{ item.labels }}'
        mavenConfig: '{{ item.mavenConfig }}'
        mode: '{{ item.mode }}'
        name: '{{ item.name }}'
        registryUri: '{{ item.registryUri }}'
        remoteRepositoryConfig: '{{ item.remoteRepositoryConfig }}'
        satisfiesPzi: '{{ item.satisfiesPzi }}'
        satisfiesPzs: '{{ item.satisfiesPzs }}'
        scanConfig: '{{ item.scanConfig }}'
        sizeBytes: '{{ item.sizeBytes }}'
        updateTime: '{{ item.updateTime }}'
        virtualRepositoryConfig: '{{ item.virtualRepositoryConfig }}'
        vulnerabilityScanning: '{{ item.vulnerabilityScanning }}'
        vulnerabilityScanningConfig: '{{ item.vulnerabilityScanningConfig }}'

