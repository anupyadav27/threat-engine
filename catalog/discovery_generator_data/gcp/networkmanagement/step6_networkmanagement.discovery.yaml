    items_for: '{{ response.vpcFlowLogsConfigs }}'
    item:
      aggregationInterval: '{{ item.aggregationInterval }}'
      createTime: '{{ item.createTime }}'
      crossProjectMetadata: '{{ item.crossProjectMetadata }}'
      description: '{{ item.description }}'
      filterExpr: '{{ item.filterExpr }}'
      flowSampling: '{{ item.flowSampling }}'
      interconnectAttachment: '{{ item.interconnectAttachment }}'
      labels: '{{ item.labels }}'
      metadata: '{{ item.metadata }}'
      metadataFields: '{{ item.metadataFields }}'
      name: '{{ item.name }}'
      network: '{{ item.network }}'
      state: '{{ item.state }}'
      subnet: '{{ item.subnet }}'
      targetResourceState: '{{ item.targetResourceState }}'
      updateTime: '{{ item.updateTime }}'
      vpnTunnel: '{{ item.vpnTunnel }}'
  uid_template: '{item.name}'
- discovery_id: gcp.networkmanagement.projects.locations.get
