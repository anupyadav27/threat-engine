version: '1.0'
provider: gcp
service: networkmanagement
services:
  client: networkmanagement
  module: googleapiclient.discovery.build('networkmanagement', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.networkmanagement.organizations.locations.get
  calls:
  - action: organizations.locations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      displayName: '{{ response.displayName }}'
      labels: '{{ response.labels }}'
      locationId: '{{ response.locationId }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.networkmanagement.organizations.locations.global.operations.list
  calls:
  - action: organizations.locations.global.operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.networkmanagement.organizations.locations.list
  calls:
  - action: organizations.locations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
