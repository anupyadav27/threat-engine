    item:
      allowedUserTargetingModes: '{{ item.allowedUserTargetingModes }}'
      appTargeting: '{{ item.appTargeting }}'
      billingId: '{{ item.billingId }}'
      displayName: '{{ item.displayName }}'
      excludedContentLabelIds: '{{ item.excludedContentLabelIds }}'
      geoTargeting: '{{ item.geoTargeting }}'
      includedCreativeDimensions: '{{ item.includedCreativeDimensions }}'
      includedEnvironments: '{{ item.includedEnvironments }}'
      includedFormats: '{{ item.includedFormats }}'
      includedLanguages: '{{ item.includedLanguages }}'
      includedMobileOperatingSystemIds: '{{ item.includedMobileOperatingSystemIds
        }}'
      includedPlatforms: '{{ item.includedPlatforms }}'
      includedUserIdTypes: '{{ item.includedUserIdTypes }}'
      interstitialTargeting: '{{ item.interstitialTargeting }}'
      invalidGeoIds: '{{ item.invalidGeoIds }}'
