version: '1.0'
provider: gcp
service: realtimebidding
services:
  client: realtimebidding
  module: googleapiclient.discovery.build('realtimebidding', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.realtimebidding.bidders.creatives.list
  calls:
  - action: bidders.creatives.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.creatives }}'
    item:
      accountId: '{{ item.accountId }}'
      adChoicesDestinationUrl: '{{ item.adChoicesDestinationUrl }}'
      advertiserName: '{{ item.advertiserName }}'
      agencyId: '{{ item.agencyId }}'
      apiUpdateTime: '{{ item.apiUpdateTime }}'
      creativeFormat: '{{ item.creativeFormat }}'
      creativeId: '{{ item.creativeId }}'
      creativeServingDecision: '{{ item.creativeServingDecision }}'
      dealIds: '{{ item.dealIds }}'
      declaredAttributes: '{{ item.declaredAttributes }}'
      declaredClickThroughUrls: '{{ item.declaredClickThroughUrls }}'
      declaredRestrictedCategories: '{{ item.declaredRestrictedCategories }}'
      declaredVendorIds: '{{ item.declaredVendorIds }}'
      html: '{{ item.html }}'
      impressionTrackingUrls: '{{ item.impressionTrackingUrls }}'
      name: '{{ item.name }}'
      native: '{{ item.native }}'
      renderUrl: '{{ item.renderUrl }}'
      restrictedCategories: '{{ item.restrictedCategories }}'
      version: '{{ item.version }}'
      video: '{{ item.video }}'
  uid_template: '{item.name}'
- discovery_id: gcp.realtimebidding.bidders.endpoints.list
  calls:
  - action: bidders.endpoints.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.endpoints }}'
    item:
      bidProtocol: '{{ item.bidProtocol }}'
      maximumQps: '{{ item.maximumQps }}'
      name: '{{ item.name }}'
      tradingLocation: '{{ item.tradingLocation }}'
      url: '{{ item.url }}'
  uid_template: '{item.name}'
- discovery_id: gcp.realtimebidding.bidders.list
  calls:
  - action: bidders.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.bidders }}'
    item:
      bypassNonguaranteedDealsPretargeting: '{{ item.bypassNonguaranteedDealsPretargeting
        }}'
      cookieMatchingNetworkId: '{{ item.cookieMatchingNetworkId }}'
      cookieMatchingUrl: '{{ item.cookieMatchingUrl }}'
      dealsBillingId: '{{ item.dealsBillingId }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.realtimebidding.bidders.pretargetingConfigs.list
