version: '1.0'
provider: gcp
service: serviceusage
services:
  client: serviceusage
  module: googleapiclient.discovery.build('serviceusage', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.serviceusage.operations.list
  calls:
  - action: operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.serviceusage.services.batchGet
  calls:
  - action: services.batchGet
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      services: '{{ response.services }}'
- discovery_id: gcp.serviceusage.services.list
  calls:
  - action: services.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.services }}'
    item:
      config: '{{ item.config }}'
      name: '{{ item.name }}'
      parent: '{{ item.parent }}'
      state: '{{ item.state }}'
  uid_template: '{item.name}'
- discovery_id: gcp.serviceusage.operations.get
  for_each: gcp.serviceusage.operations.list
  calls:
  - action: operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
- discovery_id: gcp.serviceusage.services.get
  for_each: gcp.serviceusage.services.list
  calls:
  - action: services.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      config: '{{ response.config }}'
      name: '{{ response.name }}'
      parent: '{{ response.parent }}'
      state: '{{ response.state }}'
