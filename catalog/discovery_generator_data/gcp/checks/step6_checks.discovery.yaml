version: '1.0'
provider: gcp
service: checks
services:
  client: checks
  module: googleapiclient.discovery.build('checks', 'v1alpha')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.checks.accounts.apps.list
  calls:
  - action: accounts.apps.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.apps }}'
    item:
      name: '{{ item.name }}'
      title: '{{ item.title }}'
  uid_template: '{item.name}'
- discovery_id: gcp.checks.accounts.apps.reports.list
  calls:
  - action: accounts.apps.reports.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.reports }}'
    item:
      appBundle: '{{ item.appBundle }}'
      checks: '{{ item.checks }}'
      dataMonitoring: '{{ item.dataMonitoring }}'
      name: '{{ item.name }}'
      resultsUri: '{{ item.resultsUri }}'
  uid_template: '{item.name}'
- discovery_id: gcp.checks.accounts.repos.scans.list
  calls:
  - action: accounts.repos.scans.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.scans }}'
    item:
      cliVersion: '{{ item.cliVersion }}'
      localScanPath: '{{ item.localScanPath }}'
      name: '{{ item.name }}'
      resultsUri: '{{ item.resultsUri }}'
      scmMetadata: '{{ item.scmMetadata }}'
      sources: '{{ item.sources }}'
  uid_template: '{item.name}'
- discovery_id: gcp.checks.accounts.apps.get
  for_each: gcp.checks.accounts.apps.list
  calls:
  - action: accounts.apps.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      name: '{{ response.name }}'
      title: '{{ response.title }}'
- discovery_id: gcp.checks.accounts.apps.operations.get
  for_each: gcp.checks.accounts.apps.operations.list
  calls:
  - action: accounts.apps.operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
- discovery_id: gcp.checks.accounts.apps.operations.list
  for_each: gcp.checks.accounts.apps.list
  calls:
  - action: accounts.apps.operations.list
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
- discovery_id: gcp.checks.accounts.apps.reports.get
  for_each: gcp.checks.accounts.apps.reports.list
  calls:
  - action: accounts.apps.reports.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      appBundle: '{{ response.appBundle }}'
      checks: '{{ response.checks }}'
      dataMonitoring: '{{ response.dataMonitoring }}'
      name: '{{ response.name }}'
      resultsUri: '{{ response.resultsUri }}'
- discovery_id: gcp.checks.accounts.repos.operations.get
  for_each: gcp.checks.accounts.apps.operations.list
  calls:
  - action: accounts.repos.operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
- discovery_id: gcp.checks.accounts.repos.scans.get
  for_each: gcp.checks.accounts.repos.scans.list
  calls:
  - action: accounts.repos.scans.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      cliVersion: '{{ response.cliVersion }}'
      localScanPath: '{{ response.localScanPath }}'
      name: '{{ response.name }}'
      resultsUri: '{{ response.resultsUri }}'
      scmMetadata: '{{ response.scmMetadata }}'
      sources: '{{ response.sources }}'
