version: '1.0'
provider: gcp
service: servicemanagement
services:
  client: servicemanagement
  module: googleapiclient.discovery.build('servicemanagement', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.servicemanagement.operations.list
  calls:
  - action: operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.servicemanagement.services.list
  calls:
  - action: services.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.services }}'
    item:
      producerProjectId: '{{ item.producerProjectId }}'
      serviceName: '{{ item.serviceName }}'
- discovery_id: gcp.servicemanagement.operations.get
  for_each: gcp.servicemanagement.operations.list
  calls:
  - action: operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
- discovery_id: gcp.servicemanagement.services.configs.get
  for_each: gcp.servicemanagement.services.configs.list
  calls:
  - action: services.configs.get
    params:
      configId: '{{ item.name }}'
      serviceName: '{{ item.serviceName }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      apis: '{{ response.apis }}'
      aspects: '{{ response.aspects }}'
      authentication: '{{ response.authentication }}'
      backend: '{{ response.backend }}'
      billing: '{{ response.billing }}'
      configVersion: '{{ response.configVersion }}'
      context: '{{ response.context }}'
      control: '{{ response.control }}'
      customError: '{{ response.customError }}'
      documentation: '{{ response.documentation }}'
      endpoints: '{{ response.endpoints }}'
      enums: '{{ response.enums }}'
      http: '{{ response.http }}'
      id: '{{ response.id }}'
      logging: '{{ response.logging }}'
      logs: '{{ response.logs }}'
      metrics: '{{ response.metrics }}'
      monitoredResources: '{{ response.monitoredResources }}'
      monitoring: '{{ response.monitoring }}'
      name: '{{ response.name }}'
      producerProjectId: '{{ response.producerProjectId }}'
      publishing: '{{ response.publishing }}'
      quota: '{{ response.quota }}'
      sourceInfo: '{{ response.sourceInfo }}'
      systemParameters: '{{ response.systemParameters }}'
      systemTypes: '{{ response.systemTypes }}'
      title: '{{ response.title }}'
      types: '{{ response.types }}'
      usage: '{{ response.usage }}'
- discovery_id: gcp.servicemanagement.services.configs.list
  for_each: gcp.servicemanagement.services.list
  calls:
  - action: services.configs.list
    params:
      serviceName: '{{ item.serviceName }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.configs }}'
    item:
      apis: '{{ item.apis }}'
      aspects: '{{ item.aspects }}'
      authentication: '{{ item.authentication }}'
      backend: '{{ item.backend }}'
      billing: '{{ item.billing }}'
      configVersion: '{{ item.configVersion }}'
      context: '{{ item.context }}'
      control: '{{ item.control }}'
      customError: '{{ item.customError }}'
      documentation: '{{ item.documentation }}'
      endpoints: '{{ item.endpoints }}'
      enums: '{{ item.enums }}'
      http: '{{ item.http }}'
      id: '{{ item.id }}'
      logging: '{{ item.logging }}'
      logs: '{{ item.logs }}'
      metrics: '{{ item.metrics }}'
      monitoredResources: '{{ item.monitoredResources }}'
      monitoring: '{{ item.monitoring }}'
      name: '{{ item.name }}'
      producerProjectId: '{{ item.producerProjectId }}'
      publishing: '{{ item.publishing }}'
      quota: '{{ item.quota }}'
      sourceInfo: '{{ item.sourceInfo }}'
      systemParameters: '{{ item.systemParameters }}'
      systemTypes: '{{ item.systemTypes }}'
      title: '{{ item.title }}'
      types: '{{ item.types }}'
      usage: '{{ item.usage }}'
- discovery_id: gcp.servicemanagement.services.get
  for_each: gcp.servicemanagement.services.list
  calls:
  - action: services.get
    params:
      serviceName: '{{ item.serviceName }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      producerProjectId: '{{ response.producerProjectId }}'
      serviceName: '{{ response.serviceName }}'
- discovery_id: gcp.servicemanagement.services.getConfig
  for_each: gcp.servicemanagement.services.list
  calls:
  - action: services.getConfig
    params:
      serviceName: '{{ item.serviceName }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      apis: '{{ response.apis }}'
      aspects: '{{ response.aspects }}'
      authentication: '{{ response.authentication }}'
      backend: '{{ response.backend }}'
      billing: '{{ response.billing }}'
      configVersion: '{{ response.configVersion }}'
      context: '{{ response.context }}'
      control: '{{ response.control }}'
      customError: '{{ response.customError }}'
      documentation: '{{ response.documentation }}'
      endpoints: '{{ response.endpoints }}'
      enums: '{{ response.enums }}'
      http: '{{ response.http }}'
      id: '{{ response.id }}'
      logging: '{{ response.logging }}'
      logs: '{{ response.logs }}'
      metrics: '{{ response.metrics }}'
      monitoredResources: '{{ response.monitoredResources }}'
      monitoring: '{{ response.monitoring }}'
      name: '{{ response.name }}'
      producerProjectId: '{{ response.producerProjectId }}'
      publishing: '{{ response.publishing }}'
      quota: '{{ response.quota }}'
      sourceInfo: '{{ response.sourceInfo }}'
      systemParameters: '{{ response.systemParameters }}'
      systemTypes: '{{ response.systemTypes }}'
      title: '{{ response.title }}'
      types: '{{ response.types }}'
      usage: '{{ response.usage }}'
- discovery_id: gcp.servicemanagement.services.rollouts.get
  for_each: gcp.servicemanagement.services.rollouts.list
  calls:
  - action: services.rollouts.get
    params:
      rolloutId: '{{ item.createdBy }}'
      serviceName: '{{ item.serviceName }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      createTime: '{{ response.createTime }}'
      createdBy: '{{ response.createdBy }}'
      deleteServiceStrategy: '{{ response.deleteServiceStrategy }}'
      rolloutId: '{{ response.rolloutId }}'
      serviceName: '{{ response.serviceName }}'
      status: '{{ response.status }}'
      trafficPercentStrategy: '{{ response.trafficPercentStrategy }}'
- discovery_id: gcp.servicemanagement.services.rollouts.list
  for_each: gcp.servicemanagement.services.list
  calls:
  - action: services.rollouts.list
    params:
      serviceName: '{{ item.serviceName }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.rollouts }}'
    item:
      createTime: '{{ item.createTime }}'
      createdBy: '{{ item.createdBy }}'
      deleteServiceStrategy: '{{ item.deleteServiceStrategy }}'
      rolloutId: '{{ item.rolloutId }}'
      serviceName: '{{ item.serviceName }}'
      status: '{{ item.status }}'
      trafficPercentStrategy: '{{ item.trafficPercentStrategy }}'
