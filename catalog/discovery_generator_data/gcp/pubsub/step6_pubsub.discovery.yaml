version: '1.0'
provider: gcp
service: pubsub
services:
  client: pubsub
  module: googleapiclient.discovery.build('pubsub', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.pubsub.projects.schemas.list
  calls:
  - action: projects.schemas.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.schemas }}'
    item:
      definition: '{{ item.definition }}'
      name: '{{ item.name }}'
      revisionCreateTime: '{{ item.revisionCreateTime }}'
      revisionId: '{{ item.revisionId }}'
      type: '{{ item.type }}'
  uid_template: '{item.name}'
- discovery_id: gcp.pubsub.projects.snapshots.list
  calls:
  - action: projects.snapshots.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.snapshots }}'
    item:
      expireTime: '{{ item.expireTime }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      topic: '{{ item.topic }}'
  uid_template: '{item.name}'
- discovery_id: gcp.pubsub.projects.subscriptions.list
  calls:
  - action: projects.subscriptions.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.subscriptions }}'
    item:
      ackDeadlineSeconds: '{{ item.ackDeadlineSeconds }}'
      analyticsHubSubscriptionInfo: '{{ item.analyticsHubSubscriptionInfo }}'
      bigqueryConfig: '{{ item.bigqueryConfig }}'
      cloudStorageConfig: '{{ item.cloudStorageConfig }}'
      deadLetterPolicy: '{{ item.deadLetterPolicy }}'
      detached: '{{ item.detached }}'
      enableExactlyOnceDelivery: '{{ item.enableExactlyOnceDelivery }}'
      enableMessageOrdering: '{{ item.enableMessageOrdering }}'
      expirationPolicy: '{{ item.expirationPolicy }}'
      filter: '{{ item.filter }}'
      labels: '{{ item.labels }}'
      messageRetentionDuration: '{{ item.messageRetentionDuration }}'
      messageTransforms: '{{ item.messageTransforms }}'
      name: '{{ item.name }}'
      pushConfig: '{{ item.pushConfig }}'
      retainAckedMessages: '{{ item.retainAckedMessages }}'
      retryPolicy: '{{ item.retryPolicy }}'
      state: '{{ item.state }}'
      tags: '{{ item.tags }}'
      topic: '{{ item.topic }}'
      topicMessageRetentionDuration: '{{ item.topicMessageRetentionDuration }}'
  uid_template: '{item.name}'
- discovery_id: gcp.pubsub.projects.topics.list
  calls:
  - action: projects.topics.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.topics }}'
    item:
      ingestionDataSourceSettings: '{{ item.ingestionDataSourceSettings }}'
      kmsKeyName: '{{ item.kmsKeyName }}'
      labels: '{{ item.labels }}'
      messageRetentionDuration: '{{ item.messageRetentionDuration }}'
      messageStoragePolicy: '{{ item.messageStoragePolicy }}'
      messageTransforms: '{{ item.messageTransforms }}'
      name: '{{ item.name }}'
      satisfiesPzs: '{{ item.satisfiesPzs }}'
      schemaSettings: '{{ item.schemaSettings }}'
      state: '{{ item.state }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.name}'
- discovery_id: gcp.pubsub.projects.schemas.get
  for_each: gcp.pubsub.projects.schemas.listRevisions
  calls:
  - action: projects.schemas.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      definition: '{{ response.definition }}'
      name: '{{ response.name }}'
      revisionCreateTime: '{{ response.revisionCreateTime }}'
      revisionId: '{{ response.revisionId }}'
      type: '{{ response.type }}'
- discovery_id: gcp.pubsub.projects.schemas.getIamPolicy
  for_each: gcp.pubsub.projects.schemas.listRevisions
  calls:
  - action: projects.schemas.getIamPolicy
    params:
      resource: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      bindings: '{{ response.bindings }}'
      version: '{{ response.version }}'
- discovery_id: gcp.pubsub.projects.schemas.listRevisions
  for_each: gcp.pubsub.projects.schemas.list
  calls:
  - action: projects.schemas.listRevisions
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.schemas }}'
    item:
      definition: '{{ item.definition }}'
      name: '{{ item.name }}'
      revisionCreateTime: '{{ item.revisionCreateTime }}'
      revisionId: '{{ item.revisionId }}'
      type: '{{ item.type }}'
- discovery_id: gcp.pubsub.projects.snapshots.get
  for_each: gcp.pubsub.projects.snapshots.list
  calls:
  - action: projects.snapshots.get
    params:
      snapshot: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      expireTime: '{{ response.expireTime }}'
      labels: '{{ response.labels }}'
      name: '{{ response.name }}'
      topic: '{{ response.topic }}'
- discovery_id: gcp.pubsub.projects.snapshots.getIamPolicy
  for_each: gcp.pubsub.projects.snapshots.list
  calls:
  - action: projects.snapshots.getIamPolicy
    params:
      resource: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      bindings: '{{ response.bindings }}'
      version: '{{ response.version }}'
- discovery_id: gcp.pubsub.projects.subscriptions.get
  for_each: gcp.pubsub.projects.subscriptions.list
  calls:
  - action: projects.subscriptions.get
    params:
      subscription: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      ackDeadlineSeconds: '{{ response.ackDeadlineSeconds }}'
      analyticsHubSubscriptionInfo: '{{ response.analyticsHubSubscriptionInfo }}'
      bigqueryConfig: '{{ response.bigqueryConfig }}'
      cloudStorageConfig: '{{ response.cloudStorageConfig }}'
      deadLetterPolicy: '{{ response.deadLetterPolicy }}'
      detached: '{{ response.detached }}'
      enableExactlyOnceDelivery: '{{ response.enableExactlyOnceDelivery }}'
      enableMessageOrdering: '{{ response.enableMessageOrdering }}'
      expirationPolicy: '{{ response.expirationPolicy }}'
      filter: '{{ response.filter }}'
      labels: '{{ response.labels }}'
      messageRetentionDuration: '{{ response.messageRetentionDuration }}'
      messageTransforms: '{{ response.messageTransforms }}'
      name: '{{ response.name }}'
      pushConfig: '{{ response.pushConfig }}'
      retainAckedMessages: '{{ response.retainAckedMessages }}'
      retryPolicy: '{{ response.retryPolicy }}'
      state: '{{ response.state }}'
      tags: '{{ response.tags }}'
      topic: '{{ response.topic }}'
      topicMessageRetentionDuration: '{{ response.topicMessageRetentionDuration }}'
- discovery_id: gcp.pubsub.projects.subscriptions.getIamPolicy
  for_each: gcp.pubsub.projects.subscriptions.list
  calls:
  - action: projects.subscriptions.getIamPolicy
    params:
      resource: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      bindings: '{{ response.bindings }}'
      version: '{{ response.version }}'
- discovery_id: gcp.pubsub.projects.topics.get
  for_each: gcp.pubsub.projects.topics.list
  calls:
  - action: projects.topics.get
    params:
      topic: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      ingestionDataSourceSettings: '{{ response.ingestionDataSourceSettings }}'
      kmsKeyName: '{{ response.kmsKeyName }}'
      labels: '{{ response.labels }}'
      messageRetentionDuration: '{{ response.messageRetentionDuration }}'
      messageStoragePolicy: '{{ response.messageStoragePolicy }}'
      messageTransforms: '{{ response.messageTransforms }}'
      name: '{{ response.name }}'
      satisfiesPzs: '{{ response.satisfiesPzs }}'
      schemaSettings: '{{ response.schemaSettings }}'
      state: '{{ response.state }}'
      tags: '{{ response.tags }}'
- discovery_id: gcp.pubsub.projects.topics.getIamPolicy
  for_each: gcp.pubsub.projects.topics.list
  calls:
  - action: projects.topics.getIamPolicy
    params:
      resource: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      bindings: '{{ response.bindings }}'
      version: '{{ response.version }}'
- discovery_id: gcp.pubsub.projects.topics.snapshots.list
  for_each: gcp.pubsub.projects.topics.list
  calls:
  - action: projects.topics.snapshots.list
    params:
      topic: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.snapshots }}'
- discovery_id: gcp.pubsub.projects.topics.subscriptions.list
  for_each: gcp.pubsub.projects.topics.list
  calls:
  - action: projects.topics.subscriptions.list
    params:
      topic: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.subscriptions }}'
