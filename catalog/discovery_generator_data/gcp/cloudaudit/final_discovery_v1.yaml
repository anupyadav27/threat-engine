# ============================================================
# Discovery YAML — cloudaudit (final_discovery v1)
# Generated: 2026-04-16T11:27:57Z
# Check rules: auto | ops in scope: 1
# ============================================================
version: 'v2'
provider: gcp
service: cloudaudit

services:
  client: cloudaudit
  module: "googleapiclient.discovery.build('cloudaudit', 'v2')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  []

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.logging.entries.list ──
  - discovery_id: gcp.logging.entries.list
    calls:
      - action: entries.list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        httpRequest: '{{ item.httpRequest }}'
        insertId: '{{ item.insertId }}'
        jsonPayload: '{{ item.jsonPayload }}'
        labels: '{{ item.labels }}'
        logName: '{{ item.logName }}'
        metadata: '{{ item.metadata }}'
        operation: '{{ item.operation }}'
        protoPayload: '{{ item.protoPayload }}'
        receiveTimestamp: '{{ item.receiveTimestamp }}'
        resource: '{{ item.resource }}'
        severity: '{{ item.severity }}'
        sourceLocation: '{{ item.sourceLocation }}'
        spanId: '{{ item.spanId }}'
        split: '{{ item.split }}'
        textPayload: '{{ item.textPayload }}'
        timestamp: '{{ item.timestamp }}'
        trace: '{{ item.trace }}'
        traceSampled: '{{ item.traceSampled }}'
