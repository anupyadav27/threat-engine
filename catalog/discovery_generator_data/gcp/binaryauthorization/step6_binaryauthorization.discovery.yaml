version: '1.0'
provider: gcp
service: binaryauthorization
services:
  client: binaryauthorization
  module: googleapiclient.discovery.build('binaryauthorization', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.binaryauthorization.projects.attestors.list
  calls:
  - action: projects.attestors.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.attestors }}'
    item:
      description: '{{ item.description }}'
      name: '{{ item.name }}'
      updateTime: '{{ item.updateTime }}'
      userOwnedGrafeasNote: '{{ item.userOwnedGrafeasNote }}'
  uid_template: '{item.name}'
- discovery_id: gcp.binaryauthorization.projects.getPolicy
  calls:
  - action: projects.getPolicy
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      admissionWhitelistPatterns: '{{ response.admissionWhitelistPatterns }}'
      clusterAdmissionRules: '{{ response.clusterAdmissionRules }}'
      defaultAdmissionRule: '{{ response.defaultAdmissionRule }}'
      description: '{{ response.description }}'
      globalPolicyEvaluationMode: '{{ response.globalPolicyEvaluationMode }}'
      istioServiceIdentityAdmissionRules: '{{ response.istioServiceIdentityAdmissionRules
        }}'
      kubernetesNamespaceAdmissionRules: '{{ response.kubernetesNamespaceAdmissionRules
        }}'
      kubernetesServiceAccountAdmissionRules: '{{ response.kubernetesServiceAccountAdmissionRules
        }}'
      name: '{{ response.name }}'
      updateTime: '{{ response.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.binaryauthorization.projects.platforms.policies.list
  calls:
  - action: projects.platforms.policies.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.policies }}'
    item:
      description: '{{ item.description }}'
      gkePolicy: '{{ item.gkePolicy }}'
      name: '{{ item.name }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.binaryauthorization.projects.policy.getIamPolicy
  calls:
  - action: projects.policy.getIamPolicy
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      bindings: '{{ response.bindings }}'
      version: '{{ response.version }}'
- discovery_id: gcp.binaryauthorization.systempolicy.getPolicy
  calls:
  - action: systempolicy.getPolicy
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      admissionWhitelistPatterns: '{{ response.admissionWhitelistPatterns }}'
      clusterAdmissionRules: '{{ response.clusterAdmissionRules }}'
      defaultAdmissionRule: '{{ response.defaultAdmissionRule }}'
      description: '{{ response.description }}'
      globalPolicyEvaluationMode: '{{ response.globalPolicyEvaluationMode }}'
      istioServiceIdentityAdmissionRules: '{{ response.istioServiceIdentityAdmissionRules
        }}'
      kubernetesNamespaceAdmissionRules: '{{ response.kubernetesNamespaceAdmissionRules
        }}'
      kubernetesServiceAccountAdmissionRules: '{{ response.kubernetesServiceAccountAdmissionRules
        }}'
      name: '{{ response.name }}'
      updateTime: '{{ response.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.binaryauthorization.projects.attestors.get
  for_each: gcp.binaryauthorization.projects.attestors.list
  calls:
  - action: projects.attestors.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      description: '{{ response.description }}'
      name: '{{ response.name }}'
      updateTime: '{{ response.updateTime }}'
      userOwnedGrafeasNote: '{{ response.userOwnedGrafeasNote }}'
- discovery_id: gcp.binaryauthorization.projects.attestors.getIamPolicy
  for_each: gcp.binaryauthorization.projects.attestors.list
  calls:
  - action: projects.attestors.getIamPolicy
    params:
      resource: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      bindings: '{{ response.bindings }}'
      version: '{{ response.version }}'
- discovery_id: gcp.binaryauthorization.projects.platforms.policies.get
  for_each: gcp.binaryauthorization.projects.platforms.policies.list
  calls:
  - action: projects.platforms.policies.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      description: '{{ response.description }}'
      gkePolicy: '{{ response.gkePolicy }}'
      name: '{{ response.name }}'
      updateTime: '{{ response.updateTime }}'
