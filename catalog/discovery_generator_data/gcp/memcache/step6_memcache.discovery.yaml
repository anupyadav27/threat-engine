version: '1.0'
provider: gcp
service: memcache
services:
  client: memcache
  module: googleapiclient.discovery.build('memcache', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.memcache.projects.locations.get
  calls:
  - action: projects.locations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      displayName: '{{ response.displayName }}'
      labels: '{{ response.labels }}'
      locationId: '{{ response.locationId }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.memcache.projects.locations.instances.list
  calls:
  - action: projects.locations.instances.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.instances }}'
    item:
      authorizedNetwork: '{{ item.authorizedNetwork }}'
      createTime: '{{ item.createTime }}'
      discoveryEndpoint: '{{ item.discoveryEndpoint }}'
      displayName: '{{ item.displayName }}'
      instanceMessages: '{{ item.instanceMessages }}'
      labels: '{{ item.labels }}'
      maintenancePolicy: '{{ item.maintenancePolicy }}'
      maintenanceSchedule: '{{ item.maintenanceSchedule }}'
      memcacheFullVersion: '{{ item.memcacheFullVersion }}'
      memcacheNodes: '{{ item.memcacheNodes }}'
      memcacheVersion: '{{ item.memcacheVersion }}'
      name: '{{ item.name }}'
      nodeConfig: '{{ item.nodeConfig }}'
      nodeCount: '{{ item.nodeCount }}'
      parameters: '{{ item.parameters }}'
      reservedIpRangeId: '{{ item.reservedIpRangeId }}'
      satisfiesPzi: '{{ item.satisfiesPzi }}'
      satisfiesPzs: '{{ item.satisfiesPzs }}'
      state: '{{ item.state }}'
      updateTime: '{{ item.updateTime }}'
      zones: '{{ item.zones }}'
  uid_template: '{item.name}'
- discovery_id: gcp.memcache.projects.locations.list
  calls:
  - action: projects.locations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.locations }}'
    item:
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      locationId: '{{ item.locationId }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.memcache.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.memcache.projects.locations.instances.get
  for_each: gcp.memcache.projects.locations.instances.list
  calls:
  - action: projects.locations.instances.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      authorizedNetwork: '{{ response.authorizedNetwork }}'
      createTime: '{{ response.createTime }}'
      discoveryEndpoint: '{{ response.discoveryEndpoint }}'
      displayName: '{{ response.displayName }}'
      instanceMessages: '{{ response.instanceMessages }}'
      labels: '{{ response.labels }}'
      maintenancePolicy: '{{ response.maintenancePolicy }}'
      maintenanceSchedule: '{{ response.maintenanceSchedule }}'
      memcacheFullVersion: '{{ response.memcacheFullVersion }}'
      memcacheNodes: '{{ response.memcacheNodes }}'
      memcacheVersion: '{{ response.memcacheVersion }}'
      name: '{{ response.name }}'
      nodeConfig: '{{ response.nodeConfig }}'
      nodeCount: '{{ response.nodeCount }}'
      parameters: '{{ response.parameters }}'
      reservedIpRangeId: '{{ response.reservedIpRangeId }}'
      satisfiesPzi: '{{ response.satisfiesPzi }}'
      satisfiesPzs: '{{ response.satisfiesPzs }}'
      state: '{{ response.state }}'
      updateTime: '{{ response.updateTime }}'
      zones: '{{ response.zones }}'
- discovery_id: gcp.memcache.projects.locations.instances.getTags
  for_each: gcp.memcache.projects.locations.instances.list
  calls:
  - action: projects.locations.instances.getTags
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      name: '{{ response.name }}'
      tags: '{{ response.tags }}'
- discovery_id: gcp.memcache.projects.locations.operations.get
  for_each: gcp.memcache.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
