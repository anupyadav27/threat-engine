version: '1.0'
provider: gcp
service: datalineage
services:
  client: datalineage
  module: googleapiclient.discovery.build('datalineage', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.datalineage.folders.locations.config.get
  calls:
  - action: folders.locations.config.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      ingestion: '{{ response.ingestion }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.datalineage.organizations.locations.config.get
  calls:
  - action: organizations.locations.config.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      ingestion: '{{ response.ingestion }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.datalineage.projects.locations.config.get
  calls:
  - action: projects.locations.config.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      ingestion: '{{ response.ingestion }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.datalineage.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.datalineage.projects.locations.processes.list
  calls:
  - action: projects.locations.processes.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.processes }}'
    item:
      attributes: '{{ item.attributes }}'
      displayName: '{{ item.displayName }}'
      name: '{{ item.name }}'
      origin: '{{ item.origin }}'
  uid_template: '{item.name}'
- discovery_id: gcp.datalineage.projects.locations.processes.runs.lineageEvents.list
  calls:
  - action: projects.locations.processes.runs.lineageEvents.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.lineageEvents }}'
    item:
      endTime: '{{ item.endTime }}'
      links: '{{ item.links }}'
      name: '{{ item.name }}'
      startTime: '{{ item.startTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.datalineage.projects.locations.processes.runs.list
  calls:
  - action: projects.locations.processes.runs.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.runs }}'
    item:
      attributes: '{{ item.attributes }}'
      displayName: '{{ item.displayName }}'
      endTime: '{{ item.endTime }}'
      name: '{{ item.name }}'
      startTime: '{{ item.startTime }}'
      state: '{{ item.state }}'
  uid_template: '{item.name}'
- discovery_id: gcp.datalineage.projects.locations.operations.get
  for_each: gcp.datalineage.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
- discovery_id: gcp.datalineage.projects.locations.processes.get
  for_each: gcp.datalineage.projects.locations.processes.list
  calls:
  - action: projects.locations.processes.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      attributes: '{{ response.attributes }}'
      displayName: '{{ response.displayName }}'
      name: '{{ response.name }}'
      origin: '{{ response.origin }}'
- discovery_id: gcp.datalineage.projects.locations.processes.runs.get
  for_each: gcp.datalineage.projects.locations.processes.runs.list
  calls:
  - action: projects.locations.processes.runs.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      attributes: '{{ response.attributes }}'
      displayName: '{{ response.displayName }}'
      endTime: '{{ response.endTime }}'
      name: '{{ response.name }}'
      startTime: '{{ response.startTime }}'
      state: '{{ response.state }}'
- discovery_id: gcp.datalineage.projects.locations.processes.runs.lineageEvents.get
  for_each: gcp.datalineage.projects.locations.processes.runs.lineageEvents.list
  calls:
  - action: projects.locations.processes.runs.lineageEvents.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      endTime: '{{ response.endTime }}'
      links: '{{ response.links }}'
      name: '{{ response.name }}'
      startTime: '{{ response.startTime }}'
