version: '1.0'
provider: gcp
service: mybusinesslodging
services:
  client: mybusinesslodging
  module: googleapiclient.discovery.build('mybusinesslodging', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.mybusinesslodging.locations.getLodging
  calls:
  - action: locations.getLodging
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      accessibility: '{{ response.accessibility }}'
      activities: '{{ response.activities }}'
      allUnits: '{{ response.allUnits }}'
      business: '{{ response.business }}'
      commonLivingArea: '{{ response.commonLivingArea }}'
      connectivity: '{{ response.connectivity }}'
      families: '{{ response.families }}'
      foodAndDrink: '{{ response.foodAndDrink }}'
      guestUnits: '{{ response.guestUnits }}'
      healthAndSafety: '{{ response.healthAndSafety }}'
      housekeeping: '{{ response.housekeeping }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      parking: '{{ response.parking }}'
      pets: '{{ response.pets }}'
      policies: '{{ response.policies }}'
      pools: '{{ response.pools }}'
      property: '{{ response.property }}'
      services: '{{ response.services }}'
      someUnits: '{{ response.someUnits }}'
      sustainability: '{{ response.sustainability }}'
      transportation: '{{ response.transportation }}'
      wellness: '{{ response.wellness }}'
  uid_template: '{item.name}'
- discovery_id: gcp.mybusinesslodging.locations.lodging.getGoogleUpdated
  calls:
  - action: locations.lodging.getGoogleUpdated
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      diffMask: '{{ response.diffMask }}'
      lodging: '{{ response.lodging }}'
