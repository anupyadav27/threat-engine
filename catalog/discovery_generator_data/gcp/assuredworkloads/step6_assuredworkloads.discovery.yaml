version: '1.0'
provider: gcp
service: assuredworkloads
services:
  client: assuredworkloads
  module: googleapiclient.discovery.build('assuredworkloads', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.assuredworkloads.organizations.locations.operations.list
  calls:
  - action: organizations.locations.operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.assuredworkloads.organizations.locations.workloads.list
  calls:
  - action: organizations.locations.workloads.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.workloads }}'
    item:
      billingAccount: '{{ item.billingAccount }}'
      complianceRegime: '{{ item.complianceRegime }}'
      complianceStatus: '{{ item.complianceStatus }}'
      compliantButDisallowedServices: '{{ item.compliantButDisallowedServices }}'
      createTime: '{{ item.createTime }}'
      displayName: '{{ item.displayName }}'
      ekmProvisioningResponse: '{{ item.ekmProvisioningResponse }}'
      enableSovereignControls: '{{ item.enableSovereignControls }}'
      kajEnrollmentState: '{{ item.kajEnrollmentState }}'
      kmsSettings: '{{ item.kmsSettings }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      partner: '{{ item.partner }}'
      partnerPermissions: '{{ item.partnerPermissions }}'
      partnerServicesBillingAccount: '{{ item.partnerServicesBillingAccount }}'
      provisionedResourcesParent: '{{ item.provisionedResourcesParent }}'
      resourceMonitoringEnabled: '{{ item.resourceMonitoringEnabled }}'
      resourceSettings: '{{ item.resourceSettings }}'
      resources: '{{ item.resources }}'
      saaEnrollmentResponse: '{{ item.saaEnrollmentResponse }}'
      violationNotificationsEnabled: '{{ item.violationNotificationsEnabled }}'
      workloadOptions: '{{ item.workloadOptions }}'
  uid_template: '{item.name}'
- discovery_id: gcp.assuredworkloads.organizations.locations.workloads.updates.list
  calls:
  - action: organizations.locations.workloads.updates.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.updates }}'
    item:
      createTime: '{{ item.createTime }}'
      details: '{{ item.details }}'
      name: '{{ item.name }}'
      state: '{{ item.state }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.assuredworkloads.organizations.locations.workloads.violations.list
  calls:
  - action: organizations.locations.workloads.violations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.violations }}'
    item:
      acknowledged: '{{ item.acknowledged }}'
      acknowledgementTime: '{{ item.acknowledgementTime }}'
      associatedOrgPolicyViolationId: '{{ item.associatedOrgPolicyViolationId }}'
      auditLogLink: '{{ item.auditLogLink }}'
      beginTime: '{{ item.beginTime }}'
      category: '{{ item.category }}'
      description: '{{ item.description }}'
      exceptionAuditLogLink: '{{ item.exceptionAuditLogLink }}'
      exceptionContexts: '{{ item.exceptionContexts }}'
      name: '{{ item.name }}'
      nonCompliantOrgPolicy: '{{ item.nonCompliantOrgPolicy }}'
      orgPolicyConstraint: '{{ item.orgPolicyConstraint }}'
      parentProjectNumber: '{{ item.parentProjectNumber }}'
      remediation: '{{ item.remediation }}'
      resolveTime: '{{ item.resolveTime }}'
      resourceName: '{{ item.resourceName }}'
      resourceType: '{{ item.resourceType }}'
      state: '{{ item.state }}'
      updateTime: '{{ item.updateTime }}'
      violationType: '{{ item.violationType }}'
  uid_template: '{item.name}'
- discovery_id: gcp.assuredworkloads.organizations.locations.operations.get
  for_each: gcp.assuredworkloads.organizations.locations.operations.list
  calls:
  - action: organizations.locations.operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
- discovery_id: gcp.assuredworkloads.organizations.locations.workloads.analyzeWorkloadMove
  for_each: gcp.assuredworkloads.organizations.locations.workloads.list
  calls:
  - action: organizations.locations.workloads.analyzeWorkloadMove
    params:
      target: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      assetMoveAnalyses: '{{ response.assetMoveAnalyses }}'
- discovery_id: gcp.assuredworkloads.organizations.locations.workloads.get
  for_each: gcp.assuredworkloads.organizations.locations.workloads.list
  calls:
  - action: organizations.locations.workloads.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      billingAccount: '{{ response.billingAccount }}'
      complianceRegime: '{{ response.complianceRegime }}'
      complianceStatus: '{{ response.complianceStatus }}'
      compliantButDisallowedServices: '{{ response.compliantButDisallowedServices
        }}'
      createTime: '{{ response.createTime }}'
      displayName: '{{ response.displayName }}'
      ekmProvisioningResponse: '{{ response.ekmProvisioningResponse }}'
      enableSovereignControls: '{{ response.enableSovereignControls }}'
      kajEnrollmentState: '{{ response.kajEnrollmentState }}'
      kmsSettings: '{{ response.kmsSettings }}'
      labels: '{{ response.labels }}'
      name: '{{ response.name }}'
      partner: '{{ response.partner }}'
      partnerPermissions: '{{ response.partnerPermissions }}'
      partnerServicesBillingAccount: '{{ response.partnerServicesBillingAccount }}'
      provisionedResourcesParent: '{{ response.provisionedResourcesParent }}'
      resourceMonitoringEnabled: '{{ response.resourceMonitoringEnabled }}'
      resourceSettings: '{{ response.resourceSettings }}'
      resources: '{{ response.resources }}'
      saaEnrollmentResponse: '{{ response.saaEnrollmentResponse }}'
      violationNotificationsEnabled: '{{ response.violationNotificationsEnabled }}'
      workloadOptions: '{{ response.workloadOptions }}'
- discovery_id: gcp.assuredworkloads.organizations.locations.workloads.violations.get
  for_each: gcp.assuredworkloads.organizations.locations.workloads.violations.list
  calls:
  - action: organizations.locations.workloads.violations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      acknowledged: '{{ response.acknowledged }}'
      acknowledgementTime: '{{ response.acknowledgementTime }}'
      associatedOrgPolicyViolationId: '{{ response.associatedOrgPolicyViolationId
        }}'
      auditLogLink: '{{ response.auditLogLink }}'
      beginTime: '{{ response.beginTime }}'
      category: '{{ response.category }}'
      description: '{{ response.description }}'
      exceptionAuditLogLink: '{{ response.exceptionAuditLogLink }}'
      exceptionContexts: '{{ response.exceptionContexts }}'
      name: '{{ response.name }}'
      nonCompliantOrgPolicy: '{{ response.nonCompliantOrgPolicy }}'
      orgPolicyConstraint: '{{ response.orgPolicyConstraint }}'
      parentProjectNumber: '{{ response.parentProjectNumber }}'
      remediation: '{{ response.remediation }}'
      resolveTime: '{{ response.resolveTime }}'
      resourceName: '{{ response.resourceName }}'
      resourceType: '{{ response.resourceType }}'
      state: '{{ response.state }}'
      updateTime: '{{ response.updateTime }}'
      violationType: '{{ response.violationType }}'
