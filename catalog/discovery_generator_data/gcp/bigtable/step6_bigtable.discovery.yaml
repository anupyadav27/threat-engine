version: '1.0'
provider: gcp
service: bigtable
discovery:
- discovery_id: gcp.bigtable.list_tables
  calls:
  - action: projects.instances.tables.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      name: '{{ item.name }}'
      granularity: '{{ item.granularity }}'
      clusterStates: '{{ item.clusterStates }}'
      columnFamilies: '{{ item.columnFamilies }}'
      stats: '{{ item.stats }}'
      restoreInfo: '{{ item.restoreInfo }}'
  uid_template: '{item.name}'
- discovery_id: gcp.bigtable.tables.list
  calls:
  - action: projects.instances.tables.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      name: '{{ item.name }}'
      granularity: '{{ item.granularity }}'
      clusterStates: '{{ item.clusterStates }}'
      columnFamilies: '{{ item.columnFamilies }}'
      stats: '{{ item.stats }}'
      restoreInfo: '{{ item.restoreInfo }}'
  uid_template: '{item.name}'
- discovery_id: gcp.bigtableadmin.projects.instances.list
  calls:
  - action: projects.instances.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.instances }}'
    item:
      name: '{{ item.name }}'
      createTime: '{{ item.createTime }}'
      labels: '{{ item.labels }}'
      state: '{{ item.state }}'
      displayName: '{{ item.displayName }}'
      satisfiesPzi: '{{ item.satisfiesPzi }}'
      satisfiesPzs: '{{ item.satisfiesPzs }}'
      tags: '{{ item.tags }}'
      type: '{{ item.type }}'
  uid_template: '{item.name}'
- discovery_id: gcp.bigtableadmin.projects.instances.appProfiles.list
