      description: '{{ item.description }}'
      dataBoostIsolationReadOnly: '{{ item.dataBoostIsolationReadOnly }}'
      multiClusterRoutingUseAny: '{{ item.multiClusterRoutingUseAny }}'
      priority: '{{ item.priority }}'
      singleClusterRouting: '{{ item.singleClusterRouting }}'
      standardIsolation: '{{ item.standardIsolation }}'
  uid_template: '{item.name}'
- discovery_id: gcp.bigtableadmin.projects.instances.tables.list
