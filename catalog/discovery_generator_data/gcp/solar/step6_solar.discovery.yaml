version: '1.0'
provider: gcp
service: solar
services:
  client: solar
  module: googleapiclient.discovery.build('solar', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.solar.buildingInsights.findClosest
  calls:
  - action: buildingInsights.findClosest
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      administrativeArea: '{{ response.administrativeArea }}'
      boundingBox: '{{ response.boundingBox }}'
      center: '{{ response.center }}'
      imageryDate: '{{ response.imageryDate }}'
      imageryProcessedDate: '{{ response.imageryProcessedDate }}'
      imageryQuality: '{{ response.imageryQuality }}'
      name: '{{ response.name }}'
      postalCode: '{{ response.postalCode }}'
      regionCode: '{{ response.regionCode }}'
      solarPotential: '{{ response.solarPotential }}'
      statisticalArea: '{{ response.statisticalArea }}'
  uid_template: '{item.name}'
- discovery_id: gcp.solar.dataLayers.get
  calls:
  - action: dataLayers.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      annualFluxUrl: '{{ response.annualFluxUrl }}'
      dsmUrl: '{{ response.dsmUrl }}'
      hourlyShadeUrls: '{{ response.hourlyShadeUrls }}'
      imageryDate: '{{ response.imageryDate }}'
      imageryProcessedDate: '{{ response.imageryProcessedDate }}'
      imageryQuality: '{{ response.imageryQuality }}'
      maskUrl: '{{ response.maskUrl }}'
      monthlyFluxUrl: '{{ response.monthlyFluxUrl }}'
      rgbUrl: '{{ response.rgbUrl }}'
- discovery_id: gcp.solar.geoTiff.get
  calls:
  - action: geoTiff.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      contentType: '{{ response.contentType }}'
      data: '{{ response.data }}'
      extensions: '{{ response.extensions }}'
