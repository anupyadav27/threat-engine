version: '1.0'
provider: gcp
service: datalabeling
services:
  client: datalabeling
  module: googleapiclient.discovery.build('datalabeling', 'v1beta1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.datalabeling.projects.annotationSpecSets.list
  calls:
  - action: projects.annotationSpecSets.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.annotationSpecSets }}'
    item:
      annotationSpecs: '{{ item.annotationSpecs }}'
      blockingResources: '{{ item.blockingResources }}'
      description: '{{ item.description }}'
      displayName: '{{ item.displayName }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.datalabeling.projects.datasets.annotatedDatasets.dataItems.list
  calls:
  - action: projects.datasets.annotatedDatasets.dataItems.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.dataItems }}'
    item:
      imagePayload: '{{ item.imagePayload }}'
      name: '{{ item.name }}'
      textPayload: '{{ item.textPayload }}'
      videoPayload: '{{ item.videoPayload }}'
  uid_template: '{item.name}'
- discovery_id: gcp.datalabeling.projects.datasets.annotatedDatasets.examples.list
