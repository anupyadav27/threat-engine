version: '1.0'
provider: gcp
service: people
services:
  client: people
  module: googleapiclient.discovery.build('people', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.people.contactGroups.batchGet
  calls:
  - action: contactGroups.batchGet
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      responses: '{{ response.responses }}'
- discovery_id: gcp.people.contactGroups.list
  calls:
  - action: contactGroups.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.contactGroups }}'
    item:
      clientData: '{{ item.clientData }}'
      formattedName: '{{ item.formattedName }}'
      groupType: '{{ item.groupType }}'
      memberCount: '{{ item.memberCount }}'
      memberResourceNames: '{{ item.memberResourceNames }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      resourceName: '{{ item.resourceName }}'
  uid_template: '{item.name}'
- discovery_id: gcp.people.otherContacts.list
  calls:
  - action: otherContacts.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.otherContacts }}'
    item:
      addresses: '{{ item.addresses }}'
      ageRange: '{{ item.ageRange }}'
      ageRanges: '{{ item.ageRanges }}'
      biographies: '{{ item.biographies }}'
      birthdays: '{{ item.birthdays }}'
      braggingRights: '{{ item.braggingRights }}'
      calendarUrls: '{{ item.calendarUrls }}'
      clientData: '{{ item.clientData }}'
      coverPhotos: '{{ item.coverPhotos }}'
      emailAddresses: '{{ item.emailAddresses }}'
      events: '{{ item.events }}'
      externalIds: '{{ item.externalIds }}'
      fileAses: '{{ item.fileAses }}'
      genders: '{{ item.genders }}'
      imClients: '{{ item.imClients }}'
      interests: '{{ item.interests }}'
      locales: '{{ item.locales }}'
      locations: '{{ item.locations }}'
      memberships: '{{ item.memberships }}'
      metadata: '{{ item.metadata }}'
      miscKeywords: '{{ item.miscKeywords }}'
      names: '{{ item.names }}'
      nicknames: '{{ item.nicknames }}'
      occupations: '{{ item.occupations }}'
      organizations: '{{ item.organizations }}'
      phoneNumbers: '{{ item.phoneNumbers }}'
      photos: '{{ item.photos }}'
      relations: '{{ item.relations }}'
      relationshipInterests: '{{ item.relationshipInterests }}'
      relationshipStatuses: '{{ item.relationshipStatuses }}'
      residences: '{{ item.residences }}'
      resourceName: '{{ item.resourceName }}'
      sipAddresses: '{{ item.sipAddresses }}'
      skills: '{{ item.skills }}'
      taglines: '{{ item.taglines }}'
      urls: '{{ item.urls }}'
      userDefined: '{{ item.userDefined }}'
- discovery_id: gcp.people.otherContacts.search
  calls:
  - action: otherContacts.search
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.otherContacts }}'
    item:
      person: '{{ item.person }}'
- discovery_id: gcp.people.people.getBatchGet
  calls:
  - action: people.getBatchGet
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      responses: '{{ response.responses }}'
- discovery_id: gcp.people.people.listDirectoryPeople
  calls:
  - action: people.listDirectoryPeople
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.people }}'
    item:
      addresses: '{{ item.addresses }}'
      ageRange: '{{ item.ageRange }}'
      ageRanges: '{{ item.ageRanges }}'
      biographies: '{{ item.biographies }}'
      birthdays: '{{ item.birthdays }}'
      braggingRights: '{{ item.braggingRights }}'
      calendarUrls: '{{ item.calendarUrls }}'
      clientData: '{{ item.clientData }}'
      coverPhotos: '{{ item.coverPhotos }}'
      emailAddresses: '{{ item.emailAddresses }}'
      events: '{{ item.events }}'
      externalIds: '{{ item.externalIds }}'
      fileAses: '{{ item.fileAses }}'
      genders: '{{ item.genders }}'
      imClients: '{{ item.imClients }}'
      interests: '{{ item.interests }}'
      locales: '{{ item.locales }}'
      locations: '{{ item.locations }}'
      memberships: '{{ item.memberships }}'
      metadata: '{{ item.metadata }}'
      miscKeywords: '{{ item.miscKeywords }}'
      names: '{{ item.names }}'
      nicknames: '{{ item.nicknames }}'
      occupations: '{{ item.occupations }}'
      organizations: '{{ item.organizations }}'
      phoneNumbers: '{{ item.phoneNumbers }}'
      photos: '{{ item.photos }}'
      relations: '{{ item.relations }}'
      relationshipInterests: '{{ item.relationshipInterests }}'
      relationshipStatuses: '{{ item.relationshipStatuses }}'
      residences: '{{ item.residences }}'
      resourceName: '{{ item.resourceName }}'
      sipAddresses: '{{ item.sipAddresses }}'
      skills: '{{ item.skills }}'
      taglines: '{{ item.taglines }}'
      urls: '{{ item.urls }}'
      userDefined: '{{ item.userDefined }}'
- discovery_id: gcp.people.people.searchContacts
  calls:
  - action: people.searchContacts
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      results: '{{ response.results }}'
- discovery_id: gcp.people.people.searchDirectoryPeople
  calls:
  - action: people.searchDirectoryPeople
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      people: '{{ response.people }}'
      totalSize: '{{ response.totalSize }}'
- discovery_id: gcp.people.contactGroups.get
  for_each: gcp.people.contactGroups.list
  calls:
  - action: contactGroups.get
    params:
      resourceName: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      clientData: '{{ response.clientData }}'
      formattedName: '{{ response.formattedName }}'
      groupType: '{{ response.groupType }}'
      memberCount: '{{ response.memberCount }}'
      memberResourceNames: '{{ response.memberResourceNames }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      resourceName: '{{ response.resourceName }}'
- discovery_id: gcp.people.people.connections.list
  for_each: gcp.people.people.listDirectoryPeople
  calls:
  - action: people.connections.list
    params:
      resourceName: '{{ item.ageRange }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.connections }}'
    item:
      addresses: '{{ item.addresses }}'
      ageRange: '{{ item.ageRange }}'
      ageRanges: '{{ item.ageRanges }}'
      biographies: '{{ item.biographies }}'
      birthdays: '{{ item.birthdays }}'
      braggingRights: '{{ item.braggingRights }}'
      calendarUrls: '{{ item.calendarUrls }}'
      clientData: '{{ item.clientData }}'
      coverPhotos: '{{ item.coverPhotos }}'
      emailAddresses: '{{ item.emailAddresses }}'
      events: '{{ item.events }}'
      externalIds: '{{ item.externalIds }}'
      fileAses: '{{ item.fileAses }}'
      genders: '{{ item.genders }}'
      imClients: '{{ item.imClients }}'
      interests: '{{ item.interests }}'
      locales: '{{ item.locales }}'
      locations: '{{ item.locations }}'
      memberships: '{{ item.memberships }}'
      metadata: '{{ item.metadata }}'
      miscKeywords: '{{ item.miscKeywords }}'
      names: '{{ item.names }}'
      nicknames: '{{ item.nicknames }}'
      occupations: '{{ item.occupations }}'
      organizations: '{{ item.organizations }}'
      phoneNumbers: '{{ item.phoneNumbers }}'
      photos: '{{ item.photos }}'
      relations: '{{ item.relations }}'
      relationshipInterests: '{{ item.relationshipInterests }}'
      relationshipStatuses: '{{ item.relationshipStatuses }}'
      residences: '{{ item.residences }}'
      resourceName: '{{ item.resourceName }}'
      sipAddresses: '{{ item.sipAddresses }}'
      skills: '{{ item.skills }}'
      taglines: '{{ item.taglines }}'
      urls: '{{ item.urls }}'
      userDefined: '{{ item.userDefined }}'
- discovery_id: gcp.people.people.get
  for_each: gcp.people.people.listDirectoryPeople
  calls:
  - action: people.get
    params:
      resourceName: '{{ item.ageRange }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      addresses: '{{ response.addresses }}'
      ageRange: '{{ response.ageRange }}'
      ageRanges: '{{ response.ageRanges }}'
      biographies: '{{ response.biographies }}'
      birthdays: '{{ response.birthdays }}'
      braggingRights: '{{ response.braggingRights }}'
      calendarUrls: '{{ response.calendarUrls }}'
      clientData: '{{ response.clientData }}'
      coverPhotos: '{{ response.coverPhotos }}'
      emailAddresses: '{{ response.emailAddresses }}'
      events: '{{ response.events }}'
      externalIds: '{{ response.externalIds }}'
      fileAses: '{{ response.fileAses }}'
      genders: '{{ response.genders }}'
      imClients: '{{ response.imClients }}'
      interests: '{{ response.interests }}'
      locales: '{{ response.locales }}'
      locations: '{{ response.locations }}'
      memberships: '{{ response.memberships }}'
      metadata: '{{ response.metadata }}'
      miscKeywords: '{{ response.miscKeywords }}'
      names: '{{ response.names }}'
      nicknames: '{{ response.nicknames }}'
      occupations: '{{ response.occupations }}'
      organizations: '{{ response.organizations }}'
      phoneNumbers: '{{ response.phoneNumbers }}'
      photos: '{{ response.photos }}'
      relations: '{{ response.relations }}'
      relationshipInterests: '{{ response.relationshipInterests }}'
      relationshipStatuses: '{{ response.relationshipStatuses }}'
      residences: '{{ response.residences }}'
      resourceName: '{{ response.resourceName }}'
      sipAddresses: '{{ response.sipAddresses }}'
      skills: '{{ response.skills }}'
      taglines: '{{ response.taglines }}'
      urls: '{{ response.urls }}'
      userDefined: '{{ response.userDefined }}'
