version: '1.0'
provider: gcp
service: cloudfunctions

services:
  client: cloudfunctions
  module: "googleapiclient.discovery.build('cloudfunctions', 'v1')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: unknown
    identifier_op: gcp.cloudfunctions.projects.locations.functions.list
    identifier_field: functions[].name
    item_var_path: item.functions[].name

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.cloudfunctions.projects.locations.functions.list ──
  - discovery_id: gcp.cloudfunctions.projects.locations.functions.list
    calls:
      - action: projects.locations.functions.list
        params:
          parent: '{{ project_id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        automaticUpdatePolicy: '{{ item.automaticUpdatePolicy }}'
        availableMemoryMb: '{{ item.availableMemoryMb }}'
        bindings: '{{ item.bindings }}'
        buildEnvironmentVariables: '{{ item.buildEnvironmentVariables }}'
        buildId: '{{ item.buildId }}'
        buildName: '{{ item.buildName }}'
        buildServiceAccount: '{{ item.buildServiceAccount }}'
        buildWorkerPool: '{{ item.buildWorkerPool }}'
        description: '{{ item.description }}'
        dockerRegistry: '{{ item.dockerRegistry }}'
        dockerRepository: '{{ item.dockerRepository }}'
        entryPoint: '{{ item.entryPoint }}'
        environmentVariables: '{{ item.environmentVariables }}'
        eventTrigger: '{{ item.eventTrigger }}'
        httpsTrigger: '{{ item.httpsTrigger }}'
        ingressSettings: '{{ item.ingressSettings }}'
        kmsKeyName: '{{ item.kmsKeyName }}'
        labels: '{{ item.labels }}'
        maxInstances: '{{ item.maxInstances }}'
        minInstances: '{{ item.minInstances }}'
        name: '{{ item.name }}'
        network: '{{ item.network }}'
        onDeployUpdatePolicy: '{{ item.onDeployUpdatePolicy }}'
        runtime: '{{ item.runtime }}'
        satisfiesPzi: '{{ item.satisfiesPzi }}'
        satisfiesPzs: '{{ item.satisfiesPzs }}'
        secretEnvironmentVariables: '{{ item.secretEnvironmentVariables }}'
        secretVolumes: '{{ item.secretVolumes }}'
        serviceAccountEmail: '{{ item.serviceAccountEmail }}'
