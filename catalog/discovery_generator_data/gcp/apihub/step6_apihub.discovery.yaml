  calls:
  - action: projects.locations.addons.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.addons }}'
    item:
      config: '{{ item.config }}'
      createTime: '{{ item.createTime }}'
      dataSource: '{{ item.dataSource }}'
      description: '{{ item.description }}'
      displayName: '{{ item.displayName }}'
      name: '{{ item.name }}'
      state: '{{ item.state }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
