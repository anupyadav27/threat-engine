# ============================================================
# Discovery YAML — dlp (final_discovery v1)
# Generated: 2026-04-16T09:26:47Z
# Source: gcp_master_field_catalog.csv
# Check rules: 20 | ops in scope: 2 (2 independent, 0 dependent)
# ============================================================
version: '1.0'
provider: gcp
service: dlp

services:
  client: dlp
  module: "googleapiclient.discovery.build('dlp', 'v1')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: unknown
    identifier_op: gcp.dlp.projects.dlpJobs.list
    identifier_field: jobs[].name
    item_var_path: item.jobs[].name
  - resource_type: unknown
    identifier_op: gcp.dlp.projects.inspectTemplates.list
    identifier_field: inspectTemplates[].name
    item_var_path: item.inspectTemplates[].name

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.dlp.projects.dlpJobs.list ──
  - discovery_id: gcp.dlp.projects.dlpJobs.list
    calls:
      - action: projects.dlpJobs.list
        params:
          parent: '{{ project_id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        actionDetails: '{{ item.actionDetails }}'
        bindings: '{{ item.bindings }}'
        createTime: '{{ item.createTime }}'
        encryption: '{{ item.encryption }}'
        endTime: '{{ item.endTime }}'
        errors: '{{ item.errors }}'
        inspectDetails: '{{ item.inspectDetails }}'
        jobTriggerName: '{{ item.jobTriggerName }}'
        lastModified: '{{ item.lastModified }}'
        name: '{{ item.name }}'
        riskDetails: '{{ item.riskDetails }}'
        startTime: '{{ item.startTime }}'
        state: '{{ item.state }}'
        status: '{{ item.status }}'
        type: '{{ item.type }}'

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.dlp.projects.inspectTemplates.list ──
  - discovery_id: gcp.dlp.projects.inspectTemplates.list
    calls:
      - action: projects.inspectTemplates.list
        params:
          parent: '{{ project_id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        createTime: '{{ item.createTime }}'
        description: '{{ item.description }}'
        displayName: '{{ item.displayName }}'
        inspectConfig: '{{ item.inspectConfig }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        updateTime: '{{ item.updateTime }}'

