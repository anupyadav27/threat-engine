version: '1.0'
provider: gcp
service: advisorynotifications
services:
  client: advisorynotifications
  module: googleapiclient.discovery.build('advisorynotifications', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.advisorynotifications.organizations.locations.getSettings
  calls:
  - action: organizations.locations.getSettings
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      name: '{{ response.name }}'
      notificationSettings: '{{ response.notificationSettings }}'
  uid_template: '{item.name}'
- discovery_id: gcp.advisorynotifications.organizations.locations.notifications.list
  calls:
  - action: organizations.locations.notifications.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.notifications }}'
    item:
      createTime: '{{ item.createTime }}'
      messages: '{{ item.messages }}'
      name: '{{ item.name }}'
      notificationType: '{{ item.notificationType }}'
      subject: '{{ item.subject }}'
  uid_template: '{item.name}'
- discovery_id: gcp.advisorynotifications.projects.locations.getSettings
  calls:
  - action: projects.locations.getSettings
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      name: '{{ response.name }}'
      notificationSettings: '{{ response.notificationSettings }}'
  uid_template: '{item.name}'
- discovery_id: gcp.advisorynotifications.projects.locations.notifications.list
  calls:
  - action: projects.locations.notifications.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.notifications }}'
    item:
      createTime: '{{ item.createTime }}'
      messages: '{{ item.messages }}'
      name: '{{ item.name }}'
      notificationType: '{{ item.notificationType }}'
      subject: '{{ item.subject }}'
  uid_template: '{item.name}'
- discovery_id: gcp.advisorynotifications.organizations.locations.notifications.get
  for_each: gcp.advisorynotifications.projects.locations.notifications.list
  calls:
  - action: organizations.locations.notifications.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      createTime: '{{ response.createTime }}'
      messages: '{{ response.messages }}'
      name: '{{ response.name }}'
      notificationType: '{{ response.notificationType }}'
      subject: '{{ response.subject }}'
- discovery_id: gcp.advisorynotifications.projects.locations.notifications.get
  for_each: gcp.advisorynotifications.projects.locations.notifications.list
  calls:
  - action: projects.locations.notifications.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      createTime: '{{ response.createTime }}'
      messages: '{{ response.messages }}'
      name: '{{ response.name }}'
      notificationType: '{{ response.notificationType }}'
      subject: '{{ response.subject }}'
