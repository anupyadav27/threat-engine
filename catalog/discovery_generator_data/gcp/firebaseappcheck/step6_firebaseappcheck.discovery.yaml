version: '1.0'
provider: gcp
service: firebaseappcheck
services:
  client: firebaseappcheck
  module: googleapiclient.discovery.build('firebaseappcheck', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.firebaseappcheck.projects.apps.appAttestConfig.batchGet
  calls:
  - action: projects.apps.appAttestConfig.batchGet
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      configs: '{{ response.configs }}'
- discovery_id: gcp.firebaseappcheck.projects.apps.debugTokens.list
  calls:
  - action: projects.apps.debugTokens.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.debugTokens }}'
    item:
      displayName: '{{ item.displayName }}'
      name: '{{ item.name }}'
      token: '{{ item.token }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.firebaseappcheck.projects.apps.deviceCheckConfig.batchGet
  calls:
  - action: projects.apps.deviceCheckConfig.batchGet
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      configs: '{{ response.configs }}'
- discovery_id: gcp.firebaseappcheck.projects.apps.playIntegrityConfig.batchGet
  calls:
  - action: projects.apps.playIntegrityConfig.batchGet
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      configs: '{{ response.configs }}'
- discovery_id: gcp.firebaseappcheck.projects.apps.recaptchaEnterpriseConfig.batchGet
  calls:
  - action: projects.apps.recaptchaEnterpriseConfig.batchGet
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      configs: '{{ response.configs }}'
- discovery_id: gcp.firebaseappcheck.projects.apps.recaptchaV3Config.batchGet
  calls:
  - action: projects.apps.recaptchaV3Config.batchGet
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      configs: '{{ response.configs }}'
- discovery_id: gcp.firebaseappcheck.projects.apps.safetyNetConfig.batchGet
  calls:
  - action: projects.apps.safetyNetConfig.batchGet
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      configs: '{{ response.configs }}'
- discovery_id: gcp.firebaseappcheck.projects.services.list
  calls:
  - action: projects.services.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.services }}'
    item:
      enforcementMode: '{{ item.enforcementMode }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.firebaseappcheck.projects.services.resourcePolicies.list
  calls:
  - action: projects.services.resourcePolicies.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.resourcePolicies }}'
    item:
      enforcementMode: '{{ item.enforcementMode }}'
      name: '{{ item.name }}'
      targetResource: '{{ item.targetResource }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.firebaseappcheck.jwks.get
  for_each: gcp.firebaseappcheck.projects.apps.debugTokens.list
  calls:
  - action: jwks.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      keys: '{{ response.keys }}'
- discovery_id: gcp.firebaseappcheck.projects.apps.appAttestConfig.get
  calls:
  - action: projects.apps.appAttestConfig.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      name: '{{ response.name }}'
      tokenTtl: '{{ response.tokenTtl }}'
  uid_template: '{item.name}'
- discovery_id: gcp.firebaseappcheck.projects.apps.debugTokens.get
  for_each: gcp.firebaseappcheck.projects.apps.debugTokens.list
  calls:
  - action: projects.apps.debugTokens.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      displayName: '{{ response.displayName }}'
      name: '{{ response.name }}'
      token: '{{ response.token }}'
      updateTime: '{{ response.updateTime }}'
- discovery_id: gcp.firebaseappcheck.projects.apps.deviceCheckConfig.get
  calls:
  - action: projects.apps.deviceCheckConfig.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      keyId: '{{ response.keyId }}'
      name: '{{ response.name }}'
      privateKey: '{{ response.privateKey }}'
      privateKeySet: '{{ response.privateKeySet }}'
      tokenTtl: '{{ response.tokenTtl }}'
  uid_template: '{item.name}'
- discovery_id: gcp.firebaseappcheck.projects.apps.playIntegrityConfig.get
  calls:
  - action: projects.apps.playIntegrityConfig.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      accountDetails: '{{ response.accountDetails }}'
      appIntegrity: '{{ response.appIntegrity }}'
      deviceIntegrity: '{{ response.deviceIntegrity }}'
      name: '{{ response.name }}'
      tokenTtl: '{{ response.tokenTtl }}'
  uid_template: '{item.name}'
- discovery_id: gcp.firebaseappcheck.projects.apps.recaptchaEnterpriseConfig.get
  calls:
  - action: projects.apps.recaptchaEnterpriseConfig.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      name: '{{ response.name }}'
      riskAnalysis: '{{ response.riskAnalysis }}'
      siteKey: '{{ response.siteKey }}'
      tokenTtl: '{{ response.tokenTtl }}'
  uid_template: '{item.name}'
- discovery_id: gcp.firebaseappcheck.projects.apps.recaptchaV3Config.get
  calls:
  - action: projects.apps.recaptchaV3Config.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      minValidScore: '{{ response.minValidScore }}'
      name: '{{ response.name }}'
      siteSecret: '{{ response.siteSecret }}'
      siteSecretSet: '{{ response.siteSecretSet }}'
      tokenTtl: '{{ response.tokenTtl }}'
  uid_template: '{item.name}'
- discovery_id: gcp.firebaseappcheck.projects.apps.safetyNetConfig.get
  calls:
  - action: projects.apps.safetyNetConfig.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      name: '{{ response.name }}'
      tokenTtl: '{{ response.tokenTtl }}'
  uid_template: '{item.name}'
- discovery_id: gcp.firebaseappcheck.projects.services.get
  for_each: gcp.firebaseappcheck.projects.services.list
  calls:
  - action: projects.services.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      enforcementMode: '{{ response.enforcementMode }}'
      name: '{{ response.name }}'
- discovery_id: gcp.firebaseappcheck.projects.services.resourcePolicies.get
  for_each: gcp.firebaseappcheck.projects.services.resourcePolicies.list
  calls:
  - action: projects.services.resourcePolicies.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      enforcementMode: '{{ response.enforcementMode }}'
      name: '{{ response.name }}'
      targetResource: '{{ response.targetResource }}'
      updateTime: '{{ response.updateTime }}'
