version: '1.0'
provider: gcp
service: parametermanager
services:
  client: parametermanager
  module: googleapiclient.discovery.build('parametermanager', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.parametermanager.projects.locations.get
  calls:
  - action: projects.locations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      displayName: '{{ response.displayName }}'
      labels: '{{ response.labels }}'
      locationId: '{{ response.locationId }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.parametermanager.projects.locations.list
  calls:
  - action: projects.locations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.locations }}'
    item:
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      locationId: '{{ item.locationId }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.parametermanager.projects.locations.parameters.list
  calls:
  - action: projects.locations.parameters.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.parameters }}'
    item:
      createTime: '{{ item.createTime }}'
      format: '{{ item.format }}'
      kmsKey: '{{ item.kmsKey }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      policyMember: '{{ item.policyMember }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.parametermanager.projects.locations.parameters.versions.list
  calls:
  - action: projects.locations.parameters.versions.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.versions }}'
    item:
      createTime: '{{ item.createTime }}'
      disabled: '{{ item.disabled }}'
      kmsKeyVersion: '{{ item.kmsKeyVersion }}'
      name: '{{ item.name }}'
      payload: '{{ item.payload }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.parametermanager.projects.locations.parameters.get
  for_each: gcp.parametermanager.projects.locations.parameters.list
  calls:
  - action: projects.locations.parameters.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      createTime: '{{ response.createTime }}'
      format: '{{ response.format }}'
      kmsKey: '{{ response.kmsKey }}'
      labels: '{{ response.labels }}'
      name: '{{ response.name }}'
      policyMember: '{{ response.policyMember }}'
      updateTime: '{{ response.updateTime }}'
- discovery_id: gcp.parametermanager.projects.locations.parameters.versions.get
  for_each: gcp.parametermanager.projects.locations.parameters.versions.list
  calls:
  - action: projects.locations.parameters.versions.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      createTime: '{{ response.createTime }}'
      disabled: '{{ response.disabled }}'
      kmsKeyVersion: '{{ response.kmsKeyVersion }}'
      name: '{{ response.name }}'
      payload: '{{ response.payload }}'
      updateTime: '{{ response.updateTime }}'
- discovery_id: gcp.parametermanager.projects.locations.parameters.versions.render
  for_each: gcp.parametermanager.projects.locations.parameters.versions.list
  calls:
  - action: projects.locations.parameters.versions.render
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      parameterVersion: '{{ response.parameterVersion }}'
      payload: '{{ response.payload }}'
      renderedPayload: '{{ response.renderedPayload }}'
