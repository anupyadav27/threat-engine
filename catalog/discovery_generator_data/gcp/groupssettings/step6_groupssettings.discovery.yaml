version: '1.0'
provider: gcp
service: groupssettings
services:
  client: groupssettings
  module: googleapiclient.discovery.build('groupssettings', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.groupssettings.groups.get
  calls:
  - action: groups.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      allowExternalMembers: '{{ response.allowExternalMembers }}'
      allowGoogleCommunication: '{{ response.allowGoogleCommunication }}'
      allowWebPosting: '{{ response.allowWebPosting }}'
      archiveOnly: '{{ response.archiveOnly }}'
      customFooterText: '{{ response.customFooterText }}'
      customReplyTo: '{{ response.customReplyTo }}'
      customRolesEnabledForSettingsToBeMerged: '{{ response.customRolesEnabledForSettingsToBeMerged
        }}'
      defaultMessageDenyNotificationText: '{{ response.defaultMessageDenyNotificationText
        }}'
      default_sender: '{{ response.default_sender }}'
      description: '{{ response.description }}'
      email: '{{ response.email }}'
      enableCollaborativeInbox: '{{ response.enableCollaborativeInbox }}'
      favoriteRepliesOnTop: '{{ response.favoriteRepliesOnTop }}'
      includeCustomFooter: '{{ response.includeCustomFooter }}'
      includeInGlobalAddressList: '{{ response.includeInGlobalAddressList }}'
      isArchived: '{{ response.isArchived }}'
      maxMessageBytes: '{{ response.maxMessageBytes }}'
      membersCanPostAsTheGroup: '{{ response.membersCanPostAsTheGroup }}'
      messageDisplayFont: '{{ response.messageDisplayFont }}'
      messageModerationLevel: '{{ response.messageModerationLevel }}'
      name: '{{ response.name }}'
      primaryLanguage: '{{ response.primaryLanguage }}'
      replyTo: '{{ response.replyTo }}'
      sendMessageDenyNotification: '{{ response.sendMessageDenyNotification }}'
      showInGroupDirectory: '{{ response.showInGroupDirectory }}'
      spamModerationLevel: '{{ response.spamModerationLevel }}'
      whoCanAdd: '{{ response.whoCanAdd }}'
      whoCanAddReferences: '{{ response.whoCanAddReferences }}'
      whoCanApproveMembers: '{{ response.whoCanApproveMembers }}'
      whoCanApproveMessages: '{{ response.whoCanApproveMessages }}'
      whoCanAssignTopics: '{{ response.whoCanAssignTopics }}'
      whoCanAssistContent: '{{ response.whoCanAssistContent }}'
      whoCanBanUsers: '{{ response.whoCanBanUsers }}'
      whoCanContactOwner: '{{ response.whoCanContactOwner }}'
      whoCanDeleteAnyPost: '{{ response.whoCanDeleteAnyPost }}'
      whoCanDeleteTopics: '{{ response.whoCanDeleteTopics }}'
      whoCanDiscoverGroup: '{{ response.whoCanDiscoverGroup }}'
      whoCanEnterFreeFormTags: '{{ response.whoCanEnterFreeFormTags }}'
      whoCanHideAbuse: '{{ response.whoCanHideAbuse }}'
      whoCanInvite: '{{ response.whoCanInvite }}'
      whoCanJoin: '{{ response.whoCanJoin }}'
      whoCanLeaveGroup: '{{ response.whoCanLeaveGroup }}'
      whoCanLockTopics: '{{ response.whoCanLockTopics }}'
      whoCanMakeTopicsSticky: '{{ response.whoCanMakeTopicsSticky }}'
      whoCanMarkDuplicate: '{{ response.whoCanMarkDuplicate }}'
      whoCanMarkFavoriteReplyOnAnyTopic: '{{ response.whoCanMarkFavoriteReplyOnAnyTopic
        }}'
      whoCanMarkFavoriteReplyOnOwnTopic: '{{ response.whoCanMarkFavoriteReplyOnOwnTopic
        }}'
      whoCanMarkNoResponseNeeded: '{{ response.whoCanMarkNoResponseNeeded }}'
      whoCanModerateContent: '{{ response.whoCanModerateContent }}'
      whoCanModerateMembers: '{{ response.whoCanModerateMembers }}'
      whoCanModifyMembers: '{{ response.whoCanModifyMembers }}'
      whoCanModifyTagsAndCategories: '{{ response.whoCanModifyTagsAndCategories }}'
      whoCanMoveTopicsIn: '{{ response.whoCanMoveTopicsIn }}'
      whoCanMoveTopicsOut: '{{ response.whoCanMoveTopicsOut }}'
      whoCanPostAnnouncements: '{{ response.whoCanPostAnnouncements }}'
      whoCanPostMessage: '{{ response.whoCanPostMessage }}'
      whoCanTakeTopics: '{{ response.whoCanTakeTopics }}'
      whoCanUnassignTopic: '{{ response.whoCanUnassignTopic }}'
      whoCanUnmarkFavoriteReplyOnAnyTopic: '{{ response.whoCanUnmarkFavoriteReplyOnAnyTopic
        }}'
      whoCanViewGroup: '{{ response.whoCanViewGroup }}'
      whoCanViewMembership: '{{ response.whoCanViewMembership }}'
  uid_template: '{item.name}'
