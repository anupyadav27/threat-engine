version: '1.0'
provider: gcp
service: apigateway
services:
  client: apigateway
  module: googleapiclient.discovery.build('apigateway', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.apigateway.projects.locations.apis.configs.list
  calls:
  - action: projects.locations.apis.configs.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.configs }}'
    item:
      createTime: '{{ item.createTime }}'
      displayName: '{{ item.displayName }}'
      gatewayServiceAccount: '{{ item.gatewayServiceAccount }}'
      grpcServices: '{{ item.grpcServices }}'
      labels: '{{ item.labels }}'
      managedServiceConfigs: '{{ item.managedServiceConfigs }}'
      name: '{{ item.name }}'
      openapiDocuments: '{{ item.openapiDocuments }}'
      serviceConfigId: '{{ item.serviceConfigId }}'
      state: '{{ item.state }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.apigateway.projects.locations.apis.list
  calls:
  - action: projects.locations.apis.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.apis }}'
    item:
      createTime: '{{ item.createTime }}'
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      managedService: '{{ item.managedService }}'
      name: '{{ item.name }}'
      state: '{{ item.state }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.apigateway.projects.locations.gateways.list
  calls:
  - action: projects.locations.gateways.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.gateways }}'
    item:
      apiConfig: '{{ item.apiConfig }}'
      createTime: '{{ item.createTime }}'
      defaultHostname: '{{ item.defaultHostname }}'
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      state: '{{ item.state }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.apigateway.projects.locations.get
  calls:
  - action: projects.locations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      displayName: '{{ response.displayName }}'
      labels: '{{ response.labels }}'
      locationId: '{{ response.locationId }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.apigateway.projects.locations.list
  calls:
  - action: projects.locations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.locations }}'
    item:
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      locationId: '{{ item.locationId }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.apigateway.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.apigateway.projects.locations.apis.configs.get
  for_each: gcp.apigateway.projects.locations.apis.configs.list
  calls:
  - action: projects.locations.apis.configs.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      createTime: '{{ response.createTime }}'
      displayName: '{{ response.displayName }}'
      gatewayServiceAccount: '{{ response.gatewayServiceAccount }}'
      grpcServices: '{{ response.grpcServices }}'
      labels: '{{ response.labels }}'
      managedServiceConfigs: '{{ response.managedServiceConfigs }}'
      name: '{{ response.name }}'
      openapiDocuments: '{{ response.openapiDocuments }}'
      serviceConfigId: '{{ response.serviceConfigId }}'
      state: '{{ response.state }}'
      updateTime: '{{ response.updateTime }}'
- discovery_id: gcp.apigateway.projects.locations.apis.configs.getIamPolicy
  for_each: gcp.apigateway.projects.locations.apis.configs.list
  calls:
  - action: projects.locations.apis.configs.getIamPolicy
    params:
      resource: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      auditConfigs: '{{ response.auditConfigs }}'
      bindings: '{{ response.bindings }}'
      version: '{{ response.version }}'
- discovery_id: gcp.apigateway.projects.locations.apis.get
  for_each: gcp.apigateway.projects.locations.apis.list
  calls:
  - action: projects.locations.apis.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      createTime: '{{ response.createTime }}'
      displayName: '{{ response.displayName }}'
      labels: '{{ response.labels }}'
      managedService: '{{ response.managedService }}'
      name: '{{ response.name }}'
      state: '{{ response.state }}'
      updateTime: '{{ response.updateTime }}'
- discovery_id: gcp.apigateway.projects.locations.apis.getIamPolicy
  for_each: gcp.apigateway.projects.locations.apis.list
  calls:
  - action: projects.locations.apis.getIamPolicy
    params:
      resource: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      auditConfigs: '{{ response.auditConfigs }}'
      bindings: '{{ response.bindings }}'
      version: '{{ response.version }}'
- discovery_id: gcp.apigateway.projects.locations.gateways.get
  for_each: gcp.apigateway.projects.locations.gateways.list
  calls:
  - action: projects.locations.gateways.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      apiConfig: '{{ response.apiConfig }}'
      createTime: '{{ response.createTime }}'
      defaultHostname: '{{ response.defaultHostname }}'
      displayName: '{{ response.displayName }}'
      labels: '{{ response.labels }}'
      name: '{{ response.name }}'
      state: '{{ response.state }}'
      updateTime: '{{ response.updateTime }}'
- discovery_id: gcp.apigateway.projects.locations.gateways.getIamPolicy
  for_each: gcp.apigateway.projects.locations.gateways.list
  calls:
  - action: projects.locations.gateways.getIamPolicy
    params:
      resource: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      auditConfigs: '{{ response.auditConfigs }}'
      bindings: '{{ response.bindings }}'
      version: '{{ response.version }}'
- discovery_id: gcp.apigateway.projects.locations.operations.get
  for_each: gcp.apigateway.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
