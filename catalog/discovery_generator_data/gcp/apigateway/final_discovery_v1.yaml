version: '1.0'
provider: gcp
service: apigateway

services:
  client: apigateway
  module: "googleapiclient.discovery.build('apigateway', 'v1')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: unknown
    identifier_op: gcp.apigateway.projects.locations.apis.configs.list
    identifier_field: apiConfigs[].name
    item_var_path: item.apiConfigs[].name
  - resource_type: unknown
    identifier_op: gcp.apigateway.projects.locations.apis.list
    identifier_field: apis[].name
    item_var_path: item.apis[].name
  - resource_type: unknown
    identifier_op: gcp.apigateway.projects.locations.gateways.list
    identifier_field: gateways[].name
    item_var_path: item.gateways[].name

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.apigateway.projects.locations.apis.configs.list ──
  - discovery_id: gcp.apigateway.projects.locations.apis.configs.list
    calls:
      - action: projects.locations.apis.configs.list
        params:
          parent: '{{ project_id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        createTime: '{{ item.createTime }}'
        displayName: '{{ item.displayName }}'
        gatewayConfig: '{{ item.gatewayConfig }}'
        gatewayServiceAccount: '{{ item.gatewayServiceAccount }}'
        grpcServices: '{{ item.grpcServices }}'
        labels: '{{ item.labels }}'
        managedServiceConfigs: '{{ item.managedServiceConfigs }}'
        name: '{{ item.name }}'
        openapiDocuments: '{{ item.openapiDocuments }}'
        serviceConfigId: '{{ item.serviceConfigId }}'
        state: '{{ item.state }}'
        updateTime: '{{ item.updateTime }}'

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.apigateway.projects.locations.apis.list ──
  - discovery_id: gcp.apigateway.projects.locations.apis.list
    calls:
      - action: projects.locations.apis.list
        params:
          parent: '{{ project_id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        createTime: '{{ item.createTime }}'
        displayName: '{{ item.displayName }}'
        labels: '{{ item.labels }}'
        managedService: '{{ item.managedService }}'
        name: '{{ item.name }}'
        state: '{{ item.state }}'
        updateTime: '{{ item.updateTime }}'

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.apigateway.projects.locations.gateways.list ──
  - discovery_id: gcp.apigateway.projects.locations.gateways.list
    calls:
      - action: projects.locations.gateways.list
        params:
          parent: '{{ project_id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        apiConfig: '{{ item.apiConfig }}'
        createTime: '{{ item.createTime }}'
        defaultHostname: '{{ item.defaultHostname }}'
        displayName: '{{ item.displayName }}'
        labels: '{{ item.labels }}'
        name: '{{ item.name }}'
        state: '{{ item.state }}'
        updateTime: '{{ item.updateTime }}'

