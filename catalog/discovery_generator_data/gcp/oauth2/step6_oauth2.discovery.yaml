version: '1.0'
provider: gcp
service: oauth2
services:
  client: oauth2
  module: googleapiclient.discovery.build('oauth2', 'v2')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.oauth2.userinfo.get
  calls:
  - action: userinfo.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      email: '{{ response.email }}'
      family_name: '{{ response.family_name }}'
      gender: '{{ response.gender }}'
      given_name: '{{ response.given_name }}'
      hd: '{{ response.hd }}'
      id: '{{ response.id }}'
      link: '{{ response.link }}'
      locale: '{{ response.locale }}'
      name: '{{ response.name }}'
      picture: '{{ response.picture }}'
      verified_email: '{{ response.verified_email }}'
  uid_template: '{item.name}'
- discovery_id: gcp.oauth2.userinfo.v2.me.get
  calls:
  - action: userinfo.v2.me.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      email: '{{ response.email }}'
      family_name: '{{ response.family_name }}'
      gender: '{{ response.gender }}'
      given_name: '{{ response.given_name }}'
      hd: '{{ response.hd }}'
      id: '{{ response.id }}'
      link: '{{ response.link }}'
      locale: '{{ response.locale }}'
      name: '{{ response.name }}'
      picture: '{{ response.picture }}'
      verified_email: '{{ response.verified_email }}'
  uid_template: '{item.name}'
