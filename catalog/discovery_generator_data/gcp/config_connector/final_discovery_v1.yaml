# ============================================================
# Discovery YAML — config_connector (final_discovery v1)
# Generated: 2026-04-16T11:27:57Z
# Check rules: auto | ops in scope: 1
# ============================================================
version: 'v1'
provider: gcp
service: config_connector

services:
  client: config_connector
  module: "googleapiclient.discovery.build('config_connector', 'v1')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  []

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.cloudasset.assets.list ──
  - discovery_id: gcp.cloudasset.assets.list
    calls:
      - action: assets.list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        accessLevel: '{{ item.accessLevel }}'
        accessPolicy: '{{ item.accessPolicy }}'
        ancestors: '{{ item.ancestors }}'
        assetType: '{{ item.assetType }}'
        iamPolicy: '{{ item.iamPolicy }}'
        name: '{{ item.name }}'
        orgPolicy: '{{ item.orgPolicy }}'
        relatedAssets: '{{ item.relatedAssets }}'
        relatedResources: '{{ item.relatedResources }}'
        resource: '{{ item.resource }}'
        servicePerimeter: '{{ item.servicePerimeter }}'
        updateTime: '{{ item.updateTime }}'
