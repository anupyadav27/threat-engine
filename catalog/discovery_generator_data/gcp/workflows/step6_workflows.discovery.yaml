version: '1.0'
provider: gcp
service: workflows
services:
  client: workflows
  module: googleapiclient.discovery.build('workflows', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.workflows.projects.locations.get
  calls:
  - action: projects.locations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      displayName: '{{ response.displayName }}'
      labels: '{{ response.labels }}'
      locationId: '{{ response.locationId }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.workflows.projects.locations.list
  calls:
  - action: projects.locations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.locations }}'
    item:
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      locationId: '{{ item.locationId }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.workflows.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.workflows.projects.locations.workflows.list
  calls:
  - action: projects.locations.workflows.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.workflows }}'
    item:
      allKmsKeys: '{{ item.allKmsKeys }}'
      allKmsKeysVersions: '{{ item.allKmsKeysVersions }}'
      callLogLevel: '{{ item.callLogLevel }}'
      createTime: '{{ item.createTime }}'
      cryptoKeyName: '{{ item.cryptoKeyName }}'
      cryptoKeyVersion: '{{ item.cryptoKeyVersion }}'
      description: '{{ item.description }}'
      executionHistoryLevel: '{{ item.executionHistoryLevel }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      revisionCreateTime: '{{ item.revisionCreateTime }}'
      revisionId: '{{ item.revisionId }}'
      serviceAccount: '{{ item.serviceAccount }}'
      sourceContents: '{{ item.sourceContents }}'
      state: '{{ item.state }}'
      stateError: '{{ item.stateError }}'
      tags: '{{ item.tags }}'
      updateTime: '{{ item.updateTime }}'
      userEnvVars: '{{ item.userEnvVars }}'
  uid_template: '{item.name}'
- discovery_id: gcp.workflows.projects.locations.operations.get
  for_each: gcp.workflows.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
- discovery_id: gcp.workflows.projects.locations.workflows.get
  for_each: gcp.workflows.projects.locations.workflows.list
  calls:
  - action: projects.locations.workflows.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      allKmsKeys: '{{ response.allKmsKeys }}'
      allKmsKeysVersions: '{{ response.allKmsKeysVersions }}'
      callLogLevel: '{{ response.callLogLevel }}'
      createTime: '{{ response.createTime }}'
      cryptoKeyName: '{{ response.cryptoKeyName }}'
      cryptoKeyVersion: '{{ response.cryptoKeyVersion }}'
      description: '{{ response.description }}'
      executionHistoryLevel: '{{ response.executionHistoryLevel }}'
      labels: '{{ response.labels }}'
      name: '{{ response.name }}'
      revisionCreateTime: '{{ response.revisionCreateTime }}'
      revisionId: '{{ response.revisionId }}'
      serviceAccount: '{{ response.serviceAccount }}'
      sourceContents: '{{ response.sourceContents }}'
      state: '{{ response.state }}'
      stateError: '{{ response.stateError }}'
      tags: '{{ response.tags }}'
      updateTime: '{{ response.updateTime }}'
      userEnvVars: '{{ response.userEnvVars }}'
- discovery_id: gcp.workflows.projects.locations.workflows.listRevisions
  for_each: gcp.workflows.projects.locations.workflows.list
  calls:
  - action: projects.locations.workflows.listRevisions
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.workflows }}'
    item:
      allKmsKeys: '{{ item.allKmsKeys }}'
      allKmsKeysVersions: '{{ item.allKmsKeysVersions }}'
      callLogLevel: '{{ item.callLogLevel }}'
      createTime: '{{ item.createTime }}'
      cryptoKeyName: '{{ item.cryptoKeyName }}'
      cryptoKeyVersion: '{{ item.cryptoKeyVersion }}'
      description: '{{ item.description }}'
      executionHistoryLevel: '{{ item.executionHistoryLevel }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      revisionCreateTime: '{{ item.revisionCreateTime }}'
      revisionId: '{{ item.revisionId }}'
      serviceAccount: '{{ item.serviceAccount }}'
      sourceContents: '{{ item.sourceContents }}'
      state: '{{ item.state }}'
      stateError: '{{ item.stateError }}'
      tags: '{{ item.tags }}'
      updateTime: '{{ item.updateTime }}'
      userEnvVars: '{{ item.userEnvVars }}'
