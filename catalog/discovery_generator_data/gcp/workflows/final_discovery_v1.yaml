version: '1.0'
provider: gcp
service: workflows

services:
  client: workflows
  module: "googleapiclient.discovery.build('workflows', 'v1')"

# Anchors: service-level parameters provided by caller
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: unknown
    identifier_op: gcp.workflows.projects.locations.workflows.list
    identifier_field: workflows[].name
    item_var_path: item.workflows[].name

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.workflows.projects.locations.workflows.list ──
  # python: svc.projects().locations().workflows().list(**params).execute()
  - discovery_id: gcp.workflows.projects.locations.workflows.list
    calls:
      - action: projects.locations.workflows.list
        params:
          parent: '{{ project_id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.workflows }}'
      item:
        allKmsKeys: '{{ item.allKmsKeys }}'
        allKmsKeysVersions: '{{ item.allKmsKeysVersions }}'
        callLogLevel: '{{ item.callLogLevel }}'
        createTime: '{{ item.createTime }}'
        cryptoKeyName: '{{ item.cryptoKeyName }}'
        cryptoKeyVersion: '{{ item.cryptoKeyVersion }}'
        description: '{{ item.description }}'
        executionHistoryLevel: '{{ item.executionHistoryLevel }}'
        labels: '{{ item.labels }}'
        name: '{{ item.name }}'
        revisionCreateTime: '{{ item.revisionCreateTime }}'
        revisionId: '{{ item.revisionId }}'
        serviceAccount: '{{ item.serviceAccount }}'
        sourceContents: '{{ item.sourceContents }}'
        state: '{{ item.state }}'
        stateError: '{{ item.stateError }}'
        tags: '{{ item.tags }}'
        updateTime: '{{ item.updateTime }}'
        userEnvVars: '{{ item.userEnvVars }}'
