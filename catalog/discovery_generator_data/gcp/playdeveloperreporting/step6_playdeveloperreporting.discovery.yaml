version: '1.0'
provider: gcp
service: playdeveloperreporting
services:
  client: playdeveloperreporting
  module: googleapiclient.discovery.build('playdeveloperreporting', 'v1beta1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.playdeveloperreporting.anomalies.list
  calls:
  - action: anomalies.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.anomalies }}'
    item:
      dimensions: '{{ item.dimensions }}'
      metric: '{{ item.metric }}'
      metricSet: '{{ item.metricSet }}'
      name: '{{ item.name }}'
      timelineSpec: '{{ item.timelineSpec }}'
  uid_template: '{item.name}'
- discovery_id: gcp.playdeveloperreporting.apps.search
  calls:
  - action: apps.search
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.apps }}'
    item:
      displayName: '{{ item.displayName }}'
      name: '{{ item.name }}'
      packageName: '{{ item.packageName }}'
  uid_template: '{item.name}'
- discovery_id: gcp.playdeveloperreporting.vitals.errors.issues.search
  calls:
  - action: vitals.errors.issues.search
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.issues }}'
    item:
      annotations: '{{ item.annotations }}'
      cause: '{{ item.cause }}'
      distinctUsers: '{{ item.distinctUsers }}'
      distinctUsersPercent: '{{ item.distinctUsersPercent }}'
      errorReportCount: '{{ item.errorReportCount }}'
      firstAppVersion: '{{ item.firstAppVersion }}'
      firstOsVersion: '{{ item.firstOsVersion }}'
      issueUri: '{{ item.issueUri }}'
      lastAppVersion: '{{ item.lastAppVersion }}'
      lastErrorReportTime: '{{ item.lastErrorReportTime }}'
      lastOsVersion: '{{ item.lastOsVersion }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      sampleErrorReports: '{{ item.sampleErrorReports }}'
      type: '{{ item.type }}'
  uid_template: '{item.name}'
- discovery_id: gcp.playdeveloperreporting.vitals.errors.reports.search
  calls:
  - action: vitals.errors.reports.search
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.reports }}'
    item:
      appVersion: '{{ item.appVersion }}'
      deviceModel: '{{ item.deviceModel }}'
      eventTime: '{{ item.eventTime }}'
      issue: '{{ item.issue }}'
      name: '{{ item.name }}'
      osVersion: '{{ item.osVersion }}'
      reportText: '{{ item.reportText }}'
      type: '{{ item.type }}'
      vcsInformation: '{{ item.vcsInformation }}'
  uid_template: '{item.name}'
- discovery_id: gcp.playdeveloperreporting.apps.fetchReleaseFilterOptions
  for_each: gcp.playdeveloperreporting.apps.search
  calls:
  - action: apps.fetchReleaseFilterOptions
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      tracks: '{{ response.tracks }}'
- discovery_id: gcp.playdeveloperreporting.vitals.anrrate.get
  for_each: gcp.playdeveloperreporting.apps.search
  calls:
  - action: vitals.anrrate.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      freshnessInfo: '{{ response.freshnessInfo }}'
      name: '{{ response.name }}'
- discovery_id: gcp.playdeveloperreporting.vitals.anrrate.query
  for_each: gcp.playdeveloperreporting.apps.search
  calls:
  - action: vitals.anrrate.query
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.anrrate }}'
    item:
      aggregationPeriod: '{{ item.aggregationPeriod }}'
      dimensions: '{{ item.dimensions }}'
      metrics: '{{ item.metrics }}'
      startTime: '{{ item.startTime }}'
- discovery_id: gcp.playdeveloperreporting.vitals.crashrate.get
