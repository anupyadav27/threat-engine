      resourceType: '{{ item.resourceType }}'
      state: '{{ item.state }}'
      subscriberContact: '{{ item.subscriberContact }}'
- discovery_id: gcp.analyticshub.projects.locations.dataExchanges.queryTemplates.get
  for_each: gcp.analyticshub.projects.locations.dataExchanges.queryTemplates.list
