version: '1.0'
provider: gcp
service: analyticshub
services:
  client: analyticshub
  module: googleapiclient.discovery.build('analyticshub', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.analyticshub.organizations.locations.dataExchanges.list
  calls:
  - action: organizations.locations.dataExchanges.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.dataExchanges }}'
    item:
      description: '{{ item.description }}'
      discoveryType: '{{ item.discoveryType }}'
      displayName: '{{ item.displayName }}'
      documentation: '{{ item.documentation }}'
      icon: '{{ item.icon }}'
      listingCount: '{{ item.listingCount }}'
      logLinkedDatasetQueryUserEmail: '{{ item.logLinkedDatasetQueryUserEmail }}'
      name: '{{ item.name }}'
      primaryContact: '{{ item.primaryContact }}'
      sharingEnvironmentConfig: '{{ item.sharingEnvironmentConfig }}'
  uid_template: '{item.name}'
- discovery_id: gcp.analyticshub.projects.locations.dataExchanges.list
  calls:
  - action: projects.locations.dataExchanges.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.dataExchanges }}'
    item:
      description: '{{ item.description }}'
      discoveryType: '{{ item.discoveryType }}'
      displayName: '{{ item.displayName }}'
      documentation: '{{ item.documentation }}'
      icon: '{{ item.icon }}'
      listingCount: '{{ item.listingCount }}'
      logLinkedDatasetQueryUserEmail: '{{ item.logLinkedDatasetQueryUserEmail }}'
      name: '{{ item.name }}'
      primaryContact: '{{ item.primaryContact }}'
      sharingEnvironmentConfig: '{{ item.sharingEnvironmentConfig }}'
  uid_template: '{item.name}'
- discovery_id: gcp.analyticshub.projects.locations.dataExchanges.listings.list
  calls:
  - action: projects.locations.dataExchanges.listings.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.listings }}'
    item:
      allowOnlyMetadataSharing: '{{ item.allowOnlyMetadataSharing }}'
      bigqueryDataset: '{{ item.bigqueryDataset }}'
      categories: '{{ item.categories }}'
      commercialInfo: '{{ item.commercialInfo }}'
      dataProvider: '{{ item.dataProvider }}'
      description: '{{ item.description }}'
      discoveryType: '{{ item.discoveryType }}'
      displayName: '{{ item.displayName }}'
      documentation: '{{ item.documentation }}'
      icon: '{{ item.icon }}'
      logLinkedDatasetQueryUserEmail: '{{ item.logLinkedDatasetQueryUserEmail }}'
      name: '{{ item.name }}'
      primaryContact: '{{ item.primaryContact }}'
      publisher: '{{ item.publisher }}'
      pubsubTopic: '{{ item.pubsubTopic }}'
      requestAccess: '{{ item.requestAccess }}'
      resourceType: '{{ item.resourceType }}'
      restrictedExportConfig: '{{ item.restrictedExportConfig }}'
      state: '{{ item.state }}'
      storedProcedureConfig: '{{ item.storedProcedureConfig }}'
  uid_template: '{item.name}'
- discovery_id: gcp.analyticshub.projects.locations.dataExchanges.queryTemplates.list
  calls:
  - action: projects.locations.dataExchanges.queryTemplates.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.queryTemplates }}'
    item:
      createTime: '{{ item.createTime }}'
      description: '{{ item.description }}'
      displayName: '{{ item.displayName }}'
      documentation: '{{ item.documentation }}'
      name: '{{ item.name }}'
      primaryContact: '{{ item.primaryContact }}'
      proposer: '{{ item.proposer }}'
      routine: '{{ item.routine }}'
      state: '{{ item.state }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.analyticshub.projects.locations.subscriptions.list
  calls:
  - action: projects.locations.subscriptions.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.subscriptions }}'
    item:
      commercialInfo: '{{ item.commercialInfo }}'
      creationTime: '{{ item.creationTime }}'
      dataExchange: '{{ item.dataExchange }}'
      destinationDataset: '{{ item.destinationDataset }}'
      lastModifyTime: '{{ item.lastModifyTime }}'
      linkedDatasetMap: '{{ item.linkedDatasetMap }}'
      linkedResources: '{{ item.linkedResources }}'
      listing: '{{ item.listing }}'
      logLinkedDatasetQueryUserEmail: '{{ item.logLinkedDatasetQueryUserEmail }}'
      name: '{{ item.name }}'
      organizationDisplayName: '{{ item.organizationDisplayName }}'
      organizationId: '{{ item.organizationId }}'
      resourceType: '{{ item.resourceType }}'
      state: '{{ item.state }}'
      subscriberContact: '{{ item.subscriberContact }}'
  uid_template: '{item.name}'
- discovery_id: gcp.analyticshub.projects.locations.dataExchanges.get
  for_each: gcp.analyticshub.projects.locations.dataExchanges.listSubscriptions
  calls:
  - action: projects.locations.dataExchanges.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      description: '{{ response.description }}'
      discoveryType: '{{ response.discoveryType }}'
      displayName: '{{ response.displayName }}'
      documentation: '{{ response.documentation }}'
      icon: '{{ response.icon }}'
      listingCount: '{{ response.listingCount }}'
      logLinkedDatasetQueryUserEmail: '{{ response.logLinkedDatasetQueryUserEmail
        }}'
      name: '{{ response.name }}'
      primaryContact: '{{ response.primaryContact }}'
      sharingEnvironmentConfig: '{{ response.sharingEnvironmentConfig }}'
- discovery_id: gcp.analyticshub.projects.locations.dataExchanges.listSubscriptions
