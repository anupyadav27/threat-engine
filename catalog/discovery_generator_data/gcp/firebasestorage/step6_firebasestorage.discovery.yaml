version: '1.0'
provider: gcp
service: firebasestorage
services:
  client: firebasestorage
  module: googleapiclient.discovery.build('firebasestorage', 'v1beta')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.firebasestorage.projects.buckets.list
  calls:
  - action: projects.buckets.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.buckets }}'
    item:
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.firebasestorage.projects.getDefaultBucket
  calls:
  - action: projects.getDefaultBucket
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      bucket: '{{ response.bucket }}'
      location: '{{ response.location }}'
      name: '{{ response.name }}'
      storageClass: '{{ response.storageClass }}'
  uid_template: '{item.name}'
- discovery_id: gcp.firebasestorage.projects.buckets.get
  for_each: gcp.firebasestorage.projects.buckets.list
  calls:
  - action: projects.buckets.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      name: '{{ response.name }}'
