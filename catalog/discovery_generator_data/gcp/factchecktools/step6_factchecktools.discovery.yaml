version: '1.0'
provider: gcp
service: factchecktools
services:
  client: factchecktools
  module: googleapiclient.discovery.build('factchecktools', 'v1alpha1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.factchecktools.claims.imageSearch
  calls:
  - action: claims.imageSearch
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      results: '{{ response.results }}'
- discovery_id: gcp.factchecktools.claims.search
  calls:
  - action: claims.search
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.claims }}'
    item:
      claimDate: '{{ item.claimDate }}'
      claimReview: '{{ item.claimReview }}'
      claimant: '{{ item.claimant }}'
      text: '{{ item.text }}'
- discovery_id: gcp.factchecktools.pages.list
  calls:
  - action: pages.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.pages }}'
    item:
      claimReviewAuthor: '{{ item.claimReviewAuthor }}'
      claimReviewMarkups: '{{ item.claimReviewMarkups }}'
      name: '{{ item.name }}'
      pageUrl: '{{ item.pageUrl }}'
      publishDate: '{{ item.publishDate }}'
      versionId: '{{ item.versionId }}'
  uid_template: '{item.name}'
- discovery_id: gcp.factchecktools.pages.get
  for_each: gcp.factchecktools.pages.list
  calls:
  - action: pages.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      claimReviewAuthor: '{{ response.claimReviewAuthor }}'
      claimReviewMarkups: '{{ response.claimReviewMarkups }}'
      name: '{{ response.name }}'
      pageUrl: '{{ response.pageUrl }}'
      publishDate: '{{ response.publishDate }}'
      versionId: '{{ response.versionId }}'
