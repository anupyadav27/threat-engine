version: '1.0'
provider: gcp
service: meet
services:
  client: meet
  module: googleapiclient.discovery.build('meet', 'v2')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.meet.conferenceRecords.list
  calls:
  - action: conferenceRecords.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.conferenceRecords }}'
    item:
      endTime: '{{ item.endTime }}'
      expireTime: '{{ item.expireTime }}'
      name: '{{ item.name }}'
      space: '{{ item.space }}'
      startTime: '{{ item.startTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.meet.conferenceRecords.participants.list
  calls:
  - action: conferenceRecords.participants.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.participants }}'
    item:
      anonymousUser: '{{ item.anonymousUser }}'
      earliestStartTime: '{{ item.earliestStartTime }}'
      latestEndTime: '{{ item.latestEndTime }}'
      name: '{{ item.name }}'
      phoneUser: '{{ item.phoneUser }}'
      signedinUser: '{{ item.signedinUser }}'
  uid_template: '{item.name}'
- discovery_id: gcp.meet.conferenceRecords.participants.participantSessions.list
  calls:
  - action: conferenceRecords.participants.participantSessions.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.participantSessions }}'
    item:
      endTime: '{{ item.endTime }}'
      name: '{{ item.name }}'
      startTime: '{{ item.startTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.meet.conferenceRecords.recordings.list
  calls:
  - action: conferenceRecords.recordings.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.recordings }}'
    item:
      driveDestination: '{{ item.driveDestination }}'
      endTime: '{{ item.endTime }}'
      name: '{{ item.name }}'
      startTime: '{{ item.startTime }}'
      state: '{{ item.state }}'
  uid_template: '{item.name}'
- discovery_id: gcp.meet.conferenceRecords.transcripts.entries.list
  calls:
  - action: conferenceRecords.transcripts.entries.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.entries }}'
    item:
      endTime: '{{ item.endTime }}'
      languageCode: '{{ item.languageCode }}'
      name: '{{ item.name }}'
      participant: '{{ item.participant }}'
      startTime: '{{ item.startTime }}'
      text: '{{ item.text }}'
  uid_template: '{item.name}'
- discovery_id: gcp.meet.conferenceRecords.transcripts.list
  calls:
  - action: conferenceRecords.transcripts.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.transcripts }}'
    item:
      docsDestination: '{{ item.docsDestination }}'
      endTime: '{{ item.endTime }}'
      name: '{{ item.name }}'
      startTime: '{{ item.startTime }}'
      state: '{{ item.state }}'
  uid_template: '{item.name}'
- discovery_id: gcp.meet.conferenceRecords.get
  for_each: gcp.meet.conferenceRecords.list
  calls:
  - action: conferenceRecords.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      endTime: '{{ response.endTime }}'
      expireTime: '{{ response.expireTime }}'
      name: '{{ response.name }}'
      space: '{{ response.space }}'
      startTime: '{{ response.startTime }}'
- discovery_id: gcp.meet.conferenceRecords.participants.get
  for_each: gcp.meet.conferenceRecords.participants.list
  calls:
  - action: conferenceRecords.participants.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      anonymousUser: '{{ response.anonymousUser }}'
      earliestStartTime: '{{ response.earliestStartTime }}'
      latestEndTime: '{{ response.latestEndTime }}'
      name: '{{ response.name }}'
      phoneUser: '{{ response.phoneUser }}'
      signedinUser: '{{ response.signedinUser }}'
- discovery_id: gcp.meet.conferenceRecords.participants.participantSessions.get
  for_each: gcp.meet.conferenceRecords.participants.participantSessions.list
  calls:
  - action: conferenceRecords.participants.participantSessions.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      endTime: '{{ response.endTime }}'
      name: '{{ response.name }}'
      startTime: '{{ response.startTime }}'
- discovery_id: gcp.meet.conferenceRecords.recordings.get
  for_each: gcp.meet.conferenceRecords.recordings.list
  calls:
  - action: conferenceRecords.recordings.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      driveDestination: '{{ response.driveDestination }}'
      endTime: '{{ response.endTime }}'
      name: '{{ response.name }}'
      startTime: '{{ response.startTime }}'
      state: '{{ response.state }}'
- discovery_id: gcp.meet.conferenceRecords.transcripts.entries.get
  for_each: gcp.meet.conferenceRecords.transcripts.entries.list
  calls:
  - action: conferenceRecords.transcripts.entries.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      endTime: '{{ response.endTime }}'
      languageCode: '{{ response.languageCode }}'
      name: '{{ response.name }}'
      participant: '{{ response.participant }}'
      startTime: '{{ response.startTime }}'
      text: '{{ response.text }}'
- discovery_id: gcp.meet.conferenceRecords.transcripts.get
  for_each: gcp.meet.conferenceRecords.transcripts.list
  calls:
  - action: conferenceRecords.transcripts.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      docsDestination: '{{ response.docsDestination }}'
      endTime: '{{ response.endTime }}'
      name: '{{ response.name }}'
      startTime: '{{ response.startTime }}'
      state: '{{ response.state }}'
- discovery_id: gcp.meet.spaces.get
  for_each: gcp.meet.conferenceRecords.list
  calls:
  - action: spaces.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      activeConference: '{{ response.activeConference }}'
      config: '{{ response.config }}'
      meetingCode: '{{ response.meetingCode }}'
      meetingUri: '{{ response.meetingUri }}'
      name: '{{ response.name }}'
