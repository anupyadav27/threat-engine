  - action: projects.dataSources.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.dataSources }}'
    item:
      authorizationType: '{{ item.authorizationType }}'
      clientId: '{{ item.clientId }}'
      dataRefreshType: '{{ item.dataRefreshType }}'
      dataSourceId: '{{ item.dataSourceId }}'
      defaultDataRefreshWindowDays: '{{ item.defaultDataRefreshWindowDays }}'
      defaultSchedule: '{{ item.defaultSchedule }}'
      description: '{{ item.description }}'
      displayName: '{{ item.displayName }}'
      helpUrl: '{{ item.helpUrl }}'
      manualRunsDisabled: '{{ item.manualRunsDisabled }}'
      minimumScheduleInterval: '{{ item.minimumScheduleInterval }}'
      name: '{{ item.name }}'
      parameters: '{{ item.parameters }}'
      scopes: '{{ item.scopes }}'
      supportsCustomSchedule: '{{ item.supportsCustomSchedule }}'
      supportsMultipleTransfers: '{{ item.supportsMultipleTransfers }}'
      transferType: '{{ item.transferType }}'
