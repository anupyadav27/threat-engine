version: '1.0'
provider: gcp
service: bigquerydatatransfer
services:
  client: bigquerydatatransfer
  module: googleapiclient.discovery.build('bigquerydatatransfer', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
