version: '1.0'
provider: gcp
service: parallelstore
services:
  client: parallelstore
  module: googleapiclient.discovery.build('parallelstore', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.parallelstore.projects.locations.get
  calls:
  - action: projects.locations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      displayName: '{{ response.displayName }}'
      labels: '{{ response.labels }}'
      locationId: '{{ response.locationId }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.parallelstore.projects.locations.instances.list
  calls:
  - action: projects.locations.instances.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.instances }}'
    item:
      accessPoints: '{{ item.accessPoints }}'
      capacityGib: '{{ item.capacityGib }}'
      createTime: '{{ item.createTime }}'
      daosVersion: '{{ item.daosVersion }}'
      deploymentType: '{{ item.deploymentType }}'
      description: '{{ item.description }}'
      directoryStripeLevel: '{{ item.directoryStripeLevel }}'
      effectiveReservedIpRange: '{{ item.effectiveReservedIpRange }}'
      fileStripeLevel: '{{ item.fileStripeLevel }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      network: '{{ item.network }}'
      reservedIpRange: '{{ item.reservedIpRange }}'
      state: '{{ item.state }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.parallelstore.projects.locations.list
  calls:
  - action: projects.locations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.locations }}'
    item:
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      locationId: '{{ item.locationId }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.parallelstore.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.parallelstore.projects.locations.instances.get
  for_each: gcp.parallelstore.projects.locations.instances.list
  calls:
  - action: projects.locations.instances.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      accessPoints: '{{ response.accessPoints }}'
      capacityGib: '{{ response.capacityGib }}'
      createTime: '{{ response.createTime }}'
      daosVersion: '{{ response.daosVersion }}'
      deploymentType: '{{ response.deploymentType }}'
      description: '{{ response.description }}'
      directoryStripeLevel: '{{ response.directoryStripeLevel }}'
      effectiveReservedIpRange: '{{ response.effectiveReservedIpRange }}'
      fileStripeLevel: '{{ response.fileStripeLevel }}'
      labels: '{{ response.labels }}'
      name: '{{ response.name }}'
      network: '{{ response.network }}'
      reservedIpRange: '{{ response.reservedIpRange }}'
      state: '{{ response.state }}'
      updateTime: '{{ response.updateTime }}'
- discovery_id: gcp.parallelstore.projects.locations.operations.get
  for_each: gcp.parallelstore.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
