version: '1.0'
provider: gcp
service: androidenterprise
services:
  client: androidenterprise
  module: googleapiclient.discovery.build('androidenterprise', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.androidenterprise.devices.get
  for_each: gcp.androidenterprise.devices.list
  calls:
  - action: devices.get
    params:
      deviceId: '{{ item.androidId }}'
      enterpriseId: '{{ item.name }}'
      userId: '{{ item.kind }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      androidId: '{{ response.androidId }}'
      device: '{{ response.device }}'
      latestBuildFingerprint: '{{ response.latestBuildFingerprint }}'
      maker: '{{ response.maker }}'
      managementType: '{{ response.managementType }}'
      model: '{{ response.model }}'
      policy: '{{ response.policy }}'
      product: '{{ response.product }}'
      report: '{{ response.report }}'
      retailBrand: '{{ response.retailBrand }}'
      sdkVersion: '{{ response.sdkVersion }}'
- discovery_id: gcp.androidenterprise.devices.getState
  for_each: gcp.androidenterprise.devices.list
  calls:
  - action: devices.getState
    params:
      deviceId: '{{ item.androidId }}'
      enterpriseId: '{{ item.name }}'
      userId: '{{ item.kind }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      accountState: '{{ response.accountState }}'
- discovery_id: gcp.androidenterprise.devices.list
  for_each: gcp.androidenterprise.managedconfigurationsforuser.list
  calls:
  - action: devices.list
    params:
      enterpriseId: '{{ item.name }}'
      userId: '{{ item.kind }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.devices }}'
    item:
      androidId: '{{ item.androidId }}'
      device: '{{ item.device }}'
      latestBuildFingerprint: '{{ item.latestBuildFingerprint }}'
      maker: '{{ item.maker }}'
      managementType: '{{ item.managementType }}'
      model: '{{ item.model }}'
      policy: '{{ item.policy }}'
      product: '{{ item.product }}'
      report: '{{ item.report }}'
      retailBrand: '{{ item.retailBrand }}'
      sdkVersion: '{{ item.sdkVersion }}'
- discovery_id: gcp.androidenterprise.enterprises.get
  for_each: gcp.androidenterprise.enterprises.list
  calls:
  - action: enterprises.get
    params:
      enterpriseId: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      administrator: '{{ response.administrator }}'
      enterpriseType: '{{ response.enterpriseType }}'
      googleAuthenticationSettings: '{{ response.googleAuthenticationSettings }}'
      id: '{{ response.id }}'
      managedGoogleDomainType: '{{ response.managedGoogleDomainType }}'
      name: '{{ response.name }}'
      primaryDomain: '{{ response.primaryDomain }}'
