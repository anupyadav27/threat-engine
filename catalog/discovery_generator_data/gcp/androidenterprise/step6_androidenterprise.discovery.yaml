- discovery_id: gcp.androidenterprise.enterprises.list
  calls:
  - action: enterprises.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.enterprises }}'
    item:
      administrator: '{{ item.administrator }}'
      enterpriseType: '{{ item.enterpriseType }}'
      googleAuthenticationSettings: '{{ item.googleAuthenticationSettings }}'
      id: '{{ item.id }}'
      managedGoogleDomainType: '{{ item.managedGoogleDomainType }}'
      name: '{{ item.name }}'
      primaryDomain: '{{ item.primaryDomain }}'
  uid_template: '{item.name}'
