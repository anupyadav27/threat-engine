version: '1.0'
provider: gcp
service: doubleclicksearch
services:
  client: doubleclicksearch
  module: googleapiclient.discovery.build('doubleclicksearch', 'v2')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.doubleclicksearch.conversion.get
  calls:
  - action: conversion.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      conversion: '{{ response.conversion }}'
- discovery_id: gcp.doubleclicksearch.conversion.getByCustomerId
  calls:
  - action: conversion.getByCustomerId
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      conversion: '{{ response.conversion }}'
- discovery_id: gcp.doubleclicksearch.reports.get
  calls:
  - action: reports.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      files: '{{ response.files }}'
      id: '{{ response.id }}'
      isReportReady: '{{ response.isReportReady }}'
      request: '{{ response.request }}'
      rowCount: '{{ response.rowCount }}'
      rows: '{{ response.rows }}'
      statisticsCurrencyCode: '{{ response.statisticsCurrencyCode }}'
      statisticsTimeZone: '{{ response.statisticsTimeZone }}'
  uid_template: '{item.id}'
- discovery_id: gcp.doubleclicksearch.reports.getFile
  calls:
  - action: reports.getFile
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
- discovery_id: gcp.doubleclicksearch.reports.getIdMappingFile
  calls:
  - action: reports.getIdMappingFile
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
- discovery_id: gcp.doubleclicksearch.savedColumns.list
  calls:
  - action: savedColumns.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.savedColumns }}'
    item:
      savedColumnName: '{{ item.savedColumnName }}'
      type: '{{ item.type }}'
