version: '1.0'
provider: gcp
service: drivelabels
services:
  client: drivelabels
  module: googleapiclient.discovery.build('drivelabels', 'v2')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.drivelabels.labels.list
  calls:
  - action: labels.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.labels }}'
    item:
      appliedCapabilities: '{{ item.appliedCapabilities }}'
      appliedLabelPolicy: '{{ item.appliedLabelPolicy }}'
      createTime: '{{ item.createTime }}'
      creator: '{{ item.creator }}'
      customer: '{{ item.customer }}'
      disableTime: '{{ item.disableTime }}'
      disabler: '{{ item.disabler }}'
      displayHints: '{{ item.displayHints }}'
      enabledAppSettings: '{{ item.enabledAppSettings }}'
      fields: '{{ item.fields }}'
      id: '{{ item.id }}'
      labelType: '{{ item.labelType }}'
      learnMoreUri: '{{ item.learnMoreUri }}'
      lifecycle: '{{ item.lifecycle }}'
      lockStatus: '{{ item.lockStatus }}'
      name: '{{ item.name }}'
      properties: '{{ item.properties }}'
      publishTime: '{{ item.publishTime }}'
      publisher: '{{ item.publisher }}'
      revisionCreateTime: '{{ item.revisionCreateTime }}'
      revisionCreator: '{{ item.revisionCreator }}'
      revisionId: '{{ item.revisionId }}'
      schemaCapabilities: '{{ item.schemaCapabilities }}'
  uid_template: '{item.name}'
- discovery_id: gcp.drivelabels.labels.locks.list
  calls:
  - action: labels.locks.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.locks }}'
    item:
      capabilities: '{{ item.capabilities }}'
      choiceId: '{{ item.choiceId }}'
      createTime: '{{ item.createTime }}'
      creator: '{{ item.creator }}'
      deleteTime: '{{ item.deleteTime }}'
      fieldId: '{{ item.fieldId }}'
      name: '{{ item.name }}'
      state: '{{ item.state }}'
  uid_template: '{item.name}'
- discovery_id: gcp.drivelabels.labels.permissions.list
  calls:
  - action: labels.permissions.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.permissions }}'
    item:
      audience: '{{ item.audience }}'
      email: '{{ item.email }}'
      group: '{{ item.group }}'
      name: '{{ item.name }}'
      person: '{{ item.person }}'
      role: '{{ item.role }}'
  uid_template: '{item.name}'
- discovery_id: gcp.drivelabels.labels.revisions.locks.list
  calls:
  - action: labels.revisions.locks.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.locks }}'
    item:
      capabilities: '{{ item.capabilities }}'
      choiceId: '{{ item.choiceId }}'
      createTime: '{{ item.createTime }}'
      creator: '{{ item.creator }}'
      deleteTime: '{{ item.deleteTime }}'
      fieldId: '{{ item.fieldId }}'
      name: '{{ item.name }}'
      state: '{{ item.state }}'
  uid_template: '{item.name}'
- discovery_id: gcp.drivelabels.labels.revisions.permissions.list
  calls:
  - action: labels.revisions.permissions.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.permissions }}'
    item:
      audience: '{{ item.audience }}'
      email: '{{ item.email }}'
      group: '{{ item.group }}'
      name: '{{ item.name }}'
      person: '{{ item.person }}'
      role: '{{ item.role }}'
  uid_template: '{item.name}'
- discovery_id: gcp.drivelabels.limits.getLabel
  calls:
  - action: limits.getLabel
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      fieldLimits: '{{ response.fieldLimits }}'
      maxDeletedFields: '{{ response.maxDeletedFields }}'
      maxDescriptionLength: '{{ response.maxDescriptionLength }}'
      maxDraftRevisions: '{{ response.maxDraftRevisions }}'
      maxFields: '{{ response.maxFields }}'
      maxTitleLength: '{{ response.maxTitleLength }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.drivelabels.labels.get
  for_each: gcp.drivelabels.labels.list
  calls:
  - action: labels.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      appliedCapabilities: '{{ response.appliedCapabilities }}'
      appliedLabelPolicy: '{{ response.appliedLabelPolicy }}'
      createTime: '{{ response.createTime }}'
      creator: '{{ response.creator }}'
      customer: '{{ response.customer }}'
      disableTime: '{{ response.disableTime }}'
      disabler: '{{ response.disabler }}'
      displayHints: '{{ response.displayHints }}'
      enabledAppSettings: '{{ response.enabledAppSettings }}'
      fields: '{{ response.fields }}'
      id: '{{ response.id }}'
      labelType: '{{ response.labelType }}'
      learnMoreUri: '{{ response.learnMoreUri }}'
      lifecycle: '{{ response.lifecycle }}'
      lockStatus: '{{ response.lockStatus }}'
      name: '{{ response.name }}'
      properties: '{{ response.properties }}'
      publishTime: '{{ response.publishTime }}'
      publisher: '{{ response.publisher }}'
      revisionCreateTime: '{{ response.revisionCreateTime }}'
      revisionCreator: '{{ response.revisionCreator }}'
      revisionId: '{{ response.revisionId }}'
      schemaCapabilities: '{{ response.schemaCapabilities }}'
- discovery_id: gcp.drivelabels.users.getCapabilities
  calls:
  - action: users.getCapabilities
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      canAccessLabelManager: '{{ response.canAccessLabelManager }}'
      canAdministrateLabels: '{{ response.canAdministrateLabels }}'
      canCreateAdminLabels: '{{ response.canCreateAdminLabels }}'
      canCreateSharedLabels: '{{ response.canCreateSharedLabels }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
