    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.devices }}'
    item:
      activeConfig: '{{ item.activeConfig }}'
      currentChannels: '{{ item.currentChannels }}'
      deviceMetadata: '{{ item.deviceMetadata }}'
      displayName: '{{ item.displayName }}'
      fccId: '{{ item.fccId }}'
      grantRangeAllowlists: '{{ item.grantRangeAllowlists }}'
      grants: '{{ item.grants }}'
      name: '{{ item.name }}'
      preloadedConfig: '{{ item.preloadedConfig }}'
