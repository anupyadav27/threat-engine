version: '1.0'
provider: gcp
service: kms
discovery:
- discovery_id: gcp.kms.crypto_keys.list
  calls:
  - action: projects.locations.keyRings.cryptoKeys.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      name: '{{ item.name }}'
      purpose: '{{ item.purpose }}'
      createTime: '{{ item.createTime }}'
      nextRotationTime: '{{ item.nextRotationTime }}'
      rotationPeriod: '{{ item.rotationPeriod }}'
      versionTemplate: '{{ item.versionTemplate }}'
      labels: '{{ item.labels }}'
      importOnly: '{{ item.importOnly }}'
      cryptoKeyBackend: '{{ item.cryptoKeyBackend }}'
      primary: '{{ item.primary }}'
  uid_template: '{item.name}'
