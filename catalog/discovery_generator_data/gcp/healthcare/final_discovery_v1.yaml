version: '1.0'
provider: gcp
service: healthcare

services:
  client: healthcare
  module: "googleapiclient.discovery.build('healthcare', 'v1')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: unknown
    identifier_op: gcp.healthcare.projects.locations.datasets.consentStores.list
    identifier_field: consentStores[].name
    item_var_path: item.consentStores[].name

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.healthcare.projects.locations.datasets.consentStores.list ──
  - discovery_id: gcp.healthcare.projects.locations.datasets.consentStores.list
    calls:
      - action: projects.locations.datasets.consentStores.list
        params:
          parent: '{{ project_id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        bindings: '{{ item.bindings }}'
        cryptoKeyVersions: '{{ item.cryptoKeyVersions }}'
        datasetId: '{{ item.datasetId }}'
        defaultConsentTtl: '{{ item.defaultConsentTtl }}'
        enableConsentCreateOnUpdate: '{{ item.enableConsentCreateOnUpdate }}'
        encryptionSpec: '{{ item.encryptionSpec }}'
        labels: '{{ item.labels }}'
        name: '{{ item.name }}'
        purpose: '{{ item.purpose }}'

