version: '1.0'
provider: gcp
service: analytics
services:
  client: analytics
  module: googleapiclient.discovery.build('analytics', 'v3')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.analytics.management.accountSummaries.list
  calls:
  - action: management.accountSummaries.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.accountSummaries }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      starred: '{{ item.starred }}'
      webProperties: '{{ item.webProperties }}'
  uid_template: '{item.name}'
- discovery_id: gcp.analytics.management.accountUserLinks.list
