      userInfo: '{{ item.userInfo }}'
      volumeInfo: '{{ item.volumeInfo }}'
  uid_template: '{item.id}'
- discovery_id: gcp.books.bookshelves.get
  calls:
  - action: bookshelves.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      access: '{{ response.access }}'
      created: '{{ response.created }}'
      description: '{{ response.description }}'
      id: '{{ response.id }}'
      title: '{{ response.title }}'
      updated: '{{ response.updated }}'
      volumeCount: '{{ response.volumeCount }}'
      volumesLastUpdated: '{{ response.volumesLastUpdated }}'
  uid_template: '{item.id}'
- discovery_id: gcp.books.bookshelves.list
  for_each: gcp.books.mylibrary.bookshelves.volumes.list
  calls:
  - action: bookshelves.list
    params:
      userId: '{{ item.selfLink }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.bookshelves }}'
    item:
      access: '{{ item.access }}'
      created: '{{ item.created }}'
      description: '{{ item.description }}'
      id: '{{ item.id }}'
      title: '{{ item.title }}'
      updated: '{{ item.updated }}'
      volumeCount: '{{ item.volumeCount }}'
      volumesLastUpdated: '{{ item.volumesLastUpdated }}'
- discovery_id: gcp.books.bookshelves.volumes.list
  calls:
