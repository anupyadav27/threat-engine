version: '1.0'
provider: gcp
service: books
services:
  client: books
  module: googleapiclient.discovery.build('books', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.books.familysharing.getFamilyInfo
  calls:
  - action: familysharing.getFamilyInfo
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      membership: '{{ response.membership }}'
- discovery_id: gcp.books.myconfig.getUserSettings
  calls:
  - action: myconfig.getUserSettings
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      notesExport: '{{ response.notesExport }}'
      notification: '{{ response.notification }}'
- discovery_id: gcp.books.mylibrary.annotations.list
  calls:
  - action: mylibrary.annotations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.annotations }}'
    item:
      afterSelectedText: '{{ item.afterSelectedText }}'
      beforeSelectedText: '{{ item.beforeSelectedText }}'
      clientVersionRanges: '{{ item.clientVersionRanges }}'
      created: '{{ item.created }}'
      currentVersionRanges: '{{ item.currentVersionRanges }}'
      data: '{{ item.data }}'
      deleted: '{{ item.deleted }}'
      highlightStyle: '{{ item.highlightStyle }}'
      id: '{{ item.id }}'
      layerId: '{{ item.layerId }}'
      layerSummary: '{{ item.layerSummary }}'
      pageIds: '{{ item.pageIds }}'
      selectedText: '{{ item.selectedText }}'
      updated: '{{ item.updated }}'
      volumeId: '{{ item.volumeId }}'
  uid_template: '{item.id}'
- discovery_id: gcp.books.mylibrary.bookshelves.list
  calls:
  - action: mylibrary.bookshelves.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.bookshelves }}'
    item:
      access: '{{ item.access }}'
      created: '{{ item.created }}'
      description: '{{ item.description }}'
      id: '{{ item.id }}'
      title: '{{ item.title }}'
      updated: '{{ item.updated }}'
      volumeCount: '{{ item.volumeCount }}'
      volumesLastUpdated: '{{ item.volumesLastUpdated }}'
  uid_template: '{item.id}'
- discovery_id: gcp.books.onboarding.listCategories
  calls:
  - action: onboarding.listCategories
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.onboarding }}'
- discovery_id: gcp.books.onboarding.listCategoryVolumes
  calls:
  - action: onboarding.listCategoryVolumes
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.onboarding }}'
    item:
      accessInfo: '{{ item.accessInfo }}'
      id: '{{ item.id }}'
      layerInfo: '{{ item.layerInfo }}'
      recommendedInfo: '{{ item.recommendedInfo }}'
      saleInfo: '{{ item.saleInfo }}'
      searchInfo: '{{ item.searchInfo }}'
      userInfo: '{{ item.userInfo }}'
      volumeInfo: '{{ item.volumeInfo }}'
  uid_template: '{item.id}'
- discovery_id: gcp.books.personalizedstream.get
  calls:
  - action: personalizedstream.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      clusters: '{{ response.clusters }}'
      totalClusters: '{{ response.totalClusters }}'
- discovery_id: gcp.books.promooffer.get
  calls:
  - action: promooffer.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      items: '{{ response.items }}'
- discovery_id: gcp.books.volumes.mybooks.list
  calls:
  - action: volumes.mybooks.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.mybooks }}'
