- discovery_id: gcp.books.layers.get
  for_each: gcp.books.mylibrary.annotations.list
  calls:
  - action: layers.get
    params:
      summaryId: '{{ item.selfLink }}'
      volumeId: '{{ item.selfLink }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      annotationCount: '{{ response.annotationCount }}'
      annotationTypes: '{{ response.annotationTypes }}'
      annotationsDataLink: '{{ response.annotationsDataLink }}'
      annotationsLink: '{{ response.annotationsLink }}'
      contentVersion: '{{ response.contentVersion }}'
      dataCount: '{{ response.dataCount }}'
      id: '{{ response.id }}'
      layerId: '{{ response.layerId }}'
      updated: '{{ response.updated }}'
      volumeAnnotationsVersion: '{{ response.volumeAnnotationsVersion }}'
      volumeId: '{{ response.volumeId }}'
- discovery_id: gcp.books.layers.list
