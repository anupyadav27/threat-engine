      volumeInfo: '{{ item.volumeInfo }}'
  uid_template: '{item.id}'
- discovery_id: gcp.books.volumes.useruploaded.list
  calls:
  - action: volumes.useruploaded.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
