- discovery_id: gcp.books.layers.annotationData.get
  for_each: gcp.books.layers.annotationData.list
  calls:
  - action: layers.annotationData.get
    params:
      annotationDataId: '{{ item.selfLink }}'
      contentVersion: '{{ item.selfLink }}'
      layerId: '{{ item.selfLink }}'
      volumeId: '{{ item.selfLink }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      annotationType: '{{ response.annotationType }}'
      data: '{{ response.data }}'
      encodedData: '{{ response.encodedData }}'
      id: '{{ response.id }}'
      layerId: '{{ response.layerId }}'
      updated: '{{ response.updated }}'
      volumeId: '{{ response.volumeId }}'
- discovery_id: gcp.books.layers.annotationData.list
