version: '1.0'
provider: gcp
service: css
services:
  client: css
  module: googleapiclient.discovery.build('css', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.css.accounts.cssProducts.list
  calls:
  - action: accounts.cssProducts.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.cssProducts }}'
    item:
      attributes: '{{ item.attributes }}'
      contentLanguage: '{{ item.contentLanguage }}'
      cssProductStatus: '{{ item.cssProductStatus }}'
      customAttributes: '{{ item.customAttributes }}'
      feedLabel: '{{ item.feedLabel }}'
      name: '{{ item.name }}'
      rawProvidedId: '{{ item.rawProvidedId }}'
  uid_template: '{item.name}'
- discovery_id: gcp.css.accounts.get
  calls:
  - action: accounts.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      accountType: '{{ response.accountType }}'
      automaticLabelIds: '{{ response.automaticLabelIds }}'
      displayName: '{{ response.displayName }}'
      fullName: '{{ response.fullName }}'
      homepageUri: '{{ response.homepageUri }}'
      labelIds: '{{ response.labelIds }}'
      name: '{{ response.name }}'
      parent: '{{ response.parent }}'
  uid_template: '{item.name}'
- discovery_id: gcp.css.accounts.labels.list
  calls:
  - action: accounts.labels.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.labels }}'
    item:
      accountId: '{{ item.accountId }}'
      description: '{{ item.description }}'
      displayName: '{{ item.displayName }}'
      labelId: '{{ item.labelId }}'
      labelType: '{{ item.labelType }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.css.accounts.listChildAccounts
  calls:
  - action: accounts.listChildAccounts
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.accounts }}'
    item:
      accountType: '{{ item.accountType }}'
      automaticLabelIds: '{{ item.automaticLabelIds }}'
      displayName: '{{ item.displayName }}'
      fullName: '{{ item.fullName }}'
      homepageUri: '{{ item.homepageUri }}'
      labelIds: '{{ item.labelIds }}'
      name: '{{ item.name }}'
      parent: '{{ item.parent }}'
  uid_template: '{item.name}'
- discovery_id: gcp.css.accounts.quotas.list
  calls:
  - action: accounts.quotas.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.quotas }}'
    item:
      methodDetails: '{{ item.methodDetails }}'
      name: '{{ item.name }}'
      quotaLimit: '{{ item.quotaLimit }}'
      quotaMinuteLimit: '{{ item.quotaMinuteLimit }}'
      quotaUsage: '{{ item.quotaUsage }}'
  uid_template: '{item.name}'
- discovery_id: gcp.css.accounts.cssProducts.get
  for_each: gcp.css.accounts.cssProducts.list
  calls:
  - action: accounts.cssProducts.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      attributes: '{{ response.attributes }}'
      contentLanguage: '{{ response.contentLanguage }}'
      cssProductStatus: '{{ response.cssProductStatus }}'
      customAttributes: '{{ response.customAttributes }}'
      feedLabel: '{{ response.feedLabel }}'
      name: '{{ response.name }}'
      rawProvidedId: '{{ response.rawProvidedId }}'
