version: '1.0'
provider: gcp
service: gcr
discovery:
- _stub: true
  discovery_id: gcp.gcr.list_gcrs
  _note: STUB — generated by step2, needs real SDK review for gcp.gcr
  _rules:
  - gcp.gcr.container.scanning_enabled
  _client: google.cloud.artifactregistry
  calls:
  - action: ListResources
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      id: '{{ item.Id }}'
      name: '{{ item.Name }}'
      resource_type: '''{{ resource_type }}'''
      region: '{{ region }}'
      encrypted: '{{ item.Encrypted }}'
      kms_key_id: '{{ item.KMSKeyId }}'
      status: '{{ item.Status }}'
      enabled: '{{ item.Enabled }}'
      logging_enabled: '{{ item.LoggingEnabled }}'
      mfa_enabled: '{{ item.MfaEnabled }}'
      ssl_enabled: '{{ item.SslEnabled }}'
      internet_facing: '{{ item.InternetFacing }}'
      public_ip_address: '{{ item.PublicIpAddress }}'
      tags: '{{ item.Tags }}'
      permissions: '{{ item.Permissions }}'
      backup_enabled: '{{ item.BackupEnabled }}'
      versioning_enabled: '{{ item.VersioningEnabled }}'
      retention_days: '{{ item.RetentionDays }}'
      min_tls_version: '{{ item.MinTlsVersion }}'
- discovery_id: gcp.gcr.projects.locations.notes.list
  calls:
  - action: projects.locations.notes.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.notes }}'
    item:
      name: '{{ item.name }}'
      shortDescription: '{{ item.shortDescription }}'
      kind: '{{ item.kind }}'
      createTime: '{{ item.createTime }}'
      updateTime: '{{ item.updateTime }}'
      vulnerability: '{{ item.vulnerability }}'
      discovery: '{{ item.discovery }}'
      image: '{{ item.image }}'
      package: '{{ item.package }}'
  _used_by_rules:
  - gcp.gcr.container.scanning_enabled
- discovery_id: gcp.gcr.artifactregistry.list_repositories
  calls:
  - action: projects.locations.repositories.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.repositories }}'
    item:
      name: '{{ item.name }}'
      format: '{{ item.format }}'
      description: '{{ item.description }}'
      createTime: '{{ item.createTime }}'
      updateTime: '{{ item.updateTime }}'
      sizeBytes: '{{ item.sizeBytes }}'
      labels: '{{ item.labels }}'
      kmsKeyName: '{{ item.kmsKeyName }}'
      satisfiesPzs: '{{ item.satisfiesPzs }}'
      vulnerabilityScanning: '{{ item.vulnerabilityScanning }}'
      cleanupPolicies: '{{ item.cleanupPolicies }}'
  _used_by_rules:
  - gcp.gcr.container.scanning_enabled
