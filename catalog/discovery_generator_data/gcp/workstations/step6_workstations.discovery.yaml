      allowedPorts: '{{ item.allowedPorts }}'
      annotations: '{{ item.annotations }}'
      conditions: '{{ item.conditions }}'
      container: '{{ item.container }}'
      createTime: '{{ item.createTime }}'
      degraded: '{{ item.degraded }}'
      deleteTime: '{{ item.deleteTime }}'
      disableTcpConnections: '{{ item.disableTcpConnections }}'
      displayName: '{{ item.displayName }}'
      enableAuditAgent: '{{ item.enableAuditAgent }}'
      encryptionKey: '{{ item.encryptionKey }}'
      ephemeralDirectories: '{{ item.ephemeralDirectories }}'
      grantWorkstationAdminRoleOnCreate: '{{ item.grantWorkstationAdminRoleOnCreate
