      host: '{{ item.host }}'
      idleTimeout: '{{ item.idleTimeout }}'
      labels: '{{ item.labels }}'
      maxUsableWorkstations: '{{ item.maxUsableWorkstations }}'
      name: '{{ item.name }}'
      persistentDirectories: '{{ item.persistentDirectories }}'
      readinessChecks: '{{ item.readinessChecks }}'
      reconciling: '{{ item.reconciling }}'
      replicaZones: '{{ item.replicaZones }}'
      runningTimeout: '{{ item.runningTimeout }}'
      uid: '{{ item.uid }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.workstations.projects.locations.workstationClusters.workstationConfigs.workstations.list
  calls:
  - action: projects.locations.workstationClusters.workstationConfigs.workstations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.workstations }}'
    item:
      annotations: '{{ item.annotations }}'
      createTime: '{{ item.createTime }}'
      deleteTime: '{{ item.deleteTime }}'
      displayName: '{{ item.displayName }}'
      env: '{{ item.env }}'
      host: '{{ item.host }}'
      kmsKey: '{{ item.kmsKey }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      reconciling: '{{ item.reconciling }}'
      runtimeHost: '{{ item.runtimeHost }}'
      sourceWorkstation: '{{ item.sourceWorkstation }}'
      startTime: '{{ item.startTime }}'
      state: '{{ item.state }}'
      uid: '{{ item.uid }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.workstations.projects.locations.workstationClusters.workstationConfigs.workstations.listUsable
  calls:
  - action: projects.locations.workstationClusters.workstationConfigs.workstations.listUsable
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.workstations }}'
    item:
