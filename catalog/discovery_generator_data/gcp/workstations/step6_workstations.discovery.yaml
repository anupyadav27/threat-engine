version: '1.0'
provider: gcp
service: workstations
services:
  client: workstations
  module: googleapiclient.discovery.build('workstations', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.workstations.projects.locations.get
  calls:
  - action: projects.locations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      displayName: '{{ response.displayName }}'
      labels: '{{ response.labels }}'
      locationId: '{{ response.locationId }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.workstations.projects.locations.list
  calls:
  - action: projects.locations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.locations }}'
    item:
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      locationId: '{{ item.locationId }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.workstations.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.workstations.projects.locations.workstationClusters.list
  calls:
  - action: projects.locations.workstationClusters.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.workstationClusters }}'
    item:
      annotations: '{{ item.annotations }}'
      conditions: '{{ item.conditions }}'
      controlPlaneIp: '{{ item.controlPlaneIp }}'
      createTime: '{{ item.createTime }}'
      degraded: '{{ item.degraded }}'
      deleteTime: '{{ item.deleteTime }}'
      displayName: '{{ item.displayName }}'
      domainConfig: '{{ item.domainConfig }}'
      gatewayConfig: '{{ item.gatewayConfig }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      network: '{{ item.network }}'
      privateClusterConfig: '{{ item.privateClusterConfig }}'
      reconciling: '{{ item.reconciling }}'
      subnetwork: '{{ item.subnetwork }}'
      tags: '{{ item.tags }}'
      uid: '{{ item.uid }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.workstations.projects.locations.workstationClusters.workstationConfigs.list
  calls:
  - action: projects.locations.workstationClusters.workstationConfigs.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.workstationConfigs }}'
    item:
      allowedPorts: '{{ item.allowedPorts }}'
      annotations: '{{ item.annotations }}'
      conditions: '{{ item.conditions }}'
      container: '{{ item.container }}'
      createTime: '{{ item.createTime }}'
      degraded: '{{ item.degraded }}'
      deleteTime: '{{ item.deleteTime }}'
      disableTcpConnections: '{{ item.disableTcpConnections }}'
      displayName: '{{ item.displayName }}'
      enableAuditAgent: '{{ item.enableAuditAgent }}'
      encryptionKey: '{{ item.encryptionKey }}'
      ephemeralDirectories: '{{ item.ephemeralDirectories }}'
      grantWorkstationAdminRoleOnCreate: '{{ item.grantWorkstationAdminRoleOnCreate
        }}'
      host: '{{ item.host }}'
      idleTimeout: '{{ item.idleTimeout }}'
      labels: '{{ item.labels }}'
      maxUsableWorkstations: '{{ item.maxUsableWorkstations }}'
      name: '{{ item.name }}'
      persistentDirectories: '{{ item.persistentDirectories }}'
      readinessChecks: '{{ item.readinessChecks }}'
      reconciling: '{{ item.reconciling }}'
      replicaZones: '{{ item.replicaZones }}'
      runningTimeout: '{{ item.runningTimeout }}'
      uid: '{{ item.uid }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.workstations.projects.locations.workstationClusters.workstationConfigs.listUsable
  calls:
  - action: projects.locations.workstationClusters.workstationConfigs.listUsable
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.workstationConfigs }}'
