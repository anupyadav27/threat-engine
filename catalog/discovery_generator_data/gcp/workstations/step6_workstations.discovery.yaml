      displayName: '{{ item.displayName }}'
      env: '{{ item.env }}'
      host: '{{ item.host }}'
      kmsKey: '{{ item.kmsKey }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      reconciling: '{{ item.reconciling }}'
      runtimeHost: '{{ item.runtimeHost }}'
      sourceWorkstation: '{{ item.sourceWorkstation }}'
      startTime: '{{ item.startTime }}'
      state: '{{ item.state }}'
      uid: '{{ item.uid }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.workstations.projects.locations.operations.get
  for_each: gcp.workstations.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.get
    params:
