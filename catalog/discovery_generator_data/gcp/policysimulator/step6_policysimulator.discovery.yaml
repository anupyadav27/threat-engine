version: '1.0'
provider: gcp
service: policysimulator
services:
  client: policysimulator
  module: googleapiclient.discovery.build('policysimulator', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.policysimulator.folders.locations.replays.results.list
  calls:
  - action: folders.locations.replays.results.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.results }}'
    item:
      accessTuple: '{{ item.accessTuple }}'
      diff: '{{ item.diff }}'
      error: '{{ item.error }}'
      lastSeenDate: '{{ item.lastSeenDate }}'
      name: '{{ item.name }}'
      parent: '{{ item.parent }}'
  uid_template: '{item.name}'
- discovery_id: gcp.policysimulator.organizations.locations.orgPolicyViolationsPreviews.list
  calls:
  - action: organizations.locations.orgPolicyViolationsPreviews.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.orgPolicyViolationsPreviews }}'
    item:
      createTime: '{{ item.createTime }}'
      customConstraints: '{{ item.customConstraints }}'
      name: '{{ item.name }}'
      overlay: '{{ item.overlay }}'
      resourceCounts: '{{ item.resourceCounts }}'
      state: '{{ item.state }}'
      violationsCount: '{{ item.violationsCount }}'
  uid_template: '{item.name}'
- discovery_id: gcp.policysimulator.organizations.locations.orgPolicyViolationsPreviews.orgPolicyViolations.list
