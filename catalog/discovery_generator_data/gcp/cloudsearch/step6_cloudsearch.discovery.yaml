version: '1.0'
provider: gcp
service: cloudsearch
services:
  client: cloudsearch
  module: googleapiclient.discovery.build('cloudsearch', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.cloudsearch.debug.datasources.items.unmappedids.list
  calls:
  - action: debug.datasources.items.unmappedids.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.unmappedids }}'
    item:
      externalIdentity: '{{ item.externalIdentity }}'
      resolutionStatusCode: '{{ item.resolutionStatusCode }}'
- discovery_id: gcp.cloudsearch.debug.identitysources.items.listForunmappedidentity
  calls:
  - action: debug.identitysources.items.listForunmappedidentity
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
- discovery_id: gcp.cloudsearch.debug.identitysources.unmappedids.list
  calls:
  - action: debug.identitysources.unmappedids.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.unmappedids }}'
    item:
      externalIdentity: '{{ item.externalIdentity }}'
      resolutionStatusCode: '{{ item.resolutionStatusCode }}'
- discovery_id: gcp.cloudsearch.query.search
  calls:
  - action: query.search
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.query }}'
    item:
      clusteredResults: '{{ item.clusteredResults }}'
      metadata: '{{ item.metadata }}'
      snippet: '{{ item.snippet }}'
      title: '{{ item.title }}'
      url: '{{ item.url }}'
- discovery_id: gcp.cloudsearch.query.sources.list
  calls:
  - action: query.sources.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.sources }}'
    item:
      displayName: '{{ item.displayName }}'
      operators: '{{ item.operators }}'
      shortName: '{{ item.shortName }}'
      source: '{{ item.source }}'
- discovery_id: gcp.cloudsearch.settings.datasources.list
  calls:
  - action: settings.datasources.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.datasources }}'
    item:
      disableModifications: '{{ item.disableModifications }}'
      disableServing: '{{ item.disableServing }}'
      displayName: '{{ item.displayName }}'
      indexingServiceAccounts: '{{ item.indexingServiceAccounts }}'
      itemsVisibility: '{{ item.itemsVisibility }}'
      name: '{{ item.name }}'
      operationIds: '{{ item.operationIds }}'
      returnThumbnailUrls: '{{ item.returnThumbnailUrls }}'
      shortName: '{{ item.shortName }}'
  uid_template: '{item.name}'
- discovery_id: gcp.cloudsearch.settings.getCustomer
  calls:
  - action: settings.getCustomer
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      auditLoggingSettings: '{{ response.auditLoggingSettings }}'
      vpcSettings: '{{ response.vpcSettings }}'
- discovery_id: gcp.cloudsearch.settings.searchapplications.list
  calls:
  - action: settings.searchapplications.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.searchapplications }}'
    item:
      dataSourceRestrictions: '{{ item.dataSourceRestrictions }}'
      defaultFacetOptions: '{{ item.defaultFacetOptions }}'
      defaultSortOptions: '{{ item.defaultSortOptions }}'
      displayName: '{{ item.displayName }}'
      enableAuditLog: '{{ item.enableAuditLog }}'
      name: '{{ item.name }}'
      operationIds: '{{ item.operationIds }}'
      queryInterpretationConfig: '{{ item.queryInterpretationConfig }}'
      returnResultThumbnailUrls: '{{ item.returnResultThumbnailUrls }}'
      scoringConfig: '{{ item.scoringConfig }}'
      sourceConfig: '{{ item.sourceConfig }}'
  uid_template: '{item.name}'
- discovery_id: gcp.cloudsearch.stats.getIndex
  calls:
  - action: stats.getIndex
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      averageIndexedItemCount: '{{ response.averageIndexedItemCount }}'
      stats: '{{ response.stats }}'
- discovery_id: gcp.cloudsearch.stats.getQuery
  calls:
  - action: stats.getQuery
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      stats: '{{ response.stats }}'
      totalQueryCount: '{{ response.totalQueryCount }}'
- discovery_id: gcp.cloudsearch.stats.getSearchapplication
  calls:
  - action: stats.getSearchapplication
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      averageSearchApplicationCount: '{{ response.averageSearchApplicationCount }}'
      stats: '{{ response.stats }}'
- discovery_id: gcp.cloudsearch.stats.getSession
  calls:
  - action: stats.getSession
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      stats: '{{ response.stats }}'
- discovery_id: gcp.cloudsearch.stats.getUser
  calls:
  - action: stats.getUser
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      stats: '{{ response.stats }}'
- discovery_id: gcp.cloudsearch.indexing.datasources.getSchema
  for_each: gcp.cloudsearch.settings.datasources.list
  calls:
  - action: indexing.datasources.getSchema
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      objectDefinitions: '{{ response.objectDefinitions }}'
      operationIds: '{{ response.operationIds }}'
- discovery_id: gcp.cloudsearch.indexing.datasources.items.get
  for_each: gcp.cloudsearch.debug.identitysources.items.listForunmappedidentity
  calls:
  - action: indexing.datasources.items.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      acl: '{{ response.acl }}'
      content: '{{ response.content }}'
      itemType: '{{ response.itemType }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      payload: '{{ response.payload }}'
      queue: '{{ response.queue }}'
      status: '{{ response.status }}'
      structuredData: '{{ response.structuredData }}'
      version: '{{ response.version }}'
- discovery_id: gcp.cloudsearch.indexing.datasources.items.list
  for_each: gcp.cloudsearch.settings.datasources.list
  calls:
  - action: indexing.datasources.items.list
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      acl: '{{ item.acl }}'
      content: '{{ item.content }}'
      itemType: '{{ item.itemType }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      payload: '{{ item.payload }}'
      queue: '{{ item.queue }}'
      status: '{{ item.status }}'
      structuredData: '{{ item.structuredData }}'
      version: '{{ item.version }}'
- discovery_id: gcp.cloudsearch.operations.get
  for_each: gcp.cloudsearch.settings.searchapplications.list
  calls:
  - action: operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
- discovery_id: gcp.cloudsearch.operations.lro.list
  for_each: gcp.cloudsearch.settings.searchapplications.list
  calls:
  - action: operations.lro.list
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.lro }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
- discovery_id: gcp.cloudsearch.settings.datasources.get
  for_each: gcp.cloudsearch.settings.datasources.list
  calls:
  - action: settings.datasources.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      disableModifications: '{{ response.disableModifications }}'
      disableServing: '{{ response.disableServing }}'
      displayName: '{{ response.displayName }}'
      indexingServiceAccounts: '{{ response.indexingServiceAccounts }}'
      itemsVisibility: '{{ response.itemsVisibility }}'
      name: '{{ response.name }}'
      operationIds: '{{ response.operationIds }}'
      returnThumbnailUrls: '{{ response.returnThumbnailUrls }}'
      shortName: '{{ response.shortName }}'
- discovery_id: gcp.cloudsearch.settings.searchapplications.get
  for_each: gcp.cloudsearch.settings.searchapplications.list
  calls:
  - action: settings.searchapplications.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      dataSourceRestrictions: '{{ response.dataSourceRestrictions }}'
      defaultFacetOptions: '{{ response.defaultFacetOptions }}'
      defaultSortOptions: '{{ response.defaultSortOptions }}'
      displayName: '{{ response.displayName }}'
      enableAuditLog: '{{ response.enableAuditLog }}'
      name: '{{ response.name }}'
      operationIds: '{{ response.operationIds }}'
      queryInterpretationConfig: '{{ response.queryInterpretationConfig }}'
      returnResultThumbnailUrls: '{{ response.returnResultThumbnailUrls }}'
      scoringConfig: '{{ response.scoringConfig }}'
      sourceConfig: '{{ response.sourceConfig }}'
- discovery_id: gcp.cloudsearch.stats.index.datasources.get
  for_each: gcp.cloudsearch.settings.datasources.list
  calls:
  - action: stats.index.datasources.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      averageIndexedItemCount: '{{ response.averageIndexedItemCount }}'
      stats: '{{ response.stats }}'
- discovery_id: gcp.cloudsearch.stats.query.searchapplications.get
  for_each: gcp.cloudsearch.settings.searchapplications.list
  calls:
  - action: stats.query.searchapplications.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      stats: '{{ response.stats }}'
      totalQueryCount: '{{ response.totalQueryCount }}'
- discovery_id: gcp.cloudsearch.stats.session.searchapplications.get
  for_each: gcp.cloudsearch.settings.searchapplications.list
  calls:
  - action: stats.session.searchapplications.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      stats: '{{ response.stats }}'
- discovery_id: gcp.cloudsearch.stats.user.searchapplications.get
  for_each: gcp.cloudsearch.settings.searchapplications.list
  calls:
  - action: stats.user.searchapplications.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      stats: '{{ response.stats }}'
