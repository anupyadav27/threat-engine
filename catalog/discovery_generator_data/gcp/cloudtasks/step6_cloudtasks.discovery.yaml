version: '1.0'
provider: gcp
service: cloudtasks
services:
  client: cloudtasks
  module: googleapiclient.discovery.build('cloudtasks', 'v2beta2')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.cloudtasks.projects.locations.get
  calls:
  - action: projects.locations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      displayName: '{{ response.displayName }}'
      labels: '{{ response.labels }}'
      locationId: '{{ response.locationId }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.cloudtasks.projects.locations.getCmekConfig
  calls:
  - action: projects.locations.getCmekConfig
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      kmsKey: '{{ response.kmsKey }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.cloudtasks.projects.locations.list
  calls:
  - action: projects.locations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.locations }}'
    item:
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      locationId: '{{ item.locationId }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.cloudtasks.projects.locations.queues.list
  calls:
  - action: projects.locations.queues.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.queues }}'
    item:
      appEngineHttpTarget: '{{ item.appEngineHttpTarget }}'
      httpTarget: '{{ item.httpTarget }}'
      name: '{{ item.name }}'
      pullTarget: '{{ item.pullTarget }}'
      purgeTime: '{{ item.purgeTime }}'
      rateLimits: '{{ item.rateLimits }}'
      retryConfig: '{{ item.retryConfig }}'
      state: '{{ item.state }}'
      stats: '{{ item.stats }}'
      taskTtl: '{{ item.taskTtl }}'
      tombstoneTtl: '{{ item.tombstoneTtl }}'
  uid_template: '{item.name}'
- discovery_id: gcp.cloudtasks.projects.locations.queues.tasks.list
  calls:
  - action: projects.locations.queues.tasks.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.tasks }}'
    item:
      appEngineHttpRequest: '{{ item.appEngineHttpRequest }}'
      createTime: '{{ item.createTime }}'
      httpRequest: '{{ item.httpRequest }}'
      name: '{{ item.name }}'
      pullMessage: '{{ item.pullMessage }}'
      scheduleTime: '{{ item.scheduleTime }}'
      status: '{{ item.status }}'
      view: '{{ item.view }}'
  uid_template: '{item.name}'
- discovery_id: gcp.cloudtasks.projects.locations.queues.get
  for_each: gcp.cloudtasks.projects.locations.queues.list
  calls:
  - action: projects.locations.queues.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      appEngineHttpTarget: '{{ response.appEngineHttpTarget }}'
      httpTarget: '{{ response.httpTarget }}'
      name: '{{ response.name }}'
      pullTarget: '{{ response.pullTarget }}'
      purgeTime: '{{ response.purgeTime }}'
      rateLimits: '{{ response.rateLimits }}'
      retryConfig: '{{ response.retryConfig }}'
      state: '{{ response.state }}'
      stats: '{{ response.stats }}'
      taskTtl: '{{ response.taskTtl }}'
      tombstoneTtl: '{{ response.tombstoneTtl }}'
- discovery_id: gcp.cloudtasks.projects.locations.queues.tasks.get
  for_each: gcp.cloudtasks.projects.locations.queues.tasks.list
  calls:
  - action: projects.locations.queues.tasks.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      appEngineHttpRequest: '{{ response.appEngineHttpRequest }}'
      createTime: '{{ response.createTime }}'
      httpRequest: '{{ response.httpRequest }}'
      name: '{{ response.name }}'
      pullMessage: '{{ response.pullMessage }}'
      scheduleTime: '{{ response.scheduleTime }}'
      status: '{{ response.status }}'
      view: '{{ response.view }}'
