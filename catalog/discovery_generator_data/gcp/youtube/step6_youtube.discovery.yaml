version: '1.0'
provider: gcp
service: youtube
services:
  client: youtube
  module: googleapiclient.discovery.build('youtube', 'v3')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.youtube.playlistImages.list
  calls:
  - action: playlistImages.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.playlistImages }}'
    item:
      id: '{{ item.id }}'
      snippet: '{{ item.snippet }}'
  uid_template: '{item.id}'
- discovery_id: gcp.youtube.videoTrainability.get
  calls:
  - action: videoTrainability.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      permitted: '{{ response.permitted }}'
      videoId: '{{ response.videoId }}'
- discovery_id: gcp.youtube.youtube.v3.liveChat.messages.stream
  calls:
  - action: youtube.v3.liveChat.messages.stream
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      activePollItem: '{{ response.activePollItem }}'
      eventId: '{{ response.eventId }}'
      items: '{{ response.items }}'
      offlineAt: '{{ response.offlineAt }}'
      pageInfo: '{{ response.pageInfo }}'
      pollingIntervalMillis: '{{ response.pollingIntervalMillis }}'
      tokenPagination: '{{ response.tokenPagination }}'
      visitorId: '{{ response.visitorId }}'
- discovery_id: gcp.youtube.activities.list
  calls:
  - action: activities.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.activities }}'
    item:
      contentDetails: '{{ item.contentDetails }}'
      id: '{{ item.id }}'
      snippet: '{{ item.snippet }}'
  uid_template: '{item.id}'
- discovery_id: gcp.youtube.captions.download
  for_each: gcp.youtube.activities.list
  calls:
  - action: captions.download
    params:
      id: '{{ item.id }}'
    save_as: response
    on_error: continue
  emit:
    as: item
- discovery_id: gcp.youtube.captions.list
  calls:
  - action: captions.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.captions }}'
    item:
      id: '{{ item.id }}'
      snippet: '{{ item.snippet }}'
  uid_template: '{item.id}'
- discovery_id: gcp.youtube.channelSections.list
  calls:
  - action: channelSections.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.channelSections }}'
    item:
      contentDetails: '{{ item.contentDetails }}'
      id: '{{ item.id }}'
      localizations: '{{ item.localizations }}'
      snippet: '{{ item.snippet }}'
      targeting: '{{ item.targeting }}'
  uid_template: '{item.id}'
- discovery_id: gcp.youtube.channels.list
  calls:
  - action: channels.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.channels }}'
    item:
      auditDetails: '{{ item.auditDetails }}'
      brandingSettings: '{{ item.brandingSettings }}'
      contentDetails: '{{ item.contentDetails }}'
      contentOwnerDetails: '{{ item.contentOwnerDetails }}'
      conversionPings: '{{ item.conversionPings }}'
      id: '{{ item.id }}'
      localizations: '{{ item.localizations }}'
      snippet: '{{ item.snippet }}'
      statistics: '{{ item.statistics }}'
      status: '{{ item.status }}'
      topicDetails: '{{ item.topicDetails }}'
  uid_template: '{item.id}'
