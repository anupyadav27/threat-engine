      deviceTierConfigId: '{{ item.deviceTierConfigId }}'
      deviceTierSet: '{{ item.deviceTierSet }}'
      userCountrySets: '{{ item.userCountrySets }}'
- discovery_id: gcp.androidpublisher.apprecovery.list
