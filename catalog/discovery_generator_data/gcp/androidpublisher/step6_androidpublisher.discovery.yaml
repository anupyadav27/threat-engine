version: '1.0'
provider: gcp
service: androidpublisher
services:
  client: androidpublisher
  module: googleapiclient.discovery.build('androidpublisher', 'v3')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.androidpublisher.users.list
  calls:
  - action: users.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.users }}'
    item:
      accessState: '{{ item.accessState }}'
      developerAccountPermissions: '{{ item.developerAccountPermissions }}'
      email: '{{ item.email }}'
      expirationTime: '{{ item.expirationTime }}'
      grants: '{{ item.grants }}'
      name: '{{ item.name }}'
      partial: '{{ item.partial }}'
  uid_template: '{item.name}'
- discovery_id: gcp.androidpublisher.applications.deviceTierConfigs.get
  for_each: gcp.androidpublisher.applications.deviceTierConfigs.list
  calls:
  - action: applications.deviceTierConfigs.get
    params:
      deviceTierConfigId: '{{ item.deviceTierConfigId }}'
      packageName: '{{ item.packageName }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      deviceGroups: '{{ response.deviceGroups }}'
      deviceTierConfigId: '{{ response.deviceTierConfigId }}'
      deviceTierSet: '{{ response.deviceTierSet }}'
      userCountrySets: '{{ response.userCountrySets }}'
- discovery_id: gcp.androidpublisher.applications.deviceTierConfigs.list
  for_each: gcp.androidpublisher.inappproducts.list
  calls:
  - action: applications.deviceTierConfigs.list
    params:
      packageName: '{{ item.packageName }}'
    save_as: response
    on_error: continue
  emit:
