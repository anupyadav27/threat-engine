version: '1.0'
provider: gcp
service: notebooks
services:
  client: notebooks
  module: googleapiclient.discovery.build('notebooks', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.notebooks.projects.locations.environments.list
  calls:
  - action: projects.locations.environments.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.environments }}'
    item:
      containerImage: '{{ item.containerImage }}'
      createTime: '{{ item.createTime }}'
      description: '{{ item.description }}'
      displayName: '{{ item.displayName }}'
      name: '{{ item.name }}'
      postStartupScript: '{{ item.postStartupScript }}'
      vmImage: '{{ item.vmImage }}'
  uid_template: '{item.name}'
- discovery_id: gcp.notebooks.projects.locations.executions.list
  calls:
  - action: projects.locations.executions.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.executions }}'
    item:
      createTime: '{{ item.createTime }}'
      description: '{{ item.description }}'
      displayName: '{{ item.displayName }}'
      executionTemplate: '{{ item.executionTemplate }}'
      jobUri: '{{ item.jobUri }}'
      name: '{{ item.name }}'
      outputNotebookFile: '{{ item.outputNotebookFile }}'
      state: '{{ item.state }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.notebooks.projects.locations.get
  calls:
  - action: projects.locations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      displayName: '{{ response.displayName }}'
      labels: '{{ response.labels }}'
      locationId: '{{ response.locationId }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.notebooks.projects.locations.instances.list
  calls:
  - action: projects.locations.instances.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.instances }}'
    item:
      acceleratorConfig: '{{ item.acceleratorConfig }}'
      bootDiskSizeGb: '{{ item.bootDiskSizeGb }}'
      bootDiskType: '{{ item.bootDiskType }}'
      canIpForward: '{{ item.canIpForward }}'
      containerImage: '{{ item.containerImage }}'
      createTime: '{{ item.createTime }}'
      creator: '{{ item.creator }}'
      customGpuDriverPath: '{{ item.customGpuDriverPath }}'
      dataDiskSizeGb: '{{ item.dataDiskSizeGb }}'
      dataDiskType: '{{ item.dataDiskType }}'
      diskEncryption: '{{ item.diskEncryption }}'
      disks: '{{ item.disks }}'
      installGpuDriver: '{{ item.installGpuDriver }}'
      instanceMigrationEligibility: '{{ item.instanceMigrationEligibility }}'
      instanceOwners: '{{ item.instanceOwners }}'
      kmsKey: '{{ item.kmsKey }}'
      labels: '{{ item.labels }}'
      machineType: '{{ item.machineType }}'
      metadata: '{{ item.metadata }}'
      migrated: '{{ item.migrated }}'
      name: '{{ item.name }}'
      network: '{{ item.network }}'
      nicType: '{{ item.nicType }}'
      noProxyAccess: '{{ item.noProxyAccess }}'
      noPublicIp: '{{ item.noPublicIp }}'
      noRemoveDataDisk: '{{ item.noRemoveDataDisk }}'
      postStartupScript: '{{ item.postStartupScript }}'
      proxyUri: '{{ item.proxyUri }}'
      reservationAffinity: '{{ item.reservationAffinity }}'
      serviceAccount: '{{ item.serviceAccount }}'
      serviceAccountScopes: '{{ item.serviceAccountScopes }}'
      shieldedInstanceConfig: '{{ item.shieldedInstanceConfig }}'
      state: '{{ item.state }}'
      subnet: '{{ item.subnet }}'
      tags: '{{ item.tags }}'
      updateTime: '{{ item.updateTime }}'
      upgradeHistory: '{{ item.upgradeHistory }}'
      vmImage: '{{ item.vmImage }}'
  uid_template: '{item.name}'
- discovery_id: gcp.notebooks.projects.locations.list
