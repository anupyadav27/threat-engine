version: '1.0'
provider: gcp
service: storagetransfer
services:
  client: storagetransfer
  module: googleapiclient.discovery.build('storagetransfer', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.storagetransfer.googleServiceAccounts.get
  calls:
  - action: googleServiceAccounts.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      accountEmail: '{{ response.accountEmail }}'
      subjectId: '{{ response.subjectId }}'
- discovery_id: gcp.storagetransfer.projects.agentPools.list
  calls:
  - action: projects.agentPools.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.agentPools }}'
    item:
      bandwidthLimit: '{{ item.bandwidthLimit }}'
      displayName: '{{ item.displayName }}'
      name: '{{ item.name }}'
      state: '{{ item.state }}'
  uid_template: '{item.name}'
- discovery_id: gcp.storagetransfer.projects.agentPools.get
  for_each: gcp.storagetransfer.projects.agentPools.list
  calls:
  - action: projects.agentPools.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      bandwidthLimit: '{{ response.bandwidthLimit }}'
      displayName: '{{ response.displayName }}'
      name: '{{ response.name }}'
      state: '{{ response.state }}'
- discovery_id: gcp.storagetransfer.transferJobs.get
  for_each: gcp.storagetransfer.transferJobs.list
  calls:
  - action: transferJobs.get
    params:
      jobName: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      creationTime: '{{ response.creationTime }}'
      deletionTime: '{{ response.deletionTime }}'
      description: '{{ response.description }}'
      eventStream: '{{ response.eventStream }}'
      lastModificationTime: '{{ response.lastModificationTime }}'
      latestOperationName: '{{ response.latestOperationName }}'
      loggingConfig: '{{ response.loggingConfig }}'
      name: '{{ response.name }}'
      notificationConfig: '{{ response.notificationConfig }}'
      projectId: '{{ response.projectId }}'
      replicationSpec: '{{ response.replicationSpec }}'
      schedule: '{{ response.schedule }}'
      serviceAccount: '{{ response.serviceAccount }}'
      status: '{{ response.status }}'
      transferSpec: '{{ response.transferSpec }}'
- discovery_id: gcp.storagetransfer.transferJobs.list
  calls:
  - action: transferJobs.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.transferJobs }}'
    item:
      creationTime: '{{ item.creationTime }}'
      deletionTime: '{{ item.deletionTime }}'
      description: '{{ item.description }}'
      eventStream: '{{ item.eventStream }}'
      lastModificationTime: '{{ item.lastModificationTime }}'
      latestOperationName: '{{ item.latestOperationName }}'
      loggingConfig: '{{ item.loggingConfig }}'
      name: '{{ item.name }}'
      notificationConfig: '{{ item.notificationConfig }}'
      projectId: '{{ item.projectId }}'
      replicationSpec: '{{ item.replicationSpec }}'
      schedule: '{{ item.schedule }}'
      serviceAccount: '{{ item.serviceAccount }}'
      status: '{{ item.status }}'
      transferSpec: '{{ item.transferSpec }}'
  uid_template: '{item.name}'
- discovery_id: gcp.storagetransfer.transferOperations.get
  for_each: gcp.storagetransfer.transferOperations.list
  calls:
  - action: transferOperations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
- discovery_id: gcp.storagetransfer.transferOperations.list
  calls:
  - action: transferOperations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.transferOperations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
