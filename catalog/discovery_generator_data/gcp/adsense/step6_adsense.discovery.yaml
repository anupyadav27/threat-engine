version: '1.0'
provider: gcp
service: adsense
services:
  client: adsense
  module: googleapiclient.discovery.build('adsense', 'v2')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.adsense.accounts.adclients.adunits.list
  calls:
  - action: accounts.adclients.adunits.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.adunits }}'
    item:
      contentAdsSettings: '{{ item.contentAdsSettings }}'
      displayName: '{{ item.displayName }}'
      name: '{{ item.name }}'
      reportingDimensionId: '{{ item.reportingDimensionId }}'
      state: '{{ item.state }}'
  uid_template: '{item.name}'
- discovery_id: gcp.adsense.accounts.adclients.adunits.listLinkedCustomChannels
  calls:
  - action: accounts.adclients.adunits.listLinkedCustomChannels
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.adunits }}'
    item:
      active: '{{ item.active }}'
      displayName: '{{ item.displayName }}'
      name: '{{ item.name }}'
      reportingDimensionId: '{{ item.reportingDimensionId }}'
  uid_template: '{item.name}'
- discovery_id: gcp.adsense.accounts.adclients.customchannels.list
