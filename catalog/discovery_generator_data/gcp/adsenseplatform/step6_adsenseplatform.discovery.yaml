version: '1.0'
provider: gcp
service: adsenseplatform
services:
  client: adsenseplatform
  module: googleapiclient.discovery.build('adsenseplatform', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.adsenseplatform.platforms.accounts.list
  calls:
  - action: platforms.accounts.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.accounts }}'
    item:
      createTime: '{{ item.createTime }}'
      creationRequestId: '{{ item.creationRequestId }}'
      displayName: '{{ item.displayName }}'
      name: '{{ item.name }}'
      regionCode: '{{ item.regionCode }}'
      state: '{{ item.state }}'
      timeZone: '{{ item.timeZone }}'
  uid_template: '{item.name}'
- discovery_id: gcp.adsenseplatform.platforms.accounts.lookup
  calls:
  - action: platforms.accounts.lookup
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.adsenseplatform.platforms.accounts.sites.list
  calls:
  - action: platforms.accounts.sites.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.sites }}'
    item:
      domain: '{{ item.domain }}'
      name: '{{ item.name }}'
      state: '{{ item.state }}'
  uid_template: '{item.name}'
- discovery_id: gcp.adsenseplatform.platforms.accounts.get
  calls:
  - action: platforms.accounts.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      createTime: '{{ response.createTime }}'
      creationRequestId: '{{ response.creationRequestId }}'
      displayName: '{{ response.displayName }}'
      name: '{{ response.name }}'
      regionCode: '{{ response.regionCode }}'
      state: '{{ response.state }}'
      timeZone: '{{ response.timeZone }}'
  uid_template: '{item.name}'
- discovery_id: gcp.adsenseplatform.platforms.accounts.sites.get
  for_each: gcp.adsenseplatform.platforms.accounts.sites.list
  calls:
  - action: platforms.accounts.sites.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      domain: '{{ response.domain }}'
      name: '{{ response.name }}'
      state: '{{ response.state }}'
