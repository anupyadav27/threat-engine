      config: '{{ item.config }}'
      createTime: '{{ item.createTime }}'
      deleteTime: '{{ item.deleteTime }}'
      expireTime: '{{ item.expireTime }}'
      gcsBucket: '{{ item.gcsBucket }}'
      keySpec: '{{ item.keySpec }}'
      labels: '{{ item.labels }}'
      lifetime: '{{ item.lifetime }}'
      name: '{{ item.name }}'
      pemCaCertificates: '{{ item.pemCaCertificates }}'
      satisfiesPzi: '{{ item.satisfiesPzi }}'
      satisfiesPzs: '{{ item.satisfiesPzs }}'
      state: '{{ item.state }}'
      subordinateConfig: '{{ item.subordinateConfig }}'
      tier: '{{ item.tier }}'
      type: '{{ item.type }}'
      updateTime: '{{ item.updateTime }}'
      userDefinedAccessUrls: '{{ item.userDefinedAccessUrls }}'
  uid_template: '{item.name}'
- discovery_id: gcp.privateca.projects.locations.caPools.certificates.list
