version: '1.0'
provider: gcp
service: privateca
services:
  client: privateca
  module: googleapiclient.discovery.build('privateca', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.privateca.projects.locations.caPools.certificateAuthorities.certificateRevocationLists.list
  calls:
  - action: projects.locations.caPools.certificateAuthorities.certificateRevocationLists.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.certificateRevocationLists }}'
    item:
      accessUrl: '{{ item.accessUrl }}'
      createTime: '{{ item.createTime }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      pemCrl: '{{ item.pemCrl }}'
      revisionId: '{{ item.revisionId }}'
      revokedCertificates: '{{ item.revokedCertificates }}'
      sequenceNumber: '{{ item.sequenceNumber }}'
      state: '{{ item.state }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.privateca.projects.locations.caPools.certificateAuthorities.list
  calls:
  - action: projects.locations.caPools.certificateAuthorities.list
    params: {}
    save_as: response
    on_error: continue
