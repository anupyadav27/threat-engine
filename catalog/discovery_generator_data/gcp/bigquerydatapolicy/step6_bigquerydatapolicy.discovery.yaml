version: '1.0'
provider: gcp
service: bigquerydatapolicy
services:
  client: bigquerydatapolicy
  module: googleapiclient.discovery.build('bigquerydatapolicy', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.bigquerydatapolicy.projects.locations.dataPolicies.list
  calls:
  - action: projects.locations.dataPolicies.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.dataPolicies }}'
    item:
      dataMaskingPolicy: '{{ item.dataMaskingPolicy }}'
      dataPolicyId: '{{ item.dataPolicyId }}'
      dataPolicyType: '{{ item.dataPolicyType }}'
      name: '{{ item.name }}'
      policyTag: '{{ item.policyTag }}'
  uid_template: '{item.name}'
- discovery_id: gcp.bigquerydatapolicy.projects.locations.dataPolicies.get
  for_each: gcp.bigquerydatapolicy.projects.locations.dataPolicies.list
  calls:
  - action: projects.locations.dataPolicies.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      dataMaskingPolicy: '{{ response.dataMaskingPolicy }}'
      dataPolicyId: '{{ response.dataPolicyId }}'
      dataPolicyType: '{{ response.dataPolicyType }}'
      name: '{{ response.name }}'
      policyTag: '{{ response.policyTag }}'
