version: '1.0'
provider: gcp
service: workflowexecutions
services:
  client: workflowexecutions
  module: googleapiclient.discovery.build('workflowexecutions', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.workflowexecutions.projects.locations.workflows.executions.callbacks.list
  calls:
  - action: projects.locations.workflows.executions.callbacks.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.callbacks }}'
    item:
      availablePayloads: '{{ item.availablePayloads }}'
      method: '{{ item.method }}'
      name: '{{ item.name }}'
      waiters: '{{ item.waiters }}'
  uid_template: '{item.name}'
- discovery_id: gcp.workflowexecutions.projects.locations.workflows.executions.list
  calls:
  - action: projects.locations.workflows.executions.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.executions }}'
    item:
      argument: '{{ item.argument }}'
      callLogLevel: '{{ item.callLogLevel }}'
      createTime: '{{ item.createTime }}'
      disableConcurrencyQuotaOverflowBuffering: '{{ item.disableConcurrencyQuotaOverflowBuffering
        }}'
      duration: '{{ item.duration }}'
      endTime: '{{ item.endTime }}'
      error: '{{ item.error }}'
      executionHistoryLevel: '{{ item.executionHistoryLevel }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      result: '{{ item.result }}'
      startTime: '{{ item.startTime }}'
      state: '{{ item.state }}'
      stateError: '{{ item.stateError }}'
      status: '{{ item.status }}'
      workflowRevisionId: '{{ item.workflowRevisionId }}'
  uid_template: '{item.name}'
- discovery_id: gcp.workflowexecutions.projects.locations.workflows.executions.stepEntries.list
  calls:
  - action: projects.locations.workflows.executions.stepEntries.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.stepEntries }}'
    item:
      createTime: '{{ item.createTime }}'
      entryId: '{{ item.entryId }}'
      exception: '{{ item.exception }}'
      name: '{{ item.name }}'
      navigationInfo: '{{ item.navigationInfo }}'
      routine: '{{ item.routine }}'
      state: '{{ item.state }}'
      step: '{{ item.step }}'
      stepEntryMetadata: '{{ item.stepEntryMetadata }}'
      stepType: '{{ item.stepType }}'
      updateTime: '{{ item.updateTime }}'
      variableData: '{{ item.variableData }}'
  uid_template: '{item.name}'
- discovery_id: gcp.workflowexecutions.projects.locations.workflows.executions.exportData
  for_each: gcp.workflowexecutions.projects.locations.workflows.executions.list
  calls:
  - action: projects.locations.workflows.executions.exportData
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      data: '{{ response.data }}'
- discovery_id: gcp.workflowexecutions.projects.locations.workflows.executions.get
  for_each: gcp.workflowexecutions.projects.locations.workflows.executions.list
  calls:
  - action: projects.locations.workflows.executions.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      argument: '{{ response.argument }}'
      callLogLevel: '{{ response.callLogLevel }}'
      createTime: '{{ response.createTime }}'
      disableConcurrencyQuotaOverflowBuffering: '{{ response.disableConcurrencyQuotaOverflowBuffering
        }}'
      duration: '{{ response.duration }}'
      endTime: '{{ response.endTime }}'
      error: '{{ response.error }}'
      executionHistoryLevel: '{{ response.executionHistoryLevel }}'
      labels: '{{ response.labels }}'
      name: '{{ response.name }}'
      result: '{{ response.result }}'
      startTime: '{{ response.startTime }}'
      state: '{{ response.state }}'
      stateError: '{{ response.stateError }}'
      status: '{{ response.status }}'
      workflowRevisionId: '{{ response.workflowRevisionId }}'
- discovery_id: gcp.workflowexecutions.projects.locations.workflows.executions.stepEntries.get
  for_each: gcp.workflowexecutions.projects.locations.workflows.executions.stepEntries.list
  calls:
  - action: projects.locations.workflows.executions.stepEntries.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      createTime: '{{ response.createTime }}'
      entryId: '{{ response.entryId }}'
      exception: '{{ response.exception }}'
      name: '{{ response.name }}'
      navigationInfo: '{{ response.navigationInfo }}'
      routine: '{{ response.routine }}'
      state: '{{ response.state }}'
      step: '{{ response.step }}'
      stepEntryMetadata: '{{ response.stepEntryMetadata }}'
      stepType: '{{ response.stepType }}'
      updateTime: '{{ response.updateTime }}'
      variableData: '{{ response.variableData }}'
