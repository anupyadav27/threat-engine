version: '1.0'
provider: gcp
service: hypercomputecluster
services:
  client: hypercomputecluster
  module: googleapiclient.discovery.build('hypercomputecluster', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.hypercomputecluster.projects.locations.clusters.list
  calls:
  - action: projects.locations.clusters.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.clusters }}'
    item:
      computeResources: '{{ item.computeResources }}'
      createTime: '{{ item.createTime }}'
      description: '{{ item.description }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      networkResources: '{{ item.networkResources }}'
      orchestrator: '{{ item.orchestrator }}'
      reconciling: '{{ item.reconciling }}'
      storageResources: '{{ item.storageResources }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.hypercomputecluster.projects.locations.get
  calls:
  - action: projects.locations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      displayName: '{{ response.displayName }}'
      labels: '{{ response.labels }}'
      locationId: '{{ response.locationId }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.hypercomputecluster.projects.locations.list
  calls:
  - action: projects.locations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.locations }}'
    item:
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      locationId: '{{ item.locationId }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.hypercomputecluster.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.hypercomputecluster.projects.locations.clusters.get
  for_each: gcp.hypercomputecluster.projects.locations.clusters.list
  calls:
  - action: projects.locations.clusters.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      computeResources: '{{ response.computeResources }}'
      createTime: '{{ response.createTime }}'
      description: '{{ response.description }}'
      labels: '{{ response.labels }}'
      name: '{{ response.name }}'
      networkResources: '{{ response.networkResources }}'
      orchestrator: '{{ response.orchestrator }}'
      reconciling: '{{ response.reconciling }}'
      storageResources: '{{ response.storageResources }}'
      updateTime: '{{ response.updateTime }}'
- discovery_id: gcp.hypercomputecluster.projects.locations.operations.get
  for_each: gcp.hypercomputecluster.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
