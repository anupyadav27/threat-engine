version: '1.0'
provider: gcp
service: blockchainnodeengine
services:
  client: blockchainnodeengine
  module: googleapiclient.discovery.build('blockchainnodeengine', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.blockchainnodeengine.projects.locations.blockchainNodes.list
  calls:
  - action: projects.locations.blockchainNodes.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.blockchainNodes }}'
    item:
      blockchainType: '{{ item.blockchainType }}'
      connectionInfo: '{{ item.connectionInfo }}'
      createTime: '{{ item.createTime }}'
      ethereumDetails: '{{ item.ethereumDetails }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      privateServiceConnectEnabled: '{{ item.privateServiceConnectEnabled }}'
      state: '{{ item.state }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.blockchainnodeengine.projects.locations.get
  calls:
  - action: projects.locations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      displayName: '{{ response.displayName }}'
      labels: '{{ response.labels }}'
      locationId: '{{ response.locationId }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.blockchainnodeengine.projects.locations.list
  calls:
  - action: projects.locations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.locations }}'
    item:
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      locationId: '{{ item.locationId }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.blockchainnodeengine.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.blockchainnodeengine.projects.locations.blockchainNodes.get
  for_each: gcp.blockchainnodeengine.projects.locations.blockchainNodes.list
  calls:
  - action: projects.locations.blockchainNodes.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      blockchainType: '{{ response.blockchainType }}'
      connectionInfo: '{{ response.connectionInfo }}'
      createTime: '{{ response.createTime }}'
      ethereumDetails: '{{ response.ethereumDetails }}'
      labels: '{{ response.labels }}'
      name: '{{ response.name }}'
      privateServiceConnectEnabled: '{{ response.privateServiceConnectEnabled }}'
      state: '{{ response.state }}'
      updateTime: '{{ response.updateTime }}'
- discovery_id: gcp.blockchainnodeengine.projects.locations.operations.get
  for_each: gcp.blockchainnodeengine.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
