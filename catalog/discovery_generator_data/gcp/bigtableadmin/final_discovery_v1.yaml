version: '1.0'
provider: gcp
service: bigtable

services:
  client: bigtableadmin
  module: "googleapiclient.discovery.build('bigtableadmin', 'v1')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: unknown
    identifier_op: gcp.bigtableadmin.projects.instances.clusters.list
    identifier_field: clusters[].name
    item_var_path: item.clusters[].name
  - resource_type: unknown
    identifier_op: gcp.bigtableadmin.projects.instances.list
    identifier_field: instances[].name
    item_var_path: item.instances[].name
  - resource_type: unknown
    identifier_op: gcp.bigtableadmin.projects.instances.tables.list
    identifier_field: tables[].name
    item_var_path: item.tables[].name

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.bigtableadmin.projects.instances.clusters.list ──
  - discovery_id: gcp.bigtableadmin.projects.instances.clusters.list
    calls:
      - action: projects.instances.clusters.list
        params:
          parent: '{{ project_id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        clusterConfig: '{{ item.clusterConfig }}'
        defaultStorageType: '{{ item.defaultStorageType }}'
        encryptionConfig: '{{ item.encryptionConfig }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        nodeScalingFactor: '{{ item.nodeScalingFactor }}'
        serveNodes: '{{ item.serveNodes }}'
        state: '{{ item.state }}'

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.bigtableadmin.projects.instances.list ──
  - discovery_id: gcp.bigtableadmin.projects.instances.list
    calls:
      - action: projects.instances.list
        params:
          parent: '{{ project_id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        backups: '{{ item.backups }}'
        createTime: '{{ item.createTime }}'
        displayName: '{{ item.displayName }}'
        labels: '{{ item.labels }}'
        name: '{{ item.name }}'
        satisfiesPzi: '{{ item.satisfiesPzi }}'
        satisfiesPzs: '{{ item.satisfiesPzs }}'
        state: '{{ item.state }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.bigtableadmin.projects.instances.tables.list ──
  - discovery_id: gcp.bigtableadmin.projects.instances.tables.list
    calls:
      - action: projects.instances.tables.list
        params:
          parent: '{{ project_id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        automatedBackupPolicy: '{{ item.automatedBackupPolicy }}'
        changeStreamConfig: '{{ item.changeStreamConfig }}'
        clusterStates: '{{ item.clusterStates }}'
        columnFamilies: '{{ item.columnFamilies }}'
        deletionProtection: '{{ item.deletionProtection }}'
        granularity: '{{ item.granularity }}'
        name: '{{ item.name }}'
        replicationStates: '{{ item.replicationStates }}'
        restoreInfo: '{{ item.restoreInfo }}'
        rowKeySchema: '{{ item.rowKeySchema }}'
        stats: '{{ item.stats }}'
        tieredStorageConfig: '{{ item.tieredStorageConfig }}'

