    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
- discovery_id: gcp.bigtableadmin.projects.instances.appProfiles.get
  for_each: gcp.bigtableadmin.projects.instances.appProfiles.list
  calls:
  - action: projects.instances.appProfiles.get
    params:
