      endTime: '{{ response.endTime }}'
      expireTime: '{{ response.expireTime }}'
      hotToStandardTime: '{{ response.hotToStandardTime }}'
      name: '{{ response.name }}'
      sizeBytes: '{{ response.sizeBytes }}'
      sourceBackup: '{{ response.sourceBackup }}'
      sourceTable: '{{ response.sourceTable }}'
      startTime: '{{ response.startTime }}'
      state: '{{ response.state }}'
- discovery_id: gcp.bigtableadmin.projects.instances.clusters.get
  for_each: gcp.bigtableadmin.projects.instances.clusters.list
  calls:
  - action: projects.instances.clusters.get
