      name: '{{ item.name }}'
      subsetView: '{{ item.subsetView }}'
  uid_template: '{item.name}'
- discovery_id: gcp.bigtableadmin.projects.instances.tables.list
  calls:
  - action: projects.instances.tables.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.tables }}'
    item:
      automatedBackupPolicy: '{{ item.automatedBackupPolicy }}'
      changeStreamConfig: '{{ item.changeStreamConfig }}'
      clusterStates: '{{ item.clusterStates }}'
      columnFamilies: '{{ item.columnFamilies }}'
      deletionProtection: '{{ item.deletionProtection }}'
      granularity: '{{ item.granularity }}'
      name: '{{ item.name }}'
      restoreInfo: '{{ item.restoreInfo }}'
      rowKeySchema: '{{ item.rowKeySchema }}'
      stats: '{{ item.stats }}'
      tieredStorageConfig: '{{ item.tieredStorageConfig }}'
  uid_template: '{item.name}'
- discovery_id: gcp.bigtableadmin.projects.instances.tables.schemaBundles.list
  calls:
  - action: projects.instances.tables.schemaBundles.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.schemaBundles }}'
    item:
      name: '{{ item.name }}'
      protoSchema: '{{ item.protoSchema }}'
  uid_template: '{item.name}'
- discovery_id: gcp.bigtableadmin.projects.locations.list
  calls:
  - action: projects.locations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.locations }}'
    item:
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      locationId: '{{ item.locationId }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.bigtableadmin.operations.get
  for_each: gcp.bigtableadmin.operations.projects.operations.list
  calls:
  - action: operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
