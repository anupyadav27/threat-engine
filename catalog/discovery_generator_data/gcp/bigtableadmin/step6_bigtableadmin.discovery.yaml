version: '1.0'
provider: gcp
service: bigtableadmin
services:
  client: bigtableadmin
  module: googleapiclient.discovery.build('bigtableadmin', 'v2')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.bigtableadmin.operations.projects.operations.list
  calls:
  - action: operations.projects.operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.bigtableadmin.projects.instances.appProfiles.list
  calls:
  - action: projects.instances.appProfiles.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.appProfiles }}'
    item:
      dataBoostIsolationReadOnly: '{{ item.dataBoostIsolationReadOnly }}'
      description: '{{ item.description }}'
      multiClusterRoutingUseAny: '{{ item.multiClusterRoutingUseAny }}'
      name: '{{ item.name }}'
      priority: '{{ item.priority }}'
      singleClusterRouting: '{{ item.singleClusterRouting }}'
      standardIsolation: '{{ item.standardIsolation }}'
  uid_template: '{item.name}'
- discovery_id: gcp.bigtableadmin.projects.instances.clusters.backups.list
  calls:
  - action: projects.instances.clusters.backups.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.backups }}'
    item:
      backupType: '{{ item.backupType }}'
      encryptionInfo: '{{ item.encryptionInfo }}'
      endTime: '{{ item.endTime }}'
      expireTime: '{{ item.expireTime }}'
      hotToStandardTime: '{{ item.hotToStandardTime }}'
      name: '{{ item.name }}'
      sizeBytes: '{{ item.sizeBytes }}'
      sourceBackup: '{{ item.sourceBackup }}'
      sourceTable: '{{ item.sourceTable }}'
      startTime: '{{ item.startTime }}'
      state: '{{ item.state }}'
  uid_template: '{item.name}'
- discovery_id: gcp.bigtableadmin.projects.instances.clusters.hotTablets.list
  calls:
  - action: projects.instances.clusters.hotTablets.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.hotTablets }}'
    item:
      endKey: '{{ item.endKey }}'
      endTime: '{{ item.endTime }}'
      name: '{{ item.name }}'
      nodeCpuUsagePercent: '{{ item.nodeCpuUsagePercent }}'
      startKey: '{{ item.startKey }}'
      startTime: '{{ item.startTime }}'
      tableName: '{{ item.tableName }}'
  uid_template: '{item.name}'
- discovery_id: gcp.bigtableadmin.projects.instances.clusters.list
  calls:
  - action: projects.instances.clusters.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.clusters }}'
    item:
      clusterConfig: '{{ item.clusterConfig }}'
      defaultStorageType: '{{ item.defaultStorageType }}'
      encryptionConfig: '{{ item.encryptionConfig }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      nodeScalingFactor: '{{ item.nodeScalingFactor }}'
      serveNodes: '{{ item.serveNodes }}'
      state: '{{ item.state }}'
  uid_template: '{item.name}'
- discovery_id: gcp.bigtableadmin.projects.instances.list
  calls:
  - action: projects.instances.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.instances }}'
    item:
      createTime: '{{ item.createTime }}'
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      satisfiesPzi: '{{ item.satisfiesPzi }}'
      satisfiesPzs: '{{ item.satisfiesPzs }}'
      state: '{{ item.state }}'
      tags: '{{ item.tags }}'
      type: '{{ item.type }}'
  uid_template: '{item.name}'
- discovery_id: gcp.bigtableadmin.projects.instances.logicalViews.list
  calls:
  - action: projects.instances.logicalViews.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.logicalViews }}'
    item:
      deletionProtection: '{{ item.deletionProtection }}'
      name: '{{ item.name }}'
      query: '{{ item.query }}'
  uid_template: '{item.name}'
- discovery_id: gcp.bigtableadmin.projects.instances.materializedViews.list
  calls:
  - action: projects.instances.materializedViews.list
    params: {}
    save_as: response
    on_error: continue
  emit:
