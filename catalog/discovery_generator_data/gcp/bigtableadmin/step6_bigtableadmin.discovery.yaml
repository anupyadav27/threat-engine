      singleClusterRouting: '{{ response.singleClusterRouting }}'
      standardIsolation: '{{ response.standardIsolation }}'
- discovery_id: gcp.bigtableadmin.projects.instances.clusters.backups.get
  for_each: gcp.bigtableadmin.projects.instances.clusters.backups.list
  calls:
