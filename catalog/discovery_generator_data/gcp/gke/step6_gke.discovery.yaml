version: '1.0'
provider: gcp
service: gke
discovery:
- discovery_id: gcp.container.clusterroles.list
  calls:
  - action: client.cluster_roles.list(**params)
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      metadata: '{{ item.metadata }}'
      rules: '{{ item.rules }}'
      name: '{{ item.name }}'
      apiGroups: '{{ item.apiGroups }}'
      verbs: '{{ item.verbs }}'
      resources: '{{ item.resources }}'
  uid_template: '{item.name}'
- discovery_id: gcp.container.clusters.list
  calls:
  - action: projects.locations.clusters.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      networkPolicy: '{{ item.networkPolicy }}'
      addonsConfig: '{{ item.addonsConfig }}'
      nodeConfig: '{{ item.nodeConfig }}'
      masterAuth: '{{ item.masterAuth }}'
      network: '{{ item.network }}'
      subnetwork: '{{ item.subnetwork }}'
      loggingService: '{{ item.loggingService }}'
      monitoringService: '{{ item.monitoringService }}'
      privateClusterConfig: '{{ item.privateClusterConfig }}'
      shieldedNodes: '{{ item.shieldedNodes }}'
      workloadIdentityConfig: '{{ item.workloadIdentityConfig }}'
      binaryAuthorization: '{{ item.binaryAuthorization }}'
  uid_template: '{item.name}'
- discovery_id: gcp.container.projects.locations.clusters.list
  calls:
  - action: projects.locations.clusters.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.clusters }}'
    item:
      clusters[]: '{{ item.clusters[] }}'
