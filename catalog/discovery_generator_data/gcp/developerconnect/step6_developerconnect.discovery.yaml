    items_for: '{{ response.deploymentEvents }}'
    item:
      artifactDeployments: '{{ item.artifactDeployments }}'
      createTime: '{{ item.createTime }}'
      deployTime: '{{ item.deployTime }}'
      name: '{{ item.name }}'
      runtimeConfig: '{{ item.runtimeConfig }}'
      runtimeDeploymentUri: '{{ item.runtimeDeploymentUri }}'
      state: '{{ item.state }}'
      undeployTime: '{{ item.undeployTime }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.developerconnect.projects.locations.insightsConfigs.list
