version: '1.0'
provider: gcp
service: developerconnect
services:
  client: developerconnect
  module: googleapiclient.discovery.build('developerconnect', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.developerconnect.projects.locations.accountConnectors.list
  calls:
  - action: projects.locations.accountConnectors.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.accountConnectors }}'
    item:
      annotations: '{{ item.annotations }}'
      createTime: '{{ item.createTime }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      oauthStartUri: '{{ item.oauthStartUri }}'
      providerOauthConfig: '{{ item.providerOauthConfig }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.developerconnect.projects.locations.accountConnectors.users.list
  calls:
  - action: projects.locations.accountConnectors.users.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.users }}'
    item:
      createTime: '{{ item.createTime }}'
      displayName: '{{ item.displayName }}'
      lastTokenRequestTime: '{{ item.lastTokenRequestTime }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.developerconnect.projects.locations.connections.gitRepositoryLinks.list
  calls:
  - action: projects.locations.connections.gitRepositoryLinks.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.gitRepositoryLinks }}'
    item:
      annotations: '{{ item.annotations }}'
      cloneUri: '{{ item.cloneUri }}'
      createTime: '{{ item.createTime }}'
      deleteTime: '{{ item.deleteTime }}'
      gitProxyUri: '{{ item.gitProxyUri }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      reconciling: '{{ item.reconciling }}'
      uid: '{{ item.uid }}'
      updateTime: '{{ item.updateTime }}'
      webhookId: '{{ item.webhookId }}'
  uid_template: '{item.name}'
- discovery_id: gcp.developerconnect.projects.locations.connections.list
  calls:
  - action: projects.locations.connections.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.connections }}'
    item:
      annotations: '{{ item.annotations }}'
      bitbucketCloudConfig: '{{ item.bitbucketCloudConfig }}'
      bitbucketDataCenterConfig: '{{ item.bitbucketDataCenterConfig }}'
      createTime: '{{ item.createTime }}'
      cryptoKeyConfig: '{{ item.cryptoKeyConfig }}'
      deleteTime: '{{ item.deleteTime }}'
      disabled: '{{ item.disabled }}'
      gitProxyConfig: '{{ item.gitProxyConfig }}'
      githubConfig: '{{ item.githubConfig }}'
      githubEnterpriseConfig: '{{ item.githubEnterpriseConfig }}'
      gitlabConfig: '{{ item.gitlabConfig }}'
      gitlabEnterpriseConfig: '{{ item.gitlabEnterpriseConfig }}'
      httpConfig: '{{ item.httpConfig }}'
      installationState: '{{ item.installationState }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      reconciling: '{{ item.reconciling }}'
      secureSourceManagerInstanceConfig: '{{ item.secureSourceManagerInstanceConfig
        }}'
      uid: '{{ item.uid }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.developerconnect.projects.locations.get
  calls:
  - action: projects.locations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      displayName: '{{ response.displayName }}'
      labels: '{{ response.labels }}'
      locationId: '{{ response.locationId }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.developerconnect.projects.locations.insightsConfigs.deploymentEvents.list
  calls:
  - action: projects.locations.insightsConfigs.deploymentEvents.list
