    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.developerconnect.projects.locations.accountConnectors.get
  for_each: gcp.developerconnect.projects.locations.accountConnectors.list
  calls:
  - action: projects.locations.accountConnectors.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
