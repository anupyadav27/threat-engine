      errors: '{{ item.errors }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      projects: '{{ item.projects }}'
      reconciling: '{{ item.reconciling }}'
      runtimeConfigs: '{{ item.runtimeConfigs }}'
      state: '{{ item.state }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.developerconnect.projects.locations.list
  calls:
  - action: projects.locations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
