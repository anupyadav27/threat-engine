version: '1.0'
provider: gcp
service: firebaseapphosting
services:
  client: firebaseapphosting
  module: googleapiclient.discovery.build('firebaseapphosting', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.firebaseapphosting.projects.locations.backends.builds.list
  calls:
  - action: projects.locations.backends.builds.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.builds }}'
    item:
      annotations: '{{ item.annotations }}'
      buildLogsUri: '{{ item.buildLogsUri }}'
      config: '{{ item.config }}'
      createTime: '{{ item.createTime }}'
      deleteTime: '{{ item.deleteTime }}'
      displayName: '{{ item.displayName }}'
      environment: '{{ item.environment }}'
      errors: '{{ item.errors }}'
      image: '{{ item.image }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      reconciling: '{{ item.reconciling }}'
      source: '{{ item.source }}'
      state: '{{ item.state }}'
      uid: '{{ item.uid }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.firebaseapphosting.projects.locations.backends.domains.list
  calls:
  - action: projects.locations.backends.domains.list
    params: {}
    save_as: response
    on_error: continue
  emit:
