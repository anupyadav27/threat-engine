version: '1.0'
provider: gcp
service: vpcaccess
services:
  client: vpcaccess
  module: googleapiclient.discovery.build('vpcaccess', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.vpcaccess.projects.locations.connectors.list
  calls:
  - action: projects.locations.connectors.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.connectors }}'
    item:
      connectedProjects: '{{ item.connectedProjects }}'
      ipCidrRange: '{{ item.ipCidrRange }}'
      machineType: '{{ item.machineType }}'
      maxInstances: '{{ item.maxInstances }}'
      maxThroughput: '{{ item.maxThroughput }}'
      minInstances: '{{ item.minInstances }}'
      minThroughput: '{{ item.minThroughput }}'
      name: '{{ item.name }}'
      network: '{{ item.network }}'
      state: '{{ item.state }}'
      subnet: '{{ item.subnet }}'
  uid_template: '{item.name}'
- discovery_id: gcp.vpcaccess.projects.locations.list
  calls:
  - action: projects.locations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.locations }}'
    item:
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      locationId: '{{ item.locationId }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.vpcaccess.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.vpcaccess.projects.locations.connectors.get
  for_each: gcp.vpcaccess.projects.locations.connectors.list
  calls:
  - action: projects.locations.connectors.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      connectedProjects: '{{ response.connectedProjects }}'
      ipCidrRange: '{{ response.ipCidrRange }}'
      machineType: '{{ response.machineType }}'
      maxInstances: '{{ response.maxInstances }}'
      maxThroughput: '{{ response.maxThroughput }}'
      minInstances: '{{ response.minInstances }}'
      minThroughput: '{{ response.minThroughput }}'
      name: '{{ response.name }}'
      network: '{{ response.network }}'
      state: '{{ response.state }}'
      subnet: '{{ response.subnet }}'
- discovery_id: gcp.vpcaccess.projects.locations.operations.get
  for_each: gcp.vpcaccess.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
