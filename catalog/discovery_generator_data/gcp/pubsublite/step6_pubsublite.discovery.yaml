version: '1.0'
provider: gcp
service: pubsublite
services:
  client: pubsublite
  module: googleapiclient.discovery.build('pubsublite', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.pubsublite.admin.projects.locations.operations.list
  calls:
  - action: admin.projects.locations.operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.pubsublite.admin.projects.locations.reservations.list
  calls:
  - action: admin.projects.locations.reservations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.reservations }}'
    item:
      name: '{{ item.name }}'
      throughputCapacity: '{{ item.throughputCapacity }}'
  uid_template: '{item.name}'
- discovery_id: gcp.pubsublite.admin.projects.locations.subscriptions.list
  calls:
  - action: admin.projects.locations.subscriptions.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.subscriptions }}'
    item:
      deliveryConfig: '{{ item.deliveryConfig }}'
      exportConfig: '{{ item.exportConfig }}'
      name: '{{ item.name }}'
      topic: '{{ item.topic }}'
  uid_template: '{item.name}'
- discovery_id: gcp.pubsublite.admin.projects.locations.topics.list
  calls:
  - action: admin.projects.locations.topics.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.topics }}'
    item:
      name: '{{ item.name }}'
      partitionConfig: '{{ item.partitionConfig }}'
      reservationConfig: '{{ item.reservationConfig }}'
      retentionConfig: '{{ item.retentionConfig }}'
  uid_template: '{item.name}'
- discovery_id: gcp.pubsublite.cursor.projects.locations.subscriptions.cursors.list
  calls:
  - action: cursor.projects.locations.subscriptions.cursors.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.cursors }}'
    item:
      cursor: '{{ item.cursor }}'
      partition: '{{ item.partition }}'
- discovery_id: gcp.pubsublite.admin.projects.locations.operations.get
  for_each: gcp.pubsublite.admin.projects.locations.operations.list
  calls:
  - action: admin.projects.locations.operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
- discovery_id: gcp.pubsublite.admin.projects.locations.reservations.get
  for_each: gcp.pubsublite.admin.projects.locations.reservations.list
  calls:
  - action: admin.projects.locations.reservations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      name: '{{ response.name }}'
      throughputCapacity: '{{ response.throughputCapacity }}'
- discovery_id: gcp.pubsublite.admin.projects.locations.reservations.topics.list
  for_each: gcp.pubsublite.admin.projects.locations.reservations.list
  calls:
  - action: admin.projects.locations.reservations.topics.list
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.topics }}'
- discovery_id: gcp.pubsublite.admin.projects.locations.subscriptions.get
  for_each: gcp.pubsublite.admin.projects.locations.subscriptions.list
  calls:
  - action: admin.projects.locations.subscriptions.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      deliveryConfig: '{{ response.deliveryConfig }}'
      exportConfig: '{{ response.exportConfig }}'
      name: '{{ response.name }}'
      topic: '{{ response.topic }}'
- discovery_id: gcp.pubsublite.admin.projects.locations.topics.get
  for_each: gcp.pubsublite.admin.projects.locations.topics.list
  calls:
  - action: admin.projects.locations.topics.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      name: '{{ response.name }}'
      partitionConfig: '{{ response.partitionConfig }}'
      reservationConfig: '{{ response.reservationConfig }}'
      retentionConfig: '{{ response.retentionConfig }}'
- discovery_id: gcp.pubsublite.admin.projects.locations.topics.getPartitions
  for_each: gcp.pubsublite.admin.projects.locations.topics.list
  calls:
  - action: admin.projects.locations.topics.getPartitions
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      partitionCount: '{{ response.partitionCount }}'
- discovery_id: gcp.pubsublite.admin.projects.locations.topics.subscriptions.list
  for_each: gcp.pubsublite.admin.projects.locations.topics.list
  calls:
  - action: admin.projects.locations.topics.subscriptions.list
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.subscriptions }}'
