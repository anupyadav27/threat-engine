version: '1.0'
provider: gcp
service: biglake
services:
  client: biglake
  module: googleapiclient.discovery.build('biglake', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.biglake.projects.locations.catalogs.databases.list
  calls:
  - action: projects.locations.catalogs.databases.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.databases }}'
    item:
      createTime: '{{ item.createTime }}'
      deleteTime: '{{ item.deleteTime }}'
      expireTime: '{{ item.expireTime }}'
      hiveOptions: '{{ item.hiveOptions }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.biglake.projects.locations.catalogs.databases.tables.list
  calls:
  - action: projects.locations.catalogs.databases.tables.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.tables }}'
    item:
      createTime: '{{ item.createTime }}'
      deleteTime: '{{ item.deleteTime }}'
      expireTime: '{{ item.expireTime }}'
      hiveOptions: '{{ item.hiveOptions }}'
      name: '{{ item.name }}'
      type: '{{ item.type }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.biglake.projects.locations.catalogs.list
  calls:
  - action: projects.locations.catalogs.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.catalogs }}'
    item:
      createTime: '{{ item.createTime }}'
      deleteTime: '{{ item.deleteTime }}'
      expireTime: '{{ item.expireTime }}'
      name: '{{ item.name }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.biglake.projects.catalogs.getIamPolicy
  for_each: gcp.biglake.projects.locations.catalogs.list
  calls:
  - action: projects.catalogs.getIamPolicy
    params:
      resource: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      auditConfigs: '{{ response.auditConfigs }}'
      bindings: '{{ response.bindings }}'
      version: '{{ response.version }}'
- discovery_id: gcp.biglake.projects.catalogs.namespaces.getIamPolicy
  for_each: gcp.biglake.projects.locations.catalogs.list
  calls:
  - action: projects.catalogs.namespaces.getIamPolicy
    params:
      resource: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      auditConfigs: '{{ response.auditConfigs }}'
      bindings: '{{ response.bindings }}'
      version: '{{ response.version }}'
- discovery_id: gcp.biglake.projects.catalogs.namespaces.tables.getIamPolicy
  for_each: gcp.biglake.projects.locations.catalogs.databases.tables.list
  calls:
  - action: projects.catalogs.namespaces.tables.getIamPolicy
    params:
      resource: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      auditConfigs: '{{ response.auditConfigs }}'
      bindings: '{{ response.bindings }}'
      version: '{{ response.version }}'
- discovery_id: gcp.biglake.projects.locations.catalogs.databases.get
  for_each: gcp.biglake.projects.locations.catalogs.databases.list
  calls:
  - action: projects.locations.catalogs.databases.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      createTime: '{{ response.createTime }}'
      deleteTime: '{{ response.deleteTime }}'
      expireTime: '{{ response.expireTime }}'
      hiveOptions: '{{ response.hiveOptions }}'
      name: '{{ response.name }}'
      type: '{{ response.type }}'
      updateTime: '{{ response.updateTime }}'
- discovery_id: gcp.biglake.projects.locations.catalogs.databases.tables.get
  for_each: gcp.biglake.projects.locations.catalogs.databases.tables.list
  calls:
  - action: projects.locations.catalogs.databases.tables.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      createTime: '{{ response.createTime }}'
      deleteTime: '{{ response.deleteTime }}'
      expireTime: '{{ response.expireTime }}'
      hiveOptions: '{{ response.hiveOptions }}'
      name: '{{ response.name }}'
      type: '{{ response.type }}'
      updateTime: '{{ response.updateTime }}'
- discovery_id: gcp.biglake.projects.locations.catalogs.get
  for_each: gcp.biglake.projects.locations.catalogs.list
  calls:
  - action: projects.locations.catalogs.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      createTime: '{{ response.createTime }}'
      deleteTime: '{{ response.deleteTime }}'
      expireTime: '{{ response.expireTime }}'
      name: '{{ response.name }}'
      updateTime: '{{ response.updateTime }}'
