version: '1.0'
provider: gcp
service: cloudrun
discovery:
- discovery_id: gcp.cloudrun.list_services
  calls:
  - action: projects.locations.services.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      spec: '{{ item.spec }}'
      metadata: '{{ item.metadata }}'
      traffic: '{{ item.traffic }}'
      url: '{{ item.url }}'
      conditions: '{{ item.conditions }}'
      latestCreatedRevisionName: '{{ item.latestCreatedRevisionName }}'
      latestReadyRevisionName: '{{ item.latestReadyRevisionName }}'
  uid_template: '{item.name}'
- discovery_id: gcp.run.namespaces.authorizeddomains.list
  calls:
  - action: namespaces.authorizeddomains.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.domains }}'
    item:
      name: '{{ item.name }}'
      id: '{{ item.id }}'
  uid_template: '{item.name}'
