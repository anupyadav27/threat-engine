version: '1.0'
provider: gcp
service: chat
services:
  client: chat
  module: googleapiclient.discovery.build('chat', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.chat.customEmojis.list
  calls:
  - action: customEmojis.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.customEmojis }}'
    item:
      emojiName: '{{ item.emojiName }}'
      name: '{{ item.name }}'
      payload: '{{ item.payload }}'
      temporaryImageUri: '{{ item.temporaryImageUri }}'
      uid: '{{ item.uid }}'
  uid_template: '{item.name}'
- discovery_id: gcp.chat.spaces.findDirectMessage
  calls:
  - action: spaces.findDirectMessage
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      accessSettings: '{{ response.accessSettings }}'
      adminInstalled: '{{ response.adminInstalled }}'
      createTime: '{{ response.createTime }}'
      customer: '{{ response.customer }}'
      displayName: '{{ response.displayName }}'
      externalUserAllowed: '{{ response.externalUserAllowed }}'
      importMode: '{{ response.importMode }}'
      importModeExpireTime: '{{ response.importModeExpireTime }}'
      lastActiveTime: '{{ response.lastActiveTime }}'
      membershipCount: '{{ response.membershipCount }}'
      name: '{{ response.name }}'
      permissionSettings: '{{ response.permissionSettings }}'
      predefinedPermissionSettings: '{{ response.predefinedPermissionSettings }}'
      singleUserBotDm: '{{ response.singleUserBotDm }}'
      spaceDetails: '{{ response.spaceDetails }}'
      spaceHistoryState: '{{ response.spaceHistoryState }}'
      spaceThreadingState: '{{ response.spaceThreadingState }}'
      spaceType: '{{ response.spaceType }}'
      spaceUri: '{{ response.spaceUri }}'
      threaded: '{{ response.threaded }}'
      type: '{{ response.type }}'
  uid_template: '{item.name}'
- discovery_id: gcp.chat.spaces.list
  calls:
  - action: spaces.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.spaces }}'
    item:
      accessSettings: '{{ item.accessSettings }}'
      adminInstalled: '{{ item.adminInstalled }}'
      createTime: '{{ item.createTime }}'
      customer: '{{ item.customer }}'
      displayName: '{{ item.displayName }}'
      externalUserAllowed: '{{ item.externalUserAllowed }}'
      importMode: '{{ item.importMode }}'
      importModeExpireTime: '{{ item.importModeExpireTime }}'
      lastActiveTime: '{{ item.lastActiveTime }}'
      membershipCount: '{{ item.membershipCount }}'
      name: '{{ item.name }}'
      permissionSettings: '{{ item.permissionSettings }}'
      predefinedPermissionSettings: '{{ item.predefinedPermissionSettings }}'
      singleUserBotDm: '{{ item.singleUserBotDm }}'
      spaceDetails: '{{ item.spaceDetails }}'
      spaceHistoryState: '{{ item.spaceHistoryState }}'
      spaceThreadingState: '{{ item.spaceThreadingState }}'
      spaceType: '{{ item.spaceType }}'
      spaceUri: '{{ item.spaceUri }}'
      threaded: '{{ item.threaded }}'
      type: '{{ item.type }}'
  uid_template: '{item.name}'
- discovery_id: gcp.chat.spaces.members.list
  calls:
  - action: spaces.members.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.members }}'
    item:
      createTime: '{{ item.createTime }}'
      deleteTime: '{{ item.deleteTime }}'
      groupMember: '{{ item.groupMember }}'
      member: '{{ item.member }}'
      name: '{{ item.name }}'
      role: '{{ item.role }}'
      state: '{{ item.state }}'
  uid_template: '{item.name}'
- discovery_id: gcp.chat.spaces.messages.list
