      lastActiveTime: '{{ item.lastActiveTime }}'
      membershipCount: '{{ item.membershipCount }}'
      name: '{{ item.name }}'
      permissionSettings: '{{ item.permissionSettings }}'
      predefinedPermissionSettings: '{{ item.predefinedPermissionSettings }}'
      singleUserBotDm: '{{ item.singleUserBotDm }}'
      spaceDetails: '{{ item.spaceDetails }}'
