      annotations: '{{ item.annotations }}'
      argumentText: '{{ item.argumentText }}'
      attachedGifs: '{{ item.attachedGifs }}'
      attachment: '{{ item.attachment }}'
      cards: '{{ item.cards }}'
      cardsV2: '{{ item.cardsV2 }}'
      clientAssignedMessageId: '{{ item.clientAssignedMessageId }}'
      createTime: '{{ item.createTime }}'
      deleteTime: '{{ item.deleteTime }}'
      deletionMetadata: '{{ item.deletionMetadata }}'
      emojiReactionSummaries: '{{ item.emojiReactionSummaries }}'
      fallbackText: '{{ item.fallbackText }}'
      formattedText: '{{ item.formattedText }}'
      lastUpdateTime: '{{ item.lastUpdateTime }}'
