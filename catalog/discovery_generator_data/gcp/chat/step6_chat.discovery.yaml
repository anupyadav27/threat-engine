      membershipDeletedEventData: '{{ item.membershipDeletedEventData }}'
      membershipUpdatedEventData: '{{ item.membershipUpdatedEventData }}'
      messageBatchCreatedEventData: '{{ item.messageBatchCreatedEventData }}'
      messageBatchDeletedEventData: '{{ item.messageBatchDeletedEventData }}'
      messageBatchUpdatedEventData: '{{ item.messageBatchUpdatedEventData }}'
      messageCreatedEventData: '{{ item.messageCreatedEventData }}'
      messageDeletedEventData: '{{ item.messageDeletedEventData }}'
      messageUpdatedEventData: '{{ item.messageUpdatedEventData }}'
      name: '{{ item.name }}'
      reactionBatchCreatedEventData: '{{ item.reactionBatchCreatedEventData }}'
      reactionBatchDeletedEventData: '{{ item.reactionBatchDeletedEventData }}'
