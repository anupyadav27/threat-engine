version: '1.0'
provider: gcp
service: billing
discovery:
- discovery_id: gcp.billing.anomaly.list
  calls:
  - action: billingAccounts.budgets.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      name: '{{ item.name }}'
      displayName: '{{ item.displayName }}'
      budgetFilter: '{{ item.budgetFilter }}'
      amount: '{{ item.amount }}'
      thresholdRules: '{{ item.thresholdRules }}'
      etag: '{{ item.etag }}'
      notificationsRule: '{{ item.notificationsRule }}'
