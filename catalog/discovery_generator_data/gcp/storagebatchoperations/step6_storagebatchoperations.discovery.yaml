version: '1.0'
provider: gcp
service: storagebatchoperations
services:
  client: storagebatchoperations
  module: googleapiclient.discovery.build('storagebatchoperations', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.storagebatchoperations.projects.locations.get
  calls:
  - action: projects.locations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      displayName: '{{ response.displayName }}'
      labels: '{{ response.labels }}'
      locationId: '{{ response.locationId }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.storagebatchoperations.projects.locations.jobs.bucketOperations.list
  calls:
  - action: projects.locations.jobs.bucketOperations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.bucketOperations }}'
    item:
      bucketName: '{{ item.bucketName }}'
      completeTime: '{{ item.completeTime }}'
      counters: '{{ item.counters }}'
      createTime: '{{ item.createTime }}'
      deleteObject: '{{ item.deleteObject }}'
      errorSummaries: '{{ item.errorSummaries }}'
      manifest: '{{ item.manifest }}'
      name: '{{ item.name }}'
      prefixList: '{{ item.prefixList }}'
      putMetadata: '{{ item.putMetadata }}'
      putObjectHold: '{{ item.putObjectHold }}'
      rewriteObject: '{{ item.rewriteObject }}'
      startTime: '{{ item.startTime }}'
      state: '{{ item.state }}'
  uid_template: '{item.name}'
- discovery_id: gcp.storagebatchoperations.projects.locations.jobs.list
  calls:
  - action: projects.locations.jobs.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.jobs }}'
    item:
      bucketList: '{{ item.bucketList }}'
      completeTime: '{{ item.completeTime }}'
      counters: '{{ item.counters }}'
      createTime: '{{ item.createTime }}'
      deleteObject: '{{ item.deleteObject }}'
      description: '{{ item.description }}'
      dryRun: '{{ item.dryRun }}'
      errorSummaries: '{{ item.errorSummaries }}'
      isMultiBucketJob: '{{ item.isMultiBucketJob }}'
      loggingConfig: '{{ item.loggingConfig }}'
      name: '{{ item.name }}'
      putMetadata: '{{ item.putMetadata }}'
      putObjectHold: '{{ item.putObjectHold }}'
      rewriteObject: '{{ item.rewriteObject }}'
      scheduleTime: '{{ item.scheduleTime }}'
      state: '{{ item.state }}'
  uid_template: '{item.name}'
- discovery_id: gcp.storagebatchoperations.projects.locations.list
  calls:
  - action: projects.locations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.locations }}'
    item:
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      locationId: '{{ item.locationId }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.storagebatchoperations.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.storagebatchoperations.projects.locations.jobs.bucketOperations.get
  for_each: gcp.storagebatchoperations.projects.locations.jobs.bucketOperations.list
  calls:
  - action: projects.locations.jobs.bucketOperations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      bucketName: '{{ response.bucketName }}'
      completeTime: '{{ response.completeTime }}'
      counters: '{{ response.counters }}'
      createTime: '{{ response.createTime }}'
      deleteObject: '{{ response.deleteObject }}'
      errorSummaries: '{{ response.errorSummaries }}'
      manifest: '{{ response.manifest }}'
      name: '{{ response.name }}'
      prefixList: '{{ response.prefixList }}'
      putMetadata: '{{ response.putMetadata }}'
      putObjectHold: '{{ response.putObjectHold }}'
      rewriteObject: '{{ response.rewriteObject }}'
      startTime: '{{ response.startTime }}'
      state: '{{ response.state }}'
- discovery_id: gcp.storagebatchoperations.projects.locations.jobs.get
  for_each: gcp.storagebatchoperations.projects.locations.jobs.list
  calls:
  - action: projects.locations.jobs.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      bucketList: '{{ response.bucketList }}'
      completeTime: '{{ response.completeTime }}'
      counters: '{{ response.counters }}'
      createTime: '{{ response.createTime }}'
      deleteObject: '{{ response.deleteObject }}'
      description: '{{ response.description }}'
      dryRun: '{{ response.dryRun }}'
      errorSummaries: '{{ response.errorSummaries }}'
      isMultiBucketJob: '{{ response.isMultiBucketJob }}'
      loggingConfig: '{{ response.loggingConfig }}'
      name: '{{ response.name }}'
      putMetadata: '{{ response.putMetadata }}'
      putObjectHold: '{{ response.putObjectHold }}'
      rewriteObject: '{{ response.rewriteObject }}'
      scheduleTime: '{{ response.scheduleTime }}'
      state: '{{ response.state }}'
- discovery_id: gcp.storagebatchoperations.projects.locations.operations.get
  for_each: gcp.storagebatchoperations.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
