version: '1.0'
provider: gcp
service: managedidentities
services:
  client: managedidentities
  module: googleapiclient.discovery.build('managedidentities', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.managedidentities.projects.locations.get
  calls:
  - action: projects.locations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      displayName: '{{ response.displayName }}'
      labels: '{{ response.labels }}'
      locationId: '{{ response.locationId }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.managedidentities.projects.locations.global.domains.backups.list
  calls:
  - action: projects.locations.global.domains.backups.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.backups }}'
    item:
      createTime: '{{ item.createTime }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      state: '{{ item.state }}'
      statusMessage: '{{ item.statusMessage }}'
      type: '{{ item.type }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.managedidentities.projects.locations.global.domains.list
  calls:
  - action: projects.locations.global.domains.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.domains }}'
    item:
      admin: '{{ item.admin }}'
      auditLogsEnabled: '{{ item.auditLogsEnabled }}'
      authorizedNetworks: '{{ item.authorizedNetworks }}'
      createTime: '{{ item.createTime }}'
      fqdn: '{{ item.fqdn }}'
      labels: '{{ item.labels }}'
      locations: '{{ item.locations }}'
      name: '{{ item.name }}'
      reservedIpRange: '{{ item.reservedIpRange }}'
      state: '{{ item.state }}'
      statusMessage: '{{ item.statusMessage }}'
      trusts: '{{ item.trusts }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.managedidentities.projects.locations.global.domains.sqlIntegrations.list
  calls:
  - action: projects.locations.global.domains.sqlIntegrations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.sqlIntegrations }}'
    item:
      createTime: '{{ item.createTime }}'
      name: '{{ item.name }}'
      sqlInstance: '{{ item.sqlInstance }}'
      state: '{{ item.state }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.managedidentities.projects.locations.global.operations.list
  calls:
  - action: projects.locations.global.operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.managedidentities.projects.locations.global.peerings.list
  calls:
  - action: projects.locations.global.peerings.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.peerings }}'
    item:
      authorizedNetwork: '{{ item.authorizedNetwork }}'
      createTime: '{{ item.createTime }}'
      domainResource: '{{ item.domainResource }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      state: '{{ item.state }}'
      statusMessage: '{{ item.statusMessage }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.managedidentities.projects.locations.list
  calls:
  - action: projects.locations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.locations }}'
    item:
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      locationId: '{{ item.locationId }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.managedidentities.projects.locations.global.domains.backups.get
  for_each: gcp.managedidentities.projects.locations.global.domains.backups.list
  calls:
  - action: projects.locations.global.domains.backups.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      createTime: '{{ response.createTime }}'
      labels: '{{ response.labels }}'
      name: '{{ response.name }}'
      state: '{{ response.state }}'
      statusMessage: '{{ response.statusMessage }}'
      type: '{{ response.type }}'
      updateTime: '{{ response.updateTime }}'
- discovery_id: gcp.managedidentities.projects.locations.global.domains.backups.getIamPolicy
  for_each: gcp.managedidentities.projects.locations.global.domains.backups.list
  calls:
  - action: projects.locations.global.domains.backups.getIamPolicy
    params:
      resource: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      bindings: '{{ response.bindings }}'
      version: '{{ response.version }}'
