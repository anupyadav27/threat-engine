version: '1.0'
provider: gcp
service: essentialcontacts
services:
  client: essentialcontacts
  module: googleapiclient.discovery.build('essentialcontacts', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.essentialcontacts.folders.contacts.compute
  calls:
  - action: folders.contacts.compute
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      contacts: '{{ response.contacts }}'
- discovery_id: gcp.essentialcontacts.folders.contacts.list
  calls:
  - action: folders.contacts.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.contacts }}'
    item:
      email: '{{ item.email }}'
      languageTag: '{{ item.languageTag }}'
      name: '{{ item.name }}'
      notificationCategorySubscriptions: '{{ item.notificationCategorySubscriptions
        }}'
      validateTime: '{{ item.validateTime }}'
      validationState: '{{ item.validationState }}'
  uid_template: '{item.name}'
- discovery_id: gcp.essentialcontacts.organizations.contacts.compute
  calls:
  - action: organizations.contacts.compute
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      contacts: '{{ response.contacts }}'
- discovery_id: gcp.essentialcontacts.organizations.contacts.list
  calls:
  - action: organizations.contacts.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.contacts }}'
    item:
      email: '{{ item.email }}'
      languageTag: '{{ item.languageTag }}'
      name: '{{ item.name }}'
      notificationCategorySubscriptions: '{{ item.notificationCategorySubscriptions
        }}'
      validateTime: '{{ item.validateTime }}'
      validationState: '{{ item.validationState }}'
  uid_template: '{item.name}'
- discovery_id: gcp.essentialcontacts.projects.contacts.compute
  calls:
  - action: projects.contacts.compute
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      contacts: '{{ response.contacts }}'
- discovery_id: gcp.essentialcontacts.projects.contacts.list
  calls:
  - action: projects.contacts.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.contacts }}'
    item:
      email: '{{ item.email }}'
      languageTag: '{{ item.languageTag }}'
      name: '{{ item.name }}'
      notificationCategorySubscriptions: '{{ item.notificationCategorySubscriptions
        }}'
      validateTime: '{{ item.validateTime }}'
      validationState: '{{ item.validationState }}'
  uid_template: '{item.name}'
- discovery_id: gcp.essentialcontacts.folders.contacts.get
  for_each: gcp.essentialcontacts.organizations.contacts.list
  calls:
  - action: folders.contacts.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      email: '{{ response.email }}'
      languageTag: '{{ response.languageTag }}'
      name: '{{ response.name }}'
      notificationCategorySubscriptions: '{{ response.notificationCategorySubscriptions
        }}'
      validateTime: '{{ response.validateTime }}'
      validationState: '{{ response.validationState }}'
- discovery_id: gcp.essentialcontacts.organizations.contacts.get
  for_each: gcp.essentialcontacts.organizations.contacts.list
  calls:
  - action: organizations.contacts.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      email: '{{ response.email }}'
      languageTag: '{{ response.languageTag }}'
      name: '{{ response.name }}'
      notificationCategorySubscriptions: '{{ response.notificationCategorySubscriptions
        }}'
      validateTime: '{{ response.validateTime }}'
      validationState: '{{ response.validationState }}'
- discovery_id: gcp.essentialcontacts.projects.contacts.get
  for_each: gcp.essentialcontacts.organizations.contacts.list
  calls:
  - action: projects.contacts.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      email: '{{ response.email }}'
      languageTag: '{{ response.languageTag }}'
      name: '{{ response.name }}'
      notificationCategorySubscriptions: '{{ response.notificationCategorySubscriptions
        }}'
      validateTime: '{{ response.validateTime }}'
      validationState: '{{ response.validationState }}'
