version: '1.0'
provider: gcp
service: essentialcontacts

services:
  client: essentialcontacts
  module: "googleapiclient.discovery.build('essentialcontacts', 'v1')"

# Anchors: service-level parameters provided by caller
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: unknown
    identifier_op: gcp.essentialcontacts.projects.contacts.list
    identifier_field: contacts[].name
    item_var_path: item.contacts[].name

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.essentialcontacts.projects.contacts.list ──
  # python: svc.projects().contacts().list(**params).execute()
  - discovery_id: gcp.essentialcontacts.projects.contacts.list
    calls:
      - action: projects.contacts.list
        params:
          parent: '{{ project_id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.contacts }}'
      item:
        email: '{{ item.email }}'
        languageTag: '{{ item.languageTag }}'
        name: '{{ item.name }}'
        notificationCategorySubscriptions: '{{ item.notificationCategorySubscriptions }}'
        validateTime: '{{ item.validateTime }}'
        validationState: '{{ item.validationState }}'
