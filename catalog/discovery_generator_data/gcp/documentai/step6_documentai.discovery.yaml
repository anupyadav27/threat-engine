      entityMetrics: '{{ response.entityMetrics }}'
      kmsKeyName: '{{ response.kmsKeyName }}'
      kmsKeyVersionName: '{{ response.kmsKeyVersionName }}'
      name: '{{ response.name }}'
      revisions: '{{ response.revisions }}'
- discovery_id: gcp.documentai.projects.locations.processors.processorVersions.get
  for_each: gcp.documentai.projects.locations.processors.processorVersions.list
  calls:
  - action: projects.locations.processors.processorVersions.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      createTime: '{{ response.createTime }}'
      deprecationInfo: '{{ response.deprecationInfo }}'
      displayName: '{{ response.displayName }}'
      documentSchema: '{{ response.documentSchema }}'
      genAiModelInfo: '{{ response.genAiModelInfo }}'
      googleManaged: '{{ response.googleManaged }}'
      kmsKeyName: '{{ response.kmsKeyName }}'
      kmsKeyVersionName: '{{ response.kmsKeyVersionName }}'
      latestEvaluation: '{{ response.latestEvaluation }}'
      modelType: '{{ response.modelType }}'
      name: '{{ response.name }}'
