version: '1.0'
provider: gcp
service: documentai
services:
  client: documentai
  module: googleapiclient.discovery.build('documentai', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.documentai.projects.locations.fetchProcessorTypes
  calls:
  - action: projects.locations.fetchProcessorTypes
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      processorTypes: '{{ response.processorTypes }}'
- discovery_id: gcp.documentai.projects.locations.get
  calls:
  - action: projects.locations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      displayName: '{{ response.displayName }}'
      labels: '{{ response.labels }}'
      locationId: '{{ response.locationId }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.documentai.projects.locations.list
  calls:
  - action: projects.locations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.locations }}'
    item:
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      locationId: '{{ item.locationId }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.documentai.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.documentai.projects.locations.processorTypes.list
  calls:
  - action: projects.locations.processorTypes.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.processorTypes }}'
    item:
      allowCreation: '{{ item.allowCreation }}'
      availableLocations: '{{ item.availableLocations }}'
      category: '{{ item.category }}'
      launchStage: '{{ item.launchStage }}'
      name: '{{ item.name }}'
      sampleDocumentUris: '{{ item.sampleDocumentUris }}'
      type: '{{ item.type }}'
  uid_template: '{item.name}'
- discovery_id: gcp.documentai.projects.locations.processors.list
  calls:
  - action: projects.locations.processors.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.processors }}'
    item:
      activeSchemaVersion: '{{ item.activeSchemaVersion }}'
      createTime: '{{ item.createTime }}'
      defaultProcessorVersion: '{{ item.defaultProcessorVersion }}'
      displayName: '{{ item.displayName }}'
      kmsKeyName: '{{ item.kmsKeyName }}'
      name: '{{ item.name }}'
      processEndpoint: '{{ item.processEndpoint }}'
      processorVersionAliases: '{{ item.processorVersionAliases }}'
      satisfiesPzi: '{{ item.satisfiesPzi }}'
      satisfiesPzs: '{{ item.satisfiesPzs }}'
      state: '{{ item.state }}'
      type: '{{ item.type }}'
  uid_template: '{item.name}'
- discovery_id: gcp.documentai.projects.locations.processors.processorVersions.evaluations.list
  calls:
  - action: projects.locations.processors.processorVersions.evaluations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.evaluations }}'
    item:
      allEntitiesMetrics: '{{ item.allEntitiesMetrics }}'
      createTime: '{{ item.createTime }}'
      documentCounters: '{{ item.documentCounters }}'
      entityMetrics: '{{ item.entityMetrics }}'
      kmsKeyName: '{{ item.kmsKeyName }}'
      kmsKeyVersionName: '{{ item.kmsKeyVersionName }}'
      name: '{{ item.name }}'
      revisions: '{{ item.revisions }}'
  uid_template: '{item.name}'
- discovery_id: gcp.documentai.projects.locations.processors.processorVersions.list
  calls:
  - action: projects.locations.processors.processorVersions.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.processorVersions }}'
    item:
      createTime: '{{ item.createTime }}'
      deprecationInfo: '{{ item.deprecationInfo }}'
      displayName: '{{ item.displayName }}'
      documentSchema: '{{ item.documentSchema }}'
      genAiModelInfo: '{{ item.genAiModelInfo }}'
      googleManaged: '{{ item.googleManaged }}'
      kmsKeyName: '{{ item.kmsKeyName }}'
      kmsKeyVersionName: '{{ item.kmsKeyVersionName }}'
      latestEvaluation: '{{ item.latestEvaluation }}'
      modelType: '{{ item.modelType }}'
      name: '{{ item.name }}'
      satisfiesPzi: '{{ item.satisfiesPzi }}'
      satisfiesPzs: '{{ item.satisfiesPzs }}'
      state: '{{ item.state }}'
  uid_template: '{item.name}'
- discovery_id: gcp.documentai.projects.locations.schemas.list
  calls:
  - action: projects.locations.schemas.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.schemas }}'
    item:
      createTime: '{{ item.createTime }}'
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.documentai.projects.locations.schemas.schemaVersions.list
  calls:
  - action: projects.locations.schemas.schemaVersions.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.schemaVersions }}'
    item:
      createTime: '{{ item.createTime }}'
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      schema: '{{ item.schema }}'
  uid_template: '{item.name}'
- discovery_id: gcp.documentai.projects.locations.operations.get
  for_each: gcp.documentai.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
- discovery_id: gcp.documentai.projects.locations.processorTypes.get
  for_each: gcp.documentai.projects.locations.processorTypes.list
  calls:
  - action: projects.locations.processorTypes.get
    params:
      name: '{{ item.name }}'
    save_as: response
