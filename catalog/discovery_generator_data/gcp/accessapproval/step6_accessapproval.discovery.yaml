version: '1.0'
provider: gcp
service: accessapproval
services:
  client: accessapproval
  module: googleapiclient.discovery.build('accessapproval', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.accessapproval.folders.approvalRequests.list
  calls:
  - action: folders.approvalRequests.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.approvalRequests }}'
    item:
      approve: '{{ item.approve }}'
      dismiss: '{{ item.dismiss }}'
      name: '{{ item.name }}'
      requestTime: '{{ item.requestTime }}'
      requestedAugmentedInfo: '{{ item.requestedAugmentedInfo }}'
      requestedDuration: '{{ item.requestedDuration }}'
      requestedExpiration: '{{ item.requestedExpiration }}'
      requestedLocations: '{{ item.requestedLocations }}'
      requestedReason: '{{ item.requestedReason }}'
      requestedResourceName: '{{ item.requestedResourceName }}'
      requestedResourceProperties: '{{ item.requestedResourceProperties }}'
  uid_template: '{item.name}'
- discovery_id: gcp.accessapproval.folders.getAccessApprovalSettings
  calls:
  - action: folders.getAccessApprovalSettings
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      activeKeyVersion: '{{ response.activeKeyVersion }}'
      ancestorHasActiveKeyVersion: '{{ response.ancestorHasActiveKeyVersion }}'
      ancestorsEnrolledServices: '{{ response.ancestorsEnrolledServices }}'
      approvalPolicy: '{{ response.approvalPolicy }}'
      effectiveApprovalPolicy: '{{ response.effectiveApprovalPolicy }}'
      enrolledAncestor: '{{ response.enrolledAncestor }}'
      enrolledServices: '{{ response.enrolledServices }}'
      invalidKeyVersion: '{{ response.invalidKeyVersion }}'
      name: '{{ response.name }}'
      notificationEmails: '{{ response.notificationEmails }}'
      notificationPubsubTopic: '{{ response.notificationPubsubTopic }}'
      preferNoBroadApprovalRequests: '{{ response.preferNoBroadApprovalRequests }}'
      preferredRequestExpirationDays: '{{ response.preferredRequestExpirationDays
        }}'
      requestScopeMaxWidthPreference: '{{ response.requestScopeMaxWidthPreference
        }}'
      requireCustomerVisibleJustification: '{{ response.requireCustomerVisibleJustification
        }}'
  uid_template: '{item.name}'
- discovery_id: gcp.accessapproval.folders.getServiceAccount
  calls:
  - action: folders.getServiceAccount
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      accountEmail: '{{ response.accountEmail }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.accessapproval.organizations.approvalRequests.list
