      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.dataform.projects.locations.repositories.compilationResults.list
