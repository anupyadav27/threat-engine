version: '1.0'
provider: gcp
service: dataform
services:
  client: dataform
  module: googleapiclient.discovery.build('dataform', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.dataform.projects.locations.folders.getIamPolicy
  calls:
  - action: projects.locations.folders.getIamPolicy
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      bindings: '{{ response.bindings }}'
      version: '{{ response.version }}'
- discovery_id: gcp.dataform.projects.locations.get
  calls:
  - action: projects.locations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      displayName: '{{ response.displayName }}'
      labels: '{{ response.labels }}'
      locationId: '{{ response.locationId }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.dataform.projects.locations.getConfig
  calls:
  - action: projects.locations.getConfig
    params: {}
    save_as: response
    on_error: continue
  emit:
