    item:
      defaultKmsKeyName: '{{ response.defaultKmsKeyName }}'
      internalMetadata: '{{ response.internalMetadata }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.dataform.projects.locations.list
  calls:
  - action: projects.locations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
