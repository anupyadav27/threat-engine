version: '1.0'
provider: gcp
service: siteVerification
services:
  client: siteVerification
  module: googleapiclient.discovery.build('siteVerification', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.siteVerification.webResource.list
  calls:
  - action: webResource.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.webResource }}'
    item:
      id: '{{ item.id }}'
      owners: '{{ item.owners }}'
      site: '{{ item.site }}'
  uid_template: '{item.id}'
- discovery_id: gcp.siteVerification.webResource.get
  for_each: gcp.siteVerification.webResource.list
  calls:
  - action: webResource.get
    params:
      id: '{{ item.id }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ response.id }}'
      owners: '{{ response.owners }}'
      site: '{{ response.site }}'
