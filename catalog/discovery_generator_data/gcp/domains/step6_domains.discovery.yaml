version: '1.0'
provider: gcp
service: domains
services:
  client: domains
  module: googleapiclient.discovery.build('domains', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.domains.projects.locations.get
  calls:
  - action: projects.locations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      displayName: '{{ response.displayName }}'
      labels: '{{ response.labels }}'
      locationId: '{{ response.locationId }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.domains.projects.locations.list
  calls:
  - action: projects.locations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.locations }}'
    item:
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      locationId: '{{ item.locationId }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.domains.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.domains.projects.locations.registrations.list
  calls:
  - action: projects.locations.registrations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.registrations }}'
    item:
      contactSettings: '{{ item.contactSettings }}'
      createTime: '{{ item.createTime }}'
      dnsSettings: '{{ item.dnsSettings }}'
      domainName: '{{ item.domainName }}'
      domainProperties: '{{ item.domainProperties }}'
      expireTime: '{{ item.expireTime }}'
      issues: '{{ item.issues }}'
      labels: '{{ item.labels }}'
      managementSettings: '{{ item.managementSettings }}'
      name: '{{ item.name }}'
      pendingContactSettings: '{{ item.pendingContactSettings }}'
      registerFailureReason: '{{ item.registerFailureReason }}'
      state: '{{ item.state }}'
      supportedPrivacy: '{{ item.supportedPrivacy }}'
      transferFailureReason: '{{ item.transferFailureReason }}'
  uid_template: '{item.name}'
- discovery_id: gcp.domains.projects.locations.registrations.retrieveImportableDomains
  calls:
  - action: projects.locations.registrations.retrieveImportableDomains
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      domains: '{{ response.domains }}'
- discovery_id: gcp.domains.projects.locations.registrations.retrieveRegisterParameters
  calls:
  - action: projects.locations.registrations.retrieveRegisterParameters
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      registerParameters: '{{ response.registerParameters }}'
- discovery_id: gcp.domains.projects.locations.registrations.retrieveTransferParameters
  calls:
  - action: projects.locations.registrations.retrieveTransferParameters
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      transferParameters: '{{ response.transferParameters }}'
- discovery_id: gcp.domains.projects.locations.registrations.searchDomains
  calls:
  - action: projects.locations.registrations.searchDomains
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      registerParameters: '{{ response.registerParameters }}'
- discovery_id: gcp.domains.projects.locations.operations.get
  for_each: gcp.domains.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
- discovery_id: gcp.domains.projects.locations.registrations.get
  for_each: gcp.domains.projects.locations.registrations.list
  calls:
  - action: projects.locations.registrations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      contactSettings: '{{ response.contactSettings }}'
      createTime: '{{ response.createTime }}'
      dnsSettings: '{{ response.dnsSettings }}'
      domainName: '{{ response.domainName }}'
      domainProperties: '{{ response.domainProperties }}'
      expireTime: '{{ response.expireTime }}'
      issues: '{{ response.issues }}'
      labels: '{{ response.labels }}'
      managementSettings: '{{ response.managementSettings }}'
      name: '{{ response.name }}'
      pendingContactSettings: '{{ response.pendingContactSettings }}'
      registerFailureReason: '{{ response.registerFailureReason }}'
      state: '{{ response.state }}'
      supportedPrivacy: '{{ response.supportedPrivacy }}'
      transferFailureReason: '{{ response.transferFailureReason }}'
- discovery_id: gcp.domains.projects.locations.registrations.getIamPolicy
  for_each: gcp.domains.projects.locations.registrations.list
  calls:
  - action: projects.locations.registrations.getIamPolicy
    params:
      resource: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      auditConfigs: '{{ response.auditConfigs }}'
      bindings: '{{ response.bindings }}'
      version: '{{ response.version }}'
- discovery_id: gcp.domains.projects.locations.registrations.retrieveAuthorizationCode
  for_each: gcp.domains.projects.locations.registrations.list
  calls:
  - action: projects.locations.registrations.retrieveAuthorizationCode
    params:
      registration: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      code: '{{ response.code }}'
- discovery_id: gcp.domains.projects.locations.registrations.retrieveGoogleDomainsDnsRecords
  for_each: gcp.domains.projects.locations.registrations.list
  calls:
  - action: projects.locations.registrations.retrieveGoogleDomainsDnsRecords
    params:
      registration: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      rrset: '{{ response.rrset }}'
- discovery_id: gcp.domains.projects.locations.registrations.retrieveGoogleDomainsForwardingConfig
  for_each: gcp.domains.projects.locations.registrations.list
  calls:
  - action: projects.locations.registrations.retrieveGoogleDomainsForwardingConfig
    params:
      registration: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      domainForwardings: '{{ response.domainForwardings }}'
      emailForwardings: '{{ response.emailForwardings }}'
