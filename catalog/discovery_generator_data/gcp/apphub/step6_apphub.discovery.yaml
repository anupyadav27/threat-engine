    items_for: '{{ response.workloads }}'
    item:
      attributes: '{{ item.attributes }}'
      createTime: '{{ item.createTime }}'
      description: '{{ item.description }}'
      discoveredWorkload: '{{ item.discoveredWorkload }}'
      displayName: '{{ item.displayName }}'
      name: '{{ item.name }}'
      state: '{{ item.state }}'
      uid: '{{ item.uid }}'
      updateTime: '{{ item.updateTime }}'
      workloadProperties: '{{ item.workloadProperties }}'
      workloadReference: '{{ item.workloadReference }}'
  uid_template: '{item.name}'
- discovery_id: gcp.apphub.projects.locations.discoveredServices.list
