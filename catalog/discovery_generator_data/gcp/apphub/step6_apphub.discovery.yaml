version: '1.0'
provider: gcp
service: apphub
services:
  client: apphub
  module: googleapiclient.discovery.build('apphub', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.apphub.projects.locations.applications.list
  calls:
  - action: projects.locations.applications.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.applications }}'
    item:
      attributes: '{{ item.attributes }}'
      createTime: '{{ item.createTime }}'
      description: '{{ item.description }}'
      displayName: '{{ item.displayName }}'
      name: '{{ item.name }}'
      scope: '{{ item.scope }}'
      state: '{{ item.state }}'
      uid: '{{ item.uid }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.apphub.projects.locations.applications.services.list
  calls:
  - action: projects.locations.applications.services.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.services }}'
    item:
      attributes: '{{ item.attributes }}'
      createTime: '{{ item.createTime }}'
      description: '{{ item.description }}'
      discoveredService: '{{ item.discoveredService }}'
      displayName: '{{ item.displayName }}'
      name: '{{ item.name }}'
      serviceProperties: '{{ item.serviceProperties }}'
      serviceReference: '{{ item.serviceReference }}'
      state: '{{ item.state }}'
      uid: '{{ item.uid }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.apphub.projects.locations.applications.workloads.list
