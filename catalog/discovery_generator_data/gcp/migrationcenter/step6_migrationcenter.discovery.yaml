version: '1.0'
provider: gcp
service: migrationcenter
services:
  client: migrationcenter
  module: googleapiclient.discovery.build('migrationcenter', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.migrationcenter.projects.locations.assets.list
  calls:
  - action: projects.locations.assets.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.assets }}'
    item:
      assignedGroups: '{{ item.assignedGroups }}'
      attributes: '{{ item.attributes }}'
      createTime: '{{ item.createTime }}'
      databaseDeploymentDetails: '{{ item.databaseDeploymentDetails }}'
      databaseDetails: '{{ item.databaseDetails }}'
      hidden: '{{ item.hidden }}'
      hideReason: '{{ item.hideReason }}'
      hideTime: '{{ item.hideTime }}'
      insightList: '{{ item.insightList }}'
      labels: '{{ item.labels }}'
      machineDetails: '{{ item.machineDetails }}'
      name: '{{ item.name }}'
      performanceData: '{{ item.performanceData }}'
      sources: '{{ item.sources }}'
      title: '{{ item.title }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.migrationcenter.projects.locations.assetsExportJobs.list
