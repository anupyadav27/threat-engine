version: '1.0'
provider: gcp
service: eventarc
services:
  client: eventarc
  module: googleapiclient.discovery.build('eventarc', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.eventarc.projects.locations.channelConnections.list
  calls:
  - action: projects.locations.channelConnections.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.channelConnections }}'
    item:
      activationToken: '{{ item.activationToken }}'
      channel: '{{ item.channel }}'
      createTime: '{{ item.createTime }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      uid: '{{ item.uid }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.eventarc.projects.locations.channels.list
