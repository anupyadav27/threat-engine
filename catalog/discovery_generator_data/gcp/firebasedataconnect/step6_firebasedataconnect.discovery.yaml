version: '1.0'
provider: gcp
service: firebasedataconnect
services:
  client: firebasedataconnect
  module: googleapiclient.discovery.build('firebasedataconnect', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.firebasedataconnect.projects.locations.get
  calls:
  - action: projects.locations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      displayName: '{{ response.displayName }}'
      labels: '{{ response.labels }}'
      locationId: '{{ response.locationId }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.firebasedataconnect.projects.locations.list
  calls:
  - action: projects.locations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.locations }}'
    item:
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      locationId: '{{ item.locationId }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.firebasedataconnect.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.firebasedataconnect.projects.locations.services.connectors.list
  calls:
  - action: projects.locations.services.connectors.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.connectors }}'
    item:
      annotations: '{{ item.annotations }}'
      clientCache: '{{ item.clientCache }}'
      createTime: '{{ item.createTime }}'
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      reconciling: '{{ item.reconciling }}'
      source: '{{ item.source }}'
      uid: '{{ item.uid }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.firebasedataconnect.projects.locations.services.list
  calls:
  - action: projects.locations.services.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.services }}'
    item:
      annotations: '{{ item.annotations }}'
      createTime: '{{ item.createTime }}'
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      reconciling: '{{ item.reconciling }}'
      uid: '{{ item.uid }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.firebasedataconnect.projects.locations.services.schemas.list
  calls:
  - action: projects.locations.services.schemas.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.schemas }}'
    item:
      annotations: '{{ item.annotations }}'
      createTime: '{{ item.createTime }}'
      datasources: '{{ item.datasources }}'
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      reconciling: '{{ item.reconciling }}'
      source: '{{ item.source }}'
      uid: '{{ item.uid }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.firebasedataconnect.projects.locations.operations.get
  for_each: gcp.firebasedataconnect.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
- discovery_id: gcp.firebasedataconnect.projects.locations.services.connectors.get
  for_each: gcp.firebasedataconnect.projects.locations.services.connectors.list
  calls:
  - action: projects.locations.services.connectors.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      annotations: '{{ response.annotations }}'
      clientCache: '{{ response.clientCache }}'
      createTime: '{{ response.createTime }}'
      displayName: '{{ response.displayName }}'
      labels: '{{ response.labels }}'
      name: '{{ response.name }}'
      reconciling: '{{ response.reconciling }}'
      source: '{{ response.source }}'
      uid: '{{ response.uid }}'
      updateTime: '{{ response.updateTime }}'
- discovery_id: gcp.firebasedataconnect.projects.locations.services.get
  for_each: gcp.firebasedataconnect.projects.locations.services.list
  calls:
  - action: projects.locations.services.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      annotations: '{{ response.annotations }}'
      createTime: '{{ response.createTime }}'
      displayName: '{{ response.displayName }}'
      labels: '{{ response.labels }}'
      name: '{{ response.name }}'
      reconciling: '{{ response.reconciling }}'
      uid: '{{ response.uid }}'
      updateTime: '{{ response.updateTime }}'
- discovery_id: gcp.firebasedataconnect.projects.locations.services.schemas.get
  for_each: gcp.firebasedataconnect.projects.locations.services.schemas.list
  calls:
  - action: projects.locations.services.schemas.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      annotations: '{{ response.annotations }}'
      createTime: '{{ response.createTime }}'
      datasources: '{{ response.datasources }}'
      displayName: '{{ response.displayName }}'
      labels: '{{ response.labels }}'
      name: '{{ response.name }}'
      reconciling: '{{ response.reconciling }}'
      source: '{{ response.source }}'
      uid: '{{ response.uid }}'
      updateTime: '{{ response.updateTime }}'
