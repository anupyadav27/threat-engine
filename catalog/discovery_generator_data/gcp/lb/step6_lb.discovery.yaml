version: '1.0'
provider: gcp
service: lb
discovery:
- discovery_id: gcp.compute.list_backend_services
  calls:
  - action: backendServices.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      protocol: '{{ item.protocol }}'
      loadBalancingScheme: '{{ item.loadBalancingScheme }}'
      backends: '{{ item.backends }}'
      healthChecks: '{{ item.healthChecks }}'
      logConfig: '{{ item.logConfig }}'
      securityPolicy: '{{ item.securityPolicy }}'
      enableCDN: '{{ item.enableCDN }}'
  uid_template: '{item.name}'
- discovery_id: gcp.compute.list_forwarding_rules
  calls:
  - action: forwardingRules.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      IPAddress: '{{ item.IPAddress }}'
      IPProtocol: '{{ item.IPProtocol }}'
      portRange: '{{ item.portRange }}'
      target: '{{ item.target }}'
      loadBalancingScheme: '{{ item.loadBalancingScheme }}'
      networkTier: '{{ item.networkTier }}'
      labels: '{{ item.labels }}'
  uid_template: '{item.name}'
- discovery_id: gcp.lb.list_backend_services
  calls:
  - action: backendServices.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      protocol: '{{ item.protocol }}'
      loadBalancingScheme: '{{ item.loadBalancingScheme }}'
      backends: '{{ item.backends }}'
      healthChecks: '{{ item.healthChecks }}'
      logConfig: '{{ item.logConfig }}'
      securityPolicy: '{{ item.securityPolicy }}'
  uid_template: '{item.name}'
- discovery_id: gcp.lb.list_load_balancers
  calls:
  - action: forwardingRules.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      IPAddress: '{{ item.IPAddress }}'
      IPProtocol: '{{ item.IPProtocol }}'
      portRange: '{{ item.portRange }}'
      target: '{{ item.target }}'
      loadBalancingScheme: '{{ item.loadBalancingScheme }}'
      networkTier: '{{ item.networkTier }}'
  uid_template: '{item.name}'
