version: '1.0'
provider: gcp
service: speech
services:
  client: speech
  module: googleapiclient.discovery.build('speech', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.speech.operations.list
  calls:
  - action: operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.speech.projects.locations.customClasses.list
  calls:
  - action: projects.locations.customClasses.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.customClasses }}'
    item:
      annotations: '{{ item.annotations }}'
      customClassId: '{{ item.customClassId }}'
      deleteTime: '{{ item.deleteTime }}'
      displayName: '{{ item.displayName }}'
      expireTime: '{{ item.expireTime }}'
      items: '{{ item.items }}'
      kmsKeyName: '{{ item.kmsKeyName }}'
      kmsKeyVersionName: '{{ item.kmsKeyVersionName }}'
      name: '{{ item.name }}'
      reconciling: '{{ item.reconciling }}'
      state: '{{ item.state }}'
      uid: '{{ item.uid }}'
  uid_template: '{item.name}'
- discovery_id: gcp.speech.projects.locations.phraseSets.list
  calls:
  - action: projects.locations.phraseSets.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.phraseSets }}'
    item:
      annotations: '{{ item.annotations }}'
      boost: '{{ item.boost }}'
      deleteTime: '{{ item.deleteTime }}'
      displayName: '{{ item.displayName }}'
      expireTime: '{{ item.expireTime }}'
      kmsKeyName: '{{ item.kmsKeyName }}'
      kmsKeyVersionName: '{{ item.kmsKeyVersionName }}'
      name: '{{ item.name }}'
      phrases: '{{ item.phrases }}'
      reconciling: '{{ item.reconciling }}'
      state: '{{ item.state }}'
      uid: '{{ item.uid }}'
  uid_template: '{item.name}'
- discovery_id: gcp.speech.operations.get
  for_each: gcp.speech.operations.list
  calls:
  - action: operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
- discovery_id: gcp.speech.projects.locations.customClasses.get
  for_each: gcp.speech.projects.locations.customClasses.list
  calls:
  - action: projects.locations.customClasses.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      annotations: '{{ response.annotations }}'
      customClassId: '{{ response.customClassId }}'
      deleteTime: '{{ response.deleteTime }}'
      displayName: '{{ response.displayName }}'
      expireTime: '{{ response.expireTime }}'
      items: '{{ response.items }}'
      kmsKeyName: '{{ response.kmsKeyName }}'
      kmsKeyVersionName: '{{ response.kmsKeyVersionName }}'
      name: '{{ response.name }}'
      reconciling: '{{ response.reconciling }}'
      state: '{{ response.state }}'
      uid: '{{ response.uid }}'
- discovery_id: gcp.speech.projects.locations.phraseSets.get
  for_each: gcp.speech.projects.locations.phraseSets.list
  calls:
  - action: projects.locations.phraseSets.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      annotations: '{{ response.annotations }}'
      boost: '{{ response.boost }}'
      deleteTime: '{{ response.deleteTime }}'
      displayName: '{{ response.displayName }}'
      expireTime: '{{ response.expireTime }}'
      kmsKeyName: '{{ response.kmsKeyName }}'
      kmsKeyVersionName: '{{ response.kmsKeyVersionName }}'
      name: '{{ response.name }}'
      phrases: '{{ response.phrases }}'
      reconciling: '{{ response.reconciling }}'
      state: '{{ response.state }}'
      uid: '{{ response.uid }}'
