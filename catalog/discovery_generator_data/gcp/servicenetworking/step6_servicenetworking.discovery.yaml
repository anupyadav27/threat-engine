version: '1.0'
provider: gcp
service: servicenetworking
services:
  client: servicenetworking
  module: googleapiclient.discovery.build('servicenetworking', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.servicenetworking.services.connections.list
  calls:
  - action: services.connections.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.connections }}'
    item:
      network: '{{ item.network }}'
      peering: '{{ item.peering }}'
      reservedPeeringRanges: '{{ item.reservedPeeringRanges }}'
      service: '{{ item.service }}'
- discovery_id: gcp.servicenetworking.services.dnsRecordSets.get
  calls:
  - action: services.dnsRecordSets.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      data: '{{ response.data }}'
      domain: '{{ response.domain }}'
      ttl: '{{ response.ttl }}'
      type: '{{ response.type }}'
- discovery_id: gcp.servicenetworking.services.dnsRecordSets.list
  calls:
  - action: services.dnsRecordSets.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.dnsRecordSets }}'
    item:
      data: '{{ item.data }}'
      domain: '{{ item.domain }}'
      ttl: '{{ item.ttl }}'
      type: '{{ item.type }}'
- discovery_id: gcp.servicenetworking.services.projects.global.networks.dnsZones.list
  calls:
  - action: services.projects.global.networks.dnsZones.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.dnsZones }}'
    item:
      consumerPeeringZone: '{{ item.consumerPeeringZone }}'
      producerPrivateZone: '{{ item.producerPrivateZone }}'
- discovery_id: gcp.servicenetworking.services.projects.global.networks.peeredDnsDomains.list
  calls:
  - action: services.projects.global.networks.peeredDnsDomains.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.peeredDnsDomains }}'
    item:
      dnsSuffix: '{{ item.dnsSuffix }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.servicenetworking.operations.get
  for_each: gcp.servicenetworking.operations.list
  calls:
  - action: operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
- discovery_id: gcp.servicenetworking.operations.list
  calls:
  - action: operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.servicenetworking.services.projects.global.networks.dnsZones.get
  for_each: gcp.servicenetworking.services.projects.global.networks.dnsZones.list
  calls:
  - action: services.projects.global.networks.dnsZones.get
    params:
      name: '{{ item.network }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      consumerPeeringZone: '{{ response.consumerPeeringZone }}'
      producerPrivateZone: '{{ response.producerPrivateZone }}'
- discovery_id: gcp.servicenetworking.services.projects.global.networks.get
  for_each: gcp.servicenetworking.services.connections.list
  calls:
  - action: services.projects.global.networks.get
    params:
      name: '{{ item.network }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      cloudsqlConfigs: '{{ response.cloudsqlConfigs }}'
      consumerExportCustomRoutes: '{{ response.consumerExportCustomRoutes }}'
      consumerExportSubnetRoutesWithPublicIp: '{{ response.consumerExportSubnetRoutesWithPublicIp
        }}'
      consumerImportCustomRoutes: '{{ response.consumerImportCustomRoutes }}'
      consumerImportSubnetRoutesWithPublicIp: '{{ response.consumerImportSubnetRoutesWithPublicIp
        }}'
      producerExportCustomRoutes: '{{ response.producerExportCustomRoutes }}'
      producerExportSubnetRoutesWithPublicIp: '{{ response.producerExportSubnetRoutesWithPublicIp
        }}'
      producerImportCustomRoutes: '{{ response.producerImportCustomRoutes }}'
      producerImportSubnetRoutesWithPublicIp: '{{ response.producerImportSubnetRoutesWithPublicIp
        }}'
      producerNetwork: '{{ response.producerNetwork }}'
      reservedRanges: '{{ response.reservedRanges }}'
      usedIpRanges: '{{ response.usedIpRanges }}'
      vpcScReferenceArchitectureEnabled: '{{ response.vpcScReferenceArchitectureEnabled
        }}'
- discovery_id: gcp.servicenetworking.services.projects.global.networks.getVpcServiceControls
  for_each: gcp.servicenetworking.services.connections.list
  calls:
  - action: services.projects.global.networks.getVpcServiceControls
    params:
      name: '{{ item.network }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      enabled: '{{ response.enabled }}'
