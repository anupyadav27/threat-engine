version: '1.0'
provider: gcp
service: deploymentmanager
services:
  client: deploymentmanager
  module: googleapiclient.discovery.build('deploymentmanager', 'alpha')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.deploymentmanager.compositeTypes.list
  calls:
  - action: compositeTypes.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.compositeTypes }}'
    item:
      description: '{{ item.description }}'
      id: '{{ item.id }}'
      insertTime: '{{ item.insertTime }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      operation: '{{ item.operation }}'
      status: '{{ item.status }}'
      templateContents: '{{ item.templateContents }}'
  uid_template: '{item.name}'
- discovery_id: gcp.deploymentmanager.deployments.list
  calls:
  - action: deployments.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.deployments }}'
    item:
      credential: '{{ item.credential }}'
      description: '{{ item.description }}'
      fingerprint: '{{ item.fingerprint }}'
      id: '{{ item.id }}'
      insertTime: '{{ item.insertTime }}'
      labels: '{{ item.labels }}'
      manifest: '{{ item.manifest }}'
      name: '{{ item.name }}'
      operation: '{{ item.operation }}'
      outputs: '{{ item.outputs }}'
      target: '{{ item.target }}'
      update: '{{ item.update }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.deploymentmanager.operations.list
  calls:
  - action: operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      clientOperationId: '{{ item.clientOperationId }}'
      creationTimestamp: '{{ item.creationTimestamp }}'
      description: '{{ item.description }}'
      endTime: '{{ item.endTime }}'
      error: '{{ item.error }}'
      firewallPolicyRuleOperationMetadata: '{{ item.firewallPolicyRuleOperationMetadata
        }}'
      httpErrorMessage: '{{ item.httpErrorMessage }}'
      httpErrorStatusCode: '{{ item.httpErrorStatusCode }}'
      id: '{{ item.id }}'
      insertTime: '{{ item.insertTime }}'
      instancesBulkInsertOperationMetadata: '{{ item.instancesBulkInsertOperationMetadata
        }}'
      name: '{{ item.name }}'
      operationGroupId: '{{ item.operationGroupId }}'
      operationType: '{{ item.operationType }}'
      progress: '{{ item.progress }}'
      region: '{{ item.region }}'
      selfLinkWithId: '{{ item.selfLinkWithId }}'
      setAutoscalerLinkOperationMetadata: '{{ item.setAutoscalerLinkOperationMetadata
        }}'
      setCommonInstanceMetadataOperationMetadata: '{{ item.setCommonInstanceMetadataOperationMetadata
        }}'
      startTime: '{{ item.startTime }}'
      status: '{{ item.status }}'
      statusMessage: '{{ item.statusMessage }}'
      targetId: '{{ item.targetId }}'
      targetLink: '{{ item.targetLink }}'
      user: '{{ item.user }}'
      zone: '{{ item.zone }}'
  uid_template: '{item.name}'
- discovery_id: gcp.deploymentmanager.typeProviders.list
  calls:
  - action: typeProviders.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.typeProviders }}'
    item:
      collectionOverrides: '{{ item.collectionOverrides }}'
      credential: '{{ item.credential }}'
      customCertificateAuthorityRoots: '{{ item.customCertificateAuthorityRoots }}'
      description: '{{ item.description }}'
      descriptorUrl: '{{ item.descriptorUrl }}'
      id: '{{ item.id }}'
      insertTime: '{{ item.insertTime }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      operation: '{{ item.operation }}'
      options: '{{ item.options }}'
  uid_template: '{item.name}'
- discovery_id: gcp.deploymentmanager.types.list
  calls:
  - action: types.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.types }}'
    item:
      base: '{{ item.base }}'
      description: '{{ item.description }}'
      id: '{{ item.id }}'
      insertTime: '{{ item.insertTime }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      operation: '{{ item.operation }}'
  uid_template: '{item.name}'
- discovery_id: gcp.deploymentmanager.compositeTypes.get
  for_each: gcp.deploymentmanager.compositeTypes.list
  calls:
  - action: compositeTypes.get
    params:
      compositeType: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      description: '{{ response.description }}'
      id: '{{ response.id }}'
      insertTime: '{{ response.insertTime }}'
      labels: '{{ response.labels }}'
      name: '{{ response.name }}'
      operation: '{{ response.operation }}'
      status: '{{ response.status }}'
      templateContents: '{{ response.templateContents }}'
- discovery_id: gcp.deploymentmanager.deployments.get
  for_each: gcp.deploymentmanager.deployments.list
  calls:
  - action: deployments.get
    params:
      deployment: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      credential: '{{ response.credential }}'
      description: '{{ response.description }}'
      fingerprint: '{{ response.fingerprint }}'
      id: '{{ response.id }}'
      insertTime: '{{ response.insertTime }}'
      labels: '{{ response.labels }}'
      manifest: '{{ response.manifest }}'
      name: '{{ response.name }}'
      operation: '{{ response.operation }}'
      outputs: '{{ response.outputs }}'
      target: '{{ response.target }}'
      update: '{{ response.update }}'
      updateTime: '{{ response.updateTime }}'
- discovery_id: gcp.deploymentmanager.deployments.getIamPolicy
  for_each: gcp.deploymentmanager.resources.list
  calls:
  - action: deployments.getIamPolicy
    params:
      resource: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      auditConfigs: '{{ response.auditConfigs }}'
      bindings: '{{ response.bindings }}'
      version: '{{ response.version }}'
- discovery_id: gcp.deploymentmanager.manifests.get
  for_each: gcp.deploymentmanager.manifests.list
  calls:
  - action: manifests.get
    params:
      deployment: '{{ item.name }}'
      manifest: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      config: '{{ response.config }}'
      expandedConfig: '{{ response.expandedConfig }}'
      id: '{{ response.id }}'
      imports: '{{ response.imports }}'
      insertTime: '{{ response.insertTime }}'
      layout: '{{ response.layout }}'
      manifestSizeBytes: '{{ response.manifestSizeBytes }}'
      manifestSizeLimitBytes: '{{ response.manifestSizeLimitBytes }}'
      name: '{{ response.name }}'
- discovery_id: gcp.deploymentmanager.manifests.list
  for_each: gcp.deploymentmanager.deployments.list
  calls:
  - action: manifests.list
    params:
      deployment: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.manifests }}'
    item:
      config: '{{ item.config }}'
      expandedConfig: '{{ item.expandedConfig }}'
      id: '{{ item.id }}'
      imports: '{{ item.imports }}'
      insertTime: '{{ item.insertTime }}'
      layout: '{{ item.layout }}'
      manifestSizeBytes: '{{ item.manifestSizeBytes }}'
      manifestSizeLimitBytes: '{{ item.manifestSizeLimitBytes }}'
      name: '{{ item.name }}'
- discovery_id: gcp.deploymentmanager.operations.get
  for_each: gcp.deploymentmanager.operations.list
  calls:
  - action: operations.get
    params:
      operation: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      clientOperationId: '{{ response.clientOperationId }}'
      creationTimestamp: '{{ response.creationTimestamp }}'
      description: '{{ response.description }}'
      endTime: '{{ response.endTime }}'
      error: '{{ response.error }}'
      firewallPolicyRuleOperationMetadata: '{{ response.firewallPolicyRuleOperationMetadata
        }}'
      httpErrorMessage: '{{ response.httpErrorMessage }}'
      httpErrorStatusCode: '{{ response.httpErrorStatusCode }}'
      id: '{{ response.id }}'
      insertTime: '{{ response.insertTime }}'
      instancesBulkInsertOperationMetadata: '{{ response.instancesBulkInsertOperationMetadata
        }}'
      name: '{{ response.name }}'
      operationGroupId: '{{ response.operationGroupId }}'
      operationType: '{{ response.operationType }}'
      progress: '{{ response.progress }}'
      region: '{{ response.region }}'
      selfLinkWithId: '{{ response.selfLinkWithId }}'
      setAutoscalerLinkOperationMetadata: '{{ response.setAutoscalerLinkOperationMetadata
        }}'
      setCommonInstanceMetadataOperationMetadata: '{{ response.setCommonInstanceMetadataOperationMetadata
        }}'
      startTime: '{{ response.startTime }}'
      status: '{{ response.status }}'
      statusMessage: '{{ response.statusMessage }}'
      targetId: '{{ response.targetId }}'
      targetLink: '{{ response.targetLink }}'
      user: '{{ response.user }}'
      zone: '{{ response.zone }}'
- discovery_id: gcp.deploymentmanager.resources.get
  for_each: gcp.deploymentmanager.resources.list
  calls:
  - action: resources.get
    params:
      deployment: '{{ item.name }}'
      resource: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      accessControl: '{{ response.accessControl }}'
      finalProperties: '{{ response.finalProperties }}'
      id: '{{ response.id }}'
      insertTime: '{{ response.insertTime }}'
      lastUsedCredential: '{{ response.lastUsedCredential }}'
      manifest: '{{ response.manifest }}'
      name: '{{ response.name }}'
      properties: '{{ response.properties }}'
      runtimePolicies: '{{ response.runtimePolicies }}'
      type: '{{ response.type }}'
      update: '{{ response.update }}'
      updateTime: '{{ response.updateTime }}'
      url: '{{ response.url }}'
- discovery_id: gcp.deploymentmanager.resources.list
  for_each: gcp.deploymentmanager.deployments.list
  calls:
  - action: resources.list
    params:
      deployment: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.resources }}'
    item:
      accessControl: '{{ item.accessControl }}'
      finalProperties: '{{ item.finalProperties }}'
      id: '{{ item.id }}'
      insertTime: '{{ item.insertTime }}'
      lastUsedCredential: '{{ item.lastUsedCredential }}'
      manifest: '{{ item.manifest }}'
      name: '{{ item.name }}'
      properties: '{{ item.properties }}'
      runtimePolicies: '{{ item.runtimePolicies }}'
      type: '{{ item.type }}'
      update: '{{ item.update }}'
      updateTime: '{{ item.updateTime }}'
      url: '{{ item.url }}'
- discovery_id: gcp.deploymentmanager.typeProviders.get
  for_each: gcp.deploymentmanager.typeProviders.listTypes
  calls:
  - action: typeProviders.get
    params:
      typeProvider: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      collectionOverrides: '{{ response.collectionOverrides }}'
      credential: '{{ response.credential }}'
      customCertificateAuthorityRoots: '{{ response.customCertificateAuthorityRoots
        }}'
      description: '{{ response.description }}'
      descriptorUrl: '{{ response.descriptorUrl }}'
      id: '{{ response.id }}'
      insertTime: '{{ response.insertTime }}'
      labels: '{{ response.labels }}'
      name: '{{ response.name }}'
      operation: '{{ response.operation }}'
      options: '{{ response.options }}'
- discovery_id: gcp.deploymentmanager.typeProviders.getType
  for_each: gcp.deploymentmanager.typeProviders.listTypes
  calls:
  - action: typeProviders.getType
    params:
      type: '{{ item.name }}'
      typeProvider: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      description: '{{ response.description }}'
      documentationLink: '{{ response.documentationLink }}'
      name: '{{ response.name }}'
      schema: '{{ response.schema }}'
      title: '{{ response.title }}'
- discovery_id: gcp.deploymentmanager.typeProviders.listTypes
  calls:
  - action: typeProviders.listTypes
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.typeProviders }}'
    item:
      description: '{{ item.description }}'
      documentationLink: '{{ item.documentationLink }}'
      name: '{{ item.name }}'
      schema: '{{ item.schema }}'
      title: '{{ item.title }}'
  uid_template: '{item.name}'
- discovery_id: gcp.deploymentmanager.types.get
  for_each: gcp.deploymentmanager.types.list
  calls:
  - action: types.get
    params:
      type: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      base: '{{ response.base }}'
      description: '{{ response.description }}'
      id: '{{ response.id }}'
      insertTime: '{{ response.insertTime }}'
      labels: '{{ response.labels }}'
      name: '{{ response.name }}'
      operation: '{{ response.operation }}'
