version: '1.0'
provider: gcp
service: mybusinessnotifications
services:
  client: mybusinessnotifications
  module: googleapiclient.discovery.build('mybusinessnotifications', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.mybusinessnotifications.accounts.getNotificationSetting
  calls:
  - action: accounts.getNotificationSetting
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      name: '{{ response.name }}'
      notificationTypes: '{{ response.notificationTypes }}'
      pubsubTopic: '{{ response.pubsubTopic }}'
  uid_template: '{item.name}'
