version: '1.0'
provider: gcp
service: libraryagent
services:
  client: libraryagent
  module: googleapiclient.discovery.build('libraryagent', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.libraryagent.shelves.books.list
  calls:
  - action: shelves.books.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.books }}'
    item:
      author: '{{ item.author }}'
      name: '{{ item.name }}'
      read: '{{ item.read }}'
      title: '{{ item.title }}'
  uid_template: '{item.name}'
- discovery_id: gcp.libraryagent.shelves.list
  calls:
  - action: shelves.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.shelves }}'
    item:
      name: '{{ item.name }}'
      theme: '{{ item.theme }}'
  uid_template: '{item.name}'
- discovery_id: gcp.libraryagent.shelves.books.get
  for_each: gcp.libraryagent.shelves.books.list
  calls:
  - action: shelves.books.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      author: '{{ response.author }}'
      name: '{{ response.name }}'
      read: '{{ response.read }}'
      title: '{{ response.title }}'
- discovery_id: gcp.libraryagent.shelves.get
  for_each: gcp.libraryagent.shelves.list
  calls:
  - action: shelves.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      name: '{{ response.name }}'
      theme: '{{ response.theme }}'
