version: '1.0'
provider: gcp
service: datastudio
discovery:
- discovery_id: gcp.datastudio.dashboards.list
  calls:
  - action: projects.locations.lookmlModels.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      name: '{{ item.name }}'
      description: '{{ item.description }}'
      allowedDbConnectionNames: '{{ item.allowedDbConnectionNames }}'
      projectName: '{{ item.projectName }}'
      exploreCount: '{{ item.exploreCount }}'
      unreferencedTableCount: '{{ item.unreferencedTableCount }}'
  uid_template: '{item.name}'
- discovery_id: gcp.datastudio.list_dashboards
  calls:
  - action: projects.locations.lookmlModels.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      name: '{{ item.name }}'
      description: '{{ item.description }}'
      allowedDbConnectionNames: '{{ item.allowedDbConnectionNames }}'
      projectName: '{{ item.projectName }}'
      exploreCount: '{{ item.exploreCount }}'
      unreferencedTableCount: '{{ item.unreferencedTableCount }}'
  uid_template: '{item.name}'
