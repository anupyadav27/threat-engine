version: '1.0'
provider: gcp
service: datastream
services:
  client: datastream
  module: googleapiclient.discovery.build('datastream', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.datastream.projects.locations.connectionProfiles.list
  calls:
  - action: projects.locations.connectionProfiles.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.connectionProfiles }}'
    item:
      bigqueryProfile: '{{ item.bigqueryProfile }}'
      createTime: '{{ item.createTime }}'
      displayName: '{{ item.displayName }}'
      forwardSshConnectivity: '{{ item.forwardSshConnectivity }}'
      gcsProfile: '{{ item.gcsProfile }}'
      labels: '{{ item.labels }}'
      mongodbProfile: '{{ item.mongodbProfile }}'
      mysqlProfile: '{{ item.mysqlProfile }}'
      name: '{{ item.name }}'
      oracleProfile: '{{ item.oracleProfile }}'
      postgresqlProfile: '{{ item.postgresqlProfile }}'
      privateConnectivity: '{{ item.privateConnectivity }}'
      salesforceProfile: '{{ item.salesforceProfile }}'
      satisfiesPzi: '{{ item.satisfiesPzi }}'
      satisfiesPzs: '{{ item.satisfiesPzs }}'
      spannerProfile: '{{ item.spannerProfile }}'
      sqlServerProfile: '{{ item.sqlServerProfile }}'
      staticServiceIpConnectivity: '{{ item.staticServiceIpConnectivity }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.datastream.projects.locations.fetchStaticIps
  calls:
  - action: projects.locations.fetchStaticIps
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      staticIps: '{{ response.staticIps }}'
- discovery_id: gcp.datastream.projects.locations.get
  calls:
  - action: projects.locations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      displayName: '{{ response.displayName }}'
      labels: '{{ response.labels }}'
      locationId: '{{ response.locationId }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.datastream.projects.locations.list
  calls:
  - action: projects.locations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.locations }}'
    item:
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      locationId: '{{ item.locationId }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.datastream.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.datastream.projects.locations.privateConnections.list
  calls:
  - action: projects.locations.privateConnections.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.privateConnections }}'
    item:
      createTime: '{{ item.createTime }}'
      displayName: '{{ item.displayName }}'
      error: '{{ item.error }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      pscInterfaceConfig: '{{ item.pscInterfaceConfig }}'
      satisfiesPzi: '{{ item.satisfiesPzi }}'
      satisfiesPzs: '{{ item.satisfiesPzs }}'
      state: '{{ item.state }}'
      updateTime: '{{ item.updateTime }}'
      vpcPeeringConfig: '{{ item.vpcPeeringConfig }}'
  uid_template: '{item.name}'
- discovery_id: gcp.datastream.projects.locations.privateConnections.routes.list
  calls:
  - action: projects.locations.privateConnections.routes.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.routes }}'
    item:
      createTime: '{{ item.createTime }}'
      destinationAddress: '{{ item.destinationAddress }}'
      destinationPort: '{{ item.destinationPort }}'
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.datastream.projects.locations.streams.list
  calls:
  - action: projects.locations.streams.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.streams }}'
    item:
      backfillAll: '{{ item.backfillAll }}'
      backfillNone: '{{ item.backfillNone }}'
      createTime: '{{ item.createTime }}'
      customerManagedEncryptionKey: '{{ item.customerManagedEncryptionKey }}'
      destinationConfig: '{{ item.destinationConfig }}'
      displayName: '{{ item.displayName }}'
      errors: '{{ item.errors }}'
      labels: '{{ item.labels }}'
      lastRecoveryTime: '{{ item.lastRecoveryTime }}'
      name: '{{ item.name }}'
      ruleSets: '{{ item.ruleSets }}'
      satisfiesPzi: '{{ item.satisfiesPzi }}'
      satisfiesPzs: '{{ item.satisfiesPzs }}'
      sourceConfig: '{{ item.sourceConfig }}'
      state: '{{ item.state }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.datastream.projects.locations.streams.objects.list
  calls:
  - action: projects.locations.streams.objects.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.objects }}'
    item:
      backfillJob: '{{ item.backfillJob }}'
      createTime: '{{ item.createTime }}'
      customizationRules: '{{ item.customizationRules }}'
      displayName: '{{ item.displayName }}'
      errors: '{{ item.errors }}'
      name: '{{ item.name }}'
      sourceObject: '{{ item.sourceObject }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.datastream.projects.locations.streams.objects.lookup
  calls:
  - action: projects.locations.streams.objects.lookup
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      backfillJob: '{{ response.backfillJob }}'
      createTime: '{{ response.createTime }}'
      customizationRules: '{{ response.customizationRules }}'
      displayName: '{{ response.displayName }}'
      errors: '{{ response.errors }}'
      name: '{{ response.name }}'
      sourceObject: '{{ response.sourceObject }}'
      updateTime: '{{ response.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.datastream.projects.locations.connectionProfiles.get
  for_each: gcp.datastream.projects.locations.connectionProfiles.list
  calls:
  - action: projects.locations.connectionProfiles.get
