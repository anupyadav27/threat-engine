      forwardSshConnectivity: '{{ response.forwardSshConnectivity }}'
      gcsProfile: '{{ response.gcsProfile }}'
      labels: '{{ response.labels }}'
      mongodbProfile: '{{ response.mongodbProfile }}'
      mysqlProfile: '{{ response.mysqlProfile }}'
      name: '{{ response.name }}'
      oracleProfile: '{{ response.oracleProfile }}'
      postgresqlProfile: '{{ response.postgresqlProfile }}'
      privateConnectivity: '{{ response.privateConnectivity }}'
      salesforceProfile: '{{ response.salesforceProfile }}'
      satisfiesPzi: '{{ response.satisfiesPzi }}'
      satisfiesPzs: '{{ response.satisfiesPzs }}'
      spannerProfile: '{{ response.spannerProfile }}'
      sqlServerProfile: '{{ response.sqlServerProfile }}'
