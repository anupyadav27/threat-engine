version: '1.0'
provider: gcp
service: bigquery

services:
  client: bigquery
  module: "googleapiclient.discovery.build('bigquery', 'v1')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: routines
    identifier_op: gcp.bigquery.routines.list
    identifier_field: routines[].remoteFunctionOptions
    item_var_path: item.routines[].remoteFunctionOptions
    identifier_template: 'routines/{url_encoded_remoteFunctionOptions}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.bigquery.projects.list ──
  - discovery_id: gcp.bigquery.projects.list
    calls:
      - action: projects.list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        bindings: '{{ item.bindings }}'
        cloudResource: '{{ item.cloudResource }}'
        cloudSql: '{{ item.cloudSql }}'
        totalItems: '{{ item.totalItems }}'

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.bigquery.routines.list ──
  - discovery_id: gcp.bigquery.routines.list
    calls:
      - action: routines.list
        params:
          datasetId: '{{ datasetId }}'
          projectId: '{{ project_id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        arguments: '{{ item.arguments }}'
        creationTime: '{{ item.creationTime }}'
        dataGovernanceType: '{{ item.dataGovernanceType }}'
        definitionBody: '{{ item.definitionBody }}'
        description: '{{ item.description }}'
        determinismLevel: '{{ item.determinismLevel }}'
        externalRuntimeOptions: '{{ item.externalRuntimeOptions }}'
        importedLibraries: '{{ item.importedLibraries }}'
        labels: '{{ item.labels }}'
        language: '{{ item.language }}'
        lastModifiedTime: '{{ item.lastModifiedTime }}'
        pythonOptions: '{{ item.pythonOptions }}'
        remoteFunctionOptions: '{{ item.remoteFunctionOptions }}'
        returnTableType: '{{ item.returnTableType }}'
        returnType: '{{ item.returnType }}'
        routineReference: '{{ item.routineReference }}'
        routineType: '{{ item.routineType }}'
        securityMode: '{{ item.securityMode }}'
        sparkOptions: '{{ item.sparkOptions }}'
        strictMode: '{{ item.strictMode }}'

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.bigquery.tables.list ──
  - discovery_id: gcp.bigquery.tables.list
    calls:
      - action: tables.list
        params:
          datasetId: '{{ datasetId }}'
          projectId: '{{ project_id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        access: '{{ item.access }}'
        clustering: '{{ item.clustering }}'
        defaultEncryptionConfiguration: '{{ item.defaultEncryptionConfiguration }}'
        encryptionConfiguration: '{{ item.encryptionConfiguration }}'
        id: '{{ item.id }}'
        labels: '{{ item.labels }}'
        location: '{{ item.location }}'
        materializedView: '{{ item.materializedView }}'
        timePartitioning: '{{ item.timePartitioning }}'
        totalItems: '{{ item.totalItems }}'
        type: '{{ item.type }}'

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.bigquery.datasets.list ──
  - discovery_id: gcp.bigquery.datasets.list
    calls:
      - action: datasets.list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        access: '{{ item.access }}'
        defaultEncryptionConfiguration: '{{ item.defaultEncryptionConfiguration }}'
        defaultTableExpirationMs: '{{ item.defaultTableExpirationMs }}'
        id: '{{ item.id }}'
        labels: '{{ item.labels }}'
        location: '{{ item.location }}'

