version: '1.0'
provider: gcp
service: dataproc

services:
  client: dataproc
  module: "googleapiclient.discovery.build('dataproc', 'v1')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: clusters
    identifier_op: gcp.dataproc.projects.regions.clusters.list
    identifier_field: clusters[].config
    item_var_path: item.clusters[].config
    identifier_template: 'clusters/{url_encoded_config}'
  - resource_type: jobs
    identifier_op: gcp.dataproc.projects.regions.jobs.list
    identifier_field: jobs[].driverSchedulingConfig
    item_var_path: item.jobs[].driverSchedulingConfig
    identifier_template: 'jobs/{url_encoded_driverSchedulingConfig}'
  - resource_type: unknown
    identifier_op: gcp.dataproc.projects.regions.workflowTemplates.list
    identifier_field: templates[].name
    item_var_path: item.templates[].name

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.dataproc.projects.regions.clusters.list ──
  - discovery_id: gcp.dataproc.projects.regions.clusters.list
    calls:
      - action: projects.regions.clusters.list
        params:
          projectId: '{{ project_id }}'
          region: '{{ region }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        clusterName: '{{ item.clusterName }}'
        clusterUuid: '{{ item.clusterUuid }}'
        config: '{{ item.config }}'
        labels: '{{ item.labels }}'
        metrics: '{{ item.metrics }}'
        projectId: '{{ item.projectId }}'
        status: '{{ item.status }}'
        statusHistory: '{{ item.statusHistory }}'
        virtualClusterConfig: '{{ item.virtualClusterConfig }}'

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.dataproc.projects.regions.jobs.list ──
  - discovery_id: gcp.dataproc.projects.regions.jobs.list
    calls:
      - action: projects.regions.jobs.list
        params:
          projectId: '{{ project_id }}'
          region: '{{ region }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        clusterName: '{{ item.clusterName }}'
        config: '{{ item.config }}'
        done: '{{ item.done }}'
        driverControlFilesUri: '{{ item.driverControlFilesUri }}'
        driverOutputResourceUri: '{{ item.driverOutputResourceUri }}'
        driverSchedulingConfig: '{{ item.driverSchedulingConfig }}'
        flinkJob: '{{ item.flinkJob }}'
        hadoopJob: '{{ item.hadoopJob }}'
        hiveJob: '{{ item.hiveJob }}'
        jobUuid: '{{ item.jobUuid }}'
        labels: '{{ item.labels }}'
        pigJob: '{{ item.pigJob }}'
        placement: '{{ item.placement }}'
        prestoJob: '{{ item.prestoJob }}'
        pysparkJob: '{{ item.pysparkJob }}'
        reference: '{{ item.reference }}'
        scheduling: '{{ item.scheduling }}'
        sparkJob: '{{ item.sparkJob }}'
        sparkRJob: '{{ item.sparkRJob }}'
        sparkSqlJob: '{{ item.sparkSqlJob }}'
        status: '{{ item.status }}'
        statusHistory: '{{ item.statusHistory }}'
        trinoJob: '{{ item.trinoJob }}'
        yarnApplications: '{{ item.yarnApplications }}'

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.dataproc.projects.regions.workflowTemplates.list ──
  - discovery_id: gcp.dataproc.projects.regions.workflowTemplates.list
    calls:
      - action: projects.regions.workflowTemplates.list
        params:
          parent: '{{ project_id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        clusterName: '{{ item.clusterName }}'
        config: '{{ item.config }}'
        createTime: '{{ item.createTime }}'
        dagTimeout: '{{ item.dagTimeout }}'
        encryptionConfig: '{{ item.encryptionConfig }}'
        id: '{{ item.id }}'
        jobs: '{{ item.jobs }}'
        labels: '{{ item.labels }}'
        name: '{{ item.name }}'
        parameters: '{{ item.parameters }}'
        placement: '{{ item.placement }}'
        status: '{{ item.status }}'
        updateTime: '{{ item.updateTime }}'
        version: '{{ item.version }}'

