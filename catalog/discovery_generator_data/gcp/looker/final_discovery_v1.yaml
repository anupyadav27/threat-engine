# ============================================================
# Discovery YAML — looker (final_discovery v1)
# Generated: 2026-04-16T11:27:57Z
# Check rules: auto | ops in scope: 1
# ============================================================
version: 'v1'
provider: gcp
service: looker

services:
  client: looker
  module: "googleapiclient.discovery.build('looker', 'v1')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: instances
    identifier_op: gcp.looker.projects.locations.instances.list
    identifier_field: name
    item_var_path: item.name
    identifier_template: '{name}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.looker.projects.locations.instances.list ──
  - discovery_id: gcp.looker.projects.locations.instances.list
    calls:
      - action: projects.locations.instances.list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        adminSettings: '{{ item.adminSettings }}'
        createTime: '{{ item.createTime }}'
        customDomain: '{{ item.customDomain }}'
        deleteTime: '{{ item.deleteTime }}'
        encryptionConfig: '{{ item.encryptionConfig }}'
        fipsEnabled: '{{ item.fipsEnabled }}'
        maintenanceSchedule: '{{ item.maintenanceSchedule }}'
        maintenanceWindow: '{{ item.maintenanceWindow }}'
        name: '{{ item.name }}'
        oauthConfig: '{{ item.oauthConfig }}'
        pscConfig: '{{ item.pscConfig }}'
        pscEnabled: '{{ item.pscEnabled }}'
        publicIpEnabled: '{{ item.publicIpEnabled }}'
        reservedRange: '{{ item.reservedRange }}'
        state: '{{ item.state }}'
        updateTime: '{{ item.updateTime }}'
