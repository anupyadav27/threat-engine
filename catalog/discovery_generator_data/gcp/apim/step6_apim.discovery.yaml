version: '1.0'
provider: gcp
service: apim
services:
  client: apim
  module: googleapiclient.discovery.build('apim', 'v1alpha')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.apim.projects.locations.get
  calls:
  - action: projects.locations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      displayName: '{{ response.displayName }}'
      labels: '{{ response.labels }}'
      locationId: '{{ response.locationId }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.apim.projects.locations.getEntitlement
  calls:
  - action: projects.locations.getEntitlement
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      apiObservationEntitled: '{{ response.apiObservationEntitled }}'
      billingProjectNumber: '{{ response.billingProjectNumber }}'
      createTime: '{{ response.createTime }}'
      name: '{{ response.name }}'
      updateTime: '{{ response.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.apim.projects.locations.list
  calls:
  - action: projects.locations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.locations }}'
    item:
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      locationId: '{{ item.locationId }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.apim.projects.locations.listApiObservationTags
  calls:
  - action: projects.locations.listApiObservationTags
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.locations }}'
- discovery_id: gcp.apim.projects.locations.observationJobs.apiObservations.apiOperations.list
  calls:
  - action: projects.locations.observationJobs.apiObservations.apiOperations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.apiOperations }}'
    item:
      count: '{{ item.count }}'
      firstSeenTime: '{{ item.firstSeenTime }}'
      httpOperation: '{{ item.httpOperation }}'
      lastSeenTime: '{{ item.lastSeenTime }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.apim.projects.locations.observationJobs.apiObservations.list
  calls:
  - action: projects.locations.observationJobs.apiObservations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.apiObservations }}'
    item:
      apiOperationCount: '{{ item.apiOperationCount }}'
      createTime: '{{ item.createTime }}'
      hostname: '{{ item.hostname }}'
      lastEventDetectedTime: '{{ item.lastEventDetectedTime }}'
      name: '{{ item.name }}'
      serverIps: '{{ item.serverIps }}'
      sourceLocations: '{{ item.sourceLocations }}'
      style: '{{ item.style }}'
      tags: '{{ item.tags }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.apim.projects.locations.observationJobs.list
  calls:
  - action: projects.locations.observationJobs.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.observationJobs }}'
    item:
      createTime: '{{ item.createTime }}'
      name: '{{ item.name }}'
      sources: '{{ item.sources }}'
      state: '{{ item.state }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.apim.projects.locations.observationSources.list
  calls:
  - action: projects.locations.observationSources.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.observationSources }}'
    item:
      createTime: '{{ item.createTime }}'
      gclbObservationSource: '{{ item.gclbObservationSource }}'
      name: '{{ item.name }}'
      state: '{{ item.state }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.apim.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.apim.projects.locations.observationJobs.apiObservations.apiOperations.get
  for_each: gcp.apim.projects.locations.observationJobs.apiObservations.apiOperations.list
  calls:
  - action: projects.locations.observationJobs.apiObservations.apiOperations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      count: '{{ response.count }}'
      firstSeenTime: '{{ response.firstSeenTime }}'
      httpOperation: '{{ response.httpOperation }}'
      lastSeenTime: '{{ response.lastSeenTime }}'
      name: '{{ response.name }}'
- discovery_id: gcp.apim.projects.locations.observationJobs.apiObservations.get
  for_each: gcp.apim.projects.locations.observationJobs.apiObservations.list
  calls:
  - action: projects.locations.observationJobs.apiObservations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      apiOperationCount: '{{ response.apiOperationCount }}'
      createTime: '{{ response.createTime }}'
      hostname: '{{ response.hostname }}'
      lastEventDetectedTime: '{{ response.lastEventDetectedTime }}'
      name: '{{ response.name }}'
      serverIps: '{{ response.serverIps }}'
      sourceLocations: '{{ response.sourceLocations }}'
      style: '{{ response.style }}'
      tags: '{{ response.tags }}'
      updateTime: '{{ response.updateTime }}'
- discovery_id: gcp.apim.projects.locations.observationJobs.get
  for_each: gcp.apim.projects.locations.observationJobs.list
  calls:
  - action: projects.locations.observationJobs.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      createTime: '{{ response.createTime }}'
      name: '{{ response.name }}'
      sources: '{{ response.sources }}'
      state: '{{ response.state }}'
      updateTime: '{{ response.updateTime }}'
- discovery_id: gcp.apim.projects.locations.observationSources.get
  for_each: gcp.apim.projects.locations.observationSources.list
  calls:
  - action: projects.locations.observationSources.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      createTime: '{{ response.createTime }}'
      gclbObservationSource: '{{ response.gclbObservationSource }}'
      name: '{{ response.name }}'
      state: '{{ response.state }}'
      updateTime: '{{ response.updateTime }}'
- discovery_id: gcp.apim.projects.locations.operations.get
  for_each: gcp.apim.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
