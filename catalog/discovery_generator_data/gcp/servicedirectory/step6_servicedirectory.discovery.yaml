version: '1.0'
provider: gcp
service: servicedirectory
services:
  client: servicedirectory
  module: googleapiclient.discovery.build('servicedirectory', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.servicedirectory.projects.locations.get
  calls:
  - action: projects.locations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      displayName: '{{ response.displayName }}'
      labels: '{{ response.labels }}'
      locationId: '{{ response.locationId }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.servicedirectory.projects.locations.list
  calls:
  - action: projects.locations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.locations }}'
    item:
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      locationId: '{{ item.locationId }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.servicedirectory.projects.locations.namespaces.list
  calls:
  - action: projects.locations.namespaces.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.namespaces }}'
    item:
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      uid: '{{ item.uid }}'
  uid_template: '{item.name}'
- discovery_id: gcp.servicedirectory.projects.locations.namespaces.services.endpoints.list
  calls:
  - action: projects.locations.namespaces.services.endpoints.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.endpoints }}'
    item:
      address: '{{ item.address }}'
      annotations: '{{ item.annotations }}'
      name: '{{ item.name }}'
      network: '{{ item.network }}'
      port: '{{ item.port }}'
      uid: '{{ item.uid }}'
  uid_template: '{item.name}'
- discovery_id: gcp.servicedirectory.projects.locations.namespaces.services.list
  calls:
  - action: projects.locations.namespaces.services.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.services }}'
    item:
      annotations: '{{ item.annotations }}'
      endpoints: '{{ item.endpoints }}'
      name: '{{ item.name }}'
      uid: '{{ item.uid }}'
  uid_template: '{item.name}'
- discovery_id: gcp.servicedirectory.projects.locations.namespaces.get
  for_each: gcp.servicedirectory.projects.locations.namespaces.list
  calls:
  - action: projects.locations.namespaces.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      labels: '{{ response.labels }}'
      name: '{{ response.name }}'
      uid: '{{ response.uid }}'
- discovery_id: gcp.servicedirectory.projects.locations.namespaces.services.endpoints.get
  for_each: gcp.servicedirectory.projects.locations.namespaces.services.endpoints.list
  calls:
  - action: projects.locations.namespaces.services.endpoints.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      address: '{{ response.address }}'
      annotations: '{{ response.annotations }}'
      name: '{{ response.name }}'
      network: '{{ response.network }}'
      port: '{{ response.port }}'
      uid: '{{ response.uid }}'
- discovery_id: gcp.servicedirectory.projects.locations.namespaces.services.get
  for_each: gcp.servicedirectory.projects.locations.namespaces.services.list
  calls:
  - action: projects.locations.namespaces.services.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      annotations: '{{ response.annotations }}'
      endpoints: '{{ response.endpoints }}'
      name: '{{ response.name }}'
      uid: '{{ response.uid }}'
