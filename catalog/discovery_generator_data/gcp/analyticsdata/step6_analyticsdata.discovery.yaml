version: '1.0'
provider: gcp
service: analyticsdata
services:
  client: analyticsdata
  module: googleapiclient.discovery.build('analyticsdata', 'v1alpha')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.analyticsdata.properties.audienceLists.list
  calls:
  - action: properties.audienceLists.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.audienceLists }}'
    item:
      audience: '{{ item.audience }}'
      audienceDisplayName: '{{ item.audienceDisplayName }}'
      beginCreatingTime: '{{ item.beginCreatingTime }}'
      creationQuotaTokensCharged: '{{ item.creationQuotaTokensCharged }}'
      dimensions: '{{ item.dimensions }}'
      errorMessage: '{{ item.errorMessage }}'
      name: '{{ item.name }}'
      percentageCompleted: '{{ item.percentageCompleted }}'
      recurringAudienceList: '{{ item.recurringAudienceList }}'
      rowCount: '{{ item.rowCount }}'
      state: '{{ item.state }}'
      webhookNotification: '{{ item.webhookNotification }}'
  uid_template: '{item.name}'
- discovery_id: gcp.analyticsdata.properties.recurringAudienceLists.list
  calls:
  - action: properties.recurringAudienceLists.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.recurringAudienceLists }}'
    item:
      activeDaysRemaining: '{{ item.activeDaysRemaining }}'
      audience: '{{ item.audience }}'
      audienceDisplayName: '{{ item.audienceDisplayName }}'
      audienceLists: '{{ item.audienceLists }}'
      dimensions: '{{ item.dimensions }}'
      name: '{{ item.name }}'
      webhookNotification: '{{ item.webhookNotification }}'
  uid_template: '{item.name}'
- discovery_id: gcp.analyticsdata.properties.reportTasks.list
  calls:
  - action: properties.reportTasks.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.reportTasks }}'
    item:
      name: '{{ item.name }}'
      reportDefinition: '{{ item.reportDefinition }}'
      reportMetadata: '{{ item.reportMetadata }}'
  uid_template: '{item.name}'
- discovery_id: gcp.analyticsdata.properties.audienceLists.get
  for_each: gcp.analyticsdata.properties.audienceLists.query
  calls:
  - action: properties.audienceLists.get
    params:
      name: '{{ item.dimensionValues }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      audience: '{{ response.audience }}'
      audienceDisplayName: '{{ response.audienceDisplayName }}'
      beginCreatingTime: '{{ response.beginCreatingTime }}'
      creationQuotaTokensCharged: '{{ response.creationQuotaTokensCharged }}'
      dimensions: '{{ response.dimensions }}'
      errorMessage: '{{ response.errorMessage }}'
      name: '{{ response.name }}'
      percentageCompleted: '{{ response.percentageCompleted }}'
      recurringAudienceList: '{{ response.recurringAudienceList }}'
      rowCount: '{{ response.rowCount }}'
      state: '{{ response.state }}'
      webhookNotification: '{{ response.webhookNotification }}'
- discovery_id: gcp.analyticsdata.properties.audienceLists.query
  calls:
  - action: properties.audienceLists.query
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.audienceLists }}'
    item:
      dimensionValues: '{{ item.dimensionValues }}'
- discovery_id: gcp.analyticsdata.properties.getPropertyQuotasSnapshot
  calls:
  - action: properties.getPropertyQuotasSnapshot
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      corePropertyQuota: '{{ response.corePropertyQuota }}'
      funnelPropertyQuota: '{{ response.funnelPropertyQuota }}'
      name: '{{ response.name }}'
      realtimePropertyQuota: '{{ response.realtimePropertyQuota }}'
  uid_template: '{item.name}'
- discovery_id: gcp.analyticsdata.properties.recurringAudienceLists.get
  for_each: gcp.analyticsdata.properties.recurringAudienceLists.list
  calls:
  - action: properties.recurringAudienceLists.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      activeDaysRemaining: '{{ response.activeDaysRemaining }}'
      audience: '{{ response.audience }}'
      audienceDisplayName: '{{ response.audienceDisplayName }}'
      audienceLists: '{{ response.audienceLists }}'
      dimensions: '{{ response.dimensions }}'
      name: '{{ response.name }}'
      webhookNotification: '{{ response.webhookNotification }}'
- discovery_id: gcp.analyticsdata.properties.reportTasks.get
  for_each: gcp.analyticsdata.properties.reportTasks.query
  calls:
  - action: properties.reportTasks.get
    params:
      name: '{{ item.dimensionValues }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      name: '{{ response.name }}'
      reportDefinition: '{{ response.reportDefinition }}'
      reportMetadata: '{{ response.reportMetadata }}'
- discovery_id: gcp.analyticsdata.properties.reportTasks.query
  calls:
  - action: properties.reportTasks.query
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.reportTasks }}'
    item:
      dimensionValues: '{{ item.dimensionValues }}'
      metricValues: '{{ item.metricValues }}'
