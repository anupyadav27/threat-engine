version: '1.0'
provider: gcp
service: serviceconsumermanagement
services:
  client: serviceconsumermanagement
  module: googleapiclient.discovery.build('serviceconsumermanagement', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.serviceconsumermanagement.services.search
  calls:
  - action: services.search
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.services }}'
    item:
      consumer: '{{ item.consumer }}'
      createTime: '{{ item.createTime }}'
      name: '{{ item.name }}'
      service: '{{ item.service }}'
      tenantResources: '{{ item.tenantResources }}'
  uid_template: '{item.name}'
- discovery_id: gcp.serviceconsumermanagement.services.tenancyUnits.list
  calls:
  - action: services.tenancyUnits.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.tenancyUnits }}'
    item:
      consumer: '{{ item.consumer }}'
      createTime: '{{ item.createTime }}'
      name: '{{ item.name }}'
      service: '{{ item.service }}'
      tenantResources: '{{ item.tenantResources }}'
  uid_template: '{item.name}'
- discovery_id: gcp.serviceconsumermanagement.operations.get
  for_each: gcp.serviceconsumermanagement.operations.list
  calls:
  - action: operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
- discovery_id: gcp.serviceconsumermanagement.operations.list
  calls:
  - action: operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
