version: '1.0'
provider: gcp
service: cloudidentity
services:
  client: cloudidentity
  module: googleapiclient.discovery.build('cloudidentity', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.cloudidentity.customers.userinvitations.list
  calls:
  - action: customers.userinvitations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.userinvitations }}'
    item:
      mailsSentCount: '{{ item.mailsSentCount }}'
      name: '{{ item.name }}'
      state: '{{ item.state }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.cloudidentity.devices.deviceUsers.clientStates.list
