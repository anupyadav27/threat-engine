    item:
      assetTags: '{{ item.assetTags }}'
      complianceState: '{{ item.complianceState }}'
      createTime: '{{ item.createTime }}'
      customId: '{{ item.customId }}'
      healthScore: '{{ item.healthScore }}'
      keyValuePairs: '{{ item.keyValuePairs }}'
