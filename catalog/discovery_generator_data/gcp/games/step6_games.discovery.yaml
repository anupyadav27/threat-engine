version: '1.0'
provider: gcp
service: games
services:
  client: games
  module: googleapiclient.discovery.build('games', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.games.achievementDefinitions.list
  calls:
  - action: achievementDefinitions.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.achievementDefinitions }}'
    item:
      achievementType: '{{ item.achievementType }}'
      description: '{{ item.description }}'
      experiencePoints: '{{ item.experiencePoints }}'
      formattedTotalSteps: '{{ item.formattedTotalSteps }}'
      id: '{{ item.id }}'
      initialState: '{{ item.initialState }}'
      isRevealedIconUrlDefault: '{{ item.isRevealedIconUrlDefault }}'
      isUnlockedIconUrlDefault: '{{ item.isUnlockedIconUrlDefault }}'
      name: '{{ item.name }}'
      revealedIconUrl: '{{ item.revealedIconUrl }}'
      totalSteps: '{{ item.totalSteps }}'
      unlockedIconUrl: '{{ item.unlockedIconUrl }}'
  uid_template: '{item.name}'
- discovery_id: gcp.games.events.listByPlayer
  calls:
  - action: events.listByPlayer
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.events }}'
    item:
      definitionId: '{{ item.definitionId }}'
      formattedNumEvents: '{{ item.formattedNumEvents }}'
      numEvents: '{{ item.numEvents }}'
      playerId: '{{ item.playerId }}'
- discovery_id: gcp.games.events.listDefinitions
  calls:
  - action: events.listDefinitions
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.events }}'
    item:
      childEvents: '{{ item.childEvents }}'
      description: '{{ item.description }}'
      displayName: '{{ item.displayName }}'
      id: '{{ item.id }}'
      imageUrl: '{{ item.imageUrl }}'
      isDefaultImageUrl: '{{ item.isDefaultImageUrl }}'
      visibility: '{{ item.visibility }}'
  uid_template: '{item.id}'
- discovery_id: gcp.games.leaderboards.list
  calls:
  - action: leaderboards.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.leaderboards }}'
    item:
      iconUrl: '{{ item.iconUrl }}'
      id: '{{ item.id }}'
      isIconUrlDefault: '{{ item.isIconUrlDefault }}'
      name: '{{ item.name }}'
      order: '{{ item.order }}'
  uid_template: '{item.name}'
- discovery_id: gcp.games.metagame.getMetagameConfig
  calls:
  - action: metagame.getMetagameConfig
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      currentVersion: '{{ response.currentVersion }}'
      playerLevels: '{{ response.playerLevels }}'
- discovery_id: gcp.games.players.getMultipleApplicationPlayerIds
  calls:
  - action: players.getMultipleApplicationPlayerIds
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      playerIds: '{{ response.playerIds }}'
- discovery_id: gcp.games.players.getScopedPlayerIds
  calls:
  - action: players.getScopedPlayerIds
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      developerPlayerKey: '{{ response.developerPlayerKey }}'
      gamePlayerId: '{{ response.gamePlayerId }}'
- discovery_id: gcp.games.stats.get
  calls:
  - action: stats.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      avg_session_length_minutes: '{{ response.avg_session_length_minutes }}'
      churn_probability: '{{ response.churn_probability }}'
      days_since_last_played: '{{ response.days_since_last_played }}'
      high_spender_probability: '{{ response.high_spender_probability }}'
      num_purchases: '{{ response.num_purchases }}'
      num_sessions: '{{ response.num_sessions }}'
      num_sessions_percentile: '{{ response.num_sessions_percentile }}'
      spend_percentile: '{{ response.spend_percentile }}'
      spend_probability: '{{ response.spend_probability }}'
      total_spend_next_28_days: '{{ response.total_spend_next_28_days }}'
- discovery_id: gcp.games.achievements.list
  for_each: gcp.games.players.list
  calls:
  - action: achievements.list
    params:
      playerId: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.achievements }}'
    item:
      achievementState: '{{ item.achievementState }}'
      currentSteps: '{{ item.currentSteps }}'
      experiencePoints: '{{ item.experiencePoints }}'
      formattedCurrentStepsString: '{{ item.formattedCurrentStepsString }}'
      id: '{{ item.id }}'
      lastUpdatedTimestamp: '{{ item.lastUpdatedTimestamp }}'
- discovery_id: gcp.games.applications.get
  calls:
  - action: applications.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      achievement_count: '{{ response.achievement_count }}'
      assets: '{{ response.assets }}'
      author: '{{ response.author }}'
      category: '{{ response.category }}'
      description: '{{ response.description }}'
      enabledFeatures: '{{ response.enabledFeatures }}'
      id: '{{ response.id }}'
      instances: '{{ response.instances }}'
      lastUpdatedTimestamp: '{{ response.lastUpdatedTimestamp }}'
      leaderboard_count: '{{ response.leaderboard_count }}'
      name: '{{ response.name }}'
      themeColor: '{{ response.themeColor }}'
  uid_template: '{item.name}'
- discovery_id: gcp.games.applications.verify
  calls:
  - action: applications.verify
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      alternate_player_id: '{{ response.alternate_player_id }}'
      player_id: '{{ response.player_id }}'
- discovery_id: gcp.games.leaderboards.get
  for_each: gcp.games.leaderboards.list
  calls:
  - action: leaderboards.get
    params:
      leaderboardId: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      iconUrl: '{{ response.iconUrl }}'
      id: '{{ response.id }}'
      isIconUrlDefault: '{{ response.isIconUrlDefault }}'
      name: '{{ response.name }}'
      order: '{{ response.order }}'
- discovery_id: gcp.games.metagame.listCategoriesByPlayer
  calls:
  - action: metagame.listCategoriesByPlayer
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.metagame }}'
    item:
      category: '{{ item.category }}'
      experiencePoints: '{{ item.experiencePoints }}'
- discovery_id: gcp.games.players.get
  for_each: gcp.games.players.list
  calls:
  - action: players.get
    params:
      playerId: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      avatarImageUrl: '{{ response.avatarImageUrl }}'
      bannerUrlLandscape: '{{ response.bannerUrlLandscape }}'
      bannerUrlPortrait: '{{ response.bannerUrlPortrait }}'
      displayName: '{{ response.displayName }}'
      experienceInfo: '{{ response.experienceInfo }}'
      friendStatus: '{{ response.friendStatus }}'
      gamePlayerId: '{{ response.gamePlayerId }}'
      name: '{{ response.name }}'
      originalPlayerId: '{{ response.originalPlayerId }}'
      playerId: '{{ response.playerId }}'
      profileSettings: '{{ response.profileSettings }}'
      title: '{{ response.title }}'
- discovery_id: gcp.games.players.list
  calls:
  - action: players.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.players }}'
    item:
      avatarImageUrl: '{{ item.avatarImageUrl }}'
      bannerUrlLandscape: '{{ item.bannerUrlLandscape }}'
      bannerUrlPortrait: '{{ item.bannerUrlPortrait }}'
      displayName: '{{ item.displayName }}'
      experienceInfo: '{{ item.experienceInfo }}'
      friendStatus: '{{ item.friendStatus }}'
      gamePlayerId: '{{ item.gamePlayerId }}'
      name: '{{ item.name }}'
      originalPlayerId: '{{ item.originalPlayerId }}'
      playerId: '{{ item.playerId }}'
      profileSettings: '{{ item.profileSettings }}'
      title: '{{ item.title }}'
  uid_template: '{item.name}'
- discovery_id: gcp.games.recall.gamesPlayerTokens
  calls:
  - action: recall.gamesPlayerTokens
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      gamePlayerTokens: '{{ response.gamePlayerTokens }}'
- discovery_id: gcp.games.recall.lastTokenFromAllDeveloperGames
  calls:
  - action: recall.lastTokenFromAllDeveloperGames
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      gamePlayerToken: '{{ response.gamePlayerToken }}'
- discovery_id: gcp.games.recall.retrieveTokens
  calls:
  - action: recall.retrieveTokens
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      tokens: '{{ response.tokens }}'
- discovery_id: gcp.games.revisions.check
  calls:
  - action: revisions.check
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      apiVersion: '{{ response.apiVersion }}'
      revisionStatus: '{{ response.revisionStatus }}'
- discovery_id: gcp.games.scores.get
  for_each: gcp.games.players.list
  calls:
  - action: scores.get
    params:
      leaderboardId: '{{ item.name }}'
      playerId: '{{ item.name }}'
      timeSpan: '{{ item.formattedScoreRank }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      items: '{{ response.items }}'
      player: '{{ response.player }}'
- discovery_id: gcp.games.scores.list
  calls:
  - action: scores.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.scores }}'
    item:
      formattedScore: '{{ item.formattedScore }}'
      formattedScoreRank: '{{ item.formattedScoreRank }}'
      player: '{{ item.player }}'
      scoreRank: '{{ item.scoreRank }}'
      scoreTag: '{{ item.scoreTag }}'
      scoreValue: '{{ item.scoreValue }}'
      timeSpan: '{{ item.timeSpan }}'
      writeTimestampMillis: '{{ item.writeTimestampMillis }}'
- discovery_id: gcp.games.scores.listWindow
  calls:
  - action: scores.listWindow
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.scores }}'
    item:
      formattedScore: '{{ item.formattedScore }}'
      formattedScoreRank: '{{ item.formattedScoreRank }}'
      player: '{{ item.player }}'
      scoreRank: '{{ item.scoreRank }}'
      scoreTag: '{{ item.scoreTag }}'
      scoreValue: '{{ item.scoreValue }}'
      timeSpan: '{{ item.timeSpan }}'
      writeTimestampMillis: '{{ item.writeTimestampMillis }}'
- discovery_id: gcp.games.snapshots.get
  for_each: gcp.games.snapshots.list
  calls:
  - action: snapshots.get
    params:
      snapshotId: '{{ item.id }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      coverImage: '{{ response.coverImage }}'
      description: '{{ response.description }}'
      driveId: '{{ response.driveId }}'
      durationMillis: '{{ response.durationMillis }}'
      id: '{{ response.id }}'
      lastModifiedMillis: '{{ response.lastModifiedMillis }}'
      progressValue: '{{ response.progressValue }}'
      title: '{{ response.title }}'
      type: '{{ response.type }}'
      uniqueName: '{{ response.uniqueName }}'
- discovery_id: gcp.games.snapshots.list
  for_each: gcp.games.players.list
  calls:
  - action: snapshots.list
    params:
      playerId: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.snapshots }}'
    item:
      coverImage: '{{ item.coverImage }}'
      description: '{{ item.description }}'
      driveId: '{{ item.driveId }}'
      durationMillis: '{{ item.durationMillis }}'
      id: '{{ item.id }}'
      lastModifiedMillis: '{{ item.lastModifiedMillis }}'
      progressValue: '{{ item.progressValue }}'
      title: '{{ item.title }}'
      type: '{{ item.type }}'
      uniqueName: '{{ item.uniqueName }}'
