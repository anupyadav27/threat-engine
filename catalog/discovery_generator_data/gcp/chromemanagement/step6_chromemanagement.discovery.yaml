  calls:
  - action: customers.apps.countChromeAppRequests
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      requestedApps: '{{ response.requestedApps }}'
      totalSize: '{{ response.totalSize }}'
