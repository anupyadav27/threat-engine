version: '1.0'
provider: gcp
service: chromemanagement
services:
  client: chromemanagement
  module: googleapiclient.discovery.build('chromemanagement', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
