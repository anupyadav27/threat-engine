      labels: '{{ item.labels }}'
      multiStep: '{{ item.multiStep }}'
      name: '{{ item.name }}'
      outcome: '{{ item.outcome }}'
      runDuration: '{{ item.runDuration }}'
      state: '{{ item.state }}'
      stepId: '{{ item.stepId }}'
      testExecutionStep: '{{ item.testExecutionStep }}'
      toolExecutionStep: '{{ item.toolExecutionStep }}'
- discovery_id: gcp.toolresults.projects.histories.executions.steps.perfSampleSeries.get
  for_each: gcp.toolresults.projects.histories.executions.steps.perfSampleSeries.list
  calls:
  - action: projects.histories.executions.steps.perfSampleSeries.get
    params:
      executionId: '{{ item.executionId }}'
      historyId: '{{ item.name }}'
      sampleSeriesId: '{{ item.projectId }}'
      stepId: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      basicPerfSampleSeries: '{{ response.basicPerfSampleSeries }}'
      executionId: '{{ response.executionId }}'
      historyId: '{{ response.historyId }}'
      projectId: '{{ response.projectId }}'
      sampleSeriesId: '{{ response.sampleSeriesId }}'
      stepId: '{{ response.stepId }}'
- discovery_id: gcp.toolresults.projects.histories.executions.steps.perfSampleSeries.list
  for_each: gcp.toolresults.projects.histories.executions.steps.list
