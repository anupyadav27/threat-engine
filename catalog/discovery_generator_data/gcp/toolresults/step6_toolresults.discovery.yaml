    on_error: continue
  emit:
    as: item
    item:
      completionTime: '{{ response.completionTime }}'
      creationTime: '{{ response.creationTime }}'
      description: '{{ response.description }}'
      deviceUsageDuration: '{{ response.deviceUsageDuration }}'
      dimensionValue: '{{ response.dimensionValue }}'
      hasImages: '{{ response.hasImages }}'
      labels: '{{ response.labels }}'
      multiStep: '{{ response.multiStep }}'
      name: '{{ response.name }}'
      outcome: '{{ response.outcome }}'
      runDuration: '{{ response.runDuration }}'
      state: '{{ response.state }}'
      stepId: '{{ response.stepId }}'
      testExecutionStep: '{{ response.testExecutionStep }}'
      toolExecutionStep: '{{ response.toolExecutionStep }}'
