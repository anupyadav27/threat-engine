version: '1.0'
provider: gcp
service: toolresults
services:
  client: toolresults
  module: googleapiclient.discovery.build('toolresults', 'v1beta3')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.toolresults.projects.getSettings
  calls:
  - action: projects.getSettings
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      defaultBucket: '{{ response.defaultBucket }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.toolresults.projects.histories.list
  calls:
  - action: projects.histories.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.histories }}'
    item:
      displayName: '{{ item.displayName }}'
      historyId: '{{ item.historyId }}'
      name: '{{ item.name }}'
      testPlatform: '{{ item.testPlatform }}'
  uid_template: '{item.name}'
- discovery_id: gcp.toolresults.projects.histories.executions.clusters.get
  for_each: gcp.toolresults.projects.histories.executions.clusters.list
  calls:
  - action: projects.histories.executions.clusters.get
    params:
      clusterId: '{{ item.clusterId }}'
      executionId: '{{ item.executionId }}'
      historyId: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      activity: '{{ response.activity }}'
      clusterId: '{{ response.clusterId }}'
      keyScreen: '{{ response.keyScreen }}'
      screens: '{{ response.screens }}'
- discovery_id: gcp.toolresults.projects.histories.executions.clusters.list
  for_each: gcp.toolresults.projects.histories.executions.list
  calls:
  - action: projects.histories.executions.clusters.list
    params:
      executionId: '{{ item.executionId }}'
      historyId: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.clusters }}'
    item:
      activity: '{{ item.activity }}'
      clusterId: '{{ item.clusterId }}'
      keyScreen: '{{ item.keyScreen }}'
      screens: '{{ item.screens }}'
- discovery_id: gcp.toolresults.projects.histories.executions.environments.get
  for_each: gcp.toolresults.projects.histories.executions.environments.list
  calls:
  - action: projects.histories.executions.environments.get
    params:
      environmentId: '{{ item.projectId }}'
      executionId: '{{ item.executionId }}'
      historyId: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      completionTime: '{{ response.completionTime }}'
      creationTime: '{{ response.creationTime }}'
      dimensionValue: '{{ response.dimensionValue }}'
      displayName: '{{ response.displayName }}'
      environmentId: '{{ response.environmentId }}'
      environmentResult: '{{ response.environmentResult }}'
      executionId: '{{ response.executionId }}'
      historyId: '{{ response.historyId }}'
      projectId: '{{ response.projectId }}'
      resultsStorage: '{{ response.resultsStorage }}'
      shardSummaries: '{{ response.shardSummaries }}'
- discovery_id: gcp.toolresults.projects.histories.executions.environments.list
  for_each: gcp.toolresults.projects.histories.executions.list
  calls:
  - action: projects.histories.executions.environments.list
    params:
      executionId: '{{ item.executionId }}'
      historyId: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.environments }}'
    item:
      completionTime: '{{ item.completionTime }}'
      creationTime: '{{ item.creationTime }}'
      dimensionValue: '{{ item.dimensionValue }}'
      displayName: '{{ item.displayName }}'
      environmentId: '{{ item.environmentId }}'
      environmentResult: '{{ item.environmentResult }}'
      resultsStorage: '{{ item.resultsStorage }}'
      shardSummaries: '{{ item.shardSummaries }}'
- discovery_id: gcp.toolresults.projects.histories.executions.get
