  calls:
  - action: projects.histories.executions.get
    params:
      executionId: '{{ item.executionId }}'
      historyId: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      completionTime: '{{ response.completionTime }}'
      creationTime: '{{ response.creationTime }}'
      dimensionDefinitions: '{{ response.dimensionDefinitions }}'
      executionId: '{{ response.executionId }}'
      outcome: '{{ response.outcome }}'
      specification: '{{ response.specification }}'
      state: '{{ response.state }}'
      testExecutionMatrixId: '{{ response.testExecutionMatrixId }}'
- discovery_id: gcp.toolresults.projects.histories.executions.list
  for_each: gcp.toolresults.projects.histories.list
  calls:
  - action: projects.histories.executions.list
    params:
      historyId: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.executions }}'
    item:
      completionTime: '{{ item.completionTime }}'
      creationTime: '{{ item.creationTime }}'
      dimensionDefinitions: '{{ item.dimensionDefinitions }}'
      executionId: '{{ item.executionId }}'
      outcome: '{{ item.outcome }}'
      specification: '{{ item.specification }}'
      state: '{{ item.state }}'
      testExecutionMatrixId: '{{ item.testExecutionMatrixId }}'
- discovery_id: gcp.toolresults.projects.histories.executions.steps.accessibilityClusters
