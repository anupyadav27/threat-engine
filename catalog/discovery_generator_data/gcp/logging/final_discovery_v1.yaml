version: '1.0'
provider: gcp
service: logging

services:
  client: logging
  module: "googleapiclient.discovery.build('logging', 'v1')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: entries
    identifier_op: gcp.logging.entries.list
    identifier_field: entries[].apphubSource
    item_var_path: item.entries[].apphubSource
  - resource_type: metrics
    identifier_op: gcp.logging.projects.metrics.list
    identifier_field: metrics[].name
    item_var_path: item.metrics[].name
    identifier_template: '{metricName}'
  - resource_type: unknown
    identifier_op: gcp.logging.billingAccounts.locations.buckets.list
    identifier_field: buckets[].name
    item_var_path: item.buckets[].name
  - resource_type: unknown
    identifier_op: gcp.logging.sinks.list
    identifier_field: sinks[].name
    item_var_path: item.sinks[].name

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.logging.billingAccounts.locations.buckets.list ──
  - discovery_id: gcp.logging.billingAccounts.locations.buckets.list
    calls:
      - action: billingAccounts.locations.buckets.list
        params:
          parent: '{{ project_id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        analyticsConfiguration: '{{ item.analyticsConfiguration }}'
        analyticsEnabled: '{{ item.analyticsEnabled }}'
        bindings: '{{ item.bindings }}'
        cmekSettings: '{{ item.cmekSettings }}'
        createTime: '{{ item.createTime }}'
        description: '{{ item.description }}'
        indexConfigs: '{{ item.indexConfigs }}'
        lifecycleState: '{{ item.lifecycleState }}'
        location: '{{ item.location }}'
        locked: '{{ item.locked }}'
        name: '{{ item.name }}'
        restrictedFields: '{{ item.restrictedFields }}'
        retentionDays: '{{ item.retentionDays }}'
        updateTime: '{{ item.updateTime }}'

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.logging.entries.list ──
  - discovery_id: gcp.logging.entries.list
    calls:
      - action: entries.list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        apphub: '{{ item.apphub }}'
        apphubDestination: '{{ item.apphubDestination }}'
        apphubSource: '{{ item.apphubSource }}'
        errorGroups: '{{ item.errorGroups }}'
        httpRequest: '{{ item.httpRequest }}'
        insertId: '{{ item.insertId }}'
        jsonPayload: '{{ item.jsonPayload }}'
        labels: '{{ item.labels }}'
        logName: '{{ item.logName }}'
        metadata: '{{ item.metadata }}'
        operation: '{{ item.operation }}'
        protoPayload: '{{ item.protoPayload }}'
        receiveTimestamp: '{{ item.receiveTimestamp }}'
        resource: '{{ item.resource }}'
        severity: '{{ item.severity }}'
        sourceLocation: '{{ item.sourceLocation }}'
        spanId: '{{ item.spanId }}'
        split: '{{ item.split }}'
        textPayload: '{{ item.textPayload }}'
        timestamp: '{{ item.timestamp }}'
        trace: '{{ item.trace }}'
        traceSampled: '{{ item.traceSampled }}'

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.logging.projects.metrics.list ──
  - discovery_id: gcp.logging.projects.metrics.list
    calls:
      - action: projects.metrics.list
        params:
          parent: '{{ project_id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        bucketName: '{{ item.bucketName }}'
        bucketOptions: '{{ item.bucketOptions }}'
        createTime: '{{ item.createTime }}'
        description: '{{ item.description }}'
        disabled: '{{ item.disabled }}'
