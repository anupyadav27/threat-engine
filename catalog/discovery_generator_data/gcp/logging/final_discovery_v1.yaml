        labelExtractors: '{{ item.labelExtractors }}'
        metricDescriptor: '{{ item.metricDescriptor }}'
        name: '{{ item.name }}'
        resourceName: '{{ item.resourceName }}'
        updateTime: '{{ item.updateTime }}'
        valueExtractor: '{{ item.valueExtractor }}'
        version: '{{ item.version }}'

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.logging.sinks.list ──
  - discovery_id: gcp.logging.sinks.list
    calls:
      - action: sinks.list
        params:
          parent: '{{ project_id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        bigqueryOptions: '{{ item.bigqueryOptions }}'
        createTime: '{{ item.createTime }}'
        description: '{{ item.description }}'
