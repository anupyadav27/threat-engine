version: '1.0'
provider: gcp
service: containeranalysis
services:
  client: containeranalysis
  module: googleapiclient.discovery.build('containeranalysis', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.containeranalysis.projects.locations.notes.list
  calls:
  - action: projects.locations.notes.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.notes }}'
    item:
      advisoryPublishTime: '{{ item.advisoryPublishTime }}'
      attestation: '{{ item.attestation }}'
      build: '{{ item.build }}'
      compliance: '{{ item.compliance }}'
      createTime: '{{ item.createTime }}'
      deployment: '{{ item.deployment }}'
      discovery: '{{ item.discovery }}'
      dsseAttestation: '{{ item.dsseAttestation }}'
      expirationTime: '{{ item.expirationTime }}'
      image: '{{ item.image }}'
      longDescription: '{{ item.longDescription }}'
      name: '{{ item.name }}'
      package: '{{ item.package }}'
      relatedNoteNames: '{{ item.relatedNoteNames }}'
      relatedUrl: '{{ item.relatedUrl }}'
      sbomReference: '{{ item.sbomReference }}'
      secret: '{{ item.secret }}'
      shortDescription: '{{ item.shortDescription }}'
      updateTime: '{{ item.updateTime }}'
      upgrade: '{{ item.upgrade }}'
      vulnerability: '{{ item.vulnerability }}'
      vulnerabilityAssessment: '{{ item.vulnerabilityAssessment }}'
  uid_template: '{item.name}'
- discovery_id: gcp.containeranalysis.projects.locations.occurrences.getVulnerabilitySummary
  calls:
  - action: projects.locations.occurrences.getVulnerabilitySummary
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      counts: '{{ response.counts }}'
- discovery_id: gcp.containeranalysis.projects.locations.occurrences.list
