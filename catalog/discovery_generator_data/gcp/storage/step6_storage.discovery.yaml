version: '1.0'
provider: gcp
service: storage
services:
  client: storage
  module: googleapiclient.discovery.build('storage', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.storage.buckets.list
  calls:
  - action: buckets.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.buckets }}'
    item:
      acl: '{{ item.acl }}'
      autoclass: '{{ item.autoclass }}'
      billing: '{{ item.billing }}'
      cors: '{{ item.cors }}'
      customPlacementConfig: '{{ item.customPlacementConfig }}'
      defaultEventBasedHold: '{{ item.defaultEventBasedHold }}'
      defaultObjectAcl: '{{ item.defaultObjectAcl }}'
      encryption: '{{ item.encryption }}'
      generation: '{{ item.generation }}'
      hardDeleteTime: '{{ item.hardDeleteTime }}'
      hierarchicalNamespace: '{{ item.hierarchicalNamespace }}'
      iamConfiguration: '{{ item.iamConfiguration }}'
      id: '{{ item.id }}'
      ipFilter: '{{ item.ipFilter }}'
      labels: '{{ item.labels }}'
      lifecycle: '{{ item.lifecycle }}'
      location: '{{ item.location }}'
      locationType: '{{ item.locationType }}'
      logging: '{{ item.logging }}'
      metageneration: '{{ item.metageneration }}'
      name: '{{ item.name }}'
      objectRetention: '{{ item.objectRetention }}'
      owner: '{{ item.owner }}'
      projectNumber: '{{ item.projectNumber }}'
      retentionPolicy: '{{ item.retentionPolicy }}'
      rpo: '{{ item.rpo }}'
      satisfiesPZI: '{{ item.satisfiesPZI }}'
      satisfiesPZS: '{{ item.satisfiesPZS }}'
      softDeletePolicy: '{{ item.softDeletePolicy }}'
      softDeleteTime: '{{ item.softDeleteTime }}'
      storageClass: '{{ item.storageClass }}'
      timeCreated: '{{ item.timeCreated }}'
      updated: '{{ item.updated }}'
      versioning: '{{ item.versioning }}'
      website: '{{ item.website }}'
  uid_template: '{item.name}'
- discovery_id: gcp.storage.projects.hmacKeys.list
  calls:
