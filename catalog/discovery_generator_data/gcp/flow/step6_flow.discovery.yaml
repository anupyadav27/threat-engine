version: '1.0'
provider: gcp
service: flow
discovery:
- discovery_id: gcp.compute.list_firewalls
  calls:
  - action: firewalls.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      network: '{{ item.network }}'
      direction: '{{ item.direction }}'
      priority: '{{ item.priority }}'
      allowed: '{{ item.allowed }}'
      denied: '{{ item.denied }}'
      sourceRanges: '{{ item.sourceRanges }}'
      targetTags: '{{ item.targetTags }}'
      disabled: '{{ item.disabled }}'
      logConfig: '{{ item.logConfig }}'
  uid_template: '{item.name}'
- discovery_id: gcp.compute.list_instances
  calls:
  - action: instances.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      status: '{{ item.status }}'
      networkInterfaces: '{{ item.networkInterfaces }}'
      disks: '{{ item.disks }}'
      metadata: '{{ item.metadata }}'
      serviceAccounts: '{{ item.serviceAccounts }}'
      labels: '{{ item.labels }}'
      zone: '{{ item.zone }}'
      machineType: '{{ item.machineType }}'
      shieldedInstanceConfig: '{{ item.shieldedInstanceConfig }}'
  uid_template: '{item.name}'
- discovery_id: gcp.dns.list_policies
  calls:
  - action: policies.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      id: '{{ item.id }}'
      name: '{{ item.name }}'
      enableInboundForwarding: '{{ item.enableInboundForwarding }}'
      enableLogging: '{{ item.enableLogging }}'
      alternativeNameServerConfig: '{{ item.alternativeNameServerConfig }}'
      networks: '{{ item.networks }}'
      description: '{{ item.description }}'
  uid_template: '{item.name}'
- discovery_id: gcp.sql.list_instances
  calls:
  - action: instances.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      name: '{{ item.name }}'
      databaseVersion: '{{ item.databaseVersion }}'
      state: '{{ item.state }}'
      settings: '{{ item.settings }}'
      ipAddresses: '{{ item.ipAddresses }}'
      serverCaCert: '{{ item.serverCaCert }}'
      backupConfiguration: '{{ item.backupConfiguration }}'
      maintenanceWindow: '{{ item.maintenanceWindow }}'
      labels: '{{ item.labels }}'
      region: '{{ item.region }}'
  uid_template: '{item.name}'
