version: '1.0'
provider: gcp
service: secretmanager
services:
  client: secretmanager
  module: googleapiclient.discovery.build('secretmanager', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.secretmanager.projects.locations.get
  calls:
  - action: projects.locations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      displayName: '{{ response.displayName }}'
      labels: '{{ response.labels }}'
      locationId: '{{ response.locationId }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.secretmanager.projects.locations.list
  calls:
  - action: projects.locations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.locations }}'
    item:
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      locationId: '{{ item.locationId }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.secretmanager.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.secretmanager.projects.locations.secrets.list
  calls:
  - action: projects.locations.secrets.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.secrets }}'
    item:
      annotations: '{{ item.annotations }}'
      createTime: '{{ item.createTime }}'
      customerManagedEncryption: '{{ item.customerManagedEncryption }}'
      expireTime: '{{ item.expireTime }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      replication: '{{ item.replication }}'
      rotation: '{{ item.rotation }}'
      tags: '{{ item.tags }}'
      topics: '{{ item.topics }}'
      ttl: '{{ item.ttl }}'
      versionAliases: '{{ item.versionAliases }}'
      versionDestroyTtl: '{{ item.versionDestroyTtl }}'
  uid_template: '{item.name}'
- discovery_id: gcp.secretmanager.projects.locations.secrets.versions.list
  calls:
  - action: projects.locations.secrets.versions.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.versions }}'
    item:
      clientSpecifiedPayloadChecksum: '{{ item.clientSpecifiedPayloadChecksum }}'
      createTime: '{{ item.createTime }}'
      customerManagedEncryption: '{{ item.customerManagedEncryption }}'
      destroyTime: '{{ item.destroyTime }}'
      name: '{{ item.name }}'
      replicationStatus: '{{ item.replicationStatus }}'
      scheduledDestroyTime: '{{ item.scheduledDestroyTime }}'
      state: '{{ item.state }}'
  uid_template: '{item.name}'
- discovery_id: gcp.secretmanager.projects.secrets.list
  calls:
  - action: projects.secrets.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.secrets }}'
    item:
      annotations: '{{ item.annotations }}'
      createTime: '{{ item.createTime }}'
      customerManagedEncryption: '{{ item.customerManagedEncryption }}'
      expireTime: '{{ item.expireTime }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      replication: '{{ item.replication }}'
      rotation: '{{ item.rotation }}'
      tags: '{{ item.tags }}'
      topics: '{{ item.topics }}'
      ttl: '{{ item.ttl }}'
      versionAliases: '{{ item.versionAliases }}'
      versionDestroyTtl: '{{ item.versionDestroyTtl }}'
  uid_template: '{item.name}'
- discovery_id: gcp.secretmanager.projects.secrets.versions.list
  calls:
  - action: projects.secrets.versions.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.versions }}'
    item:
      clientSpecifiedPayloadChecksum: '{{ item.clientSpecifiedPayloadChecksum }}'
      createTime: '{{ item.createTime }}'
      customerManagedEncryption: '{{ item.customerManagedEncryption }}'
      destroyTime: '{{ item.destroyTime }}'
      name: '{{ item.name }}'
      replicationStatus: '{{ item.replicationStatus }}'
      scheduledDestroyTime: '{{ item.scheduledDestroyTime }}'
      state: '{{ item.state }}'
  uid_template: '{item.name}'
- discovery_id: gcp.secretmanager.projects.locations.operations.get
  for_each: gcp.secretmanager.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
- discovery_id: gcp.secretmanager.projects.locations.secrets.get
  for_each: gcp.secretmanager.projects.secrets.list
  calls:
  - action: projects.locations.secrets.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      annotations: '{{ response.annotations }}'
      createTime: '{{ response.createTime }}'
      customerManagedEncryption: '{{ response.customerManagedEncryption }}'
      expireTime: '{{ response.expireTime }}'
      labels: '{{ response.labels }}'
      name: '{{ response.name }}'
      replication: '{{ response.replication }}'
      rotation: '{{ response.rotation }}'
      tags: '{{ response.tags }}'
      topics: '{{ response.topics }}'
      ttl: '{{ response.ttl }}'
      versionAliases: '{{ response.versionAliases }}'
      versionDestroyTtl: '{{ response.versionDestroyTtl }}'
- discovery_id: gcp.secretmanager.projects.locations.secrets.getIamPolicy
  for_each: gcp.secretmanager.projects.secrets.list
  calls:
  - action: projects.locations.secrets.getIamPolicy
    params:
      resource: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      auditConfigs: '{{ response.auditConfigs }}'
      bindings: '{{ response.bindings }}'
      version: '{{ response.version }}'
- discovery_id: gcp.secretmanager.projects.locations.secrets.versions.access
  for_each: gcp.secretmanager.projects.secrets.versions.list
  calls:
  - action: projects.locations.secrets.versions.access
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      name: '{{ response.name }}'
      payload: '{{ response.payload }}'
- discovery_id: gcp.secretmanager.projects.locations.secrets.versions.get
  for_each: gcp.secretmanager.projects.secrets.versions.list
  calls:
  - action: projects.locations.secrets.versions.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      clientSpecifiedPayloadChecksum: '{{ response.clientSpecifiedPayloadChecksum
        }}'
      createTime: '{{ response.createTime }}'
      customerManagedEncryption: '{{ response.customerManagedEncryption }}'
      destroyTime: '{{ response.destroyTime }}'
      name: '{{ response.name }}'
      replicationStatus: '{{ response.replicationStatus }}'
      scheduledDestroyTime: '{{ response.scheduledDestroyTime }}'
      state: '{{ response.state }}'
- discovery_id: gcp.secretmanager.projects.secrets.get
  for_each: gcp.secretmanager.projects.secrets.list
  calls:
  - action: projects.secrets.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      annotations: '{{ response.annotations }}'
      createTime: '{{ response.createTime }}'
      customerManagedEncryption: '{{ response.customerManagedEncryption }}'
      expireTime: '{{ response.expireTime }}'
      labels: '{{ response.labels }}'
      name: '{{ response.name }}'
      replication: '{{ response.replication }}'
      rotation: '{{ response.rotation }}'
      tags: '{{ response.tags }}'
      topics: '{{ response.topics }}'
      ttl: '{{ response.ttl }}'
      versionAliases: '{{ response.versionAliases }}'
      versionDestroyTtl: '{{ response.versionDestroyTtl }}'
- discovery_id: gcp.secretmanager.projects.secrets.getIamPolicy
  for_each: gcp.secretmanager.projects.secrets.list
  calls:
  - action: projects.secrets.getIamPolicy
    params:
      resource: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      auditConfigs: '{{ response.auditConfigs }}'
      bindings: '{{ response.bindings }}'
      version: '{{ response.version }}'
- discovery_id: gcp.secretmanager.projects.secrets.versions.access
  for_each: gcp.secretmanager.projects.secrets.versions.list
  calls:
  - action: projects.secrets.versions.access
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      name: '{{ response.name }}'
      payload: '{{ response.payload }}'
- discovery_id: gcp.secretmanager.projects.secrets.versions.get
  for_each: gcp.secretmanager.projects.secrets.versions.list
  calls:
  - action: projects.secrets.versions.get
    params:
      name: '{{ item.name }}'
    save_as: response
