        }}'
      createTime: '{{ response.createTime }}'
      customerManagedEncryption: '{{ response.customerManagedEncryption }}'
      destroyTime: '{{ response.destroyTime }}'
      name: '{{ response.name }}'
      replicationStatus: '{{ response.replicationStatus }}'
      scheduledDestroyTime: '{{ response.scheduledDestroyTime }}'
