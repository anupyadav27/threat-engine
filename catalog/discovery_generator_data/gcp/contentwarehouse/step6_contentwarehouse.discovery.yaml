version: '1.0'
provider: gcp
service: contentwarehouse
services:
  client: contentwarehouse
  module: googleapiclient.discovery.build('contentwarehouse', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.contentwarehouse.projects.locations.documentSchemas.list
  calls:
  - action: projects.locations.documentSchemas.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.documentSchemas }}'
    item:
      createTime: '{{ item.createTime }}'
      description: '{{ item.description }}'
      displayName: '{{ item.displayName }}'
      documentIsFolder: '{{ item.documentIsFolder }}'
      name: '{{ item.name }}'
      propertyDefinitions: '{{ item.propertyDefinitions }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.contentwarehouse.projects.locations.documents.search
  calls:
  - action: projects.locations.documents.search
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.documents }}'
    item:
      document: '{{ item.document }}'
      matchedTokenPageIndices: '{{ item.matchedTokenPageIndices }}'
      qaResult: '{{ item.qaResult }}'
      searchTextSnippet: '{{ item.searchTextSnippet }}'
- discovery_id: gcp.contentwarehouse.projects.locations.getStatus
  calls:
  - action: projects.locations.getStatus
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      accessControlMode: '{{ response.accessControlMode }}'
      databaseType: '{{ response.databaseType }}'
      documentCreatorDefaultRole: '{{ response.documentCreatorDefaultRole }}'
      location: '{{ response.location }}'
      qaEnabled: '{{ response.qaEnabled }}'
      state: '{{ response.state }}'
- discovery_id: gcp.contentwarehouse.projects.locations.ruleSets.list
  calls:
  - action: projects.locations.ruleSets.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ruleSets }}'
    item:
      description: '{{ item.description }}'
      name: '{{ item.name }}'
      rules: '{{ item.rules }}'
      source: '{{ item.source }}'
  uid_template: '{item.name}'
- discovery_id: gcp.contentwarehouse.projects.locations.synonymSets.list
  calls:
  - action: projects.locations.synonymSets.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.synonymSets }}'
    item:
      context: '{{ item.context }}'
      name: '{{ item.name }}'
      synonyms: '{{ item.synonyms }}'
  uid_template: '{item.name}'
- discovery_id: gcp.contentwarehouse.projects.locations.documentSchemas.get
  for_each: gcp.contentwarehouse.projects.locations.documentSchemas.list
  calls:
  - action: projects.locations.documentSchemas.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      createTime: '{{ response.createTime }}'
      description: '{{ response.description }}'
      displayName: '{{ response.displayName }}'
      documentIsFolder: '{{ response.documentIsFolder }}'
      name: '{{ response.name }}'
      propertyDefinitions: '{{ response.propertyDefinitions }}'
      updateTime: '{{ response.updateTime }}'
- discovery_id: gcp.contentwarehouse.projects.locations.documents.get
  for_each: gcp.contentwarehouse.projects.locations.documents.search
  calls:
  - action: projects.locations.documents.get
    params:
      name: '{{ item.qaResult }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      cloudAiDocument: '{{ response.cloudAiDocument }}'
      contentCategory: '{{ response.contentCategory }}'
      createTime: '{{ response.createTime }}'
      creator: '{{ response.creator }}'
      displayName: '{{ response.displayName }}'
      displayUri: '{{ response.displayUri }}'
      dispositionTime: '{{ response.dispositionTime }}'
      documentSchemaName: '{{ response.documentSchemaName }}'
      inlineRawDocument: '{{ response.inlineRawDocument }}'
      legalHold: '{{ response.legalHold }}'
      name: '{{ response.name }}'
      plainText: '{{ response.plainText }}'
      properties: '{{ response.properties }}'
      rawDocumentFileType: '{{ response.rawDocumentFileType }}'
      rawDocumentPath: '{{ response.rawDocumentPath }}'
      referenceId: '{{ response.referenceId }}'
      textExtractionDisabled: '{{ response.textExtractionDisabled }}'
      textExtractionEnabled: '{{ response.textExtractionEnabled }}'
      title: '{{ response.title }}'
      updateTime: '{{ response.updateTime }}'
      updater: '{{ response.updater }}'
- discovery_id: gcp.contentwarehouse.projects.locations.documents.referenceId.get
  calls:
  - action: projects.locations.documents.referenceId.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      cloudAiDocument: '{{ response.cloudAiDocument }}'
      contentCategory: '{{ response.contentCategory }}'
      createTime: '{{ response.createTime }}'
      creator: '{{ response.creator }}'
      displayName: '{{ response.displayName }}'
      displayUri: '{{ response.displayUri }}'
      dispositionTime: '{{ response.dispositionTime }}'
      documentSchemaName: '{{ response.documentSchemaName }}'
      inlineRawDocument: '{{ response.inlineRawDocument }}'
      legalHold: '{{ response.legalHold }}'
      name: '{{ response.name }}'
      plainText: '{{ response.plainText }}'
      properties: '{{ response.properties }}'
      rawDocumentFileType: '{{ response.rawDocumentFileType }}'
      rawDocumentPath: '{{ response.rawDocumentPath }}'
      referenceId: '{{ response.referenceId }}'
      textExtractionDisabled: '{{ response.textExtractionDisabled }}'
      textExtractionEnabled: '{{ response.textExtractionEnabled }}'
      title: '{{ response.title }}'
      updateTime: '{{ response.updateTime }}'
      updater: '{{ response.updater }}'
  uid_template: '{item.name}'
- discovery_id: gcp.contentwarehouse.projects.locations.operations.get
  calls:
  - action: projects.locations.operations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.contentwarehouse.projects.locations.ruleSets.get
  for_each: gcp.contentwarehouse.projects.locations.ruleSets.list
  calls:
  - action: projects.locations.ruleSets.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      description: '{{ response.description }}'
      name: '{{ response.name }}'
      rules: '{{ response.rules }}'
      source: '{{ response.source }}'
- discovery_id: gcp.contentwarehouse.projects.locations.synonymSets.get
  for_each: gcp.contentwarehouse.projects.locations.synonymSets.list
  calls:
  - action: projects.locations.synonymSets.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      context: '{{ response.context }}'
      name: '{{ response.name }}'
      synonyms: '{{ response.synonyms }}'
