version: '1.0'
provider: gcp
service: cloudresourcemanager
services:
  client: cloudresourcemanager
  module: googleapiclient.discovery.build('cloudresourcemanager', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.cloudresourcemanager.liens.list
  calls:
  - action: liens.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.liens }}'
    item:
      createTime: '{{ item.createTime }}'
      name: '{{ item.name }}'
      origin: '{{ item.origin }}'
      parent: '{{ item.parent }}'
      reason: '{{ item.reason }}'
      restrictions: '{{ item.restrictions }}'
  uid_template: '{item.name}'
- discovery_id: gcp.cloudresourcemanager.organizations.get
  calls:
  - action: organizations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      creationTime: '{{ response.creationTime }}'
      displayName: '{{ response.displayName }}'
      lifecycleState: '{{ response.lifecycleState }}'
      name: '{{ response.name }}'
      owner: '{{ response.owner }}'
  uid_template: '{item.name}'
- discovery_id: gcp.cloudresourcemanager.organizations.search
  calls:
  - action: organizations.search
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.organizations }}'
    item:
      creationTime: '{{ item.creationTime }}'
      displayName: '{{ item.displayName }}'
      lifecycleState: '{{ item.lifecycleState }}'
      name: '{{ item.name }}'
      owner: '{{ item.owner }}'
  uid_template: '{item.name}'
- discovery_id: gcp.cloudresourcemanager.projects.get
  calls:
  - action: projects.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      configuredCapabilities: '{{ response.configuredCapabilities }}'
      createTime: '{{ response.createTime }}'
      labels: '{{ response.labels }}'
      lifecycleState: '{{ response.lifecycleState }}'
      name: '{{ response.name }}'
      parent: '{{ response.parent }}'
      projectId: '{{ response.projectId }}'
      projectNumber: '{{ response.projectNumber }}'
      tags: '{{ response.tags }}'
  uid_template: '{item.name}'
- discovery_id: gcp.cloudresourcemanager.projects.list
  calls:
  - action: projects.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.projects }}'
    item:
      configuredCapabilities: '{{ item.configuredCapabilities }}'
      createTime: '{{ item.createTime }}'
      labels: '{{ item.labels }}'
      lifecycleState: '{{ item.lifecycleState }}'
      name: '{{ item.name }}'
      parent: '{{ item.parent }}'
      projectId: '{{ item.projectId }}'
      projectNumber: '{{ item.projectNumber }}'
      tags: '{{ item.tags }}'
  uid_template: '{item.name}'
- discovery_id: gcp.cloudresourcemanager.liens.get
  for_each: gcp.cloudresourcemanager.liens.list
  calls:
  - action: liens.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      createTime: '{{ response.createTime }}'
      name: '{{ response.name }}'
      origin: '{{ response.origin }}'
      parent: '{{ response.parent }}'
      reason: '{{ response.reason }}'
      restrictions: '{{ response.restrictions }}'
- discovery_id: gcp.cloudresourcemanager.operations.get
  calls:
  - action: operations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
  uid_template: '{item.name}'
