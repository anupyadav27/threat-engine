version: '1.0'
provider: gcp
service: resourcemanager

services:
  client: cloudresourcemanager
  module: "googleapiclient.discovery.build('cloudresourcemanager', 'v1')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: unknown
    identifier_op: gcp.cloudresourcemanager.projects.list
    identifier_field: projects[].name
    item_var_path: item.projects[].name

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.cloudresourcemanager.projects.list ──
  - discovery_id: gcp.cloudresourcemanager.projects.list
    calls:
      - action: projects.list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        auditLogs: '{{ item.auditLogs }}'
        bindings: '{{ item.bindings }}'
        configManagement: '{{ item.configManagement }}'
        configuredCapabilities: '{{ item.configuredCapabilities }}'
        createTime: '{{ item.createTime }}'
        credentialPolicy: '{{ item.credentialPolicy }}'
        crossAccountKeys: '{{ item.crossAccountKeys }}'
        crossAccountTrust: '{{ item.crossAccountTrust }}'
        iamPolicy: '{{ item.iamPolicy }}'
        keyRotationPolicy: '{{ item.keyRotationPolicy }}'
        labels: '{{ item.labels }}'
        lifecycleState: '{{ item.lifecycleState }}'
        name: '{{ item.name }}'
        orgPolicies: '{{ item.orgPolicies }}'
        parent: '{{ item.parent }}'
        passwordPolicy: '{{ item.passwordPolicy }}'
        projectId: '{{ item.projectId }}'
        projectNumber: '{{ item.projectNumber }}'
        rootAccessKeys: '{{ item.rootAccessKeys }}'
        rootAccount: '{{ item.rootAccount }}'
        securitySettings: '{{ item.securitySettings }}'
        services: '{{ item.services }}'
        tagPolicies: '{{ item.tagPolicies }}'
        tags: '{{ item.tags }}'
        unusedCredentials: '{{ item.unusedCredentials }}'
        userAccessKeys: '{{ item.userAccessKeys }}'
        userCredentialPolicy: '{{ item.userCredentialPolicy }}'
        users: '{{ item.users }}'

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.cloudresourcemanager.folders.list ──
  - discovery_id: gcp.cloudresourcemanager.folders.list
    calls:
      - action: folders.list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        createTime: '{{ item.createTime }}'
        deleteTime: '{{ item.deleteTime }}'
        displayName: '{{ item.displayName }}'
        etag: '{{ item.etag }}'
        iamPolicy: '{{ item.iamPolicy }}'
        labels: '{{ item.labels }}'
        lifecycleState: '{{ item.lifecycleState }}'
        name: '{{ item.name }}'
        orgPolicies: '{{ item.orgPolicies }}'
        parent: '{{ item.parent }}'
        updateTime: '{{ item.updateTime }}'

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.cloudresourcemanager.organizations.list ──
  - discovery_id: gcp.cloudresourcemanager.organizations.list
    calls:
      - action: organizations.search
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        createTime: '{{ item.createTime }}'
        deleteTime: '{{ item.deleteTime }}'
        directoryCustomerId: '{{ item.directoryCustomerId }}'
        displayName: '{{ item.displayName }}'
        etag: '{{ item.etag }}'
        iamPolicy: '{{ item.iamPolicy }}'
        labels: '{{ item.labels }}'
        lifecycleState: '{{ item.lifecycleState }}'
        name: '{{ item.name }}'
        orgPolicies: '{{ item.orgPolicies }}'
        passwordPolicy: '{{ item.passwordPolicy }}'
        projects: '{{ item.projects }}'
        securitySettings: '{{ item.securitySettings }}'
        ssoSettings: '{{ item.ssoSettings }}'
        updateTime: '{{ item.updateTime }}'

