version: '1.0'
provider: gcp
service: dataflow
services:
  client: dataflow
  module: googleapiclient.discovery.build('dataflow', 'v1b3')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.dataflow.projects.jobs.aggregated
  calls:
  - action: projects.jobs.aggregated
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      failedLocation: '{{ response.failedLocation }}'
      jobs: '{{ response.jobs }}'
- discovery_id: gcp.dataflow.projects.jobs.list
  calls:
  - action: projects.jobs.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.jobs }}'
    item:
      clientRequestId: '{{ item.clientRequestId }}'
      createTime: '{{ item.createTime }}'
      createdFromSnapshotId: '{{ item.createdFromSnapshotId }}'
      currentState: '{{ item.currentState }}'
      currentStateTime: '{{ item.currentStateTime }}'
      environment: '{{ item.environment }}'
      executionInfo: '{{ item.executionInfo }}'
      id: '{{ item.id }}'
      jobMetadata: '{{ item.jobMetadata }}'
      labels: '{{ item.labels }}'
      location: '{{ item.location }}'
      name: '{{ item.name }}'
      pausable: '{{ item.pausable }}'
      pipelineDescription: '{{ item.pipelineDescription }}'
      projectId: '{{ item.projectId }}'
      replaceJobId: '{{ item.replaceJobId }}'
      replacedByJobId: '{{ item.replacedByJobId }}'
      requestedState: '{{ item.requestedState }}'
      runtimeUpdatableParams: '{{ item.runtimeUpdatableParams }}'
      satisfiesPzi: '{{ item.satisfiesPzi }}'
      satisfiesPzs: '{{ item.satisfiesPzs }}'
      serviceResources: '{{ item.serviceResources }}'
      stageStates: '{{ item.stageStates }}'
      startTime: '{{ item.startTime }}'
      steps: '{{ item.steps }}'
      stepsLocation: '{{ item.stepsLocation }}'
      tempFiles: '{{ item.tempFiles }}'
      transformNameMapping: '{{ item.transformNameMapping }}'
      type: '{{ item.type }}'
  uid_template: '{item.name}'
