version: '1.0'
provider: gcp
service: readerrevenuesubscriptionlinking
services:
  client: readerrevenuesubscriptionlinking
  module: googleapiclient.discovery.build('readerrevenuesubscriptionlinking', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.readerrevenuesubscriptionlinking.publications.readers.get
  calls:
  - action: publications.readers.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      createTime: '{{ response.createTime }}'
      name: '{{ response.name }}'
      originatingPublicationId: '{{ response.originatingPublicationId }}'
      ppid: '{{ response.ppid }}'
      publicationId: '{{ response.publicationId }}'
  uid_template: '{item.name}'
- discovery_id: gcp.readerrevenuesubscriptionlinking.publications.readers.getEntitlements
  calls:
  - action: publications.readers.getEntitlements
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      entitlements: '{{ response.entitlements }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
