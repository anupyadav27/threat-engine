version: '1.0'
provider: gcp
service: metastore
services:
  client: metastore
  module: googleapiclient.discovery.build('metastore', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.metastore.projects.locations.federations.list
  calls:
  - action: projects.locations.federations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.federations }}'
    item:
      backendMetastores: '{{ item.backendMetastores }}'
      createTime: '{{ item.createTime }}'
      endpointUri: '{{ item.endpointUri }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      state: '{{ item.state }}'
      stateMessage: '{{ item.stateMessage }}'
      tags: '{{ item.tags }}'
      uid: '{{ item.uid }}'
      updateTime: '{{ item.updateTime }}'
      version: '{{ item.version }}'
  uid_template: '{item.name}'
- discovery_id: gcp.metastore.projects.locations.get
  calls:
  - action: projects.locations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      displayName: '{{ response.displayName }}'
      labels: '{{ response.labels }}'
      locationId: '{{ response.locationId }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.metastore.projects.locations.list
  calls:
  - action: projects.locations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.locations }}'
    item:
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      locationId: '{{ item.locationId }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.metastore.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.metastore.projects.locations.services.backups.list
  calls:
  - action: projects.locations.services.backups.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.backups }}'
    item:
      createTime: '{{ item.createTime }}'
      description: '{{ item.description }}'
      endTime: '{{ item.endTime }}'
      name: '{{ item.name }}'
      restoringServices: '{{ item.restoringServices }}'
      serviceRevision: '{{ item.serviceRevision }}'
      state: '{{ item.state }}'
  uid_template: '{item.name}'
- discovery_id: gcp.metastore.projects.locations.services.list
  calls:
  - action: projects.locations.services.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.services }}'
    item:
      artifactGcsUri: '{{ item.artifactGcsUri }}'
      createTime: '{{ item.createTime }}'
      databaseType: '{{ item.databaseType }}'
      deletionProtection: '{{ item.deletionProtection }}'
      encryptionConfig: '{{ item.encryptionConfig }}'
      endpointUri: '{{ item.endpointUri }}'
      hiveMetastoreConfig: '{{ item.hiveMetastoreConfig }}'
      labels: '{{ item.labels }}'
      maintenanceWindow: '{{ item.maintenanceWindow }}'
      metadataIntegration: '{{ item.metadataIntegration }}'
      metadataManagementActivity: '{{ item.metadataManagementActivity }}'
      name: '{{ item.name }}'
      network: '{{ item.network }}'
      networkConfig: '{{ item.networkConfig }}'
      port: '{{ item.port }}'
      releaseChannel: '{{ item.releaseChannel }}'
      scalingConfig: '{{ item.scalingConfig }}'
      scheduledBackup: '{{ item.scheduledBackup }}'
      state: '{{ item.state }}'
      stateMessage: '{{ item.stateMessage }}'
      tags: '{{ item.tags }}'
      telemetryConfig: '{{ item.telemetryConfig }}'
      tier: '{{ item.tier }}'
      uid: '{{ item.uid }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.metastore.projects.locations.services.metadataImports.list
