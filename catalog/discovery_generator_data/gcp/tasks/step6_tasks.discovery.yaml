version: '1.0'
provider: gcp
service: tasks
services:
  client: tasks
  module: googleapiclient.discovery.build('tasks', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.tasks.tasklists.list
  calls:
  - action: tasklists.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.tasklists }}'
    item:
      id: '{{ item.id }}'
      title: '{{ item.title }}'
      updated: '{{ item.updated }}'
  uid_template: '{item.id}'
- discovery_id: gcp.tasks.tasklists.get
  for_each: gcp.tasks.tasklists.list
  calls:
  - action: tasklists.get
    params:
      tasklist: '{{ item.selfLink }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ response.id }}'
      title: '{{ response.title }}'
      updated: '{{ response.updated }}'
- discovery_id: gcp.tasks.tasks.get
  for_each: gcp.tasks.tasks.list
  calls:
  - action: tasks.get
    params:
      task: '{{ item.selfLink }}'
      tasklist: '{{ item.selfLink }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      assignmentInfo: '{{ response.assignmentInfo }}'
      completed: '{{ response.completed }}'
      deleted: '{{ response.deleted }}'
      due: '{{ response.due }}'
      hidden: '{{ response.hidden }}'
      id: '{{ response.id }}'
      links: '{{ response.links }}'
      notes: '{{ response.notes }}'
      parent: '{{ response.parent }}'
      position: '{{ response.position }}'
      status: '{{ response.status }}'
      title: '{{ response.title }}'
      updated: '{{ response.updated }}'
      webViewLink: '{{ response.webViewLink }}'
- discovery_id: gcp.tasks.tasks.list
  for_each: gcp.tasks.tasklists.list
  calls:
  - action: tasks.list
    params:
      tasklist: '{{ item.selfLink }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.tasks }}'
    item:
      assignmentInfo: '{{ item.assignmentInfo }}'
      completed: '{{ item.completed }}'
      deleted: '{{ item.deleted }}'
      due: '{{ item.due }}'
      hidden: '{{ item.hidden }}'
      id: '{{ item.id }}'
      links: '{{ item.links }}'
      notes: '{{ item.notes }}'
      parent: '{{ item.parent }}'
      position: '{{ item.position }}'
      status: '{{ item.status }}'
      title: '{{ item.title }}'
      updated: '{{ item.updated }}'
      webViewLink: '{{ item.webViewLink }}'
