version: '1.0'
provider: gcp
service: firebaseappdistribution
services:
  client: firebaseappdistribution
  module: googleapiclient.discovery.build('firebaseappdistribution', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.firebaseappdistribution.projects.apps.releases.feedbackReports.list
  calls:
  - action: projects.apps.releases.feedbackReports.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.feedbackReports }}'
    item:
      createTime: '{{ item.createTime }}'
      firebaseConsoleUri: '{{ item.firebaseConsoleUri }}'
      name: '{{ item.name }}'
      screenshotUri: '{{ item.screenshotUri }}'
      tester: '{{ item.tester }}'
      text: '{{ item.text }}'
  uid_template: '{item.name}'
- discovery_id: gcp.firebaseappdistribution.projects.apps.releases.list
  calls:
  - action: projects.apps.releases.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.releases }}'
    item:
      binaryDownloadUri: '{{ item.binaryDownloadUri }}'
      buildVersion: '{{ item.buildVersion }}'
      createTime: '{{ item.createTime }}'
      displayVersion: '{{ item.displayVersion }}'
      expireTime: '{{ item.expireTime }}'
      firebaseConsoleUri: '{{ item.firebaseConsoleUri }}'
      name: '{{ item.name }}'
      releaseNotes: '{{ item.releaseNotes }}'
      testingUri: '{{ item.testingUri }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.firebaseappdistribution.projects.groups.list
  calls:
  - action: projects.groups.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.groups }}'
    item:
      displayName: '{{ item.displayName }}'
      inviteLinkCount: '{{ item.inviteLinkCount }}'
      name: '{{ item.name }}'
      releaseCount: '{{ item.releaseCount }}'
      testerCount: '{{ item.testerCount }}'
  uid_template: '{item.name}'
- discovery_id: gcp.firebaseappdistribution.projects.testers.list
  calls:
  - action: projects.testers.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.testers }}'
    item:
      displayName: '{{ item.displayName }}'
      groups: '{{ item.groups }}'
      lastActivityTime: '{{ item.lastActivityTime }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.firebaseappdistribution.projects.apps.getAabInfo
  calls:
  - action: projects.apps.getAabInfo
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      integrationState: '{{ response.integrationState }}'
      name: '{{ response.name }}'
      testCertificate: '{{ response.testCertificate }}'
  uid_template: '{item.name}'
- discovery_id: gcp.firebaseappdistribution.projects.apps.releases.feedbackReports.get
  for_each: gcp.firebaseappdistribution.projects.apps.releases.feedbackReports.list
  calls:
  - action: projects.apps.releases.feedbackReports.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      createTime: '{{ response.createTime }}'
      firebaseConsoleUri: '{{ response.firebaseConsoleUri }}'
      name: '{{ response.name }}'
      screenshotUri: '{{ response.screenshotUri }}'
      tester: '{{ response.tester }}'
      text: '{{ response.text }}'
- discovery_id: gcp.firebaseappdistribution.projects.apps.releases.get
  for_each: gcp.firebaseappdistribution.projects.apps.releases.list
  calls:
  - action: projects.apps.releases.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      binaryDownloadUri: '{{ response.binaryDownloadUri }}'
      buildVersion: '{{ response.buildVersion }}'
      createTime: '{{ response.createTime }}'
      displayVersion: '{{ response.displayVersion }}'
      expireTime: '{{ response.expireTime }}'
      firebaseConsoleUri: '{{ response.firebaseConsoleUri }}'
      name: '{{ response.name }}'
      releaseNotes: '{{ response.releaseNotes }}'
      testingUri: '{{ response.testingUri }}'
      updateTime: '{{ response.updateTime }}'
- discovery_id: gcp.firebaseappdistribution.projects.apps.releases.operations.get
  for_each: gcp.firebaseappdistribution.projects.apps.releases.operations.list
  calls:
  - action: projects.apps.releases.operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
- discovery_id: gcp.firebaseappdistribution.projects.apps.releases.operations.list
  for_each: gcp.firebaseappdistribution.projects.apps.releases.list
  calls:
  - action: projects.apps.releases.operations.list
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
- discovery_id: gcp.firebaseappdistribution.projects.groups.get
  for_each: gcp.firebaseappdistribution.projects.groups.list
  calls:
  - action: projects.groups.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      displayName: '{{ response.displayName }}'
      inviteLinkCount: '{{ response.inviteLinkCount }}'
      name: '{{ response.name }}'
      releaseCount: '{{ response.releaseCount }}'
      testerCount: '{{ response.testerCount }}'
