    item:
      alternateEmail: '{{ item.alternateEmail }}'
      channelPartnerId: '{{ item.channelPartnerId }}'
      cloudIdentityId: '{{ item.cloudIdentityId }}'
      cloudIdentityInfo: '{{ item.cloudIdentityInfo }}'
      correlationId: '{{ item.correlationId }}'
      createTime: '{{ item.createTime }}'
      customerAttestationState: '{{ item.customerAttestationState }}'
