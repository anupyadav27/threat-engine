version: '1.0'
provider: gcp
service: cloudchannel
services:
  client: cloudchannel
  module: googleapiclient.discovery.build('cloudchannel', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.cloudchannel.accounts.channelPartnerLinks.channelPartnerRepricingConfigs.list
  calls:
  - action: accounts.channelPartnerLinks.channelPartnerRepricingConfigs.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.channelPartnerRepricingConfigs }}'
    item:
      name: '{{ item.name }}'
      repricingConfig: '{{ item.repricingConfig }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.cloudchannel.accounts.channelPartnerLinks.customers.list
  calls:
