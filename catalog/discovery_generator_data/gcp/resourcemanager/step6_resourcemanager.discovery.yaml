      auditConfigs: '{{ item.auditConfigs }}'
- discovery_id: gcp.resourcemanager.list_folders
  calls:
  - action: folders.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      name: '{{ item.name }}'
      displayName: '{{ item.displayName }}'
      lifecycleState: '{{ item.lifecycleState }}'
      parent: '{{ item.parent }}'
      createTime: '{{ item.createTime }}'
      updateTime: '{{ item.updateTime }}'
