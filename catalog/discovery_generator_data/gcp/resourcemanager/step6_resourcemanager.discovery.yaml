version: '1.0'
provider: gcp
service: resourcemanager
discovery:
- discovery_id: gcp.resourcemanager.get_organization_iam_policy
  calls:
  - action: organizations.getIamPolicy
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      bindings: '{{ item.bindings }}'
      etag: '{{ item.etag }}'
      version: '{{ item.version }}'
      auditConfigs: '{{ item.auditConfigs }}'
- discovery_id: gcp.resourcemanager.get_organization_password_policy
  calls:
  - action: organizations.getIamPolicy
    save_as: response
