version: '1.0'
provider: gcp
service: securityposture
services:
  client: securityposture
  module: googleapiclient.discovery.build('securityposture', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.securityposture.organizations.locations.operations.list
  calls:
  - action: organizations.locations.operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.securityposture.organizations.locations.postureDeployments.list
  calls:
  - action: organizations.locations.postureDeployments.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.postureDeployments }}'
    item:
      annotations: '{{ item.annotations }}'
      categories: '{{ item.categories }}'
      createTime: '{{ item.createTime }}'
      description: '{{ item.description }}'
      desiredPostureId: '{{ item.desiredPostureId }}'
      desiredPostureRevisionId: '{{ item.desiredPostureRevisionId }}'
      failureMessage: '{{ item.failureMessage }}'
      name: '{{ item.name }}'
      postureId: '{{ item.postureId }}'
      postureRevisionId: '{{ item.postureRevisionId }}'
      reconciling: '{{ item.reconciling }}'
      state: '{{ item.state }}'
      targetResource: '{{ item.targetResource }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.securityposture.organizations.locations.postureTemplates.list
  calls:
  - action: organizations.locations.postureTemplates.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.postureTemplates }}'
    item:
      categories: '{{ item.categories }}'
      description: '{{ item.description }}'
      name: '{{ item.name }}'
      policySets: '{{ item.policySets }}'
      revisionId: '{{ item.revisionId }}'
      state: '{{ item.state }}'
  uid_template: '{item.name}'
- discovery_id: gcp.securityposture.organizations.locations.postures.list
  calls:
  - action: organizations.locations.postures.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.postures }}'
    item:
      annotations: '{{ item.annotations }}'
      categories: '{{ item.categories }}'
      createTime: '{{ item.createTime }}'
      description: '{{ item.description }}'
      name: '{{ item.name }}'
      policySets: '{{ item.policySets }}'
      reconciling: '{{ item.reconciling }}'
      revisionId: '{{ item.revisionId }}'
      state: '{{ item.state }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.securityposture.organizations.locations.reports.list
  calls:
  - action: organizations.locations.reports.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.reports }}'
    item:
      createTime: '{{ item.createTime }}'
      iacValidationReport: '{{ item.iacValidationReport }}'
      name: '{{ item.name }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.securityposture.projects.locations.get
  calls:
  - action: projects.locations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      displayName: '{{ response.displayName }}'
      labels: '{{ response.labels }}'
      locationId: '{{ response.locationId }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.securityposture.projects.locations.list
  calls:
  - action: projects.locations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.locations }}'
    item:
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      locationId: '{{ item.locationId }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.securityposture.organizations.locations.operations.get
  for_each: gcp.securityposture.organizations.locations.operations.list
  calls:
  - action: organizations.locations.operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
