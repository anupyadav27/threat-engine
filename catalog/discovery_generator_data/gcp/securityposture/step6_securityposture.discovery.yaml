  emit:
    as: item
    item:
      categories: '{{ response.categories }}'
      description: '{{ response.description }}'
      name: '{{ response.name }}'
      policySets: '{{ response.policySets }}'
      revisionId: '{{ response.revisionId }}'
      state: '{{ response.state }}'
- discovery_id: gcp.securityposture.organizations.locations.postures.get
  for_each: gcp.securityposture.organizations.locations.postures.list
  calls:
  - action: organizations.locations.postures.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      annotations: '{{ response.annotations }}'
