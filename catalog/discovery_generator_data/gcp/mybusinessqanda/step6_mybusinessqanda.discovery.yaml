version: '1.0'
provider: gcp
service: mybusinessqanda
services:
  client: mybusinessqanda
  module: googleapiclient.discovery.build('mybusinessqanda', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.mybusinessqanda.locations.questions.answers.list
  calls:
  - action: locations.questions.answers.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.answers }}'
    item:
      author: '{{ item.author }}'
      createTime: '{{ item.createTime }}'
      name: '{{ item.name }}'
      text: '{{ item.text }}'
      updateTime: '{{ item.updateTime }}'
      upvoteCount: '{{ item.upvoteCount }}'
  uid_template: '{item.name}'
- discovery_id: gcp.mybusinessqanda.locations.questions.list
  calls:
  - action: locations.questions.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.questions }}'
    item:
      author: '{{ item.author }}'
      createTime: '{{ item.createTime }}'
      name: '{{ item.name }}'
      text: '{{ item.text }}'
      topAnswers: '{{ item.topAnswers }}'
      totalAnswerCount: '{{ item.totalAnswerCount }}'
      updateTime: '{{ item.updateTime }}'
      upvoteCount: '{{ item.upvoteCount }}'
  uid_template: '{item.name}'
