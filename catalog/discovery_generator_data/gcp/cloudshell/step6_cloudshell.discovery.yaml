version: '1.0'
provider: gcp
service: cloudshell
services:
  client: cloudshell
  module: googleapiclient.discovery.build('cloudshell', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.cloudshell.operations.get
  for_each: gcp.cloudshell.operations.list
  calls:
  - action: operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
- discovery_id: gcp.cloudshell.operations.list
  calls:
  - action: operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.cloudshell.users.environments.generateAccessToken
  calls:
  - action: users.environments.generateAccessToken
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      accessToken: '{{ response.accessToken }}'
- discovery_id: gcp.cloudshell.users.environments.get
  calls:
  - action: users.environments.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      dockerImage: '{{ response.dockerImage }}'
      id: '{{ response.id }}'
      name: '{{ response.name }}'
      publicKeys: '{{ response.publicKeys }}'
      sshHost: '{{ response.sshHost }}'
      sshPort: '{{ response.sshPort }}'
      sshUsername: '{{ response.sshUsername }}'
      state: '{{ response.state }}'
      webHost: '{{ response.webHost }}'
  uid_template: '{item.name}'
