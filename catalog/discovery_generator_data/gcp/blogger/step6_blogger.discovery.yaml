version: '1.0'
provider: gcp
service: blogger
services:
  client: blogger
  module: googleapiclient.discovery.build('blogger', 'v3')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.blogger.blogUserInfos.get
  for_each: gcp.blogger.postUserInfos.list
  calls:
  - action: blogUserInfos.get
    params:
      blogId: '{{ item.name }}'
      userId: '{{ item.kind }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      blog: '{{ response.blog }}'
      blog_user_info: '{{ response.blog_user_info }}'
- discovery_id: gcp.blogger.blogs.get
  for_each: gcp.blogger.blogs.listByUser
  calls:
  - action: blogs.get
    params:
      blogId: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      customMetaData: '{{ response.customMetaData }}'
      description: '{{ response.description }}'
      id: '{{ response.id }}'
      locale: '{{ response.locale }}'
      name: '{{ response.name }}'
      pages: '{{ response.pages }}'
      posts: '{{ response.posts }}'
      published: '{{ response.published }}'
      status: '{{ response.status }}'
      updated: '{{ response.updated }}'
      url: '{{ response.url }}'
- discovery_id: gcp.blogger.blogs.getByUrl
  for_each: gcp.blogger.pages.list
  calls:
  - action: blogs.getByUrl
    params:
      url: '{{ item.selfLink }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      customMetaData: '{{ response.customMetaData }}'
      description: '{{ response.description }}'
      id: '{{ response.id }}'
      locale: '{{ response.locale }}'
      name: '{{ response.name }}'
      pages: '{{ response.pages }}'
      posts: '{{ response.posts }}'
      published: '{{ response.published }}'
      status: '{{ response.status }}'
      updated: '{{ response.updated }}'
      url: '{{ response.url }}'
- discovery_id: gcp.blogger.blogs.listByUser
  for_each: gcp.blogger.postUserInfos.list
  calls:
  - action: blogs.listByUser
    params:
      userId: '{{ item.kind }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.blogs }}'
    item:
      customMetaData: '{{ item.customMetaData }}'
      description: '{{ item.description }}'
      id: '{{ item.id }}'
      locale: '{{ item.locale }}'
      name: '{{ item.name }}'
      pages: '{{ item.pages }}'
      posts: '{{ item.posts }}'
      published: '{{ item.published }}'
      status: '{{ item.status }}'
      updated: '{{ item.updated }}'
      url: '{{ item.url }}'
- discovery_id: gcp.blogger.comments.get
  for_each: gcp.blogger.comments.list
  calls:
  - action: comments.get
    params:
      blogId: '{{ item.name }}'
      commentId: '{{ item.selfLink }}'
      postId: '{{ item.selfLink }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      author: '{{ response.author }}'
      blog: '{{ response.blog }}'
      content: '{{ response.content }}'
      id: '{{ response.id }}'
      inReplyTo: '{{ response.inReplyTo }}'
      post: '{{ response.post }}'
      published: '{{ response.published }}'
      status: '{{ response.status }}'
      updated: '{{ response.updated }}'
- discovery_id: gcp.blogger.comments.list
  for_each: gcp.blogger.posts.list
  calls:
  - action: comments.list
    params:
      blogId: '{{ item.name }}'
      postId: '{{ item.selfLink }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.comments }}'
    item:
      author: '{{ item.author }}'
      blog: '{{ item.blog }}'
      content: '{{ item.content }}'
      id: '{{ item.id }}'
      inReplyTo: '{{ item.inReplyTo }}'
      post: '{{ item.post }}'
      published: '{{ item.published }}'
      status: '{{ item.status }}'
      updated: '{{ item.updated }}'
- discovery_id: gcp.blogger.comments.listByBlog
  for_each: gcp.blogger.blogs.listByUser
  calls:
  - action: comments.listByBlog
    params:
      blogId: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.comments }}'
    item:
      author: '{{ item.author }}'
      blog: '{{ item.blog }}'
      content: '{{ item.content }}'
      id: '{{ item.id }}'
      inReplyTo: '{{ item.inReplyTo }}'
      post: '{{ item.post }}'
      published: '{{ item.published }}'
      status: '{{ item.status }}'
      updated: '{{ item.updated }}'
- discovery_id: gcp.blogger.pageViews.get
  for_each: gcp.blogger.blogs.listByUser
  calls:
  - action: pageViews.get
    params:
      blogId: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      blogId: '{{ response.blogId }}'
      counts: '{{ response.counts }}'
- discovery_id: gcp.blogger.pages.get
  for_each: gcp.blogger.pages.list
  calls:
  - action: pages.get
    params:
      blogId: '{{ item.name }}'
      pageId: '{{ item.selfLink }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      author: '{{ response.author }}'
      blog: '{{ response.blog }}'
      content: '{{ response.content }}'
      id: '{{ response.id }}'
      published: '{{ response.published }}'
      status: '{{ response.status }}'
      title: '{{ response.title }}'
      trashed: '{{ response.trashed }}'
      updated: '{{ response.updated }}'
      url: '{{ response.url }}'
- discovery_id: gcp.blogger.pages.list
  for_each: gcp.blogger.blogs.listByUser
  calls:
  - action: pages.list
    params:
      blogId: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.pages }}'
    item:
      author: '{{ item.author }}'
      blog: '{{ item.blog }}'
      content: '{{ item.content }}'
      id: '{{ item.id }}'
      published: '{{ item.published }}'
      status: '{{ item.status }}'
      title: '{{ item.title }}'
      trashed: '{{ item.trashed }}'
      updated: '{{ item.updated }}'
      url: '{{ item.url }}'
- discovery_id: gcp.blogger.postUserInfos.get
  for_each: gcp.blogger.posts.list
  calls:
  - action: postUserInfos.get
    params:
      blogId: '{{ item.name }}'
      postId: '{{ item.selfLink }}'
      userId: '{{ item.kind }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      post: '{{ response.post }}'
      post_user_info: '{{ response.post_user_info }}'
- discovery_id: gcp.blogger.postUserInfos.list
  calls:
  - action: postUserInfos.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.postUserInfos }}'
    item:
      post: '{{ item.post }}'
      post_user_info: '{{ item.post_user_info }}'
- discovery_id: gcp.blogger.posts.get
  for_each: gcp.blogger.posts.list
  calls:
  - action: posts.get
    params:
      blogId: '{{ item.name }}'
      postId: '{{ item.selfLink }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      author: '{{ response.author }}'
      blog: '{{ response.blog }}'
      content: '{{ response.content }}'
      customMetaData: '{{ response.customMetaData }}'
      id: '{{ response.id }}'
      images: '{{ response.images }}'
      labels: '{{ response.labels }}'
      location: '{{ response.location }}'
      published: '{{ response.published }}'
      readerComments: '{{ response.readerComments }}'
      replies: '{{ response.replies }}'
      status: '{{ response.status }}'
      title: '{{ response.title }}'
      titleLink: '{{ response.titleLink }}'
      trashed: '{{ response.trashed }}'
      updated: '{{ response.updated }}'
      url: '{{ response.url }}'
- discovery_id: gcp.blogger.posts.getByPath
  calls:
  - action: posts.getByPath
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      author: '{{ response.author }}'
      blog: '{{ response.blog }}'
      content: '{{ response.content }}'
      customMetaData: '{{ response.customMetaData }}'
      id: '{{ response.id }}'
      images: '{{ response.images }}'
      labels: '{{ response.labels }}'
      location: '{{ response.location }}'
      published: '{{ response.published }}'
      readerComments: '{{ response.readerComments }}'
      replies: '{{ response.replies }}'
      status: '{{ response.status }}'
      title: '{{ response.title }}'
      titleLink: '{{ response.titleLink }}'
      trashed: '{{ response.trashed }}'
      updated: '{{ response.updated }}'
      url: '{{ response.url }}'
  uid_template: '{item.id}'
- discovery_id: gcp.blogger.posts.list
  for_each: gcp.blogger.blogs.listByUser
  calls:
  - action: posts.list
    params:
      blogId: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.posts }}'
    item:
      author: '{{ item.author }}'
      blog: '{{ item.blog }}'
      content: '{{ item.content }}'
      customMetaData: '{{ item.customMetaData }}'
      id: '{{ item.id }}'
      images: '{{ item.images }}'
      labels: '{{ item.labels }}'
      location: '{{ item.location }}'
      published: '{{ item.published }}'
      readerComments: '{{ item.readerComments }}'
      replies: '{{ item.replies }}'
      status: '{{ item.status }}'
      title: '{{ item.title }}'
      titleLink: '{{ item.titleLink }}'
      trashed: '{{ item.trashed }}'
      updated: '{{ item.updated }}'
      url: '{{ item.url }}'
- discovery_id: gcp.blogger.posts.search
  calls:
  - action: posts.search
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.posts }}'
    item:
      author: '{{ item.author }}'
      blog: '{{ item.blog }}'
      content: '{{ item.content }}'
      customMetaData: '{{ item.customMetaData }}'
      id: '{{ item.id }}'
      images: '{{ item.images }}'
      labels: '{{ item.labels }}'
      location: '{{ item.location }}'
      published: '{{ item.published }}'
      readerComments: '{{ item.readerComments }}'
      replies: '{{ item.replies }}'
      status: '{{ item.status }}'
      title: '{{ item.title }}'
      titleLink: '{{ item.titleLink }}'
      trashed: '{{ item.trashed }}'
      updated: '{{ item.updated }}'
      url: '{{ item.url }}'
  uid_template: '{item.id}'
- discovery_id: gcp.blogger.users.get
  for_each: gcp.blogger.postUserInfos.list
  calls:
  - action: users.get
    params:
      userId: '{{ item.kind }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      about: '{{ response.about }}'
      blogs: '{{ response.blogs }}'
      created: '{{ response.created }}'
      displayName: '{{ response.displayName }}'
      id: '{{ response.id }}'
      locale: '{{ response.locale }}'
      url: '{{ response.url }}'
