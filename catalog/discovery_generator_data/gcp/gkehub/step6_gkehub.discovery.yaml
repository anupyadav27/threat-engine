version: '1.0'
provider: gcp
service: gkehub
services:
  client: gkehub
  module: googleapiclient.discovery.build('gkehub', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.gkehub.organizations.locations.fleets.list
  calls:
  - action: organizations.locations.fleets.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.fleets }}'
    item:
      createTime: '{{ item.createTime }}'
      defaultClusterConfig: '{{ item.defaultClusterConfig }}'
      deleteTime: '{{ item.deleteTime }}'
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      state: '{{ item.state }}'
      uid: '{{ item.uid }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.gkehub.projects.locations.features.list
