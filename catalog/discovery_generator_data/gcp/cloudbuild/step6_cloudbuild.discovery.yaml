version: '1.0'
provider: gcp
service: cloudbuild
services:
  client: cloudbuild
  module: googleapiclient.discovery.build('cloudbuild', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.cloudbuild.projects.builds.list
  calls:
  - action: projects.builds.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.builds }}'
    item:
      approval: '{{ item.approval }}'
      artifacts: '{{ item.artifacts }}'
      availableSecrets: '{{ item.availableSecrets }}'
      buildTriggerId: '{{ item.buildTriggerId }}'
      createTime: '{{ item.createTime }}'
      dependencies: '{{ item.dependencies }}'
      failureInfo: '{{ item.failureInfo }}'
      finishTime: '{{ item.finishTime }}'
      gitConfig: '{{ item.gitConfig }}'
      id: '{{ item.id }}'
      images: '{{ item.images }}'
      logUrl: '{{ item.logUrl }}'
      logsBucket: '{{ item.logsBucket }}'
      name: '{{ item.name }}'
      options: '{{ item.options }}'
      projectId: '{{ item.projectId }}'
      queueTtl: '{{ item.queueTtl }}'
      results: '{{ item.results }}'
      secrets: '{{ item.secrets }}'
      serviceAccount: '{{ item.serviceAccount }}'
      source: '{{ item.source }}'
      sourceProvenance: '{{ item.sourceProvenance }}'
      startTime: '{{ item.startTime }}'
