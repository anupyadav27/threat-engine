version: '1.0'
provider: gcp
service: firebase
services:
  client: firebase
  module: googleapiclient.discovery.build('firebase', 'v1beta1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.firebase.availableProjects.list
  calls:
  - action: availableProjects.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.availableProjects }}'
    item:
      displayName: '{{ item.displayName }}'
      locationId: '{{ item.locationId }}'
      project: '{{ item.project }}'
- discovery_id: gcp.firebase.projects.androidApps.list
  calls:
  - action: projects.androidApps.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.androidApps }}'
    item:
      apiKeyId: '{{ item.apiKeyId }}'
      appId: '{{ item.appId }}'
      displayName: '{{ item.displayName }}'
      expireTime: '{{ item.expireTime }}'
      name: '{{ item.name }}'
      packageName: '{{ item.packageName }}'
      projectId: '{{ item.projectId }}'
      sha1Hashes: '{{ item.sha1Hashes }}'
      sha256Hashes: '{{ item.sha256Hashes }}'
      state: '{{ item.state }}'
  uid_template: '{item.name}'
- discovery_id: gcp.firebase.projects.androidApps.sha.list
  calls:
  - action: projects.androidApps.sha.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.sha }}'
    item:
      certType: '{{ item.certType }}'
      name: '{{ item.name }}'
      shaHash: '{{ item.shaHash }}'
  uid_template: '{item.name}'
- discovery_id: gcp.firebase.projects.availableLocations.list
  calls:
  - action: projects.availableLocations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.availableLocations }}'
    item:
      features: '{{ item.features }}'
      locationId: '{{ item.locationId }}'
      type: '{{ item.type }}'
- discovery_id: gcp.firebase.projects.get
  calls:
  - action: projects.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      annotations: '{{ response.annotations }}'
      displayName: '{{ response.displayName }}'
      name: '{{ response.name }}'
      projectId: '{{ response.projectId }}'
      projectNumber: '{{ response.projectNumber }}'
      resources: '{{ response.resources }}'
      state: '{{ response.state }}'
  uid_template: '{item.name}'
- discovery_id: gcp.firebase.projects.getAdminSdkConfig
  calls:
  - action: projects.getAdminSdkConfig
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      databaseURL: '{{ response.databaseURL }}'
      locationId: '{{ response.locationId }}'
      projectId: '{{ response.projectId }}'
      storageBucket: '{{ response.storageBucket }}'
- discovery_id: gcp.firebase.projects.getAnalyticsDetails
  calls:
  - action: projects.getAnalyticsDetails
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      analyticsProperty: '{{ response.analyticsProperty }}'
      streamMappings: '{{ response.streamMappings }}'
- discovery_id: gcp.firebase.projects.iosApps.list
  calls:
  - action: projects.iosApps.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.iosApps }}'
    item:
      apiKeyId: '{{ item.apiKeyId }}'
      appId: '{{ item.appId }}'
      appStoreId: '{{ item.appStoreId }}'
      bundleId: '{{ item.bundleId }}'
      displayName: '{{ item.displayName }}'
      expireTime: '{{ item.expireTime }}'
      name: '{{ item.name }}'
      projectId: '{{ item.projectId }}'
      state: '{{ item.state }}'
      teamId: '{{ item.teamId }}'
  uid_template: '{item.name}'
- discovery_id: gcp.firebase.projects.list
  calls:
  - action: projects.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.projects }}'
    item:
      annotations: '{{ item.annotations }}'
      displayName: '{{ item.displayName }}'
      name: '{{ item.name }}'
      projectId: '{{ item.projectId }}'
      projectNumber: '{{ item.projectNumber }}'
      resources: '{{ item.resources }}'
      state: '{{ item.state }}'
  uid_template: '{item.name}'
- discovery_id: gcp.firebase.projects.searchApps
  calls:
  - action: projects.searchApps
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      apps: '{{ response.apps }}'
- discovery_id: gcp.firebase.projects.webApps.list
  calls:
  - action: projects.webApps.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.webApps }}'
    item:
      apiKeyId: '{{ item.apiKeyId }}'
      appId: '{{ item.appId }}'
      appUrls: '{{ item.appUrls }}'
      displayName: '{{ item.displayName }}'
      expireTime: '{{ item.expireTime }}'
      name: '{{ item.name }}'
      projectId: '{{ item.projectId }}'
      state: '{{ item.state }}'
      webId: '{{ item.webId }}'
  uid_template: '{item.name}'
- discovery_id: gcp.firebase.operations.get
  calls:
  - action: operations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.firebase.projects.androidApps.get
  for_each: gcp.firebase.projects.androidApps.list
  calls:
  - action: projects.androidApps.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      apiKeyId: '{{ response.apiKeyId }}'
      appId: '{{ response.appId }}'
      displayName: '{{ response.displayName }}'
      expireTime: '{{ response.expireTime }}'
      name: '{{ response.name }}'
      packageName: '{{ response.packageName }}'
      projectId: '{{ response.projectId }}'
      sha1Hashes: '{{ response.sha1Hashes }}'
      sha256Hashes: '{{ response.sha256Hashes }}'
      state: '{{ response.state }}'
- discovery_id: gcp.firebase.projects.androidApps.getConfig
  for_each: gcp.firebase.projects.androidApps.list
  calls:
  - action: projects.androidApps.getConfig
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      configFileContents: '{{ response.configFileContents }}'
      configFilename: '{{ response.configFilename }}'
- discovery_id: gcp.firebase.projects.iosApps.get
  for_each: gcp.firebase.projects.iosApps.list
  calls:
  - action: projects.iosApps.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      apiKeyId: '{{ response.apiKeyId }}'
      appId: '{{ response.appId }}'
      appStoreId: '{{ response.appStoreId }}'
      bundleId: '{{ response.bundleId }}'
      displayName: '{{ response.displayName }}'
      expireTime: '{{ response.expireTime }}'
      name: '{{ response.name }}'
      projectId: '{{ response.projectId }}'
      state: '{{ response.state }}'
      teamId: '{{ response.teamId }}'
- discovery_id: gcp.firebase.projects.iosApps.getConfig
  for_each: gcp.firebase.projects.iosApps.list
  calls:
  - action: projects.iosApps.getConfig
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      configFileContents: '{{ response.configFileContents }}'
      configFilename: '{{ response.configFilename }}'
- discovery_id: gcp.firebase.projects.webApps.get
  for_each: gcp.firebase.projects.webApps.list
  calls:
  - action: projects.webApps.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      apiKeyId: '{{ response.apiKeyId }}'
      appId: '{{ response.appId }}'
      appUrls: '{{ response.appUrls }}'
      displayName: '{{ response.displayName }}'
      expireTime: '{{ response.expireTime }}'
      name: '{{ response.name }}'
      projectId: '{{ response.projectId }}'
      state: '{{ response.state }}'
      webId: '{{ response.webId }}'
- discovery_id: gcp.firebase.projects.webApps.getConfig
  for_each: gcp.firebase.projects.webApps.list
  calls:
  - action: projects.webApps.getConfig
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      apiKey: '{{ response.apiKey }}'
      appId: '{{ response.appId }}'
      authDomain: '{{ response.authDomain }}'
      databaseURL: '{{ response.databaseURL }}'
      locationId: '{{ response.locationId }}'
      measurementId: '{{ response.measurementId }}'
      messagingSenderId: '{{ response.messagingSenderId }}'
      projectId: '{{ response.projectId }}'
      projectNumber: '{{ response.projectNumber }}'
      realtimeDatabaseUrl: '{{ response.realtimeDatabaseUrl }}'
      storageBucket: '{{ response.storageBucket }}'
      version: '{{ response.version }}'
