version: '1.0'
provider: gcp
service: accesscontextmanager
services:
  client: accesscontextmanager
  module: googleapiclient.discovery.build('accesscontextmanager', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.accesscontextmanager.accessPolicies.accessLevels.list
  calls:
  - action: accessPolicies.accessLevels.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.accessLevels }}'
    item:
      basic: '{{ item.basic }}'
      custom: '{{ item.custom }}'
      description: '{{ item.description }}'
      name: '{{ item.name }}'
      title: '{{ item.title }}'
  uid_template: '{item.name}'
- discovery_id: gcp.accesscontextmanager.accessPolicies.authorizedOrgsDescs.list
  calls:
  - action: accessPolicies.authorizedOrgsDescs.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.authorizedOrgsDescs }}'
    item:
      assetType: '{{ item.assetType }}'
      authorizationDirection: '{{ item.authorizationDirection }}'
      authorizationType: '{{ item.authorizationType }}'
      name: '{{ item.name }}'
      orgs: '{{ item.orgs }}'
  uid_template: '{item.name}'
- discovery_id: gcp.accesscontextmanager.accessPolicies.list
  calls:
  - action: accessPolicies.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.accessPolicies }}'
    item:
      name: '{{ item.name }}'
      parent: '{{ item.parent }}'
      scopes: '{{ item.scopes }}'
      title: '{{ item.title }}'
  uid_template: '{item.name}'
- discovery_id: gcp.accesscontextmanager.accessPolicies.servicePerimeters.list
  calls:
  - action: accessPolicies.servicePerimeters.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.servicePerimeters }}'
    item:
      description: '{{ item.description }}'
      name: '{{ item.name }}'
      perimeterType: '{{ item.perimeterType }}'
      spec: '{{ item.spec }}'
      status: '{{ item.status }}'
      title: '{{ item.title }}'
      useExplicitDryRunSpec: '{{ item.useExplicitDryRunSpec }}'
  uid_template: '{item.name}'
- discovery_id: gcp.accesscontextmanager.organizations.gcpUserAccessBindings.list
  calls:
  - action: organizations.gcpUserAccessBindings.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.gcpUserAccessBindings }}'
    item:
      accessLevels: '{{ item.accessLevels }}'
      dryRunAccessLevels: '{{ item.dryRunAccessLevels }}'
      groupKey: '{{ item.groupKey }}'
      name: '{{ item.name }}'
      restrictedClientApplications: '{{ item.restrictedClientApplications }}'
      scopedAccessSettings: '{{ item.scopedAccessSettings }}'
      sessionSettings: '{{ item.sessionSettings }}'
  uid_template: '{item.name}'
- discovery_id: gcp.accesscontextmanager.services.list
  calls:
  - action: services.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.services }}'
    item:
      availableOnRestrictedVip: '{{ item.availableOnRestrictedVip }}'
      knownLimitations: '{{ item.knownLimitations }}'
      name: '{{ item.name }}'
      serviceSupportStage: '{{ item.serviceSupportStage }}'
      supportStage: '{{ item.supportStage }}'
      supportedMethods: '{{ item.supportedMethods }}'
      title: '{{ item.title }}'
  uid_template: '{item.name}'
- discovery_id: gcp.accesscontextmanager.accessPolicies.accessLevels.get
  for_each: gcp.accesscontextmanager.accessPolicies.accessLevels.list
  calls:
  - action: accessPolicies.accessLevels.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      basic: '{{ response.basic }}'
      custom: '{{ response.custom }}'
      description: '{{ response.description }}'
      name: '{{ response.name }}'
      title: '{{ response.title }}'
- discovery_id: gcp.accesscontextmanager.accessPolicies.authorizedOrgsDescs.get
  for_each: gcp.accesscontextmanager.accessPolicies.authorizedOrgsDescs.list
  calls:
  - action: accessPolicies.authorizedOrgsDescs.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      assetType: '{{ response.assetType }}'
      authorizationDirection: '{{ response.authorizationDirection }}'
      authorizationType: '{{ response.authorizationType }}'
      name: '{{ response.name }}'
      orgs: '{{ response.orgs }}'
- discovery_id: gcp.accesscontextmanager.accessPolicies.get
  for_each: gcp.accesscontextmanager.accessPolicies.list
  calls:
  - action: accessPolicies.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      name: '{{ response.name }}'
      parent: '{{ response.parent }}'
      scopes: '{{ response.scopes }}'
      title: '{{ response.title }}'
- discovery_id: gcp.accesscontextmanager.accessPolicies.servicePerimeters.get
  for_each: gcp.accesscontextmanager.accessPolicies.servicePerimeters.list
  calls:
  - action: accessPolicies.servicePerimeters.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      description: '{{ response.description }}'
      name: '{{ response.name }}'
      perimeterType: '{{ response.perimeterType }}'
      spec: '{{ response.spec }}'
      status: '{{ response.status }}'
      title: '{{ response.title }}'
      useExplicitDryRunSpec: '{{ response.useExplicitDryRunSpec }}'
- discovery_id: gcp.accesscontextmanager.operations.get
  for_each: gcp.accesscontextmanager.operations.list
  calls:
  - action: operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
- discovery_id: gcp.accesscontextmanager.operations.list
  calls:
  - action: operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.accesscontextmanager.organizations.gcpUserAccessBindings.get
  for_each: gcp.accesscontextmanager.organizations.gcpUserAccessBindings.list
  calls:
  - action: organizations.gcpUserAccessBindings.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      accessLevels: '{{ response.accessLevels }}'
      dryRunAccessLevels: '{{ response.dryRunAccessLevels }}'
      groupKey: '{{ response.groupKey }}'
      name: '{{ response.name }}'
      restrictedClientApplications: '{{ response.restrictedClientApplications }}'
      scopedAccessSettings: '{{ response.scopedAccessSettings }}'
      sessionSettings: '{{ response.sessionSettings }}'
- discovery_id: gcp.accesscontextmanager.services.get
  for_each: gcp.accesscontextmanager.operations.list
  calls:
  - action: services.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      availableOnRestrictedVip: '{{ response.availableOnRestrictedVip }}'
      knownLimitations: '{{ response.knownLimitations }}'
      name: '{{ response.name }}'
      serviceSupportStage: '{{ response.serviceSupportStage }}'
      supportStage: '{{ response.supportStage }}'
      supportedMethods: '{{ response.supportedMethods }}'
      title: '{{ response.title }}'
- discovery_id: gcp.accesscontextmanager.list_access_policies
  calls:
  - action: accessPolicies.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      name: '{{ item.name }}'
      parent: '{{ item.parent }}'
      title: '{{ item.title }}'
      etag: '{{ item.etag }}'
      createTime: '{{ item.createTime }}'
      updateTime: '{{ item.updateTime }}'
      scopes: '{{ item.scopes }}'
  uid_template: '{item.name}'
- discovery_id: gcp.accesscontextmanager.list_service_perimeters
  calls:
  - action: accessPolicies.servicePerimeters.list
    save_as: response
    on_error: continue
    params:
      parent: '{{ item.name }}'
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      name: '{{ item.name }}'
      title: '{{ item.title }}'
      perimeterType: '{{ item.perimeterType }}'
      status: '{{ item.status }}'
      spec: '{{ item.spec }}'
      useExplicitDryRunSpec: '{{ item.useExplicitDryRunSpec }}'
      etag: '{{ item.etag }}'
  for_each: gcp.accesscontextmanager.list_access_policies
