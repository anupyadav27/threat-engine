version: '1.0'
provider: gcp
service: firebaserules
services:
  client: firebaserules
  module: googleapiclient.discovery.build('firebaserules', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.firebaserules.projects.releases.list
  calls:
  - action: projects.releases.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.releases }}'
    item:
      createTime: '{{ item.createTime }}'
      name: '{{ item.name }}'
      rulesetName: '{{ item.rulesetName }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.firebaserules.projects.rulesets.list
  calls:
  - action: projects.rulesets.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.rulesets }}'
    item:
      attachmentPoint: '{{ item.attachmentPoint }}'
      createTime: '{{ item.createTime }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      source: '{{ item.source }}'
  uid_template: '{item.name}'
- discovery_id: gcp.firebaserules.projects.releases.get
  for_each: gcp.firebaserules.projects.releases.list
  calls:
  - action: projects.releases.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      createTime: '{{ response.createTime }}'
      name: '{{ response.name }}'
      rulesetName: '{{ response.rulesetName }}'
      updateTime: '{{ response.updateTime }}'
- discovery_id: gcp.firebaserules.projects.releases.getExecutable
  for_each: gcp.firebaserules.projects.releases.list
  calls:
  - action: projects.releases.getExecutable
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      executable: '{{ response.executable }}'
      executableVersion: '{{ response.executableVersion }}'
      language: '{{ response.language }}'
      rulesetName: '{{ response.rulesetName }}'
      syncTime: '{{ response.syncTime }}'
      updateTime: '{{ response.updateTime }}'
- discovery_id: gcp.firebaserules.projects.rulesets.get
  for_each: gcp.firebaserules.projects.rulesets.list
  calls:
  - action: projects.rulesets.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      attachmentPoint: '{{ response.attachmentPoint }}'
      createTime: '{{ response.createTime }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      source: '{{ response.source }}'
