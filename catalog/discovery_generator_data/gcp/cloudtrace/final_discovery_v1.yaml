version: 'v1'
provider: gcp
service: cloudtrace

services:
  client: cloudtrace
  module: "googleapiclient.discovery.build('cloudtrace', 'v1')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: traces
    identifier_op: gcp.cloudtrace.projects.traces.list
    identifier_field: traceId
    item_var_path: item.traceId
    identifier_template: '{traceId}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.cloudtrace.projects.traces.list ──
  - discovery_id: gcp.cloudtrace.projects.traces.list
    calls:
      - action: projects.traces.list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        displayName: '{{ item.displayName }}'
        hasRemoteParent: '{{ item.hasRemoteParent }}'
        name: '{{ item.name }}'
        projectId: '{{ item.projectId }}'
        spanCount: '{{ item.spanCount }}'
        spans: '{{ item.spans }}'
        traceId: '{{ item.traceId }}'
