version: '1.0'
provider: gcp
service: datamigration
services:
  client: datamigration
  module: googleapiclient.discovery.build('datamigration', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.datamigration.projects.locations.connectionProfiles.list
  calls:
  - action: projects.locations.connectionProfiles.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.connectionProfiles }}'
    item:
      alloydb: '{{ item.alloydb }}'
      cloudsql: '{{ item.cloudsql }}'
      createTime: '{{ item.createTime }}'
      displayName: '{{ item.displayName }}'
      error: '{{ item.error }}'
      labels: '{{ item.labels }}'
      mysql: '{{ item.mysql }}'
      name: '{{ item.name }}'
      oracle: '{{ item.oracle }}'
      postgresql: '{{ item.postgresql }}'
      provider: '{{ item.provider }}'
      role: '{{ item.role }}'
      satisfiesPzi: '{{ item.satisfiesPzi }}'
      satisfiesPzs: '{{ item.satisfiesPzs }}'
      sqlserver: '{{ item.sqlserver }}'
      state: '{{ item.state }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.datamigration.projects.locations.conversionWorkspaces.list
