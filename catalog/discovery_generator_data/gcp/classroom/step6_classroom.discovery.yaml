      id: '{{ item.id }}'
      name: '{{ item.name }}'
      ownerId: '{{ item.ownerId }}'
      room: '{{ item.room }}'
      section: '{{ item.section }}'
      subject: '{{ item.subject }}'
      teacherFolder: '{{ item.teacherFolder }}'
      teacherGroupEmail: '{{ item.teacherGroupEmail }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
