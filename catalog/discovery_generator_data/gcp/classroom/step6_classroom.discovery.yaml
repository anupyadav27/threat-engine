version: '1.0'
provider: gcp
service: classroom
services:
  client: classroom
  module: googleapiclient.discovery.build('classroom', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
