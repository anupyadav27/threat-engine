version: '1.0'
provider: gcp
service: saasservicemgmt
services:
  client: saasservicemgmt
  module: googleapiclient.discovery.build('saasservicemgmt', 'v1beta1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
