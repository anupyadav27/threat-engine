version: '1.0'
provider: gcp
service: apigee

services:
  client: apigee
  module: "googleapiclient.discovery.build('apigee', 'v1')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: unknown
    identifier_op: gcp.apigee.organizations.apiproducts.list
    identifier_field: apiProduct[].name
    item_var_path: item.apiProduct[].name
  - resource_type: unknown
    identifier_op: gcp.apigee.organizations.apis.list
    identifier_field: proxies[].name
    item_var_path: item.proxies[].name

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.apigee.organizations.apiproducts.list ──
  - discovery_id: gcp.apigee.organizations.apiproducts.list
    calls:
      - action: organizations.apiproducts.list
        params:
          parent: '{{ project_id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        apiResources: '{{ item.apiResources }}'
        approvalType: '{{ item.approvalType }}'
        attributes: '{{ item.attributes }}'
        createdAt: '{{ item.createdAt }}'
        description: '{{ item.description }}'
        displayName: '{{ item.displayName }}'
        environments: '{{ item.environments }}'
        graphqlOperationGroup: '{{ item.graphqlOperationGroup }}'
        grpcOperationGroup: '{{ item.grpcOperationGroup }}'
        lastModifiedAt: '{{ item.lastModifiedAt }}'
        llmOperationGroup: '{{ item.llmOperationGroup }}'
        llmQuota: '{{ item.llmQuota }}'
        llmQuotaInterval: '{{ item.llmQuotaInterval }}'
        llmQuotaTimeUnit: '{{ item.llmQuotaTimeUnit }}'
        name: '{{ item.name }}'
        operationGroup: '{{ item.operationGroup }}'
        proxies: '{{ item.proxies }}'
        quota: '{{ item.quota }}'
        quotaCounterScope: '{{ item.quotaCounterScope }}'
        quotaInterval: '{{ item.quotaInterval }}'
        quotaTimeUnit: '{{ item.quotaTimeUnit }}'
        scopes: '{{ item.scopes }}'
        space: '{{ item.space }}'

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.apigee.organizations.apis.list ──
  - discovery_id: gcp.apigee.organizations.apis.list
    calls:
      - action: organizations.apis.list
        params:
          parent: '{{ project_id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        apiProxyType: '{{ item.apiProxyType }}'
        labels: '{{ item.labels }}'
        latestRevisionId: '{{ item.latestRevisionId }}'
        metaData: '{{ item.metaData }}'
        name: '{{ item.name }}'
        policies: '{{ item.policies }}'
        readOnly: '{{ item.readOnly }}'
        revision: '{{ item.revision }}'
        space: '{{ item.space }}'

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.apigee.organizations.environments.list ──
  - discovery_id: gcp.apigee.organizations.environments.list
    calls:
      - action: organizations.environments.list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        deployments: '{{ item.deployments }}'
        displayName: '{{ item.displayName }}'
        name: '{{ item.name }}'
        state: '{{ item.state }}'

