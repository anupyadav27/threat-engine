  calls:
  - action: accountSummaries.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.accountSummaries }}'
    item:
      account: '{{ item.account }}'
      displayName: '{{ item.displayName }}'
      name: '{{ item.name }}'
      propertySummaries: '{{ item.propertySummaries }}'
  uid_template: '{item.name}'
