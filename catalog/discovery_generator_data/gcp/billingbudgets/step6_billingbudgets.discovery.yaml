version: '1.0'
provider: gcp
service: billingbudgets
services:
  client: billingbudgets
  module: googleapiclient.discovery.build('billingbudgets', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.billingbudgets.billingAccounts.budgets.list
  calls:
  - action: billingAccounts.budgets.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.budgets }}'
    item:
      amount: '{{ item.amount }}'
      budgetFilter: '{{ item.budgetFilter }}'
      displayName: '{{ item.displayName }}'
      name: '{{ item.name }}'
      notificationsRule: '{{ item.notificationsRule }}'
      ownershipScope: '{{ item.ownershipScope }}'
      thresholdRules: '{{ item.thresholdRules }}'
  uid_template: '{item.name}'
- discovery_id: gcp.billingbudgets.billingAccounts.budgets.get
  for_each: gcp.billingbudgets.billingAccounts.budgets.list
  calls:
  - action: billingAccounts.budgets.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      amount: '{{ response.amount }}'
      budgetFilter: '{{ response.budgetFilter }}'
      displayName: '{{ response.displayName }}'
      name: '{{ response.name }}'
      notificationsRule: '{{ response.notificationsRule }}'
      ownershipScope: '{{ response.ownershipScope }}'
      thresholdRules: '{{ response.thresholdRules }}'
