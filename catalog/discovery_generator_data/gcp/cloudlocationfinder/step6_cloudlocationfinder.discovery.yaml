version: '1.0'
provider: gcp
service: cloudlocationfinder
services:
  client: cloudlocationfinder
  module: googleapiclient.discovery.build('cloudlocationfinder', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.cloudlocationfinder.projects.locations.cloudLocations.list
  calls:
  - action: projects.locations.cloudLocations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.cloudLocations }}'
    item:
      carbonFreeEnergyPercentage: '{{ item.carbonFreeEnergyPercentage }}'
      cloudLocationType: '{{ item.cloudLocationType }}'
      cloudProvider: '{{ item.cloudProvider }}'
      containingCloudLocation: '{{ item.containingCloudLocation }}'
      displayName: '{{ item.displayName }}'
      name: '{{ item.name }}'
      territoryCode: '{{ item.territoryCode }}'
  uid_template: '{item.name}'
- discovery_id: gcp.cloudlocationfinder.projects.locations.cloudLocations.search
  calls:
  - action: projects.locations.cloudLocations.search
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.cloudLocations }}'
    item:
      carbonFreeEnergyPercentage: '{{ item.carbonFreeEnergyPercentage }}'
      cloudLocationType: '{{ item.cloudLocationType }}'
      cloudProvider: '{{ item.cloudProvider }}'
      containingCloudLocation: '{{ item.containingCloudLocation }}'
      displayName: '{{ item.displayName }}'
      name: '{{ item.name }}'
      territoryCode: '{{ item.territoryCode }}'
  uid_template: '{item.name}'
- discovery_id: gcp.cloudlocationfinder.projects.locations.get
  calls:
  - action: projects.locations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      displayName: '{{ response.displayName }}'
      labels: '{{ response.labels }}'
      locationId: '{{ response.locationId }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.cloudlocationfinder.projects.locations.list
  calls:
  - action: projects.locations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.locations }}'
    item:
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      locationId: '{{ item.locationId }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.cloudlocationfinder.projects.locations.cloudLocations.get
  for_each: gcp.cloudlocationfinder.projects.locations.cloudLocations.search
  calls:
  - action: projects.locations.cloudLocations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      carbonFreeEnergyPercentage: '{{ response.carbonFreeEnergyPercentage }}'
      cloudLocationType: '{{ response.cloudLocationType }}'
      cloudProvider: '{{ response.cloudProvider }}'
      containingCloudLocation: '{{ response.containingCloudLocation }}'
      displayName: '{{ response.displayName }}'
      name: '{{ response.name }}'
      territoryCode: '{{ response.territoryCode }}'
