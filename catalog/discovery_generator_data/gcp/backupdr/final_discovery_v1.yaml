version: '1.0'
provider: gcp
service: backupdr

services:
  client: backupdr
  module: "googleapiclient.discovery.build('backupdr', 'v1')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: backupVaults
    identifier_op: gcp.backupdr.projects.locations.backupVaults.list
    identifier_field: backupVaults[].name
    item_var_path: item.backupVaults[].name
    identifier_template: '{parent}/backupVaults:fetchUsable'
  - resource_type: unknown
    identifier_op: gcp.backupdr.projects.locations.backupPlans.list
    identifier_field: backupPlans[].name
    item_var_path: item.backupPlans[].name
  - resource_type: unknown
    identifier_op: gcp.backupdr.projects.locations.backupVaults.dataSources.backups.list
    identifier_field: backups[].name
    item_var_path: item.backups[].name
  - resource_type: unknown
    identifier_op: gcp.backupdr.projects.locations.managementServers.list
    identifier_field: managementServers[].name
    item_var_path: item.managementServers[].name

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.backupdr.projects.locations.backupPlans.list ──
