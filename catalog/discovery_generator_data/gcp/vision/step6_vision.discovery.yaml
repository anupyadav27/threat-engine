version: '1.0'
provider: gcp
service: vision
services:
  client: vision
  module: googleapiclient.discovery.build('vision', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.vision.projects.locations.productSets.list
  calls:
  - action: projects.locations.productSets.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.productSets }}'
    item:
      displayName: '{{ item.displayName }}'
      indexError: '{{ item.indexError }}'
      indexTime: '{{ item.indexTime }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.vision.projects.locations.products.list
  calls:
  - action: projects.locations.products.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.products }}'
    item:
      description: '{{ item.description }}'
      displayName: '{{ item.displayName }}'
      name: '{{ item.name }}'
      productCategory: '{{ item.productCategory }}'
      productLabels: '{{ item.productLabels }}'
  uid_template: '{item.name}'
- discovery_id: gcp.vision.projects.locations.products.referenceImages.list
  calls:
  - action: projects.locations.products.referenceImages.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.referenceImages }}'
    item:
      boundingPolys: '{{ item.boundingPolys }}'
      name: '{{ item.name }}'
      uri: '{{ item.uri }}'
  uid_template: '{item.name}'
- discovery_id: gcp.vision.locations.operations.get
  for_each: gcp.vision.operations.list
  calls:
  - action: locations.operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
- discovery_id: gcp.vision.operations.get
  for_each: gcp.vision.operations.list
  calls:
  - action: operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
- discovery_id: gcp.vision.operations.list
  calls:
  - action: operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.vision.projects.locations.operations.get
  for_each: gcp.vision.operations.list
  calls:
  - action: projects.locations.operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
- discovery_id: gcp.vision.projects.locations.productSets.get
  for_each: gcp.vision.projects.locations.productSets.list
  calls:
  - action: projects.locations.productSets.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      displayName: '{{ response.displayName }}'
      indexError: '{{ response.indexError }}'
      indexTime: '{{ response.indexTime }}'
      name: '{{ response.name }}'
- discovery_id: gcp.vision.projects.locations.productSets.products.list
  for_each: gcp.vision.projects.locations.productSets.list
  calls:
  - action: projects.locations.productSets.products.list
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.products }}'
    item:
      description: '{{ item.description }}'
      displayName: '{{ item.displayName }}'
      name: '{{ item.name }}'
      productCategory: '{{ item.productCategory }}'
      productLabels: '{{ item.productLabels }}'
- discovery_id: gcp.vision.projects.locations.products.get
  for_each: gcp.vision.projects.locations.productSets.products.list
  calls:
  - action: projects.locations.products.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      description: '{{ response.description }}'
      displayName: '{{ response.displayName }}'
      name: '{{ response.name }}'
      productCategory: '{{ response.productCategory }}'
      productLabels: '{{ response.productLabels }}'
- discovery_id: gcp.vision.projects.locations.products.referenceImages.get
  for_each: gcp.vision.projects.locations.products.referenceImages.list
  calls:
  - action: projects.locations.products.referenceImages.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      boundingPolys: '{{ response.boundingPolys }}'
      name: '{{ response.name }}'
      uri: '{{ response.uri }}'
- discovery_id: gcp.vision.projects.operations.get
  for_each: gcp.vision.operations.list
  calls:
  - action: projects.operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
