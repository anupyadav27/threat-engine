    items_for: '{{ response.discoveredprofiles }}'
    item:
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      refreshedTime: '{{ item.refreshedTime }}'
      sapWorkload: '{{ item.sapWorkload }}'
      workloadType: '{{ item.workloadType }}'
  uid_template: '{item.name}'
- discovery_id: gcp.workloadmanager.projects.locations.evaluations.executions.list
  calls:
  - action: projects.locations.evaluations.executions.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.executions }}'
    item:
      endTime: '{{ item.endTime }}'
      engine: '{{ item.engine }}'
      evaluationId: '{{ item.evaluationId }}'
      externalDataSources: '{{ item.externalDataSources }}'
      inventoryTime: '{{ item.inventoryTime }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      notices: '{{ item.notices }}'
      resultSummary: '{{ item.resultSummary }}'
      ruleResults: '{{ item.ruleResults }}'
      runType: '{{ item.runType }}'
      startTime: '{{ item.startTime }}'
      state: '{{ item.state }}'
  uid_template: '{item.name}'
- discovery_id: gcp.workloadmanager.projects.locations.evaluations.executions.results.list
  calls:
  - action: projects.locations.evaluations.executions.results.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.results }}'
    item:
