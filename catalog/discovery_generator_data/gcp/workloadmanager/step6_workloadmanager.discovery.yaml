version: '1.0'
provider: gcp
service: workloadmanager
services:
  client: workloadmanager
  module: googleapiclient.discovery.build('workloadmanager', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.workloadmanager.projects.locations.deployments.actuations.list
  calls:
  - action: projects.locations.deployments.actuations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.actuations }}'
    item:
      actuationOutput: '{{ item.actuationOutput }}'
      deploymentOutput: '{{ item.deploymentOutput }}'
      endTime: '{{ item.endTime }}'
      name: '{{ item.name }}'
      startTime: '{{ item.startTime }}'
      state: '{{ item.state }}'
  uid_template: '{item.name}'
- discovery_id: gcp.workloadmanager.projects.locations.deployments.list
  calls:
  - action: projects.locations.deployments.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.deployments }}'
    item:
      createTime: '{{ item.createTime }}'
      description: '{{ item.description }}'
      name: '{{ item.name }}'
      sapSystemS4Config: '{{ item.sapSystemS4Config }}'
      serviceAccount: '{{ item.serviceAccount }}'
      sqlServerWorkload: '{{ item.sqlServerWorkload }}'
      state: '{{ item.state }}'
      terraformVariables: '{{ item.terraformVariables }}'
      updateTime: '{{ item.updateTime }}'
      workerPool: '{{ item.workerPool }}'
      workloadType: '{{ item.workloadType }}'
  uid_template: '{item.name}'
- discovery_id: gcp.workloadmanager.projects.locations.discoveredprofiles.list
