version: '1.0'
provider: gcp
service: androiddeviceprovisioning
services:
  client: androiddeviceprovisioning
  module: googleapiclient.discovery.build('androiddeviceprovisioning', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.androiddeviceprovisioning.customers.configurations.list
  calls:
  - action: customers.configurations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.configurations }}'
    item:
      companyName: '{{ item.companyName }}'
      configurationId: '{{ item.configurationId }}'
      configurationName: '{{ item.configurationName }}'
      contactEmail: '{{ item.contactEmail }}'
      contactPhone: '{{ item.contactPhone }}'
      customMessage: '{{ item.customMessage }}'
      dpcExtras: '{{ item.dpcExtras }}'
      dpcResourcePath: '{{ item.dpcResourcePath }}'
      forcedResetTime: '{{ item.forcedResetTime }}'
      isDefault: '{{ item.isDefault }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.androiddeviceprovisioning.customers.devices.list
  calls:
  - action: customers.devices.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.devices }}'
    item:
      claims: '{{ item.claims }}'
      configuration: '{{ item.configuration }}'
      deviceId: '{{ item.deviceId }}'
      deviceIdentifier: '{{ item.deviceIdentifier }}'
      deviceMetadata: '{{ item.deviceMetadata }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.androiddeviceprovisioning.customers.dpcs.list
  calls:
  - action: customers.dpcs.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.dpcs }}'
    item:
      dpcName: '{{ item.dpcName }}'
      name: '{{ item.name }}'
      packageName: '{{ item.packageName }}'
  uid_template: '{item.name}'
- discovery_id: gcp.androiddeviceprovisioning.customers.list
  calls:
  - action: customers.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.customers }}'
    item:
      adminEmails: '{{ item.adminEmails }}'
      companyId: '{{ item.companyId }}'
      companyName: '{{ item.companyName }}'
      googleWorkspaceAccount: '{{ item.googleWorkspaceAccount }}'
      languageCode: '{{ item.languageCode }}'
      name: '{{ item.name }}'
      ownerEmails: '{{ item.ownerEmails }}'
      skipWelcomeEmail: '{{ item.skipWelcomeEmail }}'
      termsStatus: '{{ item.termsStatus }}'
  uid_template: '{item.name}'
- discovery_id: gcp.androiddeviceprovisioning.partners.vendors.customers.list
  calls:
  - action: partners.vendors.customers.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.customers }}'
    item:
      adminEmails: '{{ item.adminEmails }}'
      companyId: '{{ item.companyId }}'
      companyName: '{{ item.companyName }}'
      googleWorkspaceAccount: '{{ item.googleWorkspaceAccount }}'
      languageCode: '{{ item.languageCode }}'
      name: '{{ item.name }}'
      ownerEmails: '{{ item.ownerEmails }}'
      skipWelcomeEmail: '{{ item.skipWelcomeEmail }}'
      termsStatus: '{{ item.termsStatus }}'
  uid_template: '{item.name}'
- discovery_id: gcp.androiddeviceprovisioning.partners.vendors.list
  calls:
  - action: partners.vendors.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.vendors }}'
    item:
      adminEmails: '{{ item.adminEmails }}'
      companyId: '{{ item.companyId }}'
      companyName: '{{ item.companyName }}'
      googleWorkspaceAccount: '{{ item.googleWorkspaceAccount }}'
      languageCode: '{{ item.languageCode }}'
      name: '{{ item.name }}'
      ownerEmails: '{{ item.ownerEmails }}'
      skipWelcomeEmail: '{{ item.skipWelcomeEmail }}'
      termsStatus: '{{ item.termsStatus }}'
  uid_template: '{item.name}'
- discovery_id: gcp.androiddeviceprovisioning.customers.configurations.get
  for_each: gcp.androiddeviceprovisioning.customers.configurations.list
  calls:
  - action: customers.configurations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      companyName: '{{ response.companyName }}'
      configurationId: '{{ response.configurationId }}'
      configurationName: '{{ response.configurationName }}'
      contactEmail: '{{ response.contactEmail }}'
      contactPhone: '{{ response.contactPhone }}'
      customMessage: '{{ response.customMessage }}'
      dpcExtras: '{{ response.dpcExtras }}'
      dpcResourcePath: '{{ response.dpcResourcePath }}'
      forcedResetTime: '{{ response.forcedResetTime }}'
      isDefault: '{{ response.isDefault }}'
      name: '{{ response.name }}'
- discovery_id: gcp.androiddeviceprovisioning.customers.devices.get
  for_each: gcp.androiddeviceprovisioning.customers.devices.list
  calls:
  - action: customers.devices.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      claims: '{{ response.claims }}'
      configuration: '{{ response.configuration }}'
      deviceId: '{{ response.deviceId }}'
      deviceIdentifier: '{{ response.deviceIdentifier }}'
      deviceMetadata: '{{ response.deviceMetadata }}'
      name: '{{ response.name }}'
- discovery_id: gcp.androiddeviceprovisioning.operations.get
  calls:
  - action: operations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.androiddeviceprovisioning.partners.customers.list
  calls:
  - action: partners.customers.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.customers }}'
    item:
      adminEmails: '{{ item.adminEmails }}'
      companyId: '{{ item.companyId }}'
      companyName: '{{ item.companyName }}'
      googleWorkspaceAccount: '{{ item.googleWorkspaceAccount }}'
      languageCode: '{{ item.languageCode }}'
      name: '{{ item.name }}'
      ownerEmails: '{{ item.ownerEmails }}'
      skipWelcomeEmail: '{{ item.skipWelcomeEmail }}'
      termsStatus: '{{ item.termsStatus }}'
  uid_template: '{item.name}'
- discovery_id: gcp.androiddeviceprovisioning.partners.devices.get
  for_each: gcp.androiddeviceprovisioning.customers.devices.list
  calls:
  - action: partners.devices.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      claims: '{{ response.claims }}'
      configuration: '{{ response.configuration }}'
      deviceId: '{{ response.deviceId }}'
      deviceIdentifier: '{{ response.deviceIdentifier }}'
      deviceMetadata: '{{ response.deviceMetadata }}'
      name: '{{ response.name }}'
