version: '1.0'
provider: gcp
service: recommender
services:
  client: recommender
  module: googleapiclient.discovery.build('recommender', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.recommender.billingAccounts.locations.insightTypes.insights.list
  calls:
  - action: billingAccounts.locations.insightTypes.insights.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.insights }}'
    item:
      associatedRecommendations: '{{ item.associatedRecommendations }}'
      category: '{{ item.category }}'
      content: '{{ item.content }}'
      description: '{{ item.description }}'
      insightSubtype: '{{ item.insightSubtype }}'
      lastRefreshTime: '{{ item.lastRefreshTime }}'
      name: '{{ item.name }}'
      observationPeriod: '{{ item.observationPeriod }}'
      severity: '{{ item.severity }}'
      stateInfo: '{{ item.stateInfo }}'
      targetResources: '{{ item.targetResources }}'
  uid_template: '{item.name}'
