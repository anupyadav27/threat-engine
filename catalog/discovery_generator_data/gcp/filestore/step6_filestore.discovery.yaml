version: '1.0'
provider: gcp
service: filestore
discovery:
- discovery_id: gcp.filestore.list_instances
  calls:
  - action: projects.locations.instances.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      name: '{{ item.name }}'
      tier: '{{ item.tier }}'
      state: '{{ item.state }}'
      createTime: '{{ item.createTime }}'
      networks: '{{ item.networks }}'
      fileShares: '{{ item.fileShares }}'
- discovery_id: gcp.file.projects.locations.backups.list
  calls:
  - action: projects.locations.backups.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.backups }}'
    item:
      name: '{{ item.name }}'
      createTime: '{{ item.createTime }}'
      labels: '{{ item.labels }}'
      state: '{{ item.state }}'
      description: '{{ item.description }}'
      capacityGb: '{{ item.capacityGb }}'
      downloadBytes: '{{ item.downloadBytes }}'
      fileSystemProtocol: '{{ item.fileSystemProtocol }}'
      kmsKey: '{{ item.kmsKey }}'
      satisfiesPzi: '{{ item.satisfiesPzi }}'
      satisfiesPzs: '{{ item.satisfiesPzs }}'
      sourceFileShare: '{{ item.sourceFileShare }}'
      sourceInstance: '{{ item.sourceInstance }}'
      sourceInstanceTier: '{{ item.sourceInstanceTier }}'
      storageBytes: '{{ item.storageBytes }}'
      tags: '{{ item.tags }}'
- discovery_id: gcp.file.projects.locations.instances.list
  calls:
  - action: projects.locations.instances.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.instances }}'
    item:
      name: '{{ item.name }}'
      createTime: '{{ item.createTime }}'
      labels: '{{ item.labels }}'
      state: '{{ item.state }}'
      description: '{{ item.description }}'
      capacityStepSizeGb: '{{ item.capacityStepSizeGb }}'
      customPerformanceSupported: '{{ item.customPerformanceSupported }}'
      deletionProtectionEnabled: '{{ item.deletionProtectionEnabled }}'
      deletionProtectionReason: '{{ item.deletionProtectionReason }}'
      directoryServices: '{{ item.directoryServices }}'
      fileShares: '{{ item.fileShares }}'
      kmsKeyName: '{{ item.kmsKeyName }}'
      maxCapacityGb: '{{ item.maxCapacityGb }}'
      minCapacityGb: '{{ item.minCapacityGb }}'
      networks: '{{ item.networks }}'
      performanceConfig: '{{ item.performanceConfig }}'
      performanceLimits: '{{ item.performanceLimits }}'
      protocol: '{{ item.protocol }}'
      replication: '{{ item.replication }}'
      satisfiesPzi: '{{ item.satisfiesPzi }}'
- discovery_id: gcp.file.projects.locations.list
  calls:
  - action: projects.locations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.locations }}'
    item:
      name: '{{ item.name }}'
      labels: '{{ item.labels }}'
      displayName: '{{ item.displayName }}'
      locationId: '{{ item.locationId }}'
      metadata: '{{ item.metadata }}'
- discovery_id: gcp.file.projects.locations.get
  calls:
  - action: projects.locations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      name: '{{ item.name }}'
      labels: '{{ item.labels }}'
      displayName: '{{ item.displayName }}'
      locationId: '{{ item.locationId }}'
      metadata: '{{ item.metadata }}'
- discovery_id: gcp.file.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      name: '{{ item.name }}'
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      response: '{{ item.response }}'
- discovery_id: gcp.file.projects.locations.instances.snapshots.list
  calls:
  - action: projects.locations.instances.snapshots.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.snapshots }}'
    item:
      name: '{{ item.name }}'
      createTime: '{{ item.createTime }}'
      labels: '{{ item.labels }}'
      state: '{{ item.state }}'
      description: '{{ item.description }}'
      filesystemUsedBytes: '{{ item.filesystemUsedBytes }}'
      tags: '{{ item.tags }}'
