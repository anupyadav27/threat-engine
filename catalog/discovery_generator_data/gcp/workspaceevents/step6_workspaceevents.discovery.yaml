version: '1.0'
provider: gcp
service: workspaceevents
services:
  client: workspaceevents
  module: googleapiclient.discovery.build('workspaceevents', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.workspaceevents.subscriptions.list
  calls:
  - action: subscriptions.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.subscriptions }}'
    item:
      authority: '{{ item.authority }}'
      createTime: '{{ item.createTime }}'
      eventTypes: '{{ item.eventTypes }}'
      expireTime: '{{ item.expireTime }}'
      name: '{{ item.name }}'
      notificationEndpoint: '{{ item.notificationEndpoint }}'
      payloadOptions: '{{ item.payloadOptions }}'
      reconciling: '{{ item.reconciling }}'
      state: '{{ item.state }}'
      suspensionReason: '{{ item.suspensionReason }}'
      targetResource: '{{ item.targetResource }}'
      ttl: '{{ item.ttl }}'
      uid: '{{ item.uid }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.workspaceevents.tasks.pushNotificationConfigs.list
  calls:
  - action: tasks.pushNotificationConfigs.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.pushNotificationConfigs }}'
    item:
      name: '{{ item.name }}'
      pushNotificationConfig: '{{ item.pushNotificationConfig }}'
  uid_template: '{item.name}'
- discovery_id: gcp.workspaceevents.operations.get
  calls:
  - action: operations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.workspaceevents.subscriptions.get
  for_each: gcp.workspaceevents.subscriptions.list
  calls:
  - action: subscriptions.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      authority: '{{ response.authority }}'
      createTime: '{{ response.createTime }}'
      eventTypes: '{{ response.eventTypes }}'
      expireTime: '{{ response.expireTime }}'
      name: '{{ response.name }}'
      notificationEndpoint: '{{ response.notificationEndpoint }}'
      payloadOptions: '{{ response.payloadOptions }}'
      reconciling: '{{ response.reconciling }}'
      state: '{{ response.state }}'
      suspensionReason: '{{ response.suspensionReason }}'
      targetResource: '{{ response.targetResource }}'
      ttl: '{{ response.ttl }}'
      uid: '{{ response.uid }}'
      updateTime: '{{ response.updateTime }}'
- discovery_id: gcp.workspaceevents.tasks.get
  calls:
  - action: tasks.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      artifacts: '{{ response.artifacts }}'
      contextId: '{{ response.contextId }}'
      history: '{{ response.history }}'
      id: '{{ response.id }}'
      metadata: '{{ response.metadata }}'
      status: '{{ response.status }}'
  uid_template: '{item.id}'
- discovery_id: gcp.workspaceevents.tasks.pushNotificationConfigs.get
  for_each: gcp.workspaceevents.tasks.pushNotificationConfigs.list
  calls:
  - action: tasks.pushNotificationConfigs.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      name: '{{ response.name }}'
      pushNotificationConfig: '{{ response.pushNotificationConfig }}'
- discovery_id: gcp.workspaceevents.tasks.subscribe
  calls:
  - action: tasks.subscribe
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      artifactUpdate: '{{ response.artifactUpdate }}'
      message: '{{ response.message }}'
      statusUpdate: '{{ response.statusUpdate }}'
      task: '{{ response.task }}'
