version: '1.0'
provider: gcp
service: smartdevicemanagement
services:
  client: smartdevicemanagement
  module: googleapiclient.discovery.build('smartdevicemanagement', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.smartdevicemanagement.enterprises.devices.list
  calls:
  - action: enterprises.devices.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.devices }}'
    item:
      ghpName: '{{ item.ghpName }}'
      name: '{{ item.name }}'
      parentRelations: '{{ item.parentRelations }}'
      traits: '{{ item.traits }}'
      type: '{{ item.type }}'
  uid_template: '{item.name}'
- discovery_id: gcp.smartdevicemanagement.enterprises.structures.list
  calls:
  - action: enterprises.structures.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.structures }}'
    item:
      ghpName: '{{ item.ghpName }}'
      name: '{{ item.name }}'
      traits: '{{ item.traits }}'
  uid_template: '{item.name}'
- discovery_id: gcp.smartdevicemanagement.enterprises.structures.rooms.list
  calls:
  - action: enterprises.structures.rooms.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.rooms }}'
    item:
      name: '{{ item.name }}'
      traits: '{{ item.traits }}'
  uid_template: '{item.name}'
- discovery_id: gcp.smartdevicemanagement.enterprises.devices.get
  for_each: gcp.smartdevicemanagement.enterprises.devices.list
  calls:
  - action: enterprises.devices.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      ghpName: '{{ response.ghpName }}'
      name: '{{ response.name }}'
      parentRelations: '{{ response.parentRelations }}'
      traits: '{{ response.traits }}'
      type: '{{ response.type }}'
- discovery_id: gcp.smartdevicemanagement.enterprises.structures.get
  for_each: gcp.smartdevicemanagement.enterprises.structures.list
  calls:
  - action: enterprises.structures.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      ghpName: '{{ response.ghpName }}'
      name: '{{ response.name }}'
      traits: '{{ response.traits }}'
- discovery_id: gcp.smartdevicemanagement.enterprises.structures.rooms.get
  for_each: gcp.smartdevicemanagement.enterprises.structures.rooms.list
  calls:
  - action: enterprises.structures.rooms.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      name: '{{ response.name }}'
      traits: '{{ response.traits }}'
