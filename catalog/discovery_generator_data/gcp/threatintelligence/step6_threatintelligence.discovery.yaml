version: '1.0'
provider: gcp
service: threatintelligence
services:
  client: threatintelligence
  module: googleapiclient.discovery.build('threatintelligence', 'v1beta')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.threatintelligence.projects.alerts.enumerateFacets
  calls:
  - action: projects.alerts.enumerateFacets
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      facets: '{{ response.facets }}'
- discovery_id: gcp.threatintelligence.projects.alerts.list
  calls:
  - action: projects.alerts.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.alerts }}'
    item:
      aiSummary: '{{ item.aiSummary }}'
      audit: '{{ item.audit }}'
      configurations: '{{ item.configurations }}'
      detail: '{{ item.detail }}'
      displayName: '{{ item.displayName }}'
      duplicateOf: '{{ item.duplicateOf }}'
      duplicatedBy: '{{ item.duplicatedBy }}'
      externalId: '{{ item.externalId }}'
      findingCount: '{{ item.findingCount }}'
      findings: '{{ item.findings }}'
      name: '{{ item.name }}'
      priorityAnalysis: '{{ item.priorityAnalysis }}'
      relevanceAnalysis: '{{ item.relevanceAnalysis }}'
      severityAnalysis: '{{ item.severityAnalysis }}'
      state: '{{ item.state }}'
  uid_template: '{item.name}'
- discovery_id: gcp.threatintelligence.projects.configurations.list
  calls:
  - action: projects.configurations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.configurations }}'
    item:
      audit: '{{ item.audit }}'
      description: '{{ item.description }}'
      detail: '{{ item.detail }}'
      displayName: '{{ item.displayName }}'
      name: '{{ item.name }}'
      provider: '{{ item.provider }}'
      state: '{{ item.state }}'
      version: '{{ item.version }}'
  uid_template: '{item.name}'
- discovery_id: gcp.threatintelligence.projects.configurations.revisions.list
  calls:
  - action: projects.configurations.revisions.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.revisions }}'
    item:
      createTime: '{{ item.createTime }}'
      name: '{{ item.name }}'
      snapshot: '{{ item.snapshot }}'
  uid_template: '{item.name}'
- discovery_id: gcp.threatintelligence.projects.findings.list
  calls:
  - action: projects.findings.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.findings }}'
    item:
      aiSummary: '{{ item.aiSummary }}'
      alert: '{{ item.alert }}'
      audit: '{{ item.audit }}'
      configurations: '{{ item.configurations }}'
      detail: '{{ item.detail }}'
      displayName: '{{ item.displayName }}'
      name: '{{ item.name }}'
      provider: '{{ item.provider }}'
      relevanceAnalysis: '{{ item.relevanceAnalysis }}'
      reoccurrenceTimes: '{{ item.reoccurrenceTimes }}'
      severity: '{{ item.severity }}'
      severityAnalysis: '{{ item.severityAnalysis }}'
  uid_template: '{item.name}'
- discovery_id: gcp.threatintelligence.projects.findings.search
  calls:
  - action: projects.findings.search
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.findings }}'
    item:
      aiSummary: '{{ item.aiSummary }}'
      alert: '{{ item.alert }}'
      audit: '{{ item.audit }}'
      configurations: '{{ item.configurations }}'
      detail: '{{ item.detail }}'
      displayName: '{{ item.displayName }}'
      name: '{{ item.name }}'
      provider: '{{ item.provider }}'
      relevanceAnalysis: '{{ item.relevanceAnalysis }}'
      reoccurrenceTimes: '{{ item.reoccurrenceTimes }}'
      severity: '{{ item.severity }}'
      severityAnalysis: '{{ item.severityAnalysis }}'
  uid_template: '{item.name}'
- discovery_id: gcp.threatintelligence.projects.alerts.documents.get
  for_each: gcp.threatintelligence.projects.alerts.list
  calls:
  - action: projects.alerts.documents.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      aiSummary: '{{ response.aiSummary }}'
      author: '{{ response.author }}'
      collectionTime: '{{ response.collectionTime }}'
      content: '{{ response.content }}'
      createTime: '{{ response.createTime }}'
      ingestTime: '{{ response.ingestTime }}'
      languageCode: '{{ response.languageCode }}'
      name: '{{ response.name }}'
      source: '{{ response.source }}'
      sourceUpdateTime: '{{ response.sourceUpdateTime }}'
      sourceUri: '{{ response.sourceUri }}'
      title: '{{ response.title }}'
      translation: '{{ response.translation }}'
- discovery_id: gcp.threatintelligence.projects.alerts.get
  for_each: gcp.threatintelligence.projects.alerts.list
  calls:
  - action: projects.alerts.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      aiSummary: '{{ response.aiSummary }}'
      audit: '{{ response.audit }}'
      configurations: '{{ response.configurations }}'
      detail: '{{ response.detail }}'
      displayName: '{{ response.displayName }}'
      duplicateOf: '{{ response.duplicateOf }}'
      duplicatedBy: '{{ response.duplicatedBy }}'
      externalId: '{{ response.externalId }}'
      findingCount: '{{ response.findingCount }}'
      findings: '{{ response.findings }}'
      name: '{{ response.name }}'
      priorityAnalysis: '{{ response.priorityAnalysis }}'
      relevanceAnalysis: '{{ response.relevanceAnalysis }}'
      severityAnalysis: '{{ response.severityAnalysis }}'
      state: '{{ response.state }}'
- discovery_id: gcp.threatintelligence.projects.alerts.read
  for_each: gcp.threatintelligence.projects.alerts.list
  calls:
  - action: projects.alerts.read
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      aiSummary: '{{ response.aiSummary }}'
      audit: '{{ response.audit }}'
      configurations: '{{ response.configurations }}'
      detail: '{{ response.detail }}'
      displayName: '{{ response.displayName }}'
      duplicateOf: '{{ response.duplicateOf }}'
      duplicatedBy: '{{ response.duplicatedBy }}'
      externalId: '{{ response.externalId }}'
      findingCount: '{{ response.findingCount }}'
      findings: '{{ response.findings }}'
      name: '{{ response.name }}'
      priorityAnalysis: '{{ response.priorityAnalysis }}'
      relevanceAnalysis: '{{ response.relevanceAnalysis }}'
      severityAnalysis: '{{ response.severityAnalysis }}'
      state: '{{ response.state }}'
- discovery_id: gcp.threatintelligence.projects.configurations.get
  for_each: gcp.threatintelligence.projects.configurations.list
  calls:
  - action: projects.configurations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      audit: '{{ response.audit }}'
      description: '{{ response.description }}'
      detail: '{{ response.detail }}'
      displayName: '{{ response.displayName }}'
      name: '{{ response.name }}'
      provider: '{{ response.provider }}'
      state: '{{ response.state }}'
      version: '{{ response.version }}'
- discovery_id: gcp.threatintelligence.projects.findings.get
  for_each: gcp.threatintelligence.projects.findings.list
  calls:
  - action: projects.findings.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      aiSummary: '{{ response.aiSummary }}'
      alert: '{{ response.alert }}'
      audit: '{{ response.audit }}'
      configurations: '{{ response.configurations }}'
      detail: '{{ response.detail }}'
      displayName: '{{ response.displayName }}'
      name: '{{ response.name }}'
      provider: '{{ response.provider }}'
      relevanceAnalysis: '{{ response.relevanceAnalysis }}'
      reoccurrenceTimes: '{{ response.reoccurrenceTimes }}'
      severity: '{{ response.severity }}'
      severityAnalysis: '{{ response.severityAnalysis }}'
