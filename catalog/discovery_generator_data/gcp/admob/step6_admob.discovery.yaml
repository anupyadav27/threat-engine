version: '1.0'
provider: gcp
service: admob
services:
  client: admob
  module: googleapiclient.discovery.build('admob', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.admob.accounts.adUnits.list
  calls:
  - action: accounts.adUnits.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.adUnits }}'
    item:
      adFormat: '{{ item.adFormat }}'
      adTypes: '{{ item.adTypes }}'
      adUnitId: '{{ item.adUnitId }}'
      appId: '{{ item.appId }}'
      displayName: '{{ item.displayName }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.admob.accounts.apps.list
  calls:
  - action: accounts.apps.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.apps }}'
    item:
      appApprovalState: '{{ item.appApprovalState }}'
      appId: '{{ item.appId }}'
      linkedAppInfo: '{{ item.linkedAppInfo }}'
      manualAppInfo: '{{ item.manualAppInfo }}'
      name: '{{ item.name }}'
      platform: '{{ item.platform }}'
  uid_template: '{item.name}'
- discovery_id: gcp.admob.accounts.get
  calls:
  - action: accounts.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      currencyCode: '{{ response.currencyCode }}'
      name: '{{ response.name }}'
      publisherId: '{{ response.publisherId }}'
      reportingTimeZone: '{{ response.reportingTimeZone }}'
  uid_template: '{item.name}'
- discovery_id: gcp.admob.accounts.list
  calls:
  - action: accounts.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.accounts }}'
    item:
      currencyCode: '{{ item.currencyCode }}'
      name: '{{ item.name }}'
      publisherId: '{{ item.publisherId }}'
      reportingTimeZone: '{{ item.reportingTimeZone }}'
  uid_template: '{item.name}'
