version: '1.0'
provider: gcp
service: cloudscheduler
services:
  client: cloudscheduler
  module: googleapiclient.discovery.build('cloudscheduler', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.cloudscheduler.projects.locations.get
  calls:
  - action: projects.locations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      displayName: '{{ response.displayName }}'
      labels: '{{ response.labels }}'
      locationId: '{{ response.locationId }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.cloudscheduler.projects.locations.getCmekConfig
  calls:
  - action: projects.locations.getCmekConfig
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      kmsKeyName: '{{ response.kmsKeyName }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.cloudscheduler.projects.locations.jobs.list
  calls:
  - action: projects.locations.jobs.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.jobs }}'
    item:
      appEngineHttpTarget: '{{ item.appEngineHttpTarget }}'
      attemptDeadline: '{{ item.attemptDeadline }}'
      description: '{{ item.description }}'
      httpTarget: '{{ item.httpTarget }}'
      lastAttemptTime: '{{ item.lastAttemptTime }}'
      name: '{{ item.name }}'
      pubsubTarget: '{{ item.pubsubTarget }}'
      retryConfig: '{{ item.retryConfig }}'
      satisfiesPzs: '{{ item.satisfiesPzs }}'
      schedule: '{{ item.schedule }}'
      scheduleTime: '{{ item.scheduleTime }}'
      state: '{{ item.state }}'
      status: '{{ item.status }}'
      timeZone: '{{ item.timeZone }}'
      userUpdateTime: '{{ item.userUpdateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.cloudscheduler.projects.locations.list
  calls:
  - action: projects.locations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.locations }}'
    item:
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      locationId: '{{ item.locationId }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.cloudscheduler.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.cloudscheduler.projects.locations.jobs.get
  for_each: gcp.cloudscheduler.projects.locations.jobs.list
  calls:
  - action: projects.locations.jobs.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      appEngineHttpTarget: '{{ response.appEngineHttpTarget }}'
      attemptDeadline: '{{ response.attemptDeadline }}'
      description: '{{ response.description }}'
      httpTarget: '{{ response.httpTarget }}'
      lastAttemptTime: '{{ response.lastAttemptTime }}'
      name: '{{ response.name }}'
      pubsubTarget: '{{ response.pubsubTarget }}'
      retryConfig: '{{ response.retryConfig }}'
      satisfiesPzs: '{{ response.satisfiesPzs }}'
      schedule: '{{ response.schedule }}'
      scheduleTime: '{{ response.scheduleTime }}'
      state: '{{ response.state }}'
      status: '{{ response.status }}'
      timeZone: '{{ response.timeZone }}'
      userUpdateTime: '{{ response.userUpdateTime }}'
- discovery_id: gcp.cloudscheduler.projects.locations.operations.get
  for_each: gcp.cloudscheduler.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
