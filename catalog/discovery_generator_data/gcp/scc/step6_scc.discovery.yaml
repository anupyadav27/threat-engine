  - action: organizations.notificationConfigs.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.notificationConfigs }}'
    item:
      name: '{{ item.name }}'
      description: '{{ item.description }}'
      pubsubTopic: '{{ item.pubsubTopic }}'
      serviceAccount: '{{ item.serviceAccount }}'
      streamingConfig: '{{ item.streamingConfig }}'
