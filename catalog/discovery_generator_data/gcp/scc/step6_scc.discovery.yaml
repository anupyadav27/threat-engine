version: '1.0'
provider: gcp
service: scc
discovery:
- discovery_id: gcp.scc.list_anomalies
  calls:
  - action: organizations.sources.findings.list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.items }}'
    item:
      name: '{{ item.name }}'
      state: '{{ item.state }}'
      resourceName: '{{ item.resourceName }}'
      category: '{{ item.category }}'
      externalUri: '{{ item.externalUri }}'
      sourceProperties: '{{ item.sourceProperties }}'
      securityMarks: '{{ item.securityMarks }}'
      eventTime: '{{ item.eventTime }}'
      createTime: '{{ item.createTime }}'
      severity: '{{ item.severity }}'
      canonicalName: '{{ item.canonicalName }}'
