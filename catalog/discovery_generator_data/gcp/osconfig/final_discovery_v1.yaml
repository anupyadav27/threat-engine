version: '1.0'
provider: gcp
service: osconfig

services:
  client: osconfig
  module: "googleapiclient.discovery.build('osconfig', 'v1')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: unknown
    identifier_op: gcp.osconfig.projects.patchDeployments.list
    identifier_field: patchDeployments[].name
    item_var_path: item.patchDeployments[].name

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.osconfig.projects.patchDeployments.list ──
  - discovery_id: gcp.osconfig.projects.patchDeployments.list
    calls:
      - action: projects.patchDeployments.list
        params:
          parent: '{{ project_id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        __self__: '{{ item.__self__ }}'
        createTime: '{{ item.createTime }}'
        description: '{{ item.description }}'
        duration: '{{ item.duration }}'
        instanceFilter: '{{ item.instanceFilter }}'
        lastExecuteTime: '{{ item.lastExecuteTime }}'
        name: '{{ item.name }}'
        oneTimeSchedule: '{{ item.oneTimeSchedule }}'
        patchConfig: '{{ item.patchConfig }}'
        recurringSchedule: '{{ item.recurringSchedule }}'
        rollout: '{{ item.rollout }}'
        state: '{{ item.state }}'
        updateTime: '{{ item.updateTime }}'

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.osconfig.projects.guestPolicies.list ──
  - discovery_id: gcp.osconfig.projects.guestPolicies.list
    calls:
      - action: projects.guestPolicies.list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        assignment: '{{ item.assignment }}'
        createTime: '{{ item.createTime }}'
        description: '{{ item.description }}'
        etag: '{{ item.etag }}'
        name: '{{ item.name }}'
        packageRepositories: '{{ item.packageRepositories }}'
        packages: '{{ item.packages }}'
        recipes: '{{ item.recipes }}'
        updateTime: '{{ item.updateTime }}'

