      duration: '{{ response.duration }}'
      instanceFilter: '{{ response.instanceFilter }}'
      lastExecuteTime: '{{ response.lastExecuteTime }}'
      name: '{{ response.name }}'
      oneTimeSchedule: '{{ response.oneTimeSchedule }}'
      patchConfig: '{{ response.patchConfig }}'
      recurringSchedule: '{{ response.recurringSchedule }}'
      rollout: '{{ response.rollout }}'
      state: '{{ response.state }}'
      updateTime: '{{ response.updateTime }}'
- discovery_id: gcp.osconfig.projects.patchJobs.get
  for_each: gcp.osconfig.projects.patchJobs.list
  calls:
  - action: projects.patchJobs.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      createTime: '{{ response.createTime }}'
      description: '{{ response.description }}'
      displayName: '{{ response.displayName }}'
      dryRun: '{{ response.dryRun }}'
      duration: '{{ response.duration }}'
      errorMessage: '{{ response.errorMessage }}'
      instanceDetailsSummary: '{{ response.instanceDetailsSummary }}'
      instanceFilter: '{{ response.instanceFilter }}'
      name: '{{ response.name }}'
      patchConfig: '{{ response.patchConfig }}'
      patchDeployment: '{{ response.patchDeployment }}'
