version: '1.0'
provider: gcp
service: osconfig
services:
  client: osconfig
  module: googleapiclient.discovery.build('osconfig', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.osconfig.projects.locations.global.getProjectFeatureSettings
  calls:
  - action: projects.locations.global.getProjectFeatureSettings
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      name: '{{ response.name }}'
      patchAndConfigFeatureSet: '{{ response.patchAndConfigFeatureSet }}'
  uid_template: '{item.name}'
- discovery_id: gcp.osconfig.projects.locations.instances.inventories.list
  calls:
  - action: projects.locations.instances.inventories.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.inventories }}'
    item:
      items: '{{ item.items }}'
      name: '{{ item.name }}'
      osInfo: '{{ item.osInfo }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.osconfig.projects.locations.instances.osPolicyAssignments.reports.list
  calls:
  - action: projects.locations.instances.osPolicyAssignments.reports.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.reports }}'
    item:
      instance: '{{ item.instance }}'
      lastRunId: '{{ item.lastRunId }}'
      name: '{{ item.name }}'
      osPolicyAssignment: '{{ item.osPolicyAssignment }}'
      osPolicyCompliances: '{{ item.osPolicyCompliances }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.osconfig.projects.locations.instances.vulnerabilityReports.list
  calls:
  - action: projects.locations.instances.vulnerabilityReports.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.vulnerabilityReports }}'
    item:
      highestUpgradableCveSeverity: '{{ item.highestUpgradableCveSeverity }}'
      name: '{{ item.name }}'
      updateTime: '{{ item.updateTime }}'
      vulnerabilities: '{{ item.vulnerabilities }}'
  uid_template: '{item.name}'
- discovery_id: gcp.osconfig.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.osconfig.projects.locations.osPolicyAssignments.list
  calls:
  - action: projects.locations.osPolicyAssignments.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.osPolicyAssignments }}'
    item:
      baseline: '{{ item.baseline }}'
      deleted: '{{ item.deleted }}'
      description: '{{ item.description }}'
      instanceFilter: '{{ item.instanceFilter }}'
      name: '{{ item.name }}'
      osPolicies: '{{ item.osPolicies }}'
      reconciling: '{{ item.reconciling }}'
      revisionCreateTime: '{{ item.revisionCreateTime }}'
      revisionId: '{{ item.revisionId }}'
      rollout: '{{ item.rollout }}'
      rolloutState: '{{ item.rolloutState }}'
      uid: '{{ item.uid }}'
  uid_template: '{item.name}'
- discovery_id: gcp.osconfig.projects.patchDeployments.list
  calls:
  - action: projects.patchDeployments.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.patchDeployments }}'
    item:
      createTime: '{{ item.createTime }}'
      description: '{{ item.description }}'
      duration: '{{ item.duration }}'
      instanceFilter: '{{ item.instanceFilter }}'
      lastExecuteTime: '{{ item.lastExecuteTime }}'
      name: '{{ item.name }}'
      oneTimeSchedule: '{{ item.oneTimeSchedule }}'
      patchConfig: '{{ item.patchConfig }}'
      recurringSchedule: '{{ item.recurringSchedule }}'
      rollout: '{{ item.rollout }}'
      state: '{{ item.state }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.osconfig.projects.patchJobs.instanceDetails.list
  calls:
  - action: projects.patchJobs.instanceDetails.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.instanceDetails }}'
    item:
      attemptCount: '{{ item.attemptCount }}'
      failureReason: '{{ item.failureReason }}'
      instanceSystemId: '{{ item.instanceSystemId }}'
      name: '{{ item.name }}'
      state: '{{ item.state }}'
  uid_template: '{item.name}'
- discovery_id: gcp.osconfig.projects.patchJobs.list
  calls:
  - action: projects.patchJobs.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.patchJobs }}'
    item:
      createTime: '{{ item.createTime }}'
      description: '{{ item.description }}'
      displayName: '{{ item.displayName }}'
      dryRun: '{{ item.dryRun }}'
      duration: '{{ item.duration }}'
      errorMessage: '{{ item.errorMessage }}'
      instanceDetailsSummary: '{{ item.instanceDetailsSummary }}'
      instanceFilter: '{{ item.instanceFilter }}'
      name: '{{ item.name }}'
      patchConfig: '{{ item.patchConfig }}'
      patchDeployment: '{{ item.patchDeployment }}'
      percentComplete: '{{ item.percentComplete }}'
      rollout: '{{ item.rollout }}'
      state: '{{ item.state }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.osconfig.projects.locations.instances.inventories.get
  for_each: gcp.osconfig.projects.patchJobs.list
  calls:
  - action: projects.locations.instances.inventories.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      items: '{{ response.items }}'
      name: '{{ response.name }}'
      osInfo: '{{ response.osInfo }}'
      updateTime: '{{ response.updateTime }}'
- discovery_id: gcp.osconfig.projects.locations.instances.osPolicyAssignments.reports.get
  for_each: gcp.osconfig.projects.locations.osPolicyAssignments.list
  calls:
  - action: projects.locations.instances.osPolicyAssignments.reports.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      instance: '{{ response.instance }}'
      lastRunId: '{{ response.lastRunId }}'
      name: '{{ response.name }}'
      osPolicyAssignment: '{{ response.osPolicyAssignment }}'
      osPolicyCompliances: '{{ response.osPolicyCompliances }}'
      updateTime: '{{ response.updateTime }}'
- discovery_id: gcp.osconfig.projects.locations.instances.vulnerabilityReports.get
  for_each: gcp.osconfig.projects.patchJobs.list
  calls:
  - action: projects.locations.instances.vulnerabilityReports.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      highestUpgradableCveSeverity: '{{ response.highestUpgradableCveSeverity }}'
      name: '{{ response.name }}'
      updateTime: '{{ response.updateTime }}'
      vulnerabilities: '{{ response.vulnerabilities }}'
- discovery_id: gcp.osconfig.projects.locations.operations.get
  for_each: gcp.osconfig.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
- discovery_id: gcp.osconfig.projects.locations.osPolicyAssignments.get
  for_each: gcp.osconfig.projects.locations.osPolicyAssignments.list
  calls:
  - action: projects.locations.osPolicyAssignments.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      baseline: '{{ response.baseline }}'
      deleted: '{{ response.deleted }}'
      description: '{{ response.description }}'
      instanceFilter: '{{ response.instanceFilter }}'
      name: '{{ response.name }}'
      osPolicies: '{{ response.osPolicies }}'
      reconciling: '{{ response.reconciling }}'
      revisionCreateTime: '{{ response.revisionCreateTime }}'
      revisionId: '{{ response.revisionId }}'
      rollout: '{{ response.rollout }}'
      rolloutState: '{{ response.rolloutState }}'
      uid: '{{ response.uid }}'
- discovery_id: gcp.osconfig.projects.locations.osPolicyAssignments.listRevisions
  for_each: gcp.osconfig.projects.locations.osPolicyAssignments.list
  calls:
  - action: projects.locations.osPolicyAssignments.listRevisions
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.osPolicyAssignments }}'
    item:
      baseline: '{{ item.baseline }}'
      deleted: '{{ item.deleted }}'
      description: '{{ item.description }}'
      instanceFilter: '{{ item.instanceFilter }}'
      name: '{{ item.name }}'
      osPolicies: '{{ item.osPolicies }}'
      reconciling: '{{ item.reconciling }}'
      revisionCreateTime: '{{ item.revisionCreateTime }}'
      revisionId: '{{ item.revisionId }}'
      rollout: '{{ item.rollout }}'
      rolloutState: '{{ item.rolloutState }}'
      uid: '{{ item.uid }}'
- discovery_id: gcp.osconfig.projects.locations.osPolicyAssignments.operations.get
  for_each: gcp.osconfig.projects.locations.operations.list
  calls:
  - action: projects.locations.osPolicyAssignments.operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
