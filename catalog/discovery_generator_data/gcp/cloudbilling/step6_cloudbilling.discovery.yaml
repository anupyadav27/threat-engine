version: '1.0'
provider: gcp
service: cloudbilling
services:
  client: cloudbilling
  module: googleapiclient.discovery.build('cloudbilling', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.cloudbilling.billingAccounts.get
  calls:
  - action: billingAccounts.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      currencyCode: '{{ response.currencyCode }}'
      displayName: '{{ response.displayName }}'
      masterBillingAccount: '{{ response.masterBillingAccount }}'
      name: '{{ response.name }}'
      open: '{{ response.open }}'
      parent: '{{ response.parent }}'
  uid_template: '{item.name}'
- discovery_id: gcp.cloudbilling.billingAccounts.getIamPolicy
  calls:
  - action: billingAccounts.getIamPolicy
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      auditConfigs: '{{ response.auditConfigs }}'
      bindings: '{{ response.bindings }}'
      version: '{{ response.version }}'
- discovery_id: gcp.cloudbilling.billingAccounts.list
  calls:
  - action: billingAccounts.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.billingAccounts }}'
    item:
      currencyCode: '{{ item.currencyCode }}'
      displayName: '{{ item.displayName }}'
      masterBillingAccount: '{{ item.masterBillingAccount }}'
      name: '{{ item.name }}'
      open: '{{ item.open }}'
      parent: '{{ item.parent }}'
  uid_template: '{item.name}'
- discovery_id: gcp.cloudbilling.billingAccounts.projects.list
  calls:
  - action: billingAccounts.projects.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.projects }}'
    item:
      billingAccountName: '{{ item.billingAccountName }}'
      billingEnabled: '{{ item.billingEnabled }}'
      name: '{{ item.name }}'
      projectId: '{{ item.projectId }}'
  uid_template: '{item.name}'
- discovery_id: gcp.cloudbilling.billingAccounts.subAccounts.list
  calls:
  - action: billingAccounts.subAccounts.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.subAccounts }}'
    item:
      currencyCode: '{{ item.currencyCode }}'
      displayName: '{{ item.displayName }}'
      masterBillingAccount: '{{ item.masterBillingAccount }}'
      name: '{{ item.name }}'
      open: '{{ item.open }}'
      parent: '{{ item.parent }}'
  uid_template: '{item.name}'
- discovery_id: gcp.cloudbilling.organizations.billingAccounts.list
  calls:
  - action: organizations.billingAccounts.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.billingAccounts }}'
    item:
      currencyCode: '{{ item.currencyCode }}'
      displayName: '{{ item.displayName }}'
      masterBillingAccount: '{{ item.masterBillingAccount }}'
      name: '{{ item.name }}'
      open: '{{ item.open }}'
      parent: '{{ item.parent }}'
  uid_template: '{item.name}'
- discovery_id: gcp.cloudbilling.organizations.billingAccounts.move
  calls:
  - action: organizations.billingAccounts.move
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      currencyCode: '{{ response.currencyCode }}'
      displayName: '{{ response.displayName }}'
      masterBillingAccount: '{{ response.masterBillingAccount }}'
      name: '{{ response.name }}'
      open: '{{ response.open }}'
      parent: '{{ response.parent }}'
  uid_template: '{item.name}'
- discovery_id: gcp.cloudbilling.projects.getBillingInfo
  calls:
  - action: projects.getBillingInfo
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      billingAccountName: '{{ response.billingAccountName }}'
      billingEnabled: '{{ response.billingEnabled }}'
      name: '{{ response.name }}'
      projectId: '{{ response.projectId }}'
  uid_template: '{item.name}'
- discovery_id: gcp.cloudbilling.services.list
  calls:
  - action: services.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.services }}'
    item:
      businessEntityName: '{{ item.businessEntityName }}'
      displayName: '{{ item.displayName }}'
      name: '{{ item.name }}'
      serviceId: '{{ item.serviceId }}'
  uid_template: '{item.name}'
- discovery_id: gcp.cloudbilling.services.skus.list
  calls:
  - action: services.skus.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.skus }}'
    item:
      category: '{{ item.category }}'
      description: '{{ item.description }}'
      geoTaxonomy: '{{ item.geoTaxonomy }}'
      name: '{{ item.name }}'
      pricingInfo: '{{ item.pricingInfo }}'
      serviceProviderName: '{{ item.serviceProviderName }}'
      serviceRegions: '{{ item.serviceRegions }}'
      skuId: '{{ item.skuId }}'
  uid_template: '{item.name}'
