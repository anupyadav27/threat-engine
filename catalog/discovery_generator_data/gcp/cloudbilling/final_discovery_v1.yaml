# ============================================================
# Discovery YAML — cloudbilling (final_discovery v1)
# Generated: 2026-04-16T11:27:57Z
# Check rules: auto | ops in scope: 1
# ============================================================
version: 'v1'
provider: gcp
service: cloudbilling

services:
  client: cloudbilling
  module: "googleapiclient.discovery.build('cloudbilling', 'v1')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: billingAccounts
    identifier_op: gcp.cloudbilling.billingAccounts.list
    identifier_field: name
    item_var_path: item.name
    identifier_template: '{name}'

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.cloudbilling.billingAccounts.list ──
  - discovery_id: gcp.cloudbilling.billingAccounts.list
    calls:
      - action: billingAccounts.list
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        bigqueryExport: '{{ item.bigqueryExport }}'
        bindings: '{{ item.bindings }}'
        costManagement: '{{ item.costManagement }}'
        displayName: '{{ item.displayName }}'
        masterBillingAccount: '{{ item.masterBillingAccount }}'
        name: '{{ item.name }}'
        open: '{{ item.open }}'
        parent: '{{ item.parent }}'
