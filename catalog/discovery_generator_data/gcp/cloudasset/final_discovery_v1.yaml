version: '1.0'
provider: gcp
service: cloudasset

services:
  client: cloudasset
  module: "googleapiclient.discovery.build('cloudasset', 'v1')"

# Resource identifiers — used by inventory engine for asset dedup/linking
inventory_resource_identifiers:
  - resource_type: unknown
    identifier_op: gcp.cloudasset.assets.list
    identifier_field: assets[].name
    item_var_path: item.assets[].name
  - resource_type: unknown
    identifier_op: gcp.cloudasset.feeds.list
    identifier_field: feeds[].name
    item_var_path: item.feeds[].name

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.cloudasset.assets.list ──
  - discovery_id: gcp.cloudasset.assets.list
    calls:
      - action: assets.list
        params:
          parent: '{{ project_id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        accessLevel: '{{ item.accessLevel }}'
        accessPolicy: '{{ item.accessPolicy }}'
        ancestors: '{{ item.ancestors }}'
        assetExceptions: '{{ item.assetExceptions }}'
        assetType: '{{ item.assetType }}'
        iamPolicy: '{{ item.iamPolicy }}'
        name: '{{ item.name }}'
        orgPolicy: '{{ item.orgPolicy }}'
        osInventory: '{{ item.osInventory }}'
        readTime: '{{ item.readTime }}'
        relatedAsset: '{{ item.relatedAsset }}'
        relatedAssets: '{{ item.relatedAssets }}'
        resource: '{{ item.resource }}'
        servicePerimeter: '{{ item.servicePerimeter }}'
        updateTime: '{{ item.updateTime }}'

  # ════ INDEPENDENT (root) operations ════
  # ── gcp.cloudasset.feeds.list ──
  - discovery_id: gcp.cloudasset.feeds.list
    calls:
      - action: feeds.list
        params:
          parent: '{{ project_id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        assetNames: '{{ item.assetNames }}'
        assetType: '{{ item.assetType }}'
        assetTypes: '{{ item.assetTypes }}'
        condition: '{{ item.condition }}'
        contentType: '{{ item.contentType }}'
        feedOutputConfig: '{{ item.feedOutputConfig }}'
        name: '{{ item.name }}'
        relationshipTypes: '{{ item.relationshipTypes }}'

