version: '1.0'
provider: gcp
service: cloudasset
services:
  client: cloudasset
  module: googleapiclient.discovery.build('cloudasset', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.cloudasset.assets.list
  calls:
  - action: assets.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.assets }}'
    item:
      accessLevel: '{{ item.accessLevel }}'
      accessPolicy: '{{ item.accessPolicy }}'
      ancestors: '{{ item.ancestors }}'
      assetExceptions: '{{ item.assetExceptions }}'
      assetType: '{{ item.assetType }}'
      iamPolicy: '{{ item.iamPolicy }}'
      name: '{{ item.name }}'
      orgPolicy: '{{ item.orgPolicy }}'
      osInventory: '{{ item.osInventory }}'
      relatedAsset: '{{ item.relatedAsset }}'
      relatedAssets: '{{ item.relatedAssets }}'
      resource: '{{ item.resource }}'
      servicePerimeter: '{{ item.servicePerimeter }}'
      updateTime: '{{ item.updateTime }}'
  uid_template: '{item.name}'
- discovery_id: gcp.cloudasset.feeds.list
  calls:
  - action: feeds.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.feeds }}'
    item:
      assetNames: '{{ item.assetNames }}'
      assetTypes: '{{ item.assetTypes }}'
      condition: '{{ item.condition }}'
      contentType: '{{ item.contentType }}'
      feedOutputConfig: '{{ item.feedOutputConfig }}'
      name: '{{ item.name }}'
      relationshipTypes: '{{ item.relationshipTypes }}'
  uid_template: '{item.name}'
- discovery_id: gcp.cloudasset.savedQueries.list
  calls:
  - action: savedQueries.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.savedQueries }}'
    item:
      content: '{{ item.content }}'
      createTime: '{{ item.createTime }}'
      creator: '{{ item.creator }}'
      description: '{{ item.description }}'
      labels: '{{ item.labels }}'
      lastUpdateTime: '{{ item.lastUpdateTime }}'
      lastUpdater: '{{ item.lastUpdater }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.cloudasset.v1.batchGetAssetsHistory
  calls:
  - action: v1.batchGetAssetsHistory
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      assets: '{{ response.assets }}'
- discovery_id: gcp.cloudasset.effectiveIamPolicies.batchGet
  calls:
  - action: effectiveIamPolicies.batchGet
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      policyResults: '{{ response.policyResults }}'
- discovery_id: gcp.cloudasset.feeds.get
  for_each: gcp.cloudasset.feeds.list
  calls:
  - action: feeds.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      assetNames: '{{ response.assetNames }}'
      assetTypes: '{{ response.assetTypes }}'
      condition: '{{ response.condition }}'
      contentType: '{{ response.contentType }}'
      feedOutputConfig: '{{ response.feedOutputConfig }}'
      name: '{{ response.name }}'
      relationshipTypes: '{{ response.relationshipTypes }}'
- discovery_id: gcp.cloudasset.operations.get
  calls:
  - action: operations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.cloudasset.savedQueries.get
  for_each: gcp.cloudasset.savedQueries.list
  calls:
  - action: savedQueries.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      content: '{{ response.content }}'
      createTime: '{{ response.createTime }}'
      creator: '{{ response.creator }}'
      description: '{{ response.description }}'
      labels: '{{ response.labels }}'
      lastUpdateTime: '{{ response.lastUpdateTime }}'
      lastUpdater: '{{ response.lastUpdater }}'
      name: '{{ response.name }}'
- discovery_id: gcp.cloudasset.v1.analyzeIamPolicy
  calls:
  - action: v1.analyzeIamPolicy
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      fullyExplored: '{{ response.fullyExplored }}'
      mainAnalysis: '{{ response.mainAnalysis }}'
      serviceAccountImpersonationAnalysis: '{{ response.serviceAccountImpersonationAnalysis
        }}'
- discovery_id: gcp.cloudasset.v1.analyzeMove
  calls:
  - action: v1.analyzeMove
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      moveAnalysis: '{{ response.moveAnalysis }}'
- discovery_id: gcp.cloudasset.v1.analyzeOrgPolicies
  calls:
  - action: v1.analyzeOrgPolicies
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      constraint: '{{ response.constraint }}'
      orgPolicyResults: '{{ response.orgPolicyResults }}'
- discovery_id: gcp.cloudasset.v1.analyzeOrgPolicyGovernedAssets
  calls:
  - action: v1.analyzeOrgPolicyGovernedAssets
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      constraint: '{{ response.constraint }}'
      governedAssets: '{{ response.governedAssets }}'
- discovery_id: gcp.cloudasset.v1.analyzeOrgPolicyGovernedContainers
  calls:
  - action: v1.analyzeOrgPolicyGovernedContainers
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      constraint: '{{ response.constraint }}'
      governedContainers: '{{ response.governedContainers }}'
- discovery_id: gcp.cloudasset.v1.searchAllIamPolicies
  calls:
  - action: v1.searchAllIamPolicies
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      results: '{{ response.results }}'
- discovery_id: gcp.cloudasset.v1.searchAllResources
  calls:
  - action: v1.searchAllResources
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      results: '{{ response.results }}'
