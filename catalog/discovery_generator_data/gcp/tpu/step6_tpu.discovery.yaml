version: '1.0'
provider: gcp
service: tpu
services:
  client: tpu
  module: googleapiclient.discovery.build('tpu', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.tpu.projects.locations.acceleratorTypes.list
  calls:
  - action: projects.locations.acceleratorTypes.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.acceleratorTypes }}'
    item:
      name: '{{ item.name }}'
      type: '{{ item.type }}'
  uid_template: '{item.name}'
- discovery_id: gcp.tpu.projects.locations.get
  calls:
  - action: projects.locations.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      displayName: '{{ response.displayName }}'
      labels: '{{ response.labels }}'
      locationId: '{{ response.locationId }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.tpu.projects.locations.list
  calls:
  - action: projects.locations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.locations }}'
    item:
      displayName: '{{ item.displayName }}'
      labels: '{{ item.labels }}'
      locationId: '{{ item.locationId }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
  uid_template: '{item.name}'
- discovery_id: gcp.tpu.projects.locations.nodes.list
  calls:
  - action: projects.locations.nodes.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.nodes }}'
    item:
      acceleratorType: '{{ item.acceleratorType }}'
      apiVersion: '{{ item.apiVersion }}'
      cidrBlock: '{{ item.cidrBlock }}'
      createTime: '{{ item.createTime }}'
      description: '{{ item.description }}'
      health: '{{ item.health }}'
      healthDescription: '{{ item.healthDescription }}'
      ipAddress: '{{ item.ipAddress }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      network: '{{ item.network }}'
      networkEndpoints: '{{ item.networkEndpoints }}'
      port: '{{ item.port }}'
      schedulingConfig: '{{ item.schedulingConfig }}'
      serviceAccount: '{{ item.serviceAccount }}'
      state: '{{ item.state }}'
      symptoms: '{{ item.symptoms }}'
      tensorflowVersion: '{{ item.tensorflowVersion }}'
      useServiceNetworking: '{{ item.useServiceNetworking }}'
  uid_template: '{item.name}'
- discovery_id: gcp.tpu.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.tpu.projects.locations.tensorflowVersions.list
  calls:
  - action: projects.locations.tensorflowVersions.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.tensorflowVersions }}'
    item:
      name: '{{ item.name }}'
      version: '{{ item.version }}'
  uid_template: '{item.name}'
- discovery_id: gcp.tpu.projects.locations.acceleratorTypes.get
  for_each: gcp.tpu.projects.locations.acceleratorTypes.list
  calls:
  - action: projects.locations.acceleratorTypes.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      name: '{{ response.name }}'
      type: '{{ response.type }}'
- discovery_id: gcp.tpu.projects.locations.nodes.get
  for_each: gcp.tpu.projects.locations.nodes.list
  calls:
  - action: projects.locations.nodes.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      acceleratorType: '{{ response.acceleratorType }}'
      apiVersion: '{{ response.apiVersion }}'
      cidrBlock: '{{ response.cidrBlock }}'
      createTime: '{{ response.createTime }}'
      description: '{{ response.description }}'
      health: '{{ response.health }}'
      healthDescription: '{{ response.healthDescription }}'
      ipAddress: '{{ response.ipAddress }}'
      labels: '{{ response.labels }}'
      name: '{{ response.name }}'
      network: '{{ response.network }}'
      networkEndpoints: '{{ response.networkEndpoints }}'
      port: '{{ response.port }}'
      schedulingConfig: '{{ response.schedulingConfig }}'
      serviceAccount: '{{ response.serviceAccount }}'
      state: '{{ response.state }}'
      symptoms: '{{ response.symptoms }}'
      tensorflowVersion: '{{ response.tensorflowVersion }}'
      useServiceNetworking: '{{ response.useServiceNetworking }}'
- discovery_id: gcp.tpu.projects.locations.operations.get
  for_each: gcp.tpu.projects.locations.operations.list
  calls:
  - action: projects.locations.operations.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      done: '{{ response.done }}'
      error: '{{ response.error }}'
      metadata: '{{ response.metadata }}'
      name: '{{ response.name }}'
      response: '{{ response.response }}'
- discovery_id: gcp.tpu.projects.locations.tensorflowVersions.get
  for_each: gcp.tpu.projects.locations.tensorflowVersions.list
  calls:
  - action: projects.locations.tensorflowVersions.get
    params:
      name: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      name: '{{ response.name }}'
      version: '{{ response.version }}'
