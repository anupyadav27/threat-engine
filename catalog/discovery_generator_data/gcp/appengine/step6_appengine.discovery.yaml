version: '1.0'
provider: gcp
service: appengine
services:
  client: appengine
  module: googleapiclient.discovery.build('appengine', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.appengine.apps.authorizedCertificates.get
  for_each: gcp.appengine.projects.locations.applications.authorizedCertificates.list
  calls:
  - action: apps.authorizedCertificates.get
    params:
      appsId: '{{ item.name }}'
      authorizedCertificatesId: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      certificateRawData: '{{ response.certificateRawData }}'
      displayName: '{{ response.displayName }}'
      domainMappingsCount: '{{ response.domainMappingsCount }}'
      domainNames: '{{ response.domainNames }}'
      expireTime: '{{ response.expireTime }}'
      id: '{{ response.id }}'
      managedCertificate: '{{ response.managedCertificate }}'
      name: '{{ response.name }}'
      visibleDomainMappings: '{{ response.visibleDomainMappings }}'
- discovery_id: gcp.appengine.apps.authorizedCertificates.list
  for_each: gcp.appengine.apps.listRuntimes
  calls:
  - action: apps.authorizedCertificates.list
    params:
      appsId: '{{ item.name }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.authorizedCertificates }}'
    item:
      certificateRawData: '{{ item.certificateRawData }}'
      displayName: '{{ item.displayName }}'
      domainMappingsCount: '{{ item.domainMappingsCount }}'
      domainNames: '{{ item.domainNames }}'
      expireTime: '{{ item.expireTime }}'
      id: '{{ item.id }}'
      managedCertificate: '{{ item.managedCertificate }}'
      name: '{{ item.name }}'
      visibleDomainMappings: '{{ item.visibleDomainMappings }}'
