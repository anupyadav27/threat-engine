version: '1.0'
provider: gcp
service: beyondcorp
services:
  client: beyondcorp
  module: googleapiclient.discovery.build('beyondcorp', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.beyondcorp.organizations.locations.operations.list
  calls:
  - action: organizations.locations.operations.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.operations }}'
    item:
      done: '{{ item.done }}'
      error: '{{ item.error }}'
      metadata: '{{ item.metadata }}'
      name: '{{ item.name }}'
      response: '{{ item.response }}'
  uid_template: '{item.name}'
- discovery_id: gcp.beyondcorp.projects.locations.appConnections.list
  calls:
  - action: projects.locations.appConnections.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.appConnections }}'
    item:
      applicationEndpoint: '{{ item.applicationEndpoint }}'
      connectors: '{{ item.connectors }}'
      createTime: '{{ item.createTime }}'
      displayName: '{{ item.displayName }}'
      gateway: '{{ item.gateway }}'
      labels: '{{ item.labels }}'
      name: '{{ item.name }}'
      satisfiesPzi: '{{ item.satisfiesPzi }}'
      satisfiesPzs: '{{ item.satisfiesPzs }}'
      state: '{{ item.state }}'
      type: '{{ item.type }}'
      uid: '{{ item.uid }}'
      updateTime: '{{ item.updateTime }}'
