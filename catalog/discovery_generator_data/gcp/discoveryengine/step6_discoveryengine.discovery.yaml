    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.cmekConfigs }}'
    item:
      isDefault: '{{ item.isDefault }}'
      kmsKey: '{{ item.kmsKey }}'
      kmsKeyVersion: '{{ item.kmsKeyVersion }}'
