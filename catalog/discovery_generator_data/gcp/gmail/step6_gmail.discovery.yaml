version: '1.0'
provider: gcp
service: gmail
services:
  client: gmail
  module: googleapiclient.discovery.build('gmail', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
discovery:
- discovery_id: gcp.gmail.users.drafts.get
  calls:
  - action: users.drafts.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      id: '{{ response.id }}'
      message: '{{ response.message }}'
  uid_template: '{item.id}'
- discovery_id: gcp.gmail.users.drafts.list
  calls:
  - action: users.drafts.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.drafts }}'
    item:
      id: '{{ item.id }}'
      message: '{{ item.message }}'
  uid_template: '{item.id}'
- discovery_id: gcp.gmail.users.getProfile
  calls:
  - action: users.getProfile
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      emailAddress: '{{ response.emailAddress }}'
      historyId: '{{ response.historyId }}'
      messagesTotal: '{{ response.messagesTotal }}'
      threadsTotal: '{{ response.threadsTotal }}'
- discovery_id: gcp.gmail.users.history.list
  calls:
  - action: users.history.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.history }}'
    item:
      id: '{{ item.id }}'
      labelsAdded: '{{ item.labelsAdded }}'
      labelsRemoved: '{{ item.labelsRemoved }}'
      messages: '{{ item.messages }}'
      messagesAdded: '{{ item.messagesAdded }}'
      messagesDeleted: '{{ item.messagesDeleted }}'
  uid_template: '{item.id}'
- discovery_id: gcp.gmail.users.labels.get
  calls:
  - action: users.labels.get
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      color: '{{ response.color }}'
      id: '{{ response.id }}'
      labelListVisibility: '{{ response.labelListVisibility }}'
      messageListVisibility: '{{ response.messageListVisibility }}'
      messagesTotal: '{{ response.messagesTotal }}'
      messagesUnread: '{{ response.messagesUnread }}'
      name: '{{ response.name }}'
      threadsTotal: '{{ response.threadsTotal }}'
      threadsUnread: '{{ response.threadsUnread }}'
      type: '{{ response.type }}'
  uid_template: '{item.name}'
- discovery_id: gcp.gmail.users.labels.list
  calls:
  - action: users.labels.list
    params: {}
    save_as: response
