- discovery_id: gcp.ces.projects.locations.apps.agents.list
  calls:
  - action: projects.locations.apps.agents.list
    params: {}
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.agents }}'
    item:
      afterAgentCallbacks: '{{ item.afterAgentCallbacks }}'
      afterModelCallbacks: '{{ item.afterModelCallbacks }}'
      afterToolCallbacks: '{{ item.afterToolCallbacks }}'
      beforeAgentCallbacks: '{{ item.beforeAgentCallbacks }}'
      beforeModelCallbacks: '{{ item.beforeModelCallbacks }}'
      beforeToolCallbacks: '{{ item.beforeToolCallbacks }}'
      childAgents: '{{ item.childAgents }}'
