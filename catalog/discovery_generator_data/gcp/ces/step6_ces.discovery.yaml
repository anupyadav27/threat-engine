      displayName: '{{ item.displayName }}'
      generatedSummary: '{{ item.generatedSummary }}'
      guardrails: '{{ item.guardrails }}'
      instruction: '{{ item.instruction }}'
      llmAgent: '{{ item.llmAgent }}'
      modelSettings: '{{ item.modelSettings }}'
      name: '{{ item.name }}'
      remoteDialogflowAgent: '{{ item.remoteDialogflowAgent }}'
      tools: '{{ item.tools }}'
      toolsets: '{{ item.toolsets }}'
      transferRules: '{{ item.transferRules }}'
