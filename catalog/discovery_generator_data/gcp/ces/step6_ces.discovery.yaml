version: '1.0'
provider: gcp
service: ces
services:
  client: ces
  module: googleapiclient.discovery.build('ces', 'v1')
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null
checks: []
