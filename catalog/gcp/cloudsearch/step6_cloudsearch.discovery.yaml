  # List all unmapped identities for a specific item. **Note:** This API requires an admin account to ex
  # ── gcp.cloudsearch.debug.datasources.items.unmappedids.list ──
  - discovery_id: gcp.cloudsearch.debug.datasources.items.unmappedids.list
    # python: svc.debug().datasources().items().unmappedids().list(**params).execute()
    calls:
      - action: debug.datasources.items.unmappedids.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.unmappedids }}'
      item:
        externalIdentity: '{{ item.externalIdentity }}'
        resolutionStatusCode: '{{ item.resolutionStatusCode }}'
  # Lists names of items associated with an unmapped identity. **Note:** This API requires an admin acco
