version: '1.0'
provider: gcp
service: calendar

services:
  client: calendar
  module: "googleapiclient.discovery.build('calendar', 'v3')"

# Anchors: fixed service-level parameters (caller provides values)
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # Returns the calendars on the user's calendar list.
  # ── gcp.calendar.calendarList.list ──
  - discovery_id: gcp.calendar.calendarList.list
    # python: svc.calendarList().list(**params).execute()
    calls:
      - action: calendarList.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.calendarList }}'
      item:
        accessRole: '{{ item.accessRole }}'
        autoAcceptInvitations: '{{ item.autoAcceptInvitations }}'
        backgroundColor: '{{ item.backgroundColor }}'
        colorId: '{{ item.colorId }}'
        conferenceProperties: '{{ item.conferenceProperties }}'
        dataOwner: '{{ item.dataOwner }}'
        defaultReminders: '{{ item.defaultReminders }}'
        deleted: '{{ item.deleted }}'
        description: '{{ item.description }}'
        foregroundColor: '{{ item.foregroundColor }}'
        hidden: '{{ item.hidden }}'
        id: '{{ item.id }}'
        location: '{{ item.location }}'
        notificationSettings: '{{ item.notificationSettings }}'
        primary: '{{ item.primary }}'
        selected: '{{ item.selected }}'
        summary: '{{ item.summary }}'
        summaryOverride: '{{ item.summaryOverride }}'
        timeZone: '{{ item.timeZone }}'
  # Returns the color definitions for calendars and events.
  # ── gcp.calendar.colors.get ──
  - discovery_id: gcp.calendar.colors.get
    # python: svc.colors().get(**params).execute()
    calls:
      - action: colors.get
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        calendar: '{{ response.calendar }}'
        event: '{{ response.event }}'
        updated: '{{ response.updated }}'
  # Returns free/busy information for a set of calendars.
  # ── gcp.calendar.freebusy.query ──
  - discovery_id: gcp.calendar.freebusy.query
    # python: svc.freebusy().query(**params).execute()
    calls:
      - action: freebusy.query
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.freebusy }}'
  # Returns all user settings for the authenticated user.
  # ── gcp.calendar.settings.list ──
  - discovery_id: gcp.calendar.settings.list
    # python: svc.settings().list(**params).execute()
    calls:
      - action: settings.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.settings }}'
      item:
        id: '{{ item.id }}'
        value: '{{ item.value }}'

  # ════ DEPENDENT (enrich) operations ════
  # Returns an access control rule.
  # ── gcp.calendar.acl.get [dependent] ──
  - discovery_id: gcp.calendar.acl.get
    # python: svc.acl().get(**params).execute()
    calls:
      - action: acl.get
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
        role: '{{ response.role }}'
        scope: '{{ response.scope }}'
    # required_params: ['calendarId', 'ruleId']
  # Returns the rules in the access control list for the calendar.
  # ── gcp.calendar.acl.list [dependent] ──
  - discovery_id: gcp.calendar.acl.list
