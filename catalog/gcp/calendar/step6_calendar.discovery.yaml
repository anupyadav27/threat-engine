  # ── gcp.calendar.calendars.get [dependent] ──
  - discovery_id: gcp.calendar.calendars.get
    # python: svc.calendars().get(**params).execute()
    calls:
      - action: calendars.get
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
