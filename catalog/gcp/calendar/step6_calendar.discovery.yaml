      item:
        id: '{{ item.id }}'
        role: '{{ item.role }}'
        scope: '{{ item.scope }}'
    # required_params: ['calendarId']
  # Returns a calendar from the user's calendar list.
  # ── gcp.calendar.calendarList.get [dependent] ──
  - discovery_id: gcp.calendar.calendarList.get
    # python: svc.calendarList().get(**params).execute()
    calls:
      - action: calendarList.get
        params: {}
        save_as: response
