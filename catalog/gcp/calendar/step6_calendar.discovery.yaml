  - discovery_id: gcp.calendar.settings.get
    for_each: gcp.calendar.settings.list
    # python: svc.settings().get(**params).execute()
    calls:
      - action: settings.get
        params:
          setting: '{{ item.id }}'
        save_as: response
        on_error: continue
    emit:
