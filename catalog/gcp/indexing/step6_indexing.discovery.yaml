version: '1.0'
provider: gcp
service: indexing

services:
  client: indexing
  module: "googleapiclient.discovery.build('indexing', 'v3')"

# Anchors: fixed service-level parameters (caller provides values)
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # Gets metadata about a Web Document. This method can _only_ be used to query URLs that were previousl
  # ── gcp.indexing.urlNotifications.getMetadata ──
  - discovery_id: gcp.indexing.urlNotifications.getMetadata
    # python: svc.urlNotifications().getMetadata(**params).execute()
    calls:
      - action: urlNotifications.getMetadata
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        latestRemove: '{{ response.latestRemove }}'
        latestUpdate: '{{ response.latestUpdate }}'
        url: '{{ response.url }}'
