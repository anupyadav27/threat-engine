version: '1.0'
provider: gcp
service: vault

services:
  client: vault
  module: "googleapiclient.discovery.build('vault', 'v1')"

# Anchors: fixed service-level parameters (caller provides values)
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # Lists matters the requestor has access to.
  # ── gcp.vault.matters.list ──
  - discovery_id: gcp.vault.matters.list
    # python: svc.matters().list(**params).execute()
    calls:
      - action: matters.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.matters }}'
      item:
        description: '{{ item.description }}'
        matterId: '{{ item.matterId }}'
        matterPermissions: '{{ item.matterPermissions }}'
        matterRegion: '{{ item.matterRegion }}'
        name: '{{ item.name }}'
        state: '{{ item.state }}'

  # ════ DEPENDENT (enrich) operations ════
  # Gets an export.
  # ── gcp.vault.matters.exports.get [dependent] ──
  - discovery_id: gcp.vault.matters.exports.get
    for_each: gcp.vault.matters.exports.list
    # python: svc.matters().exports().get(**params).execute()
    calls:
      - action: matters.exports.get
        params:
          exportId: '{{ item.name }}'
          matterId: '{{ item.name }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        cloudStorageSink: '{{ response.cloudStorageSink }}'
        createTime: '{{ response.createTime }}'
        exportOptions: '{{ response.exportOptions }}'
        id: '{{ response.id }}'
        matterId: '{{ response.matterId }}'
        name: '{{ response.name }}'
        parentExportId: '{{ response.parentExportId }}'
        query: '{{ response.query }}'
        requester: '{{ response.requester }}'
        stats: '{{ response.stats }}'
        status: '{{ response.status }}'
    # required_params: ['matterId', 'exportId']
  # Lists details about the exports in the specified matter.
  # ── gcp.vault.matters.exports.list [dependent] ──
  - discovery_id: gcp.vault.matters.exports.list
    for_each: gcp.vault.matters.list
    # python: svc.matters().exports().list(**params).execute()
    calls:
      - action: matters.exports.list
        params:
          matterId: '{{ item.name }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.exports }}'
      item:
        cloudStorageSink: '{{ item.cloudStorageSink }}'
        createTime: '{{ item.createTime }}'
        exportOptions: '{{ item.exportOptions }}'
        id: '{{ item.id }}'
        matterId: '{{ item.matterId }}'
        name: '{{ item.name }}'
        parentExportId: '{{ item.parentExportId }}'
        query: '{{ item.query }}'
        requester: '{{ item.requester }}'
        stats: '{{ item.stats }}'
        status: '{{ item.status }}'
    # required_params: ['matterId']
  # Gets the specified matter.
  # ── gcp.vault.matters.get [dependent] ──
  - discovery_id: gcp.vault.matters.get
    for_each: gcp.vault.matters.list
    # python: svc.matters().get(**params).execute()
    calls:
      - action: matters.get
        params:
          matterId: '{{ item.name }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        description: '{{ response.description }}'
        matterId: '{{ response.matterId }}'
        matterPermissions: '{{ response.matterPermissions }}'
        matterRegion: '{{ response.matterRegion }}'
        name: '{{ response.name }}'
        state: '{{ response.state }}'
    # required_params: ['matterId']
