        holdId: '{{ item.holdId }}'
        name: '{{ item.name }}'
        orgUnit: '{{ item.orgUnit }}'
        query: '{{ item.query }}'
        updateTime: '{{ item.updateTime }}'
    # required_params: ['matterId']
  # Retrieves the specified saved query.
  # ── gcp.vault.matters.savedQueries.get [dependent] ──
  - discovery_id: gcp.vault.matters.savedQueries.get
    for_each: gcp.vault.matters.savedQueries.list
    # python: svc.matters().savedQueries().get(**params).execute()
    calls:
      - action: matters.savedQueries.get
        params:
          matterId: '{{ item.name }}'
          savedQueryId: '{{ item.query }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        createTime: '{{ response.createTime }}'
        displayName: '{{ response.displayName }}'
        matterId: '{{ response.matterId }}'
        query: '{{ response.query }}'
        savedQueryId: '{{ response.savedQueryId }}'
    # required_params: ['matterId', 'savedQueryId']
  # Lists the saved queries in a matter.
  # ── gcp.vault.matters.savedQueries.list [dependent] ──
  - discovery_id: gcp.vault.matters.savedQueries.list
    for_each: gcp.vault.matters.list
    # python: svc.matters().savedQueries().list(**params).execute()
    calls:
      - action: matters.savedQueries.list
        params:
          matterId: '{{ item.name }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.savedQueries }}'
      item:
        createTime: '{{ item.createTime }}'
        displayName: '{{ item.displayName }}'
        matterId: '{{ item.matterId }}'
        query: '{{ item.query }}'
        savedQueryId: '{{ item.savedQueryId }}'
    # required_params: ['matterId']
  # Gets the latest state of a long-running operation. Clients can use this method to poll the operation
  # ── gcp.vault.operations.get [dependent] ──
  - discovery_id: gcp.vault.operations.get
    for_each: gcp.vault.operations.list
    # python: svc.operations().get(**params).execute()
    calls:
      - action: operations.get
        params:
          name: '{{ item.name }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        done: '{{ response.done }}'
        error: '{{ response.error }}'
        metadata: '{{ response.metadata }}'
        name: '{{ response.name }}'
        response: '{{ response.response }}'
