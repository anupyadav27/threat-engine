# ============================================================
# Discovery YAML — admob (v1)
# Generated: 2026-02-21T03:06:38Z
# Sources: step2 (ops) | step3 (dep chain) | step4/step5 (fields)
# read ops: 4 | independent: 4 | dependent: 0
# ops with fields: 4/4 | dep ops with chain: 0/0
