version: '1.0'
provider: gcp
service: admob

services:
  client: admob
  module: "googleapiclient.discovery.build('admob', 'v1')"

# Anchors: fixed service-level parameters (caller provides values)
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # List the ad units under the specified AdMob account.
  # ── gcp.admob.accounts.adUnits.list ──
  - discovery_id: gcp.admob.accounts.adUnits.list
    # python: svc.accounts().adUnits().list(**params).execute()
    calls:
      - action: accounts.adUnits.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.adUnits }}'
      item:
        adFormat: '{{ item.adFormat }}'
        adTypes: '{{ item.adTypes }}'
        adUnitId: '{{ item.adUnitId }}'
        appId: '{{ item.appId }}'
        displayName: '{{ item.displayName }}'
        name: '{{ item.name }}'
  # List the apps under the specified AdMob account.
  # ── gcp.admob.accounts.apps.list ──
  - discovery_id: gcp.admob.accounts.apps.list
    # python: svc.accounts().apps().list(**params).execute()
    calls:
      - action: accounts.apps.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.apps }}'
      item:
        appApprovalState: '{{ item.appApprovalState }}'
        appId: '{{ item.appId }}'
        linkedAppInfo: '{{ item.linkedAppInfo }}'
        manualAppInfo: '{{ item.manualAppInfo }}'
        name: '{{ item.name }}'
        platform: '{{ item.platform }}'
  # Gets information about the specified AdMob publisher account.
  # ── gcp.admob.accounts.get ──
  - discovery_id: gcp.admob.accounts.get
    # python: svc.accounts().get(**params).execute()
    calls:
      - action: accounts.get
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        currencyCode: '{{ response.currencyCode }}'
        name: '{{ response.name }}'
        publisherId: '{{ response.publisherId }}'
        reportingTimeZone: '{{ response.reportingTimeZone }}'
  # Lists the AdMob publisher account that was most recently signed in to from the AdMob UI. For more in
  # ── gcp.admob.accounts.list ──
  - discovery_id: gcp.admob.accounts.list
    # python: svc.accounts().list(**params).execute()
    calls:
      - action: accounts.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.accounts }}'
      item:
        currencyCode: '{{ item.currencyCode }}'
        name: '{{ item.name }}'
        publisherId: '{{ item.publisherId }}'
        reportingTimeZone: '{{ item.reportingTimeZone }}'
