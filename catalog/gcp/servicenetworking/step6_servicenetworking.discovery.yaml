    # python: svc.services().connections().list(**params).execute()
    calls:
      - action: services.connections.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.connections }}'
      item:
        network: '{{ item.network }}'
        peering: '{{ item.peering }}'
        reservedPeeringRanges: '{{ item.reservedPeeringRanges }}'
        service: '{{ item.service }}'
