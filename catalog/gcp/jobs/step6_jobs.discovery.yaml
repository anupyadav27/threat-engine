# ============================================================
# Discovery YAML — jobs (v3p1beta1)
# Generated: 2026-02-21T03:06:40Z
# Sources: step2 (ops) | step3 (dep chain) | step4/step5 (fields)
# read ops: 7 | independent: 4 | dependent: 3
# ops with fields: 7/7 | dep ops with chain: 2/3
