version: '1.0'
provider: gcp
service: ml

services:
  client: ml
  module: "googleapiclient.discovery.build('ml', 'v1')"

# Anchors: fixed service-level parameters (caller provides values)
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # Get the service account information associated with your project. You need this information in order
  # ── gcp.ml.projects.getConfig ──
  - discovery_id: gcp.ml.projects.getConfig
    # python: svc.projects().getConfig(**params).execute()
    calls:
      - action: projects.getConfig
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        config: '{{ response.config }}'
        serviceAccount: '{{ response.serviceAccount }}'
        serviceAccountProject: '{{ response.serviceAccountProject }}'
  # Lists the jobs in the project. If there are no jobs that match the request parameters, the list requ
  # ── gcp.ml.projects.jobs.list ──
  - discovery_id: gcp.ml.projects.jobs.list
    # python: svc.projects().jobs().list(**params).execute()
    calls:
      - action: projects.jobs.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.jobs }}'
      item:
        createTime: '{{ item.createTime }}'
        endTime: '{{ item.endTime }}'
        errorMessage: '{{ item.errorMessage }}'
        jobId: '{{ item.jobId }}'
        jobPosition: '{{ item.jobPosition }}'
        labels: '{{ item.labels }}'
        predictionInput: '{{ item.predictionInput }}'
