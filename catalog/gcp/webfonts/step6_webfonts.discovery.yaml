# ============================================================
# Discovery YAML — webfonts (v1)
# Generated: 2026-02-21T03:06:41Z
# Sources: step2 (ops) | step3 (dep chain) | step4/step5 (fields)
# read ops: 1 | independent: 1 | dependent: 0
# ops with fields: 1/1 | dep ops with chain: 0/0
# ============================================================
version: '1.0'
provider: gcp
service: webfonts

services:
  client: webfonts
  module: "googleapiclient.discovery.build('webfonts', 'v1')"

# Anchors: fixed service-level parameters (caller provides values)
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # Retrieves the list of fonts currently served by the Google Fonts Developer API.
  # ── gcp.webfonts.webfonts.list ──
  - discovery_id: gcp.webfonts.webfonts.list
    # python: svc.webfonts().list(**params).execute()
    calls:
      - action: webfonts.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.webfonts }}'
      item:
        axes: '{{ item.axes }}'
        category: '{{ item.category }}'
        colorCapabilities: '{{ item.colorCapabilities }}'
        family: '{{ item.family }}'
        files: '{{ item.files }}'
        lastModified: '{{ item.lastModified }}'
        menu: '{{ item.menu }}'
        subsets: '{{ item.subsets }}'
        tags: '{{ item.tags }}'
        variants: '{{ item.variants }}'
        version: '{{ item.version }}'
