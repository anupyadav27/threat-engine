  # Gets a web app.
  # ── gcp.androidmanagement.enterprises.webApps.get [dependent] ──
  - discovery_id: gcp.androidmanagement.enterprises.webApps.get
    for_each: gcp.androidmanagement.enterprises.webApps.list
    # python: svc.enterprises().webApps().get(**params).execute()
    calls:
      - action: enterprises.webApps.get
        params:
          name: '{{ item.name }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        displayMode: '{{ response.displayMode }}'
        icons: '{{ response.icons }}'
        name: '{{ response.name }}'
        startUrl: '{{ response.startUrl }}'
        title: '{{ response.title }}'
        versionCode: '{{ response.versionCode }}'
    # required_params: ['name']
  # Get the device provisioning information by the identifier provided in the sign-in url.
