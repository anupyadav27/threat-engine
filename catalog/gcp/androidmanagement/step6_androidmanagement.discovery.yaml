  - discovery_id: gcp.androidmanagement.provisioningInfo.get
    # python: svc.provisioningInfo().get(**params).execute()
    calls:
      - action: provisioningInfo.get
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
