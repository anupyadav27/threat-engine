version: '1.0'
provider: gcp
service: threatintelligence

services:
  client: threatintelligence
  module: "googleapiclient.discovery.build('threatintelligence', 'v1beta')"

# Anchors: fixed service-level parameters (caller provides values)
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # EnumerateAlertFacets returns the facets and the number of alerts that meet the filter criteria and h
  # ── gcp.threatintelligence.projects.alerts.enumerateFacets ──
  - discovery_id: gcp.threatintelligence.projects.alerts.enumerateFacets
    # python: svc.projects().alerts().enumerateFacets(**params).execute()
    calls:
      - action: projects.alerts.enumerateFacets
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        facets: '{{ response.facets }}'
  # Get a list of alerts that meet the filter criteria.
  # ── gcp.threatintelligence.projects.alerts.list ──
  - discovery_id: gcp.threatintelligence.projects.alerts.list
    # python: svc.projects().alerts().list(**params).execute()
    calls:
      - action: projects.alerts.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.alerts }}'
      item:
        aiSummary: '{{ item.aiSummary }}'
        audit: '{{ item.audit }}'
        configurations: '{{ item.configurations }}'
        detail: '{{ item.detail }}'
        displayName: '{{ item.displayName }}'
        duplicateOf: '{{ item.duplicateOf }}'
        duplicatedBy: '{{ item.duplicatedBy }}'
        externalId: '{{ item.externalId }}'
        findingCount: '{{ item.findingCount }}'
        findings: '{{ item.findings }}'
        name: '{{ item.name }}'
        priorityAnalysis: '{{ item.priorityAnalysis }}'
        relevanceAnalysis: '{{ item.relevanceAnalysis }}'
        severityAnalysis: '{{ item.severityAnalysis }}'
        state: '{{ item.state }}'
  # Get a list of configurations that meet the filter criteria.
  # ── gcp.threatintelligence.projects.configurations.list ──
  - discovery_id: gcp.threatintelligence.projects.configurations.list
    # python: svc.projects().configurations().list(**params).execute()
    calls:
      - action: projects.configurations.list
        params: {}
        save_as: response
