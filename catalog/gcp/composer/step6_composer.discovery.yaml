version: '1.0'
provider: gcp
service: composer

services:
  client: composer
  module: "googleapiclient.discovery.build('composer', 'v1')"

# Anchors: fixed service-level parameters (caller provides values)
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # List environments.
  # ── gcp.composer.projects.locations.environments.list ──
  - discovery_id: gcp.composer.projects.locations.environments.list
    # python: svc.projects().locations().environments().list(**params).execute()
    calls:
      - action: projects.locations.environments.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.environments }}'
      item:
        config: '{{ item.config }}'
        createTime: '{{ item.createTime }}'
        labels: '{{ item.labels }}'
        name: '{{ item.name }}'
        satisfiesPzi: '{{ item.satisfiesPzi }}'
        satisfiesPzs: '{{ item.satisfiesPzs }}'
        state: '{{ item.state }}'
        storageConfig: '{{ item.storageConfig }}'
        updateTime: '{{ item.updateTime }}'
        uuid: '{{ item.uuid }}'
  # Lists user workloads ConfigMaps. This method is supported for Cloud Composer environments in version
