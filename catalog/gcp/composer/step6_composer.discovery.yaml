        on_error: continue
    emit:
      as: item
      items_for: '{{ response.userWorkloadsConfigMaps }}'
      item:
        data: '{{ item.data }}'
        name: '{{ item.name }}'
  # Lists user workloads Secrets. This method is supported for Cloud Composer environments in versions c
