  # Lists all datasets in the specified project to which the user has been granted the READER dataset ro
  # ── gcp.bigquery.datasets.list ──
  - discovery_id: gcp.bigquery.datasets.list
    # python: svc.datasets().list(**params).execute()
    calls:
      - action: datasets.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.datasets }}'
  # Lists all jobs that you started in the specified project. Job information is available for a six mon
  # ── gcp.bigquery.jobs.list ──
  - discovery_id: gcp.bigquery.jobs.list
    # python: svc.jobs().list(**params).execute()
    calls:
      - action: jobs.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.jobs }}'
  # Runs a BigQuery SQL query synchronously and returns query results if the query completes within a sp
  # ── gcp.bigquery.jobs.query ──
  - discovery_id: gcp.bigquery.jobs.query
    # python: svc.jobs().query(**params).execute()
    calls:
      - action: jobs.query
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.jobs }}'
      item:
        debugInfo: '{{ item.debugInfo }}'
        message: '{{ item.message }}'
        reason: '{{ item.reason }}'
  # RPC to get the service account for a project used for interactions with Google Cloud KMS
  # ── gcp.bigquery.projects.getServiceAccount ──
  - discovery_id: gcp.bigquery.projects.getServiceAccount
    # python: svc.projects().getServiceAccount(**params).execute()
    calls:
      - action: projects.getServiceAccount
        params: {}
        save_as: response
        on_error: continue
    emit:
