        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.operations }}'
      item:
        done: '{{ item.done }}'
        error: '{{ item.error }}'
        metadata: '{{ item.metadata }}'
        name: '{{ item.name }}'
        response: '{{ item.response }}'

