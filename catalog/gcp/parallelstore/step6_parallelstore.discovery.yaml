        capacityGib: '{{ response.capacityGib }}'
        createTime: '{{ response.createTime }}'
        daosVersion: '{{ response.daosVersion }}'
        deploymentType: '{{ response.deploymentType }}'
        description: '{{ response.description }}'
        directoryStripeLevel: '{{ response.directoryStripeLevel }}'
        effectiveReservedIpRange: '{{ response.effectiveReservedIpRange }}'
        fileStripeLevel: '{{ response.fileStripeLevel }}'
        labels: '{{ response.labels }}'
        name: '{{ response.name }}'
        network: '{{ response.network }}'
