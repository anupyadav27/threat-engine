version: '1.0'
provider: gcp
service: parallelstore

services:
  client: parallelstore
  module: "googleapiclient.discovery.build('parallelstore', 'v1')"

# Anchors: fixed service-level parameters (caller provides values)
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # Gets information about a location.
  # ── gcp.parallelstore.projects.locations.get ──
  - discovery_id: gcp.parallelstore.projects.locations.get
    # python: svc.projects().locations().get(**params).execute()
    calls:
      - action: projects.locations.get
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        displayName: '{{ response.displayName }}'
        labels: '{{ response.labels }}'
        locationId: '{{ response.locationId }}'
        metadata: '{{ response.metadata }}'
        name: '{{ response.name }}'
  # Lists all instances in a given project and location.
  # ── gcp.parallelstore.projects.locations.instances.list ──
  - discovery_id: gcp.parallelstore.projects.locations.instances.list
    # python: svc.projects().locations().instances().list(**params).execute()
    calls:
      - action: projects.locations.instances.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.instances }}'
      item:
        accessPoints: '{{ item.accessPoints }}'
        capacityGib: '{{ item.capacityGib }}'
        createTime: '{{ item.createTime }}'
        daosVersion: '{{ item.daosVersion }}'
        deploymentType: '{{ item.deploymentType }}'
        description: '{{ item.description }}'
        directoryStripeLevel: '{{ item.directoryStripeLevel }}'
        effectiveReservedIpRange: '{{ item.effectiveReservedIpRange }}'
        fileStripeLevel: '{{ item.fileStripeLevel }}'
        labels: '{{ item.labels }}'
        name: '{{ item.name }}'
        network: '{{ item.network }}'
        reservedIpRange: '{{ item.reservedIpRange }}'
        state: '{{ item.state }}'
        updateTime: '{{ item.updateTime }}'
  # Lists information about the supported locations for this service.
  # ── gcp.parallelstore.projects.locations.list ──
  - discovery_id: gcp.parallelstore.projects.locations.list
    # python: svc.projects().locations().list(**params).execute()
    calls:
      - action: projects.locations.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.locations }}'
      item:
        displayName: '{{ item.displayName }}'
        labels: '{{ item.labels }}'
        locationId: '{{ item.locationId }}'
        metadata: '{{ item.metadata }}'
        name: '{{ item.name }}'
