        latestEndTime: '{{ item.latestEndTime }}'
        name: '{{ item.name }}'
        phoneUser: '{{ item.phoneUser }}'
        signedinUser: '{{ item.signedinUser }}'
  # Lists the participant sessions of a participant in a conference record. By default, ordered by join 
  # ── gcp.meet.conferenceRecords.participants.participantSessions.list ──
  - discovery_id: gcp.meet.conferenceRecords.participants.participantSessions.list
    # python: svc.conferenceRecords().participants().participantSessions().list(**params).execute()
