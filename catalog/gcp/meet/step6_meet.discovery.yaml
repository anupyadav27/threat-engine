version: '1.0'
provider: gcp
service: meet

services:
  client: meet
  module: "googleapiclient.discovery.build('meet', 'v2')"

# Anchors: fixed service-level parameters (caller provides values)
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # Lists the conference records. By default, ordered by start time and in descending order.
  # ── gcp.meet.conferenceRecords.list ──
  - discovery_id: gcp.meet.conferenceRecords.list
    # python: svc.conferenceRecords().list(**params).execute()
    calls:
      - action: conferenceRecords.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.conferenceRecords }}'
      item:
        endTime: '{{ item.endTime }}'
        expireTime: '{{ item.expireTime }}'
        name: '{{ item.name }}'
        space: '{{ item.space }}'
        startTime: '{{ item.startTime }}'
  # Lists the participants in a conference record. By default, ordered by join time and in descending or
  # ── gcp.meet.conferenceRecords.participants.list ──
  - discovery_id: gcp.meet.conferenceRecords.participants.list
    # python: svc.conferenceRecords().participants().list(**params).execute()
