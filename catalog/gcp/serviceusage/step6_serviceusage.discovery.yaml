  # ── gcp.serviceusage.services.list ──
  - discovery_id: gcp.serviceusage.services.list
    # python: svc.services().list(**params).execute()
    calls:
      - action: services.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.services }}'
      item:
        config: '{{ item.config }}'
        name: '{{ item.name }}'
        parent: '{{ item.parent }}'
        state: '{{ item.state }}'

