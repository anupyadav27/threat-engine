version: '1.0'
provider: gcp
service: content

services:
  client: content
  module: "googleapiclient.discovery.build('content', 'v2.1')"

# Anchors: fixed service-level parameters (caller provides values)
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # Returns information about the authenticated user.
  # ── gcp.content.accounts.authinfo ──
  - discovery_id: gcp.content.accounts.authinfo
    # python: svc.accounts().authinfo(**params).execute()
    calls:
      - action: accounts.authinfo
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        accountIdentifiers: '{{ response.accountIdentifiers }}'
  # Lists the labels assigned to an account.
  # ── gcp.content.accounts.labels.list ──
  - discovery_id: gcp.content.accounts.labels.list
    # python: svc.accounts().labels().list(**params).execute()
    calls:
      - action: accounts.labels.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.labels }}'
      item:
        accountId: '{{ item.accountId }}'
        description: '{{ item.description }}'
        labelId: '{{ item.labelId }}'
        labelType: '{{ item.labelType }}'
        name: '{{ item.name }}'
  # Lists available return carriers in the merchant account.
  # ── gcp.content.accounts.returncarrier.list ──
  - discovery_id: gcp.content.accounts.returncarrier.list
    # python: svc.accounts().returncarrier().list(**params).execute()
    calls:
      - action: accounts.returncarrier.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.returncarrier }}'
      item:
        carrierAccountId: '{{ item.carrierAccountId }}'
        carrierAccountName: '{{ item.carrierAccountName }}'
        carrierAccountNumber: '{{ item.carrierAccountNumber }}'
        carrierCode: '{{ item.carrierCode }}'
  # Retrieves the list of POS data providers that have active settings for the all eiligible countries.
  # ── gcp.content.liasettings.listposdataproviders ──
  - discovery_id: gcp.content.liasettings.listposdataproviders
    # python: svc.liasettings().listposdataproviders(**params).execute()
    calls:
      - action: liasettings.listposdataproviders
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.liasettings }}'
      item:
        country: '{{ item.country }}'
        posDataProviders: '{{ item.posDataProviders }}'

