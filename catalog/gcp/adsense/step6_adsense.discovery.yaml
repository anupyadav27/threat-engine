    # python: svc.accounts().adclients().adunits().list(**params).execute()
    calls:
      - action: accounts.adclients.adunits.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.adunits }}'
      item:
        contentAdsSettings: '{{ item.contentAdsSettings }}'
        displayName: '{{ item.displayName }}'
        name: '{{ item.name }}'
        reportingDimensionId: '{{ item.reportingDimensionId }}'
