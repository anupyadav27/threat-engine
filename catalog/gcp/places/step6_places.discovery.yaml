version: '1.0'
provider: gcp
service: places

services:
  client: places
  module: "googleapiclient.discovery.build('places', 'v1')"

# Anchors: fixed service-level parameters (caller provides values)
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null

checks: []

discovery:


  # ════ DEPENDENT (enrich) operations ════
  # Get the details of a place based on its resource name, which is a string in the `places/{place_id}` 
  # ── gcp.places.places.get [dependent] ──
  - discovery_id: gcp.places.places.get
    # python: svc.places().get(**params).execute()
    calls:
      - action: places.get
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        accessibilityOptions: '{{ response.accessibilityOptions }}'
        addressComponents: '{{ response.addressComponents }}'
        addressDescriptor: '{{ response.addressDescriptor }}'
        adrFormatAddress: '{{ response.adrFormatAddress }}'
        allowsDogs: '{{ response.allowsDogs }}'
        attributions: '{{ response.attributions }}'
        businessStatus: '{{ response.businessStatus }}'
        consumerAlert: '{{ response.consumerAlert }}'
        containingPlaces: '{{ response.containingPlaces }}'
        curbsidePickup: '{{ response.curbsidePickup }}'
        currentOpeningHours: '{{ response.currentOpeningHours }}'
        currentSecondaryOpeningHours: '{{ response.currentSecondaryOpeningHours }}'
        delivery: '{{ response.delivery }}'
        dineIn: '{{ response.dineIn }}'
        displayName: '{{ response.displayName }}'
        editorialSummary: '{{ response.editorialSummary }}'
        evChargeAmenitySummary: '{{ response.evChargeAmenitySummary }}'
        evChargeOptions: '{{ response.evChargeOptions }}'
        formattedAddress: '{{ response.formattedAddress }}'
        fuelOptions: '{{ response.fuelOptions }}'
        generativeSummary: '{{ response.generativeSummary }}'
        goodForChildren: '{{ response.goodForChildren }}'
        goodForGroups: '{{ response.goodForGroups }}'
        goodForWatchingSports: '{{ response.goodForWatchingSports }}'
        googleMapsLinks: '{{ response.googleMapsLinks }}'
        googleMapsTypeLabel: '{{ response.googleMapsTypeLabel }}'
        googleMapsUri: '{{ response.googleMapsUri }}'
        iconBackgroundColor: '{{ response.iconBackgroundColor }}'
        iconMaskBaseUri: '{{ response.iconMaskBaseUri }}'
        id: '{{ response.id }}'
        internationalPhoneNumber: '{{ response.internationalPhoneNumber }}'
        liveMusic: '{{ response.liveMusic }}'
        location: '{{ response.location }}'
        menuForChildren: '{{ response.menuForChildren }}'
        movedPlace: '{{ response.movedPlace }}'
        movedPlaceId: '{{ response.movedPlaceId }}'
        name: '{{ response.name }}'
        nationalPhoneNumber: '{{ response.nationalPhoneNumber }}'
        neighborhoodSummary: '{{ response.neighborhoodSummary }}'
        outdoorSeating: '{{ response.outdoorSeating }}'
        parkingOptions: '{{ response.parkingOptions }}'
        paymentOptions: '{{ response.paymentOptions }}'
        photos: '{{ response.photos }}'
        plusCode: '{{ response.plusCode }}'
        postalAddress: '{{ response.postalAddress }}'
        priceLevel: '{{ response.priceLevel }}'
        priceRange: '{{ response.priceRange }}'
        primaryType: '{{ response.primaryType }}'
        primaryTypeDisplayName: '{{ response.primaryTypeDisplayName }}'
        pureServiceAreaBusiness: '{{ response.pureServiceAreaBusiness }}'
        rating: '{{ response.rating }}'
        regularOpeningHours: '{{ response.regularOpeningHours }}'
        regularSecondaryOpeningHours: '{{ response.regularSecondaryOpeningHours }}'
        reservable: '{{ response.reservable }}'
        restroom: '{{ response.restroom }}'
        reviewSummary: '{{ response.reviewSummary }}'
        reviews: '{{ response.reviews }}'
        servesBeer: '{{ response.servesBeer }}'
        servesBreakfast: '{{ response.servesBreakfast }}'
        servesBrunch: '{{ response.servesBrunch }}'
        servesCocktails: '{{ response.servesCocktails }}'
        servesCoffee: '{{ response.servesCoffee }}'
        servesDessert: '{{ response.servesDessert }}'
        servesDinner: '{{ response.servesDinner }}'
        servesLunch: '{{ response.servesLunch }}'
        servesVegetarianFood: '{{ response.servesVegetarianFood }}'
        servesWine: '{{ response.servesWine }}'
        shortFormattedAddress: '{{ response.shortFormattedAddress }}'
        subDestinations: '{{ response.subDestinations }}'
        takeout: '{{ response.takeout }}'
        timeZone: '{{ response.timeZone }}'
        types: '{{ response.types }}'
        userRatingCount: '{{ response.userRatingCount }}'
        utcOffsetMinutes: '{{ response.utcOffsetMinutes }}'
        viewport: '{{ response.viewport }}'
        websiteUri: '{{ response.websiteUri }}'
    # required_params: ['name']
  # Get a photo media with a photo reference string.
  # ── gcp.places.places.photos.getMedia [dependent] ──
  - discovery_id: gcp.places.places.photos.getMedia
    # python: svc.places().photos().getMedia(**params).execute()
    calls:
      - action: places.photos.getMedia
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        name: '{{ response.name }}'
        photoUri: '{{ response.photoUri }}'
    # required_params: ['name']
