version: '1.0'
provider: gcp
service: docs

services:
  client: docs
  module: "googleapiclient.discovery.build('docs', 'v1')"

# Anchors: fixed service-level parameters (caller provides values)
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null

checks: []

discovery:


  # ════ DEPENDENT (enrich) operations ════
  # Gets the latest version of the specified document.
  # ── gcp.docs.documents.get [dependent] ──
  - discovery_id: gcp.docs.documents.get
    # python: svc.documents().get(**params).execute()
    calls:
      - action: documents.get
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        body: '{{ response.body }}'
        documentId: '{{ response.documentId }}'
        documentStyle: '{{ response.documentStyle }}'
        footers: '{{ response.footers }}'
        footnotes: '{{ response.footnotes }}'
        headers: '{{ response.headers }}'
        inlineObjects: '{{ response.inlineObjects }}'
        lists: '{{ response.lists }}'
        namedRanges: '{{ response.namedRanges }}'
        namedStyles: '{{ response.namedStyles }}'
        positionedObjects: '{{ response.positionedObjects }}'
        revisionId: '{{ response.revisionId }}'
        suggestedDocumentStyleChanges: '{{ response.suggestedDocumentStyleChanges }}'
        suggestedNamedStylesChanges: '{{ response.suggestedNamedStylesChanges }}'
        suggestionsViewMode: '{{ response.suggestionsViewMode }}'
        tabs: '{{ response.tabs }}'
        title: '{{ response.title }}'
    # required_params: ['documentId']
