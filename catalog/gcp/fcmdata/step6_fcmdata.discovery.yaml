# ============================================================
# Discovery YAML — fcmdata (v1beta1)
# Generated: 2026-02-21T03:06:40Z
# Sources: step2 (ops) | step3 (dep chain) | step4/step5 (fields)
# read ops: 1 | independent: 1 | dependent: 0
# ops with fields: 1/1 | dep ops with chain: 0/0
# ============================================================
version: '1.0'
provider: gcp
service: fcmdata

services:
  client: fcmdata
  module: "googleapiclient.discovery.build('fcmdata', 'v1beta1')"

# Anchors: fixed service-level parameters (caller provides values)
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # List aggregate delivery data for the given Android application.
  # ── gcp.fcmdata.projects.androidApps.deliveryData.list ──
  - discovery_id: gcp.fcmdata.projects.androidApps.deliveryData.list
    # python: svc.projects().androidApps().deliveryData().list(**params).execute()
    calls:
      - action: projects.androidApps.deliveryData.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.deliveryData }}'
      item:
        analyticsLabel: '{{ item.analyticsLabel }}'
        appId: '{{ item.appId }}'
        data: '{{ item.data }}'
        date: '{{ item.date }}'
