  # Lists each [Google Cloud `Project`](https://cloud.google.com/resource-manager/reference/rest/v1/proj
  # ── gcp.firebase.availableProjects.list ──
  - discovery_id: gcp.firebase.availableProjects.list
    # python: svc.availableProjects().list(**params).execute()
    calls:
      - action: availableProjects.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.availableProjects }}'
      item:
        displayName: '{{ item.displayName }}'
        locationId: '{{ item.locationId }}'
        project: '{{ item.project }}'
