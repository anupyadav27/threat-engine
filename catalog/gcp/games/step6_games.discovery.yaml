    # required_params: ['sessionId']
  # Retrieve the last Recall token from all developer games that is associated with the PGS Player encod
  # ── gcp.games.recall.lastTokenFromAllDeveloperGames [dependent] ──
  - discovery_id: gcp.games.recall.lastTokenFromAllDeveloperGames
    # python: svc.recall().lastTokenFromAllDeveloperGames(**params).execute()
    calls:
      - action: recall.lastTokenFromAllDeveloperGames
        params: {}
        save_as: response
