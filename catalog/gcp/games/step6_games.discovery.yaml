    # required_params: ['sessionId']
  # Retrieve all Recall tokens associated with the PGS Player encoded in the provided recall session id.
  # ── gcp.games.recall.retrieveTokens [dependent] ──
  - discovery_id: gcp.games.recall.retrieveTokens
    # python: svc.recall().retrieveTokens(**params).execute()
