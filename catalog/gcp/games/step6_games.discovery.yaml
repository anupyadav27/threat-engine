    # required_params: ['clientRevision']
  # Get high scores, and optionally ranks, in leaderboards for the currently authenticated player. For a
  # ── gcp.games.scores.get [dependent] ──
  - discovery_id: gcp.games.scores.get
    for_each: gcp.games.players.list
    # python: svc.scores().get(**params).execute()
    calls:
      - action: scores.get
        params:
          leaderboardId: '{{ item.name }}'
          playerId: '{{ item.name }}'
          timeSpan: '{{ item.formattedScoreRank }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        items: '{{ response.items }}'
        player: '{{ response.player }}'
    # required_params: ['timeSpan', 'leaderboardId', 'playerId']
  # Lists the scores in a leaderboard, starting from the top.
  # ── gcp.games.scores.list [dependent] ──
