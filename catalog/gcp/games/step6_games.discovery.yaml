version: '1.0'
provider: gcp
service: games

services:
  client: games
  module: "googleapiclient.discovery.build('games', 'v1')"

# Anchors: fixed service-level parameters (caller provides values)
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # Lists all the achievement definitions for your application.
  # ── gcp.games.achievementDefinitions.list ──
  - discovery_id: gcp.games.achievementDefinitions.list
    # python: svc.achievementDefinitions().list(**params).execute()
    calls:
      - action: achievementDefinitions.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.achievementDefinitions }}'
      item:
        achievementType: '{{ item.achievementType }}'
        description: '{{ item.description }}'
        experiencePoints: '{{ item.experiencePoints }}'
        formattedTotalSteps: '{{ item.formattedTotalSteps }}'
        id: '{{ item.id }}'
        initialState: '{{ item.initialState }}'
        isRevealedIconUrlDefault: '{{ item.isRevealedIconUrlDefault }}'
        isUnlockedIconUrlDefault: '{{ item.isUnlockedIconUrlDefault }}'
        name: '{{ item.name }}'
        revealedIconUrl: '{{ item.revealedIconUrl }}'
        totalSteps: '{{ item.totalSteps }}'
        unlockedIconUrl: '{{ item.unlockedIconUrl }}'
  # Returns a list showing the current progress on events in this application for the currently authenti
  # ── gcp.games.events.listByPlayer ──
  - discovery_id: gcp.games.events.listByPlayer
    # python: svc.events().listByPlayer(**params).execute()
    calls:
      - action: events.listByPlayer
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.events }}'
      item:
        definitionId: '{{ item.definitionId }}'
        formattedNumEvents: '{{ item.formattedNumEvents }}'
        numEvents: '{{ item.numEvents }}'
        playerId: '{{ item.playerId }}'
  # Returns a list of the event definitions in this application.
  # ── gcp.games.events.listDefinitions ──
  - discovery_id: gcp.games.events.listDefinitions
    # python: svc.events().listDefinitions(**params).execute()
    calls:
      - action: events.listDefinitions
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.events }}'
      item:
        childEvents: '{{ item.childEvents }}'
        description: '{{ item.description }}'
        displayName: '{{ item.displayName }}'
        id: '{{ item.id }}'
        imageUrl: '{{ item.imageUrl }}'
        isDefaultImageUrl: '{{ item.isDefaultImageUrl }}'
        visibility: '{{ item.visibility }}'
  # Lists all the leaderboard metadata for your application.
  # ── gcp.games.leaderboards.list ──
  - discovery_id: gcp.games.leaderboards.list
    # python: svc.leaderboards().list(**params).execute()
    calls:
      - action: leaderboards.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.leaderboards }}'
      item:
        iconUrl: '{{ item.iconUrl }}'
        id: '{{ item.id }}'
        isIconUrlDefault: '{{ item.isIconUrlDefault }}'
        name: '{{ item.name }}'
        order: '{{ item.order }}'
  # Return the metagame configuration data for the calling application.
  # ── gcp.games.metagame.getMetagameConfig ──
  - discovery_id: gcp.games.metagame.getMetagameConfig
    # python: svc.metagame().getMetagameConfig(**params).execute()
    calls:
      - action: metagame.getMetagameConfig
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        currentVersion: '{{ response.currentVersion }}'
        playerLevels: '{{ response.playerLevels }}'
  # Get the application player ids for the currently authenticated player across all requested games by 
  # ── gcp.games.players.getMultipleApplicationPlayerIds ──
  - discovery_id: gcp.games.players.getMultipleApplicationPlayerIds
    # python: svc.players().getMultipleApplicationPlayerIds(**params).execute()
    calls:
      - action: players.getMultipleApplicationPlayerIds
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        playerIds: '{{ response.playerIds }}'
  # Retrieves scoped player identifiers for currently authenticated user.
  # ── gcp.games.players.getScopedPlayerIds ──
  - discovery_id: gcp.games.players.getScopedPlayerIds
    # python: svc.players().getScopedPlayerIds(**params).execute()
    calls:
      - action: players.getScopedPlayerIds
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        developerPlayerKey: '{{ response.developerPlayerKey }}'
        gamePlayerId: '{{ response.gamePlayerId }}'
  # Returns engagement and spend statistics in this application for the currently authenticated user.
  # ── gcp.games.stats.get ──
  - discovery_id: gcp.games.stats.get
    # python: svc.stats().get(**params).execute()
    calls:
      - action: stats.get
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        avg_session_length_minutes: '{{ response.avg_session_length_minutes }}'
        churn_probability: '{{ response.churn_probability }}'
        days_since_last_played: '{{ response.days_since_last_played }}'
        high_spender_probability: '{{ response.high_spender_probability }}'
        num_purchases: '{{ response.num_purchases }}'
        num_sessions: '{{ response.num_sessions }}'
        num_sessions_percentile: '{{ response.num_sessions_percentile }}'
        spend_percentile: '{{ response.spend_percentile }}'
        spend_probability: '{{ response.spend_probability }}'
        total_spend_next_28_days: '{{ response.total_spend_next_28_days }}'

  # ════ DEPENDENT (enrich) operations ════
  # Lists the progress for all your application's achievements for the currently authenticated player.
  # ── gcp.games.achievements.list [dependent] ──
  - discovery_id: gcp.games.achievements.list
    for_each: gcp.games.players.list
    # python: svc.achievements().list(**params).execute()
    calls:
      - action: achievements.list
        params:
          playerId: '{{ item.name }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.achievements }}'
      item:
        achievementState: '{{ item.achievementState }}'
        currentSteps: '{{ item.currentSteps }}'
        experiencePoints: '{{ item.experiencePoints }}'
        formattedCurrentStepsString: '{{ item.formattedCurrentStepsString }}'
        id: '{{ item.id }}'
        lastUpdatedTimestamp: '{{ item.lastUpdatedTimestamp }}'
    # required_params: ['playerId']
  # Retrieves the metadata of the application with the given ID. If the requested application is not ava
  # ── gcp.games.applications.get [dependent] ──
  - discovery_id: gcp.games.applications.get
    # python: svc.applications().get(**params).execute()
    calls:
      - action: applications.get
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        achievement_count: '{{ response.achievement_count }}'
        assets: '{{ response.assets }}'
        author: '{{ response.author }}'
        category: '{{ response.category }}'
        description: '{{ response.description }}'
        enabledFeatures: '{{ response.enabledFeatures }}'
        id: '{{ response.id }}'
        instances: '{{ response.instances }}'
        lastUpdatedTimestamp: '{{ response.lastUpdatedTimestamp }}'
        leaderboard_count: '{{ response.leaderboard_count }}'
        name: '{{ response.name }}'
        themeColor: '{{ response.themeColor }}'
    # required_params: ['applicationId']
  # Verifies the auth token provided with this request is for the application with the specified ID, and
  # ── gcp.games.applications.verify [dependent] ──
  - discovery_id: gcp.games.applications.verify
    # python: svc.applications().verify(**params).execute()
    calls:
      - action: applications.verify
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        alternate_player_id: '{{ response.alternate_player_id }}'
        player_id: '{{ response.player_id }}'
    # required_params: ['applicationId']
  # Retrieves the metadata of the leaderboard with the given ID.
  # ── gcp.games.leaderboards.get [dependent] ──
  - discovery_id: gcp.games.leaderboards.get
    for_each: gcp.games.leaderboards.list
    # python: svc.leaderboards().get(**params).execute()
    calls:
      - action: leaderboards.get
        params:
          leaderboardId: '{{ item.name }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        iconUrl: '{{ response.iconUrl }}'
        id: '{{ response.id }}'
        isIconUrlDefault: '{{ response.isIconUrlDefault }}'
        name: '{{ response.name }}'
        order: '{{ response.order }}'
    # required_params: ['leaderboardId']
  # List play data aggregated per category for the player corresponding to `playerId`.
  # ── gcp.games.metagame.listCategoriesByPlayer [dependent] ──
  - discovery_id: gcp.games.metagame.listCategoriesByPlayer
    # python: svc.metagame().listCategoriesByPlayer(**params).execute()
    calls:
      - action: metagame.listCategoriesByPlayer
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.metagame }}'
      item:
        category: '{{ item.category }}'
        experiencePoints: '{{ item.experiencePoints }}'
    # required_params: ['playerId', 'collection']
  # Retrieves the Player resource with the given ID. To retrieve the player for the currently authentica
  # ── gcp.games.players.get [dependent] ──
  - discovery_id: gcp.games.players.get
    for_each: gcp.games.players.list
    # python: svc.players().get(**params).execute()
    calls:
      - action: players.get
        params:
          playerId: '{{ item.name }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        avatarImageUrl: '{{ response.avatarImageUrl }}'
        bannerUrlLandscape: '{{ response.bannerUrlLandscape }}'
        bannerUrlPortrait: '{{ response.bannerUrlPortrait }}'
        displayName: '{{ response.displayName }}'
        experienceInfo: '{{ response.experienceInfo }}'
        friendStatus: '{{ response.friendStatus }}'
        gamePlayerId: '{{ response.gamePlayerId }}'
        name: '{{ response.name }}'
        originalPlayerId: '{{ response.originalPlayerId }}'
        playerId: '{{ response.playerId }}'
        profileSettings: '{{ response.profileSettings }}'
        title: '{{ response.title }}'
    # required_params: ['playerId']
  # Get the collection of players for the currently authenticated user.
  # ── gcp.games.players.list [dependent] ──
  - discovery_id: gcp.games.players.list
    # python: svc.players().list(**params).execute()
    calls:
      - action: players.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.players }}'
      item:
        avatarImageUrl: '{{ item.avatarImageUrl }}'
        bannerUrlLandscape: '{{ item.bannerUrlLandscape }}'
        bannerUrlPortrait: '{{ item.bannerUrlPortrait }}'
        displayName: '{{ item.displayName }}'
        experienceInfo: '{{ item.experienceInfo }}'
        friendStatus: '{{ item.friendStatus }}'
        gamePlayerId: '{{ item.gamePlayerId }}'
        name: '{{ item.name }}'
        originalPlayerId: '{{ item.originalPlayerId }}'
        playerId: '{{ item.playerId }}'
        profileSettings: '{{ item.profileSettings }}'
        title: '{{ item.title }}'
    # required_params: ['collection']
  # Retrieve the Recall tokens from all requested games that is associated with the PGS Player encoded i
  # ── gcp.games.recall.gamesPlayerTokens [dependent] ──
  - discovery_id: gcp.games.recall.gamesPlayerTokens
    # python: svc.recall().gamesPlayerTokens(**params).execute()
    calls:
