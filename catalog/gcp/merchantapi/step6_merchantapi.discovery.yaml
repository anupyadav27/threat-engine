version: '1.0'
provider: gcp
service: merchantapi

services:
  client: merchantapi
  module: "googleapiclient.discovery.build('merchantapi', 'v1')"

# Anchors: fixed service-level parameters (caller provides values)
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # Gets a merchant review.
  # ── gcp.merchantapi.merchantReviews.get ──
  - discovery_id: gcp.merchantapi.merchantReviews.get
    calls:
      - action: merchantReviews.get
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
  # Lists merchant reviews.
  # ── gcp.merchantapi.merchantReviews.list ──
  - discovery_id: gcp.merchantapi.merchantReviews.list
    calls:
      - action: merchantReviews.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.merchantReviews }}'
  # Gets a product review.
  # ── gcp.merchantapi.productReviews.get ──
  - discovery_id: gcp.merchantapi.productReviews.get
    calls:
      - action: productReviews.get
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
  # Lists product reviews.
  # ── gcp.merchantapi.productReviews.list ──
  - discovery_id: gcp.merchantapi.productReviews.list
    calls:
      - action: productReviews.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.productReviews }}'
