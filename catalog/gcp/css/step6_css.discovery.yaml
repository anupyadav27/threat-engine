# Discovery YAML — css (v1)
# Generated: 2026-02-21T03:06:39Z
# Sources: step2 (ops) | step3 (dep chain) | step4/step5 (fields)
# read ops: 6 | independent: 5 | dependent: 1
# ops with fields: 6/6 | dep ops with chain: 1/1
