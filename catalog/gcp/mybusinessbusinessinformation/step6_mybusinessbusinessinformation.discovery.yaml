version: '1.0'
provider: gcp
service: mybusinessbusinessinformation

services:
  client: mybusinessbusinessinformation
  module: "googleapiclient.discovery.build('mybusinessbusinessinformation', 'v1')"

# Anchors: fixed service-level parameters (caller provides values)
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # Lists the locations for the specified account.
  # ── gcp.mybusinessbusinessinformation.accounts.locations.list ──
  - discovery_id: gcp.mybusinessbusinessinformation.accounts.locations.list
    # python: svc.accounts().locations().list(**params).execute()
    calls:
      - action: accounts.locations.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.locations }}'
      item:
        adWordsLocationExtensions: '{{ item.adWordsLocationExtensions }}'
        categories: '{{ item.categories }}'
        labels: '{{ item.labels }}'
        languageCode: '{{ item.languageCode }}'
        latlng: '{{ item.latlng }}'
        metadata: '{{ item.metadata }}'
        moreHours: '{{ item.moreHours }}'
        name: '{{ item.name }}'
        openInfo: '{{ item.openInfo }}'
        phoneNumbers: '{{ item.phoneNumbers }}'
        profile: '{{ item.profile }}'
        regularHours: '{{ item.regularHours }}'
        relationshipData: '{{ item.relationshipData }}'
        serviceArea: '{{ item.serviceArea }}'
        serviceItems: '{{ item.serviceItems }}'
        specialHours: '{{ item.specialHours }}'
        storeCode: '{{ item.storeCode }}'
        storefrontAddress: '{{ item.storefrontAddress }}'
        title: '{{ item.title }}'
        websiteUri: '{{ item.websiteUri }}'
  # Returns the list of attributes that would be available for a location with the given primary categor
  # ── gcp.mybusinessbusinessinformation.attributes.list ──
  - discovery_id: gcp.mybusinessbusinessinformation.attributes.list
    # python: svc.attributes().list(**params).execute()
    calls:
      - action: attributes.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.attributes }}'
      item:
        deprecated: '{{ item.deprecated }}'
        displayName: '{{ item.displayName }}'
        groupDisplayName: '{{ item.groupDisplayName }}'
        parent: '{{ item.parent }}'
        repeatable: '{{ item.repeatable }}'
        valueMetadata: '{{ item.valueMetadata }}'
        valueType: '{{ item.valueType }}'
  # Returns a list of business categories for the provided language and GConcept ids.
  # ── gcp.mybusinessbusinessinformation.categories.batchGet ──
  - discovery_id: gcp.mybusinessbusinessinformation.categories.batchGet
    # python: svc.categories().batchGet(**params).execute()
    calls:
      - action: categories.batchGet
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        categories: '{{ response.categories }}'
  # Returns a list of business categories. Search will match the category name but not the category ID. 
  # ── gcp.mybusinessbusinessinformation.categories.list ──
  - discovery_id: gcp.mybusinessbusinessinformation.categories.list
    # python: svc.categories().list(**params).execute()
    calls:
      - action: categories.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.categories }}'
      item:
        displayName: '{{ item.displayName }}'
        moreHoursTypes: '{{ item.moreHoursTypes }}'
        name: '{{ item.name }}'
        serviceTypes: '{{ item.serviceTypes }}'
  # Searches the chain based on chain name.
  # ── gcp.mybusinessbusinessinformation.chains.search ──
  - discovery_id: gcp.mybusinessbusinessinformation.chains.search
    # python: svc.chains().search(**params).execute()
    calls:
      - action: chains.search
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.chains }}'
      item:
        chainNames: '{{ item.chainNames }}'
        locationCount: '{{ item.locationCount }}'
        name: '{{ item.name }}'
        websites: '{{ item.websites }}'
  # Search all of the possible locations that are a match to the specified request.
  # ── gcp.mybusinessbusinessinformation.googleLocations.search ──
  - discovery_id: gcp.mybusinessbusinessinformation.googleLocations.search
    # python: svc.googleLocations().search(**params).execute()
    calls:
      - action: googleLocations.search
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.googleLocations }}'
      item:
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        requestAdminRightsUri: '{{ item.requestAdminRightsUri }}'
  # Gets the Google-updated version of the specified location.
  # ── gcp.mybusinessbusinessinformation.locations.attributes.getGoogleUpdated ──
  - discovery_id: gcp.mybusinessbusinessinformation.locations.attributes.getGoogleUpdated
    # python: svc.locations().attributes().getGoogleUpdated(**params).execute()
    calls:
      - action: locations.attributes.getGoogleUpdated
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        attributes: '{{ response.attributes }}'
        name: '{{ response.name }}'
  # Returns the specified location.
  # ── gcp.mybusinessbusinessinformation.locations.get ──
  - discovery_id: gcp.mybusinessbusinessinformation.locations.get
    # python: svc.locations().get(**params).execute()
    calls:
      - action: locations.get
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        adWordsLocationExtensions: '{{ response.adWordsLocationExtensions }}'
        categories: '{{ response.categories }}'
        labels: '{{ response.labels }}'
        languageCode: '{{ response.languageCode }}'
        latlng: '{{ response.latlng }}'
        metadata: '{{ response.metadata }}'
        moreHours: '{{ response.moreHours }}'
        name: '{{ response.name }}'
        openInfo: '{{ response.openInfo }}'
        phoneNumbers: '{{ response.phoneNumbers }}'
        profile: '{{ response.profile }}'
        regularHours: '{{ response.regularHours }}'
        relationshipData: '{{ response.relationshipData }}'
        serviceArea: '{{ response.serviceArea }}'
        serviceItems: '{{ response.serviceItems }}'
        specialHours: '{{ response.specialHours }}'
        storeCode: '{{ response.storeCode }}'
        storefrontAddress: '{{ response.storefrontAddress }}'
        title: '{{ response.title }}'
        websiteUri: '{{ response.websiteUri }}'
  # Looks up all the attributes set for a given location.
  # ── gcp.mybusinessbusinessinformation.locations.getAttributes ──
  - discovery_id: gcp.mybusinessbusinessinformation.locations.getAttributes
    # python: svc.locations().getAttributes(**params).execute()
    calls:
      - action: locations.getAttributes
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        attributes: '{{ response.attributes }}'
        name: '{{ response.name }}'
  # Gets the Google-updated version of the specified location.
  # ── gcp.mybusinessbusinessinformation.locations.getGoogleUpdated ──
  - discovery_id: gcp.mybusinessbusinessinformation.locations.getGoogleUpdated
    # python: svc.locations().getGoogleUpdated(**params).execute()
    calls:
      - action: locations.getGoogleUpdated
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        diffMask: '{{ response.diffMask }}'
        location: '{{ response.location }}'
        pendingMask: '{{ response.pendingMask }}'

  # ════ DEPENDENT (enrich) operations ════
  # Gets the specified chain. Returns `NOT_FOUND` if the chain does not exist.
  # ── gcp.mybusinessbusinessinformation.chains.get [dependent] ──
  - discovery_id: gcp.mybusinessbusinessinformation.chains.get
    for_each: gcp.mybusinessbusinessinformation.chains.search
    # python: svc.chains().get(**params).execute()
    calls:
      - action: chains.get
        params:
          name: '{{ item.name }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        chainNames: '{{ response.chainNames }}'
        locationCount: '{{ response.locationCount }}'
        name: '{{ response.name }}'
        websites: '{{ response.websites }}'
    # required_params: ['name']
