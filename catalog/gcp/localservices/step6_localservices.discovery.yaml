# ============================================================
# Discovery YAML — localservices (v1)
# Generated: 2026-02-21T03:06:40Z
# Sources: step2 (ops) | step3 (dep chain) | step4/step5 (fields)
# read ops: 2 | independent: 2 | dependent: 0
# ops with fields: 2/2 | dep ops with chain: 0/0
# ============================================================
version: '1.0'
provider: gcp
service: localservices

services:
  client: localservices
  module: "googleapiclient.discovery.build('localservices', 'v1')"

# Anchors: fixed service-level parameters (caller provides values)
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # Get account reports containing aggregate account data of all linked GLS accounts. Caller needs to pr
  # ── gcp.localservices.accountReports.search ──
  - discovery_id: gcp.localservices.accountReports.search
    # python: svc.accountReports().search(**params).execute()
    calls:
      - action: accountReports.search
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.accountReports }}'
      item:
        accountId: '{{ item.accountId }}'
        aggregatorInfo: '{{ item.aggregatorInfo }}'
        averageFiveStarRating: '{{ item.averageFiveStarRating }}'
        averageWeeklyBudget: '{{ item.averageWeeklyBudget }}'
        businessName: '{{ item.businessName }}'
        currencyCode: '{{ item.currencyCode }}'
        currentPeriodChargedLeads: '{{ item.currentPeriodChargedLeads }}'
        currentPeriodConnectedPhoneCalls: '{{ item.currentPeriodConnectedPhoneCalls }}'
        currentPeriodPhoneCalls: '{{ item.currentPeriodPhoneCalls }}'
        currentPeriodTotalCost: '{{ item.currentPeriodTotalCost }}'
        impressionsLastTwoDays: '{{ item.impressionsLastTwoDays }}'
        phoneLeadResponsiveness: '{{ item.phoneLeadResponsiveness }}'
        previousPeriodChargedLeads: '{{ item.previousPeriodChargedLeads }}'
        previousPeriodConnectedPhoneCalls: '{{ item.previousPeriodConnectedPhoneCalls }}'
        previousPeriodPhoneCalls: '{{ item.previousPeriodPhoneCalls }}'
        previousPeriodTotalCost: '{{ item.previousPeriodTotalCost }}'
        totalReview: '{{ item.totalReview }}'
  # Get detailed lead reports containing leads that have been received by all linked GLS accounts. Calle
  # ── gcp.localservices.detailedLeadReports.search ──
  - discovery_id: gcp.localservices.detailedLeadReports.search
    # python: svc.detailedLeadReports().search(**params).execute()
    calls:
      - action: detailedLeadReports.search
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.detailedLeadReports }}'
      item:
        accountId: '{{ item.accountId }}'
        aggregatorInfo: '{{ item.aggregatorInfo }}'
        bookingLead: '{{ item.bookingLead }}'
        businessName: '{{ item.businessName }}'
        chargeStatus: '{{ item.chargeStatus }}'
        currencyCode: '{{ item.currencyCode }}'
        disputeStatus: '{{ item.disputeStatus }}'
        geo: '{{ item.geo }}'
        googleAdsLeadId: '{{ item.googleAdsLeadId }}'
        leadCategory: '{{ item.leadCategory }}'
        leadCreationTimestamp: '{{ item.leadCreationTimestamp }}'
        leadId: '{{ item.leadId }}'
        leadPrice: '{{ item.leadPrice }}'
        leadType: '{{ item.leadType }}'
        messageLead: '{{ item.messageLead }}'
        phoneLead: '{{ item.phoneLead }}'
        timezone: '{{ item.timezone }}'
