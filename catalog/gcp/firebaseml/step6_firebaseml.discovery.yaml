version: '1.0'
provider: gcp
service: firebaseml

services:
  client: firebaseml
  module: "googleapiclient.discovery.build('firebaseml', 'v1')"

# Anchors: fixed service-level parameters (caller provides values)
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null

checks: []

discovery:


  # ════ DEPENDENT (enrich) operations ════
  # Lists operations that match the specified filter in the request. If the server doesn't support this 
  # ── gcp.firebaseml.operations.list [dependent] ──
  - discovery_id: gcp.firebaseml.operations.list
    # python: svc.operations().list(**params).execute()
    calls:
      - action: operations.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.operations }}'
      item:
        done: '{{ item.done }}'
        error: '{{ item.error }}'
        metadata: '{{ item.metadata }}'
        name: '{{ item.name }}'
        response: '{{ item.response }}'
