version: '1.0'
provider: gcp
service: analyticshub

services:
  client: analyticshub
  module: "googleapiclient.discovery.build('analyticshub', 'v1')"

# Anchors: fixed service-level parameters (caller provides values)
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # Lists all data exchanges from projects in a given organization and location.
  # ── gcp.analyticshub.organizations.locations.dataExchanges.list ──
  - discovery_id: gcp.analyticshub.organizations.locations.dataExchanges.list
    # python: svc.organizations().locations().dataExchanges().list(**params).execute()
    calls:
      - action: organizations.locations.dataExchanges.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.dataExchanges }}'
      item:
        description: '{{ item.description }}'
        discoveryType: '{{ item.discoveryType }}'
        displayName: '{{ item.displayName }}'
        documentation: '{{ item.documentation }}'
        icon: '{{ item.icon }}'
        listingCount: '{{ item.listingCount }}'
        logLinkedDatasetQueryUserEmail: '{{ item.logLinkedDatasetQueryUserEmail }}'
        name: '{{ item.name }}'
        primaryContact: '{{ item.primaryContact }}'
        sharingEnvironmentConfig: '{{ item.sharingEnvironmentConfig }}'
