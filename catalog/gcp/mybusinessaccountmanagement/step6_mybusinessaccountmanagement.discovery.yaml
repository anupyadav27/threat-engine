  # Lists the admins for the specified account.
  # ── gcp.mybusinessaccountmanagement.accounts.admins.list ──
  - discovery_id: gcp.mybusinessaccountmanagement.accounts.admins.list
    # python: svc.accounts().admins().list(**params).execute()
    calls:
      - action: accounts.admins.list
        params: {}
        save_as: response
        on_error: continue
    emit:
