version: '1.0'
provider: gcp
service: policyanalyzer

services:
  client: policyanalyzer
  module: "googleapiclient.discovery.build('policyanalyzer', 'v1')"

# Anchors: fixed service-level parameters (caller provides values)
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # Queries policy activities on Google Cloud resources.
  # ── gcp.policyanalyzer.folders.locations.activityTypes.activities.query ──
  - discovery_id: gcp.policyanalyzer.folders.locations.activityTypes.activities.query
    # python: svc.folders().locations().activityTypes().activities().query(**params).execute()
    calls:
      - action: folders.locations.activityTypes.activities.query
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.activities }}'
      item:
        activity: '{{ item.activity }}'
        activityType: '{{ item.activityType }}'
        fullResourceName: '{{ item.fullResourceName }}'
        observationPeriod: '{{ item.observationPeriod }}'
  # Queries policy activities on Google Cloud resources.
  # ── gcp.policyanalyzer.organizations.locations.activityTypes.activities.query ──
