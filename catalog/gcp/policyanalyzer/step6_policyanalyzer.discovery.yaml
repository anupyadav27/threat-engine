      items_for: '{{ response.activities }}'
      item:
        activity: '{{ item.activity }}'
        activityType: '{{ item.activityType }}'
        fullResourceName: '{{ item.fullResourceName }}'
        observationPeriod: '{{ item.observationPeriod }}'
  # Queries policy activities on Google Cloud resources.
  # ── gcp.policyanalyzer.projects.locations.activityTypes.activities.query ──
  - discovery_id: gcp.policyanalyzer.projects.locations.activityTypes.activities.query
    # python: svc.projects().locations().activityTypes().activities().query(**params).execute()
    calls:
      - action: projects.locations.activityTypes.activities.query
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
