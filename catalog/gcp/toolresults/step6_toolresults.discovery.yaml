  # Gets the Tool Results settings for a project. May return any of the following canonical error codes:
  # ── gcp.toolresults.projects.getSettings ──
  - discovery_id: gcp.toolresults.projects.getSettings
    # python: svc.projects().getSettings(**params).execute()
    calls:
      - action: projects.getSettings
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        defaultBucket: '{{ response.defaultBucket }}'
        name: '{{ response.name }}'
  # Lists Histories for a given Project. The histories are sorted by modification time in descending ord
  # ── gcp.toolresults.projects.histories.list ──
  - discovery_id: gcp.toolresults.projects.histories.list
    # python: svc.projects().histories().list(**params).execute()
    calls:
      - action: projects.histories.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.histories }}'
      item:
        displayName: '{{ item.displayName }}'
        historyId: '{{ item.historyId }}'
        name: '{{ item.name }}'
        testPlatform: '{{ item.testPlatform }}'

