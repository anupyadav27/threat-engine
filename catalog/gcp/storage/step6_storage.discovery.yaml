  - discovery_id: gcp.storage.objects.list
    for_each: gcp.storage.buckets.list
    # python: svc.objects().list(**params).execute()
    calls:
      - action: objects.list
        params:
          bucket: '{{ item.name }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.objects }}'
      item:
        acl: '{{ item.acl }}'
        bucket: '{{ item.bucket }}'
        cacheControl: '{{ item.cacheControl }}'
        componentCount: '{{ item.componentCount }}'
        contentDisposition: '{{ item.contentDisposition }}'
        contentEncoding: '{{ item.contentEncoding }}'
        contentLanguage: '{{ item.contentLanguage }}'
        contentType: '{{ item.contentType }}'
        contexts: '{{ item.contexts }}'
        crc32c: '{{ item.crc32c }}'
        customTime: '{{ item.customTime }}'
        customerEncryption: '{{ item.customerEncryption }}'
        eventBasedHold: '{{ item.eventBasedHold }}'
        generation: '{{ item.generation }}'
        hardDeleteTime: '{{ item.hardDeleteTime }}'
        id: '{{ item.id }}'
        kmsKeyName: '{{ item.kmsKeyName }}'
        md5Hash: '{{ item.md5Hash }}'
        mediaLink: '{{ item.mediaLink }}'
        metadata: '{{ item.metadata }}'
        metageneration: '{{ item.metageneration }}'
        name: '{{ item.name }}'
        owner: '{{ item.owner }}'
        restoreToken: '{{ item.restoreToken }}'
        retention: '{{ item.retention }}'
        retentionExpirationTime: '{{ item.retentionExpirationTime }}'
        size: '{{ item.size }}'
        softDeleteTime: '{{ item.softDeleteTime }}'
        storageClass: '{{ item.storageClass }}'
        temporaryHold: '{{ item.temporaryHold }}'
        timeCreated: '{{ item.timeCreated }}'
        timeDeleted: '{{ item.timeDeleted }}'
        timeFinalized: '{{ item.timeFinalized }}'
        timeStorageClassUpdated: '{{ item.timeStorageClassUpdated }}'
        updated: '{{ item.updated }}'
    # required_params: ['bucket']
  # Tests a set of permissions on the given object to see which, if any, are held by the caller.
  # ── gcp.storage.objects.testIamPermissions [dependent] ──
  - discovery_id: gcp.storage.objects.testIamPermissions
    # python: svc.objects().testIamPermissions(**params).execute()
    calls:
      - action: objects.testIamPermissions
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        permissions: '{{ response.permissions }}'
    # required_params: ['bucket', 'object', 'permissions']
  # Gets the latest state of a long-running operation.
  # ── gcp.storage.operations.get [dependent] ──
  - discovery_id: gcp.storage.operations.get
    for_each: gcp.storage.operations.list
    # python: svc.operations().get(**params).execute()
    calls:
      - action: operations.get
        params:
          bucket: '{{ item.name }}'
          operationId: '{{ item.name }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        done: '{{ response.done }}'
        error: '{{ response.error }}'
        metadata: '{{ response.metadata }}'
        name: '{{ response.name }}'
        response: '{{ response.response }}'
    # required_params: ['bucket', 'operationId']
