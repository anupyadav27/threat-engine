    # python: svc.buckets().list(**params).execute()
    calls:
      - action: buckets.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.buckets }}'
      item:
        acl: '{{ item.acl }}'
        autoclass: '{{ item.autoclass }}'
        billing: '{{ item.billing }}'
        cors: '{{ item.cors }}'
        customPlacementConfig: '{{ item.customPlacementConfig }}'
        defaultEventBasedHold: '{{ item.defaultEventBasedHold }}'
        defaultObjectAcl: '{{ item.defaultObjectAcl }}'
        encryption: '{{ item.encryption }}'
        generation: '{{ item.generation }}'
        hardDeleteTime: '{{ item.hardDeleteTime }}'
        hierarchicalNamespace: '{{ item.hierarchicalNamespace }}'
        iamConfiguration: '{{ item.iamConfiguration }}'
        id: '{{ item.id }}'
        ipFilter: '{{ item.ipFilter }}'
        labels: '{{ item.labels }}'
        lifecycle: '{{ item.lifecycle }}'
        location: '{{ item.location }}'
        locationType: '{{ item.locationType }}'
        logging: '{{ item.logging }}'
        metageneration: '{{ item.metageneration }}'
        name: '{{ item.name }}'
        objectRetention: '{{ item.objectRetention }}'
        owner: '{{ item.owner }}'
