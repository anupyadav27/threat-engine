        retentionPolicy: '{{ item.retentionPolicy }}'
        rpo: '{{ item.rpo }}'
        satisfiesPZI: '{{ item.satisfiesPZI }}'
        satisfiesPZS: '{{ item.satisfiesPZS }}'
        softDeletePolicy: '{{ item.softDeletePolicy }}'
        softDeleteTime: '{{ item.softDeleteTime }}'
        storageClass: '{{ item.storageClass }}'
