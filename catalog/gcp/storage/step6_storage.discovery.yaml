version: '1.0'
provider: gcp
service: storage

services:
  client: storage
  module: "googleapiclient.discovery.build('storage', 'v1')"

# Anchors: fixed service-level parameters (caller provides values)
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null

checks: []

discovery:

