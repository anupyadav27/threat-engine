discovery:

  # ════ INDEPENDENT (root) operations ════
  # List all databases in a specified catalog.
  # ── gcp.biglake.projects.locations.catalogs.databases.list ──
  - discovery_id: gcp.biglake.projects.locations.catalogs.databases.list
    # python: svc.projects().locations().catalogs().databases().list(**params).execute()
    calls:
      - action: projects.locations.catalogs.databases.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.databases }}'
      item:
        createTime: '{{ item.createTime }}'
        deleteTime: '{{ item.deleteTime }}'
        expireTime: '{{ item.expireTime }}'
        hiveOptions: '{{ item.hiveOptions }}'
        name: '{{ item.name }}'
        type: '{{ item.type }}'
        updateTime: '{{ item.updateTime }}'
