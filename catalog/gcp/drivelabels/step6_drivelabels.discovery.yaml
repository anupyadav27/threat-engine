        name: '{{ item.name }}'
        person: '{{ item.person }}'
        role: '{{ item.role }}'
  # Get the constraints on the structure of a label; such as, the maximum number of fields allowed and m
  # ── gcp.drivelabels.limits.getLabel ──
  - discovery_id: gcp.drivelabels.limits.getLabel
    # python: svc.limits().getLabel(**params).execute()
    calls:
      - action: limits.getLabel
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
