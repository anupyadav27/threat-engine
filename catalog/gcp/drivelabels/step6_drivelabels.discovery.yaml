        fieldId: '{{ item.fieldId }}'
        name: '{{ item.name }}'
        state: '{{ item.state }}'
  # Lists a label's permissions.
  # ── gcp.drivelabels.labels.permissions.list ──
  - discovery_id: gcp.drivelabels.labels.permissions.list
    # python: svc.labels().permissions().list(**params).execute()
    calls:
