  # ── gcp.drivelabels.labels.revisions.permissions.list ──
  - discovery_id: gcp.drivelabels.labels.revisions.permissions.list
    # python: svc.labels().revisions().permissions().list(**params).execute()
    calls:
      - action: labels.revisions.permissions.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.permissions }}'
      item:
        audience: '{{ item.audience }}'
        email: '{{ item.email }}'
