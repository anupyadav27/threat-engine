version: '1.0'
provider: gcp
service: drivelabels

services:
  client: drivelabels
  module: "googleapiclient.discovery.build('drivelabels', 'v2')"

# Anchors: fixed service-level parameters (caller provides values)
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # List labels. For more information, see [Search for labels](https://developers.google.com/workspace/d
  # ── gcp.drivelabels.labels.list ──
  - discovery_id: gcp.drivelabels.labels.list
    # python: svc.labels().list(**params).execute()
    calls:
      - action: labels.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.labels }}'
      item:
        appliedCapabilities: '{{ item.appliedCapabilities }}'
        appliedLabelPolicy: '{{ item.appliedLabelPolicy }}'
        createTime: '{{ item.createTime }}'
        creator: '{{ item.creator }}'
        customer: '{{ item.customer }}'
        disableTime: '{{ item.disableTime }}'
        disabler: '{{ item.disabler }}'
        displayHints: '{{ item.displayHints }}'
        enabledAppSettings: '{{ item.enabledAppSettings }}'
        fields: '{{ item.fields }}'
        id: '{{ item.id }}'
        labelType: '{{ item.labelType }}'
        learnMoreUri: '{{ item.learnMoreUri }}'
        lifecycle: '{{ item.lifecycle }}'
        lockStatus: '{{ item.lockStatus }}'
        name: '{{ item.name }}'
        properties: '{{ item.properties }}'
        publishTime: '{{ item.publishTime }}'
        publisher: '{{ item.publisher }}'
        revisionCreateTime: '{{ item.revisionCreateTime }}'
        revisionCreator: '{{ item.revisionCreator }}'
        revisionId: '{{ item.revisionId }}'
        schemaCapabilities: '{{ item.schemaCapabilities }}'
  # Lists the label locks on a label.
  # ── gcp.drivelabels.labels.locks.list ──
  - discovery_id: gcp.drivelabels.labels.locks.list
    # python: svc.labels().locks().list(**params).execute()
    calls:
      - action: labels.locks.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.locks }}'
      item:
        capabilities: '{{ item.capabilities }}'
        choiceId: '{{ item.choiceId }}'
