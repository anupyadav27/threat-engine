  # ════ DEPENDENT (enrich) operations ════
  # Get a label by its resource name. For more information, see [Search for labels](https://developers.g
  # ── gcp.drivelabels.labels.get [dependent] ──
  - discovery_id: gcp.drivelabels.labels.get
    for_each: gcp.drivelabels.labels.list
    # python: svc.labels().get(**params).execute()
    calls:
      - action: labels.get
        params:
          name: '{{ item.name }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        appliedCapabilities: '{{ response.appliedCapabilities }}'
        appliedLabelPolicy: '{{ response.appliedLabelPolicy }}'
        createTime: '{{ response.createTime }}'
        creator: '{{ response.creator }}'
        customer: '{{ response.customer }}'
        disableTime: '{{ response.disableTime }}'
        disabler: '{{ response.disabler }}'
        displayHints: '{{ response.displayHints }}'
        enabledAppSettings: '{{ response.enabledAppSettings }}'
        fields: '{{ response.fields }}'
        id: '{{ response.id }}'
        labelType: '{{ response.labelType }}'
        learnMoreUri: '{{ response.learnMoreUri }}'
        lifecycle: '{{ response.lifecycle }}'
        lockStatus: '{{ response.lockStatus }}'
        name: '{{ response.name }}'
        properties: '{{ response.properties }}'
        publishTime: '{{ response.publishTime }}'
        publisher: '{{ response.publisher }}'
        revisionCreateTime: '{{ response.revisionCreateTime }}'
        revisionCreator: '{{ response.revisionCreator }}'
        revisionId: '{{ response.revisionId }}'
        schemaCapabilities: '{{ response.schemaCapabilities }}'
    # required_params: ['name']
