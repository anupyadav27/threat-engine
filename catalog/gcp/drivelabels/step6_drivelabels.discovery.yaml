  - discovery_id: gcp.drivelabels.users.getCapabilities
    # python: svc.users().getCapabilities(**params).execute()
    calls:
      - action: users.getCapabilities
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        canAccessLabelManager: '{{ response.canAccessLabelManager }}'
        canAdministrateLabels: '{{ response.canAdministrateLabels }}'
        canCreateAdminLabels: '{{ response.canCreateAdminLabels }}'
        canCreateSharedLabels: '{{ response.canCreateSharedLabels }}'
        name: '{{ response.name }}'
    # required_params: ['name']
