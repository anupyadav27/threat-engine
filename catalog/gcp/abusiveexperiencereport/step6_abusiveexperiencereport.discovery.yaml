# ============================================================
# Discovery YAML — abusiveexperiencereport (v1)
# Generated: 2026-02-21T03:06:38Z
# Sources: step2 (ops) | step3 (dep chain) | step4/step5 (fields)
# read ops: 2 | independent: 1 | dependent: 1
# ops with fields: 2/2 | dep ops with chain: 1/1
# ============================================================
version: '1.0'
provider: gcp
service: abusiveexperiencereport

services:
  client: abusiveexperiencereport
  module: "googleapiclient.discovery.build('abusiveexperiencereport', 'v1')"

# Anchors: fixed service-level parameters (caller provides values)
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # Lists sites that are failing in the Abusive Experience Report.
  # ── gcp.abusiveexperiencereport.violatingSites.list ──
  - discovery_id: gcp.abusiveexperiencereport.violatingSites.list
    # python: svc.violatingSites().list(**params).execute()
    calls:
      - action: violatingSites.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.violatingSites }}'
      item:
        abusiveStatus: '{{ item.abusiveStatus }}'
        enforcementTime: '{{ item.enforcementTime }}'
        filterStatus: '{{ item.filterStatus }}'
        lastChangeTime: '{{ item.lastChangeTime }}'
        reportUrl: '{{ item.reportUrl }}'
        reviewedSite: '{{ item.reviewedSite }}'
        underReview: '{{ item.underReview }}'

  # ════ DEPENDENT (enrich) operations ════
  # Gets a site's Abusive Experience Report summary.
  # ── gcp.abusiveexperiencereport.sites.get [dependent] ──
  - discovery_id: gcp.abusiveexperiencereport.sites.get
    for_each: gcp.abusiveexperiencereport.violatingSites.list
    # python: svc.sites().get(**params).execute()
    calls:
      - action: sites.get
        params:
          name: '{{ item.reviewedSite }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        abusiveStatus: '{{ response.abusiveStatus }}'
        enforcementTime: '{{ response.enforcementTime }}'
        filterStatus: '{{ response.filterStatus }}'
        lastChangeTime: '{{ response.lastChangeTime }}'
        reportUrl: '{{ response.reportUrl }}'
        reviewedSite: '{{ response.reviewedSite }}'
        underReview: '{{ response.underReview }}'
    # required_params: ['name']
