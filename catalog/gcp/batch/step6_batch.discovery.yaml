version: '1.0'
provider: gcp
service: batch

services:
  client: batch
  module: "googleapiclient.discovery.build('batch', 'v1')"

# Anchors: fixed service-level parameters (caller provides values)
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # Gets information about a location.
  # ── gcp.batch.projects.locations.get ──
  - discovery_id: gcp.batch.projects.locations.get
    # python: svc.projects().locations().get(**params).execute()
    calls:
      - action: projects.locations.get
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        displayName: '{{ response.displayName }}'
        labels: '{{ response.labels }}'
        locationId: '{{ response.locationId }}'
        metadata: '{{ response.metadata }}'
        name: '{{ response.name }}'
  # List all Jobs for a project within a region.
  # ── gcp.batch.projects.locations.jobs.list ──
  - discovery_id: gcp.batch.projects.locations.jobs.list
    # python: svc.projects().locations().jobs().list(**params).execute()
    calls:
      - action: projects.locations.jobs.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.jobs }}'
      item:
        allocationPolicy: '{{ item.allocationPolicy }}'
        createTime: '{{ item.createTime }}'
        labels: '{{ item.labels }}'
        logsPolicy: '{{ item.logsPolicy }}'
        name: '{{ item.name }}'
        notifications: '{{ item.notifications }}'
        priority: '{{ item.priority }}'
        status: '{{ item.status }}'
        taskGroups: '{{ item.taskGroups }}'
        uid: '{{ item.uid }}'
        updateTime: '{{ item.updateTime }}'
  # List Tasks associated with a job.
  # ── gcp.batch.projects.locations.jobs.taskGroups.tasks.list ──
  - discovery_id: gcp.batch.projects.locations.jobs.taskGroups.tasks.list
    # python: svc.projects().locations().jobs().taskGroups().tasks().list(**params).execute()
    calls:
      - action: projects.locations.jobs.taskGroups.tasks.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.tasks }}'
      item:
