        status: '{{ item.status }}'
  # Lists information about the supported locations for this service.
  # ── gcp.batch.projects.locations.list ──
  - discovery_id: gcp.batch.projects.locations.list
    # python: svc.projects().locations().list(**params).execute()
    calls:
      - action: projects.locations.list
        params: {}
        save_as: response
        on_error: continue
    emit:
