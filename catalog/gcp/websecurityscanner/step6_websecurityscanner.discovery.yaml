version: '1.0'
provider: gcp
service: websecurityscanner

services:
  client: websecurityscanner
  module: "googleapiclient.discovery.build('websecurityscanner', 'v1')"

# Anchors: fixed service-level parameters (caller provides values)
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # Lists ScanConfigs under a given project.
  # ── gcp.websecurityscanner.projects.scanConfigs.list ──
  - discovery_id: gcp.websecurityscanner.projects.scanConfigs.list
    # python: svc.projects().scanConfigs().list(**params).execute()
    calls:
      - action: projects.scanConfigs.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.scanConfigs }}'
      item:
        authentication: '{{ item.authentication }}'
        blacklistPatterns: '{{ item.blacklistPatterns }}'
        displayName: '{{ item.displayName }}'
        exportToSecurityCommandCenter: '{{ item.exportToSecurityCommandCenter }}'
        ignoreHttpStatusErrors: '{{ item.ignoreHttpStatusErrors }}'
        latestRun: '{{ item.latestRun }}'
        managedScan: '{{ item.managedScan }}'
        maxQps: '{{ item.maxQps }}'
        name: '{{ item.name }}'
        riskLevel: '{{ item.riskLevel }}'
        schedule: '{{ item.schedule }}'
        startingUrls: '{{ item.startingUrls }}'
        staticIpScan: '{{ item.staticIpScan }}'
        targetPlatforms: '{{ item.targetPlatforms }}'
        userAgent: '{{ item.userAgent }}'
  # List CrawledUrls under a given ScanRun.
  # ── gcp.websecurityscanner.projects.scanConfigs.scanRuns.crawledUrls.list ──
  - discovery_id: gcp.websecurityscanner.projects.scanConfigs.scanRuns.crawledUrls.list
    # python: svc.projects().scanConfigs().scanRuns().crawledUrls().list(**params).execute()
    calls:
      - action: projects.scanConfigs.scanRuns.crawledUrls.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.crawledUrls }}'
      item:
        body: '{{ item.body }}'
        httpMethod: '{{ item.httpMethod }}'
        url: '{{ item.url }}'
  # List all FindingTypeStats under a given ScanRun.
  # ── gcp.websecurityscanner.projects.scanConfigs.scanRuns.findingTypeStats.list ──
  - discovery_id: gcp.websecurityscanner.projects.scanConfigs.scanRuns.findingTypeStats.list
    # python: svc.projects().scanConfigs().scanRuns().findingTypeStats().list(**params).execute()
    calls:
      - action: projects.scanConfigs.scanRuns.findingTypeStats.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.findingTypeStats }}'
      item:
        findingCount: '{{ item.findingCount }}'
        findingType: '{{ item.findingType }}'
  # List Findings under a given ScanRun.
  # ── gcp.websecurityscanner.projects.scanConfigs.scanRuns.findings.list ──
  - discovery_id: gcp.websecurityscanner.projects.scanConfigs.scanRuns.findings.list
    # python: svc.projects().scanConfigs().scanRuns().findings().list(**params).execute()
    calls:
      - action: projects.scanConfigs.scanRuns.findings.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.findings }}'
      item:
        body: '{{ item.body }}'
        description: '{{ item.description }}'
        finalUrl: '{{ item.finalUrl }}'
        findingType: '{{ item.findingType }}'
        form: '{{ item.form }}'
        frameUrl: '{{ item.frameUrl }}'
        fuzzedUrl: '{{ item.fuzzedUrl }}'
        httpMethod: '{{ item.httpMethod }}'
        name: '{{ item.name }}'
        outdatedLibrary: '{{ item.outdatedLibrary }}'
        reproductionUrl: '{{ item.reproductionUrl }}'
        severity: '{{ item.severity }}'
        trackingId: '{{ item.trackingId }}'
        violatingResource: '{{ item.violatingResource }}'
        vulnerableHeaders: '{{ item.vulnerableHeaders }}'
        vulnerableParameters: '{{ item.vulnerableParameters }}'
        xss: '{{ item.xss }}'
        xxe: '{{ item.xxe }}'
  # Lists ScanRuns under a given ScanConfig, in descending order of ScanRun stop time.
  # ── gcp.websecurityscanner.projects.scanConfigs.scanRuns.list ──
  - discovery_id: gcp.websecurityscanner.projects.scanConfigs.scanRuns.list
    # python: svc.projects().scanConfigs().scanRuns().list(**params).execute()
    calls:
      - action: projects.scanConfigs.scanRuns.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.scanRuns }}'
      item:
        endTime: '{{ item.endTime }}'
        errorTrace: '{{ item.errorTrace }}'
        executionState: '{{ item.executionState }}'
        hasVulnerabilities: '{{ item.hasVulnerabilities }}'
        name: '{{ item.name }}'
        progressPercent: '{{ item.progressPercent }}'
        resultState: '{{ item.resultState }}'
        startTime: '{{ item.startTime }}'
        urlsCrawledCount: '{{ item.urlsCrawledCount }}'
        urlsTestedCount: '{{ item.urlsTestedCount }}'
        warningTraces: '{{ item.warningTraces }}'

  # ════ DEPENDENT (enrich) operations ════
  # Gets a ScanConfig.
  # ── gcp.websecurityscanner.projects.scanConfigs.get [dependent] ──
  - discovery_id: gcp.websecurityscanner.projects.scanConfigs.get
    for_each: gcp.websecurityscanner.projects.scanConfigs.list
    # python: svc.projects().scanConfigs().get(**params).execute()
    calls:
      - action: projects.scanConfigs.get
        params:
          name: '{{ item.name }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        authentication: '{{ response.authentication }}'
        blacklistPatterns: '{{ response.blacklistPatterns }}'
        displayName: '{{ response.displayName }}'
        exportToSecurityCommandCenter: '{{ response.exportToSecurityCommandCenter }}'
        ignoreHttpStatusErrors: '{{ response.ignoreHttpStatusErrors }}'
        latestRun: '{{ response.latestRun }}'
        managedScan: '{{ response.managedScan }}'
        maxQps: '{{ response.maxQps }}'
        name: '{{ response.name }}'
        riskLevel: '{{ response.riskLevel }}'
        schedule: '{{ response.schedule }}'
        startingUrls: '{{ response.startingUrls }}'
        staticIpScan: '{{ response.staticIpScan }}'
        targetPlatforms: '{{ response.targetPlatforms }}'
        userAgent: '{{ response.userAgent }}'
    # required_params: ['name']
  # Gets a Finding.
  # ── gcp.websecurityscanner.projects.scanConfigs.scanRuns.findings.get [dependent] ──
  - discovery_id: gcp.websecurityscanner.projects.scanConfigs.scanRuns.findings.get
    for_each: gcp.websecurityscanner.projects.scanConfigs.scanRuns.findings.list
    # python: svc.projects().scanConfigs().scanRuns().findings().get(**params).execute()
    calls:
      - action: projects.scanConfigs.scanRuns.findings.get
        params:
          name: '{{ item.name }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        body: '{{ response.body }}'
        description: '{{ response.description }}'
        finalUrl: '{{ response.finalUrl }}'
        findingType: '{{ response.findingType }}'
        form: '{{ response.form }}'
        frameUrl: '{{ response.frameUrl }}'
        fuzzedUrl: '{{ response.fuzzedUrl }}'
        httpMethod: '{{ response.httpMethod }}'
        name: '{{ response.name }}'
        outdatedLibrary: '{{ response.outdatedLibrary }}'
        reproductionUrl: '{{ response.reproductionUrl }}'
        severity: '{{ response.severity }}'
        trackingId: '{{ response.trackingId }}'
        violatingResource: '{{ response.violatingResource }}'
        vulnerableHeaders: '{{ response.vulnerableHeaders }}'
        vulnerableParameters: '{{ response.vulnerableParameters }}'
        xss: '{{ response.xss }}'
        xxe: '{{ response.xxe }}'
    # required_params: ['name']
  # Gets a ScanRun.
  # ── gcp.websecurityscanner.projects.scanConfigs.scanRuns.get [dependent] ──
  - discovery_id: gcp.websecurityscanner.projects.scanConfigs.scanRuns.get
    for_each: gcp.websecurityscanner.projects.scanConfigs.scanRuns.list
    # python: svc.projects().scanConfigs().scanRuns().get(**params).execute()
    calls:
      - action: projects.scanConfigs.scanRuns.get
        params:
          name: '{{ item.name }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        endTime: '{{ response.endTime }}'
        errorTrace: '{{ response.errorTrace }}'
        executionState: '{{ response.executionState }}'
        hasVulnerabilities: '{{ response.hasVulnerabilities }}'
        name: '{{ response.name }}'
        progressPercent: '{{ response.progressPercent }}'
        resultState: '{{ response.resultState }}'
        startTime: '{{ response.startTime }}'
        urlsCrawledCount: '{{ response.urlsCrawledCount }}'
        urlsTestedCount: '{{ response.urlsTestedCount }}'
