version: '1.0'
provider: gcp
service: playdeveloperreporting

services:
  client: playdeveloperreporting
  module: "googleapiclient.discovery.build('playdeveloperreporting', 'v1beta1')"

# Anchors: fixed service-level parameters (caller provides values)
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # Lists anomalies in any of the datasets.
  # ── gcp.playdeveloperreporting.anomalies.list ──
  - discovery_id: gcp.playdeveloperreporting.anomalies.list
    # python: svc.anomalies().list(**params).execute()
    calls:
      - action: anomalies.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.anomalies }}'
      item:
        dimensions: '{{ item.dimensions }}'
        metric: '{{ item.metric }}'
        metricSet: '{{ item.metricSet }}'
        name: '{{ item.name }}'
        timelineSpec: '{{ item.timelineSpec }}'
  # Searches for Apps accessible by the user.
  # ── gcp.playdeveloperreporting.apps.search ──
  - discovery_id: gcp.playdeveloperreporting.apps.search
    # python: svc.apps().search(**params).execute()
    calls:
      - action: apps.search
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.apps }}'
      item:
        displayName: '{{ item.displayName }}'
        name: '{{ item.name }}'
        packageName: '{{ item.packageName }}'
  # Searches all error issues in which reports have been grouped.
  # ── gcp.playdeveloperreporting.vitals.errors.issues.search ──
  - discovery_id: gcp.playdeveloperreporting.vitals.errors.issues.search
    # python: svc.vitals().errors().issues().search(**params).execute()
    calls:
      - action: vitals.errors.issues.search
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.issues }}'
      item:
        annotations: '{{ item.annotations }}'
        cause: '{{ item.cause }}'
        distinctUsers: '{{ item.distinctUsers }}'
        distinctUsersPercent: '{{ item.distinctUsersPercent }}'
        errorReportCount: '{{ item.errorReportCount }}'
        firstAppVersion: '{{ item.firstAppVersion }}'
        firstOsVersion: '{{ item.firstOsVersion }}'
        issueUri: '{{ item.issueUri }}'
        lastAppVersion: '{{ item.lastAppVersion }}'
        lastErrorReportTime: '{{ item.lastErrorReportTime }}'
        lastOsVersion: '{{ item.lastOsVersion }}'
        location: '{{ item.location }}'
        name: '{{ item.name }}'
        sampleErrorReports: '{{ item.sampleErrorReports }}'
        type: '{{ item.type }}'
  # Searches all error reports received for an app.
  # ── gcp.playdeveloperreporting.vitals.errors.reports.search ──
  - discovery_id: gcp.playdeveloperreporting.vitals.errors.reports.search
    # python: svc.vitals().errors().reports().search(**params).execute()
    calls:
      - action: vitals.errors.reports.search
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.reports }}'
      item:
        appVersion: '{{ item.appVersion }}'
        deviceModel: '{{ item.deviceModel }}'
        eventTime: '{{ item.eventTime }}'
        issue: '{{ item.issue }}'
        name: '{{ item.name }}'
        osVersion: '{{ item.osVersion }}'
        reportText: '{{ item.reportText }}'
        type: '{{ item.type }}'
        vcsInformation: '{{ item.vcsInformation }}'

