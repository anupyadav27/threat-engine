version: '1.0'
provider: gcp
service: ids

services:
  client: ids
  module: "googleapiclient.discovery.build('ids', 'v1')"

# Anchors: fixed service-level parameters (caller provides values)
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # Lists Endpoints in a given project and location.
  # ── gcp.ids.projects.locations.endpoints.list ──
  - discovery_id: gcp.ids.projects.locations.endpoints.list
    # python: svc.projects().locations().endpoints().list(**params).execute()
    calls:
      - action: projects.locations.endpoints.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.endpoints }}'
      item:
        createTime: '{{ item.createTime }}'
        description: '{{ item.description }}'
        endpointForwardingRule: '{{ item.endpointForwardingRule }}'
        endpointIp: '{{ item.endpointIp }}'
        labels: '{{ item.labels }}'
        name: '{{ item.name }}'
        network: '{{ item.network }}'
        satisfiesPzi: '{{ item.satisfiesPzi }}'
        satisfiesPzs: '{{ item.satisfiesPzs }}'
        severity: '{{ item.severity }}'
        state: '{{ item.state }}'
        threatExceptions: '{{ item.threatExceptions }}'
        trafficLogs: '{{ item.trafficLogs }}'
        updateTime: '{{ item.updateTime }}'
  # Gets information about a location.
  # ── gcp.ids.projects.locations.get ──
  - discovery_id: gcp.ids.projects.locations.get
    # python: svc.projects().locations().get(**params).execute()
    calls:
      - action: projects.locations.get
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        displayName: '{{ response.displayName }}'
        labels: '{{ response.labels }}'
        locationId: '{{ response.locationId }}'
        metadata: '{{ response.metadata }}'
        name: '{{ response.name }}'
  # Lists information about the supported locations for this service.
  # ── gcp.ids.projects.locations.list ──
  - discovery_id: gcp.ids.projects.locations.list
    # python: svc.projects().locations().list(**params).execute()
    calls:
      - action: projects.locations.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.locations }}'
      item:
        displayName: '{{ item.displayName }}'
        labels: '{{ item.labels }}'
        locationId: '{{ item.locationId }}'
        metadata: '{{ item.metadata }}'
        name: '{{ item.name }}'
  # Lists operations that match the specified filter in the request. If the server doesn't support this 
  # ── gcp.ids.projects.locations.operations.list ──
  - discovery_id: gcp.ids.projects.locations.operations.list
    # python: svc.projects().locations().operations().list(**params).execute()
    calls:
      - action: projects.locations.operations.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.operations }}'
      item:
        done: '{{ item.done }}'
        error: '{{ item.error }}'
        metadata: '{{ item.metadata }}'
        name: '{{ item.name }}'
        response: '{{ item.response }}'

  # ════ DEPENDENT (enrich) operations ════
  # Gets details of a single Endpoint.
  # ── gcp.ids.projects.locations.endpoints.get [dependent] ──
  - discovery_id: gcp.ids.projects.locations.endpoints.get
    for_each: gcp.ids.projects.locations.endpoints.list
    # python: svc.projects().locations().endpoints().get(**params).execute()
    calls:
      - action: projects.locations.endpoints.get
        params:
          name: '{{ item.name }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        createTime: '{{ response.createTime }}'
        description: '{{ response.description }}'
        endpointForwardingRule: '{{ response.endpointForwardingRule }}'
        endpointIp: '{{ response.endpointIp }}'
        labels: '{{ response.labels }}'
        name: '{{ response.name }}'
        network: '{{ response.network }}'
        satisfiesPzi: '{{ response.satisfiesPzi }}'
        satisfiesPzs: '{{ response.satisfiesPzs }}'
        severity: '{{ response.severity }}'
        state: '{{ response.state }}'
        threatExceptions: '{{ response.threatExceptions }}'
        trafficLogs: '{{ response.trafficLogs }}'
        updateTime: '{{ response.updateTime }}'
    # required_params: ['name']
  # Gets the latest state of a long-running operation. Clients can use this method to poll the operation
  # ── gcp.ids.projects.locations.operations.get [dependent] ──
  - discovery_id: gcp.ids.projects.locations.operations.get
    for_each: gcp.ids.projects.locations.operations.list
    # python: svc.projects().locations().operations().get(**params).execute()
    calls:
      - action: projects.locations.operations.get
        params:
          name: '{{ item.name }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        done: '{{ response.done }}'
        error: '{{ response.error }}'
        metadata: '{{ response.metadata }}'
        name: '{{ response.name }}'
        response: '{{ response.response }}'
    # required_params: ['name']
