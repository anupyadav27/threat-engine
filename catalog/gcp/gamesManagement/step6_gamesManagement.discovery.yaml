version: '1.0'
provider: gcp
service: gamesManagement

services:
  client: gamesManagement
  module: "googleapiclient.discovery.build('gamesManagement', 'v1management')"

# Anchors: fixed service-level parameters (caller provides values)
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null

checks: []

discovery:


  # ════ DEPENDENT (enrich) operations ════
  # Get the list of players hidden from the given application. This method is only available to user acc
  # ── gcp.gamesManagement.applications.listHidden [dependent] ──
  - discovery_id: gcp.gamesManagement.applications.listHidden
    # python: svc.applications().listHidden(**params).execute()
    calls:
      - action: applications.listHidden
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.applications }}'
      item:
        hiddenTimeMillis: '{{ item.hiddenTimeMillis }}'
        player: '{{ item.player }}'
    # required_params: ['applicationId']
