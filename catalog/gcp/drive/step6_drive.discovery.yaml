    # python: svc.about().get(**params).execute()
    calls:
      - action: about.get
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        additionalRoleInfo: '{{ response.additionalRoleInfo }}'
        canCreateDrives: '{{ response.canCreateDrives }}'
        canCreateTeamDrives: '{{ response.canCreateTeamDrives }}'
        domainSharingPolicy: '{{ response.domainSharingPolicy }}'
        driveThemes: '{{ response.driveThemes }}'
