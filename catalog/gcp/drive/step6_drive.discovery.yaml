version: '1.0'
provider: gcp
service: drive

services:
  client: drive
  module: "googleapiclient.discovery.build('drive', 'v2')"

# Anchors: fixed service-level parameters (caller provides values)
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null

checks: []

