  # ════ INDEPENDENT (root) operations ════
  # Retrieves a list of resources, possibly filtered.
  # ── gcp.youtube.playlistImages.list ──
  - discovery_id: gcp.youtube.playlistImages.list
    # python: svc.playlistImages().list(**params).execute()
    calls:
      - action: playlistImages.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.playlistImages }}'
      item:
        id: '{{ item.id }}'
        snippet: '{{ item.snippet }}'
  # Returns the trainability status of a video.
  # ── gcp.youtube.videoTrainability.get ──
  - discovery_id: gcp.youtube.videoTrainability.get
    # python: svc.videoTrainability().get(**params).execute()
    calls:
      - action: videoTrainability.get
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        permitted: '{{ response.permitted }}'
        videoId: '{{ response.videoId }}'
  # Allows a user to load live chat through a server-streamed RPC.
  # ── gcp.youtube.youtube.v3.liveChat.messages.stream ──
  - discovery_id: gcp.youtube.youtube.v3.liveChat.messages.stream
    # python: svc.youtube().v3().liveChat().messages().stream(**params).execute()
    calls:
      - action: youtube.v3.liveChat.messages.stream
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        activePollItem: '{{ response.activePollItem }}'
