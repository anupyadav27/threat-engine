    # python: svc.providers().accounts().list(**params).execute()
    calls:
      - action: providers.accounts.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.accounts }}'
      item:
        approvals: '{{ item.approvals }}'
        createTime: '{{ item.createTime }}'
        inputProperties: '{{ item.inputProperties }}'
        name: '{{ item.name }}'
        provider: '{{ item.provider }}'
