  # Lists all users with access to a developer account.
  # ── gcp.androidpublisher.users.list ──
  - discovery_id: gcp.androidpublisher.users.list
    # python: svc.users().list(**params).execute()
    calls:
      - action: users.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.users }}'
      item:
        accessState: '{{ item.accessState }}'
        developerAccountPermissions: '{{ item.developerAccountPermissions }}'
        email: '{{ item.email }}'
        expirationTime: '{{ item.expirationTime }}'
        grants: '{{ item.grants }}'
        name: '{{ item.name }}'
        partial: '{{ item.partial }}'

