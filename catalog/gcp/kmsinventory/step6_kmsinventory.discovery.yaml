# ============================================================
# Discovery YAML — kmsinventory (v1)
# Generated: 2026-02-21T03:06:40Z
# Sources: step2 (ops) | step3 (dep chain) | step4/step5 (fields)
# read ops: 4 | independent: 3 | dependent: 1
# ops with fields: 4/4 | dep ops with chain: 1/1
