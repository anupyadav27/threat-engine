  - discovery_id: gcp.businessprofileperformance.locations.getDailyMetricsTimeSeries
    # python: svc.locations().getDailyMetricsTimeSeries(**params).execute()
    calls:
      - action: locations.getDailyMetricsTimeSeries
        params: {}
        save_as: response
        on_error: continue
    emit:
