checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  #  Returns the values for each date from a given time range and optionally the sub entity type, where 
  # ── gcp.businessprofileperformance.locations.fetchMultiDailyMetricsTimeSeries ──
  - discovery_id: gcp.businessprofileperformance.locations.fetchMultiDailyMetricsTimeSeries
    # python: svc.locations().fetchMultiDailyMetricsTimeSeries(**params).execute()
    calls:
      - action: locations.fetchMultiDailyMetricsTimeSeries
        params: {}
        save_as: response
