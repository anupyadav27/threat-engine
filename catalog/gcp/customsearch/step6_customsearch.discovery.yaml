version: '1.0'
provider: gcp
service: customsearch

services:
  client: customsearch
  module: "googleapiclient.discovery.build('customsearch', 'v1')"

# Anchors: fixed service-level parameters (caller provides values)
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # Returns metadata about the search performed, metadata about the engine used for the search, and the 
  # ── gcp.customsearch.cse.list ──
  - discovery_id: gcp.customsearch.cse.list
    # python: svc.cse().list(**params).execute()
    calls:
      - action: cse.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.cse }}'
      item:
        bodyLines: '{{ item.bodyLines }}'
        displayLink: '{{ item.displayLink }}'
        htmlTitle: '{{ item.htmlTitle }}'
        image: '{{ item.image }}'
        link: '{{ item.link }}'
        title: '{{ item.title }}'
  # Returns metadata about the search performed, metadata about the engine used for the search, and the 
  # ── gcp.customsearch.cse.siterestrict.list ──
  - discovery_id: gcp.customsearch.cse.siterestrict.list
    # python: svc.cse().siterestrict().list(**params).execute()
    calls:
      - action: cse.siterestrict.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.siterestrict }}'
      item:
        bodyLines: '{{ item.bodyLines }}'
        displayLink: '{{ item.displayLink }}'
        htmlTitle: '{{ item.htmlTitle }}'
        image: '{{ item.image }}'
        link: '{{ item.link }}'
        title: '{{ item.title }}'
