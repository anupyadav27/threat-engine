  # ── gcp.identitytoolkit.projects.tenants.accounts.query [dependent] ──
  - discovery_id: gcp.identitytoolkit.projects.tenants.accounts.query
    # python: svc.projects().tenants().accounts().query(**params).execute()
    calls:
      - action: projects.tenants.accounts.query
        params: {}
