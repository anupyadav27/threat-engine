    # python: svc.projects().annotationSpecSets().list(**params).execute()
    calls:
      - action: projects.annotationSpecSets.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.annotationSpecSets }}'
