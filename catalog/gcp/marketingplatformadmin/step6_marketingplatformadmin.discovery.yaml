# ============================================================
# Discovery YAML — marketingplatformadmin (v1alpha)
# Generated: 2026-02-21T03:06:40Z
# Sources: step2 (ops) | step3 (dep chain) | step4/step5 (fields)
# read ops: 3 | independent: 3 | dependent: 0
# ops with fields: 3/3 | dep ops with chain: 0/0
