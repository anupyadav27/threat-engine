# ============================================================
# Discovery YAML — oslogin (v1)
# Generated: 2026-02-21T03:06:40Z
# Sources: step2 (ops) | step3 (dep chain) | step4/step5 (fields)
# read ops: 2 | independent: 0 | dependent: 2
# ops with fields: 2/2 | dep ops with chain: 0/2
