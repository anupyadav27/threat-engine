    # python: svc.projects().locations().backups().list(**params).execute()
    calls:
      - action: projects.locations.backups.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.backups }}'
      item:
        capacityGb: '{{ item.capacityGb }}'
        createTime: '{{ item.createTime }}'
        description: '{{ item.description }}'
