version: '1.0'
provider: gcp
service: books

services:
  client: books
  module: "googleapiclient.discovery.build('books', 'v1')"

# Anchors: fixed service-level parameters (caller provides values)
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # Gets information regarding the family that the user is part of.
  # ── gcp.books.familysharing.getFamilyInfo ──
  - discovery_id: gcp.books.familysharing.getFamilyInfo
    # python: svc.familysharing().getFamilyInfo(**params).execute()
    calls:
      - action: familysharing.getFamilyInfo
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        membership: '{{ response.membership }}'
  # Gets the current settings for the user.
  # ── gcp.books.myconfig.getUserSettings ──
  - discovery_id: gcp.books.myconfig.getUserSettings
    # python: svc.myconfig().getUserSettings(**params).execute()
    calls:
      - action: myconfig.getUserSettings
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        notesExport: '{{ response.notesExport }}'
        notification: '{{ response.notification }}'
  # Retrieves a list of annotations, possibly filtered.
  # ── gcp.books.mylibrary.annotations.list ──
  - discovery_id: gcp.books.mylibrary.annotations.list
    # python: svc.mylibrary().annotations().list(**params).execute()
    calls:
      - action: mylibrary.annotations.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.annotations }}'
      item:
        afterSelectedText: '{{ item.afterSelectedText }}'
        beforeSelectedText: '{{ item.beforeSelectedText }}'
        clientVersionRanges: '{{ item.clientVersionRanges }}'
        created: '{{ item.created }}'
        currentVersionRanges: '{{ item.currentVersionRanges }}'
        data: '{{ item.data }}'
        deleted: '{{ item.deleted }}'
        highlightStyle: '{{ item.highlightStyle }}'
        id: '{{ item.id }}'
        layerId: '{{ item.layerId }}'
        layerSummary: '{{ item.layerSummary }}'
        pageIds: '{{ item.pageIds }}'
        selectedText: '{{ item.selectedText }}'
        updated: '{{ item.updated }}'
        volumeId: '{{ item.volumeId }}'
