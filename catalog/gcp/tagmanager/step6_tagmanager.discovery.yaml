  # Lists all Containers that belongs to a GTM Account.
  # ── gcp.tagmanager.accounts.containers.list ──
  - discovery_id: gcp.tagmanager.accounts.containers.list
    # python: svc.accounts().containers().list(**params).execute()
    calls:
      - action: accounts.containers.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.containers }}'
      item:
        accountId: '{{ item.accountId }}'
        containerId: '{{ item.containerId }}'
        domainName: '{{ item.domainName }}'
        enabledBuiltInVariable: '{{ item.enabledBuiltInVariable }}'
        fingerprint: '{{ item.fingerprint }}'
        name: '{{ item.name }}'
        notes: '{{ item.notes }}'
        publicId: '{{ item.publicId }}'
        timeZoneCountryId: '{{ item.timeZoneCountryId }}'
        timeZoneId: '{{ item.timeZoneId }}'
        usageContext: '{{ item.usageContext }}'
