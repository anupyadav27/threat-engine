  module: "googleapiclient.discovery.build('digitalassetlinks', 'v1')"

# Anchors: fixed service-level parameters (caller provides values)
anchors:
  project_id: null
  org_id: null
  folder_id: null
  location: null
  zone: null
  region: null

checks: []

discovery:

  # ════ INDEPENDENT (root) operations ════
  # Determines whether the specified (directional) relationship exists between the specified source and 
  # ── gcp.digitalassetlinks.assetlinks.check ──
  - discovery_id: gcp.digitalassetlinks.assetlinks.check
    # python: svc.assetlinks().check(**params).execute()
    calls:
      - action: assetlinks.check
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        debugString: '{{ response.debugString }}'
        errorCode: '{{ response.errorCode }}'
        linked: '{{ response.linked }}'
        maxAge: '{{ response.maxAge }}'
        relationExtensions: '{{ response.relationExtensions }}'
  # Retrieves a list of all statements from a given source that match the specified target and statement
  # ── gcp.digitalassetlinks.statements.list ──
  - discovery_id: gcp.digitalassetlinks.statements.list
    # python: svc.statements().list(**params).execute()
