      - action: statements.list
        params: {}
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.statements }}'
      item:
        relation: '{{ item.relation }}'
        relationExtensions: '{{ item.relationExtensions }}'
        source: '{{ item.source }}'
        target: '{{ item.target }}'
