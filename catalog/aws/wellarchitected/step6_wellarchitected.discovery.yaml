      - action: get_global_settings
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.OrganizationSharingStatus }}'
      item:
        DiscoveryIntegrationStatus: '{{ item.DiscoveryIntegrationStatus }}'
        Enabled: '{{ item.Enabled }}'
        IntegrationStatus: '{{ item.IntegrationStatus }}'
