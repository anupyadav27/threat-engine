        AllowAssociation: '{{ item.AllowAssociation }}'
        SharedAccountId: '{{ item.SharedAccountId }}'
  # ── DescribeCustomWorkspaceImageImport ──
  - discovery_id: aws.workspaces.describe_custom_workspace_image_import
    for_each: aws.workspaces.describe_workspace_bundles
    calls:
      - action: describe_custom_workspace_image_import
        params:
          ImageId: '{{ item.ImageId }}'
        save_as: response
