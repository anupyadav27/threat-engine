    emit:
      as: item
      items_for: '{{ response.AddIns }}'
      item:
        Name: '{{ item.Name }}'
        ResourceId: '{{ item.ResourceId }}'
        AddInId: '{{ item.AddInId }}'
        URL: '{{ item.URL }}'
  # ── DescribeConnectionAliasPermissions ──
