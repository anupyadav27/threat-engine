        RootVolumeEncryptionEnabled: '{{ item.RootVolumeEncryptionEnabled }}'
        StandbyWorkspacesProperties: '{{ item.StandbyWorkspacesProperties }}'
        UserName: '{{ item.UserName }}'
        UserVolumeEncryptionEnabled: '{{ item.UserVolumeEncryptionEnabled }}'
        VolumeEncryptionKey: '{{ item.VolumeEncryptionKey }}'
        WorkspaceId: '{{ item.WorkspaceId }}'
        WorkspaceName: '{{ item.WorkspaceName }}'
        WorkspaceProperties: '{{ item.WorkspaceProperties }}'
        Workspaces: '{{ item.Workspaces }}'
  # ── DescribeWorkspacesConnectionStatus ──
  - discovery_id: aws.workspaces.describe_workspaces_connection_status
    calls:
      - action: describe_workspaces_connection_status
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.WorkspacesConnectionStatus }}'
      item:
        ConnectionState: '{{ item.ConnectionState }}'
        ConnectionStateCheckTimestamp: '{{ item.ConnectionStateCheckTimestamp }}'
        LastKnownUserConnectionTimestamp: '{{ item.LastKnownUserConnectionTimestamp }}'
        WorkspaceId: '{{ item.WorkspaceId }}'
        WorkspacesConnectionStatus: '{{ item.WorkspacesConnectionStatus }}'
  # ── DescribeWorkspacesPools ──
  - discovery_id: aws.workspaces.describe_workspaces_pools
    calls:
      - action: describe_workspaces_pools
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.WorkspacesPools }}'
      item:
        State: '{{ item.State }}'
        ApplicationSettings: '{{ item.ApplicationSettings }}'
        BundleId: '{{ item.BundleId }}'
        CapacityStatus: '{{ item.CapacityStatus }}'
        CreatedAt: '{{ item.CreatedAt }}'
        Description: '{{ item.Description }}'
        DirectoryId: '{{ item.DirectoryId }}'
        Errors: '{{ item.Errors }}'
        PoolArn: '{{ item.PoolArn }}'
        PoolId: '{{ item.PoolId }}'
        PoolName: '{{ item.PoolName }}'
        RunningMode: '{{ item.RunningMode }}'
        TimeoutSettings: '{{ item.TimeoutSettings }}'
        WorkspacesPools: '{{ item.WorkspacesPools }}'
  # ── GetAccountLink ──
  - discovery_id: aws.workspaces.get_account_link
    calls:
      - action: get_account_link
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.AccountLink }}'
      item:
        AccountLink: '{{ item.AccountLink }}'
        AccountLinkId: '{{ item.AccountLinkId }}'
        AccountLinkStatus: '{{ item.AccountLinkStatus }}'
  # ── ListAccountLinks ──
  - discovery_id: aws.workspaces.list_account_links
    calls:
      - action: list_account_links
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.AccountLinks }}'
      item:
        AccountLinkId: '{{ item.AccountLinkId }}'
        AccountLinkStatus: '{{ item.AccountLinkStatus }}'
        SourceAccountId: '{{ item.SourceAccountId }}'
        TargetAccountId: '{{ item.TargetAccountId }}'
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeApplicationAssociations ──
  - discovery_id: aws.workspaces.describe_application_associations
    for_each: aws.workspaces.describe_applications
    calls:
      - action: describe_application_associations
        params:
          ApplicationId: '{{ item.ApplicationId }}'
          AssociatedResourceTypes: '{{ item.AssociatedResourceTypes }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Associations }}'
      item:
        State: '{{ item.State }}'
        ApplicationId: '{{ item.ApplicationId }}'
        AssociatedResourceId: '{{ item.AssociatedResourceId }}'
        AssociatedResourceType: '{{ item.AssociatedResourceType }}'
        Created: '{{ item.Created }}'
        LastUpdatedTime: '{{ item.LastUpdatedTime }}'
        StateReason: '{{ item.StateReason }}'
  # ── DescribeBundleAssociations ──
  - discovery_id: aws.workspaces.describe_bundle_associations
    for_each: aws.workspaces.describe_workspace_bundles
    calls:
      - action: describe_bundle_associations
        params:
          BundleId: '{{ item.BundleId }}'
          AssociatedResourceTypes: '{{ item.AssociatedResourceTypes }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Associations }}'
      item:
        State: '{{ item.State }}'
