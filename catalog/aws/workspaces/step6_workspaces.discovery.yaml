# ============================================================
# Discovery YAML — workspaces (AWS)
# Generated: 2026-02-21T04:57:00Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: workspaces
services:
  client: workspaces
  module: boto3.client
discovery:
  # ── DescribeAccount ──
  - discovery_id: aws.workspaces.describe_account
    calls:
      - action: describe_account
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.DedicatedTenancySupport }}'
      item:
        DedicatedTenancyAccountType: '{{ item.DedicatedTenancyAccountType }}'
        Message: '{{ item.Message }}'
  # ── DescribeAccountModifications ──
  - discovery_id: aws.workspaces.describe_account_modifications
    calls:
      - action: describe_account_modifications
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.AccountModifications }}'
      item:
        AccountModifications: '{{ item.AccountModifications }}'
        DedicatedTenancyManagementCidrRange: '{{ item.DedicatedTenancyManagementCidrRange }}'
        DedicatedTenancySupport: '{{ item.DedicatedTenancySupport }}'
        ErrorCode: '{{ item.ErrorCode }}'
        ErrorMessage: '{{ item.ErrorMessage }}'
        ModificationState: '{{ item.ModificationState }}'
        StartTime: '{{ item.StartTime }}'
  # ── DescribeApplications ──
  - discovery_id: aws.workspaces.describe_applications
    calls:
      - action: describe_applications
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Applications }}'
      item:
        Name: '{{ item.Name }}'
        State: '{{ item.State }}'
        ApplicationId: '{{ item.ApplicationId }}'
        Applications: '{{ item.Applications }}'
        Created: '{{ item.Created }}'
        Description: '{{ item.Description }}'
        LicenseType: '{{ item.LicenseType }}'
        Owner: '{{ item.Owner }}'
        SupportedComputeTypeNames: '{{ item.SupportedComputeTypeNames }}'
        SupportedOperatingSystemNames: '{{ item.SupportedOperatingSystemNames }}'
  # ── DescribeConnectionAliases ──
  - discovery_id: aws.workspaces.describe_connection_aliases
    calls:
      - action: describe_connection_aliases
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ConnectionAliases }}'
      item:
        State: '{{ item.State }}'
        AliasId: '{{ item.AliasId }}'
        Associations: '{{ item.Associations }}'
        ConnectionAliases: '{{ item.ConnectionAliases }}'
        ConnectionString: '{{ item.ConnectionString }}'
        OwnerAccountId: '{{ item.OwnerAccountId }}'
  # ── DescribeIpGroups ──
  - discovery_id: aws.workspaces.describe_ip_groups
    calls:
      - action: describe_ip_groups
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Result }}'
      item:
        Result: '{{ item.Result }}'
        groupDesc: '{{ item.groupDesc }}'
        groupId: '{{ item.groupId }}'
        groupName: '{{ item.groupName }}'
        userRules: '{{ item.userRules }}'
  # ── DescribeWorkspaceBundles ──
  - discovery_id: aws.workspaces.describe_workspace_bundles
    calls:
      - action: describe_workspace_bundles
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Bundles }}'
      item:
        CreationTime: '{{ item.CreationTime }}'
        Name: '{{ item.Name }}'
        State: '{{ item.State }}'
        BundleId: '{{ item.BundleId }}'
        BundleType: '{{ item.BundleType }}'
        Bundles: '{{ item.Bundles }}'
        ComputeType: '{{ item.ComputeType }}'
        Description: '{{ item.Description }}'
        ImageId: '{{ item.ImageId }}'
        LastUpdatedTime: '{{ item.LastUpdatedTime }}'
        Owner: '{{ item.Owner }}'
        RootStorage: '{{ item.RootStorage }}'
        UserStorage: '{{ item.UserStorage }}'
  # ── DescribeWorkspaceDirectories ──
