version: '1.0'
provider: aws
service: transfer
services:
  client: transfer
  module: boto3.client
discovery:
  # ── ListCertificates ──
  - discovery_id: aws.transfer.list_certificates
    calls:
      - action: list_certificates
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Certificates }}'
      item:
        Arn: '{{ item.Arn }}'
        Status: '{{ item.Status }}'
        ActiveDate: '{{ item.ActiveDate }}'
        Certificate: '{{ item.Certificate }}'
        CertificateId: '{{ item.CertificateId }}'
        Description: '{{ item.Description }}'
        InactiveDate: '{{ item.InactiveDate }}'
        NotAfterDate: '{{ item.NotAfterDate }}'
        NotBeforeDate: '{{ item.NotBeforeDate }}'
        Serial: '{{ item.Serial }}'
        Type: '{{ item.Type }}'
        Usage: '{{ item.Usage }}'
  # ── ListConnectors ──
  - discovery_id: aws.transfer.list_connectors
    calls:
      - action: list_connectors
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Connectors }}'
      item:
        Arn: '{{ item.Arn }}'
        As2Config: '{{ item.As2Config }}'
        Connector: '{{ item.Connector }}'
        ConnectorId: '{{ item.ConnectorId }}'
        EgressConfig: '{{ item.EgressConfig }}'
        EgressType: '{{ item.EgressType }}'
        ErrorMessage: '{{ item.ErrorMessage }}'
        SecurityPolicyName: '{{ item.SecurityPolicyName }}'
        ServiceManagedEgressIpAddresses: '{{ item.ServiceManagedEgressIpAddresses }}'
        SftpConfig: '{{ item.SftpConfig }}'
        Url: '{{ item.Url }}'
  # ── ListProfiles ──
  - discovery_id: aws.transfer.list_profiles
    calls:
      - action: list_profiles
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Profiles }}'
      item:
        Arn: '{{ item.Arn }}'
        As2Id: '{{ item.As2Id }}'
        Profile: '{{ item.Profile }}'
        ProfileId: '{{ item.ProfileId }}'
        ProfileType: '{{ item.ProfileType }}'
  # ── ListSecurityPolicies ──
  - discovery_id: aws.transfer.list_security_policies
    calls:
      - action: list_security_policies
        save_as: response
        on_error: continue
    emit:
