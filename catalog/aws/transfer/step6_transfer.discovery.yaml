  - discovery_id: aws.transfer.describe_access
    for_each: aws.transfer.list_servers
    calls:
      - action: describe_access
        params:
          ServerId: '{{ item.ServerId }}'
          ExternalId: '{{ item.ExternalId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.NextToken }}'
      item:
