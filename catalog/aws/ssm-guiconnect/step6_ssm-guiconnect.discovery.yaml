# ============================================================
# Discovery YAML — ssm-guiconnect (AWS)
# Generated: 2026-02-21T04:56:59Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: ssm-guiconnect
services:
  client: ssm-guiconnect
  module: boto3.client
discovery:
  # ── GetConnectionRecordingPreferences ──
  - discovery_id: aws.ssm-guiconnect.get_connection_recording_preferences
    calls:
      - action: get_connection_recording_preferences
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ClientToken }}'
      item:
        ClientToken: '{{ item.ClientToken }}'
        ConnectionRecordingPreferences: '{{ item.ConnectionRecordingPreferences }}'
        KMSKeyArn: '{{ item.KMSKeyArn }}'
        RecordingDestinations: '{{ item.RecordingDestinations }}'
