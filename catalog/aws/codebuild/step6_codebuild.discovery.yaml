# ============================================================
# Discovery YAML — codebuild (AWS)
# Generated: 2026-02-21T04:56:57Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: codebuild
services:
  client: codebuild
  module: boto3.client
discovery:
  # ── ListBuildBatches ──
  - discovery_id: aws.codebuild.list_build_batches
    calls:
      - action: list_build_batches
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ids }}'
  # ── ListBuildBatchesForProject ──
  - discovery_id: aws.codebuild.list_build_batches_for_project
    calls:
      - action: list_build_batches_for_project
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ids }}'
  # ── ListBuilds ──
  - discovery_id: aws.codebuild.list_builds
    calls:
      - action: list_builds
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ids }}'
  # ── ListCuratedEnvironmentImages ──
  - discovery_id: aws.codebuild.list_curated_environment_images
    calls:
      - action: list_curated_environment_images
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.platforms }}'
      item:
        languages: '{{ item.languages }}'
        platform: '{{ item.platform }}'
  # ── ListFleets ──
  - discovery_id: aws.codebuild.list_fleets
    calls:
      - action: list_fleets
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.fleets }}'
  # ── ListProjects ──
  - discovery_id: aws.codebuild.list_projects
    calls:
      - action: list_projects
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.projects }}'
  # ── ListReportGroups ──
  - discovery_id: aws.codebuild.list_report_groups
    calls:
      - action: list_report_groups
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.reportGroups }}'
  # ── ListReports ──
  - discovery_id: aws.codebuild.list_reports
    calls:
      - action: list_reports
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.reports }}'
  # ── ListSandboxes ──
  - discovery_id: aws.codebuild.list_sandboxes
    calls:
      - action: list_sandboxes
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ids }}'
  # ── ListSharedProjects ──
  - discovery_id: aws.codebuild.list_shared_projects
    calls:
      - action: list_shared_projects
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.projects }}'
  # ── ListSharedReportGroups ──
  - discovery_id: aws.codebuild.list_shared_report_groups
    calls:
      - action: list_shared_report_groups
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.reportGroups }}'
  # ── ListSourceCredentials ──
  - discovery_id: aws.codebuild.list_source_credentials
    calls:
      - action: list_source_credentials
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.sourceCredentialsInfos }}'
      item:
        arn: '{{ item.arn }}'
        authType: '{{ item.authType }}'
        resource: '{{ item.resource }}'
        serverType: '{{ item.serverType }}'
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeCodeCoverages ──
  - discovery_id: aws.codebuild.describe_code_coverages
    calls:
      - action: describe_code_coverages
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.codeCoverages }}'
      item:
        branchCoveragePercentage: '{{ item.branchCoveragePercentage }}'
        branchesCovered: '{{ item.branchesCovered }}'
        branchesMissed: '{{ item.branchesMissed }}'
        expired: '{{ item.expired }}'
        filePath: '{{ item.filePath }}'
        id: '{{ item.id }}'
        lineCoveragePercentage: '{{ item.lineCoveragePercentage }}'
        linesCovered: '{{ item.linesCovered }}'
        linesMissed: '{{ item.linesMissed }}'
        reportARN: '{{ item.reportARN }}'
  # ── DescribeTestCases ──
  - discovery_id: aws.codebuild.describe_test_cases
    calls:
      - action: describe_test_cases
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.testCases }}'
      item:
        durationInNanoSeconds: '{{ item.durationInNanoSeconds }}'
        expired: '{{ item.expired }}'
        message: '{{ item.message }}'
        name: '{{ item.name }}'
        prefix: '{{ item.prefix }}'
        reportArn: '{{ item.reportArn }}'
        status: '{{ item.status }}'
        testRawDataPath: '{{ item.testRawDataPath }}'
        testSuiteName: '{{ item.testSuiteName }}'
  # ── GetReportGroupTrend ──
  - discovery_id: aws.codebuild.get_report_group_trend
    calls:
      - action: get_report_group_trend
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.rawData }}'
      item:
        data: '{{ item.data }}'
        reportArn: '{{ item.reportArn }}'
        stats: '{{ item.stats }}'
  # ── GetResourcePolicy ──
  - discovery_id: aws.codebuild.get_resource_policy
    calls:
      - action: get_resource_policy
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.policy }}'
      item:
        policy: '{{ item.policy }}'
  # ── ListBuildsForProject ──
  - discovery_id: aws.codebuild.list_builds_for_project
    calls:
      - action: list_builds_for_project
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ids }}'
  # ── ListCommandExecutionsForSandbox ──
  - discovery_id: aws.codebuild.list_command_executions_for_sandbox
    calls:
      - action: list_command_executions_for_sandbox
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.commandExecutions }}'
      item:
        command: '{{ item.command }}'
        endTime: '{{ item.endTime }}'
        exitCode: '{{ item.exitCode }}'
        id: '{{ item.id }}'
        logs: '{{ item.logs }}'
        sandboxArn: '{{ item.sandboxArn }}'
        sandboxId: '{{ item.sandboxId }}'
        standardErrContent: '{{ item.standardErrContent }}'
        standardOutputContent: '{{ item.standardOutputContent }}'
        startTime: '{{ item.startTime }}'
        status: '{{ item.status }}'
        submitTime: '{{ item.submitTime }}'
        type: '{{ item.type }}'
  # ── ListReportsForReportGroup ──
  - discovery_id: aws.codebuild.list_reports_for_report_group
    calls:
      - action: list_reports_for_report_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.reports }}'
  # ── ListSandboxesForProject ──
  - discovery_id: aws.codebuild.list_sandboxes_for_project
    calls:
      - action: list_sandboxes_for_project
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ids }}'
