# ============================================================
# Discovery YAML — iotthingsgraph (AWS)
# Generated: 2026-02-21T04:56:58Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: iotthingsgraph
services:
  client: iotthingsgraph
  module: boto3.client
discovery:
  # ── DescribeNamespace ──
  - discovery_id: aws.iotthingsgraph.describe_namespace
    calls:
      - action: describe_namespace
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.namespaceArn }}'
      item:
        namespaceArn: '{{ item.namespaceArn }}'
        namespaceName: '{{ item.namespaceName }}'
        namespaceVersion: '{{ item.namespaceVersion }}'
        trackingNamespaceName: '{{ item.trackingNamespaceName }}'
        trackingNamespaceVersion: '{{ item.trackingNamespaceVersion }}'
  # ── GetNamespaceDeletionStatus ──
  - discovery_id: aws.iotthingsgraph.get_namespace_deletion_status
    calls:
      - action: get_namespace_deletion_status
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.namespaceArn }}'
      item:
        errorCode: '{{ item.errorCode }}'
        errorMessage: '{{ item.errorMessage }}'
  # ── SearchFlowTemplates ──
  - discovery_id: aws.iotthingsgraph.search_flow_templates
    calls:
      - action: search_flow_templates
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.summaries }}'
  # ── SearchSystemInstances ──
  - discovery_id: aws.iotthingsgraph.search_system_instances
    calls:
      - action: search_system_instances
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.summaries }}'
  # ── SearchSystemTemplates ──
  - discovery_id: aws.iotthingsgraph.search_system_templates
    calls:
      - action: search_system_templates
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.summaries }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetEntities ──
  - discovery_id: aws.iotthingsgraph.get_entities
    calls:
      - action: get_entities
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.descriptions }}'
      item:
        description: '{{ item.description }}'
        descriptions: '{{ item.descriptions }}'
  # ── GetFlowTemplate ──
  - discovery_id: aws.iotthingsgraph.get_flow_template
    calls:
      - action: get_flow_template
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.descriptions }}'
      item:
        description: '{{ item.description }}'
        namespaceVersion: '{{ item.namespaceVersion }}'
        summary: '{{ item.summary }}'
        trackingNamespaceVersion: '{{ item.trackingNamespaceVersion }}'
        validatedNamespaceVersion: '{{ item.validatedNamespaceVersion }}'
  # ── GetFlowTemplateRevisions ──
  - discovery_id: aws.iotthingsgraph.get_flow_template_revisions
    calls:
      - action: get_flow_template_revisions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.summaries }}'
  # ── GetSystemInstance ──
  - discovery_id: aws.iotthingsgraph.get_system_instance
    calls:
      - action: get_system_instance
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.description }}'
      item:
        Status: '{{ item.Status }}'
        Enabled: '{{ item.Enabled }}'
        flowActionsRoleArn: '{{ item.flowActionsRoleArn }}'
        metricsConfiguration: '{{ item.metricsConfiguration }}'
        s3BucketName: '{{ item.s3BucketName }}'
        summary: '{{ item.summary }}'
        validatedDependencyRevisions: '{{ item.validatedDependencyRevisions }}'
        validatedNamespaceVersion: '{{ item.validatedNamespaceVersion }}'
  # ── GetSystemTemplate ──
  - discovery_id: aws.iotthingsgraph.get_system_template
    calls:
      - action: get_system_template
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.description }}'
      item:
        summary: '{{ item.summary }}'
        validatedNamespaceVersion: '{{ item.validatedNamespaceVersion }}'
  # ── GetSystemTemplateRevisions ──
  - discovery_id: aws.iotthingsgraph.get_system_template_revisions
    calls:
      - action: get_system_template_revisions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.summaries }}'
  # ── GetUploadStatus ──
  - discovery_id: aws.iotthingsgraph.get_upload_status
    calls:
      - action: get_upload_status
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.failureReason }}'
  # ── ListFlowExecutionMessages ──
  - discovery_id: aws.iotthingsgraph.list_flow_execution_messages
    calls:
      - action: list_flow_execution_messages
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.messages }}'
      item:
        eventType: '{{ item.eventType }}'
        messageId: '{{ item.messageId }}'
        payload: '{{ item.payload }}'
        timestamp: '{{ item.timestamp }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.iotthingsgraph.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.tags }}'
      item:
        key: '{{ item.key }}'
        value: '{{ item.value }}'
  # ── SearchEntities ──
  - discovery_id: aws.iotthingsgraph.search_entities
    calls:
      - action: search_entities
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.descriptions }}'
  # ── SearchFlowExecutions ──
  - discovery_id: aws.iotthingsgraph.search_flow_executions
    calls:
      - action: search_flow_executions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.summaries }}'
  # ── SearchThings ──
  - discovery_id: aws.iotthingsgraph.search_things
    calls:
      - action: search_things
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.things }}'
