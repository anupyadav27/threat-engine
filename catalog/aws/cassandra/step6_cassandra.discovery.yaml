# ============================================================
# Discovery YAML — keyspaces (AWS)
# Generated: 2026-02-21T04:56:57Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: keyspaces
services:
  client: keyspaces
  module: boto3.client
discovery:
  # ── ListKeyspaces ──
  - discovery_id: aws.keyspaces.list_keyspaces
    calls:
      - action: list_keyspaces
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.keyspaces }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetKeyspace ──
  - discovery_id: aws.keyspaces.get_keyspace
    for_each: aws.keyspaces.list_keyspaces
    calls:
      - action: get_keyspace
        params:
          keyspaceName: '{{ item.keyspaceName }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.replicationRegions }}'
  # ── GetTable ──
  - discovery_id: aws.keyspaces.get_table
    for_each: aws.keyspaces.list_keyspaces
    calls:
      - action: get_table
        params:
          keyspaceName: '{{ item.keyspaceName }}'
          tableName: '{{ item.tableName }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.replicaSpecifications }}'
  # ── GetTableAutoScalingSettings ──
  - discovery_id: aws.keyspaces.get_table_auto_scaling_settings
    for_each: aws.keyspaces.list_keyspaces
    calls:
      - action: get_table_auto_scaling_settings
        params:
          keyspaceName: '{{ item.keyspaceName }}'
          tableName: '{{ item.tableName }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.replicaSpecifications }}'
  # ── GetType ──
  - discovery_id: aws.keyspaces.get_type
    for_each: aws.keyspaces.list_keyspaces
    calls:
      - action: get_type
        params:
          keyspaceName: '{{ item.keyspaceName }}'
          typeName: '{{ item.typeName }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.fieldDefinitions }}'
  # ── ListTables ──
  - discovery_id: aws.keyspaces.list_tables
    for_each: aws.keyspaces.list_keyspaces
    calls:
      - action: list_tables
        params:
          keyspaceName: '{{ item.keyspaceName }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.tables }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.keyspaces.list_tags_for_resource
    for_each: aws.keyspaces.list_keyspaces
    calls:
      - action: list_tags_for_resource
        params:
          resourceArn: '{{ item.resourceArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.tags }}'
  # ── ListTypes ──
  - discovery_id: aws.keyspaces.list_types
    for_each: aws.keyspaces.list_keyspaces
    calls:
      - action: list_types
        params:
          keyspaceName: '{{ item.keyspaceName }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.types }}'
