# ============================================================
# Discovery YAML — savingsplans (AWS)
# Generated: 2026-02-21T04:56:59Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: savingsplans
services:
  client: savingsplans
  module: boto3.client
discovery:
  # ── DescribeSavingsPlans ──
  - discovery_id: aws.savingsplans.describe_savings_plans
    calls:
      - action: describe_savings_plans
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.savingsPlans }}'
      item:
        commitment: '{{ item.commitment }}'
        currency: '{{ item.currency }}'
        description: '{{ item.description }}'
        ec2InstanceFamily: '{{ item.ec2InstanceFamily }}'
        end: '{{ item.end }}'
        offeringId: '{{ item.offeringId }}'
        paymentOption: '{{ item.paymentOption }}'
        productTypes: '{{ item.productTypes }}'
        recurringPaymentAmount: '{{ item.recurringPaymentAmount }}'
        region: '{{ item.region }}'
        returnableUntil: '{{ item.returnableUntil }}'
        savingsPlanArn: '{{ item.savingsPlanArn }}'
        savingsPlanId: '{{ item.savingsPlanId }}'
        savingsPlanType: '{{ item.savingsPlanType }}'
        savingsPlans: '{{ item.savingsPlans }}'
        start: '{{ item.start }}'
        state: '{{ item.state }}'
        tags: '{{ item.tags }}'
        termDurationInSeconds: '{{ item.termDurationInSeconds }}'
        upfrontPaymentAmount: '{{ item.upfrontPaymentAmount }}'
  # ── DescribeSavingsPlansOfferingRates ──
  - discovery_id: aws.savingsplans.describe_savings_plans_offering_rates
    calls:
      - action: describe_savings_plans_offering_rates
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.searchResults }}'
      item:
        operation: '{{ item.operation }}'
        productType: '{{ item.productType }}'
        properties: '{{ item.properties }}'
        rate: '{{ item.rate }}'
        savingsPlanOffering: '{{ item.savingsPlanOffering }}'
        searchResults: '{{ item.searchResults }}'
        serviceCode: '{{ item.serviceCode }}'
        unit: '{{ item.unit }}'
        usageType: '{{ item.usageType }}'
  # ── DescribeSavingsPlansOfferings ──
  - discovery_id: aws.savingsplans.describe_savings_plans_offerings
    calls:
      - action: describe_savings_plans_offerings
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.searchResults }}'
      item:
        currency: '{{ item.currency }}'
        description: '{{ item.description }}'
        durationSeconds: '{{ item.durationSeconds }}'
        offeringId: '{{ item.offeringId }}'
        operation: '{{ item.operation }}'
        paymentOption: '{{ item.paymentOption }}'
        planType: '{{ item.planType }}'
        productTypes: '{{ item.productTypes }}'
        properties: '{{ item.properties }}'
        serviceCode: '{{ item.serviceCode }}'
        usageType: '{{ item.usageType }}'
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeSavingsPlanRates ──
  - discovery_id: aws.savingsplans.describe_savings_plan_rates
    for_each: aws.savingsplans.describe_savings_plans
    calls:
      - action: describe_savings_plan_rates
        params:
          savingsPlanId: '{{ item.savingsPlanId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.searchResults }}'
      item:
        currency: '{{ item.currency }}'
        operation: '{{ item.operation }}'
        productType: '{{ item.productType }}'
        properties: '{{ item.properties }}'
        rate: '{{ item.rate }}'
        serviceCode: '{{ item.serviceCode }}'
        unit: '{{ item.unit }}'
        usageType: '{{ item.usageType }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.savingsplans.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        tags: '{{ response.tags }}'
