# ============================================================
# Discovery YAML — mediapackage-vod (AWS)
# Generated: 2026-02-21T04:56:59Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: mediapackage-vod
services:
  client: mediapackage-vod
  module: boto3.client
discovery:
  # ── ListAssets ──
  - discovery_id: aws.mediapackage-vod.list_assets
    calls:
      - action: list_assets
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Assets }}'
      item:
        Arn: '{{ item.Arn }}'
        Id: '{{ item.Id }}'
        ResourceId: '{{ item.ResourceId }}'
        Tags: '{{ item.Tags }}'
        CreatedAt: '{{ item.CreatedAt }}'
        PackagingGroupId: '{{ item.PackagingGroupId }}'
        SourceArn: '{{ item.SourceArn }}'
        SourceRoleArn: '{{ item.SourceRoleArn }}'
  # ── ListPackagingConfigurations ──
  - discovery_id: aws.mediapackage-vod.list_packaging_configurations
    calls:
      - action: list_packaging_configurations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.PackagingConfigurations }}'
      item:
        Arn: '{{ item.Arn }}'
        Id: '{{ item.Id }}'
        Tags: '{{ item.Tags }}'
        CmafPackage: '{{ item.CmafPackage }}'
        CreatedAt: '{{ item.CreatedAt }}'
        DashPackage: '{{ item.DashPackage }}'
        Enabled: '{{ item.Enabled }}'
        HlsPackage: '{{ item.HlsPackage }}'
        MssPackage: '{{ item.MssPackage }}'
        PackagingGroupId: '{{ item.PackagingGroupId }}'
  # ── ListPackagingGroups ──
  - discovery_id: aws.mediapackage-vod.list_packaging_groups
    calls:
      - action: list_packaging_groups
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.PackagingGroups }}'
      item:
        Arn: '{{ item.Arn }}'
        Id: '{{ item.Id }}'
        Tags: '{{ item.Tags }}'
        ApproximateAssetCount: '{{ item.ApproximateAssetCount }}'
        Authorization: '{{ item.Authorization }}'
        CreatedAt: '{{ item.CreatedAt }}'
        DomainName: '{{ item.DomainName }}'
        EgressAccessLogs: '{{ item.EgressAccessLogs }}'
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeAsset ──
  - discovery_id: aws.mediapackage-vod.describe_asset
    for_each: aws.mediapackage-vod.list_assets
    calls:
      - action: describe_asset
        params:
          Id: '{{ item.Id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.EgressEndpoints }}'
      item:
        Status: '{{ item.Status }}'
        PackagingConfigurationId: '{{ item.PackagingConfigurationId }}'
        Url: '{{ item.Url }}'
  # ── DescribePackagingConfiguration ──
  - discovery_id: aws.mediapackage-vod.describe_packaging_configuration
    for_each: aws.mediapackage-vod.list_assets
    calls:
      - action: describe_packaging_configuration
        params:
          Id: '{{ item.Id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.CmafPackage }}'
      item:
        Encryption: '{{ item.Encryption }}'
        HlsManifests: '{{ item.HlsManifests }}'
        IncludeEncoderConfigurationInSegments: '{{ item.IncludeEncoderConfigurationInSegments }}'
        SegmentDurationSeconds: '{{ item.SegmentDurationSeconds }}'
  # ── DescribePackagingGroup ──
  - discovery_id: aws.mediapackage-vod.describe_packaging_group
    for_each: aws.mediapackage-vod.list_assets
    calls:
      - action: describe_packaging_group
        params:
          Id: '{{ item.Id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Authorization }}'
      item:
        CdnIdentifierSecret: '{{ item.CdnIdentifierSecret }}'
        SecretsRoleArn: '{{ item.SecretsRoleArn }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.mediapackage-vod.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        Tags: '{{ response.Tags }}'
