# ============================================================
# Discovery YAML — ecr (AWS)
# Generated: 2026-02-21T04:56:58Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: ecr
services:
  client: ecr
  module: boto3.client
discovery:
  # ── DescribePullThroughCacheRules ──
  - discovery_id: aws.ecr.describe_pull_through_cache_rules
    calls:
      - action: describe_pull_through_cache_rules
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.pullThroughCacheRules }}'
      item:
        createdAt: '{{ item.createdAt }}'
        credentialArn: '{{ item.credentialArn }}'
        customRoleArn: '{{ item.customRoleArn }}'
        ecrRepositoryPrefix: '{{ item.ecrRepositoryPrefix }}'
        pullThroughCacheRules: '{{ item.pullThroughCacheRules }}'
        registryId: '{{ item.registryId }}'
        updatedAt: '{{ item.updatedAt }}'
        upstreamRegistry: '{{ item.upstreamRegistry }}'
        upstreamRegistryUrl: '{{ item.upstreamRegistryUrl }}'
        upstreamRepositoryPrefix: '{{ item.upstreamRepositoryPrefix }}'
  # ── DescribeRegistry ──
  - discovery_id: aws.ecr.describe_registry
    calls:
      - action: describe_registry
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.registryId }}'
      item:
        replicationConfiguration: '{{ item.replicationConfiguration }}'
        rules: '{{ item.rules }}'
  # ── DescribeRepositories ──
  - discovery_id: aws.ecr.describe_repositories
    calls:
      - action: describe_repositories
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.repositories }}'
      item:
        createdAt: '{{ item.createdAt }}'
        encryptionConfiguration: '{{ item.encryptionConfiguration }}'
        imageScanningConfiguration: '{{ item.imageScanningConfiguration }}'
        imageTagMutability: '{{ item.imageTagMutability }}'
        imageTagMutabilityExclusionFilters: '{{ item.imageTagMutabilityExclusionFilters }}'
        registryId: '{{ item.registryId }}'
        repositories: '{{ item.repositories }}'
        repositoryArn: '{{ item.repositoryArn }}'
        repositoryName: '{{ item.repositoryName }}'
        repositoryUri: '{{ item.repositoryUri }}'
  # ── DescribeRepositoryCreationTemplates ──
  - discovery_id: aws.ecr.describe_repository_creation_templates
    calls:
      - action: describe_repository_creation_templates
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.repositoryCreationTemplates }}'
      item:
        appliedFor: '{{ item.appliedFor }}'
        createdAt: '{{ item.createdAt }}'
        customRoleArn: '{{ item.customRoleArn }}'
        description: '{{ item.description }}'
        encryptionConfiguration: '{{ item.encryptionConfiguration }}'
        imageTagMutability: '{{ item.imageTagMutability }}'
        imageTagMutabilityExclusionFilters: '{{ item.imageTagMutabilityExclusionFilters }}'
        lifecyclePolicy: '{{ item.lifecyclePolicy }}'
        prefix: '{{ item.prefix }}'
        repositoryCreationTemplates: '{{ item.repositoryCreationTemplates }}'
        repositoryPolicy: '{{ item.repositoryPolicy }}'
        resourceTags: '{{ item.resourceTags }}'
        updatedAt: '{{ item.updatedAt }}'
  # ── GetAuthorizationToken ──
  - discovery_id: aws.ecr.get_authorization_token
    calls:
      - action: get_authorization_token
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.authorizationData }}'
      item:
        authorizationData: '{{ item.authorizationData }}'
        authorizationToken: '{{ item.authorizationToken }}'
        expiresAt: '{{ item.expiresAt }}'
        proxyEndpoint: '{{ item.proxyEndpoint }}'
  # ── GetRegistryPolicy ──
  - discovery_id: aws.ecr.get_registry_policy
    calls:
      - action: get_registry_policy
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.registryId }}'
      item:
        lifecyclePolicyText: '{{ item.lifecyclePolicyText }}'
        policyText: '{{ item.policyText }}'
  # ── GetRegistryScanningConfiguration ──
  - discovery_id: aws.ecr.get_registry_scanning_configuration
    calls:
      - action: get_registry_scanning_configuration
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.replicationConfiguration }}'
      item:
        rules: '{{ item.rules }}'
        scanType: '{{ item.scanType }}'
        scanningConfiguration: '{{ item.scanningConfiguration }}'
  # ── GetSigningConfiguration ──
  - discovery_id: aws.ecr.get_signing_configuration
    calls:
      - action: get_signing_configuration
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.replicationConfiguration }}'
      item:
        rules: '{{ item.rules }}'
        signingConfiguration: '{{ item.signingConfiguration }}'
  # ── ListPullTimeUpdateExclusions ──
  - discovery_id: aws.ecr.list_pull_time_update_exclusions
    calls:
      - action: list_pull_time_update_exclusions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.pullTimeUpdateExclusions }}'
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeImageReplicationStatus ──
  - discovery_id: aws.ecr.describe_image_replication_status
    for_each: aws.ecr.describe_repositories
    calls:
      - action: describe_image_replication_status
        params:
          repositoryName: '{{ item.repositoryName }}'
          imageId: '{{ item.imageId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.replicationStatuses }}'
      item:
        failureCode: '{{ item.failureCode }}'
        region: '{{ item.region }}'
        registryId: '{{ item.registryId }}'
        status: '{{ item.status }}'
  # ── DescribeImageScanFindings ──
  - discovery_id: aws.ecr.describe_image_scan_findings
    for_each: aws.ecr.describe_repositories
    calls:
      - action: describe_image_scan_findings
        params:
          repositoryName: '{{ item.repositoryName }}'
          imageId: '{{ item.imageId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.imageId }}'
      item:
        imageDigest: '{{ item.imageDigest }}'
        imageTag: '{{ item.imageTag }}'
  # ── DescribeImageSigningStatus ──
  - discovery_id: aws.ecr.describe_image_signing_status
    for_each: aws.ecr.describe_repositories
    calls:
      - action: describe_image_signing_status
        params:
          repositoryName: '{{ item.repositoryName }}'
          imageId: '{{ item.imageId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.signingStatuses }}'
      item:
        failureCode: '{{ item.failureCode }}'
        failureReason: '{{ item.failureReason }}'
        signingProfileArn: '{{ item.signingProfileArn }}'
        status: '{{ item.status }}'
  # ── DescribeImages ──
  - discovery_id: aws.ecr.describe_images
    for_each: aws.ecr.describe_repositories
    calls:
      - action: describe_images
        params:
          repositoryName: '{{ item.repositoryName }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.imageDetails }}'
      item:
        artifactMediaType: '{{ item.artifactMediaType }}'
        imageDetails: '{{ item.imageDetails }}'
        imageDigest: '{{ item.imageDigest }}'
        imageManifestMediaType: '{{ item.imageManifestMediaType }}'
        imagePushedAt: '{{ item.imagePushedAt }}'
        imageScanFindingsSummary: '{{ item.imageScanFindingsSummary }}'
        imageScanStatus: '{{ item.imageScanStatus }}'
        imageSizeInBytes: '{{ item.imageSizeInBytes }}'
        imageStatus: '{{ item.imageStatus }}'
        imageTags: '{{ item.imageTags }}'
        lastActivatedAt: '{{ item.lastActivatedAt }}'
        lastArchivedAt: '{{ item.lastArchivedAt }}'
        lastRecordedPullTime: '{{ item.lastRecordedPullTime }}'
        registryId: '{{ item.registryId }}'
        repositoryName: '{{ item.repositoryName }}'
        subjectManifestDigest: '{{ item.subjectManifestDigest }}'
  # ── GetAccountSetting ──
  - discovery_id: aws.ecr.get_account_setting
    calls:
      - action: get_account_setting
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.name }}'
      item:
        name: '{{ item.name }}'
        value: '{{ item.value }}'
  # ── GetDownloadUrlForLayer ──
  - discovery_id: aws.ecr.get_download_url_for_layer
    calls:
      - action: get_download_url_for_layer
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        downloadUrl: '{{ response.downloadUrl }}'
        layerDigest: '{{ response.layerDigest }}'
  # ── GetLifecyclePolicy ──
  - discovery_id: aws.ecr.get_lifecycle_policy
    for_each: aws.ecr.describe_repositories
    calls:
      - action: get_lifecycle_policy
        params:
          repositoryName: '{{ item.repositoryName }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        lastEvaluatedAt: '{{ response.lastEvaluatedAt }}'
        lifecyclePolicyText: '{{ response.lifecyclePolicyText }}'
        registryId: '{{ response.registryId }}'
        repositoryName: '{{ response.repositoryName }}'
  # ── GetLifecyclePolicyPreview ──
  - discovery_id: aws.ecr.get_lifecycle_policy_preview
    for_each: aws.ecr.describe_repositories
    calls:
      - action: get_lifecycle_policy_preview
        params:
          repositoryName: '{{ item.repositoryName }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.previewResults }}'
      item:
        action: '{{ item.action }}'
        appliedRulePriority: '{{ item.appliedRulePriority }}'
        imageDigest: '{{ item.imageDigest }}'
        imagePushedAt: '{{ item.imagePushedAt }}'
        imageTags: '{{ item.imageTags }}'
        storageClass: '{{ item.storageClass }}'
  # ── GetRepositoryPolicy ──
  - discovery_id: aws.ecr.get_repository_policy
    for_each: aws.ecr.describe_repositories
    calls:
      - action: get_repository_policy
        params:
          repositoryName: '{{ item.repositoryName }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        policyText: '{{ response.policyText }}'
        registryId: '{{ response.registryId }}'
        repositoryName: '{{ response.repositoryName }}'
  # ── ListImageReferrers ──
  - discovery_id: aws.ecr.list_image_referrers
    for_each: aws.ecr.describe_repositories
    calls:
      - action: list_image_referrers
        params:
          repositoryName: '{{ item.repositoryName }}'
          subjectId: '{{ item.subjectId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.referrers }}'
      item:
        annotations: '{{ item.annotations }}'
        artifactStatus: '{{ item.artifactStatus }}'
        artifactType: '{{ item.artifactType }}'
        digest: '{{ item.digest }}'
        mediaType: '{{ item.mediaType }}'
        size: '{{ item.size }}'
  # ── ListImages ──
  - discovery_id: aws.ecr.list_images
    for_each: aws.ecr.describe_repositories
    calls:
      - action: list_images
        params:
          repositoryName: '{{ item.repositoryName }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.imageIds }}'
      item:
        imageDetails: '{{ item.imageDetails }}'
        imageDigest: '{{ item.imageDigest }}'
        imageTag: '{{ item.imageTag }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.ecr.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.tags }}'
      item:
        Key: '{{ item.Key }}'
        Value: '{{ item.Value }}'
