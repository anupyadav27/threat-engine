# ============================================================
# Discovery YAML — opensearchserverless (AWS)
# Generated: 2026-02-21T04:56:59Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: opensearchserverless
services:
  client: opensearchserverless
  module: boto3.client
discovery:
  # ── GetAccountSettings ──
  - discovery_id: aws.opensearchserverless.get_account_settings
    calls:
      - action: get_account_settings
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.accountSettingsDetail }}'
      item:
        DestinationArn: '{{ item.DestinationArn }}'
        Enabled: '{{ item.Enabled }}'
        Format: '{{ item.Format }}'
        Level: '{{ item.Level }}'
        accountSettingsDetail: '{{ item.accountSettingsDetail }}'
        capacityLimits: '{{ item.capacityLimits }}'
  # ── GetPoliciesStats ──
  - discovery_id: aws.opensearchserverless.get_policies_stats
    calls:
      - action: get_policies_stats
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.AccessPolicyStats }}'
      item:
        AccessPolicyStats: '{{ item.AccessPolicyStats }}'
        DataPolicyCount: '{{ item.DataPolicyCount }}'
        LifecyclePolicyStats: '{{ item.LifecyclePolicyStats }}'
        SecurityConfigStats: '{{ item.SecurityConfigStats }}'
        SecurityPolicyStats: '{{ item.SecurityPolicyStats }}'
        Statement: '{{ item.Statement }}'
        TotalPolicyCount: '{{ item.TotalPolicyCount }}'
        Version: '{{ item.Version }}'
  # ── ListCollections ──
  - discovery_id: aws.opensearchserverless.list_collections
    calls:
      - action: list_collections
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.collectionSummaries }}'
      item:
        arn: '{{ item.arn }}'
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
  # ── ListVpcEndpoints ──
  - discovery_id: aws.opensearchserverless.list_vpc_endpoints
    calls:
      - action: list_vpc_endpoints
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.vpcEndpointSummaries }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetAccessPolicy ──
  - discovery_id: aws.opensearchserverless.get_access_policy
    for_each: aws.opensearchserverless.list_collections
    calls:
      - action: get_access_policy
        params:
          type: '{{ item.type }}'
          name: '{{ item.name }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.accessPolicyDetail }}'
      item:
        createdDate: '{{ item.createdDate }}'
        description: '{{ item.description }}'
        lastModifiedDate: '{{ item.lastModifiedDate }}'
        name: '{{ item.name }}'
        policy: '{{ item.policy }}'
        policyVersion: '{{ item.policyVersion }}'
        type: '{{ item.type }}'
  # ── GetIndex ──
  - discovery_id: aws.opensearchserverless.get_index
    calls:
      - action: get_index
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        indexSchema: '{{ response.indexSchema }}'
  # ── GetSecurityConfig ──
  - discovery_id: aws.opensearchserverless.get_security_config
    for_each: aws.opensearchserverless.list_collections
    calls:
      - action: get_security_config
        params:
          id: '{{ item.id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.securityConfigDetail }}'
      item:
        configVersion: '{{ item.configVersion }}'
        createdDate: '{{ item.createdDate }}'
        description: '{{ item.description }}'
        iamFederationOptions: '{{ item.iamFederationOptions }}'
        iamIdentityCenterOptions: '{{ item.iamIdentityCenterOptions }}'
        id: '{{ item.id }}'
        lastModifiedDate: '{{ item.lastModifiedDate }}'
        samlOptions: '{{ item.samlOptions }}'
        type: '{{ item.type }}'
  # ── GetSecurityPolicy ──
  - discovery_id: aws.opensearchserverless.get_security_policy
    for_each: aws.opensearchserverless.list_collections
    calls:
      - action: get_security_policy
        params:
          type: '{{ item.type }}'
          name: '{{ item.name }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.accessPolicyDetail }}'
      item:
        createdDate: '{{ item.createdDate }}'
        description: '{{ item.description }}'
        lastModifiedDate: '{{ item.lastModifiedDate }}'
        name: '{{ item.name }}'
        policy: '{{ item.policy }}'
        policyVersion: '{{ item.policyVersion }}'
        type: '{{ item.type }}'
  # ── ListAccessPolicies ──
  - discovery_id: aws.opensearchserverless.list_access_policies
    calls:
      - action: list_access_policies
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.accessPolicySummaries }}'
      item:
        createdDate: '{{ item.createdDate }}'
        description: '{{ item.description }}'
        lastModifiedDate: '{{ item.lastModifiedDate }}'
        name: '{{ item.name }}'
        policyVersion: '{{ item.policyVersion }}'
        type: '{{ item.type }}'
  # ── ListLifecyclePolicies ──
  - discovery_id: aws.opensearchserverless.list_lifecycle_policies
    calls:
      - action: list_lifecycle_policies
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.lifecyclePolicySummaries }}'
      item:
        createdDate: '{{ item.createdDate }}'
        description: '{{ item.description }}'
        lastModifiedDate: '{{ item.lastModifiedDate }}'
        name: '{{ item.name }}'
        policyVersion: '{{ item.policyVersion }}'
        type: '{{ item.type }}'
  # ── ListSecurityConfigs ──
  - discovery_id: aws.opensearchserverless.list_security_configs
    calls:
      - action: list_security_configs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.securityConfigSummaries }}'
      item:
        configVersion: '{{ item.configVersion }}'
        createdDate: '{{ item.createdDate }}'
        description: '{{ item.description }}'
        id: '{{ item.id }}'
        lastModifiedDate: '{{ item.lastModifiedDate }}'
        type: '{{ item.type }}'
  # ── ListSecurityPolicies ──
  - discovery_id: aws.opensearchserverless.list_security_policies
    calls:
      - action: list_security_policies
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.securityPolicySummaries }}'
      item:
        createdDate: '{{ item.createdDate }}'
        description: '{{ item.description }}'
        lastModifiedDate: '{{ item.lastModifiedDate }}'
        name: '{{ item.name }}'
        policyVersion: '{{ item.policyVersion }}'
        type: '{{ item.type }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.opensearchserverless.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.tags }}'
      item:
        key: '{{ item.key }}'
        value: '{{ item.value }}'
