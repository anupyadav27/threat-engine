# ============================================================
# Discovery YAML — workspaces-thin-client (AWS)
# Generated: 2026-02-21T04:57:00Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: workspaces-thin-client
services:
  client: workspaces-thin-client
  module: boto3.client
discovery:
  # ── ListDevices ──
  - discovery_id: aws.workspaces-thin-client.list_devices
    calls:
      - action: list_devices
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.devices }}'
      item:
        arn: '{{ item.arn }}'
        createdAt: '{{ item.createdAt }}'
        currentSoftwareSetId: '{{ item.currentSoftwareSetId }}'
        desiredSoftwareSetId: '{{ item.desiredSoftwareSetId }}'
        device: '{{ item.device }}'
        deviceCreationTags: '{{ item.deviceCreationTags }}'
        environmentId: '{{ item.environmentId }}'
        id: '{{ item.id }}'
        lastConnectedAt: '{{ item.lastConnectedAt }}'
        lastPostureAt: '{{ item.lastPostureAt }}'
        lastUserId: '{{ item.lastUserId }}'
        model: '{{ item.model }}'
        name: '{{ item.name }}'
        pendingSoftwareSetId: '{{ item.pendingSoftwareSetId }}'
        registeredDevicesCount: '{{ item.registeredDevicesCount }}'
        serialNumber: '{{ item.serialNumber }}'
        software: '{{ item.software }}'
        softwareSet: '{{ item.softwareSet }}'
        softwareSetUpdateSchedule: '{{ item.softwareSetUpdateSchedule }}'
        status: '{{ item.status }}'
        updatedAt: '{{ item.updatedAt }}'
  # ── ListEnvironments ──
  - discovery_id: aws.workspaces-thin-client.list_environments
    calls:
      - action: list_environments
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.environments }}'
      item:
        activationCode: '{{ item.activationCode }}'
        arn: '{{ item.arn }}'
        createdAt: '{{ item.createdAt }}'
        desiredSoftwareSetId: '{{ item.desiredSoftwareSetId }}'
        desktopArn: '{{ item.desktopArn }}'
        desktopEndpoint: '{{ item.desktopEndpoint }}'
        desktopType: '{{ item.desktopType }}'
        environment: '{{ item.environment }}'
        id: '{{ item.id }}'
        maintenanceWindow: '{{ item.maintenanceWindow }}'
        name: '{{ item.name }}'
        pendingSoftwareSetId: '{{ item.pendingSoftwareSetId }}'
        softwareSetUpdateMode: '{{ item.softwareSetUpdateMode }}'
        softwareSetUpdateSchedule: '{{ item.softwareSetUpdateSchedule }}'
        updatedAt: '{{ item.updatedAt }}'
  # ── ListSoftwareSets ──
  - discovery_id: aws.workspaces-thin-client.list_software_sets
    calls:
      - action: list_software_sets
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.softwareSets }}'
      item:
        arn: '{{ item.arn }}'
        id: '{{ item.id }}'
        releasedAt: '{{ item.releasedAt }}'
        softwareSet: '{{ item.softwareSet }}'
        supportedUntil: '{{ item.supportedUntil }}'
        validationStatus: '{{ item.validationStatus }}'
        version: '{{ item.version }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetDevice ──
  - discovery_id: aws.workspaces-thin-client.get_device
    for_each: aws.workspaces-thin-client.list_devices
    calls:
      - action: get_device
        params:
          id: '{{ item.id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.devices }}'
      item:
        arn: '{{ item.arn }}'
        createdAt: '{{ item.createdAt }}'
        currentSoftwareSetId: '{{ item.currentSoftwareSetId }}'
        currentSoftwareSetVersion: '{{ item.currentSoftwareSetVersion }}'
        desiredSoftwareSetId: '{{ item.desiredSoftwareSetId }}'
        device: '{{ item.device }}'
        environmentId: '{{ item.environmentId }}'
        id: '{{ item.id }}'
        kmsKeyArn: '{{ item.kmsKeyArn }}'
        lastConnectedAt: '{{ item.lastConnectedAt }}'
        lastPostureAt: '{{ item.lastPostureAt }}'
        lastUserId: '{{ item.lastUserId }}'
        model: '{{ item.model }}'
        name: '{{ item.name }}'
        pendingSoftwareSetId: '{{ item.pendingSoftwareSetId }}'
        pendingSoftwareSetVersion: '{{ item.pendingSoftwareSetVersion }}'
        serialNumber: '{{ item.serialNumber }}'
        softwareSetComplianceStatus: '{{ item.softwareSetComplianceStatus }}'
        softwareSetUpdateSchedule: '{{ item.softwareSetUpdateSchedule }}'
        softwareSetUpdateStatus: '{{ item.softwareSetUpdateStatus }}'
        status: '{{ item.status }}'
        updatedAt: '{{ item.updatedAt }}'
  # ── GetEnvironment ──
  - discovery_id: aws.workspaces-thin-client.get_environment
    for_each: aws.workspaces-thin-client.list_devices
    calls:
      - action: get_environment
        params:
          id: '{{ item.id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.environments }}'
      item:
        activationCode: '{{ item.activationCode }}'
        arn: '{{ item.arn }}'
        createdAt: '{{ item.createdAt }}'
        desiredSoftwareSetId: '{{ item.desiredSoftwareSetId }}'
        desktopArn: '{{ item.desktopArn }}'
        desktopEndpoint: '{{ item.desktopEndpoint }}'
        desktopType: '{{ item.desktopType }}'
        deviceCreationTags: '{{ item.deviceCreationTags }}'
        id: '{{ item.id }}'
        kmsKeyArn: '{{ item.kmsKeyArn }}'
        maintenanceWindow: '{{ item.maintenanceWindow }}'
        name: '{{ item.name }}'
        pendingSoftwareSetId: '{{ item.pendingSoftwareSetId }}'
        pendingSoftwareSetVersion: '{{ item.pendingSoftwareSetVersion }}'
        registeredDevicesCount: '{{ item.registeredDevicesCount }}'
        softwareSetComplianceStatus: '{{ item.softwareSetComplianceStatus }}'
        softwareSetUpdateMode: '{{ item.softwareSetUpdateMode }}'
        softwareSetUpdateSchedule: '{{ item.softwareSetUpdateSchedule }}'
        updatedAt: '{{ item.updatedAt }}'
  # ── GetSoftwareSet ──
  - discovery_id: aws.workspaces-thin-client.get_software_set
    for_each: aws.workspaces-thin-client.list_devices
    calls:
      - action: get_software_set
        params:
          id: '{{ item.id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.devices }}'
      item:
        arn: '{{ item.arn }}'
        id: '{{ item.id }}'
        releasedAt: '{{ item.releasedAt }}'
        software: '{{ item.software }}'
        softwareSet: '{{ item.softwareSet }}'
        supportedUntil: '{{ item.supportedUntil }}'
        validationStatus: '{{ item.validationStatus }}'
        version: '{{ item.version }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.workspaces-thin-client.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        tags: '{{ response.tags }}'
