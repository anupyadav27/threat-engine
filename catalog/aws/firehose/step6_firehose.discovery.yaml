# ============================================================
# Discovery YAML — firehose (AWS)
# Generated: 2026-02-21T04:56:58Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: firehose
services:
  client: firehose
  module: boto3.client
discovery:
  # ── ListDeliveryStreams ──
  - discovery_id: aws.firehose.list_delivery_streams
    calls:
      - action: list_delivery_streams
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.DeliveryStreamNames }}'
      item:
        DeliveryStreamDescription: '{{ item.DeliveryStreamDescription }}'
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeDeliveryStream ──
  - discovery_id: aws.firehose.describe_delivery_stream
    calls:
      - action: describe_delivery_stream
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.DeliveryStreamDescription }}'
      item:
        Status: '{{ item.Status }}'
        CreateTimestamp: '{{ item.CreateTimestamp }}'
        DeliveryStreamARN: '{{ item.DeliveryStreamARN }}'
        DeliveryStreamEncryptionConfiguration: '{{ item.DeliveryStreamEncryptionConfiguration }}'
        DeliveryStreamName: '{{ item.DeliveryStreamName }}'
        DeliveryStreamStatus: '{{ item.DeliveryStreamStatus }}'
        DeliveryStreamType: '{{ item.DeliveryStreamType }}'
        Destinations: '{{ item.Destinations }}'
        Enabled: '{{ item.Enabled }}'
        FailureDescription: '{{ item.FailureDescription }}'
        HasMoreDestinations: '{{ item.HasMoreDestinations }}'
        LastUpdateTimestamp: '{{ item.LastUpdateTimestamp }}'
        Source: '{{ item.Source }}'
        VersionId: '{{ item.VersionId }}'
  # ── ListTagsForDeliveryStream ──
  - discovery_id: aws.firehose.list_tags_for_delivery_stream
    calls:
      - action: list_tags_for_delivery_stream
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Tags }}'
      item:
        Key: '{{ item.Key }}'
        Value: '{{ item.Value }}'
