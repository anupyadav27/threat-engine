# ============================================================
# Discovery YAML — codeconnections (AWS)
# Generated: 2026-02-21T04:56:57Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: codeconnections
services:
  client: codeconnections
  module: boto3.client
discovery:
  # ── ListConnections ──
  - discovery_id: aws.codeconnections.list_connections
    calls:
      - action: list_connections
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Connections }}'
      item:
        SecurityGroupIds: '{{ item.SecurityGroupIds }}'
        SubnetIds: '{{ item.SubnetIds }}'
        VpcId: '{{ item.VpcId }}'
        Connection: '{{ item.Connection }}'
        ConnectionArn: '{{ item.ConnectionArn }}'
        ConnectionName: '{{ item.ConnectionName }}'
        ConnectionStatus: '{{ item.ConnectionStatus }}'
        HostArn: '{{ item.HostArn }}'
        OwnerAccountId: '{{ item.OwnerAccountId }}'
        ProviderType: '{{ item.ProviderType }}'
        TlsCertificate: '{{ item.TlsCertificate }}'
  # ── ListHosts ──
  - discovery_id: aws.codeconnections.list_hosts
    calls:
      - action: list_hosts
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Hosts }}'
      item:
        Name: '{{ item.Name }}'
        Status: '{{ item.Status }}'
        Enabled: '{{ item.Enabled }}'
        HostArn: '{{ item.HostArn }}'
        ProviderEndpoint: '{{ item.ProviderEndpoint }}'
        ProviderType: '{{ item.ProviderType }}'
        StatusMessage: '{{ item.StatusMessage }}'
        VpcConfiguration: '{{ item.VpcConfiguration }}'
  # ── ListRepositoryLinks ──
  - discovery_id: aws.codeconnections.list_repository_links
    calls:
      - action: list_repository_links
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.RepositoryLinks }}'
      item:
        OwnerId: '{{ item.OwnerId }}'
        ConnectionArn: '{{ item.ConnectionArn }}'
        EncryptionKeyArn: '{{ item.EncryptionKeyArn }}'
        ProviderType: '{{ item.ProviderType }}'
        RepositoryLinkArn: '{{ item.RepositoryLinkArn }}'
        RepositoryLinkId: '{{ item.RepositoryLinkId }}'
        RepositoryName: '{{ item.RepositoryName }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetConnection ──
  - discovery_id: aws.codeconnections.get_connection
    for_each: aws.codeconnections.list_connections
    calls:
      - action: get_connection
        params:
          ConnectionArn: '{{ item.ConnectionArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Connections }}'
      item:
        Connection: '{{ item.Connection }}'
        ConnectionArn: '{{ item.ConnectionArn }}'
        ConnectionName: '{{ item.ConnectionName }}'
        ConnectionStatus: '{{ item.ConnectionStatus }}'
        HostArn: '{{ item.HostArn }}'
        OwnerAccountId: '{{ item.OwnerAccountId }}'
        ProviderType: '{{ item.ProviderType }}'
  # ── GetHost ──
  - discovery_id: aws.codeconnections.get_host
    for_each: aws.codeconnections.list_connections
    calls:
      - action: get_host
        params:
          HostArn: '{{ item.HostArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.VpcConfiguration }}'
      item:
        SecurityGroupIds: '{{ item.SecurityGroupIds }}'
        SubnetIds: '{{ item.SubnetIds }}'
        VpcId: '{{ item.VpcId }}'
        TlsCertificate: '{{ item.TlsCertificate }}'
  # ── GetRepositoryLink ──
  - discovery_id: aws.codeconnections.get_repository_link
    for_each: aws.codeconnections.list_repository_links
    calls:
      - action: get_repository_link
        params:
          RepositoryLinkId: '{{ item.RepositoryLinkId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Connections }}'
      item:
        OwnerId: '{{ item.OwnerId }}'
        ConnectionArn: '{{ item.ConnectionArn }}'
        EncryptionKeyArn: '{{ item.EncryptionKeyArn }}'
        ProviderType: '{{ item.ProviderType }}'
        RepositoryLinkArn: '{{ item.RepositoryLinkArn }}'
        RepositoryLinkId: '{{ item.RepositoryLinkId }}'
        RepositoryName: '{{ item.RepositoryName }}'
  # ── GetRepositorySyncStatus ──
  - discovery_id: aws.codeconnections.get_repository_sync_status
    for_each: aws.codeconnections.list_repository_links
    calls:
      - action: get_repository_sync_status
        params:
          Branch: '{{ item.Branch }}'
          RepositoryLinkId: '{{ item.RepositoryLinkId }}'
          SyncType: '{{ item.SyncType }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.LatestSync }}'
      item:
        Status: '{{ item.Status }}'
        Events: '{{ item.Events }}'
        StartedAt: '{{ item.StartedAt }}'
  # ── GetResourceSyncStatus ──
  - discovery_id: aws.codeconnections.get_resource_sync_status
    calls:
      - action: get_resource_sync_status
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.DesiredState }}'
      item:
        OwnerId: '{{ item.OwnerId }}'
        Branch: '{{ item.Branch }}'
        Directory: '{{ item.Directory }}'
        ProviderType: '{{ item.ProviderType }}'
        RepositoryName: '{{ item.RepositoryName }}'
        Sha: '{{ item.Sha }}'
  # ── GetSyncBlockerSummary ──
  - discovery_id: aws.codeconnections.get_sync_blocker_summary
    calls:
      - action: get_sync_blocker_summary
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.SyncBlockerSummary }}'
      item:
        ResourceName: '{{ item.ResourceName }}'
        LatestBlockers: '{{ item.LatestBlockers }}'
        ParentResourceName: '{{ item.ParentResourceName }}'
        SyncBlockerSummary: '{{ item.SyncBlockerSummary }}'
  # ── GetSyncConfiguration ──
  - discovery_id: aws.codeconnections.get_sync_configuration
    calls:
      - action: get_sync_configuration
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.DesiredState }}'
      item:
        OwnerId: '{{ item.OwnerId }}'
        ResourceName: '{{ item.ResourceName }}'
        RoleArn: '{{ item.RoleArn }}'
        Branch: '{{ item.Branch }}'
        ConfigFile: '{{ item.ConfigFile }}'
        ProviderType: '{{ item.ProviderType }}'
        PublishDeploymentStatus: '{{ item.PublishDeploymentStatus }}'
        PullRequestComment: '{{ item.PullRequestComment }}'
        RepositoryLinkId: '{{ item.RepositoryLinkId }}'
        RepositoryName: '{{ item.RepositoryName }}'
        SyncType: '{{ item.SyncType }}'
        TriggerResourceUpdateOn: '{{ item.TriggerResourceUpdateOn }}'
  # ── ListRepositorySyncDefinitions ──
  - discovery_id: aws.codeconnections.list_repository_sync_definitions
    for_each: aws.codeconnections.list_repository_links
    calls:
      - action: list_repository_sync_definitions
        params:
          RepositoryLinkId: '{{ item.RepositoryLinkId }}'
          SyncType: '{{ item.SyncType }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.RepositorySyncDefinitions }}'
      item:
        Branch: '{{ item.Branch }}'
        Directory: '{{ item.Directory }}'
        Parent: '{{ item.Parent }}'
        Target: '{{ item.Target }}'
  # ── ListSyncConfigurations ──
  - discovery_id: aws.codeconnections.list_sync_configurations
    for_each: aws.codeconnections.list_repository_links
    calls:
      - action: list_sync_configurations
        params:
          RepositoryLinkId: '{{ item.RepositoryLinkId }}'
          SyncType: '{{ item.SyncType }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.SyncConfigurations }}'
      item:
        OwnerId: '{{ item.OwnerId }}'
        ResourceName: '{{ item.ResourceName }}'
        RoleArn: '{{ item.RoleArn }}'
        Branch: '{{ item.Branch }}'
        ConfigFile: '{{ item.ConfigFile }}'
        ProviderType: '{{ item.ProviderType }}'
        PublishDeploymentStatus: '{{ item.PublishDeploymentStatus }}'
        PullRequestComment: '{{ item.PullRequestComment }}'
        RepositoryLinkId: '{{ item.RepositoryLinkId }}'
        RepositoryName: '{{ item.RepositoryName }}'
        SyncType: '{{ item.SyncType }}'
        TriggerResourceUpdateOn: '{{ item.TriggerResourceUpdateOn }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.codeconnections.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Tags }}'
      item:
        Key: '{{ item.Key }}'
        Value: '{{ item.Value }}'
