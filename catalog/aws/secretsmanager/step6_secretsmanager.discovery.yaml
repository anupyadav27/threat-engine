# ============================================================
# Discovery YAML — secretsmanager (AWS)
# Generated: 2026-02-21T04:56:59Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: secretsmanager
services:
  client: secretsmanager
  module: boto3.client
discovery:
  # ── GetRandomPassword ──
  - discovery_id: aws.secretsmanager.get_random_password
    calls:
      - action: get_random_password
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.RandomPassword }}'
      item:
        RandomPassword: '{{ item.RandomPassword }}'
  # ── ListSecrets ──
  - discovery_id: aws.secretsmanager.list_secrets
    calls:
      - action: list_secrets
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.SecretList }}'
      item:
        KmsKeyId: '{{ item.KmsKeyId }}'
        Name: '{{ item.Name }}'
        Tags: '{{ item.Tags }}'
        ARN: '{{ item.ARN }}'
        CreatedDate: '{{ item.CreatedDate }}'
        DeletedDate: '{{ item.DeletedDate }}'
        Description: '{{ item.Description }}'
        ExternalSecretRotationMetadata: '{{ item.ExternalSecretRotationMetadata }}'
        ExternalSecretRotationRoleArn: '{{ item.ExternalSecretRotationRoleArn }}'
        LastAccessedDate: '{{ item.LastAccessedDate }}'
        LastChangedDate: '{{ item.LastChangedDate }}'
        LastRotatedDate: '{{ item.LastRotatedDate }}'
        NextRotationDate: '{{ item.NextRotationDate }}'
        OwningService: '{{ item.OwningService }}'
        PrimaryRegion: '{{ item.PrimaryRegion }}'
        RotationEnabled: '{{ item.RotationEnabled }}'
        RotationLambdaARN: '{{ item.RotationLambdaARN }}'
        RotationRules: '{{ item.RotationRules }}'
        SecretVersionsToStages: '{{ item.SecretVersionsToStages }}'
        Type: '{{ item.Type }}'
        VersionIdsToStages: '{{ item.VersionIdsToStages }}'
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeSecret ──
  - discovery_id: aws.secretsmanager.describe_secret
    calls:
      - action: describe_secret
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ExternalSecretRotationMetadata }}'
      item:
        Key: '{{ item.Key }}'
        Value: '{{ item.Value }}'
        VersionIdsToStages: '{{ item.VersionIdsToStages }}'
  # ── GetResourcePolicy ──
  - discovery_id: aws.secretsmanager.get_resource_policy
    calls:
      - action: get_resource_policy
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ARN }}'
      item:
        ResourcePolicy: '{{ item.ResourcePolicy }}'
        Statement: '{{ item.Statement }}'
        Version: '{{ item.Version }}'
  # ── GetSecretValue ──
  - discovery_id: aws.secretsmanager.get_secret_value
    calls:
      - action: get_secret_value
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.VersionStages }}'
  # ── ListSecretVersionIds ──
  - discovery_id: aws.secretsmanager.list_secret_version_ids
    calls:
      - action: list_secret_version_ids
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Versions }}'
      item:
        CreatedDate: '{{ item.CreatedDate }}'
        KmsKeyIds: '{{ item.KmsKeyIds }}'
        LastAccessedDate: '{{ item.LastAccessedDate }}'
        VersionId: '{{ item.VersionId }}'
        VersionStages: '{{ item.VersionStages }}'
