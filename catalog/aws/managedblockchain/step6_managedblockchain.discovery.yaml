# ============================================================
# Discovery YAML — managedblockchain (AWS)
# Generated: 2026-02-21T04:56:59Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: managedblockchain
services:
  client: managedblockchain
  module: boto3.client
discovery:
  # ── ListAccessors ──
  - discovery_id: aws.managedblockchain.list_accessors
    calls:
      - action: list_accessors
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Accessors }}'
      item:
        Arn: '{{ item.Arn }}'
        CreationDate: '{{ item.CreationDate }}'
        Id: '{{ item.Id }}'
        Status: '{{ item.Status }}'
        Tags: '{{ item.Tags }}'
        Accessor: '{{ item.Accessor }}'
        BillingToken: '{{ item.BillingToken }}'
        NetworkType: '{{ item.NetworkType }}'
        Type: '{{ item.Type }}'
  # ── ListInvitations ──
  - discovery_id: aws.managedblockchain.list_invitations
    calls:
      - action: list_invitations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Invitations }}'
      item:
        Arn: '{{ item.Arn }}'
        CreationDate: '{{ item.CreationDate }}'
        Status: '{{ item.Status }}'
        ExpirationDate: '{{ item.ExpirationDate }}'
        InvitationId: '{{ item.InvitationId }}'
        NetworkSummary: '{{ item.NetworkSummary }}'
  # ── ListNetworks ──
  - discovery_id: aws.managedblockchain.list_networks
    calls:
      - action: list_networks
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Networks }}'
      item:
        Arn: '{{ item.Arn }}'
        CreationDate: '{{ item.CreationDate }}'
        Id: '{{ item.Id }}'
        Name: '{{ item.Name }}'
        Status: '{{ item.Status }}'
        Description: '{{ item.Description }}'
        Framework: '{{ item.Framework }}'
        FrameworkVersion: '{{ item.FrameworkVersion }}'
        Network: '{{ item.Network }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetAccessor ──
  - discovery_id: aws.managedblockchain.get_accessor
    for_each: aws.managedblockchain.list_accessors
    calls:
      - action: get_accessor
        params:
          AccessorId: '{{ item.AccessorId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Accessors }}'
      item:
        Arn: '{{ item.Arn }}'
        CreationDate: '{{ item.CreationDate }}'
        Id: '{{ item.Id }}'
        Status: '{{ item.Status }}'
        Tags: '{{ item.Tags }}'
        Accessor: '{{ item.Accessor }}'
        BillingToken: '{{ item.BillingToken }}'
        NetworkType: '{{ item.NetworkType }}'
        Type: '{{ item.Type }}'
  # ── GetMember ──
  - discovery_id: aws.managedblockchain.get_member
    calls:
      - action: get_member
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Accessors }}'
      item:
        Arn: '{{ item.Arn }}'
        CreationDate: '{{ item.CreationDate }}'
        Id: '{{ item.Id }}'
        Name: '{{ item.Name }}'
        Status: '{{ item.Status }}'
        Tags: '{{ item.Tags }}'
        Description: '{{ item.Description }}'
        Enabled: '{{ item.Enabled }}'
        FrameworkAttributes: '{{ item.FrameworkAttributes }}'
        KmsKeyArn: '{{ item.KmsKeyArn }}'
        LogPublishingConfiguration: '{{ item.LogPublishingConfiguration }}'
        NetworkId: '{{ item.NetworkId }}'
  # ── GetNetwork ──
  - discovery_id: aws.managedblockchain.get_network
    calls:
      - action: get_network
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Accessors }}'
      item:
        Arn: '{{ item.Arn }}'
        CreationDate: '{{ item.CreationDate }}'
        Id: '{{ item.Id }}'
        Name: '{{ item.Name }}'
        Status: '{{ item.Status }}'
        Tags: '{{ item.Tags }}'
        Description: '{{ item.Description }}'
        Framework: '{{ item.Framework }}'
        FrameworkAttributes: '{{ item.FrameworkAttributes }}'
        FrameworkVersion: '{{ item.FrameworkVersion }}'
        Network: '{{ item.Network }}'
        Statement: '{{ item.Statement }}'
        Version: '{{ item.Version }}'
        VotingPolicy: '{{ item.VotingPolicy }}'
        VpcEndpointServiceName: '{{ item.VpcEndpointServiceName }}'
  # ── GetNode ──
  - discovery_id: aws.managedblockchain.get_node
    calls:
      - action: get_node
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Accessors }}'
      item:
        Arn: '{{ item.Arn }}'
        CreationDate: '{{ item.CreationDate }}'
        Id: '{{ item.Id }}'
        Status: '{{ item.Status }}'
        Tags: '{{ item.Tags }}'
        AvailabilityZone: '{{ item.AvailabilityZone }}'
        FrameworkAttributes: '{{ item.FrameworkAttributes }}'
        InstanceType: '{{ item.InstanceType }}'
        KmsKeyArn: '{{ item.KmsKeyArn }}'
        LogPublishingConfiguration: '{{ item.LogPublishingConfiguration }}'
        MemberId: '{{ item.MemberId }}'
        NetworkId: '{{ item.NetworkId }}'
        StateDB: '{{ item.StateDB }}'
  # ── GetProposal ──
  - discovery_id: aws.managedblockchain.get_proposal
    calls:
      - action: get_proposal
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Proposal }}'
      item:
        Arn: '{{ item.Arn }}'
        CreationDate: '{{ item.CreationDate }}'
        Status: '{{ item.Status }}'
        Tags: '{{ item.Tags }}'
        Actions: '{{ item.Actions }}'
        Description: '{{ item.Description }}'
        ExpirationDate: '{{ item.ExpirationDate }}'
        NetworkId: '{{ item.NetworkId }}'
        NoVoteCount: '{{ item.NoVoteCount }}'
        OutstandingVoteCount: '{{ item.OutstandingVoteCount }}'
        Proposal: '{{ item.Proposal }}'
        ProposalId: '{{ item.ProposalId }}'
        ProposedByMemberId: '{{ item.ProposedByMemberId }}'
        ProposedByMemberName: '{{ item.ProposedByMemberName }}'
        YesVoteCount: '{{ item.YesVoteCount }}'
  # ── ListMembers ──
  - discovery_id: aws.managedblockchain.list_members
    calls:
      - action: list_members
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Members }}'
      item:
        Arn: '{{ item.Arn }}'
        CreationDate: '{{ item.CreationDate }}'
        Id: '{{ item.Id }}'
        Name: '{{ item.Name }}'
        Status: '{{ item.Status }}'
        Description: '{{ item.Description }}'
        IsOwned: '{{ item.IsOwned }}'
  # ── ListNodes ──
  - discovery_id: aws.managedblockchain.list_nodes
    calls:
      - action: list_nodes
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Nodes }}'
      item:
        Arn: '{{ item.Arn }}'
        CreationDate: '{{ item.CreationDate }}'
        Id: '{{ item.Id }}'
        Status: '{{ item.Status }}'
        AvailabilityZone: '{{ item.AvailabilityZone }}'
        InstanceType: '{{ item.InstanceType }}'
  # ── ListProposalVotes ──
  - discovery_id: aws.managedblockchain.list_proposal_votes
    calls:
      - action: list_proposal_votes
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ProposalVotes }}'
      item:
        MemberId: '{{ item.MemberId }}'
        MemberName: '{{ item.MemberName }}'
        Proposal: '{{ item.Proposal }}'
        Vote: '{{ item.Vote }}'
  # ── ListProposals ──
  - discovery_id: aws.managedblockchain.list_proposals
    calls:
      - action: list_proposals
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Proposals }}'
      item:
        Arn: '{{ item.Arn }}'
        CreationDate: '{{ item.CreationDate }}'
        Status: '{{ item.Status }}'
        Description: '{{ item.Description }}'
        ExpirationDate: '{{ item.ExpirationDate }}'
        ProposalId: '{{ item.ProposalId }}'
        ProposedByMemberId: '{{ item.ProposedByMemberId }}'
        ProposedByMemberName: '{{ item.ProposedByMemberName }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.managedblockchain.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        Tags: '{{ response.Tags }}'
