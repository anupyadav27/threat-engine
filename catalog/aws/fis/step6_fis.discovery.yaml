# ============================================================
# Discovery YAML — fis (AWS)
# Generated: 2026-02-21T04:56:58Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: fis
services:
  client: fis
  module: boto3.client
discovery:
  # ── ListActions ──
  - discovery_id: aws.fis.list_actions
    calls:
      - action: list_actions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.actions }}'
      item:
        action: '{{ item.action }}'
        arn: '{{ item.arn }}'
        description: '{{ item.description }}'
        id: '{{ item.id }}'
        parameters: '{{ item.parameters }}'
        tags: '{{ item.tags }}'
        targets: '{{ item.targets }}'
  # ── ListExperimentTemplates ──
  - discovery_id: aws.fis.list_experiment_templates
    calls:
      - action: list_experiment_templates
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.experimentTemplates }}'
      item:
        arn: '{{ item.arn }}'
        creationTime: '{{ item.creationTime }}'
        description: '{{ item.description }}'
        id: '{{ item.id }}'
        lastUpdateTime: '{{ item.lastUpdateTime }}'
        tags: '{{ item.tags }}'
  # ── ListExperiments ──
  - discovery_id: aws.fis.list_experiments
    calls:
      - action: list_experiments
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.experiments }}'
      item:
        arn: '{{ item.arn }}'
        creationTime: '{{ item.creationTime }}'
        experimentOptions: '{{ item.experimentOptions }}'
        experimentTemplateId: '{{ item.experimentTemplateId }}'
        id: '{{ item.id }}'
        state: '{{ item.state }}'
        tags: '{{ item.tags }}'
  # ── ListTargetResourceTypes ──
  - discovery_id: aws.fis.list_target_resource_types
    calls:
      - action: list_target_resource_types
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.targetResourceTypes }}'
      item:
        description: '{{ item.description }}'
        resourceType: '{{ item.resourceType }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetAction ──
  - discovery_id: aws.fis.get_action
    for_each: aws.fis.list_actions
    calls:
      - action: get_action
        params:
          id: '{{ item.id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.actions }}'
      item:
        action: '{{ item.action }}'
        arn: '{{ item.arn }}'
        description: '{{ item.description }}'
        id: '{{ item.id }}'
        parameters: '{{ item.parameters }}'
        tags: '{{ item.tags }}'
        targets: '{{ item.targets }}'
  # ── GetExperiment ──
  - discovery_id: aws.fis.get_experiment
    for_each: aws.fis.list_actions
    calls:
      - action: get_experiment
        params:
          id: '{{ item.id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.experiment }}'
      item:
        actions: '{{ item.actions }}'
        arn: '{{ item.arn }}'
        creationTime: '{{ item.creationTime }}'
        endTime: '{{ item.endTime }}'
        experimentOptions: '{{ item.experimentOptions }}'
        experimentReport: '{{ item.experimentReport }}'
        experimentReportConfiguration: '{{ item.experimentReportConfiguration }}'
        experimentTemplateId: '{{ item.experimentTemplateId }}'
        id: '{{ item.id }}'
        logConfiguration: '{{ item.logConfiguration }}'
        roleArn: '{{ item.roleArn }}'
        startTime: '{{ item.startTime }}'
        state: '{{ item.state }}'
        stopConditions: '{{ item.stopConditions }}'
        tags: '{{ item.tags }}'
        targetAccountConfigurationsCount: '{{ item.targetAccountConfigurationsCount }}'
        targets: '{{ item.targets }}'
  # ── GetExperimentTargetAccountConfiguration ──
  - discovery_id: aws.fis.get_experiment_target_account_configuration
    calls:
      - action: get_experiment_target_account_configuration
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.targetAccountConfiguration }}'
      item:
        accountId: '{{ item.accountId }}'
        description: '{{ item.description }}'
        roleArn: '{{ item.roleArn }}'
  # ── GetExperimentTemplate ──
  - discovery_id: aws.fis.get_experiment_template
    for_each: aws.fis.list_actions
    calls:
      - action: get_experiment_template
        params:
          id: '{{ item.id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.experiment }}'
      item:
        actions: '{{ item.actions }}'
        arn: '{{ item.arn }}'
        creationTime: '{{ item.creationTime }}'
        description: '{{ item.description }}'
        experimentOptions: '{{ item.experimentOptions }}'
        experimentReportConfiguration: '{{ item.experimentReportConfiguration }}'
        id: '{{ item.id }}'
        lastUpdateTime: '{{ item.lastUpdateTime }}'
        logConfiguration: '{{ item.logConfiguration }}'
        roleArn: '{{ item.roleArn }}'
        stopConditions: '{{ item.stopConditions }}'
        tags: '{{ item.tags }}'
        targetAccountConfigurationsCount: '{{ item.targetAccountConfigurationsCount }}'
        targets: '{{ item.targets }}'
  # ── GetSafetyLever ──
  - discovery_id: aws.fis.get_safety_lever
    for_each: aws.fis.list_actions
    calls:
      - action: get_safety_lever
        params:
          id: '{{ item.id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.actions }}'
      item:
        arn: '{{ item.arn }}'
        id: '{{ item.id }}'
        state: '{{ item.state }}'
  # ── GetTargetAccountConfiguration ──
  - discovery_id: aws.fis.get_target_account_configuration
    for_each: aws.fis.list_experiments
    calls:
      - action: get_target_account_configuration
        params:
          experimentTemplateId: '{{ item.experimentTemplateId }}'
          accountId: '{{ item.accountId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.targetAccountConfiguration }}'
      item:
        accountId: '{{ item.accountId }}'
        description: '{{ item.description }}'
        roleArn: '{{ item.roleArn }}'
  # ── GetTargetResourceType ──
  - discovery_id: aws.fis.get_target_resource_type
    for_each: aws.fis.list_target_resource_types
    calls:
      - action: get_target_resource_type
        params:
          resourceType: '{{ item.resourceType }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.actions }}'
      item:
        description: '{{ item.description }}'
        parameters: '{{ item.parameters }}'
        resourceType: '{{ item.resourceType }}'
  # ── ListExperimentResolvedTargets ──
  - discovery_id: aws.fis.list_experiment_resolved_targets
    calls:
      - action: list_experiment_resolved_targets
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.resolvedTargets }}'
      item:
        resourceType: '{{ item.resourceType }}'
        targetInformation: '{{ item.targetInformation }}'
        targetName: '{{ item.targetName }}'
  # ── ListExperimentTargetAccountConfigurations ──
  - discovery_id: aws.fis.list_experiment_target_account_configurations
    calls:
      - action: list_experiment_target_account_configurations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.targetAccountConfigurations }}'
      item:
        accountId: '{{ item.accountId }}'
        description: '{{ item.description }}'
        roleArn: '{{ item.roleArn }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.fis.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        tags: '{{ response.tags }}'
  # ── ListTargetAccountConfigurations ──
  - discovery_id: aws.fis.list_target_account_configurations
    for_each: aws.fis.list_experiments
    calls:
      - action: list_target_account_configurations
        params:
          experimentTemplateId: '{{ item.experimentTemplateId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.targetAccountConfigurations }}'
      item:
        accountId: '{{ item.accountId }}'
        description: '{{ item.description }}'
        roleArn: '{{ item.roleArn }}'
