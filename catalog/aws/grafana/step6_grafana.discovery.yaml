# ============================================================
# Discovery YAML — grafana (AWS)
# Generated: 2026-02-21T04:56:58Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: grafana
services:
  client: grafana
  module: boto3.client
discovery:
  # ── ListVersions ──
  - discovery_id: aws.grafana.list_versions
    calls:
      - action: list_versions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.grafanaVersions }}'
  # ── ListWorkspaces ──
  - discovery_id: aws.grafana.list_workspaces
    calls:
      - action: list_workspaces
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.workspaces }}'
      item:
        authentication: '{{ item.authentication }}'
        created: '{{ item.created }}'
        description: '{{ item.description }}'
        endpoint: '{{ item.endpoint }}'
        grafanaToken: '{{ item.grafanaToken }}'
        grafanaVersion: '{{ item.grafanaVersion }}'
        id: '{{ item.id }}'
        licenseType: '{{ item.licenseType }}'
        modified: '{{ item.modified }}'
        name: '{{ item.name }}'
        notificationDestinations: '{{ item.notificationDestinations }}'
        status: '{{ item.status }}'
        tags: '{{ item.tags }}'
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeWorkspace ──
  - discovery_id: aws.grafana.describe_workspace
    calls:
      - action: describe_workspace
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.workspace }}'
      item:
        accountAccessType: '{{ item.accountAccessType }}'
        authentication: '{{ item.authentication }}'
        created: '{{ item.created }}'
        dataSources: '{{ item.dataSources }}'
        description: '{{ item.description }}'
        endpoint: '{{ item.endpoint }}'
        freeTrialConsumed: '{{ item.freeTrialConsumed }}'
        freeTrialExpiration: '{{ item.freeTrialExpiration }}'
        grafanaToken: '{{ item.grafanaToken }}'
        grafanaVersion: '{{ item.grafanaVersion }}'
        id: '{{ item.id }}'
        licenseExpiration: '{{ item.licenseExpiration }}'
        licenseType: '{{ item.licenseType }}'
        modified: '{{ item.modified }}'
        name: '{{ item.name }}'
        networkAccessControl: '{{ item.networkAccessControl }}'
        notificationDestinations: '{{ item.notificationDestinations }}'
        organizationRoleName: '{{ item.organizationRoleName }}'
        organizationalUnits: '{{ item.organizationalUnits }}'
        permissionType: '{{ item.permissionType }}'
        stackSetName: '{{ item.stackSetName }}'
        status: '{{ item.status }}'
        tags: '{{ item.tags }}'
        vpcConfiguration: '{{ item.vpcConfiguration }}'
        workspaceRoleArn: '{{ item.workspaceRoleArn }}'
  # ── DescribeWorkspaceAuthentication ──
  - discovery_id: aws.grafana.describe_workspace_authentication
    calls:
      - action: describe_workspace_authentication
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.authentication }}'
      item:
        awsSso: '{{ item.awsSso }}'
        providers: '{{ item.providers }}'
        saml: '{{ item.saml }}'
  # ── DescribeWorkspaceConfiguration ──
  - discovery_id: aws.grafana.describe_workspace_configuration
    calls:
      - action: describe_workspace_configuration
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.configuration }}'
      item:
        configuration: '{{ item.configuration }}'
  # ── ListPermissions ──
  - discovery_id: aws.grafana.list_permissions
    calls:
      - action: list_permissions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.permissions }}'
      item:
        role: '{{ item.role }}'
        user: '{{ item.user }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.grafana.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        tags: '{{ response.tags }}'
  # ── ListWorkspaceServiceAccountTokens ──
  - discovery_id: aws.grafana.list_workspace_service_account_tokens
    calls:
      - action: list_workspace_service_account_tokens
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.serviceAccountTokens }}'
      item:
        createdAt: '{{ item.createdAt }}'
        expiresAt: '{{ item.expiresAt }}'
        id: '{{ item.id }}'
        lastUsedAt: '{{ item.lastUsedAt }}'
        name: '{{ item.name }}'
  # ── ListWorkspaceServiceAccounts ──
  - discovery_id: aws.grafana.list_workspace_service_accounts
    calls:
      - action: list_workspace_service_accounts
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.serviceAccounts }}'
      item:
        grafanaRole: '{{ item.grafanaRole }}'
        id: '{{ item.id }}'
        isDisabled: '{{ item.isDisabled }}'
        name: '{{ item.name }}'
