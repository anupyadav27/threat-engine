# ============================================================
# Discovery YAML — kafka (AWS)
# Generated: 2026-02-21T04:56:58Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: kafka
services:
  client: kafka
  module: boto3.client
discovery:
  # ── GetCompatibleKafkaVersions ──
  - discovery_id: aws.kafka.get_compatible_kafka_versions
    calls:
      - action: get_compatible_kafka_versions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.CompatibleKafkaVersions }}'
  # ── ListClusters ──
  - discovery_id: aws.kafka.list_clusters
    calls:
      - action: list_clusters
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ClusterInfoList }}'
  # ── ListClustersV2 ──
  - discovery_id: aws.kafka.list_clusters_v2
    calls:
      - action: list_clusters_v2
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ClusterInfoList }}'
  # ── ListConfigurations ──
  - discovery_id: aws.kafka.list_configurations
    calls:
      - action: list_configurations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Configurations }}'
  # ── ListKafkaVersions ──
  - discovery_id: aws.kafka.list_kafka_versions
    calls:
      - action: list_kafka_versions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.KafkaVersions }}'
  # ── ListReplicators ──
  - discovery_id: aws.kafka.list_replicators
    calls:
      - action: list_replicators
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Replicators }}'
  # ── ListVpcConnections ──
  - discovery_id: aws.kafka.list_vpc_connections
    calls:
      - action: list_vpc_connections
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.VpcConnections }}'
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeCluster ──
  - discovery_id: aws.kafka.describe_cluster
    for_each: aws.kafka.list_clusters
    calls:
      - action: describe_cluster
        params:
          ClusterArn: '{{ item.ClusterArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        ClusterInfo: '{{ response.ClusterInfo }}'
  # ── DescribeClusterOperation ──
  - discovery_id: aws.kafka.describe_cluster_operation
    calls:
      - action: describe_cluster_operation
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        ClusterOperationInfo: '{{ response.ClusterOperationInfo }}'
  # ── DescribeClusterOperationV2 ──
  - discovery_id: aws.kafka.describe_cluster_operation_v2
    calls:
      - action: describe_cluster_operation_v2
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        ClusterOperationInfo: '{{ response.ClusterOperationInfo }}'
  # ── DescribeClusterV2 ──
  - discovery_id: aws.kafka.describe_cluster_v2
    for_each: aws.kafka.list_clusters
    calls:
      - action: describe_cluster_v2
        params:
          ClusterArn: '{{ item.ClusterArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        ClusterInfo: '{{ response.ClusterInfo }}'
  # ── DescribeConfiguration ──
  - discovery_id: aws.kafka.describe_configuration
    for_each: aws.kafka.list_configurations
    calls:
      - action: describe_configuration
        params:
          Arn: '{{ item.Arn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.KafkaVersions }}'
  # ── DescribeConfigurationRevision ──
  - discovery_id: aws.kafka.describe_configuration_revision
    for_each: aws.kafka.list_configurations
    calls:
      - action: describe_configuration_revision
        params:
          Revision: '{{ item.Revision }}'
          Arn: '{{ item.Arn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        Arn: '{{ response.Arn }}'
        CreationTime: '{{ response.CreationTime }}'
        Description: '{{ response.Description }}'
        Revision: '{{ response.Revision }}'
        ServerProperties: '{{ response.ServerProperties }}'
  # ── DescribeReplicator ──
  - discovery_id: aws.kafka.describe_replicator
    for_each: aws.kafka.list_replicators
    calls:
      - action: describe_replicator
        params:
          ReplicatorArn: '{{ item.ReplicatorArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.KafkaClusters }}'
  # ── DescribeTopic ──
  - discovery_id: aws.kafka.describe_topic
    for_each: aws.kafka.list_clusters
    calls:
      - action: describe_topic
        params:
          ClusterArn: '{{ item.ClusterArn }}'
          TopicName: '{{ item.TopicName }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        Status: '{{ response.Status }}'
        Configs: '{{ response.Configs }}'
        PartitionCount: '{{ response.PartitionCount }}'
        ReplicationFactor: '{{ response.ReplicationFactor }}'
        TopicArn: '{{ response.TopicArn }}'
        TopicName: '{{ response.TopicName }}'
  # ── DescribeTopicPartitions ──
  - discovery_id: aws.kafka.describe_topic_partitions
    for_each: aws.kafka.list_clusters
    calls:
      - action: describe_topic_partitions
        params:
          ClusterArn: '{{ item.ClusterArn }}'
          TopicName: '{{ item.TopicName }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Partitions }}'
  # ── DescribeVpcConnection ──
  - discovery_id: aws.kafka.describe_vpc_connection
    for_each: aws.kafka.list_configurations
    calls:
      - action: describe_vpc_connection
        params:
          Arn: '{{ item.Arn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Subnets }}'
  # ── GetBootstrapBrokers ──
  - discovery_id: aws.kafka.get_bootstrap_brokers
    for_each: aws.kafka.list_clusters
    calls:
      - action: get_bootstrap_brokers
        params:
          ClusterArn: '{{ item.ClusterArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        BootstrapBrokerString: '{{ response.BootstrapBrokerString }}'
        BootstrapBrokerStringPublicSaslIam: '{{ response.BootstrapBrokerStringPublicSaslIam }}'
        BootstrapBrokerStringPublicSaslScram: '{{ response.BootstrapBrokerStringPublicSaslScram }}'
        BootstrapBrokerStringPublicTls: '{{ response.BootstrapBrokerStringPublicTls }}'
        BootstrapBrokerStringSaslIam: '{{ response.BootstrapBrokerStringSaslIam }}'
        BootstrapBrokerStringSaslScram: '{{ response.BootstrapBrokerStringSaslScram }}'
        BootstrapBrokerStringTls: '{{ response.BootstrapBrokerStringTls }}'
        BootstrapBrokerStringVpcConnectivitySaslIam: '{{ response.BootstrapBrokerStringVpcConnectivitySaslIam }}'
        BootstrapBrokerStringVpcConnectivitySaslScram: '{{ response.BootstrapBrokerStringVpcConnectivitySaslScram }}'
        BootstrapBrokerStringVpcConnectivityTls: '{{ response.BootstrapBrokerStringVpcConnectivityTls }}'
  # ── GetClusterPolicy ──
  - discovery_id: aws.kafka.get_cluster_policy
    for_each: aws.kafka.list_clusters
    calls:
      - action: get_cluster_policy
        params:
          ClusterArn: '{{ item.ClusterArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        Policy: '{{ response.Policy }}'
        CurrentVersion: '{{ response.CurrentVersion }}'
  # ── ListClientVpcConnections ──
  - discovery_id: aws.kafka.list_client_vpc_connections
    for_each: aws.kafka.list_clusters
    calls:
      - action: list_client_vpc_connections
        params:
          ClusterArn: '{{ item.ClusterArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ClientVpcConnections }}'
  # ── ListClusterOperations ──
  - discovery_id: aws.kafka.list_cluster_operations
    for_each: aws.kafka.list_clusters
    calls:
      - action: list_cluster_operations
        params:
          ClusterArn: '{{ item.ClusterArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ClusterOperationInfoList }}'
  # ── ListClusterOperationsV2 ──
  - discovery_id: aws.kafka.list_cluster_operations_v2
    for_each: aws.kafka.list_clusters
    calls:
      - action: list_cluster_operations_v2
        params:
          ClusterArn: '{{ item.ClusterArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ClusterOperationInfoList }}'
  # ── ListConfigurationRevisions ──
  - discovery_id: aws.kafka.list_configuration_revisions
    for_each: aws.kafka.list_configurations
    calls:
      - action: list_configuration_revisions
        params:
          Arn: '{{ item.Arn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Revisions }}'
  # ── ListNodes ──
  - discovery_id: aws.kafka.list_nodes
    for_each: aws.kafka.list_clusters
    calls:
      - action: list_nodes
        params:
          ClusterArn: '{{ item.ClusterArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.NodeInfoList }}'
  # ── ListScramSecrets ──
  - discovery_id: aws.kafka.list_scram_secrets
    for_each: aws.kafka.list_clusters
    calls:
      - action: list_scram_secrets
        params:
          ClusterArn: '{{ item.ClusterArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.SecretArnList }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.kafka.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        Tags: '{{ response.Tags }}'
  # ── ListTopics ──
  - discovery_id: aws.kafka.list_topics
    for_each: aws.kafka.list_clusters
    calls:
      - action: list_topics
        params:
          ClusterArn: '{{ item.ClusterArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Topics }}'
