# ============================================================
# Discovery YAML — chime-sdk-media-pipelines (AWS)
# Generated: 2026-02-21T04:56:57Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: chime-sdk-media-pipelines
services:
  client: chime-sdk-media-pipelines
  module: boto3.client
discovery:
  # ── ListMediaCapturePipelines ──
  - discovery_id: aws.chime-sdk-media-pipelines.list_media_capture_pipelines
    calls:
      - action: list_media_capture_pipelines
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.MediaCapturePipelines }}'
      item:
        MediaPipelineArn: '{{ item.MediaPipelineArn }}'
        MediaPipelineId: '{{ item.MediaPipelineId }}'
  # ── ListMediaInsightsPipelineConfigurations ──
  - discovery_id: aws.chime-sdk-media-pipelines.list_media_insights_pipeline_configurations
    calls:
      - action: list_media_insights_pipeline_configurations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.MediaInsightsPipelineConfigurations }}'
      item:
        Enabled: '{{ item.Enabled }}'
        MediaInsightsPipelineConfigurationArn: '{{ item.MediaInsightsPipelineConfigurationArn }}'
        MediaInsightsPipelineConfigurationId: '{{ item.MediaInsightsPipelineConfigurationId }}'
        MediaInsightsPipelineConfigurationName: '{{ item.MediaInsightsPipelineConfigurationName }}'
  # ── ListMediaPipelineKinesisVideoStreamPools ──
  - discovery_id: aws.chime-sdk-media-pipelines.list_media_pipeline_kinesis_video_stream_pools
    calls:
      - action: list_media_pipeline_kinesis_video_stream_pools
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.KinesisVideoStreamPools }}'
      item:
        PoolArn: '{{ item.PoolArn }}'
        PoolId: '{{ item.PoolId }}'
        PoolName: '{{ item.PoolName }}'
  # ── ListMediaPipelines ──
  - discovery_id: aws.chime-sdk-media-pipelines.list_media_pipelines
    calls:
      - action: list_media_pipelines
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.MediaPipelines }}'
      item:
        MediaPipelineArn: '{{ item.MediaPipelineArn }}'
        MediaPipelineId: '{{ item.MediaPipelineId }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetMediaCapturePipeline ──
  - discovery_id: aws.chime-sdk-media-pipelines.get_media_capture_pipeline
    for_each: aws.chime-sdk-media-pipelines.list_media_capture_pipelines
    calls:
      - action: get_media_capture_pipeline
        params:
          MediaPipelineId: '{{ item.MediaPipelineId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.MediaCapturePipeline }}'
      item:
        Status: '{{ item.Status }}'
        ChimeSdkMeetingConfiguration: '{{ item.ChimeSdkMeetingConfiguration }}'
        CreatedTimestamp: '{{ item.CreatedTimestamp }}'
        MediaPipelineArn: '{{ item.MediaPipelineArn }}'
        MediaPipelineId: '{{ item.MediaPipelineId }}'
        SinkArn: '{{ item.SinkArn }}'
        SinkIamRoleArn: '{{ item.SinkIamRoleArn }}'
        SinkType: '{{ item.SinkType }}'
        SourceArn: '{{ item.SourceArn }}'
        SourceType: '{{ item.SourceType }}'
        SseAwsKeyManagementParams: '{{ item.SseAwsKeyManagementParams }}'
        UpdatedTimestamp: '{{ item.UpdatedTimestamp }}'
  # ── GetMediaInsightsPipelineConfiguration ──
  - discovery_id: aws.chime-sdk-media-pipelines.get_media_insights_pipeline_configuration
    calls:
      - action: get_media_insights_pipeline_configuration
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.MediaCapturePipeline }}'
      item:
        CreatedTimestamp: '{{ item.CreatedTimestamp }}'
        Elements: '{{ item.Elements }}'
        MediaInsightsPipelineConfigurationArn: '{{ item.MediaInsightsPipelineConfigurationArn }}'
        MediaInsightsPipelineConfigurationId: '{{ item.MediaInsightsPipelineConfigurationId }}'
        MediaInsightsPipelineConfigurationName: '{{ item.MediaInsightsPipelineConfigurationName }}'
        RealTimeAlertConfiguration: '{{ item.RealTimeAlertConfiguration }}'
        ResourceAccessRoleArn: '{{ item.ResourceAccessRoleArn }}'
        UpdatedTimestamp: '{{ item.UpdatedTimestamp }}'
  # ── GetMediaPipeline ──
  - discovery_id: aws.chime-sdk-media-pipelines.get_media_pipeline
    for_each: aws.chime-sdk-media-pipelines.list_media_capture_pipelines
    calls:
      - action: get_media_pipeline
        params:
          MediaPipelineId: '{{ item.MediaPipelineId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.MediaPipeline }}'
      item:
        MediaCapturePipeline: '{{ item.MediaCapturePipeline }}'
        MediaConcatenationPipeline: '{{ item.MediaConcatenationPipeline }}'
        MediaInsightsPipeline: '{{ item.MediaInsightsPipeline }}'
        MediaLiveConnectorPipeline: '{{ item.MediaLiveConnectorPipeline }}'
        MediaStreamPipeline: '{{ item.MediaStreamPipeline }}'
  # ── GetMediaPipelineKinesisVideoStreamPool ──
  - discovery_id: aws.chime-sdk-media-pipelines.get_media_pipeline_kinesis_video_stream_pool
    calls:
      - action: get_media_pipeline_kinesis_video_stream_pool
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.MediaCapturePipeline }}'
      item:
        CreatedTimestamp: '{{ item.CreatedTimestamp }}'
        PoolArn: '{{ item.PoolArn }}'
        PoolId: '{{ item.PoolId }}'
        PoolName: '{{ item.PoolName }}'
        PoolSize: '{{ item.PoolSize }}'
        PoolStatus: '{{ item.PoolStatus }}'
        StreamConfiguration: '{{ item.StreamConfiguration }}'
        UpdatedTimestamp: '{{ item.UpdatedTimestamp }}'
  # ── GetSpeakerSearchTask ──
  - discovery_id: aws.chime-sdk-media-pipelines.get_speaker_search_task
    calls:
      - action: get_speaker_search_task
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.MediaCapturePipeline }}'
      item:
        CreatedTimestamp: '{{ item.CreatedTimestamp }}'
        SpeakerSearchTaskId: '{{ item.SpeakerSearchTaskId }}'
        SpeakerSearchTaskStatus: '{{ item.SpeakerSearchTaskStatus }}'
        UpdatedTimestamp: '{{ item.UpdatedTimestamp }}'
  # ── GetVoiceToneAnalysisTask ──
  - discovery_id: aws.chime-sdk-media-pipelines.get_voice_tone_analysis_task
    calls:
      - action: get_voice_tone_analysis_task
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.MediaCapturePipeline }}'
      item:
        CreatedTimestamp: '{{ item.CreatedTimestamp }}'
        UpdatedTimestamp: '{{ item.UpdatedTimestamp }}'
        VoiceToneAnalysisTaskId: '{{ item.VoiceToneAnalysisTaskId }}'
        VoiceToneAnalysisTaskStatus: '{{ item.VoiceToneAnalysisTaskStatus }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.chime-sdk-media-pipelines.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Tags }}'
      item:
        Key: '{{ item.Key }}'
        Value: '{{ item.Value }}'
