  - discovery_id: aws.lookoutequipment.list_data_ingestion_jobs
    calls:
      - action: list_data_ingestion_jobs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.DataIngestionJobSummaries }}'
      item:
        RoleArn: '{{ item.RoleArn }}'
        Status: '{{ item.Status }}'
        DataQualitySummary: '{{ item.DataQualitySummary }}'
        DatasetArn: '{{ item.DatasetArn }}'
        DatasetName: '{{ item.DatasetName }}'
        Enabled: '{{ item.Enabled }}'
        IngestedDataSize: '{{ item.IngestedDataSize }}'
        IngestedFilesSummary: '{{ item.IngestedFilesSummary }}'
        IngestionInputConfiguration: '{{ item.IngestionInputConfiguration }}'
        JobId: '{{ item.JobId }}'
        LastUpdatedAt: '{{ item.LastUpdatedAt }}'
        S3InputConfiguration: '{{ item.S3InputConfiguration }}'
        Schema: '{{ item.Schema }}'
        ServerSideKmsKeyId: '{{ item.ServerSideKmsKeyId }}'
        SourceDatasetArn: '{{ item.SourceDatasetArn }}'
        StatusDetail: '{{ item.StatusDetail }}'
  # ── ListDatasets ──
  - discovery_id: aws.lookoutequipment.list_datasets
