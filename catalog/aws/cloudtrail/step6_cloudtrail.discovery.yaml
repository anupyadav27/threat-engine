# ============================================================
# Discovery YAML — cloudtrail (AWS)
# Generated: 2026-02-21T04:56:57Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: cloudtrail
services:
  client: cloudtrail
  module: boto3.client
discovery:
  # ── DescribeQuery ──
  - discovery_id: aws.cloudtrail.describe_query
    calls:
      - action: describe_query
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.QueryStatistics }}'
      item:
        CreationTime: '{{ item.CreationTime }}'
        BytesScanned: '{{ item.BytesScanned }}'
        DeliveryS3Uri: '{{ item.DeliveryS3Uri }}'
        DeliveryStatus: '{{ item.DeliveryStatus }}'
        EventDataStoreOwnerAccountId: '{{ item.EventDataStoreOwnerAccountId }}'
        EventsMatched: '{{ item.EventsMatched }}'
        EventsScanned: '{{ item.EventsScanned }}'
        ExecutionTimeInMillis: '{{ item.ExecutionTimeInMillis }}'
        Prompt: '{{ item.Prompt }}'
        QueryResultRows: '{{ item.QueryResultRows }}'
        QueryStatistics: '{{ item.QueryStatistics }}'
        QueryString: '{{ item.QueryString }}'
  # ── DescribeTrails ──
  - discovery_id: aws.cloudtrail.describe_trails
    calls:
      - action: describe_trails
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.trailList }}'
      item:
        CloudWatchLogsLogGroupArn: '{{ item.CloudWatchLogsLogGroupArn }}'
        KmsKeyId: '{{ item.KmsKeyId }}'
        CloudWatchLogsRoleArn: '{{ item.CloudWatchLogsRoleArn }}'
        EventSelectors: '{{ item.EventSelectors }}'
        HasCustomEventSelectors: '{{ item.HasCustomEventSelectors }}'
        HasInsightSelectors: '{{ item.HasInsightSelectors }}'
        HomeRegion: '{{ item.HomeRegion }}'
        IncludeGlobalServiceEvents: '{{ item.IncludeGlobalServiceEvents }}'
        IsMultiRegionTrail: '{{ item.IsMultiRegionTrail }}'
        IsOrganizationTrail: '{{ item.IsOrganizationTrail }}'
        LogFileValidationEnabled: '{{ item.LogFileValidationEnabled }}'
        S3BucketName: '{{ item.S3BucketName }}'
        S3KeyPrefix: '{{ item.S3KeyPrefix }}'
        SnsTopicARN: '{{ item.SnsTopicARN }}'
        SnsTopicName: '{{ item.SnsTopicName }}'
        Trail: '{{ item.Trail }}'
        TrailARN: '{{ item.TrailARN }}'
        trailList: '{{ item.trailList }}'
  # ── GetEventConfiguration ──
  - discovery_id: aws.cloudtrail.get_event_configuration
    calls:
      - action: get_event_configuration
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ContextKeySelectors }}'
      item:
        AggregationConfigurations: '{{ item.AggregationConfigurations }}'
        ContextKeySelectors: '{{ item.ContextKeySelectors }}'
        Enabled: '{{ item.Enabled }}'
        Equals: '{{ item.Equals }}'
        MaxEventSize: '{{ item.MaxEventSize }}'
        Type: '{{ item.Type }}'
  # ── GetInsightSelectors ──
  - discovery_id: aws.cloudtrail.get_insight_selectors
    calls:
      - action: get_insight_selectors
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.InsightSelectors }}'
      item:
        EventCategories: '{{ item.EventCategories }}'
        InsightSelectors: '{{ item.InsightSelectors }}'
        InsightType: '{{ item.InsightType }}'
        InsightsDestination: '{{ item.InsightsDestination }}'
  # ── ListChannels ──
  - discovery_id: aws.cloudtrail.list_channels
    calls:
      - action: list_channels
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Channels }}'
      item:
        ChannelArn: '{{ item.ChannelArn }}'
  # ── ListDashboards ──
  - discovery_id: aws.cloudtrail.list_dashboards
    calls:
      - action: list_dashboards
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Dashboards }}'
      item:
        DashboardArn: '{{ item.DashboardArn }}'
        Type: '{{ item.Type }}'
  # ── ListEventDataStores ──
  - discovery_id: aws.cloudtrail.list_event_data_stores
    calls:
      - action: list_event_data_stores
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.EventDataStores }}'
      item:
        RetentionPeriod: '{{ item.RetentionPeriod }}'
        Status: '{{ item.Status }}'
        AdvancedEventSelectors: '{{ item.AdvancedEventSelectors }}'
        CreatedTimestamp: '{{ item.CreatedTimestamp }}'
        EventDataStoreArn: '{{ item.EventDataStoreArn }}'
        MultiRegionEnabled: '{{ item.MultiRegionEnabled }}'
        OrganizationEnabled: '{{ item.OrganizationEnabled }}'
        TerminationProtectionEnabled: '{{ item.TerminationProtectionEnabled }}'
        UpdatedTimestamp: '{{ item.UpdatedTimestamp }}'
  # ── ListImports ──
  - discovery_id: aws.cloudtrail.list_imports
    calls:
      - action: list_imports
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Imports }}'
      item:
        CreatedTimestamp: '{{ item.CreatedTimestamp }}'
        Destinations: '{{ item.Destinations }}'
        ImportId: '{{ item.ImportId }}'
        ImportStatus: '{{ item.ImportStatus }}'
        UpdatedTimestamp: '{{ item.UpdatedTimestamp }}'
  # ── ListPublicKeys ──
  - discovery_id: aws.cloudtrail.list_public_keys
    calls:
      - action: list_public_keys
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.PublicKeyList }}'
      item:
        Fingerprint: '{{ item.Fingerprint }}'
        ValidityEndTime: '{{ item.ValidityEndTime }}'
        ValidityStartTime: '{{ item.ValidityStartTime }}'
        Value: '{{ item.Value }}'
  # ── ListTrails ──
  - discovery_id: aws.cloudtrail.list_trails
    calls:
      - action: list_trails
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Trails }}'
      item:
        HomeRegion: '{{ item.HomeRegion }}'
        TrailARN: '{{ item.TrailARN }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetChannel ──
  - discovery_id: aws.cloudtrail.get_channel
    for_each: aws.cloudtrail.list_channels
    calls:
      - action: get_channel
        params:
          Channel: '{{ item.Channel }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Destinations }}'
      item:
        Location: '{{ item.Location }}'
        Type: '{{ item.Type }}'
  # ── GetDashboard ──
  - discovery_id: aws.cloudtrail.get_dashboard
    calls:
      - action: get_dashboard
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Widgets }}'
      item:
        QueryAlias: '{{ item.QueryAlias }}'
        QueryParameters: '{{ item.QueryParameters }}'
        QueryStatement: '{{ item.QueryStatement }}'
        ViewProperties: '{{ item.ViewProperties }}'
  # ── GetEventDataStore ──
  - discovery_id: aws.cloudtrail.get_event_data_store
    calls:
      - action: get_event_data_store
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.AdvancedEventSelectors }}'
      item:
        Type: '{{ item.Type }}'
  # ── GetEventSelectors ──
  - discovery_id: aws.cloudtrail.get_event_selectors
    calls:
      - action: get_event_selectors
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.EventSelectors }}'
      item:
        DataResources: '{{ item.DataResources }}'
        EventSelectors: '{{ item.EventSelectors }}'
        ExcludeManagementEventSources: '{{ item.ExcludeManagementEventSources }}'
        IncludeManagementEvents: '{{ item.IncludeManagementEvents }}'
        ReadWriteType: '{{ item.ReadWriteType }}'
  # ── GetImport ──
  - discovery_id: aws.cloudtrail.get_import
    for_each: aws.cloudtrail.list_imports
    calls:
      - action: get_import
        params:
          ImportId: '{{ item.ImportId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Destinations }}'
  # ── GetQueryResults ──
  - discovery_id: aws.cloudtrail.get_query_results
    for_each: aws.cloudtrail.describe_query
    calls:
      - action: get_query_results
        params:
          QueryId: '{{ item.QueryId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.QueryResultRows }}'
      item:
        QueryResultRows: '{{ item.QueryResultRows }}'
  # ── GetResourcePolicy ──
  - discovery_id: aws.cloudtrail.get_resource_policy
    calls:
      - action: get_resource_policy
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ResourcePolicy }}'
      item:
        Statement: '{{ item.Statement }}'
        Version: '{{ item.Version }}'
  # ── GetTrail ──
  - discovery_id: aws.cloudtrail.get_trail
    calls:
      - action: get_trail
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.trailList }}'
      item:
        CloudWatchLogsLogGroupArn: '{{ item.CloudWatchLogsLogGroupArn }}'
        KmsKeyId: '{{ item.KmsKeyId }}'
        CloudWatchLogsRoleArn: '{{ item.CloudWatchLogsRoleArn }}'
        HasCustomEventSelectors: '{{ item.HasCustomEventSelectors }}'
        HasInsightSelectors: '{{ item.HasInsightSelectors }}'
        HomeRegion: '{{ item.HomeRegion }}'
        IncludeGlobalServiceEvents: '{{ item.IncludeGlobalServiceEvents }}'
        IsMultiRegionTrail: '{{ item.IsMultiRegionTrail }}'
        IsOrganizationTrail: '{{ item.IsOrganizationTrail }}'
        LogFileValidationEnabled: '{{ item.LogFileValidationEnabled }}'
        S3BucketName: '{{ item.S3BucketName }}'
        S3KeyPrefix: '{{ item.S3KeyPrefix }}'
        SnsTopicARN: '{{ item.SnsTopicARN }}'
        SnsTopicName: '{{ item.SnsTopicName }}'
        TrailARN: '{{ item.TrailARN }}'
  # ── GetTrailStatus ──
  - discovery_id: aws.cloudtrail.get_trail_status
    calls:
      - action: get_trail_status
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.IsLogging }}'
      item:
        IsLogging: '{{ item.IsLogging }}'
  # ── ListImportFailures ──
  - discovery_id: aws.cloudtrail.list_import_failures
    for_each: aws.cloudtrail.list_imports
    calls:
      - action: list_import_failures
        params:
          ImportId: '{{ item.ImportId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Failures }}'
      item:
        Location: '{{ item.Location }}'
        Status: '{{ item.Status }}'
        ErrorMessage: '{{ item.ErrorMessage }}'
        ErrorType: '{{ item.ErrorType }}'
        LastUpdatedTime: '{{ item.LastUpdatedTime }}'
  # ── ListInsightsData ──
  - discovery_id: aws.cloudtrail.list_insights_data
    calls:
      - action: list_insights_data
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Events }}'
  # ── ListInsightsMetricData ──
  - discovery_id: aws.cloudtrail.list_insights_metric_data
    for_each: aws.cloudtrail.get_insight_selectors
    calls:
      - action: list_insights_metric_data
        params:
          EventSource: '{{ item.EventSource }}'
          EventName: '{{ item.EventName }}'
          InsightType: '{{ item.InsightType }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Timestamps }}'
  # ── ListQueries ──
  - discovery_id: aws.cloudtrail.list_queries
    calls:
      - action: list_queries
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Queries }}'
      item:
        CreationTime: '{{ item.CreationTime }}'
        QueryId: '{{ item.QueryId }}'
        QueryStatus: '{{ item.QueryStatus }}'
  # ── ListTags ──
  - discovery_id: aws.cloudtrail.list_tags
    calls:
      - action: list_tags
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ResourceTagList }}'
      item:
        ResourceId: '{{ item.ResourceId }}'
        TagsList: '{{ item.TagsList }}'
  # ── SearchSampleQueries ──
  - discovery_id: aws.cloudtrail.search_sample_queries
    calls:
      - action: search_sample_queries
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.SearchResults }}'
