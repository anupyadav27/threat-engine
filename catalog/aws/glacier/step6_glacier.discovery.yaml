# ============================================================
# Discovery YAML — glacier (AWS)
# Generated: 2026-02-21T04:56:58Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: glacier
services:
  client: glacier
  module: boto3.client
discovery:
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeJob ──
  - discovery_id: aws.glacier.describe_job
    calls:
      - action: describe_job
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.InventoryRetrievalParameters }}'
      item:
        EndDate: '{{ item.EndDate }}'
        Format: '{{ item.Format }}'
        Limit: '{{ item.Limit }}'
        StartDate: '{{ item.StartDate }}'
  # ── DescribeVault ──
  - discovery_id: aws.glacier.describe_vault
    calls:
      - action: describe_vault
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        CreationDate: '{{ response.CreationDate }}'
        LastInventoryDate: '{{ response.LastInventoryDate }}'
        NumberOfArchives: '{{ response.NumberOfArchives }}'
        SizeInBytes: '{{ response.SizeInBytes }}'
        VaultARN: '{{ response.VaultARN }}'
        VaultName: '{{ response.VaultName }}'
  # ── GetDataRetrievalPolicy ──
  - discovery_id: aws.glacier.get_data_retrieval_policy
    calls:
      - action: get_data_retrieval_policy
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Policy }}'
      item:
        Rules: '{{ item.Rules }}'
        Statement: '{{ item.Statement }}'
        Version: '{{ item.Version }}'
        policy: '{{ item.policy }}'
  # ── GetJobOutput ──
  - discovery_id: aws.glacier.get_job_output
    calls:
      - action: get_job_output
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.body }}'
      item:
        body: '{{ item.body }}'
        status: '{{ item.status }}'
  # ── GetVaultAccessPolicy ──
  - discovery_id: aws.glacier.get_vault_access_policy
    calls:
      - action: get_vault_access_policy
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.policy }}'
      item:
        Policy: '{{ item.Policy }}'
  # ── GetVaultLock ──
  - discovery_id: aws.glacier.get_vault_lock
    calls:
      - action: get_vault_lock
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Policy }}'
      item:
        State: '{{ item.State }}'
  # ── GetVaultNotifications ──
  - discovery_id: aws.glacier.get_vault_notifications
    calls:
      - action: get_vault_notifications
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.vaultNotificationConfig }}'
      item:
        Events: '{{ item.Events }}'
        SNSTopic: '{{ item.SNSTopic }}'
  # ── ListJobs ──
  - discovery_id: aws.glacier.list_jobs
    calls:
      - action: list_jobs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.JobList }}'
      item:
        CreationDate: '{{ item.CreationDate }}'
        Action: '{{ item.Action }}'
        ArchiveId: '{{ item.ArchiveId }}'
        ArchiveSHA256TreeHash: '{{ item.ArchiveSHA256TreeHash }}'
        ArchiveSizeInBytes: '{{ item.ArchiveSizeInBytes }}'
        Completed: '{{ item.Completed }}'
        CompletionDate: '{{ item.CompletionDate }}'
        InventoryRetrievalParameters: '{{ item.InventoryRetrievalParameters }}'
        InventorySizeInBytes: '{{ item.InventorySizeInBytes }}'
        JobDescription: '{{ item.JobDescription }}'
        JobId: '{{ item.JobId }}'
        JobOutputPath: '{{ item.JobOutputPath }}'
        OutputLocation: '{{ item.OutputLocation }}'
        RetrievalByteRange: '{{ item.RetrievalByteRange }}'
        SHA256TreeHash: '{{ item.SHA256TreeHash }}'
        SNSTopic: '{{ item.SNSTopic }}'
        SelectParameters: '{{ item.SelectParameters }}'
        StatusCode: '{{ item.StatusCode }}'
        StatusMessage: '{{ item.StatusMessage }}'
        Tier: '{{ item.Tier }}'
        VaultARN: '{{ item.VaultARN }}'
  # ── ListMultipartUploads ──
  - discovery_id: aws.glacier.list_multipart_uploads
    calls:
      - action: list_multipart_uploads
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.UploadsList }}'
      item:
        CreationDate: '{{ item.CreationDate }}'
        ArchiveDescription: '{{ item.ArchiveDescription }}'
        MultipartUploadId: '{{ item.MultipartUploadId }}'
        PartSizeInBytes: '{{ item.PartSizeInBytes }}'
        VaultARN: '{{ item.VaultARN }}'
  # ── ListParts ──
  - discovery_id: aws.glacier.list_parts
    calls:
      - action: list_parts
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Parts }}'
      item:
        RangeInBytes: '{{ item.RangeInBytes }}'
        SHA256TreeHash: '{{ item.SHA256TreeHash }}'
  # ── ListProvisionedCapacity ──
  - discovery_id: aws.glacier.list_provisioned_capacity
    calls:
      - action: list_provisioned_capacity
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ProvisionedCapacityList }}'
      item:
        CapacityId: '{{ item.CapacityId }}'
        ExpirationDate: '{{ item.ExpirationDate }}'
        StartDate: '{{ item.StartDate }}'
  # ── ListTagsForVault ──
  - discovery_id: aws.glacier.list_tags_for_vault
    calls:
      - action: list_tags_for_vault
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        Tags: '{{ response.Tags }}'
  # ── ListVaults ──
  - discovery_id: aws.glacier.list_vaults
    calls:
      - action: list_vaults
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.VaultList }}'
      item:
        CreationDate: '{{ item.CreationDate }}'
        LastInventoryDate: '{{ item.LastInventoryDate }}'
        NumberOfArchives: '{{ item.NumberOfArchives }}'
        SizeInBytes: '{{ item.SizeInBytes }}'
        VaultARN: '{{ item.VaultARN }}'
        VaultName: '{{ item.VaultName }}'
