        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.EngagementMemberList }}'
      item:
        AccountId: '{{ item.AccountId }}'
        CompanyName: '{{ item.CompanyName }}'
        WebsiteUrl: '{{ item.WebsiteUrl }}'
  # ── ListEngagementResourceAssociations ──
  - discovery_id: aws.partnercentral-selling.list_engagement_resource_associations
    calls:
      - action: list_engagement_resource_associations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.EngagementResourceAssociationSummaries }}'
      item:
        ResourceId: '{{ item.ResourceId }}'
        Catalog: '{{ item.Catalog }}'
        CreatedBy: '{{ item.CreatedBy }}'
        EngagementId: '{{ item.EngagementId }}'
        ResourceType: '{{ item.ResourceType }}'
  # ── ListEngagements ──
  - discovery_id: aws.partnercentral-selling.list_engagements
    calls:
      - action: list_engagements
