# ============================================================
# Discovery YAML — chime (AWS)
# Generated: 2026-02-21T04:56:57Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: chime
services:
  client: chime
  module: boto3.client
discovery:
  # ── GetGlobalSettings ──
  - discovery_id: aws.chime.get_global_settings
    calls:
      - action: get_global_settings
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.BusinessCalling }}'
      item:
        BusinessCalling: '{{ item.BusinessCalling }}'
        CdrBucket: '{{ item.CdrBucket }}'
        VoiceConnector: '{{ item.VoiceConnector }}'
  # ── GetPhoneNumberSettings ──
  - discovery_id: aws.chime.get_phone_number_settings
    calls:
      - action: get_phone_number_settings
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.PhoneNumberOrders }}'
      item:
        CallingNameUpdatedTimestamp: '{{ item.CallingNameUpdatedTimestamp }}'
  # ── ListAccounts ──
  - discovery_id: aws.chime.list_accounts
    calls:
      - action: list_accounts
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Accounts }}'
      item:
        AccountId: '{{ item.AccountId }}'
        Name: '{{ item.Name }}'
        AccountStatus: '{{ item.AccountStatus }}'
        AccountType: '{{ item.AccountType }}'
        AwsAccountId: '{{ item.AwsAccountId }}'
        CreatedTimestamp: '{{ item.CreatedTimestamp }}'
        DefaultLicense: '{{ item.DefaultLicense }}'
        SigninDelegateGroups: '{{ item.SigninDelegateGroups }}'
        SupportedLicenses: '{{ item.SupportedLicenses }}'
  # ── ListPhoneNumberOrders ──
  - discovery_id: aws.chime.list_phone_number_orders
    calls:
      - action: list_phone_number_orders
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.PhoneNumberOrders }}'
      item:
        Status: '{{ item.Status }}'
        CallingNameUpdatedTimestamp: '{{ item.CallingNameUpdatedTimestamp }}'
        CreatedTimestamp: '{{ item.CreatedTimestamp }}'
        OrderedPhoneNumbers: '{{ item.OrderedPhoneNumbers }}'
        PhoneNumber: '{{ item.PhoneNumber }}'
        PhoneNumberOrderId: '{{ item.PhoneNumberOrderId }}'
        ProductType: '{{ item.ProductType }}'
        UpdatedTimestamp: '{{ item.UpdatedTimestamp }}'
  # ── ListPhoneNumbers ──
  - discovery_id: aws.chime.list_phone_numbers
    calls:
      - action: list_phone_numbers
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.PhoneNumbers }}'
      item:
        Status: '{{ item.Status }}'
        Associations: '{{ item.Associations }}'
        CallingName: '{{ item.CallingName }}'
        CallingNameStatus: '{{ item.CallingNameStatus }}'
        Capabilities: '{{ item.Capabilities }}'
        Country: '{{ item.Country }}'
        CreatedTimestamp: '{{ item.CreatedTimestamp }}'
        DeletionTimestamp: '{{ item.DeletionTimestamp }}'
        E164PhoneNumber: '{{ item.E164PhoneNumber }}'
        InitiateDeletionTimestamp: '{{ item.InitiateDeletionTimestamp }}'
        PhoneNumber: '{{ item.PhoneNumber }}'
        PhoneNumberId: '{{ item.PhoneNumberId }}'
        ProductType: '{{ item.ProductType }}'
        Type: '{{ item.Type }}'
        UpdatedTimestamp: '{{ item.UpdatedTimestamp }}'
  # ── SearchAvailablePhoneNumbers ──
  - discovery_id: aws.chime.search_available_phone_numbers
    calls:
      - action: search_available_phone_numbers
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.E164PhoneNumbers }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetAccount ──
  - discovery_id: aws.chime.get_account
    for_each: aws.chime.list_accounts
    calls:
      - action: get_account
        params:
          AccountId: '{{ item.AccountId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Accounts }}'
      item:
        AccountId: '{{ item.AccountId }}'
        Name: '{{ item.Name }}'
        AccountStatus: '{{ item.AccountStatus }}'
        AccountType: '{{ item.AccountType }}'
        AwsAccountId: '{{ item.AwsAccountId }}'
        CreatedTimestamp: '{{ item.CreatedTimestamp }}'
        DefaultLicense: '{{ item.DefaultLicense }}'
        SigninDelegateGroups: '{{ item.SigninDelegateGroups }}'
        SupportedLicenses: '{{ item.SupportedLicenses }}'
  # ── GetAccountSettings ──
  - discovery_id: aws.chime.get_account_settings
    for_each: aws.chime.list_accounts
    calls:
      - action: get_account_settings
        params:
          AccountId: '{{ item.AccountId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.AccountSettings }}'
      item:
        DestinationArn: '{{ item.DestinationArn }}'
        DisableRemoteControl: '{{ item.DisableRemoteControl }}'
        EnableDialOut: '{{ item.EnableDialOut }}'
        Enabled: '{{ item.Enabled }}'
        Format: '{{ item.Format }}'
        Level: '{{ item.Level }}'
  # ── GetBot ──
  - discovery_id: aws.chime.get_bot
    for_each: aws.chime.list_accounts
    calls:
      - action: get_bot
        params:
          AccountId: '{{ item.AccountId }}'
          BotId: '{{ item.BotId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Bot }}'
      item:
        BotEmail: '{{ item.BotEmail }}'
        BotId: '{{ item.BotId }}'
        BotType: '{{ item.BotType }}'
        CreatedTimestamp: '{{ item.CreatedTimestamp }}'
        Disabled: '{{ item.Disabled }}'
        DisplayName: '{{ item.DisplayName }}'
        SecurityToken: '{{ item.SecurityToken }}'
        UpdatedTimestamp: '{{ item.UpdatedTimestamp }}'
        UserId: '{{ item.UserId }}'
  # ── GetEventsConfiguration ──
  - discovery_id: aws.chime.get_events_configuration
    for_each: aws.chime.list_accounts
    calls:
      - action: get_events_configuration
        params:
          AccountId: '{{ item.AccountId }}'
          BotId: '{{ item.BotId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Bot }}'
      item:
        BotId: '{{ item.BotId }}'
        LambdaFunctionArn: '{{ item.LambdaFunctionArn }}'
        OutboundEventsHTTPSEndpoint: '{{ item.OutboundEventsHTTPSEndpoint }}'
  # ── GetPhoneNumber ──
  - discovery_id: aws.chime.get_phone_number
    for_each: aws.chime.list_phone_numbers
    calls:
      - action: get_phone_number
        params:
          PhoneNumberId: '{{ item.PhoneNumberId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.PhoneNumbers }}'
      item:
        Status: '{{ item.Status }}'
        Associations: '{{ item.Associations }}'
        CallingName: '{{ item.CallingName }}'
        CallingNameStatus: '{{ item.CallingNameStatus }}'
        Capabilities: '{{ item.Capabilities }}'
        Country: '{{ item.Country }}'
        CreatedTimestamp: '{{ item.CreatedTimestamp }}'
        DeletionTimestamp: '{{ item.DeletionTimestamp }}'
        E164PhoneNumber: '{{ item.E164PhoneNumber }}'
        PhoneNumber: '{{ item.PhoneNumber }}'
        PhoneNumberId: '{{ item.PhoneNumberId }}'
        ProductType: '{{ item.ProductType }}'
        Type: '{{ item.Type }}'
        UpdatedTimestamp: '{{ item.UpdatedTimestamp }}'
  # ── GetPhoneNumberOrder ──
  - discovery_id: aws.chime.get_phone_number_order
    for_each: aws.chime.list_phone_number_orders
    calls:
      - action: get_phone_number_order
        params:
          PhoneNumberOrderId: '{{ item.PhoneNumberOrderId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Accounts }}'
      item:
        Status: '{{ item.Status }}'
        CreatedTimestamp: '{{ item.CreatedTimestamp }}'
        OrderedPhoneNumbers: '{{ item.OrderedPhoneNumbers }}'
        PhoneNumberOrderId: '{{ item.PhoneNumberOrderId }}'
        ProductType: '{{ item.ProductType }}'
        UpdatedTimestamp: '{{ item.UpdatedTimestamp }}'
  # ── GetRetentionSettings ──
  - discovery_id: aws.chime.get_retention_settings
    for_each: aws.chime.list_accounts
    calls:
      - action: get_retention_settings
        params:
          AccountId: '{{ item.AccountId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.RetentionSettings }}'
      item:
        ConversationRetentionSettings: '{{ item.ConversationRetentionSettings }}'
        InitiateDeletionTimestamp: '{{ item.InitiateDeletionTimestamp }}'
        RoomRetentionSettings: '{{ item.RoomRetentionSettings }}'
  # ── GetRoom ──
  - discovery_id: aws.chime.get_room
    for_each: aws.chime.list_accounts
    calls:
      - action: get_room
        params:
          AccountId: '{{ item.AccountId }}'
          RoomId: '{{ item.RoomId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Accounts }}'
      item:
        AccountId: '{{ item.AccountId }}'
        Name: '{{ item.Name }}'
        CreatedBy: '{{ item.CreatedBy }}'
        CreatedTimestamp: '{{ item.CreatedTimestamp }}'
        RoomId: '{{ item.RoomId }}'
        UpdatedTimestamp: '{{ item.UpdatedTimestamp }}'
  # ── GetUser ──
  - discovery_id: aws.chime.get_user
    for_each: aws.chime.list_accounts
    calls:
      - action: get_user
        params:
          AccountId: '{{ item.AccountId }}'
          UserId: '{{ item.UserId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Accounts }}'
      item:
        AccountId: '{{ item.AccountId }}'
        AlexaForBusinessMetadata: '{{ item.AlexaForBusinessMetadata }}'
        DisplayName: '{{ item.DisplayName }}'
        InvitedOn: '{{ item.InvitedOn }}'
        LicenseType: '{{ item.LicenseType }}'
        PersonalPIN: '{{ item.PersonalPIN }}'
        PrimaryEmail: '{{ item.PrimaryEmail }}'
        PrimaryProvisionedNumber: '{{ item.PrimaryProvisionedNumber }}'
        RegisteredOn: '{{ item.RegisteredOn }}'
        UserId: '{{ item.UserId }}'
        UserInvitationStatus: '{{ item.UserInvitationStatus }}'
        UserRegistrationStatus: '{{ item.UserRegistrationStatus }}'
        UserType: '{{ item.UserType }}'
  # ── GetUserSettings ──
  - discovery_id: aws.chime.get_user_settings
    for_each: aws.chime.list_accounts
    calls:
      - action: get_user_settings
        params:
          AccountId: '{{ item.AccountId }}'
          UserId: '{{ item.UserId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.UserSettings }}'
      item:
        Telephony: '{{ item.Telephony }}'
  # ── ListBots ──
  - discovery_id: aws.chime.list_bots
    for_each: aws.chime.list_accounts
    calls:
      - action: list_bots
        params:
          AccountId: '{{ item.AccountId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Bots }}'
      item:
        BotEmail: '{{ item.BotEmail }}'
        BotId: '{{ item.BotId }}'
        BotType: '{{ item.BotType }}'
        CreatedTimestamp: '{{ item.CreatedTimestamp }}'
        Disabled: '{{ item.Disabled }}'
        DisplayName: '{{ item.DisplayName }}'
        SecurityToken: '{{ item.SecurityToken }}'
        UpdatedTimestamp: '{{ item.UpdatedTimestamp }}'
        UserId: '{{ item.UserId }}'
  # ── ListRoomMemberships ──
  - discovery_id: aws.chime.list_room_memberships
    for_each: aws.chime.list_accounts
    calls:
      - action: list_room_memberships
        params:
          AccountId: '{{ item.AccountId }}'
