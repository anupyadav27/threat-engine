# ============================================================
# Discovery YAML — mediaconvert (AWS)
# Generated: 2026-02-21T04:56:59Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: mediaconvert
services:
  client: mediaconvert
  module: boto3.client
discovery:
  # ── DescribeEndpoints ──
  - discovery_id: aws.mediaconvert.describe_endpoints
    calls:
      - action: describe_endpoints
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Endpoints }}'
      item:
        Endpoints: '{{ item.Endpoints }}'
        Url: '{{ item.Url }}'
  # ── GetPolicy ──
  - discovery_id: aws.mediaconvert.get_policy
    calls:
      - action: get_policy
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Policy }}'
      item:
        Policy: '{{ item.Policy }}'
        HttpInputs: '{{ item.HttpInputs }}'
        HttpsInputs: '{{ item.HttpsInputs }}'
        S3Inputs: '{{ item.S3Inputs }}'
        Statement: '{{ item.Statement }}'
  # ── ListJobTemplates ──
  - discovery_id: aws.mediaconvert.list_job_templates
    calls:
      - action: list_job_templates
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.JobTemplates }}'
      item:
        Name: '{{ item.Name }}'
        Category: '{{ item.Category }}'
        Description: '{{ item.Description }}'
        DestinationArn: '{{ item.DestinationArn }}'
        Enabled: '{{ item.Enabled }}'
        Format: '{{ item.Format }}'
        LastUpdated: '{{ item.LastUpdated }}'
        Level: '{{ item.Level }}'
        Type: '{{ item.Type }}'
  # ── ListJobs ──
  - discovery_id: aws.mediaconvert.list_jobs
    calls:
      - action: list_jobs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Jobs }}'
      item:
        Jobs: '{{ item.Jobs }}'
  # ── ListPresets ──
  - discovery_id: aws.mediaconvert.list_presets
    calls:
      - action: list_presets
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Presets }}'
      item:
        Name: '{{ item.Name }}'
        Category: '{{ item.Category }}'
        Description: '{{ item.Description }}'
        LastUpdated: '{{ item.LastUpdated }}'
        Preset: '{{ item.Preset }}'
        Type: '{{ item.Type }}'
  # ── ListQueues ──
  - discovery_id: aws.mediaconvert.list_queues
    calls:
      - action: list_queues
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Queues }}'
      item:
        Name: '{{ item.Name }}'
        ConcurrentJobs: '{{ item.ConcurrentJobs }}'
        Description: '{{ item.Description }}'
        LastUpdated: '{{ item.LastUpdated }}'
        PricingPlan: '{{ item.PricingPlan }}'
        ProgressingJobsCount: '{{ item.ProgressingJobsCount }}'
        ReservationPlan: '{{ item.ReservationPlan }}'
        ServiceOverrides: '{{ item.ServiceOverrides }}'
        SubmittedJobsCount: '{{ item.SubmittedJobsCount }}'
        Type: '{{ item.Type }}'
  # ── ListVersions ──
  - discovery_id: aws.mediaconvert.list_versions
    calls:
      - action: list_versions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Versions }}'
      item:
        ExpirationDate: '{{ item.ExpirationDate }}'
        Version: '{{ item.Version }}'
  # ── SearchJobs ──
  - discovery_id: aws.mediaconvert.search_jobs
    calls:
      - action: search_jobs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Jobs }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetJob ──
  - discovery_id: aws.mediaconvert.get_job
    calls:
      - action: get_job
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        Job: '{{ response.Job }}'
  # ── GetJobTemplate ──
  - discovery_id: aws.mediaconvert.get_job_template
    for_each: aws.mediaconvert.list_job_templates
    calls:
      - action: get_job_template
        params:
          Name: '{{ item.Name }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.JobTemplates }}'
      item:
        Name: '{{ item.Name }}'
        Category: '{{ item.Category }}'
        Description: '{{ item.Description }}'
        LastUpdated: '{{ item.LastUpdated }}'
        Type: '{{ item.Type }}'
  # ── GetJobsQueryResults ──
  - discovery_id: aws.mediaconvert.get_jobs_query_results
    calls:
      - action: get_jobs_query_results
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Jobs }}'
  # ── GetPreset ──
  - discovery_id: aws.mediaconvert.get_preset
    for_each: aws.mediaconvert.list_job_templates
    calls:
      - action: get_preset
        params:
          Name: '{{ item.Name }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.JobTemplates }}'
      item:
        Name: '{{ item.Name }}'
        Category: '{{ item.Category }}'
        Description: '{{ item.Description }}'
        LastUpdated: '{{ item.LastUpdated }}'
        Type: '{{ item.Type }}'
  # ── GetQueue ──
  - discovery_id: aws.mediaconvert.get_queue
    for_each: aws.mediaconvert.list_job_templates
    calls:
      - action: get_queue
        params:
          Name: '{{ item.Name }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Queues }}'
      item:
        Name: '{{ item.Name }}'
        ConcurrentJobs: '{{ item.ConcurrentJobs }}'
        Description: '{{ item.Description }}'
        LastUpdated: '{{ item.LastUpdated }}'
        PricingPlan: '{{ item.PricingPlan }}'
        ProgressingJobsCount: '{{ item.ProgressingJobsCount }}'
        ReservationPlan: '{{ item.ReservationPlan }}'
        ServiceOverrides: '{{ item.ServiceOverrides }}'
        SubmittedJobsCount: '{{ item.SubmittedJobsCount }}'
        Type: '{{ item.Type }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.mediaconvert.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ResourceTags }}'
      item:
        Tags: '{{ item.Tags }}'
