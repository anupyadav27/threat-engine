version: '1.0'
provider: aws
service: healthlake
services:
  client: healthlake
  module: boto3.client
discovery:
  # ── ListFHIRDatastores ──
  - discovery_id: aws.healthlake.list_fhir_datastores
    calls:
      - action: list_fhir_datastores
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.DatastorePropertiesList }}'
      item:
        Status: '{{ item.Status }}'
        CreatedAt: '{{ item.CreatedAt }}'
        DataAccessRoleArn: '{{ item.DataAccessRoleArn }}'
        DatastoreArn: '{{ item.DatastoreArn }}'
        DatastoreEndpoint: '{{ item.DatastoreEndpoint }}'
        DatastoreId: '{{ item.DatastoreId }}'
        DatastoreName: '{{ item.DatastoreName }}'
        DatastoreProperties: '{{ item.DatastoreProperties }}'
        DatastoreStatus: '{{ item.DatastoreStatus }}'
        DatastoreTypeVersion: '{{ item.DatastoreTypeVersion }}'
        Enabled: '{{ item.Enabled }}'
        EndTime: '{{ item.EndTime }}'
        ErrorCause: '{{ item.ErrorCause }}'
        ExportJobProperties: '{{ item.ExportJobProperties }}'
        IdentityProviderConfiguration: '{{ item.IdentityProviderConfiguration }}'
        ImportJobProperties: '{{ item.ImportJobProperties }}'
        InputDataConfig: '{{ item.InputDataConfig }}'
        JobName: '{{ item.JobName }}'
        JobOutputDataConfig: '{{ item.JobOutputDataConfig }}'
        JobProgressReport: '{{ item.JobProgressReport }}'
        JobStatus: '{{ item.JobStatus }}'
        Message: '{{ item.Message }}'
        OutputDataConfig: '{{ item.OutputDataConfig }}'
        PreloadDataConfig: '{{ item.PreloadDataConfig }}'
        SseConfiguration: '{{ item.SseConfiguration }}'
        SubmitTime: '{{ item.SubmitTime }}'
        ValidationLevel: '{{ item.ValidationLevel }}'
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeFHIRDatastore ──
  - discovery_id: aws.healthlake.describe_fhir_datastore
    for_each: aws.healthlake.list_fhir_datastores
    calls:
      - action: describe_fhir_datastore
        params:
          DatastoreId: '{{ item.DatastoreId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.DatastorePropertiesList }}'
      item:
        CreatedAt: '{{ item.CreatedAt }}'
        DatastoreArn: '{{ item.DatastoreArn }}'
        DatastoreEndpoint: '{{ item.DatastoreEndpoint }}'
        DatastoreId: '{{ item.DatastoreId }}'
        DatastoreName: '{{ item.DatastoreName }}'
        DatastoreProperties: '{{ item.DatastoreProperties }}'
        DatastoreStatus: '{{ item.DatastoreStatus }}'
        DatastoreTypeVersion: '{{ item.DatastoreTypeVersion }}'
        ErrorCause: '{{ item.ErrorCause }}'
        IdentityProviderConfiguration: '{{ item.IdentityProviderConfiguration }}'
        PreloadDataConfig: '{{ item.PreloadDataConfig }}'
        SseConfiguration: '{{ item.SseConfiguration }}'
  # ── DescribeFHIRExportJob ──
  - discovery_id: aws.healthlake.describe_fhir_export_job
    for_each: aws.healthlake.list_fhir_datastores
    calls:
      - action: describe_fhir_export_job
        params:
          DatastoreId: '{{ item.DatastoreId }}'
          JobId: '{{ item.JobId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ExportJobProperties }}'
      item:
        DataAccessRoleArn: '{{ item.DataAccessRoleArn }}'
        DatastoreId: '{{ item.DatastoreId }}'
        EndTime: '{{ item.EndTime }}'
        ExportJobProperties: '{{ item.ExportJobProperties }}'
        JobId: '{{ item.JobId }}'
        JobName: '{{ item.JobName }}'
        JobStatus: '{{ item.JobStatus }}'
        Message: '{{ item.Message }}'
        OutputDataConfig: '{{ item.OutputDataConfig }}'
        SubmitTime: '{{ item.SubmitTime }}'
  # ── DescribeFHIRImportJob ──
  - discovery_id: aws.healthlake.describe_fhir_import_job
