# ============================================================
# Discovery YAML — inspector (AWS)
# Generated: 2026-02-21T04:56:58Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: inspector
services:
  client: inspector
  module: boto3.client
discovery:
  # ── DescribeCrossAccountAccessRole ──
  - discovery_id: aws.inspector.describe_cross_account_access_role
    calls:
      - action: describe_cross_account_access_role
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.roleArn }}'
      item:
        registeredAt: '{{ item.registeredAt }}'
        roleArn: '{{ item.roleArn }}'
        valid: '{{ item.valid }}'
  # ── ListAssessmentRuns ──
  - discovery_id: aws.inspector.list_assessment_runs
    calls:
      - action: list_assessment_runs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.assessmentRunArns }}'
      item:
        assessmentRuns: '{{ item.assessmentRuns }}'
        assessmentTemplateArn: '{{ item.assessmentTemplateArn }}'
        completedAt: '{{ item.completedAt }}'
        createdAt: '{{ item.createdAt }}'
        dataCollected: '{{ item.dataCollected }}'
        durationInSeconds: '{{ item.durationInSeconds }}'
        failedItems: '{{ item.failedItems }}'
        findingCounts: '{{ item.findingCounts }}'
        name: '{{ item.name }}'
        notifications: '{{ item.notifications }}'
        rulesPackageArns: '{{ item.rulesPackageArns }}'
        startedAt: '{{ item.startedAt }}'
        state: '{{ item.state }}'
        stateChangedAt: '{{ item.stateChangedAt }}'
        stateChanges: '{{ item.stateChanges }}'
        userAttributesForFindings: '{{ item.userAttributesForFindings }}'
  # ── ListAssessmentTargets ──
  - discovery_id: aws.inspector.list_assessment_targets
    calls:
      - action: list_assessment_targets
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.assessmentTargetArns }}'
  # ── ListAssessmentTemplates ──
  - discovery_id: aws.inspector.list_assessment_templates
    calls:
      - action: list_assessment_templates
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.assessmentTemplateArns }}'
      item:
        assessmentTemplates: '{{ item.assessmentTemplates }}'
  # ── ListEventSubscriptions ──
  - discovery_id: aws.inspector.list_event_subscriptions
    calls:
      - action: list_event_subscriptions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.subscriptions }}'
      item:
        eventSubscriptions: '{{ item.eventSubscriptions }}'
        resourceArn: '{{ item.resourceArn }}'
        topicArn: '{{ item.topicArn }}'
  # ── ListFindings ──
  - discovery_id: aws.inspector.list_findings
    calls:
      - action: list_findings
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.findingArns }}'
      item:
        findings: '{{ item.findings }}'
  # ── ListRulesPackages ──
  - discovery_id: aws.inspector.list_rules_packages
    calls:
      - action: list_rules_packages
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.rulesPackageArns }}'
      item:
        rulesPackages: '{{ item.rulesPackages }}'
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeAssessmentRuns ──
  - discovery_id: aws.inspector.describe_assessment_runs
    for_each: aws.inspector.list_assessment_runs
    calls:
      - action: describe_assessment_runs
        params:
          assessmentRunArns: '{{ item.assessmentRunArns }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.assessmentRuns }}'
      item:
        arn: '{{ item.arn }}'
        assessmentRuns: '{{ item.assessmentRuns }}'
        assessmentTemplateArn: '{{ item.assessmentTemplateArn }}'
        completedAt: '{{ item.completedAt }}'
        createdAt: '{{ item.createdAt }}'
        dataCollected: '{{ item.dataCollected }}'
        durationInSeconds: '{{ item.durationInSeconds }}'
        failedItems: '{{ item.failedItems }}'
        findingCounts: '{{ item.findingCounts }}'
        name: '{{ item.name }}'
        notifications: '{{ item.notifications }}'
        rulesPackageArns: '{{ item.rulesPackageArns }}'
        startedAt: '{{ item.startedAt }}'
        state: '{{ item.state }}'
        stateChangedAt: '{{ item.stateChangedAt }}'
        stateChanges: '{{ item.stateChanges }}'
        userAttributesForFindings: '{{ item.userAttributesForFindings }}'
  # ── DescribeAssessmentTargets ──
  - discovery_id: aws.inspector.describe_assessment_targets
    calls:
      - action: describe_assessment_targets
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.assessmentTargets }}'
      item:
        arn: '{{ item.arn }}'
        createdAt: '{{ item.createdAt }}'
        name: '{{ item.name }}'
        resourceGroupArn: '{{ item.resourceGroupArn }}'
        updatedAt: '{{ item.updatedAt }}'
  # ── DescribeAssessmentTemplates ──
  - discovery_id: aws.inspector.describe_assessment_templates
    calls:
      - action: describe_assessment_templates
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.assessmentTemplates }}'
      item:
        arn: '{{ item.arn }}'
        assessmentRunCount: '{{ item.assessmentRunCount }}'
        assessmentTargetArn: '{{ item.assessmentTargetArn }}'
        assessmentTemplates: '{{ item.assessmentTemplates }}'
        createdAt: '{{ item.createdAt }}'
        durationInSeconds: '{{ item.durationInSeconds }}'
        lastAssessmentRunArn: '{{ item.lastAssessmentRunArn }}'
        name: '{{ item.name }}'
        rulesPackageArns: '{{ item.rulesPackageArns }}'
        userAttributesForFindings: '{{ item.userAttributesForFindings }}'
  # ── DescribeExclusions ──
  - discovery_id: aws.inspector.describe_exclusions
    calls:
      - action: describe_exclusions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.exclusionArns }}'
      item:
        exclusions: '{{ item.exclusions }}'
  # ── DescribeFindings ──
  - discovery_id: aws.inspector.describe_findings
    calls:
      - action: describe_findings
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.findings }}'
      item:
        arn: '{{ item.arn }}'
        assetAttributes: '{{ item.assetAttributes }}'
        assetType: '{{ item.assetType }}'
        attributes: '{{ item.attributes }}'
        confidence: '{{ item.confidence }}'
        createdAt: '{{ item.createdAt }}'
        description: '{{ item.description }}'
        findings: '{{ item.findings }}'
        id: '{{ item.id }}'
        indicatorOfCompromise: '{{ item.indicatorOfCompromise }}'
        numericSeverity: '{{ item.numericSeverity }}'
        recommendation: '{{ item.recommendation }}'
        schemaVersion: '{{ item.schemaVersion }}'
        service: '{{ item.service }}'
        serviceAttributes: '{{ item.serviceAttributes }}'
        severity: '{{ item.severity }}'
        title: '{{ item.title }}'
        updatedAt: '{{ item.updatedAt }}'
        userAttributes: '{{ item.userAttributes }}'
  # ── DescribeResourceGroups ──
  - discovery_id: aws.inspector.describe_resource_groups
    calls:
      - action: describe_resource_groups
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.resourceGroups }}'
      item:
        arn: '{{ item.arn }}'
        createdAt: '{{ item.createdAt }}'
        tags: '{{ item.tags }}'
  # ── DescribeRulesPackages ──
  - discovery_id: aws.inspector.describe_rules_packages
    for_each: aws.inspector.list_rules_packages
    calls:
      - action: describe_rules_packages
        params:
          rulesPackageArns: '{{ item.rulesPackageArns }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.rulesPackages }}'
      item:
        arn: '{{ item.arn }}'
        description: '{{ item.description }}'
        name: '{{ item.name }}'
        provider: '{{ item.provider }}'
        rulesPackages: '{{ item.rulesPackages }}'
        version: '{{ item.version }}'
  # ── GetAssessmentReport ──
  - discovery_id: aws.inspector.get_assessment_report
    calls:
      - action: get_assessment_report
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.status }}'
      item:
        status: '{{ item.status }}'
        url: '{{ item.url }}'
  # ── GetExclusionsPreview ──
  - discovery_id: aws.inspector.get_exclusions_preview
    calls:
      - action: get_exclusions_preview
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.exclusionPreviews }}'
      item:
        attributes: '{{ item.attributes }}'
        description: '{{ item.description }}'
        recommendation: '{{ item.recommendation }}'
        scopes: '{{ item.scopes }}'
        title: '{{ item.title }}'
  # ── GetTelemetryMetadata ──
  - discovery_id: aws.inspector.get_telemetry_metadata
    calls:
      - action: get_telemetry_metadata
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.telemetryMetadata }}'
      item:
        count: '{{ item.count }}'
        dataSize: '{{ item.dataSize }}'
        messageType: '{{ item.messageType }}'
  # ── ListAssessmentRunAgents ──
  - discovery_id: aws.inspector.list_assessment_run_agents
    calls:
      - action: list_assessment_run_agents
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.assessmentRunAgents }}'
      item:
        agentHealth: '{{ item.agentHealth }}'
        agentHealthCode: '{{ item.agentHealthCode }}'
        agentHealthDetails: '{{ item.agentHealthDetails }}'
        agentId: '{{ item.agentId }}'
        assessmentRunArn: '{{ item.assessmentRunArn }}'
        autoScalingGroup: '{{ item.autoScalingGroup }}'
        telemetryMetadata: '{{ item.telemetryMetadata }}'
  # ── ListExclusions ──
  - discovery_id: aws.inspector.list_exclusions
    calls:
      - action: list_exclusions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.exclusionArns }}'
      item:
        exclusions: '{{ item.exclusions }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.inspector.list_tags_for_resource
    for_each: aws.inspector.list_event_subscriptions
    calls:
      - action: list_tags_for_resource
        params:
          resourceArn: '{{ item.resourceArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.tags }}'
      item:
        key: '{{ item.key }}'
        value: '{{ item.value }}'
