# ============================================================
# Discovery YAML — dsql (AWS)
# Generated: 2026-02-21T04:56:58Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: dsql
services:
  client: dsql
  module: boto3.client
discovery:
  # ── ListClusters ──
  - discovery_id: aws.dsql.list_clusters
    calls:
      - action: list_clusters
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.clusters }}'
      item:
        arn: '{{ item.arn }}'
        identifier: '{{ item.identifier }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetCluster ──
  - discovery_id: aws.dsql.get_cluster
    for_each: aws.dsql.list_clusters
    calls:
      - action: get_cluster
        params:
          identifier: '{{ item.identifier }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.multiRegionProperties }}'
      item:
        clusters: '{{ item.clusters }}'
        status: '{{ item.status }}'
        witnessRegion: '{{ item.witnessRegion }}'
  # ── GetClusterPolicy ──
  - discovery_id: aws.dsql.get_cluster_policy
    for_each: aws.dsql.list_clusters
    calls:
      - action: get_cluster_policy
        params:
          identifier: '{{ item.identifier }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.policy }}'
      item:
        policy: '{{ item.policy }}'
  # ── GetVpcEndpointServiceName ──
  - discovery_id: aws.dsql.get_vpc_endpoint_service_name
    calls:
      - action: get_vpc_endpoint_service_name
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        clusterVpcEndpoint: '{{ response.clusterVpcEndpoint }}'
        serviceName: '{{ response.serviceName }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.dsql.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        tags: '{{ response.tags }}'
