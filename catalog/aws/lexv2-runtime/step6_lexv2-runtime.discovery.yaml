# ============================================================
# Discovery YAML — lexv2-runtime (AWS)
# Generated: 2026-02-21T04:56:58Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: lexv2-runtime
services:
  client: lexv2-runtime
  module: boto3.client
discovery:
  # ── Dependent read operations (require identifiers) ──
  # ── GetSession ──
  - discovery_id: aws.lexv2-runtime.get_session
    calls:
      - action: get_session
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.messages }}'
      item:
        content: '{{ item.content }}'
        contentType: '{{ item.contentType }}'
        imageResponseCard: '{{ item.imageResponseCard }}'
        messages: '{{ item.messages }}'
