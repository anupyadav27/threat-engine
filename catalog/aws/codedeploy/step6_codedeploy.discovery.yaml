# ============================================================
# Discovery YAML — codedeploy (AWS)
# Generated: 2026-02-21T04:56:57Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: codedeploy
services:
  client: codedeploy
  module: boto3.client
discovery:
  # ── ListApplications ──
  - discovery_id: aws.codedeploy.list_applications
    calls:
      - action: list_applications
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.applications }}'
      item:
        application: '{{ item.application }}'
  # ── ListDeploymentConfigs ──
  - discovery_id: aws.codedeploy.list_deployment_configs
    calls:
      - action: list_deployment_configs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.deploymentConfigsList }}'
  # ── ListDeployments ──
  - discovery_id: aws.codedeploy.list_deployments
    calls:
      - action: list_deployments
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.deployments }}'
  # ── ListGitHubAccountTokenNames ──
  - discovery_id: aws.codedeploy.list_git_hub_account_token_names
    calls:
      - action: list_git_hub_account_token_names
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.tokenNameList }}'
  # ── ListOnPremisesInstances ──
  - discovery_id: aws.codedeploy.list_on_premises_instances
    calls:
      - action: list_on_premises_instances
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.instanceNames }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetApplication ──
  - discovery_id: aws.codedeploy.get_application
    calls:
      - action: get_application
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.applications }}'
      item:
        application: '{{ item.application }}'
        applicationId: '{{ item.applicationId }}'
        applicationName: '{{ item.applicationName }}'
        computePlatform: '{{ item.computePlatform }}'
        createTime: '{{ item.createTime }}'
        gitHubAccountName: '{{ item.gitHubAccountName }}'
        linkedToGitHub: '{{ item.linkedToGitHub }}'
  # ── GetApplicationRevision ──
  - discovery_id: aws.codedeploy.get_application_revision
    calls:
      - action: get_application_revision
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.revision }}'
      item:
        appSpecContent: '{{ item.appSpecContent }}'
        gitHubLocation: '{{ item.gitHubLocation }}'
        revisionType: '{{ item.revisionType }}'
        s3Location: '{{ item.s3Location }}'
        string: '{{ item.string }}'
  # ── GetDeployment ──
  - discovery_id: aws.codedeploy.get_deployment
    calls:
      - action: get_deployment
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.deploymentInfo }}'
      item:
        additionalDeploymentStatusInfo: '{{ item.additionalDeploymentStatusInfo }}'
        applicationName: '{{ item.applicationName }}'
        autoRollbackConfiguration: '{{ item.autoRollbackConfiguration }}'
        blueGreenDeploymentConfiguration: '{{ item.blueGreenDeploymentConfiguration }}'
        completeTime: '{{ item.completeTime }}'
        computePlatform: '{{ item.computePlatform }}'
        createTime: '{{ item.createTime }}'
        creator: '{{ item.creator }}'
        deploymentConfigName: '{{ item.deploymentConfigName }}'
        deploymentGroupName: '{{ item.deploymentGroupName }}'
        deploymentId: '{{ item.deploymentId }}'
        deploymentOverview: '{{ item.deploymentOverview }}'
        deploymentStatusMessages: '{{ item.deploymentStatusMessages }}'
        deploymentStyle: '{{ item.deploymentStyle }}'
        description: '{{ item.description }}'
        errorInformation: '{{ item.errorInformation }}'
        externalId: '{{ item.externalId }}'
        fileExistsBehavior: '{{ item.fileExistsBehavior }}'
        ignoreApplicationStopFailures: '{{ item.ignoreApplicationStopFailures }}'
        instanceTerminationWaitTimeStarted: '{{ item.instanceTerminationWaitTimeStarted }}'
        loadBalancerInfo: '{{ item.loadBalancerInfo }}'
        overrideAlarmConfiguration: '{{ item.overrideAlarmConfiguration }}'
        previousRevision: '{{ item.previousRevision }}'
        relatedDeployments: '{{ item.relatedDeployments }}'
        revision: '{{ item.revision }}'
        rollbackInfo: '{{ item.rollbackInfo }}'
        startTime: '{{ item.startTime }}'
        status: '{{ item.status }}'
        targetInstances: '{{ item.targetInstances }}'
        updateOutdatedInstancesOnly: '{{ item.updateOutdatedInstancesOnly }}'
  # ── GetDeploymentConfig ──
  - discovery_id: aws.codedeploy.get_deployment_config
    calls:
      - action: get_deployment_config
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.application }}'
      item:
        computePlatform: '{{ item.computePlatform }}'
        createTime: '{{ item.createTime }}'
        deploymentConfigId: '{{ item.deploymentConfigId }}'
        deploymentConfigName: '{{ item.deploymentConfigName }}'
        minimumHealthyHosts: '{{ item.minimumHealthyHosts }}'
        trafficRoutingConfig: '{{ item.trafficRoutingConfig }}'
        zonalConfig: '{{ item.zonalConfig }}'
  # ── GetDeploymentGroup ──
  - discovery_id: aws.codedeploy.get_deployment_group
    calls:
      - action: get_deployment_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.deploymentGroupInfo }}'
      item:
        alarmConfiguration: '{{ item.alarmConfiguration }}'
        applicationName: '{{ item.applicationName }}'
        autoRollbackConfiguration: '{{ item.autoRollbackConfiguration }}'
        autoScalingGroups: '{{ item.autoScalingGroups }}'
        blueGreenDeploymentConfiguration: '{{ item.blueGreenDeploymentConfiguration }}'
        computePlatform: '{{ item.computePlatform }}'
        deploymentConfigName: '{{ item.deploymentConfigName }}'
        deploymentGroupId: '{{ item.deploymentGroupId }}'
        deploymentGroupName: '{{ item.deploymentGroupName }}'
        deploymentStyle: '{{ item.deploymentStyle }}'
        ec2TagFilters: '{{ item.ec2TagFilters }}'
        ec2TagSet: '{{ item.ec2TagSet }}'
        ecsServices: '{{ item.ecsServices }}'
        lastAttemptedDeployment: '{{ item.lastAttemptedDeployment }}'
        lastSuccessfulDeployment: '{{ item.lastSuccessfulDeployment }}'
        loadBalancerInfo: '{{ item.loadBalancerInfo }}'
        onPremisesInstanceTagFilters: '{{ item.onPremisesInstanceTagFilters }}'
        onPremisesTagSet: '{{ item.onPremisesTagSet }}'
        outdatedInstancesStrategy: '{{ item.outdatedInstancesStrategy }}'
        serviceRoleArn: '{{ item.serviceRoleArn }}'
        targetRevision: '{{ item.targetRevision }}'
        terminationHookEnabled: '{{ item.terminationHookEnabled }}'
        triggerConfigurations: '{{ item.triggerConfigurations }}'
  # ── GetDeploymentInstance ──
  - discovery_id: aws.codedeploy.get_deployment_instance
    calls:
      - action: get_deployment_instance
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.deploymentInfo }}'
      item:
        deploymentId: '{{ item.deploymentId }}'
        instanceId: '{{ item.instanceId }}'
        instanceSummary: '{{ item.instanceSummary }}'
        instanceType: '{{ item.instanceType }}'
        lastUpdatedAt: '{{ item.lastUpdatedAt }}'
        lifecycleEvents: '{{ item.lifecycleEvents }}'
        status: '{{ item.status }}'
  # ── GetDeploymentTarget ──
  - discovery_id: aws.codedeploy.get_deployment_target
    calls:
      - action: get_deployment_target
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.deploymentTarget }}'
      item:
        cloudFormationTarget: '{{ item.cloudFormationTarget }}'
        deploymentTargetType: '{{ item.deploymentTargetType }}'
        ecsTarget: '{{ item.ecsTarget }}'
        instanceTarget: '{{ item.instanceTarget }}'
        lambdaTarget: '{{ item.lambdaTarget }}'
  # ── GetOnPremisesInstance ──
  - discovery_id: aws.codedeploy.get_on_premises_instance
    calls:
      - action: get_on_premises_instance
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.instanceInfo }}'
      item:
        deregisterTime: '{{ item.deregisterTime }}'
        iamSessionArn: '{{ item.iamSessionArn }}'
        iamUserArn: '{{ item.iamUserArn }}'
        instanceArn: '{{ item.instanceArn }}'
        instanceName: '{{ item.instanceName }}'
        registerTime: '{{ item.registerTime }}'
        tags: '{{ item.tags }}'
  # ── ListApplicationRevisions ──
  - discovery_id: aws.codedeploy.list_application_revisions
    calls:
      - action: list_application_revisions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.revisions }}'
      item:
        appSpecContent: '{{ item.appSpecContent }}'
        gitHubLocation: '{{ item.gitHubLocation }}'
        revisionType: '{{ item.revisionType }}'
        s3Location: '{{ item.s3Location }}'
        string: '{{ item.string }}'
  # ── ListDeploymentGroups ──
  - discovery_id: aws.codedeploy.list_deployment_groups
    calls:
      - action: list_deployment_groups
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.deploymentGroups }}'
  # ── ListDeploymentInstances ──
  - discovery_id: aws.codedeploy.list_deployment_instances
    calls:
      - action: list_deployment_instances
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.instancesList }}'
      item:
        instanceSummary: '{{ item.instanceSummary }}'
  # ── ListDeploymentTargets ──
  - discovery_id: aws.codedeploy.list_deployment_targets
    calls:
      - action: list_deployment_targets
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.targetIds }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.codedeploy.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Tags }}'
      item:
        Key: '{{ item.Key }}'
        Value: '{{ item.Value }}'
