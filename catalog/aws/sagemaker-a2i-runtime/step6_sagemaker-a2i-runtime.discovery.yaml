# ============================================================
# Discovery YAML — sagemaker-a2i-runtime (AWS)
# Generated: 2026-02-21T04:56:59Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: sagemaker-a2i-runtime
services:
  client: sagemaker-a2i-runtime
  module: boto3.client
discovery:
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeHumanLoop ──
  - discovery_id: aws.sagemaker-a2i-runtime.describe_human_loop
    calls:
      - action: describe_human_loop
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.HumanLoopOutput }}'
      item:
        OutputS3Uri: '{{ item.OutputS3Uri }}'
  # ── ListHumanLoops ──
  - discovery_id: aws.sagemaker-a2i-runtime.list_human_loops
    calls:
      - action: list_human_loops
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.HumanLoopSummaries }}'
      item:
        CreationTime: '{{ item.CreationTime }}'
        FailureReason: '{{ item.FailureReason }}'
        FlowDefinitionArn: '{{ item.FlowDefinitionArn }}'
        HumanLoopName: '{{ item.HumanLoopName }}'
        HumanLoopStatus: '{{ item.HumanLoopStatus }}'
