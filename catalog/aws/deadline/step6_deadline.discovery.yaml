version: '1.0'
provider: aws
service: deadline
services:
  client: deadline
  module: boto3.client
discovery:
  # ── ListAvailableMeteredProducts ──
  - discovery_id: aws.deadline.list_available_metered_products
    calls:
      - action: list_available_metered_products
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.meteredProducts }}'
      item:
        family: '{{ item.family }}'
        port: '{{ item.port }}'
        productId: '{{ item.productId }}'
        vendor: '{{ item.vendor }}'
  # ── ListFarms ──
  - discovery_id: aws.deadline.list_farms
    calls:
      - action: list_farms
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.farms }}'
      item:
        displayName: '{{ item.displayName }}'
        farmId: '{{ item.farmId }}'
        kmsKeyArn: '{{ item.kmsKeyArn }}'
  # ── ListLicenseEndpoints ──
  - discovery_id: aws.deadline.list_license_endpoints
    calls:
      - action: list_license_endpoints
