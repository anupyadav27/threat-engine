# ============================================================
# Discovery YAML — amplifyuibuilder (AWS)
# Generated: 2026-02-21T04:56:57Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: amplifyuibuilder
services:
  client: amplifyuibuilder
  module: boto3.client
discovery:
  # ── Dependent read operations (require identifiers) ──
  # ── GetCodegenJob ──
  - discovery_id: aws.amplifyuibuilder.get_codegen_job
    calls:
      - action: get_codegen_job
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.job }}'
      item:
        appId: '{{ item.appId }}'
        asset: '{{ item.asset }}'
        autoGenerateForms: '{{ item.autoGenerateForms }}'
        createdAt: '{{ item.createdAt }}'
        dependencies: '{{ item.dependencies }}'
        environmentName: '{{ item.environmentName }}'
        features: '{{ item.features }}'
        genericDataSchema: '{{ item.genericDataSchema }}'
        id: '{{ item.id }}'
        job: '{{ item.job }}'
        modifiedAt: '{{ item.modifiedAt }}'
        renderConfig: '{{ item.renderConfig }}'
        status: '{{ item.status }}'
        statusMessage: '{{ item.statusMessage }}'
        tags: '{{ item.tags }}'
  # ── GetComponent ──
  - discovery_id: aws.amplifyuibuilder.get_component
    calls:
      - action: get_component
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.job }}'
      item:
        appId: '{{ item.appId }}'
        bindingProperties: '{{ item.bindingProperties }}'
        children: '{{ item.children }}'
        collectionProperties: '{{ item.collectionProperties }}'
        component: '{{ item.component }}'
        componentType: '{{ item.componentType }}'
        createdAt: '{{ item.createdAt }}'
        environmentName: '{{ item.environmentName }}'
        events: '{{ item.events }}'
        id: '{{ item.id }}'
        modifiedAt: '{{ item.modifiedAt }}'
        name: '{{ item.name }}'
        overrides: '{{ item.overrides }}'
        properties: '{{ item.properties }}'
        schemaVersion: '{{ item.schemaVersion }}'
        sourceId: '{{ item.sourceId }}'
        tags: '{{ item.tags }}'
        variants: '{{ item.variants }}'
  # ── GetForm ──
  - discovery_id: aws.amplifyuibuilder.get_form
    calls:
      - action: get_form
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.job }}'
      item:
        appId: '{{ item.appId }}'
        cta: '{{ item.cta }}'
        dataType: '{{ item.dataType }}'
        environmentName: '{{ item.environmentName }}'
        fields: '{{ item.fields }}'
        form: '{{ item.form }}'
        formActionType: '{{ item.formActionType }}'
        id: '{{ item.id }}'
        labelDecorator: '{{ item.labelDecorator }}'
        name: '{{ item.name }}'
        schemaVersion: '{{ item.schemaVersion }}'
        sectionalElements: '{{ item.sectionalElements }}'
        style: '{{ item.style }}'
        tags: '{{ item.tags }}'
  # ── GetMetadata ──
  - discovery_id: aws.amplifyuibuilder.get_metadata
    calls:
      - action: get_metadata
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        features: '{{ response.features }}'
  # ── GetTheme ──
  - discovery_id: aws.amplifyuibuilder.get_theme
    calls:
      - action: get_theme
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.job }}'
      item:
        appId: '{{ item.appId }}'
        createdAt: '{{ item.createdAt }}'
        environmentName: '{{ item.environmentName }}'
        id: '{{ item.id }}'
        modifiedAt: '{{ item.modifiedAt }}'
        name: '{{ item.name }}'
        overrides: '{{ item.overrides }}'
        tags: '{{ item.tags }}'
        values: '{{ item.values }}'
  # ── ListCodegenJobs ──
  - discovery_id: aws.amplifyuibuilder.list_codegen_jobs
    calls:
      - action: list_codegen_jobs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.entities }}'
      item:
        appId: '{{ item.appId }}'
        createdAt: '{{ item.createdAt }}'
        environmentName: '{{ item.environmentName }}'
        id: '{{ item.id }}'
        job: '{{ item.job }}'
        modifiedAt: '{{ item.modifiedAt }}'
  # ── ListComponents ──
  - discovery_id: aws.amplifyuibuilder.list_components
    calls:
      - action: list_components
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.entities }}'
      item:
        appId: '{{ item.appId }}'
        component: '{{ item.component }}'
        componentType: '{{ item.componentType }}'
        environmentName: '{{ item.environmentName }}'
        id: '{{ item.id }}'
        name: '{{ item.name }}'
  # ── ListForms ──
  - discovery_id: aws.amplifyuibuilder.list_forms
    calls:
      - action: list_forms
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.entities }}'
      item:
        appId: '{{ item.appId }}'
        dataType: '{{ item.dataType }}'
        environmentName: '{{ item.environmentName }}'
        form: '{{ item.form }}'
        formActionType: '{{ item.formActionType }}'
        id: '{{ item.id }}'
        name: '{{ item.name }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.amplifyuibuilder.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        tags: '{{ response.tags }}'
  # ── ListThemes ──
  - discovery_id: aws.amplifyuibuilder.list_themes
    calls:
      - action: list_themes
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.entities }}'
      item:
        appId: '{{ item.appId }}'
        environmentName: '{{ item.environmentName }}'
        id: '{{ item.id }}'
        name: '{{ item.name }}'
