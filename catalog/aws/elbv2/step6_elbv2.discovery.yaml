# ============================================================
# Discovery YAML — elbv2 (AWS)
# Generated: 2026-02-21T04:56:58Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: elbv2
services:
  client: elbv2
  module: boto3.client
discovery:
  # ── DescribeAccountLimits ──
  - discovery_id: aws.elbv2.describe_account_limits
    calls:
      - action: describe_account_limits
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Limits }}'
      item:
        Name: '{{ item.Name }}'
        Limits: '{{ item.Limits }}'
        Max: '{{ item.Max }}'
  # ── DescribeListeners ──
  - discovery_id: aws.elbv2.describe_listeners
    calls:
      - action: describe_listeners
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Listeners }}'
      item:
        AlpnPolicy: '{{ item.AlpnPolicy }}'
        CertificateArn: '{{ item.CertificateArn }}'
        Certificates: '{{ item.Certificates }}'
        DefaultActions: '{{ item.DefaultActions }}'
        ListenerArn: '{{ item.ListenerArn }}'
        Listeners: '{{ item.Listeners }}'
        LoadBalancerArn: '{{ item.LoadBalancerArn }}'
        MutualAuthentication: '{{ item.MutualAuthentication }}'
        Port: '{{ item.Port }}'
        Protocol: '{{ item.Protocol }}'
        SslPolicy: '{{ item.SslPolicy }}'
        Statement: '{{ item.Statement }}'
        Version: '{{ item.Version }}'
  # ── DescribeLoadBalancers ──
  - discovery_id: aws.elbv2.describe_load_balancers
    calls:
      - action: describe_load_balancers
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.LoadBalancers }}'
      item:
        SecurityGroups: '{{ item.SecurityGroups }}'
        State: '{{ item.State }}'
        VpcId: '{{ item.VpcId }}'
        AvailabilityZones: '{{ item.AvailabilityZones }}'
        CanonicalHostedZoneId: '{{ item.CanonicalHostedZoneId }}'
        CreatedTime: '{{ item.CreatedTime }}'
        CustomerOwnedIpv4Pool: '{{ item.CustomerOwnedIpv4Pool }}'
        DNSName: '{{ item.DNSName }}'
        EnablePrefixForIpv6SourceNat: '{{ item.EnablePrefixForIpv6SourceNat }}'
        EnforceSecurityGroupInboundRulesOnPrivateLinkTraffic: '{{ item.EnforceSecurityGroupInboundRulesOnPrivateLinkTraffic }}'
        IpAddressType: '{{ item.IpAddressType }}'
        IpamPools: '{{ item.IpamPools }}'
        LoadBalancerArn: '{{ item.LoadBalancerArn }}'
        LoadBalancerName: '{{ item.LoadBalancerName }}'
        LoadBalancers: '{{ item.LoadBalancers }}'
        Scheme: '{{ item.Scheme }}'
        Type: '{{ item.Type }}'
  # ── DescribeRules ──
  - discovery_id: aws.elbv2.describe_rules
    calls:
      - action: describe_rules
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Rules }}'
      item:
        Actions: '{{ item.Actions }}'
        Conditions: '{{ item.Conditions }}'
        IsDefault: '{{ item.IsDefault }}'
        Priority: '{{ item.Priority }}'
        RuleArn: '{{ item.RuleArn }}'
        Rules: '{{ item.Rules }}'
        Transforms: '{{ item.Transforms }}'
  # ── DescribeSSLPolicies ──
  - discovery_id: aws.elbv2.describe_ssl_policies
    calls:
      - action: describe_ssl_policies
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.SslPolicies }}'
      item:
        Name: '{{ item.Name }}'
        Ciphers: '{{ item.Ciphers }}'
        SslPolicies: '{{ item.SslPolicies }}'
        SslProtocols: '{{ item.SslProtocols }}'
        SupportedLoadBalancerTypes: '{{ item.SupportedLoadBalancerTypes }}'
  # ── DescribeTargetGroups ──
  - discovery_id: aws.elbv2.describe_target_groups
    calls:
      - action: describe_target_groups
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.TargetGroups }}'
      item:
        VpcId: '{{ item.VpcId }}'
        HealthCheckEnabled: '{{ item.HealthCheckEnabled }}'
        HealthCheckIntervalSeconds: '{{ item.HealthCheckIntervalSeconds }}'
        HealthCheckPath: '{{ item.HealthCheckPath }}'
        HealthCheckPort: '{{ item.HealthCheckPort }}'
        HealthCheckProtocol: '{{ item.HealthCheckProtocol }}'
        HealthCheckTimeoutSeconds: '{{ item.HealthCheckTimeoutSeconds }}'
        HealthyThresholdCount: '{{ item.HealthyThresholdCount }}'
        IpAddressType: '{{ item.IpAddressType }}'
        LoadBalancerArns: '{{ item.LoadBalancerArns }}'
        Matcher: '{{ item.Matcher }}'
        Port: '{{ item.Port }}'
        Protocol: '{{ item.Protocol }}'
        ProtocolVersion: '{{ item.ProtocolVersion }}'
        TargetControlPort: '{{ item.TargetControlPort }}'
        TargetGroupArn: '{{ item.TargetGroupArn }}'
        TargetGroupName: '{{ item.TargetGroupName }}'
        TargetGroups: '{{ item.TargetGroups }}'
        TargetType: '{{ item.TargetType }}'
        UnhealthyThresholdCount: '{{ item.UnhealthyThresholdCount }}'
  # ── DescribeTrustStores ──
  - discovery_id: aws.elbv2.describe_trust_stores
    calls:
      - action: describe_trust_stores
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.TrustStores }}'
      item:
        Name: '{{ item.Name }}'
        Status: '{{ item.Status }}'
        NumberOfCaCertificates: '{{ item.NumberOfCaCertificates }}'
        TotalRevokedEntries: '{{ item.TotalRevokedEntries }}'
        TrustStoreArn: '{{ item.TrustStoreArn }}'
        TrustStores: '{{ item.TrustStores }}'
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeCapacityReservation ──
  - discovery_id: aws.elbv2.describe_capacity_reservation
    for_each: aws.elbv2.describe_load_balancers
    calls:
      - action: describe_capacity_reservation
        params:
          LoadBalancerArn: '{{ item.LoadBalancerArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.CapacityReservationState }}'
      item:
        State: '{{ item.State }}'
        AvailabilityZone: '{{ item.AvailabilityZone }}'
        EffectiveCapacityUnits: '{{ item.EffectiveCapacityUnits }}'
  # ── DescribeListenerAttributes ──
  - discovery_id: aws.elbv2.describe_listener_attributes
    for_each: aws.elbv2.describe_listeners
    calls:
      - action: describe_listener_attributes
        params:
          ListenerArn: '{{ item.ListenerArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Attributes }}'
      item:
        Attributes: '{{ item.Attributes }}'
        Key: '{{ item.Key }}'
        Value: '{{ item.Value }}'
  # ── DescribeListenerCertificates ──
  - discovery_id: aws.elbv2.describe_listener_certificates
    for_each: aws.elbv2.describe_listeners
    calls:
      - action: describe_listener_certificates
        params:
          ListenerArn: '{{ item.ListenerArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Certificates }}'
      item:
        CertificateArn: '{{ item.CertificateArn }}'
        IsDefault: '{{ item.IsDefault }}'
  # ── DescribeLoadBalancerAttributes ──
  - discovery_id: aws.elbv2.describe_load_balancer_attributes
    for_each: aws.elbv2.describe_load_balancers
    calls:
      - action: describe_load_balancer_attributes
        params:
          LoadBalancerArn: '{{ item.LoadBalancerArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Attributes }}'
      item:
        Key: '{{ item.Key }}'
        Value: '{{ item.Value }}'
  # ── DescribeTags ──
  - discovery_id: aws.elbv2.describe_tags
    calls:
      - action: describe_tags
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.TagDescriptions }}'
      item:
        ResourceArn: '{{ item.ResourceArn }}'
        Tags: '{{ item.Tags }}'
  # ── DescribeTargetGroupAttributes ──
  - discovery_id: aws.elbv2.describe_target_group_attributes
    for_each: aws.elbv2.describe_target_groups
    calls:
      - action: describe_target_group_attributes
        params:
          TargetGroupArn: '{{ item.TargetGroupArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Attributes }}'
      item:
        Key: '{{ item.Key }}'
        Value: '{{ item.Value }}'
  # ── DescribeTargetHealth ──
  - discovery_id: aws.elbv2.describe_target_health
    for_each: aws.elbv2.describe_target_groups
    calls:
      - action: describe_target_health
        params:
          TargetGroupArn: '{{ item.TargetGroupArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.TargetHealthDescriptions }}'
      item:
        AdministrativeOverride: '{{ item.AdministrativeOverride }}'
        AnomalyDetection: '{{ item.AnomalyDetection }}'
        HealthCheckPort: '{{ item.HealthCheckPort }}'
        Target: '{{ item.Target }}'
        TargetHealth: '{{ item.TargetHealth }}'
  # ── DescribeTrustStoreAssociations ──
  - discovery_id: aws.elbv2.describe_trust_store_associations
    for_each: aws.elbv2.describe_trust_stores
    calls:
      - action: describe_trust_store_associations
        params:
          TrustStoreArn: '{{ item.TrustStoreArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.TrustStoreAssociations }}'
      item:
        ResourceArn: '{{ item.ResourceArn }}'
  # ── DescribeTrustStoreRevocations ──
  - discovery_id: aws.elbv2.describe_trust_store_revocations
    for_each: aws.elbv2.describe_trust_stores
    calls:
      - action: describe_trust_store_revocations
        params:
          TrustStoreArn: '{{ item.TrustStoreArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.TrustStoreRevocations }}'
      item:
        NumberOfRevokedEntries: '{{ item.NumberOfRevokedEntries }}'
        RevocationId: '{{ item.RevocationId }}'
        RevocationType: '{{ item.RevocationType }}'
        TrustStoreArn: '{{ item.TrustStoreArn }}'
  # ── GetResourcePolicy ──
  - discovery_id: aws.elbv2.get_resource_policy
    calls:
      - action: get_resource_policy
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Policy }}'
      item:
        Policy: '{{ item.Policy }}'
  # ── GetTrustStoreCaCertificatesBundle ──
  - discovery_id: aws.elbv2.get_trust_store_ca_certificates_bundle
    for_each: aws.elbv2.describe_trust_stores
    calls:
      - action: get_trust_store_ca_certificates_bundle
        params:
          TrustStoreArn: '{{ item.TrustStoreArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Location }}'
      item:
        Location: '{{ item.Location }}'
  # ── GetTrustStoreRevocationContent ──
  - discovery_id: aws.elbv2.get_trust_store_revocation_content
    for_each: aws.elbv2.describe_trust_stores
    calls:
      - action: get_trust_store_revocation_content
        params:
          TrustStoreArn: '{{ item.TrustStoreArn }}'
          RevocationId: '{{ item.RevocationId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        Location: '{{ response.Location }}'
