# ============================================================
# Discovery YAML — xray (AWS)
# Generated: 2026-02-21T04:57:00Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: xray
services:
  client: xray
  module: boto3.client
discovery:
  # ── GetEncryptionConfig ──
  - discovery_id: aws.xray.get_encryption_config
    calls:
      - action: get_encryption_config
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.EncryptionConfig }}'
      item:
        EncryptionConfig: '{{ item.EncryptionConfig }}'
        Status: '{{ item.Status }}'
        KeyId: '{{ item.KeyId }}'
        Type: '{{ item.Type }}'
  # ── GetGroup ──
  - discovery_id: aws.xray.get_group
    calls:
      - action: get_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Group }}'
      item:
        Enabled: '{{ item.Enabled }}'
        FilterExpression: '{{ item.FilterExpression }}'
        Group: '{{ item.Group }}'
        GroupARN: '{{ item.GroupARN }}'
        GroupName: '{{ item.GroupName }}'
        InsightsConfiguration: '{{ item.InsightsConfiguration }}'
  # ── GetGroups ──
  - discovery_id: aws.xray.get_groups
    calls:
      - action: get_groups
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Groups }}'
      item:
        FilterExpression: '{{ item.FilterExpression }}'
        GroupARN: '{{ item.GroupARN }}'
        GroupName: '{{ item.GroupName }}'
        Groups: '{{ item.Groups }}'
        InsightsConfiguration: '{{ item.InsightsConfiguration }}'
  # ── GetIndexingRules ──
  - discovery_id: aws.xray.get_indexing_rules
    calls:
      - action: get_indexing_rules
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.IndexingRules }}'
      item:
        Name: '{{ item.Name }}'
        IndexingRules: '{{ item.IndexingRules }}'
        ModifiedAt: '{{ item.ModifiedAt }}'
        Rule: '{{ item.Rule }}'
  # ── GetSamplingRules ──
  - discovery_id: aws.xray.get_sampling_rules
    calls:
      - action: get_sampling_rules
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.SamplingRuleRecords }}'
      item:
        CreatedAt: '{{ item.CreatedAt }}'
        ModifiedAt: '{{ item.ModifiedAt }}'
        SamplingRule: '{{ item.SamplingRule }}'
        SamplingRuleRecords: '{{ item.SamplingRuleRecords }}'
  # ── GetSamplingStatisticSummaries ──
  - discovery_id: aws.xray.get_sampling_statistic_summaries
    calls:
      - action: get_sampling_statistic_summaries
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.SamplingStatisticSummaries }}'
      item:
        BorrowCount: '{{ item.BorrowCount }}'
        RequestCount: '{{ item.RequestCount }}'
        RuleName: '{{ item.RuleName }}'
        SampledCount: '{{ item.SampledCount }}'
        SamplingStatisticSummaries: '{{ item.SamplingStatisticSummaries }}'
        Timestamp: '{{ item.Timestamp }}'
  # ── GetTraceSegmentDestination ──
  - discovery_id: aws.xray.get_trace_segment_destination
    calls:
      - action: get_trace_segment_destination
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Destination }}'
      item:
        Destination: '{{ item.Destination }}'
  # ── ListResourcePolicies ──
  - discovery_id: aws.xray.list_resource_policies
    calls:
      - action: list_resource_policies
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ResourcePolicies }}'
      item:
        PolicyDocument: '{{ item.PolicyDocument }}'
        LastUpdatedTime: '{{ item.LastUpdatedTime }}'
        PolicyName: '{{ item.PolicyName }}'
        PolicyRevisionId: '{{ item.PolicyRevisionId }}'
        Statement: '{{ item.Statement }}'
        Version: '{{ item.Version }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetInsight ──
  - discovery_id: aws.xray.get_insight
    calls:
      - action: get_insight
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Insight }}'
      item:
        State: '{{ item.State }}'
        Categories: '{{ item.Categories }}'
        ClientRequestImpactStatistics: '{{ item.ClientRequestImpactStatistics }}'
        EndTime: '{{ item.EndTime }}'
        GroupARN: '{{ item.GroupARN }}'
        GroupName: '{{ item.GroupName }}'
        Insight: '{{ item.Insight }}'
        InsightId: '{{ item.InsightId }}'
        RootCauseServiceId: '{{ item.RootCauseServiceId }}'
        RootCauseServiceRequestImpactStatistics: '{{ item.RootCauseServiceRequestImpactStatistics }}'
        ServiceGraphEndTime: '{{ item.ServiceGraphEndTime }}'
        ServiceGraphStartTime: '{{ item.ServiceGraphStartTime }}'
        StartTime: '{{ item.StartTime }}'
        Summary: '{{ item.Summary }}'
        TopAnomalousServices: '{{ item.TopAnomalousServices }}'
  # ── GetInsightEvents ──
  - discovery_id: aws.xray.get_insight_events
    calls:
      - action: get_insight_events
