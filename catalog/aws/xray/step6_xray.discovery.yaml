  # ── GetTraceGraph ──
  - discovery_id: aws.xray.get_trace_graph
    calls:
      - action: get_trace_graph
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Services }}'
      item:
        AccountId: '{{ item.AccountId }}'
        Name: '{{ item.Name }}'
        State: '{{ item.State }}'
        DurationHistogram: '{{ item.DurationHistogram }}'
        Edges: '{{ item.Edges }}'
        EndTime: '{{ item.EndTime }}'
        Names: '{{ item.Names }}'
        ReferenceId: '{{ item.ReferenceId }}'
