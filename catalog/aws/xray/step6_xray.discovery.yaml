        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Services }}'
      item:
        AccountId: '{{ item.AccountId }}'
        Name: '{{ item.Name }}'
        Edges: '{{ item.Edges }}'
        Names: '{{ item.Names }}'
        ReferenceId: '{{ item.ReferenceId }}'
        ServiceGraphEndTime: '{{ item.ServiceGraphEndTime }}'
        ServiceGraphStartTime: '{{ item.ServiceGraphStartTime }}'
        Services: '{{ item.Services }}'
        Type: '{{ item.Type }}'
  # ── GetInsightSummaries ──
  - discovery_id: aws.xray.get_insight_summaries
    calls:
      - action: get_insight_summaries
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.InsightSummaries }}'
      item:
        State: '{{ item.State }}'
        Categories: '{{ item.Categories }}'
        ClientRequestImpactStatistics: '{{ item.ClientRequestImpactStatistics }}'
        EndTime: '{{ item.EndTime }}'
        GroupARN: '{{ item.GroupARN }}'
        GroupName: '{{ item.GroupName }}'
        InsightId: '{{ item.InsightId }}'
        LastUpdateTime: '{{ item.LastUpdateTime }}'
        RootCauseServiceId: '{{ item.RootCauseServiceId }}'
        RootCauseServiceRequestImpactStatistics: '{{ item.RootCauseServiceRequestImpactStatistics }}'
        StartTime: '{{ item.StartTime }}'
        Summary: '{{ item.Summary }}'
        TopAnomalousServices: '{{ item.TopAnomalousServices }}'
  # ── GetRetrievedTracesGraph ──
  - discovery_id: aws.xray.get_retrieved_traces_graph
    calls:
      - action: get_retrieved_traces_graph
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Services }}'
      item:
        Links: '{{ item.Links }}'
        Service: '{{ item.Service }}'
        Services: '{{ item.Services }}'
  # ── GetSamplingTargets ──
  - discovery_id: aws.xray.get_sampling_targets
    calls:
      - action: get_sampling_targets
        save_as: response
