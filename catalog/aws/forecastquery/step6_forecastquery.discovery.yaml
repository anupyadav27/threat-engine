# ============================================================
# Discovery YAML — forecastquery (AWS)
# Generated: 2026-02-21T04:56:58Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: forecastquery
services:
  client: forecastquery
  module: boto3.client
discovery:
  # ── Dependent read operations (require identifiers) ──
  # ── QueryForecast ──
  - discovery_id: aws.forecastquery.query_forecast
    calls:
      - action: query_forecast
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        Forecast: '{{ response.Forecast }}'
  # ── QueryWhatIfForecast ──
  - discovery_id: aws.forecastquery.query_what_if_forecast
    calls:
      - action: query_what_if_forecast
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        Forecast: '{{ response.Forecast }}'
