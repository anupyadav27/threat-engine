version: '1.0'
provider: aws
service: networkfirewall
services:
  client: networkfirewall
  module: boto3.client
discovery:
  # ── DescribeFirewall ──
  - discovery_id: aws.networkfirewall.describe_firewall
    calls:
      - action: describe_firewall
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Flows }}'
      item:
        Tags: '{{ item.Tags }}'
        VpcId: '{{ item.VpcId }}'
        Age: '{{ item.Age }}'
        AvailabilityZone: '{{ item.AvailabilityZone }}'
        AvailabilityZoneChangeProtection: '{{ item.AvailabilityZoneChangeProtection }}'
        AvailabilityZoneMappings: '{{ item.AvailabilityZoneMappings }}'
        ByteCount: '{{ item.ByteCount }}'
        DeleteProtection: '{{ item.DeleteProtection }}'
        Description: '{{ item.Description }}'
        DestinationAddress: '{{ item.DestinationAddress }}'
        DestinationPort: '{{ item.DestinationPort }}'
        EnabledAnalysisTypes: '{{ item.EnabledAnalysisTypes }}'
        EncryptionConfiguration: '{{ item.EncryptionConfiguration }}'
        Firewall: '{{ item.Firewall }}'
        FirewallArn: '{{ item.FirewallArn }}'
        FirewallId: '{{ item.FirewallId }}'
        FirewallName: '{{ item.FirewallName }}'
        FirewallPolicyArn: '{{ item.FirewallPolicyArn }}'
        FirewallPolicyChangeProtection: '{{ item.FirewallPolicyChangeProtection }}'
        FirewallStatus: '{{ item.FirewallStatus }}'
        FlowFilters: '{{ item.FlowFilters }}'
        FlowOperation: '{{ item.FlowOperation }}'
        FlowRequestTimestamp: '{{ item.FlowRequestTimestamp }}'
        MinimumFlowAgeInSeconds: '{{ item.MinimumFlowAgeInSeconds }}'
        NumberOfAssociations: '{{ item.NumberOfAssociations }}'
        PacketCount: '{{ item.PacketCount }}'
        SourceAddress: '{{ item.SourceAddress }}'
        SourcePort: '{{ item.SourcePort }}'
        StatusMessage: '{{ item.StatusMessage }}'
        SubnetChangeProtection: '{{ item.SubnetChangeProtection }}'
        SubnetMappings: '{{ item.SubnetMappings }}'
        TransitGatewayId: '{{ item.TransitGatewayId }}'
        TransitGatewayOwnerAccountId: '{{ item.TransitGatewayOwnerAccountId }}'
        UpdateToken: '{{ item.UpdateToken }}'
        VpcEndpointId: '{{ item.VpcEndpointId }}'
  # ── DescribeFirewallMetadata ──
  - discovery_id: aws.networkfirewall.describe_firewall_metadata
    calls:
      - action: describe_firewall_metadata
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.FirewallArn }}'
      item:
        SupportedAvailabilityZones: '{{ item.SupportedAvailabilityZones }}'
  # ── DescribeFirewallPolicy ──
  - discovery_id: aws.networkfirewall.describe_firewall_policy
    calls:
      - action: describe_firewall_policy
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.FirewallPolicyResponse }}'
      item:
        LastModifiedTime: '{{ item.LastModifiedTime }}'
        Tags: '{{ item.Tags }}'
        ConsumedStatefulRuleCapacity: '{{ item.ConsumedStatefulRuleCapacity }}'
        ConsumedStatelessRuleCapacity: '{{ item.ConsumedStatelessRuleCapacity }}'
        Description: '{{ item.Description }}'
        EncryptionConfiguration: '{{ item.EncryptionConfiguration }}'
        FirewallPolicy: '{{ item.FirewallPolicy }}'
        FirewallPolicyArn: '{{ item.FirewallPolicyArn }}'
        FirewallPolicyId: '{{ item.FirewallPolicyId }}'
        FirewallPolicyName: '{{ item.FirewallPolicyName }}'
        FirewallPolicyResponse: '{{ item.FirewallPolicyResponse }}'
        FirewallPolicyStatus: '{{ item.FirewallPolicyStatus }}'
        NumberOfAssociations: '{{ item.NumberOfAssociations }}'
  # ── DescribeLoggingConfiguration ──
  - discovery_id: aws.networkfirewall.describe_logging_configuration
    calls:
      - action: describe_logging_configuration
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.FirewallArn }}'
      item:
        EnableMonitoringDashboard: '{{ item.EnableMonitoringDashboard }}'
        LogDestinationConfigs: '{{ item.LogDestinationConfigs }}'
        LoggingConfiguration: '{{ item.LoggingConfiguration }}'
  # ── DescribeProxy ──
  - discovery_id: aws.networkfirewall.describe_proxy
    calls:
      - action: describe_proxy
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Proxy }}'
      item:
        CreateTime: '{{ item.CreateTime }}'
        Tags: '{{ item.Tags }}'
        DeleteTime: '{{ item.DeleteTime }}'
        FailureCode: '{{ item.FailureCode }}'
        FailureMessage: '{{ item.FailureMessage }}'
        ListenerProperties: '{{ item.ListenerProperties }}'
        NatGatewayId: '{{ item.NatGatewayId }}'
        PrivateDNSName: '{{ item.PrivateDNSName }}'
        Proxy: '{{ item.Proxy }}'
        ProxyArn: '{{ item.ProxyArn }}'
        ProxyConfigurationArn: '{{ item.ProxyConfigurationArn }}'
        ProxyConfigurationName: '{{ item.ProxyConfigurationName }}'
        ProxyModifyState: '{{ item.ProxyModifyState }}'
        ProxyName: '{{ item.ProxyName }}'
        ProxyState: '{{ item.ProxyState }}'
        TlsInterceptProperties: '{{ item.TlsInterceptProperties }}'
        UpdateTime: '{{ item.UpdateTime }}'
        VpcEndpointServiceName: '{{ item.VpcEndpointServiceName }}'
  # ── DescribeProxyConfiguration ──
  - discovery_id: aws.networkfirewall.describe_proxy_configuration
    calls:
      - action: describe_proxy_configuration
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Proxy }}'
      item:
        CreateTime: '{{ item.CreateTime }}'
        Tags: '{{ item.Tags }}'
        DefaultRulePhaseActions: '{{ item.DefaultRulePhaseActions }}'
        DeleteTime: '{{ item.DeleteTime }}'
        Description: '{{ item.Description }}'
        ProxyConfiguration: '{{ item.ProxyConfiguration }}'
        ProxyConfigurationArn: '{{ item.ProxyConfigurationArn }}'
        ProxyConfigurationName: '{{ item.ProxyConfigurationName }}'
        RuleGroups: '{{ item.RuleGroups }}'
  # ── DescribeProxyRuleGroup ──
  - discovery_id: aws.networkfirewall.describe_proxy_rule_group
    calls:
      - action: describe_proxy_rule_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Proxy }}'
      item:
        CreateTime: '{{ item.CreateTime }}'
        Tags: '{{ item.Tags }}'
        DeleteTime: '{{ item.DeleteTime }}'
        Description: '{{ item.Description }}'
        ProxyRuleGroup: '{{ item.ProxyRuleGroup }}'
        ProxyRuleGroupArn: '{{ item.ProxyRuleGroupArn }}'
        ProxyRuleGroupName: '{{ item.ProxyRuleGroupName }}'
        Rules: '{{ item.Rules }}'
  # ── DescribeRuleGroup ──
  - discovery_id: aws.networkfirewall.describe_rule_group
    calls:
      - action: describe_rule_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.RuleGroup }}'
      item:
        ReferenceSets: '{{ item.ReferenceSets }}'
        RuleGroup: '{{ item.RuleGroup }}'
        RuleGroupResponse: '{{ item.RuleGroupResponse }}'
        RuleVariables: '{{ item.RuleVariables }}'
        RulesSource: '{{ item.RulesSource }}'
        StatefulRuleOptions: '{{ item.StatefulRuleOptions }}'
  # ── DescribeRuleGroupMetadata ──
  - discovery_id: aws.networkfirewall.describe_rule_group_metadata
    calls:
      - action: describe_rule_group_metadata
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.RuleGroupArn }}'
      item:
        Capacity: '{{ item.Capacity }}'
        ListingName: '{{ item.ListingName }}'
        ProductId: '{{ item.ProductId }}'
