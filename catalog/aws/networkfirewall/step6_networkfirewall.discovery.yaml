        RuleOrder: '{{ item.RuleOrder }}'
        Type: '{{ item.Type }}'
  # ── DescribeRuleGroupSummary ──
  - discovery_id: aws.networkfirewall.describe_rule_group_summary
    calls:
      - action: describe_rule_group_summary
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Summary }}'
      item:
        RuleSummaries: '{{ item.RuleSummaries }}'
        Summary: '{{ item.Summary }}'
  # ── DescribeTLSInspectionConfiguration ──
  - discovery_id: aws.networkfirewall.describe_tls_inspection_configuration
    calls:
      - action: describe_tls_inspection_configuration
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.TLSInspectionConfiguration }}'
      item:
        ServerCertificateConfigurations: '{{ item.ServerCertificateConfigurations }}'
        TLSInspectionConfiguration: '{{ item.TLSInspectionConfiguration }}'
        TLSInspectionConfigurationResponse: '{{ item.TLSInspectionConfigurationResponse }}'
  # ── ListAnalysisReports ──
  - discovery_id: aws.networkfirewall.list_analysis_reports
    calls:
      - action: list_analysis_reports
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.AnalysisReports }}'
      item:
        Status: '{{ item.Status }}'
        AnalysisReportId: '{{ item.AnalysisReportId }}'
        AnalysisType: '{{ item.AnalysisType }}'
        ReportTime: '{{ item.ReportTime }}'
  # ── ListFirewallPolicies ──
  - discovery_id: aws.networkfirewall.list_firewall_policies
    calls:
      - action: list_firewall_policies
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.FirewallPolicies }}'
      item:
        Arn: '{{ item.Arn }}'
        Name: '{{ item.Name }}'
  # ── ListFirewalls ──
  - discovery_id: aws.networkfirewall.list_firewalls
    calls:
      - action: list_firewalls
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Firewall }}'
      item:
        FirewallArn: '{{ item.FirewallArn }}'
        FirewallName: '{{ item.FirewallName }}'
        TransitGatewayAttachmentId: '{{ item.TransitGatewayAttachmentId }}'
  # ── ListProxies ──
  - discovery_id: aws.networkfirewall.list_proxies
    calls:
      - action: list_proxies
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.FirewallPolicies }}'
      item:
        Arn: '{{ item.Arn }}'
        Name: '{{ item.Name }}'
  # ── ListProxyConfigurations ──
  - discovery_id: aws.networkfirewall.list_proxy_configurations
    calls:
      - action: list_proxy_configurations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.FirewallPolicies }}'
      item:
        Arn: '{{ item.Arn }}'
        Name: '{{ item.Name }}'
  # ── ListProxyRuleGroups ──
  - discovery_id: aws.networkfirewall.list_proxy_rule_groups
    calls:
      - action: list_proxy_rule_groups
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.FirewallPolicies }}'
      item:
        Arn: '{{ item.Arn }}'
        Name: '{{ item.Name }}'
  # ── ListRuleGroups ──
  - discovery_id: aws.networkfirewall.list_rule_groups
    calls:
      - action: list_rule_groups
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.FirewallPolicies }}'
      item:
        Arn: '{{ item.Arn }}'
        Name: '{{ item.Name }}'
        VendorName: '{{ item.VendorName }}'
  # ── ListTLSInspectionConfigurations ──
  - discovery_id: aws.networkfirewall.list_tls_inspection_configurations
    calls:
      - action: list_tls_inspection_configurations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.FirewallPolicies }}'
      item:
        Arn: '{{ item.Arn }}'
        Name: '{{ item.Name }}'
  # ── ListVpcEndpointAssociations ──
  - discovery_id: aws.networkfirewall.list_vpc_endpoint_associations
    calls:
      - action: list_vpc_endpoint_associations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.VpcEndpointAssociations }}'
      item:
        VpcEndpointAssociationArn: '{{ item.VpcEndpointAssociationArn }}'
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeFlowOperation ──
  - discovery_id: aws.networkfirewall.describe_flow_operation
    for_each: aws.networkfirewall.describe_firewall
    calls:
      - action: describe_flow_operation
        params:
          FirewallArn: '{{ item.FirewallArn }}'
          FlowOperationId: '{{ item.FlowOperationId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.UpdateToken }}'
      item:
        AvailabilityZone: '{{ item.AvailabilityZone }}'
        FlowFilters: '{{ item.FlowFilters }}'
        FlowOperation: '{{ item.FlowOperation }}'
        MinimumFlowAgeInSeconds: '{{ item.MinimumFlowAgeInSeconds }}'
        StatusMessage: '{{ item.StatusMessage }}'
        VpcEndpointId: '{{ item.VpcEndpointId }}'
  # ── DescribeProxyRule ──
  - discovery_id: aws.networkfirewall.describe_proxy_rule
    calls:
      - action: describe_proxy_rule
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ProxyRule }}'
      item:
        Action: '{{ item.Action }}'
        Conditions: '{{ item.Conditions }}'
        Description: '{{ item.Description }}'
        ProxyRuleName: '{{ item.ProxyRuleName }}'
  # ── DescribeResourcePolicy ──
  - discovery_id: aws.networkfirewall.describe_resource_policy
    calls:
      - action: describe_resource_policy
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Policy }}'
      item:
        Policy: '{{ item.Policy }}'
  # ── DescribeVpcEndpointAssociation ──
  - discovery_id: aws.networkfirewall.describe_vpc_endpoint_association
    for_each: aws.networkfirewall.list_vpc_endpoint_associations
    calls:
      - action: describe_vpc_endpoint_association
        params:
          VpcEndpointAssociationArn: '{{ item.VpcEndpointAssociationArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Firewall }}'
      item:
        Tags: '{{ item.Tags }}'
        VpcId: '{{ item.VpcId }}'
        Description: '{{ item.Description }}'
        FirewallArn: '{{ item.FirewallArn }}'
        SubnetMapping: '{{ item.SubnetMapping }}'
        VpcEndpointAssociationArn: '{{ item.VpcEndpointAssociationArn }}'
        VpcEndpointAssociationId: '{{ item.VpcEndpointAssociationId }}'
  # ── GetAnalysisReportResults ──
  - discovery_id: aws.networkfirewall.get_analysis_report_results
    for_each: aws.networkfirewall.list_analysis_reports
    calls:
      - action: get_analysis_report_results
        params:
          AnalysisReportId: '{{ item.AnalysisReportId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.AnalysisReportResults }}'
      item:
        Domain: '{{ item.Domain }}'
        FirstAccessed: '{{ item.FirstAccessed }}'
        Hits: '{{ item.Hits }}'
        LastAccessed: '{{ item.LastAccessed }}'
        Protocol: '{{ item.Protocol }}'
        UniqueSources: '{{ item.UniqueSources }}'
  # ── ListFlowOperationResults ──
  - discovery_id: aws.networkfirewall.list_flow_operation_results
