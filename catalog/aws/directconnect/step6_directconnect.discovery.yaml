  - discovery_id: aws.directconnect.describe_connection_loa
    for_each: aws.directconnect.describe_connections
    calls:
      - action: describe_connection_loa
        params:
          connectionId: '{{ item.connectionId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.connections }}'
      item:
        loa: '{{ item.loa }}'
