      - action: describe_customer_metadata
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.agreements }}'
      item:
        agreementName: '{{ item.agreementName }}'
        agreements: '{{ item.agreements }}'
        nniPartnerType: '{{ item.nniPartnerType }}'
        status: '{{ item.status }}'
  # ── DescribeDirectConnectGatewayAssociationProposals ──
  - discovery_id: aws.directconnect.describe_direct_connect_gateway_association_proposals
    calls:
