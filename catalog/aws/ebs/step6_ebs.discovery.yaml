# ============================================================
# Discovery YAML — ebs (AWS)
# Generated: 2026-02-21T04:56:58Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: ebs
services:
  client: ebs
  module: boto3.client
discovery:
  # ── Dependent read operations (require identifiers) ──
  # ── GetSnapshotBlock ──
  - discovery_id: aws.ebs.get_snapshot_block
    calls:
      - action: get_snapshot_block
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        BlockData: '{{ response.BlockData }}'
        Checksum: '{{ response.Checksum }}'
        ChecksumAlgorithm: '{{ response.ChecksumAlgorithm }}'
        DataLength: '{{ response.DataLength }}'
  # ── ListChangedBlocks ──
  - discovery_id: aws.ebs.list_changed_blocks
    calls:
      - action: list_changed_blocks
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ChangedBlocks }}'
  # ── ListSnapshotBlocks ──
  - discovery_id: aws.ebs.list_snapshot_blocks
    calls:
      - action: list_snapshot_blocks
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Blocks }}'
