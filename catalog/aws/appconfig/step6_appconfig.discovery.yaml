# ============================================================
# Discovery YAML — appconfig (AWS)
# Generated: 2026-02-21T04:56:57Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: appconfig
services:
  client: appconfig
  module: boto3.client
discovery:
  # ── GetAccountSettings ──
  - discovery_id: aws.appconfig.get_account_settings
    calls:
      - action: get_account_settings
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.DeletionProtection }}'
      item:
        DeletionProtection: '{{ item.DeletionProtection }}'
        Enabled: '{{ item.Enabled }}'
        ProtectionPeriodInMinutes: '{{ item.ProtectionPeriodInMinutes }}'
  # ── ListApplications ──
  - discovery_id: aws.appconfig.list_applications
    calls:
      - action: list_applications
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Items }}'
      item:
        Id: '{{ item.Id }}'
        Name: '{{ item.Name }}'
        Description: '{{ item.Description }}'
  # ── ListDeploymentStrategies ──
  - discovery_id: aws.appconfig.list_deployment_strategies
    calls:
      - action: list_deployment_strategies
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Items }}'
      item:
        Id: '{{ item.Id }}'
        Name: '{{ item.Name }}'
        DeploymentDurationInMinutes: '{{ item.DeploymentDurationInMinutes }}'
        Description: '{{ item.Description }}'
        FinalBakeTimeInMinutes: '{{ item.FinalBakeTimeInMinutes }}'
        GrowthFactor: '{{ item.GrowthFactor }}'
        GrowthType: '{{ item.GrowthType }}'
        ReplicateTo: '{{ item.ReplicateTo }}'
  # ── ListExtensionAssociations ──
  - discovery_id: aws.appconfig.list_extension_associations
    calls:
      - action: list_extension_associations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Items }}'
      item:
        Id: '{{ item.Id }}'
        ResourceArn: '{{ item.ResourceArn }}'
        ExtensionArn: '{{ item.ExtensionArn }}'
  # ── ListExtensions ──
  - discovery_id: aws.appconfig.list_extensions
    calls:
      - action: list_extensions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Items }}'
      item:
        Arn: '{{ item.Arn }}'
        Id: '{{ item.Id }}'
        Name: '{{ item.Name }}'
        Description: '{{ item.Description }}'
        VersionNumber: '{{ item.VersionNumber }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetApplication ──
  - discovery_id: aws.appconfig.get_application
    calls:
      - action: get_application
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        Id: '{{ response.Id }}'
        Name: '{{ response.Name }}'
        Description: '{{ response.Description }}'
  # ── GetConfiguration ──
  - discovery_id: aws.appconfig.get_configuration
    calls:
      - action: get_configuration
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        ConfigurationVersion: '{{ response.ConfigurationVersion }}'
        Content: '{{ response.Content }}'
        ContentType: '{{ response.ContentType }}'
  # ── GetConfigurationProfile ──
  - discovery_id: aws.appconfig.get_configuration_profile
    calls:
      - action: get_configuration_profile
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Validators }}'
      item:
        Content: '{{ item.Content }}'
        Type: '{{ item.Type }}'
  # ── GetDeployment ──
  - discovery_id: aws.appconfig.get_deployment
    calls:
      - action: get_deployment
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.EventLog }}'
      item:
        ActionInvocations: '{{ item.ActionInvocations }}'
        Description: '{{ item.Description }}'
        EventType: '{{ item.EventType }}'
        OccurredAt: '{{ item.OccurredAt }}'
        TriggeredBy: '{{ item.TriggeredBy }}'
  # ── GetDeploymentStrategy ──
  - discovery_id: aws.appconfig.get_deployment_strategy
    calls:
      - action: get_deployment_strategy
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        Id: '{{ response.Id }}'
        Name: '{{ response.Name }}'
        DeploymentDurationInMinutes: '{{ response.DeploymentDurationInMinutes }}'
        Description: '{{ response.Description }}'
        FinalBakeTimeInMinutes: '{{ response.FinalBakeTimeInMinutes }}'
        GrowthFactor: '{{ response.GrowthFactor }}'
        GrowthType: '{{ response.GrowthType }}'
        ReplicateTo: '{{ response.ReplicateTo }}'
  # ── GetEnvironment ──
  - discovery_id: aws.appconfig.get_environment
    calls:
      - action: get_environment
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Monitors }}'
      item:
        AlarmArn: '{{ item.AlarmArn }}'
        AlarmRoleArn: '{{ item.AlarmRoleArn }}'
  # ── GetExtension ──
  - discovery_id: aws.appconfig.get_extension
    calls:
      - action: get_extension
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        Arn: '{{ response.Arn }}'
        Id: '{{ response.Id }}'
        Name: '{{ response.Name }}'
        Actions: '{{ response.Actions }}'
        Description: '{{ response.Description }}'
        Parameters: '{{ response.Parameters }}'
        VersionNumber: '{{ response.VersionNumber }}'
  # ── GetExtensionAssociation ──
  - discovery_id: aws.appconfig.get_extension_association
    calls:
      - action: get_extension_association
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        Arn: '{{ response.Arn }}'
        Id: '{{ response.Id }}'
        ResourceArn: '{{ response.ResourceArn }}'
        ExtensionArn: '{{ response.ExtensionArn }}'
        ExtensionVersionNumber: '{{ response.ExtensionVersionNumber }}'
        Parameters: '{{ response.Parameters }}'
  # ── GetHostedConfigurationVersion ──
  - discovery_id: aws.appconfig.get_hosted_configuration_version
    for_each: aws.appconfig.list_extensions
    calls:
      - action: get_hosted_configuration_version
        params:
          ApplicationId: '{{ item.ApplicationId }}'
          ConfigurationProfileId: '{{ item.ConfigurationProfileId }}'
          VersionNumber: '{{ item.VersionNumber }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        ApplicationId: '{{ response.ApplicationId }}'
        ConfigurationProfileId: '{{ response.ConfigurationProfileId }}'
        Content: '{{ response.Content }}'
        ContentType: '{{ response.ContentType }}'
        Description: '{{ response.Description }}'
        KmsKeyArn: '{{ response.KmsKeyArn }}'
        VersionLabel: '{{ response.VersionLabel }}'
        VersionNumber: '{{ response.VersionNumber }}'
  # ── ListConfigurationProfiles ──
  - discovery_id: aws.appconfig.list_configuration_profiles
    calls:
      - action: list_configuration_profiles
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Items }}'
      item:
        Id: '{{ item.Id }}'
        Name: '{{ item.Name }}'
        ApplicationId: '{{ item.ApplicationId }}'
        LocationUri: '{{ item.LocationUri }}'
        Type: '{{ item.Type }}'
        ValidatorTypes: '{{ item.ValidatorTypes }}'
  # ── ListDeployments ──
  - discovery_id: aws.appconfig.list_deployments
    calls:
      - action: list_deployments
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Items }}'
      item:
        State: '{{ item.State }}'
        CompletedAt: '{{ item.CompletedAt }}'
        ConfigurationName: '{{ item.ConfigurationName }}'
        ConfigurationVersion: '{{ item.ConfigurationVersion }}'
        DeploymentDurationInMinutes: '{{ item.DeploymentDurationInMinutes }}'
        DeploymentNumber: '{{ item.DeploymentNumber }}'
        FinalBakeTimeInMinutes: '{{ item.FinalBakeTimeInMinutes }}'
        GrowthFactor: '{{ item.GrowthFactor }}'
        GrowthType: '{{ item.GrowthType }}'
        PercentageComplete: '{{ item.PercentageComplete }}'
        StartedAt: '{{ item.StartedAt }}'
        VersionLabel: '{{ item.VersionLabel }}'
  # ── ListEnvironments ──
  - discovery_id: aws.appconfig.list_environments
    calls:
      - action: list_environments
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Items }}'
      item:
        Id: '{{ item.Id }}'
        Name: '{{ item.Name }}'
        State: '{{ item.State }}'
        ApplicationId: '{{ item.ApplicationId }}'
        Description: '{{ item.Description }}'
        Monitors: '{{ item.Monitors }}'
  # ── ListHostedConfigurationVersions ──
  - discovery_id: aws.appconfig.list_hosted_configuration_versions
    calls:
      - action: list_hosted_configuration_versions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Items }}'
      item:
        ApplicationId: '{{ item.ApplicationId }}'
        ConfigurationProfileId: '{{ item.ConfigurationProfileId }}'
        ContentType: '{{ item.ContentType }}'
        Description: '{{ item.Description }}'
        KmsKeyArn: '{{ item.KmsKeyArn }}'
        VersionLabel: '{{ item.VersionLabel }}'
        VersionNumber: '{{ item.VersionNumber }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.appconfig.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        Tags: '{{ response.Tags }}'
