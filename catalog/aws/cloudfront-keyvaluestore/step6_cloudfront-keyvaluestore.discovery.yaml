version: '1.0'
provider: aws
service: cloudfront-keyvaluestore
services:
  client: cloudfront-keyvaluestore
  module: boto3.client
discovery:
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeKeyValueStore ──
  - discovery_id: aws.cloudfront-keyvaluestore.describe_key_value_store
    calls:
      - action: describe_key_value_store
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ItemCount }}'
      item:
        Status: '{{ item.Status }}'
        Created: '{{ item.Created }}'
  # ── GetKey ──
  - discovery_id: aws.cloudfront-keyvaluestore.get_key
    calls:
      - action: get_key
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        ItemCount: '{{ response.ItemCount }}'
        Key: '{{ response.Key }}'
        TotalSizeInBytes: '{{ response.TotalSizeInBytes }}'
        Value: '{{ response.Value }}'
  # ── ListKeys ──
  - discovery_id: aws.cloudfront-keyvaluestore.list_keys
    calls:
      - action: list_keys
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Items }}'
      item:
        Key: '{{ item.Key }}'
        Value: '{{ item.Value }}'
