# ============================================================
# Discovery YAML — sso (AWS)
# Generated: 2026-02-21T04:56:59Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: sso
services:
  client: sso
  module: boto3.client
discovery:
  # ── Dependent read operations (require identifiers) ──
  # ── GetRoleCredentials ──
  - discovery_id: aws.sso.get_role_credentials
    calls:
      - action: get_role_credentials
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.roleCredentials }}'
      item:
        accessKeyId: '{{ item.accessKeyId }}'
        expiration: '{{ item.expiration }}'
        roleCredentials: '{{ item.roleCredentials }}'
        secretAccessKey: '{{ item.secretAccessKey }}'
        sessionToken: '{{ item.sessionToken }}'
  # ── ListAccountRoles ──
  - discovery_id: aws.sso.list_account_roles
    calls:
      - action: list_account_roles
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.roleList }}'
      item:
        accountId: '{{ item.accountId }}'
        roleCredentials: '{{ item.roleCredentials }}'
        roleName: '{{ item.roleName }}'
  # ── ListAccounts ──
  - discovery_id: aws.sso.list_accounts
    calls:
      - action: list_accounts
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.accountList }}'
      item:
        accountId: '{{ item.accountId }}'
        accountName: '{{ item.accountName }}'
        emailAddress: '{{ item.emailAddress }}'
        roleCredentials: '{{ item.roleCredentials }}'
