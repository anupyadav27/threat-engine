# ============================================================
# Discovery YAML — organizations (AWS)
# Generated: 2026-02-21T04:56:59Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: organizations
services:
  client: organizations
  module: boto3.client
discovery:
  # ── DescribeOrganization ──
  - discovery_id: aws.organizations.describe_organization
    calls:
      - action: describe_organization
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Organization }}'
      item:
        Arn: '{{ item.Arn }}'
        Id: '{{ item.Id }}'
        Account: '{{ item.Account }}'
        AvailablePolicyTypes: '{{ item.AvailablePolicyTypes }}'
        FeatureSet: '{{ item.FeatureSet }}'
        MasterAccountArn: '{{ item.MasterAccountArn }}'
        MasterAccountEmail: '{{ item.MasterAccountEmail }}'
        MasterAccountId: '{{ item.MasterAccountId }}'
        Organization: '{{ item.Organization }}'
  # ── DescribeResourcePolicy ──
  - discovery_id: aws.organizations.describe_resource_policy
    calls:
      - action: describe_resource_policy
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ResourcePolicy }}'
      item:
        Content: '{{ item.Content }}'
        ResourcePolicy: '{{ item.ResourcePolicy }}'
        ResourcePolicySummary: '{{ item.ResourcePolicySummary }}'
  # ── ListAWSServiceAccessForOrganization ──
  - discovery_id: aws.organizations.list_aws_service_access_for_organization
    calls:
      - action: list_aws_service_access_for_organization
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.EnabledServicePrincipals }}'
      item:
        DateEnabled: '{{ item.DateEnabled }}'
        ServicePrincipal: '{{ item.ServicePrincipal }}'
  # ── ListAccounts ──
  - discovery_id: aws.organizations.list_accounts
    calls:
      - action: list_accounts
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Accounts }}'
      item:
        Arn: '{{ item.Arn }}'
        Id: '{{ item.Id }}'
        Name: '{{ item.Name }}'
        State: '{{ item.State }}'
        Status: '{{ item.Status }}'
        Email: '{{ item.Email }}'
        JoinedMethod: '{{ item.JoinedMethod }}'
