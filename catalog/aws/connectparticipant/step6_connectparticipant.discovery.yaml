# ============================================================
# Discovery YAML — connectparticipant (AWS)
# Generated: 2026-02-21T04:56:57Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: connectparticipant
services:
  client: connectparticipant
  module: boto3.client
discovery:
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeView ──
  - discovery_id: aws.connectparticipant.describe_view
    calls:
      - action: describe_view
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.View }}'
      item:
        Arn: '{{ item.Arn }}'
        Id: '{{ item.Id }}'
        Name: '{{ item.Name }}'
        Content: '{{ item.Content }}'
        Version: '{{ item.Version }}'
        View: '{{ item.View }}'
  # ── GetAttachment ──
  - discovery_id: aws.connectparticipant.get_attachment
    calls:
      - action: get_attachment
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        AttachmentSizeInBytes: '{{ response.AttachmentSizeInBytes }}'
        Url: '{{ response.Url }}'
        UrlExpiry: '{{ response.UrlExpiry }}'
  # ── GetAuthenticationUrl ──
  - discovery_id: aws.connectparticipant.get_authentication_url
    calls:
      - action: get_authentication_url
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        AuthenticationUrl: '{{ response.AuthenticationUrl }}'
  # ── GetTranscript ──
  - discovery_id: aws.connectparticipant.get_transcript
    calls:
      - action: get_transcript
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Transcript }}'
      item:
        Id: '{{ item.Id }}'
        AbsoluteTime: '{{ item.AbsoluteTime }}'
        Attachments: '{{ item.Attachments }}'
        ContactId: '{{ item.ContactId }}'
        Content: '{{ item.Content }}'
        ContentType: '{{ item.ContentType }}'
        DisplayName: '{{ item.DisplayName }}'
        InitialContactId: '{{ item.InitialContactId }}'
        MessageMetadata: '{{ item.MessageMetadata }}'
        ParticipantId: '{{ item.ParticipantId }}'
        ParticipantRole: '{{ item.ParticipantRole }}'
        RelatedContactId: '{{ item.RelatedContactId }}'
        Transcript: '{{ item.Transcript }}'
        Type: '{{ item.Type }}'
