# ============================================================
# Discovery YAML — controltower (AWS)
# Generated: 2026-02-21T04:56:57Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: controltower
services:
  client: controltower
  module: boto3.client
discovery:
  # ── ListBaselines ──
  - discovery_id: aws.controltower.list_baselines
    calls:
      - action: list_baselines
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.baselines }}'
      item:
        arn: '{{ item.arn }}'
        description: '{{ item.description }}'
        name: '{{ item.name }}'
  # ── ListControlOperations ──
  - discovery_id: aws.controltower.list_control_operations
    calls:
      - action: list_control_operations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.controlOperations }}'
      item:
        controlIdentifier: '{{ item.controlIdentifier }}'
        enabledControlIdentifier: '{{ item.enabledControlIdentifier }}'
        endTime: '{{ item.endTime }}'
        operationIdentifier: '{{ item.operationIdentifier }}'
        operationType: '{{ item.operationType }}'
        startTime: '{{ item.startTime }}'
        status: '{{ item.status }}'
        statusMessage: '{{ item.statusMessage }}'
        targetIdentifier: '{{ item.targetIdentifier }}'
  # ── ListEnabledBaselines ──
  - discovery_id: aws.controltower.list_enabled_baselines
    calls:
      - action: list_enabled_baselines
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.enabledBaselines }}'
      item:
        arn: '{{ item.arn }}'
        baselineIdentifier: '{{ item.baselineIdentifier }}'
        baselineVersion: '{{ item.baselineVersion }}'
        driftStatusSummary: '{{ item.driftStatusSummary }}'
        parentIdentifier: '{{ item.parentIdentifier }}'
        statusSummary: '{{ item.statusSummary }}'
        targetIdentifier: '{{ item.targetIdentifier }}'
  # ── ListEnabledControls ──
  - discovery_id: aws.controltower.list_enabled_controls
    calls:
      - action: list_enabled_controls
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.enabledControls }}'
      item:
        arn: '{{ item.arn }}'
        controlIdentifier: '{{ item.controlIdentifier }}'
        driftStatusSummary: '{{ item.driftStatusSummary }}'
        parentIdentifier: '{{ item.parentIdentifier }}'
        statusSummary: '{{ item.statusSummary }}'
        targetIdentifier: '{{ item.targetIdentifier }}'
  # ── ListLandingZoneOperations ──
  - discovery_id: aws.controltower.list_landing_zone_operations
    calls:
      - action: list_landing_zone_operations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.landingZoneOperations }}'
      item:
        operationIdentifier: '{{ item.operationIdentifier }}'
        operationType: '{{ item.operationType }}'
        status: '{{ item.status }}'
  # ── ListLandingZones ──
  - discovery_id: aws.controltower.list_landing_zones
    calls:
      - action: list_landing_zones
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.landingZones }}'
      item:
        arn: '{{ item.arn }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetBaseline ──
  - discovery_id: aws.controltower.get_baseline
    for_each: aws.controltower.list_enabled_baselines
    calls:
      - action: get_baseline
        params:
          baselineIdentifier: '{{ item.baselineIdentifier }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        arn: '{{ response.arn }}'
        description: '{{ response.description }}'
        name: '{{ response.name }}'
  # ── GetBaselineOperation ──
  - discovery_id: aws.controltower.get_baseline_operation
    for_each: aws.controltower.list_control_operations
    calls:
      - action: get_baseline_operation
        params:
          operationIdentifier: '{{ item.operationIdentifier }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.controlOperations }}'
      item:
        endTime: '{{ item.endTime }}'
        operationIdentifier: '{{ item.operationIdentifier }}'
        operationType: '{{ item.operationType }}'
        startTime: '{{ item.startTime }}'
        status: '{{ item.status }}'
        statusMessage: '{{ item.statusMessage }}'
  # ── GetControlOperation ──
  - discovery_id: aws.controltower.get_control_operation
    for_each: aws.controltower.list_control_operations
    calls:
      - action: get_control_operation
        params:
          operationIdentifier: '{{ item.operationIdentifier }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.controlOperations }}'
      item:
        controlIdentifier: '{{ item.controlIdentifier }}'
        enabledControlIdentifier: '{{ item.enabledControlIdentifier }}'
        endTime: '{{ item.endTime }}'
        operationIdentifier: '{{ item.operationIdentifier }}'
        operationType: '{{ item.operationType }}'
        startTime: '{{ item.startTime }}'
        status: '{{ item.status }}'
        statusMessage: '{{ item.statusMessage }}'
        targetIdentifier: '{{ item.targetIdentifier }}'
  # ── GetEnabledBaseline ──
  - discovery_id: aws.controltower.get_enabled_baseline
    calls:
      - action: get_enabled_baseline
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.baselines }}'
      item:
        arn: '{{ item.arn }}'
        baselineIdentifier: '{{ item.baselineIdentifier }}'
        baselineVersion: '{{ item.baselineVersion }}'
        driftStatusSummary: '{{ item.driftStatusSummary }}'
        parameters: '{{ item.parameters }}'
        parentIdentifier: '{{ item.parentIdentifier }}'
        statusSummary: '{{ item.statusSummary }}'
        targetIdentifier: '{{ item.targetIdentifier }}'
  # ── GetEnabledControl ──
  - discovery_id: aws.controltower.get_enabled_control
    for_each: aws.controltower.list_control_operations
    calls:
      - action: get_enabled_control
        params:
          enabledControlIdentifier: '{{ item.enabledControlIdentifier }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.baselines }}'
      item:
        arn: '{{ item.arn }}'
        controlIdentifier: '{{ item.controlIdentifier }}'
        driftStatusSummary: '{{ item.driftStatusSummary }}'
        enabledControlDetails: '{{ item.enabledControlDetails }}'
        parameters: '{{ item.parameters }}'
        parentIdentifier: '{{ item.parentIdentifier }}'
        statusSummary: '{{ item.statusSummary }}'
        targetIdentifier: '{{ item.targetIdentifier }}'
        targetRegions: '{{ item.targetRegions }}'
  # ── GetLandingZone ──
  - discovery_id: aws.controltower.get_landing_zone
    calls:
      - action: get_landing_zone
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.baselines }}'
      item:
        arn: '{{ item.arn }}'
        driftStatus: '{{ item.driftStatus }}'
        latestAvailableVersion: '{{ item.latestAvailableVersion }}'
        manifest: '{{ item.manifest }}'
        remediationTypes: '{{ item.remediationTypes }}'
        status: '{{ item.status }}'
        version: '{{ item.version }}'
  # ── GetLandingZoneOperation ──
  - discovery_id: aws.controltower.get_landing_zone_operation
    for_each: aws.controltower.list_control_operations
    calls:
      - action: get_landing_zone_operation
        params:
          operationIdentifier: '{{ item.operationIdentifier }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.controlOperations }}'
      item:
        endTime: '{{ item.endTime }}'
        operationIdentifier: '{{ item.operationIdentifier }}'
        operationType: '{{ item.operationType }}'
        startTime: '{{ item.startTime }}'
        status: '{{ item.status }}'
        statusMessage: '{{ item.statusMessage }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.controltower.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        tags: '{{ response.tags }}'
