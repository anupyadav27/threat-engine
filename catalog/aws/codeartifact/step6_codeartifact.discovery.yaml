# ============================================================
# Discovery YAML — codeartifact (AWS)
# Generated: 2026-02-21T04:56:57Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: codeartifact
services:
  client: codeartifact
  module: boto3.client
discovery:
  # ── ListDomains ──
  - discovery_id: aws.codeartifact.list_domains
    calls:
      - action: list_domains
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.domains }}'
      item:
        arn: '{{ item.arn }}'
        createdTime: '{{ item.createdTime }}'
        domain: '{{ item.domain }}'
        encryptionKey: '{{ item.encryptionKey }}'
        name: '{{ item.name }}'
        owner: '{{ item.owner }}'
        status: '{{ item.status }}'
  # ── ListRepositories ──
  - discovery_id: aws.codeartifact.list_repositories
    calls:
      - action: list_repositories
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.repositories }}'
      item:
        administratorAccount: '{{ item.administratorAccount }}'
        arn: '{{ item.arn }}'
        createdTime: '{{ item.createdTime }}'
        description: '{{ item.description }}'
        domainName: '{{ item.domainName }}'
        domainOwner: '{{ item.domainOwner }}'
        name: '{{ item.name }}'
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeDomain ──
  - discovery_id: aws.codeartifact.describe_domain
    calls:
      - action: describe_domain
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.domains }}'
      item:
        arn: '{{ item.arn }}'
        assetSizeBytes: '{{ item.assetSizeBytes }}'
        createdTime: '{{ item.createdTime }}'
        encryptionKey: '{{ item.encryptionKey }}'
        name: '{{ item.name }}'
        owner: '{{ item.owner }}'
        repositoryCount: '{{ item.repositoryCount }}'
        s3BucketArn: '{{ item.s3BucketArn }}'
        status: '{{ item.status }}'
  # ── DescribePackage ──
  - discovery_id: aws.codeartifact.describe_package
    calls:
      - action: describe_package
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.package }}'
      item:
        format: '{{ item.format }}'
        name: '{{ item.name }}'
        namespace: '{{ item.namespace }}'
        originConfiguration: '{{ item.originConfiguration }}'
  # ── DescribePackageGroup ──
  - discovery_id: aws.codeartifact.describe_package_group
