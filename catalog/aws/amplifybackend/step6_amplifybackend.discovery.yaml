# ============================================================
# Discovery YAML — amplifybackend (AWS)
# Generated: 2026-02-21T04:56:57Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: amplifybackend
services:
  client: amplifybackend
  module: boto3.client
discovery:
  # ── ListS3Buckets ──
  - discovery_id: aws.amplifybackend.list_s3_buckets
    calls:
      - action: list_s3_buckets
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Buckets }}'
      item:
        CreationDate: '{{ item.CreationDate }}'
        Name: '{{ item.Name }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetBackend ──
  - discovery_id: aws.amplifybackend.get_backend
    calls:
      - action: get_backend
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.BackendEnvironmentList }}'
  # ── GetBackendAPI ──
  - discovery_id: aws.amplifybackend.get_backend_api
    calls:
      - action: get_backend_api
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ResourceConfig }}'
      item:
        AdditionalAuthTypes: '{{ item.AdditionalAuthTypes }}'
        ApiName: '{{ item.ApiName }}'
        ConflictResolution: '{{ item.ConflictResolution }}'
        DefaultAuthType: '{{ item.DefaultAuthType }}'
        Service: '{{ item.Service }}'
        TransformSchema: '{{ item.TransformSchema }}'
  # ── GetBackendAPIModels ──
  - discovery_id: aws.amplifybackend.get_backend_api_models
    calls:
      - action: get_backend_api_models
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Models }}'
      item:
        Models: '{{ item.Models }}'
  # ── GetBackendAuth ──
  - discovery_id: aws.amplifybackend.get_backend_auth
    calls:
      - action: get_backend_auth
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ResourceConfig }}'
      item:
        AuthResources: '{{ item.AuthResources }}'
        IdentityPoolConfigs: '{{ item.IdentityPoolConfigs }}'
        Service: '{{ item.Service }}'
        UserPoolConfigs: '{{ item.UserPoolConfigs }}'
  # ── GetBackendJob ──
  - discovery_id: aws.amplifybackend.get_backend_job
    calls:
      - action: get_backend_job
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        CreateTime: '{{ response.CreateTime }}'
        Status: '{{ response.Status }}'
        AppId: '{{ response.AppId }}'
        BackendEnvironmentName: '{{ response.BackendEnvironmentName }}'
        Error: '{{ response.Error }}'
        JobId: '{{ response.JobId }}'
        Operation: '{{ response.Operation }}'
        UpdateTime: '{{ response.UpdateTime }}'
  # ── GetBackendStorage ──
  - discovery_id: aws.amplifybackend.get_backend_storage
    calls:
      - action: get_backend_storage
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ResourceConfig }}'
      item:
        BucketName: '{{ item.BucketName }}'
        Imported: '{{ item.Imported }}'
        Permissions: '{{ item.Permissions }}'
        ServiceName: '{{ item.ServiceName }}'
  # ── GetToken ──
  - discovery_id: aws.amplifybackend.get_token
    calls:
      - action: get_token
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        AppId: '{{ response.AppId }}'
        ChallengeCode: '{{ response.ChallengeCode }}'
        SessionId: '{{ response.SessionId }}'
        Ttl: '{{ response.Ttl }}'
  # ── ListBackendJobs ──
  - discovery_id: aws.amplifybackend.list_backend_jobs
    calls:
      - action: list_backend_jobs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Jobs }}'
      item:
        CreateTime: '{{ item.CreateTime }}'
        Status: '{{ item.Status }}'
        AppId: '{{ item.AppId }}'
        BackendEnvironmentName: '{{ item.BackendEnvironmentName }}'
        Error: '{{ item.Error }}'
        JobId: '{{ item.JobId }}'
        Operation: '{{ item.Operation }}'
        UpdateTime: '{{ item.UpdateTime }}'
