# ============================================================
# Discovery YAML — appfabric (AWS)
# Generated: 2026-02-21T04:56:57Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: appfabric
services:
  client: appfabric
  module: boto3.client
discovery:
  # ── ListAppBundles ──
  - discovery_id: aws.appfabric.list_app_bundles
    calls:
      - action: list_app_bundles
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.appBundleSummaryList }}'
      item:
        appBundle: '{{ item.appBundle }}'
        arn: '{{ item.arn }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetAppAuthorization ──
  - discovery_id: aws.appfabric.get_app_authorization
    calls:
      - action: get_app_authorization
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.appAuthorization }}'
      item:
        app: '{{ item.app }}'
        appAuthorizationArn: '{{ item.appAuthorizationArn }}'
        appBundleArn: '{{ item.appBundleArn }}'
        authType: '{{ item.authType }}'
        authUrl: '{{ item.authUrl }}'
        createdAt: '{{ item.createdAt }}'
        persona: '{{ item.persona }}'
        status: '{{ item.status }}'
        tenant: '{{ item.tenant }}'
        updatedAt: '{{ item.updatedAt }}'
  # ── GetAppBundle ──
  - discovery_id: aws.appfabric.get_app_bundle
    calls:
      - action: get_app_bundle
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.appBundleSummaryList }}'
      item:
        arn: '{{ item.arn }}'
        customerManagedKeyArn: '{{ item.customerManagedKeyArn }}'
  # ── GetIngestion ──
  - discovery_id: aws.appfabric.get_ingestion
    calls:
      - action: get_ingestion
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.appAuthorization }}'
      item:
        app: '{{ item.app }}'
        appBundleArn: '{{ item.appBundleArn }}'
        arn: '{{ item.arn }}'
        createdAt: '{{ item.createdAt }}'
        ingestionType: '{{ item.ingestionType }}'
        state: '{{ item.state }}'
        tenantId: '{{ item.tenantId }}'
        updatedAt: '{{ item.updatedAt }}'
  # ── GetIngestionDestination ──
  - discovery_id: aws.appfabric.get_ingestion_destination
    calls:
      - action: get_ingestion_destination
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.appBundleSummaryList }}'
      item:
        arn: '{{ item.arn }}'
        createdAt: '{{ item.createdAt }}'
        destinationConfiguration: '{{ item.destinationConfiguration }}'
        ingestionArn: '{{ item.ingestionArn }}'
        processingConfiguration: '{{ item.processingConfiguration }}'
        status: '{{ item.status }}'
        statusReason: '{{ item.statusReason }}'
        updatedAt: '{{ item.updatedAt }}'
  # ── ListAppAuthorizations ──
  - discovery_id: aws.appfabric.list_app_authorizations
    calls:
      - action: list_app_authorizations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.appAuthorizationSummaryList }}'
      item:
        app: '{{ item.app }}'
        appAuthorizationArn: '{{ item.appAuthorizationArn }}'
        appBundleArn: '{{ item.appBundleArn }}'
        status: '{{ item.status }}'
        tenant: '{{ item.tenant }}'
        updatedAt: '{{ item.updatedAt }}'
  # ── ListIngestionDestinations ──
  - discovery_id: aws.appfabric.list_ingestion_destinations
    calls:
      - action: list_ingestion_destinations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ingestionDestinations }}'
      item:
        arn: '{{ item.arn }}'
  # ── ListIngestions ──
  - discovery_id: aws.appfabric.list_ingestions
    calls:
      - action: list_ingestions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ingestions }}'
      item:
        app: '{{ item.app }}'
        arn: '{{ item.arn }}'
        state: '{{ item.state }}'
        tenantId: '{{ item.tenantId }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.appfabric.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.tags }}'
      item:
        key: '{{ item.key }}'
        value: '{{ item.value }}'
