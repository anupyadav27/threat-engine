# ============================================================
# Discovery YAML — connectcases (AWS)
# Generated: 2026-02-21T04:56:57Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: connectcases
services:
  client: connectcases
  module: boto3.client
discovery:
  # ── ListDomains ──
  - discovery_id: aws.connectcases.list_domains
    calls:
      - action: list_domains
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.domains }}'
      item:
        active: '{{ item.active }}'
        auditEvents: '{{ item.auditEvents }}'
        basic: '{{ item.basic }}'
        caseRuleArn: '{{ item.caseRuleArn }}'
        caseRuleId: '{{ item.caseRuleId }}'
        description: '{{ item.description }}'
        domainArn: '{{ item.domainArn }}'
        domainId: '{{ item.domainId }}'
        domainStatus: '{{ item.domainStatus }}'
        enabled: '{{ item.enabled }}'
        eventBridge: '{{ item.eventBridge }}'
        eventId: '{{ item.eventId }}'
        id: '{{ item.id }}'
        includedData: '{{ item.includedData }}'
        layoutConfiguration: '{{ item.layoutConfiguration }}'
        name: '{{ item.name }}'
        namespace: '{{ item.namespace }}'
        performedTime: '{{ item.performedTime }}'
        relatedItemType: '{{ item.relatedItemType }}'
        requiredFields: '{{ item.requiredFields }}'
        ruleType: '{{ item.ruleType }}'
        rules: '{{ item.rules }}'
        status: '{{ item.status }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetCase ──
  - discovery_id: aws.connectcases.get_case
    for_each: aws.connectcases.list_domains
    calls:
      - action: get_case
        params:
          caseId: '{{ item.caseId }}'
          domainId: '{{ item.domainId }}'
          fields: '{{ item.fields }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.fields }}'
      item:
        value: '{{ item.value }}'
  # ── GetCaseAuditEvents ──
  - discovery_id: aws.connectcases.get_case_audit_events
    for_each: aws.connectcases.list_domains
    calls:
      - action: get_case_audit_events
        params:
          caseId: '{{ item.caseId }}'
          domainId: '{{ item.domainId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.auditEvents }}'
      item:
        auditEvents: '{{ item.auditEvents }}'
        eventId: '{{ item.eventId }}'
        performedTime: '{{ item.performedTime }}'
        relatedItemType: '{{ item.relatedItemType }}'
  # ── GetCaseEventConfiguration ──
  - discovery_id: aws.connectcases.get_case_event_configuration
    for_each: aws.connectcases.list_domains
    calls:
      - action: get_case_event_configuration
        params:
          domainId: '{{ item.domainId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.eventBridge }}'
      item:
        enabled: '{{ item.enabled }}'
        eventBridge: '{{ item.eventBridge }}'
        includedData: '{{ item.includedData }}'
  # ── GetDomain ──
  - discovery_id: aws.connectcases.get_domain
    for_each: aws.connectcases.list_domains
    calls:
      - action: get_domain
        params:
          domainId: '{{ item.domainId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.domains }}'
      item:
        domainStatus: '{{ item.domainStatus }}'
  # ── GetLayout ──
  - discovery_id: aws.connectcases.get_layout
    for_each: aws.connectcases.list_domains
    calls:
      - action: get_layout
        params:
          domainId: '{{ item.domainId }}'
          layoutId: '{{ item.layoutId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.content }}'
      item:
        basic: '{{ item.basic }}'
  # ── GetTemplate ──
  - discovery_id: aws.connectcases.get_template
    for_each: aws.connectcases.list_domains
    calls:
      - action: get_template
        params:
          domainId: '{{ item.domainId }}'
          templateId: '{{ item.templateId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.requiredFields }}'
      item:
        Status: '{{ item.Status }}'
        Enabled: '{{ item.Enabled }}'
        fieldId: '{{ item.fieldId }}'
        layoutConfiguration: '{{ item.layoutConfiguration }}'
        requiredFields: '{{ item.requiredFields }}'
        rules: '{{ item.rules }}'
  # ── ListCaseRules ──
  - discovery_id: aws.connectcases.list_case_rules
    for_each: aws.connectcases.list_domains
    calls:
      - action: list_case_rules
        params:
          domainId: '{{ item.domainId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.caseRules }}'
      item:
        caseRuleArn: '{{ item.caseRuleArn }}'
        caseRuleId: '{{ item.caseRuleId }}'
        description: '{{ item.description }}'
        name: '{{ item.name }}'
        ruleType: '{{ item.ruleType }}'
  # ── ListCasesForContact ──
  - discovery_id: aws.connectcases.list_cases_for_contact
    for_each: aws.connectcases.list_domains
    calls:
      - action: list_cases_for_contact
        params:
          domainId: '{{ item.domainId }}'
          contactArn: '{{ item.contactArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.cases }}'
      item:
        auditEvents: '{{ item.auditEvents }}'
        eventId: '{{ item.eventId }}'
        layoutConfiguration: '{{ item.layoutConfiguration }}'
        performedTime: '{{ item.performedTime }}'
        relatedItemType: '{{ item.relatedItemType }}'
        requiredFields: '{{ item.requiredFields }}'
        rules: '{{ item.rules }}'
  # ── ListFieldOptions ──
  - discovery_id: aws.connectcases.list_field_options
    for_each: aws.connectcases.list_domains
    calls:
      - action: list_field_options
        params:
          domainId: '{{ item.domainId }}'
          fieldId: '{{ item.fieldId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.options }}'
      item:
        active: '{{ item.active }}'
        name: '{{ item.name }}'
        value: '{{ item.value }}'
  # ── ListFields ──
  - discovery_id: aws.connectcases.list_fields
    for_each: aws.connectcases.list_domains
    calls:
      - action: list_fields
        params:
          domainId: '{{ item.domainId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.fields }}'
      item:
        active: '{{ item.active }}'
        fieldArn: '{{ item.fieldArn }}'
        fieldId: '{{ item.fieldId }}'
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        namespace: '{{ item.namespace }}'
  # ── ListLayouts ──
  - discovery_id: aws.connectcases.list_layouts
    for_each: aws.connectcases.list_domains
    calls:
      - action: list_layouts
        params:
          domainId: '{{ item.domainId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.layouts }}'
      item:
        basic: '{{ item.basic }}'
        layoutArn: '{{ item.layoutArn }}'
        layoutId: '{{ item.layoutId }}'
        name: '{{ item.name }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.connectcases.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        tags: '{{ response.tags }}'
  # ── ListTemplates ──
  - discovery_id: aws.connectcases.list_templates
    for_each: aws.connectcases.list_domains
    calls:
      - action: list_templates
        params:
          domainId: '{{ item.domainId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.templates }}'
      item:
        layoutConfiguration: '{{ item.layoutConfiguration }}'
        name: '{{ item.name }}'
        requiredFields: '{{ item.requiredFields }}'
        rules: '{{ item.rules }}'
        status: '{{ item.status }}'
        templateArn: '{{ item.templateArn }}'
  # ── SearchAllRelatedItems ──
  - discovery_id: aws.connectcases.search_all_related_items
    for_each: aws.connectcases.list_domains
    calls:
      - action: search_all_related_items
        params:
          domainId: '{{ item.domainId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.relatedItems }}'
  # ── SearchCases ──
  - discovery_id: aws.connectcases.search_cases
    for_each: aws.connectcases.list_domains
    calls:
      - action: search_cases
        params:
          domainId: '{{ item.domainId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.cases }}'
  # ── SearchRelatedItems ──
  - discovery_id: aws.connectcases.search_related_items
    for_each: aws.connectcases.list_domains
    calls:
      - action: search_related_items
        params:
          domainId: '{{ item.domainId }}'
          caseId: '{{ item.caseId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.relatedItems }}'
