version: '1.0'
provider: aws
service: resource-explorer-2
is_active: false
services:
  client: resource-explorer-2
  module: boto3.client
discovery:
- discovery_id: aws.resource-explorer-2.get_account_level_service_configuration
  calls:
  - action: get_account_level_service_configuration
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.OrgConfiguration }}'
    item:
      Status: '{{ item.Status }}'
      AWSServiceAccessStatus: '{{ item.AWSServiceAccessStatus }}'
      Enabled: '{{ item.Enabled }}'
      OrgConfiguration: '{{ item.OrgConfiguration }}'
      ServiceLinkedRole: '{{ item.ServiceLinkedRole }}'
- discovery_id: aws.resource-explorer-2.get_default_view
  calls:
  - action: get_default_view
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      ViewArn: '{{ response.ViewArn }}'
- discovery_id: aws.resource-explorer-2.get_index
  calls:
  - action: get_index
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ReplicatingFrom }}'
    item:
      Tags: '{{ item.Tags }}'
      ReplicatingFrom: '{{ item.ReplicatingFrom }}'
      ReplicatingTo: '{{ item.ReplicatingTo }}'
- discovery_id: aws.resource-explorer-2.get_service_index
  calls:
  - action: get_service_index
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      Arn: '{{ response.Arn }}'
      Type: '{{ response.Type }}'
- discovery_id: aws.resource-explorer-2.list_indexes
  calls:
  - action: list_indexes
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Indexes }}'
    item:
      Tags: '{{ item.Tags }}'
      ReplicatingFrom: '{{ item.ReplicatingFrom }}'
      ReplicatingTo: '{{ item.ReplicatingTo }}'
      Type: '{{ item.Type }}'
- discovery_id: aws.resource-explorer-2.list_managed_views
  calls:
  - action: list_managed_views
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ManagedViews }}'
- discovery_id: aws.resource-explorer-2.list_resources
  calls:
  - action: list_resources
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Resources }}'
- discovery_id: aws.resource-explorer-2.list_service_indexes
  calls:
  - action: list_service_indexes
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Indexes }}'
    item:
      Type: '{{ item.Type }}'
- discovery_id: aws.resource-explorer-2.list_service_views
  calls:
  - action: list_service_views
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ServiceViews }}'
- discovery_id: aws.resource-explorer-2.list_streaming_access_for_services
  calls:
  - action: list_streaming_access_for_services
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.StreamingAccessForServices }}'
    item:
      CreatedAt: '{{ item.CreatedAt }}'
      ServicePrincipal: '{{ item.ServicePrincipal }}'
- discovery_id: aws.resource-explorer-2.list_views
  calls:
  - action: list_views
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Views }}'
- discovery_id: aws.resource-explorer-2.get_managed_view
  calls:
  - action: get_managed_view
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ManagedView }}'
    item:
      Filters: '{{ item.Filters }}'
      IncludedProperties: '{{ item.IncludedProperties }}'
      LastUpdatedAt: '{{ item.LastUpdatedAt }}'
      ManagedViewArn: '{{ item.ManagedViewArn }}'
      ManagedViewName: '{{ item.ManagedViewName }}'
      Owner: '{{ item.Owner }}'
      ResourcePolicy: '{{ item.ResourcePolicy }}'
      Scope: '{{ item.Scope }}'
      Statement: '{{ item.Statement }}'
      TrustedService: '{{ item.TrustedService }}'
      Version: '{{ item.Version }}'
- discovery_id: aws.resource-explorer-2.get_resource_explorer_setup
  calls:
  - action: get_resource_explorer_setup
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Regions }}'
    item:
      Index: '{{ item.Index }}'
      View: '{{ item.View }}'
- discovery_id: aws.resource-explorer-2.get_service_view
  calls:
  - action: get_service_view
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ManagedView }}'
    item:
      Filters: '{{ item.Filters }}'
      IncludedProperties: '{{ item.IncludedProperties }}'
      ScopeType: '{{ item.ScopeType }}'
      ServiceViewArn: '{{ item.ServiceViewArn }}'
      StreamingAccessForService: '{{ item.StreamingAccessForService }}'
- discovery_id: aws.resource-explorer-2.get_view
  for_each: aws.resource-explorer-2.get_default_view
  calls:
  - action: get_view
    params:
      ViewArn: '{{ item.ViewArn }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ManagedView }}'
    item:
      Filters: '{{ item.Filters }}'
      IncludedProperties: '{{ item.IncludedProperties }}'
      LastUpdatedAt: '{{ item.LastUpdatedAt }}'
      Owner: '{{ item.Owner }}'
      Scope: '{{ item.Scope }}'
      ViewArn: '{{ item.ViewArn }}'
- discovery_id: aws.resource-explorer-2.list_indexes_for_members
  calls:
  - action: list_indexes_for_members
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Indexes }}'
    item:
      AccountId: '{{ item.AccountId }}'
      Type: '{{ item.Type }}'
- discovery_id: aws.resource-explorer-2.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
  emit:
    as: item
    item:
      Tags: '{{ response.Tags }}'
- discovery_id: aws.resource-explorer-2.search
  calls:
  - action: search
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Resources }}'
