# ============================================================
# Discovery YAML — geo-maps (AWS)
# Generated: 2026-02-21T04:56:58Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: geo-maps
services:
  client: geo-maps
  module: boto3.client
discovery:
  # ── Dependent read operations (require identifiers) ──
  # ── GetGlyphs ──
  - discovery_id: aws.geo-maps.get_glyphs
    calls:
      - action: get_glyphs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Blob }}'
      item:
        Blob: '{{ item.Blob }}'
  # ── GetSprites ──
  - discovery_id: aws.geo-maps.get_sprites
    calls:
      - action: get_sprites
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        Blob: '{{ response.Blob }}'
        CacheControl: '{{ response.CacheControl }}'
        ContentType: '{{ response.ContentType }}'
        ETag: '{{ response.ETag }}'
  # ── GetStaticMap ──
  - discovery_id: aws.geo-maps.get_static_map
    calls:
      - action: get_static_map
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        Blob: '{{ response.Blob }}'
        CacheControl: '{{ response.CacheControl }}'
        ContentType: '{{ response.ContentType }}'
        ETag: '{{ response.ETag }}'
        PricingBucket: '{{ response.PricingBucket }}'
  # ── GetStyleDescriptor ──
  - discovery_id: aws.geo-maps.get_style_descriptor
    calls:
      - action: get_style_descriptor
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        Blob: '{{ response.Blob }}'
        CacheControl: '{{ response.CacheControl }}'
        ContentType: '{{ response.ContentType }}'
        ETag: '{{ response.ETag }}'
  # ── GetTile ──
  - discovery_id: aws.geo-maps.get_tile
    calls:
      - action: get_tile
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        Blob: '{{ response.Blob }}'
        CacheControl: '{{ response.CacheControl }}'
        ContentType: '{{ response.ContentType }}'
        ETag: '{{ response.ETag }}'
        PricingBucket: '{{ response.PricingBucket }}'
