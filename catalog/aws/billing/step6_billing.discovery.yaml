# ============================================================
# Discovery YAML — billing (AWS)
# Generated: 2026-02-21T04:56:57Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: billing
services:
  client: billing
  module: boto3.client
discovery:
  # ── ListBillingViews ──
  - discovery_id: aws.billing.list_billing_views
    calls:
      - action: list_billing_views
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.billingViews }}'
      item:
        arn: '{{ item.arn }}'
        billingView: '{{ item.billingView }}'
        billingViewType: '{{ item.billingViewType }}'
        createdAt: '{{ item.createdAt }}'
        dataFilterExpression: '{{ item.dataFilterExpression }}'
        derivedViewCount: '{{ item.derivedViewCount }}'
        description: '{{ item.description }}'
        healthStatus: '{{ item.healthStatus }}'
        name: '{{ item.name }}'
        ownerAccountId: '{{ item.ownerAccountId }}'
        sourceAccountId: '{{ item.sourceAccountId }}'
        sourceViewCount: '{{ item.sourceViewCount }}'
        updatedAt: '{{ item.updatedAt }}'
        viewDefinitionLastUpdatedAt: '{{ item.viewDefinitionLastUpdatedAt }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetBillingView ──
  - discovery_id: aws.billing.get_billing_view
    for_each: aws.billing.list_billing_views
    calls:
      - action: get_billing_view
        params:
          arn: '{{ item.arn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.billingViews }}'
      item:
        arn: '{{ item.arn }}'
        billingView: '{{ item.billingView }}'
        billingViewType: '{{ item.billingViewType }}'
        createdAt: '{{ item.createdAt }}'
        dataFilterExpression: '{{ item.dataFilterExpression }}'
        derivedViewCount: '{{ item.derivedViewCount }}'
        description: '{{ item.description }}'
        healthStatus: '{{ item.healthStatus }}'
        name: '{{ item.name }}'
        ownerAccountId: '{{ item.ownerAccountId }}'
        sourceAccountId: '{{ item.sourceAccountId }}'
        sourceViewCount: '{{ item.sourceViewCount }}'
        updatedAt: '{{ item.updatedAt }}'
        viewDefinitionLastUpdatedAt: '{{ item.viewDefinitionLastUpdatedAt }}'
  # ── GetResourcePolicy ──
  - discovery_id: aws.billing.get_resource_policy
    calls:
      - action: get_resource_policy
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.policy }}'
      item:
        Statement: '{{ item.Statement }}'
        Version: '{{ item.Version }}'
  # ── ListSourceViewsForBillingView ──
  - discovery_id: aws.billing.list_source_views_for_billing_view
    calls:
      - action: list_source_views_for_billing_view
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.sourceViews }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.billing.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.resourceTags }}'
      item:
        key: '{{ item.key }}'
        value: '{{ item.value }}'
