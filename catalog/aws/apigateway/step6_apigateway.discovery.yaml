  - discovery_id: aws.apigateway.get_account
    calls:
      - action: get_account
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.features }}'
      item:
        DestinationArn: '{{ item.DestinationArn }}'
        Enabled: '{{ item.Enabled }}'
        Format: '{{ item.Format }}'
        Level: '{{ item.Level }}'
        apiKeyVersion: '{{ item.apiKeyVersion }}'
        cloudwatchRoleArn: '{{ item.cloudwatchRoleArn }}'
        features: '{{ item.features }}'
        throttleSettings: '{{ item.throttleSettings }}'
  # ── GetApiKeys ──
  - discovery_id: aws.apigateway.get_api_keys
