# ============================================================
# Discovery YAML — drs (AWS)
# Generated: 2026-02-21T04:56:58Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: drs
services:
  client: drs
  module: boto3.client
discovery:
  # ── DescribeJobs ──
  - discovery_id: aws.drs.describe_jobs
    calls:
      - action: describe_jobs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        arn: '{{ item.arn }}'
        creationDateTime: '{{ item.creationDateTime }}'
        endDateTime: '{{ item.endDateTime }}'
        event: '{{ item.event }}'
        initiatedBy: '{{ item.initiatedBy }}'
        items: '{{ item.items }}'
        jobID: '{{ item.jobID }}'
        logDateTime: '{{ item.logDateTime }}'
        participatingResources: '{{ item.participatingResources }}'
        participatingServers: '{{ item.participatingServers }}'
        status: '{{ item.status }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
  # ── DescribeLaunchConfigurationTemplates ──
  - discovery_id: aws.drs.describe_launch_configuration_templates
    calls:
      - action: describe_launch_configuration_templates
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        arn: '{{ item.arn }}'
        copyPrivateIp: '{{ item.copyPrivateIp }}'
        copyTags: '{{ item.copyTags }}'
        ec2LaunchTemplateID: '{{ item.ec2LaunchTemplateID }}'
        exportBucketArn: '{{ item.exportBucketArn }}'
        launchConfigurationTemplateID: '{{ item.launchConfigurationTemplateID }}'
        launchDisposition: '{{ item.launchDisposition }}'
        launchIntoSourceInstance: '{{ item.launchIntoSourceInstance }}'
        licensing: '{{ item.licensing }}'
        postLaunchEnabled: '{{ item.postLaunchEnabled }}'
        tags: '{{ item.tags }}'
        targetInstanceTypeRightSizingMethod: '{{ item.targetInstanceTypeRightSizingMethod }}'
  # ── DescribeRecoveryInstances ──
  - discovery_id: aws.drs.describe_recovery_instances
    calls:
      - action: describe_recovery_instances
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        agentVersion: '{{ item.agentVersion }}'
        arn: '{{ item.arn }}'
        dataReplicationInfo: '{{ item.dataReplicationInfo }}'
        ec2InstanceID: '{{ item.ec2InstanceID }}'
        ec2InstanceState: '{{ item.ec2InstanceState }}'
        failback: '{{ item.failback }}'
        isDrill: '{{ item.isDrill }}'
        jobID: '{{ item.jobID }}'
        launchIntoInstanceProperties: '{{ item.launchIntoInstanceProperties }}'
        originAvailabilityZone: '{{ item.originAvailabilityZone }}'
        originEnvironment: '{{ item.originEnvironment }}'
        pointInTimeSnapshotDateTime: '{{ item.pointInTimeSnapshotDateTime }}'
        recoveryInstanceID: '{{ item.recoveryInstanceID }}'
        recoveryInstanceProperties: '{{ item.recoveryInstanceProperties }}'
        sourceOutpostArn: '{{ item.sourceOutpostArn }}'
        sourceServerID: '{{ item.sourceServerID }}'
        tags: '{{ item.tags }}'
  # ── DescribeReplicationConfigurationTemplates ──
  - discovery_id: aws.drs.describe_replication_configuration_templates
    calls:
      - action: describe_replication_configuration_templates
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        Statement: '{{ item.Statement }}'
        Version: '{{ item.Version }}'
        arn: '{{ item.arn }}'
        associateDefaultSecurityGroup: '{{ item.associateDefaultSecurityGroup }}'
        autoReplicateNewDisks: '{{ item.autoReplicateNewDisks }}'
        bandwidthThrottling: '{{ item.bandwidthThrottling }}'
        createPublicIP: '{{ item.createPublicIP }}'
        dataPlaneRouting: '{{ item.dataPlaneRouting }}'
        defaultLargeStagingDiskType: '{{ item.defaultLargeStagingDiskType }}'
        ebsEncryption: '{{ item.ebsEncryption }}'
        ebsEncryptionKeyArn: '{{ item.ebsEncryptionKeyArn }}'
        pitPolicy: '{{ item.pitPolicy }}'
        replicationConfigurationTemplateID: '{{ item.replicationConfigurationTemplateID }}'
        replicationServerInstanceType: '{{ item.replicationServerInstanceType }}'
        replicationServersSecurityGroupsIDs: '{{ item.replicationServersSecurityGroupsIDs }}'
        stagingAreaSubnetId: '{{ item.stagingAreaSubnetId }}'
        stagingAreaTags: '{{ item.stagingAreaTags }}'
        tags: '{{ item.tags }}'
        useDedicatedReplicationServer: '{{ item.useDedicatedReplicationServer }}'
  # ── DescribeSourceNetworks ──
  - discovery_id: aws.drs.describe_source_networks
    calls:
      - action: describe_source_networks
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        arn: '{{ item.arn }}'
        cfnStackName: '{{ item.cfnStackName }}'
        lastRecovery: '{{ item.lastRecovery }}'
        launchedVpcID: '{{ item.launchedVpcID }}'
        replicationStatus: '{{ item.replicationStatus }}'
        replicationStatusDetails: '{{ item.replicationStatusDetails }}'
        sourceAccountID: '{{ item.sourceAccountID }}'
        sourceNetworkID: '{{ item.sourceNetworkID }}'
        sourceRegion: '{{ item.sourceRegion }}'
        sourceVpcID: '{{ item.sourceVpcID }}'
        tags: '{{ item.tags }}'
  # ── DescribeSourceServers ──
  - discovery_id: aws.drs.describe_source_servers
    calls:
      - action: describe_source_servers
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        agentVersion: '{{ item.agentVersion }}'
        arn: '{{ item.arn }}'
        dataReplicationInfo: '{{ item.dataReplicationInfo }}'
        lastLaunchResult: '{{ item.lastLaunchResult }}'
        lifeCycle: '{{ item.lifeCycle }}'
        recoveryInstanceId: '{{ item.recoveryInstanceId }}'
        replicationDirection: '{{ item.replicationDirection }}'
        reversedDirectionSourceServerArn: '{{ item.reversedDirectionSourceServerArn }}'
        sourceCloudProperties: '{{ item.sourceCloudProperties }}'
        sourceNetworkID: '{{ item.sourceNetworkID }}'
        sourceProperties: '{{ item.sourceProperties }}'
        sourceServerID: '{{ item.sourceServerID }}'
        stagingArea: '{{ item.stagingArea }}'
        tags: '{{ item.tags }}'
  # ── ListStagingAccounts ──
  - discovery_id: aws.drs.list_staging_accounts
    calls:
      - action: list_staging_accounts
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.accounts }}'
      item:
        accountID: '{{ item.accountID }}'
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeJobLogItems ──
  - discovery_id: aws.drs.describe_job_log_items
    for_each: aws.drs.describe_jobs
    calls:
      - action: describe_job_log_items
        params:
          jobID: '{{ item.jobID }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        event: '{{ item.event }}'
        eventData: '{{ item.eventData }}'
        logDateTime: '{{ item.logDateTime }}'
  # ── DescribeRecoverySnapshots ──
  - discovery_id: aws.drs.describe_recovery_snapshots
    for_each: aws.drs.describe_recovery_instances
    calls:
      - action: describe_recovery_snapshots
        params:
          sourceServerID: '{{ item.sourceServerID }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        ebsSnapshots: '{{ item.ebsSnapshots }}'
        expectedTimestamp: '{{ item.expectedTimestamp }}'
        snapshotID: '{{ item.snapshotID }}'
        sourceServerID: '{{ item.sourceServerID }}'
        timestamp: '{{ item.timestamp }}'
  # ── GetFailbackReplicationConfiguration ──
  - discovery_id: aws.drs.get_failback_replication_configuration
    for_each: aws.drs.describe_recovery_instances
    calls:
      - action: get_failback_replication_configuration
        params:
          recoveryInstanceID: '{{ item.recoveryInstanceID }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        bandwidthThrottling: '{{ response.bandwidthThrottling }}'
        name: '{{ response.name }}'
        recoveryInstanceID: '{{ response.recoveryInstanceID }}'
        usePrivateIP: '{{ response.usePrivateIP }}'
  # ── GetLaunchConfiguration ──
  - discovery_id: aws.drs.get_launch_configuration
    for_each: aws.drs.describe_recovery_instances
    calls:
      - action: get_launch_configuration
        params:
          sourceServerID: '{{ item.sourceServerID }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        ec2LaunchTemplateID: '{{ item.ec2LaunchTemplateID }}'
        launchIntoEC2InstanceID: '{{ item.launchIntoEC2InstanceID }}'
        launchIntoInstanceProperties: '{{ item.launchIntoInstanceProperties }}'
  # ── GetReplicationConfiguration ──
  - discovery_id: aws.drs.get_replication_configuration
    for_each: aws.drs.describe_recovery_instances
    calls:
      - action: get_replication_configuration
        params:
          sourceServerID: '{{ item.sourceServerID }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.pitPolicy }}'
      item:
        enabled: '{{ item.enabled }}'
        interval: '{{ item.interval }}'
        retentionDuration: '{{ item.retentionDuration }}'
        ruleID: '{{ item.ruleID }}'
        units: '{{ item.units }}'
  # ── ListExtensibleSourceServers ──
  - discovery_id: aws.drs.list_extensible_source_servers
    calls:
      - action: list_extensible_source_servers
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        arn: '{{ item.arn }}'
        hostname: '{{ item.hostname }}'
        tags: '{{ item.tags }}'
  # ── ListLaunchActions ──
  - discovery_id: aws.drs.list_launch_actions
    calls:
      - action: list_launch_actions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        actionCode: '{{ item.actionCode }}'
        actionId: '{{ item.actionId }}'
        actionVersion: '{{ item.actionVersion }}'
        active: '{{ item.active }}'
        category: '{{ item.category }}'
        description: '{{ item.description }}'
        name: '{{ item.name }}'
        optional: '{{ item.optional }}'
        order: '{{ item.order }}'
        parameters: '{{ item.parameters }}'
        type: '{{ item.type }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.drs.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        tags: '{{ response.tags }}'
