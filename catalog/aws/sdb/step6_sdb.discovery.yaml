# ============================================================
# Discovery YAML — sdb (AWS)
# Generated: 2026-02-21T04:56:59Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: sdb
services:
  client: sdb
  module: boto3.client
discovery:
  # ── ListDomains ──
  - discovery_id: aws.sdb.list_domains
    calls:
      - action: list_domains
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.DomainNames }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetAttributes ──
  - discovery_id: aws.sdb.get_attributes
    calls:
      - action: get_attributes
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Attributes }}'
      item:
        Name: '{{ item.Name }}'
        AlternateNameEncoding: '{{ item.AlternateNameEncoding }}'
        AlternateValueEncoding: '{{ item.AlternateValueEncoding }}'
        Attributes: '{{ item.Attributes }}'
        Value: '{{ item.Value }}'
