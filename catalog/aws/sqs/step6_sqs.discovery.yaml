# ============================================================
# Discovery YAML — sqs (AWS)
# Generated: 2026-02-21T04:56:59Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: sqs
services:
  client: sqs
  module: boto3.client
discovery:
  # ── ListQueues ──
  - discovery_id: aws.sqs.list_queues
    calls:
      - action: list_queues
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.QueueUrls }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetQueueAttributes ──
  - discovery_id: aws.sqs.get_queue_attributes
    calls:
      - action: get_queue_attributes
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        Attributes: '{{ response.Attributes }}'
  # ── GetQueueUrl ──
  - discovery_id: aws.sqs.get_queue_url
    calls:
      - action: get_queue_url
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        QueueUrl: '{{ response.QueueUrl }}'
  # ── ListDeadLetterSourceQueues ──
  - discovery_id: aws.sqs.list_dead_letter_source_queues
    calls:
      - action: list_dead_letter_source_queues
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.queueUrls }}'
  # ── ListMessageMoveTasks ──
  - discovery_id: aws.sqs.list_message_move_tasks
    calls:
      - action: list_message_move_tasks
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Results }}'
      item:
        Status: '{{ item.Status }}'
        ApproximateNumberOfMessagesMoved: '{{ item.ApproximateNumberOfMessagesMoved }}'
        ApproximateNumberOfMessagesToMove: '{{ item.ApproximateNumberOfMessagesToMove }}'
        DestinationArn: '{{ item.DestinationArn }}'
        FailureReason: '{{ item.FailureReason }}'
        MaxNumberOfMessagesPerSecond: '{{ item.MaxNumberOfMessagesPerSecond }}'
        SourceArn: '{{ item.SourceArn }}'
        StartedTimestamp: '{{ item.StartedTimestamp }}'
        TaskHandle: '{{ item.TaskHandle }}'
  # ── ListQueueTags ──
  - discovery_id: aws.sqs.list_queue_tags
    calls:
      - action: list_queue_tags
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        Tags: '{{ response.Tags }}'
