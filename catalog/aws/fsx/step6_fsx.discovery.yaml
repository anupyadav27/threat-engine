# ============================================================
# Discovery YAML — fsx (AWS)
# Generated: 2026-02-21T04:56:58Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: fsx
services:
  client: fsx
  module: boto3.client
discovery:
  # ── DescribeBackups ──
  - discovery_id: aws.fsx.describe_backups
    calls:
      - action: describe_backups
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Backups }}'
      item:
        CreationTime: '{{ item.CreationTime }}'
        KmsKeyId: '{{ item.KmsKeyId }}'
        OwnerId: '{{ item.OwnerId }}'
        Tags: '{{ item.Tags }}'
        BackupId: '{{ item.BackupId }}'
        Backups: '{{ item.Backups }}'
        DirectoryInformation: '{{ item.DirectoryInformation }}'
        FailureDetails: '{{ item.FailureDetails }}'
        FileSystem: '{{ item.FileSystem }}'
        Key: '{{ item.Key }}'
        Lifecycle: '{{ item.Lifecycle }}'
        ProgressPercent: '{{ item.ProgressPercent }}'
        ResourceARN: '{{ item.ResourceARN }}'
        ResourceType: '{{ item.ResourceType }}'
        SizeInBytes: '{{ item.SizeInBytes }}'
        SourceBackupId: '{{ item.SourceBackupId }}'
        SourceBackupRegion: '{{ item.SourceBackupRegion }}'
        Type: '{{ item.Type }}'
        Value: '{{ item.Value }}'
        Volume: '{{ item.Volume }}'
  # ── DescribeDataRepositoryAssociations ──
  - discovery_id: aws.fsx.describe_data_repository_associations
    calls:
      - action: describe_data_repository_associations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Associations }}'
      item:
        CreationTime: '{{ item.CreationTime }}'
        Tags: '{{ item.Tags }}'
        AssociationId: '{{ item.AssociationId }}'
        Associations: '{{ item.Associations }}'
        BatchImportMetaDataOnCreate: '{{ item.BatchImportMetaDataOnCreate }}'
        DataRepositoryPath: '{{ item.DataRepositoryPath }}'
        DataRepositorySubdirectories: '{{ item.DataRepositorySubdirectories }}'
        FailureDetails: '{{ item.FailureDetails }}'
        FileCacheId: '{{ item.FileCacheId }}'
        FileCachePath: '{{ item.FileCachePath }}'
        FileSystemId: '{{ item.FileSystemId }}'
        FileSystemPath: '{{ item.FileSystemPath }}'
        ImportedFileChunkSize: '{{ item.ImportedFileChunkSize }}'
        Lifecycle: '{{ item.Lifecycle }}'
        NFS: '{{ item.NFS }}'
        ResourceARN: '{{ item.ResourceARN }}'
        S3: '{{ item.S3 }}'
  # ── DescribeDataRepositoryTasks ──
  - discovery_id: aws.fsx.describe_data_repository_tasks
    calls:
      - action: describe_data_repository_tasks
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.DataRepositoryTasks }}'
      item:
        CreationTime: '{{ item.CreationTime }}'
        Status: '{{ item.Status }}'
        Tags: '{{ item.Tags }}'
        CapacityToRelease: '{{ item.CapacityToRelease }}'
        DataRepositoryTasks: '{{ item.DataRepositoryTasks }}'
        Enabled: '{{ item.Enabled }}'
        EndTime: '{{ item.EndTime }}'
        FailureDetails: '{{ item.FailureDetails }}'
        FileCacheId: '{{ item.FileCacheId }}'
        FileSystemId: '{{ item.FileSystemId }}'
        Lifecycle: '{{ item.Lifecycle }}'
        Paths: '{{ item.Paths }}'
        ReleaseConfiguration: '{{ item.ReleaseConfiguration }}'
        Report: '{{ item.Report }}'
        ResourceARN: '{{ item.ResourceARN }}'
        StartTime: '{{ item.StartTime }}'
        TaskId: '{{ item.TaskId }}'
        Type: '{{ item.Type }}'
  # ── DescribeFileCaches ──
  - discovery_id: aws.fsx.describe_file_caches
    calls:
      - action: describe_file_caches
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.FileCaches }}'
      item:
        CreationTime: '{{ item.CreationTime }}'
        KmsKeyId: '{{ item.KmsKeyId }}'
        OwnerId: '{{ item.OwnerId }}'
        SubnetIds: '{{ item.SubnetIds }}'
        VpcId: '{{ item.VpcId }}'
        DNSName: '{{ item.DNSName }}'
        DataRepositoryAssociationIds: '{{ item.DataRepositoryAssociationIds }}'
        FailureDetails: '{{ item.FailureDetails }}'
        FileCacheId: '{{ item.FileCacheId }}'
        FileCacheType: '{{ item.FileCacheType }}'
        FileCacheTypeVersion: '{{ item.FileCacheTypeVersion }}'
        FileCaches: '{{ item.FileCaches }}'
        Lifecycle: '{{ item.Lifecycle }}'
        LustreConfiguration: '{{ item.LustreConfiguration }}'
        NetworkInterfaceIds: '{{ item.NetworkInterfaceIds }}'
        ResourceARN: '{{ item.ResourceARN }}'
        StorageCapacity: '{{ item.StorageCapacity }}'
  # ── DescribeFileSystems ──
  - discovery_id: aws.fsx.describe_file_systems
    calls:
      - action: describe_file_systems
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.FileSystems }}'
      item:
        CreationTime: '{{ item.CreationTime }}'
        KmsKeyId: '{{ item.KmsKeyId }}'
        OwnerId: '{{ item.OwnerId }}'
        SubnetIds: '{{ item.SubnetIds }}'
        Tags: '{{ item.Tags }}'
        VpcId: '{{ item.VpcId }}'
        AdministrativeActions: '{{ item.AdministrativeActions }}'
        DNSName: '{{ item.DNSName }}'
        FailureDetails: '{{ item.FailureDetails }}'
        FileSystemId: '{{ item.FileSystemId }}'
        FileSystemType: '{{ item.FileSystemType }}'
        FileSystemTypeVersion: '{{ item.FileSystemTypeVersion }}'
        FileSystems: '{{ item.FileSystems }}'
        Lifecycle: '{{ item.Lifecycle }}'
        LustreConfiguration: '{{ item.LustreConfiguration }}'
        NetworkInterfaceIds: '{{ item.NetworkInterfaceIds }}'
        NetworkType: '{{ item.NetworkType }}'
        OntapConfiguration: '{{ item.OntapConfiguration }}'
        OpenZFSConfiguration: '{{ item.OpenZFSConfiguration }}'
        ResourceARN: '{{ item.ResourceARN }}'
        StorageCapacity: '{{ item.StorageCapacity }}'
        StorageType: '{{ item.StorageType }}'
        WindowsConfiguration: '{{ item.WindowsConfiguration }}'
  # ── DescribeS3AccessPointAttachments ──
  - discovery_id: aws.fsx.describe_s3_access_point_attachments
    calls:
      - action: describe_s3_access_point_attachments
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.S3AccessPointAttachments }}'
      item:
        CreationTime: '{{ item.CreationTime }}'
        Name: '{{ item.Name }}'
        Lifecycle: '{{ item.Lifecycle }}'
        LifecycleTransitionReason: '{{ item.LifecycleTransitionReason }}'
        OpenZFSConfiguration: '{{ item.OpenZFSConfiguration }}'
        S3AccessPoint: '{{ item.S3AccessPoint }}'
        S3AccessPointAttachments: '{{ item.S3AccessPointAttachments }}'
        Type: '{{ item.Type }}'
  # ── DescribeSharedVpcConfiguration ──
  - discovery_id: aws.fsx.describe_shared_vpc_configuration
    calls:
      - action: describe_shared_vpc_configuration
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.EnableFsxRouteTableUpdatesFromParticipantAccounts }}'
      item:
        EnableFsxRouteTableUpdatesFromParticipantAccounts: '{{ item.EnableFsxRouteTableUpdatesFromParticipantAccounts }}'
  # ── DescribeSnapshots ──
  - discovery_id: aws.fsx.describe_snapshots
    calls:
      - action: describe_snapshots
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Snapshots }}'
      item:
        CreationTime: '{{ item.CreationTime }}'
        Name: '{{ item.Name }}'
        Tags: '{{ item.Tags }}'
        AdministrativeActions: '{{ item.AdministrativeActions }}'
        Lifecycle: '{{ item.Lifecycle }}'
        LifecycleTransitionReason: '{{ item.LifecycleTransitionReason }}'
        ResourceARN: '{{ item.ResourceARN }}'
        SnapshotId: '{{ item.SnapshotId }}'
        Snapshots: '{{ item.Snapshots }}'
        VolumeId: '{{ item.VolumeId }}'
  # ── DescribeStorageVirtualMachines ──
  - discovery_id: aws.fsx.describe_storage_virtual_machines
    calls:
      - action: describe_storage_virtual_machines
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.StorageVirtualMachines }}'
      item:
        CreationTime: '{{ item.CreationTime }}'
        Name: '{{ item.Name }}'
        Tags: '{{ item.Tags }}'
        ActiveDirectoryConfiguration: '{{ item.ActiveDirectoryConfiguration }}'
        Endpoints: '{{ item.Endpoints }}'
        FileSystemId: '{{ item.FileSystemId }}'
        Lifecycle: '{{ item.Lifecycle }}'
        LifecycleTransitionReason: '{{ item.LifecycleTransitionReason }}'
        ResourceARN: '{{ item.ResourceARN }}'
        RootVolumeSecurityStyle: '{{ item.RootVolumeSecurityStyle }}'
        StorageVirtualMachineId: '{{ item.StorageVirtualMachineId }}'
        StorageVirtualMachines: '{{ item.StorageVirtualMachines }}'
        Subtype: '{{ item.Subtype }}'
        UUID: '{{ item.UUID }}'
  # ── DescribeVolumes ──
  - discovery_id: aws.fsx.describe_volumes
    calls:
      - action: describe_volumes
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Volumes }}'
      item:
        CreationTime: '{{ item.CreationTime }}'
        Name: '{{ item.Name }}'
        Tags: '{{ item.Tags }}'
        AdministrativeActions: '{{ item.AdministrativeActions }}'
        FileSystemId: '{{ item.FileSystemId }}'
        Lifecycle: '{{ item.Lifecycle }}'
        LifecycleTransitionReason: '{{ item.LifecycleTransitionReason }}'
        OntapConfiguration: '{{ item.OntapConfiguration }}'
        OpenZFSConfiguration: '{{ item.OpenZFSConfiguration }}'
        ResourceARN: '{{ item.ResourceARN }}'
        VolumeId: '{{ item.VolumeId }}'
        VolumeType: '{{ item.VolumeType }}'
        Volumes: '{{ item.Volumes }}'
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeFileSystemAliases ──
  - discovery_id: aws.fsx.describe_file_system_aliases
    for_each: aws.fsx.describe_data_repository_associations
    calls:
      - action: describe_file_system_aliases
        params:
          FileSystemId: '{{ item.FileSystemId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Aliases }}'
      item:
        Name: '{{ item.Name }}'
        Lifecycle: '{{ item.Lifecycle }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.fsx.list_tags_for_resource
    for_each: aws.fsx.describe_backups
    calls:
      - action: list_tags_for_resource
        params:
          ResourceARN: '{{ item.ResourceARN }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Tags }}'
      item:
        Key: '{{ item.Key }}'
        Value: '{{ item.Value }}'
