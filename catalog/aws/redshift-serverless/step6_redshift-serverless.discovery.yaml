  # ── GetCredentials ──
  - discovery_id: aws.redshift-serverless.get_credentials
    calls:
      - action: get_credentials
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.dbPassword }}'
      item:
        dbPassword: '{{ item.dbPassword }}'
        dbUser: '{{ item.dbUser }}'
        expiration: '{{ item.expiration }}'
        nextRefreshTime: '{{ item.nextRefreshTime }}'
