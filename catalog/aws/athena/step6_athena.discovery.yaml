version: '1.0'
provider: aws
service: athena
services:
  client: athena
  module: boto3.client
discovery:
  # ── ListApplicationDPUSizes ──
  - discovery_id: aws.athena.list_application_dpu_sizes
    calls:
      - action: list_application_dpu_sizes
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ApplicationDPUSizes }}'
      item:
        ApplicationRuntimeId: '{{ item.ApplicationRuntimeId }}'
        SupportedDPUSizes: '{{ item.SupportedDPUSizes }}'
  # ── ListCapacityReservations ──
  - discovery_id: aws.athena.list_capacity_reservations
    calls:
      - action: list_capacity_reservations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.CapacityReservations }}'
      item:
        CreationTime: '{{ item.CreationTime }}'
        Name: '{{ item.Name }}'
        Status: '{{ item.Status }}'
        AllocatedDpus: '{{ item.AllocatedDpus }}'
        LastAllocation: '{{ item.LastAllocation }}'
        LastSuccessfulAllocationTime: '{{ item.LastSuccessfulAllocationTime }}'
        TargetDpus: '{{ item.TargetDpus }}'
  # ── ListDataCatalogs ──
  - discovery_id: aws.athena.list_data_catalogs
    calls:
      - action: list_data_catalogs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.DataCatalogsSummary }}'
      item:
        Status: '{{ item.Status }}'
        CatalogName: '{{ item.CatalogName }}'
        ConnectionType: '{{ item.ConnectionType }}'
        Error: '{{ item.Error }}'
        Type: '{{ item.Type }}'
  # ── ListEngineVersions ──
  - discovery_id: aws.athena.list_engine_versions
    calls:
      - action: list_engine_versions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.EngineVersions }}'
      item:
        EffectiveEngineVersion: '{{ item.EffectiveEngineVersion }}'
        SelectedEngineVersion: '{{ item.SelectedEngineVersion }}'
  # ── ListNamedQueries ──
  - discovery_id: aws.athena.list_named_queries
    calls:
      - action: list_named_queries
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.NamedQueryIds }}'
  # ── ListQueryExecutions ──
  - discovery_id: aws.athena.list_query_executions
    calls:
      - action: list_query_executions
        save_as: response
        on_error: continue
    emit:
