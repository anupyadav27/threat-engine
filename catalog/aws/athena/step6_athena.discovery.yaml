        Name: '{{ item.Name }}'
        State: '{{ item.State }}'
        Description: '{{ item.Description }}'
        EngineVersion: '{{ item.EngineVersion }}'
        IdentityCenterApplicationArn: '{{ item.IdentityCenterApplicationArn }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetCalculationExecution ──
  - discovery_id: aws.athena.get_calculation_execution
    calls:
      - action: get_calculation_execution
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Status }}'
      item:
        State: '{{ item.State }}'
        CompletionDateTime: '{{ item.CompletionDateTime }}'
        Result: '{{ item.Result }}'
        StateChangeReason: '{{ item.StateChangeReason }}'
        SubmissionDateTime: '{{ item.SubmissionDateTime }}'
  # ── GetCalculationExecutionCode ──
  - discovery_id: aws.athena.get_calculation_execution_code
    calls:
      - action: get_calculation_execution_code
