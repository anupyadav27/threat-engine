    calls:
      - action: get_calculation_execution_status
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Status }}'
      item:
        State: '{{ item.State }}'
        CompletionDateTime: '{{ item.CompletionDateTime }}'
        StateChangeReason: '{{ item.StateChangeReason }}'
