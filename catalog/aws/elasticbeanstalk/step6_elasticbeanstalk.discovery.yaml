version: '1.0'
provider: aws
service: elasticbeanstalk
services:
  client: elasticbeanstalk
  module: boto3.client
discovery:
- discovery_id: aws.elasticbeanstalk.describe_account_attributes
  calls:
  - action: describe_account_attributes
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ResourceQuotas }}'
    item:
      ApplicationQuota: '{{ item.ApplicationQuota }}'
      ApplicationVersionQuota: '{{ item.ApplicationVersionQuota }}'
      ConfigurationTemplateQuota: '{{ item.ConfigurationTemplateQuota }}'
      CustomPlatformQuota: '{{ item.CustomPlatformQuota }}'
      Enabled: '{{ item.Enabled }}'
      EnvironmentQuota: '{{ item.EnvironmentQuota }}'
      ResourceQuotas: '{{ item.ResourceQuotas }}'
- discovery_id: aws.elasticbeanstalk.describe_application_versions
  calls:
  - action: describe_application_versions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ApplicationVersions }}'
    item:
      Status: '{{ item.Status }}'
      ApplicationName: '{{ item.ApplicationName }}'
      ApplicationVersionArn: '{{ item.ApplicationVersionArn }}'
      ApplicationVersions: '{{ item.ApplicationVersions }}'
      BuildArn: '{{ item.BuildArn }}'
      DateCreated: '{{ item.DateCreated }}'
      DateUpdated: '{{ item.DateUpdated }}'
      Description: '{{ item.Description }}'
      SourceBuildInformation: '{{ item.SourceBuildInformation }}'
      SourceBundle: '{{ item.SourceBundle }}'
      VersionLabel: '{{ item.VersionLabel }}'
      Versions: '{{ item.Versions }}'
- discovery_id: aws.elasticbeanstalk.describe_applications
  calls:
  - action: describe_applications
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Applications }}'
    item:
      ApplicationArn: '{{ item.ApplicationArn }}'
      ApplicationName: '{{ item.ApplicationName }}'
      Applications: '{{ item.Applications }}'
      ConfigurationTemplates: '{{ item.ConfigurationTemplates }}'
      DateCreated: '{{ item.DateCreated }}'
      DateUpdated: '{{ item.DateUpdated }}'
      Description: '{{ item.Description }}'
      ResourceLifecycleConfig: '{{ item.ResourceLifecycleConfig }}'
- discovery_id: aws.elasticbeanstalk.describe_configuration_options
  calls:
  - action: describe_configuration_options
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Options }}'
    item:
      Name: '{{ item.Name }}'
      ChangeSeverity: '{{ item.ChangeSeverity }}'
      DefaultValue: '{{ item.DefaultValue }}'
      MaxLength: '{{ item.MaxLength }}'
      MaxValue: '{{ item.MaxValue }}'
      MinValue: '{{ item.MinValue }}'
      Namespace: '{{ item.Namespace }}'
      Options: '{{ item.Options }}'
      Regex: '{{ item.Regex }}'
      UserDefined: '{{ item.UserDefined }}'
      ValueOptions: '{{ item.ValueOptions }}'
      ValueType: '{{ item.ValueType }}'
- discovery_id: aws.elasticbeanstalk.describe_environment_health
  calls:
  - action: describe_environment_health
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Causes }}'
    item:
      HealthStatus: '{{ item.HealthStatus }}'
      InstancesHealth: '{{ item.InstancesHealth }}'
      RefreshedAt: '{{ item.RefreshedAt }}'
- discovery_id: aws.elasticbeanstalk.describe_environment_managed_action_history
  calls:
  - action: describe_environment_managed_action_history
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ManagedActionHistoryItems }}'
    item:
      Status: '{{ item.Status }}'
      ActionDescription: '{{ item.ActionDescription }}'
      ActionId: '{{ item.ActionId }}'
      ActionType: '{{ item.ActionType }}'
      ExecutedTime: '{{ item.ExecutedTime }}'
      FailureDescription: '{{ item.FailureDescription }}'
      FailureType: '{{ item.FailureType }}'
      FinishedTime: '{{ item.FinishedTime }}'
      ManagedActionHistoryItems: '{{ item.ManagedActionHistoryItems }}'
- discovery_id: aws.elasticbeanstalk.describe_environment_managed_actions
  calls:
  - action: describe_environment_managed_actions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ManagedActions }}'
    item:
      Status: '{{ item.Status }}'
      ActionDescription: '{{ item.ActionDescription }}'
      ActionId: '{{ item.ActionId }}'
      ActionType: '{{ item.ActionType }}'
      ManagedActions: '{{ item.ManagedActions }}'
      WindowStartTime: '{{ item.WindowStartTime }}'
- discovery_id: aws.elasticbeanstalk.describe_environment_resources
  calls:
  - action: describe_environment_resources
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.EnvironmentResources }}'
    item:
      AutoScalingGroups: '{{ item.AutoScalingGroups }}'
      EnvironmentName: '{{ item.EnvironmentName }}'
      EnvironmentResources: '{{ item.EnvironmentResources }}'
      Instances: '{{ item.Instances }}'
      LaunchConfigurations: '{{ item.LaunchConfigurations }}'
      LaunchTemplates: '{{ item.LaunchTemplates }}'
      LoadBalancers: '{{ item.LoadBalancers }}'
      Queues: '{{ item.Queues }}'
      Resources: '{{ item.Resources }}'
      Triggers: '{{ item.Triggers }}'
- discovery_id: aws.elasticbeanstalk.describe_environments
  calls:
  - action: describe_environments
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Environments }}'
    item:
      Status: '{{ item.Status }}'
      AbortableOperationInProgress: '{{ item.AbortableOperationInProgress }}'
      ApplicationName: '{{ item.ApplicationName }}'
      CNAME: '{{ item.CNAME }}'
      DateCreated: '{{ item.DateCreated }}'
      DateUpdated: '{{ item.DateUpdated }}'
      Description: '{{ item.Description }}'
      EndpointURL: '{{ item.EndpointURL }}'
      EnvironmentArn: '{{ item.EnvironmentArn }}'
      EnvironmentId: '{{ item.EnvironmentId }}'
      EnvironmentLinks: '{{ item.EnvironmentLinks }}'
      EnvironmentName: '{{ item.EnvironmentName }}'
      Environments: '{{ item.Environments }}'
      Health: '{{ item.Health }}'
      OperationsRole: '{{ item.OperationsRole }}'
      PlatformArn: '{{ item.PlatformArn }}'
      SolutionStackName: '{{ item.SolutionStackName }}'
      TemplateName: '{{ item.TemplateName }}'
      Tier: '{{ item.Tier }}'
      VersionLabel: '{{ item.VersionLabel }}'
- discovery_id: aws.elasticbeanstalk.describe_events
  calls:
  - action: describe_events
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.Events }}'
    item:
      ApplicationName: '{{ item.ApplicationName }}'
      EnvironmentName: '{{ item.EnvironmentName }}'
      EventDate: '{{ item.EventDate }}'
      Events: '{{ item.Events }}'
      Message: '{{ item.Message }}'
      PlatformArn: '{{ item.PlatformArn }}'
      Severity: '{{ item.Severity }}'
      TemplateName: '{{ item.TemplateName }}'
      VersionLabel: '{{ item.VersionLabel }}'
- discovery_id: aws.elasticbeanstalk.describe_instances_health
  calls:
  - action: describe_instances_health
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.InstanceHealthList }}'
    item:
      ApplicationMetrics: '{{ item.ApplicationMetrics }}'
      AvailabilityZone: '{{ item.AvailabilityZone }}'
      Causes: '{{ item.Causes }}'
      Color: '{{ item.Color }}'
      Deployment: '{{ item.Deployment }}'
      HealthStatus: '{{ item.HealthStatus }}'
      InstanceHealthList: '{{ item.InstanceHealthList }}'
      InstanceId: '{{ item.InstanceId }}'
      InstanceType: '{{ item.InstanceType }}'
      LaunchedAt: '{{ item.LaunchedAt }}'
      System: '{{ item.System }}'
- discovery_id: aws.elasticbeanstalk.describe_platform_version
  is_active: false
  calls:
  - action: describe_platform_version
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.PlatformDescription }}'
    item:
      CustomAmiList: '{{ item.CustomAmiList }}'
      DateCreated: '{{ item.DateCreated }}'
      DateUpdated: '{{ item.DateUpdated }}'
      Description: '{{ item.Description }}'
      Frameworks: '{{ item.Frameworks }}'
      Maintainer: '{{ item.Maintainer }}'
      OperatingSystemName: '{{ item.OperatingSystemName }}'
      OperatingSystemVersion: '{{ item.OperatingSystemVersion }}'
      PlatformArn: '{{ item.PlatformArn }}'
      PlatformBranchLifecycleState: '{{ item.PlatformBranchLifecycleState }}'
      PlatformBranchName: '{{ item.PlatformBranchName }}'
      PlatformCategory: '{{ item.PlatformCategory }}'
      PlatformDescription: '{{ item.PlatformDescription }}'
      PlatformLifecycleState: '{{ item.PlatformLifecycleState }}'
      PlatformName: '{{ item.PlatformName }}'
      PlatformOwner: '{{ item.PlatformOwner }}'
      PlatformStatus: '{{ item.PlatformStatus }}'
      PlatformVersion: '{{ item.PlatformVersion }}'
      ProgrammingLanguages: '{{ item.ProgrammingLanguages }}'
      SolutionStackName: '{{ item.SolutionStackName }}'
      SupportedAddonList: '{{ item.SupportedAddonList }}'
      SupportedTierList: '{{ item.SupportedTierList }}'
- discovery_id: aws.elasticbeanstalk.list_available_solution_stacks
  is_active: false
  calls:
  - action: list_available_solution_stacks
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.SolutionStacks }}'
- discovery_id: aws.elasticbeanstalk.list_platform_versions
  is_active: false
  calls:
  - action: list_platform_versions
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.PlatformSummaryList }}'
    item:
      OperatingSystemName: '{{ item.OperatingSystemName }}'
      OperatingSystemVersion: '{{ item.OperatingSystemVersion }}'
      PlatformArn: '{{ item.PlatformArn }}'
      PlatformBranchLifecycleState: '{{ item.PlatformBranchLifecycleState }}'
      PlatformBranchName: '{{ item.PlatformBranchName }}'
      PlatformCategory: '{{ item.PlatformCategory }}'
      PlatformLifecycleState: '{{ item.PlatformLifecycleState }}'
      PlatformOwner: '{{ item.PlatformOwner }}'
      PlatformStatus: '{{ item.PlatformStatus }}'
      PlatformVersion: '{{ item.PlatformVersion }}'
      SupportedAddonList: '{{ item.SupportedAddonList }}'
      SupportedTierList: '{{ item.SupportedTierList }}'
- discovery_id: aws.elasticbeanstalk.describe_configuration_settings
  for_each: aws.elasticbeanstalk.describe_application_versions
  calls:
  - action: describe_configuration_settings
    params:
      ApplicationName: '{{ item.ApplicationName }}'
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ConfigurationSettings }}'
    item:
      ApplicationName: '{{ item.ApplicationName }}'
      ConfigurationSettings: '{{ item.ConfigurationSettings }}'
      DateCreated: '{{ item.DateCreated }}'
      DateUpdated: '{{ item.DateUpdated }}'
      DeploymentStatus: '{{ item.DeploymentStatus }}'
      Description: '{{ item.Description }}'
      EnvironmentName: '{{ item.EnvironmentName }}'
      OptionSettings: '{{ item.OptionSettings }}'
      PlatformArn: '{{ item.PlatformArn }}'
      SolutionStackName: '{{ item.SolutionStackName }}'
      TemplateName: '{{ item.TemplateName }}'
- discovery_id: aws.elasticbeanstalk.list_tags_for_resource
  calls:
  - action: list_tags_for_resource
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response.ResourceTags }}'
    item:
      Key: '{{ item.Key }}'
      Value: '{{ item.Value }}'
