# ============================================================
# Discovery YAML — marketplace-agreement (AWS)
# Generated: 2026-02-21T04:56:59Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: marketplace-agreement
services:
  client: marketplace-agreement
  module: boto3.client
discovery:
  # ── SearchAgreements ──
  - discovery_id: aws.marketplace-agreement.search_agreements
    calls:
      - action: search_agreements
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.agreementViewSummaries }}'
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeAgreement ──
  - discovery_id: aws.marketplace-agreement.describe_agreement
    calls:
      - action: describe_agreement
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.acceptor }}'
      item:
        accountId: '{{ item.accountId }}'
  # ── GetAgreementTerms ──
  - discovery_id: aws.marketplace-agreement.get_agreement_terms
    calls:
      - action: get_agreement_terms
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.acceptedTerms }}'
      item:
        byolPricingTerm: '{{ item.byolPricingTerm }}'
        configurableUpfrontPricingTerm: '{{ item.configurableUpfrontPricingTerm }}'
        fixedUpfrontPricingTerm: '{{ item.fixedUpfrontPricingTerm }}'
        freeTrialPricingTerm: '{{ item.freeTrialPricingTerm }}'
        legalTerm: '{{ item.legalTerm }}'
        paymentScheduleTerm: '{{ item.paymentScheduleTerm }}'
        recurringPaymentTerm: '{{ item.recurringPaymentTerm }}'
        renewalTerm: '{{ item.renewalTerm }}'
        supportTerm: '{{ item.supportTerm }}'
        usageBasedPricingTerm: '{{ item.usageBasedPricingTerm }}'
        validityTerm: '{{ item.validityTerm }}'
