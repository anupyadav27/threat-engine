# ============================================================
# Discovery YAML — datasync (AWS)
# Generated: 2026-02-21T04:56:58Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: datasync
services:
  client: datasync
  module: boto3.client
discovery:
  # ── ListAgents ──
  - discovery_id: aws.datasync.list_agents
    calls:
      - action: list_agents
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Agents }}'
      item:
        CreationTime: '{{ item.CreationTime }}'
        Name: '{{ item.Name }}'
        Status: '{{ item.Status }}'
        AgentArn: '{{ item.AgentArn }}'
        AuthenticationType: '{{ item.AuthenticationType }}'
        BlobType: '{{ item.BlobType }}'
        Ec2Config: '{{ item.Ec2Config }}'
        EndTime: '{{ item.EndTime }}'
        EndpointType: '{{ item.EndpointType }}'
        LastConnectionTime: '{{ item.LastConnectionTime }}'
        LaunchTime: '{{ item.LaunchTime }}'
        ManifestConfig: '{{ item.ManifestConfig }}'
        NameNodes: '{{ item.NameNodes }}'
        OnPremConfig: '{{ item.OnPremConfig }}'
        Platform: '{{ item.Platform }}'
        PrivateLinkConfig: '{{ item.PrivateLinkConfig }}'
        PrivateLinkEndpoint: '{{ item.PrivateLinkEndpoint }}'
        S3Config: '{{ item.S3Config }}'
        SecurityGroupArns: '{{ item.SecurityGroupArns }}'
        StartTime: '{{ item.StartTime }}'
        SubnetArns: '{{ item.SubnetArns }}'
        VpcEndpointId: '{{ item.VpcEndpointId }}'
  # ── ListLocations ──
  - discovery_id: aws.datasync.list_locations
    calls:
      - action: list_locations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Locations }}'
      item:
        DestinationLocationArn: '{{ item.DestinationLocationArn }}'
        LocationArn: '{{ item.LocationArn }}'
        LocationUri: '{{ item.LocationUri }}'
        SourceLocationArn: '{{ item.SourceLocationArn }}'
  # ── ListTaskExecutions ──
  - discovery_id: aws.datasync.list_task_executions
    calls:
      - action: list_task_executions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.TaskExecutions }}'
      item:
        Status: '{{ item.Status }}'
        CurrentTaskExecutionArn: '{{ item.CurrentTaskExecutionArn }}'
        TaskExecutionArn: '{{ item.TaskExecutionArn }}'
        TaskMode: '{{ item.TaskMode }}'
  # ── ListTasks ──
  - discovery_id: aws.datasync.list_tasks
    calls:
      - action: list_tasks
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Tasks }}'
      item:
        Name: '{{ item.Name }}'
        Status: '{{ item.Status }}'
        TaskArn: '{{ item.TaskArn }}'
        TaskMode: '{{ item.TaskMode }}'
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeAgent ──
  - discovery_id: aws.datasync.describe_agent
    for_each: aws.datasync.list_agents
    calls:
      - action: describe_agent
        params:
          AgentArn: '{{ item.AgentArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Agents }}'
      item:
        CreationTime: '{{ item.CreationTime }}'
        AuthenticationType: '{{ item.AuthenticationType }}'
        BlobType: '{{ item.BlobType }}'
        Ec2Config: '{{ item.Ec2Config }}'
        EndTime: '{{ item.EndTime }}'
        EndpointType: '{{ item.EndpointType }}'
        LastConnectionTime: '{{ item.LastConnectionTime }}'
        LaunchTime: '{{ item.LaunchTime }}'
        ManifestConfig: '{{ item.ManifestConfig }}'
        OnPremConfig: '{{ item.OnPremConfig }}'
        PrivateLinkConfig: '{{ item.PrivateLinkConfig }}'
        PrivateLinkEndpoint: '{{ item.PrivateLinkEndpoint }}'
        S3Config: '{{ item.S3Config }}'
        SecurityGroupArns: '{{ item.SecurityGroupArns }}'
        StartTime: '{{ item.StartTime }}'
        SubnetArns: '{{ item.SubnetArns }}'
        VpcEndpointId: '{{ item.VpcEndpointId }}'
  # ── DescribeLocationAzureBlob ──
  - discovery_id: aws.datasync.describe_location_azure_blob
    calls:
      - action: describe_location_azure_blob
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.AgentArns }}'
  # ── DescribeLocationEfs ──
  - discovery_id: aws.datasync.describe_location_efs
    calls:
      - action: describe_location_efs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.PrivateLinkConfig }}'
      item:
        SecurityGroupArns: '{{ item.SecurityGroupArns }}'
        SubnetArn: '{{ item.SubnetArn }}'
  # ── DescribeLocationFsxLustre ──
  - discovery_id: aws.datasync.describe_location_fsx_lustre
    calls:
      - action: describe_location_fsx_lustre
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.SecurityGroupArns }}'
  # ── DescribeLocationFsxOntap ──
  - discovery_id: aws.datasync.describe_location_fsx_ontap
    calls:
      - action: describe_location_fsx_ontap
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.SecurityGroupArns }}'
  # ── DescribeLocationFsxOpenZfs ──
  - discovery_id: aws.datasync.describe_location_fsx_open_zfs
    calls:
      - action: describe_location_fsx_open_zfs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.SecurityGroupArns }}'
  # ── DescribeLocationFsxWindows ──
  - discovery_id: aws.datasync.describe_location_fsx_windows
    calls:
      - action: describe_location_fsx_windows
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.SecurityGroupArns }}'
  # ── DescribeLocationHdfs ──
  - discovery_id: aws.datasync.describe_location_hdfs
    calls:
      - action: describe_location_hdfs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.NameNodes }}'
      item:
        Enabled: '{{ item.Enabled }}'
        Hostname: '{{ item.Hostname }}'
        Port: '{{ item.Port }}'
  # ── DescribeLocationNfs ──
  - discovery_id: aws.datasync.describe_location_nfs
    calls:
      - action: describe_location_nfs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.OnPremConfig }}'
      item:
        AgentArns: '{{ item.AgentArns }}'
  # ── DescribeLocationObjectStorage ──
  - discovery_id: aws.datasync.describe_location_object_storage
    calls:
      - action: describe_location_object_storage
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.AgentArns }}'
  # ── DescribeLocationS3 ──
  - discovery_id: aws.datasync.describe_location_s3
    calls:
      - action: describe_location_s3
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.AgentArns }}'
  # ── DescribeLocationSmb ──
  - discovery_id: aws.datasync.describe_location_smb
    calls:
      - action: describe_location_smb
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.AgentArns }}'
  # ── DescribeTask ──
  - discovery_id: aws.datasync.describe_task
    for_each: aws.datasync.list_tasks
    calls:
      - action: describe_task
        params:
          TaskArn: '{{ item.TaskArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.SourceNetworkInterfaceArns }}'
  # ── DescribeTaskExecution ──
  - discovery_id: aws.datasync.describe_task_execution
    calls:
      - action: describe_task_execution
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Excludes }}'
      item:
        BytesCompressed: '{{ item.BytesCompressed }}'
        BytesTransferred: '{{ item.BytesTransferred }}'
        BytesWritten: '{{ item.BytesWritten }}'
        EstimatedBytesToTransfer: '{{ item.EstimatedBytesToTransfer }}'
        EstimatedFilesToDelete: '{{ item.EstimatedFilesToDelete }}'
        EstimatedFilesToTransfer: '{{ item.EstimatedFilesToTransfer }}'
        Excludes: '{{ item.Excludes }}'
        FilesDeleted: '{{ item.FilesDeleted }}'
        FilesFailed: '{{ item.FilesFailed }}'
        FilesListed: '{{ item.FilesListed }}'
        FilesPrepared: '{{ item.FilesPrepared }}'
        FilesSkipped: '{{ item.FilesSkipped }}'
        FilesTransferred: '{{ item.FilesTransferred }}'
        FilesVerified: '{{ item.FilesVerified }}'
        FilterType: '{{ item.FilterType }}'
        Includes: '{{ item.Includes }}'
        MountOptions: '{{ item.MountOptions }}'
        Options: '{{ item.Options }}'
        ReportResult: '{{ item.ReportResult }}'
        Result: '{{ item.Result }}'
        ServerPort: '{{ item.ServerPort }}'
        TaskReportConfig: '{{ item.TaskReportConfig }}'
        Value: '{{ item.Value }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.datasync.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Tags }}'
      item:
        AccessKey: '{{ item.AccessKey }}'
        Key: '{{ item.Key }}'
        Value: '{{ item.Value }}'
