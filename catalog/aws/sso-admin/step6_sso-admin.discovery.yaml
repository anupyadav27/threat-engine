version: '1.0'
provider: aws
service: sso-admin
services:
  client: sso-admin
  module: boto3.client
discovery:
  # ── ListApplicationProviders ──
  - discovery_id: aws.sso-admin.list_application_providers
    calls:
      - action: list_application_providers
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ApplicationProviders }}'
      item:
        ApplicationProviderArn: '{{ item.ApplicationProviderArn }}'
        DisplayData: '{{ item.DisplayData }}'
        FederationProtocol: '{{ item.FederationProtocol }}'
        ResourceServerConfig: '{{ item.ResourceServerConfig }}'
  # ── ListInstances ──
  - discovery_id: aws.sso-admin.list_instances
    calls:
      - action: list_instances
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Instances }}'
      item:
        Name: '{{ item.Name }}'
        Status: '{{ item.Status }}'
        AccessControlAttributes: '{{ item.AccessControlAttributes }}'
        AccountAssignmentCreationStatus: '{{ item.AccountAssignmentCreationStatus }}'
        CreatedDate: '{{ item.CreatedDate }}'
        EncryptionConfigurationDetails: '{{ item.EncryptionConfigurationDetails }}'
        IdentityStoreId: '{{ item.IdentityStoreId }}'
        InstanceAccessControlAttributeConfiguration: '{{ item.InstanceAccessControlAttributeConfiguration }}'
        InstanceArn: '{{ item.InstanceArn }}'
        OwnerAccountId: '{{ item.OwnerAccountId }}'
        PermissionSetProvisioningStatus: '{{ item.PermissionSetProvisioningStatus }}'
        StatusReason: '{{ item.StatusReason }}'
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeAccountAssignmentCreationStatus ──
  - discovery_id: aws.sso-admin.describe_account_assignment_creation_status
    for_each: aws.sso-admin.list_instances
