# ============================================================
# Discovery YAML — elb (AWS)
# Generated: 2026-02-21T04:56:58Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: elb
services:
  client: elb
  module: boto3.client
discovery:
  # ── DescribeAccountLimits ──
  - discovery_id: aws.elb.describe_account_limits
    calls:
      - action: describe_account_limits
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Limits }}'
  # ── DescribeLoadBalancerPolicies ──
  - discovery_id: aws.elb.describe_load_balancer_policies
    calls:
      - action: describe_load_balancer_policies
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.PolicyDescriptions }}'
  # ── DescribeLoadBalancerPolicyTypes ──
  - discovery_id: aws.elb.describe_load_balancer_policy_types
    calls:
      - action: describe_load_balancer_policy_types
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.PolicyTypeDescriptions }}'
  # ── DescribeLoadBalancers ──
  - discovery_id: aws.elb.describe_load_balancers
    calls:
      - action: describe_load_balancers
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.LoadBalancerDescriptions }}'
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeInstanceHealth ──
  - discovery_id: aws.elb.describe_instance_health
    for_each: aws.elb.describe_load_balancers
    calls:
      - action: describe_instance_health
        params:
          LoadBalancerName: '{{ item.LoadBalancerName }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.InstanceStates }}'
  # ── DescribeLoadBalancerAttributes ──
  - discovery_id: aws.elb.describe_load_balancer_attributes
    for_each: aws.elb.describe_load_balancers
    calls:
      - action: describe_load_balancer_attributes
        params:
          LoadBalancerName: '{{ item.LoadBalancerName }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        LoadBalancerAttributes: '{{ response.LoadBalancerAttributes }}'
  # ── DescribeTags ──
  - discovery_id: aws.elb.describe_tags
    calls:
      - action: describe_tags
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.TagDescriptions }}'
