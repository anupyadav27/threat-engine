# ============================================================
# Discovery YAML — scheduler (AWS)
# Generated: 2026-02-21T04:56:59Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: scheduler
services:
  client: scheduler
  module: boto3.client
discovery:
  # ── ListScheduleGroups ──
  - discovery_id: aws.scheduler.list_schedule_groups
    calls:
      - action: list_schedule_groups
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ScheduleGroups }}'
      item:
        Arn: '{{ item.Arn }}'
        CreationDate: '{{ item.CreationDate }}'
        Name: '{{ item.Name }}'
        State: '{{ item.State }}'
        Description: '{{ item.Description }}'
        LastModificationDate: '{{ item.LastModificationDate }}'
  # ── ListSchedules ──
  - discovery_id: aws.scheduler.list_schedules
    calls:
      - action: list_schedules
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Schedules }}'
      item:
        Arn: '{{ item.Arn }}'
        CreationDate: '{{ item.CreationDate }}'
        Name: '{{ item.Name }}'
        State: '{{ item.State }}'
        GroupName: '{{ item.GroupName }}'
        LastModificationDate: '{{ item.LastModificationDate }}'
        Target: '{{ item.Target }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetSchedule ──
  - discovery_id: aws.scheduler.get_schedule
    for_each: aws.scheduler.list_schedule_groups
    calls:
      - action: get_schedule
        params:
          Name: '{{ item.Name }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.NextToken }}'
      item:
        Description: '{{ item.Description }}'
        MaximumWindowInMinutes: '{{ item.MaximumWindowInMinutes }}'
        Mode: '{{ item.Mode }}'
  # ── GetScheduleGroup ──
  - discovery_id: aws.scheduler.get_schedule_group
    for_each: aws.scheduler.list_schedule_groups
    calls:
      - action: get_schedule_group
        params:
          Name: '{{ item.Name }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        Arn: '{{ response.Arn }}'
        CreationDate: '{{ response.CreationDate }}'
        Name: '{{ response.Name }}'
        State: '{{ response.State }}'
        LastModificationDate: '{{ response.LastModificationDate }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.scheduler.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Tags }}'
      item:
        Key: '{{ item.Key }}'
        Value: '{{ item.Value }}'
