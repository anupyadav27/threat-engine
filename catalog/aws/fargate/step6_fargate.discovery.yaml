# ============================================================
# Discovery YAML — fargate (AWS)
# Generated: 2026-02-21T04:56:58Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: fargate
services:
  client: fargate
  module: boto3.client
discovery:
  # ── DescribeCapacityProviders ──
  - discovery_id: aws.fargate.describe_capacity_providers
    calls:
      - action: describe_capacity_providers
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.capacityProviders }}'
      item:
        autoScalingGroupProvider: '{{ item.autoScalingGroupProvider }}'
        capacityProviderArn: '{{ item.capacityProviderArn }}'
        cluster: '{{ item.cluster }}'
        failures: '{{ item.failures }}'
        managedInstancesProvider: '{{ item.managedInstancesProvider }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        updateStatus: '{{ item.updateStatus }}'
        updateStatusReason: '{{ item.updateStatusReason }}'
  # ── DescribeClusters ──
  - discovery_id: aws.fargate.describe_clusters
    calls:
      - action: describe_clusters
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.clusters }}'
      item:
        activeServicesCount: '{{ item.activeServicesCount }}'
        attachments: '{{ item.attachments }}'
        attachmentsStatus: '{{ item.attachmentsStatus }}'
        capacityProviders: '{{ item.capacityProviders }}'
        clusterArn: '{{ item.clusterArn }}'
        clusterName: '{{ item.clusterName }}'
        clusters: '{{ item.clusters }}'
        configuration: '{{ item.configuration }}'
        defaultCapacityProviderStrategy: '{{ item.defaultCapacityProviderStrategy }}'
        pendingTasksCount: '{{ item.pendingTasksCount }}'
        registeredContainerInstancesCount: '{{ item.registeredContainerInstancesCount }}'
        runningTasksCount: '{{ item.runningTasksCount }}'
        serviceConnectDefaults: '{{ item.serviceConnectDefaults }}'
        settings: '{{ item.settings }}'
        statistics: '{{ item.statistics }}'
        status: '{{ item.status }}'
        tags: '{{ item.tags }}'
  # ── ListAccountSettings ──
  - discovery_id: aws.fargate.list_account_settings
    calls:
      - action: list_account_settings
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.capacityProviders }}'
      item:
        name: '{{ item.name }}'
        principalArn: '{{ item.principalArn }}'
        type: '{{ item.type }}'
        value: '{{ item.value }}'
  # ── ListClusters ──
  - discovery_id: aws.fargate.list_clusters
    calls:
      - action: list_clusters
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        clusterArns: '{{ response.clusterArns }}'
  # ── ListContainerInstances ──
  - discovery_id: aws.fargate.list_container_instances
    calls:
      - action: list_container_instances
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        containerInstanceArns: '{{ response.containerInstanceArns }}'
  # ── ListServices ──
  - discovery_id: aws.fargate.list_services
    calls:
      - action: list_services
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        serviceArns: '{{ response.serviceArns }}'
  # ── ListTaskDefinitionFamilies ──
  - discovery_id: aws.fargate.list_task_definition_families
    calls:
      - action: list_task_definition_families
        save_as: response
