        statusReason: '{{ item.statusReason }}'
        tags: '{{ item.tags }}'
        version: '{{ item.version }}'
        versionInfo: '{{ item.versionInfo }}'
  # ── DescribeExpressGatewayService ──
  - discovery_id: aws.fargate.describe_express_gateway_service
