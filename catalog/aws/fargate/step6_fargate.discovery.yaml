  # ── DescribeContainerInstances ──
  - discovery_id: aws.fargate.describe_container_instances
    calls:
      - action: describe_container_instances
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.containerInstances }}'
      item:
