      item:
        Actions: '{{ item.Actions }}'
        MalwareProtectionPlanId: '{{ item.MalwareProtectionPlanId }}'
        Role: '{{ item.Role }}'
  # ── ListMalwareScans ──
  - discovery_id: aws.guardduty.list_malware_scans
    calls:
      - action: list_malware_scans
