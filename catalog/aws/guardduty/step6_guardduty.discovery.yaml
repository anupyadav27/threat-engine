version: '1.0'
provider: aws
service: guardduty
services:
  client: guardduty
  module: boto3.client
discovery:
  # ── GetInvitationsCount ──
  - discovery_id: aws.guardduty.get_invitations_count
    calls:
      - action: get_invitations_count
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.InvitationsCount }}'
      item:
        InvitationsCount: '{{ item.InvitationsCount }}'
  # ── GetOrganizationStatistics ──
  - discovery_id: aws.guardduty.get_organization_statistics
    calls:
      - action: get_organization_statistics
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.OrganizationDetails }}'
      item:
        OrganizationDetails: '{{ item.OrganizationDetails }}'
        OrganizationStatistics: '{{ item.OrganizationStatistics }}'
        UpdatedAt: '{{ item.UpdatedAt }}'
  # ── ListDetectors ──
  - discovery_id: aws.guardduty.list_detectors
    calls:
      - action: list_detectors
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.DetectorIds }}'
      item:
        MemberDataSourceConfigurations: '{{ item.MemberDataSourceConfigurations }}'
  # ── ListInvitations ──
  - discovery_id: aws.guardduty.list_invitations
