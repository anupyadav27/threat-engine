# ============================================================
# Discovery YAML — artifact (AWS)
# Generated: 2026-02-21T04:56:57Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: artifact
services:
  client: artifact
  module: boto3.client
discovery:
  # ── GetAccountSettings ──
  - discovery_id: aws.artifact.get_account_settings
    calls:
      - action: get_account_settings
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.accountSettings }}'
      item:
        DestinationArn: '{{ item.DestinationArn }}'
        Enabled: '{{ item.Enabled }}'
        Format: '{{ item.Format }}'
        Level: '{{ item.Level }}'
        accountSettings: '{{ item.accountSettings }}'
        notificationSubscriptionStatus: '{{ item.notificationSubscriptionStatus }}'
  # ── ListCustomerAgreements ──
  - discovery_id: aws.artifact.list_customer_agreements
    calls:
      - action: list_customer_agreements
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.customerAgreements }}'
      item:
        acceptanceTerms: '{{ item.acceptanceTerms }}'
        agreementArn: '{{ item.agreementArn }}'
        arn: '{{ item.arn }}'
        awsAccountId: '{{ item.awsAccountId }}'
        description: '{{ item.description }}'
        effectiveEnd: '{{ item.effectiveEnd }}'
        effectiveStart: '{{ item.effectiveStart }}'
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        organizationArn: '{{ item.organizationArn }}'
        state: '{{ item.state }}'
        terminateTerms: '{{ item.terminateTerms }}'
        type: '{{ item.type }}'
  # ── ListReports ──
  - discovery_id: aws.artifact.list_reports
    calls:
      - action: list_reports
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.reports }}'
      item:
        acceptanceType: '{{ item.acceptanceType }}'
        arn: '{{ item.arn }}'
        category: '{{ item.category }}'
        companyName: '{{ item.companyName }}'
        description: '{{ item.description }}'
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        periodEnd: '{{ item.periodEnd }}'
        periodStart: '{{ item.periodStart }}'
        productName: '{{ item.productName }}'
        series: '{{ item.series }}'
        state: '{{ item.state }}'
        statusMessage: '{{ item.statusMessage }}'
        uploadState: '{{ item.uploadState }}'
        version: '{{ item.version }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetReport ──
  - discovery_id: aws.artifact.get_report
    calls:
      - action: get_report
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        documentPresignedUrl: '{{ response.documentPresignedUrl }}'
  # ── GetReportMetadata ──
  - discovery_id: aws.artifact.get_report_metadata
    calls:
      - action: get_report_metadata
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.reports }}'
      item:
        acceptanceType: '{{ item.acceptanceType }}'
        arn: '{{ item.arn }}'
        category: '{{ item.category }}'
        companyName: '{{ item.companyName }}'
        createdAt: '{{ item.createdAt }}'
        deletedAt: '{{ item.deletedAt }}'
        description: '{{ item.description }}'
        id: '{{ item.id }}'
        lastModifiedAt: '{{ item.lastModifiedAt }}'
        name: '{{ item.name }}'
        periodEnd: '{{ item.periodEnd }}'
        periodStart: '{{ item.periodStart }}'
        productName: '{{ item.productName }}'
        sequenceNumber: '{{ item.sequenceNumber }}'
        series: '{{ item.series }}'
        state: '{{ item.state }}'
        statusMessage: '{{ item.statusMessage }}'
        termArn: '{{ item.termArn }}'
        uploadState: '{{ item.uploadState }}'
        version: '{{ item.version }}'
  # ── GetTermForReport ──
  - discovery_id: aws.artifact.get_term_for_report
    calls:
      - action: get_term_for_report
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        documentPresignedUrl: '{{ response.documentPresignedUrl }}'
        termToken: '{{ response.termToken }}'
