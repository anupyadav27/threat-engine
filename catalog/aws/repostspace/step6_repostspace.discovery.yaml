# ============================================================
# Discovery YAML — repostspace (AWS)
# Generated: 2026-02-21T04:56:59Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: repostspace
services:
  client: repostspace
  module: boto3.client
discovery:
  # ── ListSpaces ──
  - discovery_id: aws.repostspace.list_spaces
    calls:
      - action: list_spaces
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.spaces }}'
      item:
        Status: '{{ item.Status }}'
        Enabled: '{{ item.Enabled }}'
        applicationArn: '{{ item.applicationArn }}'
        arn: '{{ item.arn }}'
        channelRoles: '{{ item.channelRoles }}'
        clientId: '{{ item.clientId }}'
        configurationStatus: '{{ item.configurationStatus }}'
        contentSize: '{{ item.contentSize }}'
        createDateTime: '{{ item.createDateTime }}'
        customerRoleArn: '{{ item.customerRoleArn }}'
        deleteDateTime: '{{ item.deleteDateTime }}'
        description: '{{ item.description }}'
        groupAdmins: '{{ item.groupAdmins }}'
        groupCount: '{{ item.groupCount }}'
        identityStoreId: '{{ item.identityStoreId }}'
        name: '{{ item.name }}'
        randomDomain: '{{ item.randomDomain }}'
        roles: '{{ item.roles }}'
        spaceId: '{{ item.spaceId }}'
        status: '{{ item.status }}'
        storageLimit: '{{ item.storageLimit }}'
        supportedEmailDomains: '{{ item.supportedEmailDomains }}'
        tier: '{{ item.tier }}'
        userAdmins: '{{ item.userAdmins }}'
        userCount: '{{ item.userCount }}'
        userKMSKey: '{{ item.userKMSKey }}'
        vanityDomain: '{{ item.vanityDomain }}'
        vanityDomainStatus: '{{ item.vanityDomainStatus }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetChannel ──
  - discovery_id: aws.repostspace.get_channel
    for_each: aws.repostspace.list_spaces
    calls:
      - action: get_channel
        params:
          spaceId: '{{ item.spaceId }}'
          channelId: '{{ item.channelId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.spaces }}'
      item:
        channelRoles: '{{ item.channelRoles }}'
  # ── GetSpace ──
  - discovery_id: aws.repostspace.get_space
    for_each: aws.repostspace.list_spaces
    calls:
      - action: get_space
        params:
          spaceId: '{{ item.spaceId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.userAdmins }}'
      item:
        applicationArn: '{{ item.applicationArn }}'
        clientId: '{{ item.clientId }}'
        customerRoleArn: '{{ item.customerRoleArn }}'
        groupAdmins: '{{ item.groupAdmins }}'
        identityStoreId: '{{ item.identityStoreId }}'
        roles: '{{ item.roles }}'
        userAdmins: '{{ item.userAdmins }}'
  # ── ListChannels ──
  - discovery_id: aws.repostspace.list_channels
    for_each: aws.repostspace.list_spaces
    calls:
      - action: list_channels
        params:
          spaceId: '{{ item.spaceId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.channels }}'
      item:
        channelDescription: '{{ item.channelDescription }}'
        channelId: '{{ item.channelId }}'
        channelName: '{{ item.channelName }}'
        channelRoles: '{{ item.channelRoles }}'
        channelStatus: '{{ item.channelStatus }}'
        createDateTime: '{{ item.createDateTime }}'
        deleteDateTime: '{{ item.deleteDateTime }}'
        groupCount: '{{ item.groupCount }}'
        spaceId: '{{ item.spaceId }}'
        userCount: '{{ item.userCount }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.repostspace.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        tags: '{{ response.tags }}'
