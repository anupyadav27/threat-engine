# ============================================================
# Discovery YAML — aiops (AWS)
# Generated: 2026-02-21T04:56:57Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: aiops
services:
  client: aiops
  module: boto3.client
discovery:
  # ── ListInvestigationGroups ──
  - discovery_id: aws.aiops.list_investigation_groups
    calls:
      - action: list_investigation_groups
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.investigationGroups }}'
      item:
        arn: '{{ item.arn }}'
        investigationGroupArn: '{{ item.investigationGroupArn }}'
        name: '{{ item.name }}'
        policy: '{{ item.policy }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetInvestigationGroup ──
  - discovery_id: aws.aiops.get_investigation_group
    calls:
      - action: get_investigation_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.tagKeyBoundaries }}'
      item:
        Status: '{{ item.Status }}'
        Enabled: '{{ item.Enabled }}'
  # ── GetInvestigationGroupPolicy ──
  - discovery_id: aws.aiops.get_investigation_group_policy
    calls:
      - action: get_investigation_group_policy
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.nextToken }}'
      item:
        Statement: '{{ item.Statement }}'
        Version: '{{ item.Version }}'
        investigationGroupArn: '{{ item.investigationGroupArn }}'
        policy: '{{ item.policy }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.aiops.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        tags: '{{ response.tags }}'
