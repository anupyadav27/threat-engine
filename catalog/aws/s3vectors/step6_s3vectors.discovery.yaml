# ============================================================
# Discovery YAML — s3vectors (AWS)
# Generated: 2026-02-21T04:56:59Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: s3vectors
services:
  client: s3vectors
  module: boto3.client
discovery:
  # ── GetIndex ──
  - discovery_id: aws.s3vectors.get_index
    calls:
      - action: get_index
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.index }}'
      item:
        Status: '{{ item.Status }}'
        Enabled: '{{ item.Enabled }}'
        dataType: '{{ item.dataType }}'
        dimension: '{{ item.dimension }}'
        distanceMetric: '{{ item.distanceMetric }}'
        index: '{{ item.index }}'
        indexArn: '{{ item.indexArn }}'
        indexName: '{{ item.indexName }}'
        metadataConfiguration: '{{ item.metadataConfiguration }}'
  # ── GetVectorBucket ──
  - discovery_id: aws.s3vectors.get_vector_bucket
    calls:
      - action: get_vector_bucket
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.index }}'
      item:
        creationTime: '{{ item.creationTime }}'
        encryptionConfiguration: '{{ item.encryptionConfiguration }}'
        vectorBucket: '{{ item.vectorBucket }}'
        vectorBucketArn: '{{ item.vectorBucketArn }}'
        vectorBucketName: '{{ item.vectorBucketName }}'
  # ── GetVectorBucketPolicy ──
  - discovery_id: aws.s3vectors.get_vector_bucket_policy
    calls:
      - action: get_vector_bucket_policy
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.policy }}'
      item:
        Statement: '{{ item.Statement }}'
        Version: '{{ item.Version }}'
        policy: '{{ item.policy }}'
  # ── ListIndexes ──
  - discovery_id: aws.s3vectors.list_indexes
    calls:
      - action: list_indexes
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.indexes }}'
      item:
        creationTime: '{{ item.creationTime }}'
        index: '{{ item.index }}'
        indexArn: '{{ item.indexArn }}'
        indexName: '{{ item.indexName }}'
        vectorBucketName: '{{ item.vectorBucketName }}'
  # ── ListVectorBuckets ──
  - discovery_id: aws.s3vectors.list_vector_buckets
    calls:
      - action: list_vector_buckets
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.vectorBuckets }}'
      item:
        creationTime: '{{ item.creationTime }}'
        vectorBucket: '{{ item.vectorBucket }}'
        vectorBucketArn: '{{ item.vectorBucketArn }}'
        vectorBucketName: '{{ item.vectorBucketName }}'
  # ── ListVectors ──
  - discovery_id: aws.s3vectors.list_vectors
    calls:
      - action: list_vectors
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.vectors }}'
      item:
        data: '{{ item.data }}'
        key: '{{ item.key }}'
        metadata: '{{ item.metadata }}'
        vectors: '{{ item.vectors }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetVectors ──
  - discovery_id: aws.s3vectors.get_vectors
    calls:
      - action: get_vectors
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.vectors }}'
      item:
        data: '{{ item.data }}'
        key: '{{ item.key }}'
        metadata: '{{ item.metadata }}'
  # ── QueryVectors ──
  - discovery_id: aws.s3vectors.query_vectors
    calls:
      - action: query_vectors
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.vectors }}'
