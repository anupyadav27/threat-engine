  # ── DescribeSolution ──
  - discovery_id: aws.personalize.describe_solution
    for_each: aws.personalize.list_solutions
    calls:
      - action: describe_solution
        params:
          solutionArn: '{{ item.solutionArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.solution }}'
      item:
        autoMLResult: '{{ item.autoMLResult }}'
        creationDateTime: '{{ item.creationDateTime }}'
        datasetGroupArn: '{{ item.datasetGroupArn }}'
        eventType: '{{ item.eventType }}'
        lastUpdatedDateTime: '{{ item.lastUpdatedDateTime }}'
        latestSolutionUpdate: '{{ item.latestSolutionUpdate }}'
        latestSolutionVersion: '{{ item.latestSolutionVersion }}'
        name: '{{ item.name }}'
        performAutoML: '{{ item.performAutoML }}'
        performAutoTraining: '{{ item.performAutoTraining }}'
        performHPO: '{{ item.performHPO }}'
        recipeArn: '{{ item.recipeArn }}'
        solutionArn: '{{ item.solutionArn }}'
        solutionConfig: '{{ item.solutionConfig }}'
        solutionVersion: '{{ item.solutionVersion }}'
        status: '{{ item.status }}'
  # ── DescribeSolutionVersion ──
  - discovery_id: aws.personalize.describe_solution_version
    for_each: aws.personalize.list_batch_inference_jobs
    calls:
      - action: describe_solution_version
        params:
          solutionVersionArn: '{{ item.solutionVersionArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.batchInferenceJobs }}'
      item:
        creationDateTime: '{{ item.creationDateTime }}'
        datasetGroupArn: '{{ item.datasetGroupArn }}'
        eventType: '{{ item.eventType }}'
        failureReason: '{{ item.failureReason }}'
        lastUpdatedDateTime: '{{ item.lastUpdatedDateTime }}'
        name: '{{ item.name }}'
        performAutoML: '{{ item.performAutoML }}'
        performHPO: '{{ item.performHPO }}'
        recipeArn: '{{ item.recipeArn }}'
        solutionArn: '{{ item.solutionArn }}'
        solutionConfig: '{{ item.solutionConfig }}'
        solutionVersion: '{{ item.solutionVersion }}'
        solutionVersionArn: '{{ item.solutionVersionArn }}'
        status: '{{ item.status }}'
        trainingHours: '{{ item.trainingHours }}'
        trainingMode: '{{ item.trainingMode }}'
        trainingType: '{{ item.trainingType }}'
        tunedHPOParams: '{{ item.tunedHPOParams }}'
  # ── GetSolutionMetrics ──
  - discovery_id: aws.personalize.get_solution_metrics
    for_each: aws.personalize.list_batch_inference_jobs
    calls:
      - action: get_solution_metrics
        params:
          solutionVersionArn: '{{ item.solutionVersionArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        metrics: '{{ response.metrics }}'
        solutionVersionArn: '{{ response.solutionVersionArn }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.personalize.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.tags }}'
      item:
        tagKey: '{{ item.tagKey }}'
        tagValue: '{{ item.tagValue }}'
