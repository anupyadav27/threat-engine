# ============================================================
# Discovery YAML — pipes (AWS)
# Generated: 2026-02-21T04:56:59Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: pipes
services:
  client: pipes
  module: boto3.client
discovery:
  # ── ListPipes ──
  - discovery_id: aws.pipes.list_pipes
    calls:
      - action: list_pipes
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Pipes }}'
      item:
        Arn: '{{ item.Arn }}'
        CreationTime: '{{ item.CreationTime }}'
        LastModifiedTime: '{{ item.LastModifiedTime }}'
        Name: '{{ item.Name }}'
        CurrentState: '{{ item.CurrentState }}'
        Description: '{{ item.Description }}'
        DesiredState: '{{ item.DesiredState }}'
        Enrichment: '{{ item.Enrichment }}'
        Source: '{{ item.Source }}'
        StateReason: '{{ item.StateReason }}'
        Target: '{{ item.Target }}'
  # ── Dependent read operations (require identifiers) ──
  # ── DescribePipe ──
  - discovery_id: aws.pipes.describe_pipe
    for_each: aws.pipes.list_pipes
    calls:
      - action: describe_pipe
        params:
          Name: '{{ item.Name }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.SourceParameters }}'
      item:
        Status: '{{ item.Status }}'
        ActiveMQBrokerParameters: '{{ item.ActiveMQBrokerParameters }}'
        Description: '{{ item.Description }}'
        DynamoDBStreamParameters: '{{ item.DynamoDBStreamParameters }}'
        Enabled: '{{ item.Enabled }}'
        FilterCriteria: '{{ item.FilterCriteria }}'
        KinesisStreamParameters: '{{ item.KinesisStreamParameters }}'
        ManagedStreamingKafkaParameters: '{{ item.ManagedStreamingKafkaParameters }}'
        RabbitMQBrokerParameters: '{{ item.RabbitMQBrokerParameters }}'
        SelfManagedKafkaParameters: '{{ item.SelfManagedKafkaParameters }}'
        SqsQueueParameters: '{{ item.SqsQueueParameters }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.pipes.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        tags: '{{ response.tags }}'
