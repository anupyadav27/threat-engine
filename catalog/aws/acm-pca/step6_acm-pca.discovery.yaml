# ============================================================
# Discovery YAML — acm-pca (AWS)
# Generated: 2026-02-21T04:56:57Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: acm-pca
services:
  client: acm-pca
  module: boto3.client
discovery:
  # ── ListCertificateAuthorities ──
  - discovery_id: aws.acm-pca.list_certificate_authorities
    calls:
      - action: list_certificate_authorities
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.CertificateAuthorities }}'
      item:
        Arn: '{{ item.Arn }}'
        Status: '{{ item.Status }}'
        Certificate: '{{ item.Certificate }}'
        CertificateAuthorityConfiguration: '{{ item.CertificateAuthorityConfiguration }}'
        CreatedAt: '{{ item.CreatedAt }}'
        Enabled: '{{ item.Enabled }}'
        FailureReason: '{{ item.FailureReason }}'
        KeyStorageSecurityStandard: '{{ item.KeyStorageSecurityStandard }}'
        LastStateChangeAt: '{{ item.LastStateChangeAt }}'
        NotAfter: '{{ item.NotAfter }}'
        NotBefore: '{{ item.NotBefore }}'
        OwnerAccount: '{{ item.OwnerAccount }}'
        RestorableUntil: '{{ item.RestorableUntil }}'
        RevocationConfiguration: '{{ item.RevocationConfiguration }}'
        Serial: '{{ item.Serial }}'
        Type: '{{ item.Type }}'
        UsageMode: '{{ item.UsageMode }}'
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeCertificateAuthority ──
  - discovery_id: aws.acm-pca.describe_certificate_authority
    for_each: aws.acm-pca.list_certificate_authorities
    calls:
      - action: describe_certificate_authority
        params:
          CertificateAuthorityArn: '{{ item.CertificateAuthorityArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.CertificateAuthorities }}'
      item:
        Arn: '{{ item.Arn }}'
        Status: '{{ item.Status }}'
        CertificateAuthorityConfiguration: '{{ item.CertificateAuthorityConfiguration }}'
        CreatedAt: '{{ item.CreatedAt }}'
        FailureReason: '{{ item.FailureReason }}'
        KeyStorageSecurityStandard: '{{ item.KeyStorageSecurityStandard }}'
        LastStateChangeAt: '{{ item.LastStateChangeAt }}'
        NotAfter: '{{ item.NotAfter }}'
        NotBefore: '{{ item.NotBefore }}'
        OwnerAccount: '{{ item.OwnerAccount }}'
        RestorableUntil: '{{ item.RestorableUntil }}'
        RevocationConfiguration: '{{ item.RevocationConfiguration }}'
        Serial: '{{ item.Serial }}'
        Type: '{{ item.Type }}'
        UsageMode: '{{ item.UsageMode }}'
  # ── DescribeCertificateAuthorityAuditReport ──
  - discovery_id: aws.acm-pca.describe_certificate_authority_audit_report
    for_each: aws.acm-pca.list_certificate_authorities
    calls:
      - action: describe_certificate_authority_audit_report
        params:
          CertificateAuthorityArn: '{{ item.CertificateAuthorityArn }}'
          AuditReportId: '{{ item.AuditReportId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        AuditReportStatus: '{{ response.AuditReportStatus }}'
        CreatedAt: '{{ response.CreatedAt }}'
        S3BucketName: '{{ response.S3BucketName }}'
        S3Key: '{{ response.S3Key }}'
  # ── GetCertificate ──
  - discovery_id: aws.acm-pca.get_certificate
    for_each: aws.acm-pca.list_certificate_authorities
    calls:
      - action: get_certificate
        params:
          CertificateAuthorityArn: '{{ item.CertificateAuthorityArn }}'
          CertificateArn: '{{ item.CertificateArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.NextToken }}'
      item:
        Certificate: '{{ item.Certificate }}'
  # ── GetCertificateAuthorityCertificate ──
  - discovery_id: aws.acm-pca.get_certificate_authority_certificate
    for_each: aws.acm-pca.list_certificate_authorities
    calls:
      - action: get_certificate_authority_certificate
        params:
          CertificateAuthorityArn: '{{ item.CertificateAuthorityArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        Certificate: '{{ response.Certificate }}'
        CertificateChain: '{{ response.CertificateChain }}'
  # ── GetCertificateAuthorityCsr ──
  - discovery_id: aws.acm-pca.get_certificate_authority_csr
    for_each: aws.acm-pca.list_certificate_authorities
    calls:
      - action: get_certificate_authority_csr
        params:
          CertificateAuthorityArn: '{{ item.CertificateAuthorityArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Csr }}'
      item:
        Csr: '{{ item.Csr }}'
  # ── GetPolicy ──
  - discovery_id: aws.acm-pca.get_policy
    calls:
      - action: get_policy
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Policy }}'
      item:
        Statement: '{{ item.Statement }}'
        Version: '{{ item.Version }}'
  # ── ListPermissions ──
  - discovery_id: aws.acm-pca.list_permissions
    for_each: aws.acm-pca.list_certificate_authorities
    calls:
      - action: list_permissions
        params:
          CertificateAuthorityArn: '{{ item.CertificateAuthorityArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Permissions }}'
      item:
        Policy: '{{ item.Policy }}'
        Actions: '{{ item.Actions }}'
        CertificateAuthorityArn: '{{ item.CertificateAuthorityArn }}'
        CreatedAt: '{{ item.CreatedAt }}'
        Principal: '{{ item.Principal }}'
        SourceAccount: '{{ item.SourceAccount }}'
  # ── ListTags ──
  - discovery_id: aws.acm-pca.list_tags
    for_each: aws.acm-pca.list_certificate_authorities
    calls:
      - action: list_tags
        params:
          CertificateAuthorityArn: '{{ item.CertificateAuthorityArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Tags }}'
      item:
        Key: '{{ item.Key }}'
        Value: '{{ item.Value }}'
