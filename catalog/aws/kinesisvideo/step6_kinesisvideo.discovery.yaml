# ============================================================
# Discovery YAML — kinesisvideo (AWS)
# Generated: 2026-02-21T04:56:58Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: kinesisvideo
services:
  client: kinesisvideo
  module: boto3.client
discovery:
  # ── DescribeEdgeConfiguration ──
  - discovery_id: aws.kinesisvideo.describe_edge_configuration
    calls:
      - action: describe_edge_configuration
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.EdgeConfig }}'
      item:
        DeletionConfig: '{{ item.DeletionConfig }}'
        EdgeAgentStatus: '{{ item.EdgeAgentStatus }}'
        HubDeviceArn: '{{ item.HubDeviceArn }}'
        RecorderConfig: '{{ item.RecorderConfig }}'
        UploaderConfig: '{{ item.UploaderConfig }}'
  # ── DescribeImageGenerationConfiguration ──
  - discovery_id: aws.kinesisvideo.describe_image_generation_configuration
    calls:
      - action: describe_image_generation_configuration
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ImageGenerationConfiguration }}'
      item:
        Status: '{{ item.Status }}'
        DestinationConfig: '{{ item.DestinationConfig }}'
        Enabled: '{{ item.Enabled }}'
        Format: '{{ item.Format }}'
        FormatConfig: '{{ item.FormatConfig }}'
        HeightPixels: '{{ item.HeightPixels }}'
        ImageGenerationConfiguration: '{{ item.ImageGenerationConfiguration }}'
        ImageSelectorType: '{{ item.ImageSelectorType }}'
        SamplingInterval: '{{ item.SamplingInterval }}'
        WidthPixels: '{{ item.WidthPixels }}'
  # ── DescribeMappedResourceConfiguration ──
  - discovery_id: aws.kinesisvideo.describe_mapped_resource_configuration
    calls:
      - action: describe_mapped_resource_configuration
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.MappedResourceConfigurationList }}'
      item:
        ARN: '{{ item.ARN }}'
        MappedResourceConfigurationList: '{{ item.MappedResourceConfigurationList }}'
        Type: '{{ item.Type }}'
  # ── DescribeMediaStorageConfiguration ──
  - discovery_id: aws.kinesisvideo.describe_media_storage_configuration
    calls:
      - action: describe_media_storage_configuration
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.StreamName }}'
      item:
        Status: '{{ item.Status }}'
        MediaStorageConfiguration: '{{ item.MediaStorageConfiguration }}'
        StreamARN: '{{ item.StreamARN }}'
  # ── DescribeNotificationConfiguration ──
  - discovery_id: aws.kinesisvideo.describe_notification_configuration
    calls:
      - action: describe_notification_configuration
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ImageGenerationConfiguration }}'
      item:
        Status: '{{ item.Status }}'
        DestinationConfig: '{{ item.DestinationConfig }}'
        NotificationConfiguration: '{{ item.NotificationConfiguration }}'
  # ── DescribeSignalingChannel ──
  - discovery_id: aws.kinesisvideo.describe_signaling_channel
    calls:
      - action: describe_signaling_channel
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ChannelInfo }}'
      item:
        CreationTime: '{{ item.CreationTime }}'
        ChannelARN: '{{ item.ChannelARN }}'
        ChannelInfo: '{{ item.ChannelInfo }}'
        ChannelName: '{{ item.ChannelName }}'
        SingleMasterConfiguration: '{{ item.SingleMasterConfiguration }}'
        Version: '{{ item.Version }}'
  # ── DescribeStream ──
  - discovery_id: aws.kinesisvideo.describe_stream
    calls:
      - action: describe_stream
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ChannelInfo }}'
      item:
        CreationTime: '{{ item.CreationTime }}'
        KmsKeyId: '{{ item.KmsKeyId }}'
        Status: '{{ item.Status }}'
        DataRetentionInHours: '{{ item.DataRetentionInHours }}'
        DeviceName: '{{ item.DeviceName }}'
        MediaType: '{{ item.MediaType }}'
        StreamARN: '{{ item.StreamARN }}'
        StreamInfo: '{{ item.StreamInfo }}'
        StreamName: '{{ item.StreamName }}'
        Version: '{{ item.Version }}'
  # ── DescribeStreamStorageConfiguration ──
  - discovery_id: aws.kinesisvideo.describe_stream_storage_configuration
    calls:
      - action: describe_stream_storage_configuration
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.StreamStorageConfiguration }}'
      item:
        DefaultStorageTier: '{{ item.DefaultStorageTier }}'
        MediaStorageConfiguration: '{{ item.MediaStorageConfiguration }}'
        StreamStorageConfiguration: '{{ item.StreamStorageConfiguration }}'
  # ── ListSignalingChannels ──
  - discovery_id: aws.kinesisvideo.list_signaling_channels
    calls:
      - action: list_signaling_channels
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ChannelInfoList }}'
      item:
        CreationTime: '{{ item.CreationTime }}'
        ChannelARN: '{{ item.ChannelARN }}'
        ChannelInfo: '{{ item.ChannelInfo }}'
        ChannelName: '{{ item.ChannelName }}'
        ChannelStatus: '{{ item.ChannelStatus }}'
        ChannelType: '{{ item.ChannelType }}'
        SingleMasterConfiguration: '{{ item.SingleMasterConfiguration }}'
        Version: '{{ item.Version }}'
  # ── ListStreams ──
  - discovery_id: aws.kinesisvideo.list_streams
    calls:
      - action: list_streams
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.StreamInfoList }}'
      item:
        CreationTime: '{{ item.CreationTime }}'
        KmsKeyId: '{{ item.KmsKeyId }}'
        Status: '{{ item.Status }}'
        DataRetentionInHours: '{{ item.DataRetentionInHours }}'
        DeviceName: '{{ item.DeviceName }}'
        MediaType: '{{ item.MediaType }}'
        StreamARN: '{{ item.StreamARN }}'
        StreamInfo: '{{ item.StreamInfo }}'
        StreamName: '{{ item.StreamName }}'
        Version: '{{ item.Version }}'
  # ── ListTagsForStream ──
  - discovery_id: aws.kinesisvideo.list_tags_for_stream
    calls:
      - action: list_tags_for_stream
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        Tags: '{{ response.Tags }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetDataEndpoint ──
  - discovery_id: aws.kinesisvideo.get_data_endpoint
    calls:
      - action: get_data_endpoint
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        DataEndpoint: '{{ response.DataEndpoint }}'
  # ── GetSignalingChannelEndpoint ──
  - discovery_id: aws.kinesisvideo.get_signaling_channel_endpoint
    for_each: aws.kinesisvideo.describe_signaling_channel
    calls:
      - action: get_signaling_channel_endpoint
        params:
          ChannelARN: '{{ item.ChannelARN }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ResourceEndpointList }}'
      item:
        Protocol: '{{ item.Protocol }}'
        ResourceEndpoint: '{{ item.ResourceEndpoint }}'
  # ── ListEdgeAgentConfigurations ──
  - discovery_id: aws.kinesisvideo.list_edge_agent_configurations
    for_each: aws.kinesisvideo.describe_edge_configuration
    calls:
      - action: list_edge_agent_configurations
        params:
          HubDeviceArn: '{{ item.HubDeviceArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.EdgeConfigs }}'
      item:
        CreationTime: '{{ item.CreationTime }}'
        EdgeConfig: '{{ item.EdgeConfig }}'
        FailedStatusDetails: '{{ item.FailedStatusDetails }}'
        LastUpdatedTime: '{{ item.LastUpdatedTime }}'
        StreamARN: '{{ item.StreamARN }}'
        StreamName: '{{ item.StreamName }}'
        SyncStatus: '{{ item.SyncStatus }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.kinesisvideo.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        Tags: '{{ response.Tags }}'
