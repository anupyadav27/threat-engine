# ============================================================
# Discovery YAML — cognito-identity (AWS)
# Generated: 2026-02-21T04:56:57Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: cognito-identity
services:
  client: cognito-identity
  module: boto3.client
discovery:
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeIdentity ──
  - discovery_id: aws.cognito-identity.describe_identity
    calls:
      - action: describe_identity
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Logins }}'
  # ── DescribeIdentityPool ──
  - discovery_id: aws.cognito-identity.describe_identity_pool
    calls:
      - action: describe_identity_pool
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.OpenIdConnectProviderARNs }}'
  # ── GetCredentialsForIdentity ──
  - discovery_id: aws.cognito-identity.get_credentials_for_identity
    calls:
      - action: get_credentials_for_identity
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Credentials }}'
      item:
        AccessKeyId: '{{ item.AccessKeyId }}'
        Credentials: '{{ item.Credentials }}'
        Expiration: '{{ item.Expiration }}'
        SecretKey: '{{ item.SecretKey }}'
        SessionToken: '{{ item.SessionToken }}'
  # ── GetId ──
  - discovery_id: aws.cognito-identity.get_id
    calls:
      - action: get_id
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        IdentityId: '{{ response.IdentityId }}'
  # ── GetIdentityPoolRoles ──
  - discovery_id: aws.cognito-identity.get_identity_pool_roles
    calls:
      - action: get_identity_pool_roles
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        IdentityPoolId: '{{ response.IdentityPoolId }}'
        RoleMappings: '{{ response.RoleMappings }}'
        Roles: '{{ response.Roles }}'
  # ── GetOpenIdToken ──
  - discovery_id: aws.cognito-identity.get_open_id_token
    calls:
      - action: get_open_id_token
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        IdentityId: '{{ response.IdentityId }}'
        Token: '{{ response.Token }}'
  # ── GetOpenIdTokenForDeveloperIdentity ──
  - discovery_id: aws.cognito-identity.get_open_id_token_for_developer_identity
    calls:
      - action: get_open_id_token_for_developer_identity
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        IdentityId: '{{ response.IdentityId }}'
        Token: '{{ response.Token }}'
  # ── GetPrincipalTagAttributeMap ──
  - discovery_id: aws.cognito-identity.get_principal_tag_attribute_map
    calls:
      - action: get_principal_tag_attribute_map
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        IdentityPoolId: '{{ response.IdentityPoolId }}'
        IdentityProviderName: '{{ response.IdentityProviderName }}'
        PrincipalTags: '{{ response.PrincipalTags }}'
        UseDefaults: '{{ response.UseDefaults }}'
  # ── ListIdentities ──
  - discovery_id: aws.cognito-identity.list_identities
    calls:
      - action: list_identities
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Identities }}'
      item:
        CreationDate: '{{ item.CreationDate }}'
        IdentityId: '{{ item.IdentityId }}'
        LastModifiedDate: '{{ item.LastModifiedDate }}'
        Logins: '{{ item.Logins }}'
  # ── ListIdentityPools ──
  - discovery_id: aws.cognito-identity.list_identity_pools
    calls:
      - action: list_identity_pools
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.IdentityPools }}'
      item:
        IdentityPoolId: '{{ item.IdentityPoolId }}'
        IdentityPoolName: '{{ item.IdentityPoolName }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.cognito-identity.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        Tags: '{{ response.Tags }}'
