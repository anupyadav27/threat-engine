# ============================================================
# Discovery YAML — route53-recovery-control-config (AWS)
# Generated: 2026-02-21T04:56:59Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: route53-recovery-control-config
services:
  client: route53-recovery-control-config
  module: boto3.client
discovery:
  # ── ListClusters ──
  - discovery_id: aws.route53-recovery-control-config.list_clusters
    calls:
      - action: list_clusters
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Clusters }}'
      item:
        Name: '{{ item.Name }}'
        Status: '{{ item.Status }}'
        ClusterArn: '{{ item.ClusterArn }}'
        ClusterEndpoints: '{{ item.ClusterEndpoints }}'
        NetworkType: '{{ item.NetworkType }}'
        Owner: '{{ item.Owner }}'
  # ── ListControlPanels ──
  - discovery_id: aws.route53-recovery-control-config.list_control_panels
    calls:
      - action: list_control_panels
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ControlPanels }}'
      item:
        Name: '{{ item.Name }}'
        Status: '{{ item.Status }}'
        ClusterArn: '{{ item.ClusterArn }}'
        ControlPanelArn: '{{ item.ControlPanelArn }}'
        DefaultControlPanel: '{{ item.DefaultControlPanel }}'
        Owner: '{{ item.Owner }}'
        RoutingControlCount: '{{ item.RoutingControlCount }}'
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeCluster ──
  - discovery_id: aws.route53-recovery-control-config.describe_cluster
    for_each: aws.route53-recovery-control-config.list_clusters
    calls:
      - action: describe_cluster
        params:
          ClusterArn: '{{ item.ClusterArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Clusters }}'
      item:
        Name: '{{ item.Name }}'
        Status: '{{ item.Status }}'
        ClusterArn: '{{ item.ClusterArn }}'
        ClusterEndpoints: '{{ item.ClusterEndpoints }}'
        NetworkType: '{{ item.NetworkType }}'
        Owner: '{{ item.Owner }}'
  # ── DescribeControlPanel ──
  - discovery_id: aws.route53-recovery-control-config.describe_control_panel
    for_each: aws.route53-recovery-control-config.list_control_panels
    calls:
      - action: describe_control_panel
        params:
          ControlPanelArn: '{{ item.ControlPanelArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Clusters }}'
      item:
        Name: '{{ item.Name }}'
        Status: '{{ item.Status }}'
        ClusterArn: '{{ item.ClusterArn }}'
        ControlPanelArn: '{{ item.ControlPanelArn }}'
        DefaultControlPanel: '{{ item.DefaultControlPanel }}'
        Owner: '{{ item.Owner }}'
        RoutingControlCount: '{{ item.RoutingControlCount }}'
  # ── DescribeRoutingControl ──
  - discovery_id: aws.route53-recovery-control-config.describe_routing_control
    calls:
      - action: describe_routing_control
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ControlPanels }}'
      item:
        Name: '{{ item.Name }}'
        Status: '{{ item.Status }}'
        ControlPanelArn: '{{ item.ControlPanelArn }}'
        Owner: '{{ item.Owner }}'
        RoutingControlArn: '{{ item.RoutingControlArn }}'
  # ── DescribeSafetyRule ──
  - discovery_id: aws.route53-recovery-control-config.describe_safety_rule
    calls:
      - action: describe_safety_rule
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.AssertionRule }}'
      item:
        Name: '{{ item.Name }}'
        Status: '{{ item.Status }}'
        AssertedControls: '{{ item.AssertedControls }}'
        ControlPanelArn: '{{ item.ControlPanelArn }}'
        Owner: '{{ item.Owner }}'
        RuleConfig: '{{ item.RuleConfig }}'
        SafetyRuleArn: '{{ item.SafetyRuleArn }}'
        WaitPeriodMs: '{{ item.WaitPeriodMs }}'
  # ── GetResourcePolicy ──
  - discovery_id: aws.route53-recovery-control-config.get_resource_policy
    calls:
      - action: get_resource_policy
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Policy }}'
      item:
        Policy: '{{ item.Policy }}'
        Statement: '{{ item.Statement }}'
        Version: '{{ item.Version }}'
  # ── ListAssociatedRoute53HealthChecks ──
  - discovery_id: aws.route53-recovery-control-config.list_associated_route53_health_checks
    calls:
      - action: list_associated_route53_health_checks
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.HealthCheckIds }}'
  # ── ListRoutingControls ──
  - discovery_id: aws.route53-recovery-control-config.list_routing_controls
    for_each: aws.route53-recovery-control-config.list_control_panels
    calls:
      - action: list_routing_controls
        params:
          ControlPanelArn: '{{ item.ControlPanelArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.RoutingControls }}'
      item:
        Name: '{{ item.Name }}'
        Status: '{{ item.Status }}'
        ControlPanelArn: '{{ item.ControlPanelArn }}'
        Owner: '{{ item.Owner }}'
        RoutingControlArn: '{{ item.RoutingControlArn }}'
  # ── ListSafetyRules ──
  - discovery_id: aws.route53-recovery-control-config.list_safety_rules
    for_each: aws.route53-recovery-control-config.list_control_panels
    calls:
      - action: list_safety_rules
        params:
          ControlPanelArn: '{{ item.ControlPanelArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.SafetyRules }}'
      item:
        ASSERTION: '{{ item.ASSERTION }}'
        GATING: '{{ item.GATING }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.route53-recovery-control-config.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        Tags: '{{ response.Tags }}'
