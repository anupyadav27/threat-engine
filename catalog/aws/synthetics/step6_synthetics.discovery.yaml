# ============================================================
# Discovery YAML — synthetics (AWS)
# Generated: 2026-02-21T04:57:00Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: synthetics
services:
  client: synthetics
  module: boto3.client
discovery:
  # ── DescribeCanaries ──
  - discovery_id: aws.synthetics.describe_canaries
    calls:
      - action: describe_canaries
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Canaries }}'
      item:
        ExecutionRoleArn: '{{ item.ExecutionRoleArn }}'
        Id: '{{ item.Id }}'
        Name: '{{ item.Name }}'
        SecurityGroupIds: '{{ item.SecurityGroupIds }}'
        Status: '{{ item.Status }}'
        SubnetIds: '{{ item.SubnetIds }}'
        Tags: '{{ item.Tags }}'
        VpcConfig: '{{ item.VpcConfig }}'
        ArtifactConfig: '{{ item.ArtifactConfig }}'
        ArtifactS3Location: '{{ item.ArtifactS3Location }}'
        BrowserConfigs: '{{ item.BrowserConfigs }}'
        Canaries: '{{ item.Canaries }}'
        Canary: '{{ item.Canary }}'
        Code: '{{ item.Code }}'
        DryRunConfig: '{{ item.DryRunConfig }}'
        EngineArn: '{{ item.EngineArn }}'
        EngineConfigs: '{{ item.EngineConfigs }}'
        FailureRetentionPeriodInDays: '{{ item.FailureRetentionPeriodInDays }}'
        ProvisionedResourceCleanup: '{{ item.ProvisionedResourceCleanup }}'
        RunConfig: '{{ item.RunConfig }}'
        RuntimeVersion: '{{ item.RuntimeVersion }}'
        Schedule: '{{ item.Schedule }}'
        SuccessRetentionPeriodInDays: '{{ item.SuccessRetentionPeriodInDays }}'
        Timeline: '{{ item.Timeline }}'
        VisualReference: '{{ item.VisualReference }}'
        VisualReferences: '{{ item.VisualReferences }}'
  # ── DescribeCanariesLastRun ──
  - discovery_id: aws.synthetics.describe_canaries_last_run
    calls:
      - action: describe_canaries_last_run
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.CanariesLastRun }}'
      item:
        CanariesLastRun: '{{ item.CanariesLastRun }}'
        CanaryName: '{{ item.CanaryName }}'
        LastRun: '{{ item.LastRun }}'
  # ── DescribeRuntimeVersions ──
  - discovery_id: aws.synthetics.describe_runtime_versions
    calls:
      - action: describe_runtime_versions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.RuntimeVersions }}'
      item:
        DeprecationDate: '{{ item.DeprecationDate }}'
        Description: '{{ item.Description }}'
        ReleaseDate: '{{ item.ReleaseDate }}'
        RuntimeVersions: '{{ item.RuntimeVersions }}'
        VersionName: '{{ item.VersionName }}'
  # ── ListGroups ──
  - discovery_id: aws.synthetics.list_groups
    calls:
      - action: list_groups
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Groups }}'
      item:
        Arn: '{{ item.Arn }}'
        Id: '{{ item.Id }}'
        Name: '{{ item.Name }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetCanary ──
  - discovery_id: aws.synthetics.get_canary
    for_each: aws.synthetics.describe_canaries
    calls:
      - action: get_canary
        params:
          Name: '{{ item.Name }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Canaries }}'
      item:
        ExecutionRoleArn: '{{ item.ExecutionRoleArn }}'
        Id: '{{ item.Id }}'
        Name: '{{ item.Name }}'
        Status: '{{ item.Status }}'
        Tags: '{{ item.Tags }}'
        VpcConfig: '{{ item.VpcConfig }}'
        ArtifactConfig: '{{ item.ArtifactConfig }}'
        ArtifactS3Location: '{{ item.ArtifactS3Location }}'
        BrowserConfigs: '{{ item.BrowserConfigs }}'
        Code: '{{ item.Code }}'
        DryRunConfig: '{{ item.DryRunConfig }}'
        EngineArn: '{{ item.EngineArn }}'
        EngineConfigs: '{{ item.EngineConfigs }}'
        FailureRetentionPeriodInDays: '{{ item.FailureRetentionPeriodInDays }}'
        ProvisionedResourceCleanup: '{{ item.ProvisionedResourceCleanup }}'
        RunConfig: '{{ item.RunConfig }}'
        RuntimeVersion: '{{ item.RuntimeVersion }}'
        Schedule: '{{ item.Schedule }}'
        SuccessRetentionPeriodInDays: '{{ item.SuccessRetentionPeriodInDays }}'
        Timeline: '{{ item.Timeline }}'
        VisualReference: '{{ item.VisualReference }}'
        VisualReferences: '{{ item.VisualReferences }}'
  # ── GetCanaryRuns ──
  - discovery_id: aws.synthetics.get_canary_runs
    for_each: aws.synthetics.describe_canaries
    calls:
      - action: get_canary_runs
        params:
          Name: '{{ item.Name }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.CanaryRuns }}'
      item:
        Id: '{{ item.Id }}'
        Name: '{{ item.Name }}'
        Status: '{{ item.Status }}'
        ArtifactS3Location: '{{ item.ArtifactS3Location }}'
        BrowserType: '{{ item.BrowserType }}'
        DryRunConfig: '{{ item.DryRunConfig }}'
        RetryAttempt: '{{ item.RetryAttempt }}'
        ScheduledRunId: '{{ item.ScheduledRunId }}'
        Timeline: '{{ item.Timeline }}'
  # ── GetGroup ──
  - discovery_id: aws.synthetics.get_group
    calls:
      - action: get_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Groups }}'
      item:
        Arn: '{{ item.Arn }}'
        Id: '{{ item.Id }}'
        LastModifiedTime: '{{ item.LastModifiedTime }}'
        Name: '{{ item.Name }}'
        Tags: '{{ item.Tags }}'
        CreatedTime: '{{ item.CreatedTime }}'
  # ── ListAssociatedGroups ──
  - discovery_id: aws.synthetics.list_associated_groups
    calls:
      - action: list_associated_groups
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Groups }}'
      item:
        Arn: '{{ item.Arn }}'
        Id: '{{ item.Id }}'
        Name: '{{ item.Name }}'
  # ── ListGroupResources ──
  - discovery_id: aws.synthetics.list_group_resources
    calls:
      - action: list_group_resources
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Resources }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.synthetics.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        Tags: '{{ response.Tags }}'
