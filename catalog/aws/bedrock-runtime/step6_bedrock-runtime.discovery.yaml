# ============================================================
# Discovery YAML — bedrock-runtime (AWS)
# Generated: 2026-02-21T04:56:57Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: bedrock-runtime
services:
  client: bedrock-runtime
  module: boto3.client
discovery:
  # ── ListAsyncInvokes ──
  - discovery_id: aws.bedrock-runtime.list_async_invokes
    calls:
      - action: list_async_invokes
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.asyncInvokeSummaries }}'
      item:
        clientRequestToken: '{{ item.clientRequestToken }}'
        endTime: '{{ item.endTime }}'
        failureMessage: '{{ item.failureMessage }}'
        invocationArn: '{{ item.invocationArn }}'
        lastModifiedTime: '{{ item.lastModifiedTime }}'
        modelArn: '{{ item.modelArn }}'
        outputDataConfig: '{{ item.outputDataConfig }}'
        s3OutputDataConfig: '{{ item.s3OutputDataConfig }}'
        status: '{{ item.status }}'
        submitTime: '{{ item.submitTime }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetAsyncInvoke ──
  - discovery_id: aws.bedrock-runtime.get_async_invoke
    for_each: aws.bedrock-runtime.list_async_invokes
    calls:
      - action: get_async_invoke
        params:
          invocationArn: '{{ item.invocationArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.outputDataConfig }}'
      item:
        s3OutputDataConfig: '{{ item.s3OutputDataConfig }}'
