# ============================================================
# Discovery YAML — apprunner (AWS)
# Generated: 2026-02-21T04:56:57Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: apprunner
services:
  client: apprunner
  module: boto3.client
discovery:
  # ── ListAutoScalingConfigurations ──
  - discovery_id: aws.apprunner.list_auto_scaling_configurations
    calls:
      - action: list_auto_scaling_configurations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.AutoScalingConfigurationSummaryList }}'
      item:
        Status: '{{ item.Status }}'
        AutoScalingConfiguration: '{{ item.AutoScalingConfiguration }}'
        AutoScalingConfigurationArn: '{{ item.AutoScalingConfigurationArn }}'
        AutoScalingConfigurationName: '{{ item.AutoScalingConfigurationName }}'
        AutoScalingConfigurationRevision: '{{ item.AutoScalingConfigurationRevision }}'
        CreatedAt: '{{ item.CreatedAt }}'
        Enabled: '{{ item.Enabled }}'
        HasAssociatedService: '{{ item.HasAssociatedService }}'
        IsDefault: '{{ item.IsDefault }}'
  # ── ListConnections ──
  - discovery_id: aws.apprunner.list_connections
    calls:
      - action: list_connections
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ConnectionSummaryList }}'
      item:
        Status: '{{ item.Status }}'
        ConnectionArn: '{{ item.ConnectionArn }}'
        ConnectionName: '{{ item.ConnectionName }}'
        CreatedAt: '{{ item.CreatedAt }}'
        ProviderType: '{{ item.ProviderType }}'
  # ── ListObservabilityConfigurations ──
  - discovery_id: aws.apprunner.list_observability_configurations
    calls:
      - action: list_observability_configurations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ObservabilityConfigurationSummaryList }}'
      item:
        ObservabilityConfigurationArn: '{{ item.ObservabilityConfigurationArn }}'
        ObservabilityConfigurationName: '{{ item.ObservabilityConfigurationName }}'
        ObservabilityConfigurationRevision: '{{ item.ObservabilityConfigurationRevision }}'
  # ── ListServices ──
  - discovery_id: aws.apprunner.list_services
    calls:
      - action: list_services
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ServiceSummaryList }}'
      item:
        Status: '{{ item.Status }}'
        CreatedAt: '{{ item.CreatedAt }}'
        ServiceArn: '{{ item.ServiceArn }}'
        ServiceId: '{{ item.ServiceId }}'
        ServiceName: '{{ item.ServiceName }}'
        ServiceUrl: '{{ item.ServiceUrl }}'
        UpdatedAt: '{{ item.UpdatedAt }}'
  # ── ListVpcConnectors ──
  - discovery_id: aws.apprunner.list_vpc_connectors
    calls:
      - action: list_vpc_connectors
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.VpcConnectors }}'
      item:
        SecurityGroups: '{{ item.SecurityGroups }}'
        Status: '{{ item.Status }}'
        CreatedAt: '{{ item.CreatedAt }}'
        DeletedAt: '{{ item.DeletedAt }}'
        Subnets: '{{ item.Subnets }}'
        VpcConnectorArn: '{{ item.VpcConnectorArn }}'
        VpcConnectorName: '{{ item.VpcConnectorName }}'
        VpcConnectorRevision: '{{ item.VpcConnectorRevision }}'
  # ── ListVpcIngressConnections ──
  - discovery_id: aws.apprunner.list_vpc_ingress_connections
    calls:
      - action: list_vpc_ingress_connections
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.VpcIngressConnectionSummaryList }}'
      item:
        ServiceArn: '{{ item.ServiceArn }}'
        VpcIngressConnection: '{{ item.VpcIngressConnection }}'
        VpcIngressConnectionArn: '{{ item.VpcIngressConnectionArn }}'
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeAutoScalingConfiguration ──
  - discovery_id: aws.apprunner.describe_auto_scaling_configuration
    for_each: aws.apprunner.list_auto_scaling_configurations
    calls:
      - action: describe_auto_scaling_configuration
        params:
          AutoScalingConfigurationArn: '{{ item.AutoScalingConfigurationArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.AutoScalingConfigurationSummaryList }}'
      item:
        Status: '{{ item.Status }}'
        AutoScalingConfigurationArn: '{{ item.AutoScalingConfigurationArn }}'
        AutoScalingConfigurationName: '{{ item.AutoScalingConfigurationName }}'
        AutoScalingConfigurationRevision: '{{ item.AutoScalingConfigurationRevision }}'
        CreatedAt: '{{ item.CreatedAt }}'
        DeletedAt: '{{ item.DeletedAt }}'
        HasAssociatedService: '{{ item.HasAssociatedService }}'
        IsDefault: '{{ item.IsDefault }}'
        Latest: '{{ item.Latest }}'
        MaxConcurrency: '{{ item.MaxConcurrency }}'
        MaxSize: '{{ item.MaxSize }}'
        MinSize: '{{ item.MinSize }}'
  # ── DescribeCustomDomains ──
  - discovery_id: aws.apprunner.describe_custom_domains
    for_each: aws.apprunner.list_services
    calls:
      - action: describe_custom_domains
        params:
          ServiceArn: '{{ item.ServiceArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.CustomDomains }}'
      item:
        Status: '{{ item.Status }}'
        CertificateValidationRecords: '{{ item.CertificateValidationRecords }}'
        DomainName: '{{ item.DomainName }}'
        EnableWWWSubdomain: '{{ item.EnableWWWSubdomain }}'
  # ── DescribeObservabilityConfiguration ──
  - discovery_id: aws.apprunner.describe_observability_configuration
    for_each: aws.apprunner.list_observability_configurations
    calls:
      - action: describe_observability_configuration
        params:
          ObservabilityConfigurationArn: '{{ item.ObservabilityConfigurationArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.AutoScalingConfigurationSummaryList }}'
      item:
        Status: '{{ item.Status }}'
        CreatedAt: '{{ item.CreatedAt }}'
        DeletedAt: '{{ item.DeletedAt }}'
        Latest: '{{ item.Latest }}'
        ObservabilityConfigurationArn: '{{ item.ObservabilityConfigurationArn }}'
        ObservabilityConfigurationName: '{{ item.ObservabilityConfigurationName }}'
        ObservabilityConfigurationRevision: '{{ item.ObservabilityConfigurationRevision }}'
        TraceConfiguration: '{{ item.TraceConfiguration }}'
  # ── DescribeService ──
  - discovery_id: aws.apprunner.describe_service
    for_each: aws.apprunner.list_services
    calls:
      - action: describe_service
        params:
          ServiceArn: '{{ item.ServiceArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Service }}'
      item:
        Status: '{{ item.Status }}'
        AutoScalingConfigurationSummary: '{{ item.AutoScalingConfigurationSummary }}'
        CreatedAt: '{{ item.CreatedAt }}'
        DeletedAt: '{{ item.DeletedAt }}'
        EncryptionConfiguration: '{{ item.EncryptionConfiguration }}'
        HealthCheckConfiguration: '{{ item.HealthCheckConfiguration }}'
        InstanceConfiguration: '{{ item.InstanceConfiguration }}'
        NetworkConfiguration: '{{ item.NetworkConfiguration }}'
        ObservabilityConfiguration: '{{ item.ObservabilityConfiguration }}'
        ServiceArn: '{{ item.ServiceArn }}'
        ServiceId: '{{ item.ServiceId }}'
        ServiceName: '{{ item.ServiceName }}'
        ServiceUrl: '{{ item.ServiceUrl }}'
        SourceConfiguration: '{{ item.SourceConfiguration }}'
        UpdatedAt: '{{ item.UpdatedAt }}'
  # ── DescribeVpcConnector ──
  - discovery_id: aws.apprunner.describe_vpc_connector
    for_each: aws.apprunner.list_vpc_connectors
    calls:
      - action: describe_vpc_connector
        params:
          VpcConnectorArn: '{{ item.VpcConnectorArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.AutoScalingConfigurationSummaryList }}'
      item:
        SecurityGroups: '{{ item.SecurityGroups }}'
        Status: '{{ item.Status }}'
        CreatedAt: '{{ item.CreatedAt }}'
        DeletedAt: '{{ item.DeletedAt }}'
        Subnets: '{{ item.Subnets }}'
        VpcConnectorArn: '{{ item.VpcConnectorArn }}'
        VpcConnectorName: '{{ item.VpcConnectorName }}'
        VpcConnectorRevision: '{{ item.VpcConnectorRevision }}'
  # ── DescribeVpcIngressConnection ──
  - discovery_id: aws.apprunner.describe_vpc_ingress_connection
    for_each: aws.apprunner.list_vpc_ingress_connections
    calls:
      - action: describe_vpc_ingress_connection
        params:
          VpcIngressConnectionArn: '{{ item.VpcIngressConnectionArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.VpcIngressConnection }}'
      item:
        AccountId: '{{ item.AccountId }}'
        Status: '{{ item.Status }}'
        CreatedAt: '{{ item.CreatedAt }}'
        DeletedAt: '{{ item.DeletedAt }}'
        DomainName: '{{ item.DomainName }}'
        IngressVpcConfiguration: '{{ item.IngressVpcConfiguration }}'
        ServiceArn: '{{ item.ServiceArn }}'
        VpcIngressConnectionArn: '{{ item.VpcIngressConnectionArn }}'
        VpcIngressConnectionName: '{{ item.VpcIngressConnectionName }}'
  # ── ListOperations ──
  - discovery_id: aws.apprunner.list_operations
    for_each: aws.apprunner.list_services
    calls:
      - action: list_operations
        params:
          ServiceArn: '{{ item.ServiceArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.OperationSummaryList }}'
      item:
        Id: '{{ item.Id }}'
        Status: '{{ item.Status }}'
        EndedAt: '{{ item.EndedAt }}'
        StartedAt: '{{ item.StartedAt }}'
        TargetArn: '{{ item.TargetArn }}'
        Type: '{{ item.Type }}'
        UpdatedAt: '{{ item.UpdatedAt }}'
  # ── ListServicesForAutoScalingConfiguration ──
  - discovery_id: aws.apprunner.list_services_for_auto_scaling_configuration
    for_each: aws.apprunner.list_auto_scaling_configurations
    calls:
      - action: list_services_for_auto_scaling_configuration
        params:
          AutoScalingConfigurationArn: '{{ item.AutoScalingConfigurationArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ServiceArnList }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.apprunner.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Tags }}'
      item:
        Key: '{{ item.Key }}'
        Value: '{{ item.Value }}'
