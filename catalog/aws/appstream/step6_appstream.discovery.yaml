version: '1.0'
provider: aws
service: appstream
services:
  client: appstream
  module: boto3.client
discovery:
  # ── DescribeAppBlockBuilderAppBlockAssociations ──
  - discovery_id: aws.appstream.describe_app_block_builder_app_block_associations
    calls:
      - action: describe_app_block_builder_app_block_associations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.AppBlockBuilderAppBlockAssociations }}'
      item:
        Name: '{{ item.Name }}'
        AppBlockArn: '{{ item.AppBlockArn }}'
        AppBlockBuilderAppBlockAssociations: '{{ item.AppBlockBuilderAppBlockAssociations }}'
        AppBlockBuilderName: '{{ item.AppBlockBuilderName }}'
  # ── DescribeAppBlockBuilders ──
  - discovery_id: aws.appstream.describe_app_block_builders
    calls:
      - action: describe_app_block_builders
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.AppBlockBuilders }}'
      item:
        Arn: '{{ item.Arn }}'
        SecurityGroupIds: '{{ item.SecurityGroupIds }}'
        State: '{{ item.State }}'
        SubnetIds: '{{ item.SubnetIds }}'
        VpcConfig: '{{ item.VpcConfig }}'
        AccessEndpoints: '{{ item.AccessEndpoints }}'
        AppBlockBuilderErrors: '{{ item.AppBlockBuilderErrors }}'
        AppBlockBuilders: '{{ item.AppBlockBuilders }}'
        CreatedTime: '{{ item.CreatedTime }}'
        Description: '{{ item.Description }}'
        DisplayName: '{{ item.DisplayName }}'
        EnableDefaultInternetAccess: '{{ item.EnableDefaultInternetAccess }}'
        IamRoleArn: '{{ item.IamRoleArn }}'
        InstanceType: '{{ item.InstanceType }}'
        Platform: '{{ item.Platform }}'
        StateChangeReason: '{{ item.StateChangeReason }}'
  # ── DescribeAppBlocks ──
  - discovery_id: aws.appstream.describe_app_blocks
    calls:
      - action: describe_app_blocks
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.AppBlocks }}'
      item:
        Arn: '{{ item.Arn }}'
        Name: '{{ item.Name }}'
        State: '{{ item.State }}'
        AppBlockErrors: '{{ item.AppBlockErrors }}'
        AppBlocks: '{{ item.AppBlocks }}'
        CreatedTime: '{{ item.CreatedTime }}'
        Description: '{{ item.Description }}'
        DisplayName: '{{ item.DisplayName }}'
        PackagingType: '{{ item.PackagingType }}'
        PostSetupScriptDetails: '{{ item.PostSetupScriptDetails }}'
        SetupScriptDetails: '{{ item.SetupScriptDetails }}'
