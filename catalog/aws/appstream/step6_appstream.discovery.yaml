  - discovery_id: aws.appstream.get_export_image_task
    calls:
      - action: get_export_image_task
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ExportImageTask }}'
      item:
        State: '{{ item.State }}'
        AmiName: '{{ item.AmiName }}'
        ExportImageTask: '{{ item.ExportImageTask }}'
