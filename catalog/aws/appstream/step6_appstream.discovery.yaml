  # ── ListExportImageTasks ──
  - discovery_id: aws.appstream.list_export_image_tasks
    calls:
      - action: list_export_image_tasks
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ExportImageTasks }}'
      item:
        State: '{{ item.State }}'
