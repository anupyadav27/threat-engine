# ============================================================
# Discovery YAML — codeguru-reviewer (AWS)
# Generated: 2026-02-21T04:56:57Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: codeguru-reviewer
services:
  client: codeguru-reviewer
  module: boto3.client
discovery:
  # ── ListRepositoryAssociations ──
  - discovery_id: aws.codeguru-reviewer.list_repository_associations
    calls:
      - action: list_repository_associations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.RepositoryAssociationSummaries }}'
      item:
        Name: '{{ item.Name }}'
        State: '{{ item.State }}'
        Tags: '{{ item.Tags }}'
        AssociationArn: '{{ item.AssociationArn }}'
        AssociationId: '{{ item.AssociationId }}'
        ConnectionArn: '{{ item.ConnectionArn }}'
        KMSKeyDetails: '{{ item.KMSKeyDetails }}'
        LastUpdatedTimeStamp: '{{ item.LastUpdatedTimeStamp }}'
        Owner: '{{ item.Owner }}'
        ProviderType: '{{ item.ProviderType }}'
        RepositoryAssociation: '{{ item.RepositoryAssociation }}'
        S3RepositoryDetails: '{{ item.S3RepositoryDetails }}'
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeCodeReview ──
  - discovery_id: aws.codeguru-reviewer.describe_code_review
    calls:
      - action: describe_code_review
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.CodeReview }}'
      item:
        Name: '{{ item.Name }}'
        State: '{{ item.State }}'
        AnalysisTypes: '{{ item.AnalysisTypes }}'
        AssociationArn: '{{ item.AssociationArn }}'
        CodeReviewArn: '{{ item.CodeReviewArn }}'
        ConfigFileState: '{{ item.ConfigFileState }}'
        CreatedTimeStamp: '{{ item.CreatedTimeStamp }}'
        LastUpdatedTimeStamp: '{{ item.LastUpdatedTimeStamp }}'
        Metrics: '{{ item.Metrics }}'
        Owner: '{{ item.Owner }}'
        ProviderType: '{{ item.ProviderType }}'
        PullRequestId: '{{ item.PullRequestId }}'
        RepositoryName: '{{ item.RepositoryName }}'
        SourceCodeType: '{{ item.SourceCodeType }}'
        StateReason: '{{ item.StateReason }}'
        Type: '{{ item.Type }}'
  # ── DescribeRecommendationFeedback ──
  - discovery_id: aws.codeguru-reviewer.describe_recommendation_feedback
    calls:
      - action: describe_recommendation_feedback
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.CodeReview }}'
      item:
        CodeReviewArn: '{{ item.CodeReviewArn }}'
        CreatedTimeStamp: '{{ item.CreatedTimeStamp }}'
        LastUpdatedTimeStamp: '{{ item.LastUpdatedTimeStamp }}'
        Reactions: '{{ item.Reactions }}'
        RecommendationId: '{{ item.RecommendationId }}'
        UserId: '{{ item.UserId }}'
  # ── DescribeRepositoryAssociation ──
  - discovery_id: aws.codeguru-reviewer.describe_repository_association
    for_each: aws.codeguru-reviewer.list_repository_associations
    calls:
      - action: describe_repository_association
        params:
          AssociationArn: '{{ item.AssociationArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.RepositoryAssociationSummaries }}'
      item:
        Name: '{{ item.Name }}'
        State: '{{ item.State }}'
        AssociationArn: '{{ item.AssociationArn }}'
        AssociationId: '{{ item.AssociationId }}'
        ConnectionArn: '{{ item.ConnectionArn }}'
        CreatedTimeStamp: '{{ item.CreatedTimeStamp }}'
        KMSKeyDetails: '{{ item.KMSKeyDetails }}'
        LastUpdatedTimeStamp: '{{ item.LastUpdatedTimeStamp }}'
        Owner: '{{ item.Owner }}'
        ProviderType: '{{ item.ProviderType }}'
        RepositoryAssociation: '{{ item.RepositoryAssociation }}'
        S3RepositoryDetails: '{{ item.S3RepositoryDetails }}'
        StateReason: '{{ item.StateReason }}'
  # ── ListCodeReviews ──
  - discovery_id: aws.codeguru-reviewer.list_code_reviews
    calls:
      - action: list_code_reviews
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.CodeReviewSummaries }}'
      item:
        Name: '{{ item.Name }}'
        State: '{{ item.State }}'
        CodeReviewArn: '{{ item.CodeReviewArn }}'
        CreatedTimeStamp: '{{ item.CreatedTimeStamp }}'
        LastUpdatedTimeStamp: '{{ item.LastUpdatedTimeStamp }}'
        MetricsSummary: '{{ item.MetricsSummary }}'
        Owner: '{{ item.Owner }}'
        ProviderType: '{{ item.ProviderType }}'
        PullRequestId: '{{ item.PullRequestId }}'
        RepositoryName: '{{ item.RepositoryName }}'
        SourceCodeType: '{{ item.SourceCodeType }}'
        Type: '{{ item.Type }}'
  # ── ListRecommendationFeedback ──
  - discovery_id: aws.codeguru-reviewer.list_recommendation_feedback
    calls:
      - action: list_recommendation_feedback
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.RecommendationFeedbackSummaries }}'
      item:
        Reactions: '{{ item.Reactions }}'
        RecommendationId: '{{ item.RecommendationId }}'
        UserId: '{{ item.UserId }}'
  # ── ListRecommendations ──
  - discovery_id: aws.codeguru-reviewer.list_recommendations
    calls:
      - action: list_recommendations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.RecommendationSummaries }}'
      item:
        Description: '{{ item.Description }}'
        EndLine: '{{ item.EndLine }}'
        FilePath: '{{ item.FilePath }}'
        RecommendationCategory: '{{ item.RecommendationCategory }}'
        RecommendationId: '{{ item.RecommendationId }}'
        RuleMetadata: '{{ item.RuleMetadata }}'
        Severity: '{{ item.Severity }}'
        StartLine: '{{ item.StartLine }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.codeguru-reviewer.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        Tags: '{{ response.Tags }}'
