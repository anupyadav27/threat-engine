# ============================================================
# Discovery YAML — apigatewaymanagementapi (AWS)
# Generated: 2026-02-21T04:56:57Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: apigatewaymanagementapi
services:
  client: apigatewaymanagementapi
  module: boto3.client
discovery:
  # ── Dependent read operations (require identifiers) ──
  # ── GetConnection ──
  - discovery_id: aws.apigatewaymanagementapi.get_connection
    calls:
      - action: get_connection
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ConnectedAt }}'
      item:
        Identity: '{{ item.Identity }}'
        SourceIp: '{{ item.SourceIp }}'
        UserAgent: '{{ item.UserAgent }}'
