# ============================================================
# Discovery YAML — timestream-query (AWS)
# Generated: 2026-02-21T04:57:00Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: timestream-query
services:
  client: timestream-query
  module: boto3.client
discovery:
  # ── DescribeAccountSettings ──
  - discovery_id: aws.timestream-query.describe_account_settings
    calls:
      - action: describe_account_settings
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.QueryCompute }}'
      item:
        ComputeMode: '{{ item.ComputeMode }}'
        MaxQueryTCU: '{{ item.MaxQueryTCU }}'
        ProvisionedCapacity: '{{ item.ProvisionedCapacity }}'
        QueryCompute: '{{ item.QueryCompute }}'
        QueryPricingModel: '{{ item.QueryPricingModel }}'
  # ── DescribeEndpoints ──
  - discovery_id: aws.timestream-query.describe_endpoints
    calls:
      - action: describe_endpoints
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Endpoints }}'
      item:
        Address: '{{ item.Address }}'
        CachePeriodInMinutes: '{{ item.CachePeriodInMinutes }}'
        Endpoints: '{{ item.Endpoints }}'
  # ── ListScheduledQueries ──
  - discovery_id: aws.timestream-query.list_scheduled_queries
    calls:
      - action: list_scheduled_queries
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ScheduledQueries }}'
      item:
        Arn: '{{ item.Arn }}'
        CreationTime: '{{ item.CreationTime }}'
        Name: '{{ item.Name }}'
        State: '{{ item.State }}'
        Status: '{{ item.Status }}'
        Enabled: '{{ item.Enabled }}'
        ErrorReportConfiguration: '{{ item.ErrorReportConfiguration }}'
        LastRunStatus: '{{ item.LastRunStatus }}'
        NextInvocationTime: '{{ item.NextInvocationTime }}'
        PreviousInvocationTime: '{{ item.PreviousInvocationTime }}'
        TargetDestination: '{{ item.TargetDestination }}'
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeScheduledQuery ──
  - discovery_id: aws.timestream-query.describe_scheduled_query
    for_each: aws.timestream-query.list_scheduled_queries
    calls:
      - action: describe_scheduled_query
        params:
          ScheduledQueryArn: '{{ item.ScheduledQueryArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ScheduledQueries }}'
      item:
        Arn: '{{ item.Arn }}'
        CreationTime: '{{ item.CreationTime }}'
        KmsKeyId: '{{ item.KmsKeyId }}'
        Name: '{{ item.Name }}'
        State: '{{ item.State }}'
        ErrorReportConfiguration: '{{ item.ErrorReportConfiguration }}'
        LastRunSummary: '{{ item.LastRunSummary }}'
        NextInvocationTime: '{{ item.NextInvocationTime }}'
        NotificationConfiguration: '{{ item.NotificationConfiguration }}'
        PreviousInvocationTime: '{{ item.PreviousInvocationTime }}'
        QueryString: '{{ item.QueryString }}'
        RecentlyFailedRuns: '{{ item.RecentlyFailedRuns }}'
        ScheduleConfiguration: '{{ item.ScheduleConfiguration }}'
        ScheduledQueryExecutionRoleArn: '{{ item.ScheduledQueryExecutionRoleArn }}'
        TargetConfiguration: '{{ item.TargetConfiguration }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.timestream-query.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Tags }}'
      item:
        Key: '{{ item.Key }}'
        Value: '{{ item.Value }}'
  # ── Query ──
  - discovery_id: aws.timestream-query.query
    calls:
      - action: query
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Rows }}'
