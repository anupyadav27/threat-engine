# ============================================================
# Discovery YAML — cloud9 (AWS)
# Generated: 2026-02-21T04:56:57Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: cloud9
services:
  client: cloud9
  module: boto3.client
discovery:
  # ── DescribeEnvironmentMemberships ──
  - discovery_id: aws.cloud9.describe_environment_memberships
    calls:
      - action: describe_environment_memberships
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.memberships }}'
      item:
        environmentId: '{{ item.environmentId }}'
        id: '{{ item.id }}'
        lastAccess: '{{ item.lastAccess }}'
        memberships: '{{ item.memberships }}'
        permissions: '{{ item.permissions }}'
        status: '{{ item.status }}'
        userArn: '{{ item.userArn }}'
        userId: '{{ item.userId }}'
  # ── ListEnvironments ──
  - discovery_id: aws.cloud9.list_environments
    calls:
      - action: list_environments
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.environmentIds }}'
      item:
        arn: '{{ item.arn }}'
        connectionType: '{{ item.connectionType }}'
        description: '{{ item.description }}'
        environments: '{{ item.environments }}'
        lifecycle: '{{ item.lifecycle }}'
        managedCredentialsStatus: '{{ item.managedCredentialsStatus }}'
        name: '{{ item.name }}'
        ownerArn: '{{ item.ownerArn }}'
        type: '{{ item.type }}'
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeEnvironmentStatus ──
  - discovery_id: aws.cloud9.describe_environment_status
    calls:
      - action: describe_environment_status
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.status }}'
      item:
        message: '{{ item.message }}'
        status: '{{ item.status }}'
  # ── DescribeEnvironments ──
  - discovery_id: aws.cloud9.describe_environments
    calls:
      - action: describe_environments
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.environments }}'
      item:
        arn: '{{ item.arn }}'
        connectionType: '{{ item.connectionType }}'
        description: '{{ item.description }}'
        environments: '{{ item.environments }}'
        lifecycle: '{{ item.lifecycle }}'
        managedCredentialsStatus: '{{ item.managedCredentialsStatus }}'
        name: '{{ item.name }}'
        ownerArn: '{{ item.ownerArn }}'
        type: '{{ item.type }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.cloud9.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Tags }}'
      item:
        Key: '{{ item.Key }}'
        Value: '{{ item.Value }}'
