version: '1.0'
provider: aws
service: iotsitewise
services:
  client: iotsitewise
  module: boto3.client
discovery:
  # ── DescribeDefaultEncryptionConfiguration ──
  - discovery_id: aws.iotsitewise.describe_default_encryption_configuration
    calls:
      - action: describe_default_encryption_configuration
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.encryptionType }}'
      item:
        Status: '{{ item.Status }}'
        Enabled: '{{ item.Enabled }}'
        configurationStatus: '{{ item.configurationStatus }}'
        encryptionType: '{{ item.encryptionType }}'
        error: '{{ item.error }}'
        kmsKeyArn: '{{ item.kmsKeyArn }}'
        state: '{{ item.state }}'
  # ── DescribeLoggingOptions ──
  - discovery_id: aws.iotsitewise.describe_logging_options
    calls:
      - action: describe_logging_options
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.loggingOptions }}'
      item:
        level: '{{ item.level }}'
        loggingOptions: '{{ item.loggingOptions }}'
  # ── DescribeStorageConfiguration ──
  - discovery_id: aws.iotsitewise.describe_storage_configuration
    calls:
      - action: describe_storage_configuration
        save_as: response
        on_error: continue
    emit:
      as: item
