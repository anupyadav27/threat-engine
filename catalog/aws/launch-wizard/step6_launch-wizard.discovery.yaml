# ============================================================
# Discovery YAML — launch-wizard (AWS)
# Generated: 2026-02-21T04:56:58Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: launch-wizard
services:
  client: launch-wizard
  module: boto3.client
discovery:
  # ── ListDeployments ──
  - discovery_id: aws.launch-wizard.list_deployments
    calls:
      - action: list_deployments
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.deployments }}'
      item:
        createdAt: '{{ item.createdAt }}'
        deletedAt: '{{ item.deletedAt }}'
        deployment: '{{ item.deployment }}'
        deploymentPatternName: '{{ item.deploymentPatternName }}'
        description: '{{ item.description }}'
        documentationUrl: '{{ item.documentationUrl }}'
        iconUrl: '{{ item.iconUrl }}'
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        patternName: '{{ item.patternName }}'
        resourceGroup: '{{ item.resourceGroup }}'
        specifications: '{{ item.specifications }}'
        status: '{{ item.status }}'
        statusMessage: '{{ item.statusMessage }}'
        statusReason: '{{ item.statusReason }}'
        tags: '{{ item.tags }}'
        timestamp: '{{ item.timestamp }}'
        workloadDeploymentPattern: '{{ item.workloadDeploymentPattern }}'
        workloadName: '{{ item.workloadName }}'
        workloadVersionName: '{{ item.workloadVersionName }}'
  # ── ListWorkloads ──
  - discovery_id: aws.launch-wizard.list_workloads
    calls:
      - action: list_workloads
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.workloads }}'
      item:
        displayName: '{{ item.displayName }}'
        workload: '{{ item.workload }}'
        workloadName: '{{ item.workloadName }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetDeployment ──
  - discovery_id: aws.launch-wizard.get_deployment
    for_each: aws.launch-wizard.list_deployments
    calls:
      - action: get_deployment
        params:
          deploymentId: '{{ item.deploymentId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.deployments }}'
      item:
        createdAt: '{{ item.createdAt }}'
        deletedAt: '{{ item.deletedAt }}'
        deployment: '{{ item.deployment }}'
        deploymentArn: '{{ item.deploymentArn }}'
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        patternName: '{{ item.patternName }}'
        resourceGroup: '{{ item.resourceGroup }}'
        specifications: '{{ item.specifications }}'
        status: '{{ item.status }}'
        tags: '{{ item.tags }}'
        workloadName: '{{ item.workloadName }}'
  # ── GetWorkload ──
  - discovery_id: aws.launch-wizard.get_workload
    for_each: aws.launch-wizard.list_deployments
    calls:
      - action: get_workload
        params:
          workloadName: '{{ item.workloadName }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.workload }}'
      item:
        description: '{{ item.description }}'
        displayName: '{{ item.displayName }}'
        documentationUrl: '{{ item.documentationUrl }}'
        iconUrl: '{{ item.iconUrl }}'
        status: '{{ item.status }}'
        statusMessage: '{{ item.statusMessage }}'
        workload: '{{ item.workload }}'
        workloadName: '{{ item.workloadName }}'
  # ── GetWorkloadDeploymentPattern ──
  - discovery_id: aws.launch-wizard.get_workload_deployment_pattern
    for_each: aws.launch-wizard.list_deployments
    calls:
      - action: get_workload_deployment_pattern
        params:
          deploymentPatternName: '{{ item.deploymentPatternName }}'
          workloadName: '{{ item.workloadName }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.workload }}'
      item:
        description: '{{ item.description }}'
        displayName: '{{ item.displayName }}'
        specifications: '{{ item.specifications }}'
        status: '{{ item.status }}'
        statusMessage: '{{ item.statusMessage }}'
        workloadDeploymentPattern: '{{ item.workloadDeploymentPattern }}'
        workloadName: '{{ item.workloadName }}'
  # ── ListDeploymentEvents ──
  - discovery_id: aws.launch-wizard.list_deployment_events
    for_each: aws.launch-wizard.list_deployments
    calls:
      - action: list_deployment_events
        params:
          deploymentId: '{{ item.deploymentId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.deploymentEvents }}'
      item:
        deployment: '{{ item.deployment }}'
        description: '{{ item.description }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        statusReason: '{{ item.statusReason }}'
        timestamp: '{{ item.timestamp }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.launch-wizard.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        tags: '{{ response.tags }}'
  # ── ListWorkloadDeploymentPatterns ──
  - discovery_id: aws.launch-wizard.list_workload_deployment_patterns
    for_each: aws.launch-wizard.list_deployments
    calls:
      - action: list_workload_deployment_patterns
        params:
          workloadName: '{{ item.workloadName }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.workloadDeploymentPatterns }}'
      item:
        deploymentPatternName: '{{ item.deploymentPatternName }}'
        description: '{{ item.description }}'
        displayName: '{{ item.displayName }}'
        status: '{{ item.status }}'
        statusMessage: '{{ item.statusMessage }}'
        workloadDeploymentPattern: '{{ item.workloadDeploymentPattern }}'
        workloadName: '{{ item.workloadName }}'
        workloadVersionName: '{{ item.workloadVersionName }}'
