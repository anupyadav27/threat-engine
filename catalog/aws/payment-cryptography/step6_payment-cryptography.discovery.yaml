# ============================================================
# Discovery YAML — payment-cryptography (AWS)
# Generated: 2026-02-21T04:56:59Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: payment-cryptography
services:
  client: payment-cryptography
  module: boto3.client
discovery:
  # ── GetDefaultKeyReplicationRegions ──
  - discovery_id: aws.payment-cryptography.get_default_key_replication_regions
    calls:
      - action: get_default_key_replication_regions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.EnabledReplicationRegions }}'
      item:
        EnabledReplicationRegions: '{{ item.EnabledReplicationRegions }}'
  # ── ListAliases ──
  - discovery_id: aws.payment-cryptography.list_aliases
    calls:
      - action: list_aliases
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Aliases }}'
      item:
        AliasName: '{{ item.AliasName }}'
        KeyArn: '{{ item.KeyArn }}'
  # ── ListKeys ──
  - discovery_id: aws.payment-cryptography.list_keys
    calls:
      - action: list_keys
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Keys }}'
      item:
        Enabled: '{{ item.Enabled }}'
        Exportable: '{{ item.Exportable }}'
        KeyArn: '{{ item.KeyArn }}'
        KeyAttributes: '{{ item.KeyAttributes }}'
        KeyCheckValue: '{{ item.KeyCheckValue }}'
        KeyState: '{{ item.KeyState }}'
        MultiRegionKeyType: '{{ item.MultiRegionKeyType }}'
        PrimaryRegion: '{{ item.PrimaryRegion }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetAlias ──
  - discovery_id: aws.payment-cryptography.get_alias
    for_each: aws.payment-cryptography.list_aliases
    calls:
      - action: get_alias
        params:
          AliasName: '{{ item.AliasName }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Aliases }}'
      item:
        AliasName: '{{ item.AliasName }}'
        KeyArn: '{{ item.KeyArn }}'
  # ── GetCertificateSigningRequest ──
  - discovery_id: aws.payment-cryptography.get_certificate_signing_request
    calls:
      - action: get_certificate_signing_request
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        CertificateSigningRequest: '{{ response.CertificateSigningRequest }}'
  # ── GetKey ──
  - discovery_id: aws.payment-cryptography.get_key
    calls:
      - action: get_key
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Key }}'
      item:
        CreateTimestamp: '{{ item.CreateTimestamp }}'
        DeletePendingTimestamp: '{{ item.DeletePendingTimestamp }}'
        DeleteTimestamp: '{{ item.DeleteTimestamp }}'
        DeriveKeyUsage: '{{ item.DeriveKeyUsage }}'
        Enabled: '{{ item.Enabled }}'
        Exportable: '{{ item.Exportable }}'
        KeyArn: '{{ item.KeyArn }}'
        KeyAttributes: '{{ item.KeyAttributes }}'
        KeyCheckValue: '{{ item.KeyCheckValue }}'
        KeyCheckValueAlgorithm: '{{ item.KeyCheckValueAlgorithm }}'
        KeyOrigin: '{{ item.KeyOrigin }}'
        KeyState: '{{ item.KeyState }}'
        MultiRegionKeyType: '{{ item.MultiRegionKeyType }}'
        PrimaryRegion: '{{ item.PrimaryRegion }}'
        ReplicationStatus: '{{ item.ReplicationStatus }}'
        UsageStartTimestamp: '{{ item.UsageStartTimestamp }}'
        UsageStopTimestamp: '{{ item.UsageStopTimestamp }}'
        UsingDefaultReplicationRegions: '{{ item.UsingDefaultReplicationRegions }}'
  # ── GetParametersForExport ──
  - discovery_id: aws.payment-cryptography.get_parameters_for_export
    calls:
      - action: get_parameters_for_export
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        ExportToken: '{{ response.ExportToken }}'
        ParametersValidUntilTimestamp: '{{ response.ParametersValidUntilTimestamp }}'
        SigningKeyAlgorithm: '{{ response.SigningKeyAlgorithm }}'
        SigningKeyCertificate: '{{ response.SigningKeyCertificate }}'
        SigningKeyCertificateChain: '{{ response.SigningKeyCertificateChain }}'
  # ── GetParametersForImport ──
  - discovery_id: aws.payment-cryptography.get_parameters_for_import
    calls:
      - action: get_parameters_for_import
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        ImportToken: '{{ response.ImportToken }}'
        ParametersValidUntilTimestamp: '{{ response.ParametersValidUntilTimestamp }}'
        WrappingKeyAlgorithm: '{{ response.WrappingKeyAlgorithm }}'
        WrappingKeyCertificate: '{{ response.WrappingKeyCertificate }}'
        WrappingKeyCertificateChain: '{{ response.WrappingKeyCertificateChain }}'
  # ── GetPublicKeyCertificate ──
  - discovery_id: aws.payment-cryptography.get_public_key_certificate
    calls:
      - action: get_public_key_certificate
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        KeyCertificate: '{{ response.KeyCertificate }}'
        KeyCertificateChain: '{{ response.KeyCertificateChain }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.payment-cryptography.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Tags }}'
      item:
        Key: '{{ item.Key }}'
        Value: '{{ item.Value }}'
