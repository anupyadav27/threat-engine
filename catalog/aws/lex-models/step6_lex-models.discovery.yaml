# ============================================================
# Discovery YAML — lex-models (AWS)
# Generated: 2026-02-21T04:56:58Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: lex-models
services:
  client: lex-models
  module: boto3.client
discovery:
  # ── GetBots ──
  - discovery_id: aws.lex-models.get_bots
    calls:
      - action: get_bots
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.bots }}'
      item:
        BotAliases: '{{ item.BotAliases }}'
        botVersion: '{{ item.botVersion }}'
        bots: '{{ item.bots }}'
        checksum: '{{ item.checksum }}'
        conversationLogs: '{{ item.conversationLogs }}'
        createdDate: '{{ item.createdDate }}'
        description: '{{ item.description }}'
        iamRoleArn: '{{ item.iamRoleArn }}'
        lastUpdatedDate: '{{ item.lastUpdatedDate }}'
        logSettings: '{{ item.logSettings }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        utterances: '{{ item.utterances }}'
        version: '{{ item.version }}'
  # ── GetBuiltinIntents ──
  - discovery_id: aws.lex-models.get_builtin_intents
    calls:
      - action: get_builtin_intents
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.intents }}'
      item:
        intents: '{{ item.intents }}'
        signature: '{{ item.signature }}'
        supportedLocales: '{{ item.supportedLocales }}'
  # ── GetBuiltinSlotTypes ──
  - discovery_id: aws.lex-models.get_builtin_slot_types
    calls:
      - action: get_builtin_slot_types
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.slotTypes }}'
      item:
        signature: '{{ item.signature }}'
        slotTypes: '{{ item.slotTypes }}'
        supportedLocales: '{{ item.supportedLocales }}'
  # ── GetIntents ──
  - discovery_id: aws.lex-models.get_intents
    calls:
      - action: get_intents
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.intents }}'
      item:
        createdDate: '{{ item.createdDate }}'
        description: '{{ item.description }}'
        lastUpdatedDate: '{{ item.lastUpdatedDate }}'
        locale: '{{ item.locale }}'
        name: '{{ item.name }}'
        version: '{{ item.version }}'
  # ── GetMigrations ──
  - discovery_id: aws.lex-models.get_migrations
    calls:
      - action: get_migrations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.migrationSummaries }}'
      item:
        migrationId: '{{ item.migrationId }}'
        migrationStatus: '{{ item.migrationStatus }}'
        migrationStrategy: '{{ item.migrationStrategy }}'
        migrationSummaries: '{{ item.migrationSummaries }}'
        migrationTimestamp: '{{ item.migrationTimestamp }}'
        v1BotLocale: '{{ item.v1BotLocale }}'
        v1BotName: '{{ item.v1BotName }}'
        v1BotVersion: '{{ item.v1BotVersion }}'
        v2BotId: '{{ item.v2BotId }}'
        v2BotRole: '{{ item.v2BotRole }}'
  # ── GetSlotTypes ──
  - discovery_id: aws.lex-models.get_slot_types
    calls:
      - action: get_slot_types
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.slotTypes }}'
      item:
        createdDate: '{{ item.createdDate }}'
        description: '{{ item.description }}'
        lastUpdatedDate: '{{ item.lastUpdatedDate }}'
        name: '{{ item.name }}'
        version: '{{ item.version }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetBot ──
  - discovery_id: aws.lex-models.get_bot
    for_each: aws.lex-models.get_bots
    calls:
      - action: get_bot
        params:
          name: '{{ item.name }}'
          versionOrAlias: '{{ item.versionOrAlias }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.intents }}'
      item:
        intentName: '{{ item.intentName }}'
        intentVersion: '{{ item.intentVersion }}'
  # ── GetBotAlias ──
  - discovery_id: aws.lex-models.get_bot_alias
    for_each: aws.lex-models.get_bots
    calls:
      - action: get_bot_alias
        params:
          name: '{{ item.name }}'
          botName: '{{ item.botName }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.conversationLogs }}'
      item:
        DestinationArn: '{{ item.DestinationArn }}'
        Format: '{{ item.Format }}'
        Level: '{{ item.Level }}'
        iamRoleArn: '{{ item.iamRoleArn }}'
        logSettings: '{{ item.logSettings }}'
  # ── GetBotAliases ──
  - discovery_id: aws.lex-models.get_bot_aliases
    for_each: aws.lex-models.get_bots
    calls:
      - action: get_bot_aliases
        params:
          botName: '{{ item.botName }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.BotAliases }}'
      item:
        BotAliases: '{{ item.BotAliases }}'
        botName: '{{ item.botName }}'
        botVersion: '{{ item.botVersion }}'
        checksum: '{{ item.checksum }}'
        conversationLogs: '{{ item.conversationLogs }}'
        createdDate: '{{ item.createdDate }}'
        description: '{{ item.description }}'
        lastUpdatedDate: '{{ item.lastUpdatedDate }}'
        name: '{{ item.name }}'
  # ── GetBotChannelAssociation ──
  - discovery_id: aws.lex-models.get_bot_channel_association
    for_each: aws.lex-models.get_bots
    calls:
      - action: get_bot_channel_association
        params:
          name: '{{ item.name }}'
          botName: '{{ item.botName }}'
          botAlias: '{{ item.botAlias }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        botAlias: '{{ response.botAlias }}'
        botConfiguration: '{{ response.botConfiguration }}'
        botName: '{{ response.botName }}'
        createdDate: '{{ response.createdDate }}'
        description: '{{ response.description }}'
        failureReason: '{{ response.failureReason }}'
        name: '{{ response.name }}'
        status: '{{ response.status }}'
        type: '{{ response.type }}'
  # ── GetBotChannelAssociations ──
  - discovery_id: aws.lex-models.get_bot_channel_associations
    for_each: aws.lex-models.get_bots
    calls:
      - action: get_bot_channel_associations
        params:
          botName: '{{ item.botName }}'
          botAlias: '{{ item.botAlias }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.botChannelAssociations }}'
      item:
        botAlias: '{{ item.botAlias }}'
        botConfiguration: '{{ item.botConfiguration }}'
        botName: '{{ item.botName }}'
        createdDate: '{{ item.createdDate }}'
        description: '{{ item.description }}'
        failureReason: '{{ item.failureReason }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        type: '{{ item.type }}'
  # ── GetBotVersions ──
  - discovery_id: aws.lex-models.get_bot_versions
    for_each: aws.lex-models.get_bots
    calls:
      - action: get_bot_versions
        params:
          name: '{{ item.name }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.bots }}'
      item:
        createdDate: '{{ item.createdDate }}'
        description: '{{ item.description }}'
        lastUpdatedDate: '{{ item.lastUpdatedDate }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        version: '{{ item.version }}'
  # ── GetBuiltinIntent ──
  - discovery_id: aws.lex-models.get_builtin_intent
    for_each: aws.lex-models.get_builtin_intents
    calls:
      - action: get_builtin_intent
        params:
          signature: '{{ item.signature }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.supportedLocales }}'
  # ── GetExport ──
  - discovery_id: aws.lex-models.get_export
    for_each: aws.lex-models.get_bots
    calls:
      - action: get_export
        params:
          name: '{{ item.name }}'
          version: '{{ item.version }}'
          resourceType: '{{ item.resourceType }}'
          exportType: '{{ item.exportType }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.name }}'
      item:
        url: '{{ item.url }}'
  # ── GetImport ──
  - discovery_id: aws.lex-models.get_import
    calls:
      - action: get_import
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.failureReason }}'
  # ── GetIntent ──
  - discovery_id: aws.lex-models.get_intent
    for_each: aws.lex-models.get_bots
    calls:
      - action: get_intent
        params:
          name: '{{ item.name }}'
          version: '{{ item.version }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.slots }}'
      item:
        defaultValueSpec: '{{ item.defaultValueSpec }}'
        description: '{{ item.description }}'
        name: '{{ item.name }}'
        obfuscationSetting: '{{ item.obfuscationSetting }}'
        priority: '{{ item.priority }}'
        responseCard: '{{ item.responseCard }}'
        sampleUtterances: '{{ item.sampleUtterances }}'
        slotConstraint: '{{ item.slotConstraint }}'
        slotType: '{{ item.slotType }}'
        slotTypeVersion: '{{ item.slotTypeVersion }}'
        valueElicitationPrompt: '{{ item.valueElicitationPrompt }}'
  # ── GetIntentVersions ──
  - discovery_id: aws.lex-models.get_intent_versions
    for_each: aws.lex-models.get_bots
    calls:
      - action: get_intent_versions
        params:
          name: '{{ item.name }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.intents }}'
      item:
        createdDate: '{{ item.createdDate }}'
        description: '{{ item.description }}'
        lastUpdatedDate: '{{ item.lastUpdatedDate }}'
        name: '{{ item.name }}'
        version: '{{ item.version }}'
  # ── GetMigration ──
  - discovery_id: aws.lex-models.get_migration
    for_each: aws.lex-models.get_migrations
    calls:
      - action: get_migration
        params:
          migrationId: '{{ item.migrationId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.alerts }}'
      item:
        alerts: '{{ item.alerts }}'
        details: '{{ item.details }}'
        message: '{{ item.message }}'
        referenceURLs: '{{ item.referenceURLs }}'
        type: '{{ item.type }}'
  # ── GetSlotType ──
  - discovery_id: aws.lex-models.get_slot_type
    for_each: aws.lex-models.get_bots
    calls:
      - action: get_slot_type
        params:
          name: '{{ item.name }}'
          version: '{{ item.version }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.enumerationValues }}'
      item:
        synonyms: '{{ item.synonyms }}'
        value: '{{ item.value }}'
  # ── GetSlotTypeVersions ──
  - discovery_id: aws.lex-models.get_slot_type_versions
    for_each: aws.lex-models.get_bots
    calls:
      - action: get_slot_type_versions
        params:
          name: '{{ item.name }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.slotTypes }}'
      item:
        createdDate: '{{ item.createdDate }}'
        description: '{{ item.description }}'
        lastUpdatedDate: '{{ item.lastUpdatedDate }}'
        name: '{{ item.name }}'
        version: '{{ item.version }}'
  # ── GetUtterancesView ──
  - discovery_id: aws.lex-models.get_utterances_view
    for_each: aws.lex-models.get_bots
    calls:
      - action: get_utterances_view
        params:
          botName: '{{ item.botName }}'
          botVersions: '{{ item.botVersions }}'
          statusType: '{{ item.statusType }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.utterances }}'
      item:
        botVersion: '{{ item.botVersion }}'
        utterances: '{{ item.utterances }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.lex-models.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.tags }}'
      item:
        key: '{{ item.key }}'
        value: '{{ item.value }}'
