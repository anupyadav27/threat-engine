# ============================================================
# Discovery YAML — migrationhubstrategy (AWS)
# Generated: 2026-02-21T04:56:59Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: migrationhubstrategy
services:
  client: migrationhubstrategy
  module: boto3.client
discovery:
  # ── GetLatestAssessmentId ──
  - discovery_id: aws.migrationhubstrategy.get_latest_assessment_id
    calls:
      - action: get_latest_assessment_id
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        id: '{{ response.id }}'
  # ── GetPortfolioPreferences ──
  - discovery_id: aws.migrationhubstrategy.get_portfolio_preferences
    calls:
      - action: get_portfolio_preferences
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.applicationMode }}'
      item:
        applicationMode: '{{ item.applicationMode }}'
        applicationPreferences: '{{ item.applicationPreferences }}'
        databasePreferences: '{{ item.databasePreferences }}'
        managementPreference: '{{ item.managementPreference }}'
        prioritizeBusinessGoals: '{{ item.prioritizeBusinessGoals }}'
  # ── GetPortfolioSummary ──
  - discovery_id: aws.migrationhubstrategy.get_portfolio_summary
    calls:
      - action: get_portfolio_summary
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.assessmentSummary }}'
      item:
        antipatternReportS3Object: '{{ item.antipatternReportS3Object }}'
        antipatternReportStatus: '{{ item.antipatternReportStatus }}'
        antipatternReportStatusMessage: '{{ item.antipatternReportStatusMessage }}'
        assessmentSummary: '{{ item.assessmentSummary }}'
        lastAnalyzedTimestamp: '{{ item.lastAnalyzedTimestamp }}'
        listAntipatternSeveritySummary: '{{ item.listAntipatternSeveritySummary }}'
        listApplicationComponentStatusSummary: '{{ item.listApplicationComponentStatusSummary }}'
        listApplicationComponentStrategySummary: '{{ item.listApplicationComponentStrategySummary }}'
        listApplicationComponentSummary: '{{ item.listApplicationComponentSummary }}'
        listServerStatusSummary: '{{ item.listServerStatusSummary }}'
        listServerStrategySummary: '{{ item.listServerStrategySummary }}'
        listServerSummary: '{{ item.listServerSummary }}'
  # ── ListAnalyzableServers ──
  - discovery_id: aws.migrationhubstrategy.list_analyzable_servers
    calls:
      - action: list_analyzable_servers
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.analyzableServers }}'
      item:
        hostname: '{{ item.hostname }}'
        ipAddress: '{{ item.ipAddress }}'
        source: '{{ item.source }}'
        vmId: '{{ item.vmId }}'
  # ── ListApplicationComponents ──
  - discovery_id: aws.migrationhubstrategy.list_application_components
    calls:
      - action: list_application_components
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.applicationComponentInfos }}'
      item:
        analysisStatus: '{{ item.analysisStatus }}'
        antipatternReportS3Object: '{{ item.antipatternReportS3Object }}'
        antipatternReportStatus: '{{ item.antipatternReportStatus }}'
        antipatternReportStatusMessage: '{{ item.antipatternReportStatusMessage }}'
        appType: '{{ item.appType }}'
        appUnitError: '{{ item.appUnitError }}'
        associatedServerId: '{{ item.associatedServerId }}'
        databaseConfigDetail: '{{ item.databaseConfigDetail }}'
        id: '{{ item.id }}'
        inclusionStatus: '{{ item.inclusionStatus }}'
        lastAnalyzedTimestamp: '{{ item.lastAnalyzedTimestamp }}'
        listAntipatternSeveritySummary: '{{ item.listAntipatternSeveritySummary }}'
        moreServerAssociationExists: '{{ item.moreServerAssociationExists }}'
        name: '{{ item.name }}'
        osDriver: '{{ item.osDriver }}'
        osVersion: '{{ item.osVersion }}'
        recommendationSet: '{{ item.recommendationSet }}'
        resourceSubType: '{{ item.resourceSubType }}'
        resultList: '{{ item.resultList }}'
        runtimeStatus: '{{ item.runtimeStatus }}'
        runtimeStatusMessage: '{{ item.runtimeStatusMessage }}'
        sourceCodeRepositories: '{{ item.sourceCodeRepositories }}'
        statusMessage: '{{ item.statusMessage }}'
  # ── ListCollectors ──
  - discovery_id: aws.migrationhubstrategy.list_collectors
    calls:
      - action: list_collectors
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Collectors }}'
      item:
        Status: '{{ item.Status }}'
        Enabled: '{{ item.Enabled }}'
        collectorHealth: '{{ item.collectorHealth }}'
        collectorId: '{{ item.collectorId }}'
        collectorVersion: '{{ item.collectorVersion }}'
        configurationSummary: '{{ item.configurationSummary }}'
        hostName: '{{ item.hostName }}'
        ipAddress: '{{ item.ipAddress }}'
        lastActivityTimeStamp: '{{ item.lastActivityTimeStamp }}'
        registeredTimeStamp: '{{ item.registeredTimeStamp }}'
  # ── ListImportFileTask ──
  - discovery_id: aws.migrationhubstrategy.list_import_file_task
    calls:
      - action: list_import_file_task
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.taskInfos }}'
      item:
        completionTime: '{{ item.completionTime }}'
        id: '{{ item.id }}'
        importName: '{{ item.importName }}'
        inputS3Bucket: '{{ item.inputS3Bucket }}'
        inputS3Key: '{{ item.inputS3Key }}'
        numberOfRecordsFailed: '{{ item.numberOfRecordsFailed }}'
        numberOfRecordsSuccess: '{{ item.numberOfRecordsSuccess }}'
        startTime: '{{ item.startTime }}'
        status: '{{ item.status }}'
        statusReportS3Bucket: '{{ item.statusReportS3Bucket }}'
        statusReportS3Key: '{{ item.statusReportS3Key }}'
  # ── ListServers ──
  - discovery_id: aws.migrationhubstrategy.list_servers
    calls:
      - action: list_servers
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.serverInfos }}'
      item:
        antipatternReportS3Object: '{{ item.antipatternReportS3Object }}'
        antipatternReportStatus: '{{ item.antipatternReportStatus }}'
        antipatternReportStatusMessage: '{{ item.antipatternReportStatusMessage }}'
        applicationComponentStrategySummary: '{{ item.applicationComponentStrategySummary }}'
        dataCollectionStatus: '{{ item.dataCollectionStatus }}'
        id: '{{ item.id }}'
        lastAnalyzedTimestamp: '{{ item.lastAnalyzedTimestamp }}'
        listAntipatternSeveritySummary: '{{ item.listAntipatternSeveritySummary }}'
        name: '{{ item.name }}'
        recommendationSet: '{{ item.recommendationSet }}'
        serverError: '{{ item.serverError }}'
        serverType: '{{ item.serverType }}'
        statusMessage: '{{ item.statusMessage }}'
        systemInfo: '{{ item.systemInfo }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetApplicationComponentDetails ──
  - discovery_id: aws.migrationhubstrategy.get_application_component_details
    calls:
      - action: get_application_component_details
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.associatedApplications }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
  # ── GetApplicationComponentStrategies ──
  - discovery_id: aws.migrationhubstrategy.get_application_component_strategies
    calls:
      - action: get_application_component_strategies
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.applicationComponentStrategies }}'
      item:
        isPreferred: '{{ item.isPreferred }}'
        recommendation: '{{ item.recommendation }}'
        status: '{{ item.status }}'
  # ── GetAssessment ──
  - discovery_id: aws.migrationhubstrategy.get_assessment
    for_each: aws.migrationhubstrategy.get_latest_assessment_id
    calls:
      - action: get_assessment
        params:
          id: '{{ item.id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.assessmentTargets }}'
      item:
        condition: '{{ item.condition }}'
        name: '{{ item.name }}'
        values: '{{ item.values }}'
  # ── GetImportFileTask ──
  - discovery_id: aws.migrationhubstrategy.get_import_file_task
    for_each: aws.migrationhubstrategy.get_latest_assessment_id
    calls:
      - action: get_import_file_task
        params:
          id: '{{ item.id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        completionTime: '{{ response.completionTime }}'
        id: '{{ response.id }}'
        importName: '{{ response.importName }}'
        inputS3Bucket: '{{ response.inputS3Bucket }}'
        inputS3Key: '{{ response.inputS3Key }}'
        numberOfRecordsFailed: '{{ response.numberOfRecordsFailed }}'
        numberOfRecordsSuccess: '{{ response.numberOfRecordsSuccess }}'
        startTime: '{{ response.startTime }}'
        status: '{{ response.status }}'
        statusReportS3Bucket: '{{ response.statusReportS3Bucket }}'
        statusReportS3Key: '{{ response.statusReportS3Key }}'
  # ── GetRecommendationReportDetails ──
  - discovery_id: aws.migrationhubstrategy.get_recommendation_report_details
    for_each: aws.migrationhubstrategy.get_latest_assessment_id
    calls:
      - action: get_recommendation_report_details
        params:
          id: '{{ item.id }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.taskInfos }}'
      item:
        completionTime: '{{ item.completionTime }}'
        s3Bucket: '{{ item.s3Bucket }}'
        s3Keys: '{{ item.s3Keys }}'
        startTime: '{{ item.startTime }}'
        status: '{{ item.status }}'
        statusMessage: '{{ item.statusMessage }}'
  # ── GetServerDetails ──
  - discovery_id: aws.migrationhubstrategy.get_server_details
    calls:
      - action: get_server_details
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.associatedApplications }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
  # ── GetServerStrategies ──
  - discovery_id: aws.migrationhubstrategy.get_server_strategies
    calls:
      - action: get_server_strategies
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.serverStrategies }}'
      item:
        isPreferred: '{{ item.isPreferred }}'
        numberOfApplicationComponents: '{{ item.numberOfApplicationComponents }}'
        recommendation: '{{ item.recommendation }}'
        status: '{{ item.status }}'
