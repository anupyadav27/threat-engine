    emit:
      as: item
      items_for: '{{ response.BudgetNotificationsForAccount }}'
      item:
        BudgetName: '{{ item.BudgetName }}'
        BudgetNotificationsForAccount: '{{ item.BudgetNotificationsForAccount }}'
        Notifications: '{{ item.Notifications }}'
  # ── DescribeBudgetPerformanceHistory ──
  - discovery_id: aws.budgets.describe_budget_performance_history
    calls:
      - action: describe_budget_performance_history
        save_as: response
