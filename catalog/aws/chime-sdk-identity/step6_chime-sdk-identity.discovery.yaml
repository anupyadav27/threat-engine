version: '1.0'
provider: aws
service: chime-sdk-identity
services:
  client: chime-sdk-identity
  module: boto3.client
discovery:
  # ── ListAppInstances ──
  - discovery_id: aws.chime-sdk-identity.list_app_instances
    calls:
      - action: list_app_instances
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.AppInstances }}'
      item:
        Name: '{{ item.Name }}'
        AppInstanceArn: '{{ item.AppInstanceArn }}'
        Metadata: '{{ item.Metadata }}'
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeAppInstance ──
  - discovery_id: aws.chime-sdk-identity.describe_app_instance
    for_each: aws.chime-sdk-identity.list_app_instances
    calls:
      - action: describe_app_instance
        params:
          AppInstanceArn: '{{ item.AppInstanceArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.AppInstances }}'
      item:
        Name: '{{ item.Name }}'
        AppInstanceArn: '{{ item.AppInstanceArn }}'
        CreatedTimestamp: '{{ item.CreatedTimestamp }}'
        LastUpdatedTimestamp: '{{ item.LastUpdatedTimestamp }}'
        Metadata: '{{ item.Metadata }}'
  # ── DescribeAppInstanceAdmin ──
  - discovery_id: aws.chime-sdk-identity.describe_app_instance_admin
    for_each: aws.chime-sdk-identity.list_app_instances
    calls:
      - action: describe_app_instance_admin
        params:
          AppInstanceAdminArn: '{{ item.AppInstanceAdminArn }}'
          AppInstanceArn: '{{ item.AppInstanceArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.AppInstanceAdmin }}'
      item:
        Admin: '{{ item.Admin }}'
        AppInstanceArn: '{{ item.AppInstanceArn }}'
        CreatedTimestamp: '{{ item.CreatedTimestamp }}'
  # ── DescribeAppInstanceBot ──
  - discovery_id: aws.chime-sdk-identity.describe_app_instance_bot
    calls:
      - action: describe_app_instance_bot
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.AppInstanceBot }}'
      item:
        Name: '{{ item.Name }}'
        Status: '{{ item.Status }}'
        AppInstanceBotArn: '{{ item.AppInstanceBotArn }}'
        Configuration: '{{ item.Configuration }}'
        CreatedTimestamp: '{{ item.CreatedTimestamp }}'
        Enabled: '{{ item.Enabled }}'
        LastUpdatedTimestamp: '{{ item.LastUpdatedTimestamp }}'
        Metadata: '{{ item.Metadata }}'
  # ── DescribeAppInstanceUser ──
  - discovery_id: aws.chime-sdk-identity.describe_app_instance_user
    calls:
      - action: describe_app_instance_user
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.AppInstanceUser }}'
      item:
        Name: '{{ item.Name }}'
        AppInstanceUserArn: '{{ item.AppInstanceUserArn }}'
        CreatedTimestamp: '{{ item.CreatedTimestamp }}'
        DestinationArn: '{{ item.DestinationArn }}'
        ExpirationSettings: '{{ item.ExpirationSettings }}'
        Format: '{{ item.Format }}'
        LastUpdatedTimestamp: '{{ item.LastUpdatedTimestamp }}'
        Level: '{{ item.Level }}'
        Metadata: '{{ item.Metadata }}'
  # ── DescribeAppInstanceUserEndpoint ──
  - discovery_id: aws.chime-sdk-identity.describe_app_instance_user_endpoint
    calls:
      - action: describe_app_instance_user_endpoint
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.AppInstanceUserEndpoint }}'
      item:
        Name: '{{ item.Name }}'
        ResourceArn: '{{ item.ResourceArn }}'
        AllowMessages: '{{ item.AllowMessages }}'
        AppInstanceUserArn: '{{ item.AppInstanceUserArn }}'
        CreatedTimestamp: '{{ item.CreatedTimestamp }}'
        EndpointAttributes: '{{ item.EndpointAttributes }}'
        EndpointId: '{{ item.EndpointId }}'
        EndpointState: '{{ item.EndpointState }}'
        LastUpdatedTimestamp: '{{ item.LastUpdatedTimestamp }}'
        Type: '{{ item.Type }}'
  # ── GetAppInstanceRetentionSettings ──
  - discovery_id: aws.chime-sdk-identity.get_app_instance_retention_settings
    for_each: aws.chime-sdk-identity.list_app_instances
    calls:
      - action: get_app_instance_retention_settings
        params:
          AppInstanceArn: '{{ item.AppInstanceArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.AppInstanceRetentionSettings }}'
      item:
        AppInstanceRetentionSettings: '{{ item.AppInstanceRetentionSettings }}'
        ChannelRetentionSettings: '{{ item.ChannelRetentionSettings }}'
  # ── ListAppInstanceAdmins ──
  - discovery_id: aws.chime-sdk-identity.list_app_instance_admins
    for_each: aws.chime-sdk-identity.list_app_instances
    calls:
      - action: list_app_instance_admins
