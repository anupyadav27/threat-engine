# ============================================================
# Discovery YAML — arc-region-switch (AWS)
# Generated: 2026-02-21T04:56:57Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: arc-region-switch
services:
  client: arc-region-switch
  module: boto3.client
discovery:
  # ── ListPlans ──
  - discovery_id: aws.arc-region-switch.list_plans
    calls:
      - action: list_plans
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.plans }}'
      item:
        activePlanExecution: '{{ item.activePlanExecution }}'
        actualRecoveryTime: '{{ item.actualRecoveryTime }}'
        arn: '{{ item.arn }}'
        associatedAlarms: '{{ item.associatedAlarms }}'
        comment: '{{ item.comment }}'
        description: '{{ item.description }}'
        endTime: '{{ item.endTime }}'
        error: '{{ item.error }}'
        evaluationState: '{{ item.evaluationState }}'
        eventId: '{{ item.eventId }}'
        executionAction: '{{ item.executionAction }}'
        executionBlockType: '{{ item.executionBlockType }}'
        executionRegion: '{{ item.executionRegion }}'
        executionRole: '{{ item.executionRole }}'
        executionState: '{{ item.executionState }}'
        lastEvaluatedVersion: '{{ item.lastEvaluatedVersion }}'
        lastEvaluationTime: '{{ item.lastEvaluationTime }}'
        mode: '{{ item.mode }}'
        name: '{{ item.name }}'
        owner: '{{ item.owner }}'
        plan: '{{ item.plan }}'
        previousEventId: '{{ item.previousEventId }}'
        primaryRegion: '{{ item.primaryRegion }}'
        recoveryApproach: '{{ item.recoveryApproach }}'
        recoveryTimeObjectiveMinutes: '{{ item.recoveryTimeObjectiveMinutes }}'
        regions: '{{ item.regions }}'
        resources: '{{ item.resources }}'
        startTime: '{{ item.startTime }}'
        status: '{{ item.status }}'
        stepMode: '{{ item.stepMode }}'
        stepStates: '{{ item.stepStates }}'
        timestamp: '{{ item.timestamp }}'
        triggers: '{{ item.triggers }}'
        type: '{{ item.type }}'
        updatedAt: '{{ item.updatedAt }}'
        version: '{{ item.version }}'
        workflow: '{{ item.workflow }}'
        workflows: '{{ item.workflows }}'
  # ── ListPlansInRegion ──
  - discovery_id: aws.arc-region-switch.list_plans_in_region
    calls:
      - action: list_plans_in_region
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.plans }}'
      item:
        activePlanExecution: '{{ item.activePlanExecution }}'
        arn: '{{ item.arn }}'
        description: '{{ item.description }}'
        executionRole: '{{ item.executionRole }}'
        name: '{{ item.name }}'
        owner: '{{ item.owner }}'
        primaryRegion: '{{ item.primaryRegion }}'
        recoveryApproach: '{{ item.recoveryApproach }}'
        recoveryTimeObjectiveMinutes: '{{ item.recoveryTimeObjectiveMinutes }}'
        regions: '{{ item.regions }}'
        updatedAt: '{{ item.updatedAt }}'
        version: '{{ item.version }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetPlan ──
  - discovery_id: aws.arc-region-switch.get_plan
    for_each: aws.arc-region-switch.list_plans
    calls:
      - action: get_plan
        params:
          arn: '{{ item.arn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.plans }}'
      item:
        arn: '{{ item.arn }}'
        associatedAlarms: '{{ item.associatedAlarms }}'
        description: '{{ item.description }}'
        executionRole: '{{ item.executionRole }}'
        name: '{{ item.name }}'
        owner: '{{ item.owner }}'
        primaryRegion: '{{ item.primaryRegion }}'
        recoveryApproach: '{{ item.recoveryApproach }}'
        recoveryTimeObjectiveMinutes: '{{ item.recoveryTimeObjectiveMinutes }}'
        regions: '{{ item.regions }}'
        triggers: '{{ item.triggers }}'
        updatedAt: '{{ item.updatedAt }}'
        version: '{{ item.version }}'
        workflows: '{{ item.workflows }}'
  # ── GetPlanEvaluationStatus ──
  - discovery_id: aws.arc-region-switch.get_plan_evaluation_status
    for_each: aws.arc-region-switch.list_plans
    calls:
      - action: get_plan_evaluation_status
        params:
          planArn: '{{ item.planArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.warnings }}'
      item:
        evaluationState: '{{ item.evaluationState }}'
        lastEvaluatedVersion: '{{ item.lastEvaluatedVersion }}'
        lastEvaluationTime: '{{ item.lastEvaluationTime }}'
        resourceArn: '{{ item.resourceArn }}'
        stepName: '{{ item.stepName }}'
        version: '{{ item.version }}'
        warningMessage: '{{ item.warningMessage }}'
        warningStatus: '{{ item.warningStatus }}'
        warningUpdatedTime: '{{ item.warningUpdatedTime }}'
        warnings: '{{ item.warnings }}'
        workflow: '{{ item.workflow }}'
  # ── GetPlanExecution ──
  - discovery_id: aws.arc-region-switch.get_plan_execution
    for_each: aws.arc-region-switch.list_plans
    calls:
      - action: get_plan_execution
        params:
          planArn: '{{ item.planArn }}'
          executionId: '{{ item.executionId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.stepStates }}'
      item:
        endTime: '{{ item.endTime }}'
        name: '{{ item.name }}'
        startTime: '{{ item.startTime }}'
        status: '{{ item.status }}'
        stepMode: '{{ item.stepMode }}'
        stepStates: '{{ item.stepStates }}'
  # ── GetPlanInRegion ──
  - discovery_id: aws.arc-region-switch.get_plan_in_region
    for_each: aws.arc-region-switch.list_plans
    calls:
      - action: get_plan_in_region
        params:
          arn: '{{ item.arn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.plans }}'
      item:
        arn: '{{ item.arn }}'
        associatedAlarms: '{{ item.associatedAlarms }}'
        description: '{{ item.description }}'
        executionRole: '{{ item.executionRole }}'
        name: '{{ item.name }}'
        owner: '{{ item.owner }}'
        primaryRegion: '{{ item.primaryRegion }}'
        recoveryApproach: '{{ item.recoveryApproach }}'
        recoveryTimeObjectiveMinutes: '{{ item.recoveryTimeObjectiveMinutes }}'
        regions: '{{ item.regions }}'
        triggers: '{{ item.triggers }}'
        updatedAt: '{{ item.updatedAt }}'
        version: '{{ item.version }}'
        workflows: '{{ item.workflows }}'
  # ── ListPlanExecutionEvents ──
  - discovery_id: aws.arc-region-switch.list_plan_execution_events
    for_each: aws.arc-region-switch.list_plans
    calls:
      - action: list_plan_execution_events
        params:
          planArn: '{{ item.planArn }}'
          executionId: '{{ item.executionId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        description: '{{ item.description }}'
        error: '{{ item.error }}'
        eventId: '{{ item.eventId }}'
        executionBlockType: '{{ item.executionBlockType }}'
        previousEventId: '{{ item.previousEventId }}'
        resources: '{{ item.resources }}'
        stepName: '{{ item.stepName }}'
        stepStates: '{{ item.stepStates }}'
        timestamp: '{{ item.timestamp }}'
        type: '{{ item.type }}'
  # ── ListPlanExecutions ──
  - discovery_id: aws.arc-region-switch.list_plan_executions
    for_each: aws.arc-region-switch.list_plans
    calls:
      - action: list_plan_executions
        params:
          planArn: '{{ item.planArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        actualRecoveryTime: '{{ item.actualRecoveryTime }}'
        comment: '{{ item.comment }}'
        endTime: '{{ item.endTime }}'
        error: '{{ item.error }}'
        eventId: '{{ item.eventId }}'
        executionAction: '{{ item.executionAction }}'
        executionBlockType: '{{ item.executionBlockType }}'
        executionId: '{{ item.executionId }}'
        executionRegion: '{{ item.executionRegion }}'
        executionState: '{{ item.executionState }}'
        mode: '{{ item.mode }}'
        planArn: '{{ item.planArn }}'
        previousEventId: '{{ item.previousEventId }}'
        resources: '{{ item.resources }}'
        startTime: '{{ item.startTime }}'
        status: '{{ item.status }}'
        stepMode: '{{ item.stepMode }}'
        stepStates: '{{ item.stepStates }}'
        timestamp: '{{ item.timestamp }}'
        type: '{{ item.type }}'
        updatedAt: '{{ item.updatedAt }}'
        version: '{{ item.version }}'
  # ── ListRoute53HealthChecks ──
  - discovery_id: aws.arc-region-switch.list_route53_health_checks
    for_each: aws.arc-region-switch.list_plans
    calls:
      - action: list_route53_health_checks
        params:
          arn: '{{ item.arn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.healthChecks }}'
      item:
        healthCheckId: '{{ item.healthCheckId }}'
        hostedZoneId: '{{ item.hostedZoneId }}'
        recordName: '{{ item.recordName }}'
        region: '{{ item.region }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.arc-region-switch.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        resourceTags: '{{ response.resourceTags }}'
