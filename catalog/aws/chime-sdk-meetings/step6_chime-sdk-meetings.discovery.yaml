# ============================================================
# Discovery YAML — chime-sdk-meetings (AWS)
# Generated: 2026-02-21T04:56:57Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: chime-sdk-meetings
services:
  client: chime-sdk-meetings
  module: boto3.client
discovery:
  # ── Dependent read operations (require identifiers) ──
  # ── GetAttendee ──
  - discovery_id: aws.chime-sdk-meetings.get_attendee
    calls:
      - action: get_attendee
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Attendee }}'
      item:
        AttendeeId: '{{ item.AttendeeId }}'
        Capabilities: '{{ item.Capabilities }}'
        ExternalUserId: '{{ item.ExternalUserId }}'
        JoinToken: '{{ item.JoinToken }}'
  # ── GetMeeting ──
  - discovery_id: aws.chime-sdk-meetings.get_meeting
    calls:
      - action: get_meeting
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Meeting }}'
      item:
        ExternalMeetingId: '{{ item.ExternalMeetingId }}'
        MediaPlacement: '{{ item.MediaPlacement }}'
        MediaRegion: '{{ item.MediaRegion }}'
        MeetingArn: '{{ item.MeetingArn }}'
        MeetingFeatures: '{{ item.MeetingFeatures }}'
        MeetingHostId: '{{ item.MeetingHostId }}'
        MeetingId: '{{ item.MeetingId }}'
        PrimaryMeetingId: '{{ item.PrimaryMeetingId }}'
        TenantIds: '{{ item.TenantIds }}'
  # ── ListAttendees ──
  - discovery_id: aws.chime-sdk-meetings.list_attendees
    calls:
      - action: list_attendees
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Attendees }}'
      item:
        AttendeeId: '{{ item.AttendeeId }}'
        Capabilities: '{{ item.Capabilities }}'
        ExternalUserId: '{{ item.ExternalUserId }}'
        JoinToken: '{{ item.JoinToken }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.chime-sdk-meetings.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Tags }}'
      item:
        Key: '{{ item.Key }}'
        Value: '{{ item.Value }}'
