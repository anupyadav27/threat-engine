# ============================================================
# Discovery YAML — notificationscontacts (AWS)
# Generated: 2026-02-21T04:56:59Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: notificationscontacts
services:
  client: notificationscontacts
  module: boto3.client
discovery:
  # ── ListEmailContacts ──
  - discovery_id: aws.notificationscontacts.list_email_contacts
    calls:
      - action: list_email_contacts
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.emailContacts }}'
      item:
        address: '{{ item.address }}'
        arn: '{{ item.arn }}'
        creationTime: '{{ item.creationTime }}'
        emailContact: '{{ item.emailContact }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        updateTime: '{{ item.updateTime }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetEmailContact ──
  - discovery_id: aws.notificationscontacts.get_email_contact
    for_each: aws.notificationscontacts.list_email_contacts
    calls:
      - action: get_email_contact
        params:
          arn: '{{ item.arn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.emailContacts }}'
      item:
        address: '{{ item.address }}'
        arn: '{{ item.arn }}'
        creationTime: '{{ item.creationTime }}'
        emailContact: '{{ item.emailContact }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        updateTime: '{{ item.updateTime }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.notificationscontacts.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        tags: '{{ response.tags }}'
