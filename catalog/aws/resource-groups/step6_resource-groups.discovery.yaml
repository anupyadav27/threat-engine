# ============================================================
# Discovery YAML — resource-groups (AWS)
# Generated: 2026-02-21T04:56:59Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: resource-groups
services:
  client: resource-groups
  module: boto3.client
discovery:
  # ── GetAccountSettings ──
  - discovery_id: aws.resource-groups.get_account_settings
    calls:
      - action: get_account_settings
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.AccountSettings }}'
      item:
        AccountSettings: '{{ item.AccountSettings }}'
        DestinationArn: '{{ item.DestinationArn }}'
        Enabled: '{{ item.Enabled }}'
        Format: '{{ item.Format }}'
        GroupLifecycleEventsDesiredStatus: '{{ item.GroupLifecycleEventsDesiredStatus }}'
        GroupLifecycleEventsStatus: '{{ item.GroupLifecycleEventsStatus }}'
        GroupLifecycleEventsStatusMessage: '{{ item.GroupLifecycleEventsStatusMessage }}'
        Level: '{{ item.Level }}'
  # ── GetGroup ──
  - discovery_id: aws.resource-groups.get_group
    calls:
      - action: get_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Group }}'
      item:
        ApplicationTag: '{{ item.ApplicationTag }}'
        Criticality: '{{ item.Criticality }}'
        Description: '{{ item.Description }}'
        DisplayName: '{{ item.DisplayName }}'
        GroupArn: '{{ item.GroupArn }}'
        Owner: '{{ item.Owner }}'
  # ── GetGroupConfiguration ──
  - discovery_id: aws.resource-groups.get_group_configuration
    calls:
      - action: get_group_configuration
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.GroupConfiguration }}'
      item:
        Status: '{{ item.Status }}'
        Configuration: '{{ item.Configuration }}'
        FailureReason: '{{ item.FailureReason }}'
        GroupConfiguration: '{{ item.GroupConfiguration }}'
        ProposedConfiguration: '{{ item.ProposedConfiguration }}'
  # ── GetGroupQuery ──
  - discovery_id: aws.resource-groups.get_group_query
    calls:
      - action: get_group_query
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.GroupQuery }}'
      item:
        GroupName: '{{ item.GroupName }}'
        GroupQuery: '{{ item.GroupQuery }}'
        ResourceQuery: '{{ item.ResourceQuery }}'
  # ── ListGroupResources ──
  - discovery_id: aws.resource-groups.list_group_resources
    calls:
      - action: list_group_resources
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Resources }}'
      item:
        Status: '{{ item.Status }}'
        Identifier: '{{ item.Identifier }}'
  # ── ListGroups ──
  - discovery_id: aws.resource-groups.list_groups
    calls:
      - action: list_groups
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.GroupIdentifiers }}'
      item:
        Name: '{{ item.Name }}'
        Tags: '{{ item.Tags }}'
        Criticality: '{{ item.Criticality }}'
        Description: '{{ item.Description }}'
        DisplayName: '{{ item.DisplayName }}'
        GroupArn: '{{ item.GroupArn }}'
        GroupName: '{{ item.GroupName }}'
        Owner: '{{ item.Owner }}'
  # ── ListTagSyncTasks ──
  - discovery_id: aws.resource-groups.list_tag_sync_tasks
    calls:
      - action: list_tag_sync_tasks
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.TagSyncTasks }}'
      item:
        RoleArn: '{{ item.RoleArn }}'
        Status: '{{ item.Status }}'
        CreatedAt: '{{ item.CreatedAt }}'
        ErrorMessage: '{{ item.ErrorMessage }}'
        GroupArn: '{{ item.GroupArn }}'
        GroupName: '{{ item.GroupName }}'
        ResourceQuery: '{{ item.ResourceQuery }}'
        TagKey: '{{ item.TagKey }}'
        TagValue: '{{ item.TagValue }}'
        TaskArn: '{{ item.TaskArn }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetTagSyncTask ──
  - discovery_id: aws.resource-groups.get_tag_sync_task
    for_each: aws.resource-groups.list_tag_sync_tasks
    calls:
      - action: get_tag_sync_task
        params:
          TaskArn: '{{ item.TaskArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ResourceQuery }}'
      item:
        Query: '{{ item.Query }}'
        Type: '{{ item.Type }}'
  # ── GetTags ──
  - discovery_id: aws.resource-groups.get_tags
    calls:
      - action: get_tags
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Arn }}'
      item:
        Arn: '{{ item.Arn }}'
  # ── ListGroupingStatuses ──
  - discovery_id: aws.resource-groups.list_grouping_statuses
    for_each: aws.resource-groups.get_group
    calls:
      - action: list_grouping_statuses
        params:
          Group: '{{ item.Group }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.GroupingStatuses }}'
      item:
        Status: '{{ item.Status }}'
        Action: '{{ item.Action }}'
        ErrorCode: '{{ item.ErrorCode }}'
        ErrorMessage: '{{ item.ErrorMessage }}'
        UpdatedAt: '{{ item.UpdatedAt }}'
  # ── SearchResources ──
  - discovery_id: aws.resource-groups.search_resources
    calls:
      - action: search_resources
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ResourceIdentifiers }}'
