# ============================================================
# Discovery YAML — efs (AWS)
# Generated: 2026-02-21T04:56:58Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: efs
services:
  client: efs
  module: boto3.client
discovery:
  # ── DescribeAccessPoints ──
  - discovery_id: aws.efs.describe_access_points
    calls:
      - action: describe_access_points
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.AccessPoints }}'
      item:
        Name: '{{ item.Name }}'
        OwnerId: '{{ item.OwnerId }}'
        Policy: '{{ item.Policy }}'
        Tags: '{{ item.Tags }}'
        AccessPointArn: '{{ item.AccessPointArn }}'
        AccessPointId: '{{ item.AccessPointId }}'
        AccessPoints: '{{ item.AccessPoints }}'
        ClientToken: '{{ item.ClientToken }}'
        FileSystemId: '{{ item.FileSystemId }}'
        LifeCycleState: '{{ item.LifeCycleState }}'
        PosixUser: '{{ item.PosixUser }}'
        RootDirectory: '{{ item.RootDirectory }}'
  # ── DescribeAccountPreferences ──
  - discovery_id: aws.efs.describe_account_preferences
    calls:
      - action: describe_account_preferences
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ResourceIdPreference }}'
      item:
        ResourceIdPreference: '{{ item.ResourceIdPreference }}'
        ResourceIdType: '{{ item.ResourceIdType }}'
        Resources: '{{ item.Resources }}'
  # ── DescribeFileSystems ──
  - discovery_id: aws.efs.describe_file_systems
    calls:
      - action: describe_file_systems
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.FileSystems }}'
      item:
        CreationTime: '{{ item.CreationTime }}'
        Encrypted: '{{ item.Encrypted }}'
        KmsKeyId: '{{ item.KmsKeyId }}'
        Name: '{{ item.Name }}'
        OwnerId: '{{ item.OwnerId }}'
        Tags: '{{ item.Tags }}'
        AvailabilityZoneId: '{{ item.AvailabilityZoneId }}'
        AvailabilityZoneName: '{{ item.AvailabilityZoneName }}'
        CreationToken: '{{ item.CreationToken }}'
        FileSystemArn: '{{ item.FileSystemArn }}'
        FileSystemId: '{{ item.FileSystemId }}'
        FileSystemProtection: '{{ item.FileSystemProtection }}'
        FileSystems: '{{ item.FileSystems }}'
        LifeCycleState: '{{ item.LifeCycleState }}'
        NumberOfMountTargets: '{{ item.NumberOfMountTargets }}'
        PerformanceMode: '{{ item.PerformanceMode }}'
        ProvisionedThroughputInMibps: '{{ item.ProvisionedThroughputInMibps }}'
        SizeInBytes: '{{ item.SizeInBytes }}'
        ThroughputMode: '{{ item.ThroughputMode }}'
  # ── DescribeMountTargets ──
  - discovery_id: aws.efs.describe_mount_targets
    calls:
      - action: describe_mount_targets
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.MountTargets }}'
      item:
        OwnerId: '{{ item.OwnerId }}'
        SubnetId: '{{ item.SubnetId }}'
        VpcId: '{{ item.VpcId }}'
        AvailabilityZoneId: '{{ item.AvailabilityZoneId }}'
        AvailabilityZoneName: '{{ item.AvailabilityZoneName }}'
        FileSystemId: '{{ item.FileSystemId }}'
        IpAddress: '{{ item.IpAddress }}'
        Ipv6Address: '{{ item.Ipv6Address }}'
        LifeCycleState: '{{ item.LifeCycleState }}'
        MountTargetId: '{{ item.MountTargetId }}'
        MountTargets: '{{ item.MountTargets }}'
        NetworkInterfaceId: '{{ item.NetworkInterfaceId }}'
  # ── DescribeReplicationConfigurations ──
  - discovery_id: aws.efs.describe_replication_configurations
    calls:
      - action: describe_replication_configurations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Replications }}'
      item:
        CreationTime: '{{ item.CreationTime }}'
        Destinations: '{{ item.Destinations }}'
        OriginalSourceFileSystemArn: '{{ item.OriginalSourceFileSystemArn }}'
        Replications: '{{ item.Replications }}'
        SourceFileSystemArn: '{{ item.SourceFileSystemArn }}'
        SourceFileSystemId: '{{ item.SourceFileSystemId }}'
        SourceFileSystemOwnerId: '{{ item.SourceFileSystemOwnerId }}'
        SourceFileSystemRegion: '{{ item.SourceFileSystemRegion }}'
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeBackupPolicy ──
  - discovery_id: aws.efs.describe_backup_policy
    for_each: aws.efs.describe_access_points
    calls:
      - action: describe_backup_policy
        params:
          FileSystemId: '{{ item.FileSystemId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.BackupPolicy }}'
      item:
        Status: '{{ item.Status }}'
        BackupPolicy: '{{ item.BackupPolicy }}'
        Statement: '{{ item.Statement }}'
        Version: '{{ item.Version }}'
  # ── DescribeFileSystemPolicy ──
  - discovery_id: aws.efs.describe_file_system_policy
    for_each: aws.efs.describe_access_points
    calls:
      - action: describe_file_system_policy
        params:
          FileSystemId: '{{ item.FileSystemId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.AccessPoints }}'
      item:
        Policy: '{{ item.Policy }}'
  # ── DescribeLifecycleConfiguration ──
  - discovery_id: aws.efs.describe_lifecycle_configuration
    for_each: aws.efs.describe_access_points
    calls:
      - action: describe_lifecycle_configuration
        params:
          FileSystemId: '{{ item.FileSystemId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.LifecyclePolicies }}'
      item:
        TransitionToArchive: '{{ item.TransitionToArchive }}'
        TransitionToIA: '{{ item.TransitionToIA }}'
        TransitionToPrimaryStorageClass: '{{ item.TransitionToPrimaryStorageClass }}'
  # ── DescribeMountTargetSecurityGroups ──
  - discovery_id: aws.efs.describe_mount_target_security_groups
    for_each: aws.efs.describe_mount_targets
    calls:
      - action: describe_mount_target_security_groups
        params:
          MountTargetId: '{{ item.MountTargetId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.SecurityGroups }}'
  # ── DescribeTags ──
  - discovery_id: aws.efs.describe_tags
    for_each: aws.efs.describe_access_points
    calls:
      - action: describe_tags
        params:
          FileSystemId: '{{ item.FileSystemId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Tags }}'
      item:
        Key: '{{ item.Key }}'
        Value: '{{ item.Value }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.efs.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Tags }}'
      item:
        Key: '{{ item.Key }}'
        Value: '{{ item.Value }}'
