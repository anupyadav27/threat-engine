# ============================================================
# Discovery YAML — ses (AWS)
# Generated: 2026-02-21T04:56:59Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: ses
services:
  client: ses
  module: boto3.client
discovery:
  # ── DescribeActiveReceiptRuleSet ──
  - discovery_id: aws.ses.describe_active_receipt_rule_set
    calls:
      - action: describe_active_receipt_rule_set
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Rules }}'
      item:
        Name: '{{ item.Name }}'
        TlsPolicy: '{{ item.TlsPolicy }}'
        Actions: '{{ item.Actions }}'
        Enabled: '{{ item.Enabled }}'
        Metadata: '{{ item.Metadata }}'
        Recipients: '{{ item.Recipients }}'
        Rules: '{{ item.Rules }}'
        ScanEnabled: '{{ item.ScanEnabled }}'
        Statement: '{{ item.Statement }}'
        Version: '{{ item.Version }}'
  # ── GetAccountSendingEnabled ──
  - discovery_id: aws.ses.get_account_sending_enabled
    calls:
      - action: get_account_sending_enabled
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        Enabled: '{{ response.Enabled }}'
  # ── GetSendQuota ──
  - discovery_id: aws.ses.get_send_quota
    calls:
      - action: get_send_quota
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Max24HourSend }}'
      item:
        Max24HourSend: '{{ item.Max24HourSend }}'
        MaxSendRate: '{{ item.MaxSendRate }}'
        SentLast24Hours: '{{ item.SentLast24Hours }}'
  # ── GetSendStatistics ──
  - discovery_id: aws.ses.get_send_statistics
    calls:
      - action: get_send_statistics
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.SendDataPoints }}'
      item:
        Bounces: '{{ item.Bounces }}'
        Complaints: '{{ item.Complaints }}'
        DeliveryAttempts: '{{ item.DeliveryAttempts }}'
        Rejects: '{{ item.Rejects }}'
        SendDataPoints: '{{ item.SendDataPoints }}'
        Timestamp: '{{ item.Timestamp }}'
  # ── ListConfigurationSets ──
  - discovery_id: aws.ses.list_configuration_sets
    calls:
      - action: list_configuration_sets
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ConfigurationSets }}'
      item:
        Name: '{{ item.Name }}'
        Status: '{{ item.Status }}'
  # ── ListCustomVerificationEmailTemplates ──
  - discovery_id: aws.ses.list_custom_verification_email_templates
    calls:
      - action: list_custom_verification_email_templates
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.CustomVerificationEmailTemplates }}'
      item:
        FailureRedirectionURL: '{{ item.FailureRedirectionURL }}'
        FromEmailAddress: '{{ item.FromEmailAddress }}'
        SuccessRedirectionURL: '{{ item.SuccessRedirectionURL }}'
        Template: '{{ item.Template }}'
        TemplateName: '{{ item.TemplateName }}'
        TemplateSubject: '{{ item.TemplateSubject }}'
  # ── ListIdentities ──
  - discovery_id: aws.ses.list_identities
    calls:
      - action: list_identities
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Identities }}'
  # ── ListReceiptFilters ──
  - discovery_id: aws.ses.list_receipt_filters
    calls:
      - action: list_receipt_filters
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Filters }}'
      item:
        Name: '{{ item.Name }}'
        IpFilter: '{{ item.IpFilter }}'
  # ── ListReceiptRuleSets ──
  - discovery_id: aws.ses.list_receipt_rule_sets
    calls:
      - action: list_receipt_rule_sets
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.RuleSets }}'
      item:
        Name: '{{ item.Name }}'
        CreatedTimestamp: '{{ item.CreatedTimestamp }}'
        Rule: '{{ item.Rule }}'
  # ── ListTemplates ──
  - discovery_id: aws.ses.list_templates
    calls:
      - action: list_templates
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.TemplatesMetadata }}'
      item:
        Name: '{{ item.Name }}'
        CreatedTimestamp: '{{ item.CreatedTimestamp }}'
  # ── ListVerifiedEmailAddresses ──
  - discovery_id: aws.ses.list_verified_email_addresses
    calls:
      - action: list_verified_email_addresses
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.VerifiedEmailAddresses }}'
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeConfigurationSet ──
  - discovery_id: aws.ses.describe_configuration_set
    calls:
      - action: describe_configuration_set
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.EventDestinations }}'
      item:
        Name: '{{ item.Name }}'
        CloudWatchDestination: '{{ item.CloudWatchDestination }}'
        Enabled: '{{ item.Enabled }}'
        EventDestinations: '{{ item.EventDestinations }}'
        KinesisFirehoseDestination: '{{ item.KinesisFirehoseDestination }}'
        MatchingEventTypes: '{{ item.MatchingEventTypes }}'
        SNSDestination: '{{ item.SNSDestination }}'
  # ── DescribeReceiptRule ──
  - discovery_id: aws.ses.describe_receipt_rule
    calls:
      - action: describe_receipt_rule
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Rules }}'
      item:
        Name: '{{ item.Name }}'
        TlsPolicy: '{{ item.TlsPolicy }}'
        Actions: '{{ item.Actions }}'
        Enabled: '{{ item.Enabled }}'
        Recipients: '{{ item.Recipients }}'
        Rule: '{{ item.Rule }}'
        ScanEnabled: '{{ item.ScanEnabled }}'
  # ── DescribeReceiptRuleSet ──
  - discovery_id: aws.ses.describe_receipt_rule_set
    calls:
      - action: describe_receipt_rule_set
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Rules }}'
      item:
        Name: '{{ item.Name }}'
        TlsPolicy: '{{ item.TlsPolicy }}'
        Actions: '{{ item.Actions }}'
        Enabled: '{{ item.Enabled }}'
        Recipients: '{{ item.Recipients }}'
        ScanEnabled: '{{ item.ScanEnabled }}'
  # ── GetCustomVerificationEmailTemplate ──
  - discovery_id: aws.ses.get_custom_verification_email_template
    for_each: aws.ses.list_custom_verification_email_templates
    calls:
      - action: get_custom_verification_email_template
        params:
          TemplateName: '{{ item.TemplateName }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        FailureRedirectionURL: '{{ response.FailureRedirectionURL }}'
        FromEmailAddress: '{{ response.FromEmailAddress }}'
        SuccessRedirectionURL: '{{ response.SuccessRedirectionURL }}'
        TemplateContent: '{{ response.TemplateContent }}'
        TemplateName: '{{ response.TemplateName }}'
        TemplateSubject: '{{ response.TemplateSubject }}'
  # ── GetIdentityDkimAttributes ──
  - discovery_id: aws.ses.get_identity_dkim_attributes
    calls:
      - action: get_identity_dkim_attributes
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        DkimAttributes: '{{ response.DkimAttributes }}'
  # ── GetIdentityMailFromDomainAttributes ──
  - discovery_id: aws.ses.get_identity_mail_from_domain_attributes
    calls:
      - action: get_identity_mail_from_domain_attributes
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        MailFromDomainAttributes: '{{ response.MailFromDomainAttributes }}'
  # ── GetIdentityNotificationAttributes ──
  - discovery_id: aws.ses.get_identity_notification_attributes
    calls:
      - action: get_identity_notification_attributes
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        NotificationAttributes: '{{ response.NotificationAttributes }}'
  # ── GetIdentityPolicies ──
  - discovery_id: aws.ses.get_identity_policies
    calls:
      - action: get_identity_policies
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.PolicyNames }}'
      item:
        Policies: '{{ item.Policies }}'
  # ── GetIdentityVerificationAttributes ──
  - discovery_id: aws.ses.get_identity_verification_attributes
    calls:
      - action: get_identity_verification_attributes
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.VerificationAttributes }}'
      item:
        VerificationAttributes: '{{ item.VerificationAttributes }}'
  # ── GetTemplate ──
  - discovery_id: aws.ses.get_template
    for_each: aws.ses.list_custom_verification_email_templates
    calls:
      - action: get_template
        params:
          TemplateName: '{{ item.TemplateName }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Template }}'
      item:
        HtmlPart: '{{ item.HtmlPart }}'
        SubjectPart: '{{ item.SubjectPart }}'
        Template: '{{ item.Template }}'
        TemplateName: '{{ item.TemplateName }}'
        TextPart: '{{ item.TextPart }}'
  # ── ListIdentityPolicies ──
  - discovery_id: aws.ses.list_identity_policies
    calls:
      - action: list_identity_policies
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.PolicyNames }}'
      item:
        Policies: '{{ item.Policies }}'
