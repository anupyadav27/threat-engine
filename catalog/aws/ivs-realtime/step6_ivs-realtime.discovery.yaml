# ============================================================
# Discovery YAML — ivs-realtime (AWS)
# Generated: 2026-02-21T04:56:58Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: ivs-realtime
services:
  client: ivs-realtime
  module: boto3.client
discovery:
  # ── ListCompositions ──
  - discovery_id: aws.ivs-realtime.list_compositions
    calls:
      - action: list_compositions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.compositions }}'
      item:
        arn: '{{ item.arn }}'
        autoParticipantRecordingConfiguration: '{{ item.autoParticipantRecordingConfiguration }}'
        composition: '{{ item.composition }}'
        destinations: '{{ item.destinations }}'
        endTime: '{{ item.endTime }}'
        endpoints: '{{ item.endpoints }}'
        firstJoinTime: '{{ item.firstJoinTime }}'
        layout: '{{ item.layout }}'
        published: '{{ item.published }}'
        recordingState: '{{ item.recordingState }}'
        replicationState: '{{ item.replicationState }}'
        replicationType: '{{ item.replicationType }}'
        stageArn: '{{ item.stageArn }}'
        stageSession: '{{ item.stageSession }}'
        startTime: '{{ item.startTime }}'
        state: '{{ item.state }}'
        tags: '{{ item.tags }}'
  # ── ListEncoderConfigurations ──
  - discovery_id: aws.ivs-realtime.list_encoder_configurations
    calls:
      - action: list_encoder_configurations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.encoderConfigurations }}'
      item:
        arn: '{{ item.arn }}'
        encoderConfiguration: '{{ item.encoderConfiguration }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        video: '{{ item.video }}'
  # ── ListIngestConfigurations ──
  - discovery_id: aws.ivs-realtime.list_ingest_configurations
    calls:
      - action: list_ingest_configurations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ingestConfigurations }}'
      item:
        arn: '{{ item.arn }}'
        ingestProtocol: '{{ item.ingestProtocol }}'
        name: '{{ item.name }}'
        participantId: '{{ item.participantId }}'
        stageArn: '{{ item.stageArn }}'
        state: '{{ item.state }}'
        userId: '{{ item.userId }}'
  # ── ListPublicKeys ──
  - discovery_id: aws.ivs-realtime.list_public_keys
    calls:
      - action: list_public_keys
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.publicKeys }}'
      item:
        arn: '{{ item.arn }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
  # ── ListStages ──
  - discovery_id: aws.ivs-realtime.list_stages
    calls:
      - action: list_stages
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.stages }}'
      item:
        activeSessionId: '{{ item.activeSessionId }}'
        arn: '{{ item.arn }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
  # ── ListStorageConfigurations ──
  - discovery_id: aws.ivs-realtime.list_storage_configurations
    calls:
      - action: list_storage_configurations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.storageConfigurations }}'
      item:
        arn: '{{ item.arn }}'
        name: '{{ item.name }}'
        s3: '{{ item.s3 }}'
        tags: '{{ item.tags }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetComposition ──
  - discovery_id: aws.ivs-realtime.get_composition
    for_each: aws.ivs-realtime.list_compositions
    calls:
      - action: get_composition
        params:
          arn: '{{ item.arn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.compositions }}'
      item:
        arn: '{{ item.arn }}'
        composition: '{{ item.composition }}'
        destinations: '{{ item.destinations }}'
        endTime: '{{ item.endTime }}'
        layout: '{{ item.layout }}'
        stageArn: '{{ item.stageArn }}'
        startTime: '{{ item.startTime }}'
        state: '{{ item.state }}'
        tags: '{{ item.tags }}'
  # ── GetEncoderConfiguration ──
  - discovery_id: aws.ivs-realtime.get_encoder_configuration
    for_each: aws.ivs-realtime.list_compositions
    calls:
      - action: get_encoder_configuration
        params:
          arn: '{{ item.arn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.compositions }}'
      item:
        arn: '{{ item.arn }}'
        encoderConfiguration: '{{ item.encoderConfiguration }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
        video: '{{ item.video }}'
  # ── GetIngestConfiguration ──
  - discovery_id: aws.ivs-realtime.get_ingest_configuration
    for_each: aws.ivs-realtime.list_compositions
    calls:
      - action: get_ingest_configuration
        params:
          arn: '{{ item.arn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.compositions }}'
      item:
        arn: '{{ item.arn }}'
        attributes: '{{ item.attributes }}'
        ingestProtocol: '{{ item.ingestProtocol }}'
        name: '{{ item.name }}'
        participantId: '{{ item.participantId }}'
        stageArn: '{{ item.stageArn }}'
        state: '{{ item.state }}'
        streamKey: '{{ item.streamKey }}'
        tags: '{{ item.tags }}'
        userId: '{{ item.userId }}'
  # ── GetParticipant ──
  - discovery_id: aws.ivs-realtime.get_participant
    for_each: aws.ivs-realtime.list_compositions
    calls:
      - action: get_participant
        params:
          stageArn: '{{ item.stageArn }}'
          sessionId: '{{ item.sessionId }}'
          participantId: '{{ item.participantId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ingestConfiguration }}'
      item:
        attributes: '{{ item.attributes }}'
        browserName: '{{ item.browserName }}'
        browserVersion: '{{ item.browserVersion }}'
        ispName: '{{ item.ispName }}'
        osName: '{{ item.osName }}'
        osVersion: '{{ item.osVersion }}'
        participant: '{{ item.participant }}'
        participantId: '{{ item.participantId }}'
        protocol: '{{ item.protocol }}'
        recordingS3BucketName: '{{ item.recordingS3BucketName }}'
        recordingS3Prefix: '{{ item.recordingS3Prefix }}'
        sdkVersion: '{{ item.sdkVersion }}'
        sourceSessionId: '{{ item.sourceSessionId }}'
        sourceStageArn: '{{ item.sourceStageArn }}'
        state: '{{ item.state }}'
        userId: '{{ item.userId }}'
  # ── GetPublicKey ──
  - discovery_id: aws.ivs-realtime.get_public_key
    for_each: aws.ivs-realtime.list_compositions
    calls:
      - action: get_public_key
        params:
          arn: '{{ item.arn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.compositions }}'
      item:
        arn: '{{ item.arn }}'
        fingerprint: '{{ item.fingerprint }}'
        name: '{{ item.name }}'
        publicKeyMaterial: '{{ item.publicKeyMaterial }}'
        tags: '{{ item.tags }}'
  # ── GetStage ──
  - discovery_id: aws.ivs-realtime.get_stage
    for_each: aws.ivs-realtime.list_compositions
    calls:
      - action: get_stage
        params:
          arn: '{{ item.arn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.stages }}'
      item:
        activeSessionId: '{{ item.activeSessionId }}'
        arn: '{{ item.arn }}'
        autoParticipantRecordingConfiguration: '{{ item.autoParticipantRecordingConfiguration }}'
        endpoints: '{{ item.endpoints }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
  # ── GetStageSession ──
  - discovery_id: aws.ivs-realtime.get_stage_session
    for_each: aws.ivs-realtime.list_compositions
    calls:
      - action: get_stage_session
        params:
          stageArn: '{{ item.stageArn }}'
          sessionId: '{{ item.sessionId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.compositions }}'
      item:
        endTime: '{{ item.endTime }}'
        sessionId: '{{ item.sessionId }}'
        stageSession: '{{ item.stageSession }}'
        startTime: '{{ item.startTime }}'
  # ── GetStorageConfiguration ──
  - discovery_id: aws.ivs-realtime.get_storage_configuration
    for_each: aws.ivs-realtime.list_compositions
    calls:
      - action: get_storage_configuration
        params:
          arn: '{{ item.arn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.compositions }}'
      item:
        arn: '{{ item.arn }}'
        name: '{{ item.name }}'
        s3: '{{ item.s3 }}'
        tags: '{{ item.tags }}'
  # ── ListParticipantEvents ──
  - discovery_id: aws.ivs-realtime.list_participant_events
    for_each: aws.ivs-realtime.list_compositions
    calls:
      - action: list_participant_events
        params:
          stageArn: '{{ item.stageArn }}'
          sessionId: '{{ item.sessionId }}'
          participantId: '{{ item.participantId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.events }}'
      item:
        destinationSessionId: '{{ item.destinationSessionId }}'
        destinationStageArn: '{{ item.destinationStageArn }}'
        errorCode: '{{ item.errorCode }}'
        eventTime: '{{ item.eventTime }}'
        name: '{{ item.name }}'
        participant: '{{ item.participant }}'
        participantId: '{{ item.participantId }}'
        remoteParticipantId: '{{ item.remoteParticipantId }}'
        replica: '{{ item.replica }}'
  # ── ListParticipantReplicas ──
  - discovery_id: aws.ivs-realtime.list_participant_replicas
    for_each: aws.ivs-realtime.list_ingest_configurations
    calls:
      - action: list_participant_replicas
        params:
          sourceStageArn: '{{ item.sourceStageArn }}'
          participantId: '{{ item.participantId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.replicas }}'
      item:
        destinationSessionId: '{{ item.destinationSessionId }}'
        destinationStageArn: '{{ item.destinationStageArn }}'
        participantId: '{{ item.participantId }}'
        replicationState: '{{ item.replicationState }}'
        sourceSessionId: '{{ item.sourceSessionId }}'
        sourceStageArn: '{{ item.sourceStageArn }}'
  # ── ListParticipants ──
  - discovery_id: aws.ivs-realtime.list_participants
    for_each: aws.ivs-realtime.list_compositions
    calls:
      - action: list_participants
        params:
          stageArn: '{{ item.stageArn }}'
          sessionId: '{{ item.sessionId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.participants }}'
      item:
        firstJoinTime: '{{ item.firstJoinTime }}'
        participantId: '{{ item.participantId }}'
        published: '{{ item.published }}'
        recordingState: '{{ item.recordingState }}'
        replicationState: '{{ item.replicationState }}'
        replicationType: '{{ item.replicationType }}'
        sourceSessionId: '{{ item.sourceSessionId }}'
        sourceStageArn: '{{ item.sourceStageArn }}'
        state: '{{ item.state }}'
        userId: '{{ item.userId }}'
  # ── ListStageSessions ──
  - discovery_id: aws.ivs-realtime.list_stage_sessions
    for_each: aws.ivs-realtime.list_compositions
    calls:
      - action: list_stage_sessions
        params:
          stageArn: '{{ item.stageArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.stageSessions }}'
      item:
        endTime: '{{ item.endTime }}'
        firstJoinTime: '{{ item.firstJoinTime }}'
        published: '{{ item.published }}'
        recordingState: '{{ item.recordingState }}'
        replicationState: '{{ item.replicationState }}'
        replicationType: '{{ item.replicationType }}'
        sessionId: '{{ item.sessionId }}'
        stageSession: '{{ item.stageSession }}'
        startTime: '{{ item.startTime }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.ivs-realtime.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        tags: '{{ response.tags }}'
