version: '1.0'
provider: aws
service: bedrock-agentcore-control
services:
  client: bedrock-agentcore-control
  module: boto3.client
discovery:
  # ── GetTokenVault ──
  - discovery_id: aws.bedrock-agentcore-control.get_token_vault
    calls:
      - action: get_token_vault
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.kmsConfiguration }}'
      item:
        Status: '{{ item.Status }}'
        Enabled: '{{ item.Enabled }}'
        keyType: '{{ item.keyType }}'
        kmsConfiguration: '{{ item.kmsConfiguration }}'
        kmsKeyArn: '{{ item.kmsKeyArn }}'
        lastModifiedDate: '{{ item.lastModifiedDate }}'
        tokenVaultId: '{{ item.tokenVaultId }}'
