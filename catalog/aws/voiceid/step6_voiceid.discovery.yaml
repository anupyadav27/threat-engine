version: '1.0'
provider: aws
service: voice-id
services:
  client: voice-id
  module: boto3.client
discovery:
  # ── ListDomains ──
  - discovery_id: aws.voice-id.list_domains
    calls:
      - action: list_domains
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.DomainSummaries }}'
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeDomain ──
  - discovery_id: aws.voice-id.describe_domain
    for_each: aws.voice-id.list_domains
    calls:
      - action: describe_domain
        params:
          DomainId: '{{ item.DomainId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        Domain: '{{ response.Domain }}'
  # ── DescribeFraudster ──
  - discovery_id: aws.voice-id.describe_fraudster
    for_each: aws.voice-id.list_domains
    calls:
      - action: describe_fraudster
        params:
          DomainId: '{{ item.DomainId }}'
          FraudsterId: '{{ item.FraudsterId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        Fraudster: '{{ response.Fraudster }}'
  # ── DescribeFraudsterRegistrationJob ──
  - discovery_id: aws.voice-id.describe_fraudster_registration_job
    for_each: aws.voice-id.list_domains
    calls:
      - action: describe_fraudster_registration_job
