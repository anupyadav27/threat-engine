version: '1.0'
provider: aws
service: mturk
services:
  client: mturk
  module: boto3.client
discovery:
  # ── GetAccountBalance ──
  - discovery_id: aws.mturk.get_account_balance
    calls:
      - action: get_account_balance
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.AvailableBalance }}'
      item:
        AvailableBalance: '{{ item.AvailableBalance }}'
        OnHoldBalance: '{{ item.OnHoldBalance }}'
  # ── ListBonusPayments ──
  - discovery_id: aws.mturk.list_bonus_payments
    calls:
      - action: list_bonus_payments
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.BonusPayments }}'
      item:
        AssignmentId: '{{ item.AssignmentId }}'
        BonusAmount: '{{ item.BonusAmount }}'
        GrantTime: '{{ item.GrantTime }}'
        Reason: '{{ item.Reason }}'
        WorkerId: '{{ item.WorkerId }}'
  # ── ListHITs ──
  - discovery_id: aws.mturk.list_hi_ts
    calls:
      - action: list_hi_ts
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.HITs }}'
      item:
        CreationTime: '{{ item.CreationTime }}'
        AssignmentDurationInSeconds: '{{ item.AssignmentDurationInSeconds }}'
        AutoApprovalDelayInSeconds: '{{ item.AutoApprovalDelayInSeconds }}'
        Description: '{{ item.Description }}'
        Expiration: '{{ item.Expiration }}'
        HIT: '{{ item.HIT }}'
        HITGroupId: '{{ item.HITGroupId }}'
        HITId: '{{ item.HITId }}'
        HITLayoutId: '{{ item.HITLayoutId }}'
        HITReviewStatus: '{{ item.HITReviewStatus }}'
        HITStatus: '{{ item.HITStatus }}'
        HITTypeId: '{{ item.HITTypeId }}'
        Keywords: '{{ item.Keywords }}'
        MaxAssignments: '{{ item.MaxAssignments }}'
        NumberOfAssignmentsAvailable: '{{ item.NumberOfAssignmentsAvailable }}'
        NumberOfAssignmentsCompleted: '{{ item.NumberOfAssignmentsCompleted }}'
        NumberOfAssignmentsPending: '{{ item.NumberOfAssignmentsPending }}'
        QualificationRequirements: '{{ item.QualificationRequirements }}'
        Question: '{{ item.Question }}'
        RequesterAnnotation: '{{ item.RequesterAnnotation }}'
        Reward: '{{ item.Reward }}'
        Title: '{{ item.Title }}'
  # ── ListQualificationRequests ──
  - discovery_id: aws.mturk.list_qualification_requests
    calls:
      - action: list_qualification_requests
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.QualificationRequests }}'
      item:
        Answer: '{{ item.Answer }}'
        QualificationRequestId: '{{ item.QualificationRequestId }}'
        QualificationTypeId: '{{ item.QualificationTypeId }}'
        SubmitTime: '{{ item.SubmitTime }}'
        Test: '{{ item.Test }}'
        WorkerId: '{{ item.WorkerId }}'
  # ── ListReviewableHITs ──
  - discovery_id: aws.mturk.list_reviewable_hi_ts
    calls:
      - action: list_reviewable_hi_ts
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.HITs }}'
      item:
        CreationTime: '{{ item.CreationTime }}'
        AssignmentDurationInSeconds: '{{ item.AssignmentDurationInSeconds }}'
        AutoApprovalDelayInSeconds: '{{ item.AutoApprovalDelayInSeconds }}'
        Description: '{{ item.Description }}'
        Expiration: '{{ item.Expiration }}'
        HITGroupId: '{{ item.HITGroupId }}'
        HITId: '{{ item.HITId }}'
        HITLayoutId: '{{ item.HITLayoutId }}'
        HITReviewStatus: '{{ item.HITReviewStatus }}'
        HITStatus: '{{ item.HITStatus }}'
        HITTypeId: '{{ item.HITTypeId }}'
        Keywords: '{{ item.Keywords }}'
        MaxAssignments: '{{ item.MaxAssignments }}'
        NumberOfAssignmentsAvailable: '{{ item.NumberOfAssignmentsAvailable }}'
        NumberOfAssignmentsCompleted: '{{ item.NumberOfAssignmentsCompleted }}'
        NumberOfAssignmentsPending: '{{ item.NumberOfAssignmentsPending }}'
        QualificationRequirements: '{{ item.QualificationRequirements }}'
        Question: '{{ item.Question }}'
        RequesterAnnotation: '{{ item.RequesterAnnotation }}'
        Reward: '{{ item.Reward }}'
        Title: '{{ item.Title }}'
  # ── ListWorkerBlocks ──
  - discovery_id: aws.mturk.list_worker_blocks
    calls:
      - action: list_worker_blocks
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.WorkerBlocks }}'
      item:
        Reason: '{{ item.Reason }}'
        WorkerId: '{{ item.WorkerId }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetAssignment ──
  - discovery_id: aws.mturk.get_assignment
    for_each: aws.mturk.list_bonus_payments
    calls:
      - action: get_assignment
        params:
          AssignmentId: '{{ item.AssignmentId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Assignment }}'
      item:
        AcceptTime: '{{ item.AcceptTime }}'
        Answer: '{{ item.Answer }}'
        ApprovalTime: '{{ item.ApprovalTime }}'
        Assignment: '{{ item.Assignment }}'
        AssignmentId: '{{ item.AssignmentId }}'
        AssignmentStatus: '{{ item.AssignmentStatus }}'
        AutoApprovalTime: '{{ item.AutoApprovalTime }}'
        Deadline: '{{ item.Deadline }}'
        HITId: '{{ item.HITId }}'
        RejectionTime: '{{ item.RejectionTime }}'
        RequesterFeedback: '{{ item.RequesterFeedback }}'
        SubmitTime: '{{ item.SubmitTime }}'
        WorkerId: '{{ item.WorkerId }}'
  # ── GetFileUploadURL ──
  - discovery_id: aws.mturk.get_file_upload_url
    calls:
      - action: get_file_upload_url
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        FileUploadURL: '{{ response.FileUploadURL }}'
  # ── GetHIT ──
  - discovery_id: aws.mturk.get_hit
    for_each: aws.mturk.list_hi_ts
    calls:
      - action: get_hit
        params:
          HITId: '{{ item.HITId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.HITs }}'
      item:
        CreationTime: '{{ item.CreationTime }}'
        AssignmentDurationInSeconds: '{{ item.AssignmentDurationInSeconds }}'
        AutoApprovalDelayInSeconds: '{{ item.AutoApprovalDelayInSeconds }}'
        Description: '{{ item.Description }}'
        Expiration: '{{ item.Expiration }}'
        HITGroupId: '{{ item.HITGroupId }}'
        HITId: '{{ item.HITId }}'
        HITLayoutId: '{{ item.HITLayoutId }}'
        HITReviewStatus: '{{ item.HITReviewStatus }}'
        HITStatus: '{{ item.HITStatus }}'
        HITTypeId: '{{ item.HITTypeId }}'
        Keywords: '{{ item.Keywords }}'
        MaxAssignments: '{{ item.MaxAssignments }}'
        NumberOfAssignmentsAvailable: '{{ item.NumberOfAssignmentsAvailable }}'
        NumberOfAssignmentsCompleted: '{{ item.NumberOfAssignmentsCompleted }}'
        NumberOfAssignmentsPending: '{{ item.NumberOfAssignmentsPending }}'
        QualificationRequirements: '{{ item.QualificationRequirements }}'
        Question: '{{ item.Question }}'
        RequesterAnnotation: '{{ item.RequesterAnnotation }}'
        Reward: '{{ item.Reward }}'
        Title: '{{ item.Title }}'
  # ── GetQualificationScore ──
  - discovery_id: aws.mturk.get_qualification_score
    for_each: aws.mturk.list_bonus_payments
    calls:
      - action: get_qualification_score
        params:
          QualificationTypeId: '{{ item.QualificationTypeId }}'
          WorkerId: '{{ item.WorkerId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.BonusPayments }}'
      item:
        Status: '{{ item.Status }}'
        GrantTime: '{{ item.GrantTime }}'
        IntegerValue: '{{ item.IntegerValue }}'
        LocaleValue: '{{ item.LocaleValue }}'
        QualificationTypeId: '{{ item.QualificationTypeId }}'
        WorkerId: '{{ item.WorkerId }}'
  # ── GetQualificationType ──
  - discovery_id: aws.mturk.get_qualification_type
