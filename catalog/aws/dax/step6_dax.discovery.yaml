# ============================================================
# Discovery YAML — dax (AWS)
# Generated: 2026-02-21T04:56:58Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: dax
services:
  client: dax
  module: boto3.client
discovery:
  # ── DescribeClusters ──
  - discovery_id: aws.dax.describe_clusters
    calls:
      - action: describe_clusters
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Clusters }}'
      item:
        SecurityGroups: '{{ item.SecurityGroups }}'
        Status: '{{ item.Status }}'
        ActiveNodes: '{{ item.ActiveNodes }}'
        ClusterArn: '{{ item.ClusterArn }}'
        ClusterDiscoveryEndpoint: '{{ item.ClusterDiscoveryEndpoint }}'
        ClusterEndpointEncryptionType: '{{ item.ClusterEndpointEncryptionType }}'
        ClusterName: '{{ item.ClusterName }}'
        Clusters: '{{ item.Clusters }}'
        Description: '{{ item.Description }}'
        Enabled: '{{ item.Enabled }}'
        IamRoleArn: '{{ item.IamRoleArn }}'
        NetworkType: '{{ item.NetworkType }}'
        NodeIdsToRemove: '{{ item.NodeIdsToRemove }}'
        NodeType: '{{ item.NodeType }}'
        Nodes: '{{ item.Nodes }}'
        NotificationConfiguration: '{{ item.NotificationConfiguration }}'
        ParameterGroup: '{{ item.ParameterGroup }}'
        PreferredMaintenanceWindow: '{{ item.PreferredMaintenanceWindow }}'
        SSEDescription: '{{ item.SSEDescription }}'
        SubnetGroup: '{{ item.SubnetGroup }}'
        TotalNodes: '{{ item.TotalNodes }}'
  # ── DescribeDefaultParameters ──
  - discovery_id: aws.dax.describe_default_parameters
    calls:
      - action: describe_default_parameters
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Parameters }}'
      item:
        AllowedValues: '{{ item.AllowedValues }}'
        ChangeType: '{{ item.ChangeType }}'
        DataType: '{{ item.DataType }}'
        Description: '{{ item.Description }}'
        IsModifiable: '{{ item.IsModifiable }}'
        NodeTypeSpecificValues: '{{ item.NodeTypeSpecificValues }}'
        ParameterName: '{{ item.ParameterName }}'
        ParameterType: '{{ item.ParameterType }}'
        ParameterValue: '{{ item.ParameterValue }}'
        Parameters: '{{ item.Parameters }}'
        Source: '{{ item.Source }}'
  # ── DescribeEvents ──
  - discovery_id: aws.dax.describe_events
    calls:
      - action: describe_events
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Events }}'
      item:
        Date: '{{ item.Date }}'
        Events: '{{ item.Events }}'
        Message: '{{ item.Message }}'
        SourceName: '{{ item.SourceName }}'
        SourceType: '{{ item.SourceType }}'
  # ── DescribeParameterGroups ──
  - discovery_id: aws.dax.describe_parameter_groups
    calls:
      - action: describe_parameter_groups
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ParameterGroups }}'
      item:
        Description: '{{ item.Description }}'
        ParameterGroupName: '{{ item.ParameterGroupName }}'
        ParameterGroups: '{{ item.ParameterGroups }}'
  # ── DescribeSubnetGroups ──
  - discovery_id: aws.dax.describe_subnet_groups
    calls:
      - action: describe_subnet_groups
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.SubnetGroups }}'
      item:
        VpcId: '{{ item.VpcId }}'
        Description: '{{ item.Description }}'
        SubnetGroupName: '{{ item.SubnetGroupName }}'
        SubnetGroups: '{{ item.SubnetGroups }}'
        Subnets: '{{ item.Subnets }}'
        SupportedNetworkTypes: '{{ item.SupportedNetworkTypes }}'
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeParameters ──
  - discovery_id: aws.dax.describe_parameters
    for_each: aws.dax.describe_parameter_groups
    calls:
      - action: describe_parameters
        params:
          ParameterGroupName: '{{ item.ParameterGroupName }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Parameters }}'
      item:
        AllowedValues: '{{ item.AllowedValues }}'
        ChangeType: '{{ item.ChangeType }}'
        DataType: '{{ item.DataType }}'
        Description: '{{ item.Description }}'
        IsModifiable: '{{ item.IsModifiable }}'
        NodeTypeSpecificValues: '{{ item.NodeTypeSpecificValues }}'
        ParameterName: '{{ item.ParameterName }}'
        ParameterType: '{{ item.ParameterType }}'
        ParameterValue: '{{ item.ParameterValue }}'
        Source: '{{ item.Source }}'
  # ── ListTags ──
  - discovery_id: aws.dax.list_tags
    calls:
      - action: list_tags
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Tags }}'
      item:
        Key: '{{ item.Key }}'
        Value: '{{ item.Value }}'
