version: '1.0'
provider: aws
service: trustedadvisor
services:
  client: trustedadvisor
  module: boto3.client
discovery:
  # ── ListChecks ──
  - discovery_id: aws.trustedadvisor.list_checks
    calls:
      - action: list_checks
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.checkSummaries }}'
      item:
        arn: '{{ item.arn }}'
        awsServices: '{{ item.awsServices }}'
        description: '{{ item.description }}'
        id: '{{ item.id }}'
        metadata: '{{ item.metadata }}'
        name: '{{ item.name }}'
        pillars: '{{ item.pillars }}'
        source: '{{ item.source }}'
  # ── ListOrganizationRecommendations ──
