version: '1.0'
provider: aws
service: securityhub
services:
  client: securityhub
  module: boto3.client
discovery:
  # ── DescribeActionTargets ──
  - discovery_id: aws.securityhub.describe_action_targets
    calls:
      - action: describe_action_targets
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ActionTargets }}'
      item:
        Name: '{{ item.Name }}'
        ActionTargetArn: '{{ item.ActionTargetArn }}'
        ActionTargets: '{{ item.ActionTargets }}'
        Description: '{{ item.Description }}'
  # ── DescribeHub ──
  - discovery_id: aws.securityhub.describe_hub
    calls:
      - action: describe_hub
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.HubArn }}'
      item:
        AutoEnableControls: '{{ item.AutoEnableControls }}'
        ControlFindingGenerator: '{{ item.ControlFindingGenerator }}'
        HubArn: '{{ item.HubArn }}'
        SubscribedAt: '{{ item.SubscribedAt }}'
  # ── DescribeOrganizationConfiguration ──
  - discovery_id: aws.securityhub.describe_organization_configuration
    calls:
      - action: describe_organization_configuration
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.AutoEnable }}'
      item:
        Status: '{{ item.Status }}'
        AutoEnable: '{{ item.AutoEnable }}'
        AutoEnableStandards: '{{ item.AutoEnableStandards }}'
        ConfigurationType: '{{ item.ConfigurationType }}'
        Enabled: '{{ item.Enabled }}'
        MemberAccountLimitReached: '{{ item.MemberAccountLimitReached }}'
        OrganizationConfiguration: '{{ item.OrganizationConfiguration }}'
        StatusMessage: '{{ item.StatusMessage }}'
  # ── DescribeProducts ──
  - discovery_id: aws.securityhub.describe_products
