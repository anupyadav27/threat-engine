# ============================================================
# Discovery YAML — efs (AWS)
# Generated: 2026-02-21T04:56:58Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: efs
services:
  client: efs
  module: boto3.client
discovery:
  # ── DescribeAccessPoints ──
  - discovery_id: aws.efs.describe_access_points
    calls:
      - action: describe_access_points
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.AccessPoints }}'
  # ── DescribeAccountPreferences ──
  - discovery_id: aws.efs.describe_account_preferences
    calls:
      - action: describe_account_preferences
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        ResourceIdPreference: '{{ response.ResourceIdPreference }}'
  # ── DescribeFileSystems ──
  - discovery_id: aws.efs.describe_file_systems
    calls:
      - action: describe_file_systems
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.FileSystems }}'
  # ── DescribeMountTargets ──
  - discovery_id: aws.efs.describe_mount_targets
    calls:
      - action: describe_mount_targets
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.MountTargets }}'
  # ── DescribeReplicationConfigurations ──
  - discovery_id: aws.efs.describe_replication_configurations
    calls:
      - action: describe_replication_configurations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Replications }}'
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeBackupPolicy ──
  - discovery_id: aws.efs.describe_backup_policy
    for_each: aws.efs.describe_file_systems
    calls:
      - action: describe_backup_policy
        params:
          FileSystemId: '{{ item.FileSystemId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        BackupPolicy: '{{ response.BackupPolicy }}'
  # ── DescribeFileSystemPolicy ──
  - discovery_id: aws.efs.describe_file_system_policy
    for_each: aws.efs.describe_file_systems
    calls:
      - action: describe_file_system_policy
        params:
          FileSystemId: '{{ item.FileSystemId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        Policy: '{{ response.Policy }}'
        FileSystemId: '{{ response.FileSystemId }}'
  # ── DescribeLifecycleConfiguration ──
  - discovery_id: aws.efs.describe_lifecycle_configuration
    for_each: aws.efs.describe_file_systems
    calls:
      - action: describe_lifecycle_configuration
        params:
          FileSystemId: '{{ item.FileSystemId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.LifecyclePolicies }}'
  # ── DescribeMountTargetSecurityGroups ──
  - discovery_id: aws.efs.describe_mount_target_security_groups
    for_each: aws.efs.describe_mount_targets
    calls:
      - action: describe_mount_target_security_groups
        params:
          MountTargetId: '{{ item.MountTargetId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.SecurityGroups }}'
  # ── DescribeTags ──
  - discovery_id: aws.efs.describe_tags
    for_each: aws.efs.describe_file_systems
    calls:
      - action: describe_tags
        params:
          FileSystemId: '{{ item.FileSystemId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Tags }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.efs.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Tags }}'
