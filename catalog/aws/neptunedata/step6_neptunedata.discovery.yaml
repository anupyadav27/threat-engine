# ============================================================
# Discovery YAML — neptunedata (AWS)
# Generated: 2026-02-21T04:56:59Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: neptunedata
services:
  client: neptunedata
  module: boto3.client
discovery:
  # ── GetEngineStatus ──
  - discovery_id: aws.neptunedata.get_engine_status
    calls:
      - action: get_engine_status
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.status }}'
      item:
        DestinationArn: '{{ item.DestinationArn }}'
        Enabled: '{{ item.Enabled }}'
        Format: '{{ item.Format }}'
        Level: '{{ item.Level }}'
        dbEngineVersion: '{{ item.dbEngineVersion }}'
        dfeQueryEngine: '{{ item.dfeQueryEngine }}'
        features: '{{ item.features }}'
        gremlin: '{{ item.gremlin }}'
        labMode: '{{ item.labMode }}'
        opencypher: '{{ item.opencypher }}'
        role: '{{ item.role }}'
        rollingBackTrxCount: '{{ item.rollingBackTrxCount }}'
        rollingBackTrxEarliestStartTime: '{{ item.rollingBackTrxEarliestStartTime }}'
        settings: '{{ item.settings }}'
        sparql: '{{ item.sparql }}'
        startTime: '{{ item.startTime }}'
        version: '{{ item.version }}'
  # ── GetPropertygraphStatistics ──
  - discovery_id: aws.neptunedata.get_propertygraph_statistics
    calls:
      - action: get_propertygraph_statistics
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.payload }}'
      item:
        active: '{{ item.active }}'
        autoCompute: '{{ item.autoCompute }}'
        date: '{{ item.date }}'
        note: '{{ item.note }}'
        signatureInfo: '{{ item.signatureInfo }}'
        statisticsId: '{{ item.statisticsId }}'
  # ── GetPropertygraphStream ──
  - discovery_id: aws.neptunedata.get_propertygraph_stream
    calls:
      - action: get_propertygraph_stream
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.records }}'
      item:
        commitTimestampInMillis: '{{ item.commitTimestampInMillis }}'
        data: '{{ item.data }}'
        eventId: '{{ item.eventId }}'
        format: '{{ item.format }}'
        isLastOp: '{{ item.isLastOp }}'
        lastEventId: '{{ item.lastEventId }}'
        lastTrxTimestampInMillis: '{{ item.lastTrxTimestampInMillis }}'
        op: '{{ item.op }}'
        records: '{{ item.records }}'
        totalRecords: '{{ item.totalRecords }}'
  # ── GetPropertygraphSummary ──
  - discovery_id: aws.neptunedata.get_propertygraph_summary
    calls:
      - action: get_propertygraph_summary
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.payload }}'
      item:
        graphSummary: '{{ item.graphSummary }}'
        lastStatisticsComputationTime: '{{ item.lastStatisticsComputationTime }}'
        statusCode: '{{ item.statusCode }}'
        version: '{{ item.version }}'
  # ── GetRDFGraphSummary ──
  - discovery_id: aws.neptunedata.get_rdf_graph_summary
    calls:
      - action: get_rdf_graph_summary
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.payload }}'
      item:
        graphSummary: '{{ item.graphSummary }}'
        lastStatisticsComputationTime: '{{ item.lastStatisticsComputationTime }}'
        version: '{{ item.version }}'
  # ── GetSparqlStatistics ──
  - discovery_id: aws.neptunedata.get_sparql_statistics
    calls:
      - action: get_sparql_statistics
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.payload }}'
      item:
        active: '{{ item.active }}'
        autoCompute: '{{ item.autoCompute }}'
        date: '{{ item.date }}'
        note: '{{ item.note }}'
        signatureInfo: '{{ item.signatureInfo }}'
        statisticsId: '{{ item.statisticsId }}'
  # ── GetSparqlStream ──
  - discovery_id: aws.neptunedata.get_sparql_stream
    calls:
      - action: get_sparql_stream
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.records }}'
      item:
        commitTimestampInMillis: '{{ item.commitTimestampInMillis }}'
        data: '{{ item.data }}'
        eventId: '{{ item.eventId }}'
        isLastOp: '{{ item.isLastOp }}'
        op: '{{ item.op }}'
  # ── ListGremlinQueries ──
  - discovery_id: aws.neptunedata.list_gremlin_queries
    calls:
      - action: list_gremlin_queries
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.queries }}'
      item:
        queryEvalStats: '{{ item.queryEvalStats }}'
        queryId: '{{ item.queryId }}'
        queryString: '{{ item.queryString }}'
  # ── ListLoaderJobs ──
  - discovery_id: aws.neptunedata.list_loader_jobs
    calls:
      - action: list_loader_jobs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.payload }}'
      item:
        loadIds: '{{ item.loadIds }}'
        payload: '{{ item.payload }}'
  # ── ListMLDataProcessingJobs ──
  - discovery_id: aws.neptunedata.list_ml_data_processing_jobs
    calls:
      - action: list_ml_data_processing_jobs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ids }}'
  # ── ListMLEndpoints ──
  - discovery_id: aws.neptunedata.list_ml_endpoints
    calls:
      - action: list_ml_endpoints
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ids }}'
      item:
        endpoint: '{{ item.endpoint }}'
  # ── ListMLModelTrainingJobs ──
  - discovery_id: aws.neptunedata.list_ml_model_training_jobs
    calls:
      - action: list_ml_model_training_jobs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ids }}'
  # ── ListMLModelTransformJobs ──
  - discovery_id: aws.neptunedata.list_ml_model_transform_jobs
    calls:
      - action: list_ml_model_transform_jobs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ids }}'
  # ── ListOpenCypherQueries ──
  - discovery_id: aws.neptunedata.list_open_cypher_queries
    calls:
      - action: list_open_cypher_queries
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.queries }}'
      item:
        queryEvalStats: '{{ item.queryEvalStats }}'
        queryId: '{{ item.queryId }}'
        queryString: '{{ item.queryString }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetGremlinQueryStatus ──
  - discovery_id: aws.neptunedata.get_gremlin_query_status
    for_each: aws.neptunedata.list_gremlin_queries
    calls:
      - action: get_gremlin_query_status
        params:
          queryId: '{{ item.queryId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.queryEvalStats }}'
      item:
        cancelled: '{{ item.cancelled }}'
        elapsed: '{{ item.elapsed }}'
        subqueries: '{{ item.subqueries }}'
        waited: '{{ item.waited }}'
  # ── GetLoaderJobStatus ──
  - discovery_id: aws.neptunedata.get_loader_job_status
    calls:
      - action: get_loader_job_status
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        payload: '{{ response.payload }}'
        status: '{{ response.status }}'
  # ── GetMLDataProcessingJob ──
  - discovery_id: aws.neptunedata.get_ml_data_processing_job
    calls:
      - action: get_ml_data_processing_job
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.processingJob }}'
      item:
        arn: '{{ item.arn }}'
        cloudwatchLogUrl: '{{ item.cloudwatchLogUrl }}'
        failureReason: '{{ item.failureReason }}'
        name: '{{ item.name }}'
        outputLocation: '{{ item.outputLocation }}'
        status: '{{ item.status }}'
  # ── GetMLEndpoint ──
  - discovery_id: aws.neptunedata.get_ml_endpoint
    calls:
      - action: get_ml_endpoint
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.processingJob }}'
      item:
        arn: '{{ item.arn }}'
        cloudwatchLogUrl: '{{ item.cloudwatchLogUrl }}'
        endpoint: '{{ item.endpoint }}'
        failureReason: '{{ item.failureReason }}'
        name: '{{ item.name }}'
        outputLocation: '{{ item.outputLocation }}'
        status: '{{ item.status }}'
  # ── GetMLModelTrainingJob ──
  - discovery_id: aws.neptunedata.get_ml_model_training_job
    calls:
      - action: get_ml_model_training_job
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.mlModels }}'
      item:
        arn: '{{ item.arn }}'
        name: '{{ item.name }}'
  # ── GetMLModelTransformJob ──
  - discovery_id: aws.neptunedata.get_ml_model_transform_job
    calls:
      - action: get_ml_model_transform_job
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.models }}'
      item:
        arn: '{{ item.arn }}'
        name: '{{ item.name }}'
  # ── GetOpenCypherQueryStatus ──
  - discovery_id: aws.neptunedata.get_open_cypher_query_status
    for_each: aws.neptunedata.list_gremlin_queries
    calls:
      - action: get_open_cypher_query_status
        params:
          queryId: '{{ item.queryId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.queryEvalStats }}'
      item:
        cancelled: '{{ item.cancelled }}'
        elapsed: '{{ item.elapsed }}'
        subqueries: '{{ item.subqueries }}'
        waited: '{{ item.waited }}'
