# ============================================================
# Discovery YAML — taxsettings (AWS)
# Generated: 2026-02-21T04:57:00Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: taxsettings
services:
  client: taxsettings
  module: boto3.client
discovery:
  # ── GetTaxExemptionTypes ──
  - discovery_id: aws.taxsettings.get_tax_exemption_types
    calls:
      - action: get_tax_exemption_types
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.taxExemptionTypes }}'
      item:
        applicableJurisdictions: '{{ item.applicableJurisdictions }}'
        description: '{{ item.description }}'
        displayName: '{{ item.displayName }}'
        taxExemptionTypes: '{{ item.taxExemptionTypes }}'
  # ── GetTaxInheritance ──
  - discovery_id: aws.taxsettings.get_tax_inheritance
    calls:
      - action: get_tax_inheritance
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.heritageStatus }}'
      item:
        heritageStatus: '{{ item.heritageStatus }}'
  # ── GetTaxRegistration ──
  - discovery_id: aws.taxsettings.get_tax_registration
    calls:
      - action: get_tax_registration
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.taxRegistration }}'
      item:
        additionalTaxInformation: '{{ item.additionalTaxInformation }}'
        certifiedEmailId: '{{ item.certifiedEmailId }}'
        legalAddress: '{{ item.legalAddress }}'
        sector: '{{ item.sector }}'
        taxDocumentMetadatas: '{{ item.taxDocumentMetadatas }}'
  # ── ListSupplementalTaxRegistrations ──
  - discovery_id: aws.taxsettings.list_supplemental_tax_registrations
    calls:
      - action: list_supplemental_tax_registrations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.taxRegistrations }}'
      item:
        address: '{{ item.address }}'
        authorityId: '{{ item.authorityId }}'
        legalName: '{{ item.legalName }}'
        registrationId: '{{ item.registrationId }}'
        registrationType: '{{ item.registrationType }}'
        status: '{{ item.status }}'
  # ── ListTaxExemptions ──
  - discovery_id: aws.taxsettings.list_tax_exemptions
    calls:
      - action: list_tax_exemptions
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        taxExemptionDetailsMap: '{{ response.taxExemptionDetailsMap }}'
  # ── ListTaxRegistrations ──
  - discovery_id: aws.taxsettings.list_tax_registrations
    calls:
      - action: list_tax_registrations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.accountDetails }}'
      item:
        accountId: '{{ item.accountId }}'
        accountMetaData: '{{ item.accountMetaData }}'
        taxInheritanceDetails: '{{ item.taxInheritanceDetails }}'
        taxRegistration: '{{ item.taxRegistration }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetTaxRegistrationDocument ──
  - discovery_id: aws.taxsettings.get_tax_registration_document
    calls:
      - action: get_tax_registration_document
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        destinationFilePath: '{{ response.destinationFilePath }}'
        presignedS3Url: '{{ response.presignedS3Url }}'
