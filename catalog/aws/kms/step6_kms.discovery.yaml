# ============================================================
# Discovery YAML — kms (AWS)
# Generated: 2026-02-21T04:56:58Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: kms
services:
  client: kms
  module: boto3.client
discovery:
  # ── DescribeCustomKeyStores ──
  - discovery_id: aws.kms.describe_custom_key_stores
    calls:
      - action: describe_custom_key_stores
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.CustomKeyStores }}'
      item:
        CreationDate: '{{ item.CreationDate }}'
        CloudHsmClusterId: '{{ item.CloudHsmClusterId }}'
        ConnectionErrorCode: '{{ item.ConnectionErrorCode }}'
        ConnectionState: '{{ item.ConnectionState }}'
        CustomKeyStoreId: '{{ item.CustomKeyStoreId }}'
        CustomKeyStoreName: '{{ item.CustomKeyStoreName }}'
        CustomKeyStoreType: '{{ item.CustomKeyStoreType }}'
        CustomKeyStores: '{{ item.CustomKeyStores }}'
        TrustAnchorCertificate: '{{ item.TrustAnchorCertificate }}'
        XksProxyConfiguration: '{{ item.XksProxyConfiguration }}'
  # ── ListAliases ──
  - discovery_id: aws.kms.list_aliases
    calls:
      - action: list_aliases
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Aliases }}'
      item:
        CreationDate: '{{ item.CreationDate }}'
        AliasArn: '{{ item.AliasArn }}'
        AliasName: '{{ item.AliasName }}'
        LastUpdatedDate: '{{ item.LastUpdatedDate }}'
        TargetKeyId: '{{ item.TargetKeyId }}'
        Truncated: '{{ item.Truncated }}'
  # ── ListKeys ──
  - discovery_id: aws.kms.list_keys
    calls:
      - action: list_keys
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Keys }}'
      item:
        KeyArn: '{{ item.KeyArn }}'
        KeyId: '{{ item.KeyId }}'
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeKey ──
  - discovery_id: aws.kms.describe_key
    for_each: aws.kms.list_keys
    calls:
      - action: describe_key
        params:
          KeyId: '{{ item.KeyId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.KeyMetadata }}'
      item:
        Arn: '{{ item.Arn }}'
        CreationDate: '{{ item.CreationDate }}'
        AWSAccountId: '{{ item.AWSAccountId }}'
        CloudHsmClusterId: '{{ item.CloudHsmClusterId }}'
        CurrentKeyMaterialId: '{{ item.CurrentKeyMaterialId }}'
        CustomKeyStoreId: '{{ item.CustomKeyStoreId }}'
        CustomerMasterKeySpec: '{{ item.CustomerMasterKeySpec }}'
        DeletionDate: '{{ item.DeletionDate }}'
        Description: '{{ item.Description }}'
        Enabled: '{{ item.Enabled }}'
        EncryptionAlgorithms: '{{ item.EncryptionAlgorithms }}'
        ExpirationModel: '{{ item.ExpirationModel }}'
        KeyAgreementAlgorithms: '{{ item.KeyAgreementAlgorithms }}'
        KeyId: '{{ item.KeyId }}'
        KeyManager: '{{ item.KeyManager }}'
        KeySpec: '{{ item.KeySpec }}'
        KeyState: '{{ item.KeyState }}'
        KeyUsage: '{{ item.KeyUsage }}'
        MacAlgorithms: '{{ item.MacAlgorithms }}'
        MultiRegion: '{{ item.MultiRegion }}'
        MultiRegionConfiguration: '{{ item.MultiRegionConfiguration }}'
        Origin: '{{ item.Origin }}'
        PendingDeletionWindowInDays: '{{ item.PendingDeletionWindowInDays }}'
        SigningAlgorithms: '{{ item.SigningAlgorithms }}'
        ValidTo: '{{ item.ValidTo }}'
        XksKeyConfiguration: '{{ item.XksKeyConfiguration }}'
  # ── GetKeyPolicy ──
  - discovery_id: aws.kms.get_key_policy
    for_each: aws.kms.list_keys
    calls:
      - action: get_key_policy
        params:
          KeyId: '{{ item.KeyId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Policy }}'
      item:
        Policy: '{{ item.Policy }}'
        Statement: '{{ item.Statement }}'
        Version: '{{ item.Version }}'
  # ── GetKeyRotationStatus ──
  - discovery_id: aws.kms.get_key_rotation_status
    for_each: aws.kms.list_keys
    calls:
      - action: get_key_rotation_status
        params:
          KeyId: '{{ item.KeyId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.KeyRotationEnabled }}'
      item:
        KeyRotationEnabled: '{{ item.KeyRotationEnabled }}'
  # ── GetParametersForImport ──
  - discovery_id: aws.kms.get_parameters_for_import
    for_each: aws.kms.list_keys
    calls:
      - action: get_parameters_for_import
        params:
          KeyId: '{{ item.KeyId }}'
          WrappingAlgorithm: '{{ item.WrappingAlgorithm }}'
          WrappingKeySpec: '{{ item.WrappingKeySpec }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        ImportToken: '{{ response.ImportToken }}'
        KeyId: '{{ response.KeyId }}'
        ParametersValidTo: '{{ response.ParametersValidTo }}'
        PublicKey: '{{ response.PublicKey }}'
  # ── GetPublicKey ──
  - discovery_id: aws.kms.get_public_key
    for_each: aws.kms.list_keys
    calls:
      - action: get_public_key
        params:
          KeyId: '{{ item.KeyId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.EncryptionAlgorithms }}'
  # ── ListGrants ──
  - discovery_id: aws.kms.list_grants
    for_each: aws.kms.list_keys
    calls:
      - action: list_grants
        params:
          KeyId: '{{ item.KeyId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Grants }}'
      item:
        CreationDate: '{{ item.CreationDate }}'
        Name: '{{ item.Name }}'
        Constraints: '{{ item.Constraints }}'
        GrantId: '{{ item.GrantId }}'
        GranteePrincipal: '{{ item.GranteePrincipal }}'
        IssuingAccount: '{{ item.IssuingAccount }}'
        KeyId: '{{ item.KeyId }}'
        Operations: '{{ item.Operations }}'
        RetiringPrincipal: '{{ item.RetiringPrincipal }}'
  # ── ListKeyPolicies ──
  - discovery_id: aws.kms.list_key_policies
    for_each: aws.kms.list_keys
    calls:
      - action: list_key_policies
        params:
          KeyId: '{{ item.KeyId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.PolicyNames }}'
  # ── ListKeyRotations ──
  - discovery_id: aws.kms.list_key_rotations
    for_each: aws.kms.list_keys
    calls:
      - action: list_key_rotations
        params:
          KeyId: '{{ item.KeyId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Rotations }}'
      item:
        ExpirationModel: '{{ item.ExpirationModel }}'
        ImportState: '{{ item.ImportState }}'
        KeyId: '{{ item.KeyId }}'
        KeyMaterialDescription: '{{ item.KeyMaterialDescription }}'
        KeyMaterialId: '{{ item.KeyMaterialId }}'
        KeyMaterialState: '{{ item.KeyMaterialState }}'
        RotationDate: '{{ item.RotationDate }}'
        RotationType: '{{ item.RotationType }}'
        ValidTo: '{{ item.ValidTo }}'
  # ── ListResourceTags ──
  - discovery_id: aws.kms.list_resource_tags
    for_each: aws.kms.list_keys
    calls:
      - action: list_resource_tags
        params:
          KeyId: '{{ item.KeyId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Tags }}'
      item:
        TagKey: '{{ item.TagKey }}'
        TagValue: '{{ item.TagValue }}'
  # ── ListRetirableGrants ──
  - discovery_id: aws.kms.list_retirable_grants
    calls:
      - action: list_retirable_grants
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Grants }}'
      item:
        CreationDate: '{{ item.CreationDate }}'
        Name: '{{ item.Name }}'
        Constraints: '{{ item.Constraints }}'
        GrantId: '{{ item.GrantId }}'
        GranteePrincipal: '{{ item.GranteePrincipal }}'
        IssuingAccount: '{{ item.IssuingAccount }}'
        KeyId: '{{ item.KeyId }}'
        Operations: '{{ item.Operations }}'
        RetiringPrincipal: '{{ item.RetiringPrincipal }}'
