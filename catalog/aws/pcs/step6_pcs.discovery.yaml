# ============================================================
# Discovery YAML — pcs (AWS)
# Generated: 2026-02-21T04:56:59Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: pcs
services:
  client: pcs
  module: boto3.client
discovery:
  # ── ListClusters ──
  - discovery_id: aws.pcs.list_clusters
    calls:
      - action: list_clusters
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.clusters }}'
      item:
        arn: '{{ item.arn }}'
        createdAt: '{{ item.createdAt }}'
        id: '{{ item.id }}'
        modifiedAt: '{{ item.modifiedAt }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetCluster ──
  - discovery_id: aws.pcs.get_cluster
    calls:
      - action: get_cluster
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.clusters }}'
      item:
        arn: '{{ item.arn }}'
        createdAt: '{{ item.createdAt }}'
        endpoints: '{{ item.endpoints }}'
        errorInfo: '{{ item.errorInfo }}'
        id: '{{ item.id }}'
        modifiedAt: '{{ item.modifiedAt }}'
        name: '{{ item.name }}'
        networking: '{{ item.networking }}'
        scheduler: '{{ item.scheduler }}'
        size: '{{ item.size }}'
        slurmConfiguration: '{{ item.slurmConfiguration }}'
        status: '{{ item.status }}'
  # ── GetComputeNodeGroup ──
  - discovery_id: aws.pcs.get_compute_node_group
    calls:
      - action: get_compute_node_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.computeNodeGroup }}'
      item:
        amiId: '{{ item.amiId }}'
        arn: '{{ item.arn }}'
        clusterId: '{{ item.clusterId }}'
        createdAt: '{{ item.createdAt }}'
        customLaunchTemplate: '{{ item.customLaunchTemplate }}'
        errorInfo: '{{ item.errorInfo }}'
        iamInstanceProfileArn: '{{ item.iamInstanceProfileArn }}'
        id: '{{ item.id }}'
        instanceConfigs: '{{ item.instanceConfigs }}'
        modifiedAt: '{{ item.modifiedAt }}'
        name: '{{ item.name }}'
        purchaseOption: '{{ item.purchaseOption }}'
        scalingConfiguration: '{{ item.scalingConfiguration }}'
        slurmConfiguration: '{{ item.slurmConfiguration }}'
        spotOptions: '{{ item.spotOptions }}'
        status: '{{ item.status }}'
        subnetIds: '{{ item.subnetIds }}'
  # ── GetQueue ──
  - discovery_id: aws.pcs.get_queue
    calls:
      - action: get_queue
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.clusters }}'
      item:
        arn: '{{ item.arn }}'
        clusterId: '{{ item.clusterId }}'
        computeNodeGroupConfigurations: '{{ item.computeNodeGroupConfigurations }}'
        createdAt: '{{ item.createdAt }}'
        errorInfo: '{{ item.errorInfo }}'
        id: '{{ item.id }}'
        modifiedAt: '{{ item.modifiedAt }}'
        name: '{{ item.name }}'
        slurmConfiguration: '{{ item.slurmConfiguration }}'
        status: '{{ item.status }}'
  # ── ListComputeNodeGroups ──
  - discovery_id: aws.pcs.list_compute_node_groups
    calls:
      - action: list_compute_node_groups
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.computeNodeGroups }}'
      item:
        arn: '{{ item.arn }}'
        clusterId: '{{ item.clusterId }}'
        createdAt: '{{ item.createdAt }}'
        id: '{{ item.id }}'
        modifiedAt: '{{ item.modifiedAt }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
  # ── ListQueues ──
  - discovery_id: aws.pcs.list_queues
    calls:
      - action: list_queues
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.queues }}'
      item:
        arn: '{{ item.arn }}'
        clusterId: '{{ item.clusterId }}'
        createdAt: '{{ item.createdAt }}'
        id: '{{ item.id }}'
        modifiedAt: '{{ item.modifiedAt }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.pcs.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        tags: '{{ response.tags }}'
