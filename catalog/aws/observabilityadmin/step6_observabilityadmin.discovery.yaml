version: '1.0'
provider: aws
service: observabilityadmin
services:
  client: observabilityadmin
  module: boto3.client
discovery:
  # ── GetTelemetryEnrichmentStatus ──
  - discovery_id: aws.observabilityadmin.get_telemetry_enrichment_status
    calls:
      - action: get_telemetry_enrichment_status
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Status }}'
      item:
        AwsResourceExplorerManagedViewArn: '{{ item.AwsResourceExplorerManagedViewArn }}'
  # ── GetTelemetryEvaluationStatus ──
  - discovery_id: aws.observabilityadmin.get_telemetry_evaluation_status
    calls:
      - action: get_telemetry_evaluation_status
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        Status: '{{ response.Status }}'
        FailureReason: '{{ response.FailureReason }}'
  # ── GetTelemetryEvaluationStatusForOrganization ──
  - discovery_id: aws.observabilityadmin.get_telemetry_evaluation_status_for_organization
    calls:
      - action: get_telemetry_evaluation_status_for_organization
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        Status: '{{ response.Status }}'
        FailureReason: '{{ response.FailureReason }}'
  # ── ListCentralizationRulesForOrganization ──
  - discovery_id: aws.observabilityadmin.list_centralization_rules_for_organization
    calls:
      - action: list_centralization_rules_for_organization
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.CentralizationRuleSummaries }}'
      item:
