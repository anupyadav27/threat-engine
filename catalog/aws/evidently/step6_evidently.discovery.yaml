# ============================================================
# Discovery YAML — evidently (AWS)
# Generated: 2026-02-21T04:56:58Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: evidently
services:
  client: evidently
  module: boto3.client
discovery:
  # ── ListProjects ──
  - discovery_id: aws.evidently.list_projects
    calls:
      - action: list_projects
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.projects }}'
      item:
        activeExperimentCount: '{{ item.activeExperimentCount }}'
        activeLaunchCount: '{{ item.activeLaunchCount }}'
        arn: '{{ item.arn }}'
        createdTime: '{{ item.createdTime }}'
        description: '{{ item.description }}'
        experimentCount: '{{ item.experimentCount }}'
        featureCount: '{{ item.featureCount }}'
        lastUpdatedTime: '{{ item.lastUpdatedTime }}'
        launchCount: '{{ item.launchCount }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        tags: '{{ item.tags }}'
  # ── ListSegments ──
  - discovery_id: aws.evidently.list_segments
    calls:
      - action: list_segments
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.segments }}'
      item:
        arn: '{{ item.arn }}'
        createdTime: '{{ item.createdTime }}'
        description: '{{ item.description }}'
        experimentCount: '{{ item.experimentCount }}'
        lastUpdatedTime: '{{ item.lastUpdatedTime }}'
        launchCount: '{{ item.launchCount }}'
        name: '{{ item.name }}'
        pattern: '{{ item.pattern }}'
        tags: '{{ item.tags }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetExperiment ──
  - discovery_id: aws.evidently.get_experiment
    calls:
      - action: get_experiment
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.projects }}'
      item:
        arn: '{{ item.arn }}'
        createdTime: '{{ item.createdTime }}'
        description: '{{ item.description }}'
        execution: '{{ item.execution }}'
        experiment: '{{ item.experiment }}'
        lastUpdatedTime: '{{ item.lastUpdatedTime }}'
        metricGoals: '{{ item.metricGoals }}'
        name: '{{ item.name }}'
        onlineAbDefinition: '{{ item.onlineAbDefinition }}'
        project: '{{ item.project }}'
        randomizationSalt: '{{ item.randomizationSalt }}'
        samplingRate: '{{ item.samplingRate }}'
        schedule: '{{ item.schedule }}'
        segment: '{{ item.segment }}'
        status: '{{ item.status }}'
        statusReason: '{{ item.statusReason }}'
        tags: '{{ item.tags }}'
        treatments: '{{ item.treatments }}'
        type: '{{ item.type }}'
  # ── GetExperimentResults ──
  - discovery_id: aws.evidently.get_experiment_results
    calls:
      - action: get_experiment_results
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.reports }}'
      item:
        content: '{{ item.content }}'
        metricName: '{{ item.metricName }}'
        reportName: '{{ item.reportName }}'
        reports: '{{ item.reports }}'
        resultsData: '{{ item.resultsData }}'
        timestamps: '{{ item.timestamps }}'
        treatmentName: '{{ item.treatmentName }}'
  # ── GetFeature ──
  - discovery_id: aws.evidently.get_feature
    calls:
      - action: get_feature
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.projects }}'
      item:
        arn: '{{ item.arn }}'
        createdTime: '{{ item.createdTime }}'
        defaultVariation: '{{ item.defaultVariation }}'
        description: '{{ item.description }}'
        entityOverrides: '{{ item.entityOverrides }}'
        evaluationRules: '{{ item.evaluationRules }}'
        evaluationStrategy: '{{ item.evaluationStrategy }}'
        lastUpdatedTime: '{{ item.lastUpdatedTime }}'
        name: '{{ item.name }}'
        project: '{{ item.project }}'
        status: '{{ item.status }}'
        tags: '{{ item.tags }}'
        valueType: '{{ item.valueType }}'
        variations: '{{ item.variations }}'
  # ── GetLaunch ──
  - discovery_id: aws.evidently.get_launch
