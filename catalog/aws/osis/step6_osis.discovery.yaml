# ============================================================
# Discovery YAML — osis (AWS)
# Generated: 2026-02-21T04:56:59Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: osis
services:
  client: osis
  module: boto3.client
discovery:
  # ── ListPipelineBlueprints ──
  - discovery_id: aws.osis.list_pipeline_blueprints
    calls:
      - action: list_pipeline_blueprints
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Blueprints }}'
      item:
        Blueprint: '{{ item.Blueprint }}'
        BlueprintName: '{{ item.BlueprintName }}'
        DisplayDescription: '{{ item.DisplayDescription }}'
        DisplayName: '{{ item.DisplayName }}'
        Format: '{{ item.Format }}'
        Service: '{{ item.Service }}'
        UseCase: '{{ item.UseCase }}'
  # ── ListPipelineEndpointConnections ──
  - discovery_id: aws.osis.list_pipeline_endpoint_connections
    calls:
      - action: list_pipeline_endpoint_connections
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.PipelineEndpointConnections }}'
      item:
        Status: '{{ item.Status }}'
        EndpointId: '{{ item.EndpointId }}'
        PipelineArn: '{{ item.PipelineArn }}'
        VpcEndpointOwner: '{{ item.VpcEndpointOwner }}'
  # ── ListPipelineEndpoints ──
  - discovery_id: aws.osis.list_pipeline_endpoints
    calls:
      - action: list_pipeline_endpoints
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.PipelineEndpoints }}'
      item:
        Status: '{{ item.Status }}'
        VpcId: '{{ item.VpcId }}'
        EndpointId: '{{ item.EndpointId }}'
        IngestEndpointUrl: '{{ item.IngestEndpointUrl }}'
        PipelineArn: '{{ item.PipelineArn }}'
        VpcOptions: '{{ item.VpcOptions }}'
  # ── ListPipelines ──
  - discovery_id: aws.osis.list_pipelines
    calls:
      - action: list_pipelines
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Pipelines }}'
      item:
        Status: '{{ item.Status }}'
        Tags: '{{ item.Tags }}'
        CreatedAt: '{{ item.CreatedAt }}'
        Destinations: '{{ item.Destinations }}'
        LastUpdatedAt: '{{ item.LastUpdatedAt }}'
        MaxUnits: '{{ item.MaxUnits }}'
        MinUnits: '{{ item.MinUnits }}'
        PipelineArn: '{{ item.PipelineArn }}'
        PipelineName: '{{ item.PipelineName }}'
        StatusReason: '{{ item.StatusReason }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetPipeline ──
  - discovery_id: aws.osis.get_pipeline
    for_each: aws.osis.list_pipelines
    calls:
      - action: get_pipeline
        params:
          PipelineName: '{{ item.PipelineName }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Pipeline }}'
      item:
        Status: '{{ item.Status }}'
        Tags: '{{ item.Tags }}'
        BufferOptions: '{{ item.BufferOptions }}'
        CreatedAt: '{{ item.CreatedAt }}'
        Destinations: '{{ item.Destinations }}'
        EncryptionAtRestOptions: '{{ item.EncryptionAtRestOptions }}'
        IngestEndpointUrls: '{{ item.IngestEndpointUrls }}'
        LastUpdatedAt: '{{ item.LastUpdatedAt }}'
        LogPublishingOptions: '{{ item.LogPublishingOptions }}'
        MaxUnits: '{{ item.MaxUnits }}'
        MinUnits: '{{ item.MinUnits }}'
        PipelineArn: '{{ item.PipelineArn }}'
        PipelineConfigurationBody: '{{ item.PipelineConfigurationBody }}'
        PipelineName: '{{ item.PipelineName }}'
        PipelineRoleArn: '{{ item.PipelineRoleArn }}'
        ServiceVpcEndpoints: '{{ item.ServiceVpcEndpoints }}'
        StatusReason: '{{ item.StatusReason }}'
        VpcEndpointService: '{{ item.VpcEndpointService }}'
        VpcEndpoints: '{{ item.VpcEndpoints }}'
  # ── GetPipelineBlueprint ──
  - discovery_id: aws.osis.get_pipeline_blueprint
    for_each: aws.osis.list_pipeline_blueprints
    calls:
      - action: get_pipeline_blueprint
        params:
          BlueprintName: '{{ item.BlueprintName }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Blueprints }}'
      item:
        Blueprint: '{{ item.Blueprint }}'
        BlueprintName: '{{ item.BlueprintName }}'
        DisplayDescription: '{{ item.DisplayDescription }}'
        DisplayName: '{{ item.DisplayName }}'
        Format: '{{ item.Format }}'
        PipelineConfigurationBody: '{{ item.PipelineConfigurationBody }}'
        Service: '{{ item.Service }}'
        UseCase: '{{ item.UseCase }}'
  # ── GetPipelineChangeProgress ──
  - discovery_id: aws.osis.get_pipeline_change_progress
    for_each: aws.osis.list_pipelines
    calls:
      - action: get_pipeline_change_progress
        params:
          PipelineName: '{{ item.PipelineName }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ChangeProgressStatuses }}'
      item:
        Status: '{{ item.Status }}'
        ChangeProgressStages: '{{ item.ChangeProgressStages }}'
        StartTime: '{{ item.StartTime }}'
        TotalNumberOfStages: '{{ item.TotalNumberOfStages }}'
  # ── GetResourcePolicy ──
  - discovery_id: aws.osis.get_resource_policy
    calls:
      - action: get_resource_policy
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Policy }}'
      item:
        Statement: '{{ item.Statement }}'
        Version: '{{ item.Version }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.osis.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Tags }}'
      item:
        Key: '{{ item.Key }}'
        Value: '{{ item.Value }}'
