version: '1.0'
provider: aws
service: service-quotas
services:
  client: service-quotas
  module: boto3.client
discovery:
  # ── GetAssociationForServiceQuotaTemplate ──
  - discovery_id: aws.service-quotas.get_association_for_service_quota_template
    calls:
      - action: get_association_for_service_quota_template
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ServiceQuotaTemplateAssociationStatus }}'
      item:
        ServiceQuotaTemplateAssociationStatus: '{{ item.ServiceQuotaTemplateAssociationStatus }}'
  # ── GetAutoManagementConfiguration ──
  - discovery_id: aws.service-quotas.get_auto_management_configuration
    calls:
      - action: get_auto_management_configuration
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.OptInLevel }}'
      item:
        ExclusionList: '{{ item.ExclusionList }}'
        NotificationArn: '{{ item.NotificationArn }}'
        OptInLevel: '{{ item.OptInLevel }}'
        OptInStatus: '{{ item.OptInStatus }}'
        OptInType: '{{ item.OptInType }}'
  # ── ListRequestedServiceQuotaChangeHistory ──
  - discovery_id: aws.service-quotas.list_requested_service_quota_change_history
    calls:
      - action: list_requested_service_quota_change_history
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.RequestedQuotas }}'
      item:
        Id: '{{ item.Id }}'
        Status: '{{ item.Status }}'
        CaseId: '{{ item.CaseId }}'
        Created: '{{ item.Created }}'
        DesiredValue: '{{ item.DesiredValue }}'
        GlobalQuota: '{{ item.GlobalQuota }}'
        LastUpdated: '{{ item.LastUpdated }}'
        QuotaArn: '{{ item.QuotaArn }}'
        QuotaCode: '{{ item.QuotaCode }}'
        QuotaContext: '{{ item.QuotaContext }}'
        QuotaName: '{{ item.QuotaName }}'
        QuotaRequestedAtLevel: '{{ item.QuotaRequestedAtLevel }}'
        Requester: '{{ item.Requester }}'
        ServiceCode: '{{ item.ServiceCode }}'
        ServiceName: '{{ item.ServiceName }}'
        Unit: '{{ item.Unit }}'
  # ── ListServiceQuotaIncreaseRequestsInTemplate ──
  - discovery_id: aws.service-quotas.list_service_quota_increase_requests_in_template
    calls:
      - action: list_service_quota_increase_requests_in_template
        save_as: response
        on_error: continue
    emit:
