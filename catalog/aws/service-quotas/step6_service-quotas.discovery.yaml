        QuotaName: '{{ item.QuotaName }}'
        ServiceCode: '{{ item.ServiceCode }}'
        ServiceName: '{{ item.ServiceName }}'
        ServiceQuotaIncreaseRequestInTemplate: '{{ item.ServiceQuotaIncreaseRequestInTemplate }}'
        Unit: '{{ item.Unit }}'
  # ── ListServices ──
  - discovery_id: aws.service-quotas.list_services
    calls:
      - action: list_services
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Services }}'
      item:
        ServiceCode: '{{ item.ServiceCode }}'
        ServiceName: '{{ item.ServiceName }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetAWSDefaultServiceQuota ──
  - discovery_id: aws.service-quotas.get_aws_default_service_quota
    for_each: aws.service-quotas.list_requested_service_quota_change_history
