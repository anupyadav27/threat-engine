# ============================================================
# Discovery YAML — medical-imaging (AWS)
# Generated: 2026-02-21T04:56:59Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: medical-imaging
services:
  client: medical-imaging
  module: boto3.client
discovery:
  # ── ListDatastores ──
  - discovery_id: aws.medical-imaging.list_datastores
    calls:
      - action: list_datastores
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.datastoreSummaries }}'
      item:
        contentEncoding: '{{ item.contentEncoding }}'
        contentType: '{{ item.contentType }}'
        dataAccessRoleArn: '{{ item.dataAccessRoleArn }}'
        datastoreArn: '{{ item.datastoreArn }}'
        datastoreId: '{{ item.datastoreId }}'
        datastoreName: '{{ item.datastoreName }}'
        datastoreProperties: '{{ item.datastoreProperties }}'
        datastoreStatus: '{{ item.datastoreStatus }}'
        endedAt: '{{ item.endedAt }}'
        forced: '{{ item.forced }}'
        imageFrameBlob: '{{ item.imageFrameBlob }}'
        imageSetMetadataBlob: '{{ item.imageSetMetadataBlob }}'
        inputS3Uri: '{{ item.inputS3Uri }}'
        jobName: '{{ item.jobName }}'
        jobProperties: '{{ item.jobProperties }}'
        jobStatus: '{{ item.jobStatus }}'
        kmsKeyArn: '{{ item.kmsKeyArn }}'
        lambdaAuthorizerArn: '{{ item.lambdaAuthorizerArn }}'
        losslessStorageFormat: '{{ item.losslessStorageFormat }}'
        message: '{{ item.message }}'
        outputS3Uri: '{{ item.outputS3Uri }}'
        submittedAt: '{{ item.submittedAt }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetDICOMImportJob ──
  - discovery_id: aws.medical-imaging.get_dicom_import_job
    for_each: aws.medical-imaging.list_datastores
    calls:
      - action: get_dicom_import_job
        params:
          datastoreId: '{{ item.datastoreId }}'
          jobId: '{{ item.jobId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.jobProperties }}'
      item:
        dataAccessRoleArn: '{{ item.dataAccessRoleArn }}'
        datastoreId: '{{ item.datastoreId }}'
        endedAt: '{{ item.endedAt }}'
        inputS3Uri: '{{ item.inputS3Uri }}'
        jobId: '{{ item.jobId }}'
        jobName: '{{ item.jobName }}'
        jobProperties: '{{ item.jobProperties }}'
        jobStatus: '{{ item.jobStatus }}'
        message: '{{ item.message }}'
        outputS3Uri: '{{ item.outputS3Uri }}'
        submittedAt: '{{ item.submittedAt }}'
  # ── GetDatastore ──
  - discovery_id: aws.medical-imaging.get_datastore
    for_each: aws.medical-imaging.list_datastores
    calls:
      - action: get_datastore
        params:
          datastoreId: '{{ item.datastoreId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.datastoreSummaries }}'
      item:
        datastoreArn: '{{ item.datastoreArn }}'
        datastoreId: '{{ item.datastoreId }}'
        datastoreName: '{{ item.datastoreName }}'
        datastoreProperties: '{{ item.datastoreProperties }}'
        datastoreStatus: '{{ item.datastoreStatus }}'
        kmsKeyArn: '{{ item.kmsKeyArn }}'
        lambdaAuthorizerArn: '{{ item.lambdaAuthorizerArn }}'
        losslessStorageFormat: '{{ item.losslessStorageFormat }}'
  # ── GetImageFrame ──
  - discovery_id: aws.medical-imaging.get_image_frame
    for_each: aws.medical-imaging.list_datastores
    calls:
      - action: get_image_frame
        params:
          datastoreId: '{{ item.datastoreId }}'
          imageSetId: '{{ item.imageSetId }}'
          imageFrameInformation: '{{ item.imageFrameInformation }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.datastoreSummaries }}'
      item:
        contentType: '{{ item.contentType }}'
        imageFrameBlob: '{{ item.imageFrameBlob }}'
  # ── GetImageSet ──
  - discovery_id: aws.medical-imaging.get_image_set
    for_each: aws.medical-imaging.list_datastores
    calls:
      - action: get_image_set
        params:
          datastoreId: '{{ item.datastoreId }}'
          imageSetId: '{{ item.imageSetId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.overrides }}'
      item:
        forced: '{{ item.forced }}'
  # ── GetImageSetMetadata ──
  - discovery_id: aws.medical-imaging.get_image_set_metadata
    for_each: aws.medical-imaging.list_datastores
    calls:
      - action: get_image_set_metadata
        params:
          datastoreId: '{{ item.datastoreId }}'
          imageSetId: '{{ item.imageSetId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.datastoreSummaries }}'
      item:
        contentEncoding: '{{ item.contentEncoding }}'
        imageSetMetadataBlob: '{{ item.imageSetMetadataBlob }}'
  # ── ListDICOMImportJobs ──
  - discovery_id: aws.medical-imaging.list_dicom_import_jobs
    for_each: aws.medical-imaging.list_datastores
    calls:
      - action: list_dicom_import_jobs
        params:
          datastoreId: '{{ item.datastoreId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.jobSummaries }}'
      item:
        dataAccessRoleArn: '{{ item.dataAccessRoleArn }}'
        datastoreId: '{{ item.datastoreId }}'
        endedAt: '{{ item.endedAt }}'
        inputS3Uri: '{{ item.inputS3Uri }}'
        jobId: '{{ item.jobId }}'
        jobName: '{{ item.jobName }}'
        jobProperties: '{{ item.jobProperties }}'
        jobStatus: '{{ item.jobStatus }}'
        message: '{{ item.message }}'
        outputS3Uri: '{{ item.outputS3Uri }}'
        submittedAt: '{{ item.submittedAt }}'
  # ── ListImageSetVersions ──
  - discovery_id: aws.medical-imaging.list_image_set_versions
    for_each: aws.medical-imaging.list_datastores
    calls:
      - action: list_image_set_versions
        params:
          datastoreId: '{{ item.datastoreId }}'
          imageSetId: '{{ item.imageSetId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.imageSetPropertiesList }}'
      item:
        ImageSetWorkflowStatus: '{{ item.ImageSetWorkflowStatus }}'
        deletedAt: '{{ item.deletedAt }}'
        imageSetState: '{{ item.imageSetState }}'
        message: '{{ item.message }}'
        overrides: '{{ item.overrides }}'
        versionId: '{{ item.versionId }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.medical-imaging.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        tags: '{{ response.tags }}'
  # ── SearchImageSets ──
  - discovery_id: aws.medical-imaging.search_image_sets
    calls:
      - action: search_image_sets
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.imageSetsMetadataSummaries }}'
