# ============================================================
# Discovery YAML — ssm-sap (AWS)
# Generated: 2026-02-21T04:56:59Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: ssm-sap
services:
  client: ssm-sap
  module: boto3.client
discovery:
  # ── GetApplication ──
  - discovery_id: aws.ssm-sap.get_application
    calls:
      - action: get_application
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Application }}'
      item:
        ResourceId: '{{ item.ResourceId }}'
        Status: '{{ item.Status }}'
        AppRegistryArn: '{{ item.AppRegistryArn }}'
        Application: '{{ item.Application }}'
        AssociatedApplicationArns: '{{ item.AssociatedApplicationArns }}'
        Components: '{{ item.Components }}'
        ConfigurationCheckDescription: '{{ item.ConfigurationCheckDescription }}'
        ConfigurationCheckId: '{{ item.ConfigurationCheckId }}'
        ConfigurationCheckName: '{{ item.ConfigurationCheckName }}'
        ConfigurationCheckOperation: '{{ item.ConfigurationCheckOperation }}'
        EndTime: '{{ item.EndTime }}'
        LastUpdated: '{{ item.LastUpdated }}'
        LastUpdatedTime: '{{ item.LastUpdatedTime }}'
        Operation: '{{ item.Operation }}'
        Properties: '{{ item.Properties }}'
        References: '{{ item.References }}'
        Resource: '{{ item.Resource }}'
        ResourceType: '{{ item.ResourceType }}'
        RuleStatusCounts: '{{ item.RuleStatusCounts }}'
        StartTime: '{{ item.StartTime }}'
        StatusMessage: '{{ item.StatusMessage }}'
        Timestamp: '{{ item.Timestamp }}'
  # ── GetDatabase ──
  - discovery_id: aws.ssm-sap.get_database
    calls:
      - action: get_database
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Database }}'
      item:
        Arn: '{{ item.Arn }}'
        Status: '{{ item.Status }}'
        ApplicationId: '{{ item.ApplicationId }}'
        ComponentId: '{{ item.ComponentId }}'
        ConnectedComponentArns: '{{ item.ConnectedComponentArns }}'
        Credentials: '{{ item.Credentials }}'
        Database: '{{ item.Database }}'
        DatabaseId: '{{ item.DatabaseId }}'
        DatabaseName: '{{ item.DatabaseName }}'
        DatabaseType: '{{ item.DatabaseType }}'
        LastUpdated: '{{ item.LastUpdated }}'
        PrimaryHost: '{{ item.PrimaryHost }}'
        SQLPort: '{{ item.SQLPort }}'
  # ── ListApplications ──
  - discovery_id: aws.ssm-sap.list_applications
    calls:
      - action: list_applications
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Applications }}'
      item:
        Arn: '{{ item.Arn }}'
        Id: '{{ item.Id }}'
        Tags: '{{ item.Tags }}'
        Application: '{{ item.Application }}'
        DiscoveryStatus: '{{ item.DiscoveryStatus }}'
        Type: '{{ item.Type }}'
  # ── ListComponents ──
  - discovery_id: aws.ssm-sap.list_components
    calls:
      - action: list_components
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Components }}'
      item:
        Arn: '{{ item.Arn }}'
        Tags: '{{ item.Tags }}'
        ApplicationId: '{{ item.ApplicationId }}'
        Component: '{{ item.Component }}'
        ComponentId: '{{ item.ComponentId }}'
        ComponentType: '{{ item.ComponentType }}'
  # ── ListConfigurationCheckDefinitions ──
  - discovery_id: aws.ssm-sap.list_configuration_check_definitions
    calls:
      - action: list_configuration_check_definitions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ConfigurationChecks }}'
      item:
        Id: '{{ item.Id }}'
        Name: '{{ item.Name }}'
        ApplicableApplicationTypes: '{{ item.ApplicableApplicationTypes }}'
        Description: '{{ item.Description }}'
        Enabled: '{{ item.Enabled }}'
  # ── ListDatabases ──
  - discovery_id: aws.ssm-sap.list_databases
    calls:
      - action: list_databases
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Databases }}'
      item:
        Arn: '{{ item.Arn }}'
        Tags: '{{ item.Tags }}'
        ApplicationId: '{{ item.ApplicationId }}'
        ComponentId: '{{ item.ComponentId }}'
        Database: '{{ item.Database }}'
        DatabaseId: '{{ item.DatabaseId }}'
        DatabaseType: '{{ item.DatabaseType }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetComponent ──
  - discovery_id: aws.ssm-sap.get_component
    for_each: aws.ssm-sap.get_application
    calls:
      - action: get_component
        params:
          ApplicationId: '{{ item.ApplicationId }}'
          ComponentId: '{{ item.ComponentId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Database }}'
      item:
        Arn: '{{ item.Arn }}'
        Status: '{{ item.Status }}'
        ApplicationId: '{{ item.ApplicationId }}'
        AssociatedHost: '{{ item.AssociatedHost }}'
        ChildComponents: '{{ item.ChildComponents }}'
        Component: '{{ item.Component }}'
        ComponentId: '{{ item.ComponentId }}'
        ComponentType: '{{ item.ComponentType }}'
        DatabaseConnection: '{{ item.DatabaseConnection }}'
        Databases: '{{ item.Databases }}'
        HdbVersion: '{{ item.HdbVersion }}'
        Hosts: '{{ item.Hosts }}'
        LastUpdated: '{{ item.LastUpdated }}'
        ParentComponent: '{{ item.ParentComponent }}'
        PrimaryHost: '{{ item.PrimaryHost }}'
        Resilience: '{{ item.Resilience }}'
        SapFeature: '{{ item.SapFeature }}'
        SapHostname: '{{ item.SapHostname }}'
        SapKernelVersion: '{{ item.SapKernelVersion }}'
        Sid: '{{ item.Sid }}'
        SystemNumber: '{{ item.SystemNumber }}'
  # ── GetConfigurationCheckOperation ──
  - discovery_id: aws.ssm-sap.get_configuration_check_operation
    calls:
      - action: get_configuration_check_operation
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Database }}'
      item:
        Id: '{{ item.Id }}'
        Status: '{{ item.Status }}'
        ApplicationId: '{{ item.ApplicationId }}'
        ConfigurationCheckOperation: '{{ item.ConfigurationCheckOperation }}'
        StatusMessage: '{{ item.StatusMessage }}'
  # ── GetOperation ──
  - discovery_id: aws.ssm-sap.get_operation
    calls:
      - action: get_operation
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ConfigurationCheckOperation }}'
      item:
        Id: '{{ item.Id }}'
        ResourceArn: '{{ item.ResourceArn }}'
        Status: '{{ item.Status }}'
        EndTime: '{{ item.EndTime }}'
        Operation: '{{ item.Operation }}'
        StartTime: '{{ item.StartTime }}'
        StatusMessage: '{{ item.StatusMessage }}'
        Type: '{{ item.Type }}'
  # ── GetResourcePermission ──
  - discovery_id: aws.ssm-sap.get_resource_permission
    calls:
      - action: get_resource_permission
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        Policy: '{{ response.Policy }}'
  # ── ListConfigurationCheckOperations ──
  - discovery_id: aws.ssm-sap.list_configuration_check_operations
    for_each: aws.ssm-sap.get_application
    calls:
      - action: list_configuration_check_operations
        params:
          ApplicationId: '{{ item.ApplicationId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ConfigurationCheckOperations }}'
      item:
        Id: '{{ item.Id }}'
        Status: '{{ item.Status }}'
        ApplicationId: '{{ item.ApplicationId }}'
        ConfigurationCheckDescription: '{{ item.ConfigurationCheckDescription }}'
        ConfigurationCheckId: '{{ item.ConfigurationCheckId }}'
        ConfigurationCheckName: '{{ item.ConfigurationCheckName }}'
        ConfigurationCheckOperation: '{{ item.ConfigurationCheckOperation }}'
        EndTime: '{{ item.EndTime }}'
        Operation: '{{ item.Operation }}'
        References: '{{ item.References }}'
        Resource: '{{ item.Resource }}'
        RuleStatusCounts: '{{ item.RuleStatusCounts }}'
        StartTime: '{{ item.StartTime }}'
        StatusMessage: '{{ item.StatusMessage }}'
        Timestamp: '{{ item.Timestamp }}'
  # ── ListOperationEvents ──
  - discovery_id: aws.ssm-sap.list_operation_events
    calls:
      - action: list_operation_events
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.OperationEvents }}'
      item:
        Status: '{{ item.Status }}'
        Description: '{{ item.Description }}'
        Resource: '{{ item.Resource }}'
        StatusMessage: '{{ item.StatusMessage }}'
        Timestamp: '{{ item.Timestamp }}'
  # ── ListOperations ──
  - discovery_id: aws.ssm-sap.list_operations
    for_each: aws.ssm-sap.get_application
    calls:
      - action: list_operations
        params:
          ApplicationId: '{{ item.ApplicationId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Operations }}'
      item:
        Id: '{{ item.Id }}'
        ResourceArn: '{{ item.ResourceArn }}'
        ResourceId: '{{ item.ResourceId }}'
        Status: '{{ item.Status }}'
        EndTime: '{{ item.EndTime }}'
        LastUpdatedTime: '{{ item.LastUpdatedTime }}'
        Operation: '{{ item.Operation }}'
        Properties: '{{ item.Properties }}'
        ResourceType: '{{ item.ResourceType }}'
        StartTime: '{{ item.StartTime }}'
        StatusMessage: '{{ item.StatusMessage }}'
        Type: '{{ item.Type }}'
  # ── ListSubCheckResults ──
  - discovery_id: aws.ssm-sap.list_sub_check_results
    calls:
      - action: list_sub_check_results
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.SubCheckResults }}'
      item:
        Id: '{{ item.Id }}'
        Name: '{{ item.Name }}'
        Description: '{{ item.Description }}'
        References: '{{ item.References }}'
  # ── ListSubCheckRuleResults ──
  - discovery_id: aws.ssm-sap.list_sub_check_rule_results
    calls:
      - action: list_sub_check_rule_results
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.RuleResults }}'
      item:
        Id: '{{ item.Id }}'
        Status: '{{ item.Status }}'
        Description: '{{ item.Description }}'
        Message: '{{ item.Message }}'
        Metadata: '{{ item.Metadata }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.ssm-sap.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        tags: '{{ response.tags }}'
