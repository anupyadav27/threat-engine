# ============================================================
# Discovery YAML — codeguruprofiler (AWS)
# Generated: 2026-02-21T04:56:57Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: codeguruprofiler
services:
  client: codeguruprofiler
  module: boto3.client
discovery:
  # ── GetFindingsReportAccountSummary ──
  - discovery_id: aws.codeguruprofiler.get_findings_report_account_summary
    calls:
      - action: get_findings_report_account_summary
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.reportSummaries }}'
      item:
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        profileEndTime: '{{ item.profileEndTime }}'
        profileStartTime: '{{ item.profileStartTime }}'
        profilingGroupName: '{{ item.profilingGroupName }}'
        totalNumberOfFindings: '{{ item.totalNumberOfFindings }}'
  # ── ListProfilingGroups ──
  - discovery_id: aws.codeguruprofiler.list_profiling_groups
    calls:
      - action: list_profiling_groups
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.profilingGroupNames }}'
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeProfilingGroup ──
  - discovery_id: aws.codeguruprofiler.describe_profiling_group
    for_each: aws.codeguruprofiler.list_profiling_groups
    calls:
      - action: describe_profiling_group
        params:
          profilingGroupName: '{{ item.profilingGroupName }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.profilingGroup }}'
      item:
        agentOrchestrationConfig: '{{ item.agentOrchestrationConfig }}'
        arn: '{{ item.arn }}'
        computePlatform: '{{ item.computePlatform }}'
        createdAt: '{{ item.createdAt }}'
        profilingStatus: '{{ item.profilingStatus }}'
        tags: '{{ item.tags }}'
        updatedAt: '{{ item.updatedAt }}'
  # ── GetNotificationConfiguration ──
  - discovery_id: aws.codeguruprofiler.get_notification_configuration
    for_each: aws.codeguruprofiler.list_profiling_groups
    calls:
      - action: get_notification_configuration
        params:
          profilingGroupName: '{{ item.profilingGroupName }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.notificationConfiguration }}'
      item:
        channels: '{{ item.channels }}'
  # ── GetPolicy ──
  - discovery_id: aws.codeguruprofiler.get_policy
    for_each: aws.codeguruprofiler.list_profiling_groups
    calls:
      - action: get_policy
        params:
          profilingGroupName: '{{ item.profilingGroupName }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.policy }}'
      item:
        Statement: '{{ item.Statement }}'
        Version: '{{ item.Version }}'
        policy: '{{ item.policy }}'
  # ── GetProfile ──
  - discovery_id: aws.codeguruprofiler.get_profile
    for_each: aws.codeguruprofiler.list_profiling_groups
    calls:
      - action: get_profile
        params:
          profilingGroupName: '{{ item.profilingGroupName }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        contentEncoding: '{{ response.contentEncoding }}'
        contentType: '{{ response.contentType }}'
        profile: '{{ response.profile }}'
  # ── GetRecommendations ──
  - discovery_id: aws.codeguruprofiler.get_recommendations
    for_each: aws.codeguruprofiler.list_profiling_groups
    calls:
      - action: get_recommendations
        params:
          endTime: '{{ item.endTime }}'
          profilingGroupName: '{{ item.profilingGroupName }}'
          startTime: '{{ item.startTime }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.anomalies }}'
      item:
        anomalies: '{{ item.anomalies }}'
        instances: '{{ item.instances }}'
        metric: '{{ item.metric }}'
        reason: '{{ item.reason }}'
  # ── ListFindingsReports ──
  - discovery_id: aws.codeguruprofiler.list_findings_reports
    for_each: aws.codeguruprofiler.list_profiling_groups
    calls:
      - action: list_findings_reports
        params:
          endTime: '{{ item.endTime }}'
          profilingGroupName: '{{ item.profilingGroupName }}'
          startTime: '{{ item.startTime }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.findingsReportSummaries }}'
      item:
        id: '{{ item.id }}'
        profileEndTime: '{{ item.profileEndTime }}'
        profileStartTime: '{{ item.profileStartTime }}'
        profilingGroupName: '{{ item.profilingGroupName }}'
        totalNumberOfFindings: '{{ item.totalNumberOfFindings }}'
  # ── ListProfileTimes ──
  - discovery_id: aws.codeguruprofiler.list_profile_times
    for_each: aws.codeguruprofiler.list_profiling_groups
    calls:
      - action: list_profile_times
        params:
          endTime: '{{ item.endTime }}'
          period: '{{ item.period }}'
          profilingGroupName: '{{ item.profilingGroupName }}'
          startTime: '{{ item.startTime }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.profileTimes }}'
      item:
        start: '{{ item.start }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.codeguruprofiler.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        tags: '{{ response.tags }}'
