# ============================================================
# Discovery YAML — batch (AWS)
# Generated: 2026-02-21T04:56:57Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: batch
services:
  client: batch
  module: boto3.client
discovery:
  # ── DescribeComputeEnvironments ──
  - discovery_id: aws.batch.describe_compute_environments
    calls:
      - action: describe_compute_environments
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.computeEnvironments }}'
      item:
        Status: '{{ item.Status }}'
        Enabled: '{{ item.Enabled }}'
        Statement: '{{ item.Statement }}'
        Version: '{{ item.Version }}'
        computeEnvironmentArn: '{{ item.computeEnvironmentArn }}'
        computeEnvironmentName: '{{ item.computeEnvironmentName }}'
        computeEnvironments: '{{ item.computeEnvironments }}'
        computeResources: '{{ item.computeResources }}'
        containerOrchestrationType: '{{ item.containerOrchestrationType }}'
        context: '{{ item.context }}'
        ecsClusterArn: '{{ item.ecsClusterArn }}'
        eksConfiguration: '{{ item.eksConfiguration }}'
        serviceRole: '{{ item.serviceRole }}'
        state: '{{ item.state }}'
        status: '{{ item.status }}'
        statusReason: '{{ item.statusReason }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
        unmanagedvCpus: '{{ item.unmanagedvCpus }}'
        updatePolicy: '{{ item.updatePolicy }}'
        uuid: '{{ item.uuid }}'
  # ── DescribeJobDefinitions ──
  - discovery_id: aws.batch.describe_job_definitions
    calls:
      - action: describe_job_definitions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.jobDefinitions }}'
      item:
        consumableResourceProperties: '{{ item.consumableResourceProperties }}'
        containerOrchestrationType: '{{ item.containerOrchestrationType }}'
        containerProperties: '{{ item.containerProperties }}'
        ecsProperties: '{{ item.ecsProperties }}'
        eksProperties: '{{ item.eksProperties }}'
        jobDefinitionArn: '{{ item.jobDefinitionArn }}'
        jobDefinitionName: '{{ item.jobDefinitionName }}'
        jobDefinitions: '{{ item.jobDefinitions }}'
        nodeProperties: '{{ item.nodeProperties }}'
        parameters: '{{ item.parameters }}'
        platformCapabilities: '{{ item.platformCapabilities }}'
        propagateTags: '{{ item.propagateTags }}'
        retryStrategy: '{{ item.retryStrategy }}'
        revision: '{{ item.revision }}'
        schedulingPriority: '{{ item.schedulingPriority }}'
        status: '{{ item.status }}'
        tags: '{{ item.tags }}'
        timeout: '{{ item.timeout }}'
        type: '{{ item.type }}'
  # ── DescribeJobQueues ──
  - discovery_id: aws.batch.describe_job_queues
    calls:
      - action: describe_job_queues
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.jobQueues }}'
      item:
        computeEnvironmentOrder: '{{ item.computeEnvironmentOrder }}'
        jobQueueArn: '{{ item.jobQueueArn }}'
        jobQueueName: '{{ item.jobQueueName }}'
        jobQueueType: '{{ item.jobQueueType }}'
        jobQueues: '{{ item.jobQueues }}'
        jobStateTimeLimitActions: '{{ item.jobStateTimeLimitActions }}'
        priority: '{{ item.priority }}'
        schedulingPolicyArn: '{{ item.schedulingPolicyArn }}'
        serviceEnvironmentOrder: '{{ item.serviceEnvironmentOrder }}'
        state: '{{ item.state }}'
        status: '{{ item.status }}'
        statusReason: '{{ item.statusReason }}'
        tags: '{{ item.tags }}'
  # ── DescribeServiceEnvironments ──
  - discovery_id: aws.batch.describe_service_environments
    calls:
      - action: describe_service_environments
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.serviceEnvironments }}'
      item:
        capacityLimits: '{{ item.capacityLimits }}'
        serviceEnvironmentArn: '{{ item.serviceEnvironmentArn }}'
        serviceEnvironmentName: '{{ item.serviceEnvironmentName }}'
        serviceEnvironmentType: '{{ item.serviceEnvironmentType }}'
        serviceEnvironments: '{{ item.serviceEnvironments }}'
        state: '{{ item.state }}'
        status: '{{ item.status }}'
        tags: '{{ item.tags }}'
  # ── ListConsumableResources ──
  - discovery_id: aws.batch.list_consumable_resources
    calls:
      - action: list_consumable_resources
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.consumableResources }}'
      item:
        consumableResourceArn: '{{ item.consumableResourceArn }}'
        consumableResourceName: '{{ item.consumableResourceName }}'
        inUseQuantity: '{{ item.inUseQuantity }}'
        resourceType: '{{ item.resourceType }}'
        totalQuantity: '{{ item.totalQuantity }}'
  # ── ListJobs ──
  - discovery_id: aws.batch.list_jobs
    calls:
      - action: list_jobs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.jobSummaryList }}'
      item:
        arrayProperties: '{{ item.arrayProperties }}'
        container: '{{ item.container }}'
        createdAt: '{{ item.createdAt }}'
        jobArn: '{{ item.jobArn }}'
        jobDefinition: '{{ item.jobDefinition }}'
        jobId: '{{ item.jobId }}'
        jobName: '{{ item.jobName }}'
        nodeProperties: '{{ item.nodeProperties }}'
        startedAt: '{{ item.startedAt }}'
        status: '{{ item.status }}'
        statusReason: '{{ item.statusReason }}'
        stoppedAt: '{{ item.stoppedAt }}'
  # ── ListSchedulingPolicies ──
  - discovery_id: aws.batch.list_scheduling_policies
    calls:
      - action: list_scheduling_policies
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.schedulingPolicies }}'
      item:
        arn: '{{ item.arn }}'
        schedulingPolicies: '{{ item.schedulingPolicies }}'
  # ── ListServiceJobs ──
  - discovery_id: aws.batch.list_service_jobs
    calls:
      - action: list_service_jobs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.jobSummaryList }}'
      item:
        createdAt: '{{ item.createdAt }}'
        jobArn: '{{ item.jobArn }}'
        jobId: '{{ item.jobId }}'
        jobName: '{{ item.jobName }}'
        latestAttempt: '{{ item.latestAttempt }}'
        serviceJobType: '{{ item.serviceJobType }}'
        shareIdentifier: '{{ item.shareIdentifier }}'
        startedAt: '{{ item.startedAt }}'
        status: '{{ item.status }}'
        statusReason: '{{ item.statusReason }}'
        stoppedAt: '{{ item.stoppedAt }}'
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeConsumableResource ──
  - discovery_id: aws.batch.describe_consumable_resource
    calls:
      - action: describe_consumable_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        availableQuantity: '{{ response.availableQuantity }}'
        consumableResourceArn: '{{ response.consumableResourceArn }}'
        consumableResourceName: '{{ response.consumableResourceName }}'
        createdAt: '{{ response.createdAt }}'
        inUseQuantity: '{{ response.inUseQuantity }}'
        resourceType: '{{ response.resourceType }}'
        tags: '{{ response.tags }}'
        totalQuantity: '{{ response.totalQuantity }}'
  # ── DescribeJobs ──
  - discovery_id: aws.batch.describe_jobs
    calls:
      - action: describe_jobs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.jobs }}'
      item:
        arrayProperties: '{{ item.arrayProperties }}'
        attempts: '{{ item.attempts }}'
        consumableResourceProperties: '{{ item.consumableResourceProperties }}'
        container: '{{ item.container }}'
        createdAt: '{{ item.createdAt }}'
        dependsOn: '{{ item.dependsOn }}'
        ecsProperties: '{{ item.ecsProperties }}'
        eksAttempts: '{{ item.eksAttempts }}'
        eksProperties: '{{ item.eksProperties }}'
        isCancelled: '{{ item.isCancelled }}'
        isTerminated: '{{ item.isTerminated }}'
        jobArn: '{{ item.jobArn }}'
        jobDefinition: '{{ item.jobDefinition }}'
        jobId: '{{ item.jobId }}'
        jobName: '{{ item.jobName }}'
        jobQueue: '{{ item.jobQueue }}'
        nodeDetails: '{{ item.nodeDetails }}'
        nodeProperties: '{{ item.nodeProperties }}'
        parameters: '{{ item.parameters }}'
        platformCapabilities: '{{ item.platformCapabilities }}'
        propagateTags: '{{ item.propagateTags }}'
        retryStrategy: '{{ item.retryStrategy }}'
        schedulingPriority: '{{ item.schedulingPriority }}'
        shareIdentifier: '{{ item.shareIdentifier }}'
        startedAt: '{{ item.startedAt }}'
        status: '{{ item.status }}'
        statusReason: '{{ item.statusReason }}'
        stoppedAt: '{{ item.stoppedAt }}'
        tags: '{{ item.tags }}'
        timeout: '{{ item.timeout }}'
  # ── DescribeSchedulingPolicies ──
  - discovery_id: aws.batch.describe_scheduling_policies
    calls:
      - action: describe_scheduling_policies
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.schedulingPolicies }}'
      item:
        arn: '{{ item.arn }}'
        fairsharePolicy: '{{ item.fairsharePolicy }}'
        name: '{{ item.name }}'
        tags: '{{ item.tags }}'
  # ── DescribeServiceJob ──
  - discovery_id: aws.batch.describe_service_job
    for_each: aws.batch.list_jobs
    calls:
      - action: describe_service_job
        params:
          jobId: '{{ item.jobId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.attempts }}'
      item:
        serviceResourceId: '{{ item.serviceResourceId }}'
        startedAt: '{{ item.startedAt }}'
        statusReason: '{{ item.statusReason }}'
        stoppedAt: '{{ item.stoppedAt }}'
  # ── GetJobQueueSnapshot ──
  - discovery_id: aws.batch.get_job_queue_snapshot
    calls:
      - action: get_job_queue_snapshot
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.frontOfQueue }}'
      item:
        jobs: '{{ item.jobs }}'
        lastUpdatedAt: '{{ item.lastUpdatedAt }}'
  # ── ListJobsByConsumableResource ──
  - discovery_id: aws.batch.list_jobs_by_consumable_resource
    calls:
      - action: list_jobs_by_consumable_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.jobs }}'
      item:
        consumableResourceProperties: '{{ item.consumableResourceProperties }}'
        createdAt: '{{ item.createdAt }}'
        jobArn: '{{ item.jobArn }}'
        jobDefinitionArn: '{{ item.jobDefinitionArn }}'
        jobName: '{{ item.jobName }}'
        jobQueueArn: '{{ item.jobQueueArn }}'
        jobStatus: '{{ item.jobStatus }}'
        quantity: '{{ item.quantity }}'
        shareIdentifier: '{{ item.shareIdentifier }}'
        startedAt: '{{ item.startedAt }}'
        statusReason: '{{ item.statusReason }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.batch.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        tags: '{{ response.tags }}'
