# ============================================================
# Discovery YAML — servicecatalog (AWS)
# Generated: 2026-02-21T04:56:59Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: servicecatalog
services:
  client: servicecatalog
  module: boto3.client
discovery:
  # ── DescribeProduct ──
  - discovery_id: aws.servicecatalog.describe_product
    calls:
      - action: describe_product
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ProvisioningArtifacts }}'
      item:
        Budgets: '{{ item.Budgets }}'
        Description: '{{ item.Description }}'
        Guidance: '{{ item.Guidance }}'
        LaunchPaths: '{{ item.LaunchPaths }}'
        ProvisioningArtifacts: '{{ item.ProvisioningArtifacts }}'
  # ── DescribeProductAsAdmin ──
  - discovery_id: aws.servicecatalog.describe_product_as_admin
    calls:
      - action: describe_product_as_admin
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ProvisioningArtifactSummaries }}'
      item:
        Description: '{{ item.Description }}'
        ProductViewDetail: '{{ item.ProductViewDetail }}'
        ProvisioningArtifactMetadata: '{{ item.ProvisioningArtifactMetadata }}'
        ProvisioningArtifactSummaries: '{{ item.ProvisioningArtifactSummaries }}'
        TagOptions: '{{ item.TagOptions }}'
  # ── DescribeProvisionedProduct ──
  - discovery_id: aws.servicecatalog.describe_provisioned_product
    calls:
      - action: describe_provisioned_product
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.CloudWatchDashboards }}'
      item:
        CloudWatchDashboards: '{{ item.CloudWatchDashboards }}'
        ProvisionedProductDetail: '{{ item.ProvisionedProductDetail }}'
  # ── DescribeProvisioningArtifact ──
  - discovery_id: aws.servicecatalog.describe_provisioning_artifact
    calls:
      - action: describe_provisioning_artifact
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ProvisioningArtifactParameters }}'
      item:
        DefaultValue: '{{ item.DefaultValue }}'
        Description: '{{ item.Description }}'
        Info: '{{ item.Info }}'
        IsNoEcho: '{{ item.IsNoEcho }}'
        ParameterConstraints: '{{ item.ParameterConstraints }}'
        ParameterKey: '{{ item.ParameterKey }}'
        ParameterType: '{{ item.ParameterType }}'
        ProvisioningArtifactDetail: '{{ item.ProvisioningArtifactDetail }}'
        ProvisioningArtifactParameters: '{{ item.ProvisioningArtifactParameters }}'
  # ── DescribeProvisioningParameters ──
  - discovery_id: aws.servicecatalog.describe_provisioning_parameters
    calls:
      - action: describe_provisioning_parameters
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ProvisioningArtifactParameters }}'
      item:
        Description: '{{ item.Description }}'
        Key: '{{ item.Key }}'
        ProvisioningArtifactOutputKeys: '{{ item.ProvisioningArtifactOutputKeys }}'
        ProvisioningArtifactOutputs: '{{ item.ProvisioningArtifactOutputs }}'
        ProvisioningArtifactPreferences: '{{ item.ProvisioningArtifactPreferences }}'
        UsageInstructions: '{{ item.UsageInstructions }}'
  # ── GetAWSOrganizationsAccessStatus ──
  - discovery_id: aws.servicecatalog.get_aws_organizations_access_status
    calls:
      - action: get_aws_organizations_access_status
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.AccessStatus }}'
      item:
        AccessStatus: '{{ item.AccessStatus }}'
  # ── GetProvisionedProductOutputs ──
  - discovery_id: aws.servicecatalog.get_provisioned_product_outputs
    calls:
      - action: get_provisioned_product_outputs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Outputs }}'
      item:
        Description: '{{ item.Description }}'
        NextPageToken: '{{ item.NextPageToken }}'
        OutputKey: '{{ item.OutputKey }}'
        OutputValue: '{{ item.OutputValue }}'
        Outputs: '{{ item.Outputs }}'
  # ── ListAcceptedPortfolioShares ──
  - discovery_id: aws.servicecatalog.list_accepted_portfolio_shares
    calls:
      - action: list_accepted_portfolio_shares
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.PortfolioDetails }}'
      item:
        ARN: '{{ item.ARN }}'
        Description: '{{ item.Description }}'
        DisplayName: '{{ item.DisplayName }}'
        PortfolioDetail: '{{ item.PortfolioDetail }}'
        ProviderName: '{{ item.ProviderName }}'
  # ── ListPortfolios ──
  - discovery_id: aws.servicecatalog.list_portfolios
    calls:
      - action: list_portfolios
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.PortfolioDetails }}'
      item:
        ARN: '{{ item.ARN }}'
        Description: '{{ item.Description }}'
        DisplayName: '{{ item.DisplayName }}'
        PortfolioShareDetails: '{{ item.PortfolioShareDetails }}'
        ProviderName: '{{ item.ProviderName }}'
  # ── ListProvisionedProductPlans ──
  - discovery_id: aws.servicecatalog.list_provisioned_product_plans
    calls:
      - action: list_provisioned_product_plans
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ProvisionedProductPlans }}'
      item:
        PlanId: '{{ item.PlanId }}'
        PlanName: '{{ item.PlanName }}'
        PlanType: '{{ item.PlanType }}'
        ProvisionProductId: '{{ item.ProvisionProductId }}'
        ProvisionProductName: '{{ item.ProvisionProductName }}'
        TargetProductId: '{{ item.TargetProductId }}'
  # ── ListRecordHistory ──
  - discovery_id: aws.servicecatalog.list_record_history
    calls:
      - action: list_record_history
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.RecordDetails }}'
      item:
        LaunchRoleArn: '{{ item.LaunchRoleArn }}'
        PathId: '{{ item.PathId }}'
        ProvisionedProductId: '{{ item.ProvisionedProductId }}'
        ProvisionedProductName: '{{ item.ProvisionedProductName }}'
        ProvisionedProductType: '{{ item.ProvisionedProductType }}'
        RecordDetail: '{{ item.RecordDetail }}'
        RecordErrors: '{{ item.RecordErrors }}'
        RecordId: '{{ item.RecordId }}'
        RecordTags: '{{ item.RecordTags }}'
        RecordType: '{{ item.RecordType }}'
        UpdatedTime: '{{ item.UpdatedTime }}'
  # ── ListServiceActions ──
  - discovery_id: aws.servicecatalog.list_service_actions
    calls:
      - action: list_service_actions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ServiceActionSummaries }}'
      item:
        DefinitionType: '{{ item.DefinitionType }}'
        Description: '{{ item.Description }}'
        ServiceActionDetail: '{{ item.ServiceActionDetail }}'
  # ── ListTagOptions ──
  - discovery_id: aws.servicecatalog.list_tag_options
    calls:
      - action: list_tag_options
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.TagOptionDetails }}'
      item:
        Active: '{{ item.Active }}'
        Key: '{{ item.Key }}'
        TagOptionDetail: '{{ item.TagOptionDetail }}'
        Value: '{{ item.Value }}'
  # ── ScanProvisionedProducts ──
  - discovery_id: aws.servicecatalog.scan_provisioned_products
    calls:
      - action: scan_provisioned_products
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ProvisionedProducts }}'
  # ── SearchProducts ──
  - discovery_id: aws.servicecatalog.search_products
    calls:
      - action: search_products
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ProductViewSummaries }}'
  # ── SearchProductsAsAdmin ──
  - discovery_id: aws.servicecatalog.search_products_as_admin
    calls:
      - action: search_products_as_admin
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ProductViewDetails }}'
  # ── SearchProvisionedProducts ──
  - discovery_id: aws.servicecatalog.search_provisioned_products
    calls:
      - action: search_provisioned_products
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ProvisionedProducts }}'
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeConstraint ──
  - discovery_id: aws.servicecatalog.describe_constraint
    calls:
      - action: describe_constraint
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ConstraintDetail }}'
      item:
        ConstraintId: '{{ item.ConstraintId }}'
        Description: '{{ item.Description }}'
        PortfolioId: '{{ item.PortfolioId }}'
  # ── DescribeCopyProductStatus ──
  - discovery_id: aws.servicecatalog.describe_copy_product_status
    calls:
      - action: describe_copy_product_status
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ProvisionedProductPlans }}'
      item:
        TargetProductId: '{{ item.TargetProductId }}'
  # ── DescribePortfolio ──
  - discovery_id: aws.servicecatalog.describe_portfolio
    calls:
      - action: describe_portfolio
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Tags }}'
      item:
        Key: '{{ item.Key }}'
        Value: '{{ item.Value }}'
  # ── DescribePortfolioShareStatus ──
  - discovery_id: aws.servicecatalog.describe_portfolio_share_status
    calls:
      - action: describe_portfolio_share_status
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ShareDetails }}'
      item:
        ShareErrors: '{{ item.ShareErrors }}'
        SuccessfulShares: '{{ item.SuccessfulShares }}'
  # ── DescribePortfolioShares ──
  - discovery_id: aws.servicecatalog.describe_portfolio_shares
    calls:
      - action: describe_portfolio_shares
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.PortfolioShareDetails }}'
      item:
        Accepted: '{{ item.Accepted }}'
        PrincipalId: '{{ item.PrincipalId }}'
        SharePrincipals: '{{ item.SharePrincipals }}'
        ShareTagOptions: '{{ item.ShareTagOptions }}'
  # ── DescribeProductView ──
  - discovery_id: aws.servicecatalog.describe_product_view
    calls:
      - action: describe_product_view
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ProvisioningArtifacts }}'
      item:
        Description: '{{ item.Description }}'
        Guidance: '{{ item.Guidance }}'
  # ── DescribeProvisionedProductPlan ──
  - discovery_id: aws.servicecatalog.describe_provisioned_product_plan
    for_each: aws.servicecatalog.list_provisioned_product_plans
    calls:
      - action: describe_provisioned_product_plan
        params:
          PlanId: '{{ item.PlanId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ResourceChanges }}'
      item:
        Action: '{{ item.Action }}'
        Details: '{{ item.Details }}'
        LogicalResourceId: '{{ item.LogicalResourceId }}'
        PhysicalResourceId: '{{ item.PhysicalResourceId }}'
        Replacement: '{{ item.Replacement }}'
        ResourceType: '{{ item.ResourceType }}'
        Scope: '{{ item.Scope }}'
  # ── DescribeRecord ──
  - discovery_id: aws.servicecatalog.describe_record
    calls:
      - action: describe_record
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.RecordOutputs }}'
      item:
        Description: '{{ item.Description }}'
        OutputKey: '{{ item.OutputKey }}'
        OutputValue: '{{ item.OutputValue }}'
  # ── DescribeServiceAction ──
  - discovery_id: aws.servicecatalog.describe_service_action
    calls:
      - action: describe_service_action
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ServiceActionDetail }}'
      item:
        Definition: '{{ item.Definition }}'
        ServiceActionDetail: '{{ item.ServiceActionDetail }}'
        ServiceActionSummary: '{{ item.ServiceActionSummary }}'
  # ── DescribeServiceActionExecutionParameters ──
  - discovery_id: aws.servicecatalog.describe_service_action_execution_parameters
    for_each: aws.servicecatalog.list_record_history
    calls:
      - action: describe_service_action_execution_parameters
        params:
          ProvisionedProductId: '{{ item.ProvisionedProductId }}'
          ServiceActionId: '{{ item.ServiceActionId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ServiceActionParameters }}'
      item:
        DefaultValues: '{{ item.DefaultValues }}'
  # ── DescribeTagOption ──
  - discovery_id: aws.servicecatalog.describe_tag_option
    calls:
      - action: describe_tag_option
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.TagOptionDetails }}'
      item:
        Active: '{{ item.Active }}'
        Key: '{{ item.Key }}'
        Value: '{{ item.Value }}'
  # ── ListBudgetsForResource ──
  - discovery_id: aws.servicecatalog.list_budgets_for_resource
    calls:
      - action: list_budgets_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Budgets }}'
      item:
        BudgetName: '{{ item.BudgetName }}'
  # ── ListConstraintsForPortfolio ──
  - discovery_id: aws.servicecatalog.list_constraints_for_portfolio
    calls:
      - action: list_constraints_for_portfolio
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ConstraintDetails }}'
      item:
        ConstraintId: '{{ item.ConstraintId }}'
        Description: '{{ item.Description }}'
        PortfolioId: '{{ item.PortfolioId }}'
  # ── ListLaunchPaths ──
  - discovery_id: aws.servicecatalog.list_launch_paths
    calls:
      - action: list_launch_paths
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.LaunchPathSummaries }}'
      item:
        ConstraintSummaries: '{{ item.ConstraintSummaries }}'
  # ── ListOrganizationPortfolioAccess ──
  - discovery_id: aws.servicecatalog.list_organization_portfolio_access
    calls:
      - action: list_organization_portfolio_access
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.OrganizationNodes }}'
      item:
        Value: '{{ item.Value }}'
  # ── ListPortfolioAccess ──
  - discovery_id: aws.servicecatalog.list_portfolio_access
    calls:
      - action: list_portfolio_access
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.AccountIds }}'
      item:
        PortfolioShareDetails: '{{ item.PortfolioShareDetails }}'
  # ── ListPortfoliosForProduct ──
  - discovery_id: aws.servicecatalog.list_portfolios_for_product
    calls:
      - action: list_portfolios_for_product
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.PortfolioDetails }}'
      item:
        ARN: '{{ item.ARN }}'
        Description: '{{ item.Description }}'
        DisplayName: '{{ item.DisplayName }}'
        ProviderName: '{{ item.ProviderName }}'
  # ── ListPrincipalsForPortfolio ──
  - discovery_id: aws.servicecatalog.list_principals_for_portfolio
    calls:
      - action: list_principals_for_portfolio
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Principals }}'
      item:
        PrincipalARN: '{{ item.PrincipalARN }}'
        PrincipalType: '{{ item.PrincipalType }}'
  # ── ListProvisioningArtifacts ──
  - discovery_id: aws.servicecatalog.list_provisioning_artifacts
    calls:
      - action: list_provisioning_artifacts
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ProvisioningArtifactDetails }}'
      item:
        Active: '{{ item.Active }}'
        Description: '{{ item.Description }}'
        Guidance: '{{ item.Guidance }}'
        SourceRevision: '{{ item.SourceRevision }}'
  # ── ListProvisioningArtifactsForServiceAction ──
  - discovery_id: aws.servicecatalog.list_provisioning_artifacts_for_service_action
    calls:
      - action: list_provisioning_artifacts_for_service_action
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ProvisioningArtifactViews }}'
      item:
        ProvisioningArtifact: '{{ item.ProvisioningArtifact }}'
  # ── ListResourcesForTagOption ──
  - discovery_id: aws.servicecatalog.list_resources_for_tag_option
    calls:
      - action: list_resources_for_tag_option
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ResourceDetails }}'
      item:
        ARN: '{{ item.ARN }}'
        Description: '{{ item.Description }}'
  # ── ListServiceActionsForProvisioningArtifact ──
  - discovery_id: aws.servicecatalog.list_service_actions_for_provisioning_artifact
    calls:
      - action: list_service_actions_for_provisioning_artifact
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ServiceActionSummaries }}'
      item:
        DefinitionType: '{{ item.DefinitionType }}'
        Description: '{{ item.Description }}'
  # ── ListStackInstancesForProvisionedProduct ──
  - discovery_id: aws.servicecatalog.list_stack_instances_for_provisioned_product
    for_each: aws.servicecatalog.list_record_history
    calls:
      - action: list_stack_instances_for_provisioned_product
        params:
          ProvisionedProductId: '{{ item.ProvisionedProductId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.StackInstances }}'
      item:
        Region: '{{ item.Region }}'
        Account: '{{ item.Account }}'
        StackInstanceStatus: '{{ item.StackInstanceStatus }}'
