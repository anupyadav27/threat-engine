# ============================================================
# Discovery YAML — kinesis (AWS)
# Generated: 2026-02-21T04:56:58Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: kinesis
services:
  client: kinesis
  module: boto3.client
discovery:
  # ── DescribeAccountSettings ──
  - discovery_id: aws.kinesis.describe_account_settings
    calls:
      - action: describe_account_settings
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.MinimumThroughputBillingCommitment }}'
      item:
        Status: '{{ item.Status }}'
        EarliestAllowedEndAt: '{{ item.EarliestAllowedEndAt }}'
        EndedAt: '{{ item.EndedAt }}'
        MinimumThroughputBillingCommitment: '{{ item.MinimumThroughputBillingCommitment }}'
        StartedAt: '{{ item.StartedAt }}'
  # ── DescribeLimits ──
  - discovery_id: aws.kinesis.describe_limits
    calls:
      - action: describe_limits
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ShardLimit }}'
      item:
        OnDemandStreamCount: '{{ item.OnDemandStreamCount }}'
        OnDemandStreamCountLimit: '{{ item.OnDemandStreamCountLimit }}'
        ShardLimit: '{{ item.ShardLimit }}'
  # ── DescribeStream ──
  - discovery_id: aws.kinesis.describe_stream
    calls:
      - action: describe_stream
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.StreamDescription }}'
      item:
        EncryptionType: '{{ item.EncryptionType }}'
        EnhancedMonitoring: '{{ item.EnhancedMonitoring }}'
        HasMoreShards: '{{ item.HasMoreShards }}'
        KeyId: '{{ item.KeyId }}'
        RetentionPeriodHours: '{{ item.RetentionPeriodHours }}'
        Shards: '{{ item.Shards }}'
        StreamARN: '{{ item.StreamARN }}'
        StreamCreationTimestamp: '{{ item.StreamCreationTimestamp }}'
        StreamDescription: '{{ item.StreamDescription }}'
        StreamModeDetails: '{{ item.StreamModeDetails }}'
        StreamName: '{{ item.StreamName }}'
        StreamStatus: '{{ item.StreamStatus }}'
  # ── DescribeStreamConsumer ──
  - discovery_id: aws.kinesis.describe_stream_consumer
    calls:
      - action: describe_stream_consumer
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ConsumerDescription }}'
      item:
        ConsumerARN: '{{ item.ConsumerARN }}'
        ConsumerCreationTimestamp: '{{ item.ConsumerCreationTimestamp }}'
        ConsumerDescription: '{{ item.ConsumerDescription }}'
        ConsumerName: '{{ item.ConsumerName }}'
        ConsumerStatus: '{{ item.ConsumerStatus }}'
        StreamARN: '{{ item.StreamARN }}'
  # ── DescribeStreamSummary ──
  - discovery_id: aws.kinesis.describe_stream_summary
    calls:
      - action: describe_stream_summary
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.StreamDescriptionSummary }}'
      item:
        EncryptionType: '{{ item.EncryptionType }}'
        ConsumerCount: '{{ item.ConsumerCount }}'
        EnhancedMonitoring: '{{ item.EnhancedMonitoring }}'
        KeyId: '{{ item.KeyId }}'
        MaxRecordSizeInKiB: '{{ item.MaxRecordSizeInKiB }}'
        OpenShardCount: '{{ item.OpenShardCount }}'
        RetentionPeriodHours: '{{ item.RetentionPeriodHours }}'
        StreamARN: '{{ item.StreamARN }}'
        StreamCreationTimestamp: '{{ item.StreamCreationTimestamp }}'
        StreamDescriptionSummary: '{{ item.StreamDescriptionSummary }}'
        StreamModeDetails: '{{ item.StreamModeDetails }}'
        StreamName: '{{ item.StreamName }}'
        StreamStatus: '{{ item.StreamStatus }}'
        WarmThroughput: '{{ item.WarmThroughput }}'
  # ── ListShards ──
  - discovery_id: aws.kinesis.list_shards
    calls:
      - action: list_shards
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Shards }}'
      item:
        AdjacentParentShardId: '{{ item.AdjacentParentShardId }}'
        HashKeyRange: '{{ item.HashKeyRange }}'
        ParentShardId: '{{ item.ParentShardId }}'
        SequenceNumberRange: '{{ item.SequenceNumberRange }}'
        ShardId: '{{ item.ShardId }}'
  # ── ListStreams ──
  - discovery_id: aws.kinesis.list_streams
    calls:
      - action: list_streams
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.StreamNames }}'
  # ── ListTagsForStream ──
  - discovery_id: aws.kinesis.list_tags_for_stream
    calls:
      - action: list_tags_for_stream
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Tags }}'
      item:
        Key: '{{ item.Key }}'
        Value: '{{ item.Value }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetRecords ──
  - discovery_id: aws.kinesis.get_records
    calls:
      - action: get_records
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Records }}'
      item:
        EncryptionType: '{{ item.EncryptionType }}'
        ApproximateArrivalTimestamp: '{{ item.ApproximateArrivalTimestamp }}'
        Data: '{{ item.Data }}'
        PartitionKey: '{{ item.PartitionKey }}'
        Records: '{{ item.Records }}'
        SequenceNumber: '{{ item.SequenceNumber }}'
  # ── GetResourcePolicy ──
  - discovery_id: aws.kinesis.get_resource_policy
    calls:
      - action: get_resource_policy
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Policy }}'
      item:
        Policy: '{{ item.Policy }}'
        Statement: '{{ item.Statement }}'
        Version: '{{ item.Version }}'
  # ── GetShardIterator ──
  - discovery_id: aws.kinesis.get_shard_iterator
    calls:
      - action: get_shard_iterator
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        ShardIterator: '{{ response.ShardIterator }}'
  # ── ListStreamConsumers ──
  - discovery_id: aws.kinesis.list_stream_consumers
    for_each: aws.kinesis.describe_stream
    calls:
      - action: list_stream_consumers
        params:
          StreamARN: '{{ item.StreamARN }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Consumers }}'
      item:
        ConsumerARN: '{{ item.ConsumerARN }}'
        ConsumerCreationTimestamp: '{{ item.ConsumerCreationTimestamp }}'
        ConsumerName: '{{ item.ConsumerName }}'
        ConsumerStatus: '{{ item.ConsumerStatus }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.kinesis.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Tags }}'
      item:
        Key: '{{ item.Key }}'
        Value: '{{ item.Value }}'
