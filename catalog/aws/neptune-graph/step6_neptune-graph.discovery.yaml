# ============================================================
# Discovery YAML — neptune-graph (AWS)
# Generated: 2026-02-21T04:56:59Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: neptune-graph
services:
  client: neptune-graph
  module: boto3.client
discovery:
  # ── ListExportTasks ──
  - discovery_id: aws.neptune-graph.list_export_tasks
    calls:
      - action: list_export_tasks
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.tasks }}'
      item:
        destination: '{{ item.destination }}'
        format: '{{ item.format }}'
        graphId: '{{ item.graphId }}'
        kmsKeyIdentifier: '{{ item.kmsKeyIdentifier }}'
        parquetType: '{{ item.parquetType }}'
        roleArn: '{{ item.roleArn }}'
        status: '{{ item.status }}'
        statusReason: '{{ item.statusReason }}'
        taskId: '{{ item.taskId }}'
  # ── ListGraphSnapshots ──
  - discovery_id: aws.neptune-graph.list_graph_snapshots
    calls:
      - action: list_graph_snapshots
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.graphSnapshots }}'
      item:
        arn: '{{ item.arn }}'
        createTime: '{{ item.createTime }}'
        id: '{{ item.id }}'
        kmsKeyIdentifier: '{{ item.kmsKeyIdentifier }}'
        name: '{{ item.name }}'
        snapshotCreateTime: '{{ item.snapshotCreateTime }}'
        sourceGraphId: '{{ item.sourceGraphId }}'
        status: '{{ item.status }}'
  # ── ListGraphs ──
  - discovery_id: aws.neptune-graph.list_graphs
    calls:
      - action: list_graphs
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.graphs }}'
      item:
        arn: '{{ item.arn }}'
        deletionProtection: '{{ item.deletionProtection }}'
        endpoint: '{{ item.endpoint }}'
        id: '{{ item.id }}'
        kmsKeyIdentifier: '{{ item.kmsKeyIdentifier }}'
        name: '{{ item.name }}'
        provisionedMemory: '{{ item.provisionedMemory }}'
        publicConnectivity: '{{ item.publicConnectivity }}'
        replicaCount: '{{ item.replicaCount }}'
        status: '{{ item.status }}'
  # ── ListImportTasks ──
  - discovery_id: aws.neptune-graph.list_import_tasks
    calls:
      - action: list_import_tasks
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.tasks }}'
      item:
        format: '{{ item.format }}'
        graphId: '{{ item.graphId }}'
        parquetType: '{{ item.parquetType }}'
        roleArn: '{{ item.roleArn }}'
        source: '{{ item.source }}'
        status: '{{ item.status }}'
        taskId: '{{ item.taskId }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetExportTask ──
  - discovery_id: aws.neptune-graph.get_export_task
    calls:
      - action: get_export_task
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.exportTaskDetails }}'
      item:
        numEdgesWritten: '{{ item.numEdgesWritten }}'
        numVerticesWritten: '{{ item.numVerticesWritten }}'
        progressPercentage: '{{ item.progressPercentage }}'
        startTime: '{{ item.startTime }}'
        timeElapsedSeconds: '{{ item.timeElapsedSeconds }}'
  # ── GetGraph ──
  - discovery_id: aws.neptune-graph.get_graph
    calls:
      - action: get_graph
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.vectorSearchConfiguration }}'
      item:
        dimension: '{{ item.dimension }}'
  # ── GetGraphSnapshot ──
  - discovery_id: aws.neptune-graph.get_graph_snapshot
    calls:
      - action: get_graph_snapshot
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        arn: '{{ response.arn }}'
        id: '{{ response.id }}'
        kmsKeyIdentifier: '{{ response.kmsKeyIdentifier }}'
        name: '{{ response.name }}'
        snapshotCreateTime: '{{ response.snapshotCreateTime }}'
        sourceGraphId: '{{ response.sourceGraphId }}'
        status: '{{ response.status }}'
  # ── GetGraphSummary ──
  - discovery_id: aws.neptune-graph.get_graph_summary
    calls:
      - action: get_graph_summary
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.graphSummary }}'
      item:
        edgeLabels: '{{ item.edgeLabels }}'
        edgeProperties: '{{ item.edgeProperties }}'
        edgeStructures: '{{ item.edgeStructures }}'
        nodeLabels: '{{ item.nodeLabels }}'
        nodeProperties: '{{ item.nodeProperties }}'
        nodeStructures: '{{ item.nodeStructures }}'
        numEdgeLabels: '{{ item.numEdgeLabels }}'
        numEdgeProperties: '{{ item.numEdgeProperties }}'
        numEdges: '{{ item.numEdges }}'
        numNodeLabels: '{{ item.numNodeLabels }}'
        numNodeProperties: '{{ item.numNodeProperties }}'
        numNodes: '{{ item.numNodes }}'
        totalEdgePropertyValues: '{{ item.totalEdgePropertyValues }}'
        totalNodePropertyValues: '{{ item.totalNodePropertyValues }}'
  # ── GetImportTask ──
  - discovery_id: aws.neptune-graph.get_import_task
    calls:
      - action: get_import_task
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.importOptions }}'
      item:
        neptune: '{{ item.neptune }}'
  # ── GetPrivateGraphEndpoint ──
  - discovery_id: aws.neptune-graph.get_private_graph_endpoint
    calls:
      - action: get_private_graph_endpoint
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.subnetIds }}'
  # ── GetQuery ──
  - discovery_id: aws.neptune-graph.get_query
    calls:
      - action: get_query
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        elapsed: '{{ response.elapsed }}'
        id: '{{ response.id }}'
        queryString: '{{ response.queryString }}'
        state: '{{ response.state }}'
        waited: '{{ response.waited }}'
  # ── ListPrivateGraphEndpoints ──
  - discovery_id: aws.neptune-graph.list_private_graph_endpoints
    calls:
      - action: list_private_graph_endpoints
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.privateGraphEndpoints }}'
      item:
        status: '{{ item.status }}'
        subnetIds: '{{ item.subnetIds }}'
        vpcEndpointId: '{{ item.vpcEndpointId }}'
        vpcId: '{{ item.vpcId }}'
  # ── ListQueries ──
  - discovery_id: aws.neptune-graph.list_queries
    calls:
      - action: list_queries
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.queries }}'
      item:
        elapsed: '{{ item.elapsed }}'
        id: '{{ item.id }}'
        queryString: '{{ item.queryString }}'
        state: '{{ item.state }}'
        waited: '{{ item.waited }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.neptune-graph.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        tags: '{{ response.tags }}'
