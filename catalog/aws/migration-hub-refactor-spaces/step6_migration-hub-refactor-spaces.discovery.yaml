        Code: '{{ item.Code }}'
        Message: '{{ item.Message }}'
        ResourceIdentifier: '{{ item.ResourceIdentifier }}'
        ResourceType: '{{ item.ResourceType }}'
  # ── GetResourcePolicy ──
  - discovery_id: aws.migration-hub-refactor-spaces.get_resource_policy
    calls:
      - action: get_resource_policy
        save_as: response
