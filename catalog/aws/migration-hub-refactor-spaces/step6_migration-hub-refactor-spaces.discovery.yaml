version: '1.0'
provider: aws
service: migration-hub-refactor-spaces
services:
  client: migration-hub-refactor-spaces
  module: boto3.client
discovery:
  # ── ListEnvironments ──
  - discovery_id: aws.migration-hub-refactor-spaces.list_environments
    calls:
      - action: list_environments
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.EnvironmentSummaryList }}'
      item:
        Arn: '{{ item.Arn }}'
        Name: '{{ item.Name }}'
        State: '{{ item.State }}'
        Tags: '{{ item.Tags }}'
        CreatedTime: '{{ item.CreatedTime }}'
        Description: '{{ item.Description }}'
        EnvironmentId: '{{ item.EnvironmentId }}'
        Error: '{{ item.Error }}'
        LastUpdatedTime: '{{ item.LastUpdatedTime }}'
        NetworkFabricType: '{{ item.NetworkFabricType }}'
        OwnerAccountId: '{{ item.OwnerAccountId }}'
        TransitGatewayId: '{{ item.TransitGatewayId }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetApplication ──
  - discovery_id: aws.migration-hub-refactor-spaces.get_application
    calls:
      - action: get_application
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ApiGatewayProxy }}'
      item:
        ApiGatewayId: '{{ item.ApiGatewayId }}'
        EndpointType: '{{ item.EndpointType }}'
        NlbArn: '{{ item.NlbArn }}'
        NlbName: '{{ item.NlbName }}'
        ProxyUrl: '{{ item.ProxyUrl }}'
        StageName: '{{ item.StageName }}'
        VpcLinkId: '{{ item.VpcLinkId }}'
