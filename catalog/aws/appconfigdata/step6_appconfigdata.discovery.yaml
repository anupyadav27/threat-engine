# ============================================================
# Discovery YAML — appconfigdata (AWS)
# Generated: 2026-02-21T04:56:57Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: appconfigdata
services:
  client: appconfigdata
  module: boto3.client
discovery:
  # ── Dependent read operations (require identifiers) ──
  # ── GetLatestConfiguration ──
  - discovery_id: aws.appconfigdata.get_latest_configuration
    calls:
      - action: get_latest_configuration
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        Configuration: '{{ response.Configuration }}'
        ContentType: '{{ response.ContentType }}'
        NextPollConfigurationToken: '{{ response.NextPollConfigurationToken }}'
        NextPollIntervalInSeconds: '{{ response.NextPollIntervalInSeconds }}'
        VersionLabel: '{{ response.VersionLabel }}'
