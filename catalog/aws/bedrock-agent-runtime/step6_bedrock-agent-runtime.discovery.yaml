# ============================================================
# Discovery YAML — bedrock-agent-runtime (AWS)
# Generated: 2026-02-21T04:56:57Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: bedrock-agent-runtime
services:
  client: bedrock-agent-runtime
  module: boto3.client
discovery:
  # ── ListSessions ──
  - discovery_id: aws.bedrock-agent-runtime.list_sessions
    calls:
      - action: list_sessions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.sessionSummaries }}'
      item:
        createdAt: '{{ item.createdAt }}'
        lastUpdatedAt: '{{ item.lastUpdatedAt }}'
        sessionArn: '{{ item.sessionArn }}'
        sessionId: '{{ item.sessionId }}'
        sessionStatus: '{{ item.sessionStatus }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetAgentMemory ──
  - discovery_id: aws.bedrock-agent-runtime.get_agent_memory
    calls:
      - action: get_agent_memory
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.memoryContents }}'
      item:
        sessionSummary: '{{ item.sessionSummary }}'
  # ── GetExecutionFlowSnapshot ──
  - discovery_id: aws.bedrock-agent-runtime.get_execution_flow_snapshot
    calls:
      - action: get_execution_flow_snapshot
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.flowIdentifier }}'
      item:
        definition: '{{ item.definition }}'
  # ── GetFlowExecution ──
  - discovery_id: aws.bedrock-agent-runtime.get_flow_execution
    calls:
      - action: get_flow_execution
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.errors }}'
      item:
        error: '{{ item.error }}'
        errors: '{{ item.errors }}'
        message: '{{ item.message }}'
        nodeName: '{{ item.nodeName }}'
  # ── GetInvocationStep ──
  - discovery_id: aws.bedrock-agent-runtime.get_invocation_step
    calls:
      - action: get_invocation_step
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.invocationStep }}'
      item:
        invocationId: '{{ item.invocationId }}'
        invocationStepId: '{{ item.invocationStepId }}'
        invocationStepTime: '{{ item.invocationStepTime }}'
        payload: '{{ item.payload }}'
        sessionId: '{{ item.sessionId }}'
  # ── GetSession ──
  - discovery_id: aws.bedrock-agent-runtime.get_session
    calls:
      - action: get_session
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        createdAt: '{{ response.createdAt }}'
        encryptionKeyArn: '{{ response.encryptionKeyArn }}'
        lastUpdatedAt: '{{ response.lastUpdatedAt }}'
        sessionArn: '{{ response.sessionArn }}'
        sessionId: '{{ response.sessionId }}'
        sessionMetadata: '{{ response.sessionMetadata }}'
        sessionStatus: '{{ response.sessionStatus }}'
  # ── ListFlowExecutionEvents ──
  - discovery_id: aws.bedrock-agent-runtime.list_flow_execution_events
    calls:
      - action: list_flow_execution_events
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.flowExecutionEvents }}'
      item:
        conditionResultEvent: '{{ item.conditionResultEvent }}'
        errors: '{{ item.errors }}'
        flowFailureEvent: '{{ item.flowFailureEvent }}'
        flowInputEvent: '{{ item.flowInputEvent }}'
        flowOutputEvent: '{{ item.flowOutputEvent }}'
        nodeActionEvent: '{{ item.nodeActionEvent }}'
        nodeDependencyEvent: '{{ item.nodeDependencyEvent }}'
        nodeFailureEvent: '{{ item.nodeFailureEvent }}'
        nodeInputEvent: '{{ item.nodeInputEvent }}'
        nodeOutputEvent: '{{ item.nodeOutputEvent }}'
  # ── ListFlowExecutions ──
  - discovery_id: aws.bedrock-agent-runtime.list_flow_executions
    calls:
      - action: list_flow_executions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.flowExecutionSummaries }}'
      item:
        createdAt: '{{ item.createdAt }}'
        endedAt: '{{ item.endedAt }}'
        executionArn: '{{ item.executionArn }}'
        flowAliasIdentifier: '{{ item.flowAliasIdentifier }}'
        flowIdentifier: '{{ item.flowIdentifier }}'
        flowVersion: '{{ item.flowVersion }}'
        status: '{{ item.status }}'
  # ── ListInvocationSteps ──
  - discovery_id: aws.bedrock-agent-runtime.list_invocation_steps
    calls:
      - action: list_invocation_steps
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.invocationStepSummaries }}'
      item:
        invocationId: '{{ item.invocationId }}'
        invocationStepId: '{{ item.invocationStepId }}'
        invocationStepTime: '{{ item.invocationStepTime }}'
        sessionId: '{{ item.sessionId }}'
  # ── ListInvocations ──
  - discovery_id: aws.bedrock-agent-runtime.list_invocations
    calls:
      - action: list_invocations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.invocationSummaries }}'
      item:
        createdAt: '{{ item.createdAt }}'
        invocationId: '{{ item.invocationId }}'
        sessionId: '{{ item.sessionId }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.bedrock-agent-runtime.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        tags: '{{ response.tags }}'
