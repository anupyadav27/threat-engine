          Name: '{{ item.Name }}'
          Scope: '{{ item.Scope }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Rules }}'
      item:
        Name: '{{ item.Name }}'
        Action: '{{ item.Action }}'
