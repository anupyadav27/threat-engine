# ============================================================
# Discovery YAML — identitystore (AWS)
# Generated: 2026-02-21T04:56:58Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: identitystore
services:
  client: identitystore
  module: boto3.client
discovery:
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeGroup ──
  - discovery_id: aws.identitystore.describe_group
    calls:
      - action: describe_group
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ExternalIds }}'
      item:
        Id: '{{ item.Id }}'
        Issuer: '{{ item.Issuer }}'
  # ── DescribeGroupMembership ──
  - discovery_id: aws.identitystore.describe_group_membership
    calls:
      - action: describe_group_membership
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.MemberId }}'
      item:
        UserId: '{{ item.UserId }}'
  # ── DescribeUser ──
  - discovery_id: aws.identitystore.describe_user
    calls:
      - action: describe_user
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ExternalIds }}'
      item:
        Id: '{{ item.Id }}'
        Issuer: '{{ item.Issuer }}'
  # ── GetGroupId ──
  - discovery_id: aws.identitystore.get_group_id
    calls:
      - action: get_group_id
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        GroupId: '{{ response.GroupId }}'
        IdentityStoreId: '{{ response.IdentityStoreId }}'
  # ── GetGroupMembershipId ──
  - discovery_id: aws.identitystore.get_group_membership_id
    calls:
      - action: get_group_membership_id
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        IdentityStoreId: '{{ response.IdentityStoreId }}'
        MembershipId: '{{ response.MembershipId }}'
  # ── GetUserId ──
  - discovery_id: aws.identitystore.get_user_id
    calls:
      - action: get_user_id
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        IdentityStoreId: '{{ response.IdentityStoreId }}'
        UserId: '{{ response.UserId }}'
  # ── ListGroupMemberships ──
  - discovery_id: aws.identitystore.list_group_memberships
    calls:
      - action: list_group_memberships
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.GroupMemberships }}'
      item:
        CreatedAt: '{{ item.CreatedAt }}'
        CreatedBy: '{{ item.CreatedBy }}'
        GroupId: '{{ item.GroupId }}'
        IdentityStoreId: '{{ item.IdentityStoreId }}'
        MemberId: '{{ item.MemberId }}'
        MembershipId: '{{ item.MembershipId }}'
        UpdatedAt: '{{ item.UpdatedAt }}'
        UpdatedBy: '{{ item.UpdatedBy }}'
  # ── ListGroupMembershipsForMember ──
  - discovery_id: aws.identitystore.list_group_memberships_for_member
    calls:
      - action: list_group_memberships_for_member
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.GroupMemberships }}'
      item:
        CreatedAt: '{{ item.CreatedAt }}'
        CreatedBy: '{{ item.CreatedBy }}'
        GroupId: '{{ item.GroupId }}'
        IdentityStoreId: '{{ item.IdentityStoreId }}'
        MemberId: '{{ item.MemberId }}'
        MembershipId: '{{ item.MembershipId }}'
        UpdatedAt: '{{ item.UpdatedAt }}'
        UpdatedBy: '{{ item.UpdatedBy }}'
  # ── ListGroups ──
  - discovery_id: aws.identitystore.list_groups
    calls:
      - action: list_groups
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Groups }}'
      item:
        CreatedAt: '{{ item.CreatedAt }}'
        CreatedBy: '{{ item.CreatedBy }}'
        Description: '{{ item.Description }}'
        DisplayName: '{{ item.DisplayName }}'
        ExternalIds: '{{ item.ExternalIds }}'
        GroupId: '{{ item.GroupId }}'
        IdentityStoreId: '{{ item.IdentityStoreId }}'
        UpdatedAt: '{{ item.UpdatedAt }}'
        UpdatedBy: '{{ item.UpdatedBy }}'
  # ── ListUsers ──
  - discovery_id: aws.identitystore.list_users
    calls:
      - action: list_users
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Users }}'
      item:
        Name: '{{ item.Name }}'
        Addresses: '{{ item.Addresses }}'
        Birthdate: '{{ item.Birthdate }}'
        CreatedAt: '{{ item.CreatedAt }}'
        CreatedBy: '{{ item.CreatedBy }}'
        DisplayName: '{{ item.DisplayName }}'
        Emails: '{{ item.Emails }}'
        ExternalIds: '{{ item.ExternalIds }}'
        IdentityStoreId: '{{ item.IdentityStoreId }}'
        Locale: '{{ item.Locale }}'
        NickName: '{{ item.NickName }}'
        PhoneNumbers: '{{ item.PhoneNumbers }}'
        Photos: '{{ item.Photos }}'
        PreferredLanguage: '{{ item.PreferredLanguage }}'
        ProfileUrl: '{{ item.ProfileUrl }}'
        Timezone: '{{ item.Timezone }}'
        Title: '{{ item.Title }}'
        UpdatedAt: '{{ item.UpdatedAt }}'
        UpdatedBy: '{{ item.UpdatedBy }}'
        UserId: '{{ item.UserId }}'
        UserName: '{{ item.UserName }}'
        UserStatus: '{{ item.UserStatus }}'
        UserType: '{{ item.UserType }}'
        Website: '{{ item.Website }}'
