# ============================================================
# Discovery YAML — iot-jobs-data (AWS)
# Generated: 2026-02-21T04:56:58Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: iot-jobs-data
services:
  client: iot-jobs-data
  module: boto3.client
discovery:
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeJobExecution ──
  - discovery_id: aws.iot-jobs-data.describe_job_execution
    calls:
      - action: describe_job_execution
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.execution }}'
      item:
        approximateSecondsBeforeTimedOut: '{{ item.approximateSecondsBeforeTimedOut }}'
        execution: '{{ item.execution }}'
        executionNumber: '{{ item.executionNumber }}'
        jobDocument: '{{ item.jobDocument }}'
        jobId: '{{ item.jobId }}'
        lastUpdatedAt: '{{ item.lastUpdatedAt }}'
        queuedAt: '{{ item.queuedAt }}'
        startedAt: '{{ item.startedAt }}'
        status: '{{ item.status }}'
        statusDetails: '{{ item.statusDetails }}'
        thingName: '{{ item.thingName }}'
        versionNumber: '{{ item.versionNumber }}'
  # ── GetPendingJobExecutions ──
  - discovery_id: aws.iot-jobs-data.get_pending_job_executions
    calls:
      - action: get_pending_job_executions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.inProgressJobs }}'
      item:
        executionNumber: '{{ item.executionNumber }}'
        jobId: '{{ item.jobId }}'
        lastUpdatedAt: '{{ item.lastUpdatedAt }}'
        queuedAt: '{{ item.queuedAt }}'
        startedAt: '{{ item.startedAt }}'
        versionNumber: '{{ item.versionNumber }}'
