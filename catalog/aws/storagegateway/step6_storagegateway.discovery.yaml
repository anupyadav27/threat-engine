  - discovery_id: aws.storagegateway.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Tags }}'
      item:
        Key: '{{ item.Key }}'
        Value: '{{ item.Value }}'
  # ── ListVolumeInitiators ──
  - discovery_id: aws.storagegateway.list_volume_initiators
    calls:
      - action: list_volume_initiators
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Initiators }}'
  # ── ListVolumeRecoveryPoints ──
  - discovery_id: aws.storagegateway.list_volume_recovery_points
    for_each: aws.storagegateway.list_automatic_tape_creation_policies
    calls:
      - action: list_volume_recovery_points
        params:
          GatewayARN: '{{ item.GatewayARN }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.VolumeRecoveryPointInfos }}'
      item:
        VolumeARN: '{{ item.VolumeARN }}'
        VolumeRecoveryPointTime: '{{ item.VolumeRecoveryPointTime }}'
        VolumeSizeInBytes: '{{ item.VolumeSizeInBytes }}'
        VolumeUsageInBytes: '{{ item.VolumeUsageInBytes }}'
