# ============================================================
# Discovery YAML — inspector2 (AWS)
# Generated: 2026-02-21T04:56:58Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: inspector2
services:
  client: inspector2
  module: boto3.client
discovery:
  # ── DescribeOrganizationConfiguration ──
  - discovery_id: aws.inspector2.describe_organization_configuration
    calls:
      - action: describe_organization_configuration
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.autoEnable }}'
      item:
        autoEnable: '{{ item.autoEnable }}'
        codeRepository: '{{ item.codeRepository }}'
        ec2: '{{ item.ec2 }}'
        ecr: '{{ item.ecr }}'
        lambda: '{{ item.lambda }}'
        lambdaCode: '{{ item.lambdaCode }}'
        maxAccountLimitReached: '{{ item.maxAccountLimitReached }}'
  # ── GetConfiguration ──
  - discovery_id: aws.inspector2.get_configuration
    calls:
      - action: get_configuration
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ecrConfiguration }}'
      item:
        Status: '{{ item.Status }}'
        Enabled: '{{ item.Enabled }}'
        ec2Configuration: '{{ item.ec2Configuration }}'
        ecrConfiguration: '{{ item.ecrConfiguration }}'
        rescanDurationState: '{{ item.rescanDurationState }}'
  # ── GetDelegatedAdminAccount ──
  - discovery_id: aws.inspector2.get_delegated_admin_account
    calls:
      - action: get_delegated_admin_account
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.delegatedAdmin }}'
      item:
        accountId: '{{ item.accountId }}'
        delegatedAdmin: '{{ item.delegatedAdmin }}'
        relationshipStatus: '{{ item.relationshipStatus }}'
  # ── GetEc2DeepInspectionConfiguration ──
  - discovery_id: aws.inspector2.get_ec2_deep_inspection_configuration
    calls:
      - action: get_ec2_deep_inspection_configuration
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.packagePaths }}'
      item:
        orgPackagePaths: '{{ item.orgPackagePaths }}'
        packagePaths: '{{ item.packagePaths }}'
  # ── GetFindingsReportStatus ──
  - discovery_id: aws.inspector2.get_findings_report_status
    calls:
      - action: get_findings_report_status
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.destination }}'
      item:
        bucketName: '{{ item.bucketName }}'
        destination: '{{ item.destination }}'
        errorCode: '{{ item.errorCode }}'
        filterCriteria: '{{ item.filterCriteria }}'
        keyPrefix: '{{ item.keyPrefix }}'
        kmsKeyArn: '{{ item.kmsKeyArn }}'
        reportId: '{{ item.reportId }}'
  # ── ListAccountPermissions ──
  - discovery_id: aws.inspector2.list_account_permissions
    calls:
      - action: list_account_permissions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.permissions }}'
      item:
        operation: '{{ item.operation }}'
        service: '{{ item.service }}'
  # ── ListCisScanConfigurations ──
  - discovery_id: aws.inspector2.list_cis_scan_configurations
    calls:
      - action: list_cis_scan_configurations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.scanConfigurations }}'
      item:
        ec2Configuration: '{{ item.ec2Configuration }}'
        ecrConfiguration: '{{ item.ecrConfiguration }}'
        ownerId: '{{ item.ownerId }}'
        scanConfigurationArn: '{{ item.scanConfigurationArn }}'
        scanName: '{{ item.scanName }}'
        schedule: '{{ item.schedule }}'
        securityLevel: '{{ item.securityLevel }}'
        tags: '{{ item.tags }}'
        targets: '{{ item.targets }}'
  # ── ListCisScans ──
  - discovery_id: aws.inspector2.list_cis_scans
    calls:
      - action: list_cis_scans
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.scans }}'
      item:
        failedChecks: '{{ item.failedChecks }}'
        scanArn: '{{ item.scanArn }}'
        scanConfigurationArn: '{{ item.scanConfigurationArn }}'
        scanDate: '{{ item.scanDate }}'
        scanName: '{{ item.scanName }}'
        scheduledBy: '{{ item.scheduledBy }}'
        securityLevel: '{{ item.securityLevel }}'
        status: '{{ item.status }}'
        targets: '{{ item.targets }}'
        totalChecks: '{{ item.totalChecks }}'
  # ── ListCodeSecurityIntegrations ──
  - discovery_id: aws.inspector2.list_code_security_integrations
    calls:
      - action: list_code_security_integrations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.integrations }}'
      item:
        createdOn: '{{ item.createdOn }}'
        integrationArn: '{{ item.integrationArn }}'
        lastUpdateOn: '{{ item.lastUpdateOn }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
        statusReason: '{{ item.statusReason }}'
        tags: '{{ item.tags }}'
        type: '{{ item.type }}'
  # ── ListCodeSecurityScanConfigurations ──
  - discovery_id: aws.inspector2.list_code_security_scan_configurations
    calls:
      - action: list_code_security_scan_configurations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.configurations }}'
      item:
        DestinationArn: '{{ item.DestinationArn }}'
        Format: '{{ item.Format }}'
        Level: '{{ item.Level }}'
        configuration: '{{ item.configuration }}'
        continuousIntegrationScanSupportedEvents: '{{ item.continuousIntegrationScanSupportedEvents }}'
        frequencyExpression: '{{ item.frequencyExpression }}'
        name: '{{ item.name }}'
        ownerAccountId: '{{ item.ownerAccountId }}'
        periodicScanFrequency: '{{ item.periodicScanFrequency }}'
        ruleSetCategories: '{{ item.ruleSetCategories }}'
        scanConfigurationArn: '{{ item.scanConfigurationArn }}'
        scopeSettings: '{{ item.scopeSettings }}'
        tags: '{{ item.tags }}'
  # ── ListCoverage ──
  - discovery_id: aws.inspector2.list_coverage
    calls:
      - action: list_coverage
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.coveredResources }}'
      item:
        accountId: '{{ item.accountId }}'
        lastScannedAt: '{{ item.lastScannedAt }}'
        resourceId: '{{ item.resourceId }}'
        resourceMetadata: '{{ item.resourceMetadata }}'
        resourceType: '{{ item.resourceType }}'
        scanMode: '{{ item.scanMode }}'
        scanStatus: '{{ item.scanStatus }}'
        scanType: '{{ item.scanType }}'
  # ── ListCoverageStatistics ──
  - discovery_id: aws.inspector2.list_coverage_statistics
    calls:
      - action: list_coverage_statistics
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.countsByGroup }}'
      item:
        count: '{{ item.count }}'
        groupKey: '{{ item.groupKey }}'
  # ── ListDelegatedAdminAccounts ──
  - discovery_id: aws.inspector2.list_delegated_admin_accounts
    calls:
      - action: list_delegated_admin_accounts
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.delegatedAdminAccounts }}'
      item:
        accountId: '{{ item.accountId }}'
        delegatedAdmin: '{{ item.delegatedAdmin }}'
        status: '{{ item.status }}'
  # ── ListFilters ──
  - discovery_id: aws.inspector2.list_filters
    calls:
      - action: list_filters
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.filters }}'
      item:
        action: '{{ item.action }}'
        arn: '{{ item.arn }}'
        createdAt: '{{ item.createdAt }}'
        criteria: '{{ item.criteria }}'
        filterCriteria: '{{ item.filterCriteria }}'
        name: '{{ item.name }}'
        ownerId: '{{ item.ownerId }}'
        reason: '{{ item.reason }}'
        tags: '{{ item.tags }}'
        updatedAt: '{{ item.updatedAt }}'
  # ── ListFindings ──
  - discovery_id: aws.inspector2.list_findings
    calls:
      - action: list_findings
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.findings }}'
      item:
        awsAccountId: '{{ item.awsAccountId }}'
        codeVulnerabilityDetails: '{{ item.codeVulnerabilityDetails }}'
        exploitAvailable: '{{ item.exploitAvailable }}'
        exploitabilityDetails: '{{ item.exploitabilityDetails }}'
        findingArn: '{{ item.findingArn }}'
        firstObservedAt: '{{ item.firstObservedAt }}'
        fixAvailable: '{{ item.fixAvailable }}'
        inspectorScore: '{{ item.inspectorScore }}'
        inspectorScoreDetails: '{{ item.inspectorScoreDetails }}'
        lastObservedAt: '{{ item.lastObservedAt }}'
        networkReachabilityDetails: '{{ item.networkReachabilityDetails }}'
        packageVulnerabilityDetails: '{{ item.packageVulnerabilityDetails }}'
        remediation: '{{ item.remediation }}'
        resources: '{{ item.resources }}'
        severity: '{{ item.severity }}'
        status: '{{ item.status }}'
        title: '{{ item.title }}'
        type: '{{ item.type }}'
        updatedAt: '{{ item.updatedAt }}'
  # ── ListMembers ──
  - discovery_id: aws.inspector2.list_members
    calls:
      - action: list_members
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.members }}'
      item:
        accountId: '{{ item.accountId }}'
        delegatedAdminAccountId: '{{ item.delegatedAdminAccountId }}'
        member: '{{ item.member }}'
        relationshipStatus: '{{ item.relationshipStatus }}'
        updatedAt: '{{ item.updatedAt }}'
  # ── ListUsageTotals ──
  - discovery_id: aws.inspector2.list_usage_totals
    calls:
      - action: list_usage_totals
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.totals }}'
      item:
        accountId: '{{ item.accountId }}'
        usage: '{{ item.usage }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetCisScanReport ──
  - discovery_id: aws.inspector2.get_cis_scan_report
    for_each: aws.inspector2.list_cis_scans
    calls:
      - action: get_cis_scan_report
        params:
          scanArn: '{{ item.scanArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.url }}'
      item:
        url: '{{ item.url }}'
  # ── GetCisScanResultDetails ──
  - discovery_id: aws.inspector2.get_cis_scan_result_details
    for_each: aws.inspector2.get_delegated_admin_account
    calls:
      - action: get_cis_scan_result_details
        params:
          scanArn: '{{ item.scanArn }}'
          targetResourceId: '{{ item.targetResourceId }}'
          accountId: '{{ item.accountId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.scanResultDetails }}'
      item:
        accountId: '{{ item.accountId }}'
        checkDescription: '{{ item.checkDescription }}'
        checkId: '{{ item.checkId }}'
        findingArn: '{{ item.findingArn }}'
        level: '{{ item.level }}'
        platform: '{{ item.platform }}'
        remediation: '{{ item.remediation }}'
        scanArn: '{{ item.scanArn }}'
        status: '{{ item.status }}'
        statusReason: '{{ item.statusReason }}'
        targetResourceId: '{{ item.targetResourceId }}'
        title: '{{ item.title }}'
  # ── GetClustersForImage ──
  - discovery_id: aws.inspector2.get_clusters_for_image
    for_each: aws.inspector2.list_filters
    calls:
      - action: get_clusters_for_image
        params:
          filter: '{{ item.filter }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.cluster }}'
      item:
        cluster: '{{ item.cluster }}'
        clusterArn: '{{ item.clusterArn }}'
        clusterDetails: '{{ item.clusterDetails }}'
  # ── GetCodeSecurityIntegration ──
  - discovery_id: aws.inspector2.get_code_security_integration
    for_each: aws.inspector2.list_code_security_integrations
    calls:
      - action: get_code_security_integration
        params:
          integrationArn: '{{ item.integrationArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        authorizationUrl: '{{ response.authorizationUrl }}'
        createdOn: '{{ response.createdOn }}'
        integrationArn: '{{ response.integrationArn }}'
        lastUpdateOn: '{{ response.lastUpdateOn }}'
        name: '{{ response.name }}'
        status: '{{ response.status }}'
        statusReason: '{{ response.statusReason }}'
        tags: '{{ response.tags }}'
        type: '{{ response.type }}'
  # ── GetCodeSecurityScan ──
  - discovery_id: aws.inspector2.get_code_security_scan
    calls:
      - action: get_code_security_scan
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.resource }}'
      item:
        projectId: '{{ item.projectId }}'
  # ── GetCodeSecurityScanConfiguration ──
  - discovery_id: aws.inspector2.get_code_security_scan_configuration
    for_each: aws.inspector2.list_cis_scan_configurations
    calls:
      - action: get_code_security_scan_configuration
        params:
          scanConfigurationArn: '{{ item.scanConfigurationArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.configurations }}'
      item:
        configuration: '{{ item.configuration }}'
        continuousIntegrationScanConfiguration: '{{ item.continuousIntegrationScanConfiguration }}'
        periodicScanConfiguration: '{{ item.periodicScanConfiguration }}'
        ruleSetCategories: '{{ item.ruleSetCategories }}'
  # ── GetEncryptionKey ──
  - discovery_id: aws.inspector2.get_encryption_key
    calls:
      - action: get_encryption_key
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        kmsKeyId: '{{ response.kmsKeyId }}'
  # ── GetMember ──
  - discovery_id: aws.inspector2.get_member
    for_each: aws.inspector2.get_delegated_admin_account
    calls:
      - action: get_member
        params:
          accountId: '{{ item.accountId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.delegatedAdmin }}'
      item:
        accountId: '{{ item.accountId }}'
        delegatedAdminAccountId: '{{ item.delegatedAdminAccountId }}'
        member: '{{ item.member }}'
        relationshipStatus: '{{ item.relationshipStatus }}'
        updatedAt: '{{ item.updatedAt }}'
  # ── GetSbomExport ──
  - discovery_id: aws.inspector2.get_sbom_export
    for_each: aws.inspector2.get_findings_report_status
    calls:
      - action: get_sbom_export
        params:
          reportId: '{{ item.reportId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.destination }}'
      item:
        bucketName: '{{ item.bucketName }}'
        keyPrefix: '{{ item.keyPrefix }}'
        kmsKeyArn: '{{ item.kmsKeyArn }}'
  # ── ListCisScanResultsAggregatedByChecks ──
  - discovery_id: aws.inspector2.list_cis_scan_results_aggregated_by_checks
    for_each: aws.inspector2.list_cis_scans
    calls:
      - action: list_cis_scan_results_aggregated_by_checks
        params:
          scanArn: '{{ item.scanArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.checkAggregations }}'
      item:
        accountId: '{{ item.accountId }}'
        checkDescription: '{{ item.checkDescription }}'
        checkId: '{{ item.checkId }}'
        level: '{{ item.level }}'
        platform: '{{ item.platform }}'
        scanArn: '{{ item.scanArn }}'
        statusCounts: '{{ item.statusCounts }}'
        title: '{{ item.title }}'
  # ── ListCisScanResultsAggregatedByTargetResource ──
  - discovery_id: aws.inspector2.list_cis_scan_results_aggregated_by_target_resource
    for_each: aws.inspector2.list_cis_scans
    calls:
      - action: list_cis_scan_results_aggregated_by_target_resource
        params:
          scanArn: '{{ item.scanArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.targetResourceAggregations }}'
      item:
        accountId: '{{ item.accountId }}'
        platform: '{{ item.platform }}'
        scanArn: '{{ item.scanArn }}'
        statusCounts: '{{ item.statusCounts }}'
        targetResourceId: '{{ item.targetResourceId }}'
        targetResourceTags: '{{ item.targetResourceTags }}'
        targetStatus: '{{ item.targetStatus }}'
        targetStatusReason: '{{ item.targetStatusReason }}'
  # ── ListCodeSecurityScanConfigurationAssociations ──
  - discovery_id: aws.inspector2.list_code_security_scan_configuration_associations
    for_each: aws.inspector2.list_cis_scan_configurations
    calls:
      - action: list_code_security_scan_configuration_associations
        params:
          scanConfigurationArn: '{{ item.scanConfigurationArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.associations }}'
      item:
        resource: '{{ item.resource }}'
  # ── ListFindingAggregations ──
  - discovery_id: aws.inspector2.list_finding_aggregations
    calls:
      - action: list_finding_aggregations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.responses }}'
      item:
        accountAggregation: '{{ item.accountAggregation }}'
        amiAggregation: '{{ item.amiAggregation }}'
        awsEcrContainerAggregation: '{{ item.awsEcrContainerAggregation }}'
        codeRepositoryAggregation: '{{ item.codeRepositoryAggregation }}'
        ec2InstanceAggregation: '{{ item.ec2InstanceAggregation }}'
        findingTypeAggregation: '{{ item.findingTypeAggregation }}'
        imageLayerAggregation: '{{ item.imageLayerAggregation }}'
        lambdaFunctionAggregation: '{{ item.lambdaFunctionAggregation }}'
        lambdaLayerAggregation: '{{ item.lambdaLayerAggregation }}'
        packageAggregation: '{{ item.packageAggregation }}'
        repositoryAggregation: '{{ item.repositoryAggregation }}'
        titleAggregation: '{{ item.titleAggregation }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.inspector2.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        tags: '{{ response.tags }}'
  # ── SearchVulnerabilities ──
  - discovery_id: aws.inspector2.search_vulnerabilities
    for_each: aws.inspector2.list_filters
    calls:
      - action: search_vulnerabilities
        params:
          filterCriteria: '{{ item.filterCriteria }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.vulnerabilities }}'
