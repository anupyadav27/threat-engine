version: '1.0'
provider: aws
service: lakeformation
services:
  client: lakeformation
  module: boto3.client
discovery:
  # ── DescribeLakeFormationIdentityCenterConfiguration ──
  - discovery_id: aws.lakeformation.describe_lake_formation_identity_center_configuration
    calls:
      - action: describe_lake_formation_identity_center_configuration
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ShareRecipients }}'
      item:
        ApplicationArn: '{{ item.ApplicationArn }}'
        DataLakePrincipalIdentifier: '{{ item.DataLakePrincipalIdentifier }}'
        ExternalFiltering: '{{ item.ExternalFiltering }}'
        InstanceArn: '{{ item.InstanceArn }}'
        ResourceShare: '{{ item.ResourceShare }}'
        ServiceIntegrations: '{{ item.ServiceIntegrations }}'
        ShareRecipients: '{{ item.ShareRecipients }}'
  # ── GetDataLakePrincipal ──
  - discovery_id: aws.lakeformation.get_data_lake_principal
    calls:
      - action: get_data_lake_principal
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Identity }}'
      item:
        Identity: '{{ item.Identity }}'
  # ── GetDataLakeSettings ──
  - discovery_id: aws.lakeformation.get_data_lake_settings
    calls:
      - action: get_data_lake_settings
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.DataLakeSettings }}'
      item:
        AllowExternalDataFiltering: '{{ item.AllowExternalDataFiltering }}'
        AllowFullTableExternalDataAccess: '{{ item.AllowFullTableExternalDataAccess }}'
        AuthorizedSessionTagValueList: '{{ item.AuthorizedSessionTagValueList }}'
        CreateDatabaseDefaultPermissions: '{{ item.CreateDatabaseDefaultPermissions }}'
        CreateTableDefaultPermissions: '{{ item.CreateTableDefaultPermissions }}'
        DataLakeAdmins: '{{ item.DataLakeAdmins }}'
        DataLakeSettings: '{{ item.DataLakeSettings }}'
        DestinationArn: '{{ item.DestinationArn }}'
        Enabled: '{{ item.Enabled }}'
        ExternalDataFilteringAllowList: '{{ item.ExternalDataFilteringAllowList }}'
        Format: '{{ item.Format }}'
        Level: '{{ item.Level }}'
        Parameters: '{{ item.Parameters }}'
        ReadOnlyAdmins: '{{ item.ReadOnlyAdmins }}'
        TrustedResourceOwners: '{{ item.TrustedResourceOwners }}'
  # ── ListDataCellsFilter ──
  - discovery_id: aws.lakeformation.list_data_cells_filter
    calls:
      - action: list_data_cells_filter
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.DataCellsFilters }}'
      item:
        Name: '{{ item.Name }}'
        ColumnNames: '{{ item.ColumnNames }}'
        ColumnWildcard: '{{ item.ColumnWildcard }}'
        DatabaseName: '{{ item.DatabaseName }}'
        RowFilter: '{{ item.RowFilter }}'
        TableCatalogId: '{{ item.TableCatalogId }}'
        TableName: '{{ item.TableName }}'
        VersionId: '{{ item.VersionId }}'
  # ── ListLFTagExpressions ──
  - discovery_id: aws.lakeformation.list_lf_tag_expressions
    calls:
      - action: list_lf_tag_expressions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.LFTagExpressions }}'
      item:
        Name: '{{ item.Name }}'
        CatalogId: '{{ item.CatalogId }}'
        Description: '{{ item.Description }}'
        Expression: '{{ item.Expression }}'
  # ── ListLFTags ──
  - discovery_id: aws.lakeformation.list_lf_tags
    calls:
      - action: list_lf_tags
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.LFTags }}'
      item:
        CatalogId: '{{ item.CatalogId }}'
        TagKey: '{{ item.TagKey }}'
        TagValues: '{{ item.TagValues }}'
  # ── ListLakeFormationOptIns ──
  - discovery_id: aws.lakeformation.list_lake_formation_opt_ins
    calls:
      - action: list_lake_formation_opt_ins
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.LakeFormationOptInsInfoList }}'
      item:
        Condition: '{{ item.Condition }}'
        LastModified: '{{ item.LastModified }}'
        LastUpdatedBy: '{{ item.LastUpdatedBy }}'
        Principal: '{{ item.Principal }}'
        Resource: '{{ item.Resource }}'
  # ── ListPermissions ──
  - discovery_id: aws.lakeformation.list_permissions
    calls:
      - action: list_permissions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.PrincipalResourcePermissions }}'
      item:
        AdditionalDetails: '{{ item.AdditionalDetails }}'
        Condition: '{{ item.Condition }}'
        LastUpdated: '{{ item.LastUpdated }}'
        LastUpdatedBy: '{{ item.LastUpdatedBy }}'
        Permissions: '{{ item.Permissions }}'
        PermissionsWithGrantOption: '{{ item.PermissionsWithGrantOption }}'
        Principal: '{{ item.Principal }}'
        Resource: '{{ item.Resource }}'
  # ── ListResources ──
  - discovery_id: aws.lakeformation.list_resources
    calls:
      - action: list_resources
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ResourceInfoList }}'
      item:
        ResourceArn: '{{ item.ResourceArn }}'
        RoleArn: '{{ item.RoleArn }}'
        HybridAccessEnabled: '{{ item.HybridAccessEnabled }}'
        LastModified: '{{ item.LastModified }}'
        ResourceInfo: '{{ item.ResourceInfo }}'
        WithFederation: '{{ item.WithFederation }}'
        WithPrivilegedAccess: '{{ item.WithPrivilegedAccess }}'
  # ── ListTransactions ──
  - discovery_id: aws.lakeformation.list_transactions
    calls:
      - action: list_transactions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Transactions }}'
      item:
        TransactionEndTime: '{{ item.TransactionEndTime }}'
        TransactionId: '{{ item.TransactionId }}'
        TransactionStartTime: '{{ item.TransactionStartTime }}'
        TransactionStatus: '{{ item.TransactionStatus }}'
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeResource ──
  - discovery_id: aws.lakeformation.describe_resource
    for_each: aws.lakeformation.list_resources
    calls:
      - action: describe_resource
        params:
          ResourceArn: '{{ item.ResourceArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ResourceInfoList }}'
      item:
        ResourceArn: '{{ item.ResourceArn }}'
        RoleArn: '{{ item.RoleArn }}'
        HybridAccessEnabled: '{{ item.HybridAccessEnabled }}'
        LastModified: '{{ item.LastModified }}'
        ResourceInfo: '{{ item.ResourceInfo }}'
        WithFederation: '{{ item.WithFederation }}'
        WithPrivilegedAccess: '{{ item.WithPrivilegedAccess }}'
  # ── DescribeTransaction ──
  - discovery_id: aws.lakeformation.describe_transaction
    for_each: aws.lakeformation.list_transactions
    calls:
      - action: describe_transaction
        params:
          TransactionId: '{{ item.TransactionId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Transactions }}'
      item:
        TransactionEndTime: '{{ item.TransactionEndTime }}'
        TransactionId: '{{ item.TransactionId }}'
        TransactionStartTime: '{{ item.TransactionStartTime }}'
        TransactionStatus: '{{ item.TransactionStatus }}'
  # ── GetDataCellsFilter ──
  - discovery_id: aws.lakeformation.get_data_cells_filter
    for_each: aws.lakeformation.list_data_cells_filter
    calls:
      - action: get_data_cells_filter
        params:
          TableCatalogId: '{{ item.TableCatalogId }}'
          DatabaseName: '{{ item.DatabaseName }}'
          TableName: '{{ item.TableName }}'
          Name: '{{ item.Name }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.DataCellsFilters }}'
      item:
        Name: '{{ item.Name }}'
        ColumnNames: '{{ item.ColumnNames }}'
        ColumnWildcard: '{{ item.ColumnWildcard }}'
        DatabaseName: '{{ item.DatabaseName }}'
        RowFilter: '{{ item.RowFilter }}'
        TableCatalogId: '{{ item.TableCatalogId }}'
        TableName: '{{ item.TableName }}'
        VersionId: '{{ item.VersionId }}'
  # ── GetEffectivePermissionsForPath ──
  - discovery_id: aws.lakeformation.get_effective_permissions_for_path
    for_each: aws.lakeformation.list_resources
    calls:
      - action: get_effective_permissions_for_path
        params:
          ResourceArn: '{{ item.ResourceArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Permissions }}'
      item:
        AdditionalDetails: '{{ item.AdditionalDetails }}'
        Condition: '{{ item.Condition }}'
        LastUpdated: '{{ item.LastUpdated }}'
        LastUpdatedBy: '{{ item.LastUpdatedBy }}'
        Permissions: '{{ item.Permissions }}'
        PermissionsWithGrantOption: '{{ item.PermissionsWithGrantOption }}'
        Principal: '{{ item.Principal }}'
        Resource: '{{ item.Resource }}'
  # ── GetLFTag ──
  - discovery_id: aws.lakeformation.get_lf_tag
    for_each: aws.lakeformation.list_lf_tags
    calls:
      - action: get_lf_tag
        params:
          TagKey: '{{ item.TagKey }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.TagValues }}'
  # ── GetLFTagExpression ──
  - discovery_id: aws.lakeformation.get_lf_tag_expression
    for_each: aws.lakeformation.list_data_cells_filter
    calls:
      - action: get_lf_tag_expression
        params:
          Name: '{{ item.Name }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Expression }}'
      item:
        TagKey: '{{ item.TagKey }}'
        TagValues: '{{ item.TagValues }}'
  # ── GetQueryState ──
  - discovery_id: aws.lakeformation.get_query_state
    calls:
      - action: get_query_state
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Error }}'
      item:
        State: '{{ item.State }}'
  # ── GetQueryStatistics ──
  - discovery_id: aws.lakeformation.get_query_statistics
    calls:
      - action: get_query_statistics
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ExecutionStatistics }}'
      item:
        AverageExecutionTimeMillis: '{{ item.AverageExecutionTimeMillis }}'
        DataScannedBytes: '{{ item.DataScannedBytes }}'
        WorkUnitsExecutedCount: '{{ item.WorkUnitsExecutedCount }}'
  # ── GetResourceLFTags ──
  - discovery_id: aws.lakeformation.get_resource_lf_tags
    for_each: aws.lakeformation.list_lake_formation_opt_ins
    calls:
      - action: get_resource_lf_tags
        params:
          Resource: '{{ item.Resource }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.LFTagOnDatabase }}'
      item:
        CatalogId: '{{ item.CatalogId }}'
        TagKey: '{{ item.TagKey }}'
        TagValues: '{{ item.TagValues }}'
  # ── GetTableObjects ──
  - discovery_id: aws.lakeformation.get_table_objects
    for_each: aws.lakeformation.list_data_cells_filter
    calls:
      - action: get_table_objects
        params:
          DatabaseName: '{{ item.DatabaseName }}'
          TableName: '{{ item.TableName }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.Objects }}'
      item:
        Objects: '{{ item.Objects }}'
        PartitionValues: '{{ item.PartitionValues }}'
  # ── GetTemporaryGluePartitionCredentials ──
  - discovery_id: aws.lakeformation.get_temporary_glue_partition_credentials
    calls:
      - action: get_temporary_glue_partition_credentials
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        AccessKeyId: '{{ response.AccessKeyId }}'
        Expiration: '{{ response.Expiration }}'
        SecretAccessKey: '{{ response.SecretAccessKey }}'
        SessionToken: '{{ response.SessionToken }}'
  # ── GetTemporaryGlueTableCredentials ──
  - discovery_id: aws.lakeformation.get_temporary_glue_table_credentials
    calls:
      - action: get_temporary_glue_table_credentials
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.VendedS3Path }}'
  # ── GetWorkUnitResults ──
  - discovery_id: aws.lakeformation.get_work_unit_results
    calls:
      - action: get_work_unit_results
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        ResultStream: '{{ response.ResultStream }}'
  # ── GetWorkUnits ──
  - discovery_id: aws.lakeformation.get_work_units
    calls:
      - action: get_work_units
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.WorkUnitRanges }}'
      item:
        WorkUnitIdMax: '{{ item.WorkUnitIdMax }}'
        WorkUnitIdMin: '{{ item.WorkUnitIdMin }}'
        WorkUnitToken: '{{ item.WorkUnitToken }}'
  # ── ListTableStorageOptimizers ──
  - discovery_id: aws.lakeformation.list_table_storage_optimizers
    for_each: aws.lakeformation.list_data_cells_filter
    calls:
      - action: list_table_storage_optimizers
        params:
          DatabaseName: '{{ item.DatabaseName }}'
          TableName: '{{ item.TableName }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.StorageOptimizerList }}'
      item:
        Config: '{{ item.Config }}'
        ErrorMessage: '{{ item.ErrorMessage }}'
        LastRunDetails: '{{ item.LastRunDetails }}'
        StorageOptimizerType: '{{ item.StorageOptimizerType }}'
        Warnings: '{{ item.Warnings }}'
  # ── SearchDatabasesByLFTags ──
  - discovery_id: aws.lakeformation.search_databases_by_lf_tags
    for_each: aws.lakeformation.list_lf_tag_expressions
    calls:
      - action: search_databases_by_lf_tags
        params:
          Expression: '{{ item.Expression }}'
        save_as: response
