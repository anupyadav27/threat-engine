    for_each: aws.lakeformation.list_lf_tag_expressions
    calls:
      - action: search_tables_by_lf_tags
        params:
          Expression: '{{ item.Expression }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.TableList }}'
