version: '1.0'
provider: aws
service: bcm-pricing-calculator
services:
  client: bcm-pricing-calculator
  module: boto3.client
discovery:
  # ── GetPreferences ──
  - discovery_id: aws.bcm-pricing-calculator.get_preferences
    calls:
      - action: get_preferences
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.managementAccountRateTypeSelections }}'
      item:
        managementAccountRateTypeSelections: '{{ item.managementAccountRateTypeSelections }}'
        memberAccountRateTypeSelections: '{{ item.memberAccountRateTypeSelections }}'
        standaloneAccountRateTypeSelections: '{{ item.standaloneAccountRateTypeSelections }}'
  # ── ListBillEstimates ──
  - discovery_id: aws.bcm-pricing-calculator.list_bill_estimates
    calls:
      - action: list_bill_estimates
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.items }}'
      item:
        billInterval: '{{ item.billInterval }}'
        createdAt: '{{ item.createdAt }}'
        expiresAt: '{{ item.expiresAt }}'
        id: '{{ item.id }}'
        name: '{{ item.name }}'
        status: '{{ item.status }}'
  # ── ListBillScenarios ──
  - discovery_id: aws.bcm-pricing-calculator.list_bill_scenarios
