# ============================================================
# Discovery YAML — route53-recovery-cluster (AWS)
# Generated: 2026-02-21T04:56:59Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: route53-recovery-cluster
services:
  client: route53-recovery-cluster
  module: boto3.client
discovery:
  # ── ListRoutingControls ──
  - discovery_id: aws.route53-recovery-cluster.list_routing_controls
    calls:
      - action: list_routing_controls
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.RoutingControls }}'
      item:
        ControlPanelArn: '{{ item.ControlPanelArn }}'
        ControlPanelName: '{{ item.ControlPanelName }}'
        Owner: '{{ item.Owner }}'
        RoutingControlArn: '{{ item.RoutingControlArn }}'
        RoutingControlName: '{{ item.RoutingControlName }}'
        RoutingControlState: '{{ item.RoutingControlState }}'
  # ── Dependent read operations (require identifiers) ──
  # ── GetRoutingControlState ──
  - discovery_id: aws.route53-recovery-cluster.get_routing_control_state
    for_each: aws.route53-recovery-cluster.list_routing_controls
    calls:
      - action: get_routing_control_state
        params:
          RoutingControlArn: '{{ item.RoutingControlArn }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        RoutingControlArn: '{{ response.RoutingControlArn }}'
        RoutingControlName: '{{ response.RoutingControlName }}'
        RoutingControlState: '{{ response.RoutingControlState }}'
