# ============================================================
# Discovery YAML — ecr-public (AWS)
# Generated: 2026-02-21T04:56:58Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: ecr-public
services:
  client: ecr-public
  module: boto3.client
discovery:
  # ── DescribeRegistries ──
  - discovery_id: aws.ecr-public.describe_registries
    calls:
      - action: describe_registries
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.registries }}'
      item:
        aliases: '{{ item.aliases }}'
        registries: '{{ item.registries }}'
        registryArn: '{{ item.registryArn }}'
        registryId: '{{ item.registryId }}'
        registryUri: '{{ item.registryUri }}'
        verified: '{{ item.verified }}'
  # ── DescribeRepositories ──
  - discovery_id: aws.ecr-public.describe_repositories
    calls:
      - action: describe_repositories
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.repositories }}'
      item:
        createdAt: '{{ item.createdAt }}'
        registryId: '{{ item.registryId }}'
        repositories: '{{ item.repositories }}'
        repositoryArn: '{{ item.repositoryArn }}'
        repositoryName: '{{ item.repositoryName }}'
        repositoryUri: '{{ item.repositoryUri }}'
  # ── GetAuthorizationToken ──
  - discovery_id: aws.ecr-public.get_authorization_token
    calls:
      - action: get_authorization_token
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.authorizationData }}'
      item:
        authorizationData: '{{ item.authorizationData }}'
        authorizationToken: '{{ item.authorizationToken }}'
        expiresAt: '{{ item.expiresAt }}'
  # ── GetRegistryCatalogData ──
  - discovery_id: aws.ecr-public.get_registry_catalog_data
    calls:
      - action: get_registry_catalog_data
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.registryCatalogData }}'
      item:
        catalogData: '{{ item.catalogData }}'
        displayName: '{{ item.displayName }}'
        registryCatalogData: '{{ item.registryCatalogData }}'
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeImageTags ──
  - discovery_id: aws.ecr-public.describe_image_tags
    for_each: aws.ecr-public.describe_repositories
    calls:
      - action: describe_image_tags
        params:
          repositoryName: '{{ item.repositoryName }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.imageTagDetails }}'
      item:
        createdAt: '{{ item.createdAt }}'
        imageDetail: '{{ item.imageDetail }}'
        imageTag: '{{ item.imageTag }}'
  # ── DescribeImages ──
  - discovery_id: aws.ecr-public.describe_images
    for_each: aws.ecr-public.describe_repositories
    calls:
      - action: describe_images
        params:
          repositoryName: '{{ item.repositoryName }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.imageDetails }}'
      item:
        artifactMediaType: '{{ item.artifactMediaType }}'
        imageDigest: '{{ item.imageDigest }}'
        imageManifestMediaType: '{{ item.imageManifestMediaType }}'
        imagePushedAt: '{{ item.imagePushedAt }}'
        imageSizeInBytes: '{{ item.imageSizeInBytes }}'
        imageTags: '{{ item.imageTags }}'
        registryId: '{{ item.registryId }}'
        repositoryName: '{{ item.repositoryName }}'
  # ── GetRepositoryCatalogData ──
  - discovery_id: aws.ecr-public.get_repository_catalog_data
    for_each: aws.ecr-public.describe_repositories
    calls:
      - action: get_repository_catalog_data
        params:
          repositoryName: '{{ item.repositoryName }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.catalogData }}'
      item:
        aboutText: '{{ item.aboutText }}'
        architectures: '{{ item.architectures }}'
        description: '{{ item.description }}'
        logoUrl: '{{ item.logoUrl }}'
        marketplaceCertified: '{{ item.marketplaceCertified }}'
        operatingSystems: '{{ item.operatingSystems }}'
        usageText: '{{ item.usageText }}'
  # ── GetRepositoryPolicy ──
  - discovery_id: aws.ecr-public.get_repository_policy
    for_each: aws.ecr-public.describe_repositories
    calls:
      - action: get_repository_policy
        params:
          repositoryName: '{{ item.repositoryName }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        policyText: '{{ response.policyText }}'
        registryId: '{{ response.registryId }}'
        repositoryName: '{{ response.repositoryName }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.ecr-public.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.tags }}'
      item:
        Key: '{{ item.Key }}'
        Value: '{{ item.Value }}'
