        Enabled: '{{ item.Enabled }}'
        arn: '{{ item.arn }}'
        createdTime: '{{ item.createdTime }}'
        inputConfiguration: '{{ item.inputConfiguration }}'
        invokeModelEndpointRoleArn: '{{ item.invokeModelEndpointRoleArn }}'
        lastUpdatedTime: '{{ item.lastUpdatedTime }}'
        modelEndpoint: '{{ item.modelEndpoint }}'
        modelEndpointStatus: '{{ item.modelEndpointStatus }}'
        modelSource: '{{ item.modelSource }}'
        outputConfiguration: '{{ item.outputConfiguration }}'
  # ── GetKMSEncryptionKey ──
  - discovery_id: aws.frauddetector.get_kms_encryption_key
    calls:
      - action: get_kms_encryption_key
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.kmsKey }}'
      item:
        kmsEncryptionKeyArn: '{{ item.kmsEncryptionKeyArn }}'
        kmsKey: '{{ item.kmsKey }}'
  # ── GetLabels ──
  - discovery_id: aws.frauddetector.get_labels
    calls:
      - action: get_labels
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.labels }}'
      item:
        arn: '{{ item.arn }}'
        createdTime: '{{ item.createdTime }}'
        description: '{{ item.description }}'
        lastUpdatedTime: '{{ item.lastUpdatedTime }}'
        name: '{{ item.name }}'
  # ── GetListsMetadata ──
  - discovery_id: aws.frauddetector.get_lists_metadata
    calls:
      - action: get_lists_metadata
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.lists }}'
      item:
        arn: '{{ item.arn }}'
        createdTime: '{{ item.createdTime }}'
        description: '{{ item.description }}'
        lists: '{{ item.lists }}'
        name: '{{ item.name }}'
        updatedTime: '{{ item.updatedTime }}'
        variableType: '{{ item.variableType }}'
  # ── GetModels ──
  - discovery_id: aws.frauddetector.get_models
    calls:
      - action: get_models
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.models }}'
      item:
        arn: '{{ item.arn }}'
        createdTime: '{{ item.createdTime }}'
        description: '{{ item.description }}'
        eventTypeName: '{{ item.eventTypeName }}'
        lastUpdatedTime: '{{ item.lastUpdatedTime }}'
        modelId: '{{ item.modelId }}'
        modelType: '{{ item.modelType }}'
  # ── GetOutcomes ──
  - discovery_id: aws.frauddetector.get_outcomes
    calls:
      - action: get_outcomes
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.outcomes }}'
      item:
        arn: '{{ item.arn }}'
        createdTime: '{{ item.createdTime }}'
        description: '{{ item.description }}'
        lastUpdatedTime: '{{ item.lastUpdatedTime }}'
        name: '{{ item.name }}'
  # ── GetVariables ──
  - discovery_id: aws.frauddetector.get_variables
    calls:
      - action: get_variables
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.variables }}'
      item:
        arn: '{{ item.arn }}'
        createdTime: '{{ item.createdTime }}'
        dataSource: '{{ item.dataSource }}'
        dataType: '{{ item.dataType }}'
        defaultValue: '{{ item.defaultValue }}'
        description: '{{ item.description }}'
        lastUpdatedTime: '{{ item.lastUpdatedTime }}'
        name: '{{ item.name }}'
        variableType: '{{ item.variableType }}'
        variables: '{{ item.variables }}'
  # ── ListEventPredictions ──
  - discovery_id: aws.frauddetector.list_event_predictions
    calls:
      - action: list_event_predictions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.eventPredictionSummaries }}'
      item:
        currentLabel: '{{ item.currentLabel }}'
        detectorId: '{{ item.detectorId }}'
        detectorVersionId: '{{ item.detectorVersionId }}'
        entities: '{{ item.entities }}'
        event: '{{ item.event }}'
        eventId: '{{ item.eventId }}'
        eventTimestamp: '{{ item.eventTimestamp }}'
        eventTypeName: '{{ item.eventTypeName }}'
        labelTimestamp: '{{ item.labelTimestamp }}'
        predictionTimestamp: '{{ item.predictionTimestamp }}'
  # ── Dependent read operations (require identifiers) ──
  # ── DescribeDetector ──
  - discovery_id: aws.frauddetector.describe_detector
    for_each: aws.frauddetector.get_detectors
    calls:
      - action: describe_detector
        params:
          detectorId: '{{ item.detectorId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.detectorVersionSummaries }}'
      item:
        description: '{{ item.description }}'
        detectorVersionId: '{{ item.detectorVersionId }}'
        lastUpdatedTime: '{{ item.lastUpdatedTime }}'
        status: '{{ item.status }}'
  # ── GetDeleteEventsByEventTypeStatus ──
  - discovery_id: aws.frauddetector.get_delete_events_by_event_type_status
    for_each: aws.frauddetector.get_batch_import_jobs
    calls:
      - action: get_delete_events_by_event_type_status
        params:
          eventTypeName: '{{ item.eventTypeName }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        eventTypeName: '{{ response.eventTypeName }}'
        eventsDeletionStatus: '{{ response.eventsDeletionStatus }}'
  # ── GetDetectorVersion ──
  - discovery_id: aws.frauddetector.get_detector_version
    for_each: aws.frauddetector.get_detectors
    calls:
      - action: get_detector_version
        params:
          detectorId: '{{ item.detectorId }}'
          detectorVersionId: '{{ item.detectorVersionId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.externalModelEndpoints }}'
  # ── GetEvent ──
  - discovery_id: aws.frauddetector.get_event
    for_each: aws.frauddetector.get_batch_import_jobs
    calls:
      - action: get_event
        params:
          eventId: '{{ item.eventId }}'
          eventTypeName: '{{ item.eventTypeName }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.event }}'
      item:
        currentLabel: '{{ item.currentLabel }}'
        entities: '{{ item.entities }}'
        event: '{{ item.event }}'
        eventId: '{{ item.eventId }}'
        eventTimestamp: '{{ item.eventTimestamp }}'
        eventTypeName: '{{ item.eventTypeName }}'
        eventVariables: '{{ item.eventVariables }}'
        labelTimestamp: '{{ item.labelTimestamp }}'
  # ── GetEventPrediction ──
