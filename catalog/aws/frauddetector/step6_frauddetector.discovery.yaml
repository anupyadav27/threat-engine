  # ── GetRules ──
  - discovery_id: aws.frauddetector.get_rules
    for_each: aws.frauddetector.get_detectors
    calls:
      - action: get_rules
        params:
          detectorId: '{{ item.detectorId }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.ruleDetails }}'
      item:
        arn: '{{ item.arn }}'
        createdTime: '{{ item.createdTime }}'
        description: '{{ item.description }}'
        detectorId: '{{ item.detectorId }}'
        expression: '{{ item.expression }}'
        language: '{{ item.language }}'
        lastUpdatedTime: '{{ item.lastUpdatedTime }}'
        outcomes: '{{ item.outcomes }}'
        ruleDetails: '{{ item.ruleDetails }}'
        ruleId: '{{ item.ruleId }}'
        ruleVersion: '{{ item.ruleVersion }}'
