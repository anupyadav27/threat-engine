    for_each: aws.frauddetector.get_batch_import_jobs
    calls:
      - action: get_event_prediction
        params:
          detectorId: '{{ item.detectorId }}'
          eventId: '{{ item.eventId }}'
          eventTypeName: '{{ item.eventTypeName }}'
          entities: '{{ item.entities }}'
          eventTimestamp: '{{ item.eventTimestamp }}'
          eventVariables: '{{ item.eventVariables }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.modelScores }}'
      item:
        modelVersion: '{{ item.modelVersion }}'
        scores: '{{ item.scores }}'
  # ── GetEventPredictionMetadata ──
  - discovery_id: aws.frauddetector.get_event_prediction_metadata
    for_each: aws.frauddetector.get_batch_import_jobs
    calls:
      - action: get_event_prediction_metadata
        params:
          eventId: '{{ item.eventId }}'
          eventTypeName: '{{ item.eventTypeName }}'
          detectorId: '{{ item.detectorId }}'
          detectorVersionId: '{{ item.detectorVersionId }}'
          predictionTimestamp: '{{ item.predictionTimestamp }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.eventVariables }}'
      item:
        name: '{{ item.name }}'
        source: '{{ item.source }}'
        value: '{{ item.value }}'
  # ── GetListElements ──
  - discovery_id: aws.frauddetector.get_list_elements
    for_each: aws.frauddetector.get_entity_types
    calls:
      - action: get_list_elements
        params:
          name: '{{ item.name }}'
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.elements }}'
      item:
        elements: '{{ item.elements }}'
  # ── GetModelVersion ──
  - discovery_id: aws.frauddetector.get_model_version
    for_each: aws.frauddetector.describe_model_versions
    calls:
      - action: get_model_version
        params:
          modelId: '{{ item.modelId }}'
          modelType: '{{ item.modelType }}'
          modelVersionNumber: '{{ item.modelVersionNumber }}'
        save_as: response
