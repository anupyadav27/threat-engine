  - discovery_id: aws.frauddetector.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.tags }}'
      item:
        key: '{{ item.key }}'
        value: '{{ item.value }}'
