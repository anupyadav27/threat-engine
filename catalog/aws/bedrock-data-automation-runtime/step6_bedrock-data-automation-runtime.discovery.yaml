# ============================================================
# Discovery YAML — bedrock-data-automation-runtime (AWS)
# Generated: 2026-02-21T04:56:57Z
# Actions use boto3 SDK snake_case method names
# ============================================================
version: '1.0'
provider: aws
service: bedrock-data-automation-runtime
services:
  client: bedrock-data-automation-runtime
  module: boto3.client
discovery:
  # ── Dependent read operations (require identifiers) ──
  # ── GetDataAutomationStatus ──
  - discovery_id: aws.bedrock-data-automation-runtime.get_data_automation_status
    calls:
      - action: get_data_automation_status
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.outputConfiguration }}'
      item:
        Status: '{{ item.Status }}'
        Enabled: '{{ item.Enabled }}'
        s3Uri: '{{ item.s3Uri }}'
        status: '{{ item.status }}'
  # ── ListTagsForResource ──
  - discovery_id: aws.bedrock-data-automation-runtime.list_tags_for_resource
    calls:
      - action: list_tags_for_resource
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.tags }}'
      item:
        key: '{{ item.key }}'
        value: '{{ item.value }}'
