version: '1.0'
provider: oci
service: loggingingestion
services:
  client: loggingingestion
  module: boto3.client
discovery:
- discovery_id: oci.loggingingestion.listLoggingingestion
  calls:
  - action: listLoggingingestion
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.loggingingestion.listLoggingingestionByCompartment
  calls:
  - action: listLoggingingestionByCompartment
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.loggingingestion.getLoggingingestion
  calls:
  - action: getLoggingingestion
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.loggingingestion.getLoggingingestionDetails
  calls:
  - action: getLoggingingestionDetails
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
