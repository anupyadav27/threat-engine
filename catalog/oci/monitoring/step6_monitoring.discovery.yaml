# Discovery YAML — monitoring (OCI)
# Generated: 2026-02-21T04:45:39Z
version: '1.0'
provider: oci
service: monitoring
services:
  client: monitoring
  module: oci.monitoring
discovery:
  # ── get_alarm [dependent] ──
  - discovery_id: oci.monitoring.get_alarm
    calls:
      - action: get_alarm
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        compartment_id: '{{ response.data.compartment_id }}'
        defined_tags: '{{ response.data.defined_tags }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        name: '{{ response.data.name }}'
        time_created: '{{ response.data.time_created }}'
        ocid: '{{ response.data.ocid }}'
        status: '{{ response.data.status }}'
    # required_params: ['AlarmId']
  # ── get_alarm_history [dependent] ──
  - discovery_id: oci.monitoring.get_alarm_history
    calls:
      - action: get_alarm_history
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        compartment_id: '{{ response.data.compartment_id }}'
        defined_tags: '{{ response.data.defined_tags }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        name: '{{ response.data.name }}'
        time_created: '{{ response.data.time_created }}'
        ocid: '{{ response.data.ocid }}'
        status: '{{ response.data.status }}'
    # required_params: ['AlarmHistoryId']
  # ── get_alarm_suppression [dependent] ──
  - discovery_id: oci.monitoring.get_alarm_suppression
    calls:
      - action: get_alarm_suppression
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        compartment_id: '{{ response.data.compartment_id }}'
        defined_tags: '{{ response.data.defined_tags }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        name: '{{ response.data.name }}'
        time_created: '{{ response.data.time_created }}'
        ocid: '{{ response.data.ocid }}'
        status: '{{ response.data.status }}'
    # required_params: ['AlarmSuppressionId']
  # ── list_alarm_suppressions [dependent] ──
  - discovery_id: oci.monitoring.list_alarm_suppressions
    calls:
      - action: list_alarm_suppressions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        compartment_id: '{{ item.compartment_id }}'
        defined_tags: '{{ item.defined_tags }}'
        freeform_tags: '{{ item.freeform_tags }}'
        name: '{{ item.name }}'
        time_created: '{{ item.time_created }}'
        ocid: '{{ item.ocid }}'
        status: '{{ item.status }}'
    # required_params: ['compartmentId']
  # ── list_alarms [dependent] ──
  - discovery_id: oci.monitoring.list_alarms
    calls:
      - action: list_alarms
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        compartment_id: '{{ item.compartment_id }}'
        defined_tags: '{{ item.defined_tags }}'
        freeform_tags: '{{ item.freeform_tags }}'
        name: '{{ item.name }}'
        time_created: '{{ item.time_created }}'
        ocid: '{{ item.ocid }}'
        status: '{{ item.status }}'
    # required_params: ['compartmentId']
  # ── list_alarms_status [dependent] ──
