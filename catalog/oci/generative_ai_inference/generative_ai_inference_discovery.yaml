version: '1.0'
provider: oci
service: generative_ai_inference
services:
  client: generative_ai_inference
  module: boto3.client
discovery:
- discovery_id: oci.generative_ai_inference.listGenerativeAiInference
  calls:
  - action: listGenerativeAiInference
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.generative_ai_inference.listGenerativeAiInferenceByCompartment
  calls:
  - action: listGenerativeAiInferenceByCompartment
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.generative_ai_inference.getGenerativeAiInference
  calls:
  - action: getGenerativeAiInference
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.generative_ai_inference.getGenerativeAiInferenceDetails
  calls:
  - action: getGenerativeAiInferenceDetails
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
