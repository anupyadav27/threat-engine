# Discovery YAML — audit (OCI)
# Generated: 2026-02-21T04:45:38Z
version: '1.0'
provider: oci
service: audit
services:
  client: audit
  module: oci.audit
discovery:
  # ── get_configuration [dependent] ──
  - discovery_id: oci.audit.get_configuration
    calls:
      - action: get_configuration
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        compartment_id: '{{ response.data.compartment_id }}'
        defined_tags: '{{ response.data.defined_tags }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        name: '{{ response.data.name }}'
        time_created: '{{ response.data.time_created }}'
        ocid: '{{ response.data.ocid }}'
        status: '{{ response.data.status }}'
    # required_params: ['ConfigurationId']
  # ── list_events [dependent] ──
  - discovery_id: oci.audit.list_events
    calls:
      - action: list_events
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        compartment_id: '{{ item.compartment_id }}'
        defined_tags: '{{ item.defined_tags }}'
        freeform_tags: '{{ item.freeform_tags }}'
        name: '{{ item.name }}'
        time_created: '{{ item.time_created }}'
        ocid: '{{ item.ocid }}'
        status: '{{ item.status }}'
    # required_params: ['compartmentId']
