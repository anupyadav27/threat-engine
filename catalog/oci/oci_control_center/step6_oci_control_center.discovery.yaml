# Discovery YAML — oci_control_center (OCI)
# Generated: 2026-02-21T04:45:39Z
version: '1.0'
provider: oci
service: oci_control_center
services:
  client: oci_control_center
  module: oci.oci_control_center
discovery:
  # ── list_metric_properties [dependent] ──
  - discovery_id: oci.oci_control_center.list_metric_properties
    calls:
      - action: list_metric_properties
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        compartment_id: '{{ item.compartment_id }}'
        defined_tags: '{{ item.defined_tags }}'
        freeform_tags: '{{ item.freeform_tags }}'
        name: '{{ item.name }}'
        time_created: '{{ item.time_created }}'
        ocid: '{{ item.ocid }}'
        status: '{{ item.status }}'
    # required_params: ['compartmentId']
  # ── list_namespaces [dependent] ──
  - discovery_id: oci.oci_control_center.list_namespaces
    calls:
      - action: list_namespaces
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        compartment_id: '{{ item.compartment_id }}'
        defined_tags: '{{ item.defined_tags }}'
        freeform_tags: '{{ item.freeform_tags }}'
        name: '{{ item.name }}'
        time_created: '{{ item.time_created }}'
        ocid: '{{ item.ocid }}'
        status: '{{ item.status }}'
    # required_params: ['compartmentId']
