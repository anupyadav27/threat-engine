# Discovery YAML — analytics (OCI)
# Generated: 2026-02-21T04:45:38Z
version: '1.0'
provider: oci
service: analytics
services:
  client: analytics
  module: oci.analytics
discovery:
  # ── get_analytics_instance [dependent] ──
  - discovery_id: oci.analytics.get_analytics_instance
    calls:
      - action: get_analytics_instance
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        compartment_id: '{{ response.data.compartment_id }}'
        defined_tags: '{{ response.data.defined_tags }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        name: '{{ response.data.name }}'
        time_created: '{{ response.data.time_created }}'
        ocid: '{{ response.data.ocid }}'
        status: '{{ response.data.status }}'
    # required_params: ['AnalyticsInstanceId']
  # ── get_private_access_channel [dependent] ──
  - discovery_id: oci.analytics.get_private_access_channel
    calls:
      - action: get_private_access_channel
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        compartment_id: '{{ response.data.compartment_id }}'
        defined_tags: '{{ response.data.defined_tags }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        name: '{{ response.data.name }}'
        time_created: '{{ response.data.time_created }}'
        ocid: '{{ response.data.ocid }}'
        status: '{{ response.data.status }}'
    # required_params: ['PrivateAccessChannelId']
  # ── get_work_request [dependent] ──
  - discovery_id: oci.analytics.get_work_request
