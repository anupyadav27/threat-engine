# Discovery YAML — ai_speech (OCI)
# Generated: 2026-02-21T04:45:38Z
version: '1.0'
provider: oci
service: ai_speech
services:
  client: ai_speech
  module: oci.ai_speech
discovery:
  # ── get_customization [dependent] ──
  - discovery_id: oci.ai_speech.get_customization
    calls:
      - action: get_customization
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        compartment_id: '{{ response.data.compartment_id }}'
        defined_tags: '{{ response.data.defined_tags }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        name: '{{ response.data.name }}'
        time_created: '{{ response.data.time_created }}'
        ocid: '{{ response.data.ocid }}'
        status: '{{ response.data.status }}'
    # required_params: ['CustomizationId']
  # ── get_transcription_job [dependent] ──
  - discovery_id: oci.ai_speech.get_transcription_job
