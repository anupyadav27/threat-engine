# Discovery YAML — secrets (OCI)
# Generated: 2026-02-21T04:45:39Z
version: '1.0'
provider: oci
service: secrets
services:
  client: secrets
  module: oci.secrets
discovery:
  # ── get_secret_bundle [dependent] ──
  - discovery_id: oci.secrets.get_secret_bundle
    calls:
      - action: get_secret_bundle
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        compartment_id: '{{ response.data.compartment_id }}'
        defined_tags: '{{ response.data.defined_tags }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        name: '{{ response.data.name }}'
        time_created: '{{ response.data.time_created }}'
        ocid: '{{ response.data.ocid }}'
        status: '{{ response.data.status }}'
    # required_params: ['SecretBundleId']
  # ── get_secret_bundle_by_name [dependent] ──
  - discovery_id: oci.secrets.get_secret_bundle_by_name
    calls:
      - action: get_secret_bundle_by_name
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        compartment_id: '{{ response.data.compartment_id }}'
        defined_tags: '{{ response.data.defined_tags }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        name: '{{ response.data.name }}'
        time_created: '{{ response.data.time_created }}'
        ocid: '{{ response.data.ocid }}'
        status: '{{ response.data.status }}'
    # required_params: ['SecretBundleByNameId']
  # ── list_secret_bundle_versions [dependent] ──
  - discovery_id: oci.secrets.list_secret_bundle_versions
    calls:
      - action: list_secret_bundle_versions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        compartment_id: '{{ item.compartment_id }}'
        defined_tags: '{{ item.defined_tags }}'
        freeform_tags: '{{ item.freeform_tags }}'
        name: '{{ item.name }}'
        time_created: '{{ item.time_created }}'
        ocid: '{{ item.ocid }}'
        status: '{{ item.status }}'
    # required_params: ['compartmentId']
