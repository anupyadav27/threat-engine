# Discovery YAML — functions (OCI)
# Generated: 2026-02-21T04:45:39Z
version: '1.0'
provider: oci
service: functions
services:
  client: functions
  module: oci.functions
discovery:
  # ── get_application [dependent] ──
  - discovery_id: oci.functions.get_application
    calls:
      - action: get_application
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        compartment_id: '{{ response.data.compartment_id }}'
        defined_tags: '{{ response.data.defined_tags }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        name: '{{ response.data.name }}'
        time_created: '{{ response.data.time_created }}'
        ocid: '{{ response.data.ocid }}'
        status: '{{ response.data.status }}'
    # required_params: ['ApplicationId']
  # ── get_function [dependent] ──
  - discovery_id: oci.functions.get_function
    calls:
      - action: get_function
        save_as: response
