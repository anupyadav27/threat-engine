version: '1.0'
provider: oci
service: tenant_manager_control_plane
services:
  client: tenant_manager_control_plane
  module: oci.tenant_manager_control_plane
discovery:
- discovery_id: oci.tenant_manager_control_plane.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.tenant_manager_control_plane.list_work_request_errors
  for_each: oci.tenant_manager_control_plane.get_work_request
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.tenant_manager_control_plane.list_work_request_logs
  for_each: oci.tenant_manager_control_plane.get_work_request
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
