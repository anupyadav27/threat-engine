# Discovery YAML — healthchecks (OCI)
# Generated: 2026-02-21T04:45:39Z
version: '1.0'
provider: oci
service: healthchecks
services:
  client: healthchecks
  module: oci.healthchecks
discovery:
  # ── get_http_monitor [dependent] ──
  - discovery_id: oci.healthchecks.get_http_monitor
    calls:
      - action: get_http_monitor
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        compartment_id: '{{ response.data.compartment_id }}'
        defined_tags: '{{ response.data.defined_tags }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        name: '{{ response.data.name }}'
        time_created: '{{ response.data.time_created }}'
        ocid: '{{ response.data.ocid }}'
        status: '{{ response.data.status }}'
    # required_params: ['HttpMonitorId']
