# Discovery YAML — usage (OCI)
# Generated: 2026-02-21T04:45:39Z
version: '1.0'
provider: oci
service: usage
services:
  client: usage
  module: oci.usage
discovery:
  # ── list_usage_limits [dependent] ──
  - discovery_id: oci.usage.list_usage_limits
    calls:
      - action: list_usage_limits
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        compartment_id: '{{ item.compartment_id }}'
        defined_tags: '{{ item.defined_tags }}'
        freeform_tags: '{{ item.freeform_tags }}'
        name: '{{ item.name }}'
        time_created: '{{ item.time_created }}'
        ocid: '{{ item.ocid }}'
        status: '{{ item.status }}'
    # required_params: ['compartmentId']
