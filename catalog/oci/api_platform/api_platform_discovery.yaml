version: '1.0'
provider: oci
service: api_platform
services:
  client: api_platform
  module: oci.api_platform
discovery:
- discovery_id: oci.api_platform.get_api_platform_instance
  calls:
  - action: get_api_platform_instance
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.api_platform.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.api_platform.list_work_request_errors
  for_each: oci.api_platform.get_api_platform_instance
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.api_platform.list_api_platform_instances
  for_each: oci.api_platform.get_api_platform_instance
  calls:
  - action: list_api_platform_instances
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.api_platform.list_work_request_logs
  for_each: oci.api_platform.get_api_platform_instance
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
