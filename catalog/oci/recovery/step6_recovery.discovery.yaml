# Discovery YAML — recovery (OCI)
# Generated: 2026-02-21T04:45:39Z
version: '1.0'
provider: oci
service: recovery
services:
  client: recovery
  module: oci.recovery
discovery:
  # ── get_protected_database [dependent] ──
  - discovery_id: oci.recovery.get_protected_database
    calls:
      - action: get_protected_database
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        compartment_id: '{{ response.data.compartment_id }}'
        defined_tags: '{{ response.data.defined_tags }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        name: '{{ response.data.name }}'
        time_created: '{{ response.data.time_created }}'
        ocid: '{{ response.data.ocid }}'
        status: '{{ response.data.status }}'
    # required_params: ['ProtectedDatabaseId']
