# Discovery YAML — operator_access_control (OCI)
# Generated: 2026-02-21T04:45:39Z
version: '1.0'
provider: oci
service: operator_access_control
services:
  client: operator_access_control
  module: oci.operator_access_control
discovery:
  # ── get_operator_control [dependent] ──
  - discovery_id: oci.operator_access_control.get_operator_control
    calls:
      - action: get_operator_control
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        compartment_id: '{{ response.data.compartment_id }}'
        defined_tags: '{{ response.data.defined_tags }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        name: '{{ response.data.name }}'
        time_created: '{{ response.data.time_created }}'
        ocid: '{{ response.data.ocid }}'
        status: '{{ response.data.status }}'
    # required_params: ['OperatorControlId']
  # ── list_operator_controls [dependent] ──
  - discovery_id: oci.operator_access_control.list_operator_controls
    calls:
      - action: list_operator_controls
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        compartment_id: '{{ item.compartment_id }}'
        defined_tags: '{{ item.defined_tags }}'
        freeform_tags: '{{ item.freeform_tags }}'
        name: '{{ item.name }}'
        time_created: '{{ item.time_created }}'
        ocid: '{{ item.ocid }}'
        status: '{{ item.status }}'
    # required_params: ['compartmentId']
