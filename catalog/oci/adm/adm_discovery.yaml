version: '1.0'
provider: oci
service: adm
services:
  client: adm
  module: oci.adm
discovery:
- discovery_id: oci.adm.get_remediation_run
  calls:
  - action: get_remediation_run
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.adm.get_knowledge_base
  calls:
  - action: get_knowledge_base
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.adm.get_remediation_recipe
  calls:
  - action: get_remediation_recipe
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.adm.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.adm.get_stage
  calls:
  - action: get_stage
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.adm.get_vulnerability_audit
  calls:
  - action: get_vulnerability_audit
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.adm.list_remediation_recipes
  for_each: oci.adm.get_remediation_run
  calls:
  - action: list_remediation_recipes
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.adm.list_work_request_errors
  for_each: oci.adm.get_remediation_run
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.adm.list_knowledge_bases
  for_each: oci.adm.get_remediation_run
  calls:
  - action: list_knowledge_bases
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.adm.list_stages
  for_each: oci.adm.get_remediation_run
  calls:
  - action: list_stages
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.adm.list_application_dependency_vulnerabilities
  for_each: oci.adm.get_remediation_run
  calls:
  - action: list_application_dependency_vulnerabilities
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.adm.list_application_dependency_recommendations
  for_each: oci.adm.get_remediation_run
  calls:
  - action: list_application_dependency_recommendations
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.adm.list_work_request_logs
  for_each: oci.adm.get_remediation_run
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
