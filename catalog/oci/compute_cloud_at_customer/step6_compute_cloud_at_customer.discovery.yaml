# Discovery YAML — compute_cloud_at_customer (OCI)
# Generated: 2026-02-21T04:45:38Z
version: '1.0'
provider: oci
service: compute_cloud_at_customer
services:
  client: compute_cloud_at_customer
  module: oci.compute_cloud_at_customer
discovery:
  # ── get_ccc_infrastructure [dependent] ──
  - discovery_id: oci.compute_cloud_at_customer.get_ccc_infrastructure
    calls:
      - action: get_ccc_infrastructure
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        compartment_id: '{{ response.data.compartment_id }}'
        defined_tags: '{{ response.data.defined_tags }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        name: '{{ response.data.name }}'
        time_created: '{{ response.data.time_created }}'
        ocid: '{{ response.data.ocid }}'
        status: '{{ response.data.status }}'
    # required_params: ['CccInfrastructureId']
  # ── get_ccc_upgrade_schedule [dependent] ──
  - discovery_id: oci.compute_cloud_at_customer.get_ccc_upgrade_schedule
    calls:
      - action: get_ccc_upgrade_schedule
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        compartment_id: '{{ response.data.compartment_id }}'
        defined_tags: '{{ response.data.defined_tags }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        name: '{{ response.data.name }}'
        time_created: '{{ response.data.time_created }}'
        ocid: '{{ response.data.ocid }}'
        status: '{{ response.data.status }}'
    # required_params: ['CccUpgradeScheduleId']
  # ── list_ccc_infrastructures [dependent] ──
  - discovery_id: oci.compute_cloud_at_customer.list_ccc_infrastructures
    calls:
      - action: list_ccc_infrastructures
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        compartment_id: '{{ item.compartment_id }}'
        defined_tags: '{{ item.defined_tags }}'
        freeform_tags: '{{ item.freeform_tags }}'
        name: '{{ item.name }}'
        time_created: '{{ item.time_created }}'
        ocid: '{{ item.ocid }}'
        status: '{{ item.status }}'
    # required_params: ['compartmentId']
  # ── list_ccc_upgrade_schedules [dependent] ──
  - discovery_id: oci.compute_cloud_at_customer.list_ccc_upgrade_schedules
    calls:
      - action: list_ccc_upgrade_schedules
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        compartment_id: '{{ item.compartment_id }}'
        defined_tags: '{{ item.defined_tags }}'
        freeform_tags: '{{ item.freeform_tags }}'
        name: '{{ item.name }}'
        time_created: '{{ item.time_created }}'
        ocid: '{{ item.ocid }}'
        status: '{{ item.status }}'
    # required_params: ['compartmentId']
