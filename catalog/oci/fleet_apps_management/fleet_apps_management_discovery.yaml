version: '1.0'
provider: oci
service: fleet_apps_management
services:
  client: fleet_apps_management
  module: oci.fleet_apps_management
discovery:
- discovery_id: oci.fleet_apps_management.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.fleet_apps_management.list_work_request_errors
  for_each: oci.fleet_apps_management.get_work_request
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.fleet_apps_management.list_work_request_logs
  for_each: oci.fleet_apps_management.get_work_request
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
