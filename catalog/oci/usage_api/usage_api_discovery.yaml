version: '1.0'
provider: oci
service: usage_api
services:
  client: usage_api
  module: oci.usage_api
discovery:
- discovery_id: oci.usage_api.get_custom_table
  calls:
  - action: get_custom_table
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.usage_api.get_scheduled_run
  calls:
  - action: get_scheduled_run
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.usage_api.get_schedule
  calls:
  - action: get_schedule
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.usage_api.get_query
  calls:
  - action: get_query
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.usage_api.get_usage_carbon_emissions_query
  calls:
  - action: get_usage_carbon_emissions_query
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.usage_api.get_email_recipients_group
  calls:
  - action: get_email_recipients_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.usage_api.list_schedules
  for_each: oci.usage_api.get_custom_table
  calls:
  - action: list_schedules
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.usage_api.list_custom_tables
  for_each: oci.usage_api.get_custom_table
  calls:
  - action: list_custom_tables
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
