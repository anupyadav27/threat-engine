# Discovery YAML — cloud_bridge (OCI)
# Generated: 2026-02-21T04:45:38Z
version: '1.0'
provider: oci
service: cloud_bridge
services:
  client: cloud_bridge
  module: oci.cloud_bridge
discovery:
  # ── get_agent [dependent] ──
  - discovery_id: oci.cloud_bridge.get_agent
    calls:
      - action: get_agent
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        compartment_id: '{{ response.data.compartment_id }}'
        defined_tags: '{{ response.data.defined_tags }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        name: '{{ response.data.name }}'
        time_created: '{{ response.data.time_created }}'
        ocid: '{{ response.data.ocid }}'
        status: '{{ response.data.status }}'
    # required_params: ['AgentId']
