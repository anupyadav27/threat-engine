# Discovery YAML — marketplace_private_offer (OCI)
# Generated: 2026-02-21T04:45:39Z
version: '1.0'
provider: oci
service: marketplace_private_offer
services:
  client: marketplace_private_offer
  module: oci.marketplace_private_offer
discovery:
  # ── get_offer [dependent] ──
  - discovery_id: oci.marketplace_private_offer.get_offer
    calls:
      - action: get_offer
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        compartment_id: '{{ response.data.compartment_id }}'
        defined_tags: '{{ response.data.defined_tags }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        name: '{{ response.data.name }}'
        time_created: '{{ response.data.time_created }}'
        ocid: '{{ response.data.ocid }}'
        status: '{{ response.data.status }}'
    # required_params: ['OfferId']
  # ── get_offer_internal_detail [dependent] ──
  - discovery_id: oci.marketplace_private_offer.get_offer_internal_detail
    calls:
      - action: get_offer_internal_detail
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        compartment_id: '{{ response.data.compartment_id }}'
        defined_tags: '{{ response.data.defined_tags }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        name: '{{ response.data.name }}'
        time_created: '{{ response.data.time_created }}'
        ocid: '{{ response.data.ocid }}'
        status: '{{ response.data.status }}'
    # required_params: ['OfferInternalDetailId']
  # ── list_offers [dependent] ──
  - discovery_id: oci.marketplace_private_offer.list_offers
    calls:
      - action: list_offers
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        compartment_id: '{{ item.compartment_id }}'
        defined_tags: '{{ item.defined_tags }}'
        freeform_tags: '{{ item.freeform_tags }}'
        name: '{{ item.name }}'
        time_created: '{{ item.time_created }}'
        ocid: '{{ item.ocid }}'
        status: '{{ item.status }}'
    # required_params: ['compartmentId']
