version: '1.0'
provider: oci
service: cloud_migrations
services:
  client: cloud_migrations
  module: oci.cloud_migrations
discovery:
- discovery_id: oci.cloud_migrations.get_target_asset
  calls:
  - action: get_target_asset
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.cloud_migrations.get_replication_schedule
  calls:
  - action: get_replication_schedule
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.cloud_migrations.get_migration
  calls:
  - action: get_migration
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.cloud_migrations.get_replication_progress
  calls:
  - action: get_replication_progress
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.cloud_migrations.get_migration_asset
  calls:
  - action: get_migration_asset
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.cloud_migrations.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.cloud_migrations.get_migration_plan
  calls:
  - action: get_migration_plan
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.cloud_migrations.list_work_request_errors
  for_each: oci.cloud_migrations.get_target_asset
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.cloud_migrations.list_available_shapes
  for_each: oci.cloud_migrations.get_target_asset
  calls:
  - action: list_available_shapes
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.cloud_migrations.list_replication_schedules
  for_each: oci.cloud_migrations.get_target_asset
  calls:
  - action: list_replication_schedules
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.cloud_migrations.list_work_request_logs
  for_each: oci.cloud_migrations.get_target_asset
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
