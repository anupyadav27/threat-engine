# Discovery YAML — dashboard_service (OCI)
# Generated: 2026-02-21T04:45:38Z
version: '1.0'
provider: oci
service: dashboard_service
services:
  client: dashboard_service
  module: oci.dashboard_service
discovery:
  # ── get_dashboard_group [dependent] ──
  - discovery_id: oci.dashboard_service.get_dashboard_group
    calls:
      - action: get_dashboard_group
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        compartment_id: '{{ response.data.compartment_id }}'
        defined_tags: '{{ response.data.defined_tags }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        name: '{{ response.data.name }}'
        time_created: '{{ response.data.time_created }}'
        ocid: '{{ response.data.ocid }}'
        status: '{{ response.data.status }}'
    # required_params: ['DashboardGroupId']
  # ── list_dashboard_groups [dependent] ──
  - discovery_id: oci.dashboard_service.list_dashboard_groups
    calls:
      - action: list_dashboard_groups
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        compartment_id: '{{ item.compartment_id }}'
        defined_tags: '{{ item.defined_tags }}'
        freeform_tags: '{{ item.freeform_tags }}'
        name: '{{ item.name }}'
        time_created: '{{ item.time_created }}'
        ocid: '{{ item.ocid }}'
        status: '{{ item.status }}'
    # required_params: ['compartmentId']
