version: '1.0'
provider: oci
service: marketplace
services:
  client: marketplace
  module: oci.marketplace
discovery:
- discovery_id: oci.marketplace.get_publication
  calls:
  - action: get_publication
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.marketplace.get_agreement
  calls:
  - action: get_agreement
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.marketplace.get_publication_package
  calls:
  - action: get_publication_package
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.marketplace.get_package
  calls:
  - action: get_package
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.marketplace.get_listing
  calls:
  - action: get_listing
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.marketplace.get_accepted_agreement
