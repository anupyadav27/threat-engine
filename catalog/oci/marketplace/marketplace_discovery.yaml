    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.marketplace.list_report_types
  for_each: oci.marketplace.get_publication
  calls:
  - action: list_report_types
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.marketplace.list_work_request_errors
