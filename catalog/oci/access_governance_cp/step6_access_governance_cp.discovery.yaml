# Discovery YAML — access_governance_cp (OCI)
# Generated: 2026-02-21T04:45:38Z
version: '1.0'
provider: oci
service: access_governance_cp
services:
  client: access_governance_cp
  module: oci.access_governance_cp
discovery:
  # ── get_governance_instance [dependent] ──
  - discovery_id: oci.access_governance_cp.get_governance_instance
    calls:
      - action: get_governance_instance
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        compartment_id: '{{ response.data.compartment_id }}'
        defined_tags: '{{ response.data.defined_tags }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        name: '{{ response.data.name }}'
        time_created: '{{ response.data.time_created }}'
        ocid: '{{ response.data.ocid }}'
        status: '{{ response.data.status }}'
    # required_params: ['GovernanceInstanceId']
  # ── get_governance_instance_configuration [dependent] ──
  - discovery_id: oci.access_governance_cp.get_governance_instance_configuration
    calls:
      - action: get_governance_instance_configuration
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        compartment_id: '{{ response.data.compartment_id }}'
        defined_tags: '{{ response.data.defined_tags }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        name: '{{ response.data.name }}'
        time_created: '{{ response.data.time_created }}'
        ocid: '{{ response.data.ocid }}'
        status: '{{ response.data.status }}'
    # required_params: ['GovernanceInstanceConfigurationId']
  # ── list_governance_instances [dependent] ──
  - discovery_id: oci.access_governance_cp.list_governance_instances
    calls:
      - action: list_governance_instances
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        compartment_id: '{{ item.compartment_id }}'
        defined_tags: '{{ item.defined_tags }}'
        freeform_tags: '{{ item.freeform_tags }}'
        name: '{{ item.name }}'
        time_created: '{{ item.time_created }}'
        ocid: '{{ item.ocid }}'
        status: '{{ item.status }}'
    # required_params: ['compartmentId']
