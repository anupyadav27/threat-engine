# Discovery YAML — generic_artifacts_content (OCI)
# Generated: 2026-02-21T04:45:39Z
version: '1.0'
provider: oci
service: generic_artifacts_content
services:
  client: generic_artifacts_content
  module: oci.generic_artifacts_content
discovery:
  # ── get_generic_artifact_content [dependent] ──
  - discovery_id: oci.generic_artifacts_content.get_generic_artifact_content
    calls:
      - action: get_generic_artifact_content
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        compartment_id: '{{ response.data.compartment_id }}'
        defined_tags: '{{ response.data.defined_tags }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        name: '{{ response.data.name }}'
        time_created: '{{ response.data.time_created }}'
        ocid: '{{ response.data.ocid }}'
        status: '{{ response.data.status }}'
    # required_params: ['GenericArtifactContentId']
  # ── get_generic_artifact_content_by_path [dependent] ──
  - discovery_id: oci.generic_artifacts_content.get_generic_artifact_content_by_path
    calls:
      - action: get_generic_artifact_content_by_path
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        compartment_id: '{{ response.data.compartment_id }}'
        defined_tags: '{{ response.data.defined_tags }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        name: '{{ response.data.name }}'
        time_created: '{{ response.data.time_created }}'
        ocid: '{{ response.data.ocid }}'
        status: '{{ response.data.status }}'
    # required_params: ['GenericArtifactContentByPathId']
