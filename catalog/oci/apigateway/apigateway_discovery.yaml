version: '1.0'
provider: oci
service: apigateway
services:
  client: apigateway
  module: boto3.client
discovery:
- discovery_id: oci.apigateway.listApigateway
  calls:
  - action: listApigateway
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.apigateway.listApigatewayByCompartment
  calls:
  - action: listApigatewayByCompartment
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.apigateway.getApigateway
  calls:
  - action: getApigateway
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.apigateway.getApigatewayDetails
  calls:
  - action: getApigatewayDetails
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
