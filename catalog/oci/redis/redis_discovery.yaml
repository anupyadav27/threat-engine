version: '1.0'
provider: oci
service: redis
services:
  client: redis
  module: boto3.client
discovery:
- discovery_id: oci.redis.listRedis
  calls:
  - action: listRedis
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.redis.listRedisByCompartment
  calls:
  - action: listRedisByCompartment
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.redis.getRedis
  calls:
  - action: getRedis
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.redis.getRedisDetails
  calls:
  - action: getRedisDetails
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
