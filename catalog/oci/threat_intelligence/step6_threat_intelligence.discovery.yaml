# Discovery YAML — threat_intelligence (OCI)
# Generated: 2026-02-21T04:45:39Z
version: '1.0'
provider: oci
service: threat_intelligence
services:
  client: threat_intelligence
  module: oci.threat_intelligence
discovery:
  # ── get_indicator [dependent] ──
  - discovery_id: oci.threat_intelligence.get_indicator
    calls:
      - action: get_indicator
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        compartment_id: '{{ response.data.compartment_id }}'
        defined_tags: '{{ response.data.defined_tags }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        name: '{{ response.data.name }}'
        time_created: '{{ response.data.time_created }}'
        ocid: '{{ response.data.ocid }}'
        status: '{{ response.data.status }}'
    # required_params: ['IndicatorId']
  # ── list_indicator_counts [dependent] ──
  - discovery_id: oci.threat_intelligence.list_indicator_counts
    calls:
      - action: list_indicator_counts
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        compartment_id: '{{ item.compartment_id }}'
        defined_tags: '{{ item.defined_tags }}'
        freeform_tags: '{{ item.freeform_tags }}'
        name: '{{ item.name }}'
        time_created: '{{ item.time_created }}'
        ocid: '{{ item.ocid }}'
        status: '{{ item.status }}'
    # required_params: ['compartmentId']
  # ── list_indicators [dependent] ──
  - discovery_id: oci.threat_intelligence.list_indicators
    calls:
      - action: list_indicators
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        compartment_id: '{{ item.compartment_id }}'
        defined_tags: '{{ item.defined_tags }}'
        freeform_tags: '{{ item.freeform_tags }}'
        name: '{{ item.name }}'
        time_created: '{{ item.time_created }}'
        ocid: '{{ item.ocid }}'
        status: '{{ item.status }}'
    # required_params: ['compartmentId']
  # ── list_threat_types [dependent] ──
  - discovery_id: oci.threat_intelligence.list_threat_types
    calls:
      - action: list_threat_types
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        compartment_id: '{{ item.compartment_id }}'
        defined_tags: '{{ item.defined_tags }}'
        freeform_tags: '{{ item.freeform_tags }}'
        name: '{{ item.name }}'
        time_created: '{{ item.time_created }}'
        ocid: '{{ item.ocid }}'
        status: '{{ item.status }}'
    # required_params: ['compartmentId']
