version: '1.0'
provider: oci
service: apm_config
services:
  client: apm_config
  module: oci.apm_config
discovery:
- discovery_id: oci.apm_config.get_match_agents_with_attribute_key
  calls:
  - action: get_match_agents_with_attribute_key
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.apm_config.get_config
  calls:
  - action: get_config
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
