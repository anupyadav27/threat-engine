# Discovery YAML — multicloud (OCI)
# Generated: 2026-02-21T04:45:39Z
version: '1.0'
provider: oci
service: multicloud
services:
  client: multicloud
  module: oci.multicloud
discovery:
  # ── get_resource_anchor [dependent] ──
  - discovery_id: oci.multicloud.get_resource_anchor
    calls:
      - action: get_resource_anchor
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        compartment_id: '{{ response.data.compartment_id }}'
        defined_tags: '{{ response.data.defined_tags }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        name: '{{ response.data.name }}'
        time_created: '{{ response.data.time_created }}'
        ocid: '{{ response.data.ocid }}'
        status: '{{ response.data.status }}'
    # required_params: ['ResourceAnchorId']
  # ── list_resource_anchors [dependent] ──
  - discovery_id: oci.multicloud.list_resource_anchors
    calls:
      - action: list_resource_anchors
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        compartment_id: '{{ item.compartment_id }}'
        defined_tags: '{{ item.defined_tags }}'
        freeform_tags: '{{ item.freeform_tags }}'
        name: '{{ item.name }}'
        time_created: '{{ item.time_created }}'
        ocid: '{{ item.ocid }}'
        status: '{{ item.status }}'
    # required_params: ['compartmentId']
