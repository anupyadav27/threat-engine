# Discovery YAML — events (OCI)
# Generated: 2026-02-21T04:45:39Z
version: '1.0'
provider: oci
service: events
services:
  client: events
  module: oci.events
discovery:
  # ── get_rule [dependent] ──
  - discovery_id: oci.events.get_rule
    calls:
      - action: get_rule
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        compartment_id: '{{ response.data.compartment_id }}'
        defined_tags: '{{ response.data.defined_tags }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        name: '{{ response.data.name }}'
        time_created: '{{ response.data.time_created }}'
        ocid: '{{ response.data.ocid }}'
        status: '{{ response.data.status }}'
    # required_params: ['RuleId']
  # ── list_rules [dependent] ──
  - discovery_id: oci.events.list_rules
    calls:
      - action: list_rules
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        compartment_id: '{{ item.compartment_id }}'
        defined_tags: '{{ item.defined_tags }}'
        freeform_tags: '{{ item.freeform_tags }}'
        name: '{{ item.name }}'
        time_created: '{{ item.time_created }}'
        ocid: '{{ item.ocid }}'
        status: '{{ item.status }}'
    # required_params: ['compartmentId']
