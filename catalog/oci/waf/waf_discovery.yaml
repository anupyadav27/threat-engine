version: '1.0'
provider: oci
service: waf
services:
  client: waf
  module: oci.waf
discovery:
- discovery_id: oci.waf.get_network_address_list
  calls:
  - action: get_network_address_list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.waf.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.waf.get_web_app_firewall_policy
  calls:
  - action: get_web_app_firewall_policy
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.waf.get_web_app_firewall
  calls:
  - action: get_web_app_firewall
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.waf.list_work_request_errors
  for_each: oci.waf.get_network_address_list
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.waf.list_protection_capabilities
  for_each: oci.waf.get_network_address_list
  calls:
  - action: list_protection_capabilities
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.waf.list_protection_capability_group_tags
  for_each: oci.waf.get_network_address_list
  calls:
  - action: list_protection_capability_group_tags
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.waf.list_work_request_logs
  for_each: oci.waf.get_network_address_list
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
