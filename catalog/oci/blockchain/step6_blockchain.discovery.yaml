# Discovery YAML — blockchain (OCI)
# Generated: 2026-02-21T04:45:38Z
version: '1.0'
provider: oci
service: blockchain
services:
  client: blockchain
  module: oci.blockchain
discovery:
  # ── get_blockchain_platform [dependent] ──
  - discovery_id: oci.blockchain.get_blockchain_platform
    calls:
      - action: get_blockchain_platform
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        compartment_id: '{{ response.data.compartment_id }}'
        defined_tags: '{{ response.data.defined_tags }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        name: '{{ response.data.name }}'
        time_created: '{{ response.data.time_created }}'
        ocid: '{{ response.data.ocid }}'
        status: '{{ response.data.status }}'
    # required_params: ['BlockchainPlatformId']
