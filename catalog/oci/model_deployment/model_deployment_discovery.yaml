version: '1.0'
provider: oci
service: model_deployment
services:
  client: model_deployment
  module: boto3.client
discovery:
- discovery_id: oci.model_deployment.listModelDeployment
  calls:
  - action: listModelDeployment
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.model_deployment.listModelDeploymentByCompartment
  calls:
  - action: listModelDeploymentByCompartment
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.model_deployment.getModelDeployment
  calls:
  - action: getModelDeployment
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.model_deployment.getModelDeploymentDetails
  calls:
  - action: getModelDeploymentDetails
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
