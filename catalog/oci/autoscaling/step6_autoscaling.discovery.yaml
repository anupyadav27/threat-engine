# Discovery YAML — autoscaling (OCI)
# Generated: 2026-02-21T04:45:38Z
version: '1.0'
provider: oci
service: autoscaling
services:
  client: autoscaling
  module: oci.autoscaling
discovery:
  # ── get_auto_scaling_configuration [dependent] ──
  - discovery_id: oci.autoscaling.get_auto_scaling_configuration
    calls:
      - action: get_auto_scaling_configuration
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        compartment_id: '{{ response.data.compartment_id }}'
        defined_tags: '{{ response.data.defined_tags }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        name: '{{ response.data.name }}'
        time_created: '{{ response.data.time_created }}'
        ocid: '{{ response.data.ocid }}'
        status: '{{ response.data.status }}'
    # required_params: ['AutoScalingConfigurationId']
  # ── get_auto_scaling_policy [dependent] ──
  - discovery_id: oci.autoscaling.get_auto_scaling_policy
    calls:
      - action: get_auto_scaling_policy
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        compartment_id: '{{ response.data.compartment_id }}'
        defined_tags: '{{ response.data.defined_tags }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        name: '{{ response.data.name }}'
        time_created: '{{ response.data.time_created }}'
        ocid: '{{ response.data.ocid }}'
        status: '{{ response.data.status }}'
    # required_params: ['AutoScalingPolicyId']
  # ── list_auto_scaling_configurations [dependent] ──
  - discovery_id: oci.autoscaling.list_auto_scaling_configurations
    calls:
      - action: list_auto_scaling_configurations
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        compartment_id: '{{ item.compartment_id }}'
        defined_tags: '{{ item.defined_tags }}'
        freeform_tags: '{{ item.freeform_tags }}'
        name: '{{ item.name }}'
        time_created: '{{ item.time_created }}'
        ocid: '{{ item.ocid }}'
        status: '{{ item.status }}'
    # required_params: ['compartmentId']
  # ── list_auto_scaling_policies [dependent] ──
  - discovery_id: oci.autoscaling.list_auto_scaling_policies
    calls:
      - action: list_auto_scaling_policies
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        compartment_id: '{{ item.compartment_id }}'
        defined_tags: '{{ item.defined_tags }}'
        freeform_tags: '{{ item.freeform_tags }}'
        name: '{{ item.name }}'
        time_created: '{{ item.time_created }}'
        ocid: '{{ item.ocid }}'
        status: '{{ item.status }}'
    # required_params: ['compartmentId']
