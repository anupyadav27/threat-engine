# Discovery YAML — osub_subscription (OCI)
# Generated: 2026-02-21T04:45:39Z
version: '1.0'
provider: oci
service: osub_subscription
services:
  client: osub_subscription
  module: oci.osub_subscription
discovery:
  # ── list_subscriptions [dependent] ──
  - discovery_id: oci.osub_subscription.list_subscriptions
    calls:
      - action: list_subscriptions
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        compartment_id: '{{ item.compartment_id }}'
        defined_tags: '{{ item.defined_tags }}'
        freeform_tags: '{{ item.freeform_tags }}'
        name: '{{ item.name }}'
        time_created: '{{ item.time_created }}'
        ocid: '{{ item.ocid }}'
        status: '{{ item.status }}'
    # required_params: ['compartmentId']
