version: '1.0'
provider: oci
service: cluster_placement_groups
services:
  client: cluster_placement_groups
  module: oci.cluster_placement_groups
discovery:
- discovery_id: oci.cluster_placement_groups.get_cluster_placement_group
  calls:
  - action: get_cluster_placement_group
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.cluster_placement_groups.get_work_request
  calls:
  - action: get_work_request
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.cluster_placement_groups.list_work_request_errors
  for_each: oci.cluster_placement_groups.get_cluster_placement_group
  calls:
  - action: list_work_request_errors
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.cluster_placement_groups.list_work_request_logs
  for_each: oci.cluster_placement_groups.get_cluster_placement_group
  calls:
  - action: list_work_request_logs
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
