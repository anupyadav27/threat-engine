version: '1.0'
provider: oci
service: email_data_plane
services:
  client: email_data_plane
  module: boto3.client
discovery:
- discovery_id: oci.email_data_plane.listEmailDataPlane
  calls:
  - action: listEmailDataPlane
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.email_data_plane.listEmailDataPlaneByCompartment
  calls:
  - action: listEmailDataPlaneByCompartment
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.email_data_plane.getEmailDataPlane
  calls:
  - action: getEmailDataPlane
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.email_data_plane.getEmailDataPlaneDetails
  calls:
  - action: getEmailDataPlaneDetails
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
