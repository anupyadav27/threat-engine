version: '1.0'
provider: oci
service: license_manager
services:
  client: license_manager
  module: oci.license_manager
discovery:
- discovery_id: oci.license_manager.get_product_license
  calls:
  - action: get_product_license
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.license_manager.get_license_record
  calls:
  - action: get_license_record
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.license_manager.get_configuration
  calls:
  - action: get_configuration
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.license_manager.get_license_metric
  calls:
  - action: get_license_metric
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.license_manager.get_bulk_upload_template
  calls:
  - action: get_bulk_upload_template
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.license_manager.list_product_license_consumers
  for_each: oci.license_manager.get_product_license
  calls:
  - action: list_product_license_consumers
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.license_manager.list_top_utilized_resources
  for_each: oci.license_manager.get_product_license
  calls:
  - action: list_top_utilized_resources
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.license_manager.list_top_utilized_product_licenses
  for_each: oci.license_manager.get_product_license
  calls:
  - action: list_top_utilized_product_licenses
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
- discovery_id: oci.license_manager.list_product_licenses
  for_each: oci.license_manager.get_product_license
  calls:
  - action: list_product_licenses
    save_as: response
    on_error: continue
    params:
      compartment_id: '{{ item.compartment_id }}'
  emit:
    as: item
    items_for: '{{ response }}'
checks: []
