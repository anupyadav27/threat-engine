# Discovery YAML — key_management (OCI)
# Generated: 2026-02-21T04:45:39Z
version: '1.0'
provider: oci
service: key_management
services:
  client: key_management
  module: oci.key_management
discovery:
  # ── get_vault [dependent] ──
  - discovery_id: oci.key_management.get_vault
    calls:
      - action: get_vault
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        compartment_id: '{{ response.data.compartment_id }}'
        defined_tags: '{{ response.data.defined_tags }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        name: '{{ response.data.name }}'
        time_created: '{{ response.data.time_created }}'
        ocid: '{{ response.data.ocid }}'
        status: '{{ response.data.status }}'
    # required_params: ['VaultId']
  # ── get_vault_usage [dependent] ──
  - discovery_id: oci.key_management.get_vault_usage
    calls:
      - action: get_vault_usage
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        compartment_id: '{{ response.data.compartment_id }}'
        defined_tags: '{{ response.data.defined_tags }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        name: '{{ response.data.name }}'
        time_created: '{{ response.data.time_created }}'
        ocid: '{{ response.data.ocid }}'
        status: '{{ response.data.status }}'
    # required_params: ['VaultUsageId']
  # ── list_vault_replicas [dependent] ──
  - discovery_id: oci.key_management.list_vault_replicas
    calls:
      - action: list_vault_replicas
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        compartment_id: '{{ item.compartment_id }}'
        defined_tags: '{{ item.defined_tags }}'
        freeform_tags: '{{ item.freeform_tags }}'
        name: '{{ item.name }}'
        time_created: '{{ item.time_created }}'
        ocid: '{{ item.ocid }}'
        status: '{{ item.status }}'
    # required_params: ['compartmentId']
  # ── list_vaults [dependent] ──
  - discovery_id: oci.key_management.list_vaults
    calls:
      - action: list_vaults
        save_as: response
        on_error: continue
    emit:
      as: item
      items_for: '{{ response.data }}'
      item:
        compartment_id: '{{ item.compartment_id }}'
        defined_tags: '{{ item.defined_tags }}'
        freeform_tags: '{{ item.freeform_tags }}'
        name: '{{ item.name }}'
        time_created: '{{ item.time_created }}'
        crypto_endpoint: '{{ item.crypto_endpoint }}'
        management_endpoint: '{{ item.management_endpoint }}'
        ocid: '{{ item.ocid }}'
        status: '{{ item.status }}'
        vault_type: '{{ item.vault_type }}'
    # required_params: ['compartmentId']
