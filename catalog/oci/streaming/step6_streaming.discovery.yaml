# Discovery YAML — streaming (OCI)
# Generated: 2026-02-21T04:45:39Z
version: '1.0'
provider: oci
service: streaming
services:
  client: streaming
  module: oci.streaming
discovery:
  # ── get_group [dependent] ──
  - discovery_id: oci.streaming.get_group
    calls:
      - action: get_group
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        compartment_id: '{{ response.data.compartment_id }}'
        defined_tags: '{{ response.data.defined_tags }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        name: '{{ response.data.name }}'
        time_created: '{{ response.data.time_created }}'
        ocid: '{{ response.data.ocid }}'
        status: '{{ response.data.status }}'
    # required_params: ['GroupId']
  # ── get_messages [dependent] ──
  - discovery_id: oci.streaming.get_messages
    calls:
      - action: get_messages
        save_as: response
        on_error: continue
    emit:
      as: item
      item:
        compartment_id: '{{ response.data.compartment_id }}'
        defined_tags: '{{ response.data.defined_tags }}'
        freeform_tags: '{{ response.data.freeform_tags }}'
        name: '{{ response.data.name }}'
        time_created: '{{ response.data.time_created }}'
        ocid: '{{ response.data.ocid }}'
        status: '{{ response.data.status }}'
    # required_params: ['MessagId']
