version: '1.0'
rule_id: threat.gcp.audit.functions_iam
for_each: gcp.cloudfunctions.list_functions
severity: MEDIUM
conditions:
  all:
  - var: item.iamPolicy.bindings[].members[]
    op: not_contains
    value: allUsers
  - var: item.iamPolicy.bindings[].members[]
    op: not_contains
    value: allAuthenticatedUsers
