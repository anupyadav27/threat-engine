version: '1.0'
rule_id: threat.gcp.execute.gke_portforward
for_each: gcp.container.list_clusters
severity: MEDIUM
conditions:
  all:
  - var: item.NodePools[].Config.Metadata['disable-legacy-endpoints']
    op: equals
    value: 'true'
  - var: item.NodePools[].Config.Metadata['block-project-ssh-keys']
    op: equals
    value: 'true'
