version: '1.0'
rule_id: threat.gcp.network.vpc_rdp_denied
for_each: gcp.compute.list_firewalls
severity: MEDIUM
conditions:
  all:
  - var: item.direction
    op: equals
    value: INGRESS
  - var: item.allowed[].ports[]
    op: contains
    value: '3389'
  - var: item.sourceRanges[]
    op: contains
    value: 0.0.0.0/0
  - var: item.disabled
    op: is_false
