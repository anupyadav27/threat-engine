version: '1.0'
rule_id: threat.gcp.audit.run_service_iam
for_each: gcp.run.services.list
severity: MEDIUM
conditions:
  all:
  - var: item.iamPolicy.bindings[].members[]
    op: not_contains
    value: allUsers
  - var: item.iamPolicy.bindings[].members[]
    op: not_contains
    value: allAuthenticatedUsers
