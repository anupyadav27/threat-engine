version: '1.0'
rule_id: threat.gcp.network.vpc_telnet_allow
for_each: gcp.compute.firewalls.list
severity: MEDIUM
conditions:
  all:
  - var: item.direction
    op: equals
    value: INGRESS
  - var: item.allowed[].IPProtocol
    op: contains
    value: tcp
  - var: item.allowed[].ports[]
    op: contains
    value: '23'
  - var: item.sourceRanges[]
    op: contains
    value: 0.0.0.0/0
