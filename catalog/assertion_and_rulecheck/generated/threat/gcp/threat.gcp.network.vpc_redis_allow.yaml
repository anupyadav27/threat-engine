version: '1.0'
rule_id: threat.gcp.network.vpc_redis_allow
for_each: gcp.redis.list_instances
severity: MEDIUM
conditions:
  all:
  - var: item.authorizedNetwork
    op: exists
  - var: item.authorizedNetwork
    op: not_equals
    value: default
  - var: item.connectMode
    op: equals
    value: PRIVATE_SERVICE_ACCESS
