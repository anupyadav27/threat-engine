version: '1.0'
rule_id: oci.key_management.key.hsm_client_cert_key_length_minimum
for_each: oci.key_management.list_keys
severity: HIGH
conditions:
  all:
  - var: item.protection_mode
    op: equals
    value: HSM
  - var: item.algorithm
    op: in
    value:
    - AES_256
    - RSA_2048
    - RSA_3072
    - RSA_4096
    - ECDSA_P256
    - ECDSA_P384
    - ECDSA_P521
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags'', ''algorithm''])'
