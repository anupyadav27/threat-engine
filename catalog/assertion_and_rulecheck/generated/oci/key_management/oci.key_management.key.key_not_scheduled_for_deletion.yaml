version: '1.0'
rule_id: oci.key_management.key.key_not_scheduled_for_deletion
for_each: oci.key_management.list_keys
severity: HIGH
conditions:
  var: item.status
  op: not_equals
  value: PENDING_DELETION
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''status'', ''freeform_tags'', ''defined_tags'',
  ''algorithm'', ''current_key_version''])'
