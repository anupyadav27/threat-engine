version: '1.0'
rule_id: oci.key_management.vault.encryption_cmek_enabled
for_each: oci.key_management.list_vaults
severity: HIGH
conditions:
  var: item.vault_type
  op: equals
  value: VIRTUAL_PRIVATE
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags'', ''crypto_endpoint''])'
