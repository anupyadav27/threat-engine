version: '1.0'
rule_id: oci.identity.user.group_policy_oke_admin_required_permissions
for_each: oci.identity.list_policies
severity: CRITICAL
conditions:
  all:
  - var: item.statements
    op: contains
    value: Allow group OKE-Admins to manage all-resources in compartment
  - var: item.statements
    op: contains
    value: Allow group OKE-Admins to read all-resources in tenancy
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags'', ''statements''])'
