version: '1.0'
rule_id: oci.identity.policy.password_policy_require_upper_lower_number_special_restricted
for_each: oci.identity.get_authentication_policy
severity: MEDIUM
conditions:
  all:
  - var: item.password_policy.is_lowercase_characters_required
    op: is_true
  - var: item.password_policy.is_numeric_characters_required
    op: is_true
  - var: item.password_policy.is_special_characters_required
    op: is_true
  - var: item.password_policy.is_uppercase_characters_required
    op: is_true
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
