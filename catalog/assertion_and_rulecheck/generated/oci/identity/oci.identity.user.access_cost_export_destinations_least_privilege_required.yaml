version: '1.0'
rule_id: oci.identity.user.access_cost_export_destinations_least_privilege_required
for_each: oci.identity.list_policies
severity: HIGH
conditions:
  all:
  - var: item.statements
    op: contains
    value: Allow group CostMgmtGroup to manage usage-reports in tenancy
  - var: item.statements
    op: not_contains
    value: Allow any-user to manage usage-reports in tenancy
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags'', ''statements''])'
