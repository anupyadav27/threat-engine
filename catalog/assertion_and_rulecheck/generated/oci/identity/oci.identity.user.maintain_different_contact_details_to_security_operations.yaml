version: '1.0'
rule_id: oci.identity.user.maintain_different_contact_details_to_security_operations
for_each: oci.identity.list_users
severity: MEDIUM
conditions:
  all:
  - var: item.email
    op: exists
  - var: item.email
    op: not_contains
    value: security
  - var: item.email
    op: not_contains
    value: secops
  - var: item.email
    op: not_contains
    value: soc
