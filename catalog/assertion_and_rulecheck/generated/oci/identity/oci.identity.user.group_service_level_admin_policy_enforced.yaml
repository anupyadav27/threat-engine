version: '1.0'
rule_id: oci.identity.user.group_service_level_admin_policy_enforced
for_each: oci.identity.list_policies
severity: CRITICAL
conditions:
  all:
  - var: item.statements
    op: contains
    value: Allow group ServiceLevelAdmins to manage all-resources in tenancy
  - var: item.statements
    op: not_contains
    value: Allow group ServiceLevelAdmins to manage users in tenancy
  - var: item.statements
    op: not_contains
    value: Allow group ServiceLevelAdmins to manage groups in tenancy
  - var: item.statements
    op: not_contains
    value: Allow group ServiceLevelAdmins to manage policies in tenancy
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags'', ''statements''])'
