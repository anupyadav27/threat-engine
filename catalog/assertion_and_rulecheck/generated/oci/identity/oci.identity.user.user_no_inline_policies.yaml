version: '1.0'
rule_id: oci.identity.user.user_no_inline_policies
for_each: oci.identity.list_users
severity: MEDIUM
conditions:
  all:
  - var: item.capabilities.can_use_console_password
    op: exists
  - var: item.capabilities.can_use_api_keys
    op: exists
  - var: item.capabilities.can_use_auth_tokens
    op: exists
  - var: item.capabilities.can_use_smtp_credentials
    op: exists
  - var: item.capabilities.can_use_customer_secret_keys
    op: exists
  - var: item.capabilities.can_use_o_auth2_client_credentials
    op: exists
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags'', ''email''])'
