version: '1.0'
rule_id: oci.identity.tag_namespace.allocation_untagged_resource_alerts_enabled
for_each: oci.identity.list_policies
severity: MEDIUM
conditions:
  var: item.statements
  op: contains
  value: all {resource.type = 'tagnamespace', resource.compartment.id = tagnamespace.compartment.id} request.permission='TAG_NAMESPACE_ALLOCATE_UNTAGGED_RESOURCE_ALERT'
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags'', ''statements''])'
