version: '1.0'
rule_id: oci.identity.policy.tenant_password_policy_compliant_restricted
for_each: oci.identity.get_authentication_policy
severity: MEDIUM
conditions:
  all:
  - var: item.passwordPolicy.isLowercaseCharactersRequired
    op: is_true
  - var: item.passwordPolicy.isUppercaseCharactersRequired
    op: is_true
  - var: item.passwordPolicy.isNumericCharactersRequired
    op: is_true
  - var: item.passwordPolicy.isSpecialCharactersRequired
    op: is_true
  - var: item.passwordPolicy.minimumPasswordLength
    op: gte
    value: 14
  - var: item.passwordPolicy.isUsernameContainmentAllowed
    op: is_false
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
