version: '1.0'
rule_id: oci.identity.user.policy_guest_users_access_restrictions
for_each: oci.identity.list_policies
severity: MEDIUM
conditions:
  all:
  - var: item.statements
    op: contains
    value: Allow group Administrators to manage all-resources in tenancy
  - var: item.statements
    op: not_contains
    value: Allow any-user to manage all-resources in tenancy
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags'', ''statements''])'
