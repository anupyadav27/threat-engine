version: '1.0'
rule_id: oci.identity.policy.role_trust_requires_external_id_or_restricted
for_each: oci.identity.list_policies
severity: MEDIUM
conditions:
  all:
  - var: item.statements
    op: contains
    value: Allow
  - any:
    - var: item.statements
      op: contains
      value: sts:AssumeRole
    - var: item.statements
      op: contains
      value: AssumeRole
  - all:
    - var: item.statements
      op: contains
      value: ExternalId
    - var: item.statements
      op: not_contains
      value: 0.0.0.0/0
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags'', ''statements''])'
