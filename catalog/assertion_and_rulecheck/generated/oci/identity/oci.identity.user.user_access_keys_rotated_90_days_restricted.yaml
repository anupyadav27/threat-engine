version: '1.0'
rule_id: oci.identity.user.user_access_keys_rotated_90_days_restricted
for_each: oci.identity.list_users
severity: HIGH
conditions:
  all:
  - var: item.is_mfa_activated
    op: is_true
  - var: item.time_created
    op: gte
    value: '90'
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags'', ''email''])'
