version: '1.0'
rule_id: oci.artifacts.container_repository.registry_repo_private_or_access_restricted_restricted
for_each: oci.artifacts.list_container_repositories
severity: LOW
conditions:
  any:
  - var: item.is_public
    op: is_false
  - var: item.readme.content
    op: contains
    value: access restricted
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
