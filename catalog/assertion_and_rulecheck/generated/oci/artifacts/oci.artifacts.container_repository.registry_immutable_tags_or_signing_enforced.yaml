version: '1.0'
rule_id: oci.artifacts.container_repository.registry_immutable_tags_or_signing_enforced
for_each: oci.artifacts.list_container_repositories
severity: LOW
conditions:
  all:
  - var: item.is_immutable
    op: is_true
  - var: item.is_public
    op: is_false
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
