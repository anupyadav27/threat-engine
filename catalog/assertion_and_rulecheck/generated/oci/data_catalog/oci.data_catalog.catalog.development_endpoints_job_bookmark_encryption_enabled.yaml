version: '1.0'
rule_id: oci.data_catalog.catalog.development_endpoints_job_bookmark_encryption_enabled
for_each: oci.data_catalog.list_catalogs
severity: HIGH
conditions:
  all:
  - var: item.attached_catalog_private_endpoints[].id
    op: exists
  - var: item.lifecycle_state
    op: equals
    value: ACTIVE
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
