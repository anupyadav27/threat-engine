version: '1.0'
rule_id: oci.data_catalog.catalog.job_logs_and_metrics_enabled
for_each: oci.data_catalog.list_catalogs
severity: LOW
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - var: item.freeform_tags.Environment
    op: exists
  - var: item.defined_tags.Environment
    op: exists
