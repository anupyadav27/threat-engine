version: '1.0'
rule_id: oci.data_catalog.catalog.ai_services_model_execution_role_least_privilege_required
for_each: oci.data_catalog.list_catalogs
severity: HIGH
conditions:
  all:
  - var: item.attached_catalog_private_endpoints[].lifecycle_state
    op: contains
    value: ACTIVE
  - var: item.attached_catalog_private_endpoints[].dns_zones
    op: not_contains
    value: public
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
