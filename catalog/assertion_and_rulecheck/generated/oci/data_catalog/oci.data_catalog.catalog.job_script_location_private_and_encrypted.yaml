version: '1.0'
rule_id: oci.data_catalog.catalog.job_script_location_private_and_encrypted
for_each: oci.data_catalog.list_catalogs
severity: MEDIUM
conditions:
  all:
  - var: item.job_script_location
    op: exists
  - var: item.job_script_location.is_private
    op: is_true
  - var: item.job_script_location.is_encrypted
    op: is_true
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
