version: '1.0'
rule_id: oci.data_catalog.catalog.connection_role_least_privilege_required
for_each: oci.data_catalog.list_catalogs
severity: HIGH
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - var: item.freeform_tags.Environment
    op: exists
  - var: item.defined_tags.Environment
    op: exists
