version: '1.0'
rule_id: oci.data_catalog.catalog.workflow_execution_role_least_privilege_required
for_each: oci.data_catalog.list_catalogs
severity: HIGH
conditions:
  all:
  - var: item.workflow_execution_role
    op: exists
  - var: item.workflow_execution_role
    op: not_equals
    value: DataCatalogAdminRole
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
