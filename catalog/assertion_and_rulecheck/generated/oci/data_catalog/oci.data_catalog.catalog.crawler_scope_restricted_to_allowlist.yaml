version: '1.0'
rule_id: oci.data_catalog.catalog.crawler_scope_restricted_to_allowlist
for_each: oci.data_catalog.list_catalogs
severity: MEDIUM
conditions:
  all:
  - var: item.freeform_tags.Environment
    op: equals
    value: production
  - var: item.defined_tags.Environment
    op: equals
    value: production
