version: '1.0'
rule_id: oci.mysql.db_system.flexible_server_log_retention_days_greater_3
for_each: oci.mysql.list_db_systems
severity: LOW
conditions:
  all:
  - var: item.backup_policy
    op: exists
  - var: item.backup_policy.retention_in_days
    op: gte
    value: '3'
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags'', ''mysql_version''])'
