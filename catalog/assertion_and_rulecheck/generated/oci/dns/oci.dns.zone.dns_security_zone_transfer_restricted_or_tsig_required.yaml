version: '1.0'
rule_id: oci.dns.zone.dns_security_zone_transfer_restricted_or_tsig_required
for_each: oci.dns.list_records
severity: LOW
conditions:
  all:
  - var: item.rtype
    op: equals
    value: TSIG
  - var: item.rdata
    op: exists
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags'', ''rtype''])'
