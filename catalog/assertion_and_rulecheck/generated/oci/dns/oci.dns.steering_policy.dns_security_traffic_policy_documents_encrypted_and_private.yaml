version: '1.0'
rule_id: oci.dns.steering_policy.dns_security_traffic_policy_documents_encrypted_and_private
for_each: oci.dns.list_records
severity: MEDIUM
conditions:
  all:
  - var: item.rtype
    op: equals
    value: STEERING_POLICY
  - var: item.rdata
    op: contains
    value: encrypted
  - var: item.rdata
    op: not_contains
    value: public
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags'', ''rtype''])'
