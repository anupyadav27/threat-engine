version: '1.0'
rule_id: oci.dns.steering_policy.dns_security_traffic_policy_health_checks_failover
for_each: oci.dns.list_records
severity: MEDIUM
conditions:
  all:
  - var: item.rtype
    op: equals
    value: STEERING_POLICY
  - var: item.rdata
    op: contains
    value: healthCheck
  - var: item.rdata
    op: contains
    value: failover
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags'', ''rtype''])'
