version: '1.0'
rule_id: oci.dns.record.dns_security_record_set_caa_records_wildcard
for_each: oci.dns.list_records
severity: LOW
conditions:
  all:
  - var: item.rtype
    op: equals
    value: CAA
  - var: item.rdata
    op: contains
    value: issuewild
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags'', ''rtype''])'
