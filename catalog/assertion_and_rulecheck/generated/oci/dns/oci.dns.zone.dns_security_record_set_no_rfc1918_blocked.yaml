version: '1.0'
rule_id: oci.dns.zone.dns_security_record_set_no_rfc1918_blocked
for_each: oci.dns.list_records
severity: LOW
conditions:
  all:
  - var: item.rtype
    op: equals
    value: TXT
  - var: item.rdata
    op: contains
    value: v=spf1
  - var: item.rdata
    op: not_contains
    value: include:spf.protection.outlook.com
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags'', ''rtype''])'
