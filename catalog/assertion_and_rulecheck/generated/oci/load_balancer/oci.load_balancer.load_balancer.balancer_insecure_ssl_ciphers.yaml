version: '1.0'
rule_id: oci.load_balancer.load_balancer.balancer_insecure_ssl_ciphers
for_each: oci.load_balancer.list_load_balancers
severity: MEDIUM
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - any:
    - var: item.ip_addresses
      op: not_exists
    - var: item.ip_addresses
      op: is_empty
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags'', ''ip_addresses''])'
