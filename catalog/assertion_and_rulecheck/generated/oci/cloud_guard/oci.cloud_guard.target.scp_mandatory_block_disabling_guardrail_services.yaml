version: '1.0'
rule_id: oci.cloud_guard.target.scp_mandatory_block_disabling_guardrail_services
for_each: oci.cloud_guard.list_targets
severity: LOW
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - var: item.target_resource_type
    op: equals
    value: COMPARTMENT
  - var: item.target_detector_recipes[].detector_rules[].detector
    op: contains
    value: CONFIGURATION_DETECTOR
  - var: item.target_detector_recipes[].detector_rules[].detector_rule_id
    op: contains
    value: DISABLE_GUARDRAIL_SERVICES_BLOCK
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
