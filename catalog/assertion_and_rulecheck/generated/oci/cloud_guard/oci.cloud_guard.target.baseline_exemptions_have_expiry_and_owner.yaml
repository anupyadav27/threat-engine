version: '1.0'
rule_id: oci.cloud_guard.target.baseline_exemptions_have_expiry_and_owner
for_each: oci.cloud_guard.list_targets
severity: LOW
conditions:
  all:
  - var: item.baseline_exemptions[].expiry_date
    op: exists
  - var: item.baseline_exemptions[].owner
    op: exists
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
