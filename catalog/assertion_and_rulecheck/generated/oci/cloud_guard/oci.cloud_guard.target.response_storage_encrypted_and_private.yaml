version: '1.0'
rule_id: oci.cloud_guard.target.response_storage_encrypted_and_private
for_each: oci.cloud_guard.list_targets
severity: MEDIUM
conditions:
  all:
  - var: item.response_storage_encrypted
    op: is_true
  - var: item.response_storage_private
    op: is_true
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
