version: '1.0'
rule_id: oci.cloud_guard.target.aggregation_authorization_trusts_least_privilege_required
for_each: oci.cloud_guard.list_targets
severity: HIGH
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - var: item.freeform_tags.Environment
    op: exists
  - var: item.defined_tags.Environment
    op: exists
