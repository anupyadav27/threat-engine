version: '1.0'
rule_id: oci.cloud_guard.target.ensure_notify_alerts_severity_is_high
for_each: oci.cloud_guard.list_targets
severity: LOW
conditions:
  var: item.notify_alerts_severity
  op: equals
  value: HIGH
