version: '1.0'
rule_id: oci.cloud_guard.target.automation_artifacts_encrypted_and_private
for_each: oci.cloud_guard.list_targets
severity: MEDIUM
conditions:
  all:
  - var: item.target_resource_type
    op: equals
    value: AUTOMATION
  - var: item.target_detector_recipes[].detector_rules[].details.condition.metadata.encryption_state
    op: equals
    value: ENCRYPTED
  - var: item.target_detector_recipes[].detector_rules[].details.condition.metadata.is_private
    op: is_true
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
