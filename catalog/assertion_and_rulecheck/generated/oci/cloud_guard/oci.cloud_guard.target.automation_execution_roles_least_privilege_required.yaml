version: '1.0'
rule_id: oci.cloud_guard.target.automation_execution_roles_least_privilege_required
for_each: oci.cloud_guard.list_targets
severity: HIGH
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - var: item.target_resource_type
    op: not_contains
    value: AUTOMATION_EXECUTION_ROLE
