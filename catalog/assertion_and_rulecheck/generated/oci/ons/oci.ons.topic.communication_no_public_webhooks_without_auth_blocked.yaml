version: '1.0'
rule_id: oci.ons.topic.communication_no_public_webhooks_without_auth_blocked
for_each: oci.ons.list_subscriptions
severity: CRITICAL
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - any:
    - var: item.protocol
      op: not_equals
      value: HTTPS
    - var: item.endpoint
      op: not_contains
      value: https://
    - var: item.endpoint
      op: contains
      value: oauth
    - var: item.endpoint
      op: contains
      value: auth
    - var: item.endpoint
      op: contains
      value: token
