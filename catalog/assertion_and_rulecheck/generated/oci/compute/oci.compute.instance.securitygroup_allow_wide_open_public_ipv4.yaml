version: '1.0'
rule_id: oci.compute.instance.securitygroup_allow_wide_open_public_ipv4
for_each: oci.compute.list_instances
severity: CRITICAL
conditions:
  all:
  - var: item.security_groups[].rules[].source
    op: not_contains
    value: 0.0.0.0/0
  - var: item.security_groups[].rules[].source_type
    op: equals
    value: CIDR_BLOCK
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags'', ''availability_domain''])'
