version: '1.0'
rule_id: oci.compute.instance.securitygroup_common_ports_restricted
for_each: oci.compute.list_instances
severity: LOW
conditions:
  all:
  - var: item.security_groups[].security_rules[].source
    op: not_contains
    value: 0.0.0.0/0
  - var: item.security_groups[].security_rules[].destination_port_range.max
    op: not_in
    value:
    - 22
    - 3389
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''status'', ''freeform_tags'', ''defined_tags''])'
