version: '1.0'
rule_id: oci.compute.instance.instance_port_elasticsearch_kibana_exposed_to_internet
for_each: oci.compute.list_instances
severity: CRITICAL
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - any:
    - var: item.metadata
      op: not_contains
      value: elasticsearch
    - var: item.metadata
      op: not_contains
      value: kibana
    - var: item.metadata
      op: not_contains
      value: '9200'
    - var: item.metadata
      op: not_contains
      value: '5601'
