version: '1.0'
rule_id: oci.compute.instance.firewall_ssh_access_from_the_internet_allowed
for_each: oci.compute.list_instances
severity: MEDIUM
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - any:
    - var: item.metadata
      op: not_exists
    - var: item.metadata
      op: is_empty
    - var: item.metadata
      op: not_contains
      value: ssh-authorized-keys
