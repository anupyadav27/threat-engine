version: '1.0'
rule_id: oci.compute.instance.launch_template_user_data_no_secrets
for_each: oci.compute.list_instances
severity: HIGH
conditions:
  all:
  - var: item.metadata
    op: exists
  - var: item.metadata
    op: not_contains
    value: ssh-rsa
  - var: item.metadata
    op: not_contains
    value: '-----BEGIN RSA PRIVATE KEY-----'
  - var: item.metadata
    op: not_contains
    value: '-----BEGIN OPENSSH PRIVATE KEY-----'
  - var: item.metadata
    op: not_contains
    value: '-----BEGIN PRIVATE KEY-----'
  - var: item.metadata
    op: not_contains
    value: '-----BEGIN DSA PRIVATE KEY-----'
  - var: item.metadata
    op: not_contains
    value: '-----BEGIN EC PRIVATE KEY-----'
  - var: item.metadata
    op: not_contains
    value: '-----BEGIN PGP PRIVATE KEY BLOCK-----'
  - var: item.metadata
    op: not_contains
    value: AKIA
  - var: item.metadata
    op: not_contains
    value: secret
  - var: item.metadata
    op: not_contains
    value: password
