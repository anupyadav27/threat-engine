version: '1.0'
rule_id: oci.compute.instance.instance_port_kerberos_exposed_to_internet
for_each: oci.compute.list_instances
severity: CRITICAL
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - var: item.metadata
    op: not_contains
    value: kerberos
  - var: item.metadata
    op: not_contains
    value: port
