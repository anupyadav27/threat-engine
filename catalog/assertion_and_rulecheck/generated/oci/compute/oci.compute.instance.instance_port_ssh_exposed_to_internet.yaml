version: '1.0'
rule_id: oci.compute.instance.instance_port_ssh_exposed_to_internet
for_each: oci.compute.list_instances
severity: CRITICAL
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - any:
    - var: item.metadata
      op: not_exists
    - var: item.metadata
      op: not_contains
      value: ssh-rsa
    - var: item.metadata
      op: not_contains
      value: ssh-ed25519
