version: '1.0'
rule_id: oci.compute.instance.app_env_secrets_from_vault_only
for_each: oci.compute.list_instances
severity: HIGH
conditions:
  all:
  - var: item.metadata
    op: exists
  - var: item.metadata['user_data']
    op: not_exists
  - var: item.metadata['ssh_authorized_keys']
    op: not_exists
