version: '1.0'
rule_id: oci.compute.instance.firewall_rdp_access_from_the_internet_allowed
for_each: oci.compute.list_instances
severity: MEDIUM
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - any:
    - var: item.metadata
      op: not_exists
    - var: item.metadata
      op: is_empty
    - all:
      - var: item.metadata
        op: contains
        value: rdp
      - var: item.metadata
        op: contains
        value: 0.0.0.0/0
      - var: item.metadata
        op: contains
        value: allow
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags'', ''availability_domain''])'
