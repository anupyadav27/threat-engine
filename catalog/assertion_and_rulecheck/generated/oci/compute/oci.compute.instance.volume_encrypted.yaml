version: '1.0'
rule_id: oci.compute.instance.volume_encrypted
for_each: oci.compute.list_instances
severity: MEDIUM
conditions:
  all:
  - var: item.source_details.boot_volume_size_in_gbs
    op: exists
  - var: item.source_details.boot_volume_id
    op: exists
  - any:
    - var: item.source_details.boot_volume_size_in_gbs
      op: gt
      value: 0
    - var: item.source_details.boot_volume_id
      op: not_empty
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags'', ''availability_domain''])'
