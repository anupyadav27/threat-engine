version: '1.0'
rule_id: oci.compute.instance.instance_port_telnet_exposed_to_internet
for_each: oci.compute.list_instances
severity: CRITICAL
conditions:
  all:
  - var: item.security_groups[].security_rules[].source
    op: not_contains
    value: 0.0.0.0/0
  - var: item.security_groups[].security_rules[].destination_port_range.max
    op: not_equals
    value: 23
  - var: item.security_groups[].security_rules[].destination_port_range.min
    op: not_equals
    value: 23
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''status'', ''freeform_tags'', ''defined_tags''])'
