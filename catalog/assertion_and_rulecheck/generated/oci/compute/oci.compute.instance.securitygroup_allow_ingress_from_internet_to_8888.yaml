version: '1.0'
rule_id: oci.compute.instance.securitygroup_allow_ingress_from_internet_to_8888
for_each: oci.compute.list_instances
severity: LOW
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - var: item.security_groups[].ingress_rules[].source
    op: not_contains
    value: 0.0.0.0/0
  - var: item.security_groups[].ingress_rules[].port_range
    op: not_contains
    value: '8888'
