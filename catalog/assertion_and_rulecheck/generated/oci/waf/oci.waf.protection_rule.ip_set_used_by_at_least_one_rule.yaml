version: '1.0'
rule_id: oci.waf.protection_rule.ip_set_used_by_at_least_one_rule
for_each: oci.waf.list_web_app_firewall_policies
severity: LOW
conditions:
  all:
  - var: item.protection_rules[].type
    op: contains
    value: ACCESS_CONTROL
  - var: item.protection_rules[].access_control_rules[].condition
    op: contains
    value: IP
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
