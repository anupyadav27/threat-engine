version: '1.0'
rule_id: oci.container_engine.cluster.rbac_no_cluster_admin_bindings_to_users_enforced
for_each: oci.container_engine.list_clusters
severity: CRITICAL
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - var: item.options.kubernetes_network_config.pods_cidr
    op: exists
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
