version: '1.0'
rule_id: oci.container_engine.cluster.control_plane_logging_all_types_enabled
for_each: oci.container_engine.list_clusters
severity: MEDIUM
conditions:
  all:
  - var: item.options.audit_log_enabled
    op: is_true
  - var: item.options.admission_controller_log_enabled
    op: is_true
  - var: item.options.scheduler_log_enabled
    op: is_true
  - var: item.options.api_server_log_enabled
    op: is_true
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
