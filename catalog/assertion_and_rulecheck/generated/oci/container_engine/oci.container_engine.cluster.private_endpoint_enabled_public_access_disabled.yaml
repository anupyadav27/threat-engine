version: '1.0'
rule_id: oci.container_engine.cluster.private_endpoint_enabled_public_access_disabled
for_each: oci.container_engine.list_clusters
severity: CRITICAL
conditions:
  all:
  - var: item.endpoint_config.nat_gateway_id
    op: exists
  - var: item.endpoint_config.is_public_ip_enabled
    op: is_false
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
