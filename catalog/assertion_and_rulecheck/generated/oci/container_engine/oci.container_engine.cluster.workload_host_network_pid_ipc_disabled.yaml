version: '1.0'
rule_id: oci.container_engine.cluster.workload_host_network_pid_ipc_disabled
for_each: oci.container_engine.list_clusters
severity: MEDIUM
conditions:
  all:
  - var: item.options.are_kubernetes_dashboard_add_on_disabled
    op: is_true
  - var: item.options.are_pod_security_policy_enabled
    op: is_true
  - var: item.options.is_host_pid_enabled
    op: is_false
  - var: item.options.is_host_ipc_enabled
    op: is_false
  - var: item.options.is_host_network_enabled
    op: is_false
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
