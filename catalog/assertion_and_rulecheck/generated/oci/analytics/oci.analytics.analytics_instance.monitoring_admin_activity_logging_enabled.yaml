version: '1.0'
rule_id: oci.analytics.analytics_instance.monitoring_admin_activity_logging_enabled
for_each: oci.analytics.list_analytics_instances
severity: CRITICAL
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - var: item.freeform_tags.Environment
    op: exists
  - var: item.defined_tags.Environment
    op: exists
