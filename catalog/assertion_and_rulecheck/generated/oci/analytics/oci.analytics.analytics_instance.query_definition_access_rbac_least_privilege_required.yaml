version: '1.0'
rule_id: oci.analytics.analytics_instance.query_definition_access_rbac_least_privilege_required
for_each: oci.analytics.list_analytics_instances
severity: HIGH
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - var: item.freeform_tags.Environment
    op: exists
  - var: item.defined_tags.Environment
    op: exists
