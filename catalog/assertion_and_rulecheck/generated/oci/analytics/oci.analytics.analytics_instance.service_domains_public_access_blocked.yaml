version: '1.0'
rule_id: oci.analytics.analytics_instance.service_domains_public_access_blocked
for_each: oci.analytics.list_analytics_instances
severity: CRITICAL
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - var: item.network_endpoint_details.network_endpoint_type
    op: equals
    value: PRIVATE
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
