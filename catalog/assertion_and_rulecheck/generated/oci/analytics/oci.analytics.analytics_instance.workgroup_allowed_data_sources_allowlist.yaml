version: '1.0'
rule_id: oci.analytics.analytics_instance.workgroup_allowed_data_sources_allowlist
for_each: oci.analytics.list_analytics_instances
severity: MEDIUM
conditions:
  all:
  - var: item.workload_type
    op: equals
    value: OLAP
  - var: item.workload_type
    op: not_equals
    value: DW
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
