version: '1.0'
rule_id: oci.analytics.analytics_instance.event_subscription_destination_least_privilege_required
for_each: oci.analytics.list_analytics_instances
severity: HIGH
conditions:
  all:
  - var: item.event_subscription_destination
    op: exists
  - var: item.event_subscription_destination.permissions
    op: not_contains
    value: '*'
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
