version: '1.0'
rule_id: oci.analytics.analytics_instance.api_security_monitoring_logs_retention_days_minimum_enabled
for_each: oci.analytics.list_analytics_instances
severity: MEDIUM
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - var: item.freeform_tags.Environment
    op: exists
