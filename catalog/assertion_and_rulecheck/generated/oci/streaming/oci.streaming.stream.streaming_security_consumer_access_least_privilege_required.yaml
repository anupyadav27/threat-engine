version: '1.0'
rule_id: oci.streaming.stream.streaming_security_consumer_access_least_privilege_required
for_each: oci.streaming.list_streams
severity: HIGH
conditions:
  all:
  - var: item.compartmentId
    op: exists
  - var: item.rules[].action
    op: not_contains
    value: ALLOW
  - var: item.rules[].condition
    op: not_contains
    value: ANY
