version: '1.0'
rule_id: oci.data_flow.application.streaming_security_analytics_checkpoints_and_outputs_encrypted
for_each: oci.data_flow.list_runs
severity: MEDIUM
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - var: item.freeform_tags.Environment
    op: exists
  - var: item.defined_tags.Environment
    op: exists
