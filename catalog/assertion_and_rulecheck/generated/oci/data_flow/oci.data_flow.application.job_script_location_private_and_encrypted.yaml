version: '1.0'
rule_id: oci.data_flow.application.job_script_location_private_and_encrypted
for_each: oci.data_flow.list_runs
severity: MEDIUM
conditions:
  all:
  - var: item.script_location
    op: exists
  - var: item.script_location.is_private
    op: is_true
  - var: item.script_location.encryption_key_id
    op: exists
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
