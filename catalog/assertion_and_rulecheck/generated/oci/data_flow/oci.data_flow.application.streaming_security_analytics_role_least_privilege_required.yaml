version: '1.0'
rule_id: oci.data_flow.application.streaming_security_analytics_role_least_privilege_required
for_each: oci.data_flow.list_runs
severity: HIGH
conditions:
  all:
  - var: item.freeform_tags.Environment
    op: exists
  - var: item.freeform_tags.Environment
    op: equals
    value: production
