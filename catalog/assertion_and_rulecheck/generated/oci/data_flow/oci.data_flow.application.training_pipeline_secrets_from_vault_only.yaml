version: '1.0'
rule_id: oci.data_flow.application.training_pipeline_secrets_from_vault_only
for_each: oci.data_flow.list_runs
severity: HIGH
conditions:
  all:
  - var: item.parameters.secrets[].vaultSecretId
    op: exists
  - var: item.parameters.secrets[].value
    op: not_exists
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
