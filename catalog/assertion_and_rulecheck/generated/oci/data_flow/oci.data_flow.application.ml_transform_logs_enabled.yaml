version: '1.0'
rule_id: oci.data_flow.application.ml_transform_logs_enabled
for_each: oci.data_flow.list_runs
severity: LOW
conditions:
  all:
  - var: item.application_log_config.enableLogging
    op: is_true
  - var: item.application_log_config.logGroupId
    op: exists
  - var: item.application_log_config.logId
    op: exists
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
