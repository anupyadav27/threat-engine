version: '1.0'
rule_id: oci.data_science.project.secrets_vault_access_rbac_least_privilege_required
for_each: oci.data_science.list_notebook_sessions
severity: HIGH
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - var: item.freeform_tags.Environment
    op: exists
  - var: item.defined_tags.Environment
    op: exists
