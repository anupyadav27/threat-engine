version: '1.0'
rule_id: oci.data_science.job.training_jobs_volume_and_output_encryption_enabled
for_each: oci.data_science.list_jobs
severity: HIGH
conditions:
  all:
  - var: item.jobStorageMountConfigurationDetailsList[].storageType
    op: equals
    value: FILE_STORAGE_SERVICE
  - var: item.jobStorageMountConfigurationDetailsList[].isOutputStorageEnabled
    op: is_true
  - var: item.jobStorageMountConfigurationDetailsList[].storageMountTargetId
    op: exists
