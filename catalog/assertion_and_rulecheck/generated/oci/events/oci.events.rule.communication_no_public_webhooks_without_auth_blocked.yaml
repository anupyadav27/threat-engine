version: '1.0'
rule_id: oci.events.rule.communication_no_public_webhooks_without_auth_blocked
for_each: oci.events.list_rules
severity: CRITICAL
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - var: item.condition
    op: contains
    value: auth
  - var: item.actions.actions[].actionType
    op: not_contains
    value: OSS
