version: '1.0'
rule_id: oci.events.rule.ai_services_pipeline_iam_role_least_privileged_enforced
for_each: oci.events.list_rules
severity: HIGH
conditions:
  all:
  - var: item.actions[].actionType
    op: contains
    value: FAAS
  - var: item.actions[?(@.actionType == 'FAAS')].isEnabled
    op: is_true
  - var: item.actions[?(@.actionType == 'FAAS')].functionId
    op: exists
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
