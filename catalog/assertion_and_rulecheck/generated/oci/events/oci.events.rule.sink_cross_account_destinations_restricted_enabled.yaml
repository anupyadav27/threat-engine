version: '1.0'
rule_id: oci.events.rule.sink_cross_account_destinations_restricted_enabled
for_each: oci.events.list_rules
severity: LOW
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - var: item.actions[].actionType
    op: not_contains
    value: OSS
  - var: item.actions[].actionType
    op: not_contains
    value: FAAS
