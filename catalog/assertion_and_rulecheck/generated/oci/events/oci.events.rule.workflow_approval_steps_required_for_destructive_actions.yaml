version: '1.0'
rule_id: oci.events.rule.workflow_approval_steps_required_for_destructive_actions
for_each: oci.events.list_rules
severity: LOW
conditions:
  all:
  - var: item.actions[].actionType
    op: contains
    value: FAAS
  - var: item.actions[].isEnabled
    op: is_true
  - var: item.actions[].description
    op: contains
    value: approval
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
