version: '1.0'
rule_id: oci.events.rule.identity_provider_change_notification_configured
for_each: oci.events.list_rules
severity: MEDIUM
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - var: item.condition
    op: contains
    value: identityProvider
  - var: item.actions[].actionType
    op: contains
    value: ONS
fixture_validated: false
