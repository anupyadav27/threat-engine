version: '1.0'
rule_id: oci.edge_services.distribution.cdn_cache_key_excludes_sensitive_headers
for_each: oci.edge_services.list_distributions
severity: HIGH
conditions:
  all:
  - var: item.cache_key_settings.query_string_settings.behavior
    op: equals
    value: EXCLUDE_ALL
  - var: item.cache_key_settings.header_settings.items[].header
    op: not_contains
    value: Authorization
  - var: item.cache_key_settings.header_settings.items[].header
    op: not_contains
    value: Proxy-Authorization
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags'', ''web_app_firewall_id''])'
