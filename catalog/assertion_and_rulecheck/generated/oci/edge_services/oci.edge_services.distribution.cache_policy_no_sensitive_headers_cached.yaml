version: '1.0'
rule_id: oci.edge_services.distribution.cache_policy_no_sensitive_headers_cached
for_each: oci.edge_services.list_distributions
severity: MEDIUM
conditions:
  all:
  - var: item.cache_policy
    op: exists
  - var: item.cache_policy.sensitive_headers
    op: is_empty
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags'', ''web_app_firewall_id''])'
