version: '1.0'
rule_id: oci.edge_services.distribution.cdn_cache_key_minimal_query_and_cookie_variants
for_each: oci.edge_services.list_distributions
severity: HIGH
conditions:
  all:
  - var: item.cache_key_query_params
    op: exists
  - var: item.cache_key_query_params.is_include_specific
    op: is_true
  - var: item.cache_key_query_params.include_specific
    op: length_gte
    value: 1
  - var: item.cache_key_cookies
    op: exists
  - var: item.cache_key_cookies.is_include_specific
    op: is_true
  - var: item.cache_key_cookies.include_specific
    op: length_gte
    value: 1
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags'', ''web_app_firewall_id''])'
