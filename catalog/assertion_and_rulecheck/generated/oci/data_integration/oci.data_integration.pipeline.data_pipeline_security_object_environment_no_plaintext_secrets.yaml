version: '1.0'
rule_id: oci.data_integration.pipeline.data_pipeline_security_object_environment_no_plaintext_secrets
for_each: oci.data_integration.list_workspaces
severity: HIGH
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - var: item.freeform_tags
    op: not_exists
  - var: item.defined_tags
    op: not_exists
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
