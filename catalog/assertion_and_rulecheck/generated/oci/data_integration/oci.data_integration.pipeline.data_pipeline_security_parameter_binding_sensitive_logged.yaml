version: '1.0'
rule_id: oci.data_integration.pipeline.data_pipeline_security_parameter_binding_sensitive_logged
for_each: oci.data_integration.list_workspaces
severity: LOW
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - var: item.freeform_tags
    op: exists
  - var: item.defined_tags
    op: exists
