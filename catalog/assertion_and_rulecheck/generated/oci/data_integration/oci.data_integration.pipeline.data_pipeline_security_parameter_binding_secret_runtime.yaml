version: '1.0'
rule_id: oci.data_integration.pipeline.data_pipeline_security_parameter_binding_secret_runtime
for_each: oci.data_integration.list_workspaces
severity: HIGH
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - var: item.freeform_tags.Environment
    op: exists
  - var: item.defined_tags.Environment
    op: exists
