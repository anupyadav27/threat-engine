version: '1.0'
rule_id: oci.data_integration.pipeline.data_quality_security_rule_parameters_no_plaintext_secrets
for_each: oci.data_integration.list_workspaces
severity: HIGH
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - var: item.freeform_tags
    op: exists
  - var: item.defined_tags
    op: exists
