version: '1.0'
rule_id: oci.data_integration.workspace.job_script_location_private_and_encrypted
for_each: oci.data_integration.list_workspaces
severity: MEDIUM
conditions:
  all:
  - var: item.private_endpoint_config
    op: exists
  - var: item.private_endpoint_config.private_endpoint_ip
    op: exists
  - var: item.encryption_config
    op: exists
  - var: item.encryption_config.encryption_mode
    op: equals
    value: SSE
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
