version: '1.0'
rule_id: oci.data_integration.pipeline.ai_services_pipeline_iam_role_least_privileged_enforced
for_each: oci.data_integration.list_workspaces
severity: HIGH
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - var: item.freeform_tags.Environment
    op: exists
  - var: item.defined_tags.Environment
    op: exists
