version: '1.0'
rule_id: oci.data_integration.pipeline.data_pipeline_security_parameter_attributes_no_plaintext_secrets
for_each: oci.data_integration.list_workspaces
severity: HIGH
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - var: item.freeform_tags
    op: not_contains
    value: plaintext_secret
  - var: item.defined_tags
    op: not_contains
    value: plaintext_secret
