version: '1.0'
rule_id: oci.data_integration.workspace.quality_jobs_role_least_privilege_required
for_each: oci.data_integration.list_workspaces
severity: HIGH
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - var: item.freeform_tags.Environment
    op: exists
  - var: item.defined_tags.Environment
    op: exists
