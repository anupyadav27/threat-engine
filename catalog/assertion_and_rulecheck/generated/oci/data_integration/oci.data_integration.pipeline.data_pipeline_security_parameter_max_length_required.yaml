version: '1.0'
rule_id: oci.data_integration.pipeline.data_pipeline_security_parameter_max_length_required
for_each: oci.data_integration.list_workspaces
severity: MEDIUM
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - var: item.freeform_tags
    op: exists
  - var: item.freeform_tags.Environment
    op: exists
  - var: item.freeform_tags.Environment
    op: length_gte
    value: '1'
