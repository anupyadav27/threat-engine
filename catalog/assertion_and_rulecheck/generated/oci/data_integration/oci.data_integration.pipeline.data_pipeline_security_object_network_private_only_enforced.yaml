version: '1.0'
rule_id: oci.data_integration.pipeline.data_pipeline_security_object_network_private_only_enforced
for_each: oci.data_integration.list_workspaces
severity: MEDIUM
conditions:
  all:
  - var: item.network_configuration.network_type
    op: equals
    value: PRIVATE
  - var: item.network_configuration.subnet_id
    op: exists
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
