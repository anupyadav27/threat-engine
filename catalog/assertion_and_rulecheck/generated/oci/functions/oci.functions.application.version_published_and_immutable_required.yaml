version: '1.0'
rule_id: oci.functions.application.version_published_and_immutable_required
for_each: oci.functions.list_applications
severity: LOW
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - var: item.freeform_tags.VersionPublished
    op: exists
  - var: item.freeform_tags.VersionPublished
    op: equals
    value: 'true'
  - var: item.freeform_tags.Immutable
    op: exists
  - var: item.freeform_tags.Immutable
    op: equals
    value: 'true'
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
