version: '1.0'
rule_id: oci.functions.application.secrets_security_parameter_secure_string_type_for_sensitive
for_each: oci.functions.list_applications
severity: HIGH
conditions:
  var: item.configuration.secrets[].secret_type
  op: equals
  value: SECURE_STRING
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
