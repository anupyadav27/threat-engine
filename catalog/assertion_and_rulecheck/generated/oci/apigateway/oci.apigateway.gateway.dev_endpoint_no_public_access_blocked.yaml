version: '1.0'
rule_id: oci.apigateway.gateway.dev_endpoint_no_public_access_blocked
for_each: oci.apigateway.list_gateways
severity: CRITICAL
conditions:
  all:
  - var: item.endpoint_type
    op: equals
    value: PUBLIC
  - var: item.freeform_tags.DevEndpoint
    op: not_equals
    value: 'true'
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags'', ''endpoint_type''])'
