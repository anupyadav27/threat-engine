version: '1.0'
rule_id: oci.apigateway.api.api_key_scopes_least_privilege_required
for_each: oci.apigateway.list_apis
severity: HIGH
conditions:
  all:
  - var: item.specification_type
    op: equals
    value: API_SPECIFICATION
  - var: item.specification.routes[].authentication.verificationPolicy.scopes
    op: not_contains
    value: '*'
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags'', ''specification_type''])'
