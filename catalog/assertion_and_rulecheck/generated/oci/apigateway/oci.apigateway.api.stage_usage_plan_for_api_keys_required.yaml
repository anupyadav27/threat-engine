version: '1.0'
rule_id: oci.apigateway.api.stage_usage_plan_for_api_keys_required
for_each: oci.apigateway.list_deployments
severity: HIGH
conditions:
  var: item.specification.routes[].authentication.type
  op: equals
  value: CUSTOM_AUTHENTICATION
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags'', ''gateway_id''])'
