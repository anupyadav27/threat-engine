version: '1.0'
rule_id: oci.container_instances.container_instance.container_instance_env_no_plaintext_secrets
for_each: oci.container_instances.list_container_instances
severity: HIGH
conditions:
  all:
  - var: item.container_configuration.container_details[].environment_variables[].value
    op: not_contains
    value: password
  - var: item.container_configuration.container_details[].environment_variables[].value
    op: not_contains
    value: secret
  - var: item.container_configuration.container_details[].environment_variables[].value
    op: not_contains
    value: key
  - var: item.container_configuration.container_details[].environment_variables[].value
    op: not_contains
    value: token
