version: '1.0'
rule_id: oci.monitoring.alarm.escalation_oncall_contacts_verified_validated
for_each: oci.monitoring.list_alarms
severity: LOW
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - var: item.escalation_oncall_contacts_verified_validated
    op: is_true
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
