version: '1.0'
rule_id: oci.monitoring.alarm.trace_access_rbac_least_privilege_required
for_each: oci.monitoring.list_alarms
severity: HIGH
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - var: item.freeform_tags.Environment
    op: exists
  - var: item.defined_tags.Environment
    op: exists
