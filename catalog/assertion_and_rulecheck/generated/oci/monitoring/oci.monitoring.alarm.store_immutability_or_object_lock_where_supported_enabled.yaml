version: '1.0'
rule_id: oci.monitoring.alarm.store_immutability_or_object_lock_where_supported_enabled
for_each: oci.monitoring.list_alarms
severity: LOW
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - var: item.freeform_tags.Environment
    op: exists
  - var: item.defined_tags.Environment
    op: exists
