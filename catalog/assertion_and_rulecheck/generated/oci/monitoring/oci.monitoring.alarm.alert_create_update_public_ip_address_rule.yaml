version: '1.0'
rule_id: oci.monitoring.alarm.alert_create_update_public_ip_address_rule
for_each: oci.monitoring.list_alarms
severity: CRITICAL
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - var: item.metric_compartment_id_in_subtree
    op: is_true
  - var: item.metric_compartment_id
    op: equals
    value: item.compartment_id
  - var: item.namespace
    op: equals
    value: oci_vcn
  - var: item.query
    op: contains
    value: publicIpAddress
  - var: item.message_format
    op: equals
    value: ONS_OPTIMIZED
  - var: item.destinations
    op: not_empty
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
