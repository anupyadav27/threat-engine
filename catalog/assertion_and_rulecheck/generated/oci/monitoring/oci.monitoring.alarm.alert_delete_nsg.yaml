version: '1.0'
rule_id: oci.monitoring.alarm.alert_delete_nsg
for_each: oci.monitoring.list_alarms
severity: LOW
conditions:
  all:
  - var: item.metric_compartment_id
    op: exists
  - var: item.metric_compartment_id
    op: equals
    value: item.compartment_id
  - var: item.namespace
    op: equals
    value: oci_vcn
  - var: item.query
    op: contains
    value: NetworkSecurityGroupDeleted
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
