version: '1.0'
rule_id: oci.monitoring.alarm.log_metric_filter_sign_in_without_mfa
for_each: oci.monitoring.list_alarms
severity: HIGH
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - var: item.metric_compartment_id
    op: exists
  - var: item.metric_compartment_id_in_subtree
    op: exists
  - var: item.namespace
    op: equals
    value: oci_logging_analytics
  - var: item.query
    op: contains
    value: sign_in_without_mfa
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
