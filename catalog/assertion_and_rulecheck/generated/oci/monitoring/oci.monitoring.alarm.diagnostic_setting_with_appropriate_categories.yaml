version: '1.0'
rule_id: oci.monitoring.alarm.diagnostic_setting_with_appropriate_categories
for_each: oci.monitoring.list_alarms
severity: LOW
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - var: item.diagnostic_settings[].category
    op: contains
    value: ALERT
  - var: item.diagnostic_settings[].category
    op: contains
    value: INCIDENT
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
