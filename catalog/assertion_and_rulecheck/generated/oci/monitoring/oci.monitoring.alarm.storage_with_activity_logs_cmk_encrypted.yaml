version: '1.0'
rule_id: oci.monitoring.alarm.storage_with_activity_logs_cmk_encrypted
for_each: oci.monitoring.list_alarms
severity: MEDIUM
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - var: item.freeform_tags.Environment
    op: exists
  - var: item.defined_tags.Environment
    op: exists
