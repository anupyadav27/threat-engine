version: '1.0'
rule_id: oci.monitoring.metric.metric_filter_cmk_deletion_or_disable_detected_enabled
for_each: oci.monitoring.list_alarms
severity: LOW
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - var: item.metric_compartment_id_in_subtree
    op: is_true
  - var: item.metric_compartment_id
    op: exists
  - var: item.namespace
    op: equals
    value: oci_vault
  - var: item.metric_name
    op: equals
    value: KeyDeletionAttemptCount
  - var: item.message_format
    op: equals
    value: ONS_OPTIMIZED
  - var: item.is_enabled
    op: is_true
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
