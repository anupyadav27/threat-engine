version: '1.0'
rule_id: oci.monitoring.alarm.log_metric_filter_disable_or_scheduled_cmk
for_each: oci.monitoring.list_alarms
severity: LOW
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - var: item.metric_compartment_id
    op: exists
  - var: item.metric_compartment_id_in_subtree
    op: exists
  - var: item.namespace
    op: exists
  - var: item.query
    op: exists
  - var: item.resolution
    op: exists
  - var: item.pending_duration
    op: exists
  - var: item.severity
    op: exists
  - var: item.body
    op: exists
  - var: item.is_enabled
    op: is_true
  - var: item.is_notifications_per_metric_dimension_enabled
    op: exists
  - var: item.message_format
    op: exists
  - var: item.repeat_notification_duration
    op: exists
  - var: item.suppression
    op: exists
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
