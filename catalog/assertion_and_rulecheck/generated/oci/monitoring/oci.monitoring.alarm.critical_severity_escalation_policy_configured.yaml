version: '1.0'
rule_id: oci.monitoring.alarm.critical_severity_escalation_policy_configured
for_each: oci.monitoring.list_alarms
severity: LOW
conditions:
  all:
  - var: item.severity
    op: equals
    value: CRITICAL
  - var: item.messageFormat
    op: equals
    value: RAW
  - var: item.isNotificationsPerMetricDimensionEnabled
    op: is_true
  - var: item.metricCompartmentId
    op: exists
  - var: item.destinations
    op: not_empty
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
