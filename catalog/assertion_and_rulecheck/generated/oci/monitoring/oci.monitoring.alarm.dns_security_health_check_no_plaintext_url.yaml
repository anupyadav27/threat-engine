version: '1.0'
rule_id: oci.monitoring.alarm.dns_security_health_check_no_plaintext_url
for_each: oci.monitoring.list_alarms
severity: LOW
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - var: item.name
    op: contains
    value: DNS Security Health Check
  - var: item.name
    op: not_contains
    value: Plaintext URL
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
