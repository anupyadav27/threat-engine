version: '1.0'
rule_id: oci.resource_manager.stack.documentation_storage_encrypted_and_private
for_each: oci.resource_manager.list_stacks
severity: MEDIUM
conditions:
  all:
  - var: item.config_source_type
    op: equals
    value: ZIP_UPLOAD
  - var: item.config_source_working_directory
    op: exists
  - var: item.config_source_working_directory
    op: not_equals
    value: ''
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
