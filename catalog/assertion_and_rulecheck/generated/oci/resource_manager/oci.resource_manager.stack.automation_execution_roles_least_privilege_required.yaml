version: '1.0'
rule_id: oci.resource_manager.stack.automation_execution_roles_least_privilege_required
for_each: oci.resource_manager.list_stacks
severity: HIGH
conditions:
  all:
  - var: item.automation_execution_roles
    op: exists
  - var: item.automation_execution_roles[].policy
    op: not_contains
    value: '*'
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
