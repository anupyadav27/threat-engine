version: '1.0'
rule_id: oci.database.autonomous_database.endpoint_authz_rbac_least_privilege_required
for_each: oci.database.list_autonomous_databases
severity: HIGH
conditions:
  all:
  - var: item.connection_strings.all_connection_strings
    op: exists
  - var: item.connection_strings.all_connection_strings[].host_format
    op: not_contains
    value: public
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
