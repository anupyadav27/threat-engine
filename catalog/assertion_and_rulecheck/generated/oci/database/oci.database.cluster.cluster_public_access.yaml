version: '1.0'
rule_id: oci.database.cluster.cluster_public_access
for_each: oci.database.list_autonomous_databases
severity: CRITICAL
conditions:
  all:
  - var: item.is_free_tier
    op: is_false
  - var: item.nsg_ids
    op: not_empty
  - var: item.private_endpoint_ip
    op: exists
  - var: item.subnet_id
    op: exists
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
