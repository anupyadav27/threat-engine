version: '1.0'
rule_id: oci.database.db_system.user_password_auth_hardened_or_iam_enforced
for_each: oci.database.list_autonomous_databases
severity: MEDIUM
conditions:
  all:
  - var: item.is_free_tier
    op: is_false
  - any:
    - var: item.connection_strings.profiles[].consumer_group
      op: in
      value:
      - TP
      - TPURGENT
    - var: item.is_mtls_connection_required
      op: is_true
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
