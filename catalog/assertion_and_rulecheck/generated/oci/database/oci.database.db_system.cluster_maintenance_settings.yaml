version: '1.0'
rule_id: oci.database.db_system.cluster_maintenance_settings
for_each: oci.database.list_autonomous_container_databases
severity: MEDIUM
conditions:
  all:
  - var: item.maintenance_window
    op: exists
  - var: item.maintenance_window.days_of_week
    op: not_empty
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
