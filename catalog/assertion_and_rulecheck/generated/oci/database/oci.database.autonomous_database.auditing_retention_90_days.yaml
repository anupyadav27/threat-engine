version: '1.0'
rule_id: oci.database.autonomous_database.auditing_retention_90_days
for_each: oci.database.list_autonomous_databases
severity: MEDIUM
conditions:
  all:
  - var: item.audit_configuration.audit_retention_period_in_days
    op: gte
    value: '90'
  - var: item.audit_configuration.is_audit_enabled
    op: is_true
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
