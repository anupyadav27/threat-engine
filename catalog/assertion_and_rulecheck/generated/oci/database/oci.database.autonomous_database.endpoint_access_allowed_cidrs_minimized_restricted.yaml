version: '1.0'
rule_id: oci.database.autonomous_database.endpoint_access_allowed_cidrs_minimized_restricted
for_each: oci.database.list_autonomous_databases
severity: MEDIUM
conditions:
  all:
  - var: item.are_primary_whitelisted_ips_used
    op: is_true
  - var: item.whitelisted_ips
    op: length_lte
    value: 1
  - var: item.whitelisted_ips[0]
    op: not_equals
    value: 0.0.0.0/0
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
