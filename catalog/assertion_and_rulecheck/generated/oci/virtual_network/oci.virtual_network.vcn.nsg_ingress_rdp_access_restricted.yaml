version: '1.0'
rule_id: oci.virtual_network.vcn.nsg_ingress_rdp_access_restricted
for_each: oci.virtual_network.list_security_lists
severity: MEDIUM
conditions:
  all:
  - var: item.ingress_security_rules[].source
    op: not_contains
    value: 0.0.0.0/0
  - var: item.ingress_security_rules[].tcp_options.destination_port_range.max
    op: gte
    value: 3389
  - var: item.ingress_security_rules[].tcp_options.destination_port_range.min
    op: lte
    value: 3389
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags'', ''egress_security_rules''])'
