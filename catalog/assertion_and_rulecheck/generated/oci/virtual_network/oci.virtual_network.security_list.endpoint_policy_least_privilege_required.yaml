version: '1.0'
rule_id: oci.virtual_network.security_list.endpoint_policy_least_privilege_required
for_each: oci.virtual_network.list_security_lists
severity: HIGH
conditions:
  all:
  - var: item.ingress_security_rules[].source
    op: not_contains
    value: 0.0.0.0/0
  - var: item.egress_security_rules[].destination
    op: not_contains
    value: 0.0.0.0/0
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''status'', ''freeform_tags'', ''defined_tags''])'
