version: '1.0'
rule_id: oci.virtual_network.vcn.flow_log_more_than_90_days
for_each: oci.virtual_network.list_virtual_circuit_public_prefixes
severity: LOW
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - var: item.time_created
    op: lt
    value: '2024-11-15T00:00:00Z'
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
