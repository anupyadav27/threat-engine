version: '1.0'
rule_id: oci.bds.bds_instance.encrypted_with_cmks_disabled
for_each: oci.bds.list_bds_instances
severity: MEDIUM
conditions:
  all:
  - var: item.clusterDetails.nodes[].nodeType
    op: not_contains
    value: ENCRYPTION_DISABLED
  - var: item.clusterDetails.encryptionKeyId
    op: exists
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
