version: '1.0'
rule_id: oci.bds.bds_instance.data_cluster_master_nodes_no_public_ip
for_each: oci.bds.list_bds_instances
severity: CRITICAL
conditions:
  all:
  - var: item.nodes[].node_type
    op: equals
    value: MASTER
  - var: item.nodes[?node_type == 'MASTER'].subnet_id
    op: not_contains
    value: public
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
