version: '1.0'
rule_id: oci.logging.log_group.monitoring_flow_logs_enabled
for_each: oci.logging.list_logs
severity: MEDIUM
conditions:
  all:
  - var: item.name
    op: contains
    value: flow-log
  - var: item.status
    op: equals
    value: ACTIVE
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags''])'
