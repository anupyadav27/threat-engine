version: '1.0'
rule_id: oci.object_storage.bucket.bucket_policy_no_wildcards_on_actions_or_principals
for_each: oci.object_storage.list_buckets
severity: LOW
conditions:
  all:
  - var: item.policy_statements[].actions[]
    op: not_contains
    value: '*'
  - var: item.policy_statements[].principals[]
    op: not_contains
    value: '*'
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''status'', ''freeform_tags'', ''defined_tags''])'
