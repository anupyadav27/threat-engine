version: '1.0'
rule_id: oci.object_storage.bucket.bucket_policy_no_public_principals_blocked
for_each: oci.object_storage.list_buckets
severity: CRITICAL
conditions:
  all:
  - var: item.public_access_type
    op: exists
  - var: item.public_access_type
    op: not_equals
    value: ObjectRead
  - var: item.public_access_type
    op: not_equals
    value: ObjectReadWithoutList
