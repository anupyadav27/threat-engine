version: '1.0'
rule_id: oci.object_storage.bucket.replication_cross_region_encrypted
for_each: oci.object_storage.list_buckets
severity: LOW
conditions:
  all:
  - var: item.replication_enabled
    op: is_true
  - var: item.replication_details[].destination_region_name
    op: exists
  - var: item.replication_details[].encryption_key_id
    op: exists
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags'', ''namespace''])'
