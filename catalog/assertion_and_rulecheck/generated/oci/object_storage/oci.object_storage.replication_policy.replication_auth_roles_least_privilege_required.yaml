version: '1.0'
rule_id: oci.object_storage.replication_policy.replication_auth_roles_least_privilege_required
for_each: oci.object_storage.list_buckets
severity: HIGH
conditions:
  all:
  - var: item.replication_policy
    op: exists
  - var: item.replication_policy.destination_region_name
    op: exists
  - var: item.replication_policy.destination_bucket_name
    op: exists
  - var: item.replication_policy.destination_bucket_namespace
    op: exists
  - var: item.replication_policy.destination_compartment_id
    op: exists
  - var: item.replication_policy.destination_compartment_id
    op: equals
    value: item.compartment_id
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags'', ''namespace''])'
