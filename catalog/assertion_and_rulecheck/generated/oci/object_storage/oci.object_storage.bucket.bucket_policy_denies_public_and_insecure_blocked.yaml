version: '1.0'
rule_id: oci.object_storage.bucket.bucket_policy_denies_public_and_insecure_blocked
for_each: oci.object_storage.list_buckets
severity: CRITICAL
conditions:
  all:
  - var: item.public_access_type
    op: not_equals
    value: ObjectRead
  - var: item.public_access_type
    op: not_equals
    value: ObjectReadWithoutList
  - var: item.public_access_type
    op: not_equals
    value: ObjectReadWrite
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''status'', ''freeform_tags'', ''defined_tags''])'
