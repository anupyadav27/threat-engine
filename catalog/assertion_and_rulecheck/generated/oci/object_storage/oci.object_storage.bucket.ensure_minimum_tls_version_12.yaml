version: '1.0'
rule_id: oci.object_storage.bucket.ensure_minimum_tls_version_12
for_each: oci.object_storage.list_buckets
severity: LOW
conditions:
  var: item.minimum_tls_version
  op: in
  value:
  - TLS_1_2
  - TLS_1_3
