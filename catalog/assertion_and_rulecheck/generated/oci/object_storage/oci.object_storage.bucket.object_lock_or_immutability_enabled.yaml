version: '1.0'
rule_id: oci.object_storage.bucket.object_lock_or_immutability_enabled
for_each: oci.object_storage.list_buckets
severity: LOW
conditions:
  any:
  - var: item.object_lifecycle_policy
    op: exists
  - var: item.versioning
    op: equals
    value: Enabled
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags'', ''namespace''])'
