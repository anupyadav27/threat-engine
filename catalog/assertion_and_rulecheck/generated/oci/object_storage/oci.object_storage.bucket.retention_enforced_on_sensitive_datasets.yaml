version: '1.0'
rule_id: oci.object_storage.bucket.retention_enforced_on_sensitive_datasets
for_each: oci.object_storage.list_buckets
severity: LOW
conditions:
  all:
  - var: item.freeform_tags.Sensitivity
    op: exists
  - var: item.freeform_tags.Sensitivity
    op: in
    value:
    - high
    - medium
    - restricted
    - confidential
  - var: item.retention_rules
    op: exists
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ocid'', ''compartment_id'', ''name'',
  ''status'', ''time_created'', ''freeform_tags'', ''defined_tags'', ''namespace''])'
