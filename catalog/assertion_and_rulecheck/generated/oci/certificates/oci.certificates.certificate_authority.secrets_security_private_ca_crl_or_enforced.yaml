version: '1.0'
rule_id: oci.certificates.certificate_authority.secrets_security_private_ca_crl_or_enforced
for_each: oci.certificates.list_certificate_authorities
severity: HIGH
conditions:
  all:
  - var: item.config.CrlConfiguration.enabled
    op: is_true
  - var: item.config.CrlConfiguration.customCname
    op: exists
