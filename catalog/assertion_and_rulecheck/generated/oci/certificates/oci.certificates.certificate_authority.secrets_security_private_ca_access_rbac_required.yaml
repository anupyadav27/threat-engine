version: '1.0'
rule_id: oci.certificates.certificate_authority.secrets_security_private_ca_access_rbac_required
for_each: oci.certificates.list_certificate_authorities
severity: HIGH
conditions:
  all:
  - var: item.lifecycleState
    op: equals
    value: ACTIVE
  - var: item.certificateAuthorityRules[].ruleType
    op: contains
    value: PRIVATE_CA_ACCESS_RBAC_REQUIRED
