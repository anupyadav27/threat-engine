version: '1.0'
rule_id: aws.ssm.automation.remediation_roles_least_privilege
for_each: aws.ssm.describe_automation_executions
severity: HIGH
conditions:
  var: item.AutomationExecutionMetadataList[].Role
  op: not_contains
  value: '*'
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''AlarmConfiguration'', ''AutomationExecutionStatus'',
  ''DocumentVersion'', ''FailureMessage''])'
