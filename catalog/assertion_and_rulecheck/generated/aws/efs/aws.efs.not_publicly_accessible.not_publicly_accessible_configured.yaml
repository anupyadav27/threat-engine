version: '1.0'
rule_id: aws.efs.not_publicly_accessible.not_publicly_accessible_configured
for_each: aws.efs.describe_file_systems
severity: HIGH
conditions:
  var: item.FileSystems[].Policy
  op: not_contains
  value: 'Principal": "*"'
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''Encrypted'', ''LifeCycleState'', ''Tags''])'
