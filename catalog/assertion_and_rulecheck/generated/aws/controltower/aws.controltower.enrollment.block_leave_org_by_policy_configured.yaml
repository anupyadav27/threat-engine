version: '1.0'
rule_id: aws.controltower.enrollment.block_leave_org_by_policy_configured
for_each: aws.controltower.list_enabled_controls
severity: HIGH
conditions:
  any:
  - var: item.controlIdentifier
    op: equals
    value: AWS-GR_ENROLL_ACCOUNT
  - var: item.controlIdentifier
    op: equals
    value: AWS-GR_ENABLE_ACCOUNT
