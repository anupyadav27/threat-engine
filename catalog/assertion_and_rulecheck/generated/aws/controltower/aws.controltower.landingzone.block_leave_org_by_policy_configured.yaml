version: '1.0'
rule_id: aws.controltower.landingzone.block_leave_org_by_policy_configured
for_each: aws.controltower.list_enabled_controls
severity: HIGH
conditions:
  any:
  - var: item.controlIdentifier
    op: equals
    value: AWS-GR_LEAVE_ORG_VIA_SERVICE_CONTROL_POLICY
  - var: item.controlIdentifier
    op: equals
    value: AWS-GR_LEAVE_ORG_VIA_SERVICE_CONTROL_POLICY_2
