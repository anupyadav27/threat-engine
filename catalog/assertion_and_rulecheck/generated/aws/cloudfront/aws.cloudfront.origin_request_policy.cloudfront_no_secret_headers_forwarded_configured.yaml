version: '1.0'
rule_id: aws.cloudfront.origin_request_policy.cloudfront_no_secret_headers_forwarded_configured
for_each: aws.cloudfront.get_origin_request_policy_config
severity: MEDIUM
conditions:
  all:
  - var: item.HeadersConfig.Headers.Items
    op: not_contains
    value: Authorization
  - var: item.HeadersConfig.Headers.Items
    op: not_contains
    value: Proxy-Authorization
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''CookiesConfig'', ''HeadersConfig'',
  ''QueryStringsConfig''])'
