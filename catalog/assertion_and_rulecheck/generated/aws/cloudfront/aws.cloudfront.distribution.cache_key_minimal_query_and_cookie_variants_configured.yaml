version: '1.0'
rule_id: aws.cloudfront.distribution.cache_key_minimal_query_and_cookie_variants_configured
for_each: aws.cloudfront.get_distribution_config
severity: MEDIUM
conditions:
  all:
  - var: item.DefaultCacheBehavior.CachePolicyId
    op: exists
  - var: item.DefaultCacheBehavior.CachePolicyId
    op: not_equals
    value: 658327ea-f89d-4fab-a63d-7e88639e58f6
