version: '1.0'
rule_id: aws.vpc.subnet.route_tables_no_unintended_internet_paths_configured
for_each: aws.vpc.describe_route_tables
severity: MEDIUM
conditions:
  all:
  - var: item.Routes[].GatewayId
    op: not_contains
    value: igw-
  - var: item.Routes[].DestinationCidrBlock
    op: not_equals
    value: 0.0.0.0/0
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''Tags''])'
