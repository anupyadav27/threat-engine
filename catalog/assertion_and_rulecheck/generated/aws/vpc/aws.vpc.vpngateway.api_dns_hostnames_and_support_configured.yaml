version: '1.0'
rule_id: aws.vpc.vpngateway.api_dns_hostnames_and_support_configured
for_each: aws.vpc.describe_vpn_gateways
severity: MEDIUM
conditions:
  all:
  - var: item.VpnGatewayId
    op: exists
  - var: item.AmazonSideAsn
    op: exists
  - var: item.VpcAttachments[].VpcId
    op: not_empty
  - var: item.Tags
    op: exists
