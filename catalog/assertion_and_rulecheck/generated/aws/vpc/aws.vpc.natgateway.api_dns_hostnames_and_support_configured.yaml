version: '1.0'
rule_id: aws.vpc.natgateway.api_dns_hostnames_and_support_configured
for_each: aws.vpc.describe_nat_gateways
severity: MEDIUM
conditions:
  all:
  - var: item.NatGatewayAddresses[].PrivateIp
    op: exists
  - var: item.NatGatewayAddresses[].PublicIp
    op: exists
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''AttachedAppliances'', ''AutoProvisionZones'',
  ''AutoScalingIps'', ''AvailabilityMode'', ''ConnectivityType'', ''CreateTime'', ''DeleteTime'', ''FailureCode''])'
