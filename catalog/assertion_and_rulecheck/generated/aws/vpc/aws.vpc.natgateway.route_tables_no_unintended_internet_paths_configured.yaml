version: '1.0'
rule_id: aws.vpc.natgateway.route_tables_no_unintended_internet_paths_configured
for_each: aws.vpc.describe_route_tables
severity: MEDIUM
conditions:
  all:
  - var: item.Routes[]
    op: not_empty
  - any:
    - var: item.Routes[].GatewayId
      op: contains
      value: igw-
    - var: item.Routes[].NatGatewayId
      op: exists
      negate: true
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''Associations'', ''PropagatingVgws'',
  ''RouteTableId'', ''RouteTables'', ''Routes'', ''Tags'', ''VpcId''])'
