version: '1.0'
rule_id: aws.glue.data_quality_ruleset.parameters_no_plaintext_secrets_configured
for_each: aws.glue.get_data_quality_ruleset
severity: MEDIUM
conditions:
  all:
  - var: item.Parameters
    op: exists
  - var: item.Parameters
    op: not_contains
    value: Password
  - var: item.Parameters
    op: not_contains
    value: Secret
  - var: item.Parameters
    op: not_contains
    value: Key
