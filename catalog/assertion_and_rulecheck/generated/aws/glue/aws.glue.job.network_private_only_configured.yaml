version: '1.0'
rule_id: aws.glue.job.network_private_only_configured
for_each: aws.glue.get_jobs
severity: HIGH
conditions:
  all:
  - var: item.Connections
    op: exists
  - var: item.Connections.Connections
    op: not_empty
  - var: item.Connections.Connections[]
    op: not_contains
    value: public
