version: '1.0'
rule_id: aws.kinesisfirehose.deliverystream.private_network_only_if_supported
for_each: aws.kinesisfirehose.describe_delivery_stream
severity: HIGH
conditions:
  all:
  - var: item.DeliveryStreamEncryptionConfiguration
    op: exists
  - var: item.DeliveryStreamEncryptionConfiguration.Status
    op: equals
    value: ENABLED
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''CreateTimestamp'', ''DeliveryStreamARN'',
  ''DeliveryStreamDescription'', ''DeliveryStreamEncryptionConfiguration'', ''DeliveryStreamName'', ''DeliveryStreamStatus'',
  ''DeliveryStreamType'', ''DestinationDescription''])'
