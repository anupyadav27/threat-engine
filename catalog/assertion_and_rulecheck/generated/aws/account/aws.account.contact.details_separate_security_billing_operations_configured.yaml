version: '1.0'
rule_id: aws.account.contact.details_separate_security_billing_operations_configured
for_each: aws.account.get_alternate_contact
severity: MEDIUM
conditions:
  all:
  - var: item.AlternateContactType
    op: in
    value:
    - SECURITY
    - BILLING
    - OPERATIONS
  - var: item.EmailAddress
    op: exists
  - var: item.Name
    op: exists
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''AlternateContactType'', ''EmailAddress'',
  ''Name'', ''PhoneNumber'', ''Title''])'
