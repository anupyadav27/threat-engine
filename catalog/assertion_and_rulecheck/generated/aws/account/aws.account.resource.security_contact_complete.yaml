version: '1.0'
rule_id: aws.account.resource.security_contact_complete
for_each: aws.account.get_contact_information
severity: MEDIUM
conditions:
  all:
  - var: item.FullName
    op: exists
  - var: item.AddressLine1
    op: exists
  - var: item.City
    op: exists
  - var: item.CountryCode
    op: exists
  - var: item.PostalCode
    op: exists
  - var: item.PhoneNumber
    op: exists
