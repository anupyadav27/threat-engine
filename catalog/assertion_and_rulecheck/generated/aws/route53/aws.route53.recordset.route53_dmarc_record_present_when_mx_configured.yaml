version: '1.0'
rule_id: aws.route53.recordset.route53_dmarc_record_present_when_mx_configured
for_each: aws.route53.list_hosted_zones
severity: MEDIUM
conditions:
  all:
  - var: item.ResourceRecordSetCount
    op: gt
    value: 0
  - any:
    - var: item.Name
      op: contains
      value: _dmarc.
    - var: item.Name
      op: contains
      value: dmarc.
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''CallerReference'', ''Config'',
  ''Features'', ''Id'', ''LinkedService'', ''Name'', ''ResourceRecordSetCount''])'
