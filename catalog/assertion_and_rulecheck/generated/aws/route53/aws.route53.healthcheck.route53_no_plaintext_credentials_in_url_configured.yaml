version: '1.0'
rule_id: aws.route53.healthcheck.route53_no_plaintext_credentials_in_url_configured
for_each: aws.route53.list_health_checks
severity: MEDIUM
conditions:
  all:
  - var: item.HealthCheckConfig.FullyQualifiedDomainName
    op: exists
  - var: item.HealthCheckConfig.FullyQualifiedDomainName
    op: not_contains
    value: ://
