version: '1.0'
rule_id: aws.fsx.resource.fsx_windows_file_system_multi_az_enabled
for_each: aws.fsx.describe_file_systems
severity: MEDIUM
conditions:
  all:
  - var: item.FileSystemType
    op: equals
    value: WINDOWS
  - var: item.WindowsConfiguration.DeploymentType
    op: equals
    value: MULTI_AZ_1
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''AdministrativeActions'', ''CreationTime'',
  ''DNSName'', ''FailureDetails'', ''FileSystemId'', ''FileSystemType'', ''FileSystemTypeVersion'', ''FileSystems''])'
