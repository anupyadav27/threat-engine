version: '1.0'
rule_id: aws.quicksight.user.quicksight_sso_required
for_each: aws.quicksight.describe_account_settings
severity: MEDIUM
conditions:
  var: item.AccountSettings.AuthenticationType
  op: equals
  value: IAM_AND_QUICKSIGHT
