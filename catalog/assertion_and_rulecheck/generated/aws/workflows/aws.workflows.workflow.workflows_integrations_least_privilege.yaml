version: '1.0'
rule_id: aws.workflows.workflow.workflows_integrations_least_privilege
for_each: aws.workflows.describe_state_machine
severity: HIGH
conditions:
  all:
  - var: item.loggingConfiguration
    op: exists
  - var: item.loggingConfiguration.level
    op: equals
    value: ALL
  - var: item.loggingConfiguration.includeExecutionData
    op: is_true
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''definition'', ''description'',
  ''destinations'', ''includeExecutionData'', ''label'', ''level'', ''loggingConfiguration'', ''name''])'
