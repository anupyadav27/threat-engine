version: '1.0'
rule_id: aws.workflows.workflow.workflows_artifacts_encrypted_and_private
for_each: aws.workflows.describe_state_machine
severity: HIGH
conditions:
  all:
  - var: item.loggingConfiguration.destinations[0].cloudWatchLogsLogGroup.encryptionConfiguration.kmsKeyArn
    op: exists
  - var: item.loggingConfiguration.level
    op: not_equals
    value: 'OFF'
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''definition'', ''description'',
  ''destinations'', ''includeExecutionData'', ''label'', ''level'', ''loggingConfiguration'', ''name''])'
