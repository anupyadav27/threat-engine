version: '1.0'
rule_id: aws.workflows.workflow.workflows_approval_steps_required_for_destructive_actions
for_each: aws.workflows.describe_state_machine
severity: MEDIUM
conditions:
  all:
  - var: item.definition
    op: contains
    value: Approval
  - var: item.definition
    op: contains
    value: Delete
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''definition'', ''description'',
  ''destinations'', ''includeExecutionData'', ''label'', ''level'', ''loggingConfiguration'', ''name''])'
