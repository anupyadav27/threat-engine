version: '1.0'
rule_id: aws.fargate.service.role_least_privilege
for_each: aws.ecs.describe_services
severity: HIGH
conditions:
  all:
  - var: item.taskDefinition
    op: exists
  - var: item.taskDefinition.taskRoleArn
    op: exists
  - var: item.taskDefinition.taskRoleArn
    op: not_equals
    value: ''
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''availabilityZoneRebalancing'',
  ''capacityProviderStrategy'', ''clusterArn'', ''createdAt'', ''createdBy'', ''currentServiceDeployment'', ''currentServiceRevisions'',
  ''deploymentConfiguration''])'
