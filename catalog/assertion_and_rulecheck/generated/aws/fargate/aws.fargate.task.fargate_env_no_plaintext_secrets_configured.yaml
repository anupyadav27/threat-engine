version: '1.0'
rule_id: aws.fargate.task.fargate_env_no_plaintext_secrets_configured
for_each: aws.fargate.task.list
severity: MEDIUM
conditions:
  all:
  - var: item.containerDefinitions[].environment[].value
    op: not_contains
    value: password
  - var: item.containerDefinitions[].environment[].value
    op: not_contains
    value: secret
  - var: item.containerDefinitions[].environment[].value
    op: not_contains
    value: key
