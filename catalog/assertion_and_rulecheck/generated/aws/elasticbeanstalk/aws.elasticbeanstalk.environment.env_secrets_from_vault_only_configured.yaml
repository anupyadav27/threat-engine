version: '1.0'
rule_id: aws.elasticbeanstalk.environment.env_secrets_from_vault_only_configured
for_each: aws.elasticbeanstalk.describe_configuration_settings_for_environment
severity: MEDIUM
conditions:
  all:
  - var: item.OptionSettings
    op: not_empty
  - any:
    - var: item.OptionSettings[].Namespace
      op: contains
      value: aws:elasticbeanstalk:application:environment
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ApplicationName'', ''DateCreated'',
  ''DateUpdated'', ''DeploymentStatus'', ''EnvironmentName'', ''OptionSettings'', ''PlatformArn'', ''SolutionStackName''])'
