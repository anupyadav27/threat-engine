version: '1.0'
rule_id: aws.elasticbeanstalk.environment.tls_min_1_2_enforced
for_each: aws.elasticbeanstalk.describe_configuration_settings_for_environment
severity: HIGH
conditions:
  all:
  - var: item.OptionSettings[?(@.Namespace=='aws:elb:listener' && @.OptionName=='ListenerProtocol')].Value
    op: contains
    value: HTTPS
  - var: item.OptionSettings[?(@.Namespace=='aws:elb:listener' && @.OptionName=='ListenerProtocol' && @.Value=='HTTPS')].OptionSettings[?(@.OptionName=='PolicyNames')].Value
    op: contains
    value: ELBSecurityPolicy-TLS-1-2-2017-01
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ApplicationName'', ''DateCreated'',
  ''DateUpdated'', ''DeploymentStatus'', ''EnvironmentName'', ''OptionSettings'', ''PlatformArn'', ''SolutionStackName''])'
