version: '1.0'
rule_id: aws.config.configuration_recorder.configuration_global_resource_types_tracked_configured
for_each: aws.config.describe_configuration_recorders
severity: MEDIUM
conditions:
  all:
  - var: item.ConfigurationRecorders
    op: not_empty
  - var: item.ConfigurationRecorders[].recordingGroup.allSupported
    op: is_true
  - var: item.ConfigurationRecorders[].recordingGroup.includeGlobalResourceTypes
    op: is_true
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ConfigurationRecorders'', ''arn'',
  ''name'', ''recordingGroup'', ''recordingMode'', ''roleARN'', ''servicePrincipal''])'
