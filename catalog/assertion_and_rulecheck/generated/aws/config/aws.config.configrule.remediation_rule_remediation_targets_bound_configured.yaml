version: '1.0'
rule_id: aws.config.configrule.remediation_rule_remediation_targets_bound_configured
for_each: aws.config.describe_config_rules
severity: MEDIUM
conditions:
  all:
  - var: item.ConfigRules[].Source
    op: contains
    value: AWS::Config::RemediationConfiguration
  - var: item.ConfigRules[].Source.AutomaticRemediation
    op: exists
