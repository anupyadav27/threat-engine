version: '1.0'
rule_id: aws.config.remediation_configuration.auto_remediation_enabled_for_high
for_each: aws.config.describe_config_rules
severity: MEDIUM
conditions:
  all:
  - var: item.ConfigRuleState
    op: equals
    value: RUNNING
  - var: item.Source
    op: contains
    value: AWS Config Remediation
