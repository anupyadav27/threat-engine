version: '1.0'
rule_id: aws.config.configrule.config_rule_critical_resources_drift_detection_enabled
for_each: aws.config.describe_configuration_recorder_status
severity: MEDIUM
conditions:
  all:
  - var: item.ConfigurationRecordersStatus
    op: exists
  - var: item.lastStatus
    op: equals
    value: ACTIVE
