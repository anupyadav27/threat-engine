version: '1.0'
rule_id: aws.dynamodb.globaltable.table_pitr_enabled_if_supported
for_each: aws.dynamodb.describe_global_table
severity: MEDIUM
conditions:
  all:
  - var: item.GlobalTableStatus
    op: equals
    value: ACTIVE
  - var: item.ReplicationGroup[].RegionName
    op: length_gte
    value: 2
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''CreationDateTime'', ''GlobalTableArn'',
  ''GlobalTableName'', ''GlobalTableStatus'', ''ReplicationGroup''])'
