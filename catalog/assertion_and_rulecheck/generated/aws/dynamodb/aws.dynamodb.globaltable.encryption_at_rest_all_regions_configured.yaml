version: '1.0'
rule_id: aws.dynamodb.globaltable.encryption_at_rest_all_regions_configured
for_each: aws.dynamodb.describe_global_table
severity: HIGH
conditions:
  all:
  - var: item.ReplicationGroup[].ReplicaStatus
    op: equals
    value: ACTIVE
  - var: item.ReplicationGroup[].SSEDescription.Status
    op: equals
    value: ENABLED
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''CreationDateTime'', ''GlobalTableArn'',
  ''GlobalTableName'', ''GlobalTableStatus'', ''ReplicationGroup''])'
