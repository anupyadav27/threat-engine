version: '1.0'
rule_id: aws.kinesisanalytics.application.security_check_checkpoints_and_outputs_encrypted_configured
for_each: aws.kinesisanalytics.describe_application
severity: HIGH
conditions:
  all:
  - var: item.ApplicationConfigurationDescription.CheckpointConfigurationDescription.ConfigurationType
    op: equals
    value: DEFAULT
  - var: item.ApplicationConfigurationDescription.OutputDescriptions[].KinesisStreamsOutputDescription.DestinationSchema.RecordFormatType
    op: equals
    value: JSON
  - var: item.ApplicationConfigurationDescription.OutputDescriptions[].KinesisFirehoseOutputDescription.DestinationSchema.RecordFormatType
    op: equals
    value: JSON
