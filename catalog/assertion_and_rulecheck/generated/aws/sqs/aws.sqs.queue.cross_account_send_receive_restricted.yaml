version: '1.0'
rule_id: aws.sqs.queue.cross_account_send_receive_restricted
for_each: aws.sqs.get_queue_attributes
severity: MEDIUM
conditions:
  all:
  - var: item.Policy
    op: exists
  - var: item.Policy
    op: not_contains
    value: Principal":"*"
  - var: item.Policy
    op: not_contains
    value: Principal":{"AWS":"*"
