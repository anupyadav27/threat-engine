version: '1.0'
rule_id: aws.dms.resource.replication_task_source_logging_enabled
for_each: aws.dms.describe_replication_tasks
severity: MEDIUM
conditions:
  var: item.ReplicationTaskSettings
  op: contains
  value: EnableLogging=true
