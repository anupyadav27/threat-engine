version: '1.0'
rule_id: aws.waf.webacl.waf_no_permit_all_configured
for_each: aws.waf.get_web_acl
severity: MEDIUM
conditions:
  all:
  - var: item.DefaultAction
    op: not_equals
    value: ALLOW
  - var: item.Rules[].Action
    op: not_contains
    value: ALLOW
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''Rules''])'
