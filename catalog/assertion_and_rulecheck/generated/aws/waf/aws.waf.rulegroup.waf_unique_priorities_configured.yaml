version: '1.0'
rule_id: aws.waf.rulegroup.waf_unique_priorities_configured
for_each: aws.waf.get_rule_group
severity: MEDIUM
conditions:
  all:
  - var: item.Rules
    op: exists
  - var: item.Rules[].Priority
    op: not_empty
  - var: item.Rules[].Priority
    op: length_gte
    value: 1
  - all:
    - var: item.Rules[].Priority
      op: in
      value: item.Rules[].Priority
    - var: item.Rules[].Priority
      op: not_equals
      value: item.Rules[].Priority
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''MetricName'', ''Name'', ''RuleGroupId'',
  ''VisibilityConfig''])'
