version: '1.0'
rule_id: aws.waf.rule.waf_priority_unique_within_web_acl_configured
for_each: aws.waf.get_web_acl
severity: MEDIUM
conditions:
  all:
  - var: item.Rules
    op: not_empty
  - var: item.Rules[].Priority
    op: not_empty
  - var: item.Rules
    op: length_gte
    value: 2
  - var: item.Rules
    op: custom_unique
    path: Priority
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''DefaultAction'', ''MetricName'',
  ''Name'', ''Policy'', ''Rules'', ''WebACLArn'', ''WebACLId''])'
