version: '1.0'
rule_id: aws.apigateway.requestvalidator.api_request_schema_validation_enabled
for_each: aws.apigateway.get_request_validators
severity: HIGH
conditions:
  all:
  - var: item.validateRequestBody
    op: is_true
  - var: item.validateRequestParameters
    op: is_true
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''id'', ''name'', ''validateRequestBody'',
  ''validateRequestParameters''])'
