version: '1.0'
rule_id: aws.cloudwatch.log.metric_alarm_kms_cmk_deletion_configured
for_each: aws.cloudwatch.describe_alarms
severity: HIGH
conditions:
  any:
  - var: item.MetricAlarms[].AlarmActions[]
    op: contains
    value: kms:ScheduleKeyDeletion
  - var: item.CompositeAlarms[].AlarmActions[]
    op: contains
    value: kms:ScheduleKeyDeletion
