version: '1.0'
rule_id: aws.cloudwatch.metricfilter.network_acl_or_sg_change_detected_filter_present
for_each: aws.cloudwatch.describe_alarms
severity: HIGH
conditions:
  any:
  - var: item.MetricAlarms[?(@.MetricName == 'NetworkAclEventCount' || @.MetricName == 'SecurityGroupEventCount')].AlarmName
    op: exists
  - var: item.CompositeAlarms[?(@.AlarmRule contains 'NetworkAclEventCount' || @.AlarmRule contains 'SecurityGroupEventCount')].AlarmName
    op: exists
