version: '1.0'
rule_id: aws.cloudwatch.metricfilter.kms_key_deletion_disable_detected_filter_present
for_each: aws.cloudwatch.describe_alarms
severity: HIGH
conditions:
  all:
  - var: item.MetricAlarms[].MetricName
    op: contains
    value: kms_key_deletion_disable_detected
  - var: item.MetricAlarms[].Enabled
    op: is_true
