version: '1.0'
rule_id: aws.cloudwatch.network.gateways_alarm_configured
for_each: aws.cloudwatch.describe_alarms
severity: MEDIUM
conditions:
  any:
  - var: item.MetricAlarms[].MetricName
    op: contains
    value: NetworkGateway
  - var: item.MetricAlarms[].MetricName
    op: contains
    value: Gateway
  - var: item.MetricAlarms[].MetricName
    op: contains
    value: VPN
  - var: item.MetricAlarms[].MetricName
    op: contains
    value: Vpn
  - var: item.MetricAlarms[].MetricName
    op: contains
    value: DirectConnect
  - var: item.MetricAlarms[].MetricName
    op: contains
    value: Direct Connect
