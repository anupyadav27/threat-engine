version: '1.0'
rule_id: aws.cloudwatch.log_metric_filter_disable_or_scheduled_deletion_of_kms_cmk.metric_alarm_kms_cmk_deletion_configured
for_each: aws.cloudwatch.describe_alarms
severity: HIGH
conditions:
  any:
  - var: item.AlarmName
    op: contains
    value: KMS
  - var: item.AlarmName
    op: contains
    value: CMK
  - var: item.AlarmName
    op: contains
    value: KeyDeletion
  - var: item.AlarmName
    op: contains
    value: KeyDisable
