version: '1.0'
rule_id: aws.cloudwatch.resource.metric_alarm_metric_alarm_aws_config_configuration_changes_configured
for_each: aws.cloudwatch.describe_alarms
severity: MEDIUM
conditions:
  any:
  - var: item.MetricAlarms[?(@.MetricName == 'ConfigRulesComplianceChange' && @.Namespace == 'AWS/Config')]
    op: not_empty
  - var: item.MetricAlarms[?(@.MetricName == 'ConfigurationChanges' && @.Namespace == 'AWS/Config')]
    op: not_empty
