version: '1.0'
rule_id: aws.cloudwatch.changes.to_network_gateways_alarm_configured
for_each: aws.cloudwatch.describe_alarms
severity: HIGH
conditions:
  all:
  - var: item.MetricAlarms[].MetricName
    op: contains
    value: NetworkGatewayEventCount
  - var: item.MetricAlarms[].AlarmActions
    op: not_empty
