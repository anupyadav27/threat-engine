version: '1.0'
rule_id: aws.cloudwatch.destination.tls_min_1_2_enforced
for_each: aws.cloudwatch.describe_alarms
severity: HIGH
conditions:
  all:
  - var: item.MetricAlarms[].AlarmActions[]
    op: contains
    value: arn:aws:cloudwatch:us-east-1:123456789012:alarm:example-name
  - var: item.MetricAlarms[].AlarmArn
    op: exists
