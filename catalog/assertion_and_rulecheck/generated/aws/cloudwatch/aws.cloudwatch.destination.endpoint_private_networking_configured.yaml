version: '1.0'
rule_id: aws.cloudwatch.destination.endpoint_private_networking_configured
for_each: aws.cloudwatch.describe_alarms
severity: HIGH
conditions:
  all:
  - var: item.MetricAlarms[].AlarmActions[]
    op: contains
    value: arn:aws:cloudwatch
  - var: item.MetricAlarms[].AlarmActions[]
    op: not_contains
    value: public
