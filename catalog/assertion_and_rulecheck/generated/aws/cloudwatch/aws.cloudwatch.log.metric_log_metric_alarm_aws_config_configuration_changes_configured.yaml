version: '1.0'
rule_id: aws.cloudwatch.log.metric_log_metric_alarm_aws_config_configuration_changes_configured
for_each: aws.cloudwatch.describe_alarms
severity: MEDIUM
conditions:
  all:
  - var: item.MetricAlarms[?(@.MetricName == 'ConfigRulesComplianceChange' && @.Namespace == 'AWS/Config')]
    op: not_empty
  - var: item.MetricAlarms[?(@.MetricName == 'ConfigRulesComplianceChange' && @.Namespace == 'AWS/Config')].AlarmActions
    op: not_empty
