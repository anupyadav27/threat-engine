version: '1.0'
rule_id: aws.cloudwatch.log_metric_filter_root_usage.log_metric_log_metric_filter_root_usage_configured
for_each: aws.cloudwatch.describe_alarms
severity: MEDIUM
conditions:
  any:
  - var: item.MetricAlarms[].MetricName
    op: contains
    value: RootAccountUsage
  - var: item.CompositeAlarms[].AlarmRule
    op: contains
    value: RootAccountUsage
