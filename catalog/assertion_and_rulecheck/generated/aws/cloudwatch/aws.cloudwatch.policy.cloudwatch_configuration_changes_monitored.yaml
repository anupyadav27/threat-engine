version: '1.0'
rule_id: aws.cloudwatch.policy.cloudwatch_configuration_changes_monitored
for_each: aws.cloudwatch.describe_alarms
severity: MEDIUM
conditions:
  any:
  - var: item.AlarmName
    op: contains
    value: CloudTrail
  - var: item.AlarmName
    op: contains
    value: Config
  - var: item.AlarmName
    op: contains
    value: configuration
