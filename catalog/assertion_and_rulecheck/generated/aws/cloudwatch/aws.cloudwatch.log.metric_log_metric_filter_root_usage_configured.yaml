version: '1.0'
rule_id: aws.cloudwatch.log.metric_log_metric_filter_root_usage_configured
for_each: aws.cloudwatch.describe_alarms
severity: MEDIUM
conditions:
  any:
  - var: item.MetricAlarms[?(@.MetricName == 'RootUsage' && @.Namespace == 'AWS/Logs')].AlarmName
    op: exists
  - var: item.CompositeAlarms[?(@.AlarmRule contains 'RootUsage' && @.AlarmRule contains 'AWS/Logs')].AlarmName
    op: exists
