version: '1.0'
rule_id: aws.cloudwatch.network.route_tables_alarm_configured
for_each: aws.cloudwatch.describe_alarms
severity: MEDIUM
conditions:
  any:
  - var: item.MetricAlarms[].MetricName
    op: contains
    value: RouteTable
  - var: item.MetricAlarms[].MetricName
    op: contains
    value: route
