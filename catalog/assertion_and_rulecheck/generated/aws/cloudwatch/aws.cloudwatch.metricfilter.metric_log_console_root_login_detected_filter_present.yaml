version: '1.0'
rule_id: aws.cloudwatch.metricfilter.metric_log_console_root_login_detected_filter_present
for_each: aws.cloudwatch.describe_alarms
severity: MEDIUM
conditions:
  any:
  - var: item.MetricAlarms[].MetricName
    op: contains
    value: ConsoleRootLogin
  - var: item.MetricAlarms[].AlarmDescription
    op: contains
    value: ConsoleRootLogin
