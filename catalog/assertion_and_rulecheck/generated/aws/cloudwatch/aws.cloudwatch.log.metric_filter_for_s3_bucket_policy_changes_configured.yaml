version: '1.0'
rule_id: aws.cloudwatch.log.metric_filter_for_s3_bucket_policy_changes_configured
for_each: aws.cloudwatch.describe_alarms
severity: HIGH
conditions:
  any:
  - var: item.MetricAlarms[].MetricName
    op: contains
    value: S3BucketPolicyEventCount
  - var: item.MetricAlarms[].AlarmDescription
    op: contains
    value: S3 bucket policy change
