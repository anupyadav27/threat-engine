version: '1.0'
rule_id: aws.athena.workgroup.logs_retention_days_minimum
for_each: aws.athena.get_work_group
severity: MEDIUM
conditions:
  all:
  - var: item.Configuration.ResultConfigurationUpdates.EncryptionConfiguration.EncryptionOption
    op: exists
  - var: item.Configuration.ResultConfigurationUpdates.EncryptionConfiguration.EncryptionOption
    op: not_equals
    value: SSE_S3
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''Configuration'', ''CreationTime'',
  ''Description'', ''IdentityCenterApplicationArn'', ''Name'', ''State''])'
