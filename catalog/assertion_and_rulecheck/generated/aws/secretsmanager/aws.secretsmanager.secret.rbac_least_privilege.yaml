version: '1.0'
rule_id: aws.secretsmanager.secret.rbac_least_privilege
for_each: aws.secretsmanager.list_secrets
severity: HIGH
conditions:
  all:
  - var: item.Policy.PolicyText
    op: exists
  - var: item.Policy.PolicyText
    op: not_contains
    value: '"Effect":"Allow","Principal":"*"'
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ARN'', ''CreatedDate'', ''DeletedDate'',
  ''Description'', ''ExternalSecretRotationMetadata'', ''ExternalSecretRotationRoleArn'', ''KmsKeyId'', ''LastAccessedDate''])'
