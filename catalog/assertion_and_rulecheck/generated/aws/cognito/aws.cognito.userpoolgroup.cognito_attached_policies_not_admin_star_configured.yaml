version: '1.0'
rule_id: aws.cognito.userpoolgroup.cognito_attached_policies_not_admin_star_configured
for_each: aws.cognito.describe_user_pool
severity: MEDIUM
conditions:
  all:
  - var: item.UserPoolGroups[].Policies[].PolicyDocument.Statement[].Effect
    op: equals
    value: Allow
  - var: item.UserPoolGroups[].Policies[].PolicyDocument.Statement[].Action
    op: not_contains
    value: '*'
  - var: item.UserPoolGroups[].Policies[].PolicyDocument.Statement[].Resource
    op: not_contains
    value: '*'
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''AccountRecoverySetting'', ''AdminCreateUserConfig'',
  ''AliasAttributes'', ''Arn'', ''AutoVerifiedAttributes'', ''CreationDate'', ''CustomDomain'', ''DeletionProtection''])'
