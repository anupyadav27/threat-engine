version: '1.0'
rule_id: aws.cognito.userpool.access_keys_rotated_90_days_or_less_when_present
for_each: aws.cognito.describe_user_pool
severity: MEDIUM
conditions:
  all:
  - var: item.UserPoolAddOns
    op: exists
  - var: item.UserPoolAddOns.AdvancedSecurityMode
    op: exists
  - var: item.UserPoolAddOns.AdvancedSecurityMode
    op: equals
    value: ENFORCED
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''AccountRecoverySetting'', ''AdminCreateUserConfig'',
  ''AliasAttributes'', ''Arn'', ''AutoVerifiedAttributes'', ''CreationDate'', ''CustomDomain'', ''DeletionProtection''])'
