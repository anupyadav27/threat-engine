version: '1.0'
rule_id: aws.cognito.userpool.console_password_present_only_if_required
for_each: aws.cognito.describe_user_pool
severity: CRITICAL
conditions:
  any:
  - var: item.AdminCreateUserConfig.AllowAdminCreateUserOnly
    op: is_true
  - var: item.UsernameAttributes
    op: contains
    value: email
  - var: item.UsernameAttributes
    op: contains
    value: phone_number
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''AccountRecoverySetting'', ''AdminCreateUserConfig'',
  ''AliasAttributes'', ''Arn'', ''AutoVerifiedAttributes'', ''CreationDate'', ''CustomDomain'', ''DeletionProtection''])'
