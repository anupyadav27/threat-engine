version: '1.0'
rule_id: aws.timestream.resource.cloudwatch_monitoring_and_alerting_enabled
for_each: aws.timestream.list_databases
severity: MEDIUM
conditions:
  all:
  - var: item.MonitoringConfiguration.MonitoringEnabled
    op: is_true
  - var: item.MonitoringConfiguration.AlarmConfiguration.Alarms[].AlarmName
    op: not_empty
