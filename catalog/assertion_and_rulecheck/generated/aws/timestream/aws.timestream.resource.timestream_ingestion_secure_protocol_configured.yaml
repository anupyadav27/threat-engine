version: '1.0'
rule_id: aws.timestream.resource.timestream_ingestion_secure_protocol_configured
for_each: aws.timestream.databases.list
severity: MEDIUM
conditions:
  all:
  - var: item.properties.ingestionSettings.secureIngestionEnabled
    op: is_true
  - var: item.properties.ingestionSettings.ingestionProtocol
    op: in
    value:
    - HTTPS
    - TLS
