version: '1.0'
rule_id: aws.timestream.resource.cloudtrail_management_and_data_logging_enabled
for_each: aws.timestream.list_databases
severity: MEDIUM
conditions:
  all:
  - var: item.LoggingConfiguration.CloudWatchLogsLoggingEnabled
    op: is_true
  - var: item.LoggingConfiguration.S3LoggingEnabled
    op: is_true
