version: '1.0'
rule_id: aws.securityhub.action.securityhub_storage_encrypted_and_private
for_each: aws.securityhub.get_findings
severity: HIGH
conditions:
  all:
  - var: item.Findings[].ProductFields.ControlId
    op: contains
    value: S3.1
  - var: item.Findings[].ProductFields.ControlId
    op: contains
    value: S3.8
