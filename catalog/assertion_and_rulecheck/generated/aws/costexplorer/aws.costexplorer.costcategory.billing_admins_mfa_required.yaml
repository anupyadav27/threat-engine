version: '1.0'
rule_id: aws.costexplorer.costcategory.billing_admins_mfa_required
for_each: aws.iam.list_users
severity: CRITICAL
conditions:
  all:
  - var: item.Policies[].PolicyName
    op: contains
    value: BillingAdministrator
  - var: item.MFAEnabled
    op: is_true
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''Arn'', ''CreateDate'', ''PasswordLastUsed'',
  ''Path'', ''PermissionsBoundary'', ''Tags'', ''UserId'', ''UserName''])'
