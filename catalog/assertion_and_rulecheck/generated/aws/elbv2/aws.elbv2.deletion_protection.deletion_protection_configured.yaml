version: '1.0'
rule_id: aws.elbv2.deletion_protection.deletion_protection_configured
for_each: aws.elbv2.describe_load_balancers
severity: MEDIUM
conditions:
  var: item.LoadBalancers[].LoadBalancerAttributes[?Key=='deletion_protection.enabled'].Value
  op: contains
  value: 'true'
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''AvailabilityZones'', ''CanonicalHostedZoneId'',
  ''CreatedTime'', ''CustomerOwnedIpv4Pool'', ''DNSName'', ''EnablePrefixForIpv6SourceNat'', ''EnforceSecurityGroupInboundRulesOnPrivateLinkTraffic'',
  ''IpAddressType''])'
