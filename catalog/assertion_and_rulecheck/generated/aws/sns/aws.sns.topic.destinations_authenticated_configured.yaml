version: '1.0'
rule_id: aws.sns.topic.destinations_authenticated_configured
for_each: aws.sns.list_subscriptions
severity: MEDIUM
conditions:
  any:
  - var: item.Protocol
    op: equals
    value: email
  - var: item.Protocol
    op: equals
    value: email-json
  - var: item.Protocol
    op: equals
    value: http
  - var: item.Protocol
    op: equals
    value: https
  - all:
    - var: item.Protocol
      op: equals
      value: sqs
    - var: item.Endpoint
      op: contains
      value: 'arn:aws:sqs:'
  - all:
    - var: item.Protocol
      op: equals
      value: lambda
    - var: item.Endpoint
      op: contains
      value: 'arn:aws:lambda:'
  - all:
    - var: item.Protocol
      op: equals
      value: firehose
    - var: item.Endpoint
      op: contains
      value: 'arn:aws:firehose:'
  - all:
    - var: item.Protocol
      op: equals
      value: application
    - var: item.Endpoint
      op: contains
      value: 'arn:aws:sns:'
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''Endpoint'', ''Owner'', ''Protocol'',
  ''SubscriptionArn'', ''TopicArn''])'
