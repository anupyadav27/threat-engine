version: '1.0'
rule_id: aws.sns.subscription.no_public_webhooks_configured
for_each: aws.sns.list_subscriptions
severity: HIGH
conditions:
  any:
  - var: item.Protocol
    op: not_equals
    value: HTTPS
  - var: item.Protocol
    op: not_equals
    value: email
  - var: item.Protocol
    op: not_equals
    value: email-json
  - var: item.Protocol
    op: not_equals
    value: sms
  - var: item.Protocol
    op: not_equals
    value: sqs
  - var: item.Protocol
    op: not_equals
    value: application
  - var: item.Protocol
    op: not_equals
    value: lambda
  - var: item.Protocol
    op: not_equals
    value: firehose
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''Protocol''])'
