version: '1.0'
rule_id: aws.sns.topic.no_public_webhooks_configured
for_each: aws.sns.list_subscriptions
severity: HIGH
conditions:
  all:
  - var: item.Protocol
    op: not_equals
    value: HTTPS
  - var: item.Endpoint
    op: not_contains
    value: https://hooks.slack.com
  - var: item.Endpoint
    op: not_contains
    value: https://discord.com/api/webhooks
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''Endpoint'', ''Owner'', ''Protocol'',
  ''SubscriptionArn'', ''TopicArn''])'
