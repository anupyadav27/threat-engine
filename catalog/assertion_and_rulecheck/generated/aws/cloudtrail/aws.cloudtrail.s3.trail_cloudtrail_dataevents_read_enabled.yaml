version: '1.0'
rule_id: aws.cloudtrail.s3.trail_cloudtrail_dataevents_read_enabled
for_each: aws.cloudtrail.get_event_selectors
severity: MEDIUM
conditions:
  any:
  - var: item.EventSelectors[].DataResources[].Type
    op: equals
    value: AWS::S3::Object
  - var: item.AdvancedEventSelectors[].FieldSelectors[].Field
    op: equals
    value: resources.type
  - var: item.AdvancedEventSelectors[].FieldSelectors[].Equals
    op: contains
    value: AWS::S3::Object
