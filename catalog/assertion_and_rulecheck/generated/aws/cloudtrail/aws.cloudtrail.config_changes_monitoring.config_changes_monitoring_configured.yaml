version: '1.0'
rule_id: aws.cloudtrail.config_changes_monitoring.config_changes_monitoring_configured
for_each: aws.cloudtrail.describe_trails
severity: MEDIUM
conditions:
  any:
  - var: item.EventSelectors
    op: not_empty
  - var: item.HasCustomEventSelectors
    op: is_true
  - var: item.HasInsightSelectors
    op: is_true
