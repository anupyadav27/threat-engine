version: '1.0'
rule_id: aws.cloudtrail.monitor_organizations_changes_metric_filter.trail_cloudtrail_monitor_organizations_changes_metric_filter_configured
for_each: aws.cloudtrail.describe_trails
severity: MEDIUM
conditions:
  all:
  - var: item.CloudWatchLogsLogGroupArn
    op: exists
  - var: item.CloudWatchLogsRoleArn
    op: exists
  - var: item.IsMultiRegionTrail
    op: is_true
  - var: item.IsOrganizationTrail
    op: is_true
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''CloudWatchLogsLogGroupArn'', ''CloudWatchLogsRoleArn'',
  ''EventSelectors'', ''HasCustomEventSelectors'', ''HasInsightSelectors'', ''HomeRegion'', ''IncludeGlobalServiceEvents'',
  ''IsMultiRegionTrail''])'
