version: '1.0'
rule_id: aws.rds.subnetgroup.private_subnets_only_configured
for_each: aws.rds.describe_db_subnet_groups
severity: HIGH
conditions:
  all:
  - var: item.DBSubnetGroups[].Subnets[].SubnetAvailabilityZone.Name
    op: not_contains
    value: us-east-1a
  - var: item.DBSubnetGroups[].Subnets[].SubnetAvailabilityZone.Name
    op: not_contains
    value: us-east-1b
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''SubnetGroupStatus''])'
