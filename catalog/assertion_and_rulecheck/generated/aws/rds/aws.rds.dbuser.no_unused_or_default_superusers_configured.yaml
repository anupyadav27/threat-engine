version: '1.0'
rule_id: aws.rds.dbuser.no_unused_or_default_superusers_configured
for_each: aws.rds.describe_db_clusters
severity: MEDIUM
conditions:
  all:
  - var: item.AssociatedRoles[].RoleArn
    op: not_empty
  - any:
    - var: item.AssociatedRoles[].RoleArn
      op: contains
      value: rds-superuser
    - var: item.AssociatedRoles[].RoleArn
      op: contains
      value: default
    op: is_false
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ActivityStreamKinesisStreamName'',
  ''ActivityStreamKmsKeyId'', ''ActivityStreamMode'', ''ActivityStreamStatus'', ''AllocatedStorage'', ''AssociatedRoles'',
  ''AutoMinorVersionUpgrade'', ''AutomaticRestartTime''])'
