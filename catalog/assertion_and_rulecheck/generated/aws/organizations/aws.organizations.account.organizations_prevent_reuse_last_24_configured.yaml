version: '1.0'
rule_id: aws.organizations.account.organizations_prevent_reuse_last_24_configured
for_each: aws.organizations.list_accounts
severity: MEDIUM
conditions:
  var: item.JoinedTimestamp
  op: gte
  value: '{{time.now - 24h}}'
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''Arn'', ''Email'', ''Id'', ''JoinedMethod'',
  ''JoinedTimestamp'', ''Name'', ''State'', ''Status''])'
