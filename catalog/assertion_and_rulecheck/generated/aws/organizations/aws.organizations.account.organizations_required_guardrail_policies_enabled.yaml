version: '1.0'
rule_id: aws.organizations.account.organizations_required_guardrail_policies_enabled
for_each: aws.organizations.describe_effective_policy
severity: MEDIUM
conditions:
  all:
  - var: item.PolicyType
    op: in
    value:
    - SERVICE_CONTROL_POLICY
    - TAG_POLICY
    - BACKUP_POLICY
    - AISERVICES_OPT_OUT_POLICY
  - var: item.EffectivePolicy
    op: exists
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''EffectivePolicy'', ''LastUpdatedTimestamp'',
  ''PolicyContent'', ''PolicyType'', ''TargetId''])'
