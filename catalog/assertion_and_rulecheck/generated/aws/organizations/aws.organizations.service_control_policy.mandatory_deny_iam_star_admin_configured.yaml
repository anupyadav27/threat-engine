version: '1.0'
rule_id: aws.organizations.service_control_policy.mandatory_deny_iam_star_admin_configured
for_each: aws.organizations.describe_effective_policy
severity: HIGH
conditions:
  all:
  - var: item.PolicyContent
    op: contains
    value: '"Effect":"Deny"'
  - var: item.PolicyContent
    op: contains
    value: '"Action":"iam:*"'
  - var: item.PolicyContent
    op: contains
    value: '"Resource":"*"'
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''EffectivePolicy'', ''LastUpdatedTimestamp'',
  ''PolicyContent'', ''PolicyType'', ''TargetId''])'
