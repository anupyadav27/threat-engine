version: '1.0'
rule_id: aws.organizations.account.organizations_lockout_threshold_configured
for_each: aws.organizations.describe_effective_policy
severity: MEDIUM
conditions:
  all:
  - var: item.PolicyType
    op: equals
    value: SERVICE_CONTROL_POLICY
  - var: item.PolicyContent
    op: contains
    value: LockoutThreshold
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''EffectivePolicy'', ''LastUpdatedTimestamp'',
  ''PolicyContent'', ''PolicyType'', ''TargetId''])'
