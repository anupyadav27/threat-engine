version: '1.0'
rule_id: aws.organizations.organizational_unit.organizations_auto_tag_policies_enabled_if_supported
for_each: aws.organizations.describe_organization
severity: MEDIUM
conditions:
  all:
  - var: item.AvailablePolicyTypes[].Type
    op: contains
    value: TAG_POLICY
  - var: item.AvailablePolicyTypes[?(@.Type == 'TAG_POLICY')].Status
    op: equals
    value: ENABLED
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''Account'', ''Arn'', ''AvailablePolicyTypes'',
  ''FeatureSet'', ''Id'', ''MasterAccountArn'', ''MasterAccountEmail'', ''MasterAccountId''])'
