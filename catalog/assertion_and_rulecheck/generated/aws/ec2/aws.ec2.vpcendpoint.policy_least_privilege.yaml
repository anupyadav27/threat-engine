version: '1.0'
rule_id: aws.ec2.vpcendpoint.policy_least_privilege
for_each: aws.ec2.describe_vpc_endpoints
severity: HIGH
conditions:
  all:
  - var: item.PolicyDocument.Statement[].Effect
    op: not_equals
    value: '*'
  - var: item.PolicyDocument.Statement[].Action
    op: not_equals
    value: '*'
  - var: item.PolicyDocument.Statement[].Resource
    op: not_equals
    value: '*'
fixture_validated: false
