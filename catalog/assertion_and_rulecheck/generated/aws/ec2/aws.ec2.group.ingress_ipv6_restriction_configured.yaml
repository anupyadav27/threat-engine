version: '1.0'
rule_id: aws.ec2.group.ingress_ipv6_restriction_configured
for_each: aws.ec2.describe_security_groups
severity: MEDIUM
conditions:
  all:
  - var: item.IpPermissions[].Ipv6Ranges
    op: is_empty
  - var: item.IpPermissionsEgress[].Ipv6Ranges
    op: is_empty
fixture_validated: false
