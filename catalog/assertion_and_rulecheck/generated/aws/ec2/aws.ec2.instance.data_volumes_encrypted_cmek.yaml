version: '1.0'
rule_id: aws.ec2.instance.data_volumes_encrypted_cmek
for_each: aws.ec2.describe_instances
severity: HIGH
conditions:
  all:
  - var: item.BlockDeviceMappings[].Ebs.Encrypted
    op: is_true
  - var: item.BlockDeviceMappings[].Ebs.KmsKeyId
    op: exists
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''Architecture'', ''BlockDeviceMappings'',
  ''EbsOptimized'', ''IamInstanceProfile'', ''ImageId'', ''InstanceId'', ''InstanceType'', ''KeyName''])'
