version: '1.0'
rule_id: aws.ec2.instance.no_public_ip_assigned_configured
for_each: aws.ec2.describe_addresses
severity: HIGH
conditions:
  all:
  - var: item.Addresses
    op: not_empty
  - any:
    - var: item.Addresses[].AssociationId
      op: not_exists
    - var: item.Addresses[].AssociationId
      op: is_empty
