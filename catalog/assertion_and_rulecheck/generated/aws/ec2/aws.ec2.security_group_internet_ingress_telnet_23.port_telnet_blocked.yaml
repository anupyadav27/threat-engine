version: '1.0'
rule_id: aws.ec2.security_group_internet_ingress_telnet_23.port_telnet_blocked
for_each: aws.ec2.describe_security_groups
severity: MEDIUM
conditions:
  all:
  - var: item.IpPermissions[].FromPort
    op: not_contains
    value: 23
  - var: item.IpPermissions[].ToPort
    op: not_contains
    value: 23
