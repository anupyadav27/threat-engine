version: '1.0'
rule_id: aws.ec2.keypair.key_max_age_days_configured
for_each: aws.ec2.describe_key_pairs
severity: MEDIUM
conditions:
  all:
  - var: item.KeyPairs[].CreateTime
    op: exists
  - var: item.KeyPairs[].CreateTime
    op: lt
    value: '90'
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''CreateTime'', ''KeyFingerprint'',
  ''KeyName'', ''KeyPairId'', ''KeyPairs'', ''KeyType'', ''PublicKey'', ''Tags''])'
