version: '1.0'
rule_id: aws.ec2.ami.not_publicly_shared_configured
for_each: aws.ec2.describe_images
severity: HIGH
conditions:
  all:
  - var: item.Public
    op: is_false
  - var: item.ImageOwnerAlias
    op: not_equals
    value: amazon
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''Architecture'', ''BlockDeviceMappings'',
  ''BootMode'', ''CreationDate'', ''DeprecationTime'', ''DeregistrationProtection'', ''Description'', ''EnaSupport''])'
