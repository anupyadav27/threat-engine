version: '1.0'
rule_id: aws.ec2.launchtemplate.security_groups_restrictive_configured
for_each: aws.ec2.describe_launch_templates
severity: HIGH
conditions:
  all:
  - var: item.LaunchTemplates[].LaunchTemplateData.NetworkInterfaces[].Groups
    op: not_empty
  - var: item.LaunchTemplates[].LaunchTemplateData.NetworkInterfaces[].Groups[]
    op: not_equals
    value: sg-00000000000000000
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''CreateTime'', ''CreatedBy'', ''DefaultVersionNumber'',
  ''LatestVersionNumber'', ''LaunchTemplateId'', ''LaunchTemplateName'', ''LaunchTemplates'', ''Operator''])'
