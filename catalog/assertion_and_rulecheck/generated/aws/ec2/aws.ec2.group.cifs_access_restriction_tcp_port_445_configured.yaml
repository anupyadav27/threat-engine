version: '1.0'
rule_id: aws.ec2.group.cifs_access_restriction_tcp_port_445_configured
for_each: aws.ec2.describe_security_groups
severity: MEDIUM
conditions:
  all:
  - var: item.IpPermissions[].FromPort
    op: not_equals
    value: 445
  - var: item.IpPermissions[].ToPort
    op: not_equals
    value: 445
  - var: item.IpPermissionsEgress[].FromPort
    op: not_equals
    value: 445
  - var: item.IpPermissionsEgress[].ToPort
    op: not_equals
    value: 445
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''Tags''])'
