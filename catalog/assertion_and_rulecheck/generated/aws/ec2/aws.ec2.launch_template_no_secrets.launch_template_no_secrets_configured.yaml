version: '1.0'
rule_id: aws.ec2.launch_template_no_secrets.launch_template_no_secrets_configured
for_each: aws.ec2.describe_launch_templates
severity: MEDIUM
conditions:
  all:
  - var: item.LaunchTemplates[].LaunchTemplateData.UserData
    op: not_contains
    value: AKIA
  - var: item.LaunchTemplates[].LaunchTemplateData.UserData
    op: not_contains
    value: secret
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''Tags''])'
