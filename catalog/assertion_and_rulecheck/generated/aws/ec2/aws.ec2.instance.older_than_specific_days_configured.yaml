version: '1.0'
rule_id: aws.ec2.instance.older_than_specific_days_configured
for_each: aws.ec2.describe_addresses
severity: MEDIUM
conditions:
  all:
  - var: item.Addresses[].InstanceId
    op: exists
  - var: item.Addresses[].AssociationId
    op: exists
  - var: item.Addresses[].Tags.Environment
    op: equals
    value: production
