version: '1.0'
rule_id: aws.ec2.instance.port_postgresql_exposed_to_internet_configured
for_each: aws.ec2.describe_addresses
severity: MEDIUM
conditions:
  any:
  - var: item.Addresses[].AssociationId
    op: not_exists
  - var: item.Addresses[].AssociationId
    op: exists
    conditions:
      all:
      - var: item.Addresses[].InstanceId
        op: exists
      - var: item.Addresses[].InstanceId
        op: not_exists
        conditions:
          var: item.Addresses[].NetworkInterfaceOwnerId
          op: exists
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''PublicIp'', ''PublicIpv4Pool'', ''Tags''])'
