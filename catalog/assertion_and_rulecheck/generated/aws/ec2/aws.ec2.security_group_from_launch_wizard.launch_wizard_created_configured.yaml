version: '1.0'
rule_id: aws.ec2.security_group_from_launch_wizard.launch_wizard_created_configured
for_each: aws.ec2.describe_security_groups
severity: MEDIUM
conditions:
  any:
  - var: item.GroupName
    op: not_equals
    value: launch-wizard-*
  - all:
    - var: item.IpPermissions
      op: is_empty
    - var: item.IpPermissionsEgress
      op: is_empty
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''Tags''])'
