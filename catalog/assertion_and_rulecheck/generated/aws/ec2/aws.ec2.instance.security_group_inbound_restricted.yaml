version: '1.0'
rule_id: aws.ec2.instance.security_group_inbound_restricted
for_each: aws.ec2.describe_security_groups
severity: HIGH
conditions:
  all:
  - var: item.IpPermissions[].IpRanges[].CidrIp
    op: not_contains
    value: 0.0.0.0/0
  - var: item.IpPermissions[].Ipv6Ranges[].CidrIpv6
    op: not_contains
    value: ::/0
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''Tags''])'
