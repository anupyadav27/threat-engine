version: '1.0'
rule_id: aws.ec2.security_group_with_many_ingress_egress_rules.ingress_egress_rules_limited_configured
for_each: aws.ec2.describe_security_groups
severity: MEDIUM
conditions:
  all:
  - var: item.IpPermissions
    op: length_lte
    value: 50
  - var: item.IpPermissionsEgress
    op: length_lte
    value: 50
