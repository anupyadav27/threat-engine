version: '1.0'
rule_id: aws.ec2.security_group.only_required_ports_allowed
for_each: aws.ec2.describe_security_groups
severity: MEDIUM
conditions:
  all:
  - var: item.IpPermissions[].IpRanges[].CidrIp
    op: not_contains
    value: 0.0.0.0/0
  - var: item.IpPermissionsEgress[].IpRanges[].CidrIp
    op: not_contains
    value: 0.0.0.0/0
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''Tags''])'
