version: '1.0'
rule_id: aws.ec2.security_group.allow_ingress_from_internet_to_tcp_port_22_configured
for_each: aws.ec2.describe_security_groups
severity: MEDIUM
conditions:
  any:
  - var: item.IpPermissions[].FromPort
    op: not_equals
    value: 22
  - var: item.IpPermissions[].ToPort
    op: not_equals
    value: 22
  - var: item.IpPermissions[].IpRanges[].CidrIp
    op: not_contains
    value: 0.0.0.0/0
  - var: item.IpPermissions[].Ipv6Ranges[].CidrIpv6
    op: not_contains
    value: ::/0
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''Tags''])'
