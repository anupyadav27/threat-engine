version: '1.0'
rule_id: aws.ec2.vpnconnection.tunnel_health_monitoring_enabled
for_each: aws.ec2.describe_vpn_connections
severity: MEDIUM
conditions:
  all:
  - var: item.VgwTelemetry[].Status
    op: equals
    value: UP
  - var: item.VgwTelemetry[].Status
    op: not_equals
    value: DOWN
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''Category'', ''CoreNetworkArn'',
  ''CoreNetworkAttachmentArn'', ''CustomerGatewayConfiguration'', ''CustomerGatewayId'', ''GatewayAssociationState'', ''Options'',
  ''PreSharedKeyArn''])'
