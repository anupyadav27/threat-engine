version: '1.0'
rule_id: aws.ec2.keypair.disable_unused_keys_configured
for_each: aws.ec2.describe_key_pairs
severity: MEDIUM
conditions:
  var: item.KeyPairs[].KeyName
  op: exists
fixture_validated: false
