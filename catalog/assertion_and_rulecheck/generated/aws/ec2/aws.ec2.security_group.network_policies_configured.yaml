version: '1.0'
rule_id: aws.ec2.security_group.network_policies_configured
for_each: aws.ec2.describe_security_groups
severity: HIGH
conditions:
  all:
  - var: item.IpPermissions
    op: is_empty
  - var: item.IpPermissionsEgress
    op: is_empty
