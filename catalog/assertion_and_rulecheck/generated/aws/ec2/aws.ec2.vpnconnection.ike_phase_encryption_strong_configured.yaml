version: '1.0'
rule_id: aws.ec2.vpnconnection.ike_phase_encryption_strong_configured
for_each: aws.ec2.describe_vpn_connections
severity: HIGH
conditions:
  all:
  - var: item.VpnConnections[].Options.TunnelOptions[].IKEVersions[].Value
    op: in
    value:
    - ikev2
  - var: item.VpnConnections[].Options.TunnelOptions[].Phase1EncryptionAlgorithms[].Value
    op: in
    value:
    - AES256
    - AES256-GCM-16
    - AES256-GCM-12
    - AES128-GCM-16
    - AES128-GCM-12
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''Category'', ''CoreNetworkArn'',
  ''CoreNetworkAttachmentArn'', ''CustomerGatewayConfiguration'', ''CustomerGatewayId'', ''GatewayAssociationState'', ''Options'',
  ''PreSharedKeyArn''])'
