version: '1.0'
rule_id: aws.ec2.instance.secrets_user_data_configured
for_each: aws.ec2.describe_instances
severity: MEDIUM
conditions:
  all:
  - var: item.Instances[].UserData
    op: exists
  - var: item.Instances[].UserData
    op: not_contains
    value: secret
  - var: item.Instances[].UserData
    op: not_contains
    value: password
  - var: item.Instances[].UserData
    op: not_contains
    value: key
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''Architecture'', ''BlockDeviceMappings'',
  ''EbsOptimized'', ''IamInstanceProfile'', ''ImageId'', ''InstanceId'', ''InstanceType'', ''KeyName''])'
