version: '1.0'
rule_id: aws.ec2.subnet.private_s_no_igw_route_configured
for_each: aws.ec2.describe_route_tables
severity: HIGH
conditions:
  all:
  - var: item.RouteTables[].Routes[].GatewayId
    op: not_contains
    value: igw-
  - var: item.RouteTables[].Associations[].SubnetId
    op: exists
