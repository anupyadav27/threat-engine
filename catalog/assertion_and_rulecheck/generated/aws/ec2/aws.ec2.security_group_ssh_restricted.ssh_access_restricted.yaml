version: '1.0'
rule_id: aws.ec2.security_group_ssh_restricted.ssh_access_restricted
for_each: aws.ec2.describe_security_groups
severity: MEDIUM
conditions:
  all:
  - var: item.IpPermissions[].IpRanges[].CidrIp
    op: not_contains
    value: 0.0.0.0/0
  - var: item.IpPermissions[].IpProtocol
    op: equals
    value: tcp
  - var: item.IpPermissions[].FromPort
    op: lte
    value: 22
  - var: item.IpPermissions[].ToPort
    op: gte
    value: 22
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''Description'', ''GroupId'', ''GroupName'',
  ''IpPermissions'', ''IpPermissionsEgress'', ''SecurityGroupArn'', ''Tags'', ''VpcId''])'
