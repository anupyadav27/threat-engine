version: '1.0'
rule_id: aws.ec2.networkacl.ingress_restrict_all_traffic
for_each: aws.ec2.describe_network_acls
severity: MEDIUM
conditions:
  all:
  - var: item.Entries[].Egress
    op: equals
    value: false
  - var: item.Entries[].CidrBlock
    op: not_equals
    value: 0.0.0.0/0
  - var: item.Entries[].RuleAction
    op: equals
    value: deny
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''Associations'', ''Entries'', ''IsDefault'',
  ''NetworkAclId'', ''NetworkAcls'', ''Tags'', ''VpcId''])'
