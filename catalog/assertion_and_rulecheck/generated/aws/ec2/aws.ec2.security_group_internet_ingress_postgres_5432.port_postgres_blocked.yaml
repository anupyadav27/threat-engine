version: '1.0'
rule_id: aws.ec2.security_group_internet_ingress_postgres_5432.port_postgres_blocked
for_each: aws.ec2.describe_security_groups
severity: MEDIUM
conditions:
  all:
  - var: item.IpPermissions[].FromPort
    op: not_contains
    value: 5432
  - var: item.IpPermissions[].IpRanges[].CidrIp
    op: not_contains
    value: 0.0.0.0/0
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''Tags''])'
