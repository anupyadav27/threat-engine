version: '1.0'
rule_id: aws.elb.loadbalancer.listener_tls_min_1_2_configured
for_each: aws.elb.describe_load_balancers
severity: HIGH
conditions:
  all:
  - var: item.ListenerDescriptions[].Listener.Protocol
    op: in
    value:
    - HTTPS
    - SSL
  - var: item.ListenerDescriptions[?(@.Listener.Protocol in ['HTTPS','SSL'])].Listener.SSLPolicy
    op: contains
    value: TLS-1-2
