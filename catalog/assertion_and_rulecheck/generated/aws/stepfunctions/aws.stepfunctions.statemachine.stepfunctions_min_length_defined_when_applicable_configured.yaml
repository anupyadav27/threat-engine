version: '1.0'
rule_id: aws.stepfunctions.statemachine.stepfunctions_min_length_defined_when_applicable_configured
for_each: aws.stepfunctions.describe_state_machine
severity: MEDIUM
conditions:
  all:
  - var: item.definition
    op: contains
    value: TimeoutSeconds
  - var: item.definition
    op: contains
    value: HeartbeatSeconds
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''creationDate'', ''definition'',
  ''description'', ''destinations'', ''encryptionConfiguration'', ''includeExecutionData'', ''label'', ''level''])'
