version: '1.0'
rule_id: aws.stepfunctions.statemachine.stepfunctions_values_not_plaintext_secret_configured
for_each: aws.stepfunctions.describe_state_machine
severity: MEDIUM
conditions:
  all:
  - var: item.definition
    op: not_contains
    value: '"SecretString"'
  - var: item.definition
    op: not_contains
    value: '"SecretId"'
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''encryptionConfiguration'', ''loggingConfiguration'',
  ''status'', ''tracingConfiguration''])'
