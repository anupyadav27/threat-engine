version: '1.0'
rule_id: aws.stepfunctions.statemachine.stepfunctions_min_length_defined_if_applicable_configured
for_each: aws.stepfunctions.describe_state_machine
severity: MEDIUM
conditions:
  all:
  - var: item.loggingConfiguration
    op: exists
  - var: item.loggingConfiguration.level
    op: equals
    value: ALL
  - var: item.loggingConfiguration.destinations[].cloudWatchLogsLogGroup.logGroupArn
    op: not_empty
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''creationDate'', ''definition'',
  ''description'', ''destinations'', ''encryptionConfiguration'', ''includeExecutionData'', ''label'', ''level''])'
