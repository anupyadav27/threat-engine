version: '1.0'
rule_id: aws.stepfunctions.statemachine.stepfunctions_artifacts_encrypted_and_private
for_each: aws.stepfunctions.describe_state_machine
severity: HIGH
conditions:
  all:
  - var: item.encryptionConfiguration
    op: exists
  - var: item.loggingConfiguration.destinations[].cloudWatchLogsLogGroup.logGroupArn
    op: not_contains
    value: arn:aws:logs:*:*:log-group:*:*:*
