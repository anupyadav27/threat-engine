version: '1.0'
rule_id: aws.stepfunctions.statemachine.disallowed_attribute_keys_blocked
for_each: aws.stepfunctions.describe_state_machine
severity: MEDIUM
conditions:
  var: item.definition
  op: not_contains
  value: '"Retry":[{"ErrorEquals":["States.ALL"]'
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''encryptionConfiguration'', ''loggingConfiguration'',
  ''status'', ''tracingConfiguration''])'
