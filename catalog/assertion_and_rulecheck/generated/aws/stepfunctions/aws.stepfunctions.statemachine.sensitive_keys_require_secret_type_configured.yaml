version: '1.0'
rule_id: aws.stepfunctions.statemachine.sensitive_keys_require_secret_type_configured
for_each: aws.stepfunctions.describe_state_machine
severity: MEDIUM
conditions:
  all:
  - var: item.definition
    op: contains
    value: Secret
  - var: item.definition
    op: contains
    value: '"Type": "AWS::SecretsManager::Secret"'
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''creationDate'', ''definition'',
  ''description'', ''destinations'', ''encryptionConfiguration'', ''includeExecutionData'', ''label'', ''level''])'
