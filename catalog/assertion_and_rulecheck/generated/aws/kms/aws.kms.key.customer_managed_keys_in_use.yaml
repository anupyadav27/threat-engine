version: '1.0'
rule_id: aws.kms.key.customer_managed_keys_in_use
for_each: aws.kms.describe_key
severity: MEDIUM
conditions:
  all:
  - var: item.KeyManager
    op: equals
    value: CUSTOMER
  - var: item.KeyState
    op: equals
    value: Enabled
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''AWSAccountId'', ''Arn'', ''CloudHsmClusterId'',
  ''CreationDate'', ''CurrentKeyMaterialId'', ''CustomKeyStoreId'', ''CustomerMasterKeySpec'', ''DeletionDate''])'
