version: '1.0'
rule_id: aws.kms.alias.default_keys_disabled_if_cmek_required
for_each: aws.kms.list_aliases
severity: MEDIUM
conditions:
  all:
  - var: item.AliasName
    op: not_contains
    value: alias/aws/
  - var: item.TargetKeyId
    op: not_contains
    value: arn:aws:kms
  - var: item.TargetKeyId
    op: length_gte
    value: 36
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''AliasArn'', ''AliasName'', ''CreationDate'',
  ''LastUpdatedDate'', ''TargetKeyId'', ''Truncated''])'
