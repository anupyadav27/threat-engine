version: '1.0'
rule_id: aws.kms.key.not_publicly_accessible_configured
for_each: aws.kms.get_key_policy
severity: HIGH
conditions:
  all:
  - var: item.Policy
    op: exists
  - var: item.Policy
    op: not_contains
    value: Principal":"*"
  - var: item.Policy
    op: not_contains
    value: Effect":"Allow"
    any:
    - var: item.Policy
      op: not_contains
      value: Condition
    - var: item.Policy
      op: contains
      value: Condition
