version: '1.0'
rule_id: aws.kms.grant.ee_principal_valid
for_each: aws.kms.list_grants
severity: MEDIUM
conditions:
  all:
  - var: item.GranteePrincipal
    op: not_contains
    value: '*'
  - var: item.GranteePrincipal
    op: not_contains
    value: '?'
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''IssuingAccount''])'
