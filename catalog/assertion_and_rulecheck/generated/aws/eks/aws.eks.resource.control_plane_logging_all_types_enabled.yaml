version: '1.0'
rule_id: aws.eks.resource.control_plane_logging_all_types_enabled
for_each: aws.eks.describe_cluster
severity: MEDIUM
conditions:
  all:
  - var: item.logging.clusterLogging[].enabled
    op: is_true
  - var: item.logging.clusterLogging[].types
    op: contains
    value: api
  - var: item.logging.clusterLogging[].types
    op: contains
    value: audit
  - var: item.logging.clusterLogging[].types
    op: contains
    value: authenticator
  - var: item.logging.clusterLogging[].types
    op: contains
    value: controllerManager
  - var: item.logging.clusterLogging[].types
    op: contains
    value: scheduler
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''accessConfig'', ''arn'', ''certificateAuthority'',
  ''clientRequestToken'', ''computeConfig'', ''connectorConfig'', ''controlPlaneScalingConfig'', ''createdAt''])'
