version: '1.0'
rule_id: aws.identitycenter.user.identitycenter_inactive_90_days_disabled
for_each: aws.identitycenter.list_users
severity: MEDIUM
conditions:
  all:
  - var: item.Status
    op: equals
    value: ACTIVE
  - var: item.LastAccessedDate
    op: exists
  - var: item.LastAccessedDate
    op: gte
    value: 90 days ago
