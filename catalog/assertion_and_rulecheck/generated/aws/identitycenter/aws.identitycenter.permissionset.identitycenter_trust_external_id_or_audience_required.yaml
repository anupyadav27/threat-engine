version: '1.0'
rule_id: aws.identitycenter.permissionset.identitycenter_trust_external_id_or_audience_required
for_each: aws.identitycenter.list_permission_sets
severity: MEDIUM
conditions:
  all:
  - var: item.TrustedIdentityPropagationConfiguration.TrustedIssuer[].TrustedIssuerUrl
    op: exists
  - any:
    - var: item.TrustedIdentityPropagationConfiguration.TrustedIssuer[].Audience
      op: exists
    - var: item.TrustedIdentityPropagationConfiguration.TrustedIssuer[].ExternalId
      op: exists
