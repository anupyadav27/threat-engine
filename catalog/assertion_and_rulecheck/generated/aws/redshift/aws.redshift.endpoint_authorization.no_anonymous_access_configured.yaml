version: '1.0'
rule_id: aws.redshift.endpoint_authorization.no_anonymous_access_configured
for_each: aws.redshift.describe_cluster_security_groups
severity: MEDIUM
conditions:
  all:
  - var: item.IPRanges
    op: is_empty
  - var: item.EC2SecurityGroups[].EC2SecurityGroupOwnerId
    op: not_equals
    value: amazon
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ClusterSecurityGroupName'', ''Description'',
  ''EC2SecurityGroups'', ''IPRanges'', ''Tags''])'
