version: '1.0'
rule_id: aws.redshift.user.redshift_no_unused_or_default_supers_configured
for_each: aws.redshift.describe_clusters
severity: MEDIUM
conditions:
  all:
  - var: item.ClusterParameterGroups[].ParameterGroupName
    op: not_contains
    value: default
  - var: item.ClusterParameterGroups[].ParameterGroupName
    op: not_contains
    value: unused
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''AllowVersionUpgrade'', ''AquaConfiguration'',
  ''AutomatedSnapshotRetentionPeriod'', ''AvailabilityZoneRelocationStatus'', ''ClusterAvailabilityStatus'', ''ClusterSnapshotCopyStatus'',
  ''ClusterStatus'', ''ClusterVersion''])'
