version: '1.0'
rule_id: aws.redshift.hsm_client_certificate.key_length_minimum
for_each: aws.redshift.describe_clusters
severity: MEDIUM
conditions:
  all:
  - var: item.HsmClientCertificateIdentifier
    op: exists
  - var: item.HsmClientCertificateIdentifier
    op: length_gte
    value: '2048'
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''AllowVersionUpgrade'', ''AquaConfiguration'',
  ''AutomatedSnapshotRetentionPeriod'', ''AvailabilityZone'', ''AvailabilityZoneRelocationStatus'', ''CatalogArn'', ''ClusterAvailabilityStatus'',
  ''ClusterCreateTime''])'
