version: '1.0'
rule_id: aws.directconnect.connection_redundancy.directconnect_connection_redundancy_configured
for_each: aws.directconnect.describe_connections
severity: MEDIUM
conditions:
  var: item.hasLogicalRedundancy
  op: equals
  value: 'yes'
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''awsDevice'', ''awsDeviceV2'', ''awsLogicalDeviceId'',
  ''bandwidth'', ''connectionId'', ''connectionName'', ''connectionState'', ''encryptionMode''])'
