version: '1.0'
rule_id: aws.glacier.vault.key_policy_least_privilege
for_each: aws.glacier.describe_vault
severity: HIGH
conditions:
  all:
  - var: item.VaultARN
    op: exists
  - any:
    - var: item.VaultARN
      op: not_contains
      value: arn:aws:glacier
    - var: item.VaultARN
      op: not_contains
      value: vaults
