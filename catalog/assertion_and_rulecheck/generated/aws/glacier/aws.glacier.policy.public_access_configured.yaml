version: '1.0'
rule_id: aws.glacier.policy.public_access_configured
for_each: aws.glacier.describe_vault
severity: HIGH
conditions:
  any:
  - var: item.VaultARN
    op: not_exists
  - all:
    - var: item.VaultARN
      op: exists
    - not:
        var: item.VaultARN
        op: contains
        value: arn:aws:glacier
