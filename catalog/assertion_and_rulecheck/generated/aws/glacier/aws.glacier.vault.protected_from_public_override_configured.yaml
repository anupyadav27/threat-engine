version: '1.0'
rule_id: aws.glacier.vault.protected_from_public_override_configured
for_each: aws.glacier.describe_vault
severity: HIGH
conditions:
  all:
  - var: item.VaultName
    op: exists
  - any:
    - var: item.VaultAccessPolicy
      op: exists
    - var: item.VaultLock
      op: exists
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''CreationDate'', ''LastInventoryDate'',
  ''NumberOfArchives'', ''SizeInBytes'', ''VaultARN'', ''VaultName''])'
