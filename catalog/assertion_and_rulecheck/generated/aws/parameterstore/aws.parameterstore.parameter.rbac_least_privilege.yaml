version: '1.0'
rule_id: aws.parameterstore.parameter.rbac_least_privilege
for_each: aws.ssm.describe_parameters
severity: HIGH
conditions:
  all:
  - var: item.Policies[].PolicyText
    op: not_contains
    value: '"Effect":"Allow"'
  - var: item.Policies[].PolicyText
    op: not_contains
    value: '"Action":"ssm:*"'
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''AllowedPattern'', ''Version''])'
