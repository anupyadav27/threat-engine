version: '1.0'
rule_id: aws.s3.intelligent_tiering.bucket_enforced_on_sensitive_datasets_configured
for_each: aws.s3.get_bucket_lifecycle_configuration
severity: MEDIUM
conditions:
  all:
  - var: item[].Status
    op: contains
    value: Enabled
  - var: item[].Transitions[].StorageClass
    op: contains
    value: INTELLIGENT_TIERING
