version: '1.0'
rule_id: aws.s3.bucketpolicy.bucket_no_wildcards_on_actions_or_principals_configured
for_each: aws.s3.get_bucket_policy
severity: MEDIUM
conditions:
  all:
  - var: item.Policy
    op: exists
  - var: item.Policy.Statement[].Action
    op: not_contains
    value: '*'
  - var: item.Policy.Statement[].Principal
    op: not_contains
    value: '*'
