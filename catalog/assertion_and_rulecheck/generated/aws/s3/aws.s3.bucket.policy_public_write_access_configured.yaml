version: '1.0'
rule_id: aws.s3.bucket.policy_public_write_access_configured
for_each: aws.s3.get_bucket_policy
severity: HIGH
conditions:
  all:
  - var: item.Policy
    op: exists
  - var: item.Policy
    op: not_contains
    value: s3:PutObject
  - var: item.Policy
    op: not_contains
    value: s3:*
  - var: item.Policy
    op: not_contains
    value: '"Effect":"Allow","Principal":"*"'
