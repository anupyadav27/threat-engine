version: '1.0'
rule_id: aws.s3.object.not_publicly_readable_configured
for_each: aws.s3.get_bucket_acl
severity: HIGH
conditions:
  all:
  - any:
    - var: item.Grantee
      op: not_exists
    - var: item.Grantee
      op: is_empty
  - any:
    - var: item.Permission
      op: not_exists
    - var: item.Permission
      op: is_empty
