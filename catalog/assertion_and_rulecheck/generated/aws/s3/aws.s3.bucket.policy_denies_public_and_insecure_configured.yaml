version: '1.0'
rule_id: aws.s3.bucket.policy_denies_public_and_insecure_configured
for_each: aws.s3.get_bucket_policy
severity: HIGH
conditions:
  all:
  - var: item.Policy
    op: not_empty
  - var: item.Policy
    op: contains
    value: Deny
  - var: item.Policy
    op: contains
    value: Principal":"*
