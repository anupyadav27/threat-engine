version: '1.0'
rule_id: aws.lambda.function.restrict_public_access_configured
for_each: aws.lambda.get_function_url_config
severity: HIGH
conditions:
  any:
  - var: item.AuthType
    op: not_equals
    value: NONE
  - var: item.AuthType
    op: not_exists
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''AllowCredentials'', ''AllowHeaders'',
  ''AllowMethods'', ''AllowOrigins'', ''MaxAge''])'
