version: '1.0'
rule_id: aws.lambda.function.vpc_multi_az_configured
for_each: aws.lambda.get_function
severity: HIGH
conditions:
  all:
  - var: item.VpcConfig.SubnetIds
    op: not_empty
  - var: item.VpcConfig.SubnetIds
    op: length_gte
    value: 2
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''Architectures'', ''CodeSha256'',
  ''CodeSize'', ''Concurrency'', ''DeadLetterConfig'', ''Description'', ''Environment'', ''EphemeralStorage''])'
