version: '1.0'
rule_id: aws.lambda.function.url_cors_policy_configured
for_each: aws.lambda.get_function_url_config
severity: HIGH
conditions:
  all:
  - var: item.Cors
    op: exists
  - var: item.Cors.AllowOrigins
    op: not_empty
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''AllowCredentials'', ''AllowHeaders'',
  ''AllowMethods'', ''AllowOrigins'', ''AuthType'', ''Cors'', ''ExposeHeaders'', ''FunctionArn''])'
