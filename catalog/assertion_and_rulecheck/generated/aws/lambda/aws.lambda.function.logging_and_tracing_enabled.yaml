version: '1.0'
rule_id: aws.lambda.function.logging_and_tracing_enabled
for_each: aws.lambda.get_function_configuration
severity: MEDIUM
conditions:
  all:
  - var: item.LoggingConfig
    op: exists
  - var: item.LoggingConfig.LogFormat
    op: exists
  - var: item.TracingConfig
    op: exists
  - var: item.TracingConfig.Mode
    op: equals
    value: Active
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''Architectures'', ''CodeSize'',
  ''DeadLetterConfig'', ''Description'', ''Environment'', ''FunctionArn'', ''FunctionName'', ''Handler''])'
