version: '1.0'
rule_id: aws.lambda.version.published_and_immutable_configured
for_each: aws.lambda.get_function_configuration
severity: MEDIUM
conditions:
  all:
  - var: item.Version
    op: exists
  - var: item.Version
    op: not_equals
    value: $LATEST
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''Architectures'', ''CodeSize'',
  ''DeadLetterConfig'', ''Description'', ''Environment'', ''FunctionArn'', ''FunctionName'', ''Handler''])'
