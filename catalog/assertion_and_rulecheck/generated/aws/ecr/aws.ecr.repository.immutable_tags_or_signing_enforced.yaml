version: '1.0'
rule_id: aws.ecr.repository.immutable_tags_or_signing_enforced
for_each: aws.ecr.describe_repositories
severity: MEDIUM
conditions:
  any:
  - var: item.imageTagMutability
    op: equals
    value: IMMUTABLE
  - var: item.imageScanningConfiguration.scanOnPush
    op: is_true
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''createdAt'', ''encryptionConfiguration'',
  ''imageScanningConfiguration'', ''imageTagMutability'', ''imageTagMutabilityExclusionFilters'', ''registryId'', ''repositories'',
  ''repositoryArn''])'
