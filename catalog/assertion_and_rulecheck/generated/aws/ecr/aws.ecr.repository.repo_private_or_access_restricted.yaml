version: '1.0'
rule_id: aws.ecr.repository.repo_private_or_access_restricted
for_each: aws.ecr.describe_repositories
severity: HIGH
conditions:
  any:
  - var: item.repositories[].repositoryName
    op: not_exists
  - all:
    - var: item.repositories[].repositoryName
      op: exists
    - var: item.repositories[].repositoryName
      op: not_contains
      value: public
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''encryptionConfiguration'', ''imageScanningConfiguration''])'
