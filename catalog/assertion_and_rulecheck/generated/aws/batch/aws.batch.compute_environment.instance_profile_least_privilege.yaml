version: '1.0'
rule_id: aws.batch.compute_environment.instance_profile_least_privilege
for_each: aws.batch.describe_compute_environments
severity: HIGH
conditions:
  all:
  - var: item.computeResources.instanceRole
    op: exists
  - var: item.computeResources.instanceRole
    op: not_contains
    value: '*'
fixture_validated: false
