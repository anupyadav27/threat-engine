version: '1.0'
rule_id: aws.apigatewayv2.stage.api_execution_logging_level_minimum_error_configured
for_each: aws.apigatewayv2.get_stages
severity: MEDIUM
conditions:
  var: item.LoggingLevel
  op: in
  value:
  - ERROR
  - INFO
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''AccessLogSettings'', ''ApiGatewayManaged'',
  ''AutoDeploy'', ''ClientCertificateId'', ''CreatedDate'', ''DataTraceEnabled'', ''DefaultRouteSettings'', ''DeploymentId''])'
