version: '1.0'
rule_id: aws.codebuild.resource.codebuild_project_envvar_awscred_configured
for_each: aws.codebuild.batch_get_projects
severity: MEDIUM
conditions:
  all:
  - var: item.environment.environmentVariables[].name
    op: not_contains
    value: AWS_ACCESS_KEY_ID
  - var: item.environment.environmentVariables[].name
    op: not_contains
    value: AWS_SECRET_ACCESS_KEY
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''logsConfig'', ''tags'', ''vpcConfig''])'
