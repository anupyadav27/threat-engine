version: '1.0'
rule_id: aws.inspector2.organization.scanning_enabled
for_each: aws.inspector2.describe_organization_configuration
severity: MEDIUM
conditions:
  all:
  - var: item.autoEnable
    op: exists
  - var: item.autoEnable.ec2
    op: is_true
  - var: item.autoEnable.ecr
    op: is_true
  - var: item.autoEnable.lambda
    op: is_true
