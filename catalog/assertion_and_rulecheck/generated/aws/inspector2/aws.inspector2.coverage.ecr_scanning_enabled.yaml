version: '1.0'
rule_id: aws.inspector2.coverage.ecr_scanning_enabled
for_each: aws.inspector2.list_coverage
severity: MEDIUM
conditions:
  all:
  - var: item.resourceType
    op: equals
    value: AWS_ECR_CONTAINER_IMAGE
  - var: item.scanStatus
    op: equals
    value: ACTIVE
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''accountId'', ''lastScannedAt'',
  ''resourceId'', ''resourceMetadata'', ''resourceType'', ''scanMode'', ''scanStatus'', ''scanType''])'
