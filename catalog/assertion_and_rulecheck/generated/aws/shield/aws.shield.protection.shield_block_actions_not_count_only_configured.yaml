version: '1.0'
rule_id: aws.shield.protection.shield_block_actions_not_count_only_configured
for_each: aws.shield.list_protections
severity: MEDIUM
conditions:
  all:
  - var: item.ApplicationLayerAutomaticResponseConfiguration
    op: exists
  - var: item.ApplicationLayerAutomaticResponseConfiguration.Status
    op: equals
    value: ENABLED
  - var: item.ApplicationLayerAutomaticResponseConfiguration.Action
    op: not_equals
    value: COUNT
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''ApplicationLayerAutomaticResponseConfiguration'',
  ''HealthCheckIds'', ''Id'', ''Name'', ''ProtectionArn'', ''ResourceArn''])'
