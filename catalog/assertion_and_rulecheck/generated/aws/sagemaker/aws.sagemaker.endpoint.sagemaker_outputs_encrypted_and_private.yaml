version: '1.0'
rule_id: aws.sagemaker.endpoint.sagemaker_outputs_encrypted_and_private
for_each: aws.sagemaker.describe_endpoint_config
severity: HIGH
conditions:
  all:
  - var: item.DataCaptureConfig
    op: exists
  - var: item.DataCaptureConfig.KmsKeyId
    op: exists
  - var: item.DataCaptureConfig.DestinationS3Uri
    op: not_contains
    value: s3://
  - var: item.DataCaptureConfig.EnableCapture
    op: is_true
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''AcceleratorType'', ''BillableTimeInSeconds'',
  ''CapacityReservationConfig'', ''ContainerStartupHealthCheckTimeoutInSeconds'', ''CoreDumpConfig'', ''DataCaptureConfig'',
  ''EnableSSMAccess'', ''InferenceAmiVersion''])'
