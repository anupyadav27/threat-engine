version: '1.0'
rule_id: aws.sagemaker.flowdefinition.workteam_access_rbac_least_privilege
for_each: aws.sagemaker.describe_flow_definition
severity: HIGH
conditions:
  all:
  - var: item.HumanLoopConfig.WorkteamArn
    op: exists
  - var: item.HumanLoopConfig.PublicWorkforceTaskPrice.AmountInUsd
    op: not_exists
