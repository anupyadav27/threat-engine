version: '1.0'
rule_id: aws.sagemaker.transformjob.sagemaker_input_output_encrypted
for_each: aws.sagemaker.describe_hyper_parameter_tuning_job
severity: HIGH
conditions:
  all:
  - var: item.InputDataConfig[].S3DataSource.S3DataType
    op: exists
  - var: item.OutputDataConfig.KmsKeyId
    op: exists
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''AlgorithmSpecification'', ''CheckpointConfig'',
  ''DefinitionName'', ''EnableInterContainerTrafficEncryption'', ''EnableManagedSpotTraining'', ''EnableNetworkIsolation'',
  ''Environment'', ''HyperParameterRanges''])'
