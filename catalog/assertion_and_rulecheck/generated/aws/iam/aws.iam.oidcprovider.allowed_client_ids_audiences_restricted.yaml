version: '1.0'
rule_id: aws.iam.oidcprovider.allowed_client_ids_audiences_restricted
for_each: aws.iam.get_account_authorization_details
severity: MEDIUM
conditions:
  all:
  - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Condition.StringEquals.sts:aud
    op: exists
  - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Condition.StringEquals.sts:aud
    op: not_contains
    value: '*'
