version: '1.0'
rule_id: aws.iam.user.access_keys_rotated_90_days_or_less_when_present
for_each: aws.iam.get_account_authorization_details
severity: MEDIUM
conditions:
  all:
  - var: item.UserDetailList[].AccessKeys[].Status
    op: equals
    value: Active
  - var: item.UserDetailList[].AccessKeys[].CreateDate
    op: lt
    value: '90'
