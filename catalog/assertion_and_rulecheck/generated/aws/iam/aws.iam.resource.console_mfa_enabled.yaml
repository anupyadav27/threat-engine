version: '1.0'
rule_id: aws.iam.resource.console_mfa_enabled
for_each: aws.iam.get_account_authorization_details
severity: CRITICAL
conditions:
  all:
  - var: item.UserDetailList[].UserName
    op: not_contains
    value: root
  - any:
    - var: item.UserDetailList[].MfaActive
      op: is_true
    - var: item.UserDetailList[].MfaActive
      op: exists
