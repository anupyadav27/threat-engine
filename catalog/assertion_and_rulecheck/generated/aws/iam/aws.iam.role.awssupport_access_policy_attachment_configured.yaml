version: '1.0'
rule_id: aws.iam.role.awssupport_access_policy_attachment_configured
for_each: aws.iam.get_account_authorization_details
severity: HIGH
conditions:
  any:
  - var: item.RoleDetailList[?(@.RoleName == 'AWSSupportServiceRolePolicy')].AttachedManagedPolicies[?(@.PolicyName == 'AWSSupportAccess')]
    op: not_empty
  - var: item.RoleDetailList[?(@.RoleName == 'AWSSupportServiceRolePolicy')].AttachedManagedPolicies[?(@.PolicyArn == 'arn:aws:iam::aws:policy/AWSSupportAccess')]
    op: not_empty
