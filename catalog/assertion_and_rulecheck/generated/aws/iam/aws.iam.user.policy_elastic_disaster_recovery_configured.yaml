version: '1.0'
rule_id: aws.iam.user.policy_elastic_disaster_recovery_configured
for_each: aws.iam.get_account_authorization_details
severity: HIGH
conditions:
  any:
  - var: item.UserDetailList[].AttachedManagedPolicies[].PolicyName
    op: contains
    value: AWSElasticDisasterRecovery
  - var: item.UserDetailList[].UserPolicyList[].PolicyDocument.Statement[].Action
    op: contains
    value: drs:*
