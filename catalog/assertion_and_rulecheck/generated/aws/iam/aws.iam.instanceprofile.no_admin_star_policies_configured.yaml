version: '1.0'
rule_id: aws.iam.instanceprofile.no_admin_star_policies_configured
for_each: aws.iam.get_account_authorization_details
severity: MEDIUM
conditions:
  any:
  - var: item.RoleDetailList[].AttachedManagedPolicies[].PolicyName
    op: not_contains
    value: AdministratorAccess
  - var: item.RoleDetailList[].AttachedManagedPolicies[].PolicyName
    op: not_contains
    value: '*'
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''Tags'', ''Version''])'
