version: '1.0'
rule_id: aws.iam.support.role_created_configured
for_each: aws.iam.get_account_authorization_details
severity: HIGH
conditions:
  any:
  - var: item.RoleDetailList[?(@.RoleName == 'AWSSupportRole')]
    op: exists
  - var: item.RoleDetailList[?(@.RoleName == 'AWSSupportAccess')]
    op: exists
