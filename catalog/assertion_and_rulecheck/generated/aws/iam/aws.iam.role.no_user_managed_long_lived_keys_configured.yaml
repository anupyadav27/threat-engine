version: '1.0'
rule_id: aws.iam.role.no_user_managed_long_lived_keys_configured
for_each: aws.iam.get_account_authorization_details
severity: MEDIUM
conditions:
  all:
  - var: item.UserDetailList[].UserName
    op: exists
  - any:
    - var: item.UserDetailList[].CreateDate
      op: not_exists
    - var: item.UserDetailList[].SSHPublicKey
      op: not_exists
