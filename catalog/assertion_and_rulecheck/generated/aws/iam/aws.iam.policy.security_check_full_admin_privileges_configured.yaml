version: '1.0'
rule_id: aws.iam.policy.security_check_full_admin_privileges_configured
for_each: aws.iam.get_account_authorization_details_policies
severity: HIGH
conditions:
  all:
  - var: item.PolicyName
    op: not_equals
    value: AdministratorAccess
  - var: item.PolicyName
    op: not_contains
    value: FullAccess
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''AttachmentCount''])'
