version: '1.0'
rule_id: aws.iam.managedpolicy.editors_rbac_least_privilege
for_each: aws.iam.get_account_authorization_details_policies
severity: HIGH
conditions:
  all:
  - var: item.PolicyName
    op: not_contains
    value: AdministratorAccess
  - var: item.PolicyName
    op: not_contains
    value: PowerUserAccess
  - var: item.PolicyName
    op: not_contains
    value: IAMFullAccess
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''AttachmentCount''])'
