version: '1.0'
rule_id: aws.iam.oidcprovider.certificate_issuer_https_and_matches_discovery_verified
for_each: aws.iam.get_account_authorization_details
severity: MEDIUM
conditions:
  all:
  - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Principal.Federated
    op: contains
    value: oidc.eks.
  - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Condition.StringEquals
    op: exists
