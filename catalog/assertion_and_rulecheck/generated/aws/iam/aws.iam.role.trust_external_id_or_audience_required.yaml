version: '1.0'
rule_id: aws.iam.role.trust_external_id_or_audience_required
for_each: aws.iam.get_account_authorization_details
severity: MEDIUM
conditions:
  all:
  - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Condition.StringEquals.sts:ExternalId
    op: exists
  - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Condition.StringEquals.sts:ExternalId
    op: not_empty
