version: '1.0'
rule_id: aws.iam.user.credentials_unused_45_days_disabled
for_each: aws.iam.get_account_authorization_details
severity: MEDIUM
conditions:
  all:
  - var: item.UserDetailList[].PasswordLastUsed
    op: exists
  - var: item.UserDetailList[].PasswordLastUsed
    op: gte
    value: '45'
