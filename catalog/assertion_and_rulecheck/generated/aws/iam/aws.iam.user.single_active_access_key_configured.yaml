version: '1.0'
rule_id: aws.iam.user.single_active_access_key_configured
for_each: aws.iam.get_account_authorization_details
severity: MEDIUM
conditions:
  all:
  - var: item.UserDetailList[].AccessKeys[].Status
    op: contains
    value: Active
  - var: item.UserDetailList[].AccessKeys[].Status
    op: length_lte
    value: 1
