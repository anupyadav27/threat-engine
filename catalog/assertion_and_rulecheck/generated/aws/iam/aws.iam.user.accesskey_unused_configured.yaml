version: '1.0'
rule_id: aws.iam.user.accesskey_unused_configured
for_each: aws.iam.get_account_authorization_details
severity: MEDIUM
conditions:
  all:
  - var: item.UserDetailList[].AccessKeys[].Status
    op: not_contains
    value: Active
  - var: item.UserDetailList[].AccessKeys
    op: not_empty
