version: '1.0'
rule_id: aws.iam.role.trust_principals_allowlist_only_configured
for_each: aws.iam.get_account_authorization_details
severity: MEDIUM
conditions:
  all:
  - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Principal
    op: exists
  - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Principal
    op: not_contains
    value: '*'
