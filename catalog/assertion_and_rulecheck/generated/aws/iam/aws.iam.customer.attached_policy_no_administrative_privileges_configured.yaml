version: '1.0'
rule_id: aws.iam.customer.attached_policy_no_administrative_privileges_configured
for_each: aws.iam.get_account_authorization_details_policies
severity: HIGH
conditions:
  all:
  - var: item.AttachmentCount
    op: gt
    value: 0
  - any:
    - var: item.PolicyName
      op: contains
      value: AdministratorAccess
    - var: item.PolicyName
      op: contains
      value: FullAccess
  op: is_false
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''Arn'', ''AttachmentCount'', ''CreateDate'',
  ''IsAttachable'', ''Path'', ''PolicyId'', ''PolicyName'', ''PolicyVersionList''])'
