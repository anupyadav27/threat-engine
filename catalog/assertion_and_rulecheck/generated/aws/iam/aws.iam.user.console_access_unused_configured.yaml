version: '1.0'
rule_id: aws.iam.user.console_access_unused_configured
for_each: aws.iam.get_account_authorization_details
severity: MEDIUM
conditions:
  all:
  - var: item.UserDetailList[].PasswordLastUsed
    op: exists
  - var: item.UserDetailList[].PasswordLastUsed
    op: not_equals
    value: N/A
