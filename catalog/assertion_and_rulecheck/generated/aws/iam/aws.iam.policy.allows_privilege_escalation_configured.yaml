version: '1.0'
rule_id: aws.iam.policy.allows_privilege_escalation_configured
for_each: aws.iam.get_account_authorization_details
severity: HIGH
conditions:
  all:
  - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Action
    op: not_contains
    value: iam:PassRole
  - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Action
    op: not_contains
    value: iam:CreatePolicyVersion
  - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Action
    op: not_contains
    value: iam:SetDefaultPolicyVersion
  - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Action
    op: not_contains
    value: iam:AttachUserPolicy
  - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Action
    op: not_contains
    value: iam:AttachGroupPolicy
  - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Action
    op: not_contains
    value: iam:AttachRolePolicy
  - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Action
    op: not_contains
    value: iam:PutUserPolicy
  - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Action
    op: not_contains
    value: iam:PutGroupPolicy
  - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Action
    op: not_contains
    value: iam:PutRolePolicy
  - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Action
    op: not_contains
    value: iam:AddUserToGroup
  - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Action
    op: not_contains
    value: iam:UpdateAssumeRolePolicy
  - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Action
    op: not_contains
    value: iam:CreateLoginProfile
  - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Action
    op: not_contains
    value: iam:UpdateLoginProfile
  - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Action
    op: not_contains
    value: iam:AttachRolePolicy
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''Tags'', ''Version''])'
