version: '1.0'
rule_id: aws.iam.role.keys_not_used_or_rotated_90_days_or_less_configured
for_each: aws.iam.get_account_authorization_details
severity: MEDIUM
conditions:
  all:
  - var: item.RoleDetailList[].RoleLastUsed.LastUsedDate
    op: exists
  - var: item.RoleDetailList[].RoleLastUsed.LastUsedDate
    op: gt
    value: -90d
