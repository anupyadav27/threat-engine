version: '1.0'
rule_id: aws.iam.policy.minimum_length_14_configured
for_each: aws.iam.get_account_password_policy
severity: MEDIUM
conditions:
  all:
  - var: item.MinimumPasswordLength
    op: gte
    value: '14'
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''AllowUsersToChangePassword'', ''ExpirePasswords'',
  ''HardExpiry'', ''MaxPasswordAge'', ''MinimumPasswordLength'', ''PasswordPolicy'', ''PasswordReusePrevention'', ''RequireLowercaseCharacters''])'
