version: '1.0'
rule_id: aws.iam.group.no_inline_policies_configured
for_each: aws.iam.get_account_authorization_details
severity: MEDIUM
conditions:
  all:
  - var: item.GroupList[].GroupName
    op: exists
  - var: item.GroupDetailList[?(@.GroupName == this.GroupName)].GroupPolicyList
    op: is_empty
