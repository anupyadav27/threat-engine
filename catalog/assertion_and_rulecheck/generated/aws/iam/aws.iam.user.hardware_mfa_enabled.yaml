version: '1.0'
rule_id: aws.iam.user.hardware_mfa_enabled
for_each: aws.iam.get_account_authorization_details
severity: MEDIUM
conditions:
  all:
  - var: item.UserDetailList[].UserName
    op: exists
  - var: item.UserDetailList[].UserPolicyList[].PolicyName
    op: not_contains
    value: hardware_mfa_disabled
