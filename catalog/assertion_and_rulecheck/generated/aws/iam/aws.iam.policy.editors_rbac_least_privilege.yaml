    op: not_in
    value:
    - IAMFullAccess
    - AdministratorAccess
  - var: item.RoleDetailList[].AttachedManagedPolicies[].PolicyName
    op: not_in
    value:
    - IAMFullAccess
    - AdministratorAccess
