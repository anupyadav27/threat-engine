version: '1.0'
rule_id: azure.rbac.role_definition.identity_access_role_session_duration_reasonable_where_applicable
for_each: azure.rbac.list_role_definitions
severity: MEDIUM
conditions:
  all:
  - var: item.properties.type
    op: equals
    value: CustomRole
  - var: item.properties.maxSessionDurationInHours
    op: exists
  - var: item.properties.maxSessionDurationInHours
    op: lte
    value: 8
