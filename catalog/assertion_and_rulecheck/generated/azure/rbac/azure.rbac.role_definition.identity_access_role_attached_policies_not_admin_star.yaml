version: '1.0'
rule_id: azure.rbac.role_definition.identity_access_role_attached_policies_not_admin_star
for_each: azure.rbac.list_role_definitions
severity: MEDIUM
conditions:
  all:
  - var: item.properties.type
    op: equals
    value: CustomRole
  - var: item.properties.permissions[].actions
    op: not_contains
    value: '*'
  - var: item.properties.permissions[].actions
    op: not_contains
    value: Microsoft.Authorization/*
