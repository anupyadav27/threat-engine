version: '1.0'
rule_id: azure.rbac.role_definition.identity_access_role_no_inline_policies
for_each: azure.rbac.list_role_definitions
severity: MEDIUM
conditions:
  all:
  - var: item.properties.roleName
    op: contains
    value: Identity
  - var: item.properties.permissions[].actions
    op: not_contains
    value: Microsoft.Authorization/roleAssignments/write
