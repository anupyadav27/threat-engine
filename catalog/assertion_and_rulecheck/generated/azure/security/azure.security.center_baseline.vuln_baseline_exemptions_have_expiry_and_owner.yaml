version: '1.0'
rule_id: azure.security.center_baseline.vuln_baseline_exemptions_have_expiry_and_owner
for_each: azure.security.tasks.list
severity: MEDIUM
conditions:
  all:
  - var: item.security_task_parameters
    op: exists
  - var: item.security_task_parameters
    op: contains
    value: expiry
  - var: item.security_task_parameters
    op: contains
    value: owner
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''id'', ''name'', ''type'', ''creation_time_utc'',
  ''last_state_change_time_utc'', ''security_task_parameters'', ''state'', ''sub_state''])'
