version: '1.0'
rule_id: azure.sql.server.firewall.no.open.access.check
for_each: azure.sql.servers.list
severity: MEDIUM
conditions:
  all:
  - var: item.properties.publicNetworkAccess
    op: equals
    value: Disabled
  - var: item.properties.firewallRules[].startIpAddress
    op: not_contains
    value: 0.0.0.0
  - var: item.properties.firewallRules[].endIpAddress
    op: not_contains
    value: 255.255.255.255
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''identity'', ''type'', ''properties'',
  ''location'', ''sku'', ''name'', ''provisioning_state'', ''zones''])'
