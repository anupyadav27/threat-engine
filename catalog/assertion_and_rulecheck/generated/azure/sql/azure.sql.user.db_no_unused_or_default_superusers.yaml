version: '1.0'
rule_id: azure.sql.user.db_no_unused_or_default_superusers
for_each: azure.sql.servers.list
severity: MEDIUM
conditions:
  all:
  - var: item.properties.administrators
    op: exists
  - var: item.properties.administrators.administratorType
    op: equals
    value: ActiveDirectory
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''identity'', ''type'', ''properties'',
  ''location'', ''sku'', ''name'', ''provisioning_state'', ''zones''])'
