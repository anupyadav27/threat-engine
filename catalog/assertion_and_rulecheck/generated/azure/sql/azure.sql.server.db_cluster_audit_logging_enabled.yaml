version: '1.0'
rule_id: azure.sql.server.db_cluster_audit_logging_enabled
for_each: azure.sql.servers.list
severity: MEDIUM
conditions:
  all:
  - var: item.properties.auditingSettings
    op: exists
  - var: item.properties.auditingSettings.state
    op: equals
    value: Enabled
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''identity'', ''type'', ''properties'',
  ''location'', ''sku'', ''name'', ''provisioning_state'', ''zones''])'
