version: '1.0'
rule_id: azure.sql.server.db_sg_only_required_ports_open
for_each: azure.sql.servers.list
severity: MEDIUM
conditions:
  all:
  - var: item.properties.restrictOutboundNetworkAccess
    op: equals
    value: Enabled
  - var: item.properties.minimalTlsVersion
    op: equals
    value: '1.2'
fixture_validated: false
