version: '1.0'
rule_id: azure.compute.instance.older_than_specific_days
for_each: azure.compute.dedicatedhosts.list_by_host_group
severity: MEDIUM
conditions:
  all:
  - var: item.provisioning_time
    op: exists
  - var: item.provisioning_time
    op: gte
    value: '2025-01-01T00:00:00Z'
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''type'', ''location'', ''sku'',
  ''name'', ''provisioning_state'', ''id'', ''tags'', ''auto_replace_on_failure''])'
