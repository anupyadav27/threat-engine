version: '1.0'
rule_id: azure.compute.virtual_machine_template.launch_template_instance_profile_least_privilege
for_each: azure.compute.virtual_machine_template.launch_template_instance_profile_least_privilege
severity: HIGH
conditions:
  all:
  - var: item.instance_profile
    op: exists
  - var: item.instance_profile.role_arn
    op: not_contains
    value: '*'
