version: '1.0'
rule_id: azure.compute.ssh_public_key.key_pair_max_age_days
for_each: azure.compute.availabilitysets.list_by_subscription
severity: HIGH
conditions:
  all:
  - var: item.public_key
    op: exists
  - var: item.time_created
    op: exists
    value: key_age_days
  - var: item.key_age_days
    op: lte
    value: '90'
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''type'', ''location'', ''name'',
  ''id'', ''tags'', ''public_key'', ''system_data''])'
