version: '1.0'
rule_id: azure.hdinsight.cluster.data_analytics_encryption_at_rest_cmek
for_each: azure.hdinsight.clusters.list
severity: MEDIUM
conditions:
  all:
  - var: item.properties.clusterDefinition.kind
    op: equals
    value: spark
  - var: item.properties.storageProfile.storageaccounts[].isDefault
    op: is_true
  - var: item.properties.storageProfile.storageaccounts[].resourceId
    op: exists
  - var: item.properties.storageProfile.storageaccounts[].keyName
    op: exists
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''identity'', ''type'', ''properties'',
  ''location'', ''sku'', ''name'', ''provisioning_state'', ''zones''])'
