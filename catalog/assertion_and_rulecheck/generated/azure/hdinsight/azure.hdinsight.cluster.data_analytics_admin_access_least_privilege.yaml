version: '1.0'
rule_id: azure.hdinsight.cluster.data_analytics_admin_access_least_privilege
for_each: azure.hdinsight.clusters.list
severity: MEDIUM
conditions:
  all:
  - var: item.properties.computeProfile.roles[].osProfile.linuxOperatingSystemProfile.sshProfile.publicKeys[].certificateData
    op: not_contains
    value: admin
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''provisioning_state'', ''tags''])'
