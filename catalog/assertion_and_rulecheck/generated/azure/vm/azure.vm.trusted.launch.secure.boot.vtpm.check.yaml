version: '1.0'
rule_id: azure.vm.trusted.launch.secure.boot.vtpm.check
for_each: azure.compute.list_virtual_machines
severity: MEDIUM
conditions:
  all:
  - var: item.properties.securityProfile.uefiSettings.secureBootEnabled
    op: is_true
  - var: item.properties.securityProfile.uefiSettings.vTpmEnabled
    op: is_true
