version: '1.0'
rule_id: azure.vm.mfa.enabled.check
for_each: azure.compute.list_virtual_machines
severity: MEDIUM
conditions:
  all:
  - var: item.identity.type
    op: equals
    value: SystemAssigned
  - var: item.osProfile.linuxConfiguration.ssh.publicKeys[].path
    op: not_contains
    value: /home/azureuser/.ssh/authorized_keys
