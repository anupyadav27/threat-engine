version: '1.0'
rule_id: azure.monitor.logging_log_stream.logging_stream_retention_days_minimum
for_each: azure.monitor.datacollectionrules.list_by_subscription
severity: MEDIUM
conditions:
  all:
  - var: item.properties.dataFlows[].destinations[].logAnalytics[].retentionDays
    op: gte
    value: '365'
