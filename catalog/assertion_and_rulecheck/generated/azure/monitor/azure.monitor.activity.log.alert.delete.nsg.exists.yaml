version: '1.0'
rule_id: azure.monitor.activity.log.alert.delete.nsg.exists
for_each: azure.monitor.activitylogalerts.list_by_resource_group
severity: MEDIUM
conditions:
  all:
  - var: item.criteria.allOf[].operationName
    op: contains
    value: Microsoft.Network/networkSecurityGroups/delete
  - var: item.enabled
    op: is_true
