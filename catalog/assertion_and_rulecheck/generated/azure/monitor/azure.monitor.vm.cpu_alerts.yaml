version: '1.0'
rule_id: azure.monitor.vm.cpu_alerts
for_each: azure.monitor.activitylogalerts.list_by_resource_group
severity: MEDIUM
conditions:
  all:
  - var: item.enabled
    op: is_true
  - var: item.criteria.allOf[].equals
    op: contains
    value: Microsoft.Compute/virtualMachines
  - var: item.criteria.allOf[].field
    op: contains
    value: resourceType
  - var: item.criteria.allOf[].equals
    op: contains
    value: Administrative
  - var: item.criteria.allOf[].field
    op: contains
    value: category
