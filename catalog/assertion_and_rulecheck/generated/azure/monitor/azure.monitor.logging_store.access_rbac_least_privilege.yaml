version: '1.0'
rule_id: azure.monitor.logging_store.access_rbac_least_privilege
for_each: azure.monitor.actiongroups.list_by_subscription_id
severity: MEDIUM
conditions:
  all:
  - var: item.actions[].roleDefinitionId
    op: exists
  - var: item.actions[].roleDefinitionId
    op: not_contains
    value: '*'
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''type'', ''location'', ''name'',
  ''id'', ''tags'', ''actions'', ''condition'', ''description''])'
