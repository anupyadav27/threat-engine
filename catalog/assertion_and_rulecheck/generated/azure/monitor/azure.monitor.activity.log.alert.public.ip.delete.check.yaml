version: '1.0'
rule_id: azure.monitor.activity.log.alert.public.ip.delete.check
for_each: azure.monitor.activitylogalerts.list_by_resource_group
severity: MEDIUM
conditions:
  all:
  - var: item.enabled
    op: is_true
  - var: item.criteria.allOf[].operationName
    op: contains
    value: Microsoft.Network/publicIPAddresses/delete
