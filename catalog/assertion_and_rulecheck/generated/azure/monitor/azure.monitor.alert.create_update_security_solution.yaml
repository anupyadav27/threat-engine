version: '1.0'
rule_id: azure.monitor.alert.create_update_security_solution
for_each: azure.monitor.activitylogalerts.list_by_resource_group
severity: MEDIUM
conditions:
  all:
  - var: item.enabled
    op: is_true
  - var: item.criteria.allOf[].equals
    op: contains
    value: Microsoft.Security/securitySolutions
  - var: item.criteria.allOf[].field
    op: contains
    value: operationName
