version: '1.0'
rule_id: azure.monitor.alert.vnet_changes_configured
for_each: azure.monitor.activitylogalerts.list_by_resource_group
severity: MEDIUM
conditions:
  all:
  - var: item.criteria.allOf[].field
    op: contains
    value: resourceType
  - var: item.criteria.allOf[].equals
    op: contains
    value: Microsoft.Network/virtualNetworks
  - var: item.enabled
    op: is_true
