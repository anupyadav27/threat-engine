version: '1.0'
rule_id: azure.monitor.alert_rule.dr_monitoring_alerts_for_backup_failures_configured
for_each: azure.monitor.activitylogalerts.list_by_resource_group
severity: MEDIUM
conditions:
  all:
  - var: item.enabled
    op: is_true
  - var: item.criteria.allOf[].category
    op: contains
    value: Backup
  - var: item.criteria.allOf[].operationName
    op: contains
    value: Backup
  - var: item.criteria.allOf[].status
    op: contains
    value: Failed
