version: '1.0'
rule_id: azure.monitor.action_group.incident_escalation_change_audit_logging_enabled
for_each: azure.monitor.activitylogalerts.list_by_resource_group
severity: MEDIUM
conditions:
  all:
  - var: item.enabled
    op: is_true
  - var: item.criteria.allOf[].field
    op: contains
    value: operationName
  - var: item.criteria.allOf[].equals
    op: contains
    value: Microsoft.Insights/ActivityLogAlerts/Activated/Action
