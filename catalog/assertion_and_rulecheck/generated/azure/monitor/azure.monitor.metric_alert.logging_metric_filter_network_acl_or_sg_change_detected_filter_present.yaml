version: '1.0'
rule_id: azure.monitor.metric_alert.logging_metric_filter_network_acl_or_sg_change_detected_filter_present
for_each: azure.monitor.activitylogalerts.list_by_resource_group
severity: MEDIUM
conditions:
  all:
  - var: item.criteria.allOf[].field
    op: contains
    value: operationName
  - var: item.criteria.allOf[].equals
    op: contains
    value: Microsoft.Network/networkSecurityGroups/write
  - var: item.criteria.allOf[].equals
    op: contains
    value: Microsoft.Network/networkSecurityGroups/delete
  - var: item.criteria.allOf[].equals
    op: contains
    value: Microsoft.Network/networkSecurityGroups/securityRules/write
  - var: item.criteria.allOf[].equals
    op: contains
    value: Microsoft.Network/networkSecurityGroups/securityRules/delete
  - var: item.criteria.allOf[].equals
    op: contains
    value: Microsoft.Network/virtualNetworks/subnets/write
  - var: item.criteria.allOf[].equals
    op: contains
    value: Microsoft.Network/virtualNetworks/subnets/delete
  - var: item.enabled
    op: is_true
