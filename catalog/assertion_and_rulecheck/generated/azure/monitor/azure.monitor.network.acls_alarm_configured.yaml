version: '1.0'
rule_id: azure.monitor.network.acls_alarm_configured
for_each: azure.monitor.activitylogalerts.list_by_resource_group
severity: MEDIUM
conditions:
  all:
  - var: item.enabled
    op: is_true
  - var: item.criteria.allOf[].field
    op: contains
    value: operationName
  - var: item.criteria.allOf[].equals
    op: contains
    value: Microsoft.Network/networkSecurityGroups/securityRules/write
