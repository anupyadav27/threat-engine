version: '1.0'
rule_id: azure.monitor.logging_query_definition.access_rbac_least_privilege
for_each: azure.monitor.actiongroups.list_by_subscription_id
severity: MEDIUM
conditions:
  all:
  - var: item.actions[].roleDefinitionId
    op: not_contains
    value: '*'
  - var: item.actions[].roleDefinitionId
    op: not_contains
    value: '*/providers/Microsoft.Authorization/roleDefinitions/*'
fixture_validated: false
