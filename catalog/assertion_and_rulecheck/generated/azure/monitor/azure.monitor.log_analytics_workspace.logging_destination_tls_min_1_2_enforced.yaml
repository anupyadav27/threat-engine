version: '1.0'
rule_id: azure.monitor.log_analytics_workspace.logging_destination_tls_min_1_2_enforced
for_each: azure.monitor.datacollectionrules.list_by_subscription
severity: MEDIUM
conditions:
  var: item.properties.logAnalyticsDestination.minimumTlsVersion
  op: in
  value:
  - '1.2'
  - '1.3'
