version: '1.0'
rule_id: azure.monitor.metrics.data_analytics_monitoring_admin_activity_logging_enabled
for_each: azure.monitor.activitylogalerts.list_by_resource_group
severity: MEDIUM
conditions:
  all:
  - var: item.enabled
    op: is_true
  - var: item.criteria.allOf[].category
    op: contains
    value: Administrative
