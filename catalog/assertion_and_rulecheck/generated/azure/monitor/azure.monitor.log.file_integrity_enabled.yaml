version: '1.0'
rule_id: azure.monitor.log.file_integrity_enabled
for_each: azure.monitor.datacollectionrules.list_by_subscription
severity: MEDIUM
conditions:
  all:
  - var: item.dataSources
    op: exists
  - var: item.dataSources.windowsEventLogs
    op: exists
  - var: item.dataSources.windowsEventLogs[].streams
    op: contains
    value: Microsoft-SecurityBaseline
