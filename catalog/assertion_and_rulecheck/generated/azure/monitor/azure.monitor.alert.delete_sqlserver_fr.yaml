version: '1.0'
rule_id: azure.monitor.alert.delete_sqlserver_fr
for_each: azure.monitor.activitylogalerts.list_by_resource_group
severity: MEDIUM
conditions:
  all:
  - var: item.criteria.allOf[].operationName
    op: contains
    value: Microsoft.Sql/servers/failoverGroups/delete
  - var: item.enabled
    op: is_true
