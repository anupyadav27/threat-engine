version: '1.0'
rule_id: azure.monitor.log_analytics_workspace.logging_destination_iam_policy_least_privilege
for_each: azure.monitor.actiongroups.list_by_subscription_id
severity: MEDIUM
conditions:
  all:
  - var: item.actions[].roleDefinitionId
    op: not_contains
    value: '*'
  - var: item.actions[].roleDefinitionId
    op: not_contains
    value: Owner
  - var: item.actions[].roleDefinitionId
    op: not_contains
    value: Contributor
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''tags'', ''enabled''])'
