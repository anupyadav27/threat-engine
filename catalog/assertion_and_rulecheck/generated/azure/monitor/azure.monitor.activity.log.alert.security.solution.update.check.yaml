version: '1.0'
rule_id: azure.monitor.activity.log.alert.security.solution.update.check
for_each: azure.monitor.activitylogalerts.list_by_resource_group
severity: MEDIUM
conditions:
  all:
  - var: item.enabled
    op: is_true
  - var: item.criteria.allOf[].equals
    op: contains
    value: Microsoft.Security/securitySolutions/write
