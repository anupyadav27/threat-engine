version: '1.0'
rule_id: azure.monitor.metric_alert.logging_metric_filter_kms_key_deletion_or_disable_detected_filter_present
for_each: azure.monitor.activitylogalerts.list_by_resource_group
severity: MEDIUM
conditions:
  all:
  - var: item.criteria.allOf[].field
    op: contains
    value: operationName
  - var: item.criteria.allOf[].equals
    op: contains
    value: Microsoft.KeyVault/vaults/keys/delete
  - var: item.criteria.allOf[].equals
    op: contains
    value: Microsoft.KeyVault/vaults/keys/disable
  - var: item.enabled
    op: is_true
