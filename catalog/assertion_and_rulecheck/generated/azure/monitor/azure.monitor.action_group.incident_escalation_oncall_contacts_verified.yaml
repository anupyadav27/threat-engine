version: '1.0'
rule_id: azure.monitor.action_group.incident_escalation_oncall_contacts_verified
for_each: azure.monitor.actiongroups.list_by_subscription_id
severity: MEDIUM
conditions:
  all:
  - var: item.actions[].emailReceivers[].emailAddress
    op: not_contains
    value: unverified
  - var: item.actions[].smsReceivers[].countryCode
    op: exists
  - var: item.enabled
    op: is_true
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''type'', ''location'', ''name'',
  ''id'', ''tags'', ''actions'', ''condition'', ''description''])'
