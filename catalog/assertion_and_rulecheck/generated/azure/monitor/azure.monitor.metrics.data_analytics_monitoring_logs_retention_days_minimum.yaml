version: '1.0'
rule_id: azure.monitor.metrics.data_analytics_monitoring_logs_retention_days_minimum
for_each: azure.monitor.datacollectionrules.list_by_subscription
severity: MEDIUM
conditions:
  all:
  - var: item.properties.dataSources.logFiles[].settings.text.recordStartTimestampFormat
    op: exists
  - var: item.properties.dataSources.logFiles[].settings.text.recordStartTimestampFormat
    op: equals
    value: ISO 8601
