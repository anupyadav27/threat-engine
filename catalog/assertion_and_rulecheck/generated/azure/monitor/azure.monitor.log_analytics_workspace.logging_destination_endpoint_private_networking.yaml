version: '1.0'
rule_id: azure.monitor.log_analytics_workspace.logging_destination_endpoint_private_networking
for_each: azure.monitor.datacollectionrules.list_by_subscription
severity: MEDIUM
conditions:
  all:
  - var: item.properties.dataFlows[].destinations[].logAnalytics[].workspaceResourceId
    op: exists
  - var: item.properties.dataFlows[].destinations[].logAnalytics[].workspaceResourceId
    op: contains
    value: privateLinkScope
