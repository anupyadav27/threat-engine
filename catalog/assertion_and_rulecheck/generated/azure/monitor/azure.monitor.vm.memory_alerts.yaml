version: '1.0'
rule_id: azure.monitor.vm.memory_alerts
for_each: azure.monitor.activitylogalerts.list_by_resource_group
severity: MEDIUM
conditions:
  all:
  - var: item.enabled
    op: is_true
  - var: item.criteria.allOf[].category
    op: contains
    value: Administrative
  - var: item.criteria.allOf[].operationName
    op: contains
    value: Microsoft.Compute/virtualMachines/write
  - var: item.criteria.allOf[].level
    op: contains
    value: Critical
  - var: item.actions
    op: not_empty
