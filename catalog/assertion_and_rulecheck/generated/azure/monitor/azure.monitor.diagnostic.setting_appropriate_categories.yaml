version: '1.0'
rule_id: azure.monitor.diagnostic.setting_appropriate_categories
for_each: azure.monitor.diagnostic.setting_appropriate_categories
severity: MEDIUM
conditions:
  all:
  - var: item.properties.logs[].category
    op: contains
    value: Administrative
  - var: item.properties.logs[].category
    op: contains
    value: Security
  - var: item.properties.logs[].category
    op: contains
    value: Alert
  - var: item.properties.logs[].category
    op: contains
    value: Policy
