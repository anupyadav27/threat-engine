version: '1.0'
rule_id: azure.monitor.activity.log.alert.create.or.update.public.ip.address
for_each: azure.monitor.activitylogalerts.list_by_resource_group
severity: MEDIUM
conditions:
  all:
  - var: item.enabled
    op: is_true
  - var: item.criteria.operationName
    op: equals
    value: Microsoft.Network/publicIPAddresses/write
  - var: item.criteria.status
    op: equals
    value: Started
