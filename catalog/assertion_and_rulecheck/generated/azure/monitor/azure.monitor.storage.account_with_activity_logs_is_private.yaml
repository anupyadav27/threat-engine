version: '1.0'
rule_id: azure.monitor.storage.account_with_activity_logs_is_private
for_each: azure.monitor.activitylogalerts.list_by_resource_group
severity: MEDIUM
conditions:
  all:
  - var: item.criteria.allOf[].field
    op: contains
    value: operationName
  - var: item.criteria.allOf[].equals
    op: contains
    value: Microsoft.Storage/storageAccounts/write
  - var: item.actions[].actionGroupId
    op: exists
