version: '1.0'
rule_id: azure.functions.app.restrict_public_access
for_each: azure.functions.list_functions
severity: MEDIUM
conditions:
  all:
  - var: item.properties.siteConfig.ipSecurityRestrictions
    op: exists
  - var: item.properties.siteConfig.ipSecurityRestrictions[].ipAddress
    op: not_equals
    value: '*'
