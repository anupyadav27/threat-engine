version: '1.0'
rule_id: azure.kubernetes.managed_cluster.containers_fargate_profile_execution_role_least_privilege
for_each: azure.kubernetes.list_managed_clusters
severity: MEDIUM
conditions:
  all:
  - var: item.fargateProfile.executionRoleArn
    op: exists
  - var: item.fargateProfile.executionRoleArn
    op: not_contains
    value: AdministratorAccess
