version: '1.0'
rule_id: azure.kubernetes.network_policy.containers_networkpolicy_required_allowlist_for_namespace_services
for_each: azure.kubernetes.list_network_policies
severity: MEDIUM
conditions:
  all:
  - var: item.spec.podSelector.matchLabels
    op: exists
  - var: item.spec.ingress[].from[].namespaceSelector.matchLabels
    op: exists
