version: '1.0'
rule_id: azure.kubernetes.addon.containers_version_pinned_and_supported
for_each: azure.kubernetes.managed_clusters.list
severity: MEDIUM
conditions:
  all:
  - var: item.properties.agentPoolProfiles[].orchestratorVersion
    op: exists
  - var: item.properties.agentPoolProfiles[].orchestratorVersion
    op: not_in
    value:
    - latest
    - default
    - null
