version: '1.0'
rule_id: azure.kubernetes.kubelet.containers_tls_min_1_2_enforced
for_each: azure.kubernetes.managed_clusters.list
severity: MEDIUM
conditions:
  all:
  - var: item.properties.agentPoolProfiles[].kubeletConfig.containerLogMaxFiles
    op: exists
  - var: item.properties.agentPoolProfiles[].kubeletConfig.tlsCipherSuites
    op: contains
    value: TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
