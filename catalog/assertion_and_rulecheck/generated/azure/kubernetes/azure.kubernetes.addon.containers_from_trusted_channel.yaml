version: '1.0'
rule_id: azure.kubernetes.addon.containers_from_trusted_channel
for_each: azure.kubernetes.list_clusters
severity: MEDIUM
conditions:
  all:
  - var: item.addonProfiles.azurePolicy.enabled
    op: is_true
  - var: item.addonProfiles.openServiceMesh.enabled
    op: is_true
  - var: item.addonProfiles.httpApplicationRouting.enabled
    op: is_false
