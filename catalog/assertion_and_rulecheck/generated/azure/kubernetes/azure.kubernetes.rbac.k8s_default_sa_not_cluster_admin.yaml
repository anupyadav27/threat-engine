version: '1.0'
rule_id: azure.kubernetes.rbac.k8s_default_sa_not_cluster_admin
for_each: azure.kubernetes.list_cluster_role_bindings
severity: MEDIUM
conditions:
  all:
  - var: item.RoleRef.Name
    op: equals
    value: cluster-admin
  - var: item.Subjects[].Kind
    op: contains
    value: ServiceAccount
  - var: item.Subjects[].Name
    op: contains
    value: default
  - var: item.Subjects[].Namespace
    op: contains
    value: default
