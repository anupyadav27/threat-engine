version: '1.0'
rule_id: azure.kubernetes.rbac.k8s_no_cluster_admin_to_authenticated
for_each: azure.kubernetes.list_cluster_role_bindings
severity: MEDIUM
conditions:
  all:
  - var: item.RoleRef.Name
    op: not_equals
    value: cluster-admin
  - var: item.Subjects[].Kind
    op: not_contains
    value: Group
  - var: item.Subjects[].Name
    op: not_contains
    value: system:authenticated
