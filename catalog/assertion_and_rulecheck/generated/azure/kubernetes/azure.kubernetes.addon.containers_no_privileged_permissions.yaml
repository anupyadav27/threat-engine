version: '1.0'
rule_id: azure.kubernetes.addon.containers_no_privileged_permissions
for_each: azure.kubernetes.list_clusters
severity: MEDIUM
conditions:
  all:
  - var: item.addonProfiles.azurePolicy.enabled
    op: is_true
  - var: item.agentPoolProfiles[].osType
    op: not_contains
    value: Windows
