version: '1.0'
rule_id: azure.kubernetes.managed_cluster.containers_cluster_audit_logging_enabled
for_each: azure.kubernetes.managed_clusters.list
severity: MEDIUM
conditions:
  all:
  - var: item.properties.azureMonitorProfile.containerInsights
    op: exists
  - var: item.properties.azureMonitorProfile.containerInsights.enabled
    op: is_true
