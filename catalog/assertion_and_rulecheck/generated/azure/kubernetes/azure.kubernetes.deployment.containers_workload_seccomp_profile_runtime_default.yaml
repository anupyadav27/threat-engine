version: '1.0'
rule_id: azure.kubernetes.deployment.containers_workload_seccomp_profile_runtime_default
for_each: azure.kubernetes.list_deployments
severity: MEDIUM
conditions:
  all:
  - var: item.spec.template.spec.securityContext.seccompProfile.type
    op: exists
  - var: item.spec.template.spec.securityContext.seccompProfile.type
    op: equals
    value: RuntimeDefault
