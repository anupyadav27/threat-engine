version: '1.0'
rule_id: azure.kubernetes.scheduler.containers_secure_port_tls_enabled
for_each: azure.kubernetes.managed_clusters.list
severity: MEDIUM
conditions:
  all:
  - var: item.properties.agentPoolProfiles[].ports[]
    op: exists
  - var: item.properties.agentPoolProfiles[].ports[]
    op: in
    value:
    - 443
    - 8443
