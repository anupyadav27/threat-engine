version: '1.0'
rule_id: azure.kubernetes.managed_cluster.containers_cluster_service_kube_system_services_not_public
for_each: azure.kubernetes.list_managed_clusters
severity: MEDIUM
conditions:
  all:
  - var: item.properties.networkProfile.loadBalancerSku
    op: equals
    value: standard
  - var: item.properties.apiServerAccessProfile.authorizedIPRanges
    op: not_contains
    value: 0.0.0.0/0
