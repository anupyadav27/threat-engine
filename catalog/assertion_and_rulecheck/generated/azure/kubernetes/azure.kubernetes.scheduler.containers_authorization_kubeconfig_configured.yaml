version: '1.0'
rule_id: azure.kubernetes.scheduler.containers_authorization_kubeconfig_configured
for_each: azure.kubernetes.clusters.list
severity: MEDIUM
conditions:
  all:
  - var: item.properties.agentPoolProfiles[].kubeletConfig.authorizationMode
    op: contains
    value: Webhook
  - var: item.properties.agentPoolProfiles[].kubeletConfig.authenticationMode
    op: contains
    value: Webhook
