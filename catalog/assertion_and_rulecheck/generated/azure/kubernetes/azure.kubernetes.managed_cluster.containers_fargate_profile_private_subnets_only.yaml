version: '1.0'
rule_id: azure.kubernetes.managed_cluster.containers_fargate_profile_private_subnets_only
for_each: azure.kubernetes.list_managed_clusters
severity: MEDIUM
conditions:
  all:
  - var: item.properties.agentPoolProfiles[].type
    op: equals
    value: VirtualMachineScaleSets
  - var: item.properties.agentPoolProfiles[].vnetSubnetID
    op: exists
  - var: item.properties.agentPoolProfiles[].vnetSubnetID
    op: not_contains
    value: public
