version: '1.0'
rule_id: azure.purview.catalog.lineage_rbac_least_privilege
for_each: azure.purview.accounts.list_by_subscription
severity: MEDIUM
conditions:
  all:
  - var: item.properties.catalog.lineageRoleAssignments[].role
    op: not_in
    value:
    - Purview Data Curator
    - Purview Data Source Administrator
  - var: item.properties.catalog.lineageRoleAssignments[].role
    op: in
    value:
    - Purview Data Reader
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''type'', ''name'', ''id'', ''count''])'
