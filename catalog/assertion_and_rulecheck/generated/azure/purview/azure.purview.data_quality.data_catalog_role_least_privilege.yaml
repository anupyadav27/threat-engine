version: '1.0'
rule_id: azure.purview.data_quality.data_catalog_role_least_privilege
for_each: azure.purview.accounts.list_by_subscription
severity: MEDIUM
conditions:
  all:
  - var: item.properties.catalog
    op: exists
  - var: item.properties.catalog.roleAssignments[].roleDefinitionId
    op: not_contains
    value: owner
  - var: item.properties.catalog.roleAssignments[].roleDefinitionId
    op: not_contains
    value: contributor
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''type'', ''name'', ''id'', ''count''])'
