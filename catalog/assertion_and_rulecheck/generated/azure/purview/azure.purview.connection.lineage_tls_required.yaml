version: '1.0'
rule_id: azure.purview.connection.lineage_tls_required
for_each: azure.purview.accounts.list_by_subscription
severity: MEDIUM
conditions:
  all:
  - var: item.properties.publicNetworkAccess
    op: equals
    value: Disabled
  - var: item.properties.minimumTlsVersion
    op: in
    value:
    - '1.2'
    - '1.3'
