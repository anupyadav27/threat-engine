version: '1.0'
rule_id: azure.purview.trigger.lineage_targets_least_privilege
for_each: azure.purview.accounts.list_by_subscription
severity: MEDIUM
conditions:
  all:
  - var: item.properties.lineageTargets
    op: exists
  - var: item.properties.lineageTargets[].permissions
