version: '1.0'
rule_id: azure.purview.data_quality.data_catalog_output_location_private_and_encrypted
for_each: azure.purview.accounts.list_by_subscription
severity: MEDIUM
conditions:
  all:
  - var: item.properties.catalog
    op: exists
  - var: item.properties.catalog.encryption
    op: exists
  - var: item.properties.catalog.encryption.keyVaultProperties
    op: exists
  - var: item.properties.catalog.privateEndpointConnections
    op: not_empty
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''type'', ''name'', ''id'', ''count''])'
