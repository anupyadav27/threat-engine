version: '1.0'
rule_id: azure.purview.job.data_catalog_role_least_privilege
for_each: azure.purview.accounts.list_by_subscription
severity: MEDIUM
conditions:
  all:
  - var: item.properties.catalog
    op: exists
  - var: item.properties.catalog.collections
    op: exists
  - var: item.properties.catalog.collections[].roleAssignments[].role
    op: not_in
    value:
    - Data Source Admin
    - Data Curator
    - Data Reader
    - Data Share Contributor
    - Workflow Admin
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''type'', ''name'', ''id'', ''count''])'
