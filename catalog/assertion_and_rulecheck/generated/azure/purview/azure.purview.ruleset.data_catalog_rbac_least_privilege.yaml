version: '1.0'
rule_id: azure.purview.ruleset.data_catalog_rbac_least_privilege
for_each: azure.purview.accounts.list_by_subscription
severity: MEDIUM
conditions:
  all:
  - var: item.properties.catalog
    op: exists
  - var: item.properties.catalog.collections
    op: exists
  - var: item.properties.catalog.collections[].permissions
    op: not_contains
    value: DataCurator
