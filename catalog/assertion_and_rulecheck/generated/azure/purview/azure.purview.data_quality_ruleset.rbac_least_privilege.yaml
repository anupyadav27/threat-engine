version: '1.0'
rule_id: azure.purview.data_quality_ruleset.rbac_least_privilege
for_each: azure.purview.accounts.list_by_subscription
severity: MEDIUM
conditions:
  all:
  - var: item.properties.publicNetworkAccess
    op: equals
    value: Disabled
  - var: item.identity.type
    op: equals
    value: SystemAssigned
