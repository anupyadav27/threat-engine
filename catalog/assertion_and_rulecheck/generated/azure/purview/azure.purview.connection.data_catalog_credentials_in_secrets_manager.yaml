version: '1.0'
rule_id: azure.purview.connection.data_catalog_credentials_in_secrets_manager
for_each: azure.purview.accounts.list_by_subscription
severity: MEDIUM
conditions:
  all:
  - var: item.properties.catalog
    op: exists
  - var: item.properties.catalog.credentials
    op: exists
  - var: item.properties.catalog.credentials.managedIdentity
    op: exists
  - var: item.properties.catalog.credentials.managedIdentity.type
    op: equals
    value: SystemAssigned
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''type'', ''name'', ''id'', ''count''])'
