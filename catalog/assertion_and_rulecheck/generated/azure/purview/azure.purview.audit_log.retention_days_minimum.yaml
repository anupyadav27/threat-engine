version: '1.0'
rule_id: azure.purview.audit_log.retention_days_minimum
for_each: azure.purview.accounts.list_by_subscription
severity: MEDIUM
conditions:
  all:
  - var: item.properties.publicNetworkAccess
    op: equals
    value: Enabled
  - var: item.properties.auditLogRetentionDays
