version: '1.0'
rule_id: azure.purview.ml_transform.data_catalog_role_least_privilege
for_each: azure.purview.accounts.list_by_subscription
severity: MEDIUM
conditions:
  all:
  - var: item.properties.catalog
    op: exists
  - var: item.properties.catalog.collections
    op: exists
  - var: item.properties.catalog.collections[].roles
    op: not_contains
    value: Data Source Admin
  - var: item.properties.catalog.collections[].roles
    op: not_contains
    value: Data Curator
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''type'', ''name'', ''id'', ''count''])'
