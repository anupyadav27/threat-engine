version: '1.0'
rule_id: azure.container.instance.managed.identity.least.privilege.check
for_each: azure.container.list_container_groups
severity: MEDIUM
conditions:
  all:
  - var: item.Identity.Type
    op: exists
  - var: item.Identity.Type
    op: not_equals
    value: None
  - var: item.Identity.UserAssignedIdentities
    op: exists
  - var: item.Identity.UserAssignedIdentities[].ClientId
    op: not_contains
    value: '*'
