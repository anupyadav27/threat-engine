version: '1.0'
rule_id: azure.keyvault.secrets_secret.no_plaintext_exposed_in_policy_or_tags
for_each: azure.keyvault.vaults.list_by_subscription
severity: MEDIUM
conditions:
  all:
  - var: item.tags
    op: not_contains
    value: password
  - var: item.tags
    op: not_contains
    value: secret
  - var: item.properties.accessPolicies[].permissions.secrets[]
    op: not_contains
    value: '*'
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''tags''])'
