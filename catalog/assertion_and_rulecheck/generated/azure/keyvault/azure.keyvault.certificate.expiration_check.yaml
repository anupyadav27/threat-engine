version: '1.0'
rule_id: azure.keyvault.certificate.expiration_check
for_each: azure.keyvault.vaults.list_by_subscription
severity: MEDIUM
conditions:
  var: item.properties.certificates[].attributes.expires
  op: gt
  value: '2025-04-10T00:00:00Z'
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''type'', ''properties'', ''location'',
  ''name'', ''id'', ''tags''])'
