version: '1.0'
rule_id: azure.keyvault.diagnostic.logging.check
for_each: azure.keyvault.vaults.list_by_subscription
severity: MEDIUM
conditions:
  all:
  - var: item.properties.diagnostics
    op: exists
  - var: item.properties.diagnostics.logs
    op: exists
  - var: item.properties.diagnostics.logs[].enabled
    op: is_true
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''type'', ''properties'', ''location'',
  ''name'', ''id'', ''tags''])'
