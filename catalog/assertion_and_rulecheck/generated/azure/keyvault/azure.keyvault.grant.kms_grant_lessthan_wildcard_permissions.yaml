version: '1.0'
rule_id: azure.keyvault.grant.kms_grant_lessthan_wildcard_permissions
for_each: azure.keyvault.vaults.list_by_subscription
severity: MEDIUM
conditions:
  all:
  - var: item.properties.accessPolicies[].permissions.keys[]
    op: not_contains
    value: '*'
  - var: item.properties.accessPolicies[].permissions.secrets[]
    op: not_contains
    value: '*'
  - var: item.properties.accessPolicies[].permissions.certificates[]
    op: not_contains
    value: '*'
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''tags''])'
