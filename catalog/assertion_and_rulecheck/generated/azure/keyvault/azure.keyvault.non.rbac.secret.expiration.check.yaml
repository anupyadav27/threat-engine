version: '1.0'
rule_id: azure.keyvault.non.rbac.secret.expiration.check
for_each: azure.keyvault.vaults.list_by_subscription
severity: MEDIUM
conditions:
  all:
  - var: item.properties.enableRbacAuthorization
    op: is_false
  - var: item.properties.sku.name
    op: equals
    value: standard
  - var: item.properties.accessPolicies[].permissions.secrets
    op: contains
    value: Set
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''type'', ''properties'', ''location'',
  ''name'', ''id'', ''tags''])'
