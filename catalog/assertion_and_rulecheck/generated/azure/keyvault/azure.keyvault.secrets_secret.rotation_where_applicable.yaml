version: '1.0'
rule_id: azure.keyvault.secrets_secret.rotation_where_applicable
for_each: azure.keyvault.vaults.list_by_subscription
severity: MEDIUM
conditions:
  all:
  - var: item.properties.enableSoftDelete
    op: is_true
  - var: item.properties.enablePurgeProtection
    op: is_true
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''type'', ''properties'', ''location'',
  ''name'', ''id'', ''tags''])'
