version: '1.0'
rule_id: azure.keyvault.managedhsm.compliance.check
for_each: azure.keyvault.managedhsms.list_by_subscription
severity: MEDIUM
conditions:
  all:
  - var: item.properties.provisioningState
    op: equals
    value: Succeeded
  - var: item.properties.hsmUri
    op: exists
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''type'', ''properties'', ''location'',
  ''name'', ''id'', ''tags''])'
