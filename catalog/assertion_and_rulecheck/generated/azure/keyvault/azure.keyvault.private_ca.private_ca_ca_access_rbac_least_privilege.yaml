version: '1.0'
rule_id: azure.keyvault.private_ca.private_ca_ca_access_rbac_least_privilege
for_each: azure.keyvault.vaults.list_by_subscription
severity: MEDIUM
conditions:
  all:
  - var: item.properties.accessPolicies[].permissions.certificates
    op: not_contains
    value: ManageContacts
  - var: item.properties.accessPolicies[].permissions.certificates
    op: not_contains
    value: ManageIssuers
  - var: item.properties.accessPolicies[].permissions.certificates
    op: not_contains
    value: SetIssuers
  - var: item.properties.accessPolicies[].permissions.certificates
    op: not_contains
    value: DeleteIssuers
  - var: item.properties.accessPolicies[].permissions.certificates
    op: not_contains
    value: Update
  - var: item.properties.accessPolicies[].permissions.certificates
    op: not_contains
    value: Create
  - var: item.properties.accessPolicies[].permissions.certificates
    op: not_contains
    value: Import
  - var: item.properties.accessPolicies[].permissions.certificates
    op: not_contains
    value: Delete
  - var: item.properties.accessPolicies[].permissions.certificates
    op: not_contains
    value: Recover
  - var: item.properties.accessPolicies[].permissions.certificates
    op: not_contains
    value: Backup
  - var: item.properties.accessPolicies[].permissions.certificates
    op: not_contains
    value: Restore
  - var: item.properties.accessPolicies[].permissions.certificates
    op: not_contains
    value: Purge
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''tags''])'
