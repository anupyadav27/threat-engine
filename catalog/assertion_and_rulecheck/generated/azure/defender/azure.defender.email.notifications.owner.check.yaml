version: '1.0'
rule_id: azure.defender.email.notifications.owner.check
for_each: azure.defender.list_settings
severity: MEDIUM
conditions:
  all:
  - var: item.Properties.notificationsByRole.state
    op: equals
    value: 'On'
  - var: item.Properties.notificationsByRole.roles[]
    op: contains
    value: Owner
