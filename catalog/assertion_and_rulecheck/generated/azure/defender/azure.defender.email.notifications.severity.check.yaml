version: '1.0'
rule_id: azure.defender.email.notifications.severity.check
for_each: azure.defender.list_settings
severity: MEDIUM
conditions:
  all:
  - var: item.Properties.enablementState
    op: equals
    value: Enabled
  - var: item.Properties.notificationsSettings.state
    op: equals
    value: Enabled
  - var: item.Properties.notificationsSettings.minimalSeverity
    op: in
    value:
    - High
    - Medium
