version: '1.0'
rule_id: azure.site.recovery_notification_settings.dr_communication_destinations_access_least_privilege
for_each: azure.site.recovery.list_notification_settings
severity: MEDIUM
conditions:
  all:
  - var: item.Properties.Notifications[].SendToSubscriptionAdministrator
    op: is_false
  - var: item.Properties.Notifications[].SendToSubscriptionCoAdministrators
    op: is_false
