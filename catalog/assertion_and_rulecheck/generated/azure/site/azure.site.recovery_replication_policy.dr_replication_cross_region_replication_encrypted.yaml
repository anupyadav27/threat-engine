version: '1.0'
rule_id: azure.site.recovery_replication_policy.dr_replication_cross_region_replication_encrypted
for_each: azure.site.recovery_replication_policy.list_replication_policies
severity: MEDIUM
conditions:
  var: item.Properties.ProviderSpecificDetails.A2ACrossClusterMigrationProperties.Encryption
  op: is_true
