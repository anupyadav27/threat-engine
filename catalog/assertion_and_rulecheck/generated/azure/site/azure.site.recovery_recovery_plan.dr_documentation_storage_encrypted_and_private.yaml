version: '1.0'
rule_id: azure.site.recovery_recovery_plan.dr_documentation_storage_encrypted_and_private
for_each: azure.site.recovery_recovery_plan.list_recovery_plans
severity: MEDIUM
conditions:
  all:
  - var: item.Properties.PrimaryFabricId
    op: exists
  - var: item.Properties.SecondaryFabricId
    op: exists
