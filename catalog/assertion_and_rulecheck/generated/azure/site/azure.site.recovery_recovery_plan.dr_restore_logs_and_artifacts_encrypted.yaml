version: '1.0'
rule_id: azure.site.recovery_recovery_plan.dr_restore_logs_and_artifacts_encrypted
for_each: azure.site.recovery_recovery_plan.list_recovery_plans
severity: MEDIUM
conditions:
  all:
  - var: item.Properties.Encryption
    op: exists
  - var: item.Properties.Encryption
    op: is_true
