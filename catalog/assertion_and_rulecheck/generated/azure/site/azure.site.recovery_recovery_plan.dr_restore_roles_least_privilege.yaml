version: '1.0'
rule_id: azure.site.recovery_recovery_plan.dr_restore_roles_least_privilege
for_each: azure.site.recovery_recovery_plan.list_recovery_plans
severity: MEDIUM
conditions:
  all:
  - var: item.Properties.FailoverDeploymentModel
    op: equals
    value: ResourceManager
  - var: item.Properties.ProviderSpecificDetails[].InstanceType
    op: not_contains
    value: HyperVReplicaAzure
  - var: item.Properties.AllowedOperations[]
    op: not_contains
    value: PlannedFailover
  - var: item.Properties.SourceSiteOperations[]
    op: not_contains
    value: Reprotect
