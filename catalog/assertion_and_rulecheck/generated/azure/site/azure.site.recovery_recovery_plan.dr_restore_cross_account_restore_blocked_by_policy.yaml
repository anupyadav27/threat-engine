version: '1.0'
rule_id: azure.site.recovery_recovery_plan.dr_restore_cross_account_restore_blocked_by_policy
for_each: azure.site.recovery_recovery_plan.list_recovery_plans
severity: MEDIUM
conditions:
  all:
  - var: item.Properties.CrossAccountRestoreSettings.CrossAccountRestoreEnabled
    op: is_false
  - var: item.Properties.CrossAccountRestoreSettings.CrossAccountRestorePolicy
    op: not_equals
    value: Allow
