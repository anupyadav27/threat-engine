version: '1.0'
rule_id: azure.site.recovery_notification_settings.dr_communication_no_public_webhooks_without_auth
for_each: azure.site.recovery.list_vaults
severity: MEDIUM
conditions:
  all:
  - var: item.properties.monitoringSettings.azureMonitorAlertSettings.alertsForAllFailoverIssues
    op: equals
    value: Enabled
  - var: item.properties.monitoringSettings.azureMonitorAlertSettings.alertsForAllReplicationIssues
    op: equals
    value: Enabled
  - var: item.properties.monitoringSettings.azureMonitorAlertSettings.alertsForAllJobFailures
    op: equals
    value: Enabled
