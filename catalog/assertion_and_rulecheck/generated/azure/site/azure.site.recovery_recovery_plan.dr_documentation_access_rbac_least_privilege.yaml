version: '1.0'
rule_id: azure.site.recovery_recovery_plan.dr_documentation_access_rbac_least_privilege
for_each: azure.site.recovery_recovery_plan.list_recovery_plans
severity: MEDIUM
conditions:
  all:
  - var: item.properties.sourceSiteRecoveryFabricId
    op: exists
  - var: item.properties.allowedOperations[]
    op: not_contains
    value: Write
