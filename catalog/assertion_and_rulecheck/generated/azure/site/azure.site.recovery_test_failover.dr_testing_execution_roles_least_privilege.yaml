version: '1.0'
rule_id: azure.site.recovery_test_failover.dr_testing_execution_roles_least_privilege
for_each: azure.site.recovery.list_vaults
severity: MEDIUM
conditions:
  all:
  - var: item.Properties.MonitoringSettings.AzureMonitorAlertSettings.AlertsForAllJobFailures
    op: equals
    value: Enabled
  - var: item.Identity.Type
    op: equals
    value: SystemAssigned
