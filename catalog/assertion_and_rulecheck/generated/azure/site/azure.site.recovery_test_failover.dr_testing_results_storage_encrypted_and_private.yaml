version: '1.0'
rule_id: azure.site.recovery_test_failover.dr_testing_results_storage_encrypted_and_private
for_each: azure.site.recovery.list_vaults
severity: MEDIUM
conditions:
  all:
  - var: item.Properties.Encryption
    op: exists
  - var: item.Properties.Encryption.InfrastructureEncryption
    op: equals
    value: Enabled
  - var: item.Properties.PrivateEndpointConnections
    op: not_empty
