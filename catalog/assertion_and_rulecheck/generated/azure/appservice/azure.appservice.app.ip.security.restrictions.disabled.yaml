version: '1.0'
rule_id: azure.appservice.app.ip.security.restrictions.disabled
for_each: azure.appservice.list_web_apps
severity: MEDIUM
conditions:
  all:
  - var: item.properties.siteConfig.ipSecurityRestrictions
    op: exists
  - var: item.properties.siteConfig.ipSecurityRestrictions
    op: not_empty
