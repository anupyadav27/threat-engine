version: '1.0'
rule_id: azure.batch.account.authentication.modes.check
for_each: azure.batch.batchaccount.list
severity: MEDIUM
conditions:
  all:
  - var: item.authenticationModes
    op: contains
    value: AAD
  - var: item.authenticationModes
    op: not_contains
    value: SharedKey
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''type'', ''name'', ''id'', ''tags'',
  ''etag'', ''format'', ''last_activation_time'', ''state''])'
