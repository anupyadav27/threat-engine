version: '1.0'
rule_id: azure.load.balancer_waf_acl_attached:az.azure_network_load_balancer.network_security_lb_waf_attached_where_supported
for_each: azure.network.list_load_balancers
severity: MEDIUM
conditions:
  all:
  - var: item.sku.tier
    op: equals
    value: Regional
  - var: item.frontend_ip_configurations[].properties.public_ip_address.properties.ip_configuration.properties.subnet.properties.network_security_group.properties.security_rules[].properties.destination_port_ranges[]
    op: not_contains
    value: '*'
