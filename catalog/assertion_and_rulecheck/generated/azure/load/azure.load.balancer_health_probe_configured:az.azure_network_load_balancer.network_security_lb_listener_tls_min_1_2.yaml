version: '1.0'
rule_id: azure.load.balancer_health_probe_configured:az.azure_network_load_balancer.network_security_lb_listener_tls_min_1_2
for_each: azure.network.load_balancers.list
severity: MEDIUM
conditions:
  var: item.properties.frontendIPConfigurations[].properties.loadBalancingRules[].properties.probes[].properties.protocol
  op: exists
