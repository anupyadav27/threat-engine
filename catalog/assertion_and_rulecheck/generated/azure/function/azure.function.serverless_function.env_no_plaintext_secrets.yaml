version: '1.0'
rule_id: azure.function.serverless_function.env_no_plaintext_secrets
for_each: azure.function.list_functions
severity: MEDIUM
conditions:
  all:
  - var: item.config.appSettings[].name
    op: not_contains
    value: password
  - var: item.config.appSettings[].name
    op: not_contains
    value: secret
  - var: item.config.appSettings[].name
    op: not_contains
    value: key
  - var: item.config.appSettings[].name
    op: not_contains
    value: connectionstring
