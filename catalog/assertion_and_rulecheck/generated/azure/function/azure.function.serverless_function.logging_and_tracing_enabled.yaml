version: '1.0'
rule_id: azure.function.serverless_function.logging_and_tracing_enabled
for_each: azure.function.list_functions
severity: MEDIUM
conditions:
  all:
  - var: item.config.siteConfig.applicationLogs.azureBlobStorage.level
    op: exists
  - var: item.config.siteConfig.applicationLogs.azureBlobStorage.sasUrl
    op: exists
  - var: item.config.siteConfig.applicationLogs.azureBlobStorage.retentionInDays
    op: gte
    value: 1
  - var: item.config.siteConfig.httpLogs.fileSystem.retentionInDays
    op: gte
    value: 1
  - var: item.config.siteConfig.tracingOptions
    op: equals
    value: enabled
