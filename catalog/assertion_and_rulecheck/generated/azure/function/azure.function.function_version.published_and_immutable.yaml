version: '1.0'
rule_id: azure.function.function_version.published_and_immutable
for_each: azure.function.list_functions
severity: MEDIUM
conditions:
  all:
  - var: item.properties.config.functionAppScaleLimit
    op: equals
    value: 1
  - var: item.properties.siteConfig.ftpsState
    op: equals
    value: FtpsOnly
