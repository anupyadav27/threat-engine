version: '1.0'
rule_id: azure.function.app.function_restrict_public_access
for_each: azure.function.app.list_functions
severity: MEDIUM
conditions:
  all:
  - var: item.properties.siteConfig.ipSecurityRestrictions
    op: not_empty
  - var: item.properties.siteConfig.ipSecurityRestrictions[].ipAddress
    op: not_equals
    value: '*'
