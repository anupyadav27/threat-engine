version: '1.0'
rule_id: azure.app.service.autoscale_enabled:az.azure_paas_app.paas_security_app_logging_enabled
for_each: azure.app.service.list
severity: MEDIUM
conditions:
  all:
  - var: item.properties.siteConfig.detailedErrorLoggingEnabled
    op: is_true
  - var: item.properties.siteConfig.httpLoggingEnabled
    op: is_true
  - var: item.properties.siteConfig.requestTracingEnabled
    op: is_true
