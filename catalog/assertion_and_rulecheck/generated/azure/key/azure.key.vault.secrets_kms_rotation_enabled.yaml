version: '1.0'
rule_id: azure.key.vault.secrets_kms_rotation_enabled
for_each: azure.key_vault.list_key_vaults
severity: MEDIUM
conditions:
  all:
  - var: item.properties.enableRbacAuthorization
    op: is_true
  - var: item.properties.enableSoftDelete
    op: is_true
  - var: item.properties.enablePurgeProtection
    op: is_true
