version: '1.0'
rule_id: azure.key.vault.secrets_kms_policy_least_privilege
for_each: azure.key_vault.list_key_vaults
severity: MEDIUM
conditions:
  all:
  - var: item.properties.accessPolicies[].permissions.secrets[]
    op: not_contains
    value: all
  - var: item.properties.accessPolicies[].permissions.keys[]
    op: not_contains
    value: all
  - var: item.properties.accessPolicies[].permissions.certificates[]
    op: not_contains
    value: all
