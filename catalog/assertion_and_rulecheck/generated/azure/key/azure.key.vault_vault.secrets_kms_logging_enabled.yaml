version: '1.0'
rule_id: azure.key.vault_vault.secrets_kms_logging_enabled
for_each: azure.key_vault.list_vaults
severity: MEDIUM
conditions:
  all:
  - var: item.properties.diagnostics
    op: exists
  - var: item.properties.diagnostics.logs
    op: not_empty
  - any:
    - var: item.properties.diagnostics.logs[].category
      op: equals
      value: AuditEvent
    - var: item.properties.diagnostics.logs[].category
      op: equals
      value: AuditEvent
    - var: item.properties.diagnostics.logs[].categoryGroup
      op: contains
      value: audit
  - var: item.properties.diagnostics.logs[].enabled
    op: is_true
