version: '1.0'
rule_id: azure.functionapp.deployment.slot.java.version.check
for_each: azure.functionapp.list_deployment_slots
severity: MEDIUM
conditions:
  all:
  - var: item.config.linuxFxVersion
    op: contains
    value: JAVA
  - var: item.config.linuxFxVersion
    op: not_contains
    value: JAVA|8
