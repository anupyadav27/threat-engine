version: '1.0'
rule_id: azure.functionapp.java.supported.version.check
for_each: azure.functionapp.list_function_apps
severity: MEDIUM
conditions:
  all:
  - var: item.config.linuxFxVersion
    op: contains
    value: JAVA
  - var: item.config.linuxFxVersion
    op: not_contains
    value: '8'
  - var: item.config.linuxFxVersion
    op: not_contains
    value: '11'
