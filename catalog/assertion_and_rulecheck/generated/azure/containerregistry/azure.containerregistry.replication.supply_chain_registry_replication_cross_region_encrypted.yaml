version: '1.0'
rule_id: azure.containerregistry.replication.supply_chain_registry_replication_cross_region_encrypted
for_each: azure.containerregistry.list_registry_replications
severity: MEDIUM
conditions:
  all:
  - var: item.Region
    op: not_equals
    value: item.RegistryLocation
  - var: item.Encryption
    op: exists
