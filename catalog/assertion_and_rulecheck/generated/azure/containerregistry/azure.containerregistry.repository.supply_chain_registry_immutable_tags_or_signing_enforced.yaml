version: '1.0'
rule_id: azure.containerregistry.repository.supply_chain_registry_immutable_tags_or_signing_enforced
for_each: azure.containerregistry.list_registries
severity: MEDIUM
conditions:
  any:
  - var: item.policies.trustPolicy.status
    op: equals
    value: enabled
  - var: item.policies.quarantinePolicy.status
    op: equals
    value: enabled
