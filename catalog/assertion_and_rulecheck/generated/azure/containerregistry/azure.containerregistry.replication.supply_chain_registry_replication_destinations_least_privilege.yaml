version: '1.0'
rule_id: azure.containerregistry.replication.supply_chain_registry_replication_destinations_least_privilege
for_each: azure.containerregistry.list_registry_replications
severity: MEDIUM
conditions:
  all:
  - var: item.properties.regionEndpointEnabled
    op: is_true
  - var: item.properties.zoneRedundancy
    op: is_true
  - var: item.properties.status.message
    op: not_contains
    value: Public
