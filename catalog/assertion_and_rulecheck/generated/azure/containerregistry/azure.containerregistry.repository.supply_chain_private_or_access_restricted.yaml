version: '1.0'
rule_id: azure.containerregistry.repository.supply_chain_private_or_access_restricted
for_each: azure.containerregistry.registries.list
severity: MEDIUM
conditions:
  any:
  - var: item.properties.policies.trustPolicy.status
    op: equals
    value: enabled
  - var: item.properties.networkRuleSet.defaultAction
    op: equals
    value: Deny
