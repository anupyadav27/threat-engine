version: '1.0'
rule_id: azure.entra.authentication.passwordless.policy.check
for_each: azure.entra.get_authentication_methods_policies
severity: MEDIUM
conditions:
  any:
  - var: item.authenticationMethodsConfigurations[].state
    op: equals
    value: enabled
  - var: item.authenticationMethodsConfigurations[].state
    op: exists
