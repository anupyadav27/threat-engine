version: '1.0'
rule_id: azure.logic.apps_workflow.incident_workflow_approval_steps_required_for_destructive_actions
for_each: azure.logic.workflows.list_by_subscription
severity: MEDIUM
conditions:
  all:
  - var: item.properties.definition.actions[?(@.type == 'ApiConnection' || @.type == 'Http')].inputs[?(@.path contains 'delete'
      || @.path contains 'drop' || @.path contains 'remove' || @.path contains 'terminate')]
    op: exists
  - var: item.properties.definition.actions[?(@.type == 'Approval')]
    op: exists
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''identity'', ''type'', ''properties'',
  ''location'', ''sku'', ''name'', ''provisioning_state'', ''zones''])'
