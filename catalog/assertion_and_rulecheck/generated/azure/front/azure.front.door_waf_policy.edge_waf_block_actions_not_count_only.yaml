version: '1.0'
rule_id: azure.front.door_waf_policy.edge_waf_block_actions_not_count_only
for_each: azure.front.door_waf_policies
severity: MEDIUM
conditions:
  all:
  - var: item.properties.policySettings.defaultCustomBlockResponseStatusCode
    op: exists
  - var: item.properties.managedRules.managedRuleSets[].ruleGroupOverrides[].rules[].action
    op: not_contains
    value: Block
  - var: item.properties.managedRules.managedRuleSets[].ruleGroupOverrides[].rules[].action
    op: not_contains
    value: Log
  - var: item.properties.managedRules.managedRuleSets[].ruleGroupOverrides[].rules[].action
    op: not_contains
    value: Redirect
