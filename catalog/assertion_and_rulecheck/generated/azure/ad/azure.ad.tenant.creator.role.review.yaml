version: '1.0'
rule_id: azure.ad.tenant.creator.role.review
for_each: azure.ad.list_role_assignments
severity: MEDIUM
conditions:
  all:
  - var: item.RoleDefinitionName
    op: not_equals
    value: User Access Administrator
  - var: item.RoleDefinitionName
    op: not_equals
    value: Global Administrator
