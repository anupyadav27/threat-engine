version: '1.0'
rule_id: azure.ad.conditionalaccess.token.protection.check
for_each: azure.ad.list_conditional_access_policies
severity: MEDIUM
conditions:
  all:
  - var: item.grantControls.builtInControls[]
    op: contains
    value: requireTokenProtection
  - var: item.state
    op: equals
    value: enabled
