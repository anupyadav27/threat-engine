version: '1.0'
rule_id: azure.network.firewall.logging_enabled
for_each: azure.network.azurefirewalls.list_all
severity: MEDIUM
conditions:
  all:
  - var: item.properties.diagnosticsProfile.logAnalytics.workspaceId
    op: exists
  - var: item.properties.diagnosticsProfile.logAnalytics.enabled
    op: is_true
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''id'', ''name'', ''type'', ''location'',
  ''tags'', ''provisioning_state'', ''managed_rules'', ''policy_settings''])'
