version: '1.0'
rule_id: azure.network.nsg.inbound.http.access.check
for_each: azure.network.applicationgateways.list_all
severity: MEDIUM
conditions:
  all:
  - var: item.properties.securityRules[].properties.destinationPortRange
    op: not_contains
    value: '80'
  - var: item.properties.securityRules[].properties.destinationPortRange
    op: not_contains
    value: '8080'
  - var: item.properties.securityRules[].properties.destinationPortRange
    op: not_contains
    value: '443'
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''provisioning_state'', ''tags'', ''resource_state''])'
