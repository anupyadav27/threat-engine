version: '1.0'
rule_id: azure.network.security_group.data_warehouse_sg_ingress_no_0_0_0_0
for_each: azure.network.securitygroups.list_all
severity: MEDIUM
conditions:
  all:
  - var: item.properties.securityRules[].properties.sourceAddressPrefix
    op: not_contains
    value: 0.0.0.0/0
  - var: item.properties.securityRules[].properties.sourceAddressPrefix
    op: not_contains
    value: ::/0
  - var: item.properties.securityRules[].properties.sourceAddressPrefixes[]
    op: not_contains
    value: 0.0.0.0/0
  - var: item.properties.securityRules[].properties.sourceAddressPrefixes[]
    op: not_contains
    value: ::/0
