version: '1.0'
rule_id: azure.network.security_group.data_warehouse_sg_only_required_ports_open
for_each: azure.network.security_groups.list_all
severity: MEDIUM
conditions:
  all:
  - var: item.properties.securityRules[].properties.destinationPortRange
    op: not_contains
    value: '1433'
  - var: item.properties.securityRules[].properties.destinationPortRange
    op: not_contains
    value: '1434'
  - var: item.properties.securityRules[].properties.destinationPortRange
    op: not_contains
    value: '3389'
  - var: item.properties.securityRules[].properties.destinationPortRange
    op: not_contains
    value: '22'
