version: '1.0'
rule_id: azure.network.backend_pool.tg_health_checks_tls_where_supported
for_each: azure.network.applicationgateways.list_all
severity: MEDIUM
conditions:
  all:
  - var: item.properties.backendHttpSettingsCollection[].protocol
    op: in
    value:
    - Https
  - var: item.properties.backendHttpSettingsCollection[].trustedRootCertificates
    op: not_empty
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''type'', ''location'', ''name'',
  ''provisioning_state'', ''id'', ''tags'', ''application_gateway_for_containers'', ''application_gateways''])'
