version: '1.0'
rule_id: azure.network.subnet.private_subnets_no_igw_route
for_each: azure.network.routetables.list_all
severity: MEDIUM
conditions:
  all:
  - var: item.properties.subnets[].properties.addressPrefix
    op: exists
  - var: item.properties.routes[].properties.nextHopType
    op: not_equals
    value: Internet
