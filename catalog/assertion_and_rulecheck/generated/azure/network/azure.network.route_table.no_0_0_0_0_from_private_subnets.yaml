version: '1.0'
rule_id: azure.network.route_table.no_0_0_0_0_from_private_subnets
for_each: azure.network.routetables.list_all
severity: MEDIUM
conditions:
  all:
  - var: item.properties.subnets[].properties.addressPrefix
    op: not_contains
    value: 0.0.0.0/0
  - var: item.properties.routes[].properties.addressPrefix
    op: not_equals
    value: 0.0.0.0/0
