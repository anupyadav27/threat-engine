version: '1.0'
rule_id: azure.network.security_group.sg_only_required_ports_open
for_each: azure.network.security_groups.list_all
severity: MEDIUM
conditions:
  all:
  - var: item.properties.securityRules[].properties.destinationPortRange
    op: not_contains
    value: '*'
  - var: item.properties.securityRules[].properties.sourceAddressPrefix
    op: not_contains
    value: '*'
