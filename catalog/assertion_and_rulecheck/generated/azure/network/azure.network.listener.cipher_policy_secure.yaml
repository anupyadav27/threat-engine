version: '1.0'
rule_id: azure.network.listener.cipher_policy_secure
for_each: azure.network.applicationgateways.list_all
severity: MEDIUM
conditions:
  var: item.http_listeners[].ssl_cipher_suites[]
  op: contains
  value: TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''type'', ''location'', ''name'',
  ''provisioning_state'', ''id'', ''tags'', ''application_gateway_for_containers'', ''application_gateways''])'
