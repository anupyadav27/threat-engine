version: '1.0'
rule_id: azure.network.virtual_network.route_tables_no_unintended_internet_paths
for_each: azure.network.routetables.list_all
severity: MEDIUM
conditions:
  all:
  - var: item.properties.routes[].properties.nextHopType
    op: not_equals
    value: Internet
  - var: item.properties.routes[].properties.addressPrefix
    op: not_contains
    value: 0.0.0.0/0
