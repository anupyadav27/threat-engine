version: '1.0'
rule_id: azure.network.access_control.no_permit_all
for_each: azure.network.azurefirewalls.list_all
severity: MEDIUM
conditions:
  all:
  - var: item.custom_rules[].source_addresses[]
    op: not_contains
    value: '*'
  - var: item.custom_rules[].source_addresses[]
    op: not_contains
    value: 0.0.0.0/0
  - var: item.custom_rules[].source_addresses[]
    op: not_contains
    value: ::/0
  - var: item.custom_rules[].destination_addresses[]
    op: not_contains
    value: '*'
  - var: item.custom_rules[].destination_addresses[]
    op: not_contains
    value: 0.0.0.0/0
  - var: item.custom_rules[].destination_addresses[]
    op: not_contains
    value: ::/0
fixture_validated: false
