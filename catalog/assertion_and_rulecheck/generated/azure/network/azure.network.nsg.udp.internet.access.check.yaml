version: '1.0'
rule_id: azure.network.nsg.udp.internet.access.check
for_each: azure.network.nsg.list_all
severity: MEDIUM
conditions:
  all:
  - var: item.properties.securityRules[].properties.destinationPortRange
    op: not_contains
    value: '*'
  - var: item.properties.securityRules[].properties.sourceAddressPrefix
    op: not_contains
    value: '*'
  - var: item.properties.securityRules[].properties.sourceAddressPrefix
    op: not_contains
    value: 0.0.0.0/0
  - var: item.properties.securityRules[].properties.sourceAddressPrefix
    op: not_contains
    value: ::/0
  - var: item.properties.securityRules[].properties.protocol
    op: not_equals
    value: UDP
  - var: item.properties.securityRules[].properties.access
    op: not_equals
    value: Allow
