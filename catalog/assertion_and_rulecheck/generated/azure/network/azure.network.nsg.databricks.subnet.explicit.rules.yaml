version: '1.0'
rule_id: azure.network.nsg.databricks.subnet.explicit.rules
for_each: azure.network.nsg.databricks.subnet.explicit.rules
severity: MEDIUM
conditions:
  all:
  - var: item.properties.securityRules[].sourceAddressPrefix
    op: not_contains
    value: '*'
  - var: item.properties.securityRules[].destinationAddressPrefix
    op: not_contains
    value: '*'
