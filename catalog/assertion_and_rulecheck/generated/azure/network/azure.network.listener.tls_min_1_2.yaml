version: '1.0'
rule_id: azure.network.listener.tls_min_1_2
for_each: azure.network.applicationgateways.list_all
severity: MEDIUM
conditions:
  all:
  - var: item.http_listeners[].properties.protocol
    op: equals
    value: Https
  - var: item.http_listeners[].properties.sslProfile.properties.minProtocolVersion
    op: equals
    value: TLSv1_2
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''type'', ''location'', ''name'',
  ''provisioning_state'', ''id'', ''tags'', ''application_gateway_for_containers'', ''application_gateways''])'
