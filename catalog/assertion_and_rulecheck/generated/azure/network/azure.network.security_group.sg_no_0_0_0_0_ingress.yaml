version: '1.0'
rule_id: azure.network.security_group.sg_no_0_0_0_0_ingress
for_each: azure.network.security_groups.list_all
severity: MEDIUM
conditions:
  all:
  - var: item.properties.securityRules[].properties.sourceAddressPrefix
    op: not_contains
    value: 0.0.0.0/0
  - var: item.properties.defaultSecurityRules[].properties.sourceAddressPrefix
    op: not_contains
    value: 0.0.0.0/0
