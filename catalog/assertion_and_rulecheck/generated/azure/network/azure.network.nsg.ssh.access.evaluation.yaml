version: '1.0'
rule_id: azure.network.nsg.ssh.access.evaluation
for_each: azure.network.nsg.list_all
severity: MEDIUM
conditions:
  all:
  - var: item.properties.securityRules[].properties.destinationPortRange
    op: not_contains
    value: '22'
  - var: item.properties.securityRules[].properties.sourceAddressPrefix
    op: not_contains
    value: '*'
  - var: item.properties.securityRules[].properties.access
    op: not_equals
    value: Allow
