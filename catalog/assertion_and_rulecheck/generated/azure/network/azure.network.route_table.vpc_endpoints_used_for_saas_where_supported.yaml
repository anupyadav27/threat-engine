version: '1.0'
rule_id: azure.network.route_table.vpc_endpoints_used_for_saas_where_supported
for_each: azure.network.route_tables.list_all
severity: MEDIUM
conditions:
  all:
  - var: item.properties.subnets[].properties.addressPrefix
    op: exists
  - var: item.properties.routes[].properties.nextHopType
    op: not_contains
    value: Internet
