version: '1.0'
rule_id: azure.network.security_group.data_warehouse_sg_egress_restricted
for_each: azure.network.security_groups.list_all
severity: MEDIUM
conditions:
  all:
  - var: item.properties.securityRules[].properties.destinationAddressPrefix
    op: not_contains
    value: '*'
  - var: item.properties.securityRules[].properties.destinationAddressPrefix
    op: not_contains
    value: 0.0.0.0/0
  - var: item.properties.securityRules[].properties.destinationAddressPrefix
    op: not_contains
    value: ::/0
  - var: item.properties.securityRules[].properties.destinationAddressPrefixes
    op: not_contains
    value: '*'
  - var: item.properties.securityRules[].properties.destinationAddressPrefixes
    op: not_contains
    value: 0.0.0.0/0
  - var: item.properties.securityRules[].properties.destinationAddressPrefixes
    op: not_contains
    value: ::/0
