version: '1.0'
rule_id: azure.cost.management_category.access_cost_data_exports_private_and_encrypted
for_each: azure.cost.list_exports
severity: MEDIUM
conditions:
  all:
  - var: item.properties.deliveryInfo.destination.resourceId
    op: exists
  - var: item.properties.format
    op: equals
    value: Csv
