version: '1.0'
rule_id: azure.data.lake_analytics_registry.datalake_registry_rbac_least_privilege
for_each: azure.data.lake_analytics.list_registries
severity: MEDIUM
conditions:
  all:
  - var: item.properties.roleAssignments[].roleDefinitionName
    op: not_in
    value:
    - Owner
    - Contributor
    - User Access Administrator
