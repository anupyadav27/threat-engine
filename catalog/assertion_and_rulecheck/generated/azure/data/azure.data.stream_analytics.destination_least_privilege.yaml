version: '1.0'
rule_id: azure.data.stream_analytics.destination_least_privilege
for_each: azure.data.stream_analytics.list_jobs
severity: MEDIUM
conditions:
  all:
  - var: item.Outputs[].Datasource.Type
    op: not_equals
    value: Microsoft.Storage/Blob
  - var: item.Outputs[].Datasource.AuthenticationMode
    op: not_equals
    value: ConnectionString
