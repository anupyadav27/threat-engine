version: '1.0'
rule_id: azure.data.factory_dataset.pipeline_object_environment_no_plaintext_secrets
for_each: azure.data.factory.list_pipelines
severity: MEDIUM
conditions:
  all:
  - var: item.activities[].linkedServiceName
    op: exists
  - var: item.activities[].linkedServiceName
    op: not_contains
    value: DefaultEndpointsProtocol
  - var: item.activities[].linkedServiceName
    op: not_contains
    value: AccountKey
