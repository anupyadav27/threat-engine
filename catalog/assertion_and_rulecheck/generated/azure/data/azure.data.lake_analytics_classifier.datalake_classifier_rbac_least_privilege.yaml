version: '1.0'
rule_id: azure.data.lake_analytics_classifier.datalake_classifier_rbac_least_privilege
for_each: azure.data.lake_analytics.list_classifiers
severity: MEDIUM
conditions:
  all:
  - var: item.Permissions[].Actions
    op: not_contains
    value: '*'
  - var: item.Permissions[].DataLakeStorePermissions
    op: not_contains
    value: '*'
