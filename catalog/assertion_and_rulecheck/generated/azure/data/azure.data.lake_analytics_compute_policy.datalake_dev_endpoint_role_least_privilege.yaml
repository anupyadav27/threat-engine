version: '1.0'
rule_id: azure.data.lake_analytics_compute_policy.datalake_dev_endpoint_role_least_privilege
for_each: azure.data.lake_analytics_compute_policy.list_compute_policies
severity: MEDIUM
conditions:
  all:
  - var: item.ObjectId
    op: exists
  - var: item.ObjectType
    op: equals
    value: User
  - var: item.MaxDegreeOfParallelismPerJob
    op: lte
    value: 32
  - var: item.MinPriorityPerJob
    op: gte
    value: 1000
