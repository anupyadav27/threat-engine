version: '1.0'
rule_id: azure.data.lake_analytics_database.datalake_database_policy_least_privilege
for_each: azure.data.lake_analytics_database.list_datalake_analytics_databases
severity: MEDIUM
conditions:
  all:
  - var: item.Permissions
    op: exists
  - var: item.Permissions[].Permission
    op: not_contains
    value: '*'
