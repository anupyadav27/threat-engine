version: '1.0'
rule_id: azure.data.lake_analytics_job.datalake_job_logs_and_metrics_enabled
for_each: azure.data.lake_analytics_job.list_jobs
severity: MEDIUM
conditions:
  all:
  - var: item.Diagnostics.StorageAccountId
    op: exists
  - var: item.Diagnostics.MetricsEnabled
    op: is_true
  - var: item.Diagnostics.LogsEnabled
    op: is_true
