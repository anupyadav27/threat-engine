version: '1.0'
rule_id: azure.data.factory_pipeline_parameter.pipeline_parameter_metadata_sensitive_keys_require_secret_type
for_each: azure.data.factory.list_factories
severity: MEDIUM
conditions:
  all:
  - var: item.properties.pipelines[].parameters
    op: exists
  - any:
    - var: item.properties.pipelines[].parameters[].type
      op: equals
      value: SecureString
    - var: item.properties.pipelines[].parameters[].type
      op: equals
      value: AzureKeyVaultSecret
