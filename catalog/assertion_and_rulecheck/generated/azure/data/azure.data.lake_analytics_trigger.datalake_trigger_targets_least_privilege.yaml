version: '1.0'
rule_id: azure.data.lake_analytics_trigger.datalake_trigger_targets_least_privilege
for_each: azure.data.lake_analytics.list_triggers
severity: MEDIUM
conditions:
  all:
  - var: item.Permissions[].Action
    op: not_contains
    value: '*'
  - var: item.Permissions[].Principal
    op: not_contains
    value: '*'
