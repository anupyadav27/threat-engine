version: '1.0'
rule_id: azure.data.lake_analytics_catalog.datalake_catalog_rbac_least_privilege
for_each: azure.data.lake_analytics_catalog.list_catalogs
severity: MEDIUM
conditions:
  all:
  - var: item.properties.effectivePermissions[].permission
    op: not_in
    value:
    - '*'
    - all
    - admin
