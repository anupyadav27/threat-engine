version: '1.0'
rule_id: azure.data.lake_analytics_connection.datalake_connection_role_least_privilege
for_each: azure.data.lake_analytics.list_accounts
severity: MEDIUM
conditions:
  all:
  - var: item.properties.firewallRules[].properties.startIpAddress
    op: not_contains
    value: 0.0.0.0
  - var: item.properties.firewallRules[].properties.endIpAddress
    op: not_contains
    value: 255.255.255.255
