version: '1.0'
rule_id: azure.data.factory_pipeline_run.analytics_snapshot_not_publicly_shared
for_each: azure.data.factory.list_pipelines
severity: MEDIUM
conditions:
  all:
  - var: item.Properties.Annotations[]
    op: not_contains
    value: public
  - var: item.Properties.Annotations[]
    op: not_contains
    value: shared
