version: '1.0'
rule_id: azure.data.lake_analytics_job.datalake_crawler_role_least_privilege
for_each: azure.data.lake_analytics_job.list_jobs
severity: MEDIUM
conditions:
  all:
  - var: item.RoleAssignments[].RoleDefinitionName
    op: not_contains
    value: Owner
  - var: item.RoleAssignments[].RoleDefinitionName
    op: not_contains
    value: Contributor
