version: '1.0'
rule_id: azure.data.lake_analytics_workflow.datalake_workflow_execution_role_least_privilege
for_each: azure.data.lake_analytics_workflow.list_workflows
severity: MEDIUM
conditions:
  all:
  - var: item.Properties.RoleAssignments[].RoleDefinitionName
    op: not_contains
    value: Owner
  - var: item.Properties.RoleAssignments[].RoleDefinitionName
    op: not_contains
    value: Contributor
