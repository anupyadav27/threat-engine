version: '1.0'
rule_id: azure.data.lake_analytics_classifier.datalake_classifier_source_trusted
for_each: azure.data.lake_analytics.list_classifiers
severity: MEDIUM
conditions:
  var: item.Source
  op: in
  value:
  - AzureSqlDatabase
  - AzureSqlDataWarehouse
  - AzureStorage
  - AzureDataLakeStore
