version: '1.0'
rule_id: azure.data.factory_pipeline.pipeline_pipeline_execution_roles_least_privilege
for_each: azure.data.factory.list_pipelines
severity: MEDIUM
conditions:
  all:
  - var: item.PipelineActivities[].ExecutionRole
    op: exists
  - var: item.PipelineActivities[].ExecutionRole.Permissions[].Action
    op: not_contains
    value: '*'
