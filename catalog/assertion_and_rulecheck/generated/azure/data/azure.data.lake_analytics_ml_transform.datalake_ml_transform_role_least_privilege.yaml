version: '1.0'
rule_id: azure.data.lake_analytics_ml_transform.datalake_ml_transform_role_least_privilege
for_each: azure.data.lake_analytics_ml_transform.list_transforms
severity: MEDIUM
conditions:
  all:
  - var: item.RoleAssignments[].RoleDefinitionName
    op: not_contains
    value: Owner
  - var: item.RoleAssignments[].RoleDefinitionName
    op: not_contains
    value: Contributor
