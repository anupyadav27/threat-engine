version: '1.0'
rule_id: azure.data.factory_pipeline_parameter.pipeline_parameter_constraint_min_length_defined_when_applicable
for_each: azure.data.factory_pipelines.list
severity: MEDIUM
conditions:
  all:
  - var: item.properties.parameters
    op: exists
  - var: item.properties.parameters[].minLength
    op: exists
