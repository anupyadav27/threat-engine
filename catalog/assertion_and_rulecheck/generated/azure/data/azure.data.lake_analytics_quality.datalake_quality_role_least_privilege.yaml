version: '1.0'
rule_id: azure.data.lake_analytics_quality.datalake_quality_role_least_privilege
for_each: azure.data.lake_analytics.list_accounts
severity: MEDIUM
conditions:
  all:
  - var: item.properties.defaultDataLakeStoreAccount
    op: exists
  - var: item.identity
    op: exists
  - var: item.identity.type
    op: equals
    value: SystemAssigned
