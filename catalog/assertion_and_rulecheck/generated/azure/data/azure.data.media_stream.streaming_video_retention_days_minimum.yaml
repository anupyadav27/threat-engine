version: '1.0'
rule_id: azure.data.media_stream.streaming_video_retention_days_minimum
for_each: azure.data.media_stream.list_streaming_endpoints
severity: MEDIUM
conditions:
  all:
  - var: item.properties.contentKeyPolicies[].properties.options[].properties.restriction.playReady.playReadyCustomAttributes
    op: exists
  - var: item.properties.contentKeyPolicies[].properties.options[].properties.restriction.playReady.playReadyCustomAttributes
    op: contains
    value: urn:microsoft:azure:mediaservices:contentkeypolicy:playreadycustomattributes:minimumretentiondays
  - var: item.properties.contentKeyPolicies[].properties.options[].properties.restriction.playReady.playReadyCustomAttributes
    op: contains
    value: '365'
