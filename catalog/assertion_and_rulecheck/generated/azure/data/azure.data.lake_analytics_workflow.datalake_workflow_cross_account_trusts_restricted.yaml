version: '1.0'
rule_id: azure.data.lake_analytics_workflow.datalake_workflow_cross_account_trusts_restricted
for_each: azure.data.lake_analytics.workflows.list
severity: MEDIUM
conditions:
  all:
  - var: item.Properties.TrustedAccountIds
    op: exists
  - var: item.Properties.TrustedAccountIds[]
    op: not_contains
    value: '*'
