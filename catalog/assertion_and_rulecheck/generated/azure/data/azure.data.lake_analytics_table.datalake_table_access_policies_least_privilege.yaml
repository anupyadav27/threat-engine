version: '1.0'
rule_id: azure.data.lake_analytics_table.datalake_table_access_policies_least_privilege
for_each: azure.data.lake_analytics_table.list_tables
severity: MEDIUM
conditions:
  all:
  - var: item.AccessPolicies[].Permissions
    op: not_contains
    value: '*'
  - var: item.AccessPolicies[].Permissions
    op: not_contains
    value: All
