version: '1.0'
rule_id: azure.data.factory_pipeline_run.analytics_snapshot_kms_key_policy_least_privilege
for_each: azure.data.factory.list_pipelines
severity: MEDIUM
conditions:
  all:
  - var: item.Properties.Encryption.KmsKey.KeyVaultProperties.KeyIdentifier
    op: exists
  - var: item.Properties.Encryption.KmsKey.KeyVaultProperties.KeyIdentifier
    op: not_contains
    value: wrapKey
  - var: item.Properties.Encryption.KmsKey.KeyVaultProperties.KeyIdentifier
    op: not_contains
    value: unwrapKey
