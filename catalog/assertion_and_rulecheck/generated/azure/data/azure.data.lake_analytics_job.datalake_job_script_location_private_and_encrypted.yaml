version: '1.0'
rule_id: azure.data.lake_analytics_job.datalake_job_script_location_private_and_encrypted
for_each: azure.data.lake_analytics.list_jobs
severity: MEDIUM
conditions:
  all:
  - var: item.properties.scriptLocation.private
    op: is_true
  - var: item.properties.scriptLocation.encrypted
    op: is_true
