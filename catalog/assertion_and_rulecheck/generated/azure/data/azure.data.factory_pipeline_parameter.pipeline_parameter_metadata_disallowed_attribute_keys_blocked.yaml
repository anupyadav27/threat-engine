version: '1.0'
rule_id: azure.data.factory_pipeline_parameter.pipeline_parameter_metadata_disallowed_attribute_keys_blocked
for_each: azure.data.factory.list_pipelines
severity: MEDIUM
conditions:
  all:
  - var: item.Parameters
    op: exists
  - var: item.Parameters[].Metadata
    op: exists
  - var: item.Parameters[].Metadata
    op: not_contains
    value: disallowedAttributeKey
