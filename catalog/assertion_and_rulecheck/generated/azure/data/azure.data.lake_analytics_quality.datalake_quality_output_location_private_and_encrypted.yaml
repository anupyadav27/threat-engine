version: '1.0'
rule_id: azure.data.lake_analytics_quality.datalake_quality_output_location_private_and_encrypted
for_each: azure.data.lake_analytics.list_accounts
severity: MEDIUM
conditions:
  all:
  - var: item.properties.firewallState
    op: equals
    value: Enabled
  - var: item.properties.encryptionState
    op: equals
    value: Enabled
