version: '1.0'
rule_id: azure.data.lake_analytics_compute_policy.datalake_dev_endpoint_no_public_access
for_each: azure.data.lake_analytics.list_compute_policies
severity: MEDIUM
conditions:
  all:
  - var: item.properties.objectId
    op: exists
  - var: item.properties.objectId
    op: not_contains
    value: all users
  - var: item.properties.objectId
    op: not_contains
    value: everyone
