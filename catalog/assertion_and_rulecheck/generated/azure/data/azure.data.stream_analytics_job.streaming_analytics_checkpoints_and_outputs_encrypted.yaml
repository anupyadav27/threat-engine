version: '1.0'
rule_id: azure.data.stream_analytics_job.streaming_analytics_checkpoints_and_outputs_encrypted
for_each: azure.data.stream_analytics_job.list_streaming_jobs
severity: MEDIUM
conditions:
  all:
  - var: item.properties.outputErrorPolicy
    op: equals
    value: Stop
  - var: item.properties.eventsOutOfOrderPolicy
    op: equals
    value: Drop
  - var: item.properties.eventsOutOfOrderMaxDelayInSeconds
    op: gte
    value: 0
  - var: item.properties.eventsLateArrivalMaxDelayInSeconds
    op: gte
    value: 5
