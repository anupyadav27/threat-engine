version: '1.0'
rule_id: azure.data.factory_dataset.pipeline_object_execution_role_least_privilege
for_each: azure.data.factory.list_pipelines
severity: MEDIUM
conditions:
  all:
  - var: item.Properties.Activities[].Policy.Role
    op: exists
  - var: item.Properties.Activities[].Policy.Role
    op: not_contains
    value: '*'
