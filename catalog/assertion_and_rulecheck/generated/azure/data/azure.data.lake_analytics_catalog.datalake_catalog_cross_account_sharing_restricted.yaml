version: '1.0'
rule_id: azure.data.lake_analytics_catalog.datalake_catalog_cross_account_sharing_restricted
for_each: azure.data.lake_analytics_catalog.datalake_catalog_cross_account_sharing_restricted.list
severity: MEDIUM
conditions:
