version: '1.0'
rule_id: azure.data.factory_pipeline_parameter.pipeline_parameter_value_from_secrets_manager_when_sensitive
for_each: azure.data.factory.list_pipelines
severity: MEDIUM
conditions:
  all:
  - var: item.Parameters[].IsSecure
    op: is_true
  - var: item.Parameters[].DefaultValue
    op: not_exists
