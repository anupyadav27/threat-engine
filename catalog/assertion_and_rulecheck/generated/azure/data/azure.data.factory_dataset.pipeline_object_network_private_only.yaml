version: '1.0'
rule_id: azure.data.factory_dataset.pipeline_object_network_private_only
for_each: azure.data.factory.list_datasets
severity: MEDIUM
conditions:
  all:
  - var: item.Properties.typeProperties.location.type
    op: equals
    value: AzureBlobStorage
  - var: item.Properties.typeProperties.location.storeSettings.type
    op: equals
    value: AzureBlobStorageReadSettings
  - var: item.Properties.typeProperties.location.storeSettings.enablePrivateEndpoint
    op: is_true
