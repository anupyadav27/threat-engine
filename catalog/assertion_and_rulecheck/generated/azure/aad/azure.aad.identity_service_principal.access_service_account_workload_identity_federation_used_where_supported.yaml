version: '1.0'
rule_id: azure.aad.identity_service_principal.access_service_account_workload_identity_federation_used_where_supported
for_each: azure.aad.list
severity: MEDIUM
conditions:
  var: item.type
  op: equals
  value: ServicePrincipal
  all:
  - var: item.condition
    op: exists
  - var: item.condition_version
    op: exists
