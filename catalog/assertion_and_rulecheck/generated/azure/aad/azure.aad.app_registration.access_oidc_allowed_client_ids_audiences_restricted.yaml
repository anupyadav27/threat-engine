version: '1.0'
rule_id: azure.aad.app_registration.access_oidc_allowed_client_ids_audiences_restricted
for_each: azure.aad.list
severity: MEDIUM
conditions:
  all:
  - var: item.type
    op: equals
    value: Microsoft.Authorization/roleDefinitions
  - var: item.permissions[].actions
    op: not_contains
    value: '*'
  - var: item.permissions[].notActions
    op: not_contains
    value: '*'
