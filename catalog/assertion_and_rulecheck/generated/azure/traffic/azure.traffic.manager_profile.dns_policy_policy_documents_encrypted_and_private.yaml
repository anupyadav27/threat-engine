version: '1.0'
rule_id: azure.traffic.manager_profile.dns_policy_policy_documents_encrypted_and_private
for_each: azure.traffic.manager.list_profiles
severity: MEDIUM
conditions:
  all:
  - var: item.Properties.MonitorConfig.Protocol
    op: equals
    value: HTTPS
  - var: item.Properties.TrafficRoutingMethod
    op: not_equals
    value: Performance
