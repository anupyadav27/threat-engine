version: '1.0'
rule_id: azure.webapp.deployment.slot.python.version.supported
for_each: azure.webapp.list_web_apps
severity: MEDIUM
conditions:
  all:
  - var: item.site_config.linux_fx_version
    op: contains
    value: PYTHON
  - var: item.site_config.linux_fx_version
    op: not_contains
    value: PYTHON|2
