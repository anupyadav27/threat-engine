version: '1.0'
rule_id: azure.management.groups_group.governance_org_all_accounts_enrolled_in_org
for_each: azure.management.groups.list
severity: MEDIUM
conditions:
  all:
  - var: item.properties.tenantId
    op: exists
  - var: item.properties.displayName
    op: not_empty
  - var: item.properties.children[].type
    op: contains
    value: subscription
