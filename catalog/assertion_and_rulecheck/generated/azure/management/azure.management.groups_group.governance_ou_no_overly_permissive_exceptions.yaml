version: '1.0'
rule_id: azure.management.groups_group.governance_ou_no_overly_permissive_exceptions
for_each: azure.management.list_management_groups
severity: MEDIUM
conditions:
  all:
  - var: item.Properties.PolicyExceptions
    op: not_exists
  - var: item.Properties.PolicyAssignments[].PolicyDefinitionId
    op: not_contains
    value: overly_permissive
