version: '1.0'
rule_id: azure.synapse.sql_pool.data_warehouse_hsm_client_cert_key_length_minimum
for_each: azure.synapse.workspaces.list
severity: MEDIUM
conditions:
  all:
  - var: item.properties.managedVirtualNetworkSettings
    op: exists
  - var: item.properties.managedVirtualNetworkSettings.encryption
    op: exists
  - var: item.properties.managedVirtualNetworkSettings.encryption.doubleEncryptionEnabled
    op: is_true
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''identity'', ''type'', ''properties'',
  ''location'', ''sku'', ''name'', ''provisioning_state'', ''zones''])'
