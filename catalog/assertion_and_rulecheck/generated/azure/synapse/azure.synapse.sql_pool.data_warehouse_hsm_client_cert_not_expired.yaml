version: '1.0'
rule_id: azure.synapse.sql_pool.data_warehouse_hsm_client_cert_not_expired
for_each: azure.synapse.workspaces.list
severity: MEDIUM
conditions:
  var: item.properties.managedVirtualNetworkSettings.encryption.hsmClientCertificateExpiryDate
  op: gt
  value: '2025-04-01T00:00:00Z'
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''identity'', ''type'', ''properties'',
  ''location'', ''sku'', ''name'', ''provisioning_state'', ''zones''])'
