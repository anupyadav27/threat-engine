version: '1.0'
rule_id: azure.synapse.sql_pool.data_warehouse_cluster_private_networking_enforced
for_each: azure.synapse.workspaces.list
severity: MEDIUM
conditions:
  all:
  - var: item.properties.managedVirtualNetworkSettings
    op: exists
  - var: item.properties.managedVirtualNetworkSettings.privateEndpointConnections
    op: exists
