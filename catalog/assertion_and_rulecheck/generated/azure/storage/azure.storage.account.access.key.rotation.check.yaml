version: '1.0'
rule_id: azure.storage.account.access.key.rotation.check
for_each: azure.storage.storageaccounts.list
severity: MEDIUM
conditions:
  all:
  - var: item.properties.keyCreationTime.key1
    op: exists
  - var: item.properties.keyCreationTime.key2
    op: exists
  - var: item.properties.keyCreationTime.key1
    op: lt
    value: '{{now - 90 days}}'
  - var: item.properties.keyCreationTime.key2
    op: lt
    value: '{{now - 90 days}}'
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''type'', ''properties'', ''name'',
  ''id''])'
