version: '1.0'
rule_id: azure.storage.account.data_protection_bucket_notification_destination_encrypted
for_each: azure.storage.storageaccounts.list
severity: MEDIUM
conditions:
  all:
  - var: item.properties.encryption.services.blob.enabled
    op: is_true
  - var: item.properties.encryption.services.file.enabled
    op: is_true
