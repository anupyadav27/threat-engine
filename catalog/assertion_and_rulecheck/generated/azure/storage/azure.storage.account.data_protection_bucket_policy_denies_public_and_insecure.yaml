version: '1.0'
rule_id: azure.storage.account.data_protection_bucket_policy_denies_public_and_insecure
for_each: azure.storage.storageaccounts.list
severity: MEDIUM
conditions:
  all:
  - var: item.properties.allowBlobPublicAccess
    op: is_false
  - var: item.properties.minimumTlsVersion
    op: equals
    value: TLS1_2
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''type'', ''properties'', ''name'',
  ''id''])'
