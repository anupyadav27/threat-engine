version: '1.0'
rule_id: azure.storage.accounts.private.endpoints.verification
for_each: azure.storage.storageaccounts.list
severity: MEDIUM
conditions:
  all:
  - var: item.properties.privateEndpointConnections[].properties.privateLinkServiceConnectionState.status
    op: contains
    value: Approved
  - var: item.properties.privateEndpointConnections[].properties.provisioningState
    op: contains
    value: Succeeded
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''type'', ''properties'', ''name'',
  ''id''])'
