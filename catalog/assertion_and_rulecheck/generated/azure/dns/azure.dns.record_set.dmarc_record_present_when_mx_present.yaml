version: '1.0'
rule_id: azure.dns.record_set.dmarc_record_present_when_mx_present
for_each: azure.dns.zones.list
severity: MEDIUM
conditions:
  all:
  - var: item.type
    op: equals
    value: Microsoft.Network/dnszones
  - any:
    - var: item.properties.recordSets[].type
      op: not_contains
      value: MX
    - all:
      - var: item.properties.recordSets[?type=='MX']
        op: not_empty
      - var: item.properties.recordSets[?type=='TXT' && name=='_dmarc']
        op: not_empty
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''type'', ''location'', ''name'',
  ''id'', ''tags'', ''etag'', ''max_number_of_record_sets'', ''max_number_of_records_per_record_set''])'
