version: '1.0'
rule_id: azure.dns.record_set.caa_records_present_for_root_and_wildcard
for_each: azure.dns.zones.list
severity: MEDIUM
conditions:
  all:
  - var: item.name_servers
    op: not_empty
  - var: item.zone_type
    op: equals
    value: Public
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''type'', ''location'', ''name'',
  ''id'', ''tags'', ''etag'', ''max_number_of_record_sets'', ''max_number_of_records_per_record_set''])'
