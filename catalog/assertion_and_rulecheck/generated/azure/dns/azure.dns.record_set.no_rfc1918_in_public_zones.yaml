version: '1.0'
rule_id: azure.dns.record_set.no_rfc1918_in_public_zones
for_each: azure.dns.zones.list
severity: MEDIUM
conditions:
  all:
  - var: item.zone_type
    op: equals
    value: Public
  - var: item.registration_virtual_networks
    op: is_empty
  - var: item.resolution_virtual_networks
    op: is_empty
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''type'', ''location'', ''name'',
  ''id'', ''tags'', ''etag'', ''max_number_of_record_sets'', ''max_number_of_records_per_record_set''])'
