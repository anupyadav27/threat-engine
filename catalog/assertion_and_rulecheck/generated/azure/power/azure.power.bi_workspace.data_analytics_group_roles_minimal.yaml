version: '1.0'
rule_id: azure.power.bi_workspace.data_analytics_group_roles_minimal
for_each: azure.power.bi.list_workspaces
severity: MEDIUM
conditions:
  all:
  - var: item.DataAnalyticsGroupRoles
    op: exists
  - var: item.DataAnalyticsGroupRoles[].Role
    op: not_contains
    value: Admin
  - var: item.DataAnalyticsGroupRoles[].Role
    op: not_contains
    value: Member
