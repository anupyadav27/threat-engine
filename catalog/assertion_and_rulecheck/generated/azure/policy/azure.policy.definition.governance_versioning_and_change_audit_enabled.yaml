version: '1.0'
rule_id: azure.policy.definition.governance_versioning_and_change_audit_enabled
for_each: azure.policy.definitions.list
severity: MEDIUM
conditions:
  all:
  - var: item.properties.mode
    op: equals
    value: All
  - var: item.properties.policyRule.then.effect
    op: in
    value:
    - audit
    - Audit
    - Deny
    - deployIfNotExists
