version: '1.0'
rule_id: azure.policy.registry_lifecycle_policy.supply_chain_lifecycle_policy_unused_or_old_tags_expire
for_each: azure.policy.list_registry_lifecycle_policies
severity: MEDIUM
conditions:
  all:
  - var: item.policy.expirationRules[].tag
    op: exists
  - var: item.policy.expirationRules[].enabled
    op: is_true
