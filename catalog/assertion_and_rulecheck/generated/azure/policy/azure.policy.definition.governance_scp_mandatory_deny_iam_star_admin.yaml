version: '1.0'
rule_id: azure.policy.definition.governance_scp_mandatory_deny_iam_star_admin
for_each: azure.iam.list_role_assignments
severity: MEDIUM
conditions:
  all:
  - var: item.roleDefinitionName
    op: not_equals
    value: Owner
  - var: item.roleDefinitionName
    op: not_equals
    value: Contributor
  - var: item.roleDefinitionName
    op: not_equals
    value: User Access Administrator
