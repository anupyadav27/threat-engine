version: '1.0'
rule_id: azure.policy.compliance_assessment.configuration_management_config_compliance_reporting_dashboards_enabled
for_each: azure.policy.compliance_assessment.list_assessments
severity: MEDIUM
conditions:
  all:
  - var: item.properties.additionalData.configurationComplianceReportingEnabled
    op: exists
  - var: item.properties.additionalData.configurationComplianceReportingEnabled
    op: is_true
