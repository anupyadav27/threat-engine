version: '1.0'
rule_id: azure.policy.definition.governance_editors_rbac_least_privilege
for_each: azure.rbac.list_role_assignments
severity: MEDIUM
conditions:
  all:
  - var: item.roleDefinitionName
    op: not_equals
    value: Owner
  - var: item.roleDefinitionName
    op: not_equals
    value: Contributor
  - var: item.roleDefinitionName
    op: not_equals
    value: User Access Administrator
