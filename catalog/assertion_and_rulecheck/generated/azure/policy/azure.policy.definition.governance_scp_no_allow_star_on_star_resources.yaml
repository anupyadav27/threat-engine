version: '1.0'
rule_id: azure.policy.definition.governance_scp_no_allow_star_on_star_resources
for_each: azure.policy.list_policy_assignments
severity: MEDIUM
conditions:
  all:
  - var: item.properties.parameters.effect.value
    op: not_equals
    value: Deny
  - var: item.properties.policyDefinitionId
    op: contains
    value: no-star-on-star
