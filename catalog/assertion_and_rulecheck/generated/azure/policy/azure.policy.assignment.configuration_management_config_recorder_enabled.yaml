version: '1.0'
rule_id: azure.policy.assignment.configuration_management_config_recorder_enabled
for_each: azure.policy.list_policy_assignments
severity: MEDIUM
conditions:
  all:
  - var: item.properties.policyDefinitionId
    op: contains
    value: /providers/Microsoft.Authorization/policyDefinitions/1e208063-7641-4b8c-b05c-64b7755d1dac
  - var: item.properties.enforcementMode
    op: equals
    value: Default
