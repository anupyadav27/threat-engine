version: '1.0'
rule_id: azure.policy.rule.configuration_management_config_required_rules_present
for_each: azure.policy.list_policy_definitions
severity: MEDIUM
conditions:
  all:
  - var: item.properties.mode
    op: equals
    value: All
  - var: item.properties.policyRule.then.effect
    op: equals
    value: deployIfNotExists
