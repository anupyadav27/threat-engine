version: '1.0'
rule_id: azure.policy.assignment.governance_aggregation_authorization_target_accounts_correct
for_each: azure.policy.list_policy_assignments
severity: MEDIUM
conditions:
  all:
  - var: item.properties.metadata.category
    op: equals
    value: Governance
  - var: item.properties.metadata.aggregationAuthorizationTargetAccounts
    op: exists
