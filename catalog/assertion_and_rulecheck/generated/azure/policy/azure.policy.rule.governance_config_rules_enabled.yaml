version: '1.0'
rule_id: azure.policy.rule.governance_config_rules_enabled
for_each: azure.policy.list_policy_assignments
severity: MEDIUM
conditions:
  all:
  - var: item.Properties.PolicyDefinitionId
    op: contains
    value: /providers/Microsoft.Authorization/policySetDefinitions/
  - var: item.Properties.Parameters.policyEffect
    op: exists
