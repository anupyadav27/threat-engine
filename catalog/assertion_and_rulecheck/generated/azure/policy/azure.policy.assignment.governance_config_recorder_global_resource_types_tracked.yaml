version: '1.0'
rule_id: azure.policy.assignment.governance_config_recorder_global_resource_types_tracked
for_each: azure.policy.list_policy_assignments
severity: MEDIUM
conditions:
  all:
  - var: item.properties.metadata.category
    op: equals
    value: Governance
  - var: item.properties.parameters.resourceTypes.value
    op: contains
    value: '*'
