version: '1.0'
rule_id: azure.policy.assignment.recorder_all_regions_enabled
for_each: azure.policy.assignments.list
severity: MEDIUM
conditions:
  all:
  - var: item.properties.parameters.logCollectionRegions.value
    op: exists
  - var: item.properties.parameters.logCollectionRegions.value
    op: contains
    value: '*'
