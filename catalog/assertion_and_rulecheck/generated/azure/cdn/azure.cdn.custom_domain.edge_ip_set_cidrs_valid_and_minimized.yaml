version: '1.0'
rule_id: azure.cdn.custom_domain.edge_ip_set_cidrs_valid_and_minimized
for_each: azure.cdn.afdcustomdomains.list_by_profile
severity: MEDIUM
conditions:
  all:
  - var: item.parameters
    op: exists
  - var: item.parameters.edge_ip_set_cidrs
    op: exists
  - var: item.parameters.edge_ip_set_cidrs[]
    op: not_contains
    value: 0.0.0.0/0
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''type'', ''name'', ''provisioning_state'',
  ''id'', ''deployment_status'', ''parameters'', ''profile_name'', ''system_data''])'
