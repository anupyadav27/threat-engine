version: '1.0'
rule_id: azure.cdn.profile.edge_cache_key_excludes_sensitive_headers
for_each: azure.cdn.profiles.list
severity: MEDIUM
conditions:
  all:
  - var: item.type
    op: equals
    value: Microsoft.Cdn/profiles
  - var: item.sku.name
    op: in
    value:
    - Standard_AzureFrontDoor
    - Premium_AzureFrontDoor
  - var: item.properties.edgeCacheKey.excludedQueryStringNames
    op: contains
    value: Authorization
  - var: item.properties.edgeCacheKey.excludedQueryStringNames
    op: contains
    value: Cookie
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''type'', ''name'', ''id'', ''current_value'',
  ''limit'', ''resource_type'', ''unit''])'
