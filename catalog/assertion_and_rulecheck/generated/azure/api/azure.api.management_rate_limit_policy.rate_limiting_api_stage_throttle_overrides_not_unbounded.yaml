version: '1.0'
rule_id: azure.api.management_rate_limit_policy.rate_limiting_api_stage_throttle_overrides_not_unbounded
for_each: azure.api.management.list_service
severity: MEDIUM
conditions:
  all:
  - var: item.properties.customProperties.rateLimitPolicies[].rateLimits[].period
    op: exists
  - var: item.properties.customProperties.rateLimitPolicies[].rateLimits[].rate
    op: exists
