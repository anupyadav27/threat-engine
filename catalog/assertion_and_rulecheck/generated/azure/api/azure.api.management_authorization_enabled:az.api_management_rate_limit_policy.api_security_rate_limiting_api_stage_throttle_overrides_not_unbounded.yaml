version: '1.0'
rule_id: azure.api.management_authorization_enabled:az.api_management_rate_limit_policy.api_security_rate_limiting_api_stage_throttle_overrides_not_unbounded
for_each: azure.api_management.list_service
severity: MEDIUM
conditions:
  all:
  - var: item.properties.customProperties
    op: exists
  - var: item.properties.customProperties.microsoft.microsoft-gateway-apim:rate-limit-by-key.policy
    op: exists
  - var: item.properties.customProperties.microsoft.microsoft-gateway-apim:rate-limit-by-key.policy
    op: not_contains
    value: unbounded
