version: '1.0'
rule_id: azure.api.management_restapi_waf_acl_attached:az.api_management_monitoring.api_security_monitoring_api_access_logging_enabled
for_each: azure.api_management.list_services
severity: MEDIUM
conditions:
  all:
  - var: item.properties.customProperties
    op: exists
  - var: item.properties.customProperties.microsoftAzureApiManagementGatewayLogs
    op: exists
  - var: item.properties.customProperties.microsoftAzureApiManagementGatewayLogs
    op: not_empty
