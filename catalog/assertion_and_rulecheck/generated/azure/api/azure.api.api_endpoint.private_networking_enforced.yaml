version: '1.0'
rule_id: azure.api.api_endpoint.private_networking_enforced
for_each: azure.api.list_services
severity: MEDIUM
conditions:
  all:
  - var: item.properties.restrictions[].restrictionType
    op: contains
    value: Private
  - var: item.properties.restrictions[].restrictionType
    op: not_contains
    value: Public
