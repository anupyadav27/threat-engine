version: '1.0'
rule_id: azure.api.management_validation_policy.validation_api_required_security_headers_enforced
for_each: azure.api.management.list_apis
severity: MEDIUM
conditions:
  all:
  - var: item.Properties.ValidationPolicies[].ValidationRules[].ValidationCategory
    op: contains
    value: SecurityHeaders
  - var: item.Properties.ValidationPolicies[].ValidationRules[].Action
    op: equals
    value: Enforce
