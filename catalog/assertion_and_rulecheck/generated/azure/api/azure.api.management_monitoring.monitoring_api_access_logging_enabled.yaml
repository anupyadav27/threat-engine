version: '1.0'
rule_id: azure.api.management_monitoring.monitoring_api_access_logging_enabled
for_each: azure.api.management_services.list
severity: MEDIUM
conditions:
  all:
  - var: item.properties.diagnosticSettings
    op: exists
  - var: item.properties.diagnosticSettings[].logs[].category
    op: contains
    value: AuditEvent
  - var: item.properties.diagnosticSettings[].logs[].enabled
    op: is_true
