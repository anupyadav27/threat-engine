version: '1.0'
rule_id: azure.api.management_rate_limit_policy.rate_limiting_api_usage_plan_required_for_api_keys
for_each: azure.api.management.list_apis
severity: MEDIUM
conditions:
  all:
  - var: item.properties.apiManagementApiProperties.apiKeyRequired
    op: is_true
  - var: item.properties.apiManagementApiProperties.rateLimitingPolicy
    op: exists
