version: '1.0'
rule_id: azure.api.subscription_key.scopes_least_privilege
for_each: azure.api.list_subscription_keys
severity: MEDIUM
conditions:
  all:
  - var: item.properties.scopes[].scope
    op: not_contains
    value: '*'
  - var: item.properties.scopes[].scope
    op: not_contains
    value: /
