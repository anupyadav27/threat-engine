version: '1.0'
rule_id: azure.event.grid_subscription.data_analytics_subscription_destination_least_privilege
for_each: azure.event_grid.list_event_subscriptions
severity: MEDIUM
conditions:
  all:
  - var: item.destination.endpointType
    op: equals
    value: AzureDataExplorer
  - var: item.destination.properties.identity
    op: exists
  - var: item.destination.properties.identity.type
    op: equals
    value: UserAssigned
