version: '1.0'
rule_id: azure.machine.learning_model_package.data_governance_ai_model_package_artifact_signed_and_verified
for_each: azure.machine.list_by_resource_group
severity: MEDIUM
conditions:
  all:
  - var: item.system_data
    op: exists
  - var: item.tags.Environment
    op: equals
    value: production
