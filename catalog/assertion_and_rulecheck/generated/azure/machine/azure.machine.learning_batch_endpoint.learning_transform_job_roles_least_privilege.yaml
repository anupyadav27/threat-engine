version: '1.0'
rule_id: azure.machine.learning_batch_endpoint.learning_transform_job_roles_least_privilege
for_each: azure.machine.list_by_resource_group
severity: MEDIUM
conditions:
  all:
  - var: item.learning_transform_job_roles
    op: exists
  - var: item.learning_transform_job_roles[].permissions
    op: not_contains
    value: '*'
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''id'', ''name'', ''type'', ''system_data'',
  ''tags'', ''location'', ''zones'', ''capacity_reservations''])'
