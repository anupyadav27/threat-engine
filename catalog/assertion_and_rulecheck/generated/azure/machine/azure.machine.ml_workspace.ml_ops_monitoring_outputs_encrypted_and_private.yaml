version: '1.0'
rule_id: azure.machine.ml_workspace.ml_ops_monitoring_outputs_encrypted_and_private
for_each: azure.machine.list_by_resource_group
severity: MEDIUM
conditions:
  all:
  - var: item.ml_ops_monitoring_outputs_encrypted
    op: is_true
  - var: item.ml_ops_monitoring_outputs_private
    op: is_true
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''id'', ''name'', ''type'', ''system_data'',
  ''tags'', ''location'', ''zones'', ''capacity_reservations''])'
