version: '1.0'
rule_id: azure.machine.learning_hyperdrive_run.data_governance_ai_hpo_private_networking_enforced
for_each: azure.machine.list_by_resource_group
severity: MEDIUM
conditions:
  all:
  - var: item.tags.Environment
    op: exists
  - var: item.tags.Environment
    op: equals
    value: production
