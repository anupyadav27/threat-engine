version: '1.0'
rule_id: azure.machine.learning_compute_instance.data_governance_ai_notebook_execution_role_least_privilege
for_each: azure.machine.list_by_resource_group
severity: MEDIUM
conditions:
  all:
  - var: item.type
    op: equals
    value: Microsoft.MachineLearningServices/workspaces/computes
  - var: item.properties.computeInstance.properties.dataGovernanceSettings.aiNotebookExecutionRole
    op: exists
  - var: item.properties.computeInstance.properties.dataGovernanceSettings.aiNotebookExecutionRole
    op: not_equals
    value: Owner
fixture_validated: false
