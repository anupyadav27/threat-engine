version: '1.0'
rule_id: azure.machine.learning_online_endpoint.data_privacy_ai_endpoint_private_networking_enforced
for_each: azure.machine.list_by_resource_group
severity: MEDIUM
conditions:
  all:
  - var: item.properties.publicNetworkAccess
    op: equals
    value: Disabled
  - var: item.properties.privateEndpointConnections
    op: exists
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''id'', ''name'', ''type'', ''system_data'',
  ''tags'', ''location'', ''zones'', ''capacity_reservations''])'
