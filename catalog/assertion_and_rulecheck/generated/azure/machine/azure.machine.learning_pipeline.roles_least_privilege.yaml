version: '1.0'
rule_id: azure.machine.learning_pipeline.roles_least_privilege
for_each: azure.machine.list_by_resource_group
severity: MEDIUM
conditions:
  all:
  - var: item.roles[].permissions[].actions[]
    op: not_contains
    value: '*'
  - var: item.roles[].permissions[].data_actions[]
    op: not_contains
    value: '*'
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''tags''])'
