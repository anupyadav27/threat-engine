version: '1.0'
rule_id: azure.machine.learning_hyperdrive_run.data_privacy_ai_hpo_roles_least_privilege
for_each: azure.machine.list_by_resource_group
severity: MEDIUM
conditions:
  all:
  - var: item.reservation_type
    op: exists
  - var: item.reservation_type
    op: equals
    value: example-type
