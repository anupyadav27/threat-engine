version: '1.0'
rule_id: azure.machine.learning_deployment.data_privacy_ai_endpoint_config_capture_store_encrypted_and_private
for_each: azure.machine.list_by_resource_group
severity: MEDIUM
conditions:
  all:
  - var: item.properties.encryption.status
    op: equals
    value: Enabled
  - var: item.properties.networkAccessPolicy
    op: equals
    value: DenyAll
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''id'', ''name'', ''type'', ''system_data'',
  ''tags'', ''location'', ''zones'', ''capacity_reservations''])'
