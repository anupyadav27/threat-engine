version: '1.0'
rule_id: azure.machine.learning_online_endpoint.data_governance_ai_endpoint_authz_policies_enforced
for_each: azure.machine.list_by_resource_group
severity: MEDIUM
conditions:
  all:
  - var: item.properties.dataGovernance
    op: exists
  - var: item.properties.dataGovernance.aiEndpointAuthzPoliciesEnforced
    op: is_true
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''id'', ''name'', ''type'', ''system_data'',
  ''tags'', ''location'', ''zones'', ''capacity_reservations''])'
