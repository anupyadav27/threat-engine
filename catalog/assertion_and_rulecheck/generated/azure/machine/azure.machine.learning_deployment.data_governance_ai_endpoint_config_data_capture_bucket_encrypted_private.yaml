version: '1.0'
rule_id: azure.machine.learning_deployment.data_governance_ai_endpoint_config_data_capture_bucket_encrypted_private
for_each: azure.machine.list_by_resource_group
severity: MEDIUM
conditions:
  all:
  - var: item.properties.dataCaptureConfig.dataCaptureStorageAccount.encryption.keySource
    op: equals
    value: Microsoft.KeyVault
  - var: item.properties.dataCaptureConfig.dataCaptureStorageAccount.networkAcls.defaultAction
    op: not_equals
    value: Allow
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''id'', ''name'', ''type'', ''system_data'',
  ''tags'', ''location'', ''zones'', ''capacity_reservations''])'
