version: '1.0'
rule_id: azure.machine.learning_pipeline.ai_services_data_pipeline_access_controls_least_privilege
for_each: azure.machine.list_by_resource_group
severity: MEDIUM
conditions:
  all:
  - var: item.capacity_reservations
    op: exists
  - var: item.reservation_type
    op: equals
    value: example-type
