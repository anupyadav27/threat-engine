version: '1.0'
rule_id: azure.machine.learning_workspace.ai_services_secrets_vault_access_rbac_least_privilege
for_each: azure.machine.list_by_resource_group
severity: MEDIUM
conditions:
  all:
  - var: item.id
    op: exists
  - var: item.name
    op: exists
  - var: item.type
    op: exists
  - var: item.location
    op: exists
