version: '1.0'
rule_id: azure.machine.learning_workspace.ai_services_secrets_vault_kms_encryption_and_rotation_enabled
for_each: azure.machine.list_by_resource_group
severity: MEDIUM
conditions:
  all:
  - var: item.properties.encryption.keyVaultProperties.keyVaultArmId
    op: exists
  - var: item.properties.encryption.keyVaultProperties.keyIdentifier
    op: exists
  - var: item.properties.encryption.keyVaultProperties.identityClientId
