version: '1.0'
rule_id: azure.machine.learning_compute_instance.learning_notebook_no_public_access
for_each: azure.machine.list_by_resource_group
severity: MEDIUM
conditions:
  all:
  - var: item.properties.computeInstance.properties.sshSettings.sshPublicAccess
    op: exists
  - var: item.properties.computeInstance.properties.sshSettings.sshPublicAccess
    op: equals
    value: Disabled
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''id'', ''name'', ''type'', ''system_data'',
  ''tags'', ''location'', ''zones'', ''capacity_reservations''])'
