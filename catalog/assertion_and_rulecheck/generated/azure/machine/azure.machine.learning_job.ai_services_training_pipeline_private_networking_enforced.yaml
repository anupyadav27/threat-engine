version: '1.0'
rule_id: azure.machine.learning_job.ai_services_training_pipeline_private_networking_enforced
for_each: azure.machine.list_by_resource_group
severity: MEDIUM
conditions:
  all:
  - var: item.properties.network_settings.isolation_mode
    op: equals
    value: PrivateNetwork
  - var: item.properties.network_settings.private_endpoint_connections
    op: exists
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''id'', ''name'', ''type'', ''system_data'',
  ''tags'', ''location'', ''zones'', ''capacity_reservations''])'
