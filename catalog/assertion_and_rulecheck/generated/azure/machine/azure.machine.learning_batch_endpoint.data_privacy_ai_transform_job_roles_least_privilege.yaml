version: '1.0'
rule_id: azure.machine.learning_batch_endpoint.data_privacy_ai_transform_job_roles_least_privilege
for_each: azure.machine.list_by_resource_group
severity: MEDIUM
conditions:
  all:
  - var: item.type
    op: equals
    value: Microsoft.MachineLearningServices/workspaces/batchEndpoints
  - var: item.properties.dataPrivacy.aiTransformJobRoles
    op: exists
  - var: item.properties.dataPrivacy.aiTransformJobRoles[].roleDefinitionId
    op: not_contains
    value: /subscriptions/.*/providers/Microsoft.Authorization/roleDefinitions/.*
  - var: item.properties.dataPrivacy.aiTransformJobRoles[].principalId
    op: exists
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''id'', ''name'', ''type'', ''system_data'',
  ''tags'', ''location'', ''zones'', ''capacity_reservations''])'
