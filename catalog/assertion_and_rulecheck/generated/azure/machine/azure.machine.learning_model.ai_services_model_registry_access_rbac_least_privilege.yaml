version: '1.0'
rule_id: azure.machine.learning_model.ai_services_model_registry_access_rbac_least_privilege
for_each: azure.machine.list_by_resource_group
severity: MEDIUM
conditions:
  all:
  - var: item.type
    op: equals
    value: Microsoft.MachineLearningServices/registries
  - var: item.properties.registryArmDetails.registryArmResourceId
    op: exists
  - var: item.properties.registryArmDetails.registryArmResourceId
    op: not_contains
    value: /providers/Microsoft.Authorization/roleAssignments/
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''id'', ''name'', ''type'', ''system_data'',
  ''tags'', ''location'', ''zones'', ''capacity_reservations''])'
