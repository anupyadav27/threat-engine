version: '1.0'
rule_id: azure.machine.learning_auto_ml_job.data_privacy_ai_automl_private_networking_enforced
for_each: azure.machine.list_by_resource_group
severity: MEDIUM
conditions:
  all:
  - var: item.tags.Environment
    op: equals
    value: production
  - var: item.location
    op: equals
    value: eastus
