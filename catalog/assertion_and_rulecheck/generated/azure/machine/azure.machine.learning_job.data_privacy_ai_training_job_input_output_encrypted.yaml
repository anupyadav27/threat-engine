version: '1.0'
rule_id: azure.machine.learning_job.data_privacy_ai_training_job_input_output_encrypted
for_each: azure.machine.list_by_resource_group
severity: MEDIUM
conditions:
  all:
  - var: item.properties.encryption.encryption_identity
    op: exists
  - var: item.properties.encryption.encryption_identity.user_assigned_identity
    op: exists
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''id'', ''name'', ''type'', ''system_data'',
  ''tags'', ''location'', ''zones'', ''capacity_reservations''])'
