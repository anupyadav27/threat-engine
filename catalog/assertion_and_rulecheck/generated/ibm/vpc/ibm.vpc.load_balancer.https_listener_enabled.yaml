version: '1.0'
rule_id: ibm.vpc.load_balancer.https_listener_enabled
for_each: ibm.vpc.get-load-balancer
severity: HIGH
conditions:
  any:
  - var: item.listeners[].protocol
    op: equals
    value: https
  - var: item.listeners[].protocol
    op: equals
    value: tls
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''created_at'', ''crn'', ''id'',
  ''name'', ''status'', ''tags''])'
