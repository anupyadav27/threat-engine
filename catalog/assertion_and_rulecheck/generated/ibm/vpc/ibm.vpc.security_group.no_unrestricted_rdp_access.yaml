version: '1.0'
rule_id: ibm.vpc.security_group.no_unrestricted_rdp_access
for_each: ibm.vpc.get-security-group
severity: CRITICAL
conditions:
  all:
  - var: item.rules[].source
    op: not_contains
    value: 0.0.0.0/0
  - var: item.rules[].direction
    op: equals
    value: inbound
  - var: item.rules[].port_min
    op: lte
    value: 3389
  - var: item.rules[].port_max
    op: gte
    value: 3389
  - var: item.rules[].protocol
    op: equals
    value: tcp
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''created_at'', ''crn'', ''id'',
  ''name'', ''status'', ''tags''])'
