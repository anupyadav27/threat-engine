version: '1.0'
rule_id: ibm.vpc.public_gateway.floating_ip_not_all_subnets
for_each: ibm.vpc.get-public-gateway
severity: MEDIUM
conditions:
  any:
  - var: item.floating_ip
    op: not_exists
  - var: item.subnets[].floating_ip
    op: all
    conditions:
      var: item
      op: is_true
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''status'', ''tags''])'
