version: '1.0'
rule_id: ibm.vpc.vpn_gateway.ike_policy_strong_algorithm
for_each: ibm.vpc.get-vpn-gateway-ike-policy
severity: HIGH
conditions:
  all:
  - var: item.authentication_algorithm
    op: in
    value:
    - sha256
    - sha384
    - sha512
  - var: item.encryption_algorithm
    op: in
    value:
    - aes256
    - aes256_gcm16
  - var: item.dh_group
    op: gte
    value: 14
