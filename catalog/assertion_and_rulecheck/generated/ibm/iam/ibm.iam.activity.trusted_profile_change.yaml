version: '1.0'
rule_id: ibm.iam.activity.trusted_profile_change
for_each: ibm.iam.list_trusted_profiles
severity: CRITICAL
conditions:
  all:
  - var: item.history[].action
    op: not_contains
    value: create
  - var: item.history[].action
    op: not_contains
    value: update
  - var: item.history[].action
    op: not_contains
    value: delete
