version: '1.0'
rule_id: ibm.ciem.chain.privilege_escalation_via_trusted_profile
for_each: ibm.iam.list_trusted_profiles
severity: CRITICAL
conditions:
  all:
  - var: item.Policies[].Roles[].RoleName
    op: not_contains
    value: Administrator
  - var: item.Policies[].Roles[].RoleName
    op: not_contains
    value: Manager
  - var: item.Policies[].Roles[].RoleName
    op: not_contains
    value: Editor
  - var: item.Policies[].Roles[].RoleName
    op: not_contains
    value: Operator
  - var: item.Policies[].Roles[].RoleName
    op: not_contains
    value: Viewer
