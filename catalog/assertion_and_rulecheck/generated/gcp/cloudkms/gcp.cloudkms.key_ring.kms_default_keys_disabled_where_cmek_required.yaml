version: '1.0'
rule_id: gcp.cloudkms.key_ring.kms_default_keys_disabled_where_cmek_required
for_each: gcp.cloudkms.projects.locations.keyRings.cryptoKeys.list
severity: CRITICAL
conditions:
  all:
  - var: item.name
    op: contains
    value: /cryptoKeys/
  - var: item.primary.name
    op: exists
  - var: item.primary.state
    op: equals
    value: ENABLED
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''createTime'', ''name''])'
