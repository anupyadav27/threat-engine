version: '1.0'
rule_id: gcp.appengine.application.app_tls_min_1_2_enforced
for_each: gcp.appengine.apps.get
severity: HIGH
conditions:
  var: item.sslPolicy
  op: in
  value:
  - TLS_1_2
  - TLS_1_3
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''authDomain'', ''codeBucket'', ''databaseType'',
  ''defaultBucket'', ''defaultCookieExpiration'', ''defaultHostname'', ''dispatchRules'', ''featureSettings''])'
