version: '1.0'
rule_id: gcp.pubsub.stream_consumer.consumer_access_least_privilege
for_each: gcp.pubsub.projects.subscriptions.list
severity: HIGH
conditions:
  var: item.iamPolicy.bindings[].role
  op: not_in
  value:
  - roles/pubsub.subscriber
  - roles/pubsub.viewer
  - roles/owner
  - roles/editor
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''bigqueryConfig'', ''cloudStorageConfig'',
  ''labels'', ''messageRetentionDuration'', ''pushConfig'', ''state'', ''tags'', ''topicMessageRetentionDuration''])'
