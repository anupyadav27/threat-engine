version: '1.0'
rule_id: gcp.cloudidentity.user.user_access_keys_rotated_90_days_or_less_when_present
for_each: gcp.cloudidentity.groups.memberships.list
severity: HIGH
conditions:
  all:
  - var: item.updateTime
    op: exists
  - var: item.updateTime
    op: gte
    value: '2025-01-01T00:00:00Z'
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''createTime'', ''deliverySetting'',
  ''name'', ''preferredMemberKey'', ''roles'', ''type'', ''updateTime''])'
