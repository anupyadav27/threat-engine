version: '1.0'
rule_id: gcp.dlp.inspect_template.classification_policy_blocks_public_for_sensitive
for_each: gcp.dlp.projects.inspectTemplates.list
severity: HIGH
conditions:
  all:
  - var: item.inspectDetails
    op: exists
  - var: item.inspectDetails.result.findingsInfoTypes[].name
    op: contains
    value: SENSITIVE_DATA
  - var: item.inspectDetails.result.findingsInfoTypes[].name
    op: not_contains
    value: PUBLIC_DATA
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''actionDetails'', ''createTime'',
  ''endTime'', ''errors'', ''inspectDetails'', ''jobTriggerName'', ''lastModified'', ''name''])'
