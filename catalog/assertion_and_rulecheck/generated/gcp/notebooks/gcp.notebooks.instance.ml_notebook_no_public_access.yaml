version: '1.0'
rule_id: gcp.notebooks.instance.ml_notebook_no_public_access
for_each: gcp.notebooks.projects.locations.instances.list
severity: HIGH
conditions:
  all:
  - var: item.networkAccess
    op: exists
  - var: item.networkAccess
    op: equals
    value: PRIVATE
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''acceleratorConfig'', ''bootDiskSizeGb'',
  ''bootDiskType'', ''canIpForward'', ''containerImage'', ''createTime'', ''creator'', ''customGpuDriverPath''])'
