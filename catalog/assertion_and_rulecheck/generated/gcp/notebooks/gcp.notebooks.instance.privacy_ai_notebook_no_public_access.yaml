version: '1.0'
rule_id: gcp.notebooks.instance.privacy_ai_notebook_no_public_access
for_each: gcp.notebooks.projects.locations.instances.list
severity: HIGH
conditions:
  all:
  - var: item.instanceOwners
    op: not_contains
    value: allUsers
  - var: item.instanceOwners
    op: not_contains
    value: allAuthenticatedUsers
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''acceleratorConfig'', ''containerImage'',
  ''labels'', ''noPublicIp'', ''serviceAccount'', ''shieldedInstanceConfig'', ''state'', ''tags''])'
