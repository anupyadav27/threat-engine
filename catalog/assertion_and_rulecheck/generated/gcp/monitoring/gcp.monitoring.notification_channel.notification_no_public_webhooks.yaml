version: '1.0'
rule_id: gcp.monitoring.notification_channel.notification_no_public_webhooks
for_each: gcp.monitoring.projects.notificationChannels.list
severity: HIGH
conditions:
  all:
  - var: item.type
    op: equals
    value: webhook_token
  - var: item.labels.url
    op: not_contains
    value: https://hooks.slack.com
