version: '1.0'
rule_id: gcp.monitoring.alert_policy.metric_filter_kms_key_deletion_or_disable_detected_filter_present
for_each: gcp.monitoring.projects.alertPolicies.list
severity: HIGH
conditions:
  var: item.conditions[].conditionMonitoringQueryLanguage.query
  op: contains
  value: metric.type="cloudkms.googleapis.com/key/version/destruction_state" OR metric.type="cloudkms.googleapis.com/key/version/state"
