version: '1.0'
rule_id: gcp.monitoring.alert_policy.monitoring_alerts_for_replication_lag_configured
for_each: gcp.monitoring.projects.alertPolicies.list
severity: MEDIUM
conditions:
  all:
  - var: item.conditions[].conditionMonitoringQueryLanguage.query
    op: contains
    value: replication_lag
  - var: item.disabled
    op: is_false
