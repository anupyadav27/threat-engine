version: '1.0'
rule_id: gcp.monitoring.notification_channel.notification_endpoints_authenticated
for_each: gcp.monitoring.projects.notificationChannels.list
severity: HIGH
conditions:
  var: item.type
  op: not_in
  value:
  - email
  - sms
  - pagerduty
  - slack
  - webhook_tokenauth
  - webhook_basicauth
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''disabled'', ''userLabels''])'
