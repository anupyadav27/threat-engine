version: '1.0'
rule_id: gcp.monitoring.alert_policy.metric_filter_console_root_login_detected_filter_present
for_each: gcp.monitoring.projects.alertPolicies.list
severity: MEDIUM
conditions:
  var: item.conditions[].conditionMonitoringQueryLanguage.query
  op: contains
  value: resource.type="gce_instance" AND log_id("cloudaudit.googleapis.com/activity") AND protoPayload.methodName="cloudssh.googleapis.com/ssh"
    AND protoPayload.authenticationInfo.principalEmail="root"
