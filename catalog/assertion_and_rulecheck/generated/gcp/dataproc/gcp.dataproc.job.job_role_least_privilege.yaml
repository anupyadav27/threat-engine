version: '1.0'
rule_id: gcp.dataproc.job.job_role_least_privilege
for_each: gcp.dataproc.projects.regions.jobs.list
severity: HIGH
conditions:
  var: item.jobs[].role
  op: in
  value:
  - roles/dataproc.editor
  - roles/dataproc.worker
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''createTime'', ''dagTimeout'', ''encryptionConfig'',
  ''id'', ''jobs'', ''labels'', ''name'', ''parameters''])'
