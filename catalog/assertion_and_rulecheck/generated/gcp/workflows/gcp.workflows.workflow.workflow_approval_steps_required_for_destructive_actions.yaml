version: '1.0'
rule_id: gcp.workflows.workflow.workflow_approval_steps_required_for_destructive_actions
for_each: gcp.workflows.projects.locations.workflows.list
severity: HIGH
conditions:
  all:
  - var: item.sourceContents
    op: contains
    value: approval
  - var: item.sourceContents
    op: contains
    value: destructive
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''allKmsKeys'', ''allKmsKeysVersions'',
  ''callLogLevel'', ''createTime'', ''cryptoKeyName'', ''cryptoKeyVersion'', ''description'', ''executionHistoryLevel''])'
