version: '1.0'
rule_id: gcp.bigquery.dataset.database_policy_least_privilege
for_each: gcp.bigquery.datasets.list
severity: HIGH
conditions:
  var: item.access[].role
  op: not_in
  value:
  - OWNER
  - WRITER
fixture_validated: false
