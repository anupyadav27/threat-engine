version: '1.0'
rule_id: gcp.bigquery.dataset.group_roles_minimal
for_each: gcp.bigquery.datasets.list
severity: MEDIUM
conditions:
  all:
  - var: item.access[].role
    op: not_in
    value:
    - roles/bigquery.dataEditor
    - roles/bigquery.dataOwner
    - roles/bigquery.dataViewer
    - roles/bigquery.admin
  - var: item.access[].groupByEmail
    op: not_exists
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''language''])'
