version: '1.0'
rule_id: gcp.function.permission_denied
for_each: gcp.function.list_functions
severity: MEDIUM
conditions:
  all:
  - var: item.IAMPolicy.Bindings[].Members[]
    op: not_contains
    value: allUsers
  - var: item.IAMPolicy.Bindings[].Members[]
    op: not_contains
    value: allAuthenticatedUsers
