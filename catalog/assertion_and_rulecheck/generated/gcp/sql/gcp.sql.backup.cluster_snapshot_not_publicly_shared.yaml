version: '1.0'
rule_id: gcp.sql.backup.cluster_snapshot_not_publicly_shared
for_each: gcp.sql.list_instances
severity: HIGH
conditions:
  all:
  - var: item.settings.backupConfiguration.enabled
    op: is_true
  - var: item.settings.backupConfiguration.binaryLogEnabled
    op: is_true
  - var: item.settings.ipConfiguration.authorizedNetworks[].value
    op: not_contains
    value: 0.0.0.0/0
