version: '1.0'
rule_id: gcp.sql.user.user_no_unused_or_default_superusers
for_each: gcp.sql.list_users
severity: HIGH
conditions:
  all:
  - var: item.type
    op: not_equals
    value: BUILT_IN
  - var: item.type
    op: not_equals
    value: CLOUD_IAM_USER
  - var: item.type
    op: not_equals
    value: CLOUD_IAM_SERVICE_ACCOUNT
  - var: item.host
    op: not_equals
    value: '%'
  - var: item.name
    op: not_equals
    value: root
  - var: item.name
    op: not_equals
    value: postgres
