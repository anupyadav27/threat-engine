version: '1.0'
rule_id: gcp.sql.user.user_password_auth_hardened_or_iam_auth_preferred_where_supported
for_each: gcp.sql.list_instances
severity: HIGH
conditions:
  any:
  - var: item.settings.databaseFlags[].name
    op: contains
    value: cloudsql.iam_authentication
  - var: item.settings.databaseFlags[].name
    op: contains
    value: cloudsql.enable_password_verification
