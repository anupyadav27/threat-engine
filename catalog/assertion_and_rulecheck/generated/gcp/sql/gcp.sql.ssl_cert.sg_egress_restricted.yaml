version: '1.0'
rule_id: gcp.sql.ssl_cert.sg_egress_restricted
for_each: gcp.sql.instances.list
severity: HIGH
conditions:
  all:
  - var: item.settings.ipConfiguration.authorizedNetworks[].value
    op: not_contains
    value: 0.0.0.0/0
  - var: item.settings.ipConfiguration.requireSsl
    op: is_true
