version: '1.0'
rule_id: gcp.security_command_center.automation.automation_change_audit_logging_enabled
for_each: gcp.logging.sinks.list
severity: HIGH
conditions:
  all:
  - var: item.filter
    op: contains
    value: protoPayload.methodName="google.cloud.securitycenter.v1.Automation.UpdateAutomation"
  - var: item.destination
    op: exists
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''bucketName'', ''bucketOptions'',
  ''createTime'', ''description'', ''disabled'', ''filter'', ''labelExtractors'', ''metricDescriptor''])'
