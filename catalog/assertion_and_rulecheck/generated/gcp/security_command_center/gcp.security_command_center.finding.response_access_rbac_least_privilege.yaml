version: '1.0'
rule_id: gcp.security_command_center.finding.response_access_rbac_least_privilege
for_each: gcp.iam.list_roles
severity: HIGH
conditions:
  all:
  - var: item.includedPermissions
    op: not_contains
    value: securitycenter.findings.update
  - var: item.includedPermissions
    op: not_contains
    value: securitycenter.findings.setMute
  - var: item.includedPermissions
    op: not_contains
    value: securitycenter.findings.setState
