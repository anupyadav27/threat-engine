version: '1.0'
rule_id: gcp.security_command_center.finding.automation_execution_roles_least_privilege
for_each: gcp.iam.list_roles
severity: HIGH
conditions:
  all:
  - var: item.includedPermissions[]
    op: not_contains
    value: '*'
  - var: item.includedPermissions[]
    op: not_contains
    value: iam.roles.*
