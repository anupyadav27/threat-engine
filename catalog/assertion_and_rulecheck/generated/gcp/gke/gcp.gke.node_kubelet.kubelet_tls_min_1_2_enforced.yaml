version: '1.0'
rule_id: gcp.gke.node_kubelet.kubelet_tls_min_1_2_enforced
for_each: gcp.gke.clusters.list
severity: HIGH
conditions:
  all:
  - var: item.nodeConfig.config.kubeletConfig
    op: exists
  - var: item.nodeConfig.config.kubeletConfig.tlsMinVersion
    op: in
    value:
    - '1.2'
    - '1.3'
