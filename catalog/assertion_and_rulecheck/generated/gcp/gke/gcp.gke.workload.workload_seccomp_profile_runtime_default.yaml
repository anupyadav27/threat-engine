version: '1.0'
rule_id: gcp.gke.workload.workload_seccomp_profile_runtime_default
for_each: gcp.gke.list_clusters
severity: HIGH
conditions:
  all:
  - var: item.nodePools[].config.sandboxConfig.type
    op: exists
  - var: item.nodePools[].config.sandboxConfig.type
    op: equals
    value: gvisor
  - var: item.nodePools[].config.workloadMetadataConfig.mode
    op: exists
  - var: item.nodePools[].config.workloadMetadataConfig.mode
    op: equals
    value: GKE_METADATA
