version: '1.0'
rule_id: gcp.gke.rbac.rbac_no_cluster_admin_to_authenticated
for_each: gcp.gke.rbac.list_cluster_role_bindings
severity: HIGH
conditions:
  all:
  - var: item.roleRef.name
    op: not_equals
    value: cluster-admin
  - var: item.subjects[].kind
    op: not_contains
    value: User
  - var: item.subjects[].name
    op: not_contains
    value: system:authenticated
