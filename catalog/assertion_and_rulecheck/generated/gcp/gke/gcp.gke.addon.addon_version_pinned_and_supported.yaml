version: '1.0'
rule_id: gcp.gke.addon.addon_version_pinned_and_supported
for_each: gcp.gke.clusters.list
severity: HIGH
conditions:
  all:
  - var: item.addonsConfig.kubernetesDashboard.disabled
    op: is_true
  - var: item.addonsConfig.httpLoadBalancing.disabled
    op: is_false
  - var: item.addonsConfig.horizontalPodAutoscaling.disabled
    op: is_false
  - var: item.addonsConfig.networkPolicyConfig.disabled
    op: is_false
