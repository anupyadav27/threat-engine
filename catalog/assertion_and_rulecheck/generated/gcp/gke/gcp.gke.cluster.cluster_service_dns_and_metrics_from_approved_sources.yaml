version: '1.0'
rule_id: gcp.gke.cluster.cluster_service_dns_and_metrics_from_approved_sources
for_each: gcp.gke.list_clusters
severity: HIGH
conditions:
  all:
  - var: item.privateClusterConfig.enablePrivateNodes
    op: is_true
  - var: item.privateClusterConfig.masterGlobalAccessConfig.enabled
    op: is_true
  - var: item.privateClusterConfig.masterAuthorizedNetworksConfig.cidrBlocks[].cidrBlock
    op: not_contains
    value: 0.0.0.0/0
