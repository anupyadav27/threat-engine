version: '1.0'
rule_id: gcp.gke.autopilot.fargate_profile_private_subnets_only
for_each: gcp.gke.list_clusters
severity: HIGH
conditions:
  all:
  - var: item.Autopilot.Enabled
    op: is_true
  - var: item.NetworkConfig.PrivateClusterConfig.EnablePrivateNodes
    op: is_true
  - var: item.NetworkConfig.PrivateClusterConfig.EnablePrivateEndpoint
    op: is_true
