version: '1.0'
rule_id: gcp.gke.node_pool.container_instance_env_no_plaintext_secrets
for_each: gcp.gke.list_node_pools
severity: HIGH
conditions:
  all:
  - var: item.config.metadata[].key
    op: not_contains
    value: GOOGLE_APPLICATION_CREDENTIALS
  - var: item.config.metadata[].value
    op: not_contains
    value: .json
