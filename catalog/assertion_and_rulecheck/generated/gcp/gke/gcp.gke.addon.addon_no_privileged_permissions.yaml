version: '1.0'
rule_id: gcp.gke.addon.addon_no_privileged_permissions
for_each: gcp.gke.list_clusters
severity: HIGH
conditions:
  all:
  - var: item.AddonsConfig[].Name
    op: not_contains
    value: privileged
  - var: item.AddonsConfig[].Name
    op: not_contains
    value: privileged-permissions
