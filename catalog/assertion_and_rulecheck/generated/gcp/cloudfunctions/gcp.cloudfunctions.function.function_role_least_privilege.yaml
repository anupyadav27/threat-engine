version: '1.0'
rule_id: gcp.cloudfunctions.function.function_role_least_privilege
for_each: gcp.cloudfunctions.projects.locations.functions.list
severity: HIGH
conditions:
  var: item.serviceConfig.serviceAccountEmail
  op: not_contains
  value: '@cloudfunctions.gserviceaccount.com'
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''buildServiceAccount'', ''labels'',
  ''status''])'
