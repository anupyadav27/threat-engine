version: '1.0'
rule_id: gcp.cloudfunctions.event_source.event_source_permissions_least_privilege
for_each: gcp.cloudfunctions.projects.locations.functions.list
severity: HIGH
conditions:
  all:
  - var: item.eventTrigger.eventType
    op: exists
  - var: item.eventTrigger.serviceAccountEmail
    op: exists
  - var: item.eventTrigger.serviceAccountEmail
    op: not_contains
    value: '@cloudservices.gserviceaccount.com'
