version: '1.0'
rule_id: gcp.flow.ssh_inbound
for_each: gcp.compute.list_firewalls
severity: MEDIUM
conditions:
  all:
  - var: item.direction
    op: equals
    value: INGRESS
  - var: item.allowed[].ports[]
    op: contains
    value: '22'
  - var: item.sourceRanges[]
    op: not_contains
    value: 0.0.0.0/0
