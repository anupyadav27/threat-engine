version: '1.0'
rule_id: gcp.flow.database_port
for_each: gcp.sql.list_instances
severity: MEDIUM
conditions:
  all:
  - var: item.settings.ipConfiguration.authorizedNetworks[].value
    op: not_contains
    value: 0.0.0.0/0
  - var: item.settings.ipConfiguration.authorizedNetworks[].value
    op: not_contains
    value: ::/0
