version: '1.0'
rule_id: gcp.cloudsql.revoke_privileges
for_each: gcp.cloudsql.list_instances
severity: HIGH
conditions:
  all:
  - var: item.settings.databaseFlags[].name
    op: not_contains
    value: cloudsql.enable_privilege_separation
  - var: item.settings.databaseFlags[].value
    op: not_contains
    value: 'off'
