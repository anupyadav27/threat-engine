version: '1.0'
rule_id: gcp.compute.url_map.regex_set_no_overly_broad_patterns
for_each: gcp.compute.list_url_maps
severity: MEDIUM
conditions:
  all:
  - var: item.pathMatchers[].pathRules[].paths[]
    op: not_contains
    value: '*'
  - var: item.pathMatchers[].pathRules[].paths[]
    op: not_contains
    value: '?'
  - var: item.pathMatchers[].pathRules[].paths[]
    op: not_contains
    value: ..
