version: '1.0'
rule_id: gcp.compute.instance.testing_logs_enabled
for_each: gcp.compute.list_instances
severity: MEDIUM
conditions:
  all:
  - var: item.metadata.items[].key
    op: contains
    value: enable-oslogin
  - var: item.metadata.items[?(@.key == 'enable-oslogin')].value
    op: equals
    value: 'TRUE'
