version: '1.0'
rule_id: gcp.compute.url_map.rule_has_effective_action_not_count_only
for_each: gcp.compute.list_url_maps
severity: MEDIUM
conditions:
  all:
  - var: item.defaultUrlRedirect
    op: exists
  - var: item.defaultUrlRedirect.redirectResponseCode
    op: exists
  - var: item.defaultUrlRedirect.httpsRedirect
    op: is_true
