version: '1.0'
rule_id: gcp.compute.network.vpc_route_tables_no_unintended_internet_paths
for_each: gcp.compute.list_route_tables
severity: HIGH
conditions:
  all:
  - var: item.routes[].destRange
    op: not_contains
    value: 0.0.0.0/0
  - var: item.routes[].destRange
    op: not_contains
    value: ::/0
