version: '1.0'
rule_id: gcp.compute.network_interface.eni_security_groups_restrictive
for_each: gcp.compute.list_instances
severity: HIGH
conditions:
  all:
  - var: item.networkInterfaces[].accessConfigs[].natIP
    op: not_exists
  - var: item.networkInterfaces[].ipv6AccessConfigs[].externalIpv6
    op: not_exists
