version: '1.0'
rule_id: gcp.compute.network.vpc_dns_hostnames_and_support_configured
for_each: gcp.compute.networks.list
severity: HIGH
conditions:
  all:
  - var: item.enableUlaInternalIpv6
    op: is_false
  - var: item.dnsConfig.enableInboundForwarding
    op: is_true
  - var: item.dnsConfig.allowForwardingOnlyForRdnsZones
    op: is_false
