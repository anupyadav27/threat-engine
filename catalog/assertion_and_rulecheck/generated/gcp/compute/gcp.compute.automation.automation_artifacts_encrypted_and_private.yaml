version: '1.0'
rule_id: gcp.compute.automation.automation_artifacts_encrypted_and_private
for_each: gcp.compute.automation.list_automation_artifacts
severity: MEDIUM
conditions:
  all:
  - var: item.encryption
    op: exists
  - var: item.encryption.encryption_type
    op: equals
    value: CUSTOMER_MANAGED
  - var: item.visibility
    op: not_equals
    value: PUBLIC
