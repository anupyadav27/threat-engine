version: '1.0'
rule_id: gcp.compute.address.ip_set_cidrs_valid_and_minimized
for_each: gcp.compute.list_addresses
severity: MEDIUM
conditions:
  all:
  - var: item.IpCidrRange
    op: exists
  - var: item.IpCidrRange
    op: not_equals
    value: 0.0.0.0/0
  - var: item.IpCidrRange
    op: not_contains
    value: ::/0
