version: '1.0'
rule_id: gcp.compute.backend_service.tg_targets_in_private_subnets
for_each: gcp.compute.list_backend_services
severity: HIGH
conditions:
  all:
  - var: item.backends[].group
    op: exists
  - var: item.backends[].group
    op: not_contains
    value: https://www.googleapis.com/compute/v1/projects/
