version: '1.0'
rule_id: gcp.compute.route.route_table_vpc_endpoints_used_for_saas_where_supported
for_each: gcp.compute.list_routes
severity: HIGH
conditions:
  any:
  - var: item.nextHopGateway
    op: equals
    value: https://www.googleapis.com/compute/v1/projects/gcp-sa-<service>.global/gateways/default-internet-gateway
  - var: item.nextHopGateway
    op: contains
    value: global/gateways/default-internet-gateway
