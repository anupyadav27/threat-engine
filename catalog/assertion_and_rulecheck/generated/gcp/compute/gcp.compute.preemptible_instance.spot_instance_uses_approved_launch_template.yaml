version: '1.0'
rule_id: gcp.compute.preemptible_instance.spot_instance_uses_approved_launch_template
for_each: gcp.compute.list_instances
severity: HIGH
conditions:
  all:
  - var: item.scheduling.preemptible
    op: is_false
  - var: item.scheduling.provisioningModel
    op: not_equals
    value: SPOT
