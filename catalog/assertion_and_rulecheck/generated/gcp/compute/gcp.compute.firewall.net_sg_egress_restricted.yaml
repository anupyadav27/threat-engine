version: '1.0'
rule_id: gcp.compute.firewall.net_sg_egress_restricted
for_each: gcp.compute.firewalls.list
severity: HIGH
conditions:
  all:
  - var: item.direction
    op: equals
    value: EGRESS
  - var: item.allowed[].IPProtocol
    op: not_contains
    value: all
  - var: item.destinationRanges[]
    op: not_contains
    value: 0.0.0.0/0
