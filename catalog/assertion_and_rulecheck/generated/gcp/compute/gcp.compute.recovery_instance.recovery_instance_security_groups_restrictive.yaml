version: '1.0'
rule_id: gcp.compute.recovery_instance.recovery_instance_security_groups_restrictive
for_each: gcp.compute.list_instances
severity: MEDIUM
conditions:
  all:
  - var: item.networkInterfaces[].accessConfigs[].natIP
    op: not_exists
  - var: item.tags.items
    op: not_contains
    value: public
