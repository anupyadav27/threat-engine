version: '1.0'
rule_id: gcp.compute.segmentation.segmentation_exception_approvals_required
for_each: gcp.compute.list_instances
severity: HIGH
conditions:
  all:
  - var: item.labels.segmentation_exception_approved
    op: exists
  - var: item.labels.segmentation_exception_approved
    op: equals
    value: 'true'
