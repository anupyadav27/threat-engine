version: '1.0'
rule_id: gcp.compute.source_server.dr_source_agent_to_service_tls_required
for_each: gcp.compute.instances.list
severity: HIGH
conditions:
  all:
  - var: item.metadata.items[].key
    op: contains
    value: source-server-agent-tls-required
  - var: item.metadata.items[?(@.key=='source-server-agent-tls-required')].value
    op: equals
    value: 'true'
