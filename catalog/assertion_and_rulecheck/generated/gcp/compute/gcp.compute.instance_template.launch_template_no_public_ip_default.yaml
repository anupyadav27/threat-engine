version: '1.0'
rule_id: gcp.compute.instance_template.launch_template_no_public_ip_default
for_each: gcp.compute.instance_templates.list
severity: HIGH
conditions:
  all:
  - var: item.properties.networkInterfaces[].accessConfigs[].natIP
    op: not_exists
  - var: item.properties.networkInterfaces[].accessConfigs[].type
    op: not_equals
    value: ONE_TO_ONE_NAT
