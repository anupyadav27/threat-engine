version: '1.0'
rule_id: gcp.compute.traffic_analysis.traffic_analysis_ids_ips_enabled_where_supported
for_each: gcp.compute.instances.list
severity: HIGH
conditions:
  all:
  - var: item.shieldedInstanceConfig.enableIntegrityMonitoring
    op: is_true
  - var: item.shieldedInstanceConfig.enableVtpm
    op: is_true
