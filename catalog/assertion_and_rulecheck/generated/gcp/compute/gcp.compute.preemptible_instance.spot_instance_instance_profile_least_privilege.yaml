version: '1.0'
rule_id: gcp.compute.preemptible_instance.spot_instance_instance_profile_least_privilege
for_each: gcp.compute.list_instances
severity: HIGH
conditions:
  all:
  - var: item.scheduling.preemptible
    op: is_true
  - var: item.serviceAccounts[].scopes
    op: not_contains
    value: https://www.googleapis.com/auth/cloud-platform
