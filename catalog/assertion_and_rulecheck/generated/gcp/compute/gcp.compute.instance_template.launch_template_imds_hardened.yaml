version: '1.0'
rule_id: gcp.compute.instance_template.launch_template_imds_hardened
for_each: gcp.compute.instance_templates.list
severity: HIGH
conditions:
  all:
  - var: item.properties.metadata.items[].key
    op: contains
    value: block-project-ssh-keys
  - var: item.properties.metadata.items[?(@.key=='block-project-ssh-keys')].value
    op: equals
    value: 'true'
