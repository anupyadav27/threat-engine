version: '1.0'
rule_id: gcp.compute.instance.testing_results_storage_encrypted_and_private
for_each: gcp.compute.list_instances
severity: MEDIUM
conditions:
  all:
  - var: item.disks[].diskEncryptionKey.kmsKeyName
    op: exists
  - var: item.networkInterfaces[].accessConfigs[].natIP
    op: not_exists
