version: '1.0'
rule_id: gcp.compute.security_policy.waf_ip_rate_limit_rules_configured_where_supported
for_each: gcp.compute.security_policies.list
severity: MEDIUM
conditions:
  all:
  - var: item.rules[].action
    op: contains
    value: throttle
  - var: item.rules[].match.config.srcIpRanges
    op: not_empty
