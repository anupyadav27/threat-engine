version: '1.0'
rule_id: gcp.compute.snapshot.backup_destination_private_only
for_each: gcp.compute.list_snapshots
severity: MEDIUM
conditions:
  all:
  - var: item.storageLocations
    op: exists
  - var: item.storageLocations[]
    op: not_contains
    value: us
  - var: item.storageLocations[]
    op: not_contains
    value: eu
  - var: item.storageLocations[]
    op: not_contains
    value: asia
