version: '1.0'
rule_id: gcp.compute.url_map.cache_policy_allowlists_minimal_query_headers_cookies
for_each: gcp.compute.list_url_maps
severity: MEDIUM
conditions:
  all:
  - var: item.CacheKeyPolicy.IncludeQueryString
    op: is_false
  - var: item.CacheKeyPolicy.IncludeHttpHeaders
    op: is_false
  - var: item.CacheKeyPolicy.IncludeNamedCookies
    op: is_false
