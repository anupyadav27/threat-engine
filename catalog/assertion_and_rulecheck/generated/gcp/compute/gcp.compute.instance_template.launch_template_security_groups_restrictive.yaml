version: '1.0'
rule_id: gcp.compute.instance_template.launch_template_security_groups_restrictive
for_each: gcp.compute.instanceTemplates.list
severity: HIGH
conditions:
  all:
  - var: item.properties.networkInterfaces[].accessConfigs[].natIP
    op: not_exists
  - var: item.properties.networkInterfaces[].ipv6AccessConfigs[].externalIpv6
    op: not_exists
