version: '1.0'
rule_id: gcp.compute.monitoring.monitoring_alerts_for_anomalies_configured
for_each: gcp.compute.instances.list
severity: HIGH
conditions:
  all:
  - var: item.metadata.labels.alerting_enabled
    op: equals
    value: 'true'
  - var: item.metadata.labels.alerting_rules
    op: not_empty
