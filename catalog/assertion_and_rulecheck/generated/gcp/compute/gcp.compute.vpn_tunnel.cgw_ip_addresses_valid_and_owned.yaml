version: '1.0'
rule_id: gcp.compute.vpn_tunnel.cgw_ip_addresses_valid_and_owned
for_each: gcp.compute.list_vpn_tunnels
severity: HIGH
conditions:
  all:
  - var: item.customerGatewayIpAddresses[]
    op: not_contains
    value: 0.0.0.0
  - var: item.customerGatewayIpAddresses[]
    op: not_contains
    value: '::'
