version: '1.0'
rule_id: gcp.compute.source_server.dr_source_min_telemtry_required_no_pii
for_each: gcp.compute.list_instances
severity: MEDIUM
conditions:
  all:
  - var: item.labels.dr_source
    op: exists
  - var: item.labels.dr_source
    op: not_equals
    value: 'true'
  - var: item.labels.telemetry
    op: exists
  - var: item.labels.telemetry
    op: not_equals
    value: full
  - var: item.labels.pii
    op: exists
  - var: item.labels.pii
    op: is_false
