version: '1.0'
rule_id: gcp.compute.reservation.reservation_billing_admins_mfa_required
for_each: gcp.compute.list_reservations
severity: HIGH
conditions:
  all:
  - var: item.specificReservation
    op: exists
  - var: item.specificReservation.assignedReservations[].assignedUsers[].mfaEnabled
    op: is_true
