version: '1.0'
rule_id: gcp.compute.instance.vm_security_group_inbound_restricted
for_each: gcp.compute.instances.list
severity: HIGH
conditions:
  all:
  - var: item.networkInterfaces[].accessConfigs[].natIP
    op: is_empty
  - var: item.networkInterfaces[].ipv6AccessConfigs[].externalIpv6
    op: is_empty
