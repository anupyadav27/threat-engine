version: '1.0'
rule_id: gcp.compute.instance.vm_ssh_key_based_auth_required
for_each: gcp.compute.list_instances
severity: HIGH
conditions:
  all:
  - var: item.metadata.items[].key
    op: contains
    value: block-project-ssh-keys
  - var: item.metadata.items[?(@.key == 'block-project-ssh-keys')].value
    op: equals
    value: 'true'
