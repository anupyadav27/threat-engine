version: '1.0'
rule_id: gcp.compute.url_map.origin_request_policy_no_secret_headers_forwarded
for_each: gcp.compute.list_url_maps
severity: HIGH
conditions:
  all:
  - var: item.originRequestPolicy
    op: exists
  - var: item.originRequestPolicy.headersConfig.headers[].headerName
    op: not_contains
    value: Authorization
  - var: item.originRequestPolicy.headersConfig.headers[].headerName
    op: not_contains
    value: Cookie
