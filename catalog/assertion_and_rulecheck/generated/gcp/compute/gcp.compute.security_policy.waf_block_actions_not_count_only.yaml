version: '1.0'
rule_id: gcp.compute.security_policy.waf_block_actions_not_count_only
for_each: gcp.compute.list_security_policies
severity: MEDIUM
conditions:
  all:
  - var: item.rules[].action
    op: not_contains
    value: allow
  - var: item.rules[].action
    op: not_contains
    value: redirect
