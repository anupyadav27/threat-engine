version: '1.0'
rule_id: gcp.compute.instance_group.instance_group_instance_profile_least_privilege
for_each: gcp.compute.instance_groups.list
severity: HIGH
conditions:
  all:
  - var: item.instances[].serviceAccounts[].scopes[]
    op: not_contains
    value: https://www.googleapis.com/auth/cloud-platform
