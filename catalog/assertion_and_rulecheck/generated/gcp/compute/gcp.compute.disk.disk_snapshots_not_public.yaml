version: '1.0'
rule_id: gcp.compute.disk.disk_snapshots_not_public
for_each: gcp.compute.list_disks
severity: HIGH
conditions:
  all:
  - var: item.iamPolicy.bindings[].members[]
    op: not_contains
    value: allUsers
  - var: item.iamPolicy.bindings[].members[]
    op: not_contains
    value: allAuthenticatedUsers
