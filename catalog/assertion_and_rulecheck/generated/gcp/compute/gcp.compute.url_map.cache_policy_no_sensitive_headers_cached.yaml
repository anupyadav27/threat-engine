version: '1.0'
rule_id: gcp.compute.url_map.cache_policy_no_sensitive_headers_cached
for_each: gcp.compute.list_url_maps
severity: MEDIUM
conditions:
  all:
  - var: item.cacheKeyPolicy
    op: exists
  - var: item.cacheKeyPolicy.includeHttpHeaders[]
    op: not_contains
    value: Authorization
  - var: item.cacheKeyPolicy.includeHttpHeaders[]
    op: not_contains
    value: Cookie
