version: '1.0'
rule_id: gcp.compute.firewall.warehouse_sg_only_required_ports_open
for_each: gcp.compute.firewall.list_firewalls
severity: HIGH
conditions:
  all:
  - var: item.allowed[].ports[]
    op: not_contains
    value: 0-65535
  - var: item.direction
    op: equals
    value: INGRESS
  - var: item.disabled
    op: is_false
