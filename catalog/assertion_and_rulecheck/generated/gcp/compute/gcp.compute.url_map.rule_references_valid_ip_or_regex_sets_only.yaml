version: '1.0'
rule_id: gcp.compute.url_map.rule_references_valid_ip_or_regex_sets_only
for_each: gcp.compute.list_url_maps
severity: MEDIUM
conditions:
  all:
  - var: item.hostRules[].pathMatcher
    op: exists
  - var: item.pathMatchers[].defaultService
    op: exists
  - var: item.pathMatchers[].defaultService
    op: not_contains
    value: invalid
  - var: item.pathMatchers[].pathRules[].service
    op: not_contains
    value: invalid
