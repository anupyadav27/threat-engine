version: '1.0'
rule_id: gcp.compute.url_map.cache_policy_respects_cache_control_no_store_private
for_each: gcp.compute.list_url_maps
severity: MEDIUM
conditions:
  all:
  - var: item.CacheKeyPolicy
    op: exists
  - var: item.CacheKeyPolicy.IncludeHttpHeader
    op: contains
    value: Cache-Control
  - var: item.CacheKeyPolicy.QueryStringWhitelist
    op: contains
    value: no-store
  - var: item.CacheKeyPolicy.QueryStringWhitelist
    op: contains
    value: private
