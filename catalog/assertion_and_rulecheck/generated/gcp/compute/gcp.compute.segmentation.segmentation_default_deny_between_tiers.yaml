version: '1.0'
rule_id: gcp.compute.segmentation.segmentation_default_deny_between_tiers
for_each: gcp.compute.list_firewalls
severity: HIGH
conditions:
  all:
  - var: item.direction
    op: equals
    value: INGRESS
  - var: item.allowed[].ports[]
    op: not_contains
    value: 0-65535
  - var: item.sourceRanges[]
    op: not_contains
    value: 0.0.0.0/0
