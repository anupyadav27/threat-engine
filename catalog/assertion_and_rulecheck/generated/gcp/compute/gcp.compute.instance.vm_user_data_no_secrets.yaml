version: '1.0'
rule_id: gcp.compute.instance.vm_user_data_no_secrets
for_each: gcp.compute.instances.list
severity: HIGH
conditions:
  all:
  - var: item.metadata.items[].key
    op: not_contains
    value: user-data
  - var: item.metadata.items[].value
    op: not_contains
    value: password
  - var: item.metadata.items[].value
    op: not_contains
    value: secret
  - var: item.metadata.items[].value
    op: not_contains
    value: key
