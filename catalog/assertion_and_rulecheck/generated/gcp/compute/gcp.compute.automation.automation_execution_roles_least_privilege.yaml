version: '1.0'
rule_id: gcp.compute.automation.automation_execution_roles_least_privilege
for_each: gcp.compute.automation.list_automations
severity: HIGH
conditions:
  all:
  - var: item.automationExecutionRoles[].role
    op: in
    value:
    - roles/compute.automationExecutionUser
    - roles/compute.automationExecutionViewer
