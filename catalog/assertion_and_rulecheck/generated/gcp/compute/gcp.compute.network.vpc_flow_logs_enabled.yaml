version: '1.0'
rule_id: gcp.compute.network.vpc_flow_logs_enabled
for_each: gcp.compute.list_subnetworks
severity: HIGH
conditions:
  all:
  - var: item.EnableFlowLogs
    op: is_true
  - var: item.LogConfig.AggregationInterval
    op: exists
  - var: item.LogConfig.FlowSampling
    op: exists
  - var: item.LogConfig.Metadata
    op: exists
