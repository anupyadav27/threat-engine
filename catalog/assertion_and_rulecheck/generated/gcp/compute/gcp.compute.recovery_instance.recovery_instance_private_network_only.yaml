version: '1.0'
rule_id: gcp.compute.recovery_instance.recovery_instance_private_network_only
for_each: gcp.compute.list_instances
severity: MEDIUM
conditions:
  all:
  - var: item.networkInterfaces[].accessConfigs
    op: is_empty
  - var: item.networkInterfaces[].ipv6AccessConfigs
    op: is_empty
