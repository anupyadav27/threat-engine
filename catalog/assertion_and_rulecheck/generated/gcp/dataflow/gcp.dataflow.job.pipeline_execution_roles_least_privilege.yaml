version: '1.0'
rule_id: gcp.dataflow.job.pipeline_execution_roles_least_privilege
for_each: gcp.dataflow.projects.locations.jobs.list
severity: HIGH
conditions:
  all:
  - var: item.environment.serviceAccountEmail
    op: exists
  - var: item.environment.serviceAccountEmail
    op: not_equals
    value: default
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''clientRequestId'', ''createTime'',
  ''createdFromSnapshotId'', ''currentState'', ''currentStateTime'', ''environment'', ''executionInfo'', ''id''])'
