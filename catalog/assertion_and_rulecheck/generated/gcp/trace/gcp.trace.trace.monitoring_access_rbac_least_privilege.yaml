version: '1.0'
rule_id: gcp.trace.trace.monitoring_access_rbac_least_privilege
for_each: gcp.trace.list_traces
severity: HIGH
conditions:
  all:
  - var: item.iamPolicy.bindings[].role
    op: not_in
    value:
    - roles/cloudtrace.admin
    - roles/owner
  - var: item.iamPolicy.bindings[].members[]
    op: not_contains
    value: allUsers
  - var: item.iamPolicy.bindings[].members[]
    op: not_contains
    value: allAuthenticatedUsers
