version: '1.0'
rule_id: gcp.iam.workload_identity_pool.oidc_issuer_https_and_matches_discovery
for_each: gcp.iam.projects.locations.workloadIdentityPools.list
severity: HIGH
conditions:
  all:
  - var: item.inlineTrustConfig.endpoint
    op: exists
  - var: item.inlineTrustConfig.endpoint
    op: contains
    value: https://
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''description'', ''disabled'', ''displayName'',
  ''expireTime'', ''inlineCertificateIssuanceConfig'', ''inlineTrustConfig'', ''mode'', ''name''])'
