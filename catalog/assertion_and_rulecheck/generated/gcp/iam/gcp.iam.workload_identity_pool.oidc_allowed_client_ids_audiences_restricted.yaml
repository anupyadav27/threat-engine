version: '1.0'
rule_id: gcp.iam.workload_identity_pool.oidc_allowed_client_ids_audiences_restricted
for_each: gcp.iam.projects.locations.workloadIdentityPools.list
severity: HIGH
conditions:
  all:
  - var: item.inlineCertificateIssuanceConfig.endpoint
    op: exists
  - var: item.inlineCertificateIssuanceConfig.keyStorageType
    op: equals
    value: example-type
