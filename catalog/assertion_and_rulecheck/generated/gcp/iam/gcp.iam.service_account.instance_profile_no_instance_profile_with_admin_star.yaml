version: '1.0'
rule_id: gcp.iam.service_account.instance_profile_no_instance_profile_with_admin_star
for_each: gcp.iam.projects.serviceAccounts.list
severity: HIGH
conditions:
  all:
  - var: item.name
    op: exists
  - var: item.name
    op: not_contains
    value: admin
  - var: item.name
    op: not_contains
    value: '*'
