version: '1.0'
rule_id: gcp.iam.service_account.service_account_keys_not_used_or_rotated_90_days_or_less
for_each: gcp.iam.projects.serviceAccounts.keys.list
severity: HIGH
conditions:
  all:
  - var: item.expireTime
    op: exists
  - var: item.expireTime
    op: gt
    value: '2025-01-01T00:00:00Z'
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''description'', ''disabled'', ''displayName'',
  ''expireTime'', ''inlineCertificateIssuanceConfig'', ''inlineTrustConfig'', ''mode'', ''name''])'
