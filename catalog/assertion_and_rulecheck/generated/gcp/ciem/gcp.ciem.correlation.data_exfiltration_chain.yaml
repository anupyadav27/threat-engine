version: '1.0'
rule_id: gcp.ciem.correlation.data_exfiltration_chain
for_each: gcp.ciem.correlation.data_exfiltration_chain
severity: MEDIUM
conditions:
  all:
  - var: item.risk_level
    op: not_equals
    value: HIGH
  - var: item.activities[].activity_type
    op: not_contains
    value: data_exfiltration
