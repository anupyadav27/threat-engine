version: '1.0'
rule_id: gcp.ciem.correlation.lateral_movement_chain
for_each: gcp.ciem.list_identities
severity: MEDIUM
conditions:
  all:
  - var: item.roles[].name
    op: not_contains
    value: roles/owner
  - var: item.roles[].name
    op: not_contains
    value: roles/editor
  - var: item.roles[].name
    op: not_contains
    value: roles/viewer
