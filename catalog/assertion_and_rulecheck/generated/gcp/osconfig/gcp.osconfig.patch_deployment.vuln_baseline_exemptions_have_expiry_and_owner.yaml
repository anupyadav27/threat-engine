version: '1.0'
rule_id: gcp.osconfig.patch_deployment.vuln_baseline_exemptions_have_expiry_and_owner
for_each: gcp.osconfig.projects.patchDeployments.list
severity: MEDIUM
conditions:
  all:
  - var: item.patchConfig.rebootConfig
    op: not_equals
    value: NEVER
  - var: item.patchConfig.apt.exclusivePackages
    op: exists
  - var: item.patchConfig.yum.excludePackages
    op: exists
  - var: item.patchConfig.goo.exclusivePackages
    op: exists
  - var: item.patchConfig.zypper.excludePackages
    op: exists
  - var: item.patchConfig.windowsUpdate.exclusivePatches
    op: exists
  - var: item.patchConfig.preStep.linuxExecStepConfig.gcsObject.bucket
    op: exists
  - var: item.patchConfig.postStep.windowsExecStepConfig.interpreter
    op: exists
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''createTime'', ''description'',
  ''duration'', ''instanceFilter'', ''lastExecuteTime'', ''name'', ''oneTimeSchedule'', ''patchConfig''])'
