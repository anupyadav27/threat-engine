version: '1.0'
rule_id: gcp.osconfig.patch_deployment.baseline_required_controls_present
for_each: gcp.osconfig.projects.patchDeployments.list
severity: MEDIUM
conditions:
  all:
  - var: item.patchConfig
    op: exists
  - var: item.patchConfig.rebootConfig
    op: exists
  - var: item.patchConfig.windowsUpdate
    op: exists
  - var: item.patchConfig.apt
    op: exists
  - var: item.patchConfig.yum
    op: exists
  - var: item.patchConfig.goo
    op: exists
  - var: item.patchConfig.zypper
    op: exists
  - var: item.patchConfig.preStep
    op: exists
  - var: item.patchConfig.postStep
    op: exists
  - var: item.patchConfig.migInstancesAllowed
    op: exists
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''createTime'', ''description'',
  ''duration'', ''instanceFilter'', ''lastExecuteTime'', ''name'', ''oneTimeSchedule'', ''patchConfig''])'
