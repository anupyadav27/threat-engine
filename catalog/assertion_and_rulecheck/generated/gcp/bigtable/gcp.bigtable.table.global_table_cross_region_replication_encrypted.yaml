version: '1.0'
rule_id: gcp.bigtable.table.global_table_cross_region_replication_encrypted
for_each: gcp.bigtable.list_tables
severity: HIGH
conditions:
  all:
  - var: item.encryptionConfig.kmsKeyName
    op: exists
  - var: item.clusterStates[].encryptionInfo[].encryptionType
    op: not_contains
    value: GOOGLE_DEFAULT_ENCRYPTION
