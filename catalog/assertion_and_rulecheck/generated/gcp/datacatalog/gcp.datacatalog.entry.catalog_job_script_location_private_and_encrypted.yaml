version: '1.0'
rule_id: gcp.datacatalog.entry.catalog_job_script_location_private_and_encrypted
for_each: gcp.datacatalog.projects.locations.entryGroups.entries.list
severity: MEDIUM
conditions:
  all:
  - var: item.gcsFilesetSpec.sampleGcsFileSpecs[].filePath
    op: contains
    value: gs://
  - var: item.gcsFilesetSpec.sampleGcsFileSpecs[].filePath
    op: not_contains
    value: public-read
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''activatedPolicyTypes'', ''description'',
  ''displayName'', ''name'', ''policyTagCount'', ''service'', ''taxonomyTimestamps''])'
