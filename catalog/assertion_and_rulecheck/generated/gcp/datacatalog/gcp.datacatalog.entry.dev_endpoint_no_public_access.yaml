version: '1.0'
rule_id: gcp.datacatalog.entry.dev_endpoint_no_public_access
for_each: gcp.datacatalog.projects.locations.entryGroups.entries.list
severity: HIGH
conditions:
  all:
  - var: item.activatedPolicyTypes
    op: exists
  - var: item.activatedPolicyTypes
    op: not_contains
    value: PUBLIC_ACCESS
