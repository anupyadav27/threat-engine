version: '1.0'
rule_id: gcp.datacatalog.entry.lineage_job_script_location_private_and_encrypted
for_each: gcp.datacatalog.projects.locations.entryGroups.entries.list
severity: MEDIUM
conditions:
  all:
  - var: item.lineageJobScriptLocation
    op: exists
  - var: item.lineageJobScriptLocation.isPrivate
    op: is_true
  - var: item.lineageJobScriptLocation.isEncrypted
    op: is_true
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''activatedPolicyTypes'', ''description'',
  ''displayName'', ''name'', ''policyTagCount'', ''service'', ''taxonomyTimestamps''])'
