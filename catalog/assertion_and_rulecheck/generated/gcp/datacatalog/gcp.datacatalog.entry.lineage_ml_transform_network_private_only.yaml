version: '1.0'
rule_id: gcp.datacatalog.entry.lineage_ml_transform_network_private_only
for_each: gcp.datacatalog.projects.locations.entryGroups.entries.list
severity: MEDIUM
conditions:
  all:
  - var: item.service
    op: equals
    value: dataplex
  - var: item.description
    op: contains
    value: lineage
  - var: item.displayName
    op: contains
    value: ml-transform
  - var: item.activatedPolicyTypes
    op: contains
    value: private
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''activatedPolicyTypes'', ''description'',
  ''displayName'', ''name'', ''policyTagCount'', ''service'', ''taxonomyTimestamps''])'
