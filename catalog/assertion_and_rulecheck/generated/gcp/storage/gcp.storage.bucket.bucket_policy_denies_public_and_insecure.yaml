version: '1.0'
rule_id: gcp.storage.bucket.bucket_policy_denies_public_and_insecure
for_each: gcp.storage.buckets.list
severity: HIGH
conditions:
  all:
  - var: item.acl
    op: not_contains
    value: allUsers
  - var: item.acl
    op: not_contains
    value: allAuthenticatedUsers
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''componentCount'', ''contentLanguage'',
  ''retention''])'
