version: '1.0'
rule_id: gcp.storage.object.object_not_publicly_readable
for_each: gcp.storage.objects.list
severity: HIGH
conditions:
  all:
  - var: item.acl
    op: not_contains
    value: allUsers
  - var: item.acl
    op: not_contains
    value: allAuthenticatedUsers
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''componentCount'', ''contentLanguage'',
  ''retention''])'
