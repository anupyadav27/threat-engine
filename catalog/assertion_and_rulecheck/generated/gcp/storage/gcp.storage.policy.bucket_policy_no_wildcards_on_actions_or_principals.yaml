version: '1.0'
rule_id: gcp.storage.policy.bucket_policy_no_wildcards_on_actions_or_principals
for_each: gcp.storage.buckets.list
severity: HIGH
conditions:
  all:
  - var: item.acl[].entity
    op: not_contains
    value: allUsers
  - var: item.acl[].entity
    op: not_contains
    value: allAuthenticatedUsers
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''componentCount'', ''contentLanguage'',
  ''retention''])'
