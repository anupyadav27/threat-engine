version: '1.0'
rule_id: gcp.storage.bucket.documentation_storage_encrypted_and_private
for_each: gcp.storage.buckets.list
severity: MEDIUM
conditions:
  all:
  - var: item.kmsKeyName
    op: exists
  - var: item.acl
    op: not_contains
    value: allUsers
  - var: item.acl
    op: not_contains
    value: allAuthenticatedUsers
