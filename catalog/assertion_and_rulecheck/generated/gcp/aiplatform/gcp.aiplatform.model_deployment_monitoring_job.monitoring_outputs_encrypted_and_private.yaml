version: '1.0'
rule_id: gcp.aiplatform.model_deployment_monitoring_job.monitoring_outputs_encrypted_and_private
for_each: gcp.aiplatform.projects.locations.endpoints.list
severity: MEDIUM
conditions:
  all:
  - var: item.encryptionSpec
    op: exists
  - var: item.network
    op: not_contains
    value: public
