version: '1.0'
rule_id: gcp.aiplatform.pipeline_job.pipeline_roles_least_privilege
for_each: gcp.aiplatform.projects.locations.pipelineJobs.list
severity: HIGH
conditions:
  all:
  - var: item.serviceAccount
    op: exists
  - var: item.serviceAccount
    op: not_equals
    value: default
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''labels'', ''pscInterfaceConfig'',
  ''runtimeConfig'', ''serviceAccount'', ''state''])'
