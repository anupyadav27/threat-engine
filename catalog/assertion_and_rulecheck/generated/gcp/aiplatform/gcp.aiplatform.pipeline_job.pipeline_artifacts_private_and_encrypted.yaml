version: '1.0'
rule_id: gcp.aiplatform.pipeline_job.pipeline_artifacts_private_and_encrypted
for_each: gcp.aiplatform.projects.locations.batchPredictionJobs.list
severity: MEDIUM
conditions:
  all:
  - var: item.encryptionSpec
    op: exists
  - var: item.network
    op: not_contains
    value: public
