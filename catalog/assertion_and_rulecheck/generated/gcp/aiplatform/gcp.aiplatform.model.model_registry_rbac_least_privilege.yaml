version: '1.0'
rule_id: gcp.aiplatform.model.model_registry_rbac_least_privilege
for_each: gcp.aiplatform.projects.locations.models.list
severity: HIGH
conditions:
  all:
  - var: item.labels['goog-vertex-ai-model-registry-role']
    op: exists
  - var: item.labels['goog-vertex-ai-model-registry-role']
    op: in
    value:
    - OWNER
    - EDITOR
    - VIEWER
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''createTime'', ''displayName'',
  ''encryptionSpec'', ''endTime'', ''error'', ''jobDetail'', ''labels'', ''name''])'
