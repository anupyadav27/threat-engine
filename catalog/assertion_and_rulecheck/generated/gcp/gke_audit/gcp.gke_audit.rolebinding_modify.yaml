version: '1.0'
rule_id: gcp.gke_audit.rolebinding_modify
for_each: gcp.gke_audit.list_rolebindings
severity: MEDIUM
conditions:
  all:
  - var: item.operation
    op: not_equals
    value: create
  - var: item.operation
    op: not_equals
    value: update
  - var: item.operation
    op: not_equals
    value: delete
