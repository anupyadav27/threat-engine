version: '1.0'
rule_id: gcp.gke_audit.webhook_modify
for_each: gcp.gke_audit.list_clusters
severity: MEDIUM
conditions:
  all:
  - var: item.Cluster.MasterAuthorizedNetworksConfig.Enabled
    op: is_true
  - var: item.Cluster.MasterAuthorizedNetworksConfig.CidrBlocks[].CidrBlock
    op: not_contains
    value: 0.0.0.0/0
