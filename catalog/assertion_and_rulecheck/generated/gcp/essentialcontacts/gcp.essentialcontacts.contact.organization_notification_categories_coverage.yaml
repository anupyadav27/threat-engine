version: '1.0'
rule_id: gcp.essentialcontacts.contact.organization_notification_categories_coverage
for_each: gcp.essentialcontacts.projects.contacts.list
severity: MEDIUM
conditions:
  all:
  - var: item.notificationCategorySubscriptions
    op: not_empty
  - var: item.validationState
    op: equals
    value: VALID
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''email'', ''languageTag'', ''name'',
  ''notificationCategorySubscriptions'', ''validateTime'', ''validationState''])'
