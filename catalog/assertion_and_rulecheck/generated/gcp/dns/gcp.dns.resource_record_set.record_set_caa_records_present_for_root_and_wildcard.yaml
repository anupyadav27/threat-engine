version: '1.0'
rule_id: gcp.dns.resource_record_set.record_set_caa_records_present_for_root_and_wildcard
for_each: gcp.dns.resourceRecordSets.list
severity: HIGH
conditions:
  all:
  - var: item.type
    op: equals
    value: CAA
  - var: item.name
    op: in
    value:
    - example-name.
    - '*.example-name.'
