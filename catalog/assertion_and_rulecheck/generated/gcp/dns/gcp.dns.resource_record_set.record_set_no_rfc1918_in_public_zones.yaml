version: '1.0'
rule_id: gcp.dns.resource_record_set.record_set_no_rfc1918_in_public_zones
for_each: gcp.dns.resourceRecordSets.list
severity: HIGH
conditions:
  all:
  - var: item.type
    op: in
    value:
    - A
    - AAAA
    - CNAME
  - var: item.rrdatas
    op: not_contains
    value: '10.'
  - var: item.rrdatas
    op: not_contains
    value: 172.16.
  - var: item.rrdatas
    op: not_contains
    value: 192.168.
