version: '1.0'
rule_id: gcp.dns.resource_record_set.record_set_no_overly_broad_wildcard_records_in_sensitive_zones
for_each: gcp.dns.resourceRecordSets.list
severity: HIGH
conditions:
  all:
  - var: item.type
    op: not_equals
    value: CNAME
  - var: item.rrdatas
    op: not_contains
    value: '*'
