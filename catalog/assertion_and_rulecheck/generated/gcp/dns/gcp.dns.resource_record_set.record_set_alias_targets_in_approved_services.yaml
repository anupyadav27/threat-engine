version: '1.0'
rule_id: gcp.dns.resource_record_set.record_set_alias_targets_in_approved_services
for_each: gcp.dns.resourceRecordSets.list
severity: HIGH
conditions:
  all:
  - var: item.type
    op: equals
    value: CNAME
  - var: item.rrdatas[]
    op: in
    value:
    - approved-service-1.example.com.
    - approved-service-2.example.com.
