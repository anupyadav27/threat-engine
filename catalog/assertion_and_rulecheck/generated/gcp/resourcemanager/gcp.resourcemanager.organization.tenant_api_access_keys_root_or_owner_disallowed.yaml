version: '1.0'
rule_id: gcp.resourcemanager.organization.tenant_api_access_keys_root_or_owner_disallowed
for_each: gcp.resourcemanager.list_organizations
severity: HIGH
conditions:
  all:
  - var: item.IAMPolicy.Bindings[].Members[]
    op: not_contains
    value: user:owner@example.com
  - var: item.IAMPolicy.Bindings[].Members[]
    op: not_contains
    value: user:root@example.com
