version: '1.0'
rule_id: gcp.resourcemanager.policy.policy_no_wildcard_admin_actions
for_each: gcp.resourcemanager.policy.get_iam_policy
severity: CRITICAL
conditions:
  all:
  - var: item.bindings[].role
    op: not_contains
    value: roles/owner
  - var: item.bindings[].role
    op: not_contains
    value: roles/editor
  - var: item.bindings[].role
    op: not_contains
    value: roles/viewer
