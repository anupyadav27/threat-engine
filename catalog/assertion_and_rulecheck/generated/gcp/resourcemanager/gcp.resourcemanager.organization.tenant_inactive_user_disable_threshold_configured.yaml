version: '1.0'
rule_id: gcp.resourcemanager.organization.tenant_inactive_user_disable_threshold_configured
for_each: gcp.resourcemanager.organization.list
severity: HIGH
conditions:
  all:
  - var: item.tenant_inactive_user_disable_threshold
    op: exists
  - var: item.tenant_inactive_user_disable_threshold
    op: gt
    value: '0'
