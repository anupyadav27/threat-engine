version: '1.0'
rule_id: gcp.resourcemanager.policy.scp_mandatory_require_mfa_for_console_where_supported
for_each: gcp.resourcemanager.list_organization_policies
severity: HIGH
conditions:
  all:
  - var: item.boolean_policy.enforced
    op: is_true
  - var: item.constraint
    op: equals
    value: constraints/iam.requireMFAForConsole
