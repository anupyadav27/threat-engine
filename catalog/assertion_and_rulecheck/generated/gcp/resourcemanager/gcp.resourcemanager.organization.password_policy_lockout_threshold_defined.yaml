version: '1.0'
rule_id: gcp.resourcemanager.organization.password_policy_lockout_threshold_defined
for_each: gcp.resourcemanager.organization_password_policy.list
severity: HIGH
conditions:
  all:
  - var: item.passwordPolicy.lockoutThreshold
    op: exists
  - var: item.passwordPolicy.lockoutThreshold
    op: gt
    value: '0'
