version: '1.0'
rule_id: gcp.certificatemanager.certificate.certificates_expiration_check_gcp_storage_bucket_enf_enabled
for_each: gcp.certificatemanager.projects.locations.certificates.list
severity: MEDIUM
conditions:
  all:
  - var: item.expireTime
    op: exists
  - var: item.expireTime
    op: gt
    value: '2025-01-01T00:00:00Z'
