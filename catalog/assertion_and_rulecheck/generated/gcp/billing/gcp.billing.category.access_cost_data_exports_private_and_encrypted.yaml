version: '1.0'
rule_id: gcp.billing.category.access_cost_data_exports_private_and_encrypted
for_each: gcp.billing.list_cost_data_exports
severity: LOW
conditions:
  all:
  - var: item.encryptionSpec.kmsKeyName
    op: exists
  - var: item.destination.datasetId
    op: not_contains
    value: public
