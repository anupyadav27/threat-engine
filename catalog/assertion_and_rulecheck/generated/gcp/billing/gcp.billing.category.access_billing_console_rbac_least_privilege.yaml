version: '1.0'
rule_id: gcp.billing.category.access_billing_console_rbac_least_privilege
for_each: gcp.iam.list_roles
severity: HIGH
conditions:
  all:
  - var: item.name
    op: not_equals
    value: roles/billing.admin
  - var: item.includedPermissions[]
    op: not_contains
    value: billing.accounts.get
  - var: item.includedPermissions[]
    op: not_contains
    value: billing.accounts.list
