version: '1.0'
rule_id: gcp.billing.category.access_billing_admins_mfa_required
for_each: gcp.billing.list_iam_policies
severity: HIGH
conditions:
  all:
  - var: item.bindings[].role
    op: contains
    value: roles/billing.admin
  - var: item.bindings[].condition
    op: exists
  - var: item.bindings[].condition.expression
    op: contains
    value: is_mfa_verified
