version: '1.0'
rule_id: gcp.billing.category.access_cost_export_destinations_least_privilege
for_each: gcp.billing.list_cost_export_destinations
severity: HIGH
conditions:
  all:
  - var: item.permissions[]
    op: not_contains
    value: billing.admin
  - var: item.permissions[]
    op: not_contains
    value: billing.owner
