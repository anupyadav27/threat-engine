version: '1.0'
rule_id: gcp.artifactregistry.repo.registry_immutable_tags_or_signing_enforced
for_each: gcp.artifactregistry.projects.locations.repositories.list
severity: HIGH
conditions:
  any:
  - var: item.cleanupPolicies[].action.type
    op: equals
    value: DELETE
  - var: item.cleanupPolicies[].action.type
    op: equals
    value: KEEP
  - var: item.cleanupPolicies[].action.type
    op: equals
    value: KEEP_ONLY_URIS
  - var: item.cleanupPolicies[].action.type
    op: equals
    value: DELETE_ONLY_URIS
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''cleanupPolicies'', ''cleanupPolicyDryRun'',
  ''createTime'', ''description'', ''disallowUnspecifiedMode'', ''dockerConfig'', ''format'', ''kmsKeyName''])'
