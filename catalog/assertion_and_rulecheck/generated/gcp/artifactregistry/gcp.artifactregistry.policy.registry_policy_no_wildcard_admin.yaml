version: '1.0'
rule_id: gcp.artifactregistry.policy.registry_policy_no_wildcard_admin
for_each: gcp.artifactregistry.projects.locations.repositories.list
severity: CRITICAL
conditions:
  all:
  - var: item.iamPolicy.bindings[].role
    op: not_contains
    value: roles/artifactregistry.admin
  - var: item.iamPolicy.bindings[].members[]
    op: not_contains
    value: '*'
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''dockerConfig'', ''labels'', ''mavenConfig'',
  ''remoteRepositoryConfig'', ''virtualRepositoryConfig'', ''vulnerabilityScanningConfig''])'
