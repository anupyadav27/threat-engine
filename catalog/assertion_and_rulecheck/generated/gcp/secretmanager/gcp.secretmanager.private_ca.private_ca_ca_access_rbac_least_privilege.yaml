version: '1.0'
rule_id: gcp.secretmanager.private_ca.private_ca_ca_access_rbac_least_privilege
for_each: gcp.secretmanager.projects.secrets.list
severity: HIGH
conditions:
  all:
  - var: item.name
    op: contains
    value: privateCa
  - var: item.labels
    op: exists
  - var: item.labels.role
    op: not_equals
    value: owner
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''annotations'', ''createTime'',
  ''customerManagedEncryption'', ''expireTime'', ''labels'', ''name'', ''replication'', ''rotation''])'
