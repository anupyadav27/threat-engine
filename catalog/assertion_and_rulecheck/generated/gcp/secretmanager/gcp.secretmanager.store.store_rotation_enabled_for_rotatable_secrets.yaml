version: '1.0'
rule_id: gcp.secretmanager.store.store_rotation_enabled_for_rotatable_secrets
for_each: gcp.secretmanager.projects.secrets.list
severity: HIGH
conditions:
  all:
  - var: item.rotation
    op: exists
  - var: item.rotation.nextRotationTime
    op: exists
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''annotations'', ''createTime'',
  ''customerManagedEncryption'', ''expireTime'', ''labels'', ''name'', ''replication'', ''rotation''])'
