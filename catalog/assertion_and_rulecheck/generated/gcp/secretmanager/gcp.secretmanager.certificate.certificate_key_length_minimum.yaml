version: '1.0'
rule_id: gcp.secretmanager.certificate.certificate_key_length_minimum
for_each: gcp.secretmanager.projects.secrets.versions.list
severity: CRITICAL
conditions:
  all:
  - var: item.name
    op: contains
    value: certificate
  - var: item.key_length
    op: gte
    value: '2048'
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''annotations'', ''createTime'',
  ''customerManagedEncryption'', ''expireTime'', ''labels'', ''name'', ''replication'', ''rotation''])'
