version: '1.0'
rule_id: gcp.secretmanager.certificate.certificate_trusted_issuer
for_each: gcp.secretmanager.projects.secrets.list
severity: CRITICAL
conditions:
  all:
  - var: item.replication.userManaged.replicas[].customerManagedEncryption.kmsKeyName
    op: exists
  - var: item.labels.certificate_trusted_issuer
    op: equals
    value: 'true'
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''annotations'', ''createTime'',
  ''customerManagedEncryption'', ''expireTime'', ''labels'', ''name'', ''replication'', ''rotation''])'
