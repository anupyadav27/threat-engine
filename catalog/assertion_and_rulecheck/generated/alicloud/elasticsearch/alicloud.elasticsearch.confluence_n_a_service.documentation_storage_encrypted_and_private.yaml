version: '1.0'
rule_id: alicloud.elasticsearch.confluence_n_a_service.documentation_storage_encrypted_and_private
for_each: alicloud.elasticsearch.confluence_n_a_service
severity: HIGH
conditions:
  all:
  - var: item.encrypted
    op: is_true
  - var: item.public_ip_address
    op: not_exists
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''id'', ''name'', ''resource_type'',
  ''region'', ''encrypted'', ''kms_key_id'', ''public_ip_address'', ''vpc_id''])'
