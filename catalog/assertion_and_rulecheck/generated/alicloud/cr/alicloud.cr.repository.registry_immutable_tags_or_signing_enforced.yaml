version: '1.0'
rule_id: alicloud.cr.repository.registry_immutable_tags_or_signing_enforced
for_each: alicloud.cr.instance
severity: MEDIUM
conditions:
  all:
  - var: item.immutable_tags_enabled
    op: is_true
  - var: item.signing_enabled
    op: is_true
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''id'', ''name'', ''resource_type'',
  ''region'', ''encrypted'', ''kms_key_id'', ''public_ip_address'', ''vpc_id''])'
