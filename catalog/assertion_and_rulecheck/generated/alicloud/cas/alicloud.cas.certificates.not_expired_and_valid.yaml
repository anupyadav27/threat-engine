version: '1.0'
rule_id: alicloud.cas.certificates.not_expired_and_valid
for_each: alicloud.cas.certificates
severity: MEDIUM
conditions:
  all:
  - var: item.status
    op: equals
    value: ISSUED
  - var: item.expired
    op: is_false
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''id'', ''name'', ''resource_type'',
  ''region'', ''encrypted'', ''kms_key_id'', ''public_ip_address'', ''vpc_id''])'
