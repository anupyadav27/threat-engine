version: '1.0'
rule_id: alicloud.bss.plans.retention_90_days_minimum
for_each: alicloud.bss.documents
severity: MEDIUM
conditions:
  all:
  - var: item.backup_enabled
    op: is_true
  - var: item.retention_days
    op: gte
    value: '90'
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''id'', ''name'', ''resource_type'',
  ''region'', ''encrypted'', ''kms_key_id'', ''public_ip_address'', ''vpc_id''])'
