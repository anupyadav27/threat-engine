version: '1.0'
rule_id: alicloud.bss.vaults_configured_and_access_controlled.configured
for_each: alicloud.bss.categories
severity: MEDIUM
conditions:
  all:
  - var: item.encrypted
    op: is_true
  - var: item.backup_enabled
    op: is_true
  - var: item.permissions
    op: not_contains
    value: public
