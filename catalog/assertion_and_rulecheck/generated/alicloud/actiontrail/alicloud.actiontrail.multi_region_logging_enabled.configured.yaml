version: '1.0'
rule_id: alicloud.actiontrail.multi_region_logging_enabled.configured
for_each: alicloud.actiontrail.cloudmonitor
severity: MEDIUM
conditions:
  all:
  - var: item.logging_enabled
    op: is_true
  - var: item.region
    op: in
    value:
    - cn-hangzhou
    - cn-shanghai
    - cn-beijing
    - cn-shenzhen
    - ap-southeast-1
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''id'', ''name'', ''resource_type'',
  ''region'', ''encrypted'', ''kms_key_id'', ''public_ip_address'', ''vpc_id''])'
