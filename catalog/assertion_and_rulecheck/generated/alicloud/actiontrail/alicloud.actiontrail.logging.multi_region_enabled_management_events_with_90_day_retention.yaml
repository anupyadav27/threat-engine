version: '1.0'
rule_id: alicloud.actiontrail.logging.multi_region_enabled_management_events_with_90_day_retention
for_each: alicloud.actiontrail.cloudmonitor
severity: MEDIUM
conditions:
  all:
  - var: item.logging_enabled
    op: is_true
  - var: item.region
    op: in
    value:
    - cn-hangzhou
    - cn-shanghai
    - cn-beijing
    - cn-shenzhen
    - ap-southeast-1
  - var: item.retention_days
    op: gte
    value: 90
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''id'', ''name'', ''resource_type'',
  ''region'', ''encrypted'', ''kms_key_id'', ''public_ip_address'', ''vpc_id''])'
