version: '1.0'
rule_id: alicloud.ack.workload.env_no_plaintext_secrets
for_each: alicloud.ack.DescribeClusterResources
severity: MEDIUM
conditions:
  all:
  - var: item.env[].value
    op: not_contains
    value: password
  - var: item.env[].value
    op: not_contains
    value: secret
  - var: item.env[].value
    op: not_contains
    value: key
  - var: item.env[].value
    op: not_contains
    value: token
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''encrypted'', ''status'', ''tags'',
  ''backup_enabled'', ''logging_enabled'', ''mfa_enabled'', ''ssl_enabled'', ''versioning_enabled''])'
