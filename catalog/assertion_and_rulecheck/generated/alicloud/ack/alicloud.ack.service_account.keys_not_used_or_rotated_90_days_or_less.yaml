version: '1.0'
rule_id: alicloud.ack.service_account.keys_not_used_or_rotated_90_days_or_less
for_each: alicloud.ack.DescribeClusterResources
severity: MEDIUM
conditions:
  all:
  - var: item.key_age_days
    op: lte
    value: '90'
  - var: item.key_status
    op: equals
    value: Active
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''id'', ''name'', ''resource_type'',
  ''region'', ''encrypted'', ''kms_key_id'', ''public_ip_address'', ''vpc_id''])'
