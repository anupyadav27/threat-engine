version: '1.0'
rule_id: alicloud.ack.rbac.no_wildcard_rules_in_clusterroles
for_each: alicloud.ack.DescribeClusterResources
severity: MEDIUM
conditions:
  all:
  - var: item.permissions
    op: exists
  - var: item.permissions[].verbs
    op: not_contains
    value: '*'
  - var: item.permissions[].resources
    op: not_contains
    value: '*'
