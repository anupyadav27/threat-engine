version: '1.0'
rule_id: alicloud.ack.psp.net_raw_capability_disabled
for_each: alicloud.ack.DescribeClusterAddonsUpgradeStatus
severity: MEDIUM
conditions:
  var: item.addons[].config
  op: not_contains
  value: NET_RAW
fixture_validated: false
