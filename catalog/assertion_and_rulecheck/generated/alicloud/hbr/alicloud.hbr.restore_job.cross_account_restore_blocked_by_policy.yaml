version: '1.0'
rule_id: alicloud.hbr.restore_job.cross_account_restore_blocked_by_policy
for_each: alicloud.hbr.backup_recovery_job
severity: MEDIUM
conditions:
  var: item.permissions
  op: not_contains
  value: cross_account_restore
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''encrypted'', ''status'', ''tags'',
  ''backup_enabled'', ''logging_enabled'', ''mfa_enabled'', ''ssl_enabled'', ''versioning_enabled''])'
