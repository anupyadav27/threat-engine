version: '1.0'
rule_id: alicloud.general.endpoint_config.prod_variant_instances_with_logging_enabled
for_each: alicloud.general.DescribeAvailableResource
severity: MEDIUM
conditions:
  all:
  - var: item.tags.Environment
    op: equals
    value: production
  - var: item.logging_enabled
    op: is_true
