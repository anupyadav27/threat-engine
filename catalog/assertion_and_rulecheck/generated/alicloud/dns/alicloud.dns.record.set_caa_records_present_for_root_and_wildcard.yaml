version: '1.0'
rule_id: alicloud.dns.record.set_caa_records_present_for_root_and_wildcard
for_each: alicloud.dns.DescribeDomainRecords
severity: HIGH
conditions:
  all:
  - var: item.name
    op: in
    value:
    - '@'
    - '*'
  - var: item.type
    op: equals
    value: CAA
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''id'', ''name'', ''resource_type'',
  ''region'', ''encrypted'', ''kms_key_id'', ''public_ip_address'', ''vpc_id''])'
