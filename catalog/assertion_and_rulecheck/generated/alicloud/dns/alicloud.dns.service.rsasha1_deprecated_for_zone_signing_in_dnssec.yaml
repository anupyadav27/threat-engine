version: '1.0'
rule_id: alicloud.dns.service.rsasha1_deprecated_for_zone_signing_in_dnssec
for_each: alicloud.dns.dnssec
severity: MEDIUM
conditions:
  any:
  - var: item.status
    op: not_equals
    value: 'ON'
  - all:
    - var: item.signing_algorithm
      op: exists
    - var: item.signing_algorithm
      op: not_equals
      value: RSASHA1
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''encrypted'', ''status'', ''tags'',
  ''backup_enabled'', ''logging_enabled'', ''mfa_enabled'', ''ssl_enabled'', ''versioning_enabled''])'
