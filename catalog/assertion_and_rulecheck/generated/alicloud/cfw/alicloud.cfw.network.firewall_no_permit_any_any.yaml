version: '1.0'
rule_id: alicloud.cfw.network.firewall_no_permit_any_any
for_each: alicloud.cfw.DescribeVpcFirewallControlPolicy
severity: MEDIUM
conditions:
  all:
  - var: item.security_group_rules[].source
    op: not_contains
    value: 0.0.0.0/0
  - var: item.security_group_rules[].destination
    op: not_contains
    value: 0.0.0.0/0
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''encrypted'', ''status'', ''tags'',
  ''backup_enabled'', ''logging_enabled'', ''mfa_enabled'', ''ssl_enabled'', ''versioning_enabled''])'
