version: '1.0'
rule_id: alicloud.cfw.ipset.ip_set_cidrs_valid_and_minimized
for_each: alicloud.cfw.ipset
severity: MEDIUM
conditions:
  all:
  - var: item.cidrs
    op: not_empty
  - var: item.cidrs[]
    op: not_contains
    value: 0.0.0.0/0
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''id'', ''name'', ''resource_type'',
  ''region'', ''encrypted'', ''kms_key_id'', ''public_ip_address'', ''vpc_id''])'
