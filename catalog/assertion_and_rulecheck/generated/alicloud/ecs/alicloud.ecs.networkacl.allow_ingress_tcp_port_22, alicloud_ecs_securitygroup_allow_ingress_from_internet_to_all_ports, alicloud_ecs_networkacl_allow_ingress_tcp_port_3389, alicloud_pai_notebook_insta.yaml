version: '1.0'
rule_id: alicloud.ecs.networkacl.allow_ingress_tcp_port_22, alicloud_ecs_securitygroup_allow_ingress_from_internet_to_all_ports,
  alicloud_ecs_networkacl_allow_ingress_tcp_port_3389, alicloud_pai_notebook_instance_without_direct_internet_access_configured
for_each: alicloud.ecs.compute_service
severity: MEDIUM
conditions:
  all:
  - var: item.security_group_rules
    op: not_contains
    value: allow_ingress_tcp_port_22
  - var: item.security_group_rules
    op: not_contains
    value: allow_ingress_from_internet_to_all_ports
  - var: item.security_group_rules
    op: not_contains
    value: allow_ingress_tcp_port_3389
  - var: item.internet_facing
    op: is_false
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''id'', ''name'', ''resource_type'',
  ''region'', ''encrypted'', ''kms_key_id'', ''public_ip_address'', ''vpc_id''])'
