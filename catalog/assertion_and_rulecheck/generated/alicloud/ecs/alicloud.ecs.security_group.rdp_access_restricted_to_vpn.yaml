version: '1.0'
rule_id: alicloud.ecs.security_group.rdp_access_restricted_to_vpn
for_each: alicloud.ecs.describe_security_groups
severity: MEDIUM
conditions:
  all:
  - var: item.Permissions.Permission[].IpProtocol
    op: contains
    value: TCP
  - var: item.Permissions.Permission[].PortRange
    op: contains
    value: 3389/3389
  - var: item.Permissions.Permission[].SourceCidrIp
    op: not_contains
    value: 0.0.0.0/0
