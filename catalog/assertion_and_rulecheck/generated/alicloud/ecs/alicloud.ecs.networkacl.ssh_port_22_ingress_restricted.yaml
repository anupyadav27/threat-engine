version: '1.0'
rule_id: alicloud.ecs.networkacl.ssh_port_22_ingress_restricted
for_each: alicloud.ecs.describe_security_groups
severity: MEDIUM
conditions:
  var: item.Permissions.Permission[?(@.IpProtocol == 'TCP' && @.PortRange == '22/22' && @.Policy == 'Accept')].SourceCidrIp
  op: not_contains
  value: 0.0.0.0/0
