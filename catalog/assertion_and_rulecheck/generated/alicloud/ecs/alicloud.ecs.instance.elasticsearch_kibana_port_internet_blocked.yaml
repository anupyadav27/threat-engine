version: '1.0'
rule_id: alicloud.ecs.instance.elasticsearch_kibana_port_internet_blocked
for_each: alicloud.ecs.DescribeAutoProvisioningGroupInstances
severity: MEDIUM
conditions:
  all:
  - var: item.security_group_rules
    op: exists
  - var: item.security_group_rules[].PortRange
    op: not_contains
    value: '5601'
