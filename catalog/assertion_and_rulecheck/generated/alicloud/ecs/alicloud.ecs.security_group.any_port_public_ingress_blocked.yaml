version: '1.0'
rule_id: alicloud.ecs.security_group.any_port_public_ingress_blocked
for_each: alicloud.ecs.describe_security_groups
severity: HIGH
conditions:
  all:
  - var: item.Permissions.Permission[].SourceCidrIp
    op: not_contains
    value: 0.0.0.0/0
  - var: item.Permissions.Permission[].IpProtocol
    op: not_contains
    value: all
