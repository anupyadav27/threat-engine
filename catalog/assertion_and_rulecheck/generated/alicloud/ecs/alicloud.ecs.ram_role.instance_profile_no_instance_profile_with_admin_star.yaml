version: '1.0'
rule_id: alicloud.ecs.ram_role.instance_profile_no_instance_profile_with_admin_star
for_each: alicloud.ecs.DescribeAutoProvisioningGroupInstances
severity: HIGH
conditions:
  all:
  - var: item.permissions
    op: exists
  - var: item.permissions
    op: not_contains
    value: AdministratorAccess
