version: '1.0'
rule_id: alicloud.ecs.security_group.ssh_access_restricted_to_whitelist
for_each: alicloud.ecs.security_group
severity: MEDIUM
conditions:
  all:
  - var: item.Permissions.Permission[].IpProtocol
    op: not_contains
    value: TCP
  - var: item.Permissions.Permission[].PortRange
    op: not_contains
    value: 22/22
  - var: item.Permissions.Permission[].SourceCidrIp
    op: not_contains
    value: 0.0.0.0/0
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''encrypted'', ''status'', ''tags'',
  ''backup_enabled'', ''logging_enabled'', ''mfa_enabled'', ''ssl_enabled'', ''versioning_enabled''])'
