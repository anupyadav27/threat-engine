version: '1.0'
rule_id: alicloud.ecs.security_group.allow_ingress_from_internet_to_tcp_port_memcached_11211
for_each: alicloud.ecs.DescribeAutoProvisioningGroupInstances
severity: MEDIUM
conditions:
  all:
  - var: item.security_group_rules
    op: exists
  - var: item.security_group_rules[].SourceCidrIp
    op: not_contains
    value: 0.0.0.0/0
