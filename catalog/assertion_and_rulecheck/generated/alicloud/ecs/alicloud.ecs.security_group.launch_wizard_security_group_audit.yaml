version: '1.0'
rule_id: alicloud.ecs.security_group.launch_wizard_security_group_audit
for_each: alicloud.ecs.security_group
severity: MEDIUM
conditions:
  var: item.name
  op: not_contains
  value: launch-wizard
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''encrypted'', ''status'', ''tags'',
  ''backup_enabled'', ''logging_enabled'', ''mfa_enabled'', ''ssl_enabled'', ''versioning_enabled''])'
