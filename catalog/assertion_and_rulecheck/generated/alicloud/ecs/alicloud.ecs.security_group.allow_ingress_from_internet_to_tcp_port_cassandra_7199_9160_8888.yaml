version: '1.0'
rule_id: alicloud.ecs.security_group.allow_ingress_from_internet_to_tcp_port_cassandra_7199_9160_8888
for_each: alicloud.ecs.DescribeAutoProvisioningGroupInstances
severity: MEDIUM
conditions:
  any:
  - var: item.security_group_rules[].SourceCidrIp
    op: not_contains
    value: 0.0.0.0/0
  - all:
    - var: item.security_group_rules[].PortRange
      op: not_contains
      value: '7199'
    - var: item.security_group_rules[].PortRange
      op: not_contains
      value: '9160'
    - var: item.security_group_rules[].PortRange
      op: not_contains
      value: '8888'
