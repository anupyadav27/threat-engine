version: '1.0'
rule_id: alicloud.ecs.security_group.allow_ingress_from_internet_to_high_risk_tcp_ports
for_each: alicloud.ecs.DescribeAutoProvisioningGroupInstances
severity: MEDIUM
conditions:
  all:
  - var: item.security_group_rules[].SourceCidrIp
    op: not_contains
    value: 0.0.0.0/0
  - var: item.security_group_rules[].PortRange
    op: not_in
    value:
    - 20/21
    - 22/22
    - 23/23
    - 25/25
    - 53/53
    - 80/80
    - 110/110
    - 135/135
    - 139/139
    - 143/143
    - 443/443
    - 445/445
    - 1433/1433
    - 1521/1521
    - 3306/3306
    - 3389/3389
    - 5432/5432
    - 5500/5500
    - 8080/8080
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''encrypted'', ''status'', ''tags'',
  ''backup_enabled'', ''logging_enabled'', ''mfa_enabled'', ''ssl_enabled'', ''versioning_enabled''])'
