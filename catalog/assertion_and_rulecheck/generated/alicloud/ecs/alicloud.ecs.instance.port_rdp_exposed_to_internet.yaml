version: '1.0'
rule_id: alicloud.ecs.instance.port_rdp_exposed_to_internet
for_each: alicloud.ecs.DescribeAutoProvisioningGroupInstances
severity: HIGH
conditions:
  all:
  - var: item.security_group_rules[].SourceCidrIp
    op: not_contains
    value: 0.0.0.0/0
  - var: item.security_group_rules[].IpProtocol
    op: equals
    value: TCP
  - var: item.security_group_rules[].PortRange
    op: contains
    value: '3389'
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''id'', ''name'', ''resource_type'',
  ''region'', ''encrypted'', ''kms_key_id'', ''public_ip_address'', ''vpc_id''])'
