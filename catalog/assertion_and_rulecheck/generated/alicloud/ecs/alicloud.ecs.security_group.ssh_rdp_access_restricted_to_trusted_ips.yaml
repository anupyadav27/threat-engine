version: '1.0'
rule_id: alicloud.ecs.security_group.ssh_rdp_access_restricted_to_trusted_ips
for_each: alicloud.ecs.describe_security_groups
severity: MEDIUM
conditions:
  all:
  - var: item.Permissions.Permission[].IpProtocol
    op: in
    value:
    - TCP
    - tcp
  - var: item.Permissions.Permission[].PortRange
    op: in
    value:
    - 22/22
    - 3389/3389
  - var: item.Permissions.Permission[].SourceCidrIp
    op: not_contains
    value: 0.0.0.0/0
