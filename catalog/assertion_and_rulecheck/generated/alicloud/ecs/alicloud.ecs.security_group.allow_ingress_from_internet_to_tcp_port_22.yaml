version: '1.0'
rule_id: alicloud.ecs.security_group.allow_ingress_from_internet_to_tcp_port_22
for_each: alicloud.ecs.compute_service
severity: MEDIUM
conditions:
  any:
  - var: item.security_group_rules[].source_cidr_ip
    op: not_contains
    value: 0.0.0.0/0
  - var: item.security_group_rules[].port_range
    op: not_contains
    value: 22/22
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''encrypted'', ''status'', ''tags'',
  ''backup_enabled'', ''logging_enabled'', ''mfa_enabled'', ''ssl_enabled'', ''versioning_enabled''])'
