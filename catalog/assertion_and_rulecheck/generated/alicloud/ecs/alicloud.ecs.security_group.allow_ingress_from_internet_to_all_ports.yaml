version: '1.0'
rule_id: alicloud.ecs.security_group.allow_ingress_from_internet_to_all_ports
for_each: alicloud.ecs.DescribeAutoProvisioningGroupInstances
severity: MEDIUM
conditions:
  all:
  - var: item.security_group_rules
    op: not_empty
  - var: item.security_group_rules[].permissions
    op: not_contains
    value: 0.0.0.0/0
