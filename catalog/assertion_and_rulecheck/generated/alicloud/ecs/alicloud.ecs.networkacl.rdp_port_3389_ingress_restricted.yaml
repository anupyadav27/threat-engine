version: '1.0'
rule_id: alicloud.ecs.networkacl.rdp_port_3389_ingress_restricted
for_each: alicloud.ecs.describe_network_acls
severity: MEDIUM
conditions:
  all:
  - var: item.NetworkAclEntry[].PortRange
    op: not_contains
    value: 3389/3389
  - var: item.NetworkAclEntry[].Policy
    op: not_equals
    value: accept
  - var: item.NetworkAclEntry[].SourceCidrIp
    op: not_contains
    value: 0.0.0.0/0
