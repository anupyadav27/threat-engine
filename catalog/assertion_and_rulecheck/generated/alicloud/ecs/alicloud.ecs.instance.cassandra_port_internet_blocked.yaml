version: '1.0'
rule_id: alicloud.ecs.instance.cassandra_port_internet_blocked
for_each: alicloud.ecs.DescribeAutoProvisioningGroupInstances
severity: MEDIUM
conditions:
  any:
  - var: item.security_group_rules[].SourceCidrIp
    op: not_contains
    value: 0.0.0.0/0
  - var: item.security_group_rules[].PortRange
    op: not_contains
    value: 9042/9042
  - var: item.security_group_rules[].PortRange
    op: not_contains
    value: 9160/9160
  - var: item.security_group_rules[].PortRange
    op: not_contains
    value: 7000/7000
  - var: item.security_group_rules[].PortRange
    op: not_contains
    value: 7001/7001
  - var: item.security_group_rules[].PortRange
    op: not_contains
    value: 7199/7199
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''encrypted'', ''status'', ''tags'',
  ''backup_enabled'', ''logging_enabled'', ''mfa_enabled'', ''ssl_enabled'', ''versioning_enabled''])'
