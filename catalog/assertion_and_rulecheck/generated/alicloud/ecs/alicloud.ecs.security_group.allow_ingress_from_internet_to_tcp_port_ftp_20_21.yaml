version: '1.0'
rule_id: alicloud.ecs.security_group.allow_ingress_from_internet_to_tcp_port_ftp_20_21
for_each: alicloud.ecs.describe_security_groups
severity: MEDIUM
conditions:
  all:
  - var: item.Permissions.Permission[].IpProtocol
    op: not_contains
    value: TCP
  - var: item.Permissions.Permission[].PortRange
    op: not_contains
    value: 20/21
  - var: item.Permissions.Permission[].SourceCidrIp
    op: not_contains
    value: 0.0.0.0/0
