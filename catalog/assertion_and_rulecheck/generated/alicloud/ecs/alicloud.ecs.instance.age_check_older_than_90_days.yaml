version: '1.0'
rule_id: alicloud.ecs.instance.age_check_older_than_90_days
for_each: alicloud.ecs.DescribeAutoProvisioningGroupInstances
severity: MEDIUM
conditions:
  all:
  - var: item.status
    op: equals
    value: ACTIVE
  - var: item.key_age_days
    op: lt
    value: '90'
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''id'', ''name'', ''resource_type'',
  ''region'', ''encrypted'', ''kms_key_id'', ''public_ip_address'', ''vpc_id''])'
