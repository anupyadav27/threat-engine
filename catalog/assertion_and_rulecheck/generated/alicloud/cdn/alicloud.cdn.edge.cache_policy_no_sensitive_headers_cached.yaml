version: '1.0'
rule_id: alicloud.cdn.edge.cache_policy_no_sensitive_headers_cached
for_each: alicloud.cdn.cache_policy
severity: MEDIUM
conditions:
  all:
  - var: item.cache_policy_config.cache_behavior[].header_behavior
    op: not_contains
    value: whitelist
  - var: item.cache_policy_config.cache_behavior[].header_config[].header[]
    op: not_contains
    value: Authorization
  - var: item.cache_policy_config.cache_behavior[].header_config[].header[]
    op: not_contains
    value: Cookie
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''encrypted'', ''status'', ''tags'',
  ''backup_enabled'', ''logging_enabled'', ''mfa_enabled'', ''ssl_enabled'', ''versioning_enabled''])'
