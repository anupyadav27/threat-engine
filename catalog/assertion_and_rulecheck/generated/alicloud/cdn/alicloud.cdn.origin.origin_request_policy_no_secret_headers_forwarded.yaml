version: '1.0'
rule_id: alicloud.cdn.origin.origin_request_policy_no_secret_headers_forwarded
for_each: alicloud.cdn.distribution
severity: MEDIUM
conditions:
  all:
  - var: item.OriginRequestPolicyId
    op: exists
  - var: item.OriginRequestPolicy.HeadersConfig.HeaderBehavior
    op: not_equals
    value: whitelist
  - var: item.OriginRequestPolicy.HeadersConfig.Headers.WhitelistedItems[].Header
    op: not_contains
    value: Authorization
  - var: item.OriginRequestPolicy.HeadersConfig.Headers.WhitelistedItems[].Header
    op: not_contains
    value: Proxy-Authorization
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''id'', ''name'', ''resource_type'',
  ''region'', ''encrypted'', ''kms_key_id'', ''public_ip_address'', ''vpc_id''])'
