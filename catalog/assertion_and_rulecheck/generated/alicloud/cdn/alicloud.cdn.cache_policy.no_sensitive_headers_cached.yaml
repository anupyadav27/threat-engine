version: '1.0'
rule_id: alicloud.cdn.cache_policy.no_sensitive_headers_cached
for_each: alicloud.cdn.cache_policy
severity: MEDIUM
conditions:
  var: item.cache_policy_config[].header_operation[].header_name
  op: not_contains
  value: Authorization
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''encrypted'', ''status'', ''tags'',
  ''backup_enabled'', ''logging_enabled'', ''mfa_enabled'', ''ssl_enabled'', ''versioning_enabled''])'
