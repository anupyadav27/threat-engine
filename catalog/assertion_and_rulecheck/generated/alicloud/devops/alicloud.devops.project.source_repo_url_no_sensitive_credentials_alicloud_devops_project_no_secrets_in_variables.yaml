version: '1.0'
rule_id: alicloud.devops.project.source_repo_url_no_sensitive_credentials_alicloud_devops_project_no_secrets_in_variables
for_each: alicloud.devops.ListOrganizations
severity: MEDIUM
conditions:
  var: item.source_repo_url
  op: not_contains
  value:
  - ://.*:.*@
  - password=
  - secret=
  - token=
  - key=
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''encrypted'', ''status'', ''tags'',
  ''backup_enabled'', ''logging_enabled'', ''mfa_enabled'', ''ssl_enabled'', ''versioning_enabled''])'
