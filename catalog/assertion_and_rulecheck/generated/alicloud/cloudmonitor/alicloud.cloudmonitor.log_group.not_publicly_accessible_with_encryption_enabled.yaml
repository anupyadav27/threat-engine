version: '1.0'
rule_id: alicloud.cloudmonitor.log_group.not_publicly_accessible_with_encryption_enabled
for_each: alicloud.cloudmonitor.diagnostic_settings
severity: HIGH
conditions:
  all:
  - var: item.encrypted
    op: is_true
  - var: item.public_ip_address
    op: not_exists
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''id'', ''name'', ''resource_type'',
  ''region'', ''encrypted'', ''kms_key_id'', ''public_ip_address'', ''vpc_id''])'
