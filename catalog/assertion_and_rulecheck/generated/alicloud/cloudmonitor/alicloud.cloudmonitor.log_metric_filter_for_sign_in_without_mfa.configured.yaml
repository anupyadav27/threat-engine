version: '1.0'
rule_id: alicloud.cloudmonitor.log_metric_filter_for_sign_in_without_mfa.configured
for_each: alicloud.cloudmonitor.alerts
severity: MEDIUM
conditions:
  all:
  - var: item.name
    op: contains
    value: sign-in-without-mfa
  - var: item.status
    op: equals
    value: ACTIVE
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''id'', ''name'', ''resource_type'',
  ''region'', ''encrypted'', ''kms_key_id'', ''public_ip_address'', ''vpc_id''])'
