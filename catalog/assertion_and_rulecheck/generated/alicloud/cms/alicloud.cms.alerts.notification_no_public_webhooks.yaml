version: '1.0'
rule_id: alicloud.cms.alerts.notification_no_public_webhooks
for_each: alicloud.cms.alerts
severity: HIGH
conditions:
  var: item.notification_webhooks[].url
  op: not_contains
  value: https://hooks.slack.com/services/
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''encrypted'', ''status'', ''tags'',
  ''backup_enabled'', ''logging_enabled'', ''mfa_enabled'', ''ssl_enabled'', ''versioning_enabled''])'
