version: '1.0'
rule_id: alicloud.cms.dr.monitoring_alerts_for_backup_failures_configured
for_each: alicloud.cms.alerts
severity: MEDIUM
conditions:
  all:
  - var: item.name
    op: contains
    value: backup
  - var: item.status
    op: equals
    value: ACTIVE
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''id'', ''name'', ''resource_type'',
  ''region'', ''encrypted'', ''kms_key_id'', ''public_ip_address'', ''vpc_id''])'
