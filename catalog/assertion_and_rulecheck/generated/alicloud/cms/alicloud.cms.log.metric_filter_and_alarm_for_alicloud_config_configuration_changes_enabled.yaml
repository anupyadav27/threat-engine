version: '1.0'
rule_id: alicloud.cms.log.metric_filter_and_alarm_for_alicloud_config_configuration_changes_enabled
for_each: alicloud.cms.alarm
severity: MEDIUM
conditions:
  all:
  - var: item.name
    op: contains
    value: ConfigConfigurationChanges
  - var: item.status
    op: equals
    value: ACTIVE
fixture_validated: false
fixture_note: 'PASS fixture returned FAIL — wrong field or operator (pass_fixture keys: [''id'', ''name'', ''resource_type'',
  ''region'', ''encrypted'', ''kms_key_id'', ''public_ip_address'', ''vpc_id''])'
