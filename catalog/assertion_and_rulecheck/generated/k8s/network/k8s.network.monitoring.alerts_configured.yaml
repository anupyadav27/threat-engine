version: '1.0'
rule_id: k8s.network.monitoring.alerts_configured
for_each: k8s.network.list_service_for_all_namespaces
severity: MEDIUM
conditions:
  any:
  - var: item.metadata.annotations.cspm.k8s.io/anomaly-detection-enabled
    op: is_true
  - var: item.metadata.annotations.cspm.k8s.io/change-audit-enabled
    op: is_true
  - var: item.metadata.annotations.cspm.k8s.io/change-monitoring-enabled
    op: is_true
  - var: item.metadata.annotations.cspm.k8s.io/changes-alerting-configured
    op: exists
  - var: item.metadata.annotations.cspm.k8s.io/changes-audit-enabled
    op: is_true
  - var: item.metadata.annotations.cspm.k8s.io/changes-logged
    op: exists
  - var: item.metadata.annotations.cspm.k8s.io/changes-monitored
    op: exists
