version: '1.0'
rule_id: k8s.admission.webhook.authentication_enabled
for_each: k8s.admission.list_validating_webhook_configuration
severity: HIGH
conditions:
  all:
  - var: item.metadata.annotations.cspm.k8s.io/controller-authentication-enabled
    op: exists
  - var: item.metadata.annotations.cspm.k8s.io/controller-authentication-enabled
    op: is_true
