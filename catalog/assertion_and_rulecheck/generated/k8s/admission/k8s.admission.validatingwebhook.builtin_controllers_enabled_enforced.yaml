version: '1.0'
rule_id: k8s.admission.validatingwebhook.builtin_controllers_enabled_enforced
for_each: k8s.admission.list_validating_webhook_configuration
severity: LOW
conditions:
  all:
  - var: item.metadata.annotations.cspm.k8s.io/controller-change-control-enabled
    op: is_true
  - var: item.metadata.annotations.cspm.k8s.io/controller-change-management-enabled
    op: is_true
  - var: item.metadata.annotations.cspm.k8s.io/controller-configuration-change-prevention
    op: equals
    value: enforced
