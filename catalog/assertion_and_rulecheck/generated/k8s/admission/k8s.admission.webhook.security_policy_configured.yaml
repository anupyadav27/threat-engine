version: '1.0'
rule_id: k8s.admission.webhook.security_policy_configured
for_each: k8s.admission.list_validating_webhook_configuration
severity: MEDIUM
conditions:
  all:
  - var: item.metadata.annotations.cspm.k8s.io/controller-anomaly-detection-enabled
    op: is_true
  - var: item.metadata.annotations.cspm.k8s.io/controller-antivirus-enabled
    op: is_true
  - var: item.metadata.annotations.cspm.k8s.io/controller-change-control-enabled
    op: is_true
  - var: item.metadata.annotations.cspm.k8s.io/controller-change-management-enabled
    op: is_true
  - var: item.metadata.annotations.cspm.k8s.io/controller-configuration-change-prevention
    op: equals
    value: enforced
