version: '1.0'
rule_id: k8s.admission.controller.image_scan_on_admission
for_each: k8s.admission.list_validating_webhook_configuration
severity: MEDIUM
conditions:
  any:
  - var: item.metadata.annotations.cspm.k8s.io/controller-antivirus-enabled
    op: is_true
  - var: item.metadata.annotations.cspm.k8s.io/controller-anomaly-detection-enabled
    op: is_true
