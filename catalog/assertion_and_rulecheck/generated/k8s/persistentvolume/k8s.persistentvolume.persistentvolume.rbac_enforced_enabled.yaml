version: '1.0'
rule_id: k8s.persistentvolume.persistentvolume.rbac_enforced_enabled
for_each: k8s.rbac.list_role_bindings
severity: HIGH
conditions:
  any:
  - var: item.subjects[].kind
    op: equals
    value: ServiceAccount
  - var: item.subjects[].kind
    op: equals
    value: User
  - var: item.subjects[].kind
    op: equals
    value: Group
