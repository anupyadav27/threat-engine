version: '1.0'
rule_id: k8s.workload.daemonset.daemonset_host_access_controlled_enforced
for_each: k8s.workload.list_daemonset_for_all_namespaces
severity: HIGH
conditions:
  all:
  - var: item.spec.template.spec.hostNetwork
    op: is_false
  - var: item.spec.template.spec.hostPID
    op: is_false
  - var: item.spec.template.spec.hostIPC
    op: is_false
