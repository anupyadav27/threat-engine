version: '1.0'
rule_id: k8s.clusterrolebinding.binding.default_namespace_sa_not_admin_bound
for_each: k8s.clusterrolebinding.list
severity: HIGH
conditions:
  all:
  - var: item.subjects[].namespace
    op: not_contains
    value: default
  - var: item.roleRef.name
    op: not_equals
    value: cluster-admin
