version: '1.0'
rule_id: k8s.clusterrolebinding.binding.cluster_admin_not_bound_to_service_account
for_each: k8s.clusterrolebinding.list_cluster_role_bindings
severity: CRITICAL
conditions:
  all:
  - var: item.roleRef.name
    op: equals
    value: cluster-admin
  - var: item.subjects[].kind
    op: not_contains
    value: ServiceAccount
