version: '1.0'
rule_id: k8s.node.node.os_patch_enforced
for_each: k8s.node.list_node
severity: LOW
conditions:
  all:
  - var: item.metadata.annotations.cspm.k8s.io/auto-repair-enabled
    op: is_true
  - var: item.metadata.annotations.cspm.k8s.io/automatic-updates-enabled
    op: is_true
  - var: item.metadata.annotations.cspm.k8s.io/automatic-upgrades-enabled
    op: is_true
