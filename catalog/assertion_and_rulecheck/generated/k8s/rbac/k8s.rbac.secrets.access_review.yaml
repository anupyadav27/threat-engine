version: '1.0'
rule_id: k8s.rbac.secrets.access_review
for_each: k8s.rbac.list_cluster_role
severity: HIGH
conditions:
  all:
  - var: item.rules[].resources
    op: not_contains
    value: secrets
  - var: item.rules[].verbs
    op: not_contains
    value: create
  - var: item.rules[].verbs
    op: not_contains
    value: update
  - var: item.rules[].verbs
    op: not_contains
    value: patch
  - var: item.rules[].verbs
    op: not_contains
    value: delete
  - var: item.rules[].verbs
    op: not_contains
    value: deletecollection
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''automountServiceAccountToken'', ''metadata'',
  ''rules''])'
