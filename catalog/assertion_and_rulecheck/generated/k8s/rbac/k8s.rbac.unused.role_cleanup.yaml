version: '1.0'
rule_id: k8s.rbac.unused.role_cleanup
for_each: k8s.rbac.list_cluster_role
severity: HIGH
conditions:
  any:
  - var: item.metadata.annotations.cspm.k8s.io/change-management-roles-defined
    op: exists
  - var: item.metadata.annotations.cspm.k8s.io/change-control-role-defined
    op: exists
  - var: item.metadata.annotations.cspm.k8s.io/change-management-policy-configured
    op: exists
