version: '1.0'
rule_id: k8s.rbac.role.wildcard_permissions_prohibited_enforced
for_each: k8s.rbac.list_role_for_all_namespaces
severity: HIGH
conditions:
  all:
  - var: item.metadata.annotations.cspm.k8s.io/roles-no-wildcard-in-rules
    op: exists
  - var: item.rules[].verbs
    op: not_contains
    value: '*'
  - var: item.rules[].apiGroups
    op: not_contains
    value: '*'
  - var: item.rules[].resources
    op: not_contains
    value: '*'
