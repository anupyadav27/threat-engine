version: '1.0'
rule_id: k8s.rbac.impersonate.bind_escalate_permissions_check
for_each: k8s.rbac.list_cluster_role
severity: HIGH
conditions:
  all:
  - var: item.rules[].verbs
    op: not_contains
    value: impersonate
  - var: item.rules[].verbs
    op: not_contains
    value: bind
fixture_validated: false
fixture_note: 'FAIL fixture returned PASS — conditions too loose (fail_fixture keys: [''automountServiceAccountToken'', ''metadata'',
  ''rules''])'
