version: '1.0'
rule_id: k8s.secret.secret.no_sensitive_data_in_env_configured
for_each: k8s.secret.list
severity: LOW
conditions:
  all:
  - var: item.data
    op: exists
  - var: item.data
    op: not_contains
    value: password
  - var: item.data
    op: not_contains
    value: secret
  - var: item.data
    op: not_contains
    value: key
  - var: item.data
    op: not_contains
    value: token
