version: '1.0'
rule_id: k8s.secret.backup.and_recovery_enabled
for_each: k8s.secret.list_secrets
severity: LOW
conditions:
  all:
  - var: item.metadata.annotations.backup_enabled
    op: exists
  - var: item.metadata.annotations.backup_enabled
    op: equals
    value: 'true'
  - var: item.metadata.annotations.recovery_enabled
    op: exists
  - var: item.metadata.annotations.recovery_enabled
    op: equals
    value: 'true'
