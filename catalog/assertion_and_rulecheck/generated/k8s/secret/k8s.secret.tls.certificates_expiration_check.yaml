version: '1.0'
rule_id: k8s.secret.tls.certificates_expiration_check
for_each: k8s.secret.list_secrets
severity: HIGH
conditions:
  all:
  - var: item.type
    op: equals
    value: kubernetes.io/tls
  - var: item.data.tls.crt
    op: exists
  - var: item.data.tls.crt
    op: not_expired
    value: 30
