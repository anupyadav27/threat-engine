version: '1.0'
rule_id: k8s.resource.annotation.standard
for_each: k8s.resource.list_resource_quota_for_all_namespaces
severity: LOW
conditions:
  all:
  - var: item.metadata.annotations.app\.kubernetes\.io/managed-by
    op: exists
  - var: item.metadata.annotations.app\.kubernetes\.io/name
    op: exists
  - var: item.metadata.annotations.app\.kubernetes\.io/part-of
    op: exists
