version: '1.0'
rule_id: k8s.configmap.configmap.baseline_policies_enforced
for_each: k8s.configmap.list_configmaps
severity: LOW
conditions:
  all:
  - var: item.metadata.annotations."security.alpha.kubernetes.io/sysctls"
    op: exists
  - var: item.metadata.annotations."security.alpha.kubernetes.io/unsafe-sysctls"
    op: exists
