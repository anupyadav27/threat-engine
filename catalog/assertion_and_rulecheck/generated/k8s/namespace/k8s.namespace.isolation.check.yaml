version: '1.0'
rule_id: k8s.namespace.isolation.check
for_each: k8s.namespace.list_namespaces
severity: LOW
conditions:
  all:
  - var: item.metadata.labels
    op: exists
  - var: item.metadata.labels['pod-security.kubernetes.io/enforce']
    op: exists
  - var: item.metadata.labels['pod-security.kubernetes.io/enforce']
    op: not_equals
    value: privileged
