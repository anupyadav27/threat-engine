version: '1.0'
rule_id: k8s.audit.threat.detection_enabled
for_each: k8s.audit.list_event_for_all_namespaces
severity: MEDIUM
conditions:
  all:
  - var: item.metadata.annotations.cspm.k8s.io/configuration-change-detection-enabled
    op: is_true
  - var: item.metadata.annotations.cspm.k8s.io/incident-detection-enabled
    op: is_true
