version: '1.0'
rule_id: k8s.audit.log.analysis_mechanism
for_each: k8s.audit.list_event_for_all_namespaces
severity: LOW
conditions:
  all:
  - var: item.metadata.annotations.cspm.k8s.io/change-management-logging-enabled
    op: is_true
  - var: item.metadata.annotations.cspm.k8s.io/configuration-change-detection-enabled
    op: is_true
  - var: item.metadata.annotations.cspm.k8s.io/incident-detection-enabled
    op: is_true
  - var: item.metadata.annotations.cspm.k8s.io/incident-response-admission-controller-enabled
    op: is_true
