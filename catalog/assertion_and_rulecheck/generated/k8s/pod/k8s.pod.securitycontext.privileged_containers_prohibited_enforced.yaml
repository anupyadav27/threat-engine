version: '1.0'
rule_id: k8s.pod.securitycontext.privileged_containers_prohibited_enforced
for_each: k8s.pod.list_pods
severity: CRITICAL
conditions:
  all:
  - var: item.spec.containers[].securityContext.privileged
    op: is_false
  - var: item.spec.initContainers[].securityContext.privileged
    op: is_false
