version: '1.0'
rule_id: k8s.pod.securitycontext.capabilities_restricted_enforced
for_each: k8s.pods.list
severity: LOW
conditions:
  all:
  - var: item.spec.securityContext.capabilities.drop
    op: contains
    value: ALL
  - var: item.spec.containers[].securityContext.capabilities.add
    op: is_empty
