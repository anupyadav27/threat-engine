version: '1.0'
rule_id: k8s.pod.securitycontext.memory_protection_enabled
for_each: k8s.pod.list_pods
severity: LOW
conditions:
  all:
  - var: item.spec.securityContext
    op: exists
  - var: item.spec.securityContext.memoryProtection
    op: exists
  - var: item.spec.securityContext.memoryProtection.enabled
    op: is_true
