version: '1.0'
rule_id: k8s.pod.resource.requests_and_limits_set
for_each: k8s.pod.list_pods
severity: LOW
conditions:
  all:
  - var: item.spec.containers[].resources.requests.cpu
    op: exists
  - var: item.spec.containers[].resources.requests.memory
    op: exists
  - var: item.spec.containers[].resources.limits.cpu
    op: exists
  - var: item.spec.containers[].resources.limits.memory
    op: exists
