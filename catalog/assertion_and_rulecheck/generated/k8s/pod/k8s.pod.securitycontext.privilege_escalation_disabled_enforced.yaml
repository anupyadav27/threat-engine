version: '1.0'
rule_id: k8s.pod.securitycontext.privilege_escalation_disabled_enforced
for_each: k8s.pods.list
severity: HIGH
conditions:
  all:
  - var: item.spec.containers[].securityContext.allowPrivilegeEscalation
    op: is_false
  - var: item.spec.initContainers[].securityContext.allowPrivilegeEscalation
    op: is_false
