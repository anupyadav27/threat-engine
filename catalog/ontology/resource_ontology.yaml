---
# Resource Attack Ontology Catalog
# Loaded by: catalog/ontology/upload_ontology_catalog.py
# Destination: resource_ontology_catalog in threat_engine_di
#
# Axis A — entry_point_category: how attackers GET IN
#   INTERNET_ENTRY | IDENTITY_ENTRY | THIRD_PARTY_ENTRY |
#   WORKLOAD_ENTRY | MANAGEMENT_ENTRY | DATA_ENTRY
#
# Axis B — attack_target_category: what attackers WANT
#   DATA_TARGET | SECRET_TARGET | CRYPTO_TARGET |
#   IDENTITY_TARGET | CONTROL_PLANE_TARGET | WORKLOAD_TARGET
#
# A resource_type may have BOTH axes (e.g. ec2_instance = WORKLOAD_ENTRY + WORKLOAD_TARGET).
# In that case add TWO entries — one per axis.
#
# condition_operator: eq | ne | not_null | contains
# is_conditional: false = classify ALL instances; true = check condition_field first.
#
# resource_type must match asset_inventory.resource_type exactly.
# AWS has TWO naming conventions — both covered below:
#   underscore types: ec2_instance, iam_role  (step6 scanner — has emitted_fields)
#   dot-notation:     ec2.instance, iam.role  (Resource Explorer — limited emitted_fields)

resources:

  # ════════════════════════════════════════════════════════════════════════════
  # AWS — underscore types (step6 scanner, full emitted_fields)
  # ════════════════════════════════════════════════════════════════════════════

  # ── INTERNET_ENTRY ─────────────────────────────────────────────────────────
  - csp: aws
    resource_type: apigatewayv2_api
    entry_point_category: INTERNET_ENTRY
    is_conditional: false
    description: API Gateway v2 HTTP/WebSocket API

  - csp: aws
    resource_type: apigateway_rest_api
    entry_point_category: INTERNET_ENTRY
    is_conditional: false
    description: API Gateway v1 REST API

  - csp: aws
    resource_type: cloudfront_distribution
    entry_point_category: INTERNET_ENTRY
    is_conditional: false
    description: CloudFront CDN distribution

  - csp: aws
    resource_type: elbv2_load_balancer
    entry_point_category: INTERNET_ENTRY
    is_conditional: true
    condition_field: Scheme
    condition_value: internet-facing
    condition_operator: eq
    description: ALB/NLB with internet-facing scheme only

  # ── WORKLOAD_ENTRY ─────────────────────────────────────────────────────────
  - csp: aws
    resource_type: ec2_instance
    entry_point_category: WORKLOAD_ENTRY
    is_conditional: true
    condition_field: PublicIpAddress
    condition_operator: not_null
    description: EC2 instance with public IP (lateral entry point)

  - csp: aws
    resource_type: lambda_function
    entry_point_category: WORKLOAD_ENTRY
    is_conditional: false
    description: Lambda function (compromised workload)

  - csp: aws
    resource_type: ecs_cluster
    entry_point_category: WORKLOAD_ENTRY
    is_conditional: false
    description: ECS cluster (container workload)

  # ── MANAGEMENT_ENTRY ───────────────────────────────────────────────────────
  - csp: aws
    resource_type: eks_cluster
    entry_point_category: MANAGEMENT_ENTRY
    is_conditional: false
    description: EKS cluster API server (management plane)

  - csp: aws
    resource_type: ssm_managed_instance
    entry_point_category: MANAGEMENT_ENTRY
    is_conditional: false
    description: SSM managed instance (management plane access)

  # ── IDENTITY_ENTRY ─────────────────────────────────────────────────────────
  - csp: aws
    resource_type: iam_user
    entry_point_category: IDENTITY_ENTRY
    is_conditional: false
    description: IAM user (credential compromise path)

  - csp: aws
    resource_type: iam_role
    entry_point_category: IDENTITY_ENTRY
    is_conditional: false
    description: IAM role (assume-role attack path)

  # ── THIRD_PARTY_ENTRY ──────────────────────────────────────────────────────
  - csp: aws
    resource_type: iam_open_id_connect_provider
    entry_point_category: THIRD_PARTY_ENTRY
    is_conditional: false
    description: OIDC provider (GitHub Actions / CI-CD federation)

  # ── DATA_ENTRY ─────────────────────────────────────────────────────────────
  - csp: aws
    resource_type: s3_bucket
    entry_point_category: DATA_ENTRY
    is_conditional: true
    condition_field: PublicAccessBlockConfiguration.BlockPublicAcls
    condition_value: "False"
    condition_operator: eq
    description: S3 bucket with public access not blocked

  # ── DATA_TARGET ────────────────────────────────────────────────────────────
  - csp: aws
    resource_type: s3_bucket
    attack_target_category: DATA_TARGET
    is_conditional: false
    description: S3 bucket (sensitive data store)

  - csp: aws
    resource_type: rds_db_instance
    attack_target_category: DATA_TARGET
    is_conditional: false
    description: RDS database instance

  - csp: aws
    resource_type: efs_file_system
    attack_target_category: DATA_TARGET
    is_conditional: false
    description: EFS file system

  - csp: aws
    resource_type: backup_backup_vault
    attack_target_category: DATA_TARGET
    is_conditional: false
    description: AWS Backup vault

  - csp: aws
    resource_type: glacier_vault
    attack_target_category: DATA_TARGET
    is_conditional: false
    description: S3 Glacier vault

  # ── SECRET_TARGET ──────────────────────────────────────────────────────────
  - csp: aws
    resource_type: secretsmanager_secret
    attack_target_category: SECRET_TARGET
    is_conditional: false
    description: Secrets Manager secret

  - csp: aws
    resource_type: ssm_document
    attack_target_category: SECRET_TARGET
    is_conditional: false
    description: SSM document (may contain sensitive runbooks/secrets)

  - csp: aws
    resource_type: ssm_patch_baseline
    attack_target_category: SECRET_TARGET
    is_conditional: false
    description: SSM patch baseline

  # ── CRYPTO_TARGET ──────────────────────────────────────────────────────────
  - csp: aws
    resource_type: kms_key
    attack_target_category: CRYPTO_TARGET
    is_conditional: false
    description: KMS customer managed key

  - csp: aws
    resource_type: kms_alias
    attack_target_category: CRYPTO_TARGET
    is_conditional: false
    description: KMS alias (points to CMK)

  - csp: aws
    resource_type: acm_certificate
    attack_target_category: CRYPTO_TARGET
    is_conditional: false
    description: ACM TLS certificate

  # ── IDENTITY_TARGET ────────────────────────────────────────────────────────
  - csp: aws
    resource_type: iam_role
    attack_target_category: IDENTITY_TARGET
    is_conditional: true
    condition_field: RoleName
    condition_value: Admin
    condition_operator: contains
    description: IAM admin role (privilege escalation target)

  - csp: aws
    resource_type: iam_user
    attack_target_category: IDENTITY_TARGET
    is_conditional: false
    description: IAM user (account takeover target)

  - csp: aws
    resource_type: cognito_user_pool
    attack_target_category: IDENTITY_TARGET
    is_conditional: false
    description: Cognito user pool (identity store)

  - csp: aws
    resource_type: iam_instance_profile
    attack_target_category: IDENTITY_TARGET
    is_conditional: false
    description: IAM instance profile (role escalation via EC2)

  # ── CONTROL_PLANE_TARGET ───────────────────────────────────────────────────
  - csp: aws
    resource_type: eks_cluster
    attack_target_category: CONTROL_PLANE_TARGET
    is_conditional: false
    description: EKS cluster control plane

  - csp: aws
