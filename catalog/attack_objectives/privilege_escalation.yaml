---
# Attack Objective: PRIVILEGE_ESCALATION
# Attacker assumes or abuses a privileged identity (admin role, service account, etc.)
# MITRE ATT&CK: T1548 (Abuse Elevation Control Mechanism), T1078 (Valid Accounts)

objective_type: PRIVILEGE_ESCALATION
description: Attacker assumes or abuses a privileged IAM identity to gain elevated cloud permissions
mitre_technique: T1548
mitre_tactic: privilege-escalation
required_capability: can_assume
crown_jewel_type: identity

target_resources:

  # ── AWS ─────────────────────────────────────────────────────────────────────
  - provider: aws
    resource_type: iam_role
    service_category: iam
    service_subcategory: iam_role

  - provider: aws
    resource_type: iam_user
    service_category: iam
    service_subcategory: iam_user

  - provider: aws
    resource_type: iam_group
    service_category: iam
    service_subcategory: iam_group

  # ── GCP ─────────────────────────────────────────────────────────────────────
  - provider: gcp
    resource_type: iam_service_account
    service_category: iam
    service_subcategory: service_account

  - provider: gcp
    resource_type: service_account
    service_category: iam
    service_subcategory: service_account

  # ── Azure ────────────────────────────────────────────────────────────────────
  - provider: azure
    resource_type: managed_identity
    service_category: iam
    service_subcategory: managed_identity

  - provider: azure
    resource_type: service_principal
    service_category: iam
    service_subcategory: service_principal

  - provider: azure
    resource_type: app_registration
    service_category: iam
    service_subcategory: service_principal

  # ── AliCloud ─────────────────────────────────────────────────────────────────
  - provider: alicloud
    resource_type: ram_role
    service_category: iam
    service_subcategory: iam_role

  - provider: alicloud
    resource_type: ram_user
    service_category: iam
    service_subcategory: iam_user

  # ── OCI ─────────────────────────────────────────────────────────────────────
  - provider: oci
    resource_type: identity_dynamic_group
    service_category: iam
    service_subcategory: iam_group

  - provider: oci
    resource_type: identity_group
    service_category: iam
    service_subcategory: iam_group

  # ── IBM ─────────────────────────────────────────────────────────────────────
  - provider: ibm
    resource_type: iam_service_id
    service_category: iam
    service_subcategory: service_account

  - provider: ibm
    resource_type: iam_trusted_profile
    service_category: iam
    service_subcategory: service_account
