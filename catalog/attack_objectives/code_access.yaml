---
# Attack Objective: CODE_ACCESS
# Attacker reads or modifies container images or source code artifacts,
# enabling supply chain compromise.
# MITRE ATT&CK: T1195.002 (Compromise Software Supply Chain)

objective_type: CODE_ACCESS
description: Attacker reads or modifies container images or code repositories enabling supply chain compromise
mitre_technique: T1195
mitre_tactic: initial-access
required_capability: can_read
crown_jewel_type: code

target_resources:

  # ── AWS ─────────────────────────────────────────────────────────────────────
  - provider: aws
    resource_type: ecr_repository
    service_category: container
    service_subcategory: registry

  - provider: aws
    resource_type: codecommit_repository
    service_category: devtools
    service_subcategory: source_control

  - provider: aws
    resource_type: codeartifact_repository
    service_category: devtools
    service_subcategory: artifact_registry

  # ── GCP ─────────────────────────────────────────────────────────────────────
  - provider: gcp
    resource_type: artifactregistry_repository
    service_category: container
    service_subcategory: registry

  - provider: gcp
    resource_type: sourcerepo_repository
    service_category: devtools
    service_subcategory: source_control

  # ── Azure ────────────────────────────────────────────────────────────────────
  - provider: azure
    resource_type: acr_registry
    service_category: container
    service_subcategory: registry

  # ── AliCloud ─────────────────────────────────────────────────────────────────
  - provider: alicloud
    resource_type: acr_repository
    service_category: container
    service_subcategory: registry

  # ── OCI ─────────────────────────────────────────────────────────────────────
  - provider: oci
    resource_type: artifacts_repository
    service_category: container
    service_subcategory: registry

  # ── IBM ─────────────────────────────────────────────────────────────────────
  - provider: ibm
    resource_type: icr_repository
    service_category: container
    service_subcategory: registry
