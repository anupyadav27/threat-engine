---
# Attack Objective: AI_MODEL_ACCESS
# Attacker invokes or reads an AI/ML model endpoint, enabling prompt injection,
# model extraction, or malicious inference.
# MITRE ATT&CK: T1648 (Serverless Execution — covers cloud function/model invocation)

objective_type: AI_MODEL_ACCESS
description: Attacker invokes or reads an AI/ML model endpoint enabling prompt injection or model extraction
mitre_technique: T1648
mitre_tactic: execution
required_capability: can_invoke
crown_jewel_type: ai_model

target_resources:

  # ── AWS ─────────────────────────────────────────────────────────────────────
  - provider: aws
    resource_type: sagemaker_endpoint
    service_category: ai_ml
    service_subcategory: model_endpoint

  - provider: aws
    resource_type: sagemaker_model
    service_category: ai_ml
    service_subcategory: model_artifact

  - provider: aws
    resource_type: bedrock_agent
    service_category: ai_ml
    service_subcategory: foundation_model

  - provider: aws
    resource_type: bedrock_model
    service_category: ai_ml
    service_subcategory: foundation_model

  - provider: aws
    resource_type: bedrock_knowledgebase
    service_category: ai_ml
    service_subcategory: rag_index

  # ── GCP ─────────────────────────────────────────────────────────────────────
  - provider: gcp
    resource_type: aiplatform_endpoint
    service_category: ai_ml
    service_subcategory: model_endpoint

  - provider: gcp
    resource_type: aiplatform_model
    service_category: ai_ml
    service_subcategory: model_artifact

  # ── Azure ────────────────────────────────────────────────────────────────────
  - provider: azure
    resource_type: ml_workspace
    service_category: ai_ml
    service_subcategory: model_endpoint

  - provider: azure
    resource_type: openai_deployment
    service_category: ai_ml
    service_subcategory: foundation_model

  # ── IBM ─────────────────────────────────────────────────────────────────────
  - provider: ibm
    resource_type: watson_ml_deployment
    service_category: ai_ml
    service_subcategory: model_endpoint
