---
# Attack Objective: SECRET_THEFT
# Attacker reads a stored secret, API key, or credential from a secrets store.
# MITRE ATT&CK: T1552.001 (Credentials in Files / Secrets Manager)

objective_type: SECRET_THEFT
description: Attacker reads a stored secret or credential from a secrets management service
mitre_technique: T1552
mitre_tactic: credential-access
required_capability: can_read
crown_jewel_type: encryption_control

target_resources:

  # ── AWS ─────────────────────────────────────────────────────────────────────
  - provider: aws
    resource_type: secretsmanager_secret
    service_category: encryption
    service_subcategory: secrets_manager

  - provider: aws
    resource_type: ssm_parameter
    service_category: encryption
    service_subcategory: parameter_store

  # ── GCP ─────────────────────────────────────────────────────────────────────
  - provider: gcp
    resource_type: secretmanager_secret
    service_category: encryption
    service_subcategory: secrets_manager

  # ── Azure ────────────────────────────────────────────────────────────────────
  - provider: azure
    resource_type: keyvault_secret
    service_category: encryption
    service_subcategory: secrets_manager

  # ── AliCloud ─────────────────────────────────────────────────────────────────
  - provider: alicloud
    resource_type: kms_secret
    service_category: encryption
    service_subcategory: secrets_manager

  # ── OCI ─────────────────────────────────────────────────────────────────────
  - provider: oci
    resource_type: vault_secret
    service_category: encryption
    service_subcategory: secrets_manager

  # ── IBM ─────────────────────────────────────────────────────────────────────
  - provider: ibm
    resource_type: secrets_manager_secret
    service_category: encryption
    service_subcategory: secrets_manager
