---
# Attack Objective: DATA_THEFT
# Attacker reads sensitive data from a storage or database resource.
# MITRE ATT&CK: T1530 (Data from Cloud Storage Object)
#
# required_capability: the edge type on the FINAL hop that satisfies this objective.
# objective_satisfied=TRUE when access_capability == required_capability.

objective_type: DATA_THEFT
description: Attacker gains read access to sensitive data at rest in storage or database
mitre_technique: T1530
mitre_tactic: collection
required_capability: can_read
crown_jewel_type: data

target_resources:

  # ── AWS ─────────────────────────────────────────────────────────────────────
  - provider: aws
    resource_type: s3_bucket
    service_category: storage
    service_subcategory: object_storage

  - provider: aws
    resource_type: rds_dbinstance
    service_category: database
    service_subcategory: relational_db

  - provider: aws
    resource_type: rds_cluster
