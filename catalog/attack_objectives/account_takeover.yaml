---
# Attack Objective: ACCOUNT_TAKEOVER
# Attacker gains control of the cloud account / subscription / project root.
# MITRE ATT&CK: T1078.004 (Cloud Accounts), T1098 (Account Manipulation)

objective_type: ACCOUNT_TAKEOVER
description: Attacker compromises root or global admin account, gaining full control of the cloud environment
mitre_technique: T1078
mitre_tactic: privilege-escalation
required_capability: can_assume
crown_jewel_type: infra_control

target_resources:

  # ── AWS ─────────────────────────────────────────────────────────────────────
  - provider: aws
    resource_type: organizations_account
    service_category: account
    service_subcategory: cloud_account

  - provider: aws
    resource_type: iam_root_user
    service_category: iam
    service_subcategory: root_account

  # ── GCP ─────────────────────────────────────────────────────────────────────
  - provider: gcp
    resource_type: cloudresourcemanager_project
    service_category: account
    service_subcategory: cloud_account

  - provider: gcp
    resource_type: cloudresourcemanager_organization
    service_category: account
    service_subcategory: cloud_account

  # ── Azure ────────────────────────────────────────────────────────────────────
  - provider: azure
    resource_type: subscription
    service_category: account
    service_subcategory: cloud_account

  - provider: azure
    resource_type: management_group
    service_category: account
    service_subcategory: cloud_account

  # ── AliCloud ─────────────────────────────────────────────────────────────────
  - provider: alicloud
    resource_type: ram_account
    service_category: account
    service_subcategory: cloud_account

  # ── OCI ─────────────────────────────────────────────────────────────────────
  - provider: oci
    resource_type: identity_compartment
    service_category: account
    service_subcategory: cloud_account

  # ── IBM ─────────────────────────────────────────────────────────────────────
  - provider: ibm
    resource_type: iam_account
    service_category: account
    service_subcategory: cloud_account
