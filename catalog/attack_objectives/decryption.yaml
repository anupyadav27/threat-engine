---
# Attack Objective: DECRYPTION
# Attacker gains access to a KMS key or HSM that can decrypt encrypted data.
# MITRE ATT&CK: T1486 / T1552 — KMS key access enables decryption of all data encrypted by it.

objective_type: DECRYPTION
description: Attacker gains KMS/key-management access enabling decryption of encrypted data at rest
mitre_technique: T1486
mitre_tactic: impact
required_capability: can_decrypt
crown_jewel_type: encryption_control

target_resources:

  # ── AWS ─────────────────────────────────────────────────────────────────────
  - provider: aws
    resource_type: kms_key
    service_category: encryption
    service_subcategory: kms

  # ── GCP ─────────────────────────────────────────────────────────────────────
  - provider: gcp
    resource_type: cloudkms_cryptokey
    service_category: encryption
    service_subcategory: kms

  - provider: gcp
    resource_type: cloudkms_keyring
    service_category: encryption
    service_subcategory: kms

  # ── Azure ────────────────────────────────────────────────────────────────────
  - provider: azure
    resource_type: keyvault_key
    service_category: encryption
    service_subcategory: kms

  # ── AliCloud ─────────────────────────────────────────────────────────────────
  - provider: alicloud
    resource_type: kms_key
    service_category: encryption
    service_subcategory: kms

  # ── OCI ─────────────────────────────────────────────────────────────────────
  - provider: oci
    resource_type: vault_key
    service_category: encryption
    service_subcategory: kms

  # ── IBM ─────────────────────────────────────────────────────────────────────
  - provider: ibm
    resource_type: keyprotect_key
    service_category: encryption
    service_subcategory: kms
