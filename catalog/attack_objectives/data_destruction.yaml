---
# Attack Objective: DATA_DESTRUCTION
# Attacker writes, deletes, or corrupts data in storage or database resources.
# MITRE ATT&CK: T1485 (Data Destruction), T1491 (Defacement)

objective_type: DATA_DESTRUCTION
description: Attacker gains write/delete access to storage or database resources enabling data destruction
mitre_technique: T1485
mitre_tactic: impact
required_capability: can_write
crown_jewel_type: data

target_resources:

  # ── AWS ─────────────────────────────────────────────────────────────────────
  - provider: aws
    resource_type: s3_bucket
    service_category: storage
    service_subcategory: object_storage

  - provider: aws
    resource_type: rds_dbinstance
    service_category: database
    service_subcategory: relational_db

  - provider: aws
    resource_type: dynamodb_table
    service_category: database
    service_subcategory: nosql_db

  # ── GCP ─────────────────────────────────────────────────────────────────────
  - provider: gcp
    resource_type: storage_bucket
    service_category: storage
    service_subcategory: object_storage

  - provider: gcp
    resource_type: bigquery_dataset
    service_category: analytics
    service_subcategory: data_warehouse

  # ── Azure ────────────────────────────────────────────────────────────────────
  - provider: azure
    resource_type: blob_container
    service_category: storage
    service_subcategory: object_storage

  - provider: azure
    resource_type: cosmosdb_account
    service_category: database
    service_subcategory: nosql_db

  # ── AliCloud ─────────────────────────────────────────────────────────────────
  - provider: alicloud
    resource_type: oss_bucket
    service_category: storage
    service_subcategory: object_storage

  # ── OCI ─────────────────────────────────────────────────────────────────────
  - provider: oci
    resource_type: objectstorage_bucket
    service_category: storage
    service_subcategory: object_storage

  # ── IBM ─────────────────────────────────────────────────────────────────────
  - provider: ibm
    resource_type: cos_bucket
    service_category: storage
    service_subcategory: object_storage
