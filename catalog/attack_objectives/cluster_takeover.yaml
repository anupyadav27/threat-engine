---
# Attack Objective: CLUSTER_TAKEOVER
# Attacker gains control of a Kubernetes or managed container cluster.
# MITRE ATT&CK: T1611 (Escape to Host), T1610 (Deploy Container)
# Capability: can_assume (node IAM role) or can_use_identity (workload identity)

objective_type: CLUSTER_TAKEOVER
description: Attacker compromises a Kubernetes cluster node or control plane, gaining workload execution control
mitre_technique: T1611
mitre_tactic: privilege-escalation
required_capability: can_assume
crown_jewel_type: infra_control

target_resources:

  # ── AWS ─────────────────────────────────────────────────────────────────────
  - provider: aws
    resource_type: eks_cluster
    service_category: container
    service_subcategory: orchestration_k8s

  - provider: aws
    resource_type: ecs_cluster
    service_category: container
    service_subcategory: orchestration_managed

  # ── GCP ─────────────────────────────────────────────────────────────────────
  - provider: gcp
    resource_type: container_cluster
    service_category: container
    service_subcategory: orchestration_k8s

  # ── Azure ────────────────────────────────────────────────────────────────────
  - provider: azure
    resource_type: aks_cluster
    service_category: container
    service_subcategory: orchestration_k8s

  - provider: azure
    resource_type: container_registry
    service_category: container
    service_subcategory: registry

  # ── AliCloud ─────────────────────────────────────────────────────────────────
  - provider: alicloud
    resource_type: cs_cluster
    service_category: container
    service_subcategory: orchestration_k8s

  # ── OCI ─────────────────────────────────────────────────────────────────────
  - provider: oci
    resource_type: containerengine_cluster
    service_category: container
    service_subcategory: orchestration_k8s

  # ── IBM ─────────────────────────────────────────────────────────────────────
  - provider: ibm
    resource_type: iks_cluster
    service_category: container
    service_subcategory: orchestration_k8s

  # ── K8s (self-managed) ───────────────────────────────────────────────────────
  - provider: k8s
    resource_type: k8s_cluster
    service_category: container
    service_subcategory: orchestration_k8s

  - provider: k8s
    resource_type: k8s_node
    service_category: container
    service_subcategory: orchestration_k8s
