version: '1.0'
provider: k8s
service: pod
services:
  client: pod
  module: boto3.client
discovery:
- discovery_id: k8s.pod.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      apiVersion: '{{ item.apiVersion }}'
      kind: '{{ item.kind }}'
      metadata: '{{ item.metadata }}'
      metadata.name: '{{ item.metadata.name }}'
      metadata.namespace: '{{ item.metadata.namespace }}'
      metadata.labels: '{{ item.metadata.labels }}'
      metadata.annotations: '{{ item.metadata.annotations }}'
      metadata.creationTimestamp: '{{ item.metadata.creationTimestamp }}'
      metadata.uid: '{{ item.metadata.uid }}'
      spec: '{{ item.spec }}'
      spec.containers: '{{ item.spec.containers }}'
      spec.containers[].name: '{{ item.spec.containers[].name }}'
      spec.containers[].image: '{{ item.spec.containers[].image }}'
      spec.containers[].imagePullPolicy: '{{ item.spec.containers[].imagePullPolicy
        }}'
      spec.containers[].securityContext: '{{ item.spec.containers[].securityContext
        }}'
      spec.containers[].securityContext.runAsUser: '{{ item.spec.containers[].securityContext.runAsUser
        }}'
      spec.containers[].securityContext.runAsNonRoot: '{{ item.spec.containers[].securityContext.runAsNonRoot
        }}'
      spec.containers[].securityContext.readOnlyRootFilesystem: '{{ item.spec.containers[].securityContext.readOnlyRootFilesystem
        }}'
      spec.containers[].securityContext.allowPrivilegeEscalation: '{{ item.spec.containers[].securityContext.allowPrivilegeEscalation
        }}'
      spec.containers[].securityContext.privileged: '{{ item.spec.containers[].securityContext.privileged
        }}'
      spec.containers[].securityContext.capabilities: '{{ item.spec.containers[].securityContext.capabilities
        }}'
      spec.containers[].securityContext.capabilities.add: '{{ item.spec.containers[].securityContext.capabilities.add
        }}'
      spec.containers[].securityContext.capabilities.drop: '{{ item.spec.containers[].securityContext.capabilities.drop
        }}'
      spec.containers[].resources: '{{ item.spec.containers[].resources }}'
      spec.containers[].resources.limits: '{{ item.spec.containers[].resources.limits
        }}'
      spec.containers[].resources.requests: '{{ item.spec.containers[].resources.requests
        }}'
      spec.hostNetwork: '{{ item.spec.hostNetwork }}'
      spec.hostPID: '{{ item.spec.hostPID }}'
      spec.hostIPC: '{{ item.spec.hostIPC }}'
      spec.serviceAccountName: '{{ item.spec.serviceAccountName }}'
      spec.automountServiceAccountToken: '{{ item.spec.automountServiceAccountToken
        }}'
      spec.securityContext: '{{ item.spec.securityContext }}'
      spec.securityContext.runAsUser: '{{ item.spec.securityContext.runAsUser }}'
      spec.securityContext.runAsNonRoot: '{{ item.spec.securityContext.runAsNonRoot
        }}'
      spec.securityContext.fsGroup: '{{ item.spec.securityContext.fsGroup }}'
      spec.securityContext.seLinuxOptions: '{{ item.spec.securityContext.seLinuxOptions
        }}'
      spec.securityContext.seccompProfile: '{{ item.spec.securityContext.seccompProfile
        }}'
      spec.volumes: '{{ item.spec.volumes }}'
      status: '{{ item.status }}'
      status.phase: '{{ item.status.phase }}'
      status.conditions: '{{ item.status.conditions }}'
      status.podIP: '{{ item.status.podIP }}'
      status.startTime: '{{ item.status.startTime }}'
- discovery_id: k8s.pod.get
  calls:
  - action: get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      apiVersion: '{{ item.apiVersion }}'
      kind: '{{ item.kind }}'
      metadata: '{{ item.metadata }}'
      metadata.name: '{{ item.metadata.name }}'
      metadata.namespace: '{{ item.metadata.namespace }}'
      metadata.labels: '{{ item.metadata.labels }}'
      metadata.annotations: '{{ item.metadata.annotations }}'
      metadata.creationTimestamp: '{{ item.metadata.creationTimestamp }}'
      metadata.uid: '{{ item.metadata.uid }}'
      spec: '{{ item.spec }}'
      spec.containers: '{{ item.spec.containers }}'
      spec.containers[].name: '{{ item.spec.containers[].name }}'
      spec.containers[].image: '{{ item.spec.containers[].image }}'
      spec.containers[].imagePullPolicy: '{{ item.spec.containers[].imagePullPolicy
        }}'
      spec.containers[].securityContext: '{{ item.spec.containers[].securityContext
        }}'
      spec.containers[].securityContext.runAsUser: '{{ item.spec.containers[].securityContext.runAsUser
        }}'
      spec.containers[].securityContext.runAsNonRoot: '{{ item.spec.containers[].securityContext.runAsNonRoot
        }}'
      spec.containers[].securityContext.readOnlyRootFilesystem: '{{ item.spec.containers[].securityContext.readOnlyRootFilesystem
        }}'
      spec.containers[].securityContext.allowPrivilegeEscalation: '{{ item.spec.containers[].securityContext.allowPrivilegeEscalation
        }}'
      spec.containers[].securityContext.privileged: '{{ item.spec.containers[].securityContext.privileged
        }}'
      spec.containers[].securityContext.capabilities: '{{ item.spec.containers[].securityContext.capabilities
        }}'
      spec.containers[].securityContext.capabilities.add: '{{ item.spec.containers[].securityContext.capabilities.add
        }}'
      spec.containers[].securityContext.capabilities.drop: '{{ item.spec.containers[].securityContext.capabilities.drop
        }}'
      spec.containers[].resources: '{{ item.spec.containers[].resources }}'
      spec.containers[].resources.limits: '{{ item.spec.containers[].resources.limits
        }}'
      spec.containers[].resources.requests: '{{ item.spec.containers[].resources.requests
        }}'
      spec.hostNetwork: '{{ item.spec.hostNetwork }}'
      spec.hostPID: '{{ item.spec.hostPID }}'
      spec.hostIPC: '{{ item.spec.hostIPC }}'
      spec.serviceAccountName: '{{ item.spec.serviceAccountName }}'
      spec.automountServiceAccountToken: '{{ item.spec.automountServiceAccountToken
        }}'
      spec.securityContext: '{{ item.spec.securityContext }}'
      spec.securityContext.runAsUser: '{{ item.spec.securityContext.runAsUser }}'
      spec.securityContext.runAsNonRoot: '{{ item.spec.securityContext.runAsNonRoot
        }}'
      spec.securityContext.fsGroup: '{{ item.spec.securityContext.fsGroup }}'
      spec.securityContext.seLinuxOptions: '{{ item.spec.securityContext.seLinuxOptions
        }}'
      spec.securityContext.seccompProfile: '{{ item.spec.securityContext.seccompProfile
        }}'
      spec.volumes: '{{ item.spec.volumes }}'
      status: '{{ item.status }}'
      status.phase: '{{ item.status.phase }}'
      status.conditions: '{{ item.status.conditions }}'
      status.podIP: '{{ item.status.podIP }}'
      status.startTime: '{{ item.status.startTime }}'
checks: []
