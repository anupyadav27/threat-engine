version: '1.0'
provider: k8s
service: rolebinding
services:
  client: rolebinding
  module: boto3.client
discovery:
- discovery_id: k8s.rolebinding.list
  calls:
  - action: list
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      metadata: '{{ item.metadata }}'
      roleRef: '{{ item.roleRef }}'
      subjects: '{{ item.subjects }}'
- discovery_id: k8s.rolebinding.get
  calls:
  - action: get
    save_as: response
    on_error: continue
  emit:
    as: item
    items_for: '{{ response }}'
    item:
      metadata: '{{ item.metadata }}'
      roleRef: '{{ item.roleRef }}'
      subjects: '{{ item.subjects }}'
checks: []
