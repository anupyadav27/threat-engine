---
# AWS resource-based IAM policy rules
# Loaded by: catalog/iam/upload_iam_policy_rules.py → iam_resource_policy_rules table
# These describe which resource types carry resource-based policies and what edge
# to derive when an external principal is granted access.

csp: aws
rules:

  # ── S3 Bucket Policy ─────────────────────────────────────────────────────────
  - resource_type: s3.bucket
    policy_field: Policy
    principal_key: AWS
    relation_type: GRANTS_ACCESS_TO
    attack_path_category: data_access
    description: S3 bucket policy grants access to AWS principals

  - resource_type: s3.bucket
    policy_field: Policy
    principal_key: Service
    relation_type: GRANTS_ACCESS_TO
    attack_path_category: data_access
    description: S3 bucket policy grants access to AWS services

  # ── SQS Queue Policy ──────────────────────────────────────────────────────────
  - resource_type: sqs.queue
    policy_field: Policy
    principal_key: AWS
    relation_type: GRANTS_ACCESS_TO
    attack_path_category: lateral_movement
    description: SQS queue policy grants access to AWS principals

  # ── SNS Topic Policy ──────────────────────────────────────────────────────────
  - resource_type: sns.topic
    policy_field: Policy
    principal_key: AWS
    relation_type: GRANTS_ACCESS_TO
    attack_path_category: lateral_movement
    description: SNS topic policy grants access to AWS principals

  # ── KMS Key Policy ────────────────────────────────────────────────────────────
  - resource_type: kms.key
    policy_field: KeyPolicy
    principal_key: AWS
    relation_type: GRANTS_DECRYPT_TO
    attack_path_category: data_exfil
    description: KMS key policy grants decrypt/use access to AWS principals

  # ── Lambda Resource Policy ────────────────────────────────────────────────────
  - resource_type: lambda.function
    policy_field: Policy
    principal_key: AWS
    relation_type: GRANTS_ACCESS_TO
    attack_path_category: lateral_movement
    description: Lambda resource policy grants invocation access to AWS principals

  - resource_type: lambda.function
    policy_field: Policy
    principal_key: Service
    relation_type: GRANTS_ACCESS_TO
    attack_path_category: lateral_movement
    description: Lambda resource policy grants invocation access to AWS services

  # ── Secrets Manager Resource Policy ───────────────────────────────────────────
  - resource_type: secretsmanager.secret
    policy_field: ResourcePolicy
    principal_key: AWS
    relation_type: GRANTS_ACCESS_TO
    attack_path_category: data_exfil
    description: Secrets Manager secret policy grants access to AWS principals

  # ── ECR Repository Policy ─────────────────────────────────────────────────────
  - resource_type: ecr.repository
    policy_field: RepositoryPolicyText
    principal_key: AWS
    relation_type: GRANTS_ACCESS_TO
    attack_path_category: lateral_movement
    description: ECR repository policy grants access to AWS principals

  # ── IAM Role Trust Policy (cross-account ASSUMES) ─────────────────────────────
  - resource_type: iam.role
    policy_field: AssumeRolePolicyDocument
    principal_key: AWS
    relation_type: ASSUMES
    attack_path_category: privilege_escalation
    description: IAM role trust policy allows AWS principal to assume the role

  - resource_type: iam.role
    policy_field: AssumeRolePolicyDocument
    principal_key: Federated
    relation_type: ASSUMES
    attack_path_category: privilege_escalation
    description: IAM role trust policy allows federated principal (OIDC/SAML) to assume role

  # ── Glacier Vault Access Policy ───────────────────────────────────────────────
  - resource_type: glacier.vault
    policy_field: Policy
    principal_key: AWS
    relation_type: GRANTS_ACCESS_TO
    attack_path_category: data_access
    description: Glacier vault policy grants access to AWS principals

  # ── Elastic Search (OpenSearch) Domain Policy ─────────────────────────────────
  - resource_type: opensearch.domain
    policy_field: AccessPolicies
    principal_key: AWS
    relation_type: GRANTS_ACCESS_TO
    attack_path_category: data_access
    description: OpenSearch domain access policy grants access to AWS principals
