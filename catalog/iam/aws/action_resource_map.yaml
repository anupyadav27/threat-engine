---
# AWS IAM action prefix → resource type mapping
# Loaded by: catalog/iam/upload_iam_policy_rules.py → iam_action_resource_map table
# Used to expand wildcard Resource:* IAM policy statements into CAN_ACCESS edges.
# When a policy grants s3:* with Resource:*, we create CAN_ACCESS edges to all s3.bucket resources.

csp: aws
rules:

  - action_prefix: "s3:"
    resource_types: ["s3.bucket"]
    attack_path_category: data_access
    description: S3 actions operate on S3 buckets

  - action_prefix: "rds:"
    resource_types: ["rds.db_instance", "rds.cluster"]
    attack_path_category: data_access
    description: RDS actions operate on RDS instances and clusters

  - action_prefix: "dynamodb:"
    resource_types: ["dynamodb.table"]
    attack_path_category: data_access
    description: DynamoDB actions operate on DynamoDB tables

  - action_prefix: "secretsmanager:"
    resource_types: ["secretsmanager.secret"]
    attack_path_category: data_exfil
    description: Secrets Manager actions operate on secrets

  - action_prefix: "kms:"
    resource_types: ["kms.key"]
    attack_path_category: data_exfil
    description: KMS actions operate on KMS keys

  - action_prefix: "ec2:"
    resource_types: ["ec2.instance", "ec2.volume", "ec2.security_group", "ec2.vpc"]
    attack_path_category: lateral_movement
    description: EC2 actions operate on EC2 resources

  - action_prefix: "lambda:"
    resource_types: ["lambda.function"]
    attack_path_category: lateral_movement
    description: Lambda actions operate on Lambda functions

  - action_prefix: "iam:"
    resource_types: ["iam.role", "iam.user", "iam.group", "iam.policy"]
    attack_path_category: privilege_escalation
    description: IAM actions operate on IAM identities (privilege escalation risk)

  - action_prefix: "sts:"
    resource_types: ["iam.role"]
    attack_path_category: privilege_escalation
    description: STS actions (AssumeRole) operate on IAM roles

  - action_prefix: "eks:"
    resource_types: ["eks.cluster", "eks.nodegroup"]
    attack_path_category: lateral_movement
    description: EKS actions operate on EKS clusters and node groups

  - action_prefix: "ecr:"
    resource_types: ["ecr.repository"]
    attack_path_category: lateral_movement
    description: ECR actions operate on ECR repositories

  - action_prefix: "sqs:"
    resource_types: ["sqs.queue"]
    attack_path_category: lateral_movement
    description: SQS actions operate on SQS queues

  - action_prefix: "sns:"
    resource_types: ["sns.topic"]
    attack_path_category: lateral_movement
    description: SNS actions operate on SNS topics

  - action_prefix: "cloudformation:"
    resource_types: ["cloudformation.stack"]
    attack_path_category: privilege_escalation
    description: CloudFormation actions — can deploy arbitrary infra

  - action_prefix: "glue:"
    resource_types: ["glue.database", "glue.table", "glue.job"]
    attack_path_category: data_access
    description: Glue actions operate on Glue databases and ETL jobs

  - action_prefix: "athena:"
    resource_types: ["athena.workgroup", "s3.bucket"]
    attack_path_category: data_access
    description: Athena queries operate against S3 data

  - action_prefix: "ssm:"
    resource_types: ["ec2.instance", "ssm.parameter"]
    attack_path_category: lateral_movement
    description: SSM actions allow remote execution on EC2 and parameter store access

  - action_prefix: "elasticache:"
    resource_types: ["elasticache.cluster", "elasticache.replication_group"]
    attack_path_category: data_access
    description: ElastiCache actions operate on cache clusters

  - action_prefix: "redshift:"
    resource_types: ["redshift.cluster"]
    attack_path_category: data_access
    description: Redshift actions operate on Redshift clusters
