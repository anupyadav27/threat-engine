---
# AliCloud resource-based IAM policy rules
# AliCloud uses RAM (Resource Access Management) with resource-based policies on some services.

csp: alicloud
rules:

  # ── OSS Bucket Policy ─────────────────────────────────────────────────────────
  - resource_type: oss.bucket
    policy_field: Policy
    principal_key: Principal
    relation_type: GRANTS_ACCESS_TO
    attack_path_category: data_access
    description: Alibaba OSS bucket policy grants access to RAM principals

  # ── KMS Key Policy ────────────────────────────────────────────────────────────
  - resource_type: kms.key
    policy_field: KeyPolicy
    principal_key: Principal
    relation_type: GRANTS_DECRYPT_TO
    attack_path_category: data_exfil
    description: AliCloud KMS key policy grants decrypt access to RAM principals

  # ── Function Compute Service Policy ──────────────────────────────────────────
  - resource_type: fc.service
    policy_field: ResourcePolicy
    principal_key: Principal
    relation_type: GRANTS_ACCESS_TO
    attack_path_category: lateral_movement
    description: Function Compute service resource policy grants invocation access
