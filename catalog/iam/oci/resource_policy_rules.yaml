---
# OCI resource-based IAM policy rules
# OCI uses Compartment-level IAM policies (not per-resource policies).
# Limited resource-level policies exist for Object Storage and Vault.

csp: oci
rules:

  # ── Object Storage Bucket Pre-authenticated Requests ──────────────────────────
  - resource_type: objectstorage.bucket
    policy_field: preauthenticatedRequests
    principal_key: name
    relation_type: GRANTS_ACCESS_TO
    attack_path_category: data_access
    description: OCI Object Storage PAR grants time-limited anonymous access

  # ── Vault / KMS Key Access (via IAM policy statement) ────────────────────────
  - resource_type: keymanagement.vault
    policy_field: iamPolicies
    principal_key: statements
    relation_type: GRANTS_DECRYPT_TO
    attack_path_category: data_exfil
    description: OCI Vault IAM policy grants key use/decrypt access
