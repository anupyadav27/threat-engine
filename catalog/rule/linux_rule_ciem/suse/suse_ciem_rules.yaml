  - rule_id: tciem.suse.cryptographic_mechanisms_are_used_to_protect_the
    title: "Ensure cryptographic mechanisms are used to protect the integrity of audit tools"
    severity: high
    mitre_technique: T1562
    mitre_tactic: defense_evasion
    cis_control: '6.1.3'
    cis_section: '6'
    log_source: "/var/log/messages, auditd"
    detection:
      event_type: audit_event
      filters:
        change_type: security_relevant
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Run the following command to determine the absolute path to the non-symlinked
      version on the audit tools: # readlink -f /sbin The output will be either
      /usr/sbin - OR - /sbin. Ensure the correct path is used. Edit /etc/aide.conf
      and add or update the following selection lines replacing <PATH> with the
      correct path returned in the command above: # Audit Tools <PATH>/auditctl
      p+i+n+u+g+s+b+acl+xattrs+sha512 <PATH>/auditd p+i+n+u+g+s+b+acl+xattrs+sha512
      <PATH>/ausearch p+i+n+u+g+s+b+acl+xattrs+sha512 <PATH>/aureport
      p+i+n+u+g+s+b+acl+xattrs+sha512 <PATH>/autrace p+i+n+u+g+s+b+acl+xattrs+sha512
      <PATH>/augenrules p+i+n+u+g+s+b+acl+xattrs+sha512 Example # printf '\n%s' '#
      Audit Tools' '$(readlink -f /sbin/auditctl) p+i+n+u+g+s+b+acl+xattrs+sha512'
      '$(readlink -f /sbin/auditd) p+i+n+u+g+s+b+acl+xattrs+sha512' '$(readlink -f
      /sbin/ausearch) p+i+n+u+g+s+b+acl+xattrs+sha512' '$(readlink -f
      /sbin/aureport) p+i+n+u+g+s+b+acl+xattrs+sha512' '$(readlink -f /sbin/autrace)
      p+i+n+u+g+s+b+acl+xattrs+sha512' '$(readlink -f /sbin/augenrules)
      p+i+n+u+g+s+b+acl+xattrs+sha512' >> /etc/aide.conf Note: - IF - /etc/aide.conf
      includes a @@x_include statement: Example: @@x_include /etc/aide.conf.d
      ^[a-zA-Z0-9_-]+$ • @@x_include FILE • @@x_include DIRECTORY REGEX o
      @@x_include is identical to @@include, except that if a config file is
      executable it is run and the output is used as config. o If the executable
      file exits with status greater than zero or writes to stderr aide stops with
      an error. o For security reasons DIRECTORY and each executable config file
      must be owned by the current user and must not be group or world-writable.
      References: 1. AIDE.CONF(5)

  - rule_id: tciem.suse.access_to_all_logfiles_has_been_configured
    title: "Ensure access to all logfiles has been configured"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '6.2.4.1'
    cis_section: '6'
    log_source: "/var/log/messages, auditd"
    detection:
      event_type: resource_access
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Run the following script to update permissions and ownership on files in
      /var/log. Although the script is not destructive, ensure that the output is
      captured in the event that the remediation causes issues. #!/usr/bin/env bash
      { a_output2=() f_file_test_fix() { a_out2=() maxperm='$( printf '%o' $(( 0777
      & ~$perm_mask)) )' if [ $(( $l_mode & $perm_mask )) -gt 0 ]; then a_out2+=(' o
      Mode: \'$l_mode\' should be \'$maxperm\' or more restrictive' ' x Removing
      excess permissions') chmod '$l_rperms' '$l_fname' fi if [[ ! '$l_user' =~
      $l_auser ]]; then a_out2+=(' o Owned by: \'$l_user\' and should be owned by
      \'${l_auser//|/ or }\'' ' x Changing ownership to: \'$l_fix_account\'') chown
      '$l_fix_account' '$l_fname' fi if [[ ! '$l_group' =~ $l_agroup ]]; then
      a_out2+=(' o Group owned by: \'$l_group\' and should be group owned by
      \'${l_agroup//|/ or }\'' ' x Changing group ownership to: \'$l_fix_account\'')
      chgrp '$l_fix_account' '$l_fname' fi [ '${#a_out2[@]}' -gt 0 ] &&
      a_output2+=(' - File: \'$l_fname\' is:' '${a_out2[@]}') } l_fix_account='root'
      while IFS= read -r -d $'\0' l_file; do while IFS=: read -r l_fname l_mode
      l_user l_group; do if grep -Pq -- '\/(apt)\h*$' <<< '$(dirname '$l_fname')';
      then perm_mask='0133' l_rperms='u-x,go-wx' l_auser='root'
      l_agroup='(root|adm)'; f_file_test_fix else case '$(basename '$l_fname')' in
      lastlog | lastlog.* | wtmp | wtmp.* | wtmp-* | btmp | btmp.* | btmp-* |
      README) perm_mask='0113' l_rperms='ug-x,o-wx' l_auser='root'
      l_agroup='(root|utmp)' f_file_test_fix ;; cloud-init.log* | localmessages* |
      waagent.log*) perm_mask='0133' l_rperms='u-x,go-wx' l_auser='(root|syslog)'
      l_agroup='(root|adm)' file_test_fix ;; secure | auth.log | syslog | messages)
      perm_mask='0137' l_rperms='u-x,g-wx,o-rwx' l_auser='(root|syslog)'
      l_agroup='(root|adm)' f_file_test_fix ;; SSSD | sssd) perm_mask='0117'
      l_rperms='ug-x,o-rwx' l_auser='(root|SSSD)' l_agroup='(root|SSSD)'
      f_file_test_fix ;; gdm | gdm3) perm_mask='0117' l_rperms='ug-x,o-rwx'
      l_auser='root' l_agroup='(root|gdm|gdm3)' f_file_test_fix ;; *.journal |
      *.journal~) perm_mask='0137' l_rperms='u-x,g-wx,o-rwx' l_auser='root'
      l_agroup='(root|systemd-journal)' f_file_test_fix ;; *) perm_mask='0137'
      l_rperms='u-x,g-wx,o-rwx' l_auser='(root|syslog)' l_agroup='(root|adm)' if [
      '$l_user' = 'root' ] || ! grep -Pq -- '^\h*$(awk -F: '$1=='''$l_user''' {print
      $7}' /etc/passwd)\b' /etc/shells; then ! grep -Pq -- '$l_auser' <<< '$l_user'
      && l_auser='(root|syslog|$l_user)' ! grep -Pq -- '$l_agroup' <<< '$l_group' &&
      l_agroup='(root|adm|$l_group)' fi f_file_test_fix ;; esac fi done < <(stat -Lc
      '%n:%#a:%U:%G' '$l_file') done < <(find -L /var/log -type f \( -perm /0137 -o
      ! -user root -o ! - group root \) -print0) if [ '${#a_output2[@]}' -le 0 ];
      then # If all files passed, then we report no changes a_output+=(' - All files
      in \'/var/log/\' have appropriate permissions and ownership') printf '\n%s' '-
      All files in \'/var/log/\' have appropriate permissions and ownership' ' o No
      changes required' '' else printf '\n%s' '${a_output2[@]}' '' fi } Note: You
      may also need to change the configuration for your logging software or
      services for any logs that had incorrect permissions. If there are services
      that log to other locations, ensure that those log files have the appropriate
      access configured. References: 1. NIST SP 800-53 Rev. 5: AC-3, MP-2

