      visible by default from just scanning /, change the PARTITION variable to the
      appropriate partition and re-run the remediation. References: 1. NIST SP
      800-53 Rev. 5: AU-3, AU-3(1) Additional Information: Potential reboot required
      If the auditing configuration is locked (-e 2), then augenrules will not warn
      in any way that rules could not be loaded into the running configuration. A
      system reboot will be required to load the rules into the running
      configuration. System call structure For performance (man 7 audit.rules)
      reasons it is preferable to have all the system calls on one line. However,
      your configuration may have them on one line each or some other combination.
      This is important to understand for both the auditing and remediation sections
      as the examples given are optimized for performance as per the man page.

