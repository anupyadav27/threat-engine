    mitre_technique: T1562
    mitre_tactic: defense_evasion
    cis_control: '6.3.3.14'
    cis_section: '6'
    log_source: "/var/log/messages, auditd"
    detection:
      event_type: audit_event
      filters:
        change_type: security_relevant
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Note: If a different Mandatory Access Control method is used, changes to the
      corresponding directories should be audited. Edit or create a file in the
      /etc/audit/rules.d/ directory, ending in .rules extension, with the relevant
      rules to monitor events that modify the system's Mandatory Access Controls.
      Example: # printf ' -w /etc/apparmor -p wa -k MAC-policy -w
      /usr/share/apparmor -p wa -k MAC-policy ' >> /etc/audit/rules.d/50-MAC-
      policy.rules Merge and load the rules into active configuration: # augenrules
      --load Check if reboot is required. # if [[ $(auditctl -s | grep 'enabled') =~
      '2' ]]; then printf 'Reboot required to load rules\n'; fi References: 1. NIST
      SP 800-53 Rev. 5: AU-3, CM-6 Additional Information: Potential reboot required
      If the auditing configuration is locked (-e 2), then augenrules will not warn
