  - rule_id: tciem.suse.default_user_shell_timeout_is_configured
    title: "Ensure default user shell timeout is configured"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '5.4.3.2'
    cis_section: '5'
    log_source: "/var/log/messages, auditd"
    detection:
      event_type: authentication_success
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Review /etc/bashrc, /etc/profile, and all files ending in *.sh in the
      /etc/profile.d/ directory and remove or edit all TMOUT=_n_ entries to follow
      local site policy. TMOUT should not exceed 900 or be equal to 0. Configure
      TMOUT in one of the following files: • A file in the /etc/profile.d/ directory
      ending in .sh • /etc/profile • /etc/bashrc Example command to set TMOUT to 900
      seconds in a file in /etc/profile.d/: # printf '%s\n' '# Set TMOUT to 900
      seconds' 'typeset -xr TMOUT=900' > /etc/profile.d/50-tmout.sh TMOUT
      configuration examples: typeset -xr TMOUT=900 Deprecated methods: • As
      multiple lines: TMOUT=900 readonly TMOUT export TMOUT • As a single line:
      readonly TMOUT=900 ; export TMOUT Additional Information: The audit and
      remediation in this recommendation apply to bash and shell. If other shells
      are supported on the system, it is recommended that their configuration files
      also are checked. Other methods of setting a timeout exist for other shells
      not covered here. Ensure that the timeout conforms to your local policy.

  - rule_id: tciem.suse.default_user_umask_is_configured
    title: "Ensure default user umask is configured"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '5.4.3.3'
    cis_section: '5'
    log_source: "/var/log/messages, auditd"
    detection:
      event_type: authentication_success
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Run the following script and perform the instructions in the output to set the
      default umask to 027 or more restrictive: #!/usr/bin/env bash { l_output=''
      l_output2='' l_out='' file_umask_chk() { if grep -Psiq --
      '^\h*umask\h+(0?[0-7][2- 7]7|u(=[rwx]{0,3}),g=([rx]{0,2}),o=)(\h*#.*)?$'
      '$l_file'; then l_out='$l_out\n - umask is set correctly in \'$l_file\'' elif
      grep -Psiq -- '^\h*umask\h+(([0-7][0-7][01][0-7]\b|[0-7][0-7][0-
      7][0-6]\b)|([0-7][01][0-7]\b|[0-7][0-7][0-
      6]\b)|(u=[rwx]{1,3},)?(((g=[rx]?[rx]?w[rx]?[rx]?\b)(,o=[rwx]{1,3})?)|((g=[wrx
      ]{1,3},)?o=[wrx]{1,3}\b)))' '$l_file'; then l_output2='$l_output2\n -
      \'$l_file\'' fi } while IFS= read -r -d $'\0' l_file; do file_umask_chk done <
      <(find /etc/profile.d/ -type f -name '*.sh' -print0) [ -n '$l_out' ] &&
      l_output='$l_out' l_file='/etc/profile' && file_umask_chk l_file='/etc/bashrc'
      && file_umask_chk l_file='/etc/bash.bashrc' && file_umask_chk
      l_file='/etc/pam.d/postlogin' if grep -Psiq
      '^\h*session\h+[^#\n\r]+\h+pam_umask\.so\h+([^#\n\r]+\h+)?umask=(([0-7][0-
      7][01][0-7]\b|[0-7][0-7][0-7][0-6]\b)|([0-7][01][0-7]\b))' '$l_file'; then
      l_output2='$l_output2\n - \'$l_file\'' fi l_file='/etc/login.defs' &&
      file_umask_chk l_file='/etc/default/login' && file_umask_chk if [ -z
      '$l_output2' ]; then echo -e ' - No files contain a UMASK that is not
      restrictive enough\n No UMASK updates required to existing files' else echo -e
      '\n - UMASK is not restrictive enough in the following file(s):$l_output2\n\n-
      Remediation Procedure:\n - Update these files and comment out the UMASK line\n
      or update umask to be \'0027\' or more restrictive' fi if [ -n '$l_output' ];
      then echo -e '$l_output' else echo -e ' - Configure UMASK in a file in the
      \'/etc/profile.d/\' directory ending in \'.sh\'\n\n Example Command (Hash to
      represent being run at a root prompt):\n\n# printf '%s\\\n' \'umask 027\' >
      /etc/profile.d/50-systemwide_umask.sh\n' fi } Notes: • This method only
      applies to bash and shell. If other shells are supported on the system, it is
      recommended that their configuration files also are checked • If the
      pam_umask.so module is going to be used to set umask, ensure that it's not
      being overridden by another setting. Refer to the PAM_UMASK(8) man page for
      more information Default Value: UMASK 022 References: 1. NIST SP 800-53 Rev.
      5: AC-3, MP-2 Additional Information: • Other methods of setting a default
      user umask exist • If other methods are in use in your environment they should
      be audited • The default user umask can be overridden with a user specific
      umask • The user creating the directories or files has the discretion of
      changing the permissions: o Using the chmod command o Setting a different
      default umask by adding the umask command into a User Shell Configuration
      File, (.bashrc), in their home directory o Manually changing the umask for the
      duration of a login session by running the umask command

