  - rule_id: tciem.suse.use_of_privileged_commands_are_collected
    title: "Ensure use of privileged commands are collected"
    severity: medium
    mitre_technique: T1068
    mitre_tactic: privilege_escalation
    cis_control: '6.3.3.6'
    cis_section: '6'
    log_source: "/var/log/messages, auditd"
    detection:
      event_type: privilege_change
      filters:
        action_in: [GRANT, ROLE_ADD, ELEVATION, SUDO]
        target_privilege_in: [admin, superuser, root, dba, wheel]
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Edit or create a file in the /etc/audit/rules.d/ directory, ending in .rules
      extension, with the relevant rules to monitor the use of privileged commands.
      Example script: #!/usr/bin/env bash { UID_MIN=$(awk '/^\s*UID_MIN/{print $2}'
      /etc/login.defs) AUDIT_RULE_FILE='/etc/audit/rules.d/50-privileged.rules'
      NEW_DATA=() for PARTITION in $(findmnt -n -l -k -it $(awk '/nodev/ { print $2
      }' /proc/filesystems | paste -sd,) | grep -Pv 'noexec|nosuid' | awk '{print
      $1}'); do readarray -t DATA < <(find '${PARTITION}' -xdev -perm /6000 -type f
      | awk -v UID_MIN=${UID_MIN} '{print '-a always,exit -F path=' $1 ' -F perm=x
      -F auid>='UID_MIN' -F auid!=unset -k privileged' }') for ENTRY in
      '${DATA[@]}'; do NEW_DATA+=('${ENTRY}') done done readarray &> /dev/null -t
      OLD_DATA < '${AUDIT_RULE_FILE}' COMBINED_DATA=( '${OLD_DATA[@]}'
      '${NEW_DATA[@]}' ) printf '%s\n' '${COMBINED_DATA[@]}' | sort -u >
      '${AUDIT_RULE_FILE}' } Merge and load the rules into active configuration: #
      augenrules --load Check if reboot is required. # if [[ $(auditctl -s | grep
      'enabled') =~ '2' ]]; then printf 'Reboot required to load rules\n'; fi
