# SUSE — CIEM Detection Rules
# Real-time authentication & access event analysis
# Log source: /var/log/messages, auditd

tech_type: suse
category: linux
log_source: /var/log/messages, auditd

rules:

  - rule_id: tciem.suse.separate_partition_exists_for_var_log_audit
    title: "Ensure separate partition exists for /var/log/audit"
    severity: medium
    mitre_technique: T1562
    mitre_tactic: defense_evasion
    cis_control: '1.1.2.7.1'
    cis_section: '1'
    log_source: "/var/log/messages, auditd"
    detection:
      event_type: audit_event
      filters:
        change_type: security_relevant
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      For new installations, during installation create a custom partition setup and
      specify a separate partition for /var/log/audit. For systems that were
      previously installed, create a new partition and configure /etc/fstab as
      appropriate. References: 1. AJ Lewis, 'LVM HOWTO', http://tldp.org/HOWTO/LVM-
      HOWTO/ 2. NIST SP 800-53 Rev. 5: CM-7 CM-6 b 3. NIST SP 800-53A :: CM-6.1 (iv)
      4. RHEL 8 STIG Vul ID: V-230294 5. RHEL 8 STIG Rule ID: SV-230294r627750
      Additional Information: When modifying /var/log/audit it is advisable to bring
      the system to emergency mode (so auditd is not running), rename the existing
      directory, mount the new file system, and migrate the data over before
      returning to multi-user mode.

  - rule_id: tciem.suse.nodev_option_set_on_var_log_audit_partition
    title: "Ensure nodev option set on /var/log/audit partition"
    severity: high
    mitre_technique: T1562
    mitre_tactic: defense_evasion
    cis_control: '1.1.2.7.2'
    cis_section: '1'
    log_source: "/var/log/messages, auditd"
    detection:
      event_type: audit_event
      filters:
        change_type: security_relevant
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      - IF - a separate partition exists for /var/log/audit. Edit the /etc/fstab
      file and add nodev to the fourth field (mounting options) for the
      /var/log/audit partition. Example: <device> /var/log/audit <fstype>
      defaults,rw,nosuid,nodev,noexec,relatime 0 0 Run the following command to
      remount /var/log/audit with the configured options: # mount -o remount
      /var/log/audit References: 1. See the fstab(5) manual page for more
      information. 2. NIST SP 800-53 Rev. 5: AC-3, MP-2 3. NIST SP 800-53 Revision 5
      :: CM-7 (2) 4. RHEL 8 STIG Vul ID: V-230517 5. RHEL 8 STIG Rule ID:
      SV-230517r854058

