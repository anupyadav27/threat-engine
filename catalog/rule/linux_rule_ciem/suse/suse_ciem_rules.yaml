        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Edit the /etc/login.defs file and modify ENCRYPT_METHOD to SHA512:
      ENCRYPT_METHOD sha512 Note: • Any system accounts that need to be expired
      should be carefully done separately by the system administrator to prevent any
      potential problems. • If it is determined that the password algorithm being
      used is not SHA-512, once it is changed, it is recommended that all user ID's
      be immediately expired and forced to change their passwords on next login, In
      accordance with local site policies. • To accomplish this, the following
      command can be used: # awk -F: '( $3<''$(awk '/^\s*UID_MIN/{print $2}'
      /etc/login.defs)'' && $1 != 'nfsnobody' ) { print $1 }' /etc/passwd | xargs -n
      1 chage -d 0 Default Value: ENCRYPT_METHOD sha512

