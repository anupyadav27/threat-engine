  - rule_id: tciem.rhel.sudo_commands_use_pty_2
    title: "Ensure sudo commands use pty"
    severity: high
    mitre_technique: T1068
    mitre_tactic: privilege_escalation
    cis_control: '5.2.2'
    cis_section: '5'
    log_source: "/var/log/secure, auditd"
    detection:
      event_type: privilege_change
      filters:
        action_in: [GRANT, ROLE_ADD, ELEVATION, SUDO]
        target_privilege_in: [admin, superuser, root, dba, wheel]
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Edit the file /etc/sudoers with visudo or a file in /etc/sudoers.d/ with
      visudo -f <PATH TO FILE> and add the following line: Defaults use_pty Edit the
      file /etc/sudoers with visudo and any files in /etc/sudoers.d/ with visudo -f
      <PATH TO FILE> and remove any occurrence of !use_pty Note: • sudo will read
      each file in /etc/sudoers.d, skipping file names that end in ~ or contain a .
      character to avoid causing problems with package manager or editor
      temporary/backup files. • Files are parsed in sorted lexical order. That is,
      /etc/sudoers.d/01_first will be parsed before /etc/sudoers.d/10_second. • Be
      aware that because the sorting is lexical, not numeric,
      /etc/sudoers.d/1_whoops would be loaded after /etc/sudoers.d/10_second. •
      Using a consistent number of leading zeroes in the file names can be used to
      avoid such problems. References: 1. SUDO(8) 2. VISUDO(8) 3. sudoers(5) 4. NIST
      SP 800-53 Rev. 5: AC-6

