  - rule_id: tciem.rhel.changes_to_system_administration_scope_sudoers_is_2
    title: "Ensure changes to system administration scope (sudoers) is collected"
    severity: medium
    mitre_technique: T1068
    mitre_tactic: privilege_escalation
    cis_control: '6.3.3.1'
    cis_section: '6'
    log_source: "/var/log/secure, auditd"
    detection:
      event_type: privilege_change
      filters:
        action_in: [GRANT, ROLE_ADD, ELEVATION, SUDO]
        target_privilege_in: [admin, superuser, root, dba, wheel]
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Edit or create a file in the /etc/audit/rules.d/ directory, ending in .rules
      extension, with the relevant rules to monitor scope changes for system
      administrators. Example: # printf '%s\n' '-w /etc/sudoers -p wa -k scope' '-w
      /etc/sudoers.d -p wa -k scope' >> /etc/audit/rules.d/50-scope.rules Merge and
      load the rules into active configuration: # augenrules --load Check if reboot
      is required. # if [[ $(auditctl -s | grep 'enabled') =~ '2' ]]; then printf
      'Reboot required to load rules\n'; fi References: 1. NIST SP 800-53 Rev. 5:
      AU-3 Additional Information: Potential reboot required If the auditing
      configuration is locked (-e 2), then augenrules will not warn in any way that
      rules could not be loaded into the running configuration. A system reboot will
      be required to load the rules into the running configuration. System call
      structure For performance (man 7 audit.rules) reasons it is preferable to have
      all the system calls on one line. However, your configuration may have them on
      one line each or some other combination. This is important to understand for
      both the auditing and remediation sections as the examples given are optimized
      for performance as per the man page.

