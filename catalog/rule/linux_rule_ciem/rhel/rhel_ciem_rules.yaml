  - rule_id: tciem.rhel.gdm_login_banner_is_configured
    title: "Ensure GDM login banner is configured"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '1.8.2'
    cis_section: '1'
    log_source: "/var/log/secure, auditd"
    detection:
      event_type: authentication_success
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Run the following script to verify that the banner message is enabled and set:
      #!/usr/bin/env bash { l_pkgoutput='' if command -v dpkg-query > /dev/null
      2>&1; then l_pq='dpkg-query -W' elif command -v rpm > /dev/null 2>&1; then
      l_pq='rpm -q' fi l_pcl='gdm gdm3' # Space separated list of packages to check
      for l_pn in $l_pcl; do $l_pq '$l_pn' > /dev/null 2>&1 &&
      l_pkgoutput='$l_pkgoutput\n - Package: \'$l_pn\' exists on the system\n -
      checking configuration' done if [ -n '$l_pkgoutput' ]; then l_gdmprofile='gdm'
      # Set this to desired profile name IaW Local site policy
      l_bmessage=''Authorized uses only. All activity may be monitored and
      reported'' # Set to desired banner message if [ ! -f
      '/etc/dconf/profile/$l_gdmprofile' ]; then echo 'Creating profile
      \'$l_gdmprofile\'' echo -e 'user-db:user\nsystem-db:$l_gdmprofile\nfile-
      db:/usr/share/$l_gdmprofile/greeter-dconf-defaults' >
      /etc/dconf/profile/$l_gdmprofile fi if [ ! -d '/etc/dconf/db/$l_gdmprofile.d/'
      ]; then echo 'Creating dconf database directory
      \'/etc/dconf/db/$l_gdmprofile.d/\'' mkdir /etc/dconf/db/$l_gdmprofile.d/ fi if
      ! grep -Piq '^\h*banner-message-enable\h*=\h*true\b'
      /etc/dconf/db/$l_gdmprofile.d/*; then echo 'creating gdm keyfile for machine-
      wide settings' if ! grep -Piq -- '^\h*banner-message-enable\h*=\h*'
      /etc/dconf/db/$l_gdmprofile.d/*; then
      l_kfile='/etc/dconf/db/$l_gdmprofile.d/01-banner-message' echo -e
      '\n[org/gnome/login-screen]\nbanner-message-enable=true' >> '$l_kfile' else
      l_kfile='$(grep -Pil -- '^\h*banner-message-enable\h*=\h*'
      /etc/dconf/db/$l_gdmprofile.d/*)' ! grep -Pq '^\h*\[org\/gnome\/login-
      screen\]' '$l_kfile' && sed -ri '/^\s*banner- message-enable/
      i\[org/gnome/login-screen]' '$l_kfile' ! grep -Pq '^\h*banner-message-
      enable\h*=\h*true\b' '$l_kfile' && sed -ri 's/^\s*(banner-message-
      enable\s*=\s*)(\S+)(\s*.*$)/\1true \3//' '$l_kfile' # sed -ri
      '/^\s*\[org\/gnome\/login-screen\]/ a\\nbanner-message-enable=true' '$l_kfile'
      fi fi if ! grep -Piq '^\h*banner-message-text=[\'\']+\S+' '$l_kfile'; then sed
      -ri '/^\s*banner-message-enable/ a\banner-message-text=$l_bmessage' '$l_kfile'
      fi dconf update else echo -e '\n\n - GNOME Desktop Manager isn't installed\n -
      Recommendation is Not Applicable\n - No remediation required\n' fi } Note: •
      There is no character limit for the banner message. gnome-shell autodetects
      longer stretches of text and enters two column mode. • The banner message
      cannot be read from an external file. - OR - Run the following command to
      remove the gdm package: # dnf remove gdm Default Value: disabled References:
      1. https://help.gnome.org/admin/system-admin-guide/stable/login-banner.html.en
      Additional Information: Additional options and sections may appear in the
      /etc/dconf/db/gdm.d/01-banner- message file. If a different GUI login service
      is in use, consult your documentation and apply an equivalent banner. MITRE
      ATT&CK Mappings: Techniques / Sub- techniques Tactics Mitigations TA0007

  - rule_id: tciem.rhel.gdm_disable_user_list_option_is_enabled
    title: "Ensure GDM disable-user-list option is enabled"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '1.8.3'
    cis_section: '1'
    log_source: "/var/log/secure, auditd"
    detection:
      event_type: authentication_success
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Run the following script to enable the disable-user-list option: Note: the
      l_gdm_profile variable in the script can be changed if a different profile
      name is desired in accordance with local site policy. #!/usr/bin/env bash {
      l_gdmprofile='gdm' if [ ! -f '/etc/dconf/profile/$l_gdmprofile' ]; then echo
      'Creating profile \'$l_gdmprofile\'' echo -e 'user-db:user\nsystem-
      db:$l_gdmprofile\nfile- db:/usr/share/$l_gdmprofile/greeter-dconf-defaults' >
      /etc/dconf/profile/$l_gdmprofile fi if [ ! -d '/etc/dconf/db/$l_gdmprofile.d/'
      ]; then echo 'Creating dconf database directory
      \'/etc/dconf/db/$l_gdmprofile.d/\'' mkdir /etc/dconf/db/$l_gdmprofile.d/ fi if
      ! grep -Piq '^\h*disable-user-list\h*=\h*true\b'
      /etc/dconf/db/$l_gdmprofile.d/*; then echo 'creating gdm keyfile for machine-
      wide settings' if ! grep -Piq -- '^\h*\[org\/gnome\/login-screen\]'
      /etc/dconf/db/$l_gdmprofile.d/*; then echo -e '\n[org/gnome/login-screen]\n#
      Do not show the user list\ndisable-user-list=true' >>
      /etc/dconf/db/$l_gdmprofile.d/00-login- screen else sed -ri
      '/^\s*\[org\/gnome\/login-screen\]/ a\# Do not show the user list\ndisable-
      user-list=true' $(grep -Pil -- '^\h*\[org\/gnome\/login- screen\]'
      /etc/dconf/db/$l_gdmprofile.d/*) fi fi dconf update } Note: When the user
      profile is created or changed, the user will need to log out and log in again
      before the changes will be applied. - OR - Run the following command to remove
      the GNOME package: # dnf remove gdm Default Value: false References: 1.
      https://help.gnome.org/admin/system-admin-guide/stable/login-userlist-
      disable.html.en Additional Information: If a different GUI login service is in
      use and required on the system, consult your documentation to disable
      displaying the user list MITRE ATT&CK Mappings: Techniques / Sub- techniques
      Tactics Mitigations T1078, T1078.001, T1078.002, T1078.003, T1087, T1087.001,
      T1087.002 TA0007 M1028

