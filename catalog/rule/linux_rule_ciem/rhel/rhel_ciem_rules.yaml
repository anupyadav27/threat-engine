  - rule_id: tciem.rhel.access_to_bootloader_config_is_configured
    title: "Ensure access to bootloader config is configured"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '1.4.2'
    cis_section: '1'
    log_source: "/var/log/secure, auditd"
    detection:
      event_type: resource_access
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Run the following to update the mode, ownership, and group ownership of the
      grub configuration files: - IF - the system uses UEFI (Files located in
      /boot/efi/EFI/*) Edit /etc/fstab and add the fmask=0077, uid=0, and gid=0
      options: Example: <device> /boot/efi vfat
      defaults,umask=0027,fmask=0077,uid=0,gid=0 0 0 Note: This may require a re-
      boot to enable the change - OR - - IF - the system uses BIOS (Files located in
      /boot/grub2/*) Run the following commands to set ownership and permissions on
      your grub configuration file(s): # [ -f /boot/grub2/grub.cfg ] && chown
      root:root /boot/grub2/grub.cfg # [ -f /boot/grub2/grub.cfg ] && chmod u-x,go-
      rwx /boot/grub2/grub.cfg # [ -f /boot/grub2/grubenv ] && chown root:root
      /boot/grub2/grubenv # [ -f /boot/grub2/grubenv ] && chmod u-x,go-rwx
      /boot/grub2/grubenv # [ -f /boot/grub2/user.cfg ] && chown root:root
      /boot/grub2/user.cfg # [ -f /boot/grub2/user.cfg ] && chmod u-x,go-rwx
      /boot/grub2/user.cfg References: 1. NIST SP 800-53 Rev. 5: AC-3 Additional
      Information: This recommendation is designed around the grub bootloader, if
      LILO or another bootloader is in use in your environment enact equivalent
      settings.

  - rule_id: tciem.rhel.message_of_the_day_is_configured_properly
    title: "Ensure message of the day is configured properly"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '1.7.1'
    cis_section: '1'
    log_source: "/var/log/secure, auditd"
    detection:
      event_type: authentication_success
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Edit the file found in /etc/motd.d/* with the appropriate contents according
      to your site policy, remove any instances of \m , \r , \s , \v or references
      to the OS platform - OR - - IF - the motd is not used, this file can be
      removed. Run the following command to remove the motd file: # rm /etc/motd Run
      the following script and review and/or update all returned files' contents to:
      • Remove all system information (\v, \r; \m, \s) • Remove any refence to the
      operating system • Ensure contents follow local site policy #!/usr/bin/env
      bash { a_files=() for l_file in /etc/motd{,.d/*}; do if grep -Psqi --
      '(\\\v|\\\r|\\\m|\\\s|\b$(grep ^ID= /etc/os-release | cut -d= -f2 | sed -e
      's/'//g')\b)' '$l_file'; then echo -e '\n - File: \'$l_file\' includes system
      information. Edit this file to remove these entries' else a_files+=('$l_file')
      fi done if [ '${#a_files[@]}' -gt 0 ]; then echo -e '\n- ** Please review the
      following files and verify their contents follow local site policy **\n'
      printf '%s\n' '${a_files[@]}' fi } References: 1. NIST SP 800-53 Rev. 5: CM-6,
      CM-1, CM-3 MITRE ATT&CK Mappings: Techniques / Sub- techniques Tactics
      Mitigations T1082, T1082.000, T1592, T1592.004 TA0007

