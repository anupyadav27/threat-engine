        target_privilege_in: [admin, superuser, root, dba, wheel]
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Set password unlock time to conform to site policy. unlock_time should be 0
      (never), or 900 seconds or greater. Edit /etc/security/faillock.conf and
      update or add the following line: unlock_time = 900 Run the following script
      to remove the unlock_time argument from the pam_faillock.so module in the PAM
      files: #!/usr/bin/env bash { for l_pam_file in system-auth password-auth; do
      l_authselect_file='/etc/authselect/$(head -1 /etc/authselect/authselect.conf |
      grep 'custom/')/$l_pam_file' sed -ri
      's/(^\s*auth\s+(requisite|required|sufficient)\s+pam_faillock\.so.*)(\s+unloc
      k_time\s*=\s*\S+)(.*$)/\1\4/' '$l_authselect_file' done authselect apply-
      changes } `` Default Value: unlock_time = 600 Additional Information: If a
      user has been locked out because they have reached the maximum consecutive
      failure count defined by deny= in the pam_faillock.so module, the user can be
      unlocked by issuing the command faillock --user <USERNAME> --reset. This
      command sets the failed count to 0, effectively unlocking the user.

  - rule_id: tciem.rhel.password_failed_attempts_lockout_includes_root
    title: "Ensure password failed attempts lockout includes root account"
