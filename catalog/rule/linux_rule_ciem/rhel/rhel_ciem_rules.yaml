    response: alert
    remediation: >
      Edit the file /etc/sudoers or a file in /etc/sudoers.d/ with visudo -f <PATH
      TO FILE> and add the following line: Defaults logfile='<PATH TO CUSTOM LOG
      FILE>' Example Defaults logfile='/var/log/sudo.log' Notes: • sudo will read
      each file in /etc/sudoers.d, skipping file names that end in ~ or contain a .
      character to avoid causing problems with package manager or editor
      temporary/backup files. • Files are parsed in sorted lexical order. That is,
      /etc/sudoers.d/01_first will be parsed before /etc/sudoers.d/10_second. • Be
      aware that because the sorting is lexical, not numeric,
      /etc/sudoers.d/1_whoops would be loaded after /etc/sudoers.d/10_second. •
      Using a consistent number of leading zeroes in the file names can be used to
      avoid such problems. References: 1. SUDO(8) 2. VISUDO(8) 3. sudoers(5) 4. NIST
      SP 800-53 Rev. 5: AU-3, AU-12 Additional Information: visudo edits the sudoers
      file in a safe fashion, analogous to vipw(8). visudo locks the sudoers file
      against multiple simultaneous edits, provides basic sanity checks, and checks
      for parse errors. If the sudoers file is currently being edited you will
      receive a message to try again later.

