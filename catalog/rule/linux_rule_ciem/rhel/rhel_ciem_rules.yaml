    response: alert
    remediation: >
      Edit /etc/security/faillock.conf: • Remove or update any line containing
      root_unlock_time, - OR - set it to a value of 60 or more • Update or add the
      following line: even_deny_root Run the following script to remove the
      even_deny_root and root_unlock_time arguments from the pam_faillock.so module
      in the PAM files: #!/usr/bin/env bash { for l_pam_file in system-auth
      password-auth; do l_authselect_file='/etc/authselect/$(head -1
      /etc/authselect/authselect.conf | grep 'custom/')/$l_pam_file' sed -ri
      's/(^\s*auth\s+(.*)\s+pam_faillock\.so.*)(\s+even_deny_root)(.*$)/\1\4/'
      '$l_authselect_file' sed -ri
      's/(^\s*auth\s+(.*)\s+pam_faillock\.so.*)(\s+root_unlock_time\s*=\s*\S+)(.*$)
      /\1\4/' '$l_authselect_file' done authselect apply-changes } `` Default Value:
      disabled Additional Information: If a user has been locked out because they
      have reached the maximum consecutive failure count defined by deny= in the
      pam_faillock.so module, the user can be unlocked by issuing the command
      faillock --user <USERNAME> --reset. This command sets the failed count to 0,
      effectively unlocking the user.

  - rule_id: tciem.rhel.pam_unix_does_not_include_nullok_2
    title: "Ensure pam_unix does not include nullok"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '5.3.3.4.1'
    cis_section: '5'
    log_source: "/var/log/secure, auditd"
    detection:
      event_type: authentication_success
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Run the following script to verify that the active authselect profile's
      system-auth and password-auth files include {if not 'without-nullok':nullok} -
      OR - don't include the nullok option on the pam_unix.so module: {
      l_module_name='unix' l_profile_name='$(head -1
      /etc/authselect/authselect.conf)' if [[ ! '$l_profile_name' =~ ^custom\/ ]];
      then echo ' - Follow Recommendation \'Ensure custom authselect profile is
      used\' and then return to this Recommendation' else grep -P --
      '\bpam_$l_module_name\.so\b'
      /etc/authselect/$l_profile_name/{password,system}-auth fi } Example output
      with a custom profile named 'custom-profile': /etc/authselect/custom/custom-
      profile/password-auth:auth sufficient pam_unix.so {if not 'without-
      nullok':nullok} /etc/authselect/custom/custom-profile/password-auth:account
      required pam_unix.so /etc/authselect/custom/custom-profile/password-
      auth:password sufficient pam_unix.so sha512 shadow {if not 'without-
      nullok':nullok} use_authtok /etc/authselect/custom/custom-profile/password-
      auth:session required pam_unix.so /etc/authselect/custom/custom-
      profile/system-auth:auth sufficient pam_unix.so {if not 'without-
      nullok':nullok} /etc/authselect/custom/custom-profile/system-auth:account
      required pam_unix.so /etc/authselect/custom/custom-profile/system-
      auth:password sufficient pam_unix.so sha512 shadow {if not 'without-
      nullok':nullok} use_authtok /etc/authselect/custom/custom-profile/system-
      auth:session required pam_unix.so - IF - any line is returned with nullok that
      doesn't also include {if not 'without- nullok':nullok}, run the following
      script: #!/usr/bin/env bash { for l_pam_file in system-auth password-auth; do
      l_file='/etc/authselect/$(head -1 /etc/authselect/authselect.conf | grep
      'custom/')/$l_pam_file' sed -ri
      's/(^\s*password\s+(requisite|required|sufficient)\s+pam_unix\.so\s+.*)(nullo
      k)(\s*.*)$/\1\2\4/g' $l_file done } - IF - any line is returned with {if not
      'without-nullok':nullok}, run the following command to enable the authselect
      without-nullok feature: # authselect enable-feature without-nullok Run the
      following command to update the files in /etc/pam.d to include pam_unix.so
      without the nullok argument: # authselect apply-changes

  - rule_id: tciem.rhel.password_expiration_is_configured
    title: "Ensure password expiration is configured"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '5.4.1.1'
    cis_section: '5'
    log_source: "/var/log/secure, auditd"
    detection:
      event_type: authentication_success
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Set the PASS_MAX_DAYS parameter to conform to site policy in /etc/login.defs :
      PASS_MAX_DAYS 365 Modify user parameters for all users with a password set to
      match: # chage --maxdays 365 <user> Edit /etc/login.defs and set PASS_MAX_DAYS
      to a value greater than 0 that follows local site policy: Example:
      PASS_MAX_DAYS 365 Run the following command to modify user parameters for all
      users with a password set to a maximum age no greater than 365 or less than 1
      that follows local site policy: # chage --maxdays <N> <user> Example: # awk
      -F: '($2~/^\$.+\$/) {if($5 > 365 || $5 < 1)system ('chage --maxdays 365 '
      $1)}' /etc/shadow Warning: If a password has been set at system install or
      kickstart, the last change date field is not set, In this case, setting
      PASS_MAX_DAYS will immediately expire the password. One possible solution is
      to populate the last change date field through a command like: chage -d
      '$(date +%Y-%m-%d)' root Default Value: PASS_MAX_DAYS 99999 References: 1. CIS
      Password Policy Guide 2. NIST SP 800-53 Rev. 5: CM-1, CM-2, CM-6, CM-7, IA-5
      Additional Information: A value of -1 will disable password expiration.

