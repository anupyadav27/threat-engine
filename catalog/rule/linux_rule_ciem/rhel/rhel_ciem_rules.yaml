    mitre_tactic: initial_access
    cis_control: '5.4.2.8'
    cis_section: '5'
    log_source: "/var/log/secure, auditd"
    detection:
      event_type: authentication_success
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Run the following command to lock any non-root accounts without a valid login
      shell returned by the audit: # usermod -L <user> Example script: :
      #!/usr/bin/env bash { l_valid_shells='^($(awk -F\/ '$NF != 'nologin' {print}'
      /etc/shells | sed -rn '/^\//{s,/,\\\\/,g;p}' | paste -s -d '|' - ))$' while
      IFS= read -r l_user; do passwd -S '$l_user' | awk '$2 !~ /^L/ {system
      ('usermod -L ' $1)}' done < <(awk -v pat='$l_valid_shells' -F: '($1 != 'root'
      && $(NF) !~ pat) {print $1}' /etc/passwd) } References: 1. NIST SP 800-53 Rev.
      5: AC-2(5), AC-3, AC-11, MP-2

