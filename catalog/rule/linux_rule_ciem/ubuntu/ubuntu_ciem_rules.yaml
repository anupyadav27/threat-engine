  - rule_id: tciem.ubuntu.access_to_all_logfiles_has_been_configured
    title: "Ensure access to all logfiles has been configured"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '6.1.4.1'
    cis_section: '6'
