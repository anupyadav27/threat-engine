      single line, in one and only one of the following locations: o A file in the
      /etc/profile.d/ directory ending in .sh o /etc/profile o /etc/bash.bashrc •
      Not exceed 900 • Not be equal to 0 Multiple line example: TMOUT=900 readonly
      TMOUT export TMOUT Single line example: readonly TMOUT=900 ; export TMOUT
      References: 1. NIST SP 800-53 Rev. 5: AC-11 Additional Information: The audit
      and remediation in this recommendation apply to bash and shell. If other
      shells are supported on the system, it is recommended that their configuration
      files are also checked Other methods of setting a timeout exist not covered
      here

