  - rule_id: tciem.ubuntu.lockout_for_failed_password_attempts_is_configured
    title: "Ensure lockout for failed password attempts is configured"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '4.4.2'
    cis_section: '4'
    log_source: "/var/log/auth.log, auditd"
    detection:
      event_type: authentication_success
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Edit the /etc/pam.d/common-auth file and add the auth line below: auth
      required pam_tally2.so onerr=fail audit silent deny=5 unlock_time=900 Edit the
      /etc/pam.d/common-account file and add the account lines bellow: account
      requisite pam_deny.so account required pam_tally2.so References: 1. NIST SP
      800-53 Rev. 5: AC-1, AC-2 Additional Information: • Add pam_tally2 to the
      account section account required pam_tally2.so for the counter to reset to 0
      when using sudo • Use of the 'audit' keyword may log credentials in the case
      of user error during authentication. This risk should be evaluated in the
      context of the site policies of your organization. • If a user has been locked
      out because they have reached the maximum consecutive failure count defined by
      deny= in the pam_tally2.so module, the user can be unlocked by issuing the
      command /sbin/pam_tally2 -u <username> -- reset. This command sets the failed
      count to 0, effectively unlocking the user.

  - rule_id: tciem.ubuntu.strong_password_hashing_algorithm_is_configured
    title: "Ensure strong password hashing algorithm is configured"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '4.4.4'
    cis_section: '4'
