      in minutes. This particular entry may appear on it's own, or on the same line
      as env_reset. See the following two examples: Defaults env_reset,
      timestamp_timeout=15 Defaults timestamp_timeout=15 Defaults env_reset
      References: 1. https://www.sudo.ws/man/1.9.0/sudoers.man.html 2. NIST SP
      800-53 Rev. 5: AC-6

  - rule_id: tciem.ubuntu.access_to_the_su_command_is_restricted
