  - rule_id: tciem.ubuntu.gdm_login_banner_is_configured
    title: "Ensure GDM login banner is configured"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '1.7.2'
    cis_section: '1'
    log_source: "/var/log/auth.log, auditd"
    detection:
      event_type: authentication_success
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      - IF - A user profile is already created run the following commands to set and
      enable the text banner message on the login screen: # gsettings set
      org.gnome.login-screen banner-message-text 'Authorized uses only. All activity
      may be monitored and reported' # gsettings set org.gnome.login-screen banner-
      message-enable true Note: • banner-message-text may be set in accordance with
      local site policy • gsettings commands in this section MUST be done from a
      command window on a graphical desktop or an error will be returned. • The
      system must be restarted after all gsettings configurations have been set in
      order for CIS-CAT Assessor to appropriately assess. - OR/IF - A user profile
      does not exist: 1. Create or edit the gdm profile in the
      /etc/dconf/profile/gdm with the following lines: user-db:user system-db:gdm
      file-db:/usr/share/gdm/greeter-dconf-defaults Note: gdm is the name of a dconf
      database. 2. Create a gdm keyfile for machine-wide settings in
      /etc/dconf/db/gdm.d/01- banner-message: [org/gnome/login-screen] banner-
      message-enable=true banner-message-text='Type the banner message here.' 3.
      Update the system databases # dconf update Note: • Users must log out and back
      in again before the system-wide settings take effect. • There is no character
      limit for the banner message. gnome-shell autodetects longer stretches of text
      and enters two column mode. • The banner message cannot be read from an
      external file. Default Value: disabled References: 1.
      https://help.gnome.org/admin/system-admin-guide/stable/login-banner.html.en 2.
      NIST SP 800-53 Rev. 5: CM-1,CM-2, CM-6, CM-7, IA-5 Additional Information:
      Additional options and sections may appear in the
      /etc/dconf/db/gdm.d/01-banner- message file. If a different GUI login service
      is in use, consult your documentation and apply an equivalent banner. MITRE
      ATT&CK Mappings: Techniques / Sub- techniques Tactics Mitigations T1078,
      T1078.001, T1078.002, T1078.003, T1087, T1087.001, T1087.002 TA0007 M1028

  - rule_id: tciem.ubuntu.gdm_disable_user_list_option_is_enabled
    title: "Ensure GDM disable-user-list option is enabled"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '1.7.3'
    cis_section: '1'
    log_source: "/var/log/auth.log, auditd"
    detection:
      event_type: authentication_success
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      - IF - A user profile exists run the following command to enable the disable-
      user- list: # gsettings set org.gnome.login-screen disable-user-list true
      Note: • gsettings commands in this section MUST be done from a command window
      on a graphical desktop or an error will be returned. • The system must be
      restarted after all gsettings configurations have been set in order for CIS-
      CAT Assessor to appropriately assess. - OR/IF - A user profile does not exist:
      1. Create or edit the gdm profile in /etc/dconf/profile/gdm with the following
      lines: user-db:user system-db:gdm file-db:/usr/share/gdm/greeter-dconf-
      defaults Note: gdm is the name of a dconf database. 2. Create a gdm keyfile
      for machine-wide settings in /etc/dconf/db/gdm.d/00- login-screen:
      [org/gnome/login-screen] # Do not show the user list disable-user-list=true 3.
      Update the system databases: # dconf update Note: When the user profile is
      created or changed, the user will need to log out and log in again before the
      changes will be applied. Default Value: false References: 1.
      https://help.gnome.org/admin/system-admin-guide/stable/login-userlist-
      disable.html.en 2. NIST SP 800-53 Rev. 5: CM-1,CM-2, CM-6, CM-7, IA-5
      Additional Information: If a different GUI login service is in use and
      required on the system, consult your documentation to disable displaying the
      user list MITRE ATT&CK Mappings: Techniques / Sub- techniques Tactics
      Mitigations T1078, T1078.001, T1078.002, T1078.003, T1087, T1087.001,
      T1087.002 TA0007 M1028

  - rule_id: tciem.ubuntu.xdmcp_is_not_enabled
    title: "Ensure XDMCP is not enabled"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '1.7.10'
    cis_section: '1'
    log_source: "/var/log/auth.log, auditd"
    detection:
      event_type: resource_access
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Edit all files returned by the audit and remove or commend out the Enable=true
      line in the [xdmcp] block: Example file: # GDM configuration storage # # See
      /usr/share/gdm/gdm.schemas for a list of available options. [daemon] #
      Uncomment the line below to force the login screen to use Xorg
      #WaylandEnable=false # Enabling automatic login # AutomaticLoginEnable = true
      # AutomaticLogin = user1 # Enabling timed login # TimedLoginEnable = true #
      TimedLogin = user1 # TimedLoginDelay = 10 [security] [xdmcp] # Enable=true <-
      **This line should be removed or commented out** [chooser] [debug] # Uncomment
      the line below to turn on debugging # More verbose logs # Additionally lets
      the X server dump core if it crashes #Enable=true Default Value: false (This
      is denoted by no Enabled= entry in the [xdmcp] block References: 1. NIST SP
      800-53 Rev. 5: SI-4

