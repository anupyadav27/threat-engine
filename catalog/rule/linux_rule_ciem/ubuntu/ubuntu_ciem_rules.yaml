      p+i+n+u+g+s+b+acl+xattrs+sha512' >> /etc/aide/aide.conf Note: - IF -
      /etc/aide/aide.conf includes a @@x_include statement: • <DIRECTORY> and each
      executable config file must be owned by the current user or root • They must
      not be group or world-writable Example: @@x_include /etc/aide.conf.d
      ^[a-zA-Z0-9_-]+$ References: 1. AIDE.CONF(5) MITRE ATT&CK Mappings: Techniques
      / Sub- techniques Tactics Mitigations T1070, T1070.002, T1083, T1083.000
      TA0007 7 System Maintenance Recommendations in this section are intended as
      maintenance and are intended to be checked on a frequent basis to ensure
      system stability. Many recommendations do not have quick remediations and
