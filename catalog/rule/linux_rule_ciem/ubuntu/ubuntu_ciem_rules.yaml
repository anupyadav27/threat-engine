  - rule_id: tciem.ubuntu.access_to_bootloader_config_is_configured
    title: "Ensure access to bootloader config is configured"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '1.4.2'
    cis_section: '1'
    log_source: "/var/log/auth.log, auditd"
    detection:
      event_type: resource_access
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Run the following commands to set permissions on your grub configuration: #
      chown root:root /boot/grub/grub.cfg # chmod u-x,go-rwx /boot/grub/grub.cfg
      Default Value: Access: (0644/-rw-r--r--) Uid: ( 0/ root) Gid: ( 0/ root)
      References: 1. NIST SP 800-53 Rev. 5: AC-3 Additional Information: This
      recommendation is designed around the grub bootloader, if LILO or another
      bootloader is in use in your environment enact equivalent settings. Replace
      /boot/grub/grub.cfg with the appropriate grub configuration file for your
      environment

  - rule_id: tciem.ubuntu.ptrace_scope_is_restricted
    title: "Ensure ptrace_scope is restricted"
    severity: high
    mitre_technique: T1068
    mitre_tactic: privilege_escalation
    cis_control: '1.5.2'
    cis_section: '1'
    log_source: "/var/log/auth.log, auditd"
    detection:
      event_type: privilege_change
      filters:
        action_in: [GRANT, ROLE_ADD, ELEVATION, SUDO]
        target_privilege_in: [admin, superuser, root, dba, wheel]
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Set the kernel.yama.ptrace_scope parameter in /etc/sysctl.conf or a file in
      /etc/sysctl.d/ ending in .conf to a value of 1, 2, or 3:
      kernel.yama.ptrace_scope = 1 - OR - kernel.yama.ptrace_scope = 2 - OR -
      kernel.yama.ptrace_scope = 3 Example: # printf '%s\n'
      'kernel.yama.ptrace_scope = 1' >> /etc/sysctl.d/60- kernel_sysctl.conf Run the
      following command to set the active kernel parameter: # sysctl -w
      kernel.yama.ptrace_scope=1 Note: • If a value of 2 or 3 is preferred, or
      required by local site policy, replace the 1 with the desired value of 2 or 3
      in the example above • If this setting appears in a canonically later file, or
      later in the same file, the setting will be overwritten Default Value:
      kernel.yama.ptrace_scope = 0 References: 1.
      https://www.kernel.org/doc/Documentation/security/Yama.txt 2.
      https://github.com/raj3shp/termspy 3. NIST SP 800-53 Rev. 5: CM-6 Additional
      Information: Ptrace is very rarely used by regular applications and is mostly
      used by debuggers such as gdb and strace.

