      Install AppArmor. # apt install apparmor apparmor-utils References: 1. NIST SP
      800-53 Rev. 5: AC-3

  - rule_id: tciem.ubuntu.all_apparmor_profiles_are_in_enforce_or_complain
    title: "Ensure all AppArmor Profiles are in enforce or complain mode"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '1.3.1.3'
    cis_section: '1'
    log_source: "/var/log/auth.log, auditd"
    detection:
      event_type: resource_access
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Run the following command to set all profiles to enforce mode: # aa-enforce
      /etc/apparmor.d/* - OR - Run the following command to set all profiles to
      complain mode: # aa-complain /etc/apparmor.d/* Note: Any unconfined processes
      may need to have a profile created or activated for them and then be
      restarted. References: 1. NIST SP 800-53 Rev. 5: AC-3

