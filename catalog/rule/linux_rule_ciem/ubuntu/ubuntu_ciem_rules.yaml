      remove the unlock_time argument from the pam_faillock.so module in the PAM
      files: # grep -Pl -- '\bpam_faillock\.so\h+([^#\n\r]+\h+)?unlock_time\b'
      /usr/share/pam-configs/* Edit any returned files and remove the
      unlock_time=<N> argument from the pam_faillock.so line(s): Default Value:
      unlock_time = 600 Additional Information: If a user has been locked out
      because they have reached the maximum consecutive failure count defined by
      deny= in the pam_faillock.so module, the user can be unlocked by issuing the
      command faillock --user <USERNAME> --reset. This command sets the failed count
      to 0, effectively unlocking the user.

