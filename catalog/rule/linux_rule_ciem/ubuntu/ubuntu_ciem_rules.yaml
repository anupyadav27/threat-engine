      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Edit the /etc/motd file with the appropriate contents according to your site
      policy, remove any instances of \m , \r , \s , \v or references to the OS
      platform - OR - - IF - the motd is not used, this file can be removed. Run the
      following command to remove the motd file: # rm /etc/motd References: 1. NIST
      SP 800-53 Rev. 5: CM-6, CM-1, CM-3 MITRE ATT&CK Mappings: Techniques / Sub-
      techniques Tactics Mitigations T1082, T1082.000, T1592, T1592.004 TA0007

