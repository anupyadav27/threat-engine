  - rule_id: tciem.ubuntu.access_to_crontab_is_configured
    title: "Ensure access to crontab is configured"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '2.4.1.9'
    cis_section: '2'
    log_source: "/var/log/auth.log, auditd"
    detection:
      event_type: resource_access
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      - IF - cron is installed on the system: Run the following script to: • Create
      /etc/cron.allow if it doesn't exist • Change owner to user root • Change group
      owner to group root - OR - group crontab if it exists • Change mode to 640 or
      more restrictive #!/usr/bin/env bash { [ ! -e '/etc/cron.deny' ] && touch
      /etc/cron.allow chmod u-x,g-wx,o-rwx /etc/cron.allow if grep -Pq --
      '^\h*crontab\:' /etc/group; then chown root:crontab /etc/cron.allow else chown
      root:root /etc/cron.allow fi } - IF - /etc/cron.deny exists, run the following
      script to: • Change owner to user root • Change group owner to group root - OR
      - group crontab if it exists • Change mode to 640 or more restrictive
      #!/usr/bin/env bash { if [ -e '/etc/cron.deny' ]; then chmod u-x,g-wx,o-rwx
      /etc/cron.deny if grep -Pq -- '^\h*crontab\:' /etc/group; then chown
      root:crontab /etc/cron.deny else chown root:root /etc/cron.deny fi fi } Note:
      On systems where cron is configured to use the group crontab, if the group
      crontab is not set as the owner of cron.allow, then cron will deny access to
      all users and you will see an error similar to: You (<USERNAME>) are not
      allowed to use this program (crontab) See crontab(1) for more information
      References: 1. NIST SP 800-53 Rev. 5: AC-3. MP-2

  - rule_id: tciem.ubuntu.access_to_at_is_configured
    title: "Ensure access to at is configured"
