        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Note: • Pay special attention to the configuration. Incorrect configuration
      can cause system lock outs. • This is an example configuration. Your
      configuration may differ based on previous changes to the files. • The
      encryption method on the password success line for pam_unix.so and the
      ENCRYPT_METHOD line in /etc/login.defs should match. Edit the
      /etc/pam.d/common-password file and ensure that sha512 is included and the
      pam_unix.so success line: Example: password [success=1 default=ignore]
      pam_unix.so obscure sha512 use_authtok Edit /etc/login.defs and ensure that
      ENCRYPT_METHOD is set to SHA512. ENCRYPT_METHOD SHA512 Default Value: sha512
      References: 1. NIST SP 800-53 Rev. 5: IA-5, SC-28 Additional Information:
      Additional module options may be set, recommendation only covers those listed
      here. yescrypt has been included in the audit commands. This hashing algorithm
      is not currently supported, but it will be acceptable as an alternative to
      sha512 if future updates enable its support.

