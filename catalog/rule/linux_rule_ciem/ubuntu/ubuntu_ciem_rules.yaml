      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Run the following command to lock any non-root accounts without a valid login
      shell returned by the audit: # usermod -L <user> Example script: :
      #!/usr/bin/env bash { l_valid_shells='^($(awk -F\/ '$NF != 'nologin' {print}'
      /etc/shells | sed -rn '/^\//{s,/,\\\\/,g;p}' | paste -s -d '|' - ))$' while
