  - rule_id: tciem.ubuntu.default_user_umask_is_027_or_more_restrictive
    title: "Ensure default user umask is 027 or more restrictive"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '4.5.4'
    cis_section: '4'
    log_source: "/var/log/auth.log, auditd"
    detection:
      event_type: authentication_success
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Run the following command and remove or modify the umask of any returned
      files: # grep -RPi
      '(^|^[^#]*)\s*umask\s+([0-7][0-7][01][0-7]\b|[0-7][0-7][0-7][0-6]\b|[0-7][01][0-7]\b|[0-7][0-7][0-
      6]\b|(u=[rwx]{0,3},)?(g=[rwx]{0,3},)?o=[rwx]+\b|(u=[rwx]{1,3},)?g=[^rx]{1,3}(,o=[rwx]{0,3})?\b)'
      /etc/login.defs /etc/profile* /etc/bash.bashrc* Follow one of the following
      methods to set the default user umask: Edit /etc/login.defs and edit the UMASK
      and USERGROUPS_ENAB lines as follows: UMASK 027 USERGROUPS_ENAB no Edit
      /etc/pam.d/common-session and add or edit the following: session optional
      pam_umask.so OR Configure umask in one of the following files: • A file in the
      /etc/profile.d/ directory ending in .sh • /etc/profile • /etc/bash.bashrc
      Example: /etc/profile.d/set_umask.sh umask 027 Note: this method only applies
      to bash and shell. If other shells are supported on the system, it is
      recommended that their configuration files also are checked. Default Value:
      UMASK 022 References: 1. pam_umask(8) 2. NIST SP 800-53 Rev. 5: AC-3, MP-2
      Additional Information: • Other methods of setting a default user umask exist
      • If other methods are in use in your environment they should be audited • The
      default user umask can be overridden with a user specific umask • The user
      creating the directories or files has the discretion of changing the
      permissions: o Using the chmod command o Setting a different default umask by
      adding the umask command into a User Shell Configuration File, (.bashrc), in
      their home directory o Manually changing the umask for the duration of a login
      session by running the umask command

  - rule_id: tciem.ubuntu.default_user_shell_timeout_is_configured
    title: "Ensure default user shell timeout is configured"
    severity: high
