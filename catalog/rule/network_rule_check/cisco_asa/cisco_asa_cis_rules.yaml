# Cisco ASA Firewall — CIS Check Rules
# Source benchmark: CIS Cisco ASA 9.x
# Fill in rules per sprint. Each rule maps to a discovery_id above.

tech_type: cisco_asa
category: network
cis_benchmark: CIS Cisco ASA 9.x

rules:
  - rule_id: cisco_asa.cis.auth.password_policy_min_length
    title: "Ensure minimum password length is configured"
    severity: medium
    cis_section: '1'
    nist_controls: [IA-5]
    soc2_criteria: [CC6.1]
    scope: cisco_asa.auth.password_policy
    assertion:
      field: min_length
      operator: gte
      expected: 14
    remediation: >
      Configure minimum password length to 14+ characters in the Cisco ASA Firewall
      password policy settings.

  - rule_id: cisco_asa.cis.logging.audit_enabled
    title: "Ensure audit logging is enabled"
    severity: high
    cis_section: '1'
    nist_controls: [AU-2, AU-3]
    soc2_criteria: [CC7.2]
    scope: cisco_asa.logging.audit_config
    assertion:
      field: audit_enabled
      operator: equals
      expected: "true"
    remediation: >
      Enable audit logging in Cisco ASA Firewall configuration.
      Refer to CIS Cisco ASA 9.x for specific settings.

  - rule_id: cisco_asa.cis.encryption.tls_enabled
    title: "Ensure TLS/SSL is enabled for all connections"
    severity: high
    cis_section: '1'
    nist_controls: [SC-8, SC-28]
    soc2_criteria: [CC6.7]
    scope: cisco_asa.encryption.transport
    assertion:
      field: tls_enabled
      operator: equals
      expected: "true"
    remediation: >
      Enable TLS/SSL encryption for Cisco ASA Firewall connections.
      Refer to CIS Cisco ASA 9.x for minimum TLS version requirements.

  - rule_id: cisco_asa.cis.acl.admin_count
    title: "Ensure the number of administrative accounts is minimized"
    severity: medium
    cis_section: '1'
    nist_controls: [AC-6]
    soc2_criteria: [CC6.3]
    scope: cisco_asa.acl.admin_privileges
    assertion:
      field: row_count
      operator: lte
      expected: 3
    remediation: >
      Review and reduce administrative accounts in Cisco ASA Firewall.
      Apply principle of least privilege.
