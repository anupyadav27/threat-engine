# Check Point NGFW — CIS Check Rules
# Source benchmark: CIS Check Point R81
# Fill in rules per sprint. Each rule maps to a discovery_id above.

tech_type: check_point
category: network
cis_benchmark: CIS Check Point R81

rules:
  - rule_id: check_point.cis.auth.password_policy_min_length
    title: "Ensure minimum password length is configured"
    severity: medium
    cis_section: '1'
    nist_controls: [IA-5]
    soc2_criteria: [CC6.1]
    scope: check_point.auth.password_policy
    assertion:
      field: min_length
      operator: gte
      expected: 14
    remediation: >
      Configure minimum password length to 14+ characters in the Check Point NGFW
      password policy settings.

  - rule_id: check_point.cis.logging.audit_enabled
    title: "Ensure audit logging is enabled"
    severity: high
    cis_section: '1'
    nist_controls: [AU-2, AU-3]
    soc2_criteria: [CC7.2]
    scope: check_point.logging.audit_config
    assertion:
      field: audit_enabled
      operator: equals
      expected: "true"
    remediation: >
      Enable audit logging in Check Point NGFW configuration.
      Refer to CIS Check Point R81 for specific settings.

  - rule_id: check_point.cis.encryption.tls_enabled
    title: "Ensure TLS/SSL is enabled for all connections"
    severity: high
    cis_section: '1'
    nist_controls: [SC-8, SC-28]
    soc2_criteria: [CC6.7]
    scope: check_point.encryption.transport
    assertion:
      field: tls_enabled
      operator: equals
      expected: "true"
    remediation: >
      Enable TLS/SSL encryption for Check Point NGFW connections.
      Refer to CIS Check Point R81 for minimum TLS version requirements.

  - rule_id: check_point.cis.acl.admin_count
    title: "Ensure the number of administrative accounts is minimized"
    severity: medium
    cis_section: '1'
    nist_controls: [AC-6]
    soc2_criteria: [CC6.3]
    scope: check_point.acl.admin_privileges
    assertion:
      field: row_count
      operator: lte
      expected: 3
    remediation: >
      Review and reduce administrative accounts in Check Point NGFW.
      Apply principle of least privilege.
