  - rule_id: vmware_esxi.cis.7.l1_ensure_virtual_distributed_switch_netflow
    title: "(L1) Ensure Virtual Distributed Switch Netflow traffic is sent to an authorized collector"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "7.7"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      The vSphere VDS can export Netflow information about traffic crossing the VDS.
      These exports are not encrypted and can contain information about the virtual
      network making it easier for a Man in the Middle attack to be executed
      successfully. NOTE: This is only valid if utilizing VMware vCenter
    rationale: >
      If Netflow export is required, verify that all VDS Netflow target systems are
      approved collectors by confirming the IP's are set correctly. NOTE: This is
      only valid if utilizing VMware vCenter
    audit_procedure: >
      Using the vSphere Web Client 1. Go to the Networking section of vCenter 2.
      After selecting each individual switch you will need to perform the following.
      3. Go to Configure then expand Settings. 4. Click on Netflow. 5. Verify that
      Collector IP address and Collector port are appropriately configured.
      Additionally, the following PowerCLI command may be used Get-VDPortgroup |
      Select Name, VirtualSwitch,
      @{Name='NetflowEnabled';Expression={$_.Extensiondata.Config.defaultPortConfig
      .ipfixEnabled.Value}} | Where-Object {$_.NetflowEnabled -eq 'True'}
    remediation: >
      Using the vSphere Web Client 1. Go to the Networking section of vCenter 2.
      After selecting each individual switch you will need to perform the following.
      3. Go to Configure then expand Settings. 4. Click on Netflow. 5. Click on
      Edit. 6. Enter the Collector IP address and Collector port as required. 7.
      Click OK. Additionally, the following PowerCLI command may be used '# Disable
      Netfow for a VDPortgroup $DPortgroup = <name of portgroup> Get-VDPortgroup
      $DPortGroup | Disable-PGNetflow #Function for Disable-PGNetflow #From:
      http://www.virtu-al.net/2013/07/23/disabling-netflow-with-powercli/ Function
      Disable-PGNetflow { [CmdletBinding()] Param (
      [Parameter(ValueFromPipeline=$true)] $DVPG ) Process { Foreach ($PG in $DVPG)
      { $spec = New-Object VMware.Vim.DVPortgroupConfigSpec $spec.configversion =
      $PG.Extensiondata.Config.ConfigVersion $spec.defaultPortConfig = New-Object
      VMware.Vim.VMwareDVSPortSetting $spec.defaultPortConfig.ipfixEnabled = New-
      Object VMware.Vim.BoolPolicy $spec.defaultPortConfig.ipfixEnabled.inherited =
      $false $spec.defaultPortConfig.ipfixEnabled.value = $false $PGView = Get-View
      -Id $PG.Id $PGView.ReconfigureDVPortgroup_Task($spec) } } } References: 1.
      https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-FA661AE0-C0B5-4522-
      951D-A3790DBE70B4.html 2. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.networking.doc/GUID-55FCEC92-74B9-4E5F-
      ACC0-4EA1C36F397A.html
    references: >
