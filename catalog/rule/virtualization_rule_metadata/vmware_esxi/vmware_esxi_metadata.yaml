    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "4.8"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Users who are added to the 'Exception Users' list do not lose their
      permissions when the host enters lockdown mode. Usually you may want to add
      some service accounts, such as a backup agent, to the Exception Users list.
    rationale: >
      Users who do not require special permissions should not be exempted from
      lockdown mode because this increases the risk of unauthorized actions being
      performed, especially if a user account is compromised. Impact: If a user is
      not added to the exception list but should be when host is in lockdown mode
      they will be unable to perform operations.
