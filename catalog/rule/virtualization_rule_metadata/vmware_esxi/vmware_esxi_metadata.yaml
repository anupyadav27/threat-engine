  - rule_id: vmware_esxi.cis.2.l1_host_must_enable_secure_boot_enforcement
    title: "(L1) Host must enable Secure Boot enforcement"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 8_v1.2.0"
    cis_version: "8_v1.2.0"
    cis_control: "2.3"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Enabling Secure Boot enforcement ensures that the host only loads UEFI drivers
      and applications with valid digital signatures, as part of the UEFI firmware
      standard. It requires support from the server's BIOS and hypervisor boot
      loader, and mandates that all ESXi kernel modules, drivers, and VIBs be signed
      by VMware or a trusted partner subordinate.
    rationale: >
      Organizations should enable Secure Boot enforcement to enhance the security of
      their virtual environments. Requiring valid digital signatures for UEFI
      drivers and apps mitigates the risk of offline attacks, where an attacker
      could transfer the ESXi install drive to a non-Secure Boot host and boot it
      without detection. This control establishes a trusted boot process, reducing
      the risk of unauthorized access and maintaining the integrity of the ESXi
      host. Impact: Failing to enable Secure Boot enforcement exposes the ESXi host
      to potential security breaches. Without this control, an attacker could
      compromise the ESXi host by booting it on a non-Secure Boot host, bypassing
      ESXi's protections. This could lead to unauthorized access, data breaches, and
      compromise of the virtual environment's integrity. Enabling Secure Boot
      enforcement is crucial for maintaining a secure and trusted ESXi host,
      mitigating potential negative impacts, and safeguarding the virtual
      infrastructure.
    audit_procedure: >
      
    remediation: >
      
    references: >
      
    impact: >
      Failing to enable Secure Boot enforcement exposes the ESXi host to potential
      security breaches. Without this control, an attacker could compromise the ESXi
