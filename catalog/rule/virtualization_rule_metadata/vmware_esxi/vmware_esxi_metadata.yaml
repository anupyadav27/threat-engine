  - rule_id: vmware_esxi.cis.5.l2_ensure_strict_lockdown_mode_is_enabled
    title: "(L2) Ensure Strict Lockdown mode is enabled"
    severity: medium
    category: virtualization
    tech_type: vmware_esxi
    automation_type: automated
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "5.6"
    cis_section: "5"
    profile_applicability: "Level 2"
    description: >
      Enabling lockdown mode disables direct local access to an ESXi host, requiring
      the host be managed remotely from vCenter Server. There are some operations,
      such as backup and troubleshooting, that require direct access to the host. In
      these cases, lockdown mode can be disabled on a temporary basis for specific
      hosts as needed, and then re-enabled when the task is completed. Note:
      Lockdown mode does not apply to users who log in using authorized keys. Also,
      users in the DCUI.Access list for each host are allowed to override lockdown
      mode and log in to the DCUI. By default, the 'root' user is the only user
      listed in the DCUI.Access list.
    rationale: >
      Lockdown mode limits ESXi host access to the vCenter server to ensure the
      roles and access controls implemented in vCenter are always enforced and users
      cannot bypass them by logging into a host directly. By forcing all interaction
      to occur through vCenter Server, the risk of someone inadvertently attaining
      elevated privileges or performing tasks that are not properly audited is
      greatly reduced. Additionally strict lockdown move will disabled DCUI -
      Disabling DCUI prevents all local activity, and thus forces actions to be
      performed in vCenter Server, where they can be centrally audited and
      monitored. Impact: With lockdown mode enabled the host will only be accessible
      through vCenter preventing 'local' access. Disabling the DCUI can create a
      potential 'lockout' situation, should the host become isolated from vCenter
      Server. Recovering from a 'lockout' scenario requires reinstalling ESXi.
      Consider leaving DCUI enabled, and instead enable lockdown mode and limit the
      users allowed to access the DCUI using the DCUI.Access list.
    audit_procedure: >
      To verify lockdown mode is enabled, perform the following from the vSphere web
      client: 1. From the vSphere Web Client, select the host. 2. Select Configure
      then expand System and select Security Profile. 3. Verify that Lockdown Mode
      is set to Strict. Alternately, the following PowerCLI command may be used: #
      To check if Lockdown mode is enabled Get-VMHost | Select
      Name,@{N='Lockdown';E={$_.Extensiondata.Config.adminDisabled}}
    remediation: >
      To enable lockdown mode, perform the following from the vSphere web client: 1.
      From the vSphere Web Client, select the host. 2. Select Configure then expand
      System and select Security Profile. 3. Across from Lockdown Mode click on
      Edit. 4. Click the radio button for Strict. 5. Click OK. Alternately, run the
      following PowerCLI command: # Enable lockdown mode for each host Get-VMHost |
      Foreach { $_.EnterLockdownMode() } References: 1.
      https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-88B24613-E8F9-40D2-
      B838-225F5FF480FF.html
    references: >
      1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-88B24613-E8F9-40D2-
      B838-225F5FF480FF.html
    impact: >
      With lockdown mode enabled the host will only be accessible through vCenter
      preventing 'local' access. Disabling the DCUI can create a potential 'lockout'
      situation, should the host become isolated from vCenter Server. Recovering
      from a 'lockout' scenario requires reinstalling ESXi. Consider leaving DCUI
      enabled, and instead enable lockdown mode and limit the users allowed to
      access the DCUI using the DCUI.Access list.
