  - rule_id: vmware_esxi.cis.8.l2_ensure_autologon_is_disabled
    title: "(L2) Ensure Autologon is disabled"
    severity: medium
    category: virtualization
    tech_type: vmware_esxi
    automation_type: automated
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "8.4.2"
    cis_section: "8"
    profile_applicability: "Level 2"
    description: >
      Autologon should be disabled if it is not needed.
    rationale: >
      Some VMX parameters don't apply on vSphere because VMware virtual machines
      work on vSphere and hosted virtualization platforms such as Workstation and
      Fusion. The code paths for these features are not implemented in ESXi.
      Explicitly disabling these features, such as autologon, reduces the potential
      for vulnerabilities because it reduces the number of ways in which a guest can
      affect the host. Note that these are referenced for organizations that insist
      any documented setting, regardless of whether it is implemented in code or
      not, must have a value.
    audit_procedure: >
      To verify that autologon is disabled if not needed, utilize the vSphere
      interface as follows: 1. Select the VM then select Actions followed by Edit
      Settings. 2. Click on the VM Options tab then expand Advanced. 3. Click on
      EDIT CONFIGURATION. 4. Verify that isolation.tools.ghi.autologon.disable is
      set to TRUE. Alternately, the following PowerCLI command may be used: # List
      the VMs and their current settings Get-VM | Get-AdvancedSetting -Name
      'isolation.tools.ghi.autologon.disable'| Select Entity, Name, Value
    remediation: >
      To set this configuration utilize the vSphere interface as follows: 1. Select
      the VM then select Actions followed by Edit Settings. 2. Click on the VM
      Options tab then expand Advanced. 3. Click on EDIT CONFIGURATION. 4. Click on
      ADD CONFIGURATION PARAMS then input isolation.tools.ghi.autologon.disable with
      a value of TRUE. 5. Click OK, then OK again. Alternatively you may run the
      following PowerCLI command: # Add the setting to all VMs Get-VM | New-
      AdvancedSetting -Name 'isolation.tools.ghi.autologon.disable' - value $true
      References: 1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-60E83710-8295-41A2-
      9C9D-83DEBB6872C2.html
    references: >
      1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-60E83710-8295-41A2-
      9C9D-83DEBB6872C2.html
    impact: >
      
