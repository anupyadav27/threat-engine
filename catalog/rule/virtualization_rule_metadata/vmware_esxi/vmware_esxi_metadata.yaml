  - rule_id: vmware_esxi.cis.8.l1_ensure_unnecessary_or_superfluous_functions
    title: "(L1) Ensure unnecessary or superfluous functions inside VMs are disabled"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "8.3.1"
    cis_section: "8"
    profile_applicability: "Level 1"
    description: >
      Disable all system components that are not needed to support the application
      or service running on the VM. VMs often don't require as many functions as
      ordinary physical servers, so when virtualizing, you should evaluate whether a
      particular function is truly needed.
    rationale: >
      By disabling unnecessary system components, you reduce the number of potential
      attack vectors, which reduces the likelihood of compromise.
    audit_procedure: >
      To verify unneeded functions are disabled, check that the following are
      disabled: 1. Unused services in the operating system. For example, if the
      system runs a file server, Web services should not be running. 2. Unused
      physical devices, such as CD/DVD drives, floppy drives, and USB adaptors. 3.
      Screen savers. 4. X Windows if using a Linux, BSD, or Solaris guest operating
      system.
    remediation: >
      To disable unneeded functions, perform whichever of the following steps are
      applicable: 1. Disable unused services in the operating system. 2. Disconnect
      unused physical devices, such as CD/DVD drives, floppy drives, and USB
      adaptors. 3. Turn off any screen savers. 4. If using a Linux, BSD, or Solaris
      guest operating system, do not run the X Windows system unless it is
      necessary. References: 1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-6BFA8CA7-610F-4E6B-
      9FC6-D656917B7E7A.html
    references: >
