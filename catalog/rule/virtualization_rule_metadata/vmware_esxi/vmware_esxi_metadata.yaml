  - rule_id: vmware_esxi.cis.3.l1_ensure_persistent_logging_is_configured_for
    title: "(L1) Ensure persistent logging is configured for all ESXi hosts"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "3.2"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      ESXi can be configured to store log files on an in-memory file system. This
      occurs when the host's Syslog.global.LogDir property is set to a non-
      persistent location, such as /scratch. When this is done, only a single day's
      worth of logs are stored at any time. Additionally, log files will be
      reinitialized upon each reboot.
    rationale: >
      Non-persistent logging presents a security risk because user activity logged
      on the host is only stored temporarily and will not be preserved across
      reboots. This can also complicate auditing and make it harder to monitor
      events and diagnose issues. ESXi host logging should always be configured to a
      persistent datastore.
    audit_procedure: >
      To verify persistent logging is configured properly, perform the following
      from the vSphere web client: 1. Select the host 2. Click Configure then expand
      System then select Advanced System Settings. 3. Select Edit then enter
      Syslog.global.LogDir in the filter. 4. Ensure Syslog.global.logDir field is
      not empty (null value) or is not set explicitly to a non-persistent datastore
      or a scratch partition. If the Syslog.global.logDir parameter is pointing to
      'Scratch' location (i.e. empty (null value) or is not set explicitly to a non-
      persistent datastore or a scratch partition), then ensure that the
      'ScratchConfig.CurrentScratchLocation' parameter is also pointing to
      persistent storage. Alternatively, the following PowerCLI command may be used:
      # List Syslog.global.logDir for each host Get-VMHost | Select Name,
      @{N='Syslog.global.logDir';E={$_ | Get- AdvancedConfiguration
      Syslog.global.logDir | Select -ExpandProperty Values}}
    remediation: >
      To configure persistent logging properly, perform the following from the
      vSphere web client: 1. Select the host 2. Click Configure then expand System
      then select Advanced System Settings. 3. Select Edit then enter
      Syslog.global.LogDir in the filter. 4. Set Syslog.global.logDir to a
      persistent location specified as [datastorename] path_to_file where the path
      is relative to the datastore. For example, [datastore1] /systemlogs. 5. Click
      OK. Alternatively, run the following PowerCLI command: # Set
      Syslog.global.logDir for each host Get-VMHost | Foreach { Set-
      AdvancedConfiguration -VMHost $_ -Name Syslog.global.logDir -Value
      '<NewLocation>' } References: 1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-9F67DB52-F469-451F-
      B6C8-DAE8D95976E7.html 2. http://kb.vmware.com/kb/1033696 Additional
      Information: Note: Syslog.global.LogDir must be set for each host. The host
      syslog parameters can also be configured using the vCLI or PowerCLI, or using
      an API client.
    references: >
      1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-9F67DB52-F469-451F-
      B6C8-DAE8D95976E7.html 2. http://kb.vmware.com/kb/1033696 Additional
      Information: Note: Syslog.global.LogDir must be set for each host. The host
      syslog parameters can also be configured using the vCLI or PowerCLI, or using
      an API client.
    impact: >
      
