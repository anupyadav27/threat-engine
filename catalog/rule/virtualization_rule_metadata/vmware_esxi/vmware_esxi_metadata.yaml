  - rule_id: vmware_esxi.cis.7.l1_ensure_port_groups_are_not_configured_to_vlan
    title: "(L1) Ensure port groups are not configured to VLAN values reserved by upstream physical switches"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "7.5"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      This recommendation is intended to address configuring pyrtgroups for a
      standard switch. Ensure that port groups are not configured to VLAN values
      reserved by upstream physical switches. Certain physical switches reserve
      certain VLAN IDs for internal purposes and often disallow traffic configured
      to these values. For example, Cisco Catalyst switches typically reserve VLANs
      1001 through 1024 and 4094, while Nexus switches typically reserve 3968
      through 4047 and 4094. Check the documentation for your specific switch.
    rationale: >
      Using a reserved VLAN might result in a denial of service on the network.
    audit_procedure: >
      To verify port groups are not using reserved VLAN values, perform the
      following: 1. From the vSphere Web Client, select the host. 2. Click Configure
      then expand Networking. 3. Select Virtual switches. 4. Expand the Standard
      vSwitch. 5. View the topology diagram of the switch, which shows the various
      port groups associated with that switch. 6. For each port group on the
      vSwitch, verify and record the VLAN IDs used. Alternately, the following
      PowerCLI command may be used: # List all vSwitches, their Portgroups and VLAN
      IDs Get-VirtualPortGroup -Standard | Select virtualSwitch, Name, VlanID
    remediation: >
      To change the VLAN values for port groups to non-reserved values, perform the
      following: 1. From the vSphere Web Client, select the host. 2. Click Configure
      then expand Networking. 3. Select Virtual switches. 4. Expand the Standard
      vSwitch. 5. View the topology diagram of the switch, which shows the various
      port groups associated with that switch. 6. For each port group on the
      vSwitch, verify and record the VLAN IDs used. 7. If a VLAN ID change is
      needed, click the name of the port group in the topology diagram of the
      virtual switch. 8. Click the Edit settings option. 9. In the Properties
      section, enter an appropriate name in the Network label field. 10. In the VLAN
      ID dropdown select or type a new VLAN. 11. Click OK. References: 1.
      http://www.cisco.com/c/en/us/td/docs/switches/lan/catalyst4500/12-
      2/20ew/configuration/guide/config/vlans.html#wp1038758 2.
      http://www.cisco.com/c/en/us/td/docs/switches/datacenter/nexus5500/sw/layer2/
      7x/b_5500_Layer2_Config_7x/b_5500_Layer2_Config_7x_chapter_010.html#co
      n_1143823
    references: >
      1. http://www.cisco.com/c/en/us/td/docs/switches/lan/catalyst4500/12-
