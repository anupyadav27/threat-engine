  - rule_id: vmware_esxi.cis.7.l1_virtual_machines_must_deactivate_console_drag
    title: "(L1) Virtual machines must deactivate console drag and drop operations"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: automated
    cis_benchmark: "CIS_VMWARE_ESXI 8_v1.2.0"
    cis_version: "8_v1.2.0"
    cis_control: "7.17"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      VM console drag and drop operations should be disabled.
    rationale: >
      VM console drag and drop operations are disabled by default (not explicitly
      specified); however, explicitly disabling this feature enables audit controls
      to check that this setting is correct.
    audit_procedure: >
      To verify that VM console drag and drop operations are disabled, verify that
      isolation.tools.dnd.disable is missing or set to TRUE. 1. Select the VM then
      select Actions followed by Edit Settings. 2. Click on the VM Options tab then
      expand Advanced. 3. Click on EDIT CONFIGURATION. 4. Verify that
      isolation.tools.dnd.disable is set to TRUE or missing. Alternately, the
      following PowerCLI command may be used: # List the VMs and their current
      settings Get-VM -Name $VM | Get-AdvancedSetting isolation.tools.dnd.disable
    remediation: >
      To set this configuration utilize the vSphere interface as follows: 1. Select
      the VM then select Actions followed by Edit Settings. 2. Click on the VM
      Options tab then expand Advanced. 3. Click on EDIT CONFIGURATION. 4. Click on
      ADD CONFIGURATION PARAMS then input isolation.tools.dnd.disable with a value
      of TRUE. 5. Click OK, then OK again. To explicitly disable VM console drag and
      drop operations, run the following PowerCLI command: # Add the setting to all
      VMs Get-VM -Name $VM | Remove-AdvancedSetting -Name
      isolation.tools.dnd.disable Default Value: TRUE
