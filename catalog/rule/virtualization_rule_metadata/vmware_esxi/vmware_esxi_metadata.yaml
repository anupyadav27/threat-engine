  - rule_id: vmware_esxi.cis.3.l1_host_should_deactivate_ssh
    title: "(L1) Host should deactivate SSH"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: automated
    cis_benchmark: "CIS_VMWARE_ESXI 8_v1.2.0"
    cis_version: "8_v1.2.0"
    cis_control: "3.1"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Secure Shell (SSH) provides remote access to the ESXi shell, enabling direct
      host console access or remote connectivity. Deactivating SSH is a security
      measure aimed at minimizing remote access channels to the ESXi host,
      restricting it to essential connections only through vSphere Client,
      vCLI/PowerCLI, or published APIs. The service status should be set to
      'Stopped', allowing manual start and stop for troubleshooting or diagnostic
      activities when necessary.
    rationale: >
      Limiting remote access by deactivating SSH reduces potential attack vectors,
      promoting a secure operating environment. Enabling SSH only for diagnostics or
      troubleshooting ensures controlled access, aligning with security best
      practices. Impact: There is no functional impact noted; however, the measure
      requires alternative methods for remote management, such as vSphere Client or
      command-line tools, which may demand additional configurations or toolset
      proficiency.
    audit_procedure: >
      To verify SSH is disabled, perform the following: 1. From the vSphere Web
      Client, select the host. 2. Select Configure then expand System and select
      Services. 3. Click on SSH then click Edit Startup Policy. 4. Verify the
      Startup Policy is set to Start and Stop Manually. Alternately, the following
      PowerCLI command may be used: # Check if SSH is running and set to start Get-
      VMHost | Get-VMHostService | Where { $_.key -eq 'TSM-SSH' } | Select VMHost,
      Key, Label, Policy, Running, Required Note: A host warning is displayed in the
      web client whenever SSH is enabled on a host.
    remediation: >
      To disable SSH, perform the following: 1. From the vSphere Web Client, select
      the host. 2. Select Configure then expand System and select Services. 3. Click
      on SSH then click Edit Startup Policy. 4. Set the Startup Policy is set to
      Start and Stop Manually. 5. Click OK. 6. While ESXi Shell is still selected
      click Stop. Alternately, use the following PowerCLI command: # Set SSH to
      start manually rather than automatically for all hosts Get-VMHost | Get-
      VMHostService | Where { $_.key -eq 'TSM-SSH' } | Set- VMHostService -Policy
      Off References: 1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-12E27BF3-3769-4665-
      8769-DA76C2BC9FFE.html
    references: >
      1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-12E27BF3-3769-4665-
      8769-DA76C2BC9FFE.html
    impact: >
      There is no functional impact noted; however, the measure requires alternative
      methods for remote management, such as vSphere Client or command-line tools,
      which may demand additional configurations or toolset proficiency.
    compliance_mappings:
      cis:
        - "CIS_VMWARE_ESXI_8_v1_2_0_3_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_vmware_esxi_8_v1_2_0_3_1"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: vmware_esxi.cis.3.l1_host_must_deactivate_the_esxi_shell
    title: "(L1) Host must deactivate the ESXi shell"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: automated
    cis_benchmark: "CIS_VMWARE_ESXI 8_v1.2.0"
    cis_version: "8_v1.2.0"
    cis_control: "3.2"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The ESXi shell is an interactive command line environment available from the
      Direct Console User Interface (DCUI) or remotely via SSH. Activities performed
      from the ESXi Shell bypass all access controls, but are logged. The
      recommended setting for the ESXi shell is to be stopped and only started
      manually when needed, such as when running diagnostics or troubleshooting.
    rationale: >
      Ensuring non-essential services like the ESXi Shell are deactivated enhances
      the security posture. Impact: No functional impact is recorded. However, if
      ESXi shell functionalities are needed, manual activation is required.
    audit_procedure: >
      To verify the ESXi shell is disabled, perform the following: 1. From the
      vSphere Web Client, select the host. 2. Select Configure then expand System
      and select Services. 3. Click on ESXi Shell then click Edit Startup Policy. 4.
      Verify the Startup Policy is set to Start and Stop Manually. Alternately, the
      following PowerCLI command may be used: # Check if the ESXi shell is running
      and set to start Get-VMHost | Get-VMHostService | Where { $_.key -eq 'TSM' } |
      Select VMHost, Key, Label, Policy, Running, Required Note: A host warning is
      displayed in the web client whenever the ESXi shell is enabled on a host.
    remediation: >
      To disable the ESXi shell, perform the following: 1. From the vSphere Web
      Client, select the host. 2. Select Configure then expand System and select
      Services. 3. Click on ESXi Shell then click Edit Startup Policy. 4. Set the
      Startup Policy is set to Start and Stop Manually. 5. Click on OK. Alternately,
      use the following PowerCLI command: # Set the ESXi shell to start manually
      rather than automatically for all hosts Get-VMHost | Get-VMHostService | Where
      { $_.key -eq 'TSM' } | Set- VMHostService -Policy Off References: 1.
      https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-B5144CE9-F8BB-494D-
      8F5D-0D5621D65DAE.html 2. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-DFA67697-232E-4F7D- 860F-
      96C0819570A8.html?hWord=N4IghgNiBcIKIDswCMIFMAEBBAxjtAzgRgC4D2p
      AFpnAMoAaAlhrdRFAL5A
    references: >
      1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-B5144CE9-F8BB-494D-
      8F5D-0D5621D65DAE.html 2. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-DFA67697-232E-4F7D- 860F-
      96C0819570A8.html?hWord=N4IghgNiBcIKIDswCMIFMAEBBAxjtAzgRgC4D2p
      AFpnAMoAaAlhrdRFAL5A
    impact: >
