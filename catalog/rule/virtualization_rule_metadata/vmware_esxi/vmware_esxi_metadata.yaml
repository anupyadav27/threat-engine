  - rule_id: vmware_esxi.cis.2.l1_ensure_ntp_time_synchronization_is_configured
    title: "(L1) Ensure NTP time synchronization is configured properly"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: automated
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "2.1"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Network Time Protocol (NTP) synchronization should be configured correctly and
      enabled on each VMware ESXi host to ensure accurate time for system event
      logs. The time sources used by the ESXi hosts should be in sync with an
      agreed-upon time standard such as Coordinated Universal Time (UTC). There
      should be at minimum two NTP sources in place, and they should sync whenever
      possible.
    rationale: >
      By ensuring that all systems use the same relative time source (including the
      relevant localization offset), and that the relative time source can be
      correlated to an agreed- upon time standard, it is simpler to track and
      correlate an intruder's actions when reviewing the relevant log files.
      Incorrect time settings can also make auditing inaccurate.
    audit_procedure: >
      To confirm NTP synchronization is enabled and properly configured, perform the
      following from the vSphere Web Client: 1. Select a host 2. Click Configure
      then expand System then select Time Configuration. 3. Verify that Time
      Synchronization is set to Automatic 4. Verify that the NTP Client is set to
      Enabled 5. Verify that the NTP Service Status is Running 6. Verify that
      appropriate NTP servers are set. Additionally, the following PowerCLI command
      may be used: # List the NTP Settings for all hosts Get-VMHost | Select Name,
      @{N='NTPSetting';E={$_ | Get-VMHostNtpServer}}
    remediation: >
      To enable and properly configure NTP synchronization, perform the following
      from the vSphere web client: 1. Select a host 2. Click Configure then expand
      System then select Time Configuration. 3. Select Edit next to Network Time
      Protocol 4. Select the Enable box, then fill in the appropriate NTP Servers.
      5. in the NTP Service Startup Policy drop down select Start and stop with
      host. 6. Click OK. To implement the recommended configuration state, run the
      following PowerCLI command: # Set the NTP Settings for all hosts # If an
      internal NTP server is used, replace pool.ntp.org with # the IP address or the
      Fully Qualified Domain Name (FQDN) of the internal NTP server $NTPServers =
      'pool.ntp.org', 'pool2.ntp.org' Get-VMHost | Add-VmHostNtpServer $NTPServers
      References: 1. https://docs.vmware.com/en/VMware-
      vSphere/6.7/com.vmware.vsphere.security.doc/GUID-2553C86E-7981-4F79-
      B9FC-A6CECA52F6CC.html Additional Information: Notes: Verify the NTP firewall
      ports are open. It is recommended to synchronize the ESXi clock with a time
      server that is located on the management network rather than directly with a
      time server on a public network. This time server can then synchronize with a
      public source through a strictly controlled network connection with a
      firewall.
    references: >
      1. https://docs.vmware.com/en/VMware-
      vSphere/6.7/com.vmware.vsphere.security.doc/GUID-2553C86E-7981-4F79-
      B9FC-A6CECA52F6CC.html Additional Information: Notes: Verify the NTP firewall
      ports are open. It is recommended to synchronize the ESXi clock with a time
      server that is located on the management network rather than directly with a
      time server on a public network. This time server can then synchronize with a
      public source through a strictly controlled network connection with a
      firewall.
    impact: >
      
