  - rule_id: vmware_esxi.cis.5.l1_ensure_idle_esxi_shell_and_ssh_sessions_time
    title: "(L1) Ensure idle ESXi shell and SSH sessions time out after 300 seconds or less"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: automated
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "5.8"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The ESXiShellInteractiveTimeOut allows you to automatically terminate idle
      ESXi shell and SSH sessions. The permitted idle time should be 300 seconds or
      less.
    rationale: >
      If a user forgets to log out of an ESXi shell or SSH session, the idle session
      will exist indefinitely, increasing the potential for someone to gain
      unauthorized privileged access to the host, unless a timeout is set.
    audit_procedure: >
      To verify the timeout is set correctly, perform the following from the vSphere
      web client: 1. From the vSphere Web Client, select the host. 2. Click
      Configure then expand System. 3. Select Advanced System Settings then click
      Edit. 4. Enter ESXiShellInteractiveTimeOut in the filter. 5. Verify that the
      value for this parameter is set to 300 or less. Note: A value of 0 disables
      the ESXiShellInteractiveTimeOut. Alternately, the following PowerCLI command
      may be used: # List UserVars.ESXiShellInteractiveTimeOut for each host Get-
      VMHost | Select Name, @{N='UserVars.ESXiShellInteractiveTimeOut';E={$_ | Get-
      AdvancedSetting UserVars.ESXiShellInteractiveTimeOut | Select - ExpandProperty
      Values}}
    remediation: >
      To set the timeout to the desired value, perform the following from the
      vSphere web client: 1. From the vSphere Web Client, select the host. 2. Click
      Configure then expand System. 3. Select Advanced System Settings then click
      Edit. 4. Enter ESXiShellInteractiveTimeOut in the filter. 5. Set the value for
      this parameter is set to the appropriate value (300 seconds or less). 6. Click
      OK. Note: A value of 0 disables the ESXi ShellInteractiveTimeOut. Alternately,
      use the following PowerCLI command: # Set Remove
      UserVars.ESXiShellInteractiveTimeOut to 300 on all hosts Get-VMHost | Get-
      AdvancedSetting -Name 'UserVars.ESXiShellInteractiveTimeOut' | Set-
      AdvancedSetting -Value '300' References: 1. http://kb.vmware.com/kb/2004746
      Additional Information: It is recommended to set the ESXiShellTimeOut together
      with ESXiShellInteractiveTimeOut.
    references: >
      1. http://kb.vmware.com/kb/2004746 Additional Information: It is recommended
      to set the ESXiShellTimeOut together with ESXiShellInteractiveTimeOut.
