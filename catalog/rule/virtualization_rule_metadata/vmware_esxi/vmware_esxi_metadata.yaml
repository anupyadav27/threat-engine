    cis_version: "8_v1.2.0"
    cis_control: "5.4"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      To prevent cascading lockout of uplink interfaces from the ESXi host, the
      Net.BlockGuestBPDU parameter can be set to 1, enabling BPDU Filter to drop
      BPDU packets sent from virtual machines to the physical switch. This is
      crucial as ESXi's Standard and Distributed Virtual Switches do not support
      STP, making them prone to network loops if BPDUs are unfiltered. The parameter
      governing this behavior is Net.BlockGuestBPDU with a recommended setting of 1.
    rationale: >
      Configuring Net.BlockGuestBPDU aids in maintaining network stability by
      preventing potential disruptions caused by BPDU packets. This configuration is
      vital for avoiding unintended network lockouts and ensuring robust network
      communications. Impact: While beneficial for network stability, enabling BPDU
      filtering could block legitimate BPDU packets from network-oriented workloads.
      Ensure no legitimate BPDU packets are generated by virtual machines on the
      ESXi host before enabling this control.
