  - rule_id: vmware_esxi.cis.4.l1_ensure_a_non_root_user_account_exists_for
    title: "(L1) Ensure a non-root user account exists for local admin access"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: automated
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "4.1"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      By default, each ESXi host has a single 'root' admin account that is used for
      local administration and to connect the host to vCenter Server. Use of this
      shared account should be limited, and named (non-root) user accounts with
      admin privileges should be used instead.
    rationale: >
      To avoid sharing a common root account, it is recommended on each host to
      create at least one named user account and assign it full admin privileges,
      and to use this account in lieu of a shared 'root' account. Limit the use of
      'root', including setting a highly complex password for the account, but do
      not remove the 'root' account.
    audit_procedure: >
      To confirm one or more named user accounts have been established, perform the
      following for each ESXi host: 1. Connect directly to the ESXi host using the
      VMware Host Client. 2. Login as root or another authorized user. 3. Select
      Manage, then select the Security & Users tab. 4. Select Users to view the
      local users. 5. Ensure at least one user exists that possesses the following:
      6. The user has been granted shell access. 7. Select the host then click
      Actions followed by Permissions and verify the Administrator role has been
      granted to the user. Note: You cannot create ESXi users with the vSphere
      Client. You must directly log in to the host with the VMware Host Client to
      create ESXi users.
    remediation: >
      To create one or more named user accounts (local ESXi user accounts), perform
      the following using the vSphere client (not the vSphere web client) for each
      ESXi host: 1. Connect directly to the ESXi host using the vSphere Client. 2.
      Login as root. 3. Select Manage, then select the Security & Users tab. 4.
      Select Users then click Add user to add a new user. 5. Once added now select
      the Host, then select Actions followed by Permissions. 6. Assign the
      Administrator role to the user. Notes: 1. Even if you add your ESXi host to an
      Active Directory domain, it is still recommended to add at least one local
      user account to ensure admins can still login in the event the host ever
      becomes isolated and unable to access Active Directory. 2. Adding local user
      accounts can be automated using Host Profiles. References: 1.
      https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.hostclient.doc/GUID-0898677F-CE98-41FB-
      A488-29DF6210CF5D.html
    references: >
      1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.hostclient.doc/GUID-0898677F-CE98-41FB-
      A488-29DF6210CF5D.html
    impact: >
      
    compliance_mappings:
