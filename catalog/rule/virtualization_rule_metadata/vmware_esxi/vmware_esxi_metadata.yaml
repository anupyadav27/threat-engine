  - rule_id: vmware_esxi.cis.6.l1_ensure_bidirectional_chap_authentication_for
    title: "(L1) Ensure bidirectional CHAP authentication for iSCSI traffic is enabled"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: automated
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "6.1"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      vSphere allows for the use of bidirectional authentication of both the iSCSI
      target and host. Bidirectional Challenge-Handshake Authentication Protocol
      (CHAP), also known as Mutual CHAP, should be enabled to provide bidirectional
      authentication.
    rationale: >
      By not authenticating both the iSCSI target and host, there is a potential for
      a man-in- the-middle attack in which an attacker might impersonate either side
      of the connection to steal data. Bidirectional authentication can mitigate
      this risk. Note: Choosing not to enforce bidirectional authentication can make
      sense if you create a dedicated network or VLAN to service all your iSCSI
      devices. If the iSCSI facility is isolated from general network traffic, it is
      less vulnerable to exploitation.
    audit_procedure: >
      To verify that bidirectional CHAP authentication is enabled for iSCSI traffic,
      perform the following: 1. From the vSphere Web Client, select the host. 2.
      Click Configure then expand Storage. 3. Select Storage Adapters then select
      the iSCSI Adapter. 4. Under Properties verify that the Authentication method
      is set to Use bidirectional CHAP. Alternately, the following PowerCLI command
      may be used: # List Iscsi Initiator and CHAP Name if defined Get-VMHost | Get-
      VMHostHba | Where {$_.Type -eq 'Iscsi'} | Select VMHost, Device, ChapType,
      @{N='CHAPName';E={$_.AuthenticationProperties.ChapName}}
    remediation: >
      To enable bidirectional CHAP authentication for iSCSI traffic, perform the
      following: 1. From the vSphere Web Client, select the host. 2. Click Configure
      then expand Storage. 3. Select Storage Adapters then select the iSCSI Adapter.
      4. Under Properties click on Edit next to Authentication. 5. Next to
      Authentication Method select Use bidirectional CHAP from the dropdown. 6.
      Specify the outgoing CHAP name. • Make sure that the name you specify matches
      the name configured on the storage side. o To set the CHAP name to the iSCSI
      adapter name, select 'Use initiator name'. o To set the CHAP name to anything
      other than the iSCSI initiator name, deselect 'Use initiator name' and type a
      name in the Name text box. 8. Enter an outgoing CHAP secret to be used as part
      of authentication. Use the same secret as your storage side secret. 9. Specify
      incoming CHAP credentials. Make sure your outgoing and incoming secrets do not
      match. 10. Click OK. 11. Click the second to last symbol labeled Rescan
      Adapter. Alternately, run the following PowerCLI command: # Set the Chap
      settings for the Iscsi Adapter Get-VMHost | Get-VMHostHba | Where {$_.Type -eq
      'Iscsi'} | Set-VMHostHba # Use desired parameters here References: 1.
      https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.storage.doc/GUID-AC65D747-728F-4109-
      96DD-49B433E2F266.html 2. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.storage.doc/GUID-2F1E64DB-20BB-4D18-
      A083-8E65FE380899.html Additional Information: Prerequisites - Before setting
      up CHAP parameters for software or dependent hardware iSCSI, determine whether
      to configure unidirectional or bidirectional CHAP. Independent hardware iSCSI
      adapters do not support bidirectional CHAP. • Verify CHAP parameters
      configured on the storage side. Parameters that you configure must match the
      ones on the storage side. • Required privilege: Host.Configuration.Storage
      Partition Configuration
    references: >
      1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.storage.doc/GUID-AC65D747-728F-4109-
      96DD-49B433E2F266.html 2. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.storage.doc/GUID-2F1E64DB-20BB-4D18-
      A083-8E65FE380899.html Additional Information: Prerequisites - Before setting
      up CHAP parameters for software or dependent hardware iSCSI, determine whether
      to configure unidirectional or bidirectional CHAP. Independent hardware iSCSI
      adapters do not support bidirectional CHAP. • Verify CHAP parameters
      configured on the storage side. Parameters that you configure must match the
      ones on the storage side. • Required privilege: Host.Configuration.Storage
      Partition Configuration
    impact: >
      
    compliance_mappings:
