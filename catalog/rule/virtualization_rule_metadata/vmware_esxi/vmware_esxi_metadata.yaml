      To verify the membership of the 'Exception Users' list, perform the following
      in the vSphere Web Client: 1. Select the host. 2. Click on Configure then
      expand System and select Security Profile. 3. Under Lockdown Mode view and
      verify the list of Exception Users for accuracy.
    remediation: >
      To correct the membership of the Exception Users list, perform the following
      in the vSphere Web Client: 1. Select the host. 2. Click on Configure then
      expand System and select Security Profile. 3. Select Edit next to Lockdown
      Mode. 4. Click on Exception Users. 5. Add or delete users as appropriate. 6.
      Click OK. References: 1. https://docs.vmware.com/en/VMware-
