  - rule_id: vmware_esxi.cis.1.l1_ensure_esxi_is_properly_patched
    title: "(L1) Ensure ESXi is properly patched"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "1.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      VMware Lifecycle Manager is a tool which may be utilized to automate patch
      management for vSphere hosts and virtual machines. Creating a baseline for
      patches is a good way to ensure all hosts are at the same patch level. VMware
      also publishes advisories on security patches and offers a way to subscribe to
      email alerts for them.
    rationale: >
      By staying up to date on ESXi patches, vulnerabilities in the hypervisor can
      be mitigated. An educated attacker can exploit known vulnerabilities when
      attempting to attain access or elevate privileges on an ESXi host. Impact:
      ESXi servers must be in Maintenance Mode to apply patches. This implies all
      VMs must be moved or powered off on the ESXi server, so the patching process
      may necessitate having brief outages.
    audit_procedure: >
      Verify that the patches are up to date. The following PowerCLI snippet will
      provide a list of all installed patches: Foreach ($VMHost in Get-VMHost ) {
      $EsxCli = Get-EsxCli -VMHost $VMHost -V2 $EsxCli.software.vib.list.invoke() |
      Select-Object @{N='VMHost';E={$VMHost}},* } You may also manage updates via
      VMware Lifecycle Manager located under Menu, Lifecycle Manager.
    remediation: >
      Employ a process to keep ESXi hosts up to date with patches in accordance with
      industry standards and internal guidelines. Leverage the VMware Lifecycle
      Manager to test and apply patches as they become available. References: 1.
      https://docs.vmware.com/en/VMware-vSphere/7.0/com.vmware.vsphere- lifecycle-
      manager.doc/GUID-74295A37-E8BB-4EB9-BFBA-47B78F0C570D.html
    references: >
      1. https://docs.vmware.com/en/VMware-vSphere/7.0/com.vmware.vsphere-
      lifecycle-manager.doc/GUID-74295A37-E8BB-4EB9-BFBA-47B78F0C570D.html
    impact: >
      ESXi servers must be in Maintenance Mode to apply patches. This implies all
      VMs must be moved or powered off on the ESXi server, so the patching process
      may necessitate having brief outages.
    compliance_mappings:
      cis:
        - "CIS_VMWARE_ESXI_7_v1_5_0_1_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_vmware_esxi_7_v1_5_0_1_1"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: vmware_esxi.cis.1.l1_ensure_the_image_profile_vib_acceptance_level
    title: "(L1) Ensure the Image Profile VIB acceptance level is configured properly"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: automated
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "1.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      A VIB (vSphere Installation Bundle) is a collection of files that are packaged
      into an archive. The VIB contains a signature file that is used to verify the
      level of trust. The ESXi Image Profile supports four VIB acceptance levels: 1.
      VMware Certified - VIBs created, tested, and signed by VMware 2. VMware
      Accepted - VIBs created by a VMware partner but tested and signed by VMware 3.
      Partner Supported - VIBs created, tested, and signed by a certified VMware
      partner 4. Community Supported - VIBs that have not been tested by VMware or a
      VMware partner
    rationale: >
      The ESXi Image Profile should only allow signed VIBs because an unsigned VIB
      represents untested code installed on an ESXi host. Also, use of unsigned VIBs
      will cause hypervisor Secure Boot to fail to configure. Community Supported
      VIBs do not have digital signatures. To protect the security and integrity of
      your ESXi hosts, do not allow unsigned (CommunitySupported) VIBs to be
      installed on your hosts. Impact: Unsigned (Community Supported) VIBs will not
      be able to be utilized on a host.
    audit_procedure: >
      To verify the host image profile acceptance level perform the following: 1.
      From the vSphere Web Client, select the host. 2. Click Configure, then under
      System select Security Profile. 3. Under Host Image Profile Acceptance Level
      ensure it is set to one of the following - 'VMware Certified', 'VMware
      Accepted', or 'Partner Supported'. This may also be performed as follows: 1.
      Connect to each ESX/ESXi host using the ESXi Shell or vCLI, and execute the
      command esxcli software acceptance get to verify the acceptance level is at
      either 'VMware Certified', 'VMware Accepted', or 'Partner Supported'. 2.
      Connect to each ESX/ESXi host using the vCLI, and execute the command esxcli
      software vib list to verify the acceptance level for each VIB is either
      'VMware Certified', 'VMware Accepted', or 'Partner Supported'. Additionally,
      the following PowerCLI command may be used: # List the Software
      AcceptanceLevel for each host Foreach ($VMHost in Get-VMHost ) { $ESXCli =
      Get-EsxCli -VMHost $VMHost $VMHost | Select Name,
      @{N='AcceptanceLevel';E={$ESXCli.software.acceptance.get()}} } # List only the
      vibs which are not at 'VMwareCertified' or 'VMwareAccepted' or
      'PartnerSupported' acceptance level Foreach ($VMHost in Get-VMHost ) { $ESXCli
      = Get-EsxCli -VMHost $VMHost $ESXCli.software.vib.list() | Where {
      ($_.AcceptanceLevel -ne 'VMwareCertified') -and ($_.AcceptanceLevel -ne
      'VMwareAccepted') -and ($_.AcceptanceLevel -ne 'PartnerSupported') } }
    remediation: >
      To verify the host image profile acceptance level perform the following: 1.
      From the vSphere Web Client, select the host. 2. Click Configure, then under
      System select Security Profile. 3. Under Host Image Profile Acceptance Level
      select Edit 4. In the dropdown select one of the following - VMware Certified,
      VMware Accepted, or Partner Supported. To implement the recommended
      configuration state, run the following PowerCLI command (in the example code,
      the level is Partner Supported): # Set the Software AcceptanceLevel for each
      host<span> Foreach ($VMHost in Get-VMHost ) { $ESXCli = Get-EsxCli -VMHost
      $VMHost $ESXCli.software.acceptance.Set('PartnerSupported') } Default Value:
      Partner Supported References: 1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-52188148-C579-4F6A-
      8335-CFBCE0DD2167.html
    references: >
      1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-52188148-C579-4F6A-
      8335-CFBCE0DD2167.html
    impact: >
      Unsigned (Community Supported) VIBs will not be able to be utilized on a host.
    compliance_mappings:
      cis:
        - "CIS_VMWARE_ESXI_7_v1_5_0_1_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_vmware_esxi_7_v1_5_0_1_2"
