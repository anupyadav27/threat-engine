  - rule_id: vmware_esxi.cis.8.l1_ensure_unnecessary_floppy_devices_are
    title: "(L1) Ensure unnecessary floppy devices are disconnected"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: automated
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "8.2.1"
    cis_section: "8"
    profile_applicability: "Level 1"
    description: >
      Ensure that no floppy device is connected to a virtual machine unless
      required. For a floppy device to be disconnected, the floppyX.present
      parameter should either not be present or have a value of FALSE.
    rationale: >
      Removing unnecessary hardware devices can reduce the number of potential
      attack channels and help prevent attacks.
    audit_procedure: >
      To verify floppy drives are not connected, confirm that the following
      parameter is either NOT present or is set to FALSE: floppyX.present
      Alternately, the following PowerCLI command may be used: # Check for Floppy
      Devices attached to VMs Get-VM | Get-FloppyDrive | Select Parent, Name,
      ConnectionState
    remediation: >
      To disconnect all floppy drives from VMs, run the following PowerCLI command:
