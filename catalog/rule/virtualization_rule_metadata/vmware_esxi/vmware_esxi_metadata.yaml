  - rule_id: vmware_esxi.cis.4.l1_ensure_active_directory_is_used_for_local_user
    title: "(L1) Ensure Active Directory is used for local user authentication"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "4.6"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      ESXi can be configured to use a directory service such as Active Directory to
      manage users and groups. It is recommended that a directory service be used.
      Note: If the AD group 'ESX Admins' (default) is created, all users and groups
      that are members of this group will have full administrative access to all
      ESXi hosts in the domain.
    rationale: >
      Joining ESXi hosts to an Active Directory (AD) domain eliminates the need to
      create and maintain multiple local user accounts. Using AD for user
      authentication simplifies the ESXi host configuration, ensures password
      complexity and reuse policies are enforced, and reduces the risk of security
      breaches and unauthorized access.
    audit_procedure: >
      To confirm AD is used for local user authentication, perform the following
      from the vSphere Web Client: 1. Select the host 2. Click on Configure then
      expand System. 3. Select Authentication Services. 4. Ensure the configuration
      is in accordance with your organization's Active Directory configuration.
      Alternately, execute the following PowerCLI command: # Check each host and
      their domain membership status Get-VMHost | Get-VMHostAuthentication | Select
      VmHost, Domain, DomainMembershipStatus
    remediation: >
      To use AD for local user authentication, perform the following from the
      vSphere Web Client: 1. Select the host 2. Click on Configure then expand
      System. 3. Select Authentication Services. 4. Click Join Domain followed by
      the appropriate domain and credentials. 5. Click OK. Alternately, run the
      following PowerCLI command: # Join the ESXI Host to the Domain Get-VMHost
      HOST1 | Get-VMHostAuthentication | Set-VMHostAuthentication - Domain
      domain.local -User Administrator -Password Passw0rd -JoinDomain Notes : 1.
      Host Profiles can be used to automate adding hosts to an AD domain. 2.
      Consider using the vSphere Authentication proxy to avoid transmitting AD
      credentials over the network. References: 1.
      https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-63D22519-38CC-4A9F-
      AE85-97A53CB0948A.html
