  - rule_id: vmware_esxi.cis.5.l1_ensure_cim_access_is_limited
    title: "(L1) Ensure CIM access is limited"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "5.4"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The Common Information Model (CIM) system provides an interface that enables
      hardware-level management from remote applications using a set of standard
      APIs. Provide only the minimum access necessary to applications. Do not
      provision CIM- based hardware monitoring tools and other third-party
      applications to run as root or as another administrator account. Instead,
      create a dedicated service account specific to each CIM application with the
      minimal access and privileges needed for that application.
    rationale: >
      If CIM-based hardware monitoring tools or other third-party applications are
      granted unneeded administrator level access, they could potentially be used to
      compromise the security of the host. Impact: CIM-based hardware monitoring
      tools or other third-party applications that utilize CIM may not function as
      expected.
    audit_procedure: >
      To verify CIM access is limited, check for a limited-privileged service
      account with the following CIM roles applied: Host.Config.SystemManagement
      Host.CIM.CIMInteraction Alternately, the following PowerCLI command may be
      used: # List all user accounts on the Host -Host Local connection required-
      Get-VMHostAccount
    remediation: >
      To limit CIM access, perform the following: 1. Create a limited-privileged
      service account for CIM and other third-party applications. 2. This account
      should access the system via vCenter. 3. Give the account the CIM Interaction
      privilege only. This will enable the account to obtain a CIM ticket, which can
      then be used to perform both read and write CIM operations on the target host.
      If an account must connect to the host directly, this account must be granted
      the full 'Administrator' role on the host. This is not recommended unless
      required by the monitoring software being used. Alternately, run the following
      PowerCLI command: # Create a new host user account -Host Local connection
      required- New-VMHostAccount -ID ServiceUser -Password <password> -UserAccount
      References: 1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-645EBD81-CF86-44D7-
      BE77-224EF963D145.html
    references: >
      1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-645EBD81-CF86-44D7-
      BE77-224EF963D145.html
    impact: >
      CIM-based hardware monitoring tools or other third-party applications that
      utilize CIM may not function as expected.
