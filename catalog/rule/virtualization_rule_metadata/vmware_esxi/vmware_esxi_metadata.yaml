  - rule_id: vmware_esxi.cis.6.l1_host_cim_services_if_enabled_must_limit_access
    title: "(L1) Host CIM services, if enabled, must limit access"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 8_v1.2.0"
    cis_version: "8_v1.2.0"
    cis_control: "6.1.1"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      The Common Information Model (CIM) system allows for hardware-level management
      from remote applications through standard APIs. Ensuring only minimal access
      necessary to these applications is imperative to prevent potential security
      compromises. A dedicated service account, specific to each CIM application,
      should be created to limit access and privileges.
    rationale: >
      Restricting access to CIM services is essential to prevent unauthorized or
      over- privileged access, which could lead to potential security
      vulnerabilities. This practice adheres to the principle of least privilege,
      promoting a more secure environment. Impact: If improper access is granted to
      CIM-based hardware monitoring tools or other third- party applications, they
      may not function as expected or could be exploited to compromise the host's
      security.
    audit_procedure: >
      To verify CIM access is limited, check for a limited-privileged service
      account with the following CIM roles applied: Host.Config.SystemManagement
      Host.CIM.CIMInteraction Alternately, the following PowerCLI command may be
      used: # List all user accounts on the Host -Host Local connection required-
      Get-VMHostAccount
    remediation: >
      To limit CIM access, perform the following: 1. Create a limited-privileged
      service account for CIM and other third-party applications. 2. This account
      should access the system via vCenter. 3. Give the account the CIM Interaction
      privilege only. This will enable the account to obtain a CIM ticket, which can
      then be used to perform both read and write CIM operations on the target host.
      If an account must connect to the host directly, this account must be granted
      the full 'Administrator' role on the host. This is not recommended unless
      required by the monitoring software being used. Alternately, run the following
      PowerCLI command: # Create a new host user account -Host Local connection
      required- New-VMHostAccount -ID ServiceUser -Password <password> -UserAccount
      References: 1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-645EBD81-CF86-44D7-
      BE77-224EF963D145.html
    references: >
      1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-645EBD81-CF86-44D7-
      BE77-224EF963D145.html
    impact: >
      If improper access is granted to CIM-based hardware monitoring tools or other
      third- party applications, they may not function as expected or could be
      exploited to compromise the host's security.
