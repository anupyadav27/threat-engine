  - rule_id: vmware_esxi.cis.5.l1_host_must_restrict_access_to_a_default_or
    title: "(L1) Host must restrict access to a default or native VLAN on standard virtual switches"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: automated
    cis_benchmark: "CIS_VMWARE_ESXI 8_v1.2.0"
    cis_version: "8_v1.2.0"
    cis_control: "5.9"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      ESXi does not use the concept of native VLAN, so do not configure port groups
      to use the native VLAN ID. If the default value of 1 for the native VLAN is
      being used, the ESXi Server virtual switch port groups should be configured
      with any value between 2 and 4094. Otherwise, ensure that the port group is
      not configured to use whatever value is set for the native VLAN.
    rationale: >
      Frames with VLAN specified in the port group will have a tag, but frames
      without a VLAN specified in the port group are not tagged and therefore will
      end up as belonging to the native VLAN of the physical switch. For example,
      frames on VLAN 1 from a Cisco physical switch will be untagged, because this
      is considered as the native VLAN. However, frames from ESXi specified as VLAN
      1 will be tagged with a “1”; therefore, traffic from ESXi that is destined for
      the native VLAN will not be correctly routed (because it is tagged with a “1”
      instead of being untagged), and traffic from the physical switch coming from
      the native VLAN will not be visible (because it is not tagged). If the ESXi
      virtual switch port group uses the native VLAN ID, traffic from those VMs will
      not be visible to the native VLAN on the switch, because the switch is
      expecting untagged traffic.
    audit_procedure: >
      To verify the native VLAN ID is not being used for port groups, perform the
      following: 1. From the vSphere Web Client, select the host. 2. Click Configure
      then expand Networking. 3. Select Virtual switches. 4. Expand the Standard
      vSwitch. 5. View the topology diagram of the switch, which shows the various
      port groups associated with that switch. 6. For each port group on the
      vSwitch, verify and record the VLAN IDs used. Alternately, the following
      PowerCLI command may be used: # List all vSwitches, their Portgroups and VLAN
      IDs Get-VirtualPortGroup -Standard | Select virtualSwitch, Name, VlanID
    remediation: >
      To stop using the native VLAN ID for port groups, perform the following: 1.
      From the vSphere Web Client, select the host. 2. Click Configure then expand
      Networking. 3. Select Virtual switches. 4. Expand the Standard vSwitch. 5.
      View the topology diagram of the switch, which shows the various port groups
      associated with that switch. 6. For each port group on the vSwitch, verify and
      record the VLAN IDs used. 7. If a VLAN ID change is needed, click the name of
      the port group in the topology diagram of the virtual switch. 8. Click the
      Edit settings option. 9. In the Properties section, enter an appropriate name
      in the Network label field. 10. In the VLAN ID dropdown select or type a new
      VLAN. 11. Click OK. References: 1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.networking.doc/GUID-3A9D9911-3632-4B81-
      9D2E-A2F9F2D01180.html
    references: >
      1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.networking.doc/GUID-3A9D9911-3632-4B81-
      9D2E-A2F9F2D01180.html
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_VMWARE_ESXI_8_v1_2_0_5_9"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_vmware_esxi_8_v1_2_0_5_9"
    metadata_source: generated
