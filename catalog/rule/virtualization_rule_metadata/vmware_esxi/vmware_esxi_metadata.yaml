  - rule_id: vmware_esxi.cis.1.l2_host_hardware_must_secure_unused_external
    title: "(L2) Host hardware must secure unused external hardware ports"
    severity: medium
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 8_v1.2.0"
    cis_version: "8_v1.2.0"
    cis_control: "1.11"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      Unused ports, especially USB, can be used by attackers to attach storage,
      networking, and keyboards. Take reasonable steps to control access to these
      ports through disablement, access control, and/or with other means such as
      solid rack doors, rack side panels, and flooring that makes the ports
      inaccessible from outside the rack when the rack door is closed. Cables fit
      easily through many gaps in and around racks and rack doors, and stiff wires
      can be used to push them into sockets from outside the rack, as well as to
      dislodge cables to create a service disruption. Where possible, USB ports
      should also be set to only permit keyboards. When disabling functionality like
      this please consider that you may need to access the server using a USB
      keyboard during an outage or as part of lifecycle operations, and plan
      accordingly.
    rationale: >
      Unused external hardware ports can be exploited as potential entry points for
      unauthorized devices and malicious activity, thereby compromising server
      security. Impact: Security involves balancing risks, including ease of
      recovery from outages. Disabling external ports can hinder emergency use of
      the ESXi console. Servers can often toggle USB port access; ensure your choice
      aligns with organizational needs and is tested prior to incidents.
    audit_procedure: >
      
    remediation: >
      
    references: >
      
    impact: >
      Security involves balancing risks, including ease of recovery from outages.
      Disabling external ports can hinder emergency use of the ESXi console. Servers
      can often toggle USB port access; ensure your choice aligns with
      organizational needs and is tested prior to incidents.
    compliance_mappings:
      cis:
        - "CIS_VMWARE_ESXI_8_v1_2_0_1_11"
