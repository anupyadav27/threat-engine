  - rule_id: vmware_esxi.cis.5.l2_ensure_the_ssh_authorized_keys_file_is_empty
    title: "(L2) Ensure the SSH authorized_keys file is empty"
    severity: medium
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "5.7"
    cis_section: "5"
    profile_applicability: "Level 2"
    description: >
      ESXi hosts come with Secure Shell (SSH), which can be configured to
      authenticate remote users using public key authentication. For day-to-day
      operations, the ESXi host should be in lockdown mode with the SSH service
      disabled. Lockdown mode does not prevent root users from logging in using
      keys. The presence of a remote user's public key in the /etc/ssh/keys-
      root/authorized_keys file on an ESXi host identifies the user as trusted,
      meaning the user is granted access to the host without providing a password.
      Disabling authorized_keys access may limit your ability to run unattended
      remote scripts.
    rationale: >
      Keeping the authorized_keys file empty prevents users from circumventing the
      intended restrictions of lockdown mode.
    audit_procedure: >
      To verify the authorized_keys file does not contain any keys, perform the
      following: 1. Logon to the ESXi shell as root or another admin user. • SSH may
      need to be enabled first. 2. Verify the /etc/ssh/keys-root/authorized_keys
      file is empty.
    remediation: >
      To remove all keys from the authorized_keys file, perform the following: 1.
      Logon to the ESXi shell as root or another admin user. • SSH may need to be
      enabled first 2. Edit the /etc/ssh/keys-root/authorized_keys file. 3. Remove
      all keys from the file and save the file. Default Value: The file is empty by
      default. References: 1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-392ADDE9-FD3B-49A2-
      BF64-4ACBB60EB149.html
    references: >
      1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-392ADDE9-FD3B-49A2-
      BF64-4ACBB60EB149.html
