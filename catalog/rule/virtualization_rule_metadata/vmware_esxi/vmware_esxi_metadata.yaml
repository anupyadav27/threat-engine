  - rule_id: vmware_esxi.cis.7.l2_virtual_machines_must_enable_secure_boot
    title: "(L2) Virtual machines must enable Secure Boot"
    severity: medium
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 8_v1.2.0"
    cis_version: "8_v1.2.0"
    cis_control: "7.1"
    cis_section: "7"
    profile_applicability: "Level 2"
    description: >
      Enable Secure Boot on virtual machines to ensure that only authenticated code
      runs from the firmware up through the operating system, thus providing a
      fundamental security measure against boot-time malware and unauthorized code
      execution. Supported by all modern guest operating systems, Secure Boot
      employs public key cryptography to validate the firmware, boot loader,
      drivers, and OS kernel at boot time.
    rationale: >
      By enforcing Secure Boot, organizations can mitigate the risk of boot-time
      malware and unauthorized code execution, which is crucial for maintaining the
      integrity and trustworthiness of the system from the first instruction.
      Impact: Activation of Secure Boot post guest OS installation may entail more
      than merely enabling a setting; consult the respective guest OS documentation
      for detailed instructions. This may introduce additional steps in the setup
      process, potentially extending the deployment time.
    audit_procedure: >
      The following PowerCLI command may be used: (Get-VM -Name
      $VM).ExtensionData.Config.BootOptions.EfiSecureBootEnabled
    remediation: >
      The following PowerCLI command may be used: $VMobj = (Get-VM -Name $VM)
      $ConfigSpec = New-Object VMware.Vim.VirtualMachineConfigSpec $bootOptions =
      New-Object VMware.Vim.VirtualMachineBootOptions
      $bootOptions.EfiSecureBootEnabled = $true $ConfigSpec.BootOptions =
      $bootOptions $task = $VMobj.ExtensionData.ReconfigVM_Task($ConfigSpec) Default
      Value: Depends on VM Hardware version and guest OS selection.
    references: >
      
    impact: >
      Activation of Secure Boot post guest OS installation may entail more than
      merely enabling a setting; consult the respective guest OS documentation for
      detailed instructions. This may introduce additional steps in the setup
      process, potentially extending the deployment time.
    compliance_mappings:
      cis:
        - "CIS_VMWARE_ESXI_8_v1_2_0_7_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_vmware_esxi_8_v1_2_0_7_1"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: vmware_esxi.cis.7.l1_virtual_machines_must_require_encryption_for
    title: "(L1) Virtual machines must require encryption for vMotion"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 8_v1.2.0"
    cis_version: "8_v1.2.0"
    cis_control: "7.2"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      Requiring encryption for vMotion ensures the secure transfer of data among
      virtual machines. While the default 'opportunistic' encryption setting
      generally provides encryption due to prevalent AES-NI support, enforcing
      'required' encryption eradicates the possibility of unencrypted transfers. The
      parameter governing this behavior is VM Configuration with the recommended
      setting being required.
    rationale: >
      Enforcing encryption for vMotion is crucial to prevent potential data leakage
      or unauthorized data access during data transfer processes, thereby bolstering
      the overall security infrastructure. Impact: There is no functional impact
      noted.
    audit_procedure: >
      The following PowerCLI command may be used: (Get-VM -Name
      $VM).ExtensionData.Config.MigrateEncryption
    remediation: >
      The following PowerCLI command may be used: $VMview = Get-VM -Name $VM | Get-
      View $ConfigSpec = New-Object VMware.Vim.VirtualMachineConfigSpec
      $ConfigSpec.MigrateEncryption = New-Object
      VMware.Vim.VirtualMachineConfigSpecEncryptedVMotionModes
      $ConfigSpec.MigrateEncryption = 'required'
      $VMview.ReconfigVM_Task($ConfigSpec) Default Value: opportunistic
    references: >
      
    impact: >
      There is no functional impact noted.
    compliance_mappings:
      cis:
        - "CIS_VMWARE_ESXI_8_v1_2_0_7_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_vmware_esxi_8_v1_2_0_7_2"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: vmware_esxi.cis.7.l2_virtual_machines_should_deactivate_3d_graphics
    title: "(L2) Virtual machines should deactivate 3D graphics features when not required"
    severity: medium
    category: virtualization
    tech_type: vmware_esxi
    automation_type: automated
    cis_benchmark: "CIS_VMWARE_ESXI 8_v1.2.0"
    cis_version: "8_v1.2.0"
    cis_control: "7.4"
    cis_section: "7"
    profile_applicability: "Level 2"
    description: >
      Due to performance reasons, modern graphic rendering is done within a
      dedicated graphic processing unit (GPU). Virtual machines can use the host-
      based GPU for such operations as well. Such dedicated hardware is typically
      accessed by using complex APIs like OpenGL and DirectX. This hardware-based 3D
      acceleration should be disabled if it is not needed.
    rationale: >
      Security flaws within APIs can lead to serious security breaches like memory
      corruption, denial of service, and remote code execution. Impact: GPU and
      Virtual Desktops may require this functionality.
    audit_procedure: >
      The following PowerCLI command may be used: Get-VM -Name $VM | Get-
      AdvancedSetting mks.enable3d
    remediation: >
      The following PowerCLI command may be used: Get-VM -Name $VM | Get-
      AdvancedSetting mks.enable3d | Set-AdvancedSetting - Value FALSE Default
      Value: Depends on VM Hardware version and guest OS selection.
    references: >
      
    impact: >
      GPU and Virtual Desktops may require this functionality.
    compliance_mappings:
      cis:
        - "CIS_VMWARE_ESXI_8_v1_2_0_7_4"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_vmware_esxi_8_v1_2_0_7_4"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: vmware_esxi.cis.7.l1_virtual_machines_must_be_configured_to_lock
    title: "(L1) Virtual machines must be configured to lock when the last console connection is closed"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 8_v1.2.0"
    cis_version: "8_v1.2.0"
    cis_control: "7.5"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      Configuring virtual machines to lock upon closing the last console connection
      enhances security by mitigating the risk of unauthorized access via open
      console sessions. This configuration is particularly useful in environments
      where multiple users have access to the console. The parameter governing this
      behavior is tools.guest.desktop.autolock with the recommended setting being
      TRUE.
    rationale: >
      Implementing this control provides an additional layer of security by ensuring
      that open console sessions do not remain accessible after the last connection
      is closed, thus reducing the potential for unauthorized access. Impact: No
      functional impact is associated with this control; it serves as a proactive
      measure to prevent unauthorized access through open console sessions.
    audit_procedure: >
      The following PowerCLI command may be used: Get-VM -Name $VM | Get-
      AdvancedSetting tools.guest.desktop.autolock
    remediation: >
      The following PowerCLI command may be used: If the audit returns blank or the
      value is not yet set Get-VM -Name $VM | New-AdvancedSetting -Name
      tools.guest.desktop.autolock $True otherwise use Get-VM | get-AdvancedSetting
      -Name tools.guest.desktop.autolock | set- advancedsetting -Value $True Default
      Value: FALSE
    references: >
      
    impact: >
      No functional impact is associated with this control; it serves as a proactive
      measure to prevent unauthorized access through open console sessions.
    compliance_mappings:
      cis:
        - "CIS_VMWARE_ESXI_8_v1_2_0_7_5"
      nist_800_53: []
      soc2: []
