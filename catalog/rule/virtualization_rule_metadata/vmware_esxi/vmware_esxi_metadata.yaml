  - rule_id: vmware_esxi.cis.5.l1_host_must_restrict_the_use_of_virtual_guest
    title: "(L1) Host must restrict the use of Virtual Guest Tagging (VGT) on standard virtual switches"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: automated
    cis_benchmark: "CIS_VMWARE_ESXI 8_v1.2.0"
    cis_version: "8_v1.2.0"
    cis_control: "5.10"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      When a port group is set to VLAN 4095 on standard virtual switches, it enables
      Virtual Guest Tagging (VGT), letting all network frames pass to the attached
      virtual machines (VMs) without altering the VLAN tags. This requires VMs to
      process VLAN information themselves via an 802.1Q driver. Only authorized and
      capable VMs should be allowed to use VGT to prevent potential network issues
      like denial of service or unauthorized VLAN traffic interaction.
    rationale: >
      Restricting VGT use helps maintain network security by ensuring controlled
      VLAN tag management. It mitigates risks associated with denial of service or
      unauthorized VLAN interactions, contributing to a stable network environment.
      Impact: Incorrect VGT configuration can lead to denial of service or
      unauthorized VLAN traffic interaction. Restricting VGT may require alternative
      configurations for VMs needing independent VLAN tag management, potentially
      affecting network operation.
    audit_procedure: >
      To verify port groups are not set to 4095 unless VGT is required, perform the
      following: 1. From the vSphere Web Client, select the host. 2. Click Configure
      then expand Networking. 3. Select Virtual switches. 4. Expand the Standard
      vSwitch. 5. View the topology diagram of the switch, which shows the various
      port groups associated with that switch. 6. For each port group on the
      vSwitch, verify and record the VLAN IDs used. Additionally, the following
      PowerCLI command may be used: # List all vSwitches, their Portgroups and VLAN
      IDs Get-VirtualPortGroup -Standard | Select virtualSwitch, Name, VlanID
    remediation: >
      To set port groups to values other than 4095 and 0 unless VGT is required,
      perform the following: 1. From the vSphere Web Client, select the host. 2.
      Click Configure then expand Networking. 3. Select Virtual switches. 4. Expand
      the Standard vSwitch. 5. View the topology diagram of the switch, which shows
      the various port groups associated with that switch. 6. For each port group on
      the vSwitch, verify and record the VLAN IDs used. 7. If a VLAN ID change is
      needed, click the name of the port group in the topology diagram of the
      virtual switch. 8. Click the Edit settings option. 9. In the Properties
      section, enter an appropriate name in the Network label field. 10. In the VLAN
      ID dropdown select or type a new VLAN. 11. Click OK. References: 1.
      http://www.cisco.com/c/en/us/td/docs/switches/lan/catalyst4500/12-
      2/20ew/configuration/guide/config/vlans.html#wp1038758
    references: >
      1. http://www.cisco.com/c/en/us/td/docs/switches/lan/catalyst4500/12-
      2/20ew/configuration/guide/config/vlans.html#wp1038758
    impact: >
      Incorrect VGT configuration can lead to denial of service or unauthorized VLAN
      traffic interaction. Restricting VGT may require alternative configurations
      for VMs needing independent VLAN tag management, potentially affecting network
      operation.
    compliance_mappings:
      cis:
        - "CIS_VMWARE_ESXI_8_v1_2_0_5_10"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_vmware_esxi_8_v1_2_0_5_10"
    metadata_source: generated
    generated_by: generate_tech_rules

