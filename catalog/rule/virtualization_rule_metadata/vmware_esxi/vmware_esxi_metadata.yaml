    cis_control: "2.1"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The 'End of General Support' (EOGS) status indicates that the software version
      has exceeded its primary support lifecycle, during which VMware provides new
      security patches, bug fixes, and technical assistance. When a product reaches
      this status, VMware no longer releases security updates for that version for
      customers outside of an extended support contract. Thus, systems still running
      software past its EOGS are potentially exposed to unpatched vulnerabilities
      and other security risks.
    rationale: >
      Running software beyond its EOGS can compromise the integrity, availability,
      and confidentiality of virtual environments. Keeping VMware ESXi software
      versions within the support period ensures that organizations have access to
      the latest security patches, critical updates, and vendor support. Impact:
      Failing to update and maintain software versions within the support period can
      lead to potential security breaches, data losses, and reduced operational
      efficiency, as the software might become incompatible with newer technologies
      and lack support for emerging security threats.
