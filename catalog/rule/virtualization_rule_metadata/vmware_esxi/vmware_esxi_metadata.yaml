  - rule_id: vmware_esxi.cis.8.l1_ensure_use_of_the_vm_console_is_limited
    title: "(L1) Ensure use of the VM console is limited"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "8.3.2"
    cis_section: "8"
    profile_applicability: "Level 1"
    description: >
      The VM console enables you to connect to the console of a VM, in effect seeing
      what a monitor on a physical server would show. The VM console also provides
      power management and removable device connectivity controls. Instead of the VM
      console, use native remote management services, such as terminal services and
      ssh, to interact with VMs. Grant access to the VM console only when needed,
      and use custom roles to provide fine-grained permissions for those people who
      do need access. By default, the vCenter roles 'Virtual Machine Power User' and
      'Virtual Machine Administrator' have the 'Virtual Machine.Interaction.Console
      Interaction' privilege.
    rationale: >
      The VM console could be misused to eavesdrop on VM activity, cause VM outages,
      and negatively affect the performance of the console, especially if many VM
      console sessions are open simultaneously.
    audit_procedure: >
      To verify use of the VM console is properly limited, perform the following
      steps: 1. From the vSphere Client, select an object in the inventory. 2. Click
      the Permissions tab to view the user and role pair assignments for that
      object. 3. Next, through the vCenter Menu go to Administration then Roles. 4.
      Select the role(s) in question and edit via the pencil icon to see which
      effective privileges are enabled. 5. Verify that only authorized users have a
      role which allows them a privilege under the Virtual Machine section of the
      role editor.
    remediation: >
      To properly limit use of the VM console, perform the following steps: 1. From
      within vCenter select Menu go to Administration then Roles. 2. Create a custom
      role then choose the pencil icon to edit the new role. 3. Give the appropriate
      permissions. 4. View the usage and privileges as required. 5. Remove any
      default Admin or Power User roles then assign the new custom roles as needed.
      References: 1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-41E5E52E-A95B-4E81-
      9724-6AD6800BEF78.html 2. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-3D47149A-947D-4608-
      88B3-E5811129EFA8.html Additional Information: You can set this privilege at
      different levels in the hierarchy. For example, if you set a privilege at the
      folder level, you can propagate the privilege to one or more objects within
      the folder. The object listed in the Required On column must have the
      privilege set, either directly or inherited.
    references: >
      1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-41E5E52E-A95B-4E81-
      9724-6AD6800BEF78.html 2. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-3D47149A-947D-4608-
      88B3-E5811129EFA8.html Additional Information: You can set this privilege at
      different levels in the hierarchy. For example, if you set a privilege at the
      folder level, you can propagate the privilege to one or more objects within
      the folder. The object listed in the Required On column must have the
      privilege set, either directly or inherited.
    impact: >
      
