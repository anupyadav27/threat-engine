  - rule_id: vmware_esxi.cis.2.l2_ensure_vds_health_check_is_disabled
    title: "(L2) Ensure VDS health check is disabled"
    severity: medium
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "2.9"
    cis_section: "2"
    profile_applicability: "Level 2"
    description: >
      The health check support in VDS helps you identify and troubleshoot
      configuration errors in a vSphere Distributed Switch. It is recommended that
      health check be turned off by default and confirmed that it is turned off when
      troubleshooting is finished.
    rationale: >
      vSphere Distributed switch health check once enabled, collects packets that
      contain information on host#, vds# port#, which an attacker would find useful.
    audit_procedure: >
      Using the vSphere Web Client for each VDS: 1. Select a VDS 2. Go to Configure,
      expand Settings then select Health Check. 3. Ensure that VLAN and MTU as well
      as Teaming and failover are set to Disabled. Additionally, the following
      PowerCLI command can be used: $vds = Get-VDSwitch
      $vds.ExtensionData.Config.HealthCheckConfig
    remediation: >
      Using the vSphere Web Client for each VDS: 1. Select a VDS 2. Go to Configure,
      expand Settings then select Health Check. 3. Click on Edit. 4. Set VLAN and
      MTU state to Disabled. 5. Set Teaming and failover state to Disabled. 6. Click
      OK. Additionally, the following PowerCLI command can be used: Get-View
      -ViewType DistributedVirtualSwitch | ?{($_.config.HealthCheckConfig |
      ?{$_.enable -notmatch 'False'})}| %{$_.UpdateDVSHealthCheckConfig(@((New-
      Object Vmware.Vim.VMwareDVSVlanMtuHealthCheckConfig -property
      @{enable=0}),(New-Object Vmware.Vim.VMwareDVSTeamingHealthCheckConfig -
      property @{enable=0})))} Default Value: By default, the vSphere Distributed
      Switch health check is not enabled and configured by default. References: 1.
      https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.networking.doc/GUID-4A6C1E1C-8577-4AE6-
      8459-EEB942779A82.html
    references: >
      1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.networking.doc/GUID-4A6C1E1C-8577-4AE6-
      8459-EEB942779A82.html
    impact: >
      
