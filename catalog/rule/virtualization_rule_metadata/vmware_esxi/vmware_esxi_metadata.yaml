  - rule_id: vmware_esxi.cis.5.l1_host_should_reject_forged_transmits_on
    title: "(L1) Host should reject forged transmits on standard virtual switches and port groups"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: automated
    cis_benchmark: "CIS_VMWARE_ESXI 8_v1.2.0"
    cis_version: "8_v1.2.0"
    cis_control: "5.6"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      Setting the 'Forged transmits' option to 'Reject' helps prevent MAC
      impersonation by comparing the source MAC address from the guest operating
      system with the effective MAC address of its virtual machine adapter. If
      there's a mismatch, the packet is dropped, preventing potential malicious
      activities through impersonated MAC addresses.
    rationale: >
      Rejecting forged transmits enhances network security by preventing
      unauthorized network access and malicious activities stemming from MAC
      impersonation. This setting upholds network integrity by ensuring only
      authorized communications occur within the network. Impact: This setting may
      affect workloads like clustered applications and network devices/functions
      that rely on MAC address modifications. Creating a separate port group for
      authorized virtual machines that require such behavior is recommended to
      balance operational needs with network security.
    audit_procedure: >
      To verify the policy is set to reject forged transmissions, perform the
      following: 1. From the vSphere Web Client, select the host. 2. Click Configure
      then expand Networking. 3. Select Virtual switches then click Edit. 4. Click
      on Security. 5. Verify that Forged transmits is set to Reject in the dropdown.
      Alternately, the following PowerCLI command may be used: # List all vSwitches
      and their Security Settings Get-VirtualSwitch -Standard | Select VMHost, Name,
      ` @{N='MacChanges';E={if ($_.ExtensionData.Spec.Policy.Security.MacChanges) {
      'Accept' } Else { 'Reject'} }}, ` @{N='PromiscuousMode';E={if
      ($_.ExtensionData.Spec.Policy.Security.PromiscuousMode) { 'Accept' } Else {
      'Reject'} }}, ` @{N='ForgedTransmits';E={if
      ($_.ExtensionData.Spec.Policy.Security.ForgedTransmits) { 'Accept' } Else {
      'Reject'} }}
    remediation: >
      To set the policy to reject forged transmissions, perform the following: 1.
      From the vSphere Web Client, select the host. 2. Click Configure then expand
      Networking. 3. Select Virtual switches then click Edit. 4. Click on Security.
      5. Set Forged transmits to Reject in the dropdown. 6. Click on OK.
      Alternately, the following ESXi shell command may be used: # esxcli network
      vswitch standard policy security set -v vSwitch2 -f false References: 1.
      https://docs.vmware.com/en/VMware-vSphere/8.0/vsphere-security/GUID-
      3507432E-AFEA-4B6B-B404-17A020575358.html#GUID-7DC6486F-5400-
      44DF-8A62-6273798A2F80
    references: >
      1. https://docs.vmware.com/en/VMware-vSphere/8.0/vsphere-security/GUID-
      3507432E-AFEA-4B6B-B404-17A020575358.html#GUID-7DC6486F-5400-
      44DF-8A62-6273798A2F80
    impact: >
      This setting may affect workloads like clustered applications and network
      devices/functions that rely on MAC address modifications. Creating a separate
      port group for authorized virtual machines that require such behavior is
      recommended to balance operational needs with network security.
