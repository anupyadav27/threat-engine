    tech_type: vmware_esxi
    automation_type: automated
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "8.7.3"
    cis_section: "8"
    profile_applicability: "Level 1"
    description: >
      Normally a new log file is created only when a host is rebooted, so the file
      can grow to be quite large. You can ensure that new log files are created more
      frequently by limiting the maximum size of the log files. If you want to
      restrict the total size of logging data, VMware recommends saving 10 log
      files, each one limited to 1 MB. If the maximum number of log files already
      exists, when a new one is created, the oldest log file is deleted.
    rationale: >
      Virtual machine users and processes can abuse logging either on purpose or
      inadvertently so that large amounts of data flood the log file. Without
      restrictions on maximum log file size, over time a log file can consume enough
      file system space to cause a denial of service. Impact: A more extreme
      strategy is to disable logging altogether for the virtual machine. Disabling
      logging makes troubleshooting challenging and support difficult. Do not
      consider disabling logging unless the log file rotation approach proves
      insufficient.
    audit_procedure: >
      To verify the maximum log file size is limited properly, verify that
      log.rotateSize is set to 1024000. 1. Select the VM then select Actions
      followed by Edit Settings. 2. Click on the VM Options tab then expand
      Advanced. 3. Click on EDIT CONFIGURATION. 4. Verify that log.rotateSize is set
      to 1024000. Alternately, the following PowerCLI command may be used: # List
      the VMs and their current settings Get-VM | Get-AdvancedSetting -Name
      'log.rotateSize'| Select Entity, Name, Value
    remediation: >
      To set this configuration utilize the vSphere interface as follows: 1. Select
      the VM then select Actions followed by Edit Settings. 2. Click on the VM
      Options tab then expand Advanced. 3. Click on EDIT CONFIGURATION. 4. Click on
      ADD CONFIGURATION PARAMS then input log.rotateSize with a value of 1024000. 5.
      Click OK, then OK again. To properly limit the maximum log file size, run the
      following PowerCLI command: # Add the setting to all VMs Get-VM | New-
      AdvancedSetting -Name 'log.rotateSize' -value '1024000' References: 1.
      http://kb.vmware.com/kb/8182749 2. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.monitoring.doc/GUID-2DD66869-52C7-42C5-
      8F5B-145EBD26BBA1.html
    references: >
      1. http://kb.vmware.com/kb/8182749 2. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.monitoring.doc/GUID-2DD66869-52C7-42C5-
      8F5B-145EBD26BBA1.html
    impact: >
      A more extreme strategy is to disable logging altogether for the virtual
