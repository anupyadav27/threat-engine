  - rule_id: vmware_esxi.cis.6.l1_ensure_storage_area_network_san_resources_are
    title: "(L1) Ensure storage area network (SAN) resources are segregated properly"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "6.3"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Use zoning and logical unit number (LUN) masking to segregate storage area
      network (SAN) activity. Zoning provides access control in the SAN topology.
      Zoning defines which host bus adapters (HBAs) can connect to which targets.
      The devices outside a zone are not visible to the devices inside the zone when
      SAN zoning is configured. For example, zones defined for testing should be
      managed independently within the SAN so they do not interfere with activity in
      the production zones. Similarly, you can set up different zones for different
      departments. Zoning must take into account any host groups that have been set
      up on the SAN device. LUN masking is a process that makes a LUN available to
      some hosts and unavailable to other hosts.
    rationale: >
      Segregating SAN activity can reduce the attack surface for the SAN, prevent
      non-ESXi systems from accessing SANs, and separate environments, for example,
      test and production environments.
    audit_procedure: >
      The audit procedures to verify SAN activity is properly segregated are SAN
      vendor or product-specific.
    remediation: >
      The remediation procedures to properly segregate SAN activity are SAN vendor
      or product-specific. In general, with ESXi hosts, use a single-initiator
      zoning or a single-initiator-single-target zoning. The latter is a preferred
      zoning practice. Using the more restrictive zoning prevents problems and
      misconfigurations that can occur on the SAN. References: 1.
      https://docs.vmware.com/en/VMware-
