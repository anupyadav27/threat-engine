  - rule_id: vmware_esxi.cis.8.l2_ensure_only_one_remote_console_connection_is
    title: "(L2) Ensure only one remote console connection is permitted to a VM at any time"
    severity: medium
    category: virtualization
    tech_type: vmware_esxi
    automation_type: automated
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "8.1.1"
    cis_section: "8"
    profile_applicability: "Level 2"
    description: >
      By default, remote console sessions can be connected to by more than one user
      at a time. Permit only one remote console connection to a VM at a time. Other
      attempts will be rejected until the first connection disconnects.
    rationale: >
      When multiple sessions are activated, each terminal window gets a notification
      about the new session. If an administrator in the VM logs in using a VMware
      remote console during their session, a non-administrator in the VM can connect
      to the console and observe the administrator's actions. Also, this could
      result in an administrator losing console access to a VM. For example, if a
      jump box is being used for an open console session, and the admin loses a
      connection to that box, the console session remains open. Allowing two console
      sessions permits debugging via a shared session. For highest security, only
      one remote console session at a time should be allowed.
    audit_procedure: >
      To verify that only one remote console session is permitted at a time, confirm
      that RemoteDisplay.maxConnections is set to 1. 1. Select the VM then select
      Actions followed by Edit Settings. 2. Click on the VM Options tab then expand
      Advanced. 3. Click on EDIT CONFIGURATION. 4. Verify that
      RemoteDisplay.maxConnections is set to 1. Alternately, the following PowerCLI
      command may be used: # List the VMs and their current settings Get-VM | Get-
      AdvancedSetting -Name 'RemoteDisplay.maxConnections' | Select Entity, Name,
      Value
    remediation: >
      To set this configuration utilize the vSphere interface as follows: 1. Select
      the VM then select Actions followed by Edit Settings. 2. Click on the VM
      Options tab then expand Advanced. 3. Click on EDIT CONFIGURATION. 4. Click on
      ADD CONFIGURATION PARAMS then input RemoteDisplay.maxConnections with a value
      of 1. 5. Click OK, then OK again. Alternatively, run the following PowerCLI
      command for VMs that do not specify the setting: # Add the setting to all VMs
      Get-VM | New-AdvancedSetting -Name 'RemoteDisplay.maxConnections' -value 1 Run
      the following PowerCLI command for VMs that specify the setting but have the
      wrong value for it: # Add the setting to all VMs Get-VM | New-AdvancedSetting
      -Name 'RemoteDisplay.maxConnections' -value 1 - Force References: 1.
      http://www.ibenit.com/post/85227299008/security-benchmark-hardening-guide-
      policies-and-profile 2. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-27A340F5-DE98-41A8-
      AC73-01ED4949EEF2.html 3. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.vm_admin.doc/GUID-7FED3B17-E2E9-4360-
      AAC6-B70F9A9AEB84.html
    references: >
      1. http://www.ibenit.com/post/85227299008/security-benchmark-hardening-guide-
      policies-and-profile 2. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-27A340F5-DE98-41A8-
      AC73-01ED4949EEF2.html 3. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.vm_admin.doc/GUID-7FED3B17-E2E9-4360-
      AAC6-B70F9A9AEB84.html
    impact: >
      
