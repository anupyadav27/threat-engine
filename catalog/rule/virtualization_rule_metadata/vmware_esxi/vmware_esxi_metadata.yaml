  - rule_id: vmware_esxi.cis.2.l1_ensure_managed_object_browser_mob_is_disabled
    title: "(L1) Ensure Managed Object Browser (MOB) is disabled"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: automated
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "2.3"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The Managed Object Browser (MOB) is a web-based server application that lets
      you examine objects that exist on the server side, explore the object model
      used by the VM kernel to manage the host, and change configurations. It is
      installed and started automatically when vCenter is installed.
    rationale: >
      The MOB is meant to be used primarily for debugging the vSphere SDK. Because
      there are no access controls, the MOB could also be used as a method to obtain
      information about a host being targeted for unauthorized access. Impact: Some
      third-party tools may utilize the Managed Object Browser (MOB) meaning that
      disabling it will cause those tools to malfunction.
    audit_procedure: >
      To confirm whether MOB is enabled, perform the following from the vSphere Web
      Client: 1. Select a host 2. Click Configure then expand System then select
      Advanced System Settings. 3. Click Edit then search for
      Config.HostAgent.plugins.solo.enableMob 4. Verify the value is set to false.
      To determine if the MOB is enabled, run the following command from the ESXi
      shell: vim-cmd proxysvc/service_list Additionally, the following PowerCLI
      command may be used: Get-VMHost | Get-AdvancedSetting -Name
      Config.HostAgent.plugins.solo.enableMob
    remediation: >
      To disabled MOB, perform the following from the vSphere Web Client: 1. Select
      a host 2. Click Configure then expand System then select Advanced System
      Settings. 3. Click Edit then search for
      Config.HostAgent.plugins.solo.enableMob 4. Set the value to false. 5. Click
      OK. Note: You cannot disable the MOB while a host is in lockdown mode. Note 2:
      You must disable MOB from the vSphere interface not via the vim-cmd command.
      References: 1. https://docs.vmware.com/en/VMware-
      vSphere/6.7/com.vmware.vsphere.security.doc/GUID-0EF83EA7-277C-400B-
      B697-04BDC9173EA3.html Additional Information: Some third-party tools use the
      MOB to gather information. Use the following command to re-enable the MOB
      temporarily for third-party tool usage: To disabled MOB, perform the following
      from the vSphere Web Client: 1. Select a host 2. Click Configure then expand
      System then select Advanced System Settings. 3. Click Edit then search for
      Config.HostAgent.plugins.solo.enableMob 4. Set the value to true. 5. Click OK.
      Note 2: You must enable MOB from the vSphere interface not via the vim-cmd
      command.
    references: >
      1. https://docs.vmware.com/en/VMware-
      vSphere/6.7/com.vmware.vsphere.security.doc/GUID-0EF83EA7-277C-400B-
      B697-04BDC9173EA3.html Additional Information: Some third-party tools use the
      MOB to gather information. Use the following command to re-enable the MOB
      temporarily for third-party tool usage: To disabled MOB, perform the following
      from the vSphere Web Client: 1. Select a host 2. Click Configure then expand
      System then select Advanced System Settings. 3. Click Edit then search for
      Config.HostAgent.plugins.solo.enableMob 4. Set the value to true. 5. Click OK.
      Note 2: You must enable MOB from the vSphere interface not via the vim-cmd
      command.
    impact: >
      Some third-party tools may utilize the Managed Object Browser (MOB) meaning
      that disabling it will cause those tools to malfunction.
    compliance_mappings:
