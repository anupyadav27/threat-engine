  - rule_id: vmware_esxi.cis.3.l1_host_must_automatically_terminate_idle_dcui
    title: "(L1) Host must automatically terminate idle DCUI sessions"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: automated
    cis_benchmark: "CIS_VMWARE_ESXI 8_v1.2.0"
    cis_version: "8_v1.2.0"
    cis_control: "3.7"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      By configuring a session timeout, unattended console sessions are
      automatically terminated, thereby reducing the potential security risks
      associated with lingering active sessions. The parameter governing this
      behavior is UserVars.DcuiTimeOut, with a recommended setting of 600 (10
      minutes).
    rationale: >
      Automated termination of idle DCUI sessions enhances the security posture by
      minimizing the window of opportunity for unauthorized access through
      unattended sessions. It enforces a good security hygiene practice by ensuring
      that inactive sessions do not remain open indefinitely, which is in line with
      the principle of least privilege. Impact: While there's no functional impact
      specified, setting a timeout value that's too short may inconvenience users by
      terminating sessions prematurely, possibly interrupting workflow. Conversely,
      a timeout value that's too long may not adequately mitigate the risks
      associated with idle sessions. Hence, a balanced approach in configuring the
      session timeout value, aligned with the organizational security policy and
      user workflow, is crucial.
    audit_procedure: >
      To verify the DCUI timeout setting, perform the following steps: 1. From the
      vSphere Web Client, select the host. 2. Click Configure, then under System
      select Advanced System Settings. 3. Select Edit then enter
      UserVars.DcuiTimeOut in the filter. 4. Verify that the value for this
      parameter is 600 seconds or less. Alternately, the following PowerCLI command
      may be used: Get-VMHost | Get-AdvancedSetting -Name UserVars.DcuiTimeOut
    remediation: >
      To correct the DCUI timeout setting, perform the following steps: 1. From the
      vSphere Web Client, select the host. 2. Click Configure, then under System
      select Advanced System Settings. 3. Select Edit then enter
      UserVars.DcuiTimeOut in the filter. 4. Click in the box for the current value,
      then set the value to 600 seconds or less. Alternately, use the following
      PowerCLI command: Get-VMHost | Get-AdvancedSetting -Name UserVars.DcuiTimeOut
      | Set- AdvancedSetting -Value 600
    references: >
      
    impact: >
      While there's no functional impact specified, setting a timeout value that's
      too short may inconvenience users by terminating sessions prematurely,
      possibly interrupting workflow. Conversely, a timeout value that's too long
      may not adequately mitigate the risks associated with idle sessions. Hence, a
      balanced approach in configuring the session timeout value, aligned with the
      organizational security policy and user workflow, is crucial.
