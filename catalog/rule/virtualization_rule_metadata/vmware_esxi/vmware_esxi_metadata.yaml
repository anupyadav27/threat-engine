  - rule_id: vmware_esxi.cis.6.l2_ensure_the_uniqueness_of_chap_authentication
    title: "(L2) Ensure the uniqueness of CHAP authentication secrets for iSCSI traffic"
    severity: medium
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "6.2"
    cis_section: "6"
    profile_applicability: "Level 2"
    description: >
      Challenge-Handshake Authentication Protocol (CHAP) requires both client and
      host to know the secret (password) to establish a connection. Each mutual
      authentication secret should be unique.
    rationale: >
      If all mutual authentication secrets are unique, compromise of one secret does
      not allow an attacker to authenticate to other hosts or clients using that
      same secret.
    audit_procedure: >
      To verify the CHAP secrets are unique, run the following to list all iSCSI
      adapters and their corresponding CHAP configuration: # List Iscsi Initiator
      and CHAP Name if defined Get-VMHost | Get-VMHostHba | Where {$_.Type -eq
      'Iscsi'} | Select VMHost, Device, ChapType,
      @{N='CHAPName';E={$_.AuthenticationProperties.ChapName}}
    remediation: >
      To change the values of CHAP secrets so they are unique, perform the
      following: 1. From the vSphere Web Client, select the host. 2. Click Configure
      then expand Storage. 3. Select Storage Adapters then select the iSCSI Adapter.
      4. Under Properties click on Edit next to Authentication. 5. Next to
      Authentication Method specify the authentication method from the dropdown. o
      None o Use unidirectional CHAP if required by target o Use unidirectional CHAP
      unless prohibited by target o Use unidirectional CHAP o Use bidirectional CHAP
      6. Specify the outgoing CHAP name. • Make sure that the name you specify
      matches the name configured on the storage side. o To set the CHAP name to the
      iSCSI adapter name, select 'Use initiator name'. o To set the CHAP name to
      anything other than the iSCSI initiator name, deselect 'Use initiator name'
      and type a name in the Name text box. 8. Enter an outgoing CHAP secret to be
      used as part of authentication. Use the same secret as your storage side
      secret. 9. If configuring with bidirectional CHAP, specify incoming CHAP
      credentials. • Make sure your outgoing and incoming secrets do not match. 10.
      If configuring with bidirectional CHAP, specify incoming CHAP credentials. •
      Make sure your outgoing and incoming secrets do not match. 11. Click OK. 12.
      Click the second to last symbol labeled Rescan Adapter References: 1.
      https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.storage.doc/GUID-AC65D747-728F-4109-
      96DD-49B433E2F266.html 2. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.storage.doc/GUID-2F1E64DB-20BB-4D18-
      A083-8E65FE380899.html Additional Information: If you change the CHAP
      parameters, they are used for new iSCSI sessions. For existing sessions, new
      settings are not used until you log out and log in again.
    references: >
      1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.storage.doc/GUID-AC65D747-728F-4109-
      96DD-49B433E2F266.html 2. https://docs.vmware.com/en/VMware-
