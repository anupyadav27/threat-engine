  - rule_id: vmware_esxi.cis.2.l1_host_must_have_reliable_time_synchronization
    title: "(L1) Host must have reliable time synchronization sources"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: automated
    cis_benchmark: "CIS_VMWARE_ESXI 8_v1.2.0"
    cis_version: "8_v1.2.0"
    cis_control: "2.6"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Ensuring reliable time synchronization is crucial as various functions like
      cryptography, audit logging, cluster operations, and incident
      response/forensics are heavily dependent on synchronized time. Utilizing at
      least four NTP sources is recommended for achieving reliable time
      synchronization. Alternatively, PTP can be employed for sub-millisecond time
      accuracy, with NTP configured as a backup to maintain time synchronization
      resilience in case of primary server failure.
    rationale: >
      Reliable time synchronization supports accurate auditing, cryptographic
      integrity, cluster operations, and effective incident response/forensics.
      Having multiple time sources enhances the reliability and accuracy of time
      synchronization, which is fundamental for secure and efficient system
      operations. Impact: Inadequate time synchronization may lead to erroneous
      system logs, compromised cryptographic operations, inefficient cluster
      operations, and hindered incident response efforts. The resilience and
      accuracy of time synchronization are vital for maintaining operational
      integrity and security posture.
    audit_procedure: >
      To confirm NTP synchronization is enabled and properly configured, perform the
      following from the vSphere Web Client: 1. Select a host 2. Click Configure
      then expand System then select Time Configuration. 3. Verify that Time
      Synchronization is set to Automatic 4. Verify that the NTP Client is set to
      Enabled 5. Verify that the NTP Service Status is Running 6. Verify that
      appropriate NTP servers are set. Additionally, the following PowerCLI command
      may be used: # List the NTP Settings for all hosts Get-VMHost | Select Name,
      @{N='NTPSetting';E={$_ | Get-VMHostNtpServer}}
    remediation: >
      To enable and properly configure NTP synchronization, perform the following
      from the vSphere web client: 1. Select a host 2. Click Configure then expand
      System then select Time Configuration. 3. Select Edit next to Network Time
      Protocol 4. Select the Enable box, then fill in the appropriate NTP Servers.
      5. in the NTP Service Startup Policy drop down select Start and stop with
      host. 6. Click OK. To implement the recommended configuration state, run the
      following PowerCLI command: # Set the NTP Settings for all hosts # If an
      internal NTP server is used, replace pool.ntp.org with # the IP address or the
      Fully Qualified Domain Name (FQDN) of the internal NTP server $NTPServers =
      'pool.ntp.org', 'pool2.ntp.org' Get-VMHost | Add-VmHostNtpServer $NTPServers
      References: 1. https://docs.vmware.com/en/VMware-vSphere/8.0/vsphere-
      security/GUID- 2553C86E-7981-4F79-B9FC-A6CECA52F6CC.html Additional
      Information: Notes: Verify the NTP firewall ports are open. It is recommended
      to synchronize the ESXi clock with a time server that is located on the
      management network rather than directly with a time server on a public
      network. This time server can then synchronize with a public source through a
      strictly controlled network connection with a firewall.
    references: >
      1. https://docs.vmware.com/en/VMware-vSphere/8.0/vsphere-security/GUID-
      2553C86E-7981-4F79-B9FC-A6CECA52F6CC.html Additional Information: Notes:
      Verify the NTP firewall ports are open. It is recommended to synchronize the
      ESXi clock with a time server that is located on the management network rather
      than directly with a time server on a public network. This time server can
      then synchronize with a public source through a strictly controlled network
      connection with a firewall.
    impact: >
      Inadequate time synchronization may lead to erroneous system logs, compromised
      cryptographic operations, inefficient cluster operations, and hindered
      incident response efforts. The resilience and accuracy of time synchronization
      are vital for maintaining operational integrity and security posture.
