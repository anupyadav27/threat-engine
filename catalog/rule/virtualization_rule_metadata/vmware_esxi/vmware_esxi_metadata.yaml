    description: >
      Applying updates in a timely manner according to the severity of issues
      contributes greatly to the resilience of an environment. When applying
      updates, it is recommended to update vCenter Server first, if an update is
      available, and then proceed with updating ESXi. This sequence ensures that the
      management layer is updated before updating the ESXi hosts. VMware publishes
      advisories on security vulnerabilities; for proactive notifications please
      subscribe to the mailing list at
      https://www.vmware.com/security/advisories.html
    rationale: >
