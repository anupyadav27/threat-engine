  - rule_id: vmware_esxi.cis.8.l2_vmware_tools_on_deployed_virtual_machines_must
    title: "(L2) VMware Tools on deployed virtual machines must prevent being recustomized"
    severity: medium
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 8_v1.2.0"
    cis_version: "8_v1.2.0"
    cis_control: "8.4"
    cis_section: "8"
    profile_applicability: "Level 2"
    description: >
      Preventing re-customization of deployed virtual machines is essential to
      mitigate the risk of adversarial access through cloning and subsequent
      customization. Once a VM is deployed, it should be safeguarded against further
