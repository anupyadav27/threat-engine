  - rule_id: vmware_esxi.cis.3.l1_ensure_remote_logging_is_configured_for_esxi
    title: "(L1) Ensure remote logging is configured for ESXi hosts"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: automated
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "3.3"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      By default, ESXI logs are stored on a local scratch volume or ramdisk. To
      preserve logs, also configure remote logging to a central log host for the
      ESXI hosts.
    rationale: >
      Remote logging to a central log host provides a secure, centralized store for
      ESXi logs. You can more easily monitor all hosts with a single tool. You can
      also do aggregate analysis and searching to look for such things as
      coordinated attacks on multiple hosts. Logging to a secure, centralized log
      server helps prevent log tampering and provides a long-term audit record.
    audit_procedure: >
      To ensure remote logging is configured properly, perform the following from
      the vSphere web client: 1. Select the host 2. Click Configure then expand
      System then select Advanced System Settings. 3. Select Edit then enter
      Syslog.global.logHost in the filter. 4. Verify the Syslog.global.logHost is
      set to the hostname of the central log server. Alternately, the following
      PowerCLI command may be used: # List Syslog.global.logHost for each host Get-
      VMHost | Select Name, @{N='Syslog.global.logHost';E={$_ | Get- AdvancedSetting
      Syslog.global.logHost}}
    remediation: >
      To configure remote logging properly, perform the following from the vSphere
      web client: 1. Select the host 2. Click Configure then expand System then
      select Advanced System Settings. 3. Select Edit then enter
      Syslog.global.logHost in the filter. 4. Set the Syslog.global.logHost to the
      hostname or IP address of the central log server. 5. Click OK. Alternately,
      run the following PowerCLI command: # Set Syslog.global.logHost for each host
      Get-VMHost | Foreach { Set-AdvancedSetting -VMHost $_ -Name
      Syslog.global.logHost -Value '<NewLocation>' } Note: When setting a remote log
      host, it is also recommended to set the 'Syslog.global.logDirUnique' to true.
      You must configure the syslog settings for each host. References: 1.
      https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-9F67DB52-F469-451F-
      B6C8-DAE8D95976E7.html
