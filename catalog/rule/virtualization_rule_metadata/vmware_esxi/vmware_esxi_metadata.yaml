  - rule_id: vmware_esxi.cis.2.l1_host_must_have_time_synchronization_services
    title: "(L1) Host must have time synchronization services enabled and running"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 8_v1.2.0"
    cis_version: "8_v1.2.0"
    cis_control: "2.7"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Ensure the host has time synchronization services enabled and operational as
      many functions such as cryptography, audit logging, cluster operations, and
      incident response/forensics depend on synchronized time. Services like NTP or
      PTP should be configured to start with the host and remain running to maintain
      time synchronization.
    rationale: >
