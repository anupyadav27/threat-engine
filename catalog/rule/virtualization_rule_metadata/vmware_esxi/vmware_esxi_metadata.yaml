  - rule_id: vmware_esxi.cis.5.l2_ensure_contents_of_exposed_configuration_files
    title: "(L2) Ensure contents of exposed configuration files have not been modified"
    severity: medium
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "5.11"
    cis_section: "5"
    profile_applicability: "Level 2"
    description: >
      Although most configurations on ESXi are controlled via an API, there are a
      limited set of configuration files that are used directly to govern host
      behavior. These files are exposed via the vSphere HTTPS-based file transfer
      API. These files should be monitored for modifications. WARNING: Do not
      attempt to monitor files that are NOT exposed via this file transfer API,
      since this can result in a destabilized system.
    rationale: >
      Any changes to these files should be correlated with an approved
      administrative action, such as an authorized configuration change. Tampering
      with these files could enable unauthorized access to the host configuration
      and virtual machines.
    audit_procedure: >
      To verify the exposed configuration files have not been modified, perform the
      following: 1. Open a web browser. 2. Find the ESXi configuration files by
      browsing to https://(hostname)/host (not available if MOB is disabled). 3.
      Review the contents of those files to confirm no unauthorized modifications
      have been made. NOTE: Not all the files listed are modifiable. Alternately,
      the configuration files can also be retrieved using the vCLI or PowerCLI.
    remediation: >
      Restore all modified configuration files to a known good state by restoring
      backups or using other means. To help prevent future occurrences, you can back
      up the host configuration data after configuring or reconfiguring an ESXi
      host. The vicfg-cfgbackup command is available only for ESXi hosts; it is not
      available through a vCenter Server system connection. No equivalent ESXCLI
      command is supported. To help identify future occurrences more quickly,
      implement a procedure to monitor the files and their contents over time to
      ensure they are not improperly modified. Be sure not to monitor log files and
      other files whose content is expected to change regularly due to system
      activity. Also, account for configuration file changes that are due to
      authorized administrative activity. Note: Host Profiles may also be used to
      track configuration changes on the host; however, Host Profiles do not track
      all configuration changes. Additional Information: During a configuration
      backup, the serial number is backed up with the configuration. The number is
      restored when you restore the configuration. The number is not preserved when
      you run the Recovery CD (ESXi Embedded) or perform a repair operation (ESXi
      Installable). You can back up and restore configuration information as
      follows: 1. Back up the configuration by using the vicfg-cfgbackup command. 2.
      Run the Recovery CD or repair operation 3. Restore the configuration by using
      the vicfg-cfgbackup command. When you restore a configuration, you must make
      sure that all virtual machines on the host are stopped.
