  - rule_id: vmware_esxi.cis.8.l2_ensure_host_guest_file_system_server_is
    title: "(L2) Ensure Host Guest File System Server is disabled"
    severity: medium
    category: virtualization
    tech_type: vmware_esxi
    automation_type: automated
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "8.4.18"
    cis_section: "8"
    profile_applicability: "Level 2"
    description: >
      The Host Guest File System Server should be disabled if it is not needed.
    rationale: >
      Certain automated operations such as automated tool upgrades use a component
      in the hypervisor called Host Guest File System (HGFS), and an attacker could
      potentially use this to transfer files inside the guest OS. These VMX
      parameters don't apply on vSphere because VMware virtual machines work on
      vSphere and hosted virtualization platforms such as Workstation and Fusion.
      The code paths for these features, such as the Host Guest File System Server,
      are not implemented in ESXi. Explicitly disabling these features reduces the
      potential for vulnerabilities because it reduces the number of ways in which a
      guest can affect the host. Note that these are referenced for organizations
      that insist any documented setting, regardless of whether it is implemented in
      code or not, must have a value. Impact: This will cause the VMX process to not
      respond to commands from the tools process. Setting
      isolation.tools.hgfsServerSet.disable to TRUE disables the registration of the
      guest's HGFS server with the host. APIs that use HGFS to transfer files to and
      from the guest operating system, such as some VIX commands or the VMware Tools
      auto- upgrade utility, will not function.
    audit_procedure: >
      To verify that the Host Guest File System Server is disabled if not needed,
      verify that isolation.tools.hgfsServerSet.disable is set to TRUE. 1. Select
      the VM then select Actions followed by Edit Settings. 2. Click on the VM
      Options tab then expand Advanced. 3. Click on EDIT CONFIGURATION. 4. Verify
      that isolation.tools.hgfsServerSet.disable is set to TRUE. Alternately, the
      following PowerCLI command may be used: # List the VMs and their current
      settings Get-VM | Get-AdvancedSetting -Name
      'isolation.tools.hgfsServerSet.disable'| Select Entity, Name, Value
    remediation: >
      To set this configuration utilize the vSphere interface as follows: 1. Select
      the VM then select Actions followed by Edit Settings. 2. Click on the VM
      Options tab then expand Advanced. 3. Click on EDIT CONFIGURATION. 4. Click on
      ADD CONFIGURATION PARAMS then input isolation.tools.hgfsServerSet.disable with
      a value of TRUE. 5. Click OK, then OK again. To disable the Host Guest File
      System Server, run the following PowerCLI command: # Add the setting to all
      VMs Get-VM | New-AdvancedSetting -Name 'isolation.tools.hgfsServerSet.disable'
      - value $true References: 1. https://docs.vmware.com/en/VMware-
      Tools/10.3.0/com.vmware.vsphere.vmwaretools.doc/GUID-685722FA-9009- 439C-9142-
      18A9E7C592EA.html?hWord=N4IghgNiBcIMoFMDGBXATgSwC4E8AEAwgPYB
      2AzhgCYJphYall4BmRahpzGA5uhidzwA1ALIB3MGgR4AKkSIQyIAL5A 2.
      https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-52188148-C579-4F6A-
      8335-CFBCE0DD2167.html
    references: >
      1. https://docs.vmware.com/en/VMware-
      Tools/10.3.0/com.vmware.vsphere.vmwaretools.doc/GUID-685722FA-9009- 439C-9142-
      18A9E7C592EA.html?hWord=N4IghgNiBcIMoFMDGBXATgSwC4E8AEAwgPYB
      2AzhgCYJphYall4BmRahpzGA5uhidzwA1ALIB3MGgR4AKkSIQyIAL5A 2.
      https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-52188148-C579-4F6A-
      8335-CFBCE0DD2167.html
    impact: >
      This will cause the VMX process to not respond to commands from the tools
