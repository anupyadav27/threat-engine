  - rule_id: vmware_esxi.cis.8.l1_ensure_secure_protocols_are_used_for_virtual
    title: "(L1) Ensure secure protocols are used for virtual serial port access"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "8.3.3"
    cis_section: "8"
    profile_applicability: "Level 1"
    description: >
      Serial ports are interfaces for connecting peripherals to the VM. They are
      often used on physical systems to provide a direct, low-level connection to
      the console of a server. Virtual serial ports allow VMs to communicate with
      serial ports over networks. If virtual serial ports are needed, they should be
      configured to use secure protocols.
    rationale: >
      If virtual serial ports do not use secure protocols, the communications with
      those ports could be eavesdropped on, manipulated, or otherwise compromised,
      giving attackers sensitive information or control to unauthorized parties.
    audit_procedure: >
      To verify that all virtual serial ports use secure protocols, check that all
      configured protocols are from this list: • ssl - the equivalent of TCP+SSL •
      tcp+ssl - SSL over TCP over IPv4 or IPv6 • tcp4+ssl - SSL over TCP over IPv4 •
      tcp6+ssl - SSL over TCP over IPv6 • telnets - telnet over SSL over TCP
    remediation: >
      To configure all virtual serial ports to use secure protocols, change any
      protocols that are not secure to one of the following: • ssl - the equivalent
      of TCP+SSL • tcp+ssl - SSL over TCP over IPv4 or IPv6 • tcp4+ssl - SSL over
      TCP over IPv4 • tcp6+ssl - SSL over TCP over IPv6 • telnets - telnet over SSL
      over TCP References: 1. https://code.vmware.com/apis/968/vsphere 2.
      https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.vm_admin.doc/GUID-462B8B04-29DF-406B-
