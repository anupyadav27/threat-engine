  - rule_id: vmware_esxi.cis.4.l1_ensure_passwords_are_required_to_be_complex
    title: "(L1) Ensure passwords are required to be complex"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "4.2"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      ESXi uses the pam_passwdqc.so plug-in to set password strength and complexity.
      Options include setting minimum password length, requiring password characters
      to come from particular character sets, and restricting the number of
      consecutive failed logon attempts permitted. The settings should enforce the
      organization's password policies. Note that an uppercase character that begins
      a password does not count toward the number of character classes used, and
      neither does a number that ends a password.
    rationale: >
      All passwords for ESXi hosts should be hard to guess to reduce the risk of
      unauthorized access. Note: ESXi imposes no restrictions on the root password.
      Password strength and complexity rules only apply to non-root users. Impact:
      The remediation requires all passwords to be 14 or more characters long and
      comprised of at least one character from four distinct character sets.
    audit_procedure: >
      To confirm password complexity requirements are set, perform the following: 1.
      Login to the ESXi shell as a user with administrator privileges. 2. Open
      /etc/pam.d/passwd. 3. Locate the following line: password requisite
      /lib/security/$ISA/pam_passwdqc.so retry=N min=N0,N1,N2,N3,N4 4. Confirm N0 is
      set to disabled. 5. Confirm N1 is set to disabled. 6. Confirm N2 is set to
      disabled. 7. Confirm N3 is set to disabled. 8. Confirm N4 is set to 14 or
      greater. or 1. Login to the ESXi host 2. Navigate to
      Host/Manage/System/Advanced settings 3. Locate the following key:
      Security.PasswordQualityControl verify that 4. Set N0 to disabled. 5. Set N1
      to disabled. 6. Set N2 to disabled. 7. Set N3 to disabled. 8. Set N4 to 14 or
      greater. The string should look like this: retry=3
      min=disabled,disabled,disabled,disabled,14
    remediation: >
      To set the password complexity requirements, perform the following: 1. Login
      to the ESXi host 2. Navigate to Host/Manage/System/Advanced settings 3. Locate
      the following key: Security.PasswordQualityControl 4. Set N0 to disabled. 5.
      Set N1 to disabled. 6. Set N2 to disabled. 7. Set N3 to disabled. 8. Set N4 to
      14 or greater. The string should look like this: retry=3
      min=disabled,disabled,disabled,disabled,14 References: 1.
      http://www.openwall.com/passwdqc/README.shtml 2.
      https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-DC96FFDB-F5F2-43EC-
      8C73-05ACDAE6BE43.html 3. https://www.cisecurity.org/white-papers/cis-
