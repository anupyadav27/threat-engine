  - rule_id: vmware_esxi.cis.8.l2_ensure_nonpersistent_disks_are_limited
    title: "(L2) Ensure nonpersistent disks are limited"
    severity: medium
    category: virtualization
    tech_type: vmware_esxi
    automation_type: automated
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "8.6.1"
    cis_section: "8"
    profile_applicability: "Level 2"
    description: >
      By default, VM disks use dependent mode, which means they are affected by
      snapshots. To avoid this, VM disks can use independent mode instead.
      Independent mode can be configured as persistent (data is written permanently
      to the disk) or nonpersistent (all changes made to disk are lost when the
      system is rebooted). Use of nonpersistent mode should be avoided unless the
      data is not needed (e.g., already duplicated elsewhere).
    rationale: >
      From a security standpoint, nonpersistent mode allows successful attackers to
      remove evidence of their actions or even their presence within a VM by
      performing a simple shutdown or reboot.
    audit_procedure: >
      To verify nonpersistent mode use is limited, review VM disk types to confirm
      that nonpersistent mode is only used when the loss of all stored data is not a
      concern. For all disks where nonpersistent mode is not to be used,
      scsiX:Y.mode should either be absent or be set to a value other than
      independent nonpersistent. Alternately, the following PowerCLI command may be
      used to review the disk types: #List the VM's and their disk types Get-VM |
      Get-HardDisk | Select Parent, Name, Filename, DiskType, Persistence
    remediation: >
      To limit the use of nonpersistent mode, run the following PowerCLI command:
      #Add the parameters for the following cmdlet to set the VM Disk Type: Get-VM |
      Get-HardDisk | Set-HardDisk References: 1.
      https://code.vmware.com/apis/196/vsphere/doc/vim.vm.device.VirtualDiskOption.
      DiskMode.html
    references: >
      1.
      https://code.vmware.com/apis/196/vsphere/doc/vim.vm.device.VirtualDiskOption.
      DiskMode.html
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_VMWARE_ESXI_7_v1_5_0_8_6_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
