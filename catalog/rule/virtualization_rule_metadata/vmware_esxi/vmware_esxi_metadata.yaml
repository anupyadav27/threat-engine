      The host should be configured to automatically terminate idle shell sessions
      to prevent potential unauthorized access due to forgotten logouts. Setting a
      timeout for idle SSH connections ensures that any unattended sessions are
      closed, thereby reducing the security risk. The parameter governing this
      behavior is UserVars.
    rationale: >
      Automatically terminating idle shells minimizes the risks associated with
      unattended sessions. It is a proactive measure to prevent potential
