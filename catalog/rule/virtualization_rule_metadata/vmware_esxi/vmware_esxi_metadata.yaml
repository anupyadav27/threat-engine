  - rule_id: vmware_esxi.cis.8.l1_ensure_virtual_disk_wiping_is_disabled
    title: "(L1) Ensure virtual disk wiping is disabled"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: automated
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "8.6.3"
    cis_section: "8"
    profile_applicability: "Level 1"
    description: >
      Wiping a virtual disk reclaims all unused space in it. If there is empty space
      in the disk, this process reduces the amount of space the virtual disk
      occupies on the host drive. If virtual disk wiping is done repeatedly, it can
      cause the virtual disk to become unavailable while wiping occurs. In most
      datacenter environments, disk wiping is not needed, but normal users and
      processes--without administrative privileges--can issue disk wipes unless the
      feature is disabled.
    rationale: >
      Virtual disk wiping can effectively cause a denial of service.
    audit_procedure: >
      To verify that virtual disk wiping is disabled, verify that
      isolation.tools.diskWiper.disable is set to TRUE. 1. Select the VM then select
      Actions followed by Edit Settings. 2. Click on the VM Options tab then expand
      Advanced. 3. Click on EDIT CONFIGURATION. 4. Verify that
      isolation.tools.diskWiper.disable is set to TRUE. Alternately, the following
      PowerCLI command may be used: # List the VMs and their current settings Get-VM
      | Get-AdvancedSetting -Name 'isolation.tools.diskWiper.disable'| Select
      Entity, Name, Value
    remediation: >
      To set this configuration utilize the vSphere interface as follows: 1. Select
      the VM then select Actions followed by Edit Settings. 2. Click on the VM
      Options tab then expand Advanced. 3. Click on EDIT CONFIGURATION. 4. Click on
      ADD CONFIGURATION PARAMS then input isolation.tools.diskWiper.disable with a
      value of TRUE. 5. Click OK, then OK again. To disable virtual disk wiping, run
      the following PowerCLI command: # Add the setting to all VMs Get-VM | New-
      AdvancedSetting -Name 'isolation.tools.diskWiper.disable' -value $true
      References: 1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-9610FE65-3A78-4982-
      8C28-5B34FEB264B6.html 2. https://docs.vmware.com/en/VMware-
      Tools/10.3.0/com.vmware.vsphere.vmwaretools.doc/GUID-685722FA-9009-
      439C-9142-18A9E7C592EA.html
    references: >
