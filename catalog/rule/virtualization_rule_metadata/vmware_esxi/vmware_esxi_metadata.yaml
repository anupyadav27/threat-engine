      process. This increased scrutiny ensures that only genuinely authenticated and
      trusted certificates are accepted, minimizing potential vulnerabilities. The
      parameter governing this behavior is
      Syslog.global.certificate.strictX509Compliance with a recommended setting of
      TRUE.
    rationale: >
      Ensuring stringent verification of CA root certificates provides a higher
      level of trust and security in the remote logging process. Adopting the
      'x509-strict' option minimizes the risk of accepting compromised or malicious
      certificates, thereby reducing the potential for data breaches, man-in-the-
      middle attacks, or other security compromises. Impact: There is no immediate
      functional impact from using strict x509 verification for TLS- enabled remote
      logging endpoints. However, organizations must ensure that their CA root
      certificates meet the strict criteria set by this option. If certificates do
      not meet these criteria, there may be disruptions in log transmissions,
      necessitating adjustments or updates to the certificates in use.
