  - rule_id: vmware_esxi.cis.2.l1_host_must_restrict_inter_vm_transparent_page
    title: "(L1) Host must restrict inter-VM transparent page sharing"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: automated
    cis_benchmark: "CIS_VMWARE_ESXI 8_v1.2.0"
    cis_version: "8_v1.2.0"
    cis_control: "2.10"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Transparent Page Sharing (TPS) aids in optimizing memory usage among virtual
      machines but under certain circumstances can be exploited to access data on
      adjacent virtual machines unauthorizedly. By configuring the
      Mem.ShareForceSalting parameter, inter-VM TPS is restricted, enhancing
      isolation and security. The parameter governing this behavior is
      Mem.ShareForceSalting with a recommended setting of 2.
    rationale: >
      Restricting inter-VM TPS is crucial to prevent potential unauthorized access
      to data, ensuring an extra layer of isolation and security between virtual
      machines which is indispensable especially in a multi-tenant environment.
      Impact: There is no noted functional impact, indicating that restricting
      inter-VM TPS does not adversely affect the system’s performance or operations
      while bolstering security against potential data access exploits.
    audit_procedure: >
      From the vSphere Web Client: 1. Select a host 2. Click Configure then expand
      System then select Advanced System settings. 3. Click Edit then Filter for
      Mem.ShareForceSalting. 4. Verify that it is set to 2. Additionally the
      following PowerCLI command can be used: Get-VMHost | Get-AdvancedSetting -Name
      Mem.ShareForceSalting
    remediation: >
      From the vSphere Web Client: 1. Select a host 2. Click Configure then expand
      System then select Advanced System settings. 3. Click Edit then Filter for
      Mem.ShareForceSalting. 4. Set the value to 2. 5. Click OK. Additionally, the
      following PowerCLI command can be used: Get-VMHost | Get-AdvancedSetting -Name
      Mem.ShareForceSalting | Set- AdvancedSetting -Value 2 References: 1.
      https://kb.vmware.com/s/article/2097593 2.
      https://blogs.vmware.com/vsphere/2015/01/assess-the-performance-impact-of-
      the-security-change-in-transparent-page-sharing-behaviour.html
    references: >
      1. https://kb.vmware.com/s/article/2097593 2.
      https://blogs.vmware.com/vsphere/2015/01/assess-the-performance-impact-of-
      the-security-change-in-transparent-page-sharing-behaviour.html
    impact: >
