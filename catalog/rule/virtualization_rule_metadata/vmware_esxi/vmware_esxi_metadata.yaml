  - rule_id: vmware_esxi.cis.1.l2_host_integrated_hardware_management_controller
    title: "(L2) Host integrated hardware management controller must secure authentication"
    severity: medium
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 8_v1.2.0"
    cis_version: "8_v1.2.0"
    cis_control: "1.8"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      Connections to centralized authentication sources, like Active Directory,
      should be disabled or carefully considered as attack vectors and dependency
      loops (for authentication, authorization, DNS, DHCP, and time). Consider
      managing local accounts on these devices through the APIs and CLI interfaces
      provided. If Active Directory must be used for authentication do authorization
      locally so that an attacker with access to Active Directory cannot promote
      themselves through group membership.
    rationale: >
      To prevent unauthorized access and potential malicious control of server
      hardware functions, it's essential to ensure that the integrated hardware
      management controller utilizes secure authentication mechanisms. Impact: Not
      connecting hardware management controllers to centralized authentication &
      authorization sources entails additional management. Most hardware management
      controllers have CLI toolkits or APIs to automate management of user accounts
      and/or authorization levels.
    audit_procedure: >
      
    remediation: >
      
    references: >
      
    impact: >
      Not connecting hardware management controllers to centralized authentication &
      authorization sources entails additional management. Most hardware management
      controllers have CLI toolkits or APIs to automate management of user accounts
      and/or authorization levels.
    compliance_mappings:
      cis:
        - "CIS_VMWARE_ESXI_8_v1_2_0_1_8"
