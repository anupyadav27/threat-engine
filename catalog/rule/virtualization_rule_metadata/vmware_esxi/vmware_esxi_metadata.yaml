  - rule_id: vmware_esxi.cis.7.l1_virtual_machines_must_deactivate_virtual_disk
    title: "(L1) Virtual machines must deactivate virtual disk shrinking operations"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: automated
    cis_benchmark: "CIS_VMWARE_ESXI 8_v1.2.0"
    cis_version: "8_v1.2.0"
    cis_control: "7.21"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      Disabling virtual disk shrinking on virtual machines prevents potential disk
      unavailability issues. This operation is usually restricted for non-
      administrative users within the guest environment. The parameter governing
      this behavior is isolation.tools.diskShrink.disable with a recommended setting
      of TRUE or Undefined.
    rationale: >
      Shrinking a virtual disk reclaims unused space in it. If there is empty space
      in the disk, this process reduces the amount of space the virtual disk
      occupies on the host drive. Normal users and processes—that is, users and
      processes without root or administrator privileges—within virtual machines
      have the capability to invoke this procedure. However, if this is done
      repeatedly, the virtual disk can become unavailable while this shrinking is
      being performed, effectively causing a denial of service. In most datacenter
      environments, disk shrinking is not done, so you should disable this feature.
      Repeated disk shrinking can make a virtual disk unavailable. This capability
      is available to nonadministrative users in the guest. Impact: There is no
      functional impact noted.
    audit_procedure: >
      Verify that isolation.tools.diskShrink.disable is set to TRUE. 1. Select the
      VM then select Actions followed by Edit Settings. 2. Click on the VM Options
      tab then expand Advanced. 3. Click on EDIT CONFIGURATION. 4. Verify that
      isolation.tools.diskShrink.disable is set to TRUE. Additionally, the following
      PowerCLI command may be used: # List the VMs and their current settings Get-VM
      | Get-AdvancedSetting -Name 'isolation.tools.diskShrink.disable'| Select
      Entity, Name, Value
    remediation: >
      To set this configuration utilize the vSphere interface as follows: 1. Select
      the VM then select Actions followed by Edit Settings. 2. Click on the VM
      Options tab then expand Advanced. 3. Click on EDIT CONFIGURATION. 4. Click on
      ADD CONFIGURATION PARAMS then input isolation.tools.diskShrink.disable with a
      value of TRUE. 5. Click OK, then OK again. To implement the recommended
      configuration state, run the following PowerCLI command: # Add the setting to
      all VMs Get-VM | New-AdvancedSetting -Name
      'isolation.tools.diskShrink.disable' - value $true Default Value: The
      prescribed state is not the default state. References: 1.
      https://docs.vmware.com/en/VMware-
      Tools/10.3.0/com.vmware.vsphere.vmwaretools.doc/GUID-685722FA-9009- 439C-9142-
      18A9E7C592EA.html?hWord=N4IghgNiBcIMoFMDGBXATgSwC4E8AEAwgPYB
      2AzhgCYJphYall4BmRahpzGA5uhidzwA1ALIB3MGgR4AKkSIQyIAL5A 2.
      https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-9610FE65-3A78-4982-
      8C28-5B34FEB264B6.html
    references: >
      1. https://docs.vmware.com/en/VMware-
      Tools/10.3.0/com.vmware.vsphere.vmwaretools.doc/GUID-685722FA-9009- 439C-9142-
      18A9E7C592EA.html?hWord=N4IghgNiBcIMoFMDGBXATgSwC4E8AEAwgPYB
      2AzhgCYJphYall4BmRahpzGA5uhidzwA1ALIB3MGgR4AKkSIQyIAL5A 2.
      https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-9610FE65-3A78-4982-
      8C28-5B34FEB264B6.html
