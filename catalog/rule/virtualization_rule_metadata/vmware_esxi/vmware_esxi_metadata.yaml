  - rule_id: vmware_esxi.cis.2.l2_ensure_default_self_signed_certificate_for
    title: "(L2) Ensure default self-signed certificate for ESXi communication is not used"
    severity: medium
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "2.4"
    cis_section: "2"
    profile_applicability: "Level 2"
    description: >
      The default certificate is self-signed, not signed by a trusted certificate
      authority (CA). It should be replaced with a valid certificate issued by a
      trusted CA. It should be noted that certificates are generated at time of
      install differing slightly from some self-signed certificate solutions.
    rationale: >
      Using the default self-signed certificate may increase risk related to man-in-
      the-middle (MITM) attacks. Impact: Replacing the default certificate might
      cause vCenter Server to stop managing the host. Disconnect and reconnect the
      host if vCenter Server cannot verify the new certificate.
    audit_procedure: >
      View the details of the SSL certificate presented by the ESXi host and
      determine if it is issued by a trusted CA: 1. Log in to the ESXi Shell, either
      directly from the DCUI or from an SSH client, as a user with administrator
      privileges. 2. Review the contents to see if the certs have been backed up. 3.
      In the directory /etc/vmware/ssl, confirm that it contains orig.rui.crt and
      orig.rui.key 4. In the directory /etc/vmware/ssl, confirm that it contains the
      newer certs renamed to rui.crt and rui.key Alternatively, you can put the host
      into maintenance mode, to review the new certificates.
    remediation: >
      Backup and replace the details of the SSL certificate presented by the ESXi
      host and determine if it is issued by a trusted CA: 1. Log in to the ESXi
      Shell, either directly from the DCUI or from an SSH client, as a user with
      administrator privileges. 2. In the directory /etc/vmware/ssl, rename the
      existing certificates using the following commands: mv rui.crt orig.rui.crt mv
      rui.key orig.rui.key 3. Copy the certificates you want to use to
      /etc/vmware/ssl. 4. Rename the new certificate and key to rui.crt and rui.key.
      5. Restart the host after you install the new certificate. Alternatively, you
      can put the host into maintenance mode, install the new certificate, use the
      Direct Console User Interface (DCUI) to restart the management agents, and set
      the host to exit maintenance mode. Leverage VMware's SSL Certificate
      Automation Tool to install CA-signed SSL certificates. For more information on
      this tool, please see
      [http://kb.vmware.com/kb/2057340](http://kb.vmware.com/kb/2057340).
      References: 1. https://kb.vmware.com/s/article/2111219 2.
      https://docs.vmware.com/en/VMware-
      vSphere/6.7/com.vmware.vsphere.security.doc/GUID-AC7E6DD7-F984-4E0F-
      983A-463031BA5FE7.html
    references: >
      1. https://kb.vmware.com/s/article/2111219 2.
      https://docs.vmware.com/en/VMware-
      vSphere/6.7/com.vmware.vsphere.security.doc/GUID-AC7E6DD7-F984-4E0F-
