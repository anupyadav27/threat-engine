  - rule_id: vmware_esxi.cis.1.l2_host_hardware_must_enable_amd_sev_es_if
    title: "(L2) Host hardware must enable AMD SEV-ES, if available"
    severity: medium
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 8_v1.2.0"
    cis_version: "8_v1.2.0"
    cis_control: "1.9"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      AMD EPYC platforms support SEV-ES, a technology to encrypt memory and CPU
      register state, and limit visibility to the hypervisor, in order to increase
      workload security and decrease exposure to certain types of attacks. When
      configured properly, vSphere supports the use of SEV-ES inside guest virtual
      machines and containers under vSphere and vSphere with Tanzu. Enabling SEV-ES
      in system firmware eases future enablement inside virtual machines,
      containers, and guest OSes.
    rationale: >
      Enabling AMD SEV-ES (Secure Encrypted Virtualization-Encrypted State) on host
      hardware enhances the security of virtual machines by encrypting their memory
      and CPU state, reducing the risk of unauthorized data access and tampering
      from compromised hypervisors or malicious actors. Impact: Use of SEV-ES in a
      particular VM requires the guest OS to support it, and will limit some
      operational features such as vMotion, snapshots, and so on. Consult the
      documentation for more information about these tradeoffs.
    audit_procedure: >
      
    remediation: >
      References: 1. https://docs.vmware.com/en/VMware-vSphere/8.0/vsphere-
      security/GUID- FB511CBA-4B89-469F-9799-
      D1347E1F2B0A.html?hWord=N4IghgNiBcIM4FMBuBaBcQF8g
    references: >
      1. https://docs.vmware.com/en/VMware-vSphere/8.0/vsphere-security/GUID-
      FB511CBA-4B89-469F-9799- D1347E1F2B0A.html?hWord=N4IghgNiBcIM4FMBuBaBcQF8g
    impact: >
      Use of SEV-ES in a particular VM requires the guest OS to support it, and will
      limit some operational features such as vMotion, snapshots, and so on. Consult
      the documentation for more information about these tradeoffs.
    compliance_mappings:
      cis:
        - "CIS_VMWARE_ESXI_8_v1_2_0_1_9"
      nist_800_53: []
      soc2: []
