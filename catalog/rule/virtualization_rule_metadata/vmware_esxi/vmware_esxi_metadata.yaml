  - rule_id: vmware_esxi.cis.7.l1_virtual_machines_must_limit_pci_pcie_device
    title: "(L1) Virtual machines must limit PCI/PCIe device passthrough functionality"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: automated
    cis_benchmark: "CIS_VMWARE_ESXI 8_v1.2.0"
    cis_version: "8_v1.2.0"
    cis_control: "7.7"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      DirectPath I/O features provide virtual machines the ability to directly
      access system hardware, which while advantageous for performance, can impact
      risk mitigation tools like vMotion, DRS, and High Availability. It also opens
      up a potential attack vector for privileged hardware access. It is crucial to
      ensure that only necessary VMs have this privilege and that compensatory
      measures are taken within the guest OS to enhance security.
    rationale: >
      Limiting PCI/PCIe device passthrough functionality is essential for minimizing
      potential attack vectors and ensuring that risk mitigation tools function as
      intended. Moreover, audit and documentation of the business need for these VMs
      are critical for maintaining a secure and compliant environment. Impact:
      Passthrough devices, like GPUs, may be adversely affected if disconnected.
      It's imperative to audit and document the business rationale for VMs requiring
      this functionality to understand the associated risks and ensure adequate
      compensatory controls are in place.
    audit_procedure: >
      The following PowerCLI command can be used: # List the VMs and their current
      settings Get-VM | Get-AdvancedSetting -Name 'pciPassthru*.present' | Select
      Entity, Name, Value ``
    remediation: >
      The following PowerCLI command can be used: # Add the setting to all VMs Get-
      VM | New-AdvancedSetting -Name 'pciPassthru*.present' -value '' References: 1.
      https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-E5CFB1FB-9216-4C1D-
      B49A-81AAAC414025.html
    references: >
      1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-E5CFB1FB-9216-4C1D-
      B49A-81AAAC414025.html
    impact: >
      Passthrough devices, like GPUs, may be adversely affected if disconnected.
      It's imperative to audit and document the business rationale for VMs requiring
      this functionality to understand the associated risks and ensure adequate
      compensatory controls are in place.
    compliance_mappings:
      cis:
        - "CIS_VMWARE_ESXI_8_v1_2_0_7_7"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_vmware_esxi_8_v1_2_0_7_7"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: vmware_esxi.cis.7.l1_ensure_unauthorized_modification_and
    title: "(L1) Ensure unauthorized modification and disconnection of devices is disabled"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: automated
    cis_benchmark: "CIS_VMWARE_ESXI 8_v1.2.0"
    cis_version: "8_v1.2.0"
    cis_control: "7.8"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      In a virtual machine, users and processes without root or administrator
      privileges can disconnect devices, such as network adapters and CD-ROM drives,
      and modify device settings within the guest operating system. These actions
      should be prevented.
    rationale: >
      Disabling unauthorized modification and disconnection of devices helps
      prevents unauthorized changes within the guest operating system, which could
      be used to gain unauthorized access, cause denial of service conditions, and
      otherwise negatively affect the security of the guest operating system.
    audit_procedure: >
      To verify unauthorized device modifications and disconnections are prevented,
      access the virtual machine configuration file and verify that
      isolation.device.edit.disable is set to TRUE. Alternately, the following
      PowerCLI command may be used: # List the VMs and their current settings Get-VM
      | Get-AdvancedSetting -Name 'isolation.device.edit.disable' | Select Entity,
      Name, Value
    remediation: >
      To prevent unauthorized device modifications and disconnections, run the
      following PowerCLI command: # Add the setting to all VMs Get-VM | New-
      AdvancedSetting -Name 'isolation.device.edit.disable' -value $true References:
      1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-F88A5FED-552B-44F9-
      A168-C62D9306DBD6.html
    references: >
      1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-F88A5FED-552B-44F9-
      A168-C62D9306DBD6.html
    impact: >
      
    compliance_mappings:
