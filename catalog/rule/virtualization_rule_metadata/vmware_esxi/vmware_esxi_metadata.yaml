    tech_type: vmware_esxi
    automation_type: automated
    cis_benchmark: "CIS_VMWARE_ESXI 8_v1.2.0"
    cis_version: "8_v1.2.0"
    cis_control: "7.18"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      Deactivating console copy operations is critical for preventing data transfer
      between the virtual machine and the local client, irrespective of the access
      method, whether via Web Console, VMRC, or others. The parameter governing this
      behavior is isolation.tools.copy.disable with a recommended setting of TRUE or
      Undefined.
    rationale: >
      Deactivating console copy operations minimizes the risk of unauthorized data
      access or leakage, enforcing a higher level of data security and integrity
      across the virtual environment. Impact: There is no identified functional
      impact; however, this restriction enhances data security by minimizing
      unauthorized data transfer channels.
    audit_procedure: >
      To verify that VM console copy operations are disabled, verify that the
      isolation.tools.copy.disable option is missing or set to TRUE. 1. Select the
      VM then select Actions followed by Edit Settings. 2. Click on the VM Options
      tab then expand Advanced. 3. Click on EDIT CONFIGURATION. 4. Verify that
      isolation.tools.copy.disable is set to TRUE or missing. Alternately, the
      following PowerCLI command may be used: # List the VMs and their current
      settings Get-VM | Get-AdvancedSetting -Name 'isolation.tools.copy.disable' |
      Select Entity, Name, Value
    remediation: >
      To set this configuration utilize the vSphere interface as follows: 1. Select
      the VM then select Actions followed by Edit Settings. 2. Click on the VM
      Options tab then expand Advanced. 3. Click on EDIT CONFIGURATION. 4. Click on
      ADD CONFIGURATION PARAMS then input isolation.tools.copy.disable with a value
      of TRUE. 5. Click OK, then OK again. To explicitly disable VM console copy
      operations, run the following PowerCLI command: # Add the setting to all VMs
      Get-VM | New-AdvancedSetting -Name 'isolation.tools.copy.disable' -value $true
      Default Value: Disabled References: 1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-367D02C1-B71F-4AC3-
