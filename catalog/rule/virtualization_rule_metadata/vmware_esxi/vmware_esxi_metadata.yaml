  - rule_id: vmware_esxi.cis.3.l1_host_must_have_an_accurate_dcui_access_list
    title: "(L1) Host must have an accurate DCUI.Access list"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 8_v1.2.0"
    cis_version: "8_v1.2.0"
    cis_control: "3.18"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The DCUI.Access parameter in VMware ESXi is used to specify a list of users
      who are permitted to access the Direct Console User Interface (DCUI) of the
      ESXi host, especially when Lockdown Mode is enabled. This parameter helps in
      controlling and securing access to the ESXi host by allowing only authorized
      users to override Lockdown Mode and access the DCUI, particularly in scenarios
      where the host becomes isolated from vCenter. The parameter governing this
      behavior is DCUI.Access.
    rationale: >
      A properly configured DCUI.Access list ensures that only authorized users can
      override Lockdown Mode to access DCUI, providing a fail-safe against loss of
      management capability especially if the host loses connection to vCenter.
      Impact: Misconfiguration could lead to unauthorized access or potential
      lockout scenarios, making it crucial to validate the list and ensure the
      host's attachment to vCenter alongside correctly configured access and
      exception lists prior to Lockdown Mode activation.
    audit_procedure: >
      To verify a proper trusted users list is set for DCUI, perform the following
      from the vSphere web client: 1. From the vSphere Web Client, select the host.
      2. Click Configure then expand System. 3. Select Advanced System Settings then
      click Edit. 4. Enter DCUI.Access in the filter. 5. Verify that the DCUI.Access
      attribute is set to a comma-separated list of the users who are allowed to
      override lockdown mode. Alternately, the following PowerCLI command may be
      used: Get-VMHost | Get-AdvancedSetting -Name DCUI.Access
    remediation: >
      To set a trusted users list for DCUI, perform the following from the vSphere
      web client: 1. From the vSphere Web Client, select the host. 2. Click
      Configure then expand System. 3. Select Advanced System Settings then click
      Edit. 4. Enter DCUI.Access in the filter. 5. Set the DCUI.Access attribute is
      set to a comma-separated list of the users who are allowed to override
      lockdown mode. References: 1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-6779F098-48FE-4E22-
      B116-A8353D19FF56.html Additional Information: Note: By default only the
      'root' user is a member of the DCUI.Access list. It is not recommended to
      remove root from the DCUI.Access list, as this will revoke the root user's
      admin privileges on the host.
    references: >
      1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-6779F098-48FE-4E22-
      B116-A8353D19FF56.html Additional Information: Note: By default only the
      'root' user is a member of the DCUI.Access list. It is not recommended to
