    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      This recommendation is intended to address configuring a standard switch.
      Ensure the Promiscuous Mode Policy within the vSwitch is set to reject.
      Promiscuous mode can be set at the vSwitch and/or the Portgroup level. You can
      override switch-level settings at the Portgroup level.
    rationale: >
      When promiscuous mode is enabled for a virtual switch, all virtual machines
      connected to the dvPortgroup have the potential of reading all packets
      crossing that network. This could enable unauthorized access to the contents
      of those packets. Impact: There might be a legitimate reason to enable
      promiscuous mode for debugging, monitoring, or troubleshooting reasons.
      Security devices might require the ability to see all packets on a vSwitch. An
      exception should be made for the dvPortgroups that these applications are
      connected to in order to allow for full-time visibility to the traffic on that
      dvPortgroup.
    audit_procedure: >
      To verify the policy is set to reject, perform the following: 1. From the
      vSphere Web Client, select the host. 2. Click Configure then expand
      Networking. 3. Select Virtual switches then click Edit. 4. Click on Security.
      5. Verify that Promiscuous mode is set to Reject in the dropdown. Alternately,
      the following PowerCLI command may be used: # List all vSwitches and their
      Security Settings Get-VirtualSwitch -Standard | Select VMHost, Name, `
      @{N='MacChanges';E={if ($_.ExtensionData.Spec.Policy.Security.MacChanges) {
      'Accept' } Else { 'Reject'} }}, ` @{N='PromiscuousMode';E={if
      ($_.ExtensionData.Spec.Policy.Security.PromiscuousMode) { 'Accept' } Else {
      'Reject'} }}, ` @{N='ForgedTransmits';E={if
      ($_.ExtensionData.Spec.Policy.Security.ForgedTransmits) { 'Accept' } Else {
      'Reject'} }}
    remediation: >
      To set the policy to reject, perform the following: 1. From the vSphere Web
      Client, select the host. 2. Click Configure then expand Networking. 3. Select
      Virtual switches then click Edit. 4. Click on Security. 5. Set Promiscuous
      mode to Reject in the dropdown. 6. Click on OK. Alternately, perform the
      following via the ESXi shell: # esxcli network vswitch standard policy
      security set -v vSwitch2 -p false Default Value: Reject References: 1.
      https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.networking.doc/GUID-891147DD-3E2E-45A1-
