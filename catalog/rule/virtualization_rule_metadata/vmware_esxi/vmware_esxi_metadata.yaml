  - rule_id: vmware_esxi.cis.1.l2_ensure_the_default_value_of_individual_salt
    title: "(L2) Ensure the default value of individual salt per vm is configured"
    severity: medium
    category: virtualization
    tech_type: vmware_esxi
    automation_type: automated
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "1.4"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      The concept of salting has been introduced to help address concerns system
      administrators may have over the security implications of Transparent Page
      Sharing otherwise known as TPS. As per the original TPS implementation,
      multiple virtual machines could share pages when the contents of the pages
      were same. With the new salting settings, the virtual machines can share pages
      only if the salt value and contents of the pages are identical. A new host
      config option Mem.ShareForceSalting is introduced to enable or disable
      salting. By default, salting is enabled (Mem.ShareForceSalting=2) and each
      virtual machine has a different salt. This means page sharing does not occur
      across the virtual machines (inter-VM TPS) and only happens inside a virtual
      machine (intra VM).
    rationale: >
      Intra-VM means that TPS will de-duplicate identical pages of memory within a
      virtual machine, but will not share the pages with any other virtual machines.
      Ensuring the default setting is in place so that page sharing only occurs
      inside a virtual machine is the best option here. Impact: There is potential
      in a performance impact regarding this setting, each environment and the
      impact on it will vary.
    audit_procedure: >
      From the vSphere Web Client: 1. Select a host 2. Click Configure then expand
      System then select Advanced System settings. 3. Click Edit then Filter for
      Mem.ShareForceSalting. 4. Verify that it is set to 2. Additionally the
      following PowerCLI command can be used: Get-VMHost | Get-AdvancedSetting -Name
      Mem.ShareForceSalting
    remediation: >
      From the vSphere Web Client: 1. Select a host 2. Click Configure then expand
      System then select Advanced System settings. 3. Click Edit then Filter for
      Mem.ShareForceSalting. 4. Set the value to 2. 5. Click OK. Additionally, the
      following PowerCLI command can be used: Get-VMHost | Get-AdvancedSetting -Name
      Mem.ShareForceSalting | Set- AdvancedSetting -Value 2 References: 1.
      https://kb.vmware.com/s/article/2097593 2.
      https://blogs.vmware.com/vsphere/2015/01/assess-the-performance-impact-of-
      the-security-change-in-transparent-page-sharing-behaviour.html
    references: >
      1. https://kb.vmware.com/s/article/2097593 2.
      https://blogs.vmware.com/vsphere/2015/01/assess-the-performance-impact-of-
      the-security-change-in-transparent-page-sharing-behaviour.html
    impact: >
      There is potential in a performance impact regarding this setting, each
      environment and the impact on it will vary.
    compliance_mappings:
      cis:
        - "CIS_VMWARE_ESXI_7_v1_5_0_1_4"
      nist_800_53: []
      soc2: []
      pci_dss: []
