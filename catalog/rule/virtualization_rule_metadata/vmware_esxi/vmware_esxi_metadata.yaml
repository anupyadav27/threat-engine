  - rule_id: vmware_esxi.cis.2.l1_ensure_snmp_is_configured_properly
    title: "(L1) Ensure SNMP is configured properly"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "2.5"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Simple Network Management Protocol (SNMP) can be used to help manage hosts.
      Many organizations have other means in place of managing hosts and do not need
      SNMP enabled. If SNMP is needed, it should be configured properly to reduce
      the risk of misuse or compromise. For example, ESXi supports SNMPv3, which
      provides stronger security than SNMPv1 or SNMPv2, including key authentication
      and encryption. It is also important to configure the destination for SNMP
      traps.
    rationale: >
      If SNMP is not properly configured, monitoring data containing sensitive
      information may be sent to a malicious host and used to help exploit said
      host.
    audit_procedure: >
      To confirm the proper configuration of SNMP, perform the following from the
      ESXi Shell or vCLI: 1. Run the following to determine if SNMP is being used:
      esxcli system snmp get 2. If SNMP is being used, refer to the vSphere
      Monitoring and Performance guide, chapter 8 for steps to verify the
      parameters. Additionally, the following PowerCLI command may be used to view
      the SNMP configuration: # List the SNMP Configuration of a host (single host
      connection required) Get-VMHostSnmp
    remediation: >
      To correct the SNMP configuration, perform the following from the ESXi Shell
      or vCLI: 1. If SNMP is not needed, disable it by running: esxcli system snmp
      set --enable false 2. If SNMP is needed, refer to the vSphere Monitoring and
      Performance guide, chapter 8 for steps to configure it. Additionally, the
      following PowerCLI command may be used to implement the configuration: #
      Update the host SNMP Configuration (single host connection required) Get-
      VmHostSNMP | Set-VMHostSNMP -Enabled:$true -ReadOnlyCommunity '<secret>'
      Notes: • SNMP must be configured on each ESXi host • SNMP settings can be
      configured using Host Profiles References: 1.
      https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.monitoring.doc/GUID-8EF36D7D-59B6-4C74-
      B1AA-4A9D18AB6250.html
    references: >
      1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.monitoring.doc/GUID-8EF36D7D-59B6-4C74-
      B1AA-4A9D18AB6250.html
