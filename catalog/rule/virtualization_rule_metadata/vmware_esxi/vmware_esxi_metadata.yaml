  - rule_id: vmware_esxi.cis.3.l1_host_must_enforce_password_complexity
    title: "(L1) Host must enforce password complexity"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 8_v1.2.0"
    cis_version: "8_v1.2.0"
    cis_control: "3.11"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The enforcement of password complexity is managed through the
      Security.PasswordQualityControl parameter, allowing configuration of password
      length, character set requirements, and failed logon attempt restrictions. The
      recommended setting is 'retry=3 min=disabled,15,15,15,15 max=64 similar=deny
      passphrase=3'.
    rationale: >
      Abiding by NIST 800-63B Section 5.1.1.2 guidelines, not enforcing traditional
      composition rules facilitates the adoption of longer, more secure passphrases,
      enhancing overall security. Impact: Altering password complexity via
      Security.PasswordQualityControl may cause installation issues with other
      products and services within the VMware ecosystem not expecting such changes.
    audit_procedure: >
      To confirm password complexity requirements are set run the following PowerCLI
      command: Get-VMHOST | Get-AdvancedSetting -Name
      “Security.PasswordQualityControl' | Set-AdvancedSetting -Value 'retry=3
      min=disabled,disabled,disabled,disabled,20' • Confirm N0 is set to disabled. •
      Confirm N1 is set to disabled. • Confirm N2 is set to disabled. • Confirm N3
      is set to disabled. • Confirm N4 is set to 14 or greater. The above requires
      all passwords to be 14 or more characters long and comprised of at least one
      character from four distinct character sets.
    remediation: >
      To set the password complexity requirements, perform the following PowerCLI
      command: Get-VMHOST | Get-AdvancedSetting -Name
      “Security.PasswordQualityControl' | Set-AdvancedSetting -Value 'retry=3
      min=disabled,disabled,disabled,disabled,14' The above requires all passwords
      to be 14 or more characters long and comprised of at least one character from
      four distinct character sets. References: 1.
      http://www.openwall.com/passwdqc/README.shtml 2.
      https://docs.vmware.com/en/VMware-vSphere/8.0/vsphere-security/GUID-
      DC96FFDB-F5F2-43EC-8C73-05ACDAE6BE43.html#GUID-DC96FFDB-F5F2-
      43EC-8C73-05ACDAE6BE43 3. https://www.cisecurity.org/white-papers/cis-
      password-policy-guide/
