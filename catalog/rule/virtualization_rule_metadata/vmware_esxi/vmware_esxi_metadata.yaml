  - rule_id: vmware_esxi.cis.5.l1_ensure_the_shell_services_timeout_is_set_to_1
    title: "(L1) Ensure the shell services timeout is set to 1 hour or less"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: automated
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "5.9"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      When the ESXi shell or SSH services are enabled on a host, they will run
      indefinitely. To avoid this, set the ESXiShellTimeOut, which defines a window
      of time after which the ESXi shell and SSH services will automatically be
      terminated. It is recommended to set the ESXiShellInteractiveTimeOut together
      with ESXiShellTimeOut.
    rationale: >
      This reduces the risk of an inactive ESXi shell or SSH service being misused
      by an unauthorized party to compromise a host.
    audit_procedure: >
      To verify the timeout is set to one hour or less, perform the following from
      the vSphere web client: 1. From the vSphere Web Client, select the host. 2.
      Click Configure then expand System. 3. Select Advanced System Settings then
      click Edit. 4. Enter ESXiShellTimeOut in the filter. 5. Verify that the value
      for this parameter is set to 3600 (1 hour) or less. Alternately, the following
      PowerCLI command may be used: # List UserVars.ESXiShellTimeOut in minutes for
      each host Get-VMHost | Select Name, @{N='UserVars.ESXiShellTimeOut';E={$_ |
      Get- AdvancedSettings UserVars.ESXiShellTimeOut | Select -ExpandProperty
      Values}}
    remediation: >
      To set the timeout to the desired value, perform the following from the
      vSphere web client: 1. From the vSphere Web Client, select the host. 2. Click
      Configure then expand System. 3. Select Advanced System Settings then click
      Edit. 4. Enter ESXiShellTimeOut in the filter. 5. Set the value for this
      parameter is set to 3600 (1 hour) or less 6. Click OK. Note: A value of 0
      disables the ESXiShellTimeOut. Alternately, run the following PowerCLI
      command: # Set UserVars.ESXiShellTimeOut to 3600 on all hosts Get-VMHost |
      Get-AdvancedSetting -Name 'UserVars.ESXiShellTimeOut' | Set- AdvancedSetting
      -Value '3600' References: 1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-6E1ECA4D-B617-4D42-
      B40B-71E4C83DEEFB.html 2. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-B314F79B-2BDD-4D68-
      8096-F009B87ACB33.html 3. http://kb.vmware.com/kb/2004746 4.
      https://docs.vmware.com/en/VMware-
