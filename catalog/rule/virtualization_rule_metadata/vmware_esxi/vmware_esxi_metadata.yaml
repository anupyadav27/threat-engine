  - rule_id: vmware_esxi.cis.1.l1_ensure_no_unauthorized_kernel_modules_are
    title: "(L1) Ensure no unauthorized kernel modules are loaded on the host"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "1.3"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      ESXi hosts by default do not permit the loading of kernel modules that lack
      valid digital signatures. This feature can be overridden, which would allow
      unauthorized kernel modules to be loaded.
    rationale: >
      VMware provides digital signatures for kernel modules. Untested or malicious
      kernel modules loaded on the ESXi host can put the host at risk for
      instability and/or exploitation. Impact: This is the default behavior therefor
      impact is low to none.
    audit_procedure: >
      To list all the loaded kernel modules from the ESXi Shell or vCLI, run:
      'esxcli system module list'. Review the list for unauthorized modules.
      Verifying signatures may assist in identifying unauthorized modules. For each
      module, verify the signature by running: esxcli system module get -m <module>.
      Additionally to review signed vs unsigned modules, the following PowerCLI
      command may be used: # List the system modules and Signature Info for each
      host Foreach ($VMHost in Get-VMHost ) { $ESXCli = Get-EsxCli -VMHost $VMHost
      $ESXCli.system.module.list() | Foreach { $ESXCli.system.module.get($_.Name) |
      Select @{N='VMHost';E={$VMHost}}, Module, License, Modulefile, Version,
      SignedStatus, SignatureDigest, SignatureFingerPrint } }
    remediation: >
      Secure the host by disabling unsigned modules and removing the offending VIBs
      from the host. To implement the recommended configuration state, run the
      following PowerCLI command: # To disable a module: $ESXCli = Get-EsxCli
      -VMHost 'MyHostName_or_IPaddress' $ESXCli.system.module.set($false, $false,
      'MyModuleName') Note: evacuate VMs and place the host into maintenance mode
      before disabling kernel modules. References: 1.
      https://docs.vmware.com/en/VMware-
      vSphere/6.7/com.vmware.vsphere.security.doc/GUID-E9B71B85-FBA3-447C-
