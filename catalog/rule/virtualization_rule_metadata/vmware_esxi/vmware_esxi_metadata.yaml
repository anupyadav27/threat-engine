  - rule_id: vmware_esxi.cis.1.l1_host_hardware_must_enable_uefi_secure_boot
    title: "(L1) Host hardware must enable UEFI Secure Boot"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 8_v1.2.0"
    cis_version: "8_v1.2.0"
    cis_control: "1.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      UEFI Secure Boot is a security feature of the Unified Extensible Firmware
      Interface (UEFI) specification. Its primary purpose is to ensure that only
      signed and trusted boot loaders and operating system kernels are allowed to
      execute during the system startup. This helps protect systems from malware and
      unauthorized software that might try to run before the operating system loads.
      By verifying the digital signatures of bootable applications and drivers,
      Secure Boot prevents potentially harmful code from compromising the boot
      process.
    rationale: >
      Enabling UEFI Secure Boot on the ESXi host hardware helps prevent malware and
      untrusted configurations. Impact: Enabling this after installation may render
      the host unbootable. Refer to the vSphere documentation for more information
      about enabling Secure Boot.
    audit_procedure: >
      
    remediation: >
      
    references: >
      
    impact: >
      Enabling this after installation may render the host unbootable. Refer to the
      vSphere documentation for more information about enabling Secure Boot.
    compliance_mappings:
      cis:
        - "CIS_VMWARE_ESXI_8_v1_2_0_1_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_vmware_esxi_8_v1_2_0_1_2"
    metadata_source: generated
    generated_by: generate_tech_rules

