  - rule_id: vmware_esxi.cis.7.l1_virtual_machines_must_limit_access_through_the
    title: "(L1) Virtual machines must limit access through the 'dvfilter' network API"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 8_v1.2.0"
    cis_version: "8_v1.2.0"
    cis_control: "7.20"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      The dvFilter interface facilitates network traffic filtering and inspection,
      predominantly via tools like NSX. It's vital to allow only authorized tools to
      access this interface to uphold network security. Unauthorized access could
      lead to illicit network traffic inspection or misuse. The parameter governing
      this behavior is ethernet*.filter*.name with a recommended setting of Not
      Present.
    rationale: >
      Limiting access through the 'dvfilter' network API to authorized tools is
      essential for preserving network integrity and security. This restriction
      curtails the risk of unauthorized data inspection and potential network
      vulnerabilities. Impact: While enhancing security by restricting access to the
      dvFilter interface, this control may hinder the functionality of legitimate
      network tools like NSX, which necessitate access to the 'dvfilter' network API
      for proper operation.
    audit_procedure: >
      To verify this information utilize the vSphere interface as follows: 1. Select
      the VM then select Actions followed by Edit Settings. 2. Click on the VM
      Options tab then expand Advanced. 3. Click on EDIT CONFIGURATION. 4. Verify
      that ethernet0.filter1.name = dv-filter1 where ethernet0 is the network
      adapter interface of the virtual machine that is to be protected, filter1 is
      the number of the filter that is being used, and dv-filter1 is the name of the
      particular data path kernel module that is protecting the VM. • If dvfilter
      access should not be permitted: Verify that the following is NOT listed
      ethernet0.filter1.name = dv-filter. 5. Ensure that the name of the data path
      kernel is set correctly. You may also perform the following to determine if
      dvfilter access should be permitted via the VMX file: 1. Verify that the
      following is in the VMX file: ethernet0.filter1.name = dv- filter1 where
      ethernet0 is the network adapter interface of the virtual machine that is to
      be protected, filter1 is the number of the filter that is being used, and dv-
      filter1 is the name of the particular data path kernel module that is
      protecting the VM. • If dvfilter access should not be permitted: Verify that
      the following is not in the VMX file: ethernet0.filter1.name = dv-filter1. 2.
      Ensure that the name of the data path kernel is set correctly.
    remediation: >
      To set this configuration utilize the vSphere interface as follows: 1. Select
      the VM then select Actions followed by Edit Settings. 2. Click on the VM
      Options tab then expand Advanced. 3. Click on EDIT CONFIGURATION. 4. Remove
      the value from ethernet0.filter1.name = dv-filter. • Parameters are removed
      when no value is present 5. Click OK. You may also configure a VM to allow
      dvfilter access via the following method in the VMX file: 1. Configure the
      following in the VMX file: ethernet0.filter1.name = dv- filter1 where
      ethernet0 is the network adapter interface of the virtual machine that is to
      be protected, filter1 is the number of the filter that is being used, and dv-
      filter1 is the name of the particular data path kernel module that is
      protecting the VM. • If dvfilter access should not be permitted: Remove the
      following from its VMX file: ethernet0.filter1.name = dv-filter1. 2. Set the
      name of the data path kernel correctly. References: 1.
      http://kb.vmware.com/kb/1714 2. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-CD0783C9-1734-4B9A-
      B821-ED17A77B0206.html
    references: >
      1. http://kb.vmware.com/kb/1714 2. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-CD0783C9-1734-4B9A-
      B821-ED17A77B0206.html
    impact: >
      While enhancing security by restricting access to the dvFilter interface, this
      control may hinder the functionality of legitimate network tools like NSX,
      which necessitate access to the 'dvfilter' network API for proper operation.
    compliance_mappings:
      cis:
        - "CIS_VMWARE_ESXI_8_v1_2_0_7_20"
      nist_800_53: []
      soc2: []
      pci_dss: []
