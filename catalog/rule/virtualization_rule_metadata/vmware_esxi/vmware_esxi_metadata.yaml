      Threat actors exploit known vulnerabilities when attempting to gain
      unauthorized access or elevate privileges on an ESXi host. Impact: ESXi
      servers must be in Maintenance Mode to apply patches. This implies all VMs
      must be moved or powered off on the ESXi server, so the patching process may
