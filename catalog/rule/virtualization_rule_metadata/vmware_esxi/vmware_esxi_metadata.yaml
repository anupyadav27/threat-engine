  - rule_id: vmware_esxi.cis.5.l1_host_must_restrict_use_of_the_dvfilter_network
    title: "(L1) Host must restrict use of the dvFilter network API"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 8_v1.2.0"
    cis_version: "8_v1.2.0"
    cis_control: "5.3"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The Net.DVFilterBindIpAddress parameter controls the use of the dvFilter
      network API, allowing network information to be sent to a specified IP
      address. If enabled with a compromised IP address, unauthorized network access
      to other virtual machines on the host could occur. It's essential to keep this
      parameter unconfigured, unless required by a product like VMware NSX. The
      parameter governing this behavior is Net.DVFilterBindIpAddress with a
      recommended setting of ''.
    rationale: >
      Limiting the use of the dvFilter network API by keeping the
      Net.DVFilterBindIpAddress parameter unconfigured helps in reducing potential
      security risks. This restriction aids in maintaining secure network
      communication and minimizes the attack surface. Impact: No functional impact
      is identified when restricting the dvFilter network API. However, incorrect
      configuration can lead to insecure network communication, posing a risk to the
      network security of virtual machines on the host.
    audit_procedure: >
      If the dvfilter network API is not being used on the host, ensure that the
      following kernel parameter has a blank value: Net.DVFilterBindIpAddress. 1.
      From the vSphere web client, select the host and click Configure then expand
      System 2. Click on Advanced System Settings then Edit. 3. Search for
      Net.DVFilterBindIpAddress in the filter. 4. Verify Net.DVFilterBindIpAddress
      has an empty value. 5. If an appliance is being used, then ensure the value of
      this parameter is set to the proper IP address. Additionally, the following
      PowerCLI command may be used to verify the setting: # List
      Net.DVFilterBindIpAddress for each host Get-VMHost | Select Name,
      @{N='Net.DVFilterBindIpAddress';E={$_ | Get- AdvancedSetting
      Net.DVFilterBindIpAddress | Select -ExpandProperty Values}}
    remediation: >
      To remove the configuration for the dvfilter network API, perform the
      following from the vSphere web client: 1. From the vSphere web client, select
      the host and click Configure then expand System 2. Click on Advanced System
      Settings then Edit. 3. Search for Net.DVFilterBindIpAddress in the filter. 4.
      Set Net.DVFilterBindIpAddress has an empty value. 5. If an appliance is being
      used, make sure the value of this parameter is set to the proper IP address.
      6. Enter the proper IP address. 7. Click OK. To implement the recommended
      configuration state, run the following PowerCLI command: # Set
      Net.DVFilterBindIpAddress to null on all hosts Get-VMHost HOST1 | Foreach {
      Set-AdvancedSetting -VMHost $_ -Name Net.DVFilterBindIpAddress -IPValue '' }
      Default Value: Not configured References: 1.
      https://docs.vmware.com/en/VMware-
      vSphere/6.7/com.vmware.vsphere.security.doc/GUID-CD0783C9-1734-4B9A-
      B821-ED17A77B0206.html?hWord=N4IghgNiBcICYDcCWAzJEAuBTATiAvkA
    references: >
