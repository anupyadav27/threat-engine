  - rule_id: vmware_esxi.cis.2.l1_ensure_vsphere_authentication_proxy_is_used
    title: "(L1) Ensure vSphere Authentication Proxy is used when adding hosts to Active Directory"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "2.8"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      vSphere Authentication Proxy enables ESXi hosts to join a domain without using
      Active Directory credentials. vSphere Authentication Proxy enhances security
      for PXE-booted hosts and hosts that are provisioned using Auto Deploy and Host
      profiles, by removing the need to store Active Directory credentials in the
      host configuration. The vSphere Authentication Proxy service binds to an IPv4
      address for communication with vCenter Server, and does not support IPv6. The
      vCenter Server can be on a host machine in an IPv4-only, IPv4/IPv6 mixed-mode,
      or IPv6-only network environment, but the machine that connects to the vCenter
      Server through the vSphere Client must have an IPv4 address for the vSphere
      Authentication Proxy service to work.
    rationale: >
      If you configure your host to join an Active Directory domain using Host
      Profiles the Active Directory credentials are saved in the host profile and
      are transmitted over the network. To avoid having to save Active Directory
      credentials in the Host Profile and to avoid transmitting Active Directory
      credentials over the network use the vSphere Authentication Proxy.
    audit_procedure: >
      If you utilize a host profile to join the domain, before attaching it verify
      that the profile has been configured to use the proxy server for joining the
      host to domains by following these steps: 1. In the vSphere Web Client go to
      Home in the menu. 2. Click on Policies and Profiles followed by Host Profiles.
      3. Choose the appropriate host profile 4. Select Configure then expand
      Security and Services followed by Authentication. 5. Select Active Directory
      configuration. 6. Verify that JoinDomain Method is configured to Use vSphere
      Authentication Proxy to add the host to the domain. There is no way to audit
      this using web client if you manually chose to join the host to a domain.
      Additionally, the following PowerCLI command may be used: # Confirm the host
      profile is using vSphere Authentication proxy to add the host to the domain
      Get-VMHost | Select Name, ` @{N='HostProfile';E={$_ | Get-VMHostProfile}}, `
      @{N='JoinADEnabled';E={($_ | Get-
      VmHostProfile).ExtensionData.Config.ApplyProfile.Authentication.ActiveDirecto
      ry.Enabled}}, ` @{N='JoinDomainMethod';E={(($_ | Get-
      VMHostProfile).ExtensionData.Config.ApplyProfile.Authentication.ActiveDirecto
      ry | Select -ExpandProperty Policy | Where {$_.Id -eq
      'JoinDomainMethodPolicy'}).Policyoption.Id}}# Check each host and their domain
      membership statusGet-VMHost | Get-VMHostAuthentication | Select VmHost,
      Domain, DomainMembershipStatus
    remediation: >
      To properly set the vSphere Authentication Proxy from Web Client directly: 1.
      Select the host 2. Click on Configure then expand System, select
      Authentication Services. 3. Click on Join Domain 4. Select Using Proxy Server
      radio button. 5. Provide proxy server IP address. To properly set the vSphere
      Authentication Proxy via Host Profiles: 1. In the vSphere Web Client go to
      Home in the menu. 2. Click on Policies and Profiles followed by Host Profiles.
      3. Choose the appropriate host profile 4. Select Configure followed by Edit
      Host Profile... then expand Security and Services followed by Security
      Settings, then Authentication configuration. 5. Select Active Directory
      configuration. 6. Set the JoinDomain Method is configured to Use vSphere
      Authentication Proxy to add the host to the domain. 7. Click on Save.
      References: 1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-084B74BD-40A5-4A4B-
      A82C-0C9912D580DC.html Additional Information: You can install vSphere
      Authentication Proxy on the same machine as the associated vCenter Server, or
      on a different machine that has network connection to the vCenter Server. The
      vSphere Authentication Proxy is not supported with vCenter Server versions
      earlier than version 5.0.
    references: >
      1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-084B74BD-40A5-4A4B-
      A82C-0C9912D580DC.html Additional Information: You can install vSphere
      Authentication Proxy on the same machine as the associated vCenter Server, or
      on a different machine that has network connection to the vCenter Server. The
      vSphere Authentication Proxy is not supported with vCenter Server versions
      earlier than version 5.0.
    impact: >
      
