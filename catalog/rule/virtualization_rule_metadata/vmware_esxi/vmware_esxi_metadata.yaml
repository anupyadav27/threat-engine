  - rule_id: vmware_esxi.cis.8.l1_ensure_the_number_of_vm_log_files_is
    title: "(L1) Ensure the number of VM log files is configured properly"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: automated
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "8.7.1"
    cis_section: "8"
    profile_applicability: "Level 1"
    description: >
      Normally a new log file is created only when a host is rebooted, so the file
      can grow to be quite large. You can ensure that new log files are created more
      frequently by limiting the maximum size of the log files. If you want to
      restrict the total size of logging data, VMware recommends saving 10 log
      files, each one limited to 1 MB. Each time an entry is written to the log, the
      size of the log is checked; if it is over the limit, the next entry is written
      to a new log. If the maximum number of log files already exists, when a new
      one is created, the oldest log file is deleted.
    rationale: >
      Log files should be rotated to preserve log data in case of corruption or
      destruction of the current log file, and to avoid the likelihood of logging
      issues caused by an overly large log file. Impact: A more extreme strategy is
      to disable logging altogether for the virtual machine. Disabling logging makes
      troubleshooting challenging and support difficult. Do not consider disabling
      logging unless the log file rotation approach proves insufficient.
    audit_procedure: >
      To verify that log files will be created more frequently, verify that
      log.keepOld is set to 10. 1. Select the VM then select Actions followed by
      Edit Settings. 2. Click on the VM Options tab then expand Advanced. 3. Click
      on EDIT CONFIGURATION. 4. Verify that log.keepOld is set to 10. Alternately,
      the following PowerCLI command may be used: # List the VMs and their current
      settings Get-VM | Get-AdvancedSetting -Name 'log.keepOld'| Select Entity,
      Name, Value
    remediation: >
      To set this configuration utilize the vSphere interface as follows: 1. Select
      the VM then select Actions followed by Edit Settings. 2. Click on the VM
      Options tab then expand Advanced. 3. Click on EDIT CONFIGURATION. 4. Click on
      ADD CONFIGURATION PARAMS then input log.keepOld with a value of 10. 5. Click
      OK, then OK again. To set the number of log files to be used to 10, run the
      following PowerCLI command: # Add the setting to all VMs Get-VM | New-
      AdvancedSetting -Name 'log.keepOld' -value '10' References: 1.
      https://docs.vmware.com/en/VMware-
      Tools/10.3.0/com.vmware.vsphere.vmwaretools.doc/GUID-685722FA-9009-
      439C-9142-18A9E7C592EA.html
    references: >
      1. https://docs.vmware.com/en/VMware-
      Tools/10.3.0/com.vmware.vsphere.vmwaretools.doc/GUID-685722FA-9009-
      439C-9142-18A9E7C592EA.html
    impact: >
      A more extreme strategy is to disable logging altogether for the virtual
      machine. Disabling logging makes troubleshooting challenging and support
      difficult. Do not consider disabling logging unless the log file rotation
      approach proves insufficient.
    compliance_mappings:
      cis:
        - "CIS_VMWARE_ESXI_7_v1_5_0_8_7_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_vmware_esxi_7_v1_5_0_8_7_1"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: vmware_esxi.cis.8.l2_ensure_host_information_is_not_sent_to_guests
    title: "(L2) Ensure host information is not sent to guests"
    severity: medium
    category: virtualization
    tech_type: vmware_esxi
    automation_type: automated
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "8.7.2"
    cis_section: "8"
    profile_applicability: "Level 2"
    description: >
      Configure VMware Tools to disable host information from being sent to guests
      unless a particular VM requires this information for performance monitoring
      purposes.
    rationale: >
      By enabling a VM to get detailed information about the physical host, an
      adversary could potentially use this information to inform further attacks on
      the host.
    audit_procedure: >
      To verify host information is not sent to guests, verify that
      tools.guestlib.enableHostInfo is set to FALSE. 1. Select the VM then select
      Actions followed by Edit Settings. 2. Click on the VM Options tab then expand
      Advanced. 3. Click on EDIT CONFIGURATION. 4. Verify that
      tools.guestlib.enableHostInfo is set to FALSE. Alternately, the following
      PowerCLI command may be used: # List the VMs and their current settings Get-VM
      | Get-AdvancedSetting -Name 'tools.guestlib.enableHostInfo'| Select Entity,
      Name, Value
    remediation: >
      To set this configuration utilize the vSphere interface as follows: 1. Select
      the VM then select Actions followed by Edit Settings. 2. Click on the VM
      Options tab then expand Advanced. 3. Click on EDIT CONFIGURATION. 4. Click on
      ADD CONFIGURATION PARAMS then input tools.guestlib.enableHostInfo with a value
      of FALSE. 5. Click OK, then OK again. To prevent host information from being
      sent to guests, run the following PowerCLI command: # Add the setting to all
      VMs Get-VM | New-AdvancedSetting -Name 'tools.guestlib.enableHostInfo' -value
      $false Default Value: FALSE References: 1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-2CF880DA-2435-4201-
      9AFB-A16A11951A2D.html
