  - rule_id: vmware_esxi.cis.5.l1_ensure_the_esxi_shell_is_disabled
    title: "(L1) Ensure the ESXi shell is disabled"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: automated
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "5.2"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The ESXi shell is an interactive command line environment available from the
      Direct Console User Interface (DCUI) or remotely via SSH. The ESXi shell
      should only be enabled on a host when running diagnostics or troubleshooting.
    rationale: >
      Activities performed from the ESXi shell bypass vCenter RBAC and audit
      controls, so the ESXi shell should only be enabled when needed to
      troubleshoot/resolve problems that cannot be fixed through the vSphere web
      client or vCLI/PowerCLI.
    audit_procedure: >
      To verify the ESXi shell is disabled, perform the following: 1. From the
      vSphere Web Client, select the host. 2. Select Configure then expand System
      and select Services. 3. Click on ESXi Shell then click Edit Startup Policy. 4.
      Verify the Startup Policy is set to Start and Stop Manually. Alternately, the
      following PowerCLI command may be used: # Check if the ESXi shell is running
      and set to start Get-VMHost | Get-VMHostService | Where { $_.key -eq 'TSM' } |
      Select VMHost, Key, Label, Policy, Running, Required Note: A host warning is
      displayed in the web client whenever the ESXi shell is enabled on a host.
    remediation: >
      To disable the ESXi shell, perform the following: 1. From the vSphere Web
      Client, select the host. 2. Select Configure then expand System and select
      Services. 3. Click on ESXi Shell then click Edit Startup Policy. 4. Set the
      Startup Policy is set to Start and Stop Manually. 5. Click on OK. Alternately,
      use the following PowerCLI command: # Set the ESXi shell to start manually
      rather than automatically for all hosts Get-VMHost | Get-VMHostService | Where
      { $_.key -eq 'TSM' } | Set- VMHostService -Policy Off References: 1.
      https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-B5144CE9-F8BB-494D-
      8F5D-0D5621D65DAE.html 2. https://docs.vmware.com/en/VMware-
