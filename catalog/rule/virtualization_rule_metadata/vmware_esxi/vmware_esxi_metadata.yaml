  - rule_id: vmware_esxi.cis.7.l1_ensure_the_vswitch_promiscuous_mode_policy_is
    title: "(L1) Ensure the vSwitch Promiscuous Mode policy is set to reject"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
