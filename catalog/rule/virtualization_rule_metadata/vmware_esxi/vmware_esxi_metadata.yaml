  - rule_id: vmware_esxi.cis.8.l2_ensure_vm_limits_are_configured_correctly
    title: "(L2) Ensure VM limits are configured correctly"
    severity: medium
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "8.5.1"
    cis_section: "8"
    profile_applicability: "Level 2"
    description: >
      By default, all virtual machines on an ESXi host share the resources equally.
      By using the resource management capabilities of ESXi, such as limits with
      reservations, shares, and/or resource pools, you can control the server
      resources a virtual machine consumes.
    rationale: >
      Without resource management, one virtual machine could consume so much of the
      host's resources that other virtual machines on the same host could not
      perform their intended functions.
    audit_procedure: >
      To verify VM limits are configured correctly, confirm that limits with
      reservations, shares, and/or resource pools are in place to guarantee
      resources to critical VMs and to constrain resource consumption by VMs that
      have a greater risk of being exploited or attacked, or that run applications
      that are known to have the potential to greatly consume resources. The
      following PowerCLI command may be used to list resource configurations: # List
      all Resource shares on all VMs Get-VM | Get-VMResourceConfiguration
    remediation: >
      To configure VM limits correctly, do all of the following that are applicable:
      1. Use shares or reservations to guarantee resources to critical VMs. 2. Use
      limits to constrain resource consumption by VMs that have a greater risk of
      being exploited or attacked, or that run applications that are known to have
      the potential to greatly consume resources. 3. Use resource pools to guarantee
      resources to a common group of critical VMs. References: 1.
      https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-E6262360-9300-4E10-
      ADE0-D4BED08DB5CA.html
    references: >
      1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-E6262360-9300-4E10-
      ADE0-D4BED08DB5CA.html
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_VMWARE_ESXI_7_v1_5_0_8_5_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_vmware_esxi_7_v1_5_0_8_5_1"
