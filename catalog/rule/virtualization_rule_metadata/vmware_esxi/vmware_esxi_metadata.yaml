  - rule_id: vmware_esxi.cis.4.l1_ensure_only_authorized_users_and_groups_belong
    title: "(L1) Ensure only authorized users and groups belong to the esxAdminsGroup group"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "4.7"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      The AD group used by vSphere is defined by the esxAdminsGroup attribute. By
      default, this attribute is set to 'ESX Admins'. All members of the group are
      granted full administrative access to all ESXi hosts in the domain. Monitor AD
      for the creation of this group, and limit membership to highly trusted users
      and groups.
    rationale: >
      An unauthorized user or group having membership in the esxAdminsGroup group
      will have full administrative access to all ESXi hosts. Such users may
      compromise the confidentiality, availability, and integrity of the all ESXi
      hosts and the respective data and processes they influence.
    audit_procedure: >
      To verify only authorized users and groups belong to esxAdminsGroup, go to
      Active Directory and review the membership of the group name that is defined
      by the advanced host setting: Config.HostAgent.plugins.hostsvc.esxAdminsGroup.
    remediation: >
      To remove unauthorized users and groups belonging to esxAdminsGroup, perform
      the following steps after coordination between vSphere admins and Active
      Directory admins: 1. Verify the setting of the esxAdminsGroup attribute. 2.
      View the list of members for that Microsoft Active Directory group. 3. Remove
      all unauthorized users and groups from that group. If full admin access for
      the AD ESX admins group is not desired, you can disable this behavior using
      the advanced host setting:
      'Config.HostAgent.plugins.hostsvc.esxAdminsGroupAutoAdd'. Default Value: 'ESX
      Admins'
