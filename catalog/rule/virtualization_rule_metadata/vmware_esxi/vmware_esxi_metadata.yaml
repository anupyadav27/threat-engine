  - rule_id: vmware_esxi.cis.4.l1_host_must_transmit_system_logs_to_a_remote_log
    title: "(L1) Host must transmit system logs to a remote log collector"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: automated
    cis_benchmark: "CIS_VMWARE_ESXI 8_v1.2.0"
    cis_version: "8_v1.2.0"
    cis_control: "4.2"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Transmitting system logs to a remote log collector ensures that ESXi logs are
      stored in a secure and centralized manner. This centralization not only allows
      for the streamlined monitoring of all hosts through a single tool but also
      facilitates aggregate analysis and searching capabilities.
    rationale: >
      Centralizing log storage on a remote log collector greatly enhances the
      ability to monitor, search, and analyze logs across multiple hosts. This
      central repository ensures that logs are protected from potential tampering,
      while also providing a robust long-term audit trail. By analyzing these logs,
      coordinated attacks or anomalies that might go unnoticed on individual hosts
      can be detected. Impact: There is no immediate functional impact when
      transmitting logs to a remote log collector. However, it is essential to
      ensure that the remote log collector is adequately secured and has sufficient
      storage capacity.
    audit_procedure: >
      To ensure remote logging is configured properly, perform the following from
      the vSphere web client: 1. Select the host 2. Click Configure then expand
      System then select Advanced System Settings. 3. Select Edit then enter
      Syslog.global.logHost in the filter. 4. Verify the Syslog.global.logHost is
      set to the hostname of the central log server. Alternately, the following
      PowerCLI command may be used: # List Syslog.global.logHost for each host Get-
      VMHost | Select Name, @{N='Syslog.global.logHost';E={$_ | Get- AdvancedSetting
      Syslog.global.logHost}}
    remediation: >
      To configure remote logging properly, perform the following from the vSphere
      web client: 1. Select the host 2. Click Configure then expand System then
      select Advanced System Settings. 3. Select Edit then enter
      Syslog.global.logHost in the filter. 4. Set the Syslog.global.logHost to the
      hostname or IP address of the central log server. 5. Click OK. Alternately,
      run the following PowerCLI command: # Set Syslog.global.logHost for each host
      Get-VMHost | Foreach { Set-AdvancedSetting -VMHost $_ -Name
      Syslog.global.logHost -Value '<NewLocation>' } Note: When setting a remote log
      host, it is also recommended to set the 'Syslog.global.logDirUnique' to true.
      You must configure the syslog settings for each host. References: 1.
      https://docs.vmware.com/en/VMware-vSphere/8.0/vsphere-security/GUID-
      F35D7005-58EB-48AC-99D5- B9942EB2A8EF.html?hWord=N4IghgNiBcIM4E84QPYHMQF8g
    references: >
      1. https://docs.vmware.com/en/VMware-vSphere/8.0/vsphere-security/GUID-
      F35D7005-58EB-48AC-99D5- B9942EB2A8EF.html?hWord=N4IghgNiBcIM4E84QPYHMQF8g
    impact: >
      There is no immediate functional impact when transmitting logs to a remote log
      collector. However, it is essential to ensure that the remote log collector is
      adequately secured and has sufficient storage capacity.
