  - rule_id: vmware_esxi.cis.5.l1_host_firewall_must_only_allow_traffic_from
    title: "(L1) Host firewall must only allow traffic from authorized networks"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 8_v1.2.0"
    cis_version: "8_v1.2.0"
    cis_control: "5.1"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The host's firewall is designed to block all incoming and outgoing network
      traffic by default, unless exceptions are explicitly made, thus minimizing the
      attack surface and barring unauthorized access. The firewall settings, while
      simplistic, are akin to router ACLs, and might require reflexive rules to be
      configured for certain network scenarios. Through the VMware Host Client,
      restrictions can be placed on a per-IP basis to only allow traffic from
      authorized networks, aligning with the security control's recommended value of
      permitting connections solely from authorized infrastructure and
      administration workstations.
    rationale: >
      Implementing a policy where only traffic from authorized networks is allowed,
      significantly enhances the host’s security posture. It not only minimizes the
      attack surface but also helps in maintaining a clean network traffic flow,
      which is crucial for organizational security and operational efficiency.
      Impact: While this security control is instrumental in preventing unauthorized
      access, its simplistic firewall may necessitate additional configuration like
      reflexive rules, depending on the network setup. This could potentially
      require more administrative effort for correct configuration and management,
      ensuring that necessary communications are not inadvertently blocked.
    audit_procedure: >
      To confirm access to services running on an ESXi host is properly restricted,
      perform the following from the vSphere web client: 1. Select a host 2. Click
      Configure then expand System then select Firewall. 3. Click Edit to view
      services which are enabled (indicated by a check). 4. For each enabled
      service, (e.g., ssh, vSphere Web Access, http client) check to ensure that the
      list of allowed IP addresses specified is correct. Additionally, the following
      PowerCLI command may be used: # List all services for a host Get-VMHost HOST1
      | Get-VMHostService # List the services which are enabled and have rules
      defined for specific IP ranges to access the service Get-VMHost HOST1 | Get-
      VMHostFirewallException | Where {$_.Enabled -and (-not
      $_.ExtensionData.AllowedHosts.AllIP)} # List the services which are enabled
      and do not have rules defined for specific IP ranges to access the service
      Get-VMHost HOST1 | Get-VMHostFirewallException | Where {$_.Enabled -and
      ($_.ExtensionData.AllowedHosts.AllIP)}
    remediation: >
      To properly restrict access to services running on an ESXi host, perform the
      following from the vSphere web client: 1. Select a host 2. Click Configure
      then expand System then select Firewall. 3. Click Edit to view services which
      are enabled (indicated by a check). 4. For each enabled service, (e.g., ssh,
      vSphere Web Access, http client) provide a list of allowed IP addresses. 5.
      Click OK. References: 1. https://docs.vmware.com/en/VMware-
      vSphere/8.0/vsphere-security/GUID- 8912DD42-C6EA-4299-9B10-5F3AEA52C605.html
    references: >
      1. https://docs.vmware.com/en/VMware-vSphere/8.0/vsphere-security/GUID-
      8912DD42-C6EA-4299-9B10-5F3AEA52C605.html
    impact: >
      While this security control is instrumental in preventing unauthorized access,
      its simplistic firewall may necessitate additional configuration like
      reflexive rules, depending on the network setup. This could potentially
      require more administrative effort for correct configuration and management,
      ensuring that necessary communications are not inadvertently blocked.
    compliance_mappings:
      cis:
        - "CIS_VMWARE_ESXI_8_v1_2_0_5_1"
