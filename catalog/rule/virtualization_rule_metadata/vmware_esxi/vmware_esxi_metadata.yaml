  - rule_id: vmware_esxi.cis.7.l1_ensure_the_vswitch_forged_transmits_policy_is
    title: "(L1) Ensure the vSwitch Forged Transmits policy is set to reject"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: automated
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "7.1"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      This recommendation is intended to address configuring a standard switch. Set
      the vSwitch Forged Transmits policy to reject for each vSwitch. Reject Forged
      Transmit can be set at the vSwitch and/or the Portgroup level. You can
      override switch-level settings at the Portgroup level.
    rationale: >
      If the virtual machine operating system changes the MAC address, the operating
      system can send frames with an impersonated source MAC address at any time.
      This allows an operating system to stage malicious attacks on the devices in a
      network by impersonating a network adaptor authorized by the receiving
      network. Setting forged transmissions to accept means the virtual switch does
      not compare the source and effective MAC addresses. To protect against MAC
      address impersonation, all virtual switches should have forged transmissions
      set to reject. Impact: This will prevent VMs from changing their effective MAC
      address. This will affect applications that require this functionality, such
      as Microsoft Clustering, which requires systems to effectively share a MAC
      address. This will affect how a layer 2 bridge will operate. This will also
      affect applications that require a specific MAC address for licensing. An
      exception should be made for the port groups that these applications are
      connected to.
    audit_procedure: >
      To verify the policy is set to reject forged transmissions, perform the
      following: 1. From the vSphere Web Client, select the host. 2. Click Configure
      then expand Networking. 3. Select Virtual switches then click Edit. 4. Click
      on Security. 5. Verify that Forged transmits is set to Reject in the dropdown.
      Alternately, the following PowerCLI command may be used: # List all vSwitches
      and their Security Settings Get-VirtualSwitch -Standard | Select VMHost, Name,
      ` @{N='MacChanges';E={if ($_.ExtensionData.Spec.Policy.Security.MacChanges) {
      'Accept' } Else { 'Reject'} }}, ` @{N='PromiscuousMode';E={if
      ($_.ExtensionData.Spec.Policy.Security.PromiscuousMode) { 'Accept' } Else {
      'Reject'} }}, ` @{N='ForgedTransmits';E={if
      ($_.ExtensionData.Spec.Policy.Security.ForgedTransmits) { 'Accept' } Else {
      'Reject'} }}
    remediation: >
      To set the policy to reject forged transmissions, perform the following: 1.
      From the vSphere Web Client, select the host. 2. Click Configure then expand
      Networking. 3. Select Virtual switches then click Edit. 4. Click on Security.
      5. Set Forged transmits to Reject in the dropdown. 6. Click on OK.
      Alternately, the following ESXi shell command may be used: # esxcli network
      vswitch standard policy security set -v vSwitch2 -f false References: 1.
      https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.networking.doc/GUID-891147DD-3E2E-45A1-
      9B50-7717C3443DD7.html
    references: >
      1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.networking.doc/GUID-891147DD-3E2E-45A1-
      9B50-7717C3443DD7.html
    impact: >
      This will prevent VMs from changing their effective MAC address. This will
      affect applications that require this functionality, such as Microsoft
      Clustering, which requires systems to effectively share a MAC address. This
      will affect how a layer 2 bridge will operate. This will also affect
      applications that require a specific MAC address for licensing. An exception
      should be made for the port groups that these applications are connected to.
    compliance_mappings:
      cis:
        - "CIS_VMWARE_ESXI_7_v1_5_0_7_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_vmware_esxi_7_v1_5_0_7_1"
    metadata_source: generated
    generated_by: generate_tech_rules

