  - rule_id: vmware_esxi.cis.6.l1_host_must_isolate_storage_communications
    title: "(L1) Host must isolate storage communications"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 8_v1.2.0"
    cis_version: "8_v1.2.0"
    cis_control: "6.2.1"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Isolating storage communications through zoning and Logical Unit Number (LUN)
      masking is instrumental in segregating Storage Area Network (SAN) activity.
      Zoning defines the connections between host bus adapters (HBAs) and targets,
      ensuring devices outside a zone remain invisible to the devices within, thus
      facilitating the independent management of zones such as testing and
      production. On the other hand, LUN masking controls the visibility and
      accessibility of LUNs to different hosts, further enhancing the granularity of
      access control within the storage network. By implementing these measures, the
      attack surface of the SAN is reduced, non-ESXi systems are prevented from
      accessing the SAN, and separation of environments like test and production is
      achieved.
    rationale: >
      Employing zoning and LUN masking to isolate storage communications is vital to
      reduce the risk of unauthorized access and potential cross-contamination
      between different operational environments. It allows for a more structured
      and secure management of storage resources, ensuring that unauthorized or
      incompatible systems are prevented from interacting with or accessing the SAN,
      thus contributing to the overall security and operational integrity of the
      environment. Impact: Failing to isolate storage communications can lead to an
      increased risk of unauthorized access to storage resources, potential data
      leakage, or interference between different operational zones. The lack of
      segregation might also pose challenges in managing and troubleshooting storage
      network activities, leading to operational inefficiencies and potential
      security risks.
    audit_procedure: >
      The audit procedures to verify SAN activity is properly segregated are SAN
      vendor or product-specific.
    remediation: >
      The remediation procedures to properly segregate SAN activity are SAN vendor
      or product-specific. In general, with ESXi hosts, use a single-initiator
      zoning or a single-initiator-single-target zoning. The latter is a preferred
      zoning practice. Using the more restrictive zoning prevents problems and
      misconfigurations that can occur on the SAN. References: 1.
      https://docs.vmware.com/en/VMware-
      vSphere/6.7/com.vmware.vsphere.storage.doc/GUID-6029358F-8EE8-4143-
      9BB0-16ABB3CA0FE3.html 2. https://docs.vmware.com/en/VMware-
      vSphere/6.7/com.vmware.vsphere.security.doc/GUID-BFE9046A-2278-4026-
      809A-ED8F9D8FDACE.html 3. https://docs.vmware.com/en/VMware-
      vSphere/6.7/com.vmware.vsphere.storage.doc/GUID-39A4551F-4B03-43A6- BEDF-
      FAB1528C070D.html
    references: >
      1. https://docs.vmware.com/en/VMware-
      vSphere/6.7/com.vmware.vsphere.storage.doc/GUID-6029358F-8EE8-4143-
      9BB0-16ABB3CA0FE3.html 2. https://docs.vmware.com/en/VMware-
      vSphere/6.7/com.vmware.vsphere.security.doc/GUID-BFE9046A-2278-4026-
      809A-ED8F9D8FDACE.html 3. https://docs.vmware.com/en/VMware-
      vSphere/6.7/com.vmware.vsphere.storage.doc/GUID-39A4551F-4B03-43A6- BEDF-
      FAB1528C070D.html
    impact: >
      Failing to isolate storage communications can lead to an increased risk of
      unauthorized access to storage resources, potential data leakage, or
      interference between different operational zones. The lack of segregation
      might also pose challenges in managing and troubleshooting storage network
      activities, leading to operational inefficiencies and potential security
      risks.
