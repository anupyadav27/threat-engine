  - rule_id: vmware_esxi.cis.8.l1_vmware_tools_on_deployed_virtual_machines_must
    title: "(L1) VMware Tools on deployed virtual machines must prevent being recustomized"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 8_v1.1.0"
    cis_version: "8_v1.1.0"
    cis_control: "8.4"
    cis_section: "8"
    profile_applicability: "Level 1"
    description: >
      Preventing re-customization of deployed virtual machines is essential to
      mitigate the risk of adversarial access through cloning and subsequent
      customization. Once a VM is deployed, it should be safeguarded against further
      customization to maintain the integrity of its configurations and data. The
      parameter governing this behavior is deployPkg enable-customization with a
      recommended setting of false.
    rationale: >
      This control mitigates the risk of unauthorized access and potential data
      exposure that may arise from cloning and re-customizing a VM. By adhering to
      this control, organizations uphold the integrity and security of deployed
      virtual machines. Impact: Disabling re-customization on deployed VMs may
      affect disaster recovery processes that necessitate IP address modifications.
      Such processes, facilitated by VMware Site Recovery Manager or VMware Cloud
      Disaster Recovery, will require alternative strategies for IP address
      management in recovery scenarios.
