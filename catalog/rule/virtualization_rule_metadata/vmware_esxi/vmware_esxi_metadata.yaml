  - rule_id: vmware_esxi.cis.8.l2_ensure_hardware_based_3d_acceleration_is
    title: "(L2) Ensure hardware-based 3D acceleration is disabled and mks.enable3d is set to 'False'"
    severity: medium
    category: virtualization
    tech_type: vmware_esxi
    automation_type: automated
    cis_benchmark: "CIS_VMWARE_ESXI 7_v1.5.0"
    cis_version: "7_v1.5.0"
    cis_control: "8.5.2"
    cis_section: "8"
    profile_applicability: "Level 2"
    description: >
      Due to performance reasons, modern graphic rendering is done within a
      dedicated graphic processing unit (GPU). Virtual machines can use the host-
      based GPU for such operations as well. Such dedicated hardware is typically
      accessed by using complex APIs like OpenGL and DirectX. This hardware-based 3D
      acceleration should be disabled if it is not needed.
    rationale: >
      Security flaws within APIs can lead to serious security breaches like memory
      corruption, denial of service, and remote code execution.
    audit_procedure: >
      To verify that hardware-based 3D acceleration is disabled, verify that
      mks.enable3d is set to FALSE. 1. Select the VM then select Actions followed by
      Edit Settings. 2. Click on the VM Options tab then expand Advanced. 3. Click
      on EDIT CONFIGURATION. 4. Verify that mks.enable3d is set to FALSE.
      Alternately, the following PowerCLI command may be used: # List the VMs and
      their current settings Get-VM | Get-AdvancedSetting -Name 'mks.enable3d'|
      Select Entity, Name, Value
    remediation: >
      To set this configuration utilize the vSphere interface as follows: 1. Select
      the VM then select Actions followed by Edit Settings. 2. Click on the VM
      Options tab then expand Advanced. 3. Click on EDIT CONFIGURATION. 4. Click on
      ADD CONFIGURATION PARAMS then input mks.enable3d with a value of FALSE. 5.
      Click OK, then OK again. To disable hardware-based 3D acceleration, run the
      following PowerCLI command: # Add the setting to all VMs Get-VM | New-
      AdvancedSetting -Name 'mks.enable3d' -value $false References: 1.
      https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-15D965F3-05E3-4E59-
      9F08-B305FDE672DD.html
    references: >
      1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-15D965F3-05E3-4E59-
      9F08-B305FDE672DD.html
    impact: >
      
