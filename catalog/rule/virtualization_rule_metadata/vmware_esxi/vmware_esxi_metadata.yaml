    profile_applicability: "Level 1"
    description: >
      The Direct Console User Interface (DCUI) is used for directly logging into an
      ESXi host and carrying out host management tasks. This setting terminates an
      idle DCUI session after the specified number of seconds has elapsed.
    rationale: >
      Terminating idle DCUI sessions helps avoid unauthorized usage of the DCUI
      originating from leftover login sessions.
