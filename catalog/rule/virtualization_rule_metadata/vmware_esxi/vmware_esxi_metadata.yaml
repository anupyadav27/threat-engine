rules:

  - rule_id: vmware_esxi.cis.1.l1_host_hardware_must_have_auditable_authentic
    title: "(L1) Host hardware must have auditable, authentic, and up to date system & device firmware"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 8_v1.2.0"
    cis_version: "8_v1.2.0"
    cis_control: "1.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Hardware firmware is not immune to serious issues affecting confidentiality,
      integrity, or availability. Vulnerable system management controllers &
      management engines can provide places for attackers to establish persistence,
      in order to re-infect and re- compromise hosts after reboots and updates.
      Ensure that the latest firmware updates are applied to all components of your
      systems and that the firmware is authentic and supplied by your hardware
      manufacturer.
    rationale: >
      To ensure the integrity, security, and optimal performance of server hardware,
      it is essential to maintain system and device firmware that is verifiable,
      genuine, and current. Impact: If you are a vSAN customer please ensure that
      storage device & controller firmware versions are certified.
