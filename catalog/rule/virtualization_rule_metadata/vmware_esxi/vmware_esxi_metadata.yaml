  - rule_id: vmware_esxi.cis.6.l1_host_snmp_services_if_enabled_must_limit_access
    title: "(L1) Host SNMP services, if enabled, must limit access"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: manual
    cis_benchmark: "CIS_VMWARE_ESXI 8_v1.2.0"
    cis_version: "8_v1.2.0"
    cis_control: "6.4.1"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      To manage hosts securely, if SNMP is enabled, access must be restricted.
      Preferably, SNMPv3 should be employed as it offers superior security through
      key authentication and encryption compared to SNMPv1 or SNMPv2. Configuring
      the destination for SNMP traps is essential for ensuring monitoring data is
      directed to a legitimate and secure host.
    rationale: >
      Proper SNMP configuration is crucial to reduce the risk of misuse or
      compromise, especially if other management means are in place. SNMPv3’s
      enhanced security features are pivotal for secure management and monitoring.
      Impact: Improper SNMP configuration can redirect sensitive monitoring data to
      malicious hosts, risking exploitation and compromising host security.
    audit_procedure: >
      To confirm the proper configuration of SNMP, perform the following from the
      ESXi Shell or vCLI: 1. Run the following to determine if SNMP is being used:
      esxcli system snmp get 2. If SNMP is being used, refer to the vSphere
      Monitoring and Performance guide, chapter 8 for steps to verify the
      parameters. Additionally, the following PowerCLI command may be used to view
      the SNMP configuration: # List the SNMP Configuration of a host (single host
      connection required) Get-VMHostSnmp
    remediation: >
      To correct the SNMP configuration, perform the following from the ESXi Shell
      or vCLI: 1. If SNMP is not needed, disable it by running: esxcli system snmp
      set --enable false 2. If SNMP is needed, refer to the vSphere Monitoring and
      Performance guide, chapter 8 for steps to configure it. Additionally, the
      following PowerCLI command may be used to implement the configuration: #
      Update the host SNMP Configuration (single host connection required) Get-
      VmHostSNMP | Set-VMHostSNMP -Enabled:$true -ReadOnlyCommunity '<secret>'
      Notes: • SNMP must be configured on each ESXi host • SNMP settings can be
      configured using Host Profiles References: 1.
      https://docs.vmware.com/en/VMware-vSphere/8.0/vsphere-monitoring-
      performance/GUID-8EF36D7D-59B6-4C74-B1AA-4A9D18AB6250.html
    references: >
      1. https://docs.vmware.com/en/VMware-vSphere/8.0/vsphere-monitoring-
      performance/GUID-8EF36D7D-59B6-4C74-B1AA-4A9D18AB6250.html
    impact: >
      Improper SNMP configuration can redirect sensitive monitoring data to
      malicious hosts, risking exploitation and compromising host security.
