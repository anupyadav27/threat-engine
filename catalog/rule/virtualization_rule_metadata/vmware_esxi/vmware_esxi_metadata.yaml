  - rule_id: vmware_esxi.cis.3.l1_host_must_enable_normal_lockdown_mode
    title: "(L1) Host must enable normal lockdown mode"
    severity: high
    category: virtualization
    tech_type: vmware_esxi
    automation_type: automated
    cis_benchmark: "CIS_VMWARE_ESXI 8_v1.2.0"
    cis_version: "8_v1.2.0"
    cis_control: "3.20"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Implementing normal lockdown mode restricts direct access to ESXi hosts,
      mandating management via vCenter Server to uphold defined roles and access
      controls, mitigating risks associated with unauthorized or insufficiently
      audited activities. Exception Users list serves as an override mechanism,
      permitting specified users direct access even in lockdown mode. This mode
      offers a balanced approach between security and operational flexibility
      compared to the stricter lockdown mode which, if connectivity to vCenter
      Server is lost, necessitates host rebuilding.
    rationale: >
      Enabling normal lockdown mode enforces centralized management through vCenter
      Server, ensuring adherence to organizational access controls and auditing
      policies. This measure significantly lowers the risk of unauthorized
      activities by restricting direct host access, promoting a more controlled and
      auditable operational environment. Impact: The activation of lockdown mode may
      impede direct host access for certain operations like backup and
      troubleshooting. Although temporary deactivation is an option, ensuring proper
      reactivation post-operation is crucial to maintain the intended security
      posture.
    audit_procedure: >
      To verify lockdown mode is enabled, perform the following from the vSphere web
      client: 1. From the vSphere Web Client, select the host. 2. Select Configure
      then expand System and select Security Profile. 3. Verify that Lockdown Mode
      is set to Normal. Alternately, the following PowerCLI command may be used: #
      To check if Lockdown mode is enabled Get-VMHost | Select
      Name,@{N='Lockdown';E={$_.Extensiondata.Config.adminDisabled}}
    remediation: >
      To enable lockdown mode, perform the following from the vSphere web client: 1.
      From the vSphere Web Client, select the host. 2. Select Configure then expand
      System and select Security Profile. 3. Across from Lockdown Mode click on
      Edit. 4. Click the radio button for Normal. 5. Click OK. Alternately, run the
      following PowerCLI command: # Enable lockdown mode for each host Get-VMHost |
      Foreach { $_.EnterLockdownMode() } References: 1.
      https://docs.vmware.com/en/VMware-vSphere/8.0/vsphere-security/GUID-
      88B24613-E8F9-40D2-B838-225F5FF480FF.html
    references: >
      1. https://docs.vmware.com/en/VMware-vSphere/8.0/vsphere-security/GUID-
      88B24613-E8F9-40D2-B838-225F5FF480FF.html
    impact: >
      The activation of lockdown mode may impede direct host access for certain
      operations like backup and troubleshooting. Although temporary deactivation is
      an option, ensuring proper reactivation post-operation is crucial to maintain
      the intended security posture.
    compliance_mappings:
      cis:
        - "CIS_VMWARE_ESXI_8_v1_2_0_3_20"
