  - rule_id: tciem.mysql.slow_query_log_has_appropriate_permissions
    title: "Ensure 'slow_query_log' Has Appropriate Permissions"
    severity: high
    mitre_technique: T1562
    mitre_tactic: defense_evasion
    cis_control: '3.4'
    cis_section: '3'
    log_source: "general_log, error_log"
    detection:
      event_type: audit_event
      filters:
        change_type: security_relevant
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Set slow query log to OFF (instead use SYS schema views or query
      Performance_Schema) SET PERSIST slow_query_log = OFF; If slow query is
      enabled, execute the following command to correct permissions and ownership:
      chmod 660 <log file> chown mysql:mysql <log file> Default Value: Slow query
      log is off by default. References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/slow-query-log.html

  - rule_id: tciem.mysql.relay_log_basename_files_have_appropriate
    title: "Ensure 'relay_log_basename' Files Have Appropriate Permissions"
    severity: high
    mitre_technique: T1562
    mitre_tactic: defense_evasion
    cis_control: '3.5'
    cis_section: '3'
    log_source: "general_log, error_log"
    detection:
      event_type: audit_event
      filters:
        change_type: security_relevant
      evidence_fields: [source_ip, username, timestamp, action]
