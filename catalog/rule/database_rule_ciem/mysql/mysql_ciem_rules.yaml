# MYSQL — CIEM Detection Rules
# Real-time authentication & access event analysis
# Log source: general_log, error_log

tech_type: mysql
category: database
log_source: general_log, error_log

rules:

  - rule_id: tciem.mysql.use_dedicated_least_privileged_account_for_mysql
    title: "Use Dedicated Least Privileged Account for MySQL Daemon/Service"
    severity: high
    mitre_technique: T1068
    mitre_tactic: privilege_escalation
    cis_control: '1.2'
    cis_section: '1'
    log_source: "general_log, error_log"
    detection:
      event_type: privilege_change
      filters:
        action_in: [GRANT, ROLE_ADD, ELEVATION, SUDO]
        target_privilege_in: [admin, superuser, root, dba, wheel]
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Create a user which is only used for running MySQL and directly related
      processes. This user must not have administrative rights to the system.
      Additionally, it's best to avoid providing shell access to such an account.
      Shell access can be removed using the following command at a terminal prompt:
      /usr/sbin/groupadd -g 27 -o -r mysql >/dev/null 2>&1 || : /usr/sbin/useradd -M
      -N -g mysql -o -r -d /var/lib/mysql -s /bin/false \ -c 'MySQL Server' -u 27
      mysql >/dev/null 2>&1 || : References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/changing-mysql-user.html 2.
      https://dev.mysql.com/doc/refman/8.4/en/server-
      options.html#option_mysqld_user Additional Information: The root user may be
      used to start the MySQL service on Linux/UNIX, but then it must be configured
      to drop privileges by specifying a service specific user in the my.cnf or
      my.ini file.

  - rule_id: tciem.mysql.interactive_login_is_disabled
    title: "Ensure Interactive Login is Disabled"
    severity: medium
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '1.5'
    cis_section: '1'
    log_source: "general_log, error_log"
    detection:
      event_type: authentication_success
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Execute one of the following commands in a terminal: usermod -s /bin/false
      mysql Or usermod -s /sbin/nologin mysql

  - rule_id: tciem.mysql.implement_connection_delays_to_limit_failed_login
    title: "Implement Connection Delays to Limit Failed Login Attempts"
    severity: high
    mitre_technique: T1110
    mitre_tactic: credential_access
    cis_control: '2.18'
    cis_section: '2'
    log_source: "general_log, error_log"
    detection:
      event_type: authentication_failure
      threshold: 5
      window_seconds: 300
      group_by: [source_ip, username]
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Add the following lines to my.cnf: [mysqld] plugin-load-
      add=connection_control.so connection-control=FORCE_PLUS_PERMANENT connection-
      control-failed-login-attempts=FORCE_PLUS_PERMANENT
      connection_control_failed_connections_threshold=5
      connection_control_min_connection_delay=60000
      connection_control_max_connection_delay=1920000 Delays are in milliseconds for
      server response to failed connection attempt. • 60000 (ms - 1 minute) •
      1920000 (ms, 32 minutes) For each user set ALTER USER <user>
      FAILED_LOGIN_ATTEMPTS 12; References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/connection-control.html

  - rule_id: tciem.mysql.log_bin_basename_files_have_appropriate
    title: "Ensure 'log_bin_basename' Files Have Appropriate Permissions"
    severity: high
    mitre_technique: T1562
    mitre_tactic: defense_evasion
    cis_control: '3.2'
    cis_section: '3'
    log_source: "general_log, error_log"
    detection:
      event_type: audit_event
      filters:
        change_type: security_relevant
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Execute the following command for each log file location requiring corrected
      permissions and ownership: chmod 660 <log file> chown mysql:mysql <log file>
      References: 1. https://dev.mysql.com/doc/refman/8.4/en/password-logging.html
      2. https://dev.mysql.com/doc/mysql-secure-deployment-guide/8.4/en/secure-
      deployment-permissions.html

