  - rule_id: tciem.ibm_db2.creating_the_database_without_public_grants
    title: "Creating the Database Without PUBLIC Grants (RESTRICTIVE)"
    severity: high
    mitre_technique: T1068
    mitre_tactic: privilege_escalation
    cis_control: '4.1.1'
    cis_section: '4'
    log_source: "db2audit, db2diag"
    detection:
      event_type: privilege_change
      filters:
        action_in: [GRANT, ROLE_ADD, ELEVATION, SUDO]
        target_privilege_in: [admin, superuser, root, dba, wheel]
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      There is no remediation for this parameter due to the fact that the placement
      of the RESTRICTIVE clause happens within the CREATE DATABASE statement. Unless
      your backup strategies allow for a complete overhaul of your environment where
      you are able to recreate the database with the RESTRICTIVE clause, we do not
      recommend changing this parameter. However, if you would like to align your
      database configuration to that which the RESTRICTIVE clause would provide,
      please ensure the following: 1. SYSCAT.DBAUTH – Ensure PUBLIC is NOT granted
      the following authorities: o CREATETAB o BINDADD o CONNECT o IMPLICIT_SCHEMA
      2. SYSCAT.TABAUTH – Ensure PUBLIC is NOT granted the following privileges: o
      SELECT on all SYSCAT and SYSIBM tables o SELECT and UPDATE on all SYSSTAT
      tables o SELECT on the following views in schema SYSIBMADM: ▪ ALL_* ▪ USER_* ▪
      ROLE_* ▪ SESSION_* ▪ DICTIONARY ▪ TAB 3. SYSCAT.ROUTINEAUTH – Ensure PUBLIC is
      NOT granted the following privileges: o EXECUTE with GRANT on all procedures
      in schema SQLJ o EXECUTE with GRANT on all functions and procedures in schema
      SYSFUN o EXECUTE with GRANT on all functions and procedures in schema SYSPROC
      o EXECUTE on all table functions in schema SYSIBM o EXECUTE on all other
      procedures in schema SYSIBM 4. SYSCAT.MODULEAUTH – Ensure PUBLIC is NOT
      granted the following privileges: o EXECUTE on the following modules in schema
      SYSIBMADM: ▪ DBMS_DDL ▪ DBMS_JOB ▪ DBMS_LOB ▪ DBMS_OUTPUT ▪ DBMS_SQL ▪
      DBMS_STANDARD ▪ DBMS_UTILITY 5. SYSCAT.PACKAGEAUTH – Ensure PUBLIC is NOT
      granted the following privileges: o BIND on all packages created in the NULLID
      schema o EXECUTE on all packages created in the NULLID schema 6.
      SYSCAT.SCHEMAAUTH – Ensure PUBLIC` is NOT granted the following privileges: o
      CREATEIN on schema SQLJ o CREATEIN on schema NULLID 7. SYSCAT.TBSPACEAUTH –
      Ensure PUBLIC is NOT granted the USE privilege on table space USERSPACE1. 8.
      SYSCAT.WORKLOADAUTH – Ensure PUBLIC is NOT granted the USAGE privilege on
      SYSDEFAULTUSERWORKLOAD. 9. SYSCAT.VARIABLEAUTH – Ensure PUBLIC is NOT granted
      the READ privilege on schema global variables in the SYSIBM schema.
      References: 1. https://www.ibm.com/docs/en/db2/11.5?topic=commands-create-
      database 2. https://www.ibm.com/docs/en/db2/11.5?topic=ownership-default-
      privileges- granted-creating-database

  - rule_id: tciem.ibm_db2.secure_permissions_for_the_primary_archive_log
    title: "Secure Permissions for the Primary Archive Log Location (LOGARCHMETH1)"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '4.1.5'
    cis_section: '4'
    log_source: "db2audit, db2diag"
    detection:
      event_type: resource_access
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      For Windows and Linux: 1. Attach to the Db2 instance. 2. Run the following
      command to change the primary archive log directory, if necessary: db2 =>
      update database configuration using logarchmeth1 <valid directory> Additional
      steps for Windows (assuming that the logarchmeth1 parameter includes DISK): 1.
      Connect to the Db2 host 2. Right-click on the primary archive log directory 3.
      Choose Properties 4. Select the Security tab 5. Grant all Db2 administrator
      accounts the Full Control authority 6. Grant all other accounts read and
      execute privileges only (revoke all other privileges) Additional steps for
      Linux (assuming that the logarchmeth1 parameter includes DISK): 1. Connect to
      the Db2 host 2. Change to the primary archive log directory 3. Change the
      permissions for the directory $ chmod -R 755

