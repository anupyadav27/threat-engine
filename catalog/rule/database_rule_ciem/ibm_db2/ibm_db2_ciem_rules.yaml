  - rule_id: tciem.ibm_db2.restrict_access_to_syscat_auditpolicies
    title: "Restrict Access to SYSCAT.AUDITPOLICIES"
    severity: high
    mitre_technique: T1562
    mitre_tactic: defense_evasion
    cis_control: '4.2.1'
    cis_section: '4'
    log_source: "db2audit, db2diag"
    detection:
      event_type: audit_event
      filters:
        change_type: security_relevant
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Perform the following to revoke access from PUBLIC. 1. Connect to the Db2
      database. db2 => connect to <dbname> 2. Run the following command: db2 =>
      REVOKE SELECT ON SYSCAT.AUDITPOLICIES FROM PUBLIC References: 1.
      https://www.ibm.com/docs/en/db2/11.5?topic=views-syscatauditpolicies

