  - rule_id: tciem.ibm_db2.secure_the_communication_buffer_exit_library_comm
    title: "Secure the Communication Buffer Exit Library (COMM_EXIT_LIST)"
    severity: high
    mitre_technique: T1068
    mitre_tactic: privilege_escalation
    cis_control: '3.1.13'
    cis_section: '3'
    log_source: "db2audit, db2diag"
    detection:
      event_type: privilege_change
      filters:
        action_in: [GRANT, ROLE_ADD, ELEVATION, SUDO]
        target_privilege_in: [admin, superuser, root, dba, wheel]
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      To change permissions of a file on Linux: chmod 755 <file> To change
      permissions of a file on Windows: 1. Right-click on the file 2. Choose
      properties 3. Select the Security tab 4. Grant the Full Control authority to
      all Db2 administrator accounts 5. Grant only read and execute privileges to
      all other accounts (revoke any other privileges)

  - rule_id: tciem.ibm_db2.disable_grants_during_restore_db2_restore_grant
    title: "Disable Grants During Restore (DB2_RESTORE_GRANT_ADMIN_AUTHORITIES)"
    severity: high
    mitre_technique: T1068
    mitre_tactic: privilege_escalation
    cis_control: '3.2.3'
    cis_section: '3'
    log_source: "db2audit, db2diag"
    detection:
      event_type: privilege_change
      filters:
        action_in: [GRANT, ROLE_ADD, ELEVATION, SUDO]
        target_privilege_in: [admin, superuser, root, dba, wheel]
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Run the following command to set the DB2_RESTORE_GRANT_ADMIN_AUTHORITIES
      registry variable to OFF: db2set DB2_RESTORE_GRANT_ADMIN_AUTHORITIES=OFF
      Default Value: The default value of DB2_RESTORE_GRANT_ADMIN_AUTHORITIES is
      OFF. References: 1. https://www.ibm.com/docs/en/db2/11.5?topic=variables-
      system- environment#r0005658_\_S_DB2_RESTORE_GRANT_ADMIN_AUTHORITIES

