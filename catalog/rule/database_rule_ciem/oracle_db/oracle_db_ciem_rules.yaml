  - rule_id: tciem.oracle_db.audit_trail_is_set_to_db_xml_os_db_extended_or
    title: "Ensure 'AUDIT_TRAIL' Is Set to 'DB', 'XML', 'OS', 'DB,EXTENDED', or 'XML,EXTENDED'"
    severity: high
    mitre_technique: T1562
    mitre_tactic: defense_evasion
    cis_control: '2.2.2'
    cis_section: '2'
    log_source: "audit_trail, v$xml_audit_trail"
    detection:
      event_type: audit_event
      filters:
        change_type: security_relevant
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      To remediate this setting, execute one of the following SQL statements and
      restart the instance. ALTER SYSTEM SET AUDIT_TRAIL = DB, EXTENDED SCOPE =
      SPFILE; ALTER SYSTEM SET AUDIT_TRAIL = OS SCOPE = SPFILE; ALTER SYSTEM SET
      AUDIT_TRAIL = XML, EXTENDED SCOPE = SPFILE; ALTER SYSTEM SET AUDIT_TRAIL = DB
      SCOPE = SPFILE; ALTER SYSTEM SET AUDIT_TRAIL = XML SCOPE = SPFILE; References:
      1. https://docs.oracle.com/en/database/oracle/oracle-
      database/19/refrn/AUDIT_TRAIL.html

