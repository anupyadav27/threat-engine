  - rule_id: tciem.oracle_db.grant_any_object_privilege_audit_option_is_enabled
    title: "Ensure the 'GRANT ANY OBJECT PRIVILEGE' Audit Option Is Enabled"
    severity: high
    mitre_technique: T1068
    mitre_tactic: privilege_escalation
    cis_control: '6.1.11'
    cis_section: '6'
    log_source: "audit_trail, v$xml_audit_trail"
    detection:
      event_type: privilege_change
      filters:
        action_in: [GRANT, ROLE_ADD, ELEVATION, SUDO]
        target_privilege_in: [admin, superuser, root, dba, wheel]
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      To remediate this setting, execute the following SQL statement, keeping in
      mind if this needs to be done in both container and pluggable database, you
      must connect to both places to do the audit statement. AUDIT GRANT ANY OBJECT
      PRIVILEGE; Additional Information: This does NOT audit all attempts to grant
      or revoke object privileges since this can also be done by anyone who was
      granted an object privilege with the grant option. Also, this never creates an
      audit record for anyone who does not hold the GRANT ANY OBJECT PRIVILEGE
      system privilege. Therefore, many attempts, successful or not, to grant and
      revoke object privileges are not audited by this.

