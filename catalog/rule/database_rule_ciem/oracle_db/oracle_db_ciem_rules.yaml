  - rule_id: tciem.oracle_db.all_default_passwords_are_changed
    title: "Ensure All Default Passwords Are Changed"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '4.1'
    cis_section: '4'
    log_source: "audit_trail, v$xml_audit_trail"
    detection:
      event_type: resource_access
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      To reset the account with NO AUTHENTICATION, execute the following SQL
      statement in CDB: ALTER USER <USERNAME> NO AUTHENTICATION; Notes: • As per
      Oracle Support Document 2173962.1, newly created database may list SYS and
      SYSTEM in CBA_USERS_WITH_DEFPWD even if they were set with non- default
      passwords. Running ALTER USER with the same password will correctly recognize
      these accounts as non-default. • If remote_password_file is set to NONE,
      changing the SYS password via ALTER USER is not possible. In this case, update
      remote_password_file to EXCLUSIVE before modifying the SYS password.
      References: 1. https://docs.oracle.com/en/database/oracle/oracle-
      database/23/dbseg/keeping- your-oracle-database-secure.html 2.
      https://support.oracle.com/epmos/faces/DocumentDisplay?id=2173962.1

  - rule_id: tciem.oracle_db.latest_version_of_the_password_file_is_used
    title: "Ensure The Latest Version of The Password File Is Used"
    severity: high
    mitre_technique: T1068
    mitre_tactic: privilege_escalation
    cis_control: '4.5'
    cis_section: '4'
    log_source: "audit_trail, v$xml_audit_trail"
    detection:
      event_type: privilege_change
      filters:
        action_in: [GRANT, ROLE_ADD, ELEVATION, SUDO]
        target_privilege_in: [admin, superuser, root, dba, wheel]
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      To update the password file to the latest format (12.2), follow these steps: •
      Ensure that all users in the password file have passwords meeting 12.2
      complexity requirements. • Use the orapwd utility to create a new password
      file in 12.2 format: orapwd file=orapwd122 FORMAT=12.2 • If the password file
      name or location has recently changed and the changes are not reflected,
      refresh the metadata cache: ALTER SYSTEM FLUSH PASSWORDFILE_METADATA_CACHE; •
      Validate the password file format using the audit query again. Default Value:
      12.2 References: 1. https://docs.oracle.com/en/database/oracle/oracle-
      database/23/refrn/V- PASSWORDFILE_INFO.html#GUID-726CF0F6-14A4-465B-B46B-
      E2AC8CFFD27A

