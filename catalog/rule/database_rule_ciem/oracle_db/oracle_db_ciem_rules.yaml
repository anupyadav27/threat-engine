  - rule_id: tciem.oracle_db.dba_users_authentication_type_is_not_set_to
    title: "Ensure 'DBA_USERS.AUTHENTICATION_TYPE' Is Not Set to 'EXTERNAL' for Any User"
    severity: high
    mitre_technique: T1068
    mitre_tactic: privilege_escalation
    cis_control: '4.3'
    cis_section: '4'
    log_source: "audit_trail, v$xml_audit_trail"
    detection:
      event_type: privilege_change
      filters:
        action_in: [GRANT, ROLE_ADD, ELEVATION, SUDO]
        target_privilege_in: [admin, superuser, root, dba, wheel]
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      To remediate this setting, execute the following SQL statement, keeping in
      mind if this is granted in both container and pluggable database, you must
      connect to both places to revoke. ALTER USER <username> IDENTIFIED BY
      <password> ; References: 1. https://docs.oracle.com/en/database/oracle/oracle-
      database/19/refrn/DBA_USERS.html#d1365273e525 Additional Information: The
      PASSWORD keyword (column) used in the SQL for prior Oracle versions has been
      deprecated from version 11.2 onward in favor of the new AUTHENTICATION_TYPE
      keyword (column) for the DBA_USERS table. However, the PASSWORD column has
      still been retained for backward compatibility.

  - rule_id: tciem.oracle_db.all_auditable_system_actions_commands_are_audited
    title: "Ensure All Auditable System Actions Commands Are Audited"
    severity: high
    mitre_technique: T1068
    mitre_tactic: privilege_escalation
    cis_control: '5.1'
    cis_section: '5'
    log_source: "audit_trail, v$xml_audit_trail"
    detection:
      event_type: privilege_change
      filters:
        action_in: [GRANT, ROLE_ADD, ELEVATION, SUDO]
        target_privilege_in: [admin, superuser, root, dba, wheel]
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Execute the following SQL statement to remediate this recommendation: ALTER
      AUDIT POLICY CIS_LOCAL_SYSTEM_ACTIONS ADD ACTIONS <DDL> ; or ALTER AUDIT
      POLICY CIS_LOCAL_SYSTEM_ACTIONS ADD PRIVILEGES <DDL> ; Note: If you do not
      have CIS_LOCAL_SYSTEM_ACTIONS, please create one using the CREATE AUDIT POLICY
      statement. References: 1. https://docs.oracle.com/en/database/oracle/oracle-
      database/23/sqlrf/Types-of- SQL-Statements.html#GUID-
      FD9A8CB4-6B9A-44E5-B114-EFB8DA76FC88 2.
      https://docs.oracle.com/en/database/oracle/oracle-database/23/sqlrf/AUDIT-
      Unified-Auditing.html Additional Information: Check for EXCEPTION, as it may
      disable auditing for certain users. SELECT POLICY_NAME, ENABLED_OPTION,
      ENTITY_NAME FROM AUDIT_UNIFIED_ENABLED_POLICIES WHERE ENABLED_OPTION = 'EXCEPT
      USER';

  - rule_id: tciem.oracle_db.logon_and_logoff_actions_audit_is_enabled
    title: "Ensure the 'LOGON' AND 'LOGOFF' Actions Audit Is Enabled"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '5.2'
    cis_section: '5'
    log_source: "audit_trail, v$xml_audit_trail"
    detection:
      event_type: authentication_success
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Execute the following SQL statement to remediate this setting. Run the
      following query in the CDB and in each PDB: CREATE AUDIT POLICY
      CIS_CDB_LOGON_LOGOFF ACTIONS LOGON, LOGOFF ACTIONS COMPONENT=PROTOCOL HTTP,
      FTP, AUTHENTICATION; AUDIT POLICY CIS_CDB_LOGON_LOGOFF; Note: If you do not
      have CIS_CDB_LOGON_LOGOFF, please create one using the CREATE AUDIT POLICY
      statement. Refer to Section 8.2 where a PL/SQL block is provided to help
      create or modify the audit policy to remediate this item in both container and
      pluggable database.

