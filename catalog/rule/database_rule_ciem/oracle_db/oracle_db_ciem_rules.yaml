  - rule_id: tciem.oracle_db.all_export_activities_are_audited
    title: "Ensure All Export Activities Are Audited"
    severity: high
    mitre_technique: T1562
    mitre_tactic: defense_evasion
    cis_control: '5.4'
    cis_section: '5'
    log_source: "audit_trail, v$xml_audit_trail"
    detection:
      event_type: audit_event
      filters:
        change_type: security_relevant
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Execute the following SQL statement in the CDB and in each PDB to remediate
      this recommendation: ALTER AUDIT POLICY CIS_CDB_EXPORT ADD ACTIONS
      COMPONENT=datapump EXPORT; Note: If you do not have CIS_CDB_EXPORT, please
      create one using the CREATE AUDIT POLICY statement. Refer to Section 8.4 where
      a PL/SQL block is provided to help create or modify the audit policy to
      remediate this item in both container and pluggable database. Default Value:
      Export datapump activities are not audited by default. References: 1.
      https://docs.oracle.com/en/database/oracle/oracle-
      database/23/dbseg/configuring-audit-policies.html#GUID-AA781864-5756-464E-
      AFB6-675625AF0EF5 Additional Information: RMAN activities are subject to
      mandatory auditing as part of the ORA$MANDATORY audit policy, which is listed
      in the UNIFIED_AUDIT_POLITICES column of the UNIFIED_AUDIT_TRAIL data
      dictionary view. This policy cannot be disabled.

  - rule_id: tciem.oracle_db.use_of_sys_privileges_is_audited
    title: "Ensure The Use Of SYS* Privileges Is Audited"
    severity: high
    mitre_technique: T1068
    mitre_tactic: privilege_escalation
    cis_control: '5.5'
    cis_section: '5'
    log_source: "audit_trail, v$xml_audit_trail"
    detection:
      event_type: privilege_change
      filters:
        action_in: [GRANT, ROLE_ADD, ELEVATION, SUDO]
        target_privilege_in: [admin, superuser, root, dba, wheel]
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Execute the following SQL statement in the CDB and in each PDB to remediate
      this recommendation: CREATE AUDIT POLICY
      CIS_CDB_ALL_ACTIONS_BY_PRIVILEGED_USERS ACTIONS ALL WHEN q'!
      (SYS_CONTEXT('USERENV','CLIENT_PROGRAM_NAME') NOT IN ('emagent') AND
      INSTR(UPPER(SYS_CONTEXT('USERENV','CLIENT_PROGRAM_NAME')),'PERL') = 0 AND
      INSTR(UPPER(SYS_CONTEXT('USERENV','CLIENT_PROGRAM_NAME')),'RMAN') = 0 AND
      INSTR(UPPER(SYS_CONTEXT('USERENV','CLIENT_PROGRAM_NAME')),'OMS') = 0)!'
      EVALUATE PER SESSION ONLY TOPLEVEL; AUDIT POLICY
      CIS_CDB_ALL_ACTIONS_BY_PRIVILEGED_USERS BY SYS, SYSKM, SYSBACKUP, SYSRAC,
      SYSDG, PUBLIC; Note: If you do not have
      CIS_CDB_ALL_ACTIONS_BY_PRIVILEGED_USERS, please create one using the CREATE
      AUDIT POLICY statement. Refer to Section 8.5 where a PL/SQL block is provided
      to help create or modify the audit policy to remediate this item in both
      container and pluggable database. For legacy reasons the SYSOPER privilege is
      using the name PUBLIC. The used privilege in the unified audit log is SYSOPR.
      Emagent, OMS, RMAN and Perl have been excluded to prevent an excessive number
      of events and issues with spillover files. Default Value: Empty References: 1.
      https://docs.oracle.com/en/database/oracle/oracle-database/23/sqlrf/CREATE-
      AUDIT-POLICY-Unified-Auditing.html

