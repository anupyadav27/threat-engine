  - rule_id: tciem.oracle_db.procedure_audit_option_is_enabled
    title: "Ensure the 'PROCEDURE' Audit Option Is Enabled"
    severity: high
    mitre_technique: T1068
    mitre_tactic: privilege_escalation
    cis_control: '6.1.15'
    cis_section: '6'
    log_source: "audit_trail, v$xml_audit_trail"
    detection:
      event_type: privilege_change
      filters:
        action_in: [GRANT, ROLE_ADD, ELEVATION, SUDO]
        target_privilege_in: [admin, superuser, root, dba, wheel]
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      To remediate this setting, execute the following SQL statement in either the
      non multi- tenant or container database, it does NOT need run in the
      pluggable. AUDIT PROCEDURE; Additional Information: Not all auditing options
      work alike. In particular, the statement auditing option audit PROCEDURE does
      indeed audit create and drop library as well as all types of procedures and
      java schema objects. However, privilege audits do not work this way. So, for
      example, none of audit CREATE ANY PROCEDURE, audit DROP ANY PROCEDURE, or
      audit CREATE PROCEDURE will audit create or drop library activities. In
      statement auditing, PROCEDURE has a larger scope than in privilege auditing,
      where it is specific to functions, packages and procedures, but excludes
      libraries and perhaps other object types. Audit PROCEDURE does not audit
      altering procedures, either in your own schema or in another via the ALTER ANY
      PROCEDURE system privilege. There seems to be no statement audit that is a
      better replacement for Audit ALTER ANY PROCEDURE, but beware that will not
      create any audit records for users that do not have the privilege. Thus,
      attempts to alter procedures in one's own schema are never audited, and
      attempts to alter procedures in another's schema that fail for lack of the
      ALTER ANY PROCEDURE privilege are not audited. This is simply a weakness in
      the current state of Oracle auditing. Fortunately, though, all that the ALTER
      command can be used for regarding procedures, functions, packages and
      libraries is compile options, so the inability to comprehensively audit alter
      procedure activities and requests is not as bad as it would be for other
      object types (USER, PROFILE, etc.)

