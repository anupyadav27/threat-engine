  - rule_id: tciem.oracle_db.failed_login_attempts_is_less_than_or_equal_to_5
    title: "Ensure 'FAILED_LOGIN_ATTEMPTS' Is Less Than Or Equal To '5'"
    severity: high
    mitre_technique: T1110
    mitre_tactic: credential_access
    cis_control: '3.1'
    cis_section: '3'
    log_source: "audit_trail, v$xml_audit_trail"
    detection:
      event_type: authentication_failure
      threshold: 5
      window_seconds: 300
      group_by: [source_ip, username]
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Remediate this setting by executing the following SQL statement for each
      PROFILE returned by the audit procedure. ALTER PROFILE <profile_name> LIMIT
      FAILED_LOGIN_ATTEMPTS 5; Default Value: 10 References: 1.
      https://docs.oracle.com/en/database/oracle/oracle-database/23/sqlrf/CREATE-
      PROFILE.html#d387296e851 Additional Information: The similar setting used to
      block a DDoS, the SEC_MAX_FAILED_LOGIN_ATTEMPTS initialization parameter, can
      be used to protect unauthorized intruders from attacking the server processes
      for applications, but this setting does not protect against unauthorized
      attempts via valid usernames. The SEC_MAX_FAILED_LOGIN_ATTEMPTS prevents
      multiple failed login attempts by a single connection. The parameter differs
      from the limit set on user profiles and applied to failed login attempts to a
      single user account. Limiting failed authentication attempts by a single
      connection helps protect against Denial of Service (DoS) attacks and
      authentication attempts against multiple user accounts.

