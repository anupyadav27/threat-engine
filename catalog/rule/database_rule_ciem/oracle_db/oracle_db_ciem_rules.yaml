  - rule_id: tciem.oracle_db.allow_group_access_to_sga_is_set_to_false
    title: "Ensure 'ALLOW_GROUP_ACCESS_TO_SGA' Is Set To `FALSE`"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '2.3.4'
    cis_section: '2'
    log_source: "audit_trail, v$xml_audit_trail"
    detection:
      event_type: resource_access
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      To remediate this setting, execute the following SQL statement. ALTER SYSTEM
      SET ALLOW_GROUP_ACCESS_TO_SGA='FALSE' SCOPE=SPFILE; Default Value: FALSE
      References: 1. https://docs.oracle.com/en//database/oracle/oracle-
      database/23/refrn/ALLOW_GROUP_ACCESS_TO_SGA.html#GUID-
      A6BABC97-7EF8-4E1A-89C9-CF81EDCFB4A2

  - rule_id: tciem.oracle_db.sec_max_failed_login_attempts_is_set_to_3_or_less
    title: "Ensure 'SEC_MAX_FAILED_LOGIN_ATTEMPTS' Is Set To '3' Or Less"
    severity: high
    mitre_technique: T1110
    mitre_tactic: credential_access
    cis_control: '2.3.8'
    cis_section: '2'
    log_source: "audit_trail, v$xml_audit_trail"
    detection:
      event_type: authentication_failure
      threshold: 5
      window_seconds: 300
      group_by: [source_ip, username]
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      To remediate this setting, execute the following SQL statement and restart the
      instance. ALTER SYSTEM SET SEC_MAX_FAILED_LOGIN_ATTEMPTS = 3 SCOPE = SPFILE;
      Default Value: 3 References: 1.
      https://docs.oracle.com/en/database/oracle/oracle-
      database/23/refrn/SEC_MAX_FAILED_LOGIN_ATTEMPTS.html

