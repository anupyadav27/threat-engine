# ORACLE_DB — CIEM Detection Rules
# Real-time authentication & access event analysis
# Log source: audit_trail, v$xml_audit_trail

tech_type: oracle_db
category: database
log_source: audit_trail, v$xml_audit_trail

rules:

  - rule_id: tciem.oracle_db.sqlnet_allowed_logon_version_client_is_set_to_12a
    title: "Ensure 'SQLNET.ALLOWED_LOGON_VERSION_CLIENT' Is Set To 12a"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '2.2.4'
    cis_section: '2'
    log_source: "audit_trail, v$xml_audit_trail"
    detection:
      event_type: authentication_success
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      To remediate this recommendation, set SQLNET.ALLOWED_LOGON_VERSION_CLIENT to
      12a. Default Value: 12 References: 1.
      https://docs.oracle.com/en/database/oracle/oracle-
      database/23/netrf/parameters- for-the-
      sqlnet.ora.html#GUID-B2908ADF-0973-44A9-9B34-587A3D605BED

  - rule_id: tciem.oracle_db.sqlnet_allowed_logon_version_server_is_set_to_12a
