  - rule_id: tciem.oracle_db.admin_restrictions_is_set_to_on
    title: "Ensure 'ADMIN_RESTRICTIONS_' Is Set to 'ON'"
    severity: high
    mitre_technique: T1068
    mitre_tactic: privilege_escalation
    cis_control: '2.1.2'
    cis_section: '2'
    log_source: "audit_trail, v$xml_audit_trail"
    detection:
      event_type: privilege_change
      filters:
        action_in: [GRANT, ROLE_ADD, ELEVATION, SUDO]
        target_privilege_in: [admin, superuser, root, dba, wheel]
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      To remediate this recommendation: Use a text editor such as vi to set the
      admin_restrictions_ <listener_name> to the value ON. Default Value: Not set.
      References: 1. https://docs.oracle.com/en/database/oracle/oracle-
      database/19/netag/configuring-and-administering-oracle-net-listener.html

