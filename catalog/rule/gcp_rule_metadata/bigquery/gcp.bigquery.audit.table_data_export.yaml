rule_type: ciem
title: 'BigQuery: Large Table Export to External Storage'
scope: bigquery.audit
domain: configuration_and_change_management
subcategory: configuration
severity: high
service: bigquery
resource: audit
requirement: Table Data Export
description: A BigQuery table was exported to an external GCS bucket or location.
  Bulk data exports can be a data exfiltration vector.
rationale: Adversaries abuse bigquery operations to achieve data exfiltration in GCP
  environments. Detected via Cloud Admin Activity or Data Access audit logs.
remediation: '1. Audit and revoke the IAM binding granting public or broad access
  to the resource.

  2. Enable VPC Service Controls to restrict data exfiltration to approved perimeters.

  3. Configure DLP inspection on Cloud Storage and BigQuery for sensitive data.

  4. Set up Cloud Monitoring alerts on bulk data read operations by unexpected principals.

  5. Enable CMEK for storage and BigQuery to prevent data use without key access.

  '
