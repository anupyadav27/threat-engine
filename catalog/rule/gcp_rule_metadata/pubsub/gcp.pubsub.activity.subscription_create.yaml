title: 'Pub/Sub: Subscription Created on Sensitive Topic'
scope: pubsub.activity
domain: configuration_and_change_management
subcategory: configuration
severity: medium
service: pubsub
resource: activity
requirement: Subscription Create
description: Pub/Sub subscription created — may establish a collection channel consuming
  log or event messages from security-critical topics.
rationale: 'Adversaries access data from cloud object storage (S3, Azure Blob, GCS)
  which may be misconfigured with overly permissive policies exposing PII, medical
  records, financial data, or credentials. Bulk download followed by external transfer
  indicates active data theft. Detected via: unusual object access patterns from new
  IAM users or roles, OAuth token grants to external apps preceding high-volume downloads,
  and GetObject events from anomalous IPs or user agents.'
remediation: '1. Audit and revert the snapshot or data access operation.

  2. Review IAM permissions on the affected disk/volume and revoke unauthorized access.

  3. Enable disk snapshot sharing restrictions via Org Policy.

  4. Configure Security Command Center alerts for snapshot cross-project share events.

  5. Encrypt all persistent disks with CMEK to prevent use without key access.

  '
