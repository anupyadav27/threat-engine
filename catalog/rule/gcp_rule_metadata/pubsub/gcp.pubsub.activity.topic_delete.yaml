requirement: Topic Delete
description: Pub/Sub topic deleted — disrupts event-driven integrations; may disable
  security alerting pipelines if the topic was used for SIEM forwarding.
rationale: 'Adversaries modify or disable security tools to avoid detection of their
  activities — including killing security software processes, disabling GuardDuty
  detectors, deleting Microsoft Defender plans, or tampering with cloud monitoring
  agents. Once defenses are disabled, subsequent attack phases proceed without generating
  alerts. Detected via: security process/service termination, cloud monitoring agent
  disable API calls, and container admission controller tampering.'
remediation: '1. Immediately restore the deleted or modified logging/security configuration.

  2. Apply Org Policy to prevent log sink deletion: `logging.restrictSinkCreation`.

  3. Use Cloud Storage Bucket Lock on log export buckets to prevent deletion.

  4. Configure out-of-band alerting via Pub/Sub → Cloud Functions for audit log changes.

  5. Enable Security Command Center Premium for threat detection on defense evasion
  events.

  '
