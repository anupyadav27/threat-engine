rule_id: gcp.sql.activity.export_instance
rule_type: ciem
title: 'Cloud SQL: Database Export Executed'
scope: sql.activity
domain: storage_and_database_security
subcategory: data_security
severity: high
service: sql
resource: activity
requirement: Export Instance
description: Cloud SQL database exported to GCS — full database dump created, which
  may contain PII, credentials, or sensitive business data.
rationale: 'Adversaries access data from cloud object storage (S3, Azure Blob, GCS)
  which may be misconfigured with overly permissive policies exposing PII, medical
  records, financial data, or credentials. Bulk download followed by external transfer
  indicates active data theft. Detected via: unusual object access patterns from new
  IAM users or roles, OAuth token grants to external apps preceding high-volume downloads,
  and GetObject events from anomalous IPs or user agents.'
remediation: '1. Audit and revoke the IAM binding granting public or broad access
  to the resource.

  2. Enable VPC Service Controls to restrict data exfiltration to approved perimeters.

  3. Configure DLP inspection on Cloud Storage and BigQuery for sensitive data.

  4. Set up Cloud Monitoring alerts on bulk data read operations by unexpected principals.

  5. Enable CMEK for storage and BigQuery to prevent data use without key access.

  '
