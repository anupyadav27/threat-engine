title: 'Cloud SQL: Database Instance Deleted'
scope: sql.activity
domain: storage_and_database_security
subcategory: data_security
severity: high
service: sql
resource: activity
requirement: Instance Delete
description: Cloud SQL instance deleted — loss of managed database service; may be
  irreversible without automated backup.
rationale: 'Adversaries destroy data and files on cloud storage or databases at scale
  to interrupt availability, render services inoperable, or destroy evidence. Cloud
  data destruction is often irreversible without backups. Detected via: bulk S3 object
  deletion via elevated IAM credentials, EC2/EBS/snapshot mass deletion events, storage
  account deletion with soft-delete disabled, and database cluster deletion without
  final snapshot.'
remediation: '1. Restore the deleted resource from Cloud Storage versioning, BigQuery
  snapshots, or Persistent Disk snapshot.

  2. Enable Cloud Storage Object Versioning and Bucket Lock for critical buckets.

  3. Apply Org Policy `constraints/gcp.resourceLocations` to restrict deletion regions.

  4. Set up Cloud Asset Inventory change notifications for resource deletion events.

  5. Require two-person approval for project deletion via Resource Manager policy.

  '
