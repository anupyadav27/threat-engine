title: 'Cloud SQL: Root User Password Changed'
scope: sql.audit
domain: identity_and_access_management
subcategory: access_control
severity: critical
service: sql
resource: audit
requirement: Root User Password Changed
description: The root database user password was changed on a Cloud SQL instance.
  Unauthorized root password changes grant full database access to attackers.
rationale: Adversaries abuse sql operations to achieve credential access in GCP environments.
  Detected via Cloud Admin Activity or Data Access audit logs.
remediation: '1. Immediately rotate or disable the accessed credential / secret.

  2. Review all Access Context Manager policies for unexpected secret access.

  3. Enable Secret Manager audit logs (Data Access) and alert on AccessSecretVersion.

  4. Apply CMEK to Secret Manager and restrict IAM to least-privilege consumers.

  5. Use Workload Identity Federation instead of long-lived service account keys.

  '
