title: 'Artifact Registry: Repository Made Publicly Readable'
scope: artifactregistry.audit
domain: configuration_and_change_management
subcategory: configuration
severity: high
service: artifactregistry
resource: audit
requirement: Repository Made Public
description: An Artifact Registry repository was made publicly readable. Publicly
  exposed registries may leak internal container images, including embedded secrets.
rationale: Adversaries abuse artifactregistry operations to achieve collection in
  GCP environments. Detected via Cloud Admin Activity or Data Access audit logs.
remediation: '1. Audit and revert the snapshot or data access operation.

  2. Review IAM permissions on the affected disk/volume and revoke unauthorized access.

  3. Enable disk snapshot sharing restrictions via Org Policy.

  4. Configure Security Command Center alerts for snapshot cross-project share events.

  5. Encrypt all persistent disks with CMEK to prevent use without key access.

  '
