title: 'IAM Credentials: Service Account Access Token Generated'
scope: iam.credentials
domain: identity_and_access_management
subcategory: access_control
severity: high
service: iam
resource: credentials
requirement: Generate Access Token
description: Access token generated for another service account via GenerateAccessToken
  — service account impersonation for lateral movement.
rationale: 'Adversaries circumvent elevation control mechanisms to gain higher-level
  permissions. In cloud environments this includes SAML assertion manipulation, IAM
  role privilege boundary modifications, and STS:AssumeRole chaining to escalate from
  limited to administrative access. Detected via: privilege boundary removal events,
  STS role chaining with unusually broad permissions, and unexpected policy attachments.'
remediation: '1. Revoke the service account impersonation grant (roles/iam.serviceAccountTokenCreator).

  2. Audit all GenerateAccessToken calls in iamcredentials.googleapis.com audit logs.

  3. Restrict service account impersonation using IAM Conditions (resource-based restrictions).

  4. Enable Security Command Center lateral movement threat findings.

  5. Rotate credentials for all service accounts involved in the impersonation chain.

  '
