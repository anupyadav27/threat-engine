requirement: Update Custom Role
description: Existing custom IAM role modified — permissions may have been expanded
  to enable privilege escalation.
rationale: 'Adversaries circumvent elevation control mechanisms to gain higher-level
  permissions. In cloud environments this includes SAML assertion manipulation, IAM
  role privilege boundary modifications, and STS:AssumeRole chaining to escalate from
  limited to administrative access. Detected via: privilege boundary removal events,
  STS role chaining with unusually broad permissions, and unexpected policy attachments.'
remediation: '1. Immediately audit the modified IAM policy and revoke unauthorized
  role grants.

  2. Enable Cloud Asset Inventory change notifications for IAM policy updates.

  3. Apply Org Policy constraints to restrict role assignment to approved principals.

  4. Require two-person approval for Owner/Editor role grants via Cloud Identity workflows.

  5. Configure VPC Service Controls to prevent cross-project privilege escalation.

  '
