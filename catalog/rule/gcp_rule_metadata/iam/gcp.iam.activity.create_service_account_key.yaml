subcategory: access_control
severity: high
service: iam
resource: activity
requirement: Create Service Account Key
description: User-managed key created for a GCP service account — long-lived credential
  that persists outside normal rotation cycles.
rationale: 'Adversaries search local file systems, remote file shares, and cloud storage
  for files containing insecurely stored credentials — including config files, source
  code, .env files, and shell history. Cloud-specific targets include ~/.aws/credentials,
  terraform.tfstate (containing plaintext secrets), and container environment variable
  dumps. Detected via: file read access to .env/.xml/.ps1/config files, grep commands
  targeting credential patterns, and container process access to mounted secret paths.'
remediation: '1. Immediately rotate or disable the accessed credential / secret.

  2. Review all Access Context Manager policies for unexpected secret access.

  3. Enable Secret Manager audit logs (Data Access) and alert on AccessSecretVersion.

  4. Apply CMEK to Secret Manager and restrict IAM to least-privilege consumers.

  5. Use Workload Identity Federation instead of long-lived service account keys.

  '
