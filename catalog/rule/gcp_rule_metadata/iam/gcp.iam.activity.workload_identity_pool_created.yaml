title: 'IAM: Workload Identity Pool Created'
scope: iam.activity
domain: identity_and_access_management
subcategory: access_control
severity: medium
service: iam
resource: activity
requirement: Workload Identity Pool Created
description: New Workload Identity Pool or Provider created — establishes external
  identity federation that may grant cloud access to attacker-controlled identity
  providers.
rationale: 'Adversaries create cloud accounts (IAM users, Entra ID users, service
  principals) to maintain access to victim systems without deploying persistent remote
  access tools. Such accounts establish secondary credentialed access that survives
  password resets of the initially compromised account. Detected via: IAM CreateUser
  + AttachUserPolicy from non-standard sources, Add User events from unusual IPs,
  and SaaS account provisioning outside business hours.'
remediation: '1. Audit and disable the newly created service account or Workload Identity
  Pool.

  2. Review all service account keys and revoke unexpected user-managed keys.

  3. Apply Org Policy `iam.disableServiceAccountCreation` for non-admin projects.

  4. Enable Security Command Center alerts for new service account creation events.

  5. Rotate credentials for any accounts that interacted with the new identity.

  '
