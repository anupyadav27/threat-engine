resource: activity
requirement: Set Iam Policy
description: IAM policy modified on a KMS key — may grant decrypt access to unauthorized
  principals, enabling access to all resources encrypted with this key.
rationale: 'Adversaries add additional roles or permissions to adversary-controlled
  cloud accounts to maintain persistent access to a tenant. Attackers target Global
  Administrator, Owner, and Contributor roles — granting full control over subscription
  resources without deploying remote access tools. Detected via: IAM role attachment
  events, privilege grant events in Entra ID/Okta, and admin role assignment in Microsoft
  365.'
remediation: '1. Immediately audit the modified IAM policy and revoke unauthorized
  role grants.

  2. Enable Cloud Asset Inventory change notifications for IAM policy updates.

  3. Apply Org Policy constraints to restrict role assignment to approved principals.

  4. Require two-person approval for Owner/Editor role grants via Cloud Identity workflows.

  5. Configure VPC Service Controls to prevent cross-project privilege escalation.

  '
