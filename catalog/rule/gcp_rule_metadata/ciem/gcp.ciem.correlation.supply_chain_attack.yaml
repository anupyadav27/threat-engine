title: 'GCP: Supply Chain Attack — Function Update + IAM Policy Grant'
scope: ciem.correlation
domain: configuration_and_change_management
subcategory: configuration
severity: critical
service: ciem
resource: correlation
requirement: Supply Chain Attack
description: 'Correlated supply chain attack: Cloud Function or Cloud Run service
  updated followed by IAM role grant — compromised workload acquiring persistent elevated
  permissions.'
rationale: 'Adversaries add additional roles or permissions to adversary-controlled
  cloud accounts to maintain persistent access to a tenant. Attackers target Global
  Administrator, Owner, and Contributor roles — granting full control over subscription
  resources without deploying remote access tools. Detected via: IAM role attachment
  events, privilege grant events in Entra ID/Okta, and admin role assignment in Microsoft
  365.'
remediation: '1. Audit the deployed function or container image for malicious dependencies.

  2. Enable Binary Authorization to require signed images from trusted registries.

  3. Restrict function/service deployment IAM roles to CI/CD service accounts only.

  4. Scan all deployed packages using Artifact Registry vulnerability scanning.

  5. Configure Org Policy to restrict allowed container registries for Cloud Run.

  '
