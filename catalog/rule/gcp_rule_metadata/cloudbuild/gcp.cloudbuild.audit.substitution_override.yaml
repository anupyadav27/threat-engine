title: 'Cloud Build: Build Variables Overridden via Substitutions'
scope: cloudbuild.audit
domain: configuration_and_change_management
subcategory: configuration
severity: high
service: cloudbuild
resource: audit
requirement: Substitution Override
description: Build substitution variables were overridden at trigger time. Attackers
  can override environment-defining variables to redirect builds to malicious artifacts.
rationale: Adversaries abuse cloudbuild operations to achieve execution in GCP environments.
  Detected via Cloud Admin Activity or Data Access audit logs.
remediation: '1. Audit the compute instance or function for malicious startup scripts
  or code.

  2. Verify the workload image against a trusted artifact registry with Binary Authorization.

  3. Apply Org Policy `compute.requireShieldedVm` for all new VM instances.

  4. Enable Security Command Center threats for anomalous compute execution events.

  5. Review service account permissions attached to the created instance or function.

  '
