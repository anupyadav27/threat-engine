rule_id: gcp.logging.activity.delete_sink
rule_type: ciem
title: 'Logging: Log Export Sink Deleted'
scope: logging.activity
domain: configuration_and_change_management
subcategory: configuration
severity: critical
service: logging
resource: activity
requirement: Delete Sink
description: Cloud Logging export sink deleted — audit log stream interrupted, preventing
  log export to SIEM or Cloud Storage.
rationale: 'Adversaries disable or modify cloud logging capabilities to limit visibility
  into their activities. With sufficient permissions they can disable CloudTrail,
  delete Azure diagnostic settings, delete log sinks, or modify audit configurations
  — blinding defenders to all subsequent actions. Detected via: StopLogging, DeleteTrail,
  UpdateSink, Delete-DiagnosticSetting, license downgrade events, and SaaS audit log
  disable events.'
remediation: '1. Immediately restore the deleted or modified logging/security configuration.

  2. Apply Org Policy to prevent log sink deletion: `logging.restrictSinkCreation`.

  3. Use Cloud Storage Bucket Lock on log export buckets to prevent deletion.

  4. Configure out-of-band alerting via Pub/Sub → Cloud Functions for audit log changes.

  5. Enable Security Command Center Premium for threat detection on defense evasion
  events.

  '
