rule_id: gcp.container.k8s.pod_exec
rule_type: ciem
title: 'GKE K8s: Pod Exec Command Executed'
scope: container.k8s
domain: container_and_kubernetes_security
subcategory: container_security
severity: high
service: container
resource: k8s
requirement: Pod Exec
description: kubectl exec used to execute commands inside a running pod — interactive
  shell access to a container workload by an unexpected principal.
rationale: Adversaries execute commands within GKE containers via the Kubernetes API
  exec endpoint, achieving remote code execution without SSH or network access to
  the pod. Pod exec by non-CI/CD service accounts, especially in production namespaces,
  indicates unauthorized access. Detected via GKE K8s audit logs for pods/exec.
remediation: '1. Audit the compute instance or function for malicious startup scripts
  or code.

  2. Verify the workload image against a trusted artifact registry with Binary Authorization.

  3. Apply Org Policy `compute.requireShieldedVm` for all new VM instances.

  4. Enable Security Command Center threats for anomalous compute execution events.

  5. Review service account permissions attached to the created instance or function.

  '
