requirement: Cluster Create
description: New GKE cluster created — may be provisioned with insecure defaults (legacy
  auth, public endpoint, no network policy) for adversary use.
rationale: 'Adversaries deploy containers into environments using Docker APIs or Kubernetes
  control planes to facilitate execution or evade defenses by running malicious images
  outside standard deployment processes. Deployed containers can host C2 infrastructure,
  cryptomining workloads, or data exfiltration tools. Detected via: container create
  + start by non-admin principals, images not on an allowlist or using ''latest''
  tag, privileged mode or host namespace mount at runtime, and unauthenticated Docker
  API access.'
remediation: '1. Audit the compute instance or function for malicious startup scripts
  or code.

  2. Verify the workload image against a trusted artifact registry with Binary Authorization.

  3. Apply Org Policy `compute.requireShieldedVm` for all new VM instances.

  4. Enable Security Command Center threats for anomalous compute execution events.

  5. Review service account permissions attached to the created instance or function.

  '
