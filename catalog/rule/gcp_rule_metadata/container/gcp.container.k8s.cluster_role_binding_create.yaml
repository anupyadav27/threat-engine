subcategory: container_security
severity: high
service: container
resource: k8s
requirement: Cluster Role Binding Create
description: Kubernetes ClusterRoleBinding created — grants cluster-wide permissions
  to a subject, potentially providing cluster-admin access to an attacker-controlled
  identity.
rationale: 'Adversaries add roles or permissions to service accounts or workload identities
  to maintain persistent access to container orchestration systems. Creating Kubernetes
  RoleBindings or ClusterRoleBindings for attacker-controlled identities enables cluster-wide
  command execution. Detected via: high-privilege role assignments outside CI/CD automation,
  bindings from unfamiliar IP addresses, and unexpected ServiceAccount token creation.'
remediation: '1. Immediately audit the modified IAM policy and revoke unauthorized
  role grants.

  2. Enable Cloud Asset Inventory change notifications for IAM policy updates.

  3. Apply Org Policy constraints to restrict role assignment to approved principals.

  4. Require two-person approval for Owner/Editor role grants via Cloud Identity workflows.

  5. Configure VPC Service Controls to prevent cross-project privilege escalation.

  '
