requirement: Privileged Pod Create
description: Pod created with privileged security context — container escape risk,
  allowing access to the underlying GKE node and its credentials.
rationale: 'Adversaries escape container or virtualized environment isolation to gain
  access to the underlying host, circumventing container security boundaries to access
  other containerized resources or the node''s credentials. Requires privileged container,
  hostPath mounts, or kernel exploit. Detected via: hostPath mounts to /proc or /sys,
  privileged container launches, unshare/keyctl/mount syscalls from container processes,
  and process execution outside container namespaces.'
remediation: '1. Immediately audit the modified IAM policy and revoke unauthorized
  role grants.

  2. Enable Cloud Asset Inventory change notifications for IAM policy updates.

  3. Apply Org Policy constraints to restrict role assignment to approved principals.

  4. Require two-person approval for Owner/Editor role grants via Cloud Identity workflows.

  5. Configure VPC Service Controls to prevent cross-project privilege escalation.

  '
