rule_id: gcp.storage.audit.hmac_key_created
rule_type: ciem
title: 'GCP Storage: HMAC Key Created for Service Account'
scope: storage.audit
domain: configuration_and_change_management
subcategory: configuration
severity: high
service: storage
resource: audit
requirement: Hmac Key Created
description: An HMAC key was created for a GCS service account. HMAC keys are long-lived
  credentials used for S3-compatible access and can be exported.
rationale: Adversaries abuse storage operations to achieve credential access in GCP
  environments. Detected via Cloud Admin Activity or Data Access audit logs.
remediation: '1. Immediately rotate or disable the accessed credential / secret.

  2. Review all Access Context Manager policies for unexpected secret access.

  3. Enable Secret Manager audit logs (Data Access) and alert on AccessSecretVersion.

  4. Apply CMEK to Secret Manager and restrict IAM to least-privilege consumers.

  5. Use Workload Identity Federation instead of long-lived service account keys.

  '
