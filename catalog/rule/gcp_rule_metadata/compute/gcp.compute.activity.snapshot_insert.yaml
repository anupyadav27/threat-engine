rule_id: gcp.compute.activity.snapshot_insert
rule_type: ciem
title: 'Compute: Persistent Disk Snapshot Created'
scope: compute.activity
domain: data_protection_and_privacy
subcategory: encryption
severity: high
service: compute
resource: activity
requirement: Snapshot Insert
description: Disk snapshot created — may be cross-project shared to exfiltrate disk
  contents containing sensitive data, credentials, or application secrets.
rationale: 'Adversaries create snapshots or data backups within cloud accounts to
  evade defenses and stage data for exfiltration. Snapshots can be shared with attacker-controlled
  accounts, mounted to attacker instances to bypass access restrictions on the original
  volume. Detected via: snapshot creation by unexpected or newly provisioned IAM users,
  rapid snapshot-create → cross-account share sequences, and snapshots from sensitive
  volumes without change-control approval.'
remediation: '1. Audit and revert the snapshot or data access operation.

  2. Review IAM permissions on the affected disk/volume and revoke unauthorized access.

  3. Enable disk snapshot sharing restrictions via Org Policy.

  4. Configure Security Command Center alerts for snapshot cross-project share events.

  5. Encrypt all persistent disks with CMEK to prevent use without key access.

  '
