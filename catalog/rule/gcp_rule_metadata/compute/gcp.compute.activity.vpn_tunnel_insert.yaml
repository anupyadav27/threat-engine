requirement: Vpn Tunnel Insert
description: VPN tunnel created in GCP VPC — may establish encrypted C2 channel bypassing
  perimeter monitoring.
rationale: Adversaries create VPN tunnels or Cloud Interconnect attachments in GCP
  to establish encrypted communication channels that bypass network monitoring. New
  VPN tunnel creation by non-networking team principals indicates adversary-controlled
  C2 infrastructure. Detected via compute.googleapis.com vpnTunnels.insert audit events.
remediation: '1. Audit and delete the unauthorized VPN tunnel, route, or firewall
  rule.

  2. Review VPC network topology for unexpected routes or peering connections.

  3. Enable VPC Flow Logs on all subnets and alert on anomalous traffic patterns.

  4. Apply Org Policy firewall constraints to restrict inbound SSH/RDP from 0.0.0.0/0.

  5. Use Cloud Armor security policies to protect public-facing workloads.

  '
