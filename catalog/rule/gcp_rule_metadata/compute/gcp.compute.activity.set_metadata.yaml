title: 'Compute: Instance Metadata Modified (Startup Script Injection)'
scope: compute.activity
domain: configuration_and_change_management
subcategory: configuration
severity: high
service: compute
resource: activity
requirement: Set Metadata
description: Instance metadata modified via setMetadata — adversaries inject startup
  scripts to achieve persistent code execution on VMs without SSH access.
rationale: 'Adversaries abuse cloud management services such as AWS Systems Manager
  (Run Command), Azure VM RunCommand, or Automation Runbooks to execute commands within
  virtual machines via installed agents — achieving remote code execution through
  the cloud control plane without requiring network access to the instance. Detected
  via: SSM RunCommand / Azure RunCommand API calls by unexpected users, command execution
  outside maintenance windows, and service account-initiated script execution atypical
  for admin tasks.'
remediation: '1. Audit the compute instance or function for malicious startup scripts
  or code.

  2. Verify the workload image against a trusted artifact registry with Binary Authorization.

  3. Apply Org Policy `compute.requireShieldedVm` for all new VM instances.

  4. Enable Security Command Center threats for anomalous compute execution events.

  5. Review service account permissions attached to the created instance or function.

  '
