description: New GCP Compute Engine instance created — potential cryptomining, C2
  hosting, or pivot point in attacker-controlled environment.
rationale: 'Adversaries create new instances or VMs within cloud accounts to execute
  from a clean environment that bypasses existing firewall rules and permissions tied
  to existing resources. Fresh compute resources are also used for cryptomining, C2
  hosting, or as pivot points. Detected via: VM launch by rarely-used or newly-created
  accounts, instance creation from unexpected geographic locations, and large instance
  type selection.'
remediation: '1. Audit the compute instance or function for malicious startup scripts
  or code.

  2. Verify the workload image against a trusted artifact registry with Binary Authorization.

  3. Apply Org Policy `compute.requireShieldedVm` for all new VM instances.

  4. Enable Security Command Center threats for anomalous compute execution events.

  5. Review service account permissions attached to the created instance or function.

  '
