rule_id: gcp.cloudfunctions.activity.update_function
rule_type: ciem
title: 'Cloud Functions: Function Code Updated'
scope: cloudfunctions.activity
domain: application_and_api_security
subcategory: api_security
severity: high
service: cloudfunctions
resource: activity
requirement: Update Function
description: Existing Cloud Function code or configuration updated — may inject malicious
  code into a trusted function used by production workflows.
rationale: Adversaries deploy or modify GCP Cloud Functions or Cloud Run services
  to establish serverless compute resources for malicious purposes — C2 callbacks,
  data exfiltration, or persistence. Function deployment by unexpected principals
  or with unusual environment variables containing credentials. Detected via cloudfunctions.googleapis.com
  events.
remediation: '1. Audit the compute instance or function for malicious startup scripts
  or code.

  2. Verify the workload image against a trusted artifact registry with Binary Authorization.

  3. Apply Org Policy `compute.requireShieldedVm` for all new VM instances.

  4. Enable Security Command Center threats for anomalous compute execution events.

  5. Review service account permissions attached to the created instance or function.

  '
