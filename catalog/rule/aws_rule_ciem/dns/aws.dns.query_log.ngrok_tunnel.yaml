rule_id: aws.dns.query_log.ngrok_tunnel
service: dns
provider: aws
check_type: log
severity: high
title: 'Route53: Ngrok Tunnel'
description: Ngrok tunnel domain queried — protocol tunnel for C2 or data exfiltration via ngrok.io.
rationale: Protocol tunneling encapsulates C2 traffic within legitimate protocols, bypassing firewall rules that allow standard protocols (HTTP, DNS, HTTPS).
threat_category: execution
mitre_tactics:
- command_and_control
mitre_techniques:
- T1572
risk_score: 78
resource: route53_zone
source: default
is_active: true
domain: compute_and_workload_security
action_category: execute
log_source_type: 
posture_category: workload_posture
threat_tags:
- T1572
- remote_execution
- cloud_exec
risk_indicators:
  actor_type: cloud_principal
  action_type: execution
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 3.1
  - 5.1
  cis_azure_v2:
  - 5.1
  - 6.1
  nist_800_53_r5:
  - CM-7
  - SI-3
  - AU-12
  pci_dss_v4:
  - 6.3
  - 10.2
  iso_27001_2022:
  - A.8.19
  - A.8.8
remediation: |
  1. Apply deep packet inspection at all network egress points.
  2. Monitor for unusual traffic patterns in VPC Flow Logs / NSG Flow Logs.
  3. Restrict outbound traffic to required protocols and destinations only.
references:
- https://attack.mitre.org/techniques/T1572/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: dns
    - field: operation
      op: contains
      value: ngrok
version: '1.0'
