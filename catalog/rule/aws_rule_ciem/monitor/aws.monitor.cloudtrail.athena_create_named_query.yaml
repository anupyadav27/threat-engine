rule_id: aws.monitor.cloudtrail.athena_create_named_query
service: monitor
provider: aws
check_type: log
severity: low
title: 'CloudWatch: Athena Create Named Query'
description: Athena named query created — SQL query saved for data analysis.
rationale: Cloud account enumeration identifies IAM users, service principals, and roles that can be targeted for credential attacks or privilege escalation.
threat_category: discovery
mitre_tactics:
- discovery
mitre_techniques:
- T1087.004
risk_score: 25
resource: cloudwatch_alarm
source: default
is_active: true
domain: logging_monitoring_and_alerting
action_category: create
log_source_type: 
posture_category: threat_posture
threat_tags:
- T1087.004
- T1087
- audit_log
- monitoring
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: audit_log
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks: {}
remediation: |
  1. Apply IAM permission restrictions on ListUsers/ListRoles/ListServicePrincipals.
  2. Alert on unexpected enumeration API call patterns.
  3. Use AWS Organizations SCPs / Azure Policy to limit who can enumerate identities.
references:
- https://attack.mitre.org/techniques/T1087/004/
- https://docs.aws.amazon.com/IAM/latest/UserGuide/reference_policies_examples_iam_limited-identities.html
check_config:
  conditions:
    all:
    - field: service
      op: equals
      value: athena
    - field: operation
      op: equals
      value: CreateNamedQuery
version: '1.0'
