rule_id: aws.ec2.activity_log.import_image
service: compute
provider: aws
check_type: log
severity: medium
title: Detect import of VM images or execution of diagnostic commands that could introduce
  untested code into EC2 instances.
description: Detects import of VM images or diagnostic commands.
rationale: Monitoring this activity is essential for detecting adversary persistence
  against AWS resources. Unauthorized or unexpected API calls may indicate account
  compromise, privilege escalation, or an active attack chain.
threat_category: persistence
mitre_tactics:
- persistence
mitre_techniques:
- T1525
risk_score: 73
resource: cloud_compute_instance
source: csv_generated
is_active: true
domain: logging_monitoring_and_alerting
action_category: audit_activity
log_source_type: cloudtrail
posture_category: threat_posture
threat_tags:
- T1525
- persistence
- ciem_detection
risk_indicators:
  actor_type: cloud_principal
  action_type: read
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  nist_800_171:
  - 3.4.7
remediation: '1. Remove the unauthorized resource (user, key, image, account) immediately.

  2. Audit all resources created by the same principal.

  3. Restrict resource creation to approved provisioning pipelines.

  4. Add detection for resource creation outside of business hours or from unusual
  IPs.

  5. Review SCPs and permission boundaries to limit persistence mechanisms.'
references:
- https://attack.mitre.org/techniques/T1525/
- https://docs.aws.amazon.com/IAM/latest/UserGuide/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: cloudtrail
    - field: service
      op: equals
      value: ec2
    - field: operation
      op: in
      value:
      - ImportImage
      - RunInstances
  type: log
  version: '1.0'
