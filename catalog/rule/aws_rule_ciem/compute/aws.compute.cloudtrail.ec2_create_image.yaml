rule_id: aws.compute.cloudtrail.ec2_create_image
service: compute
provider: aws
check_type: log
severity: medium
title: 'Compute: EC2 Create Image'
description: EC2 AMI created from running instance — snapshot of instance state captured.
rationale: 'Adversaries create snapshots or data backups within cloud accounts to evade defenses and stage data for exfiltration. Snapshots can be shared with attacker-controlled accounts, mounted to attacker instances to bypass access restrictions on the original volume. Detected via: snapshot creation by unexpected or newly provisioned IAM users, rapid snapshot-create → cross-account share sequences, and snapshots from sensitive volumes without change-control approval.'
threat_category: persistence
mitre_tactics:
- persistence
mitre_techniques:
- T1578.001
risk_score: 60
resource: ec2_instance
source: default
is_active: true
domain: compute_and_workload_security
action_category: create
posture_category: iam_posture
threat_tags:
- T1578.001
- T1578
- persistence
- backdoor
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: compute_instance
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 1.1
  - 1.4
  - 1.16
  cis_azure_v2:
  - 1.1
  - 2.1
  - 2.9
  nist_800_53_r5:
  - AC-2
  - AC-6
  - IA-2
  - SC-7
  pci_dss_v4:
  - 7.1
  - 8.2
  - 10.2
  iso_27001_2022:
  - A.8.2
  - A.9.2
  - A.5.18
detection_events:
- 'ec2:CreateSnapshot'
- 'ec2:ModifySnapshotAttribute (cross-account share)'
- Microsoft.Compute/snapshots/write
- Microsoft.Compute/disks/beginGetAccess/action
remediation: |
  1. Enforce golden image policies requiring only approved base images.
  2. Restrict CreateImage / image write permissions to CI/CD pipeline roles.
  3. Enable CSPM image scanning via Defender for Servers / Amazon Inspector.
references:
- https://attack.mitre.org/techniques/T1578/001/
check_config:
  conditions:
    all:
    - field: service
      op: equals
      value: ec2
    - field: operation
      op: equals
      value: CreateImage
version: '1.0'
