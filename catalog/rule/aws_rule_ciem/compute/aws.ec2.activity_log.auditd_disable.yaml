rule_id: aws.ec2.activity_log.auditd_disable
service: compute
provider: aws
check_type: log
severity: high
title: Detect EC2 auditd service stop/deletion and SSM commands that disable or tamper
  with Linux audit logging
description: Detects disabling of Linux audit logging service.
rationale: Monitoring this activity is essential for detecting adversary defense evasion
  against AWS resources. Unauthorized or unexpected API calls may indicate account
  compromise, privilege escalation, or an active attack chain.
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1562.001
risk_score: 80
resource: cloud_compute_instance
source: csv_generated
is_active: true
domain: logging_monitoring_and_alerting
action_category: delete
log_source_type: cloudtrail
posture_category: threat_posture
threat_tags:
- T1562.001
- T1562
- defense_evasion
- ciem_detection
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: high
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks: {}
remediation: '1. Immediately investigate the principal that performed this action
  — treat as potentially compromised.

  2. Restore any disabled/deleted security controls (logging, agents, scanning).

  3. Review the full session context for lateral movement or data exfiltration following
  this action.

  4. Restrict the ability to disable security tools to break-glass roles with MFA
  enforcement.

  5. Add SCPs/Organization Policies to prevent non-authorized disablement of security
  controls.'
references:
- https://attack.mitre.org/techniques/T1562.001/
- https://docs.aws.amazon.com/IAM/latest/UserGuide/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: cloudtrail
    - field: service
      op: equals
      value: ec2
    - field: operation
      op: in
      value:
      - SendCommand
      - StartSession
  type: log
  version: '1.0'
