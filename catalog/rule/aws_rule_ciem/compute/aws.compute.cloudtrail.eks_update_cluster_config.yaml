rule_id: aws.compute.cloudtrail.eks_update_cluster_config
service: compute
provider: aws
check_type: log
severity: medium
title: 'Compute: EKS Update Cluster Config'
description: EKS cluster configuration updated — cluster settings changed.
rationale: Moving cloud resources between accounts can transfer sensitive data to attacker-controlled accounts while appearing as a legitimate cloud operation.
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1578.004
risk_score: 55
resource: ec2_instance
source: default
is_active: true
domain: container_and_kubernetes_security
action_category: modify
log_source_type: 
posture_category: security_posture
threat_tags:
- T1578.004
- T1578
- defense_evasion
- log_tampering
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: compute_instance
  blast_radius: resource_group
  stealth_risk: critical
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 3.1
  - 3.2
  - 3.3
  - 3.4
  cis_azure_v2:
  - 5.1
  - 5.2
  - 5.3
  nist_800_53_r5:
  - AU-2
  - AU-6
  - AU-12
  - SI-4
  pci_dss_v4:
  - 10.1
  - 10.2
  - 10.3
  iso_27001_2022:
  - A.8.15
  - A.8.16
  - A.5.28
remediation: |
  1. Apply SCPs / Azure Policy to prevent cross-account resource moves.
  2. Alert on resource moves to non-standard or external accounts.
  3. Require explicit management approval for cross-account resource transfers.
references:
- https://attack.mitre.org/techniques/T1578/004/
check_config:
  conditions:
    all:
    - field: service
      op: equals
      value: eks
    - field: operation
      op: equals
      value: UpdateClusterConfig
version: '1.0'
