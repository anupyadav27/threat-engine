rule_id: aws.alb.alb_log.health_check_failure
service: alb
provider: aws
check_type: log
severity: low
title: 'ALB: Health Check Failure'
description: ALB health check failure — backend target unhealthy or unreachable.
rationale: Vulnerability scanning of cloud endpoints identifies exploitable weaknesses that can be used for initial access or follow-on exploitation.
threat_category: discovery
mitre_tactics:
- discovery
mitre_techniques:
- T1595.002
risk_score: 20
resource: elb_load_balancer
source: default
is_active: true
domain: network_security_and_connectivity
action_category: create
log_source_type: 
posture_category: threat_posture
threat_tags:
- T1595.002
- T1595
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks: {}
remediation: |
  1. Apply security patches promptly for all cloud-exposed services.
  2. Enable Defender for Cloud / Amazon Inspector for vulnerability detection.
  3. Alert on unusual port scanning activity in network flow logs.
references:
- https://attack.mitre.org/techniques/T1595/002/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: alb
    - field: resource_uid
      op: contains
      value: /health
    - field: outcome
      op: equals
      value: failure
version: '1.0'
