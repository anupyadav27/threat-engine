rule_id: aws.datasec.correlation.cloudtrail.kms_key_grant
service: datasec
provider: aws
check_type: log
severity: high
title: 'Data Security: KMS Key Grant'
description: KMS key grant created — additional principal granted encryption/decryption permissions.
rationale: Adding credentials to accounts enables persistence and lateral movement using existing trusted identities, potentially bypassing MFA and conditional access policies.
threat_category: privilege_escalation
mitre_tactics:
- privilege_escalation
mitre_techniques:
- T1098.001
risk_score: 72
resource: s3_bucket
source: ciem_rule_generator
is_active: true
domain: data_protection_and_privacy
action_category: audit_activity
log_source_type: cloudtrail
posture_category: iam_posture
threat_tags:
- T1098.001
- T1098
- cloud_iam
- privilege_escalation
- data_security
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: data_resource
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: true
  modules:
  - secrets_management
  categories:
  - sensitive_data_access
  priority: high
  impact:
    pci: PCI DSS Requirement 3.4 — Sensitive authentication data must be protected
    gdpr: GDPR Article 32 — Appropriate technical measures to protect personal data
    hipaa: §164.312(e)(2)(ii) — Encryption of ePHI in transit and at rest
  sensitive_data_context: |
  Unauthorized privilege escalation on datasec resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks:
  cis_aws_v3:
  - 1.1
  - 1.16
  - 1.17
  cis_azure_v2:
  - 1.1
  - 2.1
  - 3.1
  nist_800_53_r5:
  - AC-2
  - AC-3
  - AC-6
  - IA-2
  pci_dss_v4:
  - 7.1
  - 7.2
  - 8.2
  iso_27001_2022:
  - A.5.18
  - A.8.2
  - A.8.3
remediation: |
  1. Revoke the newly added credential immediately.
  2. Review all credentials associated with the account.
  3. Investigate the actor's session for additional malicious activity.
  4. Enforce MFA and conditional access policies for all credential operations.
  5. Use Privileged Identity Management (PIM) for just-in-time access.
references:
- https://attack.mitre.org/techniques/T1098/001/
- https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_access-keys.html
check_config:
  conditions:
    all:
    - field: service
      op: equals
      value: kms
    - field: operation
      op: in
      value:
      - CreateGrant
      - PutKeyPolicy
  for_each: log_events
  log_source_type: cloudtrail
  type: log
version: '1.0'
