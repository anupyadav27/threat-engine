rule_id: aws.datasec.correlation.cloudtrail.glue_job_started
service: datasec
provider: aws
check_type: log
severity: medium
title: 'Data Security: Glue Job Started'
description: AWS Glue ETL job started — data processing workload executed.
rationale: JavaScript-based execution via cloud functions or Lambda can run malicious code without requiring server-level access or traditional deploy pipelines.
threat_category: execution
mitre_tactics:
- execution
mitre_techniques:
- T1059.007
risk_score: 50
resource: s3_bucket
source: ciem_rule_generator
is_active: true
domain: data_protection_and_privacy
action_category: audit_activity
log_source_type: cloudtrail
posture_category: workload_posture
threat_tags:
- T1059.007
- T1059
- remote_execution
- cloud_exec
- data_security
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: data_resource
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: true
  modules:
  - data_access_governance
  categories:
  - sensitive_data_access
  priority: medium
  impact:
    pci: PCI DSS Requirement 12.3 — Implement security awareness program and protect systems
    gdpr: GDPR Article 32 — Appropriate technical and organizational measures for data security
    hipaa: §164.306(a) — Ensure confidentiality, integrity, and availability of ePHI
  sensitive_data_context: |
  Unauthorized execution on datasec resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks:
  cis_aws_v3:
  - 3.1
  - 5.1
  cis_azure_v2:
  - 5.1
  - 6.1
  nist_800_53_r5:
  - CM-7
  - SI-3
  - AU-12
  pci_dss_v4:
  - 6.3
  - 10.2
  iso_27001_2022:
  - A.8.19
  - A.8.8
remediation: |
  1. Restrict Lambda/Function App deployment permissions to authorized principals.
  2. Enable static analysis and code signing for function deployments.
  3. Monitor function invocation patterns for behavioral anomalies.
references:
- https://attack.mitre.org/techniques/T1059/007/
check_config:
  conditions:
    all:
    - field: service
      op: equals
      value: glue
    - field: operation
      op: in
      value:
      - StartJobRun
      - StartCrawler
  for_each: log_events
  log_source_type: cloudtrail
  type: log
version: '1.0'
