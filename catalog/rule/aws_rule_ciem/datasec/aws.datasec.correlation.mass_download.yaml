rule_id: aws.datasec.correlation.mass_download
service: datasec
provider: aws
check_type: log_correlation
severity: high
title: 'Correlation: Mass Download'
description: Mass download of data detected — large-scale bulk data access in progress.
rationale: 'Adversaries access data from cloud object storage (S3, Azure Blob, GCS) which may be misconfigured with overly permissive policies exposing PII, medical records, financial data, or credentials. Bulk download followed by external transfer indicates active data theft. Detected via: unusual object access patterns from new IAM users or roles, OAuth token grants to external apps preceding high-volume downloads, and GetObject events from anomalous IPs or user agents.'
threat_category: data_exfiltration
mitre_tactics:
- collection
- exfiltration
mitre_techniques:
- T1530
risk_score: 78
resource: s3_bucket
source: ciem_rule_generator
is_active: true
domain: data_protection_and_privacy
action_category: exfiltration
posture_category: data_security_posture
threat_tags:
- T1530
- data_exfiltration
- data_loss
- data_security
risk_indicators:
  actor_type: cloud_principal
  action_type: data_transfer
  target_type: data_resource
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: true
  modules:
  - data_loss_prevention
  categories:
  - data_exfiltration
  - unauthorized_access
  priority: high
  impact:
    pci: PCI DSS Requirement 12.3 — Implement security awareness program and protect systems
    gdpr: GDPR Article 32 — Appropriate technical and organizational measures for data security
    hipaa: §164.306(a) — Ensure confidentiality, integrity, and availability of ePHI
compliance_frameworks:
  cis_aws_v3:
  - 2.7
  - 3.7
  cis_azure_v2:
  - 3.1
  - 5.2
  nist_800_53_r5:
  - SC-7
  - SC-28
  - AC-4
  pci_dss_v4:
  - 3.2
  - 4.1
  - 10.2
  iso_27001_2022:
  - A.8.12
  - A.8.20
  - A.5.14
detection_events:
- 's3:GetObject (high volume from single principal)'
- Microsoft.Storage/storageAccounts/blobServices/containers/blobs/read
- ListObjects followed by bulk GetObject
- Storage access from external/anonymous IP
remediation: |
  1. Enable server-side access logging for all storage buckets and containers.
  2. Alert on high-volume GetObject/BlobRead operations by single principals.
  3. Apply bucket policies to restrict GetObject to authorized principals only.
  4. Enable Macie / Defender for Storage for sensitive data detection and alerting.
references:
- https://attack.mitre.org/techniques/T1530/
- https://docs.aws.amazon.com/AmazonS3/latest/userguide/logging-with-S3.html
- https://learn.microsoft.com/en-us/azure/storage/common/storage-analytics-logging
check_config:
  for_each: log_events
  match_by: resource.uid
  min_events: 50
  sequence:
  - min_count: 50
    rule_id: aws.datasec.correlation.cloudtrail.s3_get_object
  time_window_minutes: 30
  type: correlation
version: '1.0'
