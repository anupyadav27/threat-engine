rule_id: aws.lambda.function_log.credential_error
service: lambda
provider: aws
check_type: log
severity: medium
title: 'Lambda: Credential Error'
description: Lambda credential error — function unable to authenticate; possible misconfiguration or stolen role.
rationale: Cloud instance metadata endpoints provide temporary credentials; accessing them from an SSRF vulnerability or compromised workload yields credentials to the cloud account.
threat_category: credential_access
mitre_tactics:
- credential_access
mitre_techniques:
- T1552.005
risk_score: 55
resource: lambda_function
source: default
is_active: true
domain: compute_and_workload_security
action_category: execute
log_source_type: 
posture_category: iam_posture
threat_tags:
- T1552.005
- T1552
- credential_access
- secret_exposure
risk_indicators:
  actor_type: cloud_principal
  action_type: execution
  target_type: serverless_function
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: true
  modules:
  - data_access_governance
  categories:
  - secrets_exposure
  - credential_theft
  priority: medium
  impact:
    pci: PCI DSS Requirement 12.3 — Implement security awareness program and protect systems
    gdpr: GDPR Article 32 — Appropriate technical and organizational measures for data security
    hipaa: §164.306(a) — Ensure confidentiality, integrity, and availability of ePHI
  sensitive_data_context: |
  Unauthorized credential access on lambda resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks:
  cis_aws_v3:
  - 1.14
  - 1.19
  - 2.1
  cis_azure_v2:
  - 1.3
  - 1.4
  - 8.1
  nist_800_53_r5:
  - IA-5
  - IA-8
  - SC-28
  pci_dss_v4:
  - 8.2
  - 8.3
  - 8.6
  iso_27001_2022:
  - A.8.5
  - A.9.4
  - A.9.2
remediation: |
  1. Enforce IMDSv2 (AWS) / restrict IMDS access (Azure) to prevent credential theft.
  2. Alert on metadata service calls from unexpected sources.
  3. Apply network-level restrictions to limit IMDS reachability.
  4. Investigate the source of any metadata endpoint request.
references:
- https://attack.mitre.org/techniques/T1552/005/
- https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/configuring-instance-metadata-service.html
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: lambda
    - field: operation
      op: equals
      value: error
    - field: error_code
      op: contains
      value: credential
version: '1.0'
