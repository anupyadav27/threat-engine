rule_id: aws.lambda.cloudtrail.execution_role_changed
service: lambda
provider: aws
check_type: log
severity: high
title: 'Lambda: Execution Role Changed'
description: Lambda execution role changed — function permissions modified.
rationale: Adding credentials to accounts enables persistence and lateral movement using existing trusted identities, potentially bypassing MFA and conditional access policies.
threat_category: privilege_escalation
mitre_tactics:
- privilege_escalation
mitre_techniques:
- T1098.001
risk_score: 75
resource: lambda_function
source: ciem_rule_generator
is_active: true
domain: compute_and_workload_security
action_category: execute
log_source_type: cloudtrail
posture_category: iam_posture
threat_tags:
- T1098.001
- T1098
- cloud_iam
- privilege_escalation
risk_indicators:
  actor_type: cloud_principal
  action_type: execution
  target_type: serverless_function
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 1.1
  - 1.16
  - 1.17
  cis_azure_v2:
  - 1.1
  - 2.1
  - 3.1
  nist_800_53_r5:
  - AC-2
  - AC-3
  - AC-6
  - IA-2
  pci_dss_v4:
  - 7.1
  - 7.2
  - 8.2
  iso_27001_2022:
  - A.5.18
  - A.8.2
  - A.8.3
remediation: |
  1. Revoke the newly added credential immediately.
  2. Review all credentials associated with the account.
  3. Investigate the actor's session for additional malicious activity.
  4. Enforce MFA and conditional access policies for all credential operations.
  5. Use Privileged Identity Management (PIM) for just-in-time access.
references:
- https://attack.mitre.org/techniques/T1098/001/
- https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_access-keys.html
check_config:
  conditions:
    all:
    - field: operation
      op: equals
      value: UpdateFunctionConfiguration20150331v2
    - field: resource_uid
      op: contains
      value: Role
  for_each: log_events
  log_source_type: cloudtrail
  type: log
version: '1.0'
