rule_id: aws.lambda.function_log.connection_refused
service: lambda
provider: aws
check_type: log
severity: low
title: 'Lambda: Connection Refused'
description: Lambda connection refused — function could not connect to external endpoint.
rationale: 'Network service scanning maps the cloud environment''s attack surface; early detection of reconnaissance activity can preempt follow-on attacks.'
threat_category: discovery
mitre_tactics:
- discovery
mitre_techniques:
- T1046
risk_score: 20
resource: lambda_function
source: default
is_active: true
domain: compute_and_workload_security
action_category: execute
log_source_type: 
posture_category: threat_posture
threat_tags:
- T1046
risk_indicators:
  actor_type: cloud_principal
  action_type: execution
  target_type: serverless_function
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks: {}
remediation: |
  1. Investigate the source IP and principal performing the scan.
  2. Apply NSG/security group rules to limit service scan visibility.
  3. Enable VPC Flow Logs / NSG Flow Logs to detect scanning patterns.
  4. Block or throttle API calls from suspicious scan sources.
references:
- https://attack.mitre.org/techniques/T1046/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: lambda
    - field: operation
      op: equals
      value: error
    - field: error_code
      op: contains
      value: ECONNREFUSED
version: '1.0'
