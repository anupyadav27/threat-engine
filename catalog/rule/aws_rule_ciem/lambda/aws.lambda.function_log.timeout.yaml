rule_id: aws.lambda.function_log.timeout
service: lambda
provider: aws
check_type: log
severity: low
title: 'Lambda: Timeout'
description: Connection timeout at load balancer — service unavailability or DoS indicator.
rationale: Vulnerability scanning of cloud endpoints identifies exploitable weaknesses that can be used for initial access or follow-on exploitation.
threat_category: discovery
mitre_tactics:
- discovery
mitre_techniques:
- T1595.002
risk_score: 20
resource: lambda_function
source: default
is_active: true
domain: compute_and_workload_security
action_category: execute
log_source_type: 
posture_category: threat_posture
threat_tags:
- T1595.002
- T1595
risk_indicators:
  actor_type: cloud_principal
  action_type: execution
  target_type: serverless_function
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks: {}
remediation: |
  1. Apply security patches promptly for all cloud-exposed services.
  2. Enable Defender for Cloud / Amazon Inspector for vulnerability detection.
  3. Alert on unusual port scanning activity in network flow logs.
references:
- https://attack.mitre.org/techniques/T1595/002/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: lambda
    - field: operation
      op: equals
      value: error
    - field: error_code
      op: contains
      value: timeout
version: '1.0'
