rule_id: aws.rds.audit_log.failed_login
service: rds
provider: aws
check_type: log
severity: medium
title: 'RDS: Failed Login'
description: RDS login failure — authentication attempt failed.
rationale: Password guessing attacks can compromise accounts with weak passwords; detection enables account lockout before successful compromise occurs.
threat_category: initial_access
mitre_tactics:
- credential_access
mitre_techniques:
- T1110.001
risk_score: 50
resource: rds_instance
source: default
is_active: true
domain: data_protection_and_privacy
action_category: create
log_source_type: 
posture_category: threat_posture
threat_tags:
- T1110.001
- T1110
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: database
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: true
  modules:
  - database_security
  categories:
  - sensitive_data_access
  priority: medium
  impact:
    pci: PCI DSS Requirement 7 — Restrict access to cardholder data by business need
    gdpr: GDPR Article 25 — Data protection by design and by default
    hipaa: §164.312(a)(1) — Access control for ePHI data systems
  sensitive_data_context: |
  Unauthorized initial access on rds resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks:
  cis_aws_v3:
  - 1.14
  - 2.1
  cis_azure_v2:
  - 1.2
  - 2.1
  nist_800_53_r5:
  - AC-17
  - IA-2
  - SI-3
  pci_dss_v4:
  - 8.3
  - 11.5
  iso_27001_2022:
  - A.8.5
  - A.9.4
remediation: |
  1. Enforce account lockout policies after consecutive failed attempts.
  2. Require strong password complexity and minimum length.
  3. Enable MFA to prevent successful login even if password is guessed.
  4. Block sign-ins from high-risk IP ranges using Conditional Access policies.
references:
- https://attack.mitre.org/techniques/T1110/001/
- https://learn.microsoft.com/en-us/azure/active-directory/authentication/tutorial-enable-azure-mfa
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: rds_audit
    - field: operation
      op: equals
      value: FAILED_CONNECT
version: '1.0'
