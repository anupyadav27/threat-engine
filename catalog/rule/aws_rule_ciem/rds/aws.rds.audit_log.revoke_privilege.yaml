rule_id: aws.rds.audit_log.revoke_privilege
service: rds
provider: aws
check_type: log
severity: medium
title: 'RDS: Revoke Privilege'
description: Database privilege revoked.
rationale: Account access removal (deleting users, removing MFA) blocks legitimate users from accessing resources and can be used to seize control of cloud accounts.
threat_category: privilege_escalation
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1531
risk_score: 40
resource: rds_instance
source: default
is_active: true
domain: data_protection_and_privacy
action_category: privilege_escalation
log_source_type: 
posture_category: iam_posture
threat_tags:
- T1531
- cloud_iam
- privilege_escalation
risk_indicators:
  actor_type: cloud_principal
  action_type: privilege_change
  target_type: database
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: true
  modules:
  - database_security
  categories:
  - sensitive_data_access
  priority: medium
  impact:
    pci: PCI DSS Requirement 7 — Restrict access to cardholder data by business need
    gdpr: GDPR Article 25 — Data protection by design and by default
    hipaa: §164.312(a)(1) — Access control for ePHI data systems
  sensitive_data_context: |
  Unauthorized privilege escalation on rds resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks:
  cis_aws_v3:
  - 1.1
  - 1.16
  - 1.17
  cis_azure_v2:
  - 1.1
  - 2.1
  - 3.1
  nist_800_53_r5:
  - AC-2
  - AC-3
  - AC-6
  - IA-2
  pci_dss_v4:
  - 7.1
  - 7.2
  - 8.2
  iso_27001_2022:
  - A.5.18
  - A.8.2
  - A.8.3
remediation: |
  1. Restore removed accounts or access immediately from a break-glass account.
  2. Review and audit all actions taken by the responsible actor.
  3. Implement role-based approvals for account deletion and access revocation.
  4. Maintain break-glass emergency access accounts with separate credential paths.
references:
- https://attack.mitre.org/techniques/T1531/
- https://learn.microsoft.com/en-us/azure/active-directory/roles/security-emergency-access
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: rds_audit
    - field: operation
      op: equals
      value: REVOKE
version: '1.0'
