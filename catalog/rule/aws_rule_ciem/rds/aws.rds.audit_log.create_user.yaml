rule_id: aws.rds.audit_log.create_user
service: rds
provider: aws
check_type: log
severity: high
title: 'RDS: Create User'
description: New IAM user created — attacker may be establishing persistent access.
rationale: 'Adversaries create cloud accounts (IAM users, Entra ID users, service principals) to maintain access to victim systems without deploying persistent remote access tools. Such accounts establish secondary credentialed access that survives password resets of the initially compromised account. Detected via: IAM CreateUser + AttachUserPolicy from non-standard sources, Add User events from unusual IPs, and SaaS account provisioning outside business hours.'
threat_category: identity_manipulation
mitre_tactics:
- persistence
- initial_access
mitre_techniques:
- T1136.003
- T1078.004
risk_score: 75
resource: rds_instance
source: default
is_active: true
domain: data_protection_and_privacy
action_category: create
posture_category: iam_posture
threat_tags:
- T1136.003
- T1078.004
- T1078
- T1136
- cloud_iam
- identity_manipulation
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: database
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: true
  modules:
  - database_security
  categories:
  - sensitive_data_access
  priority: high
  impact:
    pci: PCI DSS Requirement 7 — Restrict access to cardholder data by business need
    gdpr: GDPR Article 25 — Data protection by design and by default
    hipaa: §164.312(a)(1) — Access control for ePHI data systems
compliance_frameworks:
  cis_aws_v3:
  - 1.1
  - 1.16
  - 1.22
  cis_azure_v2:
  - 1.1
  - 2.1
  nist_800_53_r5:
  - AC-2
  - AC-3
  - IA-2
  pci_dss_v4:
  - 7.1
  - 8.2
  iso_27001_2022:
  - A.5.18
  - A.8.2
detection_events:
- 'iam:CreateUser'
- microsoft.directory/users/create
- 'organizations:CreateAccount'
- New-MsolUser (PowerShell)
remediation: |
  1. Disable and investigate the new cloud account immediately.
  2. Require MFA and business justification for all cloud account creation.
  3. Integrate account provisioning with HR/ITSM systems for lifecycle control.
  4. Enable alerts for account creation across all cloud tenants and sub-accounts.
references:
- https://attack.mitre.org/techniques/T1136/003/
- https://docs.aws.amazon.com/organizations/latest/userguide/orgs_manage_accounts.html
- https://learn.microsoft.com/en-us/azure/active-directory/fundamentals/add-users-azure-active-directory
- https://attack.mitre.org/techniques/T1078/004/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: rds_audit
    - field: operation
      op: equals
      value: CREATE_USER
version: '1.0'
