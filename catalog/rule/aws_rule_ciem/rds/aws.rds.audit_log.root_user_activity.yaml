rule_id: aws.rds.audit_log.root_user_activity
service: rds
provider: aws
check_type: log
severity: high
title: 'RDS: Root User Activity'
description: RDS root/master user activity detected — highest-privilege database account used.
rationale: 'Cloud account compromise enables access to all resources within the account''s permission scope. Attackers leverage valid credentials to avoid detection and pivot across cloud services.'
threat_category: credential_access
mitre_tactics:
- credential_access
mitre_techniques:
- T1078.004
risk_score: 80
resource: rds_instance
source: default
is_active: true
domain: data_protection_and_privacy
action_category: read
log_source_type: 
posture_category: iam_posture
threat_tags:
- T1078.004
- T1078
- credential_access
- secret_exposure
risk_indicators:
  actor_type: cloud_principal
  action_type: read
  target_type: database
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: true
  modules:
  - database_security
  categories:
  - secrets_exposure
  - credential_theft
  priority: high
  impact:
    pci: PCI DSS Requirement 7 — Restrict access to cardholder data by business need
    gdpr: GDPR Article 25 — Data protection by design and by default
    hipaa: §164.312(a)(1) — Access control for ePHI data systems
  sensitive_data_context: |
  Unauthorized credential access on rds resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks:
  cis_aws_v3:
  - 1.14
  - 1.19
  - 2.1
  cis_azure_v2:
  - 1.3
  - 1.4
  - 8.1
  nist_800_53_r5:
  - IA-5
  - IA-8
  - SC-28
  pci_dss_v4:
  - 8.2
  - 8.3
  - 8.6
  iso_27001_2022:
  - A.8.5
  - A.9.4
  - A.9.2
remediation: |
  1. Immediately suspend the compromised account and revoke active sessions.
  2. Reset credentials and enforce MFA enrollment.
  3. Review all API calls and resource accesses made by the account.
  4. Investigate sign-in logs for source IP and geolocation anomalies.
  5. Enable Microsoft Entra ID Protection / AWS GuardDuty credential anomaly alerts.
references:
- https://attack.mitre.org/techniques/T1078/004/
- https://docs.aws.amazon.com/IAM/latest/UserGuide/best-practices.html
- https://learn.microsoft.com/en-us/azure/active-directory/identity-protection/overview-identity-protection
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: rds_audit
    - field: actor_principal
      op: equals
      value: root
version: '1.0'
