rule_id: aws.container.cloudtrail.eks_cluster_public_endpoint
service: container
provider: aws
check_type: log
severity: high
title: 'Container: EKS Cluster Public Endpoint'
description: EKS cluster API server made publicly accessible — Kubernetes control plane exposed to internet.
rationale: Public-facing application exploitation can provide initial foothold in cloud environments; early detection limits attacker dwell time significantly.
threat_category: initial_access
mitre_tactics:
- initial_access
mitre_techniques:
- T1190
risk_score: 78
resource: eks_cluster
source: ciem_rule_generator
is_active: true
domain: container_and_kubernetes_security
action_category: audit_activity
log_source_type: cloudtrail
posture_category: threat_posture
threat_tags:
- T1190
- kubernetes
- container_security
risk_indicators:
  actor_type: service_account_or_workload
  action_type: write
  target_type: kubernetes_workload
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 1.14
  - 2.1
  cis_azure_v2:
  - 1.2
  - 2.1
  nist_800_53_r5:
  - AC-17
  - IA-2
  - SI-3
  pci_dss_v4:
  - 8.3
  - 11.5
  iso_27001_2022:
  - A.8.5
  - A.9.4
remediation: |
  1. Apply WAF rules to detect and block exploitation attempts.
  2. Enable vulnerability scanning for all public-facing services.
  3. Apply security patches promptly for all known CVEs.
references:
- https://attack.mitre.org/techniques/T1190/
check_config:
  conditions:
    all:
    - field: operation
      op: equals
      value: UpdateClusterConfig
    - field: resource_uid
      op: contains
      value: publicAccess
  for_each: log_events
  log_source_type: cloudtrail
  type: log
version: '1.0'
