rule_id: aws.container.cloudtrail.ecr_image_push
service: container
provider: aws
check_type: log
severity: medium
title: 'Container: Ecr Image Push'
description: Container image pushed to ECR — new image version deployed to registry.
rationale: Implanting malicious code in cloud images or container registries establishes persistent backdoors in every instance launched from the tampered image.
threat_category: persistence
mitre_tactics:
- persistence
mitre_techniques:
- T1525
risk_score: 55
resource: eks_cluster
source: ciem_rule_generator
is_active: true
domain: container_and_kubernetes_security
action_category: audit_activity
log_source_type: cloudtrail
posture_category: iam_posture
threat_tags:
- T1525
- persistence
- backdoor
- kubernetes
- container_security
risk_indicators:
  actor_type: service_account_or_workload
  action_type: write
  target_type: kubernetes_workload
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 1.1
  - 1.4
  - 1.16
  cis_azure_v2:
  - 1.1
  - 2.1
  - 2.9
  nist_800_53_r5:
  - AC-2
  - AC-6
  - IA-2
  - SC-7
  pci_dss_v4:
  - 7.1
  - 8.2
  - 10.2
  iso_27001_2022:
  - A.8.2
  - A.9.2
  - A.5.18
remediation: |
  1. Enforce image signing and provenance verification (AWS Signer / ACR content trust).
  2. Scan all images with vulnerability and malware scanners before production use.
  3. Restrict push permissions to container registries to authorized CI/CD pipelines only.
references:
- https://attack.mitre.org/techniques/T1525/
- https://docs.aws.amazon.com/AmazonECR/latest/userguide/image-scanning.html
- https://learn.microsoft.com/en-us/azure/container-registry/container-registry-intro
check_config:
  conditions:
    field: operation
    op: equals
    value: PutImage
  for_each: log_events
  log_source_type: cloudtrail
  type: log
version: '1.0'
