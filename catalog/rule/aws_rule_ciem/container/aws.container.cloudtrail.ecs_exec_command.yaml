rule_id: aws.container.cloudtrail.ecs_exec_command
service: container
provider: aws
check_type: log
severity: high
title: 'Container: ECS Exec Command'
description: ECS Exec command executed — direct shell access via container CLI/API obtained.
rationale: Cloud API execution via CLIs (AWS CLI, Azure CLI, kubectl) can automate malicious operations at scale within cloud environments without requiring UI access.
threat_category: execution
mitre_tactics:
- execution
mitre_techniques:
- T1059.013
risk_score: 80
resource: eks_cluster
source: ciem_rule_generator
is_active: true
domain: container_and_kubernetes_security
action_category: audit_activity
log_source_type: cloudtrail
posture_category: workload_posture
threat_tags:
- T1059.013
- T1059
- remote_execution
- cloud_exec
- kubernetes
- container_security
risk_indicators:
  actor_type: service_account_or_workload
  action_type: write
  target_type: kubernetes_workload
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 3.1
  - 5.1
  cis_azure_v2:
  - 5.1
  - 6.1
  nist_800_53_r5:
  - CM-7
  - SI-3
  - AU-12
  pci_dss_v4:
  - 6.3
  - 10.2
  iso_27001_2022:
  - A.8.19
  - A.8.8
remediation: |
  1. Enable CloudTrail / Activity Log monitoring for all API calls.
  2. Apply RBAC restrictions to limit the scope of all API call permissions.
  3. Alert on anomalous API usage patterns (unusual regions, APIs, or timing).
references:
- https://attack.mitre.org/techniques/T1059/013/
- https://docs.aws.amazon.com/awscloudtrail/latest/userguide/cloudtrail-concepts.html
check_config:
  conditions:
    all:
    - field: operation
      op: equals
      value: UpdateService
    - field: resource_uid
      op: contains
      value: executeCommand
  for_each: log_events
  log_source_type: cloudtrail
  type: log
version: '1.0'
