rule_id: aws.guardduty.finding.policy_iam
service: guardduty
provider: aws
check_type: log
severity: high
title: 'GuardDuty: Policy IAM'
description: GuardDuty IAM policy finding — anomalous or dangerous permission change.
rationale: Adding credentials to accounts enables persistence and lateral movement using existing trusted identities, potentially bypassing MFA and conditional access policies.
threat_category: privilege_escalation
mitre_tactics:
- privilege_escalation
mitre_techniques:
- T1098.001
risk_score: 75
resource: guardduty_finding
source: default
is_active: true
domain: identity_and_access_management
action_category: privilege_escalation
log_source_type: 
posture_category: iam_posture
threat_tags:
- T1098.001
- T1098
- cloud_iam
- privilege_escalation
- threat_detection
- guardduty
risk_indicators:
  actor_type: external_threat_actor
  action_type: privilege_change
  target_type: cloud_workload
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - policy_analysis
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 1.1
  - 1.16
  - 1.17
  cis_azure_v2:
  - 1.1
  - 2.1
  - 3.1
  nist_800_53_r5:
  - AC-2
  - AC-3
  - AC-6
  - IA-2
  pci_dss_v4:
  - 7.1
  - 7.2
  - 8.2
  iso_27001_2022:
  - A.5.18
  - A.8.2
  - A.8.3
remediation: |
  1. Revoke the newly added credential immediately.
  2. Review all credentials associated with the account.
  3. Investigate the actor's session for additional malicious activity.
  4. Enforce MFA and conditional access policies for all credential operations.
  5. Use Privileged Identity Management (PIM) for just-in-time access.
references:
- https://attack.mitre.org/techniques/T1098/001/
- https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_access-keys.html
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: guardduty
    - field: operation
      op: contains
      value: Policy:IAMUser
version: '1.0'
