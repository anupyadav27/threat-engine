rule_id: aws.guardduty.finding.credential_exfiltration
service: guardduty
provider: aws
check_type: log
severity: critical
title: 'GuardDuty: Credential Exfiltration'
description: GuardDuty detected credential exfiltration — credentials stolen and transmitted.
rationale: Cloud instance metadata endpoints provide temporary credentials; accessing them from an SSRF vulnerability or compromised workload yields credentials to the cloud account.
threat_category: credential_access
mitre_tactics:
- credential_access
- exfiltration
mitre_techniques:
- T1552.005
- T1041
risk_score: 92
resource: guardduty_finding
source: default
is_active: true
domain: identity_and_access_management
action_category: exfiltration
log_source_type: 
posture_category: iam_posture
threat_tags:
- T1552.005
- T1041
- T1552
- credential_access
- secret_exposure
- threat_detection
- guardduty
risk_indicators:
  actor_type: external_threat_actor
  action_type: data_transfer
  target_type: cloud_workload
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: true
  modules:
  - data_loss_prevention
  categories:
  - secrets_exposure
  - credential_theft
  priority: critical
  impact:
    pci: PCI DSS Requirement 12.3 — Implement security awareness program and protect systems
    gdpr: GDPR Article 32 — Appropriate technical and organizational measures for data security
    hipaa: §164.306(a) — Ensure confidentiality, integrity, and availability of ePHI
  sensitive_data_context: |
  Unauthorized credential access on guardduty resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks:
  cis_aws_v3:
  - 1.14
  - 1.19
  - 2.1
  cis_azure_v2:
  - 1.3
  - 1.4
  - 8.1
  nist_800_53_r5:
  - IA-5
  - IA-8
  - SC-28
  pci_dss_v4:
  - 8.2
  - 8.3
  - 8.6
  iso_27001_2022:
  - A.8.5
  - A.9.4
  - A.9.2
remediation: |
  1. Enforce IMDSv2 (AWS) / restrict IMDS access (Azure) to prevent credential theft.
  2. Alert on metadata service calls from unexpected sources.
  3. Apply network-level restrictions to limit IMDS reachability.
  4. Investigate the source of any metadata endpoint request.
references:
- https://attack.mitre.org/techniques/T1552/005/
- https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/configuring-instance-metadata-service.html
- https://attack.mitre.org/techniques/T1041/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: guardduty
    - field: operation
      op: contains
      value: CredentialExfiltration
version: '1.0'
