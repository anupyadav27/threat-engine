rule_id: aws.guardduty.finding.medium_finding
service: guardduty
provider: aws
check_type: log
severity: medium
title: 'GuardDuty: Medium Finding'
description: GuardDuty medium severity finding detected.
rationale: Active scanning of cloud endpoints reveals open ports, services, and API endpoints that can be exploited for initial access or lateral movement.
threat_category: threat_detection
mitre_tactics:
- collection
mitre_techniques:
- T1595
risk_score: 50
resource: guardduty_finding
source: default
is_active: true
domain: threat_detection
action_category: create
log_source_type: 
posture_category: threat_posture
threat_tags:
- T1595
- threat_detection
- guardduty
risk_indicators:
  actor_type: external_threat_actor
  action_type: write
  target_type: cloud_workload
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks: {}
remediation: |
  1. Apply WAF rules and security groups to minimize service exposure.
  2. Enable AWS Shield / Azure DDoS Protection.
  3. Alert on network scanning patterns in VPC / NSG flow logs.
references:
- https://attack.mitre.org/techniques/T1595/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: guardduty
    - field: severity
      op: equals
      value: medium
version: '1.0'
