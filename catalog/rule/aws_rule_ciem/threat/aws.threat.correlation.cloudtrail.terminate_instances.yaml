rule_id: aws.threat.correlation.cloudtrail.terminate_instances
service: threat
provider: aws
check_type: log
severity: high
title: 'Threat: Terminate Instances'
description: Multiple EC2 instances terminated — bulk compute destruction.
rationale: Reverting instances to older snapshots can undo security patches or configuration hardening, re-introducing known vulnerabilities into production workloads.
threat_category: data_destruction
mitre_tactics:
- impact
mitre_techniques:
- T1578.003
risk_score: 78
