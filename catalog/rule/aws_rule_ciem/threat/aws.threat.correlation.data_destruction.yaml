rule_id: aws.threat.correlation.data_destruction
service: threat
provider: aws
check_type: log_correlation
severity: critical
title: 'Correlation: Data Destruction'
description: 'Data destruction campaign detected: multiple destructive operations (bucket delete, DB delete, instance termination, KMS key deletion) executed in sequence by the same principal within 30 minutes.'
rationale: 'Adversaries destroy data and files on cloud storage or databases at scale to interrupt availability, render services inoperable, or destroy evidence. Cloud data destruction is often irreversible without backups. Detected via: bulk S3 object deletion via elevated IAM credentials, EC2/EBS/snapshot mass deletion events, storage account deletion with soft-delete disabled, and database cluster deletion without final snapshot.'
threat_category: data_destruction
mitre_tactics:
- impact
mitre_techniques:
- T1485
risk_score: 95
resource: multi_resource
source: ciem_rule_generator
is_active: true
domain: data_protection_and_privacy
action_category: delete
posture_category: data_security_posture
threat_tags:
- T1485
- data_destruction
- impact
- threat_detection
risk_indicators:
  actor_type: cloud_principal
  action_type: destructive
  target_type: cloud_resource
  blast_radius: multi_resource
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: true
  modules:
  - data_loss_prevention
  categories:
  - data_loss
  - availability_impact
  priority: critical
  impact:
    pci: PCI DSS Requirement 12.3 — Implement security awareness program and protect systems
    gdpr: GDPR Article 32 — Appropriate technical and organizational measures for data security
    hipaa: §164.306(a) — Ensure confidentiality, integrity, and availability of ePHI
compliance_frameworks:
  cis_aws_v3:
  - 2.1
  - 2.6
  - 3.1
  cis_azure_v2:
  - 3.1
  - 7.5
  nist_800_53_r5:
  - CP-9
  - CP-10
  - SI-12
  pci_dss_v4:
  - 3.2
  - 3.3
  - 12.3
  iso_27001_2022:
  - A.8.13
  - A.8.14
  - A.5.33
detection_events:
- 's3:DeleteObject (bulk)'
- 's3:DeleteBucket'
- 'ec2:TerminateInstances (mass)'
- Microsoft.Storage/storageAccounts/delete
- 'rds:DeleteDBCluster without SkipFinalSnapshot=false'
remediation: |
  1. Immediately quarantine the actor's credentials and halt further destructive operations.
  2. Initiate incident response and activate backup/recovery procedures.
  3. Enable S3 Object Lock / Azure Blob immutable storage to protect backups.
  4. Require MFA for bucket/storage account deletion operations.
references:
- https://attack.mitre.org/techniques/T1485/
- https://docs.aws.amazon.com/AmazonS3/latest/userguide/object-lock.html
- https://learn.microsoft.com/en-us/azure/storage/blobs/immutable-storage-overview
check_config:
  for_each: log_events
  match_by: actor.principal
  min_events: 3
  sequence:
  - any_of:
    - aws.threat.correlation.cloudtrail.delete_bucket
    - aws.threat.correlation.cloudtrail.delete_db
    - aws.threat.correlation.cloudtrail.terminate_instances
    - aws.threat.correlation.cloudtrail.delete_kms_key
    min_count: 3
  time_window_minutes: 30
  type: correlation
version: '1.0'
