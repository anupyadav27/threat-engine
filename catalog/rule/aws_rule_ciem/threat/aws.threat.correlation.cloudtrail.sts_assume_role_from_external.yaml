rule_id: aws.threat.correlation.cloudtrail.sts_assume_role_from_external
service: threat
provider: aws
check_type: log
severity: high
title: 'Threat: STS Assume Role From External'
description: Role assumed by external/unexpected principal — cross-account access token used.
rationale: OAuth token abuse allows attackers to access cloud resources as the token owner for extended periods without needing credentials, until token expiry.
threat_category: lateral_movement
mitre_tactics:
- lateral_movement
mitre_techniques:
- T1550.001
risk_score: 75
resource: multi_resource
source: ciem_rule_generator
is_active: true
domain: network_security_and_connectivity
action_category: audit_activity
log_source_type: cloudtrail
posture_category: network_posture
threat_tags:
- T1550.001
- T1550
- lateral_movement
- cloud_pivot
- threat_detection
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: multi_resource
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 5.1
  - 5.2
  - 5.3
  cis_azure_v2:
  - 6.1
  - 6.2
  nist_800_53_r5:
  - SC-7
  - AC-4
  - SI-3
  pci_dss_v4:
  - 1.2
  - 1.3
  - 7.2
  iso_27001_2022:
  - A.8.20
  - A.8.22
  - A.5.14
remediation: |
  1. Revoke the compromised application token immediately.
  2. Audit all OAuth consent grants and remove unauthorized application registrations.
  3. Enable Microsoft Entra ID risky sign-in detection.
  4. Reduce token lifetimes for high-privilege applications.
references:
- https://attack.mitre.org/techniques/T1550/001/
- https://learn.microsoft.com/en-us/azure/active-directory/develop/access-tokens
check_config:
  conditions:
    all:
    - field: operation
      op: equals
      value: AssumeRole
    - field: actor.account_id
      op: not_equals
      value: '{{resource.account_id}}'
  for_each: log_events
  log_source_type: cloudtrail
  type: log
version: '1.0'
