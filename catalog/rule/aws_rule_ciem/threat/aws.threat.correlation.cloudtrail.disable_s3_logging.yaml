rule_id: aws.threat.correlation.cloudtrail.disable_s3_logging
service: threat
provider: aws
check_type: log
severity: high
title: 'Threat: Disable S3 Logging'
description: S3 server access logging disabled — bucket access tracking stopped.
rationale: 'Adversaries disable or modify cloud logging capabilities to limit visibility into their activities. With sufficient permissions they can disable CloudTrail, delete Azure diagnostic settings, delete log sinks, or modify audit configurations — blinding defenders to all subsequent actions. Detected via: StopLogging, DeleteTrail, UpdateSink, Delete-DiagnosticSetting, license downgrade events, and SaaS audit log disable events.'
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1562.008
risk_score: 72
resource: multi_resource
source: ciem_rule_generator
is_active: true
domain: logging_monitoring_and_alerting
action_category: audit_activity
log_source_type: cloudtrail
posture_category: security_posture
threat_tags:
- T1562.008
- T1562
- defense_evasion
- log_tampering
- threat_detection
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: multi_resource
  stealth_risk: critical
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 3.1
  - 3.2
  - 3.3
  - 3.4
  cis_azure_v2:
  - 5.1
  - 5.2
  - 5.3
  nist_800_53_r5:
  - AU-2
  - AU-6
  - AU-12
  - SI-4
  pci_dss_v4:
  - 10.1
  - 10.2
  - 10.3
  iso_27001_2022:
  - A.8.15
  - A.8.16
  - A.5.28
detection_events:
- 'cloudtrail:StopLogging'
- 'cloudtrail:DeleteTrail'
- Microsoft.Insights/diagnosticSettings/delete
- microsoft.aadiam/diagnosticSettings/delete
- logging.sinks.delete
remediation: |
  1. Immediately restore the logging configuration.
  2. Lock CloudTrail S3 buckets with Object Lock; use immutable Azure Monitor storage.
  3. Apply SCPs / Azure Policy to prevent logging disruption.
  4. Configure out-of-band alerting (AWS EventBridge → SNS / Azure Event Grid) for logging changes.
references:
- https://attack.mitre.org/techniques/T1562/008/
- https://docs.aws.amazon.com/awscloudtrail/latest/userguide/cloudtrail-log-file-validation-intro.html
- https://learn.microsoft.com/en-us/azure/azure-monitor/essentials/diagnostic-settings
check_config:
  conditions:
    all:
    - field: operation
      op: equals
      value: PutBucketLogging
    - field: service
      op: equals
      value: s3
  for_each: log_events
  log_source_type: cloudtrail
  type: log
version: '1.0'
