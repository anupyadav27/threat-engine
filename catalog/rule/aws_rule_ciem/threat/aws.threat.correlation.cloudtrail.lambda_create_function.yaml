  - A.8.8
detection_events:
- 'ssm:SendCommand'
- Microsoft.Compute/virtualMachines/runCommand/action
- Microsoft.Automation/automationAccounts/runbooks/publish/action
- 'ec2:GetConsoleOutput (post-execution evidence gathering)'
remediation: |
  1. Restrict Systems Manager Run Command / VM extension write permissions via RBAC.
  2. Enable logging for all Run Command executions and VM extension deployments.
  3. Use approved patch management instead of ad-hoc run commands.
  4. Alert on Run Command / RunShellScript executions by non-standard principals.
references:
- https://attack.mitre.org/techniques/T1651/
