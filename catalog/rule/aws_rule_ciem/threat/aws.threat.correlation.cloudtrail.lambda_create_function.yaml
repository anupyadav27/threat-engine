rule_id: aws.threat.correlation.cloudtrail.lambda_create_function
service: threat
provider: aws
check_type: log
severity: high
title: 'Threat: Lambda Create Function'
description: Lambda function created — serverless executable deployed via cloud admin API.
rationale: 'Adversaries abuse cloud management services such as AWS Systems Manager (Run Command), Azure VM RunCommand, or Automation Runbooks to execute commands within virtual machines via installed agents — achieving remote code execution through the cloud control plane without requiring network access to the instance. Detected via: SSM RunCommand / Azure RunCommand API calls by unexpected users, command execution outside maintenance windows, and service account-initiated script execution atypical for admin tasks.'
threat_category: execution
mitre_tactics:
- execution
- persistence
mitre_techniques:
- T1651
- T1525
risk_score: 70
resource: multi_resource
source: ciem_rule_generator
is_active: true
domain: compute_and_workload_security
action_category: create
log_source_type: cloudtrail
posture_category: workload_posture
threat_tags:
- T1651
- T1525
- remote_execution
- cloud_exec
- threat_detection
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: multi_resource
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 3.1
  - 5.1
  cis_azure_v2:
