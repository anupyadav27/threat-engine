rule_id: aws.threat.correlation.cloudtrail.access_denied_spike
service: threat
provider: aws
check_type: log
severity: medium
title: 'Threat: Access Denied Spike'
description: Spike in access-denied errors — possible permission enumeration or unauthorized access attempt.
rationale: Cloud account enumeration identifies IAM users, service principals, and roles that can be targeted for credential attacks or privilege escalation.
threat_category: discovery
mitre_tactics:
- discovery
mitre_techniques:
- T1087.004
risk_score: 55
resource: multi_resource
source: ciem_rule_generator
is_active: true
domain: threat_detection
action_category: reconnaissance
log_source_type: cloudtrail
posture_category: threat_posture
threat_tags:
- T1087.004
- T1087
- threat_detection
risk_indicators:
  actor_type: cloud_principal
  action_type: discovery
  target_type: cloud_resource
  blast_radius: multi_resource
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks: {}
remediation: |
  1. Apply IAM permission restrictions on ListUsers/ListRoles/ListServicePrincipals.
  2. Alert on unexpected enumeration API call patterns.
  3. Use AWS Organizations SCPs / Azure Policy to limit who can enumerate identities.
references:
- https://attack.mitre.org/techniques/T1087/004/
- https://docs.aws.amazon.com/IAM/latest/UserGuide/reference_policies_examples_iam_limited-identities.html
check_config:
  conditions:
    field: error_code
    op: equals
    value: AccessDenied
  for_each: log_events
  log_source_type: cloudtrail
  type: log
version: '1.0'
