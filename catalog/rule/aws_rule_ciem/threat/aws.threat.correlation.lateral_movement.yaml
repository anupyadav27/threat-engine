rule_id: aws.threat.correlation.lateral_movement
service: threat
provider: aws
check_type: log_correlation
severity: critical
title: 'Correlation: Lateral Movement'
description: 'Lateral movement chain detected: enumeration → cross-account role assumption → network pivot.'
rationale: 'Adversaries circumvent elevation control mechanisms to gain higher-level permissions. In cloud environments this includes SAML assertion manipulation, IAM role privilege boundary modifications, and STS:AssumeRole chaining to escalate from limited to administrative access. Detected via: privilege boundary removal events, STS role chaining with unusually broad permissions, and unexpected policy attachments.'
threat_category: lateral_movement
mitre_tactics:
- lateral_movement
- discovery
mitre_techniques:
- T1548.005
- T1580
risk_score: 92
resource: multi_resource
source: ciem_rule_generator
is_active: true
domain: network_security_and_connectivity
action_category: network
posture_category: network_posture
threat_tags:
- T1548.005
- T1580
- T1548
- lateral_movement
- cloud_pivot
- threat_detection
risk_indicators:
  actor_type: cloud_principal
  action_type: network_change
  target_type: cloud_resource
  blast_radius: multi_resource
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 5.1
  - 5.2
  - 5.3
  cis_azure_v2:
  - 6.1
  - 6.2
  nist_800_53_r5:
  - SC-7
  - AC-4
  - SI-3
  pci_dss_v4:
  - 1.2
  - 1.3
  - 7.2
  iso_27001_2022:
  - A.8.20
  - A.8.22
  - A.5.14
detection_events:
- 'iam:CreateRole with permissive trust'
- 'sts:AssumeRole with cross-account escalation'
- Microsoft.Authorization/elevateAccess/action
remediation: |
  1. Review and revoke temporary elevated credentials.
  2. Implement SCP / Azure Policy guardrails to prevent unauthorized role chaining.
  3. Enable session recording for all privileged access sessions.
  4. Alert on all AssumeRole / elevateAccess API calls.
references:
- https://attack.mitre.org/techniques/T1548/005/
- https://docs.aws.amazon.com/IAM/latest/UserGuide/id_roles_use.html
- https://attack.mitre.org/techniques/T1580/
check_config:
  description: Actor performed enumeration, assumed a cross-account role, then modified
    network infrastructure — classic lateral movement pattern.
  for_each: log_events
  match_by: actor.principal
  min_events: 3
  mitre_tactics:
  - discovery
  - lateral_movement
  - defense_evasion
  mitre_techniques:
  - T1580
  - T1548
  - T1562
  sequence:
  - any_of:
    - aws.threat.correlation.cloudtrail.enumerate_iam
    - aws.threat.correlation.cloudtrail.enumerate_s3
  - any_of:
    - aws.ciem.correlation.cloudtrail.cross_account_assume_role
    - aws.ciem.correlation.cloudtrail.service_role_assumed
  - any_of:
    - aws.vpc.cloudtrail.igw_attached
    - aws.vpc.cloudtrail.sg_all_ports_open
    - aws.network.cloudtrail.global_accelerator_created
  severity: critical
  time_window_minutes: 120
  title: 'Lateral movement: recon → cross-account hop → network pivot'
  type: log_correlation
version: '1.0'
