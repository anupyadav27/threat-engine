rule_id: aws.threat.correlation.privilege_escalation_chain
service: threat
provider: aws
check_type: log_correlation
severity: critical
title: 'Correlation: Privilege Escalation Chain'
description: Privilege escalation chain — sequence of permission-expanding operations detected.
rationale: 'Adversaries add additional roles or permissions to adversary-controlled cloud accounts to maintain persistent access to a tenant. Attackers target Global Administrator, Owner, and Contributor roles — granting full control over subscription resources without deploying remote access tools. Detected via: IAM role attachment events, privilege grant events in Entra ID/Okta, and admin role assignment in Microsoft 365.'
threat_category: privilege_escalation
mitre_tactics:
- privilege_escalation
mitre_techniques:
- T1098.003
risk_score: 95
resource: multi_resource
source: ciem_rule_generator
is_active: true
domain: identity_and_access_management
action_category: privilege_escalation
posture_category: iam_posture
threat_tags:
- T1098.003
- T1098
- cloud_iam
- privilege_escalation
- threat_detection
risk_indicators:
  actor_type: cloud_principal
  action_type: privilege_change
  target_type: cloud_resource
  blast_radius: multi_resource
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - role_management
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 1.1
  - 1.16
  - 1.17
  cis_azure_v2:
  - 1.1
  - 2.1
  - 3.1
  nist_800_53_r5:
  - AC-2
  - AC-3
  - AC-6
  - IA-2
  pci_dss_v4:
  - 7.1
  - 7.2
  - 8.2
  iso_27001_2022:
  - A.5.18
  - A.8.2
  - A.8.3
detection_events:
- Microsoft.Authorization/roleAssignments/write
- 'iam:AttachUserPolicy'
- 'iam:PutRolePolicy'
- Add member to role (Entra ID audit)
remediation: |
  1. Remove the unauthorized role assignment immediately.
  2. Review all role assignments for the affected principal.
  3. Enable just-in-time privileged access using PIM / AWS IAM Identity Center.
  4. Require approval workflows for Owner/Contributor/privileged role assignments.
  5. Alert on all role assignments at subscription or tenant scope.
references:
- https://attack.mitre.org/techniques/T1098/003/
- https://learn.microsoft.com/en-us/azure/role-based-access-control/overview
- https://learn.microsoft.com/en-us/azure/active-directory/privileged-identity-management/pim-configure
check_config:
  for_each: log_events
  match_by: actor.principal
  min_events: 2
  sequence:
  - any_of:
    - aws.threat.correlation.cloudtrail.create_user
    - aws.threat.correlation.cloudtrail.create_role
  - any_of:
    - aws.threat.correlation.cloudtrail.attach_admin_policy
    - aws.threat.correlation.cloudtrail.put_role_policy
  - optional:
    - aws.threat.correlation.cloudtrail.create_access_key
    - aws.threat.correlation.cloudtrail.create_login_profile
  time_window_minutes: 30
  type: correlation
version: '1.0'
