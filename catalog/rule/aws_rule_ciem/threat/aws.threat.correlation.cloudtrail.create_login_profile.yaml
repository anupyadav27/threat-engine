rule_id: aws.threat.correlation.cloudtrail.create_login_profile
service: threat
provider: aws
check_type: log
severity: high
title: 'Threat: Create Login Profile'
description: Console login profile created for IAM user — enables console sign-in for previously API-only account.
rationale: 'Adversaries create cloud accounts (IAM users, Entra ID users, service principals) to maintain access to victim systems without deploying persistent remote access tools. Such accounts establish secondary credentialed access that survives password resets of the initially compromised account. Detected via: IAM CreateUser + AttachUserPolicy from non-standard sources, Add User events from unusual IPs, and SaaS account provisioning outside business hours.'
threat_category: identity_manipulation
mitre_tactics:
- persistence
mitre_techniques:
- T1136.003
risk_score: 70
resource: multi_resource
source: ciem_rule_generator
is_active: true
domain: identity_and_access_management
action_category: audit_activity
log_source_type: cloudtrail
posture_category: iam_posture
threat_tags:
- T1136.003
- T1136
- cloud_iam
- identity_manipulation
- threat_detection
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: multi_resource
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - password_policy
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 1.1
  - 1.16
  - 1.22
  cis_azure_v2:
  - 1.1
  - 2.1
  nist_800_53_r5:
  - AC-2
  - AC-3
  - IA-2
  pci_dss_v4:
  - 7.1
  - 8.2
  iso_27001_2022:
  - A.5.18
  - A.8.2
detection_events:
- 'iam:CreateUser'
- microsoft.directory/users/create
- 'organizations:CreateAccount'
- New-MsolUser (PowerShell)
remediation: |
  1. Disable and investigate the new cloud account immediately.
  2. Require MFA and business justification for all cloud account creation.
  3. Integrate account provisioning with HR/ITSM systems for lifecycle control.
  4. Enable alerts for account creation across all cloud tenants and sub-accounts.
references:
- https://attack.mitre.org/techniques/T1136/003/
- https://docs.aws.amazon.com/organizations/latest/userguide/orgs_manage_accounts.html
- https://learn.microsoft.com/en-us/azure/active-directory/fundamentals/add-users-azure-active-directory
check_config:
  conditions:
    field: operation
    op: equals
    value: CreateLoginProfile
  for_each: log_events
  log_source_type: cloudtrail
  type: log
version: '1.0'
