rule_id: aws.threat.correlation.credential_compromise
service: threat
provider: aws
check_type: log_correlation
severity: critical
title: 'Correlation: Credential Compromise'
description: Credential compromise pattern detected — credentials accessed or exfiltrated.
rationale: Cloud instance metadata endpoints provide temporary credentials; accessing them from an SSRF vulnerability or compromised workload yields credentials to the cloud account.
threat_category: credential_access
mitre_tactics:
- credential_access
mitre_techniques:
- T1552.005
risk_score: 92
resource: multi_resource
source: ciem_rule_generator
is_active: true
domain: identity_and_access_management
action_category: read
log_source_type: 
posture_category: iam_posture
threat_tags:
- T1552.005
- T1552
- credential_access
- secret_exposure
- threat_detection
risk_indicators:
  actor_type: cloud_principal
  action_type: read
  target_type: cloud_resource
  blast_radius: multi_resource
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: true
  modules:
  - data_access_governance
  categories:
  - secrets_exposure
  - credential_theft
  priority: critical
  impact:
    pci: PCI DSS Requirement 12.3 — Implement security awareness program and protect systems
    gdpr: GDPR Article 32 — Appropriate technical and organizational measures for data security
    hipaa: §164.306(a) — Ensure confidentiality, integrity, and availability of ePHI
  sensitive_data_context: |
  Unauthorized credential access on threat resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks:
  cis_aws_v3:
  - 1.14
  - 1.19
  - 2.1
  cis_azure_v2:
  - 1.3
  - 1.4
  - 8.1
  nist_800_53_r5:
  - IA-5
  - IA-8
  - SC-28
  pci_dss_v4:
  - 8.2
  - 8.3
  - 8.6
  iso_27001_2022:
  - A.8.5
  - A.9.4
  - A.9.2
remediation: |
  1. Enforce IMDSv2 (AWS) / restrict IMDS access (Azure) to prevent credential theft.
  2. Alert on metadata service calls from unexpected sources.
  3. Apply network-level restrictions to limit IMDS reachability.
  4. Investigate the source of any metadata endpoint request.
references:
- https://attack.mitre.org/techniques/T1552/005/
- https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/configuring-instance-metadata-service.html
check_config:
  for_each: log_events
  match_by: actor.ip_address
  min_events: 3
  sequence:
  - any_of:
    - aws.threat.correlation.cloudtrail.console_login_no_mfa
    - aws.threat.correlation.cloudtrail.console_login_failure
  - min_count: 3
    rule_id: aws.threat.correlation.cloudtrail.access_denied_spike
  - any_of:
    - aws.threat.correlation.cloudtrail.enumerate_iam
    - aws.threat.correlation.cloudtrail.enumerate_s3
  time_window_minutes: 60
  type: correlation
version: '1.0'
