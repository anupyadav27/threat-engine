rule_id: aws.threat.correlation.ransomware
service: threat
provider: aws
check_type: log_correlation
severity: critical
title: 'Correlation: Ransomware'
description: Ransomware-like pattern — mass data encryption or deletion in progress.
rationale: Ransomware attacks encrypt cloud storage or databases for extortion; early detection limits the scope of encryption before a ransom demand is issued.
threat_category: data_destruction
mitre_tactics:
- impact
mitre_techniques:
- T1486
risk_score: 98
resource: multi_resource
source: ciem_rule_generator
is_active: true
domain: data_protection_and_privacy
action_category: delete
log_source_type: 
posture_category: data_security_posture
threat_tags:
- T1486
- data_destruction
- impact
- threat_detection
risk_indicators:
  actor_type: cloud_principal
  action_type: destructive
  target_type: cloud_resource
  blast_radius: multi_resource
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: true
  modules:
  - data_loss_prevention
  categories:
  - data_loss
  - availability_impact
  priority: critical
  impact:
    pci: PCI DSS Requirement 12.3 — Implement security awareness program and protect systems
    gdpr: GDPR Article 32 — Appropriate technical and organizational measures for data security
    hipaa: §164.306(a) — Ensure confidentiality, integrity, and availability of ePHI
  sensitive_data_context: |
  Unauthorized data destruction on threat resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks:
  cis_aws_v3:
  - 2.1
  - 2.6
  - 3.1
  cis_azure_v2:
  - 3.1
  - 7.5
  nist_800_53_r5:
  - CP-9
  - CP-10
  - SI-12
  pci_dss_v4:
  - 3.2
  - 3.3
  - 12.3
  iso_27001_2022:
  - A.8.13
  - A.8.14
  - A.5.33
remediation: |
  1. Isolate the affected resources and revoke attacker credentials immediately.
  2. Activate backup recovery procedures from clean snapshots.
  3. Enable versioning and soft-delete for all storage resources.
  4. Use Defender for Cloud / AWS Macie to detect mass encryption events.
references:
- https://attack.mitre.org/techniques/T1486/
- https://learn.microsoft.com/en-us/azure/storage/blobs/versioning-overview
- https://docs.aws.amazon.com/AmazonS3/latest/userguide/Versioning.html
check_config:
  for_each: log_events
  match_by: actor.principal
  min_events: 2
  sequence:
  - any_of:
    - aws.threat.correlation.cloudtrail.delete_kms_key
  - any_of:
    - aws.threat.correlation.cloudtrail.delete_bucket
    - aws.threat.correlation.cloudtrail.delete_db
    - aws.threat.correlation.cloudtrail.terminate_instances
  time_window_minutes: 60
  type: correlation
version: '1.0'
