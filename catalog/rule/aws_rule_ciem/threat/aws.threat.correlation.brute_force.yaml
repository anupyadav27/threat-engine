rule_id: aws.threat.correlation.brute_force
service: threat
provider: aws
check_type: log_correlation
severity: high
title: 'Correlation: Brute Force'
description: Brute-force pattern detected against console login — repeated authentication failures.
rationale: Password guessing attacks can compromise accounts with weak passwords; detection enables account lockout before successful compromise occurs.
threat_category: initial_access
mitre_tactics:
- credential_access
mitre_techniques:
- T1110.001
risk_score: 75
resource: multi_resource
source: ciem_rule_generator
is_active: true
domain: threat_detection
action_category: brute_force
log_source_type: 
posture_category: threat_posture
threat_tags:
- T1110.001
- T1110
- threat_detection
risk_indicators:
  actor_type: cloud_principal
  action_type: authentication
  target_type: cloud_resource
  blast_radius: multi_resource
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 1.14
  - 2.1
  cis_azure_v2:
  - 1.2
  - 2.1
  nist_800_53_r5:
  - AC-17
  - IA-2
  - SI-3
  pci_dss_v4:
  - 8.3
  - 11.5
  iso_27001_2022:
  - A.8.5
  - A.9.4
remediation: |
  1. Enforce account lockout policies after consecutive failed attempts.
  2. Require strong password complexity and minimum length.
  3. Enable MFA to prevent successful login even if password is guessed.
  4. Block sign-ins from high-risk IP ranges using Conditional Access policies.
references:
- https://attack.mitre.org/techniques/T1110/001/
- https://learn.microsoft.com/en-us/azure/active-directory/authentication/tutorial-enable-azure-mfa
check_config:
  for_each: log_events
  match_by: actor.ip_address
  min_events: 5
  sequence:
  - min_count: 5
    rule_id: aws.threat.correlation.cloudtrail.console_login_failure
  time_window_minutes: 15
  type: correlation
version: '1.0'
