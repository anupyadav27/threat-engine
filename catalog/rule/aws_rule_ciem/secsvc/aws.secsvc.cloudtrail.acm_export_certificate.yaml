rule_id: aws.secsvc.cloudtrail.acm_export_certificate
service: secsvc
provider: aws
check_type: log
severity: high
title: 'Security Services: ACM Export Certificate'
description: ACM certificate exported — private key extracted from certificate manager.
rationale: Private keys embedded in code repositories, CI/CD pipelines, or cloud storage can be harvested to authenticate as services or users.
threat_category: credential_access
mitre_tactics:
- credential_access
mitre_techniques:
- T1552.004
risk_score: 72
resource: security_service
source: default
is_active: true
domain: logging_monitoring_and_alerting
action_category: audit_activity
log_source_type: 
posture_category: iam_posture
threat_tags:
- T1552.004
- T1552
- credential_access
- secret_exposure
- security_service
- audit_log
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: security_service
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: true
  modules:
  - data_access_governance
  categories:
  - secrets_exposure
  - credential_theft
  priority: high
  impact:
    pci: PCI DSS Requirement 12.3 — Implement security awareness program and protect systems
    gdpr: GDPR Article 32 — Appropriate technical and organizational measures for data security
    hipaa: §164.306(a) — Ensure confidentiality, integrity, and availability of ePHI
  sensitive_data_context: |
  Unauthorized credential access on secsvc resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks:
  cis_aws_v3:
  - 1.14
  - 1.19
  - 2.1
  cis_azure_v2:
  - 1.3
  - 1.4
  - 8.1
  nist_800_53_r5:
  - IA-5
  - IA-8
  - SC-28
  pci_dss_v4:
  - 8.2
  - 8.3
  - 8.6
  iso_27001_2022:
  - A.8.5
  - A.9.4
  - A.9.2
remediation: |
  1. Rotate all affected private keys immediately.
  2. Scan source code and build artifacts for private key patterns.
  3. Use HSM-backed key storage (AWS KMS / Azure Key Vault HSM).
  4. Enforce automated secret scanning in all CI/CD pipelines.
references:
- https://attack.mitre.org/techniques/T1552/004/
- https://docs.aws.amazon.com/kms/latest/developerguide/overview.html
check_config:
  conditions:
    all:
    - field: service
      op: equals
      value: acm
    - field: operation
      op: equals
      value: ExportCertificate
version: '1.0'
