rule_id: aws.secsvc.cloudtrail.secretsmanager_put_secret_value
service: secsvc
provider: aws
check_type: log
severity: high
title: 'Security Services: Secretsmanager Put Secret Value'
description: Secrets Manager secret value updated — credential value modified via cloud secrets API.
rationale: Container secrets, Kubernetes secrets, and environment variables can expose sensitive credentials to any process with read access to the container environment.
threat_category: credential_access
mitre_tactics:
- credential_access
mitre_techniques:
- T1552.007
risk_score: 72
resource: security_service
source: default
is_active: true
domain: cryptography_and_key_management
action_category: create
log_source_type: 
posture_category: iam_posture
threat_tags:
- T1552.007
- T1552
- credential_access
- secret_exposure
- security_service
- audit_log
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: security_service
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: true
  modules:
  - secrets_management
  categories:
  - secrets_exposure
  - credential_theft
  priority: high
  impact:
    pci: PCI DSS Requirement 3.4 — Sensitive authentication data must be protected
    gdpr: GDPR Article 32 — Appropriate technical measures to protect personal data
    hipaa: §164.312(e)(2)(ii) — Encryption of ePHI in transit and at rest
  sensitive_data_context: |
  Unauthorized credential access on secsvc resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks:
  cis_aws_v3:
  - 1.14
  - 1.19
  - 2.1
  cis_azure_v2:
  - 1.3
  - 1.4
  - 8.1
  nist_800_53_r5:
  - IA-5
  - IA-8
  - SC-28
  pci_dss_v4:
  - 8.2
  - 8.3
  - 8.6
  iso_27001_2022:
  - A.8.5
  - A.9.4
  - A.9.2
remediation: |
  1. Remove sensitive data from container environment variables.
  2. Use Kubernetes Secrets Store CSI Driver or Vault Agent for secrets injection.
  3. Enable encryption for Kubernetes Secrets at rest.
  4. Restrict access to secrets using Kubernetes RBAC least-privilege policies.
references:
- https://attack.mitre.org/techniques/T1552/007/
- https://kubernetes.io/docs/concepts/configuration/secret/
check_config:
  conditions:
    all:
    - field: service
      op: equals
      value: secretsmanager
    - field: operation
      op: equals
      value: PutSecretValue
version: '1.0'
