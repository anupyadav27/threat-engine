rule_id: aws.secsvc.cloudtrail.macie_delete_custom_data_identifier
service: secsvc
provider: aws
check_type: log
severity: medium
title: 'Security Services: Macie Delete Custom Data Identifier'
description: Macie custom data identifier deleted — sensitive data pattern detection removed.
rationale: 'Adversaries modify or disable security tools to avoid detection of their activities — including killing security software processes, disabling GuardDuty detectors, deleting Microsoft Defender plans, or tampering with cloud monitoring agents. Once defenses are disabled, subsequent attack phases proceed without generating alerts. Detected via: security process/service termination, cloud monitoring agent disable API calls, and container admission controller tampering.'
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1562.001
risk_score: 50
resource: security_service
source: default
is_active: true
domain: logging_monitoring_and_alerting
action_category: delete
posture_category: security_posture
threat_tags:
- T1562.001
- T1562
- defense_evasion
- log_tampering
- security_service
- audit_log
risk_indicators:
  actor_type: cloud_principal
  action_type: destructive
  target_type: security_service
  blast_radius: resource_group
  stealth_risk: critical
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: true
  modules:
  - data_access_governance
  categories:
  - sensitive_data_access
  priority: medium
  impact:
    pci: PCI DSS Requirement 12.3 — Implement security awareness program and protect systems
    gdpr: GDPR Article 32 — Appropriate technical and organizational measures for data security
    hipaa: §164.306(a) — Ensure confidentiality, integrity, and availability of ePHI
compliance_frameworks:
  cis_aws_v3:
  - 3.1
  - 3.2
  - 3.3
  - 3.4
  cis_azure_v2:
  - 5.1
  - 5.2
  - 5.3
  nist_800_53_r5:
  - AU-2
  - AU-6
  - AU-12
  - SI-4
  pci_dss_v4:
  - 10.1
  - 10.2
  - 10.3
  iso_27001_2022:
  - A.8.15
  - A.8.16
  - A.5.28
detection_events:
- 'guardduty:DeleteDetector'
- 'securityhub:DisableSecurityHub'
- Microsoft.Security/pricings/write (Standard → Free)
- Set-MpPreference -DisableRealtimeMonitoring
remediation: |
  1. Re-enable the security tool immediately.
  2. Apply SCPs / Azure Policies to prevent disabling security services.
  3. Enable Config rules to detect and auto-remediate disabled security tools.
  4. Alert via secondary channel (CloudWatch Events, Azure Event Grid) independent of the disabled service.
references:
- https://attack.mitre.org/techniques/T1562/001/
- https://docs.aws.amazon.com/guardduty/latest/ug/guardduty_managing_access.html
- https://learn.microsoft.com/en-us/azure/defender-for-cloud/enable-enhanced-security
check_config:
  conditions:
    all:
    - field: service
      op: equals
      value: macie2
    - field: operation
      op: equals
      value: DeleteCustomDataIdentifier
version: '1.0'
