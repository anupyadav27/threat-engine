rule_id: aws.iam.cloudtrail.get_access_key_last_used
service: iam
provider: aws
check_type: log
severity: low
title: 'IAM: Get Access Key Last Used'
description: IAM access key last-used information queried — reconnaissance of credential activity.
rationale: Cloud account enumeration identifies IAM users, service principals, and roles that can be targeted for credential attacks or privilege escalation.
threat_category: credential_access
mitre_tactics:
- discovery
mitre_techniques:
- T1087.004
risk_score: 25
resource: iam_principal
source: default
is_active: true
domain: identity_and_access_management
action_category: read
log_source_type: 
posture_category: iam_posture
threat_tags:
- T1087.004
- T1087
- credential_access
- secret_exposure
- cloud_iam
- identity
risk_indicators:
  actor_type: iam_user_or_role
  action_type: read
  target_type: iam_identity
  blast_radius: account
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: true
  modules:
  - secrets_management
  categories:
  - secrets_exposure
  - credential_theft
  priority: low
  impact:
    pci: PCI DSS Requirement 12.3 — Implement security awareness program and protect systems
    gdpr: GDPR Article 32 — Appropriate technical and organizational measures for data security
    hipaa: §164.306(a) — Ensure confidentiality, integrity, and availability of ePHI
  sensitive_data_context: |
  Unauthorized credential access on iam resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks:
  cis_aws_v3:
  - 1.14
  - 1.19
  - 2.1
  cis_azure_v2:
  - 1.3
  - 1.4
  - 8.1
  nist_800_53_r5:
  - IA-5
  - IA-8
  - SC-28
  pci_dss_v4:
  - 8.2
  - 8.3
  - 8.6
  iso_27001_2022:
  - A.8.5
  - A.9.4
  - A.9.2
remediation: |
  1. Apply IAM permission restrictions on ListUsers/ListRoles/ListServicePrincipals.
  2. Alert on unexpected enumeration API call patterns.
  3. Use AWS Organizations SCPs / Azure Policy to limit who can enumerate identities.
references:
- https://attack.mitre.org/techniques/T1087/004/
- https://docs.aws.amazon.com/IAM/latest/UserGuide/reference_policies_examples_iam_limited-identities.html
check_config:
  conditions:
    all:
    - field: service
      op: equals
      value: iam
    - field: operation
      op: equals
      value: GetAccessKeyLastUsed
version: '1.0'
