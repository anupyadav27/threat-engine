rule_id: aws.iam.cloudtrail.org_remove_account
service: iam
provider: aws
check_type: log
severity: medium
title: 'IAM: Org Remove Account'
description: Account removed from AWS organization.
rationale: Account access removal (deleting users, removing MFA) blocks legitimate users from accessing resources and can be used to seize control of cloud accounts.
threat_category: initial_access
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1531
risk_score: 50
resource: iam_principal
source: default
is_active: true
domain: threat_detection
action_category: delete
log_source_type: 
posture_category: threat_posture
threat_tags:
- T1531
- cloud_iam
- identity
risk_indicators:
  actor_type: iam_user_or_role
  action_type: destructive
  target_type: iam_identity
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 1.14
  - 2.1
  cis_azure_v2:
  - 1.2
  - 2.1
  nist_800_53_r5:
  - AC-17
  - IA-2
  - SI-3
  pci_dss_v4:
  - 8.3
  - 11.5
  iso_27001_2022:
  - A.8.5
  - A.9.4
remediation: |
  1. Restore removed accounts or access immediately from a break-glass account.
  2. Review and audit all actions taken by the responsible actor.
  3. Implement role-based approvals for account deletion and access revocation.
  4. Maintain break-glass emergency access accounts with separate credential paths.
references:
- https://attack.mitre.org/techniques/T1531/
- https://learn.microsoft.com/en-us/azure/active-directory/roles/security-emergency-access
check_config:
  conditions:
    all:
    - field: service
      op: equals
      value: organizations
    - field: operation
      op: equals
      value: RemoveAccountFromOrganization
version: '1.0'
