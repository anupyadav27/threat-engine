rule_id: aws.iam.cloudtrail.deactivate_mfa_device
service: iam
provider: aws
check_type: log
severity: high
title: 'IAM: Deactivate MFA Device'
description: MFA deactivated on IAM user — removes a key authentication control.
rationale: MFA bypass or manipulation allows attackers to authenticate without the second factor, significantly reducing authentication security for targeted accounts.
threat_category: identity_manipulation
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1556.006
risk_score: 72
resource: iam_principal
source: default
is_active: true
domain: identity_and_access_management
action_category: audit_activity
log_source_type: 
posture_category: iam_posture
threat_tags:
- T1556.006
- T1556
- cloud_iam
- identity_manipulation
- identity
risk_indicators:
  actor_type: iam_user_or_role
  action_type: write
  target_type: iam_identity
  blast_radius: account
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - mfa
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 1.1
  - 1.16
  - 1.22
  cis_azure_v2:
  - 1.1
  - 2.1
  nist_800_53_r5:
  - AC-2
  - AC-3
  - IA-2
  pci_dss_v4:
  - 7.1
  - 8.2
  iso_27001_2022:
  - A.5.18
  - A.8.2
remediation: |
  1. Investigate and revert MFA method changes for all affected accounts.
  2. Force re-enrollment of MFA for affected accounts.
  3. Enable Conditional Access policies requiring phishing-resistant MFA (FIDO2).
  4. Alert on all MFA method changes, especially for privileged accounts.
references:
- https://attack.mitre.org/techniques/T1556/006/
- https://learn.microsoft.com/en-us/azure/active-directory/authentication/concept-mfa-howitworks
- https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_mfa.html
check_config:
  conditions:
    all:
    - field: service
      op: equals
      value: iam
    - field: operation
      op: equals
      value: DeactivateMFADevice
version: '1.0'
