rule_id: aws.iam.cloudtrail.sts_assume_role_with_web_identity
service: iam
provider: aws
check_type: log
severity: high
title: 'IAM: STS Assume Role With Web Identity'
description: Role assumed via web identity (OIDC) — application access token used to access AWS resources.
rationale: OAuth token abuse allows attackers to access cloud resources as the token owner for extended periods without needing credentials, until token expiry.
threat_category: lateral_movement
mitre_tactics:
- lateral_movement
mitre_techniques:
- T1550.001
risk_score: 70
resource: iam_principal
source: default
is_active: true
domain: network_security_and_connectivity
action_category: audit_activity
log_source_type: 
posture_category: network_posture
threat_tags:
- T1550.001
- T1550
- lateral_movement
- cloud_pivot
- cloud_iam
- identity
risk_indicators:
  actor_type: iam_user_or_role
  action_type: write
  target_type: iam_identity
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 5.1
  - 5.2
  - 5.3
  cis_azure_v2:
  - 6.1
  - 6.2
  nist_800_53_r5:
  - SC-7
  - AC-4
  - SI-3
  pci_dss_v4:
  - 1.2
  - 1.3
  - 7.2
  iso_27001_2022:
  - A.8.20
  - A.8.22
  - A.5.14
remediation: |
  1. Revoke the compromised application token immediately.
  2. Audit all OAuth consent grants and remove unauthorized application registrations.
  3. Enable Microsoft Entra ID risky sign-in detection.
  4. Reduce token lifetimes for high-privilege applications.
references:
- https://attack.mitre.org/techniques/T1550/001/
- https://learn.microsoft.com/en-us/azure/active-directory/develop/access-tokens
check_config:
  conditions:
    all:
    - field: service
      op: equals
      value: sts
    - field: operation
      op: equals
      value: AssumeRoleWithWebIdentity
version: '1.0'
