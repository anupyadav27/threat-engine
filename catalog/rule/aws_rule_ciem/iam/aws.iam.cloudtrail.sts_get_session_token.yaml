rule_id: aws.iam.cloudtrail.sts_get_session_token
service: iam
provider: aws
check_type: log
severity: medium
title: 'IAM: STS Get Session Token'
description: Temporary STS session token requested — may indicate credential harvesting.
rationale: Stealing OAuth access tokens enables impersonation of users or services without requiring their passwords, bypassing MFA in many configurations.
threat_category: credential_access
mitre_tactics:
- credential_access
mitre_techniques:
- T1528
risk_score: 55
resource: iam_principal
source: default
is_active: true
domain: identity_and_access_management
action_category: read
log_source_type: 
posture_category: iam_posture
threat_tags:
- T1528
- credential_access
- secret_exposure
- cloud_iam
- identity
risk_indicators:
  actor_type: iam_user_or_role
  action_type: read
  target_type: iam_identity
  blast_radius: account
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: true
  modules:
  - data_access_governance
  categories:
  - secrets_exposure
  - credential_theft
  priority: medium
  impact:
    pci: PCI DSS Requirement 12.3 — Implement security awareness program and protect systems
    gdpr: GDPR Article 32 — Appropriate technical and organizational measures for data security
    hipaa: §164.306(a) — Ensure confidentiality, integrity, and availability of ePHI
  sensitive_data_context: |
  Unauthorized credential access on iam resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks:
  cis_aws_v3:
  - 1.14
  - 1.19
  - 2.1
  cis_azure_v2:
  - 1.3
  - 1.4
  - 8.1
  nist_800_53_r5:
  - IA-5
  - IA-8
  - SC-28
  pci_dss_v4:
  - 8.2
  - 8.3
  - 8.6
  iso_27001_2022:
  - A.8.5
  - A.9.4
  - A.9.2
remediation: |
  1. Revoke stolen tokens immediately via token revocation endpoints.
  2. Enable Conditional Access policies with token binding.
  3. Use FIDO2/Passwordless authentication to prevent token theft.
  4. Enable Continuous Access Evaluation for all critical resources.
references:
- https://attack.mitre.org/techniques/T1528/
- https://learn.microsoft.com/en-us/azure/active-directory/conditional-access/overview
check_config:
  conditions:
    all:
    - field: service
      op: equals
      value: sts
    - field: operation
      op: equals
      value: GetSessionToken
version: '1.0'
