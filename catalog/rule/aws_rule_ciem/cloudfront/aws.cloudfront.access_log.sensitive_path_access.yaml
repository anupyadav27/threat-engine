rule_id: aws.cloudfront.access_log.sensitive_path_access
service: cloudfront
provider: aws
check_type: log
severity: medium
title: 'CloudFront: Sensitive Path Access'
description: Access to sensitive path via CloudFront — .env, config, or credential paths targeted.
rationale: Vulnerability scanning of cloud endpoints identifies exploitable weaknesses that can be used for initial access or follow-on exploitation.
threat_category: web_attack
mitre_tactics:
- discovery
mitre_techniques:
- T1595.002
risk_score: 55
resource: cloudfront_distribution
source: default
is_active: true
domain: network_security_and_connectivity
action_category: network
log_source_type: 
posture_category: threat_posture
threat_tags:
- T1595.002
- T1595
risk_indicators:
  actor_type: cloud_principal
  action_type: network_change
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks: {}
remediation: |
  1. Apply security patches promptly for all cloud-exposed services.
  2. Enable Defender for Cloud / Amazon Inspector for vulnerability detection.
  3. Alert on unusual port scanning activity in network flow logs.
references:
- https://attack.mitre.org/techniques/T1595/002/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: cloudfront
    - field: resource_uid
      op: contains
      value: .env
version: '1.0'
