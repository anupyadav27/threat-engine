rule_id: aws.cloudfront.access_log.http_put_method
service: cloudfront
provider: aws
check_type: log
severity: low
title: 'CloudFront: HTTP Put Method'
description: HTTP PUT method via CloudFront — resource creation/replacement request.
rationale: Public-facing application exploitation can provide initial foothold in cloud environments; early detection limits attacker dwell time significantly.
threat_category: web_attack
mitre_tactics:
- initial_access
mitre_techniques:
- T1190
risk_score: 30
resource: cloudfront_distribution
source: default
is_active: true
domain: network_security_and_connectivity
action_category: network
log_source_type: 
posture_category: threat_posture
threat_tags:
- T1190
risk_indicators:
  actor_type: cloud_principal
  action_type: network_change
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks: {}
remediation: |
  1. Apply WAF rules to detect and block exploitation attempts.
  2. Enable vulnerability scanning for all public-facing services.
  3. Apply security patches promptly for all known CVEs.
references:
- https://attack.mitre.org/techniques/T1190/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: cloudfront
    - field: operation
      op: equals
      value: PUT
version: '1.0'
