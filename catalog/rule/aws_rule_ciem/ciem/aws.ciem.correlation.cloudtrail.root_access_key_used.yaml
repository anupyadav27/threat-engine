rule_id: aws.ciem.correlation.cloudtrail.root_access_key_used
service: ciem
provider: aws
check_type: log
severity: critical
title: 'CIEM: Root Access Key Used'
description: Root account access key used — highest-privilege credential exercised programmatically.
rationale: Cloud instance metadata endpoints provide temporary credentials; accessing them from an SSRF vulnerability or compromised workload yields credentials to the cloud account.
threat_category: credential_access
mitre_tactics:
- initial_access
- credential_access
mitre_techniques:
- T1552.005
- T1078.004
risk_score: 95
resource: multi_resource
source: ciem_rule_generator
is_active: true
domain: identity_and_access_management
action_category: audit_activity
log_source_type: cloudtrail
posture_category: iam_posture
threat_tags:
- T1552.005
- T1078.004
- T1078
- T1552
- credential_access
- secret_exposure
- ciem_correlation
- attack_chain
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: tenant_or_account
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: true
  modules:
  - secrets_management
  categories:
  - secrets_exposure
  - credential_theft
  priority: critical
  impact:
    pci: PCI DSS Requirement 12.3 — Implement security awareness program and protect systems
    gdpr: GDPR Article 32 — Appropriate technical and organizational measures for data security
    hipaa: §164.306(a) — Ensure confidentiality, integrity, and availability of ePHI
  sensitive_data_context: |
  Unauthorized credential access on ciem resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks:
  cis_aws_v3:
  - 1.14
  - 1.19
  - 2.1
  cis_azure_v2:
  - 1.3
  - 1.4
  - 8.1
  nist_800_53_r5:
  - IA-5
  - IA-8
  - SC-28
  pci_dss_v4:
  - 8.2
  - 8.3
  - 8.6
  iso_27001_2022:
  - A.8.5
  - A.9.4
  - A.9.2
remediation: |
  1. Enforce IMDSv2 (AWS) / restrict IMDS access (Azure) to prevent credential theft.
  2. Alert on metadata service calls from unexpected sources.
  3. Apply network-level restrictions to limit IMDS reachability.
  4. Investigate the source of any metadata endpoint request.
references:
- https://attack.mitre.org/techniques/T1552/005/
- https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/configuring-instance-metadata-service.html
- https://attack.mitre.org/techniques/T1078/004/
check_config:
  conditions:
    all:
    - field: actor.principal_type
      op: equals
      value: Root
    - field: operation
      op: not_equals
      value: ConsoleLogin
  for_each: log_events
  log_source_type: cloudtrail
  type: log
version: '1.0'
