rule_id: aws.ciem.correlation.privilege_escalation
service: ciem
provider: aws
check_type: log_correlation
severity: critical
title: 'Correlation: Privilege Escalation'
description: 'Privilege escalation chain detected: permission boundary removed → policies attached → cross-account role assumed.'
rationale: 'Adversaries circumvent elevation control mechanisms to gain higher-level permissions. In cloud environments this includes SAML assertion manipulation, IAM role privilege boundary modifications, and STS:AssumeRole chaining to escalate from limited to administrative access. Detected via: privilege boundary removal events, STS role chaining with unusually broad permissions, and unexpected policy attachments.'
threat_category: privilege_escalation
mitre_tactics:
- privilege_escalation
mitre_techniques:
- T1548.005
risk_score: 92
resource: multi_resource
source: ciem_rule_generator
is_active: true
domain: identity_and_access_management
action_category: privilege_escalation
posture_category: iam_posture
threat_tags:
- T1548.005
- T1548
- cloud_iam
- privilege_escalation
- ciem_correlation
- attack_chain
risk_indicators:
  actor_type: cloud_principal
  action_type: privilege_change
  target_type: cloud_resource
  blast_radius: tenant_or_account
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - role_management
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 1.1
  - 1.16
  - 1.17
  cis_azure_v2:
  - 1.1
  - 2.1
  - 3.1
  nist_800_53_r5:
  - AC-2
  - AC-3
  - AC-6
  - IA-2
  pci_dss_v4:
  - 7.1
  - 7.2
  - 8.2
  iso_27001_2022:
  - A.5.18
  - A.8.2
  - A.8.3
detection_events:
- 'iam:CreateRole with permissive trust'
- 'sts:AssumeRole with cross-account escalation'
- Microsoft.Authorization/elevateAccess/action
remediation: |
  1. Review and revoke temporary elevated credentials.
  2. Implement SCP / Azure Policy guardrails to prevent unauthorized role chaining.
  3. Enable session recording for all privileged access sessions.
  4. Alert on all AssumeRole / elevateAccess API calls.
references:
- https://attack.mitre.org/techniques/T1548/005/
- https://docs.aws.amazon.com/IAM/latest/UserGuide/id_roles_use.html
check_config:
  for_each: log_events
  match_by: actor.principal
  min_events: 2
  sequence:
  - optional:
    - aws.ciem.correlation.cloudtrail.permission_boundary_removed
  - any_of:
    - aws.ciem.correlation.cloudtrail.policy_attached
    - aws.ciem.correlation.cloudtrail.policy_created
  - optional:
    - aws.ciem.correlation.cloudtrail.cross_account_assume_role
  time_window_minutes: 30
  type: correlation
version: '1.0'
