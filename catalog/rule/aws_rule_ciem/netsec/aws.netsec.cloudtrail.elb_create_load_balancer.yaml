rule_id: aws.netsec.cloudtrail.elb_create_load_balancer
service: netsec
provider: aws
check_type: log
severity: medium
title: 'Network Security: Elb Create Load Balancer'
description: Elastic Load Balancer created — traffic distribution endpoint provisioned.
rationale: Attackers acquiring virtual private servers in cloud environments use them as attack infrastructure, C2 servers, or anonymizing proxies.
threat_category: execution
mitre_tactics:
- persistence
mitre_techniques:
- T1583.003
risk_score: 45
resource: security_group
source: default
is_active: true
domain: network_security_and_connectivity
action_category: network
log_source_type: 
posture_category: workload_posture
threat_tags:
- T1583.003
- T1583
- remote_execution
- cloud_exec
risk_indicators:
  actor_type: cloud_principal
  action_type: network_change
  target_type: network_resource
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 3.1
  - 5.1
  cis_azure_v2:
  - 5.1
  - 6.1
  nist_800_53_r5:
  - CM-7
  - SI-3
  - AU-12
  pci_dss_v4:
  - 6.3
  - 10.2
  iso_27001_2022:
  - A.8.19
  - A.8.8
remediation: |
  1. Monitor for unusual compute provisioning in all cloud accounts.
  2. Alert on EC2/VM launches in unexpected regions or with non-standard configurations.
  3. Apply budget controls to detect unauthorized resource provisioning.
references:
- https://attack.mitre.org/techniques/T1583/003/
check_config:
  conditions:
    all:
    - field: service
      op: equals
      value: elasticloadbalancing
    - field: operation
      op: equals
      value: CreateLoadBalancer
version: '1.0'
