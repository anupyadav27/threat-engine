rule_id: aws.netsec.cloudtrail.internet_gateway_attached
service: netsec
provider: aws
check_type: log
severity: high
title: 'Network Security: Internet Gateway Attached'
description: Internet gateway attached to VPC — direct internet exposure added.
rationale: Hijacking SSH sessions enables an attacker to take over an existing authenticated session without re-authenticating, gaining access to all open connections.
threat_category: lateral_movement
mitre_tactics:
- lateral_movement
- initial_access
mitre_techniques:
- T1563.001
- T1190
risk_score: 78
resource: security_group
source: default
is_active: true
domain: network_security_and_connectivity
action_category: network
log_source_type: 
posture_category: network_posture
threat_tags:
- T1563.001
- T1190
- T1563
- lateral_movement
- cloud_pivot
risk_indicators:
  actor_type: cloud_principal
  action_type: network_change
  target_type: network_resource
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 5.1
  - 5.2
  - 5.3
  cis_azure_v2:
  - 6.1
  - 6.2
  nist_800_53_r5:
  - SC-7
  - AC-4
  - SI-3
  pci_dss_v4:
  - 1.2
  - 1.3
  - 7.2
  iso_27001_2022:
  - A.8.20
  - A.8.22
  - A.5.14
remediation: |
  1. Use ControlMaster restrictions to prevent SSH session multiplexing.
  2. Enable SSH session logging and session monitoring.
  3. Use certificate-based authentication with short-lived certificates.
references:
- https://attack.mitre.org/techniques/T1563/001/
- https://attack.mitre.org/techniques/T1190/
check_config:
  conditions:
    all:
    - field: service
      op: equals
      value: ec2
    - field: operation
      op: equals
      value: AttachInternetGateway
version: '1.0'
