rule_id: aws.netsec.cloudtrail.route53_associate_vpc
service: netsec
provider: aws
check_type: log
severity: medium
title: 'Network Security: Route53 Associate VPC'
description: Route53 hosted zone associated with VPC — private DNS resolution scope extended.
rationale: Compromising DNS infrastructure enables domain hijacking, allowing phishing or traffic redirection attacks against legitimate services.
threat_category: lateral_movement
mitre_tactics:
- lateral_movement
mitre_techniques:
- T1584.002
risk_score: 50
resource: security_group
source: default
is_active: true
domain: network_security_and_connectivity
action_category: network
log_source_type: 
posture_category: network_posture
threat_tags:
- T1584.002
- T1584
- lateral_movement
- cloud_pivot
risk_indicators:
  actor_type: cloud_principal
  action_type: network_change
  target_type: network_resource
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 5.1
  - 5.2
  - 5.3
  cis_azure_v2:
  - 6.1
  - 6.2
  nist_800_53_r5:
  - SC-7
  - AC-4
  - SI-3
  pci_dss_v4:
  - 1.2
  - 1.3
  - 7.2
  iso_27001_2022:
  - A.8.20
  - A.8.22
  - A.5.14
remediation: |
  1. Apply MFA to all DNS management accounts.
  2. Enable DNSSEC on all critical domains.
  3. Alert on all DNS zone or record modifications.
references:
- https://attack.mitre.org/techniques/T1584/002/
check_config:
  conditions:
    all:
    - field: service
      op: equals
      value: route53
    - field: operation
      op: equals
      value: AssociateVPCWithHostedZone
version: '1.0'
