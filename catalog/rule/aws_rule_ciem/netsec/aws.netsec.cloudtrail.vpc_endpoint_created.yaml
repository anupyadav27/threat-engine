rule_id: aws.netsec.cloudtrail.vpc_endpoint_created
service: netsec
provider: aws
check_type: log
severity: medium
title: 'Network Security: VPC Endpoint Created'
description: VPC endpoint created — private connectivity to AWS service established.
rationale: Multi-hop proxies (Tor, cloud relays) make it difficult to trace the origin of attacks while maintaining C2 communications to compromised cloud workloads.
threat_category: lateral_movement
mitre_tactics:
- lateral_movement
mitre_techniques:
- T1090.003
risk_score: 50
resource: security_group
source: default
is_active: true
domain: network_security_and_connectivity
action_category: network
log_source_type: 
posture_category: network_posture
threat_tags:
- T1090.003
- T1090
- lateral_movement
- cloud_pivot
risk_indicators:
  actor_type: cloud_principal
  action_type: network_change
  target_type: network_resource
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 5.1
  - 5.2
  - 5.3
  cis_azure_v2:
  - 6.1
  - 6.2
  nist_800_53_r5:
  - SC-7
  - AC-4
  - SI-3
  pci_dss_v4:
  - 1.2
  - 1.3
  - 7.2
  iso_27001_2022:
  - A.8.20
  - A.8.22
  - A.5.14
remediation: |
  1. Block Tor exit node IPs via security group deny rules.
  2. Enable VPC endpoint policies to restrict outbound traffic destinations.
  3. Use cloud-native threat intelligence feeds to block known proxy infrastructure.
references:
- https://attack.mitre.org/techniques/T1090/003/
check_config:
  conditions:
    all:
    - field: service
      op: equals
      value: ec2
    - field: operation
      op: equals
      value: CreateVpcEndpoint
version: '1.0'
