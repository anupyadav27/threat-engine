rule_id: aws.network.cloudtrail.global_accelerator_created
service: network
provider: aws
check_type: log
severity: medium
title: 'Network: Global Accelerator Created'
description: Global Accelerator created — traffic routing through AWS edge network configured.
rationale: Multi-hop proxies (Tor, cloud relays) make it difficult to trace the origin of attacks while maintaining C2 communications to compromised cloud workloads.
threat_category: lateral_movement
mitre_tactics:
- lateral_movement
mitre_techniques:
- T1090.003
risk_score: 60
resource: vpc
