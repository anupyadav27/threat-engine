rule_id: aws.network.flow_log.high_bandwidth_egress
service: network
provider: aws
check_type: log
severity: high
title: 'Network: High Bandwidth Egress'
description: Unusually high outbound bandwidth — bulk data transfer to external destination.
rationale: Exfiltration over alternative protocols bypasses DLP solutions that only inspect standard channels, enabling data theft via DNS, HTTPS, or custom protocols.
threat_category: data_exfiltration
mitre_tactics:
- exfiltration
mitre_techniques:
- T1048
risk_score: 75
resource: vpc
source: ciem_rule_generator
is_active: true
domain: network_security_and_connectivity
action_category: exfiltration
log_source_type: vpc_flow
posture_category: data_security_posture
threat_tags:
- T1048
- data_exfiltration
- data_loss
- network_security
risk_indicators:
  actor_type: cloud_principal
  action_type: data_transfer
  target_type: network_resource
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: true
  modules:
  - data_loss_prevention
  categories:
  - data_exfiltration
  - unauthorized_access
  priority: high
  impact:
    pci: PCI DSS Requirement 12.3 — Implement security awareness program and protect systems
    gdpr: GDPR Article 32 — Appropriate technical and organizational measures for data security
    hipaa: §164.306(a) — Ensure confidentiality, integrity, and availability of ePHI
  sensitive_data_context: |
  Unauthorized data exfiltration on network resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks:
  cis_aws_v3:
  - 2.7
  - 3.7
  cis_azure_v2:
  - 3.1
  - 5.2
  nist_800_53_r5:
  - SC-7
  - SC-28
  - AC-4
  pci_dss_v4:
  - 3.2
  - 4.1
  - 10.2
  iso_27001_2022:
  - A.8.12
  - A.8.20
  - A.5.14
remediation: |
  1. Apply protocol-level egress filtering (default-deny).
  2. Enable DNS query logging and alert on DNS tunneling patterns.
  3. Use a cloud-native CASB solution to inspect all outbound traffic.
references:
- https://attack.mitre.org/techniques/T1048/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: vpc_flow
    - field: direction
      op: equals
      value: egress
    - field: bytes_out
      op: greater_than
      value: 1073741824
  for_each: log_events
  log_source_type: vpc_flow
  type: log
version: '1.0'
