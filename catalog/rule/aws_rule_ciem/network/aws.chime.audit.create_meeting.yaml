rule_id: aws.chime.audit.create_meeting
service: network
provider: aws
check_type: log
severity: low
title: Detect creation of VPC endpoints for VoIP services and privileged Chime meeting
  creation
description: singleton
rationale: Monitoring this activity is essential for detecting adversary collection
  against AWS resources. Unauthorized or unexpected API calls may indicate account
  compromise, privilege escalation, or an active attack chain.
threat_category: collection
mitre_tactics:
- collection
mitre_techniques:
- T1560
risk_score: 55
resource: aws_network_resource
source: csv_generated
is_active: true
domain: logging_monitoring_and_alerting
action_category: create
log_source_type: cloudtrail
posture_category: threat_posture
threat_tags:
- T1560
- collection
- ciem_detection
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  nist_800_171:
  - 3.13.14
remediation: '1. Audit the newly created resource and its associated network access
  rules.

  2. Verify VoIP/communication resources are authorized and properly scoped.

  3. Apply least-privilege NSG/security group rules for VoIP ports.

  4. Monitor for data collection patterns from the resource.

  5. Ensure communication services are deployed via approved templates only.'
references:
- https://attack.mitre.org/techniques/T1560/
- https://docs.aws.amazon.com/IAM/latest/UserGuide/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: cloudtrail
    - field: service
      op: equals
      value: chime
    - field: operation
      op: in
      value:
      - CreateMeeting
      - CreateVpcEndpoint
  type: log
  version: '1.0'
