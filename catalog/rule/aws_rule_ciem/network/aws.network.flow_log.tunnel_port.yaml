rule_id: aws.network.flow_log.tunnel_port
service: network
provider: aws
check_type: log
severity: high
title: 'Network: Tunnel Port'
description: Traffic on tunnel protocol port — possible C2 via protocol tunneling.
rationale: Protocol tunneling encapsulates C2 traffic within legitimate protocols, bypassing firewall rules that allow standard protocols (HTTP, DNS, HTTPS).
threat_category: execution
mitre_tactics:
- command_and_control
mitre_techniques:
- T1572
risk_score: 75
resource: vpc
source: ciem_rule_generator
is_active: true
domain: network_security_and_connectivity
action_category: execute
log_source_type: vpc_flow
posture_category: workload_posture
threat_tags:
- T1572
- remote_execution
- cloud_exec
- network_security
risk_indicators:
  actor_type: cloud_principal
  action_type: execution
  target_type: network_resource
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 3.1
  - 5.1
  cis_azure_v2:
  - 5.1
  - 6.1
  nist_800_53_r5:
  - CM-7
  - SI-3
  - AU-12
  pci_dss_v4:
  - 6.3
  - 10.2
  iso_27001_2022:
  - A.8.19
  - A.8.8
remediation: |
  1. Apply deep packet inspection at all network egress points.
  2. Monitor for unusual traffic patterns in VPC Flow Logs / NSG Flow Logs.
  3. Restrict outbound traffic to required protocols and destinations only.
references:
- https://attack.mitre.org/techniques/T1572/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: vpc_flow
    - field: dst_port
      op: in
      value:
      - 4444
      - 1337
      - 31337
      - 8888
      - 9999
  for_each: log_events
  log_source_type: vpc_flow
  type: log
version: '1.0'
