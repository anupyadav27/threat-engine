rule_id: aws.network.flow_log.dns_exfil
service: network
provider: aws
check_type: log
severity: high
title: 'Network: DNS Exfil'
description: DNS-based data exfiltration pattern detected — data encoded in DNS queries tunneled out.
rationale: Exfiltration via unencrypted protocols is detectable via network inspection; early detection enables intervention before data is fully exfiltrated.
threat_category: data_exfiltration
mitre_tactics:
- exfiltration
- command_and_control
mitre_techniques:
- T1048.003
- T1071.004
risk_score: 80
resource: vpc
source: ciem_rule_generator
is_active: true
domain: network_security_and_connectivity
action_category: exfiltration
log_source_type: cloudtrail
posture_category: data_security_posture
threat_tags:
- T1048.003
- T1071.004
- T1048
- T1071
- data_exfiltration
- data_loss
- network_security
risk_indicators:
  actor_type: cloud_principal
  action_type: data_transfer
  target_type: network_resource
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: true
  modules:
  - data_loss_prevention
  categories:
  - data_exfiltration
  - unauthorized_access
  priority: high
  impact:
    pci: PCI DSS Requirement 12.3 — Implement security awareness program and protect systems
    gdpr: GDPR Article 32 — Appropriate technical and organizational measures for data security
    hipaa: §164.306(a) — Ensure confidentiality, integrity, and availability of ePHI
  sensitive_data_context: |
  Unauthorized data exfiltration on network resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks:
  cis_aws_v3:
  - 2.7
  - 3.7
  cis_azure_v2:
  - 3.1
  - 5.2
  nist_800_53_r5:
  - SC-7
  - SC-28
  - AC-4
  pci_dss_v4:
  - 3.2
  - 4.1
  - 10.2
  iso_27001_2022:
  - A.8.12
  - A.8.20
  - A.5.14
remediation: |
  1. Apply protocol-level egress restrictions (block outbound non-HTTPS traffic).
  2. Enable network flow analysis to detect unencrypted data transfers.
  3. Apply DLP policies on all outbound traffic.
references:
- https://attack.mitre.org/techniques/T1048/003/
- https://attack.mitre.org/techniques/T1071/004/
check_config:
  conditions:
    all:
    - field: network.dst_port
      op: equals
      value: 53
    - field: network.bytes_in
      op: greater_than
      value: 10000
  for_each: log_events
  log_source_type: cloudtrail
  type: log
version: '1.0'
