rule_id: aws.cloudtrail.activity_log.periodic_review
service: logging
provider: aws
check_type: log
severity: medium
title: Detect missing periodic log reviews and anomalous privileged actions across
  AWS services.
description: Detects missing periodic log reviews and anomalous privileged actions.
rationale: Monitoring this activity is essential for detecting adversary defense evasion
  against AWS resources. Unauthorized or unexpected API calls may indicate account
  compromise, privilege escalation, or an active attack chain.
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1562.008
risk_score: 65
resource: aws_logging_resource
source: csv_generated
is_active: true
domain: logging_monitoring_and_alerting
action_category: audit_activity
log_source_type: cloudtrail
posture_category: threat_posture
threat_tags:
- T1562.008
- T1562
- defense_evasion
- ciem_detection
risk_indicators:
  actor_type: cloud_principal
  action_type: read
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: high
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  pci_dss_v4:
  - 10.4.2.1
remediation: '1. Immediately investigate the principal that performed this action
  — treat as potentially compromised.

  2. Restore any disabled/deleted security controls (logging, agents, scanning).

  3. Review the full session context for lateral movement or data exfiltration following
  this action.

  4. Restrict the ability to disable security tools to break-glass roles with MFA
  enforcement.

  5. Add SCPs/Organization Policies to prevent non-authorized disablement of security
  controls.'
references:
- https://attack.mitre.org/techniques/T1562.008/
- https://docs.aws.amazon.com/IAM/latest/UserGuide/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: cloudtrail
    - field: service
      op: equals
      value: cloudtrail
    - field: operation
      op: in
      value:
      - LookupEvents
      - DescribeTrails
  type: log
  version: '1.0'
