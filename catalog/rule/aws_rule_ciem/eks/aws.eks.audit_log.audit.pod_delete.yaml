rule_id: aws.eks.audit_log.audit.pod_delete
service: eks
provider: aws
check_type: log
severity: medium
title: 'EKS: Pod Delete'
description: Kubernetes pod deleted — container workload terminated.
rationale: Account access removal (deleting users, removing MFA) blocks legitimate users from accessing resources and can be used to seize control of cloud accounts.
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1531
risk_score: 45
resource: eks_cluster
source: default
is_active: true
domain: logging_monitoring_and_alerting
action_category: delete
log_source_type: 
posture_category: security_posture
threat_tags:
- T1531
- defense_evasion
- log_tampering
risk_indicators:
  actor_type: cloud_principal
  action_type: destructive
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: critical
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 3.1
  - 3.2
  - 3.3
  - 3.4
  cis_azure_v2:
  - 5.1
  - 5.2
  - 5.3
  nist_800_53_r5:
  - AU-2
  - AU-6
  - AU-12
  - SI-4
  pci_dss_v4:
  - 10.1
  - 10.2
  - 10.3
  iso_27001_2022:
  - A.8.15
  - A.8.16
  - A.5.28
remediation: |
  1. Restore removed accounts or access immediately from a break-glass account.
  2. Review and audit all actions taken by the responsible actor.
  3. Implement role-based approvals for account deletion and access revocation.
  4. Maintain break-glass emergency access accounts with separate credential paths.
references:
- https://attack.mitre.org/techniques/T1531/
- https://learn.microsoft.com/en-us/azure/active-directory/roles/security-emergency-access
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: eks_audit
    - field: operation
      op: equals
      value: delete
    - field: resource.type
      op: equals
      value: pods
version: '1.0'
