rule_id: aws.eks.audit_log.audit.namespace_delete
service: eks
provider: aws
check_type: log
severity: high
title: 'EKS: Namespace Delete'
description: Kubernetes namespace deleted — all resources in namespace destroyed.
rationale: Reverting instances to older snapshots can undo security patches or configuration hardening, re-introducing known vulnerabilities into production workloads.
threat_category: data_destruction
mitre_tactics:
- impact
mitre_techniques:
- T1578.003
risk_score: 75
resource: eks_cluster
source: default
is_active: true
domain: data_protection_and_privacy
action_category: delete
log_source_type: 
posture_category: data_security_posture
threat_tags:
- T1578.003
- T1578
- data_destruction
- impact
risk_indicators:
  actor_type: cloud_principal
  action_type: destructive
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: true
  modules:
  - data_loss_prevention
  categories:
  - data_loss
  - availability_impact
  priority: high
  impact:
    pci: PCI DSS Requirement 12.3 — Implement security awareness program and protect systems
    gdpr: GDPR Article 32 — Appropriate technical and organizational measures for data security
    hipaa: §164.306(a) — Ensure confidentiality, integrity, and availability of ePHI
  sensitive_data_context: |
  Unauthorized data destruction on eks resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks:
  cis_aws_v3:
  - 2.1
  - 2.6
  - 3.1
  cis_azure_v2:
  - 3.1
  - 7.5
  nist_800_53_r5:
  - CP-9
  - CP-10
  - SI-12
  pci_dss_v4:
  - 3.2
  - 3.3
  - 12.3
  iso_27001_2022:
  - A.8.13
  - A.8.14
  - A.5.33
remediation: |
  1. Restrict revert/restore operations to formal change management workflows.
  2. Alert on unauthorized instance restoration events.
  3. Require MFA and approval for snapshot restoration to production.
references:
- https://attack.mitre.org/techniques/T1578/003/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: eks_audit
    - field: operation
      op: equals
      value: delete
    - field: resource.type
      op: equals
      value: namespaces
version: '1.0'
