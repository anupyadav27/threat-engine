rule_id: aws.eks.audit_log.audit.secret_create
service: eks
provider: aws
check_type: log
severity: medium
title: 'EKS: Secret Create'
description: Kubernetes Secret created — credential data stored in cluster.
rationale: Container secrets, Kubernetes secrets, and environment variables can expose sensitive credentials to any process with read access to the container environment.
threat_category: persistence
mitre_tactics:
- persistence
mitre_techniques:
- T1552.007
risk_score: 55
resource: eks_cluster
source: default
is_active: true
domain: cryptography_and_key_management
action_category: create
log_source_type: 
posture_category: iam_posture
threat_tags:
- T1552.007
- T1552
- persistence
- backdoor
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: true
  modules:
  - secrets_management
  categories:
  - sensitive_data_access
  priority: medium
  impact:
    pci: PCI DSS Requirement 3.4 — Sensitive authentication data must be protected
    gdpr: GDPR Article 32 — Appropriate technical measures to protect personal data
    hipaa: §164.312(e)(2)(ii) — Encryption of ePHI in transit and at rest
  sensitive_data_context: |
  Unauthorized persistence on eks resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks:
  cis_aws_v3:
  - 1.1
  - 1.4
  - 1.16
  cis_azure_v2:
  - 1.1
  - 2.1
  - 2.9
  nist_800_53_r5:
  - AC-2
  - AC-6
  - IA-2
  - SC-7
  pci_dss_v4:
  - 7.1
  - 8.2
  - 10.2
  iso_27001_2022:
  - A.8.2
  - A.9.2
  - A.5.18
remediation: |
  1. Remove sensitive data from container environment variables.
  2. Use Kubernetes Secrets Store CSI Driver or Vault Agent for secrets injection.
  3. Enable encryption for Kubernetes Secrets at rest.
  4. Restrict access to secrets using Kubernetes RBAC least-privilege policies.
references:
- https://attack.mitre.org/techniques/T1552/007/
- https://kubernetes.io/docs/concepts/configuration/secret/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: eks_audit
    - field: operation
      op: equals
      value: create
    - field: resource.type
      op: equals
      value: secrets
version: '1.0'
