rule_id: aws.eks.audit_log.audit.clusterrole_create
service: eks
provider: aws
check_type: log
severity: high
title: 'EKS: Clusterrole Create'
description: Kubernetes ClusterRole created — cluster-wide container cluster permissions defined.
rationale: 'Adversaries add roles or permissions to service accounts or workload identities to maintain persistent access to container orchestration systems. Creating Kubernetes RoleBindings or ClusterRoleBindings for attacker-controlled identities enables cluster-wide command execution. Detected via: high-privilege role assignments outside CI/CD automation, bindings from unfamiliar IP addresses, and unexpected ServiceAccount token creation.'
threat_category: privilege_escalation
mitre_tactics:
- privilege_escalation
mitre_techniques:
- T1098.006
risk_score: 75
resource: eks_cluster
source: default
is_active: true
domain: identity_and_access_management
action_category: create
posture_category: iam_posture
threat_tags:
- T1098.006
- T1098
- cloud_iam
- privilege_escalation
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 1.1
  - 1.16
  - 1.17
  cis_azure_v2:
  - 1.1
  - 2.1
  - 3.1
  nist_800_53_r5:
  - AC-2
  - AC-3
  - AC-6
  - IA-2
  pci_dss_v4:
  - 7.1
  - 7.2
  - 8.2
  iso_27001_2022:
  - A.5.18
  - A.8.2
  - A.8.3
detection_events:
- rolebindings/create
- clusterrolebindings/create
- serviceaccounts/create
remediation: |
  1. Immediately delete the unauthorized credential from the service principal.
  2. Rotate all existing credentials for the affected identity.
  3. Review the service principal's permission scope and reduce if excessive.
  4. Require approved change management for credential operations.
  5. Use Managed Identities instead of explicit credentials where possible.
references:
- https://attack.mitre.org/techniques/T1098/006/
- https://learn.microsoft.com/en-us/azure/active-directory/develop/howto-create-service-principal-portal
- https://learn.microsoft.com/en-us/entra/workload-id/workload-identities-overview
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: eks_audit
    - field: operation
      op: equals
      value: create
    - field: resource.type
      op: equals
      value: clusterroles
version: '1.0'
