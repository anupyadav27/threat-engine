rule_id: aws.eks.audit_log.audit.pod_exec
service: eks
provider: aws
check_type: log
severity: high
title: 'EKS: Pod Exec'
description: kubectl exec in pod detected — direct shell access via Kubernetes container CLI.
rationale: Cloud API execution via CLIs (AWS CLI, Azure CLI, kubectl) can automate malicious operations at scale within cloud environments without requiring UI access.
threat_category: execution
mitre_tactics:
- execution
mitre_techniques:
- T1059.013
risk_score: 80
resource: eks_cluster
source: default
is_active: true
domain: compute_and_workload_security
action_category: execute
log_source_type: 
posture_category: workload_posture
threat_tags:
- T1059.013
- T1059
- remote_execution
- cloud_exec
risk_indicators:
  actor_type: cloud_principal
  action_type: execution
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 3.1
  - 5.1
  cis_azure_v2:
  - 5.1
  - 6.1
  nist_800_53_r5:
  - CM-7
  - SI-3
  - AU-12
  pci_dss_v4:
  - 6.3
  - 10.2
  iso_27001_2022:
  - A.8.19
  - A.8.8
remediation: |
  1. Enable CloudTrail / Activity Log monitoring for all API calls.
  2. Apply RBAC restrictions to limit the scope of all API call permissions.
  3. Alert on anomalous API usage patterns (unusual regions, APIs, or timing).
references:
- https://attack.mitre.org/techniques/T1059/013/
- https://docs.aws.amazon.com/awscloudtrail/latest/userguide/cloudtrail-concepts.html
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: eks_audit
    - field: operation
      op: equals
      value: create
    - field: resource.type
      op: equals
      value: pods/exec
version: '1.0'
