rule_id: aws.eks.audit_log.audit.pod_portforward
service: eks
provider: aws
check_type: log
severity: high
title: 'EKS: Pod Portforward'
description: kubectl port-forward — local port tunneled to pod; lateral access established.
rationale: Hijacking SSH sessions enables an attacker to take over an existing authenticated session without re-authenticating, gaining access to all open connections.
threat_category: lateral_movement
mitre_tactics:
- lateral_movement
mitre_techniques:
- T1563.001
risk_score: 75
resource: eks_cluster
source: default
is_active: true
domain: network_security_and_connectivity
action_category: network
log_source_type: 
posture_category: network_posture
threat_tags:
- T1563.001
- T1563
- lateral_movement
- cloud_pivot
risk_indicators:
  actor_type: cloud_principal
  action_type: network_change
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 5.1
  - 5.2
  - 5.3
  cis_azure_v2:
  - 6.1
  - 6.2
  nist_800_53_r5:
  - SC-7
  - AC-4
  - SI-3
  pci_dss_v4:
  - 1.2
  - 1.3
  - 7.2
  iso_27001_2022:
  - A.8.20
  - A.8.22
  - A.5.14
remediation: |
  1. Use ControlMaster restrictions to prevent SSH session multiplexing.
  2. Enable SSH session logging and session monitoring.
  3. Use certificate-based authentication with short-lived certificates.
references:
- https://attack.mitre.org/techniques/T1563/001/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: eks_audit
    - field: operation
      op: equals
      value: create
    - field: resource.type
      op: equals
      value: pods/portforward
version: '1.0'
