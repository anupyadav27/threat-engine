rule_id: aws.paas.cloudtrail.sqs_delete_queue
service: paas
provider: aws
check_type: log
severity: low
title: 'PaaS: SQS Delete Queue'
description: SQS queue deleted — message queue destroyed.
rationale: Account access removal (deleting users, removing MFA) blocks legitimate users from accessing resources and can be used to seize control of cloud accounts.
threat_category: data_destruction
mitre_tactics:
- impact
mitre_techniques:
- T1531
risk_score: 30
resource: aws_service
source: default
is_active: true
domain: compute_and_workload_security
action_category: delete
log_source_type: 
posture_category: data_security_posture
threat_tags:
- T1531
- data_destruction
- impact
risk_indicators:
  actor_type: cloud_principal
  action_type: destructive
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: true
  modules:
  - data_loss_prevention
  categories:
  - data_loss
  - availability_impact
  priority: low
  impact:
    pci: PCI DSS Requirement 12.3 — Implement security awareness program and protect systems
    gdpr: GDPR Article 32 — Appropriate technical and organizational measures for data security
    hipaa: §164.306(a) — Ensure confidentiality, integrity, and availability of ePHI
  sensitive_data_context: |
  Unauthorized data destruction on paas resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks:
  cis_aws_v3:
  - 2.1
  - 2.6
  - 3.1
  cis_azure_v2:
  - 3.1
  - 7.5
  nist_800_53_r5:
  - CP-9
  - CP-10
  - SI-12
  pci_dss_v4:
  - 3.2
  - 3.3
  - 12.3
  iso_27001_2022:
  - A.8.13
  - A.8.14
  - A.5.33
remediation: |
  1. Restore removed accounts or access immediately from a break-glass account.
  2. Review and audit all actions taken by the responsible actor.
  3. Implement role-based approvals for account deletion and access revocation.
  4. Maintain break-glass emergency access accounts with separate credential paths.
references:
- https://attack.mitre.org/techniques/T1531/
- https://learn.microsoft.com/en-us/azure/active-directory/roles/security-emergency-access
check_config:
  conditions:
    all:
    - field: service
      op: equals
      value: sqs
    - field: operation
      op: equals
      value: DeleteQueue
version: '1.0'
