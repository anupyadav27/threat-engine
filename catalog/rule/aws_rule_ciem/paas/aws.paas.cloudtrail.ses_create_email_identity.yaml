rule_id: aws.paas.cloudtrail.ses_create_email_identity
service: paas
provider: aws
check_type: log
severity: medium
title: 'PaaS: Ses Create Email Identity'
description: SES email identity created — email sending capability provisioned; potential phishing base.
rationale: Creating cloud email or cloud accounts for attack purposes enables phishing and social engineering attacks appearing to come from legitimate cloud providers.
threat_category: persistence
mitre_tactics:
- persistence
mitre_techniques:
- T1585.002
risk_score: 55
resource: aws_service
source: default
is_active: true
domain: compute_and_workload_security
action_category: create
log_source_type: 
posture_category: iam_posture
threat_tags:
- T1585.002
- T1585
- persistence
- backdoor
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 1.1
  - 1.4
  - 1.16
  cis_azure_v2:
  - 1.1
  - 2.1
  - 2.9
  nist_800_53_r5:
  - AC-2
  - AC-6
  - IA-2
  - SC-7
  pci_dss_v4:
  - 7.1
  - 8.2
  - 10.2
  iso_27001_2022:
  - A.8.2
  - A.9.2
  - A.5.18
remediation: |
  1. Monitor for new cloud account creation events outside approved provisioning.
  2. Apply email filtering to detect phishing from cloud provider addresses.
  3. Enable DMARC/DKIM/SPF for all owned domains.
references:
- https://attack.mitre.org/techniques/T1585/002/
check_config:
  conditions:
    all:
    - field: service
      op: equals
      value: ses
    - field: operation
      op: equals
      value: CreateEmailIdentity
version: '1.0'
