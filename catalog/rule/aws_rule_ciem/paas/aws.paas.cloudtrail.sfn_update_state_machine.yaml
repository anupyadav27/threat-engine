rule_id: aws.paas.cloudtrail.sfn_update_state_machine
service: paas
provider: aws
check_type: log
severity: medium
title: 'PaaS: Sfn Update State Machine'
description: Step Functions state machine updated — workflow logic or IAM role changed.
rationale: 'Adversaries abuse cloud management services such as AWS Systems Manager (Run Command), Azure VM RunCommand, or Automation Runbooks to execute commands within virtual machines via installed agents — achieving remote code execution through the cloud control plane without requiring network access to the instance. Detected via: SSM RunCommand / Azure RunCommand API calls by unexpected users, command execution outside maintenance windows, and service account-initiated script execution atypical for admin tasks.'
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1651
risk_score: 50
resource: aws_service
source: default
is_active: true
domain: compute_and_workload_security
action_category: modify
posture_category: security_posture
threat_tags:
- T1651
- defense_evasion
- log_tampering
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: critical
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 3.1
  - 3.2
  - 3.3
  - 3.4
  cis_azure_v2:
  - 5.1
  - 5.2
  - 5.3
  nist_800_53_r5:
  - AU-2
  - AU-6
  - AU-12
  - SI-4
  pci_dss_v4:
  - 10.1
  - 10.2
  - 10.3
  iso_27001_2022:
  - A.8.15
  - A.8.16
  - A.5.28
detection_events:
- 'ssm:SendCommand'
- Microsoft.Compute/virtualMachines/runCommand/action
- Microsoft.Automation/automationAccounts/runbooks/publish/action
- 'ec2:GetConsoleOutput (post-execution evidence gathering)'
remediation: |
  1. Restrict Systems Manager Run Command / VM extension write permissions via RBAC.
  2. Enable logging for all Run Command executions and VM extension deployments.
  3. Use approved patch management instead of ad-hoc run commands.
  4. Alert on Run Command / RunShellScript executions by non-standard principals.
references:
- https://attack.mitre.org/techniques/T1651/
- https://docs.aws.amazon.com/systems-manager/latest/userguide/run-command.html
- https://learn.microsoft.com/en-us/azure/virtual-machines/extensions/overview
check_config:
  conditions:
    all:
    - field: service
      op: equals
      value: states
    - field: operation
      op: equals
      value: UpdateStateMachine
version: '1.0'
