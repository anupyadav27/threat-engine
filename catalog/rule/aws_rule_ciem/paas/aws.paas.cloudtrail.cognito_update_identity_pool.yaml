rule_id: aws.paas.cloudtrail.cognito_update_identity_pool
service: paas
provider: aws
check_type: log
severity: medium
title: 'PaaS: Cognito Update Identity Pool'
description: Cognito identity pool updated — federated identity configuration changed.
rationale: Registering or modifying device identities in cloud directories can enable attackers to bypass device-based Conditional Access policies and establish persistent access.
threat_category: persistence
mitre_tactics:
- persistence
mitre_techniques:
- T1098.005
risk_score: 55
resource: aws_service
source: default
is_active: true
domain: compute_and_workload_security
action_category: modify
log_source_type: 
posture_category: iam_posture
threat_tags:
- T1098.005
- T1098
- persistence
- backdoor
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 1.1
  - 1.4
  - 1.16
  cis_azure_v2:
  - 1.1
  - 2.1
  - 2.9
  nist_800_53_r5:
  - AC-2
  - AC-6
  - IA-2
  - SC-7
  pci_dss_v4:
  - 7.1
  - 8.2
  - 10.2
  iso_27001_2022:
  - A.8.2
  - A.9.2
  - A.5.18
remediation: |
  1. Review and remove unauthorized device registrations.
  2. Enable device registration restrictions in Entra ID.
  3. Require device compliance via Intune for resource access.
  4. Monitor device registration events in Entra audit logs.
references:
- https://attack.mitre.org/techniques/T1098/005/
- https://learn.microsoft.com/en-us/azure/active-directory/devices/manage-device-identities
check_config:
  conditions:
    all:
    - field: service
      op: equals
      value: cognito-identity
    - field: operation
      op: equals
      value: UpdateIdentityPool
version: '1.0'
