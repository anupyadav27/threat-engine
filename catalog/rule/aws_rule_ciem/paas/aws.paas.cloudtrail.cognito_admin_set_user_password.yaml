rule_id: aws.paas.cloudtrail.cognito_admin_set_user_password
service: paas
provider: aws
check_type: log
severity: high
title: 'PaaS: Cognito Admin Set User Password'
description: Cognito admin set user password — account credentials reset by admin.
rationale: Adding credentials to accounts enables persistence and lateral movement using existing trusted identities, potentially bypassing MFA and conditional access policies.
threat_category: identity_manipulation
mitre_tactics:
- credential_access
mitre_techniques:
- T1098.001
risk_score: 70
resource: aws_service
source: default
is_active: true
domain: compute_and_workload_security
action_category: audit_activity
log_source_type: 
posture_category: iam_posture
threat_tags:
- T1098.001
- T1098
- cloud_iam
- identity_manipulation
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - password_policy
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 1.1
  - 1.16
  - 1.22
  cis_azure_v2:
  - 1.1
  - 2.1
  nist_800_53_r5:
  - AC-2
  - AC-3
  - IA-2
  pci_dss_v4:
  - 7.1
  - 8.2
  iso_27001_2022:
  - A.5.18
  - A.8.2
remediation: |
  1. Revoke the newly added credential immediately.
  2. Review all credentials associated with the account.
  3. Investigate the actor's session for additional malicious activity.
  4. Enforce MFA and conditional access policies for all credential operations.
  5. Use Privileged Identity Management (PIM) for just-in-time access.
references:
- https://attack.mitre.org/techniques/T1098/001/
- https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_access-keys.html
check_config:
  conditions:
    all:
    - field: service
      op: equals
      value: cognito-idp
    - field: operation
      op: equals
      value: AdminSetUserPassword
version: '1.0'
