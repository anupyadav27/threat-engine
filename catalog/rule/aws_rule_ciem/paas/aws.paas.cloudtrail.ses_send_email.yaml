rule_id: aws.paas.cloudtrail.ses_send_email
service: paas
provider: aws
check_type: log
severity: medium
title: 'PaaS: Ses Send Email'
description: Email sent via SES — may indicate phishing campaign or data exfiltration via email.
rationale: Spear phishing with attachments targets cloud users with malicious files that can capture credentials or establish persistent cloud account access.
threat_category: initial_access
mitre_tactics:
- initial_access
mitre_techniques:
- T1566.001
risk_score: 55
resource: aws_service
source: default
is_active: true
domain: compute_and_workload_security
action_category: audit_activity
log_source_type: 
posture_category: threat_posture
threat_tags:
- T1566.001
- T1566
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 1.14
  - 2.1
  cis_azure_v2:
  - 1.2
  - 2.1
  nist_800_53_r5:
  - AC-17
  - IA-2
  - SI-3
  pci_dss_v4:
  - 8.3
  - 11.5
  iso_27001_2022:
  - A.8.5
  - A.9.4
remediation: |
  1. Enable Microsoft Defender for Office 365 / AWS SES email filtering.
  2. Apply email attachment sandboxing and safe links protection.
  3. Conduct regular phishing awareness training for all users.
references:
- https://attack.mitre.org/techniques/T1566/001/
check_config:
  conditions:
    all:
    - field: service
      op: equals
      value: ses
    - field: operation
      op: equals
      value: SendEmail
version: '1.0'
