rule_id: aws.waf.web_acl_log.anonymous_ip_block
service: waf
provider: aws
check_type: log
severity: medium
title: 'WAF: Anonymous IP Block'
description: WAF blocked request from anonymous IP (Tor/VPN/proxy) — potential attacker anonymization.
rationale: Proxied connections through cloud infrastructure conceal the true origin of attacks and bypass IP-based blocking measures.
threat_category: web_attack
mitre_tactics:
- initial_access
mitre_techniques:
- T1090
risk_score: 55
resource: waf_webacl
source: default
is_active: true
domain: network_security_and_connectivity
action_category: create
log_source_type: 
posture_category: threat_posture
threat_tags:
- T1090
- waf
- web_security
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks: {}
remediation: |
  1. Monitor for unusual outbound connection patterns from cloud resources.
  2. Restrict outbound internet access via security groups (default-deny egress).
  3. Apply CASB policies to detect and block proxy usage.
references:
- https://attack.mitre.org/techniques/T1090/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: waf
    - field: operation
      op: equals
      value: BLOCK
    - field: resource_name
      op: contains
      value: AnonymousIP
version: '1.0'
