rule_id: aws.waf.web_acl_log.rate_limit_triggered
service: waf
provider: aws
check_type: log
severity: medium
title: 'WAF: Rate Limit Triggered'
description: WAF rate-based rule triggered — excessive request volume from single source.
rationale: Network denial-of-service from or via cloud resources can indicate compromise of cloud assets being weaponized for DDoS campaigns against external targets.
threat_category: web_attack
mitre_tactics:
- initial_access
mitre_techniques:
- T1498
risk_score: 55
resource: waf_webacl
source: default
is_active: true
domain: network_security_and_connectivity
action_category: create
log_source_type: 
posture_category: threat_posture
threat_tags:
- T1498
- waf
- web_security
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks: {}
remediation: |
  1. Revoke credentials used to create DDoS-capable resources.
  2. Enable AWS Shield Advanced / Azure DDoS Protection with alerting.
  3. Alert on creation of high-bandwidth resources by non-standard principals.
references:
- https://attack.mitre.org/techniques/T1498/
- https://learn.microsoft.com/en-us/azure/ddos-protection/ddos-protection-overview
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: waf
    - field: operation
      op: equals
      value: BLOCK
    - field: resource_name
      op: contains
      value: RateLimit
version: '1.0'
