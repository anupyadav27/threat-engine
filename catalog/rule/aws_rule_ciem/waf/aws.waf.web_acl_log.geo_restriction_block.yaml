rule_id: aws.waf.web_acl_log.geo_restriction_block
service: waf
provider: aws
check_type: log
severity: medium
title: 'WAF: Geo Restriction Block'
description: WAF geo-restriction blocked request from prohibited country.
rationale: Gathering cloud target information (account IDs, domain names, IP ranges) enables more targeted and stealthy follow-on attacks.
threat_category: web_attack
mitre_tactics:
- initial_access
mitre_techniques:
- T1590
risk_score: 45
resource: waf_webacl
source: default
is_active: true
domain: network_security_and_connectivity
action_category: create
log_source_type: 
posture_category: threat_posture
threat_tags:
- T1590
- waf
- web_security
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks: {}
remediation: |
  1. Minimize public exposure of cloud account IDs and infrastructure details.
  2. Monitor for reconnaissance patterns in public-facing API endpoints.
  3. Use AWS Shield Advanced / Azure DDoS Protection for reconnaissance detection.
references:
- https://attack.mitre.org/techniques/T1590/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: waf
    - field: operation
      op: equals
      value: BLOCK
    - field: resource_name
      op: contains
      value: Geo
version: '1.0'
