rule_id: aws.devops.cloudtrail.codepipeline_create_pipeline
service: devops
provider: aws
check_type: log
severity: medium
title: 'DevOps: Codepipeline Create Pipeline'
description: CodePipeline created — CI/CD automation workflow established.
rationale: Software deployment tool abuse enables attackers to deploy malicious software across multiple systems via CI/CD pipelines or deployment platforms.
threat_category: persistence
mitre_tactics:
- persistence
mitre_techniques:
- T1072
risk_score: 50
resource: codepipeline
source: default
is_active: true
domain: configuration_and_change_management
action_category: create
log_source_type: 
posture_category: iam_posture
threat_tags:
- T1072
- persistence
- backdoor
- cicd
- devops_security
risk_indicators:
  actor_type: cicd_service_principal
  action_type: write
  target_type: cicd_pipeline
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 1.1
  - 1.4
  - 1.16
  cis_azure_v2:
  - 1.1
  - 2.1
  - 2.9
  nist_800_53_r5:
  - AC-2
  - AC-6
  - IA-2
  - SC-7
  pci_dss_v4:
  - 7.1
  - 8.2
  - 10.2
  iso_27001_2022:
  - A.8.2
  - A.9.2
  - A.5.18
remediation: |
  1. Restrict deployment tool access to authorized principals with MFA enforcement.
  2. Require code signing and approval workflows for all deployments.
  3. Enable audit logging for all software deployment operations.
references:
- https://attack.mitre.org/techniques/T1072/
check_config:
  conditions:
    all:
    - field: service
      op: equals
      value: codepipeline
    - field: operation
      op: equals
      value: CreatePipeline
version: '1.0'
