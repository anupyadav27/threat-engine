rule_id: aws.vpc.flow_log.rejected_traffic
service: vpc
provider: aws
check_type: log
severity: low
title: 'VPC: Rejected Traffic'
description: VPC flow log rejected traffic — connection blocked by security group or NACL.
rationale: 'Network service scanning maps the cloud environment''s attack surface; early detection of reconnaissance activity can preempt follow-on attacks.'
threat_category: discovery
mitre_tactics:
- discovery
mitre_techniques:
- T1046
risk_score: 25
resource: vpc
source: default
is_active: true
domain: network_security_and_connectivity
action_category: create
log_source_type: 
posture_category: threat_posture
threat_tags:
- T1046
- network_security
- vpc
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: network_resource
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks: {}
remediation: |
  1. Investigate the source IP and principal performing the scan.
  2. Apply NSG/security group rules to limit service scan visibility.
  3. Enable VPC Flow Logs / NSG Flow Logs to detect scanning patterns.
  4. Block or throttle API calls from suspicious scan sources.
references:
- https://attack.mitre.org/techniques/T1046/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: vpc_flow
    - field: network.flow_action
      op: equals
      value: REJECT
version: '1.0'
