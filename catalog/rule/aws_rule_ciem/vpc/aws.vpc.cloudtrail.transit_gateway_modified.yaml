rule_id: aws.vpc.cloudtrail.transit_gateway_modified
service: vpc
provider: aws
check_type: log
severity: medium
title: 'VPC: Transit Gateway Modified'
description: Transit gateway modified — inter-VPC routing changed.
rationale: Hijacking SSH sessions enables an attacker to take over an existing authenticated session without re-authenticating, gaining access to all open connections.
threat_category: lateral_movement
mitre_tactics:
- lateral_movement
mitre_techniques:
- T1563.001
risk_score: 55
resource: vpc
source: ciem_rule_generator
is_active: true
domain: network_security_and_connectivity
action_category: audit_activity
log_source_type: cloudtrail
posture_category: network_posture
threat_tags:
- T1563.001
- T1563
- lateral_movement
- cloud_pivot
- network_security
- vpc
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: network_resource
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 5.1
  - 5.2
  - 5.3
  cis_azure_v2:
  - 6.1
  - 6.2
  nist_800_53_r5:
