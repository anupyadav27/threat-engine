rule_id: aws.vpc.cloudtrail.network_acl_permissive
service: vpc
provider: aws
check_type: log
severity: high
title: 'VPC: Network ACL Permissive'
description: Network ACL rule permits all traffic — subnet-level security control removed.
rationale: Weakening or disabling cloud security policies reduces the enforcement surface for compliance controls and may allow prohibited actions to succeed silently.
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1562.007
risk_score: 72
resource: vpc
source: ciem_rule_generator
is_active: true
domain: network_security_and_connectivity
action_category: audit_activity
log_source_type: cloudtrail
posture_category: security_posture
threat_tags:
- T1562.007
- T1562
- defense_evasion
- log_tampering
- network_security
- vpc
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: network_resource
  blast_radius: resource_group
  stealth_risk: critical
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 3.1
  - 3.2
  - 3.3
  - 3.4
  cis_azure_v2:
  - 5.1
