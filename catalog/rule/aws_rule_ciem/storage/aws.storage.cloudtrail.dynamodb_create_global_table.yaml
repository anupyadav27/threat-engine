rule_id: aws.storage.cloudtrail.dynamodb_create_global_table
service: storage
provider: aws
check_type: log
severity: low
title: 'Storage: Dynamodb Create Global Table'
description: DynamoDB global table created — replicated database provisioned.
rationale: 'Adversaries create new instances or VMs within cloud accounts to execute from a clean environment that bypasses existing firewall rules and permissions tied to existing resources. Fresh compute resources are also used for cryptomining, C2 hosting, or as pivot points. Detected via: VM launch by rarely-used or newly-created accounts, instance creation from unexpected geographic locations, and large instance type selection.'
threat_category: execution
mitre_tactics:
- persistence
mitre_techniques:
- T1578.002
risk_score: 30
resource: storage_resource
source: default
is_active: true
domain: data_protection_and_privacy
action_category: create
posture_category: workload_posture
threat_tags:
- T1578.002
- T1578
- remote_execution
- cloud_exec
- storage_access
- data
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: storage_account
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: true
  modules:
  - data_access_governance
  categories:
  - sensitive_data_access
  priority: low
  impact:
    pci: PCI DSS Requirement 3.1 — Minimize cardholder data storage
    gdpr: GDPR Article 25 — Data protection by design; minimize data exposure
    hipaa: §164.312(a)(1) — Access controls on data repositories containing ePHI
compliance_frameworks:
  cis_aws_v3:
  - 3.1
  - 5.1
  cis_azure_v2:
  - 5.1
  - 6.1
  nist_800_53_r5:
  - CM-7
  - SI-3
  - AU-12
  pci_dss_v4:
  - 6.3
  - 10.2
  iso_27001_2022:
  - A.8.19
  - A.8.8
detection_events:
- 'ec2:RunInstances'
- Microsoft.Compute/virtualMachines/write
- 'containers:create with privileged=true'
remediation: |
  1. Restrict snapshot creation permissions to authorized backup roles.
  2. Alert on snapshot exports or cross-account snapshot copy operations.
  3. Enable encryption for all EBS / managed disk snapshots.
references:
- https://attack.mitre.org/techniques/T1578/002/
check_config:
  conditions:
    all:
    - field: service
      op: equals
      value: dynamodb
    - field: operation
      op: equals
      value: CreateGlobalTable
version: '1.0'
