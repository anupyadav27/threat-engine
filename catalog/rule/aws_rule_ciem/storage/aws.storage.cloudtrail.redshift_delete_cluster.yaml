rule_id: aws.storage.cloudtrail.redshift_delete_cluster
service: storage
provider: aws
check_type: log
severity: high
title: 'Storage: Redshift Delete Cluster'
description: Kubernetes cluster deleted — container orchestration environment destroyed.
rationale: Reverting instances to older snapshots can undo security patches or configuration hardening, re-introducing known vulnerabilities into production workloads.
threat_category: data_destruction
mitre_tactics:
- impact
mitre_techniques:
- T1578.003
risk_score: 80
resource: storage_resource
source: default
is_active: true
domain: data_protection_and_privacy
action_category: delete
log_source_type: 
posture_category: data_security_posture
threat_tags:
- T1578.003
- T1578
- data_destruction
- impact
- storage_access
- data
risk_indicators:
  actor_type: cloud_principal
  action_type: destructive
  target_type: storage_account
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: true
  modules:
  - data_access_governance
  - database_security
  - data_loss_prevention
  categories:
  - data_loss
  - availability_impact
  priority: high
  impact:
    pci: PCI DSS Requirement 3.1 — Minimize cardholder data storage
    gdpr: GDPR Article 25 — Data protection by design; minimize data exposure
    hipaa: §164.312(a)(1) — Access controls on data repositories containing ePHI
  sensitive_data_context: |
  Unauthorized data destruction on storage resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks:
  cis_aws_v3:
  - 2.1
  - 2.6
  - 3.1
  cis_azure_v2:
  - 3.1
  - 7.5
  nist_800_53_r5:
  - CP-9
  - CP-10
  - SI-12
  pci_dss_v4:
  - 3.2
  - 3.3
  - 12.3
  iso_27001_2022:
  - A.8.13
  - A.8.14
  - A.5.33
remediation: |
  1. Restrict revert/restore operations to formal change management workflows.
  2. Alert on unauthorized instance restoration events.
  3. Require MFA and approval for snapshot restoration to production.
references:
- https://attack.mitre.org/techniques/T1578/003/
check_config:
  conditions:
    all:
    - field: service
      op: equals
      value: redshift
    - field: operation
      op: equals
      value: DeleteCluster
version: '1.0'
