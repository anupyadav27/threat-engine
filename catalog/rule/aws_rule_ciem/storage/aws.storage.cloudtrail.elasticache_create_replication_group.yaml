rule_id: aws.storage.cloudtrail.elasticache_create_replication_group
service: storage
provider: aws
check_type: log
severity: low
title: 'Storage: Elasticache Create Replication Group'
description: ElastiCache replication group created — in-memory cache cluster provisioned.
rationale: 'Adversaries create new instances or VMs within cloud accounts to execute from a clean environment that bypasses existing firewall rules and permissions tied to existing resources. Fresh compute resources are also used for cryptomining, C2 hosting, or as pivot points. Detected via: VM launch by rarely-used or newly-created accounts, instance creation from unexpected geographic locations, and large instance type selection.'
threat_category: persistence
mitre_tactics:
- persistence
mitre_techniques:
- T1578.002
risk_score: 30
resource: storage_resource
source: default
is_active: true
domain: data_protection_and_privacy
action_category: create
posture_category: iam_posture
threat_tags:
- T1578.002
- T1578
- persistence
- backdoor
- storage_access
- data
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: storage_account
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: true
  modules:
  - data_access_governance
  - database_security
  categories:
  - sensitive_data_access
  priority: low
  impact:
    pci: PCI DSS Requirement 3.1 — Minimize cardholder data storage
    gdpr: GDPR Article 25 — Data protection by design; minimize data exposure
    hipaa: §164.312(a)(1) — Access controls on data repositories containing ePHI
compliance_frameworks:
  cis_aws_v3:
  - 1.1
  - 1.4
  - 1.16
  cis_azure_v2:
  - 1.1
  - 2.1
  - 2.9
  nist_800_53_r5:
