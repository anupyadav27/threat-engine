  - 7.1
  - 8.2
  - 10.2
  iso_27001_2022:
  - A.8.2
  - A.9.2
  - A.5.18
detection_events:
- 'ec2:RunInstances'
- Microsoft.Compute/virtualMachines/write
- 'containers:create with privileged=true'
remediation: |
  1. Restrict snapshot creation permissions to authorized backup roles.
  2. Alert on snapshot exports or cross-account snapshot copy operations.
  3. Enable encryption for all EBS / managed disk snapshots.
references:
- https://attack.mitre.org/techniques/T1578/002/
check_config:
  conditions:
    all:
    - field: service
      op: equals
