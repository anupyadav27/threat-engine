# Google Workspace — CIS Check Rules
# Source benchmark: CIS Google Workspace 1.2
# Fill in rules per sprint. Each rule maps to a discovery_id above.

tech_type: google_workspace
category: collaboration
cis_benchmark: CIS Google Workspace 1.2

rules:
  - rule_id: google_workspace.cis.auth.password_policy_min_length
    title: "Ensure minimum password length is configured"
    severity: medium
    cis_section: '1'
    nist_controls: [IA-5]
    soc2_criteria: [CC6.1]
    scope: google_workspace.auth.password_policy
    assertion:
      field: min_length
      operator: gte
      expected: 14
    remediation: >
      Configure minimum password length to 14+ characters in the Google Workspace
      password policy settings.

  - rule_id: google_workspace.cis.logging.audit_enabled
    title: "Ensure audit logging is enabled"
    severity: high
    cis_section: '1'
    nist_controls: [AU-2, AU-3]
    soc2_criteria: [CC7.2]
    scope: google_workspace.logging.audit_config
    assertion:
      field: audit_enabled
      operator: equals
      expected: "true"
    remediation: >
      Enable audit logging in Google Workspace configuration.
      Refer to CIS Google Workspace 1.2 for specific settings.

  - rule_id: google_workspace.cis.encryption.tls_enabled
    title: "Ensure TLS/SSL is enabled for all connections"
    severity: high
    cis_section: '1'
    nist_controls: [SC-8, SC-28]
    soc2_criteria: [CC6.7]
    scope: google_workspace.encryption.transport
    assertion:
      field: tls_enabled
      operator: equals
      expected: "true"
    remediation: >
      Enable TLS/SSL encryption for Google Workspace connections.
      Refer to CIS Google Workspace 1.2 for minimum TLS version requirements.

  - rule_id: google_workspace.cis.acl.admin_count
    title: "Ensure the number of administrative accounts is minimized"
    severity: medium
    cis_section: '1'
    nist_controls: [AC-6]
    soc2_criteria: [CC6.3]
    scope: google_workspace.acl.admin_privileges
    assertion:
      field: row_count
      operator: lte
      expected: 3
    remediation: >
      Review and reduce administrative accounts in Google Workspace.
      Apply principle of least privilege.
