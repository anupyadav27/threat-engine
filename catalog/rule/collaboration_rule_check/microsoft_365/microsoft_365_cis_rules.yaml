# Microsoft 365 — CIS Check Rules
# Source benchmark: CIS Microsoft 365 3.0
# Fill in rules per sprint. Each rule maps to a discovery_id above.

tech_type: microsoft_365
category: collaboration
cis_benchmark: CIS Microsoft 365 3.0

rules:
  - rule_id: microsoft_365.cis.auth.password_policy_min_length
    title: "Ensure minimum password length is configured"
    severity: medium
    cis_section: '1'
    nist_controls: [IA-5]
    soc2_criteria: [CC6.1]
    scope: microsoft_365.auth.password_policy
    assertion:
      field: min_length
      operator: gte
      expected: 14
    remediation: >
      Configure minimum password length to 14+ characters in the Microsoft 365
      password policy settings.

  - rule_id: microsoft_365.cis.logging.audit_enabled
    title: "Ensure audit logging is enabled"
    severity: high
    cis_section: '1'
    nist_controls: [AU-2, AU-3]
    soc2_criteria: [CC7.2]
    scope: microsoft_365.logging.audit_config
    assertion:
      field: audit_enabled
      operator: equals
      expected: "true"
    remediation: >
      Enable audit logging in Microsoft 365 configuration.
      Refer to CIS Microsoft 365 3.0 for specific settings.

  - rule_id: microsoft_365.cis.encryption.tls_enabled
    title: "Ensure TLS/SSL is enabled for all connections"
    severity: high
    cis_section: '1'
    nist_controls: [SC-8, SC-28]
    soc2_criteria: [CC6.7]
    scope: microsoft_365.encryption.transport
    assertion:
      field: tls_enabled
      operator: equals
      expected: "true"
    remediation: >
      Enable TLS/SSL encryption for Microsoft 365 connections.
      Refer to CIS Microsoft 365 3.0 for minimum TLS version requirements.

  - rule_id: microsoft_365.cis.acl.admin_count
    title: "Ensure the number of administrative accounts is minimized"
    severity: medium
    cis_section: '1'
    nist_controls: [AC-6]
    soc2_criteria: [CC6.3]
    scope: microsoft_365.acl.admin_privileges
    assertion:
      field: row_count
      operator: lte
      expected: 3
    remediation: >
      Review and reduce administrative accounts in Microsoft 365.
      Apply principle of least privilege.
