  - rule_id: tomcat.cis.6.ssl_protocol_is_set_to_tls_for_secure_connectors
    title: "Ensure SSL Protocol is set to TLS for Secure Connectors"
    severity: high
    category: web_server
    tech_type: tomcat
    automation_type: manual
    cis_benchmark: "CIS_TOMCAT 8_v1.0.0"
    cis_version: "8_v1.0.0"
    cis_control: "6.5"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      The sslProtocol setting determines which protocol Tomcat will use to protect
      traffic. It is recommended that sslProtocol attribute be set to TLS.
    rationale: >
      The TLS protocol does not contain weaknesses that affect other secure
      transport protocols, such as SSLv1 or SSLv2. Therefore, TLS is leveraged to
      protect the confidentiality and integrity of data while in transit.
    audit_procedure: >
      Review server.xml to ensure the sslProtocol attribute is set to TLS for all
      Connectors having SSLEngine set to on.
    remediation: >
      In server.xml, set the sslProtocol attribute to 'TLS' for Connectors having
      SSLEnabled set to true. <Connector … sslProtocol='TLS' … /> Default Value: If
      not specified, the default value of 'TLS' will be used. References: 1.
      http://tomcat.apache.org/tomcat-8.0-doc/ssl-howto.html 2.
      http://tomcat.apache.org/tomcat-8.0-doc/config/http.html 57 | P a g e 7
      Establish and Protect Logging Facilities Enable logging and ensure logs are
      properly protected
    references: >
      1. http://tomcat.apache.org/tomcat-8.0-doc/ssl-howto.html 2.
      http://tomcat.apache.org/tomcat-8.0-doc/config/http.html 57 | P a g e 7
      Establish and Protect Logging Facilities Enable logging and ensure logs are
      properly protected
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_TOMCAT_8_v1_0_0_6_5"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_tomcat_8_v1_0_0_6_5"
