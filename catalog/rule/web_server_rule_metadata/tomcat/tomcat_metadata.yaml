  - rule_id: tomcat.cis.10.turn_off_session_fa_ade_recycling
    title: "Turn off session façade recycling"
    severity: high
    category: web_server
    tech_type: tomcat
    automation_type: manual
    cis_benchmark: "CIS_TOMCAT 8_v1.0.0"
    cis_version: "8_v1.0.0"
    cis_control: "10.7"
    cis_section: "10"
    profile_applicability: "Level 1"
    description: >
      The RECYCLE_FACADES can specify if a new façade will be created for each
      request. If a new façade is not created there is a potential for information
      leakage from other sessions.
    rationale: >
      When RECYCLE_FACADES is set to true, Tomcat will recycle the session façade
      between requests. This will allow for information leakage between requests.
    audit_procedure: >
      Ensure the above parameter is added to the startup script which by default is
      located at $CATALINA_HOME\bin\catalina.sh.
    remediation: >
      Start Tomcat with RECYCLE_FACADES set to false. Add the following to your
      startup script. -Dorg.apache.catalina.connector.RECYCLE_FACADES=false Impact:
      By default, recycling of facades is set to false. If this is true or if a
      security manager is in use a new facade object will be created for each
      request. Default Value: If not specified, the default value of false will be
