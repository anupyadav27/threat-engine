  - rule_id: tomcat.cis.7.configure_log_file_size_limit
    title: "Configure log file size limit"
    severity: medium
    category: web_server
    tech_type: tomcat
    automation_type: manual
    cis_benchmark: "CIS_TOMCAT 8_v1.0.0"
    cis_version: "8_v1.0.0"
    cis_control: "7.7"
    cis_section: "7"
    profile_applicability: "Level 2"
    description: >
      By default, the logging.properties file will have no defined limit for the log
      file size. This is a potential denial of service attack as it would be
      possible to fill a drive or partition containing the log files.
    rationale: >
      Establishing a maximum log size that is smaller than the partition size will
      help mitigate the risk of an attacker maliciously exhausting disk space.
    audit_procedure: >
      Validate the max file limit is not greater than the size of the partition
      where the log files are stored.
    remediation: >
      Create the following entry in your logging.properties file. This field is
      specified in bytes. java.util.logging.FileHandler.limit=10000 Default Value:
      No limit by default. References: 1.
      https://docs.oracle.com/javase/8/docs/api/java/util/logging/FileHandler.html
      64 | P a g e 8 Configure Catalina Policy Configuring Catalina Policy prevents
      web applications from accessing restricted or unknown packages which may be
      malicious or dangerous to the application.
    references: >
