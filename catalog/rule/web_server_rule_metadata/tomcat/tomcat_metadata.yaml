  - rule_id: tomcat.cis.10.increase_the_entropy_in_session_identifiers
    title: "Increase the entropy in session identifiers"
    severity: high
    category: web_server
    tech_type: tomcat
    automation_type: manual
    cis_benchmark: "CIS_TOMCAT 7_v1.0.0"
    cis_version: "7_v1.0.0"
    cis_control: "10.13"
    cis_section: "10"
    profile_applicability: "Level 1"
    description: >
      Having a server that has deterministic session identifiers can lead to session
      hi-jacking. Specifying a secureRandomClass attribute allows for truly random
      session identifiers.
    rationale: >
      By default, the entropy attribute on session managers uses the string
      representation of the Manager class name. Leading to a deterministic session
      identifier.
    audit_procedure: >
      Ensure $CATALINA_HOME/conf/context.xml has the secureRandomClass attribute set
      to java.security.SecureRandom. # grep secureRandomClass
      $CATALINA_HOME/conf/context.xml
    remediation: >
      In $CATALINA_HOME/conf/context.xml, set the following: <Manager ...
      secureRandomClass='java.security.SecureRandom' /> Default Value: By default,
      the string representation of the Manager class is used for entropy.
      References: 1. http://www.jeremythomerson.com/blog/2008/11/apachecon-securing-
      apache- tomcat-for-your-environment/ 81 | P a g e
    references: >
      1. http://www.jeremythomerson.com/blog/2008/11/apachecon-securing-apache-
      tomcat-for-your-environment/ 81 | P a g e
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_TOMCAT_7_v1_0_0_10_13"
      nist_800_53: []
      soc2: []
      pci_dss: []
