  - rule_id: tomcat.cis.10.do_not_allow_custom_header_status_messages
    title: "Do not allow custom header status messages"
    severity: medium
    category: web_server
    tech_type: tomcat
    automation_type: manual
    cis_benchmark: "CIS_TOMCAT 8_v1.0.0"
    cis_version: "8_v1.0.0"
    cis_control: "10.9"
    cis_section: "10"
    profile_applicability: "Level 2"
    description: >
      Being able to specify custom status messages opens up the possibility for
      additional headers to be injected. If custom header status messages are
      required, make sure it is only in US-ASCII and does not include any user-
      supplied data.
    rationale: >
      Allowing user-supplied data into a header allows the possibility of XSS.
    audit_procedure: >
      Ensure the above parameter is added to the startup script which by default is
      located at $CATALINA_HOME\bin\catalina.sh.
    remediation: >
      Start Tomcat with USE_CUSTOM_STATUS_MSG_IN_HEADER set to false. Add the
      following to your startup script.
      -Dorg.apache.coyote.USE_CUSTOM_STATUS_MSG_IN_HEADER=false Default Value: By
      default, allowing custom header status messages is set to false. References:
      1. http://tomcat.apache.org/tomcat-8.0-doc/config/systemprops.html 78 | P a g
      e
    references: >
      1. http://tomcat.apache.org/tomcat-8.0-doc/config/systemprops.html 78 | P a g
      e
    impact: >
      
    compliance_mappings:
      cis:
