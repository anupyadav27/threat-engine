    profile_applicability: ""
    description: >
      
    rationale: >
      
    audit_procedure: >
      
    remediation: >
      • Set the metadata-complete value in the web.xml in each of the applications
      to true. Note: The metadata-complete option is not enough to disable all of
      annotation scanning. If there is a ServletContainerInitializer with a
      @HandlesTypes annotation, Tomcat has to scan your application for classes that
      use annotations or interfaces specified in that annotation. • Set the
      logEffectiveWebXml value in the context.xml in each of the application to
      true. Default Value: If logEffectiveWebXml and/or metadata-complete is/are not
      specified, the default value is false. References: 1.
      https://tomcat.apache.org/tomcat-9.0-doc/config/context.html 2.
