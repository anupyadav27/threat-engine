  - rule_id: tomcat.cis.1.disable_unused_connectors
    title: "Disable Unused Connectors"
    severity: medium
    category: web_server
    tech_type: tomcat
    automation_type: manual
    cis_benchmark: "CIS_TOMCAT 9_v1.2.0"
    cis_version: "9_v1.2.0"
    cis_control: "1.2"
    cis_section: "1"
    profile_applicability: ""
    description: >
      
    rationale: >
      
    audit_procedure: >
      
    remediation: >
      Within the $CATALINA_HOME/conf/server.xml, remove, or comment out, each unused
      Connector. For example, to disable an instance of the HTTPConnector, remove
      the following: <Connector
      className='org.apache.catalina.connector.http.HttpConnector' ...
      connectionTimeout='60000'/> Default Value: $CATALINA_HOME/conf/server.xml, has
      the following connectors defined by default: • A non-SSL HTTP Connector bound
      to port 8080 • An AJP Connector bound to port 8009 References: 1.
      https://tomcat.apache.org/tomcat-9.0-doc/config/http.html 2.
      https://tomcat.apache.org/tomcat-9.0-doc/security-howto.html#Connectors CIS
      Controls:
    references: >
      1. https://tomcat.apache.org/tomcat-9.0-doc/config/http.html 2.
      https://tomcat.apache.org/tomcat-9.0-doc/security-howto.html#Connectors CIS
      Controls: Controls Version Control IG 1 IG 2 IG 3 v8 4.8 Uninstall or Disable
      Unnecessary Services on Enterprise Assets and Software Uninstall or disable
      unnecessary services on enterprise assets and software, such as an unused file
      sharing service, web application module, or service function. ● ● v7 9.2
      Ensure Only Approved Ports, Protocols and Services Are Running Ensure that
      only network ports, protocols, and services listening on a system with
      validated business needs, are running on each system. ● ● 2 Limit Server
      Platform Information Leaks Limiting Server Platform Information Leaks make it
      harder for attackers to determine which vulnerabilities affect the server
      platform.
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_TOMCAT_9_v1_2_0_1_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_tomcat_9_v1_2_0_1_2"
    metadata_source: generated
    generated_by: generate_tech_rules

