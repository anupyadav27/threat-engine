    cis_section: "2"
    profile_applicability: ""
    description: >
      
    rationale: >
      
    audit_procedure: >
      
    remediation: >
      Perform the following to alter the server platform string that gets displayed
      when clients connect to the tomcat server. 1. Extract the
      ServerInfo.properties file from the catalina.jar file: $ cd $CATALINA_HOME/lib
      $ jar xf catalina.jar org/apache/catalina/util/ServerInfo.properties 2.
      Navigate to the util directory that was created cd org/apache/catalina/util 3.
      Open ServerInfo.properties in an editor 4. Update the server.info attribute in
      the ServerInfo.properties file. server.info=<SomeWebServer> 5. Update the
      catalina.jar with the modified ServerInfo.properties file. $ jar uf
      catalina.jar org/apache/catalina/util/ServerInfo.properties Default Value: The
      default value for the server.info attribute is Apache Tomcat/ <version> . For
      example, Apache Tomcat/9.0.0.M9. References: 1.
