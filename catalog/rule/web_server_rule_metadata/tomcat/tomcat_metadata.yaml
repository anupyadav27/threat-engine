  - rule_id: tomcat.cis.2.turn_off_trace
    title: "Turn off TRACE"
    severity: medium
    category: web_server
    tech_type: tomcat
    automation_type: automated
    cis_benchmark: "CIS_TOMCAT 9_v1.2.0"
    cis_version: "9_v1.2.0"
    cis_control: "2.6"
    cis_section: "2"
    profile_applicability: ""
    description: >
      
    rationale: >
      
    audit_procedure: >
      
    remediation: >
      Perform the following to prevent Tomcat from accepting a TRACE request: 1. Set
      the allowTrace attribute for each Connector specified in
      $CATALINA_HOME/conf/server.xml to false. <Connector ... allowTrace='false' />
      Alternatively, ensure the allowTrace attribute is absent from each Connector
      specified in $CATALINA_HOME/conf/server.xml. 2. Add the following as a child
      of the web-app root element, if present, in each web applications web.xml:
      <security-constraint> <web-resource-collection> <web-resource-name>restricted
      methods</web-resource-name> ... <http-method>TRACE</http-method> ... </web-
      resource-collection> ... </security-constraint> Default Value: Tomcat does not
      allow the TRACE HTTP verb by default. Tomcat will only allow TRACE if the
      allowTrace attribute is present and set to true. References: 1.
      https://tomcat.apache.org/tomcat-9.0-doc/config/http.html CIS Controls:
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_TOMCAT_9_v1_2_0_2_6"
      nist_800_53: []
      soc2: []
