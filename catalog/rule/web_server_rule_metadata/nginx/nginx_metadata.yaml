      search for the below string or another regex pattern that denies access to
      files with a dot as the first character in the file path. Run the following
      command: grep location /etc/nginx/nginx.conf Verify the output is: location ~
      /\. { deny all; return 404; }
    remediation: >
      Edit the nginx.conf file and add the following line: location ~ /\. { deny
      all; return 404; } Default Value: This is not set by default. References: 1.
      https://programming-review.com/nginx-disable-access-to-htaccess-file/
