  - rule_id: nginx.cis.2.nginx_is_run_using_a_non_privileged_dedicated
    title: "Ensure that NGINX is run using a non-privileged, dedicated service account"
    severity: high
    category: web_server
    tech_type: nginx
    automation_type: automated
    cis_benchmark: "CIS_NGINX v2.1.0"
    cis_version: "v2.1.0"
    cis_control: "2.2.1"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The nginx user directive designates which user account nginx worker processes
      run under. Ensuring a non-privileged, dedicated service account is used is a
      defense in depth measure to limit what an attacker who compromises the account
      can do.
    rationale: >
      Running a web server under a non-privileged, dedicated service account helps
      mitigate the risk of lateral movement to other services or processes in the
      event the user account running the web services is compromised. The default
      user nobody is typically used for several processes, and if this is
      compromised, it could allow an attacker to have access to all processes
      running as that user.
    audit_procedure: >
      Run the following to verify nginx is being run by a dedicated non-privileged
      user account: Step 1: Verify nginx is being run as a dedicated user: grep -Pi
      -- '^\h*user\h+[^;\n\r]+\h*;.*$' /etc/nginx/nginx.conf If a user directive
      similar to the below is not found, this is not a dedicated user. If a user is
      found similar to the output shown below, continue to step 2. If the user does
      not exist, a user will need to be added. user nginx; Step 2: Verify the nginx
      dedicated user is not privileged: Run the below command, replacing nginx with
      any designated user you may have assigned: sudo -l -U nginx The output should
      look similar to the below if this user is not privileged: User nginx is not
      allowed to run sudo Step 3: Verify the nginx dedicated user is not part of any
      unexpected groups: Run the below command, replacing nginx with any designated
      user you may have assigned: groups nginx The output should look similar to the
      below if this user is not part of any other groups than the primary group:
      nginx : nginx
    remediation: >
      Add a system account for the nginx user with a home directory of
      /var/cache/nginx and a shell of /sbin/nologin so it does not have the ability
      to log in, then add the nginx user to be used by nginx: useradd nginx -r -g
      nginx -d /var/cache/nginx -s /sbin/nologin Then add the nginx user to
      /etc/nginx/nginx.conf by adding the user directive as shown below: user nginx;
      Default Value: By default, if nginx is compiled from source, the user and
      group are nobody. If downloaded from dnf, the user and group nginx and the
      account are not privileged. References: 1.
      http://nginx.org/en/docs/ngx_core_module.html#user
    references: >
      1. http://nginx.org/en/docs/ngx_core_module.html#user
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_NGINX_v2_1_0_2_2_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_nginx_v2_1_0_2_2_1"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: nginx.cis.2.nginx_service_account_is_locked
    title: "Ensure the NGINX service account is locked"
    severity: high
    category: web_server
    tech_type: nginx
    automation_type: automated
    cis_benchmark: "CIS_NGINX v2.1.0"
    cis_version: "v2.1.0"
    cis_control: "2.2.2"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The nginx user account should have a valid password, but the account should be
      locked. NOTE: If a different account is used to run nginx, that account's name
      should be substituted for nginx in the audit and remediation procedures.
    rationale: >
      As a defense-in-depth measure, the nginx user account should be locked to
      prevent logins and to prevent someone from switching users to nginx using the
      password. In general, there shouldn't be a need for anyone to have to su as
      nginx, and when there is a need, sudo should be used instead, which would not
      require the nginx account password. Impact: This ensures the nginx user
      account may not be used by a human user.
    audit_procedure: >
      Verify the nginx service account is locked by running this command: passwd -S
      '$(awk '$1~/^\s*user\s*$/ {print $2}' /etc/nginx/nginx.conf | sed - r
      's/;.*//g')' The result should be similar to the following: nginx LK
      2022-09-06 -1 -1 -1 -1 (Password locked.)
    remediation: >
      Use the passwd command to lock the nginx service account: passwd -l '$(awk
      '$1~/^\s*user\s*$/ {print $2}' /etc/nginx/nginx.conf | sed - r 's/;.*//g')'
      Default Value: The nginx user is locked by default.
    references: >
      
    impact: >
      This ensures the nginx user account may not be used by a human user.
    compliance_mappings:
      cis:
        - "CIS_NGINX_v2_1_0_2_2_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_nginx_v2_1_0_2_2_2"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: nginx.cis.2.nginx_service_account_has_an_invalid_shell
    title: "Ensure the NGINX service account has an invalid shell"
    severity: high
    category: web_server
    tech_type: nginx
    automation_type: automated
    cis_benchmark: "CIS_NGINX v2.1.0"
    cis_version: "v2.1.0"
    cis_control: "2.2.3"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The nginx account should not have the ability to log in, so the /sbin/nologin
      shell should be set for the account.
    rationale: >
      The account used for nginx should only be used for the nginx service and does
      not need to have the ability to log in. This prevents an attacker who
      compromises the account to log in with it.
    audit_procedure: >
      Run the following script to verify the nginx service account has an invalid
      shell: #!/usr/bin/env bash { l_output='' l_output2='' l_out='' if [ -f
      /etc/nginx/nginx.conf ]; then l_user='$(awk '$1~/^\s*user\s*$/ {print $2}'
      /etc/nginx/nginx.conf | sed -r 's/;.*//g')' l_valid_shells='^($( sed -rn
      '/^\//{s,/,\\\\/,g;p}' /etc/shells | paste -s -d '|' - ))$' l_out='$(awk -v
      pat='$l_valid_shells' -v ngusr='$l_user' -F: '($(NF) ~ pat && $1==ngusr) {
      $(NF-1) }' /etc/passwd)' if [ -z '$l_out' ]; then l_output=' - NGINX user
      account: \'$l_user\' has an invalid shell' else l_output2=' - NGINX user
      account: \'$l_user\' has a valid shell: \'$l_out\'' fi else l_output2=' -
      NGINX user account can not be determined.\n - file: \'/etc/nginx/nginx.conf\'
      is missing' fi if [ -z '$l_output2' ]; then echo -e '\n- Audit Result:\n **
      PASS **\n$l_output\n' else echo -e '\n- Audit Result:\n ** FAIL **\n -
      Reason(s) for audit failure:\n$l_output2\n' fi }
    remediation: >
      Change the login shell for the nginx account to /sbin/nologin by using the
      following command: usermod -s /sbin/nologin nginx Default Value: The nginx
      user has a shell of /sbin/nologin by default on RHEL systems.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_NGINX_v2_1_0_2_2_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_nginx_v2_1_0_2_2_3"
