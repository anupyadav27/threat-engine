  - rule_id: nginx.cis.4.online_certificate_status_protocol_ocsp_stapling
    title: "Ensure Online Certificate Status Protocol (OCSP) stapling is enabled"
    severity: high
    category: web_server
    tech_type: nginx
    automation_type: automated
    cis_benchmark: "CIS_NGINX v2.1.0"
    cis_version: "v2.1.0"
    cis_control: "4.1.7"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      OCSP allows a user's browser or another user agent to verify the certificate
      it is seeing is not revoked. OCSP stapling ensures your server presents this
      information to the user's browser in a way that best meets the performance and
      security needs of your website. It polls the Certificate Authority's (CA) OCSP
      server at regular intervals to ensure it is continuously kept up to date. OCSP
      stapling helps improve performance and security, so it should be enabled.
    rationale: >
      OCSP stapling protects your users from accessing a website where a private key
      is believed to be compromised. If a private key is compromised, an attacker
      may be able to obtain unauthorized access to the encrypted data transmitted by
      a user. Note: OCSP stapling, while a step forward from the older certificate
      revocation list model, does share similar risks. Between the time a
      certificate is revoked and the point where a new signed OCSP profile is
      requested, if a server's certificate has been revoked a user agent may not be
      informed.
    audit_procedure: >
      Run the following command to verify OCSP stapling is enabled: grep -ir
      ssl_stapling /etc/nginx If the output does not contain your proxy or web
      server configuration file with the below two directives, this recommendation
      is not implemented. ssl_stapling on; ssl_stapling_verify on;
    remediation: >
      Follow this procedure to enable OCSP validation: Step 1: Ensure your NGINX
      server has access to your CA's OCSP server. Your CA's OCSP server may be found
      on your CA's website and will vary depending on your CA vendor. Issue the
      following command in order to check your connectivity to their site: curl -I
      'insert certificate authority ocsp server here' If you get a 200 code
      response, your server has access. Step 2: Enable OCSP on nginx. Implement the
      ssl_stapling and ssl_stapling_verify directives. The directive ssl_stapling
      enables OCSP stapling, and the directive ssl_stapling_verify enables
      verification of the OCSP responses on nginx. server { ssl_stapling on;
      ssl_stapling_verify on; } Default Value: OCSP stapling is not enabled by
      default. References: 1. https://www.digicert.com/ssl-support/nginx-enable-
      ocsp-stapling-on-server.htm
    references: >
      1. https://www.digicert.com/ssl-support/nginx-enable-ocsp-stapling-on-
      server.htm
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_NGINX_v2_1_0_4_1_7"
      nist_800_53: []
      soc2: []
      pci_dss: []
