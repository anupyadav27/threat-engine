  - rule_id: nginx.cis.3.proxies_pass_source_ip_information
    title: "Ensure proxies pass source IP information"
    severity: high
    category: web_server
    tech_type: nginx
    automation_type: manual
    cis_benchmark: "CIS_NGINX v2.1.0"
    cis_version: "v2.1.0"
    cis_control: "3.7"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The x-forwarded-for and remote address headers help identify and separate the
      originating client IP address of the user agent and the proxy IP address. The
      two types of addresses are the same, and one should always be present.
    rationale: >
      Being able to identify the originating client IP address can help auditors or
      incident responders identify where the corresponding user came from. This may
      be useful in the event of an attack to analyze if the IP address is a good
      candidate for blocking. It may also be useful to correlate an attacker's
      actions.
    audit_procedure: >
      Open the nginx configuration file and the associated included files in that
      configuration. Check all location blocks for the presence of the proxy_pass
      directive. The proxy_pass directive should be followed by one of the below two
      directives to ensure the client IP address is passed to the endpoint the proxy
      is serving traffic to. proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    remediation: >
      To ensure your proxy or load balancer will forward information about the
      client and the proxy to the application, you must set the below headers in
      your location block. Edit your location block so it shows the proxy_set_header
      directives for the client and the proxy as shown below. These headers are the
      exact same and there is no need to have both present. server { ... location /
      { proxy_pass (Insert Application URL here); proxy_set_header X-Real-IP
      $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; } }
      Default Value: This is not set by default. References: 1.
      https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-Forwarded-For 2.
      http://nginx.org/en/docs/http/ngx_http_proxy_module.html Additional
      Information: Users' privacy should be kept in mind when deploying this header.
      If it is deployed, you should ensure your privacy policy includes that you
      collect IP address information about your users.
    references: >
      1. https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-Forwarded-For
      2. http://nginx.org/en/docs/http/ngx_http_proxy_module.html Additional
      Information: Users' privacy should be kept in mind when deploying this header.
      If it is deployed, you should ensure your privacy policy includes that you
      collect IP address information about your users.
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_NGINX_v2_1_0_3_7"
      nist_800_53: []
      soc2: []
      pci_dss: []
