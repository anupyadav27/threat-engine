  - rule_id: nginx.cis.5.referrer_policy_is_enabled_and_configured_properly
    title: "Ensure the Referrer Policy is enabled and configured properly"
    severity: medium
    category: web_server
    tech_type: nginx
    automation_type: manual
    cis_benchmark: "CIS_NGINX v2.1.0"
    cis_version: "v2.1.0"
    cis_control: "5.3.4"
    cis_section: "5"
    profile_applicability: "Level 2"
    description: >
      When an origin site directs a user to another site, a referrer is sent that
      identifies the URL the user came from. Depending on your site's specific use,
      this may present a privacy concern to your users. The Referrer Policy enables
      organizations to define what sites should see that a referral came from your
      site, which helps protect user privacy.
    rationale: >
      A Referrer header may expose sensitive data in another web server's log if you
      use sensitive data in your URL parameters, such as personal information,
      username, and password or persistent sessions. Ultimately, depending on your
      application design, not using a properly configured Referrer Policy may allow
      session hijacking, credential gathering, or sensitive data exposure in a third
      party's logs.
    audit_procedure: >
      Verify your referrer policy is enabled and configured properly by running the
      following command. You should check to ensure that the header is part of the
      server block of all sites. grep -r Referrer-Policy /etc/nginx The output
      should look similar to the below. The policy may differ depending on your
      organization's needs. add_header Referrer-Policy 'no-referrer';
    remediation: >
      Add the below line to the server blocks within your nginx configuration. The
      policy should be customized for your specific organization's needs. The below
      policy will ensure your website is never allowed in a referrer. add_header
      Referrer-Policy 'no-referrer'; Default Value: This policy is not set by
      default. References: 1. https://scotthelme.co.uk/a-new-security-header-
      referrer-policy/ 2. https://www.w3.org/TR/referrer-policy/ Additional
      Information: Important Note: This header should be customized to your
      application and 'no- referrer' is not always appropriate. This may vary
      depending on your circumstances. The always parameter ensures that the header
      is returned in the response no matter what the HTTP response code is.
    references: >
      1. https://scotthelme.co.uk/a-new-security-header-referrer-policy/ 2.
      https://www.w3.org/TR/referrer-policy/ Additional Information: Important Note:
      This header should be customized to your application and 'no- referrer' is not
      always appropriate. This may vary depending on your circumstances. The always
      parameter ensures that the header is returned in the response no matter what
      the HTTP response code is.
