  - rule_id: nginx.cis.4.upstream_server_traffic_is_authenticated_with_a
    title: "Ensure upstream server traffic is authenticated with a client certificate"
    severity: high
    category: web_server
    tech_type: nginx
    automation_type: automated
    cis_benchmark: "CIS_NGINX v2.1.0"
    cis_version: "v2.1.0"
    cis_control: "4.1.9"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Client certificate validation allows the upstream server to authenticate the
      identity of the client connecting to it. This assists in the establishment of
      mutual authentication between the client and the server.
    rationale: >
      Using client certificate validation allows you to establish a trusted proxy
      server.
    audit_procedure: >
      To verify this recommendation, validate that the below configuration is in the
      location block of your nginx configuration that is sending traffic to an
      upstream location. The command below may be helpful in determining if this is
      set up: grep -ir proxy_ssl_certificate /etc/nginx You should see output
      similar to the below. You may need to manually ensure this is configured
      properly by investigating your location block for the output as well.
      proxy_ssl_certificate /etc/nginx/ssl/nginx.pem; proxy_ssl_certificate_key
      /etc/nginx/ssl/nginx.key;
    remediation: >
      In order to implement this recommendation, you must create a client
      certificate to be authenticated against and have it signed. Once you have a
      signed certificate, place the certificate in a location of your choice. In the
      below example, we use /etc/nginx/ssl/cert.pem. Implement the configuration as
      part of the location block: proxy_ssl_certificate /etc/nginx/ssl/nginx.pem;
      proxy_ssl_certificate_key /etc/nginx/ssl/nginx.key; Default Value: This is not
      authenticated by default. References: 1. https://docs.nginx.com/nginx/admin-
      guide/security-controls/securing-http-traffic- upstream/ 2.
      http://www.staticshin.com/programming/proxy-ssl-cert-in-nginx.html 3.
      http://nginx.org/en/docs/http/ngx_http_proxy_module.html#proxy_ssl_certificate
      Additional Information: Your upstream server must also be configured to verify
      the client certificate. If your upstream web server is an NGINX web server,
      you may accomplish this by adding the client certificate into a file
      referenced by the directive ssl_client_certificate. This should be part of
      your server block. An example is below. ssl_client_certificate
