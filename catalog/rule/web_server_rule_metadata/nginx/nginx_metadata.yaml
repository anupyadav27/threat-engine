  - rule_id: nginx.cis.1.nginx_is_installed_from_source
    title: "Ensure NGINX is installed from source"
    severity: medium
    category: web_server
    tech_type: nginx
    automation_type: manual
    cis_benchmark: "CIS_NGINX v2.1.0"
    cis_version: "v2.1.0"
    cis_control: "1.1.2"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      Installing NGINX directly from source allows you to install NGINX without the
      use of a package manager.
    rationale: >
      Installing NGINX from source allows you to harden your instance of NGINX by
      minimizing modules. NGINX is unable to remove modules when installed using a
      package manager. By installing from source, you are able to minimize modules,
      however, some additional configuration will be required and updates will not
      be automated out of the box for you. Impact: By installing NGINX from source,
      you will have to manually upgrade NGINX or automate upgrades yourself. The
      default values for NGINX may also vary from this guide using this method.
    audit_procedure: >
      To check if nginx is installed on your server, run the following command:
      nginx -v The command output should return the version of nginx that is
      installed on the server. If there is no output, nginx is not installed.
    remediation: >
      Installation depends on the operating system platform. For a source build,
      consult the NGINX documentation 'Building nginx from Sources'. Default Value:
      NGINX is not installed by default. References: 1.
      https://docs.nginx.com/nginx/admin-guide/installing-nginx/installing-nginx-
      open- source/
    references: >
      1. https://docs.nginx.com/nginx/admin-guide/installing-nginx/installing-nginx-
      open- source/
    impact: >
      By installing NGINX from source, you will have to manually upgrade NGINX or
      automate upgrades yourself. The default values for NGINX may also vary from
      this guide using this method.
    compliance_mappings:
