  - rule_id: nginx.cis.5.rate_limits_by_ip_address_are_set
    title: "Ensure rate limits by IP address are set"
    severity: medium
    category: web_server
    tech_type: nginx
    automation_type: manual
    cis_benchmark: "CIS_NGINX v2.1.0"
    cis_version: "v2.1.0"
    cis_control: "5.2.5"
    cis_section: "5"
    profile_applicability: "Level 2"
    description: >
      Rate limiting should be enabled to limit the number of requests an IP address
      may make to a server in a given period of time. The configuration values
      should be set based on your application's needs and your organizational
      policy.
    rationale: >
      Rate limiting allows you to mitigate potential denial of service attacks as a
      defense in depth mechanism. Impact: If you serve a high traffic API, this may
      prevent users from being able to call your website. You may also limit users
      behind a corporate web proxy or a proxy service such as tor if they use your
      website heavily.
    audit_procedure: >
      Verify the HTTP block and server block contains the below configuration. You
      may also need to check files included in include statements within your nginx
      config. http { limit_req_zone $binary_remote_addr zone=ratelimit:10m
      rate=5r/s; server { location / { limit_req zone=ratelimit burst=10 nodelay; }
      } }
    remediation: >
      Implement the below directives under the HTTP and server blocks of your nginx
      configuration or any include files. The below configuration creates a memory
      zone of 10 megabytes called 'ratelimit' and sets the number of requests per
      second that can be sent by any given IP address to 5. Further, this
      configuration sets a burst of 10 to ensure that requests may come more
      frequently and sets no delay to ensure that the bursting may be all at once
      and not queued. http { limit_req_zone $binary_remote_addr zone=ratelimit:10m
      rate=5r/s; server { location / { limit_req zone=ratelimit burst=10 nodelay; }
      } } Default Value: This is not set by default. References: 1.
      https://scotthelme.co.uk/mitigating-http-get-dos-attack/ 2.
      https://www.nginx.com/blog/rate-limiting-nginx/
    references: >
      1. https://scotthelme.co.uk/mitigating-http-get-dos-attack/ 2.
