  - rule_id: nginx.cis.5.timeout_values_for_reading_the_client_header_and
    title: "Ensure timeout values for reading the client header and body are set correctly"
    severity: high
    category: web_server
    tech_type: nginx
    automation_type: automated
    cis_benchmark: "CIS_NGINX v2.1.0"
    cis_version: "v2.1.0"
    cis_control: "5.2.1"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The client_header_timeout and client_body_timeout directives define the time
      the server will wait for the header or body to be sent from the client. If the
      client does not send the entire header in this predefined timeframe, the
      server will send back a 408 request timeout error.
    rationale: >
      Setting the client header and body timeouts help your server mitigate possible
      denial of service attacks. By timing out a request, the server is able to free
      up resources that may be waiting for the body or header.
    audit_procedure: >
      To verify the current settings for the client_body_timeout and
      client_header_timeout directives, issue the below command. You should also
      manually check your nginx configuration for include statements that may be
      located outside of the /etc/nginx directory. If this is not present, the value
      is set at the default. grep -ir timeout /etc/nginx The output should contain
      the following: client_body_timeout 10; client_header_timeout 10;
    remediation: >
      Find the HTTP or server block of your nginx configuration and add the
      client_header_timeout and client_body_timeout directives set to the
      configuration. The below example sets the timeouts to 10 seconds.
      client_body_timeout 10; client_header_timeout 10; Default Value:
      client_header_timeout 60; client_body_timeout 60; References: 1.
      https://www.owasp.org/index.php/SCG_WS_nginx 2.
      https://blog.qualys.com/securitylabs/2011/11/02/how-to-protect-against-slow-
      http- attacks 3.
      http://nginx.org/en/docs/http/ngx_http_core_module.html#client_header_timeout
    references: >
      1. https://www.owasp.org/index.php/SCG_WS_nginx 2.
      https://blog.qualys.com/securitylabs/2011/11/02/how-to-protect-against-slow-
      http- attacks 3.
      http://nginx.org/en/docs/http/ngx_http_core_module.html#client_header_timeout
    impact: >
      
