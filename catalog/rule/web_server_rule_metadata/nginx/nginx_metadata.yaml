  - rule_id: nginx.cis.5.content_security_policy_csp_is_enabled_and
    title: "Ensure that Content Security Policy (CSP) is enabled and configured properly"
    severity: medium
    category: web_server
    tech_type: nginx
    automation_type: manual
    cis_benchmark: "CIS_NGINX v2.1.0"
    cis_version: "v2.1.0"
    cis_control: "5.3.3"
    cis_section: "5"
    profile_applicability: "Level 2"
    description: >
      Content Security Policy allows administrators to specify the locations from
      which allowable scripts may be executed, or if scripts may be executed at all.
      Content Security Policy should be used to improve user trust of your website.
    rationale: >
      Content Security Policies assist organizations in mitigating and reporting
      cross-site scripting (XSS) attacks.
    audit_procedure: >
      Run this command to verify the Content Security Policies header is enabled:
      grep -ir Content-Security-Policy /etc/nginx Output similar to the below shows
      this recommendation is implemented. It should be implemented on every server
      block. If there are multiple server blocks on the system, each should be
      checked. add_header Content-Security-Policy 'default-src 'self'' always;
    remediation: >
      Open your nginx configuration file that contains your server blocks. Add the
      below line into your server block to add Content-Security-Policy and direct
      your user agent to accept documents from only specific origins. add_header
      Content-Security-Policy 'default-src 'self'' always; Default Value: This is
      not enabled by default. References: 1. https://scotthelme.co.uk/hardening-
      your-http-response-headers/ 2.
      https://www.owasp.org/index.php/OWASP_Secure_Headers_Project 3.
      https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP 4.
      https://www.w3.org/TR/CSP3/ Additional Information: Important Note: Content
      Security Policy may be customized for a significant number of use cases,
      including upgrading insecure requests, directing the origin of executables,
      and reporting violations of the policy. This is a simplistic version that does
      not go into the depth of what a CSP may do and is not representative of how
      the policy should look for your site. Organizations should ensure that their
      CSP will meet their specific use case and needs. The always parameter ensures
      that the header is returned in the response no matter what the HTTP response
      code is. Note: If your CSP is not continuously updated as your application
      adds resources that come from different origins or if the CSP is not correct
      the first time, you may block execution from legitimate origins.
