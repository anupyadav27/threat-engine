  - rule_id: nginx.cis.2.core_dump_directory_is_secured
    title: "Ensure the core dump directory is secured"
    severity: high
    category: web_server
    tech_type: nginx
    automation_type: manual
    cis_benchmark: "CIS_NGINX v2.1.0"
    cis_version: "v2.1.0"
    cis_control: "2.3.4"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Core dumps are snapshots of memory. The working_directory directive is used to
      specify the directory NGINX attempts to create core dumps in. Core dumps will
      be disabled if the directory is not writable by the NGINX user. It is
      recommended that the working_directory directive be set to a directory that is
      owned by the root user and the group the NGINX process executes as, and is
      inaccessible to other users. Usually, production systems should not have this
      enabled.
    rationale: >
      Core dumps may contain sensitive information that should not be accessible by
      other accounts on the system.
    audit_procedure: >
      Run the following procedure to verify the core dump configuration is secured:
      Step 1 : Check to see if the working_directory directive is configured: grep
      working_directory /etc/nginx/nginx.conf Step 2 : If the working_directory
      directive is enabled, it needs to meet the following requirements: 1. It is
      not within the NGINX web document root. 2. It is owned by root and has a group
      ownership of the NGINX group. 3. It has no read-write-search access permission
      for other users (e.g. o=rwx).
    remediation: >
      Either remove the working_directory directive from the NGINX configuration
      files or ensure that the configured directory meets the following
      requirements: 1. It is not within the NGINX web document root. 2. It is owned
      by root and has a group ownership of the NGINX group: chown root:nginx
      /var/log/nginx 3. It has no read-write-search access permission for other
      users: chmod o-rwx /var/log/nginx Default Value: The working_directory value
      is not set by default. References: 1.
      https://www.nginx.com/resources/wiki/start/topics/tutorials/debugging/#core-
      dump
    references: >
      1.
