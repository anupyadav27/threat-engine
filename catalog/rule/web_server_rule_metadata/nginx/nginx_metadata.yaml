  - rule_id: nginx.cis.4.only_perfect_forward_secrecy_ciphers_are_leveraged
    title: "Ensure only Perfect Forward Secrecy Ciphers are Leveraged"
    severity: medium
    category: web_server
    tech_type: nginx
    automation_type: manual
    cis_benchmark: "CIS_NGINX v2.1.0"
    cis_version: "v2.1.0"
    cis_control: "4.1.14"
    cis_section: "4"
    profile_applicability: "Level 2"
    description: >
      Perfect forward secrecy protects users of your website by ensuring that even
      if your private key is compromised that your user's sessions are not able to
      be compromised. This improves upon other ciphers where if your private key was
      compromised all user sessions can also be compromised retroactively.
    rationale: >
      Perfect Forward Secrecy (PFS) helps to reduce the impact of a private key
      compromise.
    audit_procedure: >
      To check that only PFS ciphers are used to ensure that only ciphers that are
      ECDHE/EECDH ciphers and DHE/EDH ciphers are enabled. To audit the ciphers
      setup on NGINX run the below two commands: grep -ir ssl_ciphers /etc/nginx/
      grep -ir proxy_ssl_ciphers /etc/nginx
    remediation: >
      Ensure that only ciphers that are compatible with perfect forward secrecy are
      used. ECDHE/EECDH ciphers and DHE/EDH ciphers support this capability. Its
      recommended to leverage ECDHE ciphers unless you need to support legacy
      clients because they are considered stronger and faster. An example
      configuration that may be used is:
      'EECDH:EDH:!NULL:!SSLv2:!RC4:!aNULL:!3DES:!IDEA'. The below configuration will
      only enable ciphers compatible with perfect forward secrecy. Web Server:
      ssl_ciphers EECDH:EDH:!NULL:!SSLv2:!RC4:!aNULL:!3DES:!IDEA; Proxy:
      proxy_ssl_ciphers EECDH:EDH:!NULL:!SSLv2:!RC4:!aNULL:!3DES:!IDEA; Default
      Value: Perfect Forward Secrecy is not the only default negotiable cipher
      suite. References: 1. https://scotthelme.co.uk/perfect-forward-secrecy/
    references: >
      1. https://scotthelme.co.uk/perfect-forward-secrecy/
    impact: >
      
