  - rule_id: nginx.cis.4.your_domain_is_preloaded
    title: "Ensure your domain is preloaded"
    severity: medium
    category: web_server
    tech_type: nginx
    automation_type: manual
    cis_benchmark: "CIS_NGINX v2.1.0"
    cis_version: "v2.1.0"
    cis_control: "4.1.11"
    cis_section: "4"
    profile_applicability: "Level 2"
    description: >
      Preloading your domain hardcodes it as only being accessible through HTTPS by
      browsers. Note: Preloading should only be done with careful consideration!
      Your website and all its subdomains will be forced over HTTPS. If your website
      or any of its subdomains are not able to support preloading, you should not
      preload your site. Preloading should be opt-in only, and if done, may impact
      more sites than the nginx instance you are working on. Removing preloading can
      be slow and painful, and should only be done with careful consideration
      according to https://hstspreload.org.
    rationale: >
      Preloading your domain helps prevent HTTP downgrade attacks and increases
      trust.
    audit_procedure: >
      Visit https://hstspreload.org/ and type in your top-level domain name to
      verify it is preloaded.
    remediation: >
      In order to successfully preload your website, you must meet the below
      criteria: 1. Serve a valid certificate. This may be accomplished by following
      recommendation 4.1.2. 2. Redirect from HTTP to HTTPS if using port 80. This
      may be accomplished by following recommendation 4.1.1. 3. Configure all
      subdomains to support HTTPS only. This will require you to configure all
      subdomains for HTTPS only. For example, a subdomain of cissecurity.org is
      workbench.cissecurity.org and would need to be configured for HTTPS only. 4.
      Configure an HSTS header on your base domain, as shown below for nginx. If
      your base domain is nginx, you may accomplish this with several modifications
      from the HSTS recommendation. Change your header to include the preload
      directive and the includesubdomains directive, and make your max-length one
      year or longer. The header should be modified similar to the below snippet.
      add_header Strict-Transport-Security 'max-age=31536000; includeSubDomains;
      preload'; After you have met these requirements, add your site to the list by
      following the instructions at https://hstspreload.org/. Default Value: Your
      website is not preloaded by default. References: 1. https://hstspreload.org/
    references: >
      1. https://hstspreload.org/
    impact: >
      
    compliance_mappings:
      cis:
