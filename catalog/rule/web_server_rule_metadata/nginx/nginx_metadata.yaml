  - rule_id: nginx.cis.2.http_webdav_module_is_not_installed
    title: "Ensure HTTP WebDAV module is not installed"
    severity: medium
    category: web_server
    tech_type: nginx
    automation_type: automated
    cis_benchmark: "CIS_NGINX v2.1.0"
    cis_version: "v2.1.0"
    cis_control: "2.1.2"
    cis_section: "2"
    profile_applicability: "Level 2"
    description: >
      The http_dav_module enables HTTP Extensions for Web Distributed Authoring and
      Versioning (WebDAV) as defined by RFC 4918. This enables file-based operations
      on your web server, such as the ability to create, delete, change and move
      files on your server. Most modern architectures have replaced this
      functionality with cloud-based object storage, in which case the module should
      not be installed.
    rationale: >
      WebDAV functionality opens up an unnecessary path for exploiting your web
      server. Through misconfigurations of WebDAV operations, an attacker may be
      able to access and manipulate files on the server.
    audit_procedure: >
      Run the following command to ensure the http_dav_module is not installed:
      nginx -V 2>&1 | grep http_dav_module Ensure the output of the command is
      empty.
    remediation: >
      To remove the http_dav_module, recompile nginx from source without the --with-
      http_dav_module flag. Default Value: The HTTP WebDAV module is not installed
      by default when installing from source. It does come by default when installed
      using dnf. References: 1. http://nginx.org/en/docs/configure.html 2.
      https://tools.ietf.org/html/rfc4918 Additional Information: NGINX does not
      support the removal of modules using the dnf method of installation. In order
      to remove modules from NGINX, you will need to compile from source.
    references: >
      1. http://nginx.org/en/docs/configure.html 2.
      https://tools.ietf.org/html/rfc4918 Additional Information: NGINX does not
      support the removal of modules using the dnf method of installation. In order
      to remove modules from NGINX, you will need to compile from source.
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_NGINX_v2_1_0_2_1_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_nginx_v2_1_0_2_1_2"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: nginx.cis.2.modules_with_gzip_functionality_are_disabled
    title: "Ensure modules with gzip functionality are disabled"
    severity: medium
    category: web_server
    tech_type: nginx
    automation_type: automated
    cis_benchmark: "CIS_NGINX v2.1.0"
    cis_version: "v2.1.0"
    cis_control: "2.1.3"
    cis_section: "2"
    profile_applicability: "Level 2"
    description: >
      gzip is used for compression. Compression functionality should be disabled to
      prevent certain types of attacks from being performed successfully.
    rationale: >
      Compression has been linked with the Breach attack and others. While the
      Breach attack has been mitigated with modern usages of the HTTP protocol,
      disabling the use of compression is considered a defense-in-depth strategy to
      mitigate other attacks.
    audit_procedure: >
      Run the following command to ensure gzip modules are not installed: nginx -V
      2>&1 | grep -E '(http_gzip_module|http_gzip_static_module)' Ensure the output
      of the command is empty.
    remediation: >
      In order to disable the http_gzip_module and the http_gzip_static_module,
      NGINX must be recompiled from source. This can be accomplished using the below
      command in the folder you used during your original compilation. This must be
      done without the --with- http_gzip_static_module or --with-http_gzip_module
      configuration directives. ./configure --without-http_gzip_module --without-
      http_gzip_static_module Default Value: The http_gzip_module is enabled by
      default in the source build, and the http_gzip_static_module is not. Only the
      http_gzip_static_module is enabled by default in the dnf package. References:
      1. http://nginx.org/en/docs/configure.html 2.
      http://nginx.org/en/docs/configure.html 3.
      http://nginx.org/en/docs/http/ngx_http_gzip_module.html 4.
      http://nginx.org/en/docs/http/ngx_http_gzip_static_module.html Additional
      Information: NGINX does not support the removal of modules using the yum
      method of installation. In order to remove modules from NGINX, you will need
      to compile from source.
    references: >
      1. http://nginx.org/en/docs/configure.html 2.
      http://nginx.org/en/docs/configure.html 3.
      http://nginx.org/en/docs/http/ngx_http_gzip_module.html 4.
      http://nginx.org/en/docs/http/ngx_http_gzip_static_module.html Additional
      Information: NGINX does not support the removal of modules using the yum
      method of installation. In order to remove modules from NGINX, you will need
      to compile from source.
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_NGINX_v2_1_0_2_1_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_nginx_v2_1_0_2_1_3"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: nginx.cis.2.autoindex_module_is_disabled
    title: "Ensure the autoindex module is disabled"
    severity: high
    category: web_server
    tech_type: nginx
    automation_type: automated
    cis_benchmark: "CIS_NGINX v2.1.0"
    cis_version: "v2.1.0"
    cis_control: "2.1.4"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The autoindex module processes requests ending with the slash character. This
      feature enables directory listing, which could be useful in attacker
      reconnaissance, so it should be disabled.
    rationale: >
      Automated directory listings may reveal information helpful to an attacker,
      such as naming conventions and directory paths. Directory listings may also
      reveal files that were not intended to be revealed.
    audit_procedure: >
      To determine if the autoindex module is disabled, search the NGINX
      configuration files (nginx.conf and any included configuration files) for
      autoindex directives: egrep -i '^\s*autoindex\s+' /etc/nginx/nginx.conf egrep
      -i '^\s*autoindex\s+' /etc/nginx/conf.d/* Ensure there are no autoindex on
      directives present.
    remediation: >
      Perform the following to disable the autoindex module: 1. Search the NGINX
      configuration files (nginx.conf and any included configuration files) to find
      autoindex directives. egrep -i '^\s*autoindex\s+' /etc/nginx/nginx.conf egrep
      -i '^\s*autoindex\s+' /etc/nginx/conf.d/* 2. Set the value for all autoindex
      directives to off, or remove those directives. Default Value: This module is
      not enabled by default. References: 1.
      http://nginx.org/en/docs/http/ngx_http_autoindex_module.html
    references: >
      1. http://nginx.org/en/docs/http/ngx_http_autoindex_module.html
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_NGINX_v2_1_0_2_1_4"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_nginx_v2_1_0_2_1_4"
