  - rule_id: nginx.cis.5.number_of_connections_per_ip_address_is_limited
    title: "Ensure the number of connections per IP address is limited"
    severity: medium
    category: web_server
    tech_type: nginx
    automation_type: manual
    cis_benchmark: "CIS_NGINX v2.1.0"
    cis_version: "v2.1.0"
    cis_control: "5.2.4"
    cis_section: "5"
    profile_applicability: "Level 2"
    description: >
      The maximum number of simultaneous connections allowed from a single IP
      address to your server should be limited. It should be set to a value that
      meets your organizational policies.
    rationale: >
      Limiting the number of simultaneous connections is an effective way to prevent
      slow denial of service attacks that try to use as many server resources as
      possible. This can also help prevent brute force attacks on a login page.
      Impact: Users of your system that are behind a corporate web proxy using
      network address translation or a proxy service such as tor may have an
      increased chance of being blocked due to this configuration. This is because
      multiple users in these scenarios come from the same IP address. You should
      always consider your user base when setting a connection limit.
    audit_procedure: >
      Verify the HTTP block and server block contain the below configuration. You
      may also need to check files included in include statements within your nginx
      config. http { limit_conn_zone $binary_remote_addr zone=limitperip:10m; server
      { limit_conn limitperip 10; } }
    remediation: >
      Implement the below directives under the HTTP and server blocks of your nginx
      configuration or any include files. The below configuration creates a memory
      zone of 10 megabytes called limitperip. It will limit the number of
      connections per IP address to 10 simultaneous connections. The number of
      simultaneous connections to allow may be different depending on your
      organization's policies and use cases. http { limit_conn_zone
      $binary_remote_addr zone=limitperip:10m; server { limit_conn limitperip 10; }
      } Default Value: This value is not set by default. References: 1.
      https://www.nginx.com/resources/library/complete-nginx-cookbook/ 2.
      http://nginx.org/en/docs/http/ngx_http_limit_conn_module.html 3.
      https://scotthelme.co.uk/mitigating-http-get-dos-attack/
    references: >
      1. https://www.nginx.com/resources/library/complete-nginx-cookbook/ 2.
      http://nginx.org/en/docs/http/ngx_http_limit_conn_module.html 3.
      https://scotthelme.co.uk/mitigating-http-get-dos-attack/
    impact: >
      Users of your system that are behind a corporate web proxy using network
      address translation or a proxy service such as tor may have an increased
      chance of being blocked due to this configuration. This is because multiple
      users in these scenarios come from the same IP address. You should always
      consider your user base when setting a connection limit.
