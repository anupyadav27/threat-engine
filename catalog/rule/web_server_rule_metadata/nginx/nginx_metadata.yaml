  - rule_id: nginx.cis.2.server_tokens_directive_is_set_to_off
    title: "Ensure server_tokens directive is set to `off`"
    severity: high
    category: web_server
    tech_type: nginx
    automation_type: automated
    cis_benchmark: "CIS_NGINX v2.1.0"
    cis_version: "v2.1.0"
    cis_control: "2.5.1"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The server_tokens directive is responsible for displaying the NGINX version
      number and operating system version on error pages and in the Server HTTP
      response header field. This information should not be displayed.
    rationale: >
      Attackers can conduct reconnaissance on a website using these response
      headers, then target attacks for specific known vulnerabilities associated
      with the underlying technologies. Hiding the version will slow down and deter
      some potential attackers.
    audit_procedure: >
      In the NGINX configuration file nginx.conf, verify the server_tokens directive
      is set to off. To do this, check the response headers for the server header by
      issuing this command: curl -I 127.0.0.1 | grep -i server The output should not
      contain the server header providing your server version, such as the below:
      Server: nginx/1.22.0
    remediation: >
      To disable the server_tokens directive, set it to off inside of every server
      block in your nginx.conf or in the http block: server { ... server_tokens off;
      ... } Default Value: The default value of server_tokens is on.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_NGINX_v2_1_0_2_5_1"
      nist_800_53: []
