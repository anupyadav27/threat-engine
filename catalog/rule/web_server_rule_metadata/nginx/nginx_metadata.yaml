  - rule_id: nginx.cis.2.requests_for_unknown_host_names_are_rejected
    title: "Ensure requests for unknown host names are rejected"
    severity: high
    category: web_server
    tech_type: nginx
    automation_type: automated
    cis_benchmark: "CIS_NGINX v2.1.0"
    cis_version: "v2.1.0"
    cis_control: "2.4.2"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Your host header should be part of a predefined allowlist of known good hosts,
      which enables blocking access to other hosts. You should treat the host header
      as another input to be validated, as it is defined by the user agent.
    rationale: >
      Allowlisting specific hosts and blocking access to all other hosts, you help
      to mitigate host header injection attacks against your server. Such attacks
      could be used by an attacker to redirect you to a rogue host and execute
      scripts or get you to input credentials. Impact: If you are in an environment
      such as the cloud, you should not put an IP address or default hostname as
      your server_name because these addresses are often ephemeral in nature.
      Additionally, you will be blocked from accessing your site if you use a means
      of access that does not directly reference names in the server_name directive.
      You should reserve a DNS name to use for implementing this recommendation.
    audit_procedure: >
      Run the following comment to verify this is configured: curl -k -v
      https://127.0.0.1 -H 'Host: invalid.host.com' If you do not receive a 400
      series response, this recommendation is not implemented.
    remediation: >
      Ensure your first server block mirrors the below in your nginx configuration,
      either at /etc/nginx/nginx.conf or any included file within your nginx config:
      server { return 404; } Then investigate each server block to ensure the
      server_name directive is explicitly defined. Each server block should look
      similar to the below with the defined hostname of the associated server block
      in the server_name directive. For example, if your server is cisecurity.org,
      the configuration should look like the below example: server { listen 443;
      server_name cisecurity.org; ..... } Default Value: This is not set by default.
      References: 1. https://www.acunetix.com/blog/articles/automated-detection-of-
      host-header- attacks/ 2. https://hackerone.com/reports/94637 3.
      https://stackoverflow.com/questions/9824328/why-is-nginx-responding-to-any-
      domain-name
    references: >
      1. https://www.acunetix.com/blog/articles/automated-detection-of-host-header-
      attacks/ 2. https://hackerone.com/reports/94637 3.
      https://stackoverflow.com/questions/9824328/why-is-nginx-responding-to-any-
      domain-name
    impact: >
      If you are in an environment such as the cloud, you should not put an IP
      address or default hostname as your server_name because these addresses are
      often ephemeral in nature. Additionally, you will be blocked from accessing
      your site if you use a means of access that does not directly reference names
      in the server_name directive. You should reserve a DNS name to use for
      implementing this recommendation.
    compliance_mappings:
