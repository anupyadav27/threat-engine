  - rule_id: nginx.cis.5.allow_and_deny_filters_limit_access_to_specific
    title: "Ensure allow and deny filters limit access to specific IP addresses"
    severity: medium
    category: web_server
    tech_type: nginx
    automation_type: manual
    cis_benchmark: "CIS_NGINX v2.1.0"
    cis_version: "v2.1.0"
    cis_control: "5.1.1"
    cis_section: "5"
    profile_applicability: "Level 2"
    description: >
      IP-based restrictions act as a defense in depth mechanism. They allow you to
      allowlist legitimate paths to your applications and explicitly deny IP
      addresses you believe to be malicious.
    rationale: >
      IP restrictions help you to only allow traffic based on the concept of least
      privilege. You may specify vlans, countries, or specific servers that may be
      allowed or denied on your site. It is recommended that you implicitly deny all
      traffic and only allow those with a legitimate use case to access your website
      if choosing to take this approach. This allows you to limit the surface area
      an attack may come from.
    audit_procedure: >
      To verify IP-based restrictions are limiting access correctly, perform the
      following steps: Step 1: Open your nginx config file and any files that are
      appended in an include statement. Step 2: Check the location context of your
      server block for the allow and deny directives. The output should look similar
      to the below snippet and may be expressed in CIDR notation or single
      addresses. location / { allow 10.1.1.1; deny all; } Step 3: Ensure the allowed
      IP addresses are not too permissive for your use case. For example, in the
      above snippet, 10.1.1.1 may be a load balancer connecting to your proxy, and
      you only want user traffic to come from the load balancer.
    remediation: >
      Compile a list of network ranges or IP addresses you would want to access your
      web server or proxy. Then add these ranges with the allow directive. The deny
      directive should be included with all IP addresses implicitly denied. location
      / { allow 10.1.1.1; deny all; } Default Value: This is not configured by
      default. References: 1. https://help.dreamhost.com/hc/en-
      us/articles/222784068-The-most-important- steps-to-take-to-make-an-nginx-
      server-more-secure 2.
      http://nginx.org/en/docs/http/ngx_http_access_module.html Additional
      Information: Note: If you do not want to restrict this to a specific network
      range, this recommendation may not fit your use case.
    references: >
      1. https://help.dreamhost.com/hc/en-us/articles/222784068-The-most-important-
      steps-to-take-to-make-an-nginx-server-more-secure 2.
      http://nginx.org/en/docs/http/ngx_http_access_module.html Additional
      Information: Note: If you do not want to restrict this to a specific network
