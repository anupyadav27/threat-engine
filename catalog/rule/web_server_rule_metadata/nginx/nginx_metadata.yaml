  - rule_id: nginx.cis.4.session_resumption_is_disabled_to_enable_perfect
    title: "Ensure session resumption is disabled to enable perfect forward security"
    severity: medium
    category: web_server
    tech_type: nginx
    automation_type: automated
    cis_benchmark: "CIS_NGINX v2.1.0"
    cis_version: "v2.1.0"
    cis_control: "4.1.12"
    cis_section: "4"
    profile_applicability: "Level 2"
    description: >
      Session resumption for HTTPS sessions should be disabled so perfect forward
      secrecy can be achieved.
    rationale: >
      Perfect forward secrecy is an encryption mechanism that enables past session
      keys to not be compromised even if the server's private key is compromised. If
      an attacker recorded all traffic to a server and stored it and then obtained
      the private key without perfect forward secrecy, all communications would be
      compromised. With perfect forward secrecy, session keys are generated using
      Diffie-Hellman for every session a user initiates, which isolates session
      compromise to only that communication session. Allowing session resumption
      breaks perfect forward secrecy; this expands the surface area for an attacker
      to compromise past sessions and communications with a server if they are able
      to compromise the session.
    audit_procedure: >
      Run the following command to verify the ssl_session_tickets directive is
      turned off. You should always investigate your nginx configuration file for
      included file locations outside of /etc/nginx to ensure you are properly
      investigating each server block for the presence of the ssl_session_tickets
      directive being turned off. grep -ir ssl_session_tickets /etc/nginx The output
      should contain the following: ssl_session_tickets off;
    remediation: >
      Turn off the ssl_session_tickets directive as part of any server block in your
      nginx configuration: ssl_session_tickets off; Default Value: Perfect forward
      security is not enabled by default. References: 1.
      https://www.imperialviolet.org/2013/06/27/botchingpfs.html 2.
      https://scotthelme.co.uk/perfect-forward-secrecy/
    references: >
      1. https://www.imperialviolet.org/2013/06/27/botchingpfs.html 2.
      https://scotthelme.co.uk/perfect-forward-secrecy/
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_NGINX_v2_1_0_4_1_12"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_nginx_v2_1_0_4_1_12"
    metadata_source: generated
