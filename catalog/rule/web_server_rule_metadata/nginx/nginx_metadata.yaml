  - rule_id: nginx.cis.2.keepalive_timeout_is_10_seconds_or_less_but_not_0
    title: "Ensure keepalive_timeout is 10 seconds or less, but not 0"
    severity: high
    category: web_server
    tech_type: nginx
    automation_type: automated
    cis_benchmark: "CIS_NGINX v2.1.0"
    cis_version: "v2.1.0"
    cis_control: "2.4.3"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Persistent connections are leveraged by all modern browsers to facilitate
      greater web performance. The keep-alive timeout limits the time a persistent
      connection may remain open. Setting the keep-alive timeout allows this timeout
      to be controlled on the server side.
    rationale: >
      Setting a keep-alive timeout on the server side helps mitigate denial of
      service attacks that establish too many persistent connections, exhausting
      server resources.
    audit_procedure: >
      To check the current setting for the keepalive_timeout directive, issue the
      below command. You should also manually check your nginx configuration for
      include statements that may be located outside the /etc/nginx directory. If
      none of these are present, the value is set at the default. grep -ir
      keepalive_timeout /etc/nginx The output of the command should contain
      something similar to the following: keepalive_timeout 10;
    remediation: >
      Find the HTTP or server block of your nginx configuration, and add the
      keepalive_timeout directive. Set it to 10 seconds or less, but not 0. This
      example command sets it to 10 seconds: keepalive_timeout 10; Default Value: By
      default, this timeout is dictated by the user agent and varies. It is not set
      on the server side by default. References: 1.
      http://nginx.org/en/docs/http/ngx_http_core_module.html#keepalive_timeout
    references: >
      1. http://nginx.org/en/docs/http/ngx_http_core_module.html#keepalive_timeout
