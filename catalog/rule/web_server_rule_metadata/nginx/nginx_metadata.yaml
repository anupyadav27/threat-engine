  - rule_id: nginx.cis.4.http_2_0_is_used
    title: "Ensure HTTP/2.0 is used"
    severity: medium
    category: web_server
    tech_type: nginx
    automation_type: automated
    cis_benchmark: "CIS_NGINX v2.1.0"
    cis_version: "v2.1.0"
    cis_control: "4.1.13"
    cis_section: "4"
    profile_applicability: "Level 2"
    description: >
      HTTP/2.0 is an optimized and more secure version of the HTTP protocol. It
      should be enabled so users can take advantage of it. Note: Legacy user agents
      may not be able to connect to a server using HTTP/2.0.
    rationale: >
      HTTP/2.0 introduces both performance benefits through full multiplexing and
      several security benefits. HTTP/2.0 has improved cipher suite requirements and
      denylists. It also disables session renegotiation and TLS compression. This
      helps protect against vulnerabilities like CRIME and ensures we have stronger
      encryption.
    audit_procedure: >
      Verify that listening ports on the web server leverage HTTP/2.0 by running
      this command: grep -ir http2 /etc/nginx If there is no output, the output does
      not cover all running ports on the server that are not redirecting to another
      port, or the output is commented out, this recommendation is not implemented.
    remediation: >
      Open the nginx server configuration file and configure all listening ports
      with http2, similar to that of this example: server { listen 443 ssl http2; }
      Default Value: By default, HTTP/1.1 is used. References: 1.
      https://mozilla.github.io/server-side-tls/ssl-config-generator/ 2.
      https://http2.github.io/ Additional Information: 1. HTTP/2.0 is not supported
      for proxies at the time of the writing of this recommendation. 2. Versions of
      NGINX prior to 1.17.2 are affected by several HTTP/2 vulnerabilities. More
      information on these on these vulnerabilities can be found at:
      https://www.nginx.com/blog/nginx-updates-mitigate-august-2019-http-2-
      vulnerabilities/ and http://nginx.org/en/security_advisories.html
    references: >
      1. https://mozilla.github.io/server-side-tls/ssl-config-generator/ 2.
      https://http2.github.io/ Additional Information: 1. HTTP/2.0 is not supported
      for proxies at the time of the writing of this recommendation. 2. Versions of
