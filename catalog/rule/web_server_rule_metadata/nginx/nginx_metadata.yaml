  - rule_id: nginx.cis.3.log_files_are_rotated
    title: "Ensure log files are rotated"
    severity: high
    category: web_server
    tech_type: nginx
    automation_type: automated
    cis_benchmark: "CIS_NGINX v2.1.0"
    cis_version: "v2.1.0"
    cis_control: "3.4"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Log rotation ensures log files do not consume excessive disk space,
      potentially causing a denial of service.
    rationale: >
      Log files are important to track activity that occurs on your server, but they
      take up significant amounts of space. Log rotation should be configured in
      order to ensure the logs do not consume so much disk space that logging
      becomes unavailable.
    audit_procedure: >
      Run the below commands to verify the log rotation configuration. They should
      show that log compression occurs weekly and log rotation occurs every 13
      weeks. cat /etc/logrotate.d/nginx | grep weekly cat /etc/logrotate.d/nginx |
      grep rotate
    remediation: >
      Follow the below procedure to change the default configuration to the
      recommended log rotation configuration. You may need to manually edit or
      change the below command if the configuration is not the default. To change
      log compression from daily to weekly: sed -i 's/daily/weekly/'
      /etc/logrotate.d/nginx To change log rotation from every year to every 13
      weeks: sed -i 's/rotate 52/rotate 13/' /etc/logrotate.d/nginx Default Value:
      cat /etc/logrotate.d/nginx /var/log/nginx/*.log { daily missingok rotate 52
      compress delaycompress notifempty create 640 nginx adm sharedscripts
      postrotate if [ -f /var/run/nginx.pid ]; then kill -USR1 `cat
      /var/run/nginx.pid` fi endscript } Additional Information: You should always
      comply with your organizational log retention policy.
