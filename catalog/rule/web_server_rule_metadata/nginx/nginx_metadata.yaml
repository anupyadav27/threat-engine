      To verify the nginx directory has other write permissions revoked, look at the
      permissions by running the below command: find /etc/nginx -type d -exec stat
      -Lc '%n %a' {} + Verify The output directories are mode 755 or more
      restrictive: Example /etc/nginx 755 To verify the nginx configuration files
      have other read, write and execute permissions revoked, look at the
      permissions by running the below command: find /etc/nginx -type f -exec stat
      -Lc '%n %a' {} + Verify The output files are mode 660 or more restrictive:
      Example: /etc/nginx/nginx.conf 660
