  - rule_id: nginx.cis.3.detailed_logging_is_enabled
    title: "Ensure detailed logging is enabled"
    severity: high
    category: web_server
    tech_type: nginx
    automation_type: manual
    cis_benchmark: "CIS_NGINX v2.1.0"
    cis_version: "v2.1.0"
    cis_control: "3.1"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      System logging should be configured to meet your organizational security and
      privacy policies. Enabling detailed logging to include information about
      events, event sources, timestamps, and users may assist in incident response
      activities. NOTE: Aim to keep sensitive information out of logs. For example,
      keep sensitive information out of query strings and URIs to avoid this.
    rationale: >
      Performing detailed logging ensures that incident responders, auditors, and
      others are able to clearly view the activity that has occurred on your server.
      CIS control 8.5: “Collect Detailed Audit Logs” recommends that you configure
      detailed audit logging for enterprise assets containing sensitive data. It
      further recommends you include event source, date, username, timestamp, source
      addresses, destination addresses, and other useful elements that could assist
      in a forensic investigation.
    audit_procedure: >
      Verify your log format meets your organizational security and privacy
      policies. All necessary logging variables should contain descriptive
      definitions at /etc/nginx/nginx.conf. Edit the log format directive in
      /etc/nginx/nginx.conf so it logs everything needed to meet your organizational
      policies. The final format should resemble something like the below example:
      log_format main 'Event Source Information - Server Name: '$server_name' Server
      Protocol: '$server_protocol' Hostname: '$hostname' Host: '$host' ' 'Date and
      Timestamp Information - Local Time: '$time_local' ISO8601 Time:
      '$time_iso8601' ' 'Username Information - Basic Authentication User:
      '$remote_user' ' 'Source Address Information - Source Address:Port:
      '$remote_addr:$remote_port' ' 'Destination Address Information - Desination
      Address:Port '$server_addr:$server_port ' ' 'Request Information - Request:
      '$request' HTTP Response Status: '$status' Referer: '$http_referer' Content
      Type: '$content_type' Body Bytes Sent: '$body_bytes_sent' User Agent:
      '$http_user_agent' '; The following variables may be considered as useful
      examples to include in your log_format with descriptive logging. You should
      consult the NGINX documentation and your organizational policy to ensure you
      are logging sufficient information and removing sensitive information where
      needed. The NGINX documentation on supported log variables may be found here:
      http://nginx.org/en/docs/varindex.html Please review the NGINX documentation
      for log variables to include in your logs in alignment with your use case and
      logging policy. Below are some relevant log variables to help focus your
      review: Event Source Variables: The event source is the name of the software
      that logs the event. It may frequently be the name of the application or
      application component that receives the request. $server_name - Logs the name
      of the server which accepted a request $server_protocol - Logs the request
      protocol, usually “HTTP/1.0”, “HTTP/1.1”, or “HTTP/2.0” $hostname - Logs the
      hostname $host - Logs the host name from the request line, or host name from
      the “Host” request header field, or the server name matching a request in that
      order of precedence. Date & Timestamp Variables: The date and timestamp of the
      HTTP request used for forensic investigations. $time_local - Logs the local
      time in the Common Log Format. $time_iso8601 - Logs the local time in the ISO
      8601 standard format. Username Variables: $remote_user - Logs the user name
      supplied with basic authentication if basic authentication is used by NGINX.
      Nothing will be logged if the request is not part of an application using
      basic authentication with NGINX. Source Address Variables: Identify the source
      of the HTTP request $remote_addr - Logs the client IP address of the HTTP
      request $remote_port - Logs the client port used in the HTTP requests
      Destination Address Variables: Identify the destination of the HTTP request.
      $server_addr - Logs an address of the server which accepted a request
      $server_port - Logs the port of the server which accepted a request Other
      useful elements that could assist in a forensic investigation: $request - Logs
      an address of the server which accepted a request, which may be useful in
      forensic investigations $status - Logs the response status code of the HTTP
      request, which may be useful in forensic investigations $http_referer - Logs
      the response status code of the HTTP request, which may be useful in forensic
      investigations $http_user_agent - Logs the user agent of the client behind the
      request, which may be useful in forensic investigations $pid - Logs the
      process ID of the worker process of NGINX.
    remediation: >
      Edit the log format directive in /etc/nginx/nginx.conf so it logs everything
      needed to meet your organizational policies. Default Value: log_format main
      '$remote_addr - $remote_user [$time_local] '$request' ' '$status
      $body_bytes_sent '$http_referer' ' ''$http_user_agent'
      '$http_x_forwarded_for''; References: 1.
      http://nginx.org/en/docs/http/ngx_http_log_module.html#log_format 2.
      http://nginx.org/en/docs/varindex.html 3.
      https://workbench.cisecurity.org/sections/698300/recommendations/1142990
      Additional Information: Note: Load balancers are not source IP transparent. We
      must configure the X- Forwarded-For Header on the proxy and in the logs to
      show where the request is coming from.
    references: >
      1. http://nginx.org/en/docs/http/ngx_http_log_module.html#log_format 2.
      http://nginx.org/en/docs/varindex.html 3.
      https://workbench.cisecurity.org/sections/698300/recommendations/1142990
      Additional Information: Note: Load balancers are not source IP transparent. We
      must configure the X- Forwarded-For Header on the proxy and in the logs to
      show where the request is coming from.
