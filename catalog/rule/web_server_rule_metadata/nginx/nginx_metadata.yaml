  - rule_id: nginx.cis.3.error_logs_are_sent_to_a_remote_syslog_server
    title: "Ensure error logs are sent to a remote syslog server"
    severity: medium
    category: web_server
    tech_type: nginx
    automation_type: manual
    cis_benchmark: "CIS_NGINX v2.1.0"
    cis_version: "v2.1.0"
    cis_control: "3.5"
    cis_section: "3"
    profile_applicability: "Level 2"
    description: >
      Centralized log management helps ensure logs are forensically sound and are
      available at a central location for auditing and incident investigation.
    rationale: >
      A centralized logging solution aggregates logs from multiple systems to ensure
      logs can be referenced in the event systems are thought to be compromised.
      Centralized log servers are also often used to correlate logs for potential
      patterns of attack. If a centralized logging solution is not used and systems
      (and their logs) are believed to be compromised, then logs may not be
      permitted to be used as evidence.
    audit_procedure: >
      Use this command to verify your server is configured for central logging: grep
      -ir syslog /etc/nginx The output should show the error logs being sent to a
      central server, similar to the output of the command below. 192.168.2.1 should
      be replaced with your central log server, and the logging level should be set
      to info. error_log syslog:server=192.168.2.1 info;
    remediation: >
      To enable central logging for your error logs, add the below line to your
      server block in your server configuration file. 192.168.2.1 should be replaced
      with the location of your central log server. error_log
      syslog:server=192.168.2.1 info; Default Value: Syslog is not configured by
      default. References: 1. http://nginx.org/en/docs/syslog.html
    references: >
      1. http://nginx.org/en/docs/syslog.html
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_NGINX_v2_1_0_3_5"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_nginx_v2_1_0_3_5"
    metadata_source: generated
    generated_by: generate_tech_rules

