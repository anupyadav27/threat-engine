  - rule_id: nginx.cis.5.only_approved_http_methods_are_allowed
    title: "Ensure only approved HTTP methods are allowed"
    severity: high
    category: web_server
    tech_type: nginx
    automation_type: manual
    cis_benchmark: "CIS_NGINX v2.1.0"
    cis_version: "v2.1.0"
    cis_control: "5.1.2"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      HTTP methods (also known as verbs) allow different actions to be requested
      from the web server at a specified path. Only the necessary methods should be
      enabled.
    rationale: >
      Most websites only require the methods GET, POST and HEAD to function
      correctly. Web applications may also require other verbs (e.g. DELETE). In
      order to narrow vectors of attack, it is recommended to only enable the
      required verbs.
    audit_procedure: >
      To verify this, use a tool like curl to send a request with each method which
      should not be supported (e.g. DELETE) and compare the output to a supported
      method (e.g. GET). # curl -X DELETE http://localhost/index.html curl: (52)
      Empty reply from server # curl -X GET http://localhost/index.html
    remediation: >
      To remove unneeded methods and only allow required methods, add the following
      into a server or location block in your nginx.conf. The below snippet assumes
      only the methods GET, HEAD and POST are required for an application. The
      reason for 444 as a response is because it contains no information and can
      help mitigate automated attacks. if ($request_method !~ ^(GET|HEAD|POST)$) {
      return 444; } Default Value: All methods are allowed. References: 1.
      https://www.acunetix.com/blog/articles/nginx-server-security-hardening-
      configuration-1/
    references: >
      1. https://www.acunetix.com/blog/articles/nginx-server-security-hardening-
      configuration-1/
