  - rule_id: nginx.cis.4.http_is_redirected_to_https
    title: "Ensure HTTP is redirected to HTTPS"
    severity: high
    category: web_server
    tech_type: nginx
    automation_type: manual
    cis_benchmark: "CIS_NGINX v2.1.0"
    cis_version: "v2.1.0"
    cis_control: "4.1.1"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Browsers and clients establish encrypted connections with servers by
      leveraging HTTPS. Requests leveraging HTTP are unencrypted. Unencrypted
      requests should be redirected so they are encrypted. Any listening HTTP port
      on your web server should redirect to a server profile that uses encryption.
      The default HTTP (unencrypted) port is 80.
    rationale: >
      Redirecting user agent traffic to HTTPS helps to ensure all user traffic is
      encrypted. Modern browsers alert users that your website is insecure when
      HTTPS is not used. This can decrease user trust in your website and ultimately
      result in decreased use of your web services. Redirection from HTTP to HTTPS
      couples security with usability; users are able to access your website even if
      they lack the security awareness to use HTTPS over HTTP when requesting your
      website. Impact: Use of HTTPS does result in a performance reduction in
      traffic to your website, however, due to the increased value of the security,
      many businesses consider this to be a cost of doing business.
    audit_procedure: >
      To verify your server listening configuration, check your web server or proxy
      configuration file. The default web server configuration file is
      /etc/nginx/conf.d/default.conf, and the default proxy configuration file is
      /etc/nginx/nginx.conf. The configuration file should return a statement
      redirecting to HTTPS. This should be similar to the code below, where
      cisecurity.org is used as an example. server { listen 80; server_name
      cisecurity.org; return 301 https://$host$request_uri; }
    remediation: >
      Edit your web server or proxy configuration file to redirect all unencrypted
      listening ports, such as port 80, using a redirection through the return
      directive (cisecurity.org is used as an example server name). server { listen
      80; server_name cisecurity.org; return 301 https://$host$request_uri; }
      Default Value: NGINX is not configured to use HTTPS or redirect to it by
      default. References: 1. https://serversforhackers.com/c/redirect-http-to-
      https-nginx
    references: >
      1. https://serversforhackers.com/c/redirect-http-to-https-nginx
    impact: >
      Use of HTTPS does result in a performance reduction in traffic to your
      website, however, due to the increased value of the security, many businesses
      consider this to be a cost of doing business.
    compliance_mappings:
      cis:
        - "CIS_NGINX_v2_1_0_4_1_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_nginx_v2_1_0_4_1_1"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: nginx.cis.4.a_trusted_certificate_and_trust_chain_is_installed
    title: "Ensure a trusted certificate and trust chain is installed"
    severity: high
    category: web_server
    tech_type: nginx
    automation_type: manual
    cis_benchmark: "CIS_NGINX v2.1.0"
    cis_version: "v2.1.0"
    cis_control: "4.1.2"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Certificates and their trust chains are needed to establish the identity of a
      web server as legitimate and trusted. Certificate authorities validate a web
      server's identity and that you are the owner of that web server domain name.
    rationale: >
      Without a certificate and full trust chain installed on your web server,
      modern browsers will flag your web server as untrusted.
    audit_procedure: >
      Run this command to find the file location of your certificate: grep -ir
      ssl_certificate /etc/nginx/ The output of your command should look similar to
      the below output. If there is no output, you do not have a certificate
      installed. Web Server: /etc/nginx/nginx.conf: ssl_certificate
      /etc/nginx/cert.pem; /etc/nginx/nginx.conf: ssl_certificate_key
      /etc/nginx/nginx.key; Open the file to the right of the ssl_certificate
      directive using the following command: cat /etc/nginx/cert.pem The output of
      your command should look similar to the below. It should include the full
      certificate chain. -----BEGIN CERTIFICATE----- Insert Your Web Server
      Certificate -----END CERTIFICATE----- -----BEGIN CERTIFICATE----- Insert Your
      Certificate Authority Intermediate Certificate -----END CERTIFICATE-----
      -----BEGIN CERTIFICATE----- Insert Your Certificate Authority Root Certificate
      -----END CERTIFICATE-----
    remediation: >
      Use the following procedure to install a certificate and its signing
      certificate chain onto your web server, load balancer, or proxy. Step 1:
      Create the server's private key and a certificate signing request. The
      following command will create your certificate's private key with 2048-bit key
      strength. Optionally, this parameter may be changed to 4096 for greater
      security. It will also output your certificate signing request to the
      nginx.csr file in your present working directory. openssl req -new -newkey
      rsa:2048 -keyout nginx.key -out nginx.csr Enter the below information about
      your private key: Country Name (2 letter code) [XX]: Your Country State or
      Province Name (full name) []: Your State Locality Name (eg, city) [Default
      City]: Your City Organization Name (eg, company) [Default Company Ltd]: Your
      City Organizational Unit Name (eg, section) []: Your Organizational Unit
      Common Name (eg, your name or your server's hostname) []: Your server's DNS
      name Email Address []: Your email address Step 2: Obtain a signed certificate
      from your certificate authority. Provide your chosen certificate authority
      with your certificate signing request. Follow your certificate authority's
      signing procedures in order to obtain a certificate and the certificate's
      trust chain. A full trust chain is typically delivered in .pem format. Step 3:
      Install certificate and signing certificate chain on your web server. Place
      the .pem file from your certificate authority into the directory of your
      choice. Locate your created key file from the command you used to generate
      your certificate signing request. Open your website configuration file and
      edit your encrypted listener to leverage the ssl_certificate and
      ssl_certificate_key directives for a web server as shown below. You should
      also inspect include files inside your nginx.conf. This should be part of the
      server block. server { listen 443 ssl http2; listen [::]:443 ssl http2;
      ssl_certificate /etc/nginx/cert.crt; ssl_certificate_key /etc/nginx/nginx.key;
      ... } After editing this file, you must recycle nginx services for these
