  - rule_id: nginx.cis.4.http_strict_transport_security_hsts_is_enabled
    title: "Ensure HTTP Strict Transport Security (HSTS) is enabled"
    severity: high
    category: web_server
    tech_type: nginx
    automation_type: automated
    cis_benchmark: "CIS_NGINX v2.1.0"
    cis_version: "v2.1.0"
    cis_control: "4.1.8"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      HTTP Strict Transport Security (HSTS) headers instruct a user agent on how to
      communicate with a web server. HSTS headers ensure the strict transport
      security policies built into browsers and other user agents are informed only
      to communicate over HTTPS. HSTS with long validity periods should be used to
      most effectively secure your user population. Strict-Transport-Security should
      have a long max-age, which is recommended to be at least six months in length.
      This ensures the browser remembers your website should only be accessible via
      HTTPS for this amount of time.
    rationale: >
      HSTS headers help protect a server's users from accessing the server over
      unencrypted protocols. This header helps to prevent HTTP downgrade attacks.
    audit_procedure: >
      Issue this command to check for HSTS headers on your website: grep -ir Strict-
      Transport-Security /etc/nginx If your output does not include the following
      directive associated with your server configuration file, this recommendation
      is not implemented. The header should also include the max-age directive with
      15768000 seconds (six months) or longer configured. add_header Strict-
      Transport-Security 'max-age=15768000;' always;
    remediation: >
      Ensure the below snippet of code can be found in your server configuration for
      your proxy or web server. This will ensure the HSTS header is set with a
      validity period of six months, or 15768000 seconds. server { add_header
      Strict-Transport-Security 'max-age=15768000;' always; } Default Value: HSTS
      headers are not set by default. References: 1.
      https://www.globalsign.com/en/blog/what-is-hsts-and-how-do-i-use-it/ 2.
      https://mozilla.github.io/server-side-tls/ssl-config-generator/ 3.
      https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-
      Security#Preloading_Strict_Transport_Security 4. https://hstspreload.org 5.
      https://tools.ietf.org/html/rfc6797
    references: >
      1. https://www.globalsign.com/en/blog/what-is-hsts-and-how-do-i-use-it/ 2.
