  - rule_id: nginx.cis.2.only_required_modules_are_installed
    title: "Ensure only required modules are installed"
    severity: medium
    category: web_server
    tech_type: nginx
    automation_type: manual
    cis_benchmark: "CIS_NGINX v2.1.0"
    cis_version: "v2.1.0"
    cis_control: "2.1.1"
    cis_section: "2"
    profile_applicability: "Level 2"
    description: >
      This NGINX installation comes with several modules out of the box. These
      modules are not all always needed. Installations of NGINX should be hardened
      to ensure only the necessary modules are installed.
    rationale: >
      Minimizing features and functionality built into NGINX can help to reduce the
      number of vulnerabilities your server has, which reduces the likelihood of a
      successful compromise by attackers.
    audit_procedure: >
      Audit the modules used in your current NGINX build by using the nginx
      verification command: nginx -V
    remediation: >
      Consult the NGINX module documentation to determine which modules are needed
      for your specific installation. Modules may be removed using the configure
      command. References: 1. http://nginx.org/en/docs/configure.html Additional
      Information: NOTE: NGINX does not support the removal of modules using the dnf
      method of installation. In order to remove modules from NGINX, you will need
      to compile it from source. Consider the tradeoff between security hardening
      and ease of upgrade prior to attempting to build from source.
    references: >
      1. http://nginx.org/en/docs/configure.html Additional Information: NOTE: NGINX
      does not support the removal of modules using the dnf method of installation.
