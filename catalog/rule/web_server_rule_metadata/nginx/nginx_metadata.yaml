  - rule_id: nginx.cis.4.private_key_permissions_are_restricted
    title: "Ensure private key permissions are restricted"
    severity: high
    category: web_server
    tech_type: nginx
    automation_type: automated
    cis_benchmark: "CIS_NGINX v2.1.0"
    cis_version: "v2.1.0"
    cis_control: "4.1.3"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      The server's private key should be protected from unauthorized access by
      limiting access based on the principle of least privilege.
    rationale: >
      A server's private key file should be restricted to 400 permissions. This
      ensures only the owner of the private key file can access it. This is the
      minimum necessary permissions for the server to operate. If the private key
      file is not protected, an unauthorized user with access to the server may be
      able to find the private key file and use it to decrypt traffic sent to your
      server.
    audit_procedure: >
      Verify the permissions on the key file are 400. This can be found by running
      the following command. You should replace /etc/nginx/nginx.key with the
      location of your key file. find /etc/nginx/ -name '*.key' -exec stat -Lc '%n
      %a' {} + The output should show mode 400 or more restrictive Example:
      /etc/nginx/nginx.key 400
    remediation: >
      Run the following command to remove excessive permissions on key files in the
      `/etc/nginx/ directory. Note: The directory /etc/nginx/ should be replaced
      with the location of your key file. find /etc/nginx/ -name '*.key' -exec chmod
      u-wx,go-rwx {} + Default Value: The default permissions on the server's
      private key are 644 or -rw-r--r--. Additional Information: Important Note:
      This recommendation should be applied to both the keys of your server
      certificate and the key of your client certificate if you are looking to
      mutually authenticate a proxy server.
