  - rule_id: nginx.cis.4.custom_diffie_hellman_parameters_are_used
    title: "Ensure custom Diffie-Hellman parameters are used"
    severity: high
    category: web_server
    tech_type: nginx
    automation_type: automated
    cis_benchmark: "CIS_NGINX v2.1.0"
    cis_version: "v2.1.0"
    cis_control: "4.1.6"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Custom Diffie-Hellman (DH) key exchange parameters should be used. DH
      Ephemeral (DHE) parameters with at least 2048 bits should be generated.
    rationale: >
      Backward-compatible Perfect Forward Secrecy (PFS) ciphers (e.g. DHE-RSA-
      AES128- SHA256) should use strong and unique parameters. By default, NGINX
      will generate 1024-bit RSA keys for PFS ciphers; stronger alternatives should
      be used instead to provide better protection for data protected by encryption.
    audit_procedure: >
      Verify the option ssl_dhparam is explicitly provided: grep ssl_dhparam
      /etc/nginx/nginx.conf
    remediation: >
      Generate strong DHE (Ephemeral Diffie-Hellman) parameters using the following
      commands: mkdir /etc/nginx/ssl openssl dhparam -out /etc/nginx/ssl/dhparam.pem
      2048 chmod 400 /etc/nginx/ssl/dhparam.pem Alter the server configuration to
      use the new parameters: http { server { ssl_dhparam
      /etc/nginx/ssl/dhparam.pem; } } References: 1.
      https://weakdh.org/sysadmin.html
