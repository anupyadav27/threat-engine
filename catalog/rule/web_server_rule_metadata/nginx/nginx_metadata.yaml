  - rule_id: nginx.cis.5.x_content_type_options_header_is_configured_and
    title: "Ensure X-Content-Type-Options header is configured and enabled"
    severity: high
    category: web_server
    tech_type: nginx
    automation_type: automated
    cis_benchmark: "CIS_NGINX v2.1.0"
    cis_version: "v2.1.0"
    cis_control: "5.3.2"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The X-Content-Type-Options header should be used to force supported user
      agents to check an HTTP response's content type header with what is expected
      from the destination of the request.
    rationale: >
      Implementing the X-Content-Type-Options header with the 'nosniff' directive
      helps to prevent drive-by download attacks where a user agent is sniffing
      content types in responses.
    audit_procedure: >
      Run this command to verify the X-Content-Type-Options Header is enabled and
      set to not allow content type sniffing: grep -ir X-Content-Type-Options
      /etc/nginx The below should be part of the output. If it is not, this
      recommendation is not implemented. This should be implemented on every server
      block. If there are multiple server blocks on the system, each should be
      checked. add_header X-Content-Type-Options 'nosniff' always;
    remediation: >
      Open the nginx configuration file that contains your server blocks. Add the
      below line into your server block to add X-Content-Type-Options header and
      direct your user agent to not sniff content types. add_header X-Content-Type-
      Options 'nosniff' always; Default Value: This header is not implemented by
      default. References: 1. https://scotthelme.co.uk/hardening-your-http-response-
      headers/ 2. https://www.veracode.com/blog/2014/03/guidelines-for-setting-
      security-headers 3.
      https://www.owasp.org/index.php/OWASP_Secure_Headers_Project 4.
      https://fetch.spec.whatwg.org/#x-content-type-options-header 5.
      https://www.iana.org/assignments/message-headers/message- headers.xml#perm-
      headers Additional Information: The always parameter ensures that the header
      is applied to the HTTP response no matter what the HTTP response code is.
    references: >
