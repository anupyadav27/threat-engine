    cis_version: "v2.1.0"
    cis_control: "2.3.3"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The PID file stores the main process ID of the nginx process. This file should
      be protected from unauthorized modification.
    rationale: >
      The PID file should be owned by root and the group root. It should also be
      readable to everyone, but only writable by root (permissions 644). This will
      prevent unauthorized modification of the PID file, which could cause a denial
      of service.
    audit_procedure: >
      Run this command to verify the ownership and permissions of the nginx PID
      file: stat -L -c '%U:%G' /var/run/nginx.pid && stat -L -c '%a'
      /var/run/nginx.pid The output should show that the PID file is owned by root
      and has the group root and that the permissions are 644 as shown below:
      root:root 644
    remediation: >
      If the PID file is not owned by root, issue this command: chown root:root
      /var/run/nginx.pid If the PID file has permissions greater than 644, issue
      this command: chmod u-x,go-wx /var/run/nginx.pid Default Value: The PID file
      is owned by root and has permissions 644 by default when building using dnf.
