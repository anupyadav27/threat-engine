    description: >
      The NGINX server should be configured to validate the identity of the upstream
      server it is sending information to.
    rationale: >
      Configuring NGINX to validate the identity of the upstream server helps
      mitigate the risk of a man in the middle attack occurring against your server.
    audit_procedure: >
      To verify the configuration, follow this procedure: Step 1: Verify your nginx
