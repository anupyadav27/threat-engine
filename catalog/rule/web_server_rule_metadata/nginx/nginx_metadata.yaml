  - rule_id: nginx.cis.4.disable_weak_ciphers
    title: "Disable weak ciphers"
    severity: high
    category: web_server
    tech_type: nginx
    automation_type: manual
    cis_benchmark: "CIS_NGINX v2.1.0"
    cis_version: "v2.1.0"
    cis_control: "4.1.5"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      The ssl_ciphers directive should be used to configure the available ciphers on
      your web server, and the proxy_ssl_ciphers directive should be used to
      configure the available ciphers for your proxy. Weak ciphers should be
      disabled based on your company's policy or an industry best practice
      compliance profile. The ssl_prefer_server_ciphers should be used to ensure the
      user agent respects the server's preferred cipher order and does not set its
      own. If you are using a proxy or load balancer, you should use the
      proxy_ssl_ciphers directive to ensure your upstream connections are negotiated
      using secure ciphers.
    rationale: >
      The use of strong ciphers is critical to maintaining strong encryption on your
      web server, load balancer, or proxy. Weak ciphers may compromise the security
      of your site or your users by allowing legacy user agents to connect to your
      site in a vulnerable way. You may also meet compliance concerns by ensuring
      that your upstream connections meet the same level of security if using a
      proxy or load balancer. The server should enforce the cipher preference on the
      server side to protect users from malicious actors on the client side. Impact:
      Strong cipher configurations may not allow legacy user agents or user agents
      with weak configurations to connect to your site. If your server must also
      pass to a legacy upstream server, this may prevent it from being able to
      negotiate a cipher upstream.
    audit_procedure: >
      Use the following procedure to verify the ssl_cipher and proxy_ssl_cipher
      directives meet your company's policy. grep -ir ssl_ciphers /etc/nginx/ grep
      -ir proxy_ssl_ciphers /etc/nginx This output will show the server's configured
      ciphers and cipher preference policy. If you have multiple server blocks or
      proxy passes, you should ensure the directive or directives appear for each.
      In your environment, you may have to check all include files in your nginx
      configuration or the nginx configuration itself manually. The server ciphers
      may be located as part of the server block, and the proxy ciphers may be
      located as part of the location block for your upstream traffic. OpenSSL may
      also be used to check compatible ciphers following the procedure found at
      OWASP: https://www.owasp.org/index.php/Testing_for_SSL-TLS_%28OWASP-CM-001%29
    remediation: >
      The following procedures may be used to implement industry standard cipher
      profiles if you have an existing profile defined. These profiles may be
      modified to meet the requirements defined in your company's policy. This
      procedure assumes that all server blocks will be in /etc/nginx/nginx.conf and
      not inside any included files in the configuration. Set the ssl_cipher
      directive as part of your server block, and set the proxy_ssl_ciphers
      directive as part of the location block for your upstream server. This should
      look similar to the below examples: Server block configuration for client
      connectivity to web server, proxy, or load balancer: server { ssl_ciphers
      ALL:!EXP:!NULL:!ADH:!LOW:!SSLv2:!SSLv3:!MD5:!RC4; } Proxy or load balancer
      configuration for defined upstream negotiation: location / { proxy_pass
      https://cisecurity.org; proxy_ssl_ciphers
      ALL:!EXP:!NULL:!ADH:!LOW:!SSLv2:!SSLv3:!MD5:!RC4; } The below procedure
      assumes the default configuration profile. If you do not have ssl_ciphers or
      proxy_ssl_ciphers defined, add the directives to your proxy or web server
      configuration profile, then run the below commands to configure them to your
      selected profile. No weak ciphers SSLLABS proxy configuration sed -i
      's/proxy_ssl_ciphers[^;]*;/proxy_ssl_ciphers ECDHE-ECDSA-AES128-GCM-
      SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-
      AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-
      POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;/'
      /etc/nginx/nginx.conf No weak ciphers SSLLABS web server configuration: sed -i
      's/ssl_ciphers[^;]*;/ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE- RSA-
      AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-
      SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-
      AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;/' /etc/nginx/nginx.conf For
      changes to take effect, you must recycle nginx: systemctl restart nginx
      Default Value: These directives are not specified by default and are set to
      the default of HIGH:!aNULL:!MD5. References: 1. https://ssllabs.com 2.
      https://mozilla.github.io/server-side-tls/ssl-config-generator/ 3.
      http://nginx.org/en/docs/http/ngx_http_ssl_module.html 4.
      https://www.acunetix.com/blog/articles/tls-vulnerabilities-attacks-final-part/
      5. https://www.gracefulsecurity.com/tls-ssl-vulnerabilities/ Additional
      Information: Note: TLS configuration should always be set to your
      organizational policy. This recommendation is designed to meet best practices
      and offers several profiles your organization may align to.
    references: >
      1. https://ssllabs.com 2. https://mozilla.github.io/server-side-tls/ssl-
      config-generator/ 3. http://nginx.org/en/docs/http/ngx_http_ssl_module.html 4.
      https://www.acunetix.com/blog/articles/tls-vulnerabilities-attacks-final-part/
      5. https://www.gracefulsecurity.com/tls-ssl-vulnerabilities/ Additional
      Information: Note: TLS configuration should always be set to your
      organizational policy. This recommendation is designed to meet best practices
      and offers several profiles your organization may align to.
    impact: >
      Strong cipher configurations may not allow legacy user agents or user agents
      with weak configurations to connect to your site. If your server must also
      pass to a legacy upstream server, this may prevent it from being able to
      negotiate a cipher upstream.
    compliance_mappings:
      cis:
        - "CIS_NGINX_v2_1_0_4_1_5"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_nginx_v2_1_0_4_1_5"
