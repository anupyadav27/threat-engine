      vendor for most situations. As an alternative, packages from nginx.org are
      available for a variety of platforms, including Linux and FreeBSD.
    rationale: >
      The main benefits of using NGINX packages from your vendor are: • Ease of
      installation • Dependency resolution • Increased effectiveness of maintenance
      and security patches • Q&A procedures carried out by your vendor
    audit_procedure: >
      To check if nginx is installed on your server, run the following command:
      nginx -v The command output should return the version of nginx that is
