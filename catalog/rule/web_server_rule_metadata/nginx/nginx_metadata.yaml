  - rule_id: nginx.cis.5.x_frame_options_header_is_configured_and_enabled
    title: "Ensure X-Frame-Options header is configured and enabled"
    severity: high
    category: web_server
    tech_type: nginx
    automation_type: automated
    cis_benchmark: "CIS_NGINX v2.1.0"
    cis_version: "v2.1.0"
    cis_control: "5.3.1"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The X-Frame-Options header should be set to allow specific websites or no
      sites at all to embed your website as an object within their own, depending on
      your organizational policy and application needs.
    rationale: >
      The X-Frame-Options header allows you to mitigate the risk of clickjacking
      attacks. Impact: Implementing this may block legitimate partner sites from
      embedding your website if this header is not configured properly.
    audit_procedure: >
      Run the following to verify this header is implemented on your site: grep -ir
      X-Frame-Options /etc/nginx The output should look similar to the below, but
      customized to your use case. If there is no output from this command, this
      recommendation is not implemented. add_header X-Frame-Options 'SAMEORIGIN'
      always;
    remediation: >
      Add the below to your server blocks in your nginx configuration. The policy
      should be configured to meet your organization's needs. add_header X-Frame-
      Options 'SAMEORIGIN' always; Default Value: This is not configured by default.
      References: 1. https://developer.mozilla.org/en-
      US/docs/Web/HTTP/Headers/X-Frame-Options 2.
      https://scotthelme.co.uk/hardening-your-http-response-headers/ 3.
      https://www.veracode.com/blog/2014/03/guidelines-for-setting-security-headers
      4. https://www.owasp.org/index.php/OWASP_Secure_Headers_Project Additional
      Information: Important Note: The configuration in this recommendation
      recommends that this header is set to the same origin; however, this does not
      mean that if it is not set so, that this is done incorrectly. This header may
      also be configured to allow from specific origins or deny from all origins.
      The always parameter ensures that this header is applied no matter what the
      http response code is.
    references: >
