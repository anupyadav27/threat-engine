    profile_applicability: "Level 1"
    description: >
      NGINX can be configured to listen on any port, but it should be configured to
      listen on authorized ports only.
    rationale: >
      Limiting the listening ports to only those that are authorized helps to ensure
      no unauthorized services are running through the use of NGINX.
    audit_procedure: >
      Use this command to audit all listening ports on the server: grep -ir
      'listen[^;]*;' /etc/nginx The ports being used should immediately follow the
      listen directive in the output. Ensure all ports that are actively listening
      and not commented out are authorized for use on the server. The output should
      look similar to this example: /etc/nginx/nginx.conf.rpmsave: listen 80;
      /etc/nginx/nginx.conf.rpmsave: listen 443 ssl http2;
      /etc/nginx/conf.d/default.conf: listen 80; Any files included in the include
      directive of the nginx configuration file or the nginx configuration file
      itself should be checked. To check which files are included in the nginx
      configuration file run the following command: grep include
      /etc/nginx/nginx.conf The output below shows that any file matching the
      pattern /etc/nginx/conf.d/*.conf/ in the above audit check should be
      considered an auditable port.
    remediation: >
      If any ports are listening that are not authorized, comment out or delete the
      associated configuration for that listener. Default Value: Only port 80 is
      listening by default.
