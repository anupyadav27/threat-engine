  - rule_id: nginx.cis.5.maximum_request_body_size_is_set_correctly
    title: "Ensure the maximum request body size is set correctly"
    severity: high
    category: web_server
    tech_type: nginx
    automation_type: automated
    cis_benchmark: "CIS_NGINX v2.1.0"
    cis_version: "v2.1.0"
    cis_control: "5.2.2"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The client_max_body_size directive sets the size of the request body that is
      allowed to read a client request. This defines the number of bytes allowed in
      a request and is equivalent to the Content-Length request header field.
    rationale: >
      Limiting the size of the request body helps prevent unexpectedly long or large
      client requests from being passed to an application to perform buffer overflow
      attacks. This value should be set low enough to protect the application but
      high enough not to interfere with functionality and block legitimate request
      bodies.
    audit_procedure: >
      To verify the current setting for the client_max_body_size directive, issue
      the below command. You should also manually check your nginx configuration for
      include statements that may be located outside of the /etc/nginx directory. If
      this is not present, the value is set at the default. grep -ir
      client_max_body_size /etc/nginx
    remediation: >
      Find the HTTP or server block of your nginx configuration and add the
      client_max_body_size set to 100K in this block. The appropriate value may be
      different based on your application's needs. client_max_body_size 100K;
      Default Value: client_max_body_size 1m; References: 1.
      https://www.cyberciti.biz/tips/linux-unix-bsd-nginx-webserver-security.html 2.
      http://nginx.org/en/docs/http/ngx_http_core_module.html#client_body_temp_path
