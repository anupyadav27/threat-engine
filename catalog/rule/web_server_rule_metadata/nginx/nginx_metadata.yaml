  - rule_id: nginx.cis.2.nginx_reverse_proxy_does_not_enable_information
    title: "Ensure the NGINX reverse proxy does not enable information disclosure"
    severity: high
    category: web_server
    tech_type: nginx
    automation_type: automated
    cis_benchmark: "CIS_NGINX v2.1.0"
    cis_version: "v2.1.0"
    cis_control: "2.5.4"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The server and x-powered-by header may specify the underlying technology used
      by an application. The NGINX reverse proxy may pass these headers if not
      explicitly directed to remove them.
    rationale: >
      Attackers can conduct reconnaissance on a website using these response
      headers, then target attacks for specific known vulnerabilities associated
      with the underlying technologies. Removing these headers will reduce the
      likelihood of targeted attacks.
    audit_procedure: >
      Confirm that the headers are denied as part of the location block of the nginx
      configuration. You may also have to check included files as part of this
      configuration. Run this command: grep proxy_hide_header /etc/nginx/nginx.conf
      The output should read: proxy_hide_header X-Powered-By; proxy_hide_header
      Server;
    remediation: >
