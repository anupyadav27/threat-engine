  - rule_id: apache_http.cis.3.group_is_set_correctly_on_apache_directories_and
    title: "Ensure the Group Is Set Correctly on Apache Directories and Files"
    severity: high
    category: web_server
    tech_type: apache_http
    automation_type: automated
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "3.5"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The Apache directories and files should be set to have a group Id of root, (or
      a root equivalent) group. This applies to all of the Apache software
      directories and files installed. The only expected exception is that the
      Apache web document root ($APACHE_PREFIX/htdocs) is likely to need a
      designated group to allow web content to be updated (such as webupdate)
      through a change management process.
    rationale: >
      Securing Apache files and directories will reduce the probability of
      unauthorized modifications to those resources.
    audit_procedure: >
      Identify files in the Apache directories other than htdocs with a group other
      than root: # find $APACHE_PREFIX -path $APACHE_PREFIX/htdocs -prune -o \!
      -group root - ls
    remediation: >
      Perform the following: Set ownership on the $APACHE_PREFIX directories such as
      /usr/local/apache2: $ chgrp -R root $APACHE_PREFIX Default Value: Default
      ownership and group is a mixture of the user:group that built the software and
      root:root.
