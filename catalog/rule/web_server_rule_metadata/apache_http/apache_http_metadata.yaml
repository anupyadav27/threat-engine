  - rule_id: apache_http.cis.5.access_to_ht_files_is_restricted
    title: "Ensure Access to .ht* Files Is Restricted"
    severity: high
    category: web_server
    tech_type: apache_http
    automation_type: automated
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "5.10"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      Restrict access to any files beginning with .ht using the FilesMatch
      directive.
    rationale: >
      The default name for access filename which allows files in web directories to
      override the Apache configuration is .htaccess. The usage of access files
      should not be allowed, but as a defense in depth a FilesMatch directive is
      recommended to prevent web clients from viewing those files in case they are
      created. Also a common name for web password and group files are .htpasswd and
      .htgroup. Neither of these files should be placed in the document root, but,
      in the event they are, the FilesMatch directive can be used to prevent them
