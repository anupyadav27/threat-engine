  - rule_id: apache_http.cis.3.lock_file_is_secured
    title: "Ensure the Lock File Is Secured"
    severity: high
    category: web_server
    tech_type: apache_http
    automation_type: automated
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "3.8"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The Mutex directive sets the locking mechanism used to serialize access to
      resources. It may be used to specify that a lock file is to be used as a mutex
      mechanism and may provide the path to the lock file to be used with the
      fcntl(2) or flock(2) system calls. Most Linux systems will default to using
      semaphores instead, so the directive may not apply. However, in the event a
      lock file is used, it is important for the lock file to be in a local
      directory that is not writable by other users.
    rationale: >
      If the lock file to be used as a mutex is placed in a writable directory,
      other accounts could create a denial of service attack and prevent the server
      from starting by creating a lock file with the same name.
    audit_procedure: >
      Verify the configuration does NOT include a Mutex directive with the mechanism
      of fcntl, flock or file. If one of the file locking mechanisms is configured,
      then find the directory in which the lock file would be created. The default
      value is the ServerRoot/logs directory. 1. Verify that the lock file directory
      is not a directory within the Apache DocumentRoot 2. Verify that the ownership
      and group of the directory is root:root (or the user under which Apache
      initially starts up if not root). 3. Verify the permissions on the directory
      are only writable by root (or the startup user if not root), 4. Check that the
      lock file directory is on a locally mounted hard drive rather than an NFS
      mounted file system
    remediation: >
      Find the directory path in which the lock file would be created. The default
      value is the ServerRoot/logs directory. 1. Modify the directory if the path is
      a directory within the Apache DocumentRoot 2. Change the ownership and group
      to be root:root, if not already. 3. Change the permissions so that the
      directory is only writable by root, or the user under which Apache initially
      starts up (default is root), 4. Check that the lock file directory is on a
      locally mounted hard drive rather than an NFS mounted file system. Default
      Value: The default mechanism for the Mutex directive is platform specific and
      may be determined by running httpd -V. The default path is the ServerRoot/logs
      directory. References: 1.
      https://httpd.apache.org/docs/2.4/mod/core.html#mutex
    references: >
      1. https://httpd.apache.org/docs/2.4/mod/core.html#mutex
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_APACHE_HTTP_2_4_v2_2_0_3_8"
      nist_800_53: []
      soc2: []
      pci_dss: []
