  - rule_id: apache_http.cis.4.override_is_disabled_for_the_os_root_directory
    title: "Ensure OverRide Is Disabled for the OS Root Directory"
    severity: high
    category: web_server
    tech_type: apache_http
    automation_type: automated
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "4.3"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      The Apache AllowOverRide directive and the new AllowOverrideList directive
      allow for .htaccess files to be used to override much of the configuration,
      including authentication, handling of document types, auto generated indexes,
      access control, and options. When the server finds an .htaccess file (as
      specified by AccessFileName) it needs to know which directives declared in
      that file can override earlier access information. When this directive is set
      to None, then .htaccess files are completely ignored. In this case, the server
      will not even attempt to read .htaccess files in the filesystem. When this
      directive is set to All, then any directive which has the .htaccess Context is
      allowed in the .htaccess files.
    rationale: >
      While the functionality of htaccess files is sometimes convenient, usage
      decentralizes the access controls and increases the risk of configurations
      being changed or viewed inappropriately by an unintended or rogue .htaccess
      file. Consider also that some of the more common vulnerabilities in web
      servers and web applications allow the web files to be viewed or to be
      modified, then it is wise to keep the configuration out of the web server from
      being placed in .htaccess files.
    audit_procedure: >
      Perform the following to determine if the recommended state is implemented: 1.
      Search the Apache configuration files (httpd.conf and any included
      configuration files) to find a root element. 2. Ensure there is a single
      AllowOverride directive with the value of None. 3. Ensure there are no
      AllowOverrideList directives present. The following may be useful for
      extracting root directory elements from the Apache configuration for auditing.
      $ perl -ne 'print if /^ *<Directory *\//i .. /<\/Directory/i'
      $APACHE_PREFIX/conf/httpd.conf
    remediation: >
      Perform the following to implement the recommended state: 1. Search the Apache
      configuration files (httpd.conf and any included configuration files) to find
      a root <Directory> element. 2. Remove any AllowOverrideList directives found.
      3. Add a single AllowOverride directive if there is none. 4. Set the value for
      AllowOverride to None. <Directory /> . . . AllowOverride None . . .
      </Directory> Default Value: The following is the default root directory
      configuration: <Directory /> . . . AllowOverride None . . . </Directory>
      References: 1. https://httpd.apache.org/docs/2.4/mod/core.html#allowoverride
      2. https://httpd.apache.org/docs/2.4/mod/core.html#allowoverridelist
    references: >
      1. https://httpd.apache.org/docs/2.4/mod/core.html#allowoverride 2.
      https://httpd.apache.org/docs/2.4/mod/core.html#allowoverridelist
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_APACHE_HTTP_2_4_v2_2_0_4_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_apache_http_2_4_v2_2_0_4_3"
    metadata_source: generated
    generated_by: generate_tech_rules

