  - rule_id: apache_http.cis.1.restrict_other_write_access_on_apache_directories
    title: "Restrict Other Write Access on Apache Directories and Files"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.2_v3.3.1"
    cis_version: "2.2_v3.3.1"
    cis_control: "1.3.6"
    cis_section: "1"
    profile_applicability: ""
    description: >
      The permission on the Apache directories should be rwxr-xr-x (755) and the
      file permissions should be similar except not executable if executable is not
      appropriate. This applies to all of the Apache software directories and files
      installed with the possible exception in some cases may have a designated
      group with write access for the Apache web document root
      ($APACHE_PREFIX/htdocs) are likely to need a designated group to allow web
      content to be updated. In addition the /bin directory and executables should
      be set to not be readable by other.
    rationale: >
      None of the Apache files and directories, including the Web document root must
      allow other write access. Other write access is likely to be very useful for
      unauthorized modification of web content, configuration files or software for
      malicious attacks. 28 | P a g e
    audit_procedure: >
      Identify files or directories in the Apache directory with other write access,
      excluding symbolic links: # find -L $APACHE_PREFIX \! -type l -perm /o=w -ls
