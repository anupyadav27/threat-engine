  - rule_id: apache_http.cis.1.restrict_weak_ssl_ciphers
    title: "Restrict Weak SSL Ciphers"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.2_v3.3.1"
    cis_version: "2.2_v3.3.1"
    cis_control: "1.7.5"
    cis_section: "1"
    profile_applicability: ""
    description: >
      Disable weak SSL ciphers using the SSLCipherSuite, and SSLHonorCipherOrder
      directives. The SSLCipherSuite directive specifies which ciphers are allowed
      in the negotiation with the client. While the SSLHonorCipherOrder causes the
      servers preferred ciphers to be used instead of the clients specified
      preferences.
    rationale: >
      The SSL/TLS protocols support a large number of encryption ciphers including
      many weak ciphers that are subject to man- in- the middle attacks and
      information disclosure. Some implementations even support the NULL cipher
      which allows a TLS connection without any encryption! Therefore it is critical
      to ensure the configuration only allows strong ciphers greater than or equal
      to 128 bit to be negotiated with the client. Stronger 256- bit ciphers should
      be allowed and preferred. In addition enabling the SSLHonorCipherOrder further
      protects the client from man- in- the- middle downgrade attacks by ensuring
      the servers preferred ciphers will be used rather than the clients
      preferences. In addition, the RC4 ciphers are stream ciphers that are widely
      used and have even been recommended in previous Apache benchmarks as a means
      of mitigating attacks based on CBC cipher vulnerabilities. However the RC4
      ciphers also have known cryptographic weaknesses and are no longer
      recommended, and should be disabled. The IETF is working on a new draft
      proposed standard [4] that would disallow RC4 negotiation for all TLS
      versions. While the document is not yet an RFC (i.e. it’s not a standard yet),
      It is expect it to become one soon, and the RC4 cipher suites will begin to
      disappear from options in TLS 75 | P a g e deployments. In the meantime, it is
      important to ensure that RC4- based cipher suites as disabled in the
      configuration.
    audit_procedure: >
      Perform the following steps to determine if the recommended state is
      implemented: Verify the SSLCipherSuite directive disables weak ciphers in the
      Apache server level configuration and every virtual host that is SSL enabled.
      Alternately the SSL ciphers supported can be easily tested by connecting to a
      running web server with openssl s_client such as shown in
      https://www.owasp.org/index.php/Testing_for_SSL- TLS_%28OWASP- CM- 001%29
    remediation: >
      Perform the following to implement the recommended state: Add or modify the
      following line in the Apache server level configuration and every virtual host
      that is SSL enabled: SSLHonorCipherOrder On SSLCipherSuite
      ALL:!EXP:!NULL:!ADH:!LOW:!SSLv2:!MD5:!RC4 FIPS Compliance:The above cipher
      suite specification may be used for servers that fall under FIPS 140- 2
      compliance requirements, SP800- 52 provides guidelines for the TLS ciphers,
      because it eliminates the usage of the RC4 cipher and MD5 hash which are not
      deemed FIPS compliant. Disable SSLv3 Ciphers: If the SSLv3 protocol has also
      been disabled as recommended, then the SSLv3 related ciphers will not be used,
      and could be removed from the cipher suite specification. SSLCipherSuite
      ALL:!EXP:!NULL:!ADH:!LOW:!SSLv2:!SSLv3:!MD5:!RC4 Default Value: The following
      are the default values: SSLCipherSuite default depends on OpenSSL version.
      SSLHonorCipherOrder Off 76 | P a g e References: 1.
      http://httpd.apache.org/docs/2.2/mod/mod_ssl.html#sslciphersuite 2.
      http://httpd.apache.org/docs/2.2/mod/mod_ssl.html#sslhonorcipherorder 3.
      http://www.owasp.org/index.php/Testing_for_SSL- TLS_%28OWASP- CM- 001%29 4.
      https://datatracker.ietf.org/doc/draft- ietf- tls- prohibiting- rc4/
    references: >
      1. http://httpd.apache.org/docs/2.2/mod/mod_ssl.html#sslciphersuite 2.
      http://httpd.apache.org/docs/2.2/mod/mod_ssl.html#sslhonorcipherorder 3.
      http://www.owasp.org/index.php/Testing_for_SSL- TLS_%28OWASP- CM- 001%29 4.
      https://datatracker.ietf.org/doc/draft- ietf- tls- prohibiting- rc4/
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_APACHE_HTTP_2_2_v3_3_1_1_7_5"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_apache_http_2_2_v3_3_1_1_7_5"
