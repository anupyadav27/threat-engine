      particular will disclose inappropriate information about the web server
      including directory paths and detailed version and configuration information.
    audit_procedure: >
      Perform the following to determine if the recommended state is implemented: 1.
      Locate cgi- bin files and directories enabled in the Apache configuration via
      Script, ScriptAlias or ScriptAliasMatch other ScriptInterpreterSource
      directives. 2. Ensure the printenv CGI is not installed in any configured cgi-
      bin directory.
