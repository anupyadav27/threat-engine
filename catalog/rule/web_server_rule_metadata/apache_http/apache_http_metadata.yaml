  - rule_id: apache_http.cis.1.disable_autoindex_module
    title: "Disable Autoindex Module"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.2_v3.3.1"
    cis_version: "2.2_v3.3.1"
    cis_control: "1.2.5"
    cis_section: "1"
    profile_applicability: ""
    description: >
      The Apache autoindex module automatically generates web page listing the
      contents of directories on the server, typically used so that an index.html
      does not have to generated
    rationale: >
      Automated directory listings should not be enabled as it will also reveal
      information helpful to an attacker such as naming conventions and directory
      paths, it may reveal files that were not intended to be revealed.
    audit_procedure: >
      Perform the following to determine if the module is enabled. 1. Run the httpd
      server with the -M option to list enabled modules: # httpd -M | grep
      autoindex_module Note: If the module is correctly disabled, the only output
      should be 'Syntax OK' when executing the above command.
    remediation: >
      Perform either one of the following to disable the mod_autoindex module: 1.
      For source builds with static modules run the Apache ./configure script with
      the - -disable-autoindex configure script options $ cd $DOWNLOAD/httpd-2.2.22
