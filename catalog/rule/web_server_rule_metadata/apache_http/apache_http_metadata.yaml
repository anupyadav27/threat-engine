    profile_applicability: ""
    description: >
      Group permissions on Apache Document Root directories $DOCROOT may need to be
      writeable by an authorized group such as development, support, or a production
      content management tool. However it is important that the Apache group used to
      run the server does not have write access to any directories or files in the
      document root.
    rationale: >
      Preventing Apache from writing to the web document root helps mitigate risk
      associated with web application vulnerabilities associated with file uploads
      or command execution. 34 | P a g e Typically, if an application hosted by
      Apache needs to write to directory, it is best practice to have that directory
      live outside the web root.
    audit_procedure: >
