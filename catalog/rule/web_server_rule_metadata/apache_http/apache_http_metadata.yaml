  - rule_id: apache_http.cis.11.selinux_is_enabled_in_enforcing_mode
    title: "Ensure SELinux Is Enabled in Enforcing Mode"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: automated
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "11.1"
    cis_section: "11"
    profile_applicability: "Level 2"
    description: >
      SELinux (Security-Enhanced Linux) is a Linux kernel security module that
      provides mandatory access control security policies with type enforcement that
      are checked after the traditional discretionary access controls. It was
      created by the US National Security Agency and can enforce rules on files and
      processes in a Linux system, and restrict actions, based on defined policies.
    rationale: >
      Web applications and services continue to be one of the leading attack vectors
      for black-hat criminals to gain access to information and servers. The threat
      is high because web servers are often externally accessible and typically have
      the greatest share of server-side vulnerabilities. The SELinux mandatory
      access controls provide a much stronger security model which can be used to
      implement a deny-by-default model which only allows what is explicitly
      permitted.
    audit_procedure: >
      Perform the following steps to determine if the recommended state is
      implemented: Use the sestatus command to check that SELinux is enabled and
      that both the current mode and the configured mode are set to enforcing. $
      sestatus | grep -i mode Current mode: enforcing Mode from config file:
      enforcing
    remediation: >
      Perform the following to implement the recommended state: If SELinux is not
      enabled in the configuration file, edit the file /etc/selinux/config and set
      the value of SELINUX as enforcing and reboot the system for the new
      configuration to be effective. SELINUX=enforcing If the current mode is not
      enforcing, and an immediate reboot is not possible, the current mode can be
      set to enforcing with the setenable command shown below. # setenforce 1
      Default Value: SELinux is not enabled by default. References: 1.
      https://en.wikipedia.org/wiki/Security-Enhanced_Linux
    references: >
      1. https://en.wikipedia.org/wiki/Security-Enhanced_Linux
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_APACHE_HTTP_2_4_v2_2_0_11_1"
      nist_800_53: []
