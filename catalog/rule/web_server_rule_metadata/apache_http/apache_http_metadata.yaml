  - rule_id: apache_http.cis.7.all_web_content_is_accessed_via_https
    title: "Ensure All Web Content is Accessed via HTTPS"
    severity: high
    category: web_server
    tech_type: apache_http
    automation_type: automated
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "7.9"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      All of the website content should be served via HTTPS rather than HTTP. A
      redirect from the HTTP website to the HTTPS content is often useful and is
      recommended, but all significant content should be accessed via HTTPS so that
      it is authenticated and encrypted.
    rationale: >
      The usage of clear text HTTP prevents the client browser from authenticating
      the connection and ensuring the integrity of the website information. Without
      the HTTPS authentication, a client may be subjected to a variety of man-in-
      the-middle and spoofing attacks which would cause them to receive modified web
      content which could harm the organization’s reputation. Through DNS attacks or
      malicious redirects, the client could arrive at a malicious website instead of
      the intended website. The malicious website could deliver malware, request
      credentials, or deliver false information.
    audit_procedure: >
      Perform the following to determine if the recommended state is implemented: •
      Gather the list of listening IP addresses from the Apache configuration files.
      The commands below may be used to extract the relevant IP addresses from the
      configuration files. The CONF_DIRS variable needs to be set to the list of
      directories that contain all of the Apache configuration files. ## Replace the
      following directory list with the appropriate list. CONF_DIRS=”/etc/httpd/conf
      /etc/httpd/conf.d /etc/httpd/conf_dir2 . . . “ CONFS=$(find $CONF_DIRS -type f
      -name '*.conf' ) ## Search for Listen directives that are not port :443 or
      https IPS=$(egrep -ih '^\s*Listen ' $CONFS | egrep -iv '(:443\b)|https' | cut
      -d' ' -f2) • Gather the list of virtual host names from the Apache
      configuration files. The commands below can be used to extract the relevant
      virtual host names from the configuration files listed in $CONFS. The
      resulting list will include all virtual hosts not running on port :443.
      Although some listed virtual hosts may be TLS enabled, but on a non-standard
      port. Such websites will return an error rather than HTML content, as shown in
      the final steps. ## Get host names and ports of all of the virtual hosts
      VHOSTS=$(egrep -iho '^\s*<VirtualHost .*>' $CONFS | egrep -io '\s+[A-
      Z:.0-9]+>$' | \ tr -d ' >') • For each of the IP address and virtual hosts
      name, prefix the IP address or host name with the http:// protocol, and add
      the final slash as well. URLS=$(for h in $LIPADDR $VHOSTS ; do echo
      'http://$h/'; done) • Check to ensure each URL does not deliver significate
      web content via the HTTP protocol. The URL’s may be manually entered in a
      browser for testing, or may be scripted with a command line web client such as
      curl, as shown below. ## For each of the URL’s test with curl, and truncate
      the output to 300 characters for u in $URLS ; do echo -e '\n\n\n=== $u ===';
      curl -fSs $u | head -c 300 ; done Any URLs which return significant HTML
      document content, rather than a redirect or an error are not compliant. Two
      compliant examples are shown; the first one has a redirect. ===
      http://www.cisecurity.org/ === <!DOCTYPE HTML PUBLIC '-//IETF//DTD HTML
      2.0//EN'> <html><head> <title>301 Moved Permanently</title> </head><body>
      <h1>Moved Permanently</h1> <p>The document has moved <a
      href='https://www.cisecurity.org/'>here</a>.</p> </body></html> This compliant
      example below returns an error, due to using HTTP on a HTTPS website. ===
      http://www.example.com:4430/ === curl: (22) The requested URL returned error:
      400 Bad Request
    remediation: >
      Perform the following to implement the recommended state: Move the web content
      to a TLS enabled website, and add an HTTP Redirect directive to the Apache
      configuration file to redirect to the TLS enabled website similar to the
      example shown. Redirect permanent / https://www.cisecurity.org/ Default Value:
      The following are the default values: TLS is not enabled by default.
      References: 1. https://httpd.apache.org/docs/2.4/mod/mod_ssl.html
    references: >
      1. https://httpd.apache.org/docs/2.4/mod/mod_ssl.html
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_APACHE_HTTP_2_4_v2_2_0_7_9"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_apache_http_2_4_v2_2_0_7_9"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: apache_http.cis.7.ocsp_stapling_is_enabled
    title: "Ensure OCSP Stapling Is Enabled"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: automated
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "7.10"
    cis_section: "7"
    profile_applicability: "Level 2"
    description: >
      The OCSP (Online Certificate Status Protocol) provides the current revocation
      status of an X.509 certificate and allows for a certificate authority to
      revoke the validity of a signed certificate before its expiration date. The
      URI for the OCSP server is included in the certificate and verified by the
      browser. The Apache SSLUseStapling directive along with the SSLStaplingCache
      directive are recommended to enable OCSP Stapling by the web server. If the
      client requests OCSP stapling, then the web server can include the OCSP server
      response along with the web server's X.509 certificate.
    rationale: >
      The OCSP protocol is a big improvement over CRLs (certificate revocation
      lists) for checking if a certificate has been revoked. There are however some
      minor privacy and efficiency concerns with OCSP. The fact that the browser has
      to check a third-party CA discloses that the browser is configured for OCSP
      checking. Also, the already high overhead of making an SSL connection is
      increased by the need for the OCSP requests and responses. The OCSP stapling
      improves the situation by having the SSL server 'staple' an OCSP response,
      signed by the OCSP server, to the certificate it presents to the client. This
      obviates the need for the client to ask the OCSP server for status information
      on the server certificate. However, the client will still need to make OCSP
      requests on any intermediate CA certificates that are typically used to sign
      the server's certificate.
    audit_procedure: >
      Perform the following steps to determine if the recommended state is
      implemented. At the Apache server level configuration and for every virtual
      host that is SSL enabled: • Verify the SSLStaplingCache directive is present
      and not commented out. There are three supported cache types, any of them are
      considered compliant. • Verify the SSLUseStapling directive is enabled with a
      value of on
    remediation: >
      Perform the following to implement the recommended state: Add or modify the
      SSLUseStapling directive to have a value of on in the Apache server level
      configuration and every virtual host that is SSL enabled. Also ensure that
      SSLStaplingCache is set to one of the three cache types similar to the
      examples below. SSLUseStapling On SSLStaplingCache
      'shmcb:logs/ssl_staple_cache(512000)' - or- SSLStaplingCache
      'dbm:logs/ssl_staple_cache.db' - or - SSLStaplingCache
      dc:UNIX:logs/ssl_staple_socket Default Value: SSLUseStapling Off
      SSLStaplingCache <no default value> References: 1.
      https://en.wikipedia.org/wiki/OCSP_stapling - OCSP Stapling 2.
      https://httpd.apache.org/docs/2.4/mod/mod_ssl.html- Apache SSL Directives
    references: >
      1. https://en.wikipedia.org/wiki/OCSP_stapling - OCSP Stapling 2.
      https://httpd.apache.org/docs/2.4/mod/mod_ssl.html- Apache SSL Directives
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_APACHE_HTTP_2_4_v2_2_0_7_10"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_apache_http_2_4_v2_2_0_7_10"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: apache_http.cis.7.http_strict_transport_security_is_enabled
    title: "Ensure HTTP Strict Transport Security Is Enabled"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: automated
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "7.11"
    cis_section: "7"
    profile_applicability: "Level 2"
    description: >
      HTTP Strict Transport Security (HSTS) is an optional web server security
      policy mechanism specified by an HTTP Server header. The HSTS header allows a
      server declaration that only HTTPS communication should be used rather than
      clear text HTTP communication.
    rationale: >
      Usage of HTTP Strict Transport Security (HSTS) helps protect HSTS compliant
      browsers and other agents from HTTP downgrade attacks. Downgrade attacks
      include a variety of man-in-the-middle attacks which leave the web
      communication vulnerable to disclosure and modification by forcing the usage
      of HTTP rather than HTTPS communication. The sslstrip attack tool by Moxie
      Marlinspike released in 2009 is one such attack, which works when the server
      allows both HTTP and HTTPS communication. However, a man-in-the-middle HTTP-
      to-HTTPS proxy would be effective in cases where the server required HTTPS,
      but did not publish an HSTS policy to the browser. This attack would also be
      effective on browsers which were not compliant with HSTS. All current up-to-
      date browsers support HSTS. The HSTS header specifies a length of time in
      seconds that the browser/user agent should access the server only using HTTPS.
      The header may also specify if all sub- domains should also be included in the
      same policy. Once a compliant browser receives the HSTS Header it will not
      allow access to the server via HTTP. Therefore, it is important that you
      ensure that there is no portion of the web site or web application that
      requires HTTP prior to enabling the HSTS protocol. If all sub-domains are to
      be included via the includeSubDomains option, then carefully consider all
      various host names, web applications and third-party services used to include
      any DNS CNAME values that may be impacted. An overly broad includeSubDomains
      policy will disable access to HTTP web sites for all websites with the same
      domain name. Also consider that the access will be disabled for the number of
      seconds given in the max-age value, so in the event a mistake is made, a large
      value, such as a year, could create significant support issues. An optional
      flag of preload may be added if the web site name is to be submitted to be
      preloaded in Chrome, Firefox and Safari browsers. See
      https://hstspreload.appspot.com/ for details.
    audit_procedure: >
      Perform either of the following steps to determine if the recommended state is
      implemented: At the Apache server level configuration and for every virtual
      host that is SSL enabled, verify there is a Header directive present that sets
      the Strict-Transport-Security header with a max-age value of at least 480
      seconds or more (8 minutes or more). For example: Header always set Strict-
      Transport-Security 'max-age=600' As an alternative, the configuration may be
      validated by connecting to the HTTPS server and verifying the presence of the
      header. Such as the openssl s_client command shown below: openssl s_client
      -connect www.example.com:443 GET / HTTP1.1. Host:www.example.com HTTP/1.1 200
      OK Date: Mon, 08 Dec 2014 18:28:29 GMT Server: Apache X-Frame-Options: NONE
      Strict-Transport-Security: max-age=600 Last-Modified: Mon, 19 Jun 2006
      14:47:16 GMT ETag: '152-41694d7a92500' Accept-Ranges: bytes Content-Length:
      438 Connection: close Content-Type: text/html
    remediation: >
      Perform the following to implement the recommended state: Add a Header
      directive as shown below in the Apache server level configuration and every
      virtual host that is SSL enabled. The includeSubDomains and preload flags may
      be included in the header, but are not required. Header always set Strict-
      Transport-Security 'max-age=600; includeSubDomains; preload' - or - Header
      always set Strict-Transport-Security 'max-age=600' Default Value: The Strict
      Transport Security header is not present by default. References: 1.
      https://en.wikipedia.org/wiki/HTTP_Strict_Transport_Security 2.
      https://www.owasp.org/index.php/HTTP_Strict_Transport_Security 3.
      https://moxie.org/software/sslstrip/ 4. https://developer.mozilla.org/en-
      US/docs/Web/Security/HTTP_strict_transport_security 5.
      https://hstspreload.appspot.com/
    references: >
      1. https://en.wikipedia.org/wiki/HTTP_Strict_Transport_Security 2.
      https://www.owasp.org/index.php/HTTP_Strict_Transport_Security 3.
      https://moxie.org/software/sslstrip/ 4. https://developer.mozilla.org/en-
      US/docs/Web/Security/HTTP_strict_transport_security 5.
