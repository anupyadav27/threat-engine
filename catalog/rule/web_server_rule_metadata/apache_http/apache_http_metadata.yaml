  - rule_id: apache_http.cis.1.restrict_options_for_the_web_root_directory
    title: "Restrict Options for the Web Root Directory"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.2_v3.3.1"
    cis_version: "2.2_v3.3.1"
    cis_control: "1.5.2"
    cis_section: "1"
    profile_applicability: ""
    description: >
      The Apache Options directive allows for specific configuration of options,
      including execution of CGI, following symbolic links, server side includes,
      and content negotiation. Refer to the Apache 2.2 documentation for details
      http://httpd.apache.org/docs/2.2/mod/core.html#options 42 | P a g e
    rationale: >
      The Options directive at the web root or document root level also needs to be
      restricted to the minimal options required. A setting of None is highly
      recommended, however it is recognized that at this level content negotiation
      may be needed if multiple languages are supported. No other options should be
      enabled.
    audit_procedure: >
      Perform the following to determine if the recommended state is implemented: 1.
      Search the Apache configuration files (httpd.conf and any included
      configuration files) to find the document root <Directory> elements. 2. Ensure
      there is a single Options directive with the value of None or Multiviews. The
      following may be useful in extracting root directory elements from the Apache
      configuration for auditing. perl -ne 'print if /^ *<Directory */i ..
      /<\/Directory/i' $APACHE_PREFIX/conf/httpd.conf
    remediation: >
      Perform the following to implement the recommended state: 1. Search the Apache
      configuration files (httpd.conf and any included configuration files) to find
      the document root <Directory> element. 2. Add or modify any existing Options
