  - rule_id: apache_http.cis.5.ip_address_based_requests_are_disallowed
    title: "Ensure IP Address Based Requests Are Disallowed"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: automated
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "5.14"
    cis_section: "5"
    profile_applicability: "Level 2"
    description: >
      The Apache module mod_rewrite can be used to disallow access for requests that
      use an IP address instead of a host name for the URL. Most normal access to
      the website from browsers and automated software will use a host name which
      will therefore include the host name in the HTTP HOST header.
    rationale: >
      A common malware propagation and automated network scanning technique is to
      use IP addresses rather than host names for web requests, since it's much
      simpler to automate. By denying IP based web requests, these automated
      techniques will be denied access to the website. Of course, malicious web
      scanning techniques continue to evolve, and many are now using hostnames,
      however denying access to the IP based requests is still a worthwhile defense.
    audit_procedure: >
      Perform the following steps to determine if the recommended state is
      implemented: 1. Locate the Apache configuration files and included
      configuration files. 2. Verify there is a rewrite condition within the global
      server context that disallows IP based requests by requiring a HTTP HOST
      header similar to the example shown below. RewriteCond %{HTTP_HOST}
      !^www\.example\.com [NC] RewriteCond %{REQUEST_URI} !^/error [NC] RewriteRule
      ^.(.*) - [L,F]
    remediation: >
      Perform the following to implement the recommended state: 1. Load the
      mod_rewrite module for Apache by doing either one of the following: o Build
      Apache with mod_rewrite statically loaded during the build, by adding the
      --enable-rewrite option to the ./configure script. ./configure --enable-
      rewrite o Or, dynamically loading the module with the LoadModule directive in
      the httpd.conf configuration file. LoadModule rewrite_module
      modules/mod_rewrite.so 2. Add the RewriteEngine directive to the configuration
      within the global server context with the value of on so that the rewrite
      engine is enabled. RewriteEngine On 3. Locate the Apache configuration file
      such as httpd.conf and add the following rewrite condition to match the
      expected host name of the top server level configuration. RewriteCond
      %{HTTP_HOST} !^www\.example\.com [NC] RewriteCond %{REQUEST_URI} !^/error [NC]
      RewriteRule ^.(.*) - [L,F] Default Value: RewriteEngine off References: 1.
      https://httpd.apache.org/docs/2.4/mod/mod_rewrite.html
    references: >
      1. https://httpd.apache.org/docs/2.4/mod/mod_rewrite.html
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_APACHE_HTTP_2_4_v2_2_0_5_14"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_apache_http_2_4_v2_2_0_5_14"
    metadata_source: generated
