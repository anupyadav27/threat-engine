  - rule_id: apache_http.cis.5.options_for_the_os_root_directory_are_restricted
    title: "Ensure Options for the OS Root Directory Are Restricted"
    severity: high
    category: web_server
    tech_type: apache_http
    automation_type: automated
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "5.1"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The Apache Options directive allows for specific configuration of options,
      including execution of CGI, following symbolic links, server side includes,
      and content negotiation.
    rationale: >
      The Options directive for the root OS level is used to create a default
      minimal options policy that allows only the minimal options at the root
      directory level. Then for specific web sites or portions of the web site,
      options may be enabled as needed and appropriate. No options should be enabled
      and the value for the Options directive should be None.
    audit_procedure: >
      Perform the following to determine if the recommended state is implemented: 1.
      Search the Apache configuration files (httpd.conf and any included
      configuration files) to find a root <Directory> element. 2. Ensure there is a
      single Options directive with the value of None. The following may be useful
      for extracting root directory elements from the Apache configuration for
      auditing. perl -ne 'print if /^ *<Directory */i .. /<\/Directory/i'
      $APACHE_PREFIX/conf/httpd.conf
    remediation: >
      Perform the following to implement the recommended state: 1. Search the Apache
      configuration files (httpd.conf and any included configuration files) to find
      a root <Directory> element. 2. Add a single Options directive if there is
      none. 3. Set the value for Options to None. <Directory /> . . . Options None .
      . . </Directory> Default Value: The default value for the root directory's
      Option directive is Indexes FollowSymLinks. References: 1.
      https://httpd.apache.org/docs/2.4/mod/core.html#options
    references: >
      1. https://httpd.apache.org/docs/2.4/mod/core.html#options
