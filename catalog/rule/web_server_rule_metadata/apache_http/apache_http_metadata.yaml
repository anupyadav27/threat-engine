  - rule_id: apache_http.cis.1.secure_the_lock_file
    title: "Secure the Lock File"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.2_v3.3.1"
    cis_version: "2.2_v3.3.1"
    cis_control: "1.3.8"
    cis_section: "1"
    profile_applicability: ""
    description: >
      The LockFile directive sets the path to the lock file used when Apache uses
      fcntl(2) or flock(2) system calls to implement a mutex. Most Linux systems
      will default to using semaphores instead, so the directive may not apply.
      However in the event a lock file is used, it is important for the lock file to
      be in a locally mounted directory that is not writable by other users.
    rationale: >
      If the LockFile is placed in a writable directory other accounts could create
      a denial of service attack and prevent the server from starting by creating a
      lock file with the same name.
    audit_procedure: >
      1. Find the directory in which the LockFile would be created. The default
      value is the ServerRoot/logs directory. 2. Verify that the lock file directory
      is not a directory within the Apache DocumentRoot 30 | P a g e 3. Verify that
      the ownership and group of the directory is root:root (or the user under which
      apache initially starts up if not root). 4. Verify the permissions on the
      directory are only writable by root (or the startup user if not root), 5.
      Check that the lock file directory is on a locally mounted hard drive rather
      than an NFS mounted file system
    remediation: >
      1. Find the directory in which the LockFile would be created. The default
      value is the ServerRoot/logs directory. 2. Modify the directory if the
      LockFile if it is a directory within the Apache DocumentRoot 3. Change the
      ownership and group to be root:root, if not already. 4. Change the permissions
      so that the directory is only writable by root, or the user under which apache
      initially starts up (default is root), 5. Check that the lock file directory
      is on a locally mounted hard drive rather than an NFS mounted file system.
      References: 1. http://httpd.apache.org/docs/2.2/mod/mpm_common.html#lockfile
    references: >
      
