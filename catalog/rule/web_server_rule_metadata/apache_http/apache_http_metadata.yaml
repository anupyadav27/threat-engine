  - rule_id: apache_http.cis.12.apache_apparmor_profile_is_in_enforce_mode
    title: "Ensure Apache AppArmor Profile is in Enforce Mode"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: automated
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "12.3"
    cis_section: "12"
    profile_applicability: "Level 2"
    description: >
      AppArmor profiles may be in one of three modes: disabled, complain or enforce.
      In the complain mode, any violations of the access controls are logged but the
      restrictions are not enforced. Also, once a profile mode has been changed, it
      is recommended to restart the Apache server, otherwise the currently running
      process may not be confined by the policy.
    rationale: >
      The complain mode is useful for testing and debugging a profile, but is not
      appropriate for production. Only the confined process running in enforce mode
      will prevent attacks that violate the configured access controls.
    audit_procedure: >
      Perform the following steps to determine if the recommended state is
      implemented: Use the aa-unconfined command to check that the apache2 policy is
      enforced, and that the currently running apache2 processes are confined. The
      output should include both confined by and (enforce) # aa-unconfined
      --paranoid | grep apache2 1899 /usr/sbin/apache2 confined by
      '/usr/sbin/apache2 (enforce)' 1902 /usr/sbin/apache2 confined by
      '/usr/sbin/apache2 (enforce)' 1903 /usr/sbin/apache2 confined by
      '/usr/sbin/apache2 (enforce)' . . . Note: Non-compliant results may include
      not confined or (complain) such as the following: 3304 /usr/sbin/apache2 not
      confined 2502 /usr/sbin/apache2 confined by '/usr/sbin/apache2 (complain)'
      4004 /usr/sbin/apache2 confined by
      '/usr/sbin/apache2//HANDLING_UNTRUSTED_INPUT (complain)'
    remediation: >
      Perform the following to implement the recommended state: 1. Set the profile
      state to enforce mode. # aa-enforce apache2 Setting /usr/sbin/apache2 to
      enforce mode. 2. Stop the Apache server and confirm that is it not running. In
      some cases, the AppArmor controls may prevent the web server from stopping
      properly, and it may be necessary to stop the process manually or even reboot
      the server. # service apache2 stop * Stopping web server apache2 # service
      apache2 status * apache2 is not running 3. Restart the Apache service. #
      service apache2 start * Starting web server apache2 Default Value: The default
      mode is enforce.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_APACHE_HTTP_2_4_v2_2_0_12_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_apache_http_2_4_v2_2_0_12_3"
