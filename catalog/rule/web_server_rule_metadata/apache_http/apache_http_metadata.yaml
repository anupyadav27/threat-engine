  - rule_id: apache_http.cis.1.limit_http_request_methods
    title: "Limit HTTP Request Methods"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.2_v3.3.1"
    cis_version: "2.2_v3.3.1"
    cis_control: "1.5.7"
    cis_section: "1"
    profile_applicability: ""
    description: >
      Use the Apache <LimitExcept> directive to restrict unnecessary HTTP request
      methods of the web server to only accept and process the GET, HEAD, POST and
      OPTIONS HTTP request methods. Refer to the Apache documentation for more
      details http://httpd.apache.org/docs/2.2/mod/core.html#limitexcept
    rationale: >
      The HTTP 1.1 protocol supports several request methods which are rarely used
      and potentially high risk. For example methods such as PUT and DELETE are
      rarely used and should be disabled in keeping with the primary security
      principal of minimize features and options. Also since the usage of these
      methods is typically to modify resources on the web server, they should be
      explicitly disallowed. For normal web server operation, you will typically
      need to allow only the GET, HEAD and POST request methods. This will allow for
      49 | P a g e downloading of web pages and submitting information to web forms.
      The OPTIONS request method will also be allowed as it used to request which
      HTTP request methods are allowed. Unfortunately the Apache <LimitExcept>
      directive does not deny the TRACE request method. The TRACE request method
      will be disallowed in another benchmark recommendation with the TraceEnable
      directive.
    audit_procedure: >
      Perform the following to determine if the recommended state is implemented: 1.
      Locate the Apache configuration files and included configuration files. 2.
      Search for all <Directory> directives other than the on the OS root directory.
      3. Ensure that group contains a single Order directive within the <Directory>
      directive with a value of allow, deny 4. Verify the <LimitExcept> directive
      does not include any HTTP methods other than GET, POST, and OPTIONS. (It may
      contain fewer methods.)
    remediation: >
      Perform the following to implement the recommended state: 1. Locate the Apache
      configuration files and included configuration files. 2. Search for the
      directive on the document root directory such as: <Directory
      '/usr/local/apache2/htdocs'> . . . </Directory> 3. Ensure that the access
      control order within the directive is allow, deny. Order allow,deny 4. Add a
      directive as shown below within the group of document root directives. # Limit
      HTTP methods to standard methods. Note: Does not limit TRACE <LimitExcept GET
      POST OPTIONS> deny from all </LimitExcept> 5. Search for other directives in
      the Apache configuration files other than the OS root directory, and add the
      same directives to each. It is very important to understand that the
      directives are based on the OS file system hierarchy as accessed by Apache and
      not the hierarchy of the locations within web site URLs. <Directory
      '/usr/local/apache2/cgi-bin'> . . . Order allow,deny 50 | P a g e . . . #
      Limit HTTP methods <LimitExcept GET POST OPTIONS> deny from all </LimitExcept>
      </Directory> References: 1.
      http://httpd.apache.org/docs/2.2/mod/core.html#limitexcept 2.
      http://www.ietf.org/rfc/rfc2616.txt
    references: >
      1. http://httpd.apache.org/docs/2.2/mod/core.html#limitexcept 2.
      http://www.ietf.org/rfc/rfc2616.txt
    impact: >
      
