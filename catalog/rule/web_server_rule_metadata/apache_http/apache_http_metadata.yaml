  - rule_id: apache_http.cis.1.secure_the_pid_file
    title: "Secure the Pid File"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.2_v3.3.1"
    cis_version: "2.2_v3.3.1"
    cis_control: "1.3.9"
    cis_section: "1"
    profile_applicability: ""
    description: >
      The PidFile directive sets the file path to the process ID file to which the
      server records the process id of the server, which is useful for sending a
      signal to the server process or for checking on the health of the process.
    rationale: >
      If the PidFile is placed in a writable directory, other accounts could create
      a denial of service attack and prevent the server from starting by creating a
      pid file with the same name.
    audit_procedure: >
      1. Find the directory in which the PidFile would be created. The default value
      is the ServerRoot/logs directory. 31 | P a g e 2. Verify that the process ID
      file directory is not a directory within the Apache DocumentRoot 3. Verify
      that the ownership and group of the directory is root:root (or the user under
      which apache initially starts up if not root). 4. Verify the permissions on
      the directory are only writable by root (or the startup user if not root).
    remediation: >
      1. Find the directory in which the PidFile would be created. The default value
      is the ServerRoot/logs directory. 2. Modify the directory if the PidFile is in
      a directory within the Apache DocumentRoot 3. Change the ownership and group
      to be root:root, if not already. 4. Change the permissions so that the
      directory is only writable by root, or the user under which apache initially
      starts up (default is root). References: 1.
      http://httpd.apache.org/docs/2.2/mod/mpm_common.html#pidfile
