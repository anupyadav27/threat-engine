  - rule_id: apache_http.cis.3.other_write_access_on_apache_directories_and
    title: "Ensure Other Write Access on Apache Directories and Files Is Restricted"
    severity: high
    category: web_server
    tech_type: apache_http
    automation_type: automated
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "3.6"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Permissions on Apache directories should generally be rwxr-xr-x (755) and file
      permissions should be similar except not executable unless appropriate. This
      applies to all of the Apache software directories and files installed with the
      possible exception of the web document root $APACHE_PREFIX/htdocs. The
      directories and files in the web document root may have a designated group
      with write access to allow web content to be updated. In summary, the minimum
      recommendation is to not allow write access by other.
    rationale: >
      None of the Apache files and directories, including the Web document root must
      allow other write access. Other write access is likely to be very useful for
      unauthorized modification of web content, configuration files or software for
      malicious attacks.
    audit_procedure: >
      Identify files or directories in the Apache directory with other write access,
      excluding symbolic links: # find -L $APACHE_PREFIX \! -type l -perm /o=w -ls
    remediation: >
      Perform the following to remove other write access on the $APACHE_PREFIX
      directories. # chmod -R o-w $APACHE_PREFIX
    references: >
      
