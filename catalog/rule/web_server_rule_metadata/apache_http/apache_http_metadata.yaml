  - rule_id: apache_http.cis.1.log_storage_and_rotation
    title: "Log Storage and Rotation"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.2_v3.3.1"
    cis_version: "2.2_v3.3.1"
    cis_control: "1.6.4"
    cis_section: "1"
    profile_applicability: ""
    description: >
      It is important that there is adequate disk space on the partition that will
      hold all the log files, and that log rotation is configured to retain at least
      3 months or 13 weeks if central logging is not used for storage.
    rationale: >
      Keep in mind that the generation of logs is under a potential attacker's
      control. So do not hold any Apache log files on the root partition of the OS.
      This could result in a denial of service against your web server host by
      filling up the root partition and causing the system to crash. For this reason
      it is recommended that the log files should be stored on a dedicated
      partition. Likewise consider that attackers sometimes put information into
      your logs which is intended to attack your log collection or log analysis
      processing software. So it is important that they are not vulnerable.
      Investigation of incidents often require access to several months or more of
      logs, which is why it is important to keep at least 3 months available. Two
      common log rotation utilities include rotatelogs(8) which is bundled with 64 |
      P a g e Apache, and logrotate(8) commonly bundled on Linux distributions are
      described in the remediation section.
    audit_procedure: >
      Perform the following steps to determine if the recommended state is
      implemented: 1. Verify the web log rotation configuration matches the Apache
      configured log files. 2. Verify the rotation period and number of logs to
      retain is at least 13 weeks or 3 months. 3. For each virtual host configured
      with its own log files ensure that those log files are also included in a
      similar log rotation.
    remediation: >
      To implement the recommended state do either option a) if using the Linux
      logrotate utility or option b) if using a piped logging utility such as the
      Apache rotatelogs: 1. File Logging with Logrotate: 1. Add or modify the web
      log rotation configuration to match your configured log files in
      /etc/logrotate.d/httpd to be similar to the following. /var/log/httpd/*log {
      missingok notifempty sharedscripts postrotate /bin/kill -HUP `cat
      /var/run/httpd.pid 2>/dev/null` 2> /dev/null || true endscript } 2. Modify the
      rotation period and number of logs to keep so that at least 13 weeks or 3
      months of logs are retained. This may be done as the default value for all
      logs in /etc/logrotate.conf or in the web specific log rotation configuration
      in /etc/logrotate.d/httpd to be similar to the following. # rotate log files
      weekly weekly # keep 1 years of backlogs rotate 52 3. For each virtual host
      configured with it's own log files ensure that those log files are also
      included in a similar log rotation. 2. Piped Logging: 1. Configure the log
      rotation interval and log file names to a suitable interval such as daily. 65
      | P a g e CustomLog '|bin/rotatelogs -l /var/logs/logfile.%Y.%m.%d 86400'
      combined 2. Ensure the log file naming and any rotation scripts provide for
      retaining at least 3 months or 13 weeks of log files. 3. For each virtual host
      configured with its own log files ensure that those log files are also
      included in a similar log rotation.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_APACHE_HTTP_2_2_v3_3_1_1_6_4"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_apache_http_2_2_v3_3_1_1_6_4"
