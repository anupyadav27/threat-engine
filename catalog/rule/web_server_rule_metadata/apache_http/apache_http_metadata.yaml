  - rule_id: apache_http.cis.1.restrict_insecure_ssl_renegotiation
    title: "Restrict Insecure SSL Renegotiation"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.2_v3.3.1"
    cis_version: "2.2_v3.3.1"
    cis_control: "1.7.6"
    cis_section: "1"
    profile_applicability: ""
    description: >
      There was a man- in- the- middle renegotiation attack discovered in SSLv3 and
      TLSv1 in Nov 2009 (CVE- 2009- 3555). http://cve.mitre.org/cgi-
      bin/cvename.cgi?name=CAN- 2009- 3555 http://www.phonefactor.com/sslgap/ssl-
      tls- authentication- patches First a work around and then a fix was approved
      as an Internet Standard as RFC 574, Feb 2010. The work around which removes
      the renegotiation is available from OpenSSL as of version 0.9.8l and newer
      versions. For details: http://www.openssl.org/news/secadv_20091111.txt The
      SSLInsecureRenegotiation directive was added in Apache 2.2.15 for web servers
      linked with OpenSSL version 0.9.8m or later, to allow the insecure
      renegotiation to provide backward compatibility to clients with the older
      unpatched SSL implementations. While providing backward compatibility,
      enabling the SSLInsecureRenegotiation directive also leaves the server
      vulnerable to man- in- the- middle renegotiation attack CVE- 2009- 3555.
      Therefore the SSLInsecureRenegotiation directive should not be enabled.
    rationale: >
      The seriousness and ramification of this attack warrants that servers and
      clients be upgraded to support the improved SSL/TLS protocols. Therefore the
      recommendation is to not enable the insecure renegotiation.
    audit_procedure: >
      Perform the following steps to determine if the recommended state is
      implemented: 1. Search the Apache configuration files for the
      SSLInsecureRenegotiation directive and verify that the directive is either not
      present or has a value of off. 77 | P a g e
    remediation: >
      Perform the following to implement the recommended state: 1. Search the Apache
      configuration files for the SSLInsecureRenegotiation directive. If the
      directive is present, modify the value to be off. If the directive is not
      present then no action is required. SSLInsecureRenegotiation off Default
      Value: The default value is off: SSLInsecureRenegotiation off References: 1.
      http://httpd.apache.org/docs/2.2/mod/mod_ssl.html#sslinsecurerenegotiation 2.
      http://cve.mitre.org/cgi- bin/cvename.cgi?name=CAN- 2009- 3555
    references: >
      1. http://httpd.apache.org/docs/2.2/mod/mod_ssl.html#sslinsecurerenegotiation
      2. http://cve.mitre.org/cgi- bin/cvename.cgi?name=CAN- 2009- 3555
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_APACHE_HTTP_2_2_v3_3_1_1_7_6"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_apache_http_2_2_v3_3_1_1_7_6"
