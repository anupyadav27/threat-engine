  - rule_id: apache_http.cis.1.restrict_access_to_ht_files
    title: "Restrict Access to .ht* files"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.2_v3.3.1"
    cis_version: "2.2_v3.3.1"
    cis_control: "1.5.10"
    cis_section: "1"
    profile_applicability: ""
    description: >
      Restrict access to any files beginning with .ht using the FilesMatch
      directive.
    rationale: >
      The default name for access filename which allows files in web directories to
      override the Apache configuration is .htaccess. The usage of access files
      should not be allowed, but as a defense in depth a FilesMatch directive is
      recommended to prevent web clients from viewing those files in case they are
      created. Also a common name for web password and group files is .htpasswd and
      .htgroup. Neither of these files should be placed in the document root, but in
      the event they are, the FilesMatch directive can be used to prevent them from
      being viewed by web clients.
    audit_procedure: >
      Perform the following steps to determine if the recommended state is
      implemented: 1. Verify that a FilesMatch directive similar to the one below is
      present in the Apache configuration and not commented out
    remediation: >
      Perform the following to implement the recommended state: 1. Add or modify the
      following lines in the apache configuration at the server configuration level.
      <FilesMatch '^\.ht'> Order allow,deny Deny from all Satisfy All </FilesMatch>
      References: 1. http://httpd.apache.org/docs/2.2/mod/core.html#filesmatch 54 |
      P a g e
    references: >
