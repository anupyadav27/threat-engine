    profile_applicability: ""
    description: >
      The UserDir directive must be disabled so that user home directories are not
      accessed via the web site with a tilde (~) preceding the username. The
      directive also sets the path name of the directory that will be accessed. For
      example: http://example.com/~ralph/ might access a public_html sub- directory
      of ralph user's home directory. The directive UserDir ./ might map /~root to
      the root directory (/).
    rationale: >
      The user directories should not be globally enabled since it allows anonymous
      access to anything users may want to share with other users on the network.
      Also consider that every time a new account is created on the system, there is
      potentially new content available via the web site.
    audit_procedure: >
      Perform the following to determine if the modules are enabled. 1. Run the
      httpd server with the -M option to list enabled modules: 21 | P a g e # httpd
