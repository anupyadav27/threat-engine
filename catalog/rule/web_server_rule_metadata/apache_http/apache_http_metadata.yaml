  - rule_id: apache_http.cis.1.enable_the_log_config_module
    title: "Enable the Log Config Module"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.2_v3.3.1"
    cis_version: "2.2_v3.3.1"
    cis_control: "1.2.2"
    cis_section: "1"
    profile_applicability: ""
    description: >
      The log_config module provides for flexible logging of client requests, and
      provides for the configuration of the information in each log.
    rationale: >
      Logging is critical for monitoring usage and potential abuse of your web
      server. To configure the web server logging using the log_format directive
      this module is required
    audit_procedure: >
      Perform the following to determine if the log_config has been loaded: 1. Use
      the httpd -M option as root to check the module is loaded. # httpd -M | grep
      log_config Note: If the module is correctly enabled, the output will include
      the module name and whether it is loaded statically or as a shared module
    remediation: >
      Perform either one of the following: For source builds with static modules run
      the Apache ./configure script without including the --disable-log-config
      script options. $ cd $DOWNLOAD/httpd-2.2.22 $ ./configure For dynamically
      loaded modules, add or modify the LoadModule directive so that it is present
      in the apache configuration as below and not commented out : LoadModule
      log_config_module modules/mod_log_config.so References: 1. Mod Log Config
      http://httpd.apache.org/docs/2.2/mod/mod_log_config.html 16 | P a g e
    references: >
      1. Mod Log Config http://httpd.apache.org/docs/2.2/mod/mod_log_config.html 16
      | P a g e
