  - rule_id: apache_http.cis.1.enable_only_necessary_authentication_and
    title: "Enable only necessary Authentication and Authorization Modules"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.2_v3.3.1"
    cis_version: "2.2_v3.3.1"
    cis_control: "1.2.1"
    cis_section: "1"
    profile_applicability: ""
    description: >
      The Apache 2.2 modules for authentication and authorization have been
      refactored to provide finer granularity, more consistent and logical names and
      to simplify configuration. The authn_* modules provide authentication, while
      the authz_* modules provide 14 | P a g e authorization. Apache provides 2
      types of authentication; basic and digest. Enable only the modules that are
      required.
    rationale: >
      Authentication and authorization are your front doors to the protected
      information in your web site. Most installation only need a small subset of
      the modules available. By minimizing the enabled modules to those that are
      actually used, we reduce the number of 'doors' and have therefore reduce the
      attack surface of the web site. Likewise having fewer modules means less
      software that could have vulnerabilities.
    audit_procedure: >
      1. Use the httpd -M option as root to check which auth* modules are loaded. #
      httpd -M | egrep 'auth._' 2. Also use the httpd -M option as root to check for
      any LDAP modules which don't follow the same naming convention. # httpd -M |
      egrep 'ldap' The above commands should generate a 'Syntax OK' message to
      stderr, in addition to a list modules installed to stdout. If the 'Syntax OK'
      message is missing then there was most likely an error in parsing the
      configuration files.
    remediation: >
      Consult Apache module documentation for descriptions of each module in order
      to determine the necessary modules for the specific installation. The
      unnecessary static compiled modules are disabled through compile time
      configuration options. The dynamically loaded modules are disabled by
      commenting out or removing the LoadModule directive from the Apache
      configuration files (typically httpd.conf). Some modules may be separate
      packages, and may be removed. References: 1. Apache AAA how- to
      http://httpd.apache.org/docs/2.2/howto/auth.html 2. Apache Module
      Documentation http://httpd.apache.org/docs/2.2/mod/ 3. Apache Source
      Configuration http://httpd.apache.org/docs/2.2/programs/configure.html
    references: >
      1. Apache AAA how- to http://httpd.apache.org/docs/2.2/howto/auth.html 2.
      Apache Module Documentation http://httpd.apache.org/docs/2.2/mod/ 3. Apache
      Source Configuration http://httpd.apache.org/docs/2.2/programs/configure.html
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_APACHE_HTTP_2_2_v3_3_1_1_2_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
