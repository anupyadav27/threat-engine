  - rule_id: apache_http.cis.1.information_leakage_via_default_apache_content
    title: "Information Leakage via Default Apache Content"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.2_v3.3.1"
    cis_version: "2.2_v3.3.1"
    cis_control: "1.8.3"
    cis_section: "1"
    profile_applicability: ""
    description: >
      In previous recommendations we have removed default content such as the Apache
      manuals and default CGI programs. However if you want to further restrict
      information leakage about the web server, it is important that default content
      such as icons are not left on the web server.
    rationale: >
      To identify the type of web servers and versions software installed it is
      common for attackers to scan for icons or special content specific to the
      server type and version. A simple request like
      http://example.com/icons/apache_pb2.png may tell the attacker that the server
      is Apache 2.2 as shown below. The many icons are used primarily for auto
      indexing, which is recommended to be disabled.
    audit_procedure: >
      Perform the following step to determine if the recommended state is
      implemented: 1. Verify that there is no alias or directory access to the
      apache icons directory in any of the Apache configuration files.
    remediation: >
      Perform either of the following to implement the recommended state: 1. The
      default source build places the auto- index and icon configurations in the
      extra/httpd-autoindex.conf file, so it can be disabled by leaving the include
      line commented out in the main httpd.conf file as shown below. # Fancy
      directory listings #Include conf/extra/httpd-autoindex.conf 2. Alternatively
      the icon alias directive and the directory access control configuration can be
      commented out as shown: # We include the /icons/ alias for FancyIndexed
      directory listings. If # you do not use FancyIndexing, you may comment this
      out. # #Alias /icons/ '/var/www/icons/' 86 | P a g e #<Directory
      '/var/www/icons'> # Options Indexes MultiViews FollowSymLinks # AllowOverride
      None # Order allow,deny # Allow from all #</Directory> 1.9 Denial of Service
      Mitigations Denial of Service (DoS) attacks intend to degrade a service's
      ability to process and respond to service requests. Typically, DoS attacks
      attempt to exhaust the service's network- , CPU- , disk- , and/or memory-
      related resources. Configuration states in this section may increase a
      server's resiliency to DoS attacks.
