  - rule_id: apache_http.cis.1.configure_the_access_log
    title: "Configure the Access Log"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.2_v3.3.1"
    cis_version: "2.2_v3.3.1"
    cis_control: "1.6.3"
    cis_section: "1"
    profile_applicability: ""
    description: >
      The LogFormat directive defines the format and information to be included in
      the access log entries. The CustomLog directive specifies the log file, syslog
      facility or piped logging utility.
    rationale: >
      The server access logs are also invaluable for a variety of reasons. They can
      be used to determine what resources are being used most. Most importantly,
      they can be used to investigate anomalous behavior that may be an indication
      that an attack is pending or has occurred. If the server only logs errors, and
      does not log successful access, then it is very difficult to investigate
      incidents. You may see that the errors stop, and wonder if the attacker gave
      up, or was the attack successful.
    audit_procedure: >
      Perform the following steps to determine if the recommended state is
      implemented: 1. Verify the LogFormat directive in the Apache server
      configuration has the recommended information parameters. 2. Verify the
      CustomLog directive is configured to an appropriate log file, syslog facility,
      or piped logging utility and uses the combined format. 3. Verify there is a
      similar CustomLog directives for each virtual host configured if the virtual
      host will have different people responsible for the web site. 63 | P a g e
    remediation: >
      Perform the following to implement the recommended state: 1. Add or modify the
      LogFormat directives in the Apache configuration to use the standard and
      recommended combined format show as shown below. LogFormat '%h %l %u %t \'%r\'
      %>s %b \'%{Referer}i\' \'%{User-agent}i\'' combined 2. Add or modify the
      CustomLog directives in the Apache configuration to use the combined format
      with an appropriate log file, syslog facility or piped logging utility.
      CustomLog log/access_log combined 3. Add a similar CustomLog directives for
      each virtual host configured if the virtual host will have different people
      responsible for the web site. Each responsible individual or organization
      needs access to their own web logs, and needs the skills/training/tools for
      monitor the logs.
