  - rule_id: apache_http.cis.2.webdav_modules_are_disabled
    title: "Ensure the WebDAV Modules Are Disabled"
    severity: high
    category: web_server
    tech_type: apache_http
    automation_type: automated
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "2.3"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The Apache mod_dav and mod_dav_fs modules support WebDAV ('Web-based
      Distributed Authoring and Versioning') functionality for Apache. WebDAV is an
      extension to the HTTP protocol which allows clients to create, move, and
      delete files and resources on the web server.
    rationale: >
      Disabling WebDAV modules will improve the security posture of the web server
      by reducing the amount of potentially vulnerable code paths exposed to the
      network and reducing potential for unauthorized access to files via
      misconfigured WebDAV access controls.
    audit_procedure: >
      Perform the following to determine if the WebDAV modules are enabled. Run the
      httpd server with the -M option to list enabled modules: # httpd -M | grep '
      dav_[[:print:]]+module' Note: If the WebDav modules are correctly disabled,
      there will be no output when executing the above command.
    remediation: >
      Perform either one of the following to disable WebDAV module: 1. For source
      builds with static modules run the Apache ./configure script without including
      the mod_dav, and mod_dav_fs in the --enable-modules=configure script options.
      $ cd $DOWNLOAD_HTTPD $ ./configure 2. For dynamically loaded modules comment
      out or remove the LoadModule directive for mod_dav, and mod_dav_fs modules
      from the httpd.conf file. ##LoadModule dav_module modules/mod_dav.so
      ##LoadModule dav_fs_module modules/mod_dav_fs.so Default Value: The WebDav
      modules are not enabled with a default source build. References: 1.
      https://httpd.apache.org/docs/2.4/mod/mod_dav.html
