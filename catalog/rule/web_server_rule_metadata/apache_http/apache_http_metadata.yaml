    cis_section: "1"
    profile_applicability: ""
    description: >
      Use the Apache TraceEnable directive to disable the HTTP TRACE request method.
      Refer to the Apache documentation for more details:
      http://httpd.apache.org/docs/2.2/mod/core.html#traceenable
    rationale: >
      The HTTP 1.1 protocol requires support for the TRACE request method which
      reflects the request back as a response and was intended for diagnostics
      purposes. The TRACE method is not needed and is easily subjected to abuse and
      should be disabled.
    audit_procedure: >
      Perform the following to determine if the recommended state is implemented: 1.
      Locate the Apache configuration files and included configuration files. 2.
      Verify there is a single TraceEnable directive configured with a value of off
    remediation: >
      Perform the following to implement the recommended state: 1. Locate the main
      Apache configuration file such as httpd.conf. 2. Add a TraceEnable directive
      to the server level configuration with a value of off. Server level
      configuration is the top level configuration, not nested within any other
      directives like <Directory> or <Location>. 51 | P a g e TraceEnable off
      References: 1. http://httpd.apache.org/docs/2.2/mod/core.html#traceenable 2.
      http://www.ietf.org/rfc/rfc2616.txt
    references: >
