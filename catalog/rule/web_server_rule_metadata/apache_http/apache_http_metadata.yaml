  - rule_id: apache_http.cis.6.modsecurity_is_installed_and_enabled
    title: "Ensure ModSecurity Is Installed and Enabled"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: automated
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "6.6"
    cis_section: "6"
    profile_applicability: "Level 2"
    description: >
      ModSecurity is an open source web application firewall (WAF) for real-time web
      application monitoring, logging, and access control. It enables but does not
      include a powerful customizable rule set, which may be used to detect and
      block common web application attacks. Installation of ModSecurity without a
      rule set does not provide additional security for the protected web
      applications. Refer to the benchmark recommendation ' Install and Enable OWASP
      ModSecurity Core Rule Set ' for details on a recommended rule set. Note: Like
      other application security/application firewall systems, ModSecurity requires
      a significant commitment of staff resources for initial tuning of the rules
      and handling alerts. In some cases, this may require additional time working
      with application developers/maintainers to modify applications based on
      analysis of the results of tuning and monitoring logs. After setup, an ongoing
      commitment of staff is required for monitoring logs and ongoing tuning,
      especially after upgrades/patches. Without this commitment to tuning and
      monitoring, installing ModSecurity may NOT be effective and may provide a
      false sense of security.
    rationale: >
      Installation of the ModSecurity Apache module enables a customizable web
      application firewall rule set which may be configured to detect and block
      common attack patterns as well as block outbound data leakage.
    audit_procedure: >
      Perform the following to determine if the security2_module has been loaded:
      Use the httpd -M option as root to check that the module is loaded. # httpd -M
      | grep security2_module Note: If the module is correctly enabled, the output
      will include the module name and whether it is loaded statically or as a
      shared module.
    remediation: >
      1. Install the ModSecurity module if it is not already installed in
      modules/mod_security2.so. It may be installed via OS package installation
      (such as apt-get or yum) or built from the source files. See
      https://www.modsecurity.org/download.html for details. 2. Add or modify the
      LoadModule directive if not already present in the Apache configuration as
      shown below. Typically, the LoadModule directive is placed in file named
      mod_security.conf which is included in the Apache configuration: LoadModule
      security2_module modules/mod_security2.so Default Value: The ModSecurity
      module is NOT loaded by default. References: 1. https://www.modsecurity.org/
    references: >
      1. https://www.modsecurity.org/
    impact: >
      
