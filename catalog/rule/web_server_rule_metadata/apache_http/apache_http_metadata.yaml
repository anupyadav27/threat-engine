  - rule_id: apache_http.cis.6.applicable_patches_are_applied
    title: "Ensure Applicable Patches Are Applied"
    severity: high
    category: web_server
    tech_type: apache_http
    automation_type: automated
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "6.5"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Apply available Apache patches within 1 month of availability.
    rationale: >
      Obviously knowing about newly discovered vulnerabilities is only part of the
      solution; there needs to be a process in place where patches are tested and
      installed. These patches fix diverse problems, including security issues. It
      is recommended to use the Apache packages and updates provided by the Linux
      platform vendor rather than building from source when possible, in order to
      minimize the disruption and the work of keeping the software up-to-date.
    audit_procedure: >
      Perform the following steps to determine if the recommended state is
      implemented: 1. When Apache was built from source: o Check the Apache web site
      for latest versions, date of releases and any security patches.
      https://httpd.apache.org/security/vulnerabilities_24.html Apache patches are
      available https://www.apache.org/dist/httpd/patches o If newer versions with
      security patches more than 1 month old and are not installed, then the
      installation is not sufficiently up-to-date. 2. When using platform packages o
      Check for vendor supplied updates from the vendor web site. o If newer
      versions with security patches more than 1 month old are not installed, then
      the installation is not sufficiently up-to-date.
    remediation: >
      Update to the latest Apache release available according to either of the
      following: 1. When building from source: o Read release notes and related
      security patch information o Download latest source and any dependent modules
      such as mod_security. o Build new Apache software according to your build
      process with the same configuration options. o Install and test the new
      software according to your organization's testing process. o Move to
      production according to your organization's deployment process. 2. When using
      platform packages: o Read release notes and related security patch information
      o Download and install latest available Apache package and any dependent
      software. o Test the new software according to your organization's testing
      process. o Move to production according to your organization's deployment
      process. Default Value: Not Applicable References: 1.
      https://httpd.apache.org/security/vulnerabilities_24.html
    references: >
      1. https://httpd.apache.org/security/vulnerabilities_24.html
