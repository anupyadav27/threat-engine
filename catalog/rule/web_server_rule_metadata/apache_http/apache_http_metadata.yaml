    cis_section: "5"
    profile_applicability: "Level 2"
    description: >
      The server now allows for controlling the amount of 'referrer' information
      being sent with requests. Limiting information to only what is needed is
      security best practice.
    rationale: >
      HTTP/S traffic is vulnerabe to attack - limiting what is sent in a request to
      only what is needed will limit the threat vector. Impact: You must only limit
      the header information to what is needed to support the request. Limiting it
      to much may disrupt the ability to get a proper/expected response.
    audit_procedure: >
      Perform the following steps to determine if the recommended state is
      implemented: • Ensure a Header directive for Referrer-Policy is present in the
      Apache configuration and has the condition Header Set 'Referrer-Policy' shown
      below: # grep -I Referrer-Policy $APACHE_PREFIX/conf/httpd.conf Header set
      Referrer-Policy '<Directive>' If header Referrer-Policy configuration is
      present and has as a compliant value, then the server is compliant.
    remediation: >
      Perform the following to implement the recommended state: Add or modify the
      Header directive for the Referrer-Policy header in the Apache configuration to
      have the appropriate condition as shown below. Header set Referrer-Policy
      '<Directive>' Default Value: Referrer-Policy Policy is not set by Default
      References: 1. https://httpd.apache.org/docs/2.4/mod/mod_headers.html#header
      2. https://owasp.org/www-project-cheat-
      sheets/cheatsheets/Content_Security_Policy_Cheat_Sheet 3.
      https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-
      Policy 4. https://en.wikipedia.org/wiki/Clickjacking
    references: >
