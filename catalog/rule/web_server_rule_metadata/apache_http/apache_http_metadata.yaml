  - rule_id: apache_http.cis.1.allow_appropriate_access_to_web_content
    title: "Allow Appropriate Access to Web Content"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.2_v3.3.1"
    cis_version: "2.2_v3.3.1"
    cis_control: "1.4.2"
    cis_section: "1"
    profile_applicability: ""
    description: >
      In order to serve Web content, the Apache Allow directive will need to be used
      to allow for appropriate access to directories, locations and virtual hosts
      that contains web content.
    rationale: >
      The Allow directive is used within a directory, a location or other context to
      allow appropriate access. Access may be allowed to all, or to specific
      networks, or specific domain names as appropriate. Refer to the Apache
      documentation http://httpd.apache.org/docs/2.2/mod/mod_authz_host.html for
      details.
    audit_procedure: >
      Perform the following to determine if the recommended state is implemented: 1.
      Search the Apache configuration files (httpd.conf and any included
      configuration files) to find all <Directory> elements. 2. Ensure there is a
      single Order directive with the value of deny, allow for each. 3. Ensure the
      Allow and Deny directives, have values that are appropriate for the purposes
      of the directory. The following command may be useful to extract <Directory>
      and <Location> elements and Allow directives from the apache configuration
      files. # perl -ne 'print if /^ *<Directory */i .. /<\/Directory/i'
      $APACHE_PREFIX/conf/httpd.conf $APACHE_PREFIX/conf.d/*.conf # perl -ne 'print
      if /^ *<Location */i .. /<\/Location/i' $APACHE_PREFIX/conf/httpd.conf
      $APACHE_PREFIX/conf.d/*.conf # grep -i -C 6 -i 'Allow[[:space:]]from'
      $APACHE_PREFIX/conf/httpd.conf $APACHE_PREFIX/conf.d/*.conf
    remediation: >
      Perform the following to implement the recommended state: 1. Search the Apache
      configuration files (httpd.conf and any included configuration files) to find
      all <Directory> and <Location> elements. There should be one for the document
      root and any special purpose directories or locations. There are likely to 37
      | P a g e be other access control directives in other contexts, such as
      virtual hosts or special elements like <Proxy>. 2. Add a single Order
      directive and set the value to deny, allow. 3. Include the appropriate Allow
      and Deny directives, with values that are appropriate for the purposes of the
      directory. The configurations below are just a few possible examples.
      <Directory '/var/www/html/'> Order deny,allow deny from all allow from
      192.169. </Directory> <Directory '/var/www/html/'> Order allow,deny allow from
      all </Directory> <Location /usage> Order deny,allow Deny from all Allow from
      127.0.0.1 Allow from ::1 </Location> References: 1.
      http://httpd.apache.org/docs/2.2/mod/core.html#directory 2.
      http://httpd.apache.org/docs/2.2/mod/mod_authz_host.html
    references: >
      1. http://httpd.apache.org/docs/2.2/mod/core.html#directory 2.
      http://httpd.apache.org/docs/2.2/mod/mod_authz_host.html
