  - rule_id: apache_http.cis.1.deny_ip_address_based_requests
    title: "Deny IP Address Based Requests"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.2_v3.3.1"
    cis_version: "2.2_v3.3.1"
    cis_control: "1.5.12"
    cis_section: "1"
    profile_applicability: ""
    description: >
      The Apache module mod_rewrite can be used to disallow access for requests that
      use an IP address instead of a host name for the URL. Most normal access to
      the website from browsers and automated software will use a host name, and
      will therefore include the host name in the HTTP HOST header. Refer to the
      Apache 2.2 documentation for details
      http://httpd.apache.org/docs/2.2/mod/mod_rewrite.html
    rationale: >
      A common malware propagation and automated network scanning technique is to
      use IP addresses rather than host names for web requests, since it's much
      simpler to automate. By 56 | P a g e denying IP based web requests, these
      automated techniques will be denied access to the website. Of course malicious
      web scanning techniques continue to evolve, and many are now using hostnames,
      however denying access to the IP based requests is still a worthwhile defense.
    audit_procedure: >
      Perform the following steps to determine if the recommended state is
      implemented: 1. Locate the Apache configuration files and included
      configuration files. 2. Verify there is a rewrite condition within the global
      server context that disallows IP based requests by requiring a HTTP HOST
      header similar to the example shown below. RewriteCond %{HTTP_HOST}
      !^www\.example\.com [NC] RewriteCond %{REQUEST_URI} !^/error [NC] RewriteRule
      ^.(.*) - [L,F]
    remediation: >
      Perform the following to implement the recommended state: 1. Load the
      mod_rewritemodule for Apache by doing either one of the following: 1. Build
      Apache with mod_rewrite statically loaded during the build, by adding the
      --enable-rewrite option to the ./configurescript. ./configure --enable-rewrite
      2. Or dynamically loading the module with the LoadModule directive in the
      httpd.confconfiguration file. LoadModule rewrite_module modules/mod_rewrite.so
      2. Add the RewriteEngine directive to the configuration within the global
      server context with the value of on so that the rewrite engine is enabled.
      RewriteEngine On 3. Locate the Apache configuration file such as httpd.conf
      and add the following rewrite condition to match the expected host name of the
      top server level configuration. RewriteCond %{HTTP_HOST} !^www\.example\.com
      [NC] RewriteCond %{REQUEST_URI} !^/error [NC] RewriteRule ^.(.*) - [L,F] 57 |
      P a g e References: 1. http://httpd.apache.org/docs/2.2/mod/mod_rewrite.html
    references: >
      1. http://httpd.apache.org/docs/2.2/mod/mod_rewrite.html
