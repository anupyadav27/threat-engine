  - rule_id: apache_http.cis.3.group_write_access_for_the_apache_directories_and
    title: "Ensure Group Write Access for the Apache Directories and Files Is Properly Restricted"
    severity: high
    category: web_server
    tech_type: apache_http
    automation_type: automated
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "3.11"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Group permissions on Apache directories should generally be r-x and file
      permissions should be similar except not executable if executable is not
      appropriate. This applies to all of the Apache software directories and files
      installed with the possible exception of the web document root $DOCROOT
      defined by Apache DocumentRoot and defaults to $APACHE_PREFIX/htdocs. The
      directories and files in the web document root may have a designated web
      development group with write access to allow web content to be updated.
    rationale: >
      Restricting write permissions on the Apache files and directories can help
      mitigate attacks that modify web content to provide unauthorized access, or to
      attack web clients.
    audit_procedure: >
      Identify files or directories in the Apache directory with group write access,
      excluding symbolic links: # find -L $APACHE_PREFIX \! -type l -perm /g=w -ls
    remediation: >
      Perform the following to remove group write access on the $APACHE_PREFIX
      directories. find -L $APACHE_PREFIX ! -type l -perm /o=w -exec chmod o-w {}
