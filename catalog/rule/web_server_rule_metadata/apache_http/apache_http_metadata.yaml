  - rule_id: apache_http.cis.1.install_a_valid_trusted_certificate
    title: "Install a Valid Trusted Certificate"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.2_v3.3.1"
    cis_version: "2.2_v3.3.1"
    cis_control: "1.7.2"
    cis_section: "1"
    profile_applicability: ""
    description: >
      The default SSL certificate is self- signed and is not trusted. Install a
      valid certificate signed by a commonly trusted certificate authority. To be
      valid, the certificate must be: signed by a trusted certificate authority not
      be expired, and have a common name that matches the host name of the web
      server, such as www.example.com.
    rationale: >
      A digital certificate on your server automatically communicates your site's
      authenticity to visitors' web browsers. If a trusted authority signs your
      certificate, it confirms for the visitor they are actually communicating with
      you, and not with a fraudulent site stealing credit card numbers or personal
      information.
    audit_procedure: >
      Perform either or both of the following steps to determine if the recommended
      state is implemented: 1. OpenSSL can also be used to validate a certificate as
      a valid trusted certificate, using a trusted bundle of CA certificates. It is
      important that the CA bundle of certificates be an already validated and
      trusted file in order for the test to be valid. $ openssl verify -CAfile
      /etc/pki/tls/certs/ca-bundle.crt -purpose sslserver
      /etc/pki/tls/certs/example.com.crt /etc/pki/tls/certs/example.com.crt: OK A
      specific error message and code will be reported in addition to the OK if the
      certificate is not valid, For example: 69 | P a g e error 10 at 0 depth
      lookup:certificate has expired OK 2. Testing can also be done by connecting to
      a running web server. This may be done with your favorite browser, a command
      line web client or with openssl s_client. Of course it is important here as
      well to be sure of the integrity of the trusted certificate authorities used
      by the web client. Visit the OWASP testing SSL web page for additional
      suggestions: http://www.owasp.org/index.php/Testing_for_SSL- TLS_%28OWASP- CM-
      001%29
    remediation: >
      Perform the following to implement the recommended state: 1. Decide on the
      host name to be used for the certificate. It is important to remember that the
      browser will compare the host name in the URL to the common name in the
      certificate, so that it is important that all https: URL's match the correct
      host name. Specifically the host name www.example.com is not the same as
      example.com nor the same as ssl.example.com. 2. Generate a private key using
      openssl. Although certificate key lengths of 1024 have been common in the
      past, a key length of 2048 is now recommended for strong authentication. The
      key must be kept confidential and will be encrypted with a passphrase by
      default. Follow the steps below and respond to the prompts for a passphrase.
      See the Apache or OpenSSL documentation for details:
      http://httpd.apache.org/docs/2.2/ssl/ssl_faq.html#realcert
      http://www.openssl.org/docs/HOWTO/certificates.txt # cd /etc/pki/tls/certs #
      umask 077 # openssl genrsa -aes128 2048 > example.com.key Generating RSA
      private key, 2048 bit long modulus ...+++ ............+++ e is 65537 (0x10001)
      Enter pass phrase: Verifying - Enter pass phrase: 3. Generate the certificate
      signing request (CSR) to be signed by a certificate authority. It is important
      that the common name exactly matches the web host name. # openssl req -utf8
      -new -key example.com.key -out www.example.com.csr Enter pass phrase for
      example.com.key: You are about to be asked to enter information that will be
      incorporated into your certificate request. What you are about to enter is
      what is called a Distinguished Name or a DN. There are quite a few fields but
      you can leave some blank For some fields there will be a default value, If you
      enter '.', the field will be left blank. ----- 70 | P a g e Country Name (2
      letter code) [GB]:US State or Province Name (full name) [Berkshire]:New York
      Locality Name (eg, city) [Newbury]:Lima Organization Name (eg, company) [My
      Company Ltd]:Durkee Consulting Organizational Unit Name (eg, section) []:
      Common Name (eg, your name or your server's hostname) []:www.example.com Email
      Address []:ralph@example.com Please enter the following 'extra' attributes to
      be sent with your certificate request A challenge password []: An optional
      company name []: # mv www.example.com.key /etc/pki/tls/private/ 4. Send the
      certificate signing request (CSR) to a certificate signing authority to be
      signed, and follow their instructions for submission and validation. The CSR
      and the final signed certificate are just encoded text, and need to be
      protected for integrity, but not confidentiality. This certificate will be
      given out for every SSL connection made. 5. The resulting signed certificate
      may be named www.example.com.crt and placed in /etc/pki/tls/certs/ as readable
      by all (mode 0444). Please note that the certificate authority does not need
      the private key (example.com.key) and this file must be carefully protected.
      With a decrypted copy of the private key, it would be possible to decrypt all
      conversations with the server. 6. Do not forget the passphrase used to encrypt
      the private key. It will be required every time the server is started in https
      mode. If it is necessary to avoid requiring an administrator having to type
      the passphrase every time the httpd service is started, the private key may be
      stored in clear text. Storing the private key in clear text increases the
      convenience while increasing the risk of disclosure of the key, but may be
      appropriate for the sake of being able to restart, if the risks are well
      managed. Be sure that the key file is only readable by root. To decrypt the
      private key and store it in clear text file the following openssl command may
      be used. You can tell by the private key headers whether it is encrypted or
      clear text. # cd /etc/pki/tls/private/ # umask 077 # openssl rsa -in
      example.com.key -out example.com.key.clear 7. Locate the Apache configuration
      file for mod_ssl and add or modify the SSLCertificateFile and
      SSLCertificateKeyFile directives to have the correct path for the private key
      and signed certificate files. If a clear text key is referenced then a
      passphrase will not be required. You can use the CA's certificate that signed
      your certificate instead of the CA bundle, to speed up the initial SSL
      connection as fewer certificates will need to be transmitted.
      SSLCertificateFile /etc/pki/tls/certs/example.com.crt SSLCertificateKeyFile
      /etc/pki/tls/private/example.com.key 71 | P a g e # Default CA file, can be
      replaced with your CA's certificate. SSLCACertificateFile
      /etc/pki/tls/certs/ca-bundle.crt 8. Lastly, start or restart the httpd service
      and verify correct functioning with your favorite browser. References: 1.
      http://www.owasp.org/index.php/Testing_for_SSL- TLS_%28OWASP- CM- 001%29 2.
      http://httpd.apache.org/docs/2.2/ssl/ssl_faq.html#realcert 3.
      http://www.openssl.org/docs/HOWTO/certificates.txt
    references: >
      1. http://www.owasp.org/index.php/Testing_for_SSL- TLS_%28OWASP- CM- 001%29 2.
      http://httpd.apache.org/docs/2.2/ssl/ssl_faq.html#realcert 3.
      http://www.openssl.org/docs/HOWTO/certificates.txt
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_APACHE_HTTP_2_2_v3_3_1_1_7_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_apache_http_2_2_v3_3_1_1_7_2"
