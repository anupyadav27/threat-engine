  - rule_id: apache_http.cis.7.insecure_ssl_renegotiation_is_not_enabled
    title: "Ensure Insecure SSL Renegotiation Is Not Enabled"
    severity: high
    category: web_server
    tech_type: apache_http
    automation_type: automated
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "7.6"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      A man-in-the-middle renegotiation attack was discovered in SSLv3 and TLSv1 in
      November, 2009 (CVE-2009-3555). First, a work around and then a fix was
      approved as an Internet Standard as RFC 574, Feb 2010. The work around, which
      removes the renegotiation, is available from OpenSSL as of version 0.9.8l and
      newer versions. For details: https://www.openssl.org/news/secadv_20091111.txt
      The SSLInsecureRenegotiation directive was added in Apache 2.2.15, for web
      servers linked with OpenSSL version 0.9.8m or later, to provide backward
      compatibility to clients with the older, unpatched SSL implementations.
    rationale: >
      Enabling the SSLInsecureRenegotiation directive leaves the server vulnerable
      to man-in-the-middle renegotiation attack. Therefore, the
      SSLInsecureRenegotiation directive should not be enabled.
    audit_procedure: >
      Perform the following steps to determine if the recommended state is
      implemented: Search the Apache configuration files for the
      SSLInsecureRenegotiation directive and verify that the directive is either not
      present or has a value of off.
    remediation: >
      Perform the following to implement the recommended state: Search the Apache
      configuration files for the SSLInsecureRenegotiation directive. If the
      directive is present modify the value to be off. If the directive is not
      present then no action is required. SSLInsecureRenegotiation off Default
      Value: SSLInsecureRenegotiation off References: 1.
      https://httpd.apache.org/docs/2.4/mod/mod_ssl.html#sslinsecurerenegotiation 2.
      https://cve.mitre.org/cgi-bin/cvename.cgi?name=CAN-2009-3555 3.
      https://azure.microsoft.com/en-us/services/multi-factor-authentication/
    references: >
      1. https://httpd.apache.org/docs/2.4/mod/mod_ssl.html#sslinsecurerenegotiation
      2. https://cve.mitre.org/cgi-bin/cvename.cgi?name=CAN-2009-3555 3.
      https://azure.microsoft.com/en-us/services/multi-factor-authentication/
