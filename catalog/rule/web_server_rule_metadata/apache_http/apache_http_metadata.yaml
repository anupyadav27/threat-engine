    cis_control: "1.9.2"
    cis_section: "1"
    profile_applicability: ""
    description: >
      The KeepAlive directive controls whether Apache will reuse the same TCP
      connection per client to process subsequent HTTP requests from that client. It
      is recommended that the KeepAlive directive be set to On.
    rationale: >
      Allowing per- client reuse of TCP sockets reduces the amount of system and
      network resources required to serve requests. This efficiency gain may improve
      a server's resiliency to DoS attacks.
    audit_procedure: >
      Perform the following steps to determine if the recommended state is
      implemented: Verify that the KeepAlive directive in the Apache configuration
      to have a value of On, or is not present. If the directive is not present the
      default value is On.
    remediation: >
      Perform the following to implement the recommended state: Add or modify the
      KeepAlive directive in the Apache configuration to have a value of On, so that
      Keepalive connections are enabled. KeepAlive On References: 88 | P a g e 1.
      http://httpd.apache.org/docs/2.2/mod/core.html#keepalive
