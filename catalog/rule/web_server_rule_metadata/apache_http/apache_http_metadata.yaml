  - rule_id: apache_http.cis.2.only_necessary_authentication_and_authorization
    title: "Ensure Only Necessary Authentication and Authorization Modules Are Enabled"
    severity: high
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "2.1"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The Apache 2.4 modules for authentication and authorization are grouped and
      named to provide both granularity and a consistent naming convention to
      simplify configuration. The authn_* modules provide authentication, while the
      authz_* modules provide authorization. Apache provides two types of
      authentication - basic and digest. Review the Apache Authentication and
      Authorization how-to documentation
      http://httpd.apache.org/docs/2.4/howto/auth.html and enable only the modules
      that are required.
    rationale: >
      Authentication and authorization are the front doors to the protected
      information in your web site. Most installations only need a small subset of
      the modules available. By minimizing the enabled modules to those that are
      actually used, we reduce the number of 'doors' and therefore reduce the attack
      surface of the web site. Likewise, having fewer modules means less software
      that could have vulnerabilities.
    audit_procedure: >
      1. Use the httpd -M option as root to check which auth*modules are loaded. #
      httpd -M | egrep 'auth._' 2. Also use the httpd -M option as root to check for
      any LDAP modules which don't follow the same naming convention. # httpd -M |
      egrep 'ldap' The above commands should generate a Syntax OK message to stderr,
      in addition to a list of modules installed to stdout. If the Syntax OK message
      is missing, then there was most likely an error in parsing the configuration
      files.
    remediation: >
      Consult Apache module documentation for descriptions of each module in order
      to determine the necessary modules for the specific installation.
      http://httpd.apache.org/docs/2.4/mod/ The unnecessary static compiled modules
      are disabled through compile time configuration options as documented in
      http://httpd.apache.org/docs/2.4/programs/configure.html. The dynamically
      loaded modules are disabled by commenting out or removing the LoadModule
      directive from the Apache configuration files (typically httpd.conf). Some
      modules may be separate packages, and may be removed. Default Value: The
      following modules are loaded by a default source build: • authn_file_module
      (shared) • authn_core_module (shared) • authz_host_module (shared) •
      authz_groupfile_module (shared) • authz_user_module (shared) •
      authz_core_module (shared) References: 1.
      https://httpd.apache.org/docs/2.4/howto/auth.html 2.
      https://httpd.apache.org/docs/2.4/mod/ 3.
      https://httpd.apache.org/docs/2.4/programs/configure.html
    references: >
      1. https://httpd.apache.org/docs/2.4/howto/auth.html 2.
      https://httpd.apache.org/docs/2.4/mod/ 3.
      https://httpd.apache.org/docs/2.4/programs/configure.html
    impact: >
      
