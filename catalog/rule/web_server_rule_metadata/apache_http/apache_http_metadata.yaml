  - rule_id: apache_http.cis.11.only_the_necessary_selinux_booleans_are_enabled
    title: "Ensure Only the Necessary SELinux Booleans are Enabled"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "11.4"
    cis_section: "11"
    profile_applicability: "Level 2"
    description: >
      SELinux booleans allow or disallow behavior specific to the Apache web server.
      Common examples include whether CGI execution is allowed, or if the httpd
      server is allowed to communicate with the current terminal (tty).
      Communication with the terminal, may be necessary for entering a passphrase
      during start up to decrypt a private key.
    rationale: >
      Enabling only the necessary httpd related booleans provides a defense in depth
      approach, that will deny actions that are not in use or expected.
    audit_procedure: >
      Perform the following steps to determine if the recommended state is
      implemented: Review the SELinux httpd booleans that are enabled to ensure only
      the necessary booleans are enabled for the current and the configured state.
      Due to the variety and complexity of web server usages and organizational
      needs, a preset recommendation of enabled booleans is not practical. Run
      either of the two commands below to show only the enabled httpd related
      booleans. The getsebool command is installed with the core SELinux, while the
      semanage command is an optional package; however, the semanage output includes
      descriptive text. # getsebool -a | grep httpd_ | grep '> on'
      httpd_builtin_scripting --> on httpd_dbus_avahi --> on httpd_tty_comm --> on
      httpd_unified --> on Alternative using the semanage command. # semanage
      boolean -l | grep httpd_ | grep -v '(off , off)' httpd_enable_cgi (on , on)
      Allow httpd cgi support httpd_dbus_avahi (on , on) Allow Apache to communicate
      with avahi service via dbus httpd_unified (on , on) Unify HTTPD handling of
      all content files. httpd_builtin_scripting (on , on) Allow httpd to use built
      in scripting (usually php) httpd_tty_comm (on , on) Unify HTTPD to communicate
      with the terminal...
    remediation: >
      Perform the following to implement the recommended state: To disable the
      SELinux httpd booleans that are determined to be unnecessary, use the
      setsebool command as shown below with the -P option to make the change
      persistent. # setsebool -P httpd_enable_cgi off # getsebool httpd_enable_cgi
      httpd_enable_cgi --> off Default Value: SELinux is not enabled by default.
      References: 1. https://access.redhat.com/documentation/en-
      US/Red_Hat_Enterprise_Linux/6/html/Security-Enhanced_Linux/sect-Security-
      Enhanced_Linux-Working_with_SELinux-Booleans.html
    references: >
      1. https://access.redhat.com/documentation/en-
