  - rule_id: apache_http.cis.8.all_default_apache_content_is_removed
    title: "Ensure All Default Apache Content Is Removed"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: automated
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "8.3"
    cis_section: "8"
    profile_applicability: "Level 2"
    description: >
      In previous recommendations, we have removed default content such as the
      Apache manuals and default CGI programs. However, if you want to further
      restrict information leakage about the web server, it is important that
      default content such as icons are not left on the web server.
    rationale: >
      To identify the type of web servers and versions software installed it is
      common for attackers to scan for icons or special content specific to the
      server type and version. A simple request like
      http://example.com/icons/apache_pb2.png may tell the attacker that the server
      is Apache 2.4. Many icons are used primarily for auto indexing, which is also
      recommended to be disabled.
    audit_procedure: >
      Perform the following step to determine if the recommended state is
      implemented: Verify that there is no alias or directory access to the Apache
      icons directory in any of the Apache configuration files.
    remediation: >
      Perform either of the following to implement the recommended state: 1. The
      default source build places the auto-index and icon configurations in the
      extra/httpd-autoindex.conf file, so it can be disabled by leaving the include
      line commented out in the main httpd.conffile as shown below. # Fancy
      directory listings #Include conf/extra/httpd-autoindex.conf 2. Alternatively,
      the icon alias directive and the directory access control configuration can be
      commented out as shown if present: # We include the /icons/ alias for
      FancyIndexed directory listings. If # you do not use FancyIndexing, you may
      comment this out. # #Alias /icons/ '/var/www/icons/' #<Directory
      '/var/www/icons'> # Options Indexes MultiViews FollowSymLinks # AllowOverride
      None # Order allow,deny # Allow from all #</Directory> Default Value: The
      default source build does not enable access to the Apache icons.
    references: >
      
    impact: >
      
