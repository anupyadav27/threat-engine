  - rule_id: apache_http.cis.1.run_the_apache_web_server_as_a_non_root_user
    title: "Run the Apache Web Server as a non- root user"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.2_v3.3.1"
    cis_version: "2.2_v3.3.1"
    cis_control: "1.3.1"
    cis_section: "1"
    profile_applicability: ""
    description: >
      Although Apache typically is started with root privileges in order to listen
      on port 80 and 443, it can and should run as another non- root user in order
      to perform the web services. The Apache User and Group directives are used to
      designate the user and group to be used. 23 | P a g e
    rationale: >
      One of the best ways to reduce your exposure to attack when running a web
      server is to create a unique, unprivileged user and group for the server
      application. The 'nobody' or 'daemon' user and group that comes default on
      Unix variants should NOT be used to run the web server, since the account is
      commonly used for other separate daemon services. Instead, an account used
      only by the apache software so as to not give unnecessary access to other
      services. Also the user used for the apache user should be a unique value
      between 1 and 499 as these lower values are reserved for the special system
      accounts not used by regular users, such as discussed in User Accounts section
      of the CIS Red Hat benchmark. As an even more secure alternative, if the
      Apache web server can be run on high unprivileged ports, then it is not
      necessary to start Apache as root, and all of the Apache processes may be run
      as the Apache specific user as described below.
    audit_procedure: >
      Ensure the apache account is unique and has been created with a UID between 1-
      499 with the apache group and configured in the httpd.conf file. 1. Ensure the
      previous lines are present in the Apache configuration and not commented out :
      # grep -i '^User' $APACHE_PREFIX/conf/httpd.conf # grep -i '^Group'
      $APACHE_PREFIX/conf/httpd.conf 2. Ensure the apache account is correct: # id
      apache The uid must be between 1- 499, and group of apache similar to the
      following entries: uid=48(apache) gid=48(apache) groups=48(apache) 3. While
      the web server is running check the user id for the httpd processes. The user
      name should match the configuration file. # ps axu | grep httpd | grep -v
      '^root'
    remediation: >
      Perform the following: 24 | P a g e 1. If the Apache user and group do not
      already exist, create the account and group as a unique system account: #
      groupadd -r apache # useradd apache -r -g apache -d /var/www -s /sbin/nologin
      2. Configure the Apache user and group in the Apache configuration file
      httpd.conf: User apache Group apache
    references: >
      
    impact: >
      
