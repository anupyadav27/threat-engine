  - rule_id: apache_http.cis.8.etag_response_header_fields_do_not_include_inodes
    title: "Ensure ETag Response Header Fields Do Not Include Inodes"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: automated
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "8.4"
    cis_section: "8"
    profile_applicability: "Level 2"
    description: >
      The FileETag directive configures the file attributes that are used to create
      the ETag (entity tag) response header field when the document is based on a
      static file. The ETag value is used in cache management to save network
      bandwidth. The value returned may be based on combinations of the file inode,
      the modification time, and the file size.
    rationale: >
      When the FileETag is configured to include the file inode number, remote
      attackers may be able to discern the inode number from returned values. The
      inode is considered sensitive information, as it could be useful in assisting
      in other attacks.
    audit_procedure: >
      Perform the following step to determine if the recommended state is
      implemented: For the server and all virtual host and directory configurations
      verify that either 1. The FileETag directive is not present, or 2. The
      configured FileETag value does not contain any of the values all or inode or
      +inode.
    remediation: >
      Perform the following to implement the recommended state: Remove all instances
      of the FileETag directive. Alternatively, add or modify the FileETag directive
      in the server and each virtual host configuration to have either the value
      None or MTime Size. Default Value: The default value is MTime Size.
      References: 1. http://httpd.apache.org/docs/2.4/mod/core.html#FileETag 2.
      https://nvd.nist.gov/vuln/detail/CVE-2003-1418
    references: >
      1. http://httpd.apache.org/docs/2.4/mod/core.html#FileETag 2.
      https://nvd.nist.gov/vuln/detail/CVE-2003-1418
