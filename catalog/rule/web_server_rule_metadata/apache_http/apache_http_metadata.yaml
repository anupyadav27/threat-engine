  - rule_id: apache_http.cis.1.set_servertoken_to_prod
    title: "Set ServerToken to 'Prod'"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.2_v3.3.1"
    cis_version: "2.2_v3.3.1"
    cis_control: "1.8.1"
    cis_section: "1"
    profile_applicability: ""
    description: >
      Configure the Apache ServerTokens directive to provide minimal information. By
      setting the value to Prod or ProductOnly. The only version information given
      in the server HTTP response header will be 'Apache' rather than providing
      detailes on modules and versions installed.
    rationale: >
      Information is power, and identifying web server details greatly increases the
      efficiency of any attack, as security vulnerabilities are extremely dependent
      upon specific software versions and configurations. Excessive probing and
      requests may cause too much 'noise' being generated and may tip off an
      administrator. If an attacker can accurately target their exploits, the
      chances of successful compromise prior to detection increase dramatically.
      Script Kiddies are constantly scanning the Internet and documenting the
      version information openly provided by web servers. The purpose of this
      scanning is to accumulate a database of software installed on those hosts,
      which can then be used when new vulnerabilities are released.
    audit_procedure: >
      Perform the following steps to determine if the recommended state is
      implemented: 1. Verify the ServerTokens directive is present in the apache
      configuration and has a value of Prod or ProductOnly.
    remediation: >
      Perform the following to implement the recommended state: 1. Add or modify the
      ServerTokens directive as shown below to have the value of Prod or
      ProductOnly: 84 | P a g e ServerTokens Prod References: 1.
      http://httpd.apache.org/docs/2.2/mod/core.html#servertokens
    references: >
      1. http://httpd.apache.org/docs/2.2/mod/core.html#servertokens
