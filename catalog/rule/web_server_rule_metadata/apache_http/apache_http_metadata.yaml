    cis_section: "1"
    profile_applicability: ""
    description: >
      The Apache Options directive allows for specific configuration of options,
      including execution of CGI, following symbolic links, server side includes,
      and content negotiation. Refer to the Apache 2.2 documentation for details:
      http://httpd.apache.org/docs/2.2/mod/core.html#options
    rationale: >
      The Options directive for the root OS level is used to create a default
      minimal options policy that allows only the minimal options at the root
      directory level. Then for specific web sites or portions of the web site,
      options may be enabled as needed and appropriate. No options should be enabled
      and the value for the Options Directive should be None.
    audit_procedure: >
      Perform the following to determine if the recommended state is implemented: 1.
      Search the Apache configuration files (httpd.conf and any included
      configuration files) to find a root <Directory> element. 41 | P a g e 2.
      Ensure there is a single Options directive with the value of None. The
      following may be useful for extracting root directory elements from the Apache
      configuration for auditing. perl -ne 'print if /^ *<Directory */i ..
      /<\/Directory/i' $APACHE_PREFIX/conf/httpd.conf
    remediation: >
      Perform the following to implement the recommended state: 1. Search the Apache
      configuration files (httpd.conf and any included configuration files) to find
      a root <Directory> element. 2. Add a single Options directive if there is
      none. 3. Set the value for Options to None. <Directory> . . . Options None . .
      . </Directory> References: 1.
