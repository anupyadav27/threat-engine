  - rule_id: apache_http.cis.3.core_dump_directory_is_secured
    title: "Ensure the Core Dump Directory Is Secured"
    severity: high
    category: web_server
    tech_type: apache_http
    automation_type: automated
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "3.7"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The CoreDumpDirectory directive is used to specify the directory Apache
      attempts to switch to before creating the core dump. Core dumps will be
      disabled if the directory is not writable by the Apache user. Also, core dumps
      will be disabled if the server is started as root and switches to a non-root
      user, as is typical. It is recommended that the CoreDumpDirectory directive be
      set to a directory that is owned by the root user, owned by the group the
      Apache HTTPD process executes as, and be inaccessible to other users.
    rationale: >
      Core dumps are snapshots of memory and may contain sensitive information that
      should not be accessible by other accounts on the system.
    audit_procedure: >
      Verify that either the CoreDumpDirectory directive is not enabled in any of
      the Apache configuration files or that the configured directory meets the
      following requirements: 1. CoreDumpDirectory is not within the Apache web
      document root ($APACHE_PREFIX/htdocs) 2. Must be owned by root and have a
      group ownership of the Apache group (as defined via the Group directive) 3.
      Must have no read-write-search access permission for other users. (e.g. o=rwx)
    remediation: >
      Either remove the CoreDumpDirectory directive from the Apache configuration
      files or ensure that the configured directory meets the following
      requirements. 1. CoreDumpDirectory is not to be within the Apache web document
      root ($APACHE_PREFIX/htdocs) 2. Must be owned by root and have a group
      ownership of the Apache group (as defined via the Group directive) # chown
      root:apache /var/log/httpd 3. Must have no read-write-search access permission
      for other users. # chmod o-rwx /var/log/httpd Default Value: The default core
      dump directory is the ServerRoot directory. References: 1.
      https://httpd.apache.org/docs/2.4/mod/mpm_common.html#coredumpdirectory
    references: >
      1. https://httpd.apache.org/docs/2.4/mod/mpm_common.html#coredumpdirectory
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_APACHE_HTTP_2_4_v2_2_0_3_7"
