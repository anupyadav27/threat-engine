  - rule_id: apache_http.cis.1.restrict_options_for_the_os_root_directory
    title: "Restrict Options for the OS Root Directory"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.2_v3.3.1"
