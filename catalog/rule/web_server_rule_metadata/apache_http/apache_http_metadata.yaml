  - rule_id: apache_http.cis.1.set_the_timeout_to_10_or_less
    title: "Set the TimeOut to 10 or less"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.2_v3.3.1"
    cis_version: "2.2_v3.3.1"
    cis_control: "1.9.1"
    cis_section: "1"
    profile_applicability: ""
    description: >
      The TimeOut directive controls the maximum time in seconds that Apache HTTP
      server will wait for an Input/Output call to complete. It is recommended that
      the TimeOut directive be set to 10 or less.
    rationale: >
      One common technique for DoS is to initiate many connections to the server. By
      decreasing the timeout for old connections, the server can free resources more
      quickly and be more responsive. By making the server more efficient, it will
      be more resilient to DoS conditions. Important Notice: There is a slow form of
      DoS attack not adequately mitigated by these control, such as the Slow Loris
      DoS attack of June 2009 http://ha.ckers.org/slowloris/. Upgrading to Apache
      2.4 is recommended.
    audit_procedure: >
      Perform the following steps to determine if the recommended state is
      implemented: Verify that the Timeout directive is specified in the Apache
      configuration files to have a value of 10 seconds or shorter.
    remediation: >
      87 | P a g e Perform the following to implement the recommended state: Add or
      modify the Timeout directive in the Apache configuration to have a value of 10
      seconds or shorter. Timeout 10 References: 1.
      http://httpd.apache.org/docs/2.2/mod/core.html#timeout
    references: >
