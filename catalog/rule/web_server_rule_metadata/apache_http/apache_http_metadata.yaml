  - rule_id: apache_http.cis.6.server_access_log_is_configured_correctly
    title: "Ensure the Server Access Log Is Configured Correctly"
    severity: high
    category: web_server
    tech_type: apache_http
    automation_type: automated
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "6.3"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      The LogFormat directive defines a nickname for a log format and information to
      be included in the access log entries. The CustomLog directive specifies the
      log file, syslog facility or piped logging utility.
    rationale: >
      The server access logs are also invaluable for a variety of reasons. They can
      be used to determine what resources are being used most. Most importantly,
      they can be used to investigate anomalous behavior that may be an indication
      that an attack is pending or has occurred. If the server only logs errors, and
      does not log successful access, then it is very difficult to investigate
      incidents. You may see that the errors stop, and wonder if the attacker gave
      up, or was the attack successful.
    audit_procedure: >
      Perform the following steps to determine if the recommended state is
      implemented: 1. Verify the CustomLog directive is configured to an appropriate
      log file, syslog facility, or piped logging utility and the directive uses a
      log format that includes all of the format string tokens listed below. The log
      format string may be specified as a LogFormat nickname or as an explicit
      string. For example, either of the following two configurations are compliant:
      LogFormat '%h %l %u %t \'%r\' %>s %b \'%{Referer}i\' \'%{User- agent}i\''
      combined CustomLog log/access_log combined CustomLog log/access_log '%h %l %u
      %t \'%r\' %>s %b \'%{Referer}i\' \'%{User- agent}i\'' The log format string
      should include the following tokens in any order. The portion ' = description
      text. ' describes the information to be logged. o %h = Remote hostname or IP
      address if HostnameLookups is set to Off, which is the default. o %l =Remote
      logname / identity. o %u =Remote user, if the request was authenticated. o %t
      = Time the request was received, o %r = First line of request. o %>s = Final
      status. o %b = Size of response in bytes. o %{Referer}i = Variable value for
      Referer header. o %{User-agent}i = Variable value for User Agent header. 2.
      Verify there is a similar CustomLog directives for each virtual host
      configured if the virtual host will have different people responsible for the
      web site. Note: The server access log format specifies %h [remote hostname]
      must be present. However, if Apache2 is running behind a (non transparent)
      load balancer, the remote hostname could just be the load balancer. To account
      for this scenario use the X- Forwarded-For header [as in: %{X-Forwarded-For}i
      ] when %h does not deliver what is needed.
    remediation: >
      Perform the following to implement the recommended state: 1. Add or modify the
      LogFormat directives in the Apache configuration to use the combined` format
      show as shown below. LogFormat '%h %l %u %t \'%r\' %>s %b \'%{Referer}i\'
      \'%{User- agent}i\'' combined 2. Add or modify the CustomLog directives in the
      Apache configuration to use the combined format with an appropriate log file,
      syslog facility or piped logging utility. CustomLog log/access_log combined 3.
      Add a similar CustomLog directives for each virtual host configured if the
      virtual host will have different people responsible for the web site. Each
      responsible individual or organization needs access to their own web logs as
      well as the skills/training/tools for monitoring the logs. Default Value: The
      following are the default log configuration: LogFormat '%h %l %u %t \'%r\' %>s
      %b \'%{Referer}i\' \'%{User-Agent}i\' combined LogFormat '%h %l %u %t \'%r\'
      %>s %b' common CustomLog 'logs/access_log' common References: 1.
      https://httpd.apache.org/docs/2.4/mod/mod_log_config.html#customlog 2.
      https://httpd.apache.org/docs/2.4/mod/mod_log_config.html#formats
    references: >
      1. https://httpd.apache.org/docs/2.4/mod/mod_log_config.html#customlog 2.
      https://httpd.apache.org/docs/2.4/mod/mod_log_config.html#formats
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_APACHE_HTTP_2_4_v2_2_0_6_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_apache_http_2_4_v2_2_0_6_3"
