  - rule_id: apache_http.cis.5.ip_addresses_for_listening_for_requests_are
    title: "Ensure the IP Addresses for Listening for Requests Are Specified"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: automated
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "5.15"
    cis_section: "5"
    profile_applicability: "Level 2"
    description: >
      The Apache Listen directive specifies the IP addresses and port numbers the
      Apache web server will listen for requests. Rather than be unrestricted to
      listen on all IP addresses available to the system, the specific IP address or
      addresses intended should be explicitly specified. Specifically, a Listen
      directive with no IP address specified, or with an IP address of zeros should
      not be used.
    rationale: >
      Having multiple interfaces on web servers is fairly common, and without
      explicit Listen directives, the web server is likely to be listening on an
      inappropriate IP address / interface that was not intended for the web server.
      Single homed system with a single IP addressed are also required to have an
      explicit IP address in the Listen directive, in case additional interfaces are
      added to the system at a later date.
    audit_procedure: >
      Perform the following steps to determine if the recommended state is
      implemented: Verify that no Listen directives are in the Apache configuration
      file with no IP address specified, or with an IP address of all zeros.
    remediation: >
      Perform the following to implement the recommended state: 1. Find any Listen
      directives in the Apache configuration file with no IP address specified, or
      with an IP address of all zeros similar to the examples below. Keep in mind
      there may be both IPv4 and IPv6 addresses on the system. Listen 80 Listen
      0.0.0.0:80 Listen [::ffff:0.0.0.0]:80 2. Modify the Listen directives in the
      Apache configuration file to have explicit IP addresses according to the
      intended usage. Multiple Listendirectives may be specified for each IP address
      & Port. Listen 10.1.2.3:80 Listen 192.168.4.5:80 Listen
      [2001:db8::a00:20ff:fea7:ccea]:80 Default Value: Listen 80 References: 1.
      https://httpd.apache.org/docs/2.4/mod/mpm_common.html#listen
    references: >
      1. https://httpd.apache.org/docs/2.4/mod/mpm_common.html#listen
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_APACHE_HTTP_2_4_v2_2_0_5_15"
      nist_800_53: []
      soc2: []
