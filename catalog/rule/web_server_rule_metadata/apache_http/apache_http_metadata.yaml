  - rule_id: apache_http.cis.4.access_to_os_root_directory_is_denied_by_default
    title: "Ensure Access to OS Root Directory Is Denied By Default"
    severity: high
    category: web_server
    tech_type: apache_http
    automation_type: automated
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "4.1"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      The Apache Directory directive allows for directory specific configuration of
      access controls and many other features and options. One important usage is to
      create a default deny policy that does not allow access to operating system
      directories and files, except for those specifically allowed. This is done by
      denying access to the OS root directory.
    rationale: >
      One aspect of Apache, which is occasionally misunderstood, is the feature of
      default access. That is, unless you take steps to change it, if the server can
      find its way to a file through normal URL mapping rules, it can and will serve
      it to clients. Having a default deny is a predominate security principle, and
      then helps prevent the unintended access, and we do that in this case by
      denying access to the OS root directory using either of two methods but not
      both: 1. Using the Apache Deny directive along with an Order directive. 2.
      Using the Apache Require directive. Either method is effective. The
      Order/Deny/Allow combination are now deprecated; they provide three passes
      where all the directives are processed in the specified order. In contrast,
      the Require directive works on the first match similar to firewall rules. The
      Require directive is the default for Apache 2.4 and is demonstrated in the
      remediation procedure as it may be less likely to be misunderstood.
    audit_procedure: >
      Perform the following to determine if the recommended state is implemented: 1.
      Search the Apache configuration files (httpd.conf and any included
      configuration files) to find a root <Directory> element. 2. Ensure that either
      one of the following two methods are configured: Using the deprecated
      Order/Deny/Allow method: 1. Ensure there is a single Order directive with the
      value of deny, allow 2. Ensure there is a Deny directive, and with the value
      of from all. 3. Ensure there are no Allow or Require directives in the root
      <Directory> element. Using the Require method: 4. Ensure there is a single
      Require directive with the value of all denied 5. Ensure there are no Allow or
      Deny directives in the root <Directory> element. The following may be useful
      in extracting root directory elements from the Apache configuration for
      auditing. $ perl -ne 'print if /^ *<Directory *\//i .. /<\/Directory/i'
      $APACHE_PREFIX/conf/httpd.conf
    remediation: >
      Perform the following to implement the recommended state: 1. Search the Apache
      configuration files (httpd.conf and any included configuration files) to find
      a root <Directory> element. 2. Add a single Require directive and set the
      value to all denied 3. Remove any Deny and Allow directives from the root
      <Directory> element. <Directory> . . . Require all denied . . . </Directory>
      Default Value: The following is the default root directory configuration:
      <Directory> . . . Require all denied . . . </Directory> References: 1.
      https://httpd.apache.org/docs/2.4/mod/core.html#directory 2.
      https://httpd.apache.org/docs/2.4/mod/mod_authz_host.html
    references: >
      1. https://httpd.apache.org/docs/2.4/mod/core.html#directory 2.
      https://httpd.apache.org/docs/2.4/mod/mod_authz_host.html
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_APACHE_HTTP_2_4_v2_2_0_4_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_apache_http_2_4_v2_2_0_4_1"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: apache_http.cis.4.appropriate_access_to_web_content_is_allowed
    title: "Ensure Appropriate Access to Web Content Is Allowed"
    severity: high
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "4.2"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      In order to serve Web content, either the Apache Allow directive or the
      Require directive will need to be used to allow for appropriate access to
      directories, locations and virtual hosts that contain web content.
    rationale: >
      Either the Allow or Require directives may be used within a directory, a
      location or other context to allow appropriate access. Access may be allowed
      to all, or to specific networks, or hosts, or users as appropriate. The
      Allow/Deny/Order directives are deprecated and should be replaced by the
      Require directive. It is also recommended that either the Allow directive or
      the Require directive be used, but not both in the same context.
    audit_procedure: >
      Perform the following to determine if the recommended state is implemented: 1.
      Search the Apache configuration files (httpd.conf and any included
      configuration files) to find all <Directory> elements. 2. Ensure that either
      one of the following two methods are configured: Use the deprecated
      Order/Deny/Allow method: 1. Ensure there is a single Order directive with the
      value of Deny,Allow for each. 2. Ensure the Allow and Deny directives, have
      values that are appropriate for the purposes of the directory. Use the Require
      method: 3. Ensure that the Order/Deny/Allow directives are NOT used for the
      directory. 4. Ensure the Require directives have values that are appropriate
      for the purposes of the directory. The following command may be useful to
      extract <Directory> and <Location> elements and Allow directives from the
      Apache configuration files. # perl -ne 'print if /^ *<Directory */i ..
      //<\/Directory/i' $APACHE_PREFIX/conf/httpd.conf $APACHE_PREFIX/conf.d/*.conf
      # perl -ne 'print if /^ *<Location */i .. //<\/Location/i'
      $APACHE_PREFIX/conf/httpd.conf $APACHE_PREFIX/conf.d/*.conf # grep -i -C 6 -i
      'Allow[[:space:]]from' $APACHE_PREFIX/conf/httpd.conf
      $APACHE_PREFIX/conf.d/*.conf
    remediation: >
      Perform the following to implement the recommended state: 1. Search the Apache
      configuration files (httpd.conf and any included configuration files) to find
      all <Directory> and <Location> elements. There should be one for the document
      root and any special purpose directories or locations. There are likely to be
      other access control directives in other contexts, such as virtual hosts or
      special elements like <Proxy>. 2. Include the appropriate Require directives,
      with values that are appropriate for the purposes of the directory. The
      configurations below are just a few possible examples. <Directory
      '/var/www/html/'> Require ip 192.169. </Directory> <Directory
      '/var/www/html/'> Require all granted </Directory> <Location /usage> Require
      local </Location> <Location /portal> Require valid-user </Location> Default
      Value: The following is the default Web root directory configuration:
      <Directory '/usr/local/apache2/htdocs'> . . . Require all granted . . .
      </Directory> References: 1. https://httpd.apache.org/docs/2.4/howto/auth.html
      2. https://httpd.apache.org/docs/2.4/mod/mod_authz_host.html 3.
      https://httpd.apache.org/docs/2.4/mod/mod_authz_core.html 4.
      https://httpd.apache.org/docs/2.4/mod/mod_access_compat.html 5.
      https://httpd.apache.org/docs/2.4/mod/core.html#directory
    references: >
      1. https://httpd.apache.org/docs/2.4/howto/auth.html 2.
      https://httpd.apache.org/docs/2.4/mod/mod_authz_host.html 3.
      https://httpd.apache.org/docs/2.4/mod/mod_authz_core.html 4.
      https://httpd.apache.org/docs/2.4/mod/mod_access_compat.html 5.
      https://httpd.apache.org/docs/2.4/mod/core.html#directory
    impact: >
      
