  - rule_id: apache_http.cis.1.disable_weak_ssl_protocols
    title: "Disable Weak SSL Protocols"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.2_v3.3.1"
    cis_version: "2.2_v3.3.1"
    cis_control: "1.7.4"
    cis_section: "1"
    profile_applicability: ""
    description: >
      The Apache SSLProtocol directive specifies the SSL and TLS protocols allowed.
      Both the SSLv2 and the SSLv3 protocols should be disabled in this directive as
      they are out- dated and vulnerable to information disclosure. Only TLS
      protocols should be enabled. 73 | P a g e
    rationale: >
      The SSLv2 and SSLv3 protocols are flawed and shouldn't be used, as they are
      subject to man- in- the- middle attacks and other cryptographic attacks. The
      TLSv1 protocols should be used instead, and the newer TLS protocols should be
      preferred. The SSLv3 protocol was discovered to be vulnerable to the POODLE
      attack (Padding Oracle On Downgraded Legacy Encryption) in October 2014. The
      attack allows decryption and extraction of information from the server's
      memory. Due to this vulnerability disabling the SSLv3 protocol is highly
      recommended.
    audit_procedure: >
      Perform the following steps to determine if the recommended state is
      implemented: Verify the SSLProtocol directive is present in the Apache server
      level configuration and every virtual host that is SSL enabled. For each
      directive verify that either: a minus '- SSLv2' and a minus '- SSLv3' are
      included an explicit list of only TLS protocols without any plus (+) or minus
      (- ) symbols Alternately the SSL protocols supported can be easily tested by
      connecting to a running web server with openssl s_client such as shown in
      http://www.owasp.org/index.php/Testing_for_SSL- TLS_%28OWASP- CM- 001%29
    remediation: >
      Perform the following to implement the recommended state: Search the Apache
      configuration files for the SSLProtocol directive; add the directive if not
      present, or change the value to match one of the following values. The first
      setting “TLSv1.1 TLS1.2” is preferred when it it acceptable to also disable
      the TLSv1.0 protocol. See the level 2 recommendation 'Disable the TLS v1.0
      Protocol' for details. SSLProtocol TLSv1.1 TLSv1.2 SSLProtocol TLSv1 74 | P a
      g e Default Value: Default value is: SSLProtocol all -SSLv2 References: 1.
      http://httpd.apache.org/docs/2.2/mod/mod_ssl.html#sslprotocol 2.
      http://www.owasp.org/index.php/Testing_for_SSL- TLS_%28OWASP- CM- 001%29 3.
      https://www.us- cert.gov/ncas/alerts/TA14- 290A 4.
      https://www.openssl.org/~bodo/ssl- poodle.pdf
    references: >
      1. http://httpd.apache.org/docs/2.2/mod/mod_ssl.html#sslprotocol 2.
      http://www.owasp.org/index.php/Testing_for_SSL- TLS_%28OWASP- CM- 001%29 3.
      https://www.us- cert.gov/ncas/alerts/TA14- 290A 4.
      https://www.openssl.org/~bodo/ssl- poodle.pdf
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_APACHE_HTTP_2_2_v3_3_1_1_7_4"
      nist_800_53: []
      soc2: []
      pci_dss: []
