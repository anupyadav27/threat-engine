  - rule_id: apache_http.cis.3.apache_user_account_is_locked
    title: "Ensure the Apache User Account Is Locked"
    severity: high
    category: web_server
    tech_type: apache_http
    automation_type: automated
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "3.3"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The user account under which Apache runs should not have a valid password, but
      should be locked.
    rationale: >
      As a defense-in-depth measure the Apache user account should be locked to
      prevent logins, and to prevent a user from su'ing to apache using the
      password. In general, there shouldn't be a need for anyone to have to su as
      apache, and when there is a need, then sudo should be used instead, which
      would not require the apache account password.
    audit_procedure: >
      Ensure the apache account is locked using the following: # passwd -S apache
      The results will be similar to the following: apache LK 2010-01-28 0 99999 7
      -1 (Password locked.) - or - apache L 07/02/2012 -1 -1 -1 -1
    remediation: >
      Use the passwd command to lock the apache account: # passwd -l apache Default
      Value: The default user is daemon and the account is typically locked.
    references: >
      
