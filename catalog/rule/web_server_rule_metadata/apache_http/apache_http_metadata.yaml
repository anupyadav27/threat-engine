  - rule_id: apache_http.cis.1.deny_access_to_os_root_directory
    title: "Deny Access to OS Root Directory"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.2_v3.3.1"
    cis_version: "2.2_v3.3.1"
    cis_control: "1.4.1"
    cis_section: "1"
    profile_applicability: ""
    description: >
      The Apache Directory directive allows for directory specific configuration of
      access controls and many other features and options. One important usage is to
      create a default deny policy that does not allow access to Operating system
      directories and files, except for those specifically allowed. This is done,
      with denying access to the OS root directory.
    rationale: >
      One aspect of Apache, which is occasionally misunderstood, is the feature of
      default access. That is, unless you take steps to change it, if the server can
      find its way to a file through normal URL mapping rules, it can and will serve
      it to clients. Having a default deny is a predominate security principal, and
      then helps prevent the unintended access, and we do that in this case by
      denying access to the OS root directory. The Order directive is important as
      it provides for other Allow directives to override the default deny. 35 | P a
      g e
    audit_procedure: >
      Perform the following to determine if the recommended state is implemented: 1.
      Search the Apache configuration files (httpd.conf and any included
      configuration files) to find a root <Directory> element. 2. Ensure there is a
      single Order directive with the value of deny, allow 3. Ensure there is a Deny
      directive, and with the value of from all. 4. Ensure there are no Allow
      directives in the root <Directory> element. The following may be useful in
      extracting root directory elements from the Apache configuration for auditing.
      $ perl -ne 'print if /^ *<Directory *\//i .. /<\/Directory/i'
      $APACHE_PREFIX/conf/httpd.conf
    remediation: >
      Perform the following to implement the recommended state: 1. Search the Apache
      configuration files (httpd.conf and any included configuration files) to find
      a root <Directory> element. 2. Ensure there is a single Order directive and
      set the value to deny, allow 3. Ensure there is a Deny directive, and set the
      value to from all. 4. Remove any Allow directives from the root <Directory>
      element. <Directory> . . . Order deny,allow Deny from all . . . </Directory>
      References: 1. http://httpd.apache.org/docs/2.2/mod/core.html#directory 2.
      http://httpd.apache.org/docs/2.2/mod/mod_authz_host.html 36 | P a g e
    references: >
      1. http://httpd.apache.org/docs/2.2/mod/core.html#directory 2.
      http://httpd.apache.org/docs/2.2/mod/mod_authz_host.html 36 | P a g e
