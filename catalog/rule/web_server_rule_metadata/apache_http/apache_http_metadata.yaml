  - rule_id: apache_http.cis.10.limitrequestfieldsize_directive_is_set_to_1024_or
    title: "Ensure the LimitRequestFieldsize Directive is Set to 1024 or Less"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: automated
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "10.3"
    cis_section: "10"
    profile_applicability: "Level 2"
    description: >
      The LimitRequestFieldSize limits the number of bytes that will be allowed in
      an HTTP request header. It is recommended that the LimitRequestFieldSize
      directive be set to 1024 or less.
    rationale: >
      By limiting of the size of request headers is helpful so that the web server
      can prevent an unexpectedly long or large value from being passed to exploit a
      potentially vulnerable program. Of course, the underlying dependency is that
      we need to set the limits high enough to not interfere with any one
      application on the server, while setting them low enough to be of value in
      protecting the applications. Since the configuration directives are available
      only at the server configuration level, it is not possible to tune the value
      for different portions of the same web server. Please read the Apache
      documentation carefully, as these requests may interfere with the expected
      functionality of some web applications.
    audit_procedure: >
      Perform the following steps to determine if the recommended state is
      implemented: Verify that the LimitRequestFieldsize directive is in the Apache
      configuration and has a value of 1024 or less.
    remediation: >
      Perform the following to implement the recommended state: Add or modify the
      LimitRequestFieldsize directive in the Apache configuration to have a value of
      1024 or less. LimitRequestFieldsize 1024 Default Value: LimitRequestFieldsize
      8190 References: 1.
      https://httpd.apache.org/docs/2.4/mod/core.html#limitrequestfieldsize
    references: >
      1. https://httpd.apache.org/docs/2.4/mod/core.html#limitrequestfieldsize
