  - rule_id: apache_http.cis.3.group_write_access_for_the_document_root
    title: "Ensure Group Write Access for the Document Root Directories and Files Is Properly Restricted"
    severity: high
    category: web_server
    tech_type: apache_http
    automation_type: automated
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "3.12"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Group permissions on Apache Document Root directories $DOCROOT may need to be
      writable by an authorized group such as development, support, or a production
      content management tool. However, it is important that the Apache group used
      to run the server does not have write access to any directories or files in
      the document root.
    rationale: >
      Preventing Apache from writing to the web document root helps mitigate risk
      associated with web application vulnerabilities associated with file uploads
      or command execution. Typically, if an application hosted by Apache needs to
      write to directory, it is best practice to have that directory live outside
      the web root.
    audit_procedure: >
      Identify files or directories in the Apache Document Root directory with
      Apache group write access. ## Define $GRP to be the Apache group configured #
      GRP=$(grep '^Group' $APACHE_PREFIX/conf/httpd.conf | cut -d' ' -f2) find -L
      $DOCROOT -group $GRP -perm /g=w -ls
    remediation: >
      Perform the following to remove group write access on the $DOCROOT directories
      and files with the apache group. # find -L $DOCROOT -group $GRP -perm /g=w
      -print | xargs chmod g-w
