  - rule_id: apache_http.cis.10.limitrequestline_directive_is_set_to_8190_or_less
    title: "Ensure the LimitRequestLine directive is Set to 8190 or less"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: automated
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "10.1"
    cis_section: "10"
    profile_applicability: "Level 2"
    description: >
      Buffer Overflow attacks attempt to exploit an application by providing more
      data than the application buffer can contain. If the application allows
      copying data to the buffer to overflow the boundaries of the buffer, then the
      application is vulnerable to a buffer overflow. The results of Buffer overflow
      vulnerabilities vary, and may result in the application crashing, or may allow
      the attacker to execute instructions provided in the data. The Apache
      LimitRequest* directives allow the Apache web server to limit the sizes of
      requests and request fields and can be used to help protect programs and
      applications processing those requests. Specifically, the LimitRequestLine
      directive limits the allowed size of a client's HTTP request-line, which
      consists of the HTTP method, URI, and protocol version.
    rationale: >
      The limiting of the size of the request line is helpful so that the web server
      can prevent an unexpectedly long or large request from being passed to a
      potentially vulnerable CGI program, module or application that would have
      attempted to process the request. Of course, the underlying dependency is that
      we need to set the limits high enough to not interfere with any one
      application on the server, while setting them low enough to be of value in
      protecting the applications. Since the configuration directive is available
      only at the server configuration level, it is not possible to tune the value
      for different portions of the same web server. Please read the Apache
      documentation carefully, as these requests may interfere with the expected
      functionality of some web applications.
    audit_procedure: >
      Perform the following steps to determine if the recommended state is
      implemented: Verify that the LimitRequestline directive is in the Apache
      configuration and has a value of 8190 or less.
    remediation: >
      Perform the following to implement the recommended state: Add or modify the
      LimitRequestline directive in the Apache configuration to have a value of 8190
      or shorter. LimitRequestline 8190 Default Value: LimitRequestline 8190
      References: 1.
      https://httpd.apache.org/docs/2.4/mod/core.html#limitrequestline
    references: >
      1. https://httpd.apache.org/docs/2.4/mod/core.html#limitrequestline
    impact: >
      
