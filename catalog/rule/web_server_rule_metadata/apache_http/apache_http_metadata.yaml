  - rule_id: apache_http.cis.12.apparmor_framework_is_enabled
    title: "Ensure the AppArmor Framework Is Enabled"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: automated
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "12.1"
    cis_section: "12"
    profile_applicability: "Level 2"
    description: >
      AppArmor is a Linux kernel security module that provides a named based
      mandatory access control with security policies. AppArmor can enforce rules on
      programs for file access and network connections and restrict actions based on
      defined policies.
    rationale: >
      Web applications and web services continue to be one of the leading attack
      vectors for black-hat criminals to gain access to information and servers. The
      threat is high because web servers are often externally accessible and
      typically have the greatest share of server-side vulnerabilities. The AppArmor
      mandatory access controls provide a much stronger security model which can be
      used to implement a deny-by-default model which only allows what is explicitly
      permitted.
    audit_procedure: >
      Perform the following steps to determine if the recommended state is
      implemented: Use the aa-status command with the --enabled option to check that
      AppArmor is enabled. If AppArmor is enabled the command will return a zero (0)
      exit code for success. The && echo Enabled is added to the command below to
      provide positive feedback. If no text is echoed, then AppArmor is not enabled.
      # aa-status --enabled && echo Enabled Enabled
    remediation: >
      Perform the following to implement the recommended state: • If the aa-status
      command is not found, then the AppArmor package is not installed and needs to
      be installed using the appropriate the Linux distribution package management.
      For example: # apt-get install apparmor # apt-get install libapache2-mod-
      apparmor • To enable the AppArmor framework run the init.d script as shown
      below. # /etc/init.d/apparmor start Default Value: AppArmor is enabled by
      default. References: 1. https://help.ubuntu.com/community/AppArmor
    references: >
      1. https://help.ubuntu.com/community/AppArmor
