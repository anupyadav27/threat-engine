  - rule_id: apache_http.cis.1.secure_the_core_dump_directory
    title: "Secure the Core Dump Directory"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.2_v3.3.1"
    cis_version: "2.2_v3.3.1"
    cis_control: "1.3.7"
    cis_section: "1"
    profile_applicability: ""
    description: >
      The CoreDumpDirectory directive can be used to specify a directory which
      Apache attempts to switch before dumping core for debugging. The default
      directory is the Apache ServerRoot directory, however on Linux systems core
      dumps will be disabled by default. Most production environments should leave
      core dumps disabled. In the event that core dumps are needed, the directory
      needs to be a writable directory by Apache, and should meet the security
      requirements defined below in the remediation and audit.
    rationale: >
      Core dumps are snapshots of memory and may contain sensitive information that
      should not be accessible by other accounts on the system.
    audit_procedure: >
      Verify that either the CoreDumpDirectory directive is not enabled in any of
      the Apache configuration files or that the configured directory meets the
      following requirements: 1. CoreDumpDirectory is not be within the Apache web
      document root ($APACHE_PREFIX/htdocs) 2. must be owned by root and have a
      group ownership of the Apache group (as defined via the Group directive) 3.
      must have no read- write- search access permission for other users. (e.g.
      o=rwx) 29 | P a g e
    remediation: >
      Either remove the CoreDumpDirectory directive from the Apache configuration
      files or ensure that the configured directory meets the following
      requirements. 1. CoreDumpDirectory is not to be within the Apache web document
      root ($APACHE_PREFIX/htdocs) 2. must be owned by root and have a group
      ownership of the Apache group (as defined via the Group directive) # chown
      root:apache /var/log/httpd 3. must have no read- write- search access
      permission for other users. # chmod o-rwx /var/log/httpd References: 1.
      http://httpd.apache.org/docs/2.2/mod/mpm_common.html#coredumpdirectory
    references: >
      1. http://httpd.apache.org/docs/2.2/mod/mpm_common.html#coredumpdirectory
