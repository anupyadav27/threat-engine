  - rule_id: apache_http.cis.1.restrict_browser_frame_options
    title: "Restrict Browser Frame Options"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.2_v3.3.1"
    cis_version: "2.2_v3.3.1"
    cis_control: "1.5.14"
    cis_section: "1"
    profile_applicability: ""
    description: >
      The Header directive allows server HTTP response headers to be added, replaced
      or merged. We will use the directive to add an server HTTP response header to
      tell browsers to restrict all of the web pages from being framed by other web
      sites.
    rationale: >
      Using iframes and regular web frames to embed malicious content along with
      expected web content has been a favored attack vector for attacking web
      clients for a long time. This can happen when the attacker lures the victim to
      a malicious web site, which using frames to include the expected content from
      the legitimate site. The attack can also be performed via XSS (either
      reflected, DOM or stored XSS) to add the malicious content to the legitimate
      web site. To combat this vector, an HTTP Response header, X- Frame- Options,
      has been introduced that allows a server to specify whether a web page may be
      loaded in any frame (DENY) or those frames that share the pages origin
      (SAMEORIGIN).
    audit_procedure: >
      Perform the following steps to determine if the recommended state is
      implemented: 1. Ensure the previous line is present in the Apache
      configuration and not commented out : # grep -i X-Frame-Options
      $APACHE_PREFIX/conf/httpd.conf 59 | P a g e
    remediation: >
      Perform the following to implement the recommended state: 1. Add or modify the
      Header directive for the X-Frames-Options header in the Apache configuration
      to have the condition always, an action of append and a value of SAMEORIGIN or
      DENY, as shown below. Header always append X-Frame-Options SAMEORIGIN
      References: 1. http://httpd.apache.org/docs/2.2/mod/mod_headers.html#header 2.
      https://developer.mozilla.org/en/The_X- FRAME- OPTIONS_response_header 3.
      http://blogs.msdn.com/b/ie/archive/2009/01/27/ie8- security- part- vii-
      clickjacking- defenses.aspx 1.6 Operations - Logging, Monitoring and
      Maintenance Operational procedures of logging, monitoring and maintenance are
      vital to protecting your web servers as well as the rest of the
      infrastructure.
    references: >
      1. http://httpd.apache.org/docs/2.2/mod/mod_headers.html#header 2.
      https://developer.mozilla.org/en/The_X- FRAME- OPTIONS_response_header 3.
