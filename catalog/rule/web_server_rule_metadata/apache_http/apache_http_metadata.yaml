  - rule_id: apache_http.cis.6.a_syslog_facility_is_configured_for_error_logging
    title: "Ensure a Syslog Facility Is Configured for Error Logging"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: automated
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "6.2"
    cis_section: "6"
    profile_applicability: "Level 2"
    description: >
      The ErrorLog directive should be configured to send logs to a syslog facility
      so that the logs can be processed and monitored along with the system logs.
    rationale: >
      It is easy for the web server error logs to be overlooked in the log
      monitoring process, and yet the application level attacks have become the most
      common and are extremely important for detecting attacks early, as well as
      detecting non-malicious problems such as a broken link, or internal errors. By
      including the Apache error logs with the system logging facility, the
      application logs are more likely to be included in the established log
      monitoring process.
    audit_procedure: >
      Perform the following steps to determine if the recommended state is
      implemented: 1. Verify that the ErrorLog in the Apache server configuration
      has a value of syslog:facility where facility can be any of the syslog
      facility values such as local1. 2. Verify there is a similar ErrorLog
      directive which is either configured or inherited for each virtual host.
    remediation: >
      Perform the following to implement the recommended state: 1. Add an ErrorLog
      directive if not already configured. Any appropriate syslog facility may be
      used in place of local1. ErrorLog 'syslog:local1' 2. Add a similar ErrorLog
      directive for each virtual host if necessary. Default Value: The following is
      the default configuration: ErrorLog 'logs/error_log' References: 1.
      https://httpd.apache.org/docs/2.4/logs.html 2.
      https://httpd.apache.org/docs/2.4/mod/core.html#loglevel 3.
      https://httpd.apache.org/docs/2.4/mod/core.html#errorlog
    references: >
      1. https://httpd.apache.org/docs/2.4/logs.html 2.
      https://httpd.apache.org/docs/2.4/mod/core.html#loglevel 3.
