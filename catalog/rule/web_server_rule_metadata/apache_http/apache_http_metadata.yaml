  - rule_id: apache_http.cis.1.disable_http_trace_method
    title: "Disable HTTP TRACE Method"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.2_v3.3.1"
