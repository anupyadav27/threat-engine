  - rule_id: apache_http.cis.1.restrict_override_for_the_os_root_directory
    title: "Restrict OverRide for the OS Root Directory"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.2_v3.3.1"
    cis_version: "2.2_v3.3.1"
    cis_control: "1.4.3"
    cis_section: "1"
    profile_applicability: ""
    description: >
      The Apache OverRide directive allows for .htaccess files to be used to
      override much of the configuration, including authentication, handling of
      document types, auto generated indexes, access control, and options. When the
      server finds an .htaccess file (as specified by AccessFileName) it needs to
      know which directives declared in that file can override earlier access
      information. When this directive is set to None, then .htaccess files are
      completely ignored. In this case, the server will not even attempt to read
      .htaccess files in the filesystem. When this directive is set to All, then any
      directive which has the .htaccess Context is allowed in .htaccess files. 38 |
      P a g e Refer to the Apache 2.2 documentation for details
      http://httpd.apache.org/docs/2.2/mod/core.html#allowoverride
    rationale: >
      While the functionality of htaccess files is sometimes convenient, usage
      decentralizes the access controls and increases the risk of configurations
      being changed or viewed inappropriately by an unintended or rogue .htaccess
      file. Consider also that some of the more common vulnerabilities in web
      servers and web applications allow the web files to be viewed or to be
      modified, then it is wise to keep the configuration out of the web server from
      being placed in .htaccess files.
    audit_procedure: >
      Perform the following to determine if the recommended state is implemented: 1.
      Search the Apache configuration files (httpd.conf and any included
      configuration files) to find a root element. 2. Ensure there is a single
      AllowOverride directive with the value of None. The following may be useful
      for extracting root directory elements from the Apache configuration for
      auditing. $ perl -ne 'print if /^ *<Directory *\//i .. /<\/Directory/i'
      $APACHE_PREFIX/conf/httpd.conf
    remediation: >
      Perform the following to implement the recommended state: 1. Search the Apache
      configuration files (httpd.conf and any included configuration files) to find
      a root <Directory> element. 2. Add a single AllowOverride directive if there
      is none. 3. Set the value for AllowOverride to None. <Directory> . . .
      AllowOverride None . . . </Directory> References: 1.
      http://httpd.apache.org/docs/2.2/mod/core.html#allowoverride 39 | P a g e
    references: >
      1. http://httpd.apache.org/docs/2.2/mod/core.html#allowoverride 39 | P a g e
    impact: >
      
