  - rule_id: apache_http.cis.11.apache_processes_run_in_the_httpd_t_confined
    title: "Ensure Apache Processes Run in the httpd_t Confined Context"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: automated
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "11.2"
    cis_section: "11"
    profile_applicability: "Level 2"
    description: >
      SELinux includes customizable targeted policies that may be used to confine
      the Apache httpd server to enforce least privileges so that the httpd server
      has only the minimal access to specified directories, files and network ports.
      Access is controlled by process types (domains) defined for the httpd process.
      There are over a hundred individual httpd related types defined in a default
      Apache SELinux policy which includes many of the common Apache add-ons and
      applications such as php, nagios, smokeping and many others. The default
      SELinux policies work well for a default Apache installation, but
      implementation of SELinux targeted polices on a complex or highly customized
      web server requires a rather significant development and testing effort which
      comprehends both the workings of SELinux and the detailed operations and
      requirements of the web application. All directories and files to be accessed
      by the web server process must have security labels with appropriate types.
      The following types are a sample of the most commonly used: • http_port_t -
      Network ports allowed for listening • httpd_sys_content_t - Read access to
      directories and files with web content • httpd_log_t - Directories and files
      to be used for writable log data • httpd_sys_script_exec_t - Directories and
      files for executable content.
    rationale: >
      With the proper implementation of SELinux, vulnerabilities in the web
      application may be prevented from being exploited due to the additional
      restrictions. For example, a vulnerability that allows an attacker to read
      inappropriate system files may be prevented from execution by SELinux because
      the inappropriate files are not labeled as httpd_sys_content_t. Likewise
      writing to an unexpected directory or execution of unexpected content can be
      prevented by similar mandatory security labels enforced by SELinux.
    audit_procedure: >
      Perform the following steps to determine if the recommended state is
      implemented: Check that all of the Apache httpd processes are confined to the
      httpd_t SELinux context. The type (the third colon separated field) for each
      process should be httpd_t. Note that on some platforms, such as Ubuntu, the
      Apache executable is named apache2 instead of httpd. $ ps -eZ | grep httpd
      unconfined_u:system_r:httpd_t:s0 1366 ? 00:00:00 httpd
      unconfined_u:system_r:httpd_t:s0 1368 ? 00:00:00 httpd . . .
    remediation: >
      If the running httpd processes are not confined to the httpd_t SELinux
      context. Then check the context for the httpd binary and the apachectl binary
      and set the httpd binary to have a context of httpd_exec_t and the apachectl
      executable should have a context of initrc_exec_t as shown below. Also note
      that on some platforms such as Ubuntu, the Apache executable is named apache2
      instead of httpd. # ls -alZ /usr/sbin/httpd /usr/sbin/httpd.*
      /usr/sbin/apachectl -rwxr-xr-x. root root system_u:object_r:initrc_exec_t:s0
      /usr/sbin/apachectl -rwxr-xr-x. root root system_u:object_r:httpd_exec_t:s0
      /usr/sbin/httpd -rwxr-xr-x. root root system_u:object_r:httpd_exec_t:s0
      /usr/sbin/httpd.worker -rwxr-xr-x. root root system_u:object_r:httpd_exec_t:s0
      /usr/sbin/httpd.event If the executable files are not labeled correctly, they
      may be relabeled with the chcon command, as shown, however the file system
      labeling is based on the SELinux file context polices and the file systems
      will on some occasions be relabeled according to the policy. # chcon -t
      initrc_exec_t /usr/sbin/apachectl # chcon -t httpd_exec_t /usr/sbin/httpd
      /usr/sbin/httpd.* Since the file system may be relabeled based on SELinux
      policy, it's best to check the SELinux policy with semanage fcontext -l
      option. If the policy is not present, then add the pattern to the policy using
      the -a option. The restorecon command shown below will restore the file
      context label according to the current policy, which is required if a pattern
      was added. # ### Check the Policy # semanage fcontext -l | fgrep 'apachectl'
      /usr/sbin/apachectl regular file system_u:object_r:initrc_exec_t:s0 # semanage
      fcontext -l | fgrep '/usr/sbin/httpd' /usr/sbin/httpd regular file
      system_u:object_r:httpd_exec_t:s0 /usr/sbin/httpd.worker regular file
      system_u:object_r:httpd_exec_t:s0 /usr/sbin/httpd.event regular file
      system_u:object_r:httpd_exec_t:s0 # ### Add to the policy, if not present #
      semanage fcontext -f -- -a -t httpd_exec_t '/usr/sbin/httpd' # semanage
      fcontext -f -- -a -t httpd_exec_t '/usr/sbin/httpd.worker' # semanage fcontext
      -f -- -a -t httpd_exec_t '/usr/sbin/httpd.event' # semanage fcontext -f -- -a
      -t initrc_exec_t /usr/sbin/apachectl # ### Restore the file labeling accord to
      the SELinux policy # restorecon -v /usr/sbin/httpd /usr/sbin/httpd.*
      /usr/sbin/apachectl Default Value: SELinux is not enabled by default.
      References: 1. https://access.redhat.com/documentation/en-
      US/Red_Hat_Enterprise_Linux/6/html/Security-Enhanced_Linux/chap-Security-
      Enhanced_Linux-Targeted_Policy.html
    references: >
      1. https://access.redhat.com/documentation/en-
      US/Red_Hat_Enterprise_Linux/6/html/Security-Enhanced_Linux/chap-Security-
      Enhanced_Linux-Targeted_Policy.html
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_APACHE_HTTP_2_4_v2_2_0_11_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_apache_http_2_4_v2_2_0_11_2"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: apache_http.cis.11.httpd_t_type_is_not_in_permissive_mode
    title: "Ensure the httpd_t Type is Not in Permissive Mode"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: automated
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "11.3"
    cis_section: "11"
    profile_applicability: "Level 2"
    description: >
      In addition to setting the entire SELinux configuration in permissive mode, it
      is possible to set individual process types (domains) such as httpd_t into a
      permissive mode as well. The permissive mode will not prevent any access or
      actions, instead, any actions that would have been denied are simply logged.
    rationale: >
      Usage of the permissive mode is helpful for testing and ensuring that SELinux
      will not prevent access that is necessary for the proper function of a web
      application. However, all access is allowed in permissive mode by SELinux.
    audit_procedure: >
      Perform the following steps to determine if the recommended state is
      implemented: Check that the httpd_t process type (domain) is not in permissive
      mode with the semodule command. There should be no output if the type is not
      set to permissive. # semodule -l | grep permissive_httpd_t
    remediation: >
      Perform the following to implement the recommended state: If the httpd_t type
      is in permissive mode; the customized permissive mode should be deleted with
      the following semanage command. # semanage permissive -d httpd_t Default
      Value: The httpd_t type is not in permissive mode by default. References: 1.
      https://access.redhat.com/documentation/en-
      US/Red_Hat_Enterprise_Linux/6/html/Security-Enhanced_Linux/sect-Security-
      Enhanced_Linux-Fixing_Problems-Permissive_Domains.html
