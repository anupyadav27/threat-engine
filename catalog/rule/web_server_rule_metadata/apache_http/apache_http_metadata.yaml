  - rule_id: apache_http.cis.1.enable_http_strict_transport_security
    title: "Enable HTTP Strict Transport Security"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.2_v3.3.1"
    cis_version: "2.2_v3.3.1"
    cis_control: "1.7.9"
    cis_section: "1"
    profile_applicability: ""
    description: >
      HTTP Strict Transport Security (HSTS) is an optional web server security
      policy mechanism specified by an HTTP Server header. The HSTS header allows a
      server declaration that only HTTPS communication should be used rather than
      clear text HTTP communication.
    rationale: >
      Usage of HTTP Strict Transport Security (HSTS) helps protect HSTS compliant
      browsers and other agents from HTTP downgrade attacks. Downgrade attacks
      include a variety of man- in- the- middle attacks which leave the web
      communication vulnerable to disclosure and modification by forcing the usage
      of HTTP rather than HTTPS communication. The sslstrip attack tool by Moxie
      Marlinspike released in 2009 is one such attack, which works when the server
      allows both HTTP and HTTPS communication. However a man- in- the- middle HTTP-
      to- HTTPS proxy would be effective in cases where the server required 81 | P a
      g e HTTPS, but did not publish an HSTS policy to the browser. This attack
      would also be effective on browsers which were not compliant with HSTS. All
      current up- to- date browsers support HSTS except Microsoft's Internet
      Explorer; Internet Explorer is expected to support HSTS in the next major
      release after IE 12. The HSTS header specifies a length of time in seconds
      that the browser / user agent should access the server only using HTTPS. The
      header may also specify if all sub- domains should also be included in the
      same policy. Once a compliant browser receives the HSTS Header it will not
      allow access to the server via HTTP. Therefore it is important that you ensure
      that there is no portion of the web site or web application that requires HTTP
      prior to enabling the HSTS protocol. If all sub- domains are to be included
      via the includeSubDomains option, then carefully consider all various host
      names, web applications and third party services used including any DNS CNAME
      values that may be impacted. An overly broad includeSubDomains policy will
      disable access to HTTP web sites for all websites with the same domain name.
      Also consider that the access will be disabled for the number of seconds given
      in the max- age value, so in the event a mistake is made, a large value, such
      as a year, could create significant support issues. An optional flag of
      preload may be added if the web site name is to be submitted to be preloaded
      in Chrome, Firefox and Safari browsers. See https://hstspreload.appspot.com/
      for details.
    audit_procedure: >
      Perform either of the following steps to determine if the recommended state is
      implemented. At the Apache server level configuration and for every virtual
      host that is SSL enabled, verify there is a Header directive present that sets
      the Strict- Transport- Security header with a max- age value of at least 480
      seconds or more (8 minutes or more). For example: Header always set Strict-
      Transport-Security 'max-age=600' As an alternative the configuration may be
      validated by connecting to the HTTPS server and verifying the presence of the
      header. Such as the openssl s_client command shown below: 82 | P a g e openssl
      s_client -connect www.example.com:443 GET / HTTP1.1. Host:www.example.com
      HTTP/1.1 200 OK Date: Mon, 08 Dec 2014 18:28:29 GMT Server: Apache X-Frame-
      Options: NONE Strict-Transport-Security: max-age=600 Last-Modified: Mon, 19
      Jun 2006 14:47:16 GMT ETag: '152-41694d7a92500' Accept-Ranges: bytes Content-
      Length: 438 Connection: close Content-Type: text/html
    remediation: >
      Perform the following to implement the recommended state: Add a Header
      directive as shown below in the Apache server level configuration and every
      virtual host that is SSL enabled. The includeSubDomains and preload flags may
      be included in the header, but are not required. Header always set Strict-
      Transport-Security 'max-age=600”; includeSubDomains; preload - or - Header
      always set Strict-Transport-Security 'max-age=600” Default Value: Default
      Value: The Strict Transport Security header is not present by default.
      References: 1. http://en.wikipedia.org/wiki/HTTP_Strict_Transport_Security 2.
      https://www.owasp.org/index.php/HTTP_Strict_Transport_Security 3.
      http://www.thoughtcrime.org/software/sslstrip/ 4.
      https://developer.mozilla.org/en-
      US/docs/Web/Security/HTTP_strict_transport_security 5.
      https://hstspreload.appspot.com/ 83 | P a g e 1.8 Information Leakage
      Recommendations in this section are intended to limit the disclosure of
      potentially sensitive information.
    references: >
      1. http://en.wikipedia.org/wiki/HTTP_Strict_Transport_Security 2.
      https://www.owasp.org/index.php/HTTP_Strict_Transport_Security 3.
      http://www.thoughtcrime.org/software/sslstrip/ 4.
      https://developer.mozilla.org/en-
