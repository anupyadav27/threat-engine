  - rule_id: apache_http.cis.5.old_http_protocol_versions_are_disallowed
    title: "Ensure Old HTTP Protocol Versions Are Disallowed"
    severity: high
    category: web_server
    tech_type: apache_http
    automation_type: automated
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "5.9"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The Apache modules mod_rewrite or mod_security can be used to disallow old and
      invalid HTTP protocols versions. The HTTP version 1.1 RFC is dated June 1999
      and has been supported by Apache since version 1.2. It should no longer be
      necessary to allow ancient versions of HTTP such as 1.0 and prior.
    rationale: >
      Many malicious automated programs, vulnerability scanners and fingerprinting
      tools will send abnormal HTTP protocol versions to see how the web server
      responds. These requests are usually part of the attacker's enumeration
      process and therefore it is important that we respond by denying these
      requests.
    audit_procedure: >
      Perform the following to determine if the recommended state is implemented: 1.
      Locate the Apache configuration files and included configuration files. 2.
      Verify there is a rewrite condition within the global server context that
      disallows requests that do not include the HTTP/1.1 header as shown below.
      RewriteEngine On RewriteCond %{THE_REQUEST} !(HTTP/1\.1|HTTP/2\.0)$
      RewriteRule .* - [F] 3. Verify the following directives are included in each
      section so that the main server settings will be inherited. RewriteEngine On
      RewriteOptions Inherit
    remediation: >
      Perform the following to implement the recommended state: 1. Load the
      mod_rewrite module for Apache by doing either one of the following: o Build
      Apache with mod_rewrite statically loaded during the build, by adding the
      --enable-rewrite option to the ./configure script. ./configure --enable-
      rewrite. o Or, dynamically loading the module with the LoadModule directive in
      the httpd.conf configuration file. LoadModule rewrite_module
      modules/mod_rewrite.so 2. Locate the main Apache configuration file such as
      httpd.conf and add the following rewrite condition to match HTTP/1.1 and the
      rewrite rule to the global server level configuration to disallow other
      protocol versions. RewriteEngine On RewriteCond %{THE_REQUEST} !HTTP/1\.1$
      RewriteRule .* - [F] 3. By default, mod_rewrite configuration settings from
      the main server context are not inherited by virtual hosts. Therefore, it is
      also necessary to add the following directives in each section to inherit the
      main server settings. RewriteEngine On RewriteOptions Inherit Default Value:
      The default value for the RewriteEngine directive is off. References: 1.
      https://httpd.apache.org/docs/2.4/mod/mod_rewrite.html
    references: >
      1. https://httpd.apache.org/docs/2.4/mod/mod_rewrite.html
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_APACHE_HTTP_2_4_v2_2_0_5_9"
      nist_800_53: []
      soc2: []
