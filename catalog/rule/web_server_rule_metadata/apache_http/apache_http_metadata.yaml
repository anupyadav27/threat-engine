  - rule_id: apache_http.cis.1.configure_the_error_log
    title: "Configure the Error Log"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.2_v3.3.1"
    cis_version: "2.2_v3.3.1"
    cis_control: "1.6.1"
    cis_section: "1"
    profile_applicability: ""
    description: >
      The LogLevel directive is used to configure the severity level for the error
      logs. While the ErrorLog directive configures the error log file name. The log
      level values are the standard syslog levels of emerg, alert, crit, error,
      warn, notice, info and debug. The recommended level is notice, so that all
      errors from the emerg level through notice level will be logged.
    rationale: >
      The server error logs are invaluable because they can also be used to spot any
      potential problems before they become serious. Most importantly, they can be
      used to watch for anomalous behavior such as a lot of 'not found' or
      'unauthorized' errors may be an indication that an attack is pending or has
      occurred. 60 | P a g e
    audit_procedure: >
      Perform the following steps to determine if the recommended state is
      implemented: 1. Verify the LogLevel in the apache server configuration has a
      value of notice or lower. Note that it is also compliant to have a value of
      info or debug if there is a need for a more verbose log and the storage and
      monitoring processes are capable of handling the extra load. The recommended
      value is notice. 2. Verify the ErrorLog directive is configured to an
      appropriate log file or syslog facility. 3. Verify there is a similar ErrorLog
      directive for each virtual host configured if the virtual host will have
      different people responsible for the web site.
    remediation: >
      Perform the following to implement the recommended state: 1. Add or modify the
      LogLevel in the apache configuration to have a value of notice or lower. Note
      that is it is compliant to have a value of info or debug if there is a need
      for a more verbose log and the storage and monitoring processes are capable of
      handling the extra load. The recommended value is notice. LogLevel notice 2.
      Add an ErrorLog directive if not already configured. The file path may be
      relative or absolute, or the logs may be configured to be sent to a syslog
      server. ErrorLog 'logs/error_log' 3. Add a similar ErrorLog directive for each
      virtual host configured if the virtual host will have different people
      responsible for the web site. Each responsible individual or organization
      needs access to their own web logs, and needs the skills/training/tools for
      monitor the logs. References: 1. http://httpd.apache.org/docs/2.2/logs.html 2.
      http://httpd.apache.org/docs/2.2/mod/core.html#loglevel 3.
      http://httpd.apache.org/docs/2.2/mod/core.html#errorlog 61 | P a g e
    references: >
      1. http://httpd.apache.org/docs/2.2/logs.html 2.
      http://httpd.apache.org/docs/2.2/mod/core.html#loglevel 3.
      http://httpd.apache.org/docs/2.2/mod/core.html#errorlog 61 | P a g e
    impact: >
      
