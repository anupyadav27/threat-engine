  - rule_id: apache_http.cis.9.maxkeepaliverequests_is_set_to_a_value_of_100_or
    title: "Ensure MaxKeepAliveRequests is Set to a Value of 100 or Greater"
    severity: high
    category: web_server
    tech_type: apache_http
    automation_type: automated
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "9.3"
    cis_section: "9"
    profile_applicability: "Level 1"
    description: >
      The MaxKeepAliveRequests directive limits the number of requests allowed per
      connection when KeepAlive is on. If it is set to 0, unlimited requests will be
      allowed.
    rationale: >
      The MaxKeepAliveRequests directive is important to be used to mitigate the
      risk of Denial of Service (DoS) attack technique by reducing the overhead
      imposed on the server. The KeepAlive directive must be enabled before it is
      effective. Enabling KeepAlives allows for multiple HTTP requests to be sent
      while keeping the same TCP connection alive. This reduces the overhead of
      having to setup and tear down TCP connections for each request. By making the
      server more efficient, it will be more resilient to DoS conditions.
    audit_procedure: >
      Perform the following steps to determine if the recommended state is
      implemented: Verify that the MaxKeepAliveRequests directive in the Apache
      configuration to have a value of 100 or more. If the directive is not present
      the default value is 100.
    remediation: >
      Perform the following to implement the recommended state: Add or modify the
      MaxKeepAliveRequests directive in the Apache configuration to have a value of
      100 or more. MaxKeepAliveRequests 100 Default Value: MaxKeepAliveRequests 100
      References: 1.
      https://httpd.apache.org/docs/2.4/mod/core.html#maxkeepaliverequests
    references: >
      1. https://httpd.apache.org/docs/2.4/mod/core.html#maxkeepaliverequests
    impact: >
      
