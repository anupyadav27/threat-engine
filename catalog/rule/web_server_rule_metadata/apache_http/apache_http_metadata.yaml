  - rule_id: apache_http.cis.3.apache_user_account_has_an_invalid_shell
    title: "Ensure the Apache User Account Has an Invalid Shell"
    severity: high
    category: web_server
    tech_type: apache_http
    automation_type: automated
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "3.2"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The apache account must not be used as a regular login account, and should be
      assigned an invalid or nologin shell to ensure that the account cannot be used
      to login.
    rationale: >
      Service accounts such as the apache account represent a risk if they can be
      used to get a login shell to the system.
    audit_procedure: >
      Check the apache login shell in the /etc/passwd file: # grep apache
      /etc/passwd The apache account shell must be /sbin/nologin or /dev/null
      similar to the following:
      /etc/passwd:apache:x:48:48:Apache:/var/www:/sbin/nologin
    remediation: >
      Change the apache account to use the nologin shell or an invalid shell such as
      /dev/null: # chsh -s /sbin/nologin apache Default Value: The default Apache
      user account is daemon. The daemon account may have a valid login shell or a
      shell of /sbin/nologin depending on the operating system distribution version.
