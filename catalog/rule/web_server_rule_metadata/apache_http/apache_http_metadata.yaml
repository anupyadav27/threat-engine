  - rule_id: apache_http.cis.9.timeout_is_set_to_10_or_less
    title: "Ensure the TimeOut Is Set to 10 or Less"
    severity: high
    category: web_server
    tech_type: apache_http
    automation_type: automated
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "9.1"
    cis_section: "9"
    profile_applicability: "Level 1"
    description: >
      Denial of Service (DoS) is an attack technique with the intent of preventing a
      web site from serving normal user activity. DoS attacks, which are normally
      applied to the network layer, are also possible at the application layer.
      These malicious attacks can succeed by starving a system of critical
      resources, vulnerability exploit, or abuse of functionality. Although there is
      no 100% solution for preventing DoS attacks, the following recommendation uses
      the Timeout directive to mitigate some of the risk, by requiring more effort
      for a successful DoS attack. Of course, DoS attacks can happen in rather
      unintentional ways as well as intentional and these directives will help in
      many of those situations as well.
    rationale: >
      One common technique for DoS is to initiate many connections to the server. By
      decreasing the timeout for old connections and we allow the server to free up
      resources more quickly and be more responsive. By making the server more
      efficient, it will be more resilient to DoS conditions. The Timeout directive
      affects several timeout values for Apache, so review the Apache document
      carefully. http://httpd.apache.org/docs/2.4/mod/core.html#timeout
    audit_procedure: >
      Perform the following steps to determine if the recommended state is
      implemented: Verify that the Timeout directive is specified in the Apache
      configuration files to have a value of 10 seconds or shorter.
    remediation: >
      Perform the following to implement the recommended state: Add or modify the
      Timeout directive in the Apache configuration to have a value of 10 seconds or
      shorter. Timeout 10 Default Value: Timeout 60 References: 1.
      https://httpd.apache.org/docs/2.4/mod/core.html#timeout Additional
      Information:
    references: >
      1. https://httpd.apache.org/docs/2.4/mod/core.html#timeout Additional
      Information:
    impact: >
      
