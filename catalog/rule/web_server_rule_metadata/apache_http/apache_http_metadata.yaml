  - rule_id: apache_http.cis.7.ssl_compression_is_not_enabled
    title: "Ensure SSL Compression is not Enabled"
    severity: high
    category: web_server
    tech_type: apache_http
    automation_type: automated
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "7.7"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      The SSLCompression directive controls whether SSL compression is used by
      Apache when serving content over HTTPS. It is recommended that the
      SSLCompression directive be set to off.
    rationale: >
      If SSL compression is enabled, HTTPS communication between the client and the
      server may be at increased risk to the CRIME attack. The CRIME attack
      increases a malicious actor's ability to derive the value of a session cookie,
      which commonly contains an authenticator. If the authenticator in a session
      cookie is derived, it can be used to impersonate the account associated with
      the authenticator.
    audit_procedure: >
      Perform the following steps to determine if the recommended state is
      implemented: 1. Search the Apache configuration files for the SSLCompression
      directive. 2. Verify that the directive either does not exist or exists and is
      set to off.
    remediation: >
      Perform the following to implement the recommended state: 1. Search the Apache
      configuration files for the SSLCompression directive. 2. If the directive is
      present, set it to off. Default Value: In Apache versions >= 2.4.3, the
      SSLCompression directive is available and SSL compression is implicitly
      disabled. In Apache 2.4 - 2.4.2, the SSLCompression directive is not available
      and SSL compression is implicitly disabled. References: 1.
      https://httpd.apache.org/docs/2.4/mod/mod_ssl.html#sslcompression 2.
      https://en.wikipedia.org/wiki/CRIME_(security_exploit)
    references: >
      1. https://httpd.apache.org/docs/2.4/mod/mod_ssl.html#sslcompression 2.
      https://en.wikipedia.org/wiki/CRIME_(security_exploit)
