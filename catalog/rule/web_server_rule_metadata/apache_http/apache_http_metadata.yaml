  - rule_id: apache_http.cis.3.apache_directories_and_files_are_owned_by_root
    title: "Ensure Apache Directories and Files Are Owned By Root"
    severity: high
    category: web_server
    tech_type: apache_http
    automation_type: automated
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "3.4"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The Apache directories and files should be owned by root. This applies to all
      of the Apache software directories and files installed.
    rationale: >
      Restricting ownership of the Apache files and directories will reduce the
      probability of unauthorized modifications to those resources.
    audit_procedure: >
      Identify files in the Apache directory that are not owned by root: # find
      $APACHE_PREFIX \! -user root -ls
    remediation: >
      Perform the following: Set ownership on the $APACHE_PREFIX directories such as
      /usr/local/apache2: $ chown -R root $APACHE_PREFIX Default Value: Default
      ownership and group is a mixture of the user:group that built the software and
      root:root.
