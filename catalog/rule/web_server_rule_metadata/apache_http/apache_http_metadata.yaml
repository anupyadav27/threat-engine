    cis_version: "2.2_v3.3.1"
    cis_control: "1.3.11"
    cis_section: "1"
    profile_applicability: ""
    description: >
      Group permissions on Apache directories should generally be r- x and file
      permissions should be similar except not executable if executable is not
      appropriate. This applies to all of the Apache software directories and files
      installed with the possible exception of the web 33 | P a g e document root
      $DOCROOT defined by Apache DocumentRoot and defaults to $APACHE_PREFIX/htdocs.
      The directories and files in the web document root may have a designated web
      development group with write access to allow web content to be updated.
    rationale: >
      Restricting write permissions on the Apache files and directories can help
      mitigate attacks that modify web content to provide unauthorized access, or to
      attack web clients.
    audit_procedure: >
