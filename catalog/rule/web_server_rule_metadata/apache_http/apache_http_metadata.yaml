  - rule_id: apache_http.cis.1.server_is_not_a_multi_use_system
    title: "Ensure the Server Is Not a Multi-Use System"
    severity: high
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "1.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Default server configurations often expose a wide variety of services
      unnecessarily increasing the risk to the system. Just because a server can
      perform many services doesn't mean it is wise to do so. The number of services
      and daemons executing on the Apache Web server should be limited to those
      necessary, with the Web server being the only primary function of the server.
    rationale: >
      Maintaining a server for a single purpose increases the security of your
      application and system. The more services which are exposed to an attacker,
      the more potential vectors an attacker has to exploit the system and therefore
      the higher the risk for the server. A Web server should function as only a web
      server and if possible, should not be mixed with other primary functions such
      as mail, DNS, database or middleware.
    audit_procedure: >
      Leverage the package or services manager for your OS to list enabled services
      and review with documented business needs of the server. On Red Hat systems,
      the following will produce the list of current services enabled: chkconfig
      --list | grep ':on'
    remediation: >
      Leverage the package or services manager for your OS to uninstall or disable
      unneeded services. On Red Hat systems, the following will disable a given
      service: chkconfig <servicename> off Default Value: Depends on OS Platform
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_APACHE_HTTP_2_4_v2_2_0_1_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_apache_http_2_4_v2_2_0_1_2"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: apache_http.cis.1.apache_is_installed_from_the_appropriate_binaries
    title: "Ensure Apache Is Installed From the Appropriate Binaries"
    severity: high
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "1.3"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      The CIS Apache Benchmark recommends using the Apache binary provided by your
      vendor for most situations in order to reduce the effort and increase the
      effectiveness of maintenance and security patches. However, to keep the
      benchmark as generic and applicable to all Unix/Linux platforms as possible, a
      default source build has been used for this benchmark. Important Note : There
      is a major difference between source builds and most vendor packages that is
      very important to highlight. The default source build of Apache is fairly
      conservative and minimalist in the modules included and therefore starts off
      in a fairly strong security state, while most vendor binaries are typically
      very well loaded with most of the functionality that one may be looking for.
      Therefore, it is important that you don't assume the default value shown in
      the benchmark will match default values in your installation. You should
      always test any new installation in your environment before putting it into
      production. Also keep in mind you can install and run a new version alongside
      the old one by using a different Apache prefix and a different IP address or
      port number in the Listen directive.
    rationale: >
      The benefits of using the vendor supplied binaries include: • Ease of
      installation as it will just work, straight out of the box. • It is customized
      for your OS environment. • It will be tested and have gone through QA
      procedures. • Everything you need is likely to be included, probably including
      some third-party modules. For example, many OS vendors ship Apache with
      mod_ssl and OpenSSL, PHP, mod_perl, and ModSecurity. • Your vendor will tell
      you about security issues so you have to look in fewer places. • Updates to
      fix security issues will be easy to apply. The vendor will have already
      verified the problem, checked the signature on the Apache download, worked out
      the impact and so on. • You may be able to get the updates automatically,
      reducing the window of risk.
    audit_procedure: >
      
    remediation: >
      Installation depends on the operating system platform. For a source build,
      consult the Apache 2.4 documentation on compiling and installing
      https://httpd.apache.org/docs/2.4/install.html for a Red Hat Enterprise Linux
      5 or 6, the following yum command could be used. # yum install httpd
      References: 1. Apache Compiling and Installation
      https://httpd.apache.org/docs/2.4/install.html
    references: >
      1. Apache Compiling and Installation
      https://httpd.apache.org/docs/2.4/install.html
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_APACHE_HTTP_2_4_v2_2_0_1_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_apache_http_2_4_v2_2_0_1_3"
    metadata_source: generated
    generated_by: generate_tech_rules

