  - rule_id: apache_http.cis.1.remove_default_html_content
    title: "Remove Default HTML Content"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.2_v3.3.1"
    cis_version: "2.2_v3.3.1"
    cis_control: "1.5.4"
    cis_section: "1"
    profile_applicability: ""
    description: >
      Apache installations have default content that is not needed or appropriate
      for production use. The primary function for these sample content is to
      provide a default web site, provide user manuals or to demonstrate special
      features of the web server. All content that is not needed should be removed.
    rationale: >
      Historically these sample content and features have been remotely exploited
      and can provide different levels of access to the server. In the Microsoft
      arena, Code Red exploited a problem with the index service provided by the
      Internet Information Service. Usually these routines are not written for
      production use and consequently little thought was given to security in their
      development.
    audit_procedure: >
      45 | P a g e Perform the following to determine if the recommended state is
      implemented: 1. Verify the document root directory and the configuration files
      do not provide for default index.html or welcome page, 2. Ensure the Apache
      User Manual content is not installed by checking the configuration files for
      manual location directives. 3. Verify the Apache configuration files do not
      have the Server Status handler configured. 4. Verify that the Server
      Information handler is not configured. 5. Verify that any other handler
      configurations such as perl-status is not enabled.
    remediation: >
      Review all pre- installed content and remove content which is not required. In
      particular look for the unnecessary content which may be found in the document
      root directory, a configuration directory such as conf/extra directory, or as
      a Unix/Linux package 1. Remove the default index.html or welcome page, if it
      is a separate package or comment out the configuration if it is part of main
      Apache httpd package such as it is on Red Hat Linux. Removing a file such as
      the welcome.conf shown below is not recommended as it may get replaced if the
      package is updated. # # This configuration file enables the default 'Welcome'
      # page if there is no default index page present for # the root URL. To
      disable the Welcome page, comment # out all the lines below. #
      ##<LocationMatch '^/+$'> ## Options -Indexes ## ErrorDocument 403
      /error/noindex.html ##</LocationMatch> 2. Remove the Apache user manual
      content or comment out configurations referencing the manual # yum erase
      httpd-manual 3. Remove or comment out any Server Status handler configuration.
      # # Allow server status reports generated by mod_status, # with the URL of
      http://servername/server-status # Change the '.example.com' to match your
      domain to enable. # #<Location /server-status> # SetHandler server-status #
      Order deny,allow # Deny from all 46 | P a g e # Allow from .example.com
      #</Location> 4. Remove or comment out any Server Information handler
      configuration. # # Allow remote server configuration reports, with the URL of
      # http://servername/server-info (requires that mod_info.c be loaded). # Change
      the '.example.com' to match your domain to enable. # #<Location /server-info>
      # SetHandler server-info # Order deny,allow # Deny from all # Allow from
      .example.com #</Location> 5. Remove or comment out any other handler
      configuration such as perl- status. # This will allow remote server
      configuration reports, with the URL of # http://servername/perl-status #
      Change the '.example.com' to match your domain to enable. # #<Location /perl-
      status> # SetHandler perl-script # PerlResponseHandler Apache2::Status # Order
      deny,allow # Deny from all # Allow from .example.com #</Location>
