  - rule_id: apache_http.cis.1.restrict_http_protocol_versions
    title: "Restrict HTTP Protocol Versions"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.2_v3.3.1"
    cis_version: "2.2_v3.3.1"
    cis_control: "1.5.9"
    cis_section: "1"
    profile_applicability: ""
    description: >
      The Apache modules mod_rewrite or mod_security can be used to disallow old and
      invalid HTTP protocols versions. The HTTP version 1.1 RFC is dated June 1999,
      and has been supported by Apache since version 1.2. It should no longer be
      necessary to allow ancient versions of HTTP such as 1.0 and prior. Refer to
      the Apache documentation on mod_rewrite for more details:
      http://httpd.apache.org/docs/2.2/mod/mod_rewrite.html
    rationale: >
      Many malicious automated programs, vulnerability scanners and fingerprinting
      tools will send abnormal HTTP protocol versions to see how the web server
      responds. These requests are usually part of the attacker's enumeration
      process and therefore it is important that we respond by denying these
      requests.
    audit_procedure: >
      Perform the following to determine if the recommended state is implemented: 1.
      Locate the Apache configuration files and included configuration files. 2.
      Verify there is a rewrite condition within the global server context that
      disallows requests that do not include the HTTP/1.1 header as shown below .
      RewriteEngine On RewriteCond %{THE_REQUEST} !HTTP/1\.1$ RewriteRule .* - [F]
      3. Verify the following directives are included in each section so that the
      main server settings will be inherited. RewriteEngine On RewriteOptions
      Inherit 52 | P a g e
    remediation: >
      Perform the following to implement the recommended state: 1. Load the
      mod_rewritemodule for Apache by doing either one of the following: 1. Build
      Apache with mod_rewrite statically loaded during the build, by adding the
      --enable-rewrite option to the ./configure script. ./configure --enable-
      rewrite 2. Or dynamically loading the module with the LoadModule directive in
      the httpd.conf configuration file. LoadModule rewrite_module
      modules/mod_rewrite.so 2. Add the RewriteEngine directive to the configuration
      within the global server context with the value of on so that the rewrite
      engine is enabled. RewriteEngine On 3. Locate the main Apache configuration
      file such as httpd.conf and add the following rewrite condition to match
      HTTP/1.1 and the rewrite rule to the top server level configuration to
      disallow other protocol versions. RewriteEngine On RewriteCond %{THE_REQUEST}
      !HTTP/1\.1$ RewriteRule .* - [F] 4. By default, mod_rewrite configuration
      settings from the main server context are not inherited by virtual hosts.
      Therefore it is also necessary to add the following directives in each section
      to inherit the main server settings. RewriteEngine On RewriteOptions Inherit
      References: 1. http://httpd.apache.org/docs/2.2/mod/mod_rewrite.html 53 | P a
      g e
    references: >
      1. http://httpd.apache.org/docs/2.2/mod/mod_rewrite.html 53 | P a g e
    impact: >
      
