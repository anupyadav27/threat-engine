      cis:
        - "CIS_APACHE_HTTP_2_2_v3_3_1_1_3_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_apache_http_2_2_v3_3_1_1_3_1"
