  - rule_id: apache_http.cis.5.options_for_the_web_root_directory_are_restricted
    title: "Ensure Options for the Web Root Directory Are Restricted"
    severity: high
    category: web_server
    tech_type: apache_http
    automation_type: automated
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "5.2"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The Apache Options directive allows for specific configuration of options,
      including: • Execution of CGI • Following symbolic links • Server side
      includes • Content negotiation
    rationale: >
      The Options directive at the web root or document root level also needs to be
      restricted to the minimal options required. A setting of None is highly
      recommended, however it is recognized that this level content negotiation may
      be needed if multiple languages are supported. No other options should be
      enabled.
    audit_procedure: >
      Perform the following to determine if the recommended state is implemented: 1.
      Search the Apache configuration files (httpd.conf and any included
      configuration files) to find the document root <Directory> elements. 2. Ensure
      there is a single Options directive with the value of None or Multiviews. The
      following may be useful in extracting directory elements from the Apache
      configuration for auditing. perl -ne 'print if /^ *<Directory */i ..
      /<\/Directory/i' $APACHE_PREFIX/conf/httpd.conf
    remediation: >
