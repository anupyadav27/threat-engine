  - rule_id: apache_http.cis.1.apply_applicable_patches
    title: "Apply Applicable Patches"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.2_v3.3.1"
    cis_version: "2.2_v3.3.1"
    cis_control: "1.6.5"
    cis_section: "1"
    profile_applicability: ""
    description: >
      Apply available Apache patches within 1 month of availability.
    rationale: >
      Obviously knowing about newly discovered vulnerabilities is only part of the
      solution; there needs to be a process in place where patches are tested and
      installed. These patches fix diverse problems, including security issues. It
      is recommended to use the Apache packages and updates provide by the your
      Linux platform vendor rather than building from source when possible, in order
      to minimize the disruption and the work of keeping the software up- to- date.
    audit_procedure: >
      Perform the following steps to determine if the recommended state is
      implemented: 1. When Apache was built from source: 1. Check the Apache web
      site for latest versions, date of releases and any security patches.
      http://httpd.apache.org/security/vulnerabilities_22.html Apache patches are
      available http://www.apache.org/dist/httpd/patches 2. If newer versions with
      security patches more than 1 month old and are not installed, then the
      installation is not sufficiently up- to- date. 2. When using platform
      packages: 1. Check for vendor supplied updates on the vendor web site. 2. If
      newer versions with security patches more than 1 month old are not installed,
      then the installation is not sufficiently up- to- date.
    remediation: >
      Update to the latest Apache release available according to either of the
      following: 66 | P a g e 1. When building from source: 1. Read release notes
      and related security patch information 2. Download latest source and any
      dependent modules such as mod_security. 3. Build new Apache software according
      to your build process with the same configuration options. 4. Install and Test
      the new software according to your organizations testing process. 5. Move to
      production according to your organizations deployment process. 2. When using
      platform packages 1. Read release notes and related security patch
      information. 2. Download and install latest available Apache package and any
      dependent software. 3. Test the new software according to your organizations
      testing process. 4. Move to production according to your organizations
      deployment process. References: 1.
      http://httpd.apache.org/security/vulnerabilities_22.html 2. 1.7 Use SSL/TLS
      Recommendations in this section pertain to the configuration of SSL/TLS-
      related aspects of Apache HTTP server.
    references: >
      1. http://httpd.apache.org/security/vulnerabilities_22.html 2. 1.7 Use SSL/TLS
      Recommendations in this section pertain to the configuration of SSL/TLS-
      related aspects of Apache HTTP server.
