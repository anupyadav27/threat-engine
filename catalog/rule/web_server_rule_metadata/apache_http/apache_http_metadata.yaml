  - rule_id: apache_http.cis.1.disable_webdav_modules
    title: "Disable WebDAV Modules"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.2_v3.3.1"
    cis_version: "2.2_v3.3.1"
    cis_control: "1.2.3"
    cis_section: "1"
    profile_applicability: ""
    description: >
      The Apache mod_dav and mod_dav_fs modules support WebDAV ('Web- based
      Distributed Authoring and Versioning') functionality for Apache. WebDAV is an
      extension to the HTTP protocol which allows clients to create, move, and
      delete files and resources on the web server.
    rationale: >
      WebDAV is not widely used, and has serious security concerns as it may allow
      clients to modify unauthorized files on the web server. Therefore the WebDav
      modules mod_dav, and mod_dav_fs should be disabled.
    audit_procedure: >
      Perform the following to determine if the WebDAV modules are enabled. 1. Run
      the httpd server with the -M option to list enabled modules: # httpd -M | grep
      ' dav_[[:print:]]+module' Note: If the WebDav modules are correctly disabled,
      the only output should be 'Syntax OK' when executing the above command.
    remediation: >
      Perform either one of the following to disable WebDAV module: 1. For source
      builds with static modules run the Apache ./configure script without including
      the mod_dav, and mod_dav_fs in the --enable-modules=configure script options.
      $ cd $DOWNLOAD/httpd-2.2.22 $ ./configure 2. For dynamically loaded modules
      comment out or remove the LoadModule directive for mod_dav, and mod_dav_fs
      modules the from the httpd.conf file. ##LoadModule dav_module
      modules/mod_dav.so ##LoadModule dav_fs_module modules/mod_dav_fs.so 17 | P a g
      e References: 1. http://httpd.apache.org/docs/2.2/mod/mod_dav.html
    references: >
      1. http://httpd.apache.org/docs/2.2/mod/mod_dav.html
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_APACHE_HTTP_2_2_v3_3_1_1_2_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_apache_http_2_2_v3_3_1_1_2_3"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: apache_http.cis.1.disable_status_module
    title: "Disable Status Module"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.2_v3.3.1"
    cis_version: "2.2_v3.3.1"
    cis_control: "1.2.4"
    cis_section: "1"
    profile_applicability: ""
    description: >
      The Apache mod_status module provides current server performance statistics.
    rationale: >
      While having server performance status information available as a web page may
      be convenient, it's recommended that this module be disabled: When mod_status
      is loaded into the server, its handler capability is available in all
      configuration files, including per- directory files (e.g., .htaccess) and may
      have security- related ramifications.
    audit_procedure: >
      Perform the following to determine if the Status module is enabled. 1. Run the
      httpd server with the -M option to list enabled modules: # httpd -M | egrep
      'status_module' Note: If the modules are correctly disabled, the only output
      should be 'Syntax OK' when executing the above command.
    remediation: >
      Perform either one of the following to disable the mod_status module: 1. For
      source builds with static modules run the Apache ./configure script with the
      -- disable-status configure script options. $ cd $DOWNLOAD/httpd-2.2.22 $
      ./configure --disable-status 2. For dynamically loaded modules comment out or
      remove the LoadModule directive for the mod_status module from the httpd.conf
      file. 18 | P a g e ##LoadModule status_module modules/mod_status.so
      References: 1. http://httpd.apache.org/docs/2.2/mod/mod_status.html
    references: >
      1. http://httpd.apache.org/docs/2.2/mod/mod_status.html
