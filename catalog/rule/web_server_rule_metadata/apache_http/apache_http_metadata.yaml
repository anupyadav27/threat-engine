  - rule_id: apache_http.cis.1.disable_the_tls_v1_0_protocol_published
    title: "Disable the TLS v1.0 Protocol Published"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.2_v3.3.0"
    cis_version: "2.2_v3.3.0"
    cis_control: "1.7.8"
    cis_section: "1"
    profile_applicability: ""
    description: >
      The TLSv1.0 protocol should be disabled via the SSLProtocol directive, if
      possible, as it has been shown to be vulnerable to information disclosure.
    rationale: >
      The TLSv1.0 protocol is vulnerable to the BEAST attack when used in CBC mode
      (October 2011). Unfortunately the TLSv1.0 uses CBC modes for all of the block
      mode ciphers, which only leaves the RC4 streaming cipher. The RC4 cipher is
      not vulnerable to the BEAST attack; however there is research that indicates
      it is also weak and is not recommended. Therefore it is recommended that the
      TLSv1.0 protocol be disabled if all TLS clients support the newer TLS
      protocols. All major up-to-date browsers support TLSv1.1 and TLSv1.2; however,
      some IE browsers may still have TLSv1.1 and TLSv1.2 disabled for some strange
      reason. Review the Wikipedia reference for browser support details. Ensuring
      that all user's browsers are configured to allow TLSv1.1 and TLS1.2 is
      necessary before disabling TLSv1.0 on the Apache web server; therefore this
      recommendation is a level 2 rather than a level 1. Some organizations may find
      it helpful to implement a phased transitional plan where TLS1.0 is not
      disabled, but the web server will detect browsers which do not have TLS1.1 or
      newer enabled and redirect them to a web site that explains how to enabled the
      newer TLS protocols. The redirect can be implemented using the mod_rewrite
      which can detect the protocol used, and rewrite the URL to the helpful
      website.
    audit_procedure: >
      Perform the following steps to determine if the recommended state is
      implemented: Search the Apache configuration files for the SSLProtocol
      directive and ensure it has the value of “TLSv1.1 TLS1.2”.
    remediation: >
      Perform the following to implement the recommended state: Search the Apache
      configuration files for the SSLProtocol directive; add the directive if not
      present, or change the value to “TLSv1.1 TLS1.2”. Default Value: The default
      value is: SSLProtocol all -SSLv2 80 | P a g e References: 1.
      http://en.wikipedia.org/wiki/Transport_Layer_Security#Web_browsers- Browser
      support and defaults for SSL/TLS protocols 2.
      https://community.qualys.com/blogs/securitylabs/2013/09/10/is-beast-still-a-
      threat
    references: >
      1. http://en.wikipedia.org/wiki/Transport_Layer_Security#Web_browsers- Browser
      support and defaults for SSL/TLS protocols 2.
      https://community.qualys.com/blogs/securitylabs/2013/09/10/is-beast-still-a-
      threat
    impact: >
      
