  - rule_id: apache_http.cis.5.default_cgi_content_printenv_script_is_removed
    title: "Ensure the Default CGI Content printenv Script Is Removed"
    severity: high
    category: web_server
    tech_type: apache_http
    automation_type: automated
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "5.5"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      Most Web Servers, including Apache installations have default CGI content
      which is not needed or appropriate for production use. The primary function
      for these sample programs is to demonstrate the capabilities of the web
      server. One common default CGI content for Apache installations is the script
      printenv. This script will print back to the requester all of the CGI
      environment variables which includes many server configuration details and
      system paths.
    rationale: >
      CGI programs have a long history of security bugs and problems associated with
      improperly accepting user-input. Since these programs are often targets of
      attackers, we need to make sure that there are no unnecessary CGI programs
      that could potentially be used for malicious purposes. Usually these programs
      are not written for production use and consequently little thought was given
      to security in their development. The printenv script in particular will
      disclose inappropriate information about the web server including directory
      paths and detailed version and configuration information.
    audit_procedure: >
      Perform the following to determine if the recommended state is implemented: 1.
      Locate cgi-bin files and directories enabled in the Apache configuration via
      Script, ScriptAlias or ScriptAliasMatch or ScriptInterpreterSource directives.
      2. Ensure the printenv CGI is not installed in any configured cgi-bin
      directory.
    remediation: >
      Perform the following to implement the recommended state: 1. Locate cgi-bin
      files and directories enabled in the Apache configuration via Script,
      ScriptAlias, ScriptAliasMatch, or ScriptInterpreterSource directives. 2.
      Remove the printenvdefault CGI in cgi-bin directory if it is installed. # rm
      $APACHE_PREFIX/cgi-bin/printenv Default Value: The default source installation
      includes the printenv script. However, this script is not executable by
      default.
