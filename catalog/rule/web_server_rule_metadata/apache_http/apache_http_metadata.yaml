  - rule_id: apache_http.cis.1.secure_the_scoreboard_file
    title: "Secure the ScoreBoard File"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.2_v3.3.1"
    cis_version: "2.2_v3.3.1"
    cis_control: "1.3.10"
    cis_section: "1"
    profile_applicability: ""
    description: >
      The ScoreBoardFile directive sets a file path which the server will use for
      inter- process communication (IPC) among the Apache processes. On most Linux
      platforms shared memory will be used instead of a file in the file system, so
      this directive is not generally needed and does not need to be specified.
      However, if the directive is specified, then Apache will use the configured
      file for the inter- process communication. Therefore if it is specified it
      needs to be located in a secure directory.
    rationale: >
      If the ScoreBoardFile is placed in a writable directory, other accounts could
      create a denial of service attack and prevent the server from starting by
      creating a file with the same name, and or users could monitor and disrupt the
      communication between the processes by reading and writing to the file. 32 | P
      a g e
    audit_procedure: >
      1. Check to see if the ScoreBoardFile is specified in any of the Apache
      configuration files. If it is not present the configuration is compliant. 2.
      Find the directory in which the ScoreBoardFile would be created. The default
      value is the ServerRoot/logs directory. 3. Verify that the scoreboard file
      directory is not a directory within the Apache DocumentRoot 4. Verify that the
      ownership and group of the directory is root:root (or the user under which
      Apache initially starts up if not root). 5. Change the permissions so that the
      directory is only writable by root (or the startup user if not root). 6. Check
      that the scoreboard file directory is on a locally mounted hard drive rather
      than an NFS mounted file system.
    remediation: >
      1. Check to see if the ScoreBoardFile is specified in any of the Apache
      configuration files. If it is not present no changes are required. 2. If the
      directive is present, find the directory in which the ScoreBoardFile would be
      created. The default value is the ServerRoot/logs directory. 3. Modify the
      directory if the ScoreBoardFile is in a directory within the Apache
      DocumentRoot 4. Change the ownership and group to be root:root, if not
      already. 5. Change the permissions so that the directory is only writable by
      root, or the user under which apache initially starts up (default is root), 6.
      Check that the scoreboard file directory is on a locally mounted hard drive
      rather than an NFS mounted file system. References: 1.
      http://httpd.apache.org/docs/2.2/mod/mpm_common.html#scoreboardfile
    references: >
      1. http://httpd.apache.org/docs/2.2/mod/mpm_common.html#scoreboardfile
