  - rule_id: apache_http.cis.1.ssl_compression_is_not_enabled
    title: "Ensure SSL Compression is Not Enabled"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.2_v3.3.1"
    cis_version: "2.2_v3.3.1"
    cis_control: "1.7.7"
    cis_section: "1"
    profile_applicability: ""
    description: >
      The SSLCompression directive controls whether SSL compression is used by
      Apache when serving content over HTTPS. It is recommended that the
      SSLCompression directive be set to off.
    rationale: >
      if SSL compression is enabled, HTTPS communication between the client and the
      server may be at increased risk to the CRIME attack. The CRIME attack
      increases a malicious actor's ability to derive the value of a session cookie,
      which commonly contains an authenticator. If the authenticator in a session
      cookie is derived, it can be used to impersonate the account associated with
      the authenticator.
    audit_procedure: >
      For Apache 2.2.26 and later, perform the following steps to determine if the
      recommended state is implemented: 78 | P a g e 1. Search the Apache
      configuration files for the SSLCompression directive. 2. Verify that the
      directive either does not exist or exists and is set to off. For Apache 2.2.24
      and 2.2.25 perform the following steps to determine if the recommended state
      is implemented: 1. Search the Apache configuration files for the
      SSLCompression directive. 2. Verify that the directive exists and is set to
      off. (The default value is on) Apache versions prior to 2.2.24 do not support
      disabling SSL compression and are not compliant.
    remediation: >
      Perform the following to implement the recommended state: 1. Verify the Apache
      version is 2.2.24 or later, with the command ' httpd -v'. 2. Search the Apache
      configuration files for the SSLCompression directive. 3. Add or update the
      directive to have a value of off. Default Value: The SSLCompression directive
      was available in httpd 2.2.24 and later, if using OpenSSL 0.9.8 or later;
      virtual host scope is available if using OpenSSL 1.0.0 or later. The default
      used to be ON in versions 2.2.24 to 2.2.25, and is OFF for 2.2.26 and later.
      References: 1.
      http://httpd.apache.org/docs/2.2/mod/mod_ssl.html#sslcompression 2.
      http://en.wikipedia.org/wiki/CRIME_(security_exploit)
    references: >
