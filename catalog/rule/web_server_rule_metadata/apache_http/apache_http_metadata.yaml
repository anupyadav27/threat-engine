  - rule_id: apache_http.cis.2.proxy_modules_are_disabled_if_not_in_use
    title: "Ensure the Proxy Modules Are Disabled if not in use"
    severity: high
    category: web_server
    tech_type: apache_http
    automation_type: automated
    cis_benchmark: "CIS_APACHE_HTTP 2.4_v2.2.0"
    cis_version: "2.4_v2.2.0"
    cis_control: "2.6"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The Apache proxy modules allow the server to act as a proxy (either forward or
      reverse proxy) of HTTP and other protocols with additional proxy modules
      loaded. If the Apache installation is not intended to proxy requests to or
      from another network then the proxy module should not be loaded.
    rationale: >
      Proxy servers can act as an important security control when properly
      configured, however a secure proxy server is not within the scope of this
      benchmark. A web server should be primarily a web server or a proxy server but
      not both, for the same reasons that other multi-use servers are not
      recommended. Scanning for web servers that will also proxy requests is a very
      common attack, as proxy servers are useful for anonymizing attacks on other
      servers, or possibly proxying requests into an otherwise protected network.
    audit_procedure: >
      Perform the following to determine if the modules are enabled. Run the httpd
      server with the -M option to list enabled modules: # httpd -M | grep proxy_
      Note : If the modules are correctly disabled, there will be no output when
      executing the above command.
    remediation: >
      Perform either one of the following to disable the proxy module: 1. For source
      builds with static modules, run the Apache ./configure script without
      including the mod_proxy in the --enable-modules=configure script options. $ cd
      $DOWNLOAD_HTTPD $ ./configure 2. For dynamically loaded modules, comment out
      or remove the LoadModule directive for mod_proxy module and all other proxy
      modules from the httpd.conf file. ##LoadModule proxy_module
      modules/mod_proxy.so ##LoadModule proxy_connect_module
      modules/mod_proxy_connect.so ##LoadModule proxy_ftp_module
      modules/mod_proxy_ftp.so ##LoadModule proxy_http_module
      modules/mod_proxy_http.so ##LoadModule proxy_fcgi_module
      modules/mod_proxy_fcgi.so ##LoadModule proxy_scgi_module
      modules/mod_proxy_scgi.so ##LoadModule proxy_ajp_module
      modules/mod_proxy_ajp.so ##LoadModule proxy_balancer_module
      modules/mod_proxy_balancer.so ##LoadModule proxy_express_module
      modules/mod_proxy_express.so ##LoadModule proxy_wstunnel_module
      modules/mod_proxy_wstunnel.so ##LoadModule proxy_fdpass_module
      modules/mod_proxy_fdpass.so Default Value: The mod_proxy module and other
      proxy modules are NOT enabled with a default source build. References: 1.
      https://httpd.apache.org/docs/2.4/mod/mod_proxy.html
    references: >
      1. https://httpd.apache.org/docs/2.4/mod/mod_proxy.html
    impact: >
      
