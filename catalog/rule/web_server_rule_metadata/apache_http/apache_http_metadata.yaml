  - rule_id: apache_http.cis.1.set_timeout_limits_for_the_request_body
    title: "Set Timeout Limits for the Request Body"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.2_v3.3.1"
    cis_version: "2.2_v3.3.1"
    cis_control: "1.9.6"
    cis_section: "1"
    profile_applicability: ""
    description: >
      The RequestReadTimeout directive also allows setting timeout values for the
      body portion of a request. The directive provides for an initial timeout
      value, and a maximum timeout and minimum rate. The minimum rate specifies that
      after the initial timeout, the server will wait an additional 1 second for
      each N bytes received. The recommended setting is to have a maximum timeout of
      20 seconds or less. The default value is body=20,MinRate=500.
    rationale: >
      It is not sufficient to timeout only on the header portion of the request, as
      the server will still be vulnerable to attacks like the OWASP Slow POST
      attack, which provide the body of the request very slowly. Therefore the body
      portion of the request must have a timeout as well. A timeout of 20 seconds or
      less is recommended.
    audit_procedure: >
      Perform the following to determine if the recommended state is implemented:
      Locate the Apache configuration files and included configuration files. Locate
      any RequestReadTimeout directives and verify the configuration has a maximum
      body request timeout of 20 seconds or less. If the configuration does not
      contain any RequestReadTimeout directives, and the mod_reqtimeout module is
      being loaded, then the default value of 20 seconds is compliant with the
      benchmark recommendation. 92 | P a g e RequestReadTimeout header=XXXXXX
      body=20,MinRate=XXXXXXXXXX
    remediation: >
      Load the mod_requesttimeout module in the Apache configuration with the
      following configuration. LoadModule reqtimeout_module
      modules/mod_reqtimeout.so Add a RequestReadTimeout directive similar to the
      one below with the maximum request body timeout value of 20 seconds or less.
      RequestReadTimeout header=20-40,MinRate=500 body=20,MinRate=500 Default Value:
      The default value is: body=20,MinRate=500 References: 1.
      http://httpd.apache.org/docs/2.2/mod/mod_reqtimeout.html 1.10 Request Limits
      Recommendations in this section reduce the maximum allowed size of request
      parameters. Doing so increases the likelihood of negatively impacting
