  - rule_id: apache_http.cis.1.protect_the_servers_private_key
    title: "Protect the Servers Private Key"
    severity: medium
    category: web_server
    tech_type: apache_http
    automation_type: manual
    cis_benchmark: "CIS_APACHE_HTTP 2.2_v3.3.1"
    cis_version: "2.2_v3.3.1"
    cis_control: "1.7.3"
    cis_section: "1"
    profile_applicability: ""
    description: >
      It is critical to protect the server's private key. The server private key is
      be encrypted by default as a means of protecting it, however having it
      encrypted means that the passphrase is required each time the server is
      started up, and now it is necessary to protect the passphrase as well. The
      passphrase may be typed in when it is manually started up, or provided by an
      automated program. See
      http://httpd.apache.org/docs/2.2/mod/mod_ssl.html#sslpassphrasedialog for
      details. To summarize the options are: 1. Use SSLPassPhraseDialog builtin, -
      Requires a passphrase to be manually entered. 2. Use SSLPassPhraseDialog
      |/path/to/program to provide the passphrase. 3. Use SSLPassPhraseDialog
      exec:/path/to/program to provide the passphrase, 4. Store the private key in
      clear text so that a passphrase is not required. Any of the above options 1- 4
      are acceptable as long as the key and passphrase are protected as described
      below. Option 1 has the additional security benefit of not storing the
      passphrase, but is not generally acceptable for most production web servers,
      since it requires the web server to be manually started. Options 2 and 3 can
      provide additional security if the programs providing them are secure. Option
      4 is the simplest, is widely used and is acceptable as long as the private key
      is appropriately protected. 72 | P a g e
    rationale: >
      If the private key were to be disclosed, it could be used to decrypt all of
      the SSL communications with the web server, and could also be used to
      impersonate the web server.
    audit_procedure: >
      Perform the following steps to determine if the recommended state is
      implemented: 1. For each certificate file referenced in the Apache
      configuration files with the SSLCertificateFile directive, examine the file
      for a private key, clearly identified by the string 'PRIVATE KEY—--' 2. For
      each file referenced in the Apache configuration files with the
      SSLCertificateKeyFile directive, verify the ownership is root:root and the
      permission 0400.
    remediation: >
      Perform the following to implement the recommended state: 1. All private keys
      must be stored separately from the public certificates. Find all
      SSLCertificateFile directives in the Apache configuration files. For any
      SSLCertificateFile directives that do not have a corresponding separate
      SSLCertificateKeyFile directive, move the key to a separate file from the
      certificate, and add the SSLCertificateKeyFile directive for the key file. 2.
      For each the SSLCertificateKeyFile directive , change the ownership and
      permissions on the server private key to owned by root:root with permission
      0400. References: 1. http://httpd.apache.org/docs/2.2/mod/mod_ssl.html
    references: >
      1. http://httpd.apache.org/docs/2.2/mod/mod_ssl.html
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_APACHE_HTTP_2_2_v3_3_1_1_7_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_apache_http_2_2_v3_3_1_1_7_3"
