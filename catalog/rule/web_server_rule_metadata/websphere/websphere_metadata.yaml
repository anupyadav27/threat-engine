  - rule_id: websphere.cis.1.only_one_user_id_has_write_access_to_the
    title: "Ensure that only one user ID has write access to the WebSphere Liberty configuration files"
    severity: high
    category: web_server
    tech_type: websphere
    automation_type: manual
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "1.4"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Ensure that only one user ID has write access to the WebSphere Liberty
      configuration files. If there are multiple administrators, they can use sudo
      and the /etc/sudoers file to elevate their privilege when write access is
      required.
    rationale: >
      WebSphere Liberty server administrators sometimes need the ability to write to
      server configuration files, but following the principle of least privilege
      they should not operate with write access unless absolutely necessary.
      Administrators can use sudo and the /etc/sudoers to file to elevate their
      privilege when write access is needed, while operating with read access the
      rest of the time. Administrators should never share user IDs and passwords.
    audit_procedure: >
      Verify that all WebSphere administrators have been added to the group that
      owns the server's configuration directory, which will grant them read but not
      write access. Ensure that the user that owns the server's configuration
      directory is a non-login user. Use sudo and the /etc/sudoers file to grant the
      administrators the ability to elevate their privilege to the user that owns
      the server's configuration directory when write access is required.
    remediation: >
      Create a single, non-login, user ID that owns the server's configuration
      directory. Add any WebSphere administrators to the group that owns the
      server's configuration directory, which will automatically give them read
      access to the server's configuration, but not write access. Use sudo and the
      /etc/sudoers file to allow these administrators to elevate their privilege to
      the user ID that owns the server's configuration directory when write access
      is required.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_WEBSPHERE_liberty_v1_0_0_1_4"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_websphere_liberty_v1_0_0_1_4"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: websphere.cis.1.websphere_liberty_server_output_is_not_set_to_the
    title: "Ensure Websphere Liberty Server Output is not set to the default value"
    severity: high
    category: web_server
    tech_type: websphere
    automation_type: manual
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "1.5"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      The user ID that the WebSphere Liberty server process runs under should not
      have write access to its own configuration files. The WebSphere Liberty server
      process requires write access to certain runtime files such as temporary
      caches and logs, but those files can be written to a different location than
      the configuration files, and permissions can be set separately for those two
      locations.
    rationale: >
      Removing write access to a server's configuration files limits the damage that
      can be done by a theoretical attacker that is able to inject code to be run
      inside the WebSphere Liberty server process.
    audit_procedure: >
      Ensure the existence of the WLP_OUTPUT_DIR variable in the server.env file.
      This environment variable is used to specify an alternative location for
      server generated output such as logs, the workarea directory, and other
      generated files. The variable should point to an output directory that is
      different from the server's configuration directory. The user ID of the
      WebSphere Liberty server process should have write access to the output
      directory but only read access to the configuration directory. For more
      information about server.env please see here . WLP_OUTPUT_DIR=/<server-
      writeable directory>/ Confirm that the output directory exists and has write
      access granted to the WebSphere Liberty server process user ID: ls -l
      $WLP_OUTPUT_DIR | awk '{print $1, $3}' Confirm that the WebSphere Liberty
      server process user ID has read access to its configuration files: ls -l
      ${server.config.dir} | awk '{print $1, $3}'
    remediation: >
      Create the server.env file if it does not exist. For more information about
      server.env please see here . Define WLP_OUTPUT_DIR in the server.env file:
      WLP_OUTPUT_DIR=/<server-writeable directory>/ Ensure that the WebSphere
      Liberty server process user ID has write access to the WLP_OUTPUT_DIR
      directory. Ensure that the WebSphere Liberty server process user ID does not
      have write access to the ${server.config.dir} directory.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_WEBSPHERE_liberty_v1_0_0_1_5"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_websphere_liberty_v1_0_0_1_5"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: websphere.cis.1.automated_configuration_updates_are_disabled
    title: "Ensure automated configuration updates are disabled"
    severity: high
    category: web_server
    tech_type: websphere
    automation_type: automated
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "1.6"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      WebSphere Liberty provides the ability to automatically update the server
      runtime when the configuration changes, without requiring a server restart.
    rationale: >
      Automatic updates during runtime are very useful during development and test
      phases. Configuration updates must be carefully controlled in production
      environments to reduce the possibility that unknown changes or vulnerabilities
      are deployed to users.
    audit_procedure: >
      Ensure the updateTrigger attribute on the config element controls in the
      Liberty configuration is set to a value other than polled. grep -w -R -i
      'updateTrigger' ${server.config.dir}
    remediation: >
      Add the updateTrigger attribute to the config element in
      ${server.config.dir}/configDropins/overrides/*.xmland set to mbean or
      disabled. <config updateTrigger='mbean' /> Default Value: Liberty enables
      dynamic configuration updates by default. The default settings for
      configuration monitoring are as follows: <config updateTrigger='polled'
      monitorInterval='500ms'/> References: 1.
      https://openliberty.io/docs/latest/reference/config/server-configuration-
      overview.html#_dynamic_updates 2. https://www.ibm.com/docs/en/was-
      liberty/base?topic=SSEQTP_liberty/com.ibm.websphere.wlp.zseries.doc/ae/twlp_
      setup_dyn_upd.html 3.
      https://openliberty.io/docs/latest/reference/config/config.html
    references: >
      1. https://openliberty.io/docs/latest/reference/config/server-configuration-
      overview.html#_dynamic_updates 2. https://www.ibm.com/docs/en/was-
      liberty/base?topic=SSEQTP_liberty/com.ibm.websphere.wlp.zseries.doc/ae/twlp_
      setup_dyn_upd.html 3.
      https://openliberty.io/docs/latest/reference/config/config.html
