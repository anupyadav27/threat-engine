  - rule_id: websphere.cis.4.disableisschecking_issuer_claim_is_set_to_false
    title: "Ensure 'disableIssChecking' issuer claim is set to 'false' in the RP (Relying Party)"
    severity: high
    category: web_server
    tech_type: websphere
    automation_type: automated
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "4.3.4"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      The issuer claim in the JWT token is used by the RP (relying party) to verify
      the OP (OIDC provider) token issuer.
    rationale: >
      The issuer claim in a JSON Web Token (JWT) should be required and validated by
      the OpenID Connect relying party. This helps to ensure the authenticity of the
      JWT by matching the issuer claim to the name attribute or the redirect
      attribute of the client configuration in the OpenID Connect server provider.
    audit_procedure: >
      Ensure the existence of the disableIssChecking attribute and that it is set to
      false in the disableIssChecking element in the Liberty configuration: grep -w
      -R -i 'disableIssChecking' ${server.config.dir}
    remediation: >
      Add the disableIssChecking attribute to the openidConnectClient element to
      ${server.config.dir}/configDropins/overrides/*.xml. Set the disableIssChecking
      attribute value to false to ensure that issuer claim checking for JSON Web
      Tokens occurs. <openidConnectClient disableIssChecking='false' /> Default
      Value: The disableIssChecking attribute is set to false by default.
      References: 1.
      https://openliberty.io/docs/latest/reference/config/openidConnectClient.html
    references: >
      1.
      https://openliberty.io/docs/latest/reference/config/openidConnectClient.html
