  - rule_id: websphere.cis.9.safkeyringhw_is_set_to_use_a_hardware_crypto_card
    title: "Ensure 'safkeyringhw:' is set to use a hardware crypto card"
    severity: medium
    category: web_server
    tech_type: websphere
    automation_type: manual
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "9.3"
    cis_section: "9"
    profile_applicability: "Level 2"
    description: >
      Use hardware crypto card to store to store cryptographic keys and
      certificates.
    rationale: >
      Using hardware crypto card to store and load cryptographic keys and
      certificates. Using hardware crypto cards can provide additional security
      guards against theft. The keys and certificates are used during cryptographic
      functions like encryption/decryption and also during the SSL/TLS
      communication.
    audit_procedure: >
      Hardware crypto cards are external devices that can store certificates that
      can be used for the SSL/TLS communications. They store and protect the
      cryptographic keys throughout their lifecycles. The use of these devices have
      to be weighed against the security requirements and the additional expenses
      this would entail. There are two ways a hardware crypto card can be used. One
      can configure to use the keys contained in only the hardware crypto card or
      configure a hybrid provider that can handle keys in both the crypto card as
      well as in the software. When using just the hardware crypto card, ensure that
      safkeyringhw: is set correctly in the location attribute of the keyStore
      elements of the SSL configurations. In addition, make sure that type attribute
      is set to JCECCARACFKS in the Liberty configuration . grep -i -R
      'safkeyringhw:' ${server.config.dir} grep -i -w -R 'type' ${server.config.dir}
      Also make sure that the com.ibm.crypto.hdwrCCA.provider.IBMJCECCA provider is
      listed in the $JAVA_HOME/jre/lib/security/java.security file. grep -w -R
      'com.ibm.crypto.hdwrCCA.provider.IBMJCECCA' ${JAVA_HOME} When using the hybrid
      provider, ensure that safkeyringhybrid: is set correctly in the location
      attribute of the keyStore elements of the SSL configurations. In addition,
      make sure that type attribute is set to JCEHYBRIDRACFKS in the Liberty
      configuration . grep -i -R 'safkeyringhybrid:' ${server.config.dir} grep -i -w
      -R 'type' ${server.config.dir} Also make sure that both the
      com.ibm.crypto.ibmjcehybrid.provider.IBMJCEHYBRID and the
      com.ibm.crypto.hdwrCCA.provider.IBMJCECCA providers are listed in the
      $JAVA_HOME/jre/lib/security/java.security file. grep -w -R
      'com.ibm.crypto.ibmjcehybrid.provider.IBMJCEHYBRID' ${JAVA_HOME} grep -w -R
      'com.ibm.crypto.hdwrCCA.provider.IBMJCECCA' ${JAVA_HOME}
    remediation: >
      For the crypto card configuration, configure the location attribute in the
      keyStore elements referenced by the SSL configurations to point to a valid
      hardware crypto keyring configuration and set the type attribute to
      JCECCARACFKS in ${server.config.dir}/configDropins/overrides/<any file
      name>.xml. <keyStore id='defaultKeyStore'
      location='safkeyringhw:///myHWKeyring' type='JCECCARACFKS' ... /> In addition,
      make sure that the com.ibm.crypto.hdwrCCA.provider.IBMJCECCA provider is
      configured in the $JAVA_HOME/jre/lib/security/java.security file. ...
      security.provider.3=com.ibm.crypto.hdwrCCA.provider.IBMJCECCA ... For the
      hybrid crypto card configuration, configure the location attribute in the
      keyStore elements referenced by the SSL configurations to point to a valid
      hybrid hardware crypto keyring configuration and set the type attribute to
      JCEHYBRIDRACFKS in ${server.config.dir}/configDropins/overrides/<any file
      name>.xml. <keyStore id='defaultKeyStore'
      location='safkeyringhybrid:///myHybridKeyring' type='JCEHYBRIDRACFKS' .../> In
      addition, configure the com.ibm.crypto.ibmjcehybrid.provider.IBMJCEHYBRID and
      the com.ibm.crypto.hdwrCCA.provider.IBMJCECCA providers in the
      $JAVA_HOME/jre/lib/security/java.security file. ...
      security.provider.2=com.ibm.crypto.ibmjcehybrid.provider.IBMJCEHYBRID
      security.provider.3=com.ibm.crypto.hdwrCCA.provider.IBMJCECCA ... References:
      1. https://www.ibm.com/support/pages/enabling-hardware-cryptography-liberty-
      zos 2. https://www.ibm.com/docs/en/was-liberty/zos?topic=liberty-enabling-jce-
      hybrid- provider
    references: >
      1. https://www.ibm.com/support/pages/enabling-hardware-cryptography-liberty-
      zos 2. https://www.ibm.com/docs/en/was-liberty/zos?topic=liberty-enabling-jce-
      hybrid- provider
    impact: >
      
