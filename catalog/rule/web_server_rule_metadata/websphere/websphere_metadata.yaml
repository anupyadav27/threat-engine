  - rule_id: websphere.cis.10.passwords_are_encrypted
    title: "Ensure Passwords are Encrypted"
    severity: high
    category: web_server
    tech_type: websphere
    automation_type: automated
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "10.2"
    cis_section: "10"
    profile_applicability: "Level 1"
    description: >
      Sensitive information is stored in the Liberty configuration and can be in
      clear text unless encrypted or hashed.
    rationale: >
      Passwords should be encrypted or hashed to avoid inappropriate access to user
      accounts or using the passwords for unauthorized logins to remote systems such
      as databases or LDAP servers. Password information should also be kept in
      separate files with limited access to avoid unauthorized access or changes to
      configurations. The password encryption key also needs to be customized or a
      default key is used to encrypt passwords.
    audit_procedure: >
      Review the passwords in the Liberty configuration and the
      ${wlp.user.dir}/clients/<Client Name>/client.xml files. Check the values on
      any password related attributes that are defined as Reversably encoded
      password (string) type. Some examples of password related attributes include
      password, bindPassword, secret, keyStoreSecret, etc. All values should be
      obscured using encryption or hashing. Some example greps to check for
      attributes containing password or secret in the name. grep -R -i 'password'
      ${server.config.dir} grep -R -i 'secret' ${server.config.dir} Also check for
      the wlp.password.encryption.key property that is used for encrypting and
      decrypting and where it is located. The wlp.password.encryption.key property
      should be set to a custom value and stored in a separate file. grep -R -i
      'wlp.password.encryption.key' ${server.config.dir} If the
      wlp.password.encryption.key property is in a standalone file, review the
      permissions for accessing the file. ls -al <keyFileName.xml>
    remediation: >
      Use the Liberty provided securityUtility tool to encrypt the password. To
      encrypt a password with Advanced Encryption Standard (AES) encryption:
      securityUtility encode --encoding=aes --key=myKey passW0rd returns:
      {aes}AE/PrLc9wshAKURioFvxb41SrVbsWjZTZ8lv72ioH3yMlJN4RQj3A9aT3ev396oYRw==
      Replace the clear text password in the Liberty configuration with the
      encrypted password created by the securityUtility tool. In this example, the
      encrypted password
      {aes}AE/PrLc9wshAKURioFvxb41SrVbsWjZTZ8lv72ioH3yMlJN4RQj3A9aT3ev396oYRw== was
      returned by the securityUtility and used to update the bindPassword attribute
      in the ldapRegistry element. <ldapRegistry ...
      bindPassword='{aes}AE/PrLc9wshAKURioFvxb41SrVbsWjZTZ8lv72ioH3yMlJN4RQj3A9aT3e
      v396oYRw==' </ldapRegistry> In WebSphere Liberty, the default key that is used
      for encrypting and decrypting can be overridden by setting the
      wlp.password.encryption.key property. Make sure that you do not set this
      property in main Liberty configuration. Otherwise, the file that contains the
      key might be included when you run the server dump or server package commands.
      Instead, set the wlp.password.encryption.key property in a separate
      configuration file and include it in the Liberty configuration, as shown in
      the following example: Create a file named key.xml: <server> <variable
      name='wlp.password.encryption.key' value='myKey' /> </server> Include it in
      the main Liberty configuration file. <server> ... <include
      location='/protected/key.xml' /> </server> Adjust the permissions on the
      key.xml to only users that need to access the file. In a test or development
      environment where a basic registry is used, the basic registry user passwords
      can be hashed to be stored in the Liberty configuration securityUtility encode
      --encoding=hash basicRegUserPassword Default Value: Passwords are not
      encrypted by default in the Liberty configuration. References: 1.
      https://openliberty.io/docs/latest/reference/command/securityUtility-
      encode.html 2.
      https://openliberty.io/docs/latest/reference/config/ldapRegistry.html
    references: >
      1. https://openliberty.io/docs/latest/reference/command/securityUtility-
      encode.html 2.
      https://openliberty.io/docs/latest/reference/config/ldapRegistry.html
    impact: >
      
