  - rule_id: websphere.cis.4.mutual_tls_authentication_is_enabled
    title: "Ensure mutual TLS authentication is enabled"
    severity: medium
    category: web_server
    tech_type: websphere
    automation_type: automated
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "4.2.10"
    cis_section: "4"
    profile_applicability: "Level 2"
    description: >
      Mutual TLS authentication requires that both the server and the client
      authenticate to the other during SSL/TLS handshake.
    rationale: >
      Mutual authentication, also known as two-way authentication, is certificate-
      based authentication for clients. Use of mutual TLS authentication whenever
      possible is recommended.
    audit_procedure: >
      Ensure the clientAuthentication attribute in the ssl element is set to true
      and the trustedHeaderOrigin attribute in httpDispatcher element is set to
      appropriate value in the Liberty configuration . grep -w -R
      'clientAuthentication' ${server.config.dir} grep -w -R 'trustedHeaderOrigin'
      ${server.config.dir}
    remediation: >
      Add these settings to ${server.config.dir}/configDropins/overrides/<any file
      name>.xml for direct login to WebSphere Liberty. <httpDispatcher ...
      trustedHeaderOrigin=“none”/> <ssl ... clientAuthentication='true' /> For login
      in conjunction with a proxy, add the following. Replace the ip addresses with
      your values. <httpDispatcher ... trustedHeaderOrigin=“10.20.30.40,
      10.20.50.60”/> <ssl ... clientAuthentication='true' /> References: 1.
      https://www.ibm.com/support/pages/how-setup-liberty-use-certificate-based-
      authentication
