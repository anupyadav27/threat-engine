      id='DefaultKeyStore' location='safkeyring:///Keyring.LIBERTY' type='JCERACFKS'
      fileBased='false' readOnly='true' /> <keyStore id='DefaultTrustStore'
      location='safkeyring:///Keyring.LIBERTY' type='JCERACFKS' fileBased='false'
      readOnly='true' /> References: 1. https://www.ibm.com/docs/en/was-
      liberty/base?topic=liberty-enabling-ssl- communication-in
