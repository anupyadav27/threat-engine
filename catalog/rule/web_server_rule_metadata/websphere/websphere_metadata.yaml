  - rule_id: websphere.cis.4.security_constraints_are_specified_to_protect_web
    title: "Ensure security constraints are specified to protect web applications"
    severity: high
    category: web_server
    tech_type: websphere
    automation_type: automated
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "4.4.12"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Protect web applications by configuring security constraints for all web
      resources using either deployment descriptor and/or annotations.
    rationale: >
      Specifying security constraints allows fine grained access control to
      protected resources. This can be done either using deployment descriptor
      and/or annotations.
    audit_procedure: >
      Ensure the <security-constraint> elements are specified in the web.xml file
      for each application. grep -w -R -i 'security-constraint' ${server.config.dir}
      Note: If using annotations, make sure that the appropriate methods are
      protected using the @ServletSecurity annotation.
    remediation: >
      Set <security-constraint> elements in the web.xml deployment descriptor file
      of each application or use annotations in the code. Example using security-
      constraint: <security-constraint> <web-resource-collection> <url-
      pattern>/*</url-pattern> </web-resource-collection> <auth-constraint> <role-
      name>testing</role-name> </auth-constraint> </security-constraint> Example
      using annotations: @WebServlet('/myServlet') @ServletSecurity(
      httpMethodConstraints = { @HttpMethodConstraint(value = 'GET', rolesAllowed =
      'user'), @HttpMethodConstraint(value = 'POST', rolesAllowed = 'manager',
      transportGuarantee = TransportGuarantee.CONFIDENTIAL), } ) public class
      myServlet extends HttpServlet { // servlet code... } References: 1.
      https://www.ibm.com/docs/en/was-liberty/base?topic=applications-getting-
      started-security-in-liberty
