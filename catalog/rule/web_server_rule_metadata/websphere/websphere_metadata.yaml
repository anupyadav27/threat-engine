      id='defaultOrb'> <serverPolicy.csiv2> <layers> <transportLayer
      sslEnabled='true'/> </layers> </serverPolicy.csiv2> </orb> Default Value: The
      default value of the sslEnabled attribute on csiv2 in the orb element is true.
