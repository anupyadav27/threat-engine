  - rule_id: websphere.cis.4.uncovered_http_methods_are_denied
    title: "Ensure uncovered http methods are denied"
    severity: high
    category: web_server
    tech_type: websphere
    automation_type: automated
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "4.4.17"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Servlets are secured by URL and each URL that is to be secured must be
      specified in the web.xml file describing the application.
    rationale: >
      A servlet can have multiple aliases and an application can have many servlets,
      making it easy to accidentally forget to secure an alias or URL for a servlet.
      If just one servlet URL is insecure, an intruder might be able to bypass
      security. Use wildcards to secure servlets wherever possible instead of
      specific URLs and configure the application to deny access to uncovered http
      methods. Impact: Open Liberty secures URLs and not the underlying classes, if
      just one servlet URL is insecure, an intruder might be able to bypass
      security.
    audit_procedure: >
      Review all of your web applications to ensure that each servlet has an alias
      associated with security constraints. Review each application’s web.xml file
      located in the application's ${wlp.user.dir}/shared/apps/<app_name>/WEB-INF/
      directory and determine if a deny- uncovered-http-methods element is set.
      Applications may also be in the ${server.config.dir}/dropins directory or a
      custom location. grep -w -R -i 'deny-uncovered-http-methods'
      ${wlp.user.dir}/shared/apps/<app_name>/WEB-INF/ Note: The security-constraints
      can also be set in the code using annotations like @ServletSecurity.
    remediation: >
      Create aliases for each servlet. Assign a security constraint for each URL
      defined in alias. Add additional security by adding <deny-uncovered-http-
      methods /> to WEB- INF/web.xml to block all undeclared methods. <servlet-
      mapping id='ServletMapping_1'> <servlet-name>MyServlet</servlet-name> <url-
      pattern>/MyURLPattern</url-pattern> </servlet-mapping> <deny-uncovered-http-
      methods /> <!-- SECURITY CONSTRAINTS --> <security-constraint
      id='SecurityConstraint_1'> <web-resource-collection
      id='WebResourceCollection_1'> <web-resource-name>Protected with Employee or
      Manager roles</web-resource-name> <url-pattern>/MyURLPattern</url-pattern>
      <http-method>GET</http-method> <http-method>POST</http-method> </web-resource-
      collection> <auth-constraint id='AuthConstraint_1'> <role-name>Employee</role-
      name> <role-name>Manager</role-name> </auth-constraint> </security-constraint>
      Note: The security constraints can also be set in the code using annotations
      like @ServletSecurity References: 1. https://www.ibm.com/docs/en/was-
      liberty/base?topic=applications-getting- started-security-in-liberty 2.
      https://openliberty.io/docs/latest/application-configuration-hardening.html
    references: >
      1. https://www.ibm.com/docs/en/was-liberty/base?topic=applications-getting-
      started-security-in-liberty 2. https://openliberty.io/docs/latest/application-
      configuration-hardening.html
    impact: >
      Open Liberty secures URLs and not the underlying classes, if just one servlet
      URL is insecure, an intruder might be able to bypass security.
    compliance_mappings:
      cis:
        - "CIS_WEBSPHERE_liberty_v1_0_0_4_4_17"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_websphere_liberty_v1_0_0_4_4_17"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: websphere.cis.4.disallowserveservletsbyclassname_is_disabled
    title: "Ensure 'disallowServeServletsByClassName' is 'disabled'"
    severity: high
    category: web_server
    tech_type: websphere
    automation_type: automated
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "4.4.18"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Servlets can be served by class name or via a normal URL alias.
    rationale: >
      Serving servlets by class name allows anyone that knows the class name of any
      servlet to invoke it directly which leads to a security exposure from possible
      misuse of the servlet.
    audit_procedure: >
      Ensure the disallowServeServletsByClassName attribute on the webContainer
      element in the Liberty configuration is set to true. grep -w -R -i
      'disallowServeServletsByClassName` ${server.config.dir} Serving servlets by
      class name can also be set on the enable-serving-servlets-by- class-name
      attributes in the web-ext element for individual webApplication elements. For
      legacy web applications, servlet serving by class name can also be set in the
      ibm- web-ext.xml or ibm-web-ext.xmi files in the application.
    remediation: >
      Add the disallowServeServletsByClassName attribute on the webContainer element
      in ${server.config.dir}/configDropins/overrides/*.xml and set it to true.
      <webContainer disallowServeServletsByClassName='true'/> If serving servlets by
      class name is set at the application level, update the webApplication elements
      or ibm-web-ext files. Default Value: WebSphere Liberty disables serving
      servlets by class name by default, disallowServeServletsByClassName is set to
      true. References: 1.
      https://openliberty.io/docs/latest/reference/config/webApplication.html#web-
      ext 2. https://openliberty.io/docs/latest/reference/config/webContainer.html
      3. https://openliberty.io/docs/latest/application-configuration-hardening.html
    references: >
      1.
      https://openliberty.io/docs/latest/reference/config/webApplication.html#web-
      ext 2. https://openliberty.io/docs/latest/reference/config/webContainer.html
      3. https://openliberty.io/docs/latest/application-configuration-hardening.html
