  - rule_id: websphere.cis.4.hsts_http_strict_transport_security_is_enabled
    title: "Ensure HSTS (HTTP Strict Transport Security) is enabled"
    severity: high
    category: web_server
    tech_type: websphere
    automation_type: automated
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "4.2.3"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      The HSTS response header informs browsers that the site should only be
      accessed using HTTPS, and that any future attempts to access it using HTTP
      should automatically be converted to HTTPS.
    rationale: >
      Enabling HSTS helps mitigate passive eavesdropper and active man-in-the-middle
      (MITM) attacks.
    audit_procedure: >
      Ensure the addstricttransportsecurityheader attribute is set in the
      webContainer element in the Liberty configuration grep -w -R -i
      'addstricttransportsecurityheader' ${server.config.dir} If it is not set in
      the Liberty configuration above, then check if it is set for individual apps
      in the web.xml files for each application. grep -w -R -i
      'ADD_STS_HEADER_WEBAPP' ${server.config.dir}
    remediation: >
      Set the addstricttransportsecurityheader attribute in the webContainer element
      in the ${server.config.dir}/configDropins/overrides/*.xml as follows:
      <webContainer addstricttransportsecurityheader='max-
      age=31536000;includeSubDomains' /> References: 1.
      https://www.ibm.com/docs/en/was-liberty/base?topic=slia-securing-liberty-by-
      using-http-strict-transport-security-hsts
    references: >
