  - rule_id: websphere.cis.4.constrained_delegation_is_configured_for_spnego
    title: "Ensure that constrained delegation is configured for SPNEGO (Simple and Protected GSSAPI Negotiation Mechanism)"
    severity: medium
    category: web_server
    tech_type: websphere
    automation_type: manual
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "4.3.2"
    cis_section: "4"
    profile_applicability: "Level 2"
    description: >
      SPNEGO authentication supports both constrained and unconstrained delegation.
      Constrained delegation provides the ability to specify and enforce application
      trust boundaries on a user's behalf by limiting the flow of the SPENGO tokens
      only to trusted servers.
    rationale: >
      Constrained delegation gives service administrators the ability to specify and
      enforce application trust boundaries by limiting the scope where application
      services can act on behalf of a user. Impact: Enabling constrained delegation
      requires additional configuration at the external KDC (Kerberos Distribution
      Center) server that is creating the SPNEGO token. The additional configuration
      depends on the KDC.
    audit_procedure: >
      If SPNEGO authentication is configured in the Liberty server make sure that
      the constrained delegation feature is also enabled in the Liberty
      configuration. grep -w -R -i 'spnego' ${server.config.dir} grep -w -R -i
      'constrainedDelegation' ${server.config.dir}
    remediation: >
      In ${server.config.dir}/configDropins/overrides/<any file name>.xml, add the
      constrainedDelegation-1.0 feature to the featureManager element:
      <feature>constrainedDelegation-1.0</feature> References: 1.
      https://openliberty.io/docs/latest/reference/feature/constrainedDelegation-
      1.0.html 2. https://www.ibm.com/docs/en/was-
      liberty/nd?topic=SSAW57_liberty/com.ibm.websphere.wlp.doc/ae/twlp_config_ke
      rb_constrained_del.html
    references: >
      1. https://openliberty.io/docs/latest/reference/feature/constrainedDelegation-
      1.0.html 2. https://www.ibm.com/docs/en/was-
      liberty/nd?topic=SSAW57_liberty/com.ibm.websphere.wlp.doc/ae/twlp_config_ke
      rb_constrained_del.html
    impact: >
      Enabling constrained delegation requires additional configuration at the
      external KDC (Kerberos Distribution Center) server that is creating the SPNEGO
      token. The additional configuration depends on the KDC.
    compliance_mappings:
      cis:
        - "CIS_WEBSPHERE_liberty_v1_0_0_4_3_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
