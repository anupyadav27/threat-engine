  - rule_id: websphere.cis.4.ca_certificate_authority_certificates_are_used
    title: "Ensure that CA (Certificate Authority) certificates are used"
    severity: high
    category: web_server
    tech_type: websphere
    automation_type: automated
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "4.2.8"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      SSL/TLS certificates are used to establish trust during the secure
      communications. Certificates can be a simple self-signed cert or can be from a
      well established or known CA authority.
    rationale: >
      Using trusted Certificate Authority (CA) signed certificates for TLS
      communications mitigates against using untrusted or revoked certificates and
      eliminates warning messages in the browser.
    audit_procedure: >
      Ensure that Owner and Issuer values are not the same, which typically implies
      that the certificate is not be self signed. Other information in the
      certificate can also confirm this. keytool -list -v -keystore <keystore file
      name> -storepass <store password> - storetype <store type> | grep
      'Owner\|Issuer'
    remediation: >
      Add non self signed CA certificates as described here.
