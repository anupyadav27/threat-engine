  - rule_id: websphere.cis.5.filters_are_configured_for_java_serialization_jep
    title: "Ensure filters are configured for Java serialization (JEP 290)"
    severity: high
    category: web_server
    tech_type: websphere
    automation_type: manual
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "5.3.1"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      Java provides configuration to allow incoming streams of object-serialization
      data to be filtered in order to improve both security and robustness. This
      allows
    rationale: >
      There have been issues with deserialization of untrusted data in Java. To
      mitigate this, openJDK provides a flexible mechanism using filters to restrict
      the classes that can be deserialized. In addition, it also provides metrics to
      control the filter size, depth etc. Impact: The filters to allow classes to be
      deserialized or deny classes to be serialized should be based on individual
      scenarios. They need to be done with care to mitigate any side impacts. More
      information in the links provided in the reference section.
    audit_procedure: >
      Check for the System property jdk.serialFilter in the
      ${server.config.dir}/bootstrap.properties file or the security property in
      $JAVA_HOME/conf/security/java,properties and confirm it has the correct
      filters set to restrict Java deserialization to the trusted classes.
