  - rule_id: websphere.cis.4.sp800_131a_recommendation_is_used_for_stronger
    title: "Ensure SP800-131a recommendation is used for stronger cryptographic keys and more robust algorithms."
    severity: medium
    category: web_server
    tech_type: websphere
    automation_type: manual
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "4.2.14"
    cis_section: "4"
    profile_applicability: "Level 2"
    description: >
      The National Institute of Standards and Technology (NIST) SP800-131a
      recommendation enforces stronger cryptographic keys and more robust
      algorithms.
    rationale: >
      The NIST recommendation (SP 800-131A) provides more specific guidance to the
      use of stronger cryptographic keys and more robust algorithms for SSL/TLS
      connections and is recommended to be used if it is appropriate for your
      environment.
    audit_procedure: >
      The SP800-131a recommendation can be enforced by setting the system property
      com.ibm.jsse2.sp800-131 to strict when using IBM JDK. For other JDKs, follow
      their specific instructions. Set com.ibm.jsse2.sp800-131=strict in the
      jvm.options file. More information on how to set the system properties
      provided in the reference section. grep -w -R -i
      'com.ibm.jsse2.sp800-131=strict' ${server.config.dir}
    remediation: >
      Configure the system property -Dcom.ibm.jsse2.sp800-131 to strict in the
      jvm.options file. The link in reference section provides more information on
      how to customize the Liberty environment with system properties. In the
      jvm.options file add the following -Dcom.ibm.jsse2.sp800-131=strict ...
      References: 1. https://www.ibm.com/docs/en/was-liberty/base?topic=liberty-
      setting-up-run-in- sp800-131a 2. https://www.ibm.com/docs/en/was-
      liberty/base?topic=manually-customizing- liberty-environment 3.
      https://www.ibm.com/support/pages/setting-generic-jvm-arguments-websphere-
      application-server-v85-liberty-profile
