rules:

  - rule_id: websphere.cis.1.root_does_not_have_ownership_of_websphere_liberty
    title: "Ensure root does not have ownership of Websphere Liberty binaries"
    severity: high
    category: web_server
    tech_type: websphere
    automation_type: manual
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "1.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Preventing the root user from owning files in the ${wlp.install.dir} directory
      prevents unauthorized commands or files from being run.
    rationale: >
      When directories or files are owned by the root user, administration of those
      files requires a user to log in as root or elevate their existing login to
      have root privileges. Performing operations as the root user could result in
      unauthorized commands that could alter files beyond the scope of WebSphere
      Liberty itself.
    audit_procedure: >
      Check to ensure that no files or directories underneath ${wlp.install.dir} are
      owned by the root user or root group: ls -l -R ${wlp.install.dir} | awk
      '{print $3, $4}' Expected result: You should not see the root user or root
      group referenced in the output.
    remediation: >
      Set the ownership and group of ${wlp.install.dir} to something other than
      root: chown -R <non-root user>:<non-root group> ${wlp.install.dir}
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_WEBSPHERE_liberty_v1_0_0_1_1"
      nist_800_53: []
