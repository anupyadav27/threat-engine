  - rule_id: websphere.cis.4.default_error_page_is_set_for_web_applications
    title: "Ensure 'default-error-page' is set for web applications"
    severity: high
    category: web_server
    tech_type: websphere
    automation_type: manual
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "4.4.21"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      When errors occur in a Web application or before the application dispatch, an
      error message is displayed to the user. By default, the app server displays an
      exception stack dump of the error. A default error handler or page should be
      defined for all applications.
    rationale: >
      Without a default error page, displaying the exception stack may reveal
      information about the application. For example, the names of classes and
      methods that are in the stack information. The exception message text is also
      displayed which could contain sensitive information.
    audit_procedure: >
      Ensure that the default-error-page attribute is set to an error page in the
      web-ext element of all of the webApplication elements in the Liberty
      configuration. grep -w -R -i 'default-error-page' ${server.config.dir} The
      default error page can also be set in the web.xml file in the application. For
      legacy web applications, the default error page can also be set in the ibm-
      web- ext.xml or ibm-web-ext.xmi files in the application.
    remediation: >
      Add the default-error-page attribute on the web-ext element for all
      webApplication elements in ${server.config.dir}/configDropins/overrides/*.xml
      and set it to a valid error page. <webApplication ... > <web-ext default-
      error-page='errorPageName.jsp'/> Default Value: WebSphere Liberty does not
      provide a default error page for web applications. References: 1.
      https://openliberty.io/docs/latest/reference/config/webApplication.html#web-
      ext
    references: >
      1.
      https://openliberty.io/docs/latest/reference/config/webApplication.html#web-
      ext
    impact: >
      
