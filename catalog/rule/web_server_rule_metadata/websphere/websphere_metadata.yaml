  - rule_id: websphere.cis.4.hostnameverificationenabled_is_set_to_true_in
    title: "Ensure 'hostNameVerificationEnabled' is set to 'true' in OIDC Relying Party (RP)"
    severity: high
    category: web_server
    tech_type: websphere
    automation_type: automated
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "4.3.5"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Hostname verification is a server identity check that is used to ensure that a
      client is talking to the correct server. The check is performed on the client
      side of an SSL communication and involves looking at the server’s certificate
      Subject Alternative Name (or the SubjectDN) to see if it matches the host part
      of the URL that was used to make the outbound request.
    rationale: >
      Hostname verification verifies the request is talking to the correct server
      and has not been redirected to an unknown server thus mitigating man-in-the-
      middle security vulnerability attacks.
    audit_procedure: >
      Ensure the existence of the hostNameVerificationEnabled attribute set to true
      in the openidConnectClient element in the Liberty configuration: grep -w -R -i
      'hostNameVerificationEnabled' ${server.config.dir}
    remediation: >
      Add the hostNameVerificationEnabled attribute to the openidConnectClient
      element to ${server.config.dir}/configDropins/overrides/*.xml and set it to
      true to do hostname verification for JSON Web Tokens. <openidConnectClient
      hostNameVerificationEnabled='true' /> Default Value: The WebSphere Liberty
      hostname verification for an OpenID Connect relying party is disabled by
      default, hostNameVerificationEnabled is set to false. References: 1.
      https://openliberty.io/docs/latest/reference/config/openidConnectClient.html
    references: >
