  - rule_id: websphere.cis.6.http_conduit_tlsclientparameters_disablecncheck
    title: "Ensure 'http.conduit.tlsClientParameters.disableCNCheck' is set to 'false' to enable hostname verification for JAX-WS applications"
    severity: high
    category: web_server
    tech_type: websphere
    automation_type: automated
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "6.7"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Enable hostname verification in JAX-WS applications by setting the
      http.conduit.tlsClientParameters.diableCNCheck HTTP conduit property to false.
      or Do not disable hostname verification in JAX-WS applications by setting the
      http.conduit.tlsClientParameters.diableCNCheck HTTP conduit property to true.
      or Enable hostname verification in JAX-WS applications. or Do not disable
      hostname verification in JAX-WS applications. Disabling hostname verification
      in JAX-WS applications by setting the
      http.conduit.tlsClientParameters.diableCNCheck HTTP conduit property to false.
      Disable hostname verification in JAX-WS applications by setting the http
      conduit property http.conduit.tlsClientParameters.disableCNCheck to false.
    rationale: >
      Hostname verification enables the client to trust the server it is
      communicating with during the SSL/TLS handshake. Hostname verification
      mitigates the man-in-the-middle attackers which can spoof SSL/TLS servers via
      an arbitrary valid certificate by ensuring that SSL server hostname matches a
      domain name in the subject's Common Name (CN) of the X.509 certificate.
    audit_procedure: >
      Ensure the http.conduit.tlsClientParameters.diableCNCheck property is not set
      to true in the Liberty configuration. . Note that this can be also set in the
      application's ibm-ws- bnd.xml binding file. grep -w -R
      'http.conduit.tlsClientParameters.disableCNCheck' ${server.config.dir}
    remediation: >
      Add the http.conduit.tlsClientParameters.disableCNCheck property to
      webservice- endpoint element in
      ${server.config.dir}/configDropins/overrides/<any file name>.xml. Set the
      http.conduit.tlsClientParameters.disableCNCheck attributes value to false for
      both provider and client sides. The same setting can be disabled trough WEB-
      INF/ibm-ws-bnd.xml of the web application or META-INF/ibm-ws-bnd.xml of the
      EJB module. ... <!-- ***** Provider Side ***** --> <webApplication ... >
      <webservices-bnd ... > <webservice-endpoint ... > <properties
      http.conduit.tlsClientParameters.disableCNCheck='false' /> </webservice-
      endpoint> </webservices-bnd> </webApplication> ... <!-- ***** Client Side
      (service-ref) ***** --> <webApplication ... > <webservices-bnd ... > <service-
      ref ... > <properties http.conduit.tlsClientParameters.disableCNCheck='false'
      /> </service-ref> </webservices-bnd> </webApplication> Default Value: The
      http.conduit.tlsClientParameters.diableCNCheck property is set to false by
      default. References: 1. https://www.ibm.com/docs/en/was-
      liberty/base?topic=level-enabling-ssl- communication-web-services-access 2.
      https://www.ibm.com/docs/en/was-liberty/base?topic=liberty-ws-bndxml-file
    references: >
      1. https://www.ibm.com/docs/en/was-liberty/base?topic=level-enabling-ssl-
      communication-web-services-access 2. https://www.ibm.com/docs/en/was-
      liberty/base?topic=liberty-ws-bndxml-file
