    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "4.2.4"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      If there are no specific SSL/TLS configurations configured for outbound TLS
      connections the common TLS configurations are used by both the inbound and
      outbound connections.
    rationale: >
      Configure additional TLS configuration elements for outbound connections with
      listed hostnames and ports allows to separate the TLS connection
      configurations for outbound calls for more fine grain control.
    audit_procedure: >
      Ensure the outboundSSLRef attribute is set to a valid ssl configuration on the
      sslDefault element in the Liberty configuration. grep -w -R -i
      'outboundSSLRef' ${server.config.dir} Also ensure that host and port
      attributes are set on outboundConnection elements for all ssl elements used
      for outbound requests. grep -w -R -i 'outboundConnection' ${server.config.dir}
    remediation: >
      Add the outboundSSLRef attribute to the sslDefault elements to
      ${server.config.dir}/configDropins/overrides/*.xml and set the value to a
      valid ssl configuration id. <sslDefault outboundSSLRef='alternateSSLSettings'
      /> Also add host and port attributes on the outboundConnection elements for
      all ssl elements used for outbound requests to
      ${server.config.dir}/configDropins/overrides/*.xml and set the values to hosts
      and ports used by the application or server. <ssl id='alternateSSLSettings'
      ... <outboundConnection host='hostname1' port='020' /> <outboundConnection
      host='hostname2' port='9020' /> </ssl> References: 1.
      https://openliberty.io/docs/latest/reference/config/ssl.html 2.
      https://openliberty.io/docs/latest/reference/feature/transportSecurity-1.0.html
    references: >
      1. https://openliberty.io/docs/latest/reference/config/ssl.html 2.
