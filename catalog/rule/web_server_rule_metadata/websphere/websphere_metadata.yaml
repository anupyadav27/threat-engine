  - rule_id: websphere.cis.4.server_headers_on_requests_are_removed
    title: "Ensure server headers on requests are removed"
    severity: high
    category: web_server
    tech_type: websphere
    automation_type: automated
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "4.4.19"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      A server header contains information about the software used by the server to
      handle the request. This information can be returned to browsers or web
      clients in certain situations.
    rationale: >
      Revealing the specific software version of the server may allow Websphere
      Liberty to become more vulnerable to attacks against software that is known to
      contain security holes. Enabling the removeServerHeader on the Liberty
      configuration removes this information and overrides the default value that is
      sent down in the HTTP header further masking any information about Websphere
      Liberty implementation.
    audit_procedure: >
      Ensure the removeServerHeader attribute set to true in the httpOptions element
      in Liberty configuration. grep -w -R -i 'removeServerHeader'
      ${server.config.dir}
    remediation: >
      Add the removeServerHeader attribute to httpOptions element specified in
      ${server.config.dir}/configDropins/overrides/*.xml. Set the removeServerHeader
      attribute value to true. <httpEndpoint id='defaultHttpEndpoint' ...
      <httpOptions removeServerHeader=`true`/> </httpEndpoint> Default Value:
      Liberty server headers are enabled by default. References: 1.
      https://openliberty.io/docs/latest/reference/config/httpOptions.html
    references: >
      1. https://openliberty.io/docs/latest/reference/config/httpOptions.html
    impact: >
      
