  - rule_id: websphere.cis.4.the_federal_information_processing_standards_fips
    title: "Ensure that the Federal Information Processing Standards (FIPS) are used for the cryptographic modules"
    severity: medium
    category: web_server
    tech_type: websphere
    automation_type: manual
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "4.2.15"
    cis_section: "4"
    profile_applicability: "Level 2"
    description: >
      The National Institute of Standards and Technology (NIST) issues the FIPS 140
      Publication Series to coordinate the requirements and standards for
      cryptography modules that include both hardware and software components.
      Protection of a cryptographic module within a security system is necessary to
      maintain the confidentiality and integrity of the information protected by the
      module. This standard specifies the security requirements that will be
      satisfied by a cryptographic module.
    rationale: >
      Federal Information Processing Standards (FIPS) are standards and guidelines
      that are issued by the National Institute of Standards and Technology (NIST)
      for federal government computer systems. You can set up Liberty to comply with
      FIPS requirements by setting system properties and specifying a FIPS-validated
      security provider.
    audit_procedure: >
      The FIPS standard can be enforced by setting the system properties -
      Dcom.ibm.jsse2.usefipsprovider=true and -
      Dcom.ibm.jsse2.usefipsProviderName=IBMJCEPlusFIPS when using IBM JDK. For
      other JDKs, follow their specific instructions. grep -w -R -i
      '-Dcom.ibm.jsse2.usefipsprovider=true' ${server.config.dir} grep -w -R -i
      '-Dcom.ibm.jsse2.usefipsProviderName=IBMJCEPlusFIPS' ${server.config.dir} In
      addition, configure to use the IBMJCEPlusFIPS security provider in the
      $JAVA_HOME/jre/lib/security/java.security file. grep -w -R -i
      'com.ibm.crypto.plus.provider.IBMJCEPlusFIPS' ${JAVA_HOME}
    remediation: >
      Configure the system property -Dcom.ibm.jsse2.usefipsprovider to true and -
      Dcom.ibm.jsse2.usefipsProviderName to IBMJCEPlusFIPS in the jvm.options file.
      The link in reference section provides more information on how to customize
      the Liberty environment with system properties.
      -Dcom.ibm.jsse2.usefipsprovider=true
      -Dcom.ibm.jsse2.usefipsProviderName=`IBMJCEPlusFIPS` ... In addition,
      configure the IBMJCEPlusFIPS provider in the
      $JAVA_HOME/jre/lib/security/java.security file.
      security.provider.1=com.ibm.crypto.plus.provider.IBMJCEPlusFIPS ...
      References: 1. https://www.ibm.com/docs/en/was-liberty/base?topic=liberty-
      setting-up-fips- compliance 2. https://www.ibm.com/support/pages/setting-
      generic-jvm-arguments-websphere- application-server-v85-liberty-profile 4.3
      Single Sign On (SSO) Security recommendations for SSO technologies like OpenId
      connect (OIDC), SAML, OAuth
    references: >
      1. https://www.ibm.com/docs/en/was-liberty/base?topic=liberty-setting-up-fips-
      compliance 2. https://www.ibm.com/support/pages/setting-generic-jvm-arguments-
      websphere- application-server-v85-liberty-profile 4.3 Single Sign On (SSO)
      Security recommendations for SSO technologies like OpenId connect (OIDC),
      SAML, OAuth
