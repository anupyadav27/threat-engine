      disableXPoweredBy attributes value to true. <webContainer
      disableXPoweredBy='true' /> Default Value: For servlet-5.0 and newer, the
      default value is true. For previous versions the value is false. References:
      1. https://openliberty.io/docs/latest/reference/config/webContainer.html
