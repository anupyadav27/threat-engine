  - rule_id: websphere.cis.4.strong_algorithms_are_used_for_tls_certificates
    title: "Ensure that strong algorithms are used for TLS certificates."
    severity: high
    category: web_server
    tech_type: websphere
    automation_type: manual
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "4.2.11"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Certificates created with stronger algorithms use stronger hashes which is
      more secure. Also, some browsers warn when using weak certificates.
    rationale: >
      With increased CPU speeds and computing power of computers, some algorithms
      are not secure to use in production systems anymore such as SHA1 or MD5. On
      top of that, even for accepted algorithms such as SHA256 or higher, key sizes
      need to be higher than 2048 bits. Weak algorithms and small key sizes are not
      secure.
    audit_procedure: >
      Ensure that Signature algorithm name is SHA256 or higher and Subject Public
      Key Algorithm is equal or higher than 2048 bit. keytool -list -v -keystore
      <keystore file name> -storepass <store password> - storetype <store type> |
      grep 'Signature algorithm name\|Subject Public Key Algorithm' ... Signature
      algorithm name: SHA256withRSA Subject Public Key Algorithm: 2048-bit RSA key
      ...
    remediation: >
      Create certificates with SHA256 or higher algorithm and 2048 or higher key bit
      size.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_WEBSPHERE_liberty_v1_0_0_4_2_11"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_websphere_liberty_v1_0_0_4_2_11"
    metadata_source: generated
    generated_by: generate_tech_rules

