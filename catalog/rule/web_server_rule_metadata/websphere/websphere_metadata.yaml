    cis_version: "liberty_v1.0.0"
    cis_control: "4.3.3"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      The 'jti' claim in the JWT token can be made unique to prevent the JWT tokens
      from being replayed.
    rationale: >
      The OpenID Connect relying party should not reuse JSON Web Tokens to prevent a
      token replay attack.
    audit_procedure: >
      Ensure the existence of the tokenReuse attribute and that it is set to false
      in the openidConnectClient element in the Liberty configuration: grep -w -R -i
      'tokenReuse' ${server.config.dir}
    remediation: >
      Add the tokenReuse attribute to the openidConnectClient element to
      ${server.config.dir}/configDropins/overrides/*.xml and set it to false to
      prevent token reuse on JSON Web Tokens. <openidConnectClient
      tokenReuse='false' /> Default Value: The tokenReuse attribute is set to false
      by default. References: 1.
      https://openliberty.io/docs/latest/reference/config/openidConnectClient.html
    references: >
