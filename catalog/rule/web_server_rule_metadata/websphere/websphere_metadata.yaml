  - rule_id: websphere.cis.4.hardware_crypto_cards_modules_hsm_are_used_to
    title: "Ensure that hardware crypto cards/modules (HSM) are used to store SSL/TLS certificates"
    severity: medium
    category: web_server
    tech_type: websphere
    automation_type: manual
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "4.2.13"
    cis_section: "4"
    profile_applicability: "Level 2"
    description: >
      Hardware security modules (HSMs) are hardened, tamper-resistant hardware
      devices that secure cryptographic processes by generating, protecting, and
      managing keys used for encrypting and decrypting data and creating digital
      signatures and certificates.
    rationale: >
      Using hardware security modules (HSM) to store and use certificates for the
      SSL/TLS communication provides greater security. Impact: Hardware crypto
      cards/modules are external devices that can store certificates that can be
      used for the SSL/TLS communications. They store and protect the cryptographic
      keys throughout their lifecycles. The use of these devices have to be weighed
      against the security requirements and the additional expenses this would
      entail. The specific configuration needed to support depends on the crypto
      card and JDK. The following applies when using the IBM JDK and when the
      keyStore type is PKCS11.
    audit_procedure: >
      Ensure that the location attribute is set to the specific hardware crypto
      configuration file. In addition ensure that type attribute is set to PKCS11.
      Both these are under the keyStore element of the SSL configuration in the
      Liberty configuration. grep -w -R -i 'location' ${server.config.dir} grep -w
      -R -i 'type' ${server.config.dir}
    remediation: >
      Configure the location attribute to the specific hardware crypto card
      configuration file. In addition configure the type attribute to PKCS11. Both
      these attributes are in the keyStore element used by the SSL configuration in
      ${server.config.dir}/configDropins/overrides/*.xml. In this example, the
      HWCryto.cfg contains the hardware crypto configuration information. <keyStore
      id='hwKeyStore' location='${server.config.dir}/HWCrypto.cfg' type='PKCS11'
      fileBased='false' provider='IBMPKCS11Impl' ... /> References: 1.
      https://www.ibm.com/docs/en/was-liberty/base?topic=liberty-keystores
    references: >
      1. https://www.ibm.com/docs/en/was-liberty/base?topic=liberty-keystores
    impact: >
      Hardware crypto cards/modules are external devices that can store certificates
      that can be used for the SSL/TLS communications. They store and protect the
      cryptographic keys throughout their lifecycles. The use of these devices have
      to be weighed against the security requirements and the additional expenses
