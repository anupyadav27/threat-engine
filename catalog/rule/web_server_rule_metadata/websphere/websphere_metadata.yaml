  - rule_id: websphere.cis.3.automatic_applications_updates_are_disabled
    title: "Ensure that automatic applications updates are disabled"
    severity: high
    category: web_server
    tech_type: websphere
    automation_type: automated
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "3.1"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Automatic application updates will dynamically update the runtime behavior of
      the applications of any changes to the application.
    rationale: >
      Automatic updates during runtime are very useful during development and test
      phases. Application updates must be carefully controlled in production
      environments to reduce the possibility that unknown changes or vulnerabilities
      are deployed to users.
    audit_procedure: >
      Review the updateTrigger attribute and dropinsEnabled attributes in the
      applicationMonitor element in the Liberty configuration . Ensure the
      updateTrigger attribute is set to a value other than polled. Ensure the
      dropinsEnabled attritubute is set to false. grep -w -R -i 'updateTrigger'
      ${server.config.dir} grep -w -R -i 'dropinsEnabled' ${server.config.dir}
    remediation: >
      Add the dropinsEnabled attribute and the updateTrigger attributes to the
      applicationMonitor element to
      ${server.config.dir}/configDropins/overrides/*.xml. Set the dropinsEnabled to
      false to stop usage of dropins folder. Set the updateTrigger to mbean or
      disabled. <applicationMonitor updateTrigger='mbean' dropinsEnabled='false' />
      Default Value: Liberty enables dynamic application by default. The default
      settings for application monitoring are as follows: <applicationMonitor
      updateTrigger='polled' pollingRate='500ms' dropins='dropins'
      dropinsEnabled='true'/> References: 1.
      https://openliberty.io/docs/latest/reference/config/applicationMonitor.html 2.
      https://www.ibm.com/docs/en/was-
      liberty/base?topic=SSEQTP_liberty/com.ibm.websphere.wlp.zseries.doc/ae/twlp_
      setup_dyn_upd.html
    references: >
      1. https://openliberty.io/docs/latest/reference/config/applicationMonitor.html
      2. https://www.ibm.com/docs/en/was-
      liberty/base?topic=SSEQTP_liberty/com.ibm.websphere.wlp.zseries.doc/ae/twlp_
      setup_dyn_upd.html
    impact: >
      
