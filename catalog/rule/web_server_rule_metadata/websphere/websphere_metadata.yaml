  - rule_id: websphere.cis.4.signaturealgorithm_asymmetric_key_algorithm_is
    title: "Ensure 'signatureAlgorithm' asymmetric key algorithm is set for encrypting the JSON Web Tokens"
    severity: high
    category: web_server
    tech_type: websphere
    automation_type: automated
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "4.3.1"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      The signatureAlgorithm is used to sign the JWT and can be configured to use
      different algorithms like HS256 (symmetric), RS256 (asymmetric).
    rationale: >
      The OpenID Connect server provider should use an asymmetric algorithm to sign
      JSON Web Tokens (JWT) for better security since different keys are used for
      signing and verifying the token.
    audit_procedure: >
      Ensure the signatureAlgorithm attribute is set to a stronger algorithm like
      RS256 in the openidConnectProvider element for the OIDC provider and
      openidConnectClient for the OIDC client in the Liberty configuration grep -w
      -R -i 'signatureAlgorithm' ${server.config.dir}
    remediation: >
      Add the signatureAlgorithm attribute to the openidConnectProvider element and
      set it to a strong algorithm, such as RS256 in
      ${server.config.dir}/configDropins/overrides/*.xml. <openidConnectProvider
      signatureAlgorithm='RS256' /> <openidConnectClient signatureAlgorithm='RS256'
      /> Default Value: The WebSphere Liberty OpenID Connect Server Provider signs
      the token ID by default with the signature algorithm of HS256. References: 1.
      https://openliberty.io/docs/latest/reference/config/openidConnectProvider.html
    references: >
      1.
      https://openliberty.io/docs/latest/reference/config/openidConnectProvider.html
