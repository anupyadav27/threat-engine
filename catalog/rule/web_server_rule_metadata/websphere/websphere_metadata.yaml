  - rule_id: websphere.cis.3.jdk_security_manager_is_enabled
    title: "Ensure JDK Security Manager is Enabled"
    severity: medium
    category: web_server
    tech_type: websphere
    automation_type: automated
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "3.2"
    cis_section: "3"
    profile_applicability: "Level 2"
    description: >
      The JDK's security manager allows applications to implement a security policy.
      It allows an application to permit or deny operations defined by the security
      policy.
    rationale: >
      In some situations there is a need to restrict applications from performing
      certain operations like read and writing to files, opening network connections
      etc. JDK's security manager provides a way to configure a security policy that
      can be applied to restrict the applications operations. Note: The security
      manager is proposed to be deprecated and removed in future releases of JDK.
      Impact: Generally enabling the security manager can impact the performance
      because of the additional checks needed to restrict operations by
      applications. Applications can also fail to run with these additional checks
      in which case appropriate permissions have to configured for the application
      either in the server configuration files or the application specific
      permissions.xml file.
    audit_procedure: >
      Ensure that the websphere.java.security property is configured in
      ${server.config.dir}/bootstrap.properties file websphere.java.security and
      also confirm that the appropriate permissions are granted in the application's
      permission.xml file and/or in the javaPermission element in Liberty
      configuration <javaPermission ... />
    remediation: >
      Enable the websphere.java.security property in
      ${server.config.dir}/bootstrap.properties file websphere.java.security and
      also confirm that the appropriate permissions are granted in the application's
      permission.xml file and/or in the javaPermission element specified in
      ${server.config.dir}/configDropins/overrides/*.xml. For example,
      <javaPermission className='java.security.PropertyPermission' name='os.name'
      actions='read' restriction='true' /> Default Value: Security Manager is not
      enabled by default. References: 1. https://www.ibm.com/docs/en/was-
      liberty/base?topic=security-java-2 2. https://openjdk.java.net/jeps/411 3.
      https://docs.oracle.com/en/java/javase/17/docs/api/java.base/java/lang/SecurityM
      anager.html 4 Web Applications Security considerations that apply to Web
      applications like servlets, jsps etc. 4.1 Securing Cookies 4.1.1 Securing
      Session Cookies JSESSIONID is a cookie generated by Servlet containers and
      used for session management in J2EE web applications for HTTP protocol
    references: >
      1. https://www.ibm.com/docs/en/was-liberty/base?topic=security-java-2 2.
      https://openjdk.java.net/jeps/411 3.
      https://docs.oracle.com/en/java/javase/17/docs/api/java.base/java/lang/SecurityM
      anager.html 4 Web Applications Security considerations that apply to Web
      applications like servlets, jsps etc. 4.1 Securing Cookies 4.1.1 Securing
      Session Cookies JSESSIONID is a cookie generated by Servlet containers and
      used for session management in J2EE web applications for HTTP protocol
    impact: >
      Generally enabling the security manager can impact the performance because of
      the additional checks needed to restrict operations by applications.
      Applications can also fail to run with these additional checks in which case
      appropriate permissions have to configured for the application either in the
      server configuration files or the application specific permissions.xml file.
    compliance_mappings:
      cis:
        - "CIS_WEBSPHERE_liberty_v1_0_0_3_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_websphere_liberty_v1_0_0_3_2"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: websphere.cis.4.cookiesamesite_samesite_attribute_is_set_to
    title: "Ensure 'cookieSameSite' SameSite attribute is set to 'Strict' for session cookies"
    severity: high
    category: web_server
    tech_type: websphere
    automation_type: automated
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "4.1.1.1"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      The SameSite attribute is used by web browsers to determine if a particular
      cookie should be sent with a request. Setting this attribute can help protect
      against Cross Site Request Forgery (CSRF) attacks. It is recommended to set
      the SameSite attribute to Strict. A Strict value for the SameSite attribute
      ensures the cookie is only sent by the web browser if the site for the cookie
      matches the site in the address bar, for example.
    rationale: >
      Some browsers treat cookies without a SameSite attribute as if they have the
      SameSite attribute value of Lax.
    audit_procedure: >
      Ensure the cookieSameSite attribute is set to Strict in the httpSession
      element in the Liberty configuration grep -w -R -i 'cookieSameSite'
      ${server.config.dir}
    remediation: >
      Add the cookieSameSite attribute to the httpSession element in
      ${server.config.dir}/configDropins/overrides/<any file name>.xml. Set the
      cookieSameSite value to Strict. <httpSession cookieSameSite='Strict'/> Default
      Value: The default value is Disabled. References: 1.
      https://openliberty.io/blog/2020/03/25/set-samesite-attribute-cookies-
      liberty.html
    references: >
      1. https://openliberty.io/blog/2020/03/25/set-samesite-attribute-cookies-
      liberty.html
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_WEBSPHERE_liberty_v1_0_0_4_1_1_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_websphere_liberty_v1_0_0_4_1_1_1"
    metadata_source: generated
    generated_by: generate_tech_rules

