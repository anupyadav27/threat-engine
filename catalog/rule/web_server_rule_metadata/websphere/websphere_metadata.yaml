  - rule_id: websphere.cis.1.only_defined_users_have_access_to_the_file_system
    title: "Ensure only defined users have access to the file system"
    severity: high
    category: web_server
    tech_type: websphere
    automation_type: manual
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "1.3"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      In Linux systems, there is a category of permission as others. These users are
      the ones who are not neither owner nor in a group associated with the
      file/folder. Since these users are anyone else than users defined, they should
      not have any access at all on Websphere Liberty file system.
    rationale: >
      
    audit_procedure: >
      Ensure that no one falling into other category have access to the Websphere
      Liberty file system. You should expect to see ---. ls -l -R ${wlp.install.dir}
      | awk '{print substr($1,length($1)-3,3)}'
    remediation: >
      Ensure that other has no access to the system. chmod -R o-rwx
      ${wlp.install.dir}
