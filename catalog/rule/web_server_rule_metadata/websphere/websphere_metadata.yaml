  - rule_id: websphere.cis.4.web_server_document_root_does_not_contain
    title: "Ensure Web Server Document Root does not contain information that should be private"
    severity: high
    category: web_server
    tech_type: websphere
    automation_type: automated
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "4.4.15"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      WAR files contain servable content. The Web container will serve any files
      found in the root(Web Server Document Root) of the WAR file. This is fine as
      long as you place only servable content in the root. Thus, you should never
      place content that shouldn't be shown to users in the root of the WAR. For
      example, don't put property files, class files, or other important information
      there. If you must place such information in the WAR file, place it within the
      WEB-INF directory, as permitted by the servlet specification. Information
      there is never served by the Web.
    rationale: >
      
    audit_procedure: >
      Ensure that there is no content that shouldn't be shown to users in the root
      of the WAR. For example, check for property files, class files, or other
      important information.
    remediation: >
      Remove all content that shouldn't be shown to users in the root of the WAR.
      For example, relocate property files, class files, or other important
      information within the WEB-INF directory, as permitted by the servlet
      specification.
