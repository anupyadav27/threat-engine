  - rule_id: websphere.cis.1.websphere_liberty_installation_is_validated
    title: "Ensure the WebSphere Liberty Installation is Validated"
    severity: high
    category: web_server
    tech_type: websphere
    automation_type: manual
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "1.7"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Ensure that all WebSphere Liberty binaries were installed successfully and
      that you are running the latest fix pack version.
    rationale: >
      Ensuring that all WebSphere Liberty binaries are installed successfully and
      that the latest fix pack version is applied provides the most up-to-date
      protection against vulnerabilities.
    audit_procedure: >
      Validate your WebSphere Liberty installation by running the command below:
      ${wlp_install_dir}/bin/productInfo validate Expected result: Start product
      validation... Product validation completed successfully. Validate that you are
      running with the latest fixpack. ${wlp_install_dir}/bin/productInfo version
      Expected result: Product version: YY.0.0.FP In the output, YY is the last two
      digits of the year that the fixpack was released, and FP represents the
      fixpack number for that year. Ensure that this matches that latest fixpack
      available from IBM.
    remediation: >
      If the audit procedure fails, remove your current installation and install
      from a more secure location, ensuring that you are installing the latest
      fixpack from a trusted source.
    references: >
      
