  - rule_id: websphere.cis.1.extraneous_files_and_directories_are_removed
    title: "Ensure extraneous files and directories are removed"
    severity: high
    category: web_server
    tech_type: websphere
    automation_type: manual
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "1.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      The installation might provide example applications, documentation, and other
      directories which may not serve a production use.
    rationale: >
      Removing non-production resources is a defense in depth measure that reduces
      potential exposures introduced by these resources.
    audit_procedure: >
      Check for the existence of extraneous resources: $ ls -l
      ${wlp.user.dir}/extension \ ${wlp.user.dir}/shared \ ${wlp.user.dir}/server \
      ${wlp.user.dir}/client There should be no non-production client
      extension/shared resource(s)/server/client in these folders
    remediation: >
      Remove extraneous resources for each: Extension: $ rm -rf
      ${wlp.user.dir}/extension/<non-production extension> Shared resource(s): $ rm
      -rf ${wlp.user.dir}/shared/<non-production shared resource(s)> Server: $ rm
      -rf ${wlp.user.dir}/server/<non-production server> Client: $ rm -rf
      ${wlp.user.dir}/client/<non-production client>
