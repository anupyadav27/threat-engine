  - rule_id: websphere.cis.2.the_ldap_connection_uses_tls
    title: "Ensure that the LDAP connection uses TLS"
    severity: high
    category: web_server
    tech_type: websphere
    automation_type: automated
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "2.3"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      TLS (Transport Layer Security) provides secure communication over a network.
    rationale: >
      Secure the data sent to the LDAP server which can include user authentication
      and search requests.
    audit_procedure: >
      Ensure that the sslEnabled attribute of all ldapRegistry elements is to true.
      The sslRef of all ldapRegistry elements must match the id attribute of an ssl
      element. Both configurations are set on the Liberty configuration. grep -w -R
      -i 'sslEnabled' ${server.config.dir} The sslEnabled attribute may match to
      elements in addition to the ldapRegistry element.
    remediation: >
      Set the sslEnabled attribute on all ldapRegistry elements in
      ${server.config.dir}/configDropins/overrides/<any file name>.xml. Also set the
      sslRef attribute to a value that contains the correct keystore and truststore
      configuration for LDAPS communication. <ldapRegistry sslEnabled='true'
      sslRef='LDAPSSLSettings' > </ldapRegistry> <ssl id='LDAPSSLSettings'
      keyStoreRef='LDAPKeyStore' trustStoreRef='LDAPTrustStore' /> Default Value:
      The default value of the sslEnabled attribute on the ldapRegistry element is
      false. References: 1.
      https://openliberty.io/docs/latest/reference/config/ldapRegistry.html 2.
      https://openliberty.io/docs/latest/reference/config/ssl.html
    references: >
      1. https://openliberty.io/docs/latest/reference/config/ldapRegistry.html 2.
      https://openliberty.io/docs/latest/reference/config/ssl.html
