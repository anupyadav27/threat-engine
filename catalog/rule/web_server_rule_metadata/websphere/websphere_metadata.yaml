  - rule_id: websphere.cis.4.directorybrowsingenabled_is_set_to_false_for_web
    title: "Ensure 'directoryBrowsingEnabled' is set to 'false' for web applications"
    severity: high
    category: web_server
    tech_type: websphere
    automation_type: automated
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "4.4.20"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Disable directory browsing for your web applications. Directory browsing
      automatically list the contents of directories that do not have an index page
      or welcome page present.
    rationale: >
      Directory browsing enables the web applications to expose the file names in
      the application.
    audit_procedure: >
      Ensure the directoryBrowsingEnabled attribute on the webContainer element
      configured in the Liberty configuration is set to false. grep -w -R -i
      'directoryBrowsingEnabled' ${server.config.dir} Directory browsing can also be
      set on the enable-directory-browsing attributes in the web-ext element for
      individual webApplication elements. For legacy web applications, directory
      browsing can also be set in the ibm-web-ext.xml or ibm-web-ext.xmi files in
      the application.
    remediation: >
      Add the directoryBrowsingEnabled attribute on the webContainer element in
      ${server.config.dir}/configDropins/overrides/*.xml and set it to false.
      <webContainer directoryBrowsingEnabled='false'/> If directory browsing is set
      at the application level, update the webApplication elements or ibm-web-ext
      files. Default Value: In WebSphere Liberty directory browsing for web
      applications is disabled by default, directoryBrowsingEnabled is set to false.
      References: 1.
      https://openliberty.io/docs/latest/reference/config/webContainer.html 2.
      https://openliberty.io/docs/latest/reference/config/webApplication.html#web-
      ext 3. https://openliberty.io/docs/latest/application-configuration-
      hardening.html
    references: >
