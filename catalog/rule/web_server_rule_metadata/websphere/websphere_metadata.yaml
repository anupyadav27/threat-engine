  - rule_id: websphere.cis.10.unused_features_are_removed
    title: "Ensure Unused Features are Removed"
    severity: high
    category: web_server
    tech_type: websphere
    automation_type: automated
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "10.1"
    cis_section: "10"
    profile_applicability: "Level 1"
    description: >
      The Websphere Liberty architecture provides developers with the option to tune
      their server to only the features that they need. For example, the JDBC
      feature only needs to be added if database access is required. If you did not
      want any remote administrative access to the REST interface, you would remove
      the REST feature.
    rationale: >
      Enabling only the necessary Liberty features minimizes the disk and memory
      footprint of the server as well as a faster start time. Having unused features
      could increase the chance of having a vulnerability due to the default
      settings of some features.
    audit_procedure: >
      Review the configuration for features not being used in Liberty configuration.
      This includes aggregated features containing multiple features. The features
      are listed under in the featureManager element. To review all of the
      individual features used in the server, review the messages.log for the
      CWWKF0012I message. grep -w -R -i CWWKF0012I ${server.config.dir}
    remediation: >
      Removed any unneeded features listed under the featureManager element in the
      Liberty configuration Default Value: The default server template enables the
      jsp-2.3 feature. Other templates in the ${wlp.install.dir}/templates directory
      add different features depending on the template theme. Example of the
      defaultServer template features in the server.xml file after running
      ${wlp.install.dir}/bin server create myServer <featureManager>
      <feature>jsp-2.3</feature> </featureManager> References: 1.
      https://openliberty.io/docs/latest/reference/feature/feature-overview.html
    references: >
      1. https://openliberty.io/docs/latest/reference/feature/feature-overview.html
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_WEBSPHERE_liberty_v1_0_0_10_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
