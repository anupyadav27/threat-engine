    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Disabling the http port in the server configuration ensures that only the
      secure https protocol will be used to access the web applications. HTTPS
      protocol protects the integrity and confidentiality of data between the client
      and the server.
    rationale: >
      Disabling the HTTP port forces communication to use the HTTPS port which is
      encrypted to give better defense against man-in-the-middle attacks.
    audit_procedure: >
