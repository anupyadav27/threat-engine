  - rule_id: websphere.cis.4.http_session_overflow_is_disabled
    title: "Ensure HTTP session overflow is 'disabled'"
    severity: high
    category: web_server
    tech_type: websphere
    automation_type: manual
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "4.4.16"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Applications that use in-memory HTTP sessions can configure if overflow is
      allowed and the number of sessions that can be created.
    rationale: >
      Disabling session overflow and the number of maximum number of sessions
      allowed helps to avoid denial-of-service attacks in which attackers generate
      new sessions until all JVM memory is exhausted.
    audit_procedure: >
      Ensure that the allowOverflow attribute of httpSession element is set to false
      and the maxInMemorySessionCountvalue of thehttpSession` element is set to an
      appropriate value in Liberty configuration. grep -w -R -i 'allowOverflow'
      ${server.config.dir} grep -w -R -i 'maxInMemorySessionCount'
      ${server.config.dir}
    remediation: >
      Set the allowOverflow attribute on the httpSession element to the value of
      false in ${server.config.dir}/configDropins/overrides/*.xml. Also set the
      maxInMemorySessionCount attribute on the httpSession element to a maximum
      number of sessions the JVM is able to support for each web module.
      <httpSession allowOverflow='false' maxInMemorySessionCount='1000' /> Default
      Value: WebSphere Liberty allows session overflow by default, allowOverflow is
      set to true. The maximum session count, maxInMemorySessionCount, is 1000 by
      default. References: 1.
      https://openliberty.io/docs/latest/reference/config/httpSession.html
    references: >
      1. https://openliberty.io/docs/latest/reference/config/httpSession.html
