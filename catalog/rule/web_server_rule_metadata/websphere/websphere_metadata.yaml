  - rule_id: websphere.cis.5.identityassertionenabled_is_set_to_true_within
    title: "Ensure 'identityAssertionEnabled' is set to 'true' within the CSIv2 Attribute Layer"
    severity: high
    category: web_server
    tech_type: websphere
    automation_type: automated
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "5.1.3"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The CSIv2 Attribute policy configures security at the Attribute layer when
      accessing EJB applications using RMI/IIOP.
    rationale: >
      If identity assertion is required by the server, the identityAssertionTypes
      attribute of the attribute layer is set to specify the identity token types
      that the server supports. If other authentication mechanisms are used to
      validate the client, this is not required.
    audit_procedure: >
      Ensure the identityAssertionEnabled attribute in the ORB > serverPolicy.csiv2
      > layers > attributeLayer element is set to true in the Liberty configuration
      grep -w -R -i 'identityAssertionEnabled' ${server.config.dir} And also ensure
      identityAssertionTypes is specified and does not include ITTAnonymous grep -w
      -R -i 'identityAssertionTypes' ${server.config.dir}
    remediation: >
      Set the identityAssertionEnabled attribute to true and identityAssertionTypes
      to ITTX509CertChain, ITTDistinguishedName in ORB > serverPolicy.csiv2 > layers
      > authenticationLayer in the ${server.config.dir}/configDropins/overrides/<any
      file name>.xml <orb id='defaultOrb'> <serverPolicy.csiv2> <layers>
      <attributeLayer identityAssertionEnabled='true'
      identityAssertionTypes='ITTX509CertChain, ITTDistinguishedName'/> </layers>
      </serverPolicy.csiv2> </orb> References: 1. https://www.ibm.com/docs/en/was-
      liberty/core?topic=liberty-configuring-inbound- csiv2-attribute-layer
    references: >
      1. https://www.ibm.com/docs/en/was-liberty/core?topic=liberty-configuring-
