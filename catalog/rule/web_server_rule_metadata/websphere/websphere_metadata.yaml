  - rule_id: websphere.cis.4.trustdefaultcerts_is_set_to_false
    title: "Ensure 'trustDefaultCerts' is set to 'false'"
    severity: medium
    category: web_server
    tech_type: websphere
    automation_type: automated
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "4.2.1"
    cis_section: "4"
    profile_applicability: "Level 2"
    description: >
      The default certificates from the Java runtime are trusted by the server in
      addition to the certificates configured in the SSL/TLS configurations in the
      server.
    rationale: >
      Restricting the certificates trusted by the server to only the SSL/TLS
      configurations in the server in a production environment eliminates the risk
      of trusting other certificates when making outbound secure connections.
    audit_procedure: >
      Ensure the trustDefaultCerts attribute is set to false in all ssl elements in
      the Liberty configuration. grep -w -R -i 'trustDefaultCerts'
      ${server.config.dir}
    remediation: >
      Add the trustDefaultCerts attribute to all ssl elements to
      ${server.config.dir}/configDropins/overrides/*.xml and set the value to false.
      <ssl trustDefaultCerts='false' /> Default Value: The default configuration
      templates provided by WebSphere Liberty trust public certificates from the
      Java runtime by default, the templates set the trustDefaultCerts attribute to
      true. References: 1.
      https://openliberty.io/docs/latest/reference/feature/transportSecurity-1.0.html
      2. https://openliberty.io/docs/latest/reference/config/ssl.html
    references: >
      1.
      https://openliberty.io/docs/latest/reference/feature/transportSecurity-1.0.html
