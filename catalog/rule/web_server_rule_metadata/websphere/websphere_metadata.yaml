  - rule_id: websphere.cis.4.transport_guarantee_is_set_to_confidential_for
    title: "Ensure 'transport-guarantee' is set to 'CONFIDENTIAL' for all web applications"
    severity: high
    category: web_server
    tech_type: websphere
    automation_type: automated
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "4.2.6"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      The transport-guarantee setting of CONFIDENTIAL will enforce that the
      application can only be accessed through HTTPS secure connection. HTTPS
      protocol protects the integrity and confidentiality of data between the client
      and the server.
    rationale: >
      Applications should set the transport guarantee to CONFIDENTIAL to enforce TLS
      secure communication when accessing the application.
    audit_procedure: >
      Ensure the transport-guarantee attribute in the user-data-constraint element
      on the security-constraint element in all applications' /WEB-INF/web.xml files
      is set to CONFIDENTIAL. Applications may also be in the
      ${server.config.dir}/dropins directory or a custom location. grep -w -R -i
      'transport-guarantee' ${wlp.user.dir}/shared/apps/ For legacy web
      applications, the transport guarantee can also be set in the ibm-web- ext.xml
      or ibm-web-ext.xmi files. Note: The security-constraints can also be set in
      the code using annotations like @ServletSecurity.TransportGuarantee
    remediation: >
      Add the transport-guarantee attribute to user-data-constraint element under
      the security-constraint in ${wlp.user.dir}/shared/apps/WEB-INF/web.xml and set
      the value to CONFIDENTIAL. <security-constraint> ... <user-data-constraint>
      <transport-guarantee>CONFIDENTIAL</transport-guarantee> </user-data-
      constraint> Note: The security-constraints can also be set in the code using
      annotations like @ServletSecurity.TransportGuarantee Default Value: WebSphere
      Liberty does not set a transport guarantee for applications by default.
      References: 1. https://openliberty.io/docs/latest/application-configuration-
      hardening.html
    references: >
      1. https://openliberty.io/docs/latest/application-configuration-hardening.html
