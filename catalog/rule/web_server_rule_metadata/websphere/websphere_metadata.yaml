      from context root folder. Add the enableWelcomePage attribute to the
      httpDispatcher element to ${server.config.dir}/configDropins/overrides/*.xml
      and set it to false. <httpDispatcher enableWelcomePage='false' /> Default
      Value: The WebSphere Liberty welcome page is enabled by default, the
      enableWelcomePage attribute is set to true. References: 1.
      https://openliberty.io/docs/latest/reference/config/httpDispatcher.html
