  - rule_id: websphere.cis.1.the_onconflict_attribute_is_set_to_ignore_to
    title: "Ensure that the 'onConflict attribute' is set to 'IGNORE' to restrict config file overwrites"
    severity: high
    category: web_server
    tech_type: websphere
    automation_type: automated
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "1.9"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      WebSphere Liberty allows additional configuration files to be included in the
      main configuration file. Using included files in the main configuration file
      provides organization, separation, update controls and file access
      restriction.
    rationale: >
      Use additional configuration files to hold sensitive configuration
      information. Restrict access to files with sensitive information. This avoids
      unauthorized access to information such as passwords. Use additional
      configuration files to organization configuration information by type. This
      helps users only update their portion of the server configuration and not
      accidentally or intentionally change configuration information in other areas.
      Included files should also be ignored if there is a merge conflict with the
      main file. This prevents a user from accidentally or intentionally overriding
      information in the main configuration file. To protect important configuration
      settings from merges or changes, information can be set in the
      ${server.config.dir}/configDropins/overrides/.
    audit_procedure: >
      Ensure that the onConflict attribute on all the location elements and is set
      to IGNORE in the Liberty configuration. grep -w -R -i 'include location'
      ${server.config.dir} Review the file permissions on included files. ls -al
      <includedFileName.xml> Review the main Liberty configuration file for any
      sensitive or grouped elements that can be moved to an included file.
    remediation: >
      Set the onConflict attribute to the IGNORE value in all include elements in
      the Liberty configuration. <include ... onConflict='IGNORE' /> Reduce file
      permission on all included files to essential users only. Default Value: In
      WebSphere Liberty, the onConflict attribute in the include element is MERGE by
      default. References: 1.
      https://openliberty.io/docs/latest/reference/config/include.html
    references: >
      1. https://openliberty.io/docs/latest/reference/config/include.html
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_WEBSPHERE_liberty_v1_0_0_1_9"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_websphere_liberty_v1_0_0_1_9"
