  - rule_id: websphere.cis.4.ssocookiename_ltpa_cookie_name_is_set
    title: "Ensure 'ssoCookieName' LTPA cookie name is set"
    severity: high
    category: web_server
    tech_type: websphere
    automation_type: automated
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "4.1.2.5"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      The server will authenticate only the LTPA cookie name that is configured.
      When the request contains other LTPA cookie names, they will be ignored.
    rationale: >
      Changing the LTPA cookie name helps make the cookie uniquely usable across
      multiple Liberty servers. It also helps hides the intended use of the cookie
      which helps prevent a bad actor from knowing how to try and misuse the cookie.
    audit_procedure: >
      Ensure the ssoCookieName attribute in the webAppSecurity is set to something
      other than LtpaToken2 in the Liberty configuration grep -w -R -i
      'ssoCookieName' ${server.config.dir} Also, Ensure the useOnlyCustomCookieName
      attribute in the webAppSecurity is set to true in the Liberty configuration
      grep -w -R -i 'useOnlyCustomCookieName' ${server.config.dir}
    remediation: >
      Set the ssoCookieName attribute to something other than LtpaToken2 in the
      webAppSecurity in the ${server.config.dir}/configDropins/overrides/*.xml For
      Example, obscureCookieName2 <webAppSecurity ssoCookieName='obscureCookieName2'
      /> Set the useOnlyCustomCookieName attribute to true in the webAppSecurity in
      the ${server.config.dir}/configDropins/overrides/*.xml <webAppSecurity
      useOnlyCustomCookieName='true' /> Default Value: • The ssoCookieName attribute
      has a default value of LtpaToken2. • The useOnlyCustomCookieName attribute is
      set to false by default. References: 1.
      https://openliberty.io/docs/latest/reference/config/webAppSecurity.html
    references: >
      1. https://openliberty.io/docs/latest/reference/config/webAppSecurity.html
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_WEBSPHERE_liberty_v1_0_0_4_1_2_5"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_websphere_liberty_v1_0_0_4_1_2_5"
