  - rule_id: websphere.cis.4.samesitecookie_attribute_is_set_to_strict
    title: "Ensure 'sameSiteCookie' attribute is set to 'Strict'"
    severity: high
    category: web_server
    tech_type: websphere
    automation_type: manual
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "4.1.2.1"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      The SameSite attribute is used by web browsers to determine if a particular
      cookie should be sent with a request. Setting this attribute can help protect
      against Cross Site Request Forgery (CSRF) attacks. It is recommended to set
      the SameSite attribute to Strict. A Strict value for the SameSite attribute
      ensures the cookie is only sent by the web browser if the site for the cookie
      matches the site in the address bar, for example.
    rationale: >
      Cookies without a SameSite attribute are treated as if they have the SameSite
      attribute value of Lax for some browsers.
    audit_procedure: >
      Ensure the sameSiteCookie attribute is set to Strict in the webAppSecurity
      element in the Liberty configuration grep -w -R -i 'sameSiteCookie'
      ${server.config.dir}
    remediation: >
      Add the sameSiteCookie attribute to the webAppSecurity element in
      ${server.config.dir}/configDropins/overrides/<any file name>.xml. Set the
      sameSiteCookie value to Strict. <webAppSecurity sameSiteCookie='Strict'/>
      Default Value: The default value is Disabled. References: 1.
      https://openliberty.io/blog/2020/03/25/set-samesite-attribute-cookies-
      liberty.html
    references: >
      1. https://openliberty.io/blog/2020/03/25/set-samesite-attribute-cookies-
      liberty.html
