  - rule_id: websphere.cis.4.hostname_verification_for_tls_communication_is
    title: "Ensure Hostname verification for TLS communication is enabled"
    severity: high
    category: web_server
    tech_type: websphere
    automation_type: automated
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "4.2.7"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Hostname verification is a server identity check that is used to ensure that a
      client is talking to the correct server. The check is performed on the client
      side of an SSL communication and involves looking at the server’s certificate
      Subject Alternative Name (or the SubjectDN) to see if it matches the host part
      of the URL that was used to make the outbound request.
    rationale: >
      Hostname verification mitigates man-in-the-middle security vulnerability
      attacks.
    audit_procedure: >
      Ensure the verifyHostname attribute is set to true in the SSL configuration in
      the Liberty configuration. grep -w -R 'verifyHostname' ${server.config.dir}
      For JAX-RS client applications ensure the disableCNCheck attribute is set to
      false in the webTarget element. grep -w -R 'disableCNCheck'
      ${server.config.dir}
    remediation: >
      Enable hostname verification in the SSL configuration by adding the
      verifyHostname attribute to the ssl configuration element in
      ${server.config.dir}/configDropins/overrides/<any file name>.xml <ssl ...
      verifyHostname='true' /> For JAX-RS client, enable hostname verification in
      the webTarget element by adding the disableCNCheck attribute in
      ${server.config.dir}/configDropins/overrides/<any file name>.xml <webTarget
      ... disableCNCheck='false' /> Default Value: • The default value of the
      verifyHostname attribute is false • The default value of the disableCNCheck
      attribute is false References: 1.
      https://openliberty.io/blog/2019/06/21/microprofile-rest-client-19006.html 2.
      https://openliberty.io/docs/latest/reference/config/ssl.html
    references: >
      1. https://openliberty.io/blog/2019/06/21/microprofile-rest-client-19006.html
      2. https://openliberty.io/docs/latest/reference/config/ssl.html
    impact: >
      
    compliance_mappings:
      cis:
