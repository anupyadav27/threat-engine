  - rule_id: websphere.cis.1.websphere_liberty_file_system_access_is_restricted
    title: "Ensure Websphere Liberty file system access is Restricted"
    severity: high
    category: web_server
    tech_type: websphere
    automation_type: manual
    cis_benchmark: "CIS_WEBSPHERE liberty_v1.0.0"
    cis_version: "liberty_v1.0.0"
    cis_control: "1.8"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      The permissions of files and directories underneath ${wlp.install.dir} should
      follow the principle of least privilege.
    rationale: >
      If the permissions of files and directories underneath ${wlp.install.dir} are
      too broad, unintended users may be able to modify or read those files. Write
      permission should be limited to a single administrator, read permission should
      be limited to a specifically- defined group containing users that require that
      access, and all other users should have their access entirely removed. Impact:
      If the file permissions are too broad, a security vulnerability exists where
      unintended users will have the ability to modify and read WebSphere Liberty
      files.
    audit_procedure: >
      Check the permissions of ${wlp.install.dir}: ls -l -R ${wlp.install.dir} | awk
      '{print $1}' Expected result: All files should show permissions of the form
      (d)rw(x)r-(x)---. The d(directory) and x(executable) flags may or may not
      exist depending on the file type, however the r(read) and w(write) flags
      should always appear in the same position as the above output.
    remediation: >
      Change WebSphere Liberty file system access to 750 (owner has
      read/write/execute, group has read/execute, other has no access): chmod –R 750
      ${wlp.install.dir}
    references: >
      
    impact: >
      If the file permissions are too broad, a security vulnerability exists where
      unintended users will have the ability to modify and read WebSphere Liberty
      files.
    compliance_mappings:
      cis:
        - "CIS_WEBSPHERE_liberty_v1_0_0_1_8"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_websphere_liberty_v1_0_0_1_8"
    metadata_source: generated
