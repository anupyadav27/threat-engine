version: '1.0'
provider: aws
service: fsx
checks:
- rule_id: aws.fsx.filesystem.encryption_at_rest_enabled
  for_each: aws.fsx.describe_file_systems
  severity: HIGH
  conditions:
    var: item.KmsKeyId
    op: exists
    value: null
- rule_id: aws.fsx.filesystem.private_network_only_configured
  for_each: aws.fsx.describe_file_systems
  severity: HIGH
  conditions:
    var: item.NetworkType
    op: equals
    value: SINGLE_VPC_1
- rule_id: aws.fsx.filesystem.snapshots_enabled
  for_each: aws.fsx.describe_file_systems
  severity: MEDIUM
  conditions:
    var: item.LustreConfiguration.AutomaticBackupRetentionDays
    op: gt
    value: 0
- rule_id: aws.fsx.resource.backup_enabled
  for_each: aws.fsx.describe_file_systems
  severity: MEDIUM
  conditions:
    var: item.FileSystems[].BackupEnabled
    op: is_true
    value: null
- rule_id: aws.fsx.resource.file_system_copy_tags_to_backups_enabled
  for_each: aws.fsx.describe_file_systems
  severity: MEDIUM
  conditions:
    var: item.FileSystems[].CopyTagsToBackups
    op: is_true
    value: null
- rule_id: aws.fsx.resource.file_system_copy_tags_to_volumes_enabled
  for_each: aws.fsx.describe_file_systems
  severity: MEDIUM
  conditions:
    var: item.OpenZFSConfiguration.CopyTagsToVolumes
    op: is_true
    value: null
- rule_id: aws.fsx.resource.fsx_windows_file_system_multi_az_enabled
  for_each: aws.fsx.describe_file_systems
  severity: MEDIUM
  conditions:
    all:
    - var: item.FileSystemType
      op: equals
      value: WINDOWS
    - var: item.WindowsConfiguration.DeploymentType
      op: equals
      value: MULTI_AZ_1
