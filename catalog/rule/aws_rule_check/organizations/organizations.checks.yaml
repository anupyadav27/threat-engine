version: '1.0'
provider: aws
service: organizations
checks:
- rule_id: aws.organizations.account.api_access_keys_root_or_owner_disallowed_configured
  for_each: aws.organizations.describe_effective_policy
  severity: MEDIUM
  conditions:
    var: item.PolicyContent
    op: contains
    value: '{"aws:PrincipalArn":"arn:aws:iam::*:root"}'
- rule_id: aws.organizations.account.break_glass_s_mfa_enforced
  for_each: aws.organizations.list_accounts
  severity: CRITICAL
  conditions:
    var: item.Status
    op: equals
    value: ACTIVE
- rule_id: aws.organizations.account.console_mfa_required_org_wide
  for_each: aws.organizations.describe_effective_policy
  severity: LOW
  conditions:
    all:
    - var: item.PolicyType
      op: equals
      value: MFA
    - var: item.PolicyContent
      op: contains
      value: MFARequired
- rule_id: aws.organizations.account.inactive_user_disable_threshold_configured
  for_each: aws.organizations.describe_effective_policy
  severity: MEDIUM
  conditions:
    all:
    - var: item.PolicyType
      op: equals
      value: INACTIVE_USER_DISABLE_THRESHOLD
    - var: item.PolicyContent
      op: contains
      value: inactiveUserDisableThreshold
- rule_id: aws.organizations.account.no_public_admin_roles_configured
  for_each: aws.organizations.list_accounts
  severity: HIGH
  conditions:
    var: item.State
    op: equals
    value: RUNNING
- rule_id: aws.organizations.account.organizations_lockout_threshold_configured
  for_each: aws.organizations.describe_effective_policy
  severity: MEDIUM
  conditions:
    all:
    - var: item.PolicyType
      op: equals
      value: SERVICE_CONTROL_POLICY
    - var: item.PolicyContent
      op: contains
      value: LockoutThreshold
- rule_id: aws.organizations.account.organizations_max_age_90_days_or_less_configured
  for_each: aws.organizations.list_accounts
  severity: MEDIUM
  conditions:
    all:
    - var: item.JoinedTimestamp
      op: exists
      value: null
    - var: item.JoinedTimestamp
      op: lte
      value: '90'
- rule_id: aws.organizations.account.organizations_min_length_14_configured
  for_each: aws.organizations.list_accounts
  severity: MEDIUM
  conditions:
    var: item.Name
    op: length_gte
    value: '14'
- rule_id: aws.organizations.account.organizations_part_of_organizations_configured
  for_each: aws.organizations.describe_organization
  severity: MEDIUM
  conditions:
    var: item.Organization
    op: exists
    value: null
- rule_id: aws.organizations.account.organizations_prevent_reuse_last_24_configured
  for_each: aws.organizations.list_accounts
  severity: MEDIUM
  conditions:
    var: item.JoinedTimestamp
    op: gte
    value: '{{time.now - 24h}}'
- rule_id: aws.organizations.account.organizations_require_upper_lower_number_special_configured
  for_each: aws.organizations.describe_effective_policy
  severity: MEDIUM
  conditions:
    var: item.PolicyContent
    op: contains
    value: RequireUppercaseCharacters
- rule_id: aws.organizations.account.organizations_required_guardrail_policies_enabled
  for_each: aws.organizations.describe_effective_policy
  severity: MEDIUM
  conditions:
    all:
    - var: item.PolicyType
      op: in
      value:
      - SERVICE_CONTROL_POLICY
      - TAG_POLICY
      - BACKUP_POLICY
      - AISERVICES_OPT_OUT_POLICY
    - var: item.EffectivePolicy
      op: exists
      value: null
- rule_id: aws.organizations.account.organizations_sso_federation_configured_if_supported
  for_each: aws.organizations.describe_organization
  severity: MEDIUM
  conditions:
    var: item.FeatureSet
    op: equals
    value: ALL
- rule_id: aws.organizations.account.password_policy_compliant
  for_each: aws.organizations.describe_effective_policy
  severity: HIGH
  conditions:
    all:
    - var: item.PolicyContent.MinimumPasswordLength
      op: gte
      value: '8'
    - var: item.PolicyContent.RequireSymbols
      op: is_true
      value: null
    - var: item.PolicyContent.RequireNumbers
      op: is_true
      value: null
    - var: item.PolicyContent.RequireUppercaseCharacters
      op: is_true
      value: null
    - var: item.PolicyContent.RequireLowercaseCharacters
      op: is_true
      value: null
    - var: item.PolicyContent.MaxPasswordAge
      op: lte
      value: '90'
    - var: item.PolicyContent.PasswordReusePrevention
      op: gte
      value: '5'
- rule_id: aws.organizations.account.security_services_mandatory_enabled
  for_each: aws.organizations.list_accounts
  severity: MEDIUM
  conditions:
    all:
    - var: item.State
      op: equals
      value: RUNNING
    - var: item.Status
      op: equals
      value: ACTIVE
- rule_id: aws.organizations.organization.api_access_keys_root_or_owner_disallowed_configured
  for_each: aws.organizations.describe_organization
  severity: MEDIUM
  conditions:
    var: item.Organization
    op: exists
    value: null
- rule_id: aws.organizations.organization.block_leave_org_by_policy_configured
  for_each: aws.organizations.describe_effective_policy
  severity: HIGH
  conditions:
    all:
    - var: item.PolicyType
      op: equals
      value: SERVICE_CONTROL_POLICY
    - var: item.PolicyContent
      op: contains
      value: organizations:LeaveOrganization
    - var: item.PolicyContent
      op: contains
      value: '"Effect": "Deny"'
- rule_id: aws.organizations.organization.break_glass_accounts_mfa_enforced
  for_each: aws.organizations.list_accounts
  severity: CRITICAL
  conditions:
    var: item.MFAEnabled
    op: is_true
    value: null
- rule_id: aws.organizations.organization.console_mfa_required_org_wide
  for_each: aws.organizations.describe_effective_policy
  severity: MEDIUM
  conditions:
    all:
    - var: item.PolicyType
      op: equals
      value: SERVICE_CONTROL_POLICY
    - var: item.PolicyContent
      op: contains
      value: aws:securetransport
- rule_id: aws.organizations.organization.inactive_user_disable_threshold_configured
  for_each: aws.organizations.describe_effective_policy
  severity: MEDIUM
  conditions:
    all:
    - var: item.PolicyType
      op: equals
      value: BACKUP_POLICY
    - var: item.PolicyContent
      op: contains
      value: DisableThresholdDays
- rule_id: aws.organizations.organization.organizations_all_accounts_enrolled_in_org_configured
  for_each: aws.organizations.list_accounts
  severity: MEDIUM
  conditions:
    all:
    - var: item.State
      op: equals
      value: RUNNING
    - var: item.Status
      op: equals
      value: ACTIVE
- rule_id: aws.organizations.organization.organizations_lockout_threshold_configured
  for_each: aws.organizations.describe_effective_policy
  severity: MEDIUM
  conditions:
    all:
    - var: item.PolicyType
      op: equals
      value: AISERVICES_OPT_OUT_POLICY
    - var: item.PolicyContent
      op: contains
      value: '"lockoutThreshold"'
- rule_id: aws.organizations.organization.organizations_max_age_90_days_or_less_configured
  for_each: aws.organizations.list_accounts
  severity: MEDIUM
  conditions:
    all:
    - var: item.State
      op: equals
      value: RUNNING
    - var: item.JoinedTimestamp
      op: exists
      value: null
    - var: item.JoinedTimestamp
      op: lte
      value: '90'
- rule_id: aws.organizations.organization.organizations_min_length_14_configured
  for_each: aws.organizations.describe_organization
  severity: MEDIUM
  conditions:
    var: item.Organization
    op: length_gte
    value: '14'
- rule_id: aws.organizations.organization.organizations_prevent_reuse_last_24_configured
  for_each: aws.organizations.describe_organization
  severity: MEDIUM
  conditions:
    var: item.Organization
    op: exists
    value: null
- rule_id: aws.organizations.organization.organizations_require_upper_lower_number_special_configured
  for_each: aws.organizations.describe_organization
  severity: MEDIUM
  conditions:
    var: item.Organization
    op: not_empty
    value: null
- rule_id: aws.organizations.organization.organizations_scps_enabled
  for_each: aws.organizations.describe_organization
  severity: MEDIUM
  conditions:
    var: item.AvailablePolicyTypes[].Type
    op: contains
    value: SERVICE_CONTROL_POLICY
- rule_id: aws.organizations.organization.organizations_sso_federation_configured_if_supported
  for_each: aws.organizations.describe_organization
  severity: MEDIUM
  conditions:
    var: item.FeatureSet
    op: equals
    value: ALL
- rule_id: aws.organizations.organization.password_policy_compliant
  for_each: aws.organizations.describe_effective_policy
  severity: HIGH
  conditions:
    all:
    - var: item.EffectivePolicy.PolicyContent
      op: contains
      value: '"MinimumPasswordLength": 12'
    - var: item.EffectivePolicy.PolicyContent
      op: contains
      value: '"RequireSymbols": true'
    - var: item.EffectivePolicy.PolicyContent
      op: contains
      value: '"RequireNumbers": true'
    - var: item.EffectivePolicy.PolicyContent
      op: contains
      value: '"RequireUppercaseCharacters": true'
    - var: item.EffectivePolicy.PolicyContent
      op: contains
      value: '"RequireLowercaseCharacters": true'
    - var: item.EffectivePolicy.PolicyContent
      op: contains
      value: '"MaxPasswordAge": 90'
    - var: item.EffectivePolicy.PolicyContent
      op: contains
      value: '"PasswordReusePrevention": 5'
- rule_id: aws.organizations.organization.restrict_region_usage_by_policy_where_required
  for_each: aws.organizations.describe_effective_policy
  severity: HIGH
  conditions:
    all:
    - var: item.PolicyType
      op: equals
      value: SERVICE_CONTROL_POLICY
    - var: item.PolicyContent
      op: contains
      value: aws:RequestedRegion
- rule_id: aws.organizations.organizational_unit.organizations_auto_tag_policies_enabled_if_supported
  for_each: aws.organizations.describe_organization
  severity: MEDIUM
  conditions:
    all:
    - var: item.AvailablePolicyTypes[].Type
      op: contains
      value: TAG_POLICY
    - var: item.AvailablePolicyTypes[?(@.Type == 'TAG_POLICY')].Status
      op: equals
      value: ENABLED
- rule_id: aws.organizations.organizational_unit.organizations_no_overly_permissive_exceptions_configured
  for_each: aws.organizations.describe_effective_policy
  severity: MEDIUM
  conditions:
    var: item.PolicyContent
    op: not_contains
    value: '"Effect": "Allow", "Action": "*", "Resource": "*"'
- rule_id: aws.organizations.organizational_unit.organizations_required_scps_enabled
  for_each: aws.organizations.describe_effective_policy
  severity: MEDIUM
  conditions:
    var: item.PolicyType
    op: equals
    value: SERVICE_CONTROL_POLICY
- rule_id: aws.organizations.policy.editors_rbac_least_privilege
  for_each: aws.organizations.describe_effective_policy
  severity: HIGH
  conditions:
    var: item.PolicyContent
    op: contains
    value: '"Effect":"Allow"'
- rule_id: aws.organizations.policy.organizations_no_wildcard_admin_actions_configured
  for_each: aws.organizations.describe_effective_policy
  severity: MEDIUM
  conditions:
    var: item.PolicyContent
    op: not_contains
    value: '*'
- rule_id: aws.organizations.policy.versioning_and_change_audit_enabled
  for_each: aws.organizations.describe_effective_policy
  severity: MEDIUM
  conditions:
    var: item.EffectivePolicy
    op: exists
    value: null
- rule_id: aws.organizations.resource.organizations_tags_policies_enabled_and
  for_each: aws.organizations.describe_organization
  severity: MEDIUM
  conditions:
    var: item.AvailablePolicyTypes
    op: contains
    value: TAG_POLICY
- rule_id: aws.organizations.service_control_policy.mandatory_deny_iam_star_admin_configured
  for_each: aws.organizations.describe_effective_policy
  severity: HIGH
  conditions:
    all:
    - var: item.PolicyContent
      op: contains
      value: '"Effect":"Deny"'
    - var: item.PolicyContent
      op: contains
      value: '"Action":"iam:*"'
    - var: item.PolicyContent
      op: contains
      value: '"Resource":"*"'
- rule_id: aws.organizations.service_control_policy.mandatory_require_mfa_for_console_if_supported
  for_each: aws.organizations.describe_effective_policy
  severity: CRITICAL
  conditions:
    all:
    - var: item.PolicyType
      op: equals
      value: SERVICE_CONTROL_POLICY
    - var: item.PolicyContent
      op: contains
      value: aws:MultiFactorAuthPresent
- rule_id: aws.organizations.service_control_policy.organizations_mandatory_block_disabling_guardrail_services_configured
  for_each: aws.organizations.describe_effective_policy
  severity: MEDIUM
  conditions:
    var: item.PolicyContent
    op: contains
    value: guardrail
- rule_id: aws.organizations.service_control_policy.organizations_no_allow_star_on_star_resources_configured
  for_each: aws.organizations.describe_effective_policy
  severity: MEDIUM
  conditions:
    all:
    - var: item.EffectivePolicy
      op: exists
      value: null
    - var: item.PolicyContent
      op: not_contains
      value: '"Resource": "*"'
    - var: item.PolicyContent
      op: not_contains
      value: '"Action": "*"'
