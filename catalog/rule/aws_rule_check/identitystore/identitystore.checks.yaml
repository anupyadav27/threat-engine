version: '1.0'
provider: aws
service: identitystore
checks:
- rule_id: aws.identitystore.group.admin_group_limited
  for_each: aws.identitystore.list_groups
  severity: MEDIUM
  conditions:
    var: item.DisplayName
    op: not_contains
    value: admin
- rule_id: aws.identitystore.user.mfa_enrolled
  for_each: aws.identitystore.list_users
  severity: MEDIUM
  conditions:
    var: item.Emails
    op: not_empty
    value: null
