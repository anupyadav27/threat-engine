version: '1.0'
provider: aws
service: batch
checks:
- rule_id: aws.batch.compute_environment.batch_uses_approved_launch_template_configured
  for_each: aws.batch.describe_compute_environments
  severity: MEDIUM
  conditions:
    all:
    - var: item.computeResources.launchTemplate.launchTemplateId
      op: exists
      value: null
    - var: item.computeResources.launchTemplate.version
      op: exists
      value: null
- rule_id: aws.batch.compute_environment.instance_profile_least_privilege
  for_each: aws.batch.describe_compute_environments
  severity: HIGH
  conditions:
    all:
    - var: item.computeResources.instanceRole
      op: exists
      value: null
    - var: item.computeResources.instanceRole
      op: not_contains
      value: '*'
- rule_id: aws.batch.compute_environment.no_public_ip_assigned_configured
  for_each: aws.batch.describe_compute_environments
  severity: HIGH
  conditions:
    all:
    - var: item.computeResources.publicIpAddress
      op: not_exists
      value: null
- rule_id: aws.batch.compute_environment.volumes_encrypted
  for_each: aws.batch.describe_compute_environments
  severity: HIGH
  conditions:
    all:
    - var: item.computeResources.volumes[].encrypted
      op: is_true
      value: null
- rule_id: aws.batch.jobqueue.batch_uses_approved_launch_template_configured
  for_each: aws.batch.describe_compute_environments
  severity: MEDIUM
  conditions:
    var: item.computeResources.launchTemplate.launchTemplateId
    op: exists
    value: null
- rule_id: aws.batch.jobqueue.no_public_ip_assigned_configured
  for_each: aws.batch.describe_compute_environments
  severity: HIGH
  conditions:
    var: item.computeResources.publicIpAddress
    op: not_exists
    value: null
- rule_id: aws.batch.jobqueue.volumes_encrypted
  for_each: aws.batch.describe_compute_environments
  severity: HIGH
  conditions:
    var: item.computeResources.ec2Configuration[].volumes[].encrypted
    op: is_true
    value: null
