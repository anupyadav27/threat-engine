  conditions:
    var: item.AllowFullTableExternalDataAccess
    op: is_false
    value: null
- rule_id: aws.glue.data_quality_ruleset.definition_version_pinned_configured
  for_each: aws.glue.list_data_quality_rulesets
  severity: LOW
  conditions:
    var: item.Ruleset
    op: exists
    value:
      var: item.Ruleset.Ruleset
      op: contains
      value: RulesetDefinitionVersion
- rule_id: aws.glue.data_quality_ruleset.encryption_at_rest_enabled
  for_each: aws.glue.get_catalogs
  severity: HIGH
  conditions:
    var: item.CatalogProperties.EncryptionAtRest
    op: is_true
    value: null
- rule_id: aws.glue.data_quality_ruleset.jobs_role_least_privilege
  for_each: aws.glue.get_crawlers
  severity: HIGH
  conditions:
    var: item.Role
    op: exists
    value: null
- rule_id: aws.glue.data_quality_ruleset.logging_enabled
  for_each: aws.glue.get_crawlers
  severity: MEDIUM
  conditions:
    var: item.CloudWatchLogGroupArn
    op: exists
    value: null
- rule_id: aws.glue.data_quality_ruleset.output_encrypted_private
  for_each: aws.glue.get_crawlers
  severity: HIGH
  conditions:
    var: item.CrawlerSecurityConfiguration
    op: exists
    value: null
- rule_id: aws.glue.data_quality_ruleset.output_location_private_and_encrypted
  for_each: aws.glue.get_crawlers
  severity: HIGH
  conditions:
    all:
    - var: item.CrawlerSecurityConfiguration
      op: exists
      value: null
    - var: item.CloudWatchLogGroupArn
      op: exists
      value: null
- rule_id: aws.glue.data_quality_ruleset.outputs_encrypted_and_private
  for_each: aws.glue.get_crawlers
  severity: HIGH
  conditions:
    all:
    - var: item.CrawlerSecurityConfiguration
      op: exists
      value: null
    - var: item.CloudWatchLogGroupArn
      op: exists
      value: null
- rule_id: aws.glue.data_quality_ruleset.parameters_no_plaintext_secrets_configured
  for_each: aws.glue.list_data_quality_rulesets
  severity: MEDIUM
  conditions:
    all:
    - var: item.Parameters
      op: exists
      value: null
    - var: item.Parameters
      op: not_contains
      value: Password
    - var: item.Parameters
      op: not_contains
      value: Secret
    - var: item.Parameters
      op: not_contains
      value: Key
- rule_id: aws.glue.data_quality_ruleset.rbac_least_privilege
  for_each: aws.glue.get_catalogs
  severity: HIGH
  conditions:
    var: item.AllowFullTableExternalDataAccess
    op: is_false
    value: null
- rule_id: aws.glue.data_quality_ruleset.role_least_privilege
  for_each: aws.glue.get_crawlers
  severity: HIGH
  conditions:
    var: item.Role
    op: exists
    value: null
- rule_id: aws.glue.data_quality_ruleset.run_metadata_logging_enabled
  for_each: aws.glue.get_crawlers
  severity: MEDIUM
  conditions:
    var: item.CloudWatchLogGroupArn
    op: exists
    value: null
- rule_id: aws.glue.data_quality_ruleset.source_trusted_configured
  for_each: aws.glue.get_crawlers
  severity: MEDIUM
  conditions:
    var: item.CrawlerSecurityConfiguration
