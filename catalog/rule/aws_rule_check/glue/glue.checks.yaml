version: '1.0'
provider: aws
service: glue
checks:
- rule_id: aws.glue.catalog.audit_logging_enabled
  for_each: aws.glue.get_catalogs
  severity: MEDIUM
  conditions:
    var: item.CatalogProperties
    op: exists
    value: null
- rule_id: aws.glue.catalog.change_audit_logging_enabled
  for_each: aws.glue.get_catalogs
  severity: MEDIUM
  conditions:
    var: item.CatalogProperties
    op: exists
    value: null
- rule_id: aws.glue.catalog.log_catalog_cross_account_sharing_restricted
  for_each: aws.glue.get_catalogs
  severity: MEDIUM
  conditions:
    var: item.AllowFullTableExternalDataAccess
    op: is_false
    value: null
- rule_id: aws.glue.catalog.log_catalog_cross_account_sharing_review_required
  for_each: aws.glue.get_catalogs
  severity: MEDIUM
  conditions:
    var: item.AllowFullTableExternalDataAccess
    op: is_false
    value: null
- rule_id: aws.glue.catalog.log_catalog_store_encrypted
  for_each: aws.glue.get_catalogs
  severity: HIGH
  conditions:
    var: item.CatalogProperties.encrypted
    op: is_true
    value: null
- rule_id: aws.glue.catalog.metadata_encryption_enabled
  for_each: aws.glue.get_catalogs
  severity: MEDIUM
  conditions:
    var: item.CatalogProperties.EncryptionAtRest
    op: exists
    value: null
- rule_id: aws.glue.catalog.rbac_least_privilege
  for_each: aws.glue.get_catalogs
  severity: HIGH
  conditions:
    var: item.CreateDatabaseDefaultPermissions
    op: exists
    value: null
- rule_id: aws.glue.catalog.update_rbac_least_privilege
  for_each: aws.glue.get_catalogs
  severity: HIGH
  conditions:
    var: item.CreateDatabaseDefaultPermissions.Principal.DataLakePrincipalIdentifier
    op: not_contains
    value: IAM_ALLOWED_PRINCIPALS
- rule_id: aws.glue.classifier.definition_version_pinned_configured
  for_each: aws.glue.get_classifiers
  severity: LOW
  conditions:
    var: item.Classifier
    op: exists
    value: null
- rule_id: aws.glue.classifier.rbac_least_privilege
  for_each: aws.glue.get_classifiers
  severity: HIGH
  conditions:
    var: item.Classifier
    op: exists
    value: null
- rule_id: aws.glue.classifier.source_trusted_configured
  for_each: aws.glue.get_classifiers
  severity: MEDIUM
  conditions:
    var: item.Classifier
    op: exists
    value: null
- rule_id: aws.glue.connection.credentials_in_secrets_manager_configured
  for_each: aws.glue.get_connections
  severity: MEDIUM
  conditions:
    var: item.ConnectionList[].ConnectionProperties.SECRET_ID
    op: exists
    value: null
- rule_id: aws.glue.connection.private_networking_enforced
  for_each: aws.glue.get_connections
  severity: HIGH
  conditions:
    var: item.ConnectionProperties.RequireSSL
    op: is_true
    value: null
- rule_id: aws.glue.connection.role_least_privilege
  for_each: aws.glue.get_connections
  severity: HIGH
  conditions:
    var: item.ConnectionProperties.roleArn
    op: exists
    value: null
- rule_id: aws.glue.connection.tls_required
  for_each: aws.glue.get_connections
  severity: HIGH
  conditions:
    var: item.ConnectionProperties.ENFORCE_SSL
    op: equals
    value: 'true'
- rule_id: aws.glue.crawler.logging_enabled
  for_each: aws.glue.get_crawlers
  severity: MEDIUM
  conditions:
    var: item.CloudWatchLogGroupArn
    op: exists
    value: null
- rule_id: aws.glue.crawler.network_private_only_configured
  for_each: aws.glue.get_crawlers
  severity: HIGH
  conditions:
    var: item.Crawler.CrawlerSecurityConfiguration
    op: exists
    value: null
- rule_id: aws.glue.crawler.role_least_privilege
  for_each: aws.glue.get_crawlers
  severity: HIGH
  conditions:
    var: item.Role
    op: exists
    value: null
- rule_id: aws.glue.crawler.scope_restricted_to_allowlist_configured
  for_each: aws.glue.get_crawlers
  severity: MEDIUM
  conditions:
    var: item.Configuration
    op: contains
    value: AllowList
- rule_id: aws.glue.data_catalogs_not_publicly_accessible.data_catalogs_not_publicly_accessible_configured
  for_each: aws.glue.get_catalogs
