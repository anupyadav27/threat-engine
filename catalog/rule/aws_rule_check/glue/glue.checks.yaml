  for_each: aws.glue.get_crawlers
  severity: MEDIUM
  conditions:
    var: item.CloudWatchLogGroupArn
    op: exists
    value: null
- rule_id: aws.glue.workflow.private_networking_enforced
  for_each: aws.glue.get_connections
  severity: HIGH
  conditions:
    var: item.ConnectionProperties.JDBC_ENFORCE_SSL
    op: equals
    value: 'true'
