version: '1.0'
provider: aws
service: elasticbeanstalk
checks:
- rule_id: aws.elasticbeanstalk.application.env_secrets_from_vault_only_configured
  for_each: aws.elasticbeanstalk.describe_configuration_settings_for_environment
  severity: MEDIUM
  conditions:
    all:
    - var: item.OptionSettings[?(@.Namespace == 'aws:elasticbeanstalk:application:environment' && @.OptionName == 'SECRETS_MANAGER_VAULT_ID')].Value
      op: exists
      value: null
    - var: item.OptionSettings[?(@.Namespace == 'aws:elasticbeanstalk:application:environment' && @.OptionName == 'SECRETS_MANAGER_VAULT_ID')].Value
      op: not_empty
      value: null
- rule_id: aws.elasticbeanstalk.application.logging_enabled
  for_each: aws.elasticbeanstalk.describe_configuration_settings_for_environment
  severity: MEDIUM
  conditions:
    var: item.OptionSettings[?(@.Namespace=='aws:elasticbeanstalk:cloudwatch:logs' && @.OptionName=='StreamLogs')].Value
    op: contains
    value: 'true'
- rule_id: aws.elasticbeanstalk.application.private_networking_enforced
  for_each: aws.elasticbeanstalk.describe_configuration_settings_for_environment
  severity: HIGH
  conditions:
    var: item.OptionSettings[?(@.Namespace=='aws:ec2:vpc' && @.OptionName=='VPCId')].Value
    op: exists
    value: null
- rule_id: aws.elasticbeanstalk.application.tls_min_1_2_enforced
  for_each: aws.elasticbeanstalk.describe_configuration_settings_for_environment
  severity: HIGH
  conditions:
    all:
    - var: item.OptionSettings[?Namespace=='aws:elb:listener:443' && OptionName=='ListenerProtocol'].Value[]
      op: contains
      value: HTTPS
    - var: item.OptionSettings[?Namespace=='aws:elb:listener:443' && OptionName=='InstancePort'].Value[]
      op: not_empty
      value: null
    - var: item.OptionSettings[?Namespace=='aws:elb:listener:443' && OptionName=='InstanceProtocol'].Value[]
      op: contains
      value: HTTPS
    - var: item.OptionSettings[?Namespace=='aws:elb:policies:SSL' && OptionName=='SSLReferencePolicy'].Value[]
      op: contains
      value: ELBSecurityPolicy-TLS-1-2-2017-01
- rule_id: aws.elasticbeanstalk.application_version.elasticbeanstalk_artifact_encrypted
  for_each: aws.elasticbeanstalk.describe_application_versions
  severity: HIGH
  conditions:
    var: item.SourceBundle.S3Bucket
    op: exists
    value: null
- rule_id: aws.elasticbeanstalk.application_version.elasticbeanstalk_immutability_enabled
  for_each: aws.elasticbeanstalk.describe_applications
  severity: MEDIUM
  conditions:
    var: item.ResourceLifecycleConfig.ServiceRole
    op: exists
    value: null
- rule_id: aws.elasticbeanstalk.environment.env_secrets_from_vault_only_configured
  for_each: aws.elasticbeanstalk.describe_configuration_settings_for_environment
  severity: MEDIUM
  conditions:
    all:
    - var: item.OptionSettings
      op: not_empty
      value: null
    - any:
      - var: item.OptionSettings[].Namespace
        op: contains
        value: aws:elasticbeanstalk:application:environment
- rule_id: aws.elasticbeanstalk.environment.logging_enabled
  for_each: aws.elasticbeanstalk.describe_configuration_settings_for_environment
  severity: MEDIUM
  conditions:
    var: item.OptionSettings[?Namespace=='aws:elasticbeanstalk:cloudwatch:logs' && OptionName=='StreamLogs'].Value
    op: equals
    value: 'true'
- rule_id: aws.elasticbeanstalk.environment.private_networking_enforced
  for_each: aws.elasticbeanstalk.describe_configuration_settings_for_environment
  severity: HIGH
  conditions:
    var: item.OptionSettings[?(@.Namespace=='aws:ec2:vpc' && @.OptionName=='VPCId')].Value
    op: exists
    value: null
- rule_id: aws.elasticbeanstalk.environment.tls_min_1_2_enforced
  for_each: aws.elasticbeanstalk.describe_configuration_settings_for_environment
  severity: HIGH
  conditions:
    all:
    - var: item.OptionSettings[?(@.Namespace=='aws:elb:listener' && @.OptionName=='ListenerProtocol')].Value
      op: contains
      value: HTTPS
    - var: item.OptionSettings[?(@.Namespace=='aws:elb:listener' && @.OptionName=='ListenerProtocol' && @.Value=='HTTPS')].OptionSettings[?(@.OptionName=='PolicyNames')].Value
      op: contains
      value: ELBSecurityPolicy-TLS-1-2-2017-01
- rule_id: aws.elasticbeanstalk.resource.elasticbeanstalk_managed_updates_enabled
  for_each: aws.elasticbeanstalk.describe_configuration_settings_for_environment
  severity: MEDIUM
  conditions:
    var: item.OptionSettings[?(@.Namespace=='aws:elasticbeanstalk:managedactions' && @.OptionName=='ManagedActionsEnabled')].Value
    op: equals
    value: 'true'
- rule_id: aws.elasticbeanstalk.resource.environment_cloudwatch_logging_enabled
  for_each: aws.elasticbeanstalk.describe_configuration_settings_for_environment
  severity: MEDIUM
  conditions:
    all:
    - var: item.OptionSettings
      op: exists
      value: null
    - var: item.OptionSettings[].Namespace
      op: contains
      value: aws:elasticbeanstalk:cloudwatch:logs
