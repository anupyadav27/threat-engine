version: '1.0'
provider: aws
service: savingsplans
checks:
- rule_id: aws.savingsplans.savingsplan.billing_admins_mfa_required
  for_each: aws.savingsplans.describe_savings_plans
  severity: CRITICAL
  conditions:
    all:
    - var: item.tags.BillingAdminsMFA
      op: exists
      value: null
    - var: item.tags.BillingAdminsMFA
      op: equals
      value: required
- rule_id: aws.savingsplans.savingsplan.purchase_permissions_restricted
  for_each: aws.savingsplans.describe_savings_plans
  severity: HIGH
  conditions:
    var: item.tags.Environment
    op: exists
    value: null
- rule_id: aws.savingsplans.savingsplan.savingsplans_approval_workflow_required
  for_each: aws.savingsplans.describe_savings_plans
  severity: MEDIUM
  conditions:
    var: item.tags.ApprovalWorkflow
    op: exists
    value: null
