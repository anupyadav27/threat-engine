version: '1.0'
provider: aws
service: emr
checks:
- rule_id: aws.emr.cluster.account_public_block_enabled
  for_each: aws.emr.get_block_public_access_configuration
  severity: HIGH
  conditions:
    var: item.BlockPublicAccessConfiguration.BlockPublicSecurityGroupRules
    op: is_true
    value: null
- rule_id: aws.emr.cluster.master_nodes_no_public_ip_configured
  for_each: aws.emr.describe_cluster
  severity: HIGH
  conditions:
    var: item.Cluster.Ec2InstanceAttributes.EmrManagedMasterSecurityGroup
    op: exists
    value: null
- rule_id: aws.emr.cluster.publicly_accesible_configured
  for_each: aws.emr.describe_cluster
  severity: HIGH
  conditions:
    var: item.Cluster.PubliclyAccessible
    op: is_false
    value: null
