version: '1.0'
provider: aws
service: accessanalyzer
checks:
- rule_id: aws.accessanalyzer.resource.access_analyzer_enabled
  for_each: aws.accessanalyzer.list_analyzers
  severity: MEDIUM
  conditions:
    all:
    - var: item.Status
      op: equals
      value: ACTIVE
    - var: item.Enabled
      op: is_true
      value: null
- rule_id: aws.accessanalyzer.resource.access_analyzer_enabled_without_findings
  for_each: aws.accessanalyzer.list_analyzers
  severity: MEDIUM
  conditions:
    all:
    - var: item.Status
      op: equals
      value: ACTIVE
    - var: item.Enabled
      op: is_true
      value: null
