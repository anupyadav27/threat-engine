version: '1.0'
provider: aws
service: iam
checks:
- rule_id: aws.iam.account.management_enabled
  for_each: aws.iam.get_account_authorization_details_policies
  severity: MEDIUM
  conditions:
    var: item.Arn
    op: is_true
- rule_id: aws.iam.account_password_policy.no_anonymous_access_enforced
  for_each: aws.iam.get_account_password_policy
  severity: MEDIUM
  conditions:
    var: item.AllowUsersToChangePassword
    op: is_true
- rule_id: aws.iam.account_password_policy.maximum_password_attempts_configured
  for_each: aws.iam.get_account_password_policy
  severity: MEDIUM
  conditions:
    var: item.AllowUsersToChangePassword
    op: is_true
- rule_id: aws.iam.password_policy.hide_password_feedback_configured
  for_each: aws.iam.get_account_password_policy
  severity: MEDIUM
  conditions:
    var: item.AllowUsersToChangePassword
    op: is_true
- rule_id: aws.iam.policy.action_configured
  for_each: aws.iam.list_policy_versions
  severity: MEDIUM
  conditions:
    var: item.CreateDate
    op: is_true
- rule_id: aws.iam.policy.change_approval_configured
  for_each: aws.iam.list_policy_versions
  severity: MEDIUM
  conditions:
    var: item.CreateDate
    op: is_true
- rule_id: aws.iam.policy.condition_external_accounts_configured
  for_each: aws.iam.list_policy_versions
  severity: MEDIUM
  conditions:
    var: item.CreateDate
    op: is_true
- rule_id: aws.iam.policy.condition_source_ip_configured
  for_each: aws.iam.list_policy_versions
  severity: MEDIUM
  conditions:
    var: item.CreateDate
    op: is_true
- rule_id: aws.iam.policy.deny_maintenance_tools_restricted
  for_each: aws.iam.list_policy_versions
  severity: MEDIUM
  conditions:
    var: item.CreateDate
    op: is_true
- rule_id: aws.iam.policy.principal_condition_configured
  for_each: aws.iam.list_policy_versions
  severity: MEDIUM
  conditions:
    var: item.CreateDate
    op: is_true
- rule_id: aws.iam.role.trust_policy_boundary_configured
  for_each: aws.iam.list_roles
  severity: MEDIUM
  conditions:
    var: item.Arn
    op: is_true
- rule_id: aws.iam.role.trust_policy_change_control_configured
  for_each: aws.iam.list_roles
  severity: MEDIUM
  conditions:
    var: item.Arn
    op: is_true
- rule_id: aws.iam.role.trust_policy_token_actions_configured
  for_each: aws.iam.list_roles
  severity: MEDIUM
  conditions:
    var: item.Arn
    op: is_true
- rule_id: aws.iam.user.password_policy_hard_expiry_configured
  for_each: aws.iam.list_users
  severity: MEDIUM
  conditions:
    var: item.Arn
    op: is_true
- rule_id: aws.iam.user_settings.password_reset_notification_enabled
  for_each: aws.iam.get_account_password_policy
  severity: MEDIUM
  conditions:
    var: item.AllowUsersToChangePassword
    op: is_true
