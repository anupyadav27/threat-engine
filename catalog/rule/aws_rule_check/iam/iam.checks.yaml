version: '1.0'
provider: aws
service: iam
checks:
- rule_id: aws.iam.access_analyzer_active_status_all_regions.access_analyzer_active_status_all_regions_configured
  for_each: aws.iam.get_account_summary
  severity: MEDIUM
  conditions:
    var: item.SummaryMap.AccessAnalyzersEnabledPerRegion
    op: is_true
    value: null
- rule_id: aws.iam.avoidrootusage.avoid_root_usage_configured
  for_each: aws.iam.get_account_authorization_details
  severity: MEDIUM
  conditions:
    var: item.UserDetailList[?UserName=='root'].UserPolicyList
    op: is_empty
    value: null
- rule_id: aws.iam.aws.attached_policy_no_administrative_privileges_configured
  for_each: aws.iam.get_account_authorization_details
  severity: HIGH
  conditions:
    any:
    - var: item.GroupDetailList[].AttachedManagedPolicies[].PolicyName
      op: not_contains
      value: AdministratorAccess
    - var: item.GroupDetailList[].AttachedManagedPolicies[].PolicyName
      op: not_contains
      value: AdministratorAccess
    - var: item.UserDetailList[].AttachedManagedPolicies[].PolicyName
      op: not_contains
      value: AdministratorAccess
    - var: item.RoleDetailList[].AttachedManagedPolicies[].PolicyName
      op: not_contains
      value: AdministratorAccess
- rule_id: aws.iam.certificate.expiration_removal_monitored
  for_each: aws.iam.get_account_authorization_details
  severity: MEDIUM
  conditions:
    var: item.SSHPublicKey
    op: exists
    value: null
- rule_id: aws.iam.certificate.expired_removal_monitored
  for_each: aws.iam.get_account_authorization_details
  severity: MEDIUM
  conditions:
    any:
    - var: item.UserDetailList[].SSHPublicKeyList[].Status
      op: equals
      value: Active
    - var: item.RoleDetailList[].SSHPublicKeyList[].Status
      op: equals
      value: Active
- rule_id: aws.iam.customer.attached_policy_no_administrative_privileges_configured
  for_each: aws.iam.get_account_authorization_details_policies
  severity: HIGH
  conditions:
    all:
    - var: item.AttachmentCount
      op: gt
      value: 0
    - any:
      - var: item.PolicyName
        op: contains
        value: AdministratorAccess
      - var: item.PolicyName
        op: contains
        value: FullAccess
- rule_id: aws.iam.group.attached_policies_not_admin_star_configured
  for_each: aws.iam.get_account_authorization_details
  severity: MEDIUM
  conditions:
    all:
    - var: item.GroupList[].AttachedManagedPolicies[].PolicyName
      op: not_contains
      value: AdministratorAccess
    - var: item.GroupList[].AttachedManagedPolicies[].PolicyName
      op: not_contains
      value: AdministratorAccess-*
- rule_id: aws.iam.group.external_sharing_restricted_if_supported
  for_each: aws.iam.get_account_authorization_details
  severity: MEDIUM
  conditions:
    var: item.GroupDetailList[].AttachedManagedPolicies[].PolicyName
    op: contains
    value: IAMAccessAnalyzerFullAccess
- rule_id: aws.iam.group.has_users_configured
  for_each: aws.iam.get_account_authorization_details
  severity: MEDIUM
  conditions:
    var: item.GroupList[].Users
    op: not_empty
    value: null
- rule_id: aws.iam.group.membership_review_enabled_if_supported
  for_each: aws.iam.get_account_authorization_details
  severity: MEDIUM
  conditions:
    var: item.GroupDetailList[].GroupName
    op: exists
    value: null
- rule_id: aws.iam.group.no_inline_policies_configured
  for_each: aws.iam.get_account_authorization_details
  severity: MEDIUM
  conditions:
    all:
    - var: item.GroupList[].GroupName
      op: exists
      value: null
    - var: item.GroupDetailList[?(@.GroupName == this.GroupName)].GroupPolicyList
      op: is_empty
      value: null
- rule_id: aws.iam.inline.policy_no_administrative_privileges_configured
  for_each: aws.iam.get_account_authorization_details
  severity: HIGH
  conditions:
    all:
    - var: item.UserDetailList[].UserPolicyList[].PolicyDocument.Statement[].Effect
      op: not_equals
      value: '*'
    - var: item.GroupDetailList[].GroupPolicyList[].PolicyDocument.Statement[].Effect
      op: not_equals
      value: '*'
    - var: item.RoleDetailList[].RolePolicyList[].PolicyDocument.Statement[].Effect
      op: not_equals
      value: '*'
- rule_id: aws.iam.instanceprofile.no_admin_star_policies_configured
  for_each: aws.iam.get_account_authorization_details
  severity: MEDIUM
  conditions:
    any:
    - var: item.RoleDetailList[].AttachedManagedPolicies[].PolicyName
      op: not_contains
      value: AdministratorAccess
    - var: item.RoleDetailList[].AttachedManagedPolicies[].PolicyName
      op: not_contains
      value: '*'
- rule_id: aws.iam.instanceprofile.no_instance_profile_with_admin_star_configured
  for_each: aws.iam.get_account_authorization_details
  severity: MEDIUM
  conditions:
    all:
    - var: item.RoleDetailList[].InstanceProfileList[].Arn
      op: exists
      value: null
    - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Action
      op: not_contains
      value: sts:AssumeRole
    - var: item.RoleDetailList[].AttachedManagedPolicies[].PolicyName
      op: not_equals
      value: AdministratorAccess
    - var: item.RoleDetailList[].RolePolicyList[].PolicyDocument.Statement[].Effect
      op: not_equals
      value: Allow
    - var: item.RoleDetailList[].RolePolicyList[].PolicyDocument.Statement[].Action
      op: not_contains
      value: '*'
    - var: item.RoleDetailList[].RolePolicyList[].PolicyDocument.Statement[].Resource
      op: not_contains
      value: '*'
- rule_id: aws.iam.instanceprofile.role_enabled
  for_each: aws.iam.get_account_authorization_details
  severity: HIGH
  conditions:
    var: item.RoleDetailList[].InstanceProfileList[].Roles[].Arn
    op: exists
    value: null
- rule_id: aws.iam.instanceprofile.role_policies_least_privilege
  for_each: aws.iam.get_account_authorization_details
  severity: HIGH
  conditions:
    all:
    - var: item.RoleDetailList[].InstanceProfileList[].Arn
      op: exists
      value: null
    - var: item.RoleDetailList[].InstanceProfileList[].Arn
      op: not_empty
      value: null
- rule_id: aws.iam.key.monitored
  for_each: aws.iam.get_account_authorization_details
  severity: MEDIUM
  conditions:
    all:
    - var: item.UserDetailList[].SSHPublicKey
      op: exists
      value: null
    - var: item.UserDetailList[].SSHPublicKey[].Status
      op: equals
      value: Active
- rule_id: aws.iam.key.rotation_90_days_configured
  for_each: aws.iam.get_account_authorization_details
  severity: MEDIUM
  conditions:
    all:
    - var: item.UserDetailList[].CreateDate
      op: exists
      value: null
    - var: item.UserDetailList[].SSHPublicKey
      op: not_exists
      value: null
- rule_id: aws.iam.managedpolicy.editors_rbac_least_privilege
  for_each: aws.iam.get_account_authorization_details_policies
  severity: HIGH
  conditions:
    all:
    - var: item.PolicyName
      op: not_contains
      value: AdministratorAccess
    - var: item.PolicyName
      op: not_contains
      value: PowerUserAccess
    - var: item.PolicyName
      op: not_contains
      value: IAMFullAccess
- rule_id: aws.iam.managedpolicy.no_policy_allows_without_constraints_configured
  for_each: aws.iam.get_account_authorization_details_policies
  severity: HIGH
  conditions:
    all:
    - var: item.PolicyVersionList[].Document.Statement[].Effect
      op: not_equals
      value: '*'
    - var: item.PolicyVersionList[].Document.Statement[].Resource
      op: not_equals
      value: '*'
    - var: item.PolicyVersionList[].Document.Statement[].Action
      op: not_equals
      value: '*'
- rule_id: aws.iam.managedpolicy.policy_conditions_used_if_applicable_configured
  for_each: aws.iam.get_account_authorization_details_policies
  severity: HIGH
  conditions:
    var: item.PolicyVersionList[].Document.Statement[].Condition
    op: exists
    value: null
- rule_id: aws.iam.managedpolicy.policy_no_action_star_on_resource_star_configured
  for_each: aws.iam.get_account_authorization_details_policies
  severity: HIGH
  conditions:
    all:
    - var: item.PolicyVersionList[].Document.Statement[].Effect
      op: not_contains
      value: Allow
    - var: item.PolicyVersionList[].Document.Statement[].Action
      op: not_contains
      value: '*'
    - var: item.PolicyVersionList[].Document.Statement[].Resource
      op: not_contains
      value: '*'
- rule_id: aws.iam.managedpolicy.policy_no_wildcard_admin_actions_configured
  for_each: aws.iam.get_account_authorization_details_policies
  severity: HIGH
  conditions:
    var: item.PolicyVersionList[].Document.Statement[].Action
    op: not_contains
    value: '*'
- rule_id: aws.iam.managedpolicy.policy_resource_constraints_present
  for_each: aws.iam.get_account_authorization_details_policies
  severity: HIGH
  conditions:
    var: item.PolicyVersionList[].Document.Statement[].Resource
    op: exists
    value: null
- rule_id: aws.iam.managedpolicy.versioning_and_change_audit_enabled
  for_each: aws.iam.get_account_authorization_details_policies
  severity: MEDIUM
  conditions:
    all:
    - var: item.PolicyVersionList
      op: exists
      value: null
    - var: item.PolicyVersionList
      op: not_empty
      value: null
- rule_id: aws.iam.no.root_access_key_configured
  for_each: aws.iam.get_account_summary
  severity: MEDIUM
  conditions:
    var: item.SummaryMap.AccountAccessKeysPresent
    op: equals
    value: 0
- rule_id: aws.iam.no_guest_accounts_with_permissions.no_guest_accounts_with_permissions_configured
  for_each: aws.iam.get_account_authorization_details
  severity: HIGH
  conditions:
    all:
    - var: item.UserDetailList[].UserName
      op: not_contains
      value: guest
    - var: item.UserDetailList[].AttachedManagedPolicies
      op: is_empty
      value: null
    - var: item.UserDetailList[].UserPolicyList
      op: is_empty
      value: null
- rule_id: aws.iam.oidcprovider.allowed_client_ids_audiences_restricted
  for_each: aws.iam.get_account_authorization_details
  severity: MEDIUM
  conditions:
    all:
    - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Condition.StringEquals.sts:aud
      op: exists
      value: null
    - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Condition.StringEquals.sts:aud
      op: not_contains
      value: '*'
- rule_id: aws.iam.oidcprovider.certificate_issuer_https_and_matches_discovery_verified
  for_each: aws.iam.get_account_authorization_details
  severity: MEDIUM
  conditions:
    all:
    - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Principal.Federated
      op: contains
      value: oidc.eks.
    - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Condition.StringEquals
      op: exists
      value: null
- rule_id: aws.iam.oidcprovider.thumbprints_or_jwks_pinning_configured
  for_each: aws.iam.get_account_authorization_details
  severity: MEDIUM
  conditions:
    any:
    - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Condition.StringEquals.oidc.eks.us-east-1.amazonaws.com.id/sub
      op: exists
      value: null
    - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Condition.StringEquals.oidc.eks.us-east-1.amazonaws.com.id/sub
      op: not_empty
      value: null
- rule_id: aws.iam.oidcprovider.token_lifetime_configured
  for_each: aws.iam.get_account_authorization_details
  severity: MEDIUM
  conditions:
    var: item.RoleDetailList[?(@.AssumeRolePolicyDocument.Statement[?(@.Principal.Federated)])].MaxSessionDuration
    op: exists
    value: null
- rule_id: aws.iam.password.policy_lowercase_configured
  for_each: aws.iam.get_account_password_policy
  severity: HIGH
  conditions:
    var: item.RequireLowercaseCharacters
    op: is_true
    value: null
- rule_id: aws.iam.password.policy_minimum_length_14_configured
  for_each: aws.iam.get_account_password_policy
  severity: HIGH
  conditions:
    all:
    - var: item.MinimumPasswordLength
      op: gte
      value: 14
- rule_id: aws.iam.password.policy_number_configured
  for_each: aws.iam.get_account_password_policy
  severity: HIGH
  conditions:
    var: item.RequireNumbers
    op: is_true
    value: null
- rule_id: aws.iam.password.policy_reuse_24_configured
  for_each: aws.iam.get_account_password_policy
  severity: HIGH
  conditions:
    var: item.PasswordReusePrevention
    op: gte
    value: 24
- rule_id: aws.iam.password.policy_symbol_configured
  for_each: aws.iam.get_account_password_policy
  severity: HIGH
  conditions:
    var: item.RequireSymbols
    op: is_true
    value: null
- rule_id: aws.iam.password.policy_uppercase_configured
  for_each: aws.iam.get_account_password_policy
  severity: HIGH
  conditions:
    var: item.RequireUppercaseCharacters
    op: is_true
    value: null
- rule_id: aws.iam.policy.allows_privilege_escalation_configured
  for_each: aws.iam.get_account_authorization_details
  severity: HIGH
  conditions:
    all:
    - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Action
      op: not_contains
      value: iam:PassRole
    - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Action
      op: not_contains
      value: iam:CreatePolicyVersion
    - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Action
      op: not_contains
      value: iam:SetDefaultPolicyVersion
    - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Action
      op: not_contains
      value: iam:AttachUserPolicy
    - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Action
      op: not_contains
      value: iam:AttachGroupPolicy
    - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Action
      op: not_contains
      value: iam:AttachRolePolicy
    - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Action
      op: not_contains
      value: iam:PutUserPolicy
    - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Action
      op: not_contains
      value: iam:PutGroupPolicy
    - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Action
      op: not_contains
      value: iam:PutRolePolicy
    - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Action
      op: not_contains
      value: iam:AddUserToGroup
    - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Action
      op: not_contains
      value: iam:UpdateAssumeRolePolicy
    - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Action
      op: not_contains
      value: iam:CreateLoginProfile
    - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Action
      op: not_contains
      value: iam:UpdateLoginProfile
    - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Action
      op: not_contains
      value: iam:AttachRolePolicy
- rule_id: aws.iam.policy.attached_only_to_group_or_roles_configured
  for_each: aws.iam.get_account_authorization_details
  severity: HIGH
  conditions:
    all:
    - var: item.UserDetailList
      op: is_empty
      value: null
    - var: item.GroupDetailList
      op: not_empty
      value: null
- rule_id: aws.iam.policy.awscloudshell_full_access_restriction_configured
  for_each: aws.iam.get_account_authorization_details_policies
  severity: MEDIUM
  conditions:
    all:
    - var: item.PolicyName
      op: not_equals
      value: AWSCloudShellFullAccess
    - var: item.AttachmentCount
      op: equals
      value: 0
- rule_id: aws.iam.policy.awscloudshellfullaccess_attachment_configured
  for_each: aws.iam.get_account_authorization_details_policies
  severity: MEDIUM
  conditions:
    all:
    - var: item.PolicyName
      op: not_equals
      value: AWSCloudShellFullAccess
    - var: item.AttachmentCount
      op: equals
      value: 0
- rule_id: aws.iam.policy.conditions_used_if_applicable_configured
  for_each: aws.iam.get_account_authorization_details_policies
  severity: MEDIUM
  conditions:
    var: item.PolicyVersionList[].Document.Statement[].Condition
    op: not_empty
    value: null
- rule_id: aws.iam.policy.editors_rbac_least_privilege
  for_each: aws.iam.get_account_authorization_details
  severity: HIGH
  conditions:
    all:
    - var: item.UserDetailList[].AttachedManagedPolicies[].PolicyName
      op: not_in
      value:
      - IAMFullAccess
      - AdministratorAccess
    - var: item.GroupDetailList[].AttachedManagedPolicies[].PolicyName
      op: not_in
      value:
      - IAMFullAccess
      - AdministratorAccess
    - var: item.RoleDetailList[].AttachedManagedPolicies[].PolicyName
      op: not_in
      value:
      - IAMFullAccess
      - AdministratorAccess
- rule_id: aws.iam.policy.execution_roles_least_privilege
  for_each: aws.iam.get_account_authorization_details
  severity: HIGH
  conditions:
    all:
    - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Effect
      op: equals
      value: Allow
    - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Principal.Service
      op: contains
      value: lambda.amazonaws.com
    - var: item.RoleDetailList[].AttachedManagedPolicies[].PolicyName
      op: not_contains
      value: AdministratorAccess
- rule_id: aws.iam.policy.expires_passwords_within_90_days_or_less_configured
  for_each: aws.iam.get_account_password_policy
  severity: CRITICAL
  conditions:
    all:
    - var: item.ExpirePasswords
      op: is_true
      value: null
    - var: item.MaxPasswordAge
      op: lte
      value: 90
- rule_id: aws.iam.policy.least_privilege_audit_configured
  for_each: aws.iam.get_account_authorization_details_policies
  severity: MEDIUM
  conditions:
    var: item.PolicyName
    op: contains
    value: Audit
- rule_id: aws.iam.policy.minimum_length_14_configured
  for_each: aws.iam.get_account_password_policy
  severity: MEDIUM
  conditions:
    all:
    - var: item.MinimumPasswordLength
      op: gte
      value: '14'
- rule_id: aws.iam.policy.monitored
  for_each: aws.iam.get_account_authorization_details_policies
  severity: MEDIUM
  conditions:
    var: item.Tags.Environment
    op: exists
    value: null
- rule_id: aws.iam.policy.no_action_star_on_resource_star_configured
  for_each: aws.iam.get_account_authorization_details_policies
  severity: MEDIUM
  conditions:
    all:
    - var: item.PolicyVersionList[].Document.Statement[].Action
      op: not_contains
      value: '*'
    - var: item.PolicyVersionList[].Document.Statement[].Resource
      op: not_contains
      value: '*'
- rule_id: aws.iam.policy.no_administrative_privileges_configured
  for_each: aws.iam.get_account_authorization_details
  severity: HIGH
  conditions:
    all:
    - var: item.AttachedManagedPolicies
      op: not_empty
      value: null
    - any:
      - var: item.AttachedManagedPolicies[].PolicyName
        op: not_contains
        value: AdministratorAccess
      - var: item.AttachedManagedPolicies[].PolicyName
        op: not_contains
        value: PowerUserAccess
- rule_id: aws.iam.policy.no_full_access_to_cloudtrail_configured
  for_each: aws.iam.get_account_authorization_details_policies
  severity: MEDIUM
  conditions:
    all:
    - var: item.PolicyVersionList[].Document.Statement[].Effect
      op: not_equals
      value: Allow
    - var: item.PolicyVersionList[].Document.Statement[].Action
      op: not_contains
      value: cloudtrail:*
    - var: item.PolicyVersionList[].Document.Statement[].Resource
      op: not_contains
      value: '*'
- rule_id: aws.iam.policy.no_full_admin_privileges_enabled
  for_each: aws.iam.get_account_authorization_details
  severity: HIGH
  conditions:
    all:
    - var: item.UserDetailList[].AttachedManagedPolicies[].PolicyName
      op: not_contains
      value: AdministratorAccess
    - var: item.GroupDetailList[].AttachedManagedPolicies[].PolicyName
      op: not_contains
      value: AdministratorAccess
    - var: item.RoleDetailList[].AttachedManagedPolicies[].PolicyName
      op: not_contains
      value: AdministratorAccess
- rule_id: aws.iam.policy.no_policies_without_constraints_configured
  for_each: aws.iam.get_account_authorization_details_policies
  severity: MEDIUM
  conditions:
    var: item.AttachmentCount
    op: gt
    value: 0
- rule_id: aws.iam.policy.no_wildcard_admin_actions_configured
  for_each: aws.iam.get_account_authorization_details_policies
  severity: MEDIUM
  conditions:
    var: item.PolicyVersionList[].Document.Statement[].Action
    op: not_contains
    value: '*'
- rule_id: aws.iam.policy.overly_permissive_configured
  for_each: aws.iam.get_account_authorization_details_policies
  severity: MEDIUM
  conditions:
    var: item.PolicyVersionList[].Document.Statement[].Effect
    op: not_contains
    value: '*'
- rule_id: aws.iam.policy.policy_enabled
  for_each: aws.iam.get_account_authorization_details_policies
  severity: HIGH
  conditions:
    var: item.IsAttachable
    op: is_true
    value: null
- rule_id: aws.iam.policy.resource_constraints_present
  for_each: aws.iam.get_account_authorization_details_policies
  severity: MEDIUM
  conditions:
    var: item.PolicyVersionList[].Document.Statement[].Resource
    op: not_in
    value:
    - '*'
- rule_id: aws.iam.policy.reuse_24_configured
  for_each: aws.iam.get_account_authorization_details_policies
  severity: MEDIUM
  conditions:
    var: item.AttachmentCount
    op: gt
    value: 1
- rule_id: aws.iam.policy.security_check_full_admin_privileges_configured
  for_each: aws.iam.get_account_authorization_details_policies
  severity: HIGH
  conditions:
    all:
    - var: item.PolicyName
      op: not_equals
      value: AdministratorAccess
    - var: item.PolicyName
      op: not_contains
      value: FullAccess
- rule_id: aws.iam.policy.versioning_and_change_audit_enabled
  for_each: aws.iam.get_account_authorization_details_policies
  severity: MEDIUM
  conditions:
    all:
    - var: item.PolicyVersionList
      op: not_empty
      value: null
    - var: item.PolicyVersionList[].IsDefaultVersion
      op: contains
      value: true
- rule_id: aws.iam.policy.workflow_storage_encrypted
  for_each: aws.iam.get_account_authorization_details_policies
  severity: HIGH
  conditions:
    var: item.PolicyVersionList[].Document.Statement[].Effect
    op: not_contains
    value: Deny
- rule_id: aws.iam.resource.access_analyzer_external_all_regions_configured
  for_each: aws.iam.get_account_authorization_details
  severity: MEDIUM
  conditions:
    all:
    - var: item.RoleDetailList[].Arn
      op: contains
      value: access-analyzer
    - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Condition.StringEquals.sts:ExternalId
      op: exists
      value: null
    - var: item.RoleDetailList[].AssumeRolePolicyDocument.Statement[].Resource
      op: contains
      value: '*'
- rule_id: aws.iam.resource.console_mfa_enabled
  for_each: aws.iam.get_account_authorization_details
  severity: CRITICAL
