version: '1.0'
provider: aws
service: kms
checks:
- rule_id: aws.kms.alias.default_keys_disabled_if_cmek_required
  for_each: aws.kms.list_aliases
  severity: MEDIUM
  conditions:
    all:
    - var: item.AliasName
      op: not_contains
      value: alias/aws/
    - var: item.TargetKeyId
      op: not_contains
      value: arn:aws:kms
    - var: item.TargetKeyId
      op: length_gte
      value: 36
- rule_id: aws.kms.alias.key_has_alias_configured
  for_each: aws.kms.list_aliases
  severity: MEDIUM
  conditions:
    var: item.AliasName
    op: exists
    value: null
- rule_id: aws.kms.alias.logging_enabled
  for_each: aws.kms.list_aliases
  severity: MEDIUM
  conditions:
    var: item.AliasName
    op: exists
    value: null
- rule_id: aws.kms.alias.points_to_active_key_configured
  for_each: aws.kms.list_aliases
  severity: MEDIUM
  conditions:
    all:
    - var: item.TargetKeyId
      op: exists
      value: null
    - var: item.TargetKeyId
      op: not_equals
      value: alias/aws/kms
- rule_id: aws.kms.grant.constraints_present
  for_each: aws.kms.list_grants
  severity: MEDIUM
  conditions:
    var: item.Constraints
    op: exists
    value: null
- rule_id: aws.kms.grant.ee_principal_valid
  for_each: aws.kms.list_grants
  severity: MEDIUM
  conditions:
    all:
    - var: item.GranteePrincipal
      op: not_contains
      value: '*'
    - var: item.GranteePrincipal
      op: not_contains
      value: '?'
- rule_id: aws.kms.grant.lessthan_wildcard_permissions_configured
  for_each: aws.kms.list_grants
  severity: HIGH
  conditions:
    all:
    - var: item.Operations
      op: not_contains
      value: '*'
    - var: item.Operations
      op: not_contains
      value: kms:*
- rule_id: aws.kms.key.at_rest_cmek_enabled
  for_each: aws.kms.describe_key
  severity: MEDIUM
  conditions:
    var: item.KeyManager
    op: not_equals
    value: AWS
- rule_id: aws.kms.key.certificate_expiration_configured
  for_each: aws.kms.describe_key
  severity: MEDIUM
  conditions:
    var: item.ExpirationModel
    op: exists
    value: null
- rule_id: aws.kms.key.customer_managed_keys_in_use
  for_each: aws.kms.describe_key
  severity: MEDIUM
  conditions:
    all:
    - var: item.KeyManager
      op: equals
      value: CUSTOMER
    - var: item.KeyState
      op: equals
      value: Enabled
- rule_id: aws.kms.key.default_keys_disabled_if_cmek_required
  for_each: aws.kms.describe_key
  severity: MEDIUM
  conditions:
    all:
    - var: item.KeyManager
      op: equals
      value: AWS
    - var: item.Enabled
      op: is_false
      value: null
- rule_id: aws.kms.key.deletion_requires_waiting_period_configured
  for_each: aws.kms.describe_key
  severity: MEDIUM
  conditions:
    var: item.DeletionDate
    op: exists
    value: null
- rule_id: aws.kms.key.in_transit_tls_min_1_2_configured
  for_each: aws.kms.describe_key
  severity: HIGH
  conditions:
    var: item.KeySpec
    op: in
    value:
    - SYMMETRIC_DEFAULT
    - RSA_2048
    - RSA_3072
    - RSA_4096
    - ECC_NIST_P256
    - ECC_NIST_P384
    - ECC_NIST_P521
    - ECC_SECG_P256K1
    - SM2
- rule_id: aws.kms.key.lifecycle_policy_configured
  for_each: aws.kms.describe_key
  severity: HIGH
  conditions:
    var: item.DeletionDate
    op: not_exists
    value: null
- rule_id: aws.kms.key.logging_enabled
  for_each: aws.kms.describe_key
  severity: MEDIUM
  conditions:
    var: item.KeyManager
    op: not_equals
    value: AWS
- rule_id: aws.kms.key.mtls_required_for_internal_services_if_supported
  for_each: aws.kms.describe_key
  severity: HIGH
  conditions:
    all:
    - var: item.KeyManager
      op: equals
      value: AWS
    - var: item.KeySpec
      op: in
      value:
      - RSA_2048
      - RSA_3072
      - RSA_4096
      - ECC_NIST_P256
      - ECC_NIST_P384
      - ECC_NIST_P521
      - ECC_SECG_P256K1
- rule_id: aws.kms.key.multi_region_disabled
  for_each: aws.kms.describe_key
  severity: MEDIUM
  conditions:
    var: item.MultiRegion
    op: is_false
    value: null
- rule_id: aws.kms.key.not_pending_deletion
  for_each: aws.kms.describe_key
  severity: MEDIUM
  conditions:
    var: item.KeyState
    op: not_equals
    value: PendingDeletion
- rule_id: aws.kms.key.not_publicly_accessible_configured
  for_each: aws.kms.get_key_policy
  severity: HIGH
  conditions:
    all:
    - var: item.Policy
      op: exists
      value: null
    - var: item.Policy
      op: not_contains
      value: Principal":"*"
    - any:
      - var: item.Policy
        op: not_contains
        value: Condition
      - var: item.Policy
        op: contains
        value: Condition
- rule_id: aws.kms.key.not_scheduled_for_deletion_configured
  for_each: aws.kms.describe_key
  severity: MEDIUM
  conditions:
    var: item.DeletionDate
    op: not_exists
    value: null
- rule_id: aws.kms.key.policy_least_privilege
  for_each: aws.kms.get_key_policy
  severity: HIGH
  conditions:
    var: item.Policy
    op: exists
    value: null
- rule_id: aws.kms.key.rotation_enabled
  for_each: aws.kms.get_key_rotation_status
  severity: LOW
  conditions:
    var: item.KeyRotationEnabled
    op: is_true
    value: null
- rule_id: aws.kms.key.state_change_monitoring_enabled
  for_each: aws.kms.describe_key
  severity: MEDIUM
  conditions:
    all:
    - var: item.KeyState
      op: equals
      value: Enabled
    - var: item.Enabled
      op: is_true
      value: null
- rule_id: aws.kms.key.tls_min_1_2_enforced
  for_each: aws.kms.describe_key
  severity: HIGH
  conditions:
    var: item.KeySpec
    op: equals
    value: TLS_1_2
