version: '1.0'
provider: aws
service: fargate
checks:
- rule_id: aws.fargate.service.dead_letter_queue_configured
  for_each: aws.ecs.list_services
  severity: MEDIUM
  conditions:
    var: item.deadLetterQueue.targetArn
    op: exists
    value: null
- rule_id: aws.fargate.service.fargate_env_no_plaintext_secrets_configured
  for_each: aws.ecs.list_services
  severity: MEDIUM
  conditions:
    all:
    - var: item.taskDefinition.containerDefinitions[].environment[].value
      op: not_contains
      value: password
    - var: item.taskDefinition.containerDefinitions[].environment[].value
      op: not_contains
      value: secret
    - var: item.taskDefinition.containerDefinitions[].environment[].value
      op: not_contains
      value: key
- rule_id: aws.fargate.service.logging_and_tracing_enabled
  for_each: aws.ecs.describe_services
  severity: MEDIUM
  conditions:
    all:
    - var: item.logConfiguration.logDriver
      op: exists
      value: null
    - var: item.logConfiguration.options
      op: exists
      value: null
- rule_id: aws.fargate.service.role_least_privilege
  for_each: aws.ecs.describe_services
  severity: HIGH
  conditions:
    all:
    - var: item.taskDefinition
      op: exists
      value: null
    - var: item.taskDefinition.taskRoleArn
      op: exists
      value: null
    - var: item.taskDefinition.taskRoleArn
      op: not_equals
      value: ''
- rule_id: aws.fargate.service.vpc_private_networking_enabled
  for_each: aws.ecs.describe_services
  severity: HIGH
  conditions:
    var: item.NetworkConfiguration.AwsvpcConfiguration.AssignPublicIp
    op: equals
    value: DISABLED
- rule_id: aws.fargate.task.dead_letter_queue_configured
  for_each: aws.ecs.list_task_definitions
  severity: MEDIUM
  conditions:
    var: item.deadLetterQueueArn
    op: exists
    value: null
- rule_id: aws.fargate.task.fargate_env_no_plaintext_secrets_configured
  for_each: aws.ecs.list_task_definitions
  severity: MEDIUM
  conditions:
    all:
    - var: item.containerDefinitions[].environment[].value
      op: not_contains
      value: password
    - var: item.containerDefinitions[].environment[].value
      op: not_contains
      value: secret
    - var: item.containerDefinitions[].environment[].value
      op: not_contains
      value: key
- rule_id: aws.fargate.task.logging_and_tracing_enabled
  for_each: aws.ecs.describe_task_definition
  severity: MEDIUM
  conditions:
    all:
    - var: item.ContainerDefinitions[].LogConfiguration
      op: exists
      value: null
    - var: item.ContainerDefinitions[].LogConfiguration.LogDriver
      op: equals
      value: awslogs
- rule_id: aws.fargate.task.role_least_privilege
  for_each: aws.ecs.describe_task_definition
  severity: HIGH
  conditions:
    all:
    - var: item.taskRoleArn
      op: exists
      value: null
    - var: item.taskRoleArn
      op: not_equals
      value: ''
- rule_id: aws.fargate.task.vpc_private_networking_enabled
  for_each: aws.ecs.list_task_definitions
  severity: HIGH
  conditions:
    var: item.NetworkMode
    op: equals
    value: awsvpc
