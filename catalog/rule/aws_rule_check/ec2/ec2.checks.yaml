- rule_id: aws.ec2.instance.ssh_key_authentication_configured
  for_each: aws.ec2.describe_addresses
  severity: CRITICAL
  conditions:
    var: item.Addresses[].InstanceId
    op: exists
    value: null
- rule_id: aws.ec2.instance.ssh_key_based_auth_required
  for_each: aws.ec2.describe_addresses
  severity: MEDIUM
  conditions:
