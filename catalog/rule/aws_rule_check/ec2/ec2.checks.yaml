- rule_id: aws.ec2.instance.port_postgresql_exposed_to_internet_configured
  for_each: aws.ec2.describe_addresses
  severity: MEDIUM
  conditions:
    any:
    - var: item.Addresses[].AssociationId
      op: not_exists
      value: null
    - var: item.Addresses[].AssociationId
      op: exists
      value: null
- rule_id: aws.ec2.instance.port_rdp_exposed_to_internet_configured
  for_each: aws.ec2.describe_addresses
  severity: MEDIUM
  conditions:
    any:
    - var: item.Addresses[].Domain
      op: not_equals
      value: vpc
    - var: item.Addresses[].InstanceId
      op: not_exists
      value: null
- rule_id: aws.ec2.instance.port_redis_exposed_to_internet_configured
  for_each: aws.ec2.describe_addresses
  severity: MEDIUM
  conditions:
    all:
    - var: item.Addresses[].AssociationId
      op: exists
      value: null
    - var: item.Addresses[].InstanceId
      op: exists
      value: null
    - any:
      - var: item.Addresses[].Tags.Environment
        op: equals
        value: production
      - var: item.Addresses[].Tags.Environment
        op: not_equals
        value: staging
- rule_id: aws.ec2.instance.port_sqlserver_exposed_to_internet_configured
  for_each: aws.ec2.describe_addresses
  severity: MEDIUM
  conditions:
    all:
    - var: item.Addresses[].AssociationId
      op: not_exists
      value: null
- rule_id: aws.ec2.instance.port_ssh_exposed_to_internet_configured
  for_each: aws.ec2.describe_addresses
  severity: MEDIUM
  conditions:
    any:
    - var: item.Addresses[].AssociationId
      op: not_exists
      value: null
    - var: item.Addresses[].InstanceId
      op: not_exists
      value: null
- rule_id: aws.ec2.instance.port_telnet_exposed_to_internet_configured
  for_each: aws.ec2.describe_addresses
  severity: MEDIUM
  conditions:
    all:
    - var: item.Addresses[].AssociationId
      op: exists
      value: null
    - var: item.Addresses[].InstanceId
      op: exists
      value: null
    - any:
      - var: item.Addresses[].Tags.Environment
        op: equals
