  conditions:
    var: item.BlockDeviceMappings[].Ebs.Encrypted
    op: is_true
    value: null
- rule_id: aws.ec2.instance.ssm_association_compliant
  for_each: aws.ec2.describe_instances
  severity: MEDIUM
  conditions:
    var: item.State.Name
    op: equals
    value: running
- rule_id: aws.ec2.instance.user_data_no_secrets_configured
  for_each: aws.ec2.describe_instances
  severity: MEDIUM
  conditions:
