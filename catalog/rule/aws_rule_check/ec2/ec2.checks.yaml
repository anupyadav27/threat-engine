  for_each: aws.ec2.describe_addresses
  severity: MEDIUM
  conditions:
    var: item.Addresses[].InstanceId
    op: exists
    value: null
- rule_id: aws.ec2.instance.vtpm_enabled
  for_each: aws.ec2.describe_instances
  severity: MEDIUM
  conditions:
    var: item.EnclaveOptions.Enabled
    op: is_true
    value: null
- rule_id: aws.ec2.keypair.disable_unused_keys_configured
  for_each: aws.ec2.describe_key_pairs
  severity: MEDIUM
  conditions:
    var: item.KeyPairs[].KeyName
    op: exists
    value: null
- rule_id: aws.ec2.keypair.key_max_age_days_configured
  for_each: aws.ec2.describe_key_pairs
  severity: MEDIUM
  conditions:
    all:
    - var: item.KeyPairs[].CreateTime
      op: exists
      value: null
    - var: item.KeyPairs[].CreateTime
      op: lt
      value: '90'
- rule_id: aws.ec2.launch_template_no_public_ip.launch_template_no_public_ip_configured
  for_each: aws.ec2.describe_launch_templates
  severity: HIGH
  conditions:
    all:
    - var: item.LaunchTemplates[].LaunchTemplateData.NetworkInterfaces[].AssociatePublicIpAddress
      op: is_false
      value: null
    - var: item.LaunchTemplates[].LaunchTemplateData.NetworkInterfaces[].AssociatePublicIpAddress
      op: exists
      value: null
- rule_id: aws.ec2.launch_template_no_secrets.launch_template_no_secrets_configured
  for_each: aws.ec2.describe_launch_templates
  severity: MEDIUM
  conditions:
    all:
    - var: item.LaunchTemplates[].LaunchTemplateData.UserData
      op: not_contains
      value: AKIA
    - var: item.LaunchTemplates[].LaunchTemplateData.UserData
      op: not_contains
      value: secret
- rule_id: aws.ec2.launchtemplate.imds_hardened_configured
  for_each: aws.ec2.describe_launch_templates
  severity: MEDIUM
  conditions:
    var: item.LaunchTemplates[].LaunchTemplateData.MetadataOptions.HttpTokens
    op: equals
    value: required
- rule_id: aws.ec2.launchtemplate.no_public_ip_assigned_configured
  for_each: aws.ec2.describe_launch_templates
  severity: HIGH
  conditions:
    all:
    - var: item.LaunchTemplates[].LaunchTemplateData.NetworkInterfaces[].AssociatePublicIpAddress
      op: is_false
      value: null
    - var: item.LaunchTemplates[].LaunchTemplateData.NetworkInterfaces[].AssociatePublicIpAddress
      op: exists
      value: null
- rule_id: aws.ec2.launchtemplate.no_public_ip_default_configured
  for_each: aws.ec2.describe_launch_templates
  severity: HIGH
  conditions:
    all:
    - var: item.LaunchTemplates[].LaunchTemplateData.NetworkInterfaces[].AssociatePublicIpAddress
      op: is_false
      value: null
    - var: item.LaunchTemplates[].LaunchTemplateData.NetworkInterfaces[].AssociatePublicIpAddress
      op: not_exists
      value: null
- rule_id: aws.ec2.launchtemplate.root_volume_encrypted_by_default
  for_each: aws.ec2.describe_launch_templates
  severity: HIGH
  conditions:
    var: item.LaunchTemplateData.BlockDeviceMappings[].Ebs.Encrypted
    op: is_true
    value: null
- rule_id: aws.ec2.launchtemplate.security_groups_restrictive_configured
  for_each: aws.ec2.describe_launch_templates
  severity: HIGH
  conditions:
    all:
    - var: item.LaunchTemplates[].LaunchTemplateData.NetworkInterfaces[].Groups
      op: not_empty
      value: null
    - var: item.LaunchTemplates[].LaunchTemplateData.NetworkInterfaces[].Groups[]
      op: not_equals
