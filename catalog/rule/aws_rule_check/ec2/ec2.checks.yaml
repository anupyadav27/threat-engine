- rule_id: aws.ec2.instance.profile_enabled
  for_each: aws.ec2.describe_instances
  severity: MEDIUM
  conditions:
    var: item.IamInstanceProfile
    op: exists
    value: null
- rule_id: aws.ec2.instance.public_ip_configured
  for_each: aws.ec2.describe_addresses
  severity: HIGH
  conditions:
    var: item.Addresses[].InstanceId
    op: not_exists
    value: null
- rule_id: aws.ec2.instance.root_volume_encrypted_cmek
  for_each: aws.ec2.describe_instances
  severity: HIGH
  conditions:
    all:
    - var: item.BlockDeviceMappings[].Ebs.Encrypted
      op: is_true
      value: null
    - var: item.BlockDeviceMappings[].Ebs.KmsKeyId
      op: exists
      value: null
- rule_id: aws.ec2.instance.secrets_user_data_configured
  for_each: aws.ec2.describe_instances
  severity: MEDIUM
  conditions:
    all:
    - var: item.Instances[].UserData
      op: exists
      value: null
    - var: item.Instances[].UserData
      op: not_contains
      value: secret
    - var: item.Instances[].UserData
      op: not_contains
      value: password
    - var: item.Instances[].UserData
      op: not_contains
      value: key
- rule_id: aws.ec2.instance.secure_boot_enabled
  for_each: aws.ec2.describe_instances
  severity: MEDIUM
  conditions:
    var: item.BootMode
    op: equals
    value: uefi
- rule_id: aws.ec2.instance.security_group_inbound_restricted
  for_each: aws.ec2.describe_security_groups
  severity: HIGH
  conditions:
    all:
    - var: item.IpPermissions[].IpRanges[].CidrIp
      op: not_contains
      value: 0.0.0.0/0
    - var: item.IpPermissions[].Ipv6Ranges[].CidrIpv6
      op: not_contains
      value: ::/0
- rule_id: aws.ec2.instance.serial_console_access_restricted
  for_each: aws.ec2.describe_addresses
  severity: MEDIUM
  conditions:
    var: item.Addresses[].Domain
    op: not_equals
