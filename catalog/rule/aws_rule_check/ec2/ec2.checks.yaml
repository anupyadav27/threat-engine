version: '1.0'
provider: aws
service: ec2
checks:
- rule_id: aws.ec2.account.block_public_access_configured
  for_each: aws.ec2.describe_addresses
  severity: HIGH
  conditions:
    var: item.Addresses
    op: not_empty
    value: null
- rule_id: aws.ec2.ami.approved_image_allowlist_enforced
  for_each: aws.ec2.describe_addresses
  severity: MEDIUM
  conditions:
    var: item.Tags.Environment
    op: exists
    value: null
- rule_id: aws.ec2.ami.encryption_at_rest_enabled
  for_each: aws.ec2.describe_images
  severity: HIGH
  conditions:
    var: item.BlockDeviceMappings[].Ebs.Encrypted
    op: is_true
    value: null
- rule_id: aws.ec2.ami.image_signed_and_verified
  for_each: aws.ec2.describe_addresses
  severity: MEDIUM
  conditions:
    var: item.Addresses
    op: exists
    value: null
- rule_id: aws.ec2.ami.not_publicly_shared_configured
  for_each: aws.ec2.describe_images
  severity: HIGH
  conditions:
    all:
    - var: item.Public
      op: is_false
      value: null
    - var: item.ImageOwnerAlias
      op: not_equals
      value: amazon
- rule_id: aws.ec2.ami.vuln_scanned_no_critical_configured
  for_each: aws.ec2.describe_addresses
  severity: MEDIUM
  conditions:
    var: item.Addresses
    op: not_empty
    value: null
- rule_id: aws.ec2.amipublic.ami_public_configured
  for_each: aws.ec2.describe_addresses
  severity: HIGH
  conditions:
    var: item.Addresses[].Domain
    op: not_equals
    value: vpc
- rule_id: aws.ec2.autoscalinggroup.no_public_ip_assigned_configured
  for_each: aws.ec2.describe_addresses
  severity: HIGH
  conditions:
    var: item.Addresses[].AssociationId
    op: not_exists
    value: null
- rule_id: aws.ec2.autoscalinggroup.uses_approved_launch_template_configured
  for_each: aws.autoscaling.describe_auto_scaling_groups
  severity: MEDIUM
  conditions:
    var: item.LaunchTemplate.LaunchTemplateId
    op: exists
    value: null
- rule_id: aws.ec2.autoscalinggroup.volumes_encrypted
  for_each: aws.autoscaling.describe_auto_scaling_groups
  severity: HIGH
  conditions:
    var: item.LaunchTemplate.LaunchTemplateData.BlockDeviceMappings[].Ebs.Encrypted
    op: is_true
    value: null
- rule_id: aws.ec2.customergateway.api_ip_addresses_valid_and_owned_configured
  for_each: aws.ec2.describe_carrier_gateways
  severity: MEDIUM
  conditions:
    var: item.CarrierGateways
    op: not_empty
    value: null
- rule_id: aws.ec2.customergateway.no_public_management_interfaces_exposed_configured
  for_each: aws.ec2.describe_carrier_gateways
  severity: HIGH
  conditions:
    all:
    - var: item.CarrierGateways
      op: not_empty
      value: null
    - var: item.CarrierGateways[].Tags.Environment
      op: exists
      value: null
- rule_id: aws.ec2.dedicatedhost.host_sharing_restricted
  for_each: aws.ec2.describe_capacity_reservations
  severity: MEDIUM
  conditions:
    var: item.InstanceMatchCriteria
    op: equals
    value: targeted
- rule_id: aws.ec2.dedicatedhost.instance_auto_placement_controlled_configured
  for_each: aws.ec2.describe_capacity_reservations
  severity: MEDIUM
  conditions:
    var: item.InstanceMatchCriteria
    op: exists
    value: null
- rule_id: aws.ec2.ebs.default_encryption_configured
  for_each: aws.ec2.describe_addresses
  severity: HIGH
  conditions:
    var: item.Addresses[].Tags.Environment
    op: exists
    value: null
- rule_id: aws.ec2.ebs.public_snapshot_configured
  for_each: aws.ec2.describe_snapshots
  severity: HIGH
  conditions:
    var: item.Public
    op: is_false
    value: null
- rule_id: aws.ec2.ebs.volume_encryption_configured
  for_each: aws.ec2.describe_volumes
  severity: HIGH
  conditions:
    var: item.Encrypted
    op: is_true
    value: null
- rule_id: aws.ec2.ebs_public_snapshot.ebs_public_snapshot_configured
  for_each: aws.ec2.describe_snapshots
  severity: HIGH
  conditions:
    all:
    - var: item.Snapshots[].CreateVolumePermissions[].Group
      op: not_contains
      value: all
- rule_id: aws.ec2.eip.not_in_use
  for_each: aws.ec2.describe_addresses
  severity: MEDIUM
  conditions:
    var: item.InstanceId
    op: exists
    value: null
- rule_id: aws.ec2.eip.shodan_exposure_detected
  for_each: aws.ec2.describe_addresses
  severity: MEDIUM
  conditions:
    var: item.AssociationId
    op: exists
    value: null
- rule_id: aws.ec2.group.cifs_access_restriction_tcp_port_445_configured
  for_each: aws.ec2.describe_security_groups
  severity: MEDIUM
  conditions:
    all:
    - var: item.IpPermissions[].FromPort
      op: not_equals
      value: 445
    - var: item.IpPermissions[].ToPort
      op: not_equals
      value: 445
    - var: item.IpPermissionsEgress[].FromPort
      op: not_equals
      value: 445
    - var: item.IpPermissionsEgress[].ToPort
      op: not_equals
      value: 445
- rule_id: aws.ec2.group.cifs_unrestricted_access_configured
  for_each: aws.ec2.describe_security_groups
  severity: MEDIUM
  conditions:
    all:
    - var: item.IpPermissions[].IpRanges[].CidrIp
      op: not_contains
      value: 0.0.0.0/0
    - var: item.IpPermissions[].FromPort
      op: equals
      value: 445
    - var: item.IpPermissions[].ToPort
      op: equals
      value: 445
    - var: item.IpPermissions[].IpProtocol
      op: equals
      value: tcp
- rule_id: aws.ec2.group.ingress_ipv6_restriction_configured
  for_each: aws.ec2.describe_security_groups
  severity: MEDIUM
  conditions:
    all:
    - var: item.IpPermissions[].Ipv6Ranges
      op: is_empty
      value: null
    - var: item.IpPermissionsEgress[].Ipv6Ranges
      op: is_empty
      value: null
- rule_id: aws.ec2.instance.data_volumes_encrypted_cmek
  for_each: aws.ec2.describe_instances
  severity: HIGH
  conditions:
    all:
    - var: item.BlockDeviceMappings[].Ebs.Encrypted
      op: is_true
      value: null
    - var: item.BlockDeviceMappings[].Ebs.KmsKeyId
      op: exists
      value: null
- rule_id: aws.ec2.instance.detailed_monitoring_enabled
  for_each: aws.ec2.describe_instances
  severity: MEDIUM
  conditions:
    var: item.Monitoring.State
    op: equals
    value: enabled
- rule_id: aws.ec2.instance.iam_role_compliance_configured
  for_each: aws.ec2.describe_addresses
  severity: HIGH
  conditions:
    var: item.Addresses[].InstanceId
    op: exists
    value: null
- rule_id: aws.ec2.instance.imds_hardened_configured
  for_each: aws.ec2.describe_instances
  severity: MEDIUM
  conditions:
    var: item.Instances[].MetadataOptions.HttpTokens
    op: equals
    value: required
- rule_id: aws.ec2.instance.imdsv2_enabled
  for_each: aws.ec2.describe_instances
  severity: MEDIUM
  conditions:
    var: item.MetadataOptions.HttpTokens
    op: equals
    value: required
- rule_id: aws.ec2.instance.internet_facing_with_instance_profile_configured
  for_each: aws.ec2.describe_addresses
  severity: MEDIUM
  conditions:
    any:
    - var: item.Addresses[].InstanceId
      op: not_exists
      value: null
    - var: item.Addresses[].InstanceId
      op: is_empty
      value: null
- rule_id: aws.ec2.instance.managed_by_ssm_configured
  for_each: aws.ec2.describe_addresses
  severity: MEDIUM
  conditions:
    var: item.Addresses[].InstanceId
    op: exists
    value: null
- rule_id: aws.ec2.instance.no_public_ip_assigned_configured
  for_each: aws.ec2.describe_addresses
  severity: HIGH
  conditions:
    all:
    - var: item.Addresses
      op: not_empty
      value: null
    - any:
      - var: item.Addresses[].AssociationId
        op: not_exists
        value: null
      - var: item.Addresses[].AssociationId
        op: is_empty
        value: null
- rule_id: aws.ec2.instance.no_public_ip_configured
  for_each: aws.ec2.describe_addresses
  severity: HIGH
  conditions:
    var: item.Addresses[].AssociationId
    op: not_exists
    value: null
- rule_id: aws.ec2.instance.older_than_specific_days_configured
  for_each: aws.ec2.describe_addresses
  severity: MEDIUM
  conditions:
    all:
    - var: item.Addresses[].InstanceId
      op: exists
      value: null
    - var: item.Addresses[].AssociationId
      op: exists
      value: null
    - var: item.Addresses[].Tags.Environment
      op: equals
      value: production
- rule_id: aws.ec2.instance.paravirtual_type_configured
  for_each: aws.ec2.describe_instances
  severity: MEDIUM
  conditions:
    var: item.Instances[].VirtualizationType
    op: not_equals
    value: paravirtual
- rule_id: aws.ec2.instance.patch_compliance_status_check
  for_each: aws.ec2.describe_addresses
  severity: MEDIUM
  conditions:
    var: item.Tags.PatchComplianceStatus
    op: equals
    value: COMPLIANT
- rule_id: aws.ec2.instance.port_cassandra_exposed_to_internet_configured
  for_each: aws.ec2.describe_addresses
  severity: MEDIUM
  conditions:
    any:
    - var: item.Addresses[].Tags.Environment
      op: equals
      value: production
    - var: item.Addresses[].InstanceId
      op: exists
      value: null
- rule_id: aws.ec2.instance.port_cifs_exposed_to_internet_configured
  for_each: aws.ec2.describe_addresses
  severity: MEDIUM
  conditions:
    any:
    - var: item.Addresses[].Domain
      op: not_equals
      value: vpc
    - var: item.Addresses[].AssociationId
      op: not_exists
      value: null
- rule_id: aws.ec2.instance.port_elasticsearch_kibana_exposed_to_internet_configured
  for_each: aws.ec2.describe_addresses
  severity: MEDIUM
  conditions:
    all:
    - var: item.Addresses[].AssociationId
      op: exists
      value: null
    - var: item.Addresses[].InstanceId
      op: exists
      value: null
    - any:
      - var: item.Addresses[].Tags.Environment
        op: equals
        value: production
      - var: item.Addresses[].Tags.Environment
        op: exists
        value: null
- rule_id: aws.ec2.instance.port_ftp_exposed_to_internet_configured
  for_each: aws.ec2.describe_addresses
  severity: MEDIUM
  conditions:
    any:
    - var: item.Addresses[].Tags.Environment
      op: equals
      value: production
    - var: item.Addresses[].Tags.Environment
      op: exists
      value: null
- rule_id: aws.ec2.instance.port_kafka_exposed_to_internet_configured
  for_each: aws.ec2.describe_addresses
  severity: MEDIUM
  conditions:
    all:
    - var: item.Addresses[].AssociationId
      op: exists
      value: null
    - var: item.Addresses[].InstanceId
      op: exists
      value: null
    - var: item.Addresses[].Tags.Environment
      op: equals
      value: production
- rule_id: aws.ec2.instance.port_kerberos_exposed_to_internet_configured
  for_each: aws.ec2.describe_addresses
  severity: MEDIUM
  conditions:
    all:
    - var: item.Addresses[].AssociationId
      op: exists
      value: null
    - var: item.Addresses[].InstanceId
      op: exists
      value: null
    - any:
      - var: item.Addresses[].Domain
        op: equals
        value: vpc
      - var: item.Addresses[].Domain
        op: not_equals
        value: standard
- rule_id: aws.ec2.instance.port_ldap_exposed_to_internet_configured
  for_each: aws.ec2.describe_addresses
  severity: MEDIUM
  conditions:
    any:
    - var: item.Addresses[].Domain
      op: not_equals
      value: vpc
    - var: item.Addresses[].AssociationId
      op: not_exists
      value: null
- rule_id: aws.ec2.instance.port_memcached_exposed_to_internet_configured
  for_each: aws.ec2.describe_addresses
  severity: MEDIUM
  conditions:
    any:
    - var: item.Addresses[].AssociationId
      op: not_exists
      value: null
    - var: item.Addresses[].InstanceId
      op: not_exists
      value: null
- rule_id: aws.ec2.instance.port_mongodb_exposed_to_internet_configured
  for_each: aws.ec2.describe_addresses
  severity: MEDIUM
  conditions:
    all:
    - var: item.Addresses[].AssociationId
      op: exists
      value: null
    - var: item.Addresses[].InstanceId
      op: exists
      value: null
    - any:
      - var: item.Addresses[].Tags.Environment
        op: equals
        value: production
      - var: item.Addresses[].Tags.Environment
        op: not_equals
        value: staging
- rule_id: aws.ec2.instance.port_mysql_exposed_to_internet_configured
  for_each: aws.ec2.describe_addresses
  severity: MEDIUM
  conditions:
    any:
    - var: item.Addresses[].AssociationId
      op: not_exists
      value: null
    - var: item.Addresses[].InstanceId
      op: not_exists
      value: null
- rule_id: aws.ec2.instance.port_oracle_exposed_to_internet_configured
  for_each: aws.ec2.describe_addresses
  severity: MEDIUM
  conditions:
    any:
    - var: item.Addresses[].Domain
