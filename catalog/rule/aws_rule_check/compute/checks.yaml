version: '1.0'
provider: aws
service: compute
checks:
- rule_id: aws.ec2.image.baseline_approved_enforced
  for_each: aws.ec2.describe_images
  severity: MEDIUM
  conditions:
    var: item.CreationDate
    op: is_true
- rule_id: aws.ec2.image.scan_on_launch_configured
  for_each: aws.ec2.describe_images
  severity: MEDIUM
  conditions:
    var: item.CreationDate
    op: is_true
- rule_id: aws.ec2.instance.antivirus_installed_configured
  for_each: aws.ec2.describe_classic_link_instances
  severity: MEDIUM
  conditions:
    var: item.Tags
    op: is_true
- rule_id: aws.ec2.instance.ebs_encryption_enabled
  for_each: aws.ec2.describe_classic_link_instances
  severity: MEDIUM
  conditions:
    all:
    - var: item.Tags
      op: not_empty
      value: null
    - var: item.kms_key_id
      op: exists
      value: null
- rule_id: aws.ec2.instance.maintenance_behavior_configured
  for_each: aws.ec2.describe_classic_link_instances
  severity: MEDIUM
  conditions:
    var: item.Tags
    op: is_true
- rule_id: aws.ec2.instance.patch_management_configured
  for_each: aws.ec2.describe_classic_link_instances
  severity: MEDIUM
  conditions:
    var: item.Tags
    op: is_true
- rule_id: aws.ec2.instance.recovery_behavior_configured
  for_each: aws.ec2.describe_classic_link_instances
  severity: MEDIUM
  conditions:
    var: item.Tags
    op: is_true
- rule_id: aws.ec2.instance.recovery_instance_configured
  for_each: aws.ec2.describe_classic_link_instances
  severity: MEDIUM
  conditions:
    var: item.Tags
    op: is_true
- rule_id: aws.ec2.instance.required_ami_configured
  for_each: aws.ec2.describe_classic_link_instances
  severity: MEDIUM
  conditions:
    var: item.Tags
    op: is_true
- rule_id: aws.ec2.instance.time_sync_configured
  for_each: aws.ec2.describe_classic_link_instances
  severity: MEDIUM
  conditions:
    var: item.Tags
    op: is_true
- rule_id: aws.ec2.instance.vulnerability_scan_enabled
  for_each: aws.ec2.describe_classic_link_instances
  severity: MEDIUM
  conditions:
    var: item.Tags
    op: is_true
- rule_id: aws.ec2.securitygroup.allow_wide_open_public_ipv4_restricted
  for_each: aws.ec2.describe_security_group_rules
  severity: MEDIUM
  conditions:
    var: item.Tags
    op: is_true
- rule_id: aws.ec2.volume.delete_on_termination_configured
  for_each: aws.ec2.describe_volumes
  severity: MEDIUM
  conditions:
    var: item.MultiAttachEnabled
    op: is_true
- rule_id: aws.ec2.vpc_peering_connection.require_encryption_enabled
  for_each: aws.ec2.get_ebs_encryption_by_default
  severity: MEDIUM
  conditions:
    all:
    - var: item.EbsEncryptionByDefault
      op: not_empty
      value: null
    - var: item.kms_key_id
      op: exists
      value: null
- rule_id: aws.ecs.task_definition.container_definition_health_check_command_configured
  for_each: aws.ecs.list_account_settings
  severity: MEDIUM
  conditions:
    var: item.principalArn
    op: is_true
- rule_id: aws.ssm.parameter.permissions_configured
  for_each: aws.ssm.describe_parameters
  severity: MEDIUM
  conditions:
    var: item.ARN
    op: is_true
