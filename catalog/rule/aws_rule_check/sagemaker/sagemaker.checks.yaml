    value: null
- rule_id: aws.sagemaker.automljob.role_least_privilege
  for_each: aws.sagemaker.describe_hyper_parameter_tuning_job
  severity: HIGH
  conditions:
    var: item.RoleArn
    op: exists
    value: null
- rule_id: aws.sagemaker.endpoint.authn_required
  for_each: aws.sagemaker.describe_endpoint_config
  severity: MEDIUM
  conditions:
    var: item.KmsKeyId
