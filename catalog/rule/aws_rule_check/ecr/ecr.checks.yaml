version: '1.0'
provider: aws
service: ecr
checks:
- rule_id: aws.ecr.imagescan.ecr_agents_or_scanners_deployed_configured
  for_each: aws.ecr.get_registry_scanning_configuration
  severity: MEDIUM
  conditions:
    var: item.scanningConfiguration
    op: exists
    value: null
- rule_id: aws.ecr.imagescan.ecr_results_export_destination_encrypted
  for_each: aws.ecr.describe_repositories
  severity: HIGH
  conditions:
    var: item.encryptionConfiguration
    op: exists
    value: null
- rule_id: aws.ecr.imagescan.scope_includes_all_asset_groups_configured
  for_each: aws.ecr.get_registry_scanning_configuration
  severity: MEDIUM
  conditions:
    var: item.scanningConfiguration.scanFrequency
    op: equals
    value: SCAN_ON_PUSH
- rule_id: aws.ecr.lifecyclepolicy.ecr_unused_or_old_tags_expire_configured
  for_each: aws.ecr.describe_repositories
  severity: MEDIUM
  conditions:
    all:
    - var: item.repositories[].repositoryName
      op: not_empty
      value: null
    - any:
      - var: item.repositories[].lifecyclePolicyText
        op: exists
        value: null
      - var: item.repositories[].lifecyclePolicyText
        op: not_empty
        value: null
- rule_id: aws.ecr.lifecyclepolicy.policy_storage_encrypted
  for_each: aws.ecr.describe_repositories
  severity: HIGH
  conditions:
    var: item.encryptionConfiguration
    op: exists
    value: null
- rule_id: aws.ecr.replication_configuration.ecr_cross_region_encrypted
  for_each: aws.ecr.describe_registry
  severity: HIGH
  conditions:
    all:
    - var: item.replicationConfiguration.rules[].destinations[].encryptionConfiguration.encryptionType
      op: exists
      value: null
    - var: item.replicationConfiguration.rules[].destinations[].encryptionConfiguration.encryptionType
      op: not_equals
      value: NONE
- rule_id: aws.ecr.replication_configuration.ecr_destinations_least_privilege
  for_each: aws.ecr.describe_registry
  severity: HIGH
  conditions:
    var: item.replicationConfiguration.rules[].destinations[].registryId
    op: exists
    value: null
- rule_id: aws.ecr.repositories_not_publicly_accessible.repositories_not_publicly_accessible_configured
  for_each: aws.ecr.describe_repositories
  severity: HIGH
  conditions:
    all:
    - var: item.repositories[].repositoryPolicyText
      op: not_exists
      value: null
    - any:
      - var: item.repositories[].repositoryPolicyText
        op: exists
        value: null
- rule_id: aws.ecr.repository.ecr_image_scanning_enabled
  for_each: aws.ecr.describe_repositories
  severity: MEDIUM
  conditions:
    var: item.imageScanningConfiguration.scanOnPush
    op: is_true
    value: null
- rule_id: aws.ecr.repository.immutable_tags_or_signing_enforced
  for_each: aws.ecr.describe_repositories
  severity: MEDIUM
  conditions:
    any:
    - var: item.imageTagMutability
      op: equals
      value: IMMUTABLE
    - var: item.imageScanningConfiguration.scanOnPush
      op: is_true
      value: null
- rule_id: aws.ecr.repository.repo_private_or_access_restricted
  for_each: aws.ecr.describe_repositories
  severity: HIGH
  conditions:
    any:
    - var: item.repositories[].repositoryName
      op: not_exists
      value: null
    - all:
      - var: item.repositories[].repositoryName
        op: exists
        value: null
      - var: item.repositories[].repositoryName
        op: not_contains
        value: public
- rule_id: aws.ecr.repository_policy.ecr_no_wildcard_admin_configured
  for_each: aws.ecr.get_repository_policy
  severity: MEDIUM
  conditions:
    var: item.policyText
    op: not_contains
    value: ecr:GetAuthorizationToken
- rule_id: aws.ecr.repository_policy.no_public_pull_push_configured
  for_each: aws.ecr.get_repository_policy
  severity: HIGH
  conditions:
    all:
    - var: item.policyText
      op: exists
      value: null
    - var: item.policyText
      op: not_contains
      value: '"Effect":"Allow","Principal":"*"'
- rule_id: aws.ecr.resource.ecr_image_scan_on_push_enabled
  for_each: aws.ecr.describe_repositories
  severity: MEDIUM
  conditions:
    var: item.imageScanningConfiguration.scanOnPush
    op: is_true
    value: null
- rule_id: aws.ecr.resource.ecr_repository_scan_on_push_enabled
  for_each: aws.ecr.describe_repositories
  severity: MEDIUM
  conditions:
    var: item.imageScanningConfiguration.scanOnPush
    op: is_true
    value: null
- rule_id: aws.ecr.resource.repository_encryption_enabled
  for_each: aws.ecr.describe_repositories
  severity: HIGH
  conditions:
    var: item.encryptionConfiguration
    op: exists
    value: null
