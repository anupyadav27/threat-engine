version: '1.0'
provider: aws
service: detective
checks:
- rule_id: aws.detective.graph.detective_enabled_in_all_regions
  for_each: aws.detective.list_graphs
  severity: MEDIUM
  conditions:
    var: item.GraphList
    op: not_empty
    value: null
- rule_id: aws.detective.graph.detective_finding_export_encrypted_destination
  for_each: aws.detective.list_graphs
  severity: HIGH
  conditions:
    all:
    - var: item.GraphList[].AutoEnable
      op: is_true
      value: null
    - var: item.GraphList[].CreatedTime
      op: exists
      value: null
- rule_id: aws.detective.member.detective_enabled_in_all_regions
  for_each: aws.detective.list_graphs
  severity: MEDIUM
  conditions:
    all:
    - var: item.GraphList
      op: not_empty
      value: null
    - var: item.GraphList[].Arn
      op: exists
      value: null
- rule_id: aws.detective.member.detective_finding_export_encrypted_destination
  for_each: aws.detective.list_graphs
  severity: HIGH
  conditions:
    var: item.GraphList[].MemberDetails[].DatasourcePackageIngestStates[].FindingExportDestination.EncryptionStatus
    op: exists
    value: null
