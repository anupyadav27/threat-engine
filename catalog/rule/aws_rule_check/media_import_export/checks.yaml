version: '1.0'
provider: aws
service: media_import_export
checks:
- rule_id: aws.media_import_export.job.encryption_enabled
  for_each: aws.importexport.list_jobs
  severity: MEDIUM
  conditions:
    all:
    - var: item.CreationDate
      op: not_empty
      value: null
    - var: item.kms_key_id
      op: exists
      value: null
