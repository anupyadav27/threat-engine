version: '1.0'
provider: aws
service: network
checks:
- rule_id: aws.vpc.network_acl.deny_all_ingress_restricted
  for_each: aws.vpc.describe_customer_gateways
  severity: MEDIUM
  conditions:
    var: item.Tags
    op: is_true
- rule_id: aws.vpc.network_acl.rule_action_configured
  for_each: aws.vpc.describe_customer_gateways
  severity: MEDIUM
  conditions:
    var: item.Tags
    op: is_true
- rule_id: aws.vpc.peering_connection.require_acceptance_configured
  for_each: aws.vpc.describe_customer_gateways
  severity: MEDIUM
  conditions:
    var: item.Tags
    op: is_true
- rule_id: aws.vpc.security_group.ingress_restricted
  for_each: aws.vpc.describe_customer_gateways
  severity: MEDIUM
  conditions:
    var: item.Tags
    op: is_true
