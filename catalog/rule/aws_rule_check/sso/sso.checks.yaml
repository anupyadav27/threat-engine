version: '1.0'
provider: aws
service: sso
checks:
- rule_id: aws.sso.permissionset.no_inline_policy
  for_each: aws.sso-admin.list_permission_sets_provisioned_to_account
  severity: MEDIUM
  conditions:
    var: item.InlinePolicy
    op: not_exists
    value: null
- rule_id: aws.sso.permissionset.session_duration_max_1_hour
  for_each: aws.sso-admin.list_permission_sets_provisioned_to_account
  severity: MEDIUM
  conditions:
    var: item.SessionDuration
    op: lte
    value: 3600
