version: '1.0'
provider: aws
service: directoryservice
checks:
- rule_id: aws.directoryservice.resource.directoryservice_directory_log_forwarding_enabled
  for_each: aws.ds.describe_directories
  severity: MEDIUM
  conditions:
    var: item.LogForwardingEnabled
    op: is_true
    value: null
- rule_id: aws.directoryservice.resource.supported_mfa_radius_enabled
  for_each: aws.ds.describe_directories
  severity: CRITICAL
  conditions:
    var: item.RadiusSettings.MultiFactorAuthenticationEnabled
    op: is_true
    value: null
