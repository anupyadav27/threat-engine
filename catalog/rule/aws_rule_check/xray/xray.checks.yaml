version: '1.0'
provider: aws
service: xray
checks:
- rule_id: aws.xray.samplingrule.rbac_least_privilege
  for_each: aws.xray.get_sampling_rules
  severity: HIGH
  conditions:
    var: item.SamplingRule
    op: exists
    value: null
- rule_id: aws.xray.samplingrule.xray_rules_present
  for_each: aws.xray.get_sampling_rules
  severity: MEDIUM
  conditions:
    var: item.SamplingRuleRecords
    op: not_empty
    value: null
- rule_id: aws.xray.samplingrule.xray_storage_encrypted
  for_each: aws.xray.get_encryption_config
  severity: HIGH
  conditions:
    var: item.EncryptionConfig
    op: exists
    value: null
- rule_id: aws.xray.trace.rbac_least_privilege
  for_each: aws.xray.get_sampling_rules
  severity: HIGH
  conditions:
    var: item.SamplingRuleRecords[].SamplingRule.RuleName
    op: exists
    value: null
- rule_id: aws.xray.trace.retention_days_minimum
  for_each: aws.xray.get_encryption_config
  severity: LOW
  conditions:
    var: item.EncryptionConfig
    op: exists
    value: null
- rule_id: aws.xray.trace.xray_store_encrypted
  for_each: aws.xray.get_encryption_config
  severity: HIGH
  conditions:
    var: item.EncryptionConfig
    op: exists
    value: null
