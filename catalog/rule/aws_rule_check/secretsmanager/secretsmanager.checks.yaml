version: '1.0'
provider: aws
service: secretsmanager
checks:
- rule_id: aws.secretsmanager.automatic.rotation_enabled
  for_each: aws.secretsmanager.list_secrets
  severity: MEDIUM
  conditions:
    var: item.RotationEnabled
    op: is_true
    value: null
- rule_id: aws.secretsmanager.resource.secret_rotation_enabled
  for_each: aws.secretsmanager.list_secrets
  severity: MEDIUM
  conditions:
    var: item.LastRotatedDate
    op: exists
    value: null
- rule_id: aws.secretsmanager.secret.kms_encryption_enabled
  for_each: aws.secretsmanager.list_secrets
  severity: HIGH
  conditions:
    var: item.KmsKeyId
    op: exists
    value: null
- rule_id: aws.secretsmanager.secret.kms_key_configured
  for_each: aws.secretsmanager.list_secrets
  severity: HIGH
  conditions:
    var: item.KmsKeyId
    op: exists
    value: null
- rule_id: aws.secretsmanager.secret.no_plaintext_exposed_in_policy_or_tags_configured
  for_each: aws.secretsmanager.list_secrets
  severity: HIGH
  conditions:
    all:
    - var: item.Tags
      op: not_exists
      value: null
    - var: item.Policy
      op: not_exists
      value: null
- rule_id: aws.secretsmanager.secret.rbac_least_privilege
  for_each: aws.secretsmanager.list_secrets
  severity: HIGH
  conditions:
    all:
    - var: item.Policy.PolicyText
      op: exists
      value: null
    - var: item.Policy.PolicyText
      op: not_contains
      value: '"Effect":"Allow","Principal":"*"'
- rule_id: aws.secretsmanager.secret.rotation_configured_if_applicable
  for_each: aws.secretsmanager.list_secrets
  severity: MEDIUM
  conditions:
    any:
    - var: item.LastRotatedDate
      op: exists
      value: null
    - var: item.NextRotationDate
      op: exists
      value: null
    - var: item.ExternalSecretRotationRoleArn
      op: exists
      value: null
- rule_id: aws.secretsmanager.secret.rotation_enabled_for_rotatable_s
  for_each: aws.secretsmanager.list_secrets
  severity: MEDIUM
  conditions:
    var: item.RotationEnabled
    op: is_true
    value: null
- rule_id: aws.secretsmanager.secret.rotation_enabled_for_rotatable_secrets
  for_each: aws.secretsmanager.list_secrets
  severity: MEDIUM
  conditions:
    any:
    - var: item.RotationEnabled
      op: is_true
      value: null
    - var: item.RotationRules.AutomaticallyAfterDays
      op: exists
      value: null
