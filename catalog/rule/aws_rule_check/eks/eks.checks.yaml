version: '1.0'
provider: aws
service: eks
checks:
- rule_id: aws.eks.addon.from_trusted_channel_configured
  for_each: aws.eks.describe_addon
  severity: MEDIUM
  conditions:
    var: item.addonVersion
    op: exists
    value: null
- rule_id: aws.eks.addon.no_privileged_permissions_configured
  for_each: aws.eks.describe_addon
  severity: HIGH
  conditions:
    var: item.serviceAccountRoleArn
    op: not_exists
    value: null
- rule_id: aws.eks.addon.version_pinned_and_supported_configured
  for_each: aws.eks.describe_addon
  severity: LOW
  conditions:
    all:
    - var: item.addonVersion
      op: exists
      value: null
    - var: item.status
      op: equals
      value: ACTIVE
- rule_id: aws.eks.api.admission_psa_enforce_mode_configured
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.kubernetesNetworkConfig.config
    op: exists
    value: null
- rule_id: aws.eks.api.anonymous_auth_disabled
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.kubernetesApiServerAccessConfig.authenticationMode
    op: not_contains
    value: CONFIG_MAP
- rule_id: aws.eks.api.audit_logging_enabled
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.logging.clusterLogging[].enabled
    op: is_true
    value: null
- rule_id: aws.eks.api.client_cert_rotation_enabled
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.certificateAuthority
    op: exists
    value: null
- rule_id: aws.eks.api.cluster_required_allowlist_for_namespace_services
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.kubernetesNetworkConfig.serviceIpv4Cidr
    op: exists
    value: null
- rule_id: aws.eks.api.default_deny_egress_per_namespace_configured
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.kubernetesNetworkConfig
    op: exists
    value: null
- rule_id: aws.eks.api.default_deny_ingress_per_namespace_configured
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.accessConfig.authenticationMode
    op: equals
    value: API_AND_CONFIG_MAP
- rule_id: aws.eks.api.default_sa_not_cluster_admin_configured
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.accessConfig.authenticationMode
    op: not_equals
    value: API_AND_CONFIG_MAP
- rule_id: aws.eks.api.default_service_account_automount_disabled
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.accessConfig.authenticationMode
    op: not_equals
    value: API_AND_CONFIG_MAP
- rule_id: aws.eks.api.dns_and_metrics_from_approved_sources_configured
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    all:
    - var: item.kubernetesNetworkConfig.serviceIpv4Cidr
      op: exists
      value: null
    - var: item.kubernetesNetworkConfig.serviceIpv4Cidr
      op: not_equals
      value: 172.20.0.0/16
    - var: item.kubernetesNetworkConfig.serviceIpv4Cidr
      op: not_equals
      value: 10.100.0.0/16
- rule_id: aws.eks.api.drop_net_raw_and_reduce_caps_configured
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    all:
    - var: item.kubernetesNetworkConfig
      op: exists
      value: null
    - var: item.kubernetesNetworkConfig.dropNetRaw
      op: is_true
      value: null
    - var: item.kubernetesNetworkConfig.reduceCaps
      op: is_true
      value: null
- rule_id: aws.eks.api.env_no_plaintext_secrets_configured
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.encryptionConfig
    op: exists
    value: null
- rule_id: aws.eks.api.external_ips_not_used_configured
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.kubernetesNetworkConfig.serviceIpv4Cidr
    op: exists
    value: null
- rule_id: aws.eks.api.host_namespace_usage_denied_configured
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.accessConfig.authenticationMode
    op: equals
    value: API_AND_CONFIG_MAP
- rule_id: aws.eks.api.host_network_pid_ipc_disabled
  for_each: aws.eks.describe_cluster
  severity: HIGH
  conditions:
    all:
    - var: item.kubernetesNetworkConfig.serviceIpv4Cidr
      op: exists
      value: null
    - var: item.kubernetesNetworkConfig.ipFamily
      op: exists
      value: null
- rule_id: aws.eks.api.image_registry_allowlist_enforced
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.kubernetesNetworkConfig.serviceIpv4Cidr
    op: exists
    value: null
- rule_id: aws.eks.api.image_signature_verification_enabled
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.oidcIdentityProviderConfigs[].requiredClaims.imageRepository
    op: exists
    value: null
- rule_id: aws.eks.api.image_tag_not_latest_configured
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.kubernetesNetworkConfig
    op: exists
    value: null
- rule_id: aws.eks.api.kube_system_services_not_public_configured
  for_each: aws.eks.describe_cluster
  severity: HIGH
  conditions:
    var: item.resourcesVpcConfig.endpointPublicAccess
    op: is_false
    value: null
- rule_id: aws.eks.api.leader_election_enabled
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.controlPlaneScalingConfig
    op: exists
    value: null
- rule_id: aws.eks.api.network_policies_present
  for_each: aws.eks.describe_cluster
  severity: HIGH
  conditions:
    var: item.kubernetesNetworkConfig.serviceIpv4Cidr
    op: exists
    value: null
- rule_id: aws.eks.api.no_cluster_admin_to_authenticated_configured
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    all:
    - var: item.accessConfig.authenticationMode
      op: exists
      value: null
    - var: item.accessConfig.authenticationMode
      op: not_equals
      value: API_AND_CONFIG_MAP
- rule_id: aws.eks.api.no_hostpath_mounts_configured
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.resourcesVpcConfig.securityGroupIds
    op: exists
    value: null
- rule_id: aws.eks.api.no_privileged_containers_configured
  for_each: aws.eks.describe_cluster
  severity: HIGH
  conditions:
    all:
    - var: item.computeConfig
      op: exists
      value: null
    - var: item.computeConfig.privilegedContainersEnabled
      op: is_false
      value: null
- rule_id: aws.eks.api.nodeport_usage_restricted
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.resourcesVpcConfig.publicAccessCidrs[]
    op: not_contains
    value: 0.0.0.0/0
- rule_id: aws.eks.api.pod_security_admission_restricted_default_configured
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.podSecurityPolicyConfig.defaultPodSecurityPolicy
    op: equals
    value: restricted
- rule_id: aws.eks.api.pod_security_level_restricted
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.podSecurityPolicyConfig.enabled
    op: is_true
    value: null
- rule_id: aws.eks.api.privilege_escalation_denied_configured
  for_each: aws.eks.describe_access_entry
  severity: HIGH
  conditions:
    var: item.kubernetesGroups
    op: exists
    value: null
- rule_id: aws.eks.api.profiling_disabled
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.logging.clusterLogging[].enabled
    op: not_contains
    value: true
- rule_id: aws.eks.api.protect_kernel_defaults_enabled
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.kernel.protectKernelDefaults
    op: is_true
    value: null
- rule_id: aws.eks.api.read_only_port_disabled
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.resourcesVpcConfig.endpointPublicAccess
    op: is_false
    value: null
- rule_id: aws.eks.api.read_only_root_filesystem_configured
  for_each: aws.eks.describe_nodegroup
  severity: MEDIUM
  conditions:
    var: item.resources[].readOnlyRootFilesystem
    op: is_true
    value: null
- rule_id: aws.eks.api.run_as_non_root_configured
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.accessConfig.authenticationMode
    op: equals
    value: API_AND_CONFIG_MAP
- rule_id: aws.eks.api.seccomp_profile_runtime_default_configured
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.kubernetesNetworkConfig.securityGroups
    op: exists
    value: null
- rule_id: aws.eks.api.secure_port_enabled
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.resourcesVpcConfig.endpointPublicAccess
    op: is_false
    value: null
- rule_id: aws.eks.api.service_account_token_signing_enabled
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.accessConfig.authenticationMode
    op: not_equals
    value: API_AND_CONFIG_MAP
- rule_id: aws.eks.api.tls_min_version_1_2_configured
  for_each: aws.eks.describe_cluster
  severity: HIGH
  conditions:
    var: item.kubernetesNetworkConfig.serviceIpv4Cidr
    op: exists
    value: null
- rule_id: aws.eks.api.type_loadbalancer_internal_only_where_required
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.kubernetesNetworkConfig.serviceIpv4Cidr
    op: exists
    value: null
- rule_id: aws.eks.api.wildcard_verbs_disallowed_configured
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.accessConfig.authenticationMode
    op: not_equals
    value: API_AND_CONFIG_MAP
- rule_id: aws.eks.certificate.monitored
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.certificateAuthority
    op: exists
    value: null
- rule_id: aws.eks.cluster.admission_psa_enforce_mode_configured
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.kubernetesNetworkConfig.serviceIpv4Cidr
    op: exists
    value: null
- rule_id: aws.eks.cluster.anonymous_auth_disabled
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.kubernetesApiServerAccessConfig.authenticationMode
    op: not_contains
    value: CONFIG_MAP
- rule_id: aws.eks.cluster.audit_logging_enabled
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.logging.clusterLogging[].enabled
    op: is_true
    value: null
- rule_id: aws.eks.cluster.client_cert_auth_enabled
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.authenticationMode
    op: not_equals
    value: API_AND_CONFIG_MAP
- rule_id: aws.eks.cluster.default_service_account_automount_disabled
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.kubernetesNetworkConfig.serviceIpv4Cidr
    op: exists
    value: null
- rule_id: aws.eks.cluster.encryption_at_rest_enabled
  for_each: aws.eks.describe_cluster
  severity: HIGH
  conditions:
    var: item.encryptionConfig
    op: exists
    value: null
- rule_id: aws.eks.cluster.endpoint_access_configured
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.resourcesVpcConfig.endpointPublicAccess
    op: is_false
    value: null
- rule_id: aws.eks.cluster.kms_cmk_encryption_in_secrets_enabled
  for_each: aws.eks.describe_cluster
  severity: HIGH
  conditions:
    var: item.encryptionConfig.resources[].type
    op: contains
    value: secrets
- rule_id: aws.eks.cluster.leader_election_enabled
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.controlPlaneScalingConfig
    op: exists
    value: null
- rule_id: aws.eks.cluster.private_control_plane_endpoint_enabled
  for_each: aws.eks.describe_cluster
  severity: HIGH
  conditions:
    var: item.resourcesVpcConfig.endpointPublicAccess
    op: is_false
    value: null
- rule_id: aws.eks.cluster.private_nodes_configuration_configured
  for_each: aws.eks.describe_cluster
  severity: HIGH
  conditions:
    var: item.kubernetesNetworkConfig.serviceIpv4Cidr
    op: exists
    value: null
- rule_id: aws.eks.cluster.profiling_disabled
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.logging.clusterLogging[].enabled
    op: not_contains
    value: true
- rule_id: aws.eks.cluster.secrets_encryption_kms_cmk_configured
  for_each: aws.eks.describe_cluster
  severity: HIGH
  conditions:
    var: item.encryptionConfig.resources[].provider.keyArn
    op: exists
    value: null
- rule_id: aws.eks.cluster.secrets_encryption_kms_enabled
  for_each: aws.eks.describe_cluster
  severity: HIGH
  conditions:
    var: item.encryptionConfig.resources[0]
    op: equals
    value: secrets
- rule_id: aws.eks.cluster.secure_port_enabled
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.resourcesVpcConfig.endpointPublicAccess
    op: is_false
    value: null
- rule_id: aws.eks.cluster.service_account_token_signing_enabled
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.accessConfig.authenticationMode
    op: not_equals
    value: API_AND_CONFIG_MAP
- rule_id: aws.eks.cluster.tls_min_version_1_2_configured
  for_each: aws.eks.describe_cluster
  severity: HIGH
  conditions:
    var: item.kubernetesNetworkConfig
    op: exists
    value: null
- rule_id: aws.eks.fargateprofile.anonymous_auth_disabled
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.accessConfig.authenticationMode
    op: not_equals
    value: CONFIG_MAP
- rule_id: aws.eks.fargateprofile.client_cert_rotation_enabled
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.certificateAuthority
    op: exists
    value: null
- rule_id: aws.eks.fargateprofile.logging_enabled
  for_each: aws.eks.describe_fargate_profile
  severity: MEDIUM
  conditions:
    var: item.logging
    op: exists
    value: null
- rule_id: aws.eks.fargateprofile.private_subnets_only_configured
  for_each: aws.eks.describe_fargate_profile
  severity: HIGH
  conditions:
    all:
    - var: item.subnets
      op: not_empty
      value: null
    - var: item.subnets
      op: not_contains
      value: subnet-
- rule_id: aws.eks.fargateprofile.protect_kernel_defaults_enabled
  for_each: aws.eks.describe_fargate_profile
  severity: MEDIUM
  conditions:
    var: item.protectKernelDefaults
    op: is_true
    value: null
- rule_id: aws.eks.fargateprofile.read_only_port_disabled
  for_each: aws.eks.describe_fargate_profile
  severity: MEDIUM
  conditions:
    var: item.selectors[].namespace
    op: not_contains
    value: kube-system
- rule_id: aws.eks.nodegroup.anonymous_auth_disabled
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    var: item.accessConfig.authenticationMode
    op: not_equals
    value: CONFIG_MAP
- rule_id: aws.eks.nodegroup.client_cert_rotation_enabled
  for_each: aws.eks.describe_nodegroup
  severity: MEDIUM
  conditions:
    var: item.client_cert_rotation_enabled
    op: is_true
    value: null
- rule_id: aws.eks.nodegroup.disk_encryption_enabled
  for_each: aws.eks.describe_nodegroup
  severity: HIGH
  conditions:
    var: item.diskSize
    op: gt
    value: 0
- rule_id: aws.eks.nodegroup.node_protect_kernel_defaults_enabled
  for_each: aws.eks.describe_nodegroup
  severity: MEDIUM
  conditions:
    var: item.launchTemplate
    op: exists
    value: null
- rule_id: aws.eks.nodegroup.node_read_only_port_disabled
  for_each: aws.eks.describe_nodegroup
  severity: MEDIUM
  conditions:
    var: item.resources[]
    op: not_contains
    value: pods
- rule_id: aws.eks.nodegroup.node_shielded_secure_boot_enabled
  for_each: aws.eks.describe_nodegroup
  severity: MEDIUM
  conditions:
    var: item.launchTemplate
    op: exists
    value: null
- rule_id: aws.eks.nodegroup.node_workload_identity_enabled
  for_each: aws.eks.describe_nodegroup
  severity: MEDIUM
  conditions:
    var: item.labels.eks.amazonaws.com/nodegroup-image
    op: exists
    value: null
- rule_id: aws.eks.nodegroup.nodes_no_public_ip_configured
  for_each: aws.eks.describe_nodegroup
  severity: HIGH
  conditions:
    var: item.remoteAccess
    op: not_exists
    value: null
- rule_id: aws.eks.resource.control_plane_logging_all_types_enabled
  for_each: aws.eks.describe_cluster
  severity: MEDIUM
  conditions:
    all:
    - var: item.logging.clusterLogging[].enabled
      op: is_true
      value: null
    - var: item.logging.clusterLogging[].types
      op: contains
      value: api
    - var: item.logging.clusterLogging[].types
      op: contains
      value: audit
    - var: item.logging.clusterLogging[].types
      op: contains
      value: authenticator
    - var: item.logging.clusterLogging[].types
      op: contains
      value: controllerManager
    - var: item.logging.clusterLogging[].types
      op: contains
      value: scheduler
- rule_id: aws.eks.resource.kubelet_event_record_qps_configured
  for_each: aws.eks.describe_nodegroup
  severity: MEDIUM
  conditions:
    var: item.labels.kubelet-event-record-qps
    op: exists
    value: null
- rule_id: aws.eks.resource.node_kubelet_read_only_port_configured
  for_each: aws.eks.describe_nodegroup
  severity: MEDIUM
  conditions:
    var: item.launchTemplate
    op: exists
    value: null
