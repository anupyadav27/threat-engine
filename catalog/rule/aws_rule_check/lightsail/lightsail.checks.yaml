version: '1.0'
provider: aws
service: lightsail
checks:
- rule_id: aws.lightsail.database.encryption_at_rest_enabled
  for_each: aws.lightsail.get_relational_databases
  severity: HIGH
  conditions:
    var: item.backupRetentionEnabled
    op: is_true
    value: null
- rule_id: aws.lightsail.database.public_access_disabled
  for_each: aws.lightsail.get_relational_databases
  severity: HIGH
  conditions:
    var: item.publiclyAccessible
    op: is_false
    value: null
- rule_id: aws.lightsail.database.require_tls_in_transit_configured
  for_each: aws.lightsail.get_relational_databases
  severity: HIGH
  conditions:
    var: item.masterEndpoint.sslEnforcement
    op: is_true
    value: null
- rule_id: aws.lightsail.instance.lightsail_disk_encrypted
  for_each: aws.lightsail.get_disks
  severity: HIGH
  conditions:
    var: item.isAttached
    op: is_true
    value: null
- rule_id: aws.lightsail.instance.no_public_ip_unless_required
  for_each: aws.lightsail.get_instances
  severity: HIGH
  conditions:
    var: item.isStaticIp
    op: is_true
    value: null
- rule_id: aws.lightsail.instance.ssh_password_auth_disabled
  for_each: aws.lightsail.get_instances
  severity: CRITICAL
  conditions:
    var: item.sshKeyName
    op: exists
    value: null
