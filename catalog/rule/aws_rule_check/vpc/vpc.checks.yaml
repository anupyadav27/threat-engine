      value: null
    - var: item.EnableDnsSupport
      op: is_true
      value: null
- rule_id: aws.vpc.vpc.flow_logging_enabled
  for_each: aws.vpc.describe_nat_gateways
  severity: MEDIUM
  conditions:
    var: item.VpcId
    op: exists
    value: null
