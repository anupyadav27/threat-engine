- rule_id: aws.vpc.securitygroup.security_dns_hostnames_and_support_configured
  for_each: aws.vpc.describe_route_tables
  severity: MEDIUM
  conditions:
    all:
    - var: item.Routes[].DestinationCidrBlock
      op: not_contains
