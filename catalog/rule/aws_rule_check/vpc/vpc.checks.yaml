- rule_id: aws.vpc.subnet.dns_hostnames_and_support_configured
  for_each: aws.ec2.describe_subnets
  severity: MEDIUM
  conditions:
    all:
    - var: item.MapPublicIpOnLaunch
      op: is_false
      value: null
    - var: item.AssignIpv6AddressOnCreation
      op: is_false
      value: null
- rule_id: aws.vpc.subnet.flow_logging_enabled
  for_each: aws.vpc.describe_route_tables
  severity: MEDIUM
  conditions:
    var: item.RouteTables[].VpcId
