version: '1.0'
provider: aws
service: glacier
checks:
- rule_id: aws.glacier.policy.public_access_configured
  for_each: aws.glacier.describe_vault
  severity: HIGH
  conditions:
    any:
    - var: item.VaultARN
      op: not_exists
      value: null
    - all:
      - var: item.VaultARN
        op: exists
        value: null
      - not:
          var: item.VaultARN
          op: contains
          value: arn:aws:glacier
- rule_id: aws.glacier.vault.backup_enforced_on_sensitive_datasets_configured
  for_each: aws.glacier.describe_vault
  severity: MEDIUM
  conditions:
    all:
    - var: item.VaultName
      op: exists
      value: null
    - var: item.VaultARN
      op: exists
      value: null
- rule_id: aws.glacier.vault.backup_policies_configured
  for_each: aws.glacier.describe_vault
  severity: MEDIUM
  conditions:
    var: item.VaultARN
    op: exists
    value: null
- rule_id: aws.glacier.vault.backup_storage_immutability_enabled
  for_each: aws.glacier.describe_vault
  severity: MEDIUM
  conditions:
    var: item.VaultARN
    op: exists
    value: null
- rule_id: aws.glacier.vault.certificate_expiration_rules_configured
  for_each: aws.glacier.describe_vault
  severity: MEDIUM
  conditions:
    var: item.VaultARN
    op: exists
    value: null
- rule_id: aws.glacier.vault.cmk_cmek_key_configured
  for_each: aws.glacier.describe_vault
  severity: MEDIUM
  conditions:
    var: item.VaultARN
    op: exists
    value: null
- rule_id: aws.glacier.vault.encryption_at_rest_enabled
  for_each: aws.glacier.describe_vault
  severity: MEDIUM
  conditions:
    var: item.EncryptionAtRest
    op: exists
    value: null
- rule_id: aws.glacier.vault.encryption_in_transit_tls_min_1_2_configured
  for_each: aws.glacier.describe_vault
  severity: HIGH
  conditions:
    var: item.VaultARN
    op: exists
    value: null
- rule_id: aws.glacier.vault.immutable_retention_locked_where_required
  for_each: aws.glacier.describe_vault
  severity: LOW
  conditions:
    all:
    - var: item.VaultARN
      op: exists
      value: null
    - var: item.VaultName
      op: exists
      value: null
- rule_id: aws.glacier.vault.key_policy_least_privilege
  for_each: aws.glacier.describe_vault
  severity: HIGH
  conditions:
    all:
    - var: item.VaultARN
      op: exists
      value: null
    - any:
      - var: item.VaultARN
        op: not_contains
        value: arn:aws:glacier
      - var: item.VaultARN
        op: not_contains
        value: vaults
- rule_id: aws.glacier.vault.key_rotation_enabled
  for_each: aws.glacier.describe_vault
  severity: MEDIUM
  conditions:
    var: item.VaultARN
    op: exists
    value: null
- rule_id: aws.glacier.vault.protected_from_public_override_configured
  for_each: aws.glacier.describe_vault
  severity: HIGH
  conditions:
    all:
    - var: item.VaultName
      op: exists
      value: null
    - any:
      - var: item.VaultAccessPolicy
        op: exists
        value: null
      - var: item.VaultLock
        op: exists
        value: null
- rule_id: aws.glacier.vault.versioning_enabled_if_supported
  for_each: aws.glacier.describe_vault
  severity: LOW
  conditions:
    var: item.VaultARN
    op: exists
    value: null
