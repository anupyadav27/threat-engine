  - rule_id: gitlab.cis.2.resource_consumption_of_build_workers_is_monitored
    title: "Ensure resource consumption of build workers is monitored"
    severity: high
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "2.2.8"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Monitor the resource consumption of build workers and set alerts for high
      consumption that can lead to resource exhaustion.
    rationale: >
      Resource exhaustion is when machine resources or services are highly consumed
      until exhausted. Resource exhaustion may lead to DOS (Denial of Service). When
      such a situation happens to build workers, it slows down and even stops the
      build process, which harms the production of artifacts and the organization's
      ability to deliver software on schedule. To prevent that, it is recommended to
      monitor resources consumption in the build workers and set alerts to notify
      when they are highly consumed. That way resource exhaustion can be
      acknowledged and prevented at an early stage.
    audit_procedure: >
      Verify that there is monitoring of resources consumption for each build
      worker. GitLab Runner is instrumented with native Prometheus metrics, which
      can be exposed via an embedded HTTP server on the /metrics path. The server -
      if enabled - can be scraped by the Prometheus monitoring system or accessed
      with any other HTTP client. This is the list of available metrics: • #HELP
      gitlab_runner_api_request_statuses_total The total number of api requests,
      partitioned by runner, endpoint and status. • #HELP
      gitlab_runner_autoscaling_machine_creation_duration_seconds Histogram of
      machine creation time. • #HELP gitlab_runner_autoscaling_machine_states The
      current number of machines per state in this provider. • #HELP
      gitlab_runner_concurrent The current value of concurrent setting • #HELP
      gitlab_runner_errors_total The number of caught errors. • #HELP
      gitlab_runner_limit The current value of limit setting • #HELP
      gitlab_runner_request_concurrency The current number of concurrent requests
      for a new job • #HELP gitlab_runner_request_concurrency_exceeded_total Count
      of excess requests above the configured request_concurrency limit • #HELP
      gitlab_runner_version_info A metric with a constant '1' value labeled by
      different build stats fields.
    remediation: >
      Set resources consumption monitoring for each build worker. To learn how to
      set up a Prometheus server to scrape this HTTP endpoint and make use of the
      collected metrics, see Prometheus’s Getting started guide. Once this is done,
      the following information will be exposed: The exposed information includes: •
      Runner business logic metrics (e.g., the number of currently running jobs) •
      Go-specific process metrics (garbage collection stats, goroutines, memstats,
      etc.) • general process metrics (memory usage, CPU usage, file descriptor
      usage, etc.) • build version information References: 1.
      https://docs.gitlab.com/runner/monitoring/index.html
    references: >
      1. https://docs.gitlab.com/runner/monitoring/index.html
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_GITLAB_v1_0_1_2_2_8"
      nist_800_53: []
      soc2: []
      pci_dss: []
