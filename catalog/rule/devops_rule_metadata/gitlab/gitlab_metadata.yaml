  - rule_id: gitlab.cis.1.all_open_comments_are_resolved_before_allowing
    title: "Ensure all open comments are resolved before allowing code change merging"
    severity: medium
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "1.1.11"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      Organizations should enforce a 'no open comments' policy before allowing code
      change merging.
    rationale: >
      In an open code change proposal, reviewers can leave comments containing their
      questions and suggestions. These comments can also include potential bugs and
      security issues. Requiring all comments on a code change proposal to be
      resolved before it can be merged ensures that every concern is properly
      addressed or acknowledged before the new code changes are introduced to the
      code base. Impact: Code change proposals containing open comments would not be
      able to be merged into the code base.
    audit_procedure: >
      Ensure that All threads must be resolved before changes in a branch can be
      merged. To review these settings: 1. On the left sidebar, select Search or go
      to and find your project. 2. Select Settings > Merge requests . 3. In the
      Merge checks section, check to see that the All threads must be resolved
      checkbox has been selected.
    remediation: >
      You can prevent merge requests from being merged until all threads are
      resolved. When this setting is enabled, the Unresolved threads counter in a
      merge request is shown in orange when at least one thread remains unresolved.
      1. On the left sidebar, select Search or go to and find your project. 2.
      Select Settings > Merge requests . 3. In the Merge checks section, select the
      All threads must be resolved checkbox. 4. Select Save changes . Default Value:
      By default, code changes with open comments on them are able to be merged into
      the code base. References: 1.
      https://docs.gitlab.com/ee/user/project/merge_requests/index.html#prevent-
      merge-unless-all-threads-are-resolved
    references: >
      1. https://docs.gitlab.com/ee/user/project/merge_requests/index.html#prevent-
      merge-unless-all-threads-are-resolved
    impact: >
      Code change proposals containing open comments would not be able to be merged
      into the code base.
