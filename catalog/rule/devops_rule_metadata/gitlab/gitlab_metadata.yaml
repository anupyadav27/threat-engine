  - rule_id: gitlab.cis.1.strict_base_permissions_are_set_for_repositories
    title: "Ensure strict base permissions are set for repositories"
    severity: high
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "1.3.8"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Base permissions define the permission level automatically granted to all
      organization members. Define strict base access permissions for all of the
      repositories in the organization, including new ones.
    rationale: >
      Defining strict base permissions is the best practice in every role-based
      access control (RBAC) system. If the base permission is high — for example,
      'write' permission — every member of the organization will have 'write'
      permission to every repository in the organization. This will apply regardless
      of the specific permissions a user might need, which generally differ between
      organization repositories. The higher the permission, the higher the risk for
      incidents such as bad code commit or data breach. It is therefore recommended
      to set the base permissions to the strictest level possible. Impact: Users
      might not be able to access organization repositories or perform some acts as
      commits. These specific permissions should be granted individually for each
      user or team, as needed.
    audit_procedure: >
      Verify that strict base permissions are set for the organization groups by
      doing the following: • On the left sidebar, select Search or go to and find
      your project. • Select Manage > Members. • At the top of the member list, from
      the dropdown list, select Max role the members have in the group and
      descending order. In GitLab, you set the specific role for each new user in
      your group. Check the roles of your users to determine if it matches the
      least-privilege principle.
    remediation: >
      Set strict base permissions for the organization groups with the next steps: •
      On the left sidebar, select Search or go to and find your project. • Select
      Manage > Members. • At the top of the member list, from the dropdown list,
      select Max role the members have in the group and descending order. In GitLab,
      you set the specific role for each new user in your group. Ensure the roles
      for your users match the least-privilege principle. Default Value: Read
      permission
    references: >
      
    impact: >
      Users might not be able to access organization repositories or perform some
      acts as commits. These specific permissions should be granted individually for
      each user or team, as needed.
    compliance_mappings:
      cis:
        - "CIS_GITLAB_v1_0_1_1_3_8"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_gitlab_v1_0_1_1_3_8"
