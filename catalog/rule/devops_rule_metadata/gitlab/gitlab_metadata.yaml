  - rule_id: gitlab.cis.2.build_environment_is_logged
    title: "Ensure the build environment is logged"
    severity: high
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "2.1.3"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Keep build logs of the build environment detailing configuration and all
      activity within it. Also, consider to store them in a centralized
      organizational log store.
    rationale: >
      Logging the environment is important for two primary reasons: one, for
      debugging and investigating the environment in case of a bug or security
      incident; and two, for reproducing the environment easily when needed. Storing
      these logs in a centralized organizational log store allows the organization
      to generate useful insights and identify anomalies in the build process
      faster.
    audit_procedure: >
      Verify that the build environment is logged and stored in a centralized
      organizational log store. When a build environment is created, all information
      related to the environment is logged as part of the job logs. Depending on the
      stage in the build environment lifecycle, the path to retrieve the logs will
      differ: • When a job is running: #{ROOT_PATH}/gitlab-
      ci/builds/#{YYYY_mm}/#{project_id}/#{job_id}.log • After a job is finished:
      #{ROOT_PATH}/gitlab-
      rails/shared/artifacts/#{disk_hash}/#{YYYY_mm_dd}/#{job_id}/#{job_artifact_id}/jo
      b.log • After a log is archived:
      #{bucket_name}/#{disk_hash}/#{YYYY_mm_dd}/#{job_id}/#{job_artifact_id}/job.lo
      g
    remediation: >
      Keep logs of the build environment. Also, store the logs in a centralized
