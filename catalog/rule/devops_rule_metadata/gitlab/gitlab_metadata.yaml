  - rule_id: gitlab.cis.1.an_organization_provides_ssh_certificates
    title: "Ensure an organization provides SSH certificates"
    severity: medium
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "1.3.11"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      As an organization, become an SSH Certificate Authority and provide SSH keys
      for accessing repositories.
    rationale: >
      There are two ways for remotely working with Source Code Management: via
      HTTPS, which requires authentication by user/password, or via SSH, which
      requires the use of SSH keys. SSH authentication is better in terms of
      security; key creation and distribution, however, must be done in a secure
      manner. This can be accomplished by implementing SSH certificates, which are
      used to validate the server's identity. A developer will not be able to
      connect to a Git server if its key cannot be verified by the SSH Certificate
      Authority (CA) server. As an organization, one can verify the SSH certificate
      signature used to authenticate if a CA is defined and used. This ensures that
      only verified developers can access organization repositories, as their SSH
      key will be the only one signed by the CA certificate. This reduces the risk
      of misuse and malicious code commits. Impact: Members with unverified keys
      will not be able to clone organization repositories. Signing, certification,
      and verification might also slow down the development process.
    audit_procedure: >
      GitLab allows you to restrict the allowed SSH key technology as well as
      specify the minimum key length for each technology: 1. On the left sidebar, at
      the bottom, select Admin Area. 2. Select Settings > General . 3. Expand
      Visibility and access controls 4. If a restriction is imposed on any key type,
      users cannot upload new SSH keys that don’t meet the requirement. Any existing
      keys that don’t meet it are disabled but not removed and users cannot pull or
      push code using them.
    remediation: >
      If you do not have an existing SSH key pair, generate a new one: 1. Open a
      terminal. 2. Run ssh-keygen -t followed by the key type and an optional
      comment. This comment is included in the .pub file that’s created. 3. Press
      Enter. 4. Accept the suggested filename and directory, unless you are
      generating a deploy key or want to save in a specific directory where you
      store other keys. 5. Specify a passphrase 6. A confirmation is displayed,
      including information about where your files are stored. A public and private
      key are generated. 7. Add the public SSH key to your GitLab account and keep
      the private key secure. References: 1.
      https://docs.gitlab.com/ee/user/ssh.html#generate-an-ssh-key-pair 2.
      https://docs.gitlab.com/ee/security/ssh_keys_restrictions.html
    references: >
      1. https://docs.gitlab.com/ee/user/ssh.html#generate-an-ssh-key-pair 2.
      https://docs.gitlab.com/ee/security/ssh_keys_restrictions.html
    impact: >
      Members with unverified keys will not be able to clone organization
      repositories. Signing, certification, and verification might also slow down
      the development process.
    compliance_mappings:
      cis:
        - "CIS_GITLAB_v1_0_1_1_3_11"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_gitlab_v1_0_1_1_3_11"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: gitlab.cis.1.git_access_is_limited_based_on_ip_addresses
    title: "Ensure Git access is limited based on IP addresses"
    severity: medium
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "1.3.12"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      Limit Git access based on IP addresses by having a allowlist of IP addresses
      from which connection is possible.
    rationale: >
      Allowing access to Git repositories (source code) only from specific IP
      addresses adds yet another layer of restriction and reduces the risk of
      unauthorized connection to the organization's assets. This will prevent
      attackers from accessing Source Code Management (SCM), as they would first
      need to know the allowed IP addresses to gain access to them. Impact: Only
      members with allowlisted IP addresses will be able to access the
      organization's Git repositories.
    audit_procedure: >
      To ensure only people from your organization can access particular resources,
      you can restrict access to groups by IP address. This top-level group setting
      applies to: • The GitLab UI, including subgroups, projects, and issues. It
      does not apply to GitLab Pages. In GitLab 12.3 and later, the API. • In self-
      managed installations of GitLab 15.1 and later, you can also configure
      globally-allowed IP address ranges at the group level. To determine whether IP
      restrictions are in place: • On the left sidebar, select Search or go to and
      find your group. • Select Settings > General. • Expand the Permissions and
      group features section. • In the Restrict access by IP address text box, view
      the list of IP addresses.
    remediation: >
      To restrict group access by IP address: 1. On the left sidebar, select Search
      or go to and find your group. 2. Select Settings > General. 3. Expand the
      Permissions and group features section. 4. In the Restrict access by IP
      address text box, enter a list of IPv4 or IPv6 address ranges in CIDR
      notation. This list: o Has no limit on the number of IP address ranges. o Has
      a size limit of 1 GB. o Applies to both SSH or HTTP authorized IP address
      ranges. You cannot split this list by type of authorization. 5. Select Save
      changes . References: 1.
      https://docs.gitlab.com/ee/user/group/access_and_permissions.html#restrict-
      group-access-by-ip-address
    references: >
      1. https://docs.gitlab.com/ee/user/group/access_and_permissions.html#restrict-
      group-access-by-ip-address
    impact: >
      Only members with allowlisted IP addresses will be able to access the
      organization's Git repositories.
