  - rule_id: gitlab.cis.4.number_of_permitted_users_who_may_upload_new
    title: "Ensure number of permitted users who may upload new artifacts is minimized"
    severity: high
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "4.2.2"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Minimize ability to upload artifacts to the lowest number of trusted users
      possible.
    rationale: >
      Artifacts might contain sensitive data. Even the simplest mistake can also
      lead to trust issues with customers and harm the integrity of the product. To
      decrease these risks, allow only trusted and qualified users to upload new
      artifacts. Those users are less likely to make mistakes. Having the lowest
      number of such users possible will also decrease the risk of hacked user
