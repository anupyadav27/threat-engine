      pipelines decreases the risk for a successful attack through or on the CI
      pipeline. The more secure the pipeline, the less risk there is for potential
      exposure of sensitive data, a deployment being compromised, or external access
      mistakenly being granted to the CI infrastructure or the source code.
    audit_procedure: >
