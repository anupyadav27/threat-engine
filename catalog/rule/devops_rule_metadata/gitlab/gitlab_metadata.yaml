  - rule_id: gitlab.cis.4.user_access_to_the_package_registry_utilizes
    title: "Ensure user access to the package registry utilizes Multi- Factor Authentication (MFA)"
    severity: medium
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "4.2.3"
    cis_section: "4"
    profile_applicability: "Level 2"
    description: >
      Enforce Multi-Factor Authentication (MFA) for user access to the package
      registry.
    rationale: >
      By default, every user authenticates to the system by password only. If a
      user's password is compromised, the user account and all its related packages
      are in danger of data theft and malicious builds. It is therefore recommended
      that each user enables Multi-Factor Authentication. This additional step
      guarantees that the account stays secure even if the user's password is
      compromised, as it adds another layer of authentication.
    audit_procedure: >
      For each package registry in use, verify that Multi-Factor Authentication is
      enforced and is the only way to authenticate. • On the left sidebar, at the
      bottom, select Admin Area. • Select Settings > General. • Expand Sign-in
      restrictions: • Check if Enforce two-factor authentication is enabled. If so,
      you are compliant.
    remediation: >
      For each package registry in use, enforce Multi-Factor Authentication as the
      only way to authenticate. • On the left sidebar, at the bottom, select Admin
      Area. • Select Settings > General. • Expand Sign-in restrictions: • Select
      Enforce two-factor authentication to enable this feature.
    references: >
      
    impact: >
      
