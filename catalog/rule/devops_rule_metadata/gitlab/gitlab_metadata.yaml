  - rule_id: gitlab.cis.1.only_secured_webhooks_are_used
    title: "Ensure only secured webhooks are used"
    severity: high
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "1.4.4"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Use only secured webhooks in the source code management platform.
    rationale: >
      A webhook is an event listener, attached to critical and sensitive parts of
      the software delivery process. It is triggered by a list of events (such as a
      new code being committed), and when triggered, the webhook sends out a
      notification with some payload to specific internet endpoints. Since the
      payload of the webhook contains sensitive organization data, it's important
      all webhooks are directed to an endpoint (URL) protected by SSL verification
      (HTTPS). This helps ensure that the data sent is delivered to securely without
      any man-in-the-middle, who could easily access and even alter the payload of
      the request. Impact: Perform the following to ensure all webhooks used are
      secured (HTTPS): 1. Navigate to your organization or repository and select
      Settings . 2. Select Webhooks on the side menu. 3. Verify that each webhook
      URL starts with 'https'.
    audit_procedure: >
      Perform the following to secure all webhooks. For each project and for each
      group: • Navigate to the project or group • Select Settings > Webhooks on the
      side menu. • Ensure all webhooks starts with 'https'. • Ensure all webhooks
      state 'SSL Verification: enabled' As an Administrator: • Navigate to the Admin
      Area • Select System Hooks on the side menu. • Ensure all webhooks starts with
      'https'. • Ensure all webhooks state 'SSL Verification: enabled'
    remediation: >
      Perform the following to secure all webhooks. For each project and for each
      group: • Navigate to the project or group • Select Settings > Webhooks on the
      side menu. • Find any webhooks that start with 'http' and not 'https', or
      which have 'SSL Verification: disabled'. • Click Edit. • Change the payload
      URL to begin with 'https' • Select the 'Enable SSL verification' checkbox •
      Click Update webhook. As an Administrator: • Navigate to the Admin Area •
      Select System Hooks on the side menu. • Find any webhooks that start with
      'http' and not 'https', or which have 'SSL Verification: disabled'. • Click
      Edit. • Change the payload URL to begin with 'https' • Select the 'Enable SSL
      verification' checkbox • Click Update webhook. References: 1.
      https://docs.gitlab.com/ee/user/project/integrations/webhooks.html
    references: >
      1. https://docs.gitlab.com/ee/user/project/integrations/webhooks.html
    impact: >
      Perform the following to ensure all webhooks used are secured (HTTPS): 1.
      Navigate to your organization or repository and select Settings . 2. Select
      Webhooks on the side menu. 3. Verify that each webhook URL starts with
      'https'.
    compliance_mappings:
      cis:
        - "CIS_GITLAB_v1_0_1_1_4_4"
