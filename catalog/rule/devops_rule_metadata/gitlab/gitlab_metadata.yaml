  - rule_id: gitlab.cis.2.access_to_build_process_triggering_is_minimized
    title: "Ensure access to build process triggering is minimized"
    severity: high
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "2.3.5"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Restrict access to pipeline triggers.
    rationale: >
      Build pipelines are used for multiple reasons. Some are very sensitive, such
      as pipelines which deploy to production. In order to protect the environment
      from malicious acts or human mistakes, such as a developer deploying a bug to
      production, it is important to apply the Least Privilege principle to pipeline
      triggering. This principle requires restrictions placed on which users can run
      which pipeline. It allows for sensitive pipelines to only be run by
      administrators, who are generally the most trusted and skilled members of the
      organization.
    audit_procedure: >
      For every pipeline in use, verify only the necessary users have permission to
      trigger it. • On the left sidebar, select Search or go to and find your
      project. • Select Manage > Members • At the top of the member list, from the
      dropdown list, sort by Max role the members have in the group • Review the
      members to ensure relevant members are allowed to trigger pipelines in
      protected environments.
    remediation: >
      For every pipeline in use, grant only the necessary users permission to
      trigger it. • On the left sidebar, select Search or go to and find your
      project. • Select Settings > CI/CD. • Expand Protected environments. • Select
      Protect an environment. • From the Environment list, select the environment
      you want to protect. • In the Allowed to deploy list, select the role, users,
      or groups you want to give deploy access to. Keep in mind that: o There are
      two roles to choose from: ▪ Maintainers: Allows access to all of the project’s
      users with the Maintainer role. ▪ Developers: Allows access to all of the
      project’s users with the Maintainer and Developer role. o You can only select
      groups that are already invited to the project. o Users must have at least the
      Developer role to appear in the Allowed to deploy list. • In the Approvers
      list, select the role, users, or groups you want to give deploy access to.
      Keep in mind that: o There are two roles to choose from: ▪ Maintainers: Allows
      access to all of the project’s users with the Maintainer role. ▪ Developers:
      Allows access to all of the project’s users with the Maintainer and Developer
      role. o You can only select groups that are already invited to the project. o
      Users must have at least the Developer role to appear in the Approvers list. •
      In the Approval rules section: o Ensure that this number is less than or equal
      to the number of members in the rule. o See Deployment Approvals for more
      information about this feature. • Select Protect. References: 1.
      https://docs.gitlab.com/ee/ci/environments/protected_environments.html
    references: >
      1. https://docs.gitlab.com/ee/ci/environments/protected_environments.html
