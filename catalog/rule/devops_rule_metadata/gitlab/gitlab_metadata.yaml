  - rule_id: gitlab.cis.1.force_push_code_to_branches_is_denied
    title: "Ensure force push code to branches is denied"
    severity: high
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "1.1.16"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      The 'Force Push' option allows users with 'Push' permissions to force their
      changes directly to the branch without a pull request, and thus should be
      disabled.
    rationale: >
      The 'Force Push' option allows users to override the existing code with their
      own code. This can lead to both intentional and unintentional data loss, as
      well as data infection with malicious code. Disabling the 'Force Push' option
      prohibits users from forcing their changes to the master branch, which
      ultimately prevents malicious code from entering source code. Impact: Users
      cannot force push to protected branches.
    audit_procedure: >
      For every code repository in use, validate that no one can force push code by
      performing the following: • On GitLab, navigate to the main page of the
      repository. • Navigate to Settings > Repository . • Click Expand next to the
      Protected Branches section. • Verify that your repository's main (or default)
      branch is protected. • Verify that 'Allowed to force push' is toggled off.
    remediation: >
      For each repository in use, block the option to 'Force Push' code by
      performing the following: • On GitLab, navigate to the main page of the
      repository. • Navigate to Settings > Repository . • Click Expand next to the
      Protected Branches section. • Ensure your project's default branch is
      protected. • Toggle 'Allowed to force push' off. References: 1.
      https://docs.gitlab.com/ee/user/project/protected_branches.html
    references: >
      1. https://docs.gitlab.com/ee/user/project/protected_branches.html
    impact: >
      Users cannot force push to protected branches.
    compliance_mappings:
      cis:
        - "CIS_GITLAB_v1_0_1_1_1_16"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_gitlab_v1_0_1_1_1_16"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: gitlab.cis.1.branch_deletions_are_denied
    title: "Ensure branch deletions are denied"
    severity: high
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "1.1.17"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Ensure that users with only push access are incapable of deleting a protected
      branch.
    rationale: >
      When enabling deletion of a protected branch, any user with at least push
      access to the repository can delete a branch. This can be potentially
      dangerous, as a simple human mistake or a hacked account can lead to data loss
      if a branch is deleted. It is therefore crucial to prevent such incidents by
      denying protected branch deletion. Impact: Protected branches cannot be
      deleted.
    audit_procedure: >
      For each repository that is being used, verify that protected branches cannot
      be deleted by performing the following: View your protected branches by going
      to the left sidebar and selecting Search or go to and find your project.
      Select Settings > Repository. Expand Protected branches to view a list of
      protected branches.
    remediation: >
      For each repository that is being used, protect a branch in order to block the
      option to delete branches. To protect a branch for one project: 1. On the left
      sidebar, select Search or go to and find your project. 2. Select Settings >
      Repository . 3. Expand Protected branches . 4. Select Add protected branch .
      5. From the Branch dropdown list, select the branch you want to protect. 6.
      From the Allowed to merge list, select a role that can merge into this branch.
      7. From the Allowed to push and merge list, select a role that can push to
      this branch. Group owners can create protected branches at the group level.
      These settings are inherited by all projects in the group and can’t be
      overridden by project settings. If a specific branch is configured with
      Allowed to force push settings at both the group and project levels, the
      Allowed to force push setting at the project level is ignored in favor of the
      group level setting. Prerequisites: • You must have the Owner role in the
      group. To protect a branch for all the projects in a group: 1. On the left
      sidebar, select Search or go to and find your group. 2. Select Settings >
      Repository . 3. Expand Protected branches . 4. Select Add protected branch .
      5. In the Branch text box, type the branch name or a wildcard. Branch names
      and wildcards are case-sensitive. 6. From the Allowed to merge list, select a
      role that can merge into this branch. 7. From the Allowed to push and merge
      list, select a role that can push to this branch. 8. Select Protect .
      References: 1. https://docs.gitlab.com/ee/user/project/protected_branches.html
    references: >
      1. https://docs.gitlab.com/ee/user/project/protected_branches.html
    impact: >
      Protected branches cannot be deleted.
    compliance_mappings:
      cis:
        - "CIS_GITLAB_v1_0_1_1_1_17"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_gitlab_v1_0_1_1_1_17"
