  - rule_id: gitlab.cis.2.build_infrastructure_is_automatically_scanned_for
    title: "Ensure the build infrastructure is automatically scanned for vulnerabilities"
    severity: high
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "2.1.8"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Scan the build infrastructure and its dependencies for vulnerabilities. It is
      recommended that this be done automatically.
    rationale: >
      Automatic scanning for vulnerabilities detects known vulnerabilities in the
      tooling used by the build infrastructure and its dependencies. These
      vulnerabilities can lead to a potentially massive breach if not handled as
      fast as possible, as attackers might also be aware of such vulnerabilities.
    audit_procedure: >
      Verify that your build infrastructure is reviewed for vulnerabilities. GitLab
      Runner is designed to run user-controlled scripts. To reduce the attack
      surface if a job is malicious, you can consider running them in their own
      network segment. This would provide network separation from other
      infrastructure and services.
    remediation: >
      Ensure security hardening for your build infrastructure. For a cloud
      environment, this could include: • Configuring runner virtual machines in
      their own network segment • Blocking SSH access from the Internet to runner
      virtual machines • Restricting traffic between runner virtual machines •
      Filtering access to cloud provider metadata endpoints For static host runner,
      whether bare-metal or virtual machine, you should implement security best
      practices for the host operating system: Malicious code executed in the
      context of a CI job could compromise the host, so security protocols can help
      mitigate the impact. Other points to keep in mind include securing or removing
      files such as SSH keys from the host system that may enable an attacker to
      access other endpoints in the environment. References: 1.
      https://docs.gitlab.com/runner/security/
    references: >
      1. https://docs.gitlab.com/runner/security/
