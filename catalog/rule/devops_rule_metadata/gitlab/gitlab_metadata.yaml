  - rule_id: gitlab.cis.1.any_change_to_code_receives_approval_of_two
    title: "Ensure any change to code receives approval of two strongly authenticated users"
    severity: high
    category: devops
    tech_type: gitlab
    automation_type: automated
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "1.1.3"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Ensure that every code change is reviewed and approved by two authorized
      contributors who are both strongly authenticated - using Multi-Factor
      Authentication (MFA), from the team relevant to the code change.
    rationale: >
      To prevent malicious or unauthorized code changes, the first layer of
      protection is the process of code review. This process involves engineer
      teammates reviewing each other's code for errors, optimizations, and general
      knowledge-sharing. With proper peer reviews in place, an organization can
      detect unwanted code changes very early in the process of release. In order to
      help facilitate code review, companies should employ automation to verify that
      every code change has been reviewed and approved by at least two team members
      before it is pushed into the code base. These team members should be from the
      team that is related to the code change, so it will be a meaningful review.
      Impact: To enforce a code review requirement, verification for a minimum of
      two reviewers must be put into place. This will ensure new code will not be
      able to be pushed to the code base before it has received two independent
      approvals.
    audit_procedure: >
      For every project in use, perform the next steps to verify that two approvals
      from the specific project team are required to push new code to the code base:
      • On the left sidebar, select Search or go to and find your project. • Select
      Settings > Merge requests. • In the Merge request approvals section, in the
      Approval rules section, next to the rule you want to edit, select Edit. •
      Review the field In Approvals required, if the number is 2 or above, you are
      compliant.
    remediation: >
      For every project in use, perform the next steps to require two approvals from
      the specific project team in order to push new code to the code base: • On the
      left sidebar, select Search or go to and find your project. • Select Settings
      > Merge requests. • In the Merge request approvals section, in the Approval
      rules section, next to the rule you want to edit, select Edit. • Edit the
      field In Approvals required to ensure the value is 2 or above. • Select Update
      approval rule. Default Value: 0 References: 1.
      https://docs.gitlab.com/ee/user/project/merge_requests/approvals/rules.html#edit
      -an-approval-rule
    references: >
      1.
      https://docs.gitlab.com/ee/user/project/merge_requests/approvals/rules.html#edit
      -an-approval-rule
    impact: >
      To enforce a code review requirement, verification for a minimum of two
      reviewers must be put into place. This will ensure new code will not be able
      to be pushed to the code base before it has received two independent
      approvals.
    compliance_mappings:
      cis:
        - "CIS_GITLAB_v1_0_1_1_1_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_gitlab_v1_0_1_1_1_3"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: gitlab.cis.1.previous_approvals_are_dismissed_when_updates_are
    title: "Ensure previous approvals are dismissed when updates are introduced to a code change proposal"
    severity: high
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "1.1.4"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Ensure that when a proposed code change is updated, previous approvals are
      declined, and new approvals are required.
    rationale: >
      An approval process is necessary when code changes are suggested. Through this
      approval process, however, changes can still be made to the original proposal
      even after some approvals have already been given. This means malicious code
      can find its way into the code base even if the organization has enforced a
      review policy. To ensure this is not possible, outdated approvals must be
      declined when changes to the suggestion are introduced. Impact: If new code
      changes are pushed to a specific proposal, all previously accepted code change
      proposals must be declined.
    audit_procedure: >
      For each code repository in use, perform the next steps to verify that each
      updated code suggestion declines the previously received approvals: • On
      GitLab, navigate to the main page of a repository. • Navigate to Settings >
      Merge Requests. • Click Expand next to the Merge Request Approvals section. •
      Verify the repository has merge request approvals configured on all protected
      branches. • Verify that 'Remove all approvals' is selected under Approval
      Settings for 'When a commit is added'.
    remediation: >
      For each code repository in use, perform the next steps to enforce dismissal
      of given approvals to code change suggestions if those suggestions were
      updated: • On GitLab, navigate to the main page of a repository. • Navigate to
      Settings > Merge Requests. • Click Expand next to the Merge Request Approvals
      section. • Configure approval rules and a list of eligible approvers for all
      protected branches (or all branches). • Select Remove all approvals under
      'When a commit is added'. • Click Save changes References: 1.
      https://docs.gitlab.com/ee/user/project/merge_requests/approvals/rules.html
    references: >
      1. https://docs.gitlab.com/ee/user/project/merge_requests/approvals/rules.html
    impact: >
      If new code changes are pushed to a specific proposal, all previously accepted
      code change proposals must be declined.
    compliance_mappings:
      cis:
        - "CIS_GITLAB_v1_0_1_1_1_4"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_gitlab_v1_0_1_1_1_4"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: gitlab.cis.1.there_are_restrictions_on_who_can_dismiss_code
    title: "Ensure there are restrictions on who can dismiss code change reviews"
    severity: high
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "1.1.5"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Only trusted users should be allowed to dismiss code change reviews.
    rationale: >
      Dismissing a code change review permits users to merge new suggested code
      changes without going through the standard process of approvals. Controlling
      who can perform this action will prevent malicious actors from simply
      dismissing the required reviews to code changes and merging malicious or
      dysfunctional code into the code base. Impact: In cases where a code change
      proposal has been updated since it was last reviewed and the person who
      reviewed it isn't available for approval, a general collaborator would not be
      able to merge their code changes until a user with 'dismiss review' abilities
      could dismiss the open review. Users who are not allowed to dismiss code
      change reviews will not be permitted to do so, and thus are unable to waive
      the standard flow of approvals.
    audit_procedure: >
      For each code repository in use, perform the next steps to verify that only
      trusted users are allowed to dismiss code change reviews: To verify that
      restrictions are in place around who can dismiss code change reviews, view
      your branch protection settings for a project. You must have at least the
      Maintainer role. 1. On the left sidebar, select Search or go to and find your
      project. 2. Select Settings > Repository. 3. Expand Protected branches.
    remediation: >
      Prerequisites: You must have at least the Maintainer role. When granting a
      group Allowed to merge or Allowed to push and merge permissions on a protected
      branch, the group must be added to the project. To protect a branch: 1. On the
      left sidebar, select Search or go to and find your project. 2. Select Settings
      > Repository. 3. Expand Protected branches. 4. Select Add protected branch. 5.
      From the Branch dropdown list, select the branch you want to protect. 6. From
      the Allowed to merge list, select a role that can merge into this branch. 7.
      From the Allowed to push and merge list, select a role that can push to this
      branch. In GitLab Premium and Ultimate, you can also add groups or individual
      users to Allowed to merge and Allowed to push and merge. Select Protect. The
      protected branch displays in the list of protected branches. Default Value: By
      default, all users who have write access to the code repository are able to
      dismiss code change reviews. References: 1.
      https://docs.gitlab.com/ee/user/project/protected_branches.html
    references: >
      1. https://docs.gitlab.com/ee/user/project/protected_branches.html
    impact: >
      In cases where a code change proposal has been updated since it was last
      reviewed and the person who reviewed it isn't available for approval, a
      general collaborator would not be able to merge their code changes until a
      user with 'dismiss review' abilities could dismiss the open review. Users who
      are not allowed to dismiss code change reviews will not be permitted to do so,
      and thus are unable to waive the standard flow of approvals.
    compliance_mappings:
      cis:
        - "CIS_GITLAB_v1_0_1_1_1_5"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_gitlab_v1_0_1_1_1_5"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: gitlab.cis.1.code_owners_are_set_for_extra_sensitive_code_or
    title: "Ensure code owners are set for extra sensitive code or configuration"
    severity: high
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "1.1.6"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Code owners are trusted users that are responsible for reviewing and managing
      an important piece of code or configuration. An organization is advised to set
      code owners for every extremely sensitive code or configuration.
    rationale: >
      Configuring code owners protects data by verifying that trusted users will
      notice and review every edit, thus preventing unwanted or malicious changes
      from potentially compromising sensitive code or configurations. Impact: Code
      owner users will receive notifications for every change that occurs to the
      code and subsequently added as reviewers of pull requests automatically.
    audit_procedure: >
      In every project, view the Code Owners of a file or directory: 1. On the left
      sidebar, select Search or go to and find your project. 2. Select Code >
      Repository. 3. Go to the file or directory you want to see the Code Owners
      for. 4. Optional. Select a branch or tag. GitLab shows the Code Owners at the
      top of the page.
    remediation: >
      Prerequisite: You must be able to either push to the default branch or create
      a merge request. 1. Create a CODEOWNERS file in your preferred location. 2.
      Define some rules in the file following the Code Owners syntax reference. Some
      suggestions: o Configure All eligible approvers approval rule. o Require Code
      Owner approval on a protected branch. 3. Commit your changes, and push them up
      to GitLab. Default Value: None References: 1.
      https://docs.gitlab.com/ee/user/project/codeowners/
    references: >
      1. https://docs.gitlab.com/ee/user/project/codeowners/
    impact: >
      Code owner users will receive notifications for every change that occurs to
      the code and subsequently added as reviewers of pull requests automatically.
    compliance_mappings:
      cis:
        - "CIS_GITLAB_v1_0_1_1_1_6"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_gitlab_v1_0_1_1_1_6"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: gitlab.cis.1.code_owner_s_review_is_required_when_a_change
    title: "Ensure code owner's review is required when a change affects owned code"
    severity: high
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "1.1.7"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Ensure trusted code owners are required to review and approve any code change
      proposal made to their respective owned areas in the code base.
    rationale: >
      Configuring code owners ensures that no code, especially code which could
      prove malicious, will slip into the source code or configuration files of a
      repository. This allows an organization to mark areas in the code base that
      are especially sensitive or more prone to an attack. It can also enforce
      review by specific individuals who are designated as owners to those areas so
      that they may filter out unauthorized or unwanted changes beforehand. Impact:
      If an organization enforces code owner-based reviews, some code change
      proposals would not be able to be merged to the codebase before specific,
      trusted individuals approve them.
    audit_procedure: >
      With merge request approval rules, you can set the minimum number of required
      approvals by code owners before work can merge into your project. 1. On the
      left sidebar, select Search or go to and find your project. 2. Select Settings
      > Repository . 3. Expand Protected branches . 4. Next to the default branch,
      turn on the toggle under Code owner approval .
    remediation: >
      Prerequisites: • You must have at least the Maintainer role for the project. •
      To add a group as an approver in GitLab.com, you must be a member of the group
      or the group must be public. To add a merge request approval rule: 1. On the
      left sidebar, select Search or go to and find your project. 2. Select Settings
      > Merge requests . 3. In the Merge request approvals section, in the Approval
      rules section, select Add approval rule . 4. Complete the fields: o In
      Approvals required , a value of 0 makes the rule optional, and any number
      greater than 0 creates a required rule. Maximum number of required approvals
      is 100. o From Add approvers , select users or groups that are eligible to
      approve. GitLab suggests approvers based on previous authors of the files
      changed by the merge request. 5. Select Add approval rule . You can add
      multiple approval rules. Default Value: Code owners are not required to review
      changes by default. References: 1.
      https://docs.gitlab.com/ee/user/project/merge_requests/approvals/ 2.
      https://docs.gitlab.com/ee/user/project/merge_requests/approvals/rules.html 3.
      https://docs.gitlab.com/ee/user/project/codeowners/index.html
    references: >
      1. https://docs.gitlab.com/ee/user/project/merge_requests/approvals/ 2.
      https://docs.gitlab.com/ee/user/project/merge_requests/approvals/rules.html 3.
      https://docs.gitlab.com/ee/user/project/codeowners/index.html
    impact: >
      If an organization enforces code owner-based reviews, some code change
      proposals would not be able to be merged to the codebase before specific,
      trusted individuals approve them.
    compliance_mappings:
      cis:
        - "CIS_GITLAB_v1_0_1_1_1_7"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_gitlab_v1_0_1_1_1_7"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: gitlab.cis.1.inactive_branches_are_periodically_reviewed_and
    title: "Ensure inactive branches are periodically reviewed and removed"
    severity: high
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "1.1.8"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Keep track of code branches that are inactive for a lengthy period of time and
      periodically remove them.
    rationale: >
      Git branches that have been inactive (i.e., no new changes introduced) for a
      long period of time are enlarging the surface of attack for malicious code
      injection, sensitive data leaks, and CI pipeline exploitation. They
      potentially contain outdated dependencies which may leave them highly
      vulnerable. They are more likely to be improperly managed, and could possibly
      be accessed by a large number of members of the organization. Impact: Removing
      inactive Git branches means that any code changes they contain would be
      removed along with them, thus work done in the past might not be accessible
      after auditing for inactivity.
    audit_procedure: >
      For each project, verify that all existing Git branches are active or have yet
      to be checked for inactivity by performing the next steps: • Navigate to the
      main page of the project. • In the sidebar select Code > Branches • Use the
      navigation at the top of the page to view the Stale branches. The Stale view
      shows all branches that no one has committed to in the last three months,
      ordered by the branches with the oldest commits first. • If the list is empty,
      you are compliant. If the list is not empty, but there is a valid reason the
      branches listed are not deleted, you are compliant. You can perform the next
      steps to verify that merge request branches are prevented from becoming stale
      branches by default: • Navigate to the main page of the project. • In the left
      sidebar select Settings > Merge requests • Verify if 'Enable 'Delete source
      branch' option by default' is selected. If it is not selected, you are more
      likely to become non-compliant.
    remediation: >
      For each project, review existing Git branches and remove those which were
      identified during the audit as being non-compliant by performing the
      following: • Navigate to the main page of the project. • In the sidebar select
      Code > Branches • Next to each non-compliant branch select the vertical
      ellipsis • Select 'Delete branch' • Read the warning • Select 'Yes, delete
      branch' You can perform the next steps to reduce the likelihood of a stale
      branches remaining after a merge request: • Navigate to the main page of the
      project. • In the left sidebar select Settings > Merge requests • Select
      'Enable 'Delete source branch' option by default'. Default Value: By default,
      newly opened Git branches would never be removed, regardless of activity or
      inactivity. References: 1.
      https://docs.gitlab.com/ee/user/project/repository/branches/
    references: >
      1. https://docs.gitlab.com/ee/user/project/repository/branches/
    impact: >
      Removing inactive Git branches means that any code changes they contain would
      be removed along with them, thus work done in the past might not be accessible
      after auditing for inactivity.
    compliance_mappings:
      cis:
        - "CIS_GITLAB_v1_0_1_1_1_8"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_gitlab_v1_0_1_1_1_8"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: gitlab.cis.1.all_checks_have_passed_before_merging_new_code
    title: "Ensure all checks have passed before merging new code"
    severity: high
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "1.1.9"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Before a code change request can be merged to the code base, all predefined
      checks must successfully pass.
    rationale: >
      On top of manual reviews of code changes, a code protect should contain a set
      of prescriptive checks which validate each change. Organizations should
      enforce those status checks so that changes can only be introduced if all
      checks have successfully passed. This set of checks should serve as the
      absolute quality, stability, and security conditions which must be met in
      order to merge new code to a project. Impact: Code changes in which all checks
      do not pass successfully would not be able to be pushed into the code base of
      the specific code repository.
    audit_procedure: >
      Within each project’s settings, you can see a list of status check services
      added to the project: 1. In your project, go to Settings > Merge requests
      section. 2. Scroll down to Status checks . 3. Ensure that the Status checks
      must succeed checkbox has been selected.
    remediation: >
      To block the merging of merge requests when checks fail: 1. On the left
      sidebar, select Search or go to and find your project. 2. Select Settings >
      Merge requests . 3. Select the Status checks must succeed checkbox. 4. Select
      Save changes . Default Value: By default, no checks are defined per project,
      and thus no enforcement of checks is made. References: 1.
      https://docs.gitlab.com/ee/user/project/merge_requests/status_checks.html
    references: >
      1. https://docs.gitlab.com/ee/user/project/merge_requests/status_checks.html
    impact: >
      Code changes in which all checks do not pass successfully would not be able to
      be pushed into the code base of the specific code repository.
    compliance_mappings:
      cis:
        - "CIS_GITLAB_v1_0_1_1_1_9"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_gitlab_v1_0_1_1_1_9"
