  - rule_id: gitlab.cis.2.build_workers_are_single_used
    title: "Ensure build workers are single-used"
    severity: high
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "2.2.1"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Use a clean instance of build worker for every pipeline run.
    rationale: >
      Using a clean instance of build worker for every pipeline run eliminates the
      risks of data theft, data integrity breaches, and unavailability. It limits
      the pipeline's access to data stored on the file system from previous runs,
      and the cache is volatile. This prevents malicious changes from affecting
      other pipelines or the Continuous Integration/Continuous Delivery system
      itself. Impact: Data and cache will not be saved in different pipeline runs.
    audit_procedure: >
      Ensure that every pipeline that is being run has its own clean, new runner. In
      GitLab, each of your jobs runs in a newly provisioned VM, which is dedicated
      to the specific job. The VM is active only for the duration of the job and
      immediately deleted. This means that any changes that your job makes to the
      virtual machine will not be available to a subsequent job. The virtual machine
      where your job runs has sudo access with no password.
    remediation: >
      Create a clean build worker for every pipeline that is being run, or use build
      platform- hosted runners, as they typically offer a clean instance for every
      run. In GitLab, use Runner SaaS to ensure all of these settings are available
      by default and that each job runs in a dedicated VM. References: 1.
      https://docs.gitlab.com/ee/ci/runners/index.html
    references: >
      1. https://docs.gitlab.com/ee/ci/runners/index.html
    impact: >
      Data and cache will not be saved in different pipeline runs.
    compliance_mappings:
      cis:
        - "CIS_GITLAB_v1_0_1_2_2_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_gitlab_v1_0_1_2_2_1"
