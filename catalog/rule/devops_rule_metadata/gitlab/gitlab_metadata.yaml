  - rule_id: gitlab.cis.1.any_merging_of_code_is_automatically_scanned_for
    title: "Ensure any merging of code is automatically scanned for risks"
    severity: high
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "1.1.18"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Ensure that every pull request is required to be scanned for risks.
    rationale: >
      Scanning pull requests to detect risks allows for early detection of
      vulnerable code and/or dependencies and helps mitigate potentially malicious
      code.
    audit_procedure: >
      For each project in use, ensure that every merge request must be scanned for
      risks by performing the following: 1. On the left sidebar, select Search or go
      to and search for the “go-example- a” project. 2. Go to Secure > Policies. 3.
      Review your list of existing policies. The Policy Type column will indicate
      whether you have enabled a Scan Execution Policy for the specified project. 4.
      Click on the Name in order to view the policy details which specifies which
      scanners run when code is merged.
    remediation: >
      For each project in use, ensure that every merge request must be scanned for
      risks by creating a scan execution policy: 1. On the left sidebar, select
      Search or go to and search for the “go-example- a” project. 2. Go to Secure >
      Policies. 3. Select New policy. 4. In the Scan execution policy section,
      select Select policy. 5. Complete the fields. o Name: Enforce secret
      detection. o Policy status: Enabled. o Actions: Run a Secret Detection scan. o
      Conditions: Triggers every time a pipeline runs for all branches. 6. Select
      Configure with a merge request. The policy project “go-example-a” security
      project is created, and a merge request is created. 7. Optional. Review the
      generated policy YAML in the merge request’s Changes tab. 8. Go to the
      Overview tab and select Merge. 9. On the left sidebar, select Search or go to
      and search for the “go-example- a” project. 10. Go to Secure > Policies. You
      now have a scan execution policy that runs a secret detection scan on every
      MR, for any branch. Test the policy by creating a merge request in project A.
      References: 1.
      https://docs.gitlab.com/ee/user/application_security/index.html#enforce-scan-
      execution 2.
      https://docs.gitlab.com/ee/user/application_security/policies/scan-execution-
      policies.html
    references: >
