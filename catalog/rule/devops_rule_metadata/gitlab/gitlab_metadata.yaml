  - rule_id: gitlab.cis.2.build_workers_are_automatically_scanned_for
    title: "Ensure build workers are automatically scanned for vulnerabilities"
    severity: high
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "2.2.6"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Scan build workers for vulnerabilities. It is recommended that this be done
      automatically.
    rationale: >
      Automatic scanning for vulnerabilities detects known weaknesses in
      environmental sources in use, such as docker images or kernel versions. Such
      vulnerabilities can lead to a massive breach if these environments are not
      replaced as fast as possible, since attackers also know about these
      vulnerabilities and often try to take advantage of them. Setting automatic
      scanning which scans environmental sources ensures that if any new
      vulnerability is revealed, it can be replaced quickly and easily. This
      protects the worker from being exposed to attacks.
    audit_procedure: >
      If you are using a static host for a runner, whether bare-metal or virtual
      machine, you should implement security best practices for the host operating
      system. Malicious code executed in the context of a CI job could compromise
      the host, so security protocols can help mitigate the impact. Other points to
      keep in mind include securing or removing files such as SSH keys from the host
      system that may enable an attacker to access other endpoints in the
      environment.
    remediation: >
      For each build worker, automatically scan its environmental sources, such as
      docker image, for vulnerabilities. • Create a new project. • Add a Dockerfile
      file to the project. This Dockerfile contains minimal configuration required
      to create a Docker image. • Create pipeline configuration for the new project
      to create a Docker image from the Dockerfile, build and push a Docker image to
      the container registry, and then scan the Docker image for vulnerabilities. •
      Check for reported vulnerabilities. • Update the Docker image and scan the
      updated image. References: 1.
      https://docs.gitlab.com/ee/tutorials/container_scanning/
    references: >
      1. https://docs.gitlab.com/ee/tutorials/container_scanning/
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_GITLAB_v1_0_1_2_2_6"
