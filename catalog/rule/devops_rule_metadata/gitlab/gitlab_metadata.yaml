  - rule_id: gitlab.cis.3.signed_metadata_of_the_build_process_is_required
    title: "Ensure signed metadata of the build process is required and verified"
    severity: high
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "3.1.3"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Require and verify signed metadata of the build process for all dependencies
      in use.
    rationale: >
      The metadata of a build process lists every action that took place during an
      artifact build. It is used to ensure that an artifact has not been compromised
      during the build, that no malicious code was injected into it, and that no
      nefarious dependencies were added during the build phase. This creates trust
      between user and vendor that the software supplied is exactly the software
      that was promised. Signing this metadata adds a checksum to ensure there have
      been no revisions since its creation, as this checksum changes when the
      metadata is altered. Verification of proper metadata signature with
      Certificate Authority confirms that the signature was produced by a trusted
