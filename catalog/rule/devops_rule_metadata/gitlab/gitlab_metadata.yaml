  - rule_id: gitlab.cis.1.multi_factor_authentication_mfa_is_required_for
    title: "Ensure Multi-Factor Authentication (MFA) is required for contributors of new code"
    severity: medium
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "1.3.4"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      Require collaborators from outside the organization to use Multi-Factor
      Authentication (MFA) in addition to a standard user name and password when
      authenticating to the source code management platform.
    rationale: >
      By default every user authenticates within the system by password only. If the
      password of a user is compromised, however, the user account and every
      repository to which they have access are in danger of data loss, malicious
      code commits, and data theft. It is therefore recommended that each user has
      Multi-Factor Authentication enabled. This adds an additional layer of
      protection to ensure the account remains secure even if the user's password is
      compromised. Impact: A member without enabled Multi-Factor Authentication
      cannot contribute to the project. They must enable Multi-Factor Authentication
      a before they can contribute any code.
    audit_procedure: >
      For your top-level group, verify that Multi-Factor Authentication is enforced
      for contributors and is the only way to authenticate, by doing the following:
      • On the left sidebar, at the bottom, select Admin Area. • Select Settings >
      General. • Expand Sign-in restrictions: • Check if Enforce two-factor
      authentication is enabled. If so, you are compliant.
    remediation: >
      For your top-level group, enforce that Multi-Factor Authentication is enforced
      for contributors and is the only way to authenticate, by doing the following:
      • On the left sidebar, at the bottom, select Admin Area. • Select Settings >
      General. • Expand Sign-in restrictions: • Select Enforce two-factor
      authentication to enable this feature. References: 1.
      https://docs.gitlab.com/ee/security/two_factor_authentication.html
    references: >
