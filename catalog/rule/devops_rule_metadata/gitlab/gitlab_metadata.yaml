    rationale: >
      Repository administrators have the highest permissions to said repository.
      These include the ability to add/remove collaborators, change branch
      protection policy, and convert to a publicly-accessible repository. Due to the
      liberal access granted to a repository administrator, it is highly recommended
      that only two contributors occupy this role. Impact: Removing administrative
      users from a repository would result in them losing high-level access to that
      repository.
    audit_procedure: >
