  - rule_id: gitlab.cis.1.any_change_to_code_can_be_traced_back_to_its
    title: "Ensure any change to code can be traced back to its associated task"
    severity: high
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "1.1.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Use a task management system to trace any code back to its associated task.
    rationale: >
      The ability to trace each piece of code back to its associated task simplifies
      the Agile and DevOps process by enabling transparency of any code changes.
      This allows faster remediation of bugs and security issues, while also making
      it harder to push unauthorized code changes to sensitive projects.
      Additionally, using a task management system simplifies achieving compliance,
      as it is easier to track each regulation.
    audit_procedure: >
      Ensure every code change can be traced back to its origin task in a task
      management system.
    remediation: >
      Use GitLab issues to manage tasks as the starting point for each code change.
      Whether it is a new feature, bug fix, or security fix - all should originate
      from a dedicated task (GitLab issue) in your organization's task management
      system. Tasks (issues) should be linked to Merge Requests, and Merge requests
      should be linked to Issues. References: 1.
      https://docs.gitlab.com/ee/user/project/issues/related_issues.html
    references: >
      1. https://docs.gitlab.com/ee/user/project/issues/related_issues.html
