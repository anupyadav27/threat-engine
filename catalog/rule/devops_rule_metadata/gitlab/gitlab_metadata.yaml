  - rule_id: gitlab.cis.1.new_members_are_required_to_be_invited_using
    title: "Ensure new members are required to be invited using company-approved email"
    severity: medium
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "1.3.6"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      Existing members of an organization can invite new members to join, however
      new members must only be invited with their company-approved email.
    rationale: >
      Ensuring new members of an organization have company-approved email prevents
      existing members of the organization from inviting arbitrary new users to
      join. Without this verification, they can invite anyone who is using the
      organization's version control system or has an active email account, thus
      allowing outside users (and potential threat actors) to easily gain access to
      company private code and resources. This practice will subsequently reduce the
      chance of human error or typos when inviting a new member. Impact: Existing
      members would not be able to invite new users who do not have a company-
      approved email address.
    audit_procedure: >
      For each group in use, verify for every invitation that the invited email
      address is company-approved by performing the following: On the left sidebar,
      select Search or go to and find your group. Select Manage > Members. Members
      that are not automatically added are displayed on the Invited tab. Verify that
      each invitation email is company approved by your company.
    remediation: >
      For each group, allow only users with company-approved email to be invited. If
      a user was invited without company-approved email, perform the following: On
      the left sidebar, select Search or go to and find your group. Select Manage >
      Members. Members that are not automatically added are displayed on the Invited
      tab. Verify that each invitation email is company approved by your company. To
      cancel the user's invitation to join your organization, click Cancel
      invitation. References: 1. https://docs.gitlab.com/ee/user/group/#add-users-
      to-a-group
    references: >
      1. https://docs.gitlab.com/ee/user/group/#add-users-to-a-group
    impact: >
      Existing members would not be able to invite new users who do not have a
      company- approved email address.
    compliance_mappings:
      cis:
        - "CIS_GITLAB_v1_0_1_1_3_6"
      nist_800_53: []
      soc2: []
      pci_dss: []
