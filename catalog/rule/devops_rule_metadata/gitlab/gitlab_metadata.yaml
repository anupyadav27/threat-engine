  - rule_id: gitlab.cis.1.branch_protection_is_enforced_on_the_default
    title: "Ensure branch protection is enforced on the default branch"
    severity: high
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "1.1.20"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Enforce branch protection on the default and main branch.
    rationale: >
      The default or main branch of repositories is considered very important, as it
      is eventually gets deployed to the production. Therefore it needs protection.
      By enforcing branch protection rules on this branch, it is secured from
      unwanted or unauthorized changes. It can also be protected from untested and
      unreviewed changes and more.
    audit_procedure: >
      The default branch of GitLab repositories are protected by default. This
      setting can be overridden at the instance, group, or project level. To verify
      that branch protection is enabled for the main or default branch at the
      project level: 1. Navigate to the main page of the GitLab repository. 2.
      Select Settings > Repository . 3. Expand Protected branches . 4. Verify that
      initial default branch protection is applied to the 'main' or default branch.
      GitLab Group Owners can also perform the following to ensure branch protection
      is enabled by default for new projects at the group level: 1. Navigate to the
      main page for your GitLab group. 2. Select Settings > Repository . 3. Under
      Default branch , verify that initial default branch protection is applied to
      the 'main' or default branch. GitLab administrators can perform the following
      to ensure branch protection is enabled by default for the main or default
      branch of all new projects at the instance level (self- managed GitLab only):
      1. Navigate to Admin Area . 2. Select Settings > Repository . 3. Under Default
      branch , verify that initial default branch protection is applied to the
      'main' or default branch.
    remediation: >
      Perform the following to enforce branch protection on the main or default
      branch at the project level: 1. Navigate to your project page. 2. Select
      Settings > Repository. 3. Expand Protected branches . 4. Select Add protected
      branch . 5. From the Branch dropdown list, select the project's main or
      default branch. 6. Choose the roles who should be Allowed to merge and Allowed
      to push and merge for this protected default branch. 7. Select Protect .
      Perform the following to enforce branch protection on the main or default
      branch of new projects at the group level: 1. Navigate to the main page for
      your GitLab group. 2. Select Settings > Repository . 3. Expand Default branch
      4. Enable initial default branch protection for the 'main' or default branch
      of new repositories created in the group. 5. Select Save changes . Perform the
      following to enforce branch protection on the main branch of new projects at
      the instance level (self-managed GitLab administrators only): 1. Navigate to
      Admin Area . 2. Select Settings > Repository . 3. Expand Default branch . 4.
      Enable initial default branch protection for the 'main' or default branch of
      new repositories created on this GitLab instance. 5. Select Save changes .
      References: 1. https://docs.gitlab.com/ee/api/protected_branches.html 2.
      https://docs.gitlab.com/ee/api/group_protected_branches.html(PREMIUM, SaaS
      only) 3. https://docs.gitlab.com/ee/api/settings.html(Instance-level Admin
      Only)
    references: >
