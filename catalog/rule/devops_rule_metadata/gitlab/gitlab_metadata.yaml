  - rule_id: gitlab.cis.2.webhooks_of_the_build_environment_are_secured
    title: "Ensure webhooks of the build environment are secured"
    severity: high
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "2.1.10"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Use secured webhooks of the build environment.
    rationale: >
      Webhooks are used for triggering an HTTP request based on an action made in
      the platform. Typically, build environment feature webhooks for a pipeline
      trigger based on source code event. Since webhooks are an HTTP POST request,
      they can be malformed if not secured over SSL. To prevent a potential hack and
      compromise of the webhook or to the environment or web server excepting the
      request, use only secured webhooks.
    audit_procedure: >
      For each webhook in use, ensure it is secured (HTTPS) via the following
      process: • In your project or group, on the left sidebar, select Settings >
      Webhooks. • For each webhook, click Edit. • Verify if the Enable SSL
      verification checkbox is checked. • Select Add webhook.
    remediation: >
      For each webhook in use, change it to secured (over HTTPS). • In your project
      or group, on the left sidebar, select Settings > Webhooks. • For each webhook,
      click Edit. • Ensure the Enable SSL verification checkbox is checked. • Select
      Save. References: 1.
      https://docs.gitlab.com/ee/user/project/integrations/webhooks.html#configure-a-
      webhook-in-gitlab
