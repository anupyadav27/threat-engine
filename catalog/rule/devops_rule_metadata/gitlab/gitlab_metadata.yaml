  - rule_id: gitlab.cis.1.repository_deletion_is_limited_to_specific_users
    title: "Ensure repository deletion is limited to specific users"
    severity: high
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "1.2.3"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Ensure only a limited number of trusted users can delete repositories.
    rationale: >
      Restricting the ability to delete repositories protects the organization from
      intentional and unintentional data loss. This ensures that users cannot delete
      repositories or cause other potential damage — whether by accident or due to
      their account being hacked — unless they have the correct privileges. Impact:
      Certain users will not be permitted to delete repositories.
    audit_procedure: >
      Verify that only a limited number of trusted users can delete repositories by
      performing either of the following steps: • On the left sidebar, select Search
      or go to and find your project. • Select Manage > Members. • At the top of the
      member list, from the dropdown list, select Max role the members have in the
      group and descending order. • If there are minimum number of members with
      Owner/Maintainer role in the list, you are compliant.
    remediation: >
      Enforce repository deletion by a few trusted and responsible users only by
      performing either of the following steps: • On the left sidebar, select Search
      or go to and find your project. • Select Manage > Members. • At the top of the
      member list, from the dropdown list, select Max role the members have in the
      group and descending order. • Next to the project member you want to remove,
      select Remove member. Default Value: Only organization owners or members with
      admin privileges can delete repositories. References: 1.
      https://docs.gitlab.com/ee/user/permissions.html
    references: >
      1. https://docs.gitlab.com/ee/user/permissions.html
    impact: >
      Certain users will not be permitted to delete repositories.
