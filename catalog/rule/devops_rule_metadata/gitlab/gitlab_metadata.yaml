  - rule_id: gitlab.cis.2.changes_to_pipeline_files_are_tracked_and_reviewed
    title: "Ensure changes to pipeline files are tracked and reviewed"
    severity: high
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "2.3.4"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Track and review changes to pipeline files.
    rationale: >
      Pipeline files are sensitive files. They have the ability to access sensitive
      data and control the build process, thus it is just as important to review
      changes to pipeline files as it is to verify source code. Malicious actors can
      potentially add harmful code to these files, which may lead to sensitive data
      exposure and hijacking of the build environment or artifacts.
    audit_procedure: >
