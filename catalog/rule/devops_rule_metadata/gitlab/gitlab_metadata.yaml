  - rule_id: gitlab.cis.5.deployment_configuration_files_are_separated_from
    title: "Ensure deployment configuration files are separated from source code"
    severity: medium
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "5.1.1"
    cis_section: "5"
    profile_applicability: "Level 2"
    description: >
      Deployment configurations are often stored in a version control system.
      Separate deployment configuration files from source code repositories.
    rationale: >
      Deployment configuration manifests are often stored in version control
      systems. Storing them in dedicated repositories, separately from source code
      repositories, has several benefits. First, it adds order to both maintenance
      and version control history. This makes it easier to track code or manifest
      changes, as well as spot any malicious code or misconfigurations. Second, it
      helps achieve the Least Privilege principle. Because access can be configured
      differently for each repository, fewer users will have access to this
      configuration, which is typically sensitive.
    audit_procedure: >
      Ensure each deployment configuration file is stored separately from source
      code.
    remediation: >
      Store each deployment configuration file in a dedicated repository separately
      from source code.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_GITLAB_v1_0_1_5_1_1"
      nist_800_53: []
