      On the left sidebar, at the bottom, select Admin Area. • Select Overview >
      Users. • List users selecting the Admin tab. • Find the team or person whose
      you'd like to revoke admin permissions. To edit a user, in the user’s row,
      select Edit. References: 1.
      https://docs.gitlab.com/ee/administration/admin_area.html#administering-users
