  - rule_id: gitlab.cis.1.inactive_repositories_are_reviewed_and_archived
    title: "Ensure inactive repositories are reviewed and archived periodically"
    severity: high
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "1.2.7"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Track inactive repositories and remove them periodically.
    rationale: >
      Inactive repositories (i.e., no new changes introduced for a long period of
      time) can enlarge the surface of a potential attack or data leak. These
      repositories are more likely to be improperly managed, and thus could possibly
      be accessed by a large number of users in an organization. Impact: Bug fixes
      and deployment of necessary changes could prove complicated for archived
      repositories.
    audit_procedure: >
      Perform the following to ensure that all the projects in the organization are
      active. For each group: • Navigate to the group homepage. • Expand any sub-
      groups. • For each project, review the updated date and ensure it has been
      updated within the last 6 months.
    remediation: >
      Perform the following to remediate the presence of inactive projects. For each
      inactive project identified during the audit: • Navigate to the project
      homepage. • In the sidebar, select Settings > General. • In the 'Advanced'
      section, select 'Expand'. • Select 'Archive project'. • Read the warning. •
      Select 'Archive project'. To automate the deletion of inactive projects,
      perform the following steps as an Administrator: • On the left sidebar, at the
      bottom, select Admin Area. • Select Settings > Repository. • Expand Repository
      maintenance. • In the Inactive project deletion section, select Delete
      inactive projects. • Configure the settings. o The warning email is sent to
      users who have the Owner and Maintainer role for the inactive project. o The
      email duration must be less than the Delete project after duration. • Select
      Save changes. References: 1.
      https://docs.gitlab.com/ee/administration/inactive_project_deletion.html
    references: >
      1. https://docs.gitlab.com/ee/administration/inactive_project_deletion.html
    impact: >
      Bug fixes and deployment of necessary changes could prove complicated for
      archived repositories.
    compliance_mappings:
      cis:
        - "CIS_GITLAB_v1_0_1_1_2_7"
      nist_800_53: []
      soc2: []
      pci_dss: []
