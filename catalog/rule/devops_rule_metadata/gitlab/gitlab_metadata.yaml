  - rule_id: gitlab.cis.2.access_to_build_environments_is_limited
    title: "Ensure access to build environments is limited"
    severity: high
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "2.1.5"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Restrict access to the build environment (orchestrator, pipeline executor,
      their environment, etc.) to trusted and qualified users only.
    rationale: >
      A build environment contains sensitive data such as environment variables,
      secrets, and the source code itself. Any user that has access to this
      environment can make changes to the build process, including changes to the
      code within it. Restricting access to the build environment to trusted and
      qualified users only will reduce the risk for mistakes such as exposure of
      secrets or misconfiguration. Limiting access also reduces the number of
      accounts that are vulnerable to hijacking in order to potentially harm the
      build environment. Impact: Reducing the number of users who have access to the
      build process means those users would lose their ability to make direct
      changes to that process.
    audit_procedure: >
      Verify each build environment is accessible only to known and authorized
      users. In GitLab, viewing environments in private projects is limited to
      Reporter roles at least and you must have at least the Developer role to
      create a new environment • On the left sidebar, select Search or go to and
      find your project. • Select Manage > Members. • At the top of the member list,
      from the dropdown list, select Max role the members have in the group and
      descending order. • If there are minimum number of members with
      Reporter/Developer role or above in the list, you are compliant.
    remediation: >
      Restrict access to the build environment to trusted and qualified users. In
      GitLab, viewing environments in private projects is limited to Reporter roles
      at least and you must have at least the Developer role to create a new
      environment • On the left sidebar, select Search or go to and find your
      project. • Select Manage > Members. • At the top of the member list, from the
      dropdown list, select Max role the members have in the group and descending
      order. • Next to the project member you want to remove, select Remove member
      References: 1. https://docs.gitlab.com/ee/ci/environments/#environment-
      permissions
    references: >
      1. https://docs.gitlab.com/ee/ci/environments/#environment-permissions
    impact: >
      Reducing the number of users who have access to the build process means those
      users would lose their ability to make direct changes to that process.
