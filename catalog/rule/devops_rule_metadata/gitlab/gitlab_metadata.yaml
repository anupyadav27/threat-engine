  - rule_id: gitlab.cis.1.inactive_users_are_reviewed_and_removed
    title: "Ensure inactive users are reviewed and removed periodically"
    severity: medium
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "1.3.1"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      Track inactive user accounts and periodically remove them.
    rationale: >
      User accounts that have been inactive for a long period of time are enlarging
      the surface of attack. Inactive users with high-level privileges are of
      particular concern, as these accounts are more likely to be targets for
      attackers. This could potentially allow access to large portions of an
      organization should such an attack prove successful. It is recommended to
      remove them as soon as possible in order to prevent this.
    audit_procedure: >
      As an Administrator: • Navigate to the Admin Area • In the sidebar, select
      Users • Select the 'Deactivated' filter tab • Identify if any users are
      present • Select the 'Active' filter tab • Sort by 'Oldest updated' • Use the
      'Last activity' column to determine which users are inactive
    remediation: >
      As an Administrator: • Navigate to the Admin Area • In the sidebar, select
      Users • Next to each inactive user, select the vertical ellipsis • Select
      either 'Block' (recommended), 'Delete user', or 'Delete user and
      contributions' Perform the following steps as an Administrator to
      automatically deactivate dormant users: • Navigate to the Admin Area • Select
      Settings > General. • Expand the Account and limit section. • Under Dormant
      users, check Deactivate dormant users after a period of inactivity. • Under
      Days of inactivity before deactivation, enter the number of days before
      deactivation. Minimum value is 90 days. • Select Save changes. References: 1.
      https://docs.gitlab.com/ee/administration/moderate_users.html
    references: >
      1. https://docs.gitlab.com/ee/administration/moderate_users.html
