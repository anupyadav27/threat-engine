      the platform. Typically, package registries feature webhooks when a package
      receives an update. Since webhooks are an HTTP POST request, they can be
      malformed if not secured over SSL. To prevent a potential hack and compromise
      of the webhook or to the registry or web server excepting the request, use
      only secured webhooks. Impact: Reduces the payloads that the web hook can
      listen for and recieve.
    audit_procedure: >
      
