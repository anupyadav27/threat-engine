      announced every now and then. It is important to keep track of these and to
      monitor whether the dependencies used are affected by the recent
      vulnerability. Detecting and fixing those packages' vulnerabilities decreases
      the attack surface within deployed and running applications that use such
      packages. It prevents security flaws from reaching the production environment
      which could eventually lead to a security breach.
