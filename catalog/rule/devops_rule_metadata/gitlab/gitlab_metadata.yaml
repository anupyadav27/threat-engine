  - rule_id: gitlab.cis.1.all_code_projects_are_tracked_for_changes_in
    title: "Ensure all code projects are tracked for changes in visibility status"
    severity: high
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "1.2.6"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Ensure every change in visibility of projects is tracked.
    rationale: >
      Visibility of projects determines who can access a project and/or fork it:
      anyone, designated users, or only members of the organization. If a private
      project becomes public, this may point to a potential attack, which can
      ultimately lead to data loss, the leaking of sensitive information, and
      finally to a supply chain attack. It is crucial to track these changes in
      order to prevent such incidents.
    audit_procedure: >
      Ensure that every change in project visibility is investigated by performing
      the following regularly. As an administrator: • Navigate to the Admin Area. •
      In the sidebar, select Monitoring > Audit Events. • Review the log for Actions
      with the content 'Changed visibility from Private to Public' or 'Changed
      visibility from Internal to Public'. • Ensure every change is reasonable and
      secure and is investigated if it is not.
    remediation: >
      Ensure that every change in project visibility is investigated by performing
      the following regularly. As an administrator: • Navigate to the Admin Area. •
      In the sidebar, select Monitoring > Audit Events. • Review the log for Actions
      with the content 'Changed visibility from Private to Public' or 'Changed
      visibility from Internal to Public'. • Ensure every change is reasonable and
      secure and is investigated if it is not. • (Optional) Use Instance Audit Event
      Streaming
      (https://docs.gitlab.com/ee/administration/audit_event_streaming/#instance-
      streaming-destinations) to send visibility change events to a third party
      alerting tool. Integrate these alerts in to your change management and/or
      incident response processes. References: 1.
      https://docs.gitlab.com/ee/administration/audit_event_streaming/audit_event_typ
      es.html#groups-and-projects
    references: >
