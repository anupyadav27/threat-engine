  - rule_id: gitlab.cis.1.linear_history_is_required
    title: "Ensure linear history is required"
    severity: medium
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "1.1.13"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      Linear history is the name for Git history where all commits are listed in
      chronological order, one after another. Such history exists if a pull request
      is merged either by rebase merge (re-order the commits history) or squash
      merge (squashes all commits to one). Ensure that linear history is required by
      requiring the use of rebase or squash merge when merging a pull request.
    rationale: >
      Enforcing linear history produces a clear record of activity, and as such it
      offers specific advantages: it is easier to follow, easier to revert a change,
      and bugs can be found more easily. Impact: Pull request cannot be merged
      except squash or rebase merge.
    audit_procedure: >
      For every project, perform the following steps: • Navigate to your project •
      In the sidebar, select Settings > Repository • Under 'Merge method', if 'Merge
      Commit' or 'Merge commit with semi-linear history' is selected then the
      project is not-compliant.
    remediation: >
      For every project, perform the following steps: • Navigate to your project •
      In the sidebar, select Settings > Repository • Under 'Merge method', select
      'Fast-forward merge'. References: 1.
      https://docs.gitlab.com/ee/user/project/merge_requests/methods/
    references: >
      1. https://docs.gitlab.com/ee/user/project/merge_requests/methods/
    impact: >
      Pull request cannot be merged except squash or rebase merge.
    compliance_mappings:
      cis:
        - "CIS_GITLAB_v1_0_1_1_1_13"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_gitlab_v1_0_1_1_1_13"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: gitlab.cis.1.branch_protection_rules_are_enforced_for
    title: "Ensure branch protection rules are enforced for administrators"
    severity: high
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "1.1.14"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Ensure administrators are subject to branch protection rules.
    rationale: >
      Administrators by default are excluded from any branch protection rules. This
      means these privileged users (both on the repository and organization levels)
      are not subject to protections meant to prevent untrusted code insertion,
      including malicious code. This is extremely important since administrator
      accounts are often targeted for account hijacking due to their privileged
      role. Impact: Administrator users won't be able to push code directly to the
      protected branch without being compliant with listed branch protection rules.
    audit_procedure: >
      GitLab administrators can validate this privilege for group owners, enforcing
      the instance-level protection rule: 1. Select Settings > Repository. 2. On the
      left sidebar, at the bottom, select Admin Area. 3. Expand the Default branch
      section. 4. Ensure that the Allow owners to manage default branch protection
      per group is unchecked. 5. Select Save changes.
    remediation: >
      GitLab administrators can disable this privilege for group owners, enforcing
      the instance-level protection rule: 1. On the left sidebar, at the bottom,
      select Admin Area. 2. Select Settings > Repository. 3. Expand the Default
      branch section. 4. Uncheck Allow owners to manage default branch protection
      per group checkbox. 5. Select Save changes. Default Value: Administrator
      accounts are not subject to branch protection rules by default. References: 1.
      https://docs.gitlab.com/ee/user/project/repository/branches/default.html 2.
      https://docs.gitlab.com/ee/user/project/protected_branches.html#who-can-
      modify-a-protected-branch
    references: >
      1. https://docs.gitlab.com/ee/user/project/repository/branches/default.html 2.
      https://docs.gitlab.com/ee/user/project/protected_branches.html#who-can-
      modify-a-protected-branch
    impact: >
      Administrator users won't be able to push code directly to the protected
      branch without being compliant with listed branch protection rules.
    compliance_mappings:
      cis:
        - "CIS_GITLAB_v1_0_1_1_1_14"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_gitlab_v1_0_1_1_1_14"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: gitlab.cis.1.pushing_or_merging_of_new_code_is_restricted_to
    title: "Ensure pushing or merging of new code is restricted to specific individuals or teams"
    severity: medium
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "1.1.15"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      Ensure that only trusted users can push or merge new code to protected
      branches.
    rationale: >
      Requiring that only trusted users may push or merge new changes reduces the
      risk of unverified code, especially malicious code, to a protected branch by
      reducing the number of trusted users who are capable of doing such. Impact:
      Only administrators and trusted users can push or merge to the protected
      branch.
    audit_procedure: >
      For every code repository in use, ensure only trusted and responsible users
      can push or merge new code by performing the following: 1. On the left
      sidebar, select Search or go to and find your project. 2. Select Settings >
      Repository. 3. Expand Protected branches. 4. If there are no protected
      branches, the repository is not compliant. 5. For each protected branch,
      ensure: 1. The role(s) and user(s) who are 'Allowed to merge' are trusted 2.
      The role(s) and user(s) who are 'Allowed to push and merge' are trusted 3. The
      'Allowed to force push' toggle is not selected
    remediation: >
      Prerequisites: You must have at least the Maintainer role in the group. For
      every code repository in use, allow only trusted and responsible users to push
      or merge new code by performing the following: 1. On the left sidebar, select
      Search or go to and find your project. 2. Select Settings > Repository. 3.
      Expand Protected branches. 4. Select Add protected branch. 5. From the Branch
      dropdown list, select the branch you want to protect. 6. From the Allowed to
      merge list, select a role that can merge into this branch. 7. From the Allowed
      to push and merge list, select a role that can push to this branch.
      References: 1.
      https://docs.gitlab.com/ee/administration/merge_requests_approvals.html
    references: >
      1. https://docs.gitlab.com/ee/administration/merge_requests_approvals.html
    impact: >
      Only administrators and trusted users can push or merge to the protected
      branch.
    compliance_mappings:
      cis:
        - "CIS_GITLAB_v1_0_1_1_1_15"
      nist_800_53: []
      soc2: []
      pci_dss: []
