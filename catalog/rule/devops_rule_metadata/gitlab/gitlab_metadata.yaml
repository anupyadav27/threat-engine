  - rule_id: gitlab.cis.2.all_aspects_of_the_pipeline_infrastructure_and
    title: "Ensure all aspects of the pipeline infrastructure and configuration are immutable"
    severity: high
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "2.1.2"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Ensure the pipeline orchestrator and its configuration are immutable.
    rationale: >
      An immutable infrastructure is one that cannot be changed during execution of
      the pipeline. This can be done, for example, by using Infrastructure as Code
      for configuring the pipeline and the pipeline environment. Utilizing such
      infrastructure creates a more predictable environment because updates will
      require re-deployment to prevent any previous configuration from interfering.
      Because it is dependent on automation, it is easier to revert changes. Testing
      code is also simpler because it is based on virtualization. Most importantly,
      an immutable pipeline infrastructure ensures that a potential attacker seeking
      to compromise the build environment itself would not be able to do so if the
      orchestrator, its configuration, and any other component cannot be changed.
      Verifying that all aspects of the pipeline infrastructure and configuration
      are immutable therefore keeps them safe from malicious tampering attempts.
    audit_procedure: >
      Verify that the pipeline orchestrator, its configuration, and all other
      aspects of the build environment are immutable.
    remediation: >
      Use an immutable pipeline orchestrator and ensure that its configuration and
      all other aspects of the built environment are immutable, as well.
