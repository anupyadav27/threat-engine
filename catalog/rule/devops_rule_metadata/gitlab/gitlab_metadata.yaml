  - rule_id: gitlab.cis.1.top_level_group_creation_is_limited_to_specific
    title: "Ensure top-level group creation is limited to specific members"
    severity: high
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "1.3.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Limit ability to create teams to trusted and specific users.
    rationale: >
      The ability to create new teams should be restricted to specific members in
      order to keep the organization orderly and ensure users have access to only
      the lowest privilege level necessary. Teams typically inherit permissions from
      their parent team, thus if base permissions are less restricted and any user
      has the ability to create a team, a permission leverage could occur in which
      certain data is made available to users who should not have access to it. Such
      a situation could potentially lead to the creation of shadow teams by an
      attacker. Restricting team creation will also reduce additional clutter in the
      organizational structure, and as a result will make it easier to track changes
      and anomalies. Impact: Only specific users will be able to create new teams.
    audit_procedure: >
      For every organization, ensure that top-level group creation is limited to
      specific, trusted users by performing the following: • On the left sidebar, at
      the bottom, select Admin Area. • Select Settings > General. • Expand Account
      and limit. • Verify that the Allow new users to create top-level groups
      checkbox is not checked.
    remediation: >
      For every organization, limit top-level group creation to specific, trusted
      users by performing the following: • On the left sidebar, at the bottom,
      select Admin Area. • Select Settings > General. • Expand Account and limit. •
      Clear the Allow new users to create top-level groups checkbox. References: 1.
      https://docs.gitlab.com/ee/administration/settings/account_and_limit_settings.htm
      l#prevent-new-users-from-creating-top-level-groups
    references: >
      1.
      https://docs.gitlab.com/ee/administration/settings/account_and_limit_settings.htm
      l#prevent-new-users-from-creating-top-level-groups
    impact: >
      Only specific users will be able to create new teams.
    compliance_mappings:
      cis:
        - "CIS_GITLAB_v1_0_1_1_3_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_gitlab_v1_0_1_1_3_2"
    metadata_source: generated
    generated_by: generate_tech_rules

