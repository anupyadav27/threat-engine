  - rule_id: gitlab.cis.1.verification_of_signed_commits_for_new_changes
    title: "Ensure verification of signed commits for new changes before merging"
    severity: medium
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "1.1.12"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      Ensure every commit in a pull request is signed and verified before merging.
    rationale: >
      Signing commits, or requiring to sign commits, gives other users confidence
      about the origin of a specific code change. It ensures that the author of the
      change is not hidden and is verified by the version control system, thus the
      change comes from a trusted source. Impact: Pull requests with unsigned
      commits cannot be merged.
    audit_procedure: >
      Identify which projects permit unsigned commits by performing the following
      steps for each project: • Navigate to the main page of the project. • In the
      sidebar, select Settings > Repository. • Expand the Push rules section. •
      Identify the Select push rules section. • If 'Reject unsigned commits' is
      selected the project is compliant.
    remediation: >
      Ensure only signed commits can be merged for every branch via branch
      protection rules by performing the following steps for each project: •
      Navigate to the main page of the project. • In the sidebar, select Settings >
      Repository. • Expand the Push rules section. • Under Select push rules select
      'Reject unsigned commits'. • Select 'Save push rules'. As an administrator you
      can configure a secure default for new projects by performing the following
      steps: • Navigate to the Admin Area. • In the sidebar, select Push Rules. •
      Select 'Reject unsigned commits'. • Select 'Save push rules'. References: 1.
      https://docs.gitlab.com/ee/user/project/repository/push_rules.html
    references: >
      1. https://docs.gitlab.com/ee/user/project/repository/push_rules.html
    impact: >
      Pull requests with unsigned commits cannot be merged.
    compliance_mappings:
      cis:
        - "CIS_GITLAB_v1_0_1_1_1_12"
