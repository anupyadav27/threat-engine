      • The DAST template must be configured for your project. • Review the output
      from the previous scan on your default branch in Secure > Vulnerability
      Report.
    remediation: >
      1. Include the DAST.gitlab-ci.yml template in your .gitlab-ci.yml file. 2. Add
      a dast stage to your GitLab CI/CD stages configuration. 3. Define the URL to
      be scanned by DAST by setting the DAST_WEBSITE CI/CD variable. 4. Add any
      additionally desired CI variables to customize the test. 5. After
      configuration, the analyzer will run in your pipeline. 6. View the results in
      the Vulnerability report and remediate the vulnerabilities. References: 1.
