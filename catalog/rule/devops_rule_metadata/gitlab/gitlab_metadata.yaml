  - rule_id: gitlab.cis.4.user_management_of_the_package_registry_is_not
    title: "Ensure user management of the package registry is not local"
    severity: high
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "4.2.4"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Manage users and their access to the package registry with an external
      authentication server and not with the package registry itself.
    rationale: >
      Some package registries offer a tool for user management, aside from the main
      Lightweight Directory Access Protocol (LDAP) or Active Directory (AD) server
      of the organization. That tool usually offers simple authentication and role-
      based permissions, which might not be granular enough. Having multiple user
      management tools in the organization could result in confusion and privilege
      escalation, as there will be more to manage. To avoid a situation where users
      escalate their privileges because someone missed them, manage user access to
      the package registry via the main authentication server and not locally on the
      package registry.
    audit_procedure: >
      For each package registry, verify that its user access is not managed locally,
      but instead with the main authentication server of the organization.
    remediation: >
      For each package registry, use the main authentication server of the
      organization for user management and do not manage locally.
