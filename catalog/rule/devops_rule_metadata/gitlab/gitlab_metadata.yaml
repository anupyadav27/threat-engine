    cis_control: "2.1.1"
    cis_section: "2"
    profile_applicability: "Level 2"
    description: >
      Ensure each pipeline has a single responsibility in the build process.
    rationale: >
      Build pipelines generally have access to multiple secrets depending on their
      purposes. There are, for example, secrets of the test environment for the test
      phase, repository and artifact credentials for the build phase, etc. Limiting
      access to these credentials/secrets is therefore recommended by dividing
      pipeline responsibilities, as well as having a dedicated pipeline for each
      phase with the lowest privilege instead of a single pipeline for all. This
      will ensure that any potential damage caused by attacks on a workflow will be
      limited.
    audit_procedure: >
      For each pipeline, ensure it has only one responsibility in the build process.
    remediation: >
      Divide each multi-responsibility pipeline into multiple pipelines, each having
      a single responsibility with the least privilege. Additionally, create all new
      pipelines with a sole purpose going forward. References: 1.
      https://docs.gitlab.com/ee/user/permissions.html#job-permissions
