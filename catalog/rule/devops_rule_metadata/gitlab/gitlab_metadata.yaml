  - rule_id: gitlab.cis.1.all_copies_forks_of_code_are_tracked_and
    title: "Ensure all copies (forks) of code are tracked and accounted for"
    severity: high
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "1.2.5"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Track every fork of code and ensure it is accounted for.
    rationale: >
      A fork is a copy of a repository. On top of being a plain copy, any updates to
      the original repository itself can be pulled and reflected by the fork under
      certain conditions. A large number of repository copies (forks) become
      difficult to manage and properly secure. New and sensitive changes can often
      be pushed into a critical repository without developer knowledge of an updated
      copy of the very same repository. If there is no limit on doing this, then it
      is recommended to track and delete copies of organization repositories as
      needed. Impact: Disabling forks completely may slow down the development
      process as more actions will be necessary to take in order to fork a
      repository.
    audit_procedure: >
      Verify that the following steps are done regularly to track and examine forks.
      • Navigate to the project home page. • Find the 'Fork' button, and select the
      number next to it. • Examine the forks listed there.
    remediation: >
      Track forks and examine them by performing the following on a regular basis: •
      Navigate to the project home page. • Find the 'Fork' button, and select the
      number next to it. • Examine the forks listed there.
    references: >
      
    impact: >
      Disabling forks completely may slow down the development process as more
      actions will be necessary to take in order to fork a repository.
    compliance_mappings:
      cis:
        - "CIS_GITLAB_v1_0_1_1_2_5"
      nist_800_53: []
