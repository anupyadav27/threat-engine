  - rule_id: gitlab.cis.1.open_git_branches_are_up_to_date_before_they_can
    title: "Ensure open Git branches are up to date before they can be merged into code base"
    severity: high
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "1.1.10"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Organizations should make sure each suggested code change is in full sync with
      the existing state of its origin code repository before allowing merging.
    rationale: >
      Git branches can easily become outdated since the origin code repository is
      constantly being edited. This means engineers working on separate code
      branches can accidentally include outdated code with potential security issues
      which might have already been fixed, overriding the potential solutions for
      those security issues when merging their own changes. Impact: If enforced,
      outdated branches would not be able to be merged into their origin repository
      without first being updated to contain any recent changes.
    audit_procedure: >
      For each project, verify that open branches must be updated before merging by
      performing the following: • Navigate to the main page of the project • In the
      sidebar, select Settings > Merge requests • Look at the 'Merge method'. If
      'Merge commit with semi-linear history' or 'Fast- forward merge' is selected,
      the project is compliant.
    remediation: >
      For each project identified as being non-compliant, performing the following:
      • Navigate to the main page of the project • In the sidebar, select Settings >
      Merge requests • Under the 'Merge method' select either 'Merge commit with
      semi-linear history' or 'Fast-forward merge'. Default Value: By default, there
      is no requirement to update a branch before merging it. References: 1.
      https://docs.gitlab.com/ee/user/project/merge_requests/methods/
    references: >
      1. https://docs.gitlab.com/ee/user/project/merge_requests/methods/
    impact: >
      If enforced, outdated branches would not be able to be merged into their
      origin repository without first being updated to contain any recent changes.
    compliance_mappings:
      cis:
        - "CIS_GITLAB_v1_0_1_1_1_10"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_gitlab_v1_0_1_1_1_10"
