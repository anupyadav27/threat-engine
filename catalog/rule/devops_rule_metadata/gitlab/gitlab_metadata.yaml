      tracked via Git. • In the upper-right corner, select History to review the
      history of the gitlab-ci.yml file
    remediation: >
      For each pipeline file, track changes to it and review them. • On the left
      sidebar, select Code > Repository. • Above the file list, select the branch
      you want to commit to. If you’re not sure, leave master or main. Then select
      the plus icon () and New file: • For the Filename, type .gitlab-ci.yml. •
      Select Commit changes.
