  - rule_id: gitlab.cis.2.build_workers_have_minimal_network_connectivity
    title: "Ensure build workers have minimal network connectivity"
    severity: high
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "2.2.4"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Ensure that build workers have minimal network connectivity.
    rationale: >
      Restricting the network connectivity of build workers decreases the
      possibility that an attacker would be capable of entering the organization
      from the outside. If the build workers are connected to the public internet
      without any restriction, it is far simpler for attackers to compromise them.
      Limiting network connectivity between build workers also protects the
      organization in case an attacker was successful and subsequently attempts to
      spread the attack to other components of the environment. Impact: Developers
      will not have connectivity to every resource they might need from the outside.
      Workers will also only be able to exchange data through shareable storage.
    audit_procedure: >
      Verify that build workers, environment, and any other components have only the
      required minimum of network connectivity. Review these configuration measures
      for your self-managed runners: • Configuring runner virtual machines in their
      own network segment • Blocking SSH access from the Internet to runner virtual
      machines • Restricting traffic between runner virtual machines • Filtering
      access to cloud provider metadata endpoints
    remediation: >
      Limit the network connectivity of build workers, environment, and any other
      components to the necessary minimum. Ensure these configuration measures are
      in place for your self-managed runners: • Configuring runner virtual machines
      in their own network segment • Blocking SSH access from the Internet to runner
      virtual machines • Restricting traffic between runner virtual machines •
      Filtering access to cloud provider metadata endpoints References: 1.
      https://docs.gitlab.com/runner/security/#network-segmentation
    references: >
      1. https://docs.gitlab.com/runner/security/#network-segmentation
    impact: >
      Developers will not have connectivity to every resource they might need from
      the outside. Workers will also only be able to exchange data through shareable
      storage.
    compliance_mappings:
      cis:
        - "CIS_GITLAB_v1_0_1_2_2_4"
      nist_800_53: []
