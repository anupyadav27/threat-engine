  - rule_id: gitlab.cis.1.repository_creation_is_limited_to_specific_members
    title: "Ensure repository creation is limited to specific members"
    severity: high
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "1.2.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Limit the ability to create repositories to trusted users and teams.
    rationale: >
      Restricting repository creation to trusted users and teams is recommended in
      order to keep the organization properly structured, track fewer items, prevent
      impersonation, and to not overload the version-control system. It will allow
      administrators easier source code tracking and management capabilities, as
      they will have fewer repositories to track. The process of detecting potential
      attacks also becomes far more straightforward, as well, since the easier it is
      to track the source code, the easier it is to detect malicious acts within it.
      Additionally, the possibility of a member creating a public repository and
      sharing the organization's data externally is significantly decreased. Impact:
      Specific users will not be permitted to create repositories.
    audit_procedure: >
      Verify that only trusted users and teams can create repositories by performing
      the following. As an administrator: • Navigate to the Admin Area • In the
      sidebar, select Settings > General • Expand the Sign-up restrictions section •
      If 'Sign up enabled' is disabled, the instance is compliant. • If 'Sign-up
      enabled' and 'Require admin approval for new sign-ups' are selected, and if
      'Email confirmation settings' is set to Hard, the instance is compliant.
    remediation: >
      Ensure that only trusted users and teams can create repositories by performing
      the following. As an administrator: • Navigate to the Admin Area • In the
      sidebar, select Settings > General • Expand the Sign-up restrictions section •
      (Option 1) Deselect 'Sign-up enabled', OR • (Option 2) Select 'Sign-up
      enabled', select 'Require admin approval for new sign- ups' are selected, and
      under 'Email confirmation settings' select 'Hard' • Select 'Save changes'
      References: 1.
      https://docs.gitlab.com/ee/administration/settings/sign_up_restrictions.html
    references: >
      1.
      https://docs.gitlab.com/ee/administration/settings/sign_up_restrictions.html
    impact: >
      Specific users will not be permitted to create repositories.
    compliance_mappings:
      cis:
        - "CIS_GITLAB_v1_0_1_1_2_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_gitlab_v1_0_1_1_2_2"
