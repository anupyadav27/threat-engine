  - rule_id: gitlab.cis.2.build_secrets_are_limited_to_the_minimal
    title: "Ensure build secrets are limited to the minimal necessary scope"
    severity: medium
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "2.1.7"
    cis_section: "2"
    profile_applicability: "Level 2"
    description: >
      Build tools providers offer a secure way to store secrets that should be used
      during the build process. These secrets will often be credentials used to
      access other tools, for example for pulling code or for uploading artifacts.
      Access to these secrets can be defined on various scopes. To protect these
      critical assets it is important to choose the most restrictive scope
      necessary.
    rationale: >
      Allowing over permissive access to these secrets may affect on their exposure.
      For example if a secret is defined in an organization level, and users can
      create new repositories, there is a scenario where a user can create a new
      repo and run a controlled build just to exfiltrate these secrets. Impact:
      Increased risk of exposure of build related secrets.
    audit_procedure: >
      In the gitlab-ci.yml file, review the secrets permission scope defined in
      either a file or in an external secrets manager.
    remediation: >
      In the gitlab-ci.yml file, review the secrets defined in either a file or in
      an external secrets manager and change over permissive scopes to more
      restrictive ones based on the required access. References: 1.
      https://docs.gitlab.com/ee/ci/yaml/index.html#secrets 2.
      https://docs.gitlab.com/ee/ci/secrets/index.html
    references: >
      1. https://docs.gitlab.com/ee/ci/yaml/index.html#secrets 2.
      https://docs.gitlab.com/ee/ci/secrets/index.html
    impact: >
      Increased risk of exposure of build related secrets.
