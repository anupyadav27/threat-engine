  - rule_id: gitlab.cis.5.deployment_configuration_manifests_are_pinned_to
    title: "Ensure deployment configuration manifests are pinned to a specific, verified version"
    severity: high
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "5.1.7"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      Deployment configuration is often stored in a version control system and is
      pulled from there. Pin the configuration used to a specific, verified version
      or commit Secure Hash Algorithm (SHA). Avoid referring configuration without
      its version tag specified.
    rationale: >
      Deployment configuration manifests are often stored in version control systems
      and pulled from there either by automation platforms, for example Ansible, or
      GitOps platforms, such as ArgoCD. When a manifest is pulled from a version
      control system without tag or commit Secure Hash Algorithm (SHA) specified, it
      is pulled from the HEAD revision, which is equal to the 'latest' tag, and
      pulls the last change made. This increases the risk of encountering a new,
      potentially malicious configuration. If an attacker pushes malicious
      configuration to the version control system, the next user who pulls the HEAD
      revision will pull it and risk attack. To avoid that risk, use a version tag
      of verified version or a commit SHA of a trusted commit, which will ensure
      this is the only version pulled. Impact: Changes in deployment configuration
      will not be pulled unless their version tag or commit Secure Hash Algorithm
      (SHA) is specified. This might slow down the deployment process.
    audit_procedure: >
      For every deployment configuration manifest in use, ensure it is pinned to a
      specific version or commit Secure Hash Algorithm (SHA).
    remediation: >
      For every deployment configuration manifest in use, pin to a specific version
      or commit Secure Hash Algorithm (SHA).
    references: >
      
    impact: >
      Changes in deployment configuration will not be pulled unless their version
      tag or commit Secure Hash Algorithm (SHA) is specified. This might slow down
      the deployment process.
    compliance_mappings:
      cis:
        - "CIS_GITLAB_v1_0_1_5_1_7"
      nist_800_53: []
      soc2: []
      pci_dss: []
