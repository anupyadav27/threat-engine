  - rule_id: gitlab.cis.5.default_passwords_are_not_used
    title: "Ensure default passwords are not used"
    severity: high
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "5.2.4"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      Do not use default passwords of deployment tools and components.
    rationale: >
      Many deployment tools and components are provided with default passwords for
      the first login. This password is intended to be used only on the first login
      and should be changed immediately after. Using the default password
      substantially increases the attack risk. It is very important to ensure that
      default passwords are not used in deployment tools and components.
    audit_procedure: >
      GitLab’s default root password depends on the installation method, and when
      the installation occurred: 1. When deploying a GitLab instance using the
      official AWS AMI, the root password to the instance is the EC2 Instance ID 2.
      Most installation methods allow a non-default password to be provided as
      configuration 3. Prior to 14.0 the default password was 5iveL!fe 4. Otherwise
      the default password is unique and randomly generated. Attempt to log in as
      root using a suspected default password to audit whether it has changed. For
      any other external build tools, ensure the password used is not the default
      one.
    remediation: >
      GitLab’s root password can be changed by an administrator using the UI, the
      “gitlab:password:reset” rake task, or by using the Rails console. For each
      build tool with a default password, change to a unique cryptographically
      secure pseudorandom password.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_GITLAB_v1_0_1_5_2_4"
