  - rule_id: gitlab.cis.1.organization_is_requiring_members_to_use_multi
    title: "Ensure the organization is requiring members to use Multi- Factor Authentication (MFA)"
    severity: medium
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
    cis_version: "v1.0.1"
    cis_control: "1.3.5"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      Require members of the organization to use Multi-Factor Authentication (MFA)
      in addition to a standard user name and password when authenticating to the
      source code management platform.
    rationale: >
      By default every user authenticates within the system by password only. If the
      password of a user is compromised, however, the user account and every
      repository to which they have access are in danger of data loss, malicious
      code commits, and data theft. It is therefore recommended that each user has
      Multi-Factor Authentication enabled. This adds an additional layer of
      protection to ensure the account remains secure even if the user's password is
      compromised. Impact: Members will be removed from the organization if they
      don't have Multi-Factor Authentication already enabled. If this is the case,
      it is recommended that an invitation be sent to reinstate the user's access
      and former privileges. They must enable Multi- Factor Authentication to accept
      the invitation.
    audit_procedure: >
      For every organization that exists in your GitLab platform, verify that Two-
      Factor Authentication is enforced and is the only way to authenticate.
      Administrators can enforce 2FA for all users in two different ways: • Enforce
      on next sign in. • Suggest on next sign in, but allow a grace period before
      enforcing. Use the UI: 1. On the left sidebar, select Search or go to. 2.
      Select Admin Area. 3. On the left sidebar, select Settings > General. 4.
      Expand the Sign-in restrictions section: 5. Verify that Enforce two-factor
      authentication is enabled.
    remediation: >
      Use the UI: 1. On the left sidebar, select Search or go to. 2. Select Admin
      Area. 3. On the left sidebar, select Settings > General. 4. Expand the Sign-in
      restrictions section: o Select Enforce two-factor authentication to enable
      this feature. o In Two-factor grace period, enter a number of hours. If you
      want to enforce 2FA on next sign-in attempt, enter 0. Use the API: Use the
      application settings API to modify the following settings: •
      require_two_factor_authentication, set to TRUE. References: 1.
      https://docs.gitlab.com/ee/security/two_factor_authentication.html
    references: >
      1. https://docs.gitlab.com/ee/security/two_factor_authentication.html
    impact: >
      Members will be removed from the organization if they don't have Multi-Factor
      Authentication already enabled. If this is the case, it is recommended that an
      invitation be sent to reinstate the user's access and former privileges. They
      must enable Multi- Factor Authentication to accept the invitation.
    compliance_mappings:
      cis:
        - "CIS_GITLAB_v1_0_1_1_3_5"
      nist_800_53: []
      soc2: []
      pci_dss: []
