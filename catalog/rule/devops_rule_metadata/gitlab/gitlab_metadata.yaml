  - rule_id: gitlab.cis.1.any_changes_to_branch_protection_rules_are_audited
    title: "Ensure any changes to branch protection rules are audited"
    severity: high
    category: devops
    tech_type: gitlab
    automation_type: manual
    cis_benchmark: "CIS_GITLAB v1.0.1"
