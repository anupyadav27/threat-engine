    - kms_encryption_enabled
    - tls_min_1_2_enforced
    - require_tls_in_transit_configured
    - public_access_disabled
    - private_networking_enforced
    - iam_or_managed_identity_auth_enabled
    - audit_logging_enabled
    - backup_enabled
    - deletion_protection_enabled
    - retention_days_minimum
  csp_mapping:
    aws:
      service: rds
      resource: instance
      discovery: aws.rds.describe_db_instances
    azure:
      service: sql
      resource: server
      discovery: azure.sql.servers.list

database.nosql:
  name: NoSQL Database
  description: DynamoDB, CosmosDB, Firestore
  assertions:
    - encryption_at_rest_enabled
    - kms_encryption_enabled
    - public_access_disabled
    - private_networking_enforced
    - backup_enabled
    - deletion_protection_enabled
  csp_mapping:
    aws:
