      resource: load_balancer
      discovery: aws.elbv2.describe_load_balancers
    azure:
      service: network
      resource: lb
      discovery: azure.network.loadbalancers.list_all

# ─── IDENTITY ───────────────────────────────────────────────────────────

identity.iam_role:
  name: IAM Roles / RBAC
  description: IAM roles, Azure role assignments, GCP IAM bindings
  assertions:
    - rbac_least_privilege
    - execution_roles_least_privilege
    - role_least_privilege
  csp_mapping:
    aws:
      service: iam
      resource: role
      discovery: aws.iam.list_roles
    azure:
      service: authorization
      resource: role_assignment
      discovery: azure.authorization.roleassignments.list

