# ═══════════════════════════════════════════════════════════════════════════
# RESOURCE CATEGORIES — CSP-Agnostic Service + Resource Taxonomy
# ═══════════════════════════════════════════════════════════════════════════
# Maps abstract resource categories to CSP-specific services.
# Each category lists which security assertions apply to it.
#
# Format:
#   category_id:
#     name: Human readable
#     description: What this category covers
#     assertions: [list of assertion_ids from assertions.yaml]
#     csp_mapping:
#       aws: {service: s3, resource: bucket, discovery: aws.s3.list_buckets}
#       azure: {service: storage, resource: account, discovery: azure.storage.storageaccounts.list_by_resource_group}
#       gcp: {service: storage, resource: bucket, discovery: gcp.storage.buckets.list}
# ═══════════════════════════════════════════════════════════════════════════

# ─── STORAGE ────────────────────────────────────────────────────────────

storage.object_storage:
  name: Object/Blob Storage
  description: S3 buckets, Azure Blob Storage, GCP Cloud Storage
  assertions:
    - encryption_at_rest_enabled
    - kms_encryption_enabled
    - encryption_at_rest_cmek_configured
    - tls_min_1_2_enforced
    - require_tls_in_transit_configured
    - public_access_disabled
    - private_networking_enforced
    - rbac_least_privilege
    - iam_or_managed_identity_auth_enabled
    - logging_enabled
    - access_logging_enabled
    - deletion_protection_enabled
    - backup_enabled
    - retention_days_minimum
  csp_mapping:
    aws:
      service: s3
      resource: bucket
      discovery: aws.s3.list_buckets
    azure:
      service: storage
      resource: account
      discovery: azure.storage.storageaccounts.list_by_resource_group

storage.block_storage:
  name: Block Storage / Managed Disks
  description: EBS volumes, Azure Managed Disks, GCP Persistent Disks
  assertions:
    - encryption_at_rest_enabled
    - kms_encryption_enabled
    - encryption_at_rest_cmek_configured
    - deletion_protection_enabled
    - backup_enabled
  csp_mapping:
    aws:
      service: ec2
      resource: volume
      discovery: aws.ec2.describe_volumes
    azure:
      service: compute
      resource: disk
      discovery: azure.compute.disks.list_by_resource_group

# ─── COMPUTE ────────────────────────────────────────────────────────────

compute.virtual_machine:
  name: Virtual Machines / Instances
  description: EC2 instances, Azure VMs, GCP Compute instances
  assertions:
    - encryption_at_rest_enabled
    - private_networking_enforced
    - iam_or_managed_identity_auth_enabled
    - logging_enabled
    - backup_enabled
    - deletion_protection_enabled
    - alert_destinations_configured
  csp_mapping:
    aws:
      service: ec2
      resource: instance
      discovery: aws.ec2.describe_instances
    azure:
      service: compute
      resource: vm
      discovery: azure.compute.virtualmachines.list_all

compute.scale_set:
  name: VM Scale Sets / Auto Scaling Groups
  description: VMSS, ASGs, Instance Groups
  assertions:
    - encryption_at_rest_enabled
    - iam_or_managed_identity_auth_enabled
    - logging_enabled
  csp_mapping:
    aws:
      service: autoscaling
      resource: group
      discovery: aws.autoscaling.describe_auto_scaling_groups
    azure:
      service: compute
      resource: vmss
      discovery: azure.compute.virtualmachinescalesets.list_all

# ─── DATABASE ───────────────────────────────────────────────────────────

database.relational:
