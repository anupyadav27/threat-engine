      resource: table
      discovery: aws.dynamodb.list_tables
    azure:
      service: cosmosdb
      resource: account
      discovery: azure.cosmosdb.databaseaccounts.list_by_resource_group

database.cache:
  name: Cache / In-Memory Database
  description: ElastiCache, Azure Redis, Memorystore
  assertions:
    - encryption_at_rest_enabled
    - tls_min_1_2_enforced
    - require_tls_in_transit_configured
    - public_access_disabled
    - private_networking_enforced
    - iam_or_managed_identity_auth_enabled
    - backup_enabled
  csp_mapping:
    aws:
      service: elasticache
      resource: cluster
      discovery: aws.elasticache.describe_cache_clusters
    azure:
      service: redis
      resource: cache
      discovery: azure.redis.redis.list_by_resource_group

# ─── NETWORKING ─────────────────────────────────────────────────────────

network.firewall:
  name: Network Security Groups / Firewalls
  description: Security Groups, NSGs, Firewall rules
  assertions:
    - rbac_least_privilege
    - logging_enabled
    - change_audit_logging_enabled
  csp_mapping:
    aws:
      service: ec2
      resource: security_group
      discovery: aws.ec2.describe_security_groups
    azure:
      service: network
      resource: nsg
      discovery: azure.network.networksecuritygroups.list_all

network.waf:
  name: Web Application Firewall
  description: WAF, Azure WAF, Cloud Armor
  assertions:
    - logging_enabled
    - alert_destinations_configured
  csp_mapping:
    aws:
      service: wafv2
      resource: web_acl
      discovery: aws.wafv2.list_web_acls
    azure:
      service: network
      resource: waf_policy
      discovery: azure.network.webapplicationfirewallpolicies.list_all

network.load_balancer:
  name: Load Balancer
  description: ALB/NLB, Azure LB, GCP LB
  assertions:
    - tls_min_1_2_enforced
    - logging_enabled
    - deletion_protection_enabled
  csp_mapping:
