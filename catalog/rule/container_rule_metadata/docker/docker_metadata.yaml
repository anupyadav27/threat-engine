  - rule_id: docker.cis.5.on_failure_container_restart_policy_is_set_to_5
    title: "Ensure 'on-failure' container restart policy is set to '5'"
    severity: high
    category: container
    tech_type: docker
    automation_type: manual
    cis_benchmark: "CIS_DOCKER community_v1.1.0"
    cis_version: "community_v1.1.0"
    cis_control: "5.14"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      Using the --restart flag in docker run command you can specify a restart
      policy for how a container should or should not be restarted on exit. You
      should choose the on-failure restart policy and limit the restart attempts to
      5.
    rationale: >
      If you indefinitely keep trying to start the container, it could possibly lead
      to a denial of service on the host. It could be an easy way to do a
      distributed denial of service attack especially if you have many containers on
      the same host. Additionally, ignoring the exit status of the container and
      always attempting to restart the container leads to non- investigation of the
      root cause behind containers getting terminated. If a container gets
      terminated, you should investigate on the reason behind it instead of just
      attempting to restart it indefinitely. Thus, it is recommended to use on-
      failure restart policy and limit it to maximum of 5 restart attempts.
    audit_procedure: >
      docker ps --quiet --all | xargs docker inspect --format '{{ .Id }}:
      RestartPolicyName={{ .HostConfig.RestartPolicy.Name }} MaximumRetryCount={{
      .HostConfig.RestartPolicy.MaximumRetryCount }}'  If the above command returns
      RestartPolicyName=always, then the system is not configured as desired and
      hence this recommendation is non-compliant.  If the above command returns
      RestartPolicyName=no or just RestartPolicyName=, then the restart policies are
      not being used and the container would never be restarted of its own. This
      recommendation is then Not Applicable and can be assumed to be compliant.  If
      the above command returns RestartPolicyName=on-failure, then verify that the
      number of restart attempts is set to 5 or less by looking at
      MaximumRetryCount.
    remediation: >
      If a container is desired to be restarted of its own, then, for example, you
      could start the container as below: docker run --detach --restart=on-failure:5
      nginx 164 | P a g e Impact: The container would attempt to restart only for 5
      times. Default Value: By default, containers are not configured with restart
      policies. Hence, containers do not attempt to restart of their own.
      References: 1.
      https://docs.docker.com/engine/reference/commandline/run/#restart-policies-
      restart
    references: >
      1. https://docs.docker.com/engine/reference/commandline/run/#restart-policies-
      restart
    impact: >
      The container would attempt to restart only for 5 times. Default Value: By
      default, containers are not configured with restart policies. Hence,
      containers do not attempt to restart of their own.
    compliance_mappings:
      cis:
        - "CIS_DOCKER_community_v1_1_0_5_14"
      nist_800_53: []
      soc2: []
