  - rule_id: docker.cis.5.docker_commands_always_get_the_latest_version_of
    title: "Ensure docker commands always get the latest version of the image"
    severity: high
    category: container
    tech_type: docker
    automation_type: manual
    cis_benchmark: "CIS_DOCKER community_v1.1.0"
    cis_version: "community_v1.1.0"
    cis_control: "5.27"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      Always ensure that you are using the latest version of the image within your
      repository and not the cached older versions.
    rationale: >
      Multiple docker commands such as docker pull, docker run, etc. are known to
      have an issue that by default, they extract the local copy of the image, if
      present, even though there is an updated version of the image with the 'same
      tag' in the upstream repository. This could lead to using older and vulnerable
      images.
    audit_procedure: >
      Step 1 : Open your image repository and list the image version history for the
      image you are inspecting. Step 2 : Observe the status when the docker pull
      command is triggered. If the status is shown as Image is up to date, it means
      that you are getting the cached version of the image. Step 3 : Match the
      version of the image you are running with the latest version reported in your
      repository which tells if you are running the cached version or the latest
      copy.
    remediation: >
      Use proper version pinning mechanisms (the latest tag which is assigned by
      default is still vulnerable to caching attacks) to avoid extracting the cached
      older versions. Version pinning mechanisms should be used for base images,
      packages, and entire images too. You can customize version pinning rules as
      per your requirements. Impact: None 190 | P a g e Default Value: By default,
      docker commands extract the local copy unless version pinning mechanisms are
      used or the local cache is cleared. References: 1.
      https://github.com/docker/docker/pull/16609
    references: >
      1. https://github.com/docker/docker/pull/16609
    impact: >
      None 190 | P a g e Default Value: By default, docker commands extract the
      local copy unless version pinning mechanisms are used or the local cache is
      cleared.
    compliance_mappings:
      cis:
        - "CIS_DOCKER_community_v1_1_0_5_27"
      nist_800_53: []
      soc2: []
      pci_dss: []
