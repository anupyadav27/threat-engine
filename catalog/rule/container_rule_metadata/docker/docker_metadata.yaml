  - rule_id: docker.cis.4.copy_is_used_instead_of_add_in_dockerfile
    title: "Ensure COPY is used instead of ADD in Dockerfile"
    severity: high
    category: container
    tech_type: docker
    automation_type: manual
    cis_benchmark: "CIS_DOCKER community_v1.1.0"
    cis_version: "community_v1.1.0"
    cis_control: "4.9"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Use COPY instruction instead of ADD instruction in the Dockerfile.
    rationale: >
      COPY instruction just copies the files from the local host machine to the
      container file system. ADD instruction potentially could retrieve files from
      remote URLs and perform operations such as unpacking. Thus, ADD instruction
      introduces risks such as adding malicious files from URLs without scanning and
      unpacking procedure vulnerabilities.
    audit_procedure: >
      Step 1: Run the below command to get the list of images: docker images Step 2:
      Run the below command for each image in the list above and look for any ADD
      instructions: docker history <Image_ID> Alternatively, if you have access to
      Dockerfile for the image, verify that there are no ADD instructions.
    remediation: >
      Use COPY instructions in Dockerfiles. Impact: You would need to take care of
      the functionalities provided by ADD instructions such as fetching files from
      remote URLs. Default Value: Not Applicable 130 | P a g e References: 1.
      https://docs.docker.com/engine/userguide/eng-image/dockerfile_best-
      practices/#add-or-copy
