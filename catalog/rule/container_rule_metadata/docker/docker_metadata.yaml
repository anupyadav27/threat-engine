  - rule_id: docker.cis.5.selinux_security_options_are_set_if_applicable
    title: "Ensure SELinux security options are set, if applicable"
    severity: medium
    category: container
    tech_type: docker
    automation_type: manual
    cis_benchmark: "CIS_DOCKER community_v1.1.0"
    cis_version: "community_v1.1.0"
    cis_control: "5.2"
    cis_section: "5"
    profile_applicability: "Level 2"
    description: >
      SELinux is an effective and easy-to-use Linux application security system. It
      is available on quite a few Linux distributions by default such as Red Hat and
      Fedora.
    rationale: >
      SELinux provides a Mandatory Access Control (MAC) system that greatly augments
      the default Discretionary Access Control (DAC) model. You can thus add an
      extra layer of safety by enabling SELinux on your Linux host, if applicable.
    audit_procedure: >
      docker ps --quiet --all | xargs docker inspect --format '{{ .Id }}:
      SecurityOpt={{ .HostConfig.SecurityOpt }}' The above command should return all
      the security options currently configured for the containers.
    remediation: >
      If SELinux is applicable for your Linux OS, use it. You may have to follow
      below set of steps: 1. Set the SELinux State. 2. Set the SELinux Policy. 3.
      Create or import a SELinux policy template for Docker containers. 4. Start
      Docker in daemon mode with SELinux enabled. For example, docker daemon
      --selinux-enabled 5. Start your Docker container using the security options.
      For example, docker run --interactive --tty --security-opt
      label=level:TopSecret centos /bin/bash Impact: The container (process) would
      have set of restrictions as defined in SELinux policy. If your SELinux policy
      is mis-configured, then the container may not entirely work as expected. 138 |
      P a g e Default Value: By default, no SELinux security options are applied on
      containers. References: 1.
      https://docs.docker.com/engine/security/security/#other-kernel-security-
      features 2. https://docs.docker.com/engine/reference/run/#security-
      configuration 3. http://docs.fedoraproject.org/en-US/Fedora/13/html/Security-
      Enhanced_Linux/ 4. https://access.redhat.com/documentation/en-
      us/red_hat_enterprise_linux_atomic_host/7/html/container_security_guide/docker_
      selinux_security_policy
    references: >
