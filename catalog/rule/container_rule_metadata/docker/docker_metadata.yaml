  - rule_id: docker.cis.3.docker_service_file_ownership_is_set_to_root_root
    title: "Ensure that docker.service file ownership is set to root:root"
    severity: high
    category: container
    tech_type: docker
    automation_type: manual
    cis_benchmark: "CIS_DOCKER community_v1.1.0"
    cis_version: "community_v1.1.0"
    cis_control: "3.1"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Verify that the docker.service file ownership and group-ownership are
      correctly set to root.
    rationale: >
      docker.service file contains sensitive parameters that may alter the behavior
      of Docker daemon. Hence, it should be owned and group-owned by root to
      maintain the integrity of the file.
    audit_procedure: >
      Step 1 : Find out the file location: systemctl show -p FragmentPath
      docker.service Step 2 : If the file does not exist, this recommendation is not
      applicable. If the file exists, execute the below command with the correct
      file path to verify that the file is owned and group-owned by root. For
      example, stat -c %U:%G /usr/lib/systemd/system/docker.service | grep -v
      root:root The above command should not return anything.
    remediation: >
      Step 1 : Find out the file location: systemctl show -p FragmentPath
      docker.service 74 | P a g e Step 2 : If the file does not exist, this
      recommendation is not applicable. If the file exists, execute the below
      command with the correct file path to set the ownership and group ownership
      for the file to root. For example, chown root:root
      /usr/lib/systemd/system/docker.service Impact: None. Default Value: This file
      may not be present on the system. In that case, this recommendation is not
      applicable. By default, if the file is present, the ownership and group-
      ownership for this file is correctly set to root. References: 1.
      https://docs.docker.com/engine/admin/systemd/
    references: >
      1. https://docs.docker.com/engine/admin/systemd/
    impact: >
      None. Default Value: This file may not be present on the system. In that case,
      this recommendation is not applicable. By default, if the file is present, the
      ownership and group-ownership for this file is correctly set to root.
    compliance_mappings:
      cis:
        - "CIS_DOCKER_community_v1_1_0_3_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
