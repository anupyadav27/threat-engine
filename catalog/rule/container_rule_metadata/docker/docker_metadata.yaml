  - rule_id: docker.cis.5.container_s_root_filesystem_is_mounted_as_read
    title: "Ensure the container's root filesystem is mounted as read only"
    severity: high
    category: container
    tech_type: docker
    automation_type: manual
    cis_benchmark: "CIS_DOCKER community_v1.1.0"
    cis_version: "community_v1.1.0"
    cis_control: "5.12"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The container's root filesystem should be treated as a 'golden image' by using
      Docker run's --read-only option. This prevents any writes to the container's
      root filesystem at container runtime and enforces the principle of immutable
      infrastructure.
    rationale: >
      Enabling this option forces containers at runtime to explicitly define their
      data writing strategy to persist or not persist their data. This also reduces
      security attack vectors since the container instance's filesystem cannot be
      tampered with or written to unless it has explicit read-write permissions on
      its filesystem folder and directories.
    audit_procedure: >
      Run the following command on the docker host: docker ps --quiet --all | xargs
      docker inspect --format '{{ .Id }}: ReadonlyRootfs={{
      .HostConfig.ReadonlyRootfs }}' If the above command returns true, it means the
      container's root filesystem is mounted read-only. If the above command returns
      false, it means the container's root filesystem is writable.
    remediation: >
      Add a --read-only flag at a container's runtime to enforce the container's
      root filesystem to be mounted as read only. docker run <Run arguments> --read-
      only <Container Image Name or ID> <Command> Enabling the --read-only option at
      a container's runtime should be used by administrators to force a container's
      executable processes to only write container data to explicit storage
      locations during the container's runtime. 159 | P a g e Examples of explicit
      storage locations during a container's runtime include, but not limited to: 1.
      Use the --tmpfs option to mount a temporary file system for non-persistent
      data writes. docker run --interactive --tty --read-only --tmpfs '/run' --tmpfs
      '/tmp' centos /bin/bash 2. Enabling Docker rw mounts at a container's runtime
      to persist container data directly on the Docker host filesystem. docker run
      --interactive --tty --read-only -v /opt/app/data:/run/app/data:rw centos
      /bin/bash 3. Utilizing Docker shared-storage volume plugins for Docker data
      volume to persist container data. docker volume create -d convoy --opt
      o=size=20GB my-named-volume docker run --interactive --tty --read-only -v my-
      named-volume:/run/app/data centos /bin/bash 3. Transmitting container data
      outside of the docker during the container's runtime for container data to
      persist container data. Examples include hosted databases, network file
      shares, and APIs. Impact: Enabling --read-only at container runtime may break
      some container OS packages if a data writing strategy is not defined. Define
      what the container's data should and should not persist at runtime to
      determine which recommendation procedure to utilize. Example:  Enable use
      --tmpfs for temporary file writes to /tmp  Use Docker shared data volumes for
      persistent data writes Default Value: By default, a container will have its
      root filesystem writable allowing all container processes to write files owned
      by the container's runtime user. 160 | P a g e References: 1.
      http://docs.docker.com/reference/commandline/cli/#run 2.
      https://docs.docker.com/engine/tutorials/dockervolumes/ 3.
      http://www.projectatomic.io/blog/2015/12/making-docker-images-write-only-in-
      production/ 4.
      https://docs.docker.com/engine/reference/commandline/run/#mount-tmpfs- tmpfs
      5. https://docs.docker.com/engine/tutorials/dockervolumes/#creating-and-
      mounting-a-data-volume-container
    references: >
      1. http://docs.docker.com/reference/commandline/cli/#run 2.
      https://docs.docker.com/engine/tutorials/dockervolumes/ 3.
      http://www.projectatomic.io/blog/2015/12/making-docker-images-write-only-in-
