  - rule_id: docker.cis.5.memory_usage_for_container_is_limited
    title: "Ensure memory usage for container is limited"
    severity: high
    category: container
    tech_type: docker
    automation_type: manual
    cis_benchmark: "CIS_DOCKER community_v1.1.0"
    cis_version: "community_v1.1.0"
    cis_control: "5.10"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      By default, all containers on a Docker host share the resources equally. By
      using the resource management capabilities of Docker host, such as memory
      limit, you can control the amount of memory that a container may consume.
    rationale: >
      By default, container can use all of the memory on the host. You can use
      memory limit mechanism to prevent a denial of service arising from one
      container consuming all of the host’s resources such that other containers on
      the same host cannot perform their intended functions. Having no limit on
      memory can lead to issues where one container can easily make the whole system
      unstable and as a result unusable.
    audit_procedure: >
