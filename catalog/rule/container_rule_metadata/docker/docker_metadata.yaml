      to make changes to files within them. This has obvious security implications
      and should be avoided. Impact: None. Audit: You should run the following
      command: docker ps --quiet --all | xargs docker inspect --format '{{ .Id }}:
      Volumes={{ .Mounts }}' This command returns a list of currently mapped
      directories and indicates whether they are mounted in read-write mode for each
      container instance. Remediation: You should not mount directories which are
