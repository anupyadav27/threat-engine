  - rule_id: docker.cis.5.host_s_ipc_namespace_is_not_shared
    title: "Ensure the host's IPC namespace is not shared"
    severity: high
    category: container
    tech_type: docker
    automation_type: manual
    cis_benchmark: "CIS_DOCKER community_v1.1.0"
    cis_version: "community_v1.1.0"
    cis_control: "5.16"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      IPC (POSIX/SysV IPC) namespace provides separation of named shared memory
      segments, semaphores and message queues. IPC namespace on the host thus should
      not be shared with the containers and should remain isolated.
    rationale: >
      IPC namespace provides separation of IPC between the host and containers. If
      the host's IPC namespace is shared with the container, it would basically
      allow processes within the container to see all of the IPC on the host system.
      This breaks the benefit of IPC level isolation between the host and the
      containers. Someone having access to the container can eventually manipulate
      the host IPC. This can be catastrophic. Hence, do not share the host's IPC
      namespace with the containers.
    audit_procedure: >
      docker ps --quiet --all | xargs docker inspect --format '{{ .Id }}: IpcMode={{
      .HostConfig.IpcMode }}' If the above command returns host, it means the host
      IPC namespace is shared with the container. If the above command returns
      nothing, then the host's IPC namespace is not shared. This recommendation is
      then compliant.
    remediation: >
      Do not start a container with --ipc=host argument. For example, do not start a
      container as below: docker run --interactive --tty --ipc=host centos /bin/bash
      Impact: Shared memory segments are used to accelerate inter-process
      communication. It is commonly used by high-performance applications. If such
      applications are containerized into multiple containers, you might need to
      share the IPC namespace of the containers to achieve high performance. In such
      cases, you should still be sharing container specific IPC 168 | P a g e
      namespaces only and not the host IPC namespace. You may share the container's
      IPC namespace with another container as below: For example, docker run
      --interactive --tty --ipc=container:e3a7a1a97c58 centos /bin/bash Default
      Value: By default, all containers have the IPC namespace enabled and host IPC
      namespace is not shared with any container. References: 1.
