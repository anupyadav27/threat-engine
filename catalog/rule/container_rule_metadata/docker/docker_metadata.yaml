  - rule_id: docker.cis.7.minimum_number_of_manager_nodes_have_been_created
    title: "Ensure the minimum number of manager nodes have been created in a swarm"
    severity: high
    category: container
    tech_type: docker
    automation_type: manual
    cis_benchmark: "CIS_DOCKER community_v1.1.0"
    cis_version: "community_v1.1.0"
    cis_control: "7.2"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      Ensure that the minimum number of required manager nodes is created in a
      swarm.
    rationale: >
      Manager nodes within a swarm have control over the swarm and change its
      configuration modifying security parameters. Having excessive manager nodes
      could render the swarm more susceptible to compromise. If fault tolerance is
      not required in the manager nodes, a single node should be elected as a
      manger. If fault tolerance is required then the smallest practical odd number
      to achieve the appropriate level of tolerance should be configured.
    audit_procedure: >
      Run docker info and verify the number of managers. docker info --format '{{
      .Swarm.Managers }}' Alternatively run the below command. docker node ls | grep
      'Leader'
    remediation: >
      If an excessive number of managers is configured, the excess can be demoted as
      worker using the following command: docker node demote <ID> Where is the node
      ID value of the manager to be demoted. Impact: None 207 | P a g e Default
      Value: A single manager is all that is required to start a given cluster.
      References: 1. https://docs.docker.com/engine/swarm/manage-nodes/ 2.
      https://docs.docker.com/engine/swarm/admin_guide/#/add-manager-nodes-for-
      fault-tolerance
    references: >
      1. https://docs.docker.com/engine/swarm/manage-nodes/ 2.
      https://docs.docker.com/engine/swarm/admin_guide/#/add-manager-nodes-for-
      fault-tolerance
    impact: >
      None 207 | P a g e Default Value: A single manager is all that is required to
      start a given cluster.
