    cis_benchmark: "CIS_DOCKER community_v1.1.0"
    cis_version: "community_v1.1.0"
    cis_control: "4.2"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Ensure that the container image is written either from scratch or is based on
      another established and trusted base image downloaded over a secure channel.
    rationale: >
      Official repositories are Docker images curated and optimized by the Docker
      community or the vendor. There could be other potentially unsafe public
      repositories. Caution should be exercised when obtaining container images from
      Docker and third parties to how they will be used for your organization's
      data.
    audit_procedure: >
      Step 1 - Inspect the Docker host for Docker images used by executing the below
      command: docker images This would list all the container images that are
      currently available for use on the Docker host. Interview the system
      administrator and obtain a proof of evidence that the list of images was
      obtained from trusted source over a secure channel or from a trusted, secure
      private Docker registry. Step 2 - For each Docker image found on the Docker
      host, inspect the image for how it was built to verify if from trusted sources
      and hardened configuration: docker history <imageName>
    remediation: >
       Configure and use Docker Content trust.  Inspect Docker image history to
      evaluate their risk to operate on your network.  Scan Docker images for
      vulnerabilities in their dependencies and configurations they will impose upon
