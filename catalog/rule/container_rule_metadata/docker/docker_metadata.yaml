  - rule_id: docker.cis.5.ssh_is_not_run_within_containers
    title: "Ensure ssh is not run within containers"
    severity: high
    category: container
    tech_type: docker
    automation_type: manual
    cis_benchmark: "CIS_DOCKER community_v1.1.0"
    cis_version: "community_v1.1.0"
    cis_control: "5.6"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      SSH server should not be running within the container. You should SSH into the
      Docker host, and use nsenter tool to enter a container from a remote host.
    rationale: >
      Running SSH within the container increases the complexity of security
      management by making it  Difficult to manage access policies and security
      compliance for SSH server  Difficult to manage keys and passwords across
      various containers  Difficult to manage security upgrades for SSH server It
      is possible to have shell access to a container without using SSH, the
      needlessly increasing the complexity of security management should be avoided.
    audit_procedure: >
      Step 1 : List all the running instances of containers by executing below
      command: docker ps --quiet Step 2 : For each container instance, execute the
      below command: docker exec $INSTANCE_ID ps -el Ensure that there is no process
      for SSH server.
    remediation: >
      Uninstall SSH server from the container and use nsenteror any other commands
      such as docker exec or docker attach to interact with the container instance.
      docker exec --interactive --tty $INSTANCE_ID sh OR docker attach $INSTANCE_ID
      147 | P a g e Impact: None. Default Value: By default, SSH server is not
      running inside the container. Only one process per container is allowed.
      References: 1. http://blog.docker.com/2014/06/why-you-dont-need-to-run-sshd-
      in-docker/
    references: >
      1. http://blog.docker.com/2014/06/why-you-dont-need-to-run-sshd-in-docker/
