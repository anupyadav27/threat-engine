  - rule_id: docker.cis.5.pids_cgroup_limit_is_used
    title: "Ensure PIDs cgroup limit is used"
    severity: high
    category: container
    tech_type: docker
    automation_type: manual
    cis_benchmark: "CIS_DOCKER community_v1.1.0"
    cis_version: "community_v1.1.0"
    cis_control: "5.28"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      Use --pids-limit flag at container runtime.
    rationale: >
      Attackers could launch a fork bomb with a single command inside the container.
      This fork bomb can crash the entire system and requires a restart of the host
      to make the system functional again. PIDs cgroup --pids-limit will prevent
      this kind of attacks by restricting the number of forks that can happen inside
      a container at a given time.
    audit_procedure: >
      Run the below command and ensure that PidsLimit is not set to 0 or -1. A
      PidsLimit of 0 or -1 means that any number of processes can be forked inside
      the container concurrently. docker ps --quiet --all | xargs docker inspect
      --format '{{ .Id }}: PidsLimit={{ .HostConfig.PidsLimit }}'
    remediation: >
      Use --pids-limit flag while launching the container with an appropriate value.
      For example, docker run -it --pids-limit 100 <Image_ID> In the above example,
      the number of processes allowed to run at any given time is set to 100. After
      a limit of 100 concurrently running processes is reached, docker would
      restrict any new process creation. Impact: Set the PIDs limit value as
      appropriate. Incorrect values might leave the containers unusable. Default
      Value: The Default value for --pids-limit is 0 which means there is no
      restriction on the number of forks. Also, note that PIDs cgroup limit works
      only for the kernel versions 4.3+. 192 | P a g e References: 1.
      https://github.com/docker/docker/pull/18697 2.
      https://docs.docker.com/engine/reference/commandline/run/#options
    references: >
      1. https://github.com/docker/docker/pull/18697 2.
      https://docs.docker.com/engine/reference/commandline/run/#options
    impact: >
      Set the PIDs limit value as appropriate. Incorrect values might leave the
      containers unusable. Default Value: The Default value for --pids-limit is 0
      which means there is no restriction on the number of forks. Also, note that
      PIDs cgroup limit works only for the kernel versions 4.3+. 192 | P a g e
    compliance_mappings:
