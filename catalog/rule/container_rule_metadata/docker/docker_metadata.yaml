  - rule_id: docker.cis.1.docker_is_up_to_date
    title: "Ensure Docker is up to date"
    severity: high
    category: container
    tech_type: docker
    automation_type: manual
    cis_benchmark: "CIS_DOCKER community_v1.1.0"
    cis_version: "community_v1.1.0"
    cis_control: "1.3"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      There are frequent releases for Docker software that address security
      vulnerabilities, product bugs and bring in new functionality. Keep a tab on
      these product updates and upgrade as frequently as when new security
      vulnerabilities are fixed or deemed correct for your organization.
    rationale: >
      By staying up to date on Docker updates, vulnerabilities in the Docker
      software can be mitigated. An educated attacker may exploit known
      vulnerabilities when attempting to attain access or elevate privileges. Not
      installing regular Docker updates may leave you with running vulnerable Docker
      software. It might lead to elevation privileges, unauthorized access or other
      security breaches. Keep a track of new releases and update as necessary.
    audit_procedure: >
      Execute the below command and verify that the Docker version is up to date as
      deemed necessary. It is not a mandate to be on the latest one, though. docker
      version
    remediation: >
      Keep a track of Docker releases and update as necessary. Impact: Perform a
      risk assessment for docker version updates in how they may impact your Docker
      operations. Be aware that several third-party products that use Docker may
      require older major version of Docker to be supported. Default Value: Not
      Applicable 17 | P a g e References: 1.
      https://docs.docker.com/engine/installation/ 2.
      https://github.com/moby/moby/releases/latest 3.
      https://github.com/docker/docker-ce/releases/latest
    references: >
      1. https://docs.docker.com/engine/installation/ 2.
      https://github.com/moby/moby/releases/latest 3.
      https://github.com/docker/docker-ce/releases/latest
