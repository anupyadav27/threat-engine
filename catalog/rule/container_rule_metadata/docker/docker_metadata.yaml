  - rule_id: docker.cis.5.default_ulimit_is_overwritten_at_runtime_only_if
    title: "Ensure the default ulimit is overwritten at runtime, only if needed"
    severity: high
    category: container
    tech_type: docker
    automation_type: manual
    cis_benchmark: "CIS_DOCKER community_v1.1.0"
    cis_version: "community_v1.1.0"
    cis_control: "5.18"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The default ulimit is set at the Docker daemon level. However, you may
      override the default ulimit setting, if needed, during container runtime.
    rationale: >
      ulimit provides control over the resources available to the shell and to
      processes started by it. Setting system resource limits judiciously saves you
      from many disasters such as a fork bomb. Sometimes, even friendly users and
      legitimate processes can overuse system resources and in-turn can make the
      system unusable. The default ulimit set at the Docker daemon level should be
      honored. If the default ulimit settings are not appropriate for a particular
      container instance, you may override them as an exception. But, do not make
      this a practice. If most of the container instances are overriding default
      ulimit settings, consider changing the default ulimit settings to something
      that is appropriate for your needs.
    audit_procedure: >
      docker ps --quiet --all | xargs docker inspect --format '{{ .Id }}: Ulimits={{
      .HostConfig.Ulimits }}' The above command should return Ulimits=<no value> for
      each container instance until and unless there is an exception and a need to
      override the default ulimit settings.
    remediation: >
      Only override the default ulimit settings if needed. For example, to override
      default ulimit settings start a container as below: docker run --ulimit
      nofile=1024:1024 --interactive --tty centos /bin/bash Impact: If the ulimits
