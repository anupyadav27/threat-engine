  - rule_id: docker.cis.5.the_container_s_root_filesystem_is_mounted_as
    title: "Ensure that the container's root filesystem is mounted as read only"
    severity: medium
    category: container
    tech_type: docker
    automation_type: manual
    cis_benchmark: "CIS_DOCKER v1.8.0"
    cis_version: "v1.8.0"
    cis_control: "5.13"
    cis_section: "5"
    profile_applicability: ""
    description: >
      
    rationale: >
      
    audit_procedure: >
      You should run the following command on the docker host: docker ps --quiet
      --all | xargs docker inspect --format '{{ .Id }}: ReadonlyRootfs={{
      .HostConfig.ReadonlyRootfs }}' If the above command returns true, it means the
      container's root filesystem is mounted read-only. If the above command returns
      false, it means the container's root filesystem is writeable. Remediation: You
      should add a --read-only flag at a container's runtime to enforce the
      container's root filesystem being mounted as read only. docker run <Run
      arguments> --read-only <Container Image Name or ID> <Command> Enabling the
      --read-only option at a container's runtime should be used by administrators
      to force a container's executable processes to only write container data to
      explicit storage locations during its lifetime. Examples of explicit storage
      locations during a container's runtime include, but are not limited to: 1.
      Using the --tmpfs option to mount a temporary file system for non-persistent
      data writes. docker run --interactive --tty --read-only --tmpfs '/run' --tmpfs
      '/tmp' centos /bin/bash 2. Enabling Docker rw mounts at a container's runtime
      to persist container data directly on the Docker host filesystem. docker run
      --interactive --tty --read-only -v /opt/app/data:/run/app/data:rw centos
      /bin/bash 3. Utilizing the Docker shared-storage volume plugin for Docker data
      volume to persist container data. docker volume create -d convoy --opt
      o=size=20GB my-named-volume docker run --interactive --tty --read-only -v my-
      named-volume:/run/app/data centos /bin/bash 3. Transmitting container data
      outside of the Docker controlled area during the container's runtime for
      container data in order to ensure that it is persistent. Examples include
      hosted databases, network file shares and APIs. Default Value: By default, a
      container has its root filesystem writeable, allowing all container processes
      to write files owned by the container's actual runtime user. References: 1.
      https://docs.docker.com/storage/volumes/ 2.
      https://docs.docker.com/storage/volumes/#use-a-read-only-volume 3.
      https://docs.docker.com/engine/reference/commandline/run/#mount-tmpfs--- tmpfs
      CIS Controls: Controls Version Control IG 1 IG 2 IG 3 v8 6.8 Define and
      Maintain Role-Based Access Control Define and maintain role-based access
      control, through determining and documenting the access rights necessary for
      each role within the enterprise to successfully carry out its assigned duties.
      Perform access control reviews of enterprise assets to validate that all
      privileges are authorized, on a recurring schedule at a minimum annually, or
      more frequently. ● v7 14.6 Protect Information through Access Control Lists
      Protect all information stored on systems with file system, network share,
      claims, application, or database specific access control lists. These controls
      will enforce the principle that only authorized individuals should have access
      to the information based on their need to access the information as a part of
      their responsibilities. ● ● ●
    remediation: >
      
    references: >
      
    impact: >
      
    compliance_mappings:
