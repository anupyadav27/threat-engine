  - rule_id: docker.cis.4.update_instructions_are_not_use_alone_in_the
    title: "Ensure update instructions are not use alone in the Dockerfile"
    severity: high
    category: container
    tech_type: docker
    automation_type: manual
    cis_benchmark: "CIS_DOCKER community_v1.1.0"
    cis_version: "community_v1.1.0"
    cis_control: "4.7"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Do not use update instructions such as apt-get update alone or in a single
      line in the Dockerfile.
    rationale: >
      Adding the update instructions in a single line on the Dockerfile will cache
      the update layer. Thus, when you build any image later using the same
      instruction, previously cached update layer will be used. This could
      potentially deny any fresh updates to go in the later builds.
    audit_procedure: >
      Step 1: Run the below command to get the list of images: docker images Step 2:
      Run the below command for each image in the list above, and look for any
      update instructions being in a single line: docker history <Image_ID>
      Alternatively, if you have access to Dockerfile for the image, verify that
      there are no update instructions as described above.
    remediation: >
      Use update instructions along with install instructions (or any other) and
      version pinning for packages while installing them. This would bust the cache
      and force to extract the required versions. Alternatively, you could use --no-
      cache flag during docker build process to avoid using cached layers. Impact:
      None 126 | P a g e Default Value: By default, docker does not enforce any
      restrictions on using update instructions. References: 1.
      https://docs.docker.com/engine/userguide/eng-image/dockerfile_best-
      practices/#run 2. https://github.com/docker/docker/issues/3313
    references: >
      1. https://docs.docker.com/engine/userguide/eng-image/dockerfile_best-
      practices/#run 2. https://github.com/docker/docker/issues/3313
    impact: >
      None 126 | P a g e Default Value: By default, docker does not enforce any
      restrictions on using update instructions.
