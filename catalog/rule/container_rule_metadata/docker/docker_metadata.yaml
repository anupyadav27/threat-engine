  - rule_id: docker.cis.2.operations_on_legacy_registry_v1_are_disabled
    title: "Ensure operations on legacy registry (v1) are Disabled"
    severity: high
    category: container
    tech_type: docker
    automation_type: manual
    cis_benchmark: "CIS_DOCKER community_v1.1.0"
    cis_version: "community_v1.1.0"
    cis_control: "2.13"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The latest Docker registry is v2. All operations on the legacy registry
      version (v1) should be restricted.
    rationale: >
      Docker registry v2 brings in many performance and security improvements over
      v1. It supports container image provenance and other security features such as
      image signing and verification. Hence, operations on Docker legacy registry
      should be restricted.
    audit_procedure: >
      ps -ef | grep dockerd The above command should list --disable-legacy-registry
      as an option passed to the docker daemon.
    remediation: >
      Start the docker daemon as below: dockerd --disable-legacy-registry Impact:
      Legacy registry operations would be restricted. Default Value: By default,
      legacy registry operations are allowed. References: 1.
      https://docs.docker.com/edge/engine/reference/commandline/dockerd/#legacy-
      registries 2. https://docs.docker.com/registry/spec/api/ 3.
      https://the.binbashtheory.com/creating-private-docker-registry-2-0-with-token-
      authentication-service/ 63 | P a g e 4. https://blog.docker.com/2015/07/new-
      tool-v1-registry-docker-trusted-registry- v2-open-source/ 5.
      http://www.slideshare.net/Docker/docker-registry-v2
    references: >
