  - rule_id: docker.cis.7.swarm_services_are_binded_to_a_specific_host
    title: "Ensure swarm services are binded to a specific host interface"
    severity: high
    category: container
    tech_type: docker
    automation_type: manual
    cis_benchmark: "CIS_DOCKER community_v1.1.0"
    cis_version: "community_v1.1.0"
    cis_control: "7.3"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      By default, the docker swarm services will listen to all interfaces on the
      host, which may not be necessary for the operation of the swarm where the host
      has multiple network interfaces.
    rationale: >
      When a swarm is initialized the default value for the --listen-addr flag is
      0.0.0.0:2377 which means that the swarm services will listen on all interfaces
      on the host. If a host has multiple network interfaces this may be undesirable
      as it may expose the docker swarm services to networks which are not involved
      in the operation of the swarm. By passing a specific IP address to the
      --listen-addr, a specific network interface can be specified limiting this
      exposure.
    audit_procedure: >
      List the network listener on port 2377/TCP (the default for docker swarm) and
      confirm that it is only listening on specific interfaces. For example, using
      ubuntu this could be done with the following command: netstat -lt | grep -i
      2377
    remediation: >
      Remediation of this requires re-initialization of the swarm specifying a
      specific interface for the --listen-addr parameter. Impact: None Default
      Value: By default, docker swarm services listen on all available host
      interfaces. 209 | P a g e References: 1.
      https://docs.docker.com/engine/reference/commandline/swarm_init/#--listen-
      addr 2. https://docs.docker.com/engine/swarm/admin_guide/#recover-from-
      disaster Notes: A couple of points I noted looking at this one. there doesn't
      seem to be a parameter for docker swarm update to change the listen-addr. For
      the remediation I did wonder if -- force-new-swarm could be used to change
      this, but I'm not sure what other effects that would have on the swarm so just
      left with a general requirement to re-initialize the swarm. Also interestingly
      the node communication service running on 7946/TCP doesn't respect the
      --listen-addr parameter. this seems like a bug to me, I'll likely file an
      issue on github for it after a bit more exploration.
    references: >
      1. https://docs.docker.com/engine/reference/commandline/swarm_init/#--listen-
      addr 2. https://docs.docker.com/engine/swarm/admin_guide/#recover-from-
      disaster Notes: A couple of points I noted looking at this one. there doesn't
      seem to be a parameter for docker swarm update to change the listen-addr. For
      the remediation I did wonder if -- force-new-swarm could be used to change
      this, but I'm not sure what other effects that would have on the swarm so just
      left with a general requirement to re-initialize the swarm. Also interestingly
      the node communication service running on 7946/TCP doesn't respect the
      --listen-addr parameter. this seems like a bug to me, I'll likely file an
      issue on github for it after a bit more exploration.
    impact: >
      None Default Value: By default, docker swarm services listen on all available
      host interfaces. 209 | P a g e
    compliance_mappings:
      cis:
        - "CIS_DOCKER_community_v1_1_0_7_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
