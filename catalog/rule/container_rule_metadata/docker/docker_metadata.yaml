  - rule_id: docker.cis.5.cpu_priority_is_set_appropriately_on_the_container
    title: "Ensure CPU priority is set appropriately on the container"
    severity: high
    category: container
    tech_type: docker
    automation_type: manual
    cis_benchmark: "CIS_DOCKER community_v1.1.0"
    cis_version: "community_v1.1.0"
    cis_control: "5.11"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      By default, all containers on a Docker host share the resources equally. By
      using the resource management capabilities of Docker host, such as CPU shares,
      you can control the host CPU resources that a container may consume.
    rationale: >
      By default, CPU time is divided between containers equally. If it is desired,
      to control the CPU time amongst the container instances, you can use CPU
      sharing feature. CPU sharing allows to prioritize one container over the other
      and forbids the lower priority container to claim CPU resources more often.
      This ensures that the high priority containers are served better.
    audit_procedure: >
      docker ps --quiet --all | xargs docker inspect --format '{{ .Id }}:
      CpuShares={{ .HostConfig.CpuShares }}' If the above command returns 0 or 1024,
      it means the CPU shares are not in place. If the above command returns a non-
      zero value other than 1024, it means CPU shares are in place.
    remediation: >
      Manage the CPU shares between your containers. To do so start the container
      using the -- cpu-shares argument. For example, you could run a container as
      below: docker run --interactive --tty --cpu-shares 512 centos /bin/bash In the
      above example, the container is started with CPU shares of 50% of what the
      other containers use. So, if the other container has CPU shares of 80%, this
      container will have CPU shares of 40%. Note: Every new container will have
      1024 shares of CPU by default. However, this value is shown as 0 if you run
      the command mentioned in the audit section. 157 | P a g e Alternatively, 1.
      Navigate to /sys/fs/cgroup/cpu/system.slice/ directory. 2. Check your
      container instance ID using docker ps. 3. Now, inside the above directory (in
      step 1), you would have a directory by name docker-<Instance ID>.scope. For
      example, docker-
      4acae729e8659c6be696ee35b2237cc1fe4edd2672e9186434c5116e1a6fbed6.scope.
      Navigate to this directory. 4. You will find a file named cpu.shares. Execute
      cat cpu.shares. This will always give you the CPU share value based on the
      system. So, even if there is no CPU shares configured using -c or --cpu-shares
      argument in the docker run command, this file will have a value of 1024. If we
      set one container’s CPU shares to 512 it will receive half of the CPU time
      compared to the other container. So, take 1024 as 100% and then do quick math
      to derive the number that you should set for respective CPU shares. For
      example, use 512 if you want to set 50% and 256 if you want to set 25%.
      Impact: If you do not set proper CPU shares, the container process may have to
      starve if the resources on the host are not available. If the CPU resources on
      the host are free, CPU shares do not place any restrictions on the CPU that
      the container may use. Default Value: By default, all containers on a Docker
      host share the resources equally. No CPU shares are enforced. References: 1.
      https://goldmann.pl/blog/2014/09/11/resource-management-in-docker/ 2.
