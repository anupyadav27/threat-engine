  - rule_id: docker.cis.5.apparmor_profile_is_enabled
    title: "Ensure AppArmor Profile is Enabled"
    severity: high
    category: container
    tech_type: docker
    automation_type: manual
    cis_benchmark: "CIS_DOCKER community_v1.1.0"
    cis_version: "community_v1.1.0"
    cis_control: "5.1"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      AppArmor is an effective and easy-to-use Linux application security system. It
      is available on quite a few Linux distributions by default such as Debian and
      Ubuntu.
    rationale: >
      AppArmor protects the Linux OS and applications from various threats by
      enforcing security policy which is also known as AppArmor profile. You can
      create your own AppArmor profile for containers or use the Docker's default
      AppArmor profile. This would enforce security policies on the containers as
      defined in the profile.
    audit_procedure: >
      docker ps --quiet --all | xargs docker inspect --format '{{ .Id }}:
      AppArmorProfile={{ .AppArmorProfile }}' The above command should return a
      valid AppArmor Profile for each container instance.
    remediation: >
      If AppArmor is applicable for your Linux OS, use it. You may have to follow
      below set of steps: 1. Verify if AppArmor is installed. If not, install it. 2.
      Create or import a AppArmor profile for Docker containers. 3. Put this profile
      in enforcing mode. 4. Start your Docker container using the customized
      AppArmor profile. For example, docker run --interactive --tty --security-
      opt='apparmor:PROFILENAME' centos /bin/bash 136 | P a g e Alternatively, you
      can keep the docker's default apparmor profile. Impact: The container
      (process) would have set of restrictions as defined in AppArmor profile. If
      your AppArmor profile is mis-configured, then the container may not entirely
      work as expected. Default Value: By default, docker-default AppArmor profile
      is applied for running containers and this profile can be found at
      /etc/apparmor.d/docker. References: 1.
      https://docs.docker.com/engine/security/apparmor/ 2.
      https://docs.docker.com/engine/reference/run/#security-configuration 3.
      https://docs.docker.com/engine/security/security/#other-kernel-security-
      features
    references: >
      1. https://docs.docker.com/engine/security/apparmor/ 2.
      https://docs.docker.com/engine/reference/run/#security-configuration 3.
      https://docs.docker.com/engine/security/security/#other-kernel-security-
      features
    impact: >
      The container (process) would have set of restrictions as defined in AppArmor
      profile. If your AppArmor profile is mis-configured, then the container may
      not entirely work as expected. Default Value: By default, docker-default
      AppArmor profile is applied for running containers and this profile can be
      found at /etc/apparmor.d/docker.
