  - rule_id: docker.cis.5.host_s_uts_namespace_is_not_shared
    title: "Ensure the host's UTS namespace is not shared"
    severity: high
    category: container
    tech_type: docker
    automation_type: manual
    cis_benchmark: "CIS_DOCKER community_v1.1.0"
    cis_version: "community_v1.1.0"
    cis_control: "5.20"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      UTS namespaces provide isolation of two system identifiers: the hostname and
      the NIS domain name. It is used for setting the hostname and the domain that
      is visible to running processes in that namespace. Processes running within
      containers do not typically require to know hostname and domain name. Hence,
      the namespace should not be shared with the host.
    rationale: >
      Sharing the UTS namespace with the host provides full permission to the
      container to change the hostname of the host. This is insecure and should not
      be allowed.
    audit_procedure: >
      docker ps --quiet --all | xargs docker inspect --format '{{ .Id }}: UTSMode={{
      .HostConfig.UTSMode }}' If the above command returns host, it means the host
      UTS namespace is shared with the container and this recommendation is non-
      compliant. If the above command returns nothing, then the host's UTS namespace
      is not shared. This recommendation is then compliant.
    remediation: >
      Do not start a container with --uts=host argument. For example, do not start a
      container as below: docker run --rm --interactive --tty --uts=host rhel7.2
      Impact: None. Default Value: By default, all containers have the UTS namespace
      enabled and host UTS namespace is not shared with any container. 176 | P a g e
      References: 1. https://docs.docker.com/engine/reference/run/#uts-settings-uts
      2. http://man7.org/linux/man-pages/man7/namespaces.7.html
    references: >
      1. https://docs.docker.com/engine/reference/run/#uts-settings-uts 2.
      http://man7.org/linux/man-pages/man7/namespaces.7.html
    impact: >
      None. Default Value: By default, all containers have the UTS namespace enabled
      and host UTS namespace is not shared with any container. 176 | P a g e
    compliance_mappings:
      cis:
