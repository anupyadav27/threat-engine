  - rule_id: docker.cis.4.setuid_and_setgid_permissions_are_removed_in_the
    title: "Ensure setuid and setgid permissions are removed in the images"
    severity: medium
    category: container
    tech_type: docker
    automation_type: manual
    cis_benchmark: "CIS_DOCKER community_v1.1.0"
    cis_version: "community_v1.1.0"
    cis_control: "4.8"
    cis_section: "4"
    profile_applicability: "Level 2"
    description: >
      Removing setuid and setgid permissions in the images would prevent privilege
      escalation attacks in the containers.
    rationale: >
      setuid and setgid permissions could be used for elevating privileges. While
      these permissions are at times legitimately needed, these could potentially be
      used in privilege escalation attacks. Thus, you should consider dropping these
      permissions for the packages which do not need them within the images.
    audit_procedure: >
      Run the below command on the image to list the executables having setuid and
      setgid permissions: docker run <Image_ID> find / -perm +6000 -type f -exec ls
      -ld {} \; 2> /dev/null Carefully, review the list and ensure that it is
      legitimate.
    remediation: >
      Allow setuid and setgid permissions only on executables which need them. You
      could remove these permissions during build time by adding the following
      command in your Dockerfile, preferably towards the end of the Dockerfile: RUN
      find / -perm +6000 -type f -exec chmod a-s {} \; || true Impact: Above command
      breaks all the executables that depend on setuid or setgid permissions
      including the legitimate ones. Hence, be careful to modify the command to suit
      your requirements so that it does not drop the permissions of legitimate
      programs. This requires a careful examination of each executable and fine
      tuning the permissions. 128 | P a g e Default Value: Not Applicable
      References: 1. http://www.oreilly.com/webops-perf/free/files/docker-
      security.pdf 2. http://container-
      solutions.com/content/uploads/2015/06/15.06.15_DockerCheatSheet_A2.pdf 3.
      http://man7.org/linux/man-pages/man2/setuid.2.html 4.
      http://man7.org/linux/man-pages/man2/setgid.2.html
    references: >
      1. http://www.oreilly.com/webops-perf/free/files/docker-security.pdf 2.
      http://container-
