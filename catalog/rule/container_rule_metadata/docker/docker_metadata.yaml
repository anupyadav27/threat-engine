  - rule_id: docker.cis.5.host_devices_are_not_directly_exposed_to
    title: "Ensure that host devices are not directly exposed to containers"
    severity: medium
    category: container
    tech_type: docker
    automation_type: manual
    cis_benchmark: "CIS_DOCKER v1.8.0"
    cis_version: "v1.8.0"
    cis_control: "5.18"
    cis_section: "5"
    profile_applicability: ""
    description: >
      
    rationale: >
      
    audit_procedure: >
      
    remediation: >
      
    references: >
      
    impact: >
      You would not be able to use host devices directly within containers. Audit:
      You should use the command below: docker ps --quiet --all | xargs docker
      inspect --format '{{ .Id }}: Devices={{ .HostConfig.Devices }}' The above
      command would list out each device with below information: • CgroupPermissions
      - For example, rwm • PathInContainer - Device path within the container •
      PathOnHost - Device path on the host You should verify that the host device is
      needed to be accessed from within the container and that the permissions
      required are correctly set. If the above command returns [], then the
      container does not have access to host devices and is configured in line with
      good security practice. Remediation: You should not directly expose host
      devices to containers. If you do need to expose host devices to containers,
      you should use granular permissions as appropriate to your organization: For
      example, do not start a container using the command below: docker run
      --interactive --tty --device=/dev/tty0:/dev/tty0:rwm --
      device=/dev/temp_sda:/dev/temp_sda:rwm centos bash You should only share the
      host device using appropriate permissions: docker run --interactive --tty
      --device=/dev/tty0:/dev/tty0:rw -- device=/dev/temp_sda:/dev/temp_sda:r centos
      bash Default Value: By default, host devices are not exposed to containers. If
      you do not provide sharing permissions and choose to expose a host device to a
      container, the host device is be exposed with read, write and mknod
      permissions. References: 1.
      https://docs.docker.com/engine/reference/commandline/run/#add-host-device-to-
      container---device CIS Controls: Controls Version Control IG 1 IG 2 IG 3 v8
      5.4 Restrict Administrator Privileges to Dedicated Administrator Accounts
      Restrict administrator privileges to dedicated administrator accounts on
      enterprise assets. Conduct general computing activities, such as internet
      browsing, email, and productivity suite use, from the user’s primary, non-
      privileged account. ● ● ● v7 14 Controlled Access Based on the Need to Know
      Controlled Access Based on the Need to Know
    compliance_mappings:
      cis:
