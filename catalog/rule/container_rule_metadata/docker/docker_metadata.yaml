  - rule_id: docker.cis.5.host_s_network_namespace_is_not_shared
    title: "Ensure the host's network namespace is not shared"
    severity: high
    category: container
    tech_type: docker
    automation_type: manual
    cis_benchmark: "CIS_DOCKER community_v1.1.0"
    cis_version: "community_v1.1.0"
    cis_control: "5.9"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The networking mode on a container when set to --net=host, skips placing the
      container inside separate network stack. In essence, this choice tells Docker
      to not containerize the container's networking. This would network-wise mean
      that the container lives 'outside' in the main Docker host and has full access
      to its network interfaces.
    rationale: >
      This is potentially dangerous. It allows the container process to open low-
      numbered ports like any other root process. It also allows the container to
      access network services like D- bus on the Docker host. Thus, a container
      process can potentially do unexpected things such as shutting down the Docker
      host. You should not use this option.
    audit_procedure: >
      docker ps --quiet --all | xargs docker inspect --format '{{ .Id }}:
      NetworkMode={{ .HostConfig.NetworkMode }}' If the above command returns
      NetworkMode=host, it means that --net=host option was passed when container
      was started. This would be non-compliant.
    remediation: >
      Do not pass --net=host option when starting the container. Impact: None.
      Default Value: By default, container connects to Docker bridge. References: 1.
      https://docs.docker.com/engine/userguide/networking/ 2.
      https://docs.docker.com/engine/reference/run/#network-settings 153 | P a g e
    references: >
      1. https://docs.docker.com/engine/userguide/networking/ 2.
      https://docs.docker.com/engine/reference/run/#network-settings 153 | P a g e
    impact: >
      None. Default Value: By default, container connects to Docker bridge.
    compliance_mappings:
      cis:
        - "CIS_DOCKER_community_v1_1_0_5_9"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_docker_community_v1_1_0_5_9"
