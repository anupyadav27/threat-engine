  - rule_id: docker.cis.5.container_is_restricted_from_acquiring_additional
    title: "Ensure the container is restricted from acquiring additional privileges"
    severity: high
    category: container
    tech_type: docker
    automation_type: manual
    cis_benchmark: "CIS_DOCKER community_v1.1.0"
    cis_version: "community_v1.1.0"
    cis_control: "5.25"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      Restrict the container from acquiring additional privileges via suid or sgid
      bits.
    rationale: >
      A process can set the no_new_priv bit in the kernel. It persists across fork,
      clone and execve. The no_new_priv bit ensures that the process or its children
      processes do not gain any additional privileges via suid or sgid bits. This
      way a lot of dangerous operations become a lot less dangerous because there is
      no possibility of subverting privileged binaries.
    audit_procedure: >
      docker ps --quiet --all | xargs docker inspect --format '{{ .Id }}:
      SecurityOpt={{ .HostConfig.SecurityOpt }}' The above command should return all
      the security options currently configured for the containers. no-new-
      privileges should also be one of them.
    remediation: >
      For example, you should start your container as below: docker run --rm -it
      --security-opt=no-new-privileges ubuntu bash Impact: no_new_priv prevents LSMs
      like SELinux from transitioning to process labels that have access not allowed
      to the current process. Default Value: By default, new privileges are not
      restricted. References: 1. https://github.com/projectatomic/atomic-
      site/issues/269 186 | P a g e 2. https://github.com/docker/docker/pull/20727
      3. https://www.kernel.org/doc/Documentation/prctl/no_new_privs.txt 4.
      https://lwn.net/Articles/475678/ 5. https://lwn.net/Articles/475362/
    references: >
      1. https://github.com/projectatomic/atomic-site/issues/269 186 | P a g e 2.
      https://github.com/docker/docker/pull/20727 3.
      https://www.kernel.org/doc/Documentation/prctl/no_new_privs.txt 4.
      https://lwn.net/Articles/475678/ 5. https://lwn.net/Articles/475362/
    impact: >
      no_new_priv prevents LSMs like SELinux from transitioning to process labels
      that have access not allowed to the current process. Default Value: By
      default, new privileges are not restricted.
    compliance_mappings:
      cis:
        - "CIS_DOCKER_community_v1_1_0_5_25"
