    profile_applicability: "Level 1"
    description: >
      Avoid experimental features in production.
    rationale: >
      Experimental is now a runtime docker daemon flag instead of a separate build.
      Passing -- experimental as a runtime flag to the docker daemon, activates
      experimental features. Experimental is now considered a stable release, but
      with a couple of features which might not have tested and guaranteed API
      stability.
    audit_procedure: >
      Run the below command and ensure that the Experimental property is set to
      false in the Server section. docker version --format '{{ .Server.Experimental
      }}'
