  - rule_id: docker.cis.7.management_plane_traffic_has_been_separated_from
    title: "Ensure management plane traffic has been separated from data plane traffic"
    severity: medium
    category: container
    tech_type: docker
    automation_type: manual
    cis_benchmark: "CIS_DOCKER community_v1.1.0"
    cis_version: "community_v1.1.0"
    cis_control: "7.10"
    cis_section: "7"
    profile_applicability: "Level 2"
    description: >
      Separate management plane traffic from data plane traffic.
    rationale: >
      Separating the management plane traffic from data plane traffic ensures that
      these traffics are on their respective paths. These paths could then be
      individually monitored and could be tied to different traffic control policies
      and monitoring. It also ensures that management plane is always reachable
      despite the huge volume of data flow.
    audit_procedure: >
      Run the below command on each swarm node and ensure that the management plane
      address is different from data plane address. docker node inspect --format '{{
      .Status.Addr }}' self Note: At the time of writing of this benchmark, there is
      no way to inspect data plane address. An issue has been raised and is in the
      reference link.
    remediation: >
      Initialize Swarm with dedicated interfaces for management and data planes
      respectively. For example, docker swarm init --advertise-addr=192.168.0.1
      --data-path-addr=17.1.0.3 Impact: You would require 2 network interface cards
      per node. Default Value: By default, the data plane traffic is not separated
      from management plane traffic. 222 | P a g e References: 1.
      https://docs.docker.com/engine/reference/commandline/swarm_init/#--data- path-
      addr 2. https://github.com/moby/moby/issues/33938 3.
      https://github.com/moby/moby/pull/32717
    references: >
      1. https://docs.docker.com/engine/reference/commandline/swarm_init/#--data-
      path-addr 2. https://github.com/moby/moby/issues/33938 3.
      https://github.com/moby/moby/pull/32717
    impact: >
      You would require 2 network interface cards per node. Default Value: By
      default, the data plane traffic is not separated from management plane
      traffic. 222 | P a g e
    compliance_mappings:
      cis:
        - "CIS_DOCKER_community_v1_1_0_7_10"
