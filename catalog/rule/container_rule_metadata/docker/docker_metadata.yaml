  - rule_id: docker.cis.5.incoming_container_traffic_is_binded_to_a
    title: "Ensure incoming container traffic is binded to a specific host interface"
    severity: high
    category: container
    tech_type: docker
    automation_type: manual
    cis_benchmark: "CIS_DOCKER community_v1.1.0"
    cis_version: "community_v1.1.0"
    cis_control: "5.13"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      By default, Docker containers can make connections to the outside world, but
      the outside world cannot connect to containers. Each outgoing connection will
      appear to originate from one of the host machine's own IP addresses. Only
      allow container services to be contacted through a specific external interface
      on the host machine.
    rationale: >
      If you have multiple network interfaces on your host machine, the container
      can accept connections on the exposed ports on any network interface. This
      might not be desired and may not be secured. Many a times a particular
      interface is exposed externally and services such as intrusion detection,
      intrusion prevention, firewall, load balancing, etc. are run on those
      interfaces to screen incoming public traffic. Hence, you should not accept
      incoming connections on any interface. You should only allow incoming
      connections from a particular external interface.
    audit_procedure: >
      List all the running instances of containers and their port mapping by
      executing the below command: docker ps --quiet | xargs docker inspect --format
      '{{ .Id }}: Ports={{ .NetworkSettings.Ports }}' Review the list and ensure
      that the exposed container ports are tied to a particular interface and not to
      the wildcard IP address - 0.0.0.0. For example, if the above command returns
      as below, then this is non-compliant and the container can accept connections
      on any host interface on the specified port 49153. Ports=map[443/tcp:<nil>
      80/tcp:[map[HostPort:49153 HostIp:0.0.0.0]]] However, if the exposed port is
      tied to a particular interface on the host as below, then this recommendation
      is configured as desired and is compliant. Ports=map[443/tcp:<nil>
      80/tcp:[map[HostIp:10.2.3.4 HostPort:49153]]] 162 | P a g e
    remediation: >
      Bind the container port to a specific host interface on the desired host port.
      For example, docker run --detach --publish 10.2.3.4:49153:80 nginx In the
      example above, the container port 80 is bound to the host port on 49153 and
      would accept incoming connection only from 10.2.3.4 external interface.
      Impact: None. Default Value: By default, Docker exposes the container ports on
      0.0.0.0, the wildcard IP address that will match any possible incoming network
      interface on the host machine. References: 1.
      https://docs.docker.com/engine/userguide/networking/
    references: >
      1. https://docs.docker.com/engine/userguide/networking/
    impact: >
      None. Default Value: By default, Docker exposes the container ports on
      0.0.0.0, the wildcard IP address that will match any possible incoming network
      interface on the host machine.
    compliance_mappings:
      cis:
        - "CIS_DOCKER_community_v1_1_0_5_13"
