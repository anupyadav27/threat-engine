  - rule_id: docker.cis.2.daemon_wide_custom_seccomp_profile_is_applied_if
    title: "Ensure daemon-wide custom seccomp profile is applied, if needed"
    severity: medium
    category: container
    tech_type: docker
    automation_type: manual
    cis_benchmark: "CIS_DOCKER community_v1.1.0"
    cis_version: "community_v1.1.0"
    cis_control: "2.16"
    cis_section: "2"
    profile_applicability: "Level 2"
    description: >
      You can choose to apply your custom seccomp profile at the daemon-wide level
      if needed and override Docker's default seccomp profile.
    rationale: >
      A large number of system calls are exposed to every userland process with many
      of them going unused for the entire lifetime of the process. Most of the
      applications do not need all the system calls and thus benefit by having a
      reduced set of available system calls. The reduced set of system calls reduces
      the total kernel surface exposed to the application and thus improvises
      application security. You could apply your own custom seccomp profile instead
      of Docker's default seccomp profile. Alternatively, if Docker's default
      profile is good for your environment, you can choose to ignore this
      recommendation.
    audit_procedure: >
      Run the below command and review the seccomp profile listed in the Security
      Options section. If it is default, that means, Docker's default seccomp
      profile is applied. docker info --format '{{ .SecurityOptions }}'
    remediation: >
      By default, Docker's default seccomp profile is applied. If this is good for
      your environment, no action is necessary. Alternatively, if you choose to
      apply your own seccomp profile, use the --seccomp-profile flag at daemon start
      or put it in the daemon runtime parameters file. dockerd --seccomp-profile
      </path/to/seccomp/profile> Impact: A misconfigured seccomp profile could
      possibly interrupt your container environment. Docker-default blocked calls
      have been carefully scrutinized. These address some critical 69 | P a g e
      vulnerabilities/issues within container environments (for example, kernel key
      ring calls). So, you should be very careful while overriding the defaults.
      Default Value: By default, Docker applies a seccomp profile. References: 1.
      https://docs.docker.com/engine/security/seccomp/ 2.
      https://github.com/docker/docker/pull/26276
    references: >
      1. https://docs.docker.com/engine/security/seccomp/ 2.
      https://github.com/docker/docker/pull/26276
    impact: >
      A misconfigured seccomp profile could possibly interrupt your container
      environment. Docker-default blocked calls have been carefully scrutinized.
      These address some critical 69 | P a g e vulnerabilities/issues within
      container environments (for example, kernel key ring calls). So, you should be
      very careful while overriding the defaults. Default Value: By default, Docker
      applies a seccomp profile.
    compliance_mappings:
      cis:
        - "CIS_DOCKER_community_v1_1_0_2_16"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_docker_community_v1_1_0_2_16"
    metadata_source: generated
    generated_by: generate_tech_rules

