  - rule_id: docker.cis.7.swarm_mode_is_not_enabled_if_not_needed
    title: "Ensure swarm mode is not Enabled, if not needed"
    severity: high
    category: container
    tech_type: docker
    automation_type: manual
    cis_benchmark: "CIS_DOCKER community_v1.1.0"
    cis_version: "community_v1.1.0"
    cis_control: "7.1"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      Do not enable swarm mode on a docker engine instance unless needed.
    rationale: >
      By default, a Docker engine instance will not listen on any network ports,
      with all communications with the client coming over the Unix socket. When
      Docker swarm mode is enabled on a docker engine instance, multiple network
      ports are opened on the system and made available to other systems on the
      network for the purposes of cluster management and node communications.
      Opening network ports on a system increase its attack surface and this should
      be avoided unless required.
    audit_procedure: >
      Review the output of the docker info command. If the output includes Swarm:
      active it indicates that swarm mode has been activated on the Docker engine.
      Confirm if swarm mode on the docker engine instance is actually needed.
    remediation: >
      If swarm mode has been enabled on a system in error, run docker swarm leave
      Impact: None. 205 | P a g e Default Value: By default, docker swarm mode is
      not enabled. References: 1.
      https://docs.docker.com/engine/reference/commandline/swarm_init/
    references: >
