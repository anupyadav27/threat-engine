  - rule_id: docker.cis.5.host_s_user_namespaces_is_not_shared
    title: "Ensure the host's user namespaces is not shared"
    severity: high
    category: container
    tech_type: docker
    automation_type: manual
    cis_benchmark: "CIS_DOCKER community_v1.1.0"
    cis_version: "community_v1.1.0"
    cis_control: "5.30"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      Do not share the host's user namespaces with the containers.
    rationale: >
      User namespaces ensure that a root process inside the container will be mapped
      to a non- root process outside the container. Sharing the user namespaces of
      the host with the container thus does not isolate users on the host with users
      on the containers.
    audit_procedure: >
      Run the below command and ensure that it does not return any value for
      UsernsMode. If it returns a value of host, it means the host user namespace is
      shared with the containers. docker ps --quiet --all | xargs docker inspect
      --format '{{ .Id }}: UsernsMode={{ .HostConfig.UsernsMode }}'
    remediation: >
      Do not share user namespaces between host and containers. For example, do not
      run a container as below: docker run --rm -it --userns=host ubuntu bash
      Impact: None Default Value: By default, the host user namespace is shared with
      the containers until user namespace support is enabled. References: 1.
      https://docs.docker.com/engine/security/userns-remap/ 2.
      https://docs.docker.com/engine/reference/commandline/run/#options 3.
      https://github.com/docker/docker/pull/12648 196 | P a g e 4.
      https://events.linuxfoundation.org/sites/events/files/slides/User%20Namespaces
      %20-%20ContainerCon%202015%20-%2016-9-final_0.pdf
    references: >
      1. https://docs.docker.com/engine/security/userns-remap/ 2.
