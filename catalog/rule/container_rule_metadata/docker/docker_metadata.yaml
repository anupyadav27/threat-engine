    cis_control: "4.6"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Add HEALTHCHECK instruction in your docker container images to perform the
      health check on running containers.
    rationale: >
      One of the important security triads is availability. Adding HEALTHCHECK
      instruction to your container image ensures that the docker engine
      periodically checks the running container instances against that instruction
      to ensure that the instances are still working. Based on the reported health
      status, the docker engine could then exit non-working containers and
      instantiate new ones.
    audit_procedure: >
      Run the below command and ensure that the docker image has appropriate
      HEALTHCHECK instruction set up. docker inspect --format='{{
      .Config.Healthcheck }}' <IMAGE>
    remediation: >
      Follow Docker documentation and rebuild your container image with HEALTHCHECK
      instruction. Impact: None. Default Value: By default, HEALTHCHECK is not set.
      References: 1. https://docs.docker.com/engine/reference/builder/#healthcheck
