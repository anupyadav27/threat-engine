    cis_section: "5"
    profile_applicability: "Level 2"
    description: >
      Do not docker exec with --privileged option.
    rationale: >
      Using --privileged option in docker exec gives extended Linux capabilities to
      the command. This could potentially be insecure and unsafe to do especially
      when you are running containers with dropped capabilities or with enhanced
      restrictions.
    audit_procedure: >
      If you have auditing enabled as prescribed in Section 1, you can use the below
      command to filter out docker exec commands that used --privileged option.
      ausearch -k docker | grep exec | grep privileged
    remediation: >
      Do not use --privileged option in docker exec command. Impact: None. If you
      need enhanced capabilities within the container, then run the container with
      the needed capabilities. Default Value: By default, docker exec command runs
      without --privileged option. References: 1.
