  - rule_id: docker.cis.5.host_s_process_namespace_is_not_shared
    title: "Ensure the host's process namespace is not shared"
    severity: high
    category: container
    tech_type: docker
    automation_type: manual
    cis_benchmark: "CIS_DOCKER community_v1.1.0"
    cis_version: "community_v1.1.0"
    cis_control: "5.15"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      Process ID (PID) namespaces isolate the process ID number space, meaning that
      processes in different PID namespaces can have the same PID. This is process
      level isolation between containers and the host.
    rationale: >
      PID namespace provides separation of processes. The PID Namespace removes the
      view of the system processes, and allows process ids to be reused including
      PID 1. If the host's PID namespace is shared with the container, it would
      basically allow processes within the container to see all of the processes on
      the host system. This breaks the benefit of process level isolation between
      the host and the containers. Someone having access to the container can
      eventually know all the processes running on the host system and can even kill
      the host system processes from within the container. This can be catastrophic.
      Hence, do not share the host's process namespace with the containers.
    audit_procedure: >
      docker ps --quiet --all | xargs docker inspect --format '{{ .Id }}: PidMode={{
      .HostConfig.PidMode }}' If the above command returns host, it means the host
      PID namespace is shared with the container else this recommendation is
      compliant.
    remediation: >
      Do not start a container with --pid=host argument. For example, do not start a
      container as below: docker run --interactive --tty --pid=host centos /bin/bash
      Impact: Container processes cannot see the processes on the host system. In
      certain cases, you want your container to share the host's process namespace.
      For example, you could build a container with debugging tools like strace or
      gdb, but want to use these tools when 166 | P a g e debugging processes within
      the container. If this is desired, then share only one (or needed) host
      process by using the -p switch. For example, docker run --pid=host rhel7
      strace -p 1234 Default Value: By default, all containers have the PID
      namespace enabled and the host's process namespace is not shared with the
      containers. References: 1. https://docs.docker.com/engine/reference/run/#pid-
      settings-pid 2. http://man7.org/linux/man-pages/man7/pid_namespaces.7.html
    references: >
      1. https://docs.docker.com/engine/reference/run/#pid-settings-pid 2.
      http://man7.org/linux/man-pages/man7/pid_namespaces.7.html
    impact: >
      Container processes cannot see the processes on the host system. In certain
      cases, you want your container to share the host's process namespace. For
      example, you could build a container with debugging tools like strace or gdb,
      but want to use these tools when 166 | P a g e debugging processes within the
      container. If this is desired, then share only one (or needed) host process by
      using the -p switch. For example, docker run --pid=host rhel7 strace -p 1234
      Default Value: By default, all containers have the PID namespace enabled and
      the host's process namespace is not shared with the containers.
