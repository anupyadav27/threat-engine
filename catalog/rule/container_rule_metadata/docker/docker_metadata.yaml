  - rule_id: docker.cis.3.docker_socket_file_ownership_is_set_to_root_docker
    title: "Ensure that Docker socket file ownership is set to root:docker"
    severity: high
    category: container
    tech_type: docker
    automation_type: manual
    cis_benchmark: "CIS_DOCKER community_v1.1.0"
    cis_version: "community_v1.1.0"
    cis_control: "3.15"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Verify that the Docker socket file is owned by root and group-owned by docker.
    rationale: >
      Docker daemon runs as root. The default Unix socket hence must be owned by
      root. If any other user or process owns this socket, then it might be possible
      for that non-privileged user or process to interact with Docker daemon. Also,
      such a non-privileged user or process might interact with containers. This is
      neither secure nor desired behavior. Additionally, the Docker installer
      creates a Unix group called docker. You can add users to this group, and then
      those users would be able to read and write to default Docker Unix socket. The
      membership to the docker group is tightly controlled by the system
      administrator. If any other group owns this socket, then it might be possible
      for members of that group to interact with Docker daemon. Also, such a group
      might not be as tightly controlled as the docker group. This is neither secure
      nor desired behavior. Hence, the default Docker Unix socket file must be owned
      by root and group-owned by docker to maintain the integrity of the socket
      file.
    audit_procedure: >
      Execute the below command to verify that the Docker socket file is owned by
      root and group-owned by docker: stat -c %U:%G /var/run/docker.sock | grep -v
      root:docker The above command should not return anything.
    remediation: >
      chown root:docker /var/run/docker.sock This would set the ownership to root
      and group-ownership to docker for default Docker socket file. 102 | P a g e
      Impact: None. Default Value: By default, the ownership and group-ownership for
      Docker socket file is correctly set to root:docker. References: 1.
      https://docs.docker.com/engine/reference/commandline/dockerd/#daemon- socket-
      option 2. https://docs.docker.com/engine/reference/commandline/dockerd/#bind-
      docker- to-another-hostport-or-a-unix-socket
    references: >
      1. https://docs.docker.com/engine/reference/commandline/dockerd/#daemon-
      socket-option 2.
      https://docs.docker.com/engine/reference/commandline/dockerd/#bind-docker- to-
      another-hostport-or-a-unix-socket
    impact: >
      None. Default Value: By default, the ownership and group-ownership for Docker
      socket file is correctly set to root:docker.
    compliance_mappings:
      cis:
        - "CIS_DOCKER_community_v1_1_0_3_15"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_docker_community_v1_1_0_3_15"
