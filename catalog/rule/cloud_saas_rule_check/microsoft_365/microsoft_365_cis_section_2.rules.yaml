      https://learn.microsoft.com/en-us/defender-office-365/zero-hour-auto-
      purge?view=o365-worldwide#zero-hour-auto-purge-zap-in-microsoft-teams 2.
      https://learn.microsoft.com/en-us/defender-office-365/mdo-support-teams-
      about?view=o365-worldwide#configure-zap-for-teams-protection-in-defender-for-
      office-365-plan-2
