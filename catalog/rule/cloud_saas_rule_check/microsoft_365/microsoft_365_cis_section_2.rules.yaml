tech_type: microsoft_365
category: cloud_saas
cis_benchmark: CIS Microsoft 365 v5.0.0
cis_section: '2'

rules:

  - rule_id: microsoft_365.cis.2.l1_ensure_the_common_attachment_types_filter_is
    title: "(L1) Ensure the Common Attachment Types Filter is enabled"
    severity: high
    automation_type: automated
    cis_control: '2.1.2'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: microsoft_365.section_2.l1_ensure_the_common_attachment_types_filter_is
    assertion:
      field: enabled
      operator: equals
      expected: "on"
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft 365 Defender
      https://security.microsoft.com. 2. Click to expand Email & collaboration
      select Policies & rules. 3. On the Policies & rules page select Threat
      policies. 4. Under polices select Anti-malware and click on the Default
      (Default) policy. 5. On the Policy page that appears on the right hand pane
      scroll to the bottom and click on Edit protection settings, check the Enable
      the common attachments filter. 6. Click Save. To remediate using PowerShell:
      1. Connect to Exchange Online using Connect-ExchangeOnline. 2. Run the
      following Exchange Online PowerShell command: Set-MalwareFilterPolicy
      -Identity Default -EnableFileFilter $true Note: Audit and Remediation guidance
      may focus on the Default policy however, if a Custom Policy exists in the
      organization's tenant, then ensure the setting is set as outlined in the
      highest priority policy listed. Default Value: Always on References: 1.
      https://learn.microsoft.com/en-us/powershell/module/exchange/get-
      malwarefilterpolicy?view=exchange-ps 2. https://learn.microsoft.com/en-
      us/defender-office-365/anti-malware-policies- configure?view=o365-worldwide
    compliance:
      - cis_microsoft_365_v5_0_0_2_1_2

  - rule_id: microsoft_365.cis.2.l1_ensure_notifications_for_internal_users
    title: "(L1) Ensure notifications for internal users sending malware is Enabled"
    severity: high
    automation_type: automated
    cis_control: '2.1.3'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: microsoft_365.section_2.l1_ensure_notifications_for_internal_users
    assertion:
      field: enabled
      operator: equals
      expected: "on"
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft 365 Defender
      https://security.microsoft.com. 2. Click to expand E-mail & Collaboration
      select Policies & rules. 3. On the Policies & rules page select Threat
      policies. 4. Under Policies select Anti-malware. 5. Click on the Default
      (Default) policy. 6. Click on Edit protection settings and change the settings
      for Notify an admin about undelivered messages from internal senders to On and
      enter the email address of the administrator who should be notified under
      Administrator email address. 7. Click Save. To remediate using PowerShell: 1.
      Connect to Exchange Online using Connect-ExchangeOnline. 2. Run the following
      command: Set-MalwareFilterPolicy -Identity '{Identity Name}' -
      EnableInternalSenderAdminNotifications $True -InternalSenderAdminAddress
      {admin@domain1.com} Note: Audit and Remediation guidance may focus on the
      Default policy however, if a Custom Policy exists in the organization's
      tenant, then ensure the setting is set as outlined in the highest priority
      policy listed. Default Value: EnableInternalSenderAdminNotifications : False
      InternalSenderAdminAddress : $null References: 1.
      https://learn.microsoft.com/en-us/defender-office-365/anti-malware-protection-
      about 2. https://learn.microsoft.com/en-us/defender-office-365/anti-malware-
      policies- configure
    compliance:
      - cis_microsoft_365_v5_0_0_2_1_3

  - rule_id: microsoft_365.cis.2.l2_ensure_safe_attachments_policy_is_enabled
    title: "(L2) Ensure Safe Attachments policy is enabled"
    severity: medium
    automation_type: automated
    cis_control: '2.1.4'
    cis_section: '2'
    profile_applicability: "Level 2"
    scope: microsoft_365.section_2.l2_ensure_safe_attachments_policy_is_enabled
    assertion:
      field: enabled
      operator: equals
      expected: "on"
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft 365 Defender
      https://security.microsoft.com. 2. Click to expand E-mail & Collaboration
      select Policies & rules. 3. On the Policies & rules page select Threat
      policies. 4. Under Policies select Safe Attachments. 5. Click + Create. 6.
      Create a Policy Name and Description, and then click Next. 7. Select all valid
      domains and click Next. 8. Select Block. 9. Quarantine policy is
      AdminOnlyAccessPolicy. 10. Leave Enable redirect unchecked. 11. Click Next and
      finally Submit. To remediate using PowerShell: 1. Connect to Exchange Online
      using Connect-ExchangeOnline. 2. To change an existing policy modify the
      example below and run the following PowerShell command: Set-
      SafeAttachmentPolicy -Identity 'Example policy' -Action 'Block' -
      QuarantineTag 'AdminOnlyAccessPolicy' -Enable $true 3. Or, edit and run the
      below example to create a new safe attachments policy. New-
      SafeAttachmentPolicy -Name 'CIS 2.1.4' -Enable $true -Action 'Block' -
      QuarantineTag 'AdminOnlyAccessPolicy' New-SafeAttachmentRule -Name 'CIS 2.1.4
      Rule' -SafeAttachmentPolicy 'CIS 2.1.4' -RecipientDomainIs
      'exampledomain[.]com' Note: Policy targets such as users and domains should
      include domains, or groups that provide coverage for a majority of users in
      the organization. Different inclusion and exclusion use cases are not covered
      in the benchmark. Default Value: Identity : Built-In Protection Policy Enable
      : True Action : Block QuarantineTag : AdminOnlyAccessPolicy Priority :
      (lowest) References: 1. https://learn.microsoft.com/en-us/defender-
      office-365/safe-attachments-about 2. https://learn.microsoft.com/en-
      us/defender-office-365/safe-attachments-policies- configure
    compliance:
      - cis_microsoft_365_v5_0_0_2_1_4

  - rule_id: microsoft_365.cis.2.l2_ensure_safe_attachments_for_sharepoint
    title: "(L2) Ensure Safe Attachments for SharePoint, OneDrive, and Microsoft Teams is Enabled"
    severity: medium
    automation_type: automated
    cis_control: '2.1.5'
    cis_section: '2'
    profile_applicability: "Level 2"
    scope: microsoft_365.section_2.l2_ensure_safe_attachments_for_sharepoint
    assertion:
      field: enabled
      operator: equals
      expected: "on"
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft 365 Defender
      https://security.microsoft.com 2. Under Email & collaboration select Policies
      & rules 3. Select Threat policies then Safe Attachments. 4. Click on Global
      settings 5. Click to Enable Turn on Defender for Office 365 for SharePoint,
      OneDrive, and Microsoft Teams 6. Click to Enable Turn on Safe Documents for
      Office clients 7. Click to Disable Allow people to click through Protected
      View even if Safe Documents identified the file as malicious. 8. Click Save To
      remediate using PowerShell: 1. Connect to Exchange Online using Connect-
      ExchangeOnline. 2. Run the following PowerShell command: Set-AtpPolicyForO365
      -EnableATPForSPOTeamsODB $true -EnableSafeDocs $true - AllowSafeDocsOpen
      $false References: 1. https://learn.microsoft.com/en-us/defender-
      office-365/safe-attachments-for-spo- odfb-teams-about
    compliance:
      - cis_microsoft_365_v5_0_0_2_1_5

  - rule_id: microsoft_365.cis.2.l1_ensure_exchange_online_spam_policies_are_set
    title: "(L1) Ensure Exchange Online Spam Policies are set to notify administrators"
    severity: high
    automation_type: automated
    cis_control: '2.1.6'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: microsoft_365.section_2.l1_ensure_exchange_online_spam_policies_are_set
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft 365 Defender
      https://security.microsoft.com. 2. Click to expand Email & collaboration
      select Policies & rules> Threat policies. 3. Under Policies select Anti-spam.
      4. Click on the Anti-spam outbound policy (default). 5. Select Edit protection
      settings then under Notifications 6. Check Send a copy of suspicious outbound
      messages or message that exceed these limits to these users and groups then
      enter the desired email addresses. 7. Check Notify these users and groups if a
      sender is blocked due to sending outbound spam then enter the desired email
      addresses. 8. Click Save. To remediate using PowerShell: 1. Connect to
      Exchange Online using Connect-ExchangeOnline. 2. Run the following PowerShell
      command: $BccEmailAddress = @('<INSERT-EMAIL>') $NotifyEmailAddress =
      @('<INSERT-EMAIL>') Set-HostedOutboundSpamFilterPolicy -Identity Default -
      BccSuspiciousOutboundAdditionalRecipients $BccEmailAddress -
      BccSuspiciousOutboundMail $true -NotifyOutboundSpam $true -
      NotifyOutboundSpamRecipients $NotifyEmailAddress Note: Audit and Remediation
      guidance may focus on the Default policy however, if a Custom Policy exists in
      the organization's tenant, then ensure the setting is set as outlined in the
      highest priority policy listed. Default Value:
      BccSuspiciousOutboundAdditionalRecipients : {} BccSuspiciousOutboundMail :
      False NotifyOutboundSpamRecipients : {} NotifyOutboundSpam : False References:
      1. https://learn.microsoft.com/en-us/defender-office-365/outbound-spam-
      protection- about
    compliance:
      - cis_microsoft_365_v5_0_0_2_1_6

  - rule_id: microsoft_365.cis.2.l2_ensure_that_an_anti_phishing_policy_has_been
    title: "(L2) Ensure that an anti-phishing policy has been created"
    severity: medium
    automation_type: automated
    cis_control: '2.1.7'
    cis_section: '2'
    profile_applicability: "Level 2"
    scope: microsoft_365.section_2.l2_ensure_that_an_anti_phishing_policy_has_been
    assertion:
      field: value
      operator: exists
      expected: "on"
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft 365 Defender
      https://security.microsoft.com. 2. Click to expand Email & collaboration
      select Policies & rules 3. Select Threat policies. 4. Under Policies select
      Anti-phishing and click Create. 5. Name the policy, continuing and clicking
      Next as needed: o Add Groups and/or Domains that contain a majority of the
      organization. o Set Phishing email threshold to 3 - More Aggressive o Check
      Enable users to protect and add up to 350 users. o Check Enable domains to
      protect and check Include domains I own. o Check Enable mailbox intelligence
      (Recommended). o Check Enable Intelligence for impersonation protection
      (Recommended). o Check Enable spoof intelligence (Recommended). 6. Under
      Actions configure the following: o Set If a message is detected as user
      impersonation to Quarantine the message. o Set If a message is detected as
      domain impersonation to Quarantine the message. o Set If Mailbox Intelligence
      detects an impersonated user to Quarantine the message. o Leave Honor DMARC
      record policy when the message is detected as spoof checked. o Check Show
      first contact safety tip (Recommended). o Check Show user impersonation safety
      tip. o Check Show domain impersonation safety tip. o Check Show user
      impersonation unusual characters safety tip. 7. Finally click Next and Submit
      the policy. Note: DefaultFullAccessWithNotificationPolicy is suggested but not
      required. Users will be notified that impersonation emails are in the
      Quarantine. To remediate using PowerShell: 1. Connect to Exchange Online
      service using Connect-ExchangeOnline. 2. Run the following Exchange Online
      PowerShell script to create an AntiPhish policy: # Create the Policy $params =
      @{ Name = 'CIS AntiPhish Policy' PhishThresholdLevel = 3
      EnableTargetedUserProtection = $true EnableOrganizationDomainsProtection =
      $true EnableMailboxIntelligence = $true EnableMailboxIntelligenceProtection =
      $true EnableSpoofIntelligence = $true TargetedUserProtectionAction =
      'Quarantine' TargetedDomainProtectionAction = 'Quarantine'
      MailboxIntelligenceProtectionAction = 'Quarantine' TargetedUserQuarantineTag =
      'DefaultFullAccessWithNotificationPolicy' MailboxIntelligenceQuarantineTag =
      'DefaultFullAccessWithNotificationPolicy' TargetedDomainQuarantineTag =
      'DefaultFullAccessWithNotificationPolicy' EnableFirstContactSafetyTips = $true
      EnableSimilarUsersSafetyTips = $true EnableSimilarDomainsSafetyTips = $true
      EnableUnusualCharactersSafetyTips = $true HonorDmarcPolicy = $true } New-
      AntiPhishPolicy @params # Create the rule for all users in all valid domains
      and associate with Policy New-AntiPhishRule -Name $params.Name
      -AntiPhishPolicy $params.Name - RecipientDomainIs (Get-AcceptedDomain).Name
      -Priority 0 3. The new policy can be edited in the UI or via PowerShell. Note:
      Remediation guidance is intended to help create a qualifying AntiPhish policy
      that meets the recommended criteria while protecting the majority of the
      organization. It's understood some individual user exceptions may exist or
      exceptions for the entire policy if another product acts as a similiar
      control. References: 1. https://learn.microsoft.com/en-us/defender-
      office-365/anti-phishing-protection- about 2. https://learn.microsoft.com/en-
      us/defender-office-365/anti-phishing-policies-eop- configure
    compliance:
      - cis_microsoft_365_v5_0_0_2_1_7

  - rule_id: microsoft_365.cis.2.l1_ensure_that_spf_records_are_published_for_all
    title: "(L1) Ensure that SPF records are published for all Exchange Domains"
    severity: high
    automation_type: automated
    cis_control: '2.1.8'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: microsoft_365.section_2.l1_ensure_that_spf_records_are_published_for_all
    assertion:
      field: value
      operator: exists
      expected: "on"
    remediation: >
      To remediate using a DNS Provider: 1. If all email in your domain is sent from
      and received by Exchange Online, add the following TXT record for each
      Accepted Domain: v=spf1 include:spf.protection.outlook.com -all 2. If there
      are other systems that send email in the environment, refer to this article
      for the proper SPF configuration: https://docs.microsoft.com/en-
      us/office365/SecurityCompliance/set-up-spf-in-office-365-to-help-prevent-
      spoofing. References: 1. https://learn.microsoft.com/en-
      us/microsoft-365/security/office-365- security/email-authentication-spf-
      configure?view=o365-worldwide
    compliance:
      - cis_microsoft_365_v5_0_0_2_1_8

  - rule_id: microsoft_365.cis.2.l1_ensure_that_dkim_is_enabled_for_all_exchange
    title: "(L1) Ensure that DKIM is enabled for all Exchange Online Domains"
    severity: high
    automation_type: automated
    cis_control: '2.1.9'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: microsoft_365.section_2.l1_ensure_that_dkim_is_enabled_for_all_exchange
    assertion:
      field: enabled
      operator: exists
      expected: "on"
    remediation: >
      To remediate using a DNS Provider: 1. For each accepted domain in Exchange
      Online, two DNS entries are required. Host name: selector1._domainkey Points
      to address or value: selector1- <domainGUID>._domainkey.<initialDomain> TTL:
      3600 Host name: selector2._domainkey Points to address or value: selector2-
      <domainGUID>._domainkey.<initialDomain> TTL: 3600 For Office 365, the
      selectors will always be selector1 or selector2. domainGUID is the same as the
      domainGUID in the customized MX record for your custom domain that appears
      before mail.protection.outlook.com. For example, in the following MX record
      for the domain contoso.com, the domainGUID is contoso-com: contoso.com. 3600
      IN MX 5 contoso-com.mail.protection.outlook.com The initial domain is the
      domain that you used when you signed up for Office 365. Initial domains always
      end with on.microsoft.com. 1. After the DNS records are created, enable DKIM
      signing in Defender. 2. Navigate to Microsoft 365 Defender
      https://security.microsoft.com/ 3. Expand Email & collaboration > Policies &
      rules > Threat policies. 4. Under Rules section click Email authentication
      settings. 5. Select DKIM 6. Click on each domain and click Enable next to Sign
      messages for this domain with DKIM signature. Final remediation step using the
      Exchange Online PowerShell Module: 1. Connect to Exchange Online service using
      Connect-ExchangeOnline. 2. Run the following Exchange Online PowerShell
      command: Set-DkimSigningConfig -Identity < domainName > -Enabled $True
      References: 1. https://learn.microsoft.com/en-
      us/microsoft-365/security/office-365- security/email-authentication-dkim-
      configure?view=o365-worldwide
    compliance:
      - cis_microsoft_365_v5_0_0_2_1_9

  - rule_id: microsoft_365.cis.2.l1_ensure_dmarc_records_for_all_exchange_online
    title: "(L1) Ensure DMARC Records for all Exchange Online domains are published"
    severity: high
    automation_type: automated
    cis_control: '2.1.10'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: microsoft_365.section_2.l1_ensure_dmarc_records_for_all_exchange_online
    assertion:
      field: port
      operator: equals
      expected: "on"
    remediation: >
      To remediate using a DNS Provider: 1. For each Exchange Online Accepted
      Domain, add the following record to DNS: Record: _dmarc.domain1.com Type: TXT
      Value: v=DMARC1; p=none; rua=mailto:<rua-report@example.com>; ruf=mailto:<ruf-
      report@example.com> 2. This will create a basic DMARC policy that will allow
      the organization to start monitoring message statistics. 3. One week is enough
      time for data generated by the reports to be useful in understanding email
      trends and traffic. The final step requires implementing a policy of p=reject
      OR p=quarantine and pct=100 with the necessary rua and ruf email addresses
      defined: Record: _dmarc.domain1.com Type: TXT Value: v=DMARC1; p=reject;
      pct=100; rua=mailto:<rua-report@example.com>; ruf=mailto:<ruf-
      report@example.com> Also remediate the MOREA domain using the UI: 1. Navigate
      to the Microsoft 365 admin center https://admin.microsoft.com/ 2. Expand
      Settings and select Domains. 3. Select your tenant domain (for example,
      contoso.onmicrosoft.com). 4. Select DNS records and click + Add record. 5. Add
      a new record with the TXT name of _dmarc with the appropriate values outlined
      above. Note: The remediation portion involves a multi-staged approach over a
      period of time. First, a baseline of the current state of email will be
      established with p=none and rua and ruf. Once the environment is better
      understood and reports have been analyzed an organization will move to the
      final state with dmarc record values as outlined in the audit section.
      Microsoft has a list of best practices for implementing DMARC that cover these
      steps in detail. References: 1. https://learn.microsoft.com/en-us/defender-
      office-365/email-authentication- dmarc-configure?view=o365-worldwide 2.
      https://learn.microsoft.com/en-us/defender-office-365/step-by-step-guides/how-
      to-enable-dmarc-reporting-for-microsoft-online-email-routing-address-moera-
      and- parked-domains?view=o365-worldwide 3.
      https://media.defense.gov/2024/May/02/2003455483/-1/-1/0/CSA-NORTH- KOREAN-
      ACTORS-EXPLOIT-WEAK-DMARC.PDF
    compliance:
      - cis_microsoft_365_v5_0_0_2_1_10

  - rule_id: microsoft_365.cis.2.l2_ensure_comprehensive_attachment_filtering_is
    title: "(L2) Ensure comprehensive attachment filtering is applied"
    severity: medium
    automation_type: automated
    cis_control: '2.1.11'
    cis_section: '2'
    profile_applicability: "Level 2"
    scope: microsoft_365.section_2.l2_ensure_comprehensive_attachment_filtering_is
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      To Remediate using PowerShell: 1. Connect to Exchange Online using Connect-
      ExchangeOnline. 2. Run the following script: # Create an attachment policy and
      associated rule. The rule is # intentionally disabled allowing the org to
      enable it when ready $Policy = @{ Name = 'CIS L2 Attachment Policy'
      EnableFileFilter = $true ZapEnabled = $true
      EnableInternalSenderAdminNotifications = $true InternalSenderAdminAddress =
      'admin@contoso.com' # Change this. } $L2Extensions = @( '7z', 'a3x', 'ace',
      'ade', 'adp', 'ani', 'app', 'appinstaller', 'applescript', 'application',
      'appref-ms', 'appx', 'appxbundle', 'arj', 'asd', 'asx', 'bas', 'bat', 'bgi',
      'bz2', 'cab', 'chm', 'cmd', 'com', 'cpl', 'crt', 'cs', 'csh', 'daa', 'dbf',
      'dcr', 'deb', 'desktopthemepackfile', 'dex', 'diagcab', 'dif', 'dir', 'dll',
      'dmg', 'doc', 'docm', 'dot', 'dotm', 'elf', 'eml', 'exe', 'fxp', 'gadget',
      'gz', 'hlp', 'hta', 'htc', 'htm', 'html', 'hwpx', 'ics', 'img', 'inf', 'ins',
      'iqy', 'iso', 'isp', 'jar', 'jnlp', 'js', 'jse', 'kext', 'ksh', 'lha', 'lib',
      'library-ms', 'lnk', 'lzh', 'macho', 'mam', 'mda', 'mdb', 'mde', 'mdt', 'mdw',
      'mdz', 'mht', 'mhtml', 'mof', 'msc', 'msi', 'msix', 'msp', 'msrcincident',
      'mst', 'ocx', 'odt', 'ops', 'oxps', 'pcd', 'pif', 'plg', 'pot', 'potm', 'ppa',
      'ppam', 'ppkg', 'pps', 'ppsm', 'ppt', 'pptm', 'prf', 'prg', 'ps1', 'ps11',
      'ps11xml', 'ps1xml', 'ps2', 'ps2xml', 'psc1', 'psc2', 'pub', 'py', 'pyc',
      'pyo', 'pyw', 'pyz', 'pyzw', 'rar', 'reg', 'rev', 'rtf', 'scf', 'scpt', 'scr',
      'sct', 'searchConnector-ms', 'service', 'settingcontent-ms', 'sh', 'shb',
      'shs', 'shtm', 'shtml', 'sldm', 'slk', 'so', 'spl', 'stm', 'svg', 'swf',
      'sys', 'tar', 'theme', 'themepack', 'timer', 'uif', 'url', 'uue', 'vb', 'vbe',
      'vbs', 'vhd', 'vhdx', 'vxd', 'wbk', 'website', 'wim', 'wiz', 'ws', 'wsc',
      'wsf', 'wsh', 'xla', 'xlam', 'xlc', 'xll', 'xlm', 'xls', 'xlsb', 'xlsm',
      'xlt', 'xltm', 'xlw', 'xnk', 'xps', 'xsl', 'xz', 'z' ) # Create the policy
      New-MalwareFilterPolicy @Policy -FileTypes $L2Extensions # Create the rule for
      all accepted domains $Rule = @{ Name = $Policy.Name Enabled = $false
      MalwareFilterPolicy = $Policy.Name RecipientDomainIs = (Get-
      AcceptedDomain).Name Priority = 0 } New-MalwareFilterRule @Rule 3. When
      prepared enable the rule either through the UI or PowerShell. Note: Due to the
      number of extensions the UI method is not covered. The objects can however be
      edited in the UI or manually added using the list from the script. 1. Navigate
      to Microsoft Defender at https://security.microsoft.com/ 2. Browse to Policies
      & rules > Threat policies > Anti-malware. Default Value: The following
      extensions are blocked by default: ace, ani, apk, app, appx, arj, bat, cab,
      cmd, com, deb, dex, dll, docm, elf, exe, hta, img, iso, jar, jnlp, kext, lha,
      lib, library, lnk, lzh, macho, msc, msi, msix, msp, mst, pif, ppa, ppam, reg,
      rev, scf, scr, sct, sys, uif, vb, vbe, vbs, vxd, wsc, wsf, wsh, xll, xz, z
      References: 1. https://learn.microsoft.com/en-
      us/powershell/module/exchange/get- malwarefilterpolicy?view=exchange-ps 2.
      https://learn.microsoft.com/en-
      us/microsoft-365/security/office-365-security/anti- malware-policies-
      configure?view=o365-worldwide 3. https://learn.microsoft.com/en-
      us/office/compatibility/office-file-format-reference
    compliance:
      - cis_microsoft_365_v5_0_0_2_1_11

  - rule_id: microsoft_365.cis.2.l1_ensure_the_connection_filter_ip_allow_list_is
    title: "(L1) Ensure the connection filter IP allow list is not used"
    severity: high
    automation_type: automated
    cis_control: '2.1.12'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: microsoft_365.section_2.l1_ensure_the_connection_filter_ip_allow_list_is
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft 365 Defender
      https://security.microsoft.com. 2. Click to expand Email & collaboration
      select Policies & rules> Threat policies. 3. Under Policies select Anti-spam.
      4. Click on the Connection filter policy (Default). 5. Click Edit connection
      filter policy. 6. Remove any IP entries from Always allow messages from the
      following IP addresses or address range:. 7. Click Save. To remediate using
      PowerShell: 1. Connect to Exchange Online using Connect-ExchangeOnline. 2. Run
      the following PowerShell command: Set-HostedConnectionFilterPolicy -Identity
      Default -IPAllowList @{} Default Value: IPAllowList : {} References: 1.
      https://learn.microsoft.com/en-us/defender-office-365/connection-filter-
      policies- configure 2. https://learn.microsoft.com/en-us/defender-
      office-365/create-safe-sender-lists-in- office-365#use-the-ip-allow-list 3.
      https://learn.microsoft.com/en-us/defender-office-365/how-policies-and-
      protections-are-combined#user-and-tenant-settings-conflict
    compliance:
      - cis_microsoft_365_v5_0_0_2_1_12

  - rule_id: microsoft_365.cis.2.l1_ensure_the_connection_filter_safe_list_is_off
    title: "(L1) Ensure the connection filter safe list is off"
    severity: high
    automation_type: automated
    cis_control: '2.1.13'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: microsoft_365.section_2.l1_ensure_the_connection_filter_safe_list_is_off
    assertion:
      field: value
      operator: exists
      expected: "on"
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft 365 Defender
      https://security.microsoft.com. 2. Click to expand Email & collaboration
      select Policies & rules> Threat policies. 3. Under Policies select Anti-spam.
      4. Click on the Connection filter policy (Default). 5. Click Edit connection
      filter policy. 6. Uncheck Turn on safe list. 7. Click Save. To remediate using
      PowerShell: 1. Connect to Exchange Online using Connect-ExchangeOnline. 2. Run
      the following PowerShell command: Set-HostedConnectionFilterPolicy -Identity
      Default -EnableSafeList $false Default Value: EnableSafeList : False
      References: 1. https://learn.microsoft.com/en-us/defender-
      office-365/connection-filter-policies- configure 2.
      https://learn.microsoft.com/en-us/defender-office-365/create-safe-sender-
      lists-in- office-365#use-the-ip-allow-list 3. https://learn.microsoft.com/en-
      us/defender-office-365/how-policies-and- protections-are-combined#user-and-
      tenant-settings-conflict
    compliance:
      - cis_microsoft_365_v5_0_0_2_1_13

  - rule_id: microsoft_365.cis.2.l1_ensure_inbound_anti_spam_policies_do_not
    title: "(L1) Ensure inbound anti-spam policies do not contain allowed domains"
    severity: high
    automation_type: automated
    cis_control: '2.1.14'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: microsoft_365.section_2.l1_ensure_inbound_anti_spam_policies_do_not
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft 365 Defender
      https://security.microsoft.com. 2. Click to expand Email & collaboration
      select Policies & rules> Threat policies. 3. Under Policies select Anti-spam.
      4. Open each out of compliance inbound anti-spam policy by clicking on it. 5.
      Click Edit allowed and blocked senders and domains. 6. Select Allow domains.
      7. Delete each domain from the domains list. 8. Click Done > Save. 9. Repeat
      as needed. To remediate using PowerShell: 1. Connect to Exchange Online using
      Connect-ExchangeOnline. 2. Run the following PowerShell command: Set-
      HostedContentFilterPolicy -Identity <Policy name> -AllowedSenderDomains @{}
      Or, run this to remove allowed domains from all inbound anti-spam policies:
      $AllowedDomains = Get-HostedContentFilterPolicy | Where-Object
      {$_.AllowedSenderDomains} $AllowedDomains | Set-HostedContentFilterPolicy
      -AllowedSenderDomains @{} Default Value: AllowedSenderDomains : {} References:
      1. https://learn.microsoft.com/en-us/defender-office-365/anti-spam-protection-
      about#allow-and-block-lists-in-anti-spam-policies
    compliance:
      - cis_microsoft_365_v5_0_0_2_1_14

  - rule_id: microsoft_365.cis.2.l1_ensure_priority_accounts_have_strict
    title: "(L1) Ensure Priority accounts have 'Strict protection' presets applied"
    severity: high
    automation_type: automated
    cis_control: '2.4.2'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: microsoft_365.section_2.l1_ensure_priority_accounts_have_strict
    assertion:
      field: row_count
      operator: equals
      expected: "true"
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft 365 Defender
      https://security.microsoft.com/ 2. Select to expand E-mail & collaboration. 3.
      Select Policies & rules > Threat policies > Preset security policies. 4. Click
      to Manage protection settings for Strict protection preset. 5. For Apply
      Exchange Online Protection select at minimum Specific recipients and include
      the Accounts/Groups identified as Priority Accounts. 6. For Apply Defender for
      Office 365 Protection select at minimum Specific recipients and include the
      Accounts/Groups identified as Priority Accounts. 7. For Impersonation
      protection click Next and add valid e-mails or priority accounts both internal
      and external that may be subject to impersonation. 8. For Protected custom
      domains add the organization's domain name, along side other key partners. 9.
      Click Next and finally Confirm Default Value: By default, presets are not
      applied to any users or groups. References: 1. https://learn.microsoft.com/en-
      us/defender-office-365/preset-security- policies?view=o365-worldwide 2.
      https://learn.microsoft.com/en-us/defender-office-365/priority-accounts-
      security- recommendations 3. https://learn.microsoft.com/en-us/defender-
      office-365/recommended-settings-for- eop-and-
      office365?view=o365-worldwide#impersonation-settings-in-anti- phishing-
      policies-in-microsoft-defender-for-office-365
    compliance:
      - cis_microsoft_365_v5_0_0_2_4_2

