tech_type: microsoft_365
category: cloud_saas
cis_benchmark: CIS Microsoft 365 v5.0.0
cis_section: '8'

rules:

  - rule_id: microsoft_365.cis.8.l2_ensure_external_file_sharing_in_teams_is
    title: "(L2) Ensure external file sharing in Teams is enabled for only approved cloud storage services"
    severity: medium
    automation_type: automated
    cis_control: '8.1.1'
    cis_section: '8'
    profile_applicability: "Level 2"
    scope: microsoft_365.section_8.l2_ensure_external_file_sharing_in_teams_is
    assertion:
      field: enabled
      operator: equals
      expected: "on"
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft Teams admin center
      https://admin.teams.microsoft.com. 2. Click to expand Teams select Teams
      settings. 3. Set any unauthorized providers to Off. To remediate using
      PowerShell: 1. Connect to Teams PowerShell using Connect-MicrosoftTeams 2. Run
      the following PowerShell command to disable external providers that are not
      authorized. (the example disables Citrix Files, DropBox, Box, Google Drive and
      Egnyte) $storageParams = @{ AllowGoogleDrive = $false AllowShareFile = $false
      AllowBox = $false AllowDropBox = $false AllowEgnyte = $false } Set-
      CsTeamsClientConfiguration @storageParams Default Value: AllowDropBox : True
      AllowBox : True AllowGoogleDrive : True AllowShareFile : True AllowEgnyte :
      True References: 1. https://learn.microsoft.com/en-
      us/microsoft-365/enterprise/manage-skype-for- business-online-with-
      microsoft-365-powershell?view=o365-worldwide
    compliance:
      - cis_microsoft_365_v5_0_0_8_1_1

  - rule_id: microsoft_365.cis.8.l1_ensure_users_can_t_send_emails_to_a_channel
    title: "(L1) Ensure users can't send emails to a channel email address"
    severity: high
    automation_type: automated
    cis_control: '8.1.2'
    cis_section: '8'
    profile_applicability: "Level 1"
    scope: microsoft_365.section_8.l1_ensure_users_can_t_send_emails_to_a_channel
    assertion:
      field: value
      operator: equals
      expected: "off"
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft Teams admin center
      https://admin.teams.microsoft.com. 2. Click to expand Teams select Teams
      settings. 3. Under email integration set Users can send emails to a channel
      email address to Off. To remediate using PowerShell: 1. Connect to Teams
      PowerShell using Connect-MicrosoftTeams. 2. Run the following command to set
      the recommended state: Set-CsTeamsClientConfiguration -Identity Global
      -AllowEmailIntoChannel $false Default Value: On (True) References: 1.
      https://learn.microsoft.com/en-
      us/microsoft-365/security/office-365-security/step- by-step-guides/reducing-
      attack-surface-in-microsoft-teams?view=o365- worldwide#restricting-channel-
      email-messages-to-approved-domains 2. https://learn.microsoft.com/en-
      us/powershell/module/skype/set- csteamsclientconfiguration?view=skype-ps 3.
      https://support.microsoft.com/en-us/office/send-an-email-to-a-channel-in-
      microsoft-teams-d91db004-d9d7-4a47-82e6-fb1b16dfd51e
    compliance:
      - cis_microsoft_365_v5_0_0_8_1_2

  - rule_id: microsoft_365.cis.8.l2_ensure_external_domains_are_restricted_in_the
    title: "(L2) Ensure external domains are restricted in the Teams admin center"
    severity: medium
    automation_type: automated
    cis_control: '8.2.1'
    cis_section: '8'
    profile_applicability: "Level 2"
    scope: microsoft_365.section_8.l2_ensure_external_domains_are_restricted_in_the
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft Teams admin center
      https://admin.teams.microsoft.com/. 2. Click to expand Users select External
      access. 3. Select the Policies tab 4. Click on the Global (Org-wide default)
      policy. 5. Set Teams and Skype for Business users in external organizations to
      Off. 6. Click Save. To remediate using PowerShell: 1. Connect to Teams
      PowerShell using Connect-MicrosoftTeams 2. Run the following command to
      configure the Global (Org-wide default)` policy. Set-CsExternalAccessPolicy
      -Identity Global -EnableFederationAccess $false Note: Configuring the
      organization settings to block external access or to use a domain allowlist is
      also ni compliance with this control. Default Value: EnableFederationAccess -
      $True References: 1. https://learn.microsoft.com/en-us/microsoftteams/trusted-
      organizations-external- meetings-chat?tabs=organization-settings 2.
      https://cybersecurity.att.com/blogs/security-essentials/darkgate-malware-
      delivered-via-microsoft-teams-detection-and-response 3.
      https://www.microsoft.com/en-us/security/blog/2023/08/02/midnight-blizzard-
      conducts-targeted-social-engineering-over-microsoft-teams/ 4.
      https://www.bitdefender.com/blog/hotforsecurity/gifshell-attack-lets-hackers-
      create-reverse-shell-through-microsoft-teams-gifs/
    compliance:
      - cis_microsoft_365_v5_0_0_8_2_1

  - rule_id: microsoft_365.cis.8.l1_ensure_communication_with_unmanaged_teams
    title: "(L1) Ensure communication with unmanaged Teams users is disabled"
    severity: high
    automation_type: automated
    cis_control: '8.2.2'
    cis_section: '8'
    profile_applicability: "Level 1"
    scope: microsoft_365.section_8.l1_ensure_communication_with_unmanaged_teams
    assertion:
      field: row_count
      operator: equals
      expected: "false"
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft Teams admin center
      https://admin.teams.microsoft.com/. 2. Click to expand Users select External
      access. 3. Select the Policies tab 4. Click on the Global (Org-wide default)
      policy. 5. Set People in my organization can communicate with unmanaged Teams
      accounts to Off. 6. Click Save. To remediate using PowerShell: 1. Connect to
      Teams PowerShell using Connect-MicrosoftTeams 2. Run the following command:
      Set-CsExternalAccessPolicy -Identity Global -EnableTeamsConsumerAccess $false
      Note: Configuring the organization settings to block communication is also in
      compliance with this control. Default Value: • EnableTeamsConsumerAccess :
      True References: 1. https://learn.microsoft.com/en-us/microsoftteams/trusted-
      organizations-external- meetings-chat?tabs=organization-settings 2.
      https://cybersecurity.att.com/blogs/security-essentials/darkgate-malware-
      delivered-via-microsoft-teams-detection-and-response 3.
      https://www.microsoft.com/en-us/security/blog/2023/08/02/midnight-blizzard-
      conducts-targeted-social-engineering-over-microsoft-teams/ 4.
      https://www.bitdefender.com/blog/hotforsecurity/gifshell-attack-lets-hackers-
      create-reverse-shell-through-microsoft-teams-gifs/
    compliance:
      - cis_microsoft_365_v5_0_0_8_2_2

  - rule_id: microsoft_365.cis.8.l1_ensure_external_teams_users_cannot_initiate
    title: "(L1) Ensure external Teams users cannot initiate conversations"
    severity: high
    automation_type: automated
    cis_control: '8.2.3'
    cis_section: '8'
    profile_applicability: "Level 1"
    scope: microsoft_365.section_8.l1_ensure_external_teams_users_cannot_initiate
    assertion:
      field: row_count
      operator: equals
      expected: "false"
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft Teams admin center
      https://admin.teams.microsoft.com/. 2. Click to expand Users select External
      access. 3. Select the Policies tab. 4. Click on the Global (Org-wide default)
      policy. 5. Locate the parent setting People in my organization can communicate
      with unmanaged Teams accounts . 6. Uncheck External users with Teams accounts
      not managed by an organization can contact users in my organization. 7. Click
      Save. Note: If People in my organization can communicate with unmanaged Teams
      accounts is already set to Off then this setting will not be visible and will
      satisfy the requirements of this recommendation. To remediate using
      PowerShell: 1. Connect to Teams PowerShell using Connect-MicrosoftTeams 2. Run
      the following command: Set-CsExternalAccessPolicy -Identity Global
      -EnableTeamsConsumerInbound $false Note: Configuring the organization settings
      to block inbound communication is also in compliance with this control.
      Default Value: • EnableTeamsConsumerInbound : True References: 1.
      https://learn.microsoft.com/en-us/microsoftteams/trusted-organizations-
      external- meetings-chat?tabs=organization-settings 2.
      https://cybersecurity.att.com/blogs/security-essentials/darkgate-malware-
      delivered-via-microsoft-teams-detection-and-response 3.
      https://www.microsoft.com/en-us/security/blog/2023/08/02/midnight-blizzard-
      conducts-targeted-social-engineering-over-microsoft-teams/ 4.
      https://www.bitdefender.com/blog/hotforsecurity/gifshell-attack-lets-hackers-
      create-reverse-shell-through-microsoft-teams-gifs/
    compliance:
      - cis_microsoft_365_v5_0_0_8_2_3

  - rule_id: microsoft_365.cis.8.l1_ensure_communication_with_skype_users_is
    title: "(L1) Ensure communication with Skype users is disabled"
    severity: high
    automation_type: automated
    cis_control: '8.2.4'
    cis_section: '8'
    profile_applicability: "Level 1"
    scope: microsoft_365.section_8.l1_ensure_communication_with_skype_users_is
    assertion:
      field: enabled
      operator: equals
      expected: "false"
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft Teams admin center
      https://admin.teams.microsoft.com/. 2. Click to expand Users select External
      access. 3. Select the Organization settings tab. 4. Set People in my
      organization can communicate with Skype users to Off. 5. Click Save. To
      remediate using PowerShell: 1. Connect to Teams PowerShell using Connect-
      MicrosoftTeams 2. Run the following command: Set-
      CsTenantFederationConfiguration -AllowPublicUsers $false Default Value: •
      AllowPublicUsers : True References: 1. https://learn.microsoft.com/en-
      us/microsoftteams/trusted-organizations-external- meetings-
      chat?tabs=organization-settings Additional Information: This recommendation
      will be reviewed for removal by CIS following Microsoft's planned removal of
      the related setting from Microsoft 365 Commercial Cloud tenants in May 2025.
    compliance:
      - cis_microsoft_365_v5_0_0_8_2_4

  - rule_id: microsoft_365.cis.8.l1_ensure_only_people_in_my_org_can_bypass_the
    title: "(L1) Ensure only people in my org can bypass the lobby"
    severity: high
    automation_type: automated
    cis_control: '8.5.3'
    cis_section: '8'
    profile_applicability: "Level 1"
    scope: microsoft_365.section_8.l1_ensure_only_people_in_my_org_can_bypass_the
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft Teams admin center
      https://admin.teams.microsoft.com. 2. Click to expand Meetings select Meeting
      policies. 3. Click Global (Org-wide default). 4. Under meeting join & lobby
      set Who can bypass the lobby to People who were invited or a more restrictive
      value: People in my org, Only organizers and co-organizers. To remediate using
      PowerShell: 1. Connect to Teams PowerShell using Connect-MicrosoftTeams. 2.
      Run the following command to set the recommended state: Set-
      CsTeamsMeetingPolicy -Identity Global -AutoAdmittedUsers 'InvitedUsers' Note:
      More restrictive values EveryoneInCompanyExcludingGuests or OrganizerOnly are
      also in compliance. Default Value: People in my org and guests
      (EveryoneInCompany) References: 1. https://learn.microsoft.com/en-
      us/microsoftteams/who-can-bypass-meeting- lobby#overview-of-lobby-settings-
      and-policies 2. https://learn.microsoft.com/en-us/powershell/module/skype/set-
      csteamsmeetingpolicy?view=skype-ps
    compliance:
      - cis_microsoft_365_v5_0_0_8_5_3

  - rule_id: microsoft_365.cis.8.l1_ensure_users_dialing_in_can_t_bypass_the_lobby
    title: "(L1) Ensure users dialing in can't bypass the lobby"
    severity: high
    automation_type: automated
    cis_control: '8.5.4'
    cis_section: '8'
    profile_applicability: "Level 1"
    scope: microsoft_365.section_8.l1_ensure_users_dialing_in_can_t_bypass_the_lobby
    assertion:
      field: value
      operator: equals
      expected: "off"
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft Teams admin center
      https://admin.teams.microsoft.com. 2. Click to expand Meetings select Meeting
      policies. 3. Click Global (Org-wide default). 4. Under meeting join & lobby
      set People dialing in can bypass the lobby to Off. To remediate using
      PowerShell: 1. Connect to Teams PowerShell using Connect-MicrosoftTeams. 2.
      Run the following command to set the recommended state: Set-
      CsTeamsMeetingPolicy -Identity Global -AllowPSTNUsersToBypassLobby $false
      Default Value: Off (False) References: 1. https://learn.microsoft.com/en-
      us/microsoftteams/who-can-bypass-meeting- lobby#overview-of-lobby-settings-
      and-policies 2. https://learn.microsoft.com/en-us/powershell/module/skype/set-
      csteamsmeetingpolicy?view=skype-ps
    compliance:
      - cis_microsoft_365_v5_0_0_8_5_4

  - rule_id: microsoft_365.cis.8.l2_ensure_only_organizers_and_co_organizers_can
    title: "(L2) Ensure only organizers and co-organizers can present"
    severity: medium
    automation_type: automated
    cis_control: '8.5.6'
    cis_section: '8'
    profile_applicability: "Level 2"
    scope: microsoft_365.section_8.l2_ensure_only_organizers_and_co_organizers_can
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft Teams admin center
      https://admin.teams.microsoft.com. 2. Click to expand Meetings select Meeting
      policies. 3. Click Global (Org-wide default). 4. Under content sharing set Who
      can present to Only organizers and co- organizers. To remediate using
      PowerShell: 1. Connect to Teams PowerShell using Connect-MicrosoftTeams. 2.
      Run the following command to set the recommended state: Set-
      CsTeamsMeetingPolicy -Identity Global -DesignatedPresenterRoleMode
      'OrganizerOnlyUserOverride' Default Value: Everyone (EveryoneUserOverride)
      References: 1. https://learn.microsoft.com/en-US/microsoftteams/meeting-who-
      present-request- control 2. https://learn.microsoft.com/en-
      us/microsoftteams/meeting-who-present-request- control#manage-who-can-present
      3. https://learn.microsoft.com/en-us/defender-office-365/step-by-step-
      guides/reducing-attack-surface-in-microsoft-teams?view=o365-
      worldwide#configure-meeting-settings-restrict-presenters 4.
      https://learn.microsoft.com/en-us/powershell/module/skype/set-
      csteamsmeetingpolicy?view=skype-ps
    compliance:
      - cis_microsoft_365_v5_0_0_8_5_6

  - rule_id: microsoft_365.cis.8.l1_ensure_external_participants_can_t_give_or
    title: "(L1) Ensure external participants can't give or request control"
    severity: high
    automation_type: automated
    cis_control: '8.5.7'
    cis_section: '8'
    profile_applicability: "Level 1"
    scope: microsoft_365.section_8.l1_ensure_external_participants_can_t_give_or
    assertion:
      field: value
      operator: equals
      expected: "off"
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft Teams admin center
      https://admin.teams.microsoft.com. 2. Click to expand Meetings select Meeting
      policies. 3. Click Global (Org-wide default). 4. Under content sharing set
      External participants can give or request control to Off. To remediate using
      PowerShell: 1. Connect to Teams PowerShell using Connect-MicrosoftTeams. 2.
      Run the following command to set the recommended state: Set-
      CsTeamsMeetingPolicy -Identity Global -
      AllowExternalParticipantGiveRequestControl $false Default Value: Off (False)
      References: 1. https://learn.microsoft.com/en-us/microsoftteams/meeting-who-
      present-request- control 2. https://learn.microsoft.com/en-
      us/powershell/module/skype/set- csteamsmeetingpolicy?view=skype-ps
    compliance:
      - cis_microsoft_365_v5_0_0_8_5_7

  - rule_id: microsoft_365.cis.8.l2_ensure_external_meeting_chat_is_off
    title: "(L2) Ensure external meeting chat is off"
    severity: medium
    automation_type: automated
    cis_control: '8.5.8'
    cis_section: '8'
    profile_applicability: "Level 2"
    scope: microsoft_365.section_8.l2_ensure_external_meeting_chat_is_off
    assertion:
      field: value
      operator: equals
      expected: "off"
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft Teams admin center
      https://admin.teams.microsoft.com. 2. Click to expand Meetings select Meeting
      policies. 3. Click Global (Org-wide default). 4. Under meeting engagement set
      External meeting chat to Off. To remediate using PowerShell: 1. Connect to
      Teams PowerShell using Connect-MicrosoftTeams. 2. Run the following command to
      set the recommended state: Set-CsTeamsMeetingPolicy -Identity Global
      -AllowExternalNonTrustedMeetingChat $false Default Value: On(True) References:
      1. https://learn.microsoft.com/en-us/microsoftteams/settings-policies-
      reference#meeting-engagement
    compliance:
      - cis_microsoft_365_v5_0_0_8_5_8

  - rule_id: microsoft_365.cis.8.l2_ensure_meeting_recording_is_off_by_default
    title: "(L2) Ensure meeting recording is off by default"
    severity: medium
    automation_type: automated
    cis_control: '8.5.9'
    cis_section: '8'
    profile_applicability: "Level 2"
    scope: microsoft_365.section_8.l2_ensure_meeting_recording_is_off_by_default
    assertion:
      field: value
      operator: equals
      expected: "off"
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft Teams admin center
      https://admin.teams.microsoft.com. 2. Click to expand Meetings select Meeting
      policies. 3. Click Global (Org-wide default). 4. Under Recording &
      transcription set Meeting recording to Off. To remediate using PowerShell: 1.
      Connect to Teams PowerShell using Connect-MicrosoftTeams. 2. Run the following
      command to set the recommended state: Set-CsTeamsMeetingPolicy -Identity
      Global -AllowCloudRecording $false Default Value: On (True) References: 1.
      https://learn.microsoft.com/en-us/microsoftteams/settings-policies-
      reference#recording--transcription
    compliance:
      - cis_microsoft_365_v5_0_0_8_5_9

  - rule_id: microsoft_365.cis.8.l1_ensure_users_can_report_security_concerns_in
    title: "(L1) Ensure users can report security concerns in Teams"
    severity: high
    automation_type: automated
    cis_control: '8.6.1'
    cis_section: '8'
    profile_applicability: "Level 1"
    scope: microsoft_365.section_8.l1_ensure_users_can_report_security_concerns_in
    assertion:
      field: port
      operator: exists
      expected: "on"
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft Teams admin center
      https://admin.teams.microsoft.com. 2. Click to expand Messaging select
      Messaging policies. 3. Click Global (Org-wide default). 4. Set Report a
      security concern to On. 5. Next, navigate to Microsoft 365 Defender
      https://security.microsoft.com/ 6. Click on Settings > Email & collaboration >
      User reported settings. 7. Scroll to Microsoft Teams. 8. Check Monitor
      reported messages in Microsoft Teams and Save. 9. Set Send reported messages
      to: to My reporting mailbox only with reports configured to be sent to
      authorized staff. To remediate using PowerShell: 1. Connect to Teams
      PowerShell using Connect-MicrosoftTeams. 2. Connect to Exchange Online
      PowerShell using Connect-ExchangeOnline. 3. Run the following cmdlet: Set-
      CsTeamsMessagingPolicy -Identity Global -AllowSecurityEndUserReporting $true
      4. To configure the Defender reporting policies, edit and run this script:
      $usersub = 'userreportedmessages@fabrikam.com' # Change this. $params = @{
      Identity = 'DefaultReportSubmissionPolicy' EnableReportToMicrosoft = $false
      ReportChatMessageEnabled = $false ReportChatMessageToCustomizedAddressEnabled
      = $true ReportJunkToCustomizedAddress = $true ReportNotJunkToCustomizedAddress
      = $true ReportPhishToCustomizedAddress = $true ReportJunkAddresses = $usersub
      ReportNotJunkAddresses = $usersub ReportPhishAddresses = $usersub } Set-
      ReportSubmissionPolicy @params New-ReportSubmissionRule -Name
      DefaultReportSubmissionRule - ReportSubmissionPolicy
      DefaultReportSubmissionPolicy -SentTo $usersub Default Value: On (True) Report
      message destination: Microsoft Only References: 1.
      https://learn.microsoft.com/en-us/defender-office-365/submissions-
      teams?view=o365-worldwide
    compliance:
      - cis_microsoft_365_v5_0_0_8_6_1


