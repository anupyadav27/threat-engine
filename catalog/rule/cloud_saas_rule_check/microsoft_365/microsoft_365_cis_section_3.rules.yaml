tech_type: microsoft_365
category: cloud_saas
cis_benchmark: CIS Microsoft 365 v5.0.0
cis_section: '3'

rules:

  - rule_id: microsoft_365.cis.3.l1_ensure_dlp_policies_are_enabled_for_microsoft
    title: "(L1) Ensure DLP policies are enabled for Microsoft Teams"
    severity: high
    automation_type: automated
    cis_control: '3.2.2'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: microsoft_365.section_3.l1_ensure_dlp_policies_are_enabled_for_microsoft
    assertion:
      field: enabled
      operator: exists
      expected: "on"
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft Purview compliance portal
      https://purview.microsoft.com/ 2. Under Solutions select Data loss prevention
      then Policies. 3. Click Policies tab. 4. Check Default policy for Teams then
      click Edit policy. 5. The edit policy window will appear click Next 6. At the
      Choose locations to apply the policy page, turn the status toggle to On for
      Teams chat and channel messages location and then click Next. 7. On Customized
      advanced DLP rules page, ensure the Default Teams DLP policy rule Status is On
      and click Next. 8. On the Policy mode page, select the radial for Turn it on
      right away and click Next. 9. Review all the settings for the created policy
      on the Review your policy and create it page, and then click submit. 10. Once
      the policy has been successfully submitted click Done. Note: Some tenants may
      not have a default policy for teams as Microsoft started creating these by
      default at a particular point in time. In this case a new policy will have to
      be created that includes a rule to protect data important to the organization
      such as credit cards and PII. Default Value: Enabled (On) References: 1.
      https://learn.microsoft.com/en-us/powershell/exchange/connect-to-scc-
      powershell?view=exchange-ps 2. https://learn.microsoft.com/en-us/purview/dlp-
      teams-default-policy 3. https://learn.microsoft.com/en-
      us/powershell/module/exchange/connect- ippssession?view=exchange-ps
    compliance:
      - cis_microsoft_365_v5_0_0_3_2_2


