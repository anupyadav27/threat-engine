tech_type: microsoft_365
category: cloud_saas
cis_benchmark: CIS Microsoft 365 v5.0.0
cis_section: '1'

rules:

  - rule_id: microsoft_365.cis.1.l1_ensure_that_between_two_and_four_global_admins
    title: "(L1) Ensure that between two and four global admins are designated"
    severity: high
    automation_type: automated
    cis_control: '1.1.3'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: microsoft_365.section_1.l1_ensure_that_between_two_and_four_global_admins
    assertion:
      field: row_count
      operator: equals
      expected: "on"
    remediation: >
      To remediate using the UI: 1. Navigate to the Microsoft 365 admin center
      https://admin.microsoft.com 2. Select Users > Active Users. 3. In the Search
      field enter the name of the user to be made a Global Administrator. 4. To
      create a new Global Admin: 1. Select the user's name. 2. A window will appear
      to the right. 3. Select Manage roles. 4. Select Admin center access. 5. Check
      Global Administrator. 6. Click Save changes. 5. To remove Global Admins: 1.
      Select User. 2. Under Roles select Manage roles 3. De-Select the appropriate
      role. 4. Click Save changes. References: 1. https://learn.microsoft.com/en-
      us/powershell/module/microsoft.graph.identity.directorymanagement/get-
      mgdirectoryrole?view=graph-powershell-1.0 2. https://learn.microsoft.com/en-
      us/entra/identity/role-based-access- control/permissions-reference#all-roles
      3. https://learn.microsoft.com/en-us/entra/identity/role-based-access-
      control/best- practices#5-limit-the-number-of-global-administrators-to-less-
      than-5
    compliance:
      - cis_microsoft_365_v5_0_0_1_1_3

  - rule_id: microsoft_365.cis.1.l1_ensure_the_password_expiration_policy_is_set
    title: "(L1) Ensure the 'Password expiration policy' is set to 'Set passwords to never expire (recommended)'"
    severity: high
    automation_type: automated
    cis_control: '1.3.1'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: microsoft_365.section_1.l1_ensure_the_password_expiration_policy_is_set
    assertion:
      field: row_count
      operator: equals
      expected: "on"
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft 365 admin center
      https://admin.microsoft.com. 2. Click to expand Settings select Org Settings.
      3. Click on Security & privacy. 4. Check the Set passwords to never expire
      (recommended) box. 5. Click Save. To remediate using PowerShell: 1. Connect to
      the Microsoft Graph service using Connect-MgGraph -Scopes
      'Domain.ReadWrite.All'. 2. Run the following Microsoft Graph PowerShell
      command: Update-MgDomain -DomainId <Domain> -PasswordValidityPeriodInDays
      2147483647 Default Value: If the property is not set, a default value of 90
      days will be used References: 1.
      https://pages.nist.gov/800-63-3/sp800-63b.html 2.
      https://www.cisecurity.org/white-papers/cis-password-policy-guide/ 3.
      https://learn.microsoft.com/en-us/microsoft-365/admin/misc/password-policy-
      recommendations?view=o365-worldwide
    compliance:
      - cis_microsoft_365_v5_0_0_1_3_1

  - rule_id: microsoft_365.cis.1.l2_ensure_external_sharing_of_calendars_is_not
    title: "(L2) Ensure 'External sharing' of calendars is not available"
    severity: medium
    automation_type: automated
    cis_control: '1.3.3'
    cis_section: '1'
    profile_applicability: "Level 2"
    scope: microsoft_365.section_1.l2_ensure_external_sharing_of_calendars_is_not
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft 365 admin center
      https://admin.microsoft.com. 2. Click to expand Settings select Org settings.
      3. In the Services section click Calendar. 4. Uncheck Let your users share
      their calendars with people outside of your organization who have Office 365
      or Exchange. 5. Click Save. To remediate using PowerShell: 1. Connect to
      Exchange Online using Connect-ExchangeOnline. 2. Run the following Exchange
      Online PowerShell command: Set-SharingPolicy -Identity 'Default Sharing
      Policy' -Enabled $False Default Value: Enabled (True) References: 1.
      https://learn.microsoft.com/en-us/microsoft-365/admin/manage/share-calendars-
      with-external-users?view=o365-worldwide Additional Information: The following
      script can be used to audit any mailboxes that might be sharing calendars
      prior to disabling the feature globally: $mailboxes = Get-Mailbox -ResultSize
      Unlimited foreach ($mailbox in $mailboxes) { # Get the name of the default
      calendar folder (depends on the mailbox's language) $calendarFolder =
      [string](Get-ExoMailboxFolderStatistics $mailbox.PrimarySmtpAddress
      -FolderScope Calendar| Where-Object { $_.FolderType -eq 'Calendar' }).Name #
      Get users calendar folder settings for their default Calendar folder #
      calendar has the format identity:\<calendar folder name> $calendar = Get-
      MailboxCalendarFolder -Identity
      '$($mailbox.PrimarySmtpAddress):\$calendarFolder' if
      ($calendar.PublishEnabled) { Write-Host -ForegroundColor Yellow 'Calendar
      publishing is enabled for $($mailbox.PrimarySmtpAddress) on
      $($calendar.PublishedCalendarUrl)' } }
    compliance:
      - cis_microsoft_365_v5_0_0_1_3_3

  - rule_id: microsoft_365.cis.1.l1_ensure_internal_phishing_protection_for_forms
    title: "(L1) Ensure internal phishing protection for Forms is enabled"
    severity: high
    automation_type: automated
    cis_control: '1.3.5'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: microsoft_365.section_1.l1_ensure_internal_phishing_protection_for_forms
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft 365 admin center
      https://admin.microsoft.com. 2. Click to expand Settings then select Org
      settings. 3. Under Services select Microsoft Forms. 4. Click the checkbox
      labeled Add internal phishing protection under Phishing protection. 5. Click
      Save. To remediate using PowerShell 1. Connect to the Microsoft Graph service
      using Connect-MgGraph -Scopes 'OrgSettings-AppsAndServices.ReadWrite.All'. 2.
      Run the following Microsoft Graph PowerShell commands: $uri =
      'https://graph.microsoft.com/beta/admin/forms/settings' $body = @{
      'isInOrgFormsPhishingScanEnabled' = $true } | ConvertTo-Json Invoke-
      MgGraphRequest -Method PATCH -Uri $uri -Body $body Default Value: Internal
      Phishing Protection is enabled. References: 1. https://learn.microsoft.com/en-
      US/microsoft-forms/administrator-settings- microsoft-forms 2.
      https://learn.microsoft.com/en-US/microsoft-forms/review-unblock-forms-users-
      detected-blocked-potential-phishing
    compliance:
      - cis_microsoft_365_v5_0_0_1_3_5

  - rule_id: microsoft_365.cis.1.l2_ensure_third_party_storage_services_are
    title: "(L2) Ensure 'third-party storage services' are restricted in 'Microsoft 365 on the web'"
    severity: medium
    automation_type: automated
    cis_control: '1.3.7'
    cis_section: '1'
    profile_applicability: "Level 2"
    scope: microsoft_365.section_1.l2_ensure_third_party_storage_services_are
    assertion:
      field: enabled
      operator: equals
      expected: "on"
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft 365 admin center
      https://admin.microsoft.com 2. Go to Settings > Org Settings > Services >
      Microsoft 365 on the web 3. Uncheck Let users open files stored in third-party
      storage services in Microsoft 365 on the web To remediate using PowerShell: 1.
      Connect to Microsoft Graph using Connect-MgGraph -Scopes
      'Application.ReadWrite.All' 2. Run the following script: $SP = Get-
      MgServicePrincipal -Filter 'appId eq 'c1f33bc0-bdb4-4248-ba9b- 096807ddb43e''
      # If the service principal doesn't exist then create it first. if (-not $SP) {
      $SP = New-MgServicePrincipal -AppId 'c1f33bc0-bdb4-4248-ba9b- 096807ddb43e' }
      Update-MgServicePrincipal -ServicePrincipalId $SP.Id -AccountEnabled:$false
      Default Value: Enabled - Users are able to open files stored in third-party
      storage services References: 1. https://learn.microsoft.com/en-
      us/microsoft-365/admin/setup/set-up-file-storage- and-
      sharing?view=o365-worldwide#enable-or-disable-third-party-storage- services
    compliance:
      - cis_microsoft_365_v5_0_0_1_3_7


