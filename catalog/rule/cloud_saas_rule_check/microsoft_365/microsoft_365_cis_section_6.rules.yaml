tech_type: microsoft_365
category: cloud_saas
cis_benchmark: CIS Microsoft 365 v5.0.0
cis_section: '6'

rules:

  - rule_id: microsoft_365.cis.6.l1_ensure_all_forms_of_mail_forwarding_are
    title: "(L1) Ensure all forms of mail forwarding are blocked and/or disabled"
    severity: high
    automation_type: automated
    cis_control: '6.2.1'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: microsoft_365.section_6.l1_ensure_all_forms_of_mail_forwarding_are
    assertion:
      field: enabled
      operator: exists
      expected: "false"
    remediation: >
      Note: Remediation is a two step procedure as follows: STEP 1: Transport rules
      To remediate using the UI: 1. Select Exchange to open the Exchange admin
      center. 2. Select Mail Flow then Rules. 3. For each rule that redirects email
      to external domains, select the rule and click the 'Delete' icon. To remediate
      using PowerShell: 1. Connect to Exchange Online using Connect-ExchangeOnline.
      2. Run the following PowerShell command: Remove-TransportRule {RuleName} STEP
      2: Anti-spam outbound policy To remediate using the UI: 1. Navigate to
      Microsoft 365 Defender https://security.microsoft.com/ 2. Expand E-mail &
      collaboration then select Policies & rules. 3. Select Threat policies > Anti-
      spam. 4. Select Anti-spam outbound policy (default) 5. Click Edit protection
      settings 6. Set Automatic forwarding rules dropdown to Off - Forwarding is
      disabled and click Save 7. Repeat steps 4-6 for any additional higher
      priority, custom policies. To remediate using PowerShell: 1. Connect to
      Exchange Online using Connect-ExchangeOnline. 2. Run the following PowerShell
      command: Set-HostedOutboundSpamFilterPolicy -Identity {policyName}
      -AutoForwardingMode Off 3. To remove AutoForwarding from all outbound policies
      you can also run: Get-HostedOutboundSpamFilterPolicy | Set-
      HostedOutboundSpamFilterPolicy - AutoForwardingMode Off References: 1.
      https://learn.microsoft.com/en-us/exchange/security-and-compliance/mail-flow-
      rules/mail-flow-rules 2. https://techcommunity.microsoft.com/t5/exchange-team-
      blog/all-you-need-to- know-about-automatic-email-forwarding-in/ba-
      p/2074888#:~:text=%20%20%20Automatic%20forwarding%20option%20%20,% 3.
      https://learn.microsoft.com/en-us/defender-office-365/outbound-spam-policies-
      external-email-forwarding?view=o365-worldwide
    compliance:
      - cis_microsoft_365_v5_0_0_6_2_1

  - rule_id: microsoft_365.cis.6.l1_ensure_mail_transport_rules_do_not_whitelist
    title: "(L1) Ensure mail transport rules do not whitelist specific domains"
    severity: high
    automation_type: automated
    cis_control: '6.2.2'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: microsoft_365.section_6.l1_ensure_mail_transport_rules_do_not_whitelist
    assertion:
      field: port
      operator: equals
      expected: "true"
    remediation: >
      To remediate using the UI: 1. Navigate to Exchange admin center
      https://admin.exchange.microsoft.com.. 2. Click to expand Mail Flow and then
      select Rules. 3. For each rule that sets the spam confidence level to -1 for a
      specific domain, select the rule and click Delete. To remediate using
      PowerShell: 1. Connect to Exchange online using Connect-ExchangeOnline. 2. To
      modify the rule: Remove-TransportRule {RuleName} 3. Verify the rules no longer
      exists by re-running the audit procedure. References: 1.
      https://learn.microsoft.com/en-us/exchange/security-and-compliance/mail-flow-
      rules/configuration-best-practices 2. https://learn.microsoft.com/en-
      us/exchange/security-and-compliance/mail-flow- rules/mail-flow-rules
    compliance:
      - cis_microsoft_365_v5_0_0_6_2_2

  - rule_id: microsoft_365.cis.6.l1_ensure_email_from_external_senders_is
    title: "(L1) Ensure email from external senders is identified"
    severity: high
    automation_type: automated
    cis_control: '6.2.3'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: microsoft_365.section_6.l1_ensure_email_from_external_senders_is
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      To remediate using PowerShell: 1. Connect to Exchange online using Connect-
      ExchangeOnline. 2. Run the following PowerShell command: Set-ExternalInOutlook
      -Enabled $true Default Value: Disabled (False) References: 1.
      https://techcommunity.microsoft.com/t5/exchange-team-blog/native-external-
      sender-callouts-on-email-in-outlook/ba-p/2250098 2.
      https://learn.microsoft.com/en-us/powershell/module/exchange/set-
      externalinoutlook?view=exchange-ps
    compliance:
      - cis_microsoft_365_v5_0_0_6_2_3

  - rule_id: microsoft_365.cis.6.l1_ensure_modern_authentication_for_exchange
    title: "(L1) Ensure modern authentication for Exchange Online is enabled"
    severity: high
    automation_type: automated
    cis_control: '6.5.1'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: microsoft_365.section_6.l1_ensure_modern_authentication_for_exchange
    assertion:
      field: enabled
      operator: equals
      expected: "on"
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft 365 admin center
      https://admin.microsoft.com. 2. Click to expand Settings select Org Settings.
      3. Select Modern authentication. 4. Check Turn on modern authentication for
      Outlook 2013 for Windows and later (recommended) to enable modern
      authentication. To remediate using PowerShell: 1. Run the Microsoft Exchange
      Online PowerShell Module. 2. Connect to Exchange Online using Connect-
      ExchangeOnline. 3. Run the following PowerShell command: Set-
      OrganizationConfig -OAuth2ClientProfileEnabled $True Default Value: True
      References: 1. https://learn.microsoft.com/en-us/exchange/clients-and-mobile-
      in-exchange- online/enable-or-disable-modern-authentication-in-exchange-online
    compliance:
      - cis_microsoft_365_v5_0_0_6_5_1

  - rule_id: microsoft_365.cis.6.l1_ensure_mailtips_are_enabled_for_end_users
    title: "(L1) Ensure MailTips are enabled for end users"
    severity: high
    automation_type: automated
    cis_control: '6.5.2'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: microsoft_365.section_6.l1_ensure_mailtips_are_enabled_for_end_users
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      To remediate using PowerShell: 1. Connect to Exchange Online using Connect-
      ExchangeOnline. 2. Run the following PowerShell command: $TipsParams = @{
      MailTipsAllTipsEnabled = $true MailTipsExternalRecipientsTipsEnabled = $true
      MailTipsGroupMetricsEnabled = $true MailTipsLargeAudienceThreshold = '25' }
      Set-OrganizationConfig @TipsParams Default Value: MailTipsAllTipsEnabled: True
      MailTipsExternalRecipientsTipsEnabled: False MailTipsGroupMetricsEnabled: True
      MailTipsLargeAudienceThreshold: 25 References: 1.
      https://learn.microsoft.com/en-us/exchange/clients-and-mobile-in-exchange-
      online/mailtips/mailtips 2. https://learn.microsoft.com/en-
      us/powershell/module/exchange/set- organizationconfig?view=exchange-ps
    compliance:
      - cis_microsoft_365_v5_0_0_6_5_2

  - rule_id: microsoft_365.cis.6.l2_ensure_additional_storage_providers_are
    title: "(L2) Ensure additional storage providers are restricted in Outlook on the web"
    severity: medium
    automation_type: automated
    cis_control: '6.5.3'
    cis_section: '6'
    profile_applicability: "Level 2"
    scope: microsoft_365.section_6.l2_ensure_additional_storage_providers_are
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      To remediate using PowerShell: 1. Connect to Exchange Online using Connect-
      ExchangeOnline. 2. Run the following PowerShell command: Set-OwaMailboxPolicy
      -Identity OwaMailboxPolicy-Default - AdditionalStorageProvidersAvailable
      $false Default Value: Additional Storage Providers - True References: 1.
      https://learn.microsoft.com/en-us/powershell/module/exchange/set-
      owamailboxpolicy?view=exchange-ps 2. https://support.microsoft.com/en-
      us/topic/3rd-party-cloud-storage-services- supported-by-office-apps-
      fce12782-eccc-4cf5-8f4b-d1ebec513f72
    compliance:
      - cis_microsoft_365_v5_0_0_6_5_3

  - rule_id: microsoft_365.cis.6.l1_ensure_smtp_auth_is_disabled
    title: "(L1) Ensure SMTP AUTH is disabled"
    severity: high
    automation_type: automated
    cis_control: '6.5.4'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: microsoft_365.section_6.l1_ensure_smtp_auth_is_disabled
    assertion:
      field: enabled
      operator: equals
      expected: "false"
    remediation: >
      To remediate using the UI: 1. Navigate to Exchange admin center
      https://admin.exchange.microsoft.com. 2. Select Settings > Mail flow. 3.
      Uncheck Turn off SMTP AUTH protocol for your organization. To remediate using
      PowerShell: 1. Connect to Exchange Online using Connect-ExchangeOnline. 2. Run
      the following PowerShell command: Set-TransportConfig
      -SmtpClientAuthenticationDisabled $true Default Value:
      SmtpClientAuthenticationDisabled : True References: 1.
      https://learn.microsoft.com/en-us/exchange/clients-and-mobile-in-exchange-
      online/authenticated-client-smtp-submission
    compliance:
      - cis_microsoft_365_v5_0_0_6_5_4


