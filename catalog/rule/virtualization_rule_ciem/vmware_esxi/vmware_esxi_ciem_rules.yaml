# VMWARE_ESXI — CIEM Detection Rules
# Real-time authentication & access event analysis
# Log source: syslog, /var/log/vmkernel.log

tech_type: vmware_esxi
category: virtualization
log_source: syslog, /var/log/vmkernel.log

rules:

  - rule_id: tciem.vmware_esxi.l1_host_must_have_reliable_time_synchronization
    title: "(L1) Host must have reliable time synchronization sources"
    severity: high
    mitre_technique: T1562
    mitre_tactic: defense_evasion
    cis_control: '2.6'
    cis_section: '2'
    log_source: "syslog, /var/log/vmkernel.log"
    detection:
      event_type: audit_event
      filters:
        change_type: security_relevant
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      To enable and properly configure NTP synchronization, perform the following
      from the vSphere web client: 1. Select a host 2. Click Configure then expand
      System then select Time Configuration. 3. Select Edit next to Network Time
      Protocol 4. Select the Enable box, then fill in the appropriate NTP Servers.
      5. in the NTP Service Startup Policy drop down select Start and stop with
      host. 6. Click OK. To implement the recommended configuration state, run the
      following PowerCLI command: # Set the NTP Settings for all hosts # If an
      internal NTP server is used, replace pool.ntp.org with # the IP address or the
      Fully Qualified Domain Name (FQDN) of the internal NTP server $NTPServers =
      'pool.ntp.org', 'pool2.ntp.org' Get-VMHost | Add-VmHostNtpServer $NTPServers
      References: 1. https://docs.vmware.com/en/VMware-vSphere/8.0/vsphere-
      security/GUID- 2553C86E-7981-4F79-B9FC-A6CECA52F6CC.html Additional
      Information: Notes: Verify the NTP firewall ports are open. It is recommended
      to synchronize the ESXi clock with a time server that is located on the
      management network rather than directly with a time server on a public
      network. This time server can then synchronize with a public source through a
      strictly controlled network connection with a firewall.

  - rule_id: tciem.vmware_esxi.l1_host_must_restrict_inter_vm_transparent_page
    title: "(L1) Host must restrict inter-VM transparent page sharing"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '2.10'
    cis_section: '2'
    log_source: "syslog, /var/log/vmkernel.log"
    detection:
      event_type: resource_access
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      From the vSphere Web Client: 1. Select a host 2. Click Configure then expand
      System then select Advanced System settings. 3. Click Edit then Filter for
      Mem.ShareForceSalting. 4. Set the value to 2. 5. Click OK. Additionally, the
      following PowerCLI command can be used: Get-VMHost | Get-AdvancedSetting -Name
      Mem.ShareForceSalting | Set- AdvancedSetting -Value 2 References: 1.
      https://kb.vmware.com/s/article/2097593 2.
      https://blogs.vmware.com/vsphere/2015/01/assess-the-performance-impact-of-
      the-security-change-in-transparent-page-sharing-behaviour.html

