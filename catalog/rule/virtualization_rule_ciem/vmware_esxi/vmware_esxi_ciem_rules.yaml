    detection:
      event_type: resource_access
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      To set the account lockout to 15 minutes, perform the following: 1. From the
      vSphere Web Client, select the host. 2. Click Configure then expand System. 3.
      Select Advanced System Settings then click Edit. 4. Enter
      Security.AccountUnlockTime in the filter. 5. Set the value for this parameter
      to 900. Alternately, use the following PowerCLI command: Get-VMHost | Get-
      AdvancedSetting -Name Security.AccountUnlockTime | Set- AdvancedSetting -Value
      900 References: 1. https://code.vmware.com/apis/1067/vsphere 2.
      https://www.cisecurity.org/white-papers/cis-password-policy-guide/

  - rule_id: tciem.vmware_esxi.l1_host_must_enable_normal_lockdown_mode
