  - rule_id: tciem.vmware_esxi.l1_host_should_deactivate_ssh
    title: "(L1) Host should deactivate SSH"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '3.1'
    cis_section: '3'
    log_source: "syslog, /var/log/vmkernel.log"
    detection:
      event_type: resource_access
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      To disable SSH, perform the following: 1. From the vSphere Web Client, select
      the host. 2. Select Configure then expand System and select Services. 3. Click
      on SSH then click Edit Startup Policy. 4. Set the Startup Policy is set to
      Start and Stop Manually. 5. Click OK. 6. While ESXi Shell is still selected
      click Stop. Alternately, use the following PowerCLI command: # Set SSH to
      start manually rather than automatically for all hosts Get-VMHost | Get-
      VMHostService | Where { $_.key -eq 'TSM-SSH' } | Set- VMHostService -Policy
      Off References: 1. https://docs.vmware.com/en/VMware-
      vSphere/7.0/com.vmware.vsphere.security.doc/GUID-12E27BF3-3769-4665-
      8769-DA76C2BC9FFE.html

