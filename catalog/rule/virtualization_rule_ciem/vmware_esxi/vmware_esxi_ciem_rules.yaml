  - rule_id: tciem.vmware_esxi.l1_host_must_automatically_terminate_idle_shells
    title: "(L1) Host must automatically terminate idle shells"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '3.8'
    cis_section: '3'
    log_source: "syslog, /var/log/vmkernel.log"
    detection:
      event_type: resource_access
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      To set the timeout to the desired value, perform the following from the
      vSphere web client: 1. From the vSphere Web Client, select the host. 2. Click
      Configure then expand System. 3. Select Advanced System Settings then click
      Edit. 4. Enter ESXiShellInteractiveTimeOut in the filter. 5. Set the value for
      this parameter is set to the appropriate value (300 seconds or less). 6. Click
      OK. Note: A value of 0 disables the ESXi ShellInteractiveTimeOut. Alternately,
      use the following PowerCLI command: # Set Remove
      UserVars.ESXiShellInteractiveTimeOut to 300 on all hosts Get-VMHost | Get-
      AdvancedSetting -Name 'UserVars.ESXiShellInteractiveTimeOut' | Set-
      AdvancedSetting -Value '300' References: 1. http://kb.vmware.com/kb/2004746
      Additional Information: It is recommended to set the ESXiShellTimeOut together
      with ESXiShellInteractiveTimeOut.

  - rule_id: tciem.vmware_esxi.l1_host_must_lock_an_account_after_a_specified
    title: "(L1) Host must lock an account after a specified number of failed login attempts"
    severity: high
    mitre_technique: T1110
    mitre_tactic: credential_access
    cis_control: '3.12'
    cis_section: '3'
    log_source: "syslog, /var/log/vmkernel.log"
    detection:
      event_type: authentication_failure
      threshold: 5
      window_seconds: 300
      group_by: [source_ip, username]
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      To set the maximum failed login attempts correctly, perform the following
      steps: 1. From the vSphere Web Client, select the host. 2. Click Configure
      then expand System. 3. Select Advanced System Settings then click Edit. 4.
      Enter Security.AccountLockFailures in the filter. 5. Set the value for this
      parameter to 5. Alternately, use the following PowerCLI command: Get-VMHost |
      Get-AdvancedSetting -Name Security.AccountLockFailures | Set- AdvancedSetting
      -Value 5 References: 1. https://code.vmware.com/apis/196/vsphere#https://vdc-
      repo.vmware.com/vmwb- repository/dcr-
      public/6b586ed2-655c-49d9-9029-bc416323cb22/fa0b429a-a695-
      4c11-b7d2-2cbc284049dc/doc/vim.option.OptionManager.html 2.
      https://www.cisecurity.org/white-papers/cis-password-policy-guide/

  - rule_id: tciem.vmware_esxi.l1_host_must_unlock_accounts_after_a_specified
