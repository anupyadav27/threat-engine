version: '1.0'
provider: azure
service: loadbalancer
checks:
- rule_id: azure.loadbalancer.deletion.protection
  for_each: azure.network.loadbalancers.list_all
  severity: MEDIUM
  conditions:
    var: item.Properties.disableOutboundSnat
    op: is_false
    value: null
- rule_id: azure.loadbalancer.v2.waf.acl.attached
  for_each: azure.network.loadbalancers.list_all
  severity: MEDIUM
  conditions:
    var: item.Properties.FrontendIPConfigurations[].Properties.WebApplicationFirewallPolicy.Id
    op: exists
    value: null
