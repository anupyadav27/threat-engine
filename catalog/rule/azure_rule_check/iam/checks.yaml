version: '1.0'
provider: azure
service: iam
checks:
- rule_id: azure.aad.password_policy.hide_feedback_configured
  for_each: azure.aad.list_aads
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: azure.aad.user.account_management_enabled
  for_each: azure.aad.list_aads
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
    op: is_true
- rule_id: azure.aad.user.allow_guest_invites_restricted
  for_each: azure.aad.list_aads
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
    op: is_true
- rule_id: azure.aad.user.password_policy_enforce_change_configured
  for_each: azure.aad.list_aads
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: azure.aad.user.user_principal_name_configured
  for_each: azure.aad.list_aads
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: azure.aad.user.anonymous_auth_disabled
  for_each: azure.aad.list_aads
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
    op: is_true
- rule_id: azure.iam.role.least_privilege_enforced
  for_each: azure.aad.list_aads
  severity: MEDIUM
  conditions:
    var: item.permissions
    op: not_contains
    value: '*'
- rule_id: azure.iam.role.wildcard_action_configured
  for_each: azure.aad.list_aads
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: azure.aad.service_principal.key_credentials_configured
  for_each: azure.aad.list_aads
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: azure.aad.service_principal.oauth2_permissions_restricted
  for_each: azure.aad.list_aads
  severity: MEDIUM
  conditions:
    var: item.permissions
    op: not_contains
    value: '*'
- rule_id: azure.aad.user.security_key_enforcement_configured
  for_each: azure.aad.list_aads
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
