version: '1.0'
provider: azure
service: vpn
checks:
- rule_id: azure.vpn.gateway.point.to.site.authentication.type.set.to.azure.ad
  for_each: azure.network.vpngateways.list
  severity: MEDIUM
  conditions:
    var: item.properties.vpnClientConfiguration.vpnAuthenticationTypes[]
    op: contains
    value: AAD
