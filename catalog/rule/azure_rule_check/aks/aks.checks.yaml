version: '1.0'
provider: azure
service: aks
checks:
- rule_id: azure.aks.authorization.mode.check
  for_each: azure.containerservice.managedclusters.list_by_resource_group
  severity: MEDIUM
  conditions:
    var: item.properties.securityProfile.azureKeyVaultKms.enabled
    op: is_true
    value: null
- rule_id: azure.aks.cluster.cis_3_2_6_needs_development
  for_each: azure.containerservice.managedclusters.list_by_resource_group
  severity: MEDIUM
  conditions:
    var: item.properties.kubernetesVersion
    op: not_equals
    value: 1.27.9
- rule_id: azure.aks.cluster.private.cluster.enabled
  for_each: azure.containerservice.managedclusters.list_by_resource_group
  severity: MEDIUM
  conditions:
    var: item.apiServerAccessProfile.enablePrivateCluster
    op: is_true
    value: null
- rule_id: azure.aks.cluster.private.endpoint.and.public.access.check
  for_each: azure.containerservice.managedclusters.list_by_resource_group
  severity: MEDIUM
  conditions:
    all:
    - var: item.networkProfile.privateClusterEnabled
      op: is_true
      value: null
    - var: item.apiServerAccessProfile.enablePrivateClusterPublicFQDN
      op: is_false
      value: null
- rule_id: azure.aks.cluster.private_nodes_enabled
  for_each: azure.containerservice.managedclusters.list_by_resource_group
  severity: MEDIUM
  conditions:
    var: item.privateClusterEnabled
    op: is_true
    value: null
- rule_id: azure.aks.cluster.public_access_disabled
  for_each: azure.containerservice.managedclusters.list
  severity: MEDIUM
  conditions:
    var: item.apiServerAccessProfile.enablePrivateCluster
    op: is_true
    value: null
- rule_id: azure.aks.kubelet.certificate.rotation.check
  for_each: azure.containerservice.managedclusters.list_by_resource_group
  severity: MEDIUM
  conditions:
    var: item.properties.agentPoolProfiles[].kubeletConfig.rotateCertificates
    op: is_true
    value: null
- rule_id: azure.aks.kubelet.rotate.certificates.check
  for_each: azure.containerservice.managedclusters.list_by_resource_group
  severity: MEDIUM
  conditions:
    var: item.properties.autoUpgradeProfile.NodeOSUpgradeChannel
    op: exists
    value: null
- rule_id: azure.aks.kubelet.streaming.connection.idle.timeout.check
  for_each: azure.containerservice.managedclusters.list_by_resource_group
  severity: MEDIUM
  conditions:
    var: item.properties.agentPoolProfiles[].kubeletConfig.streamingConnectionIdleTimeoutInSeconds
    op: gte
    value: 30
- rule_id: azure.aks.namespace.network.policy.compliance.check
  for_each: azure.containerservice.managedclusters.list_by_resource_group
  severity: MEDIUM
  conditions:
    var: item.NetworkProfile.NetworkPolicy
    op: exists
    value: null
- rule_id: azure.aks.network.cni.version.check
  for_each: azure.containerservice.managedclusters.list_by_resource_group
  severity: MEDIUM
  conditions:
    var: item.NetworkProfile.NetworkPlugin
    op: equals
    value: azure
- rule_id: azure.aks.network.policy_enabled
  for_each: azure.containerservice.managedclusters.list_by_resource_group
  severity: MEDIUM
  conditions:
    var: item.NetworkProfile.NetworkPolicy
    op: exists
    value: null
- rule_id: azure.aks.pod.service.account.tokens.automount.disabled
  for_each: azure.containerservice.managedclusters.list_by_resource_group
  severity: MEDIUM
  conditions:
    var: item.Properties.SecurityProfile.WorkloadIdentityProfile.Enabled
    op: is_false
    value: null
- rule_id: azure.aks.rbac.check.cluster.admin.usage
  for_each: azure.containerservice.managedclusters.list_by_resource_group
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.enableRBAC
      op: is_true
      value: null
    - var: item.properties.disableLocalAccounts
      op: is_true
      value: null
- rule_id: azure.aks.service.account.default.usage.check
  for_each: azure.containerservice.managedclusters.list_by_resource_group
  severity: MEDIUM
  conditions:
    var: item.servicePrincipalProfile.clientId
    op: not_equals
    value: msi
