version: '1.0'
provider: azure
service: disk
checks:
- rule_id: azure.disk.unattached.cmk.encryption.check
  for_each: azure.compute.disks.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.Encryption.Type
      op: equals
      value: EncryptionAtRestWithCustomerKey
    - var: item.ManagedBy
      op: not_exists
      value: null
