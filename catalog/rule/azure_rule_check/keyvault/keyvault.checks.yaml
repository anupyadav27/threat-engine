version: '1.0'
provider: azure
service: keyvault
checks:
- rule_id: azure.keyvault.alias.alias_alias_points_to_active_key
  for_each: azure.keyvault.keys.list
  severity: MEDIUM
  conditions:
    var: item.attributes.enabled
    op: is_true
    value: null
- rule_id: azure.keyvault.alias.alias_key_has_alias
  for_each: azure.keyvault.keys.list
  severity: MEDIUM
  conditions:
    var: item.key_uri
    op: contains
    value: alias
- rule_id: azure.keyvault.certificate.certificate_key_length_minimum
  for_each: azure.keyvault.vaults.list_by_subscription
  severity: MEDIUM
  conditions:
    all:
    - var: item.sku.name
      op: equals
      value: standard
    - var: item.enable_soft_delete
      op: is_true
      value: null
- rule_id: azure.keyvault.certificate.certificate_not_expired
  for_each: azure.keyvault.vaults.list_by_subscription
  severity: MEDIUM
  conditions:
    var: item.properties.certificates[].attributes.expires
    op: gt
    value: now
- rule_id: azure.keyvault.certificate.certificate_trusted_issuer
  for_each: azure.keyvault.vaults.list_by_subscription
  severity: MEDIUM
  conditions:
    var: item.properties.certificates[].issuer
    op: exists
    value: null
- rule_id: azure.keyvault.certificate.expiration_check
  for_each: azure.keyvault.vaults.list_by_subscription
  severity: MEDIUM
  conditions:
    var: item.properties.certificates[].attributes.expires
    op: gt
    value: '2025-04-10T00:00:00Z'
- rule_id: azure.keyvault.certificate.max.12.months.validity.check
  for_each: azure.keyvault.vaults.list_by_subscription
  severity: MEDIUM
  conditions:
    var: item.properties.certificates[].properties.validityInMonths
    op: lte
    value: 12
- rule_id: azure.keyvault.defender.pricing.tier.check
  for_each: azure.keyvault.vaults.list_by_subscription
  severity: MEDIUM
  conditions:
    var: item.enable_soft_delete
    op: is_true
    value: null
- rule_id: azure.keyvault.diagnostic.logging.check
  for_each: azure.keyvault.vaults.list_by_subscription
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.diagnostics
      op: exists
      value: null
    - var: item.properties.diagnostics.logs
      op: exists
      value: null
    - var: item.properties.diagnostics.logs[].enabled
      op: is_true
      value: null
- rule_id: azure.keyvault.grant.kms_grant_constraints_present
  for_each: azure.keyvault.vaults.list_by_subscription
  severity: MEDIUM
  conditions:
    var: item.properties.accessPolicies[].permissions.keys
    op: contains
    value: Get
- rule_id: azure.keyvault.grant.kms_grant_grantee_principal_valid
  for_each: azure.keyvault.vaults.list_by_subscription
  severity: MEDIUM
  conditions:
    var: item.properties.accessPolicies[].objectId
    op: exists
    value: null
- rule_id: azure.keyvault.grant.kms_grant_lessthan_wildcard_permissions
  for_each: azure.keyvault.vaults.list_by_subscription
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.accessPolicies[].permissions.keys[]
      op: not_contains
      value: '*'
    - var: item.properties.accessPolicies[].permissions.secrets[]
      op: not_contains
      value: '*'
    - var: item.properties.accessPolicies[].permissions.certificates[]
      op: not_contains
      value: '*'
- rule_id: azure.keyvault.key.cmk_rotation_enabled
  for_each: azure.keyvault.keys.list
  severity: MEDIUM
  conditions:
    var: item.attributes.expiration_time
    op: exists
    value: null
- rule_id: azure.keyvault.key.expiration.check
  for_each: azure.keyvault.keys.list
  severity: MEDIUM
  conditions:
    var: item.attributes.exp
    op: exists
    value: null
- rule_id: azure.keyvault.key.not_scheduled_for_deletion
  for_each: azure.keyvault.keys.list
  severity: MEDIUM
  conditions:
    var: item.attributes.exp
    op: exists
    value: null
- rule_id: azure.keyvault.key.rotation.policy.enabled
  for_each: azure.keyvault.vaults.list_by_subscription
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.rotationPolicy
      op: exists
      value: null
    - var: item.properties.rotationPolicy.lifetimeActions
      op: not_empty
      value: null
- rule_id: azure.keyvault.key.rotation_enabled
  for_each: azure.keyvault.vaults.list_by_subscription
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.rotationPolicy
      op: exists
      value: null
    - var: item.properties.rotationPolicy.lifetimeActions
      op: not_empty
      value: null
- rule_id: azure.keyvault.keys.check.expiration
  for_each: azure.keyvault.keys.list
  severity: MEDIUM
  conditions:
    var: item.expiration_date
    op: exists
    value: null
- rule_id: azure.keyvault.managedhsm.compliance.check
  for_each: azure.keyvault.managedhsms.list_by_subscription
  severity: MEDIUM
  conditions:
    all:
    - var: item.provisioning_state
      op: equals
      value: Succeeded
    - var: item.properties.hsmUri
      op: exists
      value: null
- rule_id: azure.keyvault.non.rbac.secret.expiration.check
  for_each: azure.keyvault.vaults.list_by_subscription
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.enableRbacAuthorization
      op: is_false
      value: null
    - var: item.sku.name
      op: equals
      value: standard
    - var: item.properties.accessPolicies[].permissions.secrets
      op: contains
      value: Set
- rule_id: azure.keyvault.paas_app.env_secrets_from_vault_only
  for_each: azure.keyvault.vaults.list_by_subscription
  severity: MEDIUM
  conditions:
    var: item.enable_soft_delete
    op: is_true
    value: null
- rule_id: azure.keyvault.paas_application_version.paas_app_version_artifact_encrypted
  for_each: azure.keyvault.vaults.list_by_subscription
  severity: MEDIUM
  conditions:
    var: item.enable_soft_delete
    op: is_true
    value: null
- rule_id: azure.keyvault.privacy_anonymization.outputs_encrypted
  for_each: azure.keyvault.vaults.list_by_subscription
  severity: MEDIUM
  conditions:
    var: item.enable_soft_delete
    op: is_true
    value: null
- rule_id: azure.keyvault.privacy_consent.store_encrypted
  for_each: azure.keyvault.vaults.list_by_subscription
  severity: MEDIUM
  conditions:
    var: item.enable_soft_delete
    op: is_true
    value: null
- rule_id: azure.keyvault.private.endpoint.association.check
  for_each: azure.keyvault.vaults.list_by_subscription
  severity: MEDIUM
  conditions:
    var: item.properties.privateEndpointConnections[].properties.privateLinkServiceConnectionState.status
    op: equals
    value: Approved
- rule_id: azure.keyvault.private_ca.private_ca_ca_access_rbac_least_privilege
  for_each: azure.keyvault.vaults.list_by_subscription
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.accessPolicies[].permissions.certificates
      op: not_contains
      value: ManageContacts
    - var: item.properties.accessPolicies[].permissions.certificates
      op: not_contains
      value: ManageIssuers
    - var: item.properties.accessPolicies[].permissions.certificates
      op: not_contains
      value: SetIssuers
    - var: item.properties.accessPolicies[].permissions.certificates
      op: not_contains
      value: DeleteIssuers
    - var: item.properties.accessPolicies[].permissions.certificates
      op: not_contains
      value: Update
    - var: item.properties.accessPolicies[].permissions.certificates
      op: not_contains
      value: Create
    - var: item.properties.accessPolicies[].permissions.certificates
      op: not_contains
      value: Import
    - var: item.properties.accessPolicies[].permissions.certificates
      op: not_contains
      value: Delete
    - var: item.properties.accessPolicies[].permissions.certificates
      op: not_contains
      value: Recover
    - var: item.properties.accessPolicies[].permissions.certificates
      op: not_contains
      value: Backup
    - var: item.properties.accessPolicies[].permissions.certificates
      op: not_contains
      value: Restore
    - var: item.properties.accessPolicies[].permissions.certificates
      op: not_contains
      value: Purge
- rule_id: azure.keyvault.private_ca.private_ca_ca_key_in_hsm_where_supported
  for_each: azure.keyvault.vaults.list_by_subscription
  severity: MEDIUM
  conditions:
    all:
    - var: item.sku.name
      op: equals
      value: premium
    - var: item.properties.hsmPoolResourceId
      op: exists
      value: null
- rule_id: azure.keyvault.private_ca.private_ca_crl_or_ocsp
  for_each: azure.keyvault.vaults.list_by_subscription
  severity: MEDIUM
  conditions:
    var: item.enable_soft_delete
    op: is_true
    value: null
- rule_id: azure.keyvault.private_ca.private_ca_path_length_constraints_set
  for_each: azure.keyvault.vaults.list_by_subscription
  severity: MEDIUM
  conditions:
    var: item.properties
    op: exists
    value: null
- rule_id: azure.keyvault.public.network.access.disabled
  for_each: azure.keyvault.vaults.list_by_subscription
  severity: MEDIUM
  conditions:
    var: item.properties.publicNetworkAccess
    op: equals
    value: Disabled
- rule_id: azure.keyvault.rbac.authorization.enabled
  for_each: azure.keyvault.vaults.list_by_subscription
  severity: MEDIUM
  conditions:
    var: item.properties.enableRbacAuthorization
    op: is_true
    value: null
- rule_id: azure.keyvault.rbac.secrets.expiration.check
  for_each: azure.keyvault.vaults.list_by_subscription
  severity: MEDIUM
  conditions:
    var: item.properties.enableRbacAuthorization
    op: is_true
    value: null
- rule_id: azure.keyvault.secret.access_rbac_least_privilege
  for_each: azure.keyvault.vaults.list_by_subscription
  severity: MEDIUM
  conditions:
    var: item.properties.accessPolicies[].permissions.secrets[]
    op: not_contains
    value: '*'
- rule_id: azure.keyvault.secret.kms_key
  for_each: azure.keyvault.vaults.list_by_subscription
  severity: MEDIUM
  conditions:
    var: item.enable_soft_delete
    op: is_true
    value: null
- rule_id: azure.keyvault.secret.rotation_enabled
  for_each: azure.keyvault.vaults.list_by_subscription
  severity: MEDIUM
  conditions:
    var: item.properties.enableRbacAuthorization
    op: is_true
    value: null
- rule_id: azure.keyvault.secret.secure_string_type_for_sensitive
  for_each: azure.keyvault.vaults.list_by_subscription
  severity: MEDIUM
  conditions:
    var: item.enable_soft_delete
    op: is_true
    value: null
- rule_id: azure.keyvault.secrets_secret.kms_key
  for_each: azure.keyvault.vaults.list_by_subscription
  severity: MEDIUM
  conditions:
    var: item.enable_soft_delete
    op: is_true
    value: null
- rule_id: azure.keyvault.secrets_secret.no_plaintext_exposed_in_policy_or_tags
  for_each: azure.keyvault.vaults.list_by_subscription
  severity: MEDIUM
  conditions:
    all:
    - var: item.tags
      op: not_contains
      value: password
    - var: item.tags
      op: not_contains
      value: secret
    - var: item.properties.accessPolicies[].permissions.secrets[]
      op: not_contains
      value: '*'
- rule_id: azure.keyvault.secrets_secret.rotation_where_applicable
  for_each: azure.keyvault.vaults.list_by_subscription
  severity: MEDIUM
  conditions:
    all:
    - var: item.enable_soft_delete
      op: is_true
      value: null
    - var: item.enable_purge_protection
      op: is_true
      value: null
- rule_id: azure.keyvault.secrets_store.access_rbac_least_privilege
  for_each: azure.keyvault.vaults.list_by_subscription
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.accessPolicies[].permissions.secrets
      op: not_contains
      value: all
    - var: item.properties.accessPolicies[].permissions.secrets
      op: not_contains
      value: '*'
- rule_id: azure.keyvault.secrets_store.kms_encryption_enabled
  for_each: azure.keyvault.vaults.list_by_subscription
  severity: MEDIUM
  conditions:
    var: item.enable_soft_delete
    op: is_true
    value: null
- rule_id: azure.keyvault.secrets_store.rotation_enabled_for_rotatable_secrets
  for_each: azure.keyvault.vaults.list_by_subscription
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.enableRbacAuthorization
      op: is_false
      value: null
    - var: item.sku.name
      op: equals
      value: standard
- rule_id: azure.keyvault.vault.logging_enabled
  for_each: azure.keyvault.vaults.list_by_subscription
  severity: MEDIUM
  conditions:
    var: item.properties.diagnostics.logAnalytics.enabled
    op: is_true
    value: null
- rule_id: azure.keyvault.vault.private_endpoints_enabled
  for_each: azure.keyvault.vaults.list_by_subscription
  severity: MEDIUM
  conditions:
    var: item.properties.privateEndpointConnections
    op: exists
    value: null
- rule_id: azure.keyvault.vaults.purge.protection.status
  for_each: azure.keyvault.vaults.list_by_subscription
  severity: MEDIUM
  conditions:
    var: item.enable_purge_protection
    op: is_true
    value: null
