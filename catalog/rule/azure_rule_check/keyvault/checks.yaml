version: '1.0'
provider: azure
service: keyvault
checks:
- rule_id: azure.keyvault.key.key_type_configured
  for_each: azure.keyvault.managedhsms.list_by_resource_group
  severity: MEDIUM
  conditions:
    var: item.type
    op: is_true
- rule_id: azure.keyvault.vault.access_policy_configured
  for_each: azure.keyvault.managedhsms.list_by_resource_group
  severity: MEDIUM
  conditions:
    var: item.type
    op: is_true
