version: '1.0'
provider: azure
service: search
checks:
- rule_id: azure.search.service.domains_access_control_enabled
  for_each: azure.search.services.list_by_resource_group
  severity: MEDIUM
  conditions:
    var: item.public_network_access
    op: equals
    value: Disabled
- rule_id: azure.search.service.domains_encryption_at_rest_enabled
  for_each: azure.search.services.list_by_resource_group
  severity: MEDIUM
  conditions:
    var: item.encryption_with_cmk
    op: exists
    value: null
- rule_id: azure.search.service.domains_logging_enabled
  for_each: azure.search.services.list_by_resource_group
  severity: MEDIUM
  conditions:
    var: item.diagnostics_logs
    op: exists
    value: null
- rule_id: azure.search.service.domains_node_to_node_encryption_enabled
  for_each: azure.search.services.list_by_resource_group
  severity: MEDIUM
  conditions:
    var: item.encryption_with_cmk
    op: exists
    value: null
