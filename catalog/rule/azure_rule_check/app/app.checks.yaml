version: '1.0'
provider: azure
service: app
checks:
- rule_id: azure.app.function.identity_without_admin_privileges
  for_each: azure.web.webapps.list_functions
  severity: MEDIUM
  conditions:
    all:
    - var: item.identity
      op: exists
      value: null
    - var: item.identity.principalId
      op: exists
      value: null
    - var: item.identity.type
      op: not_equals
      value: SystemAssigned, UserAssigned
    - var: item.identity.userAssignedIdentities
      op: not_exists
      value: null
- rule_id: azure.app.service.autoscale_enabled:az.azure_paas_app.paas_security_app_logging_enabled
  for_each: azure.web.webapps.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.siteConfig.detailedErrorLoggingEnabled
      op: is_true
      value: null
    - var: item.properties.siteConfig.httpLoggingEnabled
      op: is_true
      value: null
    - var: item.properties.siteConfig.requestTracingEnabled
      op: is_true
      value: null
- rule_id: azure.app.service.cors.check.allowed.origins
  for_each: azure.web.webapps.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.siteConfig.cors.allowedOrigins
      op: exists
      value: null
    - var: item.siteConfig.cors.allowedOrigins
      op: not_contains
      value: '*'
- rule_id: azure.app.service.cors.wildcard.restriction
  for_each: azure.web.webapps.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.siteConfig.cors.allowedOrigins
      op: exists
      value: null
    - var: item.siteConfig.cors.allowedOrigins
      op: not_contains
      value: '*'
- rule_id: azure.app.service.deployment.slot.ftps.state.check
  for_each: azure.web.webapps.list_slots
  severity: MEDIUM
  conditions:
    var: item.SiteConfig.FtpsState
    op: not_equals
    value: AllAllowed
- rule_id: azure.app.service.deployment.slot.http.version.check
  for_each: azure.web.webapps.list_slots
  severity: MEDIUM
  conditions:
    var: item.SiteConfig.Http20Enabled
    op: is_true
    value: null
- rule_id: azure.app.service.deployment.slot.https.only.enabled
  for_each: azure.web.webapps.list_slots
  severity: MEDIUM
  conditions:
    var: item.HTTPSOnly
    op: is_true
    value: null
- rule_id: azure.app.service.deployment.slot.java.version.check
  for_each: azure.web.webapps.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.siteConfig.javaVersion
      op: exists
      value: null
    - var: item.properties.siteConfig.javaVersion
      op: gte
      value: '17'
- rule_id: azure.app.service.deployment.slot.managed.identity.configured
  for_each: azure.web.webapps.list_slots
  severity: MEDIUM
  conditions:
    var: item.identity.type
    op: not_equals
    value: None
- rule_id: azure.app.service.deployment.slot.remote.debugging.disabled
  for_each: azure.web.webapps.list_slots
  severity: MEDIUM
  conditions:
    var: item.RemoteDebuggingEnabled
    op: is_false
    value: null
- rule_id: azure.app.service.deployment.slot.tls.encryption.check
  for_each: azure.web.webapps.list_slots
  severity: MEDIUM
  conditions:
    all:
    - var: item.HTTPSOnly
      op: is_true
      value: null
    - var: item.SiteConfig.MinTlsVersion
      op: gte
      value: '1.2'
- rule_id: azure.app.service.deployment.slot.vnet.route.all.enabled.check
  for_each: azure.web.webapps.list_slots
  severity: MEDIUM
  conditions:
    all:
    - var: item.VirtualNetworkSubnetId
      op: exists
      value: null
    - var: item.RouteAllTrafficThroughVnet
      op: is_true
      value: null
- rule_id: azure.app.service.deployment.slots.basic.auth.disabled
  for_each: azure.web.webapps.list_slots
  severity: MEDIUM
  conditions:
    var: item.BasicAuthEnabled
    op: is_false
    value: null
- rule_id: azure.app.service.environment.minimum.tls.version
  for_each: azure.web.appserviceenvironments.list
  severity: MEDIUM
  conditions:
    var: item.minimumTlsVersion
    op: gte
    value: '1.2'
- rule_id: azure.app.service.environment.minimum.version.check
  for_each: azure.web.appserviceplans.list
  severity: MEDIUM
  conditions:
    var: item.Properties.ClusterSettings[].Name
    op: contains
    value: InternalEncryption
- rule_id: azure.app.service.function.slot.https.only.check
  for_each: azure.web.webapps.list_slots
  severity: MEDIUM
  conditions:
    all:
    - var: item.httpsOnly
      op: is_true
      value: null
- rule_id: azure.app.service.http.logs.enabled
  for_each: azure.web.webapps.list
  severity: MEDIUM
  conditions:
    var: item.siteConfig.detailedErrorLoggingEnabled
    op: is_true
    value: null
- rule_id: azure.app.service.identity.check
  for_each: azure.web.webapps.list
  severity: MEDIUM
  conditions:
    var: item.identity.type
    op: exists
    value: null
- rule_id: azure.app.service.managed_updates_enabled:az.azure_paas_app.paas_security_app_logging_enabled
  for_each: azure.web.webapps.list
  severity: MEDIUM
  conditions:
    var: item.properties.siteConfig.managedServiceIdentityId
    op: exists
    value: null
- rule_id: azure.app.service.plan.private.endpoint.sku.compliance.check
  for_each: azure.web.appserviceplans.list
  severity: MEDIUM
  conditions:
    var: item.Sku.Tier
    op: in
    value:
    - PremiumV3
    - PremiumV2
    - Premium
    - Isolated
- rule_id: azure.app.service.private.endpoint.approved.check
  for_each: azure.web.webapps.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.siteConfig.privateEndpointConnections[].properties.privateLinkServiceConnectionState.status
      op: equals
      value: Approved
    - var: item.properties.siteConfig.privateEndpointConnections
      op: not_empty
      value: null
- rule_id: azure.app.service.private.endpoint.dns.zone.check
  for_each: azure.web.webapps.list
  severity: MEDIUM
  conditions:
    var: item.SiteConfig.PrivateEndpointConnections[].PrivateEndpoint.PrivateDnsZoneId
    op: exists
    value: null
- rule_id: azure.app.service.slot.check.minimum.tls.version
  for_each: azure.web.webapps.list_slots
  severity: MEDIUM
  conditions:
    var: item.SiteConfig.MinTlsVersion
    op: gte
    value: '1.2'
- rule_id: azure.app.service.slot.client.cert.check
  for_each: azure.web.webapps.list_slots
  severity: MEDIUM
  conditions:
    var: item.ClientCertEnabled
    op: is_true
    value: null
- rule_id: azure.app.service.slot.public.network.access.check
  for_each: azure.web.webapps.list_slots
  severity: MEDIUM
  conditions:
    var: item.properties.publicNetworkAccess
    op: equals
    value: Disabled
- rule_id: azure.app.service.virtual.network.integration.check
  for_each: azure.web.webapps.list
  severity: MEDIUM
  conditions:
    var: item.virtualNetworkSubnetId
    op: exists
    value: null
- rule_id: azure.app.service.vnet.integration.check
  for_each: azure.web.webapps.list
  severity: MEDIUM
  conditions:
    var: item.virtualNetworkSubnetId
    op: exists
    value: null
- rule_id: azure.app.service.vnet.route.all.enabled.check
  for_each: azure.web.webapps.list
  severity: MEDIUM
  conditions:
    var: item.VirtualNetworkSubnetId
    op: exists
    value: null
