version: '1.0'
provider: azure
service: automation
checks:
- rule_id: azure.automation.account.compliant_patching_enabled
  for_each: azure.automation.automationaccount.list
  severity: MEDIUM
  conditions:
    var: item.update_configuration
    op: exists
    value: null
- rule_id: azure.automation.patch.compliance
  for_each: azure.automation.automationaccount.list
  severity: MEDIUM
  conditions:
    var: item.update_configuration
    op: exists
    value: null
