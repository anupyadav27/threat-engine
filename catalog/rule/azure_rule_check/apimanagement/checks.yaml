version: '1.0'
provider: azure
service: apimanagement
checks:
- rule_id: azure.apimanagement.api.authorization_enabled
  for_each: azure.apimanagement.authorization.list_by_authorization_provider
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: azure.apimanagement.api.client_certificate_enabled
  for_each: azure.apimanagement.certificate.list_by_service
  severity: MEDIUM
  conditions:
    var: item.type
    op: is_true
