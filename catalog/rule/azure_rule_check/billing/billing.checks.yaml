version: '1.0'
provider: azure
service: billing
checks:
- rule_id: azure.billing.reservation.cost_admins_mfa_required
  for_each: azure.billing.billingaccounts.list
  severity: MEDIUM
  conditions:
    var: item.canceled_by
    op: exists
    value: null
- rule_id: azure.billing.reservation.cost_approval_workflow_required
  for_each: azure.billing.billingaccounts.list
  severity: MEDIUM
  conditions:
    var: item.transfer_status
    op: exists
    value: null
- rule_id: azure.billing.reservation.cost_purchase_permissions_restricted
  for_each: azure.billing.billingaccounts.list
  severity: MEDIUM
  conditions:
    var: item.detailed_transfer_status
    op: not_equals
    value: ACTIVE
- rule_id: azure.billing.savings_plan.cost_admins_mfa_required
  for_each: azure.billing.billingaccounts.list
  severity: MEDIUM
  conditions:
    var: item.canceled_by
    op: exists
    value: null
- rule_id: azure.billing.savings_plan.cost_approval_workflow_required
  for_each: azure.billing.billingaccounts.list
  severity: MEDIUM
  conditions:
    var: item.detailed_transfer_status
    op: exists
    value: null
- rule_id: azure.billing.savings_plan.cost_purchase_permissions_restricted
  for_each: azure.billing.billingaccounts.list
  severity: MEDIUM
  conditions:
    var: item.detailed_transfer_status
    op: equals
    value: ACTIVE
