version: '1.0'
provider: azure
service: cache
checks:
- rule_id: azure.cache.redis.microsoft.entra.authentication.enabled
  for_each: azure.redis.redis.list_by_resource_group
  severity: MEDIUM
  conditions:
    var: item.properties.disableLocalAuth
    op: is_false
    value: null
- rule_id: azure.cache.redis.public.network.access.disabled
  for_each: azure.redis.redis.list_by_resource_group
  severity: MEDIUM
  conditions:
    var: item.properties.publicNetworkAccess
    op: equals
    value: Disabled
- rule_id: azure.cache.redis.ssl.only.access
  for_each: azure.redis.redis.list_by_resource_group
  severity: MEDIUM
  conditions:
    var: item.properties.enableNonSslPort
    op: is_false
    value: null
