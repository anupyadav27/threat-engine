version: '1.0'
provider: azure
service: compute
checks:
- rule_id: azure.compute.disk.delete_option_configured
  for_each: azure.compute.diskaccesses.list
  severity: MEDIUM
  conditions:
    var: item.type
    op: is_true
- rule_id: azure.compute.virtual_machine.antimalware_enabled
  for_each: azure.compute.virtualmachines.list
  severity: MEDIUM
  conditions:
    var: item.type
    op: is_true
- rule_id: azure.compute.virtual_machine.boot_diagnostics_configured
  for_each: azure.compute.virtualmachines.list
  severity: MEDIUM
  conditions:
    var: item.type
    op: is_true
- rule_id: azure.compute.virtual_machine.disaster_recovery_enabled
  for_each: azure.compute.virtualmachines.list
  severity: MEDIUM
  conditions:
    var: item.type
    op: is_true
- rule_id: azure.compute.virtual_machine.image_baseline_enabled
  for_each: azure.compute.virtualmachineextensionimages.list_types
  severity: MEDIUM
  conditions:
    var: item.vm_scale_set_enabled
    op: is_true
- rule_id: azure.compute.virtual_machine.image_scan_enabled
  for_each: azure.compute.virtualmachineextensionimages.list_types
  severity: MEDIUM
  conditions:
    var: item.vm_scale_set_enabled
    op: is_true
- rule_id: azure.compute.virtual_machine.maintenance_behavior_configured
  for_each: azure.compute.virtualmachines.list
  severity: MEDIUM
  conditions:
    var: item.type
    op: is_true
- rule_id: azure.compute.virtual_machine.patch_assessment_configured
  for_each: azure.compute.virtualmachines.list
  severity: MEDIUM
  conditions:
    var: item.type
    op: is_true
- rule_id: azure.compute.virtual_machine.recovery_automation_configured
  for_each: azure.compute.virtualmachines.list
  severity: MEDIUM
  conditions:
    var: item.type
    op: is_true
- rule_id: azure.compute.virtual_machine.inventory_enabled
  for_each: azure.compute.virtualmachines.list
  severity: MEDIUM
  conditions:
    var: item.type
    op: is_true
- rule_id: azure.compute.virtual_machine.time_sync_configured
  for_each: azure.compute.virtualmachines.list
  severity: MEDIUM
  conditions:
    var: item.type
    op: is_true
