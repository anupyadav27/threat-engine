version: '1.0'
provider: azure
service: storage
checks:
- rule_id: azure.storage.bucket.lifecycle_enabled
  for_each: azure.storage.storagetaskassignmentinstancesreport.list
  severity: MEDIUM
  conditions:
    var: item.type
    op: is_true
- rule_id: azure.storage.immutable.blob_enabled
  for_each: azure.storage.blobcontainers.list
  severity: MEDIUM
  conditions:
    var: item.type
    op: is_true
