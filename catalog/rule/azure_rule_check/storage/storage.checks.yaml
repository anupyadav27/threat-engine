version: '1.0'
provider: azure
service: storage
checks:
- rule_id: azure.storage.account.access.key.rotation.check
  for_each: azure.storage.storageaccounts.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.keyCreationTime.key1
      op: exists
      value: null
    - var: item.properties.keyCreationTime.key2
      op: exists
      value: null
    - var: item.properties.keyCreationTime.key1
      op: lt
      value: '{{now - 90 days}}'
    - var: item.properties.keyCreationTime.key2
      op: lt
      value: '{{now - 90 days}}'
- rule_id: azure.storage.account.access.keys.rotation.check
  for_each: azure.storage.storageaccounts.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.keyCreationTime.key1
      op: exists
      value: null
    - var: item.properties.keyCreationTime.key2
      op: exists
      value: null
    - var: item.properties.keyCreationTime.key1
      op: lt
      value: '{{now - 90 days}}'
    - var: item.properties.keyCreationTime.key2
      op: lt
      value: '{{now - 90 days}}'
- rule_id: azure.storage.account.allow.blob.anonymous.access.disabled
  for_each: azure.storage.storageaccounts.list
  severity: MEDIUM
  conditions:
    var: item.allow_blob_public_access
    op: is_false
    value: null
- rule_id: azure.storage.account.blob.anonymous.access.disabled
  for_each: azure.storage.storageaccounts.list
  severity: MEDIUM
  conditions:
    var: item.allow_blob_public_access
    op: is_false
    value: null
- rule_id: azure.storage.account.blob.logging.read.write.delete.enabled
  for_each: azure.storage.storageaccounts.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.blobServiceProperties.properties.containerDeleteRetentionPolicy.enabled
      op: is_true
      value: null
    - var: item.properties.blobServiceProperties.properties.deleteRetentionPolicy.enabled
      op: is_true
      value: null
- rule_id: azure.storage.account.blob.soft.delete.enabled
  for_each: azure.storage.storageaccounts.list
  severity: MEDIUM
  conditions:
    var: item.properties.deleteRetentionPolicy.enabled
    op: is_true
    value: null
- rule_id: azure.storage.account.blob.versioning.check
  for_each: azure.storage.storageaccounts.list
  severity: MEDIUM
  conditions:
    var: item.properties.isVersioningEnabled
    op: is_true
    value: null
- rule_id: azure.storage.account.blob.versioning.enabled
  for_each: azure.storage.storageaccounts.list
  severity: MEDIUM
  conditions:
    var: item.properties.isVersioningEnabled
    op: is_true
    value: null
- rule_id: azure.storage.account.cannot.delete.lock.applied
  for_each: azure.storage.storageaccounts.list
  severity: MEDIUM
  conditions:
    var: item.properties.containerDeleteRetentionPolicy.enabled
    op: is_true
    value: null
- rule_id: azure.storage.account.cannot.delete.lock.check
  for_each: azure.storage.storageaccounts.list
  severity: MEDIUM
  conditions:
    var: item.properties.lock
    op: exists
    value: null
- rule_id: azure.storage.account.cross.tenant.replication.disabled
  for_each: azure.storage.storageaccounts.list
  severity: MEDIUM
  conditions:
    var: item.allow_cross_tenant_replication
    op: is_false
    value: null
- rule_id: azure.storage.account.data_protection_bucket_access_logging_enabled
  for_each: azure.storage.storageaccounts.list
  severity: MEDIUM
  conditions:
    var: item.properties.isAzureFilesAadIntegrationEnabled
    op: is_true
    value: null
- rule_id: azure.storage.account.data_protection_bucket_block_public_access_enabled
  for_each: azure.storage.storageaccounts.list
  severity: MEDIUM
  conditions:
    var: item.allow_blob_public_access
    op: is_false
    value: null
- rule_id: azure.storage.account.data_protection_bucket_cmk_cmek_configured
  for_each: azure.storage.storageaccounts.list
  severity: MEDIUM
  conditions:
    var: item.encryption.key_source
    op: equals
    value: Microsoft.Keyvault
- rule_id: azure.storage.account.data_protection_bucket_encryption_at_rest_enabled
  for_each: azure.storage.storageaccounts.list
  severity: MEDIUM
  conditions:
