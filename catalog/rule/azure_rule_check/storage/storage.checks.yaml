  for_each: azure.storage.storageaccounts.list
  severity: MEDIUM
  conditions:
    var: item.properties.dataProtection.blobRestoreStatus
    op: exists
    value: null
- rule_id: azure.storage.account.data_protection_bucket_policy_denies_public_and_insecure
  for_each: azure.storage.storageaccounts.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.allow_blob_public_access
      op: is_false
      value: null
    - var: item.minimum_tls_version
      op: equals
      value: TLS1_2
- rule_id: azure.storage.account.data_protection_bucket_policy_deny_insecure_transport
  for_each: azure.storage.storageaccounts.list
  severity: MEDIUM
  conditions:
