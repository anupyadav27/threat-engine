    value: null
- rule_id: azure.storage.account.data_protection_bucket_notification_cross_destinations_restricted
  for_each: azure.storage.storageaccounts.list
  severity: MEDIUM
  conditions:
    var: item.properties.restrictCrossDestinationDataMovement
