- rule_id: azure.storage.account.data_protection_bucket_policy_no_wildcards_on_actions_or_principals
  for_each: azure.storage.storageaccounts.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.policies[].policy.rules[].actions[].action
