    - TLS1_3
- rule_id: azure.storage.account.data_protection_bucket_versioning_enabled
  for_each: azure.storage.storageaccounts.list
  severity: MEDIUM
  conditions:
    var: item.properties.isVersioningEnabled
    op: is_true
    value: null
- rule_id: azure.storage.account.default.network.access.rule.set.to.deny
  for_each: azure.storage.storageaccounts.list
  severity: MEDIUM
  conditions:
    var: item.network_rule_set.default_action
