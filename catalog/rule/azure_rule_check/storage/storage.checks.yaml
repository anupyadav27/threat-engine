  conditions:
    var: item.allow_blob_public_access
    op: is_false
    value: null
- rule_id: azure.storage.account.data_protection_bucket_policy_no_public_principals
  for_each: azure.storage.storageaccounts.list
  severity: MEDIUM
  conditions:
    var: item.allow_blob_public_access
    op: is_false
