version: '1.0'
provider: azure
service: mariadb
checks:

# ============================================================
# MariaDB Server
# for_each: azure.rdbms_mariadb.servers.list_by_resource_group
# Emitted fields: ssl_enforcement, minimal_tls_version,
#   public_network_access, storage_profile,
#   private_endpoint_connections, version
# ============================================================

- rule_id: azure.mariadb.server.ssl_enforcement_enabled
  for_each: azure.rdbms_mariadb.servers.list_by_resource_group
  severity: HIGH
  conditions:
    var: item.ssl_enforcement
    op: equals
    value: Enabled

- rule_id: azure.mariadb.server.minimal_tls_version
  for_each: azure.rdbms_mariadb.servers.list_by_resource_group
  severity: HIGH
  conditions:
    var: item.minimal_tls_version
    op: equals
    value: TLS1_2

- rule_id: azure.mariadb.server.public_network_access_disabled
  for_each: azure.rdbms_mariadb.servers.list_by_resource_group
  severity: HIGH
  conditions:
    var: item.public_network_access
    op: equals
    value: Disabled

- rule_id: azure.mariadb.server.geo_redundant_backup
  for_each: azure.rdbms_mariadb.servers.list_by_resource_group
  severity: MEDIUM
  conditions:
    var: item.storage_profile.geo_redundant_backup
    op: equals
    value: Enabled

- rule_id: azure.mariadb.server.backup_retention_days
  for_each: azure.rdbms_mariadb.servers.list_by_resource_group
  severity: MEDIUM
  conditions:
    var: item.storage_profile.backup_retention_days
    op: gte
    value: 7
