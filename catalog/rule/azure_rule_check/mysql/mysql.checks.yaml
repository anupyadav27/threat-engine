version: '1.0'
provider: azure
service: mysql
checks:

# ============================================================
# Standard Server (Single Server)
# for_each: azure.rdbms_mysql.servers.list_by_resource_group
# Emitted fields: ssl_enforcement, minimal_tls_version,
#   public_network_access, infrastructure_encryption,
#   byok_enforcement, storage_profile, private_endpoint_connections
# ============================================================

- rule_id: azure.mysql.standard.database.ssl.enforcement.check
  for_each: azure.rdbms_mysql.servers.list_by_resource_group
  severity: HIGH
  conditions:
    var: item.ssl_enforcement
    op: equals
    value: Enabled

- rule_id: azure.mysql.server.minimal_tls_version
  for_each: azure.rdbms_mysql.servers.list_by_resource_group
  severity: HIGH
  conditions:
    var: item.minimal_tls_version
    op: in
    value:
    - TLS1_2
    - TLS1_3

- rule_id: azure.mysql.server.public_network_access_disabled
  for_each: azure.rdbms_mysql.servers.list_by_resource_group
  severity: HIGH
  conditions:
    var: item.public_network_access
    op: equals
    value: Disabled

- rule_id: azure.mysql.server.infrastructure_encryption_enabled
  for_each: azure.rdbms_mysql.servers.list_by_resource_group
  severity: HIGH
  conditions:
    var: item.infrastructure_encryption
    op: equals
    value: Enabled

- rule_id: azure.mysql.server.geo_redundant_backup
  for_each: azure.rdbms_mysql.servers.list_by_resource_group
  severity: MEDIUM
  conditions:
    var: item.storage_profile.geo_redundant_backup
    op: equals
    value: Enabled

- rule_id: azure.mysql.server.backup_retention_days
  for_each: azure.rdbms_mysql.servers.list_by_resource_group
  severity: MEDIUM
  conditions:
    var: item.storage_profile.backup_retention_days
    op: gte
    value: 7

- rule_id: azure.mysql.server.audit.log.enabled
  for_each: azure.rdbms_mysql.servers.list_by_resource_group
  severity: MEDIUM
  conditions:
    var: item.configuration.audit_log_enabled
    op: equals
    value: 'ON'

- rule_id: azure.mysql.server.audit.log.connection.check
  for_each: azure.rdbms_mysql.servers.list_by_resource_group
  severity: MEDIUM
  conditions:
    var: item.configuration.audit_log_connection_type
    op: contains
    value: CONNECT

# ============================================================
# Flexible Server
# for_each: azure.rdbms_mysql_flexibleservers.servers.list
# Emitted top-level fields: network, backup, high_availability,
#   data_encryption, storage, version, state
# Configuration parameters accessible via item.configuration.*
# ============================================================

- rule_id: azure.mysql.flexibleserver.ssl_connection_enabled
  for_each: azure.rdbms_mysql_flexibleservers.servers.list
  severity: HIGH
  conditions:
    var: item.configuration.require_secure_transport
    op: equals
    value: 'ON'

- rule_id: azure.mysql.flexibleserver.minimum_tls_version_12
  for_each: azure.rdbms_mysql_flexibleservers.servers.list
  severity: HIGH
  conditions:
    var: item.configuration.tls_version
    op: in
    value:
    - TLSv1.2
    - TLSv1.3

- rule_id: azure.mysql.flexibleserver.audit_log_enabled
  for_each: azure.rdbms_mysql_flexibleservers.servers.list
  severity: MEDIUM
  conditions:
    var: item.configuration.audit_log_enabled
    op: equals
    value: 'ON'

- rule_id: azure.mysql.flexibleserver.audit_log_connection_enabled
  for_each: azure.rdbms_mysql_flexibleservers.servers.list
  severity: MEDIUM
  conditions:
    var: item.configuration.audit_log_connection_type
    op: contains
    value: CONNECT

- rule_id: azure.mysql.flexibleserver.public_network_access_disabled
  for_each: azure.rdbms_mysql_flexibleservers.servers.list
  severity: HIGH
  conditions:
    var: item.network.public_network_access
    op: equals
    value: Disabled

- rule_id: azure.mysql.flexibleserver.geo_redundant_backup
  for_each: azure.rdbms_mysql_flexibleservers.servers.list
  severity: MEDIUM
  conditions:
    var: item.backup.geo_redundant_backup
    op: equals
    value: Enabled

- rule_id: azure.mysql.flexibleserver.backup_retention_days
  for_each: azure.rdbms_mysql_flexibleservers.servers.list
  severity: MEDIUM
  conditions:
    var: item.backup.backup_retention_days
    op: gte
    value: 7

- rule_id: azure.mysql.flexibleserver.high_availability_enabled
  for_each: azure.rdbms_mysql_flexibleservers.servers.list
  severity: MEDIUM
  conditions:
    var: item.high_availability.mode
    op: in
    value:
    - ZoneRedundant
    - SameZone

- rule_id: azure.mysql.flexibleserver.data_encryption_enabled
  for_each: azure.rdbms_mysql_flexibleservers.servers.list
  severity: HIGH
  conditions:
    var: item.data_encryption.type
    op: equals
    value: AzureKeyVault

- rule_id: azure.mysql.flexibleserver.storage_auto_grow_enabled
  for_each: azure.rdbms_mysql_flexibleservers.servers.list
  severity: LOW
  conditions:
    var: item.storage.auto_grow
    op: equals
    value: Enabled
