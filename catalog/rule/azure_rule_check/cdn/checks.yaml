version: '1.0'
provider: azure
service: cdn
checks:
- rule_id: azure.cdn.endpoint.origin_traffic_encrypted
  for_each: azure.cdn.origingroups.list_by_endpoint
  severity: MEDIUM
  conditions:
    all:
    - var: item.enabled_state
      op: not_empty
      value: null
    - var: item.kms_key_id
      op: exists
      value: null
