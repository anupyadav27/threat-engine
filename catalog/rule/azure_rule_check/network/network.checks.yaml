- rule_id: azure.network.route_table.no_0_0_0_0_from_private_subnets
  for_each: azure.network.routetables.list_all
  severity: MEDIUM
  conditions:
    all:
    - var: item.subnets[].properties.addressPrefix
      op: not_contains
      value: 0.0.0.0/0
    - var: item.properties.routes[].properties.addressPrefix
      op: not_equals
      value: 0.0.0.0/0
- rule_id: azure.network.route_table.vpc_endpoints_used_for_saas_where_supported
  for_each: azure.network.routetables.list_all
  severity: MEDIUM
  conditions:
    all:
    - var: item.subnets[].properties.addressPrefix
      op: exists
      value: null
    - var: item.properties.routes[].properties.nextHopType
      op: not_contains
      value: Internet
- rule_id: azure.network.security_group.data_warehouse_sg_egress_egress_restricted
  for_each: azure.network.networksecuritygroups.list_all
  severity: MEDIUM
  conditions:
    all:
    - var: item.security_rules[].properties.destinationAddressPrefix
      op: not_contains
      value: '*'
    - var: item.security_rules[].properties.destinationAddressPrefix
      op: not_contains
      value: 0.0.0.0/0
    - var: item.security_rules[].properties.destinationAddressPrefix
      op: not_contains
      value: ::/0
    - var: item.security_rules[].properties.destinationAddressPrefixes
      op: not_contains
      value: '*'
    - var: item.security_rules[].properties.destinationAddressPrefixes
      op: not_contains
      value: 0.0.0.0/0
    - var: item.security_rules[].properties.destinationAddressPrefixes
      op: not_contains
      value: ::/0
- rule_id: azure.network.security_group.data_warehouse_sg_egress_restricted
  for_each: azure.network.networksecuritygroups.list_all
  severity: MEDIUM
  conditions:
    all:
    - var: item.security_rules[].properties.destinationAddressPrefix
      op: not_contains
      value: '*'
    - var: item.security_rules[].properties.destinationAddressPrefix
      op: not_contains
      value: 0.0.0.0/0
    - var: item.security_rules[].properties.destinationAddressPrefix
      op: not_contains
      value: ::/0
    - var: item.security_rules[].properties.destinationAddressPrefixes
      op: not_contains
      value: '*'
    - var: item.security_rules[].properties.destinationAddressPrefixes
      op: not_contains
      value: 0.0.0.0/0
    - var: item.security_rules[].properties.destinationAddressPrefixes
      op: not_contains
      value: ::/0
- rule_id: azure.network.security_group.data_warehouse_sg_ingress_no_0_0_0_0
  for_each: azure.network.networksecuritygroups.list_all
  severity: MEDIUM
  conditions:
    all:
    - var: item.security_rules[].properties.sourceAddressPrefix
      op: not_contains
      value: 0.0.0.0/0
    - var: item.security_rules[].properties.sourceAddressPrefix
      op: not_contains
      value: ::/0
    - var: item.security_rules[].properties.sourceAddressPrefixes[]
      op: not_contains
      value: 0.0.0.0/0
    - var: item.security_rules[].properties.sourceAddressPrefixes[]
      op: not_contains
      value: ::/0
- rule_id: azure.network.security_group.data_warehouse_sg_ingress_only_required_ports
  for_each: azure.network.networksecuritygroups.list_all
  severity: MEDIUM
  conditions:
    all:
