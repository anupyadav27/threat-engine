    value: null
- rule_id: azure.network.virtual_network.route_tables_no_unintended_internet_paths
  for_each: azure.network.routetables.list_all
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.routes[].properties.nextHopType
      op: not_equals
      value: Internet
    - var: item.properties.routes[].properties.addressPrefix
      op: not_contains
      value: 0.0.0.0/0
- rule_id: azure.network.vnet.flow.logs.to.log.analytics.enabled
  for_each: azure.network.azurefirewalls.list_all
  severity: MEDIUM
  conditions:
    var: item.properties.flowLogs[].enabled
    op: is_true
    value: null
- rule_id: azure.network.vnet.subnet.nsg.association.check
  for_each: azure.network.virtualnetworks.list_all
  severity: MEDIUM
  conditions:
    var: item.subnets[].properties.networkSecurityGroup.id
    op: exists
    value: null
- rule_id: azure.network.vpn_connection.vpn_ike_phase_encryption_strong
  for_each: azure.network.vpnconnections.list_by_vpn_gateway
  severity: MEDIUM
  conditions:
    var: item.properties.ipsecPolicies[].ikeEncryption
    op: in
    value:
    - AES256
    - AES192
    - AES128
    - GCMAES256
    - GCMAES128
- rule_id: azure.network.vpn_connection.vpn_pre_shared_keys_rotation_policy_defined
  for_each: azure.network.vpnconnections.list_by_vpn_gateway
  severity: MEDIUM
  conditions:
    var: item.properties.ipsecPolicies[].ikeEncryption
    op: exists
    value: null
- rule_id: azure.network.vpn_connection.vpn_tunnel_health_monitoring_enabled
  for_each: azure.network.vpnconnections.list_by_vpn_gateway
  severity: MEDIUM
  conditions:
    var: item.properties.connectionStatus
    op: exists
    value: null
- rule_id: azure.network.watcher.region.compliance.check
  for_each: azure.network.applicationgateways.list_all
  severity: MEDIUM
  conditions:
    var: item.location
    op: exists
    value: null
