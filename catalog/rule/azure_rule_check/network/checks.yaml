version: '1.0'
provider: azure
service: network
checks:
- rule_id: azure.network.load_balancer.https_redirect_configured
  for_each: azure.network.loadbalancers.list
  severity: MEDIUM
  conditions:
    var: item.type
    op: is_true
- rule_id: azure.network.network_security_group.rule_access_restricted
  for_each: azure.network.networksecuritygroups.list
  severity: MEDIUM
  conditions:
    var: item.type
    op: is_true
- rule_id: azure.network.virtual_network_peering.allow_forwarded_traffic_restricted
  for_each: azure.network.virtualnetworkpeerings.list
  severity: MEDIUM
  conditions:
    var: item.type
    op: is_true
