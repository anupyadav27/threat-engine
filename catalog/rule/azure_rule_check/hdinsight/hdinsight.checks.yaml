version: '1.0'
provider: azure
service: hdinsight
checks:
- rule_id: azure.hdinsight.cluster.data_analytics_admin_access_least_privilege
  for_each: azure.hdinsight.clusters.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.computeProfile.roles[].osProfile.linuxOperatingSystemProfile.sshProfile.publicKeys[].certificateData
      op: not_contains
      value: admin
- rule_id: azure.hdinsight.cluster.data_analytics_audit_logging_enabled
  for_each: azure.hdinsight.clusters.list
  severity: MEDIUM
  conditions:
    var: item.properties.monitoringProfile.clusterMonitoringEnabled
    op: is_true
    value: null
- rule_id: azure.hdinsight.cluster.data_analytics_encryption_at_rest_cmek
  for_each: azure.hdinsight.clusters.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.clusterDefinition.kind
      op: equals
      value: spark
    - var: item.properties.storageProfile.storageaccounts[].isDefault
      op: is_true
      value: null
    - var: item.properties.storageProfile.storageaccounts[].resourceId
      op: exists
      value: null
    - var: item.properties.storageProfile.storageaccounts[].keyName
      op: exists
      value: null
- rule_id: azure.hdinsight.cluster.data_analytics_private_networking_enforced
  for_each: azure.hdinsight.clusters.list
  severity: MEDIUM
  conditions:
    var: item.properties.networkProperties.resourceProviderConnection
    op: equals
    value: Inbound
- rule_id: azure.hdinsight.cluster.data_analytics_tls_min_1_2_enforced
  for_each: azure.hdinsight.clusters.list
  severity: MEDIUM
  conditions:
    var: item.properties.minSupportedTlsVersion
    op: in
    value:
    - '1.2'
    - '1.3'
- rule_id: azure.hdinsight.cluster.master_nodes_no_public_ip
  for_each: azure.hdinsight.clusters.list
  severity: MEDIUM
  conditions:
    var: item.properties.network_properties.resource_provider_connection
    op: not_equals
    value: Outbound
