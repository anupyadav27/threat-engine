version: '1.0'
provider: azure
service: kubernetes
checks:
- rule_id: azure.kubernetes.addon.containers_from_trusted_channel
  for_each: azure.kubernetes.list_clusters
  severity: MEDIUM
  conditions:
    all:
    - var: item.addonProfiles.azurePolicy.enabled
      op: is_true
      value: null
    - var: item.addonProfiles.openServiceMesh.enabled
      op: is_true
      value: null
    - var: item.addonProfiles.httpApplicationRouting.enabled
      op: is_false
      value: null
- rule_id: azure.kubernetes.addon.containers_no_privileged_permissions
  for_each: azure.kubernetes.list_clusters
  severity: MEDIUM
  conditions:
    all:
    - var: item.addonProfiles.azurePolicy.enabled
      op: is_true
      value: null
    - var: item.agentPoolProfiles[].osType
      op: not_contains
      value: Windows
- rule_id: azure.kubernetes.addon.containers_version_pinned_and_supported
  for_each: azure.kubernetes.managed_clusters.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.agentPoolProfiles[].orchestratorVersion
      op: exists
      value: null
    - var: item.properties.agentPoolProfiles[].orchestratorVersion
      op: not_in
      value:
      - latest
      - default
      - null
- rule_id: azure.kubernetes.admission_controller.containers_admission_host_namespace_usage_denied
  for_each: azure.kubernetes.list_clusters
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.securityProfile.workloadIdentity.enabled
      op: is_true
      value: null
    - var: item.properties.securityProfile.workloadIdentity.issuer
      op: exists
      value: null
- rule_id: azure.kubernetes.admission_controller.containers_admission_image_registry_allowlist_enforced
  for_each: azure.kubernetes.list_clusters
  severity: MEDIUM
  conditions:
    var: item.properties.securityProfile.workloadIdentity.enabled
    op: is_true
    value: null
- rule_id: azure.kubernetes.admission_controller.containers_admission_image_signature_verification_enabled
  for_each: azure.kubernetes.list_clusters
  severity: MEDIUM
  conditions:
    var: item.properties.securityProfile.workloadIdentity.enabled
    op: is_true
    value: null
- rule_id: azure.kubernetes.admission_controller.containers_admission_pod_security_admission_restricted_default
  for_each: azure.kubernetes.managed_clusters.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.podSecurityProfile.enabled
      op: is_true
      value: null
    - var: item.properties.podSecurityProfile.defaultMode
      op: equals
      value: Restricted
- rule_id: azure.kubernetes.admission_controller.containers_admission_privilege_escalation_denied
  for_each: azure.kubernetes.list_clusters
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.securityProfile.workloadIdentity.enabled
      op: is_true
      value: null
    - var: item.properties.securityProfile.workloadIdentity.issuer
      op: exists
      value: null
- rule_id: azure.kubernetes.agent_pool.containers_node_pool_disk_encryption_enabled
  for_each: azure.kubernetes.list_agent_pools
  severity: MEDIUM
  conditions:
    var: item.EncryptionAtHost
    op: is_true
    value: null
- rule_id: azure.kubernetes.agent_pool.containers_node_pool_nodes_no_public_ip
  for_each: azure.kubernetes.list_agent_pools
  severity: MEDIUM
  conditions:
    var: item.Properties.AgentPoolProfiles[].EnableNodePublicIP
    op: is_false
    value: null
- rule_id: azure.kubernetes.agent_pool.containers_node_pool_shielded_secure_boot_enabled
  for_each: azure.kubernetes.list_agent_pools
  severity: MEDIUM
  conditions:
    var: item.SecurityProfile.SecurityType
    op: equals
    value: TrustedLaunch
- rule_id: azure.kubernetes.agent_pool.containers_node_pool_workload_identity_enabled
  for_each: azure.kubernetes.list_agent_pools
  severity: MEDIUM
  conditions:
    var: item.WorkloadIdentityEnabled
    op: is_true
    value: null
- rule_id: azure.kubernetes.api_server.containers_apiserver_anonymous_auth_disabled
  for_each: azure.kubernetes.managed_clusters.list
  severity: MEDIUM
  conditions:
    var: item.properties.apiServerAccessProfile.disableAnonymousAuthentication
    op: is_true
    value: null
- rule_id: azure.kubernetes.api_server.containers_apiserver_audit_logging_enabled
  for_each: azure.kubernetes.managed_clusters.list
  severity: MEDIUM
  conditions:
    var: item.properties.azureADProfile.managed
    op: is_true
    value: null
- rule_id: azure.kubernetes.api_server.containers_apiserver_authorization_mode_rbac
  for_each: azure.kubernetes.list_clusters
  severity: MEDIUM
  conditions:
    var: item.properties.apiServerAccessProfile.authorizationMode
    op: equals
    value: RBAC
- rule_id: azure.kubernetes.api_server.containers_apiserver_etcd_connection_encrypted
  for_each: azure.kubernetes.list_managed_clusters
  severity: MEDIUM
  conditions:
    var: item.properties.apiServerAccessProfile.enableVnetIntegration
    op: is_true
    value: null
- rule_id: azure.kubernetes.api_server.containers_apiserver_insecure_port_disabled
  for_each: azure.kubernetes.managed_clusters.list
  severity: MEDIUM
  conditions:
    var: item.properties.apiServerAccessProfile.enablePrivateCluster
    op: is_true
    value: null
- rule_id: azure.kubernetes.api_server.containers_apiserver_tls_min_1_2_enforced
  for_each: azure.kubernetes.managed_clusters.list
  severity: MEDIUM
  conditions:
    var: item.properties.apiServerAccessProfile.minimumTlsVersion
    op: in
    value:
    - '1.2'
    - '1.3'
- rule_id: azure.kubernetes.api_server.k8s_apiserver_admission_psa_enforce_mode
  for_each: azure.kubernetes.list_clusters
  severity: MEDIUM
  conditions:
    var: item.Properties.APIServerAccessProfile.AdmissionProfile.PodSecurity.Enabled
    op: is_true
    value: null
- rule_id: azure.kubernetes.api_server.k8s_apiserver_anonymous_auth_disabled
  for_each: azure.kubernetes.managed_clusters.list
  severity: MEDIUM
  conditions:
    var: item.properties.apiServerAccessProfile.disableRunCommand
    op: is_true
    value: null
- rule_id: azure.kubernetes.api_server.k8s_apiserver_audit_logging_enabled
  for_each: azure.kubernetes.managed_clusters.list
  severity: MEDIUM
  conditions:
    var: item.properties.azureADProfile
    op: exists
    value: null
- rule_id: azure.kubernetes.api_server.k8s_apiserver_tls_min_version_1_2
  for_each: azure.kubernetes.managed_clusters.list
  severity: MEDIUM
  conditions:
    var: item.properties.apiServerAccessProfile.minimumTlsVersion
    op: in
    value:
    - '1.2'
    - TLS1_2
    - TLS1_3
- rule_id: azure.kubernetes.controller_manager.containers_root_ca_file_configured
  for_each: azure.kubernetes.managed_clusters.list
  severity: MEDIUM
  conditions:
    var: item.properties.containersRootCAFile
    op: exists
    value: null
- rule_id: azure.kubernetes.controller_manager.containers_secure_port_tls_enabled
  for_each: azure.kubernetes.managed_clusters.list
  severity: MEDIUM
  conditions:
    var: item.properties.containersSecurePortTlsEnabled
    op: is_true
    value: null
- rule_id: azure.kubernetes.controller_manager.containers_use_service_account_credentials_enabled
  for_each: azure.kubernetes.list_clusters
  severity: MEDIUM
  conditions:
    var: item.properties.securityProfile.workloadIdentity.enabled
    op: is_true
    value: null
- rule_id: azure.kubernetes.controller_manager.k8s_controllermanager_secure_port_enabled
  for_each: azure.kubernetes.list_clusters
  severity: MEDIUM
  conditions:
    var: item.properties.securePortEnabled
    op: is_true
    value: null
- rule_id: azure.kubernetes.controller_manager.k8s_controllermanager_service_account_token_signing_enabled
  for_each: azure.kubernetes.list_clusters
  severity: MEDIUM
  conditions:
    var: item.properties.securityProfile.serviceAccountTokenIssuerProfile.enabled
    op: is_true
    value: null
- rule_id: azure.kubernetes.deployment.containers_workload_drop_net_raw_and_reduce_caps
  for_each: azure.kubernetes.list_deployments
  severity: MEDIUM
  conditions:
    all:
    - var: item.spec.template.spec.containers[].securityContext.capabilities.drop[]
      op: contains
      value: NET_RAW
    - var: item.spec.template.spec.containers[].securityContext.capabilities.drop
      op: length_gte
      value: 2
- rule_id: azure.kubernetes.deployment.containers_workload_env_no_plaintext_secrets
  for_each: azure.kubernetes.list_deployments
  severity: MEDIUM
  conditions:
    all:
    - var: item.spec.template.spec.containers[].env[].value
      op: not_contains
      value: password
    - var: item.spec.template.spec.containers[].env[].value
      op: not_contains
      value: secret
    - var: item.spec.template.spec.containers[].env[].value
      op: not_contains
      value: key
- rule_id: azure.kubernetes.deployment.containers_workload_host_network_pid_ipc_disabled
  for_each: azure.kubernetes.deployments.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.spec.template.spec.hostNetwork
      op: is_false
      value: null
    - var: item.spec.template.spec.hostPID
      op: is_false
      value: null
    - var: item.spec.template.spec.hostIPC
      op: is_false
      value: null
- rule_id: azure.kubernetes.deployment.containers_workload_image_tag_not_latest
  for_each: azure.kubernetes.list_containers_workloads
  severity: MEDIUM
  conditions:
    all:
    - var: item.image_tag
      op: exists
      value: null
    - var: item.image_tag
      op: not_equals
      value: latest
- rule_id: azure.kubernetes.deployment.containers_workload_no_hostpath_mounts
  for_each: azure.kubernetes.list_deployments
  severity: MEDIUM
  conditions:
    all:
    - var: item.spec.template.spec.containers[].volumeMounts[].mountPath
      op: not_contains
      value: /host
    - var: item.spec.template.spec.volumes[].hostPath.path
      op: not_exists
      value: null
- rule_id: azure.kubernetes.deployment.containers_workload_no_privileged_containers
  for_each: azure.kubernetes.list_containers
  severity: MEDIUM
  conditions:
    all:
    - var: item.privileged
      op: is_false
      value: null
- rule_id: azure.kubernetes.deployment.containers_workload_read_only_root_filesystem
  for_each: azure.kubernetes.list_deployments
  severity: MEDIUM
  conditions:
    all:
    - var: item.spec.template.spec.containers[].securityContext.readOnlyRootFilesystem
      op: is_true
      value: null
- rule_id: azure.kubernetes.deployment.containers_workload_run_as_non_root
  for_each: azure.kubernetes.list_deployments
  severity: MEDIUM
  conditions:
    all:
    - var: item.spec.template.spec.containers[].securityContext.runAsNonRoot
      op: is_true
      value: null
- rule_id: azure.kubernetes.deployment.containers_workload_seccomp_profile_runtime_default
  for_each: azure.kubernetes.list_deployments
  severity: MEDIUM
  conditions:
    all:
    - var: item.spec.template.spec.securityContext.seccompProfile.type
      op: exists
      value: null
    - var: item.spec.template.spec.securityContext.seccompProfile.type
      op: equals
      value: RuntimeDefault
- rule_id: azure.kubernetes.etcd.containers_auth_enabled
  for_each: azure.kubernetes.list_clusters
  severity: MEDIUM
  conditions:
    var: item.properties.securityProfile.azureKeyVaultKms.enabled
    op: is_true
    value: null
- rule_id: azure.kubernetes.etcd.containers_client_tls_enabled
  for_each: azure.kubernetes.managed_clusters.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.securityProfile
      op: exists
      value: null
    - var: item.properties.securityProfile.workloadIdentity
      op: exists
      value: null
    - var: item.properties.securityProfile.workloadIdentity.enabled
      op: is_true
      value: null
- rule_id: azure.kubernetes.etcd.containers_encryption_at_rest_enabled
  for_each: azure.kubernetes.list_clusters
  severity: MEDIUM
  conditions:
    var: item.EncryptionAtHost
    op: is_true
    value: null
- rule_id: azure.kubernetes.etcd.containers_peer_tls_enabled
  for_each: azure.kubernetes.managed_clusters.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.securityProfile
      op: exists
      value: null
    - var: item.properties.securityProfile.workloadIdentity
      op: exists
      value: null
    - var: item.properties.securityProfile.workloadIdentity.enabled
      op: is_true
      value: null
- rule_id: azure.kubernetes.etcd.k8s_client_cert_auth_enabled
  for_each: azure.kubernetes.list_clusters
  severity: MEDIUM
  conditions:
    var: item.properties.securityProfile.etcdEncryptionSetId
    op: exists
    value: null
- rule_id: azure.kubernetes.etcd.k8s_encryption_at_rest_enabled
  for_each: azure.kubernetes.list_clusters
  severity: MEDIUM
  conditions:
    var: item.properties.encryption.encryptionAtHost
    op: is_true
    value: null
- rule_id: azure.kubernetes.kubelet.containers_anonymous_auth_disabled
  for_each: azure.kubernetes.managed_clusters.list
  severity: MEDIUM
  conditions:
    var: item.properties.agentPoolProfiles[].kubeletConfig.enableAnonymousAuthentication
    op: is_false
    value: null
- rule_id: azure.kubernetes.kubelet.containers_authz_webhook_or_rbac_enabled
  for_each: azure.kubernetes.list_clusters
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.securityProfile.workloadIdentity.enabled
      op: is_true
      value: null
    - any:
      - var: item.properties.securityProfile.workloadIdentity.issuer
        op: exists
        value: null
      - var: item.properties.securityProfile.azureRBAC.enabled
        op: is_true
        value: null
- rule_id: azure.kubernetes.kubelet.containers_read_only_port_disabled
  for_each: azure.kubernetes.managed_clusters.list
  severity: MEDIUM
  conditions:
    var: item.properties.agentPoolProfiles[].osDiskType
    op: not_contains
    value: Ephemeral
- rule_id: azure.kubernetes.kubelet.containers_tls_min_1_2_enforced
  for_each: azure.kubernetes.managed_clusters.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.agentPoolProfiles[].kubeletConfig.containerLogMaxFiles
      op: exists
      value: null
    - var: item.properties.agentPoolProfiles[].kubeletConfig.tlsCipherSuites
      op: contains
      value: TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
- rule_id: azure.kubernetes.kubelet.k8s_anonymous_auth_disabled
  for_each: azure.kubernetes.managed_clusters.list
  severity: MEDIUM
  conditions:
    var: item.properties.securityProfile.kubeletConfig.enableAnonymousAuthentication
    op: is_false
    value: null
- rule_id: azure.kubernetes.kubelet.k8s_client_cert_rotation_enabled
  for_each: azure.kubernetes.list_clusters
  severity: MEDIUM
  conditions:
    var: item.properties.agentPoolProfiles[].kubeletConfig.clientCertRotationEnabled
    op: is_true
    value: null
- rule_id: azure.kubernetes.kubelet.k8s_protect_kernel_defaults_enabled
  for_each: azure.kubernetes.list_clusters
  severity: MEDIUM
  conditions:
    var: item.properties.agentPoolProfiles[].kubeletConfig.protectKernelDefaults
    op: is_true
    value: null
- rule_id: azure.kubernetes.kubelet.k8s_read_only_port_disabled
  for_each: azure.kubernetes.managed_clusters.list
  severity: MEDIUM
  conditions:
    var: item.properties.agentPoolProfiles[].kubeletConfig.readOnlyPort
    op: is_false
    value: null
- rule_id: azure.kubernetes.managed_cluster.containers_cluster_audit_logging_enabled
  for_each: azure.kubernetes.managed_clusters.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.azureMonitorProfile.containerInsights
      op: exists
      value: null
    - var: item.properties.azureMonitorProfile.containerInsights.enabled
      op: is_true
      value: null
- rule_id: azure.kubernetes.managed_cluster.containers_cluster_default_service_account_automount_disabled
  for_each: azure.kubernetes.managed_clusters.list
  severity: MEDIUM
  conditions:
    var: item.properties.serviceAccountProfile.automountServiceAccountToken
    op: is_false
    value: null
- rule_id: azure.kubernetes.managed_cluster.containers_cluster_private_control_plane_endpoint_enabled
  for_each: azure.kubernetes.list_managed_clusters
  severity: MEDIUM
  conditions:
    var: item.apiServerAccessProfile.enablePrivateCluster
    op: is_true
    value: null
- rule_id: azure.kubernetes.managed_cluster.containers_cluster_secrets_encryption_kms_enabled
  for_each: azure.kubernetes.list_managed_clusters
  severity: MEDIUM
  conditions:
    var: item.properties.securityProfile.azureKeyVaultKms.enabled
    op: is_true
    value: null
- rule_id: azure.kubernetes.managed_cluster.containers_cluster_service_dns_and_metrics_from_approved_sources
  for_each: azure.kubernetes.list_managed_clusters
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.networkProfile.outboundType
      op: equals
      value: userDefinedRouting
    - var: item.properties.apiServerAccessProfile.authorizedIPRanges[]
      op: not_contains
      value: 0.0.0.0/0
- rule_id: azure.kubernetes.managed_cluster.containers_cluster_service_kube_system_services_not_public
  for_each: azure.kubernetes.list_managed_clusters
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.networkProfile.loadBalancerSku
      op: equals
      value: standard
    - var: item.properties.apiServerAccessProfile.authorizedIPRanges
      op: not_contains
      value: 0.0.0.0/0
- rule_id: azure.kubernetes.managed_cluster.containers_fargate_profile_execution_role_least_privilege
  for_each: azure.kubernetes.list_managed_clusters
  severity: MEDIUM
  conditions:
    all:
    - var: item.fargateProfile.executionRoleArn
      op: exists
      value: null
    - var: item.fargateProfile.executionRoleArn
      op: not_contains
      value: AdministratorAccess
- rule_id: azure.kubernetes.managed_cluster.containers_fargate_profile_logging_enabled
  for_each: azure.kubernetes.managed_cluster.containers_fargate_profile_logging_enabled
  severity: MEDIUM
  conditions:
    var: item.logging
    op: is_true
    value: null
- rule_id: azure.kubernetes.managed_cluster.containers_fargate_profile_private_subnets_only
  for_each: azure.kubernetes.list_managed_clusters
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.agentPoolProfiles[].type
      op: equals
      value: VirtualMachineScaleSets
    - var: item.properties.agentPoolProfiles[].vnetSubnetID
      op: exists
      value: null
    - var: item.properties.agentPoolProfiles[].vnetSubnetID
      op: not_contains
      value: public
- rule_id: azure.kubernetes.namespace.containers_default_service_account_automount_disabled
  for_each: azure.kubernetes.managed_clusters.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.agentPoolProfiles[].osType
      op: equals
      value: Linux
    - var: item.properties.kubernetesVersion
      op: exists
      value: null
    - var: item.properties.securityProfile.workloadIdentity.enabled
      op: is_true
      value: null
- rule_id: azure.kubernetes.namespace.containers_network_policies_present
  for_each: azure.kubernetes.namespace.list
  severity: MEDIUM
  conditions:
    var: item.spec.networkPolicies
    op: not_empty
    value: null
- rule_id: azure.kubernetes.namespace.containers_pod_security_level_restricted
  for_each: azure.kubernetes.namespaces.list
  severity: MEDIUM
  conditions:
    var: item.podSecurityLevel
    op: equals
    value: restricted
- rule_id: azure.kubernetes.network_policy.containers_networkpolicy_default_deny_egress_per_namespace
  for_each: azure.kubernetes.list_network_policies
  severity: MEDIUM
  conditions:
    all:
    - var: item.spec.podSelector
      op: exists
      value: null
    - var: item.spec.policyTypes
      op: contains
      value: Egress
    - var: item.spec.egress
      op: is_empty
      value: null
- rule_id: azure.kubernetes.network_policy.containers_networkpolicy_default_deny_ingress_per_namespace
  for_each: azure.kubernetes.list_network_policies
  severity: MEDIUM
  conditions:
    all:
    - var: item.spec.podSelector
      op: exists
      value: null
    - var: item.spec.policyTypes
      op: contains
      value: Ingress
    - var: item.spec.ingress
      op: is_empty
      value: null
- rule_id: azure.kubernetes.network_policy.containers_networkpolicy_required_allowlist_for_namespace_services
  for_each: azure.kubernetes.list_network_policies
  severity: MEDIUM
  conditions:
    all:
    - var: item.spec.podSelector.matchLabels
      op: exists
      value: null
    - var: item.spec.ingress[].from[].namespaceSelector.matchLabels
      op: exists
      value: null
- rule_id: azure.kubernetes.rbac.containers_authorization_mode_rbac_enabled
  for_each: azure.kubernetes.list_clusters
  severity: MEDIUM
  conditions:
    var: item.properties.securityProfile.azureDefender.securityMonitoring.enabled
    op: is_true
    value: null
- rule_id: azure.kubernetes.rbac.containers_no_cluster_admin_bindings_to_users
  for_each: azure.kubernetes.rbac.list_cluster_role_bindings
  severity: MEDIUM
  conditions:
    all:
    - var: item.roleRef.name
      op: equals
      value: cluster-admin
    - var: item.subjects[].kind
      op: not_contains
      value: User
- rule_id: azure.kubernetes.rbac.containers_no_wildcard_rules_in_clusterroles
  for_each: azure.kubernetes.rbac.clusterroles.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.rules[].verbs
      op: not_contains
      value: '*'
    - var: item.rules[].apiGroups
      op: not_contains
      value: '*'
    - var: item.rules[].resources
      op: not_contains
      value: '*'
- rule_id: azure.kubernetes.rbac.containers_subjects_scoped_to_namespaces
  for_each: azure.kubernetes.list_cluster_role_bindings
  severity: MEDIUM
  conditions:
    all:
    - var: item.subjects[].namespace
      op: exists
      value: null
    - var: item.subjects[].namespace
      op: not_equals
      value: ''
- rule_id: azure.kubernetes.rbac.k8s_default_sa_not_cluster_admin
  for_each: azure.kubernetes.list_cluster_role_bindings
  severity: MEDIUM
  conditions:
    all:
    - var: item.RoleRef.Name
      op: equals
      value: cluster-admin
    - var: item.Subjects[].Kind
      op: contains
      value: ServiceAccount
    - var: item.Subjects[].Name
      op: contains
      value: default
    - var: item.Subjects[].Namespace
      op: contains
      value: default
- rule_id: azure.kubernetes.rbac.k8s_no_cluster_admin_to_authenticated
  for_each: azure.kubernetes.list_cluster_role_bindings
  severity: MEDIUM
  conditions:
    all:
    - var: item.RoleRef.Name
      op: not_equals
      value: cluster-admin
    - var: item.Subjects[].Kind
      op: not_contains
      value: Group
    - var: item.Subjects[].Name
      op: not_contains
      value: system:authenticated
- rule_id: azure.kubernetes.rbac.k8s_wildcard_verbs_disallowed
  for_each: azure.kubernetes.list_role_bindings
  severity: MEDIUM
  conditions:
    all:
    - var: item.RoleRef.Name
      op: exists
      value: null
    - var: item.Rules[].Verbs[]
      op: not_contains
      value: '*'
- rule_id: azure.kubernetes.scheduler.containers_authentication_kubeconfig_configured
  for_each: azure.kubernetes.managed_clusters.list
  severity: MEDIUM
  conditions:
    var: item.properties.agentPoolProfiles[].kubeletConfig
    op: exists
    value: null
- rule_id: azure.kubernetes.scheduler.containers_authorization_kubeconfig_configured
  for_each: azure.kubernetes.clusters.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.agentPoolProfiles[].kubeletConfig.authorizationMode
      op: contains
      value: Webhook
    - var: item.properties.agentPoolProfiles[].kubeletConfig.authenticationMode
      op: contains
      value: Webhook
- rule_id: azure.kubernetes.scheduler.containers_secure_port_tls_enabled
  for_each: azure.kubernetes.managed_clusters.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.agentPoolProfiles[].ports[]
      op: exists
      value: null
    - var: item.properties.agentPoolProfiles[].ports[]
      op: in
      value:
      - 443
      - 8443
- rule_id: azure.kubernetes.scheduler.k8s_leader_election_enabled
  for_each: azure.kubernetes.list_clusters
  severity: MEDIUM
  conditions:
    var: item.Properties.EnableLeaderElection
    op: is_true
    value: null
- rule_id: azure.kubernetes.scheduler.k8s_profiling_disabled
  for_each: azure.kubernetes.clusters.list
  severity: MEDIUM
  conditions:
    var: item.addonProfiles.azurePolicy.enabled
    op: is_false
    value: null
- rule_id: azure.kubernetes.scheduler.k8s_secure_port_enabled
  for_each: azure.kubernetes.list_clusters
  severity: MEDIUM
  conditions:
    var: item.Properties.APIServerAccessProfile.EnableSecurePort
    op: is_true
    value: null
- rule_id: azure.kubernetes.service.containers_external_ips_not_used
  for_each: azure.kubernetes.list_managed_clusters
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.agentPoolProfiles[].externalIPs
      op: is_empty
      value: null
- rule_id: azure.kubernetes.service.containers_nodeport_usage_restricted
  for_each: azure.kubernetes.managed_clusters.list
  severity: MEDIUM
  conditions:
    var: item.agentPoolProfiles[].ports[].port
    op: not_contains
    value: NodePort
- rule_id: azure.kubernetes.service.containers_type_loadbalancer_internal_only_where_required
  for_each: azure.kubernetes.list_managed_clusters
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.agentPoolProfiles[].type
      op: not_contains
      value: LoadBalancer
    - any:
      - var: item.properties.agentPoolProfiles[].type
        op: contains
        value: InternalLoadBalancer
      - var: item.properties.agentPoolProfiles[].type
        op: contains
        value: UserDefinedRouting
