version: '1.0'
provider: azure
service: entra
checks:
- rule_id: azure.entra.user.unused_credentials_configured
  for_each: azure.aad.list_aads
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: azure.entra.user.tenant_admin_api_keys_absent_configured
  for_each: azure.aad.list_aads
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: azure.entra.notification.group_mapping_configured
  for_each: azure.aad.list_aads
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
