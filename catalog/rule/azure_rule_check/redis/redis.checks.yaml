version: '1.0'
provider: azure
service: redis
checks:
- rule_id: azure.redis.cache.system.assigned.identity.check
  for_each: azure.redis.redis.list_by_subscription
  severity: MEDIUM
  conditions:
    var: item.identity
    op: exists
    value: null
- rule_id: azure.redis.minimum.tls.version.check
  for_each: azure.redis.redis.list_by_subscription
  severity: MEDIUM
  conditions:
    var: item.minimum_tls_version
    op: equals
    value: '1.2'
