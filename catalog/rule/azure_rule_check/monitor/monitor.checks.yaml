version: '1.0'
provider: azure
service: monitor
checks:
- rule_id: azure.monitor.action_group.incident_escalation_change_audit_logging_enabled
  for_each: azure.monitor.activitylogalerts.list_by_resource_group
  severity: MEDIUM
  conditions:
    all:
    - var: item.enabled
      op: is_true
      value: null
    - var: item.criteria.allOf[].field
      op: contains
      value: operationName
    - var: item.criteria.allOf[].equals
      op: contains
      value: Microsoft.Insights/ActivityLogAlerts/Activated/Action
- rule_id: azure.monitor.action_group.incident_escalation_oncall_contacts_verified
  for_each: azure.monitor.actiongroups.list_by_subscription_id
  severity: MEDIUM
  conditions:
    all:
    - var: item.actions[].emailReceivers[].emailAddress
      op: not_contains
      value: unverified
    - var: item.actions[].smsReceivers[].countryCode
      op: exists
      value: null
    - var: item.enabled
      op: is_true
      value: null
- rule_id: azure.monitor.action_group.incident_escalation_policy_exists_for_critical_severity
  for_each: azure.monitor.actiongroups.list_by_subscription_id
  severity: MEDIUM
  conditions:
    all:
    - var: item.actions
      op: not_empty
      value: null
    - var: item.enabled
      op: is_true
      value: null
- rule_id: azure.monitor.action_group.incident_notification_destinations_configured
  for_each: azure.monitor.actiongroups.list_by_subscription_id
  severity: MEDIUM
  conditions:
    var: item.actions
    op: not_empty
    value: null
- rule_id: azure.monitor.action_group.incident_notification_endpoints_authenticated
  for_each: azure.monitor.actiongroups.list_by_subscription_id
  severity: MEDIUM
  conditions:
    all:
    - var: item.actions[].type
      op: not_contains
      value: email
    - var: item.actions[].type
      op: not_contains
      value: sms
- rule_id: azure.monitor.action_group.incident_notification_message_encryption_in_transit
  for_each: azure.monitor.actiongroups.list_by_subscription_id
  severity: MEDIUM
  conditions:
    all:
    - var: item.actions[].secure_properties
      op: exists
      value: null
    - var: item.actions[].secure_properties
      op: not_contains
      value: http://
- rule_id: azure.monitor.action_group.incident_notification_no_public_webhooks
  for_each: azure.monitor.actiongroups.list_by_subscription_id
  severity: MEDIUM
  conditions:
    all:
    - var: item.actions[].actionType
      op: not_contains
      value: Webhook
- rule_id: azure.monitor.activity.log.alert.create.or.update.public.ip.address
  for_each: azure.monitor.activitylogalerts.list_by_resource_group
  severity: MEDIUM
  conditions:
    all:
    - var: item.enabled
      op: is_true
      value: null
    - var: item.criteria.operationName
      op: equals
      value: Microsoft.Network/publicIPAddresses/write
    - var: item.criteria.status
      op: equals
      value: Started
- rule_id: azure.monitor.activity.log.alert.delete.nsg.exists
  for_each: azure.monitor.activitylogalerts.list_by_resource_group
  severity: MEDIUM
  conditions:
    all:
    - var: item.criteria.allOf[].operationName
      op: contains
      value: Microsoft.Network/networkSecurityGroups/delete
    - var: item.enabled
      op: is_true
      value: null
- rule_id: azure.monitor.activity.log.alert.delete.policy.assignment.exists
  for_each: azure.monitor.activitylogalerts.list_by_resource_group
