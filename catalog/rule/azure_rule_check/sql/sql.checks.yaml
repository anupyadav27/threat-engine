version: '1.0'
provider: azure
service: sql
checks:
- rule_id: azure.sql.database.ad_authentication_enabled
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.administrators
    op: exists
    value: null
- rule_id: azure.sql.database.auditing_enabled
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.auditingSettings.state
    op: equals
    value: Enabled
- rule_id: azure.sql.database.aurora_backup_enabled
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.aurora_backup_enabled
    op: is_true
    value: null
- rule_id: azure.sql.database.auto_minor_version_upgrade
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.autoMinorVersionUpgrade
    op: is_true
    value: null
- rule_id: azure.sql.database.autoscale_enabled
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.autoscale_enabled
    op: is_true
    value: null
- rule_id: azure.sql.database.backup_enabled
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.backupEnabled
    op: is_true
    value: null
- rule_id: azure.sql.database.backup_encrypted
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.encryptionProtector
    op: exists
    value: null
- rule_id: azure.sql.database.db_cluster_snapshot_cross_account_sharing_restricted
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.restrictOutboundNetworkAccess
    op: equals
    value: Enabled
- rule_id: azure.sql.database.db_cluster_snapshot_cross_region_copy_encrypted
  for_each: azure.sql.managedinstances.list
  severity: MEDIUM
  conditions:
    var: item.properties.encryptionProtector
    op: exists
    value: null
- rule_id: azure.sql.database.db_cluster_snapshot_encrypted
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.encryptionProtector
    op: exists
    value: null
- rule_id: azure.sql.database.db_cluster_snapshot_not_publicly_shared
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.publicNetworkAccess
    op: equals
    value: Disabled
- rule_id: azure.sql.database.db_snapshot_cross_account_sharing_restricted
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.restrictOutboundNetworkAccess
    op: is_true
    value: null
- rule_id: azure.sql.database.db_snapshot_cross_region_copy_encrypted
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.encryptionProtector
    op: exists
    value: null
- rule_id: azure.sql.database.db_snapshot_encrypted
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.encryptionProtector
    op: exists
    value: null
- rule_id: azure.sql.database.db_snapshot_not_publicly_shared
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.publicNetworkAccess
    op: equals
    value: Disabled
- rule_id: azure.sql.database.defender.pricing.tier.check
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties
    op: exists
    value: null
- rule_id: azure.sql.database.deletion_protection
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.disableLocalUsers
    op: is_false
    value: null
- rule_id: azure.sql.database.diagnostic_settings_enabled
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.diagnosticSettings
    op: exists
    value: null
- rule_id: azure.sql.database.dynamodb_encryption_enabled
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.encryption
    op: exists
    value: null
- rule_id: azure.sql.database.encryption_at_rest_enabled
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.encryptionProtector
    op: exists
    value: null
- rule_id: azure.sql.database.geo_redundant_backup
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.geoRedundantBackup
    op: equals
    value: Enabled
- rule_id: azure.sql.database.long_term_retention_enabled
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.longTermRetentionPolicy
    op: exists
    value: null
- rule_id: azure.sql.database.multi_az
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.zones
    op: exists
    value: null
- rule_id: azure.sql.database.multi_az_enabled
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.zoneRedundant
    op: is_true
    value: null
- rule_id: azure.sql.database.no_public_access
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.publicNetworkAccess
    op: equals
    value: Disabled
- rule_id: azure.sql.database.snapshots_public_access
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.publicNetworkAccess
    op: equals
    value: Disabled
- rule_id: azure.sql.database.tde.status.check
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.transparentDataEncryption
    op: exists
    value: null
- rule_id: azure.sql.paas_lightsail_database.paas_db_encryption_at_rest_enabled
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.encryptionProtector
    op: exists
    value: null
- rule_id: azure.sql.paas_lightsail_database.paas_db_public_access_disabled
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.publicNetworkAccess
    op: equals
    value: Disabled
- rule_id: azure.sql.paas_lightsail_database.paas_db_require_tls_in_transit
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.minimalTlsVersion
    op: in
    value:
    - '1.2'
    - '1.3'
- rule_id: azure.sql.server.ad.admin.check
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.administrators
    op: exists
    value: null
- rule_id: azure.sql.server.audit.retention.check
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.auditingSettings.retentionDays
    op: gte
    value: 90
- rule_id: azure.sql.server.auditing_retention_90_days
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.auditingSettings.retentionDays
      op: gte
      value: 90
- rule_id: azure.sql.server.check.public.network.access.disabled
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.publicNetworkAccess
    op: equals
    value: Disabled
- rule_id: azure.sql.server.db_cluster_audit_logging_enabled
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.auditingSettings
      op: exists
      value: null
    - var: item.properties.auditingSettings.state
      op: equals
      value: Enabled
- rule_id: azure.sql.server.db_cluster_deletion_protection_enabled
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.restrictOutboundNetworkAccess
    op: is_true
    value: null
- rule_id: azure.sql.server.db_cluster_encryption_at_rest_cmek
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.encryptionProtector
    op: exists
    value: null
- rule_id: azure.sql.server.db_cluster_minor_version_auto_upgrade_enabled
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.minimalTlsVersion
    op: in
    value:
    - '1.2'
    - '1.3'
- rule_id: azure.sql.server.db_cluster_private_networking_enforced
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.publicNetworkAccess
    op: equals
    value: Disabled
- rule_id: azure.sql.server.db_instance_deletion_protection_enabled
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.restrictOutboundNetworkAccess
    op: is_true
    value: null
- rule_id: azure.sql.server.db_instance_encryption_at_rest_enabled
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.encryptionProtector
    op: exists
    value: null
- rule_id: azure.sql.server.db_instance_iam_or_managed_identity_auth_enabled_where_supported
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    any:
    - var: item.identity
      op: exists
      value: null
    - var: item.properties.administrators
      op: exists
      value: null
- rule_id: azure.sql.server.db_instance_public_access_disabled
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.publicNetworkAccess
    op: equals
    value: Disabled
- rule_id: azure.sql.server.db_instance_require_tls_in_transit
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.minimalTlsVersion
    op: in
    value:
    - '1.2'
    - '1.3'
- rule_id: azure.sql.server.db_parameter_group_audit_logging_enabled_where_supported
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.auditingSettings.isAzureMonitorTargetEnabled
    op: is_true
    value: null
- rule_id: azure.sql.server.db_parameter_group_insecure_features_disabled_where_applicable
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.disableLocalAuth
      op: is_true
      value: null
    - var: item.properties.publicNetworkAccess
      op: equals
      value: Disabled
- rule_id: azure.sql.server.db_parameter_group_require_ssl
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.minimalTlsVersion
    op: exists
    value: null
- rule_id: azure.sql.server.db_sg_egress_restricted
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.restrictOutboundNetworkAccess
    op: equals
    value: Enabled
- rule_id: azure.sql.server.db_sg_no_0_0_0_0_ingress_on_db_ports
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.publicNetworkAccess
      op: equals
      value: Disabled
    - var: item.properties.privateEndpointConnections[].properties.privateLinkServiceConnectionState.status
      op: not_contains
      value: Rejected
- rule_id: azure.sql.server.db_sg_only_required_ports_open
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.restrictOutboundNetworkAccess
      op: equals
      value: Enabled
    - var: item.properties.minimalTlsVersion
      op: equals
      value: '1.2'
- rule_id: azure.sql.server.db_subnet_group_private_subnets_only
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.publicNetworkAccess
    op: equals
    value: Disabled
- rule_id: azure.sql.server.defender_enabled
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties
    op: exists
    value: null
- rule_id: azure.sql.server.firewall.no.open.access.check
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.publicNetworkAccess
      op: equals
      value: Disabled
    - var: item.properties.firewallRules[].startIpAddress
      op: not_contains
      value: 0.0.0.0
    - var: item.properties.firewallRules[].endIpAddress
      op: not_contains
      value: 255.255.255.255
- rule_id: azure.sql.server.minimal_tls_version
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.minimalTlsVersion
    op: in
    value:
    - '1.2'
    - '1.3'
- rule_id: azure.sql.server.tde.protector.customer.key.check
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.encryptionProtector
    op: exists
    value: null
- rule_id: azure.sql.server.tde_cmk_encrypted
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.encryptionProtector
    op: exists
    value: null
- rule_id: azure.sql.server.tde_enabled
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.transparentDataEncryption
    op: exists
    value: null
- rule_id: azure.sql.server.unrestricted_inbound_access
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.restrictOutboundNetworkAccess
    op: is_true
    value: null
- rule_id: azure.sql.server_configuration.db_option_group_insecure_extensions_not_enabled
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.restrictOutboundNetworkAccess
    op: is_true
    value: null
- rule_id: azure.sql.server_configuration.db_option_group_only_approved_extensions_enabled
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.dbOptionGroupOnlyApprovedExtensionsEnabled
    op: is_true
    value: null
- rule_id: azure.sql.storage.encrypted
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.storageEncrypted
    op: is_true
    value: null
- rule_id: azure.sql.user.db_approved_list_of_superusers_only
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.administrators
      op: exists
      value: null
    - var: item.properties.administrators.administratorType
      op: equals
      value: ActiveDirectory
    - var: item.properties.administrators.azureADOnlyAuthentication
      op: is_true
      value: null
- rule_id: azure.sql.user.db_no_unused_or_default_superusers
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.administrators
      op: exists
      value: null
    - var: item.properties.administrators.administratorType
      op: equals
      value: ActiveDirectory
- rule_id: azure.sql.user.db_password_auth_hardened_or_iam_auth_preferred_where_supported
  for_each: azure.sql.servers.list
  severity: MEDIUM
  conditions:
    var: item.properties.administrators
    op: exists
    value: null
