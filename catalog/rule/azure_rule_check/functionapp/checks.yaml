version: '1.0'
provider: azure
service: functionapp
checks:
- rule_id: azure.functionapp.secrets_in_keyvault_configured
  for_each: azure.functionapp.webapps.list
  severity: MEDIUM
  conditions:
    any:
    - var: item.key_vault_reference_identity
      op: is_not_empty
      value: ''
    - var: item.identity
      op: is_not_null
      value: ''
