version: '1.0'
provider: azure
service: networksecuritygroup
checks:
- rule_id: azure.networksecuritygroup.default.restrict.traffic
  for_each: azure.network.networksecuritygroups.list_all
  severity: MEDIUM
  conditions:
    all:
    - var: item.securityRules[].sourceAddressPrefix
      op: not_contains
      value: '*'
    - var: item.securityRules[].destinationAddressPrefix
      op: not_contains
      value: '*'
    - var: item.defaultSecurityRules[].sourceAddressPrefix
      op: not_contains
      value: '*'
    - var: item.defaultSecurityRules[].destinationAddressPrefix
      op: not_contains
      value: '*'
