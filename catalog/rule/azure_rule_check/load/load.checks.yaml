version: '1.0'
provider: azure
service: load
checks:
- rule_id: azure.load.balancer_health_probe_configured:az.azure_network_load_balancer.network_security_lb_listener_tls_min_1_2
  for_each: azure.network.loadbalancers.list
  severity: MEDIUM
  conditions:
    var: item.properties.frontendIPConfigurations[].properties.loadBalancingRules[].properties.probes[].properties.protocol
    op: exists
    value: null
- rule_id: azure.load.balancer_waf_acl_attached:az.azure_network_load_balancer.network_security_lb_waf_attached_where_supported
  for_each: azure.network.loadbalancers.list_all
  severity: MEDIUM
  conditions:
    all:
    - var: item.sku.tier
      op: equals
      value: Regional
    - var: item.frontend_ip_configurations[].properties.public_ip_address.properties.ip_configuration.properties.subnet.properties.network_security_group.properties.security_rules[].properties.destination_port_ranges[]
      op: not_contains
      value: '*'
