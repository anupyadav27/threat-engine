version: '1.0'
provider: azure
service: front
checks:
- rule_id: azure.front.door_waf_policy.edge_waf_block_actions_not_count_only
  for_each: azure.frontdoor.policies.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.policySettings.defaultCustomBlockResponseStatusCode
      op: exists
      value: null
    - var: item.properties.managedRules.managedRuleSets[].ruleGroupOverrides[].rules[].action
      op: not_contains
      value: Block
    - var: item.properties.managedRules.managedRuleSets[].ruleGroupOverrides[].rules[].action
      op: not_contains
      value: Log
    - var: item.properties.managedRules.managedRuleSets[].ruleGroupOverrides[].rules[].action
      op: not_contains
      value: Redirect
- rule_id: azure.front.door_waf_policy.edge_waf_ip_rate_limit_rules_configured_where_supported
  for_each: azure.frontdoor.policies.list
  severity: MEDIUM
  conditions:
    var: item.properties.customRules.rules[].matchConditions[].matchVariable
    op: contains
    value: RemoteAddr
- rule_id: azure.front.door_waf_policy.edge_waf_logging_enabled
  for_each: azure.frontdoor.policies.list
  severity: MEDIUM
  conditions:
    var: item.properties.policySettings.logScrubbing.scrubbingRules[].state
    op: in
    value:
    - Enabled
- rule_id: azure.front.door_waf_policy.edge_waf_managed_rule_sets_enabled
  for_each: azure.frontdoor.policies.list
  severity: MEDIUM
  conditions:
    var: item.properties.managedRules.managedRuleSets[].ruleSetType
    op: exists
    value: null
- rule_id: azure.front.door_waf_policy.edge_waf_web_acl_attached_to_cdn
  for_each: azure.frontdoor.policies.list
  severity: MEDIUM
  conditions:
    var: item.Properties.PolicySettings.EnabledState
    op: equals
    value: Enabled
