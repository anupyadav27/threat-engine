- rule_id: azure.data.lake_analytics_lineage.datalake_lineage_capture_enabled
  for_each: azure.data_lake_analytics.list_accounts
  severity: MEDIUM
  conditions:
    var: item.Properties.DiagnosticsSettings[].LogSettings[].Enabled
    op: is_true
    value: null
- rule_id: azure.data.lake_analytics_lineage.datalake_lineage_export_destination_encrypted
  for_each: azure.data.lake_analytics.list_accounts
  severity: MEDIUM
  conditions:
    var: item.properties.encryptionState
    op: equals
    value: Enabled
- rule_id: azure.data.lake_analytics_ml_transform.datalake_ml_transform_logs_enabled
  for_each: azure.data.lake_analytics_ml_transform.describe_datalake_ml_transforms
  severity: MEDIUM
  conditions:
    var: item.DiagnosticsSettings.Logging.Enabled
    op: is_true
    value: null
- rule_id: azure.data.lake_analytics_ml_transform.datalake_ml_transform_network_private_only
  for_each: azure.data.lake_analytics_ml_transform.list_transforms
  severity: MEDIUM
  conditions:
    var: item.NetworkAccess
    op: equals
    value: Private
- rule_id: azure.data.lake_analytics_ml_transform.datalake_ml_transform_role_least_privilege
  for_each: azure.data.lake_analytics_ml_transform.list_transforms
  severity: MEDIUM
  conditions:
    all:
    - var: item.RoleAssignments[].RoleDefinitionName
      op: not_contains
      value: Owner
    - var: item.RoleAssignments[].RoleDefinitionName
      op: not_contains
      value: Contributor
- rule_id: azure.data.lake_analytics_partition.datalake_partition_access_policies_least_privilege
  for_each: azure.data.lake_analytics.list_accounts
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.firewallRules[].properties.startIpAddress
      op: not_contains
      value: 0.0.0.0
    - var: item.properties.firewallRules[].properties.endIpAddress
      op: not_contains
      value: 255.255.255.255
- rule_id: azure.data.lake_analytics_partition.datalake_partition_catalog_encrypted
  for_each: azure.data.lake_analytics.list_partitions
  severity: MEDIUM
  conditions:
    var: item.Encryption
    op: exists
    value: null
- rule_id: azure.data.lake_analytics_quality.datalake_quality_logs_enabled
  for_each: azure.data.lake_analytics.describe_accounts
  severity: MEDIUM
  conditions:
    var: item.Properties.DiagnosticSettings[].Logs[].Enabled
    op: is_true
    value: null
- rule_id: azure.data.lake_analytics_quality.datalake_quality_output_location_private_and_encrypted
  for_each: azure.data.lake_analytics.list_accounts
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.firewallState
      op: equals
      value: Enabled
    - var: item.properties.encryptionState
