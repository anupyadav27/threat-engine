- rule_id: azure.data.lake_analytics_job.datalake_crawler_scope_restricted_to_allowlist
  for_each: azure.data.lake_analytics_jobs.list
  severity: MEDIUM
  conditions:
    var: item.properties.scopeJobResource[].properties.principalId
    op: not_contains
    value: '*'
- rule_id: azure.data.lake_analytics_job.datalake_job_logs_and_metrics_enabled
  for_each: azure.data.lake_analytics_job.list_jobs
  severity: MEDIUM
  conditions:
    all:
    - var: item.Diagnostics.StorageAccountId
      op: exists
      value: null
    - var: item.Diagnostics.MetricsEnabled
      op: is_true
      value: null
    - var: item.Diagnostics.LogsEnabled
      op: is_true
      value: null
- rule_id: azure.data.lake_analytics_job.datalake_job_network_private_only
  for_each: azure.data.lake_analytics.list_jobs
  severity: MEDIUM
  conditions:
    var: item.NetworkAccess
    op: equals
    value: Private
- rule_id: azure.data.lake_analytics_job.datalake_job_role_least_privilege
  for_each: azure.data.lake_analytics_job.list_jobs
  severity: MEDIUM
  conditions:
    all:
    - var: item.RoleAssignments[].RoleDefinitionName
      op: not_contains
      value: Owner
    - var: item.RoleAssignments[].RoleDefinitionName
      op: not_contains
      value: Contributor
- rule_id: azure.data.lake_analytics_job.datalake_job_script_location_private_and_encrypted
  for_each: azure.data.lake_analytics.list_jobs
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.scriptLocation.private
      op: is_true
      value: null
    - var: item.properties.scriptLocation.encrypted
      op: is_true
      value: null
- rule_id: azure.data.lake_analytics_lineage.datalake_lineage_access_rbac_least_privilege
  for_each: azure.data.lake_analytics.list_accounts
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.firewallRules[].properties.startIpAddress
      op: not_contains
      value: 0.0.0.0
    - var: item.properties.firewallRules[].properties.endIpAddress
      op: not_contains
