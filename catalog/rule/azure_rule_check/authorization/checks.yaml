version: '1.0'
provider: azure
service: authorization
checks:
- rule_id: azure.authorization.role_assignment.condition_ip_configured
  for_each: azure.authorization.roleassignments.list
  severity: MEDIUM
  conditions:
    var: item.type
    op: is_true
- rule_id: azure.authorization.role_assignment.external_tenants_configured
  for_each: azure.authorization.roleassignments.list
  severity: MEDIUM
  conditions:
    var: item.type
    op: is_true
- rule_id: azure.authorization.role_definition.action_configured
  for_each: azure.authorization.roledefinitions.list
  severity: MEDIUM
  conditions:
    var: item.type
    op: is_true
- rule_id: azure.authorization.role_definition.change_control_configured
  for_each: azure.authorization.roledefinitions.list
  severity: MEDIUM
  conditions:
    var: item.type
    op: is_true
- rule_id: azure.authorization.role_definition.max_session_hours_configured
  for_each: azure.authorization.roledefinitions.list
  severity: MEDIUM
  conditions:
    var: item.type
    op: is_true
