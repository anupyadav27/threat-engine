version: '1.0'
provider: azure
service: purview
checks:
- rule_id: azure.purview.audit_log.logs_centralized_and_encrypted
  for_each: azure.purview.accounts.list_by_subscription
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.eventHubNamespaceResourceId
      op: exists
      value: null
    - var: item.properties.eventHubNamespaceResourceId
      op: not_equals
      value: ''
- rule_id: azure.purview.audit_log.retention_days_minimum
  for_each: azure.purview.accounts.list_by_subscription
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.publicNetworkAccess
      op: equals
      value: Enabled
    - var: item.properties.auditLogRetentionDays
      op: gte
      value: '90'
- rule_id: azure.purview.breach_detection.alert_destinations
  for_each: azure.purview.accounts.list_by_subscription
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.managedResources.eventHubNamespace
      op: exists
      value: null
    - var: item.properties.managedResources.storageAccount
      op: exists
      value: null
- rule_id: azure.purview.breach_detection.integrations_authenticated
  for_each: azure.purview.accounts.list_by_subscription
  severity: MEDIUM
  conditions:
    var: item.count
    op: gt
    value: 0
- rule_id: azure.purview.catalog.data_catalog_audit_logging_enabled
  for_each: azure.purview.accounts.list_by_subscription
  severity: MEDIUM
  conditions:
