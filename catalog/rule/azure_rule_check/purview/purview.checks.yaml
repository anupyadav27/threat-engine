- rule_id: azure.purview.catalog.data_catalog_rbac_least_privilege
  for_each: azure.purview.accounts.list_by_subscription
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.catalog
      op: exists
      value: null
    - var: item.properties.catalog.roleAssignments[].roleDefinitionId
      op: not_contains
      value: owner
    - var: item.properties.catalog.roleAssignments[].roleDefinitionId
      op: not_contains
      value: contributor
- rule_id: azure.purview.catalog.data_governance_change_audit_logging_enabled
  for_each: azure.purview.accounts.list_by_subscription
  severity: MEDIUM
