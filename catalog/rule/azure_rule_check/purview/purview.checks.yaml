- rule_id: azure.purview.catalog.data_catalog_cross_account_sharing_restricted
  for_each: azure.purview.accounts.list_by_subscription
  severity: MEDIUM
  conditions:
    var: item.properties.publicNetworkAccess
    op: equals
    value: Disabled
