version: '1.0'
provider: azure
service: function
checks:
- rule_id: azure.function.app.cors.no.wildcard.origins
  for_each: azure.web.webapps.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.cors.allowed_origins
      op: exists
      value: null
    - var: item.cors.allowed_origins
      op: not_contains
      value: '*'
- rule_id: azure.function.app.deployment.slot.access.restrictions.disabled
  for_each: azure.web.webapps.list_slots
  severity: MEDIUM
  conditions:
    var: item.SiteConfig.NetworkAccessControl
    op: exists
    value: null
- rule_id: azure.function.app.deployment.slot.cors.restriction
  for_each: azure.web.webapps.list_slots
  severity: MEDIUM
  conditions:
    var: item.siteConfig.cors.allowedOrigins
    op: not_contains
    value: '*'
- rule_id: azure.function.app.deployment.slot.http.version.check
  for_each: azure.web.webapps.list_slots
  severity: MEDIUM
  conditions:
    var: item.config.siteConfig.http20Enabled
    op: is_true
    value: null
- rule_id: azure.function.app.deployment.slot.python.version.check
  for_each: azure.web.webapps.list_slots
  severity: MEDIUM
  conditions:
    var: item.PythonVersion
    op: exists
    value: null
- rule_id: azure.function.app.deployment.slot.remote.debugging.disabled
  for_each: azure.web.webapps.list_slots
  severity: MEDIUM
  conditions:
    var: item.RemoteDebuggingEnabled
    op: is_false
    value: null
- rule_id: azure.function.app.deployment.slot.vnet.route.all.enabled
  for_each: azure.web.webapps.list_slots
  severity: MEDIUM
  conditions:
    all:
    - var: item.config.virtualNetworkSubnetId
      op: exists
      value: null
    - var: item.config.routeAllEnabled
      op: is_true
      value: null
- rule_id: azure.function.app.deployment.slot.vnet.routing.config.check
  for_each: azure.web.webapps.list_slots
  severity: MEDIUM
  conditions:
    var: item.VnetRouteAllEnabled
    op: is_true
    value: null
- rule_id: azure.function.app.e2e.tls.enabled
  for_each: azure.web.webapps.list_functions
  severity: MEDIUM
  conditions:
    var: item.config.minTlsVersion
    op: exists
    value: null
- rule_id: azure.function.app.function_restrict_public_access
  for_each: azure.web.webapps.list_functions
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.siteConfig.ipSecurityRestrictions
      op: not_empty
      value: null
    - var: item.properties.siteConfig.ipSecurityRestrictions[].ipAddress
      op: not_equals
      value: '*'
- rule_id: azure.function.app.function_url_authentication
  for_each: azure.web.webapps.list_functions
  severity: MEDIUM
  conditions:
    var: item.properties.config.functionAppConfig.siteConfig.http20Enabled
    op: is_true
    value: null
- rule_id: azure.function.app.http.version.2.0.check
  for_each: azure.web.webapps.list_functions
  severity: MEDIUM
  conditions:
    var: item.config.siteConfig.http20Enabled
    op: is_true
    value: null
- rule_id: azure.function.app.managed.identity.configured
  for_each: azure.web.webapps.list
  severity: MEDIUM
  conditions:
    var: item.Identity.Type
    op: exists
    value: null
- rule_id: azure.function.app.minimum.tls.version
  for_each: azure.web.webapps.list_functions
  severity: MEDIUM
  conditions:
    var: item.config.minimumTlsVersion
    op: equals
    value: '1.2'
- rule_id: azure.function.app.remote.debugging.check
  for_each: azure.web.webapps.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.config.remoteDebuggingEnabled
      op: exists
      value: null
    - var: item.config.remoteDebuggingEnabled
      op: is_false
      value: null
- rule_id: azure.function.app.vnet.integration.check
  for_each: azure.web.webapps.list
  severity: MEDIUM
  conditions:
    var: item.VnetIntegration
    op: exists
    value: null
- rule_id: azure.function.app.vnet.integration.routing.enabled
  for_each: azure.web.webapps.list
  severity: MEDIUM
  conditions:
    var: item.vnet_integration.routing_enabled
    op: is_true
    value: null
- rule_id: azure.function.function_version.published_and_immutable
  for_each: azure.web.webapps.list_functions
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.config.functionAppScaleLimit
      op: equals
      value: 1
    - var: item.properties.siteConfig.ftpsState
      op: equals
      value: FtpsOnly
- rule_id: azure.function.function_version.rollforward_rollback_controls_present
  for_each: azure.web.webapps.list
  severity: MEDIUM
  conditions:
    var: item.properties.siteConfig.functionAppScaleLimit
    op: exists
    value: null
- rule_id: azure.function.serverless_function.dead_letter_queue
  for_each: azure.web.webapps.list_functions
  severity: MEDIUM
  conditions:
    var: item.deadLetterQueue
    op: exists
    value: null
- rule_id: azure.function.serverless_function.env_no_plaintext_secrets
  for_each: azure.web.webapps.list_functions
  severity: MEDIUM
  conditions:
    all:
    - var: item.config.appSettings[].name
      op: not_contains
      value: password
    - var: item.config.appSettings[].name
      op: not_contains
      value: secret
    - var: item.config.appSettings[].name
      op: not_contains
      value: key
    - var: item.config.appSettings[].name
      op: not_contains
      value: connectionstring
- rule_id: azure.function.serverless_function.logging_and_tracing_enabled
  for_each: azure.web.webapps.list_functions
  severity: MEDIUM
  conditions:
    all:
    - var: item.config.siteConfig.applicationLogs.azureBlobStorage.level
      op: exists
      value: null
    - var: item.config.siteConfig.applicationLogs.azureBlobStorage.sasUrl
      op: exists
      value: null
    - var: item.config.siteConfig.applicationLogs.azureBlobStorage.retentionInDays
      op: gte
      value: 1
    - var: item.config.siteConfig.httpLogs.fileSystem.retentionInDays
      op: gte
      value: 1
    - var: item.config.siteConfig.tracingOptions
      op: equals
      value: enabled
- rule_id: azure.function.serverless_function.role_least_privilege
  for_each: azure.web.webapps.list_functions
  severity: MEDIUM
  conditions:
    all:
    - var: item.properties.config.bindings[].type
      op: not_contains
      value: httpTrigger
    - var: item.identity.type
      op: equals
      value: SystemAssigned
    - var: item.identity.principalId
      op: exists
      value: null
    - var: item.identity.roleAssignments[].properties.roleDefinitionId
      op: not_contains
      value: /providers/Microsoft.Authorization/roleDefinitions/b24988ac-6180-42a0-ab88-20f7382dd24c
- rule_id: azure.function.serverless_function.vpc_private_networking_enabled
  for_each: azure.web.webapps.list_functions
  severity: MEDIUM
  conditions:
    var: item.config.virtual_network_subnet_id
    op: exists
    value: null
