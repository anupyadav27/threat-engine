version: '1.0'
provider: gcp
service: aiplatform
checks:
- rule_id: gcp.aiplatform.auto_ml_job.automl_logs_enabled
  for_each: gcp.aiplatform.projects.locations.customJobs.list
  severity: MEDIUM
  conditions:
    var: item.encryptionSpec
    op: exists
    value: null
- rule_id: gcp.aiplatform.auto_ml_job.automl_private_networking_enforced
  for_each: gcp.aiplatform.projects.locations.customJobs.list
  severity: HIGH
  conditions:
    var: item.network
    op: exists
    value: null
- rule_id: gcp.aiplatform.auto_ml_job.automl_roles_least_privilege
  for_each: gcp.aiplatform.projects.locations.customJobs.list
  severity: HIGH
  conditions:
    var: item.serviceAccount
    op: exists
    value: null
- rule_id: gcp.aiplatform.batch_prediction_job.transform_job_input_output_encrypted
  for_each: gcp.aiplatform.projects.locations.batchPredictionJobs.list
  severity: MEDIUM
  conditions:
    var: item.encryptionSpec
    op: exists
    value: null
- rule_id: gcp.aiplatform.batch_prediction_job.transform_job_logs_enabled
  for_each: gcp.aiplatform.projects.locations.batchPredictionJobs.list
  severity: MEDIUM
  conditions:
    var: item.transformJobLogsEnabled
    op: exists
    value: null
- rule_id: gcp.aiplatform.batch_prediction_job.transform_job_private_networking_enforced
  for_each: gcp.aiplatform.projects.locations.batchPredictionJobs.list
  severity: HIGH
  conditions:
    var: item.network
    op: exists
    value: null
- rule_id: gcp.aiplatform.batch_prediction_job.transform_job_roles_least_privilege
  for_each: gcp.aiplatform.projects.locations.batchPredictionJobs.list
  severity: HIGH
  conditions:
    var: item.serviceAccount
    op: exists
    value: null
- rule_id: gcp.aiplatform.endpoint.endpoint_authn_required
  for_each: gcp.aiplatform.projects.locations.endpoints.list
  severity: HIGH
  conditions:
    var: item.encryptionSpec.kmsKeyName
    op: exists
    value: null
- rule_id: gcp.aiplatform.endpoint.endpoint_authz_policies_enforced
  for_each: gcp.aiplatform.projects.locations.endpoints.list
  severity: HIGH
  conditions:
    var: item.encryptionSpec
    op: exists
    value: null
- rule_id: gcp.aiplatform.endpoint.endpoint_config_content_type_whitelist_enforced
  for_each: gcp.aiplatform.projects.locations.endpoints.list
  severity: MEDIUM
  conditions:
    var: item.deployedModels[].containerSpec[].env[].name
    op: contains
    value: CONTENT_TYPE_WHITELIST
- rule_id: gcp.aiplatform.endpoint.endpoint_config_data_capture_bucket_encrypted_private
  for_each: gcp.aiplatform.projects.locations.endpoints.list
  severity: MEDIUM
  conditions:
    var: item.encryptionSpec
    op: exists
    value: null
- rule_id: gcp.aiplatform.endpoint.endpoint_config_kms_keys_restricted
  for_each: gcp.aiplatform.projects.locations.endpoints.list
  severity: HIGH
  conditions:
    var: item.encryptionSpec.kmsKeyName
    op: exists
    value: null
- rule_id: gcp.aiplatform.endpoint.endpoint_kms_encryption_enabled
  for_each: gcp.aiplatform.projects.locations.endpoints.list
  severity: HIGH
  conditions:
    var: item.encryptionSpec
    op: exists
    value: null
- rule_id: gcp.aiplatform.endpoint.endpoint_logging_enabled
  for_each: gcp.aiplatform.projects.locations.endpoints.list
  severity: MEDIUM
  conditions:
    var: item.loggingConfig.enableAccessLogging
    op: is_true
    value: null
- rule_id: gcp.aiplatform.endpoint.endpoint_private_networking_enforced
  for_each: gcp.aiplatform.projects.locations.endpoints.list
  severity: HIGH
  conditions:
    var: item.network
    op: exists
    value: null
- rule_id: gcp.aiplatform.experiment.experiment_logs_enabled
  for_each: gcp.aiplatform.projects.locations.datasets.list
  severity: MEDIUM
  conditions:
    var: item.encryptionSpec
    op: exists
    value: null
- rule_id: gcp.aiplatform.experiment.experiment_metadata_store_encrypted
  for_each: gcp.aiplatform.projects.locations.datasets.list
  severity: MEDIUM
  conditions:
    var: item.encryptionSpec
    op: exists
    value: null
- rule_id: gcp.aiplatform.experiment.experiment_rbac_least_privilege
  for_each: gcp.aiplatform.projects.locations.datasets.list
  severity: HIGH
  conditions:
    var: item.serviceAccount
    op: exists
    value: null
- rule_id: gcp.aiplatform.hyperparameter_tuning_job.hpo_logs_enabled
  for_each: gcp.aiplatform.projects.locations.customJobs.list
  severity: MEDIUM
  conditions:
    var: item.encryptionSpec
    op: exists
    value: null
- rule_id: gcp.aiplatform.hyperparameter_tuning_job.hpo_private_networking_enforced
  for_each: gcp.aiplatform.projects.locations.customJobs.list
  severity: HIGH
  conditions:
    var: item.network
    op: exists
    value: null
- rule_id: gcp.aiplatform.hyperparameter_tuning_job.hpo_roles_least_privilege
  for_each: gcp.aiplatform.projects.locations.customJobs.list
  severity: HIGH
  conditions:
    var: item.serviceAccount
    op: exists
    value: null
- rule_id: gcp.aiplatform.model.model_package_artifact_signed_and_verified
  for_each: gcp.aiplatform.projects.locations.models.list
  severity: MEDIUM
  conditions:
    var: item.containerSpec.modelPackageArtifactUri
    op: exists
    value: null
- rule_id: gcp.aiplatform.model.model_package_encrypted
  for_each: gcp.aiplatform.projects.locations.datasets.list
  severity: MEDIUM
  conditions:
    var: item.encryptionSpec
    op: exists
    value: null
- rule_id: gcp.aiplatform.model.model_package_not_publicly_shared
  for_each: gcp.aiplatform.projects.locations.models.list
  severity: HIGH
  conditions:
    var: item.sharedInfo[].access
    op: not_contains
    value: allUsers
- rule_id: gcp.aiplatform.model.model_registry_artifact_encryption_enabled
  for_each: gcp.aiplatform.projects.locations.datasets.list
  severity: HIGH
  conditions:
    var: item.encryptionSpec
    op: exists
    value: null
- rule_id: gcp.aiplatform.model.model_registry_cross_account_sharing_restricted
  for_each: gcp.aiplatform.projects.locations.datasets.list
  severity: MEDIUM
  conditions:
    var: item.encryptionSpec
    op: exists
    value: null
- rule_id: gcp.aiplatform.model.model_registry_rbac_least_privilege
  for_each: gcp.aiplatform.projects.locations.models.list
  severity: HIGH
  conditions:
    all:
    - var: item.labels['goog-vertex-ai-model-registry-role']
      op: exists
      value: null
    - var: item.labels['goog-vertex-ai-model-registry-role']
      op: in
      value:
      - OWNER
      - EDITOR
      - VIEWER
- rule_id: gcp.aiplatform.model_deployment_monitoring_job.monitoring_logs_enabled
  for_each: gcp.aiplatform.projects.locations.endpoints.list
  severity: MEDIUM
  conditions:
    var: item.deployedModels[].enableAccessLogging
    op: is_true
    value: null
- rule_id: gcp.aiplatform.model_deployment_monitoring_job.monitoring_outputs_encrypted_and_private
  for_each: gcp.aiplatform.projects.locations.endpoints.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.encryptionSpec
      op: exists
      value: null
    - var: item.network
      op: not_contains
      value: public
- rule_id: gcp.aiplatform.model_deployment_monitoring_job.monitoring_private_networking_enforced
  for_each: gcp.aiplatform.projects.locations.endpoints.list
  severity: HIGH
  conditions:
    var: item.network
    op: exists
    value: null
- rule_id: gcp.aiplatform.model_deployment_monitoring_job.monitoring_roles_least_privilege
  for_each: gcp.aiplatform.projects.locations.endpoints.list
  severity: HIGH
  conditions:
    var: item.serviceAccount
    op: exists
    value: null
- rule_id: gcp.aiplatform.pipeline_job.human_review_artifacts_encrypted
  for_each: gcp.aiplatform.projects.locations.batchPredictionJobs.list
  severity: MEDIUM
  conditions:
    var: item.encryptionSpec
    op: exists
    value: null
- rule_id: gcp.aiplatform.pipeline_job.human_review_ui_private_networking_enforced
  for_each: gcp.aiplatform.projects.locations.batchPredictionJobs.list
  severity: HIGH
  conditions:
    var: item.network
    op: exists
    value: null
- rule_id: gcp.aiplatform.pipeline_job.human_review_workteam_access_rbac_least_privilege
  for_each: gcp.aiplatform.projects.locations.pipelineJobs.list
  severity: HIGH
  conditions:
    var: item.runtimeConfig.defaultParams.humanReviewConfig.workforceSpec.workforce
    op: exists
    value: null
- rule_id: gcp.aiplatform.pipeline_job.pipeline_artifacts_private_and_encrypted
  for_each: gcp.aiplatform.projects.locations.batchPredictionJobs.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.encryptionSpec
      op: exists
      value: null
    - var: item.network
      op: not_contains
      value: public
- rule_id: gcp.aiplatform.pipeline_job.pipeline_kms_encryption_enabled
  for_each: gcp.aiplatform.projects.locations.batchPredictionJobs.list
  severity: HIGH
  conditions:
    var: item.encryptionSpec
    op: exists
    value: null
- rule_id: gcp.aiplatform.pipeline_job.pipeline_logging_enabled
  for_each: gcp.aiplatform.projects.locations.batchPredictionJobs.list
  severity: MEDIUM
  conditions:
    var: item.pipelineSpec
    op: exists
    value: null
- rule_id: gcp.aiplatform.pipeline_job.pipeline_roles_least_privilege
  for_each: gcp.aiplatform.projects.locations.pipelineJobs.list
  severity: HIGH
  conditions:
    all:
    - var: item.serviceAccount
      op: exists
      value: null
    - var: item.serviceAccount
      op: not_equals
      value: default
- rule_id: gcp.aiplatform.training_pipeline.training_job_input_output_encrypted
  for_each: gcp.aiplatform.projects.locations.customJobs.list
  severity: MEDIUM
  conditions:
    var: item.encryptionSpec
    op: exists
    value: null
- rule_id: gcp.aiplatform.training_pipeline.training_job_logs_enabled
  for_each: gcp.aiplatform.projects.locations.customJobs.list
  severity: MEDIUM
  conditions:
    var: item.pipelineSpec
    op: exists
    value: null
- rule_id: gcp.aiplatform.training_pipeline.training_job_private_networking_enforced
  for_each: gcp.aiplatform.projects.locations.customJobs.list
  severity: HIGH
  conditions:
    var: item.network
    op: exists
    value: null
- rule_id: gcp.aiplatform.training_pipeline.training_job_roles_least_privilege
  for_each: gcp.aiplatform.projects.locations.customJobs.list
  severity: HIGH
  conditions:
    var: item.serviceAccount
    op: exists
    value: null
