version: '1.0'
provider: gcp
service: cloudrun
checks:
- rule_id: gcp.cloudrun.activity.create_service
  for_each: gcp.cloudrun.list_services
  severity: MEDIUM
  conditions:
    var: item.metadata.labels['cloud.googleapis.com/location']
    op: exists
    value: null
- rule_id: gcp.cloudrun.activity.replace_service
  for_each: gcp.cloudrun.list_services
  severity: MEDIUM
  conditions:
    var: item.metadata.annotations['run.googleapis.com/ingress']
    op: equals
    value: internal
