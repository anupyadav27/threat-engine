version: '1.0'
provider: gcp
service: filestore
checks:
- rule_id: gcp.filestore.instance.backup_enabled
  for_each: gcp.filestore.list_instances
  severity: MEDIUM
  conditions:
    var: item.BackupConfig.Enabled
    op: is_true
    value: null
- rule_id: gcp.filestore.instance.encryption_at_rest_enabled
  for_each: gcp.filestore.list_instances
  severity: MEDIUM
  conditions:
    var: item.encryptionKeys
    op: not_empty
    value: null
- rule_id: gcp.filestore.instance.have_backup_enabled
  for_each: gcp.filestore.list_instances
  severity: MEDIUM
  conditions:
    var: item.FileShares[].BackupConfig.Enabled
    op: is_true
    value: null
