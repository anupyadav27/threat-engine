version: '1.0'
provider: gcp
service: secretmanager
checks:
- rule_id: gcp.secretmanager.alias.alias_alias_points_to_active_key
  for_each: gcp.secretmanager.projects.secrets.list
  severity: CRITICAL
  conditions:
    var: item.versionAliases
    op: exists
    value: null
- rule_id: gcp.secretmanager.alias.alias_key_has_alias
  for_each: gcp.secretmanager.projects.secrets.list
  severity: CRITICAL
  conditions:
    var: item.versionAliases
    op: not_empty
    value: null
- rule_id: gcp.secretmanager.certificate.certificate_key_length_minimum
  for_each: gcp.secretmanager.projects.secrets.versions.list
  severity: CRITICAL
  conditions:
    all:
    - var: item.name
      op: contains
      value: certificate
    - var: item.key_length
      op: gte
      value: '2048'
- rule_id: gcp.secretmanager.certificate.certificate_not_expired
  for_each: gcp.secretmanager.projects.secrets.versions.list
  severity: CRITICAL
  conditions:
    var: item.expireTime
    op: gt
    value: now
- rule_id: gcp.secretmanager.certificate.certificate_trusted_issuer
  for_each: gcp.secretmanager.projects.secrets.list
  severity: CRITICAL
  conditions:
    all:
    - var: item.replication.userManaged.replicas[].customerManagedEncryption.kmsKeyName
      op: exists
      value: null
    - var: item.labels.certificate_trusted_issuer
      op: equals
      value: 'true'
- rule_id: gcp.secretmanager.grant.kms_grant_constraints_present
  for_each: gcp.secretmanager.projects.secrets.list
  severity: CRITICAL
  conditions:
    var: item.customerManagedEncryption
    op: exists
    value: null
- rule_id: gcp.secretmanager.grant.kms_grant_grantee_principal_valid
  for_each: gcp.secretmanager.projects.secrets.list
  severity: CRITICAL
  conditions:
    var: item.customerManagedEncryption
    op: exists
    value: null
- rule_id: gcp.secretmanager.grant.kms_grant_lessthan_wildcard_permissions
  for_each: gcp.secretmanager.projects.secrets.list
  severity: CRITICAL
  conditions:
    var: item.customerManagedEncryption
    op: exists
    value: null
- rule_id: gcp.secretmanager.parameter.parameter_access_rbac_least_privilege
  for_each: gcp.secretmanager.projects.secrets.list
  severity: HIGH
  conditions:
    all:
    - var: item.name
      op: exists
      value: null
    - var: item.annotations['iam.gke.io/gcp-service-account']
      op: not_exists
      value: null
- rule_id: gcp.secretmanager.parameter.parameter_kms_key_configured
  for_each: gcp.secretmanager.projects.secrets.list
  severity: HIGH
  conditions:
    var: item.customerManagedEncryption
    op: exists
    value: null
- rule_id: gcp.secretmanager.parameter.parameter_secure_string_type_for_sensitive
  for_each: gcp.secretmanager.projects.secrets.list
  severity: CRITICAL
  conditions:
    var: item.labels.secret-type
    op: equals
    value: secure-string
- rule_id: gcp.secretmanager.private_ca.private_ca_ca_access_rbac_least_privilege
  for_each: gcp.secretmanager.projects.secrets.list
  severity: HIGH
  conditions:
    all:
    - var: item.name
      op: contains
      value: privateCa
    - var: item.labels
      op: exists
      value: null
    - var: item.labels.role
      op: not_equals
      value: owner
- rule_id: gcp.secretmanager.private_ca.private_ca_ca_key_in_hsm_where_supported
  for_each: gcp.secretmanager.projects.secrets.list
  severity: CRITICAL
  conditions:
    var: item.customerManagedEncryption
    op: exists
    value: null
- rule_id: gcp.secretmanager.private_ca.private_ca_crl_or_ocsp_configured
  for_each: gcp.secretmanager.projects.secrets.list
  severity: CRITICAL
  conditions:
    var: item.replication
    op: exists
    value: null
- rule_id: gcp.secretmanager.private_ca.private_ca_path_length_constraints_set
  for_each: gcp.secretmanager.projects.secrets.list
  severity: CRITICAL
  conditions:
    all:
    - var: item.name
      op: contains
      value: private-ca
    - var: item.replication
      op: exists
      value: null
- rule_id: gcp.secretmanager.secret.secret_kms_key_configured
  for_each: gcp.secretmanager.projects.secrets.list
  severity: HIGH
  conditions:
    var: item.customerManagedEncryption
    op: exists
    value: null
- rule_id: gcp.secretmanager.secret.secret_no_plaintext_exposed_in_policy_or_tags
  for_each: gcp.secretmanager.projects.secrets.list
  severity: CRITICAL
  conditions:
    all:
    - var: item.tags
      op: not_exists
      value: null
    - var: item.annotations
      op: not_exists
      value: null
- rule_id: gcp.secretmanager.secret.secret_rotation_configured_where_applicable
  for_each: gcp.secretmanager.projects.secrets.list
  severity: CRITICAL
  conditions:
    var: item.rotation
    op: exists
    value: null
- rule_id: gcp.secretmanager.store.store_access_rbac_least_privilege
  for_each: gcp.secretmanager.projects.secrets.list
  severity: HIGH
  conditions:
    all:
    - var: item.name
      op: exists
      value: null
    - var: item.replication
      op: exists
      value: null
- rule_id: gcp.secretmanager.store.store_kms_encryption_enabled
  for_each: gcp.secretmanager.projects.secrets.list
  severity: HIGH
  conditions:
    var: item.customerManagedEncryption
    op: exists
    value: null
- rule_id: gcp.secretmanager.store.store_rotation_enabled_for_rotatable_secrets
  for_each: gcp.secretmanager.projects.secrets.list
  severity: HIGH
  conditions:
    all:
    - var: item.rotation
      op: exists
      value: null
    - var: item.rotation.nextRotationTime
      op: exists
      value: null
