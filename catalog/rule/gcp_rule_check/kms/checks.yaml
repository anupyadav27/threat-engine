version: '1.0'
provider: gcp
service: kms
checks:
- rule_id: gcp.kms.cryptokey.iam_member_configured
  for_each: gcp.cloudkms.projects.locations.keyRings.cryptoKeys.cryptoKeyVersions.list
  severity: MEDIUM
  conditions:
    var: item.algorithm
    op: is_true
- rule_id: gcp.kms.cryptokey.rotation_schedule_configured
  for_each: gcp.cloudkms.projects.locations.keyRings.cryptoKeys.cryptoKeyVersions.list
  severity: MEDIUM
  conditions:
    var: item.algorithm
    op: is_true
