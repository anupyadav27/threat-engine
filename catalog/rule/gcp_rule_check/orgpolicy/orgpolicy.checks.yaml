version: '1.0'
provider: gcp
service: orgpolicy
checks:
- rule_id: gcp.orgpolicy.activity.create_policy
  for_each: gcp.orgpolicy.list_policies
  severity: MEDIUM
  conditions:
    var: item
    op: exists
    value: null
- rule_id: gcp.orgpolicy.activity.update_policy
  for_each: gcp.orgpolicy.list_policies
  severity: MEDIUM
  conditions:
    var: item.updateTime
    op: not_exists
    value: null
