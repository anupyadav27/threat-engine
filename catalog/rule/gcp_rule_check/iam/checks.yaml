version: '1.0'
provider: gcp
service: iam
checks:
- rule_id: gcp.iam.account.access_approval_enabled
  for_each: gcp.iam.projects.serviceAccounts.list
  severity: MEDIUM
  conditions:
    var: item.description
    op: is_true
- rule_id: gcp.iam.account.password_policy_minimum_length_configured
  for_each: gcp.iam.projects.serviceAccounts.list
  severity: MEDIUM
  conditions:
    var: item.description
    op: is_true
- rule_id: gcp.iam.group.has_users_check
  for_each: gcp.iam.locations.workforcePools.list
  severity: MEDIUM
  conditions:
    var: item.accessRestrictions
    op: is_true
- rule_id: gcp.iam.no.guest_accounts_with_permissions_restricted
  for_each: gcp.iam.projects.serviceAccounts.list
  severity: MEDIUM
  conditions:
    var: item.description
    op: is_true
- rule_id: gcp.iam.notification.group_mapping_configured
  for_each: gcp.iam.locations.workforcePools.list
  severity: MEDIUM
  conditions:
    var: item.accessRestrictions
    op: is_true
- rule_id: gcp.iam.organization.essential_contacts_configured
  for_each: gcp.iam.organizations.roles.list
  severity: MEDIUM
  conditions:
    var: item.deleted
    op: is_true
- rule_id: gcp.iam.policy.condition_ip_configured
  for_each: gcp.iam.locations.workforcePools.list
  severity: MEDIUM
  conditions:
    var: item.accessRestrictions
    op: is_true
- rule_id: gcp.iam.policy.deny_maintenance_tools_restricted
  for_each: gcp.iam.locations.workforcePools.list
  severity: MEDIUM
  conditions:
    var: item.accessRestrictions
    op: is_true
- rule_id: gcp.iam.policy.temporary_token_expiry_configured
  for_each: gcp.iam.locations.workforcePools.providers.scimTenants.tokens.list
  severity: MEDIUM
  conditions:
    var: item.displayName
    op: is_true
- rule_id: gcp.iam.policy_binding.external_principals_configured
  for_each: gcp.iam.locations.workforcePools.list
  severity: MEDIUM
  conditions:
    var: item.accessRestrictions
    op: is_true
- rule_id: gcp.iam.role.custom_role_change_control_configured
  for_each: gcp.iam.organizations.roles.list
  severity: MEDIUM
  conditions:
    var: item.deleted
    op: is_true
- rule_id: gcp.iam.role.custom_role_permissions_restricted
  for_each: gcp.iam.organizations.roles.list
  severity: MEDIUM
  conditions:
    var: item.includedPermissions
    op: not_contains
    value: '*'
- rule_id: gcp.iam.role.permission_configured
  for_each: gcp.iam.organizations.roles.list
  severity: MEDIUM
  conditions:
    var: item.includedPermissions
    op: not_contains
    value: '*'
- rule_id: gcp.iam.service.account_sod_check
  for_each: gcp.iam.projects.serviceAccounts.list
  severity: MEDIUM
  conditions:
    var: item.description
    op: is_true
- rule_id: gcp.iam.service_account.account_management_enabled
  for_each: gcp.iam.projects.serviceAccounts.list
  severity: MEDIUM
  conditions:
    var: item.description
    op: is_true
- rule_id: gcp.iam.user.mfa_enabled
  for_each: gcp.iam.locations.workforcePools.list
  severity: MEDIUM
  conditions:
    var: item.accessRestrictions
    op: is_true
- rule_id: gcp.resourcemanager.organization.hierarchy_configured
  for_each: gcp.cloudresourcemanager.organizations.get
  severity: MEDIUM
  conditions:
    var: item.creationTime
    op: is_true
