version: '1.0'
provider: gcp
service: apigateway
checks:
- rule_id: gcp.apigateway.api.api_endpoint_authn_required
  for_each: gcp.apigateway.projects.locations.apis.configs.list
  severity: HIGH
  conditions:
    var: item.apiConfig.endpoint
    op: exists
    value: null
- rule_id: gcp.apigateway.api.api_endpoint_authz_policies_enforced
  for_each: gcp.apigateway.projects.locations.apis.configs.list
  severity: HIGH
  conditions:
    var: item.apiConfig.endpoint
    op: exists
    value: null
- rule_id: gcp.apigateway.api.api_endpoint_private_networking_enforced
  for_each: gcp.apigateway.projects.locations.apis.list
  severity: HIGH
  conditions:
    var: item.apiConfig.endpoint
    op: not_contains
    value: googleapis.com
- rule_id: gcp.apigateway.api.api_endpoint_waf_attached
  for_each: gcp.apigateway.projects.locations.gateways.list
  severity: MEDIUM
  conditions:
    var: item.apiConfig
    op: exists
    value: null
- rule_id: gcp.apigateway.api_config.authorizer_cache_ttl_reasonable
  for_each: gcp.apigateway.projects.locations.apis.configs.list
  severity: MEDIUM
  conditions:
    var: item.apiConfig.authorizerCacheTtl
    op: exists
    value: null
- rule_id: gcp.apigateway.api_config.authorizer_tls_min_1_2_enforced
  for_each: gcp.apigateway.projects.locations.apis.configs.list
  severity: HIGH
  conditions:
    var: item.apiConfig.keyStorageType
    op: exists
    value: null
- rule_id: gcp.apigateway.api_config.authorizer_token_audience_restricted
  for_each: gcp.apigateway.projects.locations.apis.configs.list
  severity: MEDIUM
  conditions:
    var: item.apiConfig.endpoint
    op: exists
    value: null
- rule_id: gcp.apigateway.api_config.stage_logging_enabled
  for_each: gcp.apigateway.projects.locations.apis.configs.list
  severity: MEDIUM
  conditions:
    var: item.apiConfig
    op: exists
    value: null
- rule_id: gcp.apigateway.api_config.stage_require_usage_plan_for_api_keys
  for_each: gcp.apigateway.projects.locations.apis.configs.list
  severity: MEDIUM
  conditions:
    var: item.apiConfig.keyStorageType
    op: exists
    value: null
- rule_id: gcp.apigateway.api_config.stage_throttling_enabled
  for_each: gcp.apigateway.projects.locations.apis.configs.list
  severity: MEDIUM
  conditions:
    var: item.apiConfig
    op: exists
    value: null
- rule_id: gcp.apigateway.api_config.usage_plan_quota_limits_configured
  for_each: gcp.apigateway.projects.locations.apis.configs.list
  severity: MEDIUM
  conditions:
    var: item.apiConfig
    op: exists
    value: null
- rule_id: gcp.apigateway.api_config.usage_plan_rate_limits_configured
  for_each: gcp.apigateway.projects.locations.apis.configs.list
  severity: MEDIUM
  conditions:
    var: item.apiConfig
    op: exists
    value: null
