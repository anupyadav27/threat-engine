version: '1.0'
provider: gcp
service: storage
checks:
- rule_id: gcp.storage.bucket.replication_enabled
  for_each: gcp.storage.buckets.list
  severity: MEDIUM
  conditions:
    var: item.acl
    op: not_contains
    value: '*'
- rule_id: gcp.storage.bucket.cross_project_replication_disabled
  for_each: gcp.storage.buckets.list
  severity: MEDIUM
  conditions:
    var: item.acl
    op: not_contains
    value: '*'
- rule_id: gcp.storage.bucket.signed_url_expiry_configured
  for_each: gcp.storage.buckets.list
  severity: MEDIUM
  conditions:
    var: item.acl
    op: not_contains
    value: '*'
- rule_id: gcp.storage.multi.region_configured
  for_each: gcp.storage.buckets.list
  severity: MEDIUM
  conditions:
    var: item.acl
    op: not_contains
    value: '*'
