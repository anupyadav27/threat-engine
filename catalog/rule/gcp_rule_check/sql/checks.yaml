version: '1.0'
provider: gcp
service: sql
checks:
- rule_id: gcp.sql.backup.retention_configured
  for_each: gcp.sqladmin.Backups.ListBackups
  severity: MEDIUM
  conditions:
    var: item.backupInterval
    op: is_true
- rule_id: gcp.sql.instance.high_availability_enabled
  for_each: gcp.sqladmin.instances.list
  severity: MEDIUM
  conditions:
    var: item.diskEncryptionStatus
    op: equals
    value: Active
- rule_id: gcp.sql.instance.enhanced_monitoring_enabled
  for_each: gcp.sqladmin.instances.list
  severity: MEDIUM
  conditions:
    var: item.diskEncryptionStatus
    op: equals
    value: Active
- rule_id: gcp.sql.instance.local_infile_flag_disabled
  for_each: gcp.sqladmin.instances.list
  severity: MEDIUM
  conditions:
    var: item.diskEncryptionStatus
    op: equals
    value: Active
- rule_id: gcp.sql.instance.log_error_verbosity_check
  for_each: gcp.sqladmin.instances.list
  severity: MEDIUM
  conditions:
    var: item.diskEncryptionStatus
    op: equals
    value: Active
- rule_id: gcp.sql.instance.log_min_messages_compliance_check
  for_each: gcp.sqladmin.instances.list
  severity: MEDIUM
  conditions:
    var: item.diskEncryptionStatus
    op: equals
    value: Active
- rule_id: gcp.sql.instance.user_connections_flag_non_limiting_configured
  for_each: gcp.sqladmin.instances.list
  severity: MEDIUM
  conditions:
    var: item.diskEncryptionStatus
    op: equals
    value: Active
- rule_id: gcp.sql.instance.user_options_flag_not_configured
  for_each: gcp.sqladmin.instances.list
  severity: MEDIUM
  conditions:
    var: item.diskEncryptionStatus
    op: equals
    value: Active
- rule_id: gcp.sql.multi.az_enabled
  for_each: gcp.sqladmin.Backups.ListBackups
  severity: MEDIUM
  conditions:
    var: item.backupInterval
    op: is_true
- rule_id: gcp.sql.mysql.skip_show_database_flag_check
  for_each: gcp.sqladmin.flags.list
  severity: MEDIUM
  conditions:
    var: item.allowedIntValues
    op: is_true
- rule_id: gcp.sql.postgresql.log_connections_flag_check
  for_each: gcp.sqladmin.flags.list
  severity: MEDIUM
  conditions:
    var: item.allowedIntValues
    op: is_true
- rule_id: gcp.sql.postgresql.log_disconnections_flag_enabled
  for_each: gcp.sqladmin.flags.list
  severity: MEDIUM
  conditions:
    var: item.allowedIntValues
    op: is_true
- rule_id: gcp.sql.postgresql.log_min_error_statement_compliance_check
  for_each: gcp.sqladmin.Backups.ListBackups
  severity: MEDIUM
  conditions:
    var: item.backupInterval
    op: is_true
- rule_id: gcp.sql.postgresql.log_statement_flag_check
  for_each: gcp.sqladmin.flags.list
  severity: MEDIUM
  conditions:
    var: item.allowedIntValues
    op: is_true
- rule_id: gcp.sql.sqlserver.trace_flag_3625_enabled
  for_each: gcp.sqladmin.flags.list
  severity: MEDIUM
  conditions:
    var: item.allowedIntValues
    op: is_true
