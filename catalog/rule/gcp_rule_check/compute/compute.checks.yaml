version: '1.0'
provider: gcp
service: compute
checks:
- rule_id: gcp.compute.access_control.access_control_no_permit_all
  for_each: gcp.compute.list_firewalls
  severity: HIGH
  conditions:
    all:
    - var: item.direction
      op: equals
      value: INGRESS
    - var: item.allowed[].ports[]
      op: not_contains
      value: 0-65535
    - var: item.sourceRanges[]
      op: not_contains
      value: 0.0.0.0/0
- rule_id: gcp.compute.access_control.access_control_policies_present
  for_each: gcp.compute.firewalls.list
  severity: HIGH
  conditions:
    var: item
    op: not_empty
    value: null
- rule_id: gcp.compute.access_control.access_control_policy_store_encrypted
  for_each: gcp.compute.list_instances
  severity: HIGH
  conditions:
    var: item.disks[].diskEncryptionKey.kmsKeyName
    op: exists
    value: null
- rule_id: gcp.compute.address.ip_set_cidrs_valid_and_minimized
  for_each: gcp.compute.list_addresses
  severity: MEDIUM
  conditions:
    all:
    - var: item.IpCidrRange
      op: exists
      value: null
    - var: item.IpCidrRange
      op: not_equals
      value: 0.0.0.0/0
    - var: item.IpCidrRange
      op: not_contains
      value: ::/0
- rule_id: gcp.compute.address.ip_set_cross_account_sharing_restricted
  for_each: gcp.compute.addresses.list
  severity: MEDIUM
  conditions:
    var: item.users[].split(':')[0]
    op: not_contains
    value: allAuthenticatedUsers
- rule_id: gcp.compute.address.ip_set_not_empty
  for_each: gcp.compute.list_addresses
  severity: MEDIUM
  conditions:
    var: item.Address
    op: not_empty
    value: null
- rule_id: gcp.compute.address.ip_set_used_by_at_least_one_rule
  for_each: gcp.compute.list_addresses
  severity: MEDIUM
  conditions:
    var: item.usedBy
    op: not_empty
    value: null
- rule_id: gcp.compute.anomaly_detection.anomaly_destinations_encrypted
  for_each: gcp.compute.list_instances
  severity: HIGH
  conditions:
    all:
    - var: item.disks[].diskEncryptionKey.kmsKeyName
      op: exists
      value: null
    - var: item.networkInterfaces[].accessConfigs[].natIP
      op: not_exists
      value: null
- rule_id: gcp.compute.anomaly_detection.anomaly_detectors_enabled
  for_each: gcp.compute.list_instances
  severity: HIGH
  conditions:
    all:
    - var: item.Labels['anomaly-detection-enabled']
      op: exists
      value: null
    - var: item.Labels['anomaly-detection-enabled']
      op: equals
      value: 'true'
- rule_id: gcp.compute.automation.automation_artifacts_encrypted_and_private
  for_each: gcp.compute.automation.list_automation_artifacts
  severity: MEDIUM
  conditions:
    all:
    - var: item.encryption
      op: exists
      value: null
    - var: item.encryption.encryption_type
      op: equals
      value: CUSTOMER_MANAGED
    - var: item.visibility
      op: not_equals
      value: PUBLIC
- rule_id: gcp.compute.automation.automation_execution_roles_least_privilege
  for_each: gcp.compute.automation.list_automations
  severity: HIGH
  conditions:
    all:
    - var: item.automationExecutionRoles[].role
      op: in
      value:
      - roles/compute.automationExecutionUser
      - roles/compute.automationExecutionViewer
- rule_id: gcp.compute.automation.automation_remediation_roles_least_privilege
  for_each: gcp.compute.automation.list_automations
  severity: HIGH
  conditions:
    var: item.remediationRoles[].permissions
    op: not_contains
    value: '*'
- rule_id: gcp.compute.automation.dr_automation_change_audit_logging_enabled
  for_each: gcp.compute.automation.list_automations
  severity: HIGH
  conditions:
    var: item.changeAuditLoggingEnabled
    op: is_true
    value: null
- rule_id: gcp.compute.automation.netsec_automation_change_audit_logging_enabled
  for_each: gcp.compute.automation.list_netsec_automations
  severity: HIGH
  conditions:
    var: item.changeAuditLoggingEnabled
    op: is_true
    value: null
- rule_id: gcp.compute.backend_service.cdn_access_logging_enabled
  for_each: gcp.compute.backend_services.list
  severity: MEDIUM
  conditions:
    var: item.cdnPolicy.enableLogging
    op: is_true
    value: null
- rule_id: gcp.compute.backend_service.cdn_cache_key_excludes_sensitive_headers
  for_each: gcp.compute.list_backend_services
  severity: MEDIUM
  conditions:
    all:
    - var: item.cdnPolicy.cacheKeyPolicy.includeHttpHeaders[]
      op: not_contains
      value: Authorization
    - var: item.cdnPolicy.cacheKeyPolicy.includeHttpHeaders[]
      op: not_contains
      value: Cookie
    - var: item.cdnPolicy.cacheKeyPolicy.includeHttpHeaders[]
      op: not_contains
      value: Proxy-Authorization
- rule_id: gcp.compute.backend_service.cdn_cache_key_minimal_query_and_cookie_variants
  for_each: gcp.compute.list_backend_services
  severity: MEDIUM
  conditions:
    all:
    - var: item.CdnPolicy.CacheKeyPolicy.IncludeHost
      op: is_true
      value: null
    - var: item.CdnPolicy.CacheKeyPolicy.IncludeProtocol
      op: is_true
      value: null
    - var: item.CdnPolicy.CacheKeyPolicy.IncludeQueryString
      op: is_true
      value: null
    - var: item.CdnPolicy.CacheKeyPolicy.QueryStringWhitelist
      op: exists
      value: null
    - var: item.CdnPolicy.CacheKeyPolicy.QueryStringBlacklist
      op: not_exists
      value: null
    - var: item.CdnPolicy.CacheKeyPolicy.IncludeHttpHeaders
      op: exists
      value: null
    - var: item.CdnPolicy.CacheKeyPolicy.IncludeHttpHeaders[].header_name
      op: contains
      value: Cookie
- rule_id: gcp.compute.backend_service.cdn_hsts_enabled
  for_each: gcp.compute.list_backend_services
  severity: MEDIUM
  conditions:
    var: item.CdnPolicy.SecurityPolicy.IncludeHost
    op: exists
    value: null
- rule_id: gcp.compute.backend_service.cdn_https_only_viewer_protocol
  for_each: gcp.compute.list_backend_services
  severity: MEDIUM
  conditions:
    var: item.CdnPolicy.SignedUrlKeyNames[]
    op: not_exists
    value: null
- rule_id: gcp.compute.backend_service.cdn_origin_access_restricted
  for_each: gcp.compute.backend_services.list
  severity: MEDIUM
  conditions:
    var: item.cdnPolicy.signedUrlKeyNames[]
    op: not_contains
    value: '*'
- rule_id: gcp.compute.backend_service.cdn_signed_urls_or_headers_required_for_private_content
  for_each: gcp.compute.list_backend_services
  severity: MEDIUM
  conditions:
    all:
    - var: item.CdnPolicy
      op: exists
      value: null
    - any:
      - var: item.CdnPolicy.SignedUrlKeyNames
        op: not_empty
        value: null
      - var: item.CdnPolicy.SignedUrlCacheMaxAgeSec
        op: exists
        value: null
- rule_id: gcp.compute.backend_service.cdn_tls_min_1_2_enforced
  for_each: gcp.compute.backend_services.list
  severity: HIGH
  conditions:
    var: item.cdnPolicy.signedUrlCacheMaxAgeSec
    op: exists
    value: null
- rule_id: gcp.compute.backend_service.cdn_valid_trusted_certificate_attached
  for_each: gcp.compute.list_backend_services
  severity: MEDIUM
  conditions:
    var: item.CdnPolicy.SignedUrlKeyNames[]
    op: not_empty
    value: null
- rule_id: gcp.compute.backend_service.cdn_waf_web_acl_attached
  for_each: gcp.compute.list_backend_services
  severity: MEDIUM
  conditions:
    var: item.CdnPolicy.WebAclId
    op: exists
    value: null
- rule_id: gcp.compute.backend_service.tg_health_checks_tls_where_supported
  for_each: gcp.compute.backend_services.list
  severity: HIGH
  conditions:
    all:
    - var: item.protocol
      op: in
      value:
      - HTTPS
      - SSL
      - TCP
    - var: item.healthChecks
      op: not_empty
      value: null
- rule_id: gcp.compute.backend_service.tg_targets_in_private_subnets
  for_each: gcp.compute.list_backend_services
  severity: HIGH
  conditions:
    all:
    - var: item.backends[].group
      op: exists
      value: null
    - var: item.backends[].group
      op: not_contains
      value: https://www.googleapis.com/compute/v1/projects/
- rule_id: gcp.compute.dedicated_host.dedicated_host_host_sharing_restricted
  for_each: gcp.compute.dedicated_hosts.list
  severity: HIGH
  conditions:
    var: item.hostSharingPolicy
    op: equals
    value: RESTRICTED
- rule_id: gcp.compute.dedicated_host.dedicated_host_instance_auto_placement_controlled
  for_each: gcp.compute.list_dedicated_hosts
  severity: HIGH
  conditions:
    var: item.autoPlacement
    op: equals
    value: NONE
- rule_id: gcp.compute.disk.disk_cmk_cmek_configured
  for_each: gcp.compute.disks.list
  severity: CRITICAL
  conditions:
    var: item.diskEncryptionKey.kmsKeyName
    op: exists
    value: null
- rule_id: gcp.compute.disk.disk_encryption_at_rest_enabled
  for_each: gcp.compute.list_disks
  severity: HIGH
  conditions:
    var: item.diskEncryptionKey.kmsKeyName
    op: exists
    value: null
- rule_id: gcp.compute.disk.disk_snapshots_encrypted
  for_each: gcp.compute.list_disks
  severity: HIGH
  conditions:
    var: item.DiskEncryptionKey
    op: exists
    value: null
- rule_id: gcp.compute.disk.disk_snapshots_not_public
  for_each: gcp.compute.list_disks
  severity: HIGH
  conditions:
    all:
    - var: item.iamPolicy.bindings[].members[]
      op: not_contains
      value: allUsers
    - var: item.iamPolicy.bindings[].members[]
      op: not_contains
      value: allAuthenticatedUsers
- rule_id: gcp.compute.disk.replication_auth_roles_least_privilege
  for_each: gcp.compute.list_disks
  severity: HIGH
  conditions:
    all:
    - var: item.guestOsFeatures[].type
      op: contains
      value: GVNIC
    - var: item.guestOsFeatures[].type
      op: not_contains
      value: VIRTIO_SCSI_MULTIQUEUE
- rule_id: gcp.compute.disk.replication_cross_region_replication_encrypted
  for_each: gcp.compute.disks.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.replicaZones
      op: exists
      value: null
    - var: item.diskEncryptionKey.kmsKeyName
      op: exists
      value: null
- rule_id: gcp.compute.disk.replication_encryption_in_transit_tls_required
  for_each: gcp.compute.disks.list
  severity: HIGH
  conditions:
    all:
    - var: item.replicaZones
      op: exists
      value: null
    - var: item.diskEncryptionKey.kmsKeyName
      op: exists
      value: null
- rule_id: gcp.compute.disk.replication_lag_monitoring_alerts_enabled
  for_each: gcp.compute.list_disks
  severity: MEDIUM
  conditions:
    all:
    - var: item.ReplicationLagMonitoringAlertPolicy
      op: exists
      value: null
    - var: item.ReplicationLagMonitoringAlertPolicy.Enabled
      op: is_true
      value: null
- rule_id: gcp.compute.disk.volume_cmk_cmek_configured
  for_each: gcp.compute.disks.list
  severity: CRITICAL
  conditions:
    var: item.diskEncryptionKey.kmsKeyName
    op: exists
    value: null
- rule_id: gcp.compute.disk.volume_encryption_at_rest_enabled
  for_each: gcp.compute.disks.list
  severity: HIGH
  conditions:
    var: item.diskEncryptionKey.kmsKeyName
    op: exists
    value: null
- rule_id: gcp.compute.disk.volume_snapshots_encrypted
  for_each: gcp.compute.list_disks
  severity: HIGH
  conditions:
    var: item.diskEncryptionKey.kmsKeyName
    op: exists
    value: null
- rule_id: gcp.compute.encryption.encryption_mtls_required_for_internal_services_where_supported
  for_each: gcp.compute.list_instances
  severity: HIGH
  conditions:
    all:
    - var: item.ShieldedInstanceConfig.EnableIntegrityMonitoring
      op: is_true
      value: null
    - var: item.ShieldedInstanceConfig.EnableVtpm
      op: is_true
      value: null
- rule_id: gcp.compute.encryption.encryption_tls_min_1_2_enforced
  for_each: gcp.compute.ssl_policies.list
  severity: HIGH
  conditions:
    all:
    - var: item.minTlsVersion
      op: exists
      value: null
    - var: item.minTlsVersion
      op: in
      value:
      - TLS_1_2
      - TLS_1_3
- rule_id: gcp.compute.firewall.firewall_logging_enabled
  for_each: gcp.compute.firewalls.list
  severity: HIGH
  conditions:
    var: item.logConfig.enable
    op: is_true
    value: null
- rule_id: gcp.compute.firewall.firewall_no_permit_any_any
  for_each: gcp.compute.firewall.list_firewalls
  severity: HIGH
  conditions:
    all:
    - var: item.allowed[].ports[]
      op: not_contains
      value: 0-65535
    - var: item.allowed[].IPProtocol
      op: not_contains
      value: all
- rule_id: gcp.compute.firewall.firewall_rule_groups_attached
  for_each: gcp.compute.firewall.list_firewalls
  severity: HIGH
  conditions:
    var: item.targetTags
    op: exists
    value: null
- rule_id: gcp.compute.firewall.nacl_egress_restricted
  for_each: gcp.compute.firewalls.list
  severity: HIGH
  conditions:
    all:
    - var: item.direction
      op: equals
      value: EGRESS
    - var: item.allowed[].IPProtocol
      op: not_contains
      value: all
    - var: item.destinationRanges[]
      op: not_contains
      value: 0.0.0.0/0
- rule_id: gcp.compute.firewall.nacl_no_allow_all_rules
  for_each: gcp.compute.firewalls.list
  severity: HIGH
  conditions:
    all:
    - var: item.allowed
      op: not_empty
      value: null
    - var: item.allowed[].ports
      op: not_contains
      value: 0-65535
    - var: item.allowed[].IPProtocol
      op: not_equals
      value: all
- rule_id: gcp.compute.firewall.net_sg_egress_restricted
  for_each: gcp.compute.firewalls.list
  severity: HIGH
  conditions:
    all:
    - var: item.direction
      op: equals
      value: EGRESS
    - var: item.allowed[].IPProtocol
      op: not_contains
      value: all
    - var: item.destinationRanges[]
      op: not_contains
      value: 0.0.0.0/0
- rule_id: gcp.compute.firewall.net_sg_no_0_0_0_0_ingress
  for_each: gcp.compute.firewall.list_firewalls
  severity: HIGH
  conditions:
    all:
    - var: item.allowed[].ports[]
      op: not_contains
      value: 0.0.0.0/0
    - var: item.sourceRanges[]
      op: not_contains
      value: 0.0.0.0/0
- rule_id: gcp.compute.firewall.net_sg_only_required_ports_open
  for_each: gcp.compute.list_firewalls
  severity: HIGH
  conditions:
    all:
    - var: item.allowed[].ports[]
      op: in
      value:
      - '80'
      - '443'
      - '22'
- rule_id: gcp.compute.firewall.sg_egress_egress_restricted
  for_each: gcp.compute.firewalls.list
  severity: HIGH
  conditions:
    all:
    - var: item.direction
      op: equals
      value: EGRESS
    - var: item.allowed[].IPProtocol
      op: not_contains
      value: all
    - var: item.destinationRanges[]
      op: not_contains
      value: 0.0.0.0/0
- rule_id: gcp.compute.firewall.sg_ingress_no_0_0_0_0
  for_each: gcp.compute.list_firewalls
  severity: HIGH
  conditions:
    all:
    - var: item.direction
      op: equals
      value: INGRESS
    - var: item.allowed[].ports[]
      op: not_contains
      value: 0.0.0.0/0
- rule_id: gcp.compute.firewall.sg_ingress_only_required_ports
  for_each: gcp.compute.list_firewalls
  severity: HIGH
  conditions:
    all:
    - var: item.allowed[].ports[]
      op: not_in
      value:
      - 0-65535
    - var: item.direction
      op: equals
      value: INGRESS
- rule_id: gcp.compute.firewall.warehouse_sg_egress_restricted
  for_each: gcp.compute.firewalls.list
  severity: HIGH
  conditions:
    all:
    - var: item.direction
      op: equals
      value: EGRESS
    - var: item.allowed[].IPProtocol
      op: not_contains
      value: all
    - var: item.destinationRanges[]
      op: not_contains
      value: 0.0.0.0/0
- rule_id: gcp.compute.firewall.warehouse_sg_no_0_0_0_0_ingress
  for_each: gcp.compute.firewall.list_firewalls
  severity: HIGH
  conditions:
    all:
    - var: item.allowed[].ports[]
      op: not_contains
      value: 0.0.0.0/0
    - var: item.sourceRanges[]
      op: not_contains
      value: 0.0.0.0/0
- rule_id: gcp.compute.firewall.warehouse_sg_only_required_ports_open
  for_each: gcp.compute.firewall.list_firewalls
  severity: HIGH
  conditions:
    all:
    - var: item.allowed[].ports[]
      op: not_contains
      value: 0-65535
    - var: item.direction
      op: equals
      value: INGRESS
    - var: item.disabled
      op: is_false
      value: null
- rule_id: gcp.compute.forwarding_rule.listener_cipher_policy_secure
  for_each: gcp.compute.list_forwarding_rules
  severity: HIGH
  conditions:
    var: item.ListenerCipherPolicy
    op: exists
    value: null
- rule_id: gcp.compute.forwarding_rule.listener_tls_min_1_2
  for_each: gcp.compute.forwarding_rules.list
  severity: HIGH
  conditions:
    var: item.TlsSettings.minTlsVersion
    op: in
    value:
    - TLS_1_2
    - TLS_1_3
- rule_id: gcp.compute.global_address.endpoint_policy_least_privilege
  for_each: gcp.compute.list_global_addresses
  severity: HIGH
  conditions:
    var: item.endpointPolicy
    op: not_exists
    value: null
- rule_id: gcp.compute.global_address.endpoint_private_dns_enabled_where_supported
  for_each: gcp.compute.list_global_addresses
  severity: HIGH
  conditions:
    var: item.PrivateEndpoint.PrivateEndpointNetwork
    op: exists
    value: null
- rule_id: gcp.compute.health_check.health_check_alerts_configured
  for_each: gcp.compute.health_checks.list
  severity: HIGH
  conditions:
    all:
    - var: item.alertPolicies
      op: not_empty
      value: null
    - var: item.alertPolicies[].enabled
      op: is_true
      value: null
- rule_id: gcp.compute.health_check.health_check_https_or_tls_used
  for_each: gcp.compute.health_checks.list
  severity: HIGH
  conditions:
    any:
    - var: item.type
      op: equals
      value: HTTPS
    - var: item.type
      op: equals
      value: SSL
- rule_id: gcp.compute.health_check.health_check_no_plaintext_credentials_in_url
  for_each: gcp.compute.list_health_checks
  severity: HIGH
  conditions:
    var: item.HttpHealthCheck.Host
    op: not_contains
    value:
    - 'user:'
    - 'pass:'
    - 'password:'
    - 'secret:'
    - 'key:'
    - 'token:'
    - 'credential:'
- rule_id: gcp.compute.image.image_approved_image_allowlist_enforced
  for_each: gcp.compute.images.list
  severity: HIGH
  conditions:
    var: item.deprecated.state
    op: not_equals
    value: DEPRECATED
- rule_id: gcp.compute.image.image_encrypted_cmek
  for_each: gcp.compute.images.list
  severity: HIGH
  conditions:
    var: item.diskEncryptionKey.kmsKeyName
    op: exists
    value: null
- rule_id: gcp.compute.image.image_image_signed_and_verified
  for_each: gcp.compute.images.list
  severity: HIGH
  conditions:
    all:
    - var: item.signatures[].publicKeyId
      op: exists
      value: null
    - var: item.signatures[].verificationStatus
      op: equals
      value: VERIFIED
- rule_id: gcp.compute.image.image_not_publicly_shared
  for_each: gcp.compute.images.list
  severity: HIGH
  conditions:
    all:
    - var: item.iamPolicy.bindings[].members[]
      op: not_contains
      value: allUsers
    - var: item.iamPolicy.bindings[].members[]
      op: not_contains
      value: allAuthenticatedUsers
- rule_id: gcp.compute.image.image_vuln_scanned_no_critical
  for_each: gcp.compute.images.list
  severity: HIGH
  conditions:
    var: item.vulnerabilityScanResults[].severity
    op: not_contains
    value: CRITICAL
- rule_id: gcp.compute.instance.instance_disk_encrypted
  for_each: gcp.compute.list_instances
  severity: MEDIUM
  conditions:
    all:
    - var: item.disks[].diskEncryptionKey
      op: exists
      value: null
- rule_id: gcp.compute.instance.instance_no_public_ip_unless_required
  for_each: gcp.compute.list_instances
  severity: HIGH
  conditions:
    all:
    - var: item.networkInterfaces[].accessConfigs
      op: is_empty
      value: null
    - var: item.networkInterfaces[].ipv6AccessConfigs
      op: is_empty
      value: null
- rule_id: gcp.compute.instance.instance_ssh_password_auth_disabled
  for_each: gcp.compute.instances.list
  severity: MEDIUM
  conditions:
    var: item.metadata.items[?(@.key == 'enable-oslogin')].value
    op: contains
    value: 'TRUE'
- rule_id: gcp.compute.instance.testing_execution_roles_least_privilege
  for_each: gcp.compute.list_instances
  severity: HIGH
  conditions:
    all:
    - var: item.serviceAccounts[].scopes[]
      op: not_contains
      value: https://www.googleapis.com/auth/cloud-platform
    - var: item.serviceAccounts[].scopes[]
      op: not_contains
      value: https://www.googleapis.com/auth/compute
- rule_id: gcp.compute.instance.testing_logs_enabled
  for_each: gcp.compute.list_instances
  severity: MEDIUM
  conditions:
    all:
    - var: item.metadata.items[].key
      op: contains
      value: enable-oslogin
    - var: item.metadata.items[?(@.key == 'enable-oslogin')].value
      op: equals
      value: 'TRUE'
- rule_id: gcp.compute.instance.testing_results_storage_encrypted_and_private
  for_each: gcp.compute.list_instances
  severity: MEDIUM
  conditions:
    all:
    - var: item.disks[].diskEncryptionKey.kmsKeyName
      op: exists
      value: null
    - var: item.networkInterfaces[].accessConfigs[].natIP
      op: not_exists
      value: null
- rule_id: gcp.compute.instance.vm_data_volumes_encrypted_cmek
  for_each: gcp.compute.list_instances
  severity: HIGH
  conditions:
    all:
    - var: item.disks[].diskEncryptionKey.kmsKeyName
