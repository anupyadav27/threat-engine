version: '1.0'
provider: gcp
service: compute
checks:
- rule_id: gcp.compute.instance.backup_policy_configured
  for_each: gcp.compute.list_computes
  severity: MEDIUM
  conditions:
    var: item.backup_enabled
    op: is_true
- rule_id: gcp.compute.alb.https_redirect_configured
  for_each: gcp.compute.list_computes
  severity: MEDIUM
  conditions:
    var: item.ssl_enabled
    op: is_true
- rule_id: gcp.compute.autoscaler.configured
  for_each: gcp.compute.list_computes
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: gcp.compute.disk.delete_rule_configured
  for_each: gcp.compute.list_computes
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: gcp.compute.firewall.deny_all_ingress_restricted
  for_each: gcp.compute.list_computes
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
    op: is_true
- rule_id: gcp.compute.firewall.ingress_restricted
  for_each: gcp.compute.list_computes
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
    op: is_true
- rule_id: gcp.compute.firewall.rule_direction_configured
  for_each: gcp.compute.list_computes
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: gcp.compute.image.shielded_vm_enabled
  for_each: gcp.compute.list_computes
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
    op: is_true
- rule_id: gcp.compute.instance.automatic_restart_configured
  for_each: gcp.compute.list_computes
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: gcp.compute.instance.disaster_recovery_enabled
  for_each: gcp.compute.list_computes
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
    op: is_true
- rule_id: gcp.compute.instance.image_scan_enabled
  for_each: gcp.compute.list_computes
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
    op: is_true
- rule_id: gcp.compute.instance.inventory_enabled
  for_each: gcp.compute.list_computes
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
    op: is_true
- rule_id: gcp.compute.instance.ip_forwarding_check
  for_each: gcp.compute.list_computes
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
    op: is_true
- rule_id: gcp.compute.instance.maintenance_behavior_configured
  for_each: gcp.compute.list_computes
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: gcp.compute.instance.maintenance_policy_configured
  for_each: gcp.compute.list_computes
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: gcp.compute.instance.older_than_specific_days_configured
  for_each: gcp.compute.list_computes
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: gcp.compute.instance.os_config_time_sync_configured
  for_each: gcp.compute.list_computes
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: gcp.compute.instance.patch_management_configured
  for_each: gcp.compute.list_computes
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: gcp.compute.instance.recovery_automation_configured
  for_each: gcp.compute.list_computes
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: gcp.compute.instance.required_tags_configured
  for_each: gcp.compute.list_computes
  severity: MEDIUM
  conditions:
    var: item.tags
    op: is_true
- rule_id: gcp.compute.instance_template.metadata_streaming_connection_idle_timeout_configured
  for_each: gcp.compute.list_computes
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: gcp.compute.network.default_in_use_configured
  for_each: gcp.compute.list_computes
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: gcp.compute.network_peering.export_custom_routes_configured
  for_each: gcp.compute.list_computes
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: gcp.compute.region_backend_services.failover_configured
  for_each: gcp.compute.list_computes
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
