version: '1.0'
provider: gcp
service: apigee
checks:
- rule_id: gcp.apigee.rate_limit.rate_limiting_api_quota_limit_configured
  for_each: gcp.apigee.organizations.apiproducts.list
  severity: HIGH
  conditions:
    var: item.quota
    op: exists
    value: null
- rule_id: gcp.apigee.rate_limit.rate_limiting_api_stage_burst_limit_configured
  for_each: gcp.apigee.organizations.apis.list
  severity: HIGH
  conditions:
    var: item.quota
    op: exists
    value: null
- rule_id: gcp.apigee.rate_limit.rate_limiting_api_stage_rate_limit_configured
  for_each: gcp.apigee.organizations.apis.list
  severity: HIGH
  conditions:
    var: item.quota
    op: exists
    value: null
- rule_id: gcp.apigee.rate_limit.rate_limiting_api_stage_throttle_overrides_not_unbounded
  for_each: gcp.apigee.organizations.apis.list
  severity: HIGH
  conditions:
    var: item.quota
    op: exists
    value: null
- rule_id: gcp.apigee.rate_limit.rate_limiting_api_usage_plan_required_for_api_keys
  for_each: gcp.apigee.organizations.apiproducts.list
  severity: HIGH
  conditions:
    var: item.quota
    op: exists
    value: null
- rule_id: gcp.apigee.validation.validation_api_content_type_whitelist_enforced
  for_each: gcp.apigee.organizations.apis.list
  severity: HIGH
  conditions:
    var: item.attributes
    op: contains
    value: validation.api.content-type.whitelist
- rule_id: gcp.apigee.validation.validation_api_parameters_validation_enabled
  for_each: gcp.apigee.organizations.apis.list
  severity: HIGH
  conditions:
    var: item.apiResources
    op: exists
    value: null
- rule_id: gcp.apigee.validation.validation_api_request_body_size_limit_configured
  for_each: gcp.apigee.organizations.apis.list
  severity: HIGH
  conditions:
    var: item.apiResources
    op: not_empty
    value: null
- rule_id: gcp.apigee.validation.validation_api_request_schema_validation_enabled
  for_each: gcp.apigee.organizations.apis.list
  severity: HIGH
  conditions:
    var: item.apiResources
    op: exists
    value: null
- rule_id: gcp.apigee.validation.validation_api_required_security_headers_enforced
  for_each: gcp.apigee.organizations.apis.list
  severity: HIGH
  conditions:
    var: item.attributes
    op: contains
    value: security.headers.enforced
- rule_id: gcp.apigee.validation.validation_api_response_schema_validation_enabled
  for_each: gcp.apigee.organizations.apis.list
  severity: HIGH
  conditions:
    var: item.apiResources
    op: exists
    value: null
