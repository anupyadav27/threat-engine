version: '1.0'
provider: gcp
service: essentialcontacts
checks:
- rule_id: gcp.essentialcontacts.contact.organization_notification_categories_coverage
  for_each: gcp.essentialcontacts.projects.contacts.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.notificationCategorySubscriptions
      op: not_empty
      value: null
    - var: item.validationState
      op: equals
      value: VALID
