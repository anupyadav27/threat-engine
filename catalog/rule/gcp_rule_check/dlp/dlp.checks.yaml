version: '1.0'
provider: gcp
service: dlp
checks:
- rule_id: gcp.dlp.inspect_template.classification_auto_classification_enabled_where_supported
  for_each: gcp.dlp.projects.inspectTemplates.list
  severity: MEDIUM
  conditions:
    var: item.inspectDetails
    op: exists
    value: null
- rule_id: gcp.dlp.inspect_template.classification_policy_blocks_public_for_sensitive
  for_each: gcp.dlp.projects.inspectTemplates.list
  severity: HIGH
  conditions:
    all:
    - var: item.inspectDetails
      op: exists
      value: null
    - var: item.inspectDetails.result.findingsInfoTypes[].name
      op: contains
      value: SENSITIVE_DATA
    - var: item.inspectDetails.result.findingsInfoTypes[].name
      op: not_contains
      value: PUBLIC_DATA
- rule_id: gcp.dlp.inspect_template.classification_required_sensitivity_tags_present
  for_each: gcp.dlp.projects.inspectTemplates.list
  severity: MEDIUM
  conditions:
    var: item.inspectDetails
    op: exists
    value: null
- rule_id: gcp.dlp.job.anonymization_jobs_private_networking
  for_each: gcp.dlp.projects.dlpJobs.list
  severity: HIGH
  conditions:
    var: item.inspectDetails
    op: exists
    value: null
- rule_id: gcp.dlp.job.anonymization_outputs_encrypted
  for_each: gcp.dlp.projects.dlpJobs.list
  severity: HIGH
  conditions:
    var: item.actionDetails
    op: exists
    value: null
- rule_id: gcp.dlp.job.compliance_access_rbac_least_privilege
  for_each: gcp.dlp.projects.dlpJobs.list
  severity: HIGH
  conditions:
    var: item.actionDetails
    op: exists
    value: null
- rule_id: gcp.dlp.job.compliance_export_destinations_private
  for_each: gcp.dlp.projects.dlpJobs.list
  severity: MEDIUM
  conditions:
    var: item.actionDetails
    op: exists
    value: null
- rule_id: gcp.dlp.job.compliance_reports_storage_encrypted
  for_each: gcp.dlp.projects.dlpJobs.list
  severity: MEDIUM
  conditions:
    var: item.inspectDetails.result.processedInfo.storageConfig.outputStoragePath.path
    op: exists
    value: null
- rule_id: gcp.dlp.job.masking_execution_roles_least_privilege
  for_each: gcp.dlp.projects.dlpJobs.list
  severity: HIGH
  conditions:
    var: item.actionDetails
    op: exists
    value: null
- rule_id: gcp.dlp.job.masking_policies_present_for_sensitive_fields
  for_each: gcp.dlp.projects.dlpJobs.list
  severity: HIGH
  conditions:
    var: item.inspectDetails.result.infoTypeStats[].infoType.name
    op: not_empty
    value: null
