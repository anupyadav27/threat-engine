version: '1.0'
provider: gcp
service: cloudfunctions
checks:
- rule_id: gcp.cloudfunctions.function.url_authentication_enabled
  for_each: gcp.cloudfunctions.operations.list
  severity: MEDIUM
  conditions:
    var: item.done
    op: is_true
- rule_id: gcp.cloudfunctions.function.not_publicly_accessible_enforced
  for_each: gcp.cloudfunctions.operations.list
  severity: MEDIUM
  conditions:
    var: item.done
    op: is_true
