version: '1.0'
provider: gcp
service: osconfig
checks:
- rule_id: gcp.osconfig.guest_policy.patch_compliance_configured
  for_each: gcp.osconfig.projects.patchDeployments.list
  severity: MEDIUM
  conditions:
    var: item.state
    op: equals
    value: RUNNING
- rule_id: gcp.osconfig.patch_deployment.baseline_exemptions_have_expiry_and_owner
  for_each: gcp.osconfig.projects.patchDeployments.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.patchConfig.endpoint
      op: exists
      value: null
    - var: item.patchConfig.keyStorageType
      op: exists
      value: null
- rule_id: gcp.osconfig.patch_deployment.baseline_required_controls_present
  for_each: gcp.osconfig.projects.patchDeployments.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.patchConfig
      op: exists
      value: null
    - var: item.patchConfig.rebootConfig
      op: exists
      value: null
    - var: item.patchConfig.windowsUpdate
      op: exists
      value: null
    - var: item.patchConfig.apt
      op: exists
      value: null
    - var: item.patchConfig.yum
      op: exists
      value: null
    - var: item.patchConfig.goo
      op: exists
      value: null
    - var: item.patchConfig.zypper
      op: exists
      value: null
    - var: item.patchConfig.preStep
      op: exists
      value: null
    - var: item.patchConfig.postStep
      op: exists
      value: null
    - var: item.patchConfig.migInstancesAllowed
      op: exists
      value: null
- rule_id: gcp.osconfig.patch_deployment.compliant_patching
  for_each: gcp.osconfig.projects.patchDeployments.list
  severity: MEDIUM
  conditions:
    var: item.state
    op: equals
    value: RUNNING
- rule_id: gcp.osconfig.patch_deployment.config_managed_compliant_patching_configured
  for_each: gcp.osconfig.projects.patchDeployments.list
  severity: MEDIUM
  conditions:
    var: item.patchConfig
    op: exists
    value: null
- rule_id: gcp.osconfig.patch_deployment.maintenance_execution_roles_least_privilege
  for_each: gcp.osconfig.projects.patchDeployments.list
  severity: HIGH
  conditions:
    var: item.patchConfig.endpoint
    op: exists
    value: null
- rule_id: gcp.osconfig.patch_deployment.maintenance_window_defined
  for_each: gcp.osconfig.projects.patchDeployments.list
  severity: MEDIUM
  conditions:
    var: item.recurringSchedule
    op: exists
    value: null
- rule_id: gcp.osconfig.patch_deployment.managed_compliant_patching
  for_each: gcp.osconfig.projects.patchDeployments.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.state
      op: equals
      value: RUNNING
    - var: item.patchConfig
      op: exists
      value: null
- rule_id: gcp.osconfig.patch_deployment.managed_compliant_patching_gcp_gke_cluster_uses_a_su_enabled
  for_each: gcp.osconfig.projects.patchDeployments.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.patchConfig.endpoint
      op: exists
      value: null
    - var: item.patchConfig.keyStorageType
      op: equals
      value: SU_ENABLED
- rule_id: gcp.osconfig.patch_deployment.patch_approval_rules_defined
  for_each: gcp.osconfig.projects.patchDeployments.list
  severity: MEDIUM
  conditions:
    var: item.patchConfig
    op: exists
    value: null
- rule_id: gcp.osconfig.patch_deployment.patch_baseline_defined_for_os_families
  for_each: gcp.osconfig.projects.patchDeployments.list
  severity: MEDIUM
  conditions:
    var: item.patchConfig
    op: exists
    value: null
- rule_id: gcp.osconfig.patch_deployment.patch_deployment_exists_configured
  for_each: gcp.osconfig.projects.patchDeployments.list
  severity: MEDIUM
  conditions:
    var: item.name
    op: exists
    value: null
- rule_id: gcp.osconfig.patch_deployment.patch_maintenance_windows_configured
  for_each: gcp.osconfig.projects.patchDeployments.list
  severity: MEDIUM
  conditions:
    var: item.recurringSchedule
    op: exists
    value: null
- rule_id: gcp.osconfig.patch_deployment.vuln_baseline_exemptions_have_expiry_and_owner
  for_each: gcp.osconfig.projects.patchDeployments.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.patchConfig.rebootConfig
      op: not_equals
      value: NEVER
    - var: item.patchConfig.apt.exclusivePackages
      op: exists
      value: null
    - var: item.patchConfig.yum.excludePackages
      op: exists
      value: null
    - var: item.patchConfig.goo.exclusivePackages
      op: exists
      value: null
    - var: item.patchConfig.zypper.excludePackages
      op: exists
      value: null
    - var: item.patchConfig.windowsUpdate.exclusivePatches
      op: exists
      value: null
    - var: item.patchConfig.preStep.linuxExecStepConfig.gcsObject.bucket
      op: exists
      value: null
    - var: item.patchConfig.postStep.windowsExecStepConfig.interpreter
      op: exists
      value: null
- rule_id: gcp.osconfig.patch_deployment.vuln_baseline_required_controls_present
  for_each: gcp.osconfig.projects.patchDeployments.list
  severity: MEDIUM
  conditions:
    all:
    - var: item.patchConfig
      op: exists
      value: null
    - var: item.patchConfig.rebootConfig
      op: exists
      value: null
    - var: item.patchConfig.apt.security
      op: exists
      value: null
    - var: item.patchConfig.yum.security
      op: exists
      value: null
    - var: item.patchConfig.zypper.security
      op: exists
      value: null
    - var: item.patchConfig.goo.security
      op: exists
      value: null
- rule_id: gcp.osconfig.patch_deployment.vuln_maintenance_execution_roles_least_privilege
  for_each: gcp.osconfig.projects.patchDeployments.list
  severity: HIGH
  conditions:
    all:
    - var: item.patchConfig.endpoint
      op: exists
      value: null
    - var: item.patchConfig.keyStorageType
      op: exists
      value: null
- rule_id: gcp.osconfig.patch_deployment.vuln_maintenance_window_defined
  for_each: gcp.osconfig.projects.patchDeployments.list
  severity: MEDIUM
  conditions:
    var: item.patchConfig
    op: exists
    value: null
- rule_id: gcp.osconfig.patch_deployment.vuln_patch_approval_rules_defined
  for_each: gcp.osconfig.projects.patchDeployments.list
  severity: MEDIUM
  conditions:
    var: item.patchConfig
    op: exists
    value: null
- rule_id: gcp.osconfig.patch_deployment.vuln_patch_baseline_defined_for_families
  for_each: gcp.osconfig.projects.patchDeployments.list
  severity: MEDIUM
  conditions:
    var: item.patchConfig
    op: exists
    value: null
- rule_id: gcp.osconfig.patch_deployment.vuln_patch_maintenance_windows_configured
  for_each: gcp.osconfig.projects.patchDeployments.list
  severity: MEDIUM
  conditions:
    var: item.patchConfig
    op: exists
    value: null
