version: '1.0'
provider: gcp
service: threat
checks:
- rule_id: gcp.securitycenter.scc.is_enabled
  for_each: gcp.securitycenter.folders.assets.list
  severity: MEDIUM
  conditions:
    var: item.asset
    op: is_true
- rule_id: gcp.securitycenter.organization.enabled
  for_each: gcp.securitycenter.organizations.assets.list
  severity: MEDIUM
  conditions:
    var: item.asset
    op: is_true
- rule_id: gcp.securitycenter.scanner.enabled
  for_each: gcp.securitycenter.folders.assets.list
  severity: MEDIUM
  conditions:
    var: item.asset
    op: is_true
