version: '1.0'
provider: gcp
service: firestore
checks:
- rule_id: gcp.firestore.document.table_encryption_at_rest_enabled
  for_each: gcp.firestore.projects.databases.documents.list
  severity: HIGH
  conditions:
    var: item.fields
    op: exists
    value: null
- rule_id: gcp.firestore.document.table_private_network_only_where_supported
  for_each: gcp.firestore.projects.databases.list
  severity: HIGH
  conditions:
    var: item.fields
    op: exists
    value: null
- rule_id: gcp.firestore.document.table_rbac_least_privilege
  for_each: gcp.firestore.projects.databases.documents.list
  severity: HIGH
  conditions:
    var: item.fields
    op: exists
    value: null
