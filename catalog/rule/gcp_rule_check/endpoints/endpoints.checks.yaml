version: '1.0'
provider: gcp
service: endpoints
checks:
- rule_id: gcp.endpoints.service.monitoring_api_access_log_fields_identity_present
  for_each: gcp.endpoints.services.list
  severity: HIGH
  conditions:
    var: item.accessLogConfig.logEntries[].fields[]
    op: contains
    value: identity
- rule_id: gcp.endpoints.service.monitoring_api_access_log_sink_configured
  for_each: gcp.endpoints.services.list
  severity: HIGH
  conditions:
    var: item.logs[].logConfigs[].enableAccessLogging
    op: is_true
    value: null
- rule_id: gcp.endpoints.service.monitoring_api_access_logging_enabled
  for_each: gcp.endpoints.services.list
  severity: HIGH
  conditions:
    var: item.accessLoggingConfig.enabled
    op: is_true
    value: null
- rule_id: gcp.endpoints.service.monitoring_api_execution_logging_level_minimum_error
  for_each: gcp.endpoints.services.list
  severity: HIGH
  conditions:
    all:
    - var: item.auditLogConfigs[].logType
      op: contains
      value: ADMIN_READ
    - var: item.auditLogConfigs[].logType
      op: contains
      value: DATA_WRITE
    - var: item.auditLogConfigs[].logType
      op: contains
      value: DATA_READ
- rule_id: gcp.endpoints.service.monitoring_api_logs_retention_days_minimum
  for_each: gcp.endpoints.list_services
  severity: HIGH
  conditions:
    all:
    - var: item.monitoring_api_logs_retention_days
      op: gte
      value: '30'
