version: '1.0'
provider: gcp
service: dataproc
checks:
- rule_id: gcp.dataproc.cluster.automatic_upgrades_enabled
  for_each: gcp.dataproc.projects.regions.clusters.list
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: gcp.dataproc.cluster.maintenance_window_configured
  for_each: gcp.dataproc.projects.regions.clusters.list
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
