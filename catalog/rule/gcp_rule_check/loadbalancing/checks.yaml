version: '1.0'
provider: gcp
service: loadbalancing
checks:
- rule_id: gcp.loadbalancing.deletion_protection_enabled
  for_each: gcp.compute.list_computes
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
    op: is_true
- rule_id: gcp.loadbalancing.desync_mitigation_mode_configured
  for_each: gcp.compute.list_computes
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: gcp.loadbalancing.logging_enabled
  for_each: gcp.compute.list_computes
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
    op: is_true
