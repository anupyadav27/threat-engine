version: '1.0'
provider: gcp
service: accesscontextmanager
checks:
- rule_id: gcp.accesscontextmanager.activity.delete_service_perimeter
  for_each: gcp.accesscontextmanager.list_service_perimeters
  severity: MEDIUM
  conditions:
    var: item.status
    op: not_equals
    value: DELETED
- rule_id: gcp.accesscontextmanager.activity.update_service_perimeter
  for_each: gcp.accesscontextmanager.list_service_perimeters
  severity: MEDIUM
  conditions:
    var: item.status
    op: exists
    value: null
