version: '1.0'
provider: gcp
service: healthcare
checks:
- rule_id: gcp.healthcare.consent_store.consent_access_rbac_least_privilege
  for_each: gcp.healthcare.projects.locations.datasets.consentStores.list
  severity: HIGH
  conditions:
    all:
    - var: item.defaultConsentTtl
      op: exists
      value: null
    - var: item.enableConsentCreateOnUpdate
      op: exists
      value: null
- rule_id: gcp.healthcare.consent_store.consent_store_encrypted
  for_each: gcp.healthcare.projects.locations.datasets.consentStores.list
  severity: HIGH
  conditions:
    var: item.defaultConsentTtl
    op: exists
    value: null
- rule_id: gcp.healthcare.consent_store.rights_execution_roles_least_privilege
  for_each: gcp.healthcare.projects.locations.datasets.consentStores.list
  severity: HIGH
  conditions:
    all:
    - var: item.defaultConsentTtl
      op: exists
      value: null
    - var: item.enableConsentCreateOnUpdate
      op: exists
      value: null
    - var: item.labels
      op: exists
      value: null
    - var: item.name
      op: exists
      value: null
- rule_id: gcp.healthcare.consent_store.rights_workflow_storage_encrypted
  for_each: gcp.healthcare.projects.locations.datasets.consentStores.list
  severity: HIGH
  conditions:
    var: item.defaultConsentTtl
    op: exists
    value: null
