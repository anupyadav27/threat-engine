version: '1.0'
provider: gcp
service: apikeys
checks:
- rule_id: gcp.apikeys.key.api_key_expiration_required
  for_each: gcp.apikeys.projects.locations.keys.list
  severity: MEDIUM
  conditions:
    var: item.restrictions.apiTargets[].restrictions
    op: exists
    value: null
- rule_id: gcp.apikeys.key.api_key_rotation_policy_defined
  for_each: gcp.apikeys.projects.locations.keys.list
  severity: MEDIUM
  conditions:
    var: item.restrictions
    op: exists
    value: null
- rule_id: gcp.apikeys.key.api_key_scopes_least_privilege
  for_each: gcp.apikeys.projects.locations.keys.list
  severity: HIGH
  conditions:
    var: item.restrictions
    op: exists
    value: null
