version: '1.0'
provider: gcp
service: logging
checks:
- rule_id: gcp.logging.sink.filter_attributes_configured
  for_each: gcp.logging.billingAccounts.sinks.list
  severity: MEDIUM
  conditions:
    var: item.bigqueryOptions
    op: is_true
- rule_id: gcp.logging.sink.filter_expression_configured
  for_each: gcp.logging.billingAccounts.sinks.list
  severity: MEDIUM
  conditions:
    var: item.bigqueryOptions
    op: is_true
- rule_id: gcp.logging.sink.pubsub_destination_configured
  for_each: gcp.logging.billingAccounts.sinks.list
  severity: MEDIUM
  conditions:
    var: item.bigqueryOptions
    op: is_true
