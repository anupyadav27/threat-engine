version: '1.0'
provider: gcp
service: gke
checks:
- rule_id: gcp.gke.binary.authorization_policy_compliance_enabled
  for_each: gcp.container.projects.aggregated.usableSubnetworks.list
  severity: MEDIUM
  conditions:
    var: item.statusMessage
    op: equals
    value: Active
- rule_id: gcp.gke.cluster.alpha_features_disabled_for_production_configured
  for_each: gcp.container.projects.locations.clusters.list
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: gcp.gke.ingress.google_managed_ssl_certificates_compliance_enabled
  for_each: gcp.container.projects.aggregated.usableSubnetworks.list
  severity: MEDIUM
  conditions:
    var: item.statusMessage
    op: equals
    value: Active
- rule_id: gcp.gke.node.pool_auto_repair_status_check
  for_each: gcp.container.projects.locations.clusters.nodePools.list
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: gcp.gke.node.pool_gke_sandbox_enabled
  for_each: gcp.container.projects.locations.clusters.nodePools.list
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
