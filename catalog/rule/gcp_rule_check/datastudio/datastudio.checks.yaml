version: '1.0'
provider: gcp
service: datastudio
checks:
- rule_id: gcp.datastudio.dashboard.dashboard_export_controls_enabled
  for_each: gcp.datastudio.list_dashboards
  severity: MEDIUM
  conditions:
    var: item.ExportControlsEnabled
    op: is_true
    value: null
- rule_id: gcp.datastudio.dashboard.dashboard_public_embeds_disabled
  for_each: gcp.datastudio.dashboards.list
  severity: HIGH
  conditions:
    var: item.publicEmbedEnabled
    op: is_false
    value: null
- rule_id: gcp.datastudio.dashboard.dashboard_sharing_restricted_to_org
  for_each: gcp.datastudio.dashboards.list
  severity: MEDIUM
  conditions:
    var: item.sharingRestrictions[].domainRestriction
    op: equals
    value: ORGANIZATION
- rule_id: gcp.datastudio.dashboard.dashboard_sso_required
  for_each: gcp.datastudio.list_dashboards
  severity: MEDIUM
  conditions:
    var: item.SsoRequired
    op: is_true
    value: null
