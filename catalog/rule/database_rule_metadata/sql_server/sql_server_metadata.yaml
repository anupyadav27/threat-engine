  - rule_id: sql_server.cis.3.public_role_in_the_msdb_database_is_not_granted
    title: "Ensure the public role in the msdb database is not granted access to SQL Agent proxies"
    severity: high
    category: database
    tech_type: sql_server
    automation_type: automated
    cis_benchmark: "CIS_MSSQL 2022_v1.2.0"
    cis_version: "2022_v1.2.0"
    cis_control: "3.11"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The public database role contains every user in the msdb database. SQL Agent
      proxies define a security context in which a job step can run.
    rationale: >
      Granting access to SQL Agent proxies for the public role would allow all users
      to utilize the proxy which may have high privileges. This would likely break
      the principle of least privileges. Impact: Before revoking the public role
      from the proxy, ensure that alternative logins or appropriate user-defined
      database roles have been added with equivalent permissions. Otherwise, SQL
      Agent job steps dependent upon this access will fail.
    audit_procedure: >
      Use the following syntax to determine if access to any proxies have been
      granted to the msdb database's public role. USE [msdb] GO SELECT sp.name AS
      proxyname FROM dbo.sysproxylogin spl JOIN sys.database_principals dp ON dp.sid
      = spl.sid JOIN sysproxies sp ON sp.proxy_id = spl.proxy_id WHERE principal_id
      = USER_ID('public'); GO This query should not return any rows.
    remediation: >
      1. Ensure the required security principals are explicitly granted access to
      the proxy (use sp_grant_login_to_proxy). 2. Revoke access to the <proxyname>
      from the public role. USE [msdb] GO EXEC dbo.sp_revoke_login_from_proxy @name
      = N'public', @proxy_name = N'<proxyname>'; GO Default Value: By default, the
      msdb public database role does not have access to any proxy. References: 1.
      https://learn.microsoft.com/en-US/sql/ssms/agent/create-a-sql-server-agent-
      proxy
    references: >
      1. https://learn.microsoft.com/en-US/sql/ssms/agent/create-a-sql-server-agent-
      proxy
    impact: >
      Before revoking the public role from the proxy, ensure that alternative logins
      or appropriate user-defined database roles have been added with equivalent
      permissions. Otherwise, SQL Agent job steps dependent upon this access will
      fail.
    compliance_mappings:
      cis:
        - "CIS_MSSQL_2022_v1_2_0_3_11"
      nist_800_53: []
