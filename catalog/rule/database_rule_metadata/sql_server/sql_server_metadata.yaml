  - rule_id: sql_server.cis.7.database_backups_are_encrypted
    title: "Ensure Database Backups are Encrypted"
    severity: medium
    category: database
    tech_type: sql_server
    automation_type: automated
    cis_benchmark: "CIS_MSSQL 2022_v1.2.0"
    cis_version: "2022_v1.2.0"
    cis_control: "7.3"
    cis_section: "7"
    profile_applicability: "Level 2"
    description: >
      Ensure Database Backups are Encrypted
    rationale: >
      Databases may contain sensitive. Backups of this data allow the data to easily
      leave the Enterprise and secure environments. Encrypting the backup makes
      accessing the data much more difficult. Impact: A database backup accidentally
      exposed to the Internet or transmitted outside a secure environment can be
      easily restored to a SQL Server anywhere and its contents discovered.
    audit_procedure: >
      SELECT b.key_algorithm, b.encryptor_type, d.is_encrypted, b.database_name,
      b.server_name, b.backup_finish_date FROM msdb.dbo.backupset b inner join
      sys.databases d on b.database_name = d.name where b.key_algorithm IS NULL AND
      b.encryptor_type IS NULL AND d.is_encrypted = 0; No rows should be returned by
      the query
    remediation: >
      SQL Server backups need to 'Back up to a new media set', not 'Back up to the
      existing media set' in order to allow for encryption. The backup option to
      Encrypt Backup can be implemented after a Certificate or Asymmetric key has
      been applied to the SQL Server for this purpose. Alternatively, encrypt the
      database with TDE. This automatically encrypts the backups as well. See 7.5
      Additional Information: We recommend you purge backup history prior to the
      date you began using encryption. Use sp_delete_backuphistory to purge old
      records.
    references: >
      
    impact: >
      A database backup accidentally exposed to the Internet or transmitted outside
      a secure environment can be easily restored to a SQL Server anywhere and its
      contents discovered.
    compliance_mappings:
      cis:
        - "CIS_MSSQL_2022_v1_2_0_7_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
