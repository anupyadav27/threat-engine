      It is not a good security practice to code applications or scripts to use the
      sa account. Given that it is a best practice to rename and disable the sa
      account, some 3rd party applications check for the existence of a login named
      sa and if it doesn't exist, creates one. Removing the sa login will prevent
      these scripts and applications from authenticating to the database server and
      executing required tasks or functions.
