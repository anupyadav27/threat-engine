  - rule_id: sql_server.cis.2.sql_server_is_configured_to_use_non_standard_ports
    title: "Ensure SQL Server is configured to use non-standard ports"
    severity: high
    category: database
    tech_type: sql_server
    automation_type: automated
    cis_benchmark: "CIS_MSSQL 2022_v1.2.0"
    cis_version: "2022_v1.2.0"
    cis_control: "2.11"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      If installed, a default SQL Server instance will be assigned a default port of
      TCP:1433 for TCP/IP communication. Administrators can also manually configure
      named instances to use TCP:1433 for communication. TCP:1433 is a widely known
      SQL Server port and this port assignment should be changed. In a multi-
      instance scenario, each instance must be assigned its own dedicated TCP/IP
      port.
    rationale: >
      Using a non-default port helps protect the database from attacks directed to
      the default port. Impact: Changing the default port will force the DAC
      (Dedicated Administrator Connection) to listen on a random port. Also, it
      might make benign applications, such as application firewalls, require special
      configuration. In general, you should set a static port for consistent usage
      by applications, including firewalls, instead of using dynamic ports which
      will be chosen randomly at each SQL Server start up.
    audit_procedure: >
      Run the following T-SQL: IF (select value_data from sys.dm_server_registry
      where value_name = 'ListenOnAllIPs') = 1 SELECT count(*) FROM
      sys.dm_server_registry WHERE registry_key like '%IPAll%' and value_name like
      '%Tcp%' and value_data='1433' ELSE SELECT count(*) FROM sys.dm_server_registry
      WHERE value_name like '%Tcp%' and value_data='1433'; A value of 0 implies a
      pass.
    remediation: >
      1. In SQL Server Configuration Manager , in the console pane, expand SQL
      Server Network Configuration , expand Protocols for <InstanceName> , and then
      double-click the TCP/IP protocol 2. In the TCP/IP Properties dialog box, on
      the IP Addresses tab, several IP addresses appear in the format IP1, IP2, up
      to IPAll. One of these is for the IP address of the loopback adapter,
      127.0.0.1. Additional IP addresses appear for each IP Address on the computer.
      3. Under IPAll, change the TCP Port field from 1433 to a non-standard port or
      leave the TCP Port field empty and set the TCP Dynamic Ports value to 0 to
      enable dynamic port assignment and then click OK . 4. In the console pane,
      click SQL Server Services . 5. In the details pane, right-click SQL Server (
      <InstanceName> ) and then click Restart , to stop and restart SQL Server.
      Default Value: By default, default SQL Server instances listen on to TCP/IP
      traffic on TCP port 1433 and named instances use dynamic ports. References: 1.
      https://learn.microsoft.com/en-us/sql/database-engine/configure-
      windows/configure-a-server-to-listen-on-a-specific-tcp-port Additional
      Information: In the case of AWS RDS, this is only configurable during the
      build process.
    references: >
      1. https://learn.microsoft.com/en-us/sql/database-engine/configure-
      windows/configure-a-server-to-listen-on-a-specific-tcp-port Additional
      Information: In the case of AWS RDS, this is only configurable during the
      build process.
    impact: >
      Changing the default port will force the DAC (Dedicated Administrator
      Connection) to listen on a random port. Also, it might make benign
      applications, such as application firewalls, require special configuration. In
      general, you should set a static port for consistent usage by applications,
      including firewalls, instead of using dynamic ports which will be chosen
      randomly at each SQL Server start up.
    compliance_mappings:
      cis:
        - "CIS_MSSQL_2022_v1_2_0_2_11"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_mssql_2022_v1_2_0_2_11"
