    cis_benchmark: "CIS_MSSQL 2022_v1.2.0"
    cis_version: "2022_v1.2.0"
    cis_control: "2.16"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The sa login (e.g. principal) is a widely known and often widely used SQL
      Server account. Therefore, there should not be a login called sa even when the
      original sa login (principal_id = 1) has been renamed.
    rationale: >
      Enforcing this control reduces the probability of an attacker executing brute
      force attacks against a well-known principal name. Impact: It is not a good
      security practice to code applications or scripts to use the sa account. Given
      that it is a best practice to rename and disable the sa account, some 3rd
      party applications check for the existence of a login named sa and if it
      doesn't exist, creates one. Removing the sa login will prevent these scripts
      and applications from authenticating to the database server and executing
      required tasks or functions.
    audit_procedure: >
      Use the following syntax to determine if there is an account named sa. SELECT
      principal_id, name FROM sys.server_principals WHERE name = 'sa'; No rows
      should be returned.
