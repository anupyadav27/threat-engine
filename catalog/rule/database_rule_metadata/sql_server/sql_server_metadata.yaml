  - rule_id: sql_server.cis.5.maximum_number_of_error_log_files_is_set_to
    title: "Ensure 'Maximum number of error log files' is set to greater than or equal to '12'"
    severity: high
    category: database
    tech_type: sql_server
    automation_type: automated
    cis_benchmark: "CIS_MSSQL 2022_v1.2.0"
    cis_version: "2022_v1.2.0"
    cis_control: "5.1"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      SQL Server error log files must be protected from loss. The log files must be
      backed up before they are overwritten. Retaining more error logs helps prevent
      loss from frequent recycling before backups can occur.
    rationale: >
      The SQL Server error log contains important information about major server
      events and login attempt information as well. Impact: Once the max number of
      error logs is reached, the oldest error log file is deleted each time SQL
      Server restarts or sp_cycle_errorlog is executed.
    audit_procedure: >
      Perform either the GUI or T-SQL method shown: GUI Method 1. Open SQL Server
      Management Studio . 2. Open Object Explorer and connect to the target
      instance. 3. Navigate to the Management tab in Object Explorer and expand.
      Right click on the SQL Server Logs file and select Configure . 4. Verify the
      Limit the number of error log files before they are recycled checkbox is
      checked 5. Verify the Maximum number of error log files is greater than or
      equal to 12, if a limit is configured. T-SQL Method Run the following T-SQL.
      The NumberOfLogFiles returned should be greater than or equal to 12, or equal
      to -1 if no limit is configured. DECLARE @NumErrorLogs int; EXEC
      master.sys.xp_instance_regread N'HKEY_LOCAL_MACHINE',
      N'Software\Microsoft\MSSQLServer\MSSQLServer', N'NumErrorLogs', @NumErrorLogs
      OUTPUT; SELECT ISNULL(@NumErrorLogs, -1) AS [NumberOfLogFiles];
    remediation: >
      Adjust the number of logs to prevent data loss. The default value of 6 may be
      insufficient for a production environment. Perform either the GUI or T-SQL
      method shown: GUI Method 1. Open SQL Server Management Studio . 2. Open Object
      Explorer and connect to the target instance. 3. Navigate to the Management tab
      in Object Explorer and expand. Right click on the SQL Server Logs file and
      select Configure 4. Check the Limit the number of error log files before they
      are recycled 5. Set the Maximum number of error log files to greater than or
      equal to 12 T-SQL Method Run the following T-SQL to change the number of error
      log files, replace <NumberAbove12> with your desired number of error log
      files: EXEC master.sys.xp_instance_regwrite N'HKEY_LOCAL_MACHINE',
      N'Software\Microsoft\MSSQLServer\MSSQLServer', N'NumErrorLogs', REG_DWORD,
      <NumberAbove12>; Default Value: 6 SQL Server error log files in addition to
      the current error log file are retained by default. References: 1.
      https://learn.microsoft.com/en-us/sql/database-engine/configure-windows/scm-
      services-configure-sql-server-error-logs
    references: >
      1. https://learn.microsoft.com/en-us/sql/database-engine/configure-
      windows/scm- services-configure-sql-server-error-logs
    impact: >
      Once the max number of error logs is reached, the oldest error log file is
      deleted each time SQL Server restarts or sp_cycle_errorlog is executed.
