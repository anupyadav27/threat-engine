  - rule_id: sql_server.cis.2.clr_enabled_server_configuration_option_is_set_to
    title: "Ensure 'CLR Enabled' Server Configuration Option is set to '0'"
    severity: high
    category: database
    tech_type: sql_server
    automation_type: automated
    cis_benchmark: "CIS_MSSQL 2022_v1.2.0"
    cis_version: "2022_v1.2.0"
    cis_control: "2.2"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The clr enabled option specifies whether user assemblies can be run by SQL
      Server.
    rationale: >
      Enabling use of CLR assemblies widens the attack surface of SQL Server and
      puts it at risk from both inadvertent and malicious assemblies. Impact: If CLR
      assemblies are in use, applications may need to be rearchitected to eliminate
      their usage before disabling this setting. Alternatively, some organizations
      may allow this setting to be enabled 1 for assemblies created with the SAFE
      permission set, but disallow assemblies created with the riskier UNSAFE and
      EXTERNAL_ACCESS permission sets. To find user-created assemblies, run the
      following query in all databases, replacing <database_name> with each database
      name: USE [<database_name>] GO SELECT name AS Assembly_Name,
      permission_set_desc FROM sys.assemblies WHERE is_user_defined = 1; GO
    audit_procedure: >
      Run the following T-SQL command: SELECT name, CAST(value as int) as
      value_configured, CAST(value_in_use as int) as value_in_use FROM
      sys.configurations WHERE name = 'clr strict security'; If both values are 1,
      this recommendation is Not Applicable. Otherwise, run the following T-SQL
      command: SELECT name, CAST(value as int) as value_configured,
      CAST(value_in_use as int) as value_in_use FROM sys.configurations WHERE name =
      'clr enabled'; Both value columns must show 0 to be compliant.
    remediation: >
      For AWS RDS Instances, please refer to the documentation for using Parameter
      Groups here: Working with parameter groups Run the following T-SQL command:
      EXECUTE sp_configure 'clr enabled', 0; RECONFIGURE; Default Value: By default,
      this option is disabled (0). References: 1. https://learn.microsoft.com/en-
      us/sql/t-sql/statements/create-assembly-transact- sql Additional Information:
      If clr strict security is set to 1 this recommendation is not applicable. By
      default, clr strict security is enabled and treats SAFE and EXTERNAL_ACCESS
      assemblies as if they were marked UNSAFE. Though not recommended, the clr
      strict security option can be disabled for backward compatibility. This
      recommendation has been retained for environments configured for backwards
      compatibility.
    references: >
      1. https://learn.microsoft.com/en-us/sql/t-sql/statements/create-assembly-
      transact- sql Additional Information: If clr strict security is set to 1 this
      recommendation is not applicable. By default, clr strict security is enabled
      and treats SAFE and EXTERNAL_ACCESS assemblies as if they were marked UNSAFE.
      Though not recommended, the clr strict security option can be disabled for
      backward compatibility. This recommendation has been retained for environments
      configured for backwards compatibility.
    impact: >
      If CLR assemblies are in use, applications may need to be rearchitected to
      eliminate their usage before disabling this setting. Alternatively, some
      organizations may allow this setting to be enabled 1 for assemblies created
      with the SAFE permission set, but disallow assemblies created with the riskier
      UNSAFE and EXTERNAL_ACCESS permission sets. To find user-created assemblies,
      run the following query in all databases, replacing <database_name> with each
      database name: USE [<database_name>] GO SELECT name AS Assembly_Name,
      permission_set_desc FROM sys.assemblies WHERE is_user_defined = 1; GO
    compliance_mappings:
      cis:
        - "CIS_MSSQL_2022_v1_2_0_2_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_mssql_2022_v1_2_0_2_2"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: sql_server.cis.2.cross_db_ownership_chaining_server_configuration
    title: "Ensure 'Cross DB Ownership Chaining' Server Configuration Option is set to '0'"
    severity: high
    category: database
    tech_type: sql_server
    automation_type: automated
    cis_benchmark: "CIS_MSSQL 2022_v1.2.0"
    cis_version: "2022_v1.2.0"
    cis_control: "2.3"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The cross db ownership chaining option controls cross-database ownership
      chaining across all databases at the instance (or server) level.
    rationale: >
      When enabled, this option allows a member of the db_owner role in a database
      to gain access to objects owned by a login in any other database, causing an
      unnecessary information disclosure. When required, cross-database ownership
      chaining should only be enabled for the specific databases requiring it
      instead of at the instance level for all databases by using the ALTER DATABASE
      <database_name> SET DB_CHAINING ON command. This database option may not be
      changed on the master, model, or tempdb system databases.
    audit_procedure: >
      Run the following T-SQL command: SELECT name, CAST(value as int) as
      value_configured, CAST(value_in_use as int) as value_in_use FROM
      sys.configurations WHERE name = 'cross db ownership chaining'; Both value
      columns must show 0 to be compliant.
    remediation: >
      For AWS RDS Instances, please refer to the documentation for using Parameter
      Groups here: Working with parameter groups Run the following T-SQL command:
      EXECUTE sp_configure 'cross db ownership chaining', 0; RECONFIGURE; GO Default
      Value: By default, this option is disabled (0). References: 1.
      https://learn.microsoft.com/en-us/sql/database-engine/configure-windows/cross-
      db-ownership-chaining-server-configuration-option
    references: >
      1. https://learn.microsoft.com/en-us/sql/database-engine/configure-
      windows/cross- db-ownership-chaining-server-configuration-option
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_MSSQL_2022_v1_2_0_2_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
