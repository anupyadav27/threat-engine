  - rule_id: sql_server.cis.3.connect_permissions_on_the_guest_user_is_revoked
    title: "Ensure CONNECT permissions on the 'guest' user is Revoked within all SQL Server databases"
    severity: high
    category: database
    tech_type: sql_server
    automation_type: automated
    cis_benchmark: "CIS_MSSQL 2022_v1.2.0"
    cis_version: "2022_v1.2.0"
    cis_control: "3.2"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Remove the right of the guest user to connect to SQL Server databases, except
      for master, msdb, tempdb, and, on AWS RDS instances, rdsadmin.
    rationale: >
      A login assumes the identity of the guest user when a login has access to SQL
      Server but does not have access to a database through its own account and the
      database has a guest user account. Revoking the CONNECT permission for the
      guest user will ensure that a login is not able to access database information
      without explicit access to do so. Impact: When CONNECT permission to the guest
      user is revoked, a SQL Server instance login must be mapped to a database user
      explicitly in order to have access to the database.
    audit_procedure: >
      Run the following code snippet for each database (replacing <database_name> as
      appropriate) in the instance to determine if the guest user has CONNECT
      permission. USE <database_name>; GO SELECT DB_NAME() AS DatabaseName, 'guest'
      AS Database_User, [permission_name], [state_desc] FROM
      sys.database_permissions WHERE [grantee_principal_id] =
      DATABASE_PRINCIPAL_ID('guest') AND [state_desc] LIKE 'GRANT%' AND
      [permission_name] = 'CONNECT' AND DB_NAME() NOT IN ('master','tempdb','msdb');
      No rows should be returned. On AWS RDS instance, if only rdsadmin is returned,
      this is a pass.
    remediation: >
      The following code snippet revokes CONNECT permissions from the guest user in
      a database. Replace <database_name> as appropriate: USE <database_name>; GO
      REVOKE CONNECT FROM guest; Default Value: The guest user cannot have the
      CONNECT permission revoked in master, msdb, tempdb, and, on AWS RDS instances,
      rdsadmin; however, this permission should be revoked in all other databases on
      the SQL Server instance. References: 1. https://learn.microsoft.com/en-
      us/sql/relational-databases/policy-based- management/guest-permissions-on-
      user-databases Additional Information: The guest user cannot have the CONNECT
      permission revoked in master, msdb and tempdb, but this permission should be
      revoked in all other databases on the SQL Server instance.
    references: >
      1. https://learn.microsoft.com/en-us/sql/relational-databases/policy-based-
      management/guest-permissions-on-user-databases Additional Information: The
      guest user cannot have the CONNECT permission revoked in master, msdb and
      tempdb, but this permission should be revoked in all other databases on the
      SQL Server instance.
    impact: >
      When CONNECT permission to the guest user is revoked, a SQL Server instance
      login must be mapped to a database user explicitly in order to have access to
      the database.
    compliance_mappings:
      cis:
        - "CIS_MSSQL_2022_v1_2_0_3_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
