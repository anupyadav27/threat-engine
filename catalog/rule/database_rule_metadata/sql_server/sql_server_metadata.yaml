  - rule_id: sql_server.cis.3.orphaned_users_are_dropped_from_sql_server
    title: "Ensure 'Orphaned Users' are Dropped From SQL Server Databases"
    severity: high
    category: database
    tech_type: sql_server
    automation_type: automated
    cis_benchmark: "CIS_MSSQL 2022_v1.2.0"
    cis_version: "2022_v1.2.0"
    cis_control: "3.3"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      A database user for which the corresponding SQL Server login is undefined or
      is incorrectly defined on a server instance cannot log in to the instance and
      is referred to as orphaned and should be removed.
    rationale: >
      Orphan users should be removed to avoid potential misuse of those broken users
      in any way.
    audit_procedure: >
      Run the following T-SQL query in each database to identify orphan users. No
      rows should be returned. USE <database_name>; GO SELECT dp.type_desc, dp.sid,
      dp.name as orphan_user_name, dp.authentication_type_desc FROM
      sys.database_principals AS dp LEFT JOIN sys.server_principals as sp ON
      dp.sid=sp.sid WHERE sp.sid IS NULL AND dp.authentication_type_desc =
      'INSTANCE'
    remediation: >
      If the orphaned user cannot or should not be matched to an existing or new
      login using the Microsoft documented process referenced below, run the
      following T-SQL query in the appropriate database to remove an orphan user:
      USE <database_name>; GO DROP USER <username>; References: 1.
      https://learn.microsoft.com/en-us/sql/sql-server/failover-
      clusters/troubleshoot- orphaned-users-sql-server
