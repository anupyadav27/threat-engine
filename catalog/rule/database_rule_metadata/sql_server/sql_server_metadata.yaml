rules:

  - rule_id: sql_server.cis.1.latest_sql_server_cumulative_and_security_updates
    title: "Ensure Latest SQL Server Cumulative and Security Updates are Installed"
    severity: high
    category: database
    tech_type: sql_server
    automation_type: manual
    cis_benchmark: "CIS_MSSQL 2022_v1.2.0"
    cis_version: "2022_v1.2.0"
    cis_control: "1.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      SQL Server patches contain program updates that fix security and product
      functionality issues found in the software. These patches can be installed
      with a security update, which is a single patch, or a cumulative update which
      is a group of patches. The SQL Server version and patch levels should be the
      most recent compatible with the organizations' operational needs.
    rationale: >
      Using the most recent SQL Server software, along with all applicable patches
      can help limit the possibilities for vulnerabilities in the software. The
      installation version and/or patches applied during setup should be established
      according to the needs of the organization.
    audit_procedure: >
      To determine your SQL Server patch level, run the following code snippet.
      SELECT SERVERPROPERTY('ProductLevel') as SP_installed,
      SERVERPROPERTY('ProductVersion') as Version,
      SERVERPROPERTY('ProductUpdateLevel') as 'ProductUpdate_Level',
      SERVERPROPERTY('ProductUpdateReference') as 'KB_Number';
    remediation: >
      Identify the current version and patch level of your SQL Server instances and
      ensure they contain the latest security fixes. Make sure to test these fixes
      in your test environments before updating production instances. The most
      recent SQL Server patches can be found here: https://learn.microsoft.com/en-
      us/troubleshoot/sql/releases/download-and-install-latest- updates Default
      Value: Cumulative and security updates are not installed by default.
      References: 1. https://learn.microsoft.com/en-us/sql/database-engine/install-
      windows/latest- updates-for-microsoft-sql-server 2.
      https://support.microsoft.com/en-us/help/4041553/sql-server-service-packs-are-
      discontinued-starting-from-sql-server
    references: >
      1. https://learn.microsoft.com/en-us/sql/database-engine/install-
      windows/latest- updates-for-microsoft-sql-server 2.
      https://support.microsoft.com/en-us/help/4041553/sql-server-service-packs-are-
      discontinued-starting-from-sql-server
    impact: >
      
