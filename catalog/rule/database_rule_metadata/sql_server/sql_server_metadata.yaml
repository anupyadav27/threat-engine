    profile_applicability: "Level 1"
    description: >
      SQL Server supports Shared Memory, Named Pipes, TCP/IP and VIA protocols.
      However, SQL Server should be configured to use the bare minimum required
      based on the organization's needs.
    rationale: >
      Using fewer protocols minimizes the attack surface of SQL Server and in some
      cases can protect it from remote attacks.
    audit_procedure: >
      Open SQL Server Configuration Manager; go to the SQL Server Network
      Configuration. Ensure that only required protocols are enabled.
    remediation: >
      Open SQL Server Configuration Manager; go to the SQL Server Network
      Configuration. Ensure that only required protocols are enabled. Disable
      protocols not necessary. Impact: The Database Engine must be stopped and
      restarted for the change to take effect. Default Value: By default, TCP/IP and
      Shared Memory protocols are enabled on all commerical SQL Server 2008
      instances. References: 1. http://msdn.microsoft.com/en-
      us/library/ms191294(v=sql.120).aspx 27 | P a g e
