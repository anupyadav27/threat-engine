  - rule_id: sql_server.cis.3.windows_builtin_groups_are_not_sql_logins
    title: "Ensure Windows BUILTIN groups are not SQL Logins"
    severity: high
    category: database
    tech_type: sql_server
    automation_type: automated
    cis_benchmark: "CIS_MSSQL 2022_v1.2.0"
    cis_version: "2022_v1.2.0"
    cis_control: "3.9"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Prior to SQL Server 2008, the BUILTIN\Administrators group was added as a SQL
      Server login with sysadmin privileges during installation by default. Best
      practices promote creating an Active Directory level group containing approved
      DBA staff accounts and using this controlled AD group as the login with
      sysadmin privileges. The AD group should be specified during SQL Server
      installation and the BUILTIN\Administrators group would therefore have no need
      to be a login.
    rationale: >
      The BUILTIN groups (Administrators, Everyone, Authenticated Users, Guests,
      etc.) generally contain very broad memberships which would not meet the best
      practice of ensuring only the necessary users have been granted access to a
      SQL Server instance. These groups should not be used for any level of access
      into a SQL Server Database Engine instance. Impact: Before dropping the
      BUILTIN group logins, ensure that alternative AD Groups or Windows logins have
      been added with equivalent permissions. Otherwise, the SQL Server instance may
      become totally inaccessible.
    audit_procedure: >
      Use the following syntax to determine if any BUILTIN groups or accounts have
      been added as SQL Server Logins. SELECT pr.[name], pe.[permission_name],
      pe.[state_desc] FROM sys.server_principals pr JOIN sys.server_permissions pe
      ON pr.principal_id = pe.grantee_principal_id WHERE pr.name like 'BUILTIN%';
      This query should not return any rows. On an AWS RDS instance if only
      [BUILTIN]\Administrators is returned, this is a pass.
    remediation: >
      1. For each BUILTIN login, if needed create a more restrictive AD group
      containing only the required user accounts. 2. Add the AD group or individual
      Windows accounts as a SQL Server login and grant it the permissions required.
      3. Drop the BUILTIN login using the syntax below after replacing <name> in
      [BUILTIN\ <name> ]. USE [master] GO DROP LOGIN [BUILTIN\<name>] GO Default
      Value: By default, no BUILTIN groups are added as SQL logins. Additional
      Information: In AWS RDS instances [BUILTIN]\Administrators can't be dropped.
      Dropping [Builtin]\Administrators is blocked in AWS RDS by the server-level
      trigger rds_drop_login_trigger.
    references: >
      
    impact: >
      Before dropping the BUILTIN group logins, ensure that alternative AD Groups or
      Windows logins have been added with equivalent permissions. Otherwise, the SQL
      Server instance may become totally inaccessible.
    compliance_mappings:
      cis:
        - "CIS_MSSQL_2022_v1_2_0_3_9"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_mssql_2022_v1_2_0_3_9"
