  - rule_id: sql_server.cis.3.sql_authentication_is_not_used_in_contained
    title: "Ensure SQL Authentication is not used in contained databases"
    severity: high
    category: database
    tech_type: sql_server
    automation_type: automated
    cis_benchmark: "CIS_MSSQL 2022_v1.2.0"
    cis_version: "2022_v1.2.0"
    cis_control: "3.4"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Contained databases do not enforce password complexity rules for SQL
      Authenticated users.
    rationale: >
      The absence of an enforced password policy may increase the likelihood of a
      weak credential being established in a contained database. Impact: While
      contained databases provide flexibility in relocating databases to different
      instances and different environments, this must be balanced with the
      consideration that no password policy mechanism exists for SQL Authenticated
      users in contained databases.
    audit_procedure: >
      Execute the following T-SQL in each contained database to find database users
      that are using SQL authentication: SELECT name AS DBUser FROM
      sys.database_principals WHERE name NOT IN
      ('dbo','Information_Schema','sys','guest') AND type IN ('U','S','G') AND
      authentication_type = 2; GO
    remediation: >
      Leverage Windows Authenticated users in contained databases. Default Value:
      SQL Authenticated users (USER WITH PASSWORD authentication) are allowed in
      contained databases. References: 1. https://learn.microsoft.com/en-
      us/sql/relational-databases/databases/security- best-practices-with-contained-
      databases
    references: >
      1. https://learn.microsoft.com/en-us/sql/relational-
      databases/databases/security- best-practices-with-contained-databases
    impact: >
