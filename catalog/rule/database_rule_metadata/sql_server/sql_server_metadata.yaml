  - rule_id: sql_server.cis.2.database_mail_xps_server_configuration_option_is
    title: "Ensure 'Database Mail XPs' Server Configuration Option is set to '0'"
    severity: high
    category: database
    tech_type: sql_server
    automation_type: automated
    cis_benchmark: "CIS_MSSQL 2022_v1.2.0"
    cis_version: "2022_v1.2.0"
    cis_control: "2.4"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The Database Mail XPs option controls the ability to generate and transmit
      email messages from SQL Server.
    rationale: >
      Disabling the Database Mail XPs option reduces the SQL Server surface,
      eliminates a DOS attack vector and channel to exfiltrate data from the
      database server to a remote host.
    audit_procedure: >
      Run the following T-SQL command: SELECT name, CAST(value as int) as
      value_configured, CAST(value_in_use as int) as value_in_use FROM
      sys.configurations WHERE name = 'Database Mail XPs'; Both value columns must
      show 0 to be compliant.
    remediation: >
      Run the following T-SQL command: EXECUTE sp_configure 'show advanced options',
      1; RECONFIGURE; EXECUTE sp_configure 'Database Mail XPs', 0; RECONFIGURE; GO
      EXECUTE sp_configure 'show advanced options', 0; RECONFIGURE; Default Value:
      By default, this option is disabled (0). References: 1.
      https://learn.microsoft.com/en-us/sql/relational-databases/database-
      mail/database-mail
    references: >
      1. https://learn.microsoft.com/en-us/sql/relational-databases/database-
      mail/database-mail
    impact: >
      
