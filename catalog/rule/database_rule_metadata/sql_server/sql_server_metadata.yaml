  - rule_id: sql_server.cis.2.set_the_remote_admin_connections_server
    title: "Set the 'Remote Admin Connections' Server Configuration Option to 0"
    severity: high
    category: database
    tech_type: sql_server
    automation_type: manual
    cis_benchmark: "CIS_MSSQL 2014_v1.1.0"
    cis_version: "2014_v1.1.0"
    cis_control: "2.7"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      This setting controls whether a client application on a remote computer can
      use the Dedicated Administrator Connection (DAC).
    rationale: >
      The Dedicated Administrator Connection (DAC) lets an administrator access a
      running server to execute diagnostic functions or Transact-SQL statements, or
      to troubleshoot problems on the server, even when the server is locked or
      running in an abnormal state and not responding to a SQL Server Database
      Engine connection. In a cluster scenario the administrator may not actually be
      logged on to the same node that is currently hosting the SQL Server instance
      and thus is considered 'remote'. Therefore this setting should usually be
      enabled (1) for SQL Server failover clusters; otherwise it should be disabled
      (0) which is the default.
    audit_procedure: >
      Run the following T-SQL command: USE master; GO SELECT name, CAST(value as
      int) as value_configured, CAST(value_in_use as int) as value_in_use FROM
      sys.configurations WHERE name = 'Remote admin connections' AND
      SERVERPROPERTY('IsClustered') = 0; If no data is returned, the instance is a
      cluster and this recommendation is not applicable. If data is returned, then
      both the value columns must show 0.
    remediation: >
      Run the following T-SQL command on non-clustered installations: EXECUTE
      sp_configure 'Remote admin connections', 0; RECONFIGURE; GO 22 | P a g e
