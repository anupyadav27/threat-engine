  - rule_id: sql_server.cis.3.revoke_connect_permissions_on_the_guest_user
    title: "Revoke CONNECT permissions on the 'guest user' within all SQL Server databases excluding the master, msdb and tempdb"
    severity: high
    category: database
    tech_type: sql_server
    automation_type: manual
    cis_benchmark: "CIS_MSSQL 2014_v1.1.0"
    cis_version: "2014_v1.1.0"
    cis_control: "3.2"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Removes the right of guest users to connect to SQL Server user databases.
    rationale: >
      A login assumes the identity of the guest user when a login has access to SQL
      Server but does not have access to a database through its own account and the
      database has a guest user account. Revoking the connect permission for the
      guest user will ensure that a login is not able to access database information
      without explicit access to do so.
    audit_procedure: >
      Run the following code snippet in each database in the instance to determine
      if the guest user has CONNECT permission. No rows should be returned. USE [
      database_name ]; GO SELECT DB_NAME() AS DBName, dpr.name, dpe.permission_name
      FROM sys.database_permissions dpe JOIN sys.database_principals dpr ON
      dpe.grantee_principal_id=dpr.principal_id WHERE dpr.name='guest' AND
      dpe.permission_name='CONNECT';
    remediation: >
      The following code snippet revokes CONNECT permissions from the guest user in
      a database: USE [ database_name ]; GO REVOKE CONNECT FROM guest; Impact: When
      CONNECT permission to the guest user is revoked, a SQL Server instance login
      must be mapped to a database user explicitly in order to have access to the
      database. 41 | P a g e Default Value: The guest user account is added to each
      new database but without CONNECT permission by default. References: 1.
      http://msdn.microsoft.com/en-us/library/bb402861(v=sql.120).aspx 42 | P a g e
    references: >
