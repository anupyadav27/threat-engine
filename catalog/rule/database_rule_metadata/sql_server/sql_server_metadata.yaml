  - rule_id: sql_server.cis.2.sa_login_account_is_set_to_disabled
    title: "Ensure the 'sa' Login Account is set to 'Disabled'"
    severity: high
    category: database
    tech_type: sql_server
    automation_type: automated
    cis_benchmark: "CIS_MSSQL 2022_v1.2.0"
    cis_version: "2022_v1.2.0"
    cis_control: "2.13"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The sa account is a widely known and often widely used SQL Server account with
      sysadmin privileges. This is the original login created during installation
      and always has the principal_id=1 and sid=0x01.
    rationale: >
      Enforcing this control reduces the probability of an attacker executing brute
      force attacks against a well-known principal. Impact: It is not a good
      security practice to code applications or scripts to use the sa account.
      However, if this has been done, disabling the sa account will prevent scripts
      and applications from authenticating to the database server and executing
      required tasks or functions.
    audit_procedure: >
      Use the following syntax to determine if the sa account is disabled. Checking
      for sid=0x01 ensures that the original sa account is being checked in case it
      has been renamed per best practices. SELECT name, is_disabled FROM
      sys.server_principals WHERE sid = 0x01 AND is_disabled = 0; No rows should be
      returned to be compliant. An is_disabled value of 0 indicates the login is
      currently enabled and therefore needs remediation.
    remediation: >
      Execute the following T-SQL query: USE [master] GO DECLARE @tsql nvarchar(max)
      SET @tsql = 'ALTER LOGIN ' + SUSER_NAME(0x01) + ' DISABLE' EXEC (@tsql) GO
      Default Value: By default, the sa login account is disabled at install time
      when Windows Authentication Mode is selected. If mixed mode (SQL Server and
      Windows Authentication) is selected at install, the default for the sa login
      is enabled. References: 1. https://learn.microsoft.com/en-us/sql/relational-
      databases/system-catalog- views/sys-server-principals-transact-sql 2.
      https://learn.microsoft.com/en-us/sql/t-sql/statements/alter-login-transact-
      sql 3. https://learn.microsoft.com/en-us/sql/relational-
      databases/security/choose-an- authentication-mode Additional Information: In
      the case of AWS RDS the default name for this account is rdsa instead of sa.
    references: >
      1. https://learn.microsoft.com/en-us/sql/relational-databases/system-catalog-
      views/sys-server-principals-transact-sql 2. https://learn.microsoft.com/en-
      us/sql/t-sql/statements/alter-login-transact-sql 3.
      https://learn.microsoft.com/en-us/sql/relational-databases/security/choose-an-
      authentication-mode Additional Information: In the case of AWS RDS the default
      name for this account is rdsa instead of sa.
    impact: >
      It is not a good security practice to code applications or scripts to use the
