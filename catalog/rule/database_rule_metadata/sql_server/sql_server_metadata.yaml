  - rule_id: sql_server.cis.2.remote_access_server_configuration_option_is_set
    title: "Ensure 'Remote Access' Server Configuration Option is set to '0'"
    severity: high
    category: database
    tech_type: sql_server
    automation_type: automated
    cis_benchmark: "CIS_MSSQL 2022_v1.2.0"
    cis_version: "2022_v1.2.0"
    cis_control: "2.6"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The remote access option controls the execution of local stored procedures on
      remote servers or remote stored procedures on local server.
    rationale: >
      Functionality can be abused to launch a Denial-of-Service (DoS) attack on
      remote servers by off-loading query processing to a target. Impact: Per
      Microsoft: This feature may be removed in a future version of Microsoft SQL
      Server. Do not use this feature in new development work, and modify
      applications that currently use this feature as soon as possible. Use
      sp_addlinkedserver instead.
    audit_procedure: >
      Run the following T-SQL command: SELECT name, CAST(value as int) as
      value_configured, CAST(value_in_use as int) as value_in_use FROM
      sys.configurations WHERE name = 'remote access'; Both value columns must show
      0.
    remediation: >
      For AWS RDS Instances, please refer to the documentation for using Parameter
      Groups here: Working with parameter groups Otherwise, run the following T-SQL
      command: EXECUTE sp_configure 'show advanced options', 1; RECONFIGURE; EXECUTE
      sp_configure 'remote access', 0; RECONFIGURE; GO EXECUTE sp_configure 'show
      advanced options', 0; RECONFIGURE; Restart the Database Engine. Default Value:
      By default, this option is enabled (1). References: 1.
      https://learn.microsoft.com/en-us/sql/database-engine/configure-
      windows/configure-the-remote-access-server-configuration-option
    references: >
      1. https://learn.microsoft.com/en-us/sql/database-engine/configure-
      windows/configure-the-remote-access-server-configuration-option
    impact: >
      Per Microsoft: This feature may be removed in a future version of Microsoft
      SQL Server. Do not use this feature in new development work, and modify
      applications that currently use this feature as soon as possible. Use
      sp_addlinkedserver instead.
    compliance_mappings:
