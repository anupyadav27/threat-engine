  - rule_id: sql_server.cis.2.auto_close_is_set_to_off_on_contained_databases
    title: "Ensure 'AUTO_CLOSE' is set to 'OFF' on contained databases"
    severity: high
    category: database
    tech_type: sql_server
    automation_type: automated
    cis_benchmark: "CIS_MSSQL 2022_v1.2.0"
    cis_version: "2022_v1.2.0"
    cis_control: "2.15"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      AUTO_CLOSE determines if a given database is closed or not after a connection
      terminates. If enabled, subsequent connections to the given database will
      require the database to be reopened and relevant procedure caches to be
      rebuilt.
    rationale: >
      Because authentication of users for contained databases occurs within the
      database not at the server\instance level, the database must be opened every
      time to authenticate a user. The frequent opening/closing of the database
      consumes additional server resources and may contribute to a denial of
      service.
    audit_procedure: >
      Perform the following to find contained databases that are not configured as
      prescribed: SELECT name, containment, containment_desc, is_auto_close_on FROM
      sys.databases WHERE containment <> 0 and is_auto_close_on = 1; No rows should
      be returned.
    remediation: >
      Execute the following T-SQL, replacing <database_name> with each database name
      found by the Audit Procedure: ALTER DATABASE <database_name> SET AUTO_CLOSE
      OFF; Default Value: By default, the database property AUTO_CLOSE is OFF which
      is equivalent to is_auto_close_on = 0. References: 1.
      https://learn.microsoft.com/en-us/sql/relational-databases/databases/security-
      best-practices-with-contained-databases
    references: >
