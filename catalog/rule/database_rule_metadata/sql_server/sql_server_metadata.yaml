  - rule_id: sql_server.cis.2.ole_automation_procedures_server_configuration
    title: "Ensure 'Ole Automation Procedures' Server Configuration Option is set to '0'"
    severity: high
    category: database
    tech_type: sql_server
    automation_type: automated
    cis_benchmark: "CIS_MSSQL 2022_v1.2.0"
    cis_version: "2022_v1.2.0"
    cis_control: "2.5"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The Ole Automation Procedures option controls whether OLE Automation objects
      can be instantiated within Transact-SQL batches. These are extended stored
      procedures that allow SQL Server users to execute functions external to SQL
      Server.
    rationale: >
      Enabling this option will increase the attack surface of SQL Server and allow
      users to execute functions in the security context of SQL Server.
    audit_procedure: >
      Run the following T-SQL command: SELECT name, CAST(value as int) as
      value_configured, CAST(value_in_use as int) as value_in_use FROM
      sys.configurations WHERE name = 'Ole Automation Procedures'; Both value
      columns must show 0 to be compliant.
    remediation: >
      Run the following T-SQL command: EXECUTE sp_configure 'show advanced options',
      1; RECONFIGURE; EXECUTE sp_configure 'Ole Automation Procedures', 0;
      RECONFIGURE; GO EXECUTE sp_configure 'show advanced options', 0; RECONFIGURE;
      Default Value: By default, this option is disabled (0). References: 1.
      https://learn.microsoft.com/en-us/sql/database-engine/configure-windows/ole-
      automation-procedures-server-configuration-option
    references: >
      1. https://learn.microsoft.com/en-us/sql/database-engine/configure-
