  - rule_id: sql_server.cis.5.sql_server_audit_is_set_to_capture_both_failed
    title: "Ensure 'SQL Server Audit' is set to capture both 'failed' and 'successful logins'"
    severity: high
    category: database
    tech_type: sql_server
    automation_type: automated
    cis_benchmark: "CIS_MSSQL 2022_v1.2.0"
    cis_version: "2022_v1.2.0"
    cis_control: "5.4"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      SQL Server Audit is capable of capturing both failed and successful logins and
      writing them to one of three places: the application event log, the security
      event log, or the file system. We will use it to capture any login attempt to
      SQL Server, as well as any attempts to change audit policy, changes in
      privileged role memberships and changes to server settings. This will also
      serve to be a second source to record failed login attempts.
    rationale: >
      By utilizing Audit instead of the traditional setting under the Security tab
      to capture successful logins, we reduce the noise in the ERRORLOG. This keeps
      it smaller and easier to read for DBAs who are attempting to troubleshoot
      issues with the SQL Server. Also, the Audit object can write to the security
      event log, though this requires operating system configuration. This gives an
      additional option for where to store login events, especially in conjunction
      with an SIEM. Impact: With the previous recommendation, only failed logins are
      captured. If the Audit object is not implemented with the appropriate setting,
      SQL Server will not capture successful logins, which might prove of use for
      forensics.
    audit_procedure: >
      For AWS RDS Instances, if RDS has not been configured to write to an S3
      bucket, this is a fail. Run the following T-SQL command: SELECT S.name AS
      'Audit Name' , CASE S.is_state_enabled WHEN 1 THEN 'Y' WHEN 0 THEN 'N' END AS
      'Audit Enabled' , S.type_desc AS 'Write Location' , SA.name AS 'Audit
      Specification Name' , CASE SA.is_state_enabled WHEN 1 THEN 'Y' WHEN 0 THEN 'N'
      END AS 'Audit Specification Enabled' , SAD.audit_action_name ,
      SAD.audited_result FROM sys.server_audit_specification_details AS SAD JOIN
      sys.server_audit_specifications AS SA ON SAD.server_specification_id =
      SA.server_specification_id JOIN sys.server_audits AS S ON SA.audit_guid =
      S.audit_guid WHERE SAD.audit_action_id IN ('CNAU', 'LGFL', 'LGSD', 'ADDP',
      'ADSP', 'OPSV') or (SAD.audit_action_id IN ('DAGS', 'DAGF') and (select
      count(*) from sys.databases where containment=1) > 0); The result set should
      contain the following rows, one for each of the following audit_action_names:
      • AUDIT_CHANGE_GROUP • FAILED_LOGIN_GROUP • SUCCESSFUL_LOGIN_GROUP •
      DATABASE_ROLE_MEMBER_CHANGE_GROUP • SERVER_ROLE_MEMBER_CHANGE_GROUP •
      SERVER_OPERATION_GROUP The result set should also contain these 2 rows if
      there are contained databases • SUCCESSFUL_DATABASE_AUTHENTICATION_GROUP •
      FAILED_DATABASE_AUTHENTICATION_GROUP Both the Audit and Audit specification
      should be enabled and the audited_result should include both success and
      failure.
    remediation: >
      For AWS RDS Instances, please refer to the documentation for configuring SQL
      Server Audit here: SQL Server Audit Perform either the GUI or T-SQL method
      shown: GUI Method 1. Expand the SQL Server in Object Explorer . 2. Expand the
      Security Folder 3. Right-click on the Audits folder and choose New Audit... 4.
      Specify a name for the Server Audit . 5. Specify the audit destination details
      and then click OK to save the Server Audit . 6. Right-click on Server Audit
      Specifications and choose New Server Audit Specification... 7. Name the Server
      Audit Specification 8. Select the just created Server Audit in the Audit drop-
      down selection. 9. Click the drop-down under Audit Action Type and select
      AUDIT_CHANGE_GROUP. 10. Click the new drop-down Audit Action Type and select
      FAILED_LOGIN_GROUP. 11. Click the new drop-down under Audit Action Type and
      select SUCCESSFUL_LOGIN_GROUP. 12. Click the new drop-down under Audit Action
      Type and select DATABASE_ROLE_MEMBER_CHANGE_GROUP. 13. Click the new drop-down
      under Audit Action Type and select SERVER_ROLE_MEMBER_CHANGE_GROUP. 14. Click
      the new drop-down under Audit Action Type and select SERVER_OPERATION_GROUP.
      15. Click the new drop-down under Audit Action Type and select
      SUCCESSFUL_DATABASE_AUTHENTICATION_GROUP. 16. Click the new drop-down under
      Audit Action Type and select FAILED_DATABASE_AUTHENTICATION_GROUP. 17. Click
      OK to save the Server Audit Specification . 18. Right-click on the new Server
      Audit Specification and select Enable Server Audit Specification . 19. Right-
      click on the new Server Audit and select Enable Server Audit . T-SQL Method
      Execute code similar to: CREATE SERVER AUDIT TrackLogins TO APPLICATION_LOG;
      GO CREATE SERVER AUDIT SPECIFICATION TrackAllLogins FOR SERVER AUDIT
      TrackLogins ADD (FAILED_LOGIN_GROUP), ADD (SUCCESSFUL_LOGIN_GROUP), ADD
      (AUDIT_CHANGE_GROUP), ADD (DATABASE_ROLE_MEMBER_CHANGE_GROUP), ADD
      (SERVER_ROLE_MEMBER_CHANGE_GROUP), ADD (SERVER_OPERATION_GROUP), ADD
      (SUCCESSFUL_DATABASE_AUTHENTICATION_GROUP), ADD
      (FAILED_DATABASE_AUTHENTICATION_GROUP) WITH (STATE = ON); GO ALTER SERVER
      AUDIT TrackLogins WITH (STATE = ON); GO Note: If the write destination for the
      Audit object is to be the security event log, see the Books Online topic Write
      SQL Server Audit Events to the Security Log and follow the appropriate steps.
      Default Value: By default, there are no audit object tracking login events.
      References: 1. https://learn.microsoft.com/en-us/sql/relational-
      databases/security/auditing/create-a-server-audit-and-server-audit-
      specification Additional Information: If you want to filter out 'VIEW SERVER
      STATE' events from the audit (because it can create extra rows in the log, and
      you may or may not be interested in that specific event), create your server
      audit with a filter, to exclude that specific event: CREATE SERVER AUDIT
      TrackLogins TO APPLICATION_LOG WHERE ([audit_id]<>(1414746966)) ;
    references: >
      1. https://learn.microsoft.com/en-us/sql/relational-
      databases/security/auditing/create-a-server-audit-and-server-audit-
      specification Additional Information: If you want to filter out 'VIEW SERVER
      STATE' events from the audit (because it can create extra rows in the log, and
      you may or may not be interested in that specific event), create your server
      audit with a filter, to exclude that specific event: CREATE SERVER AUDIT
      TrackLogins TO APPLICATION_LOG WHERE ([audit_id]<>(1414746966)) ;
    impact: >
      With the previous recommendation, only failed logins are captured. If the
      Audit object is not implemented with the appropriate setting, SQL Server will
      not capture successful logins, which might prove of use for forensics.
    compliance_mappings:
      cis:
        - "CIS_MSSQL_2022_v1_2_0_5_4"
      nist_800_53: []
      soc2: []
      pci_dss: []
