  - rule_id: sql_server.cis.7.databases_are_encrypted_with_tde
    title: "Ensure Databases are Encrypted with TDE"
    severity: medium
    category: database
    tech_type: sql_server
    automation_type: automated
    cis_benchmark: "CIS_MSSQL 2022_v1.2.0"
    cis_version: "2022_v1.2.0"
    cis_control: "7.5"
    cis_section: "7"
    profile_applicability: "Level 2"
    description: >
      Ensure user databases are encrypted using Transparent Data Encryption (TDE).
      Backups of databases encrypted with TDE are automatically encrypted as well.
    rationale: >
      A malicious party who steals physical media like drives or backup tapes can
      restore or attach the database and browse its data. One solution is to encrypt
      sensitive data in a database and use a certificate to protect the keys that
      encrypt the data. This solution prevents anyone without the keys from using
      the data. Impact: A database datafile, logfile or backup accidentally exposed
      to the Internet or transmitted outside a secure environment can be easily
      copied/restored to a SQL Server anywhere and its contents discovered.
    audit_procedure: >
      select database_id, name, is_encrypted from sys.databases where database_id >
      4 and is_encrypted != 1 The query should return no rows
    remediation: >
      Implement TDE encryption on each user database with sensitive data. More info
      on how to do this is available here: https://learn.microsoft.com/en-
      us/sql/relational-databases/security/encryption/transparent-data-encryption
      References: 1. https://learn.microsoft.com/en-us/sql/relational-
      databases/security/encryption/transparent-data-encryption 2.
      https://learn.microsoft.com/en-us/archive/blogs/sqlsecurity/feature-spotlight-
      transparent-data-encryption-tde
    references: >
      1. https://learn.microsoft.com/en-us/sql/relational-
      databases/security/encryption/transparent-data-encryption 2.
      https://learn.microsoft.com/en-us/archive/blogs/sqlsecurity/feature-spotlight-
      transparent-data-encryption-tde
    impact: >
