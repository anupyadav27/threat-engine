  - rule_id: sql_server.cis.3.windows_local_groups_are_not_sql_logins
    title: "Ensure Windows local groups are not SQL Logins"
    severity: high
    category: database
    tech_type: sql_server
    automation_type: automated
    cis_benchmark: "CIS_MSSQL 2022_v1.2.0"
    cis_version: "2022_v1.2.0"
    cis_control: "3.10"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Local Windows groups should not be used as logins for SQL Server instances.
    rationale: >
      Allowing local Windows groups as SQL Logins provides a loophole whereby anyone
      with OS level administrator rights (and no SQL Server rights) could add users
      to the local Windows groups and thereby give themselves or others access to
      the SQL Server instance. Impact: Before dropping the local group logins,
      ensure that alternative AD Groups or Windows logins have been added with
      equivalent permissions. Otherwise, the SQL Server instance may become totally
      inaccessible.
    audit_procedure: >
      Use the following syntax to determine if any local groups have been added as
      SQL Server Logins. SELECT pr.[name] AS LocalGroupName, pe.[permission_name],
      pe.[state_desc] FROM sys.server_principals pr JOIN sys.server_permissions pe
      ON pr.[principal_id] = pe.[grantee_principal_id] WHERE pr.[type_desc] =
      'WINDOWS_GROUP' AND pr.[name] like CAST(SERVERPROPERTY('MachineName') AS
      nvarchar) + '%'; This query should not return any rows.
    remediation: >
      1. For each LocalGroupName login, if needed create an equivalent AD group
      containing only the required user accounts. 2. Add the AD group or individual
      Windows accounts as a SQL Server login and grant it the permissions required.
      3. Drop the LocalGroupName login using the syntax below after replacing <name>
      . USE [master] GO DROP LOGIN [<name>] GO Default Value: By default, no local
      groups are added as SQL logins.
    references: >
      
    impact: >
      Before dropping the local group logins, ensure that alternative AD Groups or
      Windows logins have been added with equivalent permissions. Otherwise, the SQL
      Server instance may become totally inaccessible.
    compliance_mappings:
      cis:
        - "CIS_MSSQL_2022_v1_2_0_3_10"
      nist_800_53: []
      soc2: []
      pci_dss: []
