    profile_applicability: "Level 1"
    description: >
      The scan for startup procs option, if enabled, causes SQL Server to scan for
      and automatically run all stored procedures that are set to execute upon
      service startup.
    rationale: >
      Enforcing this control reduces the threat of an entity leveraging these
      facilities for malicious purposes. Impact: Setting Scan for Startup Procedures
      to 0 will prevent certain audit traces and other commonly used monitoring
      stored procedures from re-starting on start up. Additionally, replication
      requires this setting to be enabled (1) and will automatically change this
      setting if needed.
    audit_procedure: >
