  - rule_id: sql_server.cis.3.sysadmin_role_is_limited_to_administrative_or
    title: "Ensure the 'SYSADMIN' Role is Limited to Administrative or Built-in Accounts"
    severity: high
    category: database
    tech_type: sql_server
    automation_type: manual
    cis_benchmark: "CIS_MSSQL 2022_v1.2.0"
    cis_version: "2022_v1.2.0"
    cis_control: "3.12"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The SYSADMIN role is the highest privileged server-level role in SQL Server
      database engine. Moreover, by design built-in accounts by default are granted
      permission to this server-level role by Microsoft design so database engine
      works as expected. The following virtual accounts / Service SIDs are default
      members of SYSADMIN: NT SERVICE\SQLWriter NT SERVICE\Winmgmt NT
      SERVICE\MSSQLSERVER (Used by the SQL database engine service) NT
      SERVICE\SQLSERVERAGENT(Used by the SQL Agent service) This means that the
      service accounts for the SQL Database Engine and SQL Agent does not need to,
      and should not have , their specific service accounts added to the SYSADMIN
      group seperately, as it is not needed. The built-in database sa account and
      service accounts are automatically created during SQL Server installation are
      required to be granted SYSADMIN role. DBA’s can create accounts with SYSADMIN
      role for support and administration. Such accounts should be limited as well
      as protected using strict access and authorization restrictions.
    rationale: >
      This will greatly reduces attack surface, as only limited and specific
      accounts will be granted SYSADMIN role. So, attackers can’t break into the
      database system with highly privileged accounts.
    audit_procedure: >
      Execute this SQL query to find current service accounts running your SQL
      Server Engine with SYSADMIN role permission: SELECT distinct(name),type_desc
      FROM master.sys.server_principals a , sys.dm_server_services b WHERE
      IS_SRVROLEMEMBER ('sysadmin',name) = 1 and a.name=b.service_account; Execute
      this SQL query to list all SQL Server instance principles with SYSADMIN role
      granted to them: SELECT distinct(name),type_desc FROM
      master.sys.server_principals WHERE IS_SRVROLEMEMBER ('sysadmin',name) = 1 AND
      name not in ( 'NT SERVICE\SQLWriter', 'NT SERVICE\Winmgmt', 'NT
      SERVICE\MSSQLSERVER', 'NT SERVICE\SQLSERVERAGENT' ); If any accounts un-
      allowed accounts have SYSADMIN role, this is a fail.
    remediation: >
      Remove any un-allowed SQL Server accounts which are granted SYSADMIN role
      using this query: ALTER ROLE SYSADMIN DROP MEMBER <account>; References: 1.
      https://learn.microsoft.com/en-us/sql/database-engine/configure-
      windows/configure-windows-service-accounts-and-permissions
    references: >
      1. https://learn.microsoft.com/en-us/sql/database-engine/configure-
      windows/configure-windows-service-accounts-and-permissions
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_MSSQL_2022_v1_2_0_3_12"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_mssql_2022_v1_2_0_3_12"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: sql_server.cis.3.membership_in_admin_roles_in_msdb_database_is
    title: "Ensure membership in admin roles in MSDB database is limited"
    severity: high
    category: database
    tech_type: sql_server
    automation_type: automated
    cis_benchmark: "CIS_MSSQL 2022_v1.2.0"
    cis_version: "2022_v1.2.0"
    cis_control: "3.13"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Based on Microsoft design an account with DB_OWNER can elevate permissions to
      SYSADMIN
    rationale: >
      MSDBmust be configured with the TRUSTWORTHY flag ON to work properly. If the
      TRUSTWORTHY setting is set to ON, and if the owner of the database is a member
      of a group that has administrative credentials, such as the sysadmin group
      (for example the default sa login), the database owner can then be able to
      create and run unsafe assemblies that can compromise the instance of the SQL
      Server, as well as run code to elevate his privileges to SYSADMIN
    audit_procedure: >
      USE [msdb] SELECT count(*) FROM sys.databases AS db, sys.database_role_members
      AS drm INNER JOIN sys.database_principals AS r ON drm.role_principal_id =
      r.principal_id INNER JOIN sys.database_principals AS m ON
      drm.member_principal_id = m.principal_id WHERE r.name in ('db_owner',
      'db_securityadmin', 'db_ddladmin', 'db_datawriter') and m.name <>'dbo' and
      db.database_id=3; GO A value higher than 0 indicates a fail.
    remediation: >
      USE [msdb] GO ALTER ROLE [db_owner] DROP MEMBER <username>; Default Value:
      Default value is that only dbo user is member of db_owner role in MSDB
      database References: 1. https://learn.microsoft.com/en-us/sql/relational-
      databases/security/trustworthy- database-property?view=sql-server-ver16
    references: >
      1. https://learn.microsoft.com/en-us/sql/relational-
      databases/security/trustworthy- database-property?view=sql-server-ver16
    impact: >
      
