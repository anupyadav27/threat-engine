  - rule_id: sql_server.cis.2.configure_sql_server_to_use_non_standard_ports
    title: "Configure SQL Server to use non-standard ports"
    severity: high
    category: database
    tech_type: sql_server
    automation_type: manual
    cis_benchmark: "CIS_MSSQL 2014_v1.1.0"
    cis_version: "2014_v1.1.0"
    cis_control: "2.11"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      If enabled, the default SQL Server instance will be assigned a default port of
      TCP:1433 for TCP/IP communication. Administrators can also configure named
      instances to use TCP:1433 for communication. TCP:1433 is a widely known SQL
      Server port and this port assignment should be changed.
    rationale: >
      Using a non-default port helps protect the database from attacks directed to
      the default port.
    audit_procedure: >
      Open a powershell window and run the following command: PS C:\>netstat
      -ano|select-string 1433.+listening This should return no lines. If any lines
      returned, check the process id in the last column if it's a SQL Server
      instance.
    remediation: >
      1. In SQL Server Configuration Manager, in the console pane, expand SQL Server
      Network Configuration, expand Protocols for , and then double-click the TCP/IP
      or VIA protocol 2. In the TCP/IP Properties dialog box, on the IP Addresses
      tab, several IP addresses appear in the format IP1, IP2, up to IPAll. One of
      these is for the IP address of the loopback adapter, 127.0.0.1. Additional IP
      addresses appear for each IP Address on the computer 3. Change the TCP Port
      field from 1433 to another non-standard port or leave the TCP Port field empty
      and set the TCP Dynamic Ports value to 0 to enable dynamic port assignment and
      then click OK. 4. In the console pane, click SQL Server Services. 5. In the
      details pane, right-click SQL Server () and then click Restart, to stop and
      restart SQL Server. 28 | P a g e Impact: Changing the default port will force
      DAC (Default Administrator Connection) to listen on a random port. Also, it
      might make benign applications, such as application firewalls, require special
      configuration. Default Value: By default, default SQL Server instances listen
      on to TCP/IP traffic on TCP port 1433 and named instances use dynamic ports.
      References: 1. http://msdn.microsoft.com/en-
      us/library/ms177440(v=sql.120).aspx 29 | P a g e
    references: >
      1. http://msdn.microsoft.com/en-us/library/ms177440(v=sql.120).aspx 29 | P a g
      e
    impact: >
      Changing the default port will force DAC (Default Administrator Connection) to
      listen on a random port. Also, it might make benign applications, such as
      application firewalls, require special configuration. Default Value: By
