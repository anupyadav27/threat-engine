  - rule_id: sql_server.cis.7.symmetric_key_encryption_algorithm_is_set_to_aes
    title: "Ensure 'Symmetric Key encryption algorithm' is set to 'AES_128' or higher in non-system databases"
    severity: high
    category: database
    tech_type: sql_server
    automation_type: automated
    cis_benchmark: "CIS_MSSQL 2022_v1.2.0"
    cis_version: "2022_v1.2.0"
    cis_control: "7.1"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      Per the Microsoft Best Practices, only the SQL Server AES algorithm options,
      AES_128, AES_192, and AES_256, should be used for a symmetric key encryption
      algorithm.
    rationale: >
      The following algorithms (as referred to by SQL Server) are considered weak or
      deprecated and should no longer be used in SQL Server: DES, DESX, RC2, RC4,
      RC4_128. Many organizations may accept the Triple DES algorithms (TDEA) which
      use keying options 1 (3 key aka 3TDEA) or keying option 2 (2 key aka 2TDEA).
      In SQL Server, these are referred to as TRIPLE_DES_3KEY and TRIPLE_DES
      respectively. Additionally, the SQL Server algorithm named DESX is actually
      the same implementation as the TRIPLE_DES_3KEY option. However, using the DESX
      identifier as the algorithm type has been deprecated and its usage is now
      discouraged. Impact: Eliminates use of weak and deprecated algorithms which
      may put a system at higher risk of an attacker breaking the key. Encrypted
      data cannot be compressed, but compressed data can be encrypted. If you use
      compression, you should compress data before encrypting it.
    audit_procedure: >
      Run the following code for each individual user database: USE <database_name>
      GO SELECT db_name() AS Database_Name, name AS Key_Name FROM sys.symmetric_keys
      WHERE algorithm_desc NOT IN ('AES_128','AES_192','AES_256') AND db_id() > 4;
      GO For compliance, no rows should be returned.
    remediation: >
      Refer to Microsoft SQL Server Books Online ALTER SYMMETRIC KEY entry:
      https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-symmetric-key-
      transact-sql Default Value: none References: 1.
      https://learn.microsoft.com/en-us/sql/t-sql/statements/alter-symmetric-key-
      transact-sql 2. https://learn.microsoft.com/en-US/sql/relational-
      databases/security/encryption/choose-an-encryption-algorithm
    references: >
      1. https://learn.microsoft.com/en-us/sql/t-sql/statements/alter-symmetric-key-
      transact-sql 2. https://learn.microsoft.com/en-US/sql/relational-
      databases/security/encryption/choose-an-encryption-algorithm
    impact: >
      Eliminates use of weak and deprecated algorithms which may put a system at
      higher risk of an attacker breaking the key. Encrypted data cannot be
      compressed, but compressed data can be encrypted. If you use compression, you
      should compress data before encrypting it.
    compliance_mappings:
      cis:
        - "CIS_MSSQL_2022_v1_2_0_7_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_mssql_2022_v1_2_0_7_1"
