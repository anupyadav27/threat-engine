  - rule_id: sql_server.cis.6.database_and_application_user_input_is_sanitized
    title: "Ensure Database and Application User Input is Sanitized"
    severity: high
    category: database
    tech_type: sql_server
    automation_type: manual
    cis_benchmark: "CIS_MSSQL 2022_v1.2.0"
    cis_version: "2022_v1.2.0"
    cis_control: "6.1"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Always validate user input received from a database client or application by
      testing type, length, format, and range prior to transmitting it to the
      database server.
    rationale: >
      Sanitizing user input drastically minimizes risk of SQL injection. Impact:
      Sanitize user input may require changes to application code or database object
      syntax. These changes can require applications or databases to be taken
      temporarily off-line. Any change to TSQL or application code should be
      thoroughly tested in testing environment before production implementation.
    audit_procedure: >
      Check with the application teams to ensure any database interaction is through
      the use of stored procedures and not dynamic SQL. Revoke any INSERT, UPDATE,
      or DELETE privileges to users so that modifications to data must be done
      through stored procedures. Verify that there's no SQL query in the application
      code produced by string concatenation.
    remediation: >
      The following steps can be taken to remediate SQL injection vulnerabilities: •
      Review TSQL and application code for SQL Injection • Only permit minimally
      privileged accounts to send user input to the server • Minimize the risk of
      SQL injection attack by using parameterized commands and stored procedures •
      Reject user input containing binary data, escape sequences, and comment
      characters • Always validate user input and do not use it directly to build
      SQL statements References: 1. https://owasp.org/www-
      community/attacks/SQL_Injection
    references: >
      1. https://owasp.org/www-community/attacks/SQL_Injection
