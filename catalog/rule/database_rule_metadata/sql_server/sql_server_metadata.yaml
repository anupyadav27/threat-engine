      value_configured, CAST(value_in_use as int) as value_in_use FROM
      sys.configurations WHERE name = 'clr strict security'; Both value columns must
      show 1 to be compliant.
    remediation: >
      Run the following T-SQL command: EXECUTE sp_configure 'show advanced options',
      1; RECONFIGURE; EXECUTE sp_configure 'clr strict security', 1; RECONFIGURE; GO
