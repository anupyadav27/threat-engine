  - rule_id: sql_server.cis.7.asymmetric_key_size_is_set_to_greater_than_or
    title: "Ensure Asymmetric Key Size is set to 'greater than or equal to 2048' in non-system databases"
    severity: high
    category: database
    tech_type: sql_server
    automation_type: automated
    cis_benchmark: "CIS_MSSQL 2022_v1.2.0"
    cis_version: "2022_v1.2.0"
    cis_control: "7.2"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      Microsoft Best Practices recommend to use at least a 2048-bit encryption
      algorithm for asymmetric keys.
    rationale: >
      The RSA_2048 encryption algorithm for asymmetric keys in SQL Server is the
      highest bit-level provided and therefore the most secure available choice
      (other choices are RSA_512 and RSA_1024). Impact: The higher-bit level may
      result in slower performance, but reduces the likelihood of an attacker
      breaking the key. Encrypted data cannot be compressed, but compressed data can
      be encrypted. If you use compression, you should compress data before
      encrypting it.
    audit_procedure: >
      Run the following code for each individual user database: USE <database_name>
      GO SELECT db_name() AS Database_Name, name AS Key_Name FROM
      sys.asymmetric_keys WHERE key_length < 2048 AND db_id() > 4; GO For
      compliance, no rows should be returned.
    remediation: >
      Refer to Microsoft SQL Server Books Online ALTER ASYMMETRIC KEY entry:
      https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-asymmetric-key-
      transact-sql Default Value: None References: 1.
      https://learn.microsoft.com/en-us/sql/t-sql/statements/alter-symmetric-key-
      transact-sql 2. https://learn.microsoft.com/en-US/sql/relational-
      databases/security/encryption/choose-an-encryption-algorithm
    references: >
      1. https://learn.microsoft.com/en-us/sql/t-sql/statements/alter-symmetric-key-
      transact-sql 2. https://learn.microsoft.com/en-US/sql/relational-
      databases/security/encryption/choose-an-encryption-algorithm
    impact: >
      The higher-bit level may result in slower performance, but reduces the
      likelihood of an attacker breaking the key. Encrypted data cannot be
      compressed, but compressed data can be encrypted. If you use compression, you
      should compress data before encrypting it.
