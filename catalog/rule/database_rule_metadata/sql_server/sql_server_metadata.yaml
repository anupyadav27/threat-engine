  - rule_id: sql_server.cis.2.remote_admin_connections_server_configuration
    title: "Ensure 'Remote Admin Connections' Server Configuration Option is set to '0'"
    severity: high
    category: database
    tech_type: sql_server
    automation_type: automated
    cis_benchmark: "CIS_MSSQL 2022_v1.2.0"
    cis_version: "2022_v1.2.0"
    cis_control: "2.7"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The remote admin connections option controls whether a client application on a
      remote computer can use the Dedicated Administrator Connection (DAC).
    rationale: >
      The Dedicated Administrator Connection (DAC) lets an administrator access a
      running server to execute diagnostic functions or Transact-SQL statements, or
      to troubleshoot problems on the server, even when the server is locked or
      running in an abnormal state and not responding to a SQL Server Database
      Engine connection. In a cluster scenario, the administrator may not actually
      be logged on to the same node that is currently hosting the SQL Server
      instance and thus is considered 'remote'. Therefore, this setting should
      usually be enabled (1) for SQL Server failover clusters; otherwise, it should
      be disabled (0) which is the default.
    audit_procedure: >
      Run the following T-SQL command: SELECT name, CAST(value as int) as
      value_configured, CAST(value_in_use as int) as value_in_use FROM
      sys.configurations WHERE name = 'remote admin connections' AND
      SERVERPROPERTY('IsClustered') = 0; If no data is returned, the instance is a
      cluster and this recommendation is not applicable. If data is returned, then
      both the value columns must show 0 to be compliant.
    remediation: >
      Run the following T-SQL command on non-clustered installations: EXECUTE
      sp_configure 'remote admin connections', 0; RECONFIGURE; GO Default Value: By
      default, this option is disabled (0), only local connections may use the DAC.
      References: 1. https://learn.microsoft.com/en-us/sql/database-
      engine/configure- windows/remote-admin-connections-server-configuration-option
      Additional Information: If it's a clustered installation, this option must be
      enabled as a clustered SQL Server cannot bind to localhost and DAC will be
      unavailable otherwise. Enable it for clustered installations. Disable it for
      standalone installations where not required.
    references: >
