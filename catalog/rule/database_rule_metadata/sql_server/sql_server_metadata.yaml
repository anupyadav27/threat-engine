      sysadmin privileges. The sa login is the original login created during
      installation and always has principal_id=1 and sid=0x01.
    rationale: >
      It is more difficult to launch password-guessing and brute-force attacks
      against the sa login if the name is not known. Impact: It is not a good
      security practice to code applications or scripts to use the sa login.
