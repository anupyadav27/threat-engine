  - rule_id: sql_server.cis.4.must_change_option_is_set_to_on_for_all_sql
    title: "Ensure 'MUST_CHANGE' Option is set to 'ON' for All SQL Authenticated Logins"
    severity: high
    category: database
    tech_type: sql_server
    automation_type: manual
    cis_benchmark: "CIS_MSSQL 2022_v1.2.0"
    cis_version: "2022_v1.2.0"
    cis_control: "4.1"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Whenever this option is set to ON, SQL Server will prompt for an updated
      password the first time the new or altered login is used.
    rationale: >
      Enforcing a password change after a reset or new login creation will prevent
      the account administrators or anyone accessing the initial password from
      misuse of the SQL login created without being noticed. Impact:
      CHECK_EXPIRATION and CHECK_POLICY options must both be ON. End users must have
      the means (application) to change the password when forced.
    audit_procedure: >
      Using SQL Server Management Studio 1. Open SQL Server Management Studio . 2.
      Open Object Explorer and connect to the target instance. 3. Navigate to the
      Logins tab in Object Explorer and expand. Right click on the desired login and
      select Properties . 4. Verify the User must change password at next login
      checkbox is checked. Using T-SQL SELECT name ,CAST(LOGINPROPERTY(log.name,
      N'IsMustChange') AS bit) AS [MustChangePassword],* FROM sys.server_principals
      AS log WHERE type = 'S' and CAST(LOGINPROPERTY(log.name, N'IsMustChange') AS
      bit) = 1 Returns '1' row for each new Login that has not been logged in to
      yet, and is correctly configured Note: This audit procedure is only applicable
      immediately after the login has been created or altered to force the password
      change. Once the password is changed, there is no way to know specifically
      that this option was the forcing mechanism behind a password change.
    remediation: >
      Set the MUST_CHANGE option for SQL Authenticated logins when creating a login
      initially: CREATE LOGIN <login_name> WITH PASSWORD = '<password_value>'
      MUST_CHANGE, CHECK_EXPIRATION = ON, CHECK_POLICY = ON; Set the MUST_CHANGE
      option for SQL Authenticated logins when resetting a password: ALTER LOGIN
      <login_name> WITH PASSWORD = '<new_password_value>' MUST_CHANGE; Default
      Value: ON when creating a new login via the SSMS GUI. OFF when creating a new
      login using T-SQL CREATE LOGIN unless the MUST_CHANGE option is explicitly
      included along with CHECK_EXPIRATION = ON. References: 1.
      https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-login-transact-sql
      2. https://docs.microsoft.com/en-us/sql/t-sql/statements/create-login-
      transact-sql
    references: >
      1. https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-login-transact-
      sql 2. https://docs.microsoft.com/en-us/sql/t-sql/statements/create-login-
      transact-sql
    impact: >
      CHECK_EXPIRATION and CHECK_POLICY options must both be ON. End users must have
      the means (application) to change the password when forced.
    compliance_mappings:
      cis:
        - "CIS_MSSQL_2022_v1_2_0_4_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
