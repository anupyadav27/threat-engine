  - rule_id: sql_server.cis.7.network_encryption_is_configured_and_enabled
    title: "Ensure Network Encryption is Configured and Enabled"
    severity: medium
    category: database
    tech_type: sql_server
    automation_type: automated
    cis_benchmark: "CIS_MSSQL 2022_v1.2.0"
    cis_version: "2022_v1.2.0"
    cis_control: "7.4"
    cis_section: "7"
    profile_applicability: "Level 2"
    description: >
      Configuring and enabling network encryption ensures traffic between the
      application and the database system is encrypted. This will ensure compliance
      to security standards such as PCI DSS, which is required if connections are
      through a public network. Network encryption can be configured in SQL Server
      either with self-signed certificates or TLS certificates.
    rationale: >
      Network encryption will ensure data transmitted over the network is protected,
      so attackers can’t ex-filtrate passwords, and confidential data. This protects
      against man in the middle attack, and network sniffing attacks to ex-filtrate
      data transmitted between the database system and applications.
    audit_procedure: >
      Run the following T-SQL code against the Master database: SELECT DISTINCT
      encrypt_option FROM sys.dm_exec_connections c WHERE net_transport <> 'Shared
      memory' AND c.endpoint_id NOT IN ( SELECT endpoint_id FROM
      sys.database_mirroring_endpoints WHERE encryption_algorithm IS NOT NULL ); A
      response of TRUE implies a pass.
    remediation: >
      Refer to Microsoft SQL Server Encryption Documentation:
      https://learn.microsoft.com/en-us/sql/relational-
      databases/security/encryption/sql-server- encryption References: 1.
      https://learn.microsoft.com/en-us/sql/database-engine/configure-
      windows/configure-sql-server-encryption 2. https://learn.microsoft.com/en-
      us/sql/relational-databases/security/encryption/sql- server-encryption 3.
      https://learn.microsoft.com/en-us/sql/database-engine/configure-
      windows/certificate-requirements 4. https://learn.microsoft.com/en-
      us/sql/relational-databases/system-dynamic- management-views/sys-dm-exec-
      connections-transact-sql
    references: >
