  - rule_id: sql_server.cis.1.single_function_member_servers_are_used
    title: "Ensure Single-Function Member Servers are Used"
    severity: high
    category: database
    tech_type: sql_server
    automation_type: manual
    cis_benchmark: "CIS_MSSQL 2022_v1.2.0"
    cis_version: "2022_v1.2.0"
    cis_control: "1.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      It is recommended that SQL Server software be installed on a dedicated server.
      This architectural consideration affords security flexibility in that the
      database server can be placed on a separate subnet allowing access only from
      particular hosts and over particular protocols. Degrees of availability are
      easier to achieve as well - over time, an enterprise can move from a single
      database server to a failover to a cluster using load balancing or to some
      combination thereof.
    rationale: >
      It is easier to manage (i.e. reduce) the attack surface of the server hosting
      SQL Server software if the only surfaces to consider are the underlying
      operating system, SQL Server itself, and any security/operational tooling that
      may additionally be installed. As noted in the description, availability can
      be more easily addressed if the database is on a dedicated server. Impact: It
      is difficult to see any reasonably adverse impact to making this architectural
      change, once the costs of making the change have been paid. Custom
      applications may need to be modified to accommodate database connections over
      the wire rather than on the host (i.e. using TCP/IP instead of Named Pipes).
      Additional hardware and operating system licenses may be required to make
      these architectural changes.
    audit_procedure: >
      Ensure that no other roles are enabled for the underlying operating system and
      that no excess tooling is installed, per enterprise policy.
    remediation: >
      Uninstall excess tooling and/or remove unnecessary roles from the underlying
      operating system.
    references: >
      
    impact: >
      It is difficult to see any reasonably adverse impact to making this
      architectural change, once the costs of making the change have been paid.
      Custom applications may need to be modified to accommodate database
      connections over the wire rather than on the host (i.e. using TCP/IP instead
      of Named Pipes). Additional hardware and operating system licenses may be
      required to make these architectural changes.
    compliance_mappings:
      cis:
        - "CIS_MSSQL_2022_v1_2_0_1_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_mssql_2022_v1_2_0_1_2"
    metadata_source: generated
    generated_by: generate_tech_rules

