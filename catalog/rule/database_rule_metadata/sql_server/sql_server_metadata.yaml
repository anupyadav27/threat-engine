  - rule_id: sql_server.cis.4.check_policy_option_is_set_to_on_for_all_sql
    title: "Ensure 'CHECK_POLICY' Option is set to 'ON' for All SQL Authenticated Logins"
    severity: high
    category: database
    tech_type: sql_server
    automation_type: automated
    cis_benchmark: "CIS_MSSQL 2022_v1.2.0"
    cis_version: "2022_v1.2.0"
    cis_control: "4.3"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Applies the same password complexity policy used in Windows to passwords used
      inside SQL Server.
    rationale: >
      Ensure SQL authenticated login passwords comply with the secure password
      policy applied by the Windows Server Benchmark so that they cannot be easily
      compromised via brute force attack. Impact: This is a mitigating
      recommendation for systems which cannot follow the recommendation to use only
      Windows Authenticated logins. Weak passwords can lead to compromised systems.
      SQL Server authenticated logins will utilize the password policy set in the
      computer's local policy, which is typically set by the Default Domain Policy
      setting. The setting is only enforced when the password is changed. This
      setting does not force existing weak passwords to be changed.
    audit_procedure: >
      Use the following code snippet to determine the status of SQL Logins and if
      their password complexity is enforced. SELECT name, is_disabled FROM
      sys.sql_logins WHERE is_policy_checked = 0; The is_policy_checked value of 0
      indicates that the CHECK_POLICY option is OFF; value of 1 is ON. If
      is_disabled value is 1, then the login is disabled and unusable. If no rows
      are returned then either no SQL Authenticated logins exist or they all have
      CHECK_POLICY ON.
    remediation: >
      For each <login_name> found by the Audit Procedure, execute the following
      T-SQL statement: ALTER LOGIN [<login_name>] WITH CHECK_POLICY = ON; Note: In
      the case of AWS RDS do not perform this remediation for the Master account.
      Default Value: CHECK_POLICY is ON References: 1.
      https://learn.microsoft.com/en-us/sql/relational-databases/security/password-
      policy
    references: >
      1. https://learn.microsoft.com/en-us/sql/relational-
      databases/security/password- policy
    impact: >
      This is a mitigating recommendation for systems which cannot follow the
      recommendation to use only Windows Authenticated logins. Weak passwords can
