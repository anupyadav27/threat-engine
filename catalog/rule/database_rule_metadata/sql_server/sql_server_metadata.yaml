  - rule_id: sql_server.cis.7.asymmetric_key_size_is_greater_than_or_equal_to
    title: "Ensure asymmetric key size is greater than or equal to 2048 in non- system databases"
    severity: high
    category: database
    tech_type: sql_server
    automation_type: manual
    cis_benchmark: "CIS_MSSQL 2014_v1.1.0"
    cis_version: "2014_v1.1.0"
    cis_control: "7.2"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      Microsoft Best Practices recommend to use at least a 2048-bit encryption
      algorithm for asymmetric keys.
    rationale: >
      The RSA_2048 encryption algorithm for asymmetric keys in SQL Server is the
      highest bit- level provided and therefore the most secure available choice
      (other choices are RSA_512 and RSA_1024).
    audit_procedure: >
      Run the following code for each individual user database: USE [dbname] GO
      SELECT db_name() AS Database_Name, name AS Key_Name FROM sys.asymmetric_keys
      WHERE key_length < 2048 AND db_id() > 4; GO For compliance, no rows should be
      returned.
    remediation: >
      Refer to Microsoft SQL Server Books Online ALTER ASYMMETRIC KEY entry:
      http://msdn.microsoft.com/en-us/library/ms187311.aspx Impact: The higher-bit
      level may result in slower performance, but reduces the likelihood of an
      attacker breaking the key. Encrypted data cannot be compressed, but compressed
      data can be encrypted. If you use compression, you should compress data before
      encrypting it. Default Value: none 64 | P a g e 8 Appendix: Additional
      Considerations This appendix discusses possible configuration options for
      which no recommendation is being given. 65 | P a g e
