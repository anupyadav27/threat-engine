  - rule_id: sql_server.cis.2.ad_hoc_distributed_queries_server_configuration
    title: "Ensure 'Ad Hoc Distributed Queries' Server Configuration Option is set to '0'"
    severity: high
    category: database
    tech_type: sql_server
    automation_type: automated
    cis_benchmark: "CIS_MSSQL 2022_v1.2.0"
    cis_version: "2022_v1.2.0"
    cis_control: "2.1"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Enabling Ad Hoc Distributed Queries allows users to query data and execute
      statements on external data sources. This functionality should be disabled.
    rationale: >
      This feature can be used to remotely access and exploit vulnerabilities on
      remote SQL Server instances and to run unsafe Visual Basic for Application
      functions.
    audit_procedure: >
      Run the following T-SQL command: SELECT name, CAST(value as int) as
      value_configured, CAST(value_in_use as int) as value_in_use FROM
      sys.configurations WHERE name = 'Ad Hoc Distributed Queries'; Both value
      columns must show 0.
    remediation: >
      For AWS RDS Instances, please refer to the documentation for using Parameter
      Groups here: Working with parameter groups Run the following T-SQL command:
      EXECUTE sp_configure 'show advanced options', 1; RECONFIGURE; EXECUTE
      sp_configure 'Ad Hoc Distributed Queries', 0; RECONFIGURE; GO EXECUTE
      sp_configure 'show advanced options', 0; RECONFIGURE; Default Value: 0
      (disabled) References: 1. https://learn.microsoft.com/en-us/sql/database-
      engine/configure-windows/ad- hoc-distributed-queries-server-configuration-
      option
    references: >
      1. https://learn.microsoft.com/en-us/sql/database-engine/configure-windows/ad-
      hoc-distributed-queries-server-configuration-option
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_MSSQL_2022_v1_2_0_2_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
