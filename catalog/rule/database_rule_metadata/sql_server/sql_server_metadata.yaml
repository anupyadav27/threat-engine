  - rule_id: sql_server.cis.2.hide_instance_option_is_set_to_yes_for_production
    title: "Ensure 'Hide Instance' option is set to 'Yes' for Production SQL Server instances"
    severity: high
    category: database
    tech_type: sql_server
    automation_type: automated
    cis_benchmark: "CIS_MSSQL 2022_v1.2.0"
    cis_version: "2022_v1.2.0"
    cis_control: "2.12"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Non-clustered SQL Server instances within production environments should be
      designated as hidden to prevent advertisement by the SQL Server Browser
      service.
    rationale: >
      Designating production SQL Server instances as hidden leads to a more secure
      installation because they cannot be enumerated. However, clustered instances
      may break if this option is selected. Impact: This method only prevents the
      instance from being listed on the network. If the instance is hidden (not
      exposed by SQL Browser), then connections will need to specify the server and
      port in order to connect. It does not prevent users from connecting to server
      if they know the instance name and port. If you hide a clustered named
      instance, the cluster service may not be able to connect to the SQL Server.
      Please refer to the Microsoft documentation reference.
    audit_procedure: >
      Perform either the GUI or T-SQL method shown: GUI Method 1. In SQL Server 2022
      Configuration Manager , expand SQL Server Network Configuration , right-click
      Protocols for <InstanceName> , and then select Properties . 2. On the Flags
      tab, in the Hide Instance box, if Yes is selected, it is compliant. T-SQL
      Method Execute the following T-SQL. DECLARE @getValue INT; EXEC
      master.sys.xp_instance_regread @rootkey = N'HKEY_LOCAL_MACHINE', @key =
      N'SOFTWARE\Microsoft\Microsoft SQL Server\MSSQLServer\SuperSocketNetLib',
      @value_name = N'HideInstance', @value = @getValue OUTPUT; SELECT @getValue; A
      value of 1 should be returned to be compliant.
    remediation: >
      Perform either the GUI or T-SQL method shown: GUI Method 1. In SQL Server 2022
      Configuration Manager , expand SQL Server Network Configuration , right-click
      Protocols for <InstanceName> , and then select Properties . 2. On the Flags
      tab, in the Hide Instance box, select Yes, and then click OK to close the
      dialog box. The change takes effect immediately for new connections. T-SQL
      Method Execute the following T-SQL to remediate: EXEC
      master.sys.xp_instance_regwrite @rootkey = N'HKEY_LOCAL_MACHINE', @key =
      N'SOFTWARE\Microsoft\Microsoft SQL Server\MSSQLServer\SuperSocketNetLib',
      @value_name = N'HideInstance', @type = N'REG_DWORD', @value = 1; Default
      Value: By default, SQL Server instances are not hidden. References: 1.
      https://learn.microsoft.com/en-us/sql/database-engine/configure-windows/hide-
      an-instance-of-sql-server-database-engine
    references: >
      1. https://learn.microsoft.com/en-us/sql/database-engine/configure-
      windows/hide- an-instance-of-sql-server-database-engine
    impact: >
      This method only prevents the instance from being listed on the network. If
      the instance is hidden (not exposed by SQL Browser), then connections will
      need to specify the server and port in order to connect. It does not prevent
      users from connecting to server if they know the instance name and port. If
      you hide a clustered named instance, the cluster service may not be able to
      connect to the SQL Server. Please refer to the Microsoft documentation
      reference.
    compliance_mappings:
      cis:
        - "CIS_MSSQL_2022_v1_2_0_2_12"
      nist_800_53: []
      soc2: []
      pci_dss: []
