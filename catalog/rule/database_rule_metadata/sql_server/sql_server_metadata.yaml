  - rule_id: sql_server.cis.6.clr_assembly_permission_set_is_set_to_safe_access
    title: "Ensure 'CLR Assembly Permission Set' is set to 'SAFE_ACCESS' for All CLR Assemblies"
    severity: high
    category: database
    tech_type: sql_server
    automation_type: automated
    cis_benchmark: "CIS_MSSQL 2022_v1.2.0"
    cis_version: "2022_v1.2.0"
    cis_control: "6.2"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Setting CLR Assembly Permission Sets to SAFE_ACCESS will hinder assemblies
      from accessing external system resources such as files, the network,
      environment variables, or the registry.
    rationale: >
      Assemblies with EXTERNAL_ACCESS or UNSAFE permission sets can be used to
      access sensitive areas of the operating system, steal and/or transmit data and
      alter the state and other protection measures of the underlying Windows
      Operating System. Assemblies which are Microsoft-created (is_user_defined = 0)
      are excluded from this check as they are required for overall system
      functionality. Impact: The remediation measure should first be tested within a
      test environment prior to production to ensure the assembly still functions as
      designed with SAFE permission setting.
    audit_procedure: >
      Execute the following SQL statement: USE <database_name>; GO SELECT name,
      permission_set_desc FROM sys.assemblies WHERE is_user_defined = 1 AND name <>
      'Microsoft.SqlServer.Types'; All the returned assemblies should show
      SAFE_ACCESS in the permission_set_desc column.
    remediation: >
      USE <database_name>; GO ALTER ASSEMBLY <assembly_name> WITH PERMISSION_SET =
      SAFE; Default Value: SAFE permission is set by default. References: 1.
      https://learn.microsoft.com/en-us/sql/relational-databases/clr-
      integration/security/clr-integration-code-access-security 2.
      https://learn.microsoft.com/en-us/sql/relational-databases/system-catalog-
      views/sys-assemblies-transact-sql 3. https://learn.microsoft.com/en-
      us/sql/t-sql/statements/alter-assembly-transact-sql 4.
      https://learn.microsoft.com/en-us/sql/relational-databases/clr-
      integration/security/clr-integration-code-access-security#recommended-
      permission-settings Additional Information: Per Microsoft documentation, 'SQL
      Server contains CLR assemblies that the database engine uses to provide
      certain functionality. The Microsoft.SQLServer.Types assembly that is included
      with SQL Server installation appears in the metadata as an UNSAFE assembly.
      This is by design. These assemblies are considered trusted & secure by
      default.'
    references: >
      1. https://learn.microsoft.com/en-us/sql/relational-databases/clr-
      integration/security/clr-integration-code-access-security 2.
      https://learn.microsoft.com/en-us/sql/relational-databases/system-catalog-
      views/sys-assemblies-transact-sql 3. https://learn.microsoft.com/en-
