  - rule_id: sql_server.cis.3.only_the_default_permissions_specified_by
    title: "Ensure only the default permissions specified by Microsoft are granted to the public server role"
    severity: high
    category: database
    tech_type: sql_server
    automation_type: automated
    cis_benchmark: "CIS_MSSQL 2022_v1.2.0"
    cis_version: "2022_v1.2.0"
    cis_control: "3.8"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      public is a special fixed server role containing all logins. Unlike other
      fixed server roles, permissions can be changed for the public role. In keeping
      with the principle of least privileges, the public server role should not be
      used to grant permissions at the server scope as these would be inherited by
      all users.
    rationale: >
      Every SQL Server login belongs to the public role and cannot be removed from
      this role. Therefore, any permissions granted to this role will be available
      to all logins unless they have been explicitly denied to specific logins or
      user-defined server roles. Impact: When the extraneous permissions are revoked
      from the public server role, access may be lost unless the permissions are
      granted to the explicit logins or to user-defined server roles containing the
      logins which require the access.
    audit_procedure: >
      Use the following syntax to determine if extra permissions have been granted
      to the public server role. SELECT * FROM master.sys.server_permissions WHERE
      (grantee_principal_id = SUSER_SID(N'public') and state_desc LIKE 'GRANT%') AND
      NOT (state_desc = 'GRANT' and [permission_name] = 'VIEW ANY DATABASE' and
      class_desc = 'SERVER') AND NOT (state_desc = 'GRANT' and [permission_name] =
      'CONNECT' and class_desc = 'ENDPOINT' and major_id = 2) AND NOT (state_desc =
      'GRANT' and [permission_name] = 'CONNECT' and class_desc = 'ENDPOINT' and
      major_id = 3) AND NOT (state_desc = 'GRANT' and [permission_name] = 'CONNECT'
      and class_desc = 'ENDPOINT' and major_id = 4) AND NOT (state_desc = 'GRANT'
      and [permission_name] = 'CONNECT' and class_desc = 'ENDPOINT' and major_id =
      5); This query should not return any rows.
    remediation: >
      1. Add the extraneous permissions found in the Audit query results to the
      specific logins to user-defined server roles which require the access. 2.
      Revoke the <permission_name> from the public role as shown below USE [master]
      GO REVOKE <permission_name> FROM public; GO Default Value: By default, the
      public server role is granted VIEW ANY DATABASE permission and the CONNECT
      permission on the default endpoints (TSQL Local Machine, TSQL Named Pipes,
      TSQL Default TCP, TSQL Default VIA). The VIEW ANY DATABASE permission allows
      all logins to see database metadata, unless explicitly denied. References: 1.
      https://learn.microsoft.com/en-us/sql/relational-
      databases/security/authentication- access/server-level-roles 2.
      https://learn.microsoft.com/en-us/sql/relational-
      databases/security/authentication- access/server-level-roles#permissions-of-
      fixed-server-roles
    references: >
      1. https://learn.microsoft.com/en-us/sql/relational-
      databases/security/authentication- access/server-level-roles 2.
      https://learn.microsoft.com/en-us/sql/relational-
      databases/security/authentication- access/server-level-roles#permissions-of-
      fixed-server-roles
    impact: >
      When the extraneous permissions are revoked from the public server role,
      access may be lost unless the permissions are granted to the explicit logins
      or to user-defined server roles containing the logins which require the
      access.
    compliance_mappings:
      cis:
        - "CIS_MSSQL_2022_v1_2_0_3_8"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_mssql_2022_v1_2_0_3_8"
