  - rule_id: sql_server.cis.8.sql_server_browser_service_is_configured_correctly
    title: "Ensure 'SQL Server Browser Service' is configured correctly"
    severity: high
    category: database
    tech_type: sql_server
    automation_type: manual
    cis_benchmark: "CIS_MSSQL 2022_v1.2.0"
    cis_version: "2022_v1.2.0"
    cis_control: "8.1"
    cis_section: "8"
    profile_applicability: "Level 1"
    description: >
      No recommendation is being given on disabling the SQL Server Browser service.
    rationale: >
      In the case of a default instance installation, the SQL Server Browser service
      is disabled by default. Unless there is a named instance on the same server,
      there is typically no reason for the SQL Server Browser service to be running.
      In this case it is strongly suggested that the SQL Server Browser service
      remain disabled. When it comes to named instances, given that a security scan
      can fingerprint a SQL Server listening on any port, it's therefore of limited
      benefit to disable the SQL Server Browser service. However, if all connections
      against the named instance are via applications and are not visible to end
      users, then configuring the named instance to listening on a static port,
      disabling the SQL Server Browser service, and configuring the apps to connect
      to the specified port should be the direction taken. This follows the general
      practice of reducing the surface area, especially for an unneeded feature. On
      the other hand, if end users are directly connecting to databases on the
      instance, then typically having them use ServerName\InstanceName is best. This
      requires the SQL Server Browser service to be running. Disabling the SQL
      Server Browser service would mean the end users would have to remember port
      numbers for the instances. When they don't that will generate service calls to
      IT staff. Given the limited benefit of disabling the service, the trade-off is
      probably not worth it, meaning it makes more business sense to leave the SQL
      Server Browser service enabled.
    audit_procedure: >
      Check the SQL Browser service's status via services.msc or similar methods.
    remediation: >
      Enable or disable the service as needed for your environment. Default Value:
      The SQL Server Browser service is disabled if only a default instance is
      installed on the server. If a named instance is installed, the default value
      is for the SQL Server Browser service to be configured as Automatic for
      startup. References: 1. https://learn.microsoft.com/en-us/sql/database-
      engine/configure-windows/sql- server-browser-service-database-engine-and-ssas
    references: >
      1. https://learn.microsoft.com/en-us/sql/database-engine/configure-
      windows/sql- server-browser-service-database-engine-and-ssas
    impact: >
      
