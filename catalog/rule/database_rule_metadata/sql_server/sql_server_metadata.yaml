  - rule_id: sql_server.cis.3.sql_server_s_mssql_service_account_is_not_an
    title: "Ensure the SQL Server’s MSSQL Service Account is Not an Administrator"
    severity: high
    category: database
    tech_type: sql_server
    automation_type: manual
    cis_benchmark: "CIS_MSSQL 2022_v1.2.0"
    cis_version: "2022_v1.2.0"
    cis_control: "3.5"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The service account and/or service SID used by the MSSQLSERVER service for a
      default instance or <InstanceName> service for a named instance should not be
      a member of the Windows Administrator group either directly or indirectly (via
      a group). This also means that the account known as LocalSystem (aka NT
      AUTHORITY\SYSTEM) should not be used for the MSSQL service as this account has
      higher privileges than the SQL Server service requires.
    rationale: >
      Following the principle of least privilege, the service account should have no
      more privileges than required to do its job. For SQL Server services, the SQL
      Server Setup will assign the required permissions directly to the service SID.
      No additional permissions or privileges should be necessary. Impact: The SQL
      Server Configuration Manager tool should always be used to change the SQL
      Server’s service account. This will ensure that the account has the necessary
      privileges. If the service needs access to resources other than the standard
      Microsoft defined directories and registry, then additional permissions may
      need to be granted separately to those resources.
    audit_procedure: >
      Verify that the service account for running MSSQL is not LocalSystem, by
      executing the below query: SELECT * FROM [master].[sys].[dm_server_registry]
      WHERE registry_key='HKLM\SYSTEM\CurrentControlSet\Services\MSSQLSERVER' and
      value_data ='LocalSystem'; NOTE : Extend to check for LOCAL ADMIN group. If a
      record is returned then this is a finding and requires remediation.
    remediation: >
      In the case where LocalSystem is used, use SQL Server Configuration Manager to
      change to a less privileged account. Otherwise, remove the account or service
      SID from the Administrators group. You may need to run the SQL Server
      Configuration Manager if underlying permissions had been changed or if SQL
      Server Configuration Manager was not originally used to set the service
      account. Default Value: By default, the Service Account (or Service SID) is
      not a member of the Administrators group. References: 1.
      https://learn.microsoft.com/en-us/sql/database-engine/configure-
      windows/configure-windows-service-accounts-and-permissions
    references: >
      1. https://learn.microsoft.com/en-us/sql/database-engine/configure-
      windows/configure-windows-service-accounts-and-permissions
    impact: >
      The SQL Server Configuration Manager tool should always be used to change the
      SQL Server’s service account. This will ensure that the account has the
      necessary privileges. If the service needs access to resources other than the
      standard Microsoft defined directories and registry, then additional
      permissions may need to be granted separately to those resources.
