  - rule_id: cassandra.cis.1.clocks_are_synchronized_on_all_nodes
    title: "Ensure clocks are synchronized on all nodes"
    severity: high
    category: database
    tech_type: cassandra
    automation_type: manual
    cis_benchmark: "CIS_CASSANDRA 4.0_v1.1.0"
    cis_version: "4.0_v1.1.0"
    cis_control: "1.6"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Enabling Network Time Protocol (NTP), or some equivalent way, to keep clocks
      on all nodes in sync is critical.
    rationale: >
      Cassandra decides which data is most current between all of the nodes in the
      cluster based on timestamps. It is paramount to ensure all clocks are in-sync,
      otherwise the most current data may not be returned or worse, marked for
      deletion.
    audit_procedure: >
      Depending on the Linux installation this may be checked by executing the
      following command on each node: ps -aef | grep ntp OR ps -aef | grep chronyd
      OR timedatectl status | grep NTP If NTP is not configured or clocks are out-
      of-sync then this is a finding.
    remediation: >
      Install and start the time protocol on every node in the Cassandra cluster.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CASSANDRA_4_0_v1_1_0_1_6"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_cassandra_4_0_v1_1_0_1_6"
