rules:

  - rule_id: cassandra.cis.1.a_separate_user_and_group_exist_for_cassandra
    title: "Ensure a separate user and group exist for Cassandra"
    severity: high
    category: database
    tech_type: cassandra
    automation_type: manual
    cis_benchmark: "CIS_CASSANDRA 4.0_v1.1.0"
    cis_version: "4.0_v1.1.0"
    cis_control: "1.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Create separate userid and group for Cassandra.
    rationale: >
      All processes need to run as a user with least privilege. This mitigates the
      potential impact of malware to the system.
    audit_procedure: >
      Logon to the server where Cassandra is installed. To confirm existence of the
      group, execute the following command: $ getent group | grep cassandra To
      confirm existence of the user, execute the following command: $ getent passwd
      | grep cassandra If either the group or user do not exist, or if the user is
      not a member of the group, this is a finding.
    remediation: >
      Create a group for cassandra(if it does not already exist) sudo groupadd
      cassandra Create a user which is only used for running Cassandra and its
      related processes. sudo useradd -m -d /home/cassandra -s /bin/bash -g
      cassandra -u <USERID_NUMBER> cassandra Replacing <USERID_NUMBER> with a number
      not already used on the server
