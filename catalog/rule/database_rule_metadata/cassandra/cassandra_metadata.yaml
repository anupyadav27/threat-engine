  - rule_id: cassandra.cis.1.cassandra_service_is_run_as_a_non_root_user
    title: "Ensure the Cassandra service is run as a non-root user"
    severity: high
    category: database
    tech_type: cassandra
    automation_type: automated
    cis_benchmark: "CIS_CASSANDRA 4.0_v1.1.0"
    cis_version: "4.0_v1.1.0"
    cis_control: "1.5"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Though Cassandra database may be run as root, it should run as another non-
      root user.
    rationale: >
      One of the best ways to reduce your exposure to attack is to create a unique,
      unprivileged user and group for the server application. A best practice is to
      follow is ensuring processes run with a user with least privilege.
    audit_procedure: >
      Logon to the server where Cassandra is running and run the following command
      ps -aef | grep cassandra | grep java | cut -d' ' -f1 This will show who is
      running the Cassandra binary. If the user is root or has excessive privileges
      then this is a finding.
    remediation: >
      Create a group for cassandra (if it does not already exist) sudo groupadd
      cassandra Create a user which is only used for running Cassandra and its
      related processes. Replacing <DIRECTORY_WHERE_CASSANDRA_INSTALLED> with the
      full path of where Cassandra binaries are installed. Replacing <USERID_NUMBER>
      with a number not already used on the server
