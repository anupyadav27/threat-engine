  - rule_id: cassandra.cis.3.cassandra_only_listens_for_network_connections_on
    title: "Ensure that Cassandra only listens for network connections on authorized interfaces"
    severity: high
    category: database
    tech_type: cassandra
    automation_type: manual
    cis_benchmark: "CIS_CASSANDRA 4.0_v1.1.0"
    cis_version: "4.0_v1.1.0"
    cis_control: "3.5"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      When listen_address is blank and listen_interface is commented out, this will
      be set automatically by InetAddress.getLocalHost(). Presuming the node is
      configured correctly, e.g. hostname, name resolution, etc., this will
      configure the node to use the address associated with the hostname. The
      listen_address must not be set to 0.0.0.0.
    rationale: >
      Setting the address or interface to bind to will tell other Cassandra nodes to
      which address or interface to connect. This must be changed from the default
      in order for multiple nodes to be able to communicate.
    audit_procedure: >
      Check the value of listen_address or listen_interface in the cassandra.yaml.
      If listen_address is set 0.0.0.0 or a non-authorized address or interface is
      specified, this is a finding.
    remediation: >
      Set the listen_address or listen_interface, not both, in the cassandra.yaml to
      an authorized address or interface. Default Value: listen_address: localhost
      listen_interface: eth0, but is commented out by default. References: 1.
      http://cassandra.apache.org/doc/3.11/configuration/cassandra_config_file.html#li
      sten-address 2.
      http://cassandra.apache.org/doc/3.11/configuration/cassandra_config_file.html#li
      sten-interface
    references: >
      1.
      http://cassandra.apache.org/doc/3.11/configuration/cassandra_config_file.html#li
      sten-address 2.
      http://cassandra.apache.org/doc/3.11/configuration/cassandra_config_file.html#li
      sten-interface
