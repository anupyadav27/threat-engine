  - rule_id: cassandra.cis.1.latest_version_of_java_is_installed
    title: "Ensure the latest version of Java is installed"
    severity: high
    category: database
    tech_type: cassandra
    automation_type: automated
    cis_benchmark: "CIS_CASSANDRA 4.0_v1.1.0"
    cis_version: "4.0_v1.1.0"
    cis_control: "1.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      A prerequisite to installing Cassandra is the installation of Java. The
      version of Java installed should be the most recent that is compatible with
      the organization's operational needs.
    rationale: >
      Using the most recent Java SDK version can help limit the possibilities for
      vulnerabilities in the software, the installation version applied during setup
      should be established according to the needs of the organization. Ensure you
      are using a release that is covered by a level of support which includes
      regular updates to address vulnerabilities.
    audit_procedure: >
      To verify that you have the correct version of java installed: # java -version
      java version '1.8.0_172' Java(TM) SE Runtime Environment (build 1.8.0_172-b11)
      If an old/unsupported version of Java is installed this is a finding. Apache
      Cassandra expects a version of 1.8. NOTE: Experimental support for Java 11 was
      added in Cassandra 4.0 (CASSANDRA- 9608). Running Cassandra on Java 11 is
      experimental. Do so at your own risk.
    remediation: >
      1. Uninstall the old/unsupported version of Java, if present. 2. Download the
      latest compatible release of the Java JDK, or OpenJDK. 3. Follow the provided
      installation instructions to complete the install. References: 1.
      http://www.oracle.com/technetwork/java/javase/downloads/index-jsp-
      138363.html#javasejdk 2. http://openjdk.java.net/ 3.
      http://openjdk.java.net/install/index.html 4.
      http://cassandra.apache.org/doc/latest/getting_started/installing.html#prerequisite
      s 5.
      https://www.java.com/en/download/help/index_installing.xml?os=All+Platforms&j
      =8&n=20
