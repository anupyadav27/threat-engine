  - rule_id: cassandra.cis.4.logging_is_enabled
    title: "Ensure that logging is enabled."
    severity: high
    category: database
    tech_type: cassandra
    automation_type: automated
    cis_benchmark: "CIS_CASSANDRA 4.0_v1.1.0"
    cis_version: "4.0_v1.1.0"
    cis_control: "4.1"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Apache Cassandra uses Logback for logging functionality. While this can be set
      using nodetool setlogginglevel changes made using this method will be reverted
      to the level specified in the logback.xml file the next time the process
      restarts. The configurable logging levels are: • OFF • TRACE • DEBUG • INFO
      (Default) • WARN • ERROR
    rationale: >
      If logging is not enabled, issues may go undiscovered, and compromises and
      other incidents may occur without being quickly detected. It may also not be
      possible to provide evidence of compliance with security laws, regulations,
      and other requirements.
    audit_procedure: >
      Execute the following command to confirm the setting is correct: $ nodetool
      getlogginglevels Logger Name Log Level ROOT INFO org.cisecurity.workbench WARN
      If set to OFF then this is a finding.
    remediation: >
      To remediate this setting: 1. Edit the logback-test.xml if present; otherwise,
      edit the logback.xml <configuration scan='true'> <appender name='STDOUT'
      class='ch.qos.logback.core.ConsoleAppender'> <filter
      class='ch.qos.logback.classic.filter.ThresholdFilter'> <level>INFO</level>
      </filter> <encoder> <pattern>%-5level [%thread] %date{ISO8601} %F:%L -
      %msg%n</pattern> </encoder> </appender> <root level='INFO'> <appender-ref
      ref='STDOUT' /> </root> <logger name='org.cisecurity.workbench' level='WARN'/>
      </configuration> 2. Restart the Apache Cassandra Default Value: INFO
      References: 1.
      http://cassandra.apache.org/doc/latest/troubleshooting/reading_logs.html?highlig
      ht=logging 2. https://logback.qos.ch/manual/configuration.html
    references: >
      1.
      http://cassandra.apache.org/doc/latest/troubleshooting/reading_logs.html?highlig
      ht=logging 2. https://logback.qos.ch/manual/configuration.html
    impact: >
      
