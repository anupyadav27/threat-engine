  - rule_id: cassandra.cis.5.client_encryption
    title: "Client Encryption"
    severity: high
    category: database
    tech_type: cassandra
    automation_type: automated
    cis_benchmark: "CIS_CASSANDRA 4.0_v1.1.0"
    cis_version: "4.0_v1.1.0"
    cis_control: "5.2"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      Cassandra offers the option to encrypt data in transit between the client and
      nodes on the cluster. By default client encryption is turned off.
    rationale: >
      Data in transit between the client and node on the cluster should be encrypted
      to avoid network snooping, whether legitimate or not.
    audit_procedure: >
      The Cassandra configuration files can be found in the conf directory of
      tarballs. For packages, the configuration files will be located in
      /etc/cassandra. Open up the cassandra.yaml file, look for
      client_encryption_options section. Look for enabled: and optional: enabled:
      true optional: false If neither is true, then all client connections are
      unencrypted which makes this a finding. If enabled is true and optional is
      false, then all client connections must be encrypted which makes this not a
      finding. If enabled is false and optional is true, then enabled wins and all
      client connections are unencrypted which makes this a finding. If both are set
      to true, then both unencrypted and encrypted connections are allowed on the
      same port which makes this not a finding.
    remediation: >
      The client encryption should be implemented before anyone accesses the
      Cassandra server. To enable the client encryption mechanism: 1. Stop the
      Cassandra database. 2. If not done so already, build out your keystore and
      truststore. 3. Modify cassandra.yaml file to modify/add entries under
      client_encryption_options: set enabled: true set optional: false This will
      force all connections to be encrypted between client and node on the cluster.
      4. Start the Cassandra database. Default Value: enabled: false optional: false
      References: 1. http://cassandra.apache.org/doc/latest/operating/security.html
    references: >
      1. http://cassandra.apache.org/doc/latest/operating/security.html
    impact: >
      
