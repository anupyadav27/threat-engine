  - rule_id: cassandra.cis.3.there_are_no_unnecessary_roles_or_excessive
    title: "Ensure there are no unnecessary roles or excessive privileges"
    severity: high
    category: database
    tech_type: cassandra
    automation_type: manual
    cis_benchmark: "CIS_CASSANDRA 4.0_v1.1.0"
    cis_version: "4.0_v1.1.0"
    cis_control: "3.3"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Verify each role is require and has only the privileges needed to do its job.
    rationale: >
      Roles which are unneeded, have super user or other potentially excessive
      privileges may be an avenue for a hacker to gain access to or modify data in
      the database.
    audit_procedure: >
      As a superuser, retrieve all roles: list roles; Retrieve all permissions for
      all roles select * from system_auth.role_permissions; If there are any
      unnecessary roles or roles with excessive privileges this is a finding.
    remediation: >
      Remove any unnecessary roles and/or permissions in accordance with
      organizational needs. References: 1.
      http://cassandra.apache.org/doc/latest/cql/security.html
    references: >
      1. http://cassandra.apache.org/doc/latest/cql/security.html
