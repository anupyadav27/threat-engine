  - rule_id: cassandra.cis.1.latest_version_of_cassandra_is_installed
    title: "Ensure latest version of Cassandra is installed"
    severity: high
    category: database
    tech_type: cassandra
    automation_type: automated
    cis_benchmark: "CIS_CASSANDRA 4.0_v1.1.0"
    cis_version: "4.0_v1.1.0"
    cis_control: "1.4"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      The Cassandra installation version, along with the patches, should be the most
      recent that is compatible with organization's operational needs. When
      obtaining and installing software packages (typically via apt-get or you can
      compile the source code), it's imperative that packages (or the source code,
      tarball) are sourced only from valid and authorized repositories. For
      Cassandra, a short list of valid repositories may include: • The official
      apache cassandra website: http://cassandra.apache.org/ • DataStax Enterprise:
      https://www.datastax.com/
    rationale: >
      Using the most recent version of Cassandra can help limit the possibilities
      for vulnerabilities in the software, the installation version applied during
      setup should be established according to the needs of the organization. Ensure
      you are using a release that is covered by a level of support which includes
      regular updates to address vulnerabilities.
    audit_procedure: >
      To verify the version of Cassandra you have installed: cassandra -v 4.0.3 (a/o
      2022-03-29) Released on 2022-02-17 Maintained until 4.3.0 release (May-July
      2024) If an old/unsupported version of Cassandra is installed this is a
      finding.
    remediation: >
      Upgrade to the latest version of the Cassandra software: For each node in the
      cluster: 1. Using the nodetool drain command to push all memtables data to
      SSTables. 2. Stop Cassandra services. 3. Backup the data set and all of your
      Cassandra configuration files. 4. Download/Update Java if needed. 5.
      Download/Update Python if needed. 6. Download the binaries for the latest
      Cassandra revision from the Cassandra Download Page. 7. Install new version of
      Cassandra. 8. Configure new version of Cassandra, taking into account all of
      your previous settings in your config files(cassandra.yml, cassandrea-env.sh,
      etc). 9. Start Cassandra services. 10. Check logs for warnings, errors. 11.
      Using the nodetool to upgrade your SSTables. 12. Using the nodetool command to
      check status of cluster. References: 1.
      http://cassandra.apache.org/doc/latest/getting_started/installing.html#prerequisite
      s
    references: >
      1.
