  - rule_id: cassandra.cis.3.cassandra_is_run_using_a_non_privileged_dedicated
    title: "Ensure that Cassandra is run using a non-privileged, dedicated service account"
    severity: high
    category: database
    tech_type: cassandra
    automation_type: automated
    cis_benchmark: "CIS_CASSANDRA 4.0_v1.1.0"
    cis_version: "4.0_v1.1.0"
    cis_control: "3.4"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      As with any service installed on a host, it can be provided with its own user
      context. Providing a dedicated user to the service provides the ability to
      precisely constrain the service within the larger host context.
    rationale: >
      Utilizing a non-privileged account for Cassandra to execute as may reduce the
      impact of a Cassandra-born vulnerability. A restricted account will be unable
      to access resources unrelated to Cassandra, such as operating system
      configurations.
    audit_procedure: >
      Execute the following command at a terminal prompt to assess this
