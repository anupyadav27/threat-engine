  - rule_id: cassandra.cis.5.inter_node_encryption
    title: "Inter-node Encryption"
    severity: high
    category: database
    tech_type: cassandra
    automation_type: automated
    cis_benchmark: "CIS_CASSANDRA 4.0_v1.1.0"
    cis_version: "4.0_v1.1.0"
    cis_control: "5.1"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      Cassandra offers the option to encrypt data in transit between nodes on the
      cluster. By default, inter-node encryption is turned off.
    rationale: >
      Data being transferred on the wire should be encrypted to avoid network
      snooping, whether legitimate or not.
    audit_procedure: >
      Run the following command to verify whether inter-node encryption is enabled.
      cat cassandra.yaml | grep -in 'internode_encryption:' Acceptable values are
      all, dc or rack. If the internode_encryption is set to none, this is a
      finding. Note: The Cassandra configuration files can be found in the conf
      directory of tarballs. For packages, the configuration files will be located
      in /etc/cassandra.
    remediation: >
      The inter-node encryption should be implemented before anyone accesses the
      Cassandra server. To enable the inter-node encryption mechanism: 1. Stop the
      Cassandra database. 2. If not done so already, build out your keystore and
      truststore. 3. Modify cassandra.yaml file to modify/add entry for
      internode_encryption: set it to all 4. Start the Cassandra database. Default
      Value: internode_encryption: none References: 1.
      http://cassandra.apache.org/doc/latest/operating/security.html
    references: >
      1. http://cassandra.apache.org/doc/latest/operating/security.html
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CASSANDRA_4_0_v1_1_0_5_1"
