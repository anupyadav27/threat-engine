  - rule_id: cassandra.cis.3.review_superuser_admin_roles
    title: "Review Superuser/Admin Roles"
    severity: high
    category: database
    tech_type: cassandra
    automation_type: manual
    cis_benchmark: "CIS_CASSANDRA 4.0_v1.1.0"
    cis_version: "4.0_v1.1.0"
    cis_control: "3.8"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The IS_SUPERUSER privilege found in the system_auth.roles table governs who
      can control the entire Cassandra database and all of its data contained
      within.
    rationale: >
      The IS_SUPERUSER privilege allows whoever has it to do anything to the data
      and full administrator rights to the database, including changing passwords,
      creating, dropping roles. Limiting the accounts that have the IS_SUPERUSER
      role reduces the chances that an attacker can exploit these capabilities.
    audit_procedure: >
      Execute the following SQL statement to audit this setting: select role,
      is_superuser from system_auth.roles; Looking for is_superuser = True
    remediation: >
      Perform the following steps to remediate this setting: Looking at those users
      from the query that have is_superuser = True, decide if that user truly needs
      that role, if not, for each user, issue the following SQL statement (replace
      <role> with the role name from the query): alter role <role> with
      superuser=false;
