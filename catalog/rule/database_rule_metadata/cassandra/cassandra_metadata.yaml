  - rule_id: cassandra.cis.3.cassandra_and_superuser_roles_are_separate
    title: "Ensure the cassandra and superuser roles are separate"
    severity: high
    category: database
    tech_type: cassandra
    automation_type: automated
    cis_benchmark: "CIS_CASSANDRA 4.0_v1.1.0"
    cis_version: "4.0_v1.1.0"
    cis_control: "3.1"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The default installation of Cassandra includes a superuser role named
      cassandra. This necessitates the creation of a separate role to be the
      superuser role.
    rationale: >
      Superuser permissions allow for the creation, deletion, and permission
      management of other users. Considering the cassandra role is well known it
      should not be a superuser or one which is used for any administrative tasks.
      Impact: If a separate superuser account is not created and tested for correct
      functionality prior to removing the superuser role from the cassandra account
      you will no longer be able to perform certain actions, including: • Create a
      role with super user status. • Perform DROP or CREATE USER queries.
    audit_procedure: >
      To verify the configuration, run the following query: select role from
      system_auth.roles where is_superuser= True; If you get an error 2200 [ INVALID
      QUERY] due to where clause, add 'ALLOW FILTERING to end of query so it looks
      like this: select role from system_auth.roles where is_superuser= True ALLOW
      FILTERING; Looking at the role, verify any show up with is_superuser = True
      and make sure it is not cassandra or any unapproved role. If any are found
      then, this is a finding.
    remediation: >
      To remediate a misconfiguration, perform the following steps: 1. Execute the
      following command: create role '<NEW_ROLE_HERE>' with
      password='<NEW_PASSWORD_HERE>' and login=TRUE and superuser=TRUE ; grant all
      permissions on all keyspaces to <NEW_ROLE_HERE>; Note: Replace <NEW_ROLE_HERE>
      with the desired role and <NEW_PASSWORD_HERE> with a password. 2. Verify the
      new role is working. 3. Remove the superuser role from the cassandra account
      by executing the following command: UPDATE system_auth.roles SET
      is_superuser=null WHERE role='cassandra';
    references: >
      
    impact: >
      If a separate superuser account is not created and tested for correct
      functionality prior to removing the superuser role from the cassandra account
      you will no longer be able to perform certain actions, including: • Create a
      role with super user status. • Perform DROP or CREATE USER queries.
    compliance_mappings:
      cis:
        - "CIS_CASSANDRA_4_0_v1_1_0_3_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_cassandra_4_0_v1_1_0_3_1"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: cassandra.cis.3.the_default_password_is_changed_for_the_cassandra
    title: "Ensure that the default password is changed for the cassandra role"
    severity: high
    category: database
    tech_type: cassandra
    automation_type: automated
    cis_benchmark: "CIS_CASSANDRA 4.0_v1.1.0"
    cis_version: "4.0_v1.1.0"
    cis_control: "3.2"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The cassandra role has a default password which must be changed.
    rationale: >
      Failure to change the default password for the cassandra role may pose a risk
      to the database in the form of unauthorized access.
    audit_procedure: >
      Connect to Cassandra database to verify whether the cassandra role has default
      password. cqlsh -u cassandra -p cassandra If the connection is successful this
      is a finding.
    remediation: >
      Change the password for the casssandra role by issuing the following command:
      cqlsh -u cassandra -p cassandra alter role 'cassandra' with password
      '<NEWPASSWORD_HERE>'; Where <NEWPASSWORD_HERE> is replaced with the password
      of your choosing. Default Value: cassandra References: 1.
      http://cassandra.apache.org/doc/latest/operating/security.html
    references: >
      1. http://cassandra.apache.org/doc/latest/operating/security.html
