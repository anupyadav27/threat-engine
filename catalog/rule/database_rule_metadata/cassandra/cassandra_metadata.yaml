  - rule_id: cassandra.cis.2.authentication_is_enabled_for_cassandra_databases
    title: "Ensure that authentication is enabled for Cassandra databases"
    severity: high
    category: database
    tech_type: cassandra
    automation_type: automated
    cis_benchmark: "CIS_CASSANDRA 4.0_v1.1.0"
    cis_version: "4.0_v1.1.0"
    cis_control: "2.1"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Authentication is pluggable in Cassandra and is configured using the
      authenticator setting in cassandra.yaml. Cassandra ships with two options
      included in the default distribution, AllowAllAuthenticator and
      PasswordAuthenticator. The default, AllowAllAuthenticator, performs no
      authentication checks and therefore requires no credentials. It is used to
      disable authentication completely. The second option, PasswordAuthenticator,
      stores encrypted credentials in a system table. This can be used to enable
      simple username/password authentication.
    rationale: >
      Authentication is a necessary condition of Cassandra’s permissions subsystem,
      so if authentication is disabled then so are permissions. Failure to
      authenticate clients, users, and/or servers can allow unauthorized access to
      the Cassandra database and can prevent tracing actions back to their sources.
      The authentication mechanism should be implemented before anyone accesses the
      Cassandra server.
    audit_procedure: >
      Run the following command to verify whether authentication is enabled
      (authenticator values set to PasswordAuthenticator) on the Cassandra server.
      The Cassandra configuration files can be found in the conf directory of
      tarballs. For packages, the configuration files will be located in
      /etc/cassandra. cat cassandra.yaml | grep -in 'authenticator:' If
      authenticator is set to AllowAllAuthenticator, then this is a finding.
    remediation: >
      To enable the authentication mechanism: 1. Stop the Cassandra database. 2.
      Modify cassandra.yaml file to modify/add entry for authenticator: set it to
      PasswordAuthenticator 3. Start the Cassandra database. Default Value:
      authenticator: AllowAllAuthenticator References: 1.
      http://cassandra.apache.org/doc/latest/getting_started/configuring.html 2.
      http://cassandra.apache.org/doc/latest/operating/security.html
    references: >
      1. http://cassandra.apache.org/doc/latest/getting_started/configuring.html 2.
      http://cassandra.apache.org/doc/latest/operating/security.html
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CASSANDRA_4_0_v1_1_0_2_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_cassandra_4_0_v1_1_0_2_1"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: cassandra.cis.2.authorization_is_enabled_for_cassandra_databases
    title: "Ensure that authorization is enabled for Cassandra databases"
    severity: high
    category: database
    tech_type: cassandra
    automation_type: automated
    cis_benchmark: "CIS_CASSANDRA 4.0_v1.1.0"
    cis_version: "4.0_v1.1.0"
    cis_control: "2.2"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Authorization is pluggable in Cassandra and is configured using the authorizer
      setting in cassandra.yaml. Cassandra ships with two options included in the
      default distribution, AllowAllAuthenticator and CassandraAuthorizer. The
      default, AllowAllAuthenticator performs no checking which grants all
      permissions to all roles. The second option, CassandraAuthorizer, implements
      full permissions management functionality and stores its data in Cassandra
      system tables.
    rationale: >
      Authorizing roles is an important step towards ensuring only authorized access
      to the Cassandra database tables is permitted. It also provides the requisite
      means of implementing least privilege best practices. The authorization
      mechanism should be implemented before anyone accesses the Cassandra database.
    audit_procedure: >
      Run the following command to verify whether authorization is enabled
      (authorization values set to CassandraAuthorizer) on the Cassandra server. The
      Cassandra configuration files can be found in the conf directory of tarballs.
      For packages, the configuration files will be located in /etc/cassandra. cat
      cassandra.yaml | grep -in 'authorizer:' If authorizer is set to
      AllowAllAuthorizer, then this is a finding.
    remediation: >
      To enable the authorization mechanism: 1. Stop the Cassandra database. 2.
      Modify cassandra.yaml file to modify/add entry for authorization: set it to
      CassandraAuthorizer 3. Start the Cassandra database. Default Value:
      authorizer: AllowAllAuthorizer References: 1.
      http://cassandra.apache.org/doc/latest/getting_started/configuring.html 2.
      http://cassandra.apache.org/doc/latest/operating/security.html Additional
      Information: The authorizer must be configured to AllowAllAuthorizer if
      AllowAllAuthenticator is the configured authenticator.
    references: >
      1. http://cassandra.apache.org/doc/latest/getting_started/configuring.html 2.
      http://cassandra.apache.org/doc/latest/operating/security.html Additional
      Information: The authorizer must be configured to AllowAllAuthorizer if
      AllowAllAuthenticator is the configured authenticator.
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CASSANDRA_4_0_v1_1_0_2_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_cassandra_4_0_v1_1_0_2_2"
