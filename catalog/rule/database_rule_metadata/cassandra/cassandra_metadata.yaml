  - rule_id: cassandra.cis.3.data_center_authorizations_is_activated
    title: "Ensure that Data Center Authorizations is activated"
    severity: high
    category: database
    tech_type: cassandra
    automation_type: manual
    cis_benchmark: "CIS_CASSANDRA 4.0_v1.1.0"
    cis_version: "4.0_v1.1.0"
    cis_control: "3.6"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Authorization at Data Center level is pluggable in Cassandra and is configured
      using the network_authorizer setting in cassandra.yaml. Cassandra ships with
      AllowAllNetworkAuthorizer which allows any role to access any datacenter
      effectively disabling datacenter authorization; which is the current behavior.
      It should be set to CassandraNetworkAuthorizer which allows the ability to
      store permissions which restrict role access to specific datacenters.
    rationale: >
      The network_authorizer parameter in the cassandra.yaml file allows an operator
      to restrict the access of a Cassandra role to specific datacenters. Keep in
      mind that for this to work correctly, the authenticator setting in
      cassandra.yaml file must be set to PasswordAuthenticator.
    audit_procedure: >
      Run the following command to verify whether network authorization is enabled
      (network_authorizer value set to CassandraNetworkAuthorizer) on the Cassandra
      server. The Cassandra configuration files can be found in the conf directory
      of tarballs. For packages, the configuration files will be located in
      /etc/cassandra. cat cassandra.yaml | grep -in 'network_authorizer:'
    remediation: >
      1. Stop the Cassandra database on each node. 2. Modify the cassandra.yaml file
      to modify entry for network_authorizer: set it to CassandraNetworkAuthorizer
      3. Start the Cassandra database. Default Value: network_authorizer:
      AllowAllNetworkAuthorizer
