  - rule_id: cassandra.cis.3.review_user_defined_roles
    title: "Review User-Defined Roles"
    severity: high
    category: database
    tech_type: cassandra
    automation_type: manual
    cis_benchmark: "CIS_CASSANDRA 4.0_v1.1.0"
    cis_version: "4.0_v1.1.0"
    cis_control: "3.7"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The MEMBER_OF column found in the system_auth.roles table shows roles granted
      to roles.
    rationale: >
      The MEMBER_OF column shows whoever has roles granted to roles and depending on
      the role and the privileges grant to the role should be limited . Limiting the
      accounts that have the certain roles reduces the chances that an attacker can
      exploit these capabilities.
    audit_procedure: >
      Execute the following SQL statement to audit this setting: select role,
      can_login, member_of from system_auth.roles; Looking for can_login which tells
      you that role can log into cassandra and member_of is when roles are granted
      to roles.
    remediation: >
      Looking at those users from the query that have member_of that is NOT null,
      decide if that user truly needs that role, if not, for each user, issue the
      following SQL statement (replace <is_member> with the value of member_of
      returned by the query in the audit procedure) revoke <is_member> from role;
    references: >
      
