  - rule_id: oracle_db.cis.3.inactive_account_time_is_less_than_or_equal_to_120
    title: "Ensure 'INACTIVE_ACCOUNT_TIME' Is Less than or Equal to '120'"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 23ai_v1.0.0"
    cis_version: "23ai_v1.0.0"
    cis_control: "3.8"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The INACTIVE_ACCOUNT_TIME parameter in Oracle specifies the number of days an
      account can remain inactive before it is automatically locked. This setting
      helps mitigate security risks by reducing the exposure of unused accounts,
      which could be exploited for unauthorized access.
    rationale: >
      Inactive user accounts pose security risks as they can be potentially targeted
      by the attackers for unauthorized access. Setting a reasonable threshold for
      inactivity helps enforce security best practices by ensuring that unused
      accounts are locked before they can be potentially targeted for unauthorized
      access. A value of 120 days or less strikes a balance between security and
      operational flexibility. Impact: If an account is locked due to inactivity,
      administrators may need to manually unlock it when required. Organizations
      should communicate this policy to users to avoid disruptions.
    audit_procedure: >
      To assess this recommendation, execute the following SQL statement. SELECT
      DECODE(P.CON_ID,0,'ENTIRE-'||SYS_CONTEXT('USERENV','DB_NAME'),
      1,'ROOTONLY-'||SYS_CONTEXT('USERENV','DB_NAME'), CON_ID_TO_CON_NAME(P.CON_ID))
      AS CONTAINERNAME, P.PROFILE, P.RESOURCE_NAME, P.LIMIT FROM SYS.CDB_PROFILES P
      WHERE RESOURCE_NAME='INACTIVE_ACCOUNT_TIME' AND TO_NUMBER(DECODE(P.LIMIT,
      'DEFAULT',(SELECT DECODE(LIMIT,'UNLIMITED',9999,LIMIT) FROM CDB_PROFILES WHERE
      PROFILE='DEFAULT' AND RESOURCE_NAME='INACTIVE_ACCOUNT_TIME' AND CON_ID =
      P.CON_ID), 'UNLIMITED',9999, P.LIMIT)) > 120 ORDER BY CON_ID, PROFILE,
      RESOURCE_NAME;
    remediation: >
      Remediate this setting by executing the following SQL statement for each
      PROFILE returned by the audit procedure. ALTER PROFILE DEFAULT LIMIT
      INACTIVE_ACCOUNT_TIME 120 Default Value: The default value may vary based on
      Oracle versions and configurations. References: 1.
      https://docs.oracle.com/en/database/oracle/oracle-
      database/23/dbseg/configuring-authentication.html#d23067e2021
    references: >
      1. https://docs.oracle.com/en/database/oracle/oracle-
      database/23/dbseg/configuring-authentication.html#d23067e2021
    impact: >
