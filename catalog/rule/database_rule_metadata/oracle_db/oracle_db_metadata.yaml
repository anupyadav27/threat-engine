  - rule_id: oracle_db.cis.2.extproc_is_not_present_in_listener_ora
    title: "Ensure 'extproc' Is Not Present In 'listener.ora'"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 23ai_v1.0.0"
    cis_version: "23ai_v1.0.0"
    cis_control: "2.1.1"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      extproc should be removed from the listener.ora to mitigate the risk that OS
      libraries can be invoked by the Oracle instance.
    rationale: >
      extproc allows the database to run procedures from OS libraries. These library
      calls can, in turn, run any OS command.
    audit_procedure: >
      On the Linux platform, execute the following shell command to audit this
      recommendation. grep -i extproc $ORACLE_HOME/network/admin/listener.ora On the
      Windows platform, execute the following command to audit this recommendation.
      findstr -i extproc %ORACLE_HOME%\network\admin\listener.ora To be compliant
      with this recommendation, the output of this command should be NULL.
      Assumption: The audit command above assumes that listener.ora is located in
      the default path $ORACLE_HOME/network/admin/listener.ora. If this is not the
      case, please specify the correct location. For example, you may be using the
      TNS_ADMIN environment variable to point to the location of SQLNET.ORA and
      TNSNAMES.ORA.
    remediation: >
      To remediate this recommendation, remove extproc from the listener.ora file.
      Instead of relying on the EXTPROC feature in Oracle to access external
      libraries, you can use a database directory to directly access the library
      files stored within the database server's file system, allowing you to execute
      code from those libraries within your PL/SQL code without going through a
      separate external process. References: 1.
      https://docs.oracle.com/en/database/oracle/oracle-
      database/23/netag/configuring-and-administering-oracle-net-listener.html
    references: >
      1. https://docs.oracle.com/en/database/oracle/oracle-
      database/23/netag/configuring-and-administering-oracle-net-listener.html
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_ORACLE_DB_23ai_v1_0_0_2_1_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_oracle_db_23ai_v1_0_0_2_1_1"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: oracle_db.cis.2.accept_md5_certs_is_configured_correctly
    title: "Ensure 'ACCEPT_MD5_CERTS' Is Configured Correctly"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 23ai_v1.0.0"
    cis_version: "23ai_v1.0.0"
    cis_control: "2.1.2"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The setting ACCEPT_MD5_CERTS specifies whether Oracle accepts certificates
      signed with the MD5 algorithm. Note: See Additional Information regarding the
      deprecation of this setting.
    rationale: >
      Weak algorithms such as MD5 and SHA1 have known vulnerabilities that make them
      susceptible to attacks. Allowing their use can compromise data integrity and
      authentication, potentially exposing systems to risks. Transitioning to
      stronger algorithms, such as SHA-2, is recommended. Impact: Applications that
      use MD5-signed certificates must be updated to use certificates signed with a
      stronger, more secure algorithm such as SHA-2.
    audit_procedure: >
      On the Linux platform, execute the following shell command to audit this
      recommendation. grep -i 'ACCEPT_MD5_CERTS.*=.*TRUE'
      '$ORACLE_HOME/network/admin/listener.ora' On the Windows platform, execute the
      following PowerShell command to audit this recommendation. Select-String -Path
      $Env:ORACLE_HOME\network\admin\listener.ora -Pattern
      'ACCEPT_MD5_CERTS.*=.*TRUE' -CaseSensitive:$false To be compliant with this
      recommendation, the output of this command should be NULL. The audit command
      above assumes that listener.ora is located in the default path
      $ORACLE_HOME/network/admin/listener.ora. If this is not the case, please
      specify the correct location. For example, you may be using the TNS_ADMIN
      environment variable to point to the location of SQLNET.ORA and TNSNAMES.ORA.
    remediation: >
      To remediate this recommendation, remove ACCEPT_MD5_CERTS from sqlnet.ora or
      set ACCEPT_MD5_CERTS to the value FALSE. In addition to listener.ora, this
      parameter must also be set in sqlnet.ora. References: 1.
      https://docs.oracle.com/en/database/oracle/oracle-
      database/23/netrf/parameters- for-the-
      sqlnet.ora.html#GUID-84DC4C50-A550-4770-9210-1EECB4B5DB27 2.
      https://docs.oracle.com/en/database/oracle/oracle-database/23/dbseg/using-the-
      orapki-utility-to-manage-pki-elements.html#GUID-93CE62ED-97B1-43B3-8900-
      64107F8F274C 3. https://docs.oracle.com/en/database/oracle/oracle-
      database/23/netrf/parameters- for-the-
      sqlnet.ora.html#GUID-9240F605-720C-4C57-93E3-DD26CBEA1410 Additional
      Information: “Starting in Oracle Database 23ai, the ALLOW_MD5_CERTS and
      ALLOW_SHA1_CERTS sqlnet.ora parameters are deprecated. If
      ALLOWED_WEAK_CERT_ALGORITHMS is set, then Oracle Database ignores
      ALLOW_MD5_CERTS and ALLOW_SHA1_CERTS. If ALLOWED_WEAK_CERT_ALGORITHMS is not
      set, then Oracle Database checks and uses the ALLOW_MD5_CERTS and
      ALLOW_SHA1_CERTS settings.[1]”
    references: >
      1. https://docs.oracle.com/en/database/oracle/oracle-
      database/23/netrf/parameters- for-the-
      sqlnet.ora.html#GUID-84DC4C50-A550-4770-9210-1EECB4B5DB27 2.
      https://docs.oracle.com/en/database/oracle/oracle-database/23/dbseg/using-the-
      orapki-utility-to-manage-pki-elements.html#GUID-93CE62ED-97B1-43B3-8900-
      64107F8F274C 3. https://docs.oracle.com/en/database/oracle/oracle-
      database/23/netrf/parameters- for-the-
      sqlnet.ora.html#GUID-9240F605-720C-4C57-93E3-DD26CBEA1410 Additional
      Information: “Starting in Oracle Database 23ai, the ALLOW_MD5_CERTS and
      ALLOW_SHA1_CERTS sqlnet.ora parameters are deprecated. If
      ALLOWED_WEAK_CERT_ALGORITHMS is set, then Oracle Database ignores
      ALLOW_MD5_CERTS and ALLOW_SHA1_CERTS. If ALLOWED_WEAK_CERT_ALGORITHMS is not
      set, then Oracle Database checks and uses the ALLOW_MD5_CERTS and
      ALLOW_SHA1_CERTS settings.[1]”
    impact: >
      Applications that use MD5-signed certificates must be updated to use
      certificates signed with a stronger, more secure algorithm such as SHA-2.
    compliance_mappings:
      cis:
        - "CIS_ORACLE_DB_23ai_v1_0_0_2_1_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
