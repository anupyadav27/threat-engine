  - rule_id: oracle_db.cis.4.old_password_versions_are_not_used
    title: "Ensure Old Password Versions Are Not Used"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 23ai_v1.0.0"
    cis_version: "23ai_v1.0.0"
    cis_control: "4.4"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      No password versions (hashes) prior to 12c should be allowed for user
      authentication.
    rationale: >
      Oracle 12c and later versions enforce stronger password hashing algorithms and
      complexity policies, enhancing security. Older password versions (pre-12c) are
      considered weak and do not meet modern security standards.Using outdated
      password versions increases the risk of password compromise. Impact: Resetting
      user passwords without proper migration planning may result in application
      downtime or loss of access. Users with passwords hashed in an older format
      will be required to reset their passwords. Limiting authentication to 12c
      password versions may impact connectivity from older clients that rely on
      deprecated authentication mechanisms. Applications using pre-12c
      authentication methods must be updated to support 12c or later password
      hashing mechanisms.
    audit_procedure: >
      To assess this recommendation, execute the following SQL statement: SELECT
      DECODE(C.CON_ID, 0, 'ENTIRE-' || SYS_CONTEXT('USERENV','DB_NAME'), 1,
      'ROOTONLY-' || SYS_CONTEXT('USERENV','DB_NAME'), CON_ID_TO_CON_NAME(C.CON_ID))
      AS CONTAINERNAME, C.USERNAME, C.PASSWORD_VERSIONS FROM CDB_USERS C WHERE
      C.PASSWORD_VERSIONS NOT IN ('12C') ORDER BY C.CON_ID; A lack of results
      implies compliance.
    remediation: >
      Follow the process 'Finding and Resetting User Passwords That Use the 10G
      Password Version' as outlined in the Oracle Database Upgrade Guide to reset
      affected user passwords and enforce 12c password versioning. • Identify users
      with old password versions. • Ensure that SQLNET.ALLOWED_LOGON_VERSION_SERVER
      is set to 12. • Reset their passwords using the ALTER USER command.
      References: 1. https://docs.oracle.com/en/database/oracle/oracle-
      database/23/upgrd/recommended-and-best-practices-complete-upgrading- oracle-
      database.html#GUID-D7B09DFE-F55D-449A-8F8A-174D89936304
    references: >
      1. https://docs.oracle.com/en/database/oracle/oracle-
      database/23/upgrd/recommended-and-best-practices-complete-upgrading- oracle-
      database.html#GUID-D7B09DFE-F55D-449A-8F8A-174D89936304
    impact: >
      Resetting user passwords without proper migration planning may result in
      application downtime or loss of access. Users with passwords hashed in an
      older format will be required to reset their passwords. Limiting
      authentication to 12c password versions may impact connectivity from older
      clients that rely on deprecated authentication mechanisms. Applications using
      pre-12c authentication methods must be updated to support 12c or later
      password hashing mechanisms.
    compliance_mappings:
      cis:
        - "CIS_ORACLE_DB_23ai_v1_0_0_4_4"
      nist_800_53: []
      soc2: []
      pci_dss: []
