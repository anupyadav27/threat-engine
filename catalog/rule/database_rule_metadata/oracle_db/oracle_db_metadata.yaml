  - rule_id: oracle_db.cis.4.database_link_passwords_are_using_the_latest
    title: "Ensure That Database Link Passwords Are Using The Latest Encryption"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 23ai_v1.0.0"
    cis_version: "23ai_v1.0.0"
    cis_control: "4.8"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      In Oracle databases prior to version 23ai, encrypted passwords for database
      links are stored in the PASSWORDX column, which can be decrypted. Oracle 23ai
      enhances security by storing encrypted database link passwords in the SPARE1
      column, making decryption significantly more difficult.
    rationale: >
      Using the latest encryption method for database link passwords reduces the
      risk of credential exposure. Attackers who gain access to PASSWORDX can
      potentially decrypt and misuse stored credentials for unauthorized access.
      Impact: If a database link password is stored using an older encryption
      method, it could be decrypted and exploited, posing a security risk.
    audit_procedure: >
      To verify if database link passwords are still using the PASSWORDX column for
      encryption, execute the following SQL statement: SELECT DECODE(v.con_id, 0,
      'Entire-' || SYS_CONTEXT('USERENV', 'DB_NAME'), 1, 'RootOnly-' ||
      SYS_CONTEXT('USERENV', 'DB_NAME'), CON_ID_TO_CON_NAME(v.con_id)) AS
      container_name, name AS db_link, host, userid FROM CONTAINERS('SYS'.'LINK$') v
      WHERE passwordx IS NOT NULL; Lack of results implies compliance.
    remediation: >
      After upgrading to Oracle 23ai, drop and recreate the database link to ensure
      that passwords are encrypted using the latest method.
    references: >
      
    impact: >
      If a database link password is stored using an older encryption method, it
      could be decrypted and exploited, posing a security risk.
