  - rule_id: oracle_db.cis.2.sec_max_failed_login_attempts_is_set_to_3_or_less
    title: "Ensure 'SEC_MAX_FAILED_LOGIN_ATTEMPTS' Is Set To '3' Or Less"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 23ai_v1.0.0"
    cis_version: "23ai_v1.0.0"
    cis_control: "2.3.8"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The SEC_MAX_FAILED_LOGIN_ATTEMPTS parameter determines how many failed login
      attempts are allowed before Oracle closes the login connection.
    rationale: >
      Allowing an unlimited number of login attempts for a user connection can
      facilitate both brute-force login attacks and the occurrence of denial-of-
      service.
    audit_procedure: >
      To assess this recommendation, execute the following SQL statement. SELECT
      DECODE(V.CON_ID,0,'ENTIRE-'||SYS_CONTEXT('USERENV','DB_NAME'),
      1,'ROOTONLY-'||SYS_CONTEXT('USERENV','DB_NAME'), CON_ID_TO_CON_NAME(V.CON_ID))
      AS CONTAINERNAME, UPPER(NAME),UPPER(V.VALUE) FROM GV$SYSTEM_PARAMETER V WHERE
      UPPER(NAME)='SEC_MAX_FAILED_LOGIN_ATTEMPTS' AND
      TO_NUMBER(DECODE(VALUE,'1',1,'2',2,'3',3,9999)) > 3 ; To be compliant with
      this recommendation, the output of this command should be NULL. Lack of
      results indicates compliance.
    remediation: >
      To remediate this setting, execute the following SQL statement and restart the
      instance. ALTER SYSTEM SET SEC_MAX_FAILED_LOGIN_ATTEMPTS = 3 SCOPE = SPFILE;
      Default Value: 3 References: 1.
      https://docs.oracle.com/en/database/oracle/oracle-
      database/23/refrn/SEC_MAX_FAILED_LOGIN_ATTEMPTS.html
    references: >
      1. https://docs.oracle.com/en/database/oracle/oracle-
      database/23/refrn/SEC_MAX_FAILED_LOGIN_ATTEMPTS.html
