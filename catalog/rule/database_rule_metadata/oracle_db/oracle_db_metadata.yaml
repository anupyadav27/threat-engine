  - rule_id: oracle_db.cis.6.any_is_revoked_from_unauthorized_grantee
    title: "Ensure '%ANY%' Is Revoked from Unauthorized 'GRANTEE'"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 23ai_v1.0.0"
    cis_version: "23ai_v1.0.0"
    cis_control: "6.1.1"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      The Oracle database ANY keyword provides the user the capability to alter any
      item in the catalog of the database. Unauthorized grantees should not have
      that keyword assigned to them.
    rationale: >
      Authorization to use the ANY expansion of a privilege can allow an
      unauthorized user to potentially change confidential data or damage the data
      catalog.
    audit_procedure: >
      System privileges in Oracle can be granted directly to users or roles, and can
      also be inherited through role hierarchies, either directly or recursively. To
      remediate and revoke system privileges from unauthorized users or roles, it is
      essential to trace the chain of privilege grants by examining the Granted
      Privilege and How Granted columns. This query will also give you the name of
      the CDB/PDB that has the issue. To assess this recommendation, execute the
      following SQL statement. WITH GRANTEES_NOT_ORACLEMAINTAINED AS ( SELECT
      DISTINCT CON_ID_TO_CON_NAME(CON_ID) AS CONTAINERNAME, ROLE AS GRANTEE FROM
      CDB_ROLES WHERE ORACLE_MAINTAINED = 'N' UNION SELECT DISTINCT
      CON_ID_TO_CON_NAME(CON_ID) AS CONTAINERNAME, USERNAME AS GRANTEE FROM
      CDB_USERS WHERE ORACLE_MAINTAINED = 'N' ), DIRECT_PRIVS AS ( SELECT DISTINCT
      CON_ID_TO_CON_NAME(CON_ID) AS CONTAINERNAME, GRANTEE, PRIVILEGE AS
      GRANTED_PRIVILEGE, 'Direct Grant' AS HOW_GRANTED FROM CDB_SYS_PRIVS WHERE
      PRIVILEGE LIKE '%ANY%' ), INDIRECT_PRIVS AS ( SELECT DISTINCT
      CON_ID_TO_CON_NAME(CON_ID) AS CONTAINERNAME, GRANTEE, GRANTED_ROLE AS
      GRANTED_PRIVILEGE, 'Privileges Through Role' AS HOW_GRANTED FROM
      CDB_ROLE_PRIVS START WITH GRANTED_ROLE IN ( SELECT DISTINCT P.GRANTEE FROM
      SYS.CDB_SYS_PRIVS P, SYS.CDB_ROLES R WHERE P.PRIVILEGE LIKE '%ANY%' AND
      P.GRANTEE = R.ROLE) CONNECT BY PRIOR GRANTEE = GRANTED_ROLE ) SELECT
      CONTAINERNAME, GRANTEE, GRANTED_PRIVILEGE, HOW_GRANTED FROM ( SELECT * FROM
      DIRECT_PRIVS UNION SELECT * FROM INDIRECT_PRIVS ) COMBINED_PRIVS WHERE GRANTEE
      IN (SELECT GRANTEE FROM GRANTEES_NOT_ORACLEMAINTAINED) ORDER BY CONTAINERNAME,
      GRANTEE, GRANTED_PRIVILEGE; Lack of results implies compliance.
    remediation: >
      To remediate this setting, execute the following SQL statement, keeping in
      mind if this is granted in both container and pluggable database, you must
      connect to both places to revoke. Please ensure proper impact analysis is done
      before revoking the privilege from a role. REVOKE <ANY Privilege> FROM
      <grantee> ; In the case of a grant via a role : REVOKE <rolename> FROM
      <grantee> ; References: 1. https://docs.oracle.com/en/database/oracle/oracle-
      database/23/dbseg/configuring-privilege-and-role-authorization.html
    references: >
      1. https://docs.oracle.com/en/database/oracle/oracle-
      database/23/dbseg/configuring-privilege-and-role-authorization.html
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_ORACLE_DB_23ai_v1_0_0_6_1_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
