  - rule_id: oracle_db.cis.6.grant_any_object_privilege_audit_option_is_enabled
    title: "Ensure the 'GRANT ANY OBJECT PRIVILEGE' Audit Option Is Enabled"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 19c_v1.2.0"
    cis_version: "19c_v1.2.0"
    cis_control: "6.1.11"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      GRANT ANY OBJECT PRIVILEGE allows the user to grant or revoke any object
      privilege, which includes privileges on tables, directories, mining models,
      etc. Enabling this audit option causes auditing of all uses of that privilege.
    rationale: >
      Logging of privilege grants that can lead to the creation, alteration, or
      deletion of critical data, the modification of objects, object privilege
      propagation and other such activities can be critical to forensic
      investigations.
    audit_procedure: >
      Non multi-tenant or pluggable database only: To assess this recommendation,
      execute the following SQL statement. SELECT AUDIT_OPTION,SUCCESS,FAILURE FROM
      DBA_STMT_AUDIT_OPTS WHERE USER_NAME IS NULL AND PROXY_NAME IS NULL AND SUCCESS
      = 'BY ACCESS' AND FAILURE = 'BY ACCESS' AND AUDIT_OPTION='GRANT ANY OBJECT
      PRIVILEGE'; Multi-tenant in the container database: This query will also give
      you the name of the CDB/PDB that has auditing turned on. To assess this
      recommendation, execute the following SQL statement. SELECT
      AUDIT_OPTION,SUCCESS,FAILURE, DECODE (A.CON_ID, 0,(SELECT NAME FROM
      V$DATABASE), 1,(SELECT NAME FROM V$DATABASE), (SELECT NAME FROM V$PDBS B WHERE
      A.CON_ID = B.CON_ID)) FROM CDB_STMT_AUDIT_OPTS A WHERE USER_NAME IS NULL AND
      PROXY_NAME IS NULL AND SUCCESS = 'BY ACCESS' AND FAILURE = 'BY ACCESS' AND
      AUDIT_OPTION='GRANT ANY OBJECT PRIVILEGE'; Lack of results implies a finding.
    remediation: >
      To remediate this setting, execute the following SQL statement, keeping in
      mind if this needs to be done in both container and pluggable database, you
      must connect to both places to do the audit statement. AUDIT GRANT ANY OBJECT
      PRIVILEGE; Additional Information: This does NOT audit all attempts to grant
      or revoke object privileges since this can also be done by anyone who was
      granted an object privilege with the grant option. Also, this never creates an
      audit record for anyone who does not hold the GRANT ANY OBJECT PRIVILEGE
      system privilege. Therefore, many attempts, successful or not, to grant and
      revoke object privileges are not audited by this.
