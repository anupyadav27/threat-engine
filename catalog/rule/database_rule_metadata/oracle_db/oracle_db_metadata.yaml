      are primarily intended for internal or diagnostic purposes. Undocumented
      parameter values should not be set or changed from their default values,
      unless explicitly instructed by Oracle Support for internal or diagnostic
      purposes.
    rationale: >
      As not documented, the impact of these parameters is unknown or unpredictable.
      Reviewing such parameters ensures that they are not inadvertently affecting
      database operation, security, stability, or performance. They must be reviewed
      carefully to avoid unintended consequences, compliance violations, or
      operational issues.
    audit_procedure: >
      To assess this recommendation, execute the following SQL statement. SELECT
      DECODE(V.CON_ID,0,'ENTIRE-'||SYS_CONTEXT('USERENV','DB_NAME'),
      1,'ROOTONLY-'||SYS_CONTEXT('USERENV','DB_NAME'), CON_ID_TO_CON_NAME(V.CON_ID))
      AS CONTAINERNAME, UPPER(NAME), UPPER(V.VALUE) FROM GV$SYSTEM_PARAMETER V WHERE
      SUBSTR(NAME,1,1) = '_' AND ISDEFAULT = 'FALSE'; To be compliant with this
      recommendation, the output of this command should be NULL. If the output of
      this command is not NULL, then review the output for applicability of
      undocumented parameters for your organization.
    remediation: >
      To remediate this setting, execute the following SQL statement and restart the
      instance if required. ALTER SYSTEM SET <undocumented_parameter> = <Default
      value> SCOPE=SPFILE; Default Value: Undocumented parameters do not always have
      officially defined default values. Oracle does not guarantee backward
      compatibility for them across versions. Additional Information: Please note
      that some parameters such as _instance_recovery_bloom_filter_size or
      _dmm_blas_library could be ignored in 23.5.
