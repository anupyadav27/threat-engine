      Non multi-tenant or pluggable database only: To assess this recommendation,
      execute the following SQL statement. SELECT 'GRANT' AS PATH, GRANTEE,
      GRANTED_ROLE FROM DBA_ROLE_PRIVS WHERE GRANTED_ROLE = 'DBA' AND GRANTEE NOT IN
      ('SYS', 'SYSTEM') UNION SELECT 'PROXY', PROXY || '-' || CLIENT, 'DBA' FROM
      DBA_PROXIES WHERE CLIENT IN (SELECT GRANTEE FROM DBA_ROLE_PRIVS WHERE
      GRANTED_ROLE = 'DBA'); Multi-tenant in the container database : This query
      will also give you the name of the CDB/PDB that has the issue. To assess this
