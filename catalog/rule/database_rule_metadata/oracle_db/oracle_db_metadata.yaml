  - rule_id: oracle_db.cis.2.sec_protocol_error_further_action_is_set_to_drop_3
    title: "Ensure 'SEC_PROTOCOL_ERROR_FURTHER_ACTION' Is Set To '(DROP,3)'"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 23ai_v1.0.0"
    cis_version: "23ai_v1.0.0"
    cis_control: "2.3.9"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The SEC_PROTOCOL_ERROR_FURTHER_ACTION setting determines the Oracle server's
      response to bad/malformed packets received from the client. This setting
      should have a value of (DROP,3) or (DROP, 3), which will cause a connection to
      be dropped after three bad/malformed packets.
    rationale: >
      Bad packets received from the client can potentially indicate packet-based
      attacks on the system, such as 'TCP SYN Flood' or 'Smurf' attacks, which could
      result in a denial- of-service condition. This value should be set according
      to the needs of the organization.
    audit_procedure: >
      To assess this recommendation, execute the following SQL statement. SELECT
      DECODE(V.CON_ID,0,'ENTIRE-'||SYS_CONTEXT('USERENV','DB_NAME'),
      1,'ROOTONLY-'||SYS_CONTEXT('USERENV','DB_NAME'), CON_ID_TO_CON_NAME(V.CON_ID))
      AS CONTAINERNAME, UPPER(V.VALUE) FROM GV$SYSTEM_PARAMETER V WHERE UPPER(NAME)
      = 'SEC_PROTOCOL_ERROR_FURTHER_ACTION' AND UPPER(VALUE) NOT IN
      ('(DROP,3)','(DROP, 3)' ) ORDER BY CON_ID; To be compliant with this
      recommendation, the output of this command should be NULL. Lack of results
      indicates compliance.
    remediation: >
      To remediate this setting, execute the following SQL statement. ALTER SYSTEM
      SET SEC_PROTOCOL_ERROR_FURTHER_ACTION = '(DROP,3)' SCOPE=BOTH; Default Value:
      (DROP,3) References: 1. https://docs.oracle.com/en/database/oracle/oracle-
      database/23/refrn/SEC_PROTOCOL_ERROR_FURTHER_ACTION.html
    references: >
      1. https://docs.oracle.com/en/database/oracle/oracle-
      database/23/refrn/SEC_PROTOCOL_ERROR_FURTHER_ACTION.html
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_ORACLE_DB_23ai_v1_0_0_2_3_9"
      nist_800_53: []
      soc2: []
