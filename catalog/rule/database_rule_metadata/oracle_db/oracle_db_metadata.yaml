    cis_version: "19c_v1.2.0"
    cis_control: "6.2.5"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      An Oracle database role is a collection or set of privileges that can be
      granted to users or other roles. Roles may include system privileges, object
      privileges or other roles. The ALTER ROLE statement is used to change the
      authorization needed to enable a role. Enabling this unified action audit
      causes logging of all ALTER ROLE statements, whether successful or
      unsuccessful, issued by the users regardless of the privileges held by the
      users to issue such statements.
    rationale: >
      Logging and monitoring of all attempts to alter roles, whether successful or
      unsuccessful, may provide clues and forensic evidence about potential
      suspicious/unauthorized activities. Any such activities may be a cause for
      further investigation. In addition, organization security policies and
      industry/government regulations may require logging of all user activities
      involving alteration of roles.
    audit_procedure: >
      To assess this recommendation, execute the following SQL statement. WITH
      CIS_AUDIT(AUDIT_OPTION) AS ( SELECT * FROM TABLE( DBMSOUTPUT_LINESARRAY('ALTER
      ROLE' ) ) ), AUDIT_ENABLED AS ( SELECT DISTINCT AUDIT_OPTION FROM
      AUDIT_UNIFIED_POLICIES AUD WHERE AUD.AUDIT_OPTION IN ('ALTER ROLE' ) AND
      AUD.AUDIT_OPTION_TYPE = 'STANDARD ACTION' AND EXISTS (SELECT * FROM
      AUDIT_UNIFIED_ENABLED_POLICIES ENABLED WHERE ENABLED.SUCCESS = 'YES' AND
      ENABLED.FAILURE = 'YES' AND ENABLED.ENABLED_OPTION = 'BY USER' AND
      ENABLED.ENTITY_NAME = 'ALL USERS' AND ENABLED.POLICY_NAME = AUD.POLICY_NAME) )
      SELECT C.AUDIT_OPTION FROM CIS_AUDIT C LEFT JOIN AUDIT_ENABLED E ON
