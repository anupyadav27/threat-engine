  - rule_id: oracle_db.cis.4.review_the_users_created_through_real_application
    title: "Review The Users Created Through Real Application Security"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: manual
    cis_benchmark: "CIS_ORACLE_DB 23ai_v1.0.0"
    cis_version: "23ai_v1.0.0"
    cis_control: "4.3"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Oracle Real Application Security (RAS) introduces an alternative user model
      that allows users to log in directly (e.g., with SQL*Plus) when DIRECT_LOGON =
      YES. RAS users do not appear in the DBA_USERS or CDB_USERS views and are not
      created using the standard CREATE USER command, making them difficult to
      detect. To ensure proper security monitoring, the CDB_XS_USERS view should be
      reviewed regularly.
    rationale: >
      RAS users are not visible in traditional DBA_USERS or CDB_USERS views.
      Privileges for RAS users are stored and displayed separately from standard
      database users. Without regular monitoring, unauthorized or unintended RAS
      users may remain undetected. Security assessments must include RAS-related
      views, such as CDB_XS_USERS and DBA_XS_USERS, to analyze users and their
      authorizations. Impact: Dropping a RAS user may result in data loss or impact
      application availability, requiring thorough assessment before taking action.
      Some applications or scripts may rely on RAS users for specific tasks.
      Removing it may break these applications, requiring modifications or redesign.
    audit_procedure: >
      To assess this recommendation, execute the following statement: SELECT
      DECODE(C.CON_ID,0,'ENTIRE-'|| SYS_CONTEXT('USERENV','DB_NAME'),
      1,'ROOTONLY-'||SYS_CONTEXT('USERENV','DB_NAME'), CON_ID_TO_CON_NAME(C.CON_ID))
      AS CONTAINERNAME, C.NAME, C.DIRECT_LOGON_USER, C.STATUS, ACCOUNT_STATUS FROM
      CDB_XS_USERS C WHERE C.NAME NOT IN ('XSGUEST'); Review the list of RAS users.
      If any unauthorized user exists, this is a fail.
    remediation: >
      Remove RAS-Users that are not needed. BEGIN
      SYS.XS_PRINCIPAL.DELETE_PRINCIPAL(' <rasuser> '); END; Default Value: Empty
      References: 1. https://docs.oracle.com/en/database/oracle/oracle-
      database/23/dbfsg/predefined- objects-in-real-application-
      security.html#GUID-7B011292-C771-4B88-8CFA- 0CA30782773C 2.
      https://docs.oracle.com/en/database/oracle/oracle-database/23/dbfsg/real-
      application-security-hr-demo.html#GUID-FA992EC6-83D5-4465-86D8- 334EAA195C41
    references: >
      1. https://docs.oracle.com/en/database/oracle/oracle-
      database/23/dbfsg/predefined- objects-in-real-application-
      security.html#GUID-7B011292-C771-4B88-8CFA- 0CA30782773C 2.
      https://docs.oracle.com/en/database/oracle/oracle-database/23/dbfsg/real-
      application-security-hr-demo.html#GUID-FA992EC6-83D5-4465-86D8- 334EAA195C41
    impact: >
      Dropping a RAS user may result in data loss or impact application
