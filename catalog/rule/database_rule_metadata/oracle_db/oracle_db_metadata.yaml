  - rule_id: oracle_db.cis.2.ssl_cert_revocation_is_set_to_required
    title: "Ensure 'SSL_CERT_REVOCATION' Is Set To 'REQUIRED'"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 23ai_v1.0.0"
    cis_version: "23ai_v1.0.0"
    cis_control: "2.2.12"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The SSL_CERT_REVOCATION parameter in Oracle's sqlnet.ora file specifies
      whether the system should check the revocation status of SSL certificates
      during authentication. This check ensures that invalid, revoked, or
      compromised certificates cannot be used to establish secure connections.
    rationale: >
      Enabling SSL certificate revocation checking helps maintain the integrity and
      security of SSL connections by ensuring that only valid certificates are
      accepted. Without this validation, compromised certificates could allow
      unauthorized entities to impersonate legitimate servers or clients,
      potentially exposing sensitive data to interception or attacks. Impact:
      Enabling this setting without proper certificate infrastructure (e.g., CRL or
      OCSP) could result in failed connections if the revocation status cannot be
      determined.
    audit_procedure: >
      On the Linux platform, execute the following shell command to audit this
      recommendation. grep -Pi
      '^\s*(SQLNET\.)?SSL_CERT_REVOCATION\s*=\s*(FALSE|NONE)'
      '$ORACLE_HOME/network/admin/sqlnet.ora' On the Windows platform, execute the
      following command to audit this recommendation. Select-String -Path
      '$Env:ORACLE_HOME\network\admin\sqlnet.ora' -Pattern
      '^\s*(SQLNET\.)?SSL_CERT_REVOCATION\s*=\s*(FALSE|NONE)' -CaseSensitive:$false
      If the output shows FALSE or NONE, the control is not configured correctly.
    remediation: >
      To remediate this recommendation, set SSL_CERT_REVOCATION to required.
      SQLNET.SSL_CERT_REVOCATION=REQUIRED Default Value: none References: 1.
      https://docs.oracle.com/en/database/oracle/oracle-
      database/23/netrf/parameters- for-the-
      sqlnet.ora.html#GUID-412678FF-2A41-4B92-8522-11E6A14A6671 2.
      https://docs.oracle.com/en/database/oracle/oracle-
      database/23/dbseg/configuring-transport-layer-security-encryption1.html#GUID-
      C176D190-CFF8-45C1-BAA0-34388008A56A
    references: >
      1. https://docs.oracle.com/en/database/oracle/oracle-
      database/23/netrf/parameters- for-the-
      sqlnet.ora.html#GUID-412678FF-2A41-4B92-8522-11E6A14A6671 2.
