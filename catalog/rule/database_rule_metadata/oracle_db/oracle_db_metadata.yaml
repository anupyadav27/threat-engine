  - rule_id: oracle_db.cis.2.remote_listener_is_empty
    title: "Ensure 'REMOTE_LISTENER' Is Empty"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 23ai_v1.0.0"
    cis_version: "23ai_v1.0.0"
    cis_control: "2.3.13"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The remote_listener setting determines whether or not a valid listener can be
      established on a system separate from the database instance. This setting
      should be empty unless the organization specifically needs a valid listener on
      a separate system or on nodes running Oracle RAC instances.
    rationale: >
      Permitting a remote listener for connections to the database instance can
      allow for the potential spoofing of connections and that could compromise data
      confidentiality and integrity.
    audit_procedure: >
      This query will also give you the name of the CDB/PDB that has the issue. To
      assess this recommendation, execute the following SQL statement. SELECT
      DECODE(V.CON_ID,0,'ENTIRE-'||SYS_CONTEXT('USERENV','DB_NAME'),
      1,'ROOTONLY-'||SYS_CONTEXT('USERENV','DB_NAME'), CON_ID_TO_CON_NAME(V.CON_ID))
      AS CONTAINERNAME, UPPER(V.VALUE) FROM GV$SYSTEM_PARAMETER V WHERE UPPER(NAME)
      = 'REMOTE_LISTENER' AND VALUE IS NOT NULL ORDER BY CON_ID; To be compliant
      with this recommendation, the output of this command should be NULL. Lack of
      results indicates compliance.
    remediation: >
      To remediate this setting, execute the following SQL statement. ALTER SYSTEM
      SET REMOTE_LISTENER = '' SCOPE = BOTH; Default Value: There is no default
      value. References: 1. https://docs.oracle.com/en/database/oracle/oracle-
      database/23/refrn/REMOTE_LISTENER.html Additional Information: If set as
      remote_listener=true, the address/address list is taken from the TNSNAMES.ORA
      file.
    references: >
      1. https://docs.oracle.com/en/database/oracle/oracle-
      database/23/refrn/REMOTE_LISTENER.html Additional Information: If set as
      remote_listener=true, the address/address list is taken from the TNSNAMES.ORA
      file.
    impact: >
      
