      unsuccessful, issued by the users regardless of the privileges held by the
      users to log into the database. In addition, LOGOFF and LOGOFF BY CLEANUP
      action audit captures logoff activities. This audit action also captures
      logon/logoff to the open database by SYSDBA and SYSOPER.
    rationale: >
      Logging and monitoring of all attempts to logon to the database, whether
      successful or unsuccessful, may provide forensic evidence about potential
      suspicious/unauthorized activities. Any such activities may be a cause for
      further investigation. In addition, organization security policies and
      industry/government regulations may require logging of all user activities
      involving LOGON, LOGOFF and LOGOFF BY CLEANUP.
    audit_procedure: >
      To assess this recommendation, execute the following SQL statement. WITH
      CIS_AUDIT(CONTAINERNAME, CON_ID, AUDIT_OPTION) AS( SELECT C.NAME, C.CON_ID,
      LL.* FROM V$CONTAINERS C, TABLE(DBMSOUTPUT_LINESARRAY('LOGON','LOGOFF')) LL
      WHERE C.OPEN_MODE='READ WRITE' ), AUDIT_ENABLED AS ( SELECT DISTINCT
      AUD.CON_ID, AUDIT_OPTION FROM CONTAINERS(AUDIT_UNIFIED_POLICIES) AUD WHERE
      AUD.AUDIT_OPTION IN ('LOGON','LOGOFF') AND AUD.AUDIT_OPTION_TYPE = 'STANDARD
      ACTION' AND EXISTS (SELECT ENABLED.* FROM
      CONTAINERS(AUDIT_UNIFIED_ENABLED_POLICIES) ENABLED WHERE ENABLED.SUCCESS =
      'YES' AND ENABLED.FAILURE = 'YES' AND ENABLED.ENABLED_OPTION = 'BY USER' AND
      ENABLED.ENTITY_NAME = 'ALL USERS' AND ENABLED.POLICY_NAME = AUD.POLICY_NAME
      AND ENABLED.CON_ID = AUD.CON_ID) ) SELECT C.CONTAINERNAME, C.AUDIT_OPTION FROM
      CIS_AUDIT C LEFT JOIN AUDIT_ENABLED E ON C.AUDIT_OPTION = E.AUDIT_OPTION AND
      E.CON_ID = C.CON_ID WHERE E.AUDIT_OPTION IS NULL ORDER BY 1, 2; Lack of
      results implies compliance.
    remediation: >
      Execute the following SQL statement to remediate this setting. Run the
      following query in the CDB and in each PDB: CREATE AUDIT POLICY
      CIS_CDB_LOGON_LOGOFF ACTIONS LOGON, LOGOFF ACTIONS COMPONENT=PROTOCOL HTTP,
      FTP, AUTHENTICATION; AUDIT POLICY CIS_CDB_LOGON_LOGOFF; Note: If you do not
