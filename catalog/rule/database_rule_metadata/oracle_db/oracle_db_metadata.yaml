  - rule_id: oracle_db.cis.6.user_audit_option_is_enabled
    title: "Ensure the 'USER' Audit Option Is Enabled"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 19c_v1.2.0"
    cis_version: "19c_v1.2.0"
    cis_control: "6.1.1"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      The USER object allows for creating accounts that can interact with the
      database according to the roles and privileges allotted to the account. It may
      also own database objects. Enabling the audit option causes auditing of all
      activities and requests to create, drop or alter a user, including a user
      changing their own password. (The latter is not audited by audit ALTER USER.)
    rationale: >
      Any unauthorized attempts to create, drop or alter a user should cause
      concern, whether successful or not. Auditing can also be useful in forensics
      if an account is compromised, and auditing is mandated by many common security
      initiatives. An abnormally high number of these activities in a given period
      might be worth investigation. Any failed attempt to drop a user or create a
      user may be worth further review.
    audit_procedure: >
      Non multi-tenant or pluggable database only: To assess this recommendation,
      execute the following SQL statement. SELECT AUDIT_OPTION,SUCCESS,FAILURE FROM
      DBA_STMT_AUDIT_OPTS WHERE USER_NAME IS NULL AND PROXY_NAME IS NULL AND SUCCESS
      = 'BY ACCESS' AND FAILURE = 'BY ACCESS' AND AUDIT_OPTION='USER'; Multi-tenant
      in the container database: This query will also give you the name of the
      CDB/PDB that has auditing turned on. To assess this recommendation, execute
      the following SQL statement. SELECT AUDIT_OPTION,SUCCESS,FAILURE, DECODE
      (A.CON_ID, 0,(SELECT NAME FROM V$DATABASE), 1,(SELECT NAME FROM V$DATABASE),
      (SELECT NAME FROM V$PDBS B WHERE A.CON_ID = B.CON_ID)) FROM
      CDB_STMT_AUDIT_OPTS A WHERE USER_NAME IS NULL AND PROXY_NAME IS NULL AND
      SUCCESS = 'BY ACCESS' AND FAILURE = 'BY ACCESS' AND AUDIT_OPTION='USER'; Lack
      of results implies a finding.
    remediation: >
      To remediate this setting, execute the following SQL statement in either the
      non multi- tenant or container database, it does NOT need run in the
      pluggable. AUDIT USER;
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_ORACLE_DB_19c_v1_2_0_6_1_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_oracle_db_19c_v1_2_0_6_1_1"
