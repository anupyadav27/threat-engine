  - rule_id: oracle_db.cis.2.admin_restrictions_is_set_to_on
    title: "Ensure 'ADMIN_RESTRICTIONS_' Is Set to 'ON'"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 19c_v1.2.0"
    cis_version: "19c_v1.2.0"
    cis_control: "2.1.2"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The admin_restrictions_ <listener_name> setting in the listener.ora file can
      require that any attempted real-time alteration of the parameters in the
      listener via the set command file be refused unless the listener.ora file is
      manually altered, then restarted by a privileged user.
    rationale: >
      Blocking unprivileged users from making alterations of the listener.ora file,
      where remote data/service settings are specified, will help protect data
      confidentiality.
    audit_procedure: >
      To audit this recommendation, execute the following shell commands as
      appropriate for your Linux/Windows environment. Linux environment: grep -i
      admin_restrictions $ORACLE_HOME/network/admin/listener.ora Windows
      environment: find /I 'admin_restrictions'
      %ORACLE_HOME%|\network\admin\listener.ora Ensure admin_restrictions_
      <listener_name> is set to ON for all listeners.
    remediation: >
      To remediate this recommendation: Use a text editor such as vi to set the
      admin_restrictions_ <listener_name> to the value ON. Default Value: Not set.
      References: 1. https://docs.oracle.com/en/database/oracle/oracle-
      database/19/netag/configuring-and-administering-oracle-net-listener.html
