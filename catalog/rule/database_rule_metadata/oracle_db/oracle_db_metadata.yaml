      OBJECT_NAME='AUD$' AND ALT='A/A' AND AUD='A/A' AND COM='A/A' AND DEL='A/A' AND
      GRA='A/A' AND IND='A/A' AND INS='A/A' AND LOC='A/A' AND REN='A/A' AND
      SEL='A/A' AND UPD='A/A' AND FBK='A/A'; Multi-tenant in the container database
      : This query will also give you the name of the CDB/PDB that has auditing
