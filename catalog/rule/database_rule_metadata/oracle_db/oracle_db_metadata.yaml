  - rule_id: oracle_db.cis.2.sqlnet_crypto_checksum_server_is_set_to_required
    title: "Ensure 'SQLNET.CRYPTO_CHECKSUM_SERVER' Is Set To 'REQUIRED'"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 23ai_v1.0.0"
    cis_version: "23ai_v1.0.0"
    cis_control: "2.2.11"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The SQLNET.CRYPTO_CHECKSUM_SERVER parameter specifies the checksum behavior
      for the server when connecting to a client. This setting enables the server to
      enforce cryptographic checksums, which verify the integrity of data
      transmitted during client- server interactions. Oracle networking already
      performs checksumming, so additional cryptographic checksumming is usually of
      limited value. A setting of REQUIRED at the server requires that the outgoing
      connections are encrypted with AES256. Oracle database network encryption
      configured through TLS/SSL is also an acceptable mechanism and may be
      implemented in lieu of this setting.
    rationale: >
      Enabling cryptographic checksums for server connections ensures a higher
      degree of data integrity. Impact: If SQLNET.CRYPTO_CHECKSUM_SERVER is set to
      REQUIRED, the client will be unable to connect to servers that do not require
      cryptographic checksums, resulting in connection failures. This may cause
      errors such as ORA-12650: No common encryption or data integrity algorithm if
      the server does not meet the client’s checksum requirements.
    audit_procedure: >
      On the Linux platform, execute the following shell command to audit this
      recommendation. grep -Pi
      '^\s*(SQLNET\.)?CRYPTO_CHECKSUM_SERVER\s*=\s*(?!REQUIRED\b)\S+'
      '$ORACLE_HOME/network/admin/sqlnet.ora' On the Windows platform, execute the
      following command to audit this recommendation. Select-String -Path
      '$Env:ORACLE_HOME\network\admin\sqlnet.ora' -Pattern
      '^\s*(SQLNET\.)?CRYPTO_CHECKSUM_SERVER\s*=\s*(?!REQUIRED\b)\S+' -
      CaseSensitive:$false If the output shows FALSE or NONE, the control is not
      configured correctly. To be compliant with this recommendation, the output of
      this command should be NULL. Lack of results indicates compliance. The audit
      command above assumes that sqlnet.ora is located in the default path
      $ORACLE_HOME/network/admin/sqlnet.ora. If this is not the case, please specify
      the correct location. For example, you might be using the TNS_ADMIN
      environment variable to point to the location of sqlnet.ora. Alternatively,
      sqlnet.ora could be located in the $ORACLE_BASE_HOME/network/admin or
      /opt/oracle/ <release_number> /network/admin directories.
    remediation: >
      To remediate this recommendation, set SQLNET.CRYPTO_CHECKSUM_SERVER to
      REQUIRED. SQLNET.CRYPTO_CHECKSUM_SERVER=REQUIRED Default Value: accepted
      References: 1. https://docs.oracle.com/en/database/oracle/oracle-
      database/23/netrf/parameters- for-the-sqlnet.ora.html#GUID-
