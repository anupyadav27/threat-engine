  - rule_id: oracle_db.cis.6.import_and_export_full_database_is_revoked_from
    title: "Ensure 'IMPORT' And 'EXPORT' 'FULL DATABASE' Is Revoked From Unauthorized 'GRANTEE'"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 23ai_v1.0.0"
    cis_version: "23ai_v1.0.0"
    cis_control: "6.1.3"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      The EXPORT FULL DATABASE and IMPORT FULL DATABASE privileges in Oracle
      Database allow users to perform full database exports and imports, which can
      lead to data exfiltration, unauthorized modifications, and compliance
      violations if granted to unauthorized users.
    rationale: >
      An unauthorized user with EXPORT FULL DATABASE privilege could create a full
      backup of the database and move it to another location. An unauthorized user
      with IMPORT FULL DATABASE privilege can overwrite, inject, or alter critical
      database data.
    audit_procedure: >
      System privileges in Oracle can be granted directly to users or roles, and can
      also be inherited through role hierarchies, either directly or recursively. To
      remediate and revoke system privileges from unauthorized users or roles, it is
