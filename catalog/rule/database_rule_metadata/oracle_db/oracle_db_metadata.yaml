    profile_applicability: "Level 1"
    description: >
      The Oracle database ANY keyword provides the user the capability to alter any
      item in the catalog of the database. Unauthorized grantees should not have
      that keyword assigned to them.
    rationale: >
      Authorization to use the ANY expansion of a privilege can allow an
      unauthorized user to potentially change confidential data or damage the data
      catalog.
    audit_procedure: >
      Non multi-tenant or pluggable database only: To assess this recommendation,
      execute the following SQL statement. SELECT GRANTEE, PRIVILEGE FROM
      DBA_SYS_PRIVS WHERE PRIVILEGE LIKE '%ANY%' AND GRANTEE NOT IN (SELECT USERNAME
      FROM DBA_USERS WHERE ORACLE_MAINTAINED='Y') AND GRANTEE NOT IN (SELECT ROLE
      FROM DBA_ROLES WHERE ORACLE_MAINTAINED='Y'); Multi-tenant in the container
      database: This query will also give you the name of the CDB/PDB that has the
      issue. To assess this recommendation, execute the following SQL statement.
      SELECT GRANTEE, PRIVILEGE, DECODE (A.CON_ID,0,(SELECT NAME FROM V$DATABASE),
      1,(SELECT NAME FROM V$DATABASE), (SELECT NAME FROM V$PDBS B WHERE A.CON_ID =
      B.CON_ID)) FROM CDB_SYS_PRIVS A WHERE PRIVILEGE LIKE '%ANY%' AND GRANTEE NOT
      IN (SELECT USERNAME FROM CDB_USERS WHERE ORACLE_MAINTAINED='Y') AND GRANTEE
      NOT IN (SELECT ROLE FROM CDB_ROLES WHERE ORACLE_MAINTAINED='Y'); Lack of
      results implies compliance.
    remediation: >
      To remediate this setting, execute the following SQL statement, keeping in
      mind if this is granted in both container and pluggable database, you must
      connect to both places to revoke. REVOKE ' <ANY Privilege> ' FROM <grantee> ;
