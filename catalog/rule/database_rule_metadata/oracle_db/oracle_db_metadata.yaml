  - rule_id: oracle_db.cis.6.procedure_audit_option_is_enabled
    title: "Ensure the 'PROCEDURE' Audit Option Is Enabled"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 19c_v1.2.0"
    cis_version: "19c_v1.2.0"
    cis_control: "6.1.15"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      In this statement audit, PROCEDURE means any procedure, function, package or
      library. Enabling this audit option causes any attempt, successful or not, to
      create or drop any of these types of objects to be audited, regardless of
      privilege or lack thereof. Java schema objects (sources, classes, and
      resources) are considered the same as procedures for the purposes of auditing
      SQL statements.
    rationale: >
      Any unauthorized attempts to create or drop a procedure in another's schema
      should cause concern, whether successful or not. Changes to critical stored
      code can dramatically change the behavior of the application and produce
      serious security consequences, including enabling privilege escalation and
      introducing SQL injection vulnerabilities. Audit records of such changes can
      be helpful in forensics.
    audit_procedure: >
      Non multi-tenant or pluggable database only: To assess this recommendation,
      execute the following SQL statement. SELECT AUDIT_OPTION,SUCCESS,FAILURE FROM
      DBA_STMT_AUDIT_OPTS WHERE USER_NAME IS NULL AND PROXY_NAME IS NULL AND SUCCESS
      = 'BY ACCESS' AND FAILURE = 'BY ACCESS' AND AUDIT_OPTION='PROCEDURE'; Multi-
      tenant in the container database: This query will also give you the name of
      the CDB/PDB that has auditing turned on. To assess this recommendation,
      execute the following SQL statement. SELECT AUDIT_OPTION,SUCCESS,FAILURE,
      DECODE (A.CON_ID, 0,(SELECT NAME FROM V$DATABASE), 1,(SELECT NAME FROM
      V$DATABASE), (SELECT NAME FROM V$PDBS B WHERE A.CON_ID = B.CON_ID)) FROM
      CDB_STMT_AUDIT_OPTS A WHERE USER_NAME IS NULL AND PROXY_NAME IS NULL AND
      SUCCESS = 'BY ACCESS' AND FAILURE = 'BY ACCESS' AND AUDIT_OPTION='PROCEDURE';
      Lack of results implies a finding.
    remediation: >
      To remediate this setting, execute the following SQL statement in either the
      non multi- tenant or container database, it does NOT need run in the
      pluggable. AUDIT PROCEDURE; Additional Information: Not all auditing options
      work alike. In particular, the statement auditing option audit PROCEDURE does
      indeed audit create and drop library as well as all types of procedures and
      java schema objects. However, privilege audits do not work this way. So, for
      example, none of audit CREATE ANY PROCEDURE, audit DROP ANY PROCEDURE, or
      audit CREATE PROCEDURE will audit create or drop library activities. In
      statement auditing, PROCEDURE has a larger scope than in privilege auditing,
      where it is specific to functions, packages and procedures, but excludes
      libraries and perhaps other object types. Audit PROCEDURE does not audit
      altering procedures, either in your own schema or in another via the ALTER ANY
      PROCEDURE system privilege. There seems to be no statement audit that is a
      better replacement for Audit ALTER ANY PROCEDURE, but beware that will not
      create any audit records for users that do not have the privilege. Thus,
      attempts to alter procedures in one's own schema are never audited, and
      attempts to alter procedures in another's schema that fail for lack of the
      ALTER ANY PROCEDURE privilege are not audited. This is simply a weakness in
      the current state of Oracle auditing. Fortunately, though, all that the ALTER
      command can be used for regarding procedures, functions, packages and
      libraries is compile options, so the inability to comprehensively audit alter
      procedure activities and requests is not as bad as it would be for other
      object types (USER, PROFILE, etc.)
    references: >
      
    impact: >
      
