  - rule_id: oracle_db.cis.6.trigger_audit_option_is_enabled
    title: "Ensure the 'TRIGGER' Audit Option Is Enabled"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 19c_v1.2.0"
    cis_version: "19c_v1.2.0"
    cis_control: "6.1.17"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      A TRIGGER may be used to modify DML actions or invoke other (recursive)
      actions when some types of user-initiated actions occur. Enabling this audit
      option will cause auditing of any attempt, successful or not, to create, drop,
      enable or disable any schema trigger in any schema regardless of privilege or
      lack thereof. For enabling and disabling a trigger, it covers both ALTER
      TRIGGER and ALTER TABLE.
    rationale: >
      Triggers are often part of schema security, data validation and other critical
      constraints upon actions and data. A trigger in another schema may be used to
      escalate privileges, redirect operations, transform data and perform other
      sorts of perhaps undesired actions. Any unauthorized attempt to create, drop
      or alter a trigger in another schema may be cause for investigation.
    audit_procedure: >
      Non multi-tenant or pluggable database only: To assess this recommendation,
      execute the following SQL statement. SELECT AUDIT_OPTION,SUCCESS,FAILURE FROM
      DBA_STMT_AUDIT_OPTS WHERE USER_NAME IS NULL AND PROXY_NAME IS NULL AND SUCCESS
      = 'BY ACCESS' AND FAILURE = 'BY ACCESS' AND AUDIT_OPTION='TRIGGER'; Multi-
      tenant in the container database: This query will also give you the name of
      the CDB/PDB that has auditing turned on. To assess this recommendation,
      execute the following SQL statement. SELECT AUDIT_OPTION,SUCCESS,FAILURE,
      DECODE (A.CON_ID, 0,(SELECT NAME FROM V$DATABASE), 1,(SELECT NAME FROM
      V$DATABASE), (SELECT NAME FROM V$PDBS B WHERE A.CON_ID = B.CON_ID)) FROM
      CDB_STMT_AUDIT_OPTS A WHERE USER_NAME IS NULL AND PROXY_NAME IS NULL AND
      SUCCESS = 'BY ACCESS' AND FAILURE = 'BY ACCESS' AND AUDIT_OPTION='TRIGGER';
      Lack of results implies a finding.
    remediation: >
      To remediate this setting, execute the following SQL statement in either the
      non multi- tenant or container database, it does NOT need run in the
      pluggable. AUDIT TRIGGER; Additional Information: There is no current CIS
      recommendation to audit the use of the system privilege CREATE TRIGGER, as
      there is for CREATE SYNONYM, CREATE PROCEDURE and some other types of objects,
      so this is actually a scope escalation also - to audit such actions in one's
      own schema. However, this is the only way to comprehensively audit things like
      attempts to create, drop or alter triggers in another's schema if the user
      attempting to operation does not hold the required ANY privilege - and these
      are exactly the sorts of things that should raise a large red flag. The
      statement auditing option audit TRIGGER audits almost everything that the
      three privilege audits audit CREATE ANY TRIGGER, audit ALTER ANY TRIGGER and
      audit DROP ANY TRIGGER do, but also audits: 1. Statements to create, drop,
      enable or disable a trigger in the user's own schema. 2. Attempts to create a
      trigger by a user without the CREATE TRIGGER system privilege. 3. Attempts to
      create a trigger in another schema by users without the CREATE ANY TRIGGER
      privilege. 4. Attempts to drop a trigger in another schema by users without
      the DROP ANY TRIGGER privilege. 5. Attempts to disable or enable a trigger in
      another schema by users without the ALTER ANY TRIGGER privilege. The one thing
      is audited by any of the three privilege audits that is not audited by this is
      ALTER TRIGGER ...COMPILE if the trigger is in another's schema, which is
      audited by audit ALTER ANY TRIGGER, but only if the user attempting the
      alteration actually holds the ALTER ANY TRIGGER system privilege. Audit
      TRIGGER only audits ALTER TABLE or ALTER TRIGGER statements used to enable or
      disable triggers. It does not audit ALTER TRIGGER or ALTER TABLE statements
      used only with compile options.
    references: >
      
