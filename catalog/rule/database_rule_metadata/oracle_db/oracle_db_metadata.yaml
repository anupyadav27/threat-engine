  - rule_id: oracle_db.cis.3.failed_login_attempts_is_less_than_or_equal_to_5
    title: "Ensure 'FAILED_LOGIN_ATTEMPTS' Is Less Than Or Equal To '5'"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 23ai_v1.0.0"
    cis_version: "23ai_v1.0.0"
    cis_control: "3.1"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The FAILED_LOGIN_ATTEMPTS setting defines the number of consecutive failed
      login attempts allowed before a user's account is locked. While different
      profiles can have customized settings based on organizational needs, a minimum
      recommended value of 5 should be enforced. Organizations may choose a higher
      value for specific use cases, such as application data source accounts, to
      prevent unnecessary lockouts while maintaining security. However, increasing
      this threshold should be carefully reviewed to ensure that the system's
      security posture is maintained and accounts are protected against unauthorized
      or brute-force login attempts.
    rationale: >
      Repeated failed login attempts may indicate the initiation of a brute-force
      attack. Therefore, this value should be configured based on the organization's
      security requirements, balancing account protection with operational needs.
    audit_procedure: >
      This query will also give you the name of the CDB/PDB that has the issue. To
      assess this recommendation, execute the following SQL statement. SELECT
      DECODE(P.CON_ID,0,'ENTIRE-'||SYS_CONTEXT('USERENV','DB_NAME'),
      1,'ROOTONLY-'||SYS_CONTEXT('USERENV','DB_NAME'), CON_ID_TO_CON_NAME(P.CON_ID))
      AS CONTAINERNAME, P.PROFILE, P.RESOURCE_NAME, P.LIMIT FROM CDB_PROFILES P
      WHERE P.RESOURCE_NAME = 'FAILED_LOGIN_ATTEMPTS' AND TO_NUMBER(DECODE(P.LIMIT,
      'DEFAULT', (SELECT DECODE(LIMIT,'UNLIMITED',9999,LIMIT) FROM CDB_PROFILES
      WHERE PROFILE='DEFAULT' AND RESOURCE_NAME='FAILED_LOGIN_ATTEMPTS' AND CON_ID =
      P.CON_ID), 'UNLIMITED','9999',P.LIMIT)) > 5 ORDER BY CON_ID, PROFILE,
      RESOURCE_NAME; To be compliant with this recommendation, the output of this
      command should be NULL. Lack of results indicates compliance.
    remediation: >
      Remediate this setting by executing the following SQL statement for each
      PROFILE returned by the audit procedure. ALTER PROFILE <profile_name> LIMIT
      FAILED_LOGIN_ATTEMPTS 5; Default Value: 10 References: 1.
      https://docs.oracle.com/en/database/oracle/oracle-database/23/sqlrf/CREATE-
      PROFILE.html#d387296e851 Additional Information: The similar setting used to
      block a DDoS, the SEC_MAX_FAILED_LOGIN_ATTEMPTS initialization parameter, can
      be used to protect unauthorized intruders from attacking the server processes
      for applications, but this setting does not protect against unauthorized
      attempts via valid usernames. The SEC_MAX_FAILED_LOGIN_ATTEMPTS prevents
      multiple failed login attempts by a single connection. The parameter differs
      from the limit set on user profiles and applied to failed login attempts to a
      single user account. Limiting failed authentication attempts by a single
      connection helps protect against Denial of Service (DoS) attacks and
      authentication attempts against multiple user accounts.
    references: >
      1. https://docs.oracle.com/en/database/oracle/oracle-database/23/sqlrf/CREATE-
      PROFILE.html#d387296e851 Additional Information: The similar setting used to
      block a DDoS, the SEC_MAX_FAILED_LOGIN_ATTEMPTS initialization parameter, can
      be used to protect unauthorized intruders from attacking the server processes
      for applications, but this setting does not protect against unauthorized
