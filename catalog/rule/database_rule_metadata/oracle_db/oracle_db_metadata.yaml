  - rule_id: oracle_db.cis.6.create_user_action_audit_is_enabled
    title: "Ensure the 'CREATE USER' Action Audit Is Enabled"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 19c_v1.2.0"
    cis_version: "19c_v1.2.0"
    cis_control: "6.2.1"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      The CREATE USER statement is used to create Oracle database accounts and
      assign database properties to them. Enabling this unified action audit causes
      logging of all CREATE USER statements, whether successful or unsuccessful,
      issued by the users regardless of the privileges held by the users to issue
      such statements.
    rationale: >
      Logging and monitoring of all attempts to create user accounts, whether
      successful or unsuccessful, may provide clues and forensic evidences about
      potential suspicious/unauthorized activities. Any such activities may be a
      cause for further investigation. In addition, organization security policies
      and industry/government regulations may require logging of all activities
      involving CREATE USER.
    audit_procedure: >
      To assess this recommendation, execute the following SQL statement. WITH
      CIS_AUDIT(AUDIT_OPTION) AS ( SELECT * FROM TABLE(
      DBMSOUTPUT_LINESARRAY('CREATE USER' ) ) ), AUDIT_ENABLED AS ( SELECT DISTINCT
      AUDIT_OPTION FROM AUDIT_UNIFIED_POLICIES AUD WHERE AUD.AUDIT_OPTION IN
      ('CREATE USER' ) AND AUD.AUDIT_OPTION_TYPE = 'STANDARD ACTION' AND EXISTS
      (SELECT * FROM AUDIT_UNIFIED_ENABLED_POLICIES ENABLED WHERE ENABLED.SUCCESS =
      'YES' AND ENABLED.FAILURE = 'YES' AND ENABLED.ENABLED_OPTION = 'BY USER' AND
      ENABLED.ENTITY_NAME = 'ALL USERS' AND ENABLED.POLICY_NAME = AUD.POLICY_NAME) )
      SELECT C.AUDIT_OPTION FROM CIS_AUDIT C LEFT JOIN AUDIT_ENABLED E ON
      C.AUDIT_OPTION = E.AUDIT_OPTION WHERE E.AUDIT_OPTION IS NULL ; Lack of results
      implies compliance.
    remediation: >
      Execute the following SQL statement to remediate this setting. ALTER AUDIT
      POLICY CIS_UNIFIED_AUDIT_POLICY ADD ACTIONS CREATE USER; Note: If you do not
      have CIS_UNIFIED_AUDIT_POLICY, please create one using the CREATE AUDIT POLICY
      statement.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_ORACLE_DB_19c_v1_2_0_6_2_1"
      nist_800_53: []
