  - rule_id: oracle_db.cis.3.password_lock_time_is_greater_than_or_equal_to_1
    title: "Ensure 'PASSWORD_LOCK_TIME' Is Greater Than Or Equal To '1'"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 23ai_v1.0.0"
    cis_version: "23ai_v1.0.0"
    cis_control: "3.2"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The PASSWORD_LOCK_TIME setting determines how many days must pass for the
      user's account to be unlocked after the set number of failed login attempts
      has occurred. The suggested value for this is one day or greater.
    rationale: >
      Locking the user account after repeated failed login attempts can block
      further brute- force login attacks but can create administrative headaches as
      this account unlocking process always requires DBA intervention.
    audit_procedure: >
      This query will also give you the name of the CDB/PDB that has the issue. To
      assess this recommendation, execute the following SQL statement. SELECT
      DECODE(P.CON_ID,0,'ENTIRE-'||SYS_CONTEXT('USERENV','DB_NAME'),
      1,'ROOTONLY-'||SYS_CONTEXT('USERENV','DB_NAME'), CON_ID_TO_CON_NAME(P.CON_ID))
      AS CONTAINERNAME, P.PROFILE, P.RESOURCE_NAME, P.LIMIT FROM CDB_PROFILES P
      WHERE TO_NUMBER(DECODE(P.LIMIT, 'DEFAULT',(SELECT
      DECODE(LIMIT,'UNLIMITED',9999,LIMIT) FROM CDB_PROFILES WHERE PROFILE='DEFAULT'
      AND RESOURCE_NAME='PASSWORD_LOCK_TIME' AND CON_ID = P.CON_ID),
      'UNLIMITED','9999',P.LIMIT)) < 1 ORDER BY CON_ID, PROFILE, RESOURCE_NAME; To
      be compliant with this recommendation, the output of this command should be
      NULL. Lack of results indicates compliance.
    remediation: >
      Remediate this setting by executing the following SQL statement for each
      PROFILE returned by the audit procedure. ALTER PROFILE <profile_name> LIMIT
      PASSWORD_LOCK_TIME 1; Default Value: 1 References: 1.
      https://docs.oracle.com/en/database/oracle/oracle-database/23/sqlrf/CREATE-
      PROFILE.html#d387296e968
    references: >
      1. https://docs.oracle.com/en/database/oracle/oracle-database/23/sqlrf/CREATE-
