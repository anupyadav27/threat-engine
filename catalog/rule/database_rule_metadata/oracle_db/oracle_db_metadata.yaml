  - rule_id: oracle_db.cis.1.appropriate_version_patches_for_oracle_software
    title: "Ensure The Appropriate Version/Patches For Oracle Software Is Installed"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: manual
    cis_benchmark: "CIS_ORACLE_DB 23ai_v1.0.0"
    cis_version: "23ai_v1.0.0"
    cis_control: "1.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      The Oracle installation version and patches should be the most recent that are
      compatible with the organization's operational needs.
    rationale: >
      Using the most recent Oracle database software, along with all applicable
      patches can help limit the possibilities for vulnerabilities in the software,
      the installation version and/or patches applied during setup should be
      established according to the needs of the organization. Ensure you are using a
      release that is covered by a level of support that includes the generation of
      Critical Patch Updates.
    audit_procedure: >
      To assess this recommendation, use the following example shell command as
      appropriate for your environment. For example, on Linux systems: opatch
      lsinventory | grep -e '^.* <latest_patch_version_numer> \s*.*$' For example,
      on Windows systems: opatch lsinventory | find ' <latest_patch_version_number>
      '
    remediation: >
      Download and apply the latest quarterly Critical Patch Update patches.
      References: 1. http://www.oracle.com/us/support/assurance/fixing-
      policies/index.html 2.
      http://www.oracle.com/technetwork/topics/security/alerts-086861.html 3.
      http://www.oracle.com/us/support/library/lifetime-support-
      technology-069183.pdf Additional Information: The following SQL may be used to
      determine the patches that have been applied: select * from
      cdb_registry_sqlpatch order by action_time ;
    references: >
      1. http://www.oracle.com/us/support/assurance/fixing-policies/index.html 2.
