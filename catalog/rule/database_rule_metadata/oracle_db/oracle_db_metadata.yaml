  - rule_id: oracle_db.cis.2.remote_login_passwordfile_is_set_to_none
    title: "Ensure 'REMOTE_LOGIN_PASSWORDFILE' Is Set To 'NONE'"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 23ai_v1.0.0"
    cis_version: "23ai_v1.0.0"
    cis_control: "2.3.12"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The remote_login_passwordfile setting specifies whether or not Oracle checks
      for a password file during login and how many databases can use the password
      file. The setting should have a value of NONE or in the event you are running
      DR/Data Guard, EXCLUSIVE is an allowable value.
    rationale: >
      The use of this sort of password login file could permit unsecured, privileged
      connections to the database.
    audit_procedure: >
      To assess this recommendation, execute the following SQL statement. SELECT
      DECODE(V.CON_ID,0,'ENTIRE-'||SYS_CONTEXT('USERENV','DB_NAME'),
      1,'ROOTONLY-'||SYS_CONTEXT('USERENV','DB_NAME'), CON_ID_TO_CON_NAME(V.CON_ID))
      AS CONTAINERNAME, UPPER(V.VALUE) FROM GV$SYSTEM_PARAMETER V WHERE UPPER(NAME)
      = 'REMOTE_LOGIN_PASSWORDFILE' and 'DG' != (SELECT 'DG' FROM V$DATABASE where
      database_role in ('PRIMARY','PHYSICAL STANDBY','LOGICAL STANDBY','SNAPSHOT
      STANDBY')) AND UPPER(VALUE) != 'NONE' union SELECT
      DECODE(V.CON_ID,0,'ENTIRE-'||SYS_CONTEXT('USERENV','DB_NAME'),
      1,'ROOTONLY-'||SYS_CONTEXT('USERENV','DB_NAME'), CON_ID_TO_CON_NAME(V.CON_ID))
      AS CONTAINERNAME, UPPER(V.VALUE) FROM GV$SYSTEM_PARAMETER V WHERE UPPER(NAME)
      = 'REMOTE_LOGIN_PASSWORDFILE' and 'DG' = (SELECT 'DG' FROM V$DATABASE where
      database_role in ('PRIMARY','PHYSICAL STANDBY','LOGICAL STANDBY','SNAPSHOT
      STANDBY')) AND UPPER(VALUE) != 'EXCLUSIVE'; Ensure VALUE is set to NONE or, in
      the event you are running DR/Data Guard, EXCLUSIVE is an allowable VALUE. To
      be compliant with this recommendation, the output of this command should be
      NULL. Lack of results indicates compliance.
    remediation: >
      To remediate this setting, execute the following SQL statement and restart the
      instance. ALTER SYSTEM SET REMOTE_LOGIN_PASSWORDFILE = 'NONE' SCOPE = SPFILE;
      Default Value: EXCLUSIVE References: 1.
      https://docs.oracle.com/en/database/oracle/oracle-
      database/23/refrn/REMOTE_LOGIN_PASSWORDFILE.html
    references: >
      1. https://docs.oracle.com/en/database/oracle/oracle-
