      AND O.OBJECT_NAME=C.TABLE_NAME AND O.ORACLE_MAINTAINED='N'; If any
      unauthorized users are granted DBA_COL_PRIVS, this is a fail.
    remediation: >
      To remediate this recommendation, execute the following SQL statement. REVOKE
      UPDATE ON <TABLE> FROM <GRANTEE> ; References: 1.
