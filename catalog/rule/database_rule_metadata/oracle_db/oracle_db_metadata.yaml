  - rule_id: oracle_db.cis.5.all_export_activities_are_audited
    title: "Ensure All Export Activities Are Audited"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 23ai_v1.0.0"
    cis_version: "23ai_v1.0.0"
    cis_control: "5.4"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      Auditing all export activities in Oracle is crucial for several security and
      compliance reasons such as data leakage prevention, accountability and
      traceability as well as compliance with regulations.
    rationale: >
      Auditing export activities helps to detect unauthorized use of export tools or
      RMAN to exfiltrate sensitive data during a security breach. Comprehensive
      auditing of these activities can help detect and mitigate such threats
      promptly. By implementing detailed auditing for export and RMAN activities,
      organizations can strengthen their security posture, safeguard sensitive data,
      and ensure compliance with regulatory and internal policies. Impact: Auditing
      export operations can introduce additional I/O and CPU usage, especially in
      large-volume exports.
    audit_procedure: >
      To assess this recommendation, execute the following SQL statement. WITH
      CIS_AUDIT(NAME, CON_ID, AUDIT_OPTION) AS( SELECT C.NAME, C.CON_ID, 'EXPORT' AS
      AUDIT_OPTION FROM V$CONTAINERS C WHERE C.OPEN_MODE='READ WRITE' ),
      AUDIT_ENABLED AS ( SELECT DISTINCT CON_ID_TO_CON_NAME(AUD.CON_ID) AS
      CONTAINERNAME, AUDIT_OPTION, AUD.POLICY_NAME, AUD.CON_ID FROM
      CONTAINERS(AUDIT_UNIFIED_POLICIES) AUD WHERE AUD.AUDIT_OPTION IN ('EXPORT')
      AND AUD.AUDIT_OPTION_TYPE = 'DATAPUMP ACTION' AND EXISTS (SELECT
      CON_ID_TO_CON_NAME(ENABLED.CON_ID) AS CONTAINERNAME, ENABLED.* FROM
      CONTAINERS(AUDIT_UNIFIED_ENABLED_POLICIES) ENABLED WHERE ENABLED.SUCCESS =
      'YES' AND ENABLED.FAILURE = 'YES' AND ENABLED.ENABLED_OPTION = 'BY USER' AND
      ENABLED.ENTITY_NAME = 'ALL USERS' AND ENABLED.POLICY_NAME = AUD.POLICY_NAME
      AND ENABLED.CON_ID = AUD.CON_ID) ) SELECT C.NAME, C.AUDIT_OPTION FROM
      CIS_AUDIT C LEFT JOIN AUDIT_ENABLED E ON C.AUDIT_OPTION = E.AUDIT_OPTION AND
      E.CON_ID = C.CON_ID WHERE E.AUDIT_OPTION IS NULL ORDER BY 1, 2; Lack of
