  - rule_id: oracle_db.cis.5.use_of_sys_privileges_is_audited
    title: "Ensure The Use Of SYS* Privileges Is Audited"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 23ai_v1.0.0"
    cis_version: "23ai_v1.0.0"
    cis_control: "5.5"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The usage of the SYS* (SYS, SYSKM, SYSBACKUP, SYSRAC, SYSDG, PUBLICSYS, SYSKM,
      SYSBACKUP, SYSRAC, SYSDG, PUBLIC) privileges should always be audited. Under
      Oracle classic auditing, this was the case with the parameter
      AUDIT_SYS_OPERATIONS = TRUE. To achieve the same behavior with Unified
      Auditing, it is necessary to audit all users who use SYS* privileges. As the
      SYS* privileges have the special feature of being used first, it is necessary
      to audit them separately, as otherwise they will not be taken into account by
      the other audit policies. Example: A user with SYSDBA privileges accesses a
      table (e.g. HR.EMP). In this case, not the SELECT ANY TABLE privilege, but the
      SYSDBA privilege is used. As a result, audit rule 5.1 does not fire. With
      unified auditing, it must always be ensured that the privileges are used for
      object access in the following order (if available): 1. SYS* privileges (e.g.
      SYSDBA) 2. Direct access rights (e.g. direct object grant or public grant) 3.
      ANY rights
    rationale: >
      All users using the SYS*-Privilege should be audited to avoid that the highest
      privileged user is not audited. Impact: SYS* performs critical system-level
      operations, and auditing every action can add considerable performance
      overhead. SYS operations generate a large volume of audit logs, especially in
      high-transaction environments. Too much logging can make it difficult to
      identify critical security events among routine activities especially in
      Oracle Dataguard environments.
    audit_procedure: >
      To assess this recommendation, execute the following SQL statement. WITH
      CIS_AUDIT(CONTAINERNAME, CON_ID, AUDIT_OPTION, ENTITY_NAME) AS( SELECT C.NAME,
      C.CON_ID, 'ALL' AS AUDIT_OPTION, LL.* FROM V$CONTAINERS C,
      TABLE(DBMSOUTPUT_LINESARRAY('SYS','SYSBACKUP','SYSDG','SYSKM','SYSRAC','PUBLI
      C')) LL WHERE C.OPEN_MODE='READ WRITE' ), AUDIT_ENABLED AS ( SELECT DISTINCT
      AUD.CON_ID, AUD.AUDIT_OPTION, ENABLED.ENTITY_NAME FROM
      CONTAINERS(AUDIT_UNIFIED_POLICIES) AUD,
      CONTAINERS(AUDIT_UNIFIED_ENABLED_POLICIES) ENABLED WHERE ENABLED.CON_ID =
      AUD.CON_ID AND ENABLED.POLICY_NAME = AUD.POLICY_NAME AND AUD.AUDIT_OPTION IN
      ('ALL') AND AUD.AUDIT_OPTION_TYPE = 'STANDARD ACTION' AND ENABLED.SUCCESS =
      'YES' AND ENABLED.FAILURE = 'YES' AND ENABLED.ENABLED_OPTION = 'BY USER' AND
      ENABLED.ENTITY_NAME IN ('SYS','SYSBACKUP','SYSDG','SYSKM','SYSRAC','PUBLIC') )
      SELECT C.CONTAINERNAME, C.AUDIT_OPTION, C.ENTITY_NAME FROM CIS_AUDIT C LEFT
      JOIN AUDIT_ENABLED E ON C.AUDIT_OPTION = E.AUDIT_OPTION AND C.ENTITY_NAME =
      E.ENTITY_NAME AND E.CON_ID = C.CON_ID WHERE E.AUDIT_OPTION IS NULL ORDER BY 1,
      2, 3; Lack of results implies compliance.
    remediation: >
      Execute the following SQL statement in the CDB and in each PDB to remediate
      this recommendation: CREATE AUDIT POLICY
      CIS_CDB_ALL_ACTIONS_BY_PRIVILEGED_USERS ACTIONS ALL WHEN q'!
      (SYS_CONTEXT('USERENV','CLIENT_PROGRAM_NAME') NOT IN ('emagent') AND
      INSTR(UPPER(SYS_CONTEXT('USERENV','CLIENT_PROGRAM_NAME')),'PERL') = 0 AND
      INSTR(UPPER(SYS_CONTEXT('USERENV','CLIENT_PROGRAM_NAME')),'RMAN') = 0 AND
      INSTR(UPPER(SYS_CONTEXT('USERENV','CLIENT_PROGRAM_NAME')),'OMS') = 0)!'
      EVALUATE PER SESSION ONLY TOPLEVEL; AUDIT POLICY
      CIS_CDB_ALL_ACTIONS_BY_PRIVILEGED_USERS BY SYS, SYSKM, SYSBACKUP, SYSRAC,
      SYSDG, PUBLIC; Note: If you do not have
      CIS_CDB_ALL_ACTIONS_BY_PRIVILEGED_USERS, please create one using the CREATE
      AUDIT POLICY statement. Refer to Section 8.5 where a PL/SQL block is provided
      to help create or modify the audit policy to remediate this item in both
      container and pluggable database. For legacy reasons the SYSOPER privilege is
      using the name PUBLIC. The used privilege in the unified audit log is SYSOPR.
      Emagent, OMS, RMAN and Perl have been excluded to prevent an excessive number
      of events and issues with spillover files. Default Value: Empty References: 1.
      https://docs.oracle.com/en/database/oracle/oracle-database/23/sqlrf/CREATE-
      AUDIT-POLICY-Unified-Auditing.html
    references: >
      1. https://docs.oracle.com/en/database/oracle/oracle-database/23/sqlrf/CREATE-
      AUDIT-POLICY-Unified-Auditing.html
    impact: >
      SYS* performs critical system-level operations, and auditing every action can
      add considerable performance overhead. SYS operations generate a large volume
      of audit logs, especially in high-transaction environments. Too much logging
      can make it difficult to identify critical security events among routine
      activities especially in Oracle Dataguard environments.
    compliance_mappings:
      cis:
        - "CIS_ORACLE_DB_23ai_v1_0_0_5_5"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_oracle_db_23ai_v1_0_0_5_5"
