  - rule_id: oracle_db.cis.2.sql92_security_is_set_to_true
    title: "Ensure 'SQL92_SECURITY' Is Set to 'TRUE'"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 19c_v1.2.0"
    cis_version: "19c_v1.2.0"
    cis_control: "2.2.14"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The SQL92_SECURITY parameter setting TRUE requires that a user must also be
      granted the SELECT object privilege before being able to perform UPDATE or
      DELETE operations on tables that have WHERE or SET clauses. The setting should
      have a value of TRUE.
    rationale: >
      A user without SELECT privilege can still infer the value stored in a column
      by referring to that column in a DELETE or UPDATE statement. This setting
      prevents inadvertent information disclosure by ensuring that only users who
      already have SELECT privilege can execute the statements that would allow them
      to infer the stored values.
    audit_procedure: >
      Non multi-tenant or pluggable database only: To assess this recommendation,
      execute the following SQL statement. SELECT UPPER(VALUE) FROM
      V$SYSTEM_PARAMETER WHERE UPPER(NAME)='SQL92_SECURITY'; Multi-tenant in the
      container database: This query will also give you the name of the CDB/PDB that
      has the issue. To assess this recommendation, execute the following SQL
      statement. SELECT DISTINCT UPPER(V.VALUE), DECODE (V.CON_ID,0,(SELECT NAME
      FROM V$DATABASE), 1,(SELECT NAME FROM V$DATABASE), (SELECT NAME FROM V$PDBS B
      WHERE V.CON_ID = B.CON_ID)) FROM V$SYSTEM_PARAMETER V WHERE UPPER(NAME) =
      'SQL92_SECURITY';
    remediation: >
      To remediate this setting, execute the following SQL statement. ALTER SYSTEM
      SET SQL92_SECURITY = TRUE SCOPE = SPFILE; Default Value: TRUE References: 1.
      https://docs.oracle.com/en/database/oracle/oracle-
      database/19/refrn/SQL92_SECURITY.html
    references: >
