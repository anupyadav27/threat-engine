  - rule_id: oracle_db.cis.3.password_rollover_time_is_set_to_0
    title: "Ensure 'PASSWORD_ROLLOVER_TIME' Is set to '0'"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 23ai_v1.0.0"
    cis_version: "23ai_v1.0.0"
    cis_control: "3.7"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      This setting PASSWORD_ROLLOVER_TIME enables the gradual database password
      rollover time allowing both the new and old password to be used for a set
      period of time after a password is changed. This capability is not normally
      appropriate for human actors, but is frequently valuable for application and
      batch processing service accounts.
    rationale: >
      With the need to change passwords at some frequency and the goal to limit
      downtime for applications operating across multiple tiers it is necessary to
      have an overlap period where both the new and old passwords are accepted. This
      allows time for all tiers supporting the application to be updated to use the
      new password. Impact: Configuring this setting could result in application
      account lockouts which may impact the service(s) provided by the application.
      To minimize the impact, you may set this setting to a sufficiently higher
      value for you to update applications and batch processes to use new passwords
      after a password change.
    audit_procedure: >
      To assess this recommendation, execute the following SQL statement. SELECT
      DECODE(P.CON_ID,0,'ENTIRE-'||SYS_CONTEXT('USERENV','DB_NAME'),
      1,'ROOTONLY-'||SYS_CONTEXT('USERENV','DB_NAME'), CON_ID_TO_CON_NAME(P.CON_ID))
      AS CONTAINERNAME, P.PROFILE, P.RESOURCE_NAME, P.LIMIT FROM SYS.CDB_PROFILES P
      WHERE TO_NUMBER(DECODE(P.LIMIT,'DEFAULT',(SELECT LIMIT FROM CDB_PROFILES WHERE
      PROFILE='DEFAULT' AND RESOURCE_NAME='PASSWORD_ROLLOVER_TIME' AND CON_ID =
      P.CON_ID), P.LIMIT)) > 0 AND RESOURCE_NAME='PASSWORD_ROLLOVER_TIME' ORDER BY
      CON_ID, PROFILE, RESOURCE_NAME;
    remediation: >
      Remediate this setting by executing the following SQL statement for each
      PROFILE returned by the audit procedure. ALTER PROFILE DEFAULT LIMIT
      PASSWORD_ROLLOVER_TIME 0; Default Value: 0 or NULL References: 1.
      https://docs.oracle.com/en/database/oracle/oracle-
      database/23/dbseg/configuring-authentication.html#d23067e2021
    references: >
      1. https://docs.oracle.com/en/database/oracle/oracle-
      database/23/dbseg/configuring-authentication.html#d23067e2021
    impact: >
      Configuring this setting could result in application account lockouts which
      may impact the service(s) provided by the application. To minimize the impact,
      you may set this setting to a sufficiently higher value for you to update
      applications and batch processes to use new passwords after a password change.
