  - rule_id: oracle_db.cis.2.sqlnet_crypto_checksum_client_is_set_to_required
    title: "Ensure 'SQLNET.CRYPTO_CHECKSUM_CLIENT' Is Set To 'REQUIRED'"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 23ai_v1.0.0"
    cis_version: "23ai_v1.0.0"
    cis_control: "2.2.10"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The SQLNET.CRYPTO_CHECKSUM_CLIENT parameter specifies the checksum behavior
      for the client when connecting to a server. This setting enables the client to
      enforce cryptographic checksums, which verify the integrity of data
      transmitted during client- server interactions. Oracle networking already
      performs checksumming, so additional cryptographic checksumming is usually of
      limited value. A setting of REQUIRED at the server requires that incoming
      connections are encrypted with AES256. Oracle database network encryption
      configured through TLS/SSL is also an acceptable mechanism and may be
      implemented in lieu of this setting.
    rationale: >
      Enabling cryptographic checksums for client connections ensures a higher
      degree of data integrity. Impact: If SQLNET.CRYPTO_CHECKSUM_CLIENT is set to
      REQUIRED, the client will be unable to connect to servers that do not require
      cryptographic checksums, resulting in connection failures. This may cause
      errors such as ORA-12650: No common encryption or data integrity algorithm if
