  - rule_id: oracle_db.cis.2.encryption_server_is_set_to_required
    title: "Ensure 'ENCRYPTION_SERVER' Is Set to 'REQUIRED'"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 19c_v1.2.0"
    cis_version: "19c_v1.2.0"
    cis_control: "2.3.1"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The setting sqlnet.encryption_server=required requires that the connections to
      the database are encrypted through Oracle SQL*Net native encryption. The
      encryption setting implements data-in-transit encryption for the Oracle
      database connections. This setting is configured in the sqlnet.ora file on the
      database server.
    rationale: >
      Without this setting, malicious users could potentially eavesdrop on the
      database connections, compromising the confidentiality of the data. Impact:
      The setting sqlnet.encryption_server=required could reject/deny connection
      requests from those database users who don’t support the Oracle native network
      encryption.
    audit_procedure: >
      To audit this recommendation, execute the following shell commands as
      appropriate for your Linux/Windows environment, and ensure that the setting is
      configured to required. Linux environment: grep -i
      'encryption_server=required' $ORACLE_HOME/network/admin/sqlnet.ora Windows
      environment: find /I 'encryption_server=required'
      %ORACLE_HOME%|\network\admin\ sqlnet.ora
    remediation: >
      To remediate this recommendation: Use a text editor such as vi to set the
      sqlnet. encryption_server = required Additional Information: Oracle database
      network encryption configured through TLS/SSL is also an acceptable mechanism
      and may be implemented in lieu of this setting.
    references: >
      
    impact: >
      The setting sqlnet.encryption_server=required could reject/deny connection
      requests from those database users who don’t support the Oracle native network
