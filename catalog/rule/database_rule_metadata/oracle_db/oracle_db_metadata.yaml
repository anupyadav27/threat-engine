  - rule_id: oracle_db.cis.2.sqlnet_encryption_client_is_set_to_required
    title: "Ensure 'SQLNET.ENCRYPTION_CLIENT Is Set To 'REQUIRED'"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 23ai_v1.0.0"
    cis_version: "23ai_v1.0.0"
    cis_control: "2.2.6"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The SQLNET.ENCRYPTION_CLIENT parameter determines whether the client side of a
      database connection enforces network encryption. When set to REQUIRED, this
      parameter mandates that all data transmitted between the client and the
      database is encrypted, preventing the client from connecting if encryption
      cannot be established. This setting ensures that sensitive data remains
      protected during transmission. If you are using TLS, this is not a required
      check. Oracle database network encryption configured through TLS/SSL is also
      an acceptable mechanism and may be implemented in lieu of this setting.
    rationale: >
      Network encryption is crucial for safeguarding data transmitted over networks.
      Without encryption, data, including sensitive information like credentials,
      financial data, and personal details, is vulnerable to interception and
      potential compromise. Setting SQLNET.ENCRYPTION_CLIENT to REQUIRED ensures
      that all client connections to the database use encryption, aligning with best
      practices for data protection and regulatory compliance requirements. Impact:
      Clients or applications that do not support encryption will NOT be able to
      connect to the database, which may necessitate updates to older client
      configurations.
    audit_procedure: >
      On the Linux platform, execute the following shell command to audit this
      recommendation. grep -Pi
      '^\s*(SQLNET\.)?ENCRYPTION_CLIENT\s*=\s*(?!REQUIRED\b)\S+'
      '$ORACLE_HOME/network/admin/sqlnet.ora' On the Windows platform, execute the
      following command to audit this recommendation. Select-String -Path
      '$Env:ORACLE_HOME\network\admin\sqlnet.ora' -Pattern
      '^\s*(SQLNET\.)?ENCRYPTION_CLIENT\s*=\s*(?!REQUIRED\b)\S+' -
      CaseSensitive:$false To be compliant with this recommendation, the output of
      this command should be NULL. Lack of results indicates compliance. The audit
      command above assumes that sqlnet.ora is located in the default path
      $ORACLE_HOME/network/admin/sqlnet.ora. If this is not the case, please specify
      the correct location. For example, you might be using the TNS_ADMIN
      environment variable to point to the location of sqlnet.ora. Alternatively,
      sqlnet.ora could be located in the $ORACLE_BASE_HOME/network/admin or
      /opt/oracle/ <release_number> /network/admin directories.
    remediation: >
      To remediate this recommendation, set SQLNET.ENCRYPTION_CLIENT to REQUIRED.
      Default Value: ACCEPTED References: 1.
      https://docs.oracle.com/en/database/oracle/oracle-
      database/23/netrf/parameters- for-the-
      sqlnet.ora.html#GUID-F4A86AFC-4600-405F-88E7-DC79213FEC19
    references: >
      1. https://docs.oracle.com/en/database/oracle/oracle-
      database/23/netrf/parameters- for-the-
      sqlnet.ora.html#GUID-F4A86AFC-4600-405F-88E7-DC79213FEC19
    impact: >
      Clients or applications that do not support encryption will NOT be able to
      connect to the database, which may necessitate updates to older client
