  - rule_id: oracle_db.cis.4.all_default_passwords_are_changed
    title: "Ensure All Default Passwords Are Changed"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 23ai_v1.0.0"
    cis_version: "23ai_v1.0.0"
    cis_control: "4.1"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Default passwords should not be used by Oracle database users. Leaving default
      passwords unchanged can create significant security vulnerabilities by
      allowing unauthorized access to the database.
    rationale: >
      Default passwords are widely known and documented. If left unchanged, any
      malicious user with database access can authenticate using these default
      credentials, potentially leading to unauthorized data access, privilege
      escalation, or database compromise.
    audit_procedure: >
      To check for accounts still using default passwords, execute the following SQL
      statement: SELECT
      DECODE(C.CON_ID,0,'ENTIRE-'||SYS_CONTEXT('USERENV','DB_NAME'),
      1,'ROOTONLY-'||SYS_CONTEXT('USERENV','DB_NAME'), CON_ID_TO_CON_NAME(C.CON_ID))
      AS CONTAINERNAME, A.USERNAME, C.ACCOUNT_STATUS FROM CDB_USERS_WITH_DEFPWD A,
      CDB_USERS C WHERE A.USERNAME = C.USERNAME ORDER BY C.CON_ID; Lack of results
      implies compliance.
    remediation: >
      To reset the account with NO AUTHENTICATION, execute the following SQL
      statement in CDB: ALTER USER <USERNAME> NO AUTHENTICATION; Notes: • As per
      Oracle Support Document 2173962.1, newly created database may list SYS and
      SYSTEM in CBA_USERS_WITH_DEFPWD even if they were set with non- default
      passwords. Running ALTER USER with the same password will correctly recognize
      these accounts as non-default. • If remote_password_file is set to NONE,
      changing the SYS password via ALTER USER is not possible. In this case, update
      remote_password_file to EXCLUSIVE before modifying the SYS password.
      References: 1. https://docs.oracle.com/en/database/oracle/oracle-
      database/23/dbseg/keeping- your-oracle-database-secure.html 2.
      https://support.oracle.com/epmos/faces/DocumentDisplay?id=2173962.1
    references: >
      1. https://docs.oracle.com/en/database/oracle/oracle-
      database/23/dbseg/keeping- your-oracle-database-secure.html 2.
      https://support.oracle.com/epmos/faces/DocumentDisplay?id=2173962.1
    impact: >
      
