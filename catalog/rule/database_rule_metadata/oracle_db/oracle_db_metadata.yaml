  - rule_id: oracle_db.cis.4.all_sample_data_and_users_have_been_removed
    title: "Ensure All Sample Data And Users Have Been Removed"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 19c_v1.2.0"
    cis_version: "19c_v1.2.0"
    cis_control: "4.2"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Oracle sample schemas can be used to create sample users
      (BI,HR,IX,OE,PM,SCOTT,SH), with well-known default passwords, particular
      views, and procedures/functions, in addition to tables and fictitious data.
      The sample schemas should be removed.
    rationale: >
      The sample schemas are typically not required for production operations of the
      database. The default users, views, and/or procedures/functions created by
      sample schemas could be used to launch exploits against production
      environments. Impact: The Oracle sample usernames may be in use on a
      production basis. It is important that you first verify that BI, HR, IX, OE,
      PM, SCOTT, and/or SH are not valid production usernames before executing the
      dropping SQL scripts. This may be particularly true with the HR and BI users.
      If any of these users are present, it is important to be cautious and confirm
      the schemas present are, in fact, Oracle sample schemas and not production
      schemas being relied upon by business operations.
    audit_procedure: >
      Non multi-tenant or pluggable database only: To assess this recommendation,
      execute the following SQL statement. SELECT USERNAME FROM DBA_USERS WHERE
      USERNAME IN ('BI','HR','IX','OE','PM','SCOTT','SH'); Multi-tenant in the
      container database: This query will also give you the name of the CDB/PDB that
      has the issue. To assess this recommendation, execute the following SQL
      statement. SELECT DISTINCT A.USERNAME, DECODE (A.CON_ID,0,(SELECT NAME FROM
      V$DATABASE), 1,(SELECT NAME FROM V$DATABASE), (SELECT NAME FROM V$PDBS B WHERE
      A.CON_ID = B.CON_ID)) FROM CDB_USERS A WHERE A.USERNAME IN
      ('BI','HR','IX','OE','PM','SCOTT','SH'); Lack of results implies compliance.
    remediation: >
      To remediate this setting, execute the following SQL statement, keeping in
      mind if this is granted in both container and pluggable database, you must
      connect to both places to run the drop script.
      $ORACLE_HOME/demo/schema/drop_sch.sql Then, execute the following SQL
      statement. DROP USER SCOTT CASCADE; Note: The recyclebin is not set to OFF
      within the default drop script, which means that the data will still be
      present in your environment until the recyclebin is emptied. References: 1.
      https://docs.oracle.com/en/database/oracle/oracle-database/19/comsc/toc.htm
    references: >
      1. https://docs.oracle.com/en/database/oracle/oracle-database/19/comsc/toc.htm
    impact: >
      The Oracle sample usernames may be in use on a production basis. It is
      important that you first verify that BI, HR, IX, OE, PM, SCOTT, and/or SH are
      not valid production usernames before executing the dropping SQL scripts. This
