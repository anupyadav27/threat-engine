  - rule_id: oracle_db.cis.4.no_users_are_assigned_the_default_profile
    title: "Ensure No Users Are Assigned the 'DEFAULT' Profile"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 19c_v1.2.0"
    cis_version: "19c_v1.2.0"
    cis_control: "4.4"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Upon creation database users are assigned to the DEFAULT profile unless
      otherwise specified. No users should be assigned to that profile.
    rationale: >
      Users should be created with function-appropriate profiles. The DEFAULT
      profile, being defined by Oracle, is subject to change at any time (e.g. by
      patch or version update). The DEFAULT profile has unlimited settings that are
      often required by the SYS user when patching; such unlimited settings should
      be tightly reserved and not applied to unnecessary users.
    audit_procedure: >
      Non multi-tenant or pluggable database only: To assess this recommendation,
      execute the following SQL statement. SELECT USERNAME FROM DBA_USERS WHERE
      PROFILE='DEFAULT' AND ACCOUNT_STATUS='OPEN' AND ORACLE_MAINTAINED = 'N';
      Multi-tenant in the container database: This query will also give you the name
      of the CDB/PDB that has the issue. To assess this recommendation, execute the
      following SQL statement. SELECT A.USERNAME, DECODE (A.CON_ID,0,(SELECT NAME
      FROM V$DATABASE), 1,(SELECT NAME FROM V$DATABASE), (SELECT NAME FROM V$PDBS B
      WHERE A.CON_ID = B.CON_ID)) FROM CDB_USERS A WHERE A.PROFILE='DEFAULT' AND
      A.ACCOUNT_STATUS='OPEN' AND A.ORACLE_MAINTAINED = 'N'; Lack of results implies
      compliance.
    remediation: >
      To remediate this recommendation, execute the following SQL statement for each
      user returned by the audit query using a functional-appropriate profile,
      keeping in mind if this is granted in both container and pluggable database,
      you must connect to both places to revoke. ALTER USER <username> PROFILE
      <appropriate_profile> ;
