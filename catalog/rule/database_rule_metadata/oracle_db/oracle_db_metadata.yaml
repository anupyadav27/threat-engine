  - rule_id: oracle_db.cis.6.directory_object_access_is_revoked_from
    title: "Ensure Directory Object Access Is Revoked From Unauthorized ‘GRANTEE’"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: manual
    cis_benchmark: "CIS_ORACLE_DB 23ai_v1.0.0"
    cis_version: "23ai_v1.0.0"
    cis_control: "6.8.1"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      A directory object specifies an alias for a directory on the server file
      system where external files and data are located.
    rationale: >
      Users with access to these directories can perform actions at the operating
      system level that bypass normal security controls, potentially leading to data
      breaches, tampering, or destruction.
    audit_procedure: >
      To assess this recommendation, execute the following SQL statement. SELECT
      CON_ID_TO_CON_NAME(C.CON_ID) AS CONTAINERNAME,O.ORACLE_MAINTAINED, C.OWNER,
      C.DIRECTORY_NAME, C.DIRECTORY_PATH FROM CDB_DIRECTORIES C JOIN CDB_OBJECTS O
      ON C.CON_ID = O.CON_ID AND C.OWNER=C.OWNER AND O.OBJECT_NAME=C.DIRECTORY_NAME
      AND OBJECT_TYPE='DIRECTORY'; If any unauthorized users are granted directory
      object access, this is a fail. Note: The flag oracle_maintained='N' indicates
      whether the directory object was created by Oracle or someone else.
    remediation: >
      To remediate this recommendation, execute the following SQL statement to
      delete directories which are no longer required. DROP DIRECTORY
      <DIRECTORY_NAME> ; References: 1.
      https://docs.oracle.com/en/database/oracle/oracle-database/23/sqlrf/CREATE-
      DIRECTORY.html
    references: >
      1. https://docs.oracle.com/en/database/oracle/oracle-database/23/sqlrf/CREATE-
      DIRECTORY.html
    impact: >
      
