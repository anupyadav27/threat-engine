  - rule_id: oracle_db.cis.5.all_auditable_system_actions_commands_are_audited
    title: "Ensure All Auditable System Actions Commands Are Audited"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 23ai_v1.0.0"
    cis_version: "23ai_v1.0.0"
    cis_control: "5.1"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      Oracle defines (*) the various command categories such as DDL, DML, TCL, etc.
      partly deviating from the ANSI standard. However, these command categories are
      incomplete and only represent a part of the auditable commands. For this
      reason, the term “Auditable System Actions” is used in the following. This
      type of definition allows a flexible and future-oriented possibility to add
      new commands and commands that will be added to future patch sets. According
      to the Oracle definition* of Data Definition Language (DDL) statements, these
      tasks can be performed by definition: • Create, modify and delete schema
      object • Granting and revoking privileges and roles • Analyze information
      about a table, index or cluster • Setting up auditing options • Adding
      comments to the data dictionary
      https://docs.oracle.com/en/database/oracle/oracle-database/23/sqlrf/Types-of-
      SQL-Statements.html Enabling this unified action audit causes logging of all
      DDL commands, whether successful or unsuccessful, issued by the users
      regardless of the privileges held by the users to issue such statements.
    rationale: >
      Logging and monitoring of all attempts to perform these DDL commands, whether
      successful or unsuccessful, may provide clues and forensic evidence about
      potential suspicious/unauthorized activities. Any such activities may be a
      cause for further investigation. In addition, organization security policies
      and industry/government regulations may require logging of all activities
      involving these DDL commands. Impact: Auditing all DDL can result in rapid
      growth of the audit trail, particularly in active or dynamic environments.
      This may lead to storage management challenges and require regular maintenance
      (e.g., purging or archiving old audit records). The audit trail may consume
      excessive space, leading to issues such as system slowdowns or errors when
      storage limits are reached if it is not carefully managed.
    audit_procedure: >
      To assess this recommendation, execute the following SQL statement: WITH
      PRIVS(PRIVILEGE) AS ( SELECT DISTINCT A.PRIVILEGE AS NAME FROM DBA_SYS_PRIVS A
      WHERE A.PRIVILEGE NOT IN (SELECT NAME FROM AUDITABLE_SYSTEM_ACTIONS WHERE
      COMPONENT='Standard') AND PRIVILEGE NOT IN ('INHERIT ANY PRIVILEGES') UNION
      SELECT A.NAME FROM AUDITABLE_SYSTEM_ACTIONS A WHERE COMPONENT='Standard' AND
      A.NAME NOT IN
      ('ALL','SELECT','DELETE','INSERT','UPDATE','EXECUTE','LOGON','LOGOFF') ),
      CIS_AUDIT(CONTAINERNAME, CON_ID, AUDIT_OPTION) AS( SELECT C.NAME, C.CON_ID,
      LL.PRIVILEGE FROM V$CONTAINERS C, PRIVS LL WHERE C.OPEN_MODE='READ WRITE' ),
      AUDIT_ENABLED AS ( SELECT DISTINCT AUD.CON_ID, AUDIT_OPTION FROM
      CONTAINERS(AUDIT_UNIFIED_POLICIES) AUD WHERE AUD.AUDIT_OPTION IN (SELECT
      PRIVILEGE FROM PRIVS ) AND AUD.AUDIT_OPTION_TYPE IN ('SYSTEM
      PRIVILEGE','STANDARD ACTION') AND EXISTS (SELECT ENABLED.* FROM
      CONTAINERS(AUDIT_UNIFIED_ENABLED_POLICIES) ENABLED WHERE ENABLED.SUCCESS =
      'YES' AND ENABLED.FAILURE = 'YES' AND ENABLED.ENABLED_OPTION = 'BY USER' AND
      ENABLED.ENTITY_NAME = 'ALL USERS' AND ENABLED.POLICY_NAME = AUD.POLICY_NAME
      AND ENABLED.CON_ID = AUD.CON_ID) ) SELECT C.CONTAINERNAME, C.AUDIT_OPTION FROM
      CIS_AUDIT C LEFT JOIN AUDIT_ENABLED E ON C.AUDIT_OPTION = E.AUDIT_OPTION AND
      E.CON_ID = C.CON_ID WHERE E.AUDIT_OPTION IS NULL ORDER BY 1, 2; Lack of
      results implies compliance.
    remediation: >
      Execute the following SQL statement to remediate this recommendation: ALTER
      AUDIT POLICY CIS_LOCAL_SYSTEM_ACTIONS ADD ACTIONS <DDL> ; or ALTER AUDIT
      POLICY CIS_LOCAL_SYSTEM_ACTIONS ADD PRIVILEGES <DDL> ; Note: If you do not
      have CIS_LOCAL_SYSTEM_ACTIONS, please create one using the CREATE AUDIT POLICY
      statement. References: 1. https://docs.oracle.com/en/database/oracle/oracle-
      database/23/sqlrf/Types-of- SQL-Statements.html#GUID-
      FD9A8CB4-6B9A-44E5-B114-EFB8DA76FC88 2.
      https://docs.oracle.com/en/database/oracle/oracle-database/23/sqlrf/AUDIT-
      Unified-Auditing.html Additional Information: Check for EXCEPTION, as it may
      disable auditing for certain users. SELECT POLICY_NAME, ENABLED_OPTION,
      ENTITY_NAME FROM AUDIT_UNIFIED_ENABLED_POLICIES WHERE ENABLED_OPTION = 'EXCEPT
      USER';
    references: >
      1. https://docs.oracle.com/en/database/oracle/oracle-database/23/sqlrf/Types-
      of- SQL-Statements.html#GUID-FD9A8CB4-6B9A-44E5-B114-EFB8DA76FC88 2.
      https://docs.oracle.com/en/database/oracle/oracle-database/23/sqlrf/AUDIT-
      Unified-Auditing.html Additional Information: Check for EXCEPTION, as it may
      disable auditing for certain users. SELECT POLICY_NAME, ENABLED_OPTION,
      ENTITY_NAME FROM AUDIT_UNIFIED_ENABLED_POLICIES WHERE ENABLED_OPTION = 'EXCEPT
      USER';
    impact: >
      Auditing all DDL can result in rapid growth of the audit trail, particularly
      in active or dynamic environments. This may lead to storage management
      challenges and require regular maintenance (e.g., purging or archiving old
      audit records). The audit trail may consume excessive space, leading to issues
      such as system slowdowns or errors when storage limits are reached if it is
      not carefully managed.
    compliance_mappings:
      cis:
        - "CIS_ORACLE_DB_23ai_v1_0_0_5_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_oracle_db_23ai_v1_0_0_5_1"
    metadata_source: generated
