  - rule_id: oracle_db.cis.2.audit_trail_is_set_to_db_xml_os_db_extended_or
    title: "Ensure 'AUDIT_TRAIL' Is Set to 'DB', 'XML', 'OS', 'DB,EXTENDED', or 'XML,EXTENDED'"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 19c_v1.2.0"
    cis_version: "19c_v1.2.0"
    cis_control: "2.2.2"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The audit_trail setting determines whether or not Oracle's basic audit
      features are enabled. It can be set to 'Operating System'(OS); DB;
      DB,EXTENDED; XML; or XML,EXTENDED. The value should be set according to the
      needs of the organization.
    rationale: >
      Enabling the basic auditing features for the Oracle instance permits the
      collection of data to troubleshoot problems, as well as provides valuable
      forensic logs in the case of a system breach this value should be set
      according to the needs of the organization.
    audit_procedure: >
      To assess this recommendation, execute the following SQL statement. SELECT
      UPPER(VALUE) FROM V$SYSTEM_PARAMETER WHERE UPPER(NAME)='AUDIT_TRAIL'; Ensure
      VALUE is set to DB or OS or XML or DB,EXTENDED or XML,EXTENDED.
    remediation: >
      To remediate this setting, execute one of the following SQL statements and
      restart the instance. ALTER SYSTEM SET AUDIT_TRAIL = DB, EXTENDED SCOPE =
