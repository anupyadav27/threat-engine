  - rule_id: oracle_db.cis.6.all_is_revoked_on_sensitive_tables
    title: "Ensure 'ALL' Is Revoked On 'Sensitive' Tables"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 23ai_v1.0.0"
    cis_version: "23ai_v1.0.0"
    cis_control: "6.4.1"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Some tables contain critical information such as password hashes, encrypted
      passwords, etc. No user other than SYS should have table privileges on these
      tables.
    rationale: >
      Unauthorized users with access to these tables can perform actions at the
      operating system level that bypass normal security controls, potentially
      leading to data breaches, tampering, or destruction.
    audit_procedure: >
      To assess this recommendation, execute the following SQL statement. SELECT
      CON_ID_TO_CON_NAME(c.con_id) AS containername, c.* FROM CDB_TAB_PRIVS c WHERE
      c.owner='SYS' AND c.table_name IN
      ('CDB_LOCAL_ADMINAUTH$','DEFAULT_PWD$','ENC$','HISTGRM$','HIST_HEAD$','LINK$'
      ,'PDB_SYNC$','SCHEDULER$_CREDENTIAL','USER$','USER_HISTORY$','XS$VERIFIERS');
      If any sensitive tables have users with ALL privileges, this is a fail.
    remediation: >
      To remediate this recommendation, revoke privileges that are no longer
      required by executing the following SQL statement. REVOKE <privilege> ON
      <table> <directory_name> ;
    references: >
      
    impact: >
      
