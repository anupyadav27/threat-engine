      provided for the allocation of administrative privileges. Unauthorized
      grantees should not have that role.
    rationale: >
      Assignment of the DBA role to an ordinary user can provide a great number of
      unnecessary privileges to that user and open the door to data breaches,
      integrity violations, and denial-of-service conditions.
