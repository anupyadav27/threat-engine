  - rule_id: oracle_db.cis.2.sqlnet_allowed_logon_version_client_is_set_to_12a
    title: "Ensure 'SQLNET.ALLOWED_LOGON_VERSION_CLIENT' Is Set To 12a"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 23ai_v1.0.0"
    cis_version: "23ai_v1.0.0"
    cis_control: "2.2.4"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      This setting SQLNET.ALLOWED_LOGON_VERSION_CLIENT configures the minimum
      authentication protocols clients can use to connect to database instances.
      Please note that the term VERSION in the parameter name refers to the version
      of the authentication protocol, not the version of the Oracle Database
      release.
    rationale: >
      Allowing deprecated or weaker authentication protocols can expose the database
      to security vulnerabilities, increasing the risk of unauthorized access, data
      loss, or breaches. Ensuring that clients use secure protocols improves the
      overall security posture of the database environment. Impact: Setting this
      parameter to 12a may prevent some clients from connecting to the database,
      leading to authentication failures. Specifically, clients may encounter the
      error ORA-28040: The database does not accept your client's authentication
      protocol; login denied.
    audit_procedure: >
      On the Linux platform, execute the following shell command to audit this
      recommendation. grep -Pi
      '^\s*(SQLNET\.)?allowed_logon_version_client\s*=\s*(?!12a\b)\S+'
      '$ORACLE_HOME/network/admin/sqlnet.ora' On the Windows platform, execute the
      following command to audit this recommendation. Select-String -Path
      '$Env:ORACLE_HOME\network\admin\sqlnet.ora' -Pattern
      '^\s*(SQLNET\.)?allowed_logon_version_client\s*=\s*(?!12a\b)\S+' -
      CaseSensitive:$false To be compliant with this recommendation, the output of
      this command should be NULL. Lack of results indicates compliance. The audit
      command above assumes that sqlnet.ora is located in the default path
      $ORACLE_HOME/network/admin/sqlnet.ora. If this is not the case, please specify
      the correct location. For example, you might be using the TNS_ADMIN
      environment variable to point to the location of sqlnet.ora. Alternatively,
      sqlnet.ora could be located in the $ORACLE_BASE_HOME/network/admin or
      /opt/oracle/ <release_number> /network/admin directories.
    remediation: >
      To remediate this recommendation, set SQLNET.ALLOWED_LOGON_VERSION_CLIENT to
      12a. Default Value: 12 References: 1.
      https://docs.oracle.com/en/database/oracle/oracle-
      database/23/netrf/parameters- for-the-
      sqlnet.ora.html#GUID-B2908ADF-0973-44A9-9B34-587A3D605BED
