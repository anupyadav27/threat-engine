    cis_control: "2.3.10"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The SEC_PROTOCOL_ERROR_TRACE_ACTION setting determines the Oracle's server's
      logging response level to bad/malformed packets received from the client by
      generating ALERT, LOG, or TRACE levels of detail in the log files. This
      setting should have a value of LOG unless the organization has a compelling
      reason to use a different value because LOG should cause the necessary
      information to be logged. Setting the value as TRACE can generate an enormous
      amount of log output and should be reserved for debugging only.
    rationale: >
      Bad packets received from the client can potentially indicate packet-based
      attacks on the system, which could result in a denial-of-service condition.
    audit_procedure: >
      To assess this recommendation, execute the following SQL statement. SELECT
      DECODE(V.CON_ID,0,'ENTIRE-'||SYS_CONTEXT('USERENV','DB_NAME'),
      1,'ROOTONLY-'||SYS_CONTEXT('USERENV','DB_NAME'), CON_ID_TO_CON_NAME(V.CON_ID))
      AS CONTAINERNAME, UPPER(V.VALUE) FROM GV$SYSTEM_PARAMETER V WHERE UPPER(NAME)
      = 'SEC_PROTOCOL_ERROR_TRACE_ACTION' AND UPPER(VALUE) != 'LOG' ORDER BY CON_ID;
      To be compliant with this recommendation, the output of this command should be
      NULL. Lack of results indicates compliance.
    remediation: >
      To remediate this setting, execute the following SQL statement. ALTER SYSTEM
      SET SEC_PROTOCOL_ERROR_TRACE_ACTION=LOG SCOPE = BOTH; Default Value: TRACE
      References: 1. https://docs.oracle.com/en/database/oracle/oracle-
      database/23/refrn/SEC_PROTOCOL_ERROR_TRACE_ACTION.html
