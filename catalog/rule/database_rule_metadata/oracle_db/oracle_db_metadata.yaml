  - rule_id: oracle_db.cis.5.critical_packages_are_audited
    title: "Ensure Critical Packages Are Audited"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 23ai_v1.0.0"
    cis_version: "23ai_v1.0.0"
    cis_control: "5.3"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      Auditing critical packages in Oracle is essential to ensure database security,
      maintain accountability, and support compliance with regulatory requirements.
      These packages provide powerful functionality, such as scheduling jobs,
      performing cryptographic operations, or handling web-based utilities where, if
      misused or exploited, can compromise the integrity, confidentiality, and
      availability of the database. Auditing these critical packages is recommended;
      however, it should be enabled based on the specific needs and requirements of
      the organization: • SYS.DBMS_AW • SYS.DBMS_CRYPTO • SYS.DBMS_FGA •
      SYS.DBMS_JAVA_TEST • SYS.DBMS_JOB • SYS.DBMS_LOGMNR •
      SYS.DBMS_NETWORK_ACL_ADMIN • SYS.DBMS_REDACT • SYS.DBMS_REDEFINITION •
      SYS.DBMS_RLS • SYS.DBMS_SCHEDULER • SYS.DBMS_SQL_TRANSLATOR • SYS.DBMS_SYS_SQL
      • SYS.DBMS_TSDP_MANAGE • SYS.DBMS_TSDP_PROTECT • SYS.DBMS_XMLGEN •
      SYS.DBMS_XMLSTORE • SYS.OWA_UTIL
    rationale: >
      Auditing these packages helps monitor their usage, detect unauthorized access,
      and prevent potential misuse or security breaches. This practice also supports
      incident response and forensic investigations by maintaining a detailed record
      of package invocation, ensuring that critical operations are tracked and
      controlled in high-security environments. Impact: Auditing system packages
      generates additional logs, which can impact system performance, especially in
      high-transaction environments. Auditing can introduce slight delays in query
      execution due to the extra logging steps.
    audit_procedure: >
      To assess this recommendation, execute the following SQL statement. WITH
      CIS_AUDIT(NAME, CON_ID, AUDIT_OBJECT_NAME) AS( SELECT C.NAME, C.CON_ID, LL.*
      FROM V$CONTAINERS C,
      TABLE(DBMSOUTPUT_LINESARRAY('DBMS_AW','DBMS_CRYPTO','DBMS_FGA',
      'DBMS_JAVA_TEST','DBMS_JOB','DBMS_LOGMNR',
      'DBMS_NETWORK_ACL_ADMIN','DBMS_REDACT','DBMS_REDEFINITION','DBMS_RLS',
      'DBMS_SCHEDULER','DBMS_SQL_TRANSLATOR','DBMS_SYS_SQL','DBMS_TSDP_MANAGE',
      'DBMS_TSDP_PROTECT','DBMS_XMLGEN','DBMS_XMLSTORE','OWA_UTIL') ) LL WHERE
      C.OPEN_MODE='READ WRITE' ), AUDIT_ENABLED AS ( SELECT DISTINCT
      CON_ID_TO_CON_NAME(AUD.CON_ID) AS CONTAINERNAME, AUDIT_OPTION,
      AUD.OBJECT_NAME, AUD.POLICY_NAME, AUD.CON_ID FROM
      CONTAINERS(AUDIT_UNIFIED_POLICIES) AUD WHERE AUD.OBJECT_NAME IN
      ('DBMS_AW','DBMS_CRYPTO','DBMS_FGA','DBMS_JAVA_TEST','DBMS_JOB','DBMS_LOGMNR'
      , 'DBMS_NETWORK_ACL_ADMIN','DBMS_REDACT','DBMS_REDEFINITION','DBMS_RLS',
      'DBMS_SCHEDULER','DBMS_SQL_TRANSLATOR','DBMS_SYS_SQL','DBMS_TSDP_MANAGE',
      'DBMS_TSDP_PROTECT','DBMS_XMLGEN','DBMS_XMLSTORE','OWA_UTIL') AND
      AUD.AUDIT_OPTION_TYPE = 'OBJECT ACTION' AND EXISTS (SELECT
      CON_ID_TO_CON_NAME(ENABLED.CON_ID) AS CONTAINERNAME, ENABLED.* FROM
      CONTAINERS(AUDIT_UNIFIED_ENABLED_POLICIES) ENABLED WHERE ENABLED.SUCCESS =
      'YES' AND ENABLED.FAILURE = 'YES' AND ENABLED.ENABLED_OPTION = 'BY USER' AND
      ENABLED.ENTITY_NAME = 'ALL USERS' AND ENABLED.POLICY_NAME = AUD.POLICY_NAME
      AND ENABLED.CON_ID = AUD.CON_ID) ) SELECT C.NAME, C.AUDIT_OBJECT_NAME FROM
      CIS_AUDIT C LEFT JOIN AUDIT_ENABLED E ON C.AUDIT_OBJECT_NAME = E.OBJECT_NAME
      AND E.CON_ID = C.CON_ID WHERE E.OBJECT_NAME IS NULL ORDER BY 1, 2; Lack of
      results implies compliance.
    remediation: >
      Execute the following SQL statement to remediate this recommendation: CREATE
      AUDIT POLICY DRVADMIN_MIGHTY_PACKAGES ACTIONS EXECUTE ON SYS.DBMS_AW, EXECUTE
      ON SYS.DBMS_CRYPTO, EXECUTE ON SYS.DBMS_FGA, EXECUTE ON SYS.DBMS_JAVA_TEST,
      EXECUTE ON SYS.DBMS_JOB, EXECUTE ON SYS.DBMS_LOGMNR, EXECUTE ON
      SYS.DBMS_NETWORK_ACL_ADMIN, EXECUTE ON SYS.DBMS_OBFUSCATION_TOOLKIT, EXECUTE
      ON SYS.DBMS_REDACT, EXECUTE ON SYS.DBMS_REDEFINITION, EXECUTE ON SYS.DBMS_RLS,
      EXECUTE ON SYS.DBMS_SCHEDULER, EXECUTE ON SYS.DBMS_SQL_TRANSLATOR, EXECUTE ON
      SYS.DBMS_SYS_SQL, EXECUTE ON SYS.DBMS_TSDP_MANAGE, EXECUTE ON
      SYS.DBMS_TSDP_PROTECT, EXECUTE ON SYS.DBMS_XMLGEN, EXECUTE ON
      SYS.DBMS_XMLSTORE, EXECUTE ON SYS.OWA_UTIL ONLY TOPLEVEL; Default Value: These
      packages are not audited by default.
    references: >
      
    impact: >
      Auditing system packages generates additional logs, which can impact system
      performance, especially in high-transaction environments. Auditing can
      introduce slight delays in query execution due to the extra logging steps.
