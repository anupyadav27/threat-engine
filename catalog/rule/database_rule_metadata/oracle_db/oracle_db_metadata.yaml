  - rule_id: oracle_db.cis.6.cdb_schema_privs_does_not_have_unauthorized
    title: "Ensure 'CDB_SCHEMA_PRIVS' Does Not Have Unauthorized Privileges"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: manual
    cis_benchmark: "CIS_ORACLE_DB 23ai_v1.0.0"
    cis_version: "23ai_v1.0.0"
    cis_control: "6.3.1"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      In Oracle 23ai, the new Schema Privileges provide fine-grained control over
      which users can create objects in a particular schema without requiring
      extensive system privileges such as CREATE ANY TABLE. This improves security
      by allowing administrators to specifically grant CREATE, ALTER, DROP and
      SELECT privileges at the schema level instead of granting global access.
    rationale: >
      The use of Schema privileges improves security by simplifying authorization
      for database objects, especially for schemas that frequently add new objects.
      Instead of granting broad system-level (* ANY) privileges that apply to the
      entire database, privileges can now be granted at the individual schema level.
      Schema privileges may inadvertently grant a technical database user excessive
      rights, potentially violating the principle of least privilege.
    audit_procedure: >
      To assess this recommendation, execute the following SQL statement. SELECT
      CON_ID_TO_CON_NAME(c.con_id) AS containername, c.* FROM CDB_SCHEMA_PRIVS c;
      Review the results for any unauthorized privileges. If any unauthorized
      privileges exist, this is a fail.
    remediation: >
      To remediate this recommendation, revoke privileges that are no longer
      required by executing the following SQL statement. REVOKE <SCHEMA_PRIVILEGE>
      ON SCHEMA <USERNAME> FROM <GRANTEE> ; References: 1.
      https://docs.oracle.com/en/database/oracle/oracle-
      database/23/dbseg/configuring-privilege-and-role-authorization.html#GUID-
      483D04AF-BC5B-4B3D-9D9A-1D2C3CE8F12F 6.4 Excessive Object Privileges The
      recommendations within this section intend to revoke powerful object
      privileges where they are likely not needed.
    references: >
      1. https://docs.oracle.com/en/database/oracle/oracle-
      database/23/dbseg/configuring-privilege-and-role-authorization.html#GUID-
      483D04AF-BC5B-4B3D-9D9A-1D2C3CE8F12F 6.4 Excessive Object Privileges The
      recommendations within this section intend to revoke powerful object
      privileges where they are likely not needed.
