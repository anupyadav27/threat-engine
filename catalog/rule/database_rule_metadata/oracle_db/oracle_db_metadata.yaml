  - rule_id: oracle_db.cis.4.no_custom_oracle_maintained_users_exist
    title: "Ensure No Custom 'ORACLE_MAINTAINED' Users Exist"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 23ai_v1.0.0"
    cis_version: "23ai_v1.0.0"
    cis_control: "4.2"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Oracle-maintained accounts should not be created. The ORACLE_MAINTAINED flag
      is used to identify such accounts. Only users provided by Oracle should have
      this flag set to Y. Custom database users should not be assigned this
      designation.
    rationale: >
      Oracle-maintained accounts are used by internal tools, database packages,
      procedures, and third-party software to make critical decisions. For example:
      • Data Pump often excludes objects marked as ORACLE_MAINTAINED. • Oracle
      upgrades and patches may modify or delete objects marked with this flag. •
      Custom schemas should not use this flag, as it can lead to unintended system
      behavior, including unauthorized modifications during maintenance activities.
      Some organizations attempt to create custom ORACLE_MAINTAINED users to bypass
      the C##-prefix requirement for common users. However, misusing this flag can
      introduce security risks and operational issues. It can impact proper
      functioning and integrity of Oracle databases. Impact: Dropping a user may
      result in data loss or impact application availability, requiring thorough
      assessment before taking action. You may need to export all objects owned by
      common users in the CDB and all PDBs before making changes.
    audit_procedure: >
      To assess this recommendation, execute the following SQL statement: SELECT
      CON_ID_TO_CON_NAME(C.CON_ID) AS CONTAINERNAME,USERNAME, FROM CDB_USERS C WHERE
      ORACLE_MAINTAINED = 'Y' AND USERNAME NOT IN ( 'ANONYMOUS', 'APEX_LISTENER',
      'APEX_PUBLIC_USER','APEX_REST_PUBLIC_USER', 'APEX_230200', 'APEX_240100',
      'APEX_PUBLIC_ROUTER', 'APPQOSSYS','AUDSYS', 'CTXSYS', 'DBSFWUSER', 'DBSNMP',
      'DGPDB_INT', 'DIP', 'DVF', 'DVSYS', 'FLOWS_FILES', 'GGSHAREDCAP', 'GGSYS',
      'GSMADMIN_INTERNAL', 'GSMCATUSER', 'GSMROOTUSER', 'GSMUSER', 'LBACSYS',
      'MDDATA', 'MDSYS', 'OJVMSYS', 'OLAPSYS', 'OUTLN', 'REMOTE_SCHEDULER_AGENT',
      'SYS', 'SYSBACKUP', 'SYSDG', 'SYSKM', 'SYSRAC', 'SYSTEM', 'SYS$UMF', 'VECSYS',
      'WMSYS', 'XDB', 'XS$NULL' ) ORDER BY 1; A lack of results implies compliance.
    remediation: >
      To remediate this setting, execute the following SQL statement. DROP USER
      <USERNAME> ;
    references: >
      
    impact: >
      Dropping a user may result in data loss or impact application availability,
      requiring thorough assessment before taking action. You may need to export all
      objects owned by common users in the CDB and all PDBs before making changes.
    compliance_mappings:
      cis:
