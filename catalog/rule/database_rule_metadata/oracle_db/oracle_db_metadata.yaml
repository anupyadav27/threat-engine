      execute the following SQL statement. SELECT AUDIT_OPTION,SUCCESS,FAILURE,
      DECODE (A.CON_ID, 0,(SELECT NAME FROM V$DATABASE), 1,(SELECT NAME FROM
      V$DATABASE), (SELECT NAME FROM V$PDBS B WHERE A.CON_ID = B.CON_ID)) FROM
