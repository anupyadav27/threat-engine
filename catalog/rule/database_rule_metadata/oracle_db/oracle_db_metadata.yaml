  - rule_id: oracle_db.cis.2.allow_group_access_to_sga_is_set_to_false
    title: "Ensure 'ALLOW_GROUP_ACCESS_TO_SGA' Is Set To `FALSE`"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 23ai_v1.0.0"
    cis_version: "23ai_v1.0.0"
    cis_control: "2.3.4"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The ALLOW_GROUP_ACCESS_TO_SGA controls Linux group access to shared memory on
      UNIX platforms. database shared memory is created with owner access only.
    rationale: >
      This is to minimize the attack surface, as setting ALLOW_GROUP_ACCESS_TO_SGA
      to true will allow linux accounts with the same group membership of the oracle
      software account owner to access the shared memory and thus the ability to
      dump data from memory. Impact: No impact on database operations, but it may
      impact third party software that requires access to Oracle SGA memory such as
      security monitoring software.
    audit_procedure: >
      To assess this recommendation, execute the following SQL statement. SELECT
      DECODE(V.CON_ID,0,'ENTIRE-'||SYS_CONTEXT('USERENV','DB_NAME'),
      1,'ROOTONLY-'||SYS_CONTEXT('USERENV','DB_NAME'), CON_ID_TO_CON_NAME(V.CON_ID))
      AS CONTAINERNAME, UPPER(V.VALUE) FROM GV$SYSTEM_PARAMETER V WHERE UPPER(NAME)
      = 'ALLOW_GROUP_ACCESS_TO_SGA' AND UPPER(VALUE) != 'FALSE' ORDER BY CON_ID; To
      be compliant with this recommendation, the output of this command should be
      NULL. Lack of results indicates compliance.
    remediation: >
      To remediate this setting, execute the following SQL statement. ALTER SYSTEM
      SET ALLOW_GROUP_ACCESS_TO_SGA='FALSE' SCOPE=SPFILE; Default Value: FALSE
      References: 1. https://docs.oracle.com/en//database/oracle/oracle-
      database/23/refrn/ALLOW_GROUP_ACCESS_TO_SGA.html#GUID-
      A6BABC97-7EF8-4E1A-89C9-CF81EDCFB4A2
    references: >
      1. https://docs.oracle.com/en//database/oracle/oracle-
      database/23/refrn/ALLOW_GROUP_ACCESS_TO_SGA.html#GUID-
