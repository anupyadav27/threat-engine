  - rule_id: oracle_db.cis.4.latest_version_of_the_password_file_is_used
    title: "Ensure The Latest Version of The Password File Is Used"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 23ai_v1.0.0"
    cis_version: "23ai_v1.0.0"
    cis_control: "4.5"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      The database password file is used to authenticate users with administrative
      privileges (SYSDBA, SYSOPER, etc.) from a remote machine. It enables secure
      remote database management and contains a list of privileged users with their
      corresponding encrypted passwords. Starting with Oracle 12.2, Oracle enforces
      stronger password hashing algorithms in password files to improve security. It
      is recommended to ensure that the password file format is updated to 12.2 to
      leverage enhanced security mechanisms.
    rationale: >
      Ensuring that the password file format is 12.2 provides the following
      benefits: • Enhanced security: Passwords are stored using a stronger hashing
      algorithm. • Compliance with best practices: The latest format ensures
      compatibility with the recommended security settings. • Ability to grant
      administrative privileges (SYSOPER, SYSBACKUP, etc.) to global users securely.
      Impact: In environments using ASM, RAC, or RMAN, upgrading the password file
      format may require additional considerations. Existing users in the password
      file must already have passwords that comply with 12.2 format before
      upgrading. Any changes to the password file format should be thoroughly tested
      in a non- production environment before implementation.
    audit_procedure: >
      To assess this recommendation, execute the following statement: SELECT
      inst_id,format FROM GV$PASSWORDFILE_INFO WHERE FORMAT !='12.2'; A lack of
      results implies compliance.
    remediation: >
      To update the password file to the latest format (12.2), follow these steps: •
      Ensure that all users in the password file have passwords meeting 12.2
      complexity requirements. • Use the orapwd utility to create a new password
      file in 12.2 format: orapwd file=orapwd122 FORMAT=12.2 • If the password file
      name or location has recently changed and the changes are not reflected,
      refresh the metadata cache: ALTER SYSTEM FLUSH PASSWORDFILE_METADATA_CACHE; •
      Validate the password file format using the audit query again. Default Value:
