  - rule_id: oracle_db.cis.6.create_session_audit_option_is_enabled
    title: "Ensure the 'CREATE SESSION' Audit Option Is Enabled"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 19c_v1.2.0"
    cis_version: "19c_v1.2.0"
    cis_control: "6.1.18"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Enabling this audit option will cause auditing of all attempts to connect to
      the database, whether successful or not, as well as audit session
      disconnects/logoffs. The commands to audit SESSION, CONNECT or CREATE SESSION
      all accomplish the same thing - they initiate statement auditing of the
      connect statement used to create a database session.
    rationale: >
      Auditing attempts to connect to the database is basic and mandated by most
      security initiatives. Any attempt to logon to a locked account, failed
      attempts to logon to default accounts or an unusually high number of failed
      logon attempts of any sort, for any user, in a particular time period may
      indicate an intrusion attempt. In forensics, the logon record may be first in
      a chain of evidence and contain information found in no other type of audit
      record for the session. Logon and logoff in the audit trail define the period
      and duration of the session.
    audit_procedure: >
      Non multi-tenant or pluggable database only: To assess this recommendation,
      execute the following SQL statement. SELECT AUDIT_OPTION,SUCCESS,FAILURE FROM
      DBA_STMT_AUDIT_OPTS WHERE USER_NAME IS NULL AND PROXY_NAME IS NULL AND SUCCESS
      = 'BY ACCESS' AND FAILURE = 'BY ACCESS' AND AUDIT_OPTION='CREATE SESSION';
      Multi-tenant in the container database: This query will also give you the name
      of the CDB/PDB that has auditing turned on. To assess this recommendation,
      execute the following SQL statement. SELECT AUDIT_OPTION,SUCCESS,FAILURE,
      DECODE (A.CON_ID, 0,(SELECT NAME FROM V$DATABASE), 1,(SELECT NAME FROM
      V$DATABASE), (SELECT NAME FROM V$PDBS B WHERE A.CON_ID = B.CON_ID)) FROM
      CDB_STMT_AUDIT_OPTS A WHERE USER_NAME IS NULL AND PROXY_NAME IS NULL AND
      SUCCESS = 'BY ACCESS' AND FAILURE = 'BY ACCESS' AND AUDIT_OPTION='CREATE
      SESSION'; Lack of results implies a finding.
    remediation: >
      To remediate this setting, execute the following SQL statement in either the
      non multi- tenant or container database, it does NOT need run in the
      pluggable. AUDIT SESSION; Additional Information: Although listed in the
      documentation as a privilege audit, audit CREATE SESSION actually audits the
      CONNECT statement. This is evidenced by the undocumented audit CONNECT which
      has the same result as audit SESSION or audit CREATE SESSION. There is no
      system privilege named either SESSION or CONNECT (CONNECT is a role, not a
      system privilege). Also, it behaves as statement auditing rather than
      privilege auditing in that it audits all attempts to create a session, even if
      the user does not hold the CREATE SESSION system privilege.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_ORACLE_DB_19c_v1_2_0_6_1_18"
