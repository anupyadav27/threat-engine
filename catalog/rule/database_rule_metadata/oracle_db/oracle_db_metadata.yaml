  - rule_id: oracle_db.cis.2.sqlnet_encryption_types_client_is_set_to_aes256
    title: "Ensure 'SQLNET.ENCRYPTION_TYPES_CLIENT' Is Set To 'AES256'"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 23ai_v1.0.0"
    cis_version: "23ai_v1.0.0"
    cis_control: "2.2.8"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The SQLNET.ENCRYPTION_TYPES_CLIENT parameter specifies the encryption
      algorithms that the client can use for database connections. This setting
      allows you to ensure that all data transmitted between the client and the
      database is encrypted using strong, secure algorithms.
    rationale: >
      Limiting the client to use only strong encryption algorithms helps to protect
      data integrity and confidentiality during transit. Using stronger algorithms
      reduces the risk of interception or tampering by unauthorized parties. Impact:
      If the AES256 algorithm is not available or installed on either the client or
      server, connections will be terminated. This may result in the error
      ORA-12650: No common encryption or data integrity algorithm, preventing SQL
      clients from connecting to the database.
    audit_procedure: >
      On the Linux platform, execute the following shell command to audit this
      recommendation. grep -Pi
      '^\s*(SQLNET\.)?ENCRYPTION_TYPES_CLIENT\s*=\s*(?!AES256\b)\S+'
      '$ORACLE_HOME/network/admin/sqlnet.ora' On the Windows platform, execute the
      following command to audit this recommendation. Select-String -Path
      '$Env:ORACLE_HOME\network\admin\sqlnet.ora' -Pattern
      '^\s*(SQLNET\.)?ENCRYPTION_TYPES_CLIENT\s*=\s*(?!AES256\b)\S+' -
      CaseSensitive:$false To be compliant with this recommendation, the output of
      this command should be NULL. Lack of results indicates compliance. The audit
      command above assumes that sqlnet.ora is located in the default path
      $ORACLE_HOME/network/admin/sqlnet.ora. If this is not the case, please specify
      the correct location. For example, you might be using the TNS_ADMIN
      environment variable to point to the location of sqlnet.ora. Alternatively,
      sqlnet.ora could be located in the $ORACLE_BASE_HOME/network/admin or
      /opt/oracle/ <release_number> /network/admin directories.
    remediation: >
      To remediate this recommendation, set SQLNET.ENCRYPTION_TYPES_CLIENT to
      AES256. SQLNET.CRYPTO_CHECKSUM_TYPES_CLIENT=AES256 Default Value: All
      available algorithms References: 1.
      https://docs.oracle.com/en/database/oracle/oracle-
      database/23/netrf/parameters- for-the-
      sqlnet.ora.html#GUID-9E9E6054-DD98-4B51-93A4-3802B5AA779F
