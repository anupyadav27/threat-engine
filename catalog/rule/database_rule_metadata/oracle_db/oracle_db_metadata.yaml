  - rule_id: oracle_db.cis.4.users_in_different_rac_instances_are_identical_in
    title: "Ensure That Users In Different RAC Instances Are Identical In PW Files"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: manual
    cis_benchmark: "CIS_ORACLE_DB 23ai_v1.0.0"
    cis_version: "23ai_v1.0.0"
    cis_control: "4.6"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      In Oracle Real Application Clusters (RAC) environments, each instance
      maintains its own password file for authenticating users with administrative
      privileges (SYSDBA, SYSOPER, SYSBACKUP, etc.). If password files are not
      synchronized across all RAC nodes, certain administrative users may exist on
      only one node, causing authentication failures when attempting to log in from
      other nodes. To ensure seamless remote administration and high availability,
      all RAC instances must have identical password files.
    rationale: >
      Maintaining identical password files across all RAC nodes ensures consistent
      authentication for administrative users across all nodes and remote management
      of the database without login failures. Impact: If password files are not
      synchronized, privileged users may be unable to authenticate on certain RAC
      nodes.
    audit_procedure: >
      To assess this recommendation, execute the following SQL statement: SELECT *
      FROM GV$PWFILE_USERS; If any users are not identical across RAC Instances,
      this is a fail.
    remediation: >
      After changes to the password file, all nodes should be synchronized.
      References: 1. https://docs.oracle.com/en/database/oracle/oracle-
      database/23/refrn/V-
      PWFILE_USERS.html#GUID-C8D29599-13BD-493A-BE23-0F16BDDA7725
    references: >
      1. https://docs.oracle.com/en/database/oracle/oracle-database/23/refrn/V-
      PWFILE_USERS.html#GUID-C8D29599-13BD-493A-BE23-0F16BDDA7725
    impact: >
      If password files are not synchronized, privileged users may be unable to
      authenticate on certain RAC nodes.
