  - rule_id: oracle_db.cis.2.background_core_dump_is_not_set_to_full
    title: "Ensure 'BACKGROUND_CORE_DUMP' Is Not Set To 'Full'"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 23ai_v1.0.0"
    cis_version: "23ai_v1.0.0"
    cis_control: "2.3.1"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The BACKGROUND_CORE_DUMP parameter in Oracle's init.ora file specifies the
      level of detail captured in core dumps generated by background processes
      during an exception. Setting this parameter to FULL enables the creation of
      detailed SGA dumps, which may include sensitive information.
    rationale: >
      Allowing BACKGROUND_CORE_DUMP to be set to FULL increases the risk of exposing
      sensitive data, such as encryption keys, passwords, or other confidential
      information, in the core dump files. These files could be accessed by
      unauthorized users, leading to data breaches. Limiting the detail in core
      dumps reduces this risk while still providing enough information for
      diagnostics. The use of TDE doesn’t prevent, or encrypt the dumps generated by
      the background processes.
    audit_procedure: >
      o assess this recommendation, execute the following SQL statement. SELECT
      DECODE(V.CON_ID,0,'ENTIRE-'||SYS_CONTEXT('USERENV','DB_NAME'),
      1,'ROOTONLY-'||SYS_CONTEXT('USERENV','DB_NAME'), CON_ID_TO_CON_NAME(V.CON_ID))
      AS CONTAINERNAME, UPPER(V.VALUE) FROM GV$SYSTEM_PARAMETER V WHERE UPPER(NAME)
      = 'BACKGROUND_CORE_DUMP' AND UPPER(VALUE) = 'FULL' ORDER BY CON_ID; To be
      compliant with this recommendation, the output of this command should be NULL.
      Lack of results indicates compliance.
    remediation: >
      To remediate this recommendation, execute the following SQL statement. ALTER
      SYSTEM SET BACKGROUND_CORE_DUMP='partial' SCOPE=BOTH; Default Value: partial
      References: 1. https://docs.oracle.com/en/database/oracle/oracle-
      database/23/refrn/BACKGROUND_CORE_DUMP.html#GUID-A7118B00-4814-
      453E-872E-B68E4CB192F6
    references: >
      1. https://docs.oracle.com/en/database/oracle/oracle-
      database/23/refrn/BACKGROUND_CORE_DUMP.html#GUID-A7118B00-4814-
      453E-872E-B68E4CB192F6
    impact: >
      
