  - rule_id: oracle_db.cis.3.password_life_time_password_grace_time_is_less
    title: "Ensure 'PASSWORD_LIFE_TIME + PASSWORD_GRACE_TIME' Is Less Than Or Equal To '365'"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 23ai_v1.0.0"
    cis_version: "23ai_v1.0.0"
    cis_control: "3.3"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The PASSWORD_LIFE_TIME setting determines how long a password may be used
      before the user is required to change it. The suggested value is 365 days or
      less. Note that recent NIST guidelines recommend using longer lifetimes for
      human actor passwords.
    rationale: >
      Allowing passwords to remain unchanged for long periods makes the success of
      attacks leveraging stolen passwords more likely.
    audit_procedure: >
      This query will also give you the name of the CDB/PDB that has the issue. To
      assess this recommendation, execute the following SQL statement. WITH
