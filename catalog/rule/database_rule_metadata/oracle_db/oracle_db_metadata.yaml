  - rule_id: oracle_db.cis.3.password_verify_function_is_set_for_all_profiles
    title: "Ensure 'PASSWORD_VERIFY_FUNCTION' Is Set For All Profiles"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 23ai_v1.0.0"
    cis_version: "23ai_v1.0.0"
    cis_control: "3.5"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The PASSWORD_VERIFY_FUNCTION enforces password complexity checks when a
      database account's password is changed. It should be set for all profiles.
      Note that this setting does not apply to administrative roles (like SYSDBA,
      SYSDG or SYSOPER) authenticated by the Oracle password file. From 12.2, Oracle
      provides password complexity rules for password file users (Doc 2294754.1)
    rationale: >
      Through Oracle Database profiles, password complexity rules (mixed cases with
      digits and special characters), blocking of simple combinations, and enforcing
      change/history settings can potentially thwart unauthorized logins by an
      unauthorized user.
    audit_procedure: >
      This query will also give you the name of the CDB/PDB that has the issue. To
      assess this recommendation, execute the following SQL statement. SELECT
      DECODE(P.CON_ID,0,'ENTIRE-'||SYS_CONTEXT('USERENV','DB_NAME'),
      1,'ROOTONLY-'||SYS_CONTEXT('USERENV','DB_NAME'), CON_ID_TO_CON_NAME(P.CON_ID))
      AS CONTAINERNAME, P.PROFILE, P.RESOURCE_NAME, P.LIMIT FROM SYS.CDB_PROFILES P
      WHERE RESOURCE_NAME='PASSWORD_VERIFY_FUNCTION' AND P.LIMIT = 'NULL' ORDER BY
      CON_ID, PROFILE, RESOURCE_NAME; To be compliant with this recommendation, the
      output of this command should be NULL. Lack of results indicates compliance.
    remediation: >
      Use the password verification function, or create a custom password
      verification function which fulfills the password requirements of the
      organization. Oracle supplies two password verification functions with the
      database ora12c_verify_function and ora12c_strong_verify_function. You may
      also create your own function if your organization's standards are different
      from the functions Oracle supplies. For a sample of a password verification
      function that you can customize to meet your needs, see
      $ORACLE_HOME/rdbms/admin/catpvf.sql. In most cases, we recommend that
      ora12c_strong_verify_function be used. References: 1.
      https://docs.oracle.com/en/database/oracle/oracle-database/23/sqlrf/CREATE-
      PROFILE.html#d387296e997
    references: >
