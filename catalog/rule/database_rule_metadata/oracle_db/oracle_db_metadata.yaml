  - rule_id: oracle_db.cis.4.no_public_database_links_exist
    title: "Ensure No Public Database Links Exist"
    severity: high
    category: database
    tech_type: oracle_db
    automation_type: automated
    cis_benchmark: "CIS_ORACLE_DB 23ai_v1.0.0"
    cis_version: "23ai_v1.0.0"
    cis_control: "4.7"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Public database links provide a mechanism for establishing connections between
      databases, enabling data access across multiple environments.
    rationale: >
      Public database links pose a security risk because they allow any database
      user to execute queries or modify data on a remote database, depending on the
      credentials stored in the link. This can lead to unauthorized access, data
      breaches, and compliance violations. Impact: Applications relying on public
      database links may fail after removal. Alternative connection methods (e.g.,
      private database links) may need to be implemented.
    audit_procedure: >
      This query will also give you the name of the CDB/PDB that has the issue. To
      assess this recommendation, execute the following SQL statement. SELECT
      DECODE(V.CON_ID, 0, 'ENTIRE-' || SYS_CONTEXT('USERENV','DB_NAME'), 1,
      'ROOTONLY-' || SYS_CONTEXT('USERENV','DB_NAME'), CON_ID_TO_CON_NAME(V.CON_ID))
      AS CONTAINERNAME, DB_LINK, HOST FROM CDB_DB_LINKS V WHERE OWNER = 'PUBLIC';
      Lack of results implies compliance.
    remediation: >
      To remove a public database link, execute the following SQL command: DROP
      PUBLIC DATABASE LINK <DB_LINK> ;
    references: >
      
    impact: >
      Applications relying on public database links may fail after removal.
      Alternative connection methods (e.g., private database links) may need to be
      implemented.
