  - rule_id: mysql.cis.2.socket_peer_credential_authentication_is_used
    title: "Ensure Socket Peer-Credential Authentication is Used Appropriately"
    severity: medium
    category: database
    tech_type: mysql
    automation_type: manual
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "2.13"
    cis_section: "2"
    profile_applicability: "Level 2"
    description: >
      The server-side auth_socket authentication plugin, authenticates clients that
      connect to the MySQL server from the local host through the Unix socket file.
      Users authenticated by the auth_socket need not specify a password when
      connecting to the server. However, users authenticated by the auth_socket
      plugin are restricted from connecting remotely; they can only connect from the
      local host through the Unix socket file. This method is only suitable in
      situations where the server administrator OS account access is restricted.
    rationale: >
      This method may be desirable in specific cases, including: • The Linux system
      where MySQL is running is dedicated to the MySQL server and only the MySQL DBA
      and OS Admin have access. • When control over user authentication is
      centralized in the operating system. • It is desirable that audit trails in
      the database and operating system can use the same user names. • For certain
      other narrow installation use cases auth_socket may be desirable. • Only local
      connections for a user. Impact: Things to consider when using the operating
      system to authenticate users: • The user must have an operating system account
      on the computer which must be accessed. • If a user has logged in using this
      method and steps away from the terminal, another user could easily log in
      because this user does not need any passwords or credentials. This could pose
      a serious security problem. • When an operating system is used to authenticate
      database users, managing distributed database environments and database links
      requires special care. Special care must also be taken not to leave such a
      terminal unlocked and unattended. Hence, we recommend that you carefully
      evaluate your requirements before opting for auth_socket. • This will not work
      where distributed connections are required.
    audit_procedure: >
      To assess this recommendation run the following: SELECT PLUGIN_NAME,
      PLUGIN_STATUS FROM INFORMATION_SCHEMA.PLUGINS WHERE PLUGIN_NAME LIKE 'auth%';
      To determine users who can use auth socket: select user, host, plugin from
      mysql.user where plugin = 'auth_socket'; If this is enabled and the
      organization does not allow use of this feature, this is a fail. If host is
      not the localhost or an unauthorized user is listed, this is a fail.
    remediation: >
      Add these options under the [mysqld] option group in the MySQL /etc/my.cnf:
      plugin-load-add=auth_socket.so auth_socket=FORCE_PLUS_PERMANENT For example:
      For an OS user which can login to MySQL using auth_socket: CREATE USER
      '<user>'@'<localhost>' IDENTIFIED WITH auth_socket; The user can then login
      using: mysql -u <user> References: 1. https://dev.mysql.com/doc/mysql-secure-
      deployment-guide/8.4/en/secure- deployment-configure-
      authentication.html#secure-deployment-auth-socket
    references: >
      1. https://dev.mysql.com/doc/mysql-secure-deployment-guide/8.4/en/secure-
      deployment-configure-authentication.html#secure-deployment-auth-socket
    impact: >
      Things to consider when using the operating system to authenticate users: •
      The user must have an operating system account on the computer which must be
      accessed. • If a user has logged in using this method and steps away from the
      terminal, another user could easily log in because this user does not need any
      passwords or credentials. This could pose a serious security problem. • When
      an operating system is used to authenticate database users, managing
      distributed database environments and database links requires special care.
      Special care must also be taken not to leave such a terminal unlocked and
      unattended. Hence, we recommend that you carefully evaluate your requirements
      before opting for auth_socket. • This will not work where distributed
      connections are required.
    compliance_mappings:
      cis:
        - "CIS_MYSQL_8_4_enterprise_v1_0_0_2_13"
      nist_800_53: []
      soc2: []
      pci_dss: []
