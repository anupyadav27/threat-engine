  - rule_id: mysql.cis.6.all_events_are_audited
    title: "Ensure ALL Events are Audited"
    severity: medium
    category: database
    tech_type: mysql
    automation_type: automated
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "6.6"
    cis_section: "6"
    profile_applicability: "Level 2"
    description: >
      This filter defines all events to be written to the audit log.
    rationale: >
      This filter to log all, and binding to all, users must be set to ensure all
      event information is written to the audit log. Impact: Logging all events can
      result in very large audit files. In the case where the database is extremely
      active it may be more appropriate to be more selective when defining audit
      filters.
    audit_procedure: >
      Show all filters. SELECT * FROM mysql.audit_log_filter; Must return a filter
      name with a filter defined to log everything, for example:
      +---------+---------------------------+ | NAME | FILTER |
      +---------+---------------------------+ | log_all | {'filter': {'log': true}}
      | +---------+---------------------------+ Show users to filter binding. SELECT
      * FROM mysql.audit_log_user; Ensure the filter to log_all (name can vary) is
      applied to all users. +------+------+------------+ | USER | HOST | FILTERNAME
      | +------+------+------------+ | % | | log_all | +------+------+------------+
    remediation: >
      Create Log All Filter: SELECT audit_log_filter_set_filter('log_all', '{
      'filter': { 'log': true } }'); Apply to all logins: SELECT
      audit_log_filter_set_user('%', 'log_all'); References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/audit-log-filtering.html Additional
      Information: If an appropriate filter and binding of the filter to users is
      not in place then audit events related to all events won't be written to the
      audit log file.
    references: >
      1. https://dev.mysql.com/doc/refman/8.4/en/audit-log-filtering.html Additional
      Information: If an appropriate filter and binding of the filter to users is
      not in place then audit events related to all events won't be written to the
      audit log file.
    impact: >
      Logging all events can result in very large audit files. In the case where the
      database is extremely active it may be more appropriate to be more selective
