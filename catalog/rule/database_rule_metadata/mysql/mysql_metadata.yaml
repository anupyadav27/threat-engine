  - rule_id: mysql.cis.2.do_not_specify_passwords_in_the_command_line
    title: "Do Not Specify Passwords in the Command Line"
    severity: high
    category: database
    tech_type: mysql
    automation_type: manual
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "2.4"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      When a command is executed on the command line, for example mysql -u admin -p
      password or mysqlsh -u admin -p password, the password may be visible in the
      user's shell/command history or in the process list.
    rationale: >
      If the password is visible in the process list or user's shell/command
      history, an attacker will be able to access the MySQL database using the
      stolen credentials. Impact: Depending on the remediation chosen, additional
      steps may need to be undertaken like: • Entering a password when prompted. •
      Ensuring the file permissions on .my.cnf is restricted yet accessible by the
      user. • Using mysql_config_editor to encrypt the authentication credentials in
      .mylogin.cnf. • Use a pluggable secure password store, e.g., a keychain. • In
      the case of shell don't authenticate until mysqlsh is started, then use
      \connect Additionally, not all scripts/applications may be able to use
      .mylogin.cnf.
    audit_procedure: >
      Check the process or task list if the password is visible. Check the shell or
      command history if the password is visible.
    remediation: >
      MySQL Client: Use -p without password and then enter the password when
      prompted, use a properly secured .my.cnf file, or store authentication
      information in encrypted format in .mylogin.cnf. MySQL Shell: Use without
      password and then enter the password when prompted, store authentication
      information in encrypted format in .mylogin.cnf, enter shell then authenticate
      using \connect command ( Note: this also ensures the username is not exposed
      on the command), or use mysqlsh pluggable password store, e.g., a keychain.
      References: 1. https://dev.mysql.com/doc/refman/8.4/en/mysql-config-
      editor.html 2. https://dev.mysql.com/doc/refman/8.4/en/password-security-
      user.html 3. https://dev.mysql.com/doc/mysql-shell/8.4/en/mysql-shell-
      pluggable-password- store.html
    references: >
      1. https://dev.mysql.com/doc/refman/8.4/en/mysql-config-editor.html 2.
      https://dev.mysql.com/doc/refman/8.4/en/password-security-user.html 3.
      https://dev.mysql.com/doc/mysql-shell/8.4/en/mysql-shell-pluggable-password-
      store.html
    impact: >
      Depending on the remediation chosen, additional steps may need to be
      undertaken like: • Entering a password when prompted. • Ensuring the file
      permissions on .my.cnf is restricted yet accessible by the user. • Using
      mysql_config_editor to encrypt the authentication credentials in .mylogin.cnf.
      • Use a pluggable secure password store, e.g., a keychain. • In the case of
      shell don't authenticate until mysqlsh is started, then use \connect
      Additionally, not all scripts/applications may be able to use .mylogin.cnf.
    compliance_mappings:
      cis:
        - "CIS_MYSQL_8_4_enterprise_v1_0_0_2_4"
      nist_800_53: []
      soc2: []
      pci_dss: []
