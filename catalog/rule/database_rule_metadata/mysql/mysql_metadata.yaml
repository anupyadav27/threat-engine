  - rule_id: mysql.cis.3.relay_log_basename_files_have_appropriate
    title: "Ensure 'relay_log_basename' Files Have Appropriate Permissions"
    severity: high
    category: database
    tech_type: mysql
    automation_type: automated
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "3.5"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      MySQL can operate using a variety of log files, each used for different
      purposes. These are the binary log (which can be encrypted), error log, slow
      query log, relay log (which can be encrypted), general log, and in the
      enterprise edition, the audit log (which can be encrypted). Because these are
      files on the host operating system, they are subject to the permissions and
      ownership structure provided by the host and may be accessible by users other
      than the MySQL user. Additionally, using secure key management and at rest
      MySQL encryption can further protect data from OS users.
    rationale: >
      Limiting the accessibility of these objects will protect the confidentiality,
      integrity, and availability of the MySQL logs. Impact: If the permissions on
      the relay logs and binary log files are accidentally changed to exclude the
      user account which is used to run the MySQL service, then this might break
      replication. The binary log file can be used for point in time recovery so
      this can also affect backup, restore and disaster recovery procedures.
    audit_procedure: >
      Perform the following steps to assess this recommendation: 1. Execute the
      following SQL statement to determine the Value of relay_log_basename: show
      variables like 'relay_log_basename'; 2. Execute the following command at a
      terminal prompt to list non-compliant <relay_log_basename>.* file permissions:
      ls -l | egrep '^-(?![r|w]{2}-[r|w]{2}----
      .*mysql\s*mysql).*<relay_log_basename>.*$' Lack of output implies compliance.
    remediation: >
      Execute the following command for each log file location requiring corrected
      permissions and ownership: chmod 660 <log file> chown mysql:mysql <log file>
      Default Value: <datadir> + '/' + <hostname> + '-relay-bin'
