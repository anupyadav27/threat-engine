  - rule_id: mysql.cis.9.source_ssl_verify_server_cert_is_set_to_yes_or_1
    title: "Ensure 'SOURCE_SSL_VERIFY_SERVER_CERT' is Set to 'YES' or '1'"
    severity: high
    category: database
    tech_type: mysql
    automation_type: automated
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "9.2"
    cis_section: "9"
    profile_applicability: "Level 1"
    description: >
      In the MySQL REPLICA (SLAVE is deprecated as of 8.0.22) context the setting
      SOURCE_SSL_VERIFY_SERVER_CERT (MASTER_SSL_VERIFY_SERVER_CERT is deprecated as
      of 8.0.22) indicates whether the REPLICA should verify the SOURCE's
      certificate. This configuration item may be set to Yes or No, and unless SSL
      has been enabled on the REPLICA, the value will be ignored.
    rationale: >
      When SSL is in use certificate verification is important to authenticate the
      party to which a connection is being made. In this case, the REPLICA (client)
      should verify the SOURCE's (server's) certificate to authenticate the SOURCE
      prior to continuing the connection. Impact: When using CHANGE REPLICATION
      SOURCE TO, (CHANGE MASTER is deprecated as of 8.0.23) be aware of the
      following: • REPLICA processes need to be stopped prior to executing CHANGE
      SOURCE TO • Use of CHANGE REPLICATION SOURCE TO starts new relay logs without
      keeping the old ones unless explicitly told to keep them • When CHANGE
      REPLICATION SOURCE TO is invoked, some information is dumped to the error log
      (previous values for SOURCE_HOST, SOURCE_PORT, SOURCE_LOG_FILE, and
      SOURCE_LOG_POS) • Invoking CHANGE REPLICATION SOURCE TO will implicitly commit
      any ongoing transactions in the session where the CHANGE REPLICATION SOURCE
      was run, but not all ongoing transactions on the database.
    audit_procedure: >
      To assess this recommendation, issue the following statement: select
      ssl_verify_server_cert from mysql.slave_master_info; Verify the value of
      ssl_verify_server_cert is 1.
    remediation: >
      To remediate this setting, you must use the CHANGE SOURCE TO command. From
      8.0.23: STOP REPLICA; -- required if replication was already running CHANGE
      REPLICATION SOURCE TO SOURCE_SSL_VERIFY_SERVER_CERT=1; START REPLICA; --
      required if you want to restart replication Prior to 8.0.23: STOP SLAVE; --
      required if replication was already running CHANGE MASTER TO
      MASTER_SSL_VERIFY_SERVER_CERT=1; START SLAVE; -- required if you want to
      restart replication References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/change-replication-source-to.html 2.
      https://dev.mysql.com/doc/refman/8.4/en/change-master-to.html
    references: >
      1. https://dev.mysql.com/doc/refman/8.4/en/change-replication-source-to.html
      2. https://dev.mysql.com/doc/refman/8.4/en/change-master-to.html
    impact: >
      When using CHANGE REPLICATION SOURCE TO, (CHANGE MASTER is deprecated as of
      8.0.23) be aware of the following: • REPLICA processes need to be stopped
      prior to executing CHANGE SOURCE TO • Use of CHANGE REPLICATION SOURCE TO
      starts new relay logs without keeping the old ones unless explicitly told to
      keep them • When CHANGE REPLICATION SOURCE TO is invoked, some information is
      dumped to the error log (previous values for SOURCE_HOST, SOURCE_PORT,
      SOURCE_LOG_FILE, and SOURCE_LOG_POS) • Invoking CHANGE REPLICATION SOURCE TO
      will implicitly commit any ongoing transactions in the session where the
      CHANGE REPLICATION SOURCE was run, but not all ongoing transactions on the
      database.
    compliance_mappings:
      cis:
        - "CIS_MYSQL_8_4_enterprise_v1_0_0_9_2"
