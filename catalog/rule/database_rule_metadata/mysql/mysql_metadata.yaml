  - rule_id: mysql.cis.4.harden_usage_for_local_infile_on_mysql_clients
    title: "Harden Usage for 'local_infile' on MySQL Clients"
    severity: high
    category: database
    tech_type: mysql
    automation_type: automated
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "4.4"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      The local_infile parameter dictates whether files located on the MySQL
      client's computer can be loaded or selected via LOAD DATA INFILE or SELECT
      local_file.
    rationale: >
      For MySQL client programs and connectors prior to 8.0.21, disabling
      local_infile reduces an attacker's ability to read sensitive files off the
      affected server via an SQL injection vulnerability. Impact: Disabling
      local_infile will impact the functionality of solutions that rely on it.
    audit_procedure: >
      Check the version of MySQL clients and connectors. For example: $ mysqlsh
      --version $ mysql --version The version should be 8.0.21 or higher. For
      connectors inspect the library in use. Most connectors provide functions which
      return version information. For C - libmysqlclient has: const char
      *mysql_get_client_info(void) If clients have not been upgraded to 8.0.21 check
      the value of local_infile. Execute the following SQL statement: SHOW VARIABLES
      WHERE Variable_name = 'local_infile'; If clients are older than 8.0.21 or if
      local_infile is not in use, ensure the value returned is 0.
    remediation: >
      Upgrade all MySQL clients and connectors to 8.0.21 or higher. In the case
      where using local_infile is needed, the following changes further harden
      security: On client side, secure by: Limiting the location from where data can
      be read using --load-data-local-dir. mysql --local-infile=0 --load-data-local-
      dir=/my/local/data Adding TLS connection to assure server identity by
      requiring verification. mysql --local-infile=0 --load-data-local-
      dir=/my/local/data --ssl- mode=VERIFY_IDENTITY If local_infile is not in use
      or if clients are not upgraded - add the following line to the [mysqld]
      section of the MySQL configuration file and restart the MySQL service: local-
      infile=0 Default Value: 0 (OFF) References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/string-functions.html#function_load-
      file 2. https://dev.mysql.com/doc/refman/8.4/en/load-data.html
    references: >
      1. https://dev.mysql.com/doc/refman/8.4/en/string-
      functions.html#function_load-file 2.
      https://dev.mysql.com/doc/refman/8.4/en/load-data.html
    impact: >
      Disabling local_infile will impact the functionality of solutions that rely on
      it.
