  - rule_id: mysql.cis.4.symbolic_links_are_disabled
    title: "Ensure Symbolic Links are Disabled"
    severity: high
    category: database
    tech_type: mysql
    automation_type: automated
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "4.6"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      The symbolic-links and skip-symbolic-links options for MySQL determine whether
      symbolic link support is available. When use of symbolic links is enabled,
      they have different effects depending on the host platform. When symbolic
      links are disabled, then symbolic links stored in files or entries in tables
      are not used by the database.
    rationale: >
      Prevents symbolic links from being used for database files. This is especially
      important when MySQL is executing as root as arbitrary files may be
      overwritten. The symbolic- links option might allow someone to direct actions
      by the MySQL server to other files and/or directories.
    audit_procedure: >
      Execute the following SQL statement to assess this recommendation: SHOW
      variables LIKE 'have_symlink'; Ensure the Value returned is DISABLED.
    remediation: >
      Perform the following actions to remediate this setting: • Open the MySQL
      configuration file (my.cnf) • Locate skip-symbolic-links in the configuration
      • Set the skip-symbolic-links to YES Note: If skip-symbolic-links does not
      exist, add it to the configuration file in the mysqld section. References: 1.
      http://dev.mysql.com/doc/refman/8.4/en/symbolic-links.html 2.
      http://dev.mysql.com/doc/refman/8.4/en/server-
      options.html#option_mysqld_symbolic-links
    references: >
      1. http://dev.mysql.com/doc/refman/8.4/en/symbolic-links.html 2.
      http://dev.mysql.com/doc/refman/8.4/en/server-
      options.html#option_mysqld_symbolic-links
