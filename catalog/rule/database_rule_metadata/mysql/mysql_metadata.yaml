  - rule_id: mysql.cis.7.set_default_password_lifetime_to_require_a_yearly
    title: "Set 'default_password_lifetime' to Require a Yearly Password Change"
    severity: high
    category: database
    tech_type: mysql
    automation_type: automated
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "7.4"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      Password expiry provides passwords with a time bounded lifetime.
    rationale: >
      The default_password_lifetime global variable prevents a password being set
      for an indefinite period. Excessive password expiration requirements do more
      harm than good, because these requirements make users select predictable
      passwords, composed of sequential words and numbers that are closely related
      to each other. More importantly, when events occur that could compromise
      password security account passwords should be expired immediately. Impact:
      Scripted clients or users dependent on automated login in a controlled
      environment will need to consider their authentication procedures. The server
      will accept the user but the user is placed in restricted mode. In restricted
      mode, operations performed within the session result in an error until the
      user establishes a new account password.
    audit_procedure: >
      Execute the following SQL statements to assess this recommendation: SHOW
      VARIABLES LIKE 'default_password_lifetime'; The result should not be 0 and
      less than or equal to 365.
    remediation: >
      To remediate this recommendation, execute the following command: SET GLOBAL
      default_password_lifetime=365; Default Value: 360 References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/password-management.html 2.
      https://dev.mysql.com/doc/refman/8.4/en/expired-password-handling.html
    references: >
      1. https://dev.mysql.com/doc/refman/8.4/en/password-management.html 2.
      https://dev.mysql.com/doc/refman/8.4/en/expired-password-handling.html
    impact: >
      Scripted clients or users dependent on automated login in a controlled
      environment will need to consider their authentication procedures. The server
      will accept the user but the user is placed in restricted mode. In restricted
      mode, operations performed within the session result in an error until the
      user establishes a new account password.
