  - rule_id: mysql.cis.5.dml_ddl_grants_are_limited_to_specific_databases
    title: "Ensure DML/DDL Grants are Limited to Specific Databases and Users"
    severity: high
    category: database
    tech_type: mysql
    automation_type: manual
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "5.9"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      DML/DDL includes the set of privileges used to modify or create data
      structures. This includes INSERT, SELECT, UPDATE, DELETE, DROP, CREATE, and
      ALTER privileges.
    rationale: >
      INSERT, SELECT, UPDATE, DELETE, DROP, CREATE, and ALTER are powerful
      privileges in any database. Such privileges should be limited only to those
      users requiring such rights. By limiting the users with these rights and
      ensuring that they are limited to specific databases, the attack surface of
      the database is reduced.
    audit_procedure: >
      Execute the following SQL statement to audit this setting: SELECT User,Host,Db
      FROM mysql.db WHERE Select_priv='Y' OR Insert_priv='Y' OR Update_priv='Y' OR
      Delete_priv='Y' OR Create_priv='Y' OR Drop_priv='Y' OR Alter_priv='Y'; Ensure
      all users returned are permitted to have these privileges on the indicated
      databases.
    remediation: >
      Perform the following steps to remediate this setting: 1. Enumerate the
      unauthorized users, hosts, and databases returned in the result set of the
      audit procedure 2. For each user, issue the following SQL statement (replace
      <user> with the unauthorized user, <host> with host name, and <database> with
      the database name): REVOKE SELECT ON <host>.<database> FROM <user>; REVOKE
      INSERT ON <host>.<database> FROM <user>; REVOKE UPDATE ON <host>.<database>
      FROM <user>; REVOKE DELETE ON <host>.<database> FROM <user>; REVOKE CREATE ON
      <host>.<database> FROM <user>; REVOKE DROP ON <host>.<database> FROM <user>;
      REVOKE ALTER ON <host>.<database> FROM <user>;
