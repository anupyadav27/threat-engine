      file (my.cnf) 2. Ensure the following line is found in the mysqld section
      audit_log = 'FORCE_PLUS_PERMANENT' Default Value: ON References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/audit-log-
      reference.html#option_mysqld_audit-log
