  - rule_id: mysql.cis.1.interactive_login_is_disabled
    title: "Ensure Interactive Login is Disabled"
    severity: medium
    category: database
    tech_type: mysql
    automation_type: automated
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "1.5"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      When created, the MySQL user may have interactive access to the operating
      system, which means that the MySQL user could login to the host as any other
      user would.
    rationale: >
      Preventing the MySQL user from logging in interactively may reduce the impact
      of a compromised MySQL account. There is also more accountability, as
      accessing the operating system where the MySQL server lies will require the
      user's own account. Interactive access by the MySQL user is unnecessary and
      should be disabled. Impact: This setting will prevent the MySQL administrator
      from interactively logging into the operating system using the MySQL user.
      Instead, the administrator will need to log in using one's own account.
    audit_procedure: >
      Execute the following command to assess this recommendation: getent passwd
      mysql | egrep '^.*[\/bin\/false|\/sbin\/nologin]$' Lack of output implies a
      fail.
    remediation: >
      Execute one of the following commands in a terminal: usermod -s /bin/false
      mysql Or usermod -s /sbin/nologin mysql
    references: >
      
    impact: >
      This setting will prevent the MySQL administrator from interactively logging
      into the operating system using the MySQL user. Instead, the administrator
      will need to log in using one's own account.
    compliance_mappings:
      cis:
        - "CIS_MYSQL_8_4_enterprise_v1_0_0_1_5"
