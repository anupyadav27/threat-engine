  - rule_id: mysql.cis.2.use_dual_passwords_to_enable_higher_frequency
    title: "Use Dual Passwords to Enable Higher Frequency Password Rotation"
    severity: medium
    category: database
    tech_type: mysql
    automation_type: manual
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "2.10"
    cis_section: "2"
    profile_applicability: "Level 2"
    description: >
      Dual passwords act as a tool to encourage password rotations in cases where a
      synchronized password change is not viable. By having a time delta to have old
      and new passwords in place, the process of replacing old passwords with new
      passwords within applications is simplified.
    rationale: >
      Too often passwords used by applications are not changed regularly because of
      the difficulty in timing for propagating the new password, keeping the
      applications connected, and connection failures due to race conditions. If it
      is difficult to perform a synchronized change you can optionally use dual
      passwords to simplify the task of password rotation. Impact: If the original
      password isn't removed upon completion of the password rotation process, the
      potential risk for a compromise is increased.
    audit_procedure: >
      To determine which users currently have dual passwords, run the following
      command: SELECT user, host FROM mysql.user WHERE length(user_attributes-
      >'$.additional_password')>0; If an account has a dual password and the process
      of password rotation has completed, this is a fail.
    remediation: >
      To set dual passwords execute the following ALTER command: ALTER USER
      '<user>'@'<hostname>' IDENTIFIED BY '<new_password>' RETAIN CURRENT PASSWORD;
      Once the new password has been distributed DISCARD the old password using
      ALTER: ALTER USER '<user>'@'<hostname>' DISCARD OLD PASSWORD; References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/password-management.html#dual-
      passwords Additional Information: You may wish to first assess the state of
      passwords on your MySQL Server. Password expiration is based on the policy set
      by the default_password_lifetime or by explicit settings on a per account
      basis. To assess when passwords were last changed on accounts and when, or if,
      they will expire run the following select user, host, password_last_changed,
      IF(IFNULL(password_lifetime, CAST(@@default_password_lifetime as
      signed))<1,'NEVER', concat( cast( IFNULL(password_lifetime,
      @@default_password_lifetime) as signed) + cast(datediff(password_last_changed,
      now()) as signed), ' days')) as days_till_expires from mysql.user;
      Applications will fail to authenticate when days_till_expires reaches 0. If
      NEVER returns for an account and the password has not be rotated in a long
      period of time it is recommended that action be taken to set a new password.
    references: >
      1. https://dev.mysql.com/doc/refman/8.4/en/password-management.html#dual-
      passwords Additional Information: You may wish to first assess the state of
      passwords on your MySQL Server. Password expiration is based on the policy set
      by the default_password_lifetime or by explicit settings on a per account
      basis. To assess when passwords were last changed on accounts and when, or if,
      they will expire run the following select user, host, password_last_changed,
      IF(IFNULL(password_lifetime, CAST(@@default_password_lifetime as
      signed))<1,'NEVER', concat( cast( IFNULL(password_lifetime,
      @@default_password_lifetime) as signed) + cast(datediff(password_last_changed,
      now()) as signed), ' days')) as days_till_expires from mysql.user;
      Applications will fail to authenticate when days_till_expires reaches 0. If
      NEVER returns for an account and the password has not be rotated in a long
      period of time it is recommended that action be taken to set a new password.
    impact: >
      If the original password isn't removed upon completion of the password
      rotation process, the potential risk for a compromise is increased.
    compliance_mappings:
      cis:
        - "CIS_MYSQL_8_4_enterprise_v1_0_0_2_10"
      nist_800_53: []
      soc2: []
      pci_dss: []
