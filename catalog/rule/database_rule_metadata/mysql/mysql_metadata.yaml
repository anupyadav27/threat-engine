  - rule_id: mysql.cis.6.audit_filters_capture_connection_attempts
    title: "Ensure Audit Filters Capture Connection Attempts"
    severity: high
    category: database
    tech_type: mysql
    automation_type: manual
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "6.5"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      The functions audit_log_filter_set_filter() and audit_log_filter_set_user()
      are used to define rules for auditing. With this feature you can easily audit
      successful and/or failed connection events and write to the audit log file.
    rationale: >
      The audit_log_filter_set_filter function which defines auditing filters. The
      users for which filter(s) apply is defined by audit_log_filter_set_user. One
      or more filters can be created to log connections success and/or failure.
      Impact: If the audit rule and application of the rule to targeted or all users
      is not properly configured, it will not log failed connections, successful
      connections or any other connection related events.
    audit_procedure: >
      To assess this recommendation, execute the following SQL statements: Evaluate
      the filters: SELECT * FROM mysql.audit_log_filter; and to which accounts the
      filters are assigned: SELECT * FROM mysql.audit_log_user; Determine whether
      the filters and users assigned to filter meet your security, business, and
      regulatory requirements. If they do not, this is a fail. Test your filters by
      attempting successful and failed connections or other events that should be
      captured in the audit trail and review the audit log to confirm those events
      were captured. For example: Successful Connections will have json fields:
      'class': 'connection', 'event': 'connect' Failed Connections will have a
      failed status value - 'status': 1045 { 'timestamp': '2020-03-19 20:13:40',
      'id': 0, 'class': 'connection', 'event': 'connect', 'connection_id': 30,
      'account': { 'user': '', 'host': 'localhost' }, 'login': { 'user':
      'app_developer', 'os': '', 'ip': '127.0.0.1', 'proxy': '' },
      'connection_data': { 'connection_type': 'ssl', 'status': 1045, 'db': '' } }
      Successful Connections will show a successful status value - 'status': 0 {
      'timestamp': '2020-03-19 21:04:13', 'id': 1, 'class': 'connection', 'event':
      'connect', 'connection_id': 38, 'account': { 'user': 'newuser', 'host':
      'localhost' }, 'login': { 'user': 'newuser', 'os': '', 'ip': '127.0.0.1',
      'proxy': '' }, 'connection_data': { 'connection_type': 'ssl', 'status': 0,
      'db': '', 'connection_attributes': { '_pid': '4971', '_os': 'macos10.14',
      '_platform': 'x86_64', '_client_version': '8.0.18', '_client_name':
      'libmysql', 'program_name': 'MySQLWorkbench' } } },
    remediation: >
      To remediate this configuration setting, execute one of the following SQL
      statements: Log All connections – Successful and Failed: SET @f = '{ 'filter':
      { 'class': { 'name': 'connection' } } }'; SELECT
      audit_log_filter_set_filter('log__all_conn_events', @f); SELECT
      audit_log_filter_set_user('%', 'log_all_conn_events'); Or Log Only Failed
      Connections: SET @f=' { 'filter': { 'log': false, 'class': { 'name':
      'connection', 'event': [ { 'name': 'connect', 'log' : { 'not': { 'field': {
      'name': 'status', 'value': 0 } } } }, { 'name': 'disconnect', 'log': false } ]
      } } }'; select @f; SELECT audit_log_filter_set_filter('log_conn_events', @f);
      SELECT audit_log_filter_set_user('%', 'log_conn_events'); Default Value: The
      default value for audit_log_connection_policy is ALL. References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/audit-log-filtering.html 2.
      https://dev.mysql.com/doc/refman/8.4/en/audit-log.html Additional Information:
      Prior legacy modes of defining audit filters, although simple to use, were not
      specific enough to define precise auditing rules - and thus required too much
      storage - resulting in 'over' auditing. Additionally MySQL audit filters can
      not only log events but act as firewall rules by using an abort() definition
      in a filter. See: https://dev.mysql.com/doc/refman/8.4/en/audit-log-legacy-
      filtering.html
    references: >
      1. https://dev.mysql.com/doc/refman/8.4/en/audit-log-filtering.html 2.
      https://dev.mysql.com/doc/refman/8.4/en/audit-log.html Additional Information:
      Prior legacy modes of defining audit filters, although simple to use, were not
      specific enough to define precise auditing rules - and thus required too much
      storage - resulting in 'over' auditing. Additionally MySQL audit filters can
      not only log events but act as firewall rules by using an abort() definition
      in a filter. See: https://dev.mysql.com/doc/refman/8.4/en/audit-log-legacy-
      filtering.html
    impact: >
      If the audit rule and application of the rule to targeted or all users is not
      properly configured, it will not log failed connections, successful
      connections or any other connection related events.
    compliance_mappings:
      cis:
        - "CIS_MYSQL_8_4_enterprise_v1_0_0_6_5"
      nist_800_53: []
      soc2: []
      pci_dss: []
