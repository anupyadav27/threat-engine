  - rule_id: mysql.cis.3.datadir_has_appropriate_permissions
    title: "Ensure 'datadir' Has Appropriate Permissions"
    severity: high
    category: database
    tech_type: mysql
    automation_type: automated
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "3.1"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The data directory is the location of the MySQL databases.
    rationale: >
      Limiting the accessibility of these objects will protect the confidentiality,
      integrity, and availability of the MySQL database. If someone other than the
      MySQL user is allowed to read files from the data directory, it may be
      possible to read data from the mysql.user table which contains passwords.
      Additionally, the ability to create files can lead to denial of service, or
      might otherwise allow someone to gain access to specific data by manually
      creating a file with a view definition.
    audit_procedure: >
      Perform the following steps to assess this recommendation: • Execute the
      following SQL statement to determine the Value of datadir show variables where
      variable_name = 'datadir'; Or SELECT VARIABLE_NAME, VARIABLE_VALUE FROM
      performance_schema.global_variables WHERE VARIABLE_NAME LIKE 'datadir'; •
      Execute the following command at a terminal prompt sudo ls -ld <datadir> |
      grep 'drwxr-x---.*mysql.*mysql' Lack of output implies a fail.
    remediation: >
      Execute the following commands at a terminal prompt: chmod 750 <datadir> chown
      mysql:mysql <datadir> References: 1. https://dev.mysql.com/doc/mysql-secure-
      deployment-guide/8.4/en/secure- deployment-permissions.html
    references: >
      1. https://dev.mysql.com/doc/mysql-secure-deployment-guide/8.4/en/secure-
      deployment-permissions.html
