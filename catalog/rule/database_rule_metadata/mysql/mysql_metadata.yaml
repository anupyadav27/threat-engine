  - rule_id: mysql.cis.8.ssl_type_is_set_to_any_x509_or_specified_for_all
    title: "Ensure 'ssl_type' is Set to 'ANY', 'X509', or 'SPECIFIED' for All Remote Users"
    severity: high
    category: database
    tech_type: mysql
    automation_type: automated
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "8.2"
    cis_section: "8"
    profile_applicability: "Level 1"
    description: >
      All network traffic must use SSL/TLS when traveling over untrusted networks.
      SSL/TLS should be enforced on a per-user basis for users which enter the
      system through the network.
    rationale: >
      The SSL/TLS-protected MySQL protocol helps to prevent eavesdropping and man-
      in- the-middle attacks. Impact: When SSL/TLS is enforced then clients which do
      not use SSL will not be able to connect. If the server is not configured for
      SSL/TLS then accounts for which SSL/TLS is mandatory will not be able to
      connect.
    audit_procedure: >
      Execute the following SQL statements to assess this recommendation: SELECT
      user, host, ssl_type FROM mysql.user WHERE NOT HOST IN ('::1', '127.0.0.1',
      'localhost'); Ensure the ssl_type for each user returned is equal to X509, or
      SPECIFIED. Note: ANY means the connection must be using TLS and could
      optionally provide a client-side certificate.
    remediation: >
      Use the ALTER USER statement to require the use of SSL: ALTER USER
      'my_user'@'app1.example.com' REQUIRE X509; Note: REQUIRE SSL only enforces
      SSL. There are additional options REQUIRE ISSUER, REQUIRE SUBJECT which can be
      used to further restrict the connection. Default Value: On the server-side SSL
      is ON by default --ssl (permits but does not require secure connections) and
      require_secure_transport is OFF (turning ON allows only secure connections)
      References: 1. https://dev.mysql.com/doc/refman/8.4/en/using-encrypted-
      connections.html 2. https://dev.mysql.com/doc/refman/8.4/en/alter-
      user.html#alter-user-tls 3.
      https://dev.mysql.com/doc/refman/8.4/en/connection-
      options.html#option_general_ssl
    references: >
      1. https://dev.mysql.com/doc/refman/8.4/en/using-encrypted-connections.html 2.
      https://dev.mysql.com/doc/refman/8.4/en/alter-user.html#alter-user-tls 3.
      https://dev.mysql.com/doc/refman/8.4/en/connection-
      options.html#option_general_ssl
    impact: >
      When SSL/TLS is enforced then clients which do not use SSL will not be able to
      connect. If the server is not configured for SSL/TLS then accounts for which
      SSL/TLS is mandatory will not be able to connect.
