  - rule_id: mysql.cis.10.allowlist_approved_servers_belonging_to_a_mysql
    title: "Allowlist Approved Servers Belonging to a MySQL InnoDB Cluster"
    severity: medium
    category: database
    tech_type: mysql
    automation_type: manual
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "10.2"
    cis_section: "10"
    profile_applicability: "Level 2"
    description: >
      Optionally, specify an allowlist of approved servers that belong to the MySQL
      InnoDB Cluster.
    rationale: >
      When using MySQL InnoDB Cluster by specifying the allowlist explicitly, you
      can increase the security of your cluster as only servers in the allowlist are
      allowed to connect to the cluster.
    audit_procedure: >
      Open MySQL Shell and execute the following command to crate the allowlist of
      servers. This list is comma separated list, surrounded by quotes. For example:
      • From 8.0.22 on: select @@group_replication_ip_allowlist • Prior to 8.0.22:
      select @@group_replication_ip_whitelist; The result set from the above
      statement should be the IPv4, IPv6, or host names allowed to join the MySQL
      InnoDB Cluster (Group).
    remediation: >
      Example - to configure a cluster to only accept connections from servers at
      addresses 203.0.113.0/24 and 198.51.100.110. The whitelist can also include
      host names, which are resolved only when a connection request is made by
      another server. • From 8.0.22: mysql-js>
      cluster.addInstance('icadmin@ic-3:3306', {ipAllowlist: '203.0.113.0/24,
      198.51.100.110'}) • Prior to 8.0.22: mysql-js>
      cluster.addInstance('icadmin@ic-3:3306', {ipWhitelist: '203.0.113.0/24,
      198.51.100.110'}) References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/mysql-innodb-cluster-working-with-
      cluster.html#mysql-innodb-cluster-securing 2.
      https://dev.mysql.com/doc/refman/8.4/en/group-replication-ip-address-
      permissions.html
    references: >
      1. https://dev.mysql.com/doc/refman/8.4/en/mysql-innodb-cluster-working-with-
      cluster.html#mysql-innodb-cluster-securing 2.
      https://dev.mysql.com/doc/refman/8.4/en/group-replication-ip-address-
      permissions.html
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_MYSQL_8_4_enterprise_v1_0_0_10_2"
      nist_800_53: []
      soc2: []
