      administrative user): REVOKE CREATE USER ON *.* FROM '<user>'; References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/privileges-provided.html#priv_create-
      user 2. https://dev.mysql.com/doc/refman/8.4/en/privileges-
