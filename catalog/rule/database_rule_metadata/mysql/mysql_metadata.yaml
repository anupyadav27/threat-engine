  - rule_id: mysql.cis.2.dedicate_the_machine_running_mysql
    title: "Dedicate the Machine Running MySQL"
    severity: high
    category: database
    tech_type: mysql
    automation_type: manual
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "2.3"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      It is recommended that MySQL Server software be installed on a dedicated
      server. This architectural consideration affords flexibility in that the
      database server can be placed on a separate zone allowing access only from
      particular hosts and over particular protocols.
    rationale: >
      The attack surface is reduced on a server with only the underlying operating
      system, MySQL server software, and any security or operational tooling that
      may be additionally installed. A smaller attack surface reduces the
      probability of the data within MySQL being compromised. Impact: Care must be
      taken that applications or services that are required for proper operation of
      the operating system are not removed. Custom applications may need to be
      modified to accommodate database connections over the network rather than on
      the use (e.g., using TCP/IP connections). Additional hardware and operating
      system licenses may be required to make the architectural change.
    audit_procedure: >
      Verify there are no other roles enabled for the underlying operating system
      and that no additional applications or services unrelated to the proper
      operation of the MySQL server software are installed.
    remediation: >
      Remove excess applications or services and/or remove unnecessary roles from
      the underlying operating system.
    references: >
      
    impact: >
