  - rule_id: mysql.cis.2.point_in_time_recovery
    title: "Point-in-Time Recovery"
    severity: medium
    category: database
    tech_type: mysql
    automation_type: automated
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "2.1.5"
    cis_section: "2"
    profile_applicability: "Level 2"
    description: >
      With binlogs it is possible to implement point-in-time recovery. This makes it
      possible to restore the changes between the last full backup and the point-in-
      time. Enabling binlogs is not sufficient. The binlogs need to be backed up to
      separate media. The restore procedure should be created and tested. The data
      in the binlog files may contain sensitive information which needs be stored in
      the proper location with restrictive permissions and may require encryption.
    rationale: >
      Using binlogs can reduce the amount of information lost when recovering from a
      backup. Impact: Binlogs can grow quite large and take up a large amount of
      space so auto remove needs to be put into place.
    audit_procedure: >
      Check if binlogs are enabled and if there is a restore procedure. Check to see
      if -- binlog-expire-logs-second is set. SELECT VARIABLE_NAME, VARIABLE_VALUE,
      'BINLOG - Log Expiration' as Note FROM performance_schema.global_variables
      where variable_name = 'binlog_expire_logs_seconds'; Ensure this value is not
      set to 0. Note: Consider implementing MySQL Enterprise Backup which includes
      support for at rest encryption of any MySQL Encrypted data files including the
      binary and relay log files.
    remediation: >
      Enable binlogs, then create and test a restore procedure. Default Value: The
      default for binlog-expire-logs-seconds is 2592000 seconds, or 30 days.
      References: 1. https://dev.mysql.com/doc/refman/8.4/en/replication-options-
      binary- log.html#sysvar_binlog_expire_logs_seconds 2.
      https://dev.mysql.com/doc/refman/8.4/en/point-in-time-recovery-binlog.html
    references: >
      1. https://dev.mysql.com/doc/refman/8.4/en/replication-options-binary-
      log.html#sysvar_binlog_expire_logs_seconds 2.
      https://dev.mysql.com/doc/refman/8.4/en/point-in-time-recovery-binlog.html
    impact: >
      Binlogs can grow quite large and take up a large amount of space so auto
      remove needs to be put into place.
    compliance_mappings:
      cis:
        - "CIS_MYSQL_8_4_enterprise_v1_0_0_2_1_5"
