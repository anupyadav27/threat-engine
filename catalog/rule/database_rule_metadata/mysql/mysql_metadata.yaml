    cis_control: "6.2"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      MySQL log files can be set in the MySQL configuration to exist anywhere on the
      filesystem. It is common practice to ensure that the system filesystem is left
      uncluttered by application logs. System filesystems include the root (/),
      /var, or /usr.
    rationale: >
      Moving the MySQL logs off the system partition will reduce the probability of
      denial of service via the exhaustion of available disk space to the operating
      system.
    audit_procedure: >
      Execute the following SQL statement to assess this recommendation: SELECT
      @@global.log_bin_basename; Ensure the value returned does not indicate root
      (/), /var, or /usr.
    remediation: >
      Perform the following actions to remediate this setting: 1. Open the MySQL
      configuration file (my.cnf) 2. Locate the log-bin entry and set it to a file
      not on root (/), /var, or /usr References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/binary-log.html 2.
      https://dev.mysql.com/doc/refman/8.4/en/replication-options-binary-log.html
    references: >
