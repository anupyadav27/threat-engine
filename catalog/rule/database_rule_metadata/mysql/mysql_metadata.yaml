  - rule_id: mysql.cis.2.require_current_password_for_password_reset
    title: "Require Current Password for Password Reset"
    severity: medium
    category: database
    tech_type: mysql
    automation_type: automated
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "2.9"
    cis_section: "2"
    profile_applicability: "Level 2"
    description: >
      Require the current password for password reset.
    rationale: >
      Requiring a prior password for password reset enables DBAs to prevent users
      from changing a password without proving that they know the current password.
      Such changes could otherwise occur, for example, if one user walks away from a
      terminal session temporarily without logging out, and a malicious user uses
      the session to change the original user's MySQL password. This can have
      unfortunate consequences; the most problematic being the malicious user can
      access MySQL with the user's changed credentials.
    audit_procedure: >
      Run the following statement: SELECT VARIABLE_NAME, VARIABLE_VALUE FROM
      performance_schema.global_variables where VARIABLE_NAME in
      ('password_require_current'); The return value should be ON.
    remediation: >
      Set the value to ON SET PERSIST password_require_current=ON; Default Value:
      The password_require_current is OFF by default. References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/server-system-
      variables.html#sysvar_password_require_current
    references: >
      1. https://dev.mysql.com/doc/refman/8.4/en/server-system-
