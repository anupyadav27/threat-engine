  - rule_id: mysql.cis.2.the_backups_should_be_properly_secured
    title: "The Backups Should be Properly Secured"
    severity: high
    category: database
    tech_type: mysql
    automation_type: manual
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "2.1.4"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The backup files will contain all data in the databases. Filesystem
      permissions and/or encryption should be used to prevent unauthorized users
      from gaining access to the backups.
    rationale: >
      Backups should be considered sensitive information. If an unauthorized user
      can access backups, then they have access to all data in the database. This is
      true for unencrypted backups and for encrypted backups if the encryption key
      is stored along with the backup.
    audit_procedure: >
      Check who has access to the backup files. • Are the files world-readable
      (e.g., rw-r--r-) o Are they stored in a world readable directory? • Is the
      group MySQL and/or backup specific? o If not: the file and directory must not
      be group readable • Are the backups stored offsite? o Who has access to the
      backups? • Are the backups encrypted? o Where is the encryption key stored? o
      Does the encryption key consist of a guessable password? If you are running
      the MySQL Enterprise Backup verify that the backup uses -- encrypt. For
      example: $ mysqlbackup --defaults-file=/home/dbadmin/my.cnf --backup-
      image=/home/admin/backups/my.mbi \ --backup-dir=/home/admin/backup-tmp
      --encrypt-password backup-to-image If --encrypt-password is not included the
      backup is not encrypted and this is a fail. Mysqlbackup includes encryption,
      secure backup of keys, and support for secured archival storage.
    remediation: >
      Implement encryption, properly restrict filesystem permissions, protect and
      backup encryption keys. For example, if you run MySQL Enterprise Backup
      include --encrypt-password $ mysqlbackup --defaults-file=/home/dbadmin/my.cnf
      --backup- image=/home/admin/backups/my.mbi \ --backup-dir=/home/admin/backup-
      tmp --encrypt-password backup-to-image Mysqlbackup includes not just the
      database data, but also provides for secure backup of keys, and support for
      secured archival storage. References: 1. https://dev.mysql.com/doc/mysql-
      enterprise-backup/8.4/en/meb-encrypted- innodb.html
    references: >
      1. https://dev.mysql.com/doc/mysql-enterprise-backup/8.4/en/meb-encrypted-
      innodb.html
