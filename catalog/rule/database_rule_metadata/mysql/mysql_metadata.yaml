  - rule_id: mysql.cis.2.fips_140_2_openssl_cryptography_is_used
    title: "Ensure FIPS 140-2 OpenSSL Cryptography Is Used"
    severity: high
    category: database
    tech_type: mysql
    automation_type: manual
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "2.19"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Install, configure, and use OpenSSL on a platform that has a NIST certified
      FIPS 140-2 installation of OpenSSL. This provides MySQL instances the ability
      to generate and validate cryptographic hashes to protect unclassified
      information requiring confidentiality and cryptographic protection, in
      accordance with the data owner's requirements.
    rationale: >
      Federal Information Processing Standards 140-2 (FIPS 140-2) describes a
      security standard that can be required by Federal (US Government) agencies for
      cryptographic modules used to protect sensitive or valuable information. To be
      considered acceptable for such Federal use, a cryptographic module must be
      certified for FIPS 140-2. If a system intended to protect sensitive data lacks
      the proper FIPS 140-2 certificate, Federal agencies cannot purchase it.
      Products such as OpenSSL can be used in FIPS mode, although the OpenSSL
      library itself is not validated for FIPS. Instead, the OpenSSL library is used
      with the OpenSSL FIPS Object Module to enable OpenSSL-based applications to
      operate in FIPS mode. For general information about FIPS and its
      implementation in OpenSSL, these references may be helpful: • National
      Institute of Standards and Technology FIPS PUB 140-2 • OpenSSL FIPS 140-2
      Security Policy • fips_module manual page
    audit_procedure: >
      For MySQL to support FIPS mode, these system requirements must be satisfied:
      1. MySQL must be compiled with an OpenSSL version that is certified for use
      with FIPS. Currently OpenSSL 3.0 is certified, but OpenSSL 1.1.1 is not.
      Binary distributions for recent versions of MySQL are compiled using OpenSSL
      3.0 on some platforms, which means they are not certified for FIPS. This means
      you have the following options, depending on system and MySQL configuration: o
      Use a system that has OpenSSL 3.0 and the required FIPS object module. In this
      case, you can enable FIPS mode for MySQL if you use a binary distribution
      compiled using OpenSSL 3.0, or compile MySQL from source using OpenSSL 3.0.
      For general information about upgrading to OpenSSL 3.0, see OpenSSL 3.0
      Migration Guide o Use a system that has OpenSSL 1.1.1 or higher. In this case,
      you can install MySQL using binary packages, and you can use the TLS v1.3
      protocol and ciphersuites, in addition to other already supported TLS
      protocols. However, you cannot enable FIPS mode for MySQL. o Use a system that
      has OpenSSL 1.0.2 and the required FIPS Object Module. In this case, you can
      enable FIPS mode for MySQL if you use a binary distribution compiled using
      OpenSSL 1.0.2, or compile MySQL from source using OpenSSL 1.0.2. In this case,
      you cannot use the TLS v1.3 protocol or ciphersuites, which require OpenSSL
      1.1.1 or 3.0. In addition, you should be aware that OpenSSL 1.0.2 reached end
      of life status in 2019, and that all operating platforms embedding OpenSSL
      1.1.1 reach their end of life in 2024. 2. At runtime, the OpenSSL library and
      OpenSSL FIPS Object Module must be available as shared (dynamically linked)
      objects. If FIPS mode is required, it is recommended to use an operating
      platforms that includes it; if it does, you can (and should) use it. If your
      platform does not include FIPS, you have two options: • Migrate to a platform
      which has FIPS OpenSSL support. • Build the OpenSSL library and FIPS object
      module from source, using the instructions from the fips_module manpage see
      FIPS Overview. To determine whether MySQL is running on a system with FIPS
      mode enabled, check the value of the ssl_fips_mode server system variable
      using an SQL statement such as SHOW VARIABLES LIKE '%fips%' or SELECT
      @@ssl_fips_mode If the value of this variable is 1 (ON) or 2 (STRICT), FIPS
      mode is enabled for OpenSSL; if it is 0 (OFF), FIPS mode is not available.
      Additionally you can also check the Operating system to see that FIPS mode is
      enabled. For example on Oracle Linux 9 to verify that FIPS mode is enabled,
      run the following command after Oracle Linux 9 has been installed: As the
      system administrator: 1. Run the following to see if FIPS is enabled: fips-
      mode-setup --check If FIPS mode is enabled is not displayed, then the system
      is not FIPS enabled and this is a fail. 2. Run the following (your results and
      version may vary): # openssl version OpenSSL 3.0.7 1 Nov 2022 (Library:
      OpenSSL 3.0.7 1 Nov 2022) OpenSSL should show a 3.0 version.
    remediation: >
      Configure OpenSSL to be FIPS compliant as MySQL uses OpenSSL for cryptographic
      modules. To configure OpenSSL to be FIPS 140-2 compliant, see the official
      documentation for your operating system. Below is a general summary of the
      steps required: To switch the system to FIPS mode in Oracle Linux 9 or RHEL 9:
      # fips-mode-setup –enable You must reboot the system for the setting to take
      effect. FIPS mode will be enabled. Please reboot the system for the setting to
      take effect. After the reboot, you should re-check the current state of FIPS
      mode: # fips-mode-setup --check FIPS mode is enabled. References: 1.
      https://docs.oracle.com/en/operating-systems/oracle-
      linux/9/security/configuring_fips_mode.html#enabling-and-disabling-fips-mode
      2. https://csrc.nist.gov/CSRC/media/projects/cryptographic-module-validation-
      program/documents/security-policies/140sp1758.pdf 3.
      https://csrc.nist.gov/publications/fips
    references: >
      1. https://docs.oracle.com/en/operating-systems/oracle-
      linux/9/security/configuring_fips_mode.html#enabling-and-disabling-fips-mode
      2. https://csrc.nist.gov/CSRC/media/projects/cryptographic-module-validation-
      program/documents/security-policies/140sp1758.pdf 3.
      https://csrc.nist.gov/publications/fips
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_MYSQL_8_4_enterprise_v1_0_0_2_19"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_mysql_8_4_enterprise_v1_0_0_2_19"
