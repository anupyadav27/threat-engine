  - rule_id: mysql.cis.7.password_complexity_policies_are_in_place
    title: "Ensure Password Complexity Policies are in Place"
    severity: high
    category: database
    tech_type: mysql
    automation_type: automated
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "7.5"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      Password complexity includes password characteristics such as length, case,
      numerical, and character sets.
    rationale: >
      Complex passwords help mitigate dictionary, brute forcing, and other password
      attacks. This recommendation prevents users from choosing weak passwords which
      can easily be guessed.
    audit_procedure: >
      Execute the following to see if the password validation component is
      installed: select * from mysql.component where component_urn like
      '%validate_password'; If no rows are returned, this check fails. Execute the
      following SQL statements to assess this recommendation: SHOW VARIABLES LIKE
      'validate_password%'; The result set from the above statement should show: •
      validate_password.length should be 14 or more •
      validate_password.check_user_name should be ON • validate_password.policy
      should be STRONG - checks length; numeric, lowercase/uppercase, and special
      characters; dictionary file New passwords should be checked against a
      dictionary file that contains values known to be commonly-used, expected, or
      compromised. For example, the list should include, but is not limited to: •
      Passwords obtained from previous breaches • Dictionary words • Repetitive or
      sequential characters (e.g., aaaaaa, 1234abcd) • Context-specific words, such
      as the name of the service, the username, and derivatives thereof •
      validate_password.dictionary_file should point to a dictionary file of common
      words used in passwords. The following may make the password complexity too
      difficult, use sparingly. • validate_password.mixed_case_count not more than 1
      • validate_password.number_count not more than 1 •
      validate_password.special_char_count not more than 1
    remediation: >
      Install component_validate_password component: INSTALL COMPONENT
      'file://component_validate_password'; Persist following configuration: SET
      PERSIST validate_password.length=14; SET PERSIST
      validate_password.check_user_name=ON; SET PERSIST
      validate_password.dictionary_file=<path to dictionary file>; SET PERSIST
      validate_password.policy=STRONG; Optionally set one or more of these -
      ensuring complexity is not overly onerous SET PERSIST
      validate_password.mixed_case_count=1; SET PERSIST
      validate_password.number_count=1; SET PERSIST
      validate_password.special_char_count=1; And change passwords for users which
      have passwords which are identical to their username. Default Value: By
      default component_validate_password is not installed.
      validate_password.length=8 validate_password.mixed_case_count=1
      validate_password.number_count=1 validate_password.policy=MEDIUM
      validate_password.special_char_count=1 References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/validate-password.html Additional
      Information: The 'validate password plugin' can be used instead of the
      password validation component to enforce password complexity polices; however,
      it is deprecated and will be removed in a future release.
    references: >
      1. https://dev.mysql.com/doc/refman/8.4/en/validate-password.html Additional
      Information: The 'validate password plugin' can be used instead of the
      password validation component to enforce password complexity polices; however,
      it is deprecated and will be removed in a future release.
