  - rule_id: mysql.cis.6.set_audit_log_strategy_to_synchronous_or
    title: "Set audit_log_strategy to SYNCHRONOUS or SEMISYNCRONOUS"
    severity: medium
    category: database
    tech_type: mysql
    automation_type: automated
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "6.7"
    cis_section: "6"
    profile_applicability: "Level 2"
    description: >
      The audit_log_strategy must be set to SYNCHRONOUS or SEMISYNCHRONOUS
    rationale: >
      This setting controls how information is written to the audit log. It can be
      set to SYNCHRONOUS to make it fully durable or other settings which are less
      durable but have less performance overhead. Impact: If this setting is set to
      PERFORMANCE or ASYNCHRONOUS audit events might be lost in case of a crash or
      when the server somehow can't write to the audit log file.
    audit_procedure: >
      To assess this recommendation, execute the following SQL statement: SHOW
      GLOBAL VARIABLES LIKE 'audit_log_strategy'; The result should be SYNCHRONOUS
      or SEMISYNCHRONOUS
    remediation: >
      To remediate this configuration: 1. Open the MySQL configuration file (my.cnf)
      2. Navigate to the mysqld section of the configuration file 3. Set
      audit_log_strategy='SEMISYNCHRONOUS' (or SYNCHRONOUS) Default Value:
      ASYNCHRONOUS References: 1. https://dev.mysql.com/doc/refman/8.4/en/audit-log-
      reference.html#sysvar_audit_log_strategy Additional Information: Also consider
      the load strategy. audit-log= ON, FORCE, or FORCE_PLUS_PERMANENT For example,
      most secure is to set --audit-log=FORCE_PLUS_PERMANENT This tells the server
      to load the plugin and prevent it from being removed while the server is
      running.
    references: >
      1. https://dev.mysql.com/doc/refman/8.4/en/audit-log-
      reference.html#sysvar_audit_log_strategy Additional Information: Also consider
      the load strategy. audit-log= ON, FORCE, or FORCE_PLUS_PERMANENT For example,
      most secure is to set --audit-log=FORCE_PLUS_PERMANENT This tells the server
      to load the plugin and prevent it from being removed while the server is
