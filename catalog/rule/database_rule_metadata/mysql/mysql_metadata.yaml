    profile_applicability: "Level 1"
    description: >
      The log-raw MySQL option determines whether passwords are rewritten by the
      server so as not to appear in log files as plain text. If log-raw is enabled,
      then passwords are written to the various log files (general query log, slow
      query log, and binary log) in plain text.
    rationale: >
      With raw logging of passwords enabled someone with access to the log files
      might see plain text passwords.
    audit_procedure: >
