  - rule_id: mysql.cis.2.password_resets_require_strong_passwords
    title: "Ensure Password Resets Require Strong Passwords"
    severity: high
    category: database
    tech_type: mysql
    automation_type: automated
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "2.8"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Disabling password reuse, enforcing password strength, and denying reuse can
      be implemented to prevent successful usage of stolen or previously guessed
      passwords by malicious users. Restricted accounts using passwords on the basis
      of the number of password changes and length ensure a password cannot be
      chosen from a specified number of the most recent passwords.
    rationale: >
      Repeated use of old passwords can increase risk of a compromise. This may lead
      to access by malicious users who have discovered a user's prior password(s).
    audit_procedure: >
      To assess this recommendation run the following statement: SELECT
      VARIABLE_NAME, VARIABLE_VALUE FROM performance_schema.global_variables where
      VARIABLE_NAME in ('password_history', 'password_reuse_interval'); A value of 0
      indicates that NO policy is defined for the associated variable. The
      password_history variable indicates the number of subsequent account password
      changes that must occur before the password can be reused. The
      password_history should be greater than or equal to 5, thus attempts to use
      any of the prior five, or more, passwords for this account will be denied. The
      password_reuse_interval defines the global policy for controlling reuse of
      previous passwords based on time elapsed. For an account password used
      previously, this variable indicates the number of days that must pass before
      the password can be reused. Password should not be reused over the period of a
      year. The value of password_reuse_interval should be greater than or equal to
      365.
    remediation: >
      Set a global policy that passwords may not be reused for a minimum of five
      password changes: SET PERSIST password_history = 5; Set a global policy that
      passwords have a lifetime to approximately one year (in days) SET PERSIST
      password_reuse_interval = 365; Default Value: Both password_history and
      password_reuse_interval are 0 (off) by default. References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/password- management.html#password-
      reuse-policy
    references: >
      1. https://dev.mysql.com/doc/refman/8.4/en/password- management.html#password-
      reuse-policy
