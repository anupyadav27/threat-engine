  - rule_id: mysql.cis.3.ssl_key_files_have_appropriate_permissions
    title: "Ensure SSL Key Files Have Appropriate Permissions"
    severity: high
    category: database
    tech_type: mysql
    automation_type: automated
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "3.7"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      When configured to use SSL/TLS, MySQL relies on Secure Sockets Layer (SSL) key
      files, which are stored on the host's filesystem. These SSL key files are
      subject to the host's permissions and ownership structure. MySQL 8.0 provides
      ways to create the SSL certificate, SSL key files and RSA key-pair files
      required to support encrypted connections using SSL and secure password
      exchange using RSA over unencrypted connections, if those files are missing
      the server will attempt to autogenerate these files at startup if compiled
      with OpenSSL.
    rationale: >
      Limiting the accessibility of these objects will protect the confidentiality,
      integrity, and availability of the MySQL database and the communication with
      the client. If the contents of the SSL key file are known to an attacker, he
      or she might impersonate the server. This can be used for a man-in-the-middle
      attack. Depending on the SSL cipher suite, the key might also be used to
      decipher previously captured network traffic. Impact: If the permissions or
      ownership for the SSL key file are configured incorrectly, this can cause SSL
      to be disabled when MySQL is restarted or can cause MySQL not to start at all.
      If other applications are using the same key pair, then changing the
      permissions or ownership of the SSL key file will affect this application. If
      this were to occur a new key pair must be generated for MySQL.
    audit_procedure: >
      Perform the following steps to assess this recommendation: 1. Locate the SSL
      keys and certs in use by executing the following SQL statement. To show all
      ssl variables: SELECT * FROM performance_schema.global_variables WHERE
      REGEXP_LIKE(VARIABLE_NAME,'^.*ssl_(ca|capath|cert|crl|crlpath|key)$') AND
      VARIABLE_VALUE <> ''; Note: Any mysqlx_% values that are null default to the
      classic protocols equivalent value. 2. Execute the following commands at a
      terminal prompt to list non-compliant <ssl_file> file permissions: ls -l
      <ssl_file> | egrep '^-(?!r-{8}.*mysql\s*mysql).*$' Lack of output implies
      compliance
    remediation: >
      Execute the following commands at a terminal prompt to remediate these
      settings using the Value from the audit procedure: chown mysql:mysql
      <ssl_file> chmod 400 <ssl_file> References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/encrypted-connections.html 2.
      https://dev.mysql.com/doc/refman/8.4/en/creating-ssl-rsa-files-using-
      mysql.html Additional Information: If SSL is not configured this
      recommendation is not applicable. By default MySQL enables SSL. Using SSL is
      highly recommended.
    references: >
      1. https://dev.mysql.com/doc/refman/8.4/en/encrypted-connections.html 2.
      https://dev.mysql.com/doc/refman/8.4/en/creating-ssl-rsa-files-using-
      mysql.html Additional Information: If SSL is not configured this
      recommendation is not applicable. By default MySQL enables SSL. Using SSL is
      highly recommended.
    impact: >
      If the permissions or ownership for the SSL key file are configured
      incorrectly, this can cause SSL to be disabled when MySQL is restarted or can
      cause MySQL not to start at all. If other applications are using the same key
      pair, then changing the permissions or ownership of the SSL key file will
      affect this application. If this were to occur a new key pair must be
      generated for MySQL.
    compliance_mappings:
      cis:
        - "CIS_MYSQL_8_4_enterprise_v1_0_0_3_7"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_mysql_8_4_enterprise_v1_0_0_3_7"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: mysql.cis.3.plugin_directory_has_appropriate_permissions
    title: "Ensure Plugin Directory Has Appropriate Permissions"
    severity: high
    category: database
    tech_type: mysql
    automation_type: automated
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "3.8"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The plugin directory is the location of the MySQL plugins. Plugins are storage
      engines or user defined functions (UDFs).
    rationale: >
      Limiting the accessibility of these objects will protect the confidentiality,
      integrity, and availability of the MySQL database. If someone can modify
      plugins then these plugins might be loaded when the server starts and the code
      will get executed. Impact: Users other than the MySQL user will no longer be
      able to update and add/remove plugins unless they're able to switch to the
      MySQL user.
    audit_procedure: >
      To assess this recommendation, execute the following SQL statement to discover
      the Value of plugin_dir: show variables where variable_name = 'plugin_dir';
      Then, execute the following command at a terminal prompt (using the discovered
      plugin_dir Value) to determine the permissions and ownership. ls -ld
      <plugin_dir Value> | grep 'dr-xr-x---\|dr-xr-xr--' | grep 'plugin' Lack of
      output implies a fail. Note: Permissions are intended to be either 550 or 554.
    remediation: >
      To remediate these settings, execute the following commands at a terminal
      prompt using the plugin_dir Value from the audit procedure. MySQL server must
      not be allowed to write to this location. chmod 550 <plugin_dir Value> #(or
      use 554) chown mysql:mysql <plugin_dir Value> References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/install-plugin.html
    references: >
      1. https://dev.mysql.com/doc/refman/8.4/en/install-plugin.html
