  - rule_id: mysql.cis.2.non_default_unique_cryptographic_material_is_in
    title: "Ensure Non-Default, Unique Cryptographic Material is in Use"
    severity: high
    category: database
    tech_type: mysql
    automation_type: manual
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "2.6"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The cryptographic material used by MySQL, such as digital certificates and
      encryption keys, should be used only for MySQL and only for one instance.
      Default cryptographic material should not be used since it is not unique to
      the instance.
    rationale: >
      If a cryptographic material is used on multiple MySQL instances and/or
      systems, then a compromise of one may lead to the network traffic of all
      servers being compromised that use the same cryptographic material. If an
      attacker gains access to shared cryptographic material, including default
      material, the attacker can reuse that material to impersonate the MySQL server
      or otherwise compromise its operations.
    audit_procedure: >
      Review all cryptographic material. If it is default, used for other MySQL
      instances and/or for purposes other than MySQL then this is a finding. Review
      the server certificate by running: cd <data_dir and/or ssl_cert> sudo openssl
      x509 -in server-cert.pem -subject -noout | grep
      Auto_Generated_Server_Certificate The output for the auto generated pem will
      look something like: subject=
      /CN=MySQL_Server_8.0.21_Auto_Generated_Server_Certificate If no rows return,
      the check is a pass since the certificate is not MySQL auto-generated.
    remediation: >
      Generate new certificates, keys, and other cryptographic material as needed
      for each affected MySQL instance. References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/using-encrypted-connections.html
    references: >
      1. https://dev.mysql.com/doc/refman/8.4/en/using-encrypted-connections.html
