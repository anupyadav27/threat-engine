    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: mysql.cis.2.mysql_is_bound_to_an_ip_address
    title: "Ensure MySQL is Bound to an IP Address"
    severity: medium
    category: database
    tech_type: mysql
    automation_type: automated
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "2.14"
    cis_section: "2"
    profile_applicability: "Level 2"
    description: >
      By default, the MySQL server accepts TCP/IP connections from MySQL user
      accounts on all server host IPv6 and IPv4 interfaces. You can make this
      configuration more restrictive by setting the bind_address configuration
      option to a specific IPv4 or IPv6 address so that the server only accepts
      TCP/IP connections on that address.
    rationale: >
      Limiting the IP address provides additional controls and restrictions on how
      client applications can connect to MySQL. If not configured to a specific IP
      all IPs for this server can be used to connect to MySQL.
    audit_procedure: >
      Run the following statement: SELECT VARIABLE_NAME, VARIABLE_VALUE FROM
      performance_schema.global_variables WHERE VARIABLE_NAME = 'bind_address'; No
      rows returned implies a fail.
    remediation: >
      For example, to have the MySQL server only accept connections on a specific
      IPv4 address, add an entry similar to this under the [mysqld] option group in
      the MySQL /etc/my.cnf: bind_address=192.0.2.24 In this case, clients can
      connect to the server using --host=192.0.2.24. Connections on other server
      host addresses are not permitted. Default Value: Not set. References: 1.
      https://dev.mysql.com/doc/mysql-secure-deployment-guide/8.4/en/secure-
      deployment-secure-connections.html
    references: >
