  - rule_id: mysql.cis.7.default_authentication_plugin_is_set_to_a_secure
    title: "Ensure default_authentication_plugin is Set to a Secure Option"
    severity: high
    category: database
    tech_type: mysql
    automation_type: automated
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "7.1"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      The –default-authentication-plugin system variable governs two things: •
      Authentication plugin used by a new user account if a plugin is not specified
      explicitly through CREATE USER statement • Initial authentication data payload
      generated by server in case of a new connection. Caching SHA-2 Authentication
      is the new default in MySQL 8.0. It provides stronger password protection than
      the prior Native Authentication and provides better performance than SHA2
      Authentication. Alternatively, there are additional methods to securely
      connect using Lightweight Directory Access Protocol (LDAP) and Active
      Directory authentication.
    rationale: >
      MySQL Native Authentication relies on the Secure Hash Algorithm 1 (SHA1)
      algorithm and the National Institute of Standards and Technology (NIST) has
      suggested to stop using it. The MySQL Native Authentication plugin leverages
      this weak hashing algorithm that can be quickly brute forced.
    audit_procedure: >
      Execute the following SQL statement to assess this recommendation: SHOW
      VARIABLES WHERE Variable_name = 'default_authentication_plugin'; Ensure the
      Value field is not set to mysql_native_password.
    remediation: >
      Configure mysql to default to the caching_sha2_password plugin. Require
      caching_sha2_password plugin to be used by default for new accounts. Edit
