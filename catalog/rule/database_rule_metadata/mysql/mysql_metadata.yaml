    automation_type: automated
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "3.4"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      MySQL can operate using a variety of log files, each used for different
      purposes. These are the binary log (which can be encrypted), error log, slow
      query log, relay log, general log, and in the enterprise edition, the audit
      log (which can be encrypted). Because these are files on the host operating
      system, they are subject to the permissions and ownership structure provided
      by the host and may be accessible by users other than the MySQL user.
      Additionally, using secure key management and at rest MySQL encryption can
      further protect data from OS users. Much of the information about the state of
      MySQL exists in MySQL, the MySQL performance_schema or informations_schema. If
      you can get the information you need from within MySQL that is more secure as
      it does not require OS access. If you are not going to use log files it is
      best to first disable (don’t enable) and remove any prior logs.
    rationale: >
      Limiting the accessibility of these objects will protect the confidentiality,
      integrity, and availability of the MySQL logs. Impact: Changing the
      permissions of the log files may impact monitoring tools which use a log file
      adapter. Also, the slow query log can be used for performance analysis by
      application developers. The information about the performance exists in MySQL
      performance_schema or sys schema views. In cases where the information you
      need is within a running MySQL, disable the slow query log and instead use
      these methods as they are more secure and do not require OS login and access.
    audit_procedure: >
      Perform the following steps to assess this recommendation: 1. Execute the
      following SQL statement to determine the Value of slow_query_log: show
      variables like 'slow_query_log'; Best for the slow query log to be disabled
      indicated by OFF. 2. Execute the following SQL statement to determine the
      location of slow_query_log_file: show variables like 'slow_query_log_file'; 3.
      Execute the following command at a terminal prompt to list non-compliant
      <slow_query_log_file>.* file permissions: ls -l | egrep
      '^-(?![r|w]{2}-[r|w]{2}---- .*mysql\s*mysql).*<slow_query_log_file>.*$' If the
      slow query log is enabled, lack of output implies compliance. If the slow
      query log is disabled, remove any old slow query log files.
    remediation: >
      Set slow query log to OFF (instead use SYS schema views or query
      Performance_Schema) SET PERSIST slow_query_log = OFF; If slow query is
      enabled, execute the following command to correct permissions and ownership:
      chmod 660 <log file> chown mysql:mysql <log file> Default Value: Slow query
      log is off by default. References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/slow-query-log.html
