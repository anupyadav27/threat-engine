    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "7.2"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      The [client] section of the MySQL configuration file allows setting a user and
      password to be used. Verify the password option is not used in the global
      configuration file (my.cnf).
    rationale: >
      Using the password parameter may negatively impact the confidentiality of the
      user's password. Impact: The global configuration is by default readable for
      all users on the system. This is needed for global defaults (prompt, port,
      socket, etc.). If a password is present in this file then all users on the
      system may be able to access it.
    audit_procedure: >
      To assess this recommendation, perform the following steps: • Open the MySQL
      configuration file (e.g., my.cnf) • Examine the [client] section of the MySQL
      configuration file and ensure password is not employed.
    remediation: >
      Use the mysql_config_editor to store authentication credentials in
      .mylogin.cnf in encrypted form. If not possible, use the user-specific options
      file, .my.cnf., and restricting file access permissions to the user identity.
      References: 1. https://dev.mysql.com/doc/refman/8.4/en/mysql-config-
      editor.html Additional Information: There must not be a password in any of the
      sections of the global configuration.
