  - rule_id: mysql.cis.6.log_error_is_configured_correctly
    title: "Ensure 'log_error' is configured correctly"
    severity: high
    category: database
    tech_type: mysql
    automation_type: automated
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "6.1"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      The error log contains information about events such as mysqld starting and
      stopping, when a table needs to be checked or repaired, and, depending on the
      host operating system, stack traces when mysqld fails.
    rationale: >
      Enabling error logging can increase the ability to detect malicious attempts
      against MySQL, and other critical messages. For example, if the error log is
      not enabled then a connection error could go unnoticed. When configured to
      stderr MySQL will send log data to the console. Logging to the console is
      useful, but remember it is ephemeral. This is not recommended due to the fact
      that logging to console does not provide a means to force restricted access
      via permissions strictly to MySQL and dedicated MySQL audit accounts. This may
      compromise the confidentiality of the MySQL log data. Furthermore use caution
      if co- mingling log data from multiple sources as that can complicate log
      inspection. Additionally from a security auditing perspective, it’s difficult
      and error prone to verify logging is correct using stderr or redirected
      stderr.
    audit_procedure: >
      Execute the following SQL statement to audit this setting: SHOW variables LIKE
      'log_error'; Ensure the Value returned is a path to a file and not
      ./stderr.err.
    remediation: >
      Perform the following actions to remediate this setting: 1. Open the MySQL
      configuration file (my.cnf or my.ini). 2. Set the log-error option to the path
      for the error log. Default Value: ./stderr.err References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/error-log.html
    references: >
      1. https://dev.mysql.com/doc/refman/8.4/en/error-log.html
