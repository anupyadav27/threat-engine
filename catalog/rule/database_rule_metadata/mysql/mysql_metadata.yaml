  - rule_id: mysql.cis.2.aes_encryption_mode_for_aes_encrypt_aes_decrypt
    title: "Ensure AES Encryption Mode for AES_ENCRYPT/AES_DECRYPT is Configured Correctly"
    severity: medium
    category: database
    tech_type: mysql
    automation_type: automated
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "2.12"
    cis_section: "2"
    profile_applicability: "Level 2"
    description: >
      A block encryption mode with a Cipher Block Chaining (CBC) mode value and key
      length of 256 is recommended when using the AES_ENCRYPT() and AES_DECRYPT()
      functions for encryption.
    rationale: >
      The default for backward compatibility on upgraded MySQL databases is
      aes-128-ecb. Using 128-bit keys does not provide sufficient security.
      Regardless of whether breaking the lowest level is beyond existing technology,
      larger key sizes are needed to better protect data and satisfy regulations.
      Impact: Configuring a key length of 256 may impact backwards compatibility.
    audit_procedure: >
      Run the following statement: select @@block_encryption_mode; A value other
      than aes-256-* is a fail. Where * is one of the following - ECB, CBC, CFB1,
      CFB8, CFB128, OFB
    remediation: >
      Add the following lines to the MySQL server's /etc/my.cnf: For example, if
      Block Encryption Mode for aes-256 CBC block_encryption_mode=aes-256-cbc Or,
      run the following command: set persist block_encryption_mode='aes-256-cbc';
      Restart the server for this change to take effect. Default Value: aes-128-ecb
      References: 1. https://dev.mysql.com/doc/mysql-secure-deployment-
      guide/8.4/en/secure- deployment-block-encryption-mode.html
    references: >
      1. https://dev.mysql.com/doc/mysql-secure-deployment-guide/8.4/en/secure-
      deployment-block-encryption-mode.html
    impact: >
      Configuring a key length of 256 may impact backwards compatibility.
