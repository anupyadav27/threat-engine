  - rule_id: mysql.cis.4.sql_mode_contains_strict_all_tables
    title: "Ensure 'sql_mode' Contains 'STRICT_ALL_TABLES'"
    severity: medium
    category: database
    tech_type: mysql
    automation_type: automated
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "4.9"
    cis_section: "4"
    profile_applicability: "Level 2"
    description: >
      When data changing statements are made (i.e., INSERT, UPDATE), MySQL can
      handle invalid or missing values differently depending on whether strict SQL
      mode is enabled. When strict SQL mode is enabled, data may not be truncated or
      otherwise 'adjusted' to make the data changing statement work.
    rationale: >
      Without strict mode the server tries to proceed with the action when an error
      might have been a more secure choice. For example, by default MySQL will
      truncate data if it does not fit in a field, which can lead to unknown
      behavior, or be leveraged by an attacker to circumvent data validation.
      Impact: Applications relying on the MySQL database should be aware that
      STRICT_ALL_TABLES is in use, such that error conditions are handled
      appropriately.
    audit_procedure: >
      To audit for this recommendation, execute the following query: SHOW VARIABLES
      LIKE 'sql_mode';
      +---------------+-----------------------------------------------------------+
      | Variable_name | Value |
      +---------------+-----------------------------------------------------------+
      | sql_mode | ONLY_FULL_GROUP_BY,STRICT_TRANS_TABLES,NO_ZERO_IN_DATE, | | |
      NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO, | | | NO_ENGINE_SUBSTITUTION |
      +---------------+-----------------------------------------------------------+
      If STRICT_ALL_TABLES is not in the list returned, this is a fail.
    remediation: >
      Set STRICT_ALL_TABLES to the sql_mode in the server's global configuration,
      for example: SET GLOBAL sql_mode
      ='STRICT_ALL_TABLES,ONLY_FULL_GROUP_BY,STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO
      _ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION'; Default Value:
      ONLY_FULL_GROUP_BY,STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ER
      ROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/sql-mode.html Additional Information:
      The sql_mode is a set and might contain more elements than just
      STRICT_ALL_TABLES. There is a global sql_mode and a per session sql_mode. The
      per session sql_mode is based on the global sql_mode on initialization and
      might be changed by the application.
    references: >
      1. https://dev.mysql.com/doc/refman/8.4/en/sql-mode.html Additional
      Information: The sql_mode is a set and might contain more elements than just
      STRICT_ALL_TABLES. There is a global sql_mode and a per session sql_mode. The
      per session sql_mode is based on the global sql_mode on initialization and
      might be changed by the application.
    impact: >
      Applications relying on the MySQL database should be aware that
      STRICT_ALL_TABLES is in use, such that error conditions are handled
      appropriately.
    compliance_mappings:
      cis:
        - "CIS_MYSQL_8_4_enterprise_v1_0_0_4_9"
      nist_800_53: []
      soc2: []
