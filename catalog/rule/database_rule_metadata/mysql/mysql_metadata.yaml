  - rule_id: mysql.cis.2.password_lifetime_is_less_than_or_equal_to_365
    title: "Ensure 'password_lifetime' is Less Than or Equal to '365'"
    severity: high
    category: database
    tech_type: mysql
    automation_type: automated
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "2.7"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Password expiration provides users with a unique time bounded password
      lifetime.
    rationale: >
      Allows additional security factors pertinent to a specific user to provide
      further password security; predetermined by varying security needs and
      usability requirements in a system or organization.
    audit_procedure: >
      The global password lifetime is set using default_password_lifetime. If the
      value of default_password_lifetime is greater than 0, it indicates the
      permitted password lifetime. Execute the following command to check the global
      password lifetime: SELECT VARIABLE_NAME, VARIABLE_VALUE FROM
      performance_schema.global_variables where VARIABLE_NAME like
      'default_password_lifetime'; A value greater than 365 implies a fail. When the
      global password lifetime is less than or equal to 365, or not configured, each
      user account shall be checked by executing the following command: SELECT user,
      host, password_lifetime from mysql.user where password_lifetime = 0 OR
      password_lifetime > 365; A lack of results implies compliance. Note: A value
      of 0 implies the password never expires.
    remediation: >
      To configure the global password lifetime to 365 by executing the following
      command: set persist default_password_lifetime = 365; Alternatively, configure
      the password lifetime for each user returned by the audit procedure by
      executing the following command: ALTER USER '<username>'@'<localhost>'
      PASSWORD EXPIRE INTERVAL 365 DAY; Default Value: NULL References: 1.
      https://csrc.nist.gov/csrc/media/publications/sp/800-118/archive/2009-04-
      21/documents/draft-sp800-118.pdf 2.
      https://dev.mysql.com/doc/refman/8.4/en/validate-password.html Additional
      Information: When a user's password_lifetime is set to NULL it takes on the
      value set in global default_password_lifetime variable.
