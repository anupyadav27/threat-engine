  - rule_id: mysql.cis.1.the_mysql_pwd_environment_variable_is_not_in_use
    title: "Verify That the MYSQL_PWD Environment Variable is Not in Use"
    severity: high
    category: database
    tech_type: mysql
    automation_type: automated
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "1.4"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      MySQL can read a default database password from an environment variable called
      MYSQL_PWD. Avoiding use of this environment variable can better safeguard the
      confidentiality of MySQL credentials.
    rationale: >
      Using the MYSQL_PWD environment variable implies MySQL credentials are stored
      as clear text.
    audit_procedure: >
      To assess this recommendation, use the /proc filesystem to determine if
      MYSQL_PWD is currently set for any process: grep MYSQL_PWD /proc/*/environ
      This may return one entry for the process which is executing the grep command.
    remediation: >
      Check which users and/or scripts are setting MYSQL_PWD and change them to use
      a more secure method. For unattended logins you should consider 1. MySQL
      Configuration Editor 2. Different authentication methods (e.g., X509
      certificate verification) 3. Use MySQL Enterprise LDAP plugin with Kerberos or
      SASL tokens. Default Value: Not set. References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/environment-variables.html 2.
      https://dev.mysql.com/doc/refman/8.4/en/mysql-config-editor.html 3.
      https://dev.mysql.com/doc/refman/8.4/en/pluggable-authentication.html
    references: >
      1. https://dev.mysql.com/doc/refman/8.4/en/environment-variables.html 2.
      https://dev.mysql.com/doc/refman/8.4/en/mysql-config-editor.html 3.
      https://dev.mysql.com/doc/refman/8.4/en/pluggable-authentication.html
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_MYSQL_8_4_enterprise_v1_0_0_1_4"
      nist_800_53: []
      soc2: []
