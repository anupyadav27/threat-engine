  - rule_id: mysql.cis.4.secure_file_priv_is_configured_correctly
    title: "Ensure the 'secure_file_priv' is Configured Correctly"
    severity: high
    category: database
    tech_type: mysql
    automation_type: automated
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "4.8"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      The secure_file_priv option restricts to paths used by LOAD DATA INFILE or
      SELECT local_file. It is recommended that this option be set to a file system
      location that contains only resources expected to be loaded by MySQL. Even
      better, if data import/export using LOAD DATA INFILE or SELECT local_file is
      not used, the functionality should be disabled entirely by setting --secure-
      file-priv to NULL.
    rationale: >
      Setting secure_file_priv reduces an attacker's ability to read sensitive files
      off the affected server via a SQL injection vulnerability. Impact: Solutions
      that rely on loading data from various sub-directories may be negatively
      impacted by this change. Consider consolidating load directories under a
      common parent directory. The server checks the value of secure_file_priv at
      startup and writes a warning to the error log if the value is insecure. A non-
      NULL value is considered insecure if it is empty, or the value is the data
      directory or a subdirectory of it, or a directory that is accessible by all
      users.
    audit_procedure: >
      Execute the following SQL statement and ensure one row is returned: SHOW
      GLOBAL VARIABLES WHERE Variable_name = 'secure_file_priv'; The Value should
      either contain NULL (thus is disabled entirely) or a valid path. If set to an
      empty string this is a fail.
    remediation: >
      If you are not going to use this feature, remove secure_file_priv from the
      [mysqld] section of the MySQL configuration file and restart the MySQL
      service. If you need this feature add the following line to the [mysqld]
      section of the MySQL configuration file and restart the MySQL service:
      secure_file_priv=<path_to_load_directory> Default Value: No value set.
      References: 1. http://dev.mysql.com/doc/refman/8.4/en/server-system-
      variables.html#sysvar_secure_file_priv
    references: >
      1. http://dev.mysql.com/doc/refman/8.4/en/server-system-
      variables.html#sysvar_secure_file_priv
    impact: >
      Solutions that rely on loading data from various sub-directories may be
      negatively impacted by this change. Consider consolidating load directories
      under a common parent directory. The server checks the value of
      secure_file_priv at startup and writes a warning to the error log if the value
      is insecure. A non-NULL value is considered insecure if it is empty, or the
      value is the data directory or a subdirectory of it, or a directory that is
      accessible by all users.
