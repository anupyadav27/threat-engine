  - rule_id: mysql.cis.1.mysql_is_run_under_a_sandbox_environment
    title: "Ensure MySQL is Run Under a Sandbox Environment"
    severity: medium
    category: database
    tech_type: mysql
    automation_type: manual
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "1.7"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      Use of the chroot() system call at startup, Systemd with settings to achieve
      isolation, or docker will put MySQL in a Sandbox environment.
    rationale: >
      Running MySQL in a Sandbox environment may reduce the impact of a MySQL-born
      vulnerability by making portions of the file system inaccessible to the MySQL
      instance. Impact: Use of the chroot option somewhat limits LOAD DATA INFILE
      and SELECT ... INTO OUTFILE.
    audit_procedure: >
      Perform the following steps for each mySQL instance to assess this
      recommendation: 1. Execute the following SQL statement to determine the value
      of chroot cat /etc/mysql | egrep '(?<=^chroot=).+$' The returned value should
      specify a valid path which differs from the datadir. No results implies
      'chroot' is not in use. 2. Perform the following to check systemd: systemctl
      status <mysqld>.service If something other than (root) is listed beside the
      PID, e.g. Main PID: <PID> (root), this is a pass. No results implies mysql is
      not managed by systemd. 3. Perform the following to determine if Docker is
      installed and a MySQL container is in use: 1. To check for docker
      installation, execute this command: $ docker -v If a message stating the
      version of docker which is installed proceed to the next steps, otherwise no
      further action is needed as docker must be installed for mysql to be run in
      docker. 2. To check if a mysql image exists in docker run this command: $ sudo
      docker images REPOSITORY TAG IMAGE ID CREATED SIZE mysql latest 2fe463762680 1
      week ago 514MB mysql/mysql-server latest 1504607f1ce7 2 weeks ago 401MB If a
      mysql image is listed proceed to the next steps, otherwise no further action
      is needed as a mysql image is required for mysql to be run in docker. 3. Check
      if a mysql container is running: $ sudo docker ps CONTAINER ID IMAGE COMMAND
      CREATED STATUS PORTS NAMES 0fc229e3df77 mysql 'docker…' 1 hour ago Up 1 hour
      0.0.0.0:3306->3306/tcp, mysql-server :::3306- >3306/tcp, 33060/tcp If a mysql
      container is listed then mysql is running in docker and this is a pass. If
      MySQL does not use chroot, systemd, or docker, this is a fail.
    remediation: >
      Perform one of the following steps to remediate this setting: • Configure
      MySQL to use chroot: 1. Choose a non-system partition <chroot location> for
      MySQL 2. Add chroot= <chroot_location> to the my.cnf option file • Configure
      MySQL to run under systemd: 1. If mysql is managed by systemd and running,
      stop the service: $ sudo systemctl stop <mysqld>.service 2. If a mysql user
      and group do not already exist, create them: $ sudo groupadd mysql $ sudo
      useradd -r -g mysql -s /bin/false mysql 3. Set the oenwership of the base
      director: $ sudo chown -R mysql:mysql /usr/local/mysql/ 4. Create or modify
      the <mysqld> .service file in /lib/systemd/system to include the following
      entries, if not already present: [Unit] Description=MySQL Server [Install]
      WantedBy=multi-user.target [Service] User=mysql Group=mysql 5. If mysql was
      not already already managed by systemd execute this command: $ sudo systemctl
      daemon-reload 6. Start the MySQL server: $ sudo systemctl start
      <mysqld>.service 7. If you would like mysql to automatically run at startup
      execute this command: $ sudo systemctl enable <mysqld>.service • Follow
      documentation in the references for standing up MySQL in a Docker container.
      References: 1. https://dev.mysql.com/doc/refman/8.4/en/server-
      options.html#option_mysqld_chroot 2.
      https://dev.mysql.com/doc/refman/8.4/en/docker-mysql-getting-started.html 3.
      https://hub.docker.com/r/mysql/mysql-server
    references: >
      1. https://dev.mysql.com/doc/refman/8.4/en/server-
      options.html#option_mysqld_chroot 2.
      https://dev.mysql.com/doc/refman/8.4/en/docker-mysql-getting-started.html 3.
      https://hub.docker.com/r/mysql/mysql-server
    impact: >
      Use of the chroot option somewhat limits LOAD DATA INFILE and SELECT ... INTO
      OUTFILE.
    compliance_mappings:
      cis:
        - "CIS_MYSQL_8_4_enterprise_v1_0_0_1_7"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_mysql_8_4_enterprise_v1_0_0_1_7"
    metadata_source: generated
