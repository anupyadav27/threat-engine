  - rule_id: mysql.cis.2.limit_accepted_transport_layer_security_tls
    title: "Limit Accepted Transport Layer Security (TLS) Versions"
    severity: medium
    category: database
    tech_type: mysql
    automation_type: automated
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "2.15"
    cis_section: "2"
    profile_applicability: "Level 2"
    description: >
      MySQL supports multiple protocols of TLS. The higher the version the stronger
      the security and/or better the performance.
    rationale: >
      Requiring clients attempting to connect to MySQL to use higher versions of TLS
      to better protect data in transit. Impact: Connections attempting to use an
      unsupported version of TLS or Cipher will fail.
    audit_procedure: >
      To list the versions of TLS the server accepts, run the following statement:
      select @@tls_version; If the list includes TLSv1 and/or TLSv1.1, this is a
      fail. To view current connections and the version of SSL in use run: select *
      from performance_schema.status_by_thread where VARIABLE_NAME like
      'ssl_version'; If the list includes, TLSv1 and/or TLSv1.1, this is a fail.
      MySQL negotiates to the highest version of TLS, if connections are using older
      TLS versions, those clients will need to be upgraded to newer MySQL Connectors
      or community drivers that support newer versions of TLS.
    remediation: >
      Set the version(s) of TLS you wish to accept in mysql.conf specify TLS and
      Ciphers. For example to only accept TLS 1.3 set tls_version in my.conf:
      tls_version=TLSv1.3 If TLS 1.3 is not supported on the Operating System then
      set to TLS 1.2: tls_version=TLSv1.2 Note: with this setting, only clients that
      support the specified TLS version(s) are able to establish an encrypted
      connection to the server. Default Value: All TLS and cipher versions are
      enabled by default. References: 1. https://dev.mysql.com/doc/mysql-secure-
      deployment-guide/8.4/en/secure- deployment-secure-connections.html 2.
      https://dev.mysql.com/doc/refman/8.4/en/encrypted-connection-protocols-
      ciphers.html#encrypted-connection-protocol-configuration
    references: >
      1. https://dev.mysql.com/doc/mysql-secure-deployment-guide/8.4/en/secure-
      deployment-secure-connections.html 2.
      https://dev.mysql.com/doc/refman/8.4/en/encrypted-connection-protocols-
      ciphers.html#encrypted-connection-protocol-configuration
    impact: >
      Connections attempting to use an unsupported version of TLS or Cipher will
      fail.
