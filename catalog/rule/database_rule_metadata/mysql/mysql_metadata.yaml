  - rule_id: mysql.cis.9.master_info_repository_is_set_to_table
    title: "Ensure 'master_info_repository' is Set to 'TABLE'"
    severity: medium
    category: database
    tech_type: mysql
    automation_type: automated
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "9.3"
    cis_section: "9"
    profile_applicability: "Level 2"
    description: >
      The master_info_repository setting, which is deprecated as of 8.0.22,
      determines to where a REPLICA (slave is deprecated as of 8.0.22) logs SOURCE
      status and connection information. The options are FILE or TABLE. Note also
      that this setting is associated with the sync_master_info, which is deprecated
      in 8.0.22, setting as well.
    rationale: >
      The password which the client uses is stored in the SOURCE info repository,
      which by default is a plaintext file. The TABLE SOURCE info repository is a
      bit safer, but with filesystem access it's still possible to gain access to
      the password the REPLICA is using.
    audit_procedure: >
      Execute the following SQL statement to assess this recommendation: SHOW GLOBAL
      VARIABLES LIKE 'master_info_repository'; The result should be TABLE instead of
      FILE. Note: There also should not be a source.info or master.info file in the
      datadir.
    remediation: >
      Perform the following actions to remediate this setting: 1. Open the MySQL
      configuration file (my.cnf) 2. Locate master_info_repository 3. Set the
      master_info_repository value to TABLE Note: If master_info_repository does not
      exist, add it to the configuration file. Default Value: TABLE References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/replication-options-
      replica.html#sysvar_master_info_repository
    references: >
      1. https://dev.mysql.com/doc/refman/8.4/en/replication-options-
      replica.html#sysvar_master_info_repository
    impact: >
      
