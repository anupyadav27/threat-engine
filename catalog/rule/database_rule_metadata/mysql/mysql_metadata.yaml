  - rule_id: mysql.cis.9.super_priv_is_not_set_to_y_for_replication_users
    title: "Ensure 'super_priv' is Not Set to 'Y' for Replication Users"
    severity: high
    category: database
    tech_type: mysql
    automation_type: automated
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "9.4"
    cis_section: "9"
    profile_applicability: "Level 1"
    description: >
      The SUPER privilege found in the mysql.user table governs the use of a variety
      of MySQL features. These features include, CHANGE MASTER TO, KILL, mysqladmin
      kill option, PURGE BINARY LOGS, SET GLOBAL, mysqladmin debug option, logging
      control, and more.
    rationale: >
      The SUPER privilege allows principals to perform many actions, including view
      and terminate currently executing MySQL statements (including statements used
      to manage passwords). This privilege also provides the ability to configure
      MySQL, such as enable/disable logging, alter data, disable/enable features.
      Limiting the accounts that have the SUPER privilege reduces the chances that
      an attacker can exploit these capabilities. Impact: When the SUPER privilege
      is denied to a given user, that user will be unable to take advantage of
      certain capabilities, such as certain mysqladmin options.
    audit_procedure: >
      Execute the following SQL statement to audit this setting: select user, host
      from mysql.user where user='repl' and Super_priv = 'Y'; No rows should be
      returned. If you wish to validate permissions in more detail: select * from
      mysql.user where user='repl'\G The following columns should return Y.
      *************************** 1. row *************************** Select_priv: Y
      Reload_priv: Y Shutdown_priv: Y Process_priv: Y File_priv: Y Grant_priv: Y
      Execute_priv: Y Repl_slave_priv: Y Repl_client_priv: Y Create_user_priv: Y 1
      row in set (0.0007 sec) Check Dynamic Privileges : select PRIV from
      mysql.global_grants where user like 'repl'\G Expected results are:
      BACKUP_ADMIN CLONE_ADMIN PERSIST_RO_VARIABLES_ADMIN REPLICATION_SLAVE_ADMIN
      SYSTEM_VARIABLES_ADMIN Note: Substitute your replication user's name for repl
      in the above queries.
    remediation: >
      Execute the following steps to remediate this setting: 1. Enumerate the
      replication users found in the result set of the audit procedure 2. For each
      replication user, issue the following SQL statement (replace repl with your
      replication user's name): REVOKE SUPER ON *.* FROM 'repl'; Note: Prior to
      8.0.21 if MySQL Replica Set was used to create the replications administrator
      (call to dba.configureReplicaSetInstance in MySQL Shell) after performing the
      above revoke you will need to grant the following dynamic privilege. GRANT
      REPLICATION_SLAVE_ADMIN ON *.* TO `repl WITH GRANT OPTION; References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/privileges-provided.html#priv_super 2.
      https://dev.mysql.com/doc/refman/8.4/en/deploying-innodb-replicasets.html
    references: >
      1. https://dev.mysql.com/doc/refman/8.4/en/privileges-provided.html#priv_super
      2. https://dev.mysql.com/doc/refman/8.4/en/deploying-innodb-replicasets.html
    impact: >
      When the SUPER privilege is denied to a given user, that user will be unable
      to take advantage of certain capabilities, such as certain mysqladmin options.
    compliance_mappings:
      cis:
        - "CIS_MYSQL_8_4_enterprise_v1_0_0_9_4"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_mysql_8_4_enterprise_v1_0_0_9_4"
