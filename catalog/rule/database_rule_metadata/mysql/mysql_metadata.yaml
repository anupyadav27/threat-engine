  - rule_id: mysql.cis.2.implement_connection_delays_to_limit_failed_login
    title: "Implement Connection Delays to Limit Failed Login Attempts"
    severity: high
    category: database
    tech_type: mysql
    automation_type: automated
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "2.18"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      MySQL Server can enable administrators to introduce an increasing delay in
      server response to clients after a certain number of consecutive failed
      connection attempts.
    rationale: >
      Delaying connection attempts provides a deterrent that slows down brute force
      attacks that attempt to access MySQL user accounts.
    audit_procedure: >
      Determine if the plugins for delaying connections are installed. SELECT
      PLUGIN_NAME, PLUGIN_STATUS FROM INFORMATION_SCHEMA.PLUGINS WHERE PLUGIN_NAME
      LIKE 'connection%'; Two rows should be returned showing ACTIVE status.
      CONNECTION_CONTROL | ACTIVE CONNECTION_CONTROL_FAILED_LOGIN_ATTEMPTS | ACTIVE
      If both plugins are not active, this is a fail. Next assess the setting for
      the connection controls by running SELECT VARIABLE_NAME, VARIABLE_VALUE FROM
      performance_schema.global_variables WHERE VARIABLE_NAME LIKE
      'connection_control%'; Time doubling throttling (in minutes) between each
      retry (0, 1, 2, 4, 8, etc.) with a permanent account lockout (IT reset
      required) after 12 retries. If connection_control_failed_connections_threshold
      is less than 5 (attempts), this is a fail. If
      connection_control_min_connection_delay is less than 60000 (ms - 1 minute),
      this is a fail. Max delay connection_control_max_connection_delay is 0 or less
      than 1920000 (ms, 32 minutes) a, this is a fail. Finally, assess the failed
      login attempts. select host, user, JSON_EXTRACT(user_attributes,
      '$.Password_locking.failed_login_attempts') as failed_login_attempts from
      mysql.user; If failed login attempts is less than 12 this is a fail.
    remediation: >
      Add the following lines to my.cnf: [mysqld] plugin-load-
      add=connection_control.so connection-control=FORCE_PLUS_PERMANENT connection-
      control-failed-login-attempts=FORCE_PLUS_PERMANENT
      connection_control_failed_connections_threshold=5
      connection_control_min_connection_delay=60000
      connection_control_max_connection_delay=1920000 Delays are in milliseconds for
      server response to failed connection attempt. • 60000 (ms - 1 minute) •
      1920000 (ms, 32 minutes) For each user set ALTER USER <user>
      FAILED_LOGIN_ATTEMPTS 12; References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/connection-control.html
    references: >
      1. https://dev.mysql.com/doc/refman/8.4/en/connection-control.html
    impact: >
      
