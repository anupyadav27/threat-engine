  - rule_id: mysql.cis.3.secure_mysql_keyring
    title: "Secure MySQL Keyring"
    severity: high
    category: database
    tech_type: mysql
    automation_type: automated
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "3.10"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      When configured to use a Keyring plugin, internal MySQL components and plugins
      may securely store sensitive information for later retrieval. Associated files
      for the selected keyring type should have proper permissions.
    rationale: >
      Limiting the accessibility of these objects will protect the confidentiality,
      integrity, and availability of internal MySQL component and plugin
      information.
    audit_procedure: >
      Perform the following steps applicable to the plugin in use to assess this
      recommendation: Keyring File Plugin (Least Secure - for pre-production
      testing) 1. Find the keyring_file_data value ( <keyring_file_data_path> ) by
      executing the following statement: grep -Po '(?<=^keyring_file_data=).+$'
      /etc/mysql/my.cnf 2. Verify permissions are 750 for mysql:mysql for
      <keyring_file_data_path> Keyring Encrypted File Plugin 1. Find the
      keyring_encrypted_file_data value ( <keyring_encrypted_file_data_path> ) by
      executing the following statement: grep -Po
      '(?<=^keyring_encrypted_file_data=).+$' /etc/mysql/my.cnf 2. Verify
      permissions are 750 for mysql:mysql for <keyring_encrypted_file_data_path> 3.
      Verify a secure method for provisioning the passphrase for the
      keyring_encrypted_file_data is in place. Keyring OKV / KMIP compatible Plugin
      1. Find the keyring_okv value ( <keyring_okv_path> ) by executing the
      following statement: grep -Po '(?<=^keyring_okv=).+$' /etc/mysql/my.cnf 2.
      Verify permissions are 750 for mysql:mysql for <keyring_okv_path> Keyring
      Oracle Cloud Infrastructure (OCI) Vault 1. Find the keyring_oci_key_file value
      ( <keyring_oci_key_file> ) by executing the following statement: grep -Po
      '(?<=^keyring_oci_key_file=).+$' /etc/mysql/my.cnf 2. Verify permissions are
      750 for mysql:mysql for <keyring_oci_key_file> Keyring Hashicorp Vault Plugin
      1. Find the keyring_hashicorp_store_path value (
      <keyring_hashicorp_store_path> ) by executing the following statement: grep
      -Po '(?<=^keyring_hashicorp_store_path=).+$' /etc/mysql/my.cnf 2. Verify
      permissions are 750 for mysql:mysql for <keyring_hashicorp_store_path> AWS Key
      Management Service 1. Find the keyring_aws_conf_file and keyring_aws_data_file
      values by executing the following statement: grep -Po
      '(?<=^keyring_aws.*=).+$' /etc/mysql/my.cnf 2. Verify permissions are 750 for
      mysql:mysql for keyring_aws_conf_file and keyring_aws_data_file Additionally,
      if no keyring plugin or keyring file plugin is configured, this is a fail.
    remediation: >
      If no keyring plugin or keyring file plugin is configured, instructions for
      configuring a keyring plugin or keyring file plugin may found at: • KMIP -
      https://dev.mysql.com/doc/refman/8.0/en/keyring-okv- plugin.html#keyring-okv-
      configuration • OCI Vault - https://dev.mysql.com/doc/refman/8.0/en/keyring-
      oci-plugin.html • Hashicorp - https://dev.mysql.com/doc/refman/8.0/en/keyring-
      hashicorp- plugin.html#keyring-hashicorp-plugin-configuration • AWS -
      https://dev.mysql.com/doc/refman/8.0/en/keyring-aws- plugin.html#keyring-aws-
      plugin-configuration Execute the following command for each Keyring file
      location requiring corrected permissions: chmod 750 <keyring file> chown
      mysql:mysql <keyring file> References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/keyring-system-variables.html
      Additional Information: Use of keyring_file is intended for development and
      testing and will not pass most security regulatory requirements.
    references: >
      1. https://dev.mysql.com/doc/refman/8.4/en/keyring-system-variables.html
      Additional Information: Use of keyring_file is intended for development and
      testing and will not pass most security regulatory requirements.
