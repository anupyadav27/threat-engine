  - rule_id: mysql.cis.1.disable_mysql_command_history
    title: "Disable MySQL Command History"
    severity: medium
    category: database
    tech_type: mysql
    automation_type: automated
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "1.3"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      On Linux/UNIX, the MySQL client and MySQL Shell log statements executed
      interactively to a history file. The default MySQL Client file is named
      .mysql_history in the user's home directory. The files are split by language
      and named history.sql, history.js and history.py. Most interactive commands
      run in the MySQL client application are saved to a history file. The MySQL
      command history should be disabled. By default, the MySQL Shell does not save
      history between sessions.
    rationale: >
      Disabling the MySQL Client and MySQL Shell command history reduces the
      probability of exposing sensitive information, such as passwords, encryption
      keys, or other sensitive data or information.
    audit_procedure: >
      Execute the following commands to assess this recommendation: find /home -name
      '.mysql_history' find /root -name '.mysql_history' For MySQL Shell ls -d
      .??*/* | egrep history | grep mysql For each file returned determine whether
      that file is symbolically linked to /dev/null.
    remediation: >
      For MySQL Client perform the following steps to remediate this setting: 1.
      Remove .mysql_history if it exists. 2. Use either of the techniques below to
      prevent it from being created again: o Set the MYSQL_HISTFILE environment
      variable to /dev/null. This will need to be placed in the shell's startup
      script. o Create $HOME/.mysql_history as a symbolic to /dev/null. > ln -s
      /dev/null $HOME/.mysql_history Another way to prevent history from being
      recorded is to use --batch option. For MySQL Shell perform the following steps
      to remediate this setting: 1. Remove $HOME/.mysqlsh/history.* if files exists.
      2. Use either of the techniques below to prevent it from being created again:
      o Start shell and list show options using \option -l o Set to no history using
      the command \option --persist history.autoSave=1 Default Value: By default,
      the MySQL command history file is located in $HOME/.mysql_history. References:
      1. https://dev.mysql.com/doc/refman/8.4/en/mysql-logging.html 2.
      https://bugs.mysql.com/bug.php?id=72158 3. https://dev.mysql.com/doc/mysql-
      shell/8.4/en/mysql-shell-working-with- history.html
    references: >
      1. https://dev.mysql.com/doc/refman/8.4/en/mysql-logging.html 2.
      https://bugs.mysql.com/bug.php?id=72158 3. https://dev.mysql.com/doc/mysql-
      shell/8.4/en/mysql-shell-working-with- history.html
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_MYSQL_8_4_enterprise_v1_0_0_1_3"
      nist_800_53: []
