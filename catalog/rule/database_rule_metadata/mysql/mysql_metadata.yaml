  - rule_id: mysql.cis.8.set_maximum_connection_limits_for_server_and_per
    title: "Set Maximum Connection Limits for Server and per User"
    severity: high
    category: database
    tech_type: mysql
    automation_type: manual
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "8.3"
    cis_section: "8"
    profile_applicability: "Level 1"
    description: >
      Limiting concurrent connections to a MySQL server can be used to reduce risk
      of Denial of Service (DoS) attacks performed by exhausting connection
      resources.
    rationale: >
      Limiting the number of concurrent sessions at the server and per user level
      helps to reduce the risk of DoS attacks. MySQL provides mechanisms to limit
      the number of simultaneous connections that can be made at the server level or
      by any given account.
    audit_procedure: >
      To check global (default) concurrent-sessions settings in the MySQL database
      server, to check the per user default run the query: SELECT VARIABLE_NAME,
      VARIABLE_VALUE FROM performance_schema.global_variables WHERE VARIABLE_NAME
      LIKE 'max_%connections'; If the value of max_user_connections is 0 this means
      there is “no limit”. If the value of max_connections is not set, there is no
      limit. Also check the values on a per user basis run the following: select
      user, host, max_user_connections from mysql.user where user not like 'mysql.%'
      and user not like 'root'; If the value is 0 this means the global value of
      max_user_connections applies. If no limits are configured this is a fail.
    remediation: >
      Connect to the MySQL Database as an administrator. For example, to set the
      global default per user to 50 run the command: SET PERSIST
      max_user_connections=50; To control the maximum number of clients the server
      permits to connect simultaneously, set the max_connections system variable:
      SET PERSIST max_connections=1000; Additionally, this max user connections can
      be set per user as well as for a given period of time period using CREATE or
      ALTER. For example: ALTER USER 'fred'@'localhost' WITH
      MAX_CONNECTIONS_PER_HOUR 5 MAX_USER_CONNECTIONS 2; Default Value: The default
      value of max_connections is 151, max_user_connections is 0 (unlimited, thus
      limited by max_connections). References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/user-resources.html 2.
      https://dev.mysql.com/doc/refman/8.4/en/connection-interfaces.html#connection-
      interfaces-volume-management 9 Replication Everything related to replicating
      data from one server to another.
    references: >
      1. https://dev.mysql.com/doc/refman/8.4/en/user-resources.html 2.
      https://dev.mysql.com/doc/refman/8.4/en/connection-interfaces.html#connection-
      interfaces-volume-management 9 Replication Everything related to replicating
      data from one server to another.
