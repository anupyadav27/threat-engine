  - rule_id: mysql.cis.8.require_secure_transport_is_set_to_on_and_or_have
    title: "Ensure 'require_secure_transport' is Set to 'ON' and/or 'have_ssl' is Set to 'YES'"
    severity: high
    category: database
    tech_type: mysql
    automation_type: automated
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "8.1"
    cis_section: "8"
    profile_applicability: "Level 1"
    description: >
      All network traffic must use SSL/TLS when traveling over untrusted networks.
    rationale: >
      Enabling Secure Sockets Layer (SSL) will allow clients to encrypt network
      traffic and verify the identity of the server. The SSL/TLS-protected MySQL
      protocol helps to prevent eavesdropping and man-in-the-middle attacks. Impact:
      Enabling SSL could have impact on network traffic inspection.
    audit_procedure: >
      Execute the following SQL statements to assess this recommendation: Check the
      global default. select @@require_secure_transport; Ensure the returned Value
      is ON or '1' SHOW variables WHERE variable_name = 'have_ssl'; Or if MySQL is
      built with OpenSSL: SHOW variables WHERE variable_name = 'have_openssl';
      Ensure the Value returned is YES. Note: have_openssl is an alias for have_ssl
      when MySQL is built with OpenSSL.
    remediation: >
      Follow the procedures as documented in the MySQL 8.0 Reference Manual to setup
      SSL. Set global policy to force SSL for all connections: set persist
      require_secure_transport=ON; Default Value: DISABLED References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/using-encrypted-connections.html 2.
      https://dev.mysql.com/doc/refman/8.4/en/connection-options.html 3.
      https://dev.mysql.com/doc/refman/8.4/en/server-system-
      variables.html#sysvar_require_secure_transport 4.
      https://dev.mysql.com/doc/refman/8.4/en/server-system-
      variables.html#sysvar_have_openssl
    references: >
