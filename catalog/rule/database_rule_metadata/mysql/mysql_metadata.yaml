      anonymous users returned from executing the audit procedure. 2. For each
      anonymous user, DROP or assign them a name. Note: As an alternative, you may
      execute the mysql_secure_installation utility. References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/mysql-secure-installation.html 2.
      https://dev.mysql.com/doc/refman/8.4/en/default-privileges.html 3.
