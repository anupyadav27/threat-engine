  - rule_id: mysql.cis.5.only_administrative_users_have_full_database
    title: "Ensure Only Administrative Users Have Full Database Access"
    severity: high
    category: database
    tech_type: mysql
    automation_type: manual
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "5.1"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The mysql.user, mysql.db, and other mysql tables ending in _priv list a
      variety of privileges that can be granted (or denied) to MySQL users. Some of
      the privileges of concern include: Select_priv, Insert_priv, Update_priv,
      Delete_priv, Drop_priv, and so on. Typically, these privileges should not be
      available to every MySQL user and often are reserved for administrative use
      only. The information_schema.user_privileges provides a consolidated view of
      all user privileges.
    rationale: >
      Limiting the accessibility of the mysql database will protect the
      confidentiality, integrity, and availability of the data housed within MySQL.
      A user which has direct access to mysql.* might view password hashes, change
      permissions, or alter or destroy information intentionally or unintentionally.
    audit_procedure: >
      Execute the following SQL statement(s) to assess this recommendation: select *
      from information_schema.user_privileges where grantee not like
      ('\'mysql.%localhost\''); Ensure all users returned are administrative users
      with minimal privileges required. The above query ignores MySQL internal
      reserved accounts.
    remediation: >
      Perform the following actions to remediate this setting: 1. Enumerate non-
      administrative users resulting from the audit procedure. 2. For each non-
      administrative user, use the REVOKE statement to remove privileges as
      appropriate. References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/information-schema-user-privileges-
      table.html 2. https://dev.mysql.com/doc/refman/8.4/en/reserved-accounts.html
      Additional Information: Consideration should be made for which privileges are
      required by each user requiring interactive database access.
    references: >
      1. https://dev.mysql.com/doc/refman/8.4/en/information-schema-user-privileges-
      table.html 2. https://dev.mysql.com/doc/refman/8.4/en/reserved-accounts.html
      Additional Information: Consideration should be made for which privileges are
      required by each user requiring interactive database access.
    impact: >
      
