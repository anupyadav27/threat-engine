  - rule_id: mysql.cis.2.lock_out_accounts_if_not_currently_in_use
    title: "Lock Out Accounts if Not Currently in Use"
    severity: medium
    category: database
    tech_type: mysql
    automation_type: manual
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "2.11"
    cis_section: "2"
    profile_applicability: "Level 2"
    description: >
      If users with accounts will not be using their account for some time, to
      reduce the risk of attacks or inappropriate account usage or if suspicions
      exist that an account might be under attack, disabling the account will secure
      it and once it's ready to resume use it can easily be re-enabled.
    rationale: >
      Only have active accounts that will be used.
    audit_procedure: >
      Review the locked status of accounts: select user, host, account_locked from
      mysql.user; Accounts not in use and MySQL Reserved accounts should show as
      locked (Y).
    remediation: >
      To lock accounts - example: ALTER USER 'jeffrey'@'localhost' ACCOUNT LOCK; To
      unlock accounts - example ALTER USER 'jeffrey'@'localhost' ACCOUNT UNLOCK;
      Note: Works for CREATE as well. It is good practice to LOCK an account if
      created ahead of time. Default Value: Accounts are unlocked by default.
      References: 1. https://dev.mysql.com/doc/refman/8.4/en/account-locking.html
      Additional Information: When a client attempts to connect to a locked account,
      the attempt fails. Access denied for user '<user_name>'@'<host_name>'. Account
      is locked. The server increments the Locked_connects status variable that
      indicates the number of attempts to connect to a locked account. To view the
      Locked_conects execute this query: show global status like 'Locked_connects';
      The error log will contain the message ER_ACCOUNT_HAS_BEEN_LOCKED.
    references: >
      1. https://dev.mysql.com/doc/refman/8.4/en/account-locking.html Additional
      Information: When a client attempts to connect to a locked account, the
      attempt fails. Access denied for user '<user_name>'@'<host_name>'. Account is
      locked. The server increments the Locked_connects status variable that
      indicates the number of attempts to connect to a locked account. To view the
