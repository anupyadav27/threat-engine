  - rule_id: mysql.cis.2.do_not_reuse_usernames
    title: "Do Not Reuse Usernames"
    severity: high
    category: database
    tech_type: mysql
    automation_type: manual
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "2.5"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Database user accounts should not be reused for multiple applications or
      users.
    rationale: >
      Utilizing unique database accounts across applications will reduce the impact
      of a compromised MySQL account. If a user is reused, then a compromise of this
      user will compromise multiple parts of the system and/or application.
    audit_procedure: >
      Each user (excluding mysql reserved users) should be linked to one of these: •
      system accounts • a person • an application To list users (and exclude mysql
      reserved users): SELECT host, user, plugin, IF(plugin =
      'mysql_native_password', 'WEAK SHA1', 'STRONG SHA2') AS HASHTYPE FROM
      mysql.user WHERE user NOT IN ('mysql.infoschema', 'mysql.session',
      'mysql.sys') AND plugin NOT LIKE 'auth%' AND plugin <> 'mysql_no_login' AND
      LENGTH(authentication_string) > 0 ORDER BY plugin;
    remediation: >
      Add/Remove users so that each user is only used for one specific purpose.
