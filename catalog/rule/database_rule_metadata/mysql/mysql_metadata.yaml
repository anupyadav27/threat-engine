  - rule_id: mysql.cis.7.passwords_are_set_for_all_mysql_accounts
    title: "Ensure Passwords are Set for All MySQL Accounts"
    severity: high
    category: database
    tech_type: mysql
    automation_type: automated
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "7.3"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      Blank passwords allow a user to login without using a password.
    rationale: >
      Without a password only knowing the username and the list of allowed hosts
      will allow someone to connect to the server and assume the identity of the
      user. This, in effect, bypasses authentication mechanisms.
    audit_procedure: >
      Execute the following SQL query to determine if any users have a blank
      password: SELECT User,host FROM mysql.user WHERE (plugin
      IN('mysql_native_password', 'mysql_old_password','') AND
      (LENGTH(authentication_string) = 0 OR authentication_string IS NULL)) OR
      (plugin='sha256_password' AND LENGTH(authentication_string) = 0); No rows will
      be returned if all accounts have a password set.
    remediation: >
      For each row returned from the audit procedure, reset the password for the
      given user using the following statement (as an example): ALTER USER
      <user>@<host> IDENTIFIED BY RANDOM PASSWORD PASSWORD EXPIRE; This resets the
      password temporarily to a RANDOM string and returns that temporary password as
      a result. The user can then use this temporary password to login and is forced
      to set the password to one of their choosing upon login. Note: Replace <user>
      , <host> with appropriate values. References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/assigning-passwords.html
    references: >
