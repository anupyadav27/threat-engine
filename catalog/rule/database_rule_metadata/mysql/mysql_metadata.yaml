  - rule_id: mysql.cis.10.all_group_replication_traffic_is_secured
    title: "Ensure All Group Replication Traffic is Secured"
    severity: high
    category: database
    tech_type: mysql
    automation_type: manual
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "10.1"
    cis_section: "10"
    profile_applicability: "Level 1"
    description: >
      MySQL Group communication connections and distributed recovery connections can
      be secured using SSL.
    rationale: >
      SSL encryption ensures data cannot be seen over the network for Group
      Replication.
    audit_procedure: >
      Using MySQL InnoDB Cluster admin api: Run shell mysql-js> var cluster =
      dba.getCluster() mysql-js> cluster.status() { 'clusterName': 'testCluster',
      'defaultReplicaSet': { 'name': 'default', 'primary': 'localhost:3320', 'ssl':
      'REQUIRED', 'status': 'OK', ssl should not be DISABLED. Run the following
      statement from mysql client: select @@group_replication_ssl_mode; If DISABLED
      communication is not secure it is a finding. REQUIRED, VERIFY_CA, or
      VERIFY_IDENTITY - indicate SSL is required.
    remediation: >
      Edit my.cnf and set group_replication_ssl_mode, for example:
      group_replication_ssl_mode=REQUIRED Acceptable values are: • REQUIRED -
      Establish a secure connection if the server supports secure connections. •
      VERIFY_CA - Like REQUIRED, but additionally verify the server TLS certificate
      against the configured Certificate Authority (CA) certificates. •
      VERIFY_IDENTITY - Like VERIFY_CA, but additionally verify that the server
      certificate matches the host to which the connection is being established.
      References: 1. https://dev.mysql.com/doc/refman/8.4/en/group-replication-
      secure-socket-layer- support-ssl.html
    references: >
      1. https://dev.mysql.com/doc/refman/8.4/en/group-replication-secure-socket-
      layer- support-ssl.html
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_MYSQL_8_4_enterprise_v1_0_0_10_1"
