  - rule_id: mysql.cis.5.proper_use_of_allow_nonexistent_definer
    title: "Ensure Proper Use Of ALLOW_NONEXISTENT_DEFINER"
    severity: high
    category: database
    tech_type: mysql
    automation_type: manual
    cis_benchmark: "CIS_MYSQL 8.4_enterprise_v1.0.0"
    cis_version: "8.4_enterprise_v1.0.0"
    cis_control: "5.12"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      Its critical to limit users ability to set and effective authorization ID that
      is used with executing a view or stored program. This grant provides a method
      to escalate privileges within MySQL views and procedures. A user with this
      privilege can specify an non- existing account as the DEFINER attribute for
      CREATE PROCEDURE, CREATE FUNCTION, CREATE TRIGGER, CREATE EVENT, ALTER EVENT,
      CREATE VIEW, and ALTER VIEW. Later a user with escalated privileges could be
      created, providing unintended access rights which can be improperly used. This
      permission is often needed temporarily when performing database migration.
      Once a migration is complete this permission is typically no longer necessary
      and should be removed.
    rationale: >
      Enabling a user to create a view, stored procedure or function and later
      create a user that improperly escalates privileges may provide unintended
      access rights which can be improperly used.
    audit_procedure: >
      Execute the following SQL statements to audit this setting: SELECT GRANTEE
      FROM INFORMATION_SCHEMA.USER_PRIVILEGES WHERE PRIVILEGE_TYPE =
      ‘ALLOW_NONEXISTENT_DEFINER’; Ensure only administrative users are returned in
      the result set.
    remediation: >
      Perform the following steps to remediate this setting: 1. Enumerate the non-
      administrative users found in the result set of the audit procedure 2. For
      each user, issue the following SQL statement (replace with the non-
      administrative user): REVOKE ALLOW_NONEXISTENT_DEFINER ON *.* FROM '<user>';
      References: 1. https://dev.mysql.com/doc/refman/8.4/en/privileges-
      provided.html#priv_allow- nonexistent-definer
    references: >
      1. https://dev.mysql.com/doc/refman/8.4/en/privileges-
      provided.html#priv_allow- nonexistent-definer
