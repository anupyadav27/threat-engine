  - rule_id: postgresql.cis.2.file_permissions_mask_is_correct
    title: "Ensure the file permissions mask is correct"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: manual
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "2.1"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Files are always created using a default set of permissions. File permissions
      can be restricted by applying a permissions mask called the umask . The
      postgres user account should use a umask of 0077 to deny file access to all
      user accounts except the owner.
    rationale: >
      The Linux OS defaults the umask to 0022, which means the owner and primary
      group can read and write the file, and other accounts are permitted to read
      the file. Not explicitly setting the umask to a value as restrictive as 0077
      allows other users to read, write, or even execute files and scripts created
      by the postgres user account. The alternative to using a umask is explicitly
      updating file permissions after file creation using the command line utility
      chmod (a manual and error-prone process that is not advised).
    audit_procedure: >
      To view the mask's current setting, execute the following commands: # whoami
      root # su - postgres # whoami postgres # umask 0022 The umask must be 0077 or
      more restrictive for the postgres user, otherwise, this is a fail.
    remediation: >
      Depending upon the postgres user's environment, the umask is typically set in
      the initialization file .bash_profile, but may also be set in .profile or
      .bashrc. To set the umask, add the following to the appropriate profile file:
      # whoami postgres # cd ~ # ls -ld .{bash_profile,profile,bashrc} ls: cannot
      access .profile: No such file or directory ls: cannot access .bashrc: No such
      file or directory -rwx------. 1 postgres postgres 267 Aug 14 12:59
      .bash_profile # echo 'umask 077' >> .bash_profile # source .bash_profile #
      umask 0077 Default Value: 0022 References: 1. https://man7.org/linux/man-
      pages/man2/umask.2.html 2. https://man7.org/linux/man-pages/man1/umask.1p.html
    references: >
      1. https://man7.org/linux/man-pages/man2/umask.2.html 2.
      https://man7.org/linux/man-pages/man1/umask.1p.html
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_POSTGRESQL_17_v1_0_0_2_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
