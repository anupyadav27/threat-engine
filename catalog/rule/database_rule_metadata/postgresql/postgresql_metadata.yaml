rules:

  - rule_id: postgresql.cis.1.packages_are_obtained_from_authorized_repositories
    title: "Ensure packages are obtained from authorized repositories"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: manual
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "1.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Standard Linux distributions, although possessing the requisite packages,
      often do not have PostgreSQL pre-installed. The installation process includes
      installing the binaries and the means to generate a data cluster. Package
      installation should include both the server and client packages. Contribution
      modules are optional depending upon one's architectural requirements (they are
      recommended though). When obtaining and installing software packages
      (typically via dnf or apt), it's imperative that packages are sourced only
      from valid and authorized repositories. For PostgreSQL, the canonical
      repositories are the official PostgreSQL YUM repository (yum.postgresql.org)
      and the official PostgreSQL APT repository (apt.postgresql.org). Your chosen
      PostgreSQL vendor may offer its own software repositories as well.
    rationale: >
      Being open-source, PostgreSQL packages are widely available across the
      internet through package aggregators and providers. However, using invalid or
      unauthorized sources for packages can lead to implementing untested,
      defective, or malicious software. Many organizations choose to implement a
      local software repository within their organization. Care must be taken to
      ensure that only valid and authorized packages are downloaded and installed
      into such local repositories. From a security perspective, it's imperative to
      verify the PostgreSQL binary packages are sourced from a valid software
      repository. For a complete listing of all PostgreSQL binaries available via
      configured repositories inspect the output from dnf provides '*libpq.so' or
      apt-file search /usr/pgsql-1*/lib/libpq.so.5.
    audit_procedure: >
      Identify and inspect configured repositories to ensure they are all valid and
      authorized sources of packages. The following is an example of a simple RHEL 9
      install illustrating the use of the dnf repolist all command. # whoami root #
      dnf repolist all | grep -E 'enabled$' rhel-9-for-x86_64-appstream-rpms Red Hat
      Enterprise enabled rhel-9-for-x86_64-baseos-rpms Red Hat Enterprise enabled #
      Ensure the list of configured repositories only includes organization-approved
      repositories. If any unapproved repositories are listed, this is a fail. To
      inspect what versions of PostgreSQL packages are currently installed, we can
      query using the rpm commands. As illustrated below, no PostgreSQL packages are
      installed: # whoami root # rpm -qa | grep postgres # If packages were returned
      in the above, we can determine from which repo they came by combining dnf and
      rpm: # whoami root # dnf info $(rpm -qa|grep postgres) | grep -E
      '^Name|^Version|^From' Name : postgresql1* Version : 1*.0 From repo : pgdg1*
      Name : postgresql1*-contrib Version : 1*.0 From repo : pgdg1* Name :
      postgresql1*-libs Version : 1*.0 From repo : pgdg1* Name : postgresql1*-server
      Version : 1*.0 From repo : pgdg1* If the expected binary packages are not
      installed, are not the expected versions, or did not come from an appropriate
      repo, this is a fail.
    remediation: >
      Alter the configured repositories so they only include valid and authorized
      sources of packages. As an example of adding an authorized repository, we will
      install the PGDG repository RPM from 'yum.postgresql.org': # whoami root # dnf
      install -y https://download.postgresql.org/pub/repos/yum/reporpms/EL-9-
      x86_64/pgdg-redhat-repo-latest.noarch.rpm Last metadata expiration check:
      0:01:35 ago on Mon 03 Oct 2022 01:19:37 PM EDT. [snip] Installed: pgdg-redhat-
      repo-42.0-46.noarch Complete! # whoami root # dnf repolist all | egrep
      'enabled$' pgdg-common PostgreSQ enabled pgdg12 PostgreSQ enabled pgdg13
      PostgreSQ enabled pgdg14 PostgreSQ enabled pgdg15 PostgreSQ enabled pgdg16
      PostgreSQ enabled pgdg17 PostgreSQ enabled rhel-9-for-x86_64-appstream-rpms
      Red Hat E enabled rhel-9-for-x86_64-baseos-rpms Red Hat E enabled If the
      version of PostgreSQL installed is not 1*.x or they did not come from a valid
      repository, the packages may be uninstalled using this command: # whoami root
      # dnf remove $(rpm -qa|grep postgres) To install the PGDG RPMs for PostgreSQL
      1*.x, run: # whoami root # dnf install -y postgresql17-{server,contrib} <snip>
      Installed: <snip> postgresql17-17.0-1PGDG.rhel9.x86_64
      postgresql17-contrib-17.0- 1PGDG.rhel9.x86_64
      postgresql17-libs-17.0-1PGDG.rhel9.x86_64 postgresql17-server-17.0-
      1PGDG.rhel9.x86_64 Complete! References: 1.
      https://en.wikipedia.org/wiki/DNF_(software) 2.
      https://en.wikipedia.org/wiki/APT_(software) 3. https://yum.postgresql.org 4.
      https://apt.postgresql.org
    references: >
      1. https://en.wikipedia.org/wiki/DNF_(software) 2.
      https://en.wikipedia.org/wiki/APT_(software) 3. https://yum.postgresql.org 4.
      https://apt.postgresql.org
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_POSTGRESQL_17_v1_0_0_1_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_postgresql_17_v1_0_0_1_1"
