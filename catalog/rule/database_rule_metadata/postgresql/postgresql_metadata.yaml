  - rule_id: postgresql.cis.3.log_line_prefix_is_set_correctly
    title: "Ensure 'log_line_prefix' is set correctly"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: automated
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "3.1.24"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The log_line_prefix setting specifies a printf-style string that is prefixed
      to each log line. If blank, no prefix is used. You should configure this as
      recommended by the pgBadger development team unless directed otherwise by your
      organization's logging policy. % characters begin 'escape sequences' that are
      replaced with status information as outlined below. Unrecognized escapes are
      ignored. Other characters are copied straight to the logline. Some escapes are
      only recognized by session processes and will be treated as empty by
      background processes such as the main server process. Status information may
      be aligned either left or right by specifying a numeric literal after the %
      and before the option. A negative value will cause the status information to
      be padded on the right with spaces to give it a minimum width, whereas a
      positive value will pad on the left. Padding can be useful to aid human
      readability in log files. Any of the following escape sequences can be used:
      %a = application name %u = user name %d = database name %r = remote host and
      port %h = remote host %b = backend type %p = process ID %P = process ID of
      parallel group leader %t = timestamp without milliseconds %m = timestamp with
      milliseconds %n = timestamp with milliseconds (as a Unix epoch) %Q = query ID
      (0 if none or not computed) %i = command tag %e = SQL state %c = session ID %l
      = session line number %s = session start timestamp %v = virtual transaction ID
      %x = transaction ID (0 if none) %q = stop here in non-session processes %% =
      '%'
    rationale: >
      Properly setting log_line_prefix allows for adding additional information to
      each log entry (such as the user, or the database). Said information may then
      be of use in auditing or security reviews.
    audit_procedure: >
      Execute the following SQL statement to verify the setting is correct:
      postgres=# show log_line_prefix; log_line_prefix ----------------- %m [%p] (1
      row) If the prefix does not at a minimum include '%m [%r] [%p]: [l-%l]
      %u@%d,app=%a,e=%e ' (for non-Syslog logging), this is a fail. For Syslog
      logging, the prefix should include user=%u,db=%d,app=%a,client=%h.
    remediation: >
      Execute the following SQL statement(s) to remediate this setting: postgres=#
      alter system set log_line_prefix = '%m [%r] [%p]: [l-%l] %u@%d,app=%a,e=%e ';
      ALTER SYSTEM postgres=# select pg_reload_conf(); pg_reload_conf
      ---------------- t (1 row) Default Value: %m [%p] References: 1.
      https://pgbadger.darold.net/ 2.
      https://www.postgresql.org/docs/current/static/runtime-config-logging.html
    references: >
      1. https://pgbadger.darold.net/ 2.
      https://www.postgresql.org/docs/current/static/runtime-config-logging.html
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_POSTGRESQL_17_v1_0_0_3_1_24"
      nist_800_53: []
      soc2: []
      pci_dss: []
