  - rule_id: postgresql.cis.1.install_only_required_packages
    title: "Install only required packages"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: manual
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "1.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Depending on the distribution, several other packages next to the mandatory
      postgresql might have been installed upon a system. Typical add-on packages
      are: • postgresql-doc: PostgreSQL documentation. • phppgadmin: PostgreSQL web-
      based administration tool. • ...
    rationale: >
      Unused packages can increase the potential attack surface of the system.
    audit_procedure: >
      On Debian, one can use the following command to see a complete list of the
      available packages. apt search postgresql RHEL: dnf search postgresql
    remediation: >
      Examine the installed packages: Debian dpkg -l $(apt-cache search postgresql
      --names-only| awk '{print $1}') 2>&1 | grep -v 'no packages found' RHEL: rpm
      -q $(dnf search postgresql | cut -d: -f1 | cut -d. -f1) 2>&1 | grep -Ev
      'package.*is not installed' Remove any identified packages that are undesired:
      Debian: apt purge <pkg> RHEL: dnf erase <pkg>
