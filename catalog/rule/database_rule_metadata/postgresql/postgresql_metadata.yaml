  - rule_id: postgresql.cis.5.password_complexity_is_configured
    title: "Ensure Password Complexity is configured"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: manual
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "5.6"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      Password complexity configuration is crucial to restrict unauthorized access
      to data. By default, PostgreSQL doesn’t provide for password complexity.
      Moreover, many compliance frameworks such as PCI DSS, and HIPPA require both
      password complexity and length. It is worth stating that the NIST 800-63B
      Password Guidelines publication is a good reference of authentication
      management.
    rationale: >
      Having strong password management for your locally-authenticated PostgreSQL
      accounts will protect against attackers' brute force techniques. This is
      important especially if external authentication is not possible to implement
      due to application requirements or restrictions.
    audit_procedure: >
      Check parameter values of both shared_preload_libraries and
      dynamic_library_path postgres=# SHOW shared_preload_libraries;
      shared_preload_libraries -------------------------- set_user,pgaudit (1 row)
      postgres=# SHOW dynamic_library_path; dynamic_library_path
      ---------------------- $libdir (1 row) If $libdir/passwordcheck is not listed
      in shared_preload_libraries this is a failure (based on $libdir being returned
      for dynamic_library_path).
    remediation: >
      Next, we need to alter the postgresql.conf configuration file to enable
      passwordcheck as an extension in the shared_preload_libraries parameter and
      restart the PostgreSQL service: # whoami root # vi
      ~postgres/17/data/postgresql.conf Find the shared_preload_libraries entry, and
      add passwordcheck to it (preserving any existing entries):
      shared_preload_libraries = '$libdir/passwordcheck' OR shared_preload_libraries
      = 'pgaudit,$libdir/passwordcheck,somethingelse' Restart the PostgreSQL server
      for changes to take affect: # whoami root # systemctl restart postgresql-17 #
      systemctl status postgresql-17|grep 'ago$' Active: active (running) since
      [date] 10s ago References: 1.
      https://www.postgresql.org/docs/current/passwordcheck.html Additional
      Information: Note that the passwordcheck functionality is actually of little
      value. Please see the 'caution' notice in the documentation.
    references: >
