  - rule_id: postgresql.cis.6.tlsv1_0_and_tlsv1_1_protocols_are_disabled
    title: "Ensure the TLSv1.0 and TLSv1.1 Protocols are Disabled"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: automated
    cis_benchmark: "CIS_POSTGRESQL 16_v1.1.0"
    cis_version: "16_v1.1.0"
    cis_control: "6.9"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Transport Layer Security (TLS), and its predecessor Secure Sockets Layer (SSL)
      are cryptographic protocols which can be used to encrypt data sent between
      client and server.
    rationale: >
      The TLSv1.0 protocol is vulnerable to the BEAST attack when used in CBC mode
      (October 2011). TLSv1.0 uses CBC modes for all of the block mode ciphers,
      which only leaves the RC4 streaming cipher which is also weak and therefore
      not recommended. Therefore, it is recommended that the TLSv1.0 protocol is
      disabled. The TLSv1.1 protocol does not support Authenticated Encryption with
      Associated Data (AEAD) which is designed to simultaneously provide
      confidentiality, integrity, and authenticity. All major up-to-date browsers
      support TLSv1.2, and most recent versions of Firefox and Chrome support the
      newer TLSv1.3 protocol, since 2017. IETF deprecated TLSv1.0 and TLSv1.1 in
      March 2021 (see RFC 8996 ).
    audit_procedure: >
      1. Execute the following command SHOW ssl_min_protocol_version; 2. Check the
      output to verify that the ssl_min_protocol_version directive is set to either
      TLSv1.2 or TLSv1.3 (preferred).
    remediation: >
      Adjust the ssl_min_protocol_version to at least TLSv1.2: ALTER SYSTEM SET
      ssl_min_protocol_version = 'TLSv1.2'; or (preferred): ALTER SYSTEM SET
      ssl_min_protocol_version = 'TLSv1.3'; In either case, make the change active:
      SELECT pg_reload_conf(); SHOW ssl_min_protocol_version; References: 1.
      https://ssl-config.mozilla.org/
    references: >
      1. https://ssl-config.mozilla.org/
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_POSTGRESQL_16_v1_1_0_6_9"
      nist_800_53: []
      soc2: []
      pci_dss: []
