  - rule_id: postgresql.cis.3.log_timezone_is_set_correctly
    title: "Ensure 'log_timezone' is set correctly"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: automated
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "3.1.26"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The log_timezone setting specifies the time zone to use in timestamps within
      log messages. This value is cluster-wide, so that all sessions will report
      timestamps consistently. Unless directed otherwise by your organization's
      logging policy, set this to either GMT or UTC.
    rationale: >
      Log entry timestamps should be configured for an appropriate time zone as
      defined by your organization's logging policy to ensure a lack of confusion
      around when a logged event occurred. Note that this setting affects only the
      timestamps present in the logs. It does not affect the time zone in use by the
      database itself (for example, select now()), nor does it affect the host's
      time zone.
    audit_procedure: >
      Execute the following SQL statement: postgres=# show log_timezone;
      log_timezone -------------- US/Eastern (1 row) If log_timezone is not set to
      GMT, UTC, or as defined by your organization's logging policy this is a fail.
    remediation: >
      Execute the following SQL statement(s) to remediate this setting: postgres=#
      alter system set log_timezone = 'UTC'; ALTER SYSTEM postgres=# select
      pg_reload_conf(); pg_reload_conf ---------------- t (1 row) postgres=# show
      log_timezone; log_timezone -------------- UTC (1 row) Default Value: By
      default, the PGDG packages will set this to match the server's timezone in the
      Operating System. References: 1.
      https://www.postgresql.org/docs/current/static/runtime-config-logging.html 2.
      https://en.wikipedia.org/wiki/Time_zone
