  - rule_id: postgresql.cis.2.extension_directory_has_appropriate_ownership_and
    title: "Ensure extension directory has appropriate ownership and permissions"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: automated
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "2.2"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The extension directory is the location of the PostgreSQL extensions.
      Extensions are storage engines or user defined functions (UDFs).
    rationale: >
      Limiting the accessibility of these objects will protect the confidentiality,
      integrity, and availability of the PostgreSQL database. If someone can modify
      extensions, then these extensions can be used to execute illicit instructions.
    audit_procedure: >
      Determine the PostgreSQL share directory: # whoami root #
      /usr/pgsql-17/bin/pg_config --sharedir /usr/pgsql-17/share The extension
      directory, lives under that share directory: # whoami root # ls -ld
      $(/usr/pgsql-17/bin/pg_config --sharedir)/extension This should return: drwxr-
      xr-x 1 root root 12288 Oct 7 14:27 /usr/pgsql-17/share/extension Any
      differences in permissions (the first field) is a failure.
    remediation: >
      If needed, correct the permissions on the extension dir by executing: # whoami
      root # chown -c root:root $(/usr/pgsql-17/bin/pg_config --sharedir)/extension
      # chmod -c 0755 $(/usr/pgsql-17/bin/pg_config --sharedir)/extension If the
      permissions needed correct, it is imperative that all extensions found in
      $(/usr/pgsql-17/bin/pg_config --sharedir)/extension are evaluated to ensure
      they have not been modified!
    references: >
      
    impact: >
      
