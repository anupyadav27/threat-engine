  - rule_id: postgresql.cis.5.do_not_specify_passwords_in_the_command_line
    title: "Do Not Specify Passwords in the Command Line"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: manual
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "5.1"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      When a command is executed on the command line, for example • psql
      postgresql://postgres:PASSWORD@host the password may be visible in the user's
      shell/command history or in the process list, thus exposing the password to
      other entities on the server.
    rationale: >
      If the password is visible in the process list or user's shell/command
      history, an attacker will be able to access the PostgreSQL database using the
      stolen credentials.
    audit_procedure: >
      • Check the process or task list if the password is visible. # whoami root #
      ps -few • Check the shell or command history if the password is visible. #
      history
    remediation: >
      1. Use the --password or -W terminal parameter without directly specifying the
      password and then enter the password when prompted. Substitute <user> with
      your username, e.g., root: psql -u <user> --password 2. Do not use a
      Connection URI with password included, e.g. psql
      postgresql://postgres:PASSWORD@host 3. If desired, configure a .pgpass file
      with the proper credentials and secure the file appropriately. References: 1.
      https://www.postgresql.org/docs/current/libpq-connect.html#LIBPQ-CONNECT-
      PASSWORD
    references: >
      1. https://www.postgresql.org/docs/current/libpq-connect.html#LIBPQ-CONNECT-
      PASSWORD
