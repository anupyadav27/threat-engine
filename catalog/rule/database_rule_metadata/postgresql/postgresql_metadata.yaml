  - rule_id: postgresql.cis.5.login_via_local_unix_domain_socket_is_configured
    title: "Ensure login via 'local' UNIX Domain Socket is configured correctly"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: manual
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "5.3"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      A remote host login, via SSH, is arguably the most secure means of remotely
      accessing and administering the PostgreSQL server. Once connected to the
      PostgreSQL server, using the psql client, via UNIX DOMAIN SOCKETS, while using
      the peer authentication method is the most secure mechanism available for
      local database connections. Provided a database user account of the same name
      of the UNIX account has already been defined in the database, even ordinary
      user accounts can access the cluster in a similarly highly secure manner.
    rationale: >
      
    audit_procedure: >
      Newly created data clusters are empty of data and have only one user account,
      the superuser (postgres). By default, the data cluster superuser is named
      after the UNIX account. Login authentication is tested via UNIX DOMAIN SOCKETS
      by the UNIX user account postgres, the default account, and set_user has not
      yet been configured: # whoami postgres # psql postgres postgres=# Login
      attempts by another UNIX user account as the superuser should be denied: # su
      - user1 # whoami user1 # psql -U postgres -d postgres psql: FATAL: Peer
      authentication failed for user 'postgres' # exit This test demonstrates that
      not only is logging in as the superuser blocked, but so is logging in as
      another user: # su - user2 # whoami user2 # psql -U postgres -d postgres psql:
      FATAL: Peer authentication failed for user 'postgres' # psql -U user1 -d
      postgres psql: FATAL: Peer authentication failed for user 'user1' # psql -U
      user2 -d postgres postgres=>
    remediation: >
      Creation of a database account that matches the local account allows PEER
      authentication: # psql -c 'CREATE ROLE user1 WITH LOGIN;' CREATE ROLE Execute
      the following as the UNIX user account, the default authentication rules
      should now permit the login: # su - user1 # whoami user1 # psql -u user1 -d
      postgres postgres=> As per the host-based authentication rules in
      $PGDATA/pg_hba.conf, all login attempts via UNIX DOMAIN SOCKETS are processed
      on the line beginning with local. This is the minimal rule that must be in
      place allowing PEER connections: # TYPE DATABASE USER ADDRESS METHOD local all
      all peer Once edited, the server process must reload the authentication file
      before it can take effect. Improperly configured rules cannot update i.e. the
      old rules remain in place. The PostgreSQL logs will report the outcome of the
      SIGHUP: postgres=# select pg_reload_conf(); pg_reload_conf ---------------- t
      (1 row) The following examples illustrate other possible configurations. The
      resultant 'rule' of success/failure depends upon the first matching line: #
      allow only postgres user logins locally via UNIX socket # TYPE DATABASE USER
      ADDRESS METHOD local all postgres peer # allow all local users via UNIX socket
      # TYPE DATABASE USER ADDRESS METHOD local all all peer # allow all local
      users, via UNIX socket, only if they are connecting to a db named the same as
      their username # e.g. if user 'bob' is connecting to a db named 'bob' # TYPE
      DATABASE USER METHOD local samerole all peer # allow only local users, via
      UNIX socket, who are members of the 'rw' role in the db # TYPE DATABASE USER
      ADDRESS METHOD local all +rw peer References: 1.
      https://www.postgresql.org/docs/current/static/client-authentication.html 2.
      https://www.postgresql.org/docs/current/static/auth-pg-hba-conf.html
    references: >
      1. https://www.postgresql.org/docs/current/static/client-authentication.html
      2. https://www.postgresql.org/docs/current/static/auth-pg-hba-conf.html
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_POSTGRESQL_17_v1_0_0_5_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
