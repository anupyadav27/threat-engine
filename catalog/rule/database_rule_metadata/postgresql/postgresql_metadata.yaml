  - rule_id: postgresql.cis.3.log_file_destination_directory_is_set_correctly
    title: "Ensure the log file destination directory is set correctly"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: automated
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "3.1.4"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The log_directory setting specifies the destination directory for log files
      when log_destination is stderr or csvlog. It can be specified as relative to
      the cluster data directory ($PGDATA) or as an absolute path. log_directory
      should be set according to your organization's logging policy.
    rationale: >
      If log_directory is not set, it is interpreted as the absolute path '/' and
      PostgreSQL will attempt to write its logs there (and typically fail due to a
      lack of permissions to that directory). This parameter should be set to direct
      the logs into the appropriate directory location as defined by your
      organization's logging policy.
    audit_procedure: >
      Execute the following SQL statement to confirm that the expected logging
      directory is specified: postgres=# show log_directory; log_directory
      --------------- log (1 row) Note: This shows a path relative to the cluster's
      data directory. An absolute path would start with a / like the following:
      /var/log/pg_log
    remediation: >
      Execute the following SQL statement(s) to remediate this setting: postgres=#
      alter system set log_directory='/var/log/postgres'; ALTER SYSTEM postgres=#
      select pg_reload_conf(); pg_reload_conf ---------------- t (1 row) postgres=#
      show log_directory; log_directory --------------- /var/log/postgres (1 row)
      Note: The use of /var/log/postgres, above, is an example. This should be set
      to an appropriate path as defined by your organization's logging requirements.
      Having said that, it is a good idea to have the logs outside of your PGDATA
      directory so that they are not included by things like pg_basebackup or
      pgBackRest. Default Value: log which is relative to the cluster's data
      directory (e.g. /var/lib/pgsql/ <pgmajorversion> /data/log) References: 1.
      https://www.postgresql.org/docs/current/runtime-config-logging.html
    references: >
      1. https://www.postgresql.org/docs/current/runtime-config-logging.html
