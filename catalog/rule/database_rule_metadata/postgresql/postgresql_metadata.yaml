  - rule_id: postgresql.cis.3.correct_syslog_facility_is_selected
    title: "Ensure the correct syslog facility is selected"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: manual
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "3.1.10"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The syslog_facility setting specifies the syslog 'facility' to be used when
      logging to syslog is enabled. You can choose from any of the 'local'
      facilities: • LOCAL0 • LOCAL1 • LOCAL2 • LOCAL3 • LOCAL4 • LOCAL5 • LOCAL6 •
      LOCAL7 Your organization's logging policy should dictate which facility to use
      based on the syslog daemon in use.
    rationale: >
      If not set to the appropriate facility, the PostgreSQL log messages may be
      intermingled with other applications' log messages, incorrectly routed, or
      potentially dropped (depending on your syslog configuration).
    audit_procedure: >
      Execute the following SQL statement and verify that the correct facility is
      selected: postgres=# show syslog_facility; syslog_facility -----------------
      local0 (1 row)
    remediation: >
      Execute the following SQL statement(s) to remediate this setting (in this
      example, setting it to the LOCAL1 facility): postgres=# alter system set
      syslog_facility = 'LOCAL1'; ALTER SYSTEM postgres=# select pg_reload_conf();
      pg_reload_conf ---------------- t (1 row) Default Value: LOCAL0 References: 1.
      https://tools.ietf.org/html/rfc3164#section-4.1.1 2.
      https://www.postgresql.org/docs/current/static/runtime-config-logging.html
    references: >
      1. https://tools.ietf.org/html/rfc3164#section-4.1.1 2.
      https://www.postgresql.org/docs/current/static/runtime-config-logging.html
    impact: >
      
