  - rule_id: postgresql.cis.3.correct_messages_are_written_to_the_server_log
    title: "Ensure the correct messages are written to the server log"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: automated
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "3.1.14"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The log_min_messages setting specifies the message levels that are written to
      the server log. Each level includes all the levels that follow it. The lower
      the level (vertically, below), the fewer messages are logged. Valid values
      are: • DEBUG5 <-- exceedingly chatty • DEBUG4 • DEBUG3 • DEBUG2 • DEBUG1 •
      INFO • NOTICE • WARNING <-- default • ERROR • LOG • FATAL • PANIC <--
      practically mute WARNING is considered the best practice unless indicated
      otherwise by your organization's logging policy.
    rationale: >
      If this is not set to the correct value, too many or too few messages may be
      written to the server log.
    audit_procedure: >
      Execute the following SQL statement to confirm the setting is correct:
      postgres=# show log_min_messages; log_min_messages ------------------ warning
      (1 row) If logging is not configured to at least warning, this is a fail.
    remediation: >
      Execute the following SQL statement(s) as superuser to remediate this setting
      (in this example, to set it to warning): postgres=# alter system set
      log_min_messages = 'warning'; ALTER SYSTEM postgres=# select pg_reload_conf();
      pg_reload_conf ---------------- t (1 row) Default Value: WARNING References:
      1. https://www.postgresql.org/docs/current/static/runtime-config-logging.html
    references: >
