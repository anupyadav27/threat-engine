  - rule_id: postgresql.cis.6.tlsv1_3_or_later_is_configured
    title: "Ensure that TLSv1.3, or later, is configured"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: automated
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "6.9"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Transport Layer Security (TLS), and its predecessor Secure Sockets Layer (SSL)
      are cryptographic protocols which can be used to encrypt data sent between
      client and server.
    rationale: >
      The TLSv1.0 protocol is vulnerable to the BEAST attack when used in CBC mode
      (October 2011). TLSv1.0 uses CBC modes for all of the block mode ciphers,
      which only leaves the RC4 streaming cipher which is also weak and therefore
      not recommended. As such, it is recommended that the TLSv1.0 protocol is
      disabled. The TLSv1.1 protocol does not support Authenticated Encryption with
      Associated Data (AEAD) which is designed to simultaneously provide
      confidentiality, integrity, and authenticity ad should therefore be disabled.
      The TLSv1.2 protocol includes a number of older vulnerable cryptographic
      algorithms and lacks quantum secure algorithms. It should only be used in
      situations where TLSv1.3 cannot be used. The TLSv1.3 removes older, known
      vulnerable, cryptographic algorithms, is much faster, and incorporates quantum
      secure algorithms. It should be deployed by default where possible. IETF
      deprecated TLSv1.0 and TLSv1.1 in March 2021 (see RFC 8996 ).
    audit_procedure: >
      1. Execute the following command postgres=# SHOW ssl_min_protocol_version;
      ssl_min_protocol_version -------------------------- TLSv1.2 (1 row) 2. Check
      the output to verify that the ssl_min_protocol_version directive is set to
      TLSv1.3.
    remediation: >
      Adjust the ssl_min_protocol_version to at least TLSv1.3: postgres=# ALTER
      SYSTEM SET ssl_min_protocol_version = 'TLSv1.3'; ALTER SYSTEM Make the change
      active: postgres=# SELECT pg_reload_conf(); pg_reload_conf ---------------- t
      (1 row) postgres=# SHOW ssl_min_protocol_version; ssl_min_protocol_version
      -------------------------- TLSv1.3 (1 row) References: 1. https://ssl-
      config.mozilla.org/
    references: >
      1. https://ssl-config.mozilla.org/
    impact: >
      
