    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      When logging_collector is enabled, the log_rotation_age parameter determines
      the maximum lifetime of an individual log file (depending on the value of
      log_filename). After this many minutes have elapsed, a new log file will be
      created via automatic log file rotation. Current best practices advise log
      rotation at least daily, but your organization's logging policy should dictate
      your rotation schedule.
    rationale: >
      Log rotation is a standard best practice for log management.
    audit_procedure: >
      Execute the following SQL statement to verify the log rotation age is set to
      an acceptable value: postgres=# show log_rotation_age; log_rotation_age
      ------------------ 1d
    remediation: >
      Execute the following SQL statement(s) to remediate this setting (in this
      example, setting it to one hour): postgres=# alter system set
      log_rotation_age='1h'; ALTER SYSTEM postgres=# select pg_reload_conf();
      pg_reload_conf ---------------- t (1 row) Default Value: 1d (one day)
      References: 1. https://www.postgresql.org/docs/current/static/runtime-config-
      logging.html
    references: >
