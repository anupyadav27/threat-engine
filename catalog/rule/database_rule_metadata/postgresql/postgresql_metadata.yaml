  - rule_id: postgresql.cis.1.systemd_service_files_are_enabled
    title: "Ensure systemd Service Files Are Enabled"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: automated
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "1.3"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Confirm, and correct if necessary, the PostgreSQL systemd service is enabled.
    rationale: >
      Enabling the systemd service on the OS ensures the database service is active
      when a change of state occurs as in the case of a system startup or reboot.
    audit_procedure: >
      Confirm the PostgreSQL service is enabled by executing the following: $ whoami
      root $ systemctl is-enabled postgresql-17.service disabled If the intended
      PostgreSQL service is not registered as a dependency (or 'want') of the
      default target (anything other than 'enabled' is returned), this is a failure.
    remediation: >
      Irrespective of package source, PostgreSQL services can be identified because
      it typically includes the text string 'postgresql'. PGDG installs do not
      automatically register the service as a 'want' of the default systemd target.
      Multiple instances of PostgreSQL services often distinguish themselves using a
      version number. # whoami root # systemctl enable postgresql-17 Created symlink
      /etc/systemd/system/multi-user.target.wants/postgresql- 17.service →
      /usr/lib/systemd/system/postgresql-17.service. # systemctl is-enabled
      postgresql-17.service enabled References: 1. https://man7.org/linux/man-
      pages/man1/systemctl.1.html 2.
      https://www.freedesktop.org/software/systemd/man/systemd.special.html
    references: >
      1. https://man7.org/linux/man-pages/man1/systemctl.1.html 2.
      https://www.freedesktop.org/software/systemd/man/systemd.special.html
