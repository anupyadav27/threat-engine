  - rule_id: postgresql.cis.6.fips_140_2_openssl_cryptography_is_used
    title: "Ensure FIPS 140-2 OpenSSL Cryptography Is Used"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: automated
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "6.7"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Install, configure, and use OpenSSL on a platform that has a NIST certified
      FIPS 140-2 installation of OpenSSL. This provides PostgreSQL instances the
      ability to generate and validate cryptographic hashes to protect unclassified
      information requiring confidentiality and cryptographic protection, in
      accordance with the data owner's requirements.
    rationale: >
      Federal Information Processing Standard (FIPS) Publication 140-2 is a computer
      security standard developed by a U.S. Government and industry working group
      for validating the quality of cryptographic modules. Use of weak, or untested,
      encryption algorithms undermines the purposes of utilizing encryption to
      protect data. PostgreSQL uses OpenSSL for the underlying encryption layer. The
      database and application must implement cryptographic modules adhering to the
      higher standards approved by the federal government since this provides
      assurance they have been tested and validated. It is the responsibility of the
      data owner to assess the cryptography requirements in light of applicable
      federal laws, Executive Orders, directives, policies, regulations, and
      standards. For detailed information, refer to NIST FIPS Publication 140-2,
      Security Requirements for Cryptographic Modules . Note that the product's
      cryptographic modules must be validated and certified by NIST as FIPS-
      compliant. The security functions validated as part of FIPS 140-2 for
      cryptographic modules are described in FIPS 140-2 Annex A. Currently, only Red
      Hat Enterprise Linux is certified as a FIPS 140-2 distribution of OpenSSL. For
      other operating systems, users must obtain or build their own FIPS 140- 2
      OpenSSL libraries.
    audit_procedure: >
      If PostgreSQL is not installed on Red Hat Enterprise Linux (RHEL), CentOS, or
      Rocky Linux then FIPS cannot be enabled natively. Otherwise, the deployment
      must incorporate a custom build of the operating system. As the system
      administrator, run the following to see if FIPS is enabled: # whoami root #
      fips-mode-setup --check Installation of FIPS modules is not completed. FIPS
      mode is disabled. If FIPS mode is enabled is not displayed, then the system is
      not FIPS enabled and this is a fail.
    remediation: >
      Configure OpenSSL to be FIPS compliant as PostgreSQL uses OpenSSL for
      cryptographic modules. To configure OpenSSL to be FIPS 140-2 compliant, see
      the official RHEL Documentation. Below is a general summary of the steps
      required: To switch the system to FIPS mode in RHEL 9: # whoami root # fips-
      mode-setup --enable Kernel initramdisks are being regenerated. This might take
      some time. Setting system policy to FIPS Note: System-wide crypto policies are
      applied on application start-up. It is recommended to restart the system for
      the change of policies to fully take place. FIPS mode will be enabled. Please
      reboot the system for the setting to take effect. Restart your system to allow
      the kernel to switch to FIPS mode: # whoami root # reboot After the restart,
      you can check the current state of FIPS mode: # whoami root # fips-mode-setup
      --check FIPS mode is enabled. References: 1.
      https://access.redhat.com/documentation/en-
      us/red_hat_enterprise_linux/9/html/security_hardening/using-the-system-wide-
      cryptographic-policies_security-hardening#switching-the-system-to-fips-
      mode_using-the-system-wide-cryptographic-policies 2.
      https://csrc.nist.gov/CSRC/media/projects/cryptographic-module-validation-
      program/documents/security-policies/140sp1758.pdf 3.
      https://csrc.nist.gov/publications/fips
    references: >
      1. https://access.redhat.com/documentation/en-
      us/red_hat_enterprise_linux/9/html/security_hardening/using-the-system-wide-
