  - rule_id: postgresql.cis.7.a_replication_only_user_is_created_and_used_for
    title: "Ensure a replication-only user is created and used for streaming replication"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: manual
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "7.1"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      Create a new user specifically for use by streaming replication instead of
      using the superuser account.
    rationale: >
      As it is not necessary to be a superuser to initiate a replication connection,
      it is proper to create an account specifically for replication. This allows
      further 'locking down' the uses of the superuser account and follows the
      general principle of using the least privileges necessary.
    audit_procedure: >
      Check which users currently have the replication permission: postgres=# SELECT
      rolname FROM pg_roles WHERE rolreplication; rolname ---------- postgres (1
      row) In a default PostgreSQL cluster, only the postgres user will have this
      permission.
    remediation: >
      It will be necessary to create a new role for replication purposes: postgres=#
      CREATE USER replication_user REPLICATION ENCRYPTED PASSWORD 'XXX'; CREATE ROLE
      postgres=# SELECT rolname FROM pg_roles WHERE rolreplication; rolname
      ------------------ postgres replication_user (2 rows) When using pg_basebackup
      (or other replication tools) on your standby server, you would use the
      replication_user (and its password). Ensure you allow the new user via your
      pg_hba.conf file: # note that 'replication' in the 2nd column is required and
      is a special # keyword, not a real database hostssl replication
      replication_user 0.0.0.0/0 scram-sha-256 References: 1.
      https://www.postgresql.org/docs/current/static/app-pgbasebackup.html 2.
      https://www.postgresql.org/docs/current/high-availability.html
    references: >
      1. https://www.postgresql.org/docs/current/static/app-pgbasebackup.html 2.
