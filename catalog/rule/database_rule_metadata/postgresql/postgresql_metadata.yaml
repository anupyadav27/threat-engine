  - rule_id: postgresql.cis.1.data_cluster_initialized_successfully
    title: "Ensure Data Cluster Initialized Successfully"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: automated
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "1.4"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      First-time installs of a given PostgreSQL major release require the
      instantiation of the database cluster. A database cluster is a collection of
      databases that are managed by a single server instance.
    rationale: >
      For the purposes of security, PostgreSQL enforces ownership and permissions of
      the data cluster such that: • An initialized data cluster is owned by the UNIX
      account that created it. • The data cluster cannot be accessed by other UNIX
      user accounts. • The data cluster cannot be created or owned by root • The
      PostgreSQL process cannot be invoked by root nor any UNIX user account other
      than the owner of the data cluster. Incorrectly instantiating the data cluster
      will result in a failed installation.
    audit_procedure: >
      Assuming you are installing the PostgreSQL binary package from the PGDG
      repository, the standard method, as root, is to instantiate the cluster
      thusly: # whoami root # PGSETUP_INITDB_OPTIONS='-k'
      /usr/pgsql-1*/bin/postgresql-17-setup initdb Initializing database ... OK Note
      that we enabled checksums in the above command by setting
      PGSETUP_INITDB_OPTIONS='-k'. A correctly installed data cluster possesses
      directory permissions similar to the following example. Otherwise, the service
      will fail to start: # whoami root # ls -la ~postgres/17 total 8 drwx------. 4
      postgres postgres 51 Oct 3 14:01 . drwx------. 3 postgres postgres 37 Oct 3
      13:54 .. drwx------. 2 postgres postgres 6 Oct 3 06:18 backups drwx------. 20
      postgres postgres 4096 Oct 3 14:01 data -rw-------. 1 postgres postgres 923
      Oct 3 14:01 initdb.log You can verify the PGDATA has sane permissions and
      attributes by running: # whoami root # /usr/pgsql-17/bin/postgresql-17-check-
      db-dir ~postgres/17/data # echo $? 0 As long as the return code is zero(0), as
      shown, everything is fine and you may start the PostgreSQL service: # whoami
      root # systemctl start postgresql-17 # systemctl status postgresql-17 | grep
      Active Active: active (running) since Mon 2024-10-07 14:36:13 UTC; 1min 5s ago
    remediation: >
      Attempting to instantiate a data cluster to an existing non-empty directory
      will fail: # whoami root # PGSETUP_INITDB_OPTIONS='-k'
      /usr/pgsql-17/bin/postgresql-17-setup initdb Data directory is not empty! In
      the case of a cluster instantiation failure, one must delete/remove the entire
      data cluster directory and repeat the initdb command: # whoami root # rm -rf
      ~postgres/17 # PGSETUP_INITDB_OPTIONS='-k'
      /usr/pgsql-17/bin/postgresql-17-setup initdb Initializing database ... OK
      References: 1. https://www.postgresql.org/docs/current/app-initdb.html
    references: >
      1. https://www.postgresql.org/docs/current/app-initdb.html
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_POSTGRESQL_17_v1_0_0_1_4"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_postgresql_17_v1_0_0_1_4"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: postgresql.cis.1.latest_security_patches_are_applied
    title: "Ensure the Latest Security Patches are Applied"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: manual
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "1.5"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      PostgreSQL updates are released to resolve bugs, and mitigate vulnerabilities
      quarterly (or sooner for drastic CVEs). It is recommended that PostgreSQL
      installations are kept up to date with the latest security updates. The
      PostgreSQL development group guarantees that point releases (or 'minor
      releases') will not change the behavior of an existing install and as such are
      'safe' to install without fear of changes to your application's behavior.
    rationale: >
      Maintaining parity with PostgreSQL patches will help reduce the risk
      associated with known vulnerabilities present in the PostgreSQL server.
      Without the latest security patches, PostgreSQL might have known
      vulnerabilities which could be used by an attacker to gain access. Impact: To
      update the PostgreSQL server a restart is required which will cause a
      momentary service outage.
    audit_procedure: >
      Execute the following SQL statement as low-privileged user to identify the
      PostgreSQL server version: # whoami postgres # psql -c 'SHOW server_version'
      server_version ---------------- 17.0 (1 row) Now compare the version returned
      with the security announcements shown on the PostgreSQL news page. For
      convenience, the latest PostgreSQL release versions are always shown in a
      banner at the top of that page along with the release date.
    remediation: >
      Install the latest patches available for your version: RHEL: sudo dnf update
      $(rpm -qa | grep '^postgresql') Debian: sudo apt-get install --only-upgrade
      $(dpkg-query -W -f '${db:Status-Status} ${Package}\n' 'postgresql*' | awk '$1
      != 'not-installed' {print $NF}') References: 1.
      https://www.postgresql.org/support/security/ 2.
      https://www.postgresql.org/support/versioning/
    references: >
      1. https://www.postgresql.org/support/security/ 2.
      https://www.postgresql.org/support/versioning/
    impact: >
      To update the PostgreSQL server a restart is required which will cause a
      momentary service outage.
    compliance_mappings:
      cis:
        - "CIS_POSTGRESQL_17_v1_0_0_1_5"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_postgresql_17_v1_0_0_1_5"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: postgresql.cis.1.pgpassword_is_not_set_in_users_profiles
    title: "Verify That 'PGPASSWORD' is Not Set in Users' Profiles"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: automated
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "1.6"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      PostgreSQL can read a default database password from an environment variable
      called PGPASSWORD.
    rationale: >
      Use of the PGPASSWORD environment variable implies PostgreSQL credentials are
      stored as clear text. Avoiding this may increase assurance that the
      confidentiality of PostgreSQL credentials is preserved.
    audit_procedure: >
      To assess this recommendation check if PGPASSWORD is set in login scripts
      using the following terminal command as privileged user: # whoami root # grep
      PGPASSWORD --no-messages /home/*/.{bashrc,profile,bash_profile} # grep
      PGPASSWORD --no-messages /root/.{bashrc,profile,bash_profile} # grep
      PGPASSWORD --no-messages /etc/environment Note that the above only covers Bash
      as the login shell. If OS users are configured to use Zsh, Csh, or other login
      shells, the list of files would need adjusted appropriately.
    remediation: >
      Check which users and/or scripts are setting PGPASSWORD and change them to use
      a more secure authentication method. References: 1.
      https://www.postgresql.org/docs/current/libpq-envars.html
    references: >
      1. https://www.postgresql.org/docs/current/libpq-envars.html
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_POSTGRESQL_17_v1_0_0_1_6"
      nist_800_53: []
