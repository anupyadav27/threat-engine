  - rule_id: postgresql.cis.3.filename_pattern_for_log_files_is_set_correctly
    title: "Ensure the filename pattern for log files is set correctly"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: automated
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "3.1.5"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The log_filename setting specifies the filename pattern for log files. The
      value for log_filename should match your organization's logging policy. The
      value is treated as a strftime pattern, so %-escapes can be used to specify
      time- varying file names. The supported %-escapes are similar to those listed
      in the Open Group's strftime specification. If you specify a file name without
      escapes, you should plan to use a log rotation utility to avoid eventually
      filling the partition that contains log_directory. If there are any time-zone-
      dependent %-escapes, the computation is done in the zone specified by
      log_timezone. Also, the system's strftime is not used directly, so platform-
      specific (nonstandard) extensions do not work. If CSV-format output is enabled
      in log_destination, .csv will be appended to the log filename. (If
      log_filename ends in .log, the suffix is replaced instead.)
    rationale: >
      If log_filename is not set, then the value of log_directory is appended to an
      empty string and PostgreSQL will fail to start as it will try to write to a
      directory instead of a file.
    audit_procedure: >
      Execute the following SQL statement to confirm that the desired pattern is
      set: postgres=# show log_filename; log_filename -------------------
      postgresql-%a.log (1 row) Note: This example shows the use of the strftime %a
      escape. This creates seven log files, one for each day of the week (e.g.
      postgresql-Mon.log, postgresql-Tue.log, et al)
    remediation: >
      Execute the following SQL statement(s) to remediate this setting: postgres=#
      alter system set log_filename='postgresql-%Y%m%d.log'; ALTER SYSTEM postgres=#
      select pg_reload_conf(); pg_reload_conf ---------------- t (1 row) postgres=#
      show log_filename; log_filename ------------------- postgresql-%Y%m%d.log (1
      row) Note: In this example, a new log file will be created for each day (e.g.
      postgresql- 20200804.log) Default Value: The default is postgresql-%a.log,
      which creates a new log file for each day of the week (e.g. postgresql-
      Mon.log, postgresql-Tue.log). References: 1. https://man7.org/linux/man-
      pages/man3/strftime.3.html 2. https://www.postgresql.org/docs/current/runtime-
      config-logging.html
    references: >
      1. https://man7.org/linux/man-pages/man3/strftime.3.html 2.
      https://www.postgresql.org/docs/current/runtime-config-logging.html
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_POSTGRESQL_17_v1_0_0_3_1_5"
      nist_800_53: []
