  - rule_id: postgresql.cis.5.postgresql_is_bound_to_an_ip_address
    title: "Ensure PostgreSQL is Bound to an IP Address"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: manual
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "5.2"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      By default, listen_addresses is set to localhost which prevents any and all
      remote TCP connections to the PostgreSQL port. Some Docker images may set
      listen_addesses to *, which corresponds to all available IP interfaces; thus,
      the PostgreSQL server then accepts TCP connections on all the
      container's/server's IPv6 and IPv4 interfaces. (The same is true for a setting
      of 0.0.0.0.) You can make this configuration more restrictive by setting the
      listen_addresses configuration option to a specific list of IPv4 or IPv6
      address so that the server only accepts TCP connections on those addresses.
      This parameter can only be set at server start.
    rationale: >
      Limiting the IP addresses that PostgreSQL listens on provides additional
      restrictions on where client applications/users can connect from.
    audit_procedure: >
      Run the following statement: # whoami postgres # psql -c 'SHOW
      listen_addresses' If * or 0.0.0.0 is returned, this is a failure.
    remediation: >
      To have the PostgreSQL server only accept connections on a specific IP
      address, add an entry similar to this in the PostgreSQL configuration file
      postgresql.conf: listen_addresses = ' <your IP> ' To listen on multiple
      addresses, a comma-separated list may be used: listen_addresses = ' <your
      first IP> , <your second IP> ' In this case, clients can connect to the server
      using --host= <your IP> , while connections on other server host addresses are
      not possible.
