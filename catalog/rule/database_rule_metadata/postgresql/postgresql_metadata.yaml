  - rule_id: postgresql.cis.3.logging_collector_is_enabled
    title: "Ensure the logging collector is enabled"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: automated
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "3.1.3"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The logging collector is a background process that captures log messages sent
      to stderr and redirects them into log files. The logging_collector setting
      must be enabled in order for this process to run. It can only be set at the
      server start.
    rationale: >
      The logging collector approach is often more useful than logging to syslog,
      since some types of messages might not appear in syslog output. One common
      example is dynamic-linker failure message; another may be error messages
      produced by scripts such as archive_command. Note: This setting must be
      enabled when log_destination is either stderr or csvlog or logs will be lost .
      Certain other logging parameters require it as well.
    audit_procedure: >
      Execute the following SQL statement and confirm that the logging_collector is
      enabled (on): postgres=# show logging_collector; logging_collector
      ------------------- on (1 row)
    remediation: >
      Execute the following SQL statement(s) to remediate this setting: postgres=#
      alter system set logging_collector = 'on'; ALTER SYSTEM Unfortunately, this
      setting can only be changed at the server (re)start. As root, restart the
      PostgreSQL service for this change to take effect: # whoami root # systemctl
      restart postgresql-17 # systemctl status postgresql-17|grep 'ago$' Active:
      active (running) since <date> ; <count> s ago Default Value: on References: 1.
      https://www.postgresql.org/docs/current/runtime-config-logging.html
    references: >
      1. https://www.postgresql.org/docs/current/runtime-config-logging.html
