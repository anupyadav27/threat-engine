  - rule_id: postgresql.cis.3.log_statement_is_set_correctly
    title: "Ensure 'log_statement' is set correctly"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: automated
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "3.1.25"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The log_statement setting specifies the types of SQL statements that are
      logged. Valid values are: • none (off) • ddl • mod • all (all statements) It
      is recommended this be set to ddl unless otherwise directed by your
      organization's logging policy. ddl logs all data definition statements: •
      CREATE • ALTER • DROP mod logs all ddl statements, plus data-modifying
      statements: • INSERT • UPDATE • DELETE • TRUNCATE • COPY FROM (PREPARE,
      EXECUTE, and EXPLAIN ANALYZE statements are also logged if their contained
      command is of an appropriate type.) For clients using extended query protocol,
      logging occurs when an Execute message is received, and values of the Bind
      parameters are included (with any embedded single- quote marks doubled).
    rationale: >
      Setting log_statement to align with your organization's security and logging
      policies facilitates later auditing and review of database activities.
    audit_procedure: >
      Execute the following SQL statement to verify the setting is correct:
      postgres=# show log_statement; log_statement --------------- none (1 row) If
      log_statement is set to none then this is a fail.
    remediation: >
      Execute the following SQL statement(s) as superuser to remediate this setting:
      postgres=# alter system set log_statement='ddl'; ALTER SYSTEM postgres=#
      select pg_reload_conf(); pg_reload_conf ---------------- t (1 row) Default
      Value: none References: 1.
      https://www.postgresql.org/docs/current/static/runtime-config-logging.html
