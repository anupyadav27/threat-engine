  - rule_id: postgresql.cis.7.logging_of_replication_commands_is_configured
    title: "Ensure logging of replication commands is configured"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: automated
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "7.2"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      Enabling the log_replication_commands setting causes each attempted
      replication from the server to be logged.
    rationale: >
      A successful replication connection allows for a complete copy of the data
      stored within the data cluster to be offloaded to another, potentially
      insecure, host. As such, it is advisable to log all replication commands that
      are executed in your database cluster to ensure the data is not off-loaded to
      an unexpected/undesired location.
    audit_procedure: >
      Check the current value of log_replication_commands: postgres=# SHOW
      log_replication_commands; log_replication_commands --------------------------
      off (1 row)
    remediation: >
      To enable the logging of replication commands, execute the following:
      postgres=# ALTER SYSTEM SET log_replication_commands = 'on'; ALTER SYSTEM
      postgres=# SELECT pg_reload_conf(); pg_reload_conf ---------------- t (1 row)
      postgres=# SHOW log_replication_commands ; log_replication_commands
      -------------------------- on (1 row) References: 1.
      https://www.postgresql.org/docs/current/runtime-config-logging.html
    references: >
      1. https://www.postgresql.org/docs/current/runtime-config-logging.html
