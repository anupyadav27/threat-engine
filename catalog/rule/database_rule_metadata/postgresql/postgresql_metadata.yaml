  - rule_id: postgresql.cis.3.syslog_messages_are_not_lost_due_to_size
    title: "Ensure syslog messages are not lost due to size"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: automated
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "3.1.12"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      PostgreSQL log messages can exceed 1024 bytes, which is a typical size limit
      for traditional Syslog implementations. When syslog_split_messages is off,
      PostgreSQL server log messages are delivered to the Syslog service as is, and
      it is up to the Syslog service to cope with the potentially bulky messages.
      When syslog_split_messages is on, messages are split by lines, and long lines
      are split so that they will fit into 1024 bytes. If syslog is ultimately
      logging to a text file, then the effect will be the same either way, and it is
      best to leave the setting on, since most syslog implementations either cannot
      handle large messages or would need to be specially configured to handle them.
      But if syslog is ultimately writing into some other medium, it might be
      necessary or more useful to keep messages logically together.
    rationale: >
      Impact: Depending on the Syslog server in use, log messages exceeding 1024
      bytes may be lost or, potentially, cause the Syslog server processes to abort.
    audit_procedure: >
      Execute the following SQL statement to confirm that long log messages are
      split when logging to Syslog: postgres=# show syslog_split_messages;
      syslog_split_messages ----------------------- on (1 row)
    remediation: >
      Execute the following SQL statement(s) to remediate this setting: postgres=#
      alter system set syslog_split_messages = 'on'; ALTER SYSTEM postgres=# select
      pg_reload_conf(); pg_reload_conf ---------------- t (1 row) Default Value: on
      References: 1. https://www.postgresql.org/docs/current/runtime-config-
      logging.html
    references: >
      1. https://www.postgresql.org/docs/current/runtime-config-logging.html
    impact: >
      Depending on the Syslog server in use, log messages exceeding 1024 bytes may
      be lost or, potentially, cause the Syslog server processes to abort.
    compliance_mappings:
      cis:
        - "CIS_POSTGRESQL_17_v1_0_0_3_1_12"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_postgresql_17_v1_0_0_3_1_12"
