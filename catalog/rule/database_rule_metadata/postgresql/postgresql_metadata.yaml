  - rule_id: postgresql.cis.6.pgcrypto_extension_is_installed_and_configured
    title: "Ensure the pgcrypto extension is installed and configured correctly"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: automated
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "6.11"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      PostgreSQL must implement cryptographic mechanisms to prevent unauthorized
      disclosure or modification of organization-defined information at rest (to
      include, at a minimum, PII and classified information) on organization-defined
      information system components.
    rationale: >
      PostgreSQL instances handling data that requires 'data at rest' protections
      must employ cryptographic mechanisms to prevent unauthorized disclosure and
      modification of the information at rest. These cryptographic mechanisms may be
      native to PostgreSQL or implemented via additional software or operating
      system/file system settings, as appropriate to the situation. Information at
      rest refers to the state of information when it is located on a secondary
      storage device (e.g. disk drive, tape drive) within an organizational
      information system. The selection of a cryptographic mechanism is based on the
      need to protect the integrity of organizational information. The strength of
      the mechanism is commensurate with the security category and/or classification
      of the information. Organizations have the flexibility to either encrypt all
      information on storage devices (i.e. full disk encryption) or encrypt specific
      data structures (e.g. files, records, or fields). Organizations may also
      optionally choose to implement both to implement layered security. The
      decision of whether, and what, to encrypt rests with the data owner and is
      also influenced by the physical measures taken to secure the equipment and
      media on which the information resides. Organizations may choose to employ
      different mechanisms to achieve confidentiality and integrity protection, as
      appropriate. If the confidentiality and integrity of application data are not
      protected, the data will be open to compromise and unauthorized modification.
      The PostgreSQL pgcrypto extension provides cryptographic functions for
      PostgreSQL and is intended to address the confidentiality and integrity of
      user and system information at rest in non-mobile devices. Impact: When
      considering or undertaking any form of encryption, it is critical to
      understand the state of the encrypted data at all stages of the data
      lifecycle. The use of pgcrypto ensures that the data at rest in the tables
      (and therefore on disk) is encrypted, but for the data to be accessed by any
      users or applications, said users/applications will, by necessity, have access
      to the encrypt and decrypt keys and the data in question will be
      encrypted/decrypted in memory and then transferred to/from the
      user/application in that form.
    audit_procedure: >
      One possible way to encrypt data within PostgreSQL is to use the pgcrypto
      extension. To check if pgcrypto is installed on PostgreSQL, as a database
      administrator run the following commands: postgres=# SELECT * FROM
      pg_available_extensions WHERE name='pgcrypto'; name | default_version |
      installed_version | comment
      ----------+-----------------+-------------------+-------------------------
      pgcrypto | 1.3 | | cryptographic functions (1 row) If data in the database
      requires encryption and pgcrypto is not available, this is a fail. If disk or
      filesystem requires encryption, ask the system owner, DBA, and SA to
      demonstrate the use of disk-level encryption. If this is required and is not
      found, this is a fail. If controls do not exist or are not enabled, this is
      also a fail.
    remediation: >
      The pgcrypto extension is included with the PostgreSQL contrib package.
      Although included, it needs to be created in the database. As the database
      administrator, run the following: postgres=# CREATE EXTENSION pgcrypto; CREATE
      EXTENSION Verify pgcrypto is installed: postgres=# SELECT * FROM
      pg_available_extensions WHERE name='pgcrypto'; name | default_version |
      installed_version | comment
      ----------+-----------------+-------------------+-------------------------
      pgcrypto | 1.3 | 1.3 | cryptographic functions (1 row) References: 1.
      http://www.postgresql.org/docs/current/static/pgcrypto.html
    references: >
      1. http://www.postgresql.org/docs/current/static/pgcrypto.html
    impact: >
      When considering or undertaking any form of encryption, it is critical to
      understand the state of the encrypted data at all stages of the data
      lifecycle. The use of pgcrypto ensures that the data at rest in the tables
      (and therefore on disk) is encrypted, but for the data to be accessed by any
      users or applications, said users/applications will, by necessity, have access
      to the encrypt and decrypt keys and the data in question will be
      encrypted/decrypted in memory and then transferred to/from the
      user/application in that form.
    compliance_mappings:
      cis:
        - "CIS_POSTGRESQL_17_v1_0_0_6_11"
