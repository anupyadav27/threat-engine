  - rule_id: postgresql.cis.3.syslog_messages_are_not_suppressed
    title: "Ensure syslog messages are not suppressed"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: automated
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "3.1.11"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      When logging to Syslog and syslog_sequence_numbers is on, then each message
      will be prefixed by an increasing sequence number (such as [2]).
    rationale: >
      Many modern Syslog implementations perform a log optimization and suppress
      repeated log entries while emitting ”--- last message repeated N times ---”.
      In more modern Syslog implementations, repeated message suppression can be
      configured (for example, $RepeatedMsgReduction in rsyslog). Impact: If
      disabled, messages sent to Syslog could be suppressed and not logged. While a
      message is emitted stating that a given message was repeated and suppressed,
      the timestamp associated with these suppressed messages is lost, potentially
      damaging the recreation of an incident timeline.
    audit_procedure: >
      Execute the following SQL statement and confirm that the
      syslog_sequence_numbers is enabled (on): postgres=# show
      syslog_sequence_numbers; syslog_sequence_numbers ------------------------- on
      (1 row)
    remediation: >
      Execute the following SQL statement(s) to remediate this setting: postgres=#
      alter system set syslog_sequence_numbers = 'on'; ALTER SYSTEM postgres=#
      select pg_reload_conf(); pg_reload_conf ---------------- t (1 row) Default
      Value: on References: 1. https://www.postgresql.org/docs/current/runtime-
      config-logging.html
    references: >
      1. https://www.postgresql.org/docs/current/runtime-config-logging.html
    impact: >
      If disabled, messages sent to Syslog could be suppressed and not logged. While
      a message is emitted stating that a given message was repeated and suppressed,
      the timestamp associated with these suppressed messages is lost, potentially
      damaging the recreation of an incident timeline.
