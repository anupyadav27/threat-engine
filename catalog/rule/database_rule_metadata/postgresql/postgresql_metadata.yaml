    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      PostgreSQL runtime parameters that are executed by the postmaster process.
    rationale: >
      The postmaster process is the supervisory process that assigns a backend
      process to an incoming client connection. The postmaster manages key runtime
      parameters that are either shared by all backend connections or needed by the
      postmaster process itself to run. Impact: All changes made on this level will
      affect the overall behavior of the server. These changes can be effected by
      editing the PostgreSQL configuration files and by either executing a server
      SIGHUP from the command line or, as superuser postgres, executing the SQL
      command select pg_reload_conf(). A denial of service is possible by the over-
      allocating of limited resources, such as RAM. Data can be corrupted by
      allowing damaged pages to load or by changing parameters to reinterpret values
      in an unexpected fashion, e.g. changing the time zone. Client messages can be
      altered in such a way as to interfere with the application logic. Logging can
      be altered and obfuscated inhibiting root cause analysis.
    audit_procedure: >
      The following parameters can only be set at server start by the owner of the
      PostgreSQL server process and cluster, typically the UNIX user account
      postgres. Therefore, all exploits require the successful compromise of either
      that UNIX account or the postgres superuser account itself. postgres=# SELECT
      name, setting FROM pg_settings WHERE context = 'postmaster' ORDER BY 1; name |
      setting
