  - rule_id: postgresql.cis.4.excessive_dml_privileges_are_revoked
    title: "Ensure excessive DML privileges are revoked"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: manual
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "4.6"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      DML (insert, update, delete) operations at the table level should be
      restricted to only authorized users. PostgreSQL manages table-level DML
      permissions via the GRANT statement.
    rationale: >
      Excessive DML grants can lead to unprivileged users changing or deleting
      information without proper authorization.
    audit_procedure: >
      To audit excessive DML privileges, take an inventory of all users defined in
      the cluster using the \du+ * SQL command, as well as all tables defined in the
      database using the \dt *.* SQL command. Furthermore, the intersection matrix
      of tables and user grants can be obtained by querying system catalogs
      pg_tables and pg_user. Note that in PostgreSQL, users can be defined cluster-
      wide across all databases or for a specific database, while schemas and tables
      are specific to a particular database. Therefore, the commands below should be
      executed for each defined database in the cluster. With this information,
      inspect database table grants and determine if any are excessive for defined
      database users. postgres=# -- display all users defined in the cluster
      postgres=# \x Expanded display is on. postgres=# \du+ * List of roles -[
      RECORD 1 ]----------------------------------------------------------- Role
      name | pg_checkpoint Attributes | Cannot login Description | -[ RECORD 2
      ]----------------------------------------------------------- Role name |
      pg_create_subscription Attributes | Cannot login Description | -[ RECORD 3
      ]----------------------------------------------------------- Role name |
      pg_database_owner Attributes | Cannot login Description | -[ RECORD 4
      ]----------------------------------------------------------- Role name |
      pg_execute_server_program Attributes | Cannot login Description | -[ RECORD 5
      ]----------------------------------------------------------- Role name |
      pg_maintain Attributes | Cannot login Description | -[ RECORD 6
      ]----------------------------------------------------------- Role name |
      pg_monitor Attributes | Cannot login Description | -[ RECORD 7
      ]----------------------------------------------------------- Role name |
      pg_read_all_data Attributes | Cannot login Description | -[ RECORD 8
      ]----------------------------------------------------------- Role name |
      pg_read_all_settings Attributes | Cannot login Description | -[ RECORD 9
      ]----------------------------------------------------------- Role name |
      pg_read_all_stats Attributes | Cannot login Description | -[ RECORD 10
      ]---------------------------------------------------------- Role name |
      pg_read_server_files Attributes | Cannot login Description | -[ RECORD 11
      ]---------------------------------------------------------- Role name |
      pg_signal_backend Attributes | Cannot login Description | -[ RECORD 12
      ]---------------------------------------------------------- Role name |
      pg_stat_scan_tables Attributes | Cannot login Description | -[ RECORD 13
      ]---------------------------------------------------------- Role name |
      pg_use_reserved_connections Attributes | Cannot login Description | -[ RECORD
      14 ]---------------------------------------------------------- Role name |
      pg_write_all_data Attributes | Cannot login Description | -[ RECORD 15
      ]---------------------------------------------------------- Role name |
      pg_write_server_files Attributes | Cannot login Description | -[ RECORD 16
      ]---------------------------------------------------------- Role name |
      postgres Attributes | Superuser, Create role, Create DB, Replication, Bypass
      RLS Description | postgres=# \x Expanded display is off. postgres=# List of
      relations Schema | Name | Type | Owner | Persistence | Access method | Size |
      Description
      --------------------+--------------------------+-------------+----------+----
      ---------+-------------- -+------------+------------- information_schema |
      sql_features | table | postgres | permanent | heap | 104 kB |
      information_schema | sql_implementation_info | table | postgres | permanent |
      heap | 48 kB | information_schema | sql_parts | table | postgres | permanent |
      heap | 48 kB | information_schema | sql_sizing | table | postgres | permanent
      | heap | 48 kB | <snip> postgres=# -- query all tables and user grants in the
      current database postgres=# -- the system catalogs 'information_schema' and
      'pg_catalog' are excluded postgres=# select t.schemaname, t.tablename,
      u.usename, has_table_privilege(u.usename, t.tablename, 'select') as select,
      has_table_privilege(u.usename, t.tablename, 'insert') as insert,
      has_table_privilege(u.usename, t.tablename, 'update') as update,
      has_table_privilege(u.usename, t.tablename, 'delete') as delete from pg_tables
      t, pg_user u where t.schemaname not in ('information_schema','pg_catalog');
      schemaname | tablename | usename | select | insert | update | delete
      ------------+-----------+---------+--------+--------+--------+-------- (0
      rows) For the example below, we illustrate using a single table customer, and
      two application users appwriter and appreader. The intention is for appwriter
      to have full select, insert, update, and delete rights and for appreader to
      only have select rights. We can query these privileges with the example below
      using the has_table_privilege function and filtering for just the table and
      roles in question. postgres=# select t.tablename, u.usename,
      has_table_privilege(u.usename, t.tablename, 'select') as select,
      has_table_privilege(u.usename, t.tablename, 'insert') as insert,
      has_table_privilege(u.usename, t.tablename, 'update') as update,
      has_table_privilege(u.usename, t.tablename, 'delete') as delete from pg_tables
      t, pg_user u where t.tablename = 'customer' and u.usename in
      ('appwriter','appreader'); tablename | usename | select | insert | update |
      delete ----------+-----------+--------+--------+--------+-------- customer |
      appwriter | t | t | t | t customer | appreader | t | t | t | t (2 rows) As
      depicted, both users have full privileges for the customer table. This is a
      fail. When inspecting database-wide results for all users and all table
      grants, employ a comprehensive approach. Collaboration with application
      developers is paramount to collectively determine only those database users
      that require specific DML privileges and on which tables.
    remediation: >
      If a given database user has been granted excessive DML privileges for a given
      database table, those privileges should be revoked immediately using the
      REVOKE SQL command. Continuing with the example above, remove unauthorized
      grants for appreader user using the REVOKE statement and verify the Boolean
      values are now false. postgres=# REVOKE INSERT, UPDATE, DELETE ON TABLE
      customer FROM appreader; REVOKE postgres=# select t.tablename, u.usename,
      has_table_privilege(u.usename, t.tablename, 'select') as select,
      has_table_privilege(u.usename, t.tablename, 'insert') as insert,
      has_table_privilege(u.usename, t.tablename, 'update') as update,
      has_table_privilege(u.usename, t.tablename, 'delete') as delete from pg_tables
      t, pg_user u where t.tablename = 'customer' and u.usename in
      ('appwriter','appreader'); tablename | usename | select | insert | update |
      delete ----------+-----------+--------+--------+--------+-------- customer |
      appwriter | t | t | t | t customer | appreader | t | f | f | f (2 rows) Note:
      For versions of PostgreSQL prior to version 15, CVE-2018-1058 is applicable
      and it is recommended that all privileges be revoked from the public schema
      for all users on all databases. If you have upgraded from one of these earlier
      releases, this CVE is not fixed for you during an upgrade. You can correct
      this CVE by issuing: postgres=# REVOKE CREATE ON SCHEMA public FROM PUBLIC;
      REVOKE Default Value: The table owner/creator has full privileges; all other
      users must be explicitly granted access. References: 1.
      https://www.postgresql.org/docs/current/static/sql-grant.html 2.
      https://www.postgresql.org/docs/current/static/sql-revoke.html 3.
      https://www.postgresql.org/docs/current/static/functions-info.html#functions-
      info- access-table 4. https://wiki.postgresql.org/wiki/A_Guide_to_CVE-2018-
      1058:_Protect_Your_Search_Path 5.
      https://nvd.nist.gov/vuln/detail/CVE-2018-1058
    references: >
      1. https://www.postgresql.org/docs/current/static/sql-grant.html 2.
      https://www.postgresql.org/docs/current/static/sql-revoke.html 3.
      https://www.postgresql.org/docs/current/static/functions-info.html#functions-
      info- access-table 4. https://wiki.postgresql.org/wiki/A_Guide_to_CVE-2018-
      1058:_Protect_Your_Search_Path 5.
      https://nvd.nist.gov/vuln/detail/CVE-2018-1058
    impact: >
      
