  - rule_id: postgresql.cis.6.backend_runtime_parameters_are_configured
    title: "Ensure 'backend' runtime parameters are configured correctly"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: automated
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "6.2"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      In order to serve multiple clients efficiently, the PostgreSQL server launches
      a new 'backend' process for each client. The runtime parameters in this
      benchmark section are controlled by the backend process. The server's
      performance, in the form of slow queries causing a denial of service, and the
      RDBM's auditing abilities for determining root cause analysis can be
      potentially compromised via these parameters.
    rationale: >
      A denial of service is possible by denying the use of indexes and by slowing
      down client access to an unreasonable level. Unsanctioned behavior can be
      introduced by introducing rogue libraries which can then be called in a
      database session. Logging can be altered and obfuscated inhibiting root cause
      analysis. Impact: All changes made on this level will affect the overall
      behavior of the server. These changes can only be affected by a server restart
      after the parameters have been altered in the configuration files.
    audit_procedure: >
      Issue the following command to verify the backend runtime parameters are
      configured correctly: postgres=# SELECT name, setting FROM pg_settings WHERE
      context IN ('backend','superuser-backend') ORDER BY 1; name | setting
      -----------------------+--------- ignore_system_indexes | off
      jit_debugging_support | off jit_profiling_support | off log_connections | on
      log_disconnections | on post_auth_delay | 0 (6 rows) Note: Effecting changes
      to these parameters can only be made at server start. Therefore, a successful
      exploit may not be detected until after a server restart, e.g., during a
      maintenance window.
    remediation: >
      Once detected, the unauthorized/undesired change can be corrected by altering
      the configuration file and executing a server restart. In the case where the
      parameter has been specified on the command-line invocation of pg_ctl the
      restart invocation is insufficient and an explicit stop and start must instead
      be made. 1. Query the view pg_settings and compare with previous query outputs
      for any changes. 2. Review configuration files postgresql.conf and
      postgresql.auto.conf and compare them with previously archived file copies for
      any changes. 3. Examine the process output and look for parameters that were
      used at server startup: ps -few | grep -E -- '[p]ost.*-[D]' 4. Examine the
      contents of $PGDATA/postmaster.opts References: 1.
      https://www.postgresql.org/docs/current/static/view-pg-settings.html 2.
      https://www.postgresql.org/docs/current/static/runtime-config.html
    references: >
      1. https://www.postgresql.org/docs/current/static/view-pg-settings.html 2.
      https://www.postgresql.org/docs/current/static/runtime-config.html
    impact: >
      All changes made on this level will affect the overall behavior of the server.
      These changes can only be affected by a server restart after the parameters
      have been altered in the configuration files.
    compliance_mappings:
      cis:
        - "CIS_POSTGRESQL_17_v1_0_0_6_2"
