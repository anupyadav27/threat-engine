  - rule_id: postgresql.cis.4.sudo_is_configured_correctly
    title: "Ensure sudo is configured correctly"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: manual
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "4.2"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      It is common to have more than one authorized individual administering the
      PostgreSQL service at the Operating System level. It is also quite common to
      permit login privileges to individuals on a PostgreSQL host who otherwise are
      not authorized to access the server's data cluster and files. Administering
      the PostgreSQL data cluster, as opposed to its data, is to be accomplished via
      a localhost login of a regular UNIX user account. Access to the postgres
      superuser account is restricted in such a manner as to interdict unauthorized
      access. sudo satisfies the requirements by escalating ordinary user account
      privileges as the PostgreSQL RDBMS superuser.
    rationale: >
      Without sudo, there would be no capabilities to strictly control access to the
      superuser account nor to securely and authoritatively audit its use.
    audit_procedure: >
      Log in as an Operating System user authorized to escalate privileges and test
      the sudo invocation by executing the following: # whoami user1 # groups user1
      # sudo -iu postgres [sudo] password for user1: user1 is not in the sudoers
      file. This incident will be reported. As shown above, user1 has not been added
      to the /etc/sudoers file or made a member of any group listed in the
      /etc/sudoers file. Whereas: # whoami user2 # groups user2 dba # sudo -iu
      postgres [sudo] password for user2: # whoami postgres This shows that the
      user2 user is configured properly for sudo access by being a member of the dba
      group.
    remediation: >
      As superuser root, execute the following commands: # whoami root # echo '%dba
      ALL=(postgres) PASSWD: ALL' > /etc/sudoers.d/postgres # chmod 600
      /etc/sudoers.d/postgres This grants any Operating System user that is a member
      of the dba group the ability to use sudo -iu postgres to become the postgres
      user. Ensure that all Operating System user's that need such access are
      members of the group. References: 1.
      https://www.sudo.ws/man/1.8.15/sudo.man.html 2.
      https://www.sudo.ws/man/1.8.17/visudo.man.html
    references: >
      1. https://www.sudo.ws/man/1.8.15/sudo.man.html 2.
      https://www.sudo.ws/man/1.8.17/visudo.man.html
