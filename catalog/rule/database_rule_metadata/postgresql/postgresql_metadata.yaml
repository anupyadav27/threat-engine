  - rule_id: postgresql.cis.8.postgresql_subdirectory_locations_are_outside_the
    title: "Ensure PostgreSQL subdirectory locations are outside the data cluster"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: manual
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "8.1"
    cis_section: "8"
    profile_applicability: "Level 1"
    description: >
      The PostgreSQL cluster is organized to carry out specific tasks in
      subdirectories. For the purposes of performance, reliability, and security
      some of these subdirectories should be relocated outside the data cluster.
    rationale: >
      Some subdirectories contain information, such as logs, which can be of value
      to others such as developers. Other subdirectories can gain a performance
      benefit when placed on fast storage devices. Other subdirectories contain
      temporary files created and used during processing. Finally, relocating a
      subdirectory to a separate and distinct partition mitigates denial of service
      and involuntary server shutdown when excessive writes fill the data cluster's
      partition, e.g. pg_wal, pg_log, and temp_tablespaces.
    audit_procedure: >
      Execute the following SQL statement to verify the configuration is correct.
      Alternatively, inspect the parameter settings in the postgresql.conf
      configuration file. postgres=# SELECT name, setting FROM pg_settings WHERE
      (name ~ '_directory$' OR name ~ '_tablespace'); name | setting
      ----------------------------+-------------------------
      allow_in_place_tablespaces | off data_directory | /var/lib/pgsql/17/data
      default_tablespace | log_directory | log temp_tablespaces | (5 rows) Inspect
      the file and directory permissions for all returned values. Only superusers
      and authorized users should have access control rights for these files and
      directories. If permissions are not highly restrictive, this is a fail. If
      temp_tablespaces is undefined and temp_file_limit has not been set, this is a
      fail.
    remediation: >
      Perform the following steps to remediate the subdirectory locations and
      permissions: • Determine appropriate data, log, and tablespace directories and
      locations based on your organization's security policies. If necessary,
      relocate all listed directories outside the data cluster. • If not relocating
      temp_tablespaces, the temp_file_limit parameter must be changed from its
      default value. • Ensure file permissions are restricted as much as possible,
      i.e. only superuser read access. • When directories are relocated to other
      partitions, ensure that they are of sufficient size to mitigate against
      excessive space utilization. • Lastly, change the settings accordingly in the
      postgresql.conf configuration file and restart the database cluster for
      changes to take effect. To relocate temp_tablespaces to an existing mount
      point outside the data cluster is accomplished by: postgres=# CREATE
      TABLESPACE temp_tablespc LOCATION '/path/to/existing/desired/mount/point';
      postgres=# ALTER SYSTEM SET temp_tablespaces = 'temp_tablespc'; postgres=#
      SELECT pg_reload_conf(); Default Value: The default for data_directory is
      ConfigDir and the default for log_directory is log (based on absolute path of
      data_directory). The defaults for tablespace settings are null, or not set,
