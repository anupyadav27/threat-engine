  - rule_id: postgresql.cis.6.understanding_attack_vectors_and_runtime
    title: "Understanding attack vectors and runtime parameters"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: manual
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "6.1"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Understanding the vulnerability of PostgreSQL runtime parameters by the
      particular delivery method, or attack vector.
    rationale: >
      There are as many ways of compromising a server as there are runtime
      parameters. A combination of any one or more of them executed at the right
      time under the right conditions has the potential to compromise the RDBMS.
      Mitigating risk is dependent upon one's understanding of the attack vectors
      and includes: 1. Via user session: includes those runtime parameters that can
      be set by a ROLE that persists for the life of a server-client session. 2. Via
      attribute: includes those runtime parameters that can be set by a ROLE during
      a server-client session that can be assigned as an attribute for an entity
      such as a table, index, database, or role. 3. Via server reload: includes
      those runtime parameters that can be set by the superuser using a SIGHUP or
      configuration file reload command and affects the entire cluster. 4. Via
      server restart: includes those runtime parameters that can be set and effected
      by restarting the server process and affects the entire cluster. Impact: It
      can be difficult to totally eliminate risk. Once changed, detecting a
      miscreant parameter can become problematic.
    audit_procedure: >
      Review all configuration settings. Configure PostgreSQL logging to record all
      modifications and changes to the RDBMS.
    remediation: >
      In the case of a changed parameter, the value is returned back to its default
      value. In the case of a successful exploit of an already set runtime parameter
      then an analysis must be carried out to determine the best approach in
      mitigating the risk to prevent future exploitation. References: 1.
      https://www.postgresql.org/docs/current/static/runtime-config.html
    references: >
      1. https://www.postgresql.org/docs/current/static/runtime-config.html
    impact: >
      It can be difficult to totally eliminate risk. Once changed, detecting a
      miscreant parameter can become problematic.
    compliance_mappings:
      cis:
        - "CIS_POSTGRESQL_17_v1_0_0_6_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
