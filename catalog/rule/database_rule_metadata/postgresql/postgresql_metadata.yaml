  - rule_id: postgresql.cis.2.disable_postgresql_command_history
    title: "Disable PostgreSQL Command History"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: automated
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "2.3"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      On Linux/UNIX, the PostgreSQL client logs most interactive statements to a
      history file. The default PostgreSQL history file is named .psql_history in
      the user's home directory. The PostgreSQL command history should be disabled.
    rationale: >
      Disabling the PostgreSQL command history reduces the probability of exposing
      sensitive information, such as passwords, encryption keys, or sensitive data.
    audit_procedure: >
      Execute the following command as privileged user to assess this
      recommendation: # whoami root # find /home -name '.psql_history' -exec ls -la
      {} \; # find /root -name '.psql_history' -exec ls -la {} \; For each file
      returned, determine whether that file is symbolically linked to /dev/null:
      lrwxrwxrwx 1 doug doug 9 Feb 26 18:18 /home/doug/.psql_history -> /dev/null
      lrwxrwxrwx 1 jim jim 9 Feb 26 18:18 /home/jim/.psql_history In the above,
      Jim's history file is a finding, while Doug's is not.
    remediation: >
      For each OS user on the PostgreSQL server, perform the following steps to
      implement this setting: 1. Remove .psql_history if it exists. # whoami root #
      rm -f ~ <user> /.psql_history || true 2. Use either of the techniques below to
      prevent it from being created again: 1. Set the HISTFILE variable to /dev/null
      in ~<user>/.psqlrc # whoami root # cat << EOF >> ~ <user> /.psqlrc \set
      HISTFILE /dev/null EOF 2. Create ~ <user> /.psql_history as a symbolic to
      /dev/null. # whoami root # ln -s /dev/null $HOME/.psql_history `` 3. Set the
      PSQL_HISTORY variable for all users: # whoami root # echo
      'PSQL_HISTORY=/dev/null' >> /etc/environment References: 1.
      https://www.postgresql.org/docs/current/app-psql.html#APP-PSQL-VARIABLES-
      HISTFILE
