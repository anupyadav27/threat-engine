      password '${PGSERVICEFILE}' # test -z '${PGSYSCONFDIR}' || grep password
      '${PGSYSCONFDIR}/pg_service.conf' If any of the commands above returns a line
      containing password=..., this is a finding.
    remediation: >
      Delete every password entry in the file(s) previously identified. References:
      1. https://www.postgresql.org/docs/current/libpq-pgservice.html
