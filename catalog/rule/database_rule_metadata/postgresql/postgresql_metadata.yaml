  - rule_id: postgresql.cis.3.log_hostname_is_set_correctly
    title: "Ensure 'log_hostname' is set correctly"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: automated
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "3.1.23"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Enabling the log_hostname setting causes the hostname of the connecting host
      to be logged in addition to the host's IP address for connection log messages.
      Disabling the setting causes only the connecting host's IP address to be
      logged, and not the hostname. Unless your organization's logging policy
      requires hostname logging, it is best to disable this setting so as not to
      incur the overhead of DNS resolution for each statement that is logged.
    rationale: >
      Depending on your hostname resolution setup, enabling this setting might
      impose a non-negligible performance penalty. Additionally, the IP addresses
      that are logged can be resolved to their DNS names when reviewing the logs
      (unless dynamic hostnames are being used as part of your DHCP setup).
    audit_procedure: >
      Execute the following SQL statement to verify the setting is correct:
      postgres=# show log_hostname; log_hostname -------------- off (1 row) If not
      configured to off, this is a fail.
    remediation: >
      Execute the following SQL statement(s) to remediate this setting (in this
      example, to off): postgres=# alter system set log_hostname='off'; ALTER SYSTEM
      postgres=# select pg_reload_conf(); pg_reload_conf ---------------- t (1 row)
      Default Value: off References: 1.
      https://www.postgresql.org/docs/current/static/runtime-config-logging.html
    references: >
