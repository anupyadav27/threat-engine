    cis_control: "2.4"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      One can set a password in a PostgreSQL connection service file. Verify the
      password option is not used in a connection service file.
    rationale: >
      Using the password parameter may negatively impact the confidentiality of the
      user's password. Impact: The global configuration is by default readable for
      all users on the system. This is needed for global defaults (prompt, port,
      socket, etc.). If a password is present in this file then all users on the
      system may be able to access it.
    audit_procedure: >
      To assess this recommendation, perform the following steps: # whoami root #
      find / -name .pg_service.conf -type f -print | xargs -I{} grep -H password {}
