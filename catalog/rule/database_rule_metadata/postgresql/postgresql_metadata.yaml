    cis_control: "6.6"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      These PostgreSQL runtime parameters are managed at the user account (ROLE)
      level.
    rationale: >
      In order to improve performance and optimize features, a ROLE has the
      privilege of setting numerous parameters in a transaction, session, or entity
      attribute. Any ROLE can alter any of these parameters. Impact: A denial of
      service is possible by the over-allocating of limited resources, such as RAM.
      Changing VACUUM parameters can force a server shutdown which is standard
      procedure preventing data corruption from transaction ID wraparound. Data can
      be corrupted by changing parameters to reinterpret values in an unexpected
      fashion, e.g. changing the time zone. Logging can be altered and obfuscated to
      inhibit root cause analysis.
