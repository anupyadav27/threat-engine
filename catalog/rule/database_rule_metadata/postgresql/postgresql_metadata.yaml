      temp_file_limit | -1 track_activities | on track_counts | on track_functions |
      none track_io_timing | off track_wal_io_timing | off update_process_title | on
      wal_compression | off wal_consistency_checking | wal_init_zero | on
      wal_recycle | on zero_damaged_pages | off (56 rows)```
    remediation: >
      The exploit is made in the configuration files. These changes are effected
      upon server restart. Once detected, the unauthorized/undesired change can be
      made by editing the altered configuration file and executing a server restart.
      In the case where the parameter has been set on the command-line invocation of
      pg_ctl the restart invocation is insufficient and an explicit stop and start
      must instead be made. Detecting a change is possible by one of the following
      methods: 1. Query the view pg_settings and compare with previous query outputs
      for any changes. 2. Review the configuration files postgreql.conf and
      postgreql.auto.conf and compare with previously archived file copies for any
      changes 3. Examine the process output and look for parameters that were used
      at server startup: ps aux | grep -E -- '[p]ost.*-[D]' 4. Examine the contents
      of $PGDATA/postmaster.opts References: 1.
      https://www.postgresql.org/docs/current/static/view-pg-settings.html 2.
      https://www.postgresql.org/docs/current/static/runtime-config.html
    references: >
      1. https://www.postgresql.org/docs/current/static/view-pg-settings.html 2.
      https://www.postgresql.org/docs/current/static/runtime-config.html
    impact: >
      All changes made on this level will affect the overall behavior of the server.
      These changes can only be affected by a server restart after the parameters
      have been altered in the configuration files. A denial of service is possible
      by the over-allocating of limited resources, such as RAM. Data can be
      corrupted by allowing damaged pages to load or by changing parameters to
      reinterpret values in an unexpected fashion, e.g. changing the time zone.
      Client messages can be altered in such a way as to interfere with the
      application logic. Logging can be altered and obfuscated inhibiting root cause
      analysis.
