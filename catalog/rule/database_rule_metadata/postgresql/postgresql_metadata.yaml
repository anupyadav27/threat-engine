  - rule_id: postgresql.cis.8.miscellaneous_configuration_settings_are_correct
    title: "Ensure miscellaneous configuration settings are correct"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: manual
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "8.3"
    cis_section: "8"
    profile_applicability: "Level 1"
    description: >
      This recommendation covers non-regular, special files, and dynamic libraries.
      PostgreSQL permits local logins via the UNIX DOMAIN SOCKET and, for the most
      part, anyone with a legitimate Unix login account can make the attempt.
      Limiting PostgreSQL login attempts can be made by relocating the UNIX DOMAIN
      SOCKET to a subdirectory with restricted permissions. The creation and
      implementation of user-defined dynamic libraries is an extraordinary powerful
      capability. In the hands of an experienced DBA/programmer, it can
      significantly enhance the power and flexibility of the RDBMS; but new and
      unexpected behavior can also be assigned to the RDBMS, resulting in a very
      dangerous environment in what should otherwise be trusted.
    rationale: >
      
    audit_procedure: >
      Execute the following SQL statement to verify the configuration is correct.
      Alternatively, inspect the parameter settings in the postgresql.conf
      configuration file. postgres=# SELECT name, setting FROM pg_settings WHERE
      name IN ('external_pid_file',
      'unix_socket_directories','shared_preload_libraries','dynamic_library_path','
      local_preload_libraries','session_preload_libraries'); name | setting
      ---------------------------+--------------------------- dynamic_library_path |
      $libdir external_pid_file | local_preload_libraries |
      session_preload_libraries | shared_preload_libraries | pgaudit, set_user,
      passwordcheck unix_socket_directories | /var/run/postgresql, /tmp (6 rows)
      Inspect the file and directory permissions for all returned values. Only
      superusers should have access control rights for these files and directories.
      If permissions are not highly restricted, this is a fail.
    remediation: >
      Follow these steps to remediate the configuration: • Determine permissions
      based on your organization's security policies. • Relocate all files and
      ensure their permissions are restricted as much as possible, i.e. only
      superuser read access. • Ensure all directories where these files are located
      have restricted permissions such that the superuser can read but not write. •
      Lastly, change the settings accordingly in the postgresql.conf configuration
      file and restart the database cluster for changes to take effect. Default
      Value: The dynamic_library_path default is $libdir and unix_socket_directories
      default is /var/run/postgresql, /tmp. The default for external_pid_file and
      all library parameters are initially null, or not set, upon cluster creation.
      References: 1. https://www.postgresql.org/docs/current/static/runtime-config-
      file-locations.html 2. https://www.postgresql.org/docs/current/static/runtime-
      config-connection.html 3.
      https://www.postgresql.org/docs/current/static/runtime-config-client.html
    references: >
      1. https://www.postgresql.org/docs/current/static/runtime-config-file-
      locations.html 2. https://www.postgresql.org/docs/current/static/runtime-
      config-connection.html 3.
      https://www.postgresql.org/docs/current/static/runtime-config-client.html
    impact: >
      
