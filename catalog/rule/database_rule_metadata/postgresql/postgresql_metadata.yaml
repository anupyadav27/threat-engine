  - rule_id: postgresql.cis.7.wal_archiving_is_configured_and_functional
    title: "Ensure WAL archiving is configured and functional"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: automated
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "7.4"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      Write Ahead Log (WAL) Archiving, or Log Shipping, is the process of sending
      transaction log files from the PRIMARY host either to one or more STANDBY
      hosts or to be archived on a remote storage device for later use, e.g. PITR.
      There are several utilities that can copy WALs including, but not limited to,
      cp, scp, sftp, and rynsc. Basically, the server follows a set of runtime
      parameters which define when the WAL should be copied using one of the
      aforementioned utilities.
    rationale: >
      Unless the server has been correctly configured, one runs the risk of sending
      WALs in an unsecured, unencrypted fashion.
    audit_procedure: >
      Review the following parameters: postgres=# SELECT name, setting FROM
      pg_settings WHERE name IN ('archive_mode','archive_command','archive_library')
      AND setting IS NOT NULL AND setting <> 'off' AND setting <> '(disabled)' AND
      setting <> ''; name | setting ------+--------- (o rows) If no rows are
      returned, as shown, this is a failure. If rows are returned, note that
      archive_mode must be 'on' and either archive_command or archive_library must
      be set for WAL archiving to be fully enabled. To verify that WAL archiving is
      functioning successfully, one can: postgres=# SELECT * FROM pg_stat_archiver;
      \watch And ensure that archived_count, last_archived_wal, and
      last_archived_time are changing while failed_count, last_failed_wal, and
      last_failed_time are not changing.
    remediation: >
      Change parameters and restart the server as required. References: 1.
      https://www.postgresql.org/docs/current/static/runtime-config-
      wal.html#RUNTIME-CONFIG-WAL-ARCHIVING
    references: >
      1. https://www.postgresql.org/docs/current/static/runtime-config-
