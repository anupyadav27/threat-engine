  - rule_id: postgresql.cis.4.lock_out_accounts_if_not_currently_in_use
    title: "Lock Out Accounts if Not Currently in Use"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: manual
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "4.4"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      If users with database accounts will not be using the database for some time,
      disabling the account will reduce the risk of attacks or inappropriate account
      usage.
    rationale: >
      Only actively used database accounts should be allowed to login to the
      database.
    audit_procedure: >
      Review the status of all database accounts: # whoami postgres # psql SELECT
      rolname FROM pg_catalog.pg_roles WHERE rolname !~ '^pg_' AND rolcanlogin;
      Inactive accounts should not be shown in the output.
    remediation: >
      To lock accounts, as a superuser, run: ALTER ROLE <account> NOLOGIN; To unlock
      accounts, as a superuser, run: ALTER ROLE <account> LOGIN; Default Value:
      Accounts created by CREATE ROLE are NOLOGIN by default. Accounts created by
      CREATE USER are LOGIN by default. Additional Information: It is possible to
      specify NOLOGIN when using both CREATE ROLE and CREATE USER: CREATE ROLE
      <account> NOLOGIN; CREATE USER <account> NOLOGIN;
