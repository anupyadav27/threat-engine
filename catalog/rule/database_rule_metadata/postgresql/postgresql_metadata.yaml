  - rule_id: postgresql.cis.3.postgresql_audit_extension_pgaudit_is_enabled
    title: "Ensure the PostgreSQL Audit Extension (pgAudit) is enabled"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: automated
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "3.2"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The PostgreSQL Audit Extension (pgAudit) provides detailed session and/or
      object audit logging via the standard PostgreSQL logging facility. The goal of
      pgAudit is to provide PostgreSQL users with the capability to produce audit
      logs often required to comply with government, financial, or ISO
      certifications.
    rationale: >
      Basic statement logging can be provided by the standard logging facility with
      log_statement = all. This is acceptable for monitoring and other uses but does
      not provide the level of detail generally required for an audit. It is not
      enough to have a list of all the operations performed against the database, it
      must also be possible to find particular statements that are of interest to an
      auditor. The standard logging facility shows what the user requested, while
      pgAudit focuses on the details of what happened while the database was
      satisfying the request. When logging SELECT and DML statements, pgAudit can be
      configured to log a separate entry for each relation referenced in a
      statement. No parsing is required to find all statements that touch a
      particular table. In fact, the goal is that the statement text is provided
      primarily for deep forensics and should not be required for an audit. Impact:
      Depending on settings, it is possible for pgAudit to generate an enormous
      volume of logging . Be careful to determine exactly what needs to be audit
      logged in your environment to avoid logging too much.
    audit_procedure: >
      First, as the database administrator (shown here as 'postgres'), verify
      pgAudit is enabled by running the following commands: postgres=# show
      shared_preload_libraries; shared_preload_libraries --------------------------
      pgaudit (1 row) If the output does not contain 'pgaudit', this is a fail.
      Next, verify that desired auditing components are enabled: postgres=# show
      pgaudit.log; ERROR: unrecognized configuration parameter 'pgaudit.log' If the
      output does not contain the desired auditing components, this is a fail. The
      list below summarizes pgAudit.log components: • READ: SELECT and COPY when the
      source is a relation or a query. • WRITE: INSERT, UPDATE, DELETE, TRUNCATE,
      and COPY when the destination is a relation. • FUNCTION: Function calls and DO
      blocks. • ROLE: Statements related to roles and privileges: GRANT, REVOKE,
      CREATE/ALTER/DROP ROLE. • DDL: All DDL that is not included in the ROLE class.
      • MISC: Miscellaneous commands, e.g. DISCARD, FETCH, CHECKPOINT, VACUUM.
    remediation: >
      To install and enable pgAudit, simply install the appropriate rpm from the
      PGDG repo: # whoami root # dnf -y install pgaudit_17 [snip] Installed:
      pgaudit_17-17.0-1PGDG.rhel9.x86_64 Complete! pgAudit is now installed and
      ready to be configured. Next, we need to alter the postgresql.conf
      configuration file to: • enable pgAudit as an extension in the
      shared_preload_libraries parameter • indicate which classes of statements we
      want to log via the pgaudit.log parameter and, finally, restart the PostgreSQL
      service: # whoami root # vi ~postgres/17/data/postgresql.conf Find the
      shared_preload_libraries entry, and add 'pgaudit' to it (preserving any
      existing entries): shared_preload_libraries = 'pgaudit' OR
      shared_preload_libraries = 'pgaudit,somethingelse' Now, add a new pgaudit-
      specific entry at the end of the file: # for this example we are logging the
      ddl and write operations pgaudit.log='ddl,write' Restart the PostgreSQL server
      for changes to take affect: # whoami root # systemctl restart postgresql-17 #
      systemctl status postgresql-17|grep 'ago$' Active: active (running) since
      [date] 10s ago References: 1. https://www.pgaudit.org/ Additional Information:
      pgAudit versions relate to PostgreSQL major versions; ensure you install the
      pgAudit package that matches your PostgreSQL version.
    references: >
      1. https://www.pgaudit.org/ Additional Information: pgAudit versions relate to
      PostgreSQL major versions; ensure you install the pgAudit package that matches
      your PostgreSQL version.
    impact: >
      Depending on settings, it is possible for pgAudit to generate an enormous
      volume of logging . Be careful to determine exactly what needs to be audit
      logged in your environment to avoid logging too much.
    compliance_mappings:
      cis:
        - "CIS_POSTGRESQL_17_v1_0_0_3_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
