    cis_version: "17_v1.0.0"
    cis_control: "1.7"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      PostgreSQL can read a default database password from an environment variable
      called PGPASSWORD.
    rationale: >
      Using the PGPASSWORD environment variable implies PostgreSQL credentials are
      stored as clear text. Avoiding use of this environment variable can better
      safeguard the confidentiality of PostgreSQL credentials.
    audit_procedure: >
      To assess this recommendation, use the /proc filesystem and the following
      terminal command as a privileged user to determine if PGPASSWORD is currently
      set for any process. # whoami root # grep PGPASSWORD /proc/*/environ This may
      return one false-positive entry for the process which is executing the grep
      command.
    remediation: >
      Check which users and/or scripts are setting PGPASSWORD and change them to use
      a more secure method. References: 1. https://www.postgresql.org/docs/15/libpq-
      envars.html
    references: >
