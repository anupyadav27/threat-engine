  - rule_id: postgresql.cis.4.interactive_login_is_disabled
    title: "Ensure Interactive Login is Disabled"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: manual
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "4.1"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      When created, the PostgreSQL user may have interactive access to the operating
      system, which means that the PostgreSQL user could login to the host as any
      other user would.
    rationale: >
      Preventing the PostgreSQL user from logging in interactively may reduce the
      impact of a compromised PostgreSQL account. There is also more accountability,
      as accessing the operating system where the PostgreSQL server lies will
      require the user's own account and the apprpriate sudo configuration.
      Interactive access by the PostgreSQL user is unnecessary and should be
      disabled. Impact: This setting will prevent the PostgreSQL administrator from
      interactively logging into the operating system using the PostgreSQL user.
      Instead, the administrator will need to log in using one's own account and
      then sudo to the PostgreSQL administrator account.
    audit_procedure: >
      Execute the following terminal command as low-privileged user to assess this
      recommendation: # whoami root # grep postgres /etc/shadow | cut -d: -f1-2 If
      this output is not postgres:! <something> then this is a failure.
    remediation: >
      Execute the following command: # whoami root # passwd -l postgres
    references: >
      
    impact: >
      This setting will prevent the PostgreSQL administrator from interactively
      logging into the operating system using the PostgreSQL user. Instead, the
      administrator will need to log in using one's own account and then sudo to the
      PostgreSQL administrator account.
