  - rule_id: postgresql.cis.4.excessive_administrative_privileges_are_revoked
    title: "Ensure excessive administrative privileges are revoked"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: manual
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "4.3"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      With respect to PostgreSQL administrative SQL commands, only superusers should
      have elevated privileges. PostgreSQL regular, or application, users should not
      possess the ability to create roles, create new databases, manage replication,
      or perform any other action deemed privileged. Typically, regular users should
      only be granted the minimal set of privileges commensurate with managing the
      application: • DDL (create table, create view, create index, etc.) • DML
      (select, insert, update, delete) Further, it has become best practice to
      create separate roles for DDL and DML. Given an application called 'payroll',
      one would create the following users: • payroll_owner • payroll_user Any DDL
      privileges would be granted to the payroll_owner account only, while DML
      privileges would be given to the payroll_user account only. This prevents
      accidental creation/altering/dropping of database objects by application code
      that runs as the payroll_user account.
    rationale: >
      By not restricting global administrative commands to superusers only, regular
      users granted excessive privileges may execute administrative commands with
      unintended and undesirable results.
    audit_procedure: >
      First, inspect the privileges granted to the database superuser (identified
      here as postgres) using the display command psql -c '\du postgres' to
      establish a baseline for granted administrative privileges. Based on the
      output below, the postgres superuser can create roles, create databases,
      manage replication, and bypass row- level security (RLS): # whoami postgres #
      psql -c '\du+ postgres' List of roles Role name | Attributes | Description
      ----------+-------------------------------------------------+-----------
      postgres | Superuser, Create role, Create DB, Replication, | | Bypass RLS |
      Now, let's inspect the same information for a mock regular user called appuser
      using the display command psql -c '\du+ appuser'. The output confirms that
      regular user appuser has the same elevated privileges as system administrator
      user postgres. This is a fail. # whoami postgres # psql -c '\du+ appuser' List
      of roles Role name | Attributes | Description
      ----------+-------------------------------------------------+-----------
      appuser | Superuser, Create role, Create DB, Replication, | | Bypass RLS |
      While this example demonstrated excessive administrative privileges granted to
      a single user, a comprehensive audit should be conducted to inspect all
      database users for excessive administrative privileges. This can be
      accomplished via either of the commands below. # whoami postgres # psql -c
      '\du+ *' # psql -c 'SELECT * FROM pg_user WHERE usesuper ORDER BY usename;'
      Note: Using \du+ * will show all the default PostgreSQL roles (e.g.
      pg_monitor) as well as any 'normal' roles, whereas the SELECT will show only
      'normal' roles. This is expected, and should not be cause for alarm.
    remediation: >
      If any regular or application users have been granted excessive administrative
      rights, those privileges should be removed immediately via the PostgreSQL
      ALTER ROLE SQL command. Using the same example above, the following SQL
      statements revoke all unnecessary elevated administrative privileges from the
      regular user appuser: # whoami postgres # psql -c 'ALTER ROLE appuser
      NOSUPERUSER;' ALTER ROLE # psql -c 'ALTER ROLE appuser NOCREATEROLE;' ALTER
      ROLE # psql -c 'ALTER ROLE appuser NOCREATEDB;' ALTER ROLE # psql -c 'ALTER
      ROLE appuser NOREPLICATION;' ALTER ROLE # psql -c 'ALTER ROLE appuser
      NOBYPASSRLS;' ALTER ROLE # psql -c 'ALTER ROLE appuser NOINHERIT;' ALTER ROLE
      Verify the appuser now passes your check by having no defined Attributes: #
      whoami postgres # psql -c '\du+ appuser' List of roles Role name | Attributes
      | Description ----------+------------+----------- appuser | | References: 1.
