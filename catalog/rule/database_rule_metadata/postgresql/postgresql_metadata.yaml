  - rule_id: postgresql.cis.3.log_file_permissions_are_set_correctly
    title: "Ensure the log file permissions are set correctly"
    severity: high
    category: database
    tech_type: postgresql
    automation_type: automated
    cis_benchmark: "CIS_POSTGRESQL 17_v1.0.0"
    cis_version: "17_v1.0.0"
    cis_control: "3.1.6"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The log_file_mode setting determines the file permissions for log files when
      logging_collector is enabled. The parameter value is expected to be a numeric
      mode specification in the form accepted by the chmod and umask system calls.
      (To use the customary octal format, the number must start with a 0 (zero).)
      The permissions should be set to allow only the necessary access to authorized
      personnel. In most cases, the best setting is 0600, so that only the server
      owner can read or write the log files. The other commonly useful setting is
      0640, allowing members of the owner's group to read the files, although to
      make use of that, you will need to either alter the log_directory setting to
      store the log files outside the cluster data directory or use
      PGSETUP_INITDB_OPTIONS='-k -g' when initializing the cluster.
    rationale: >
      Log files often contain sensitive data. Allowing unnecessary access to log
      files may inadvertently expose sensitive data to unauthorized personnel.
    audit_procedure: >
      Execute the following SQL statement to verify that the setting is consistent
      with organizational logging policy: postgres=# show log_file_mode;
      log_file_mode --------------- 0600 (1 row)
    remediation: >
      Execute the following SQL statement(s) to remediate this setting (with the
      example assuming the desired value of 0600): postgres=# alter system set
      log_file_mode = '0600'; ALTER SYSTEM postgres=# select pg_reload_conf();
      pg_reload_conf ---------------- t (1 row) postgres=# show log_file_mode;
      log_file_mode --------------- 0600 (1 row) Default Value: 0600 References: 1.
      https://www.postgresql.org/docs/current/static/runtime-config-logging.html
    references: >
      1. https://www.postgresql.org/docs/current/static/runtime-config-logging.html
    impact: >
      
