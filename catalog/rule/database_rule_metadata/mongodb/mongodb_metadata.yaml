    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      MongoDB database files need to be protected using file permissions.
    rationale: >
      This will restrict unauthorized users from accessing the database.
    audit_procedure: >
      To verify that the permissions for the MongoDB database file are configured
      securely, run the following commands. Find out the database location using the
      following command: On Ubuntu: cat /etc/mongod.conf |grep 'dbpath' or cat
      /etc/mongod.conf | grep 'dbPath' Use the database location as part of the
      following command to view and verify the permissions set for the database
      file: Example: $ stat -c '%a' /var/lib/mongodb On Windows: type mongod.conf |
      findstr 'dbpath' Use the database location as part of the following command to
      view and verify the permissions set for the database file: icacls 'dbpath'
    remediation: >
      Set ownership of the database file to mongodb user and remove other
      permissions using the following commands: chmod 770 /var/lib/mongodb chown
      mongodb:mongodb /var/lib/mongodb Default Value: Not configured References: 1.
      https://www.mongodb.com/docs/v7.0/reference/configuration-options/#mongodb-
      setting-storage.dbPath
