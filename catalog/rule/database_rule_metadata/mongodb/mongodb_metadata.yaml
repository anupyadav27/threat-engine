  - rule_id: mongodb.cis.3.role_based_access_control_is_enabled_and
    title: "Ensure that role-based access control is enabled and configured appropriately"
    severity: high
    category: database
    tech_type: mongodb
    automation_type: manual
    cis_benchmark: "CIS_MONGODB 7_v1.0.0"
    cis_version: "7_v1.0.0"
    cis_control: "3.2"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Role-based access control (RBAC) is a method of regulating access to resources
      based on the roles of individual users within an enterprise. A user is granted
      one or more roles that determine the user’s access to database resources and
      operations. Outside of role assignments, the user has no access to the system.
      MongoDB can use RBAC to govern access to MongoDB systems. MongoDB does not
      enable authorization by default.
    rationale: >
      When properly implemented, RBAC enables users to carry out a wide range of
      authorized tasks by dynamically regulating their actions according to flexible
      functions. This allows an organization to control employees’ access to all
      database tables through RBAC.
    audit_procedure: >
      Connect to MongoDB with the appropriate privileges and run the following
      command: Identify users' roles and privileges: > db.getUser() > db.getRole()
      Verify that the appropriate role or roles have been configured for each user.
    remediation: >
      1. Establish roles for MongoDB. 2. Assign the appropriate privileges to each
      role. 3. Assign the appropriate users to each role. 4. Remove any individual
      privileges assigned to users that are now addressed by the roles. 5. See the
      reference below for more Information. References: 1.
      https://www.mongodb.com/docs/v7.0/tutorial/manage-users-and-roles/
    references: >
      1. https://www.mongodb.com/docs/v7.0/tutorial/manage-users-and-roles/
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_MONGODB_7_v1_0_0_3_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_mongodb_7_v1_0_0_3_2"
