  - rule_id: mongodb.cis.1.appropriate_mongodb_software_version_patches_are
    title: "Ensure the appropriate MongoDB software version/patches are installed"
    severity: high
    category: database
    tech_type: mongodb
    automation_type: manual
    cis_benchmark: "CIS_MONGODB 7_v1.0.0"
    cis_version: "7_v1.0.0"
    cis_control: "1.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      The MongoDB installation version, along with the patch level, should be the
      most recent that is compatible with the organization's operational needs. In
      addition, regularly view latest minor security patch updates for security
      vulnerability fixes (CVE Related) from MongoDB website:
      https://www.mongodb.com/alerts
    rationale: >
      Using the most recent MongoDB software version along with all applicable
      patches, helps limit the possibilities for vulnerabilities in the software.
      The installation version and/or patches applied should be selected according
      to the needs of the organization. At a minimum, the software version should be
      supported.
    audit_procedure: >
      On Ubuntu: Run the following command from within the MongoDB shell to
      determine if the MongoDB software version complies with your organization’s
      operational needs: mongo --version db.version() #Inside mongo console On
      Windows: Navigate to the Installation directory of Mongo DB on the server and
      run below command mongod.exe --version
    remediation: >
      Upgrade to the latest version of the MongoDB software: 1. Backup the data set.
      2. Download the binaries for the latest MongoDB revision from the MongoDB
      Download Page and store the binaries in a temporary location. The binaries
      download as compressed files that extract to the directory structure used by
      the MongoDB installation. 3. Shutdown the MongoDB instance. 4. Replace the
      existing MongoDB binaries with the downloaded binaries. 5. Restart the MongoDB
      instance. Default Value: Patches are not installed by default. References: 1.
      https://www.mongodb.com/docs/v7.0/installation/ 2.
      https://www.mongodb.com/docs/v7.0/release-notes/7.0/#std-label-release-notes-
      7.0 3. https://www.mongodb.com/download-center#community 4.
      https://www.mongodb.com/support-policy 5. https://www.mongodb.com/alerts
    references: >
      1. https://www.mongodb.com/docs/v7.0/installation/ 2.
      https://www.mongodb.com/docs/v7.0/release-notes/7.0/#std-label-release-notes-
      7.0 3. https://www.mongodb.com/download-center#community 4.
      https://www.mongodb.com/support-policy 5. https://www.mongodb.com/alerts
    impact: >
      
