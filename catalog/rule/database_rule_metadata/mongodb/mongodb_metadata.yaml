  - rule_id: mongodb.cis.2.authentication_is_configured
    title: "Ensure Authentication is configured"
    severity: high
    category: database
    tech_type: mongodb
    automation_type: automated
    cis_benchmark: "CIS_MONGODB 7_v1.0.0"
    cis_version: "7_v1.0.0"
    cis_control: "2.1"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      This setting ensures that all clients, users, servers are required to
      authenticate before being granted access to the MongoDB database.
      Authentication is the process of verifying the identity of a client. When
      access control, i.e. authorization, is enabled, MongoDB requires all clients
      to authenticate themselves in order to determine their access. from MongoDB
      documentation Authentication Mechanisms MongoDB supports a number of
      authentication mechanisms that clients can use to verify their identity. These
      mechanisms allow MongoDB to integrate into your existing authentication
      system. MongoDB supports multiple authentication mechanisms: • SCRAM (Default)
      • x.509 Certificate Authentication. Certificate Authority For production use,
      your MongoDB deployment should use valid certificates generated and signed by
      a certificate authority. You or your organization can generate and maintain an
      independent certificate authority, or use certificates generated by third-
      party TLS/SSL vendors. In addition to supporting the aforementioned
      mechanisms, MongoDB Enterprise also supports the following mechanisms: • LDAP
      proxy authentication • Kerberos authentication.
    rationale: >
      Failure to authenticate clients, users, servers can enable unauthorized access
      to the MongoDB database and can prevent tracing actions back to their sources.
      It's highly recommended that password length and complexity also be in-place.
      When performing the traditional user/password authentication against MongoDB
      there is not in-place intrinsic password complexity check and there is no
      LOCKING mechanism with multiple failure logins. So, MongoDB is prone to brute
      force attacks compared to other database systems.
    audit_procedure: >
      Run the following command to verify whether an authorization is enabled on the
      MongoDB server. On Ubuntu: cat /etc/mongod.conf | grep “authorization” On
      Windows: type mongod.conf | findstr “authorization” The value for
      authorization must be set to enabled. To authenticate using the mongo shell
      use the following approach • Use the mongo command-line authentication options
      (--username, --password, and --authenticationDatabase) when connecting to the
      mongod or mongos instance Or • Connect first to the mongod or mongos instance,
      and then run the authenticate command or the db.auth() method against the
      authentication database.
    remediation: >
      The authentication mechanism should be implemented before anyone accesses the
      MongoDB Server. To enable the authentication mechanism: • Start the MongoDB
      instance without authentication. mongod --port 27017 --dbpath /data/db1 Or
      mongod.exe --port 27017 --dbpath db1 • Create the system user administrator,
      ensuring that its password meets organizationally-defined password in terms of
      length and complexity requirements as there is no in-place locking mechanism
      for multiple failed login attempts against MongoDB. use admin db.createUser( {
      user: 'MongoAdmin', pwd: 'password', roles: [ { role: 'root', db: 'admin' } ]
      } ) • Open mongod.conf and change for authorization value to enabled:
      security: authorization: 'enabled' • Restart the MongoDB instance service
      mongod restart Default Value: By default, authorization is set to disable.
      References: 1. https://www.mongodb.com/docs/v7.0/core/authentication/
    references: >
      1. https://www.mongodb.com/docs/v7.0/core/authentication/
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_MONGODB_7_v1_0_0_2_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_mongodb_7_v1_0_0_2_1"
