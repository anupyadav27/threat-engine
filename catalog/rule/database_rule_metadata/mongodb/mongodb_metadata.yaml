  - rule_id: mongodb.cis.4.encryption_of_data_at_rest
    title: "Ensure Encryption of Data at Rest"
    severity: medium
    category: database
    tech_type: mongodb
    automation_type: manual
    cis_benchmark: "CIS_MONGODB 7_v1.0.0"
    cis_version: "7_v1.0.0"
    cis_control: "4.5"
    cis_section: "4"
    profile_applicability: "Level 2"
    description: >
      Encryption of data at rest must be enabled to ensure compliance with security
      and privacy standards including HIPAA, PCI-DSS, and FERPA. Encryption at rest,
      when used in conjunction with transport encryption and good security policies
      that protect relevant accounts, passwords, and encryption keys.
    rationale: >
      Unauthorized users, such as intruders who are attempting security attacks,
      cannot read the data from storage and back up media unless they have the
      master encryption key to decrypt it.
    audit_procedure: >
      To verify that the server requires TLS (net.tls.mode value set to requireTLS),
      run one of the following commands: On Ubuntu: cat /etc/mongod.conf | grep
      --enableEncryption 'yes' | grep -- encryptionKeyFile '<path to keyfile>' On
      Windows: type mongod.conf | findstr --enableEncryption 'yes' | findstr --
      encryptionKeyFile '<path to keyfile>'
    remediation: >
      It is recommended to enable the data at rest encryption to protect the data.
      Protecting Data at Rest Including following steps. • Generating a master key.
      • Generating keys for each database. • Encrypting data with the database keys.
      • Encrypting the database keys with the master key. Only the master key is
      external to the server and requires external management. To manage the master
      key, MongoDB’s encrypted storage engine supports two key management options: •
      Integration with a third-party key management appliance via the Key Management
      Interoperability Protocol (KMIP). Recommended • Use of local key management
      via a keyfile. The encryption occurs transparently in the storage layer; i.e.
      all data files are fully encrypted from a filesystem perspective, and data
      only exists in an unencrypted state in memory and during transmission. To
      enable Encryption on Database follow below step mentioned in below Link
      https://docs.mongodb.com/manual/tutorial/configure-encryption/ Rotation of Key
      is also important. This can be enabled by following mentioned steps in below
      link. https://docs.mongodb.com/manual/tutorial/rotate-encryption-key/
      References: 1. https://www.mongodb.com/docs/v7.0/core/security-encryption-at-
      rest/ Additional Information: Available in MongoDB Enterprise only.
    references: >
      1. https://www.mongodb.com/docs/v7.0/core/security-encryption-at-rest/
      Additional Information: Available in MongoDB Enterprise only.
    impact: >
      
