  - rule_id: mongodb.cis.5.system_activity_is_audited
    title: "Ensure that system activity is audited"
    severity: high
    category: database
    tech_type: mongodb
    automation_type: automated
    cis_benchmark: "CIS_MONGODB 7_v1.0.0"
    cis_version: "7_v1.0.0"
    cis_control: "5.1"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      Track access and changes to database configurations and data. MongoDB
      Enterprise includes a system auditing facility that can record system events
      (e.g. user operations, connection events) on a MongoDB instance. These audit
      records permit forensic analysis and allow administrators to verify proper
      controls.
    rationale: >
      System level logs can be handy while troubleshooting an operational problem or
      handling a security incident.
    audit_procedure: >
      To verify that system activity is being audited for MongoDB, run the following
      command to confirm the auditLog.destination value is set correctly: On Ubuntu:
      cat /etc/mongod.conf |grep –A4 'auditLog' | grep 'destination' On Windows:
      type mongod.conf | findstr –A4 'auditLog' | findstr 'destination'
    remediation: >
      Set the value of auditLog.destination to the appropriate value from the
      following options: syslog To enable auditing and print audit events to syslog
      mongod --dbpath data/db --auditDestination syslog console To enable auditing
      and print audit events to standard output (i.e., stdout) mongod --dbpath
      data/db --auditDestination console Json File To enable auditing and print
      audit events to a file in JSON format. Printing audit events to file in JSON
      format degrades server performance more than printing to a file in BSON
      format. mongod --dbpath data/db --auditDestination file --auditFormat JSON --
      auditPath data/db/auditLog.json Bson File To enable auditing and print audit
      events to a file in BSON binary format mongod --dbpath data/db
      --auditDestination file --auditFormat BSON -- auditPath data/db/auditLog.bson
      Default Value: Not configured References: 1.
      http://docs.mongodb.org/manual/tutorial/configure-auditing/
    references: >
      1. http://docs.mongodb.org/manual/tutorial/configure-auditing/
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_MONGODB_7_v1_0_0_5_1"
