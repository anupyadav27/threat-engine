  - rule_id: mongodb.cis.6.mongodb_uses_a_non_default_port
    title: "Ensure that MongoDB uses a non-default port"
    severity: high
    category: database
    tech_type: mongodb
    automation_type: automated
    cis_benchmark: "CIS_MONGODB 7_v1.0.0"
    cis_version: "7_v1.0.0"
    cis_control: "6.1"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Changing the default port used by MongoDB makes it harder for attackers to
      find the database and target it.
    rationale: >
      Standard ports are used in automated attacks and by attackers to verify which
      applications are running on a server. Impact: Hackers frequently scan IP
      addresses for commonly used ports, so it's not uncommon to use a different
      port to 'fly under the radar'. This is just to avoid detection, other than
      that there is no added safety by using a different port.
    audit_procedure: >
      To verify the port number used by MongoDB, execute the following command and
      ensure that the port number is not 27017: On Ubuntu: cat /etc/mongod.conf
      |grep “port” On Windows: type mongod.conf | findstr “port”
    remediation: >
      Change the port for MongoDB server to a number other than 27017. In
      mongod.conf edit the below lines # network interfaces net: port: $Orginasation
      Defined port bindIp: $Orginasation Defined IP References: 1.
      https://docs.mongodb.com/v5.0/reference/default-mongodb-port/
    references: >
      1. https://docs.mongodb.com/v5.0/reference/default-mongodb-port/
    impact: >
      Hackers frequently scan IP addresses for commonly used ports, so it's not
      uncommon to use a different port to 'fly under the radar'. This is just to
      avoid detection, other than that there is no added safety by using a different
      port.
    compliance_mappings:
      cis:
        - "CIS_MONGODB_7_v1_0_0_6_1"
      nist_800_53: []
