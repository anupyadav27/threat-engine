  - rule_id: mongodb.cis.2.mongodb_does_not_bypass_authentication_via_the
    title: "Ensure that MongoDB does not bypass authentication via the localhost exception"
    severity: high
    category: database
    tech_type: mongodb
    automation_type: automated
    cis_benchmark: "CIS_MONGODB 7_v1.0.0"
    cis_version: "7_v1.0.0"
    cis_control: "2.2"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      MongoDB should not be set to bypass authentication via the localhost
      exception. The localhost exception allows the user to enable authorization
      before creating the first user in the system. When active, the localhost
      exception allows all connections from the localhost interface to have full
      access to that instance. The exception applies only when there are no users
      created in the MongoDB instance. Note: This recommendation only applies when
      there are no users created in the MongoDB instance.
    rationale: >
      Disabling this exception will prevent unauthorized local access to the MongoDB
      database. It will also ensure the traceability of each database activity to a
      specific user. Localhost Exception allows direct connect to Mongod’s without
      any UN/PW.
    audit_procedure: >
      Run the following command to extract the information about
      enableLocalhostAuthBypass setting on Configuration File. On Ubuntu: cat
      /etc/mongod.conf |grep 'enableLocalhostAuthBypass' On Windows: type
      mongod.conf | findstr 'enableLocalhostAuthBypass' The value for
      enableLocalhostAuthBypass must be false.
    remediation: >
      To disable local authentication on the MongoDB database. Type OS Console
      Command mongod --setParameter enableLocalhostAuthBypass=0 or To manually
      configure use the setParameter option in the mongo configuration file to set
      it to false. setParameter: enableLocalhostAuthBypass: false Default Value: By
      default, localhost exception value (enableLocalhostAuthBypass) is true.
      References: 1. https://www.mongodb.com/docs/v7.0/core/localhost-exception/
    references: >
      1. https://www.mongodb.com/docs/v7.0/core/localhost-exception/
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_MONGODB_7_v1_0_0_2_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_mongodb_7_v1_0_0_2_2"
