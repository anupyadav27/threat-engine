  - rule_id: mongodb.cis.3.each_role_for_each_mongodb_database_is_needed_and
    title: "Ensure that each role for each MongoDB database is needed and grants only the necessary privileges"
    severity: high
    category: database
    tech_type: mongodb
    automation_type: manual
    cis_benchmark: "CIS_MONGODB 7_v1.0.0"
    cis_version: "7_v1.0.0"
    cis_control: "3.4"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Reviewing all roles periodically and eliminating unneeded roles as well as
      unneeded privileges from necessary roles helps minimize the privileges that
      each user has.
    rationale: >
      Although role-based access control (RBAC) has many advantages for regulating
      access to resources, over time some roles may no longer be needed, and some
      roles may grant privileges that are no longer needed.
    audit_procedure: >
      Perform the following command to view all roles on the database on which the
      command runs, including both built-in and user-defined roles, as well as the
      privileges granted by each role. Ensure that only necessary roles are listed
      and only the necessary privileges are listed for each role. db.runCommand( {
      rolesInfo: 1, showPrivileges: true, showBuiltinRoles: true } )
    remediation: >
      To revoke specified privileges from the user-defined role on the database
      where the command is run. The revokePrivilegesFromRole command has the
      following syntax: References: 1.
      https://www.mongodb.com/docs/v7.0/reference/privilege-actions/#mongodb-
      authaction-revokeRole 2.
      https://www.mongodb.com/docs/v7.0/core/authorization/#std-label-privileges
      Additional Information: You must have the dropRole action on a database to
      drop a role from that database.
    references: >
      1. https://www.mongodb.com/docs/v7.0/reference/privilege-actions/#mongodb-
      authaction-revokeRole 2.
      https://www.mongodb.com/docs/v7.0/core/authorization/#std-label-privileges
      Additional Information: You must have the dropRole action on a database to
      drop a role from that database.
