  - rule_id: mongodb.cis.4.federal_information_processing_standard_fips_is
    title: "Ensure Federal Information Processing Standard (FIPS) is enabled"
    severity: medium
    category: database
    tech_type: mongodb
    automation_type: automated
    cis_benchmark: "CIS_MONGODB 7_v1.0.0"
    cis_version: "7_v1.0.0"
    cis_control: "4.4"
    cis_section: "4"
    profile_applicability: "Level 2"
    description: >
      The Federal Information Processing Standard (FIPS) is a computer security
      standard used to certify software modules and libraries that encrypt and
      decrypt data securely. You can configure MongoDB to run with a FIPS 140-2
      certified library for OpenSSL. FIPS is a property of the encryption system and
      not the access control system. However, the environment requires FIPS
      compliant encryption and access control. Organizations must ensure that the
      access control system uses only FIPS-compliant encryption.
    rationale: >
      FIPS is an industry standard which dictates how data should be encrypted at
      rest and during transmission.
    audit_procedure: >
      On Ubuntu: To verify that the server uses FIPS Mode (net.tls.FIPSMode value
      set to true), run following commands: mongod --config /etc/mongod.conf net:
      tls: FIPSMode: true Or To verify FIPS mode is running, check the server log
      file for a message that FIPS is active: FIPS 140-2 mode activated On Windows:
      Check FIPSMode is true type mongod.conf | findstr “FIPSMode'
    remediation: >
      Configuring FIPS mode, ensure that your certificate is FIPS compliant. Run
      mongod or mongos instance in FIPS mode. Make changes to configuration file, to
      configure your mongod or mongos instance to use FIPS mode, shut down the
      instance and update the configuration file with the following setting: net:
      tls: FIPSMode: true Start mongod or mongos instance with a configuration file.
      mongod --config /etc/mongod.conf Default Value: Not configured References: 1.
      https://www.mongodb.com/docs/v7.0/tutorial/configure-fips/
    references: >
      1. https://www.mongodb.com/docs/v7.0/tutorial/configure-fips/
