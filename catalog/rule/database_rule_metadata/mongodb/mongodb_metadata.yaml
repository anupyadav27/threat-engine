  - rule_id: mongodb.cis.4.weak_protocols_are_disabled
    title: "Ensure Weak Protocols are Disabled"
    severity: high
    category: database
    tech_type: mongodb
    automation_type: automated
    cis_benchmark: "CIS_MONGODB 7_v1.0.0"
    cis_version: "7_v1.0.0"
    cis_control: "4.2"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Servers can be configured to disable specific TLS/SSL protocol versions which
      may be vulnerable to exploitation and/or lack features which improve the level
      of security as provided by newer versions of the protocol.
    rationale: >
      The TLSv1.0 protocol is vulnerable to the BEAST attack when used in CBC mode
      (October 2011). Unfortunately, the TLSv1.0 uses CBC modes for all of the block
      mode ciphers, which only leaves the RC4 streaming cipher which is also weak
      and is not recommended. Therefore, it is recommended that the TLSv1.0 protocol
      be disabled. The TLSv1.1 protocol does not support Authenticated Encryption
      with Associated Data (AEAD) which is designed to simultaneously provide
      confidentiality, integrity, and authenticity. The NIST SP 800-52r2 guidelines
      for TLS configuration require that TLS 1.2 is configured with FIPS-based
      cipher suites be supported by all government TLS servers and clients and
      requires support of TLS 1.3 by January 1, 2024. A September 2018 IETF draft
      also depreciates the usage of TLSv1.0 and TLSv1.1 as shown in the references.
      Impact: If an attempt to connect using a disabled protocol is made the
      connection attempt will fail and may have unanticipated impact on clients
      attempting to establish the connection.
    audit_procedure: >
      To verify that the server disable TLS v1.0 and v1.1, run one of the following
      commands: • On Ubuntu: cat /etc/mongod.conf | grep –A20 ‘net’ | grep –A10
      ‘ssl’ | grep ‘disabledProtocols’ • On Windows: type mongod.conf | findstr –A20
      ‘net’ | findstr –A10 ‘ssl’ | findstr ‘disabledProtocols’ If TLS1_0,TLS1_1 is
      not included in the string returned by either of these commands this is a
      fail.
    remediation: >
      For mongod (“Primary daemon process for the MongoDB system”) In the
      configuration file /etc/mongod.conf, set the disabledProtocols option to to
      include TLS1_0,TLS1_1: net: ssl: mode: requireSSL PEMKeyFile:
      /etc/ssl/mongodb.pem CAFile: /etc/ssl/caToValidateClientCertificates.pem
      disabledProtocols: TLS1_0,TLS1_1 And restart monogdb instance with mongod
      --config /etc/mongod.conf Or mongod --sslDisabledProtocols `TLS1_0,TLS1_1
      Default Value: TLS1_0 if TLS 1.1+ is available on the system. References: 1.
      https://www.mongodb.com/docs/v7.0/release-notes/4.0/#std-label-4.0-disable-tls
      2. https://www.mongodb.com/docs/v7.0/reference/configuration-options/#mongodb-
      setting-net.ssl.disabledProtocols Additional Information: On macOS, you cannot
      disable TLS1_1 and leave both TLS1_0 and TLS1_2 enabled. You must also disable
      at least one of the other two; for example, TLS1_0,TLS1_1.
    references: >
      1. https://www.mongodb.com/docs/v7.0/release-notes/4.0/#std-label-4.0-disable-
      tls 2. https://www.mongodb.com/docs/v7.0/reference/configuration-
      options/#mongodb- setting-net.ssl.disabledProtocols Additional Information: On
      macOS, you cannot disable TLS1_1 and leave both TLS1_0 and TLS1_2 enabled. You
      must also disable at least one of the other two; for example, TLS1_0,TLS1_1.
    impact: >
      If an attempt to connect using a disabled protocol is made the connection
      attempt will fail and may have unanticipated impact on clients attempting to
      establish the connection.
    compliance_mappings:
      cis:
        - "CIS_MONGODB_7_v1_0_0_4_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_mongodb_7_v1_0_0_4_2"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: mongodb.cis.4.encryption_of_data_in_transit_tls_or_ssl
    title: "Ensure Encryption of Data in Transit TLS or SSL (Transport Encryption)"
    severity: high
    category: database
    tech_type: mongodb
    automation_type: automated
    cis_benchmark: "CIS_MONGODB 7_v1.0.0"
    cis_version: "7_v1.0.0"
    cis_control: "4.3"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Use TLS or SSL to protect all incoming and outgoing connections. This should
      include using TLS or SSL to encrypt communication between the mongod and
      mongos components of a MongoDB client as well as between all applications and
      MongoDB. MongoDB supports TLS/SSL (Transport Layer Security/Secure Sockets
      Layer) to encrypt all of MongoDB’s network traffic. TLS/SSL ensures that
      MongoDB network traffic is only readable by the intended client. Please note:
      As of MongoDB version 4.2 SSL has been deprecated. Also, starting in MongoDB
      version 4.0, MongoDB disables support for TLS 1.0 encryption on systems where
      TLS 1.1+ is available.
    rationale: >
      This prevents sniffing of cleartext traffic between MongoDB components or
      performing a man-in-the-middle attack for MongoDB.
    audit_procedure: >
      To verify that the server requires SSL or TLS (net.tls.mode value set to
      requireTLS), run one of the following commands: On Ubuntu: cat
      /etc/mongod.conf | grep –A20 ‘net’ | grep –A10 ‘tls’ | grep ‘mode’ On Windows:
      type mongod.conf | findstr –A20 ‘net’ | findstr –A10 ‘tls’ | findstr ‘mode’
    remediation: >
      Configure MongoDB servers to require the use of SSL or TLS to encrypt all
      MongoDB network communications. To implement SSL or TLS to encrypt all MongoDB
      network communication, perform the following steps: For mongod (“Primary
      daemon process for the MongoDB system”) In the configuration file
      /etc/mongod.conf, set the PEMKeyFile option to the certificate file’s path and
      then start the component with this command: net: tls: mode: requireTLS
      certificateKeyFile: /etc/ssl/mongodb.pem CAFile:
      /etc/ssl/caToValidateClientCertificates.pem And restart monogdb instance with
      mongod --config /etc/mongod.conf Default Value: Not configured References: 1.
      https://www.mongodb.com/docs/v7.0/tutorial/configure-ssl/ 2.
      https://www.mongodb.com/docs/v7.0/tutorial/configure-ssl-clients/ 3.
      https://www.mongodb.com/docs/v7.0/tutorial/upgrade-cluster-to-ssl/ 4.
      https://www.mongodb.com/docs/v7.0/reference/configuration-options/#mongodb-
      setting-net.tls.clusterAuthX509.attributes Additional Information:
      -----------------------------------------------------------------------------
      Value | Description
      ------------+----------------------------------------------------------------
      disabled | The server does not use TLS.
      ------------+----------------------------------------------------------------
      allowTLS | Connections between servers do not use TLS. For incoming
      connections, | the server accepts both TLS and non-TLS. | |
      ------------+----------------------------------------------------------------
      preferTLS | Connections between servers use TLS. For incoming connections, the
      server | accepts both TLS and non-TLS. | |
      ------------+----------------------------------------------------------------
      requireTLS | The server uses and accepts only TLS encrypted connections. |
      -----------------------------------------------------------------------------
    references: >
      1. https://www.mongodb.com/docs/v7.0/tutorial/configure-ssl/ 2.
      https://www.mongodb.com/docs/v7.0/tutorial/configure-ssl-clients/ 3.
      https://www.mongodb.com/docs/v7.0/tutorial/upgrade-cluster-to-ssl/ 4.
      https://www.mongodb.com/docs/v7.0/reference/configuration-options/#mongodb-
      setting-net.tls.clusterAuthX509.attributes Additional Information:
      -----------------------------------------------------------------------------
      Value | Description
      ------------+----------------------------------------------------------------
      disabled | The server does not use TLS.
      ------------+----------------------------------------------------------------
      allowTLS | Connections between servers do not use TLS. For incoming
      connections, | the server accepts both TLS and non-TLS. | |
      ------------+----------------------------------------------------------------
      preferTLS | Connections between servers use TLS. For incoming connections, the
      server | accepts both TLS and non-TLS. | |
      ------------+----------------------------------------------------------------
      requireTLS | The server uses and accepts only TLS encrypted connections. |
      -----------------------------------------------------------------------------
    impact: >
      
