  - rule_id: mongodb.cis.6.server_side_scripting_is_disabled_if_not_needed
    title: "Ensure that server-side scripting is disabled if not needed"
    severity: medium
    category: database
    tech_type: mongodb
    automation_type: manual
    cis_benchmark: "CIS_MONGODB 7_v1.0.0"
    cis_version: "7_v1.0.0"
    cis_control: "6.3"
    cis_section: "6"
    profile_applicability: "Level 2"
    description: >
      MongoDB supports the execution of JavaScript code for certain server-side
      operations: mapReduce, group, $where, $accumulator, and $function aggregation
      operations that allow users to define custom aggregation expressions. If you
      do not use these operations, server-side scripting should be disabled.
    rationale: >
      If server-side scripting is not needed and is not disabled, this introduces
      unnecessary risk which may allow an attacker to take advantage of insecure
      coding. Impact: Disabling server-side scripting will block all server-side
      scripts from executing.
    audit_procedure: >
      If server-side scripting is not required, verify that it is disabled
      (javascriptEnabled value of false) using the following command: On Ubuntu: cat
      /etc/mongod.conf | grep –A10 'security' | grep 'javascriptEnabled' On Windows:
      type mongod.conf | findstr –A10 'security' | findstr 'javascriptEnabled'
    remediation: >
      If server-side scripting is not required, for mongod instance disable it by
      using the -- noscripting option on the command line, or setting
      security.javascriptEnabled to false in the configuration file. Starting in
      MongoDB 4.4 this is also applicable to mongos. Default Value: Enabled
      References: 1. https://www.mongodb.com/docs/v7.0/core/server-side-javascript/
      2. https://docs.mongodb.com/manual/core/server-side-javascript/#disable-
      server- side-js
    references: >
      1. https://www.mongodb.com/docs/v7.0/core/server-side-javascript/ 2.
      https://docs.mongodb.com/manual/core/server-side-javascript/#disable-server-
      side-js
    impact: >
      Disabling server-side scripting will block all server-side scripts from
      executing.
