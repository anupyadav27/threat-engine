  - rule_id: mongodb.cis.3.mongodb_is_run_using_a_non_privileged_dedicated
    title: "Ensure that MongoDB is run using a non-privileged, dedicated service account"
    severity: high
    category: database
    tech_type: mongodb
    automation_type: manual
    cis_benchmark: "CIS_MONGODB 7_v1.0.0"
    cis_version: "7_v1.0.0"
    cis_control: "3.3"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The MongoDB service should not be run using a privileged account such as
      'root' because this unnecessarily exposes the operating system to high risk.
    rationale: >
      Using a non-privileged, dedicated service account restricts the database from
      accessing the critical areas of the operating system which are not required by
      the MongoDB. This will also mitigate the potential for unauthorized access via
      a compromised, privileged account on the operating system.
    audit_procedure: >
      Run the following command to get listing of all mongo instances, the PID
      number, and the PID owner. ps -ef | grep -E 'mongos|mongod'
    remediation: >
      1. Create a dedicated user for performing MongoDB database activity. 2. Set
      the Database data files, the keyfile, and the SSL private key files to only be
      readable by the mongod/mongos user. 3. Set the log files to only be writable
      by the mongod/mongos user and readable only by root. Default Value: Not
      configured References: 1. https://www.mongodb.com/docs/v7.0/tutorial/manage-
      users-and-roles/
    references: >
      1. https://www.mongodb.com/docs/v7.0/tutorial/manage-users-and-roles/
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_MONGODB_7_v1_0_0_3_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_mongodb_7_v1_0_0_3_3"
