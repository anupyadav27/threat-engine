  - rule_id: mongodb.cis.4.legacy_tls_protocols_are_disabled
    title: "Ensure legacy TLS protocols are disabled"
    severity: medium
    category: database
    tech_type: mongodb
    automation_type: automated
    cis_benchmark: "CIS_MONGODB 7_v1.0.0"
    cis_version: "7_v1.0.0"
    cis_control: "4.1"
    cis_section: "4"
    profile_applicability: "Level 2"
    description: >
      Only modern TLS protocols should be enabled in MongoDB for all client
      connections and upstream connections. Removing legacy TLS and SSL protocols
      (SSL 3.0, TLS 1.0 and 1.1), and enabling emerging and stable TLS protocols
      (TLS 1.2, and TLS 1.3), ensures users are able to take advantage of strong
      security capabilities and protects them from insecure legacy protocols.
    rationale: >
      Why disable TLS 1.0: TLS 1.0 was deprecated from use when PCI DSS Compliance
      mandated that it not be used for any applications processing credit card
      numbers in June 2018. Why disable TLS 1.1: Because of the increased security
      associated with higher versions of TLS, TLS 1.0 should be disabled.
    audit_procedure: >
      To verify that the server uses disables legacy TLS protocols you should check
      the disabledProtocols directive, run the following commands: mongod --config
      /etc/mongod.conf Review for disabledProtocols as part of the output shown
      below: net: tls: mode: requireTLS certificateKeyFile: /etc/ssl/mongodb.pem
      CAFile: /etc/ssl/caToValidateClientCertificates.pem disabledProtocols:
      TLS1_0,TLS1_1
    remediation: >
      Make changes to configuration file, to configure your mongod or mongos
      instance to disable legacy protocols, shut down the instance and update the
      configuration file with the following setting: net: tls: mode: requireTLS
      certificateKeyFile: /etc/ssl/mongodb.pem CAFile:
      /etc/ssl/caToValidateClientCertificates.pem disabledProtocols: TLS1_0,TLS1_1
      Start mongod or mongos instance with the configuration file. mongod --config
      /etc/mongod.conf Default Value: TLS1_0, TLS1_1, TLS1_2 Note: Starting in
      version 4.0.4 (and 3.6.9)TLS1_3 is added to the default value. References: 1.
      https://www.mongodb.com/docs/v7.0/core/security-transport-encryption/ 2.
      https://www.mongodb.com/docs/v7.0/release-notes/4.0/#std-label-4.0-disable-tls
    references: >
      1. https://www.mongodb.com/docs/v7.0/core/security-transport-encryption/ 2.
