  - rule_id: mongodb.cis.3.least_privilege_for_database_accounts
    title: "Ensure least privilege for database accounts"
    severity: high
    category: database
    tech_type: mongodb
    automation_type: manual
    cis_benchmark: "CIS_MONGODB 7_v1.0.0"
    cis_version: "7_v1.0.0"
    cis_control: "3.1"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      MongoDB grants access to data and commands through 'role-based' approach,
      MongoDB is shipped with built-in roles that provide the different levels of
      access commonly needed in a database system. In addition, you can create
      custom-roles. The following roles provide the ability to assign any user any
      privilege on any database, which means that users with one of these roles can
      assign themselves any privilege on any database: dbOwner role, when scoped to
      the admin database userAdmin role, when scoped to the admin database
      userAdminAnyDatabase role
    rationale: >
      Ensuring highly privileged Roles are granted only for database administrators,
      and roles are not scoped to 'admin' databases will reduce attack surface and
      follows the least privilege principle.
    audit_procedure: >
      To check accounts with database roles scoped in 'admin' database, use the
      following query: db.system.users.find(
      {'roles.role':{$in:['dbOwner','userAdmin','userAdminAnyDatabase']},'roles.db'
      : 'admin' } )
    remediation: >
      If any accounts were listed with built in-roles: dbOwner userAdmin
      userAdminAnyDatabase in 'admin' database role then drop them. References: 1.
      https://www.mongodb.com/docs/v7.0/reference/built-in-roles/
    references: >
      1. https://www.mongodb.com/docs/v7.0/reference/built-in-roles/
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_MONGODB_7_v1_0_0_3_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_mongodb_7_v1_0_0_3_1"
