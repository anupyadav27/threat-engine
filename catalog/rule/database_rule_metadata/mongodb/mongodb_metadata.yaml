    cis_section: "5"
    profile_applicability: "Level 2"
    description: >
      The SystemLog.quiet option stops logging of information such as: • connection
      events • authentication events • replication sync activities • evidence of
      some potentially impactful commands being run (eg: drop, dropIndexes,
      validate) This information should be logged whenever possible. This check is
      only for Enterprise editions.
