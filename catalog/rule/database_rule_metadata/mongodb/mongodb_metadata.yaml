  - rule_id: mongodb.cis.7.appropriate_key_file_permissions_are_set
    title: "Ensure appropriate key file permissions are set"
    severity: high
    category: database
    tech_type: mongodb
    automation_type: manual
    cis_benchmark: "CIS_MONGODB 7_v1.0.0"
    cis_version: "7_v1.0.0"
    cis_control: "7.1"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      In the Shared Cluster, the certificate or keyfile is utilized for
      authentications. Implementing proper file permissions on the certificate or
      keyfile will prevent unauthorized access to it.
    rationale: >
      Protecting the certificate/keyfile strengthens authentication in the sharded
      cluster and prevents unauthorized access to the MongoDB database.
    audit_procedure: >
      Find the location of certificate/keyfile using the following commands: On
      Ubuntu: cat /etc/mongod.conf | grep “keyFile:” cat /etc/mongod.conf | grep
      “PEMKeyFile:” cat /etc/mongod.conf | grep “CAFile:” On Windows: type
      mongod.conf | findstr “keyFile:” type mongod.conf | findstr “PEMKeyFile:” type
      mongod.conf | findstr “CAFile:” Check the permission of the file using: ls -l
      certificate_file_locations ls -l keyfile_locations
    remediation: >
      Set the keyFile ownership to mongodb user and remove other permissions by
      executing these commands: chmod 600 /keyfile sudo chown mongodb:mongodb
      /keyfile Default Value: Not configured References: 1.
      https://www.mongodb.com/docs/v7.0/tutorial/deploy-replica-set-with-keyfile-
      access-control/
