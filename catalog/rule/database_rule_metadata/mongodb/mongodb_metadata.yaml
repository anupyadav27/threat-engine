  - rule_id: mongodb.cis.2.authentication_is_enabled_in_the_sharded_cluster
    title: "Ensure authentication is enabled in the sharded cluster"
    severity: medium
    category: database
    tech_type: mongodb
    automation_type: automated
    cis_benchmark: "CIS_MONGODB 7_v1.0.0"
    cis_version: "7_v1.0.0"
    cis_control: "2.3"
    cis_section: "2"
    profile_applicability: "Level 2"
    description: >
      Authentication is enabled in a sharded cluster when the certificate or key
      files are created and configured for all components. This ensures that every
      client that accesses the cluster must provide credentials, to include MongoDB
      instances that access each other within the cluster. With keyfile
      authentication, each mongod or mongos instance in the sharded cluster uses the
      contents of the keyfile as the shared password for authenticating other
      members in the deployment. Only mongod or mongos instances with the correct
      keyfile can join the sharded cluster. For Production Environment : x.509
      certificate authentication with secure TSL/SSL connection must be used for
      authentication. For Development Purpose : Key file can be used as an
      authentication mechanism between the shared cluster. Keyfiles are bare-minimum
      forms of security and are best suited for testing or development environments.
    rationale: >
      Enforcing a key or certificate on a sharded cluster prevents unauthorized
      access to the MongoDB database and provides traceability of database
      activities to a specific user or component. A MongoDB sharded cluster can
      enforce user authentication as well as internal authentication of its
      components to secure against unauthorized access.
    audit_procedure: >
      Based on recommendations • PEMKeyFile, clusterFile, CAFile must be configured.
      • clusterAuthMode should be set to x509 • authenticationMechanisms should be
      set to MONGODB-X509. To Check That your Current MongoDB is configured for
      sharding setup, execute the following command: sh.status() OR
      db.printShardingStatus() Run the following command to verify that the
      certificate-based authentication is configured: On Ubuntu: cat
      /etc/mongod.conf | grep “PEMKeyFile” cat /etc/mongod.conf | grep 'CAFile' cat
      /etc/mongod.conf | grep 'clusterFile' cat /etc/mongod.conf | grep
      'clusterAuthMode' cat /etc/mongod.conf | grep “authenticationMechanisms:” On
      Windows: type mongod.conf | findstr “PEMKeyFile” type mongod.conf | findstr
      “CAFile” type mongod.conf | findstr “clusterFile” type mongod.conf | findstr
      “clusterAuthMode” type mongod.conf | findstr “authenticationMechanisms:” Run
      the following command to verify that the key file-based authentication is
      configured: ( Only for Development Purpose ) On Ubuntu: cat /etc/mongod.conf |
      grep “keyFile=” On Windows: type mongod.conf | findstr “keyFile”
    remediation: >
      To authenticate to servers, clients can use x.509 certificates instead of
      usernames and passwords. MongoDB supports x.509 certificate authentication for
      use with a secure TLS/SSL connection. The x.509 client authentication allows
      clients to authenticate to servers with certificates rather than with a
      username and password. Change the configuration file /etc/mongod.conf on each
      host, adding the following rows: net: port: 27017 tls: mode: requireSSL
      PEMKeyFile: /etc/mongodb/ssl/server1.pem CAFile: /etc/mongodb/ssl/mongoCA.crt
      clusterFile: /etc/mongodb/ssl/server1.pem security: authorization: enabled
      clusterAuthMode: x509 Restart the daemon sudo service mongodb restart To
      enable authentication in the sharded cluster, perform the following steps:(
      Only for Development Purpose ) • Generate A Key File • On each component in
      the shared cluster, enable authentication by editing the configuration file
      /etc/mongod.conf. Set the keyFile option to the key file’s path and then start
      the component with this command: keyFile = /srv/mongodb/keyfile • When
      starting the component, set --keyFile option, which is an option for both
      mongos instances and mongod instances. Set the --keyFile to the key file’s
      path. Default Value: Not configured References: 1.
      https://www.mongodb.com/docs/v7.0/core/security-transport-encryption/#std-
      label-transport-encryption 2.
      https://www.mongodb.com/docs/v7.0/reference/security/ 3.
      https://www.mongodb.com/docs/v7.0/tutorial/deploy-shard-cluster/
    references: >
      1. https://www.mongodb.com/docs/v7.0/core/security-transport-encryption/#std-
      label-transport-encryption 2.
      https://www.mongodb.com/docs/v7.0/reference/security/ 3.
      https://www.mongodb.com/docs/v7.0/tutorial/deploy-shard-cluster/
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_MONGODB_7_v1_0_0_2_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_mongodb_7_v1_0_0_2_3"
