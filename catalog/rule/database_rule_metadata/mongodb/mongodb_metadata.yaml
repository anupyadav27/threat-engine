  - rule_id: mongodb.cis.5.new_entries_are_appended_to_the_end_of_the_log
    title: "Ensure that new entries are appended to the end of the log file"
    severity: medium
    category: database
    tech_type: mongodb
    automation_type: automated
    cis_benchmark: "CIS_MONGODB 7_v1.0.0"
    cis_version: "7_v1.0.0"
    cis_control: "5.4"
    cis_section: "5"
    profile_applicability: "Level 2"
    description: >
      By default, new log entries will overwrite old entries after a restart of the
      mongod or Mongols service. Enabling the systemLog.logAppend setting causes new
      entries to be appended to the end of the log file rather than overwriting the
      existing content of the log when the mongos or mongod instance restarts.
    rationale: >
      Allowing old entries to be overwritten by new entries instead of appending new
      entries to the end of the log may destroy old log data that is needed for a
      variety of purposes.
    audit_procedure: >
      To verify that new log entries will be appended to the end of the log file
      after a restart (systemLog: logAppend: true value set to true), run the
      following command: On Ubuntu: cat /etc/mongod.conf | grep 'logAppend' On
      Windows: type mongod.conf | findstr 'logAppend'
    remediation: >
      Set `systemLog: logAppend: true` to true in the /etc/mongod.conf file.
      References: 1. https://docs.mongodb.com/manual/reference/configuration-
      options/#systemLog.logAppend
    references: >
