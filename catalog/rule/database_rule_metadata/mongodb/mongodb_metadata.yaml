  - rule_id: mongodb.cis.3.review_superuser_admin_roles
    title: "Review Superuser/Admin Roles"
    severity: medium
    category: database
    tech_type: mongodb
    automation_type: manual
    cis_benchmark: "CIS_MONGODB 7_v1.0.0"
    cis_version: "7_v1.0.0"
    cis_control: "3.5"
    cis_section: "3"
    profile_applicability: "Level 2"
    description: >
      Roles provide several advantages that make it easier to manage privileges in a
      database system. Security administrators can control access to their databases
      in a way that mirrors the structure of their organizations (they can create
      roles in the database that map directly to the job functions in their
      organizations). The assignment of privileges is simplified. Instead of
      granting the same set of privileges to each individual user in a particular
      job function, the administrator can grant this set of privileges to a role
      representing that job function and then grant that role to each user in that
      job function.
    rationale: >
      Reviewing the Superuser/Admin roles within a database helps minimize the
      possibility of privileged unwanted access.
    audit_procedure: >
      Superuser roles provide the ability to assign any user any privilege on any
      database, which means that users with one of these roles can assign themselves
      any privilege on any database: db.runCommand( { rolesInfo: 'dbOwner' } )
      db.runCommand( { rolesInfo: 'userAdmin' } ) db.runCommand( { rolesInfo:
      'userAdminAnyDatabase' } ) Root role provides access to the operations and all
      the resources of the readWriteAnyDatabase, dbAdminAnyDatabase,
      userAdminAnyDatabase, clusterAdmin roles, restore combined. db.runCommand( {
      rolesInfo: 'readWriteAnyDatabase' } ) db.runCommand( { rolesInfo:
      'dbAdminAnyDatabase' } ) db.runCommand( { rolesInfo: 'userAdminAnyDatabase' }
      ) db.runCommand( { rolesInfo: 'clusterAdmin' } ) Cluster Administration Roles
      are used for administering the whole system rather than just a single
      database. db.runCommand( { rolesInfo: 'hostManager' } )
    remediation: >
      To remove a user from one or more roles on the current database. References:
      1. https://www.mongodb.com/docs/v7.0/core/security-user-defined-roles/ 2.
      https://www.mongodb.com/docs/v7.0/reference/method/#std-label-role-
      management-methods
    references: >
      1. https://www.mongodb.com/docs/v7.0/core/security-user-defined-roles/ 2.
      https://www.mongodb.com/docs/v7.0/reference/method/#std-label-role-
      management-methods
    impact: >
      
