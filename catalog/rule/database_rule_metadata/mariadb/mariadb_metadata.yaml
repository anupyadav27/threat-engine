    automation_type: manual
    cis_benchmark: "CIS_MARIADB 10.6_v1.1.0"
    cis_version: "10.6_v1.1.0"
    cis_control: "2.1.6"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      A disaster recovery plan should be created. MariaDB Galera Cluster (group
      replication), MariaDB Replication (asynchronous replication) or both may be
      used. A replica in a different data center and offsite backups may be used.
      There should be information regarding the Recovery Time Objective (RTO), i.e.,
      how long recovery will take, and if the recovery site has the same capacity.
      Additionally, delayed replicas can be a valuable part of a DR plan. Network
      (default) and at rest encryption should be used to protect data.
    rationale: >
      A disaster recovery strategy should be planned and formalized. Without a well-
      tested disaster recovery plan, it might not be possible to recover in time.
    audit_procedure: >
      Check if there is a disaster recovery plan.
    remediation: >
      Create a disaster recovery plan. References: 1.
      https://mariadb.com/kb/en/setting-up-replication/ 2.
      https://mariadb.com/kb/en/getting-started-with-mariadb-galera-cluster/
