  - rule_id: mariadb.cis.2.limit_accepted_transport_layer_security_tls
    title: "Limit Accepted Transport Layer Security (TLS) Versions"
    severity: medium
    category: database
    tech_type: mariadb
    automation_type: automated
    cis_benchmark: "CIS_MARIADB 10.6_v1.1.0"
    cis_version: "10.6_v1.1.0"
    cis_control: "2.10"
    cis_section: "2"
    profile_applicability: "Level 2"
    description: >
      MariaDB supports multiple versions of TLS. The higher the version the stronger
      the security and/or better the performance.
    rationale: >
      Requiring clients attempting to connect to MariaDB to use higher versions of
      TLS to better protect data in transit. Impact: Connections attempting to use
      an unsupported version of TLS will fail.
    audit_procedure: >
      To list the versions of TLS the server accepts, run the following statement:
      select @@tls_version; If the list includes TLSv1 and/or TLSv1.1, this is a
      fail. MariaDB negotiates to the highest version of TLS. If connections are
      using older TLS versions, those clients will need to be upgraded to newer
      MariaDB Connectors or community drivers that support newer versions of TLS.
    remediation: >
      Set the version(s) of TLS you wish to accept by setting the tls_version option
      to a comma-separated (no whitespace) string in MariaDB configuration files.
      For example, to only accept TLS 1.2 or 1.3 connections, set tls_version
      likeso: tls_version=TLSv1.2,TLSv1.3 Note: with this setting, only clients that
      support the specified TLS version(s) are able to establish an encrypted
      connection to the server. Default Value: TLSv1.1,TLSv1.2,TLSv1.3 References:
      1. https://mariadb.com/kb/en/secure-connections-overview/ 2.
      https://mariadb.com/kb/en/ssltls-system-variables/#tls_version
    references: >
      1. https://mariadb.com/kb/en/secure-connections-overview/ 2.
      https://mariadb.com/kb/en/ssltls-system-variables/#tls_version
    impact: >
      Connections attempting to use an unsupported version of TLS will fail.
