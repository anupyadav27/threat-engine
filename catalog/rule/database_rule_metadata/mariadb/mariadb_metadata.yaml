  - rule_id: mariadb.cis.2.dedicate_the_machine_running_mariadb
    title: "Dedicate the Machine Running MariaDB"
    severity: high
    category: database
    tech_type: mariadb
    automation_type: manual
    cis_benchmark: "CIS_MARIADB 10.6_v1.1.0"
    cis_version: "10.6_v1.1.0"
    cis_control: "2.2"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      It is recommended that MariaDB Server software be installed on a dedicated
      server. This architectural consideration affords flexibility in that the
      database server can be placed on a separate zone allowing access only from
      particular hosts and over particular protocols.
    rationale: >
      The attack surface is reduced on a server with only the underlying operating
      system, MariaDB server software, and any security or operational tooling that
      may be additionally installed. A smaller attack surface reduces the
      probability of the data within MariaDB being compromised. Impact: Care must be
      taken that applications or services that are required for proper operation of
      the operating system are not removed. Custom applications may need to be
      modified to accommodate database connections over the network rather than on
      the use (e.g., using TCP/IP connections). Additional hardware and operating
      system licenses may be required to make the architectural change.
    audit_procedure: >
      Verify there are no other roles enabled for the underlying operating system
      and that no additional applications or services unrelated to the proper
      operation of the MariaDB server software are installed.
    remediation: >
      Remove excess applications or services and/or remove unnecessary roles from
      the underlying operating system.
    references: >
      
    impact: >
      Care must be taken that applications or services that are required for proper
      operation of the operating system are not removed. Custom applications may
      need to be modified to accommodate database connections over the network
      rather than on the use (e.g., using TCP/IP connections). Additional hardware
      and operating system licenses may be required to make the architectural
      change.
