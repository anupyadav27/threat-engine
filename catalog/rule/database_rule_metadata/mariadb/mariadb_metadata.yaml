  - rule_id: mariadb.cis.9.replication_traffic_is_secured
    title: "Ensure Replication Traffic is Secured"
    severity: high
    category: database
    tech_type: mariadb
    automation_type: manual
    cis_benchmark: "CIS_MARIADB 10.6_v1.1.0"
    cis_version: "10.6_v1.1.0"
    cis_control: "9.1"
    cis_section: "9"
    profile_applicability: "Level 1"
    description: >
      The replication traffic between servers should be secured. Security measures
      should include ensuring the confidentiality and integrity of the traffic and
      performing mutual authentication between the servers before performing
      replication.
    rationale: >
      The replication traffic should be secured as it gives access to all
      transferred information and might leak passwords. Impact: When the replication
      traffic is not secured someone might be able to capture passwords and other
      sensitive information when sent to the replica.
    audit_procedure: >
      Check if the replication traffic is using one or more of the following to
      provide confidentiality and integrity for the traffic and mutual
      authentication for the servers: • A private network • A VPN • SSL/TLS • A SSH
      Tunnel If using SSL/TLS, run the following MariaDB command to ensure the
      REPLICA is utilizing TLS: show replica status\G; Verify Master_SSL_Allowed is
      set to Yes. SSL/TLS mutual authentication is audited in subsequent
      recommendations. For other implementation options, audit mutual authentication
      as part of this recommendation.
    remediation: >
      Secure the network traffic using one or more technologies to provide
      confidentiality and integrity for the traffic and mutual authentication for
      the servers. If using SSL/TLS, run the following commands on the REPLICA
      server(s): STOP REPLICA; -- required if replication was already running CHANGE
      MASTER TO MASTER_SSL=1; START REPLICA; -- required if you want to restart
      replication Note: The PRIMARY and REPLICA servers must already have SSL/TLS
      enabled and have each others' CA certificates in their trusted CA certificates
      files. SSL/TLS mutual authentication procedures are provided in subsequent
      recommendations. For other implementation options, remediate mutual
      authentication issues as part of this recommendation. Default Value: By
      default, replication traffic is not secured with encryption or other
      protections. References: 1. https://mariadb.com/kb/en/replication-with-secure-
      connections/ Additional Information: MariaDB provides the ability to secure
      replication traffic with SSL/TLS. Other security measures would be implemented
      outside MariaDB, either by adding technology to MariaDB servers or by
      implementing controls in the broader network environment.
    references: >
      1. https://mariadb.com/kb/en/replication-with-secure-connections/ Additional
      Information: MariaDB provides the ability to secure replication traffic with
      SSL/TLS. Other security measures would be implemented outside MariaDB, either
      by adding technology to MariaDB servers or by implementing controls in the
      broader network environment.
    impact: >
      When the replication traffic is not secured someone might be able to capture
      passwords and other sensitive information when sent to the replica.
    compliance_mappings:
      cis:
        - "CIS_MARIADB_10_6_v1_1_0_9_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_mariadb_10_6_v1_1_0_9_1"
    metadata_source: generated
