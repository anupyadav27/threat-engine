  - rule_id: mariadb.cis.9.master_ssl_verify_server_cert_is_enabled
    title: "Ensure 'MASTER_SSL_VERIFY_SERVER_CERT' is enabled"
    severity: high
    category: database
    tech_type: mariadb
    automation_type: automated
    cis_benchmark: "CIS_MARIADB 10.6_v1.1.0"
    cis_version: "10.6_v1.1.0"
    cis_control: "9.2"
    cis_section: "9"
    profile_applicability: "Level 1"
    description: >
      On the MariaDB REPLICA, the setting MASTER_SSL_VERIFY_SERVER_CERT indicates
      whether the REPLICA should perform server certificate verification of the
      PRIMARY's certificate.
    rationale: >
      When establishing TLS connections, clients use certificate verification to
      authenticate the server as their intended peer in the connection. In this
      case, the REPLICA (client) should verify the PRIMARY's (server's) certificate
      to authenticate the PRIMARY prior to continuing the connection. Impact: When
      using CHANGE MASTER TO, be aware of the following: • REPLICA processes need to
      be stopped by running STOP REPLICA prior to executing CHANGE MASTER TO • Use
      of CHANGE MASTER TO starts new relay logs without keeping the old ones unless
      explicitly told to keep them • When CHANGE MASTER TO is invoked, some
      information is dumped to the error log (previous values for MASTER_HOST,
      MASTER_PORT, MASTER_LOG_FILE, and MASTER_LOG_POS) • Invoking CHANGE MASTER TO
      will implicitly commit any ongoing transactions in the session where the
      CHANGE MASTER TO was run, but not all ongoing transactions on the database.
    audit_procedure: >
      This audit procedure only needs to be run if replication traffic is being
      secured with SSL/TLS. To assess this recommendation, issue the following
      statement: show replica status\G; Verify the value of
      Master_SSL_Verify_Server_Cert is Yes.
    remediation: >
      To remediate this setting, you must use the CHANGE MASTER TO command. STOP
      REPLICA; -- required if replication was already running CHANGE MASTER TO
      MASTER_SSL_VERIFY_SERVER_CERT=1; START REPLICA; -- required if you want to
      restart replication Default Value: Disabled. References: 1.
      https://mariadb.com/kb/en/change-master-to/#master_ssl_verify_server_cert 2.
      https://mariadb.com/kb/en/secure-connections-overview/#server-certificate-
      verification Additional Information: Note that this recommendation only
      applies if you are utilizing TLS to secure MariaDB replication traffic.
    references: >
      1. https://mariadb.com/kb/en/change-master-to/#master_ssl_verify_server_cert
      2. https://mariadb.com/kb/en/secure-connections-overview/#server-certificate-
      verification Additional Information: Note that this recommendation only
      applies if you are utilizing TLS to secure MariaDB replication traffic.
    impact: >
      When using CHANGE MASTER TO, be aware of the following: • REPLICA processes
      need to be stopped by running STOP REPLICA prior to executing CHANGE MASTER TO
      • Use of CHANGE MASTER TO starts new relay logs without keeping the old ones
      unless explicitly told to keep them • When CHANGE MASTER TO is invoked, some
      information is dumped to the error log (previous values for MASTER_HOST,
      MASTER_PORT, MASTER_LOG_FILE, and MASTER_LOG_POS) • Invoking CHANGE MASTER TO
      will implicitly commit any ongoing transactions in the session where the
      CHANGE MASTER TO was run, but not all ongoing transactions on the database.
    compliance_mappings:
      cis:
        - "CIS_MARIADB_10_6_v1_1_0_9_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_mariadb_10_6_v1_1_0_9_2"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: mariadb.cis.9.super_priv_is_not_set_to_y_for_replication_users
    title: "Ensure 'super_priv' is Not Set to 'Y' for Replication Users"
    severity: high
    category: database
    tech_type: mariadb
    automation_type: automated
    cis_benchmark: "CIS_MARIADB 10.6_v1.1.0"
    cis_version: "10.6_v1.1.0"
    cis_control: "9.3"
    cis_section: "9"
    profile_applicability: "Level 1"
    description: >
      The SUPER privilege found in the mysql.user table governs the use of a variety
      of MariaDB features. These features include, CHANGE MASTER TO, KILL,
      mysqladmin kill option, PURGE BINARY LOGS, SET GLOBAL, mysqladmin debug
      option, logging control, and more.
    rationale: >
      The SUPER privilege allows principals to perform many actions, including view
      and terminate currently executing MariaDB statements (including statements
      used to manage passwords). This privilege also provides the ability to
      configure MariaDB, such as enable/disable logging, alter data, disable/enable
      features. Limiting the accounts that have the SUPER privilege reduces the
      chances that an attacker can exploit these capabilities. Impact: When the
      SUPER privilege is denied to a given user, that user will be unable to take
      advantage of certain capabilities, such as certain mysqladmin options.
    audit_procedure: >
      Execute the following SQL statement to audit this setting: select user, host
      from mysql.user where user='repl' and Super_priv = 'Y'; No rows should be
      returned. NOTE: Substitute your replication user's name for repl in the above
      query If you wish to validate permissions in more detail: select * from
      mysql.user where user='repl'\G The following columns should return Y.
      *************************** 1. row *************************** Select_priv: Y
      Reload_priv: Y Shutdown_priv: Y Process_priv: Y File_priv: Y Grant_priv: Y
      Execute_priv: Y Repl_slave_priv: Y Repl_client_priv: Y Create_user_priv: Y 1
      row in set (0.0007 sec) Check Dynamic Privileges : select PRIV from
      mysql.global_grants where user like 'repl'\G Expected results are:
      BACKUP_ADMIN CLONE_ADMIN PERSIST_RO_VARIABLES_ADMIN REPLICATION_SLAVE_ADMIN
      SYSTEM_VARIABLES_ADMIN Note: Substitute your replication user's name for repl
      in the above queries.
    remediation: >
      Execute the following steps to remediate this setting: 1. Enumerate the
      replication users found in the result set of the audit procedure 2. For each
      replication user, issue the following SQL statement (replace repl with your
      replication user's name): REVOKE SUPER ON *.* FROM 'repl'; References: 1.
      https://mariadb.com/kb/en/grant/#super
    references: >
      1. https://mariadb.com/kb/en/grant/#super
    impact: >
      When the SUPER privilege is denied to a given user, that user will be unable
      to take advantage of certain capabilities, such as certain mysqladmin options.
    compliance_mappings:
      cis:
        - "CIS_MARIADB_10_6_v1_1_0_9_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
