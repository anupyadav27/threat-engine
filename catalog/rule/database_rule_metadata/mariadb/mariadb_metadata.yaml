  - rule_id: mariadb.cis.2.non_default_unique_cryptographic_material_is_in
    title: "Ensure Non-Default, Unique Cryptographic Material is in Use"
    severity: high
    category: database
    tech_type: mariadb
    automation_type: manual
    cis_benchmark: "CIS_MARIADB 10.6_v1.1.0"
    cis_version: "10.6_v1.1.0"
    cis_control: "2.5"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The cryptographic material used by MariaDB, such as digital certificates and
      encryption keys, should be used only for MariaDB and only for one instance.
      Default cryptographic material should not be used since it is not unique to
      the instance.
    rationale: >
      If a cryptographic material is used on multiple MariaDB instances and/or
      systems, then a compromise of one may lead to the network traffic of all
      servers being compromised that use the same cryptographic material. If an
      attacker gains access to shared cryptographic material, including default
      material, the attacker can reuse that material to impersonate the MariaDB
      server or otherwise compromise its operations.
    audit_procedure: >
      Review all cryptographic material. If it is default, used for other MariaDB
      instances and/or for purposes other than MariaDB then this is a finding.
      Review the server certificate by running: cd <data_dir and/or ssl_cert> sudo
      openssl x509 -in server-cert.pem -subject -noout | grep
      Auto_Generated_Server_Certificate The output for the auto generated pem will
      look something like: subject=
      /CN=MariaDB_Server_10.6.8_Auto_Generated_Server_Certificate If no rows return,
      the check is a pass since the certificate is not MariaDB auto- generated.
    remediation: >
      Generate new certificates, keys, and other cryptographic material as needed
      for each affected MariaDB instance. References: 1.
      https://mariadb.com/kb/en/securing-connections-for-client-and-server/ 2.
      https://mariadb.com/kb/en/secure-connections-overview/
    references: >
      1. https://mariadb.com/kb/en/securing-connections-for-client-and-server/ 2.
      https://mariadb.com/kb/en/secure-connections-overview/
