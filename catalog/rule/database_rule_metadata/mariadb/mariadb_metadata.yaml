  - rule_id: mariadb.cis.1.disable_mariadb_command_history
    title: "Disable MariaDB Command History"
    severity: medium
    category: database
    tech_type: mariadb
    automation_type: automated
    cis_benchmark: "CIS_MARIADB 10.6_v1.1.0"
    cis_version: "10.6_v1.1.0"
    cis_control: "1.3"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      On Unix, the mysql client writes a record of executed statements to a history
      file. By default, this file is named .mysql_history and is created in your
      home directory. To specify a different file, set the value of the
      MYSQL_HISTFILE environment variable. The .mysql_history file should be
      protected with a restrictive access mode because sensitive information might
      be written to it, such as the text of SQL statements that contain passwords.
    rationale: >
      Disabling the MariaDB Client and MariaDB Shell command history reduces the
      probability of exposing sensitive information, such as passwords, encryption
      keys, or other sensitive data or information.
    audit_procedure: >
      Execute the following commands to assess this recommendation: find /home -name
      '.mysql_history' find /root -name '.mysql_history' For each file returned
      determine whether that file is symbolically linked to /dev/null.
    remediation: >
      For MariaDB Client perform the following steps to remediate this setting: 1.
      Remove .mysql_history if it exists. 2. Use either of the techniques below to
      prevent it from being created again: o Set the MYSQL_HISTFILE environment
      variable to /dev/null. This will need to be placed in the shell's startup
      script. o Create .mysql_history as a symbolic to /dev/null. > ln -s /dev/null
      $HOME/.mysql_history Default Value: By default, the MariaDB command history
      file is located in /root/.mysql_history. References: 1.
      https://mariadb.com/kb/en/mysql-command-line-client/#the-mysql_history-file 2.
      https://mariadb.com/kb/en/mysqld-options/
    references: >
      1. https://mariadb.com/kb/en/mysql-command-line-client/#the-mysql_history-file
      2. https://mariadb.com/kb/en/mysqld-options/
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_MARIADB_10_6_v1_1_0_1_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
