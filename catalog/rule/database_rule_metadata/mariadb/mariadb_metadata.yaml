  - rule_id: mariadb.cis.1.the_mysql_pwd_environment_variable_is_not_in_use
    title: "Verify That the MYSQL_PWD Environment Variable is Not in Use"
    severity: high
    category: database
    tech_type: mariadb
    automation_type: automated
    cis_benchmark: "CIS_MARIADB 10.6_v1.1.0"
    cis_version: "10.6_v1.1.0"
    cis_control: "1.4"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      MariaDB can read a default database password from an environment variable
      called MYSQL_PWD. Avoiding use of this environment variable can better
      safeguard the confidentiality of MariaDB credentials.
    rationale: >
      Using the MYSQL_PWD environment variable implies MariaDB credentials are
      stored as clear text.
    audit_procedure: >
      To assess this recommendation, use the /proc filesystem to determine if
      MYSQL_PWD is currently set for any process: grep MYSQL_PWD /proc/*/environ
      This may return one entry for the process which is executing the grep command.
    remediation: >
      Check which users and/or scripts are setting MYSQL_PWD and change them to use
      a more secure method. For unattended logins, you should consider 2) Different
      authentication methods (e.g., X509 certificate verification) Default Value:
      Not set. References: 1. https://mariadb.com/kb/en/mariadb-environment-
      variables/
    references: >
      1. https://mariadb.com/kb/en/mariadb-environment-variables/
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_MARIADB_10_6_v1_1_0_1_4"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_mariadb_10_6_v1_1_0_1_4"
