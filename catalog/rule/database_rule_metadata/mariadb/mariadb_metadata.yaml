  - rule_id: mariadb.cis.5.super_is_not_granted_to_non_administrative_users
    title: "Ensure 'SUPER' is Not Granted to Non-Administrative Users"
    severity: high
    category: database
    tech_type: mariadb
    automation_type: manual
    cis_benchmark: "CIS_MARIADB 10.6_v1.1.0"
    cis_version: "10.6_v1.1.0"
    cis_control: "5.4"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The SUPER privilege is a powerful and far-reaching privilege and should not be
      granted lightly. In MariaDB, SUPER is deprecated and will be removed in a
      future version of MariaDB. The SUPER privilege shown in the
      INFORMATION_SCHEMA.USER_PRIVILEGES table governs the use of a variety of
      MariaDB features. These features include, CHANGE MASTER TO, KILL, mysqladmin
      kill option, PURGE BINARY LOGS, SET GLOBAL, mysqladmin debug option, logging
      control, and more. In MariaDB, SUPER is deprecated and will be removed in a
      future version of MariaDB. Migrating Accounts from SUPER to Dynamic Privileges
      is recommended.
    rationale: >
      The SUPER privilege allows principals to perform many actions, including view
      and terminate currently executing MariaDB statements (including statements
      used to manage passwords). This privilege also provides the ability to
      configure MariaDB, such as enable/disable logging, alter data, disable/enable
      features. Limiting the accounts that have the SUPER privilege reduces the
      chances that an attacker can exploit these capabilities. It is more secure to
      migrate administrative users off SUPER and instead assign the specific and
      minimal set of mysql Dynamic Privileges needed to perform their tasks. Impact:
      When the SUPER privilege is denied to a given user, that user will be unable
      to take advantage of certain capabilities, such as certain mysqladmin options.
    audit_procedure: >
      Execute the following SQL statement to audit this setting: SELECT GRANTEE FROM
      INFORMATION_SCHEMA.USER_PRIVILEGES WHERE PRIVILEGE_TYPE = 'SUPER'; Ensure only
      administrative users are returned in the result set.
    remediation: >
      Perform the following steps to remediate this setting: 1. Enumerate the non-
      administrative users found in the result set of the audit procedure 2. For
      each user, issue the following SQL statement (replace <user> with the non-
      administrative user): REVOKE SUPER ON *.* FROM ' <user> '; Next minimize
      administrator rights 1. Assess the minimal set of Dynamic Permissions needed
      by a user to perform their duties. 2. For each user assign the appropriate
      Dynamic Permission and then revoke that <user> SUPER capability. For example,
      if administrator 'u1'@'localhost' requires SUPER for binary log purging and
      system variable modification, these statements make the required changes to
      the account thus limiting rights to what is needed: GRANT BINLOG_ADMIN,
      SYSTEM_VARIABLES_ADMIN ON *.* TO 'u1'@'localhost'; REVOKE SUPER ON *.* FROM
      'u1'@'localhost'; References: 1.
      https://mariadb.com/docs/server/ref/mdb/information- schema/USER_PRIVILEGES/
      2. https://mariadb.com/kb/en/show-privileges/
    references: >
      1. https://mariadb.com/docs/server/ref/mdb/information-
      schema/USER_PRIVILEGES/ 2. https://mariadb.com/kb/en/show-privileges/
    impact: >
      When the SUPER privilege is denied to a given user, that user will be unable
      to take advantage of certain capabilities, such as certain mysqladmin options.
    compliance_mappings:
      cis:
        - "CIS_MARIADB_10_6_v1_1_0_5_4"
