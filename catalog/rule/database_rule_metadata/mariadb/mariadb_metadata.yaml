    cis_version: "10.6_v1.1.0"
    cis_control: "7.6"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      Anonymous accounts are users with empty usernames (''). Anonymous accounts
      have no passwords, so anyone can use them to connect to the MariaDB server.
    rationale: >
      Removing anonymous accounts will help ensure that only identified and trusted
      principals are capable of interacting with MariaDB. Impact: Any applications
      relying on anonymous database access will be adversely affected by this
      change.
    audit_procedure: >
      Execute the following SQL query to identify anonymous accounts: SELECT
      user,host FROM mysql.user WHERE user = ''; The above query will return zero
      rows if no anonymous accounts are present.
    remediation: >
      Perform the following actions to remediate this setting: 1. Enumerate the
      anonymous users returned from executing the audit procedure. 2. For each
      anonymous user, DROP or assign them a name. Note: As an alternative, you may
      execute the mariadb-secure-installation utility. References: 1.
      https://mariadb.com/kb/en/mysql_secure_installation/
