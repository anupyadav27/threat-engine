  - rule_id: mariadb.cis.2.secure_backup_credentials
    title: "Secure Backup Credentials"
    severity: high
    category: database
    tech_type: mariadb
    automation_type: manual
    cis_benchmark: "CIS_MARIADB 10.6_v1.1.0"
    cis_version: "10.6_v1.1.0"
    cis_control: "2.1.3"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      A database user with the least amount of privileges required to perform backup
      is needed. The credentials for this user should be protected. The password,
      certificate, and any other credentials should be protected.
    rationale: >
      When the backup credentials are not properly secured, then they might be
      abused to gain access to the server. The backup user needs an account with
      many privileges, so an attacker might potentially gain (almost) complete
      access to the server.
    audit_procedure: >
      Check permissions of files containing passwords and/or SSL keys.
    remediation: >
      Change file permissions.
