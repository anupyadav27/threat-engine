  - rule_id: mariadb.cis.6.log_error_is_configured_correctly
    title: "Ensure 'log_error' is configured correctly"
    severity: high
    category: database
    tech_type: mariadb
    automation_type: automated
    cis_benchmark: "CIS_MARIADB 10.6_v1.1.0"
    cis_version: "10.6_v1.1.0"
    cis_control: "6.1"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      The error log contains information about events such as mariadbd starting and
      stopping, when a table needs to be checked or repaired, and, depending on the
      host operating system, stack traces when mariadbd fails.
    rationale: >
      Enabling error logging can increase the ability to detect malicious attempts
      against MariaDB, and other critical messages. For example, if the error log is
      not enabled then a connection error could go unnoticed. When configured to
      stderr MariaDB will send log data to the console. Logging to the console is
      useful, but remember it is ephemeral. This is not recommended due to the fact
      that logging to console does not provide a means to force restricted access
      via permissions strictly to MariaDB and dedicated MariaDB audit accounts. This
      may compromise the confidentiality of the MariaDB log data. Furthermore use
      caution if co- mingling log data from multiple sources as that can complicate
      log inspection. Additionally from a security auditing perspective, it’s
      difficult and error prone to verify logging is correct using stderr or
      redirected stderr.
    audit_procedure: >
      Execute the following SQL statement to audit this setting: SHOW variables LIKE
      'log_error'; Ensure the Value returned is a path to a file and not
      ./stderr.err.
    remediation: >
      Perform the following actions to remediate this setting: 1. Open the MariaDB
      configuration file (mariadb.cnf). 2. Set the log_error option to the path for
      the error log. Default Value: ./stderr.err References: 1.
      https://mariadb.com/docs/server/ref/mdb/system-variables/log_error/ 2.
      https://mariadb.com/kb/en/error-log/
    references: >
      1. https://mariadb.com/docs/server/ref/mdb/system-variables/log_error/ 2.
      https://mariadb.com/kb/en/error-log/
    impact: >
      
