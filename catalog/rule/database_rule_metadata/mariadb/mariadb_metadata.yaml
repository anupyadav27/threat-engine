  - rule_id: mariadb.cis.5.process_is_not_granted_to_non_administrative_users
    title: "Ensure 'PROCESS' is Not Granted to Non-Administrative Users"
    severity: medium
    category: database
    tech_type: mariadb
    automation_type: manual
    cis_benchmark: "CIS_MARIADB 10.6_v1.1.0"
    cis_version: "10.6_v1.1.0"
    cis_control: "5.3"
    cis_section: "5"
    profile_applicability: "Level 2"
    description: >
      The PROCESS privilege found in the mysql.user table determines whether a given
      user can see statement execution information for all sessions.
    rationale: >
      The PROCESS privilege allows principals to view currently executing MariaDB
      statements beyond their own, including statements used to manage passwords.
      This may be leveraged by an attacker to compromise MariaDB or to gain access
      to potentially sensitive data. Impact: Users denied the PROCESS privilege may
      also be denied use of SHOW ENGINE.
    audit_procedure: >
      Execute the following SQL statement to audit this setting: SELECT GRANTEE FROM
      INFORMATION_SCHEMA.USER_PRIVILEGES WHERE PRIVILEGE_TYPE = 'PROCESS'; Ensure
      only administrative users are returned in the result set.
    remediation: >
      Perform the following steps to remediate this setting: 1. Enumerate the non-
      administrative users found in the result set of the audit procedure 2. For
      each user, issue the following SQL statement (replace <user> with the non-
      administrative user): REVOKE PROCESS ON *.* FROM ' <user> '; References: 1.
      https://mariadb.com/docs/server/ref/mdb/information- schema/USER_PRIVILEGES/
      2. https://mariadb.com/kb/en/show-privileges/
    references: >
      1. https://mariadb.com/docs/server/ref/mdb/information-
      schema/USER_PRIVILEGES/ 2. https://mariadb.com/kb/en/show-privileges/
    impact: >
      Users denied the PROCESS privilege may also be denied use of SHOW ENGINE.
