    profile_applicability: "Level 2"
    description: >
      MariaDB supports multiple encryption ciphers. Ciphers can vary in strength,
      speed and overhead.
    rationale: >
      Requiring clients attempting to connect to MariaDB to use strong ciphers
      protects data in transit. Impact: Connections attempting to use an unsupported
      cipher will fail.
    audit_procedure: >
      Run the following statement: SELECT VARIABLE_NAME, VARIABLE_VALUE FROM
      information_schema.global_variables WHERE VARIABLE_NAME = 'ssl_cipher'; If
      VARIABLE_VALUE is empty, or includes unapproved ciphers, this is a fail.
    remediation: >
      Set ssl_cipher to one or more approved cipher suites in your MariaDB
      configuration file, then restart MariaDB. For example, set: ssl_cipher='ECDHE-
      ECDSA-AES128-GCM-SHA256' Default Value: None References: 1.
      https://mariadb.com/kb/en/ssltls-system-variables/#ssl_cipher 2.
      https://mariadb.com/kb/en/secure-connections-overview/ Additional Information:
      The ssl_cipher option implies the ssl option, so you must have SSL/TLS setup
      to utilize this option. ssl_cipher is not a dynamic variable, so it cannot be
      set once MariaDB is running.
