    cis_control: "6.3"
    cis_section: "6"
    profile_applicability: "Level 2"
    description: >
      The log_warnings system variable, set to 2 by default, specifies the verbosity
      of events sent to the MariaDB error log. A value of 2 enables logging of error
      and warning messages, a value of 3 also includes informational logging, a
      value of 1 logs only errors.
    rationale: >
      This might help to detect malicious behavior by logging communication errors
      and aborted connections.
    audit_procedure: >
      Execute the following SQL statement to assess this recommendation: SHOW GLOBAL
      VARIABLES LIKE 'log_warnings'; Ensure the Value returned equals 2.
    remediation: >
      Perform the following actions to remediate this setting: • Open the MySQL
      configuration file (mariadb.cnf) • Ensure the following line is found in the
      mariadbd section log_warnings = 2 Default Value: The option is enabled (2) -
      errors and warning events are logged - by default. References: 1.
      https://mariadb.com/docs/server/ref/mdb/system-variables/log_warnings/ 2.
      https://mariadb.com/kb/en/error-log/
    references: >
