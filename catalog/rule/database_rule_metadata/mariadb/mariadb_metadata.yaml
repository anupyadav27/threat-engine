  - rule_id: mariadb.cis.4.harden_usage_for_local_infile_on_mariadb_clients
    title: "Harden Usage for 'local_infile' on MariaDB Clients"
    severity: high
    category: database
    tech_type: mariadb
    automation_type: automated
    cis_benchmark: "CIS_MARIADB 10.6_v1.1.0"
    cis_version: "10.6_v1.1.0"
    cis_control: "4.4"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      The local_infile parameter dictates whether files located on the MariaDB
      client's computer can be loaded or selected via LOAD DATA INFILE or SELECT
      local_file.
    rationale: >
      For MariaDB client programs and connectors prior to 10.2.0, disabling
      local_infile reduces an attacker's ability to read sensitive files off the
      affected server via an SQL injection vulnerability. Impact: Disabling
      local_infile will impact the functionality of solutions that rely on it.
    audit_procedure: >
      Check the version of MariaDB clients and connectors. For example: $ mariadb
      --version The version should be 10.2.0 or higher. For connectors inspect the
      library in use. Most connectors provide functions which return version
      information. For C - libmysqlclient has: const char
      *mysql_get_client_info(void) If clients have not been upgraded to 10.2.0 check
      the value of local_infile. Execute the following SQL statement: SHOW VARIABLES
      WHERE Variable_name = 'local_infile'; If clients are older than 10.2.0 or if
      local_infile is not in use, ensure the value returned is 0.
    remediation: >
      Upgrade all MariaDB clients and connectors to 10.2.0 or higher. In the case
      where using local_infile is needed, the following changes further harden
      security: On client side, secure by: Limiting the location from where data can
      be read using --load-data-local-dir. mariadb --local-infile=0 --load-data-
      local-dir=/my/local/data Adding TLS connection to assure server identity by
      requiring verification. mariadb --local-infile=0 --load-data-local-
