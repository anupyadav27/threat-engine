  - rule_id: mariadb.cis.2.socket_peer_credential_authentication_is_used
    title: "Ensure Socket Peer-Credential Authentication is Used Appropriately"
    severity: medium
    category: database
    tech_type: mariadb
    automation_type: manual
    cis_benchmark: "CIS_MARIADB 10.6_v1.1.0"
    cis_version: "10.6_v1.1.0"
    cis_control: "2.8"
    cis_section: "2"
    profile_applicability: "Level 2"
    description: >
      The server-side unix_socket authentication plugin authenticates clients that
      connect to the MariaDB server from the local host through the Unix socket
      file. Users authenticated using unix_socket need not specify a password when
      connecting to the server. However, users authenticated by the unix_socket
      plugin are restricted from connecting remotely; they can only connect from the
      local host through the Unix socket file. This method is only suitable in
      situations where the server administrator OS account access is restricted.
    rationale: >
      This method may be desirable in specific cases, including: • The Linux system
      where MariaDB is running is dedicated to the MariaDB server and only the
      MariaDB DBA and OS Admin have access. • When control over user authentication
      is centralized in the operating system. • It is desirable that audit trails in
      the database and operating system can use the same user names. • For certain
      other narrow installation use cases unix_socket may be desirable. • Only local
      connections for a user. Impact: Things to consider when using the operating
      system to authenticate users: • The user must have an operating system account
      on the computer which must be accessed. • If a user has logged in using this
      method and steps away from the terminal, another user could easily log in
      because this user does not need any passwords or credentials. This could pose
      a serious security problem. • When an operating system is used to authenticate
      database users, managing distributed database environments and database links
      requires special care. Special care must also be taken not to leave such a
      terminal unlocked and unattended. Hence, we recommend that you carefully
      evaluate your requirements before opting for unix_socket. • This will not work
      where distributed connections are required.
    audit_procedure: >
      To determine if the unix_socket plugin is enabled, run: SELECT PLUGIN_NAME,
      PLUGIN_STATUS FROM INFORMATION_SCHEMA.PLUGINS WHERE PLUGIN_NAME =
      'unix_socket'; If PLUGIN_STATUS is ACTIVE and the organization does not allow
      use of this feature, this is a fail. To determine users who can use
      unix_socket, run: SELECT CONCAT(user, '@', host, ' => ', JSON_DETAILED(priv))
      FROM mysql.global_priv where JSON_CONTAINS(priv, '{'plugin':'unix_socket'}',
      '$.auth_or'); If host is not the localhost or an unauthorized user is listed,
      this is a fail.
    remediation: >
      If the plugin is active and you need to disable it in your environment, add
      the following option under the [mysqld] option group in your MariaDB
      configuration file, then restart MariaDB: unix_socket=OFF If the plugin is
      disabled but you seek to use it, ensure the following option is set under the
      [mysqld] option group in your MariaDB configuration file, then restart
      MariaDB: unix_socket=ON To enable an OS user to login to MariaDB using
      unix_socket, include 'unix_socket' as an authentication plugin in your
      IDENTIFIED VIA clause of CREATE USER commands. For example, run: CREATE USER '
      <user> '@'localhost' IDENTIFIED VIA unix_socket; The user can then login
      using: mysql -u <user> Default Value: The unix_socket plugin is ON by default.
      References: 1. https://mariadb.com/kb/en/authentication-plugin-unix-socket/ 2.
      https://mariadb.com/kb/en/create-user/#identified-viawith-
      authentication_plugin Additional Information: You cannot dynamically install
      or uninstall the unix_socket plugin in MariaDB 10.6.
    references: >
      1. https://mariadb.com/kb/en/authentication-plugin-unix-socket/ 2.
      https://mariadb.com/kb/en/create-user/#identified-viawith-
      authentication_plugin Additional Information: You cannot dynamically install
      or uninstall the unix_socket plugin in MariaDB 10.6.
    impact: >
      Things to consider when using the operating system to authenticate users: •
      The user must have an operating system account on the computer which must be
      accessed. • If a user has logged in using this method and steps away from the
      terminal, another user could easily log in because this user does not need any
      passwords or credentials. This could pose a serious security problem. • When
      an operating system is used to authenticate database users, managing
      distributed database environments and database links requires special care.
      Special care must also be taken not to leave such a terminal unlocked and
      unattended. Hence, we recommend that you carefully evaluate your requirements
      before opting for unix_socket. • This will not work where distributed
      connections are required.
