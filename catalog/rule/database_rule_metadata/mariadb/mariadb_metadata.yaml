  - rule_id: mariadb.cis.3.general_log_file_has_appropriate_permissions
    title: "Ensure 'general_log_file' Has Appropriate Permissions"
    severity: high
    category: database
    tech_type: mariadb
    automation_type: automated
    cis_benchmark: "CIS_MARIADB 10.6_v1.1.0"
    cis_version: "10.6_v1.1.0"
    cis_control: "3.6"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      MariaDB can operate using a variety of log files, each used for different
      purposes. These are the binary log (which can be encrypted), error log, slow
      query log, relay log (which can be encrypted), general log, and in the
      enterprise edition, the audit log (which can be encrypted). Because these are
      files on the host operating system, they are subject to the permissions and
      ownership structure provided by the host and may be accessible by users other
      than the MariaDB user. Additionally, using secure key management and at rest
      MariaDB encryption can further protect data from OS users. Much of the
      information about the state of MariaDB exists in MariaDB, the MariaDB
      performance_schema or informations_schema. If you can get the information you
      need from within MySQL that is more secure as it does not require OS access.
      If you are not going to use log files it is best to first disable (don’t
      enable) and remove any prior logs.
    rationale: >
      Limiting the accessibility, or existence, of these log files will protect the
      confidentiality, integrity, and availability of the MariaDB logs. Impact:
      Changing the permissions of the general log files may impact monitoring tools
      which use a log file adapter.
    audit_procedure: >
      Perform the following steps to assess this recommendation: 1. Execute the
      following SQL statement to determine the Values of general_log and
      general_log_file: select @@general_log, @@general_log_file; With a general_log
      value of 0 or OFF, indicates the log is disabled. If 1 or ON it is enabled. 2.
      Whether the value is 0, OFF, 1 or ON execute the following command at a
      terminal prompt to list non-compliant <general_log_file>.* file permissions:
      ls -l <general_log_file> If general_log is 0 or OFF (disabled) and the log
      file exists, remove the old general log file. If general_log is 1 or ON
      (enabled) review the permissions ls -l <general_log_file> grep
      '^-rw-------.*mysql.*mysql' Lack of output implies compliance.
    remediation: >
      If you can, use MariaDB SYS, PERFORMANCE_SCHEMA, or MariaDBL Auditing as these
      are more secure options. By default the general_log is disabled (0 or OFF).
      It's most secure to disable the general_log. To disable the general_log_file:
      SET PERSIST @@GENERAL_LOG=OFF; If you must use general_log then assure the
      permissions are correct. Execute the following command for each log file
      location requiring corrected permissions and ownership: chmod 600
      <general_log_file> chown mysql:mysql <general_log_file> Default Value: The
      variable general_log is set to OFF by default. The variable general_log_file
      is set to <host_name> .log by default. References: 1.
      https://mariadb.com/kb/en/general-query-log/
    references: >
      1. https://mariadb.com/kb/en/general-query-log/
    impact: >
      Changing the permissions of the general log files may impact monitoring tools
      which use a log file adapter.
