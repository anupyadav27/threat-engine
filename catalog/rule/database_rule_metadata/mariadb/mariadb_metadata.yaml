rules:

  - rule_id: mariadb.cis.1.place_databases_on_non_system_partitions
    title: "Place Databases on Non-System Partitions"
    severity: high
    category: database
    tech_type: mariadb
    automation_type: manual
    cis_benchmark: "CIS_MARIADB 10.6_v1.1.0"
    cis_version: "10.6_v1.1.0"
    cis_control: "1.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      It is generally accepted that host operating systems should include different
      filesystem partitions for different purposes. One set of filesystems is
      typically called system partitions, and these are generally reserved for host
      system/application operation. The other set of filesystems is typically called
      'non-system partitions', and such locations are generally reserved for storing
      data.
    rationale: >
      Moving the database off the system partition will reduce the probability of
      denial of service caused by exhaustion of available disk space to the
      operating system. Impact: Moving database files and directories to a non-
      system partition may be difficult depending on whether there was only a single
      partition when the operating system was set up and whether there are
      additional non-system partitions available.
    audit_procedure: >
      Execute the following steps to assess this recommendation: • Obtain the
      location of the datadir and other MariaDB database files by executing the
      following SQL statement: SELECT VARIABLE_NAME, VARIABLE_VALUE FROM
      information_schema.global_variables WHERE (VARIABLE_NAME LIKE '%dir' or
      VARIABLE_NAME LIKE '%file') and (VARIABLE_NAME NOT LIKE '%core%' AND
      VARIABLE_NAME <> 'local_infile' AND VARIABLE_NAME <> 'relay_log_info_file')
      order by VARIABLE_NAME; • Using the value returned for the datadir, and other
      results from the above query, execute the following in a system terminal: df
      -h <directory> The output returned from the df command above should not
      include root (/), /var, or /usr.
    remediation: >
      Perform the following steps to remediate this setting for the datadir: 1.
      Backup the database. 2. Choose a non-system partition new location for MariaDB
      data. 3. Stop mariadbd using a command like: service mariadb stop. 4. Copy the
      data using a command like: cp -rp <datadir Value> <new location> . 5. Set the
      datadir location to the new location in the MariaDB configuration file. 6.
      Start mariadbd using a command like: service mariadb start Note: On some Linux
      distributions you may need to additionally modify apparmor settings. For
      example, on a Ubuntu 14.04.1 system edit the file
      /etc/apparmor.d/usr.sbin.mariadbd so that the datadir access is appropriate.
      The original might look like this: # Allow data dir access /var/lib/mysql/ r,
      /var/lib/mysql/** rwk, Alter those two paths to be the new location you chose
      above. For example, if that new location were /media/mysql, then the
      /etc/apparmor.d/usr.sbin.mysqld file should include something like this: #
      Allow data dir access /media/mysql/ r, /media/mysql/** rwk, Default Value: Not
      Applicable. References: 1. https://mariadb.com/kb/en/specifying-permissions-
      for-schema-data-directories- and-tables/
    references: >
      1. https://mariadb.com/kb/en/specifying-permissions-for-schema-data-
      directories- and-tables/
    impact: >
      Moving database files and directories to a non-system partition may be
      difficult depending on whether there was only a single partition when the
      operating system was set up and whether there are additional non-system
      partitions available.
    compliance_mappings:
      cis:
        - "CIS_MARIADB_10_6_v1_1_0_1_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_mariadb_10_6_v1_1_0_1_1"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: mariadb.cis.1.use_dedicated_least_privileged_account_for
    title: "Use Dedicated Least Privileged Account for MariaDB Daemon/Service"
    severity: high
    category: database
    tech_type: mariadb
    automation_type: automated
    cis_benchmark: "CIS_MARIADB 10.6_v1.1.0"
    cis_version: "10.6_v1.1.0"
    cis_control: "1.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      As with any service installed on a host, it can be provided with its own user
      context. Providing a dedicated user to the service provides the ability to
      precisely constrain the service within the larger host context.
    rationale: >
      Utilizing a least privilege account for MariaDB to execute as needed may
      reduce the impact of a MariaDB-born vulnerability. A restricted account will
      be unable to access resources unrelated to MariaDB, such as operating system
      configurations.
    audit_procedure: >
      Execute the following command at a terminal prompt to assess this
      recommendation: ps -ef | egrep '^mysql.*$' If no lines are returned, then this
      is a fail. Note: It is assumed that the MariaDB user is mysql. Additionally,
      you may consider running sudo -l as the MariaDB user or to check the sudoers
      file.
    remediation: >
      Create a user which is only used for running MariaDB and directly related
      processes. This user must not have administrative rights to the system.
      Additionally, it's best to avoid providing shell access to such an account.
      Shell access can be removed using the following command at a terminal prompt:
      /usr/sbin/groupadd -g 27 -o -r mysql >/dev/null 2>&1 || : /usr/sbin/useradd -M
      -N -g mysql -o -r -d /var/lib/mysql -s /bin/false \ -c 'MariaDB Server' -u 27
      mysql >/dev/null 2>&1 || : References: 1. https://mariadb.com/kb/en/running-
      mysqld-as-root/ Additional Information: The root user may be used to start the
      MariaDB service on Linux/UNIX, but then it must be configured to drop
      privileges by specifying a service specific user in the mariadb.cnf or my.ini
      file.
    references: >
      1. https://mariadb.com/kb/en/running-mysqld-as-root/ Additional Information:
      The root user may be used to start the MariaDB service on Linux/UNIX, but then
      it must be configured to drop privileges by specifying a service specific user
      in the mariadb.cnf or my.ini file.
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_MARIADB_10_6_v1_1_0_1_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
