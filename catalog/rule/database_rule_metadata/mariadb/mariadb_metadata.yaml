  - rule_id: mariadb.cis.3.datadir_has_appropriate_permissions
    title: "Ensure 'datadir' Has Appropriate Permissions"
    severity: high
    category: database
    tech_type: mariadb
    automation_type: automated
    cis_benchmark: "CIS_MARIADB 10.6_v1.1.0"
    cis_version: "10.6_v1.1.0"
    cis_control: "3.1"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The data directory is the location of the MariaDB databases.
    rationale: >
      Limiting the accessibility of these objects will protect the confidentiality,
      integrity, and availability of the MariaDB database. If someone other than the
      MariaDB user is allowed to read files from the data directory, it may be
      possible to read data from the mysql.user table which contains passwords.
      Additionally, the ability to create files can lead to denial of service, or
      might otherwise allow someone to gain access to specific data by manually
      creating a file with a view definition.
    audit_procedure: >
      Perform the following steps to assess this recommendation: • Execute the
      following SQL statement to determine the Value of datadir show variables where
      variable_name = 'datadir'; Or SELECT VARIABLE_NAME, VARIABLE_VALUE FROM
      information_schema.global_variables WHERE VARIABLE_NAME LIKE 'datadir'; •
      Execute the following command at a terminal prompt sudo ls -ld <datadir> |
      grep 'drwxr-x---.*mysql.*mysql' Lack of output implies a fail.
    remediation: >
      Execute the following commands at a terminal prompt: chmod 750 <datadir> chown
      mysql:mysql <datadir>
    references: >
      
    impact: >
      
