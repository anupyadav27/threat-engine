  - rule_id: mariadb.cis.2.do_not_specify_passwords_in_the_command_line
    title: "Do Not Specify Passwords in the Command Line"
    severity: high
    category: database
    tech_type: mariadb
    automation_type: manual
    cis_benchmark: "CIS_MARIADB 10.6_v1.1.0"
    cis_version: "10.6_v1.1.0"
    cis_control: "2.3"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      When a command is executed on the command line, for example mariadb -u admin
      -p password, the password may be visible in the user's shell/command history
      or in the process list.
    rationale: >
      If the password is visible in the process list or user's shell/command
      history, an attacker will be able to access the MariaDB database using the
      stolen credentials. Impact: Depending on the remediation chosen, additional
      steps may need to be undertaken like: • Entering a password when prompted. •
      Ensuring the file permissions on .mariadb.cnf is restricted yet accessible by
      the user. • Use a pluggable secure password store, e.g., a keychain.
      Additionally, not all scripts/applications may be able to use .mariadb.cnf.
    audit_procedure: >
      Check the process or task list if the password is visible. Check the shell or
      command history if the password is visible.
    remediation: >
      MariaDB Client: Use -p without password and then enter the password when
      prompted, use a properly secured .mariadb.cnf file, or store authentication
      information in encrypted format in .mylogin.cnf. References: 1.
      https://mariadb.com/kb/en/mysql-command-line-client/
    references: >
      1. https://mariadb.com/kb/en/mysql-command-line-client/
    impact: >
      Depending on the remediation chosen, additional steps may need to be
      undertaken like: • Entering a password when prompted. • Ensuring the file
      permissions on .mariadb.cnf is restricted yet accessible by the user. • Use a
      pluggable secure password store, e.g., a keychain. Additionally, not all
      scripts/applications may be able to use .mariadb.cnf.
