  - rule_id: mariadb.cis.6.log_files_are_stored_on_a_non_system_partition
    title: "Ensure Log Files are Stored on a Non-System Partition"
    severity: high
    category: database
    tech_type: mariadb
    automation_type: automated
    cis_benchmark: "CIS_MARIADB 10.6_v1.1.0"
    cis_version: "10.6_v1.1.0"
    cis_control: "6.2"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      MariaDB log files can be set in the MariaDB configuration to exist anywhere on
      the filesystem. It is common practice to ensure that the system filesystem is
      left uncluttered by application logs. System filesystems include the root (/),
      /var, or /usr.
    rationale: >
      Moving the MariaDB logs off the system partition will reduce the probability
      of denial of service via the exhaustion of available disk space to the
      operating system.
    audit_procedure: >
      Execute the following SQL statement to assess this recommendation: SELECT
      @@global.log_bin_basename; Ensure the value returned does not indicate root
      (/), /var, or /usr.
    remediation: >
      Perform the following actions to remediate this setting: 1. Open the MariaDB
      configuration file (mariadb.cnf) 2. Locate the log_bin entry and set it to a
      file not on root (/), /var, or /usr References: 1.
      https://mariadb.com/docs/server/ref/mdb/system-variables/log_bin/ 2.
      https://mariadb.com/kb/en/binary-log/
    references: >
      1. https://mariadb.com/docs/server/ref/mdb/system-variables/log_bin/ 2.
