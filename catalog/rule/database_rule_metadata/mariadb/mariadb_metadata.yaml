    cis_control: "8.2"
    cis_section: "8"
    profile_applicability: "Level 1"
    description: >
      All network traffic must use SSL/TLS when traveling over untrusted networks.
      SSL/TLS should be enforced on a per-user basis for users which enter the
      system through the network.
    rationale: >
      SSL/TLS helps to prevent eavesdropping and man-in-the-middle attacks. Impact:
      When SSL/TLS is enforced then clients which do not use SSL will not be able to
      connect. If the server is not configured for SSL/TLS then accounts for which
      SSL/TLS is mandatory will not be able to connect.
    audit_procedure: >
