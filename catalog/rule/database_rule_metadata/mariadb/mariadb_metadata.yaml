  - rule_id: mariadb.cis.7.disable_use_of_the_mysql_old_password_plugin
    title: "Disable use of the mysql_old_password plugin"
    severity: high
    category: database
    tech_type: mariadb
    automation_type: automated
    cis_benchmark: "CIS_MARIADB 10.6_v1.1.0"
    cis_version: "10.6_v1.1.0"
    cis_control: "7.1"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      The mysql_old_password plugin uses a cracked password routine with several
      flaws. It is present but not used by default in MariaDB. Steps should be taken
      to ensure that passwords will not be created with this plugin and that clients
      will not be able to authenticate to the MariaDB server using this plugin. The
      old_passwords system variable controls whether MariaDB server uses the
      mysql_old_password plugin (instead of the stronger mysql_native_password
      plugin) when creating passwords. The secure_auth system variable, when
      enabled, will block client connections that utilize the mysql_old_password
      plugin.
    rationale: >
      Use of the mysql_old_password plugin risks disclosure of users' passwords and
      also permits Pass-the-Hash attacks.
    audit_procedure: >
      To ensure new passwords are not created using the mysql_old_password plugin,
      run: SHOW VARIABLES WHERE Variable_name = 'old_passwords'; Ensure the Value
      field is set to OFF. To ensure connections that use the mysql_old_password
      plugin are blocked, run: SHOW VARIABLES WHERE Variable_name = 'secure_auth';
      Ensure the Value field is set to ON.
    remediation: >
      If old_passwords was ON, add the following line to the [mariadbd] section in
      mariadb.cnf: old_passwords=0 If 'secure_authwasOFF, add the following line to
      the [mariadbd]section inmariadb.cnf`: secure_auth=ON Restart MariaDB. Default
      Value: old_passwords is OFF by default. secure_auth is ON by default.
      References: 1. https://mariadb.org/history-of-mysql-mariadb-authentication-
      protocols/ 2. https://mariadb.com/kb/en/pluggable-authentication-
      overview/#default-server- authentication-plugin
    references: >
      1. https://mariadb.org/history-of-mysql-mariadb-authentication-protocols/ 2.
      https://mariadb.com/kb/en/pluggable-authentication-overview/#default-server-
      authentication-plugin
    impact: >
      
