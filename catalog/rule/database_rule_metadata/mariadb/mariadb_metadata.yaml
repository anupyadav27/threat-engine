  - rule_id: mariadb.cis.3.log_bin_basename_files_have_appropriate
    title: "Ensure 'log_bin_basename' Files Have Appropriate Permissions"
    severity: high
    category: database
    tech_type: mariadb
    automation_type: automated
    cis_benchmark: "CIS_MARIADB 10.6_v1.1.0"
    cis_version: "10.6_v1.1.0"
    cis_control: "3.2"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      MariaDB can operate using a variety of log files, each used for different
      purposes. These are the binary log (which can be encrypted), error log, slow
      query log, relay log, general log, and in the enterprise edition, the audit
      log (which can be encrypted). Because these are files on the host operating
      system, they are subject to the permissions and ownership structure provided
      by the host and may be accessible by users other than the MariaDB user.
      Additionally, using secure key management and at rest MariaDB encryption can
      further protect data from OS users.
    rationale: >
      Limiting the accessibility of these objects will protect the confidentiality,
      integrity, and availability of the MariaDB logs. Impact: Changing the
      permissions and ownership of the relay logs and binary log files might have
      impact on external tools. If the permissions on the relay logs and binary log
      files are accidentally changed to exclude the user account which is used to
      run the MariaDB service, then this might break replication. The binary log
      file can be used for point-in-time recovery so this can also affect backup,
      restore, and disaster recovery procedures.
    audit_procedure: >
      Perform the following steps to assess this recommendation: 1. Execute the
      following SQL statement to determine the Value of log_bin_basename: show
      variables like 'log_bin_basename'; 2. Execute the following command at a
      terminal prompt to list all non-compliant log_bin_basename.* file permissions:
      ls -l | egrep '^-(?![r|w]{2}-[r|w]{2}---- .*mysql\s*mysql).*
      <log_bin_basename> .*$' Lack of output implies compliance.
    remediation: >
      Execute the following command for each log file location requiring corrected
      permissions and ownership: chmod 660 <log file> chown mysql:mysql <log file>
    references: >
      
    impact: >
      Changing the permissions and ownership of the relay logs and binary log files
      might have impact on external tools. If the permissions on the relay logs and
      binary log files are accidentally changed to exclude the user account which is
      used to run the MariaDB service, then this might break replication. The binary
      log file can be used for point-in-time recovery so this can also affect
      backup, restore, and disaster recovery procedures.
    compliance_mappings:
      cis:
        - "CIS_MARIADB_10_6_v1_1_0_3_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
