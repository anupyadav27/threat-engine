  - rule_id: mariadb.cis.5.only_administrative_users_have_full_database
    title: "Ensure Only Administrative Users Have Full Database Access"
    severity: high
    category: database
    tech_type: mariadb
    automation_type: manual
    cis_benchmark: "CIS_MARIADB 10.6_v1.1.0"
    cis_version: "10.6_v1.1.0"
    cis_control: "5.1"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The mysql.user, mysql.db, and other mysql tables ending in _priv list a
      variety of privileges that can be granted (or denied) to MariaDB users. Some
      of the privileges of concern include: Select_priv, Insert_priv, Update_priv,
      Delete_priv, Drop_priv, and so on. Typically, these privileges should not be
      available to every MySQL user and often are reserved for administrative use
      only. The information_schema.user_privileges provides a consolidated view of
      all user privileges.
    rationale: >
      Limiting the accessibility of the mysql database will protect the
      confidentiality, integrity, and availability of the data housed within
      MariaDB. A user which has direct access to mysql.* might view password hashes,
      change permissions, or alter or destroy information intentionally or
      unintentionally.
    audit_procedure: >
      Execute the following SQL statement(s) to assess this recommendation: select *
      from information_schema.user_privileges where grantee not like
      ('\'mysql.%localhost\''); Ensure all users returned are administrative users
      with minimal privileges required. The above query ignores MariaDB internal
      reserved accounts.
    remediation: >
      Perform the following actions to remediate this setting: 1. Enumerate non-
      administrative users resulting from the audit procedure. 2. For each non-
      administrative user, use the REVOKE statement to remove privileges as
      appropriate. References: 1.
      https://mariadb.com/docs/server/ref/mdb/information- schema/USER_PRIVILEGES/
      Additional Information: Consideration should be made for which privileges are
      required by each user requiring interactive database access.
    references: >
      1. https://mariadb.com/docs/server/ref/mdb/information-
      schema/USER_PRIVILEGES/ Additional Information: Consideration should be made
      for which privileges are required by each user requiring interactive database
      access.
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_MARIADB_10_6_v1_1_0_5_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_mariadb_10_6_v1_1_0_5_1"
    metadata_source: generated
