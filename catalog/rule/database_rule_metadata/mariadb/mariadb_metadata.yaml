  - rule_id: mariadb.cis.8.set_maximum_connection_limits_for_server_and_per
    title: "Set Maximum Connection Limits for Server and per User"
    severity: high
    category: database
    tech_type: mariadb
    automation_type: manual
    cis_benchmark: "CIS_MARIADB 10.6_v1.1.0"
    cis_version: "10.6_v1.1.0"
    cis_control: "8.3"
    cis_section: "8"
    profile_applicability: "Level 1"
    description: >
      Limiting concurrent connections to a MariaDB server can be used to reduce risk
      of Denial of Service (DoS) attacks performed by exhausting connection
      resources.
    rationale: >
      Limiting the number of concurrent sessions at the server and per user level
      helps to reduce the risk of DoS attacks. MariaDB provides mechanisms to limit
      the number of simultaneous connections that can be made at the server level or
      by any given account.
    audit_procedure: >
      To check global (default) concurrent-sessions settings in the MariaDB database
      server, run the query: SELECT VARIABLE_NAME, VARIABLE_VALUE FROM
      information_schema.global_variables WHERE VARIABLE_NAME LIKE
      'max_%connections'; If the value of max_user_connections is 0 this means there
      is “no limit”. If the value of max_connections is not set, there is no limit.
      To check user-specific settings, run the following: select user, host,
      max_connections, max_user_connections from mysql.user where user not like
      'mysql.%' and user not like 'root'; A value of 0 means there is no user-
      specific limit, that the corresponding global setting applies. If no limits
      are configured, this is a fail.
    remediation: >
      To persist changes to global settings, you must set these variables within
      MariaDB configuration files. • To set the global default per-user connection
      limit, set the max_user_connections variable to a numeric value. • To set the
      maximum number of clients the server permits to simultaneously connect, set
      the max_connections variable to a numeric value. You may also set these
      variables dynamically (and only temporarily) for a running instance of MariaDB
      by connecting as an administrator and utilizing the commands below. SET GLOBAL
      max_user_connections= <desired numeric value> ; SET GLOBAL max_connections=
      <desired numeric value> ; Additionally, connections limits can be set
      distinctly for each user using CREATE or ALTER commands. For example: ALTER
      USER 'fred'@'localhost' WITH MAX_CONNECTIONS_PER_HOUR 5 MAX_USER_CONNECTIONS
      2; Default Value: The default value of max_connections is 151,
      max_user_connections is 0 (unlimited, thus limited by max_connections). By
      default, users are created without their own distinct connection limits.
      References: 1. https://mariadb.com/kb/en/server-system-
      variables/#max_connections 2. https://mariadb.com/kb/en/server-system-
      variables/#max_user_connections 3. https://mariadb.com/kb/en/handling-too-
      many-connections/ 4. https://mariadb.com/kb/en/create-user/#resource-limit-
      options 5. https://mariadb.com/kb/en/configuring-mariadb-with-option-files/
      Additional Information: Global connection limits do not apply to users with
      SUPER or CONNECTION ADMIN privileges. max_user_connections cannot be set
      globally if MariaDB is already running with it set to 0. You can also limit
      connections to be available only for users with SUPER or CONNECTION ADMIN
      privilege by setting max_user_connections to -1. max_connections and
      max_user_connections can only be set within specific ranges of values. MariaDB
      will accept values out of range but silently set them to the closest in- range
      value. For example: MariaDB [(none)]> set global max_connections=0; Query OK,
      0 rows affected, 1 warning (0.000 sec) MariaDB [(none)]> SELECT VARIABLE_NAME,
      VARIABLE_VALUE FROM information_schema.global_variables WHERE VARIABLE_NAME =
      'max_connections'; +-----------------+----------------+ | VARIABLE_NAME |
      VARIABLE_VALUE | +-----------------+----------------+ | MAX_CONNECTIONS | 10 |
      +-----------------+----------------+ 1 row in set (0.001 sec) MariaDB
      [(none)]> set global max_connections=999999; Query OK, 0 rows affected, 1
      warning (0.000 sec) MariaDB [(none)]> SELECT VARIABLE_NAME, VARIABLE_VALUE
      FROM information_schema.global_variables WHERE VARIABLE_NAME =
      'max_connections'; +-----------------+----------------+ | VARIABLE_NAME |
      VARIABLE_VALUE | +-----------------+----------------+ | MAX_CONNECTIONS |
      100000 | +-----------------+----------------+ 1 row in set (0.001 sec) 9
      Replication Everything related to replicating data from one server to another.
      Note that you may see the following terms used interchangeably throughout this
      section: primary (or master ) and replica (or slave ). MariaDB has
      historically used master and slave in replication commands and documentation,
      but primary and replica are now preferred terminology for MariaDB. MariaDB has
      begun but has not completed transitioning terminology. Where possible, this
      section utilizes primary and replica , but master and slave may appear in
      commands yet to be transitioned. More details on MariaDB's renaming initiative
      can be found at MDEV-18777.
    references: >
      1. https://mariadb.com/kb/en/server-system-variables/#max_connections 2.
      https://mariadb.com/kb/en/server-system-variables/#max_user_connections 3.
      https://mariadb.com/kb/en/handling-too-many-connections/ 4.
      https://mariadb.com/kb/en/create-user/#resource-limit-options 5.
      https://mariadb.com/kb/en/configuring-mariadb-with-option-files/ Additional
      Information: Global connection limits do not apply to users with SUPER or
      CONNECTION ADMIN privileges. max_user_connections cannot be set globally if
      MariaDB is already running with it set to 0. You can also limit connections to
      be available only for users with SUPER or CONNECTION ADMIN privilege by
      setting max_user_connections to -1. max_connections and max_user_connections
      can only be set within specific ranges of values. MariaDB will accept values
      out of range but silently set them to the closest in- range value. For
