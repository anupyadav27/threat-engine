  - rule_id: mariadb.cis.9.mutual_tls_is_enabled
    title: "Ensure mutual TLS is enabled"
    severity: high
    category: database
    tech_type: mariadb
    automation_type: manual
    cis_benchmark: "CIS_MARIADB 10.6_v1.1.0"
    cis_version: "10.6_v1.1.0"
    cis_control: "9.5"
    cis_section: "9"
    profile_applicability: "Level 1"
    description: >
      Mutual TLS (a.k.a. Two-Way TLS) enhances TLS by requiring that both parties
      authenticate each other when establishing a connection. Mutual TLS adds a
      requirement (over TLS) that the client provide its certificate so the server
      can authenticate the client.
    rationale: >
      By requiring the client to authenticate to the server (in this case, the
      REPLICA to authenticate to the PRIMARY), the server (PRIMARY) prevents
      unauthorized clients (REPLICAs) from performing replication. Impact: The
      REPLICA will need to have TLS enabled to support mutual TLS.
    audit_procedure: >
      This audit procedure only needs to be run if replication traffic is being
      secured with SSL/TLS. To audit this recommendation, ensure that the REPLICA is
      configured to provide a client certificate, and that the PRIMARY requires
      certificates for any replication users. Run the following command on the
      REPLICA: SHOW REPLICA STATUS\G; Verify that Master_SSL_Cert is set to the
      filename where the REPLICA's certificate is stored, and verify that
      Master_SSL_Key is set to the filename where the REPLICA's corresponding
      private key is stored. On the PRIMARY, run the following command for all
      replication users, replacing which each such username: select ssl_type from
      mysql.user where user=' <replication user> '; Verify that all replication
      users have ssl_type X509.
    remediation: >
      To remediate this setting, you must run the CHANGE MASTER TO command on the
      REPLICA with MASTER_SSL_CERT and MASTER_SSL_KEY set to the paths for the
      REPLICA's certificate and private key files. For example, run: STOP REPLICA;
      -- required if replication was already running CHANGE MASTER TO
      MASTER_SSL_CERT='/etc/mysql/mariadb.conf.d/certificates/server-cert.pem',
      MASTER_SSL_KEY='/etc/mysql/mariadb.conf.d/certificates/server-key.pem'; START
      REPLICA; -- required if you want to restart replication If the PRIMARY does
      not require your replication users to provide X.509 certificates, use the
      ALTER USER command with REQUIRE X509 (and/or optionally REQUIRE SUBJECT and/or
      REQUIRE ISSUER) for the user accounts needing remediation. For example, run:
      ALTER USER <replication user> REQUIRE X509; Default Value: Disabled.
      References: 1. https://mariadb.com/kb/en/replication-with-secure-
      connections/#enabling-two- way-tls-with-change-master 2.
      https://mariadb.com/kb/en/change-master-to/ 3.
      https://mariadb.com/kb/en/alter-user/#tls-options Additional Information: Note
      that this recommendation only applies if you are utilizing TLS to secure
      MariaDB replication traffic. Although the MASTER_SSL_CERT and MASTER_SSL_KEY
      options imply that a certificate and key owned by the PRIMARY should be used,
      these options should actually be set to use the REPLICA's certificate and key.
      When running ALTER USER, the REQUIRE SUBJECT and REQUIRE ISSUER options
      enforce stronger requirements around the client certificates that a user may
      utilize.
    references: >
      1. https://mariadb.com/kb/en/replication-with-secure-connections/#enabling-
      two- way-tls-with-change-master 2. https://mariadb.com/kb/en/change-master-to/
      3. https://mariadb.com/kb/en/alter-user/#tls-options Additional Information:
      Note that this recommendation only applies if you are utilizing TLS to secure
      MariaDB replication traffic. Although the MASTER_SSL_CERT and MASTER_SSL_KEY
      options imply that a certificate and key owned by the PRIMARY should be used,
      these options should actually be set to use the REPLICA's certificate and key.
      When running ALTER USER, the REQUIRE SUBJECT and REQUIRE ISSUER options
      enforce stronger requirements around the client certificates that a user may
      utilize.
    impact: >
      The REPLICA will need to have TLS enabled to support mutual TLS.
