  - rule_id: mariadb.cis.2.password_lifetime_is_less_than_or_equal_to_365
    title: "Ensure 'password_lifetime' is Less Than or Equal to '365'"
    severity: high
    category: database
    tech_type: mariadb
    automation_type: automated
    cis_benchmark: "CIS_MARIADB 10.6_v1.1.0"
    cis_version: "10.6_v1.1.0"
    cis_control: "2.6"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Password expiration provides users with a unique time bounded password
      lifetime.
    rationale: >
      Allows additional security factors pertinent to a specific user to provide
      further password security; predetermined by varying security needs and
      usability requirements in a system or organization.
    audit_procedure: >
      The global password lifetime is set using default_password_lifetime. If the
      value of default_password_lifetime is greater than 0, it indicates the
      permitted password lifetime. Execute the following command to check the global
      password lifetime: SELECT VARIABLE_NAME, VARIABLE_VALUE FROM
      information_schema.global_variables where VARIABLE_NAME like
      'default_password_lifetime'; A value greater than 365 implies a fail. When the
      global password lifetime is less than or equal to 365, or not configured, each
      user account shall be checked by executing the following command: WITH
      password_expiration_info AS ( SELECT User, Host, IF( IFNULL(JSON_EXTRACT(Priv,
      '$.password_lifetime'), -1) = -1, @@global.default_password_lifetime,
      JSON_EXTRACT(Priv, '$.password_lifetime') ) AS password_lifetime,
      JSON_EXTRACT(Priv, '$.password_last_changed') AS password_last_changed FROM
      mysql.global_priv ) SELECT pei.User, pei.Host, pei.password_lifetime,
      FROM_UNIXTIME(pei.password_last_changed) AS password_last_changed_datetime,
      FROM_UNIXTIME( pei.password_last_changed + (pei.password_lifetime * 60 * 60 *
      24) ) AS password_expiration_datetime FROM password_expiration_info pei WHERE
      pei.password_lifetime != 0 AND pei.password_last_changed IS NOT NULL UNION
      SELECT pei.User, pei.Host, pei.password_lifetime,
      FROM_UNIXTIME(pei.password_last_changed) AS password_last_changed_datetime, 0
      AS password_expiration_datetime FROM password_expiration_info pei WHERE
      pei.password_lifetime = 0 OR pei.password_last_changed IS NULL; Note: A value
      of 0 implies the password never expires.
    remediation: >
      To configure the global password lifetime to 365 by executing the following
      command: SET GLOBAL default_password_lifetime=365; Alternatively, configure
      the password lifetime for each user returned by the audit procedure by
      executing the following command: ALTER USER ' <username> '@' <localhost> '
      PASSWORD EXPIRE INTERVAL 365 DAY; Default Value: 0 References: 1.
      https://csrc.nist.gov/csrc/media/publications/sp/800-118/archive/2009-04-
      21/documents/draft-sp800-118.pdf 2.
      https://mariadb.com/docs/reference/mdb/system-
      variables/default_password_lifetime/ 3. https://mariadb.com/kb/en/user-
      password-expiry/ Additional Information: When a user's password_lifetime is
      set to NULL it takes on the value set in global default_password_lifetime
      variable.
    references: >
      1. https://csrc.nist.gov/csrc/media/publications/sp/800-118/archive/2009-04-
      21/documents/draft-sp800-118.pdf 2.
      https://mariadb.com/docs/reference/mdb/system-
      variables/default_password_lifetime/ 3. https://mariadb.com/kb/en/user-
      password-expiry/ Additional Information: When a user's password_lifetime is
      set to NULL it takes on the value set in global default_password_lifetime
      variable.
    impact: >
      
