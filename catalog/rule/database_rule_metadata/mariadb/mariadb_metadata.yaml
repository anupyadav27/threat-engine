  - rule_id: mariadb.cis.7.prevent_password_reuse
    title: "Prevent Password Reuse"
    severity: high
    category: database
    tech_type: mariadb
    automation_type: manual
    cis_benchmark: "CIS_MARIADB 10.11_v1.0.0"
    cis_version: "10.11_v1.0.0"
    cis_control: "7.7"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      Users should be prevented from reusing past passwords when performing
      mandatory password changes.
    rationale: >
      Allowing users to reuse past passwords circumvents the purpose of password
      rotation and exposes the account to risk of password attacks with previously
      compromised passwords. Impact: Users will not be able to change their
      passwords to one of their previously used passwords.
    audit_procedure: >
      Execute the following SQL statement to determine if the password_reuse_check
      plugin is installed and active: select plugin_status, load_option from
      information_schema.plugins where PLUGIN_NAME='password_reuse_check'; The audit
      fails if an empty set is returned, if PLUGIN_STATUS has any value other than
      'ACTIVE', or if LOAD_OPTION has any value other than 'FORCE_PLUS_PERMANENT'.
      Ensure that users cannot set passwords directly as a hash, which bypasses the
      password_reuse_check plugin, by executing the following SQL statement: SHOW
      VARIABLES where Variable_name='strict_password_validation'; The audit fails if
      the Value returned is not ON.
    remediation: >
      Ensure the following entries are present in your MariaDB configuration file,
      adding them and then restarting MariaDB if necessary. plugin_load_add =
      password_reuse_check password_reuse_check = FORCE_PLUS_PERMANENT
      strict_password_validation = ON Default Value: The plugin is not installed by
      default; the audit procedure will return an empty set. References: 1.
      https://mariadb.com/kb/en/password-reuse-check-plugin/
    references: >
