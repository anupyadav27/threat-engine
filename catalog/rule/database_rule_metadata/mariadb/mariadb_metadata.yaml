  - rule_id: mariadb.cis.1.mariadb_is_run_under_a_sandbox_environment
    title: "Ensure MariaDB is Run Under a Sandbox Environment"
    severity: medium
    category: database
    tech_type: mariadb
    automation_type: manual
    cis_benchmark: "CIS_MARIADB 10.6_v1.1.0"
    cis_version: "10.6_v1.1.0"
    cis_control: "1.7"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      Use of the chroot() system call at startup, Systemd with settings to achieve
      isolation, or docker will put MariaDB in a Sandbox environment.
    rationale: >
      Running MariaDB in a Sandbox environment may reduce the impact of a MariaDB-
      born vulnerability by making portions of the file system inaccessible to the
      MariaDB instance. Impact: Use of the chroot option somewhat limits LOAD DATA
      INFILE and SELECT ... INTO OUTFILE.
    audit_procedure: >
      Perform the following steps for each MariaDB instance to assess this
      recommendation: 1. Execute the following SQL statement to determine the value
      of chroot cat /etc/mysql | egrep '(?<=^chroot=).+$' The returned value should
      specify a valid path which differs from the datadir. No results implies
      'chroot' is not in use. 2. Perform the following to check systemd: systemctl
      status <mariadb>.service If something other than (root) is listed beside the
      PID, e.g. Main PID: <PID> (root), this is a pass. No results implies MariaDB
      is not managed by systemd. 3. Perform the following to determine if Docker is
      installed and a MariaDB container is in use: 1. To check for docker
      installation, execute this command: $ docker -v If a message stating the
      version of docker which is installed proceed to the next steps, otherwise no
      further action is needed as docker must be installed for MariaDB to be run in
      docker. 2. To check if a MariaDB image exists in docker run this command: $
      sudo docker images REPOSITORY TAG IMAGE ID CREATED SIZE mariadb latest
      5c284e5e8296 2 weeks ago 384MB If a MariaDB image is listed proceed to the
      next steps, otherwise, no further action is needed as a MariaDB image is
      required for MariaDB to be run in docker. 3. Check if a MariaDB container is
      running: $ sudo docker ps CONTAINER ID IMAGE COMMAND CREATED STATUS PORTS
      NAMES 525f7777a0e8 mariadb:latest 'docker-entrypoint.s…' 2 minutes ago Up 2
      minutes 3306/tcp mariadb-server If a mariadb container is listed then MariaDB
      is running in docker and this is a pass. If MariaDB does not use chroot,
      systemd, or docker, this is a fail.
    remediation: >
      Perform one of the following steps to remediate this setting: • Configure
      MariaDB to use chroot: 1. Choose a non-system partition <chroot location> for
      MariaDB 2. Add chroot= <chroot_location> to the my.cnf option file • Configure
      MariaDB to run under systemd: 1. If MariaDB is managed by systemd and running,
      stop the service: $ sudo systemctl stop <mysqld>.service 2. If a mysql user
      and group do not already exist, create them: $ sudo groupadd mysql $ sudo
      useradd -r -g mysql -s /bin/false mysql 3. Set the ownership of the base
      directory: $ sudo chown -R mysql:mysql /usr/local/mysql/ 4. Create or modify
      the <mysqld> .service file in /lib/systemd/system to include the following
      entries, if not already present: [Unit] Description=MariaDB Server [Install]
      WantedBy=multi-user.target [Service] User=mysql Group=mysql 5. If MariaDB was
      not already already managed by systemd execute this command: $ sudo systemctl
      daemon-reload 6. Start the MariaDB server: $ sudo systemctl start
      <mariadb>.service 7. If you would like MariaDB to automatically run at startup
      execute this command: $ sudo systemctl enable <mariadb>.service • Follow
      documentation in the references for standing up MariaDB in a Docker container.
      During setup, follow the special notes below. o Do not set
      MARIADB_ALLOW_EMPTY_ROOT_PASSWORD or MYSQL_ALLOW_EMPTY_PASSWORD to a non-empty
      value. o Ensure that passwords are not set as values of any environment
      variables being passed to the Docker container. For example, do not
      orchestrate your container by passing MARIADB_ROOT_PASSWORD= as an environment
      attribute. Instead, securely set MARIADB_ROOT_PASSWORD within your
      environment, then simply tell Docker to pass MARIADB_ROOT_PASSWORD (without
      setting the value) to the container. References: 1.
      https://mariadb.com/docs/reference/mdb/cli/mariadbd/chroot/ 2.
      https://mariadb.com/kb/en/installing-and-using-mariadb-via-docker/ 3.
      https://hub.docker.com/_/mariadb 4. https://mariadb.com/kb/en/mariadb-docker-
      environment-variables/ 5. https://mariadb.com/kb/en/mariadb-container-cheat-
      sheet/
    references: >
      1. https://mariadb.com/docs/reference/mdb/cli/mariadbd/chroot/ 2.
      https://mariadb.com/kb/en/installing-and-using-mariadb-via-docker/ 3.
      https://hub.docker.com/_/mariadb 4. https://mariadb.com/kb/en/mariadb-docker-
      environment-variables/ 5. https://mariadb.com/kb/en/mariadb-container-cheat-
      sheet/
    impact: >
      Use of the chroot option somewhat limits LOAD DATA INFILE and SELECT ... INTO
      OUTFILE.
    compliance_mappings:
      cis:
        - "CIS_MARIADB_10_6_v1_1_0_1_7"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_mariadb_10_6_v1_1_0_1_7"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: mariadb.cis.2.backup_policy_in_place
