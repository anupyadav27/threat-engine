  - rule_id: mariadb.cis.6.audit_logging_is_enabled
    title: "Ensure Audit Logging Is Enabled"
    severity: medium
    category: database
    tech_type: mariadb
    automation_type: automated
    cis_benchmark: "CIS_MARIADB 10.6_v1.1.0"
    cis_version: "10.6_v1.1.0"
    cis_control: "6.4"
    cis_section: "6"
    profile_applicability: "Level 2"
    description: >
      Enabling audit logging is an important consideration for a production
      environment, and MariaDB plugin exist to help with this. Enable audit logging
      for • Connect events • Query and Table events (optional)
    rationale: >
      Audit logging helps to identify who changed what and when. The audit log might
      be used as evidence in investigations. It might also help to identify what an
      attacker was able to accomplish.
    audit_procedure: >
      Verify that MariaDB Audit is installed and configured to enable logging for
      connect events and (optionally) query and table events. SHOW VARIABLES LIKE
      '%audit%' ;
    remediation: >
      Although the plugin's shared library is distributed with MariaDB, the plugin
      is not actually installed by default. Add the following to MariaDB’s config
      file. [mariadb] ... #MariaDB plugin plugin_load_add = server_audit
      server_audit_logging=ON server_audit_events=CONNECT Reboot the instance.
