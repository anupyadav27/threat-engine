  - rule_id: mariadb.cis.7.strong_authentication_is_utilized_for_all_accounts
    title: "Ensure strong authentication is utilized for all accounts"
    severity: high
    category: database
    tech_type: mariadb
    automation_type: automated
    cis_benchmark: "CIS_MARIADB 10.6_v1.1.0"
    cis_version: "10.6_v1.1.0"
    cis_control: "7.3"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      The mysql_native_password and mysql_old_password plugins utilize weak
      cryptography and/or weak password routines. In particular, the
      mysql_old_password plugin utilizes cracked password routines and is subject to
      Pass-the-Hash attacks. The mysql_native_password plugin relies on the Secure
      Hash Algorithm 1 (SHA-1) algorithm. The National Institute of Standards and
      Technology (NIST) recommends against use of SHA-1. Additionally, these plugins
      allow users to set blank passwords, which allow authentication without
      providing a password. All users should be using alternative, stronger plugins
      or be configured with invalid passwords. See Default Value section and
      References for more details on specific account configurations.
    rationale: >
      Without a password, only knowing the username and the list of allowed hosts
      will allow someone to connect to the server and assume the identity of the
      user. This, in effect, bypasses authentication mechanisms. Acquisition of user
      password hashes exposes users to password cracking and Pass- the-Hash attacks.
      Setting a root password exposes password-based root access to remote users and
      to non-root linux users. Impact: Using the ed25519 plugin will require
      installation of the plugin, and some clients may need to be configured to
      utilize the client_ed25519 plugin.
    audit_procedure: >
      Execute the following SQL query to find any users utilizing these plugins and
      to find special accounts that have been configured with a password: SELECT
      User,host FROM mysql.user WHERE (plugin IN('mysql_native_password',
      'mysql_old_password','') AND NOT (User = 'root' AND authentication_string =
      'invalid') AND NOT (User = 'mysql' and authentication_string = 'invalid')); No
      rows will be returned if all accounts are using strong authentication
      mechanisms.
    remediation: >
      If the root user is returned in the audit procedure results, set that account
      to utilize only the unix_socket plugin by running the following mariadb
      command: alter user 'root'@'localhost' identified via 'unix_socket'; If the
      mysql user is returned in the audit procedure results, set that account to use
      an invalid password by running the following mariadb command: set password for
      'mysql'@'localhost' = 'invalid'; If the mariadb.sys user is returned in the
      audit procedure results, set that account to use an invalid password by
      running the following mariadb command: set password for
      'mariadb.sys'@'localhost' = 'invalid'; For every other user identified by the
      audit procedure, use the ALTER USER command to configure the account to
      utilize one of the following authentication plugins as appropriate: • ed25519
      • gssapi • pam • unix_socket Notes: Some of these plugins will require
      installation if not already in use. Changing a user to utilize the ed25519
      plugin but without providing a password will make the account inaccessible.
      For service accounts, set a new password in MariaDB and where the service
      account is used. For human user accounts, set a temporary password and notify
      the user to change the password immediately. If password validation plugins
      are already implemented, strict_password_validation may need to be temporarily
      disabled to reset mysql and mariadb.sys accounts to use invalid passwords. To
      do so, run set global strict_password_validation=0; before and set global
      strict_password_validation=1; after the set password commands. Default Value:
      root is configured to use the unix_socket plugin but to fallback to the
      mysql_native_password plugin. root and mysql users are created with an invalid
      password string, preventing password-based authentication. mariadb.sys is a
      locked account without a password set. If the account becomes unlocked,
      authentication without a password can occur. By default, all new users are
      created using the mysql_native_password plugin and without a password unless
      otherwise specified. This allows authentication without a password.
      References: 1. https://mariadb.com/kb/en/pluggable-authentication-overview/ 2.
      https://mariadb.com/kb/en/authentication-from-mariadb-104/ 3.
      https://mariadb.com/kb/en/set-password/ 4. https://mariadb.com/kb/en/alter-
      user/ 5. https://mariadb.com/kb/en/create-user/ 6.
      https://mariadb.org/history-of-mysql-mariadb-authentication-protocols/
    references: >
      1. https://mariadb.com/kb/en/pluggable-authentication-overview/ 2.
      https://mariadb.com/kb/en/authentication-from-mariadb-104/ 3.
      https://mariadb.com/kb/en/set-password/ 4. https://mariadb.com/kb/en/alter-
      user/ 5. https://mariadb.com/kb/en/create-user/ 6.
      https://mariadb.org/history-of-mysql-mariadb-authentication-protocols/
    impact: >
      Using the ed25519 plugin will require installation of the plugin, and some
      clients may need to be configured to utilize the client_ed25519 plugin.
    compliance_mappings:
      cis:
        - "CIS_MARIADB_10_6_v1_1_0_7_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_mariadb_10_6_v1_1_0_7_3"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: mariadb.cis.7.password_complexity_policies_are_in_place
    title: "Ensure Password Complexity Policies are in Place"
    severity: high
    category: database
    tech_type: mariadb
    automation_type: automated
    cis_benchmark: "CIS_MARIADB 10.6_v1.1.0"
    cis_version: "10.6_v1.1.0"
    cis_control: "7.4"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      Passwords should be configured with a minimum length of 14 characters and
      should be checked against dictionaries of common, known, and expected
      passwords.
    rationale: >
      Long passwords help mitigate dictionary, brute forcing, and other password
      attacks. Comparing passwords to password dictionaries prevents users from
      choosing known and easily guessable passwords. Impact: Users will not be able
      to directly set password hashes directly (e.g. SET PASSWORD = '') since this
      bypasses password validation.
    audit_procedure: >
      Review your mariadb configuration files for the following entries:
      plugin_load_add = simple_password_check simple_password_check =
      FORCE_PLUS_PERMANENT plugin_load_add = cracklib_password_check
      cracklib_password_check = FORCE_PLUS_PERMANENT Ensure mariadb is currently
      running with the plugin enabled: SHOW PLUGINS; Verify that
      simple_password_check and cracklib_password_check both show ACTIVE status.
      Execute the following SQL statements to assess password policy settings: SHOW
      VARIABLES LIKE '%pass%'; The result set from the above statement should show:
      • simple_password_check_minimal_length should be 14 or more •
      strict_password_validation should be ON • cracklib_password_check_dictionary
      set to an appropriate dictionary file The dictionary file should contain
      values known to be commonly-used, expected, or compromised. For example, the
      list should include, but is not limited to: • Passwords obtained from previous
      breaches • Dictionary words • Repetitive or sequential characters (e.g.,
      aaaaaa, 1234abcd) • Passwords specific to times of year (e.g. seasons, months)
      • Passwords specific to organization interest (e.g. organization or business
      names, entities, or products) • Passwords matching usernames
    remediation: >
      Install the password check plugins: INSTALL SONAME 'simple_password_check';
      INSTALL SONAME 'cracklib_password_check'; Note A supporting linux distribution
      package may need to be installed before installing the cracklib plugin. Follow
      installation guidance on the Cracklib Password Check Plugin page in the
      References section. Add the following lines to MariaDB configuration files:
      plugin_load_add = simple_password_check simple_password_check =
      FORCE_PLUS_PERMANENT simple_password_check_minimal_length = 14 plugin_load_add
      = cracklib_password_check cracklib_password_check = FORCE_PLUS_PERMANENT
      strict_password_validation = ON Consider customizing the password dictionary
      to include usernames of all MariaDB users and any other risky passwords
      patterns noted in the Audit Procedure. Set cracklib_password_check_dictionary
      if using a customized password dictionary. Default Value: Simple Password
      Check Plugin and Cracklib Password Check Plugin are not installed by default.
      strict_password_validation is ON by default. References: 1.
      https://mariadb.com/kb/en/password-validation-plugins/ 2.
      https://mariadb.com/kb/en/simple-password-check-plugin/ 3.
      https://mariadb.com/kb/en/cracklib-password-check-plugin/
    references: >
      1. https://mariadb.com/kb/en/password-validation-plugins/ 2.
      https://mariadb.com/kb/en/simple-password-check-plugin/ 3.
      https://mariadb.com/kb/en/cracklib-password-check-plugin/
    impact: >
      Users will not be able to directly set password hashes directly (e.g. SET
      PASSWORD = '') since this bypasses password validation.
    compliance_mappings:
      cis:
        - "CIS_MARIADB_10_6_v1_1_0_7_4"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_mariadb_10_6_v1_1_0_7_4"
