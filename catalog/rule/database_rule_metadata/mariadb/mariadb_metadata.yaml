      affected, 1 warning (0.000 sec) MariaDB [(none)]> SELECT VARIABLE_NAME,
      VARIABLE_VALUE FROM information_schema.global_variables WHERE VARIABLE_NAME =
      'max_connections'; +-----------------+----------------+ | VARIABLE_NAME |
      VARIABLE_VALUE | +-----------------+----------------+ | MAX_CONNECTIONS | 10 |
      +-----------------+----------------+ 1 row in set (0.001 sec) MariaDB
      [(none)]> set global max_connections=999999; Query OK, 0 rows affected, 1
      warning (0.000 sec) MariaDB [(none)]> SELECT VARIABLE_NAME, VARIABLE_VALUE
      FROM information_schema.global_variables WHERE VARIABLE_NAME =
      'max_connections'; +-----------------+----------------+ | VARIABLE_NAME |
      VARIABLE_VALUE | +-----------------+----------------+ | MAX_CONNECTIONS |
      100000 | +-----------------+----------------+ 1 row in set (0.001 sec) 9
