  - rule_id: mariadb.cis.5.securely_define_stored_procedures_and_functions
    title: "Securely Define Stored Procedures and Functions DEFINER and INVOKER"
    severity: high
    category: database
    tech_type: mariadb
    automation_type: manual
    cis_benchmark: "CIS_MARIADB 10.6_v1.1.0"
    cis_version: "10.6_v1.1.0"
    cis_control: "5.10"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      Stored procedure and stored function declarations include a definition of
      permissions which can be used to escalate permissions. It's important to
      inspect these settings to ensure they do not unnecessarily escalate
      privileges.
    rationale: >
      A stored procedure or function that improperly escalates privileges may
      provide unintended access rights which can be improperly used.
    audit_procedure: >
      Run the following: SHOW PROCEDURE STATUS; SHOW FUNCTION STATUS; Inspect
      Definer and Invoker security types. If DEFINER is a powerful user consider
      that user's permissions. If INVOKER then the rights for the stored procedure
      or function are that of the user executing these. Review code using SHOW
      CREATE PROCEDURE <name> ; SHOW CREATE FUNCTION <name> ; For more details on
      Procedures and Functions SELECT * FROM information_schema.routines; For more
      details on Procedures and Functions input and output parameters. SELECT * FROM
      information_schema.parameters;
    remediation: >
      Drop and recreate stored procedures and functions using proper DEFINER and
      INVOKER settings, or other code changes. References: 1.
      https://mariadb.com/kb/en/create-procedure/ 2.
      https://mariadb.com/kb/en/create-function/
