  - rule_id: mariadb.cis.1.interactive_login_is_disabled
    title: "Ensure Interactive Login is Disabled"
    severity: medium
    category: database
    tech_type: mariadb
    automation_type: automated
    cis_benchmark: "CIS_MARIADB 10.6_v1.1.0"
    cis_version: "10.6_v1.1.0"
    cis_control: "1.5"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      When created, the MariaDB user may have interactive access to the operating
      system, which means that the MariaDB user could login to the host as any other
      user would.
    rationale: >
      Preventing the MariaDB user from logging in interactively may reduce the
      impact of a compromised MariaDB account. There is also more accountability, as
      accessing the operating system where the MariaDB server lies will require the
      user's own account. Interactive access by the MariaDB user is unnecessary and
      should be disabled. Impact: This setting will prevent the MariaDB
      administrator from interactively logging into the operating system using the
      MariaDB user. Instead, the administrator will need to log in using one's own
      account.
    audit_procedure: >
      Execute the following command to assess this recommendation: getent passwd
      mysql | egrep '^.*[\/bin\/false|\/sbin\/nologin]$' Lack of output implies a
      fail.
    remediation: >
      Execute one of the following commands in a terminal: usermod -s /bin/false
      mysql Or usermod -s /sbin/nologin mysql References: 1.
      https://mariadb.com/kb/en/mysql-command-line-client/
    references: >
      1. https://mariadb.com/kb/en/mysql-command-line-client/
    impact: >
      This setting will prevent the MariaDB administrator from interactively logging
      into the operating system using the MariaDB user. Instead, the administrator
      will need to log in using one's own account.
    compliance_mappings:
      cis:
        - "CIS_MARIADB_10_6_v1_1_0_1_5"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_mariadb_10_6_v1_1_0_1_5"
