    description: >
      The encrypt_binlog system variable may be used to configure encryption of the
      binary and relay logs. This may be configured to ON even if binary logging is
      not enabled in order to encrypt relay log files.
    rationale: >
      The database, and thus the binary and relay logs, may contain sensitive
      information. Encrypting the binary and relay logs protects all data stored in
      these logs from internal and external threats.
    audit_procedure: >
      To audit this setting, run the following command: SELECT VARIABLE_NAME,
      VARIABLE_VALUE, 'BINLOG - At Rest Encryption' as Note FROM
      information_schema.global_variables where variable_name like '%ENCRYPT_LOG%';
      Ensure it is set to ON.
    remediation: >
      Encryption of binary logs is configured by the encrypt_binlog system variable.
      To remediate misconfiguration, add encrypt_binlog and restart MariaDB.
      [mariadb] ... # Binary Log Encryption encrypt_binlog=ON Default Value: The
      default Default Value: OFF References: 1.
