  - rule_id: mariadb.cis.9.only_approved_ciphers_are_used_for_replication
    title: "Ensure only approved ciphers are used for Replication"
    severity: medium
    category: database
    tech_type: mariadb
    automation_type: manual
    cis_benchmark: "CIS_MARIADB 10.6_v1.1.0"
    cis_version: "10.6_v1.1.0"
    cis_control: "9.4"
    cis_section: "9"
    profile_applicability: "Level 2"
    description: >
      MariaDB supports multiple encryption ciphers that can be used for TLS
      connections during replication. Ciphers can vary in strength, speed and
      overhead.
    rationale: >
      Requiring REPLICA servers to utilize strong ciphers when connecting to a
      PRIMARY server protects data in transit. Impact: If the PRIMARY and REPLICA
      servers don't support common cipher suites, replication will fail.
    audit_procedure: >
      This audit procedure only needs to be run if replication traffic is being
      secured with SSL/TLS. To audit this recommendation, run the following command:
      SHOW REPLICA STATUS\G; Verify that Master_SSL_Cipher is set to a list of
      approved ciphers and/or cipher suites. If this setting is empty or includes
      unapproved ciphers or cipher suites, this recommendation has been failed.
    remediation: >
      To remediate this setting, you must use the CHANGE MASTER TO command with
      MASTER_SSL_CIPHER. For example, run: STOP REPLICA; -- required if replication
      was already running CHANGE MASTER TO MASTER_SSL_CIPHER='ECDHE-ECDSA-
      AES128-GCM-SHA256'; START REPLICA; -- required if you want to restart
      replication Default Value: Empty References: 1.
      https://mariadb.com/kb/en/replication-with-secure-connections 2.
      https://mariadb.com/kb/en/change-master-to/#master_ssl_cipher 3.
      https://mariadb.com/kb/en/alter-user/#tls-options Additional Information: Note
      that this recommendation only applies if you are utilizing TLS to secure
      MariaDB replication traffic. Note also that you may also be able to restrict
      the cipher suites accepted by the PRIMARY for your replication users than you
      have set more globally via the ssl_ciphers variable to support all
      clientscipher suite needs. To do this, run theALTER USERcommand on
      yourPRIMARY, utilizing the REQUIRE CIPHERoption with value(s) supported by
      yourREPLICA` as implemented in this recommendation.
    references: >
      1. https://mariadb.com/kb/en/replication-with-secure-connections 2.
      https://mariadb.com/kb/en/change-master-to/#master_ssl_cipher 3.
      https://mariadb.com/kb/en/alter-user/#tls-options Additional Information: Note
