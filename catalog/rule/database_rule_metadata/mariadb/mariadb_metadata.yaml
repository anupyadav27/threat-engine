  - rule_id: mariadb.cis.5.file_is_not_granted_to_non_administrative_users
    title: "Ensure 'FILE' is Not Granted to Non-Administrative Users"
    severity: high
    category: database
    tech_type: mariadb
    automation_type: manual
    cis_benchmark: "CIS_MARIADB 10.6_v1.1.0"
    cis_version: "10.6_v1.1.0"
    cis_control: "5.2"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The FILE privilege is used to allow or disallow a user from reading and
      writing files on the server host. Any user with the FILE right granted has the
      ability to: • Read files from the local file system that are readable by the
      MariaDB server (this includes world-readable files). • Write files to the
      local file system where the MariaDB server has write access.
    rationale: >
      The FILE right allows MariaDB users to read files from disk and to write files
      to disk. This may be leveraged by an attacker to further compromise MariaDB.
      It should be noted that the MariaDB server should not overwrite existing
      files.
    audit_procedure: >
      Execute the following SQL statement to audit this setting: SELECT GRANTEE FROM
      INFORMATION_SCHEMA.USER_PRIVILEGES WHERE PRIVILEGE_TYPE = 'FILE'; Ensure only
      administrative users are returned in the result set.
    remediation: >
      Perform the following steps to remediate this setting: 1. Enumerate the non-
      administrative users found in the result set of the audit procedure. 2. For
      each user, issue the following SQL statement (replace <user> with the non-
      administrative user): REVOKE FILE ON *.* FROM ' <user> '; References: 1.
      https://mariadb.com/docs/server/ref/mdb/system-variables/secure_file_priv/ 2.
      https://mariadb.com/docs/server/ref/mdb/cli/mariadbd/secure-file-priv/
      Additional Information: See also: secure_file_priv system settings.
    references: >
      1. https://mariadb.com/docs/server/ref/mdb/system-variables/secure_file_priv/
      2. https://mariadb.com/docs/server/ref/mdb/cli/mariadbd/secure-file-priv/
      Additional Information: See also: secure_file_priv system settings.
    impact: >
      
    compliance_mappings:
