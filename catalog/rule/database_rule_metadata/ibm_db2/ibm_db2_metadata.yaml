  - rule_id: ibm_db2.cis.5.db2chgpwd_eee_registry_variable
    title: "DB2CHGPWD_EEE Registry Variable"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: manual
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "5.11"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The DB2CHGPWD_EEE registry variable specifies whether users are able to change
      passwords through Db2 in a partitioned database environment. It is recommended
      to set this variable to NO.
    rationale: >
      If password management in the partitioned database environment is not
      centralized, then it could result in a situation where one partition has the
      updated password for a given user while the rest have the old password which
      is a security risk.
    audit_procedure: >
      Verify that the DB2CHGPWD_EEE registry variable is set to the correct location
      by running the following command: db2set -all
    remediation: >
      Run the following command to set the DB2CHGPWD_EEE registry variable to NO:
      db2set DB2CHGPWD_EEE=NO
    references: >
      
