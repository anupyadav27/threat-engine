  - rule_id: ibm_db2.cis.4.set_failed_archive_retry_delay_archretrydelay
    title: "Set Failed Archive Retry Delay (ARCHRETRYDELAY)"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: automated
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "4.1.2"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      The ARCHRETRYDELAY parameter specifies the number of seconds the Db2 service
      will wait before it reattempts to archive log files after a failure. It is
      recommended that this parameter be set anywhere in the range of 10-30. You do
      not want the delay to be so short that the database ends up in a denial of
      service scenario, but you don't want the delay to be too long if an outside
      attack happens at the same time.
    rationale: >
      Ensure that the value is non-zero, otherwise archive logging will not retry
      after the first failure. A denial of service attack can render the database
      without an archive log if this setting is not set. An archive log will ensure
      that all transactions can safely be restored or logged for auditing.
    audit_procedure: >
      Perform the following Db2 commands to obtain the value for this setting: 1.
      Connect to the Db2 database. db2 => connect to <dbname> 2. Run the following
      command: db2 => get database configuration 3. Locate the ARCHRETRYDELAY value
      in the output: Log archive retry Delay (secs) (ARCHRETRYDELAY) = 20
    remediation: >
      1. Connect to the Db2 database db2 => connect to <dbname> 2. To successfully
      set the ARCHRETRYDELAY within the 10-30 range, run the following command: db2
      => update database configuration using archretrydelay *nn* (where *nn* is a
      range between 10-30) Default Value: The default value for ARCHRETRYDELAY is
      20.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_IBM_DB2_11_v1_1_0_4_1_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
