  - rule_id: ibm_db2.cis.6.secure_secadm_authority
    title: "Secure SECADM Authority"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: manual
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "6.1.5"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      The SECADM (security administrator) role grants the authority to create, alter
      (where applicable), and drop roles, trusted contexts, audit policies, security
      label components, security policies and security labels. It is also the
      authority required to grant and revoke roles, security labels and exemptions,
      and the SETSESSIONUSER privilege. SECADM authority has no inherent privilege
      to access data stored in tables. It is recommended that the SECADM role be
      granted to authorized users only.
    rationale: >
      If an account that possesses this authority is compromised or used in a
      malicious manner, the confidentiality, integrity, and availability of data in
      the Db2 instance will be at increased risk.
    audit_procedure: >
      Perform the following Db2 commands to obtain the value for this setting: 1.
      Connect to the Db2 database. db2 => connect to <dbname> 2. Run the following
      command: db2 => select distinct grantee, granteetype from syscat.dbauth where
      securityadmauth = 'Y' 3. Review the list of users, groups, and roles in the
      above output to ensure only approved users, groups, and roles are assigned.
    remediation: >
      Revoke this permission from any unauthorized users. 1. Connect to the Db2
      database. db2 => connect to <dbname> 2. Run the following command: db2 =>
      REVOKE SECADM ON DATABASE FROM USER <username> References: 1.
      https://www.ibm.com/docs/en/db2/11.5?topic=authorities-security-
      administration- authority-secadm
    references: >
      1. https://www.ibm.com/docs/en/db2/11.5?topic=authorities-security-
      administration- authority-secadm
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_IBM_DB2_11_v1_1_0_6_1_5"
      nist_800_53: []
      soc2: []
