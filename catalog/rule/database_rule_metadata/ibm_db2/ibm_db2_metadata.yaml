  - rule_id: ibm_db2.cis.8.enable_tls_communication_between_hadr_primary_and
    title: "Enable TLS Communication Between HADR Primary and Standby Instances (HADR_SSL_LABEL)"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: manual
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
