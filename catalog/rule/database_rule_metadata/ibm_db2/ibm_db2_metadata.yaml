  - rule_id: ibm_db2.cis.7.disable_the_audit_buffer
    title: "Disable the Audit Buffer"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: automated
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "7.1.1"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      Db2 can be configured to use an audit buffer where individual audit events are
      gathered into a large buffer to improve performance by reducing the number of
      writes to disk. It is recommended that the audit buffer be disabled by setting
      the size to 0.
    rationale: >
      Increasing the audit buffer size to greater than 0 will allocate space for the
      audit records generated by the audit facility. At scheduled intervals, or when
      the audit buffer is full, the db2auditd audit daemon empties the audit buffer
      to disk, writing the audit records asynchronously. As the events are held in
      memory for some time before being written to disk, if the database server
      happened to crash those event would be lost. Setting the buffer size to 0
      ensure events are written directly to disk. Impact: Disabling the audit buffer
      may have noticeable impact on overall performance of the database server.
    audit_procedure: >
      Perform the following to determine if the audit buffer is set as recommended:
      1. Attach to the Db2 instance. db2 => attach to <db2instance> 2. Run the
      following command: db2 => get database manager configuration 3. Locate
      AUDIT_BUF_SZ value in the output: Audit buffer size (4KB) (AUDIT_BUF_SZ) = 0
      Ensure AUDIT_BUF_SZ is equal to 0.
    remediation: >
      Perform the following to disable the audit buffer: 1. Attach to the Db2
      instance db2 => attach to <db2instance> 2. Run the following command: db2 =>
      update database manager configuration using audit_buf_sz 0 References: 1.
      https://www.ibm.com/docs/en/db2/11.5?topic=parameters-audit-buf-sz-audit-
      buffer-size
    references: >
      1. https://www.ibm.com/docs/en/db2/11.5?topic=parameters-audit-buf-sz-audit-
      buffer-size
    impact: >
      Disabling the audit buffer may have noticeable impact on overall performance
      of the database server.
    compliance_mappings:
      cis:
        - "CIS_IBM_DB2_11_v1_1_0_7_1_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_ibm_db2_11_v1_1_0_7_1_1"
