      https://www.ibm.com/docs/en/db2/11.5?topic=security-extended-windows-using-
      db2admns-db2users-groups 3.
      https://www.ibm.com/docs/en/db2/11.5?topic=commands-db2extsec-set-
      permissions-db2-objects
    impact: >
      Before enabling extended security for an existing installation, you should
