  - rule_id: ibm_db2.cis.4.auto_restart_after_abnormal_termination
    title: "Auto-restart After Abnormal Termination (AUTORESTART)"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: automated
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "4.1.3"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      The AUTORESTART parameter specifies if the database manager will start a crash
      recovery automatically when the first user tries to connect to a database
      which has previously terminated abnormally. If the parameter is set to OFF an
      explicit RESTART DATABASE command has to be issued to initiate a crash
      recovery. It is recommended that this parameter is set to ON (which is also
      the default).
    rationale: >
      Setting the database to auto-restart will reduce the downtime of the database.
    audit_procedure: >
      1. Connect to the Db2 database. db2 => connect to <dbname> 2. Run the
      following command: db2 => get database configuration 3. Locate the AUTORESTART
      value in the output: Auto restart enabled (AUTORESTART) = ON
    remediation: >
      1. Connect to the Db2 database db2 => connect to <dbname> 2. Run the following
      command: db2 => update database configuration using autorestart on Default
      Value: The default value for AUTORESTART is ON.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_IBM_DB2_11_v1_1_0_4_1_3"
