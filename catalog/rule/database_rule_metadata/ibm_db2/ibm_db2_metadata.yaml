  - rule_id: ibm_db2.cis.3.disable_client_discovery_requests_discover
    title: "Disable Client Discovery Requests (DISCOVER)"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: automated
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "3.1.6"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The DISCOVER parameter determines what kind of discovery requests, if any, the
      Db2 client can make. It is recommended that this is disabled.
    rationale: >
      Discovery capabilities may be used by a malicious entity to derive the names
      of and target Db2 instances. In this configuration, the client can not issue
      discovery requests.
    audit_procedure: >
      Perform the following Db2 commands to obtain the value for this setting: 1.
      Run the following command: db2 => get database manager configuration 2. Locate
      the DISCOVER value in the output: Discovery mode (DISCOVER) = KNOWN 3. If the
      value of DISCOVER is DISABLE then this is a Pass, otherwise the remediation
      should be followed.
    remediation: >
      1. Run the following command: db2 => update database manager configuration
      using discover disable References: 1.
      https://www.ibm.com/docs/en/db2/11.5?topic=parameters-discover-discovery- mode
    references: >
      1. https://www.ibm.com/docs/en/db2/11.5?topic=parameters-discover-discovery-
      mode
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_IBM_DB2_11_v1_1_0_3_1_6"
      nist_800_53: []
      soc2: []
      pci_dss: []
