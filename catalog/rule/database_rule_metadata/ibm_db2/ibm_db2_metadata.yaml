  - rule_id: ibm_db2.cis.8.configure_a_server_side_key_store_for_tls_ssl_svr
    title: "Configure a Server-side Key Store for TLS (SSL_SVR_KEYDB)"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: manual
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "8.1.1"
    cis_section: "8"
    profile_applicability: "Level 1"
    description: >
      To enable TLS support in a Db2 server, it is necessary to configure a key
      store that will contain certificates to be used for secure TLS communication
      between a Db2 client and Db2 server.
    rationale: >
      On the server side, Db2 requires a key store to be configured. Otherwise, TLS
      support cannot be enabled.
    audit_procedure: >
      Perform the following to determine if SSL_SVR_KEYDB is set. 1. Attach to the
      Db2 instance. db2 => attach to <db2instance> 2. Run the following command: db2
      => get database manager configuration 3. Locate the value of CATALOG_NOAUTH in
      the output: SSL server keydb file (SSL_SVR_KEYDB) = Ensure SSL_SVR_KEYDB is
      not blank.
    remediation: >
      Perform the following to set SSL_SVR_KEYDB: 1. Attach to the Db2 instance. db2
      => attach to <db2instance> 2. Run the following command, where <path> is the
      fully qualified path to the keystore file: db2 => update dbm cfg using
      SSL_SVR_KEYDB <path> 3. (Optional) To use the Microsoft certificate store on
      Windows, set SSL_SVR_KEYDB to GSK_MS_CERTIFICATE_STORE: db2 => update dbm cfg
      using SSL_SVR_KEYDB GSK_MS_CERTIFICATE_STORE If a keystore file is being used,
      ensure only the instance owner and administrators have access to the file. Do
      not grant world readable or world writable permissions on the keystore file.
    references: >
      
    impact: >
      
