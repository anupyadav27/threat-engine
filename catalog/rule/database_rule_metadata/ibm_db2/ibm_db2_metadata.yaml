  - rule_id: ibm_db2.cis.4.secure_permissions_for_the_secondary_archive_log
    title: "Secure Permissions for the Secondary Archive Log Location (LOGARCHMETH2)"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: automated
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "4.1.6"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      The LOGARCHMETH2 parameter specifies the type of media and the location used
      as the secondary destination for archived logs. It is recommended that the
      directory used for the archived logs be set to full access for Db2
      administrator accounts and read and execute only for all other accounts.
    rationale: >
      Restricting access to the contents of the secondary archive log directory will
      help ensure that the confidentiality, integrity, and availability of archive
      logs are protected. Although there are many ways to ensure that your logs will
      be archived, we recommend using the value of DISK as part of the LOGARCHMETH2
      parameter. This will properly ensure that the logs are archived. A finding of
      OFF is not acceptable.
    audit_procedure: >
      For Windows and Linux: 1. Connect to the Db2 database. db2 => connect to
      <dbname> 2. Run the following command: db2 => get database configuration 3.
      Locate this value in the output to find the secondary archive log directory:
      Default database path (LOGARCHMETH2) = <valid directory> Additional steps for
      Windows: 1. Connect to the Db2 host 2. Right-click on the secondary archive
      log directory 3. Choose Properties 4. Select the Security tab 5. Review and
      verify the privileges for all accounts Additional steps for Linux: 1. Connect
      to the Db2 host 2. Change to the secondary archive log directory 3. Review and
      verify the permissions for the directory for all users $ ls -al
    remediation: >
      For Windows and Linux: 1. Attach to the Db2 instance. 2. Run the following
      command to change the secondary archive log directory, if necessary: db2 =>
      update database configuration using logarchmeth2 <valid directory> Additional
      steps for Windows (assuming that the logarchmeth2 parameter includes DISK): 1.
      Connect to the Db2 host 2. Right-click on the secondary archive log directory
      3. Choose Properties 4. Select the Security tab 5. Grant all Db2 administrator
      accounts the Full Control authority 6. Grant all other accounts read and
      execute privileges only (revoke all other privileges) Additional steps for
      Linux (assuming that the logarchmeth2 parameter includes DISK): 1. Connect to
