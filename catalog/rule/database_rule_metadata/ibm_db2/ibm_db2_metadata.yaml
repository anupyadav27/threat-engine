  - rule_id: ibm_db2.cis.8.secure_the_stash_file
    title: "Secure the Stash File"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: manual
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "8.2.4"
    cis_section: "8"
    profile_applicability: "Level 1 + Level 2"
    description: >
      A stash file is an obfuscated file that contains the credentials that are
      needed to access the keystore. If a keystore password was not provided during
      db2start, the password will be retrieved from the stash file. A stash file is
      created when -stash command is used during the creation of the keystore.
    rationale: >
      Set this file to be readable by only the Db2 instance owner. If this file is
      not secured, an attacker may delete it, causing potential interruption of
      operations.
    audit_procedure: >
      A stash file is used when a file with the same name as the PKCS12 keystore
      file exists but with a .sth extension. For example, if the keystore is called
      keystore.p12, the stash file, if it exists, will be in the same directory with
      the name keystore.sth. You can determine the location of the stash file by
      examining the KEYSTORE_LOCATION database manager configuration parameter. 1.
      Attach to the Db2 instance. db2 => attach to <db2instance> 2. Run the
      following command: db2 => get database manager configuration 3. Locate the
      KEYSTORE_LOCATION value in the output: Keystore location (KEYSTORE_LOCATION) =
      /path/keystore.p12 You can verify the permissions of the stash file via
      regular OS operations, such as ls -la on a Unix-type system. 4. Check the OS
      permissions for the stash file. $ ls -la -rw------- 1 db2inst1 db2inst1 129
      May 19 11:44 keystore.sth
    remediation: >
      Change the permissions for the file: $ chmod 600 keystore.sth References: 1.
      https://www.ibm.com/support/pages/internal-format-gskit-stash-files-has-
      changed
    references: >
      1. https://www.ibm.com/support/pages/internal-format-gskit-stash-files-has-
      changed
