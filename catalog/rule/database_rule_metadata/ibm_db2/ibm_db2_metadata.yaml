  - rule_id: ibm_db2.cis.5.secure_permissions_for_all_authentication_plugins
    title: "Secure Permissions for All Authentication Plugins"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: manual
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "5.7"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The following database manager configuration parameters allow the use of
      custom plugins for authentication and group lookup purposes. • CLNT_PW_PLUGIN
      • CLNT_KRB_PLUGIN • GROUP_PLUGIN • LOCAL_GSSPLUGIN • SRVCON_GSSPLUGIN_LIST •
      SRVCON_PW_PLUGIN The permissions on the plugins specified by any of the above
      parameters should be secured so that users other than the instance owner don't
      have write privileges.
    rationale: >
      If a malicious user has write access to a plugin, they can overwrite it with
      their own thereby manipulating the authentication and authorization behavior
      for connecting users.
    audit_procedure: >
      Steps for Linux: • 32-bit and 64-bit client side user authentication plugins
      are found in $DB2PATH/security32/plugin/client and
      $DB2PATH/security64/plugin/client directories respectively • 32-bit and 64-bit
      server side user authentication plugins are found in
      $DB2PATH/security32/plugin/server and $DB2PATH/security64/plugin/server
      directories respectively Review the permissions of the plugins that are in
      use: ls -al Steps for Windows: • 32-bit and 64-bit client side user
      authentication plugins are found in $DB2PATH\security\plugin\instance
      name\client • 32-bit and 64-bit server side user authentication plugins are
      found in $DB2PATH\security\plugin\instance name\server Review the permissions
      of the plugins that are in use: 1. Right-click over the plugin file 2. Choose
      properties 3. Select the Security tab 4. Review the access for all accounts
    remediation: >
      To change permissions of a file on Linux: chmod 755 <file> To change
      permissions of a file on Windows: 1. Right-click on the file 2. Choose
      properties 3. Select the Security tab 4. Grant the Full Control authority to
      all Db2 administrator accounts 5. Grant only read and execute privileges to
      all other accounts (revoke any other privileges)
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_IBM_DB2_11_v1_1_0_5_7"
