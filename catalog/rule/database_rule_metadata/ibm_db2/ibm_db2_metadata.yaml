      C:\DB2MIRRORLOGS Additional steps for Windows: 1. Connect to the Db2 host 2.
      Right-click on the mirror log directory 3. Choose Properties 4. Select the
      Security tab 5. Review and verify the privileges for all accounts Additional
      steps for Linux: 1. Connect to the Db2 host 2. Change to the mirror log
      directory 3. Review and verify the permissions for the directory for all
      users. $ ls -al
    remediation: >
      For Windows and Linux: 1. Connect to the Db2 database db2 => connect to
      <dbname> 2. Run the following command to change the mirror log directory, if
      necessary: db2 => update database configuration using mirrorlogpath <valid
      directory> Additional steps for Windows: 1. Connect to the Db2 host 2. Right-
      click on the mirror log directory 3. Choose Properties 4. Select the Security
      tab 5. Grant all Db2 administrator accounts the Full Control authority 6.
