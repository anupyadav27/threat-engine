  - rule_id: ibm_db2.cis.8.keep_master_key_labels_unique
    title: "Keep Master Key Labels Unique"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: manual
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "8.2.11"
    cis_section: "8"
    profile_applicability: "Level 1 + Level 2"
    description: >
      Db2 uses the MK label to uniquely identify each MK, and stores the label value
      in each encrypted object, be it a database, transaction log, or backup file.
      This stored MK label value identifies the MK key material that is used to
      decrypt the data in the object. Creating MK labels is part of an organizations
      standard operating procedures (SOP).
    rationale: >
      It is critical to use unique MK labels across the organization to avoid
      duplication. If unique labels are not used, access to encrypted data can be
      lost through human error. Access to encrypted data is lost when the key that
      is retrieved from the keystore for a label is different from the key that was
      used to encrypt the database using the same label. It may not be possible to
      migrate databases using a local keystore file to a centralized keystore file
      if multiple databases are using the same master key label, but different
      master keys associated with that label.
    audit_procedure: >
      Check the organization's SOP for creating master key labels to ensure it
      includes specific guidance on creating unique master key labels.
    remediation: >
      Update the SOP to provide guidance found missing during the audit.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_IBM_DB2_11_v1_1_0_8_2_11"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_ibm_db2_11_v1_1_0_8_2_11"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: ibm_db2.cis.8.retain_all_master_keys
    title: "Retain All Master Keys"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: manual
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "8.2.12"
    cis_section: "8"
    profile_applicability: "Level 1 + Level 2"
    description: >
      Master keys are needed to access the DEKs that are stored in encrypted
      databases, transaction logs, and backup images. Since multiple MKs can exist
      over the life time of these objects, it is necessary to retain them all while
      the encrypted data is retained. If a MK is lost, the encrypted data in the
      object cannot be retrieved. An organizations standard operating procedures
      (SOP) should have a methodology for tracking what data is encrypted with a
      specific master key, and be consulted before any master keys are archived.
    rationale: >
      Any failure or human error in tracking what data encrypted with a specific
      master key could result in loss of access to that data should the master key
      be deleted. Master keys should not be deleted. Instead they should be archived
      to a secure location for long term storage in case they are required at some
      point in the future.
    audit_procedure: >
      Check the organization's SOP for specific instructions on tracking what data
      is encrypted with a particular master key, and that there are details on how
      to archive a master key for long term storage. Ensure the SOP clearly states
      master keys should never be deleted.
    remediation: >
      Update the SOP to provide guidance found missing during the audit.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_IBM_DB2_11_v1_1_0_8_2_12"
      nist_800_53: []
      soc2: []
      pci_dss: []
