  - rule_id: ibm_db2.cis.8.backup_your_keystore
    title: "Backup Your Keystore"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: manual
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "8.2.7"
    cis_section: "8"
    profile_applicability: "Level 1 + Level 2"
    description: >
      The keystore stores encryption keys used to encrypt your database. Losing the
      key will make the data inaccessible. If the keystore with encryption keys is
      lost, there is no way to decrypt the data.
    rationale: >
      The contents of your keystore are critical and it is important that you back
      up the keystore at regular intervals. Backups should be done whenever the
      contents of the keystore changes, such as when a key or certificate is added,
      a master key (MK) is rotated, or the password is changed. For local keystore
      files, the configuration file is not included as part of a Db2 database backup
      and must be backed up manually. For a centralized keystore, consult the
      documentation for your keystore product to understand their recommendations
      for keystore backups.
    audit_procedure: >
      Check that you are backing up your keystore regularly. Keep in mind that even
      if the encryption key has been rotated, logs may still need access to the old
      key. Do not delete keys.
    remediation: >
      Regularly backup your keystore and stash files, using mechanisms outside of
      Db2.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
