    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Grants the authority to access data. The DATAACCESS authority allows the
      grantee to leverage DML level commands i.e. SELECT, INSERT, UPDATE, DELETE,
      LOAD, and EXECUTE any package or routine. The DATAACCESS authority cannot be
      granted to PUBLIC.
    rationale: >
      The DATAACCESS authority gives the grantee read access and also control over
      manipulating the data. DATAACCESS can be granted to users, groups, or roles,
      but not PUBLIC. DATAACCESS authority is a subset of the DBADM authority and
      can be granted by the SECADM authority.
    audit_procedure: >
      1. Run the following command: db2 => select distinct grantee, granteetype from
      syscat.dbauth where dataaccessauth = 'Y' 2. Review the list of users, groups,
      and roles in the above output to ensure only approved users, groups, and roles
      are assigned.
    remediation: >
      Revoke DATAACCESS authority from any unauthorized users. db2 => REVOKE
      DATAACCESS ON DATABASE FROM USER <username> References: 1.
      https://www.ibm.com/docs/en/db2/11.5?topic=ownership-database-authorities
