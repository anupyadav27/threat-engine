  - rule_id: ibm_db2.cis.5.specify_a_secure_connection_authentication_type
    title: "Specify a Secure Connection Authentication Type (SRVCON_AUTH)"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: manual
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "5.1"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      This parameter can take on any of the following values: • NOT_SPECIFIED •
      CLIENT • SERVER • SERVER_ENCRYPT • KERBEROS • KRB_SERVER_ENCRYPT • GSSPLUGIN •
      GSS_SERVER_ENCRYPT • SERVER_ENCRYPT_TOKEN • KERBEROS_TOKEN • GSSPLUGIN_TOKEN •
      KRB_SVR_ENC_TOKEN • GSS_SVR_ENC_TOKEN If this parameter is set to
      NOT_SPECIFIED, then the type of authentication for connections is determined
      by the AUTHENTICATION parameter. Recommendations: 1. Do not use CLIENT
      authentication type. 2. SERVER_ENCRYPT instead of SERVER is recommended as a
      compensating configuration if TLS cannot be used to encrypted client server
      communications.
    rationale: >
      When using CLIENT authentication type, the server trusts the client to
      authenticate the connecting user. A malicious user can connect to the database
      as any user including a database administrator by simply creating that user on
      the client system. When using SERVER authentication type without SSL enabled,
      the user ID and password that are sent from the client to the server during a
      connect or an attach are in plaintext format. Therefore, these credentials are
      exposed when sent across an unsecure network and can be intercepted by a
      malicious user. Impact: It is important to be aware that the implementation of
      this recommendation results in a brief downtime. It is advisable to ensure
      that the setting is implemented during an approved maintenance window.
    audit_procedure: >
      Perform the following Db2 commands to obtain the value for this setting: 1.
      Attach to the Db2 instance. db2 => attach to <db2instance> 2. Run the
      following command: db2 => get database manager configuration 3. Locate the
      SRVCON_AUTH value in the output: Server Connection Authentication
      (SRVCON_AUTH) = SERVER Any value other than CLIENT is acceptable.
    remediation: >
      1. Attach to the Db2 instance db2 => attach to <db2instance> 2. Run the
      following command: db2 => update database manager configuration parameter
      using srvcon_auth <authentication type> 3. Restart the Db2 instance. db2 =>
      db2stop db2 => db2start Refer to the 'encryption of data in motion' section
      for more information about using SSL for client-server communication.
    references: >
      
    impact: >
      It is important to be aware that the implementation of this recommendation
      results in a brief downtime. It is advisable to ensure that the setting is
      implemented during an approved maintenance window.
