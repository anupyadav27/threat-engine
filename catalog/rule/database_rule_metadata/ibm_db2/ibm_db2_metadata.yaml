    cis_control: "5.9"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      This registry variable is only active is the authentication parameter is set
      to CLIENT which is not a recommended setting as discussed in section 6.2. It
      is possible to have a user id be represented across multiple domains. Issues
      could arise when trying to authenticate such a user id. To prevent these
      issues, a listing of domains should be defined within the DB2DOMAINLIST
      registry variable. Periodic review of the domain list assigned to the
      DB2DOMAINLIST registry variable helps ensure that non-essential domains do not
      have unnecessary authorizations.
    rationale: >
      Incorrectly configured DB2DOMAINLIST registry variable could result in
      unexpected authorization behavior where a low privileged user could
      potentially get access to sensitive data.
    audit_procedure: >
