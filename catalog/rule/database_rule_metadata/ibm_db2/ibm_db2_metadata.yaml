  - rule_id: ibm_db2.cis.5.database_manager_configuration_parameter
    title: "Database Manager Configuration Parameter: ALTERNATE_AUTH_ENC"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: manual
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "5.3"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The ALTERNATE_AUTH_ENC database manager configuration parameter specifies the
      encryption algorithm that is used to encrypt user ID and password that are
      sent from the client during a connect or attach. This parameter is in effect
      when the authentication method that is negotiated between the client and the
      server is SERVER_ENCRYPT. It is recommended to set this parameter to AES_ONLY.
    rationale: >
      If this parameter is set to a value other than AES_ONLY, the server can accept
      the DES encryption algorithm to encrypt the user credentials and DES is
      cryptographically weak in comparison to AES. Impact: It is important to be
      aware that the implementation of this recommendation results in a brief
      downtime. It is therefore advisable to ensure that the setting is implemented
      during an approved maintenance window.
    audit_procedure: >
      Perform the following Db2 commands to obtain the value for this setting: 1.
      Attach to the Db2 instance. db2 => attach to <db2instance> 2. Run the
      following command: db2 => get database manager configuration 3. Locate the
      ALTERNATE_AUTH_ENC value in the output: Alternate authentication
      (ALTERNATE_AUTH_ENC) = AES_ONLY
    remediation: >
      1. Attach to the Db2 instance db2 => attach to <db2instance> 2. Run the
      following command: db2 => update database manager configuration parameter
      using alternate_auth_enc aes_only 3. Restart the Db2 instance. db2 => db2stop
      db2 => db2start
    references: >
      
    impact: >
      It is important to be aware that the implementation of this recommendation
      results in a brief downtime. It is therefore advisable to ensure that the
      setting is implemented during an approved maintenance window.
    compliance_mappings:
      cis:
