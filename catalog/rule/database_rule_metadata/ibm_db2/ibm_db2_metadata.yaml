  - rule_id: ibm_db2.cis.3.disable_grants_during_restore_db2_restore_grant
    title: "Disable Grants During Restore (DB2_RESTORE_GRANT_ADMIN_AUTHORITIES)"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: automated
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "3.2.3"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The DB2_RESTORE_GRANT_ADMIN_AUTHORITIES registry variable determines whether
      the authorization ID of the user performing a restore is granted
      administrative authorities (SECADM, DBADM, DATAACCESS, and ACCESSCTRL
      authorities) on the restored database. It is typically used when restoring a
      database on a server where the original database creator account does not
      exist. It is recommended that this variable not be set except when
      specifically performing a restore where you wish these privileges to be
      granted so they are not accidentally granted.
    rationale: >
      Use of this registry variable may grant administrative authorities
