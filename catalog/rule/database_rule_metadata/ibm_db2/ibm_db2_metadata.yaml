  - rule_id: ibm_db2.cis.3.set_maximum_connection_limits_max_connections_and
    title: "Set Maximum Connection Limits (MAX_CONNECTIONS and MAX_COORDAGENTS)"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: automated
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "3.1.8"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The MAX_CONNECTIONS parameter indicates the maximum number of client
      connections allowed per member. It is recommended that this parameter be set
      without the AUTOMATIC setting. The AUTOMATIC setting means for the value to
      grow unconstrained, and a value of -1 means to use the same value as
      MAX_COORDAGENTS. The MAX_COORDAGENTS parameter equals the maximum number of
      agents needed to perform connections to the database or attachments to the
      instance. The AUTOMATIC setting means for the value to grow unconstrained. The
      MAX_COORDAGENTS parameter should be set to a fixed value without the AUTOMATIC
      setting. The exact value is highly dependent on business requirements for
      simultaneous connections. For example, if only a single application with a
      connection pool of 10 connections will connect to the database server, a much
      smaller value may be appropriate than a database server that expects to have
      hundreds of simultaneous connections. These examples will use a value of 200.
      Ensure that dependent parameters, such as MAXAPPLS, are set less than or equal
      to the MAX_CONNECTIONS parameter. As instance parameters, MAX_CONNECTIONS and
      MAX_COORDAGENTS govern all databases within the instance, and thus the
      summation of MAXAPPLS value for all databases must be considered.
    rationale: >
      By default, Db2 allows an unlimited number of users to access the Db2
      instance. In addition to giving access to the Db2 instance to authorized users
      only, it is recommended to set a limit to the number of users allowed to
      access a Db2 instance. This helps prevent denial of service conditions should
      an authorized process malfunction and attempt many simultaneous connections.
    audit_procedure: >
      erform the following Db2 commands to obtain the value(s) for these settings:
      1. Attach to the Db2 instance. db2 => attach to <db2instance> 2. Run the
      following command: db2 => get database manager configuration 3. Locate the
      MAX_COORDAGENTS values in the output: Max number of coordinating agents
      (MAX_COORDAGENTS) = AUTOMATIC(200) The value of MAX_COORDAGENTS should be set
      without AUTOMATIC. 4. Locate the MAX_CONNECTIONS values in the output: Max
      number of client connections (MAX_CONNECTIONS) = AUTOMATIC(MAX_COORDAGENTS)
      The value of MAX_COORDAGENTS for the MAX_CONNECTIONS parameter signifies a
      value of -1 and indicates it uses the value of MAX_COORDAGENTS. If the value
      of MAX_CONNECTIONS shows AUTOMATIC, this is a Fail, and the remediation steps
      should be followed.
    remediation: >
      The default value for MAX_COORDAGENTS is AUTOMATIC(200). Allowable range is 1
      to 64,000. The recommended value is 200, without the AUTOMATIC setting. The
      value of 200 is used as an example and is dependent on workload as discussed
      in the Description. The default value for MAX_CONNECTIONS is set to
      AUTOMATIC(-1). Allowable range is 1 to 64,000, or -1 for matching the value of
      MAX_COORDAGENTS. The recommended value is -1 without AUTOMATIC. It is also
      acceptable to have a value for MAX_CONNECTIONS that is greater than
      MAX_COORDAGENTS, such as 300, in order to turn on the Concentrator feature.
      Generally, both MAX_COORDAGENTS and MAX_CONNECTIONS should be configured
      within the same statement, otherwise the error SQL6112N may be encountered.
      The following command will set the MAX_COORDAGENTS to 200, as well as set the
      MAX_CONNECTIONS to -1. 1. Attach to the Db2 instance db2 => attach to
      <db2instance> 2. Run the following command: db2 => update database manager
      configuration using max_coordagents 200 max_connections -1 References: 1.
      https://www.ibm.com/docs/en/db2/11.5?topic=parameters-max-connections-
      maximum-number-client-connections 2.
      https://www.ibm.com/docs/en/db2/11.5?topic=parameters-max-coordagents-
      maximum-number-coordinating-agents
    references: >
      1. https://www.ibm.com/docs/en/db2/11.5?topic=parameters-max-connections-
      maximum-number-client-connections 2.
      https://www.ibm.com/docs/en/db2/11.5?topic=parameters-max-coordagents-
      maximum-number-coordinating-agents
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_IBM_DB2_11_v1_1_0_3_1_8"
      nist_800_53: []
