  - rule_id: ibm_db2.cis.8.set_cfg_values_in_a_single_command
    title: "Set CFG Values in a Single Command"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: manual
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "8.2.13"
    cis_section: "8"
    profile_applicability: "Level 1 + Level 2"
    description: >
      Db2 uses KEYSTORE_TYPE and KEYSTORE_LOCATION to access the keystore.
    rationale: >
      Although the Db2 database manager configuration parameters KEYSTORE_TYPE and
      KEYSTORE_LOCATION are configurable online, you should set them in the a single
      DB2 UPDATE DBM CFG command. Otherwise, Db2 might attempt to access the
      keystore between the updates and report an access error.
    audit_procedure: >
      You can check what values you have set for these parameters as follows: $ db2
      get dbm cfg | grep KEYSTORE Keystore type (KEYSTORE_TYPE) = PKCS12 Keystore
      location (KEYSTORE_LOCATION) = /path/to/file.p12
    remediation: >
      You can execute the following command to change the values in one line: db2 =>
      update dbm cfg using keystore_type pkcs12 keystore_location /path/to/file.p12;
      DB20000I The UPDATE DATABASE MANAGER CONFIGURATION command completed
      successfully.
