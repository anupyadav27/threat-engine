  - rule_id: ibm_db2.cis.3.secure_the_java_development_kit_installation_path
    title: "Secure the Java Development Kit Installation Path (JDK_PATH)"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: automated
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "3.1.10"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The JDK_PATH parameter contains the directory under which the Software
      Developer's Kit (SDK) for Java™ is installed. The Java SDK is used for running
      Java stored procedures and user-defined functions. It is recommended that the
      owner of this directory is bin on Linux and AIX, and a member of the Db2
      administration group on Windows. The directory should have read and execute
      permission for all users, but only write permission for the owner.
    rationale: >
      Restricting access to the Java JDK will help ensure that only an authorized
      JDK is used for running Java routines within Db2.
    audit_procedure: >
      For Windows and Linux: 1. Attach to the Db2 instance. db2 => attach to
      <db2instance> 2. Run the following command from the Db2 command window: db2 =>
      get database manager configuration 3. Locate this value in the output to find
      the JDK path: Default database path (JDK_PATH) = <valid directory> Additional
      steps for Windows: 1. Connect to the Db2 host 2. Right-click over the
      directory used for the JDK path 3. Choose Properties 4. Select the Security
      tab 5. Review and verify the privileges for all accounts. 6. Review and verify
      that the Db2 Administrator is the owner of the directory. Additional steps for
      Linux: 1. Connect to the Db2 host 2. Change to the directory used as the JDK
      path 3. Review and verify the permissions for the directory for all users;
      also ensure that bin is the owner. $ ls -ald
    remediation: >
      For Windows and Linux: 1. Attach to the Db2 instance. db2 => attach to
      <db2instance> 2. Run the following command to change the JDK path, if
      necessary: db2 => update database manager configuration using jdk_path <valid
      directory> Additional steps for Windows: 1. Connect to the Db2 host 2. Right-
      click over the directory used as the JDK path 3. Choose Properties 4. Select
      the Security tab 5. Assign ownership of the directory to the Db2 Administrator
      6. Grant all Db2 administrator accounts the Full Control authority 7. Grant
      only read and execute privileges to all other users (revoke all other
      privileges) Additional steps for Linux: 1. Connect to the Db2 host as root 2.
      Change to the directory used as the JDK path 3. Assign bin to be the owner of
      the directory using the chown command 4. Change the permissions for the
      directory $ chmod -R 755 References: 1.
      https://www.ibm.com/docs/en/db2/11.5?topic=parameters-jdk-path-software-
      developer
    references: >
      1. https://www.ibm.com/docs/en/db2/11.5?topic=parameters-jdk-path-software-
      developer
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_IBM_DB2_11_v1_1_0_3_1_10"
      nist_800_53: []
