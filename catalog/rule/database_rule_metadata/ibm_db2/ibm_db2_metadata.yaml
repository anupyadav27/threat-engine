  - rule_id: ibm_db2.cis.8.enable_remote_tls_connections_to_db2_db2comm
    title: "Enable Remote TLS Connections to Db2 (DB2COMM)"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: manual
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "8.1.11"
    cis_section: "8"
    profile_applicability: "Level 1"
    description: >
      The DB2COMM registry variable controls what types of remote connections Db2
      will accept. It can be configured to enable plaintext communication, encrypted
      communication, or both.
    rationale: >
      For security, DB2COMM should be set to enable only TLS encrypted
      communications.
    audit_procedure: >
      Perform the following to determine if DB2COMM is set. 1. As the instance
      owner, run the following command. db2set -all DB2COMM 2. The value of DB2COMM
      will be returned in the output. If the DB2COMM registry variable is not set,
      the db2set command will not return any data. [i] TCPIP
    remediation: >
      Perform the following to set DB2COMM and enable TLS: 1. Run the following
      command as the instance owner. db2set DB2COMM=SSL Db2 must be recycled
      (db2stop/db2start) for changes to the DB2COMM registry variable to take
      effect.
