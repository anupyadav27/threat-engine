  - rule_id: ibm_db2.cis.8.turn_off_allow_key_insert_without_keystore_backup
    title: "Turn Off ALLOW_KEY_INSERT_WITHOUT_KEYSTORE_BACKUP"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: manual
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "8.2.10"
    cis_section: "8"
    profile_applicability: "Level 1 + Level 2"
    description: >
      The ALLOW_KEY_INSERT_WITHOUT_KEYSTORE_BACKUP setting in ekeystore.cfg file for
      external key managers (KMIP or PKCS11) allows writing to the keystore. The
      setting is false by default. Check that the setting has not been turned on.
    rationale: >
      Keeping the setting as false does not allow Db2 to create master keys. If you
      choose to turn the setting on, you acknowledge that Db2 does not backup
      changes to the keystore. Always backup your keystore before making changes.
    audit_procedure: >
      Check that ekeystore.cfg file that's being used has the setting turned OFF.
      ALLOW_KEY_INSERT_WITHOUT_KEYSTORE_BACKUP=false
    remediation: >
      $ cat ekeystore.cfg VERSION=1 PRODUCT_NAME=Luna
      ALLOW_KEY_INSERT_WITHOUT_KEYSTORE_BACKUP=false
