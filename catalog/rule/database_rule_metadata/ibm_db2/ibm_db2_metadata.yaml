  - rule_id: ibm_db2.cis.6.secure_sysadm_authority
    title: "Secure SYSADM Authority"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: manual
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "6.1.1"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      The sysadm_group parameter defines the system administrator group (SYSADM)
      authority. It is recommended that the sysadm_group group contains authorized
      users only.
    rationale: >
      If an account that possesses this authority is compromised or used in a
      malicious manner, the confidentiality, integrity, and availability of data in
      the Db2 instance will be at increased risk.
    audit_procedure: >
      Perform the following Db2 commands to obtain the value for this setting: 1.
      Attach to the Db2 instance. db2 => attach to <db2instance> 2. Run the
      following command: db2 => get database manager configuration 3. Locate the
      sysadm_group value in the output and ensure the value is not NULL:
      (SYSADM_GROUP) = DB2ADM 4. Review the members of the sysadm_group on the
      operating system. Linux: cat /etc/group | grep <sysadm group name> Windows: 1.
      Run compmgmt.msc 2. Click 'Local Users and Groups' 3. Double click 'Groups' 4.
      Double click 5. Review group members
    remediation: >
      Define a valid group name for the SYSADM group. 1. Attach to the Db2 instance.
      db2 => attach to <db2instance> 2. Run the following command: db2 => update
      database manager configuration using sysadm_group <sys adm group name> Default
      Value: The default value for sysadm_group is NULL. References: 1.
      https://www.ibm.com/docs/en/db2/11.5?topic=authorities-system-administration-
      authority-sysadm
    references: >
      1. https://www.ibm.com/docs/en/db2/11.5?topic=authorities-system-
