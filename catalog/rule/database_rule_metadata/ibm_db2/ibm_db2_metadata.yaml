    cis_version: "11_v1.1.0"
    cis_control: "5.8"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The DB2_GRP_LOOKUP registry variable specifies which Windows security
      mechanism is used to enumerate the groups that a user belongs to. Periodic
      review of this variable is required to ensure that the correct location is
      being used for group definitions during authentication.
    rationale: >
      Incorrectly configured DB2_GRP_LOOKUP registry variable could result in
      unexpected authorization behavior where a low privileged user could
      potentially get access to sensitive data.
    audit_procedure: >
      Verify that the DB2_GRP_LOOKUP registry variable is set to the correct
      location by running the following command: db2set -all
    remediation: >
      Run the following command to set the DB2_GRP_LOOKUP registry variable to the
      appropriate location for group lookup: db2set DB2_GRP_LOOKUP= <location for
      group lookup>
