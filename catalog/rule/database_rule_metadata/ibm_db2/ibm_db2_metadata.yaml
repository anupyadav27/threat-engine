rules:

  - rule_id: ibm_db2.cis.1.install_available_updates
    title: "Install Available Updates"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: manual
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "1.1.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Periodically, IBM releases updates for its Db2 11 products in the form of
      modification packs, fix packs, and interim fix packs. All updates are
      cumulative and contain the contents of the previous updates provided. It is
      recommended that you review the available updates for Db2 11 on a regular and
      frequent basis and, optionally, subscribe for notification of critical Db2
      fixes. Db2 11.1 specifics Modification packs contain new features as well as
      defect fixes and are indicated by a change in the modification and fix pack
      numbers in the product identifier (e.g. Db2 11.1.4.5 is modification pack 4
      for Db2 11.1). Fix packs contain only defect fixes and are indicated by a
      change in just the fix pack number in the product identifier (e.g. Db2
      11.1.4.5 is fix pack 5 for Db2 11.1). Interim fix packs contain only critical
      defect fixes (e.g. HIPER and security vulnerabilities) made available since
      the last modification or fix pack released and are identified by an “iFixNN”
      suffix, where NN is the number of the interim fix. Db2 11.5 specifics
      Modification packs contain new features as well as defect fixes and are
      indicated by a change in the modification number in the product identifier
      (e.g. Db2 11.5.4.0 is modification pack 4 for Db2 11.5). Fix packs contain
      only defect fixes and are indicated by a change in just the fix pack number in
      the product identifier (e.g. Db2 11.5.4.1 is fix pack 1 for modification 4 of
      Db2 11.5). Db2 11.5 does not provide Interim fix packs.
    rationale: >
      Being aware of the available updates and critical fixes helps you evaluate
      which Db2 update is the minimum level that you should use for your next system
      update. It will also help you understand the relative urgency of acquiring the
      latest Db2 fix pack to help protect the database from known vulnerabilities
      and reduce downtime that may otherwise result from functional defects.
    audit_procedure: >
      Perform the following Db2 commands to obtain the version: $ db2level DB21085I
      This instance or install (instance name, where applicable: 'db2inst1') uses
      '64' bits and DB2 code release 'SQL11055' with level identifier '0606010F'.
      Informational tokens are 'DB2 v11.5.5.0', 's2011011400', 'DYN2011011400AMD64',
      and Fix Pack '0'.
    remediation: >
      Apply the latest fix pack as offered from IBM. References: 1.
      https://www-01.ibm.com/support/docview.wss?uid=ibm10718119 2.
      https://www.ibm.com/support/mynotifications 3.
      https://www.ibm.com/support/pages/published-security-vulnerabilities-
      db2-linux- unix-and-windows-including-special-build-information 4.
      https://www-01.ibm.com/support/docview.wss?rs=71&uid=swg27007053 5.
      https://www.ibm.com/developerworks/community/blogs/IMSupport/entry/All_abou
      t_ifixes_interim_fixes?lang=en 6. https://www.ibm.com/support/pages/security-
      vulnerabilities-hiper-and-special- attention-apars-fixed-db2-linux-unix-and-
      windows-version-111 7. https://www.ibm.com/support/pages/security-
      vulnerabilities-hiper-and-special- attention-apars-fixed-db2-linux-unix-and-
      windows-version-115
    references: >
      1. https://www-01.ibm.com/support/docview.wss?uid=ibm10718119 2.
      https://www.ibm.com/support/mynotifications 3.
      https://www.ibm.com/support/pages/published-security-vulnerabilities-
