  - rule_id: ibm_db2.cis.6.review_roles_granted_to_public
    title: "Review Roles Granted to PUBLIC"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: manual
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "6.2.5"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Granting to PUBLIC increases the risk of unauthorized entry into the database.
      Because PUBLIC is accessible by any database user, it is important to
      understand the exposure it has on all database objects. It would make sense to
      grant role membership to PUBLIC if all users required all the privileges
      granted through that role.
    rationale: >
      As any role granted to PUBLIC can potentially allow the compromise of database
      availability, confidentiality, or integrity, these roles should be restricted
      according to the needs of the business.
    audit_procedure: >
      1. Connect to Db2 database: db2 => connect to <dbname> 2. Run the following:
      db2 => select grantee, rolename from syscat.roleauth where grantee = 'PUBLIC'
      If the value returned is blank, that is considered a Pass.
    remediation: >
      To remove a role member from a particular role: 1. Connect to Db2 database:
      db2 => connect to <dbname> 2. Run the following: db2 => revoke role <role
      name> from PUBLIC References: 1.
      https://www.ibm.com/docs/en/db2/11.5?topic=security-roles
    references: >
      1. https://www.ibm.com/docs/en/db2/11.5?topic=security-roles
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_IBM_DB2_11_v1_1_0_6_2_5"
      nist_800_53: []
      soc2: []
