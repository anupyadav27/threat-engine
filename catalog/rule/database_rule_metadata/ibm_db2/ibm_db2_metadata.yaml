  - rule_id: ibm_db2.cis.4.disable_database_discoverability_discover_db
    title: "Disable Database Discoverability (DISCOVER_DB)"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: automated
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "4.1.15"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      The DISCOVER_DB parameter specifies whether the database can be discovered in
      the network. It is recommended that databases not be discoverable.
    rationale: >
      Discovery capabilities may be used by a malicious entity to derive the names
      of and target Db2 databases.
    audit_procedure: >
      Perform the following Db2 commands to obtain the value for this setting: 1.
      Connect to the Db2 database: db2 => connect to <dbname> 2. Run the following
      command: db2 => get database configuration 3. Locate the DISCOVER_DB value in
      the output: Discovery support for this database (DISCOVER_DB) = ENABLE 4. If
      the value of DISCOVER_DB is DISABLE then this is a Pass. Otherwise database
      discovery is possible, and the remediation steps should be followed.
    remediation: >
      1. Connect to the Db2 database. db2 => connect to <dbname> 2. Run the
      following command: db2 => update database configuration using discover_db
      disable References: 1. https://www.ibm.com/docs/en/db2/11.5?topic=parameters-
      discover-db-discover- database
    references: >
      1. https://www.ibm.com/docs/en/db2/11.5?topic=parameters-discover-db-discover-
      database
