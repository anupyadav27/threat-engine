      SLOT_LABEL=DB2Partition NEW_OBJECT_TYPE=PRIVATE
      KEYSTORE_STASH=/home/db2inst1/sqllib/security/pkcs11.sth For maximum security,
      turn the setting off and create the keys outside of Db2. This way you will
      also be able to manage the labeling scheme across the Db2 instances and
      prevent name collision between different databases.
