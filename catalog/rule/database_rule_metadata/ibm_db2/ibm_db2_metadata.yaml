  - rule_id: ibm_db2.cis.8.configure_an_endpoint_certificate_ssl_svr_label
    title: "Configure an Endpoint Certificate (SSL_SVR_LABEL)"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: manual
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "8.1.3"
    cis_section: "8"
    profile_applicability: "Level 1"
    description: >
      The SSL_SVR_LABEL database manager configuration parameter controls which
      certificate Db2 will serve to clients. This certificate must have its
      associated certificate chain present in the server-side key store and must be
      associated with a private key.
    rationale: >
      It is highly recommended to set SSL_SVR_LABEL. Leaving this parameter blank
      and allowing Db2 to utilize a default certificate will only work with
      CMS(.KDB) format key stores, and the feature is deprecated.
    audit_procedure: >
      Perform the following to determine if SSL_SVR_LABEL is set. 1. Attach to the
      Db2 instance. db2 => attach to <db2instance> 2. Run the following command: db2
      => get database manager configuration 3. Locate the value of SSL_SVR_LABEL in
      the output: SSL server certificate label (SSL_SVR_LABEL) =
    remediation: >
      Perform the following to set SSL_SVR_LABEL: 1. Attach to the Db2 instance. db2
      => attach to <db2instance> 2. Run the following command, where <label> is the
      name of a certificate present in the server-side key store. db2 => update dbm
      cfg using SSL_SVR_LABEL <label> In Db2 11.5.4 and later, or Db2 11.1.4.5 and
      later with the DB2_DYNAMIC_SSL_LABEL registry variable set to ON, updating the
      value of SSL_SVR_LABEL while attached to the instance will cause the
      certificate served by Db2 to change while instance is running, with no effect
      on existing connections. Prior releases of Db2 require an instance recycle
      (db2stop/db2start) for the change to take effect.
