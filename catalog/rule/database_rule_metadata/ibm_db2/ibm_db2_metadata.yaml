      server assumes that the client side is handling authentication to the
      database. If the parameter is set to NO, the client must provide
      authentication to the server on behalf of the user. The recommended value for
      this parameter is NO.
    rationale: >
      If the server trusts the client to authenticate the connecting user, a
      malicious user can connect to the database as any user including a database
      administrator by simply creating that user on the client system. Impact: It is
      important to be aware that the implementation of this recommendation results
      in a brief downtime. It is therefore advisable to ensure that the setting is
      implemented during an approved maintenance window.
    audit_procedure: >
      Perform the following Db2 commands to obtain the value for this setting: 1.
      Attach to the Db2 instance. db2 => attach to <db2instance> 2. Run the
      following command: db2 => get database manager configuration 3. Locate the
      TRUST_ALLCLNTS value in the output. Trust all clients (TRUST_ALLCLNTS) = NO
    remediation: >
      1. Attach to the Db2 instance. db2 => attach to <db2instance> 2. Run the
      following command: db2 => update database manager configuration parameter
      using trust_allclnts no 3. Restart the Db2 instance. db2 => db2stop db2 =>
      db2start
    references: >
      
    impact: >
