  - rule_id: ibm_db2.cis.4.restrict_access_to_tablespaces
    title: "Restrict Access to Tablespaces"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: automated
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "4.5.1"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      A tablespace is where the data is physically stored. It is recommended that
      tablespace usage be restricted to authorized users.
    rationale: >
      Grant the USE of tablespace privilege to only authorized users. Restrict the
      privilege from PUBLIC, where applicable, as a malicious user can cause a
      denial of service at the tablespace level by overloading it with corrupted
      data.
    audit_procedure: >
      Perform the following Db2 commands to obtain the value for this setting: 1.
      Connect to the Db2 database. db2 => connect to <dbname> 2. Run the following
      command: db2 => select grantee, tbspace from sysibm.systbspaceauth where
      grantee = 'PUBLIC' 3. If the output contains zero rows, then it is considered
      a Pass. Otherwise, PUBLIC has SELECT privilege and the remediation steps
      should be followed.
    remediation: >
      Perform the following to revoke access from PUBLIC. 1. Connect to the Db2
      database. db2 => connect to <dbname> 2. Run the following command: db2 =>
      REVOKE USE OF TABLESPACE [$tablespace_name\] FROM PUBLIC References: 1.
      https://www.ibm.com/docs/en/db2/11.5?topic=views-syscattablespaces
    references: >
      1. https://www.ibm.com/docs/en/db2/11.5?topic=views-syscattablespaces
