  - rule_id: ibm_db2.cis.8.encrypt_the_database
    title: "Encrypt the Database"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: manual
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "8.2.1"
    cis_section: "8"
    profile_applicability: "Level 1 + Level 2"
    description: >
      Encrypting the database will protect your data and may be required for
      compliance with certain government regulations (e.g. NIST).
    rationale: >
      A malicious user can steal physical media like the hard drive, and restore the
      database and browse the data. To prevent access to the data at rest, encrypt
      sensitive data in a database and use an encryption key that encrypt the data.
      This prevents anyone without the keys from using the data.
    audit_procedure: >
      Check that the database is encrypted via examining configuration settings.
    remediation: >
      To determine if a database is encrypted you should check the Encrypted
      database database configuration parameter: db2 => get db cfg | grep -i encrypt
      Encryption Library for Backup (ENCRLIB) = libdb2encr.so Encryption Options for
      Backup (ENCROPTS) = CIPHER=AES:MODE=CBC:KEY LENGTH=256 Encrypted database =
      YES You should see that the encrypted database is set to YES. You should check
      the type of key manger used by checking dbm configuration: db2 => get dbm cfg
      | grep -i keystore Keystore type (KEYSTORE_TYPE) = KMIP Keystore location
      (KEYSTORE_LOCATION) = /path/ekeystore.cfg You can also check the current
      database encryption settings: db2 => SELECT * FROM
      TABLE(SYSPROC.ADMIN_GET_ENCRYPTION_INFO()) You must be connected to the
      database to run this command. The following information will be shown for the
      connected database: • OBJECT_NAME • OBJECT_TYPE • ALGORITHM • ALGORITHM_MODE •
      KEY_LENGTH • MASTER_KEY_LABEL KEYSTORE_NAME KEYSTORE_TYPE • KEYSTORE_HOST
      KEYSTORE_IP • KEYSTORE_IP_TYPE • PREVIOUS_MASTER_KEY_LABEL AUTH_ID • APPL_ID •
      ROTATION_TIME This information should be filled in for an encrypted database.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_IBM_DB2_11_v1_1_0_8_2_1"
      nist_800_53: []
      soc2: []
