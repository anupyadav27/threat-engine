  - rule_id: ibm_db2.cis.4.specify_a_secure_location_for_external_tables
    title: "Specify a Secure Location for External Tables (EXTBL_LOCATION)"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: manual
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "4.1.14"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      The EXTBL_LOCATION database configuration parameter provides an allow list of
      paths that external tables may access for local files, for both reading and
      writing. It is recommended that this value be set to appropriate paths with
      the understanding that confidential data may reside in this directory.
      Specifying appropriate paths is part of an organizations standard operating
      procedures (SOP).
    rationale: >
      External tables can read and write data to the paths configured within the
      EXTBL_LOCATION configuration parameter. To avoid a loss of confidentiality of
      the data which may be reside in these paths, they should be examined to ensure
      they match the values specified by the SOP.
    audit_procedure: >
      Perform the following Db2 commands to determine if a EXTBL_LOCATION is
      specified: 1. Connect to the Db2 database. db2 => connect to <dbname> 2. Run
      the following command: db2 => get database configuration 3. Locate the
      EXTBL_LOCATION value in the output: Allowed paths for external tables
      (EXTBL_LOCATION) = /home/db2inst1 If the value does not match what has been
      specified in the SOP, then follow the remediation steps.
    remediation: >
      To specify an external table location, perform the following commands: 1.
      Connect to the Db2 database db2 => connect to <dbname> 2. Run the following
      command: db2 => update database configuration using extbl_location <paths>
      References: 1. https://www.ibm.com/docs/en/db2/11.5?topic=parameters-extbl-
      location-external- table-location
    references: >
      1. https://www.ibm.com/docs/en/db2/11.5?topic=parameters-extbl-location-
      external- table-location
