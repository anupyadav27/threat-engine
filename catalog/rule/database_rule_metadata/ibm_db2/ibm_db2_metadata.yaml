  - rule_id: ibm_db2.cis.6.review_users_groups_and_roles
    title: "Review Users, Groups, and Roles"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: manual
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "6.2.1"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      With row and column access control, individuals are permitted access to only
      the subset of data that is required to perform their job tasks. Periodic
      review of these individuals is crucial when trying to keep data secure. As
      business needs move forward, requirements behind accessing the data may
      change, leading to a revision in security policy. By inspecting the list of
      users, groups, and roles, you are identifying excessive privileges that could
      pose possible security threats within your infrastructure.
    rationale: >
      If a user (either by himself or part of a group or role) is no longer required
      access to the data that is protected by row and column access controls,
      allowing that individual to maintain access allows that individual to
      compromise the confidentiality, integrity, and/or availability of the data in
      the Db2 instance.
    audit_procedure: >
      1. Review the users within your database environment: o Linux: cat /etc/passwd
      o Windows: 1. Run compmgmt.msc 2. Click 'Local Users and Groups' 3. Double
      click 'Users' 4. Review users 2. Review the groups within your database
      environment: o Linux: cat /etc/group o Windows: 1. Run compmgmt.msc 2. Click
      'Local Users and Groups' 3. Double click 'Groups' 4. Review groups 3. Review
      the roles and role members within your database environment: o Connect to Db2
      database: db2 => connect to <dbname> o Run the command: db2 => select
      rolename, grantee from syscat.roleauth where grantortype <> 'S'
    remediation: >
      1. To remove users from your database environment: o Linux: userdel -r <user
      name> o Windows: ▪ Run compmgmt.msc ▪ Click 'Local Users and Groups' ▪ Double
      click 'Users' ▪ Right-click on ▪ Select 'Delete' 2. To remove groups from your
      database environment: o Linux: groupdel -r <group name> o Windows: 1. Run
      compmgmt.msc 2. Click 'Local Users and Groups' 3. Double click 'Groups' 4.
      Right-click on 5. Select 'Delete' 3. To remove roles or role members from your
      database environment: o Connect to Db2 database: db2 => connect to <dbname> o
      To remove role members from roles: db2 => revoke role <role name> from
      <userroup/role member> o To remove roles: db2 => drop role <role name>
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_IBM_DB2_11_v1_1_0_6_2_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_ibm_db2_11_v1_1_0_6_2_1"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: ibm_db2.cis.6.review_roles
    title: "Review Roles"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: manual
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "6.2.2"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Roles provide several advantages that make it easier to manage privileges in a
      database system. Security administrators can control access to their databases
      in a way that mirrors the structure of their organizations (they can create
      roles in the database that map directly to the job functions in their
      organizations). The assignment of privileges is simplified. Instead of
      granting the same set of privileges to each individual user in a particular
      job function, the administrator can grant this set of privileges to a role
      representing that job function and then grant that role to each user in that
      job function.
    rationale: >
      Reviewing the roles within a database helps minimize the possibility of
      unwanted access.
    audit_procedure: >
      1. Connect to Db2 database: db2 => connect to <dbname> 2. Run the following
      and review the results to determine if each role name still has a business
      requirement to access the data: db2 => select rolename from syscat.roleauth
      where grantortype <> 'S' group by rolename
    remediation: >
      To remove a role from the database: 1. Connect to Db2 database: db2 => connect
      to <dbname> 2. Run the following: db2 => drop role <role name> References: 1.
      https://www.ibm.com/docs/en/db2/11.5?topic=security-roles
    references: >
      1. https://www.ibm.com/docs/en/db2/11.5?topic=security-roles
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_IBM_DB2_11_v1_1_0_6_2_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_ibm_db2_11_v1_1_0_6_2_2"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: ibm_db2.cis.6.review_role_members
    title: "Review Role Members"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: manual
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "6.2.3"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Having roles that have been granted specific privileges, then assigning users
      to the roles, is usually considered the best way to grant application access.
      Because granting privileges to individual users can be more difficult to track
      and maintain against unauthorized access, users should be assigned to
      organization-defined database roles according to the needs of the business. As
      users leave the organization or change responsibilities within the
      organization, the appropriate roles for them change as well, so role
      membership needs to be reviewed and verified periodically.
    rationale: >
      Users who have excessive privileges not needed to do their jobs pose an
      unnecessary risk to the organization as an insider threat.
    audit_procedure: >
      1. Connect to Db2 database: db2 => connect to <dbname> 2. Run the following to
      review and verify that the role members are correct for each role: db2 =>
      select rolename,grantee from syscat.roleauth where grantortype <> 'S' group by
      rolename, grantee
    remediation: >
      To remove a role member from a particular role: 1. Connect to Db2 database:
      db2 => connect to <dbname> 2. Run the following: db2 => revoke role <role
      name> from <role member> References: 1.
      https://www.ibm.com/docs/en/db2/11.5?topic=security-roles
    references: >
      1. https://www.ibm.com/docs/en/db2/11.5?topic=security-roles
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_IBM_DB2_11_v1_1_0_6_2_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_ibm_db2_11_v1_1_0_6_2_3"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: ibm_db2.cis.6.nested_roles
    title: "Nested Roles"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: manual
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "6.2.4"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      The user-defined roles in Db2 can be nested in the same fashion as Windows
      security groups, i.e. a nested group has both its directly assigned
      permissions as well as the assigned group permissions. By nesting roles, the
      database administrator is saving time by only having to assign a group of
      users versus assigning them individually. Nesting roles properly can often
      ease the application of the security model if it's kept fairly shallow, and if
      the roles are logically named. If these are all true, then nesting of roles is
      a good idea.
    rationale: >
      As tracking multiple levels of permissions can result in unauthorized access
      to data resources, this capability should be restricted according to the needs
      of the business.
    audit_procedure: >
      1. Connect to Db2 database: db2 => connect to <dbname> 2. Run the following to
      identify any nested roles: db2 => select grantee, rolename from
      syscat.roleauth where grantee in (select rolename from syscat.roles) If value
      is blank, this would be considered passing.
    remediation: >
      To remove a nested role, perform the following: 1. Connect to Db2 database:
      db2 => connect to <dbname> 2. Run the following: db2 => revoke role <role
      name> from role <role>
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_IBM_DB2_11_v1_1_0_6_2_4"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_ibm_db2_11_v1_1_0_6_2_4"
    metadata_source: generated
