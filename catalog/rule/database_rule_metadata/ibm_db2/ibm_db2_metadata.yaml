  - rule_id: ibm_db2.cis.7.disable_limited_audit_of_applications_db2_limit
    title: "Disable Limited Audit of Applications (DB2_LIMIT_AUDIT_APPS)"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: manual
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "7.1.2"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      The DB2_LIMIT_AUDIT_APPS registry variable contains a list of application
      names that should not be audited. It is recommended that this variable should
      not be set and all applications should be audited. The DB2_LIMIT_AUDIT_APPS
      registry variable is not documented.
    rationale: >
      The application name not to be audited is determined by the client and not
      validated by the server. It is possible for a malicious user to change their
      application name to avoid being audited.
    audit_procedure: >
      Perform the following to determine if the DB2_LIMIT_AUDIT_APPS registry
      variable is set: db2set -all | grep DB2_LIMIT_AUDIT_APPS The above command
      should not yield a value.
    remediation: >
      Perform the following command to remove any applications from the list: db2set
      DB2_LIMIT_AUDIT_APPS=
