  - rule_id: ibm_db2.cis.8.rotate_the_master_key
    title: "Rotate the Master Key"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: manual
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "8.2.9"
    cis_section: "8"
    profile_applicability: "Level 1 + Level 2"
    description: >
      Key rotation refers to the process of changing encryption keys and is often
      required for compliance purposes. Similar to a password change, key rotation
      is done to reduce the risk that can come from exposure of the key, while it
      exists. Since the DEK used by Db2 for encryption is never outside of the
      encrypted database, backup, or transaction log, there is little risk of
      exposure. The same is not true for the MK, which lives outside of the
      database. The rotation of the MK does not affect the encryption of the DEK
      within existing backups or archived transaction logs. The master key (MK)
      should be rotated based on the frequency needed for compliance. Rotating MK
      requires decrypting any DEK encrypted with the old MK and then re- encrypting
      it with the new MK. The data is encrypted with a DEK and does not get re-
      encrypted.
    rationale: >
      Consider rotating the MK as being similar to changing passwords every X number
      of days. You may also have external requirements to rotate the MK after a
      certain period of time.
    audit_procedure: >
      Check the current database is encryption settings: db2 => SELECT * FROM
      TABLE(SYSPROC.ADMIN_GET_ENCRYPTION_INFO()) You must be connected to the
      database to run this command. The following information will be shown for the
      connected database: • OBJECT_NAME • OBJECT_TYPE • ALGORITHM • ALGORITHM_MODE •
      KEY_LENGTH • MASTER_KEY_LABEL KEYSTORE_NAME KEYSTORE_TYPE • KEYSTORE_HOST
      KEYSTORE_IP • KEYSTORE_IP_TYPE • PREVIOUS_MASTER_KEY_LABEL AUTH_ID • APPL_ID •
      ROTATION_TIME
    remediation: >
      The SYSPROC.ADMIN_ROTATE_MASTER_KEY procedure can be used to change the
      database key to comply with key rotation requirement. You must be connected to
      the database to run this command. db2 => CALL
      SYSPROC.ADMIN_ROTATE_MASTER_KEY('newMasterKeyLabel') Db2 will automatically
      generate the new MK and label unless you provide a MK label for an existing
      MK. Key rotation is logged in the db2diag.log file: $ grep –A 3 'Key Rotation'
      ~/sqllib/db2dump/db2diag.log Key Rotation successful using label: DATA #2 :
      String, 46 bytes DB2_SYSGEN_db2inst1_SECRET_2021-04-29-11.22.01 The DEK is not
      externalized and does not need to be rotated. However, if you wish to rotate
      the DEK you can take an offline backup and restore to a new encrypted
      database, thus generating a new DEK.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_IBM_DB2_11_v1_1_0_8_2_9"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_ibm_db2_11_v1_1_0_8_2_9"
