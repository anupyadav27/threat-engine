  - rule_id: ibm_db2.cis.6.secure_setsessionuser_privilege
    title: "Secure SETSESSIONUSER Privilege"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: manual
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "6.1.17"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      The SETSESSIONUSER privilege allows one user to switch the session
      authorization ID of the connection to another user. This allows one user to
      run SQL statements as another user. It is recommended that Trusted Context be
      used as a stronger assertion of user identity where such a feature is
      required.
    rationale: >
      A user can switch their identity to another user for whom they have been
      authorized and run SQL statements as that user.
    audit_procedure: >
      Perform the following Db2 commands to obtain the value for this setting: 1.
      Connect to the Db2 database. db2 => connect to <dbname> 2. Run the following
      command: db2 => select distinct trustedid, trustedidtype, surrogateauthid,
      surrogateauthidtype from syscat.surrogateauthids 3. Review the list of users,
      groups, and roles in the above output to ensure only approved users, groups,
      and roles are assigned.
    remediation: >
      Revoke this permission from any unauthorized users. 1. Connect to the Db2
      database. db2 => connect to <dbname> 2. Run the following command: db2 =>
      REVOKE SETSESSIONUSER ON <authid> FROM <authid> References: 1.
      https://www.ibm.com/docs/en/db2/11.5?topic=statements-set-session-
      authorization 2. https://www.ibm.com/docs/en/db2/11.5?topic=statements-grant-
      setsessionuser- privilege
