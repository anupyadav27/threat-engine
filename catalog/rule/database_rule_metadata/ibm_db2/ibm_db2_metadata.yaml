  - rule_id: ibm_db2.cis.3.secure_db2_runtime_library
    title: "Secure Db2 Runtime Library"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: manual
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "3.3.1"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      A Db2 software installation will place all executables under the default
      <DB2PATH> \sqllib directory. This directory needs to be secured so it grants
      only the necessary access to authorized users and administrators.
    rationale: >
      The Db2 runtime is comprised of files that are executed as part of the Db2
      service. If these resources are not secured, an attacker may alter them to
      execute arbitrary code.
    audit_procedure: >
      Perform the following to obtain the value for this setting: For Windows: 1.
      Connect to the Db2 host 2. Right-click on the NODE000x\sqldbdir directory 3.
      Choose Properties 4. Select the Security tab 5. Determine the permissions for
      DB administrator accounts and all other accounts For Linux: 1. Connect to the
      Db2 host 2. Change to the NODE000x/sqldbdir directory 3. Determine the
      permissions for the directory $ ls -al
    remediation: >
      For Windows: 1. Connect to the Db2 host 2. Right-click on the
      NODE000x\sqldbdir directory 3. Choose Properties 4. Select the Security tab 5.
      Select all DB administrator accounts and grant them the Full Control authority
      6. Select all other accounts and revoke all privileges other than Read and
      Execute For Linux: 1. Connect to the Db2 host 2. Change to the
      /NODE000x/sqldbdir directory 3. Change the permission level of the directory
      to this recommended value $ chmod -R 755 Default Value: Linux •
      $DB2PATH/NODE000x/sqldbdir is owned by the Db2 administrator with read, write,
      and execute access. Windows • $DB2PATH\NODE000x\sqldbdir owned by the Db2
      administrator with read, write, and execute access. The database instance
      db2inst1 located in /home/NODE000x needs the following permissions: drwxrwxr-x
      11 db2inst1 db2grp1 4096 Aug 08 1:34 NODE0000 All lower directories need the
      same settings: /db2,/db2/data, /db2/data/db2inst1, /db2/data/db2inst1/db2inst1
      and /db2/data/db2inst1/db2inst1/NODE0000 would need the same settings
      drwxrwxr-x.
