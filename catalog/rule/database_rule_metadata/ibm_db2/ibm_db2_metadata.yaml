  - rule_id: ibm_db2.cis.6.review_organization_s_policies_against_db2_rcac
    title: "Review Organization's Policies Against Db2 RCAC Policies"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: manual
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "6.3.1"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      DB2 Row and Column Access Control (RCAC) Policies control access to Db2
      tables. They should match the organization's security and database access
      policies, and they should be regularly reviewed for gaps.
    rationale: >
      Missing, incomplete, or incorrect Db2 RCAC policies will increase the risks to
      the organization's protected data and will prevent efforts to monitor, alert,
      and respond to these risks in the future.
    audit_procedure: >
      Schedule and complete a regular review of all organization security and data
      access database policies against the current Db2 policies to determine if gaps
      exist. 1. Identify each written organization policy. 2. Find the matching Db2
      RCAC policy. 3. Determine if the RCAC policy applies and correctly supports
      the written policy. 4. If no matching Db2 RCAC policy is found, record a 'gap'
      for future remediation.
    remediation: >
      1. Create RCAC policies for each 'gap' listed from the Audit procedure. 2.
      Review the newly created Db2 RCAC policy against the organization's written
      policies. Default Value: Not installed References: 1.
      https://www.ibm.com/docs/en/db2/11.5?topic=security-row-column-access-
      control-rcac
