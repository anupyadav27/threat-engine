  - rule_id: ibm_db2.cis.8.configure_secure_tls_cipher_suites_ssl_cipherspecs
    title: "Configure Secure TLS Cipher Suites (SSL_CIPHERSPECS)"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: manual
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "8.1.6"
    cis_section: "8"
    profile_applicability: "Level 1"
    description: >
      The SSL_CIPHERSPECS database manager configuration parameter controls which
      cipher suites are enabled by Db2. If it is unset, Db2 will enable a default
      list of ciphers.
    rationale: >
      The default list of ciphers includes SHA1 ciphers, which are considered weak.
      In addition, some cipher suites enabled by default do not support perfect
      forward secrecy. Depending on the security requirements of your organization,
      it may be necessary to restrict which ciphers are enabled by Db2.
    audit_procedure: >
      Perform the following to determine if SSL_CIPHERSPECS is set. 1. Attach to the
      Db2 instance. db2 => attach to <db2instance> 2. Run the following command: db2
      => get database manager configuration 3. Locate the value of SSL_CIPHERSPECS
      in the output: SSL cipher specs (SSL_CIPHERSPECS) =
    remediation: >
      Perform the following to set SSL_CIPHERSPECS: 1. Attach to the Db2 instance.
      db2 => attach to <db2instance> 2. Run the following command to enable a
      specific set of ciphers within the Db2 server. db2 => update dbm cfg using
      SSL_CIPHERSPECS <LIST> Replace <LIST> with one or multiple of the following
      cipher suites. If multiple items are specified, separate them with a single
      comma and no spaces. o TLS_RSA_WITH_AES_256_GCM_SHA384 o
      TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384 o
      TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384 o
      TLS_ECDHE_RSA_WITH_AES_256_CBC_SHA384 o
      TLS_ECDHE_ECDSA_WITH_AES_256_CBC_SHA384 o TLS_RSA_WITH_AES_256_CBC_SHA256 o
      TLS_RSA_WITH_AES_128_GCM_SHA256 o TLS_RSA_WITH_AES_128_CBC_SHA256 o
      TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256 o
      TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256 o
      TLS_ECDHE_RSA_WITH_AES_128_CBC_SHA256 o
      TLS_ECDHE_ECDSA_WITH_AES_128_CBC_SHA256
