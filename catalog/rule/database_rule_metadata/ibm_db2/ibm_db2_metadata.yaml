  - rule_id: ibm_db2.cis.6.do_not_allow_trusted_context_to_switch_users
    title: "Do Not Allow Trusted Context to Switch Users Without Authentication"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: manual
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "6.4.2"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      A Trusted Context can provide a middle tier with the option of performing end
      user authentication, and then switching to that user within the database
      without further authentication. The middle tier is asserting the identity of
      the end user they have already authenticated. The organizations Standard
      Operating Procedures (SOP) will determine whether such trust has been placed
      with the middle tier establishing the trusted connection.
    rationale: >
      Allowing an untrusted middle tier to establish a trusted context and switch
      users without authentication is a security risk. Only middle tier applications
      that have been validated and included in the SOP should have this
      functionality enabled. All other trusted contexts should not use with WITHOUT
      AUTHENTICATION clause during the CREATE TRUSTED CONTEXT statement.
    audit_procedure: >
      1. Connect to the Db2 database. db2 => connect to <dbname> 2. Issue Issue the
      following command to verify that no trusted context db2 => select * from
      syscat.surrogateauthids where trustedidtype='C' and authenticate='N' and
      trustedID!='SYSATSCONTEXT' 3. Review any rows returned to ensure they are
      allowed by the SOP for performing a switch user without authentication.
    remediation: >
      1. Connect to the Db2 database. db2 => connect to <dbname> 2. Disable any
      trusted context identified above until it can be determined why such trusted
      context where created with the following command db2 => alter trusted context
      <contextname> alter disable References: 1.
      https://www.ibm.com/docs/en/db2/11.5?topic=security-using-trusted-contexts-
      trusted-connections 2. CIS Controls:
    references: >
      1. https://www.ibm.com/docs/en/db2/11.5?topic=security-using-trusted-contexts-
      trusted-connections 2. CIS Controls: Controls Version Control IG 1 IG 2 IG 3
      v8 6.8 Define and Maintain Role-Based Access Control Define and maintain role-
      based access control, through determining and documenting the access rights
      necessary for each role within the enterprise to successfully carry out its
      assigned duties. Perform access control reviews of enterprise assets to
      validate that all privileges are authorized, on a recurring schedule at a
      minimum annually, or more frequently. ● 7 Audit Considerations 7.1 General
      Audit Considerations
