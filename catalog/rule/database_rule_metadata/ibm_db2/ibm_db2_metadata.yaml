  - rule_id: ibm_db2.cis.8.key_rotation_in_hadr_environment
    title: "Key Rotation in HADR Environment"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: manual
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "8.2.14"
    cis_section: "8"
    profile_applicability: "Level 1 + Level 2"
    description: >
      Some additional considerations are needed when working in an HADR environment.
      A key rotation on the primary database in an HADR environment drives a key
      rotation automatically on the standby. The change, however, does not occur
      until other log records are sent to the standby database. If you want to force
      the rotated key to the standby, the archive log command can be used to
      generate the log records that are needed to replay the rotation on the
      standby.
    rationale: >
      When the MK is rotated, the database begins to use the new key immediately,
      but access to the old MK value is still needed in the following scenarios: •
      Transaction log files that have not been reused since the key rotation •
      Archived encrypted transaction log files that used the previous MK value •
      Encrypted backup images that used the previous MK value Do not delete an MK
      from the keystore unless you are certain it is no longer referenced by any
      encrypted object on any of the hosts of the HADR environment. When using a
      local keystore file, you need to provide an identical copy of the keystore at
      each Db2 member that is associated with the database. If you choose to use a
      shared file system, ensure that network access is maintained for that file
      system while Db2 is actively working with the encrypted database. In an HADR
      setup, you should copy the keystore containing the encryption keys between the
      hosts.
    audit_procedure: >
      You can check what values you have set for these parameters as follows on each
      HADR member: db2 => get dbm cfg | grep KEYSTORE Keystore type (KEYSTORE_TYPE)
      = PKCS12 Keystore location (KEYSTORE_LOCATION) = /path/to/file.p12 We
      recommend you use a centralized key manager for HADR environments.
    remediation: >
