  - rule_id: ibm_db2.cis.3.secure_the_communication_buffer_exit_library_comm
    title: "Secure the Communication Buffer Exit Library (COMM_EXIT_LIST)"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: automated
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "3.1.13"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      A communication exit library is a dynamically loaded library that vendor
      applications use to examine communication buffers. The COMM_EXIT_LIST
      parameter specifies the list of communication buffer exist libraries. The
      permissions on the libraries should be secured so that users other than the
      instance owner do not have write privileges.
    rationale: >
      If a malicious user has write access to a communication exit library, they can
      overwrite it with their own thereby receiving all of the communication buffers
      that Db2 receives over the network. Securing the libraries will prevent a loss
      of confidentiality of data.
    audit_procedure: >
      Steps for Linux: • 32-bit and 64-bit server side user authentication plugins
      are found in $DB2PATH/security32/plugin/commexit and
      $DB2PATH/security64/plugin/commexit directories respectively Review the
      permissions of the plugins that are in use: ls -al Steps for Windows: • 32-bit
      and 64-bit server side user authentication plugins are found in
      $DB2PATH\security\plugin\commexit\ <instance name> Review the permissions of
      the plugins that are in use: 1. Right-click over the plugin file 2. Choose
      properties 3. Select the Security tab 4. Review the access for all accounts
    remediation: >
      To change permissions of a file on Linux: chmod 755 <file> To change
      permissions of a file on Windows: 1. Right-click on the file 2. Choose
      properties 3. Select the Security tab 4. Grant the Full Control authority to
      all Db2 administrator accounts 5. Grant only read and execute privileges to
      all other accounts (revoke any other privileges)
    references: >
      
    impact: >
      
