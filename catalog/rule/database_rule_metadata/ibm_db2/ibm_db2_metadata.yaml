  - rule_id: ibm_db2.cis.5.database_manager_configuration_parameter_fed
    title: "Database Manager Configuration Parameter: FED_NOAUTH"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: manual
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "5.6"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The FED_NOAUTH database manager configuration parameter determines whether
      federated authentication will be bypassed at the instance. If this parameter
      is set to YES, the AUTHENTICATION parameter is set to SERVER or SERVER_ENCRYPT
      and the FEDERATED parameter is set to YES, then authentication at the instance
      is bypassed and is instead assumed to be performed at the data source. It is
      recommended to set this parameter to NO.
    rationale: >
      Setting FED_NOAUTH to NO will ensure that authentication is not bypassed for
      any users that are connecting to the instance. Impact: It is important to be
      aware that the implementation of this recommendation results in a brief
      downtime. It is therefore advisable to ensure that the setting is implemented
      during an approved maintenance window.
    audit_procedure: >
      Perform the following Db2 commands to obtain the value for this setting: 1.
      Attach to the Db2 instance. db2 => attach to <db2instance> 2. Run the
      following command: db2 => get database manager configuration 3. Locate the
      FED_NOAUTH value in the output: Bypass federated authentication (FED_NOAUTH) =
      NO
    remediation: >
      1. Attach to the Db2 instance db2 => attach to <db2instance> 2. Run the
      following command: db2 => update database manager configuration using fed_auth
      no 3. Restart the Db2 instance. db2 => db2stop db2 => db2start
    references: >
      
    impact: >
      It is important to be aware that the implementation of this recommendation
      results in a brief downtime. It is therefore advisable to ensure that the
      setting is implemented during an approved maintenance window.
