  - rule_id: ibm_db2.cis.8.configure_a_client_side_key_store_for_tls_ssl
    title: "Configure a Client-side Key Store for TLS (SSL_CLNT_KEYDB)"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: manual
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "8.1.8"
    cis_section: "8"
    profile_applicability: "Level 1"
    description: >
      To enable TLS support in a Db2 client, it is possible to configure a key store
      in the database manager configuration that will contain root certificates to
      be used for secure TLS communication between a Db2 client and Db2 server.
    rationale: >
      On the client side, Db2 requires the root certificates for the server to be
      available. This can be achieved by configuring a client-side keystore. This
      parameter is optional and is not needed if clients use the SSLClientKeystoredb
      or SSLServerCertificate parameters in the db2cli.ini or db2dsdriver.cfg files,
      or in the connection string.
    audit_procedure: >
      erform the following to determine if SSL_CLNT_KEYDB is set. 1. Run the
      following command: db2 => get database manager configuration 2. Locate the
      value of SSL_CLNT_KEYDB in the output: SSL client keydb file (SSL_CLNT_KEYDB)
      =
    remediation: >
      Perform the following to set SSL_CLNT_KEYDB: 1. Run the following command,
      where <path> is the fully qualified path to the keystore file: db2 => update
      dbm cfg using SSL_CLNT_KEYDB <path> 2. (Optional) To use the Microsoft
      certificate store on Windows, set SSL_CLNT_KEYDB to GSK_MS_CERTIFICATE_STORE:
      db2 => update dbm cfg using SSL_CLNT_KEYDB GSK_MS_CERTIFICATE_STORE 3. Restart
      the client application. If the CLP is being used, run the following command to
      terminate the background process db2 => terminate If a client-side keystore
      file is being used, ensure that any users running client applications, and
      administrators have access to the file. Do not grant world readable or world
      writable permissions on the stash file.
