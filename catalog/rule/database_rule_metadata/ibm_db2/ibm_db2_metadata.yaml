  - rule_id: ibm_db2.cis.3.secure_the_database_container_directory
    title: "Secure the Database Container Directory"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: manual
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "3.3.2"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      A Db2 database container is the physical storage of the data.
    rationale: >
      The containers are needed for the database to operate properly. The loss of
      the containers can cause down time. Also, allowing excessive access to the
      containers may help an attacker to gain access to their contents. Therefore,
      secure the location(s) of the containers by restricting the access and
      ownership. Allow only the instance owner to have access to the tablespace
      containers.
    audit_procedure: >
      Review all users that have access to the directory of the containers. On Linux
      and AIX ensure that only the instance owner has access to the directory of the
      containers and the container files themselves. On Windows only administrators,
      and if extended security is enabled, members of the DB2ADMINS group should
      have access to the directory of the containers and the container files. No
      other users should have access.
    remediation: >
      On Linux and AIX, set the privileges for the directory of the containers so
      that only the instance owner has full access, and all other users have no
      access. On Windows, set the privileges for the directory of the containers and
      the container files so that only administrators, and if extended security is
      enabled members of the DB2ADMINS group, have full access, and all other users
      have no access.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
