    rationale: >
      A mirror log path should not be empty and it should be a valid path. The
      mirror log path stores a second copy of the active log files. Access to the
      directory pointed to by that path should be restricted through permissions to
      help ensure that the confidentiality, integrity, and availability of the
      mirror logs are protected.
