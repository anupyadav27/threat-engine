    cis_version: "11_v1.1.0"
    cis_control: "3.1.7"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The DISCOVER_INST parameter specifies whether the instance can be discovered
      in the network. It is recommended that instances not be discoverable.
    rationale: >
      Discovery capabilities may be used by a malicious entity to derive the names
      of and target Db2 instances.
    audit_procedure: >
      Perform the following Db2 commands to obtain the value for this setting: 1.
      Attach to the Db2 instance: db2 => attach to <db2instance> 2. Run the
      following command: db2 => get database manager configuration 3. Locate the
      DISCOVER_INST value in the output: Discover server instance (DISCOVER_INST) =
      DISABLE 4. If the value of DISCOVER_INST is DISABLE then this is a Pass.
      Otherwise database discovery is possible, and the remediation steps should be
      followed.
    remediation: >
      1. Attach to the Db2 instance: db2 => attach to <db2instance> 2. Run the
      following command: db2 => update database manager configuration using
      discover_inst disable References: 1.
      https://www.ibm.com/docs/en/db2/11.5?topic=parameters-discover-inst-discover-
      server-instance
