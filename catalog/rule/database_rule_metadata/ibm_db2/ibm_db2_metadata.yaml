    cis_section: "9"
    profile_applicability: "Level 1"
    description: >
      The Db2 database instance will execute under the context of a given security
      principle. It is recommended that this service have the least privileges
      possible. Furthermore, it is advisable to have the Db2 service executed using
      the Db2 instance owner and monitor such accounts for unauthorized access to
      the sensitive data.
    rationale: >
      Leveraging a least privilege account for the Db2 service will reduce an
      attacker's ability to compromise the host operating system should the Db2
      service process become compromised.
    audit_procedure: >
      Review all accounts that have access to the Db2 database service to ensure
      least privilege is applied.
    remediation: >
      Ensure that all accounts have the absolute minimal privilege granted to
      perform their tasks.
