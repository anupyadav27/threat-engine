  - rule_id: ibm_db2.cis.2.prevent_database_users_from_logging_into_the
    title: "Prevent Database Users from Logging into the Operating System"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: manual
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "2.1"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Db2’s default authentication mechanism (SERVER) uses the operating system for
      authentication. This necessitates that users who require access to the
      database can be authenticated by the operating system. A by-product of this is
      that those users will be able to log into a shell in the OS of the database
      server, such as through ssh. The scope of the problem is greater if the OS has
      been configured to use an LDAP server for authentication, as that would likely
      contain more than just database users. Unless explicitly authorized, database
      users should not be able to log into the OS and action is required to prevent
      this. åFor Windows, the recommendation is based on the CIS Benchmark for
      Windows Server 2016, section '2.2.21 Ensure 'Deny access to this computer from
      the network' to include 'Guests, Local account and member of Administrators
      group'' .
    rationale: >
      Only authorized users should be able to log into the operating system that is
      running the Db2 database server. This will reduce the attack exposure of the
      system by preventing database users from accessing operating system resources
      or taking advantage of operating system flaws. Impact: The recommendation in
      this section affects who can log into the operating system of the server where
      Db2 is installed. Care must be taken to ensure that appropriate settings are
      made and system administrators continue to have the ability to login to the
      system.
    audit_procedure: >
      RHEL 7 and RHEL 8 Run the following commands as root: $ grep pam_access
      /etc/pam.d/system-auth If the command does not return a line from the file,
      this is a Fail, and the remediation should be followed. AIX In the file
      /etc/security/user, the default stanza should have the following: rlogin =
      false This ensure that by default a user is not able to remotely log into the
      system unless their user has been explicitly configured with rlogin = true. If
      the rlogin value in the default stanza is not false, that is a finding, and
      the remediation should be followed. Windows To establish the recommended
      configuration via Group Policy, navigate the following UI path: Computer
      Configuration\Policies\Windows Settings\Security Settings\Local Policies\User
      Rights Assignment\Access this computer from the network Ensure these two
      values are present in the setting, and if not, this is a Fail, and the
      remediation should be followed: 1. Guests 2. Local account and member of
      Administrators group.
    remediation: >
      The steps to accomplish this differ per OS and even the level of OS. RHEL 7
      Run the following commands as root: 1. Modify the file
      /etc/security/access.conf Add users who are allowed to log into the OS with a
      + + : <user1> <user2> Add a deny all rule as the last rule to prevent other
      users not explicitly allowed to log in, which would apply to database users: -
      : ALL : ALL 2. Modify the file /etc/sysconfig/authconfig Ensure the following
      line is set to yes USEPAMACCESS=yes 3. Run this command to update the auth
      configuration: $ authconfig --updateall Using these steps will ensure that
      account required pam_access.so is placed into the file /etc/pam.d/system-auth
      and the access list will be enforced for OS login. RHEL 8 Run the following
      commands as root: 1. Modify the file /etc/security/access.conf Add users who
      are allowed to log into the OS with a + + : <user1> <user2> Add a deny all
      rule as the last rule to prevent other users not explicitly allowed to log in,
      which would apply to database users: - : ALL : ALL 2. Run this command to
      update the auth configuration: $ authselect enable-feature with-pamaccess
      Using these steps will ensure that account required pam_access.so is placed
      into the file /etc/pam.d/system-auth and the access list will be enforced for
      OS login. AIX 1. Ensure appropriate users are explicitly listed as being
      allowed to log into the system. It is important that you have users listed
      with privilege to rlogin so that you do not lock yourself out of the system.
      Modify the file /etc/security/user, and for each user allowed to log in, find
      their stanza and add the following line: rlogin = true 2. Modify the default
      stanza to indicate the default value is that users are not able to login
      rlogin = false 3. Ensure the DB2LOGINRESTRICTIONS registry variable is set to
      a value of LOCAL (the default if not specified) or NONE. Setting a value of
      NETWORK will return an error during Db2 authentication for any user with
      rlogin set to false. You can check this value as the instance owner by issuing
      the command: $ db2set | grep DB2LOGINRESTRICTIONS 4. To change the value, use
      the command: db2set DB2LOGINRESTRICTIONS=LOCAL Windows The remediation should
      only be followed for these scenarios: 1. You are using Db2 11.5 or later 2.
      You are using Db2 11.1 or prior and do not have local accounts that are
      members of the Administrator group. Following these changes will prevent local
      accounts that are members of the Administrator group from connecting to the
      database. Follow these steps: To establish the recommended configuration via
      Group Policy, configure the following UI path: Computer
      Configuration\Policies\Windows Settings\Security Settings\Local Policies\User
      Rights Assignment\Access this computer from the network Ensure these two
      values are present in the setting, and if not follow the remediation: 1.
      Guests 2. Local account and member of Administrators group. For Db2 11.5 and
      later, set the DB2_WINDOWS_LOGON_TYPE to DEFINITION. This setting controls how
      Db2 authenticates users when they connect. Local users must hold the right
      'Allow log on locally' and not be part of the 'Deny log on locally'. Domain
      users must hold the right 'Access this computer from the network' and not be
      part of 'Deny access to this computer from the network'. This setting will
      ensure that local users are authenticated when connecting to Db2 according to
      their ability to log on locally, and not through the default value of
      accessing this computer from the network. Issue the following command db2set
      DB2_WINDOW_LOGON_TYPE=DEFINITION
    references: >
      
    impact: >
      The recommendation in this section affects who can log into the operating
      system of the server where Db2 is installed. Care must be taken to ensure that
      appropriate settings are made and system administrators continue to have the
      ability to login to the system.
    compliance_mappings:
      cis:
        - "CIS_IBM_DB2_11_v1_1_0_2_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_ibm_db2_11_v1_1_0_2_1"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: ibm_db2.cis.3.require_explicit_authorization_for_cataloging
    title: "Require Explicit Authorization for Cataloging (CATALOG_NOAUTH)"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: automated
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "3.1.1"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Db2 can be configured to allow users that do not possess the SYSADM authority
      to catalog and uncatalog databases and nodes. It is recommended that the
      CATALOG_NOAUTH parameter be set to NO.
    rationale: >
      Cataloging a database is the process of registering a database from a remote
      client to allow remote call and access. Setting CATALOG_NOAUTH to YES bypasses
      all permissions checks and allows anyone to catalog and uncatalog databases.
    audit_procedure: >
      Perform the following to determine if authorization is explicitly required to
      catalog and uncatalog databases and nodes: 1. Attach to the Db2 instance. db2
      => attach to <db2instance> 2. Run the following command: db2 => get database
      manager configuration 3. Locate the value of CATALOG_NOAUTH in the output:
      Cataloging allowed without authority (CATALOG_NOAUTH) = NO Ensure
      CATALOG_NOAUTH is NO.
    remediation: >
      Perform the following to require explicit authorization to catalog and
      uncatalog databases and nodes. 1. Attach to the Db2 instance db2 => attach to
      <db2instance> 2. Run the following command: db2 => update database manager
      configuration using catalog_noauth no References: 1.
      https://www.ibm.com/docs/en/db2/11.5?topic=parameters-catalog-noauth-
      cataloging-allowed-without-authority
    references: >
      1. https://www.ibm.com/docs/en/db2/11.5?topic=parameters-catalog-noauth-
      cataloging-allowed-without-authority
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_IBM_DB2_11_v1_1_0_3_1_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_ibm_db2_11_v1_1_0_3_1_1"
    metadata_source: generated
