    cis_control: "3.2.4"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The DB2_EXTSECURITY registry variable determines whether extended security is
      enabled on Windows. Extended security enables file permissions for all Db2
      objects so they can be accessed by users in DB2ADMNS and DB2USERS groups. It
      is recommended that extended security be enabled. This registry variable only
      applies to Db2 Servers running on Windows.
    rationale: >
      Extended security provides file permission protection for Db2 objects when
      running in a multi-user environment. Impact: Before enabling extended security
      for an existing installation, you should ensure you have added users to the
      DB2ADMNS and DB2USERS groups so that you are able to access Db2 once the
      permission have been applied. Once extended security is enabled, it is not
      recommended to be directly disabled, instead a full re-install should be used.
    audit_procedure: >
      erify that extended security is enabled by running the following command:
      db2set -all | grep DB2_EXTSECURITY The above command should yield a value of
      ON.
    remediation: >
      Run the following command to enable extended security (consult documentation
      for additional options as appropriate): db2extsec References: 1.
      https://www.ibm.com/docs/en/db2/11.5?topic=variables-
      miscellaneous#r0005669__M_DB2_EXTSECURITY 2.
      https://www.ibm.com/docs/en/db2/11.5?topic=security-extended-windows-using-
      db2admns-db2users-groups 3.
      https://www.ibm.com/docs/en/db2/11.5?topic=commands-db2extsec-set-
      permissions-db2-objects
    references: >
