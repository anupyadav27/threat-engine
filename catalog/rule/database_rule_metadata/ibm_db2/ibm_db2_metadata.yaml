  - rule_id: ibm_db2.cis.7.audit_policies_are_enabled_within_the_database
    title: "Ensure Audit Policies are Enabled Within the Database"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: manual
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "7.1.3"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      Creating and applying audit policies is crucial for securing and discovering
      issues within your databases. Audit policies can help trigger events for
      changes to data objects, table DML, and user access.
    rationale: >
      If audit policies are not enabled, issues may go undiscovered, and compromises
      and other incidents may occur without being quickly detected. It may also not
      be possible to provide evidence of compliance with security laws, regulations,
      and other requirements. Impact: Auditing all categories within the database
      can have an impact on the peformance of the database server depending on the
      workload and number of transactions. If enabling audit as part of the
      remedation, analysis should be performed on which categories are required to
      meet business needs.
    audit_procedure: >
      1. Connect to the Db2 database. db2 => connect to <dbname> 2. Issue the
      following command to ensure that at least one audit policy exists and has been
      associated with an object. The SYSCAT.AUDITUSE catalog view shows all of the
      audit policies that have been associated with auditing an object within the
      database. db2=> select * from syscat.audituse 3. If there is at least 1 row
      then it is considered a Pass. If there are zero rows returned then nothing is
      being audited within the database and the remediation steps should be
      followed.
    remediation: >
      1. Connect to the Db2 database. db2 => connect to <dbname> 2. Issue the
      following command to create an audit policy. This policy audits all
      categories. An analysis should be performed to determine which categories are
      required to meet business needs. db2 => create audit policy AUDITDB CATEGORIES
      ALL STATUS BOTH ERROR TYPE AUDIT 3. Audit the database using the policy just
      created with the following command: db2 => audit database using policy AUDITDB
      References: 1. https://www.ibm.com/docs/en/db2/11.5?topic=statements-create-
      audit-policy 2. https://www.ibm.com/docs/en/db2/11.5?topic=statements-audit
    references: >
      1. https://www.ibm.com/docs/en/db2/11.5?topic=statements-create-audit-policy
      2. https://www.ibm.com/docs/en/db2/11.5?topic=statements-audit
    impact: >
      Auditing all categories within the database can have an impact on the
      peformance of the database server depending on the workload and number of
      transactions. If enabling audit as part of the remedation, analysis should be
      performed on which categories are required to meet business needs.
    compliance_mappings:
      cis:
        - "CIS_IBM_DB2_11_v1_1_0_7_1_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_ibm_db2_11_v1_1_0_7_1_3"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: ibm_db2.cis.7.audit_is_enabled_within_the_instance
    title: "Ensure Audit is Enabled Within the Instance"
    severity: high
