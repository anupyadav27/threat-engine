  - rule_id: ibm_db2.cis.3.specify_secure_remote_shell_command_db2rshcmd
    title: "Specify Secure Remote Shell Command (DB2RSHCMD)"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: automated
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "3.2.1"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The DB2RSHCMD registry varible specifies the remote shell command to use when
      starting remote database partitions and with the db2_all script to run
      utilities and commands on all database partitions. It is recommended that a
      value be used which encrypts the data sent between partitions, such as ssh.
    rationale: >
      The traditional rsh command sends all its data, including passwords, in
      plaintext between partitions. An attacker who can read network traffic may
      have access to these passwords and other data. Specifying a remote shell
      command, such as ssh encrypts the data sent over the network. Impact: Enabling
      this value without configuring public and private keys may result in an
      inability to start or stop Db2 across all partitions without manually issuing
      db2start/db2stop individually on each partition.
    audit_procedure: >
      Verify that the DB2RSHCMD registry variable is set to a value such as ssh that
      encrypts the data by running the following command: db2set -all | grep
      DB2RSHCMD In Db2 V11.5 Mod Pack 6 and later, the above command should not
      yield a value, or should yield a value of ssh. In Db2 V11.5 Mod Pack 5 or
      earlier, the above command should yield a value of ssh.
    remediation: >
      1. Follow the guidance on this page to create public and private keys for ssh:
      https://www.ibm.com/docs/en/db2/11.5?topic=installation-enabling-execution-
      remote-commands 2. Run the following command to set the DB2_RSHCMD registry
      variable to ssh: db2set DB2RSHCMD=ssh Default Value: In Db2 V11.5 Mod Pack 5
      or earlier, the default value is rsh. In Db2 V11.5 Mod Pack 6 or later, the
      default value is ssh. References: 1.
      https://www.ibm.com/docs/en/db2/11.5?topic=variables-
      communications#r0005660__C_DB2RSHCMD 2.
      https://www.ibm.com/docs/en/db2/11.5?topic=installation-enabling-execution-
      remote-commands
    references: >
      1. https://www.ibm.com/docs/en/db2/11.5?topic=variables-
      communications#r0005660__C_DB2RSHCMD 2.
      https://www.ibm.com/docs/en/db2/11.5?topic=installation-enabling-execution-
      remote-commands
    impact: >
      Enabling this value without configuring public and private keys may result in
      an inability to start or stop Db2 across all partitions without manually
      issuing db2start/db2stop individually on each partition.
    compliance_mappings:
      cis:
        - "CIS_IBM_DB2_11_v1_1_0_3_2_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_ibm_db2_11_v1_1_0_3_2_1"
    metadata_source: generated
    generated_by: generate_tech_rules

