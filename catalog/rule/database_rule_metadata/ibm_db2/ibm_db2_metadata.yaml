    cis_control: "8.2.3"
    cis_section: "8"
    profile_applicability: "Level 1 + Level 2"
    description: >
      A configuration file, ekeystore.cfg, is created by the user in order to
      configure external keymanager functionality. This file should be secured
      against tampering via OS permissions.
    rationale: >
      Set this file to be readable and writeable by only the Db2 instance owner. If
      this file is not secured, an attacker may delete it, causing potential
      interruption of operations.
    audit_procedure: >
      A configuration file is created when configuring external keymanager access.
      You can verify the permissions of the stash file via regular OS operations,
      such as ls -la on a Unix-type system. Check the OS permissions for the stash
      file. On a Unix-type system they should be: $ ls -la -rw------- 1 db2inst1
      db2inst1 129 May 19 11:44 ekeystore.cfg
    remediation: >
