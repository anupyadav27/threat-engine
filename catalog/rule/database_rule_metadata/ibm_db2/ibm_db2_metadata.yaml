  - rule_id: ibm_db2.cis.6.secure_accessctrl_authority
    title: "Secure ACCESSCTRL Authority"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: manual
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "6.1.9"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      ACCESSCTRL authority is the authority required to grant and revoke privileges
      on objects within a specific database. Some of these privileges include
      BINDADD, CONNECT, CREATETAB, CREATE_EXTERNAL_ROUTINE, LOAD, and
      QUIESCE_CONNECT. It has no inherent privilege to access data stored in tables,
      except the catalog tables and views. The ACCESSCTRL authority cannot be
      granted to PUBLIC.
    rationale: >
      The ACCESSCTRL authority gives the grantee access control to a specified
      database. With this authority, the grantee can grant/revoke privileges to
      other users. ACCESSCTRL can be granted to users, groups, or roles, but not
      PUBLIC. ACCESSCTRL authority can only be granted by the SECADM authority.
    audit_procedure: >
      1. Run the following command: db2 => select distinct grantee, granteetype from
      syscat.dbauth where accessctrlauth = 'Y' 2. Review the list of users, groups,
      and roles in the above output to ensure only approved users, groups, and roles
      are assigned.
    remediation: >
      Revoke ACCESSCTRL authority from any unauthorized users. db2 => REVOKE
      ACCESSCTRL ON DATABASE FROM USER <username> References: 1.
      https://www.ibm.com/docs/en/db2/11.5?topic=authorities-access-control-
      authority-accessctrl
