    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      The NUM_DB_BACKUPS parameter specifies the number of backups to retain for a
      database before marking the oldest backup as deleted. It is recommended that
      this parameter be set to at least 12.
    rationale: >
      Retain multiple copies of the database backup to ensure that the database can
      recover from an unexpected failure. This parameter should not be set to 0.
      Multiple backups should be kept ensuring that all logs and transactions can be
      used for auditing.
    audit_procedure: >
      Perform the following Db2 commands to obtain the value for this setting: 1.
      Connect to the Db2 database. db2 => connect to <dbname> 2. Run the following
      command: db2 => get database configuration 3. Locate the NUM_DB_BACKUPS value
      in the output: Number of database backups to retain (NUM_DB_BACKUPS) = 12
    remediation: >
      1. Connect to the Db2 database db2 => connect to <dbname> 2. Run the following
      command: db2 => update database configuration using num_db_backups 12
