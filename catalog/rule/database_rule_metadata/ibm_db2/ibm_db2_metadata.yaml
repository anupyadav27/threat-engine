    cis_section: "8"
    profile_applicability: "Level 1"
    description: >
      The SSL_VERSIONS database manager configuration parameter controls which
      versions of the TLS protocol Db2 enables. In Db2 11.5 and earlier, TLS 1.0 and
      1.1 are enabled by default if SSL_VERSIONS is not set.
    rationale: >
      TLS 1.0 and 1.1 are considered insecure and have been deprecated as of Db2
      11.5. It is recommended to use TLS 1.2
    audit_procedure: >
      Perform the following to determine if SSL_VERSIONS is set. 1. Attach to the
      Db2 instance. db2 => attach to <db2instance> 2. Run the following command: db2
      => get database manager configuration 3. Locate the value of SSL_VERSIONS in
      the output: SSL versions (SSL_VERSIONS) =
    remediation: >
      Perform the following to set SSL_VERSIONS: 1. Attach to the Db2 instance. db2
      => attach to <db2instance> 2. Run the following command to enable TLS 1.2
      within the Db2 server. db2 => update dbm cfg using SSL_VERSIONS TLSV12 Db2
      must be recycled (db2stop/db2start) for changes to SSL_VERSIONS to take
      effect.
