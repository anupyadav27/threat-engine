  - rule_id: ibm_db2.cis.4.review_system_tablespaces
    title: "Review System Tablespaces"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: automated
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "4.5.3"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      System tablespaces store all system object data within that database. It is
      recommended that system tablespaces are used to store system data only and not
      user data. Only certain table spaces can be used to hold user tables.
    rationale: >
      Users should not have privileges to create user data objects within the system
      tablespaces. User data objects created within the system tablespaces should be
      removed.
    audit_procedure: >
      1. Connect to the Db2 database. db2 => connect to <dbname> 2. Run the
      following command: db2 => select tabschema,tabname,tbspace from syscat.tables
      where tabschema not in ('SYSIBM','SYSTOOLS') and tbspace in
      ('SYSTOOLSPACE','SYSTOOLSTMPSPACE') 3. Review the list of system tablespaces.
      If the output is BLANK, that is considered a Pass.
    remediation: >
      1. Connect to the Db2 database. db2 => connect to <dbname> 2. Review the
      system tablespaces to identify any user data objects within them. 3. Drop,
      migrate, or otherwise remove all user data objects (tables, schemas, etc.)
      from within the system tablespaces. 4. Revoke write access for the system
      tablespaces from all users. 5 Authentication Considerations
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_IBM_DB2_11_v1_1_0_4_5_3"
