  - rule_id: ibm_db2.cis.3.secure_permissions_for_default_database_file_path
    title: "Secure Permissions for Default Database File Path (DFTDBPATH)"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: automated
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "3.1.2"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The DFTDBPATH parameter contains the default file path used to create Db2
      databases. It is recommended that the permissions for this directory be set to
      full access for Db2 administrators and read and execute access only for all
      other accounts. It is also recommended that this directory be owned by the Db2
      Administrator.
    rationale: >
      Restricting access to the directory used as the default file path through
      permissions will help ensure that the confidentiality, integrity, and
      availability of the files there are protected.
    audit_procedure: >
      For Windows and Linux: 1. Attach to the Db2 instance. db2 => attach to
      <db2instance> 2. Run the following command from the Db2 command window: db2 =>
      get database manager configuration 3. Locate this value in the output to find
      the default file path: Default database path (DFTDBPATH) = <valid directory>
      Additional steps for Windows: 1. Connect to the Db2 host 2. Right-click over
      the directory used for the default file path 3. Choose Properties 4. Select
      the Security tab 5. Review and verify the privileges for all accounts. 6.
      Review and verify that the Db2 Administrator is the owner of the directory.
      Additional steps for Linux: 1. Connect to the Db2 host 2. Change to the
      directory used as the default file path 3. Review and verify the permissions
      for the directory for all users; also ensure that the Db2 Administrator is the
      owner. $ ls -al
    remediation: >
      For Windows and Linux: 1. Attach to the Db2 instance. db2 => attach to
      <db2instance> 2. Run the following command to change the default file path, if
      necessary: db2 => update database manager configuration using dftdbpath <valid
      directory> Additional steps for Windows: 1. Connect to the Db2 host 2. Right-
      click over the directory used as the default file path 3. Choose Properties 4.
      Select the Security tab 5. Assign ownership of the directory to the Db2
      Administrator 6. Grant all Db2 administrator accounts the Full Control
      authority 7. Grant only read and execute privileges to all other users (revoke
      all other privileges) Additional steps for Linux: 1. Connect to the Db2 host
      2. Change to the directory used as the default file path 3. Assign the Db2
      Administrator to be the owner of the directory using the chown command 4.
      Change the permissions for the directory $ chmod -R 755
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_IBM_DB2_11_v1_1_0_3_1_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_ibm_db2_11_v1_1_0_3_1_2"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: ibm_db2.cis.3.set_diagnostic_logging_to_capture_errors_and
    title: "Set Diagnostic Logging to Capture Errors and Warnings (DIAGLEVEL)"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: automated
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "3.1.3"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The DIAGLEVEL parameter specifies the type of diagnostic errors that will be
      recorded in the db2diag.log file. It is recommended that the DIAGLEVEL
      parameter be set to at least 3.
    rationale: >
      The recommended DIAGLEVEL setting is 3, but any value greater than 3 is also
      acceptable. A value of at least 3 will allow the Db2 instance to capture all
      errors and warnings that occur on the system.
    audit_procedure: >
      Perform the following Db2 commands to obtain the value for this setting: 1.
      Attach to the Db2 instance. db2 => attach to <db2instance> 2. Run the
      following command: db2 => get database manager configuration 3. Locate the
      DIAGLEVEL value in the output: Diagnostic error capture level (DIAGLEVEL) = 3
      Ensure DIAGLEVEL is greater than or equal to 3.
    remediation: >
      1. Attach to the Db2 instance db2 => attach to <db2instance> 2. Run the
      following command: db2 => update database manager configuration using
      diaglevel 3
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_IBM_DB2_11_v1_1_0_3_1_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_ibm_db2_11_v1_1_0_3_1_3"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: ibm_db2.cis.3.secure_permissions_for_all_diagnostic_logs
    title: "Secure Permissions for All Diagnostic Logs (DIAGPATH)"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: automated
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "3.1.4"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The DIAGPATH parameter specifies the location of the diagnostic files for the
      Db2 instance. The directory at this location should be secured so that users
      have read and execute privileges only (no write privileges). All Db2
      administrators should have full access to the directory.
    rationale: >
      Securing the directory will ensure that the confidentiality, integrity, and
      availability of the diagnostic files contained in the directory are preserved.
    audit_procedure: >
      For both Windows and Linux Perform the following Db2 commands to obtain the
      location of the directory: 1. Attach to the Db2 instance. db2 => attach to
      <db2instance> 2. Run the following command: db2 => get database manager
      configuration 3. Locate the DIAGPATH value in the output: Diagnostic data
      directory path (DIAGPATH) = <valid directory> Additional steps for Windows: 1.
      Connect to the Db2 host 2. Right-click over the diagnostic log directory 3.
      Choose Properties 4. Select the Security tab 5. Review the access for all
      accounts Additional steps for Linux: 1. Connect to the Db2 host 2. Change to
      the diagnostic log directory 3. Review the permissions of the directory $ ls
      -al
    remediation: >
      For Windows and Linux To change the directory for the diagnostic logs: 1.
      Attach to the Db2 instance db2 => attach to <db2instance> 2. Run the following
      command: db2 => update database manager configuration using diagpath <valid
      directory> Additional steps for Windows: 1. Connect to the Db2 host 2. Right-
      click over the diagnostic log directory 3. Choose Properties 4. Select the
      Security tab 5. Grant the Full Control authority to all Db2 administrator
      accounts 6. Grant only read and execute privileges to all other accounts
      (revoke any other privileges) Additional steps for Linux: 1. Connect to the
      Db2 host 2. Change to the diagnostic log directory 3. Change the permissions
      of the directory $ chmod -R 3777 .
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_IBM_DB2_11_v1_1_0_3_1_4"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_ibm_db2_11_v1_1_0_3_1_4"
    metadata_source: generated
    generated_by: generate_tech_rules

