  - rule_id: ibm_db2.cis.5.db2auth_registry_variable
    title: "DB2AUTH Registry Variable"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: manual
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "5.10"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The DB2AUTH registry variable is used to control various authentication
      related behaviors in Db2. The following settings are recommended for this
      registry variable: 1. Use DISABLE_CHGPASS which disables the ability to change
      a user's password from the client. 2. Use JCC_ENFORCE_SECMEC which enforces
      that the Db2 server does not accept a clear text password security mechanism
      when using SERVER_ENCRYPT authentication type. 3. If CLIENT authentication is
      being used which is not recommended as discussed in section 6.2, it is also
      recommended to set this registry variable to TRUSTEDCLIENT_SRVENC and not
      TRUSTEDCLIENT_DATAENC. TRUSTEDCLIENT_SRVENC forces untrusted clients to use
      SERVER_ENCRYPT authentication type while TRUSTEDCLIENT_DATAENC forces them to
      use DATA_ENCRYPT. If DB2AUTH is not set to DISABLE_CHGPASS, refer to the
      DB2CHGPWD_EEE registry variable section which specifies whether users are able
      to change passwords through Db2 in a partitioned database environment.
    rationale: >
      1. Allowing a client to change a user's password through Db2 commands is not
      recommended since Db2 may not enforce the expected password change rules. In
      addition, the password change requests going through Db2 may not be audited as
      expected. 2. Plain text passwords sent across an unsecure network are exposed
      and can be intercepted by a malicious user. 3. DATA_ENCRYPT is deprecated
      since it uses DES encryption algorithm which is cryptographically weak.
      Furthermore, enforcing SERVER_ENCRYPT ensures that the user ID and password
      are encrypted when sent from the client to the server.
    audit_procedure: >
      Verify that the DB2AUTH registry variable is set to the appropriate values by
      running the following command: db2set -all
    remediation: >
      Run the following command to set the DB2AUTH registry variable to the
      appropriate values: db2set DB2AUTH= <comma separated values>
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_IBM_DB2_11_v1_1_0_5_10"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_ibm_db2_11_v1_1_0_5_10"
    metadata_source: generated
