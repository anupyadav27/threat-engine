  - rule_id: ibm_db2.cis.4.set_maximum_number_of_applications_maxappls
    title: "Set Maximum Number of Applications (MAXAPPLS)"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: automated
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "4.1.12"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      The MAXAPPLS parameter specifies the maximum number of concurrent applications
      that can be connected (both local and remote) to a database. In an instance
      with a single database, it is recommended that this value be set to AUTOMATIC.
      While this indicates that any number of connections should be allowed, an
      upper limit of MAX_CONNECTIONS database manager configuration parameter is
      still enforced. If there are multiple databases within the instance, then the
      sum of MAXAPPLS for each database should be less than or equal to
      MAX_CONNECTIONS. When AUTOMATIC is used, MAXAPPLS can also have a parameter.
      The value is not used to determine the maximum number of connections, but
      rather for dependent parameters, such as PCKCACHESZ and CATALOG_CACHESZ that
      can derive their value from MAXAPPLS. In such a case the value specified with
      AUTOMATIC should represent the expected number of connections.
    rationale: >
      By default, Db2 allows an unlimited number of users to access the Db2
      instance. In addition to giving access to the Db2 instance to authorized users
      only, it is recommended to set a limit to the number of users allowed to
      access a Db2 instance. This helps prevent denial of service conditions should
      an authorized process malfunction and attempt many simultaneous connections.
      Impact: Increasing the value of this parameter without lowering the MAXLOCKS
      parameter or increasing the LOCKLIST parameter could cause you to reach the
      database limit on locks (LOCKLIST) rather than the application limit and as a
      result cause pervasive lock escalation problems.
    audit_procedure: >
      Perform the following Db2 commands to obtain the value of the MAXAPPLS
      parameter: 1. Connect to the Db2 database. db2 => connect to <dbname> 2. Run
      the following command: db2 => get database configuration 3. Locate the
      MAXAPPLS value in the output: Max Number of Active Applications (MAXAPPLS) =
      AUTOMATIC(40)
    remediation: >
      1. Connect to the Db2 database db2 => connect to <dbname> 2. If a single
      database is used in the instance, run the following command: db2 => update
      database configuration using maxappls AUTOMATIC 3. If multiple databases are
      used in the instance, determine appropriate values for each database such that
      the sum of MAXAPPLS values equals the MAX_CONNECTIONS database manager
      configuration parameter value (for example 100 for each of 2 databases when
      MAX_CONNECTIONS is 200), and run the following command: db2 => update database
      configuration using maxappls 200 References: 1.
      https://www.ibm.com/docs/en/db2/11.5?topic=parameters-maxappls-maximum-
      number-active-applications
    references: >
      1. https://www.ibm.com/docs/en/db2/11.5?topic=parameters-maxappls-maximum-
      number-active-applications
    impact: >
      Increasing the value of this parameter without lowering the MAXLOCKS parameter
      or increasing the LOCKLIST parameter could cause you to reach the database
      limit on locks (LOCKLIST) rather than the application limit and as a result
      cause pervasive lock escalation problems.
    compliance_mappings:
      cis:
        - "CIS_IBM_DB2_11_v1_1_0_4_1_12"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_ibm_db2_11_v1_1_0_4_1_12"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: ibm_db2.cis.4.a_secure_connect_procedure_is_used_connect_proc
    title: "Ensure a Secure Connect Procedure is Used (CONNECT_PROC)"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: manual
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "4.1.13"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      The CONNECT_PROC stored procedure runs as part of every connection to the
      database and allows customization of the application environment, such as
      setting special registers. It could for example, set the CURRENT_PATH special
      register which controls the search path for finding functions and procedures
      to execute. Only an authorized procedure should be used.
    rationale: >
      The CONNECT_PROC procedure could be used to modify the application environment
      within the connection causing unexpected behavior.
    audit_procedure: >
      Perform the following Db2 commands to determine if a CONNECT_PROC procedure is
      being used: 1. Connect to the Db2 database. db2 => connect to <dbname> 2. Run
      the following command: db2 => get database configuration 3. Locate the
      CONNECT_PROC value in the output: Connect procedure (CONNECT_PROC) = If the
      value is not set, this is a Pass. If a value is set, it should be reviewed to
      ensure it is an appropriate procedure to be run for every connection.
    remediation: >
      To turn off the connect proc, perform the following commands: 1. Connect to
      the Db2 database db2 => connect to <dbname> 2. Run the following command: db2
      => update database configuration using connect_proc NULL IMMEDIATE References:
      1. https://www.ibm.com/docs/en/db2/11.5?topic=parameters-connect-proc-connect-
      procedure-name-database 2.
      https://www.ibm.com/docs/en/db2/11.5?topic=databases-customizing- application-
      environment-using-connect-procedure
    references: >
      1. https://www.ibm.com/docs/en/db2/11.5?topic=parameters-connect-proc-connect-
      procedure-name-database 2.
      https://www.ibm.com/docs/en/db2/11.5?topic=databases-customizing- application-
      environment-using-connect-procedure
    impact: >
      
    compliance_mappings:
