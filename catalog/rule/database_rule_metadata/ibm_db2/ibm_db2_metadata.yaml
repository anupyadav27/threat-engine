  - rule_id: ibm_db2.cis.3.set_administrative_notification_level_notifylevel
    title: "Set Administrative Notification Level (NOTIFYLEVEL)"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: automated
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "3.1.9"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The NOTIFYLEVEL parameter specifies the type of administration notification
      messages that are written to the administration notification log. It is
      recommended that this parameter be set greater than or equal to 3. A setting
      of 3, which includes settings 1 & 2, will log all fatal errors, failing
      services, system integrity, as well as system health.
    rationale: >
      The system should be monitoring all Health Monitor alarms, warnings, and
      attentions. This may give an indication of any malicious usage on the Db2
      instance.
    audit_procedure: >
      Perform the following Db2 commands to obtain the value for this setting: 1.
      Attach to the Db2 instance. db2 => attach to <db2instance> 2. Run the
      following command: db2 => get database manager configuration 3. Locate the
      NOTIFYLEVEL value in the output: Notify Level (NOTIFYLEVEL) = 3
    remediation: >
      1. Attach to the Db2 instance db2 => attach to <db2instance> 2. Run the
      following command: db2 => update database manager configuration using
      notifylevel 3 Default Value: The default value of NOTIFYLEVEL is 3.
