  - rule_id: ibm_db2.cis.4.restrict_access_to_sysproc_auth_list_authorities
    title: "Restrict Access to SYSPROC.AUTH_LIST_AUTHORITIES_FOR_AUTHID"
    severity: high
    category: database
    tech_type: ibm_db2
    automation_type: automated
    cis_benchmark: "CIS_IBM_DB2 11_v1.1.0"
    cis_version: "11_v1.1.0"
    cis_control: "4.4.4"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      The table function SYSPROC.AUTH_LIST_AUTHORITIES_FOR_AUTHID returns the
      instance and database authorities for the specified authorization ID. In a
      non-restrictive database this table function has EXECUTE granted to public. It
      is recommended that public should not be able to execute this routine.
    rationale: >
      A malicious user may use this function to conduct information gathering
      regarding users that have high level authorities.
    audit_procedure: >
      Perform the following Db2 commands to check if PUBLIC has EXECUTE on this
      routine: 1. Connect to the Db2 database. db2 => connect to <dbname> 2. Run the
      following command: db2 => select grantee from syscat.routineauth where schema
      = 'SYSPROC' and specificname = 'AUTH_LIST_AUTHORITIES_FOR_AUTHID' and grantee
      = 'PUBLIC' 3. If the output contains zero rows, then it is considered a Pass.
      Otherwise, PUBLIC has EXECUTE privilege and the remediation steps should be
      followed.
    remediation: >
      Perform the following to revoke access from PUBLIC. 1. Connect to the Db2
      database. db2 => connect to <dbname> 2. Run the following command: db2 =>
      revoke EXECUTE on function SYSPROC.AUTH_LIST_AUTHORITIES_FOR_AUTHID from
      public RESTRICT References: 1.
      https://www.ibm.com/docs/en/db2/11.5?topic=views-auth-list-authorities-authid-
      returns-list-agents
    references: >
