rule_id: alicloud.ecs.audit.create_image
service: compute
provider: alicloud
check_type: log
severity: medium
title: Monitor ECS custom image creation and OOS template executions that could introduce
  untested diagnostic programs.
description: Monitors custom image creation and OOS executions.
rationale: Monitoring this activity is essential for detecting adversary persistence
  against ALICLOUD resources. Unauthorized or unexpected API calls may indicate account
  compromise, privilege escalation, or an active attack chain.
threat_category: persistence
mitre_tactics:
- persistence
mitre_techniques:
- T1525
risk_score: 73
resource: cloud_compute_instance
source: csv_generated
is_active: true
domain: logging_monitoring_and_alerting
action_category: create
log_source_type: alicloud_actiontrail
posture_category: threat_posture
threat_tags:
- T1525
- persistence
- ciem_detection
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  nist_800_171:
  - 3.7.4
remediation: '1. Remove the unauthorized resource (user, key, image, account) immediately.

  2. Audit all resources created by the same principal.

  3. Restrict resource creation to approved provisioning pipelines.

  4. Add detection for resource creation outside of business hours or from unusual
  IPs.

  5. Review SCPs and permission boundaries to limit persistence mechanisms.'
references:
- https://attack.mitre.org/techniques/T1525/
- https://www.alibabacloud.com/help/en/ram/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: alicloud_actiontrail
    - field: service
      op: equals
      value: ecs
    - field: operation
      op: in
      value:
      - CreateImage
      - CreateCustomImage
  type: log
  version: '1.0'
