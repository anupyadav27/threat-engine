rule_id: alicloud.compute.actiontrail.modify_instance_metadata
service: compute
provider: alicloud
check_type: log
severity: high
title: 'AliCloud ECS: Instance Metadata Service Config Changed'
description: IMDSv2-equivalent settings on an ECS instance were modified. Disabling
  token-required metadata access re-enables SSRF-based credential theft.
rationale: Monitoring this operation is essential for detecting adversary activity
  targeting AliCloud resources. Unauthorized or unexpected API calls may indicate
  account compromise, privilege escalation, or an active attack chain in progress.
threat_category: credential_access
mitre_tactics:
- credential_access
mitre_techniques:
- T1552.005
risk_score: 82
resource: alicloud_ecs_instance
source: alicloud_ciem_generator
is_active: true
domain: compute_and_workload_security
action_category: modify
log_source_type: alicloud_actiontrail
posture_category: workload_posture
threat_tags:
- T1552.005
- credential_access
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  alicloud_sec_baseline:
  - '8.1'
  - '8.2'
  nist_800_53_r5:
  - CM-2
  - CM-7
  - SC-7
  pci_dss_v4:
  - '6.3'
  - '6.4'
  iso_27001_2022:
  - A.8.9
  - A.8.25
remediation: '1. Re-enable enhanced metadata token requirements on all instances.

  2. Alert on metadata service configuration changes.

  3. Block metadata endpoint access from untrusted processes via network policy.'
references:
- https://attack.mitre.org/techniques/T1552/005/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: alicloud_actiontrail
    - field: service
      op: equals
      value: ecs
    - field: operation
      op: equals
      value: ModifyInstanceMetadataOptions
version: '1.0'
