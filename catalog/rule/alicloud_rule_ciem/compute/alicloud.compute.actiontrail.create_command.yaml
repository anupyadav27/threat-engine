rule_id: alicloud.compute.actiontrail.create_command
service: compute
provider: alicloud
check_type: log
severity: medium
title: 'AliCloud ECS: Cloud Assistant Command Created'
description: A new Cloud Assistant command script was created. Pre-staging malicious
  commands before invocation is a common technique to reduce noise at execution time.
rationale: Monitoring this operation is essential for detecting adversary activity
  targeting AliCloud resources. Unauthorized or unexpected API calls may indicate
  account compromise, privilege escalation, or an active attack chain in progress.
threat_category: execution
mitre_tactics:
- execution
mitre_techniques:
- T1651
risk_score: 60
resource: alicloud_ecs_command
source: alicloud_ciem_generator
is_active: true
domain: compute_and_workload_security
action_category: create
log_source_type: alicloud_actiontrail
posture_category: workload_posture
threat_tags:
- T1651
- execution
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  alicloud_sec_baseline:
  - '8.1'
  - '8.2'
  nist_800_53_r5:
  - CM-2
  - CM-7
  - SC-7
  pci_dss_v4:
  - '6.3'
  - '6.4'
  iso_27001_2022:
  - A.8.9
  - A.8.25
remediation: '1. Audit created commands for suspicious content (base64, curl, wget,
  chmod).

  2. Restrict CreateCommand to authorized admin roles.

  3. Enable command content scanning.'
references:
- https://attack.mitre.org/techniques/T1651/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: alicloud_actiontrail
    - field: service
      op: equals
      value: ecs
    - field: operation
      op: equals
      value: CreateCommand
version: '1.0'
