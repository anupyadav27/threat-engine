rule_id: alicloud.compute.actiontrail.start_instance
service: compute
provider: alicloud
check_type: log
severity: low
title: 'AliCloud ECS: Stopped Instance Started'
description: A previously stopped ECS instance was started. Adversaries may start
  instances to use dormant credentials, access stored data, or use compute resources
  for crypto mining.
rationale: Monitoring this operation is essential for detecting adversary activity
  targeting AliCloud resources. Unauthorized or unexpected API calls may indicate
  account compromise, privilege escalation, or an active attack chain in progress.
threat_category: resource_hijacking
mitre_tactics:
- execution
mitre_techniques:
- T1496
risk_score: 35
resource: alicloud_ecs_instance
source: alicloud_ciem_generator
is_active: true
domain: compute_and_workload_security
action_category: modify
log_source_type: alicloud_actiontrail
posture_category: workload_posture
threat_tags:
- T1496
- execution
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  alicloud_sec_baseline:
  - '8.1'
  - '8.2'
  nist_800_53_r5:
  - CM-2
  - CM-7
  - SC-7
  pci_dss_v4:
  - '6.3'
  - '6.4'
  iso_27001_2022:
  - A.8.9
  - A.8.25
remediation: '1. Verify the instance start was authorized.

  2. Review instance CPU/network usage after start for mining indicators.

  3. Alert on instance starts outside business hours.'
references:
- https://attack.mitre.org/techniques/T1496/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: alicloud_actiontrail
    - field: service
      op: equals
      value: ecs
    - field: operation
      op: equals
      value: StartInstance
version: '1.0'
