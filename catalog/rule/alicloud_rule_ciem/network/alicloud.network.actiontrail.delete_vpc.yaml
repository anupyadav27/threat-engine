rule_id: alicloud.network.actiontrail.delete_vpc
service: network
provider: alicloud
check_type: log
severity: high
title: 'AliCloud VPC: VPC Deleted'
description: A VPC was deleted. Deleting production VPCs causes network isolation
  of all contained resources and is an impact/denial-of-service technique.
rationale: Monitoring this operation is essential for detecting adversary activity
  targeting AliCloud resources. Unauthorized or unexpected API calls may indicate
  account compromise, privilege escalation, or an active attack chain in progress.
threat_category: impact
mitre_tactics:
- impact
mitre_techniques:
- T1489
risk_score: 80
resource: alicloud_vpc
source: alicloud_ciem_generator
is_active: true
domain: network_security_and_connectivity
action_category: delete
log_source_type: alicloud_actiontrail
posture_category: network_posture
threat_tags:
- T1489
- impact
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  alicloud_sec_baseline:
  - '4.1'
  - '4.2'
  nist_800_53_r5:
  - SC-7
  - AC-17
  - CM-7
  pci_dss_v4:
  - '1.2'
  - '1.3'
  - '7.1'
  iso_27001_2022:
  - A.8.20
  - A.8.21
  - A.8.22
remediation: '1. Verify the deletion was authorized.

  2. If unauthorized, restore VPC configuration from IaC repository.

  3. Require approval workflow for VPC deletions in production.'
references:
- https://attack.mitre.org/techniques/T1489/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: alicloud_actiontrail
    - field: service
      op: equals
      value: vpc
    - field: operation
      op: equals
      value: DeleteVpc
version: '1.0'
