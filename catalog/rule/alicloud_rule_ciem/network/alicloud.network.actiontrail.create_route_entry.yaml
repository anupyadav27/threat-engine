rule_id: alicloud.network.actiontrail.create_route_entry
service: network
provider: alicloud
check_type: log
severity: high
title: 'AliCloud VPC: Route Table Entry Added'
description: A route was added to a VPC route table. Adversaries inject routes to
  redirect traffic through attacker-controlled endpoints (traffic hijacking).
rationale: Monitoring this operation is essential for detecting adversary activity
  targeting AliCloud resources. Unauthorized or unexpected API calls may indicate
  account compromise, privilege escalation, or an active attack chain in progress.
threat_category: lateral_movement
mitre_tactics:
- lateral_movement
mitre_techniques:
- T1557
risk_score: 75
resource: alicloud_route_table
source: alicloud_ciem_generator
is_active: true
domain: network_security_and_connectivity
action_category: create
log_source_type: alicloud_actiontrail
posture_category: network_posture
threat_tags:
- T1557
- lateral_movement
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  alicloud_sec_baseline:
  - '4.1'
  - '4.2'
  nist_800_53_r5:
  - SC-7
  - AC-17
  - CM-7
  pci_dss_v4:
  - '1.2'
  - '1.3'
  - '7.1'
  iso_27001_2022:
  - A.8.20
  - A.8.21
  - A.8.22
remediation: '1. Review the destination CIDR and next-hop of the new route.

  2. Flag any routes pointing to unrecognized instance or gateway IDs.

  3. Alert on route table changes in production VPCs.'
references:
- https://attack.mitre.org/techniques/T1557/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: alicloud_actiontrail
    - field: service
      op: equals
      value: vpc
    - field: operation
      op: equals
      value: CreateRouteEntry
version: '1.0'
