rule_id: alicloud.network.actiontrail.create_vpc
service: network
provider: alicloud
check_type: log
severity: medium
title: 'AliCloud VPC: New VPC Created'
description: A new VPC was created. Adversaries create VPCs to host attack infrastructure,
  pivot resources, or evade detection by operating in isolated networks.
rationale: Monitoring this operation is essential for detecting adversary activity
  targeting AliCloud resources. Unauthorized or unexpected API calls may indicate
  account compromise, privilege escalation, or an active attack chain in progress.
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1578.002
risk_score: 50
resource: alicloud_vpc
source: alicloud_ciem_generator
is_active: true
domain: network_security_and_connectivity
action_category: create
log_source_type: alicloud_actiontrail
posture_category: network_posture
threat_tags:
- T1578.002
- defense_evasion
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  alicloud_sec_baseline:
  - '4.1'
  - '4.2'
  nist_800_53_r5:
  - SC-7
  - AC-17
  - CM-7
  pci_dss_v4:
  - '1.2'
  - '1.3'
  - '7.1'
  iso_27001_2022:
  - A.8.20
  - A.8.21
  - A.8.22
remediation: '1. Confirm the VPC creation was part of an authorized deployment.

  2. Apply VPC flow logs to all new VPCs.

  3. Alert on VPC creation by non-infrastructure accounts.'
references:
- https://attack.mitre.org/techniques/T1578/002/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: alicloud_actiontrail
    - field: service
      op: equals
      value: vpc
    - field: operation
      op: equals
      value: CreateVpc
version: '1.0'
