rule_id: alicloud.database.actiontrail.create_db_instance
service: database
provider: alicloud
check_type: log
severity: medium
title: 'AliCloud RDS: Database Instance Created'
description: A new RDS database instance was created. Adversaries create DB instances
  to exfiltrate data by importing it into attacker-controlled databases.
rationale: Monitoring this operation is essential for detecting adversary activity
  targeting AliCloud resources. Unauthorized or unexpected API calls may indicate
  account compromise, privilege escalation, or an active attack chain in progress.
threat_category: collection
mitre_tactics:
- collection
mitre_techniques:
- T1530
risk_score: 50
resource: alicloud_rds_instance
source: alicloud_ciem_generator
is_active: true
domain: storage_and_database_security
action_category: create
log_source_type: alicloud_actiontrail
posture_category: data_security_posture
threat_tags:
- T1530
- collection
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: true
compliance_frameworks:
  alicloud_sec_baseline:
  - '6.1'
  - '6.2'
  nist_800_53_r5:
  - SC-28
  - AC-3
  - AU-9
  pci_dss_v4:
  - '3.4'
  - '6.2'
  - '10.2'
  iso_27001_2022:
  - A.8.10
  - A.8.24
remediation: '1. Confirm the DB instance was created by an authorized deployment pipeline.

  2. Ensure the instance is not publicly accessible.

  3. Alert on DB creation in non-standard regions or VPCs.'
references:
- https://attack.mitre.org/techniques/T1530/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: alicloud_actiontrail
    - field: service
      op: equals
      value: rds
    - field: operation
      op: equals
      value: CreateDBInstance
version: '1.0'
