rule_id: alicloud.logging.actiontrail.delete_alarm_rule
service: logging
provider: alicloud
check_type: log
severity: high
title: 'AliCloud CloudMonitor: Security Alarm Rule Deleted'
description: A CloudMonitor alarm rule was deleted. Removing alerts for suspicious
  operations prevents real-time detection of attacks.
rationale: Monitoring this operation is essential for detecting adversary activity
  targeting AliCloud resources. Unauthorized or unexpected API calls may indicate
  account compromise, privilege escalation, or an active attack chain in progress.
