rule_id: alicloud.logging.actiontrail.update_trail
service: logging
provider: alicloud
check_type: log
severity: high
title: 'AliCloud ActionTrail: Trail Configuration Modified'
description: An ActionTrail trail was reconfigured. Changing the trail's OSS destination
  or filtering settings can redirect or suppress audit logs.
rationale: Monitoring this operation is essential for detecting adversary activity
  targeting AliCloud resources. Unauthorized or unexpected API calls may indicate
  account compromise, privilege escalation, or an active attack chain in progress.
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1562.008
risk_score: 80
resource: alicloud_actiontrail_trail
source: alicloud_ciem_generator
is_active: true
domain: logging_monitoring_and_alerting
action_category: modify
log_source_type: alicloud_actiontrail
posture_category: threat_posture
threat_tags:
- T1562.008
- defense_evasion
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  alicloud_sec_baseline:
  - '1.1'
  - '1.2'
  - '1.3'
  nist_800_53_r5:
  - AU-2
  - AU-6
  - AU-12
  - SI-4
  pci_dss_v4:
  - '10.1'
  - '10.2'
  - '10.3'
  iso_27001_2022:
  - A.8.15
  - A.8.16
  - A.5.28
remediation: '1. Review what changed — destination bucket, event filter, or region
  scope.

  2. Confirm changes were made by the security team.

  3. Alert on trail updates; require change management tickets.'
references:
- https://attack.mitre.org/techniques/T1562/008/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: alicloud_actiontrail
    - field: service
      op: equals
      value: actiontrail
    - field: operation
      op: equals
      value: UpdateTrail
version: '1.0'
