rule_id: alicloud.ciem.chain.privilege_escalation_via_role_assumption
service: ciem
provider: alicloud
check_type: log
severity: critical
title: 'AliCloud CIEM: Role Created with Broad Trust then Assumed'
description: 'Correlated attack chain: a RAM role with broad trust policy was created,
  then immediately assumed via STS. Classic privilege escalation via role trust policy
  manipulation.'
rationale: Monitoring this operation is essential for detecting adversary activity
  targeting AliCloud resources. Unauthorized or unexpected API calls may indicate
  account compromise, privilege escalation, or an active attack chain in progress.
threat_category: privilege_escalation
mitre_tactics:
- privilege_escalation
mitre_techniques:
- T1098.003
- T1550.001
risk_score: 96
resource: alicloud_ram_role
source: alicloud_ciem_generator
is_active: true
domain: identity_and_access_management
action_category: privilege_escalation
log_source_type: alicloud_actiontrail
posture_category: iam_posture
threat_tags:
- T1098.003
- T1550.001
- privilege_escalation
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  alicloud_sec_baseline:
  - '2.1'
  - '2.2'
  - '2.3'
  nist_800_53_r5:
  - AC-2
  - AC-3
  - AC-6
  - IA-2
  - IA-5
  pci_dss_v4:
  - '7.1'
  - '8.2'
  - '10.2'
  iso_27001_2022:
  - A.5.18
  - A.8.2
  - A.9.2
remediation: '1. Revoke the STS session tokens from the AssumeRole call.

  2. Delete or restrict the newly created role''s trust policy.

  3. Investigate what actions were taken with the assumed role.'
references:
- https://attack.mitre.org/techniques/T1098/003/
- https://attack.mitre.org/techniques/T1550/001/
check_config:
  events:
  - conditions:
      all:
      - field: source_type
        op: equals
        value: alicloud_actiontrail
      - field: service
        op: equals
        value: ram
      - field: operation
        op: equals
        value: CreateRole
  - conditions:
      all:
      - field: source_type
        op: equals
        value: alicloud_actiontrail
      - field: service
        op: equals
        value: sts
      - field: operation
        op: equals
        value: AssumeRole
  type: sequence
  window_seconds: 300
version: '1.0'
