rule_id: alicloud.ciem.correlation.defense_evasion_then_exfil
service: ciem
provider: alicloud
check_type: log
severity: critical
title: 'AliCloud CIEM: Logging Disabled then Data Access'
description: 'Correlated defense evasion + data exfiltration: ActionTrail logging
  was stopped or a trail deleted, followed by OSS bucket policy changes or snapshot
  sharing — classic pre-exfil pattern.'
rationale: Monitoring this operation is essential for detecting adversary activity
  targeting AliCloud resources. Unauthorized or unexpected API calls may indicate
  account compromise, privilege escalation, or an active attack chain in progress.
threat_category: data_exfiltration
mitre_tactics:
- defense_evasion
- exfiltration
mitre_techniques:
- T1562.008
- T1537
risk_score: 98
resource: alicloud_actiontrail_trail
source: alicloud_ciem_generator
is_active: true
domain: threat_detection_and_incident_response
action_category: delete
log_source_type: alicloud_actiontrail
posture_category: threat_posture
threat_tags:
- T1562.008
- T1537
- defense_evasion
- exfiltration
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  alicloud_sec_baseline:
  - '1.1'
  - '1.2'
  - '1.3'
  nist_800_53_r5:
  - AU-2
  - AU-6
  - AU-12
  - SI-4
  pci_dss_v4:
  - '10.1'
  - '10.2'
  - '10.3'
  iso_27001_2022:
  - A.8.15
  - A.8.16
  - A.5.28
remediation: '1. Treat this as an active incident — isolate the actor''s credentials.

  2. Restore ActionTrail logging immediately.

  3. Audit all data access in the logging gap window.

  4. Engage incident response team.'
references:
- https://attack.mitre.org/techniques/T1562/008/
- https://attack.mitre.org/techniques/T1537/
check_config:
  type: correlation
  for_each: log_events
  match_by: actor.principal
  sequence:
  - any_of:
    - alicloud.logging.actiontrail.delete_trail
    - alicloud.logging.actiontrail.stop_logging
  - any_of:
    - alicloud.objectstorage.actiontrail.put_bucket_policy
    - alicloud.datasec.actiontrail.share_snapshot
    - alicloud.objectstorage.actiontrail.put_bucket_acl_public
  time_window_minutes: 120
  min_events: 2
version: '1.0'
