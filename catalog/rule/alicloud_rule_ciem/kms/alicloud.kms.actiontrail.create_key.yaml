rule_id: alicloud.kms.actiontrail.create_key
service: kms
provider: alicloud
check_type: log
severity: medium
title: 'AliCloud KMS: KMS Key Created'
description: A new KMS key was created. Monitor to detect unauthorized key creation
  that may be used to re-encrypt data for ransom or for unauthorized cryptographic
  operations.
rationale: Monitoring this operation is essential for detecting adversary activity
  targeting AliCloud resources. Unauthorized or unexpected API calls may indicate
  account compromise, privilege escalation, or an active attack chain in progress.
threat_category: collection
mitre_tactics:
- collection
mitre_techniques:
- T1560
risk_score: 50
resource: alicloud_kms_key
source: alicloud_ciem_generator
is_active: true
domain: secrets_and_key_management
action_category: create
log_source_type: alicloud_actiontrail
posture_category: secrets_posture
threat_tags:
- T1560
- collection
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  alicloud_sec_baseline:
  - '3.1'
  - '3.2'
  nist_800_53_r5:
  - SC-12
  - SC-28
  - IA-5
  pci_dss_v4:
  - '3.5'
  - '3.6'
  iso_27001_2022:
  - A.8.24
  - A.8.25
remediation: '1. Validate the key creation was part of an approved deployment.

  2. Tag all keys with owner and purpose for lifecycle management.

  3. Alert on key creation outside approved automation accounts.'
references:
- https://www.alibabacloud.com/help/en/kms/user-guide/cmk-overview
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: alicloud_actiontrail
    - field: service
      op: equals
      value: kms
    - field: operation
      op: equals
      value: CreateKey
version: '1.0'
