rule_id: alicloud.kms.actiontrail.delete_secret
service: kms
provider: alicloud
check_type: log
severity: high
title: 'AliCloud KMS: Secret Deleted from Secrets Manager'
description: A secret was deleted from Secrets Manager. Deleting credentials can cause
  service disruptions and removes forensic evidence of what was stored.
rationale: Monitoring this operation is essential for detecting adversary activity
  targeting AliCloud resources. Unauthorized or unexpected API calls may indicate
  account compromise, privilege escalation, or an active attack chain in progress.
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
- impact
mitre_techniques:
- T1070
- T1531
risk_score: 75
resource: alicloud_kms_secret
source: alicloud_ciem_generator
is_active: true
domain: secrets_and_key_management
action_category: delete
log_source_type: alicloud_actiontrail
posture_category: secrets_posture
threat_tags:
- T1070
- T1531
- defense_evasion
- impact
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  alicloud_sec_baseline:
  - '3.1'
  - '3.2'
  nist_800_53_r5:
  - SC-12
  - SC-28
  - IA-5
  pci_dss_v4:
