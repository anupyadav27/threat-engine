rule_id: alicloud.kms.actiontrail.schedule_key_deletion
service: kms
provider: alicloud
check_type: log
severity: critical
title: 'AliCloud KMS: Key Scheduled for Deletion'
description: A KMS key was scheduled for deletion. Deleting keys destroys all data
  encrypted with them — a powerful ransomware-like impact attack.
rationale: Monitoring this operation is essential for detecting adversary activity
  targeting AliCloud resources. Unauthorized or unexpected API calls may indicate
  account compromise, privilege escalation, or an active attack chain in progress.
threat_category: impact
mitre_tactics:
- impact
mitre_techniques:
- T1485
risk_score: 95
resource: alicloud_kms_key
source: alicloud_ciem_generator
is_active: true
domain: secrets_and_key_management
action_category: delete
log_source_type: alicloud_actiontrail
posture_category: secrets_posture
threat_tags:
- T1485
- impact
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  alicloud_sec_baseline:
  - '3.1'
  - '3.2'
  nist_800_53_r5:
  - SC-12
  - SC-28
  - IA-5
  pci_dss_v4:
  - '3.5'
  - '3.6'
  iso_27001_2022:
  - A.8.24
  - A.8.25
remediation: '1. Cancel the key deletion immediately unless authorized.

  2. Identify all encrypted resources that would be affected.

  3. Require dual approval for key deletion operations.

  4. Enable KMS key deletion alerts.'
references:
- https://attack.mitre.org/techniques/T1485/
- https://www.alibabacloud.com/help/en/kms/user-guide/delete-a-cmk
check_config:
