rule_id: alicloud.kms.actiontrail.create_secret
service: kms
provider: alicloud
check_type: log
severity: medium
title: 'AliCloud KMS: Secret Created in Secrets Manager'
description: A new secret was created in KMS Secrets Manager. Monitor for unauthorized
  secret creation that may store stolen credentials for later retrieval.
rationale: Monitoring this operation is essential for detecting adversary activity
  targeting AliCloud resources. Unauthorized or unexpected API calls may indicate
  account compromise, privilege escalation, or an active attack chain in progress.
threat_category: credential_access
mitre_tactics:
- credential_access
mitre_techniques:
- T1555
risk_score: 55
resource: alicloud_kms_secret
source: alicloud_ciem_generator
is_active: true
domain: secrets_and_key_management
action_category: create
log_source_type: alicloud_actiontrail
posture_category: secrets_posture
threat_tags:
- T1555
- credential_access
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  alicloud_sec_baseline:
  - '3.1'
  - '3.2'
  nist_800_53_r5:
  - SC-12
  - SC-28
  - IA-5
  pci_dss_v4:
  - '3.5'
  - '3.6'
  iso_27001_2022:
  - A.8.24
  - A.8.25
remediation: '1. Confirm the secret was created by an authorized pipeline.

  2. Review secret access policies — restrict to minimum required principals.

  3. Alert on secret creation by non-service-account principals.'
references:
