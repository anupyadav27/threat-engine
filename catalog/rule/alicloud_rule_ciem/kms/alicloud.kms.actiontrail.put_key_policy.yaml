rule_id: alicloud.kms.actiontrail.put_key_policy
service: kms
provider: alicloud
check_type: log
severity: high
title: 'AliCloud KMS: Key Policy Modified'
description: A KMS key policy was updated. Adversaries add cross-account grant access
  to keys to exfiltrate data by decrypting it in an external account.
rationale: Monitoring this operation is essential for detecting adversary activity
  targeting AliCloud resources. Unauthorized or unexpected API calls may indicate
  account compromise, privilege escalation, or an active attack chain in progress.
threat_category: data_exfiltration
mitre_tactics:
- exfiltration
mitre_techniques:
- T1537
risk_score: 85
resource: alicloud_kms_key
source: alicloud_ciem_generator
is_active: true
domain: secrets_and_key_management
action_category: modify
log_source_type: alicloud_actiontrail
posture_category: secrets_posture
threat_tags:
- T1537
- exfiltration
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  alicloud_sec_baseline:
  - '3.1'
  - '3.2'
  nist_800_53_r5:
  - SC-12
  - SC-28
  - IA-5
  pci_dss_v4:
  - '3.5'
  - '3.6'
  iso_27001_2022:
  - A.8.24
  - A.8.25
remediation: '1. Review the updated key policy for cross-account principals.

  2. Remove any wildcard principals or external account grants.

  3. Require approval workflows for key policy changes.'
references:
- https://attack.mitre.org/techniques/T1537/
check_config:
