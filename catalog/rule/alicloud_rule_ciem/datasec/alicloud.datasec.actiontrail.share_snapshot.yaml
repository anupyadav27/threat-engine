rule_id: alicloud.datasec.actiontrail.share_snapshot
service: datasec
provider: alicloud
check_type: log
severity: critical
title: 'AliCloud ECS: Disk Snapshot Shared with External Account'
description: An ECS disk snapshot was shared with another Alibaba Cloud account. Sharing
  snapshots is a primary data exfiltration technique — copying all disk data to an
  external account.
rationale: Monitoring this operation is essential for detecting adversary activity
  targeting AliCloud resources. Unauthorized or unexpected API calls may indicate
  account compromise, privilege escalation, or an active attack chain in progress.
threat_category: data_exfiltration
mitre_tactics:
- exfiltration
mitre_techniques:
- T1537
risk_score: 95
resource: alicloud_ecs_snapshot
source: alicloud_ciem_generator
is_active: true
domain: data_protection_and_privacy
action_category: modify
log_source_type: alicloud_actiontrail
posture_category: data_security_posture
threat_tags:
- T1537
- exfiltration
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: true
compliance_frameworks:
  alicloud_sec_baseline:
  - '5.1'
  - '5.2'
  nist_800_53_r5:
  - SC-28
  - AC-3
  - AU-9
  pci_dss_v4:
  - '3.4'
  - '3.5'
  - '6.3'
  iso_27001_2022:
  - A.8.10
  - A.8.24
remediation: '1. Revoke the snapshot sharing immediately.

  2. Identify whether the target account is attacker-controlled.

  3. Alert on all snapshot share operations — they should be extremely rare.

  4. Use RAM policies to deny snapshot share operations in production.'
references:
- https://attack.mitre.org/techniques/T1537/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: alicloud_actiontrail
    - field: service
      op: equals
      value: ecs
    - field: operation
      op: equals
      value: ModifySnapshotAttribute
version: '1.0'
