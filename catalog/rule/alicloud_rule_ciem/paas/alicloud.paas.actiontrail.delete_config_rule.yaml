rule_id: alicloud.paas.actiontrail.delete_config_rule
service: paas
provider: alicloud
check_type: log
severity: high
title: 'AliCloud Config: Compliance Rule Deleted'
description: A Config compliance rule was deleted, removing a continuous compliance
  check. Adversaries delete rules before making non-compliant changes to avoid alerts.
rationale: Monitoring this operation is essential for detecting adversary activity
  targeting AliCloud resources. Unauthorized or unexpected API calls may indicate
  account compromise, privilege escalation, or an active attack chain in progress.
