rule_id: alicloud.paas.actiontrail.delete_event_rule
service: paas
provider: alicloud
check_type: log
severity: high
title: 'AliCloud EventBridge: Event Rule Deleted'
description: An EventBridge event rule was deleted. Removing rules that trigger security
  responses (e.g., auto-remediation) disables automated defenses.
rationale: Monitoring this operation is essential for detecting adversary activity
  targeting AliCloud resources. Unauthorized or unexpected API calls may indicate
  account compromise, privilege escalation, or an active attack chain in progress.
threat_category: defense_evasion
