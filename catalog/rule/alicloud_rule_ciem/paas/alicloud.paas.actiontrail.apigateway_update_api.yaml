rule_id: alicloud.paas.actiontrail.apigateway_update_api
service: paas
provider: alicloud
check_type: log
severity: medium
title: 'AliCloud API Gateway: API Backend Modified'
description: An API Gateway API's backend target was updated. Adversaries modify backends
  to redirect API traffic to attacker-controlled endpoints for credential harvesting.
rationale: Monitoring this operation is essential for detecting adversary activity
  targeting AliCloud resources. Unauthorized or unexpected API calls may indicate
  account compromise, privilege escalation, or an active attack chain in progress.
threat_category: credential_access
mitre_tactics:
- credential_access
- collection
mitre_techniques:
- T1557
risk_score: 65
resource: alicloud_apigateway_api
source: alicloud_ciem_generator
is_active: true
domain: application_and_api_security
action_category: modify
log_source_type: alicloud_actiontrail
posture_category: security_posture
threat_tags:
- T1557
- credential_access
- collection
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  alicloud_sec_baseline:
  - '4.1'
  - '4.2'
  nist_800_53_r5:
  - SC-7
  - AC-17
  - CM-7
  pci_dss_v4:
