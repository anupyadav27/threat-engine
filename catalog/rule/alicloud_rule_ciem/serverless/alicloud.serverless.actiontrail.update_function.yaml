rule_id: alicloud.serverless.actiontrail.update_function
service: serverless
provider: alicloud
check_type: log
severity: high
title: 'AliCloud FC: Function Code Updated'
description: An existing Function Compute function's code or configuration was updated.
  Adversaries hijack legitimate functions to execute malicious code under trusted
  identities.
rationale: Monitoring this operation is essential for detecting adversary activity
  targeting AliCloud resources. Unauthorized or unexpected API calls may indicate
  account compromise, privilege escalation, or an active attack chain in progress.
threat_category: supply_chain_compromise
mitre_tactics:
- execution
- persistence
mitre_techniques:
- T1648
risk_score: 80
resource: alicloud_fc_function
source: alicloud_ciem_generator
is_active: true
domain: compute_and_workload_security
action_category: modify
log_source_type: alicloud_actiontrail
posture_category: workload_posture
threat_tags:
- T1648
- execution
- persistence
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  alicloud_sec_baseline:
  - '8.1'
  - '8.2'
  nist_800_53_r5:
  - CM-2
  - CM-7
  - SC-7
  pci_dss_v4:
  - '6.3'
  - '6.4'
  iso_27001_2022:
  - A.8.9
  - A.8.25
remediation: '1. Diff the function code before and after the update.

  2. Alert on function updates outside approved CI/CD pipelines.

  3. Use function versioning and aliases to control production deployments.'
references:
- https://attack.mitre.org/techniques/T1648/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: alicloud_actiontrail
    - field: service
      op: equals
      value: fc
    - field: operation
      op: equals
      value: UpdateFunction
version: '1.0'
