rule_id: alicloud.sas.activity_log.backup_policy_delete
service: threat
provider: alicloud
check_type: log
severity: high
title: Detect deletion of Security Center (SAS) vulnerability backup policies or stopping
  of ActionTrail audit trails, indicating attempts to disrupt vulnera
description: Detects deletion of vulnerability backup policies or stopping of activity
  logs.
rationale: Monitoring this activity is essential for detecting adversary defense evasion
  against ALICLOUD resources. Unauthorized or unexpected API calls may indicate account
  compromise, privilege escalation, or an active attack chain.
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1562.008
risk_score: 82
resource: alicloud_threat_resource
source: csv_generated
is_active: true
domain: identity_and_access_management
action_category: delete
log_source_type: alicloud_actiontrail
posture_category: threat_posture
threat_tags:
- T1562.008
- T1562
- defense_evasion
- ciem_detection
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: high
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  pci_dss_v4:
  - 6.3.1
remediation: '1. Immediately investigate the principal that performed this action
  — treat as potentially compromised.

  2. Restore any disabled/deleted security controls (logging, agents, scanning).

  3. Review the full session context for lateral movement or data exfiltration following
  this action.

  4. Restrict the ability to disable security tools to break-glass roles with MFA
  enforcement.

  5. Add SCPs/Organization Policies to prevent non-authorized disablement of security
  controls.'
references:
- https://attack.mitre.org/techniques/T1562.008/
- https://www.alibabacloud.com/help/en/ram/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: alicloud_actiontrail
    - field: service
      op: equals
      value: sas
    - field: operation
      op: in
      value:
      - DeleteBackupPolicy
      - DeleteTrail
  type: log
  version: '1.0'
