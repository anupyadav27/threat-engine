rule_id: alicloud.threat.actiontrail.sas_delete_alert
service: threat
provider: alicloud
check_type: log
severity: high
title: 'AliCloud Security Center: Security Finding Deleted'
description: A Security Center finding was permanently deleted. Deleting findings
  removes evidence needed for incident investigation and compliance auditing.
rationale: Monitoring this operation is essential for detecting adversary activity
  targeting AliCloud resources. Unauthorized or unexpected API calls may indicate
  account compromise, privilege escalation, or an active attack chain in progress.
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1070
risk_score: 82
resource: alicloud_sas_alert
source: alicloud_ciem_generator
is_active: true
domain: threat_detection_and_incident_response
action_category: delete
log_source_type: alicloud_actiontrail
posture_category: threat_posture
threat_tags:
- T1070
- defense_evasion
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  alicloud_sec_baseline:
  - '1.1'
  - '1.2'
  - '1.3'
  nist_800_53_r5:
  - AU-2
  - AU-6
  - AU-12
  - SI-4
  pci_dss_v4:
  - '10.1'
  - '10.2'
  - '10.3'
  iso_27001_2022:
  - A.8.15
  - A.8.16
  - A.5.28
remediation: '1. Review the deleted finding details from backup logs.

  2. Alert on finding deletions by non-security-operations roles.

  3. Export Security Center findings to ActionTrail for immutable archival.'
references:
- https://attack.mitre.org/techniques/T1070/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: alicloud_actiontrail
    - field: service
      op: equals
      value: sas
    - field: operation
      op: equals
      value: DeleteAlarmEvent
version: '1.0'
