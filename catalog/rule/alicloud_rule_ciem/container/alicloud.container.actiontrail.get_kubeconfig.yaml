rule_id: alicloud.container.actiontrail.get_kubeconfig
service: container
provider: alicloud
check_type: log
severity: high
title: 'AliCloud ACK: Cluster Kubeconfig Downloaded'
description: A Kubernetes cluster kubeconfig was downloaded via DescribeClusterUserKubeconfig.
  Kubeconfigs contain credentials — exfiltrating one provides full kubectl access
  to the cluster.
rationale: Monitoring this operation is essential for detecting adversary activity
  targeting AliCloud resources. Unauthorized or unexpected API calls may indicate
  account compromise, privilege escalation, or an active attack chain in progress.
threat_category: credential_access
mitre_tactics:
- credential_access
mitre_techniques:
- T1552
- T1528
risk_score: 85
resource: alicloud_ack_cluster
source: alicloud_ciem_generator
is_active: true
domain: container_and_kubernetes_security
action_category: audit_activity
log_source_type: alicloud_actiontrail
posture_category: workload_posture
threat_tags:
- T1552
- T1528
- credential_access
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  alicloud_sec_baseline:
  - '7.1'
  - '7.2'
  nist_800_53_r5:
  - CM-7
  - AC-3
  - SC-28
  pci_dss_v4:
  - '6.3'
  - '6.4'
  iso_27001_2022:
  - A.8.9
  - A.8.25
remediation: '1. Audit who downloaded the kubeconfig and from where.

  2. Rotate cluster credentials if access was unauthorized.

  3. Use RAM-integrated kubectl authentication instead of long-lived kubeconfigs.'
references:
- https://attack.mitre.org/techniques/T1552/
- https://www.alibabacloud.com/help/en/ack/ack-managed-and-dedicated/user-guide/obtain-the-kubeconfig-file-of-a-cluster
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: alicloud_actiontrail
    - field: service
      op: equals
      value: cs
    - field: operation
      op: equals
      value: DescribeClusterUserKubeconfig
version: '1.0'
