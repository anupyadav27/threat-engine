rule_id: alicloud.container.actiontrail.push_image
service: container
provider: alicloud
check_type: log
severity: medium
title: 'AliCloud ACR: Container Image Pushed to Registry'
description: A container image was pushed to ACR. Adversaries inject malicious images
  into registries to compromise workloads that pull from them (supply chain attack).
rationale: Monitoring this operation is essential for detecting adversary activity
  targeting AliCloud resources. Unauthorized or unexpected API calls may indicate
  account compromise, privilege escalation, or an active attack chain in progress.
threat_category: supply_chain_compromise
mitre_tactics:
- execution
mitre_techniques:
- T1195.002
risk_score: 65
resource: alicloud_acr_repository
source: alicloud_ciem_generator
is_active: true
domain: container_and_kubernetes_security
action_category: create
log_source_type: alicloud_actiontrail
posture_category: workload_posture
threat_tags:
- T1195.002
- execution
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  alicloud_sec_baseline:
  - '7.1'
  - '7.2'
  nist_800_53_r5:
  - CM-7
  - AC-3
  - SC-28
  pci_dss_v4:
  - '6.3'
  - '6.4'
  iso_27001_2022:
  - A.8.9
  - A.8.25
remediation: '1. Enable image vulnerability scanning on push in ACR.

  2. Require image signing and enforce admission control in ACK.

  3. Alert on image pushes to production repositories outside CI/CD.'
references:
- https://attack.mitre.org/techniques/T1195/002/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: alicloud_actiontrail
    - field: service
      op: equals
      value: cr
    - field: operation
      op: equals
      value: PushRepository
version: '1.0'
