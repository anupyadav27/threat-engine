rule_id: alicloud.iam.actiontrail.attach_policy_to_role
service: iam
provider: alicloud
check_type: log
severity: high
title: 'AliCloud RAM: Policy Attached to Role'
description: A policy was attached to a RAM role, potentially granting elevated privileges.
  Attackers attach admin policies to escalate permissions via role assumption.
rationale: Monitoring this operation is essential for detecting adversary activity
  targeting AliCloud resources. Unauthorized or unexpected API calls may indicate
  account compromise, privilege escalation, or an active attack chain in progress.
threat_category: privilege_escalation
mitre_tactics:
- privilege_escalation
mitre_techniques:
- T1548
- T1098.001
risk_score: 82
resource: alicloud_ram_role
source: alicloud_ciem_generator
is_active: true
domain: identity_and_access_management
action_category: modify
log_source_type: alicloud_actiontrail
posture_category: iam_posture
threat_tags:
- T1548
- T1098.001
- privilege_escalation
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: true
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  alicloud_sec_baseline:
  - '2.1'
  - '2.2'
  - '2.3'
  nist_800_53_r5:
  - AC-2
  - AC-3
  - AC-6
  - IA-2
  - IA-5
  pci_dss_v4:
  - '7.1'
  - '8.2'
  - '10.2'
  iso_27001_2022:
  - A.5.18
  - A.8.2
  - A.9.2
remediation: '1. Review the attached policy — flag AdministratorAccess or wildcard
  resource/action policies.

  2. Validate the change was made through an approved deployment pipeline.

  3. Alert on attachment of admin-level policies to any principal.'
references:
- https://attack.mitre.org/techniques/T1548/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: alicloud_actiontrail
    - field: service
      op: equals
      value: ram
    - field: operation
      op: equals
      value: AttachPolicyToRole
