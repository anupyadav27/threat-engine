rule_id: alicloud.iam.actiontrail.add_user_to_group
service: iam
provider: alicloud
check_type: log
severity: medium
title: 'AliCloud IMS: User Added to RAM Group'
description: A user was added to a RAM group. Group membership grants all attached
  group policies, potentially elevating privileges.
rationale: Monitoring this operation is essential for detecting adversary activity
  targeting AliCloud resources. Unauthorized or unexpected API calls may indicate
  account compromise, privilege escalation, or an active attack chain in progress.
threat_category: privilege_escalation
mitre_tactics:
- privilege_escalation
mitre_techniques:
- T1098.001
risk_score: 60
resource: alicloud_ram_group
source: alicloud_ciem_generator
is_active: true
domain: identity_and_access_management
action_category: modify
log_source_type: alicloud_actiontrail
posture_category: iam_posture
threat_tags:
- T1098.001
- privilege_escalation
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: true
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  alicloud_sec_baseline:
  - '2.1'
  - '2.2'
  - '2.3'
  nist_800_53_r5:
  - AC-2
  - AC-3
  - AC-6
  - IA-2
  - IA-5
  pci_dss_v4:
  - '7.1'
  - '8.2'
  - '10.2'
  iso_27001_2022:
  - A.5.18
  - A.8.2
  - A.9.2
remediation: '1. Confirm the group membership change was authorized.

  2. Review the permissions granted by the group.

  3. Use role-based access with just-in-time elevation instead of persistent group
  membership.'
references:
- https://attack.mitre.org/techniques/T1098/001/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: alicloud_actiontrail
    - field: service
      op: equals
      value: ims
    - field: operation
      op: equals
      value: AddUserToGroup
version: '1.0'
