rule_id: alicloud.iam.actiontrail.delete_user
service: iam
provider: alicloud
check_type: log
severity: medium
title: 'AliCloud IMS: RAM User Deleted'
description: A RAM user was deleted. Adversaries may delete users to cover tracks
  or deny access to legitimate administrators.
rationale: Monitoring this operation is essential for detecting adversary activity
  targeting AliCloud resources. Unauthorized or unexpected API calls may indicate
  account compromise, privilege escalation, or an active attack chain in progress.
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1070
risk_score: 60
resource: alicloud_ram_user
source: alicloud_ciem_generator
is_active: true
domain: identity_and_access_management
action_category: delete
log_source_type: alicloud_actiontrail
posture_category: iam_posture
threat_tags:
- T1070
- defense_evasion
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: true
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  alicloud_sec_baseline:
  - '2.1'
  - '2.2'
  - '2.3'
  nist_800_53_r5:
  - AC-2
  - AC-3
  - AC-6
  - IA-2
  - IA-5
  pci_dss_v4:
  - '7.1'
  - '8.2'
  - '10.2'
  iso_27001_2022:
  - A.5.18
  - A.8.2
  - A.9.2
remediation: '1. Confirm the deletion was authorized.

  2. Review recent activity from the deleted user before removal.

  3. Ensure the user''s access keys and sessions were revoked first.'
references:
- https://attack.mitre.org/techniques/T1070/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: alicloud_actiontrail
    - field: service
      op: equals
      value: ims
    - field: operation
      op: equals
      value: DeleteUser
version: '1.0'
