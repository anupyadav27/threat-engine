  - '7.1'
  - '8.2'
  - '10.2'
  iso_27001_2022:
  - A.5.18
  - A.8.2
  - A.9.2
remediation: '1. Verify the role deletion was authorized.

  2. Check if any services relying on this role are now broken.

  3. Alert on deletion of roles used by security or monitoring services.'
references:
- https://attack.mitre.org/techniques/T1070/
check_config:
