rule_id: alicloud.iam.actiontrail.delete_role
service: iam
provider: alicloud
check_type: log
severity: medium
title: 'AliCloud RAM: Role Deleted'
description: A RAM role was deleted. Deleting service roles can disrupt legitimate
  services; adversaries may delete security-monitoring roles to blind defenders.
rationale: Monitoring this operation is essential for detecting adversary activity
  targeting AliCloud resources. Unauthorized or unexpected API calls may indicate
  account compromise, privilege escalation, or an active attack chain in progress.
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
- impact
mitre_techniques:
- T1070
- T1531
risk_score: 65
resource: alicloud_ram_role
source: alicloud_ciem_generator
is_active: true
domain: identity_and_access_management
action_category: delete
log_source_type: alicloud_actiontrail
posture_category: iam_posture
threat_tags:
- T1070
- T1531
- defense_evasion
- impact
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: true
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  alicloud_sec_baseline:
  - '2.1'
  - '2.2'
  - '2.3'
  nist_800_53_r5:
  - AC-2
  - AC-3
  - AC-6
  - IA-2
  - IA-5
