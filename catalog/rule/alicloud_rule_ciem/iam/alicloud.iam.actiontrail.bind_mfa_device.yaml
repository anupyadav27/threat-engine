rule_id: alicloud.iam.actiontrail.bind_mfa_device
service: iam
provider: alicloud
check_type: log
severity: medium
title: 'AliCloud IMS: MFA Device Bound to User'
description: An MFA device was bound to a RAM user. Monitor for adversary-controlled
  MFA enrollment on compromised accounts to maintain persistent access.
rationale: Monitoring this operation is essential for detecting adversary activity
  targeting AliCloud resources. Unauthorized or unexpected API calls may indicate
  account compromise, privilege escalation, or an active attack chain in progress.
threat_category: persistence
mitre_tactics:
- persistence
mitre_techniques:
- T1098
risk_score: 55
resource: alicloud_ram_user
source: alicloud_ciem_generator
is_active: true
domain: identity_and_access_management
action_category: create
log_source_type: alicloud_actiontrail
posture_category: iam_posture
threat_tags:
- T1098
- persistence
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: true
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  alicloud_sec_baseline:
  - '2.1'
  - '2.2'
  - '2.3'
  nist_800_53_r5:
  - AC-2
  - AC-3
  - AC-6
  - IA-2
  - IA-5
  pci_dss_v4:
  - '7.1'
  - '8.2'
  - '10.2'
  iso_27001_2022:
  - A.5.18
  - A.8.2
  - A.9.2
remediation: '1. Confirm the MFA enrollment was initiated by the legitimate account
  owner.

  2. Alert on MFA binding from unrecognized devices or unusual times.'
references:
- https://attack.mitre.org/techniques/T1098/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: alicloud_actiontrail
    - field: service
      op: equals
      value: ims
    - field: operation
      op: equals
      value: BindMFADevice
version: '1.0'
