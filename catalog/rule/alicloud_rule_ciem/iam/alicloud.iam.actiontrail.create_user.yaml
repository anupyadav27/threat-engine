rule_id: alicloud.iam.actiontrail.create_user
service: iam
provider: alicloud
check_type: log
severity: high
title: 'AliCloud IMS: RAM User Created'
description: A new RAM user was created. Adversaries create cloud accounts to maintain
  persistent access without deploying traditional remote access tools.
rationale: Monitoring this operation is essential for detecting adversary activity
  targeting AliCloud resources. Unauthorized or unexpected API calls may indicate
  account compromise, privilege escalation, or an active attack chain in progress.
threat_category: persistence
mitre_tactics:
- persistence
mitre_techniques:
- T1136.003
risk_score: 78
resource: alicloud_ram_user
source: alicloud_ciem_generator
is_active: true
domain: identity_and_access_management
action_category: create
log_source_type: alicloud_actiontrail
posture_category: iam_posture
threat_tags:
- T1136.003
- persistence
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: true
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  alicloud_sec_baseline:
  - '2.1'
  - '2.2'
  - '2.3'
  nist_800_53_r5:
  - AC-2
  - AC-3
  - AC-6
  - IA-2
  - IA-5
  pci_dss_v4:
  - '7.1'
  - '8.2'
  - '10.2'
  iso_27001_2022:
  - A.5.18
  - A.8.2
  - A.9.2
remediation: '1. Verify the user was created by an authorized process.

  2. Audit the user''s permissions and attached policies.

  3. Enforce least privilege — remove any broad managed policies.

  4. Enable MFA for the new user.

  5. Alert on user creation outside of approved provisioning workflows.'
references:
- https://attack.mitre.org/techniques/T1136/003/
- https://www.alibabacloud.com/help/en/ram/user-guide/overview-of-ram-users
