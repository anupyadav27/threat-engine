rule_id: alicloud.iam.actiontrail.create_access_key
service: iam
provider: alicloud
check_type: log
severity: high
title: 'AliCloud IMS: Access Key Created'
description: A new access key was created for a RAM user. Access keys provide programmatic
  access and are high-value targets for credential theft.
rationale: Monitoring this operation is essential for detecting adversary activity
  targeting AliCloud resources. Unauthorized or unexpected API calls may indicate
  account compromise, privilege escalation, or an active attack chain in progress.
threat_category: credential_access
mitre_tactics:
- credential_access
- persistence
mitre_techniques:
- T1552.005
- T1098
risk_score: 82
resource: alicloud_ram_access_key
source: alicloud_ciem_generator
is_active: true
domain: identity_and_access_management
action_category: create
log_source_type: alicloud_actiontrail
posture_category: iam_posture
threat_tags:
- T1552.005
- T1098
- credential_access
- persistence
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: true
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  alicloud_sec_baseline:
  - '2.1'
  - '2.2'
  - '2.3'
  nist_800_53_r5:
  - AC-2
  - AC-3
  - AC-6
  - IA-2
  - IA-5
  pci_dss_v4:
  - '7.1'
  - '8.2'
  - '10.2'
  iso_27001_2022:
  - A.5.18
  - A.8.2
  - A.9.2
remediation: '1. Verify the key was created by an authorized principal.

  2. Check if the user already had an active key — two active keys signals a backdoor.

  3. Rotate keys on a 90-day schedule.

  4. Enable ActionTrail alerts for access key creation.'
references:
- https://attack.mitre.org/techniques/T1552/005/
- https://www.alibabacloud.com/help/en/ram/user-guide/manage-accesskey-pairs-of-a-ram-user
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: alicloud_actiontrail
    - field: service
      op: equals
      value: ims
    - field: operation
      op: equals
      value: CreateAccessKey
version: '1.0'
