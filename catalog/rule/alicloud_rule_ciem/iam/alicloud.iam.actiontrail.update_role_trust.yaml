rule_id: alicloud.iam.actiontrail.update_role_trust
service: iam
provider: alicloud
check_type: log
severity: critical
title: 'AliCloud RAM: Role Trust Policy Modified'
description: The trust policy of a RAM role was updated. Adversaries broaden trust
  policies to allow unauthorized principals (external accounts, public) to assume
  the role.
rationale: Monitoring this operation is essential for detecting adversary activity
  targeting AliCloud resources. Unauthorized or unexpected API calls may indicate
  account compromise, privilege escalation, or an active attack chain in progress.
threat_category: privilege_escalation
mitre_tactics:
- privilege_escalation
- persistence
mitre_techniques:
- T1098.003
risk_score: 92
resource: alicloud_ram_role
source: alicloud_ciem_generator
is_active: true
domain: identity_and_access_management
action_category: modify
log_source_type: alicloud_actiontrail
posture_category: iam_posture
threat_tags:
- T1098.003
- privilege_escalation
- persistence
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: true
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  alicloud_sec_baseline:
  - '2.1'
  - '2.2'
  - '2.3'
  nist_800_53_r5:
  - AC-2
  - AC-3
  - AC-6
  - IA-2
  - IA-5
  pci_dss_v4:
  - '7.1'
  - '8.2'
  - '10.2'
  iso_27001_2022:
  - A.5.18
  - A.8.2
  - A.9.2
remediation: '1. Review the updated trust policy immediately.

  2. Remove any wildcard principals or external account IDs.

  3. Enforce SCPs that restrict trust policy modifications.'
references:
- https://attack.mitre.org/techniques/T1098/003/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: alicloud_actiontrail
    - field: service
      op: equals
      value: ram
    - field: operation
      op: equals
      value: UpdateRole
version: '1.0'
