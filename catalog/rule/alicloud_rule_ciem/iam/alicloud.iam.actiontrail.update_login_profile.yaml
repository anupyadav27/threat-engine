rule_id: alicloud.iam.actiontrail.update_login_profile
service: iam
provider: alicloud
check_type: log
severity: high
title: 'AliCloud IMS: Console Login Password Changed'
description: A RAM user's console login password was updated. Adversaries reset passwords
  to take over accounts or lock out legitimate users.
rationale: Monitoring this operation is essential for detecting adversary activity
  targeting AliCloud resources. Unauthorized or unexpected API calls may indicate
  account compromise, privilege escalation, or an active attack chain in progress.
threat_category: credential_access
mitre_tactics:
- credential_access
- impact
mitre_techniques:
- T1531
- T1098
risk_score: 75
resource: alicloud_ram_user
source: alicloud_ciem_generator
is_active: true
domain: identity_and_access_management
action_category: modify
log_source_type: alicloud_actiontrail
posture_category: iam_posture
threat_tags:
- T1531
- T1098
- credential_access
- impact
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: true
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  alicloud_sec_baseline:
  - '2.1'
  - '2.2'
  - '2.3'
  nist_800_53_r5:
  - AC-2
  - AC-3
  - AC-6
  - IA-2
  - IA-5
  pci_dss_v4:
  - '7.1'
  - '8.2'
  - '10.2'
  iso_27001_2022:
  - A.5.18
  - A.8.2
  - A.9.2
remediation: '1. Verify the password change was performed by the account owner or
  authorized admin.

  2. If unauthorized, reset the password and review session activity.

  3. Enforce strong password policies via RAM security settings.'
references:
- https://attack.mitre.org/techniques/T1531/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: alicloud_actiontrail
    - field: service
      op: equals
      value: ims
    - field: operation
      op: equals
      value: UpdateLoginProfile
version: '1.0'
