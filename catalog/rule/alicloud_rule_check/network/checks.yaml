version: '1.0'
provider: alicloud
service: network
checks:
- rule_id: alicloud.slb.alb.https_redirect_configured
  for_each: alicloud.slb.DescribeAccessControlListAttribute
  severity: MEDIUM
  conditions:
    var: item.ssl_enabled
    op: is_true
- rule_id: alicloud.slb.listeners.tls_enabled
  for_each: alicloud.slb.DescribeAccessControlListAttribute
  severity: MEDIUM
  conditions:
    var: item.ssl_enabled
    op: is_true
- rule_id: alicloud.vpc.endpoint.for_ecs_enabled
  for_each: alicloud.vpc.DescribePhysicalConnections
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
    op: is_true
- rule_id: alicloud.vpc.endpoint.services_allowed_principals_trust_boundaries_configured
  for_each: alicloud.vpc.DescribePhysicalConnections
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: alicloud.vpc.network_acl.entry_policy_configured
  for_each: alicloud.vpc.DescribePhysicalConnections
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: alicloud.vpc.peering_connection.accept_status_configured
  for_each: alicloud.vpc.DescribePhysicalConnections
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
    op: is_true
- rule_id: alicloud.vpc.security_group.deny_all_ingress_restricted
  for_each: alicloud.vpc.DescribePhysicalConnections
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
    op: is_true
- rule_id: alicloud.vpc.security_group.ingress_restricted
  for_each: alicloud.vpc.DescribePhysicalConnections
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
    op: is_true
