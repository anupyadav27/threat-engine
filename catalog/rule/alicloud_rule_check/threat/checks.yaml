version: '1.0'
provider: alicloud
service: threat
checks:
- rule_id: alicloud.sas.anti_ransomware.enabled
  for_each: alicloud.sas.list_sass
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
    op: is_true
- rule_id: alicloud.sas.check.periodic_configured
  for_each: alicloud.sas.list_sass
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: alicloud.sas.service_status_configured
  for_each: alicloud.sas.list_sass
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
    op: is_true
- rule_id: alicloud.securitycenter.service.is_activated_check
  for_each: alicloud.sas.list_sass
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
    op: is_true
- rule_id: alicloud.securitycenter.automatic.quarantine_check
  for_each: alicloud.sas.list_sass
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
    op: is_true
- rule_id: alicloud.securitycenter.notifications.highrisk_check
  for_each: alicloud.sas.list_sass
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
    op: is_true
