version: '1.0'
provider: alicloud
service: accessanalyzer
checks:
- rule_id: alicloud.accessanalyzer.enabled.configured
  for_each: alicloud.accessanalyzer.enabled
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: ACTIVE
- rule_id: alicloud.accessanalyzer.enabled.without_findings
  for_each: alicloud.accessanalyzer.enabled
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: ACTIVE
