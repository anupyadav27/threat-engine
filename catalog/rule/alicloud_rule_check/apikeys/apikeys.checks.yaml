version: '1.0'
provider: alicloud
service: apikeys
checks:
- rule_id: alicloud.apikeys.api.restrictions_configured
  for_each: alicloud.apikeys.ListAccessKeys
  severity: MEDIUM
  conditions:
    var: item.api_restrictions
    op: exists
    value: null
- rule_id: alicloud.apikeys.key.rotated_in_90_days
  for_each: alicloud.apikeys.ListAccessKeys
  severity: MEDIUM
  conditions:
    all:
    - var: item.status
      op: equals
      value: ACTIVE
    - var: item.key_age_days
      op: lt
      value: '90'
