version: '1.0'
provider: alicloud
service: rds
checks:
- rule_id: alicloud.rds.instance.running
  for_each: alicloud.rds.describe_db_instances
  severity: MEDIUM
  conditions:
    var: item.DBInstanceStatus
    op: equals
    value: Running
- rule_id: alicloud.rds.instance.description_set
  for_each: alicloud.rds.describe_db_instances
  severity: LOW
  conditions:
    var: item.DBInstanceDescription
    op: not_empty
    value: null
- rule_id: alicloud.rds.instance.engine_version_defined
  for_each: alicloud.rds.describe_db_instances
  severity: INFO
  conditions:
    var: item.EngineVersion
    op: not_empty
    value: null
- rule_id: alicloud.rds.instance.engine_defined
  for_each: alicloud.rds.describe_db_instances
  severity: INFO
  conditions:
    var: item.Engine
    op: not_empty
    value: null
