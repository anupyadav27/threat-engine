version: '1.0'
provider: alicloud
service: kms
checks:
- rule_id: alicloud.kms.key.id_defined
  for_each: alicloud.kms.list_keys
  severity: INFO
  conditions:
    var: item.KeyId
    op: not_empty
    value: null
- rule_id: alicloud.kms.key.arn_defined
  for_each: alicloud.kms.list_keys
  severity: LOW
  conditions:
    var: item.KeyArn
    op: not_empty
    value: null
