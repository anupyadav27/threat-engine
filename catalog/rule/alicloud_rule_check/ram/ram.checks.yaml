version: '1.0'
provider: alicloud
service: ram
checks:
- rule_id: alicloud.ram.user.email_configured
  for_each: alicloud.ram.list_users
  severity: MEDIUM
  conditions:
    var: item.Email
    op: not_empty
    value: null
- rule_id: alicloud.ram.user.display_name_configured
  for_each: alicloud.ram.list_users
  severity: LOW
  conditions:
    var: item.DisplayName
    op: not_empty
    value: null
- rule_id: alicloud.ram.user.name_defined
  for_each: alicloud.ram.list_users
  severity: INFO
  conditions:
    var: item.UserName
    op: not_empty
    value: null
- rule_id: alicloud.ram.role.description_set
  for_each: alicloud.ram.list_roles
  severity: LOW
  conditions:
    var: item.Description
    op: not_empty
    value: null
- rule_id: alicloud.ram.role.arn_defined
  for_each: alicloud.ram.list_roles
  severity: INFO
  conditions:
    var: item.Arn
    op: not_empty
    value: null
- rule_id: alicloud.ram.role.name_defined
  for_each: alicloud.ram.list_roles
  severity: INFO
  conditions:
    var: item.RoleName
    op: not_empty
    value: null
