version: '1.0'
provider: alicloud
service: tablestore
checks:
- rule_id: alicloud.tablestore.encryption.enabled
  for_each: alicloud.tablestore.list_tablestores
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
    op: is_true
- rule_id: alicloud.tablestore.pitr.enabled
  for_each: alicloud.tablestore.list_tablestores
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
    op: is_true
