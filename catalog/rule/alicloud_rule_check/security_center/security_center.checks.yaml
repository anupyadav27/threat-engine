version: '1.0'
provider: alicloud
service: security_center
checks:
- rule_id: alicloud.security_center.config.selection_key_configured
  for_each: alicloud.security_center.get_config
  severity: HIGH
  conditions:
    var: item.SelectionKey
    op: not_empty
    value: null
- rule_id: alicloud.security_center.config.id_defined
  for_each: alicloud.security_center.get_config
  severity: INFO
  conditions:
    var: item.id
    op: not_empty
    value: null
