version: '1.0'
provider: alicloud
service: oss
checks:
- rule_id: alicloud.oss.bucket.name_defined
  for_each: alicloud.oss.list_buckets
  severity: INFO
  conditions:
    var: item.BucketName
    op: not_empty
    value: null
- rule_id: alicloud.oss.bucket.storage_class_defined
  for_each: alicloud.oss.list_buckets
  severity: LOW
  conditions:
    var: item.StorageClass
    op: not_empty
    value: null
- rule_id: alicloud.oss.bucket.location_defined
  for_each: alicloud.oss.list_buckets
  severity: MEDIUM
  conditions:
    var: item.Location
    op: not_empty
    value: null
- rule_id: alicloud.oss.bucket.not_archive_storage
  for_each: alicloud.oss.list_buckets
  severity: LOW
  conditions:
    var: item.StorageClass
    op: not_equals
    value: Archive
