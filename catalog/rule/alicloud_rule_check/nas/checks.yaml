version: '1.0'
provider: alicloud
service: nas
checks:
- rule_id: alicloud.nas.file_system.encryption_enabled
  for_each: alicloud.nas.encryption
  severity: MEDIUM
  conditions:
    all:
    - var: item.encrypted
      op: not_empty
      value: null
    - var: item.kms_key_id
      op: exists
      value: null
