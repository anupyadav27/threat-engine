version: '1.0'
provider: alicloud
service: compute
checks:
- rule_id: alicloud.ecs.auto_provisioning_group.multi_zone_enabled
  for_each: alicloud.ecs.DescribeAutoProvisioningGroupInstances
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
    op: is_true
- rule_id: alicloud.ecs.disk.delete_with_instance_configured
  for_each: alicloud.ecs.disk
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: alicloud.ecs.image.encrypted_system_disk_configured
  for_each: alicloud.ecs.custom_image
  severity: MEDIUM
  conditions:
    all:
    - var: item.encrypted
      op: not_empty
      value: null
    - var: item.kms_key_id
      op: exists
      value: null
- rule_id: alicloud.ecs.instance.auto_snapshot_enabled
  for_each: alicloud.ecs.DescribeAutoProvisioningGroupInstances
  severity: MEDIUM
  conditions:
    var: item.backup_enabled
    op: is_true
- rule_id: alicloud.ecs.instance.baseline_image_configured
  for_each: alicloud.ecs.DescribeAutoProvisioningGroupInstances
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: alicloud.ecs.instance.cloud_assistant_status_configured
  for_each: alicloud.ecs.DescribeAutoProvisioningGroupInstances
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
    op: is_true
- rule_id: alicloud.ecs.instance.cloud_monitor_agent_configured
  for_each: alicloud.ecs.instance_managed_by_ssm_agent_installed
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: alicloud.ecs.instance.delete_protection_enabled
  for_each: alicloud.ecs.DescribeAutoProvisioningGroupInstances
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
    op: is_true
- rule_id: alicloud.ecs.instance.disaster_recovery_enabled
  for_each: alicloud.ecs.DescribeAutoProvisioningGroupInstances
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
    op: is_true
- rule_id: alicloud.ecs.instance.guest_config_configured
  for_each: alicloud.ecs.DescribeAutoProvisioningGroupInstances
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: alicloud.ecs.instance.image_scan_enabled
  for_each: alicloud.ecs.DescribeAutoProvisioningGroupInstances
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
    op: is_true
- rule_id: alicloud.ecs.instance.inventory_enabled
  for_each: alicloud.ecs.DescribeAutoProvisioningGroupInstances
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
    op: is_true
- rule_id: alicloud.ecs.instance.maintenance_window_configured
  for_each: alicloud.ecs.DescribeAutoProvisioningGroupInstances
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: alicloud.ecs.instance.recovery_setting_configured
  for_each: alicloud.ecs.DescribeAutoProvisioningGroupInstances
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: alicloud.ecs.instance.required_tags_configured
  for_each: alicloud.ecs.DescribeAutoProvisioningGroupInstances
  severity: MEDIUM
  conditions:
    var: item.tags
    op: is_true
- rule_id: alicloud.ecs.instance.security_center_linked_configured
  for_each: alicloud.ecs.DescribeAutoProvisioningGroupInstances
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: alicloud.ecs.securitygroup.with_many_ingress_egress_rules_configured
  for_each: alicloud.ecs.securitygroup_ingress_tcp_3389_from_internet_blocked
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: alicloud.ecs.snapshot_policy.auto_snapshot_policy_configured
  for_each: alicloud.ecs.DescribeAutoProvisioningGroupInstances
  severity: MEDIUM
  conditions:
    var: item.backup_enabled
    op: is_true
