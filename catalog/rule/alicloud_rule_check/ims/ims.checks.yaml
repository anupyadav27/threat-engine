version: '1.0'
provider: alicloud
service: ims
checks:
- rule_id: alicloud.ims.account.access_approval_enabled
  for_each: alicloud.ims.account
  severity: MEDIUM
  conditions:
    var: item.access_approval_enabled
    op: is_true
    value: null
- rule_id: alicloud.ims.audit.logs_enabled
  for_each: alicloud.ims.audit
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
    op: is_true
    value: null
- rule_id: alicloud.ims.cloud.asset_inventory_enabled
  for_each: alicloud.ims.cloud
  severity: MEDIUM
  conditions:
    var: item.cloud_asset_inventory_enabled
    op: is_true
    value: null
- rule_id: alicloud.ims.custom.role_has_permissions_to_administer_resource_locks
  for_each: alicloud.ims.custom
  severity: HIGH
  conditions:
    var: item.permissions
    op: not_contains
    value: ram:AdministerResourceLocks
- rule_id: alicloud.ims.no.service_roles_at_project_level
  for_each: alicloud.ims.account
  severity: MEDIUM
  conditions:
    var: item.resource_type
    op: not_equals
    value: ServiceRole
- rule_id: alicloud.ims.organization.essential_contacts_configured
  for_each: alicloud.ims.GetDirectory
  severity: MEDIUM
  conditions:
    var: item.essential_contacts_configured
    op: is_true
    value: null
