version: '1.0'
provider: alicloud
service: ack
checks:
- rule_id: alicloud.ack.cluster.running
  for_each: alicloud.ack.describe_clusters
  severity: MEDIUM
  conditions:
    var: item.State
    op: equals
    value: running
- rule_id: alicloud.ack.cluster.kubernetes_version_defined
  for_each: alicloud.ack.describe_clusters
  severity: MEDIUM
  conditions:
    var: item.KubernetesVersion
    op: not_empty
    value: null
- rule_id: alicloud.ack.cluster.name_defined
  for_each: alicloud.ack.describe_clusters
  severity: INFO
  conditions:
    var: item.Name
    op: not_empty
    value: null
- rule_id: alicloud.ack.cluster.type_defined
  for_each: alicloud.ack.describe_clusters
  severity: INFO
  conditions:
    var: item.ClusterType
    op: not_empty
    value: null
