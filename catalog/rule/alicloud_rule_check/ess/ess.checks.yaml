version: '1.0'
provider: alicloud
service: ess
checks:
- rule_id: alicloud.ess.group.capacity_rebalance_enforced
  for_each: alicloud.ess.group
  severity: MEDIUM
  conditions:
    var: item.capacity_rebalance
    op: is_true
    value: null
- rule_id: alicloud.ess.group.health_check_configured
  for_each: alicloud.ess.group
  severity: MEDIUM
  conditions:
    var: item.HealthCheckType
    op: exists
    value: null
- rule_id: alicloud.ess.group.multi_az_deployment
  for_each: alicloud.ess.group
  severity: MEDIUM
  conditions:
    var: item.multi_az_policy
    op: exists
    value: null
- rule_id: alicloud.ess.group.properly_configured
  for_each: alicloud.ess.group
  severity: MEDIUM
  conditions:
    var: item.id
    op: exists
    value: null
