version: '1.0'
provider: alicloud
service: ecs
checks:
- rule_id: alicloud.ecs.instance.running
  for_each: alicloud.ecs.describe_instances
  severity: MEDIUM
  conditions:
    var: item.Status
    op: equals
    value: Running
- rule_id: alicloud.ecs.instance.has_tags
  for_each: alicloud.ecs.describe_instances
  severity: LOW
  conditions:
    var: item.Tags
    op: not_empty
    value: null
- rule_id: alicloud.ecs.instance.name_defined
  for_each: alicloud.ecs.describe_instances
  severity: LOW
  conditions:
    var: item.InstanceName
    op: not_empty
    value: null
- rule_id: alicloud.ecs.instance.os_type_defined
  for_each: alicloud.ecs.describe_instances
  severity: INFO
  conditions:
    var: item.OSType
    op: not_empty
    value: null
- rule_id: alicloud.ecs.instance.image_id_defined
  for_each: alicloud.ecs.describe_instances
  severity: INFO
  conditions:
    var: item.ImageId
    op: not_empty
    value: null
