version: '1.0'
provider: alicloud
service: api
checks:
- rule_id: alicloud.api.api.endpoint_authn_required
  for_each: alicloud.api.http
  severity: MEDIUM
  conditions:
    var: item.permissions
    op: exists
    value: null
- rule_id: alicloud.api.api.endpoint_authz_policies_enforced
  for_each: alicloud.api.authorizer
  severity: MEDIUM
  conditions:
    var: item.permissions
    op: exists
    value: null
- rule_id: alicloud.api.api.endpoint_waf_attached
  for_each: alicloud.api.http
  severity: MEDIUM
  conditions:
    var: item.waf_enabled
    op: is_true
    value: null
- rule_id: alicloud.api.app_credential.api_key_scopes_least_privilege
  for_each: alicloud.api.app_credential
  severity: HIGH
  conditions:
    var: item.permissions
    op: not_contains
    value: '*'
- rule_id: alicloud.api.authorizer.tls_min_1_2_enforced
  for_each: alicloud.api.authorizer
  severity: HIGH
  conditions:
    var: item.min_tls_version
    op: equals
    value: '1.2'
- rule_id: alicloud.api.authorizer.token_audience_restricted
  for_each: alicloud.api.authorizer
  severity: MEDIUM
  conditions:
    var: item.token_audience
    op: exists
    value: null
- rule_id: alicloud.api.field.level_logging_enabled
  for_each: alicloud.api.field
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
    op: is_true
    value: null
- rule_id: alicloud.api.function.access_keys_configured
  for_each: alicloud.api.app_credential
  severity: MEDIUM
  conditions:
    var: item.mfa_enabled
    op: is_true
    value: null
- rule_id: alicloud.api.function.identity_without_admin_privileges
  for_each: alicloud.api.app_credential
  severity: HIGH
  conditions:
    var: item.permissions
    op: not_contains
    value: AdministratorAccess
- rule_id: alicloud.api.function.not_publicly_accessible
  for_each: alicloud.api.http
  severity: HIGH
  conditions:
    var: item.internet_facing
    op: is_false
    value: null
- rule_id: alicloud.api.gateway.api_gateway_https_required
  for_each: alicloud.api.http
  severity: MEDIUM
  conditions:
    var: item.ssl_enabled
    op: is_true
    value: null
- rule_id: alicloud.api.gateway.client_certificate_enabled
  for_each: alicloud.api.http
  severity: MEDIUM
  conditions:
    var: item.ssl_enabled
    op: is_true
    value: null
- rule_id: alicloud.api.gateway.restapi_client_certificate_enabled
  for_each: alicloud.api.http
  severity: MEDIUM
  conditions:
    var: item.ssl_enabled
    op: is_true
    value: null
- rule_id: alicloud.api.gateway.restapi_logging_enabled
  for_each: alicloud.api.http
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
    op: is_true
    value: null
- rule_id: alicloud.api.gateway.restapi_tracing_enabled
  for_each: alicloud.api.http
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
    op: is_true
    value: null
- rule_id: alicloud.api.gateway.restapi_waf_acl_attached
  for_each: alicloud.api.http
  severity: MEDIUM
  conditions:
    var: item.waf_acl_attached
    op: is_true
    value: null
- rule_id: alicloud.api.gateway.validation_api_parameters_validation_enabled
  for_each: alicloud.api.http
  severity: MEDIUM
  conditions:
    var: item.validation_api_parameters_validation_enabled
    op: is_true
    value: null
- rule_id: alicloud.api.gateway.validation_api_request_schema_validation_enabled
  for_each: alicloud.api.http
  severity: MEDIUM
  conditions:
    var: item.validation_api_request_schema_validation_enabled
    op: is_true
    value: null
- rule_id: alicloud.api.gateway.validation_api_required_security_headers_enforced
  for_each: alicloud.api.http
  severity: MEDIUM
  conditions:
    all:
    - var: item.ssl_enabled
      op: is_true
      value: null
    - var: item.min_tls_version
      op: equals
      value: '1.2'
- rule_id: alicloud.api.hosting.managed_updates_enabled
  for_each: alicloud.api.hosting
  severity: MEDIUM
  conditions:
    var: item.managed_updates_enabled
    op: is_true
    value: null
- rule_id: alicloud.api.http.logs_enabled
  for_each: alicloud.api.http
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
    op: is_true
    value: null
- rule_id: alicloud.api.minimum.tls_version_12
  for_each: alicloud.api.http
  severity: HIGH
  conditions:
    var: item.min_tls_version
    op: in
    value:
    - '1.2'
    - '1.3'
- rule_id: alicloud.api.stage.logging_enabled
  for_each: alicloud.api.http
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
    op: is_true
    value: null
- rule_id: alicloud.api.stage.throttling_enabled
  for_each: alicloud.api.http
  severity: MEDIUM
  conditions:
    var: item.throttling_enabled
    op: is_true
    value: null
- rule_id: alicloud.api.usage_plan.rate_limits_configured
  for_each: alicloud.api.http
  severity: MEDIUM
  conditions:
    var: item.rate_limits
    op: exists
    value: null
