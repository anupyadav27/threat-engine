    all:
    - var: item.name
      op: contains
      value: ActionTrail
    - var: item.name
      op: contains
      value: Configuration
    - var: item.status
      op: equals
      value: ACTIVE
- rule_id: alicloud.cms.log.metric_filter_and_alarm_for_alicloud_config_configuration_changes_enabled
  for_each: alicloud.cms.alarm
  severity: MEDIUM
  conditions:
