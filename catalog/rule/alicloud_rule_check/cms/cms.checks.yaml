version: '1.0'
provider: alicloud
service: cms
checks:
- rule_id: alicloud.cms.alarm.alert_alarm_actions_configured
  for_each: alicloud.cms.alarm
  severity: MEDIUM
  conditions:
    var: item.alert_alarm_actions
    op: not_empty
    value: null
- rule_id: alicloud.cms.alarm.alert_critical_alarms_enabled
  for_each: alicloud.cms.alarm
  severity: HIGH
  conditions:
    var: item.status
    op: equals
    value: ACTIVE
- rule_id: alicloud.cms.alarm.alert_destinations_authenticated
  for_each: alicloud.cms.alarm
  severity: MEDIUM
  conditions:
    var: item.alert_destinations_authenticated
    op: is_true
    value: null
- rule_id: alicloud.cms.alarm.configured
  for_each: alicloud.cms.alarm
  severity: MEDIUM
  conditions:
    var: item.id
    op: exists
    value: null
- rule_id: alicloud.cms.alarm.memory_utilization_configured
  for_each: alicloud.cms.alarm
  severity: MEDIUM
  conditions:
    var: item.name
    op: contains
    value: memory_utilization
- rule_id: alicloud.cms.alert_escalation.escalation_change_audit_logging_enabled
  for_each: alicloud.cms.alert_escalation
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
    op: is_true
    value: null
- rule_id: alicloud.cms.alert_escalation.escalation_policy_exists_for_critical_severity
  for_each: alicloud.cms.alert_escalation
  severity: HIGH
  conditions:
    var: item.id
    op: exists
    value: null
- rule_id: alicloud.cms.alerts.create_policy_assignment
  for_each: alicloud.cms.alerts
  severity: MEDIUM
  conditions:
    var: item.id
    op: exists
    value: null
- rule_id: alicloud.cms.alerts.create_update_nsg
  for_each: alicloud.cms.alerts
  severity: MEDIUM
  conditions:
    var: item.id
    op: exists
    value: null
- rule_id: alicloud.cms.alerts.create_update_public_ip_address_rule
  for_each: alicloud.cms.alerts
  severity: HIGH
  conditions:
    var: item.public_ip_address
    op: exists
    value: null
- rule_id: alicloud.cms.alerts.create_update_security_solution
  for_each: alicloud.cms.alerts
  severity: MEDIUM
  conditions:
    var: item.id
    op: exists
    value: null
- rule_id: alicloud.cms.alerts.create_update_sqlserver_fr
  for_each: alicloud.cms.alerts
  severity: MEDIUM
  conditions:
    all:
    - var: item.name
      op: contains
      value: SQLServer
    - var: item.name
      op: contains
      value: Failover
- rule_id: alicloud.cms.alerts.delete_nsg
  for_each: alicloud.cms.alerts
  severity: MEDIUM
  conditions:
    var: item.name
    op: contains
    value: DeleteNetworkSecurityGroup
- rule_id: alicloud.cms.alerts.delete_policy_assignment
  for_each: alicloud.cms.alerts
  severity: MEDIUM
  conditions:
    var: item.status
    op: exists
    value: null
- rule_id: alicloud.cms.alerts.delete_public_ip_address_rule
  for_each: alicloud.cms.alerts
  severity: HIGH
  conditions:
    var: item.name
    op: contains
    value: DeletePublicIpAddress
- rule_id: alicloud.cms.alerts.delete_security_solution
  for_each: alicloud.cms.alerts
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: ACTIVE
- rule_id: alicloud.cms.alerts.delete_sqlserver_fr
  for_each: alicloud.cms.alerts
  severity: MEDIUM
  conditions:
    var: item.name
    op: contains
    value: delete_sqlserver_fr
- rule_id: alicloud.cms.alerts.notification_destinations_configured
  for_each: alicloud.cms.alerts
  severity: MEDIUM
  conditions:
    var: item.notification_destinations
    op: not_empty
    value: null
- rule_id: alicloud.cms.alerts.notification_endpoints_authenticated
  for_each: alicloud.cms.alerts
  severity: MEDIUM
  conditions:
    var: item.notification_endpoints_authenticated
    op: is_true
    value: null
- rule_id: alicloud.cms.alerts.notification_message_encryption_in_transit
  for_each: alicloud.cms.alerts
  severity: HIGH
  conditions:
    var: item.encrypted
    op: is_true
    value: null
- rule_id: alicloud.cms.alerts.notification_no_public_webhooks
  for_each: alicloud.cms.alerts
  severity: HIGH
  conditions:
    var: item.notification_webhooks[].url
    op: not_contains
    value: https://hooks.slack.com/services/
- rule_id: alicloud.cms.anomaly_detection.anomaly_alerts_configured
  for_each: alicloud.cms.alerts
  severity: MEDIUM
  conditions:
