  for_each: alicloud.cms.alarm
  severity: HIGH
  conditions:
    var: item.permissions
    op: not_contains
    value: public
- rule_id: alicloud.cms.log.group_retention
  for_each: alicloud.cms.alarm
  severity: MEDIUM
  conditions:
    var: item.log_group_retention
    op: gte
    value: 90
- rule_id: alicloud.cms.log.group_retention_policy_specific_days_enabled
  for_each: alicloud.cms.alarm
  severity: MEDIUM
  conditions:
    all:
    - var: item.logging_enabled
      op: is_true
      value: null
    - var: item.retention_days
      op: gte
      value: '365'
- rule_id: alicloud.cms.log.group_retention_policy_specific_days_enabled_alicloud_oss_bucket_lifecycle_enabled
  for_each: alicloud.cms.alarm
  severity: MEDIUM
  conditions:
    all:
    - var: item.log_group_retention_policy_specific_days_enabled
      op: is_true
      value: null
    - var: item.alicloud_oss_bucket_lifecycle_enabled
      op: is_true
      value: null
