    op: not_empty
    value: null
- rule_id: alicloud.cms.anomaly_detection.anomaly_detectors_enabled
  for_each: alicloud.cms.alarm
  severity: MEDIUM
  conditions:
    var: item.id
    op: exists
    value: null
- rule_id: alicloud.cms.api.monitoring_api_access_log_fields_identity_present
  for_each: alicloud.cms.alarm
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
