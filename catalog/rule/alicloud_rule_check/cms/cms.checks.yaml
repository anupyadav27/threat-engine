  for_each: alicloud.cms.alarm
  severity: MEDIUM
  conditions:
    var: item.name
    op: contains
    value: NetworkAcl
- rule_id: alicloud.cms.changes.to_network_gateways_alarm_configured
  for_each: alicloud.cms.alarm
  severity: MEDIUM
  conditions:
    var: item.id
    op: exists
    value: null
- rule_id: alicloud.cms.changes.to_network_route_tables_alarm_configured
  for_each: alicloud.cms.alarm
  severity: MEDIUM
  conditions:
    var: item.name
    op: contains
