rule_id: oci.cloudguard.audit.critical_problem
service: cloudguard
provider: oci
check_type: log
severity: critical
title: 'OCI Cloud Guard: Critical Problem Detected'
description: Cloud Guard detected a critical-severity security problem. Critical problems indicate active threats or severe misconfigurations requiring immediate remediation.
threat_category: initial_access
mitre_tactics:
- initial_access
mitre_techniques:
- T1190
risk_score: 95
resource: oci_cloud_guard_problem
domain: threat_detection
action_category: create
log_source_type: 
posture_category: threat_posture
threat_tags:
- T1190
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks: {}
remediation: Review and investigate this activity in the OCI Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: oci_cloudguard
    - field: risk_level
      op: equals
      value: CRITICAL
