rule_id: oci.cloudguard.audit.cloud_guard_disabled
service: cloudguard
provider: oci
check_type: log
severity: critical
title: 'OCI Cloud Guard: Cloud Guard Disabled'
description: Oracle Cloud Guard was disabled for the tenancy. Cloud Guard is the primary threat detection service in OCI; disabling it blinds the security team.
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1562
risk_score: 97
resource: oci_cloud_guard_configuration
domain: logging_monitoring_and_alerting
action_category: modify
log_source_type: 
posture_category: security_posture
threat_tags:
- T1562
- defense_evasion
- log_tampering
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: critical
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks: {}
remediation: Review and investigate this activity in the OCI Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: oci_audit
    - field: service
      op: equals
      value: com.oraclecloud.cloudguard
    - field: operation
      op: equals
      value: UpdateConfiguration
    - field: request.status
      op: equals
      value: DISABLED
