remediation: '1. Terminate the suspicious workload or execution immediately.

  2. Audit the code/template deployed for malicious payloads.

  3. Enforce code signing and image verification before deployment.

  4. Restrict template/workspace execution to approved pipelines.

  5. Implement mandatory peer review for infrastructure-as-code changes.'
references:
- https://attack.mitre.org/techniques/T1059/
