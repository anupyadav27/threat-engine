rule_id: oci.iam.audit.mfa_totp_device_change
service: iam
provider: oci
check_type: log
severity: critical
title: 'OCI IAM: MFA TOTP Device Modified or Removed'
description: An MFA TOTP device was created, updated, or deleted for an OCI user. Removing MFA reduces account security and may indicate account takeover.
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
- initial_access
mitre_techniques:
- T1556
risk_score: 92
resource: oci_identity_mfa_totp_device
domain: logging_monitoring_and_alerting
action_category: modify
log_source_type: 
posture_category: security_posture
threat_tags:
- T1556
- defense_evasion
- log_tampering
- cloud_iam
- identity
risk_indicators:
  actor_type: iam_user_or_role
  action_type: write
  target_type: iam_identity
  blast_radius: account
  stealth_risk: critical
iam_security:
  applicable: true
  modules:
  - mfa
  - access_control
data_security:
  applicable: false
compliance_frameworks: {}
remediation: Review and investigate this activity in the OCI Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: oci_audit
    - field: service
      op: equals
      value: com.oraclecloud.identitycontrolplane
    - field: operation
      op: in
      value:
      - CreateMfaTotpDevice
      - DeleteMfaTotpDevice
      - GenerateTotpSeed
