rule_id: oci.iam.audit.delete_user
service: iam
provider: oci
check_type: log
severity: high
title: 'OCI IAM: User Deleted'
description: An OCI IAM user was deleted. Deletion of legitimate users disrupts operations and may be part of a destructive attack.
threat_category: impact
mitre_tactics:
- impact
mitre_techniques:
- T1531
risk_score: 78
resource: oci_identity_user
domain: impact
action_category: delete
log_source_type: 
posture_category: workload_posture
threat_tags:
- T1531
- impact
- availability
- cloud_iam
- identity
risk_indicators:
  actor_type: iam_user_or_role
  action_type: destructive
  target_type: iam_identity
  blast_radius: account
  stealth_risk: low
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks: {}
remediation: Review and investigate this activity in the OCI Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: oci_audit
    - field: service
      op: equals
      value: com.oraclecloud.identitycontrolplane
    - field: operation
      op: equals
      value: DeleteUser
