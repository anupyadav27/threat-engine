rule_id: oci.iam.audit.create_user
service: iam
provider: oci
check_type: log
severity: high
title: 'OCI IAM: New User Created'
description: A new OCI IAM user was created. Unauthorized user creation is a persistence technique that allows attackers to maintain access after initial credentials are rotated.
threat_category: persistence
mitre_tactics:
- persistence
mitre_techniques:
- T1136
risk_score: 80
resource: oci_identity_user
domain: identity_and_access_management
action_category: create
log_source_type: 
posture_category: iam_posture
threat_tags:
- T1136
- persistence
- backdoor
- cloud_iam
- identity
risk_indicators:
  actor_type: iam_user_or_role
  action_type: write
  target_type: iam_identity
  blast_radius: account
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks: {}
remediation: Review and investigate this activity in the OCI Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: oci_audit
    - field: service
      op: equals
      value: com.oraclecloud.identitycontrolplane
    - field: operation
      op: equals
      value: CreateUser
