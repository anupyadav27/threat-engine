rule_id: oci.resourcemanager.audit.stack_applied
service: resourcemanager
provider: oci
check_type: log
severity: medium
title: 'OCI Resource Manager: Terraform Stack Applied'
description: An OCI Resource Manager (Terraform) stack was applied. Unauthorized stack apply operations can create, modify, or delete any OCI resources.
threat_category: execution
mitre_tactics:
- execution
mitre_techniques:
- T1059
risk_score: 70
resource: oci_resource_manager_stack
domain: compute_and_workload_security
action_category: execute
log_source_type: 
posture_category: workload_posture
threat_tags:
- T1059
- remote_execution
- cloud_exec
risk_indicators:
  actor_type: cloud_principal
  action_type: execution
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks: {}
remediation: Review and investigate this activity in the OCI Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: oci_audit
    - field: service
      op: equals
      value: com.oraclecloud.resourcemanager
    - field: operation
      op: in
      value:
      - CreateJob
      - UpdateJob
    - field: request.operation
      op: equals
      value: APPLY
