rule_id: oci.oke.audit.rolebinding_change
service: oke
provider: oci
check_type: log
severity: critical
title: 'OCI OKE: RBAC RoleBinding Created or Modified'
description: A Kubernetes RoleBinding or ClusterRoleBinding was created or modified in an OKE cluster. Unauthorized bindings grant attackers persistent access to cluster resources.
threat_category: privilege_escalation
mitre_tactics:
- privilege_escalation
mitre_techniques:
- T1548
risk_score: 90
resource: oci_containerengine_cluster
domain: identity_and_access_management
action_category: modify
log_source_type: 
posture_category: iam_posture
threat_tags:
- T1548
- cloud_iam
- privilege_escalation
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks: {}
remediation: Review and investigate this activity in the OCI Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: oci_k8s_audit
    - field: resource
      op: in
      value:
      - rolebindings
      - clusterrolebindings
    - field: verb
      op: in
      value:
      - create
      - update
      - patch
