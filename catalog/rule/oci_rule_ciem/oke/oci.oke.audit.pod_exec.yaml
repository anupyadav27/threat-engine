rule_id: oci.oke.audit.pod_exec
service: oke
provider: oci
check_type: log
severity: high
title: 'OCI OKE: kubectl exec / attach into Pod'
description: An interactive exec or attach session was opened into a running pod. Exec sessions are commonly used for reconnaissance and lateral movement within clusters.
threat_category: execution
mitre_tactics:
- execution
mitre_techniques:
- T1609
risk_score: 80
resource: oci_containerengine_cluster
domain: compute_and_workload_security
action_category: execute
log_source_type: 
posture_category: workload_posture
threat_tags:
- T1609
- remote_execution
- cloud_exec
risk_indicators:
  actor_type: cloud_principal
  action_type: execution
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks: {}
remediation: Review and investigate this activity in the OCI Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: oci_k8s_audit
    - field: resource
      op: equals
      value: pods
    - field: subresource
      op: in
      value:
      - exec
      - attach
