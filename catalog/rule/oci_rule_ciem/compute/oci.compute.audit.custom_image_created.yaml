rule_id: oci.compute.audit.custom_image_created
service: compute
provider: oci
check_type: log
severity: high
title: 'OCI Compute: Custom Image Created'
description: A custom compute image was created from an instance. Attackers create images to persist backdoors that survive instance termination.
threat_category: persistence
mitre_tactics:
- persistence
mitre_techniques:
- T1525
risk_score: 75
resource: oci_compute_image
domain: compute_and_workload_security
action_category: create
log_source_type: 
posture_category: iam_posture
threat_tags:
- T1525
- persistence
- backdoor
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: compute_instance
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks: {}
remediation: Review and investigate this activity in the OCI Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: oci_audit
    - field: service
      op: equals
      value: com.oraclecloud.computemanagement
    - field: operation
      op: equals
      value: CreateImage
