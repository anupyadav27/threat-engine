rule_id: oci.compute.audit.terminate_instance
service: compute
provider: oci
check_type: log
severity: high
title: 'OCI Compute: Instance Terminated'
description: A compute instance was terminated. Mass termination of instances is a destructive impact technique in ransomware or wiperware attacks.
threat_category: impact
mitre_tactics:
- impact
mitre_techniques:
- T1485
risk_score: 80
resource: oci_compute_instance
domain: compute_and_workload_security
action_category: delete
log_source_type: 
posture_category: workload_posture
threat_tags:
- T1485
- impact
- availability
risk_indicators:
  actor_type: cloud_principal
  action_type: destructive
  target_type: compute_instance
  blast_radius: resource_group
  stealth_risk: low
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks: {}
remediation: Review and investigate this activity in the OCI Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: oci_audit
    - field: service
      op: equals
      value: com.oraclecloud.computemanagement
    - field: operation
      op: equals
      value: TerminateInstance
