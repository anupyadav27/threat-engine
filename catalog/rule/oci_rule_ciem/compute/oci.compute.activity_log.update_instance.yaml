rule_id: oci.compute.activity_log.update_instance
service: compute
provider: oci
check_type: log
severity: medium
title: Detect modifications to compute instance metadata (e.g., time settings) or
  audit configuration changes that could impact time-sync integrity.
description: Detects modifications to instance metadata or audit configuration.
rationale: Monitoring this activity is essential for detecting adversary defense evasion
  against OCI resources. Unauthorized or unexpected API calls may indicate account
  compromise, privilege escalation, or an active attack chain.
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1562
risk_score: 60
resource: cloud_compute_instance
source: csv_generated
is_active: true
domain: logging_monitoring_and_alerting
action_category: modify
log_source_type: oci_audit_log
posture_category: threat_posture
threat_tags:
- T1562
- defense_evasion
- ciem_detection
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: high
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  pci_dss_v4:
  - 10.6.1
remediation: '1. Immediately investigate the principal that performed this action
  — treat as potentially compromised.

  2. Restore any disabled/deleted security controls (logging, agents, scanning).

  3. Review the full session context for lateral movement or data exfiltration following
  this action.

  4. Restrict the ability to disable security tools to break-glass roles with MFA
  enforcement.

  5. Add SCPs/Organization Policies to prevent non-authorized disablement of security
  controls.'
references:
- https://attack.mitre.org/techniques/T1562/
- https://docs.oracle.com/en-us/iaas/Content/Identity/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: oci_audit_log
    - field: service
      op: equals
      value: com.oraclecloud.computemanagement
    - field: operation
      op: equals
      value: com.oraclecloud.computemanagement.UpdateInstance
  type: log
  version: '1.0'
