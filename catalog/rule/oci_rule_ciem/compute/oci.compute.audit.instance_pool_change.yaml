rule_id: oci.compute.audit.instance_pool_change
service: compute
provider: oci
check_type: log
severity: medium
title: 'OCI Compute: Instance Pool Modified'
description: An instance pool was created, updated, or deleted. Unauthorized pool modifications can scale out attacker-controlled compute resources.
threat_category: execution
mitre_tactics:
- execution
mitre_techniques:
- T1496
risk_score: 65
resource: oci_compute_instance_pool
domain: compute_and_workload_security
action_category: modify
log_source_type: 
posture_category: workload_posture
threat_tags:
- T1496
- remote_execution
- cloud_exec
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: compute_instance
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks: {}
remediation: Review and investigate this activity in the OCI Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: oci_audit
    - field: service
      op: equals
      value: com.oraclecloud.computemanagement
    - field: operation
      op: in
      value:
      - CreateInstancePool
      - UpdateInstancePool
      - TerminateInstancePool
