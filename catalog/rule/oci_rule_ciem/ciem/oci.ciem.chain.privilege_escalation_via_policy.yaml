rule_id: oci.ciem.chain.privilege_escalation_via_policy
service: ciem
provider: oci
check_type: log_correlation
severity: critical
title: 'OCI CIEM: Privilege Escalation via Policy Creation + API Key'
description: 'Detect the OCI privilege escalation chain: IAM policy created with broad permissions → new API key created → privileged API calls, indicating a multi-step takeover.'
threat_category: privilege_escalation
mitre_tactics:
- privilege_escalation
mitre_techniques:
- T1548
risk_score: 98
resource: oci_identity_policy
domain: identity_and_access_management
action_category: privilege_escalation
log_source_type: 
posture_category: iam_posture
threat_tags:
- T1548
- cloud_iam
- privilege_escalation
- ciem_correlation
- attack_chain
risk_indicators:
  actor_type: cloud_principal
  action_type: privilege_change
  target_type: cloud_resource
  blast_radius: tenant_or_account
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - role_management
  - policy_analysis
  - access_control
data_security:
  applicable: false
compliance_frameworks: {}
remediation: Review and investigate this activity in the OCI Console and take corrective action.
check_config:
  events:
  - conditions:
      all:
      - field: source_type
        op: equals
        value: oci_audit
      - field: service
        op: equals
        value: com.oraclecloud.identitycontrolplane
      - field: operation
        op: in
        value:
        - CreatePolicy
        - UpdatePolicy
  - conditions:
      all:
      - field: source_type
        op: equals
        value: oci_audit
      - field: service
        op: equals
        value: com.oraclecloud.identitycontrolplane
      - field: operation
        op: in
        value:
        - UploadApiKey
        - CreateAuthToken
  type: sequence
  window_seconds: 600
