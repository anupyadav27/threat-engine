rule_id: oci.ciem.chain.data_exfiltration_via_par
service: ciem
provider: oci
check_type: log_correlation
severity: critical
title: 'OCI CIEM: Data Exfiltration via Bucket Public Access + PAR Creation'
description: 'Detect a data exfiltration pattern: bucket made public or PAR created → large object download activity, indicating exfiltration of Object Storage data.'
threat_category: data_exfiltration
mitre_tactics:
- exfiltration
mitre_techniques:
- T1530
risk_score: 97
resource: oci_objectstorage_bucket
domain: data_protection_and_privacy
action_category: exfiltration
log_source_type: 
posture_category: data_security_posture
threat_tags:
- T1530
- data_exfiltration
- data_loss
- ciem_correlation
- attack_chain
risk_indicators:
  actor_type: cloud_principal
  action_type: data_transfer
  target_type: cloud_resource
  blast_radius: tenant_or_account
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: true
  modules:
  - data_loss_prevention
  categories:
  - data_exfiltration
  - unauthorized_access
  priority: critical
  impact:
    pci: PCI DSS Requirement 12.3 — Implement security awareness program and protect systems
    gdpr: GDPR Article 32 — Appropriate technical and organizational measures for data security
    hipaa: §164.306(a) — Ensure confidentiality, integrity, and availability of ePHI
  sensitive_data_context: |
  Unauthorized data exfiltration on ciem resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks: {}
remediation: Review and investigate this activity in the OCI Console and take corrective action.
check_config:
  events:
  - conditions:
      all:
      - field: source_type
        op: equals
        value: oci_audit
      - field: service
        op: equals
        value: com.oraclecloud.objectstorage
      - field: operation
        op: in
        value:
        - UpdateBucket
        - CreatePreauthenticatedRequest
  - conditions:
      all:
      - field: source_type
        op: equals
        value: oci_audit
      - field: service
        op: equals
        value: com.oraclecloud.objectstorage
      - field: operation
        op: in
        value:
        - GetObject
        - ListObjects
  type: sequence
  window_seconds: 900
