rule_id: oci.objectstorage.audit.preauthenticated_request_created
service: objectstorage
provider: oci
check_type: log
severity: critical
title: 'OCI Object Storage: Pre-Authenticated Request Created'
description: A pre-authenticated request (PAR) was created for an Object Storage bucket or object. PARs allow unauthenticated access to specific resources without OCI credentials.
threat_category: data_exfiltration
mitre_tactics:
- exfiltration
mitre_techniques:
- T1530
risk_score: 90
resource: oci_objectstorage_preauthenticated_request
domain: data_protection_and_privacy
action_category: create
log_source_type: 
posture_category: data_security_posture
threat_tags:
- T1530
- data_exfiltration
- data_loss
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: true
  modules:
  - data_access_governance
  - data_loss_prevention
  categories:
  - data_exfiltration
  - unauthorized_access
  priority: critical
  impact:
    pci: PCI DSS Requirement 3.1 — Minimize cardholder data storage
    gdpr: GDPR Article 25 — Data protection by design; minimize data exposure
    hipaa: §164.312(a)(1) — Access controls on data repositories containing ePHI
  sensitive_data_context: |
  Unauthorized data exfiltration on objectstorage resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks: {}
remediation: Review and investigate this activity in the OCI Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: oci_audit
    - field: service
      op: equals
      value: com.oraclecloud.objectstorage
    - field: operation
      op: equals
      value: CreatePreauthenticatedRequest
