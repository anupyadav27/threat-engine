rule_id: oci.database.audit.admin_activity
service: database
provider: oci
check_type: log
severity: high
title: 'OCI DB Audit: Privileged Admin Activity'
description: DBA or SYSDBA-privileged activity was recorded in database audit logs. Unauthorized admin actions can modify schema, bypass row security, or exfiltrate data.
threat_category: privilege_escalation
mitre_tactics:
- privilege_escalation
mitre_techniques:
- T1078
risk_score: 80
resource: oci_database_db_system
domain: identity_and_access_management
action_category: privilege_escalation
log_source_type: 
posture_category: iam_posture
threat_tags:
- T1078
- cloud_iam
- privilege_escalation
risk_indicators:
  actor_type: cloud_principal
  action_type: privilege_change
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: true
  modules:
  - database_security
  categories:
  - sensitive_data_access
  priority: high
  impact:
    pci: PCI DSS Requirement 7 — Restrict access to cardholder data by business need
    gdpr: GDPR Article 25 — Data protection by design and by default
    hipaa: §164.312(a)(1) — Access control for ePHI data systems
  sensitive_data_context: |
  Unauthorized privilege escalation on database resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks: {}
remediation: Review and investigate this activity in the OCI Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: oci_db_audit
    - field: privilege_used
      op: in
      value:
      - SYSDBA
      - SYSOPER
      - DBA
