rule_id: oci.networking.audit.vcn_flow_rdp_inbound
service: networking
provider: oci
check_type: log
severity: high
title: 'OCI VCN Flow: RDP Traffic Observed (Port 3389)'
description: Inbound RDP traffic (port 3389) was detected. Exposed RDP is a common initial access vector for ransomware groups.
threat_category: initial_access
mitre_tactics:
- initial_access
mitre_techniques:
- T1021
risk_score: 78
resource: oci_core_vcn
domain: threat_detection
action_category: create
log_source_type: 
posture_category: threat_posture
threat_tags:
- T1021
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks: {}
remediation: Review and investigate this activity in the OCI Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: oci_vcn_flow
    - field: destination_port
      op: equals
      value: 3389
    - field: direction
      op: equals
      value: INGRESS
