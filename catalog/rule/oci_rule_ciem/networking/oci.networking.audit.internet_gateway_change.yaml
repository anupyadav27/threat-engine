rule_id: oci.networking.audit.internet_gateway_change
service: networking
provider: oci
check_type: log
severity: high
title: 'OCI Networking: Internet Gateway Created or Deleted'
description: A VCN Internet Gateway was created or deleted. Creating an internet gateway for an internal VCN exposes private resources to the internet.
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
- initial_access
mitre_techniques:
- T1562
risk_score: 85
resource: oci_core_internet_gateway
domain: logging_monitoring_and_alerting
action_category: modify
log_source_type: 
posture_category: security_posture
threat_tags:
- T1562
- defense_evasion
- log_tampering
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: critical
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks: {}
remediation: Review and investigate this activity in the OCI Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: oci_audit
    - field: service
      op: equals
      value: com.oraclecloud.networking
    - field: operation
      op: in
      value:
      - CreateInternetGateway
      - UpdateInternetGateway
      - DeleteInternetGateway
