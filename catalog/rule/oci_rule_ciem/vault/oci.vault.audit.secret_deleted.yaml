rule_id: oci.vault.audit.secret_deleted
service: vault
provider: oci
check_type: log
severity: high
title: 'OCI Vault: Secret Deleted'
description: A secret was scheduled for deletion or immediately deleted from OCI Vault. Applications depending on the deleted secret will fail to authenticate.
threat_category: impact
mitre_tactics:
- impact
mitre_techniques:
- T1531
risk_score: 80
resource: oci_vault_secret
domain: cryptography_and_key_management
action_category: delete
log_source_type: 
posture_category: workload_posture
threat_tags:
- T1531
- impact
- availability
risk_indicators:
  actor_type: cloud_principal
  action_type: destructive
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: low
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: true
  modules:
  - secrets_management
  categories:
  - sensitive_data_access
  priority: high
  impact:
    pci: PCI DSS Requirement 3.4 — Sensitive authentication data must be protected
    gdpr: GDPR Article 32 — Appropriate technical measures to protect personal data
    hipaa: §164.312(e)(2)(ii) — Encryption of ePHI in transit and at rest
  sensitive_data_context: |
  Unauthorized impact on vault resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks: {}
remediation: Review and investigate this activity in the OCI Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: oci_audit
    - field: service
      op: equals
      value: com.oraclecloud.vault
    - field: operation
      op: in
      value:
      - ScheduleSecretDeletion
      - CancelSecretDeletion
