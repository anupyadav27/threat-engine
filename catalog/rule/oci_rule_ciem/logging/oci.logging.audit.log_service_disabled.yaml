rule_id: oci.logging.audit.log_service_disabled
service: logging
provider: oci
check_type: log
severity: high
title: 'OCI Logging: Service Log Disabled'
description: A service log (VCN flow, load balancer, Object Storage, etc.) was disabled. Disabling service logs removes audit trails for specific services.
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1562
risk_score: 78
resource: oci_logging_log
domain: logging_monitoring_and_alerting
action_category: modify
log_source_type: 
posture_category: security_posture
threat_tags:
- T1562
- defense_evasion
- log_tampering
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: critical
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks: {}
remediation: Review and investigate this activity in the OCI Console and take corrective action.
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: oci_audit
    - field: service
      op: equals
      value: com.oraclecloud.logging
    - field: operation
      op: equals
      value: UpdateLog
    - field: request.updateLogDetails.isEnabled
      op: equals
      value: false
