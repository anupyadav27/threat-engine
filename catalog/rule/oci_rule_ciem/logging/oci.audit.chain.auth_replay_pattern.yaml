rule_id: oci.audit.chain.auth_replay_pattern
service: logging
provider: oci
check_type: log
severity: high
title: Detect replay attempts in identity audit logs and patterns of authentication
  events suggesting credential replay.
description: Detects authentication replay attempts and suspicious patterns.
rationale: Monitoring this activity is essential for detecting adversary credential
  access against OCI resources. Unauthorized or unexpected API calls may indicate
  account compromise, privilege escalation, or an active attack chain.
threat_category: credential_access
mitre_tactics:
- credential_access
mitre_techniques:
- T1550
- T1212
risk_score: 78
resource: oci_logging_resource
source: csv_generated
is_active: true
domain: identity_and_access_management
action_category: audit_activity
log_source_type: oci_audit_log
posture_category: threat_posture
threat_tags:
- T1550
- T1212
- credential_access
- ciem_detection
- attack_chain
risk_indicators:
  actor_type: cloud_principal
  action_type: read
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  nist_800_171:
  - 3.5.4
remediation: '1. Lock the account or invalidate the session immediately if replay
  or brute force confirmed.

  2. Force MFA re-enrollment and rotate all API keys/secrets for the affected principal.

  3. Review all actions taken by the principal in the surrounding time window.

  4. Enforce account lockout policies after N failed attempts.

  5. Enable anomaly detection alerts for repeated authentication failures.'
references:
- https://attack.mitre.org/techniques/T1550/
- https://attack.mitre.org/techniques/T1212/
- https://docs.oracle.com/en-us/iaas/Content/Identity/
check_config:
  events:
  - conditions:
      all:
      - field: source_type
        op: equals
        value: oci_audit_log
      - field: service
        op: equals
        value: com.oraclecloud.audit
      - field: operation
        op: equals
        value: com.oraclecloud.identitycontrolplane.AssumeRole
  - conditions:
      all:
      - field: source_type
        op: equals
        value: oci_audit_log
      - field: service
        op: equals
        value: com.oraclecloud.audit
      - field: operation
        op: equals
        value: com.oraclecloud.audit.GetAuditEvents
  type: sequence
  window_seconds: 600
  version: '1.0'
