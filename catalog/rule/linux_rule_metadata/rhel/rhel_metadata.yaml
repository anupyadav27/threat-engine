  - rule_id: rhel.cis.5.root_is_the_only_gid_0_account
    title: "Ensure root is the only GID 0 account"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "5.4.2.2"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The usermod command can be used to specify which group the root account
      belongs to. This affects permissions of files that are created by the root
      account.
    rationale: >
      Using GID 0 for the root account helps prevent root -owned files from
      accidentally becoming accessible to non-privileged users.
    audit_procedure: >
      Run the following command to verify the root user's primary GID is 0, and no
      other user's have GID 0 as their primary GID: # awk -F: '($1 !~
      /^(sync|shutdown|halt|operator)/ && $4=='0') {print $1':'$4}' /etc/passwd
      root:0 Note: User's: sync, shutdown, halt, and operator are excluded from the
      check for other user's with GID 0
    remediation: >
      Run the following command to set the root user's GID to 0: # usermod -g 0 root
      Run the following command to set the root group's GID to 0: # groupmod -g 0
      root Remove any users other than the root user with GID 0 or assign them a new
      GID if appropriate. References: 1. NIST SP 800-53 Rev. 5: CM-1, CM-2, CM-6,
      CM-7, IA-5
