      1. NIST SP 800-53 Rev. 5: AU-3, AU-12 Additional Information: On systems where
      host based time synchronization is not available, verify that chrony is
      installed. On systems where host based time synchronization is available
      consult your documentation and verify that host based synchronization is in
      use.
    references: >
      1. NIST SP 800-53 Rev. 5: AU-3, AU-12 Additional Information: On systems where
      host based time synchronization is not available, verify that chrony is
      installed. On systems where host based time synchronization is available
      consult your documentation and verify that host based synchronization is in
      use.
