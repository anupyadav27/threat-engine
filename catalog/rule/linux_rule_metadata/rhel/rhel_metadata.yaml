    automation_type: automated
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "5.3.2.1"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      A custom profile can be created by copying and customizing one of the default
      profiles. The default profiles include: sssd, winbind, and nis. These profile
      can be customized to follow site specific requirements. You can select a
      profile for the authselect utility for a specific host. The profile will be
      applied to every user logging into the host.
    rationale: >
      A custom profile is required to customize many of the pam options.
      Modifications made to a default profile may be overwritten during an update.
      When you deploy a profile, the profile is applied to every user logging into
      the given host Impact: If local site customizations have been made to the
      authselect template or files in /etc/pam.d these custom entries should be
      added to the newly created custom profile before it's applied to the system.
      Note: The order within the pam stacks is important when adding these entries.
      Specifically for the password stack, the use_authtok option is important, and
      should appear on all modules except for the first entry. Example: password
      requisite pam_pwquality.so local_users_only #<-- Top of password stack,
      doesn't include use_authtok password required pam_pwhistory.so use_authtok
      #<-- subsequent entry in password stack, includes use_authtok
    audit_procedure: >
      Run the following command to verify the active authselect profile includes
      lines for the pwquality, pwhistory, faillock, and unix modules: # grep -P --
      '\b(pam_pwquality\.so|pam_pwhistory\.so|pam_faillock\.so|pam_unix\.so)\b'
      /etc/authselect/'$(head -1
      /etc/authselect/authselect.conf)'/{system,password}-auth Example output:
      /etc/authselect/custom/custom-profile/password-auth:auth required
      pam_faillock.so preauth silent {include if 'with-faillock'}
      /etc/authselect/custom/custom-profile/password-auth:auth sufficient
      pam_unix.so {if not 'without-nullok':nullok} /etc/authselect/custom/custom-
      profile/password-auth:auth required pam_faillock.so authfail {include if
      'with-faillock'} /etc/authselect/custom/custom-profile/password-auth:account
      required pam_faillock.so {include if 'with-faillock'}
      /etc/authselect/custom/custom-profile/password-auth:account required
      pam_unix.so /etc/authselect/custom/custom-profile/password-auth:password
      requisite pam_pwquality.so local_users_only /etc/authselect/custom/custom-
      profile/password-auth:password required pam_pwhistory.so use_authtok
      /etc/authselect/custom/custom-profile/password-auth:password sufficient
      pam_unix.so sha512 shadow {if not 'without-nullok':nullok} use_authtok
      /etc/authselect/custom/custom-profile/password-auth:session required
      pam_unix.so /etc/authselect/custom/custom-profile/system-auth:auth required
      pam_faillock.so preauth silent {include if 'with-faillock'}
      /etc/authselect/custom/custom-profile/system-auth:auth sufficient pam_unix.so
      {if not 'without-nullok':nullok} /etc/authselect/custom/custom-profile/system-
      auth:auth required pam_faillock.so authfail {include if 'with-faillock'}
      /etc/authselect/custom/custom-profile/system-auth:account required
      pam_faillock.so {include if 'with-faillock'} /etc/authselect/custom/custom-
      profile/system-auth:account required pam_unix.so
      /etc/authselect/custom/custom-profile/system-auth:password requisite
      pam_pwquality.so local_users_only /etc/authselect/custom/custom-
      profile/system-auth:password required pam_pwhistory.so use_authtok
      /etc/authselect/custom/custom-profile/system-auth:password sufficient
      pam_unix.so sha512 shadow {if not 'without-nullok':nullok}
      /etc/authselect/custom/custom-profile/system-auth:session required pam_unix.so
      Notes: • The lines may or may not include feature options defined by text
      surrounded by curly brackets ({}) e.g. {include if 'with-faillock'} • File
      path may be different due to the active profile in use
    remediation: >
      Perform the following to create a custom authselect profile, with the modules
      covered in this Benchmark correctly included in the custom profile template
      files Run the following command to create a custom authselect profile: #
      authselect create-profile <custom-profile name> <options> Example: #
      authselect create-profile custom-profile -b sssd Run the following command to
      select a custom authselect profile: # authselect select custom/<CUSTOM PROFILE
      NAME> {with-<OPTIONS>} {--force} Example: # authselect select custom/custom-
      profile --backup=PAM_CONFIG_BACKUP --force Notes: • The PAM and authselect
      packages must be versions pam-1.3.1-25 and authselect-1.2.6-1 or newer • The
      example is based on a custom profile built (copied) from the the SSSD default
      authselect profile. • The example does not include the symlink option for the
      PAM or Metadata files. This is due to the fact that by linking the PAM files
      future updates to authselect may overwrite local site customizations to the
      custom profile • The --backup=PAM_CONFIG_BACKUP option will create a backup of
      the current config. The backup will be stored at
      /var/lib/authselect/backups/PAM_CONFIG_BACKUP • The --force option will force
      the overwrite of the existing files and automatically backup system files
      before writing any change unless the --nobackup option is set. o On a new
      system where authselect has not been configured. In this case, the --force
      option will force the selected authselect profile to be active and overwrite
      the existing files with files generated from the selected authselect profile's
      templates o On an existing system with a custom configuration. The --force
      option may be used, but ensure that you note the backup location included as
      your custom files will be overwritten. This will allow you to review the
      changes and add any necessary customizations to the template files for the
      authselect profile. After updating the templates, run the command authselect
      apply-changes to add these custom entries to the files in /etc/pam.d/ - IF -
      you receive an error ending with a message similar to: [error] Refusing to
      activate profile unless those changes are removed or overwrite is requested.
      Some unexpected changes to the configuration were detected. Use 'select'
      command instead. This error is caused when the previous configuration was not
      created by authselect but by other tool or by manual changes and the --force
      option will be required to enable the authselect profile. References: 1.
      authselect(8) 2. https://access.redhat.com/documentation/en-
      us/red_hat_enterprise_linux/9/html/configuring_authentication_and_authorization
      _in_rhel/configuring-user-authentication-using-authselect_configuring-
      authentication-and-authorization-in-rhel#creating-and-deploying-your-own-
      authselect-profile_configuring-user-authentication-using-authselect 3.
      https://docs.oracle.com/en/operating-systems/oracle-linux/9/userauth/OL9-
      USERAUTH.pdf Additional Information: with the option --base-on=BASE-ID or
      -b=BASE-ID the new profile will be based on a profile named BASE-ID. The base
      profile location is determined with these steps: 1. If BASE-ID starts with
      prefix custom/ it is a custom profile. 2. Try if BASE-ID is found in vendor
      profiles. 3. Try if BASE-ID is found in default profiles. 4. Return an error.
      The authselect option --force or -f will cause authselect to write changes
      even if the previous configuration was not created by authselect but by other
      tool or by manual changes. This option will automatically backup system files
      before writing any change unless the --nobackup option is set. Example:
      authselect select custom/custom-profile with-pwhistory with-faillock without-
      nullok --backup=PAM_CONFIG_BACKUP --force
    references: >
      1. authselect(8) 2. https://access.redhat.com/documentation/en-
      us/red_hat_enterprise_linux/9/html/configuring_authentication_and_authorization
      _in_rhel/configuring-user-authentication-using-authselect_configuring-
