  - rule_id: rhel.cis.4.system_administrator_actions_sudolog_are_collected
    title: "Ensure system administrator actions (sudolog) are collected"
    severity: medium
    category: linux
    tech_type: rhel
    automation_type: manual
    cis_benchmark: "CIS_RHEL 7_v2.1.1"
    cis_version: "7_v2.1.1"
    cis_control: "4.1.16"
    cis_section: "4"
    profile_applicability: "Level 2"
    description: >
      Monitor the sudo log file. If the system has been properly configured to
      disable the use of the su command and force all administrators to have to log
      in first and then use sudo to execute privileged commands, then all
      administrator commands will be logged to /var/log/sudo.log . Any time a
      command is executed, an audit event will be triggered as the /var/log/sudo.log
      file will be opened for write and the executed administration command will be
      written to the log.
    rationale: >
      Changes in /var/log/sudo.log indicate that an administrator has executed a
      command or the log file itself has been tampered with. Administrators will
      want to correlate the events written to the audit trail with the records
      written to /var/log/sudo.log to verify if unauthorized commands have been
      executed.
    audit_procedure: >
      Run the following command and verify output matches: # grep actions
      /etc/audit/audit.rules -w /var/log/sudo.log -p wa -k actions
    remediation: >
      Add the following lines to the /etc/audit/audit.rules file: -w
      /var/log/sudo.log -p wa -k actions Notes: The system must be configured with
      sudisabled (See Item 5.6 Ensure access to the su command is restricted) to
      force all command execution through sudo. This will not be effective on the
      console, as administrators can log in as root. 219 | P a g e Critical
      Controls: 5.1 Minimize And Sparingly Use Administrative Privileges Minimize
      administrative privileges and only use administrative accounts when they are
      required. Implement focused auditing on the use of administrative privileged
      functions and monitor for anomalous behavior. 5.5 Log Failed Administrative
      Login Attempts Configure systems to issue a log entry and alert on any
      unsuccessful login to an administrative account. 220 | P a g e
    references: >
      
    impact: >
      
