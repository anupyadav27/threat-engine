    description: >
      The Network Information Service (NIS), formerly known as Yellow Pages, is a
      client- server directory service protocol used to distribute system
      configuration files. The NIS client ( ypbind ) was used to bind a machine to
      an NIS server and receive the distributed configuration files.
    rationale: >
      The NIS service is inherently an insecure system that has been vulnerable to
      DOS attacks, buffer overflows and has poor authentication for querying NIS
      maps. NIS generally has been replaced by such protocols as Lightweight
      Directory Access Protocol (LDAP). It is recommended that the service be
      removed. Impact: Many insecure service clients are used as troubleshooting
      tools and in testing environments. Uninstalling them can inhibit capability to
      test and troubleshoot. If they are required it is advisable to remove the
      clients after use to prevent accidental or intentional misuse.
    audit_procedure: >
      Run the following command to verify that the ypbind package is not installed:
      # rpm -q ypbind package ypbind is not installed
    remediation: >
      Run the following command to remove the ypbind package: # dnf remove ypbind
      References: 1. NIST SP 800-53 Rev. 5: CM-7
    references: >
