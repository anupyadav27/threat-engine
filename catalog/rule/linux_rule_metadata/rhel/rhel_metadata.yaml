  - rule_id: rhel.cis.1.aide_is_installed
    title: "Ensure AIDE is installed"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: manual
    cis_benchmark: "CIS_RHEL 7_v2.1.1"
    cis_version: "7_v2.1.1"
    cis_control: "1.3.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      AIDE takes a snapshot of filesystem state including modification times,
      permissions, and file hashes which can then be used to compare against the
      current state of the filesystem to detect modifications to the system.
    rationale: >
      By monitoring the filesystem state compromised files can be detected to
      prevent or limit the exposure of accidental or malicious misconfigurations or
      modified binaries.
    audit_procedure: >
      Run the following command and verify aide is installed: # rpm -q aide
      aide-<version>
    remediation: >
      Run the following command to install aide : # yum install aide Configure AIDE
      as appropriate for your environment. Consult the AIDE documentation for
      options. Initialize AIDE: # aide --init 61 | P a g e # mv
      /var/lib/aide/aide.db.new.gz /var/lib/aide/aide.db.gz References: 1. AIDE
      stable manual: http://aide.sourceforge.net/stable/manual.html Notes: The
      prelinking feature can interfere with AIDE because it alters binaries to speed
      up their start up times. Run prelink -uato restore the binaries to their
      prelinked state, thus avoiding false positives from AIDE. Critical Controls:
      3.5 Use File Integrity Tools For Critical System Files Use file integrity
      checking tools to ensure that critical system files (including sensitive
      system and application executables, libraries, and configurations) have not
      been altered. The reporting system should: have the ability to account for
      routine and expected changes; highlight and alert on unusual or unexpected
      alterations; show the history of configuration changes over time and identify
      who made the change (including the original logged-in account in the event of
      a user ID switch, such as with the su or sudo command). These integrity checks
      should identify suspicious system alterations such as: owner and permissions
      changes to files or directories; the use of alternate data streams which could
      be used to hide malicious activities; and the introduction of extra files into
      key system areas (which could indicate malicious payloads left by attackers or
      additional files inappropriately added during batch distribution processes).
      62 | P a g e
