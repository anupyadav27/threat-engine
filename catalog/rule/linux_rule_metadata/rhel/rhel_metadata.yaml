  - rule_id: rhel.cis.4.crontab_is_restricted_to_authorized_users
    title: "Ensure crontab is restricted to authorized users"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 8_v3.0.0"
    cis_version: "8_v3.0.0"
    cis_control: "4.1.1.8"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      crontab is the program used to install, deinstall, or list the tables used to
      drive the cron daemon. Each user can have their own crontab, and though these
      are files in /var/spool/cron/crontabs, they are not intended to be edited
      directly. If the /etc/cron.allow file exists, then you must be listed (one
      user per line) therein in order to be allowed to use this command. If the
      /etc/cron.allow file does not exist but the /etc/cron.deny file does exist,
      then you must not be listed in the /etc/cron.deny file in order to use this
      command. If neither of these files exists, then depending on site-dependent
      configuration parameters, only the super user will be allowed to use this
      command, or all users will be able to use this command. If both files exist
      then /etc/cron.allow takes precedence. Which means that /etc/cron.deny is not
      considered and your user must be listed in /etc/cron.allow in order to be able
      to use the crontab. Regardless of the existence of any of these files, the
      root administrative user is always allowed to setup a crontab. The files
      /etc/cron.allow and /etc/cron.deny, if they exist, must be either world-
      readable, or readable by group crontab. If they are not, then cron will deny
      access to all users until the permissions are fixed. There is one file for
      each user's crontab under the /var/spool/cron/crontabs directory. Users are
      not allowed to edit the files under that directory directly to ensure that
      only users allowed by the system to run periodic tasks can add them, and only
      syntactically correct crontabs will be written there. This is enforced by
      having the directory writable only by the crontab group and configuring
      crontab command with the setgid bid set for that specific group. Note: • Even
      though a given user is not listed in cron.allow, cron jobs can still be run as
      that user • The files /etc/cron.allow and /etc/cron.deny, if they exist, only
      controls administrative access to the crontab command for scheduling and
      modifying cron jobs
    rationale: >
      On many systems, only the system administrator is authorized to schedule cron
      jobs. Using the cron.allow file to control who can run cron jobs enforces this
      policy. It is easier to manage an allow list than a deny list. In a deny list,
      you could potentially add a user ID to the system and forget to add it to the
      deny files.
    audit_procedure: >
      -IF- cron is installed on the system: Run the following command to verify
      /etc/cron.allow: • Exists • Is mode 0640 or more restrictive • Is owned by the
      user root • Is group owned by the group root # stat -Lc 'Access: (%a/%A)
      Owner: (%U) Group: (%G)' /etc/cron.allow Access: (640/-rw-r-----) Owner:
      (root) Group: (root) Run the following command to verify cron.deny doesn't
      exist, -OR- is: • Mode 0640 or more restrictive • Owned by the user root •
      Group owned by the group root # [ -e '/etc/cron.deny' ] && stat -Lc 'Access:
      (%a/%A) Owner: (%U) Group: (%G)' /etc/cron.deny Access: (640/-rw-r-----)
      Owner: (root) Group: (root) -OR- Nothing is returned
    remediation: >
      -IF- cron is installed on the system: Run the following commands to: • Create
      /etc/cron.allow if it doesn't exist • Change owner or user root • Change group
      owner to group root • Change mode to 640 or more restrictive # [ ! -e
      '/etc/cron.allow' ] && touch /etc/cron.allow # chown root:root /etc/cron.allow
      # chmod u-x,g-wx,o-rwx /etc/cron.allow Run the following commands to: -IF-
      /etc/cron.deny exists: • Change owner or user root • Change group owner to
      group root • Change mode to 640 or more restrictive # [ -e '/etc/cron.deny' ]
      && chown root:root /etc/cron.deny # [ -e '/etc/cron.deny' ] && chmod
      u-x,g-wx,o-rwx /etc/cron.deny References: 1. NIST SP 800-53 Rev. 5: AC-3. MP-2
    references: >
      1. NIST SP 800-53 Rev. 5: AC-3. MP-2
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_RHEL_8_v3_0_0_4_1_1_8"
      nist_800_53: []
      soc2: []
      pci_dss: []
