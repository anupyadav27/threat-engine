  - rule_id: rhel.cis.5.password_quality_is_enforced_for_the_root_user
    title: "Ensure password quality is enforced for the root user"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "5.3.3.2.7"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      If the pwquality enforce_for_root option is enabled, the module will return
      error on failed check even if the user changing the password is root. This
      option is off by default which means that just the message about the failed
      check is printed but root can change the password anyway. Note: The root is
      not asked for an old password so the checks that compare the old and new
      password are not performed.
    rationale: >
      Use of a complex password helps to increase the time and resources required to
      compromise the password. Password complexity, or strength, is a measure of the
      effectiveness of a password in resisting attempts at guessing and brute-force
      attacks. Password complexity is one factor of several that determines how long
      it takes to crack a password. The more complex the password, the greater the
      number of possible combinations that need to be tested before the password is
      compromised.
    audit_procedure: >
      Run the following command to verify that the enforce_for_root option is
      enabled in a pwquality configuration file: # grep -Psi --
      '^\h*enforce_for_root\b' /etc/security/pwquality.conf
      /etc/security/pwquality.conf.d/*.conf Example output:
      /etc/security/pwquality.conf.d/50-pwroot.conf:enforce_for_root Notes: •
      Settings observe an order of precedence: o module arguments override the
      settings in the /etc/security/pwquality.conf configuration file o settings in
      the /etc/security/pwquality.conf configuration file override settings in a
      .conf file in the /etc/security/pwquality.conf.d/ directory o settings in a
      .conf file in the /etc/security/pwquality.conf.d/ directory are read in
      canonical order, with last read file containing the setting taking precedence
      • It is recommended that settings be configured in a .conf file in the
      /etc/security/pwquality.conf.d/ directory for clarity, convenience, and
      durability.
    remediation: >
      Edit or add the following line in a *.conf file in
      /etc/security/pwquality.conf.d or in /etc/security/pwquality.conf: Example:
      printf '\n%s\n' 'enforce_for_root' >> /etc/security/pwquality.conf.d/50-
      pwroot.conf Default Value: disabled References: 1. NIST SP 800-53 Rev. 5: IA-5
    references: >
      1. NIST SP 800-53 Rev. 5: IA-5
    impact: >
      
    compliance_mappings:
      cis:
