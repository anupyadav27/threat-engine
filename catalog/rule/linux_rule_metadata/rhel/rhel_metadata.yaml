  - rule_id: rhel.cis.5.audit_backlog_limit_is_sufficient
    title: "Ensure audit_backlog_limit is sufficient"
    severity: medium
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 8_v3.0.0"
    cis_version: "8_v3.0.0"
    cis_control: "5.2.1.3"
    cis_section: "5"
    profile_applicability: "Level 2"
    description: >
      The backlog limit has a default setting of 64
    rationale: >
      During boot if audit=1, then the backlog will hold 64 records. If more than 64
      records are created during boot, auditd records will be lost and potential
      malicious activity could go undetected.
    audit_procedure: >
      Run the following command and verify the audit_backlog_limit= parameter is set
      to an appropriate size for your organization # grubby --info=ALL | grep -Po
      '\baudit_backlog_limit=\d+\b' audit_backlog_limit=<BACKLOG SIZE> Validate that
      the line(s) returned contain a value for audit_backlog_limit= that is
      sufficient for your organization. Recommended that this value be 8192 or
      larger.
    remediation: >
      Run the following command to add audit_backlog_limit=<BACKLOG SIZE> to
      GRUB_CMDLINE_LINUX: # grubby --update-kernel ALL --args
      'audit_backlog_limit=<BACKLOG SIZE>' Example: # grubby --update-kernel ALL
      --args 'audit_backlog_limit=8192' References: 1. NIST SP 800-53 Rev. 5: AU-2,
      AU-12, SI-5
    references: >
      1. NIST SP 800-53 Rev. 5: AU-2, AU-12, SI-5
