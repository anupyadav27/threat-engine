    description: >
      Single user mode (rescue mode) is used for recovery when the system detects an
      issue during boot or by manual selection from the bootloader.
    rationale: >
      Requiring authentication in single user mode (rescue mode) prevents an
      unauthorized user from rebooting the system into single user to gain root
      privileges without credentials.
    audit_procedure: >
      Run the following commands and verify that /sbin/sulogin is used as shown: #
      grep /sbin/sulogin /usr/lib/systemd/system/rescue.service ExecStart=-/bin/sh
      -c '/sbin/sulogin; /usr/bin/systemctl --fail --no-block default' # grep
      /sbin/sulogin /usr/lib/systemd/system/emergency.service ExecStart=-/bin/sh -c
      '/sbin/sulogin; /usr/bin/systemctl --fail --no-block default'
    remediation: >
