      policy: max_log_file = <MB> References: 1. NIST SP 800-53 Rev. 5: AU-8
      Additional Information: The max_log_file parameter is measured in megabytes.
      Other methods of log rotation may be appropriate based on site policy. One
      example is time-based rotation strategies which don't have native support in
      auditd configurations. Manual audit of custom configurations should be
      evaluated for effectiveness and completeness.
