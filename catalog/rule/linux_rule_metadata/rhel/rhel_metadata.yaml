  - rule_id: rhel.cis.4.successful_file_system_mounts_are_collected
    title: "Ensure successful file system mounts are collected"
    severity: medium
    category: linux
    tech_type: rhel
    automation_type: manual
    cis_benchmark: "CIS_RHEL 7_v2.1.1"
    cis_version: "7_v2.1.1"
    cis_control: "4.1.13"
    cis_section: "4"
    profile_applicability: "Level 2"
    description: >
      Monitor the use of the mount system call. The mount (and umount ) system call
      controls the mounting and unmounting of file systems. The parameters below
      configure the system to create an audit record when the mount system call is
      used by a non-privileged user
    rationale: >
      It is highly unusual for a non privileged user to mount file systems to the
      system. While tracking mount commands gives the system administrator evidence
      that external media may have been mounted (based on a review of the source of
      the mount and confirming it's an external media type), it does not
      conclusively indicate that data was exported to the media. System
      administrators who wish to determine if data were exported, would also have to
      track successful open , creat and truncate system calls requiring write access
      to a file under the mount point of the external media file system. This could
      give a fair indication that a write occurred. The only way to truly prove it,
      would be to track successful writes to the external media. Tracking write
      system calls could quickly fill up the audit log and is not recommended.
      Recommendations on configuration options to track data export to media is
      beyond the scope of this document.
    audit_procedure: >
      On a 32 bit system run the following command and verify the output matches: #
      grep mounts /etc/audit/audit.rules -a always,exit -F arch=b32 -S mount -F
      auid>=1000 -F auid!=4294967295 -k mounts On a 64 bit system run the following
      command and verify the output matches: # grep mounts /etc/audit/audit.rules -a
      always,exit -F arch=b64 -S mount -F auid>=1000 -F auid!=4294967295 -k mounts
      -a always,exit -F arch=b32 -S mount -F auid>=1000 -F auid!=4294967295 -k
      mounts
    remediation: >
      For 32 bit systems add the following lines to the /etc/audit/audit.rules file:
      214 | P a g e -a always,exit -F arch=b32 -S mount -F auid>=1000 -F
      auid!=4294967295 -k mounts For 64 bit systems add the following lines to the
      /etc/audit/audit.rules file: -a always,exit -F arch=b64 -S mount -F auid>=1000
      -F auid!=4294967295 -k mounts -a always,exit -F arch=b32 -S mount -F
      auid>=1000 -F auid!=4294967295 -k mounts Notes: This tracks successful and
      unsuccessful mount commands. File system mounts do not have to come from
      external media and this action still does not verify write (e.g. CD ROMS).
      Critical Controls: 13 Data Protection Data Protection 215 | P a g e
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_RHEL_7_v2_1_1_4_1_13"
