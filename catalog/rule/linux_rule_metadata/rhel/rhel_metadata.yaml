  - rule_id: rhel.cis.4.password_expiration_is_365_days_or_less
    title: "Ensure password expiration is 365 days or less"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 8_v3.0.0"
    cis_version: "8_v3.0.0"
    cis_control: "4.5.1.2"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      The PASS_MAX_DAYS parameter in /etc/login.defs allows an administrator to
      force passwords to expire once they reach a defined age. It is recommended
      that the PASS_MAX_DAYS parameter be set to less than or equal to 365 days.
    rationale: >
      The window of opportunity for an attacker to leverage compromised credentials
      or successfully compromise credentials via an online brute force attack is
      limited by the age of the password. Therefore, reducing the maximum age of a
      password also reduces an attacker's window of opportunity. Impact: The
      password expiration must be greater than the minimum days between password
      changes or users will be unable to change their password
    audit_procedure: >
      Run the following command and verify PASS_MAX_DAYS conforms to site policy (no
      more than 365 days): # grep PASS_MAX_DAYS /etc/login.defs PASS_MAX_DAYS 365
      Run the following command and Review list of users and PASS_MAX_DAYS to verify
      that all users' PASS_MAX_DAYS conforms to site policy (no more than 365 days):
      # grep -E '^[^:]+:[^!*]' /etc/shadow | cut -d: -f1,5 <user>:<PASS_MAX_DAYS>
    remediation: >
      Set the PASS_MAX_DAYS parameter to conform to site policy in /etc/login.defs :
      PASS_MAX_DAYS 365 Modify user parameters for all users with a password set to
      match: # chage --maxdays 365 <user> References: 1. NIST SP 800-53 Rev. 5:
      CM-1, CM-2, CM-6, CM-7, IA-5 Additional Information: A value of -1 will
      disable password expiration.
    references: >
      1. NIST SP 800-53 Rev. 5: CM-1, CM-2, CM-6, CM-7, IA-5 Additional Information:
      A value of -1 will disable password expiration.
    impact: >
      The password expiration must be greater than the minimum days between password
      changes or users will be unable to change their password
    compliance_mappings:
      cis:
        - "CIS_RHEL_8_v3_0_0_4_5_1_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_rhel_8_v3_0_0_4_5_1_2"
