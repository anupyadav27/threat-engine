  - rule_id: rhel.cis.4.rsyslog_is_configured_to_send_logs_to_a_remote
    title: "Ensure rsyslog is configured to send logs to a remote log host"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: manual
    cis_benchmark: "CIS_RHEL 7_v2.1.1"
    cis_version: "7_v2.1.1"
    cis_control: "4.2.1.4"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      The rsyslog utility supports the ability to send logs it gathers to a remote
      log host running syslogd(8) or to receive messages from remote hosts, reducing
      administrative overhead.
    rationale: >
      Storing log data on a remote host protects log integrity from local attacks.
      If an attacker gains root access on the local system, they could tamper with
      or remove log data that is stored on the local system
    audit_procedure: >
      Review the /etc/rsyslog.conf file and verify that logs are sent to a central
      host (where loghost.example.com is the name of your central log host): # grep
      '^*.*[^I][^I]*@' /etc/rsyslog.conf *.* @@loghost.example.com
    remediation: >
      Edit the /etc/rsyslog.conf file and add the following line (where
      loghost.example.com is the name of your central log host). *.*
      @@loghost.example.com Run the following command to restart rsyslog : # pkill
      -HUP rsyslogd References: 1. See the rsyslog.conf(5) man page for more
      information. Notes: 230 | P a g e The double 'at' sign (@@) directs rsyslogto
      use TCP to send log messages to the server, which is a more reliable transport
      mechanism than the default UDP protocol. Critical Controls: 6.6 Deploy A SIEM
      OR Log Analysis Tools For Aggregation And Correlation/Analysis Deploy a SIEM
      (Security Information and Event Management) or log analytic tools for log
      aggregation and consolidation from multiple machines and for log correlation
      and analysis. Using the SIEM tool, system administrators and security
      personnel should devise profiles of common events from given systems so that
      they can tune detection to focus on unusual activity, avoid false positives,
      more rapidly identify anomalies, and prevent overwhelming analysts with
      insignificant alerts. 231 | P a g e
    references: >
