  - rule_id: rhel.cis.5.cryptographic_mechanisms_are_used_to_protect_the
    title: "Ensure cryptographic mechanisms are used to protect the integrity of audit tools"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 8_v3.0.0"
    cis_version: "8_v3.0.0"
    cis_control: "5.3.3"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      Audit tools include, but are not limited to, vendor-provided and open source
      audit tools needed to successfully view and manipulate audit information
      system activity and records. Audit tools include custom queries and report
      generators.
    rationale: >
      Protecting the integrity of the tools used for auditing purposes is a critical
      step toward ensuring the integrity of audit information. Audit information
      includes all information (e.g., audit records, audit settings, and audit
      reports) needed to successfully audit information system activity. Attackers
      may replace the audit tools or inject code into the existing tools with the
      purpose of providing the capability to hide or erase system activity from the
      audit logs. Audit tools should be cryptographically signed in order to provide
      the capability to identify when the audit tools have been modified,
      manipulated, or replaced. An example is a checksum hash of the file or files.
    audit_procedure: >
      Verify that Advanced Intrusion Detection Environment (AIDE) is properly
      configured . Run the following command to verify that AIDE is configured to
      use cryptographic mechanisms to protect the integrity of audit tools: # grep
      -Ps -- '(\/sbin\/(audit|au)\H*\b)' /etc/aide.conf.d/*.conf /etc/aide.conf
      Verify the output includes: /sbin/auditctl p+i+n+u+g+s+b+acl+xattrs+sha512
      /sbin/auditd p+i+n+u+g+s+b+acl+xattrs+sha512 /sbin/ausearch
      p+i+n+u+g+s+b+acl+xattrs+sha512 /sbin/aureport p+i+n+u+g+s+b+acl+xattrs+sha512
      /sbin/autrace p+i+n+u+g+s+b+acl+xattrs+sha512 /sbin/augenrules
      p+i+n+u+g+s+b+acl+xattrs+sha512
    remediation: >
      Add or update the following selection lines for to a file ending in .conf in
      the /etc/aide.conf.d/ directory or to /etc/aide.conf to protect the integrity
      of the audit tools: # Audit Tools /sbin/auditctl
      p+i+n+u+g+s+b+acl+xattrs+sha512 /sbin/auditd p+i+n+u+g+s+b+acl+xattrs+sha512
      /sbin/ausearch p+i+n+u+g+s+b+acl+xattrs+sha512 /sbin/aureport
      p+i+n+u+g+s+b+acl+xattrs+sha512 /sbin/autrace p+i+n+u+g+s+b+acl+xattrs+sha512
      /sbin/augenrules p+i+n+u+g+s+b+acl+xattrs+sha512 MITRE ATT&CK Mappings:
      Techniques / Sub- techniques Tactics Mitigations T1070, T1070.002, T1083,
      T1083.000 TA0007 6 System Maintenance Recommendations in this section are
      intended as maintenance and are intended to be checked on a frequent basis to
      ensure system stability. Many recommendations do not have quick remediations
      and require investigation into the cause and best fix available and may
      indicate an attempted breach of system security. 6.1 System File Permissions
      This section provides guidance on securing aspects of system files and
      directories.
