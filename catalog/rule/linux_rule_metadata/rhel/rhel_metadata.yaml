  - rule_id: rhel.cis.4.a_single_firewall_configuration_utility_is_in_use
    title: "Ensure a single firewall configuration utility is in use"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "4.1.2"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      In Linux security, employing a single, effective firewall configuration
      utility is crucial. Firewalls act as digital gatekeepers by filtering network
      traffic based on rules. Proper firewall configurations ensure that only
      legitimate traffic gets processed, reducing the system’s exposure to potential
      threats. The choice between FirewallD and NFTables depends on organizational
      specific needs: FirewallD - Is a firewall service daemon that provides a
      dynamic customizable host- based firewall with a D-Bus interface. Being
      dynamic, it enables creating, changing, and deleting the rules without the
      necessity to restart the firewall daemon each time the rules are changed.
      NFTables - Includes the nft utility for configuration of the nftables
      subsystem of the Linux kernel. Notes: • firewalld with nftables backend does
      not support passing custom nftables rules to firewalld, using the --direct
      option. • In order to configure firewall rules for nftables, a firewall
      utility needs to be installed and active of the system. The use of more than
      one firewall utility may produce unexpected results. • Allow port 22(ssh)
      needs to be updated to only allow systems requiring ssh connectivity to
      connect, as per site policy.
    rationale: >
      Proper configuration of a single firewall utility minimizes cyber threats and
      protects services and data, while avoiding vulnerabilities like open ports or
      exposed services. Standardizing on a single tool simplifies management,
      reduces errors, and fortifies security across Linux systems.
    audit_procedure: >
      Run the following script to verify that a single firewall utility is in use on
      the system: #!/usr/bin/env bash { l_output='' l_output2='' l_fwd_status=''
      l_nft_status='' l_fwutil_status='' # Determine FirewallD utility Status rpm -q
      firewalld > /dev/null 2>&1 && l_fwd_status='$(systemctl is-enabled
      firewalld.service):$(systemctl is-active firewalld.service)' # Determine
      NFTables utility Status rpm -q nftables > /dev/null 2>&1 &&
      l_nft_status='$(systemctl is-enabled nftables.service):$(systemctl is-active
      nftables.service)' l_fwutil_status='$l_fwd_status:$l_nft_status' case
      $l_fwutil_status in
      enabled:active:masked:inactive|enabled:active:disabled:inactive) l_output='\n
      - FirewallD utility is in use, enabled and active\n - NFTables utility is
      correctly disabled or masked and inactive\n - Only configure the
      recommendations found in the Configure Firewalld subsection' ;;
      masked:inactive:enabled:active|disabled:inactive:enabled:active) l_output='\n
      - NFTables utility is in use, enabled and active\n - FirewallD utility is
      correctly disabled or masked and inactive\n - Only configure the
      recommendations found in the Configure NFTables subsection' ;;
      enabled:active:enabled:active) l_output2='\n - Both FirewallD and NFTables
      utilities are enabled and active. Configure only ONE firewall either NFTables
      OR Firewalld' ;; enabled:*:enabled:*) l_output2='\n - Both FirewallD and
      NFTables utilities are enabled\n - Configure only ONE firewall: either
      NFTables OR Firewalld' ;; *:active:*:active) l_output2='\n - Both FirewallD
      and NFTables utilities are enabled\n - Configure only ONE firewall: either
      NFTables OR Firewalld' ;; :enabled:active) l_output='\n - NFTables utility is
      in use, enabled, and active\n - FirewallD package is not installed\n - Only
      configure the recommendations found in the Configure NFTables subsection' ;;
      :) l_output2='\n - Neither FirewallD or NFTables is installed. Configure only
      ONE firewall either NFTables OR Firewalld' ;; *:*:) l_output2='\n - NFTables
      package is not installed on the system. Install NFTables and Configure only
      ONE firewall either NFTables OR Firewalld' ;; *) l_output2='\n - Unable to
      determine firewall state. Configure only ONE firewall either NFTables OR
      Firewalld' ;; esac if [ -z '$l_output2' ]; then echo -e '\n- Audit Results:\n
      ** Pass **\n$l_output\n' else echo -e '\n- Audit Results:\n ** Fail
      **\n$l_output2\n' fi }
    remediation: >
      Run the following script to ensure that a single firewall utility is in use on
      the system: #!/usr/bin/env bash { l_fwd_status='' l_nft_status=''
      l_fwutil_status='' # Determine FirewallD utility Status rpm -q firewalld >
      /dev/null 2>&1 && l_fwd_status='$(systemctl is-enabled
      firewalld.service):$(systemctl is-active firewalld.service)' # Determine
      NFTables utility Status rpm -q nftables > /dev/null 2>&1 &&
      l_nft_status='$(systemctl is-enabled nftables.service):$(systemctl is-active
      nftables.service)' l_fwutil_status='$l_fwd_status:$l_nft_status' case
      $l_fwutil_status in
      enabled:active:masked:inactive|enabled:active:disabled:inactive) echo -e '\n -
      FirewallD utility is in use, enabled and active\n - NFTables utility is
      correctly disabled or masked and inactive\n - no remediation required' ;;
      masked:inactive:enabled:active|disabled:inactive:enabled:active) echo -e '\n -
      NFTables utility is in use, enabled and active\n - FirewallD utility is
      correctly disabled or masked and inactive\n - no remediation required' ;;
      enabled:active:enabled:active) echo -e '\n - Both FirewallD and NFTables
      utilities are enabled and active\n - stopping and masking NFTables utility'
      systemctl stop nftables && systemctl --now mask nftables ;;
      enabled:*:enabled:*) echo -e '\n - Both FirewallD and NFTables utilities are
      enabled\n - remediating' if [ '$(awk -F: '{print $2}' <<< '$l_fwutil_status')'
      = 'active' ] && [ '$(awk -F: '{print $4}' <<< '$l_fwutil_status')' =
      'inactive' ]; then echo ' - masking NFTables utility' systemctl stop nftables
      && systemctl --now mask nftables elif [ '$(awk -F: '{print $4}' <<<
      '$l_fwutil_status')' = 'active' ] && [ '$(awk -F: '{print $2}' <<<
      '$l_fwutil_status')' = 'inactive' ]; then echo ' - masking FirewallD utility'
      systemctl stop firewalld && systemctl --now mask firewalld fi ;;
      *:active:*:active) echo -e '\n - Both FirewallD and NFTables utilities are
      active\n - remediating' if [ '$(awk -F: '{print $1}' <<< '$l_fwutil_status')'
      = 'enabled' ] && [ '$(awk -F: '{print $3}' <<< '$l_fwutil_status')' !=
      'enabled' ]; then echo ' - stopping and masking NFTables utility' systemctl
      stop nftables && systemctl --now mask nftables elif [ '$(awk -F: '{print $3}'
      <<< '$l_fwutil_status')' = 'enabled' ] && [ '$(awk -F: '{print $1}' <<<
      '$l_fwutil_status')' != 'enabled' ]; then echo ' - stopping and masking
      FirewallD utility' systemctl stop firewalld && systemctl --now mask firewalld
      fi ;; :enabled:active) echo -e '\n - NFTables utility is in use, enabled, and
      active\n - FirewallD package is not installed\n - no remediation required' ;;
      :) echo -e '\n - Neither FirewallD or NFTables is installed.\n - remediating\n
      - installing NFTables' echo -e '\n - Configure only ONE firewall either
      NFTables OR Firewalld and follow the according subsection to complete this
      remediation process' dnf -q install nftables ;; *:*:) echo -e '\n - NFTables
      package is not installed on the system\n - remediating\n - installing
      NFTables' echo -e '\n - Configure only ONE firewall either NFTables OR
      Firewalld and follow the according subsection to complete this remediation
      process' dnf -q install nftables ;; *) echo -e '\n - Unable to determine
      firewall state' echo -e '\n - MANUAL REMEDIATION REQUIRED: Configure only ONE
      firewall either NFTables OR Firewalld' ;; esac } References: 1.
      https://access.redhat.com/documentation/en-us/red_hat_enterprise_linux/9/html-
      single/configuring_firewalls_and_packet_filters/index
    references: >
      1. https://access.redhat.com/documentation/en-
      us/red_hat_enterprise_linux/9/html-
      single/configuring_firewalls_and_packet_filters/index
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_RHEL_9_v2_0_0_4_1_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_rhel_9_v2_0_0_4_1_2"
