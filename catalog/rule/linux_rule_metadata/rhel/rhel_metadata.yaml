  - rule_id: rhel.cis.1.system_wide_crypto_policy_disables_macs_less_than
    title: "Ensure system wide crypto policy disables macs less than 128 bits"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "1.6.4"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Message Authentication Code (MAC) algorithm is a family of cryptographic
      functions that is parameterized by a symmetric key. Each of the functions can
      act on input data (called a “message”) of variable length to produce an output
      value of a specified length. The output value is called the MAC of the input
      message. A MAC algorithm can be used to provide data-origin authentication and
      data-integrity protection
    rationale: >
      Weak algorithms continue to have a great deal of attention as a weak spot that
      can be exploited with expanded computing power. An attacker that breaks the
      algorithm could take advantage of a MiTM position to decrypt the tunnel and
      capture credentials and information. A MAC algorithm must be computationally
      infeasible to determine the MAC of a message without knowledge of the key,
      even if one has already seen the results of using that key to compute the
      MAC's of other messages.
    audit_procedure: >
      Run the following script to verify weak MACs are disabled: # grep -Pi --
      '^\h*mac\h*=\h*([^#\n\r]+)?-64\b' /etc/crypto- policies/state/CURRENT.pol
      Nothing should be returned
    remediation: >
      Note: • The commands below are written for the included DEFAULT system-wide
      crypto policy. If another policy is in use and follows local site policy,
      replace DEFAULT with the name of your system-wide crypto policy. • Multiple
      subpolicies may be assigned to a policy as a colon separated list. e.g.
      DEFAULT:NO-SHA1:NO-SSHCBC • Subpolicies: o Not included in the update-crypto-
      policies --set command will not be applied to the system wide crypto policy. o
      must exist before they can be applied to the system wide crypto policy. o
      .pmod file filenames must be in all upper case, upper case, e.g. NO-
      WEAKMAC.pmod, or they will not be read by the update-crypto-policies --set
      command. Create or edit a file in /etc/crypto-policies/policies/modules/
      ending in .pmod and add or modify one of the following lines: mac = -*-64* #
      Disables weak macs Example: # printf '%s\n' '# This is a subpolicy to disable
