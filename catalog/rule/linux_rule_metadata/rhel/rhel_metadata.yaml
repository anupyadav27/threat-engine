  - rule_id: rhel.cis.1.system_wide_crypto_policy_disables_cbc_for_ssh
    title: "Ensure system wide crypto policy disables cbc for ssh"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "1.6.5"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Cypher Block Chaining (CBC) is an algorithm that uses a block cipher.
    rationale: >
      A vulnerability exists in SSH messages that employ CBC mode that may allow an
      attacker to recover plaintext from a block of ciphertext. If exploited, this
      attack can potentially allow an attacker to recover up to 32 bits of plaintext
      from an arbitrary block of ciphertext from a connection secured using the SSH
      protocol. Impact: CBC ciphers might be the only common cyphers when connecting
      to older SSH clients and servers
    audit_procedure: >
      Run the following script to verify CBC is disabled for SSH: #!/usr/bin/env
      bash { l_output='' l_output2='' if grep -Piq --
      '^\h*cipher\h*=\h*([^#\n\r]+)?-CBC\b' /etc/crypto- policies/state/CURRENT.pol;
      then if grep -Piq -- '^\h*cipher@(lib|open)ssh(-server|-client)?\h*=\h*'
      /etc/crypto-policies/state/CURRENT.pol; then if ! grep -Piq --
      '^\h*cipher@(lib|open)ssh(-server|- client)?\h*=\h*([^#\n\r]+)?-CBC\b'
      /etc/crypto-policies/state/CURRENT.pol; then l_output='$l_output\n - Cipher
      Block Chaining (CBC) is disabled for SSH' else l_output2='$l_output2\n -
      Cipher Block Chaining (CBC) is enabled for SSH' fi else
      l_output2='$l_output2\n - Cipher Block Chaining (CBC) is enabled for SSH' fi
      else l_output=' - Cipher Block Chaining (CBC) is disabled' fi if [ -z
      '$l_output2' ]; then # Provide output from checks echo -e '\n- Audit Result:\n
      ** PASS **\n$l_output\n' else echo -e '\n- Audit Result:\n ** FAIL **\n -
      Reason(s) for audit failure:\n$l_output2\n' [ -n '$l_output' ] && echo -e '\n-
      Correctly set:\n$l_output\n' fi }
    remediation: >
      Note: • The commands below are written for the included DEFAULT system-wide
      crypto policy. If another policy is in use and follows local site policy,
      replace DEFAULT with the name of your system-wide crypto policy. • CBC can be
      turned off globally by using the argument cipher opposed to cipher@SSH •
      Multiple subpolicies may be assigned to a policy as a colon separated list.
      e.g. DEFAULT:NO-SHA1:NO-SSHCBC • Subpolicies: o Not included in the update-
      crypto-policies --set command will not be applied to the system wide crypto
      policy. o must exist before they can be applied to the system wide crypto
      policy. o .pmod file filenames must be in all upper case, upper case, e.g. NO-
      SSHCBC.pmod, or they will not be read by the update-crypto-policies --set
      command. Create or edit a file in /etc/crypto-policies/policies/modules/
      ending in .pmod and add or modify one of the the following lines: cipher@SSH =
      -*-CBC # Disables the CBC cipher for SSH Example: # printf '%s\n' '# This is a
      subpolicy to disable all CBC mode ciphers' '# for the SSH protocol (libssh and
      OpenSSH)' 'cipher@SSH = -*-CBC' >> /etc/crypto-policies/policies/modules/NO-
      SSHCBC.pmod Run the following command to update the system-wide cryptographic
      policy # update-crypto-policies --set
      <CRYPTO_POLICY>:<CRYPTO_SUBPOLICY1>:<CRYPTO_SUBPOLICY2>:<CRYPTO_SUBPOLICY3>
      Example: update-crypto-policies --set DEFAULT:NO-SHA1:NO-WEAKMAC:NO-SSHCBC Run
      the following command to reboot the system to make your cryptographic settings
      effective for already running services and applications: # reboot References:
