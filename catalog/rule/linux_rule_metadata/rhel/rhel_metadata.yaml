  - rule_id: rhel.cis.7.no_duplicate_user_names_exist
    title: "Ensure no duplicate user names exist"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "7.2.6"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      Although the useradd program will not let you create a duplicate user name, it
      is possible for an administrator to manually edit the /etc/passwd file and
      change the user name.
    rationale: >
      If a user is assigned a duplicate user name, it will create and have access to
      files with the first UID for that username in /etc/passwd . For example, if
      'test4' has a UID of 1000 and a subsequent 'test4' entry has a UID of 2000,
      logging in as 'test4' will use UID 1000. Effectively, the UID is shared, which
      is a security problem.
    audit_procedure: >
      Run the following script and verify no results are returned: #!/usr/bin/env
      bash { while read -r l_count l_user; do if [ '$l_count' -gt 1 ]; then echo -e
      'Duplicate User: \'$l_user\' Users: \'$(awk -F: '($1 == n) { print $1 }'
      n=$l_user /etc/passwd | xargs)\'' fi done < <(cut -f1 -d':' /etc/group | sort
      -n | uniq -c) }
    remediation: >
      Based on the results of the audit script, establish unique user names for the
      users. File ownerships will automatically reflect the change as long as the
      users have unique UIDs. References: 1. NIST SP 800-53 Rev. 5: CM-1, CM-2,
      CM-6, CM-7, IA-5 MITRE ATT&CK Mappings: Techniques / Sub- techniques Tactics
      Mitigations T1078, T1078.001, T1078.003 TA0004 M1027
