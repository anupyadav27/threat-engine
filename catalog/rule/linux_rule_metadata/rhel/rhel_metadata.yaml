  - rule_id: rhel.cis.1.permissions_on_etc_motd_are_configured
    title: "Ensure permissions on /etc/motd are configured"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: manual
    cis_benchmark: "CIS_RHEL 7_v2.1.1"
    cis_version: "7_v2.1.1"
    cis_control: "1.7.1.4"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      The contents of the /etc/motd file are displayed to users after login and
      function as a message of the day for authenticated users.
    rationale: >
      If the /etc/motd file does not have the correct ownership it could be modified
      by unauthorized users with incorrect or misleading information.
    audit_procedure: >
      Run the following command and verify Uid and Gid are both 0/root and Access is
      644 : # stat /etc/motd Access: (0644/-rw-r--r--) Uid: ( 0/ root) Gid: ( 0/
      root)
    remediation: >
      Run the following commands to set permissions on /etc/motd : # chown root:root
      /etc/motd # chmod 644 /etc/motd Critical Controls: 5.1 Minimize And Sparingly
      Use Administrative Privileges Minimize administrative privileges and only use
      administrative accounts when they are required. Implement focused auditing on
      the use of administrative privileged functions and monitor for anomalous
      behavior. 93 | P a g e
