  - rule_id: rhel.cis.1.no_unconfined_services_exist
    title: "Ensure no unconfined services exist"
    severity: medium
    category: linux
    tech_type: rhel
    automation_type: manual
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "1.3.1.6"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      Unconfined processes run in unconfined domains
    rationale: >
      For unconfined processes, SELinux policy rules are applied, but policy rules
      exist that allow processes running in unconfined domains almost all access.
      Processes running in unconfined domains fall back to using DAC rules
      exclusively. If an unconfined process is compromised, SELinux does not prevent
      an attacker from gaining access to system resources and data, but of course,
      DAC rules are still used. SELinux is a security enhancement on top of DAC
      rules – it does not replace them Impact: Confining a service that inherently
      requires unconfined access to function may disrupt its intended operations.
      This restriction may lead to downtime, degraded performance, or loss in
      functionality. It is crucial to analyze and adjust SELinux policies in
      accordance with site security policies and operational requirements.
    audit_procedure: >
      Run the following command and verify no output is produced: # ps -eZ | grep
      unconfined_service_t
    remediation: >
      Investigate any unconfined processes found during the audit action. If
      necessary create a customize SELinux policy to allow necessary actions for the
      service. Warning: Knowledge about creating and configuring SELinux policies is
      needed. A Basic example on how to create a policy is included below. 1.
      Identify the unconfined service: determine the name and process of the service
      2. Identify the functionality: determine if the functionality is required for
      operations 3. Create or add to the custom allow list in the SELinux policy
      configuration Example SELinux policy configuration:
      service_allowlist_policy.te # Example SELinux policy configuration for
      allowing access to specific actions and resources for a service module
      my_service 1.0; require { type my_service_t; type system_resource_t; class
      file { read write execute }; class dir { read write add_name }; class
      tcp_socket name_connect; } allow my_service_t system_resource_t:file { read
      write execute }; # Allow my_service_t to read, write, and execute files with
      the system_resource_t context allow my_service_t system_resource_t:dir { read
      write add_name }; # Allow my_service_t to read and write to directories with
      the system_resource_t context allow my_service_t system_resource_t:tcp_socket
      name_connect; # Allow my_service_t to establish TCP connections 4. Compile the
      policy # checkmodule -M -, -o service_allowlist_policy.mod
      service_allowlist_policy.te 5. Create the package # semodule_package -o
      service_allowlist_policy.pp -m service_allowlist_policy.mod 6. Load the policy
      # semodule -i service_allowlist_policy.pp 7. Apply the policy to the service #
      chcon -t se service_allowlist_policy /path/to/service_binary References: 1.
      NIST SP 800-53 Rev. 5: AC-3, MP-2 2.
      https://nb.fedorapeople.org/cvsfedora/web/html/docs/selinux-guide/f10/en-
      US/sect-Security-Enhanced_Linux-Targeted_Policy-Unconfined_Processes.html 3.
      https://access.redhat.com/documentation/en-
      us/red_hat_enterprise_linux/9/html/using_selinux/managing-confined-and-
      unconfined-users_using-selinux 4. https://access.redhat.com/documentation/id-
      id/red_hat_enterprise_linux/9/pdf/using_selinux/red_hat_enterprise_linux-9-
      using_selinux-en-us.pdf Additional Information: Occasionally certain daemons
      such as backup or centralized management software may require running
      unconfined. Any such software should be carefully analyzed and documented
      before such an exception is made.
    references: >
      1. NIST SP 800-53 Rev. 5: AC-3, MP-2 2.
      https://nb.fedorapeople.org/cvsfedora/web/html/docs/selinux-guide/f10/en-
