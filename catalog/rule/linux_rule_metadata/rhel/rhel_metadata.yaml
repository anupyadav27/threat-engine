  - rule_id: rhel.cis.5.access_to_the_su_command_is_restricted
    title: "Ensure access to the su command is restricted"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "5.2.7"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The su command allows a user to run a command or shell as another user. The
      program has been superseded by sudo, which allows for more granular control
      over privileged access. Normally, the su command can be executed by any user.
      By uncommenting the pam_wheel.so statement in /etc/pam.d/su, the su command
      will only allow users in a specific groups to execute su. This group should be
      empty to reinforce the use of sudo for privileged access.
    rationale: >
      Restricting the use of su , and using sudo in its place, provides system
      administrators better control of the escalation of user privileges to execute
      privileged commands. The sudo utility also provides a better logging and audit
      mechanism, as it can log each command executed via sudo , whereas su can only
      record that a user executed the su program.
    audit_procedure: >
      Run the following command and verify the output matches the line: # grep -Pi
      '^\h*auth\h+(?:required|requisite)\h+pam_wheel\.so\h+(?:[^#\n\r]+\h+)?((?!\2)
      (use_uid\b|group=\H+\b))\h+(?:[^#\n\r]+\h+)?((?!\1)(use_uid\b|group=\H+\b))(\
      h+.*)?$' /etc/pam.d/su auth required pam_wheel.so use_uid group=<group_name>
      Run the following command and verify that the group specified in <group_name>
      contains no users: # grep <group_name> /etc/group <group_name>:x:<GID>: There
      should be no users listed after the Group ID field.
    remediation: >
      Create an empty group that will be specified for use of the su command. The
      group should be named according to site policy. Example: # groupadd sugroup
      Add the following line to the /etc/pam.d/su file, specifying the empty group:
      auth required pam_wheel.so use_uid group=sugroup References: 1. NIST SP 800-53
      Rev. 5: AC-3, MP-2
    references: >
      1. NIST SP 800-53 Rev. 5: AC-3, MP-2
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_RHEL_9_v2_0_0_5_2_7"
      nist_800_53: []
      soc2: []
      pci_dss: []
