  - rule_id: rhel.cis.6.world_writable_files_and_directories_are_secured
    title: "Ensure world writable files and directories are secured"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 8_v3.0.0"
    cis_version: "8_v3.0.0"
    cis_control: "6.1.11"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      World writable files are the least secure. Data in world-writable files can be
      modified and compromised by any user on the system. World writable files may
      also indicate an incorrectly written script or program that could potentially
      be the cause of a larger compromise to the system's integrity. See the
      chmod(2) man page for more information. Setting the sticky bit on world
      writable directories prevents users from deleting or renaming files in that
      directory that are not owned by them.
    rationale: >
      Data in world-writable files can be modified and compromised by any user on
      the system. World writable files may also indicate an incorrectly written
      script or program that could potentially be the cause of a larger compromise
      to the system's integrity. This feature prevents the ability to delete or
      rename files in world writable directories (such as /tmp ) that are owned by
      another user.
    audit_procedure: >
      Run the following script to verify: • No world writable files exist • No world
      writable directories without the sticky bit exist #!/usr/bin/env bash {
      l_output='' l_output2='' l_smask='01000' a_path=(); a_arr=(); a_file=();
      a_dir=() # Initialize arrays a_path=(! -path '/run/user/*' -a ! -path
      '/proc/*' -a ! -path '*/containerd/*' -a ! -path '*/kubelet/pods/*' -a ! -path
      '/sys/kernel/security/apparmor/*' -a ! -path '/snap/*' -a ! -path
      '/sys/fs/cgroup/memory/*' -a ! -path '/sys/fs/selinux/*') while read -r l_bfs;
      do a_path+=( -a ! -path ''$l_bfs'/*') done < <(findmnt -Dkerno fstype,target |
      awk '$1 ~ /^\s*(nfs|proc|smb)/ {print $2}') # Populate array with files that
      will possibly fail one of the audits while IFS= read -r -d $'\0' l_file; do [
      -e '$l_file' ] && a_arr+=('$(stat -Lc '%n^%#a' '$l_file')') done < <(find / \(
      '${a_path[@]}' \) \( -type f -o -type d \) -perm -0002 -print0 2>/dev/null)
      while IFS='^' read -r l_fname l_mode; do # Test files in the array [ -f
      '$l_fname' ] && a_file+=('$l_fname') # Add WR files if [ -d '$l_fname' ]; then
      # Add directories w/o sticky bit [ ! $(( $l_mode & $l_smask )) -gt 0 ] &&
      a_dir+=('$l_fname') fi done < <(printf '%s\n' '${a_arr[@]}') if ! ((
      ${#a_file[@]} > 0 )); then l_output='$l_output\n - No world writable files
      exist on the local filesystem.' else l_output2='$l_output2\n - There are
      \'$(printf '%s' '${#a_file[@]}')\' World writable files on the system.\n - The
      following is a list of World writable files:\n$(printf '%s\n'
      '${a_file[@]}')\n - end of list\n' fi if ! (( ${#a_dir[@]} > 0 )); then
      l_output='$l_output\n - Sticky bit is set on world writable directories on the
      local filesystem.' else l_output2='$l_output2\n - There are \'$(printf '%s'
      '${#a_dir[@]}')\' World writable directories without the sticky bit on the
      system.\n - The following is a list of World writable directories without the
      sticky bit:\n$(printf '%s\n' '${a_dir[@]}')\n - end of list\n' fi unset
      a_path; unset a_arr; unset a_file; unset a_dir # Remove arrays # If l_output2
      is empty, we pass if [ -z '$l_output2' ]; then echo -e '\n- Audit Result:\n **
      PASS **\n - * Correctly configured * :\n$l_output\n' else echo -e '\n- Audit
      Result:\n ** FAIL **\n - * Reasons for audit failure * :\n$l_output2' [ -n
      '$l_output' ] && echo -e '- * Correctly configured * :\n$l_output\n' fi }
      Note: On systems with a large number of files and/or directories, this audit
      may be a long running process
    remediation: >
      • World Writable Files: o It is recommended that write access is removed from
      other with the command ( chmod o-w <filename> ), but always consult relevant
      vendor documentation to avoid breaking any application dependencies on a given
      file. • World Writable Directories: o Set the sticky bit on all world writable
      directories with the command ( chmod a+t <directory_name> ) Run the following
      script to: • Remove other write permission from any world writable files • Add
      the sticky bit to all world writable directories #!/usr/bin/env bash {
      l_smask='01000' a_path=(); a_arr=() # Initialize array a_path=(! -path
      '/run/user/*' -a ! -path '/proc/*' -a ! -path '*/containerd/*' -a ! -path
      '*/kubelet/pods/*' -a ! -path '/sys/kernel/security/apparmor/*' -a ! -path
      '/snap/*' -a ! -path '/sys/fs/cgroup/memory/*' -a ! -path '/sys/fs/selinux/*')
      while read -r l_bfs; do a_path+=( -a ! -path ''$l_bfs'/*') done < <(findmnt
      -Dkerno fstype,target | awk '$1 ~ /^\s*(nfs|proc|smb)/ {print $2}') # Populate
      array with files while IFS= read -r -d $'\0' l_file; do [ -e '$l_file' ] &&
      a_arr+=('$(stat -Lc '%n^%#a' '$l_file')') done < <(find / \( '${a_path[@]}' \)
      \( -type f -o -type d \) -perm -0002 -print0 2>/dev/null) while IFS='^' read
      -r l_fname l_mode; do # Test files in the array if [ -f '$l_fname' ]; then #
      Remove excess permissions from WW files echo -e ' - File: \'$l_fname\' is
      mode: \'$l_mode\'\n - removing write permission on \'$l_fname\' from
      \'other\'' chmod o-w '$l_fname' fi if [ -d '$l_fname' ]; then if [ ! $((
      $l_mode & $l_smask )) -gt 0 ]; then # Add sticky bit echo -e ' - Directory:
      \'$l_fname\' is mode: \'$l_mode\' and doesn't have the sticky bit set\n -
      Adding the sticky bit' chmod a+t '$l_fname' fi fi done < <(printf '%s\n'
      '${a_arr[@]}') unset a_path; unset a_arr # Remove array } References: 1. NIST
      SP 800-53 Rev. 5: AC-3. MP-2
    references: >
      1. NIST SP 800-53 Rev. 5: AC-3. MP-2
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_RHEL_8_v3_0_0_6_1_11"
      nist_800_53: []
      soc2: []
      pci_dss: []
