  - rule_id: rhel.cis.3.host_based_firewall_loopback_traffic_is_configured
    title: "Ensure host based firewall loopback traffic is configured"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 8_v3.0.0"
    cis_version: "8_v3.0.0"
    cis_control: "3.4.2.2"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Configure the loopback interface to accept traffic. Configure all other
      interfaces to deny traffic to the loopback network
    rationale: >
      Loopback traffic is generated between processes on machine and is typically
      critical to operation of the system. The loopback interface is the only place
      that loopback network traffic should be seen, all other interfaces should
      ignore traffic on this network as an anti-spoofing measure.
    audit_procedure: >
      Run the following script to verify that the loopback interface is configured:
      #!/usr/bin/env bash { l_output='' l_output2='' if nft list ruleset | awk
      '/hook\s+input\s+/,/\}\s*(#.*)?$/' | grep -Pq -- '\H+\h+'lo'\h+accept'; then
      l_output='$l_output\n - Network traffic to the loopback address is correctly
      set to accept' else l_output2='$l_output2\n - Network traffic to the loopback
      address is not set to accept' fi l_ipsaddr='$(nft list ruleset | awk
      '/filter_IN_public_deny|hook\s+input\s+/,/\}\s*(#.*)?$/' | grep -P --
      'ip\h+saddr')' if grep -Pq --
      'ip\h+saddr\h+127\.0\.0\.0\/8\h+(counter\h+packets\h+\d+\h+bytes\h+\d+\h+)?dr
      op' <<< '$l_ipsaddr' || grep -Pq --
      'ip\h+daddr\h+\!\=\h+127\.0\.0\.1\h+ip\h+saddr\h+127\.0\.0\.1\h+drop' <<<
      '$l_ipsaddr'; then l_output='$l_output\n - IPv4 network traffic from loopback
      address correctly set to drop' else l_output2='$l_output2\n - IPv4 network
      traffic from loopback address not set to drop' fi if grep -Pq -- '^\h*0\h*$'
      /sys/module/ipv6/parameters/disable; then l_ip6saddr='$(nft list ruleset | awk
      '/filter_IN_public_deny|hook input/,/}/' | grep 'ip6 saddr')' if grep -Pq
      'ip6\h+saddr\h+::1\h+(counter\h+packets\h+\d+\h+bytes\h+\d+\h+)?drop' <<<
      '$l_ip6saddr' || grep -Pq --
      'ip6\h+daddr\h+\!=\h+::1\h+ip6\h+saddr\h+::1\h+drop' <<< '$l_ip6saddr'; then
      l_output='$l_output\n - IPv6 network traffic from loopback address correctly
      set to drop' else l_output2='$l_output2\n - IPv6 network traffic from loopback
      address not set to drop' fi fi if [ -z '$l_output2' ]; then echo -e '\n- Audit
      Result:\n *** PASS ***\n$l_output' else echo -e '\n- Audit Result:\n *** FAIL
      ***\n$l_output2\n\n - Correctly set:\n$l_output' fi }
    remediation: >
      Run the following script to implement the loopback rules: #!/usr/bin/env bash
      { l_hbfw='' if systemctl is-enabled firewalld.service | grep -q 'enabled' &&
      systemctl is-enabled nftables.service | grep -q 'enabled'; then echo -e '\n -
      Error - Both FirewallD and NFTables are enabled\n - Please follow
      recommendation: \'Ensure a single firewall configuration utility is in use\''
      elif ! systemctl is-enabled firewalld.service | grep -q 'enabled' && !
      systemctl is-enabled nftables.service | grep -q 'enabled'; then echo -e '\n -
      Error - Neither FirewallD or NFTables is enabled\n - Please follow
      recommendation: \'Ensure a single firewall configuration utility is in use\''
      else if systemctl is-enabled firewalld.service | grep -q 'enabled' && !
      systemctl is-enabled nftables.service | grep -q 'enabled'; then echo -e '\n -
      FirewallD is in use on the system' && l_hbfw='fwd' elif ! systemctl is-enabled
      firewalld.service | grep -q 'enabled' && systemctl is-enabled nftables.service
      | grep -q 'enabled'; then echo -e '\n - NFTables is in use on the system' &&
      l_hbfw='nft' fi l_ipsaddr='$(nft list ruleset | awk
      '/filter_IN_public_deny|hook\s+input\s+/,/\}\s*(#.*)?$/' | grep -P --
      'ip\h+saddr')' if ! nft list ruleset | awk '/hook\s+input\s+/,/\}\s*(#.*)?$/'
      | grep -Pq -- '\H+\h+'lo'\h+accept'; then echo -e '\n - Enabling input to
      accept for loopback address' if [ '$l_hbfw' = 'fwd' ]; then firewall-cmd
      --permanent --zone=trusted --add-interface=lo firewall-cmd --reload elif [
      '$l_hbfw' = 'nft' ]; then nft add rule inet filter input iif lo accept fi fi
      if ! grep -Pq --
      'ip\h+saddr\h+127\.0\.0\.0\/8\h+(counter\h+packets\h+\d+\h+bytes\h+\d+\h+)?drop'
      <<< '$l_ipsaddr' && ! grep -Pq --
      'ip\h+daddr\h+\!\=\h+127\.0\.0\.1\h+ip\h+saddr\h+127\.0\.0\.1\h+drop' <<<
      '$l_ipsaddr'; then echo -e '\n - Setting IPv4 network traffic from loopback
      address to drop' if [ '$l_hbfw' = 'fwd' ]; then firewall-cmd --permanent
      --add-rich-rule='rule family=ipv4 source address='127.0.0.1' destination not
      address='127.0.0.1' drop' firewall-cmd --permanent --zone=trusted --add-rich-
      rule='rule family=ipv4 source address='127.0.0.1' destination not
      address='127.0.0.1' drop' firewall-cmd --reload elif [ '$l_hbfw' = 'nft' ];
      then nft create rule inet filter input ip saddr 127.0.0.0/8 counter drop fi fi
      if grep -Pq -- '^\h*0\h*$' /sys/module/ipv6/parameters/disable; then
      l_ip6saddr='$(nft list ruleset | awk '/filter_IN_public_deny|hook input/,/}/'
      | grep 'ip6 saddr')' if ! grep -Pq
      'ip6\h+saddr\h+::1\h+(counter\h+packets\h+\d+\h+bytes\h+\d+\h+)?drop' <<<
      '$l_ip6saddr' && ! grep -Pq --
      'ip6\h+daddr\h+\!=\h+::1\h+ip6\h+saddr\h+::1\h+drop' <<< '$l_ip6saddr'; then
      echo -e '\n - Setting IPv6 network traffic from loopback address to drop' if [
      '$l_hbfw' = 'fwd' ]; then firewall-cmd --permanent --add-rich-rule='rule
      family=ipv6 source address='::1' destination not address='::1' drop' firewall-
      cmd --permanent --zone=trusted --add-rich-rule='rule family=ipv6 source
      address='::1' destination not address='::1' drop' firewall-cmd --reload elif [
      '$l_hbfw' = 'nft' ]; then nft add rule inet filter input ip6 saddr ::1 counter
      drop fi fi fi fi } References: 1. NIST SP 800-53 Rev. 5: CA-9
    references: >
      1. NIST SP 800-53 Rev. 5: CA-9
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_RHEL_8_v3_0_0_3_4_2_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_rhel_8_v3_0_0_3_4_2_2"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: rhel.cis.3.firewalld_drops_unnecessary_services_and_ports
    title: "Ensure firewalld drops unnecessary services and ports"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: manual
    cis_benchmark: "CIS_RHEL 8_v3.0.0"
    cis_version: "8_v3.0.0"
    cis_control: "3.4.2.3"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Services and ports can be accepted or explicitly rejected or dropped by a
      zone. For every zone, you can set a default behavior that handles incoming
      traffic that is not further specified. Such behavior is defined by setting the
      target of the zone. There are three options - default, ACCEPT, REJECT, and
      DROP. • ACCEPT - you accept all incoming packets except those disabled by a
      specific rule. • REJECT - you disable all incoming packets except those that
      you have allowed in specific rules and the source machine is informed about
      the rejection. • DROP - you disable all incoming packets except those that you
      have allowed in specific rules and no information sent to the source machine.
    rationale: >
      To reduce the attack surface of a system, all services and ports should be
      blocked unless required
    audit_procedure: >
      Run the following command and review output to ensure that listed services and
      ports follow site policy. # systemctl is-enabled firewalld.service | grep -q
      'enabled' && firewall-cmd --list-all --zone='$(firewall-cmd --list-all | awk
      '/\(active\)/ { print $1 }')' | grep -P -- '^\h*(services:|ports:)'
    remediation: >
      If Firewalld is in use on the system: Run the following command to remove an
      unnecessary service: # firewall-cmd --remove-service=<service> Example: #
      firewall-cmd --remove-service=cockpit Run the following command to remove an
      unnecessary port: # firewall-cmd --remove-port=<port-number>/<port-type>
      Example: # firewall-cmd --remove-port=25/tcp Run the following command to make
      new settings persistent: # firewall-cmd --runtime-to-permanent References: 1.
      firewalld.service(5) 2. https://access.redhat.com/documentation/en-
      us/red_hat_enterprise_linux/8/html/securing_networks/using-and-configuring-
      firewalls_securing-networks 3. NIST SP 800-53 Rev. 5: CA-9
    references: >
      1. firewalld.service(5) 2. https://access.redhat.com/documentation/en-
      us/red_hat_enterprise_linux/8/html/securing_networks/using-and-configuring-
      firewalls_securing-networks 3. NIST SP 800-53 Rev. 5: CA-9
    impact: >
      
