  - rule_id: rhel.cis.3.ipv6_redirects_are_not_accepted
    title: "Ensure IPv6 redirects are not accepted"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: manual
    cis_benchmark: "CIS_RHEL 7_v2.1.1"
    cis_version: "7_v2.1.1"
    cis_control: "3.3.2"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      This setting prevents the system from accepting ICMP redirects. ICMP redirects
      tell the system about alternate routes for sending traffic.
    rationale: >
      It is recommended that systems not accept ICMP redirects as they could be
      tricked into routing traffic to compromised machines. Setting hard routes
      within the system (usually a single default route to a trusted router)
      protects the system from bad routes.
    audit_procedure: >
      Run the following commands and verify output matches: # sysctl
      net.ipv6.conf.all.accept_redirects net.ipv6.conf.all.accept_redirect = 0 #
      sysctl net.ipv6.conf.default.accept_redirects
      net.ipv6.conf.default.accept_redirect = 0
    remediation: >
      Set the following parameters in the /etc/sysctl.conf file:
      net.ipv6.conf.all.accept_redirects = 0 net.ipv6.conf.default.accept_redirects
      = 0 Run the following commands to set the active kernel parameters: # sysctl
      -w net.ipv6.conf.all.accept_redirects=0 # sysctl -w
      net.ipv6.conf.default.accept_redirects=0 # sysctl -w net.ipv6.route.flush=1
