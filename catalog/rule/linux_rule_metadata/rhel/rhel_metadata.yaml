      *path=\/usr\/bin\/chcon/ \ &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)' \ ||
      printf 'ERROR: Variable 'UID_MIN' is unset.\n' } Verify the output matches: -a
      always,exit -S all -F path=/usr/bin/chcon -F perm=x -F auid>=1000 -F auid!=-1
      -F key=perm_chng
    remediation: >
