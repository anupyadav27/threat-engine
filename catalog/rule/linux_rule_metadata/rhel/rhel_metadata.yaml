  - rule_id: rhel.cis.7.world_writable_files_and_directories_are_secured
    title: "Ensure world writable files and directories are secured"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "7.1.11"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      World writable files are the least secure. Data in world-writable files can be
      modified and compromised by any user on the system. World writable files may
      also indicate an incorrectly written script or program that could potentially
      be the cause of a larger compromise to the system's integrity. See the
      chmod(2) man page for more information. Setting the sticky bit on world
      writable directories prevents users from deleting or renaming files in that
      directory that are not owned by them.
    rationale: >
      Data in world-writable files can be modified and compromised by any user on
      the system. World writable files may also indicate an incorrectly written
      script or program that could potentially be the cause of a larger compromise
      to the system's integrity. This feature prevents the ability to delete or
      rename files in world writable directories (such as /tmp ) that are owned by
      another user.
    audit_procedure: >
      Run the following script to verify: • No world writable files exist • No world
      writable directories without the sticky bit exist #!/usr/bin/env bash {
      l_output='' l_output2='' l_smask='01000' a_file=(); a_dir=() # Initialize
      arrays a_path=(! -path '/run/user/*' -a ! -path '/proc/*' -a ! -path
      '*/containerd/*' -a ! -path '*/kubelet/pods/*' -a ! -path
      '*/kubelet/plugins/*' -a ! -path '/sys/*' -a ! -path '/snap/*') while IFS=
      read -r l_mount; do while IFS= read -r -d $'\0' l_file; do if [ -e '$l_file'
      ]; then [ -f '$l_file' ] && a_file+=('$l_file') # Add WR files if [ -d
      '$l_file' ]; then # Add directories w/o sticky bit l_mode='$(stat -Lc '%#a'
      '$l_file')' [ ! $(( $l_mode & $l_smask )) -gt 0 ] && a_dir+=('$l_file') fi fi
      done < <(find '$l_mount' -xdev \( '${a_path[@]}' \) \( -type f -o -type d \)
      -perm -0002 -print0 2> /dev/null) done < <(findmnt -Dkerno fstype,target | awk
      '($1 !~ /^\s*(nfs|proc|smb|vfat|iso9660|efivarfs|selinuxfs)/ && $2 !~
      /^(\/run\/user\/|\/tmp|\/var\/tmp)/){print $2}') if ! (( ${#a_file[@]} > 0 ));
      then l_output='$l_output\n - No world writable files exist on the local
      filesystem.' else l_output2='$l_output2\n - There are \'$(printf '%s'
      '${#a_file[@]}')\' World writable files on the system.\n - The following is a
      list of World writable files:\n$(printf '%s\n' '${a_file[@]}')\n - end of
      list\n' fi if ! (( ${#a_dir[@]} > 0 )); then l_output='$l_output\n - Sticky
      bit is set on world writable directories on the local filesystem.' else
      l_output2='$l_output2\n - There are \'$(printf '%s' '${#a_dir[@]}')\' World
      writable directories without the sticky bit on the system.\n - The following
      is a list of World writable directories without the sticky bit:\n$(printf
      '%s\n' '${a_dir[@]}')\n - end of list\n' fi unset a_path; unset a_arr; unset
      a_file; unset a_dir # Remove arrays # If l_output2 is empty, we pass if [ -z
      '$l_output2' ]; then echo -e '\n- Audit Result:\n ** PASS **\n - * Correctly
      configured * :\n$l_output\n' else echo -e '\n- Audit Result:\n ** FAIL **\n -
      * Reasons for audit failure * :\n$l_output2' [ -n '$l_output' ] && echo -e '-
      * Correctly configured * :\n$l_output\n' fi } Note: On systems with a large
      number of files and/or directories, this audit may be a long running process
    remediation: >
      • World Writable Files: o It is recommended that write access is removed from
      other with the command ( chmod o-w <filename> ), but always consult relevant
      vendor documentation to avoid breaking any application dependencies on a given
      file. • World Writable Directories: o Set the sticky bit on all world writable
      directories with the command ( chmod a+t <directory_name> ) Run the following
      script to: • Remove other write permission from any world writable files • Add
      the sticky bit to all world writable directories #!/usr/bin/env bash {
      l_smask='01000' a_file=(); a_dir=() # Initialize arrays a_path=(! -path
      '/run/user/*' -a ! -path '/proc/*' -a ! -path '*/containerd/*' -a ! -path
      '*/kubelet/pods/*' -a ! -path '*/kubelet/plugins/*' -a ! -path '/sys/*' -a !
      -path '/snap/*') while IFS= read -r l_mount; do while IFS= read -r -d $'\0'
      l_file; do if [ -e '$l_file' ]; then l_mode='$(stat -Lc '%#a' '$l_file')' if [
      -f '$l_file' ]; then # Remove excess permissions from WW files echo -e ' -
      File: \'$l_file\' is mode: \'$l_mode\'\n - removing write permission on
      \'$l_file\' from \'other\'' chmod o-w '$l_file' fi if [ -d '$l_file' ]; then #
      Add sticky bit if [ ! $(( $l_mode & $l_smask )) -gt 0 ]; then echo -e ' -
      Directory: \'$l_file\' is mode: \'$l_mode\' and doesn't have the sticky bit
      set\n - Adding the sticky bit' chmod a+t '$l_file' fi fi fi done < <(find
      '$l_mount' -xdev \( '${a_path[@]}' \) \( -type f -o -type d \) -perm -0002
      -print0 2> /dev/null) done < <(findmnt -Dkerno fstype,target | awk '($1 !~
      /^\s*(nfs|proc|smb|vfat|iso9660|efivarfs|selinuxfs)/ && $2 !~
      /^(\/run\/user\/|\/tmp|\/var\/tmp)/){print $2}') } References: 1. NIST SP
      800-53 Rev. 5: AC-3. MP-2
    references: >
      1. NIST SP 800-53 Rev. 5: AC-3. MP-2
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_RHEL_9_v2_0_0_7_1_11"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_rhel_9_v2_0_0_7_1_11"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: rhel.cis.7.no_files_or_directories_without_an_owner_and_a
    title: "Ensure no files or directories without an owner and a group exist"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "7.1.12"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      Administrators may delete users or groups from the system and neglect to
      remove all files and/or directories owned by those users or groups.
    rationale: >
      A new user or group who is assigned a deleted user's user ID or group ID may
      then end up 'owning' a deleted user or group's files, and thus have more
      access on the system than was intended.
    audit_procedure: >
      Run the following script to verify no unowned or ungrouped files or
      directories exist: #!/usr/bin/env bash { l_output='' l_output2='' a_nouser=();
      a_nogroup=() # Initialize arrays a_path=(! -path '/run/user/*' -a ! -path
      '/proc/*' -a ! -path '*/containerd/*' -a ! -path '*/kubelet/pods/*' -a ! -path
      '*/kubelet/plugins/*' -a ! -path '/sys/fs/cgroup/memory/*' -a ! -path
      '/var/*/private/*') while IFS= read -r l_mount; do while IFS= read -r -d $'\0'
      l_file; do if [ -e '$l_file' ]; then while IFS=: read -r l_user l_group; do [
      '$l_user' = 'UNKNOWN' ] && a_nouser+=('$l_file') [ '$l_group' = 'UNKNOWN' ] &&
      a_nogroup+=('$l_file') done < <(stat -Lc '%U:%G' '$l_file') fi done < <(find
      '$l_mount' -xdev \( '${a_path[@]}' \) \( -type f -o -type d \) \( -nouser -o
      -nogroup \) -print0 2> /dev/null) done < <(findmnt -Dkerno fstype,target | awk
      '($1 !~ /^\s*(nfs|proc|smb|vfat|iso9660|efivarfs|selinuxfs)/ && $2 !~
      /^\/run\/user\//){print $2}') if ! (( ${#a_nouser[@]} > 0 )); then
      l_output='$l_output\n - No files or directories without a owner exist on the
      local filesystem.' else l_output2='$l_output2\n - There are \'$(printf '%s'
      '${#a_nouser[@]}')\' unowned files or directories on the system.\n - The
      following is a list of unowned files and/or directories:\n$(printf '%s\n'
      '${a_nouser[@]}')\n - end of list' fi if ! (( ${#a_nogroup[@]} > 0 )); then
      l_output='$l_output\n - No files or directories without a group exist on the
      local filesystem.' else l_output2='$l_output2\n - There are \'$(printf '%s'
      '${#a_nogroup[@]}')\' ungrouped files or directories on the system.\n - The
      following is a list of ungrouped files and/or directories:\n$(printf '%s\n'
      '${a_nogroup[@]}')\n - end of list' fi unset a_path; unset a_arr ; unset
      a_nouser; unset a_nogroup # Remove arrays if [ -z '$l_output2' ]; then # If
      l_output2 is empty, we pass echo -e '\n- Audit Result:\n ** PASS **\n - *
      Correctly configured * :\n$l_output\n' else echo -e '\n- Audit Result:\n **
      FAIL **\n - * Reasons for audit failure * :\n$l_output2' [ -n '$l_output' ] &&
      echo -e '\n- * Correctly configured * :\n$l_output\n' fi } Note: On systems
      with a large number of files and/or directories, this audit may be a long
      running process
    remediation: >
      Remove or set ownership and group ownership of these files and/or directories
      to an active user on the system as appropriate. References: 1. NIST SP 800-53
      Rev. 5: AC-3. MP-2
    references: >
      1. NIST SP 800-53 Rev. 5: AC-3. MP-2
