  - rule_id: rhel.cis.6.rsyslog_log_file_creation_mode_is_configured
    title: "Ensure rsyslog log file creation mode is configured"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "6.2.3.4"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      rsyslog will create logfiles that do not already exist on the system. The
      $FileCreateMode parameter allows you to specify the creation mode with which
      rsyslog creates new files. If not specified, the value 0644 is used (which
      retains backward-compatibility with earlier releases). The value given must
      always be a 4-digit octal number, with the initial digit being zero. Please
      note that the actual permission depend on rsyslogd’s process umask.
      $FileCreateMode may be specified multiple times. If so, it specifies the
      creation mode for all selector lines that follow until the next
      $FileCreateMode parameter. Order of lines is vitally important.
    rationale: >
      It is important to ensure that log files have the correct permissions to
      ensure that sensitive data is archived and protected. Note: This
      recommendation only applies if rsyslog is the chosen method for client side
      logging. Do not apply this recommendation if systemd-journald is used.
    audit_procedure: >
      Run the following command Run the following command to verify $FileCreateMode:
      # grep -Ps '^\h*\$FileCreateMode\h+0[0,2,4,6][0,2,4]0\b' /etc/rsyslog.conf
      /etc/rsyslog.d/*.conf Verify the output is includes 0640 or more restrictive:
      $FileCreateMode 0640 Should a site policy dictate less restrictive
      permissions, ensure to follow said policy. Note: More restrictive permissions
      such as 0600 is implicitly sufficient.
    remediation: >
      Edit either /etc/rsyslog.conf or a dedicated .conf file in /etc/rsyslog.d/ and
      set $FileCreateMode to 0640 or more restrictive: $FileCreateMode 0640 Restart
      the service: # systemctl restart rsyslog References: 1. RSYSLOG.CONF(5) 2.
      NIST SP 800-53 Rev. 5: AC-3, AC-6, MP-2 3. https://www.rsyslog.com/doc/ 4.
      https://www.rsyslog.com/doc/configuration/action/rsconf1_filecreatemode.html#fil
      ecreatemode
    references: >
      1. RSYSLOG.CONF(5) 2. NIST SP 800-53 Rev. 5: AC-3, AC-6, MP-2 3.
      https://www.rsyslog.com/doc/ 4.
      https://www.rsyslog.com/doc/configuration/action/rsconf1_filecreatemode.html#fil
      ecreatemode
