  - rule_id: rhel.cis.2.autofs_services_are_not_in_use
    title: "Ensure autofs services are not in use"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "2.1.1"
    cis_section: "2"
    profile_applicability: "Level 1 + Level 2"
    description: >
      autofs allows automatic mounting of devices, typically including CD/DVDs and
      USB drives.
    rationale: >
      With automounting enabled anyone with physical access could attach a USB drive
      or disc and have its contents available in system even if they lacked
      permissions to mount it themselves. Impact: The use of portable hard drives is
      very common for workstation users. If your organization allows the use of
      portable storage or media on workstations and physical access controls to
      workstations is considered adequate there is little value add in turning off
      automounting. There may be packages that are dependent on the autofs package.
      If the autofs package is removed, these dependent packages will be removed as
      well. Before removing the autofs package, review any dependent packages to
      determine if they are required on the system. - IF - a dependent package is
      required: stop and mask the autofs.service leaving the autofs package
      installed.
    audit_procedure: >
      As a preference autofs should not be installed unless other packages depend on
      it. Run the following command to verify autofs is not installed: # rpm -q
      autofs package autofs is not installed - OR - - IF - the package is required
      for dependencies: Run the following command to verify autofs.service is not
      enabled: # systemctl is-enabled autofs.service 2>/dev/null | grep 'enabled'
      Nothing should be returned Run the following command to verify the
      autofs.service is not active: # systemctl is-active autofs.service 2>/dev/null
      | grep '^active' Nothing should be returned Note: If the package is required
      for a dependency • Ensure the dependent package is approved by local site
      policy • Ensure stopping and masking the service and/or socket meets local
      site policy
    remediation: >
      Run the following commands to stop autofs.service and remove autofs package: #
      systemctl stop autofs.service # dnf remove autofs - OR - - IF - the autofs
      package is required as a dependency: Run the following commands to stop and
      mask autofs.service: # systemctl stop autofs.service # systemctl mask
      autofs.service References: 1. NIST SP 800-53 Rev. 5: SI-3, MP-7 Additional
      Information: This control should align with the tolerance of the use of
      portable drives and optical media in the organization. On a server requiring
      an admin to manually mount media can be part of defense-in-depth to reduce the
      risk of unapproved software or information being introduced or proprietary
      software or information being exfiltrated. If admins commonly use flash drives
      and Server access has sufficient physical controls, requiring manual mounting
      may not increase security.
    references: >
      1. NIST SP 800-53 Rev. 5: SI-3, MP-7 Additional Information: This control
      should align with the tolerance of the use of portable drives and optical
      media in the organization. On a server requiring an admin to manually mount
      media can be part of defense-in-depth to reduce the risk of unapproved
      software or information being introduced or proprietary software or
      information being exfiltrated. If admins commonly use flash drives and Server
      access has sufficient physical controls, requiring manual mounting may not
      increase security.
    impact: >
      The use of portable hard drives is very common for workstation users. If your
      organization allows the use of portable storage or media on workstations and
      physical access controls to workstations is considered adequate there is
      little value add in turning off automounting. There may be packages that are
      dependent on the autofs package. If the autofs package is removed, these
      dependent packages will be removed as well. Before removing the autofs
      package, review any dependent packages to determine if they are required on
      the system. - IF - a dependent package is required: stop and mask the
      autofs.service leaving the autofs package installed.
