  - rule_id: rhel.cis.4.sshd_access_is_configured
    title: "Ensure sshd access is configured"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 8_v3.0.0"
    cis_version: "8_v3.0.0"
    cis_control: "4.2.4"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      There are several options available to limit which users and group can access
      the system via SSH. It is recommended that at least one of the following
      options be leveraged: • AllowUsers: o The AllowUsers variable gives the system
      administrator the option of allowing specific users to ssh into the system.
      The list consists of space separated user names. Numeric user IDs are not
      recognized with this variable. If a system administrator wants to restrict
      user access further by only allowing the allowed users to log in from a
      particular host, the entry can be specified in the form of user@host. •
      AllowGroups: o The AllowGroups variable gives the system administrator the
      option of allowing specific groups of users to ssh into the system. The list
      consists of space separated group names. Numeric group IDs are not recognized
      with this variable. • DenyUsers: o The DenyUsers variable gives the system
      administrator the option of denying specific users to ssh into the system. The
      list consists of space separated user names. Numeric user IDs are not
      recognized with this variable. If a system administrator wants to restrict
      user access further by specifically denying a user's access from a particular
      host, the entry can be specified in the form of user@host. • DenyGroups: o The
      DenyGroups variable gives the system administrator the option of denying
      specific groups of users to ssh into the system. The list consists of space
      separated group names. Numeric group IDs are not recognized with this
      variable.
    rationale: >
      Restricting which users can remotely access the system via SSH will help
      ensure that only authorized users access the system.
    audit_procedure: >
      Run the following commands and verify the output: # sshd -T -C user=root -C
      host='$(hostname)' -C addr='$(grep $(hostname) /etc/hosts | awk '{print $1}')'
      | grep -Pi '^\h*(allow|deny)(users|groups)\h+\H+(\h+.*)?$' # grep -Pis
      '^\h*(allow|deny)(users|groups)\h+\H+(\h+.*)?$' /etc/ssh/sshd_config
      /etc/ssh/sshd_config.d/*.conf Verify that the output of both commands matches
      at least one of the following lines: allowusers <userlist> -OR- allowgroups
      <grouplist> -OR- denyusers <userlist> -OR- denygroups <grouplist> Note: If
      Include locations besides, or in addition to /etc/ssh/sshd_config.d/*.conf
      and/or Match set statements are used in your environment, those locations
      should be checked for the correct configuration as well.
    remediation: >
      Edit the /etc/ssh/sshd_config file to set one or more of the parameter above
      any Include entries as follows: AllowUsers <userlist> -OR- AllowGroups
      <grouplist> -OR- DenyUsers <userlist> -OR- DenyGroups <grouplist> Note: First
      occurrence of a option takes precedence, Match set statements withstanding. If
      Include locations are enabled, used, and order of precedence is understood in
      your environment, the entry may be created in a file in Include location. If
      the Include location is not the default, /etc/ssh/sshd_config.d/*.conf, the
      audit will need to be modified to account for the Include location used.
      Default Value: None References: 1. SSHD_CONFIG(5) 2. NIST SP 800-53 Rev. 5:
      AC-3. MP-2
    references: >
      1. SSHD_CONFIG(5) 2. NIST SP 800-53 Rev. 5: AC-3. MP-2
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_RHEL_8_v3_0_0_4_2_4"
      nist_800_53: []
      soc2: []
      pci_dss: []
