  - rule_id: rhel.cis.1.repo_gpgcheck_is_globally_activated
    title: "Ensure repo_gpgcheck is globally activated"
    severity: medium
    category: linux
    tech_type: rhel
    automation_type: manual
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "1.2.1.3"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      The repo_gpgcheck option, found in the main section of the /etc/dnf/dnf.conf
      and individual /etc/yum.repos.d/* files, will perform a GPG signature check on
      the repodata.
    rationale: >
      It is important to ensure that the repository data signature is always checked
      prior to installation to ensure that the software is not tampered with in any
      way. Impact: Not all repositories, notably RedHat, support repo_gpgcheck. Take
      care to set this value to false (default) for particular repositories that do
      not support it. If enabled on repositories that do not support repo_gpgcheck
      installation of packages will fail. Research is required by the user to
      determine which repositories is configured on the local system and, from that
      list, which support repo_gpgcheck.
    audit_procedure: >
      Global configuration Run the following command: grep ^repo_gpgcheck
      /etc/dnf/dnf.conf Verify that repo_gpgcheck is set to 1 Per repository
      configuration Configuration in /etc/yum.repos.d/ takes precedence over the
      global configuration. As an example, to list all the configured repositories,
      excluding 'fedoraproject.org', that specifically disables repo_gpgcheck, run
      the following command: # REPO_URL='fedoraproject.org' # for repo in $(grep -l
      'repo_gpgcheck=0' /etc/yum.repos.d/* ); do if ! grep '${REPO_URL}' '${repo}'
      &>/dev/null; then echo '${repo}' fi done Per the research that was done on
      which repositories does not support repo_gpgcheck, change the REPO_URL
      variable and run the test.
    remediation: >
      Global configuration Edit /etc/dnf/dnf.conf and set repo_gpgcheck=1 in the
      [main] section. Example: [main] repo_gpgcheck=1 Per repository configuration
      First check that the particular repository support GPG checking on the
      repodata. Edit any failing files in /etc/yum.repos.d/* and set all instances
      starting with repo_gpgcheck to 1. References: 1. NIST SP 800-53 Rev. 5: SI-2
    references: >
      1. NIST SP 800-53 Rev. 5: SI-2
    impact: >
      Not all repositories, notably RedHat, support repo_gpgcheck. Take care to set
      this value to false (default) for particular repositories that do not support
      it. If enabled on repositories that do not support repo_gpgcheck installation
      of packages will fail. Research is required by the user to determine which
      repositories is configured on the local system and, from that list, which
      support repo_gpgcheck.
    compliance_mappings:
