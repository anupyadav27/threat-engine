  - rule_id: rhel.cis.5.aide_is_installed
    title: "Ensure AIDE is installed"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 8_v3.0.0"
    cis_version: "8_v3.0.0"
    cis_control: "5.3.1"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      Advanced Intrusion Detection Environment (AIDE) is an intrusion detection tool
      that uses predefined rules to check the integrity of files and directories in
      the Linux operating system. AIDE has its own database to check the integrity
      of files and directories. aide takes a snapshot of files and directories
      including modification times, permissions, and file hashes which can then be
      used to compare against the current state of the filesystem to detect
      modifications to the system.
    rationale: >
      By monitoring the filesystem state compromised files can be detected to
      prevent or limit the exposure of accidental or malicious misconfigurations or
      modified binaries.
    audit_procedure: >
      Run the following command and verify aide is installed: # rpm -q aide
      aide-<version>
    remediation: >
      Run the following command to install aide: # dnf install aide Configure aide
      as appropriate for your environment. Consult the aide documentation for
      options. Initialize aide: Run the following commands: # aide --init # mv
      /var/lib/aide/aide.db.new.gz /var/lib/aide/aide.db.gz References: 1.
      https://aide.github.io/ 2. NIST SP 800-53 Rev. 5: AU-2 Additional Information:
      The prelinking feature can interfere with aide because it alters binaries to
      speed up their start up times. Run prelink -ua to restore the binaries to
      their prelinked state, thus avoiding false positives from aide.
    references: >
      1. https://aide.github.io/ 2. NIST SP 800-53 Rev. 5: AU-2 Additional
