  - rule_id: rhel.cis.7.accounts_in_etc_passwd_use_shadowed_passwords
    title: "Ensure accounts in /etc/passwd use shadowed passwords"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "7.2.1"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      Local accounts can uses shadowed passwords. With shadowed passwords, The
      passwords are saved in shadow password file, /etc/shadow, encrypted by a
      salted one-way hash. Accounts with a shadowed password have an x in the second
      field in /etc/passwd.
    rationale: >
      The /etc/passwd file also contains information like user ID's and group ID's
      that are used by many system programs. Therefore, the /etc/passwd file must
      remain world readable. In spite of encoding the password with a randomly-
      generated one-way hash function, an attacker could still break the system if
      they got access to the /etc/passwd file. This can be mitigated by using
      shadowed passwords, thus moving the passwords in the /etc/passwd file to
      /etc/shadow. The /etc/shadow file is set so only root will be able to read and
      write. This helps mitigate the risk of an attacker gaining access to the
      encoded passwords with which to perform a dictionary attack. Note: • All
      accounts must have passwords or be locked to prevent the account from being
      used by an unauthorized user. • A user account with an empty second field in
      /etc/passwd allows the account to be logged into by providing only the
      username.
    audit_procedure: >
      Run the following command and verify that no output is returned: # awk -F:
      '($2 != 'x' ) { print 'User: \'' $1 '\' is not set to shadowed passwords '}'
      /etc/passwd
    remediation: >
      Run the following command to set accounts to use shadowed passwords and
      migrate passwords in /etc/passwd to /etc/shadow: # pwconv Investigate to
      determine if the account is logged in and what it is being used for, to
      determine if it needs to be forced off. References: 1. NIST SP 800-53 Rev. 5:
      IA-5 2. PWCONV(8) Additional Information: The pwconv command creates shadow
      from passwd and an optionally existing shadow. • The pwunconv command creates
      passwd from passwd and shadow and then removes shadow. • The grpconv command
      creates gshadow from group and an optionally existing gshadow. • The grpunconv
      command creates group from group and gshadow and then removes gshadow. These
      four programs all operate on the normal and shadow password and group files:
      /etc/passwd, /etc/group, /etc/shadow, and /etc/gshadow. Each program acquires
      the necessary locks before conversion. pwconv and grpconv are similar. First,
      entries in the shadowed file which don't exist in the main file are removed.
      Then, shadowed entries which don't have x' as the password in the main file
      are updated. Any missing shadowed entries are added. Finally, passwords in the
      main file are replaced with x'. These programs can be used for initial
      conversion as well to update the shadowed file if the main file is edited by
      hand. pwconv will use the values of PASS_MIN_DAYS, PASS_MAX_DAYS, and
      PASS_WARN_AGE from /etc/login.defs when adding new entries to /etc/shadow.
      pwunconv and grpunconv are similar. Passwords in the main file are updated
      from the shadowed file. Entries which exist in the main file but not in the
      shadowed file are left alone. Finally, the shadowed file is removed. Some
      password aging information is lost by pwunconv. It will convert what it can.
    references: >
      1. NIST SP 800-53 Rev. 5: IA-5 2. PWCONV(8) Additional Information: The pwconv
      command creates shadow from passwd and an optionally existing shadow. • The
      pwunconv command creates passwd from passwd and shadow and then removes
      shadow. • The grpconv command creates gshadow from group and an optionally
      existing gshadow. • The grpunconv command creates group from group and gshadow
      and then removes gshadow. These four programs all operate on the normal and
      shadow password and group files: /etc/passwd, /etc/group, /etc/shadow, and
      /etc/gshadow. Each program acquires the necessary locks before conversion.
