      users are prevented from being used to provide an interactive shell. By
      default Red Hat 7 sets the password field for these accounts to an invalid
      string, but it is also recommended that the shell field in the password file
      be set to /sbin/nologin . This prevents the account from potentially being
      used to run any commands.
    audit_procedure: >
