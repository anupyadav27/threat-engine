  - rule_id: rhel.cis.6.system_is_disabled_when_audit_logs_are_full
    title: "Ensure system is disabled when audit logs are full"
    severity: medium
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "6.3.2.3"
    cis_section: "6"
    profile_applicability: "Level 2"
    description: >
      The auditd daemon can be configured to halt the system or put the system in
      single user mode, if no free space is available or an error is detected on the
      partition that holds the audit log files. The disk_full_action parameter tells
      the system what action to take when no free space is available on the
      partition that holds the audit log files. Valid values are ignore, syslog,
      rotate, exec, suspend, single, and halt. • ignore, the audit daemon will issue
      a syslog message but no other action is taken • syslog, the audit daemon will
      issue a warning to syslog • rotate, the audit daemon will rotate logs, losing
      the oldest to free up space • exec, /path-to-script will execute the script.
      You cannot pass parameters to the script. The script is also responsible for
      telling the auditd daemon to resume logging once its completed its action •
      suspend, the audit daemon will stop writing records to the disk • single, the
      audit daemon will put the computer system in single user mode • halt, the
      audit daemon will shut down the system The disk_error_action parameter tells
      the system what action to take when an error is detected on the partition that
      holds the audit log files. Valid values are ignore, syslog, exec, suspend,
      single, and halt. • ignore, the audit daemon will not take any action •
      syslog, the audit daemon will issue no more than 5 consecutive warnings to
      syslog • exec, /path-to-script will execute the script. You cannot pass
      parameters to the script • suspend, the audit daemon will stop writing records
      to the disk • single, the audit daemon will put the computer system in single
      user mode • halt, the audit daemon will shut down the system
    rationale: >
      In high security contexts, the risk of detecting unauthorized access or
      nonrepudiation exceeds the benefit of the system's availability. Impact:
      disk_full_action parameter: • Set to halt - the auditd daemon will shutdown
      the system when the disk partition containing the audit logs becomes full. •
      Set to single - the auditd daemon will put the computer system in single user
      mode when the disk partition containing the audit logs becomes full.
      disk_error_action parameter: • Set to halt - the auditd daemon will shutdown
      the system when an error is detected on the partition that holds the audit log
      files. • Set to single - the auditd daemon will put the computer system in
      single user mode when an error is detected on the partition that holds the
      audit log files. • Set to syslog - the auditd daemon will issue no more than 5
      consecutive warnings to syslog when an error is detected on the partition that
      holds the audit log files.
    audit_procedure: >
      Run the following command and verify the disk_full_action is set to either
      halt or single: # grep -P -- '^\h*disk_full_action\h*=\h*(halt|single)\b'
      /etc/audit/auditd.conf disk_full_action = <halt|single> Run the following
      command and verify the disk_error_action is set to syslog, single, or halt: #
      grep -P -- '^\h*disk_error_action\h*=\h*(syslog|single|halt)\b'
      /etc/audit/auditd.conf disk_error_action = <syslog|single|halt>
    remediation: >
      Set one of the following parameters in /etc/audit/auditd.conf depending on
      your local security policies. disk_full_action = <halt|single>
      disk_error_action = <syslog|single|halt> Example: disk_full_action = halt
      disk_error_action = halt References: 1. NIST SP 800-53 Rev. 5: AU-2, AU-8,
      AU-12, SI-5 2. AUDITD.CONF(5) 3. https://access.redhat.com/documentation/en-
      us/red_hat_enterprise_linux/8/html/security_hardening/auditing-the-
      system_security-hardening#configuring-auditd-for-a-secure-
      environment_auditing-the-system
    references: >
      1. NIST SP 800-53 Rev. 5: AU-2, AU-8, AU-12, SI-5 2. AUDITD.CONF(5) 3.
      https://access.redhat.com/documentation/en-
      us/red_hat_enterprise_linux/8/html/security_hardening/auditing-the-
      system_security-hardening#configuring-auditd-for-a-secure-
      environment_auditing-the-system
    impact: >
      disk_full_action parameter: • Set to halt - the auditd daemon will shutdown
      the system when the disk partition containing the audit logs becomes full. •
      Set to single - the auditd daemon will put the computer system in single user
      mode when the disk partition containing the audit logs becomes full.
      disk_error_action parameter: • Set to halt - the auditd daemon will shutdown
      the system when an error is detected on the partition that holds the audit log
      files. • Set to single - the auditd daemon will put the computer system in
      single user mode when an error is detected on the partition that holds the
      audit log files. • Set to syslog - the auditd daemon will issue no more than 5
      consecutive warnings to syslog when an error is detected on the partition that
      holds the audit log files.
    compliance_mappings:
      cis:
        - "CIS_RHEL_9_v2_0_0_6_3_2_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_rhel_9_v2_0_0_6_3_2_3"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: rhel.cis.6.system_warns_when_audit_logs_are_low_on_space
    title: "Ensure system warns when audit logs are low on space"
    severity: medium
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "6.3.2.4"
    cis_section: "6"
    profile_applicability: "Level 2"
    description: >
      The auditd daemon can be configured to halt the system, put the system in
      single user mode or send a warning message, if the partition that holds the
      audit log files is low on space. The space_left_action parameter tells the
      system what action to take when the system has detected that it is starting to
      get low on disk space. Valid values are ignore, syslog, rotate, email, exec,
      suspend, single, and halt. • ignore, the audit daemon does nothing • syslog,
      the audit daemon will issue a warning to syslog • rotate, the audit daemon
      will rotate logs, losing the oldest to free up space • email, the audit daemon
      will send a warning to the email account specified in action_mail_acct as well
      as sending the message to syslog • exec, /path-to-script will execute the
      script. You cannot pass parameters to the script. The script is also
      responsible for telling the auditd daemon to resume logging once its completed
      its action • suspend, the audit daemon will stop writing records to the disk •
      single, the audit daemon will put the computer system in single user mode •
      halt, the audit daemon will shut down the system The admin_space_left_action
      parameter tells the system what action to take when the system has detected
      that it is low on disk space. Valid values are ignore, syslog, rotate, email,
      exec, suspend, single, and halt. • ignore, the audit daemon does nothing •
      syslog, the audit daemon will issue a warning to syslog • rotate, the audit
      daemon will rotate logs, losing the oldest to free up space • email, the audit
      daemon will send a warning to the email account specified in action_mail_acct
      as well as sending the message to syslog • exec, /path-to-script will execute
      the script. You cannot pass parameters to the script. The script is also
      responsible for telling the auditd daemon to resume logging once its completed
      its action • suspend, the audit daemon will stop writing records to the disk •
      single, the audit daemon will put the computer system in single user mode •
      halt, the audit daemon will shut down the system
    rationale: >
      In high security contexts, the risk of detecting unauthorized access or
      nonrepudiation exceeds the benefit of the system's availability. Impact: If
      the admin_space_left_action is set to single the audit daemon will put the
      computer system in single user mode.
    audit_procedure: >
      Run the following command and verify the space_left_action is set to email,
      exec, single, or halt: grep -P --
      '^\h*space_left_action\h*=\h*(email|exec|single|halt)\b'
      /etc/audit/auditd.conf Verify the output is email, exec, single, or halt
      Example output space_left_action = email Run the following command and verify
      the admin_space_left_action is set to single - OR - halt: grep -P --
      '^\h*admin_space_left_action\h*=\h*(single|halt)\b' /etc/audit/auditd.conf
      Verify the output is single or halt Example output: admin_space_left_action =
      single Note: A Mail Transfer Agent (MTA) must be installed and configured
      properly to set space_left_action = email
    remediation: >
      Set the space_left_action parameter in /etc/audit/auditd.conf to email, exec,
      single, or halt: Example: space_left_action = email Set the
      admin_space_left_action parameter in /etc/audit/auditd.conf to single or halt:
      Example: admin_space_left_action = single Note: A Mail Transfer Agent (MTA)
      must be installed and configured properly to set space_left_action = email
      Default Value: space_left_action = SYSLOG admin_space_left_action = SUSPEND
      References: 1. NIST SP 800-53 Rev. 5: AU-2, AU-8, AU-12, SI-5 2.
      AUDITD.CONF(5) 3. https://access.redhat.com/documentation/en-
      us/red_hat_enterprise_linux/8/html/security_hardening/auditing-the-
      system_security-hardening#configuring-auditd-for-a-secure-
      environment_auditing-the-system
    references: >
      1. NIST SP 800-53 Rev. 5: AU-2, AU-8, AU-12, SI-5 2. AUDITD.CONF(5) 3.
      https://access.redhat.com/documentation/en-
      us/red_hat_enterprise_linux/8/html/security_hardening/auditing-the-
      system_security-hardening#configuring-auditd-for-a-secure-
      environment_auditing-the-system
    impact: >
      If the admin_space_left_action is set to single the audit daemon will put the
      computer system in single user mode.
    compliance_mappings:
      cis:
        - "CIS_RHEL_9_v2_0_0_6_3_2_4"
      nist_800_53: []
      soc2: []
      pci_dss: []
