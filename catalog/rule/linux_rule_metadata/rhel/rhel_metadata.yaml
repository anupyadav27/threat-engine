  - rule_id: rhel.cis.5.password_failed_attempts_lockout_is_configured
    title: "Ensure password failed attempts lockout is configured"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "5.3.3.1.1"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The deny=<n> option will deny access if the number of consecutive
      authentication failures for this user during the recent interval exceeds .
    rationale: >
      Locking out user IDs after n unsuccessful consecutive login attempts mitigates
      brute force password attacks against your systems.
    audit_procedure: >
      Run the following command to verify that Number of failed logon attempts
      before the account is locked is no greater than 5 and meets local site policy:
      # grep -Pi -- '^\h*deny\h*=\h*[1-5]\b' /etc/security/faillock.conf deny = 5
      Run the following command to verify that the deny argument has not been set,
      or is set to 5 or less and meets local site policy: # grep -Pi --
      '^\h*auth\h+(requisite|required|sufficient)\h+pam_faillock\.so\h+([^#\n\r]+\h
      +)?deny\h*=\h*(0|[6-9]|[1-9][0-9]+)\b' /etc/pam.d/system-auth
      /etc/pam.d/password-auth Nothing should be returned
    remediation: >
      Create or edit the following line in /etc/security/faillock.conf setting the
      deny option to 5 or less: deny = 5 Run the following script to remove the deny
      argument from the pam_faillock.so module in the PAM files: #!/usr/bin/env bash
      { for l_pam_file in system-auth password-auth; do
      l_authselect_file='/etc/authselect/$(head -1 /etc/authselect/authselect.conf |
      grep 'custom/')/$l_pam_file' sed -ri
      's/(^\s*auth\s+(requisite|required|sufficient)\s+pam_faillock\.so.*)(\s+deny\
      s*=\s*\S+)(.*$)/\1\4/' '$l_authselect_file' done authselect apply-changes }
      Default Value: deny = 3 Additional Information: If a user has been locked out
      because they have reached the maximum consecutive failure count defined by
      deny= in the pam_faillock.so module, the user can be unlocked by issuing the
      command faillock --user <USERNAME> --reset. This command sets the failed count
      to 0, effectively unlocking the user.
    references: >
      
    impact: >
      
