  - rule_id: rhel.cis.3.reverse_path_filtering_is_enabled
    title: "Ensure reverse path filtering is enabled"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "3.3.7"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Setting net.ipv4.conf.all.rp_filter and net.ipv4.conf.default.rp_filter to 1
      forces the Linux kernel to utilize reverse path filtering on a received packet
      to determine if the packet was valid. Essentially, with reverse path
      filtering, if the return packet does not go out the same interface that the
      corresponding source packet came from, the packet is dropped (and logged if
      log_martians is set).
