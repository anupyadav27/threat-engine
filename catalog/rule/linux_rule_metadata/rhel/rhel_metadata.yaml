    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      The rhnsd daemon polls the Red Hat Network web site for scheduled actions and,
      if there are, executes those actions.
    rationale: >
      Patch management policies may require that organizations test the impact of a
      patch before it is deployed in a production environment. Having patches
      automatically deployed could have a negative impact on the environment. It is
      best to not allow an action by default but only after appropriate
      consideration has been made. It is recommended that the service be disabled
      unless the risk is understood and accepted or you are running your own
      satellite . This item is not scored because organizations may have addressed
      the risk.
    audit_procedure: >
      Run the following command and verify all runlevels are listed as 'off' or
      rhnsd is not available: # chkconfig --list rhnsd rhnsd 0:off 1:off 2:off 3:off
      4:off 5:off 6:off
    remediation: >
      Run the following command to disable rhnsd : # chkconfig rhnsd off Critical
      Controls: 9.1 Limit Open Ports, Protocols, and Services Ensure that only
