  - rule_id: rhel.cis.1.selinux_mode_is_not_disabled
    title: "Ensure the SELinux mode is not disabled"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "1.3.1.4"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      SELinux can run in one of three modes: disabled, permissive, or enforcing: •
      Enforcing - Is the default, and recommended, mode of operation; in enforcing
      mode SELinux operates normally, enforcing the loaded security policy on the
      entire system. • Permissive - The system acts as if SELinux is enforcing the
      loaded security policy, including labeling objects and emitting access denial
      entries in the logs, but it does not actually deny any operations. While not
      recommended for production systems, permissive mode can be helpful for SELinux
      policy development. • Disabled - Is strongly discouraged; not only does the
      system avoid enforcing the SELinux policy, it also avoids labeling any
      persistent objects such as files, making it difficult to enable SELinux in the
      future Note: You can set individual domains to permissive mode while the
      system runs in enforcing mode. For example, to make the httpd_t domain
      permissive: # semanage permissive -a httpd_t
    rationale: >
      Running SELinux in disabled mode is strongly discouraged; not only does the
      system avoid enforcing the SELinux policy, it also avoids labeling any
      persistent objects such as files, making it difficult to enable SELinux in the
      future.
    audit_procedure: >
      Run the following command to verify SELinux's current mode: # getenforce
      Enforcing -OR- Permissive Run the following command to verify SELinux's
      configured mode: # grep -Ei '^\s*SELINUX=(enforcing|permissive)'
      /etc/selinux/config SELINUX=enforcing -OR- SELINUX=permissive
    remediation: >
      Run one of the following commands to set SELinux's running mode: To set
      SELinux mode to Enforcing: # setenforce 1 - OR - To set SELinux mode to
      Permissive: # setenforce 0 Edit the /etc/selinux/config file to set the
      SELINUX parameter: For Enforcing mode: SELINUX=enforcing - OR - For Permissive
      mode: SELINUX=permissive References: 1.
      https://access.redhat.com/documentation/en-
      us/red_hat_enterprise_linux/7/html/selinux_users_and_administrators_guide/sect
      -security-enhanced_linux-introduction-selinux_modes 2. NIST SP 800-53 Rev. 5:
      AC-3, MP-2
    references: >
      1. https://access.redhat.com/documentation/en-
