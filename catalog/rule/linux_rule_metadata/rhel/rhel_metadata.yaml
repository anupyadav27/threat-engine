  - rule_id: rhel.cis.4.sshd_kexalgorithms_is_configured
    title: "Ensure sshd KexAlgorithms is configured"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 8_v3.0.0"
    cis_version: "8_v3.0.0"
    cis_control: "4.2.11"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Key exchange is any method in cryptography by which cryptographic keys are
      exchanged between two parties, allowing use of a cryptographic algorithm. If
      the sender and receiver wish to exchange encrypted messages, each must be
      equipped to encrypt messages to be sent and decrypt messages received Notes: •
      Kex algorithms have a higher preference the earlier they appear in the list •
      Some organizations may have stricter requirements for approved Key exchange
      algorithms • Ensure that Key exchange algorithms used are in compliance with
      site policy • The only Key Exchange Algorithms currently FIPS 140-2 approved
      are: o ecdh-sha2-nistp256 o ecdh-sha2-nistp384 o ecdh-sha2-nistp521 o diffie-
      hellman-group-exchange-sha256 o diffie-hellman-group16-sha512 o diffie-
      hellman-group18-sha512 o diffie-hellman-group14-sha256
    rationale: >
      Key exchange methods that are considered weak should be removed. A key
      exchange method may be weak because too few bits are used, or the hashing
      algorithm is considered too weak. Using weak algorithms could expose
      connections to man-in-the- middle attacks
    audit_procedure: >
      Run the following command and verify that output does not contain any of the
      listed weak Key Exchange algorithms: # sshd -T -C user=root -C
      host='$(hostname)' -C addr='$(grep $(hostname) /etc/hosts | awk '{print $1}')'
      | grep kexalgorithms Weak Key Exchange Algorithms: diffie-hellman-group1-sha1
      diffie-hellman-group14-sha1 diffie-hellman-group-exchange-sha1 Note: If
      Include locations besides, or in addition to /etc/ssh/sshd_config.d/*.conf
      and/or Match set statements are used in your environment, those locations
      should be checked for the correct configuration as well.
    remediation: >
      Edit the /etc/ssh/sshd_config file and add/modify the KexAlgorithms line to
      contain a comma separated list of the site unapproved (weak) KexAlgorithms
      preceded with a - above any Include entries: Example: KexAlgorithms -diffie-
      hellman-group1-sha1,diffie-hellman-group14-sha1,diffie- hellman-group-
      exchange-sha1 Note: First occurrence of an option takes precedence. If Include
      locations are enabled, used, and order of precedence is understood in your
      environment, the entry may be created in a file in Include location. Default
      Value: KexAlgorithms curve25519-sha256,curve25519-sha256@libssh.org,ecdh-sha2-
      nistp256,ecdh-sha2-nistp384,ecdh-sha2-nistp521,diffie-hellman-group-exchange-
      sha256,diffie-hellman-group16-sha512,diffie-hellman-group18-sha512,diffie-
      hellman- group14-sha256 References: 1. NIST SP 800-53 Rev. 5: SC-8
