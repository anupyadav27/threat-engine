      *[!-~]* *$/)' Verify the output matches: -w /etc/group -p wa -k identity -w
      /etc/passwd -p wa -k identity -w /etc/gshadow -p wa -k identity -w /etc/shadow
      -p wa -k identity -w /etc/security/opasswd -p wa -k identity
    remediation: >
