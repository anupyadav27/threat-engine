  - rule_id: rhel.cis.4.password_expiration_warning_days_is_7_or_more
    title: "Ensure password expiration warning days is 7 or more"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 8_v3.0.0"
    cis_version: "8_v3.0.0"
    cis_control: "4.5.1.3"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      The PASS_WARN_AGE parameter in /etc/login.defs allows an administrator to
      notify users that their password will expire in a defined number of days. It
      is recommended that the PASS_WARN_AGE parameter be set to 7 or more days.
    rationale: >
      Providing an advance warning that a password will be expiring gives users time
      to think of a secure password. Users caught unaware may choose a simple
      password or write it down where it may be discovered.
    audit_procedure: >
      Run the following command and verify PASS_WARN_AGE conforms to site policy (No
      less than 7 days): # grep PASS_WARN_AGE /etc/login.defs PASS_WARN_AGE 7 Verify
      all users with a password have their number of days of warning before password
      expires set to 7 or more: Run the following command and Review list of users
      and PASS_WARN_AGE to verify that all users' PASS_WARN_AGE conforms to site
      policy (No less than 7 days): # awk -F: '/^[^:\n\r]+:[^!\*xX\n\r]/ {print $1
      ':' $6}' /etc/shadow <user>:<PASS_WARN_AGE>
    remediation: >
      Set the PASS_WARN_AGE parameter to 7 in /etc/login.defs : PASS_WARN_AGE 7
      Modify user parameters for all users with a password set to match: # chage
      --warndays 7 <user>
