      information. Example: # printf ' -w /etc/group -p wa -k identity -w
      /etc/passwd -p wa -k identity -w /etc/gshadow -p wa -k identity -w /etc/shadow
      -p wa -k identity -w /etc/security/opasswd -p wa -k identity ' >>
      /etc/audit/rules.d/50-identity.rules Merge and load the rules into active
      configuration: # augenrules --load Check if reboot is required. # if [[
