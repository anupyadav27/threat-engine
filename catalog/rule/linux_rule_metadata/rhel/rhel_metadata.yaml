  - rule_id: rhel.cis.6.journald_log_file_access_is_configured
    title: "Ensure journald log file access is configured"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: manual
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "6.2.1.2"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Journald will create logfiles that do not already exist on the system. This
      setting controls what permissions will be applied to these newly created
      files.
    rationale: >
      It is important to ensure that log files have the correct permissions to
      ensure that sensitive data is archived and protected.
    audit_procedure: >
      First determine if there is an override file /etc/tmpfiles.d/systemd.conf. If
      so, this file will override all default settings as defined in
      /usr/lib/tmpfiles.d/systemd.conf and should be inspected. If no override file
      exists, inspect the default /usr/lib/tmpfiles.d/systemd.conf against the site
      specific requirements. Ensure that file permissions are mode 0640 or more
      restrictive. Run the following script to verify if an override file exists or
      not and if the files permissions are mode 640 or more restrictive:
      #!/usr/bin/env bash { l_output='' file_path='' # Check for the existence of an
      override file if [ -f /etc/tmpfiles.d/systemd.conf ]; then
      file_path='/etc/tmpfiles.d/systemd.conf' elif [ -f
      /usr/lib/tmpfiles.d/systemd.conf ]; then
      file_path='/usr/lib/tmpfiles.d/systemd.conf' fi if [ -n '$file_path' ]; then #
      Ensure a file path is found higher_permissions_found=false # Initialize a flag
      to check if higher permissions are found # Read the file line by line and
      check for permissions higher than 0640 while IFS= read -r line; do if echo
      '$line' | grep -Piq '^\s*[a-z]+\s+[^\s]+\s+0*([6-7][4-
      7][1-7]|7[0-7][0-7])\s+'; then higher_permissions_found=true break fi done <
      '$file_path' if $higher_permissions_found; then echo -e '\n - permissions
      other than 0640 found in $file_path' l_output='$l_output\n - Inspect
      $file_path' else echo -e 'All permissions inside $file_path are 0640 or more
      restrictive.' fi fi if [ -z '$l_output' ]; then # Provide output from checks
      echo -e '\n- Audit Result:\n ** PASS **\n$file_path exists and has correct
      permissions set\n' else echo -e '\n- Audit Result:\n ** REVIEW **\n$l_output\n
      - Review permissions to ensure they are set IAW site policy' fi }
    remediation: >
      If the default configuration is not appropriate for the site specific
      requirements, copy /usr/lib/tmpfiles.d/systemd.conf to
      /etc/tmpfiles.d/systemd.conf and modify as required. Requirements is either
      0640 or site policy if that is less restrictive. References: 1. NIST SP 800-53
      Rev. 5: AC-3, AU-2, AU-12, MP-2, SI-5 Additional Information: See man 5
      tmpfiles.d for detailed information on the permission sets for the relevant
      log files. Further information with examples can be found at
      https://www.freedesktop.org/software/systemd/man/tmpfiles.d.html
    references: >
      1. NIST SP 800-53 Rev. 5: AC-3, AU-2, AU-12, MP-2, SI-5 Additional
      Information: See man 5 tmpfiles.d for detailed information on the permission
      sets for the relevant log files. Further information with examples can be
      found at https://www.freedesktop.org/software/systemd/man/tmpfiles.d.html
    impact: >
      
