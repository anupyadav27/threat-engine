  - rule_id: rhel.cis.4.latest_version_of_authselect_is_installed
    title: "Ensure latest version of authselect is installed"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 8_v3.0.0"
    cis_version: "8_v3.0.0"
    cis_control: "4.4.1.2"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Authselect is a utility that simplifies the configuration of user
      authentication. Authselect offers ready-made profiles that can be universally
      used with all modern identity management systems You can create and deploy a
      custom profile by customizing one of the default profiles, the sssd, winbind,
      or the nis profile. This is particularly useful if Modifying a ready-made
      authselect profile is not enough for your needs. When you deploy a custom
      profile, the profile is applied to every user logging into the given host.
      This would be the recommended method, so that the existing profiles can remain
      unmodified. Updated versions of authselect include additional functionality
    rationale: >
      Authselect makes testing and troubleshooting easy because it only modifies
      files in these directories: • /etc/nsswitch.conf • /etc/pam.d/* •
      /etc/dconf/db/distro.d/* To ensure the system has full functionality and
      access to the options covered by this Benchmark, authselect-1.2.6-1 or latter
      is required Impact: If local site customizations have been made to an
      authselect default or custom profile created with the --symlink-pam option,
      these customizations may be over-written by updating authselect. WARNING: Do
      not use authselect if: • your host is part of Linux Identity Management.
      Joining your host to an IdM domain with the ipa-client-install command
      automatically configures SSSD authentication on your host. • Your host is part
      of Active Directory via SSSD. Calling the realm join command to join your host
      to an Active Directory domain automatically configures SSSD authentication on
      your host. It is not recommended to change the authselect profiles configured
      by ipa-client-install or realm join. If you need to modify them, display the
      current settings before making any modifications, so you can revert back to
      them if necessary
    audit_procedure: >
      Run the following command to verify the version of authselect on the system: #
      rpm -q authselect The output should be similar to:
      authselect-1.2.6-1.el8.x86_64
    remediation: >
      Run the following command to install authselect: # dnf install authselect - IF
      - the version of authselect on the system is less that version
      authselect-1.2.6-1: Run the following command to update to the latest version
      of authselect: # dnf upgrade authselect 4.4.2 Configure authselect Authselect
      is a utility that simplifies the configuration of user authentication.
      Authselect offers ready-made profiles that can be universally used with all
      modern identity management systems Authselect makes testing and
      troubleshooting easy because it only modifies files in these directories: •
      /etc/nsswitch.conf • /etc/pam.d/* files • /etc/dconf/db/distro.d/* files You
      can create and deploy a custom profile by customizing one of the default
      profiles, the sssd, winbind, or the nis profile. This is particularly useful
      if Modifying a ready-made authselect profile is not enough for your needs.
      When you deploy a custom profile, the profile is applied to every user logging
      into the given host. This would be the recommended method, so that the
      existing profiles can remain unmodified. Profile Directories - Profiles can be
      found in one of three directories: • /usr/share/authselect/default - Read-only
      directory containing profiles shipped together with authselect. •
      /usr/share/authselect/vendor - Read-only directory for vendor-specific
      profiles that can override the ones in default directory. •
      /etc/authselect/custom - Place for administrator-defined profiles. Profile
      Files - Each profile consists of one or more of these files which provide a
      mandatory profile description and describe the changes that are done to the
      system: • README - Description of the profile. The first line must be a name
      of the profile. • system-auth - PAM stack that is included from nearly all
      individual service configuration files. • password-auth, smartcard-auth,
      fingerprint-auth - These PAM stacks are for applications which handle
      authentication from different types of devices via simultaneously running
      individual conversations instead of one aggregate conversation. • postlogin -
      The purpose of this PAM stack is to provide a common place for all PAM modules
      which should be called after the stack configured in system-auth or the other
      common PAM configuration files. It is included from all individual service
      configuration files that provide login service with shell or file access.
      Note: the modules in the postlogin configuration file are executed regardless
      of the success or failure of the modules in the system-auth configuration
      file. • nsswitch.conf - Name Service Switch configuration file. Only maps
      relevant to the profile must be set. Maps that are not specified by the
      profile are included from /etc/authselect/user-nsswitch.conf. • dconf-db -
      Changes to dconf database. The main uses case of this file is to set changes
      for gnome login screen in order to enable or disable smartcard and fingerprint
      authentication. • dconf-locks - This file define locks on values set in dconf
      database. Conditional lines - Each of these files serves as a template. A
      template is a plain text file with optional usage of several operators that
      can be used to provide some optional profile features. • {continue if
      'feature'} - Immediately stop processing of the file unless 'feature' is
      defined (the rest of the file content will be removed). If 'feature' is
      defined, the whole line with this operator will be removed and the rest of the
      template will be processed. • {stop if 'feature'} - Opposite of 'continue if'.
      Immediately stop processing of the file if 'feature' is defined (the rest of
      the file content will be removed). If 'feature' is not defined, the whole line
      with this operator will be removed and the rest of the template will be
      processed. • {include if 'feature'} - Include the line where this operator is
      placed only if 'feature' is defined. • {exclude if 'feature'} - Opposite to
      'include-if'. Include the line where this operator is placed only if 'feature'
      is not defined. • {imply 'implied-feature' if 'feature'} - Enable feature
      'implied-feature' if feature 'feature' is enabled. The whole line with this
      operator is removed, thus it is not possible to add anything else around this
      operator at the same line. • {if 'feature':true|false} - If 'feature' is
      defined, replace this operator with string 'true', otherwise with string
      'false'. • {if 'feature':true} - If 'feature' is defined, replace this
      operator with string 'true', otherwise with an empty string. Example of
      creating a custom authselect profile called custom-profile # authselect
      create-profile custom-profile -b sssd --symlink-meta WARNING: Do not use
      authselect if: • your host is part of Linux Identity Management. Joining your
      host to an IdM domain with the ipa-client-install command automatically
      configures SSSD authentication on your host. • Your host is part of Active
      Directory via SSSD. Calling the realm join command to join your host to an
      Active Directory domain automatically configures SSSD authentication on your
      host. • It is not recommended to change the authselect profiles configured by
      ipa-client- install or realm join. If you need to modify them, display the
      current settings before making any modifications, so you can revert back to
      them if necessary
    references: >
      
    impact: >
