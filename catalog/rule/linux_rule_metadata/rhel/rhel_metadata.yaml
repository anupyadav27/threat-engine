      *always,exit/ \ &&/ -F *arch=b(32|64)/ \ &&/ -S/ \ &&(/sethostname/ \
      ||/setdomainname/) \ &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)' auditctl -l |
      awk '/^ *-w/ \ &&(/\/etc\/issue/ \ ||/\/etc\/issue.net/ \ ||/\/etc\/hosts/ \
      ||/\/etc\/sysconfig\/network/) \ &&/ +-p *wa/ \ &&(/ key= *[!-~]* *$/||/ -k
      *[!-~]* *$/)' } Verify the output includes: -a always,exit -F arch=b64 -S
      sethostname,setdomainname -F key=system-locale -a always,exit -F arch=b32 -S
      sethostname,setdomainname -F key=system-locale -w /etc/issue -p wa -k system-
      locale -w /etc/issue.net -p wa -k system-locale -w /etc/hosts -p wa -k system-
      locale -w /etc/sysconfig/network -p wa -k system-locale -w
      /etc/sysconfig/network-scripts -p wa -k system-locale 32 Bit systems Follow
      the same procedures as for 64 bit systems and ignore any entries with b64
    remediation: >
      Create audit rules Edit or create a file in the /etc/audit/rules.d/ directory,
      ending in .rules extension, with the relevant rules to monitor events that
      modify the system's network environment. 64 Bit systems Example: # printf ' -a
      always,exit -F arch=b64 -S sethostname,setdomainname -k system-locale -a
      always,exit -F arch=b32 -S sethostname,setdomainname -k system-locale -w
      /etc/issue -p wa -k system-locale -w /etc/issue.net -p wa -k system-locale -w
