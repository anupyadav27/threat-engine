  - rule_id: rhel.cis.1.gdm_disabling_automatic_mounting_of_removable
    title: "Ensure GDM disabling automatic mounting of removable media is not overridden"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "1.8.7"
    cis_section: "1"
    profile_applicability: "Level 1 + Level 2"
    description: >
      By default GNOME automatically mounts removable media when inserted as a
      convenience to the user By using the lockdown mode in dconf, you can prevent
      users from changing specific settings. To lock down a dconf key or subpath,
      create a locks subdirectory in the keyfile directory. The files inside this
      directory contain a list of keys or subpaths to lock. Just as with the
      keyfiles, you may add any number of files to this directory. Example Lock
      File: # Lock automount settings /org/gnome/desktop/media-handling/automount
      /org/gnome/desktop/media-handling/automount-open
    rationale: >
      With automounting enabled anyone with physical access could attach a USB drive
      or disc and have its contents available in system even if they lacked
      permissions to mount it themselves. Impact: The use of portable hard drives is
      very common for workstation users
    audit_procedure: >
      Run the following script to verify disable automatic mounting is locked:
      #!/usr/bin/env bash { # Check if GNOME Desktop Manager is installed. If
      package isn't installed, recommendation is Not Applicable\n # determine
      system's package manager l_pkgoutput='' if command -v dpkg-query > /dev/null
      2>&1; then l_pq='dpkg-query -W' elif command -v rpm > /dev/null 2>&1; then
      l_pq='rpm -q' fi # Check if GDM is installed l_pcl='gdm gdm3' # Space
      separated list of packages to check for l_pn in $l_pcl; do $l_pq '$l_pn' >
      /dev/null 2>&1 && l_pkgoutput='$l_pkgoutput\n - Package: \'$l_pn\' exists on
      the system\n - checking configuration' done # Check configuration (If
      applicable) if [ -n '$l_pkgoutput' ]; then l_output='' l_output2='' echo -e
      '$l_pkgoutput\n' # Look for idle-delay to determine profile in use, needed for
      remaining tests l_kfd='/etc/dconf/db/$(grep -Psril '^\h*automount\b'
      /etc/dconf/db/*/ | awk -F'/' '{split($(NF-1),a,'.');print a[1]}').d' #set
      directory of key file to be locked l_kfd2='/etc/dconf/db/$(grep -Psril
      '^\h*automount-open\b' /etc/dconf/db/*/ | awk -F'/'
      '{split($(NF-1),a,'.');print a[1]}').d' #set directory of key file to be
      locked if [ -d '$l_kfd' ]; then # If key file directory doesn't exist, options
      can't be locked if grep -Priq '^\h*\/org/gnome\/desktop\/media-
      handling\/automount\b' '$l_kfd'; then l_output='$l_output\n - \'automount\' is
      locked in \'$(grep -Pril '^\h*\/org/gnome\/desktop\/media-
      handling\/automount\b' '$l_kfd')\'' else l_output2='$l_output2\n -
      \'automount\' is not locked' fi else l_output2='$l_output2\n - \'automount\'
      is not set so it can not be locked' fi if [ -d '$l_kfd2' ]; then # If key file
      directory doesn't exist, options can't be locked if grep -Priq
      '^\h*\/org/gnome\/desktop\/media-handling\/automount-open\b' '$l_kfd2'; then
      l_output='$l_output\n - \'lautomount-open\' is locked in \'$(grep -Pril
      '^\h*\/org/gnome\/desktop\/media-handling\/automount-open\b' '$l_kfd2')\''
      else l_output2='$l_output2\n - \'automount-open\' is not locked' fi else
      l_output2='$l_output2\n - \'automount-open\' is not set so it can not be
      locked' fi else l_output='$l_output\n - GNOME Desktop Manager package is not
      installed on the system\n - Recommendation is not applicable' fi # Report
      results. If no failures output in l_output2, we pass if [ -z '$l_output2' ];
      then echo -e '\n- Audit Result:\n ** PASS **\n$l_output\n' else echo -e '\n-
      Audit Result:\n ** FAIL **\n - Reason(s) for audit failure:\n$l_output2\n' [
      -n '$l_output' ] && echo -e '\n- Correctly set:\n$l_output\n' fi }
    remediation: >
      Run the following script to lock disable automatic mounting of media for all
      GNOME users: #!/usr/bin/env bash { # Check if GNMOE Desktop Manager is
      installed. If package isn't installed, recommendation is Not Applicable\n #
