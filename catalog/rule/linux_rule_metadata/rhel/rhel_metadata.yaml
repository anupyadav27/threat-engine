  - rule_id: rhel.cis.1.gpgcheck_is_globally_activated
    title: "Ensure gpgcheck is globally activated"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "1.2.1.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      The gpgcheck option, found in the main section of the /etc/dnf/dnf.conf and
      individual /etc/yum.repos.d/* files, determines if an RPM package's signature
      is checked prior to its installation.
    rationale: >
      It is important to ensure that an RPM's package signature is always checked
      prior to installation to ensure that the software is obtained from a trusted
      source.
    audit_procedure: >
      Global configuration. Run the following command and verify that global
      configuration for gpgcheck is enabled. (set to 1, True, or yes): # grep -Pi --
      '^\h*gpgcheck\h*=\h*(1|true|yes)\b' /etc/dnf/dnf.conf gpgcheck=1 Note: true or
      yes is also acceptable Configuration in /etc/yum.repos.d/ takes precedence
      over the global configuration. Run the following command and verify that there
      are no instances of entries starting with gpgcheck returned set to 0. Nor
      should there be any invalid (non-boolean) values. When dnf encounters such
      invalid entries, they are ignored and the global configuration is applied. #
      grep -Pris -- '^\h*gpgcheck\h*=\h*(0|[2-9]|[1-9][0-9]+|false|no)\b'
      /etc/yum.repos.d/ Nothing should be returned
    remediation: >
      Edit /etc/dnf/dnf.conf and set gpgcheck=1: Example # sed -i
      's/^gpgcheck\s*=\s*.*/gpgcheck=1/' /etc/dnf/dnf.conf Edit any failing files in
      /etc/yum.repos.d/* and set all instances starting with gpgcheck to 1. Example:
      # find /etc/yum.repos.d/ -name '*.repo' -exec echo 'Checking:' {} \; -exec sed
      -i 's/^gpgcheck\s*=\s*.*/gpgcheck=1/' {} \; References: 1. NIST SP 800-53 Rev.
      5: SI-2
    references: >
      1. NIST SP 800-53 Rev. 5: SI-2
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_RHEL_9_v2_0_0_1_2_1_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
