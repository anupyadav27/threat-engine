  - rule_id: rhel.cis.4.events_that_modify_date_and_time_information_are
    title: "Ensure events that modify date and time information are collected"
    severity: medium
    category: linux
    tech_type: rhel
    automation_type: manual
    cis_benchmark: "CIS_RHEL 7_v2.1.1"
    cis_version: "7_v2.1.1"
    cis_control: "4.1.4"
    cis_section: "4"
    profile_applicability: "Level 2"
    description: >
      Capture events where the system date and/or time has been modified. The
      parameters in this section are set to determine if the adjtimex (tune kernel
      clock), settimeofday (Set time, using timeval and timezone structures) stime
      (using seconds since 1/1/1970) or clock_settime (allows for the setting of
      several internal clocks and timers) system calls have been executed and always
      write an audit record to the /var/log/audit.log file upon exit, tagging the
      records with the identifier 'time-change'
    rationale: >
      Unexpected changes in system date and/or time could be a sign of malicious
      activity on the system.
    audit_procedure: >
      On a 32 bit system run the following command and verify the output matches: #
      grep time-change /etc/audit/audit.rules -a always,exit -F arch=b32 -S adjtimex
      -S settimeofday -S stime -k time- change -a always,exit -F arch=b32 -S
      clock_settime -k time-change -w /etc/localtime -p wa -k time-change On a 64
      bit system run the following command and verify the output matches: # grep
      time-change /etc/audit/audit.rules -a always,exit -F arch=b64 -S adjtimex -S
      settimeofday -k time-change -a always,exit -F arch=b32 -S adjtimex -S
      settimeofday -S stime -k time- change -a always,exit -F arch=b64 -S
      clock_settime -k time-change -a always,exit -F arch=b32 -S clock_settime -k
      time-change -w /etc/localtime -p wa -k time-change
    remediation: >
      For 32 bit systems add the following lines to the /etc/audit/audit.rules file:
      197 | P a g e -a always,exit -F arch=b32 -S adjtimex -S settimeofday -S stime
      -k time- change -a always,exit -F arch=b32 -S clock_settime -k time-change -w
      /etc/localtime -p wa -k time-change For 64 bit systems add the following lines
      to the /etc/audit/audit.rules file: -a always,exit -F arch=b64 -S adjtimex -S
      settimeofday -k time-change -a always,exit -F arch=b32 -S adjtimex -S
      settimeofday -S stime -k time- change -a always,exit -F arch=b64 -S
      clock_settime -k time-change -a always,exit -F arch=b32 -S clock_settime -k
      time-change -w /etc/localtime -p wa -k time-change Critical Controls: 3.6
      Implement Automated Configuration Monitoring System (i.e. Configuration
      Assessment Tools) Implement and test an automated configuration monitoring
      system that verifies all remotely testable secure configuration elements, and
      alerts when unauthorized changes occur. This includes detecting new listening
      ports, new administrative users, changes to group and local policy objects
      (where applicable), and new services running on a system. Whenever possible
      use tools compliant with the Security Content Automation Protocol (SCAP) in
      order to streamline reporting and integration. 198 | P a g e
    references: >
      
    impact: >
      
