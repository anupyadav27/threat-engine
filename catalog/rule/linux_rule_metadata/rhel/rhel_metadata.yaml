  - rule_id: rhel.cis.5.sudo_log_file_exists
    title: "Ensure sudo log file exists"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "5.2.3"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The Defaults logfile entry sets the path to the sudo log file. Setting a path
      turns on logging to a file; negating this option turns it off. By default,
      sudo logs via syslog.
    rationale: >
      Defining a dedicated log file for sudo simplifies auditing of sudo commands
      and creation of auditd rules for sudo. Impact: WARNING: Editing the sudo
      configuration incorrectly can cause sudo to stop functioning. Always use
      visudo to modify sudo configuration files. Creation of additional log files
      can cause disk space exhaustion if not correctly managed. You should configure
      logrotate to manage the sudo log in accordance with your local policy.
    audit_procedure: >
      Run the following command to verify that sudo has a custom log file configured
      # grep -rPsi
      '^\h*Defaults\h+([^#]+,\h*)?logfile\h*=\h*(\'|\')?\H+(\'|\')?(,\h*\H+\h*)*\h*
      (#.*)?$' /etc/sudoers* Example output: Defaults logfile='/var/log/sudo.log'
    remediation: >
      Edit the file /etc/sudoers or a file in /etc/sudoers.d/ with visudo -f <PATH
      TO FILE> and add the following line: Defaults logfile='<PATH TO CUSTOM LOG
      FILE>' Example Defaults logfile='/var/log/sudo.log' Notes: • sudo will read
      each file in /etc/sudoers.d, skipping file names that end in ~ or contain a .
      character to avoid causing problems with package manager or editor
      temporary/backup files. • Files are parsed in sorted lexical order. That is,
      /etc/sudoers.d/01_first will be parsed before /etc/sudoers.d/10_second. • Be
      aware that because the sorting is lexical, not numeric,
      /etc/sudoers.d/1_whoops would be loaded after /etc/sudoers.d/10_second. •
      Using a consistent number of leading zeroes in the file names can be used to
      avoid such problems. References: 1. SUDO(8) 2. VISUDO(8) 3. sudoers(5) 4. NIST
      SP 800-53 Rev. 5: AU-3, AU-12 Additional Information: visudo edits the sudoers
      file in a safe fashion, analogous to vipw(8). visudo locks the sudoers file
      against multiple simultaneous edits, provides basic sanity checks, and checks
      for parse errors. If the sudoers file is currently being edited you will
      receive a message to try again later.
    references: >
      1. SUDO(8) 2. VISUDO(8) 3. sudoers(5) 4. NIST SP 800-53 Rev. 5: AU-3, AU-12
      Additional Information: visudo edits the sudoers file in a safe fashion,
