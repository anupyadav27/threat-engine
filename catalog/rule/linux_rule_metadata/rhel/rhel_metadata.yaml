    description: >
      The pwquality dictcheck option sets whether to check for the words from the
      cracklib dictionary.
    rationale: >
      If the operating system allows the user to select passwords based on
      dictionary words, this increases the chances of password compromise by
      increasing the opportunity for successful guesses, and brute-force attacks.
    audit_procedure: >
      Run the following command to verify that the dictcheck option is not set to 0
      (disabled) in a pwquality configuration file: # grep -Psi --
      '^\h*dictcheck\h*=\h*0\b' /etc/security/pwquality.conf
      /etc/security/pwquality.conf.d/*.conf Nothing should be returned Run the
      following command to verify that the dictcheck option is not set to 0
      (disabled) as a module argument in a PAM file: # grep -psi --
      '^\h*password\h+(requisite|required|sufficient)\h+pam_pwquality\.so\h+([^#\n\
      r]+\h+)?dictcheck\h*=\h*0\b' /etc/pam.d/system-auth /etc/pam.d/password-auth
      Nothing should be returned Note: • Settings observe an order of precedence: o
      module arguments override the settings in the /etc/security/pwquality.conf
      configuration file o settings in the /etc/security/pwquality.conf
      configuration file override settings in a .conf file in the
      /etc/security/pwquality.conf.d/ directory o settings in a .conf file in the
      /etc/security/pwquality.conf.d/ directory are read in canonical order, with
      last read file containing the setting taking precedence • It is recommended
      that settings be configured in a .conf file in the
      /etc/security/pwquality.conf.d/ directory for clarity, convenience, and
      durability.
    remediation: >
      Edit any file ending in .conf in the /etc/security/pwquality.conf.d/ directory
      and/or the file /etc/security/pwquality.conf and comment out or remove any
