    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "5.1.3"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      An SSH public key is one of two files used in SSH public key authentication.
      In this authentication method, a public key is a key that can be used for
      verifying digital signatures generated using a corresponding private key. Only
      a public key that corresponds to a private key will be able to authenticate
      successfully.
    rationale: >
      If a public host key file is modified by an unauthorized user, the SSH service
      may be compromised.
    audit_procedure: >
      Run the following command and verify Access does not grant write or execute
      permissions to group or other for all returned files: Run the following script
      to verify SSH public host key files are mode 0644 or more restrictive, owned
      by the root user, and owned by the root group: #!/usr/bin/env bash {
      l_output='' l_output2='' l_pmask='0133' && l_maxperm='$( printf '%o' $(( 0777
      & ~$l_pmask )) )' FILE_CHK() { while IFS=: read -r l_file_mode l_file_owner
      l_file_group; do l_out2='' if [ $(( $l_file_mode & $l_pmask )) -gt 0 ]; then
      l_out2='$l_out2\n - Mode: \'$l_file_mode\' should be mode: \'$l_maxperm\' or
      more restrictive' fi if [ '$l_file_owner' != 'root' ]; then l_out2='$l_out2\n
      - Owned by: \'$l_file_owner\' should be owned by \'root\'' fi if [
      '$l_file_group' != 'root' ]; then l_out2='$l_out2\n - Owned by group
      \'$l_file_group\' should be group owned by group: \'root\'' fi if [ -n
      '$l_out2' ]; then l_output2='$l_output2\n - File: \'$l_file\'$l_out2' else
      l_output='$l_output\n - File: \'$l_file\'\n - Correct: mode: \'$l_file_mode\',
      owner: \'$l_file_owner\', and group owner: \'$l_file_group\' configured' fi
      done < <(stat -Lc '%#a:%U:%G' '$l_file') } while IFS= read -r -d $'\0' l_file;
      do if ssh-keygen -lf &>/dev/null '$l_file'; then file '$l_file' | grep -Piq --
      '\bopenssh\h+([^#\n\r]+\h+)?public\h+key\b' && FILE_CHK fi done < <(find -L
