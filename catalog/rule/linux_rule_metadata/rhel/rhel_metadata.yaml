  - rule_id: rhel.cis.5.events_that_modify_user_group_information_are
    title: "Ensure events that modify user/group information are collected"
    severity: medium
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 8_v3.0.0"
    cis_version: "8_v3.0.0"
    cis_control: "5.2.3.8"
    cis_section: "5"
    profile_applicability: "Level 2"
    description: >
      Record events affecting the modification of user or group information,
      including that of passwords and old passwords if in use. • /etc/group - system
      groups • /etc/passwd - system users • /etc/gshadow - encrypted password for
      each group • /etc/shadow - system user passwords • /etc/security/opasswd -
      storage of old passwords if the relevant PAM module is in use The parameters
      in this section will watch the files to see if they have been opened for write
      or have had attribute changes (e.g. permissions) and tag them with the
      identifier 'identity' in the audit log file.
    rationale: >
      Unexpected changes to these files could be an indication that the system has
      been compromised and that an unauthorized user is attempting to hide their
      activities or compromise additional accounts.
    audit_procedure: >
      On disk configuration Run the following command to check the on disk rules: #
      awk '/^ *-w/ \ &&(/\/etc\/group/ \ ||/\/etc\/passwd/ \ ||/\/etc\/gshadow/ \
      ||/\/etc\/shadow/ \ ||/\/etc\/security\/opasswd/) \ &&/ +-p *wa/ \ &&(/ key=
      *[!-~]* *$/||/ -k *[!-~]* *$/)' /etc/audit/rules.d/*.rules Verify the output
      matches: -w /etc/group -p wa -k identity -w /etc/passwd -p wa -k identity -w
      /etc/gshadow -p wa -k identity -w /etc/shadow -p wa -k identity -w
      /etc/security/opasswd -p wa -k identity Running configuration Run the
      following command to check loaded rules: # auditctl -l | awk '/^ *-w/ \
