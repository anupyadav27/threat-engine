  - rule_id: rhel.cis.5.password_unlock_time_is_configured
    title: "Ensure password unlock time is configured"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "5.3.3.1.2"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      unlock_time=<n> - The access will be re-enabled after seconds after the lock
      out. The value 0 has the same meaning as value never - the access will not be
      re-enabled without resetting the faillock entries by the faillock(8) command.
      Notes: • The default directory that pam_faillock uses is usually cleared on
      system boot so the access will be also re-enabled after system reboot. If that
      is undesirable a different tally directory must be set with the dir option. •
      It is usually undesirable to permanently lock out users as they can become
      easily a target of denial of service attack unless the usernames are random
      and kept secret to potential attackers. • The maximum configurable value for
      unlock_time is 604800
    rationale: >
      Locking out user IDs after n unsuccessful consecutive login attempts mitigates
      brute force password attacks against your systems. Impact: Use of
      unlock_time=0 may allow an attacker to cause denial of service to legitimate
      users. This will also require a systems administrator with elevated privileges
      to unlock the account.
    audit_procedure: >
      Run the following command to verify that the time in seconds before the
      account is unlocked is either 0 (never) or 900 (15 minutes) or more and meets
      local site policy: # grep -Pi --
      '^\h*unlock_time\h*=\h*(0|9[0-9][0-9]|[1-9][0-9]{3,})\b'
      /etc/security/faillock.conf unlock_time = 900 Run the following command to
      verify that the unlock_time argument has not been set, or is either 0 (never)
      or 900 (15 minutes) or more and meets local site policy: # grep -Pi --
      '^\h*auth\h+(requisite|required|sufficient)\h+pam_faillock\.so\h+([^#\n\r]+\h
      +)?unlock_time\h*=\h*([1-9]|[1-9][0-9]|[1-8][0-9][0-9])\b' /etc/pam.d/system-
      auth /etc/pam.d/password-auth Nothing should be returned
    remediation: >
      Set password unlock time to conform to site policy. unlock_time should be 0
      (never), or 900 seconds or greater. Edit /etc/security/faillock.conf and
      update or add the following line: unlock_time = 900 Run the following script
      to remove the unlock_time argument from the pam_faillock.so module in the PAM
      files: #!/usr/bin/env bash { for l_pam_file in system-auth password-auth; do
      l_authselect_file='/etc/authselect/$(head -1 /etc/authselect/authselect.conf |
      grep 'custom/')/$l_pam_file' sed -ri
      's/(^\s*auth\s+(requisite|required|sufficient)\s+pam_faillock\.so.*)(\s+unloc
      k_time\s*=\s*\S+)(.*$)/\1\4/' '$l_authselect_file' done authselect apply-
      changes } `` Default Value: unlock_time = 600 Additional Information: If a
      user has been locked out because they have reached the maximum consecutive
      failure count defined by deny= in the pam_faillock.so module, the user can be
      unlocked by issuing the command faillock --user <USERNAME> --reset. This
      command sets the failed count to 0, effectively unlocking the user.
    references: >
      
    impact: >
      Use of unlock_time=0 may allow an attacker to cause denial of service to
      legitimate users. This will also require a systems administrator with elevated
      privileges to unlock the account.
    compliance_mappings:
      cis:
        - "CIS_RHEL_9_v2_0_0_5_3_3_1_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_rhel_9_v2_0_0_5_3_3_1_2"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: rhel.cis.5.password_failed_attempts_lockout_includes_root
    title: "Ensure password failed attempts lockout includes root account"
    severity: medium
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "5.3.3.1.3"
    cis_section: "5"
    profile_applicability: "Level 2"
    description: >
      even_deny_root - Root account can become locked as well as regular accounts
      root_unlock_time=n - This option implies even_deny_root option. Allow access
      after n seconds to root account after the account is locked. In case the
      option is not specified the value is the same as of the unlock_time option.
    rationale: >
      Locking out user IDs after n unsuccessful consecutive login attempts mitigates
      brute force password attacks against your systems. Impact: Use of
      unlock_time=0 or root_unlock_time=0 may allow an attacker to cause denial of
      service to legitimate users.
    audit_procedure: >
      Run the following command to verify that even_deny_root and/or
      root_unlock_time is enabled: # grep -Pi --
      '^\h*(even_deny_root|root_unlock_time\h*=\h*\d+)\b'
      /etc/security/faillock.conf Example output: even_deny_root --AND/OR--
      root_unlock_time = 60 Run the following command to verify that - IF -
      root_unlock_time is set, it is set to 60 (One minute) or more: # grep -Pi --
      '^\h*root_unlock_time\h*=\h*([1-9]|[1-5][0-9])\b' /etc/security/faillock.conf
      Nothing should be returned Run the following command to check the
      pam_faillock.so module for the root_unlock_time argument. Verify - IF -
      root_unlock_time is set, it is set to 60 (One minute) or more: # grep -Pi --
      '^\h*auth\h+([^#\n\r]+\h+)pam_faillock\.so\h+([^#\n\r]+\h+)?root_unlock_time\
      h*=\h*([1-9]|[1-5][0-9])\b' /etc/pam.d/system-auth /etc/pam.d/password-auth
      Nothing should be returned
    remediation: >
      Edit /etc/security/faillock.conf: • Remove or update any line containing
      root_unlock_time, - OR - set it to a value of 60 or more • Update or add the
      following line: even_deny_root Run the following script to remove the
      even_deny_root and root_unlock_time arguments from the pam_faillock.so module
      in the PAM files: #!/usr/bin/env bash { for l_pam_file in system-auth
      password-auth; do l_authselect_file='/etc/authselect/$(head -1
      /etc/authselect/authselect.conf | grep 'custom/')/$l_pam_file' sed -ri
      's/(^\s*auth\s+(.*)\s+pam_faillock\.so.*)(\s+even_deny_root)(.*$)/\1\4/'
      '$l_authselect_file' sed -ri
      's/(^\s*auth\s+(.*)\s+pam_faillock\.so.*)(\s+root_unlock_time\s*=\s*\S+)(.*$)
      /\1\4/' '$l_authselect_file' done authselect apply-changes } `` Default Value:
      disabled Additional Information: If a user has been locked out because they
      have reached the maximum consecutive failure count defined by deny= in the
      pam_faillock.so module, the user can be unlocked by issuing the command
      faillock --user <USERNAME> --reset. This command sets the failed count to 0,
      effectively unlocking the user.
    references: >
      
    impact: >
      Use of unlock_time=0 or root_unlock_time=0 may allow an attacker to cause
      denial of service to legitimate users.
