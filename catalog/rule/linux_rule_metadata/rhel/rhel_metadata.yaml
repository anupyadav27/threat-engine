      privilege escalation.
    rationale: >
      Without re-authentication, users may access resources or perform tasks for
      which they do not have authorization. When operating systems provide the
      capability to escalate a functional capability, it is critical the user re-
      authenticate.
    audit_procedure: >
      Verify the operating system requires users to re-authenticate for privilege
      escalation. Check the configuration of the /etc/sudoers and /etc/sudoers.d/*
      files with the following command: # grep -r '^[^#].*\!authenticate'
      /etc/sudoers* If any line is found with a !authenticate tag, refer to the
      remediation procedure below.
    remediation: >
      Configure the operating system to require users to reauthenticate for
      privilege escalation. Based on the outcome of the audit procedure, use visudo
      -f <PATH TO FILE> to edit the relevant sudoers file. Remove any occurrences of
      !authenticate tags in the file(s). References: 1. NIST SP 800-53 Rev. 5: AC-6
    references: >
      1. NIST SP 800-53 Rev. 5: AC-6
