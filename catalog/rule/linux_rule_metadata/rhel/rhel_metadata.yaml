  - rule_id: rhel.cis.6.audit_suid_executables
    title: "Audit SUID executables"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: manual
    cis_benchmark: "CIS_RHEL 7_v2.1.1"
    cis_version: "7_v2.1.1"
    cis_control: "6.1.13"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      The owner of a file can set the file's permissions to run with the owner's or
      group's permissions, even if the user running the program is not the owner or
      a member of the group. The most common reason for a SUID program is to enable
      users to perform functions (such as changing their password) that require root
      privileges.
    rationale: >
      There are valid reasons for SUID programs, but it is important to identify and
      review such programs to ensure they are legitimate.
    audit_procedure: >
      Run the following command to list SUID files: # df --local -P | awk if (NR!=1)
      print $6 | xargs -I '{}' find '{}' -xdev - type f -perm -4000 The command
      above only searches local filesystems, there may still be compromised items on
      network mounted partitions. Additionally the --local option to df is not
      universal to all versions, it can be omitted to search all filesystems on a
      system including network mounted filesystems or the following command can be
      run manually for each partition: # find <partition> -xdev -type f -perm -4000
    remediation: >
      Ensure that no rogue SUID programs have been introduced into the system.
      Review the files returned by the action in the Audit section and confirm the
      integrity of these binaries. Critical Controls: 5.1 Minimize And Sparingly Use
      Administrative Privileges Minimize administrative privileges and only use
      administrative accounts when they are required. Implement focused auditing on
      the use of administrative privileged functions and monitor for anomalous
      behavior. 313 | P a g e
