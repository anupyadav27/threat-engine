  - rule_id: rhel.cis.4.pam_pwhistory_includes_use_authtok
    title: "Ensure pam_pwhistory includes use_authtok"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 8_v3.0.0"
    cis_version: "8_v3.0.0"
    cis_control: "4.4.3.3.3"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      use_authtok - When password changing enforce the module to set the new
      password to the one provided by a previously stacked password module
    rationale: >
      use_authtok allows multiple pam modules to confirm a new password before it is
      accepted.
    audit_procedure: >
      Run the following command to verify that use_authtok is set on the
      pam_pwhistory.so module lines in the password stack: # grep -P --
      '^\h*password\h+([^#\n\r]+)\h+pam_pwhistory\.so\h+([^#\n\r]+\h+)?use_authtok\
      b' /etc/pam.d/{password,system}-auth Output should be similar to:
      /etc/pam.d/password-auth:password required pam_pwhistory.so use_authtok
      /etc/pam.d/system-auth:password required pam_pwhistory.so use_authtok Verify
      that the lines include use_authtok
    remediation: >
      Run the following script to verify the active authselect profile includes
      use_authtok on the password stack's pam_pwhistory.so module lines:
      #!/usr/bin/env bash { l_pam_profile='$(head -1
      /etc/authselect/authselect.conf)' if grep -Pq -- '^custom\/' <<<
      '$l_pam_profile'; then l_pam_profile_path='/etc/authselect/$l_pam_profile'
      else l_pam_profile_path='/usr/share/authselect/default/$l_pam_profile' fi grep
      -P --
      '^\h*password\h+(requisite|required|sufficient)\h+pam_pwhistory\.so\h+([^#\n\r]+\h+)?use_authtok\
      b' '$l_pam_profile_path'/{password,system}-auth } Example output:
      /etc/authselect/custom/custom-profile/password-auth:password required
      pam_pwhistory.so use_authtok /etc/authselect/custom/custom-profile/system-
      auth:password required pam_pwhistory.so use_authtok - IF - the output does not
      include use_authtok, run the following script: #!/usr/bin/env bash {
      l_pam_profile='$(head -1 /etc/authselect/authselect.conf)' if grep -Pq --
      '^custom\/' <<< '$l_pam_profile'; then
      l_pam_profile_path='/etc/authselect/$l_pam_profile' else
      l_pam_profile_path='/usr/share/authselect/default/$l_pam_profile' fi for
      l_authselect_file in '$l_pam_profile_path'/password-auth
      '$l_pam_profile_path'/system- auth; do if grep -Pq
      '^\h*password\h+([^#\n\r]+)\h+pam_pwhistory\.so\h+([^#\n\r]+\h+)?use_authtok\b'
      '$l_authselect_file'; then echo '- \'use_authtok\' is already set' else echo
      '- \'use_authtok\' is not set. Updating template' sed -ri
      's/(^\s*password\s+(requisite|required|sufficient)\s+pam_pwhistory\.so\s+.*)$/&
      use_authtok/g' '$l_authselect_file' fi done } Run the following command to
      update the password-auth and system-auth files in /etc/pam.d to include the
      use_authtok argument on the password stack's pam_pwhistory.so lines: #
      authselect apply-changes References: 1. NIST SP 800-53 Rev. 5: IA-5
    references: >
      1. NIST SP 800-53 Rev. 5: IA-5
