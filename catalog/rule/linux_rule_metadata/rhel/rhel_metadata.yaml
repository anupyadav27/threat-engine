      /etc/audit/audit.rules -w /etc/group -p wa -k identity -w /etc/passwd -p wa -k
      identity -w /etc/gshadow -p wa -k identity -w /etc/shadow -p wa -k identity -w
      /etc/security/opasswd -p wa -k identity
    remediation: >
      Add the following lines to the /etc/audit/audit.rules file: -w /etc/group -p
      wa -k identity -w /etc/passwd -p wa -k identity -w /etc/gshadow -p wa -k
      identity -w /etc/shadow -p wa -k identity -w /etc/security/opasswd -p wa -k
      identity Critical Controls: 199 | P a g e 5.4 Log Administrative User Addition
