    cis_version: "7_v2.1.1"
    cis_control: "3.6.2"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      A default deny all policy on connections ensures that any unconfigured network
      usage will be rejected.
    rationale: >
      With a default accept policy the firewall will accept any packet that is not
      configured to be denied. It is easier to white list acceptable usage than to
      black list unacceptable usage.
    audit_procedure: >
      Run the following command and verify that the policy for the INPUT , OUTPUT ,
      and FORWARD chains is DROP or REJECT : # iptables -L Chain INPUT (policy DROP)
      Chain FORWARD (policy DROP) Chain OUTPUT (policy DROP)
    remediation: >
      Run the following commands to implement a default DROP policy: # iptables -P
      INPUT DROP # iptables -P OUTPUT DROP # iptables -P FORWARD DROP Notes:
      Changing firewall settings while connected over network can result in being
      locked out of the system. Remediation will only affect the active system
      firewall, be sure to configure the default policy in your firewall management
      to apply on boot as well. Critical Controls: 179 | P a g e 9.2 Leverage Host-
      based Firewalls Apply host-based firewalls or port filtering tools on end
      systems, with a default-deny rule that drops all traffic except those services
