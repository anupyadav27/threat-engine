  - rule_id: rhel.cis.6.suid_and_sgid_files_are_reviewed
    title: "Ensure SUID and SGID files are reviewed"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: manual
    cis_benchmark: "CIS_RHEL 8_v3.0.0"
    cis_version: "8_v3.0.0"
    cis_control: "6.1.13"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      The owner of a file can set the file's permissions to run with the owner's or
      group's permissions, even if the user running the program is not the owner or
      a member of the group. The most common reason for a SUID or SGID program is to
      enable users to perform functions (such as changing their password) that
      require root privileges.
    rationale: >
      There are valid reasons for SUID and SGID programs, but it is important to
      identify and review such programs to ensure they are legitimate. Review the
      files returned by the action in the audit section and check to see if system
      binaries have a different checksum than what from the package. This is an
      indication that the binary may have been replaced.
    audit_procedure: >
      Run the following script to generate a list of SUID and SGID files:
      #!/usr/bin/env bash { l_output='' l_output2='' a_arr=(); a_suid=(); a_sgid=()
      # initialize arrays # Populate array with files that will possibly fail one of
      the audits while read -r l_mpname; do while IFS= read -r -d $'\0' l_file; do [
      -e '$l_file' ] && a_arr+=('$(stat -Lc '%n^%#a' '$l_file')') done < <(find
      '$l_mpname' -xdev -not -path '/run/user/*' -type f \( - perm -2000 -o -perm
      -4000 \) -print0) done <<< '$(findmnt -Derno target)' # Test files in the
      array while IFS='^' read -r l_fname l_mode; do if [ -f '$l_fname' ]; then
      l_suid_mask='04000'; l_sgid_mask='02000' [ $(( $l_mode & $l_suid_mask )) -gt 0
      ] && a_suid+=('$l_fname') [ $(( $l_mode & $l_sgid_mask )) -gt 0 ] &&
      a_sgid+=('$l_fname') fi done <<< '$(printf '%s\n' '${a_arr[@]}')' if ! ((
      ${#a_suid[@]} > 0 )); then l_output='$l_output\n - There are no SUID files
      exist on the system' else l_output2='$l_output2\n - List of \'$(printf '%s'
      '${#a_suid[@]}')\' SUID executable files:\n$(printf '%s\n' '${a_suid[@]}')\n -
      end of list -\n' fi if ! (( ${#a_sgid[@]} > 0 )); then l_output='$l_output\n -
      There are no SGID files exist on the system' else l_output2='$l_output2\n -
      List of \'$(printf '%s' '${#a_sgid[@]}')\' SGID executable files:\n$(printf
      '%s\n' '${a_sgid[@]}')\n - end of list -\n' fi [ -n '$l_output2' ] &&
      l_output2='$l_output2\n- Review the preceding list(s) of SUID and/or SGID
      files to\n- ensure that no rogue programs have been introduced onto the
      system.\n' unset a_arr; unset a_suid; unset a_sgid # Remove arrays # If
      l_output2 is empty, Nothing to report if [ -z '$l_output2' ]; then echo -e
      '\n- Audit Result:\n$l_output\n' else echo -e '\n- Audit
      Result:\n$l_output2\n' [ -n '$l_output' ] && echo -e '$l_output\n' fi } Note:
      on systems with a large number of files, this may be a long running process
    remediation: >
      Ensure that no rogue SUID or SGID programs have been introduced into the
      system. Review the files returned by the action in the Audit section and
      confirm the integrity of these binaries. References: 1. NIST SP 800-53 Rev. 5:
      CM-1, CM-2, CM-6, CM-7, IA-5, AC-3, MP-2
    references: >
      1. NIST SP 800-53 Rev. 5: CM-1, CM-2, CM-6, CM-7, IA-5, AC-3, MP-2
