    profile_applicability: "Level 1"
    description: >
      rsyslog supports the ability to receive messages from remote hosts, thus
      acting as a log server. Clients should not receive data from other hosts.
    rationale: >
      If a client is configured to also receive data, thus turning it into a server,
      the client system is acting outside its operational boundary. Note: This
      recommendation only applies if rsyslog is the chosen method for client side
      logging. Do not apply this recommendation if systemd-journald is used.
    audit_procedure: >
