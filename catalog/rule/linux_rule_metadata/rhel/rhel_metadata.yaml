    description: >
      The user home directory is space defined for the particular user to set local
      environment variables and to store personal files.
    rationale: >
      Since the user is accountable for files stored in the user home directory, the
      user must be the owner of the directory.
    audit_procedure: >
      Run the following script and verify no results are returned: #!/bin/bash cat
      /etc/passwd | awk -F: '{ print $1 ' ' $3 ' ' $6 }' | while read user uid dir;
      do if [ $uid -ge 1000 -a -d '$dir' -a $user != 'nfsnobody' ]; then
      owner=$(stat -L -c '%U' '$dir') if [ '$owner' != '$user' ]; then echo 'The
      home directory ($dir) of user $user is owned by $owner.' fi fi done
    remediation: >
