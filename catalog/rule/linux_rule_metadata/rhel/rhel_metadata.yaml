  - rule_id: rhel.cis.6.no_unowned_or_ungrouped_files_or_directories_exist
    title: "Ensure no unowned or ungrouped files or directories exist"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 8_v3.0.0"
    cis_version: "8_v3.0.0"
    cis_control: "6.1.12"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Administrators may delete users or groups from the system and neglect to
      remove all files and/or directories owned by those users or groups.
    rationale: >
      A new user or group who is assigned a deleted user's user ID or group ID may
      then end up 'owning' a deleted user or group's files, and thus have more
      access on the system than was intended.
    audit_procedure: >
      Run the following script to verify no unowned or ungrouped files or
      directories exist: #!/usr/bin/env bash { l_output='' l_output2='' a_path=();
      a_arr=(); a_nouser=(); a_nogroup=() # Initialize arrays a_path=(! -path
      '/run/user/*' -a ! -path '/proc/*' -a ! -path '*/containerd/*' -a ! -path
      '*/kubelet/pods/*' -a ! -path '/sys/fs/cgroup/memory/*') while read -r l_bfs;
      do a_path+=( -a ! -path ''$l_bfs'/*') done < <(findmnt -Dkerno fstype,target |
      awk '$1 ~ /^\s*(nfs|proc|smb)/ {print $2}') while IFS= read -r -d $'\0'
      l_file; do [ -e '$l_file' ] && a_arr+=('$(stat -Lc '%n^%U^%G' '$l_file')') &&
      echo 'Adding: $l_file' done < <(find / \( '${a_path[@]}' \) \( -type f -o
      -type d \) \( -nouser -o -nogroup \) - print0 2> /dev/null) while IFS='^' read
      -r l_fname l_user l_group; do # Test files in the array [ '$l_user' =
      'UNKNOWN' ] && a_nouser+=('$l_fname') [ '$l_group' = 'UNKNOWN' ] &&
      a_nogroup+=('$l_fname') done <<< '$(printf '%s\n' '${a_arr[@]}')' if ! ((
      ${#a_nouser[@]} > 0 )); then l_output='$l_output\n - No unowned files or
      directories exist on the local filesystem.' else l_output2='$l_output2\n -
      There are \'$(printf '%s' '${#a_nouser[@]}')\' unowned files or directories on
      the system.\n - The following is a list of unowned files and/or
      directories:\n$(printf '%s\n' '${a_nouser[@]}')\n - end of list' fi if ! ((
      ${#a_nogroup[@]} > 0 )); then l_output='$l_output\n - No ungrouped files or
      directories exist on the local filesystem.' else l_output2='$l_output2\n -
      There are \'$(printf '%s' '${#a_nogroup[@]}')\' ungrouped files or directories
      on the system.\n - The following is a list of ungrouped files and/or
      directories:\n$(printf '%s\n' '${a_nogroup[@]}')\n - end of list' fi unset
      a_path; unset a_arr ; unset a_nouser; unset a_nogroup # Remove arrays if [ -z
      '$l_output2' ]; then # If l_output2 is empty, we pass echo -e '\n- Audit
      Result:\n ** PASS **\n - * Correctly configured * :\n$l_output\n' else echo -e
      '\n- Audit Result:\n ** FAIL **\n - * Reasons for audit failure *
      :\n$l_output2' [ -n '$l_output' ] && echo -e '\n- * Correctly configured *
      :\n$l_output\n' fi } Note: On systems with a large number of files and/or
      directories, this audit may be a long running process
    remediation: >
      Remove or set ownership and group ownership of these files and/or directories
      to an active user on the system as appropriate. References: 1. NIST SP 800-53
      Rev. 5: AC-3. MP-2
    references: >
      1. NIST SP 800-53 Rev. 5: AC-3. MP-2
