  - rule_id: rhel.cis.2.mail_transfer_agents_are_configured_for_local
    title: "Ensure mail transfer agents are configured for local-only mode"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "2.1.21"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Mail Transfer Agents (MTA), such as sendmail and Postfix, are used to listen
      for incoming mail and transfer the messages to the appropriate user or mail
      server. If the system is not intended to be a mail server, it is recommended
      that the MTA be configured to only process local mail.
    rationale: >
      The software for all Mail Transfer Agents is complex and most have a long
      history of security issues. While it is important to ensure that the system
      can process local mail messages, it is not necessary to have the MTA's daemon
      listening on a port unless the server is intended to be a mail server that
      receives and processes mail from other systems.
    audit_procedure: >
      Run the following script to verify that the MTA is not listening on any non-
      loopback address ( 127.0.0.1 or ::1): #!/usr/bin/env bash { l_output=''
      l_output2='' a_port_list=('25' '465' '587') if [ '$(postconf -n
      inet_interfaces)' != 'inet_interfaces = all' ]; then for l_port_number in
      '${a_port_list[@]}'; do if ss -plntu | grep -P -- ':''$l_port_number''\b' |
      grep -Pvq -- '\h+(127\.0\.0\.1|\[?::1\]?):''$l_port_number''\b'; then
      l_output2='$l_output2\n - Port \'$l_port_number\' is listening on a non-
      loopback network interface' else l_output='$l_output\n - Port
      \'$l_port_number\' is not listening on a non-loopback network interface' fi
      done else l_output2='$l_output2\n - Postfix is bound to all interfaces' fi
      unset a_port_list if [ -z '$l_output2' ]; then echo -e '\n- Audit Result:\n **
      PASS **\n$l_output\n' else echo -e '\n- Audit Result:\n ** FAIL **\n -
      Reason(s) for audit failure:\n$l_output2\n' [ -n '$l_output' ] && echo -e '\n-
      Correctly set:\n$l_output\n' fi }
    remediation: >
      Edit /etc/postfix/main.cf and add the following line to the RECEIVING MAIL
      section. If the line already exists, change it to look like the line below:
      inet_interfaces = loopback-only Run the following command to restart postfix:
      # systemctl restart postfix Note: • This remediation is designed around the
      postfix mail server. • Depending on your environment you may have an
      alternative MTA installed such as sendmail. If this is the case consult the
      documentation for your installed MTA to configure the recommended state.
      References: 1. NIST SP 800-53 Rev. 5: CM-7
    references: >
      1. NIST SP 800-53 Rev. 5: CM-7
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_RHEL_9_v2_0_0_2_1_21"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_rhel_9_v2_0_0_2_1_21"
