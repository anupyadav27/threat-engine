      (Password set, SHA512 crypt.) - OR - (Password locked.) Note: output may
      include YESCRYPT opposed to SHA512. Either is acceptable.
    remediation: >
      Run the following command to set a password for the root user: # passwd root -
      OR - Run the following command to lock the root user account: # usermod -L
      root
