  - rule_id: rhel.cis.1.system_wide_crypto_policy_disables_sha1_hash_and
    title: "Ensure system wide crypto policy disables sha1 hash and signature support"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "1.6.3"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      SHA-1 (Secure Hash Algorithm) is a cryptographic hash function that produces a
      160 bit hash value.
    rationale: >
      The SHA-1 hash function has an inherently weak design, and advancing
      cryptanalysis has made it vulnerable to attacks. The most significant danger
      for a hash algorithm is when a 'collision' which happens when two different
      pieces of data produce the same hash value occurs. This hashing algorithm has
      been considered weak since 2005. Note: The use of SHA-1 with hashbased message
      authentication codes (HMAC) do not rely on the collision resistance of the
      corresponding hash function, and therefore the recent attacks on SHA-1 have a
      significantly lower impact on the use of SHA-1 for HMAC. Because of this, the
      recommendation does not disable the hmac-sha1 MAC.
    audit_procedure: >
      Run the following commands to verify SHA1 hash and signature support has been
      disabled: Run the following command to verify that the hash and sign lines do
      not include the SHA1 hash: # awk -F= '($1~/(hash|sign)/ && $2~/SHA1/ &&
      $2!~/^\s*\- \s*([^#\n\r]+)?SHA1/){print}' /etc/crypto-
      policies/state/CURRENT.pol Nothing should be returned Run the following
      command to verify that sha1_in_certs is set to 0 (disabled): # grep -Psi --
      '^\h*sha1_in_certs\h*=\h*' /etc/crypto- policies/state/CURRENT.pol
      sha1_in_certs = 0
    remediation: >
      Note: • The commands below are written for the included DEFAULT system-wide
      crypto policy. If another policy is in use and follows local site policy,
      replace DEFAULT with the name of your system-wide crypto policy. • Multiple
      subpolicies may be assigned to a policy as a colon separated list. e.g.
      DEFAULT:NO-SHA1:NO-SSHCBC • Subpolicies: o Not included in the update-crypto-
      policies --set command will not be applied to the system wide crypto policy. o
      must exist before they can be applied to the system wide crypto policy. o
      .pmod file filenames must be in all upper case, upper case, e.g. NO-
      SHA1.pmod, or they will not be read by the update-crypto-policies -- set
      command. Create or edit a file in /etc/crypto-policies/policies/modules/
      ending in .pmod and add or modify the following lines: hash = -SHA1 sign =
      -*-SHA1 sha1_in_certs = 0 Example: # printf '%s\n' '# This is a subpolicy
      dropping the SHA1 hash and signature support' 'hash = -SHA1' 'sign = -*-SHA1'
      'sha1_in_certs = 0' >> /etc/crypto- policies/policies/modules/NO-SHA1.pmod Run
      the following command to update the system-wide cryptographic policy # update-
      crypto-policies --set
      <CRYPTO_POLICY>:<CRYPTO_SUBPOLICY1>:<CRYPTO_SUBPOLICY2>:<CRYPTO_SUBPOLICY3>
      Example: update-crypto-policies --set DEFAULT:NO-SHA1 Run the following
      command to reboot the system to make your cryptographic settings effective for
      already running services and applications: # reboot References: 1. crypto-
      policies(7) 2. update-crypto-policies(8) 3. Red Hat Enterprise 8 security
      hardening 4. https://www.redhat.com/en/blog/how-customize-crypto-policies-
      rhel-82 5. https://access.redhat.com/articles/3642912 6. NIST SP 800-53 Rev.
      5: SC-8
    references: >
      1. crypto-policies(7) 2. update-crypto-policies(8) 3. Red Hat Enterprise 8
      security hardening 4. https://www.redhat.com/en/blog/how-customize-crypto-
      policies-rhel-82 5. https://access.redhat.com/articles/3642912 6. NIST SP
      800-53 Rev. 5: SC-8
    impact: >
      
