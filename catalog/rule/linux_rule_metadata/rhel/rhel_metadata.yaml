  - rule_id: rhel.cis.4.nologin_is_not_listed_in_etc_shells
    title: "Ensure nologin is not listed in /etc/shells"
    severity: medium
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 8_v3.0.0"
    cis_version: "8_v3.0.0"
    cis_control: "4.5.3.1"
    cis_section: "4"
    profile_applicability: "Level 2"
    description: >
      /etc/shells is a text file which contains the full pathnames of valid login
      shells. This file is consulted by chsh and available to be queried by other
      programs. Be aware that there are programs which consult this file to find out
      if a user is a normal user; for example, FTP daemons traditionally disallow
      access to users with shells not included in this file.
    rationale: >
      A user can use chsh to change their configured shell. If a user has a shell
      configured that isn't in in /etc/shells, then the system assumes that they're
      somehow restricted. In the case of chsh it means that the user cannot change
      that value. Other programs might query that list and apply similar
      restrictions. By putting nologin in /etc/shells, any user that has nologin as
      its shell is considered a full, unrestricted user. This is not the expected
      behavior for nologin.
    audit_procedure: >
      Run the following command to verify that nologin is not listed in the
      /etc/shells file: # grep '/nologin\b' /etc/shells Nothing should be returned
    remediation: >
      Edit /etc/shells and remove any lines that include nologin References: 1.
      shells(5) 2. NIST SP 800-53 Rev. 5: CM-1, CM-2, CM-6, CM-7, IA-5
    references: >
      1. shells(5) 2. NIST SP 800-53 Rev. 5: CM-1, CM-2, CM-6, CM-7, IA-5
