  - rule_id: rhel.cis.5.sshd_disableforwarding_is_enabled
    title: "Ensure sshd DisableForwarding is enabled"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "5.1.10"
    cis_section: "5"
    profile_applicability: "Level 1 + Level 2"
    description: >
      The DisableForwarding parameter disables all forwarding features, including
      X11, ssh-agent(1), TCP and StreamLocal. This option overrides all other
      forwarding-related options and may simplify restricted configurations. •
      X11Forwarding provides the ability to tunnel X11 traffic through the
      connection to enable remote graphic connections. • ssh-agent is a program to
      hold private keys used for public key authentication. Through use of
      environment variables the agent can be located and automatically used for
      authentication when logging in to other machines using ssh. • SSH port
      forwarding is a mechanism in SSH for tunneling application ports from the
      client to the server, or servers to clients. It can be used for adding
      encryption to legacy applications, going through firewalls, and some system
      administrators and IT professionals use it for opening backdoors into the
      internal network from their home machines.
    rationale: >
      Disable X11 forwarding unless there is an operational requirement to use X11
      applications directly. There is a small risk that the remote X11 servers of
      users who are logged in via SSH with X11 forwarding could be compromised by
      other users on the X11 server. Note that even if X11 forwarding is disabled,
      users can always install their own forwarders. anyone with root privilege on
      the the intermediate server can make free use of ssh- agent to authenticate
      them to other servers Leaving port forwarding enabled can expose the
      organization to security risks and backdoors. SSH connections are protected
      with strong encryption. This makes their contents invisible to most deployed
      network monitoring and traffic filtering solutions. This invisibility carries
      considerable risk potential if it is used for malicious purposes such as data
      exfiltration. Cybercriminals or malware could exploit SSH to hide their
      unauthorized communications, or to exfiltrate stolen data from the target
      network. Impact: SSH tunnels are widely used in many corporate environments.
      In some environments the applications themselves may have very limited native
      support for security. By utilizing tunneling, compliance with SOX, HIPAA, PCI-
      DSS, and other standards can be achieved without having to modify the
      applications.
    audit_procedure: >
      Run the following command to verify DisableForwarding is set to yes: # sshd -T
      | grep -i disableforwarding disableforwarding yes
    remediation: >
      Edit the /etc/ssh/sshd_config file to set the DisableForwarding parameter to
      yes above any Include entry as follows: DisableForwarding yes Note: First
      occurrence of a option takes precedence. If Include locations are enabled,
      used, and order of precedence is understood in your environment, the entry may
      be created in a file in Include location. References: 1. sshd_config(5) 2.
      SSHD(8) 3. NIST SP 800-53 Rev. 5: CM-7
    references: >
      1. sshd_config(5) 2. SSHD(8) 3. NIST SP 800-53 Rev. 5: CM-7
    impact: >
      SSH tunnels are widely used in many corporate environments. In some
      environments the applications themselves may have very limited native support
      for security. By utilizing tunneling, compliance with SOX, HIPAA, PCI-DSS, and
      other standards can be achieved without having to modify the applications.
    compliance_mappings:
      cis:
        - "CIS_RHEL_9_v2_0_0_5_1_10"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_rhel_9_v2_0_0_5_1_10"
    metadata_source: generated
    generated_by: generate_tech_rules

