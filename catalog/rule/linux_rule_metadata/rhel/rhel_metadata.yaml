      r]+\h+)?maxsequence\h*=\h*(0|[4-9]|[1-9][0-9]+)\b' /etc/pam.d/system-auth
      /etc/pam.d/password-auth Nothing should be returned Note: • settings should be
      configured in only one location for clarity • Settings observe an order of
      precedence: o module arguments override the settings in the
