  - rule_id: rhel.cis.3.tcp_wrappers_is_installed
    title: "Ensure TCP Wrappers is installed"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: manual
    cis_benchmark: "CIS_RHEL 7_v2.1.1"
    cis_version: "7_v2.1.1"
    cis_control: "3.4.1"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      TCP Wrappers provides a simple access list and standardized logging method for
      services capable of supporting it. In the past, services that were called from
      inetd and xinetd supported the use of tcp wrappers. As inetd and xinetd have
      been falling in disuse, any service that can support tcp wrappers will have
      the libwrap.so library attached to it.
    rationale: >
      TCP Wrappers provide a good simple access list mechanism to services that may
      not have that support built in. It is recommended that all services that can
      support TCP Wrappers, use it.
