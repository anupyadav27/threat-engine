    profile_applicability: "Level 1"
    description: >
      The MaxStartups parameter specifies the maximum number of concurrent
      unauthenticated connections to the SSH daemon.
    rationale: >
      To protect a system from denial of service due to a large number of pending
      authentication connection attempts, use the rate limiting function of
      MaxStartups to protect availability of sshd logins and prevent overwhelming
      the daemon.
    audit_procedure: >
      Run the following command: # sshd -T -C user=root -C host='$(hostname)' -C
      addr='$(grep $(hostname) /etc/hosts | awk '{print $1}')' | grep -i maxstartups
      Verify that output MaxStartups is 10:30:60 or more restrictive: maxstartups
      10:30:60 Run the following command and verify the output: # grep -Pis
      '^\h*maxstartups\h+'?(((1[1-9]|[1-9][0-9][0-9]+):([0-9]+):([0-
      9]+))|(([0-9]+):(3[1-9]|[4-9][0-9]|[1-9][0-9][0-9]+):([0-9]+))|(([0-9]+):([0-
      9]+):(6[1-9]|[7-9][0-9]|[1-9][0-9][0-9]+)))\b' /etc/ssh/sshd_config
      /etc/ssh/sshd_config.d/*.conf Nothing should be returned. Note: If Include
      locations besides, or in addition to /etc/ssh/sshd_config.d/*.conf and/or
      Match set statements are used in your environment, those locations should be
      checked for the correct configuration as well.
    remediation: >
