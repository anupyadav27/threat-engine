  - rule_id: rhel.cis.4.nftables_default_deny_firewall_policy
    title: "Ensure nftables default deny firewall policy"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "4.3.3"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Base chain policy is the default verdict that will be applied to packets
      reaching the end of the chain.
    rationale: >
      There are two policies: accept (Default) and drop. If the policy is set to
      accept, the firewall will accept any packet that is not configured to be
      denied and the packet will continue traversing the network stack. It is easier
      to explicitly permit acceptable usage than to deny unacceptable usage. Note: •
      - IF - Firewalld is in use, this recommendation can be skipped. • Changing
      firewall settings while connected over the network can result in being locked
      out of the system. Impact: If configuring nftables over ssh, creating a base
      chain with a policy of drop will cause loss of connectivity. Ensure that a
      rule allowing ssh has been added to the base chain prior to setting the base
      chain's policy to drop
    audit_procedure: >
      - IF - NFTables utility is in use on your system: Run the following commands
      and verify that base chains contain a policy of DROP. # systemctl --quiet is-
      enabled nftables.service && nft list ruleset | grep 'hook input' | grep -v
      'policy drop' Nothing should be returned # systemctl --quiet is-enabled
      nftables.service && nft list ruleset | grep 'hook forward' | grep -v 'policy
      drop' Nothing should be returned
    remediation: >
      - IF - NFTables utility is in use on your system: Run the following command
      for the base chains with the input, forward, and output hooks to implement a
      default DROP policy: # nft chain <table family> <table name> <chain name> {
      policy drop \; } Example: # nft chain inet filter input { policy drop \; } #
      nft chain inet filter forward { policy drop \; } Default Value: accept
      References: 1. Manual Page nft 2. NIST SP 800-53 Rev. 5: CA-9 3.
      https://access.redhat.com/documentation/en-
      us/red_hat_enterprise_linux/9/pdf/configuring_firewalls_and_packet_filters/red_h
      at_enterprise_linux-9-configuring_firewalls_and_packet_filters-en-us.pdf
    references: >
      1. Manual Page nft 2. NIST SP 800-53 Rev. 5: CA-9 3.
      https://access.redhat.com/documentation/en-
      us/red_hat_enterprise_linux/9/pdf/configuring_firewalls_and_packet_filters/red_h
      at_enterprise_linux-9-configuring_firewalls_and_packet_filters-en-us.pdf
    impact: >
      If configuring nftables over ssh, creating a base chain with a policy of drop
      will cause loss of connectivity. Ensure that a rule allowing ssh has been
      added to the base chain prior to setting the base chain's policy to drop
