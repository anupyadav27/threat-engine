  - rule_id: rhel.cis.1.sticky_bit_is_set_on_all_world_writable
    title: "Ensure sticky bit is set on all world-writable directories"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: manual
    cis_benchmark: "CIS_RHEL 7_v2.1.1"
    cis_version: "7_v2.1.1"
    cis_control: "1.1.21"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Setting the sticky bit on world writable directories prevents users from
      deleting or renaming files in that directory that are not owned by them.
    rationale: >
      This feature prevents the ability to delete or rename files in world writable
      directories (such as /tmp ) that are owned by another user.
    audit_procedure: >
      Run the following command to verify no world writable directories exist
      without the sticky bit set: # df --local -P | awk if (NR!=1) print $6 | xargs
      -I '{}' find '{}' -xdev - type d \( -perm -0002 -a ! -perm -1000 \)
      2>/dev/null No output should be returned.
    remediation: >
      Run the following command to set the sticky bit on all world writable
      directories: # df --local -P | awk if (NR!=1) print $6 | xargs -I '{}' find
      '{}' -xdev - type d -perm -0002 2>/dev/null | xargs chmod a+t Critical
      Controls: 13 Data Protection Data Protection 52 | P a g e
