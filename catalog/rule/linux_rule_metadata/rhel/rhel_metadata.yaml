  - rule_id: rhel.cis.4.nftables_base_chains_exist
    title: "Ensure nftables base chains exist"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "4.3.1"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Chains are containers for rules. They exist in two kinds, base chains and
      regular chains. A base chain is an entry point for packets from the networking
      stack, a regular chain may be used as jump target and is used for better rule
      organization. Note: - IF - Firewalld is in use, this recommendation can be
      skipped.
    rationale: >
      If a base chain doesn't exist with a hook for input, forward, and delete,
      packets that would flow through those chains will not be touched by nftables.
      Impact: If configuring over ssh, creating a base chain with a policy of drop
      will cause loss of connectivity. Ensure that a rule allowing ssh has been
      added to the base chain prior to setting the base chain's policy to drop
    audit_procedure: >
      - IF - NFTables utility is in use on your system: Run the following command to
      verify that base chains exist for the INPUT filter hook: # nft list ruleset |
      grep 'hook input' Output should include: type filter hook input Run the
      following command to verify that base chains exist for the FORWARD filter
      hook: # nft list ruleset | grep 'hook forward' Output should include: type
      filter hook forward Run the following command to verify that base chains exist
      for the OUTPUT filter hook: # nft list ruleset | grep 'hook output' Output
      should include: type filter hook output Note: When using FirewallD the base
      chains are installed by default
    remediation: >
      - IF - NFTables utility is in use on your system: Run the following command to
      create the base chains: # nft create chain inet <table name> <base chain name>
      { type filter hook <(input|forward|output)> priority 0 \; } Example: # nft
      create chain inet filter input { type filter hook input priority 0 \; } # nft
      create chain inet filter forward { type filter hook forward priority 0 \; } #
      nft create chain inet filter output { type filter hook output priority 0 \; }
      Note: use the add command if the create command returns an error due to the
      chain already existing. References: 1. NIST SP 800-53 Rev. 5: CA-9 2.
      https://www.netfilter.org/projects/nftables/manpage.html 3.
      https://access.redhat.com/documentation/en-
      us/red_hat_enterprise_linux/9/pdf/configuring_firewalls_and_packet_filters/red_h
      at_enterprise_linux-9-configuring_firewalls_and_packet_filters-en-us.pdf
