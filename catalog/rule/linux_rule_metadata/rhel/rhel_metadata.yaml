  - rule_id: rhel.cis.4.password_number_of_changed_characters_is
    title: "Ensure password number of changed characters is configured"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 8_v3.0.0"
    cis_version: "8_v3.0.0"
    cis_control: "4.4.3.2.1"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      The pwquality difok option sets the number of characters in a password that
      must not be present in the old password.
    rationale: >
      Use of a complex password helps to increase the time and resources required to
      compromise the password. Password complexity, or strength, is a measure of the
      effectiveness of a password in resisting attempts at guessing and brute-force
      attacks. Password complexity is one factor of several that determines how long
      it takes to crack a password. The more complex the password, the greater the
      number of possible combinations that need to be tested before the password is
      compromised.
    audit_procedure: >
      Run the following command to verify that the difok option is set to 2 or more
      and follows local site policy: # grep -Psi --
      '^\h*difok\h*=\h*([2-9]|[1-9][0-9]+)\b' /etc/security/pwquality.conf
      /etc/security/pwquality.conf.d/*.conf Example output:
      /etc/security/pwquality.conf.d/50-pwdifok.conf:difok = 2 Verify returned
      value(s) are 2 or more and meet local site policy Run the following command to
      verify that difok is not set, is 2 or more, and conforms to local site policy:
      grep -Psi --
      '^\h*password\h+(requisite|required|sufficient)\h+pam_pwquality\.so\h+([^#\n\
      r]+\h+)?difok\h*=\h*([0-1])\b' /etc/pam.d/system-auth /etc/pam.d/password-
      auth Nothing should be returned Note: • settings should be configured in only
      one location for clarity • Settings observe an order of precedence: o module
      arguments override the settings in the /etc/security/pwquality.conf
      configuration file o settings in the /etc/security/pwquality.conf
      configuration file override settings in a .conf file in the
      /etc/security/pwquality.conf.d/ directory o settings in a .conf file in the
      /etc/security/pwquality.conf.d/ directory are read in canonical order, with
      last read file containing the setting taking precedence • It is recommended
      that settings be configured in a .conf file in the
      /etc/security/pwquality.conf.d/ directory for clarity, convenience, and
      durability.
    remediation: >
      Edit or add the following line in /etc/security/pwquality.conf to a value of 2
      or more and meets local site policy: difok = 2 Create or modify a file ending
      in .conf in the /etc/security/pwquality.conf.d/ directory or the file
      /etc/security/pwquality.conf and add or modify the following line to set difok
      to 2 or more. Ensure setting conforms to local site policy: Example: # sed -ri
      's/^\s*difok\s*=/# &/' /etc/security/pwquality.conf # printf '\n%s' 'difok =
      2' >> /etc/security/pwquality.conf.d/50-pwdifok.conf Run the following script
      to remove setting difok on the pam_pwquality.so module in the PAM files:
      #!/usr/bin/env bash { for l_pam_file in system-auth password-auth; do
      l_authselect_file='/etc/authselect/$(head -1 /etc/authselect/authselect.conf |
      grep 'custom/')/$l_pam_file' sed -ri
      's/(^\s*password\s+(requisite|required|sufficient)\s+pam_pwquality\.so.*)(\s+
      difok\s*=\s*\S+)(.*$)/\1\4/' '$l_authselect_file' done authselect apply-
      changes } Default Value: difok = 1 References: 1. NIST SP 800-53 Rev. 5: IA-5
