      *auid!=4294967295/) \ &&/ -F *auid>=${UID_MIN}/ \ &&/ -F *perm=x/ \ &&/ -F
      *path=\/usr\/bin\/chcon/ \ &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)'
      /etc/audit/rules.d/*.rules \ || printf 'ERROR: Variable 'UID_MIN' is unset.\n'
      } Verify the output matches: -a always,exit -F path=/usr/bin/chcon -F perm=x
      -F auid>=1000 -F auid!=unset -k perm_chng Running configuration Run the
      following command to check loaded rules: # { UID_MIN=$(awk
      '/^\s*UID_MIN/{print $2}' /etc/login.defs) [ -n '${UID_MIN}' ] && auditctl -l
      | awk '/^ *-a *always,exit/ \ &&(/ -F *auid!=unset/||/ -F *auid!=-1/||/ -F
