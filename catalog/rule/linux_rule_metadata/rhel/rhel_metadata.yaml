      want to correlate the events written to the audit trail with the records
      written to sudo's logfile to verify if unauthorized commands have been
      executed.
    audit_procedure: >
      64 Bit systems On disk configuration Run the following command to check the on
      disk rules: # awk '/^ *-a *always,exit/ \ &&/ -F *arch=b(32|64)/ \ &&(/ -F
