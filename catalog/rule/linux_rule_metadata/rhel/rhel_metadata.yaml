  - rule_id: rhel.cis.2.avahi_daemon_services_are_not_in_use
    title: "Ensure avahi daemon services are not in use"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "2.1.2"
    cis_section: "2"
    profile_applicability: "Level 1 + Level 2"
    description: >
      Avahi is a free zeroconf implementation, including a system for multicast
      DNS/DNS-SD service discovery. Avahi allows programs to publish and discover
      services and hosts running on a local network with no specific configuration.
      For example, a user can plug a computer into a network and Avahi automatically
      finds printers to print to, files to look at and people to talk to, as well as
      network services running on the machine.
    rationale: >
      Automatic discovery of network services is not normally required for system
      functionality. It is recommended to remove this package to reduce the
      potential attack surface. Impact: There may be packages that are dependent on
      the avahi package. If the avahi package is removed, these dependent packages
      will be removed as well. Before removing the avahi package, review any
      dependent packages to determine if they are required on the system. - IF - a
      dependent package is required: stop and mask the avahi-daemon.socket and
      avahi-daemon.service leaving the avahi package installed.
    audit_procedure: >
      Run the following command to verify the avahi package is not installed: # rpm
      -q avahi package avahi is not installed - OR - - IF - the avahi package is
      required as a dependency: Run the following command to verify avahi-
      daemon.socket and avahi- daemon.service are not enabled: # systemctl is-
      enabled avahi-daemon.socket avahi-daemon.service 2>/dev/null | grep 'enabled'
      Nothing should be returned Run the following command to verify avahi-
      daemon.socket and avahi- daemon.service are not active: # systemctl is-active
