    description: >
      Monitor changes to file permissions, attributes, ownership and group. The
      parameters in this section track changes for system calls that affect file
      permissions and attributes. The chmod , fchmod and fchmodat system calls
      affect the permissions associated with a file. The chown , fchown , fchownat
      and lchown system calls affect owner and group attributes on a file. The
      setxattr , lsetxattr , fsetxattr (set extended file attributes) and
      removexattr , lremovexattr , fremovexattr (remove extended file attributes)
      control extended file attributes. In all cases, an audit record will only be
      written for non-system user ids (auid >= 1000) and will ignore Daemon events
      (auid = 4294967295). All audit records will be tagged with the identifier
      'perm_mod.'
