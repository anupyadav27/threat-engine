      it takes to crack a password. The more complex the password, the greater the
      number of possible combinations that need to be tested before the password is
      compromised.
    audit_procedure: >
      Run the following command to verify that the maxsequence option is set to 3 or
      less, not 0, and follows local site policy: # grep -Psi --
      '^\h*maxsequence\h*=\h*[1-3]\b' /etc/security/pwquality.conf
      /etc/security/pwquality.conf.d/*.conf Example output:
      /etc/security/pwquality.conf.d/50-pwmaxsequence.conf:maxsequence = 3 Verify
      returned value(s) are 3 or less, not 0, and meet local site policy Run the
