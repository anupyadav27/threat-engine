      http://docs.fedoraproject.org/selinux-managing- confined-services-guide 3.
      SELinux Project web page and wiki: 1. http://www.selinuxproject.org 77 | P a g
      e 4. Chapters 43-45 of Red Hat Enterprise Linux 5: Deployment Guide (Frank
