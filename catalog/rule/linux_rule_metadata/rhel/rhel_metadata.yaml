  - rule_id: rhel.cis.3.tipc_kernel_module_is_not_available
    title: "Ensure tipc kernel module is not available"
    severity: medium
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "3.2.2"
    cis_section: "3"
    profile_applicability: "Level 2"
    description: >
      The Transparent Inter-Process Communication (TIPC) protocol is designed to
      provide communication between cluster nodes.
    rationale: >
      - IF - the protocol is not being used, it is recommended that kernel module
