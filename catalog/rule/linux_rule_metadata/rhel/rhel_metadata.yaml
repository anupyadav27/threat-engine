  - rule_id: rhel.cis.5.journald_is_configured_to_compress_large_log_files
    title: "Ensure journald is configured to compress large log files"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 8_v3.0.0"
    cis_version: "8_v3.0.0"
    cis_control: "5.1.2.3"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The journald system includes the capability of compressing overly large files
      to avoid filling up the system with logs or making the logs unmanageably
      large.
    rationale: >
      Uncompressed large files may unexpectedly fill a filesystem leading to
      resource unavailability. Compressing logs prior to write can prevent sudden,
      unexpected filesystem impacts.
    audit_procedure: >
      Review /etc/systemd/journald.conf and verify that large files will be
      compressed: # grep ^\s*Compress /etc/systemd/journald.conf Verify the output
      matches: Compress=yes
    remediation: >
      Edit the /etc/systemd/journald.conf file and add the following line:
      Compress=yes Restart the service: # systemctl restart systemd-journald.service
      Additional Information: The main configuration file /etc/systemd/journald.conf
      is read before any of the custom *.conf files. If there are custom configs
      present, they override the main configuration parameters. It is possible to
      change the default threshold of 512 bytes per object before compression is
      used.
