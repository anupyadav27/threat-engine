      the system is not configured to accept incoming logs. advanced format # grep
      -Psi -- '^\h*module\(load=\'?imtcp\'?\)' /etc/rsyslog.conf
      /etc/rsyslog.d/*.conf # grep -Psi -- '^\h*input\(type=\'?imtcp\'?\b'
      /etc/rsyslog.conf /etc/rsyslog.d/*.conf Nothing should be returned obsolete
      legacy format # grep -Psi -- '^\h*\$ModLoad\h+imtcp\b' /etc/rsyslog.conf
      /etc/rsyslog.d/*.conf # grep -Psi -- '^\h*\$InputTCPServerRun\b'
      /etc/rsyslog.conf /etc/rsyslog.d/*.conf Nothing should be returned
    remediation: >
