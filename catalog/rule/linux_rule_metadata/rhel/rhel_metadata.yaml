  - rule_id: rhel.cis.5.rsyslog_default_file_permissions_are_configured
    title: "Ensure rsyslog default file permissions are configured"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 8_v3.0.0"
    cis_version: "8_v3.0.0"
    cis_control: "5.1.1.4"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      RSyslog will create logfiles that do not already exist on the system. This
      setting controls what permissions will be applied to these newly created
      files.
    rationale: >
      It is important to ensure that log files have the correct permissions to
      ensure that sensitive data is archived and protected. Impact: The systems
      global umask could override, but only making the file permissions stricter,
      what is configured in RSyslog with the FileCreateMode directive. RSyslog also
      has its own $umask directive that can alter the intended file creation mode.
      In addition, consideration should be given to how FileCreateMode is used. Thus
      it is critical to ensure that the intended file creation mode is not
      overridden with less restrictive settings in /etc/rsyslog.conf,
      /etc/rsyslog.d/*conf files and that FileCreateMode is set before any file is
      created.
    audit_procedure: >
      Run the following command: # grep -Ps
      '^\h*\$FileCreateMode\h+0[0,2,4,6][0,2,4]0\b' /etc/rsyslog.conf
      /etc/rsyslog.d/*.conf Verify the output is includes 0640 or more restrictive:
      $FileCreateMode 0640
    remediation: >
      Edit either /etc/rsyslog.conf or a dedicated .conf file in /etc/rsyslog.d/ and
      set $FileCreateMode to 0640 or more restrictive: $FileCreateMode 0640 Restart
      the service: # systemctl restart rsyslog References: 1. See the
      rsyslog.conf(5) man page for more information.
    references: >
      1. See the rsyslog.conf(5) man page for more information.
    impact: >
      The systems global umask could override, but only making the file permissions
      stricter, what is configured in RSyslog with the FileCreateMode directive.
      RSyslog also has its own $umask directive that can alter the intended file
      creation mode. In addition, consideration should be given to how
      FileCreateMode is used. Thus it is critical to ensure that the intended file
      creation mode is not overridden with less restrictive settings in
      /etc/rsyslog.conf, /etc/rsyslog.d/*conf files and that FileCreateMode is set
      before any file is created.
    compliance_mappings:
      cis:
        - "CIS_RHEL_8_v3_0_0_5_1_1_4"
      nist_800_53: []
      soc2: []
      pci_dss: []
