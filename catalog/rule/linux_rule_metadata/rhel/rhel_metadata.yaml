  - rule_id: rhel.cis.4.events_that_modify_user_group_information_are
    title: "Ensure events that modify user/group information are collected"
    severity: medium
    category: linux
    tech_type: rhel
    automation_type: manual
    cis_benchmark: "CIS_RHEL 7_v2.1.1"
    cis_version: "7_v2.1.1"
