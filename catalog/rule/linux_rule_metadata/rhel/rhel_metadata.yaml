  - rule_id: rhel.cis.4.sshd_macs_are_configured
    title: "Ensure sshd MACs are configured"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 8_v3.0.0"
    cis_version: "8_v3.0.0"
    cis_control: "4.2.14"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      This variable limits the types of MAC algorithms that SSH can use during
      communication. Notes: • Some organizations may have stricter requirements for
      approved MACs. • Ensure that MACs used are in compliance with site policy. •
      The only 'strong' MACs currently FIPS 140-2 approved are: o HMAC-SHA1 o HMAC-
      SHA2-256 o HMAC-SHA2-384 o HMAC-SHA2-512
    rationale: >
      MD5 and 96-bit MAC algorithms are considered weak and have been shown to
      increase exploitability in SSH downgrade attacks. Weak algorithms continue to
      have a great deal of attention as a weak spot that can be exploited with
      expanded computing power. An attacker that breaks the algorithm could take
      advantage of a MiTM position to decrypt the SSH tunnel and capture credentials
      and information.
    audit_procedure: >
      Run the following command: # sshd -T -C user=root -C host='$(hostname)' -C
      addr='$(grep $(hostname) /etc/hosts | awk '{print $1}')' | grep -i 'MACs'
      Verify that output does not contain any of the listed weak MAC algorithms:
      hmac-md5 hmac-md5-96 hmac-ripemd160 hmac-sha1-96 umac-64@openssh.com hmac-
      md5-etm@openssh.com hmac-md5-96-etm@openssh.com hmac-ripemd160-etm@openssh.com
      hmac-sha1-96-etm@openssh.com umac-64-etm@openssh.com
    remediation: >
      Edit the /etc/ssh/sshd_config file and add/modify the MACs line to contain a
      comma separated list of the site unapproved (weak) MACs preceded with a -
      above any Include entries: Example: MACs -hmac-md5,hmac-md5-96,hmac-
      ripemd160,hmac-sha1-96,umac- 64@openssh.com,hmac-md5-etm@openssh.com,hmac-
      md5-96-etm@openssh.com,hmac- ripemd160-etm@openssh.com,hmac-
      sha1-96-etm@openssh.com,umac-64- etm@openssh.com Note: • First occurrence of
      an option takes precedence. If Include locations are enabled, used, and order
      of precedence is understood in your environment, the entry may be created in a
      file in Include location. • The default is handled system-wide by crypto-
      policies(7). Information about defaults, how to modify the defaults and how to
      customize existing policies with sub-policies are present in manual page
      update-crypto-policies(8) Default Value: MACs
      umac-64-etm@openssh.com,umac-128-etm@openssh.com,hmac-sha2-256-
      etm@openssh.com,hmac-sha2-512-etm@openssh.com,hmac-sha1-
      etm@openssh.com,umac-64@openssh.com,umac-128@openssh.com,hmac-sha2- 256,hmac-
      sha2-512,hmac-sha1 References: 1. More information on SSH downgrade attacks
      can be found here: http://www.mitls.org/pages/attacks/SLOTH 2. SSHD_CONFIG(5)
      3. NIST SP 800-53 Rev. 5: CM-1, CM-2, CM-6, CM-7, IA-5
    references: >
      1. More information on SSH downgrade attacks can be found here:
      http://www.mitls.org/pages/attacks/SLOTH 2. SSHD_CONFIG(5) 3. NIST SP 800-53
      Rev. 5: CM-1, CM-2, CM-6, CM-7, IA-5
    impact: >
      
