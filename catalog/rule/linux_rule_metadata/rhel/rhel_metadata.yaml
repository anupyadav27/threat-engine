  - rule_id: rhel.cis.6.audit_system_file_permissions
    title: "Audit system file permissions"
    severity: medium
    category: linux
    tech_type: rhel
    automation_type: manual
    cis_benchmark: "CIS_RHEL 8_v3.0.0"
    cis_version: "8_v3.0.0"
    cis_control: "6.1.14"
    cis_section: "6"
    profile_applicability: "Level 2"
    description: >
      The RPM Package Manager has a number of useful options. One of these, the -V
      for RPM option, can be used to verify that system packages are correctly
      installed. The -V option can be used to verify a particular package or to
      verify all system packages. If no output is returned, the package is installed
      correctly. The following table describes the meaning of output from the verify
      option: Code Meaning S File size differs. M File mode differs (includes
      permissions and file type). 5 digest (formerly MD5 sum) differs. D Device file
      major/minor number mismatch. L readLink(2) path mismatch. U User ownership
      differs. G Group ownership differs. T The file time (mtime) differs. P
      Capabilities differ. The rpm -qf command can be used to determine which
      package a particular file belongs to. For example, the following commands
      determines which package the /bin/bash file belongs to: # rpm -qf /bin/bash
      bash-4.4.19-2.fc28.x86_64 To verify the settings for the package that controls
      the /bin/bash file, run the following: # rpm -V bash-4.4.19-2.fc28.x86_64
      .M....... /bin/bash # rpm --verify bash ??5?????? c /etc/bash.bashrc Note that
      you can feed the output of the rpm -qf command to the rpm -V command: # rpm -V
      `rpm -qf /etc/passwd` .M...... c /etc/passwd S.5....T c /etc/printcap The rpm
      -qi command can be used to display package information, including name,
      version, and description. Following example displays information for bash
      package: # rpm -qi bash Name : bash Version : 4.4.19 Release : 2.fc28
      Architecture: x86_64 Install Date: Tue 15 Aug 2023 10:27:28 AM EDT Group :
      Unspecified Size : 6910653 License : GPLv3+ Signature : RSA/SHA256, Thu 15 Mar
      2018 10:10:10 AM EDT, Key ID e08e7e629db62fb1 Source RPM :
      bash-4.4.19-2.fc28.src.rpm Build Date : Thu 15 Mar 2018 10:01:10 AM EDT Build
      Host : buildhw-07.phx2.fedoraproject.org Relocations : (not relocatable)
      Packager : Fedora Project Vendor : Fedora Project URL :
      https://www.gnu.org/software/bash Bug URL :
      https://bugz.fedoraproject.org/bash Summary : The GNU Bourne Again shell
      Description : The GNU Bourne Again shell (Bash) is a shell or command language
      interpreter that is compatible with the Bourne shell (sh). Bash incorporates
      useful features from the Korn shell (ksh) and the C shell (csh). Most sh
      scripts can be run by bash without modification.
    rationale: >
      It is important to confirm that packaged system files and directories are
      maintained with the permissions they were intended to have from the OS vendor.
    audit_procedure: >
      Run the following command to review all installed packages. Note that this may
      be very time consuming and may be best scheduled via the cron utility. It is
      recommended that the output of this command be redirected to a file that can
      be reviewed later. # rpm -Va --nomtime --nosize --nomd5 --nolinkto --noconfig
      --noghost > <filename>
    remediation: >
      Correct any discrepancies found and rerun the audit until output is clean or
      risk is mitigated or accepted. References: 1.
      https://docs.fedoraproject.org/en-US/quick-docs/package-management/ 2. RPM(8)
      3. NIST SP 800-53 Rev. 5: AC-3, CM-1, CM-2, CM-6, CM-7, IA-5, MP-2 Additional
      Information: Since packages and important files may change with new updates
      and releases, it is recommended to verify everything, not just a finite list
      of files. This can be a time consuming task and results may depend on site
      policy therefore it is not a scorable benchmark item, but is provided for
      those interested in additional security measures. Some of the recommendations
      of this benchmark alter the state of files audited by this recommendation. The
      audit command will alert for all changes to a file's permissions even if the
      new state is more secure than the default.
    references: >
