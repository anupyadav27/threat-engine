  - rule_id: rhel.cis.6.rsyslog_is_configured_to_send_logs_to_a_remote
    title: "Ensure rsyslog is configured to send logs to a remote log host"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: manual
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "6.2.3.6"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      rsyslog supports the ability to send log events it gathers to a remote log
      host or to receive messages from remote hosts, thus enabling centralized log
      management.
    rationale: >
      Storing log data on a remote host protects log integrity from local attacks.
      If an attacker gains root access on the local system, they could tamper with
      or remove log data that is stored on the local system. Note: This
      recommendation only applies if rsyslog is the chosen method for client side
      logging. Do not apply this recommendation if systemd-journald is used.
    audit_procedure: >
      Review the /etc/rsyslog.conf and /etc/rsyslog.d/*.conf files and verify that
      logs are sent to a central host: Note: The basic format is intended for users
      that configured their file use @loghost.example.com The advanced format is a
      more modern format that will audit formatting similar to that found in the
      remediation. basic format # grep '^*.*[^I][^I]*@' /etc/rsyslog.conf
      /etc/rsyslog.d/*.conf Output should include @@<FQDN or IP of remote loghost>:
      Example: *.* @@loghost.example.com advanced format # grep -Psi --
      '^\s*([^#]+\s+)?action\(([^#]+\s+)?\btarget=\'?[^#']+\'?\b' /etc/rsyslog.conf
      /etc/rsyslog.d/*.conf Output should include target=<FQDN or IP of remote
      loghost>: Example: *.* action(type='omfwd' target='loghost.example.com'
      port='514' protocol='tcp'
    remediation: >
      Edit the /etc/rsyslog.conf and /etc/rsyslog.d/*.conf files and add the
      following line (where loghost.example.com is the name of your central log
      host). The target directive may either be a fully qualified domain name or an
      IP address. Example: *.* action(type='omfwd' target='loghost.example.com'
      port='514' protocol='tcp' action.resumeRetryCount='100'
      queue.type='LinkedList' queue.size='1000') Run the following command to reload
      rsyslog.service: # systemctl reload-or-restart rsyslog.service References: 1.
      See the rsyslog.conf(5) man page for more information. 2. NIST SP 800-53 Rev.
      5: AU-6 3. https://www.rsyslog.com/doc/ Additional Information: In addition,
      see the rsyslog documentation for implementation details of TLS.
    references: >
      1. See the rsyslog.conf(5) man page for more information. 2. NIST SP 800-53
      Rev. 5: AU-6 3. https://www.rsyslog.com/doc/ Additional Information: In
      addition, see the rsyslog documentation for implementation details of TLS.
    impact: >
      
