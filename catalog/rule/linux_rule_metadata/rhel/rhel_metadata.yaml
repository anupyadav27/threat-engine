  - rule_id: rhel.cis.4.system_accounts_are_secured
    title: "Ensure system accounts are secured"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 8_v3.0.0"
    cis_version: "8_v3.0.0"
    cis_control: "4.5.2.3"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      There are a number of accounts provided with most distributions that are used
      to manage applications and are not intended to provide an interactive shell.
      Furthermore, a user may add special accounts that are not intended to provide
      an interactive shell.
    rationale: >
      It is important to make sure that accounts that are not being used by regular
      users are prevented from being used to provide an interactive shell. By
      default, most distributions set the password field for these accounts to an
      invalid string, but it is also recommended that the shell field in the
      password file be set to the nologin shell. This prevents the account from
      potentially being used to run any commands.
    audit_procedure: >
      System accounts Check critical system accounts for nologin Run the following
      command: # awk -F: '($1!~/^(root|halt|sync|shutdown|nfsnobody)$/ &&
      ($3<''$(awk '/^\s*UID_MIN/{print $2}' /etc/login.defs)'' || $3 == 65534) &&
      $7!~/^(\/usr)?\/sbin\/nologin$/) { print $1 }' /etc/passwd Verify no results
      are returned. Disabled accounts Ensure all accounts that configured the shell
      as nologin also have their passwords disabled. Run the following command: #
      awk -F: '/nologin/ {print $1}' /etc/passwd | xargs -I '{}' passwd -S '{}' |
      awk '($2!='L' && $2!='LK') {print $1}' Verify no results are returned.
    remediation: >
      System accounts Set the shell for any accounts returned by the audit to
      nologin: # usermod -s $(command -v nologin) <user> Disabled accounts Lock any
      non root accounts returned by the audit: # usermod -L <user> Large scale
      changes The following command will set all system accounts to nologin: # awk
      -F: '($1!~/^(root|halt|sync|shutdown|nfsnobody)$/ && ($3<''$(awk
      '/^\s*UID_MIN/{print $2}' /etc/login.defs)'' || $3 == 65534)) { print $1 }'
      /etc/passwd | while read user; do usermod -s $(command -v nologin) $user
      >/dev/null; done The following command will automatically lock all accounts
      that have their shell set to nologin: # awk -F: '/nologin/ {print $1}'
      /etc/passwd | while read user; do usermod -L $user; done References: 1. NIST
      SP 800-53 Rev. 5: AC-2(5), AC-3, AC-11, MP-2 Additional Information: The root,
      sync, shutdown, and halt users are exempted from requiring a non-login shell.
    references: >
      1. NIST SP 800-53 Rev. 5: AC-2(5), AC-3, AC-11, MP-2 Additional Information:
      The root, sync, shutdown, and halt users are exempted from requiring a non-
      login shell.
