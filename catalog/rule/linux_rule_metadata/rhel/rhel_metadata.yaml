      -F'/' '{split($(NF-1),a,'.');print a[1]}').d' #set directory of key file to be
      locked # Look for automount-open to determine profile in use, needed for
      remaining tests l_kfd2='/etc/dconf/db/$(grep -Psril '^\h*automount-open\b'
      /etc/dconf/db/*/ | awk -F'/' '{split($(NF-1),a,'.');print a[1]}').d' #set
      directory of key file to be locked if [ -d '$l_kfd' ]; then # If key file
