  - rule_id: rhel.cis.5.events_that_modify_the_system_s_network
    title: "Ensure events that modify the system's network environment are collected"
    severity: medium
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 8_v3.0.0"
    cis_version: "8_v3.0.0"
    cis_control: "5.2.3.5"
    cis_section: "5"
    profile_applicability: "Level 2"
    description: >
      Record changes to network environment files or system calls. The below
      parameters monitors the following system calls, and write an audit event on
      system call exit: • sethostname - set the systems host name • setdomainname -
      set the systems domain name The files being monitored are: • /etc/issue and
      /etc/issue.net - messages displayed pre-login • /etc/hosts - file containing
      host names and associated IP addresses • /etc/sysconfig/network - additional
      information that is valid to all network interfaces • /etc/sysconfig/network-
      scripts/ - directory containing network interface scripts and configurations
      files
    rationale: >
      Monitoring sethostname and setdomainname will identify potential unauthorized
      changes to host and domain name of a system. The changing of these names could
      potentially break security parameters that are set based on those names. The
      /etc/hosts file is monitored for changes that can indicate an unauthorized
      intruder is trying to change machine associations with IP addresses and trick
      users and processes into connecting to unintended machines. Monitoring
      /etc/issue and /etc/issue.net is important, as intruders could put
      disinformation into those files and trick users into providing information to
      the intruder. Monitoring /etc/sysconfig/network is important as it can show if
      network interfaces or scripts are being modified in a way that can lead to the
      machine becoming unavailable or compromised. All audit records should have a
      relevant tag associated with them.
