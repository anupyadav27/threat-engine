  - rule_id: rhel.cis.1.no_unconfined_daemons_exist
    title: "Ensure no unconfined daemons exist"
    severity: medium
    category: linux
    tech_type: rhel
    automation_type: manual
    cis_benchmark: "CIS_RHEL 7_v2.1.1"
    cis_version: "7_v2.1.1"
    cis_control: "1.6.1.6"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      Daemons that are not defined in SELinux policy will inherit the security
      context of their parent process.
    rationale: >
      Since daemons are launched and descend from the init process, they will
      inherit the security context label initrc_t . This could cause the unintended
      consequence of giving the process more permission than it requires.
    audit_procedure: >
      Run the following command and verify not output is produced: # ps -eZ | egrep
      'initrc' | egrep -vw 'tr|ps|egrep|bash|awk' | tr ':' ' ' | awk '{ print $NF }'
    remediation: >
      Investigate any unconfined daemons found during the audit action. They may
      need to have an existing security context assigned to them or a policy built
      for them. Notes: Occasionally certain daemons such as backup or centralized
      management software may require running unconfined. Any such software should
      be carefully analyzed and documented before such an exception is made.
      Critical Controls: 14.4 Protect Information With Access Control Lists All
      information stored on systems shall be protected with file system, network
      share, claims, application, or database specific access control lists. These
      controls will enforce the principal that only authorized individuals should
      have access to the information based on their need to access the information
      as a part of their responsibilities. 84 | P a g e
