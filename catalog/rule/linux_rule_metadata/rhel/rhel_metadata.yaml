      *euid!=uid/||/ -C *uid!=euid/) \ &&/ -S *execve/ \ &&(/ key= *[!-~]* *$/||/ -k
      *[!-~]* *$/)' /etc/audit/rules.d/*.rules Verify the output matches: -a
      always,exit -F arch=b64 -C euid!=uid -F auid!=unset -S execve -k
      user_emulation -a always,exit -F arch=b32 -C euid!=uid -F auid!=unset -S
      execve -k user_emulation Running configuration Run the following command to
