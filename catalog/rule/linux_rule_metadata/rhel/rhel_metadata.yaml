  - rule_id: rhel.cis.5.running_and_on_disk_configuration_is_the_same
    title: "Ensure the running and on disk configuration is the same"
    severity: medium
    category: linux
    tech_type: rhel
    automation_type: manual
    cis_benchmark: "CIS_RHEL 8_v3.0.0"
    cis_version: "8_v3.0.0"
    cis_control: "5.2.3.21"
    cis_section: "5"
    profile_applicability: "Level 2"
    description: >
      The Audit system have both on disk and running configuration. It is possible
      for these configuration settings to differ. Note: Due to the limitations of
      augenrules and auditctl, it is not absolutely guaranteed that loading the rule
      sets via augenrules --load will result in all rules being loaded or even that
      the user will be informed if there was a problem loading the rules.
    rationale: >
      Configuration differences between what is currently running and what is on
      disk could cause unexpected problems or may give a false impression of
      compliance requirements.
    audit_procedure: >
      Merged rule sets Ensure that all rules in /etc/audit/rules.d have been merged
      into /etc/audit/audit.rules: # augenrules --check /usr/sbin/augenrules: No
      change Should there be any drift, run augenrules --load to merge and load all
      rules.
    remediation: >
      If the rules are not aligned across all three () areas, run the following
      command to merge and load all rules: # augenrules --load Check if reboot is
      required. if [[ $(auditctl -s | grep 'enabled') =~ '2' ]]; then echo 'Reboot
      required to load rules'; fi Additional Information: Potential reboot required
      If the auditing configuration is locked (-e 2), then augenrules will not warn
      in any way that rules could not be loaded into the running configuration. A
      system reboot will be required to load the rules into the running
      configuration.
