  - rule_id: rhel.cis.1.address_space_layout_randomization_aslr_is_enabled
    title: "Ensure address space layout randomization (ASLR) is enabled"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 8_v3.0.0"
    cis_version: "8_v3.0.0"
    cis_control: "1.4.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Address space layout randomization (ASLR) is an exploit mitigation technique
      which randomly arranges the address space of key data areas of a process.
    rationale: >
      Randomly placing virtual memory regions will make it difficult to write memory
      page exploits as the memory placement will be consistently shifting.
    audit_procedure: >
      Run the following script to verify the following kernel parameter is set in
      the running configuration and correctly loaded from a kernel parameter
      configuration file: • kernel.randomize_va_space is set to 2 Note: kernel
      parameters are loaded by file and parameter order precedence. The following
      script observes this precedence as part of the auditing procedure. The
      parameters being checked may be set correctly in a file. If that file is
      superseded, the parameter is overridden by an incorrect setting later in that
      file, or in a canonically later file, that 'correct' setting will be ignored
      both by the script and by the system during a normal kernel parameter load
      sequence. #!/usr/bin/env bash { l_output='' l_output2=''
      a_parlist=('kernel.randomize_va_space=2') l_ufwscf='$([ -f /etc/default/ufw ]
      && awk -F= '/^\s*IPT_SYSCTL=/ {print $2}' /etc/default/ufw)'
      kernel_parameter_chk() { l_krp='$(sysctl '$l_kpname' | awk -F= '{print $2}' |
      xargs)' # Check running configuration if [ '$l_krp' = '$l_kpvalue' ]; then
      l_output='$l_output\n - \'$l_kpname\' is correctly set to \'$l_krp\' in the
      running configuration' else l_output2='$l_output2\n - \'$l_kpname\' is
      incorrectly set to \'$l_krp\' in the running configuration and should have a
      value of: \'$l_kpvalue\'' fi unset A_out; declare -A A_out # Check durable
      setting (files) while read -r l_out; do if [ -n '$l_out' ]; then if [[ $l_out
      =~ ^\s*# ]]; then l_file='${l_out//# /}' else l_kpar='$(awk -F= '{print $1}'
      <<< '$l_out' | xargs)' [ '$l_kpar' = '$l_kpname' ] &&
      A_out+=(['$l_kpar']='$l_file') fi fi done < <(/usr/lib/systemd/systemd-sysctl
      --cat-config | grep -Po '^\h*([^#\n\r]+|#\h*\/[^#\n\r\h]+\.conf\b)') if [ -n
      '$l_ufwscf' ]; then # Account for systems with UFW (Not covered by systemd-
      sysctl - -cat-config) l_kpar='$(grep -Po '^\h*$l_kpname\b' '$l_ufwscf' |
      xargs)' l_kpar='${l_kpar//\//.}' [ '$l_kpar' = '$l_kpname' ] &&
      A_out+=(['$l_kpar']='$l_ufwscf') fi if (( ${#A_out[@]} > 0 )); then # Assess
      output from files and generate output while IFS='=' read -r l_fkpname
      l_fkpvalue; do l_fkpname='${l_fkpname// /}'; l_fkpvalue='${l_fkpvalue// /}' if
      [ '$l_fkpvalue' = '$l_kpvalue' ]; then l_output='$l_output\n - \'$l_kpname\'
      is correctly set to \'$l_krp\' in \'$(printf '%s' '${A_out[@]}')\'\n' else
      l_output2='$l_output2\n - \'$l_kpname\' is incorrectly set to \'$l_fkpvalue\'
      in \'$(printf '%s' '${A_out[@]}')\' and should have a value of:
      \'$l_kpvalue\'\n' fi done < <(grep -Po -- '^\h*$l_kpname\h*=\h*\H+'
      '${A_out[@]}') else l_output2='$l_output2\n - \'$l_kpname\' is not set in an
      included file\n ** Note: \'$l_kpname\' May be set in a file that's ignored by
      load procedure **\n' fi } while IFS='=' read -r l_kpname l_kpvalue; do #
      Assess and check parameters l_kpname='${l_kpname// /}';
      l_kpvalue='${l_kpvalue// /}' if ! grep -Pqs '^\h*0\b'
      /sys/module/ipv6/parameters/disable && grep -q '^net.ipv6.' <<< '$l_kpname';
      then l_output='$l_output\n - IPv6 is disabled on the system, \'$l_kpname\' is
      not applicable' else kernel_parameter_chk fi done < <(printf '%s\n'
      '${a_parlist[@]}') if [ -z '$l_output2' ]; then # Provide output from checks
      echo -e '\n- Audit Result:\n ** PASS **\n$l_output\n' else echo -e '\n- Audit
      Result:\n ** FAIL **\n - Reason(s) for audit failure:\n$l_output2\n' [ -n
      '$l_output' ] && echo -e '\n- Correctly set:\n$l_output\n' fi }
    remediation: >
      Set the following parameter in /etc/sysctl.conf or a file in /etc/sysctl.d/
      ending in .conf: • kernel.randomize_va_space = 2 Example: # printf '
      kernel.randomize_va_space = 2 ' >> /etc/sysctl.d/60-kernel_sysctl.conf Run the
      following command to set the active kernel parameter: # sysctl -w
      kernel.randomize_va_space=2 Note: If these settings appear in a canonically
      later file, or later in the same file, these settings will be overwritten
      Default Value: kernel.randomize_va_space = 2 References: 1. CCI-000366: The
      organization implements the security configuration settings 2. NIST SP 800-53
      Rev. 5: CM-6 3. NIST SP 800-53A :: CM-6.1 (iv)
    references: >
      1. CCI-000366: The organization implements the security configuration settings
      2. NIST SP 800-53 Rev. 5: CM-6 3. NIST SP 800-53A :: CM-6.1 (iv)
