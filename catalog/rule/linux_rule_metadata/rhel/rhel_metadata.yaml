  - rule_id: rhel.cis.4.permissions_on_ssh_private_host_key_files_are
    title: "Ensure permissions on SSH private host key files are configured"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 8_v3.0.0"
    cis_version: "8_v3.0.0"
    cis_control: "4.2.2"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      An SSH private key is one of two files used in SSH public key authentication.
      In this authentication method, the possession of the private key is proof of
      identity. Only a private key that corresponds to a public key will be able to
      authenticate successfully. The private keys need to be stored and handled
      carefully, and no copies of the private key should be distributed.
    rationale: >
      If an unauthorized user obtains the private SSH host key file, the host could
      be impersonated
    audit_procedure: >
      Run the following script to verify SSH private host key files are owned by the
      root user and either: • owned by the group root and mode 0600 or more
      restrictive - OR - • owned by the group designated to own openSSH private keys
      and mode 0640 or more restrictive #!/usr/bin/env bash { l_output=''
      l_output2='' l_skgn='$(grep -Po -- '^(ssh_keys|_?ssh)\b' /etc/group)' # Group
      designated to own openSSH keys l_skgid='$(awk -F: '($1 == '''$l_skgn'''){print
      $3}' /etc/group)' # Get gid of group [ -n '$l_skgid' ] &&
      l_agroup='(root|$l_skgn)' || l_agroup='root' unset a_skarr && a_skarr=() #
      Clear and initialize array if [ -d /etc/ssh ]; then while IFS= read -r -d
      $'\0' l_file; do # Loop to populate array if grep -Pq
      ':\h+OpenSSH\h+private\h+key\b' <<< '$(file '$l_file')'; then
      a_skarr+=('$(stat -Lc '%n^%#a^%U^%G^%g' '$l_file')') fi done < <(find -L
      /etc/ssh -xdev -type f -print0) while IFS='^' read -r l_file l_mode l_owner
      l_group l_gid; do l_out2='' [ '$l_gid' = '$l_skgid' ] && l_pmask='0137' ||
      l_pmask='0177' l_maxperm='$( printf '%o' $(( 0777 & ~$l_pmask )) )' if [ $((
      $l_mode & $l_pmask )) -gt 0 ]; then l_out2='$l_out2\n - Mode: \'$l_mode\'
      should be mode: \'$l_maxperm\' or more restrictive' fi if [ '$l_owner' !=
      'root' ]; then l_out2='$l_out2\n - Owned by: \'$l_owner\' should be owned by
      \'root\'' fi if [[ ! '$l_group' =~ $l_agroup ]]; then l_out2='$l_out2\n -
      Owned by group \'$l_group\' should be group owned by: \'${l_agroup//|/ or }\''
      fi if [ -n '$l_out2' ]; then l_output2='$l_output2\n - File:
      \'$l_file\'$l_out2' else l_output='$l_output\n - File: \'$l_file\'\n -
      Correct: mode ($l_mode), owner ($l_owner), and group owner ($l_group)
      configured' fi done <<< '$(printf '%s\n' '${a_skarr[@]}')' else l_output=' -
      openSSH keys not found on the system' fi unset a_skarr if [ -z '$l_output2' ];
      then echo -e '\n- Audit Result:\n *** PASS ***\n- * Correctly set *
      :\n$l_output\n' else echo -e '\n- Audit Result:\n ** FAIL **\n - * Reasons for
      audit failure * :\n$l_output2\n' [ -n '$l_output' ] && echo -e ' - * Correctly
      set * :\n$l_output\n' fi }
    remediation: >
      Run the following script to set mode, ownership, and group on the private SSH
      host key files: #!/usr/bin/env bash { l_output='' l_output2='' l_skgn='$(grep
      -Po -- '^(ssh_keys|_?ssh)\b' /etc/group)' # Group designated to own openSSH
      keys l_skgid='$(awk -F: '($1 == '''$l_skgn'''){print $3}' /etc/group)' # Get
      gid of group if [ -n '$l_skgid' ]; then l_agroup='(root|$l_skgn)' &&
      l_sgroup='$l_skgn' && l_mfix='u-x,g-wx,o-rwx' else l_agroup='root' &&
      l_sgroup='root' && l_mfix='u-x,go-rwx' fi unset a_skarr && a_skarr=() # Clear
      and initialize array if [ -d /etc/ssh ]; then while IFS= read -r -d $'\0'
      l_file; do # Loop to populate array if grep -Pq
      ':\h+OpenSSH\h+private\h+key\b' <<< '$(file '$l_file')'; then
      a_skarr+=('$(stat -Lc '%n^%#a^%U^%G^%g' '$l_file')') fi done < <(find -L
      /etc/ssh -xdev -type f -print0) while IFS='^' read -r l_file l_mode l_owner
      l_group l_gid; do l_out2='' [ '$l_gid' = '$l_skgid' ] && l_pmask='0137' ||
      l_pmask='0177' l_maxperm='$( printf '%o' $(( 0777 & ~$l_pmask )) )' if [ $((
      $l_mode & $l_pmask )) -gt 0 ]; then l_out2='$l_out2\n - Mode: \'$l_mode\'
      should be mode: \'$l_maxperm\' or more restrictive\n - Revoking excess
      permissions' chmod '$l_mfix' '$l_file' fi if [ '$l_owner' != 'root' ]; then
