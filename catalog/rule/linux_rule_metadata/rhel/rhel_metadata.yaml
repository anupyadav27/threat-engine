      Restricting USB access on the system will decrease the physical attack surface
      for a device and diminish the possible vectors to introduce malware. Impact:
      Disabling the usb-storage module will disable any usage of USB storage
      devices. If requirements and local site policy allow the use of such devices,
      other solutions should be configured accordingly instead. One example of a
      commonly used solution is USBGuard.
    audit_procedure: >
      Run the following script to verify: - IF - the usb-storage kernel module is
      available in ANY installed kernel, verify: • An entry including /bin/true or
      /bin/false exists in a file within the /etc/modprobe.d/ directory • The module
      is deny listed in a file within the /etc/modprobe.d/ directory • The module is
      not loaded in the running kernel - IF - the usb-storage kernel module is not
      available on the system, or pre-compiled into the kernel, no additional
