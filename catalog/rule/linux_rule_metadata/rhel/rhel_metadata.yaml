  - rule_id: rhel.cis.4.firewalld_drops_unnecessary_services_and_ports
    title: "Ensure firewalld drops unnecessary services and ports"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: manual
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "4.2.1"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Services and ports can be accepted or explicitly rejected or dropped by a
      zone. For every zone, you can set a default behavior that handles incoming
      traffic that is not further specified. Such behavior is defined by setting the
      target of the zone. There are three options - default, ACCEPT, REJECT, and
      DROP. • ACCEPT - you accept all incoming packets except those disabled by a
      specific rule. • REJECT - you disable all incoming packets except those that
      you have allowed in specific rules and the source machine is informed about
      the rejection. • DROP - you disable all incoming packets except those that you
      have allowed in specific rules and no information sent to the source machine.
      Note: • - IF - NFTables is being used, this recommendation can be skipped. •
      Allow port 22(ssh) needs to be updated to only allow systems requiring ssh
      connectivity to connect, as per site policy.
    rationale: >
      To reduce the attack surface of a system, all services and ports should be
      blocked unless required
    audit_procedure: >
      Run the following command and review output to ensure that listed services and
      ports follow site policy. # systemctl is-enabled firewalld.service | grep -q
      'enabled' && firewall-cmd --list-all --zone='$(firewall-cmd --list-all | awk
      '/\(active\)/ { print $1 }')' | grep -P -- '^\h*(services:|ports:)'
    remediation: >
      If Firewalld is in use on the system: Run the following command to remove an
      unnecessary service: # firewall-cmd --remove-service=<service> Example: #
      firewall-cmd --remove-service=cockpit Run the following command to remove an
      unnecessary port: # firewall-cmd --remove-port=<port-number>/<port-type>
      Example: # firewall-cmd --remove-port=25/tcp Run the following command to make
      new settings persistent: # firewall-cmd --runtime-to-permanent References: 1.
      firewalld.service(5) 2. NIST SP 800-53 Rev. 5: CA-9 3.
      https://access.redhat.com/documentation/en-
      us/red_hat_enterprise_linux/9/pdf/configuring_firewalls_and_packet_filters/red_h
      at_enterprise_linux-9-configuring_firewalls_and_packet_filters-en-us.pdf
    references: >
      1. firewalld.service(5) 2. NIST SP 800-53 Rev. 5: CA-9 3.
