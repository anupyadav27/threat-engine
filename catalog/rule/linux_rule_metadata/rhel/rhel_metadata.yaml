  - rule_id: rhel.cis.7.no_duplicate_uids_exist
    title: "Ensure no duplicate UIDs exist"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "7.2.4"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      Although the useradd program will not let you create a duplicate User ID
      (UID), it is possible for an administrator to manually edit the /etc/passwd
      file and change the UID field.
    rationale: >
      Users must be assigned unique UIDs for accountability and to ensure
      appropriate access protections.
    audit_procedure: >
      Run the following script and verify no results are returned: #!/usr/bin/env
      bash { while read -r l_count l_uid; do if [ '$l_count' -gt 1 ]; then echo -e
      'Duplicate UID: \'$l_uid\' Users: \'$(awk -F: '($3 == n) { print $1 }'
      n=$l_uid /etc/passwd | xargs)\'' fi done < <(cut -f3 -d':' /etc/passwd | sort
      -n | uniq -c) }
    remediation: >
      Based on the results of the audit script, establish unique UIDs and review all
      files owned by the shared UIDs to determine which UID they are supposed to
      belong to. References: 1. NIST SP 800-53 Rev. 5: CM-1, CM-2, CM-6, CM-7, IA-5
      MITRE ATT&CK Mappings: Techniques / Sub- techniques Tactics Mitigations T1078,
