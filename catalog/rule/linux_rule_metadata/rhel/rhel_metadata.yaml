  - rule_id: rhel.cis.5.root_path_integrity
    title: "Ensure root path integrity"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "5.4.2.5"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The root user can execute any command on the system and could be fooled into
      executing programs unintentionally if the PATH is not set correctly.
    rationale: >
      Including the current working directory (.) or other writable directory in
      root's executable path makes it likely that an attacker can gain superuser
      access by forcing an administrator operating as root to execute a Trojan horse
      program.
    audit_procedure: >
      Run the following script to verify root's path does not include: • Locations
      that are not directories • An empty directory (::) • A trailing (:) • Current
      working directory (.) • Non root owned directories • Directories that less
      restrictive than mode 0755 #!/usr/bin/env bash { l_output2='' l_pmask='0022'
      l_maxperm='$( printf '%o' $(( 0777 & ~$l_pmask )) )' l_root_path='$(sudo -Hiu
      root env | grep '^PATH' | cut -d= -f2)' unset a_path_loc && IFS=':' read -ra
      a_path_loc <<< '$l_root_path' grep -q '::' <<< '$l_root_path' &&
      l_output2='$l_output2\n - root's path contains a empty directory (::)' grep
      -Pq ':\h*$' <<< '$l_root_path' && l_output2='$l_output2\n - root's path
      contains a trailing (:)' grep -Pq '(\h+|:)\.(:|\h*$)' <<< '$l_root_path' &&
      l_output2='$l_output2\n - root's path contains current working directory (.)'
      while read -r l_path; do if [ -d '$l_path' ]; then while read -r l_fmode
      l_fown; do [ '$l_fown' != 'root' ] && l_output2='$l_output2\n - Directory:
      \'$l_path\' is owned by: \'$l_fown\' should be owned by \'root\'' [ $((
      $l_fmode & $l_pmask )) -gt 0 ] && l_output2='$l_output2\n - Directory:
      \'$l_path\' is mode: \'$l_fmode\' and should be mode: \'$l_maxperm\' or more
      restrictive' done <<< '$(stat -Lc '%#a %U' '$l_path')' else
      l_output2='$l_output2\n - \'$l_path\' is not a directory' fi done <<<
      '$(printf '%s\n' '${a_path_loc[@]}')' if [ -z '$l_output2' ]; then echo -e
      '\n- Audit Result:\n *** PASS ***\n - Root's path is correctly configured\n'
      else echo -e '\n- Audit Result:\n ** FAIL **\n - * Reasons for audit failure *
      :\n$l_output2\n' fi }
    remediation: >
      Correct or justify any: • Locations that are not directories • Empty
      directories (::) • Trailing (:) • Current working directory (.) • Non root
      owned directories • Directories that less restrictive than mode 0755
