    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      Over time, system administration errors and changes can lead to groups being
      defined in /etc/passwd but not in /etc/group .
    rationale: >
      Groups defined in the /etc/passwd file but not in the /etc/group file pose a
      threat to system security since group permissions are not properly managed.
    audit_procedure: >
      Run the following script to verify all GIDs in /etc/passwd exist in
      /etc/group: #!/usr/bin/env bash { a_passwd_group_gid=('$(awk -F: '{print $4}'
      /etc/passwd | sort -u)') a_group_gid=('$(awk -F: '{print $3}' /etc/group |
      sort -u)') a_passwd_group_diff=('$(printf '%s\n' '${a_group_gid[@]}'
      '${a_passwd_group_gid[@]}' | sort | uniq -u)') while IFS= read -r l_gid; do
      awk -F: '($4 == ''$l_gid'') {print ' - User: \'' $1 '\' has GID: \'' $4 '\'
