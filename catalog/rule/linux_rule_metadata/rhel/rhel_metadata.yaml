  - rule_id: rhel.cis.5.inactive_password_lock_is_configured
    title: "Ensure inactive password lock is configured"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "5.4.1.5"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      User accounts that have been inactive for over a given period of time can be
      automatically disabled. INACTIVE - Defines the number of days after the
      password exceeded its maximum age where the user is expected to replace this
      password. The value is stored in the shadow password file. An input of 0 will
      disable an expired password with no delay. An input of -1 will blank the
      respective field in the shadow password file.
    rationale: >
      Inactive accounts pose a threat to system security since the users are not
      logging in to notice failed login attempts or other anomalies.
    audit_procedure: >
      Run the following command and verify INACTIVE conforms to site policy (no more
      than 45 days): # useradd -D | grep INACTIVE INACTIVE=45 Verify all users with
      a password have Password inactive no more than 45 days after password expires
      Verify all users with a password have Password inactive no more than 45 days
      after password expires: Run the following command and Review list of users and
      INACTIVE to verify that all users INACTIVE conforms to site policy (no more
      than 45 days): # awk -F: '($2~/^\$.+\$/) {if($7 > 45 || $7 < 0)print 'User: '
      $1 ' INACTIVE: ' $7}' /etc/shadow Nothing should be returned
    remediation: >
      Run the following command to set the default password inactivity period to 45
      days or less that meets local site policy: # useradd -D -f <N> Example: #
      useradd -D -f 45 Run the following command to modify user parameters for all
      users with a password set to a inactive age of 45 days or less that follows
      local site policy: # chage --inactive <N> <user> Example: # awk -F:
      '($2~/^\$.+\$/) {if($7 > 45 || $7 < 0)system ('chage --inactive 45 ' $1)}'
      /etc/shadow Default Value: INACTIVE=-1 References: 1. CIS Password Policy
      Guide Additional Information: A value of -1 would disable this setting.
