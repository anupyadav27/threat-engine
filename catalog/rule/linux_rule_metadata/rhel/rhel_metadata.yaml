      perm_mod -a always,exit -F arch=b64 -S chown -S fchown -S fchownat -S lchown
      -F auid>=1000 -F auid!=4294967295 -k perm_mod 208 | P a g e -a always,exit -F
      arch=b32 -S chown -S fchown -S fchownat -S lchown -F auid>=1000 -F
