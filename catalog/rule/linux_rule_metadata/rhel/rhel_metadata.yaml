  - rule_id: rhel.cis.3.tcp_syn_cookies_is_enabled
    title: "Ensure tcp syn cookies is enabled"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "3.3.10"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      When tcp_syncookies is set, the kernel will handle TCP SYN packets normally
      until the half-open connection queue is full, at which time, the SYN cookie
      functionality kicks in. SYN cookies work by not using the SYN queue at all.
      Instead, the kernel simply replies to the SYN with a SYN/ACK, but will include
      a specially crafted TCP sequence number that encodes the source and
      destination IP address and port number and the time the packet was sent. A
      legitimate connection would send the ACK packet of the three way handshake
      with the specially crafted sequence number. This allows the system to verify
      that it has received a valid response to a SYN cookie and allow the
      connection, even though there is no corresponding SYN in the queue.
    rationale: >
      Attackers use SYN flood attacks to perform a denial of service attacked on a
      system by sending many SYN packets without completing the three way handshake.
      This will quickly use up slots in the kernel's half-open connection queue and
      prevent legitimate connections from succeeding. Setting
      net.ipv4.tcp_syncookies to 1 enables SYN cookies, allowing the system to keep
      accepting valid connections, even if under a denial of service attack.
    audit_procedure: >
      Run the following script to verify the following kernel parameter is set in
      the running configuration and correctly loaded from a kernel parameter
      configuration file: • net.ipv4.tcp_syncookies is set to 1 Note: kernel
      parameters are loaded by file and parameter order precedence. The following
      script observes this precedence as part of the auditing procedure. The
      parameters being checked may be set correctly in a file. If that file is
      superseded, the parameter is overridden by an incorrect setting later in that
      file, or in a canonically later file, that 'correct' setting will be ignored
      both by the script and by the system during a normal kernel parameter load
      sequence. #!/usr/bin/env bash { l_output='' l_output2='' l_ipv6_disabled='' #
      Clear output variables a_parlist=('net.ipv4.tcp_syncookies=1') l_ufwscf='$([
      -f /etc/default/ufw ] && awk -F= '/^\s*IPT_SYSCTL=/ {print $2}'
      /etc/default/ufw)' f_ipv6_chk() { l_ipv6_disabled='' ! grep -Pqs -- '^\h*0\b'
      /sys/module/ipv6/parameters/disable && l_ipv6_disabled='yes' if sysctl
      net.ipv6.conf.all.disable_ipv6 | grep -Pqs --
      '^\h*net\.ipv6\.conf\.all\.disable_ipv6\h*=\h*1\b' && \ sysctl
      net.ipv6.conf.default.disable_ipv6 | grep -Pqs --
      '^\h*net\.ipv6\.conf\.default\.disable_ipv6\h*=\h*1\b'; then
      l_ipv6_disabled='yes' fi [ -z '$l_ipv6_disabled' ] && l_ipv6_disabled='no' }
      f_kernel_parameter_chk() { l_krp='$(sysctl '$l_kpname' | awk -F= '{print $2}'
      | xargs)' if [ '$l_krp' = '$l_kpvalue' ]; then l_output='$l_output\n -
      \'$l_kpname\' is correctly set to \'$l_krp\' in the running configuration'
      else l_output2='$l_output2\n - \'$l_kpname\' is incorrectly set to \'$l_krp\'
      in the running configuration and should have a value of: \'$l_kpvalue\'' fi
      unset A_out; declare -A A_out # Check durable setting (files) while read -r
      l_out; do if [ -n '$l_out' ]; then if [[ $l_out =~ ^\s*# ]]; then
      l_file='${l_out//# /}' else l_kpar='$(awk -F= '{print $1}' <<< '$l_out' |
