  - rule_id: rhel.cis.4.password_unlock_time_is_configured
    title: "Ensure password unlock time is configured"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 8_v3.0.0"
    cis_version: "8_v3.0.0"
    cis_control: "4.4.3.1.2"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      unlock_time=<n> - The access will be re-enabled after seconds after the lock
      out. The value 0 has the same meaning as value never - the access will not be
      re-enabled without resetting the faillock entries by the faillock(8) command.
      Note: • The default directory that pam_faillock uses is usually cleared on
      system boot so the access will be also re-enabled after system reboot. If that
      is undesirable a different tally directory must be set with the dir option. •
      It is usually undesirable to permanently lock out users as they can become
      easily a target of denial of service attack unless the usernames are random
      and kept secret to potential attackers. • The maximum configurable value for
      unlock_time is 604800
    rationale: >
      Locking out user IDs after n unsuccessful consecutive login attempts mitigates
      brute force password attacks against your systems. Impact: Use of
      unlock_time=0 may allow an attacker to cause denial of service to legitimate
      users. This will also require a systems administrator with elevated privileges
      to unlock the account.
    audit_procedure: >
      Run the following command to verify that the time in seconds before the
      account is unlocked is either 0 (never) or 900 (15 minutes) or more and meets
      local site policy: # grep -Pi --
      '^\h*unlock_time\h*=\h*(0|9[0-9][0-9]|[1-9][0-9]{3,})\b'
      /etc/security/faillock.conf unlock_time = 900 Run the following command to
