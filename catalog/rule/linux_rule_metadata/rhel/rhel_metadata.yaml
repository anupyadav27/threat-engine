  - rule_id: rhel.cis.4.sshd_ciphers_are_configured
    title: "Ensure sshd Ciphers are configured"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 8_v3.0.0"
    cis_version: "8_v3.0.0"
    cis_control: "4.2.6"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      This variable limits the ciphers that SSH can use during communication. Note:
      • Some organizations may have stricter requirements for approved ciphers. •
      Ensure that ciphers used are in compliance with site policy. • The only
      'strong' ciphers currently FIPS 140-2 compliant are: o aes256-ctr o aes192-ctr
      o aes128-ctr
    rationale: >
      Weak ciphers that are used for authentication to the cryptographic module
      cannot be relied upon to provide confidentiality or integrity, and system data
      may be compromised. • The Triple DES ciphers, as used in SSH, have a birthday
      bound of approximately four billion blocks, which makes it easier for remote
      attackers to obtain clear text data via a birthday attack against a long-
      duration encrypted session, aka a 'Sweet32' attack. • Error handling in the
      SSH protocol; Client and Server, when using a block cipher algorithm in Cipher
      Block Chaining (CBC) mode, makes it easier for remote attackers to recover
      certain plain text data from an arbitrary block of cipher text in an SSH
      session via unknown vectors.
    audit_procedure: >
      Run the following command: # sshd -T -C user=root -C host='$(hostname)' -C
      addr='$(grep $(hostname) /etc/hosts | awk '{print $1}')' | grep ciphers Verify
      that output does not contain any of the following weak ciphers: 3des-cbc
      aes128-cbc aes192-cbc aes256-cbc rijndael-cbc@lysator.liu.se
    remediation: >
      Edit the /etc/ssh/sshd_config file and add/modify the Ciphers line to contain
      a comma separated list of the site unapproved (weak) Ciphers preceded with a -
      above any Include entries: Example: Ciphers -3des-
      cbc,aes128-cbc,aes192-cbc,aes256-cbc,rijndael- cbc@lysator.liu.se Note: First
      occurrence of an option takes precedence. If Include locations are enabled,
      used, and order of precedence is understood in your environment, the entry may
      be created in a file in Include location. Default Value: Ciphers
      chacha20-poly1305@openssh.com,aes128-ctr,aes192-ctr,aes256-ctr,aes128-
      gcm@openssh.com,aes256-gcm@openssh.com References: 1.
      https://nvd.nist.gov/vuln/detail/CVE-2016-2183 2.
      https://www.openssh.com/txt/cbc.adv 3.
      https://nvd.nist.gov/vuln/detail/CVE-2008-5161 4.
      https://www.openssh.com/txt/cbc.adv 5. SSHD_CONFIG(5) 6. NIST SP 800-53 Rev.
      5: SC-8
    references: >
      1. https://nvd.nist.gov/vuln/detail/CVE-2016-2183 2.
      https://www.openssh.com/txt/cbc.adv 3.
      https://nvd.nist.gov/vuln/detail/CVE-2008-5161 4.
