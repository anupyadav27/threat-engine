  - rule_id: rhel.cis.6.no_unowned_files_or_directories_exist
    title: "Ensure no unowned files or directories exist"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: manual
    cis_benchmark: "CIS_RHEL 7_v2.1.1"
    cis_version: "7_v2.1.1"
    cis_control: "6.1.11"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Sometimes when administrators delete users from the password file they neglect
      to remove all files owned by those users from the system.
    rationale: >
      A new user who is assigned the deleted user's user ID or group ID may then end
      up 'owning' these files, and thus have more access on the system than was
      intended.
    audit_procedure: >
      Run the following command and verify no files are returned: # df --local -P |
      awk if (NR!=1) print $6 | xargs -I '{}' find '{}' -xdev - nouser The command
      above only searches local filesystems, there may still be compromised items on
      network mounted partitions. Additionally the --local option to df is not
      universal to all versions, it can be omitted to search all filesystems on a
      system including network mounted filesystems or the following command can be
      run manually for each partition: # find <partition> -xdev -nouser
    remediation: >
      Locate files that are owned by users or groups not listed in the system
      configuration files, and reset the ownership of these files to some active
      user on the system as appropriate. Critical Controls: 14 Controlled Access
      Based on the Need to Know Controlled Access Based on the Need to Know 311 | P
      a g e
    references: >
      
    impact: >
      
    compliance_mappings:
