    description: >
      SELinux can run in one of three modes: disabled, permissive, or enforcing: •
      Enforcing - Is the default, and recommended, mode of operation; in enforcing
      mode SELinux operates normally, enforcing the loaded security policy on the
      entire system. • Permissive - The system acts as if SELinux is enforcing the
      loaded security policy, including labeling objects and emitting access denial
      entries in the logs, but it does not actually deny any operations. While not
      recommended for production systems, permissive mode can be helpful for SELinux
      policy development. • Disabled - Is strongly discouraged; not only does the
      system avoid enforcing the SELinux policy, it also avoids labeling any
      persistent objects such as files, making it difficult to enable SELinux in the
      future Note: You can set individual domains to permissive mode while the
      system runs in enforcing mode. For example, to make the httpd_t domain
      permissive: # semanage permissive -a httpd_t
    rationale: >
      Running SELinux in disabled mode the system not only avoids enforcing the
      SELinux policy, it also avoids labeling any persistent objects such as files,
      making it difficult to enable SELinux in the future. Running SELinux in
      Permissive mode, though helpful for developing SELinux policy, only logs
      access denial entries, but does not deny any operations. Impact: Running
      SELinux in Enforcing mode may block intended access to files or processes if
      the SELinux policy is not correctly configured. If this occurs, review the
      system logs for details and update labels or policy as appropriate.
