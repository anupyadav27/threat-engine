  - rule_id: rhel.cis.1.core_dump_backtraces_are_disabled
    title: "Ensure core dump backtraces are disabled"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "1.5.3"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      A core dump is the memory of an executable program. It is generally used to
      determine why a program aborted. It can also be used to glean confidential
      information from a core file.
    rationale: >
      A core dump includes a memory image taken at the time the operating system
      terminates an application. The memory image could contain sensitive data and
      is generally useful only for developers trying to debug problems, increasing
      the risk to the system.
    audit_procedure: >
      Run the following script to verify ProcessSizeMax is set to 0 in
      /etc/systemd/coredump.conf or a file in the /etc/systemd/coredump.conf.d/
      directory: #!/usr/bin/env bash { l_output='' l_output2=''
      a_parlist=('ProcessSizeMax=0')
      l_systemd_config_file='/etc/systemd/coredump.conf' # Main systemd
      configuration file config_file_parameter_chk() { unset A_out; declare -A A_out
      # Check config file(s) setting while read -r l_out; do if [ -n '$l_out' ];
      then if [[ $l_out =~ ^\s*# ]]; then l_file='${l_out//# /}' else
      l_systemd_parameter='$(awk -F= '{print $1}' <<< '$l_out' | xargs)' grep -Piq
      -- '^\h*$l_systemd_parameter_name\b' <<< '$l_systemd_parameter' &&
      A_out+=(['$l_systemd_parameter']='$l_file') fi fi done < <(/usr/bin/systemd-
      analyze cat-config '$l_systemd_config_file' | grep - Pio
      '^\h*([^#\n\r]+|#\h*\/[^#\n\r\h]+\.conf\b)') if (( ${#A_out[@]} > 0 )); then #
      Assess output from files and generate output while IFS='=' read -r
      l_systemd_file_parameter_name l_systemd_file_parameter_value; do
      l_systemd_file_parameter_name='${l_systemd_file_parameter_name// /}'
      l_systemd_file_parameter_value='${l_systemd_file_parameter_value// /}' if grep
      -Piq '^\h*$l_systemd_parameter_value\b' <<< '$l_systemd_file_parameter_value';
      then l_output='$l_output\n - \'$l_systemd_parameter_name\' is correctly set to
      \'$l_systemd_file_parameter_value\' in \'$(printf '%s' '${A_out[@]}')\'\n'
      else l_output2='$l_output2\n - \'$l_systemd_parameter_name\' is incorrectly
      set to \'$l_systemd_file_parameter_value\' in \'$(printf '%s' '${A_out[@]}')\'
      and should have a value matching: \'$l_systemd_parameter_value\'\n' fi done <
      <(grep -Pio -- '^\h*$l_systemd_parameter_name\h*=\h*\H+' '${A_out[@]}') else
      l_output2='$l_output2\n - \'$l_systemd_parameter_name\' is not set in an
      included file\n ** Note: \'$l_systemd_parameter_name\' May be set in a file
      that's ignored by load procedure **\n' fi } while IFS='=' read -r
      l_systemd_parameter_name l_systemd_parameter_value; do # Assess and check
      parameters l_systemd_parameter_name='${l_systemd_parameter_name// /}'
      l_systemd_parameter_value='${l_systemd_parameter_value// /}'
      config_file_parameter_chk done < <(printf '%s\n' '${a_parlist[@]}') if [ -z
      '$l_output2' ]; then # Provide output from checks echo -e '\n- Audit Result:\n
      ** PASS **\n$l_output\n' else echo -e '\n- Audit Result:\n ** FAIL **\n -
      Reason(s) for audit failure:\n$l_output2' [ -n '$l_output' ] && echo -e '\n-
      Correctly set:\n$l_output\n' fi }
    remediation: >
      Create or edit the file /etc/systemd/coredump.conf, or a file in the
      /etc/systemd/coredump.conf.d directory ending in .conf. Edit or add the
      following line in the [Coredump] section: ProcessSizeMax=0 Example:
      #!/usr/bin/env bash { [ ! -d /etc/systemd/coredump.conf.d/ ] && mkdir
      /etc/systemd/coredump.conf.d/ if grep -Psq -- '^\h*\[Coredump\]'
      /etc/systemd/coredump.conf.d/60- coredump.conf; then printf '%s\n'
      'ProcessSizeMax=0' >> /etc/systemd/coredump.conf.d/60- coredump.conf else
      printf '%s\n' '[Coredump]' 'ProcessSizeMax=0' >>
      /etc/systemd/coredump.conf.d/60-coredump.conf fi } Default Value:
      ProcessSizeMax=2G References: 1.
