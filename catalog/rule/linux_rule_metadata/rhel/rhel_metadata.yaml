  - rule_id: rhel.cis.4.sshd_loglevel_is_configured
    title: "Ensure sshd LogLevel is configured"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 8_v3.0.0"
    cis_version: "8_v3.0.0"
    cis_control: "4.2.13"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      LogLevel gives the verbosity level that is used when logging messages from
      sshd. The possible values are: QUIET, FATAL, ERROR, INFO, VERBOSE, DEBUG,
      DEBUG1, DEBUG2, and DEBUG3. The default is INFO. DEBUG and DEBUG1 are
      equivalent. DEBUG2 and DEBUG3 each specify higher levels of debugging output.
      Note: Logging with a DEBUG level violates the privacy of users and is not
      recommended.
    rationale: >
      SSH provides several logging levels with varying amounts of verbosity. The
      DEBUG options are specifically not recommended other than strictly for
      debugging SSH communications. These levels provide so much data that it is
      difficult to identify important security information, and may violate the
      privacy of users. The INFO level is the basic level that only records login
      activity of SSH users. In many situations, such as Incident Response, it is
      important to determine when a particular user was active on a system. The
      logout record can eliminate those users who disconnected, which helps narrow
      the field. The VERBOSE level specifies that login and logout activity as well
      as the key fingerprint for any SSH key used for login will be logged. This
      information is important for SSH key management, especially in legacy
      environments.
    audit_procedure: >
      Run the following command and verify that output matches loglevel VERBOSE or
      loglevel INFO: # sshd -T -C user=root -C host='$(hostname)' -C addr='$(grep
      $(hostname) /etc/hosts | awk '{print $1}')' | grep loglevel loglevel VERBOSE
      or loglevel INFO Run the following command and verify the output matches: #
      grep -Pis '^\h*loglevel\h+' /etc/ssh/sshd_config /etc/ssh/sshd_config.d/*.conf
      | grep -Pvi '(VERBOSE|INFO)' Nothing should be returned Note: If Include
      locations besides, or in addition to /etc/ssh/sshd_config.d/*.conf and/or
      Match set statements are used in your environment, those locations should be
      checked for the correct configuration as well.
    remediation: >
      Edit the /etc/ssh/sshd_config file to set the parameter above any Include
      entries as follows: LogLevel VERBOSE -OR- LogLevel INFO Note: First occurrence
      of a option takes precedence, Match set statements withstanding. If Include
      locations are enabled, used, and order of precedence is understood in your
      environment, the entry may be created in a file in Include location. Default
      Value: LogLevel INFO References: 1. https://www.ssh.com/ssh/sshd_config/ 2.
      NIST SP 800-53 Rev. 5: AU-3, AU-12, SI-5
    references: >
      1. https://www.ssh.com/ssh/sshd_config/ 2. NIST SP 800-53 Rev. 5: AU-3, AU-12,
      SI-5
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_RHEL_8_v3_0_0_4_2_13"
      nist_800_53: []
      soc2: []
      pci_dss: []
