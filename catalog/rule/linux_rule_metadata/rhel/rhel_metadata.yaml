  - rule_id: rhel.cis.4.audit_log_storage_size_is_configured
    title: "Ensure audit log storage size is configured"
    severity: medium
    category: linux
    tech_type: rhel
    automation_type: manual
    cis_benchmark: "CIS_RHEL 7_v2.1.1"
    cis_version: "7_v2.1.1"
    cis_control: "4.1.1.1"
    cis_section: "4"
    profile_applicability: "Level 2"
    description: >
      Configure the maximum size of the audit log file. Once the log reaches the
      maximum size, it will be rotated and a new log file will be started.
    rationale: >
      It is important that an appropriate size is determined for log files so that
      they do not impact the system and audit data is not lost.
    audit_procedure: >
      Run the following command and ensure output is in compliance with site policy:
      # grep max_log_file /etc/audit/auditd.conf max_log_file = <MB>
    remediation: >
      Set the following parameter in /etc/audit/auditd.conf in accordance with site
      policy: max_log_file = <MB> Notes: The max_log_file parameter is measured in
      megabytes. Critical Controls: 190 | P a g e 6.3 Ensure Audit Logging Systems
      Are Not Subject To Loss (i.e. rotation/archive) Ensure that all systems that
      store logs have adequate storage space for the logs generated on a regular
      basis, so that log files will not fill up between log rotation intervals. The
      logs must be archived and digitally signed on a periodic basis. 191 | P a g e
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
