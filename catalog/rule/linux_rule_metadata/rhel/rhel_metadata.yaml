  - rule_id: rhel.cis.4.pam_faillock_module_is_enabled
    title: "Ensure pam_faillock module is enabled"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 8_v3.0.0"
    cis_version: "8_v3.0.0"
    cis_control: "4.4.2.2"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      The pam_faillock.so module maintains a list of failed authentication attempts
      per user during a specified interval and locks the account in case there were
      more than the configured number of consecutive failed authentications (this is
      defined by the deny parameter in the faillock configuration). It stores the
      failure records into per-user files in the tally directory.
    rationale: >
      Locking out user IDs after n unsuccessful consecutive login attempts mitigates
      brute force password attacks against your systems.
    audit_procedure: >
      Run the following commands to verify that pam_faillock is enabled # grep -P --
      '\bpam_faillock.so\b' /etc/pam.d/{password,system}-auth Output should be
      similar to: /etc/pam.d/password-auth:auth required pam_faillock.so preauth
      silent /etc/pam.d/password-auth:auth required pam_faillock.so authfail
      /etc/pam.d/password-auth:account required pam_faillock.so /etc/pam.d/system-
      auth:auth required pam_faillock.so preauth silent /etc/pam.d/system-auth:auth
      required pam_faillock.so authfail /etc/pam.d/system-auth:account required
      pam_faillock.so
    remediation: >
      Run the following script to verify the pam_faillock.so lines exist in the
