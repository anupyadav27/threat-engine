  - rule_id: rhel.cis.4.remote_rsyslog_messages_are_only_accepted_on
    title: "Ensure remote rsyslog messages are only accepted on designated log hosts."
    severity: high
    category: linux
    tech_type: rhel
    automation_type: manual
    cis_benchmark: "CIS_RHEL 7_v2.1.1"
    cis_version: "7_v2.1.1"
    cis_control: "4.2.1.5"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      By default, rsyslog does not listen for log messages coming in from remote
      systems. The ModLoad tells rsyslog to load the imtcp.so module so it can
      listen over a network via TCP. The InputTCPServerRun option instructs rsyslogd
      to listen on the specified TCP port.
    rationale: >
      The guidance in the section ensures that remote log hosts are configured to
      only accept rsyslog data from hosts within the specified domain and that those
      systems that are not designed to be log hosts do not accept any remote rsyslog
      messages. This provides protection from spoofed log data and ensures that
      system administrators are reviewing reasonably complete syslog data in a
      central location.
    audit_procedure: >
      Run the following commands and verify the resulting lines are uncommented on
      designated log hosts and commented or removed on all others: # grep '$ModLoad
      imtcp.so' /etc/rsyslog.conf $ModLoad imtcp.so # grep '$InputTCPServerRun'
      /etc/rsyslog.conf $InputTCPServerRun 514
    remediation: >
      For hosts that are designated as log hosts, edit the /etc/rsyslog.conf file
      and un- comment or add the following lines: $ModLoad imtcp.so
      $InputTCPServerRun 514 For hosts that are not designated as log hosts, edit
      the /etc/rsyslog.conf file and comment or remove the following lines: #
      $ModLoad imtcp.so # $InputTCPServerRun 514 232 | P a g e Run the following
      command to restart rsyslogd : # pkill -HUP rsyslogd References: 1. See the
      rsyslog(8) man page for more information. Critical Controls: 9.1 Limit Open
      Ports, Protocols, and Services Ensure that only ports, protocols, and services
      with validated business needs are running on each system. 233 | P a g e 4.2.2
      Configure syslog-ng The syslog-ng software is recommended as a replacement for
      thesyslogd daemon and provides improvements over syslogd, such as connection-
      oriented (i.e. TCP) transmission of logs, the option to log to database
      formats, and the encryption of log data en route to a central logging server.
      Note: This section only applies if syslog-ng is installed on the system.
    references: >
      1. See the rsyslog(8) man page for more information. Critical Controls: 9.1
      Limit Open Ports, Protocols, and Services Ensure that only ports, protocols,
      and services with validated business needs are running on each system. 233 | P
      a g e 4.2.2 Configure syslog-ng The syslog-ng software is recommended as a
      replacement for thesyslogd daemon and provides improvements over syslogd, such
      as connection-oriented (i.e. TCP) transmission of logs, the option to log to
