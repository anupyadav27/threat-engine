      unauthorized changes occur. This includes detecting new listening ports, new
      administrative users, changes to group and local policy objects (where
      applicable), and new services running on a system. Whenever possible use tools
      compliant with the Security Content Automation Protocol (SCAP) in order to
      streamline reporting and integration. 202 | P a g e
    references: >
      
    impact: >
      
