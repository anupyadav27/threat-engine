      ( %u/ %U) Gid: ( %g/ %G)' /etc/cron.hourly/ Access: (700/drwx------) Uid: ( 0/
      root) Gid: ( 0/ root)
    remediation: >
      Run the following commands to set ownership and permissions on the
      /etc/cron.hourly directory: # chown root:root /etc/cron.hourly/ # chmod og-rwx
      /etc/cron.hourly/ Default Value: Access: (755/drwxr-xr-x) Uid: ( 0/ root) Gid:
      ( 0/ root) References: 1. NIST SP 800-53 Rev. 5: AC-3. MP-2
