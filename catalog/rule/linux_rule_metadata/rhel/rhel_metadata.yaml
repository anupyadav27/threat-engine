      \'$l_file_group\' should be group owned by: \'root\'\n - Changing group
      ownership to \'root\'' chgrp root '$l_file' fi if [ -n '$l_out2' ]; then
      l_output2='$l_output2\n - File: \'$l_file\'$l_out2' else l_output='$l_output\n
      - File: \'$l_file\'\n - Correct: mode: \'$l_file_mode\', owner:
      \'$l_file_owner\', and group owner: \'$l_file_group\' configured' fi done <
      <(stat -Lc '%#a:%U:%G' '$l_file') } while IFS= read -r -d $'\0' l_file; do if
      ssh-keygen -lf &>/dev/null '$l_file'; then file '$l_file' | grep -Piq --
