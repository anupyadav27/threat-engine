  - rule_id: rhel.cis.4.password_complexity_is_configured
    title: "Ensure password complexity is configured"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: manual
    cis_benchmark: "CIS_RHEL 8_v3.0.0"
    cis_version: "8_v3.0.0"
    cis_control: "4.4.3.2.3"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Password complexity can be set through: • minclass - The minimum number of
      classes of characters required in a new password. (digits, uppercase,
      lowercase, others). e.g. minclass = 4 requires digits, uppercase, lower case,
      and special characters. • dcredit - The maximum credit for having digits in
      the new password. If less than 0 it is the minimum number of digits in the new
      password. e.g. dcredit = -1 requires at least one digit • ucredit - The
      maximum credit for having uppercase characters in the new password. If less
      than 0 it is the minimum number of uppercase characters in the new password.
      e.g. ucredit = -1 requires at least one uppercase character • ocredit - The
      maximum credit for having other characters in the new password. If less than 0
      it is the minimum number of other characters in the new password. e.g. ocredit
      = -1 requires at least one special character • lcredit - The maximum credit
      for having lowercase characters in the new password. If less than 0 it is the
      minimum number of lowercase characters in the new password. e.g. lcredit = -1
      requires at least one lowercase character
    rationale: >
      Strong passwords protect systems from being hacked through brute force
      methods.
    audit_procedure: >
      Run the following command to verify that complexity conforms to local site
      policy: # grep -Psi -- '^\h*(minclass|[dulo]credit)\b'
      /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf Example
      output: /etc/security/pwquality.conf.d/50-pwcomplexity.conf:minclass = 4 --
      AND/OR -- /etc/security/pwquality.conf.d/50-pwcomplexity.conf:dcredit = -1
      /etc/security/pwquality.conf.d/50-pwcomplexity.conf:ucredit = -1
      /etc/security/pwquality.conf.d/50-pwcomplexity.conf:ocredit = -1
      /etc/security/pwquality.conf.d/50-pwcomplexity.conf:lcredit = -1 Run the
      following command to verify that: • minclass is not set to less than 4 •
      dcredit, ucredit, lcredit, and ocredit are not set to 0 or greater grep -Psi
      --
      '^\h*password\h+(requisite|required|sufficient)\h+pam_pwquality\.so\h+([^#\n\
      r]+\h+)?(minclass=[0-3]|[dulo]credit=[^-]\d*)\b' /etc/pam.d/system-auth
      /etc/pam.d/password-auth Nothing should be returned Note: • settings should be
      configured in only one location for clarity • Settings observe an order of
      precedence: o module arguments override the settings in the
      /etc/security/pwquality.conf configuration file o settings in the
      /etc/security/pwquality.conf configuration file override settings in a .conf
      file in the /etc/security/pwquality.conf.d/ directory o settings in a .conf
      file in the /etc/security/pwquality.conf.d/ directory are read in canonical
      order, with last read file containing the setting taking precedence • It is
      recommended that settings be configured in a .conf file in the
      /etc/security/pwquality.conf.d/ directory for clarity, convenience, and
      durability.
    remediation: >
      Create or modify a file ending in .conf in the /etc/security/pwquality.conf.d/
      directory or the file /etc/security/pwquality.conf and add or modify the
      following line to set: • minclass = 4 --AND/OR-- • dcredit = -_N_ • ucredit =
      -_N_ • ocredit = -_N_ • lcredit = -_N_ Example: # sed -ri
      's/^\s*minclass\s*=/# &/' /etc/security/pwquality.conf # printf '\n%s'
      'minclass = 4' >> /etc/security/pwquality.conf.d/50- pwcomplexity.conf
      --AND/OR-- # sed -ri 's/^\s*[dulo]credit\s*=/# &/'
      /etc/security/pwquality.conf # printf '%s\n' 'dcredit = -1' 'ucredit = -1'
      'ocredit = -1' 'lcredit = -1' >
      /etc/security/pwquality.conf.d/50-pwcomplexity.conf Run the following script
      to remove setting minclass, dcredit, ucredit, lcredit, and ocredit on the
      pam_pwquality.so module in the PAM files #!/usr/bin/env bash { for l_pam_file
      in system-auth password-auth; do l_authselect_file='/etc/authselect/$(head -1
      /etc/authselect/authselect.conf | grep 'custom/')/$l_pam_file' sed -ri
      's/(^\s*password\s+(requisite|required|sufficient)\s+pam_pwquality\.so.*)(\s+
      minclass\s*=\s*\S+)(.*$)/\1\4/' '$l_authselect_file' sed -ri
      's/(^\s*password\s+(requisite|required|sufficient)\s+pam_pwquality\.so.*)(\s+
      dcredit\s*=\s*\S+)(.*$)/\1\4/' '$l_authselect_file' sed -ri
      's/(^\s*password\s+(requisite|required|sufficient)\s+pam_pwquality\.so.*)(\s+
      ucredit\s*=\s*\S+)(.*$)/\1\4/' '$l_authselect_file' sed -ri
      's/(^\s*password\s+(requisite|required|sufficient)\s+pam_pwquality\.so.*)(\s+
      lcredit\s*=\s*\S+)(.*$)/\1\4/' '$l_authselect_file' sed -ri
      's/(^\s*password\s+(requisite|required|sufficient)\s+pam_pwquality\.so.*)(\s+
      ocredit\s*=\s*\S+)(.*$)/\1\4/' '$l_authselect_file' done authselect apply-
      changes } Default Value: minclass = 0 dcredit = 0 ucredit = 0 ocredit = 0
      lcredit = 0 References: 1. pam_pwquality(8) 2. PWQUALITY.CONF(5) 3. NIST SP
