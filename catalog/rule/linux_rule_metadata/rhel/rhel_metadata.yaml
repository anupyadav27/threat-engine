  - rule_id: rhel.cis.7.suid_and_sgid_files_are_reviewed
    title: "Ensure SUID and SGID files are reviewed"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: manual
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "7.1.13"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      The owner of a file can set the file's permissions to run with the owner's or
      group's permissions, even if the user running the program is not the owner or
      a member of the group. The most common reason for a SUID or SGID program is to
      enable users to perform functions (such as changing their password) that
      require root privileges.
    rationale: >
      There are valid reasons for SUID and SGID programs, but it is important to
      identify and review such programs to ensure they are legitimate. Review the
      files returned by the action in the audit section and check to see if system
      binaries have a different checksum than what from the package. This is an
      indication that the binary may have been replaced.
    audit_procedure: >
      Run the following script to generate a list of SUID and SGID files:
      #!/usr/bin/env bash { l_output='' l_output2='' a_suid=(); a_sgid=() #
      initialize arrays while IFS= read -r l_mount; do while IFS= read -r -d $'\0'
      l_file; do if [ -e '$l_file' ]; then l_mode='$(stat -Lc '%#a' '$l_file')' [
      $(( $l_mode & 04000 )) -gt 0 ] && a_suid+=('$l_file') [ $(( $l_mode & 02000 ))
      -gt 0 ] && a_sgid+=('$l_file') fi done < <(find '$l_mount' -xdev -type f \(
      -perm -2000 -o -perm -4000 \) -print0 2>/dev/null) done < <(findmnt -Dkerno
