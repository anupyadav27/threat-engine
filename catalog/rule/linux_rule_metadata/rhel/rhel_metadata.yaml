  - rule_id: rhel.cis.5.all_logfiles_have_appropriate_access_configured
    title: "Ensure all logfiles have appropriate access configured"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 8_v3.0.0"
    cis_version: "8_v3.0.0"
    cis_control: "5.1.4"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      Log files stored in /var/log/ contain logged information from many services on
      the system and potentially from other logged hosts as well.
    rationale: >
      It is important that log files have the correct permissions to ensure that
      sensitive data is protected and that only the appropriate users / groups have
      access to them.
    audit_procedure: >
      Run the following script to verify that files in /var/log/ have appropriate
      permissions and ownership: #!/usr/bin/env bash { l_op2='' l_output2=''
      l_uidmin='$(awk '/^\s*UID_MIN/{print $2}' /etc/login.defs)' file_test_chk() {
      l_op2='' if [ $(( $l_mode & $perm_mask )) -gt 0 ]; then l_op2='$l_op2\n -
      Mode: \'$l_mode\' should be \'$maxperm\' or more restrictive' fi if [[ !
      '$l_user' =~ $l_auser ]]; then l_op2='$l_op2\n - Owned by: \'$l_user\' and
      should be owned by \'${l_auser//|/ or }\'' fi if [[ ! '$l_group' =~ $l_agroup
      ]]; then l_op2='$l_op2\n - Group owned by: \'$l_group\' and should be group
      owned by \'${l_agroup//|/ or }\'' fi [ -n '$l_op2' ] &&
      l_output2='$l_output2\n - File: \'$l_fname\' is:$l_op2\n' } unset a_file &&
      a_file=() # clear and initialize array # Loop to create array with stat of
      files that could possibly fail one of the audits while IFS= read -r -d $'\0'
      l_file; do [ -e '$l_file' ] && a_file+=('$(stat -Lc '%n^%#a^%U^%u^%G^%g'
      '$l_file')') done < <(find -L /var/log -type f \( -perm /0137 -o ! -user root
      -o ! - group root \) -print0) while IFS='^' read -r l_fname l_mode l_user
      l_uid l_group l_gid; do l_bname='$(basename '$l_fname')' case '$l_bname' in
      lastlog | lastlog.* | wtmp | wtmp.* | wtmp-* | btmp | btmp.* | btmp- * |
      README) perm_mask='0113' maxperm='$( printf '%o' $(( 0777 & ~$perm_mask)) )'
