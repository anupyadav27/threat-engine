  - rule_id: rhel.cis.6.no_world_writable_files_exist
    title: "Ensure no world writable files exist"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: manual
    cis_benchmark: "CIS_RHEL 7_v2.1.1"
    cis_version: "7_v2.1.1"
    cis_control: "6.1.10"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Unix-based systems support variable settings to control access to files. World
      writable files are the least secure. See the chmod(2) man page for more
      information.
    rationale: >
      Data in world-writable files can be modified and compromised by any user on
      the system. World writable files may also indicate an incorrectly written
      script or program that could potentially be the cause of a larger compromise
      to the system's integrity.
    audit_procedure: >
      Run the following command and verify no files are returned: # df --local -P |
      awk if (NR!=1) print $6 | xargs -I '{}' find '{}' -xdev - type f -perm -0002
      The command above only searches local filesystems, there may still be
      compromised items on network mounted partitions. Additionally the --local
      option to df is not universal to all versions, it can be omitted to search all
      filesystems on a system including network mounted filesystems or the following
      command can be run manually for each partition: # find <partition> -xdev -type
      f -perm -0002
    remediation: >
      Removing write access for the 'other' category ( chmod o-w <filename> ) is
      advisable, but always consult relevant vendor documentation to avoid breaking
      any application dependencies on a given file. Critical Controls: 14 Controlled
      Access Based on the Need to Know Controlled Access Based on the Need to Know
      310 | P a g e
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_RHEL_7_v2_1_1_6_1_10"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_rhel_7_v2_1_1_6_1_10"
