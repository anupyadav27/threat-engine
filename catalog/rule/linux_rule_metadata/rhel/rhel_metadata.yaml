  - rule_id: rhel.cis.5.unsuccessful_file_access_attempts_are_collected
    title: "Ensure unsuccessful file access attempts are collected"
    severity: medium
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 8_v3.0.0"
    cis_version: "8_v3.0.0"
    cis_control: "5.2.3.7"
    cis_section: "5"
    profile_applicability: "Level 2"
    description: >
      Monitor for unsuccessful attempts to access files. The following parameters
      are associated with system calls that control files: • creation - creat •
      opening - open , openat • truncation - truncate , ftruncate An audit log
      record will only be written if all of the following criteria is met for the
      user when trying to access a file: • a non-privileged user (auid>=UID_MIN) •
      is not a Daemon event (auid=4294967295/unset/-1) • if the system call returned
      EACCES (permission denied) or EPERM (some other permanent error associated
      with the specific system call)
    rationale: >
      Failed attempts to open, create or truncate files could be an indication that
      an individual or process is trying to gain unauthorized access to the system.
    audit_procedure: >
      64 Bit systems On disk configuration Run the following command to check the on
      disk rules: # { UID_MIN=$(awk '/^\s*UID_MIN/{print $2}' /etc/login.defs) [ -n
      '${UID_MIN}' ] && awk '/^ *-a *always,exit/ \ &&/ -F *arch=b(32|64)/ \ &&(/ -F
      *auid!=unset/||/ -F *auid!=-1/||/ -F *auid!=4294967295/) \ &&/ -F
      *auid>=${UID_MIN}/ \ &&(/ -F *exit=-EACCES/||/ -F *exit=-EPERM/) \ &&/ -S/ \
      &&/creat/ \ &&/open/ \ &&/truncate/ \ &&(/ key= *[!-~]* *$/||/ -k *[!-~]*
      *$/)' /etc/audit/rules.d/*.rules \ || printf 'ERROR: Variable 'UID_MIN' is
      unset.\n' } Verify the output includes: -a always,exit -F arch=b64 -S
      creat,open,openat,truncate,ftruncate -F exit=- EACCES -F auid>=1000 -F
      auid!=unset -k access -a always,exit -F arch=b64 -S
      creat,open,openat,truncate,ftruncate -F exit=- EPERM -F auid>=1000 -F
      auid!=unset -k access -a always,exit -F arch=b32 -S
      creat,open,openat,truncate,ftruncate -F exit=- EACCES -F auid>=1000 -F
      auid!=unset -k access -a always,exit -F arch=b32 -S
      creat,open,openat,truncate,ftruncate -F exit=- EPERM -F auid>=1000 -F
      auid!=unset -k access Running configuration Run the following command to check
      loaded rules: # { UID_MIN=$(awk '/^\s*UID_MIN/{print $2}' /etc/login.defs) [
      -n '${UID_MIN}' ] && auditctl -l | awk '/^ *-a *always,exit/ \ &&/ -F
      *arch=b(32|64)/ \ &&(/ -F *auid!=unset/||/ -F *auid!=-1/||/ -F
      *auid!=4294967295/) \ &&/ -F *auid>=${UID_MIN}/ \ &&(/ -F *exit=-EACCES/||/ -F
      *exit=-EPERM/) \ &&/ -S/ \ &&/creat/ \ &&/open/ \ &&/truncate/ \ &&(/ key=
      *[!-~]* *$/||/ -k *[!-~]* *$/)' \ || printf 'ERROR: Variable 'UID_MIN' is
