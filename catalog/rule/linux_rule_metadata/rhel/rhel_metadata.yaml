  - rule_id: rhel.cis.4.audit_configuration_is_immutable
    title: "Ensure the audit configuration is immutable"
    severity: medium
    category: linux
    tech_type: rhel
    automation_type: manual
    cis_benchmark: "CIS_RHEL 7_v2.1.1"
    cis_version: "7_v2.1.1"
    cis_control: "4.1.18"
    cis_section: "4"
    profile_applicability: "Level 2"
    description: >
      Set system audit so that audit rules cannot be modified with auditctl .
      Setting the flag '-e 2' forces audit to be put in immutable mode. Audit
      changes can only be made on system reboot.
    rationale: >
      In immutable mode, unauthorized users cannot execute changes to the audit
      system to potentially hide malicious activity and then put the audit rules
      back. Users would most likely notice a system reboot and that could alert
      administrators of an attempt to make unauthorized audit changes.
    audit_procedure: >
      Run the following command and verify output matches: # grep '^\s*[^#]'
      /etc/audit/audit.rules | tail -1 -e 2
    remediation: >
      Add the following line to the end of the /etc/audit/audit.rules file. -e 2
      Critical Controls: 3 Secure Configurations for Hardware and Software on Mobile
      Devices, Laptops, Workstations, and Servers Secure Configurations for Hardware
      and Software on Mobile Devices, Laptops, Workstations, and Servers 6
      Maintenance, Monitoring, and Analysis of Audit Logs Maintenance, Monitoring,
      and Analysis of Audit Logs 4.2 Configure Logging 223 | P a g e Logging
      services should be configured to prevent information leaks and to aggregate
      logs on a remote server so that they can be reviewed in the event of a system
      compromise and ease log analysis. 224 | P a g e 4.2.1 Configure rsyslog The
      rsyslog software is recommended as a replacement for thesyslogd daemon and
      provides improvements over syslogd, such as connection-oriented (i.e. TCP)
      transmission of logs, the option to log to database formats, and the
      encryption of log data en route to a central logging server. Note: This
      section only applies if rsyslog is installed on the system.
