    tech_type: rhel
    automation_type: manual
    cis_benchmark: "CIS_RHEL 7_v2.1.1"
    cis_version: "7_v2.1.1"
    cis_control: "5.2.3"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The INFO parameter specifies that login and logout activity will be logged.
    rationale: >
      SSH provides several logging levels with varying amounts of verbosity. DEBUG
      is specifically not recommended other than strictly for debugging SSH
      communications since it provides so much data that it is difficult to identify
      important security information. INFO level is the basic level that only
      records login activity of SSH users. In many situations, such as Incident
      Response, it is important to determine when a particular user was active on a
      system. The logout record can eliminate those users who disconnected, which
      helps narrow the field.
    audit_procedure: >
      Run the following command and verify that output matches: # grep '^LogLevel'
      /etc/ssh/sshd_config LogLevel INFO
    remediation: >
      Edit the /etc/ssh/sshd_config file to set the parameter as follows: LogLevel
      INFO Critical Controls: 16 Account Monitoring and Control Account Monitoring
      and Control 259 | P a g e
