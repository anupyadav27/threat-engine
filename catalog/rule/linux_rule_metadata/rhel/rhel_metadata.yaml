      /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf Run the
      following script to remove setting dictcheck on the pam_pwquality.so module in
      the PAM files: #!/usr/bin/env bash { for l_pam_file in system-auth password-
      auth; do l_authselect_file='/etc/authselect/$(head -1
      /etc/authselect/authselect.conf | grep 'custom/')/$l_pam_file' sed -ri
      's/(^\s*password\s+(requisite|required|sufficient)\s+pam_pwquality\.so.*)(\s+
      dictcheck\s*=\s*\S+)(.*$)/\1\4/' '$l_authselect_file' done authselect apply-
      changes } Default Value: dictcheck = 1 References: 1. NIST SP 800-53 Rev. 5:
