  - rule_id: rhel.cis.3.nftables_base_chains_exist
    title: "Ensure nftables base chains exist"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 8_v3.0.0"
    cis_version: "8_v3.0.0"
    cis_control: "3.4.2.1"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Chains are containers for rules. They exist in two kinds, base chains and
      regular chains. A base chain is an entry point for packets from the networking
      stack, a regular chain may be used as jump target and is used for better rule
      organization.
    rationale: >
      If a base chain doesn't exist with a hook for input, forward, and delete,
      packets that would flow through those chains will not be touched by nftables.
      Impact: If configuring over ssh, creating a base chain with a policy of drop
      will cause loss of connectivity. Ensure that a rule allowing ssh has been
      added to the base chain prior to setting the base chain's policy to drop
    audit_procedure: >
      - IF not using FirewallD - Run the following command to verify that base
      chains exist for the INPUT filter hook: # nft list ruleset | grep 'hook input'
      Output should include: type filter hook input Run the following command to
      verify that base chains exist for the FORWARD filter hook: # nft list ruleset
      | grep 'hook forward' Output should include: type filter hook forward Run the
      following command to verify that base chains exist for the OUTPUT filter hook:
      # nft list ruleset | grep 'hook output' Output should include: type filter
      hook output Note: When using FirewallD the base chains are installed by
      default
    remediation: >
      - IF not using FirewallD - Run the following command to create the base
      chains: # nft create chain inet <table name> <base chain name> { type filter
      hook <(input|forward|output)> priority 0 \; } Example: # nft create chain inet
      filter input { type filter hook input priority 0 \; } # nft create chain inet
      filter forward { type filter hook forward priority 0 \; } # nft create chain
      inet filter output { type filter hook output priority 0 \; } References: 1.
      NIST SP 800-53 Rev. 5: CA-9
    references: >
      1. NIST SP 800-53 Rev. 5: CA-9
    impact: >
      If configuring over ssh, creating a base chain with a policy of drop will
      cause loss of connectivity. Ensure that a rule allowing ssh has been added to
      the base chain prior to setting the base chain's policy to drop
