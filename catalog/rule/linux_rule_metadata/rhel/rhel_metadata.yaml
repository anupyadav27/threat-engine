  - rule_id: rhel.cis.3.dccp_kernel_module_is_not_available
    title: "Ensure dccp kernel module is not available"
    severity: medium
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "3.2.1"
    cis_section: "3"
    profile_applicability: "Level 2"
    description: >
      The Datagram Congestion Control Protocol (DCCP) is a transport layer protocol
      that supports streaming media and telephony. DCCP provides a way to gain
      access to congestion control, without having to do it at the application
      layer, but does not provide in-sequence delivery.
    rationale: >
      - IF - the protocol is not required, it is recommended that the drivers not be
      installed to reduce the potential attack surface.
    audit_procedure: >
      Run the following script to verify: - IF - the dccp kernel module is available
      in ANY installed kernel, verify: • An entry including /bin/true or /bin/false
      exists in a file within the /etc/modprobe.d/ directory • The module is deny
      listed in a file within the /etc/modprobe.d/ directory • The module is not
      loaded in the running kernel - IF - the dccp kernel module is not available on
      the system, or pre-compiled into the kernel, no additional configuration is
      necessary #!/usr/bin/env bash { l_output3='' l_dl='' # clear variables unset
      a_output; unset a_output2 # unset arrays l_mod_name='dccp' # set module name
      l_mod_type='net' # set module type l_mod_path='$(readlink -f
      /lib/modules/**/kernel/$l_mod_type | sort -u)' f_module_chk() { l_dl='y' # Set
      to ignore duplicate checks a_showconfig=() # Create array with modprobe output
      while IFS= read -r l_showconfig; do a_showconfig+=('$l_showconfig') done <
      <(modprobe --showconfig | grep -P --
      '\b(install|blacklist)\h+''${l_mod_name//-/_}''\b') if ! lsmod | grep
      '$l_mod_name' &> /dev/null; then # Check if the module is currently loaded
      a_output+=(' - kernel module: \'$l_mod_name\' is not loaded') else
      a_output2+=(' - kernel module: \'$l_mod_name\' is loaded') fi if grep -Pq --
      '\binstall\h+''${l_mod_name//-/_}''\h+\/bin\/(true|false)\b' <<<
      '${a_showconfig[*]}'; then a_output+=(' - kernel module: \'$l_mod_name\' is
      not loadable') else a_output2+=(' - kernel module: \'$l_mod_name\' is
      loadable') fi if grep -Pq -- '\bblacklist\h+''${l_mod_name//-/_}''\b' <<<
      '${a_showconfig[*]}'; then a_output+=(' - kernel module: \'$l_mod_name\' is
      deny listed') else a_output2+=(' - kernel module: \'$l_mod_name\' is not deny
      listed') fi } for l_mod_base_directory in $l_mod_path; do # Check if the
      module exists on the system if [ -d '$l_mod_base_directory/${l_mod_name/-/\/}'
      ] && [ -n '$(ls -A $l_mod_base_directory/${l_mod_name/-/\/})' ]; then
      l_output3='$l_output3\n - \'$l_mod_base_directory\'' [[ '$l_mod_name' =~
      overlay ]] && l_mod_name='${l_mod_name::-2}' [ '$l_dl' != 'y' ] &&
      f_module_chk else a_output+=(' - kernel module: \'$l_mod_name\' doesn't exist
      in \'$l_mod_base_directory\'') fi done [ -n '$l_output3' ] && echo -e '\n\n --
      INFO --\n - module: \'$l_mod_name\' exists in:$l_output3' if [
      '${#a_output2[@]}' -le 0 ]; then printf '%s\n' '' '- Audit Result:' ' ** PASS
      **' '${a_output[@]}' else printf '%s\n' '' '- Audit Result:' ' ** FAIL **' ' -
      Reason(s) for audit failure:' '${a_output2[@]}' [ '${#a_output[@]}' -gt 0 ] &&
      printf '%s\n' '- Correctly set:' '${a_output[@]}' fi }
    remediation: >
      Run the following script to unload and disable the dccp module: - IF - the
      dccp kernel module is available in ANY installed kernel: • Create a file
      ending in .conf with install dccp /bin/false in the /etc/modprobe.d/ directory
      • Create a file ending in .conf with blacklist dccp in the /etc/modprobe.d/
      directory • Run modprobe -r dccp 2>/dev/null; rmmod dccp 2>/dev/null to remove
      dccp from the kernel - IF - the dccp kernel module is not available on the
      system, or pre-compiled into the kernel, no remediation is necessary
      #!/usr/bin/env bash { unset a_output2; l_output3='' l_dl='' # unset arrays and
      clear variables l_mod_name='dccp' # set module name l_mod_type='net' # set
      module type l_mod_path='$(readlink -f /lib/modules/**/kernel/$l_mod_type |
      sort -u)' f_module_fix() { l_dl='y' # Set to ignore duplicate checks
      a_showconfig=() # Create array with modprobe output while IFS= read -r
      l_showconfig; do a_showconfig+=('$l_showconfig') done < <(modprobe
      --showconfig | grep -P -- '\b(install|blacklist)\h+''${l_mod_name//-/_}''\b')
      if lsmod | grep '$l_mod_name' &> /dev/null; then # Check if the module is
      currently loaded a_output2+=(' - unloading kernel module: \'$l_mod_name\'')
      modprobe -r '$l_mod_name' 2>/dev/null; rmmod '$l_mod_name' 2>/dev/null fi if !
      grep -Pq -- '\binstall\h+''${l_mod_name//- /_}''\h+\/bin\/(true|false)\b' <<<
      '${a_showconfig[*]}'; then a_output2+=(' - setting kernel module:
      \'$l_mod_name\' to \'/bin/false\'') printf '%s\n' 'install $l_mod_name
      /bin/false' >> /etc/modprobe.d/'$l_mod_name'.conf fi if ! grep -Pq --
      '\bblacklist\h+''${l_mod_name//-/_}''\b' <<< '${a_showconfig[*]}'; then
      a_output2+=(' - denylisting kernel module: \'$l_mod_name\'') printf '%s\n'
      'blacklist $l_mod_name' >> /etc/modprobe.d/'$l_mod_name'.conf fi } for
      l_mod_base_directory in $l_mod_path; do # Check if the module exists on the
      system if [ -d '$l_mod_base_directory/${l_mod_name/-/\/}' ] && [ -n '$(ls -A
      $l_mod_base_directory/${l_mod_name/-/\/})' ]; then l_output3='$l_output3\n -
      \'$l_mod_base_directory\'' [[ '$l_mod_name' =~ overlay ]] &&
      l_mod_name='${l_mod_name::-2}' [ '$l_dl' != 'y' ] && f_module_fix else echo -e
      ' - kernel module: \'$l_mod_name\' doesn't exist in \'$l_mod_base_directory\''
      fi done [ -n '$l_output3' ] && echo -e '\n\n -- INFO --\n - module:
      \'$l_mod_name\' exists in:$l_output3' [ '${#a_output2[@]}' -gt 0 ] && printf
      '%s\n' '${a_output2[@]}' echo -e '\n - remediation of kernel module:
      \'$l_mod_name\' complete\n' } References: 1. NIST SP 800-53 Rev. 5: SI-4, CM-7
    references: >
      1. NIST SP 800-53 Rev. 5: SI-4, CM-7
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_RHEL_9_v2_0_0_3_2_1"
      nist_800_53: []
