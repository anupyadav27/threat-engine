  - rule_id: rhel.cis.4.syslog_ng_default_file_permissions_configured
    title: "Ensure syslog-ng default file permissions configured"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: manual
    cis_benchmark: "CIS_RHEL 7_v2.1.1"
    cis_version: "7_v2.1.1"
    cis_control: "4.2.2.3"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      syslog-ng will create logfiles that do not already exist on the system. This
      setting controls what permissions will be applied to these newly created
      files.
    rationale: >
      It is important to ensure that log files exist and have the correct
      permissions to ensure that sensitive syslog-ng data is archived and protected.
    audit_procedure: >
      Run the following command and verify the perm option is 0640 or more
      restrictive: # grep ^options /etc/syslog-ng/syslog-ng.conf options {
      chain_hostnames(off); flush_lines(0); perm(0640); stats_freq(3600);
      threaded(yes); };
