  - rule_id: rhel.cis.5.all_users_last_password_change_date_is_in_the_past
    title: "Ensure all users last password change date is in the past"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 9_v2.0.0"
    cis_version: "9_v2.0.0"
    cis_control: "5.4.1.6"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      All users should have a password change date in the past.
    rationale: >
      If a user's recorded password change date is in the future, then they could
      bypass any set password expiration.
    audit_procedure: >
      Run the following script and verify nothing is returned: #!/usr/bin/env bash {
      while IFS= read -r l_user; do l_change=$(date -d '$(chage --list $l_user |
      grep '^Last password change' | cut -d: -f2 | grep -v 'never$')' +%s) if [[
      '$l_change' -gt '$(date +%s)' ]]; then echo 'User: \'$l_user\' last password
      change was \'$(chage --list $l_user | grep '^Last password change' | cut -d:
      -f2)\'' fi done < <(awk -F: '$2~/^\$.+\$/{print $1}' /etc/shadow) }
    remediation: >
      Investigate any users with a password change date in the future and correct
      them. Locking the account, expiring the password, or resetting the password
      manually may be appropriate.
