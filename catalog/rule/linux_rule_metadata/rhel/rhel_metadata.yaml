    profile_applicability: "Level 1"
    description: >
      This directory contains system cron jobs that need to run on an hourly basis.
      The files in this directory cannot be manipulated by the crontab command, but
      are instead edited by system administrators using a text editor. The commands
      below restrict read/write and search access to user and group root, preventing
      regular users from accessing this directory.
    rationale: >
      Granting write access to this directory for non-privileged users could provide
      them the means for gaining unauthorized elevated privileges. Granting read
      access to this directory could give an unprivileged user insight in how to
      gain elevated privileges or circumvent auditing controls.
    audit_procedure: >
      Run the following command and verify Uid and Gid are both 0/root and Access
      does not grant permissions to group or other : # stat /etc/cron.hourly Access:
      (0600/-rw-------) Uid: ( 0/ root) Gid: ( 0/ root)
    remediation: >
      Run the following commands to set ownership and permissions on
      /etc/cron.hourly : # chown root:root /etc/cron.hourly # chmod og-rwx
      /etc/cron.hourly Critical Controls: 5.1 Minimize And Sparingly Use
      Administrative Privileges Minimize administrative privileges and only use
      administrative accounts when they are required. Implement focused auditing on
      the use of administrative privileged functions and monitor for anomalous
      behavior. 249 | P a g e
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
