  - rule_id: rhel.cis.5.rsyslog_is_configured_to_send_logs_to_a_remote
    title: "Ensure rsyslog is configured to send logs to a remote log host"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: manual
    cis_benchmark: "CIS_RHEL 8_v3.0.0"
    cis_version: "8_v3.0.0"
    cis_control: "5.1.1.6"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      RSyslog supports the ability to send log events it gathers to a remote log
      host or to receive messages from remote hosts, thus enabling centralized log
      management.
    rationale: >
      Storing log data on a remote host protects log integrity from local attacks.
      If an attacker gains root access on the local system, they could tamper with
      or remove log data that is stored on the local system.
    audit_procedure: >
