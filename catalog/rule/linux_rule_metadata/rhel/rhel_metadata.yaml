  - rule_id: rhel.cis.3.tipc_is_disabled
    title: "Ensure TIPC is disabled"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: manual
    cis_benchmark: "CIS_RHEL 7_v2.1.1"
    cis_version: "7_v2.1.1"
    cis_control: "3.5.4"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The Transparent Inter-Process Communication (TIPC) protocol is designed to
      provide communication between cluster nodes.
    rationale: >
      If the protocol is not being used, it is recommended that kernel module not be
      loaded, disabling the service to reduce the potential attack surface.
    audit_procedure: >
      Run the following commands and verify the output is as indicated: # modprobe
      -n -v tipc install /bin/true # lsmod | grep tipc <No output>
    remediation: >
      Edit or create the file /etc/modprobe.d/CIS.conf and add the following line:
      install tipc /bin/true Critical Controls: 9.1 Limit Open Ports, Protocols, and
      Services Ensure that only ports, protocols, and services with validated
      business needs are running on each system. 176 | P a g e 3.6 Firewall
      Configuration IPtables is an application that allows a system administrator to
      configure the IPv4 tables, chains and rules provided by the Linux kernel
      firewall. While several methods of configuration exist this section is
      intended only to ensure the resulting IPtables rules are in place, not how
      they are configured. If IPv6 is in use in your environment, similar settings
      should be applied to the IP6tables as well. Note: This section broadly assumes
      starting with an empty IPtables firewall ruleset (established by flushing the
      rules with iptables -F). Remediation steps included only affect the live
      system, you will also need to configure your default firewall configuration to
      apply on boot. Configuration of a live systems firewall directly over a remote
      connection will often result in being locked out. It is advised to have a
      known good firewall configuration set to run on boot and to configure an
      entire firewall structure in a script that is then run and tested before
      saving to boot. The following script will implement the firewall rules of this
      section and open port 22(ssh) from anywhere: #!/bin/bash # Flush IPtables
      rules iptables -F # Ensure default deny firewall policy iptables -P INPUT DROP
      iptables -P OUTPUT DROP iptables -P FORWARD DROP # Ensure loopback traffic is
      configured iptables -A INPUT -i lo -j ACCEPT iptables -A OUTPUT -o lo -j
      ACCEPT iptables -A INPUT -s 127.0.0.0/8 -j DROP # Ensure outbound and
      established connections are configured iptables -A OUTPUT -p tcp -m state
      --state NEW,ESTABLISHED -j ACCEPT iptables -A OUTPUT -p udp -m state --state
      NEW,ESTABLISHED -j ACCEPT iptables -A OUTPUT -p icmp -m state --state
      NEW,ESTABLISHED -j ACCEPT iptables -A INPUT -p tcp -m state --state
      ESTABLISHED -j ACCEPT iptables -A INPUT -p udp -m state --state ESTABLISHED -j
      ACCEPT iptables -A INPUT -p icmp -m state --state ESTABLISHED -j ACCEPT # Open
      inbound ssh(tcp port 22) connections iptables -A INPUT -p tcp --dport 22 -m
      state --state NEW -j ACCEPT
    references: >
      
