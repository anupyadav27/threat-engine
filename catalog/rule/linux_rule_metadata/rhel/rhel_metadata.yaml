    description: >
      The /etc/hosts.allow file contains networking information that is used by many
      applications and therefore must be readable for these applications to operate.
    rationale: >
      It is critical to ensure that the /etc/hosts.allow file is protected from
      unauthorized write access. Although it is protected by default, the file
      permissions could be changed either inadvertently or through malicious
      actions.
    audit_procedure: >
      Run the following command and verify Uid and Gid are both 0/root and Access is
      644 : # stat /etc/hosts.allow Access: (0644/-rw-r--r--) Uid: ( 0/ root) Gid: (
      0/ root)
    remediation: >
      Run the following commands to set permissions on /etc/hosts.allow : # chown
      root:root /etc/hosts.allow # chmod 644 /etc/hosts.allow Critical Controls: 5.1
      Minimize And Sparingly Use Administrative Privileges Minimize administrative
      privileges and only use administrative accounts when they are required.
      Implement focused auditing on the use of administrative privileged functions
      and monitor for anomalous behavior. 170 | P a g e
