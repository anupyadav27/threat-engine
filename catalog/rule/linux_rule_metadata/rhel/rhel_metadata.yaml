    cis_version: "7_v2.1.1"
    cis_control: "1.2.4"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Systems need to be registered with the Red Hat Network (RHN) or Red Hat
      Subscription Manager (RHSM) to receive patch updates. This is usually
      configured during initial installation.
    rationale: >
      It is important to register with the Red Hat Network to make sure that patches
      are updated on a regular basis. This helps to reduce the exposure time as new
      vulnerabilities are discovered.
    audit_procedure: >
      Verify your system is connected to the Red Hat Network or Red Hat Subscription
      Manager. If connected to RHN your systemID will be stored in
      /etc/sysconfig/rhn/systemid . If connected to RHSM your systemID can be
      retrieved with the following command: # subscription-manager identity
    remediation: >
      Run one of the following commands to connect to either the Red Hat Network or
      Red Hat Subscription Manager: # rhn_register # subscription-manager register
      Critical Controls: 4.5 Use Automated Patch Management And Software Update
      Tools Deploy automated patch management tools and software update tools for
      operating system and software/applications on all systems for which such tools
      are available and safe. Patches should be applied to all systems, even systems
      that are properly air gapped. 59 | P a g e
