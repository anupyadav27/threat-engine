    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      The UsePAM directive enables the Pluggable Authentication Module (PAM)
      interface. If set to yes this will enable PAM authentication using
      ChallengeResponseAuthentication and PasswordAuthentication directives in
      addition to PAM account and session module processing for all authentication
      types.
    rationale: >
      When usePAM is set to yes, PAM runs through account and session types
      properly. This is important if you want to restrict access to services based
      off of IP, time or other factors of the account. Additionally, you can make
      sure users inherit certain environment variables on login or disallow access
      to the server
    audit_procedure: >
      Run the following command: # sshd -T -C user=root -C host='$(hostname)' -C
      addr='$(grep $(hostname) /etc/hosts | awk '{print $1}')' | grep -i usepam
      Verify the output matches: usepam yes Run the following command: # grep -Pis
      '^\h*UsePAM\h+'?no'?\b' /etc/ssh/sshd_config /etc/ssh/ssh_config.d/*.conf
      Nothing should be returned. Note: If Include locations besides, or in addition
      to /etc/ssh/sshd_config.d/*.conf are used in your environment, those locations
      should be checked for the correct configuration as well.
    remediation: >
      Edit the /etc/ssh/sshd_config file to set the parameter above any Include
      entries as follows: UsePAM yes Note: First occurrence of a option takes
      precedence. If Include locations are enabled, used, and order of precedence is
      understood in your environment, the entry may be created in a file in Include
