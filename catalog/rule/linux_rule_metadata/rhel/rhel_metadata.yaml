  - rule_id: rhel.cis.5.audit_log_directory_is_0750_or_more_restrictive
    title: "Ensure the audit log directory is 0750 or more restrictive"
    severity: medium
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 8_v3.0.0"
    cis_version: "8_v3.0.0"
    cis_control: "5.2.4.1"
    cis_section: "5"
    profile_applicability: "Level 2"
    description: >
      The audit log directory contains audit log files.
    rationale: >
      Audit information includes all information including: audit records, audit
      settings and audit reports. This information is needed to successfully audit
      system activity. This information must be protected from unauthorized
      modification or deletion. If this information were to be compromised, forensic
      analysis and discovery of the true source of potentially malicious system
      activity is impossible to achieve.
    audit_procedure: >
      Run the following command to verify that the audit log directory has a mode of
      0750 or less permissive: # stat -Lc '%n %a' '$(dirname $( awk -F'='
      '/^\s*log_file\s*=\s*/ {print $2}' /etc/audit/auditd.conf))' | grep -Pv --
      '^\h*\H+\h+([0,5,7][0,5]0)' Nothing should be returned
    remediation: >
      Run the following command to configure the audit log directory to have a mode
      of '0750' or less permissive: # chmod g-w,o-rwx '$(dirname $( awk -F'='
      '/^\s*log_file\s*=\s*/ {print $2}' /etc/audit/auditd.conf))' Default Value:
      750
    references: >
      
    impact: >
      
