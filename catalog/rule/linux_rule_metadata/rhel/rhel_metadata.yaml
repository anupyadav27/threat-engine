  - rule_id: rhel.cis.5.journald_is_configured_to_send_logs_to_rsyslog
    title: "Ensure journald is configured to send logs to rsyslog"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: manual
    cis_benchmark: "CIS_RHEL 8_v3.0.0"
    cis_version: "8_v3.0.0"
    cis_control: "5.1.1.3"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      Data from systemd-journald may be stored in volatile memory or persisted
      locally on the server. Utilities exist to accept remote export of systemd-
      journald logs, however, use of the rsyslog service provides a consistent means
      of log collection and export.
    rationale: >
      -IF- rsyslog is the preferred method for capturing logs, all logs of the
      system should be sent to it for further processing. Note: This recommendation
      only applies if rsyslog is the chosen method for client side logging. Do not
      apply this recommendation if systemd-journald is used.
    audit_procedure: >
      -IF- rsyslog is the preferred method for capturing logs Run the following
      script to verify that logs are forwarded to rsyslog by setting ForwardToSyslog
      to yes in the systemd-journald configuration: #!/usr/bin/env bash {
      l_output='' l_output2='' a_parlist=('ForwardToSyslog=yes')
      l_systemd_config_file='/etc/systemd/journald.conf' # Main systemd
      configuration file config_file_parameter_chk() { unset A_out; declare -A A_out
      # Check config file(s) setting while read -r l_out; do if [ -n '$l_out' ];
      then if [[ $l_out =~ ^\s*# ]]; then l_file='${l_out//# /}' else
      l_systemd_parameter='$(awk -F= '{print $1}' <<< '$l_out' | xargs)' [
      '${l_systemd_parameter^^}' = '${l_systemd_parameter_name^^}' ] &&
      A_out+=(['$l_systemd_parameter']='$l_file') fi fi done < <(/usr/bin/systemd-
      analyze cat-config '$l_systemd_config_file' | grep -Pio
      '^\h*([^#\n\r]+|#\h*\/[^#\n\r\h]+\.conf\b)') if (( ${#A_out[@]} > 0 )); then #
      Assess output from files and generate output while IFS='=' read -r
      l_systemd_file_parameter_name l_systemd_file_parameter_value; do
      l_systemd_file_parameter_name='${l_systemd_file_parameter_name// /}'
      l_systemd_file_parameter_value='${l_systemd_file_parameter_value// /}' if [
      '${l_systemd_file_parameter_value^^}' = '${l_systemd_parameter_value^^}' ];
      then l_output='$l_output\n - \'$l_systemd_parameter_name\' is correctly set to
      \'$l_systemd_file_parameter_value\' in \'$(printf '%s' '${A_out[@]}')\'\n'
      else l_output2='$l_output2\n - \'$l_systemd_parameter_name\' is incorrectly
      set to \'$l_systemd_file_parameter_value\' in \'$(printf '%s' '${A_out[@]}')\'
      and should have a value of: \'$l_systemd_parameter_value\'\n' fi done < <(grep
      -Pio -- '^\h*$l_systemd_parameter_name\h*=\h*\H+' '${A_out[@]}') else
      l_output2='$l_output2\n - \'$l_systemd_parameter_name\' is not set in an
      included file\n ** Note: \'$l_systemd_parameter_name\' May be set in a file
      that's ignored by load procedure **\n' fi } while IFS='=' read -r
      l_systemd_parameter_name l_systemd_parameter_value; do # Assess and check
      parameters l_systemd_parameter_name='${l_systemd_parameter_name// /}'
      l_systemd_parameter_value='${l_systemd_parameter_value// /}'
      config_file_parameter_chk done < <(printf '%s\n' '${a_parlist[@]}') if [ -z
      '$l_output2' ]; then # Provide output from checks echo -e '\n- Audit Result:\n
      ** PASS **\n$l_output\n' else echo -e '\n- Audit Result:\n ** FAIL **\n -
      Reason(s) for audit failure:\n$l_output2\n' [ -n '$l_output' ] && echo -e '\n-
      Correctly set:\n$l_output\n' fi } Run the following command to verify systemd-
      journald.service and rsyslog.service are loaded and active: # systemctl list-
      units --type service | grep -P -- '(journald|rsyslog)' Output should be
      similar to: rsyslog.service loaded active running System Logging Service
      systemd-journald.service loaded active running Journal Service
    remediation: >
      Create or edit the file /etc/systemd/journald.conf, or a file in the
      /etc/systemd/journald.conf.d/ directory ending in .conf and add or edit the
      line ForwardToSyslog=yes: Example: # printf '%s\n' 'ForwardToSyslog=yes' >
      /etc/systemd/journald.conf.d/50- journald_forward.conf Restart the systemd-
      journald service: # systemctl restart systemd-journald.service References: 1.
      NIST SP 800-53 Rev. 5: AC-3, AU-2, AU-4, AU-12, MP-2, SI-5 2. SYSTEMD-
      JOURNALD.SERVICE(8) 3. JOURNALD.CONF(5) Additional Information: As noted in
      the systemd-journald man pages, systemd-journald logs may be exported to
      rsyslog either through the process mentioned here, or through a facility like
      systemd- journald.service. There are trade-offs involved in each
      implementation, where ForwardToSyslog will immediately capture all events (and
      forward to an external log server, if properly configured), but may not
      capture all boot-up activities. Mechanisms such as systemd-journald.service,
      on the other hand, will record bootup events, but may delay sending the
      information to rsyslog, leading to the potential for log manipulation prior to
      export. Be aware of the limitations of all tools employed to secure a system.
      The main configuration file /etc/systemd/journald.conf is read before any of
      the custom *.conf files. If there are custom configurations present, they
      override the main configuration parameters.
    references: >
      1. NIST SP 800-53 Rev. 5: AC-3, AU-2, AU-4, AU-12, MP-2, SI-5 2. SYSTEMD-
      JOURNALD.SERVICE(8) 3. JOURNALD.CONF(5) Additional Information: As noted in
      the systemd-journald man pages, systemd-journald logs may be exported to
      rsyslog either through the process mentioned here, or through a facility like
