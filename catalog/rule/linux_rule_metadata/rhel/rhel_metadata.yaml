  - rule_id: rhel.cis.4.permissions_on_etc_crontab_are_configured
    title: "Ensure permissions on /etc/crontab are configured"
    severity: high
    category: linux
    tech_type: rhel
    automation_type: automated
    cis_benchmark: "CIS_RHEL 8_v3.0.0"
    cis_version: "8_v3.0.0"
    cis_control: "4.1.1.2"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      The /etc/crontab file is used by cron to control its own jobs. The commands in
      this item make sure that root is the user and group owner of the file and that
      only the owner can access the file.
    rationale: >
      This file contains information on what system jobs are run by cron. Write
      access to these files could provide unprivileged users with the ability to
      elevate their privileges. Read access to these files could provide users with
      the ability to gain insight on system jobs that run on the system and could
      provide them a way to gain unauthorized privileged access.
    audit_procedure: >
      Run the following command and verify Uid and Gid are both 0/root and Access
      does not grant permissions to group or other : # stat -Lc 'Access: (%a/%A)
      Uid: ( %u/ %U) Gid: ( %g/ %G)' /etc/crontab Access: (600/-rw-------) Uid: ( 0/
      root) Gid: ( 0/ root)
    remediation: >
      Run the following commands to set ownership and permissions on /etc/crontab: #
      chown root:root /etc/crontab # chmod og-rwx /etc/crontab Default Value:
      Access: (644/-rw-r--r--) Uid: ( 0/ root) Gid: ( 0/ root) References: 1. NIST
      SP 800-53 Rev. 5: AC-3, MP-2
    references: >
      1. NIST SP 800-53 Rev. 5: AC-3, MP-2
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_RHEL_8_v3_0_0_4_1_1_2"
      nist_800_53: []
      soc2: []
