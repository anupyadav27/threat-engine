      guidance on applying updates and patches: # apt update # apt upgrade - OR - #
      apt dist-upgrade References: 1. NIST SP 800-53 Rev. 5: SI-2 Additional
      Information: Site policy may mandate a testing period before installation onto
      production systems for available updates. • upgrade - is used to install the
      newest versions of all packages currently installed on the system from the
      sources enumerated in /etc/apt/sources.list - OR -
      /etc/apt/sources.list.d/ubuntu.sources. Packages currently installed with new
      versions available are retrieved and upgraded; under no circumstances are
      currently installed packages removed, or packages not already installed
      retrieved and installed. New versions of currently installed packages that
      cannot be upgraded without changing the install status of another package will
      be left at their current version. An update must be performed first so that
      apt knows that new versions of packages are available. • dist-upgrade - in
      addition to performing the function of upgrade, also intelligently handles
      changing dependencies with new versions of packages; apt has a 'smart'
      conflict resolution system, and it will attempt to upgrade the most important
      packages at the expense of less important ones if necessary. So, dist- upgrade
      command may remove some packages. The /etc/apt/sources.list - OR -
      /etc/apt/sources.list.d/ubuntu.sources file contains a list of locations from
      which to retrieve desired package files. See also apt_preferences(5) for a
      mechanism for overriding the general settings for individual packages.
