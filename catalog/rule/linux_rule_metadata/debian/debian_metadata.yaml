  - rule_id: debian.cis.5.system_accounts_do_not_have_a_valid_login_shell
    title: "Ensure system accounts do not have a valid login shell"
    severity: high
    category: linux
    tech_type: debian
    automation_type: automated
    cis_benchmark: "CIS_DEBIAN 12_v1.1.0"
    cis_version: "12_v1.1.0"
    cis_control: "5.4.2.7"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      There are a number of accounts provided with most distributions that are used
      to manage applications and are not intended to provide an interactive shell.
      Furthermore, a user may add special accounts that are not intended to provide
      an interactive shell.
    rationale: >
      It is important to make sure that accounts that are not being used by regular
      users are prevented from being used to provide an interactive shell. By
      default, most distributions set the password field for these accounts to an
      invalid string, but it is also recommended that the shell field in the
      password file be set to the nologin shell. This prevents the account from
      potentially being used to run any commands.
    audit_procedure: >
      Run the following command to verify system accounts, except for root, halt,
      sync, shutdown or nfsnobody, do not have a valid login shell: #!/usr/bin/env
      bash { l_valid_shells='^($(awk -F\/ '$NF != 'nologin' {print}' /etc/shells |
      sed -rn '/^\//{s,/,\\\\/,g;p}' | paste -s -d '|' - ))$' awk -v
      pat='$l_valid_shells' -F: '($1!~/^(root|halt|sync|shutdown|nfsnobody)$/ &&
      ($3<''$(awk '/^\s*UID_MIN/{print $2}' /etc/login.defs)'' || $3 == 65534) &&
      $(NF) ~ pat) {print 'Service account: \'' $1 '\' has a valid shell: ' $7}'
      /etc/passwd } Nothing should be returned
    remediation: >
      Run the following command to set the shell for any service accounts returned
      by the audit to nologin: # usermod -s $(command -v nologin) <user> Example
      script: #!/usr/bin/env bash { l_valid_shells='^($( awk -F\/ '$NF != 'nologin'
      {print}' /etc/shells | sed -rn '/^\//{s,/,\\\\/,g;p}' | paste -s -d '|' - ))$'
      awk -v pat='$l_valid_shells' -F: '($1!~/^(root|halt|sync|shutdown|nfsnobody)$/
      && ($3<''$(awk '/^\s*UID_MIN/{print $2}' /etc/login.defs)'' || $3 == 65534) &&
      $(NF) ~ pat) {system ('usermod -s ''$(command -v nologin)'' ' $1)}'
      /etc/passwd } References: 1. NIST SP 800-53 Rev. 5: AC-2(5), AC-3, AC-11, MP-2
      Additional Information: The root, sync, shutdown, and halt users are exempted
      from requiring a non-login shell.
    references: >
      1. NIST SP 800-53 Rev. 5: AC-2(5), AC-3, AC-11, MP-2 Additional Information:
      The root, sync, shutdown, and halt users are exempted from requiring a non-
      login shell.
