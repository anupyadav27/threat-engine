  - rule_id: debian.cis.1.gpg_keys_are_configured
    title: "Ensure GPG keys are configured"
    severity: high
    category: linux
    tech_type: debian
    automation_type: manual
    cis_benchmark: "CIS_DEBIAN 12_v1.1.0"
    cis_version: "12_v1.1.0"
    cis_control: "1.2.1.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Most package managers implement GPG key signing to verify package integrity
      during installation.
    rationale: >
      It is important to ensure that updates are obtained from a valid source to
      protect against spoofing that could lead to the inadvertent installation of
      malware on the system.
    audit_procedure: >
      Verify GPG keys are configured correctly for your package manager: # apt-key
      list Note: • apt-key list is deprecated. Manage keyring files in trusted.gpg.d
      instead (see apt-key(8)). • With the deprecation of apt-key it is recommended
      to use the Signed-By option in sources.list to require a repository to pass
      apt-secure(8) verification with a certain set of keys rather than all trusted
      keys apt has configured. - OR - 1. Run the following script and verify GPG
      keys are configured correctly for your package manager: #! /usr/bin/env bash {
      for file in /etc/apt/trusted.gpg.d/*.{gpg,asc}
      /etc/apt/sources.list.d/*.{gpg,asc} ; do if [ -f '$file' ]; then echo -e
      'File: $file' gpg --list-packets '$file' 2>/dev/null | awk '/keyid/ &&
      !seen[$NF]++ {print 'keyid:', $NF}' gpg --list-packets '$file' 2>/dev/null |
      awk '/Signed-By:/ {print 'signed-by:', $NF}' echo -e fi done } 2. REVIEW and
      VERIFY to ensure that GPG keys are configured correctly for your package
      manager IAW site policy.
    remediation: >
      Update your package manager GPG keys in accordance with site policy.
      References: 1. NIST SP 800-53 Rev. 5: SI-2 2.
      https://manpages.debian.org/stretch/apt/sources.list.5.en.html
    references: >
