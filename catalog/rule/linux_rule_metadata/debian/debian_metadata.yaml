  - rule_id: debian.cis.4.nftables_rules_are_permanent
    title: "Ensure nftables rules are permanent"
    severity: high
    category: linux
    tech_type: debian
    automation_type: automated
    cis_benchmark: "CIS_DEBIAN 12_v1.1.0"
    cis_version: "12_v1.1.0"
    cis_control: "4.3.10"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      nftables is a subsystem of the Linux kernel providing filtering and
      classification of network packets/datagrams/frames. The nftables service reads
      the /etc/nftables.conf file for a nftables file or files to include in the
      nftables ruleset. A nftables ruleset containing the input, forward, and output
      base chains allow network traffic to be filtered. Note: Saving the script and
      following the instruction in the Configure nftables section overview will
      implement the rules in the configure nftable section, open port 22(ssh) from
      anywhere, and applies nftables ruleset on boot.
    rationale: >
      Changes made to nftables ruleset only affect the live system, you will also
      need to configure the nftables ruleset to apply on boot
    audit_procedure: >
      Run the following commands to verify that input, forward, and output base
      chains are configured to be applied to a nftables ruleset on boot: Run the
      following command to verify the input base chain: # [ -n '$(grep -E
      '^\s*include' /etc/nftables.conf)' ] && awk '/hook input/,/}/' $(awk '$1 ~
      /^\s*include/ { gsub('\'','',$2);print $2 }' /etc/nftables.conf) Output should
      be similar to: type filter hook input priority 0; policy drop; # Ensure
      loopback traffic is configured iif 'lo' accept ip saddr 127.0.0.0/8 counter
      packets 0 bytes 0 drop ip6 saddr ::1 counter packets 0 bytes 0 drop # Ensure
      established connections are configured ip protocol tcp ct state established
      accept ip protocol udp ct state established accept # Accept port 22(SSH)
      traffic from anywhere tcp dport ssh accept Review the input base chain to
      ensure that it follows local site policy Run the following command to verify
      the forward base chain: # [ -n '$(grep -E '^\s*include' /etc/nftables.conf)' ]
      && awk '/hook forward/,/}/' $(awk '$1 ~ /^\s*include/ { gsub('\'','',$2);print
      $2 }' /etc/nftables.conf) Output should be similar to: # Base chain for hook
      forward named forward (Filters forwarded network packets) chain forward { type
      filter hook forward priority 0; policy drop; } Review the forward base chain
      to ensure that it follows local site policy. Run the following command to
      verify the forward base chain: # [ -n '$(grep -E '^\s*include'
      /etc/nftables.conf)' ] && awk '/hook output/,/}/' $(awk '$1 ~ /^\s*include/ {
      gsub('\'','',$2);print $2 }' /etc/nftables.conf) Output should be similar to:
      # Base chain for hook output named output (Filters outbound network packets)
      chain output { type filter hook output priority 0; policy drop; # Ensure
      outbound and established connections are configured ip protocol tcp ct state
      established,related,new accept ip protocol udp ct state
      established,related,new accept } Review the output base chain to ensure that
      it follows local site policy.
    remediation: >
      Edit the /etc/nftables.conf file and un-comment or add a line with include
      <Absolute path to nftables rules file> for each nftables file you want
      included in the nftables ruleset on boot Example: # vi /etc/nftables.conf Add
      the line: include '/etc/nftables.rules' References: 1. NIST SP 800-53 Rev. 5:
      CA-9, SC-7
    references: >
      1. NIST SP 800-53 Rev. 5: CA-9, SC-7
    impact: >
      
    compliance_mappings:
