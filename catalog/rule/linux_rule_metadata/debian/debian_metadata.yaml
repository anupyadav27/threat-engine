      inet filter input iif lo accept # nft add rule inet filter input ip saddr
      127.0.0.0/8 counter drop - IF - IPv6 is enabled on the system: Run the
      following command to implement the IPv6 loopback rule: # nft add rule inet
      filter input ip6 saddr ::1 counter drop References: 1. NIST SP 800-53 Rev. 5:
