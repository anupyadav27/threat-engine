  - rule_id: debian.cis.2.mail_transfer_agent_is_configured_for_local_only
    title: "Ensure mail transfer agent is configured for local-only mode"
    severity: high
    category: linux
    tech_type: debian
    automation_type: automated
    cis_benchmark: "CIS_DEBIAN 12_v1.1.0"
    cis_version: "12_v1.1.0"
    cis_control: "2.1.21"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Mail Transfer Agents (MTA), such as sendmail and Postfix, are used to listen
      for incoming mail and transfer the messages to the appropriate user or mail
      server. If the system is not intended to be a mail server, it is recommended
      that the MTA be configured to only process local mail.
    rationale: >
      The software for all Mail Transfer Agents is complex and most have a long
      history of security issues. While it is important to ensure that the system
      can process local mail messages, it is not necessary to have the MTA's daemon
      listening on a port unless the server is intended to be a mail server that
      receives and processes mail from other systems.
    audit_procedure: >
      Run the following script to verify that the MTA is not listening on any non-
      loopback address ( 127.0.0.1 or ::1 #!/usr/bin/env bash { a_output=();
      a_output2=(); a_port_list=('25' '465' '587') for l_port_number in
      '${a_port_list[@]}'; do if ss -plntu | grep -P -- ':''$l_port_number''\b' |
      grep -Pvq -- '\h+(127\.0\.0\.1|\[?::1\]?):''$l_port_number''\b'; then
      a_output2+=(' - Port \'$l_port_number\' is listening on a non- loopback
      network interface') else a_output+=(' - Port \'$l_port_number\' is not
      listening on a non- loopback network interface') fi done if command -v
      postconf &> /dev/null; then l_interfaces='$(postconf -n inet_interfaces)' elif
      command -v exim &> /dev/null; then l_interfaces='$(exim -bP local_interfaces)'
      elif command -v sendmail &> /dev/null; then l_interfaces='$(grep -i '0
      DaemonPortOptions=' /etc/mail/sendmail.cr | grep -oP '?<=Addr=)[^,+]+')' fi if
      [ -n '$l_interfaces' ]; then if grep -Pqi '\ball\b' <<< '$l_interfaces'; then
      a_output2+=(' - MTA is bound to all network interfaces') elif ! grep -Pqi
      '(inet_interfaces\h*=\h*)?(0\.0\.0\.0|::1|loopback- only)' <<<
      '$l_interfaces'; then a_output2+=(' - MTA is bound to a network interface' '
      \'$l_interfaces\'') else a_output+=(' - MTA is not bound to a non loopback
      network interface' ' \'$l_interfaces\'') fi else a_output+=(' - MTA not
      detected or in use') fi if [ '${#a_output2[@]}' -le 0 ]; then printf '%s\n' ''
      '- Audit Result:' ' ** PASS **' '${a_output[@]}' else printf '%s\n' '' '-
      Audit Result:' ' ** FAIL **' ' * Reasons for audit failure *'
      '${a_output2[@]}' '' [ '${#a_output[@]}' -gt 0 ] && printf '%s\n' '- Correctly
      set:' '${a_output[@]}' fi }
    remediation: >
      Edit /etc/postfix/main.cf and add the following line to the RECEIVING MAIL
      section. If the line already exists, change it to look like the line below:
      inet_interfaces = loopback-only Run the following command to restart postfix:
      # systemctl restart postfix Note: • This recommendation is designed around the
      postfix mail server. • Depending on your environment you may have an
      alternative MTA installed such as exim4. If this is the case consult the
      documentation for your installed MTA to configure the recommended state.
      References: 1. NIST SP 800-53 Rev. 5: CM-7
    references: >
      1. NIST SP 800-53 Rev. 5: CM-7
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_DEBIAN_12_v1_1_0_2_1_21"
      nist_800_53: []
      soc2: []
