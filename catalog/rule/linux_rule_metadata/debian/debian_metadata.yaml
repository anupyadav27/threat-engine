      cis:
        - "CIS_DEBIAN_12_v1_1_0_5_3_3_4_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_debian_12_v1_1_0_5_3_3_4_3"
    metadata_source: generated
