  - rule_id: debian.cis.1.nodev_option_set_on_tmp_partition
    title: "Ensure nodev option set on /tmp partition"
    severity: high
    category: linux
    tech_type: debian
    automation_type: automated
    cis_benchmark: "CIS_DEBIAN 12_v1.1.0"
    cis_version: "12_v1.1.0"
    cis_control: "1.1.2.1.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      The nodev mount option specifies that the filesystem cannot contain special
      devices.
    rationale: >
      Since the /tmp filesystem is not intended to support devices, set this option
      to ensure that users cannot create a block or character special devices in
      /tmp.
    audit_procedure: >
      - IF - a separate partition exists for /tmp, verify that the nodev option is
      set. Run the following command to verify that the nodev mount option is set.
      Example: # findmnt -kn /tmp | grep -v nodev Nothing should be returned
    remediation: >
      - IF - a separate partition exists for /tmp. Edit the /etc/fstab file and add
      nodev to the fourth field (mounting options) for the /tmp partition. Example:
      <device> /tmp <fstype> defaults,rw,nosuid,nodev,noexec,relatime 0 0 Run the
      following command to remount /tmp with the configured options: # mount -o
      remount /tmp References: 1. See the fstab(5) manual page for more information.
      2. NIST SP 800-53 Rev. 5: CM-7
    references: >
      1. See the fstab(5) manual page for more information. 2. NIST SP 800-53 Rev.
