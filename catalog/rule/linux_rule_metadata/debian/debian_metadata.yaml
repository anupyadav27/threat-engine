  - rule_id: debian.cis.4.ufw_loopback_traffic_is_configured
    title: "Ensure ufw loopback traffic is configured"
    severity: high
    category: linux
    tech_type: debian
    automation_type: automated
    cis_benchmark: "CIS_DEBIAN 12_v1.1.0"
    cis_version: "12_v1.1.0"
    cis_control: "4.2.4"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Configure the loopback interface to accept traffic. Configure all other
      interfaces to deny traffic to the loopback network (127.0.0.0/8 for IPv4 and
      ::1/128 for IPv6).
    rationale: >
      Loopback traffic is generated between processes on machine and is typically
      critical to operation of the system. The loopback interface is the only place
      that loopback network (127.0.0.0/8 for IPv4 and ::1/128 for IPv6) traffic
      should be seen, all other interfaces should ignore traffic on this network as
      an anti-spoofing measure.
    audit_procedure: >
      Run the following command and verify loopback interface to accept traffic: #
      grep -P -- 'lo|127.0.0.0' /etc/ufw/before.rules Output includes: # allow all
      on loopback -A ufw-before-input -i lo -j ACCEPT -A ufw-before-output -o lo -j
      ACCEPT Run the following command and verify all other interfaces deny traffic
      to the loopback network (127.0.0.0/8 for IPv4 and ::1/128 for IPv6) # ufw
      status verbose To Action From -- ------ ---- Anywhere DENY IN 127.0.0.0/8
      Anywhere (v6) DENY IN ::1 Note: ufw status only shows rules added with ufw and
      not the rules found in the /etc/ufw rules files where allow all on loopback is
      configured by default.
    remediation: >
      Run the following commands to configure the loopback interface to accept
      traffic: # ufw allow in on lo # ufw allow out on lo Run the following commands
      to configure all other interfaces to deny traffic to the loopback network: #
      ufw deny in from 127.0.0.0/8 # ufw deny in from ::1 Default Value: # allow all
      on loopback -A ufw-before-input -i lo -j ACCEPT -A ufw-before-output -o lo -j
      ACCEPT References: 1. NIST SP 800-53 Rev. 5: SC-7 2.
      https://manpages.ubuntu.com/manpages/jammy/en/man8/ufw-framework.8.html
    references: >
      1. NIST SP 800-53 Rev. 5: SC-7 2.
      https://manpages.ubuntu.com/manpages/jammy/en/man8/ufw-framework.8.html
    impact: >
      
