  - rule_id: debian.cis.2.nis_client_is_not_installed
    title: "Ensure NIS Client is not installed"
    severity: high
    category: linux
    tech_type: debian
    automation_type: automated
    cis_benchmark: "CIS_DEBIAN 12_v1.1.0"
    cis_version: "12_v1.1.0"
    cis_control: "2.2.1"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The Network Information Service (NIS), formerly known as Yellow Pages, is a
      client- server directory service protocol used to distribute system
      configuration files. The NIS client was used to bind a machine to an NIS
      server and receive the distributed configuration files.
    rationale: >
      The NIS service is inherently an insecure system that has been vulnerable to
      DOS attacks, buffer overflows and has poor authentication for querying NIS
      maps. NIS generally has been replaced by such protocols as Lightweight
      Directory Access Protocol (LDAP). It is recommended that the service be
      removed. Impact: Many insecure service clients are used as troubleshooting
      tools and in testing environments. Uninstalling them can inhibit capability to
      test and troubleshoot. If they are required it is advisable to remove the
      clients after use to prevent accidental or intentional misuse.
    audit_procedure: >
      Verify nis is not installed. Use the following command to provide the needed
      information: # dpkg-query -s nis &>/dev/null && echo 'nis is installed'
      Nothing should be returned.
    remediation: >
      Uninstall nis: # apt purge nis References: 1. NIST SP 800-53 Rev. 5: CM-7,
      CM-11
    references: >
      1. NIST SP 800-53 Rev. 5: CM-7, CM-11
