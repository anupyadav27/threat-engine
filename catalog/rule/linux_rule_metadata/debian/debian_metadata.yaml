  - rule_id: debian.cis.6.audit_configuration_files_mode_is_configured
    title: "Ensure audit configuration files mode is configured"
    severity: medium
    category: linux
    tech_type: debian
    automation_type: automated
    cis_benchmark: "CIS_DEBIAN 12_v1.1.0"
    cis_version: "12_v1.1.0"
    cis_control: "6.2.4.5"
    cis_section: "6"
    profile_applicability: "Level 2"
    description: >
      Audit configuration files control auditd and what events are audited.
    rationale: >
      Access to the audit configuration files could allow unauthorized personnel to
      prevent the auditing of critical events. Misconfigured audit configuration
      files may prevent the auditing of critical events or impact the system's
      performance by overwhelming the audit log. Misconfiguration of the audit
      configuration files may also make it more difficult to establish and
      investigate events relating to an incident.
    audit_procedure: >
      Run the following script to verify that the audit configuration files are mode
      0640 or more restrictive: #!/usr/bin/env bash { l_output='' l_output2=''
      l_perm_mask='0137' l_maxperm='$( printf '%o' $(( 0777 & ~$l_perm_mask )) )'
      while IFS= read -r -d $'\0' l_fname; do l_mode=$(stat -Lc '%#a' '$l_fname') if
      [ $(( '$l_mode' & '$l_perm_mask' )) -gt 0 ]; then l_output2='$l_output2\n -
      file: \'$l_fname\' is mode: \'$l_mode\' (should be mode: \'$l_maxperm\' or
      more restrictive)' fi done < <(find /etc/audit/ -type f \( -name '*.conf' -o
      -name '*.rules' \) -print0) if [ -z '$l_output2' ]; then echo -e '\n- Audit
      Result:\n ** PASS **\n - All audit configuration files are mode:
      \'$l_maxperm\' or more restrictive' else echo -e '\n- Audit Result:\n ** FAIL
      **\n$l_output2' fi }
    remediation: >
      Run the following command to remove more permissive mode than 0640 from the
      audit configuration files: # find /etc/audit/ -type f \( -name '*.conf' -o
      -name '*.rules' \) -exec chmod u-x,g-wx,o-rwx {} + References: 1. NIST SP
      800-53 Rev. 5: AU-3
    references: >
      1. NIST SP 800-53 Rev. 5: AU-3
    impact: >
      
    compliance_mappings:
      cis:
