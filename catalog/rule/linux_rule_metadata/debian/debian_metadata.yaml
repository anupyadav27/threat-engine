  - rule_id: debian.cis.6.journald_log_file_rotation_is_configured
    title: "Ensure journald log file rotation is configured"
    severity: high
    category: linux
    tech_type: debian
    automation_type: manual
    cis_benchmark: "CIS_DEBIAN 12_v1.1.0"
    cis_version: "12_v1.1.0"
    cis_control: "6.1.1.3"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Journald includes the capability of rotating log files regularly to avoid
      filling up the system with logs or making the logs unmanageably large. The
      file /etc/systemd/journald.conf is the configuration file used to specify how
      logs generated by Journald should be rotated.
    rationale: >
      By keeping the log files smaller and more manageable, a system administrator
      can easily archive these files to another system and spend less time looking
      through inordinately large log files.
    audit_procedure: >
      Review the systemd-journald configuration. Verify logs are rotated according
      to site policy. The specific parameters for log rotation are: Run the
      following script and review the output to ensure logs are rotated according to
      site policy: #!/usr/bin/env bash { a_output=() a_output2=()
      l_analyze_cmd='$(readlink -f /bin/systemd-analyze)'
      l_systemd_config_file='systemd/journald.conf'
      a_parameters=('SystemMaxUse=^.+$' 'SystemKeepFree=^.+$' 'RuntimeMaxUse=^.+$'
      'RuntimeKeepFree=^.+$' 'MaxFileSec=^.+$') f_config_file_parameter_chk() {
      l_used_parameter_setting='' while IFS= read -r l_file; do l_file='$(tr -d '# '
      <<< '$l_file')' l_used_parameter_setting='$(grep -PHs --
      '^\h*''$l_parameter_name''\b' '$l_file' | tail -n 1)' [ -n
      '$l_used_parameter_setting' ] && break done < <($l_analyze_cmd cat-config
      '$l_systemd_config_file' | tac | grep -Pio '^\h*#\h*\/[^#\n\r\h]+\.conf\b') if
      [ -n '$l_used_parameter_setting' ]; then while IFS=: read -r l_file_name
      l_file_parameter; do while IFS='=' read -r l_file_parameter_name
      l_file_parameter_value; do if grep -Pq -- '$l_parameter_value' <<<
      '$l_file_parameter_value'; then a_output+=(' - Parameter:
      \'${l_file_parameter_name// /}\'' \ ' set to: \'${l_file_parameter_value//
      /}\'' \ ' in the file: \'$l_file_name\'') fi done <<< '$l_file_parameter' done
      <<< '$l_used_parameter_setting' else a_output2+=(' - Parameter:
      \'$l_parameter_name\' is not set in an included file' \ ' *** Note: ***' '
      \'$l_parameter_name\' May be set in a file that's ignored by load procedure')
      fi } for l_input_parameter in '${a_parameters[@]}'; do while IFS='=' read -r
      l_parameter_name l_parameter_value; do # Assess and check parameters
      l_parameter_name='${l_parameter_name// /}';
      l_parameter_value='${l_parameter_value// /}'
      l_value_out='${l_parameter_value//-/ through }';
      l_value_out='${l_value_out//|/ or }' l_value_out='$(tr -d '(){}' <<<
      '$l_value_out')' f_config_file_parameter_chk done <<< '$l_input_parameter'
      done if [ '${#a_output2[@]}' -le 0 ]; then printf '%s\n' '' '- Audit Result:'
      ' ** PASS **' '${a_output[@]}' '' else printf '%s\n' '' '- Audit Result:' ' **
      FAIL **' ' - Reason(s) for audit failure:' '${a_output2[@]}' [
      '${#a_output[@]}' -gt 0 ] && printf '%s\n' '' '- Correctly set:'
      '${a_output[@]}' '' fi }
    remediation: >
      Edit /etc/systemd/journald.conf or a file ending in .conf the
      /etc/systemd/journald.conf.d/ directory. Set the following parameters in the
      [Journal] section to ensure logs are rotated according to site policy. The
      settings should be carefully understood as there are specific edge cases and
      prioritization of parameters. Example Configuration : [Journal]
      SystemMaxUse=1G SystemKeepFree=500M RuntimeMaxUse=200M RuntimeKeepFree=50M
      MaxFileSec=1month Example script to create systemd drop-in configuration file:
      { a_settings=('SystemMaxUse=1G' 'SystemKeepFree=500M' 'RuntimeMaxUse=200M'
      'RuntimeKeepFree=50M' 'MaxFileSec=1month') [ ! -d
      /etc/systemd/journald.conf.d/ ] && mkdir /etc/systemd/journald.conf.d/ if grep
      -Psq -- '^\h*\[Journal\]' /etc/systemd/journald.conf.d/60- journald.conf; then
      printf '%s\n' '' '${a_settings[@]}' >> /etc/systemd/journald.conf.d/60-
      journald.conf else printf '%s\n' '' '[Journal]' '${a_settings[@]}' >>
      /etc/systemd/journald.conf.d/60-journald.conf fi } Note: • If these settings
      appear in a canonically later file, or later in the same file, the setting
      will be overwritten • Logfile size and configuration to move logfiles to a
      remote log server should be accounted for when configuring these settings Run
      to following command to update the parameters in the service: # systemctl
      reload-or-restart systemd-journald References: 1. NIST SP 800-53 Rev. 5: AU-2,
      AU-7, AU-12 Additional Information: See man 5 journald.conf for detailed
      information regarding the parameters in use.
    references: >
      1. NIST SP 800-53 Rev. 5: AU-2, AU-7, AU-12 Additional Information: See man 5
      journald.conf for detailed information regarding the parameters in use.
    impact: >
      
