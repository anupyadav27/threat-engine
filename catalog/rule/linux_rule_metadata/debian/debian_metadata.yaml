  - rule_id: debian.cis.6.audit_backlog_limit_is_sufficient
    title: "Ensure audit_backlog_limit is sufficient"
    severity: medium
    category: linux
    tech_type: debian
    automation_type: automated
    cis_benchmark: "CIS_DEBIAN 12_v1.1.0"
    cis_version: "12_v1.1.0"
    cis_control: "6.2.1.4"
    cis_section: "6"
    profile_applicability: "Level 2"
    description: >
      In the kernel-level audit subsystem, a socket buffer queue is used to hold
      audit events. Whenever a new audit event is received, it is logged and
      prepared to be added to this queue. The kernel boot parameter
      audit_backlog_limit=N, with N representing the amount of messages, will ensure
      that a queue cannot grow beyond a certain size. If an audit event is logged
      which would grow the queue beyond this limit, then a failure occurs and is
      handled according to the system configuration
    rationale: >
      If an audit event is logged which would grow the queue beyond the
      audit_backlog_limit, then a failure occurs, auditd records will be lost, and
      potential malicious activity could go undetected.
    audit_procedure: >
      Run the following command and verify the audit_backlog_limit= parameter is
      set: # find /boot -type f -name 'grub.cfg' -exec grep -Ph -- '^\h*linux' {} +
      | grep -Pv 'audit_backlog_limit=\d+\b' Nothing should be returned.
    remediation: >
      Edit /etc/default/grub and add audit_backlog_limit=N to GRUB_CMDLINE_LINUX.
      The recommended size for N is 8192 or larger. Example:
      GRUB_CMDLINE_LINUX='audit_backlog_limit=8192' Run the following command to
      update the grub2 configuration: # update-grub Default Value: if
      audit_backlog_limit is not set, the system defaults to audit_backlog_limit=64
      References: 1. NIST SP 800-53 Rev. 5: AU-2, AU-3, AU-12
    references: >
      1. NIST SP 800-53 Rev. 5: AU-2, AU-3, AU-12
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_DEBIAN_12_v1_1_0_6_2_1_4"
