  - rule_id: debian.cis.4.ufw_firewall_rules_exist_for_all_open_ports
    title: "Ensure ufw firewall rules exist for all open ports"
    severity: high
    category: linux
    tech_type: debian
    automation_type: automated
    cis_benchmark: "CIS_DEBIAN 12_v1.1.0"
    cis_version: "12_v1.1.0"
    cis_control: "4.2.6"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Services and ports can be accepted or explicitly rejected. Note: • Changing
      firewall settings while connected over network can result in being locked out
      of the system • The remediation command opens up the port to traffic from all
      sources. Consult ufw documentation and set any restrictions in compliance with
      site policy
    rationale: >
      To reduce the attack surface of a system, all services and ports should be
      blocked unless required. • Any ports that have been opened on non-loopback
      addresses need firewall rules to govern traffic. • Without a firewall rule
      configured for open ports, the default firewall policy will drop all packets
      to these ports. • Required ports should have a firewall rule created to allow
      approved connections in accordance with local site policy. • Unapproved ports
      should have an explicit deny rule created.
    audit_procedure: >
      Run the following script to verify a firewall rule exists for all open ports:
      #!/usr/bin/env bash { unset a_ufwout;unset a_openports while read -r
      l_ufwport; do [ -n '$l_ufwport' ] && a_ufwout+=('$l_ufwport') done < <(ufw
      status verbose | grep -Po '^\h*\d+\b' | sort -u) while read -r l_openport; do
      [ -n '$l_openport' ] && a_openports+=('$l_openport') done < <(ss -tuln | awk
      '($5!~/%lo:/ && $5!~/127.0.0.1:/ && $5!~/\[?::1\]?:/) {split($5, a, ':');
      print a[2]}' | sort -u) a_diff=('$(printf '%s\n' '${a_openports[@]}'
      '${a_ufwout[@]}' '${a_ufwout[@]}' | sort | uniq -u)') if [[ -n '${a_diff[*]}'
      ]]; then echo -e '\n- Audit Result:\n ** FAIL **\n- The following port(s)
      don't have a rule in UFW: $(printf '%s\n' \\n'${a_diff[*]}')\n- End List' else
      echo -e '\n - Audit Passed -\n- All open ports have a rule in UFW\n' fi }
    remediation: >
      For each port identified in the audit which does not have a firewall rule,
      evaluate the service listening on the port and add a rule for accepting or
      denying inbound connections in accordance with local site policy: Examples: #
      ufw allow in <port>/<tcp or udp protocol> # ufw deny in <port>/<tcp or udp
      protocol> Note: Examples create rules for from any, to any. More specific
      rules should be concentered when allowing inbound traffic e.g only traffic
      from this network. Example to allow traffic on port 443 using the tcp protocol
      from the 192.168.1.0 network: ufw allow from 192.168.1.0/24 to any proto tcp
      port 443 References: 1. NIST SP 800-53 Rev. 5: SC-7
    references: >
      1. NIST SP 800-53 Rev. 5: SC-7
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_DEBIAN_12_v1_1_0_4_2_6"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_debian_12_v1_1_0_4_2_6"
    metadata_source: generated
