      Run the following script and verify no results are returned: #!/usr/bin/env
      bash { while read -r l_count l_uid; do if [ '$l_count' -gt 1 ]; then echo -e
      'Duplicate UID: \'$l_uid\' Users: \'$(awk -F: '($3 == n) { print $1 }'
      n=$l_uid /etc/passwd | xargs)\'' fi done < <(cut -f3 -d':' /etc/passwd | sort
      -n | uniq -c) }
    remediation: >
      Based on the results of the audit script, establish unique UIDs and review all
      files owned by the shared UIDs to determine which UID they are supposed to
      belong to. References: 1. NIST SP 800-53 Rev. 5: CM-1, CM-2, CM-6, CM-7, IA-5
      MITRE ATT&CK Mappings: Techniques / Sub- techniques Tactics Mitigations T1078,
