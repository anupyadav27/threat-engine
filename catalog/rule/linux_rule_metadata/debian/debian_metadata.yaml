      following command to verify network traffic from an iPv4 loopback interface is
      configured to drop: # nft list ruleset | awk '/hook input/,/}/' | grep 'ip
      saddr' Example output: ip saddr 127.0.0.0/8 counter packets 0 bytes 0 drop -
      IF - IPv6 is enabled on the system: Run the following command to verify
      network traffic from an iPv6 loopback interface is configured to drop: # nft
      list ruleset | awk '/hook input/,/}/' | grep 'ip6 saddr' Example output: ip6
      saddr ::1 counter packets 0 bytes 0 drop
    remediation: >
