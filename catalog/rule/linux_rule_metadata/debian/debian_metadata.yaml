      Use of a unique, complex passwords helps to increase the time and resources
      required to compromise the password.
    audit_procedure: >
      Run the following command to verify that pam_pwhistory is enabled: # grep -P
      -- '\bpam_pwhistory\.so\b' /etc/pam.d/common-password Output should be similar
      to: password requisite pam_pwhistory.so remember=24 enforce_for_root
      try_first_pass use_authtok
    remediation: >
      Run the following script to verify the pam_pwquality.so line exists in a pam-
      auth- update profile: # grep -P -- '\bpam_pwhistory\.so\b' /usr/share/pam-
