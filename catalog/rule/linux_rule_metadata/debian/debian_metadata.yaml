  - rule_id: debian.cis.6.events_that_modify_the_system_s_network
    title: "Ensure events that modify the system's network environment are collected"
    severity: medium
    category: linux
    tech_type: debian
    automation_type: automated
    cis_benchmark: "CIS_DEBIAN 12_v1.1.0"
    cis_version: "12_v1.1.0"
    cis_control: "6.2.3.5"
    cis_section: "6"
    profile_applicability: "Level 2"
    description: >
      Record changes to network environment files or system calls. The below
      parameters monitors the following system calls, and write an audit event on
      system call exit: • sethostname - set the systems host name • setdomainname -
      set the systems domain name The files being monitored are: • /etc/issue and
      /etc/issue.net - messages displayed pre-login • /etc/hosts - file containing
      host names and associated IP addresses • /etc/networks - symbolic names for
      networks • /etc/network/ - directory containing network interface scripts and
      configurations files • /etc/netplan/ - central location for YAML networking
      configurations files
    rationale: >
      Monitoring system events that change network environments, such as sethostname
      and setdomainname, helps identify unauthorized alterations to host and domain
      names, which could compromise security settings reliant on these names.
      Changes to /etc/hosts can signal unauthorized attempts to alter machine
      associations with IP addresses, potentially redirecting users and processes to
      unintended destinations. Surveillance of /etc/issue and /etc/issue.net is
      crucial to detect intruders inserting false information to deceive users.
      Monitoring /etc/network/ reveals modifications to network interfaces or
      scripts that may jeopardize system availability or security. Additionally,
      tracking changes in the /etc/netplan/ directory ensures swift detection of
      unauthorized adjustments to network configurations. All audit records should
      be appropriately tagged for relevance
    audit_procedure: >
      On disk configuration Run the following commands to check the on disk rules: #
      awk '/^ *-a *always,exit/ \ &&/ -F *arch=b(32|64)/ \ &&/ -S/ \
      &&(/sethostname/ \ ||/setdomainname/) \ &&(/ key= *[!-~]* *$/||/ -k *[!-~]*
      *$/)' /etc/audit/rules.d/*.rules # awk '/^ *-w/ \ &&(/\/etc\/issue/ \
      ||/\/etc\/issue.net/ \ ||/\/etc\/hosts/ \ ||/\/etc\/network/ \
      ||/\/etc\/netplan/) \ &&/ +-p *wa/ \ &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)'
      /etc/audit/rules.d/*.rules Verify the output matches: -a always,exit -F
      arch=b64 -S sethostname,setdomainname -k system-locale -a always,exit -F
      arch=b32 -S sethostname,setdomainname -k system-locale -w /etc/issue -p wa -k
      system-locale -w /etc/issue.net -p wa -k system-locale -w /etc/hosts -p wa -k
      system-locale -w /etc/networks -p wa -k system-locale -w /etc/network -p wa -k
      system-locale -w /etc/netplan -p wa -k system-locale Running configuration Run
      the following command to check loaded rules: # auditctl -l | awk '/^ *-a
      *always,exit/ \ &&/ -F *arch=b(32|64)/ \ &&/ -S/ \ &&(/sethostname/ \
      ||/setdomainname/) \ &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)' # auditctl -l |
      awk '/^ *-w/ \ &&(/\/etc\/issue/ \ ||/\/etc\/issue.net/ \ ||/\/etc\/hosts/ \
      ||/\/etc\/network/ \ ||/\/etc\/netplan/) \ &&/ +-p *wa/ \ &&(/ key= *[!-~]*
      *$/||/ -k *[!-~]* *$/)' Verify the output includes: -a always,exit -F arch=b64
      -S sethostname,setdomainname -F key=system-locale -a always,exit -F arch=b32
      -S sethostname,setdomainname -F key=system-locale -w /etc/issue -p wa -k
      system-locale -w /etc/issue.net -p wa -k system-locale -w /etc/hosts -p wa -k
      system-locale -w /etc/networks -p wa -k system-locale -w /etc/network -p wa -k
      system-locale -w /etc/netplan -p wa -k system-locale
    remediation: >
