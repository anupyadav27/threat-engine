  - rule_id: debian.cis.4.ufw_default_deny_firewall_policy
    title: "Ensure ufw default deny firewall policy"
    severity: high
    category: linux
    tech_type: debian
    automation_type: automated
    cis_benchmark: "CIS_DEBIAN 12_v1.1.0"
    cis_version: "12_v1.1.0"
    cis_control: "4.2.7"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      A default deny policy on connections ensures that any unconfigured network
      usage will be rejected. Note: Any port or protocol without a explicit allow
      before the default deny will be blocked
    rationale: >
      With a default accept policy the firewall will accept any packet that is not
      configured to be denied. It is easier to allow list acceptable usage than to
      deny list unacceptable usage. Impact: Any port and protocol not explicitly
      allowed will be blocked. The following rules should be considered before
      applying the default deny. ufw allow out http ufw allow out https ufw allow
      out ntp # Network Time Protocol ufw allow out to any port 53 # DNS ufw allow
      out to any port 853 # DNS over TLS ufw logging on
    audit_procedure: >
      Run the following command and verify that the default policy for incoming ,
      outgoing , and routed directions is deny , reject , or disabled : # ufw status
      verbose | grep Default: Example output: Default: deny (incoming), deny
      (outgoing), disabled (routed)
    remediation: >
      Run the following commands to implement a default deny policy: # ufw default
      deny incoming # ufw default deny outgoing # ufw default deny routed
      References: 1. NIST SP 800-53 Rev. 5: SC-7
    references: >
      1. NIST SP 800-53 Rev. 5: SC-7
    impact: >
