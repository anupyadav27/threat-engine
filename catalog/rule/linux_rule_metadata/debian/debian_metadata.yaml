  - rule_id: debian.cis.1.address_space_layout_randomization_is_enabled
    title: "Ensure address space layout randomization is enabled"
    severity: high
    category: linux
    tech_type: debian
    automation_type: automated
    cis_benchmark: "CIS_DEBIAN 12_v1.1.0"
    cis_version: "12_v1.1.0"
    cis_control: "1.5.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Address space layout randomization (ASLR) is an exploit mitigation technique
      which randomly arranges the address space of key data areas of a process.
    rationale: >
      Randomly placing virtual memory regions will make it difficult to write memory
      page exploits as the memory placement will be consistently shifting.
    audit_procedure: >
      Run the following script to verify the following kernel parameter is set in
      the running configuration and correctly loaded from a kernel parameter
      configuration file: • kernel.randomize_va_space is set to 2 Note: kernel
      parameters are loaded by file and parameter order precedence. The following
      script observes this precedence as part of the auditing procedure. The
      parameters being checked may be set correctly in a file. If that file is
      superseded, the parameter is overridden by an incorrect setting later in that
      file, or in a canonically later file, that 'correct' setting will be ignored
      both by the script and by the system during a normal kernel parameter load
      sequence. #!/usr/bin/env bash { a_output=(); a_output2=();
      a_parlist=(kernel.randomize_va_space=2) l_ufwscf='$([ -f /etc/default/ufw ] &&
      awk -F= '/^\s*IPT_SYSCTL=/ {print $2}' /etc/default/ufw)'
      f_kernel_parameter_chk() { l_running_parameter_value='$(sysctl
      '$l_parameter_name' | awk -F= '{print $2}' | xargs)' # Check running
      configuration if grep -Pq -- '\b''$l_parameter_value''\b' <<<
      '$l_running_parameter_value'; then a_output+=(' - \'$l_parameter_name\' is
      correctly set to \'$l_running_parameter_value\'' \ ' in the running
      configuration') else a_output2+=(' - \'$l_parameter_name\' is incorrectly set
      to \'$l_running_parameter_value\'' \ ' in the running configuration' \ ' and
      should have a value of: \'$l_value_out\'') fi unset A_out; declare -A A_out #
      Check durable setting (files) while read -r l_out; do if [ -n '$l_out' ]; then
      if [[ $l_out =~ ^\s*# ]]; then l_file='${l_out//# /}' else l_kpar='$(awk -F=
      '{print $1}' <<< '$l_out' | xargs)' [ '$l_kpar' = '$l_parameter_name' ] &&
      A_out+=(['$l_kpar']='$l_file') fi fi done < <('$l_systemdsysctl' --cat-config
      | grep -Po '^\h*([^#\n\r]+|#\h*\/[^#\n\r\h]+\.conf\b)') if [ -n '$l_ufwscf' ];
      then # Account for systems with UFW (Not covered by systemd-sysctl --cat-
      config) l_kpar='$(grep -Po '^\h*$l_parameter_name\b' '$l_ufwscf' | xargs)'
      l_kpar='${l_kpar//\//.}' [ '$l_kpar' = '$l_parameter_name' ] &&
      A_out+=(['$l_kpar']='$l_ufwscf') fi if (( ${#A_out[@]} > 0 )); then # Assess
      output from files and generate output while IFS='=' read -r l_fkpname
      l_file_parameter_value; do l_fkpname='${l_fkpname// /}';
      l_file_parameter_value='${l_file_parameter_value// /}' if grep -Pq --
      '\b''$l_parameter_value''\b' <<< '$l_file_parameter_value'; then a_output+=('
      - \'$l_parameter_name\' is correctly set to \'$l_file_parameter_value\'' \ '
      in \'$(printf '%s' '${A_out[@]}')\'') else a_output2+=(' -
      \'$l_parameter_name\' is incorrectly set to \'$l_file_parameter_value\'' ' in
      \'$(printf '%s' '${A_out[@]}')\'' \ ' and should have a value of:
      \'$l_value_out\'') fi done < <(grep -Po -- '^\h*$l_parameter_name\h*=\h*\H+'
      '${A_out[@]}') else a_output2+=(' - \'$l_parameter_name\' is not set in an
      included file' \ ' ** Note: \'$l_parameter_name\' May be set in a file that's
      ignored by load procedure **') fi } l_systemdsysctl='$(readlink -f
      /lib/systemd/systemd-sysctl)' while IFS='=' read -r l_parameter_name
      l_parameter_value; do # Assess and check parameters
      l_parameter_name='${l_parameter_name// /}';
      l_parameter_value='${l_parameter_value// /}'
      l_value_out='${l_parameter_value//-/ through }';
      l_value_out='${l_value_out//|/ or }' l_value_out='$(tr -d '(){}' <<<
      '$l_value_out')' f_kernel_parameter_chk done < <(printf '%s\n'
      '${a_parlist[@]}') if [ '${#a_output2[@]}' -le 0 ]; then printf '%s\n' '' '-
      Audit Result:' ' ** PASS **' '${a_output[@]}' '' else printf '%s\n' '' '-
      Audit Result:' ' ** FAIL **' ' - Reason(s) for audit failure:'
      '${a_output2[@]}' [ '${#a_output[@]}' -gt 0 ] && printf '%s\n' '' '- Correctly
      set:' '${a_output[@]}' '' fi }
    remediation: >
      Set the following parameter in /etc/sysctl.conf or a file in /etc/sysctl.d/
      ending in .conf: • kernel.randomize_va_space = 2 Example: # printf '%s\n'
      'kernel.randomize_va_space = 2' >> /etc/sysctl.d/60- kernel_sysctl.conf Run
      the following command to set the active kernel parameter: # sysctl -w
      kernel.randomize_va_space=2 Note: If these settings appear in a canonically
      later file, or later in the same file, these settings will be overwritten
      Default Value: kernel.randomize_va_space = 2 References: 1.
      http://manpages.ubuntu.com/manpages/focal/man5/sysctl.d.5.html 2. CCI-000366:
      The organization implements the security configuration settings 3. NIST SP
      800-53 Rev. 5: CM-6
    references: >
      1. http://manpages.ubuntu.com/manpages/focal/man5/sysctl.d.5.html 2.
      CCI-000366: The organization implements the security configuration settings 3.
      NIST SP 800-53 Rev. 5: CM-6
    impact: >
      
    compliance_mappings:
      cis:
