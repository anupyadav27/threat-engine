  - rule_id: debian.cis.6.changes_to_system_administration_scope_sudoers_is
    title: "Ensure changes to system administration scope (sudoers) is collected"
    severity: medium
    category: linux
    tech_type: debian
    automation_type: automated
    cis_benchmark: "CIS_DEBIAN 12_v1.1.0"
    cis_version: "12_v1.1.0"
    cis_control: "6.2.3.1"
    cis_section: "6"
    profile_applicability: "Level 2"
    description: >
      Monitor scope changes for system administrators. If the system has been
      properly configured to force system administrators to log in as themselves
      first and then use the sudo command to execute privileged commands, it is
      possible to monitor changes in scope. The file /etc/sudoers, or files in
      /etc/sudoers.d, will be written to when the file(s) or related attributes have
      changed. The audit records will be tagged with the identifier 'scope'.
    rationale: >
      Changes in the /etc/sudoers and /etc/sudoers.d files can indicate that an
      unauthorized change has been made to the scope of system administrator
      activity.
    audit_procedure: >
      On disk configuration Run the following command to check the on disk rules: #
      awk '/^ *-w/ \ &&/\/etc\/sudoers/ \ &&/ +-p *wa/ \ &&(/ key= *[!-~]* *$/||/ -k
      *[!-~]* *$/)' /etc/audit/rules.d/*.rules Verify the output matches: -w
      /etc/sudoers -p wa -k scope -w /etc/sudoers.d -p wa -k scope Running
      configuration Run the following command to check loaded rules: # auditctl -l |
