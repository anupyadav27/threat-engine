  - rule_id: debian.cis.3.bluetooth_services_are_not_in_use
    title: "Ensure bluetooth services are not in use"
    severity: high
    category: linux
    tech_type: debian
    automation_type: automated
    cis_benchmark: "CIS_DEBIAN 12_v1.1.0"
    cis_version: "12_v1.1.0"
    cis_control: "3.1.3"
    cis_section: "3"
    profile_applicability: "Level 1 + Level 2"
    description: >
      Bluetooth is a short-range wireless technology standard that is used for
      exchanging data between devices over short distances. It employs UHF radio
      waves in the ISM bands, from 2.402 GHz to 2.48 GHz. It is mainly used as an
      alternative to wire connections.
    rationale: >
      An attacker may be able to find a way to access or corrupt your data. One
      example of this type of activity is bluesnarfing, which refers to attackers
      using a Bluetooth connection to steal information off of your Bluetooth
      device. Also, viruses or other malicious code can take advantage of Bluetooth
      technology to infect other devices. If you are infected, your data may be
      corrupted, compromised, stolen, or lost. Impact: Many personal electronic
      devices (PEDs) use Bluetooth technology. For example, you may be able to
      operate your computer with a wireless keyboard. Disabling Bluetooth will
      prevent these devices from connecting to the system. There may be packages
      that are dependent on the bluez package. If the bluez package is removed,
      these dependent packages will be removed as well. Before removing the bluez
      package, review any dependent packages to determine if they are required on
      the system. -IF- a dependent package is required: stop and mask
      bluetooth.service leaving the bluez package installed.
    audit_procedure: >
      Run the following command to verify the bluez package is not installed: #
      dpkg-query -s bluez &>/dev/null && echo 'bluez is installed' Nothing should be
      returned. - OR - - IF - the bluez package is required as a dependency: Run the
      following command to verify bluetooth.service is not enabled: # systemctl is-
      enabled bluetooth.service 2>/dev/null | grep 'enabled' Nothing should be
      returned. Run the following command to verify bluetooth.service is not active:
      # systemctl is-active bluetooth.service 2>/dev/null | grep '^active' Nothing
      should be returned. Note: If the package is required for a dependency • Ensure
      the dependent package is approved by local site policy • Ensure stopping and
      masking the service and/or socket meets local site policy
    remediation: >
      Run the following commands to stop bluetooth.service, and remove the bluez
      package: # systemctl stop bluetooth.service # apt purge bluez - OR - - IF -
      the bluez package is required as a dependency: Run the following commands to
      stop and mask bluetooth.service: # systemctl stop bluetooth.service #
      systemctl mask bluetooth.service Note: A reboot may be required References: 1.
      https://www.cisa.gov/tips/st05-015 2. NIST SP 800-53 Rev. 5: CM-7
    references: >
      1. https://www.cisa.gov/tips/st05-015 2. NIST SP 800-53 Rev. 5: CM-7
    impact: >
      Many personal electronic devices (PEDs) use Bluetooth technology. For example,
      you may be able to operate your computer with a wireless keyboard. Disabling
      Bluetooth will prevent these devices from connecting to the system. There may
      be packages that are dependent on the bluez package. If the bluez package is
      removed, these dependent packages will be removed as well. Before removing the
      bluez package, review any dependent packages to determine if they are required
      on the system. -IF- a dependent package is required: stop and mask
      bluetooth.service leaving the bluez package installed.
