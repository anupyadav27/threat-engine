  - rule_id: debian.cis.5.sshd_logingracetime_is_configured
    title: "Ensure sshd LoginGraceTime is configured"
    severity: high
    category: linux
    tech_type: debian
    automation_type: automated
    cis_benchmark: "CIS_DEBIAN 12_v1.1.0"
    cis_version: "12_v1.1.0"
    cis_control: "5.1.13"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The LoginGraceTime parameter specifies the time allowed for successful
      authentication to the SSH server. The longer the Grace period is the more open
      unauthenticated connections can exist. Like other session controls in this
      session the Grace Period should be limited to appropriate organizational
      limits to ensure the service is available for needed access.
    rationale: >
      Setting the LoginGraceTime parameter to a low number will minimize the risk of
      successful brute force attacks to the SSH server. It will also limit the
      number of concurrent unauthenticated connections While the recommended setting
      is 60 seconds (1 Minute), set the number based on site policy.
    audit_procedure: >
      Run the following command and verify that output LoginGraceTime is between 1
      and 60 seconds: # sshd -T | grep logingracetime logingracetime 60
    remediation: >
      Edit the /etc/ssh/sshd_config file to set the LoginGraceTime parameter to 60
      seconds or less above any Include entry as follows: LoginGraceTime 60 Note:
      First occurrence of a option takes precedence. If Include locations are
      enabled, used, and order of precedence is understood in your environment, the
      entry may be created in a file in Include location. Default Value:
      LoginGraceTime 120 References: 1. SSHD_CONFIG(5) 2. NIST SP 800-53 Rev. 5:
      CM-6 3. SSHD(8) MITRE ATT&CK Mappings: Techniques / Sub- techniques Tactics
      Mitigations T1110, T1110.001, T1110.003, T1110.004 TA0006 M1036
    references: >
