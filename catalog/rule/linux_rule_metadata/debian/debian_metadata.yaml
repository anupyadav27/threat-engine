  - rule_id: debian.cis.1.xdmcp_is_not_enabled
    title: "Ensure XDMCP is not enabled"
    severity: high
    category: linux
    tech_type: debian
    automation_type: automated
    cis_benchmark: "CIS_DEBIAN 12_v1.1.0"
    cis_version: "12_v1.1.0"
    cis_control: "1.7.10"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      X Display Manager Control Protocol (XDMCP) is designed to provide
      authenticated access to display management services for remote displays
    rationale: >
      XDMCP is inherently insecure. • XDMCP is not a ciphered protocol. This may
      allow an attacker to capture keystrokes entered by a user • XDMCP is
      vulnerable to man-in-the-middle attacks. This may allow an attacker to steal
      the credentials of legitimate users by impersonating the XDMCP server.
    audit_procedure: >
      Run the following script and verify the output: #!/usr/bin/env bash { while
      IFS= read -r l_file; do awk '/\[xdmcp\]/{ f = 1;next } /\[/{ f = 0 } f {if
      (/^\s*Enable\s*=\s*true/) print 'The file: \'''$l_file''\' includes: \'' $0
      '\' in the \'[xdmcp]\' block'}' '$l_file' done < <(grep -Psil --
      '^\h*\[xdmcp\]' /etc/{gdm3,gdm}/{custom,daemon}.conf) } Nothing should be
      returned
    remediation: >
      Edit all files returned by the audit and remove or commend out the Enable=true
      line in the [xdmcp] block: Example file: # GDM configuration storage # # See
      /usr/share/gdm/gdm.schemas for a list of available options. [daemon] #
      Uncomment the line below to force the login screen to use Xorg
      #WaylandEnable=false # Enabling automatic login # AutomaticLoginEnable = true
      # AutomaticLogin = user1 # Enabling timed login # TimedLoginEnable = true #
      TimedLogin = user1 # TimedLoginDelay = 10 [security] [xdmcp] # Enable=true <-
      **This line should be removed or commented out** [chooser] [debug] # Uncomment
      the line below to turn on debugging # More verbose logs # Additionally lets
      the X server dump core if it crashes #Enable=true Default Value: false (This
      is denoted by no Enabled= entry in the [xdmcp] block References: 1. NIST SP
      800-53 Rev. 5: SI-4
    references: >
      1. NIST SP 800-53 Rev. 5: SI-4
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_DEBIAN_12_v1_1_0_1_7_10"
      nist_800_53: []
      soc2: []
      pci_dss: []
