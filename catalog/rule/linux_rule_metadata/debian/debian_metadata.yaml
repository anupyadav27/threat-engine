    remediation: >
      Add the following line to /etc/security/limits.conf or a
      /etc/security/limits.d/* file: * hard core 0 Set the following parameter in
      /etc/sysctl.conf or a file in /etc/sysctl.d/ ending in .conf: •
      fs.suid_dumpable = 0 Example: # printf '\n%s' 'fs.suid_dumpable = 0' >>
      /etc/sysctl.d/60-fs_sysctl.conf Run the following command to set the active
      kernel parameter: # sysctl -w fs.suid_dumpable=0 Note: If these settings
      appear in a canonically later file, or later in the same file, these settings
