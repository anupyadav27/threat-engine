      Setting net.ipv4.conf.all.rp_filter and net.ipv4.conf.default.rp_filter to 1
      is a good way to deter attackers from sending your system bogus packets that
      cannot be responded to. One instance where this feature breaks down is if
      asymmetrical routing is employed. This would occur when using dynamic routing
      protocols (bgp, ospf, etc) on your system. If you are using asymmetrical
      routing on your system, you will not be able to enable this feature without
      breaking the routing. Impact: If you are using asymmetrical routing on your
      system, you will not be able to enable this feature without breaking the
      routing.
