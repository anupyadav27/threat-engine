      a_output2+=(' - Parameter: \'${l_file_parameter_name// /}\'' \ ' incorrectly
      set to: \'${l_file_parameter_value// /}\'' \ ' in the file: \'$l_file_name\''
      \ ' Should be set to: \'$l_value_out\'') fi done <<< '$l_file_parameter' done
      <<< '$l_used_parameter_setting' else a_output2+=(' - Parameter:
      \'$l_parameter_name\' is not set in an included file' \ ' *** Note:
      \'$l_parameter_name\' May be set in a file that's ignored by load procedure
      ***') fi } for l_input_parameter in '${a_parameters[@]}'; do while IFS='='
      read -r l_parameter_name l_parameter_value; do # Assess and check parameters
      l_parameter_name='${l_parameter_name// /}';
      l_parameter_value='${l_parameter_value// /}'
      l_value_out='${l_parameter_value//-/ through }';
      l_value_out='${l_value_out//|/ or }' l_value_out='$(tr -d '(){}' <<<
      '$l_value_out')' f_config_file_parameter_chk done <<< '$l_input_parameter'
      done if [ '${#a_output2[@]}' -le 0 ]; then printf '%s\n' '' '- Audit Result:'
      ' ** PASS **' '${a_output[@]}' '' else printf '%s\n' '' '- Audit Result:' ' **
      FAIL **' ' - Reason(s) for audit failure:' '${a_output2[@]}' [
      '${#a_output[@]}' -gt 0 ] && printf '%s\n' '' '- Correctly set:'
      '${a_output[@]}' '' fi } Run the following command to verify systemd-
      journald.service and rsyslog.service are loaded and active: # systemctl list-
      units --type service | grep -P -- '(journald|rsyslog)' Output should be
      similar to: rsyslog.service loaded active running System Logging Service
      systemd-journald.service loaded active running Journal Service
    remediation: >
      - IF - Journald is the preferred method for capturing logs, this section and
      Recommendation should be skipped and the 'Configure Journald' section
      followed. - IF - rsyslog is the preferred method for capturing logs: Set the
      following parameter in the [Journal] section in /etc/systemd/journald.conf or
      a file in /etc/systemd/journald.conf.d/ ending in .conf: ForwardToSyslog=yes
      Example script to create systemd drop-in configuration file: #!/usr/bin/env
      bash { a_settings=('ForwardToSyslog=yes') [ ! -d /etc/systemd/journald.conf.d/
      ] && mkdir /etc/systemd/journald.conf.d/ if grep -Psq -- '^\h*\[Journal\]'
      /etc/systemd/journald.conf.d/60- journald.conf; then printf '%s\n' ''
      '${a_settings[@]}' >> /etc/systemd/journald.conf.d/60- journald.conf else
      printf '%s\n' '' '[Journal]' '${a_settings[@]}' >>
      /etc/systemd/journald.conf.d/60-journald.conf fi } Note: If this setting
