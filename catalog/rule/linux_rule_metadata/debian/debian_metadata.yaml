  - rule_id: debian.cis.4.nftables_base_chains_exist
    title: "Ensure nftables base chains exist"
    severity: high
    category: linux
    tech_type: debian
    automation_type: automated
    cis_benchmark: "CIS_DEBIAN 12_v1.1.0"
    cis_version: "12_v1.1.0"
    cis_control: "4.3.5"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Chains are containers for rules. They exist in two kinds, base chains and
      regular chains. A base chain is an entry point for packets from the networking
      stack, a regular chain may be used as jump target and is used for better rule
      organization.
    rationale: >
      If a base chain doesn't exist with a hook for input, forward, and delete,
      packets that would flow through those chains will not be touched by nftables.
      Impact: If configuring nftables over ssh, creating a base chain with a policy
      of drop will cause loss of connectivity. Ensure that a rule allowing ssh has
      been added to the base chain prior to setting the base chain's policy to drop
    audit_procedure: >
      Run the following commands and verify that base chains exist for INPUT. # nft
      list ruleset | grep 'hook input' type filter hook input priority 0; Run the
      following commands and verify that base chains exist for FORWARD. # nft list
      ruleset | grep 'hook forward' type filter hook forward priority 0; Run the
      following commands and verify that base chains exist for OUTPUT. # nft list
      ruleset | grep 'hook output' type filter hook output priority 0;
    remediation: >
      Run the following command to create the base chains: # nft create chain inet
      <table name> <base chain name> { type filter hook <(input|forward|output)>
      priority 0 \; } Example: # nft create chain inet filter input { type filter
      hook input priority 0 \; } # nft create chain inet filter forward { type
      filter hook forward priority 0 \; } # nft create chain inet filter output {
      type filter hook output priority 0 \; }
    references: >
      
    impact: >
      If configuring nftables over ssh, creating a base chain with a policy of drop
      will cause loss of connectivity. Ensure that a rule allowing ssh has been
      added to the base chain prior to setting the base chain's policy to drop
    compliance_mappings:
      cis:
