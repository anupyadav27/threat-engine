  - rule_id: debian.cis.7.all_groups_in_etc_passwd_exist_in_etc_group
    title: "Ensure all groups in /etc/passwd exist in /etc/group"
    severity: high
    category: linux
    tech_type: debian
    automation_type: automated
    cis_benchmark: "CIS_DEBIAN 12_v1.1.0"
    cis_version: "12_v1.1.0"
    cis_control: "7.2.3"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      Over time, system administration errors and changes can lead to groups being
      defined in /etc/passwd but not in /etc/group .
    rationale: >
      Groups defined in the /etc/passwd file but not in the /etc/group file pose a
      threat to system security since group permissions are not properly managed.
    audit_procedure: >
      Run the following script to verify all GIDs in /etc/passwd exist in
      /etc/group: #!/usr/bin/env bash { a_passwd_group_gid=('$(awk -F: '{print $4}'
      /etc/passwd | sort -u)') a_group_gid=('$(awk -F: '{print $3}' /etc/group |
      sort -u)') a_passwd_group_diff=('$(printf '%s\n' '${a_group_gid[@]}'
      '${a_passwd_group_gid[@]}' | sort | uniq -u)') while IFS= read -r l_gid; do
      awk -F: '($4 == ''$l_gid'') {print ' - User: \'' $1 '\' has GID: \'' $4 '\'
      which does not exist in /etc/group' }' /etc/passwd done < <(printf '%s\n'
      '${a_passwd_group_gid[@]}' '${a_passwd_group_diff[@]}' | sort | uniq -D |
      uniq) unset a_passwd_group_gid; unset a_group_gid; unset a_passwd_group_diff }
      Nothing should be returned
    remediation: >
      Analyze the output of the Audit step above and perform the appropriate action
      to correct any discrepancies found. References: 1. NIST SP 800-53 Rev. 5:
      CM-1, CM-2, CM-6, CM-7, IA-5
