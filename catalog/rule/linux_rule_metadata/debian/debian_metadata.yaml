  - rule_id: debian.cis.4.nftables_default_deny_firewall_policy
    title: "Ensure nftables default deny firewall policy"
    severity: high
    category: linux
    tech_type: debian
    automation_type: automated
    cis_benchmark: "CIS_DEBIAN 12_v1.1.0"
    cis_version: "12_v1.1.0"
    cis_control: "4.3.8"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Base chain policy is the default verdict that will be applied to packets
      reaching the end of the chain.
    rationale: >
      There are two policies: accept (Default) and drop. If the policy is set to
      accept, the firewall will accept any packet that is not configured to be
      denied and the packet will continue transversing the network stack. It is
      easier to allow list acceptable usage than to deny list unacceptable usage.
      Note: • Allow port 22(ssh) needs to be updated to only allow systems requiring
      ssh connectivity to connect, as per site policy. • Changing firewall settings
      while connected over network can result in being locked out of the system.
      Impact: If configuring nftables over ssh, creating a base chain with a policy
      of drop will cause loss of connectivity. Ensure that a rule allowing ssh has
      been added to the base chain prior to setting the base chain's policy to drop
    audit_procedure: >
      Run the following commands and verify that base chains contain a policy of
      DROP. # nft list ruleset | grep 'hook input' type filter hook input priority
      0; policy drop; # nft list ruleset | grep 'hook forward' type filter hook
      forward priority 0; policy drop; # nft list ruleset | grep 'hook output' type
      filter hook output priority 0; policy drop;
    remediation: >
      Run the following command for the base chains with the input, forward, and
      output hooks to implement a default DROP policy: # nft chain <table family>
      <table name> <chain name> { policy drop \; } Example: # nft chain inet filter
      input { policy drop \; } # nft chain inet filter forward { policy drop \; } #
      nft chain inet filter output { policy drop \; } Default Value: accept
      References: 1. Manual Page nft 2. NIST SP 800-53 Rev. 5: CA-9, SC-7
    references: >
      1. Manual Page nft 2. NIST SP 800-53 Rev. 5: CA-9, SC-7
    impact: >
      If configuring nftables over ssh, creating a base chain with a policy of drop
      will cause loss of connectivity. Ensure that a rule allowing ssh has been
      added to the base chain prior to setting the base chain's policy to drop
    compliance_mappings:
      cis:
        - "CIS_DEBIAN_12_v1_1_0_4_3_8"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_debian_12_v1_1_0_4_3_8"
    metadata_source: generated
    generated_by: generate_tech_rules

