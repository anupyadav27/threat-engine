  - rule_id: debian.cis.5.users_must_provide_password_for_privilege
    title: "Ensure users must provide password for privilege escalation"
    severity: medium
    category: linux
    tech_type: debian
    automation_type: automated
    cis_benchmark: "CIS_DEBIAN 12_v1.1.0"
    cis_version: "12_v1.1.0"
    cis_control: "5.2.4"
    cis_section: "5"
    profile_applicability: "Level 2"
    description: >
      The operating system must be configured so that users must provide a password
      for privilege escalation.
    rationale: >
      Without (re-)authentication, users may access resources or perform tasks for
      which they do not have authorization. When operating systems provide the
      capability to escalate a functional capability, it is critical the user
      (re-)authenticate. Impact: This will prevent automated processes from being
      able to elevate privileges.
    audit_procedure: >
      Note: If passwords are not being used for authentication, this is not
      applicable. Verify the operating system requires users to supply a password
      for privilege escalation. Check the configuration of the /etc/sudoers and
      /etc/sudoers.d/* files with the following command: # grep -r '^[^#].*NOPASSWD'
      /etc/sudoers* If any line is found refer to the remediation procedure below.
    remediation: >
      Based on the outcome of the audit procedure, use visudo -f <PATH TO FILE> to
      edit the relevant sudoers file. Remove any line with occurrences of NOPASSWD
      tags in the file. References: 1. NIST SP 800-53 Rev. 5: AC-6
    references: >
      1. NIST SP 800-53 Rev. 5: AC-6
    impact: >
      This will prevent automated processes from being able to elevate privileges.
