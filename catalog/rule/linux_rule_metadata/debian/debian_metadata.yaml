      settings in a .conf file in the /etc/security/pwquality.conf.d/ directory o
      settings in a .conf file in the /etc/security/pwquality.conf.d/ directory are
      read in canonical order, with last read file containing the setting taking
      precedence • It is recommended that settings be configured in a .conf file in
      the /etc/security/pwquality.conf.d/ directory for clarity, convenience, and
      durability.
