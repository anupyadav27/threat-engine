      more • The value meets local site policy # grep -Psi --
      '^\h*password\h+[^#\n\r]+\h+pam_pwhistory\.so\h+([^#\n\r]+\h+)?remember=\d+\b
      ' /etc/pam.d/common-password Output should be similar to: password requisite
