  - rule_id: debian.cis.5.strong_password_hashing_algorithm_is_configured
    title: "Ensure strong password hashing algorithm is configured"
    severity: high
    category: linux
    tech_type: debian
    automation_type: automated
    cis_benchmark: "CIS_DEBIAN 12_v1.1.0"
    cis_version: "12_v1.1.0"
    cis_control: "5.4.1.4"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      A cryptographic hash function converts an arbitrary-length input into a fixed
      length output. Password hashing performs a one-way transformation of a
      password, turning the password into another string, called the hashed
      password. ENCRYPT_METHOD (string) - This defines the system default encryption
      algorithm for encrypting passwords (if no algorithm are specified on the
      command line). It can take one of these values: • MD5 - MD5-based algorithm
      will be used for encrypting password • SHA256 - SHA256-based algorithm will be
      used for encrypting password • SHA512 - SHA512-based algorithm will be used
      for encrypting password • BCRYPT - BCRYPT-based algorithm will be used for
      encrypting password • YESCRYPT - YESCRYPT-based algorithm will be used for
      encrypting password • DES - DES-based algorithm will be used for encrypting
      password (default) Note: • This parameter overrides the deprecated
      MD5_CRYPT_ENAB variable. • This parameter will only affect the generation of
      group passwords. • The generation of user passwords is done by PAM and subject
      to the PAM configuration. • It is recommended to set this variable
      consistently with the PAM configuration.
    rationale: >
      The SHA-512 and yescrypt algorithms provide a stronger hash than other
      algorithms used by Linux for password hash generation. A stronger hash
      provides additional protection to the system by increasing the level of effort
      needed for an attacker to successfully determine local group passwords.
    audit_procedure: >
      Run the following command to verify the hashing algorithm is sha512 or
      yescrypt in /etc/login.defs: # grep -Pi --
      '^\h*ENCRYPT_METHOD\h+(SHA512|yescrypt)\b' /etc/login.defs Example output:
      ENCRYPT_METHOD SHA512 - OR - ENCRYPT_METHOD YESCRYPT
    remediation: >
      Edit /etc/login.defs and set the ENCRYPT_METHOD to SHA512 or YESCRYPT:
      ENCRYPT_METHOD <HASHING_ALGORITHM> Example: ENCRYPT_METHOD YESCRYPT Note: •
      This only effects local groups' passwords created after updating the file to
      use sha512 or yescrypt. • If it is determined that the password algorithm
      being used is not sha512 or yescrypt, once it is changed, it is recommended
      that all group passwords be updated to use the stronger hashing algorithm. •
      It is recommended that the chosen hashing algorithm is consistent across
      /etc/login.defs and the PAM configuration Default Value: ENCRYPT_METHOD SHA512
      References: 1. NIST SP 800-53 Rev. 5: IA-5
    references: >
      1. NIST SP 800-53 Rev. 5: IA-5
    impact: >
      
