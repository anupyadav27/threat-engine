    profile_applicability: "Level 1"
    description: >
      AppArmor profiles define what resources applications are able to access.
    rationale: >
      Security configuration requirements vary from site to site. Some sites may
      mandate a policy that is stricter than the default policy, which is perfectly
      acceptable. This item is intended to ensure that any policies that exist on
      the system are activated.
    audit_procedure: >
      Run the following command and verify that profiles are loaded, and are in
      either enforce or complain mode: # apparmor_status | grep profiles Review
      output and ensure that profiles are loaded, and in either enforce or complain
      mode: 37 profiles are loaded. 35 profiles are in enforce mode. 2 profiles are
      in complain mode. 4 processes have profiles defined. Run the following command
      and verify no processes are unconfined # apparmor_status | grep processes
      Review the output and ensure no processes are unconfined: 4 processes have
      profiles defined. 4 processes are in enforce mode. 0 processes are in complain
      mode. 0 processes are unconfined but have a profile defined.
