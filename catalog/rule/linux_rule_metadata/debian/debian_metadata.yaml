    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      UncomplicatedFirewall (ufw) is a frontend for iptables. ufw provides a
      framework for managing netfilter, as well as a command-line and available
      graphical user interface for manipulating the firewall. Note: • When running
      ufw enable or starting ufw via its initscript, ufw will flush its chains. This
      is required so ufw can maintain a consistent state, but it may drop existing
      connections (eg ssh). ufw does support adding rules before enabling the
      firewall. • Run the following command before running ufw enable. # ufw allow
      proto tcp from any to any port 22 • The rules will still be flushed, but the
      ssh port will be open after enabling the firewall. Please note that once ufw
      is 'enabled', ufw will not flush the chains when adding or removing rules (but
      will when modifying a rule or changing the default policy) • By default, ufw
      will prompt when enabling the firewall while running under ssh. This can be
      disabled by using ufw --force enable
    rationale: >
      The ufw service must be enabled and running in order for ufw to protect the
      system Impact: Changing firewall settings while connected over network can
      result in being locked out of the system.
    audit_procedure: >
      Run the following command to verify that the ufw daemon is enabled: #
      systemctl is-enabled ufw.service enabled Run the following command to verify
      that the ufw daemon is active: # systemctl is-active ufw active Run the
      following command to verify ufw is active # ufw status Status: active
    remediation: >
      Run the following command to unmask the ufw daemon: # systemctl unmask
      ufw.service Run the following command to enable and start the ufw daemon: #
      systemctl --now enable ufw.service active Run the following command to enable
      ufw: # ufw enable References: 1.
      http://manpages.ubuntu.com/manpages/precise/en/man8/ufw.8.html 2. NIST SP
      800-53 Rev. 5: SC-7
