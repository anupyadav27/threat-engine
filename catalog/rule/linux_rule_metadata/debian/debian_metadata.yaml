      ] && auditctl -l | awk '/^ *-w/ \ &&/'${SUDO_LOG_FILE}'/ \ &&/ +-p *wa/ \ &&(/
      key= *[!-~]* *$/||/ -k *[!-~]* *$/)' \ || printf 'ERROR: Variable
      'SUDO_LOG_FILE' is unset.\n' } Verify output matches: -w /var/log/sudo.log -p
      wa -k sudo_log_file
