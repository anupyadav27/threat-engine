  - rule_id: debian.cis.1.gdm_automatic_mounting_of_removable_media_is
    title: "Ensure GDM automatic mounting of removable media is disabled"
    severity: high
    category: linux
    tech_type: debian
    automation_type: automated
    cis_benchmark: "CIS_DEBIAN 12_v1.1.0"
    cis_version: "12_v1.1.0"
    cis_control: "1.7.6"
    cis_section: "1"
    profile_applicability: "Level 1 + Level 2"
    description: >
      By default GNOME automatically mounts removable media when inserted as a
      convenience to the user.
    rationale: >
      With automounting enabled anyone with physical access could attach a USB drive
      or disc and have its contents available in system even if they lacked
      permissions to mount it themselves. Impact: The use of portable hard drives is
      very common for workstation users. If your organization allows the use of
      portable storage or media on workstations and physical access controls to
      workstations is considered adequate there is little value add in turning off
      automounting.
    audit_procedure: >
      Run the following commands to verify automatic mounting is disabled: #
      gsettings get org.gnome.desktop.media-handling automount false # gsettings get
      org.gnome.desktop.media-handling automount-open false
    remediation: >
      - IF - A user profile exists run the following commands to ensure automatic
      mounting is disabled: # gsettings set org.gnome.desktop.media-handling
      automount false # gsettings set org.gnome.desktop.media-handling automount-
      open false Note: • gsettings commands in this section MUST be done from a
      command window on a graphical desktop or an error will be returned. • The
      system must be restarted after all gsettings configurations have been set in
      order for CIS-CAT Assessor to appropriately assess. • If the dconf database is
      not updating correctly due to umask requirements contain in the benchmark,
      then use (umask 0022 && gsetting set) commands from above to temporarily set
      umask ensuring that any files or directories created by gsettings will have
      the required permissions. - OR/IF - A user profile does not exist: 1. Create a
      file /etc/dconf/db/local.d/00-media-automount with following content:
