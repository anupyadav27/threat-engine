      requisite pam_pwhistory.so remember=24 enforce_for_root try_first_pass
      use_authtok - IF - similar output is returned: Run the following command to
      update /etc/pam.d/common-password with the returned profile: # pam-auth-update
      --enable {PROFILE_NAME} Example: # pam-auth-update pwhistory - IF - similar
      output is NOT returned: Create a pwhistory profile in /usr/share/pam-configs/
      with the following lines: Name: pwhistory password history checking Default:
      yes Priority: 1024 Password-Type: Primary Password: requisite pam_pwhistory.so
      remember=24 enforce_for_root try_first_pass use_authtok Example Script:
      #!/usr/bin/env bash { arr=('Name: pwhistory password history checking'
      'Default: yes' 'Priority: 1024' 'Password-Type: Primary' 'Password:' '
      requisite pam_pwhistory.so remember=24 enforce_for_root try_first_pass
      use_authtok') printf '%s\n' '${arr[@]}' > /usr/share/pam-configs/pwhistory }
      Run the following command to update /etc/pam.d/common-password with the
