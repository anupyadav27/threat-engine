  - rule_id: debian.cis.3.ip_forwarding_is_disabled
    title: "Ensure ip forwarding is disabled"
    severity: high
    category: linux
    tech_type: debian
    automation_type: automated
    cis_benchmark: "CIS_DEBIAN 12_v1.1.0"
    cis_version: "12_v1.1.0"
    cis_control: "3.3.1"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The net.ipv4.ip_forward and net.ipv6.conf.all.forwarding flags are used to
      tell the system whether it can forward packets or not.
    rationale: >
      Setting net.ipv4.ip_forward and net.ipv6.conf.all.forwarding to 0 ensures that
      a system with multiple interfaces (for example, a hard proxy), will never be
      able to forward packets, and therefore, never serve as a router. Impact: IP
      forwarding is required on systems configured to act as a router. If these
      parameters are disabled, the system will not be able to perform as a router.
      Many Cloud Service Provider (CSP) hosted systems require IP forwarding to be
      enabled. If the system is running on a CSP platform, this requirement should
      be reviewed before disabling IP forwarding.
    audit_procedure: >
      Run the following script to verify the following kernel parameters are set in
      the running configuration and correctly loaded from a kernel parameter
      configuration file: • net.ipv4.ip_forward is set to 0 •
      net.ipv6.conf.all.forwarding is set to 0 Note: • kernel parameters are loaded
      by file and parameter order precedence. The following script observes this
      precedence as part of the auditing procedure. The parameters being checked may
      be set correctly in a file. If that file is superseded, the parameter is
      overridden by an incorrect setting later in that file, or in a canonically
      later file, that 'correct' setting will be ignored both by the script and by
      the system during a normal kernel parameter load sequence. • IPv6 kernel
      parameters only apply to systems where IPv6 is enabled #!/usr/bin/env bash {
      a_output=(); a_output2=(); l_ipv6_disabled=''
      a_parlist=('net.ipv4.ip_forward=0' 'net.ipv6.conf.all.forwarding=0')
      l_ufwscf='$([ -f /etc/default/ufw ] && awk -F= '/^\s*IPT_SYSCTL=/ {print $2}'
      /etc/default/ufw)' f_ipv6_chk() { l_ipv6_disabled='no' ! grep -Pqs --
      '^\h*0\b' /sys/module/ipv6/parameters/disable && l_ipv6_disabled='yes' if
      sysctl net.ipv6.conf.all.disable_ipv6 | grep -Pqs --
      '^\h*net\.ipv6\.conf\.all\.disable_ipv6\h*=\h*1\b' && \ sysctl
      net.ipv6.conf.default.disable_ipv6 | grep -Pqs --
      '^\h*net\.ipv6\.conf\.default\.disable_ipv6\h*=\h*1\b'; then
      l_ipv6_disabled='yes' fi } f_kernel_parameter_chk() {
      l_running_parameter_value='$(sysctl '$l_parameter_name' | awk -F= '{print $2}'
      | xargs)' # Check running configuration if grep -Pq --
      '\b''$l_parameter_value''\b' <<< '$l_running_parameter_value'; then
      a_output+=(' - \'$l_parameter_name\' is correctly set to
      \'$l_running_parameter_value\'' ' in the running configuration') else
      a_output2+=(' - \'$l_parameter_name\' is incorrectly set to
      \'$l_running_parameter_value\'' \ ' in the running configuration' \ ' and
