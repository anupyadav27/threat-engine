  - rule_id: debian.cis.7.shadow_group_is_empty
    title: "Ensure shadow group is empty"
    severity: high
    category: linux
    tech_type: debian
    automation_type: automated
    cis_benchmark: "CIS_DEBIAN 12_v1.1.0"
    cis_version: "12_v1.1.0"
    cis_control: "7.2.4"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      The shadow group allows system programs which require access the ability to
      read the /etc/shadow file. No users should be assigned to the shadow group.
    rationale: >
      Any users assigned to the shadow group would be granted read access to the
      /etc/shadow file. If attackers can gain read access to the /etc/shadow file,
      they can easily run a password cracking program against the hashed passwords
      to break them. Other security information that is stored in the /etc/shadow
      file (such as expiration) could also be useful to subvert additional user
      accounts.
    audit_procedure: >
      Run the following commands and verify no results are returned: # awk -F:
      '($1=='shadow') {print $NF}' /etc/group # awk -F: '($4 == ''$(getent group
      shadow | awk -F: '{print $3}' | xargs)'') {print ' - user: \'' $1 '\' primary
      group is the shadow group'}' /etc/passwd
    remediation: >
      Run the following command to remove all users from the shadow group # sed -ri
      's/(^shadow:[^:]*:[^:]*:)([^:]+$)/\1/' /etc/group Change the primary group of
      any users with shadow as their primary group. # usermod -g <primary group>
      <user> References: 1. NIST SP 800-53 Rev. 5: IA-5
    references: >
      1. NIST SP 800-53 Rev. 5: IA-5
    impact: >
      
