  - rule_id: debian.cis.6.logrotate_is_configured
    title: "Ensure logrotate is configured"
    severity: high
    category: linux
    tech_type: debian
    automation_type: manual
    cis_benchmark: "CIS_DEBIAN 12_v1.1.0"
    cis_version: "12_v1.1.0"
    cis_control: "6.1.3.8"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      The system includes the capability of rotating log files regularly to avoid
      filling up the system with logs or making the logs unmanageably large. The
      file /etc/logrotate.d/rsyslog is the configuration file used to rotate log
      files created by rsyslog.
    rationale: >
      By keeping the log files smaller and more manageable, a system administrator
      can easily archive these files to another system and spend less time looking
      through inordinately large log files.
    audit_procedure: >
      Run the following script to analyze the logrotate configuration:
      #!/usr/bin/env bash { l_analyze_cmd='$(readlink -f /bin/systemd-analyze)'
      l_config_file='/etc/logrotate.conf' l_include='$(awk
      '$1~/^\s*include$/{print$2}' '$l_config_file' 2>/dev/null)' [ -d '$l_include'
      ] && l_include='$l_include/*' $l_analyze_cmd cat-config '$l_config_file'
      $l_include } Note: The last occurrence of a argument is the one used for the
      logrotate configuration
    remediation: >
      Edit /etc/logrotate.conf, or the appropriate configuration file provided by
      the script in the Audit Procedure, as necessary to ensure logs are rotated
      according to site policy. References: 1. NIST SP 800-53 Rev. 5: AU-8
      Additional Information: If no maxage setting is set for logrotate a situation
      can occur where logrotate is interrupted and fails to delete rotated log
      files. It is recommended to set this to a value greater than the longest any
      log file should exist on your system to ensure that any such log file is
      removed but standard rotation settings are not overridden.
    references: >
