      queue.size='1000')') [ ! -d '/etc/rsyslog.d/' ] && mkdir /etc/rsyslod.d/
      printf '%s\n' '' '${a_parameters[@]}' >> /etc/rsyslog.d/60-rsyslog.conf } Run
