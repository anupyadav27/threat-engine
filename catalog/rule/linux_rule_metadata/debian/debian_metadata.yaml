  - rule_id: debian.cis.1.ptrace_scope_is_restricted
    title: "Ensure ptrace_scope is restricted"
    severity: high
    category: linux
    tech_type: debian
    automation_type: automated
    cis_benchmark: "CIS_DEBIAN 12_v1.1.0"
    cis_version: "12_v1.1.0"
    cis_control: "1.5.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      The ptrace() system call provides a means by which one process (the 'tracer')
      may observe and control the execution of another process (the 'tracee'), and
      examine and change the tracee's memory and registers. The sysctl settings
      (writable only with CAP_SYS_PTRACE) are: • 0 - classic ptrace permissions: a
      process can PTRACE_ATTACH to any other process running under the same uid, as
      long as it is dumpable (i.e. did not transition uids, start privileged, or
      have called prctl(PR_SET_DUMPABLE...) already). Similarly, PTRACE_TRACEME is
      unchanged. • 1 - restricted ptrace: a process must have a predefined
      relationship with the inferior it wants to call PTRACE_ATTACH on. By default,
      this relationship is that of only its descendants when the above classic
      criteria is also met. To change the relationship, an inferior can call
      prctl(PR_SET_PTRACER, debugger, ...) to declare an allowed debugger PID to
      call PTRACE_ATTACH on the inferior. Using PTRACE_TRACEME is unchanged. • 2 -
      admin-only attach: only processes with CAP_SYS_PTRACE may use ptrace with
      PTRACE_ATTACH, or through children calling PTRACE_TRACEME. • 3 - no attach: no
      processes may use ptrace with PTRACE_ATTACH nor via PTRACE_TRACEME. Once set,
      this sysctl value cannot be changed.
    rationale: >
      If one application is compromised, it would be possible for an attacker to
      attach to other running processes (e.g. Bash, Firefox, SSH sessions, GPG
      agent, etc) to extract additional credentials and continue to expand the scope
      of their attack. Enabling restricted mode will limit the ability of a
      compromised process to PTRACE_ATTACH on other processes running under the same
      user. With restricted mode, ptrace will continue to work with root user.
    audit_procedure: >
      Run the following script to verify the following kernel parameter is set in
      the running configuration and correctly loaded from a kernel parameter
      configuration file: • kernel.yama.ptrace_scope is set to a value of: 1, 2, or
      3 Note: kernel parameters are loaded by file and parameter order precedence.
      The following script observes this precedence as part of the auditing
      procedure. The parameters being checked may be set correctly in a file. If
      that file is superseded, the parameter is overridden by an incorrect setting
      later in that file, or in a canonically later file, that 'correct' setting
      will be ignored both by the script and by the system during a normal kernel
      parameter load sequence. #!/usr/bin/env bash { a_output=(); a_output2=();
      a_parlist=('kernel.yama.ptrace_scope=(1|2|3)') l_ufwscf='$([ -f
      /etc/default/ufw ] && awk -F= '/^\s*IPT_SYSCTL=/ {print $2}'
      /etc/default/ufw)' f_kernel_parameter_chk() {
      l_running_parameter_value='$(sysctl '$l_parameter_name' | awk -F= '{print $2}'
      | xargs)' # Check running configuration if grep -Pq --
      '\b''$l_parameter_value''\b' <<< '$l_running_parameter_value'; then
      a_output+=(' - \'$l_parameter_name\' is correctly set to
      \'$l_running_parameter_value\'' ' in the running configuration') else
      a_output2+=(' - \'$l_parameter_name\' is incorrectly set to
      \'$l_running_parameter_value\'' \ ' in the running configuration' \ ' and
      should have a value of: \'$l_value_out\'') fi unset A_out; declare -A A_out #
      Check durable setting (files) while read -r l_out; do if [ -n '$l_out' ]; then
      if [[ $l_out =~ ^\s*# ]]; then l_file='${l_out//# /}' else l_kpar='$(awk -F=
      '{print $1}' <<< '$l_out' | xargs)' [ '$l_kpar' = '$l_parameter_name' ] &&
      A_out+=(['$l_kpar']='$l_file') fi fi done < <('$l_systemdsysctl' --cat-config
      | grep -Po '^\h*([^#\n\r]+|#\h*\/[^#\n\r\h]+\.conf\b)') if [ -n '$l_ufwscf' ];
      then # Account for systems with UFW (Not covered by systemd-sysctl --cat-
      config) l_kpar='$(grep -Po '^\h*$l_parameter_name\b' '$l_ufwscf' | xargs)'
      l_kpar='${l_kpar//\//.}' [ '$l_kpar' = '$l_parameter_name' ] &&
      A_out+=(['$l_kpar']='$l_ufwscf') fi if (( ${#A_out[@]} > 0 )); then # Assess
      output from files and generate output while IFS='=' read -r l_fkpname
      l_file_parameter_value; do l_fkpname='${l_fkpname// /}';
      l_file_parameter_value='${l_file_parameter_value// /}' if grep -Pq --
      '\b''$l_parameter_value''\b' <<< '$l_file_parameter_value'; then a_output+=('
      - \'$l_parameter_name\' is correctly set to \'$l_file_parameter_value\'' \ '
      in \'$(printf '%s' '${A_out[@]}')\'') else a_output2+=(' -
      \'$l_parameter_name\' is incorrectly set to \'$l_file_parameter_value\'' \ '
      in \'$(printf '%s' '${A_out[@]}')\'' \ ' and should have a value of:
      \'$l_value_out\'') fi done < <(grep -Po -- '^\h*$l_parameter_name\h*=\h*\H+'
      '${A_out[@]}') else a_output2+=(' - \'$l_parameter_name\' is not set in an
      included file' \ ' ** Note: \'$l_parameter_name\' May be set in a file that's
      ignored by load procedure **') fi } l_systemdsysctl='$(readlink -f
      /lib/systemd/systemd-sysctl)' while IFS='=' read -r l_parameter_name
      l_parameter_value; do # Assess and check parameters
      l_parameter_name='${l_parameter_name// /}';
      l_parameter_value='${l_parameter_value// /}'
      l_value_out='${l_parameter_value//-/ through }';
      l_value_out='${l_value_out//|/ or }' l_value_out='$(tr -d '(){}' <<<
      '$l_value_out')' f_kernel_parameter_chk done < <(printf '%s\n'
      '${a_parlist[@]}') if [ '${#a_output2[@]}' -le 0 ]; then printf '%s\n' '' '-
      Audit Result:' ' ** PASS **' '${a_output[@]}' '' else printf '%s\n' '' '-
      Audit Result:' ' ** FAIL **' ' - Reason(s) for audit failure:'
      '${a_output2[@]}' [ '${#a_output[@]}' -gt 0 ] && printf '%s\n' '' '- Correctly
      set:' '${a_output[@]}' '' fi }
    remediation: >
      Set the kernel.yama.ptrace_scope parameter in /etc/sysctl.conf or a file in
      /etc/sysctl.d/ ending in .conf to a value of 1, 2, or 3:
      kernel.yama.ptrace_scope = 1 - OR - kernel.yama.ptrace_scope = 2 - OR -
      kernel.yama.ptrace_scope = 3 Example: # printf '%s\n'
      'kernel.yama.ptrace_scope = 1' >> /etc/sysctl.d/60- kernel_sysctl.conf Run the
      following command to set the active kernel parameter: # sysctl -w
      kernel.yama.ptrace_scope=1 Note: • If a value of 2 or 3 is preferred, or
      required by local site policy, replace the 1 with the desired value of 2 or 3
      in the example above • If this setting appears in a canonically later file, or
      later in the same file, the setting will be overwritten Default Value:
      kernel.yama.ptrace_scope = 0 References: 1.
      https://www.kernel.org/doc/Documentation/security/Yama.txt 2.
      https://github.com/raj3shp/termspy 3. NIST SP 800-53 Rev. 5: CM-6 Additional
      Information: Ptrace is very rarely used by regular applications and is mostly
      used by debuggers such as gdb and strace.
    references: >
      1. https://www.kernel.org/doc/Documentation/security/Yama.txt 2.
      https://github.com/raj3shp/termspy 3. NIST SP 800-53 Rev. 5: CM-6 Additional
      Information: Ptrace is very rarely used by regular applications and is mostly
      used by debuggers such as gdb and strace.
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_DEBIAN_12_v1_1_0_1_5_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
