  - rule_id: debian.cis.6.journald_log_file_access_is_configured
    title: "Ensure journald log file access is configured"
    severity: high
    category: linux
    tech_type: debian
    automation_type: manual
    cis_benchmark: "CIS_DEBIAN 12_v1.1.0"
    cis_version: "12_v1.1.0"
    cis_control: "6.1.1.2"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Journald will create logfiles that do not already exist on the system. This
      setting controls what permissions will be applied to these newly created
      files.
    rationale: >
      It is important to ensure that log files have the correct permissions to
      ensure that sensitive data is archived and protected.
    audit_procedure: >
      Run the following script to verify: • systemd-journald logfiles are mode 0640
      or more restrictive • Directories /run/ and /var/lib/systemd/ are mode 0755 or
      more restrictive • All other configured directories are mode 2755, 0750, or
      more restrictive #!/usr/bin/env bash { a_output=() a_output2=()
      l_systemd_config_file='/etc/tmpfiles.d/systemd.conf' l_analyze_cmd='$(readlink
      -f /bin/systemd-analyze)' f_file_chk() { l_maxperm='$( printf '%o' $(( 0777 &
      ~$l_perm_mask )) )' if [ $(( $l_mode & $l_perm_mask )) -le 0 ] || [[ '$l_type'
      = 'Directory' && '$l_mode' =~ 275(0|5) ]]; then a_out+=(' - $l_type
      \'$l_logfile\' access is:' \ ' mode: \'$l_mode\', owned by: \'$l_user\', and
      group owned by: \'$l_group\'') else a_out2+=(' - $l_type \'$l_logfile\' access
      is:' \ ' mode: \'$l_mode\', owned by: \'$l_user\', and group owned by:
      \'$l_group\'' \ ' should be mode: \'$l_maxperm\' or more restrictive') fi }
      while IFS= read -r l_file; do l_file='$(tr -d '# ' <<< '$l_file')' a_out=()
      a_out2=() l_logfile_perms_line='$(awk '($1~/^(f|d)$/ && $2~/\/\S+/ && $3~/[0-
      9]{3,}/){print $2 ':' $3 ':' $4 ':' $5}' '$l_file')' while IFS=: read -r
      l_logfile l_mode l_user l_group; do if [ -d '$l_logfile' ]; then
      l_perm_mask='0027' l_type='Directory' grep -Psq
      '^(\/run|\/var\/lib\/systemd)\b' <<< '$l_logfile' && l_perm_mask='0022' else
      l_perm_mask='0137' l_type='File' fi grep -Psq '^(\/run|\/var\/lib\/systemd)\b'
      <<< '$l_logfile' && l_perm_mask='0022' f_file_chk done <<<
      '$l_logfile_perms_line' [ '${#a_out[@]}' -gt '0' ] && a_output+=(' - File:
      \'$l_file\' sets:' '${a_out[@]}') [ '${#a_out2[@]}' -gt '0' ] && a_output2+=('
      - File: \'$l_file\' sets:' '${a_out2[@]}') done < <($l_analyze_cmd cat-config
      '$l_systemd_config_file' | tac | grep - Pio '^\h*#\h*\/[^#\n\r\h]+\.conf\b')
      if [ '${#a_output2[@]}' -le 0 ]; then printf '%s\n' '' '- Audit Result:' ' **
      PASS **' '${a_output[@]}' '' else printf '%s\n' '' '- Audit Result:' ' **
      REVIEW **' \ ' - Review file access to ensure they are set IAW site policy:'
      '${a_output2[@]}' [ '${#a_output[@]}' -gt 0 ] && printf '%s\n' '' '- Correctly
      set:' '${a_output[@]}' '' fi } Review the output
    remediation: >
      If the default configuration is not appropriate for the site specific
      requirements, copy /usr/lib/tmpfiles.d/systemd.conf to
      /etc/tmpfiles.d/systemd.conf and modify as required. Recommended mode for
      logfiles is 0640 or more restrictive. References: 1. NIST SP 800-53 Rev. 5:
      AC-3, AU-2, AU-12, MP-2, SI-5 Additional Information: See man 5 tmpfiles.d for
      detailed information on the permission sets for the relevant log files.
      Further information with examples can be found at
      https://www.freedesktop.org/software/systemd/man/tmpfiles.d.html
    references: >
