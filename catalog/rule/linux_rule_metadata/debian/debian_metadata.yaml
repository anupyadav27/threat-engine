  - rule_id: debian.cis.5.minimum_password_age_is_configured
    title: "Ensure minimum password age is configured"
    severity: medium
    category: linux
    tech_type: debian
    automation_type: manual
    cis_benchmark: "CIS_DEBIAN 11_v2.0.0"
    cis_version: "11_v2.0.0"
    cis_control: "5.4.1.2"
    cis_section: "5"
    profile_applicability: "Level 2"
    description: >
      The minimum password age determines the number of days that you must use a
      password before you can change it. PASS_MIN_DAYS < N > - The minimum number of
      days allowed between password changes. Any password changes attempted sooner
      than this will be rejected. If not specified, 0 will be assumed (which
      disables the restriction).
    rationale: >
      Users may have favorite passwords that they like to use because they are easy
      to remember and they believe that their password choice is secure from
      compromise. Unfortunately, passwords are compromised and if an attacker is
      targeting a specific individual user account, with foreknowledge of data about
      that user, reuse of old, potentially compromised passwords, may cause a
      security breach. By restricting the frequency of password changes, an
      administrator can prevent users from repeatedly changing their password in an
      attempt to circumvent password reuse controls Impact: By enforcing a minimum
      password age, a user will be unable to change their password if they observe a
      potential compromise of their password, e.g. 'shoulder surfing', during the
      time defined by minimum password age. In this event the user should follow
      local site policy to report a compromised password. If a users password is set
      by other personnel as a procedure in dealing with a lost or expired password,
      the user should be forced to update this 'set' password with their own
      password. e.g. force 'change at next logon'. If it is not possible to have a
      user set their own password immediately, and this recommendation or local site
      procedure may cause a user to continue using a third party generated password,
      PASS_MIN_DAYS for the effected user should be temporally changed to 0, to
      allow a user to change their password immediately. For applications where the
      user is not using the password at console, the ability to 'change at next
      logon' may be limited. This may cause a user to continue to use a password
      created by other personnel.
    audit_procedure: >
      Run the following command to verify that PASS_MIN_AGE is set to a value
      greater than 0and follows local site policy: # grep -Pi --
      '^\h*PASS_MIN_DAYS\h+\d+\b' /etc/login.defs Example output: PASS_MIN_DAYS 1
      Run the following command to verify all passwords have a PASS_MIN_AGE greater
      than 0: # awk -F: '($2~/^\$.+\$/) {if($4 < 1)print 'User: ' $1 '
      PASS_MIN_DAYS: ' $4}' /etc/shadow Nothing should be returned
    remediation: >
      Edit /etc/login.defs and set PASS_MIN_DAYS to a value greater than 0 that
      follows local site policy: Example: PASS_MIN_DAYS 1 Run the following command
      to modify user parameters for all users with a password set to a minimum age
      greater than zero that follows local site policy: # chage --mindays <N> <user>
      Example: # awk -F: '($2~/^\$.+\$/) {if($4 < 1)system ('chage --mindays 1 '
      $1)}' /etc/shadow Default Value: PASS_MIN_DAYS 0 References: 1. CIS Password
      Policy Guide
    references: >
      1. CIS Password Policy Guide
    impact: >
      By enforcing a minimum password age, a user will be unable to change their
      password if they observe a potential compromise of their password, e.g.
      'shoulder surfing', during the time defined by minimum password age. In this
      event the user should follow local site policy to report a compromised
      password. If a users password is set by other personnel as a procedure in
      dealing with a lost or expired password, the user should be forced to update
      this 'set' password with their own password. e.g. force 'change at next
      logon'. If it is not possible to have a user set their own password
      immediately, and this recommendation or local site procedure may cause a user
      to continue using a third party generated password, PASS_MIN_DAYS for the
      effected user should be temporally changed to 0, to allow a user to change
      their password immediately. For applications where the user is not using the
      password at console, the ability to 'change at next logon' may be limited.
      This may cause a user to continue to use a password created by other
      personnel.
    compliance_mappings:
      cis:
        - "CIS_DEBIAN_11_v2_0_0_5_4_1_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
