  - rule_id: debian.cis.1.separate_partition_exists_for_var_log
    title: "Ensure separate partition exists for /var/log"
    severity: medium
    category: linux
    tech_type: debian
    automation_type: automated
    cis_benchmark: "CIS_DEBIAN 12_v1.1.0"
    cis_version: "12_v1.1.0"
    cis_control: "1.1.2.6.1"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      The /var/log directory is used by system services to store log data.
    rationale: >
      The default installation only creates a single / partition. Since the /var/log
      directory contains log files which can grow quite large, there is a risk of
      resource exhaustion. It will essentially have the whole disk available to fill
      up and impact the system as a whole. Configuring /var/log as its own file
      system allows an administrator to set additional mount options such as
      noexec/nosuid/nodev. These options limit an attackers ability to create
      exploits on the system. Other options allow for specific behavior. See man
      mount for exact details regarding filesystem-independent and filesystem-
      specific options. As /var/log contains log files, care should be taken to
      ensure the security and integrity of the data and mount point. Impact:
      Resizing filesystems is a common activity in cloud-hosted servers. Separate
      filesystem partitions may prevent successful resizing, or may require the
      installation of additional tools solely for the purpose of resizing
      operations. The use of these additional tools may introduce their own security
      considerations.
    audit_procedure: >
      Run the following command and verify output shows /var/log is mounted: #
      findmnt -kn /var/log /var/log /dev/sdb ext4
      rw,nosuid,nodev,noexec,relatime,seclabel
    remediation: >
      For new installations, during installation create a custom partition setup and
      specify a separate partition for /var/log . For systems that were previously
      installed, create a new partition and configure /etc/fstab as appropriate.
      References: 1. AJ Lewis, 'LVM HOWTO', http://tldp.org/HOWTO/LVM-HOWTO/ 2. NIST
      SP 800-53 Rev. 5: CM-7 Additional Information: When modifying /var/log it is
      advisable to bring the system to emergency mode (so auditd is not running),
      rename the existing directory, mount the new file system, and migrate the data
      over before returning to multiuser mode.
    references: >
