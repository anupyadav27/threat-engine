  - rule_id: debian.cis.7.permissions_on_etc_shadow_are_configured
    title: "Ensure permissions on /etc/shadow are configured"
    severity: high
    category: linux
    tech_type: debian
    automation_type: automated
    cis_benchmark: "CIS_DEBIAN 12_v1.1.0"
    cis_version: "12_v1.1.0"
    cis_control: "7.1.5"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      The /etc/shadow file is used to store the information about user accounts that
      is critical to the security of those accounts, such as the hashed password and
      other security information.
    rationale: >
      If attackers can gain read access to the /etc/shadow file, they can easily run
      a password cracking program against the hashed password to break it. Other
      security information that is stored in the /etc/shadow file (such as
      expiration) could also be useful to subvert the user accounts.
    audit_procedure: >
      Run the following command to verify /etc/shadow is mode 640 or more
      restrictive, Uid is 0/root and Gid is 0/root or ({GID}/ shadow): # stat -Lc
      'Access: (%#a/%A) Uid: ( %u/ %U) Gid: ( %g/ %G)' /etc/shadow Example: Access:
      (0640/-rw-r-----) Uid: ( 0/ root) Gid: ( 42/ shadow)
    remediation: >
      Run one of the following commands to set ownership of /etc/shadow to root and
      group to either root or shadow: # chown root:shadow /etc/shadow -OR- # chown
      root:root /etc/shadow Run the following command to remove excess permissions
      form /etc/shadow: # chmod u-x,g-wx,o-rwx /etc/shadow Default Value: Access:
      (0640/-rw-r-----) Uid: ( 0/ root) Gid: ( 42/ shadow) References: 1. NIST SP
      800-53 Rev. 5: AC-3. MP-2
