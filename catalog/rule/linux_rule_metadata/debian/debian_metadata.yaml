    profile_applicability: "Level 1"
    description: >
      Configure the loopback interface to accept traffic. Configure all other
      interfaces to deny traffic to the loopback network
    rationale: >
      Loopback traffic is generated between processes on machine and is typically
      critical to the operation of the system. The loopback interface is the only
      place that loopback network traffic should be seen, all other interfaces
      should ignore traffic on this network as an anti-spoofing measure.
    audit_procedure: >
      Run the following commands to verify that the loopback interface is
      configured: Run the following command to verify the loopback interface is
