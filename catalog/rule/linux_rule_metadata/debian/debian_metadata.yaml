  - rule_id: debian.cis.6.rsyslog_log_file_creation_mode_is_configured
    title: "Ensure rsyslog log file creation mode is configured"
    severity: high
    category: linux
    tech_type: debian
    automation_type: automated
    cis_benchmark: "CIS_DEBIAN 12_v1.1.0"
    cis_version: "12_v1.1.0"
    cis_control: "6.1.3.4"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      rsyslog will create logfiles that do not already exist on the system. The
      global() configuration object umask, available in rsyslog 8.26.0+, sets the
      rsyslogd process’ umask. If not specified, the system-provided default is
      used. The value given must always be a 4-digit octal number, with the initial
      digit being zero. The legacy $umask parameter sets the rsyslogd process'
      umask. If not specified, the system-provided default is used. The value given
      must always be a 4-digit octal number, with the initial digit being zero. The
      legacy $FileCreateMode parameter allows the setting of the mode with which
      rsyslogd creates new files. If not specified, the value 0644 is used. The
      value given must always be a 4-digit octal number, with the initial digit
      being zero. Please note that the actual permission depend on rsyslogd process
      umask. If in doubt, use $umask 0000 right at the beginning of the
      configuration file to remove any restrictions. The legacy $FileCreateMode may
      be specified multiple times. If so, it specifies the creation mode for all
      selector lines that follow until the next $FileCreateMode parameter. Order of
      lines is vitally important.
    rationale: >
      It is important to ensure that log files have the correct permissions to
      ensure that sensitive data is archived and protected.
    audit_procedure: >
      Run the following command Run the following script to verify $FileCreateMode
      to set to mode 0640 or more restrictive: #!/usr/bin/env bash { a_output=()
      a_output2=() l_analyze_cmd='$(readlink -f /bin/systemd-analyze)'
      l_include='\$IncludeConfig' a_config_files=('/etc/rsyslog.conf')
      l_parameter_name='\$FileCreateMode' f_parameter_chk() { l_perm_mask='0137';
      l_maxperm='$( printf '%o' $(( 0777 & ~$l_perm_mask )) )' l_mode='$(awk '{print
      $2}' <<< '$l_used_parameter_setting' | xargs)' if [ $(( $l_mode & $l_perm_mask
      )) -gt 0 ]; then a_output2+=(' - Parameter: \'${l_parameter_name//\\/}\' is
      incorrectly set to mode: \'$l_mode\'' \ ' in the file: \'$l_file\'' ' Should
      be mode: \'$l_maxperm\' or more restrictive') else a_output+=(' - Parameter:
      \'${l_parameter_name//\\/}\' is correctly set to mode: \'$l_mode\'' \ ' in the
      file: \'$l_file\'' ' Should be mode: \'$l_maxperm\' or more restrictive') fi }
      while IFS= read -r l_file; do l_conf_loc='$(awk '$1~/^\s*''$l_include''$/
      {print $2}' '$(tr -d '# ' <<< '$l_file')' | tail -n 1)' [ -n '$l_conf_loc' ]
      && break done < <($l_analyze_cmd cat-config '${a_config_files[*]}' | tac |
      grep -Pio '^\h*#\h*\/[^#\n\r\h]+\.conf\b') if [ -d '$l_conf_loc' ]; then
      l_dir='$l_conf_loc' l_ext='*' elif grep -Psq '\/\*\.([^#/\n\r]+)?\h*$' <<<
      '$l_conf_loc' || [ -f '$(readlink -f '$l_conf_loc')' ]; then l_dir='$(dirname
      '$l_conf_loc')' l_ext='$(basename '$l_conf_loc')' fi while read -r -d $'\0'
      l_file_name; do [ -f '$(readlink -f '$l_file_name')' ] &&
      a_config_files+=('$(readlink -f '$l_file_name')') done < <(find -L '$l_dir'
      -type f -name '$l_ext' -print0 2>/dev/null) while IFS= read -r l_file; do
      l_file='$(tr -d '# ' <<< '$l_file')' l_used_parameter_setting='$(grep -PHs --
      '^\h*''$l_parameter_name''\b' '$l_file' | tail -n 1)' [ -n
      '$l_used_parameter_setting' ] && break done < <($l_analyze_cmd cat-config
      '${a_config_files[@]}' | tac | grep -Pio '^\h*#\h*\/[^#\n\r\h]+\.conf\b') if [
      -n '$l_used_parameter_setting' ]; then f_parameter_chk else a_output2+=(' -
      Parameter: \'${l_parameter_name//\\/}\' is not set in a configuration file' \
      ' *** Note: \'${l_parameter_name//\\/}\' May be set in a file that's ignored
      by load procedure ***') fi if [ '${#a_output2[@]}' -le 0 ]; then printf '%s\n'
      '' '- Audit Result:' ' ** PASS **' '${a_output[@]}' '' else printf '%s\n' ''
      '- Audit Result:' ' ** FAIL **' ' - Reason(s) for audit failure:'
      '${a_output2[@]}' [ '${#a_output[@]}' -gt 0 ] && printf '%s\n' '' '- Correctly
      set:' '${a_output[@]}' '' fi }
    remediation: >
      Edit either /etc/rsyslog.conf or a dedicated .conf file in /etc/rsyslog.d/ and
      set $FileCreateMode to 0640 or more restrictive: $FileCreateMode 0640 Example
      script to create a drop-in configuration file in the default include location:
      #!/usr/bin/env bash { [ ! -d '/etc/rsyslog.d/' ] && mkdir /etc/rsyslog.d/
      printf '%s\n' '' '\$FileCreateMode 0640' >> /etc/rsyslog.d/60-rsyslog.conf }
      Reload the service: # systemctl reload-or-restart rsyslog References: 1.
      RSYSLOG.CONF(5) 2. NIST SP 800-53 Rev. 5: AC-3, AC-6, MP-2 3.
      https://www.rsyslog.com/doc/
    references: >
      1. RSYSLOG.CONF(5) 2. NIST SP 800-53 Rev. 5: AC-3, AC-6, MP-2 3.
      https://www.rsyslog.com/doc/
    impact: >
      
