      settings and audit reports. This information is needed to successfully audit
      system activity. This information must be protected from unauthorized
      modification or deletion. If this information were to be compromised, forensic
      analysis and discovery of the true source of potentially malicious system
      activity is impossible to achieve.
    audit_procedure: >
      Run the following script to verify the audit log directory is mode 0750 or
      more restrictive: #!/usr/bin/env bash { l_perm_mask='0027' if [ -e
      '/etc/audit/auditd.conf' ]; then l_audit_log_directory='$(dirname '$(awk -F=
      '/^\s*log_file\s*/{print $2}' /etc/audit/auditd.conf | xargs)')' if [ -d
      '$l_audit_log_directory' ]; then l_maxperm='$(printf '%o' $(( 0777 &
      ~$l_perm_mask )) )' l_directory_mode='$(stat -Lc '%#a'
      '$l_audit_log_directory')' if [ $(( $l_directory_mode & $l_perm_mask )) -gt 0
      ]; then echo -e '\n- Audit Result:\n ** FAIL **\n - Directory:
      \'$l_audit_log_directory\' is mode: \'$l_directory_mode\'\n (should be mode:
      \'$l_maxperm\' or more restrictive)\n' else echo -e '\n- Audit Result:\n **
      PASS **\n - Directory: \'$l_audit_log_directory\' is mode:
      \'$l_directory_mode\'\n (should be mode: \'$l_maxperm\' or more
      restrictive)\n' fi else echo -e '\n- Audit Result:\n ** FAIL **\n - Log file
      directory not set in \'/etc/audit/auditd.conf\' please set log file directory'
      fi else echo -e '\n- Audit Result:\n ** FAIL **\n - File:
      \'/etc/audit/auditd.conf\' not found\n - ** Verify auditd is installed **' fi
      }
    remediation: >
      Run the following command to configure the audit log directory to have a mode
      of '0750' or less permissive: # chmod g-w,o-rwx '$(dirname '$(awk -F=
      '/^\s*log_file\s*/{print $2}' /etc/audit/auditd.conf | xargs)')' Default
      Value: 750 References: 1. NIST SP 800-53 Rev. 5: AU-3
    references: >
      1. NIST SP 800-53 Rev. 5: AU-3
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_DEBIAN_12_v1_1_0_6_2_4_4"
      nist_800_53: []
      soc2: []
      pci_dss: []
