    cis_section: "6"
    profile_applicability: "Level 2"
    description: >
      Configure grub2 so that processes that are capable of being audited can be
      audited even if they start up prior to auditd startup.
    rationale: >
      Audit events need to be captured on processes that start up prior to auditd ,
      so that potential malicious activity cannot go undetected.
    audit_procedure: >
      Run the following command: # find /boot -type f -name 'grub.cfg' -exec grep
      -Ph -- '^\h*linux' {} + | grep -v 'audit=1' Nothing should be returned.
    remediation: >
      Edit /etc/default/grub and add audit=1 to GRUB_CMDLINE_LINUX: Example:
      GRUB_CMDLINE_LINUX='audit=1' Run the following command to update the grub2
      configuration: # update-grub References: 1. NIST SP 800-53 Rev. 5: AU-2, AU-3,
      AU-12 Additional Information: This recommendation is designed around the grub2
      bootloader, if another bootloader is in use in your environment enact
      equivalent settings.
