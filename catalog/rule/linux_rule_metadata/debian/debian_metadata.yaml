  - rule_id: debian.cis.6.aide_is_installed
    title: "Ensure AIDE is installed"
    severity: high
    category: linux
    tech_type: debian
    automation_type: automated
    cis_benchmark: "CIS_DEBIAN 12_v1.1.0"
    cis_version: "12_v1.1.0"
    cis_control: "6.3.1"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      AIDE takes a snapshot of filesystem state including modification times,
      permissions, and file hashes which can then be used to compare against the
      current state of the filesystem to detect modifications to the system.
    rationale: >
      By monitoring the filesystem state compromised files can be detected to
      prevent or limit the exposure of accidental or malicious misconfigurations or
      modified binaries.
    audit_procedure: >
      Run the following command to verify aide is installed: # dpkg-query -s aide
      &>/dev/null && echo 'aide is installed' aide is installed Run the following
      command to verify aide-common is installed: # dpkg-query -s aide-common
      &>/dev/null && echo 'aide-common is installed' aide-common is installed
    remediation: >
      Install AIDE using the appropriate package manager or manual installation: #
      apt install aide aide-common Configure AIDE as appropriate for your
      environment. Consult the AIDE documentation for options. Run the following
      commands to initialize AIDE: # aideinit # mv /var/lib/aide/aide.db.new
      /var/lib/aide/aide.db References: 1. NIST SP 800-53 Rev. 5: AU-2 Additional
      Information: The prelinking feature can interfere with AIDE because it alters
      binaries to speed up their start up times. Run prelink -ua to restore the
      binaries to their prelinked state, thus avoiding false positives from AIDE.
