  - rule_id: debian.cis.3.tcp_syn_cookies_is_enabled
    title: "Ensure tcp syn cookies is enabled"
    severity: high
    category: linux
    tech_type: debian
    automation_type: automated
    cis_benchmark: "CIS_DEBIAN 12_v1.1.0"
    cis_version: "12_v1.1.0"
