  - rule_id: debian.cis.5.pam_faillock_module_is_enabled
    title: "Ensure pam_faillock module is enabled"
    severity: high
    category: linux
    tech_type: debian
    automation_type: automated
    cis_benchmark: "CIS_DEBIAN 12_v1.1.0"
    cis_version: "12_v1.1.0"
    cis_control: "5.3.2.2"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The pam_faillock.so module maintains a list of failed authentication attempts
      per user during a specified interval and locks the account in case there were
      more than the configured number of consecutive failed authentications (this is
      defined by the deny parameter in the faillock configuration). It stores the
      failure records into per-user files in the tally directory.
    rationale: >
      Locking out user IDs after n unsuccessful consecutive login attempts mitigates
      brute force password attacks against your systems.
    audit_procedure: >
      Run the following commands to verify that pam_faillock is enabled: # grep -P
      -- '\bpam_faillock\.so\b' /etc/pam.d/common-{auth,account} Output should be
      similar to: /etc/pam.d/common-auth:auth requisite pam_faillock.so preauth
      /etc/pam.d/common-auth:auth [default=die] pam_faillock.so authfail
      /etc/pam.d/common-account:account required pam_faillock.so
    remediation: >
      Create two pam-auth-update profiles in /usr/share/pam-configs/: 1. Create the
      faillock profile in /usr/share/pam-configs/ with the following lines: Name:
      Enable pam_faillock to deny access Default: yes Priority: 0 Auth-Type: Primary
      Auth: [default=die] pam_faillock.so authfail Example Script: #!/usr/bin/env
      bash { arr=('Name: Enable pam_faillock to deny access' 'Default: yes'
      'Priority: 0' 'Auth-Type: Primary' 'Auth:' ' [default=die] pam_faillock.so
      authfail') printf '%s\n' '${arr[@]}' > /usr/share/pam-configs/faillock } 2.
      Create the faillock_notify profile in /usr/share/pam-configs/ with the
      following lines: Name: Notify of failed login attempts and reset count upon
      success Default: yes Priority: 1024 Auth-Type: Primary Auth: requisite
      pam_faillock.so preauth Account-Type: Primary Account: required
      pam_faillock.so Example Script: #!/usr/bin/env bash { arr=('Name: Notify of
      failed login attempts and reset count upon success' 'Default: yes' 'Priority:
      1024' 'Auth-Type: Primary' 'Auth:' ' requisite pam_faillock.so preauth'
      'Account-Type: Primary' 'Account:' ' required pam_faillock.so') printf '%s\n'
      '${arr[@]}' > /usr/share/pam-configs/faillock_notify } Run the following
      command to update the common-auth and common-account PAM files with the new
