  - rule_id: suse.cis.2.rsync_is_not_installed_or_the_rsyncd_service_is
    title: "Ensure rsync is not installed or the rsyncd service is masked"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "2.2.17"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The rsyncd service can be used to synchronize files between systems over
      network links.
    rationale: >
      Unless required, the rsync package should be removed to reduce the attack
      surface area of the system. The rsyncd service presents a security risk as it
      uses unencrypted protocols for communication. Note: If a required dependency
      exists for the rsync package, but the rsyncd service is not required, the
      service should be masked. Impact: There are packages that are dependent on the
      rsync package. If the rsync package is removed, these packages will be removed
      as well. Before removing the rsync package, review any dependent packages to
      determine if they are required on the system. If a dependent package is
      required, mask the rsyncd service and leave the rsync package installed.
    audit_procedure: >
      Run the following command to verify that rsync is not installed: # rpm -q
      rsync package rsync is not installed - OR - Run the following command to
      verify the rsyncd service is masked: # systemctl is-enabled rsyncd masked
    remediation: >
      Run the following command to remove the rsync package: # zypper remove rsync -
      OR - Run the following command to mask the rsyncd service: # systemctl --now
      mask rsyncd
    references: >
      
    impact: >
      There are packages that are dependent on the rsync package. If the rsync
      package is removed, these packages will be removed as well. Before removing
      the rsync package, review any dependent packages to determine if they are
      required on the system. If a dependent package is required, mask the rsyncd
      service and leave the rsync package installed.
