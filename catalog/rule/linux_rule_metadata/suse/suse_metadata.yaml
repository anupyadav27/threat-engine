    cis_version: "15_v2.0.1"
    cis_control: "5.3.2.4.3"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      A cryptographic hash function converts an arbitrary-length input into a fixed
      length output. Password hashing performs a one-way transformation of a
      password, turning the password into another string, called the hashed
      password.
    rationale: >
      The SHA-512 and yescrypt algorithms provide a stronger hash than other
      algorithms used by Linux for password hash generation. A stronger hash
      provides additional protection to the system by increasing the level of effort
      needed for an attacker to successfully determine local user passwords. Note:
      These changes only apply to the local system.
    audit_procedure: >
      Note: yescrypt is not currently supported. It has been included as an
      acceptable option if it becomes available in a future update to the Operating
      System. Run the following command to verify that a strong password hashing
      algorithm is set on the pam_unix.so module: # pam-config --query --unix
      --unix-sha512 auth: sha512 account: sha512 password: shadow sha512 session:
      sha512 Verify that the lines include either sha512 - OR - yescrypt
    remediation: >
      Notes: • If yescrypt becomes available in a future release, this would also be
      acceptable. It is highly recommended that the chosen hashing algorithm is
      consistent across /etc/libuser.conf, /etc/login.defs, /etc/pam.d/password-
      auth, and /etc/pam.d/system-auth. • This only effects local users and
      passwords created after updating the files to use sha512 or yescrypt. If it is
      determined that the password algorithm being used is not sha512 or yescrypt,
      once it is changed, it is recommended that all user ID's be immediately
      expired and forced to change their passwords on next login. Run one of the
      following commands to add a strong password hashing algorithm on the password
      stack's pam_unix.so module lines: # pam-config -a --unix --unix-sha512 - OR -
      # pam-config -a --unix --unix-yescrypt References: 1. NIST SP 800-53 Rev. 5:
      IA-5 Additional Information: Additional module options may be set,
      recommendation only covers those listed here. The following command may be
      used to expire all non-system user ID's immediately and force them to change
      their passwords on next login. Any system accounts that need to be expired
      should be carefully done separately by the system administrator to prevent any
      potential problems. # awk -F: '( $3<''$(awk '/^\s*UID_MIN/{print $2}'
      /etc/login.defs)'' && $1 != 'nfsnobody' ) { print $1 }' /etc/passwd | xargs -n
      1 chage -d 0
    references: >
