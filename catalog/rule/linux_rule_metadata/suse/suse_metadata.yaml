    cis_version: "12_v3.2.1"
    cis_control: "6.1.2"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      The /etc/passwd file contains user account information that is used by many
      system utilities and therefore must be readable for these utilities to
      operate.
    rationale: >
      It is critical to ensure that the /etc/passwd file is protected from
      unauthorized write access. Although it is protected by default, the file
      permissions could be changed either inadvertently or through malicious
      actions.
    audit_procedure: >
      Run the following command and verify Uid and Gid are both 0/root and Access is
      644 or more restrictive: # stat /etc/passwd Access: (0644/-rw-r--r--) Uid: (
      0/ root) Gid: ( 0/ root)
    remediation: >
      Run the following commands to set owner, group, and permissions on
      /etc/passwd: # chown root:root /etc/passwd # chmod u-x,g-wx,o-wx /etc/passwd
