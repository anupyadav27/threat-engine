  - rule_id: suse.cis.5.sudo_log_file_exists
    title: "Ensure sudo log file exists"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "5.2.3"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The Defaults logfile entry sets the path to the sudo log file. Setting a path
      turns on logging to a file; negating this option turns it off. By default,
      sudo logs via syslog.
    rationale: >
      Defining a dedicated log file for sudo simplifies auditing of sudo commands
      and creation of auditd rules for sudo. Impact: WARNING: Editing the sudo
      configuration incorrectly can cause sudo to stop functioning. Always use
      visudo to modify sudo configuration files. Creation of additional log files
      can cause disk space exhaustion if not correctly managed. You should configure
      logrotate to manage the sudo log in accordance with your local policy.
    audit_procedure: >
      Run the following command to verify that sudo has a custom log file configured
      # grep -rPsi
      '^\h*Defaults\h+([^#]+,\h*)?logfile\h*=\h*(\'|\')?\H+(\'|\')?(,\h*\H+\h*)*\h*
      (#.*)?$' /etc/sudoers* Example output: Defaults logfile='/var/log/sudo.log'
    remediation: >
      Edit the file /etc/sudoers or a file in /etc/sudoers.d/ with visudo -f <PATH
      TO FILE> and add the following line: Defaults logfile='<PATH TO CUSTOM LOG
      FILE>' Example Defaults logfile='/var/log/sudo.log' Notes: • sudo will read
      each file in /etc/sudoers.d, skipping file names that end in ~ or contain a .
      character to avoid causing problems with package manager or editor
      temporary/backup files. • Files are parsed in sorted lexical order. That is,
      /etc/sudoers.d/01_first will be parsed before /etc/sudoers.d/10_second. • Be
      aware that because the sorting is lexical, not numeric,
      /etc/sudoers.d/1_whoops would be loaded after /etc/sudoers.d/10_second. •
      Using a consistent number of leading zeroes in the file names can be used to
      avoid such problems. References: 1. SUDO(8) 2. VISUDO(8) 3. sudoers(5) 4. NIST
      SP 800-53 Rev. 5: AU-3, AU-12 Additional Information: visudo edits the sudoers
      file in a safe fashion, analogous to vipw(8). visudo locks the sudoers file
      against multiple simultaneous edits, provides basic sanity checks, and checks
      for parse errors. If the sudoers file is currently being edited you will
      receive a message to try again later.
    references: >
      1. SUDO(8) 2. VISUDO(8) 3. sudoers(5) 4. NIST SP 800-53 Rev. 5: AU-3, AU-12
      Additional Information: visudo edits the sudoers file in a safe fashion,
      analogous to vipw(8). visudo locks the sudoers file against multiple
      simultaneous edits, provides basic sanity checks, and checks for parse errors.
      If the sudoers file is currently being edited you will receive a message to
      try again later.
    impact: >
      WARNING: Editing the sudo configuration incorrectly can cause sudo to stop
      functioning. Always use visudo to modify sudo configuration files. Creation of
      additional log files can cause disk space exhaustion if not correctly managed.
      You should configure logrotate to manage the sudo log in accordance with your
      local policy.
    compliance_mappings:
      cis:
        - "CIS_SUSE_15_v2_0_1_5_2_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_suse_15_v2_0_1_5_2_3"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: suse.cis.5.users_must_provide_password_for_escalation
    title: "Ensure users must provide password for escalation"
    severity: medium
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "5.2.4"
    cis_section: "5"
    profile_applicability: "Level 2"
    description: >
      The operating system must be configured so that users must provide a password
      for privilege escalation.
    rationale: >
      Without re-authentication, users may access resources or perform tasks for
      which they do not have authorization. When operating systems provide the
      capability to escalate a functional capability, it is critical the user re-
      authenticate. Impact: This will prevent automated processes from being able to
      elevate privileges.
    audit_procedure: >
      Note: If passwords are not being used for authentication, this is not
      applicable. Verify the operating system requires users to supply a password
      for privilege escalation. Check the configuration of the /etc/sudoers and
      /etc/sudoers.d/* files with the following command: # grep -r '^[^#].*NOPASSWD'
      /etc/sudoers* If any line is found refer to the remediation procedure below.
    remediation: >
      Based on the outcome of the audit procedure, use visudo -f <PATH TO FILE> to
      edit the relevant sudoers file. Remove any line with occurrences of NOPASSWD
      tags in the file. References: 1. NIST SP 800-53 Rev. 5: AC-6
    references: >
      1. NIST SP 800-53 Rev. 5: AC-6
    impact: >
      This will prevent automated processes from being able to elevate privileges.
