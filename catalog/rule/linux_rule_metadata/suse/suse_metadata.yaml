  - rule_id: suse.cis.1.mounting_of_fat_filesystems_is_limited
    title: "Ensure mounting of FAT filesystems is limited"
    severity: medium
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "1.1.1.3"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      The FAT filesystem format is primarily used on older windows systems and
      portable USB drives or flash modules. It comes in three types FAT12 , FAT16 ,
      and FAT32 all of which are supported by the vfat kernel module.
    rationale: >
      Removing support for unneeded filesystem types reduces the local attack
      surface of the system. If this filesystem type is not needed, disable it.
      Note: • The FAT filesystem format is used by UEFI systems for the EFI boot
      partition. Disabling the vfat module can prevent boot on UEFI systems. • FAT
      filesystems are often used on portable USB sticks and other flash media which
      are commonly used to transfer files between workstations, removing VFAT
      support may prevent the ability to transfer files in this way. Impact: The FAT
      filesystem format is used by UEFI systems for the EFI boot partition.
      Disabling the vfat module can prevent boot on UEFI systems. FAT filesystems
      are often used on portable USB sticks and other flash media which are commonly
      used to transfer files between workstations, removing VFAT support may prevent
      the ability to transfer files in this way.
    audit_procedure: >
      If utilizing UEFI the FAT filesystem format is required. If this case, ensure
      that the FAT filesystem is only used where appropriate Run the following
      command # grep -E -i '\svfat\s' /etc/fstab And review that any output is
      appropriate for your environment If not utilizing UEFI Run the following
      commands and verify the output is as indicated: # modprobe -n -v fat | grep -E
      '(fat|install)' install /bin/true # lsmod | grep fat <No output> # modprobe -n
      -v vfat | grep -E '(vfat|install)' install /bin/true # lsmod | grep vfat <No
      output> # modprobe -n -v msdos | grep -E '(msdos|install)' install /bin/true #
      lsmod | grep msdos <No output>
    remediation: >
      Edit or create a file in the /etc/modprobe.d/ directory ending in .conf and
      add the following lines: Example: vim /etc/modprobe.d/fat.conf install fat
      /bin/true install vfat /bin/true install msdos /bin/true Run the following
      commands to unload the msdos, vfat, and fat modules: # modprobe -r msdos #
      modprobe -r vfat # modprobe -r fat
    references: >
      
