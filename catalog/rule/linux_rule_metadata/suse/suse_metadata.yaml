    profile_applicability: "Level 1"
    description: >
      Address space layout randomization (ASLR) is an exploit mitigation technique
      which randomly arranges the address space of key data areas of a process.
    rationale: >
      Randomly placing virtual memory regions will make it difficult to write memory
      page exploits as the memory placement will be consistently shifting.
    audit_procedure: >
      Run the following commands and verify output matches: # sysctl
      kernel.randomize_va_space kernel.randomize_va_space = 2 # grep -s --
      'kernel\.randomize_va_space' /run/sysctl.d/*.conf /etc/sysctl.d/*.conf
      /usr/local/lib/sysctl.d/*.conf /usr/lib/sysctl.d/*.conf /lib/sysctl.d/*.conf
      /etc/sysctl.conf kernel.randomize_va_space = 2
    remediation: >
      Set the following parameter in /etc/sysctl.conf or a /etc/sysctl.d/* file:
      Example: echo ' kernel.randomize_va_space = 2 ' >>
      /etc/sysctl.d/50-kernel_sysctl.conf Run the following command to set the
      active kernel parameter: # sysctl -w kernel.randomize_va_space=2
