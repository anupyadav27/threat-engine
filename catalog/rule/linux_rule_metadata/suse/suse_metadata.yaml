  - rule_id: suse.cis.5.root_user_umask_is_configured
    title: "Ensure root user umask is configured"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "5.4.2.6"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The user file-creation mode mask (umask) is used to determine the file
      permission for newly created directories and files. In Linux, the default
      permissions for any newly created directory is 0777 (rwxrwxrwx), and for any
      newly created file it is 0666 (rw-rw- rw-). The umask modifies the default
      Linux permissions by restricting (masking) these permissions. The umask is not
      simply subtracted, but is processed bitwise. Bits set in the umask are cleared
      in the resulting file mode. umask can be set with either Octal or Symbolic
      values: • Octal (Numeric) Value - Represented by either three or four digits.
      ie umask 0027 or umask 027. If a four digit umask is used, the first digit is
      ignored. The remaining three digits effect the resulting permissions for user,
      group, and world/other respectively. • Symbolic Value - Represented by a comma
      separated list for User u, group g, and world/other o. The permissions listed
      are not masked by umask. ie a umask set by umask u=rwx,g=rx,o= is the Symbolic
      equivalent of the Octal umask 027. This umask would set a newly created
      directory with file mode drwxr-x--- and a newly created file with file mode
      rw-r-----. root user Shell Configuration Files: • /root/.bash_profile - Is
      executed to configure the root users' shell before the initial command prompt.
      Is only read by login shells. • /root/.bashrc - Is executed for interactive
      shells. only read by a shell that's both interactive and non-login umask is
      set by order of precedence. If umask is set in multiple locations, this order
      of precedence will determine the system's default umask. Order of precedence:
      1. /root/.bash_profile 2. /root/.bashrc 3. The system default umask
    rationale: >
      Setting a secure value for umask ensures that users make a conscious choice
      about their file permissions. A permissive umask value could result in
      directories or files with excessive permissions that can be read and/or
      written to by unauthorized users.
    audit_procedure: >
      Run the following to verify the root user umask is set to enforce a newly
      created directories' permissions to be 750 (drwxr-x---), and a newly created
      file's permissions be 640 (rw-r-----), or more restrictive: # grep -Psi --
      '^\h*umask\h+(([0-7][0-7][01][0-7]\b|[0-7][0-7][0-7][0-
      6]\b)|([0-7][01][0-7]\b|[0-7][0-7][0-
      6]\b)|(u=[rwx]{1,3},)?(((g=[rx]?[rx]?w[rx]?[rx]?\b)(,o=[rwx]{1,3})?)|((g=[wrx
      ]{1,3},)?o=[wrx]{1,3}\b)))' /root/.bash_profile /root/.bashrc Nothing should
      be returned.
    remediation: >
      Edit /root/.bash_profile and /root/.bashrc and remove, comment out, or update
      any line with umask to be 0027 or more restrictive. Default Value: System
      default umask References: 1. NIST SP 800-53 Rev. 5: AC-3, MP-2
    references: >
      1. NIST SP 800-53 Rev. 5: AC-3, MP-2
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_SUSE_15_v2_0_1_5_4_2_6"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_suse_15_v2_0_1_5_4_2_6"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: suse.cis.5.system_accounts_do_not_have_a_valid_login_shell
    title: "Ensure system accounts do not have a valid login shell"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "5.4.2.7"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      There are a number of accounts provided with most distributions that are used
      to manage applications and are not intended to provide an interactive shell.
      Furthermore, a user may add special accounts that are not intended to provide
      an interactive shell.
    rationale: >
      It is important to make sure that accounts that are not being used by regular
      users are prevented from being used to provide an interactive shell. By
      default, most distributions set the password field for these accounts to an
      invalid string, but it is also recommended that the shell field in the
      password file be set to the nologin shell. This prevents the account from
      potentially being used to run any commands.
    audit_procedure: >
      Run the following command to verify system accounts, except for root, halt,
      sync, shutdown or nfsnobody, do not have a valid login shell: #!/usr/bin/env
      bash { l_valid_shells='^($(awk -F\/ '$NF != 'nologin' {print}' /etc/shells |
      sed -rn '/^\//{s,/,\\\\/,g;p}' | paste -s -d '|' - ))$' awk -v
      pat='$l_valid_shells' -F: '($1!~/^(root|halt|sync|shutdown|nfsnobody)$/ &&
      ($3<''$(awk '/^\s*UID_MIN/{print $2}' /etc/login.defs)'' || $3 == 65534) &&
      $(NF) ~ pat) {print 'Service account: \'' $1 '\' has a valid shell: ' $7}'
      /etc/passwd } Nothing should be returned
    remediation: >
      Run the following command to set the shell for any service accounts returned
      by the audit to nologin: # usermod -s $(command -v nologin) <user> Example
      script: #!/usr/bin/env bash { l_valid_shells='^($( awk -F\/ '$NF != 'nologin'
      {print}' /etc/shells | sed -rn '/^\//{s,/,\\\\/,g;p}' | paste -s -d '|' - ))$'
      awk -v pat='$l_valid_shells' -F: '($1!~/^(root|halt|sync|shutdown|nfsnobody)$/
      && ($3<''$(awk '/^\s*UID_MIN/{print $2}' /etc/login.defs)'' || $3 == 65534) &&
      $(NF) ~ pat) {system ('usermod -s ''$(command -v nologin)'' ' $1)}'
      /etc/passwd } References: 1. NIST SP 800-53 Rev. 5: AC-2(5), AC-3, AC-11, MP-2
      Additional Information: The root, sync, shutdown, and halt users are exempted
      from requiring a non-login shell.
    references: >
      1. NIST SP 800-53 Rev. 5: AC-2(5), AC-3, AC-11, MP-2 Additional Information:
      The root, sync, shutdown, and halt users are exempted from requiring a non-
      login shell.
