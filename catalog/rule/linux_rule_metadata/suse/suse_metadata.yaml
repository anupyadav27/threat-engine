  - rule_id: suse.cis.6.journald_service_is_enabled_and_active
    title: "Ensure journald service is enabled and active"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "6.2.1.1"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Ensure that the systemd-journald service is enabled to allow capturing of
      logging events.
    rationale: >
      If the systemd-journald service is not enabled to start on boot, the system
      will not capture logging events.
    audit_procedure: >
      Run the following command to verify systemd-journald is enabled: # systemctl
      is-enabled systemd-journald.service static Note: By default the systemd-
      journald service does not have an [Install] section and thus cannot be enabled
      / disabled. It is meant to be referenced as Requires or Wants by other unit
      files. As such, if the status of systemd-journald is not static, investigate
      why Run the following command to verify systemd-journald is active: #
      systemctl is-active systemd-journald.service active
    remediation: >
      Run the following commands to unmask and start systemd-journald.service #
      systemctl unmask systemd-journald.service # systemctl start systemd-
