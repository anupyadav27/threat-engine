  - rule_id: suse.cis.6.events_that_modify_date_and_time_information_are
    title: "Ensure events that modify date and time information are collected"
    severity: medium
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "6.3.3.4"
    cis_section: "6"
    profile_applicability: "Level 2"
    description: >
      Capture events where the system date and/or time has been modified. The
      parameters in this section are set to determine if the; • adjtimex - tune
      kernel clock • settimeofday - set time using timeval and timezone structures •
      stime - using seconds since 1/1/1970 • clock_settime - allows for the setting
      of several internal clocks and timers system calls have been executed.
      Further, ensure to write an audit record to the configured audit log file upon
      exit, tagging the records with a unique identifier such as 'time-change'.
    rationale: >
      Unexpected changes in system date and/or time could be a sign of malicious
      activity on the system.
    audit_procedure: >
      On disk configuration Run the following command to check the on disk rules: #
      { awk '/^ *-a *always,exit/ \ &&/ -F *arch=b(32|64)/ \ &&/ -S/ \ &&(/adjtimex/
      \ ||/settimeofday/ \ ||/clock_settime/ ) \ &&(/ key= *[!-~]* *$/||/ -k *[!-~]*
      *$/)' /etc/audit/rules.d/*.rules awk '/^ *-w/ \ &&/\/etc\/localtime/ \ &&/ +-p
      *wa/ \ &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)' /etc/audit/rules.d/*.rules }
      Verify output of matches: -a always,exit -F arch=b64 -S adjtimex,settimeofday
      -k time-change -a always,exit -F arch=b32 -S adjtimex,settimeofday -k time-
      change -a always,exit -F arch=b64 -S clock_settime -F a0=0x0 -k time-change -a
      always,exit -F arch=b32 -S clock_settime -F a0=0x0 -k time-change -w
      /etc/localtime -p wa -k time-change Running configuration Run the following
      command to check loaded rules: # { auditctl -l | awk '/^ *-a *always,exit/ \
      &&/ -F *arch=b(32|64)/ \ &&/ -S/ \ &&(/adjtimex/ \ ||/settimeofday/ \
      ||/clock_settime/ ) \ &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)' auditctl -l |
      awk '/^ *-w/ \ &&/\/etc\/localtime/ \ &&/ +-p *wa/ \ &&(/ key= *[!-~]* *$/||/
      -k *[!-~]* *$/)' } Verify the output includes: -a always,exit -F arch=b64 -S
      adjtimex,settimeofday -F key=time-change -a always,exit -F arch=b32 -S
      settimeofday,adjtimex -F key=time-change -a always,exit -F arch=b64 -S
      clock_settime -F a0=0x0 -F key=time-change -a always,exit -F arch=b32 -S
      clock_settime -F a0=0x0 -F key=time-change -w /etc/localtime -p wa -k time-
      change
    remediation: >
      Create audit rules Edit or create a file in the /etc/audit/rules.d/ directory,
      ending in .rules extension, with the relevant rules to monitor events that
      modify date and time information. Example: # printf ' -a always,exit -F
      arch=b64 -S adjtimex,settimeofday -k time-change -a always,exit -F arch=b32 -S
      adjtimex,settimeofday -k time-change -a always,exit -F arch=b64 -S
      clock_settime -F a0=0x0 -k time-change -a always,exit -F arch=b32 -S
      clock_settime -F a0=0x0 -k time-change -w /etc/localtime -p wa -k time-change
      ' >> /etc/audit/rules.d/50-time-change.rules Load audit rules Merge and load
