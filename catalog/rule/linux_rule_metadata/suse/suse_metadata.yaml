  - rule_id: suse.cis.5.lockout_for_failed_password_attempts_is_configured
    title: "Ensure lockout for failed password attempts is configured"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "5.3.2"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      Lock out users after n unsuccessful consecutive login attempts. These settings
      are commonly configured with the pam_faillock.so module. Some environments may
      continue using the pam_tally2.so module, where this older method may simplify
      automation in mixed environments. Set the lockout number in deny= to the
      policy in effect at your site. unlock_time=_n_ is the number of seconds the
      account remains locked after the number of attempts configured in deny=_n_ has
      been met. Note: • Additional module options may be set, recommendation only
      covers those listed here. • If you want to require the administrator to unlock
      accounts, leave off the unlock_time option. • The default location for
      attempted accesses is recorded in /var/log/tallylog. • Use of the 'audit'
      keyword may log credentials in the case of user error during authentication.
      This risk should be evaluated in the context of the site policies of your
      organization. • You may also lock out root, this should be considered
      carefully due to the ability to have this setting lock all access to the
      system o As an option on the same line: o auth required pam_tally2.so deny=5
      even_deny_root unlock_time=900 o To define a different lockout time for root:
      o auth required pam_tally2.so deny=5 root_unlock_time=120 unlock_time=900 • If
      a user has been locked out because they have reached the maximum consecutive
      failure count defined by deny= in the pam_tally2.so module, the user can be
      unlocked by issuing following command. This command sets the failed count to
      0, effectively unlocking the user. • # pam_tally2 -u <username> --reset
    rationale: >
      Locking out user IDs after n unsuccessful consecutive login attempts mitigates
      brute force password attacks against your systems.
    audit_procedure: >
      Verify password lockouts are configured. Ensure that the deny=_n_ follows
      local site policy. This should not exceed deny=5. Run the following commands:
      # grep -E '^\s*auth\s+\S+\s+pam_(tally2|unix)\.so' /etc/pam.d/login Verify the
      output includes the following lines: auth required pam_tally2.so deny=5
      onerr=fail unlock_time=900 auth required pam_unix.so try_first_pass # grep -E
      '^\s*account\s+required\s+pam_tally2.so\s*' /etc/pam.d/common- account Verify
      the output includes the following lines: account required pam_tally2.so
    remediation: >
      Modify the deny= and unlock_time= parameters to conform to local site policy,
      Not to be greater than deny=5: Edit the file /etc/pam.d/login and add the
      following line: auth required pam_tally2.so deny=5 onerr=fail unlock_time=900
      Note: The ordering on the lines is important. The additional line needs to
      below the line auth required pam_env.so and above all password validation
      lines. Example: auth required pam_env.so auth required pam_tally2.so deny=5
      onerr=fail unlock_time=900 auth sufficient pam_unix.so nullok try_first_pass
      auth required pam_deny.so Edit the /etc/pam.d/common-account file and add the
      following pam_tally2.so line: account required pam_tally2.so
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_SUSE_12_v3_2_1_5_3_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_suse_12_v3_2_1_5_3_2"
    metadata_source: generated
