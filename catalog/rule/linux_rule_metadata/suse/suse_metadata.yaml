      lines have the security=apparmor parameter set: # grep '^\s*linux'
      /boot/grub2/grub.cfg | grep -v 'security=apparmor' Nothing should be returned.
    remediation: >
      Edit /etc/default/grub and add the apparmor=1 and security=apparmor parameters
      to the GRUB_CMDLINE_LINUX= line GRUB_CMDLINE_LINUX='apparmor=1
      security=apparmor' Run the following command to update the grub2
      configuration: # grub2-mkconfig -o /boot/grub2/grub.cfg References: 1. NIST SP
      800-53 Rev. 5: AC-3
