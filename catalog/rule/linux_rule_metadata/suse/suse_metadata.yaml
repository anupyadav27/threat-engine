  - rule_id: suse.cis.1.mounting_of_squashfs_filesystems_is_disabled
    title: "Ensure mounting of squashfs filesystems is disabled"
    severity: medium
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "1.1.1.1"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      The squashfs filesystem type is a compressed read-only Linux filesystem
      embedded in small footprint systems (similar to cramfs ). A squashfs image can
      be used without having to first decompress the image.
    rationale: >
      Removing support for unneeded filesystem types reduces the local attack
      surface of the system. If this filesystem type is not needed, disable it.
      Impact: Disabling squashfs will prevent the use of snap. Snap is a package
      manager for Linux for installing Snap packages. 'Snap' application packages of
      software are self-contained and work across a range of Linux distributions.
      This is unlike traditional Linux package management approaches, like APT or
      RPM, which require specifically adapted packages per Linux distribution on an
      application update and delay therefore application deployment from developers
      to their software's end-user. Snaps themselves have no dependency on any
      external store ('App store'), can be obtained from any source and can be
      therefore used for upstream software deployment. When snaps are deployed on
      versions of Linux, the Ubuntu app store is used as default back-end, but other
      stores can be enabled as well.
    audit_procedure: >
      Run the following commands and verify the output is as indicated: # modprobe
      -n -v squashfs | grep -E '(squashfs|install)' install /bin/true # lsmod | grep
      squashfs <No output>
    remediation: >
      Edit or create a file in the /etc/modprobe.d/ directory ending in .conf
      Example: vi /etc/modprobe.d/squashfs.conf and add the following line: install
      squashfs /bin/true Run the following command to unload the squashfs module: #
      modprobe -r squashfs
