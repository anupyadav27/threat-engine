  - rule_id: suse.cis.2.time_synchronization_is_in_use
    title: "Ensure time synchronization is in use"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "2.2.1.1"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      System time should be synchronized between all systems in an environment. This
      is typically done by establishing an authoritative time server or set of
      servers and having all systems synchronize their clocks to them. Note: • On
      systems where host-based time synchronization is not available, verify that
      chrony is installed or systemd-timesyncd is enabled. • On systems where host-
      based time synchronization is available consult your documentation and verify
      that host-based synchronization is in use. • - IF - another method for time
      synchronization is being used, this section may be skipped.
    rationale: >
      Time synchronization is important to support time sensitive security
      mechanisms like Kerberos and also ensures log files have consistent time
      records across the enterprise, which aids in forensic investigations.
    audit_procedure: >
      On systems where host based time synchronization is not available, verify
      chrony is installed OR systemd-timesyncd is enabled: Note: Only one time
      synchronization package should be installed and/or enabled. Run the following
      command to verify that chrony is installed: # rpm -q chrony chrony-<version> -
      OR - Run the following command to verify that systemd-timesyncd is enabled: #
      systemctl is-enabled systemd-timesyncd
    remediation: >
      On systems where host based time synchronization is not available, install
      chrony - OR - enable systemd-timesyncd: Run the following command to install
      chrony: # zypper install chrony - OR - Run the following command to enable
      systemd-timesyncd # systemctl enable systemd-timesyncd Note: On systems where
      host-based time synchronization is available consult your virtualization
      software documentation and setup host-based synchronization.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_SUSE_12_v3_2_1_2_2_1_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_suse_12_v3_2_1_2_2_1_1"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: suse.cis.2.systemd_timesyncd_is_configured
    title: "Ensure systemd-timesyncd is configured"
    severity: high
    category: linux
    tech_type: suse
    automation_type: manual
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "2.2.1.2"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      systemd-timesyncd is a daemon that has been added for synchronizing the system
      clock across the network. The systemd-timesyncd daemon: • Implements an SNTP
      client. • Only implements a client side o Does not bother with the full NTP
      complexity o Only on querys time from one remote server, synchronizing the
      local clock to it • runs with minimal privileges • saves the current clock to
      disk every time a new NTP sync has been acquired o Uses this to correct the
      system clock early at bootup o to make sure that time monotonically progresses
      on these systems, even if it is not always correct • Requires a new system
      user and group 'systemd-timesync' to be created on installation of systemd •
      Hooked up with networkd to only operate when network connectivity is available
      Notes: • The systemd-timesyncd service specifically implements only SNTP. This
      minimalistic service will set the system clock for large offsets or slowly
      adjust it for smaller deltas. More complex use cases are not covered by
      systemd- timesyncd. • - IF - chrony or ntp are used, systemd-timesyncd should
      be removed and this section skipped. • This recommendation only applies if
      timesyncd is in use on the system. • Only one time synchronization method
      should be in use on the system.
    rationale: >
      Proper configuration is vital to ensuring time synchronization is working
      properly.
    audit_procedure: >
      Ensure that timesyncd is enabled and started Run the following command to
      verify that systemd-timesyncd is enabled: # systemctl is-enabled systemd-
      timesyncd.service enabled Review /etc/systemd/timesyncd.conf and ensure that
      the NTP servers, NTP FallbackNTP servers, and RootDistanceMaxSec listed are in
