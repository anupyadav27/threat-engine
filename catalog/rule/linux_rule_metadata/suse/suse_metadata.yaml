    description: >
      The /etc/passwd file contains user account information that is used by many
      system utilities and therefore must be readable for these utilities to
      operate.
    rationale: >
      It is critical to ensure that the /etc/passwd file is protected from
      unauthorized write access. Although it is protected by default, the file
      permissions could be changed either inadvertently or through malicious
      actions.
    audit_procedure: >
      Run the following command to verify /etc/passwd is mode 644 or more
      restrictive, Uid is 0/root and Gid is 0/root: # stat -Lc 'Access: (%#a/%A)
      Uid: ( %u/ %U) Gid: ( %g/ %G)' /etc/passwd Access: (0644/-rw-r--r--) Uid: ( 0/
      root) Gid: ( 0/ root)
    remediation: >
      Run the following commands to remove excess permissions, set owner, and set
      group on /etc/passwd: # chmod u-x,go-wx /etc/passwd # chown root:root
      /etc/passwd Default Value: Access: (0644/-rw-r--r--) Uid: ( 0/ root) Gid: ( 0/
      root) References: 1. NIST SP 800-53 Rev. 5: AC-3, MP-2
