    description: >
      The contents of the /etc/motd file are displayed to users after login and
      function as a message of the day for authenticated users.
    rationale: >
      - IF - the /etc/motd file does not have the correct access configured, it
      could be modified by unauthorized users with incorrect or misleading
      information.
    audit_procedure: >
      Run the following command and verify that if /etc/motd exists, Access is 644
      or more restrictive, Uid and Gid are both 0/root: # [ -e /etc/motd ] && stat
      -Lc 'Access: (%#a/%A) Uid: ( %u/ %U) Gid: { %g/ %G)' /etc/motd Access:
      (0644/-rw-r--r--) Uid: ( 0/ root) Gid: ( 0/ root) -- OR -- Nothing is returned
    remediation: >
      Run the following commands to set mode, owner, and group on /etc/motd: # chown
      root:root $(readlink -e /etc/motd) # chmod u-x,go-wx $(readlink -e /etc/motd)
      - OR - Run the following command to remove the /etc/motd file: # rm /etc/motd
