      /etc/audit/rules.d/scope.rules:-w /etc/sudoers.d/ -p wa -k scope Run the
      following command and verify the rules are in the running auditd config: #
      auditctl -l | grep scope Verify output matches: -w /etc/sudoers -p wa -k scope
      -w /etc/sudoers.d -p wa -k scope
