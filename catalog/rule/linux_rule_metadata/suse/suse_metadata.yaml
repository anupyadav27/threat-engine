  - rule_id: suse.cis.5.password_dictionary_check_is_enabled
    title: "Ensure password dictionary check is enabled"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "5.3.2.2.1"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The pwquality dictcheck option sets whether to check for the words from the
      cracklib dictionary.
    rationale: >
      If the operating system allows the user to select passwords based on
      dictionary words, this increases the chances of password compromise by
      increasing the opportunity for successful guesses, and brute-force attacks.
    audit_procedure: >
      Verify that the dictcheck option is enabled: IF the pwquality configuration
      file(s) are used, run the following script to verify that the dictcheck option
      is not set to 0 (disabled) in a pwquality configuration file: #!/usr/bin/env
      bash { if grep -qs '^.+$' /etc/security/pwquality.conf
      /etc/security/pwquality.conf.d/*.conf; then if grep -Psi --
      '^\h*dictcheck\h*=\h*0\b' /etc/security/pwquality.conf
      /etc/security/pwquality.conf.d/*.conf; then printf '\n%s\n' ' ** FAIL **' \
      'pam_pwquality configuration file exists and dictcheck is disabled' else
      printf '\n%s\n' ' ** PASS **' \ 'pam_pwquality configuration file exists and
      dictcheck is not disabled' fi else printf '\n%s\n' ' ** FAIL **' \
      'pam_pwquality configuration file does not exist' fi } Note: • Settings
      observe an order of precedence: o module arguments override the settings in
      the /etc/security/pwquality.conf configuration file o settings in the
      /etc/security/pwquality.conf configuration file override settings in a .conf
      file in the /etc/security/pwquality.conf.d/ directory o settings in a .conf
      file in the /etc/security/pwquality.conf.d/ directory are read in canonical
      order, with last read file containing the setting taking precedence • It is
      recommended that settings be configured in a .conf file in the
      /etc/security/pwquality.conf.d/ directory for clarity, convenience, and
      durability. - OR - If the pam-config tool has been used to configure the
      global PAM configuration files, run the following command to verify the
      pam_cracklib.so is in use which enables dictcheck automatically: # grep -Psi
      -- 'pam_cracklib.so' /etc/pam.d/common-password{,-pc} Example Output :
      /etc/pam.d/common-password:password requisite pam_cracklib.so enforce_for_root
      difok=2 minlen=14 /etc/pam.d/common-password-pc:password requisite
      pam_cracklib.so enforce_for_root difok=2 minlen=14
    remediation: >
      Edit any file ending in .conf in the /etc/security/pwquality.conf.d/ directory
      and/or the file /etc/security/pwquality.conf and comment out or remove any
      instance of dictcheck = 0: Example: # sed -ri 's/^\s*dictcheck\s*=/# &/'
      /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf - OR/IF -
      the pam-config tool has been used to configure the global PAM configuration
      files. Run the following command to enable dictcheck: # pam-config -a
      --cracklib Default Value: dictcheck = 1 References: 1. NIST SP 800-53 Rev. 5:
      IA-5
    references: >
      1. NIST SP 800-53 Rev. 5: IA-5
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_SUSE_15_v2_0_1_5_3_2_2_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
