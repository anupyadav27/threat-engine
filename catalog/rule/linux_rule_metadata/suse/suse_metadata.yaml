    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "7.1.9"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      /etc/shells is a text file which contains the full pathnames of valid login
      shells. This file is consulted by chsh and available to be queried by other
      programs.
    rationale: >
      It is critical to ensure that the /etc/shells file is protected from
      unauthorized access. Although it is protected by default, the file permissions
      could be changed either inadvertently or through malicious actions.
    audit_procedure: >
      Run the following command to verify /etc/shells is mode 644 or more
      restrictive, Uid is 0/root and Gid is 0/root: # stat -Lc 'Access: (%#a/%A)
      Uid: ( %u/ %U) Gid: ( %g/ %G)' /etc/shells Access: (0644/-rw-r--r--) Uid: ( 0/
      root) Gid: ( 0/ root)
    remediation: >
      Run the following commands to remove excess permissions, set owner, and set
      group on /etc/shells: # chmod u-x,go-wx /etc/shells # chown root:root
      /etc/shells Default Value: Access: (0644/-rw-r--r--) Uid: ( 0/ root) Gid: ( 0/
      root) References: 1. NIST SP 800-53 Rev. 5: AC-3, MP-2
