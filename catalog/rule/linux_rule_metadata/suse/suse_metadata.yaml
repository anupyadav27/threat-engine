  - rule_id: suse.cis.4.a_single_firewall_configuration_utility_is_in_use
    title: "Ensure a single firewall configuration utility is in use"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "4.1.1"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      In Linux security, employing a single, effective firewall configuration
      utility ensures that only legitimate traffic gets processed, reducing the
      system’s exposure to potential threats.
    rationale: >
      Proper configuration of a single firewall utility minimizes cyber threats and
      protects services and data, while avoiding vulnerabilities like open ports or
      exposed services. Standardizing on a single tool simplifies management,
      reduces errors, and fortifies security across Linux systems. Impact: If you
      are upgrading from a release older than SUSE Linux Enterprise Server 15 GA,
      SuSEfirewall2 will be unchanged and you must manually upgrade to firewalld The
      use of more than one firewall utility may produce unexpected results.
    audit_procedure: >
      Run the following script to verify that a single firewall utility is in use on
      the system: #!/usr/bin/env bash { active_firewall=() firewalls=('firewalld'
      'susefirewall2') # Determine which firewall is in use for firewall in
      '${firewalls[@]}'; do case $firewall in firewalld|susefirewall2) cmd=$firewall
      esac if command -v $cmd &> /dev/null && systemctl is-enabled --quiet $firewall
      && systemctl is-active --quiet $firewall; then active_firewall+=('$firewall')
      fi done # Display audit results if [ ${#active_firewall[@]} -eq 1 ]; then
      printf '%s\n' '' 'Audit Results:' ' ** PASS **' ' - A single firewall is in
      use follow the recommendation in ${active_firewall[0]} subsection ONLY' elif [
      ${#active_firewall[@]} -eq 0 ]; then printf '%s\n' '' ' Audit Results:' ' **
      FAIL **' '- No firewall in use or unable to determine firewall status' else
      printf '%s\n' '' ' Audit Results:' ' ** FAIL **' ' - Multiple firewalls are in
      use: ${active_firewall[*]}' fi } `
    remediation: >
      Remediating to a single firewall configuration is a complex process and
      involves several steps. The following provides the basic steps to follow for a
      single firewall configuration: 1. Determine which firewall utility best fits
      organizational needs 2. If you are upgrading from a release older than SUSE
      Linux Enterprise Server 15 GA, SuSEfirewall2 will be unchanged and you must
      manually upgrade to firewalld 3. Return to this recommendation to ensure a
      single firewall configuration utility is in use References: 1.
      https://documentation.suse.com/sles/15-SP6/html/SLES-all/cha-security-
      firewall.html#sec-security-firewall-firewalld
    references: >
      1. https://documentation.suse.com/sles/15-SP6/html/SLES-all/cha-security-
      firewall.html#sec-security-firewall-firewalld
    impact: >
      If you are upgrading from a release older than SUSE Linux Enterprise Server 15
