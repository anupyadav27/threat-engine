  - rule_id: suse.cis.5.sudo_authentication_timeout_is_configured
    title: "Ensure sudo authentication timeout is configured correctly"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "5.2.6"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      sudo caches used credentials for a default of 5 minutes. This is for ease of
      use when there are multiple administrative tasks to perform. The timeout can
      be modified to suit local security policies.
    rationale: >
      Setting a timeout value reduces the window of opportunity for unauthorized
      privileged access to another user.
    audit_procedure: >
      Ensure that the caching timeout is no more than 15 minutes. Example: # grep
      -roP 'timestamp_timeout=\K[0-9]*' /etc/sudoers* If there is no
      timestamp_timeout configured in /etc/sudoers* then the default is 5 minutes.
      This default can be checked with: # sudo -V | grep 'Authentication timestamp
      timeout:' Note: A value of -1 means that the timeout is disabled. Depending on
      the configuration of the timestamp_type, this could mean for all terminals /
      processes of that user and not just that one single terminal session.
    remediation: >
      If the currently configured timeout is larger than 15 minutes, edit the file
      listed in the audit section with visudo -f <PATH TO FILE> and modify the entry
      timestamp_timeout= to 15 minutes or less as per your site policy. The value is
      in minutes. This particular entry may appear on its own, or on the same line
      as env_reset. See the following two examples: Defaults env_reset,
      timestamp_timeout=15 Defaults timestamp_timeout=15 Defaults env_reset
      References: 1. https://www.sudo.ws/man/1.9.0/sudoers.man.html
    references: >
      1. https://www.sudo.ws/man/1.9.0/sudoers.man.html
    impact: >
      
