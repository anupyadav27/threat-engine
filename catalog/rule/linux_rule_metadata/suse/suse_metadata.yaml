  - rule_id: suse.cis.5.only_approved_ciphers_are_used
    title: "Ensure only approved ciphers are used"
    severity: high
    category: linux
    tech_type: suse
    automation_type: manual
    cis_benchmark: "CIS_SUSE 12_v2.0.0"
    cis_version: "12_v2.0.0"
    cis_control: "5.2.11"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      This variable limits the types of ciphers that SSH can use during
      communication.
    rationale: >
      Based on research conducted at various institutions, it was determined that
      the symmetric portion of the SSH Transport Protocol (as described in RFC 4253)
      has security weaknesses that allowed recovery of up to 32 bits of plaintext
      from a block of ciphertext that was encrypted with the Cipher Block Chaining
      (CBD) method. From that research, new Counter mode algorithms (as described in
      RFC4344) were designed that are not vulnerable to these types of attacks and
      these algorithms are now recommended for standard use.
    audit_procedure: >
      Run the following command and verify that output does not contain any cipher
      block chaining (-cbc) algorithms: # grep 'Ciphers' /etc/ssh/sshd_config
      Ciphers aes256-ctr,aes192-ctr,aes128-ctr,aes256-gcm@openssh.com,aes128-
      gcm@openssh.com,chacha20-poly1305@openssh.com
    remediation: >
      Edit the /etc/ssh/sshd_config file to set the parameter as follows: Ciphers
      aes256-ctr,aes192-ctr,aes128-ctr References: 1. For more information on the
      Counter mode algorithms, read RFC4344 at http://www.ietf.org/rfc/rfc4344.txt
      Notes: Some organizations may have stricter requirements for approved ciphers.
      Ensure that ciphers used are in compliance with site policy. 229 | P a g e
    references: >
      1. For more information on the Counter mode algorithms, read RFC4344 at
      http://www.ietf.org/rfc/rfc4344.txt Notes: Some organizations may have
      stricter requirements for approved ciphers. Ensure that ciphers used are in
      compliance with site policy. 229 | P a g e
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_SUSE_12_v2_0_0_5_2_11"
      nist_800_53: []
      soc2: []
      pci_dss: []
