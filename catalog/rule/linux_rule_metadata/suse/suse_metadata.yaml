  - rule_id: suse.cis.6.etc_shadow_password_fields_are_not_empty
    title: "Ensure /etc/shadow password fields are not empty"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "6.2.2"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      An account with an empty password field means that anybody may log in as that
      user without providing a password.
    rationale: >
      All accounts must have passwords or be locked to prevent the account from
      being used by an unauthorized user.
    audit_procedure: >
      Run the following command and verify that no output is returned: # awk -F:
      '($2 == '' ) { print $1 ' does not have a password '}' /etc/shadow
    remediation: >
