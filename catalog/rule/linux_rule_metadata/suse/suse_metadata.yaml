    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      chrony is a daemon which implements the Network Time Protocol (NTP) and is
      designed to synchronize system clocks across a variety of systems and use a
      source that is highly accurate. More information on chrony can be found at:
      http://chrony.tuxfamily.org/. chrony can be configured to be a client and/or a
      server.
    rationale: >
      If chrony is in use on the system proper configuration is vital to ensuring
      time synchronization is working properly. Note: This recommendation only
      applies if chrony is in use on the system. If another method of time
      synchronization is in use on the system, this recommendation can be skipped.
    audit_procedure: >
      Run the following command and verify remote server is configured properly: #
      grep -E '^(server|pool)' /etc/chrony.conf server <remote-server> Multiple
      servers may be configured Run the following command and verify OPTIONS
      includes '-u chrony': # grep ^OPTIONS /etc/sysconfig/chronyd OPTIONS='-u
      chrony' Additional options may be present.
    remediation: >
      Add or edit server or pool lines to /etc/chrony.conf as appropriate: server
      <remote-server> Add or edit the OPTIONS in /etc/sysconfig/chronyd to include
      '-u chrony': OPTIONS='-u chrony' Run the following command to reload the
      chrony config: # systemctl reload-or-restart chronyd
