  - rule_id: suse.cis.1.sudo_commands_use_pty
    title: "Ensure sudo commands use pty"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "1.3.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      sudo can be configured to run only from a pseudo-pty Note: visudo edits the
      sudoers file in a safe fashion, analogous to vipw(8). visudo locks the sudoers
      file against multiple simultaneous edits, provides basic sanity checks, and
      checks for parse errors. If the sudoers file is currently being edited you
      will receive a message to try again later. The -f option allows you to tell
      visudo which file to edit.
    rationale: >
      Attackers can run a malicious program using sudo, which would again fork a
      background process that remains even when the main program has finished
      executing. This can be mitigated by configuring sudo to run other commands
      only from a pseudo- pty, whether I/O logging is turned on or not.
    audit_procedure: >
      Run the following command to verify that sudo can only run other commands from
      a pseudo-pty: # grep -Ei '^\s*Defaults\s+([^#]\S+,\s*)?use_pty\b' /etc/sudoers
      /etc/sudoers.d/* Defaults use_pty
    remediation: >
      Edit the file /etc/sudoers or a file in /etc/sudoers.d/ with visudo or visudo
      -f <PATH TO FILE> and add the following line: Defaults use_pty References: 1.
      SUDO(8)
    references: >
      1. SUDO(8)
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_SUSE_12_v3_2_1_1_3_2"
