    profile_applicability: "Level 1"
    description: >
      sudo can use a custom log file Note: visudo edits the sudoers file in a safe
      fashion, analogous to vipw(8). visudo locks the sudoers file against multiple
      simultaneous edits, provides basic sanity checks, and checks for parse errors.
      If the sudoers file is currently being edited you will receive a message to
      try again later. The -f option allows you to tell visudo which file to edit.
    rationale: >
      A sudo log file simplifies auditing of sudo commands Impact: Editing the sudo
      configuration incorrectly can cause sudo to stop functioning
    audit_procedure: >
      Verify that sudo has a custom log file configured Run the following command: #
      grep -Ei '^\s*Defaults\s+([^#;]+,\s*)?logfile\s*=\s*(')?[^#;]+(')?'
      /etc/sudoers /etc/sudoers.d/* Defaults logfile='/var/log/sudo.log'
    remediation: >
      edit the file /etc/sudoers or a file in /etc/sudoers.d/ with visudo or visudo
      -f <PATH TO FILE> and add the following line: Defaults logfile='<PATH TO
      CUSTOM LOG FILE>' Example Defaults logfile='/var/log/sudo.log' References: 1.
      SUDO(8) 2. VISUDO(8)
