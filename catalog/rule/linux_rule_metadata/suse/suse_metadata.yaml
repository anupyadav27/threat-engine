  - rule_id: suse.cis.1.system_wide_crypto_policy_is_not_set_to_legacy
    title: "Ensure system wide crypto policy is not set to legacy"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "1.6.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      When a system-wide policy is set up, the default behavior of applications will
      be to follow the policy. Applications will be unable to use algorithms and
      protocols that do not meet the policy, unless you explicitly request the
      application to do so. The system-wide crypto-policies followed by the crypto
      core components allow consistently deprecating and disabling algorithms
      system-wide. The LEGACY policy is less secure due to an increased attack
      surface. In addition to the DEFAULT level algorithms and protocols, it
      includes support for the TLS 1.0 and 1.1 protocols. The algorithms DSA, 3DES,
      and RC4 are allowed, while RSA keys and Diffie-Hellman parameters are accepted
      if they are at least 1023 bits long.
    rationale: >
      If the LEGACY system-wide crypto policy is selected, it includes support for
      TLS 1.0, TLS 1.1, and SSH2 protocols or later. The algorithms DSA, 3DES, and
      RC4 are allowed, while RSA and Diffie-Hellman parameters are accepted if
      larger than 1023-bits. These legacy protocols and algorithms can make the
      system vulnerable to attacks, including those listed in RFC 7457 Impact:
      Environments that require compatibility with older insecure protocols may
      require the use of the less secure LEGACY policy level.
    audit_procedure: >
      Run the following command to verify that the system-wide crypto policy is not
      LEGACY # grep -Pi '^\h*LEGACY\b' /etc/crypto-policies/config Verify that no
      lines are returned
    remediation: >
      Run the following command to change the system-wide crypto policy # update-
      crypto-policies --set <CRYPTO POLICY> Example: # update-crypto-policies --set
      DEFAULT Run the following to make the updated system-wide crypto policy active
      # update-crypto-policies Default Value: DEFAULT References: 1. CRYPTO-
      POLICIES(7) 2. fips-mode-setup(8) 3. NIST SP 800-53 Rev. 5: SC-8 Additional
      Information: - IF - FIPS is required by local site policy: The system-wide
      cryptographic policies contain a policy level that enables cryptographic
      algorithms in accordance with the requirements by the Federal Information
      Processing Standard (FIPS) Publication 140. The fips-mode-setup tool that
      enables or disables FIPS mode internally uses the FIPS systemwide
      cryptographic policy. Switching the system to FIPS mode by using the FIPS
      system-wide cryptographic policy does not guarantee compliance with the FIPS
      140 standard. Re-generating all cryptographic keys after setting the system to
      FIPS mode may not be possible. For example, in the case of an existing IdM
      realm with users' cryptographic keys you cannot re-generate all the keys. The
