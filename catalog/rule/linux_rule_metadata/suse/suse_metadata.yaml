  - rule_id: suse.cis.4.audit_log_storage_size_is_configured
    title: "Ensure audit log storage size is configured"
    severity: medium
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "4.1.2.1"
    cis_section: "4"
    profile_applicability: "Level 2"
    description: >
      Configure the maximum size of the audit log file. Once the log reaches the
      maximum size, it will be rotated and a new log file will be started. Note: •
      The max_log_file parameter is measured in megabytes. • Other methods of log
      rotation may be appropriate based on-site policy. One example is time-based
      rotation strategies which don't have native support in auditd configurations.
      Manual audit of custom configurations should be evaluated for effectiveness
      and completeness.
    rationale: >
      It is important that an appropriate size is determined for log files so that
      they do not impact the system and audit data is not lost.
    audit_procedure: >
      Run the following command and ensure output is in compliance with site policy:
      # grep max_log_file /etc/audit/auditd.conf max_log_file = <MB>
    remediation: >
      Set the following parameter in /etc/audit/auditd.conf in accordance with site
      policy: max_log_file = <MB>
