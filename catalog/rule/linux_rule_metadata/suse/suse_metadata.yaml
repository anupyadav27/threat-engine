    audit_procedure: >
      Review the contents of /etc/rsyslog.conf and /etc/rsyslog.d/*.conf files to
      ensure appropriate logging is set. In addition, run the following command and
      verify that the log files are logging information as expected: # ls -l
      /var/log/maillog
    remediation: >
      Edit the following lines in the /etc/rsyslog.conf and /etc/rsyslog.d/*.conf
      files as appropriate for your environment. Note: The below configuration is
      shown for example purposes only. Due care should be given to how the
      organization wishes to store log data. *.emerg :omusrmsg:* auth,authpriv.*
      /var/log/secure mail.* -/var/log/mail mail.info -/var/log/mail.info
      mail.warning -/var/log/mail.warn mail.err /var/log/mail.err cron.*
