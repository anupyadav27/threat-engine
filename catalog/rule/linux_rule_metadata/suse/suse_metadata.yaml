  - rule_id: suse.cis.5.sshd_clientaliveinterval_and_clientalivecountmax
    title: "Ensure sshd ClientAliveInterval and ClientAliveCountMax are configured"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "5.1.9"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      Note: To clarify, the two settings described below are only meant for idle
      connections from a protocol perspective and are not meant to check if the user
      is active or not. An idle user does not mean an idle connection. SSH does not
      and never had, intentionally, the capability to drop idle users. In SSH
      versions before 8.2p1 there was a bug that caused these values to behave in
      such a manner that they were abused to disconnect idle users. This bug has
      been resolved in 8.2p1 and thus it can no longer be abused disconnect idle
      users. The two options ClientAliveInterval and ClientAliveCountMax control the
      timeout of SSH sessions. Taken directly from man 5 sshd_config: •
      ClientAliveInterval Sets a timeout interval in seconds after which if no data
      has been received from the client, sshd(8) will send a message through the
      encrypted channel to request a response from the client. The default is 0,
      indicating that these messages will not be sent to the client. •
      ClientAliveCountMax Sets the number of client alive messages which may be sent
      without sshd(8) receiving any messages back from the client. If this threshold
      is reached while client alive messages are being sent, sshd will disconnect
      the client, terminating the session. It is important to note that the use of
      client alive messages is very different from TCPKeepAlive. The client alive
      messages are sent through the encrypted channel and therefore will not be
      spoofable. The TCP keepalive option en‐abled by TCPKeepAlive is spoofable. The
      client alive mechanism is valuable when the client or server depend on knowing
      when a connection has become unresponsive. The default value is 3. If
      ClientAliveInterval is set to 15, and ClientAliveCountMax is left at the
      default, unresponsive SSH clients will be disconnected after approximately 45
      seconds. Setting a zero ClientAliveCountMax disables connection termination.
    rationale: >
      In order to prevent resource exhaustion, appropriate values should be set for
      both ClientAliveInterval and ClientAliveCountMax. Specifically, looking at the
      source code, ClientAliveCountMax must be greater than zero in order to utilize
      the ability of SSH to drop idle connections. If connections are allowed to
      stay open indefinitely, this can potentially be used as a DDOS attack or
      simple resource exhaustion could occur over unreliable networks. The example
      set here is a 45 second timeout. Consult your site policy for network timeouts
      and apply as appropriate.
    audit_procedure: >
      Run the following command and verify ClientAliveInterval and
      ClientAliveCountMax are greater than zero: # sshd -T | grep -Pi --
      '(clientaliveinterval|clientalivecountmax)' Example Output:
      clientaliveinterval 15 clientalivecountmax 3 - IF - Match set statements are
      used in your environment, specify the connection parameters to use for the -T
      extended test mode and run the audit to verify the setting is not incorrectly
      configured in a match block Example additional audit needed for a match block
      for the user sshuser: # sshd -T -C user=sshuser | grep -Pi --
      '(clientaliveinterval|clientalivecountmax)' Note: If provided, any Match
      directives in the configuration file that would apply are applied before the
      configuration is written to standard output. The connection parameters are
      supplied as keyword=value pairs and may be supplied in any order, either with
      multiple -C options or as a comma-separated list. The keywords are addr
      (source address), user (user), host (resolved source host name), laddr (local
      address), lport (local port number), and rdomain (routing domain).
    remediation: >
      Edit the /etc/ssh/sshd_config file to set the ClientAliveInterval and
      ClientAliveCountMax parameters above any Include and Match entries according
      to site policy. Example: ClientAliveInterval 15 ClientAliveCountMax 3 Note:
      First occurrence of a option takes precedence, Match set statements
      withstanding. If Include locations are enabled, used, and order of precedence
      is understood in your environment, the entry may be created in a file in
      Include location. Default Value: ClientAliveInterval 0 ClientAliveCountMax 3
