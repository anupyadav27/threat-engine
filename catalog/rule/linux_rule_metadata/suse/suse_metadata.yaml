  - rule_id: suse.cis.6.audit_system_file_permissions
    title: "Audit system file permissions"
    severity: medium
    category: linux
    tech_type: suse
    automation_type: manual
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "6.1.1"
    cis_section: "6"
    profile_applicability: "Level 2"
    description: >
      The RPM package manager has a number of useful options. One of these, the -V
      option, can be used to verify that system packages are correctly installed.
      The V option can be used to verify a particular package or to verify all
      system packages. If no output is returned, the package is installed correctly.
      The following table describes the meaning of output from the verify option:
      Code Meaning S File size differs. M File mode differs (includes permissions
      and file type). 5 The MD5 checksum differs. D The major and minor version
      numbers differ on a device file. L A mismatch occurs in a link. U The file
      ownership differs. G The file group owner differs. T The file time (mtime)
      differs. The rpm -qf command can be used to determine which package a
      particular file belongs to. For example the following commands determines
      which package the /etc/ssh/sshd_config file belongs to: # rpm -qf
      /etc/ssh/sshd_config openssh-7.9p1-6.14.1.x86_64 To verify the settings for
      the package that controls the /etc/ssh/sshd_config file, run the following: #
      rpm -V openssh-7.9p1-6.14.1.x86_64 S.5....T. c /etc/ssh/sshd_config Note: You
      can feed the output of the rpm -qf command to the rpm -V command: # rpm -V
      $(rpm -qf /etc/ssh/sshd_config) S.5....T. c /etc/ssh/sshd_config Note: • Since
      packages and important files may change with new updates and releases, it is
      recommended to verify everything, not just a finite list of files. This can be
      a time consuming task and results may depend on site policy therefore it is
      not a scorable benchmark item, but is provided for those interested in
      additional security measures. • Some of the recommendations of this benchmark
      alter the state of files audited by this recommendation. The audit command
      will alert for all changes to a file permissions even if the new state is more
      secure than the default.
    rationale: >
      It is important to confirm that packaged system files and directories are
      maintained with the permissions they were intended to have from the OS
      distributor or in accordance with local site policy.
    audit_procedure: >
      Run the following command to review all installed packages. Note that this may
      be very time consuming and may be best scheduled via the cron utility. It is
      recommended that the output of this command be redirected to a file that can
      be reviewed later. This command will ignore configuration files due to the
      extreme likelihood that they will change. # rpm -Va --nomtime --nosize --nomd5
      --nolinkto > <filename> | grep -vw c
    remediation: >
      Investigate the results to ensure any discrepancies found are understood and
      support proper secure operation of the system. References: 1.
      https://docs.fedoraproject.org/en-US/fedora/rawhide/system-administrators-
      guide/RPM/#s2-rpm-verifying
    references: >
      1. https://docs.fedoraproject.org/en-US/fedora/rawhide/system-administrators-
      guide/RPM/#s2-rpm-verifying
    impact: >
      
    compliance_mappings:
