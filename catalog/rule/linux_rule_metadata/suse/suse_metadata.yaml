    profile_applicability: "Level 1"
    description: >
      The ypserv package provides the Network Information Service (NIS). This
      service, formally known as Yellow Pages, is a client-server directory service
      protocol for distributing system configuration files. The NIS server is a
      collection of programs that allow for the distribution of configuration files.
    rationale: >
      The NIS service is inherently an insecure system that has been vulnerable to
      DOS attacks, buffer overflows and has poor authentication for querying NIS
      maps. NIS generally has been replaced by such protocols as Lightweight
      Directory Access Protocol (LDAP). It is recommended that the ypserv package be
      removed, and if required a more secure services be used.
    audit_procedure: >
      Run the following command to verify ypserv is not installed: # rpm -q ypserv
