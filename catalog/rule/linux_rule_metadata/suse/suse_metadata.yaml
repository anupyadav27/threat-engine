  - rule_id: suse.cis.4.permissions_on_all_logfiles_are_configured
    title: "Ensure permissions on all logfiles are configured"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "4.2.3"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Log files stored in /var/log/ contain logged information from many services on
      the system, or on log hosts others as well.
    rationale: >
      It is important to ensure that log files have the correct permissions to
      ensure that sensitive data is archived and protected. Other/world should not
      have the ability to view this information. Group should not have the ability
      to modify this information.
    audit_procedure: >
      Run the following command and verify that other has no permissions on any
      files and group does not have write or execute permissions on any files: #
      find /var/log -type f -perm /g+wx,o+rwx -exec ls -l {} \; Nothing should be
      returned.
    remediation: >
      Run the following commands to set permissions on all existing log files: find
      /var/log -type f -exec chmod g-wx,o-rwx '{}' + -o -type d -exec chmod g-
      wx,o-rwx '{}' + Note: The configuration for your logging software or services
      may need to also be modified for any logs that had incorrect permissions,
      otherwise, the permissions may be reverted to the incorrect permissions
    references: >
      
    impact: >
      
