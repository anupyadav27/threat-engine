  - rule_id: suse.cis.1.nodev_option_set_on_dev_shm_partition
    title: "Ensure nodev option set on /dev/shm partition"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "1.1.2.2.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      The nodev mount option specifies that the filesystem cannot contain special
      devices.
    rationale: >
      Since the /dev/shm filesystem is not intended to support devices, set this
      option to ensure that users cannot attempt to create special devices in
      /dev/shm partitions.
    audit_procedure: >
      - IF - a separate partition exists for /dev/shm, verify that the nodev option
      is set. # findmnt -kn /dev/shm | grep -v 'nodev' Nothing should be returned
    remediation: >
      - IF - a separate partition exists for /dev/shm. Edit the /etc/fstab file and
      add nodev to the fourth field (mounting options) for the /dev/shm partition.
      See the fstab(5) manual page for more information. Example: tmpfs /dev/shm
      tmpfs defaults,rw,nosuid,nodev,noexec,relatime 0 0 Run the following command
      to remount /dev/shm with the configured options: # mount -o remount /dev/shm
      Note: It is recommended to use tmpfs as the device/filesystem type as /dev/shm
      is used as shared memory space by applications. References: 1. NIST SP 800-53
      Rev. 5: AC-3, MP-2 2. NIST SP 800-53 Revision 5 :: CM-7 (2) 3. RHEL 8 STIG Vul
      ID: V-230508 4. RHEL 8 STIG Rule ID: SV-230508r854049 Additional Information:
      Some distributions mount /dev/shm through other means and require /dev/shm to
      be added to /etc/fstab even though it is already being mounted on boot. Others
      may configure /dev/shm in other locations and may override /etc/fstab
      configuration. Consult the documentation appropriate for your distribution.
    references: >
