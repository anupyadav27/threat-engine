  - rule_id: suse.cis.6.no_world_writable_files_exist
    title: "Ensure no world writable files exist"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "6.1.8"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Unix-based systems support variable settings to control access to files. World
      writable files are the least secure. See the chmod(2) man page for more
      information.
    rationale: >
      Data in world-writable files can be modified and compromised by any user on
      the system. World writable files may also indicate an incorrectly written
      script or program that could potentially be the cause of a larger compromise
      to the system's integrity.
    audit_procedure: >
      Run the following command and verify no files are returned: # df --local -P |
      awk '{if (NR!=1) print $6}' | xargs -I '{}' find '{}' -xdev -type f -perm
      -0002 The command above only searches local filesystems, there may still be
      compromised items on network mounted partitions. Additionally the --local
      option to df is not universal to all versions, it can be omitted to search all
      filesystems on a system including network mounted filesystems or the following
      command can be run manually for each partition: # find <partition> -xdev -type
      f -perm -0002
    remediation: >
      Removing write access for the 'other' category ( chmod o-w <filename> ) is
      advisable, but always consult relevant vendor documentation to avoid breaking
      any application dependencies on a given file.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_SUSE_12_v3_2_1_6_1_8"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_suse_12_v3_2_1_6_1_8"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: suse.cis.6.no_unowned_files_or_directories_exist
    title: "Ensure no unowned files or directories exist"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "6.1.9"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Sometimes when administrators delete users from the password file they neglect
      to remove all files owned by those users from the system.
    rationale: >
      A new user who is assigned the deleted user's user ID or group ID may then end
      up 'owning' these files, and thus have more access on the system than was
      intended.
    audit_procedure: >
      Run the following command and verify no files are returned: # df --local -P |
      awk {'if (NR!=1) print $6'} | xargs -I '{}' find '{}' -xdev -nouser The
      command above only searches local filesystems, there may still be compromised
      items on network mounted partitions. Additionally the --local option to df is
      not universal to all versions, it can be omitted to search all filesystems on
      a system including network mounted filesystems or the following command can be
      run manually for each partition: # find <partition> -xdev -nouser
    remediation: >
      Locate files that are owned by users or groups not listed in the system
      configuration files, and reset the ownership of these files to some active
      user on the system as appropriate.
    references: >
      
    impact: >
      
