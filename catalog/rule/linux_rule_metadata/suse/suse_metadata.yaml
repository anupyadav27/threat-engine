  - rule_id: suse.cis.4.kernel_module_loading_and_unloading_is_collected
    title: "Ensure kernel module loading and unloading is collected"
    severity: medium
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "4.1.16"
    cis_section: "4"
    profile_applicability: "Level 2"
    description: >
      Monitor the loading and unloading of kernel modules. The programs insmod
      (install a kernel module), rmmod (remove a kernel module), and modprobe (a
      more sophisticated program to load and unload modules, as well as some other
      features) control loading and unloading of modules. The init_module (load a
      module) and delete_module (delete a module) system calls control loading and
      unloading of modules. Any execution of the loading and unloading module
      programs and system calls will trigger an audit record with an identifier of
      'modules'. Note: Reloading the auditd config to set active settings requires
      the auditd service to be restarted, and may require a system reboot.
    rationale: >
      Monitoring the use of insmod , rmmod and modprobe could provide system
      administrators with evidence that an unauthorized user loaded or unloaded a
      kernel module, possibly compromising the security of the system. Monitoring of
      the init_module and delete_module system calls would reflect an unauthorized
      user attempting to use a different program to load and unload modules.
    audit_procedure: >
      On a 32 bit system run the following commands: Run the following command and
      verify rules are in a .rules file: # grep modules /etc/audit/rules.d/*.rules
      Verify output matches: -w /sbin/insmod -p x -k modules -w /sbin/rmmod -p x -k
      modules -w /sbin/modprobe -p x -k modules -a always,exit -F arch=b32 -S
      init_module -S delete_module -k modules Run the following command and verify
      the rules are in the running auditd config: # auditctl -l | grep modules
      Verify output matches: -w /sbin/insmod -p x -k modules -w /sbin/rmmod -p x -k
      modules -w /sbin/modprobe -p x -k modules -a always,exit -F arch=b32 -S
      init_module,delete_module -F key=modules On a 64 bit system run the following
      commands: Run the following command and verify rules are in a .rules file: #
      grep modules /etc/audit/rules.d/*.rules Verify output matches:
      /etc/audit/rules.d/modules.rules:-w /sbin/insmod -p x -k modules
      /etc/audit/rules.d/modules.rules:-w /sbin/rmmod -p x -k modules
      /etc/audit/rules.d/modules.rules:-w /sbin/modprobe -p x -k modules
      /etc/audit/rules.d/modules.rules:-a always,exit -F arch=b64 -S init_module -S
      delete_module -k modules Run the following command and verify the rules are in
      the running auditd config: # auditctl -l | grep modules Verify output matches:
      -w /sbin/insmod -p x -k modules -w /sbin/rmmod -p x -k modules -w
      /sbin/modprobe -p x -k modules -a always,exit -F arch=b64 -S
      init_module,delete_module -F key=modules
    remediation: >
      For 32 bit systems Edit or create a file in the /etc/audit/rules.d/ directory
      ending in .rules Example: vi /etc/audit/rules.d/modules.rules and add the
      following lines: -w /sbin/insmod -p x -k modules -w /sbin/rmmod -p x -k
      modules -w /sbin/modprobe -p x -k modules -a always,exit -F arch=b32 -S
      init_module -S delete_module -k modules For 64 bit systems Edit or create a
      file in the /etc/audit/rules.d/ directory ending in .rules Example: vi
      /etc/audit/rules.d/modules.rules and add the following lines: -w /sbin/insmod
      -p x -k modules -w /sbin/rmmod -p x -k modules -w /sbin/modprobe -p x -k
      modules -a always,exit -F arch=b64 -S init_module -S delete_module -k modules
