  - rule_id: suse.cis.4.journald_is_configured_to_send_logs_to_rsyslog
    title: "Ensure journald is configured to send logs to rsyslog"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "4.2.2.1"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Data from journald may be stored in volatile memory or persisted locally on
      the server. Utilities exist to accept remote export of journald logs, however,
      use of the rsyslog service provides a consistent means of log collection and
      export. Note: • This recommendation assumes that recommendation 4.2.1.5,
      'Ensure rsyslog is configured to send logs to a remote log host' has been
      implemented. • The main configuration file /etc/systemd/journald.conf is read
      before any of the custom *.conf files. If there are custom configs present,
      they override the main configuration parameters. • As noted in the journald
      man pages: journald logs may be exported to rsyslog either through the process
      mentioned here, or through a facility like systemd-journald.service. There are
      trade-offs involved in each implementation, where ForwardToSyslog will
      immediately capture all events (and forward to an external log server, if
      properly configured), but may not capture all boot-up activities. Mechanisms
      such as systemd- journald.service, on the other hand, will record bootup
      events, but may delay sending the information to rsyslog, leading to the
      potential for log manipulation prior to export. Be aware of the limitations of
      all tools employed to secure a system.
    rationale: >
      Storing log data on a remote host protects log integrity from local attacks.
      If an attacker gains root access on the local system, they could tamper with
      or remove log data that is stored on the local system.
    audit_procedure: >
      Review /etc/systemd/journald.conf and verify that logs are forwarded to syslog
      # grep -E ^\s*ForwardToSyslog /etc/systemd/journald.conf ForwardToSyslog=yes
      The default value for ForwardToSyslog is yes therefore verify that this
      setting is not uncommented and configured to a value of no or false.
    remediation: >
      Edit the /etc/systemd/journald.conf file and add the following line:
      ForwardToSyslog=yes Default Value: ForwardToSyslog=yes References: 1.
      https://github.com/konstruktoid/hardening/blob/master/systemd.adoc#etcsystemd
      journaldconf
    references: >
      1.
      https://github.com/konstruktoid/hardening/blob/master/systemd.adoc#etcsystemd
      journaldconf
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_SUSE_12_v3_2_1_4_2_2_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_suse_12_v3_2_1_4_2_2_1"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: suse.cis.4.journald_is_configured_to_compress_large_log_files
    title: "Ensure journald is configured to compress large log files"
    severity: high
    category: linux
