  - rule_id: suse.cis.5.cron_is_restricted_to_authorized_users
    title: "Ensure cron is restricted to authorized users"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "5.1.8"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      If cron is installed in the system, configure /etc/cron.allow to allow
      specific users to use these services. If /etc/cron.allow does not exist, then
      /etc/cron.deny is checked. Any user not specifically defined in those files is
      allowed to use cron. By removing the file, only users in /etc/cron.allow are
      allowed to use cron. Note: Even though a given user is not listed in
      cron.allow, cron jobs can still be run as that user. The cron.allow file only
      controls administrative access to the crontab command for scheduling and
      modifying cron jobs.
    rationale: >
      On many systems, only the system administrator is authorized to schedule cron
      jobs. Using the cron.allow file to control who can run cron jobs enforces this
      policy. It is easier to manage an allow list than a deny list. In a deny list,
      you could potentially add a user ID to the system and forget to add it to the
      deny files.
    audit_procedure: >
      - IF - cron is installed: Run the following command and verify /etc/cron.deny
      does not exist: # stat /etc/cron.deny stat: cannot stat `/etc/cron.deny': No
      such file or directory Run the following command and verify Uid and Gid are
      both 0/root and Access does not grant permissions to group or other for
      /etc/cron.allow: # stat /etc/cron.allow Access: (0600/-rw-------) Uid: ( 0/
      root) Gid: ( 0/ root)
    remediation: >
      Run the following command to remove /etc/cron.deny: # rm /etc/cron.deny Run
      the following command to create /etc/cron.allow # touch /etc/cron.allow Run
      the following commands to set the owner and permissions on /etc/cron.allow: #
      chown root:root /etc/cron.allow # chmod u-x,og-rwx /etc/cron.allow - OR - Run
      the following command to remove cron # zypper remove cronie
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_SUSE_12_v3_2_1_5_1_8"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_suse_12_v3_2_1_5_1_8"
