  - rule_id: suse.cis.6.actions_as_another_user_are_always_logged
    title: "Ensure actions as another user are always logged"
    severity: medium
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "6.3.3.2"
    cis_section: "6"
    profile_applicability: "Level 2"
    description: >
      sudo provides users with temporary elevated privileges to perform operations,
      either as the superuser or another user.
    rationale: >
      Creating an audit log of users with temporary elevated privileges and the
      operation(s) they performed is essential to reporting. Administrators will
      want to correlate the events written to the audit trail with the records
      written to sudo's logfile to verify if unauthorized commands have been
      executed.
    audit_procedure: >
      On disk configuration Run the following command to check the on disk rules: #
      awk '/^ *-a *always,exit/ \ &&/ -F *arch=b(32|64)/ \ &&(/ -F *auid!=unset/||/
      -F *auid!=-1/||/ -F *auid!=4294967295/) \ &&(/ -C *euid!=uid/||/ -C
      *uid!=euid/) \ &&/ -S *execve/ \ &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)'
      /etc/audit/rules.d/*.rules Verify the output matches: -a always,exit -F
      arch=b64 -C euid!=uid -F auid!=unset -S execve -k user_emulation -a
      always,exit -F arch=b32 -C euid!=uid -F auid!=unset -S execve -k
      user_emulation Running configuration Run the following command to check loaded
      rules: # auditctl -l | awk '/^ *-a *always,exit/ \ &&/ -F *arch=b(32|64)/ \
      &&(/ -F *auid!=unset/||/ -F *auid!=-1/||/ -F *auid!=4294967295/) \ &&(/ -C
      *euid!=uid/||/ -C *uid!=euid/) \ &&/ -S *execve/ \ &&(/ key= *[!-~]* *$/||/ -k
      *[!-~]* *$/)' Verify the output matches: -a always,exit -F arch=b64 -S execve
      -C uid!=euid -F auid!=-1 -F key=user_emulation -a always,exit -F arch=b32 -S
      execve -C uid!=euid -F auid!=-1 -F key=user_emulation
    remediation: >
      Create audit rules Edit or create a file in the /etc/audit/rules.d/ directory,
      ending in .rules extension, with the relevant rules to monitor elevated
      privileges. Example: # printf ' -a always,exit -F arch=b64 -C euid!=uid -F
      auid!=unset -S execve -k user_emulation -a always,exit -F arch=b32 -C
      euid!=uid -F auid!=unset -S execve -k user_emulation ' >>
      /etc/audit/rules.d/50-user_emulation.rules Load audit rules Merge and load the
      rules into active configuration: # augenrules --load Check if reboot is
      required. # if [[ $(auditctl -s | grep 'enabled') =~ '2' ]]; then printf
      'Reboot required to load rules\n'; fi References: 1. NIST SP 800-53 Rev. 5:
