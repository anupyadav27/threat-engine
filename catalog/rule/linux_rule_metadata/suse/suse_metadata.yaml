  - rule_id: suse.cis.5.password_number_of_changed_characters_is
    title: "Ensure password number of changed characters is configured"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "5.3.2.2.2"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The pwquality difok option sets the number of characters in a password that
      must not be present in the old password.
    rationale: >
      Use of a complex password helps to increase the time and resources required to
      compromise the password. Password complexity, or strength, is a measure of the
      effectiveness of a password in resisting attempts at guessing and brute-force
      attacks. Password complexity is one factor of several that determines how long
      it takes to crack a password. The more complex the password, the greater the
      number of possible combinations that need to be tested before the password is
      compromised.
    audit_procedure: >
      Run the following command to verify that the difok option is set to 2 or more
      and follows local site policy: # grep -Psi --
      '^\h*difok\h*=\h*([2-9]|[1-9][0-9]+)\b' /etc/security/pwquality.conf
      /etc/security/pwquality.conf.d/*.conf Example output :
      /etc/security/pwquality.conf.d/50-pwdifok.conf:difok = 2 Notes: • Settings
      should be configured in only one location for clarity • Settings observe an
      order of precedence: o module arguments override the settings in the
      /etc/security/pwquality.conf configuration file o settings in the
      /etc/security/pwquality.conf configuration file override settings in a .conf
      file in the /etc/security/pwquality.conf.d/ directory o settings in a .conf
      file in the /etc/security/pwquality.conf.d/ directory are read in canonical
      order, with last read file containing the setting taking precedence • It is
      recommended that settings be configured in a .conf file in the
      /etc/security/pwquality.conf.d/ directory for clarity, convenience, and
      durability. - OR/IF - the pam-config tool has been used to configure the
      global PAM configuration files. Run the following command to verify that the
      difok option is set to 2 or more and follows local site policy: # pam-config
      --query --cracklib --cracklib-difok password: difok=2 Note: If there is no
      output then the pam-config tool has not been used to configure the cracklib
      pam module. Remediation should be done by editing a .conf file in the
      /etc/security/pwquality.conf.d/ directory or the/etc/security/pwquality.conf
      file.
    remediation: >
      Create or modify a file ending in .conf in the /etc/security/pwquality.conf.d/
      directory or the file /etc/security/pwquality.conf and add or modify the
      following line to set difok to 2 or more. Ensure setting conforms to local
      site policy: difok = 2 Example: # sed -ri 's/^\s*difok\s*=/# &/'
      /etc/security/pwquality.conf # printf '\n%s' 'difok = 2' >>
      /etc/security/pwquality.conf.d/50-pwdifok.conf - OR - If the pam-config tool
      has been used to configure the global PAM configuration files: Run the
      following command to add the difok option to 2 or more and follows local site
      policy # pam-config -a --cracklib-difok=2 Note: • The difok option maybe set
      to 2 or more and depending on local site policy. • Best practice for updating
      pam modules is to configure settings in a .conf file in the
      /etc/security/pwquality.conf.d/ directory or /etc/security/pwquality.conf
      Default Value: difok = 1 References: 1. NIST SP 800-53 Rev. 5: IA-5 2.
      https://documentation.suse.com/sles/15-SP6/html/SLES-all/cha-pam.html
    references: >
