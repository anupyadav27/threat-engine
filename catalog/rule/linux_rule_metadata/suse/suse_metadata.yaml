  - rule_id: suse.cis.1.noexec_option_set_on_removable_media_partitions
    title: "Ensure noexec option set on removable media partitions"
    severity: high
    category: linux
    tech_type: suse
    automation_type: manual
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "1.1.19"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      The noexec mount option specifies that the filesystem cannot contain
      executable binaries.
    rationale: >
      Setting this option on a file system prevents users from executing programs
      from the removable media. This deters users from being able to introduce
      potentially malicious software on the system.
    audit_procedure: >
      Run the following command and verify that the noexec option is set on all
      removable media partitions. # mount
    remediation: >
      Edit the /etc/fstab file and add noexec to the fourth field (mounting options)
      of all removable media partitions. Look for entries that have mount points
      that contain words such as floppy or cdrom. See the fstab(5) manual page for
      more information.
