  - rule_id: suse.cis.4.rsyslog_default_file_permissions_configured
    title: "Ensure rsyslog default file permissions configured"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "4.2.1.3"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      rsyslog will create logfiles that do not already exist on the system. This
      setting controls what permissions will be applied to these newly created
      files. The $FileCreateMode parameter specifies the file creation mode with
      which rsyslogd creates new files. If not specified, the value 0644 is used.
      Note: • The value given must always be a 4-digit octal number, with the
      initial digit being zero. • This setting can be overridden by a less
      restrictive setting in any file ending in .conf in the /etc/rsyslog.d/
      directory.
    rationale: >
      It is important to ensure that log files have the correct permissions to
      ensure that sensitive data is archived and protected.
    audit_procedure: >
      Run the following command and verify that $FileCreateMode is 0640 or more
      restrictive: # grep ^\$FileCreateMode /etc/rsyslog.conf /etc/rsyslog.d/*.conf
      $FileCreateMode 0640 Verify that no results return with a less restrictive
      file mode
    remediation: >
      Edit the /etc/rsyslog.conf and /etc/rsyslog.d/*.conf files and set
      $FileCreateMode to 0640 or more restrictive: $FileCreateMode 0640 References:
      1. See the rsyslog.conf(5) man page for more information.
    references: >
      1. See the rsyslog.conf(5) man page for more information.
