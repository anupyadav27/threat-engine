  - rule_id: suse.cis.1.gpgcheck_is_globally_activated
    title: "Ensure gpgcheck is globally activated"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "1.2.1.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      The gpgcheck option, found in the main section of the /etc/zypp/zypp.conf and
      individual /etc/zypp/repos.d/*.repo files determines if an RPM package's
      signature is checked prior to its installation.
    rationale: >
      It is important to ensure that an RPM's package signature is always checked
      prior to installation to ensure that the software is obtained from a trusted
      source.
    audit_procedure: >
      Global configuration. Run the following command and verify that global
      configuration for gpgcheck is enabled: # grep -Pi --
      '^\h*gpgcheck\h*=\h*(0|false|no|off)\b' /etc/zypp/zypp.conf Nothing should be
      returned. Configurations in /etc/zypp/repos.d/ takes precedence over the
      global configuration. Run the following command and verify that there are no
      instances of entries starting with gpgcheck returned set to 0. Nor should
      there be any invalid (non-boolean) values: # grep -Pris --
      '^\h*gpgcheck\h*=\h*(0|[2-9]|[1-9][0-9]+|false|no|off)\b' /etc/zypp/repos.d/
      Nothing should be returned.
    remediation: >
      Edit /etc/zypp/zypp.conf and set gpgcheck=on: Example # sed -i
      's/^gpgcheck\s*=\s*.*/gpgcheck=on/' /etc/zypp/zypp.conf Edit any failing files
      in /etc/zypp/repos.d/* and set all instances starting with gpgcheck to on.
      Example: # find /etc/zypp/repos.d/ -name '*.repo' -exec echo 'Checking:' {} \;
      -exec sed -i 's/^gpgcheck\s*=\s*.*/gpgcheck=on/' {} \; Note: true,yes, or 1 is
      also acceptable. References: 1. NIST SP 800-53 Rev. 5: SI-2
    references: >
      1. NIST SP 800-53 Rev. 5: SI-2
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_SUSE_15_v2_0_1_1_2_1_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_suse_15_v2_0_1_1_2_1_2"
    metadata_source: generated
