    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      The grub configuration file contains information on boot settings and
      passwords for unlocking boot options. The grub2 configuration is usually
      grub.cfg stored in /boot/grub2/. Note: • This recommendation is designed
      around the grub2 bootloader. • If LILO or another bootloader is in use in your
      environment: o Enact equivalent settings o Replace /boot/grub2/grub.cfg and
      /boot/grub2/user.cfg with the appropriate boot configuration files for your
      environment
    rationale: >
      Setting the permissions to read and write for root only prevents non-root
      users from seeing the boot parameters or changing them. Non-root users who
      read the boot parameters may be able to identify weaknesses in security upon
      boot and be able to exploit them.
    audit_procedure: >
      Run the following command and verify Uid and Gid are 0/root and Access does
      not grant permissions to group or other: # stat /boot/grub2/grub.cfg Access:
      (0600/-rw-------) Uid: ( 0/ root) Gid: ( 0/ root)
    remediation: >
      Run the following commands to set ownership and permissions on your grub
      configuration: # chown root:root /boot/grub2/grub.cfg # chmod og-rwx
      /boot/grub2/grub.cfg
