  - rule_id: suse.cis.5.password_creation_requirements_are_configured
    title: "Ensure password creation requirements are configured"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "5.3.1"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The pam_cracklib.so module checks the strength of passwords. It performs
      checks including ensuring a password is not a dictionary word, it is a certain
      length, contains a mix of characters (e.g. alphabet, numeric, other) and more.
      The following are definitions of the pam_cracklib.so options: • retry=3 -
      Allow 3 tries before sending back a failure. • minlen=14 - password must be 14
      characters or more • dcredit=-1 - provide at least one digit • ucredit=-1 -
      provide at least one uppercase character • ocredit=-1 - provide at least one
      special character • lcredit=-1 - provide at least one lowercase character
      Additional module options may be set. This recommendation only covers: •
      minlen= • dcredit= • ucredit= • ocredit= • lcredit= Note: The settings shown
      above are one possible policy. If local site policy requires stricter
      settings, alter these values to conform to your organization's password
      policies.
    rationale: >
      Strong passwords and limited attempts before locking an account protect
      systems from being hacked through brute force methods.
    audit_procedure: >
      Verify password creation requirements conform to organization policy. Run the
      following command to verify the minimum password length is at least 14
      characters minlen=14: # grep -P
      '^\s*password\s+(requisite|required)\s+pam_cracklib.so\s+([^#]+\s+)*minlen=(1
      [4-9]|[1-9][0-9]+)\b' /etc/pam.d/common-password password requisite
      pam_cracklib.so retry=3 minlen=14 dcredit=-1 ucredit=-1 lcredit=-1 ocredit=-1
      Run the following command to verify the required password complexity -
      dcredit=-1 ucredit=-1 ocredit=-1 lcredit=-1: # grep -P
      '^\s*password\s+(?:requisite|required)\s+pam_cracklib\.so\s+(?:[^#]+\s+)*(?:(
      ?!\2|\3|\4))(dcredit=-[1-9]|ucredit=-[1-9]|ocredit=-[1-9]|lcredit=-[1-
      9])\s+(?:[^#]+\s+)*(?:(?!\1|\3|\4))(dcredit=-[1-9]|ucredit=-[1-9]|ocredit=-
      [1-9]|lcredit=-[1-9])\s+(?:[^#]+\s+)*(?:(?!\1|\2|\4))(dcredit=-[1-
      9]|ucredit=-[1-9]|ocredit=-[1-9]|lcredit=-[1-
      9])\s+(?:[^#]+\s+)*(?!\1|\2|\3)(dcredit=-[1-9]|ucredit=-[1-9]|ocredit=-[1-
      9]|lcredit=-[1-9])' /etc/pam.d/common-password password requisite
      pam_cracklib.so retry=3 minlen=14 dcredit=-1 ucredit=-1 lcredit=-1 ocredit=-1
    remediation: >
      Run the following command: # pam-config -a --cracklib-minlen=14 --cracklib-
      retry=3 --cracklib-lcredit=-1 --cracklib-ucredit=-1 --cracklib-dcredit=-1
      --cracklib-ocredit=-1 --cracklib - OR - Edit the /etc/pam.d/common-password
      file to include the appropriate options for pam_cracklib.so and to conform to
      site policy: password requisite pam_cracklib.so retry=3 minlen=14 dcredit=-1
      ucredit=-1 ocredit=-1 lcredit=-1 References: 1.
      https://documentation.suse.com/sles/15-SP1/html/SLES-all/cha-security-
      protection.html#sec-sec-prot-general-pam
    references: >
      1. https://documentation.suse.com/sles/15-SP1/html/SLES-all/cha-security-
      protection.html#sec-sec-prot-general-pam
