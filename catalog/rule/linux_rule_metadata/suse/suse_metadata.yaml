  - rule_id: suse.cis.2.rpcbind_is_not_installed_or_the_rpcbind_services
    title: "Ensure rpcbind is not installed or the rpcbind services are masked"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "2.2.8"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The rpcbind utility maps RPC services to the ports on which they listen. RPC
      processes notify rpcbind when they start, registering the ports they are
      listening on and the RPC program numbers they expect to serve. The client
      system then contacts rpcbind on the server with a particular RPC program
      number. The rpcbind service redirects the client to the proper port number so
      it can communicate with the requested service Portmapper is an RPC service,
      which always listens on tcp and udp 111, and is used to map other RPC services
      (such as nfs, nlockmgr, quotad, mountd, etc.) to their corresponding port
      number on the server. When a remote host makes an RPC call to that server, it
      first consults with portmap to determine where the RPC server is listening.
    rationale: >
      A small request (~82 bytes via UDP) sent to the Portmapper generates a large
      response (7x to 28x amplification), which makes it a suitable tool for DDoS
      attacks. If rpcbind is not required, it is recommended that the rpcbind
      package be removed to reduce the attack surface of the system. Note: many of
      the libvirt packages used by Enterprise Linux virtualization, and the nfs-
      utils package used for The Network File System (NFS) are dependent on the
      rpcbind package. If the rpcbind is required as a dependency, the services
      rpcbind.service and rpcbind.socket should be stopped and masked to reduce the
      attack surface of the system.
    audit_procedure: >
      Run the following command to verify rpcbind is not installed: # rpm -q rpcbind
      package rpcbind is not installed - OR/IF - the rpcbind package is required as
      a dependency Run the following commands to verify that the rpcbind is masked:
      # systemctl is-enabled rpcbind masked Run the following command to verify that
      the rpcbind.socket is masked: # systemctl is-enabled rpcbind.socket masked
    remediation: >
      Run the following command to remove nfs-utils: # zypper remove rpcbind - OR/IF
      - the rpcbind package is required as a dependency Run the following commands
      to stop and mask the rpcbind and rpcbind.socket services: # systemctl --now
      mask rpcbind # systemctl --now mask rpcbind.socket
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_SUSE_12_v3_2_1_2_2_8"
      nist_800_53: []
      soc2: []
      pci_dss: []
