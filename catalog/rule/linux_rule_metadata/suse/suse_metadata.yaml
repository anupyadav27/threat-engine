  - rule_id: suse.cis.1.dev_shm_is_a_separate_partition
    title: "Ensure /dev/shm is a separate partition"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "1.1.2.2.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      The /dev/shm directory is a world-writable directory that can function as
      shared memory that facilitates inter process communication (IPC).
    rationale: >
      Making /dev/shm its own file system allows an administrator to set additional
      mount options such as the noexec option on the mount, making /dev/shm useless
      for an attacker to install executable code. It would also prevent an attacker
      from establishing a hard link to a system setuid program and wait for it to be
      updated. Once the program was updated, the hard link would be broken and the
      attacker would have his own copy of the program. If the program happened to
      have a security vulnerability, the attacker could continue to exploit the
      known flaw. This can be accomplished by mounting tmpfs to /dev/shm. Impact:
      Since the /dev/shm directory is intended to be world-writable, there is a risk
      of resource exhaustion if it is not bound to a separate partition. /dev/shm
      utilizing tmpfs can be resized using the size={size} parameter in the relevant
      entry in /etc/fstab.
    audit_procedure: >
      - IF - /dev/shm is to be used on the system, run the following command and
      verify the output shows that /dev/shm is mounted. Particular requirements
      pertaining to mount options are covered in ensuing sections. # findmnt -kn
      /dev/shm Example output: /dev/shm tmpfs tmpfs
      rw,nosuid,nodev,noexec,relatime,seclabel
    remediation: >
      For specific configuration requirements of the /dev/shm mount for your
      environment, modify /etc/fstab. Example: tmpfs /dev/shm tmpfs
      defaults,rw,nosuid,nodev,noexec,relatime,size=2G 0 0 References: 1.
      https://www.freedesktop.org/wiki/Software/systemd/APIFileSystems/ 2.
      https://www.freedesktop.org/software/systemd/man/systemd-fstab-generator.html
      3. NIST SP 800-53 Rev. 5: CM-7
    references: >
      1. https://www.freedesktop.org/wiki/Software/systemd/APIFileSystems/ 2.
      https://www.freedesktop.org/software/systemd/man/systemd-fstab-generator.html
      3. NIST SP 800-53 Rev. 5: CM-7
    impact: >
      Since the /dev/shm directory is intended to be world-writable, there is a risk
      of resource exhaustion if it is not bound to a separate partition. /dev/shm
      utilizing tmpfs can be resized using the size={size} parameter in the relevant
      entry in /etc/fstab.
