  - rule_id: suse.cis.6.rsyslog_is_configured_to_send_logs_to_a_remote
    title: "Ensure rsyslog is configured to send logs to a remote log host"
    severity: high
    category: linux
    tech_type: suse
    automation_type: manual
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "6.2.3.1.1"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      rsyslog supports the ability to send log events it gathers to a remote log
      host or to receive messages from remote hosts, thus enabling centralized log
      management.
    rationale: >
      Storing log data on a remote host protects log integrity from local attacks.
      If an attacker gains root access on the local system, they could tamper with
      or remove log data that is stored on the local system. Note: This
      recommendation only applies if rsyslog is the chosen method for client side
      logging. Do not apply this recommendation if systemd-journald is used.
    audit_procedure: >
      Review the /etc/rsyslog.conf and /etc/rsyslog.d/*.conf files and verify that
      logs are sent to a central host: advanced format # grep -Psi --
      '^\s*([^#]+\s+)?action\(([^#]+\s+)?\b(target|protocol)='?(tcp|[^#']+')?\b'
      /etc/rsyslog.conf /etc/rsyslog.d/*.conf Output should include target=<FQDN or
      IP of remote loghost>and protocol='tcp': Example: *.* action(type='omfwd'
      target='loghost.example.com' port='514' protocol='tcp' Note: • The advanced
      format is a more modern format that will audit formatting similar to that
      found in the remediation. • The basic format is intended for users that
      configured their file use @loghost.example.com • Important: TCP versus UDP
      protocol o Traditionally syslog uses the UDP protocol to transmit log messages
      over the network. This involves less overhead, but lacks reliability. Log
      messages can get lost under high load. o The TCP protocol is more reliable and
      should be preferred over UDP. o TLS encryption is strongly recommended but
      requires a certificate infrastructure. • See the rsyslog documentation for
      implementation details of TLS. basic format # grep '^*.*[^I][^I]*@'
      /etc/rsyslog.conf /etc/rsyslog.d/*.conf Output should include @@<FQDN or IP of
      remote loghost>: Example: *.* @@loghost.example.com
    remediation: >
      Edit the /etc/rsyslog.d/remote.conf. file and add the following line (where
      loghost.example.com is the name of your central log host). The target
      directive may either be a fully qualified domain name or an IP address. TCP
      Example: *.* action(type='omfwd' target='loghost.example.com' port='514'
      protocol='tcp' action.resumeRetryCount='100' queue.type='LinkedList'
      queue.size='1000') Run the following command to reload rsyslog.service: #
      systemctl reload-or-restart rsyslog.service Open the respective port in the
      firewall. For firewalld with TCP on port 514 run: # firewall-cmd --add-port
      514/tcp --permanent # firewall-cmd --reload References: 1. See the
      rsyslog.conf(5) man page for more information. 2. NIST SP 800-53 Rev. 5: AU-6
      3. https://www.rsyslog.com/doc/ 4.
      https://www.suse.com/support/kb/doc/?id=000020865 5.
      https://documentation.suse.com/sles/15-SP6/html/SLES-all/cha-tuning-
      syslog.html
    references: >
      1. See the rsyslog.conf(5) man page for more information. 2. NIST SP 800-53
      Rev. 5: AU-6 3. https://www.rsyslog.com/doc/ 4.
      https://www.suse.com/support/kb/doc/?id=000020865 5.
      https://documentation.suse.com/sles/15-SP6/html/SLES-all/cha-tuning-
      syslog.html
    impact: >
      
