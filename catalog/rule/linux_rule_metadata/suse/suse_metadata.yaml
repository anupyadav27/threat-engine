  - rule_id: suse.cis.4.events_that_modify_user_group_information_are
    title: "Ensure events that modify user/group information are collected"
    severity: medium
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "4.1.4"
    cis_section: "4"
    profile_applicability: "Level 2"
    description: >
      Record events affecting the group , passwd (user IDs), shadow and gshadow
      (passwords) or /etc/security/opasswd (old passwords, based on remember
      parameter in the PAM configuration) files. The parameters in this section will
      watch the files to see if they have been opened for write or have had
      attribute changes (e.g. permissions) and tag them with the identifier
      'identity' in the audit log file. Note: Reloading the auditd config to set
      active settings may require a system reboot.
    rationale: >
      Unexpected changes to these files could be an indication that the system has
      been compromised and that an unauthorized user is attempting to hide their
      activities or compromise additional accounts.
    audit_procedure: >
      Run the following command and verify rules are in a .rules file: # grep
      identity /etc/audit/rules.d/*.rules Verify the output matches:
      /etc/audit/rules.d/identity.rules:-w /etc/group -p wa -k identity
      /etc/audit/rules.d/identity.rules:-w /etc/passwd -p wa -k identity
      /etc/audit/rules.d/identity.rules:-w /etc/shadow -p wa -k identity
      /etc/audit/rules.d/identity.rules:-w /etc/security/opasswd -p wa -k identity
      Run the following command and verify the rules are in the running auditd
      config: # auditctl -l | grep identity Verify the output matches: -w /etc/group
      -p wa -k identity -w /etc/passwd -p wa -k identity -w /etc/shadow -p wa -k
      identity -w /etc/security/opasswd -p wa -k identity
    remediation: >
      Edit or create a file in the /etc/audit/rules.d/ directory ending in .rules
      Example: vi /etc/audit/rules.d/identity.rules and add the following lines: -w
      /etc/group -p wa -k identity -w /etc/passwd -p wa -k identity -w /etc/shadow
      -p wa -k identity -w /etc/security/opasswd -p wa -k identity
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_SUSE_12_v3_2_1_4_1_4"
