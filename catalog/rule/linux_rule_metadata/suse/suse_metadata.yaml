      Verify output matches: -a always,exit -F arch=b32 -S unlink -S unlinkat -S
      rename -S renameat -F auid>=1000 -F auid!=4294967295 -k delete Run the
      following command and verify the rules are in the running auditd config: #
      auditctl -l | grep delete Verify output matches: -a always,exit -F arch=b32 -S
