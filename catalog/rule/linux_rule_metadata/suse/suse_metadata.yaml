      sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,umac-128-
      etm@openssh.com,hmac-sha2-512,hmac-sha2-256,umac-128@openssh.com,curve25519-
      sha256@libssh.org,diffie-hellman-group-exchange-sha256
    remediation: >
