  - rule_id: suse.cis.1.tmp_is_configured
    title: "Ensure /tmp is configured"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "1.1.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      The /tmp directory is a world-writable directory used for temporary storage by
      all users and some applications. Note: • If an entry for /tmp exists in
      /etc/fstab it will take precedence over entries in the tmp.mount file. • tmpfs
      can be resized using the size={size} parameter in /etc/fstab or on the Options
      line in the tmp.mount file. If we don't specify the size, it will be half the
      RAM. Resize tmpfs examples: • /etc/fstab tmpfs /tmp tmpfs
      rw,noexec,nodev,nosuid,size=2G 0 0 • tmp.mount [Mount] What=tmpfs Where=/tmp
      Type=tmpfs Options=mode=1777,strictatime,size=2G,noexec,nodev,nosuid
    rationale: >
      Making /tmp its own file system allows an administrator to set the noexec
      option on the mount, making /tmp useless for an attacker to install executable
      code. It would also prevent an attacker from establishing a hardlink to a
      system setuid program and wait for it to be updated. Once the program was
      updated, the hardlink would be broken and the attacker would have his own copy
      of the program. If the program happened to have a security vulnerability, the
      attacker could continue to exploit the known flaw. This can be accomplished by
      either mounting tmpfs to /tmp, or creating a separate partition for /tmp.
      Impact: Since the /tmp directory is intended to be world-writable, there is a
      risk of resource exhaustion if it is not bound to a separate partition.
      Running out of /tmp space is a problem regardless of what kind of filesystem
      lies under it, but in a default installation a disk-based /tmp will
      essentially have the whole disk available, as it only creates a single /
      partition. On the other hand, a RAM-based /tmp as with tmpfs will almost
      certainly be much smaller, which can lead to applications filling up the
      filesystem much more easily.
    audit_procedure: >
      Run the following command and verify output shows /tmp is mounted: # mount |
      grep -E '\s/tmp\s' tmpfs on /tmp type tmpfs (rw,nosuid,nodev,noexec,relatime)
      - IF - /etc/fstab is used: • Run the following command and verify that tmpfs
      has been mounted to, or a system partition has been created for /tmp # grep -E
      '\s/tmp\s' /etc/fstab | grep -E -v '^\s*#' tmpfs /tmp tmpfs
      defaults,noexec,nosuid,nodev 0 0 - OR/IF - systemd tmp.mount file is used: •
      Run the following command and verify that tmp.mount is enabled: # systemctl
      is-enabled tmp.mount enabled
    remediation: >
      Create or update an entry for /tmp in either /etc/fstab - OR - in a systemd
      tmp.mount file: - IF - /etc/fstab is used: • Configure /etc/fstab as
      appropriate. _ Example:_ tmpfs /tmp tmpfs
      defaults,rw,nosuid,nodev,noexec,relatime 0 0 • Run the following command to
      remount /tmp # mount -o remount,noexec,nodev,nosuid /tmp - OR - - IF - an
      explicit systemd target is used to mount /tmp:_ • Run the following command to
      create the file /etc/systemd/system/tmp.mount if it doesn't exist: # [ ! -f
      /etc/systemd/system/tmp.mount ] && cp -v /usr/share/systemd/tmp.mount
      /etc/systemd/system/ • Edit the file /etc/systemd/system/tmp.mount: Example
      tmp.mount file: # This file is part of systemd. # # systemd is free software;
      you can redistribute it and/or modify it # under the terms of the GNU Lesser
      General Public License as published by # the Free Software Foundation; either
      version 2.1 of the License, or # (at your option) any later version. [Unit]
      Description=Temporary Directory (/tmp) Documentation=man:hier(7)
      Documentation=https://www.freedesktop.org/wiki/Software/systemd/APIFileSystem
      s ConditionPathIsSymbolicLink=!/tmp DefaultDependencies=no
      Conflicts=umount.target Before=local-fs.target umount.target After=swap.target
      [Mount] What=tmpfs Where=/tmp Type=tmpfs
      Options=mode=1777,strictatime,nosuid,nodev,nosuid [Install] WantedBy=local-
      fs.target • Run the following command to reload the systemd daemon: #
      systemctl daemon-reload • Run the following command to unmask tmp.mount: #
      systemctl unmask tmp.mount • Run the following command to enable and start
      tmp.mount: # systemctl enable --now tmp.mount References: 1. AJ Lewis, 'LVM
      HOWTO', http://tldp.org/HOWTO/LVM-HOWTO/ 2.
      https://www.freedesktop.org/wiki/Software/systemd/APIFileSystems/
    references: >
      1. AJ Lewis, 'LVM HOWTO', http://tldp.org/HOWTO/LVM-HOWTO/ 2.
      https://www.freedesktop.org/wiki/Software/systemd/APIFileSystems/
    impact: >
      Since the /tmp directory is intended to be world-writable, there is a risk of
      resource exhaustion if it is not bound to a separate partition. Running out of
      /tmp space is a problem regardless of what kind of filesystem lies under it,
      but in a default installation a disk-based /tmp will essentially have the
      whole disk available, as it only creates a single / partition. On the other
      hand, a RAM-based /tmp as with tmpfs will almost certainly be much smaller,
      which can lead to applications filling up the filesystem much more easily.
    compliance_mappings:
      cis:
        - "CIS_SUSE_12_v3_2_1_1_1_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_suse_12_v3_2_1_1_1_2"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: suse.cis.1.dev_shm_is_configured
    title: "Ensure /dev/shm is configured"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "1.1.6"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      /dev/shm is a traditional shared memory concept. One program will create a
      memory portion, which other processes (if permitted) can access. If /dev/shm
      is not configured, tmpfs will be mounted to /dev/shm by systemd. Note: • An
      entry for /dev/shm in /etc/fstab will take precedence. • tmpfs can be resized
      using the size={size} parameter in /etc/fstab. If we don't specify the size,
      it will be half the RAM. Resize tmpfs example: tmpfs /dev/shm tmpfs
      defaults,noexec,nodev,nosuid,size=2G 0 0
    rationale: >
      Any user can upload and execute files inside the /dev/shm similar to the /tmp
      partition. Configuring /dev/shm allows an administrator to set the noexec
      option on the mount, making /dev/shm useless for an attacker to install
      executable code. It would also prevent an attacker from establishing a
      hardlink to a system setuid program and wait for it to be updated. Once the
      program was updated, the hardlink would be broken and the attacker would have
      his own copy of the program. If the program happened to have a security
      vulnerability, the attacker could continue to exploit the known flaw.
    audit_procedure: >
      Run the following command and verify output shows /dev/shm is mounted: # mount
      | grep -E '\s/dev/shm\s' tmpfs on /dev/shm type tmpfs (rw,nosuid,nodev,noexec)
      Run the following command and verify an entry for /dev/shm exists in
      /etc/fstab: # grep -E '\s/dev/shm\s' /etc/fstab tmpfs /dev/shm tmpfs
      defaults,noexec,nodev,nosuid 0 0
    remediation: >
      Edit /etc/fstab and add or edit the following line: tmpfs /dev/shm tmpfs
      defaults,noexec,nodev,nosuid 0 0 Run the following command to remount
      /dev/shm: # mount -o remount,noexec,nodev,nosuid /dev/shm
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_SUSE_12_v3_2_1_1_1_6"
      nist_800_53: []
      soc2: []
      pci_dss: []
