  - rule_id: suse.cis.5.sudo_commands_use_pty
    title: "Ensure sudo commands use pty"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "5.2.2"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      sudo can be configured to run only from a pseudo terminal (pseudo-pty).
    rationale: >
      Attackers can run a malicious program using sudo which would fork a background
      process that remains even when the main program has finished executing.
      Impact: WARNING: Editing the sudo configuration incorrectly can cause sudo to
      stop functioning. Always use visudo to modify sudo configuration files.
    audit_procedure: >
      Verify that sudo can only run other commands from a pseudo terminal. Run the
      following command to verify Defaults use_pty is set: # grep -rPi --
      '^\h*Defaults\h+([^#\n\r]+,\h*)?use_pty\b' /etc/sudoers* Verify the output
      matches: /etc/sudoers:Defaults use_pty Run the follow command to to verify
      Defaults !use_pty is not set: # grep -rPi --
      '^\h*Defaults\h+([^#\n\r]+,\h*)?!use_pty\b' /etc/sudoers* Nothing should be
      returned
    remediation: >
      Edit the file /etc/sudoers with visudo or a file in /etc/sudoers.d/ with
      visudo -f <PATH TO FILE> and add the following line: Defaults use_pty Edit the
      file /etc/sudoers with visudo and any files in /etc/sudoers.d/ with visudo -f
      <PATH TO FILE> and remove any occurrence of !use_pty Note: • sudo will read
      each file in /etc/sudoers.d, skipping file names that end in ~ or contain a .
      character to avoid causing problems with package manager or editor
      temporary/backup files. • Files are parsed in sorted lexical order. That is,
      /etc/sudoers.d/01_first will be parsed before /etc/sudoers.d/10_second. • Be
      aware that because the sorting is lexical, not numeric,
      /etc/sudoers.d/1_whoops would be loaded after /etc/sudoers.d/10_second. •
      Using a consistent number of leading zeroes in the file names can be used to
      avoid such problems. References: 1. SUDO(8) 2. VISUDO(8) 3. sudoers(5) 4. NIST
      SP 800-53 Rev. 5: AC-6
    references: >
      1. SUDO(8) 2. VISUDO(8) 3. sudoers(5) 4. NIST SP 800-53 Rev. 5: AC-6
    impact: >
      WARNING: Editing the sudo configuration incorrectly can cause sudo to stop
      functioning. Always use visudo to modify sudo configuration files.
    compliance_mappings:
      cis:
        - "CIS_SUSE_15_v2_0_1_5_2_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
