  - rule_id: suse.cis.6.rsyslog_logrotate_is_configured
    title: "Ensure rsyslog logrotate is configured"
    severity: high
    category: linux
    tech_type: suse
    automation_type: manual
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "6.2.3.7"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      The system includes the capability of rotating log files regularly to avoid
      filling up the system with logs or making the logs unmanageably large. The
      file /etc/logrotate.d/rsyslog is the configuration file used to rotate log
      files created by rsyslog.
    rationale: >
      By keeping the log files smaller and more manageable, a system administrator
      can easily archive these files to another system and spend less time looking
      through inordinately large log files. Note: This recommendation only applies
      if rsyslog is the chosen method for client side logging. Do not apply this
      recommendation if systemd-journald is used.
    audit_procedure: >
      Review /etc/logrotate.conf and /etc/logrotate.d/* and verify logs are rotated
      according to site policy. #!/usr/bin/env bash { l_output='' l_rotate_conf=''
      #check for logrotate.conf file if [ -f /etc/logrotate.conf ]; then
      l_rotate_conf='/etc/logrotate.conf' elif compgen -G '/etc/logrotate.d/*.conf'
      2>/dev/null; then for file in /etc/logrotate.d/*.conf; do
      l_rotate_conf='$file' done elif systemctl is-active --quiet systemd-journal-
      upload.service; then echo -e '- journald is in use on system\n -
      recommendation is NA' else echo -e '- logrotate is not configured'
      l_output='$l_output\n- rsyslog is in use and logrotate is not configured' fi
      if [ -z '$l_output' ]; then # Provide output from checks echo -e '\n- Audit
      Result:\n ** REVIEW **\n - $l_rotate_conf and verify logs are rotated
      according to site policy.' else echo -e '\n- Audit Result:\n ** FAIL **\n -
      Reason(s) for audit failure:\n$l_output' fi }
    remediation: >
      Edit /etc/logrotate.conf and /etc/logrotate.d/* to ensure logs are rotated
      according to site policy. Example logrotate configuration that specifies log
      files be rotated weekly, keep 4 backlogs, compress old log files, ignores
      missing and empty log files, postrotate to reload rsyslog service after logs
      are rotated /var/log/rsyslog/*.log { weekly rotate 4 compress missingok
      notifempty postrotate /usr/bin/systemctl reload rsyslog.service >/dev/null ||
      true endscript } References: 1. NIST SP 800-53 Rev. 5: AU-8 2.
