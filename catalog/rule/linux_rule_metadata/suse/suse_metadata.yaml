      access -a always,exit -F arch=b32 -S creat -S open -S openat -S truncate -S
      ftruncate -F exit=-EPERM -F auid>=1000 -F auid!=4294967295 -k access Run the
      following command and verify the rules are in the running auditd config: #
      auditctl -l | grep access Verify output matches: -a always,exit -F arch=b32 -S
      creat -S open -S openat -S truncate -S ftruncate -F exit=-EACCES -F auid>=1000
      -F auid!=-1 -k access -a always,exit -F arch=b32 -S creat -S open -S openat -S
      truncate -S ftruncate -F exit=-EPERM -F auid>=1000 -F auid!=-1 -k access On a
