      /etc/audit/rules.d/perm_mod.rules:-a always,exit -F arch=b64 -S setxattr -S
      lsetxattr -S fsetxattr -S removexattr -S lremovexattr -S fremovexattr -F
      auid>=1000 -F auid!=4294967295 -k perm_mod
      /etc/audit/rules.d/perm_mod.rules:-a always,exit -F arch=b32 -S setxattr -S
      lsetxattr -S fsetxattr -S removexattr -S lremovexattr -S fremovexattr -F
      auid>=1000 -F auid!=4294967295 -k perm_mod Run the following command and
      verify the rules are in the running auditd config: # auditctl -l | grep
      perm_mod Verify output matches: -a always,exit -F arch=b64 -S
      chmod,fchmod,fchmodat -F auid>=1000 -F auid!=-1 -F key=perm_mod -a always,exit
      -F arch=b32 -S chmod,fchmod,fchmodat -F auid>=1000 -F auid!=-1 -F key=perm_mod
