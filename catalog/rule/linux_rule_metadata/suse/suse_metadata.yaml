  - rule_id: suse.cis.1.separate_partition_exists_for_tmp
    title: "Ensure separate partition exists for /tmp"
    severity: medium
    category: linux
    tech_type: suse
    automation_type: manual
    cis_benchmark: "CIS_SUSE 12_v2.0.0"
    cis_version: "12_v2.0.0"
    cis_control: "1.1.2"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      The /tmp directory is a world-writable directory used for temporary storage by
      all users and some applications.
    rationale: >
      Since the /tmp directory is intended to be world-writable, there is a risk of
      resource exhaustion if it is not bound to a separate partition. In addition,
      making /tmp its own file system allows an administrator to set the noexec
      option on the mount, making /tmp useless for an attacker to install executable
      code. It would also prevent an attacker from establishing a hardlink to a
      system setuid program and wait for it to be updated. Once the program was
      updated, the hardlink would be broken and the attacker would have his own copy
      of the program. If the program happened to have a security vulnerability, the
      attacker could continue to exploit the known flaw.
    audit_procedure: >
      Run the following command and verify output shows /tmp is mounted: # mount |
      grep /tmp tmpfs on /tmp type tmpfs (rw,nosuid,nodev,noexec,relatime)
    remediation: >
      For new installations, during installation create a custom partition setup and
      specify a separate partition for /tmp. For systems that were previously
      installed, create a new partition and configure /etc/fstab or the systemd
      tmp.mount service as appropriate. Impact: Resizing filesystems is a common
      activity in cloud-hosted servers. Separate filesystem partitions may prevent
      successful resizing, or may require the installation of additional tools
      solely for the purpose of resizing operations. The use of these additional
      tools may introduce their own security considerations. 27 | P a g e
      References: 1. AJ Lewis, 'LVM HOWTO', http://tldp.org/HOWTO/LVM-HOWTO/ 28 | P
      a g e
    references: >
      1. AJ Lewis, 'LVM HOWTO', http://tldp.org/HOWTO/LVM-HOWTO/ 28 | P a g e
