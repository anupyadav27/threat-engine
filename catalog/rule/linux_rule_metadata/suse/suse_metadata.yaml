  - rule_id: suse.cis.5.minimum_days_between_password_changes_is
    title: "Ensure minimum days between password changes is configured"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "5.4.1.3"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The PASS_MIN_DAYS parameter in /etc/login.defs allows an administrator to
      prevent users from changing their password until a minimum number of days have
      passed since the last time the user changed their password. It is recommended
      that PASS_MIN_DAYS parameter be set to 1 or more days.
    rationale: >
      By restricting the frequency of password changes, an administrator can prevent
      users from repeatedly changing their password in an attempt to circumvent
