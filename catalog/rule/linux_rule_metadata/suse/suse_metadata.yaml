  - rule_id: suse.cis.1.xd_nx_support_is_enabled
    title: "Ensure XD/NX support is enabled"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "1.6.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Recent processors in the x86 family support the ability to prevent code
      execution on a per memory page basis. Generically and on AMD processors, this
      ability is called No Execute (NX), while on Intel processors it is called
      Execute Disable (XD). This ability can help prevent exploitation of buffer
      overflow vulnerabilities and should be activated whenever possible. Extra
      steps must be taken to ensure that this protection is enabled, particularly on
      32-bit x86 systems. Other processors, such as Itanium and POWER, have included
      such support since inception and the standard kernel for those platforms
      supports the feature.
    rationale: >
      Enabling any feature that can protect against buffer overflow attacks enhances
      the security of the system. Note: Ensure your system supports the XD or NX bit
      and has PAE support before implementing this recommendation as this may
      prevent it from booting if these are not supported by your hardware.
    audit_procedure: >
      Run the following command and verify your kernel has identified and activated
      NX/XD protection. # journalctl | grep 'protection: active' kernel: NX (Execute
      Disable) protection: active - OR - On systems without journalctl: # [[ -n
      $(grep noexec[0-9]*=off /proc/cmdline) || -z $(grep -E -i ' (pae|nx) '
      /proc/cpuinfo) || -n $(grep '\sNX\s.*\sprotection:\s' /var/log/dmesg | grep -v
      active) ]] && echo 'NX Protection is not active' Nothing should be returned.
    remediation: >
      On 32 bit systems install a kernel with PAE support, no installation is
      required on 64 bit systems: If necessary configure your bootloader to load the
      new kernel and reboot the system. You may need to enable NX or XD support in
      your bios.
    references: >
      
    impact: >
      
