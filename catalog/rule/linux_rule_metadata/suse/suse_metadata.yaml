      cis:
        - "CIS_SUSE_15_v2_0_1_5_4_1_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_suse_15_v2_0_1_5_4_1_1"
    metadata_source: generated
