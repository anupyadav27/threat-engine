  - rule_id: suse.cis.4.events_that_modify_date_and_time_information_are
    title: "Ensure events that modify date and time information are collected"
    severity: medium
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "4.1.3"
    cis_section: "4"
    profile_applicability: "Level 2"
    description: >
      Capture events where the system date and/or time has been modified. The
      parameters in this section are set to determine if the adjtimex (tune kernel
      clock), settimeofday (Set time, using timeval and timezone structures) stime
      (using seconds since 1/1/1970) or clock_settime (allows for the setting of
      several internal clocks and timers) system calls have been executed and always
      write an audit record to the /var/log/audit.log file upon exit, tagging the
      records with the identifier 'time-change' Note: Reloading the auditd config to
      set active settings requires the auditd service to be restarted, and may
      require a system reboot.
    rationale: >
      Unexpected changes in system date and/or time could be a sign of malicious
      activity on the system.
    audit_procedure: >
      On a 32 bit system run the following commands: # grep time-change
      /etc/audit/rules.d/*.rules # auditctl -l | grep time-change Verify output of
      both matches: -a always,exit -F arch=b32 -S adjtimex -S settimeofday -S stime
      -k time- change -a always,exit -F arch=b32 -S clock_settime -k time-change -w
      /etc/localtime -p wa -k time-change On a 64 bit system run the following
      commands: Run the following command and verify rules are in a .rules file: #
      grep time-change /etc/audit/rules.d/*.rules Verify output matches:
      /etc/audit/rules.d/time_change.rules:-a always,exit -F arch=b64 -S adjtimex -
      S settimeofday -k time-change /etc/audit/rules.d/time_change.rules:-a
      always,exit -F arch=b32 -S adjtimex - S settimeofday -S stime -k time-change
      /etc/audit/rules.d/time_change.rules:-a always,exit -F arch=b64 -S
      clock_settime -k time-change /etc/audit/rules.d/time_change.rules:-a
      always,exit -F arch=b32 -S clock_settime -k time-change
      /etc/audit/rules.d/time_change.rules:-w /etc/localtime -p wa -k time-change
      Run the following command and verify the rules are in the running auditd
      config: # auditctl -l | grep time-change Verify output matches: -a always,exit
      -F arch=b64 -S adjtimex,settimeofday -F key=time-change -a always,exit -F
      arch=b32 -S stime,settimeofday,adjtimex -F key=time-change -a always,exit -F
      arch=b64 -S clock_settime -F key=time-change -a always,exit -F arch=b32 -S
      clock_settime -F key=time-change -w /etc/localtime -p wa -k time-change
    remediation: >
      For 32 bit systems Edit or create a file in the /etc/audit/rules.d/ directory
      ending in .rules Example: vi /etc/audit/rules.d/time_change.rules and add the
      following lines: -a always,exit -F arch=b32 -S adjtimex -S settimeofday -S
      stime -k time- change -a always,exit -F arch=b32 -S clock_settime -k time-
      change -w /etc/localtime -p wa -k time-change For 64 bit systems Edit or
      create a file in the /etc/audit/rules.d/ directory ending in .rules Example:
      vi /etc/audit/rules.d/time_change.rules and add the following lines: -a
      always,exit -F arch=b64 -S adjtimex -S settimeofday -k time-change -a
      always,exit -F arch=b32 -S adjtimex -S settimeofday -S stime -k time- change
      -a always,exit -F arch=b64 -S clock_settime -k time-change -a always,exit -F
      arch=b32 -S clock_settime -k time-change -w /etc/localtime -p wa -k time-
      change
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_SUSE_12_v3_2_1_4_1_3"
      nist_800_53: []
