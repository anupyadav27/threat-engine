  - rule_id: suse.cis.2.mail_transfer_agent_is_configured_for_local_only
    title: "Ensure mail transfer agent is configured for local-only mode"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "2.2.16"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Mail Transfer Agents (MTA), such as sendmail and Postfix, are used to listen
      for incoming mail and transfer the messages to the appropriate user or mail
      server. If the system is not intended to be a mail server, it is recommended
      that the MTA be configured to only process local mail.
    rationale: >
      The software for all Mail Transfer Agents is complex and most have a long
      history of security issues. While it is important to ensure that the system
      can process local mail messages, it is not necessary to have the MTA's daemon
      listening on a port unless the server is intended to be a mail server that
      receives and processes mail from other systems. Note: • This recommendation is
      designed around the postfix mail server. • Depending on your environment you
      may have an alternative MTA installed such as sendmail. If this is the case
      consult the documentation for your installed MTA to configure the recommended
      state.
    audit_procedure: >
      Run the following command to verify that the MTA is not listening on any non-
      loopback address ( 127.0.0.1 or ::1 ) # ss -lntu | grep -E ':25\s' | grep -E
      -v '\s(127.0.0.1|\[?::1\]?):25\s' Nothing should be returned.
    remediation: >
      Edit /etc/postfix/main.cf and add the following line to the RECEIVING MAIL
      section. If the line already exists, change it to look like the line below:
      inet_interfaces = loopback-only Run the following command to restart postfix:
      # systemctl restart postfix
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_SUSE_12_v3_2_1_2_2_16"
      nist_800_53: []
