    audit_procedure: >
      Run the following script and to verify that the disable-user-list option is
      enabled or GNOME isn't installed: #!/usr/bin/env bash { l_pkgoutput='' if
      command -v dpkg-query > /dev/null 2>&1; then l_pq='dpkg-query -W' elif command
      -v rpm > /dev/null 2>&1; then l_pq='rpm -q' fi l_pcl='gdm gdm3' # Space
      separated list of packages to check for l_pn in $l_pcl; do $l_pq '$l_pn' >
      /dev/null 2>&1 && l_pkgoutput='$l_pkgoutput\n - Package: \'$l_pn\' exists on
      the system\n - checking configuration' done if [ -n '$l_pkgoutput' ]; then
      output='' output2='' l_gdmfile='$(grep -Pril '^\h*disable-user-
      list\h*=\h*true\b' /etc/dconf/db)' if [ -n '$l_gdmfile' ]; then
