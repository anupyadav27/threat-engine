  - rule_id: suse.cis.6.events_that_modify_user_group_information_are
    title: "Ensure events that modify user/group information are collected"
    severity: medium
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "6.3.3.8"
    cis_section: "6"
    profile_applicability: "Level 2"
    description: >
      Record events affecting the modification of user or group information,
      including that of passwords and old passwords if in use. • /etc/group - system
      groups • /etc/passwd - system users • /etc/gshadow - encrypted password for
      each group • /etc/shadow - system user passwords • /etc/security/opasswd -
      storage of old passwords if the relevant PAM module is in use •
      /etc/nsswitch.conf - file configures how the system uses various databases and
      name resolution mechanisms • /etc/pam.conf - file determines the
      authentication services to be used, and the order in which the services are
      used. • /etc/pam.d - directory contains the PAM configuration files for each
      PAM-aware application. The parameters in this section will watch the files to
      see if they have been opened for write or have had attribute changes (e.g.
      permissions) and tag them with the identifier 'identity' in the audit log
      file.
    rationale: >
      Unexpected changes to these files could be an indication that the system has
      been compromised and that an unauthorized user is attempting to hide their
      activities or compromise additional accounts.
    audit_procedure: >
      On disk configuration Run the following command to check the on disk rules: #
      awk '/^ *-w/ \ &&(/\/etc\/group/ \ ||/\/etc\/passwd/ \ ||/\/etc\/gshadow/ \
      ||/\/etc\/shadow/ \ ||/\/etc\/security\/opasswd/ \ ||/\/etc\/nsswitch.conf/ \
      ||/\/etc\/pam.conf/ \ ||/\/etc\/pam.d/) \ &&/ +-p *wa/ \ &&(/ key= *[!-~]*
      *$/||/ -k *[!-~]* *$/)' /etc/audit/rules.d/*.rules Verify the output matches:
      -w /etc/group -p wa -k identity -w /etc/passwd -p wa -k identity -w
      /etc/gshadow -p wa -k identity -w /etc/shadow -p wa -k identity -w
      /etc/security/opasswd -p wa -k identity -w /etc/nsswitch.conf -p wa -k
      identity -w /etc/pam.conf -p wa -k identity -w /etc/pam.d -p wa -k identity
      Running configuration Run the following command to check loaded rules: #
      auditctl -l | awk '/^ *-w/ \ &&(/\/etc\/group/ \ ||/\/etc\/passwd/ \
      ||/\/etc\/gshadow/ \ ||/\/etc\/shadow/ \ ||/\/etc\/security\/opasswd/ \
