      hmac-ripemd160-etm@openssh.com hmac-sha1-etm@openssh.com hmac-
      sha1-96-etm@openssh.com umac-64-etm@openssh.com umac-128-etm@openssh.com
    remediation: >
      Edit the /etc/ssh/sshd_config file and add/modify the MACs line to contain a
