      *.*;mail.none;news.none -/var/log/messages local0,local1.*
      -/var/log/localmessages local2,local3.* -/var/log/localmessages
      local4,local5.* -/var/log/localmessages local6,local7.*
      -/var/log/localmessages Run the following command to reload the rsyslogd
      configuration: # systemctl restart rsyslog References: 1. See the
      rsyslog.conf(5) man page for more information. 2. NIST SP 800-53 Rev. 5: AU-2,
      AU-7, AU-12
