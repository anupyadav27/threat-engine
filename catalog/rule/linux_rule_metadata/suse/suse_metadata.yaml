  - rule_id: suse.cis.1.separate_partition_exists_for_var_tmp
    title: "Ensure separate partition exists for /var/tmp"
    severity: medium
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "1.1.2.5.1"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      The /var/tmp directory is a world-writable directory used for temporary
      storage by all users and some applications. Temporary files residing in
      /var/tmp are to be preserved between reboots.
    rationale: >
      The default installation only creates a single / partition. Since the /var/tmp
      directory is world-writable, there is a risk of resource exhaustion. In
      addition, other operations on the system could fill up the disk unrelated to
      /var/tmp and cause potential disruption to daemons as the disk is full.
      Configuring /var/tmp as its own file system allows an administrator to set
      additional mount options such as noexec/nosuid/nodev. These options limit an
      attacker's ability to create exploits on the system. Impact: Resizing
      filesystems is a common activity in cloud-hosted servers. Separate filesystem
      partitions may prevent successful resizing or may require the installation of
      additional tools solely for the purpose of resizing operations. The use of
      these additional tools may introduce their own security considerations.
    audit_procedure: >
      Run the following command and verify output shows /var/tmp is mounted.
      Example: # findmnt -kn /var/tmp /var/tmp /dev/sdb ext4
      rw,nosuid,nodev,noexec,relatime,seclabel
    remediation: >
      For new installations, during installation create a custom partition setup and
      specify a separate partition for /var/tmp. For systems that were previously
      installed, create a new partition and configure /etc/fstab as appropriate.
      References: 1. AJ Lewis, 'LVM HOWTO', http://tldp.org/HOWTO/LVM-HOWTO/ 2. NIST
      SP 800-53 Rev. 5: CM-7 3. NIST SP 800-53A :: CM-6.1 (iv) 4. RHEL 8 STIG Vul
      ID: V-244529 5. RHEL 8 STIG Rule ID: SV-244529r902737 Additional Information:
      When modifying /var/tmp it is advisable to bring the system to emergency mode
      (so auditd is not running), rename the existing directory, mount the new file
      system, and migrate the data over before returning to multi-user mode.
    references: >
      1. AJ Lewis, 'LVM HOWTO', http://tldp.org/HOWTO/LVM-HOWTO/ 2. NIST SP 800-53
