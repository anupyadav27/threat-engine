  - rule_id: suse.cis.1.gdm_is_removed_or_login_is_configured
    title: "Ensure GDM is removed or login is configured"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "1.10"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      The GNOME Display Manager (GDM) handles graphical login for GNOME based
      systems. Configuration of the GNOME desktop is managed with dconf. It is a
      hierarchically structured database or registry that allows users to modify
      their personal settings, and system administrators to set default or mandatory
      values for all users. Global dconf configuration parameters can be set in the
      /etc/dconf/db/ directory. This includes the configuration for GDM or locking
      certain configuration options for users.
    rationale: >
      If a graphical login is not required, it should be removed to reduce the
      attack surface of the system. If a graphical login is required, last logged in
      user display should be disabled, and a warning banner should be configured.
      Displaying the last logged in user eliminates half of the Userid/Password
      equation that an unauthorized person would need to log on. Warning messages
      inform users who are attempting to login to the system of their legal status
      regarding the system and must include the name of the organization that owns
      the system and any monitoring policies that are in place. Note: • This
      recommendation is based on the gdm profile. If a different profile name is
      used on the system, update the gdm and gdm.d to <profilee_name> and
      <profile_name>.d • Additional options and sections may appear in the
      /etc/dconf/db/gdm.d/01- banner-message and/or /etc/dconf/db/gdm.d/00-login-
      screen file. • - IF - a different GUI login service is in use and required on
      the system, consult your documentation to disable displaying the last logged
      on user and apply an equivalent banner.
    audit_procedure: >
      Run the following command to verify the GDM is not installed on the system: #
      rpm -q gdm package gdm is not installed - OR/IF - GDM is required: Verify that
      /etc/dconf/profile/gdm exists and includes the following: user-db:user system-
      db:gdm file-db:/usr/share/gdm/greeter-dconf-defaults Verify that a file exists
      in /etc/dconf/db/gdm.d/ and includes the following: (This is typically
      /etc/dconf/db/gdm.d/01-banner-message) [org/gnome/login-screen] banner-
      message-enable=true banner-message-text='<banner message>' Verify that a file
      exists in /etc/dconf/db/gdm.d/ and includes the following: (This is typically
      /etc/dconf/db/gdm.d/00-login-screen) [org/gnome/login-screen] disable-user-
      list=true
    remediation: >
      Run the following command to remove GDM # zypper remove gdm - OR/IF - GDM is
      required: Edit or create the gdm profile which contains the following lines:
      (This is typically /etc/dconf/profile/gdm) user-db:user system-db:gdm file-
      db:/usr/share/gdm/greeter-dconf-defaults Run the following Run to display a
      login banner: Note: the directory /etc/dconf/db/gdm.d/ may need to be created
      Edit or create a gdm keyfile for machine-wide settings: _(This is typically
      /etc/dconf/db/gdm.d/01-banner-message) [org/gnome/login-screen] banner-
      message-enable=true banner-message-text='<banner message>' Example Banner
      Text: 'Authorized uses only. All activity may be monitored and reported.' Run
      the following to disable the user list: Edit or create a gdm keyfile for
      machine-wide settings in the directory /etc/dconf/db/gdm.d/ and add the
      following: (This is typically /etc/dconf/db/gdm.d/00-login-screen)
      [org/gnome/login-screen] # Do not show the user list disable-user-list=true
      Run the following command to update the system databases: # dconf update
      References: 1. https://documentation.suse.com/sles/15-SP1/html/SLES-all/cha-
      gui-desktop.html 2. https://help.gnome.org/admin/system-admin-guide/stable
    references: >
      1. https://documentation.suse.com/sles/15-SP1/html/SLES-all/cha-gui-
      desktop.html 2. https://help.gnome.org/admin/system-admin-guide/stable
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_SUSE_12_v3_2_1_1_10"
