  - rule_id: suse.cis.5.password_expiration_is_365_days_or_less
    title: "Ensure password expiration is 365 days or less"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "5.4.1.2"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The PASS_MAX_DAYS parameter in /etc/login.defs allows an administrator to
      force passwords to expire once they reach a defined age. It is recommended
      that the PASS_MAX_DAYS parameter be set to less than or equal to 365 days.
      Note: • A value of -1 will disable password expiration. • The password
      expiration must be greater than the minimum days between password changes or
      users will be unable to change their password.
    rationale: >
      The window of opportunity for an attacker to leverage compromised credentials
      via a brute force attack, using already compromised credentials, or gaining
      the credentials by other means, can be limited by the age of the password.
      Therefore, reducing the maximum age of a password can also reduce an
      attacker's window of opportunity. Requiring passwords to be changed helps to
      mitigate the risk posed by the poor security practice of passwords being used
      for multiple accounts, and poorly implemented off-boarding and change of
      responsibility policies. This should not be considered a replacement for
      proper implementation of these policies and practices. Note: If it is believed
      that a user's password may have been compromised, the user's account should be
      locked immediately. Local policy should be followed to ensure the secure
      update of their password.
    audit_procedure: >
      Run the following command and verify PASS_MAX_DAYS conforms to site policy (no
      more than 365 days): # grep ^\s*PASS_MAX_DAYS /etc/login.defs PASS_MAX_DAYS
      365 Run the following command and Review list of users and PASS_MAX_DAYS to
      verify that all users' PASS_MAX_DAYS conforms to site policy (no more than 365
      days): # grep -E '^[^:]+:[^!*]' /etc/shadow | cut -d: -f1,5
      <user>:<PASS_MAX_DAYS>
    remediation: >
      Set the PASS_MAX_DAYS parameter to conform to site policy in /etc/login.defs :
      PASS_MAX_DAYS 365 Modify user parameters for all users with a password set to
      match: # chage --maxdays 365 <user>
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_SUSE_12_v3_2_1_5_4_1_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_suse_12_v3_2_1_5_4_1_2"
