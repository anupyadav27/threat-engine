    profile_applicability: "Level 1"
    description: >
      The journald system includes the capability of compressing overly large files
      to avoid filling up the system with logs or making the log's size
      unmanageable. Note: The main configuration file /etc/systemd/journald.conf is
      read before any of the custom *.conf files. If there are custom configs
      present, they override the main configuration parameters.
    rationale: >
      Uncompressed large files may unexpectedly fill a filesystem leading to
      resource unavailability. Compressing logs prior to write can prevent sudden,
      unexpected filesystem impacts.
    audit_procedure: >
      Review /etc/systemd/journald.conf and verify that large files will be
      compressed: # grep -E ^\s*Compress /etc/systemd/journald.conf Compress=yes The
      default value for Compress is yes therefore verify that this setting is not
      uncommented and configured to a value of no or false.
    remediation: >
      Edit the /etc/systemd/journald.conf file and add the following line:
      Compress=yes Default Value: Compress=yes References: 1.
      https://github.com/konstruktoid/hardening/blob/master/systemd.adoc#etcsystemd
      journaldconf
