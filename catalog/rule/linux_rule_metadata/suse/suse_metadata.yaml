  - rule_id: suse.cis.2.nonessential_services_are_removed_or_masked
    title: "Ensure nonessential services are removed or masked"
    severity: high
    category: linux
    tech_type: suse
    automation_type: manual
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "2.4"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      A network port is identified by its number, the associated IP address, and the
      type of the communication protocol such as TCP or UDP. A listening port is a
      network port on which an application or process listens on, acting as a
      communication endpoint. Each listening port can be open or closed (filtered)
      using a firewall. In general terms, an open port is a network port that
      accepts incoming packets from remote locations.
    rationale: >
      Services listening on the system pose a potential risk as an attack vector.
      These services should be reviewed, and if not required, the service should be
      stopped, and the package containing the service should be removed. If required
      packages have a dependency, the service should be stopped and masked to reduce
      the attack surface of the system.
    audit_procedure: >
      Run the following command: # lsof -i -P -n | grep -v '(ESTABLISHED)' Review
      the output to ensure that all services listed are required on the system. If a
      listed service is not required, remove the package containing the service. If
      the package containing the service is required, stop and mask the service
    remediation: >
      Run the following command to remove the package containing the service: #
      zypper remove <package_name> - OR/IF - required packages have a dependency:
      Run the following command to stop and mask the service: # systemctl --now mask
      <service_name>
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_SUSE_12_v3_2_1_2_4"
