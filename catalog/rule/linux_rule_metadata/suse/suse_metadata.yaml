      enforce or complain mode 37 profiles are loaded. 35 profiles are in enforce
      mode. 2 profiles are in complain mode. 4 processes have profiles defined. Run
      the following command and verify that no processes are unconfined: #
      apparmor_status | grep processes Review the output and ensure no processes are
      unconfined 4 processes have profiles defined. 4 processes are in enforce mode.
      0 processes are in complain mode. 0 processes are unconfined but have a
