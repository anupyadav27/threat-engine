  - rule_id: suse.cis.1.core_dumps_are_restricted
    title: "Ensure core dumps are restricted"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "1.5.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      A core dump is the memory of an executable program. It is generally used to
      determine why a program aborted. It can also be used to glean confidential
      information from a core file. The system provides the ability to set a soft
      limit for core dumps, but this can be overridden by the user.
    rationale: >
      Setting a hard limit on core dumps prevents users from overriding the soft
      variable. If core dumps are required, consider setting limits for user groups
      (see limits.conf(5) ). In addition, setting the fs.suid_dumpable variable to 0
      will prevent setuid programs from dumping core.
    audit_procedure: >
      Run the following commands and verify output matches: # grep -E
      '^\s*\*\s+hard\s+core' /etc/security/limits.conf /etc/security/limits.d/*
      2>/dev/null * hard core 0 # sysctl fs.suid_dumpable fs.suid_dumpable = 0 #
      grep 'fs\.suid_dumpable' /etc/sysctl.conf /etc/sysctl.d/* 2>/dev/null
      fs.suid_dumpable = 0 Run the following command to check if systemd-coredump is
      installed: # systemctl is-enabled coredump.service If enabled or disabled is
      returned systemd-coredump is installed
    remediation: >
      Add the following line to /etc/security/limits.conf or a
      /etc/security/limits.d/* file: * hard core 0 Set the following parameter in
      /etc/sysctl.conf or a /etc/sysctl.d/* file: fs.suid_dumpable = 0 Run the
      following command to set the active kernel parameter: # sysctl -w
      fs.suid_dumpable=0 - IF - systemd-coredump is installed: edit
      /etc/systemd/coredump.conf and add/modify the following lines: Storage=none
      ProcessSizeMax=0 Run the command: systemctl daemon-reload
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_SUSE_15_v2_0_1_1_5_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_suse_15_v2_0_1_1_5_2"
