  - rule_id: suse.cis.4.audit_configuration_is_immutable
    title: "Ensure the audit configuration is immutable"
    severity: medium
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "4.1.17"
    cis_section: "4"
    profile_applicability: "Level 2"
    description: >
      Set system audit so that audit rules cannot be modified with auditctl .
      Setting the flag -e 2 forces audit to be put in immutable mode. Audit changes
      can only be made on system reboot. Note: This setting will require the system
      to be rebooted to update the active auditd configuration settings.
    rationale: >
      In immutable mode, unauthorized users cannot execute changes to the audit
      system to potentially hide malicious activity and then put the audit rules
      back. Users would most likely notice a system reboot and that could alert
      administrators of an attempt to make unauthorized audit changes.
    audit_procedure: >
      Run the following command and verify output matches: # grep '^\s*[^#]'
      /etc/audit/rules.d/*.rules | tail -1 -e 2
    remediation: >
      Edit or create the file /etc/audit/rules.d/99-finalize.rules and add the
      following line at the end of the file: -e 2
    references: >
      
