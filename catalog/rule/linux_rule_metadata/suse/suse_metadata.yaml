      b' /etc/pam.d/* Output should be similar to: /etc/pam.d/common-
      password:password required pam_pwhistory.so use_authtok /etc/pam.d/common-
      password-pc:password required pam_pwhistory.so use_authtok Verify that the
      lines include use_authtok
    remediation: >
