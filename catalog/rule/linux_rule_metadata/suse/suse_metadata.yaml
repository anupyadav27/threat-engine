  - rule_id: suse.cis.6.journald_log_file_rotation_is_configured
    title: "Ensure journald log file rotation is configured"
    severity: high
    category: linux
    tech_type: suse
    automation_type: manual
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "6.2.1.3"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Journald includes the capability of rotating log files regularly to avoid
      filling up the system with logs or making the logs unmanageably large. The
      file /etc/systemd/journald.conf is the configuration file used to specify how
      logs generated by Journald should be rotated.
    rationale: >
      By keeping the log files smaller and more manageable, a system administrator
      can easily archive these files to another system and spend less time looking
      through inordinately large log files.
    audit_procedure: >
      Review /etc/systemd/journald.conf and files in the
      /etc/systemd/journald.conf.d/ directory ending in .conf. Verify logs are
      rotated according to site policy. The specific parameters for log rotation
      are: SystemMaxUse= SystemKeepFree= RuntimeMaxUse= RuntimeKeepFree= MaxFileSec=
    remediation: >
      Edit /etc/systemd/journald.conf or a file ending in .conf the
      /etc/systemd/journald.conf.d/ directory. Set the following parameters in the
      [Journal] section to ensure logs are rotated according to site policy. The
      settings should be carefully understood as there are specific edge cases and
      prioritization of parameters. The specific parameters for log rotation are:
      SystemMaxUse= SystemKeepFree= RuntimeMaxUse= RuntimeKeepFree= MaxFileSec=
      Note: If these settings appear in a canonically later file, or later in the
      same file, the setting will be overwritten References: 1. NIST SP 800-53 Rev.
      5: AU-2, AU-7, AU-12 Additional Information: See man 5 journald.conf for
      detailed information regarding the parameters in use.
