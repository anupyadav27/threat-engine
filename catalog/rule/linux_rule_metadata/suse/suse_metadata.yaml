    description: >
      Monitor scope changes for system administrators. If the system has been
      properly configured to force system administrators to log in as themselves
      first and then use the sudo command to execute privileged commands, it is
      possible to monitor changes in scope. The file /etc/sudoers or a file in the
      /etc/sudoers.d directory will be written to when the file or its attributes
      have changed. Note: Reloading the auditd config to set active settings may
      require a system reboot.
    rationale: >
      Changes in the /etc/sudoers file, or a file in the /etc/sudoers.d/ directory
      can indicate that an unauthorized change has been made to scope of system
      administrator activity.
    audit_procedure: >
      Run the following commands: Run the following command and verify rules are in
      a .rules file: # grep scope /etc/audit/rules.d/*.rules Verify output matches:
