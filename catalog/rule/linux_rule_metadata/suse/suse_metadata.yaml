  - rule_id: suse.cis.4.rsyslog_is_installed
    title: "Ensure rsyslog is installed"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "4.2.1.1"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      The rsyslog software is a recommended replacement to the original syslogd
      daemon. rsyslog provides improvements over syslogd, including: • connection-
      oriented (i.e. TCP) transmission of logs • The option to log to database
