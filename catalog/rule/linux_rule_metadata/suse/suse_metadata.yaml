  - rule_id: suse.cis.4.logging_is_configured
    title: "Ensure logging is configured"
    severity: high
    category: linux
    tech_type: suse
    automation_type: manual
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "4.2.1.4"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      The /etc/rsyslog.conf and /etc/rsyslog.d/*.conf files specifies rules for
      logging and which files are to be used to log certain classes of messages.
    rationale: >
      A great deal of important security-related information is sent via rsyslog
      (e.g., successful and failed su attempts, failed login attempts, root login
      attempts, etc.).
    audit_procedure: >
      Review the contents of the /etc/rsyslog.conf and /etc/rsyslog.d/*.conf files
      to ensure appropriate logging is set. In addition, run the following command
      and verify that the log files are logging information: # ls -l /var/log/
    remediation: >
      Edit the following lines in the /etc/rsyslog.conf and /etc/rsyslog.d/*.conf
      files as appropriate for your environment: *.emerg :omusrmsg:* auth,authpriv.*
      /var/log/secure mail.* -/var/log/mail mail.info -/var/log/mail.info
      mail.warning -/var/log/mail.warn mail.err /var/log/mail.err news.crit
      -/var/log/news/news.crit news.err -/var/log/news/news.err news.notice
      -/var/log/news/news.notice *.=warning;*.=err -/var/log/warn *.crit
      /var/log/warn *.*;mail.none;news.none -/var/log/messages local0,local1.*
      -/var/log/localmessages local2,local3.* -/var/log/localmessages
      local4,local5.* -/var/log/localmessages local6,local7.*
      -/var/log/localmessages Run the following command to reload the rsyslogd
      configuration: # systemctl restart rsyslog References: 1. See the
      rsyslog.conf(5) man page for more information.
    references: >
      1. See the rsyslog.conf(5) man page for more information.
