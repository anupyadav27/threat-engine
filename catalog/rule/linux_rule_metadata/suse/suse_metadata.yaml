  - rule_id: suse.cis.6.audit_backlog_limit_is_sufficient
    title: "Ensure audit_backlog_limit is sufficient"
    severity: medium
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "6.3.1.3"
    cis_section: "6"
    profile_applicability: "Level 2"
    description: >
      The audit_backlog_limit parameter determines how auditd records can be held in
      the auditd backlog. The default setting of 64 may be insufficient to store all
      audit events during boot.
    rationale: >
      During boot if audit=1, then the backlog will hold 64 records. If more than 64
      records are created during boot, auditd records will be lost and potential
      malicious activity could go undetected.
    audit_procedure: >
      Note: /etc/default/grub should be checked because the grub2-mkconfig -o
      command will overwrite grub.cfg with parameters listed in /etc/default/grub.
      Run the following command to verify that the audit_backlog_limit=<BACKLOG
      SIZE> parameter has been set in /etc/default/grub: # grep -Psoi --
      '^\h*GRUB_CMDLINE_LINUX=\'([^#\n\r]+\h+)?\baudit_backlog_limit=\d+\b'
      /etc/default/grub Example output: GRUB_CMDLINE_LINUX='quiet
      audit_backlog_limit=8192' Note: Other parameters may also be listed
    remediation: >
      Edit /etc/default/grub and add audit_backlog_limit=<BACKLOG SIZE> to the
      GRUB_CMDLINE_LINUX= line between the opening and closing double quotes:
      Example: GRUB_CMDLINE_LINUX='quiet audit_backlog_limit=8192' Note: Other
      parameters may also be listed Run the following command to update the grub2
      configuration: # grub2-mkconfig -o /boot/grub2/grub.cfg References: 1. NIST SP
      800-53 Rev. 5: AU-2, AU-12, SI-5 2.
      https://documentation.suse.com/sles/15-SP6/html/SLES-all/cha-grub2.html
    references: >
      1. NIST SP 800-53 Rev. 5: AU-2, AU-12, SI-5 2.
      https://documentation.suse.com/sles/15-SP6/html/SLES-all/cha-grub2.html
    impact: >
      
