  - rule_id: suse.cis.2.access_to_etc_crontab_is_configured
    title: "Ensure access to /etc/crontab is configured"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "2.4.1.2"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The /etc/crontab file is used by cron to control its own jobs. The commands in
      this item make sure that root is the user and group owner of the file and that
      only the owner can access the file.
    rationale: >
      This file contains information on what system jobs are run by cron. Write
      access to these files could provide unprivileged users with the ability to
      elevate their privileges. Read access to these files could provide users with
      the ability to gain insight on system jobs that run on the system and could
      provide them a way to gain unauthorized privileged access.
    audit_procedure: >
      - IF - cron is installed on the system: Run the following command and verify
      Uid and Gid are both 0/root and Access does not grant permissions to group or
      other : # stat -Lc 'Access: (%a/%A) Uid: ( %u/ %U) Gid: ( %g/ %G)'
      /etc/crontab Access: (600/-rw-------) Uid: ( 0/ root) Gid: ( 0/ root)
    remediation: >
      - IF - cron is installed on the system: Run the following commands to set
      ownership and permissions on /etc/crontab: # chown root:root /etc/crontab #
      chmod og-rwx /etc/crontab Default Value: Access: (644/-rw-r--r--) Uid: ( 0/
      root) Gid: ( 0/ root) References: 1. NIST SP 800-53 Rev. 5: AC-3, MP-2
    references: >
      1. NIST SP 800-53 Rev. 5: AC-3, MP-2
    impact: >
      
