    rationale: >
      Granting write access to this directory for non-privileged users could provide
      them the means for gaining unauthorized elevated privileges. Granting read
      access to this directory could give an unprivileged user insight in how to
      gain elevated privileges or circumvent auditing controls.
    audit_procedure: >
      - IF - cron is installed: Run the following command and verify Uid and Gid are
      both 0/root and Access does not grant permissions to group or other : # stat
      /etc/cron.hourly/ Access: (0700/drwx------) Uid: ( 0/ root) Gid: ( 0/ root)
    remediation: >
      Run the following commands to set ownership and permissions on the
      /etc/cron.hourly/ directory: # chown root:root /etc/cron.hourly/ # chmod og-
      rwx /etc/cron.hourly/ - OR - Run the following command to remove cron # zypper
      remove cronie
    references: >
      
