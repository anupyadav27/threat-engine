  - rule_id: suse.cis.5.password_hashing_algorithm_is_sha_512
    title: "Ensure password hashing algorithm is SHA-512"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "5.4.1.1"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      Login passwords are hashed and stored in the /etc/shadow file. Note: These
      changes only apply to accounts configured on the local system.
    rationale: >
      The SHA-512 algorithm provides much stronger hashing than MD5, thus providing
      additional protection to the system by increasing the level of effort for an
      attacker to successfully determine passwords.
    audit_procedure: >
      Run the following command to verify the sha512 option is included: # grep -Ei
      '^\s*^\s*ENCRYPT_METHOD\s+SHA512' /etc/login.defs ENCRYPT_METHOD SHA512
    remediation: >
      Edit the /etc/login.defs file and modify ENCRYPT_METHOD to SHA512:
      ENCRYPT_METHOD sha512 Note: • Any system accounts that need to be expired
      should be carefully done separately by the system administrator to prevent any
      potential problems. • If it is determined that the password algorithm being
      used is not SHA-512, once it is changed, it is recommended that all user ID's
      be immediately expired and forced to change their passwords on next login, In
      accordance with local site policies. • To accomplish this, the following
      command can be used: # awk -F: '( $3<''$(awk '/^\s*UID_MIN/{print $2}'
      /etc/login.defs)'' && $1 != 'nfsnobody' ) { print $1 }' /etc/passwd | xargs -n
      1 chage -d 0 Default Value: ENCRYPT_METHOD sha512
