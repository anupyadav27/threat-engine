  - rule_id: suse.cis.6.auditing_for_processes_that_start_prior_to_auditd
    title: "Ensure auditing for processes that start prior to auditd is enabled"
    severity: medium
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "6.3.1.2"
    cis_section: "6"
    profile_applicability: "Level 2"
    description: >
      Configure grub2 so that processes that are capable of being audited can be
      audited even if they start up prior to auditd startup.
    rationale: >
      Audit events need to be captured on processes that start up prior to auditd ,
      so that potential malicious activity cannot go undetected.
    audit_procedure: >
      Note: /etc/default/grub should be checked because the grub2-mkconfig -o
      command will overwrite grub.cfg with parameters listed in /etc/default/grub.
      Run the following command to verify that the audit=1 parameter has been set in
      /etc/default/grub: # grep -Psoi --
      '^\h*GRUB_CMDLINE_LINUX=\'([^#\n\r]+\h+)?audit=1\b' /etc/default/grub Example
      output: GRUB_CMDLINE_LINUX='quiet audit=1' Note: Other parameters may also be
      listed
    remediation: >
      Edit /etc/default/grub and add audit=1 to the GRUB_CMDLINE_LINUX= line between
      the opening and closing double quotes: Example: GRUB_CMDLINE_LINUX='quiet
      audit=1' Note: Other parameters may also be listed Run the following command
      to update the grub2 configuration: # grub2-mkconfig -o /boot/grub2/grub.cfg
      References: 1. https://documentation.suse.com/sles/15-SP6/html/SLES-all/cha-
      grub2.html
    references: >
      1. https://documentation.suse.com/sles/15-SP6/html/SLES-all/cha-grub2.html
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_SUSE_15_v2_0_1_6_3_1_2"
      nist_800_53: []
