  - rule_id: suse.cis.1.no_unconfined_daemons_exist
    title: "Ensure no unconfined daemons exist"
    severity: medium
    category: linux
    tech_type: suse
    automation_type: manual
    cis_benchmark: "CIS_SUSE 12_v2.0.0"
    cis_version: "12_v2.0.0"
    cis_control: "1.6.1.6"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      Daemons that are not defined in SELinux policy will inherit the security
      context of their parent process.
    rationale: >
      Since daemons are launched and descend from the init process, they will
      inherit the security context label initrc_t. This could cause the unintended
      consequence of giving the process more permission than it requires.
    audit_procedure: >
      Run the following command and verify not output is produced: # ps -eZ | egrep
      'initrc' | egrep -vw 'tr|ps|egrep|bash|awk' | tr ':' ' ' | awk '{ print $NF }'
    remediation: >
      Investigate any unconfined daemons found during the audit action. They may
      need to have an existing security context assigned to them or a policy built
      for them. Notes: Occasionally certain daemons such as backup or centralized
      management software may require running unconfined. Any such software should
      be carefully analyzed and documented before such an exception is made. 73 | P
      a g e 1.6.2 Configure AppArmor AppArmor provides a Mandatory Access Control
      (MAC) system that greatly augments the default Discretionary Access Control
      (DAC) model. Under AppArmor MAC rules are applied by file paths instead of by
      security contexts as in other MAC systems. As such it does not require support
      in the filesystem and can be applied to network mounted filesystems for
      example. AppArmor security policies define what system resources applications
      can access and what privileges they can do so with. This automatically limits
      the damage that the software can do to files accessible by the calling user.
      The user does not need to take any action to gain this benefit. For an action
      to occur, both the traditional DAC permissions must be satisfied as well as
      the AppArmor MAC rules. The action will not be allowed if either one of these
      models does not permit the action. In this way, AppArmor rules can only make a
      system's permissions more restrictive and secure. Note: This section only
      applies if AppArmor is in use on the system. Recommendations for SELinux are
      also included, and additional Mandatory Access Control systems exist beyond
      these two. References: 1. AppArmor Documentation:
      http://wiki.apparmor.net/index.php/Documentation 2. Ubuntu AppArmor
      Documentation: https://help.ubuntu.com/community/AppArmor 3. SUSE AppArmor
      Documentation: https://www.suse.com/documentation/apparmor/
    references: >
      1. AppArmor Documentation: http://wiki.apparmor.net/index.php/Documentation 2.
      Ubuntu AppArmor Documentation: https://help.ubuntu.com/community/AppArmor 3.
      SUSE AppArmor Documentation: https://www.suse.com/documentation/apparmor/
