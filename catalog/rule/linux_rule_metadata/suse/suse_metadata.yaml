      associated with login/logout events. • The file /var/log/faillog tracks failed
      events from login. • The file /var/log/lastlog maintain records of the last
      time a user successfully logged in. • The file /var/log/tallylog maintains
      records of failures via the pam_tally2 module Note: Reloading the auditd
      config to set active settings requires the auditd service to be restarted, and
      may require a system reboot.
    rationale: >
      Monitoring login/logout events could provide a system administrator with
      information associated with brute force attacks against user logins.
    audit_procedure: >
