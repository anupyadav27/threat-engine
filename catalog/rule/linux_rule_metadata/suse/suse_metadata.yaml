  - rule_id: suse.cis.4.journald_is_configured_to_write_logfiles_to
    title: "Ensure journald is configured to write logfiles to persistent disk"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "4.2.2.3"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Data from journald may be stored in volatile memory or persisted locally on
      the server. Logs in memory will be lost upon a system reboot. By persisting
      logs to local disk on the server they are protected from loss. Note: The main
      configuration file /etc/systemd/journald.conf is read before any of the custom
      *.conf files. If there are custom configs present, they override the main
      configuration parameters.
    rationale: >
      Writing log data to disk will provide the ability to forensically reconstruct
      events which may have impacted the operations or security of a system even
      after a system crash or reboot.
    audit_procedure: >
      Review /etc/systemd/journald.conf and verify that logs are persisted to disk:
      # grep -E ^\s*Storage /etc/systemd/journald.conf Storage=persistent
    remediation: >
      Edit the /etc/systemd/journald.conf file and add the following line:
      Storage=persistent References: 1.
      https://github.com/konstruktoid/hardening/blob/master/systemd.adoc#etcsystemd
      journaldconf
    references: >
      1.
      https://github.com/konstruktoid/hardening/blob/master/systemd.adoc#etcsystemd
