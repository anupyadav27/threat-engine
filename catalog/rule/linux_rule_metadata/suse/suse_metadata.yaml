  - rule_id: suse.cis.4.discretionary_access_control_permission
    title: "Ensure discretionary access control permission modification events are collected"
    severity: medium
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "4.1.9"
    cis_section: "4"
    profile_applicability: "Level 2"
    description: >
      Monitor changes to file permissions, attributes, ownership and group. The
      parameters in this section track changes for system calls that affect file
      permissions and attributes. The chmod , fchmod and fchmodat system calls
      affect the permissions associated with a file. The chown , fchown , fchownat
      and lchown system calls affect owner and group attributes on a file. The
      setxattr , lsetxattr , fsetxattr (set extended file attributes) and
      removexattr , lremovexattr , fremovexattr (remove extended file attributes)
      control extended file attributes. In all cases, an audit record will only be
      written for non-system user ids (auid >= 1000) and will ignore Daemon events
      (auid = 4294967295). All audit records will be tagged with the identifier
      'perm_mod.' Note: • Systems may have been customized to change the default
      UID_MIN. To confirm the UID_MIN for your system, run the following command: •
      awk '/^\s*UID_MIN/{print $2}' /etc/login.defs • - IF - your systems UID_MIN is
      not 1000, replace audit>=1000 with audit>=<UID_MIN for your system> in the
      Audit and Remediation procedures. • Reloading the auditd config to set active
      settings may require a system reboot.
    rationale: >
      Monitoring for changes in file attributes could alert a system administrator
      to activity that could indicate intruder activity or policy violation.
    audit_procedure: >
      On a 32 bit system run the following commands: Run the following command and
      verify rules are in a .rules file: # grep perm_mod /etc/audit/rules.d/*.rules
      Verify output matches: -a always,exit -F arch=b32 -S chmod -S fchmod -S
      fchmodat -F auid>=1000 -F auid!=4294967295 -k perm_mod -a always,exit -F
      arch=b32 -S chown -S fchown -S fchownat -S lchown -F auid>=1000 -F
      auid!=4294967295 -k perm_mod -a always,exit -F arch=b32 -S setxattr -S
      lsetxattr -S fsetxattr -S removexattr -S lremovexattr -S fremovexattr -F
      auid>=1000 -F auid!=4294967295 -k perm_mod Run the following command and
      verify the rules are in the running auditd config: # auditctl -l | grep
      perm_mod Verify output matches: -a always,exit -F arch=b32 -S
      chmod,fchmod,fchmodat -F auid>=1000 -F auid!=-1 -F key=perm_mod -a always,exit
      -F arch=b32 -S lchown,fchown,chown,fchownat -F auid>=1000 -F auid!=-1 -F
      key=perm_mod -a always,exit -F arch=b32 -S
      setxattr,lsetxattr,fsetxattr,removexattr,lremovexattr,fremovexattr -F
      auid>=1000 -F auid!=-1 -F key=perm_mod On a 64 bit system run the following
      commands: Run the following command and verify rules are in a .rules file: #
      grep perm_mod /etc/audit/rules.d/*.rules Verify output matches:
      /etc/audit/rules.d/perm_mod.rules:-a always,exit -F arch=b64 -S chmod -S
      fchmod -S fchmodat -F auid>=1000 -F auid!=4294967295 -k perm_mod
      /etc/audit/rules.d/perm_mod.rules:-a always,exit -F arch=b32 -S chmod -S
      fchmod -S fchmodat -F auid>=1000 -F auid!=4294967295 -k perm_mod
      /etc/audit/rules.d/perm_mod.rules:-a always,exit -F arch=b64 -S chown -S
      fchown -S fchownat -S lchown -F auid>=1000 -F auid!=4294967295 -k perm_mod
      /etc/audit/rules.d/perm_mod.rules:-a always,exit -F arch=b32 -S chown -S
