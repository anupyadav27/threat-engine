    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      The /etc/shadow file is used to store the information about user accounts that
      is critical to the security of those accounts, such as the hashed password and
      other security information.
    rationale: >
      If attackers can gain read access to the /etc/shadow file, they can easily run
      a password cracking program against the hashed password to break it. Other
      security information that is stored in the /etc/shadow file (such as
      expiration) could also be useful to subvert the user accounts.
    audit_procedure: >
      Run the following command and verify Uid is 0/root, Gid is 0/root or <gid>
      /shadow, and Access is 0640 or more restrictive: # stat /etc/shadow Access:
      (0640/-rw-r-----) Uid: ( 0/ root) Gid: ( 15/ shadow)
    remediation: >
      Run the following commands to set owner, group, and permissions on
      /etc/shadow: # chown root:root /etc/shadow # chmod u-x,g-wx,o-rwx /etc/shadow
