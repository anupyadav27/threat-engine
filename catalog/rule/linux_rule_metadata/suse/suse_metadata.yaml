      AppArmor must be enabled at boot time in your bootloader configuration to
      ensure that the controls it provides are not overridden.
    audit_procedure: >
      Run the following command to verify that all linux lines have the apparmor=1
      parameter set: # grep '^\s*linux' /boot/grub2/grub.cfg | grep -v 'apparmor=1'
