  - rule_id: suse.cis.5.permissions_on_etc_crontab_are_configured
    title: "Ensure permissions on /etc/crontab are configured"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "5.1.2"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The /etc/crontab file is used by cron to control its own jobs. The commands in
      this item make sure that root is the user and group owner of the file and that
      only the owner can access the file.
    rationale: >
      This file contains information on what system jobs are run by cron. Write
      access to these files could provide unprivileged users with the ability to
      elevate their privileges. Read access to these files could provide users with
      the ability to gain insight on system jobs that run on the system and could
      provide them a way to gain unauthorized privileged access.
    audit_procedure: >
      - IF - cron is installed: Run the following command and verify Uid and Gid are
      both 0/root and Access does not grant permissions to group or other: # stat
      /etc/crontab Access: (0600/-rw-------) Uid: ( 0/ root) Gid: ( 0/ root)
    remediation: >
      Run the following commands to set ownership and permissions on /etc/crontab: #
      chown root:root /etc/crontab # chmod u-x,og-rwx /etc/crontab - OR - Run the
      following command to remove cron: # zypper remove cronie
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
