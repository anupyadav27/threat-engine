  - rule_id: suse.cis.4.unsuccessful_unauthorized_file_access_attempts
    title: "Ensure unsuccessful unauthorized file access attempts are collected"
    severity: medium
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "4.1.10"
    cis_section: "4"
    profile_applicability: "Level 2"
    description: >
      Monitor for unsuccessful attempts to access files. The parameters below are
      associated with system calls that control creation ( creat ), opening ( open ,
      openat ) and truncation ( truncate , ftruncate ) of files. An audit log record
      will only be written if the user is a non-privileged user (auid > = 1000), is
      not a Daemon event (auid=4294967295) and if the system call returned EACCES
      (permission denied to the file) or EPERM (some other permanent error
      associated with the specific system call). All audit records will be tagged
      with the identifier 'access.' Note: • Systems may have been customized to
      change the default UID_MIN. To confirm the UID_MIN for your system, run the
      following command: • # awk '/^\s*UID_MIN/{print $2}' /etc/login.defs • - IF -
      your systems' UID_MIN is not 1000, replace audit>=1000 with audit>=<UID_MIN
      for your system> in the Audit and Remediation procedures. • Reloading the
      auditd config to set active settings may require a system reboot.
    rationale: >
      Failed attempts to open, create or truncate files could be an indication that
      an individual or process is trying to gain unauthorized access to the system.
    audit_procedure: >
      On a 32 bit system run the following commands: Run the following command and
      verify rules are in a .rules file: # grep access /etc/audit/rules.d/*.rules
