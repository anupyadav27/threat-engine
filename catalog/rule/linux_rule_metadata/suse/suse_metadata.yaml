    profile_applicability: "Level 1"
    description: >
      While the system administrator can establish secure permissions for users'
      home directories, the users can easily override these.
    rationale: >
      Group or world-writable user home directories may enable malicious users to
      steal or modify other users' data or to gain another user's system privileges.
    audit_procedure: >
      Run the following script and verify no results are returned: #!/bin/bash grep
      -E -v '^(halt|sync|shutdown)' /etc/passwd | awk -F: '($7 != '''$(which
      nologin)''' && $7 != '/bin/false') { print $1 ' ' $6 }' | while read user dir;
      do if [ ! -d '$dir' ]; then echo 'The home directory ($dir) of user $user does
      not exist.' else dirperm=$(ls -ld $dir | cut -f1 -d' ') if [ $(echo $dirperm |
      cut -c6) != '-' ]; then echo 'Group Write permission set on the home directory
      ($dir) of user $user' fi if [ $(echo $dirperm | cut -c8) != '-' ]; then echo
      'Other Read permission set on the home directory ($dir) of user $user' fi if [
      $(echo $dirperm | cut -c9) != '-' ]; then echo 'Other Write permission set on
      the home directory ($dir) of user $user' fi if [ $(echo $dirperm | cut -c10)
      != '-' ]; then echo 'Other Execute permission set on the home directory ($dir)
      of user $user' fi fi done
    remediation: >
      Making global modifications to user home directories without alerting the user
