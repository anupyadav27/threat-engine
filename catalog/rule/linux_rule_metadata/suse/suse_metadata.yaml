  - rule_id: suse.cis.4.system_administrator_actions_sudolog_are_collected
    title: "Ensure system administrator actions (sudolog) are collected"
    severity: medium
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "4.1.15"
    cis_section: "4"
    profile_applicability: "Level 2"
    description: >
      Monitor the sudo log file. The sudo log file is configured in /etc/sudoers or
      a file in /etc/sudoers.d. If the system has been properly configured to
      disable the use of the su command and force all administrators to have to log
      in first and then use sudo to execute privileged commands, then all
      administrator commands will be logged to to the sudo log file. Any time a
      command is executed, an audit event will be triggered as the sudo log file
      will be opened for write and the executed administration command will be
      written to the log. Note: • The system must be configured with su disabled
      (See Recommendation 5.6 Ensure access to the su command is restricted) to
      force all command execution through sudo. This will not be effective on the
      console, as administrators can log in as root. • Reloading the auditd config
      to set active settings may require a system reboot.
    rationale: >
      Changes in /var/log/sudo.log indicate that an administrator has executed a
      command or the log file itself has been tampered with. Administrators will
      want to correlate the events written to the audit trail with the records
      written to /var/log/sudo.log to verify if unauthorized commands have been
      executed.
    audit_procedure: >
      Run the following commands: # grep -E '^\s*-w\s+$(grep -r logfile
      /etc/sudoers* | sed -e 's/.*logfile=//;s/,? .*//')\s+-p\s+wa\s+-k\s+actions'
      /etc/audit/rules.d/*.rules # auditctl -l | grep actions Verify output of both
      matches the output of the following command, and the the output includes a
      file path echo '-w $(grep -r logfile /etc/sudoers* | sed -e
      's/.*logfile=//;s/,? .*//') -p wa -k actions' Example Output -w
      /var/log/sudo.log -p wa -k actions
    remediation: >
      Edit or create a file in the /etc/audit/rules.d/ directory ending in .rules
      and add the following line: -w <Path to sudo logfile> -p wa -k actions
      Example: vi /etc/audit/rules.d/actions.rules and add the following line: -w
      /var/log/sudo.log -p wa -k actions
    references: >
      
    impact: >
      
