    description: >
      Key exchange is any method in cryptography by which cryptographic keys are
      exchanged between two parties, allowing use of a cryptographic algorithm. If
      the sender and receiver wish to exchange encrypted messages, each must be
      equipped to encrypt messages to be sent and decrypt messages received Notes: •
      Kex algorithms have a higher preference the earlier they appear in the list •
      Some organizations may have stricter requirements for approved Key exchange
      algorithms • Ensure that Key exchange algorithms used are in compliance with
      site policy • The only Key Exchange Algorithms currently FIPS 140 approved
      are: o ecdh-sha2-nistp256 o ecdh-sha2-nistp384 o ecdh-sha2-nistp521 o diffie-
      hellman-group-exchange-sha256 o diffie-hellman-group16-sha512 o diffie-
      hellman-group18-sha512 o diffie-hellman-group14-sha256
    rationale: >
      Key exchange methods that are considered weak should be removed. A key
      exchange method may be weak because too few bits are used, or the hashing
      algorithm is considered too weak. Using weak algorithms could expose
      connections to man-in-the- middle attacks
