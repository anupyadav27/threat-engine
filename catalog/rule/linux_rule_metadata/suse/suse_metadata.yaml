  - rule_id: suse.cis.4.audit_backlog_limit_is_sufficient
    title: "Ensure audit_backlog_limit is sufficient"
    severity: medium
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "4.1.2.4"
    cis_section: "4"
    profile_applicability: "Level 2"
    description: >
      The backlog limit has a default setting of 64
    rationale: >
      During boot if audit=1, then the backlog will hold 64 records. If more that 64
      records are created during boot, auditd records will be lost and potential
      malicious activity could go undetected.
    audit_procedure: >
      Run the following commands and verify the audit_backlog_limit= parameter is
      set to an appropriate size for your organization # grep '^\s*linux'
      /boot/grub2/grub.cfg | grep -v 'audit_backlog_limit=' Nothing should be
      returned. # grep 'audit_backlog_limit=' /boot/grub2/grub.cfg Ensure the
      returned value complies with local site policy Recommended that this value be
      8192 or larger.
    remediation: >
      Edit /etc/default/grub and add audit_backlog_limit=<BACKLOG SIZE> to
      GRUB_CMDLINE_LINUX: Example: GRUB_CMDLINE_LINUX='audit_backlog_limit=8192' Run
      the following command to update the grub2 configuration: # grub2-mkconfig -o
      /boot/grub2/grub.cfg
