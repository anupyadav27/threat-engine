  - rule_id: suse.cis.1.repo_gpgcheck_is_globally_activated
    title: "Ensure repo_gpgcheck is globally activated"
    severity: medium
    category: linux
    tech_type: suse
    automation_type: manual
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "1.2.1.3"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      The repo_gpgcheck option, found in the main section of the /etc/zypp/zypp.conf
      and individual /etc/zypp/repos.d/*.repo files, will perform a GPG signature
      check on the repodata.
    rationale: >
      It is important to ensure that the repository data signature is always checked
      prior to installation to ensure that the software is not tampered with in any
      way. Impact: Not all repositories support repo_gpgcheck. Take care to set this
      value to (default) for particular repositories that do not support it. If
      enabled on repositories that do not support repo_gpgcheck installation of
      packages will fail. Research is required by the user to determine which
      repositories is configured on the local system and, from that list, which
      support repo_gpgcheck.
    audit_procedure: >
      Global configuration Run the following command: # grep -Pi --
      '^\h*repo_gpgcheck\h*=\h*(0|false|no|off)\b' /etc/zypp/zypp.conf Nothing
      should be returned. Per repository configuration Configuration in
      /etc/zypp/repos.d/ takes precedence over the global configuration. As an
      example, to list all the configured repositories that specifically disables
      repo_gpgcheck, run the following: for repo_file in /etc/zypp/repos.d/*.repo;
      do if grep -q 'repo_gpgcheck=0' '$repo_file'; then echo -e 'Found
      'repo_gpgcheck=0' in $repo_file' fi done Review any output files to ensure
      repos are configured in accordance with site policy.
    remediation: >
      Global configuration Edit /etc/zypp/zypp.conf and set repo_gpgcheck=on.
      Example: repo_gpgcheck=on Per repository configuration First check that the
      particular repository support GPG checking on the repodata. Edit any failing
      files in /etc/zypp/repos.d/* and set all instances starting with repo_gpgcheck
      to on. References: 1. NIST SP 800-53 Rev. 5: SI-2
    references: >
      1. NIST SP 800-53 Rev. 5: SI-2
    impact: >
      Not all repositories support repo_gpgcheck. Take care to set this value to
      (default) for particular repositories that do not support it. If enabled on
      repositories that do not support repo_gpgcheck installation of packages will
      fail. Research is required by the user to determine which repositories is
      configured on the local system and, from that list, which support
      repo_gpgcheck.
    compliance_mappings:
      cis:
        - "CIS_SUSE_15_v2_0_1_1_2_1_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
