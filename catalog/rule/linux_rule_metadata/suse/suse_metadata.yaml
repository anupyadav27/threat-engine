  - rule_id: suse.cis.5.permissions_on_etc_cron_daily_are_configured
    title: "Ensure permissions on /etc/cron.daily are configured"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "5.1.4"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The /etc/cron.daily directory contains system cron jobs that need to run on a
      daily basis. The files in this directory cannot be manipulated by the crontab
      command, but are instead edited by system administrators using a text editor.
      The commands below restrict read/write and search access to user and group
