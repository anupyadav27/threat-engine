  - rule_id: suse.cis.5.sudo_is_installed
    title: "Ensure sudo is installed"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "5.2.1"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      sudo allows a permitted user to execute a command as the superuser or another
      user, as specified by the security policy. The invoking user's real (not
      effective) user ID is used to determine the user name with which to query the
      security policy.
    rationale: >
      sudo supports a plug-in architecture for security policies and input/output
      logging. Third parties can develop and distribute their own policy and I/O
      logging plug-ins to work seamlessly with the sudo front end. The default
      security policy is sudoers, which is configured via the file /etc/sudoers and
      any entries in /etc/sudoers.d. The security policy determines what privileges,
      if any, a user has to run sudo. The policy may require that users authenticate
      themselves with a password or another authentication mechanism. If
      authentication is required, sudo will exit if the user's password is not
      entered within a configurable time limit. This limit is policy-specific.
    audit_procedure: >
      Verify that sudo is installed. Run the following command: # rpm -q sudo
      sudo-<version>
    remediation: >
      Run the following command to install sudo: # zypper install sudo References:
      1. SUDO(8) 2. NIST SP 800-53 Rev. 5: AC-6(2), AC-6(5)
    references: >
