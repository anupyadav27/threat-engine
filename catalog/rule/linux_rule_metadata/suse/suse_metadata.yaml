  - rule_id: suse.cis.5.ssh_allowtcpforwarding_is_disabled
    title: "Ensure SSH AllowTcpForwarding is disabled"
    severity: medium
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "5.2.20"
    cis_section: "5"
    profile_applicability: "Level 2"
    description: >
      SSH port forwarding is a mechanism in SSH for tunneling application ports from
      the client to the server, or servers to clients. It can be used for adding
      encryption to legacy applications, going through firewalls, and some system
      administrators and IT professionals use it for opening backdoors into the
      internal network from their home machines
    rationale: >
      Leaving port forwarding enabled can expose the organization to security risks
      and back- doors. SSH connections are protected with strong encryption. This
      makes their contents invisible to most deployed network monitoring and traffic
      filtering solutions. This invisibility carries considerable risk potential if
      it is used for malicious purposes such as data exfiltration. Cybercriminals or
      malware could exploit SSH to hide their unauthorized communications, or to
      exfiltrate stolen data from the target network Impact: SSH tunnels are widely
      used in many corporate environments that employ mainframe systems as their
      application backends. In those environments the applications themselves may
      have very limited native support for security. By utilizing tunneling,
      compliance with SOX, HIPAA, PCI-DSS, and other standards can be achieved
      without having to modify the applications.
    audit_procedure: >
      Run the following command and verify that output matches: # sshd -T | grep -i
      allowtcpforwarding allowtcpforwarding no
    remediation: >
      Edit the /etc/ssh/sshd_config file to set the parameter as follows:
      AllowTcpForwarding no Default Value: AllowTcpForwarding yes References: 1.
      https://www.ssh.com/ssh/tunneling/example
    references: >
      1. https://www.ssh.com/ssh/tunneling/example
    impact: >
      SSH tunnels are widely used in many corporate environments that employ
      mainframe systems as their application backends. In those environments the
      applications themselves may have very limited native support for security. By
      utilizing tunneling, compliance with SOX, HIPAA, PCI-DSS, and other standards
      can be achieved without having to modify the applications.
