  - rule_id: suse.cis.4.rsyslog_is_configured_to_send_logs_to_a_remote
    title: "Ensure rsyslog is configured to send logs to a remote log host"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "4.2.1.5"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      The rsyslog utility supports the ability to send logs it gathers to a remote
      log host running syslogd(8) or to receive messages from remote hosts, reducing
      administrative overhead. Note: The double 'at' sign (@@) directs rsyslog to
      use TCP to send log messages to the server, which is a more reliable transport
      mechanism than the default UDP protocol.
    rationale: >
      Storing log data on a remote host protects log integrity from local attacks.
      If an attacker gains root access on the local system, they could tamper with
      or remove log data that is stored on the local system
    audit_procedure: >
      Review the /etc/rsyslog.conf and /etc/rsyslog.d/*.conf files and verify that
      logs are sent to a central host (where loghost.example.com is the name of your
      central log host): # grep '^*.*[^I][^I]*@' /etc/rsyslog.conf
      /etc/rsyslog.d/*.conf *.* @@loghost.example.com
    remediation: >
      Edit the /etc/rsyslog.conf and /etc/rsyslog.d/*.conf files and add the
      following line (where loghost.example.com is the name of your central log
      host). *.* @@loghost.example.com Run the following command to reload the
      rsyslogd configuration: # systemctl restart rsyslog References: 1. See the
      rsyslog.conf(5) man page for more information.
    references: >
      1. See the rsyslog.conf(5) man page for more information.
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_SUSE_12_v3_2_1_4_2_1_5"
      nist_800_53: []
      soc2: []
      pci_dss: []
