      Data from journald may be stored in volatile memory or persisted locally on
      the server. Logs in memory will be lost upon a system reboot. By persisting
      logs to local disk on the server they are protected from loss due to a reboot.
    rationale: >
      Writing log data to disk will provide the ability to forensically reconstruct
      events which may have impacted the operations or security of a system even
      after a system crash or reboot. Note: This recommendation only applies if
      journald is the chosen method for client side logging . Do not apply this
      recommendation if rsyslog is used.
    audit_procedure: >
      Run the following command to verify Storage is set to persistent: # systemd-
      analyze cat-config systemd/journald.conf systemd/journald.conf.d/* | grep -E
      '^Storage=persistent' Storage=persistent
    remediation: >
      Set the following parameter in the [Journal] section in
      /etc/systemd/journald.conf or a file in /etc/systemd/journald.conf.d/ ending
      in .conf: Storage=persistent Example: #!/usr/bin/env bash { [ ! -d
      /etc/systemd/journald.conf.d/ ] && mkdir /etc/systemd/journald.conf.d/ if grep
      -Psq -- '^\h*\[Journal\]' /etc/systemd/journald.conf.d/60- journald.conf; then
      printf '%s\n' 'Storage=persistent' >> /etc/systemd/journald.conf.d/60-
      journald.conf else printf '%s\n' '[Journal]' 'Storage=persistent' >>
      /etc/systemd/journald.conf.d/60-journald.conf fi } Note: If this setting
      appears in a canonically later file, or later in the same file, the setting
      will be overwritten Run to following command to update the parameters in the
      service: # systemctl reload-or-restart systemd-journald References: 1. NIST SP
      800-53 Rev. 5: AU-3, AU-12
    references: >
      1. NIST SP 800-53 Rev. 5: AU-3, AU-12
