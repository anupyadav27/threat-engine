  - rule_id: suse.cis.5.ssh_access_is_limited
    title: "Ensure SSH access is limited"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "5.2.4"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      There are several options available to limit which users and group can access
      the system via SSH. It is recommended that at least one of the following
      options be leveraged: • AllowUsers: o The AllowUsers variable gives the system
      administrator the option of allowing specific users to ssh into the system.
      The list consists of space separated user names. Numeric user IDs are not
      recognized with this variable. If a system administrator wants to restrict
      user access further by only allowing the allowed users to log in from a
      particular host, the entry can be specified in the form of user@host. •
      AllowGroups: o The AllowGroups variable gives the system administrator the
      option of allowing specific groups of users to ssh into the system. The list
      consists of space separated group names. Numeric group IDs are not recognized
      with this variable. • DenyUsers: o The DenyUsers variable gives the system
      administrator the option of denying specific users to ssh into the system. The
      list consists of space separated user names. Numeric user IDs are not
      recognized with this variable. If a system administrator wants to restrict
      user access further by specifically denying a user's access from a particular
      host, the entry can be specified in the form of user@host. • DenyGroups: o The
      DenyGroups variable gives the system administrator the option of denying
      specific groups of users to ssh into the system. The list consists of space
      separated group names. Numeric group IDs are not recognized with this
      variable.
    rationale: >
      Restricting which users can remotely access the system via SSH will help
      ensure that only authorized users access the system.
    audit_procedure: >
      Run the following command: sshd -T | grep -E
      '^\s*(allow|deny)(users|groups)\s+\S+' Verify that the output matches at least
      one of the following lines: allowusers <userlist> allowgroups <grouplist>
      denyusers <userlist> denygroups <grouplist>
    remediation: >
      Edit the /etc/ssh/sshd_config file to set one or more of the parameter as
      follows: AllowUsers <userlist> OR AllowGroups <grouplist> OR DenyUsers
      <userlist> OR DenyGroups <grouplist>
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_SUSE_12_v3_2_1_5_2_4"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_suse_12_v3_2_1_5_2_4"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: suse.cis.5.ssh_loglevel_is_appropriate
    title: "Ensure SSH LogLevel is appropriate"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "5.2.5"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      INFO level is the basic level that only records login activity of SSH users.
      In many situations, such as Incident Response, it is important to determine
      when a particular user was active on a system. The logout record can eliminate
      those users who disconnected, which helps narrow the field. VERBOSE level
      specifies that login and logout activity as well as the key fingerprint for
      any SSH key used for login will be logged. This information is important for
      SSH key management, especially in legacy environments.
    rationale: >
      SSH provides several logging levels with varying amounts of verbosity. DEBUG
      is specifically not recommended other than strictly for debugging SSH
      communications since it provides so much data that it is difficult to identify
      important security information.
    audit_procedure: >
      Run the following command and verify that output matches: # sshd -T | grep
      loglevel loglevel VERBOSE OR loglevel INFO
    remediation: >
      Edit the /etc/ssh/sshd_config file to set the parameter as follows: LogLevel
      VERBOSE OR LogLevel INFO Default Value: LogLevel INFO References: 1.
      https://www.ssh.com/ssh/sshd_config/
    references: >
      1. https://www.ssh.com/ssh/sshd_config/
    impact: >
      
