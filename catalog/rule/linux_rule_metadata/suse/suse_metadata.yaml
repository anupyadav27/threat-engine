      devices.
    rationale: >
      Since the /var/log/audit filesystem is not intended to support devices, set
      this option to ensure that users cannot create a block or character special
      devices in /var/log/audit.
    audit_procedure: >
      - IF - a separate partition exists for /var/log/audit, verify that the nodev
      option is set. Run the following command to verify that the nodev mount option
      is set. Example: # findmnt -kn /var/log/audit | grep -v nodev Nothing should
      be returned
    remediation: >
