      etm@openssh.com,hmac-sha2-512-etm@openssh.com,hmac-sha1-
      etm@openssh.com,umac-64@openssh.com,umac-128@openssh.com,hmac-sha2- 256,hmac-
      sha2-512,hmac-sha1 References: 1. More information on SSH downgrade attacks
      can be found here: http://www.mitls.org/pages/attacks/SLOTH 2. SSHD_CONFIG(5)
