  - rule_id: suse.cis.1.unused_filesystems_kernel_modules_are_not
    title: "Ensure unused filesystems kernel modules are not available"
    severity: high
    category: linux
    tech_type: suse
    automation_type: manual
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "1.1.1.9"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Filesystem kernel modules are pieces of code that can be dynamically loaded
      into the Linux kernel to extend its filesystem capabilities, or so-called base
      kernel, of an operating system. Filesystem kernel modules are typically used
      to add support for new hardware (as device drivers), or for adding system
      calls.
    rationale: >
      While loadable filesystem kernel modules are a convenient method of modifying
      the running kernel, this can be abused by attackers on a compromised system to
      prevent detection of their processes or files, allowing them to maintain
      control over the system. Many rootkits make use of loadable filesystem kernel
      modules in this way. Removing support for unneeded filesystem types reduces
      the local attack surface of the system. If this filesystem type is not needed,
      disable it. The following filesystem kernel modules have known CVE's and
      should be made unavailable if no dependencies exist: • afs - CVE-2022-37402 •
      ceph - CVE-2022-0670 • cifs - CVE-2022-29869 • exfat CVE-2022-29973 • ext
      CVE-2022-1184 • fat CVE-2022-22043 • fscache CVE-2022-3630 • fuse
      CVE-2023-0386 • gfs2 CVE-2023-3212 • nfs_common CVE-2023-6660 • nfsd
      CVE-2022-43945 • smbfs_common CVE-2022-2585 Impact: This list may be quite
      extensive and covering all edges cases is difficult. Therefore, it's crucial
      to carefully consider the implications and dependencies before making any
      changes to the filesystem kernel module configurations.
    audit_procedure: >
      Run the following script to: • Look at the filesystem kernel modules available
      to the currently running kernel. • Exclude mounted filesystem kernel modules
      that don't currently have a CVE • List filesystem kernel modules that are not
      fully disabled, or are loaded into the kernel Review the generated output #!
      /usr/bin/env bash { a_output=(); a_output2=(); a_modprope_config=();
      a_excluded=(); a_available_modules=() a_ignore=('xfs' 'vfat' 'ext2' 'ext3'
      'ext4') a_cve_exists=('afs' 'ceph' 'cifs' 'exfat' 'ext' 'fat' 'fscache' 'fuse'
      'gfs2' 'nfs_common' 'nfsd' 'smbfs_common') f_module_chk() { l_out2=''; grep
      -Pq -- '\b$l_mod_name\b' <<< '${a_cve_exists[*]}' && l_out2=' <- CVE exists!'
      if ! grep -Pq -- '\bblacklist\h+''$l_mod_name''\b' <<<
      '${a_modprope_config[*]}'; then a_output2+=(' - Kernel module: \'$l_mod_name\'
      is not fully disabled $l_out2') elif ! grep -Pq --
      '\binstall\h+''$l_mod_name''\h+(\/usr)?\/bin\/(false|true)\b' <<<
      '${a_modprope_config[*]}'; then a_output2+=(' - Kernel module: \'$l_mod_name\'
      is not fully disabled $l_out2') fi if lsmod | grep '$l_mod_name' &> /dev/null;
      then # Check if the module is currently loaded l_output2+=(' - Kernel module:
      \'$l_mod_name\' is loaded' '') fi } while IFS= read -r -d $'\0' l_module_dir;
      do a_available_modules+=('$(basename '$l_module_dir')') done < <(find
      '$(readlink -f /usr/lib/modules/'$(uname -r)'/kernel/fs || readlink -f
      /lib/modules/'$(uname -r)'/kernel/fs)' -mindepth 1 -maxdepth 1 - type d !
      -empty -print0) while IFS= read -r l_exclude; do if grep -Pq --
      '\b$l_exclude\b' <<< '${a_cve_exists[*]}'; then a_output2+=(' - ** WARNING:
      kernel module: \'$l_exclude\' has a CVE and is currently mounted! **') elif
      grep -Pq -- '\b$l_exclude\b' <<< '${a_available_modules[*]}'; then
      a_output+=(' - Kernel module: \'$l_exclude\' is currently mounted - do NOT
      unload or disable') fi ! grep -Pq -- '\b$l_exclude\b' <<< '${a_ignore[*]}' &&
      a_ignore+=('$l_exclude') done < <(findmnt -knD | awk '{print $2}' | sort -u)
      while IFS= read -r l_config; do a_modprope_config+=('$l_config') done <
      <(modprobe --showconfig | grep -P '^\h*(blacklist|install)') for l_mod_name in
      '${a_available_modules[@]}'; do # Iterate over all filesystem modules [[
      '$l_mod_name' =~ overlay ]] && l_mod_name='${l_mod_name::-2}' if grep -Pq --
      '\b$l_mod_name\b' <<< '${a_ignore[*]}'; then a_excluded+=(' - Kernel module:
      \'$l_mod_name\'') else f_module_chk fi done [ '${#a_excluded[@]}' -gt 0 ] &&
      printf '%s\n' '' ' -- INFO --' \ 'The following intentionally skipped' \
      '${a_excluded[@]}' if [ '${#a_output2[@]}' -le 0 ]; then printf '%s\n' '' ' -
      No unused filesystem kernel modules are enabled' '${a_output[@]}' '' else
      printf '%s\n' '' '-- Audit Result: --' ' ** REVIEW the following **'
      '${a_output2[@]}' [ '${#a_output[@]}' -gt 0 ] && printf '%s\n' '' '--
      Correctly set: --' '${a_output[@]}' '' fi } WARNING : disabling or denylisting
      filesystem modules that are in use on the system may be FATAL. It is extremely
      important to thoroughly review this list.
    remediation: >
      - IF - the module is available in the running kernel: • Unload the filesystem
      kernel module from the kernel • Create a file ending in .conf with install
      filesystem kernel modules /bin/false in the /etc/modprobe.d/ directory •
      Create a file ending in .conf with deny list filesystem kernel modules in the
      /etc/modprobe.d/ directory WARNING : unloading, disabling or denylisting
      filesystem modules that are in use on the system maybe FATAL. It is extremely
      important to thoroughly review the filesystems returned by the audit before
      following the remediation procedure. Example of unloading the gfs2kernel
      module: # modprobe -r gfs2 2>/dev/null # rmmod gfs2 2>/dev/null Example of
      fully disabling the gfs2 kernel module: # printf '%s\n' 'blacklist gfs2'
      'install gfs2 /bin/false' >> /etc/modprobe.d/gfs2.conf Note: • Disabling a
      kernel module by modifying the command above for each unused filesystem kernel
      module • The example gfs2 must be updated with the appropriate module name for
      the command or example script bellow to run correctly. Below is an example
      Script that can be modified to use on various filesystem kernel modules manual
      remediation process: Example Script #!/usr/bin/env bash { a_output2=();
      a_output3=(); l_dl='' # Initialize arrays and clear variables
      l_mod_name='gfs2' # set module name l_mod_type='fs' # set module type
      l_mod_path='$(readlink -f /usr/lib/modules/**/kernel/$l_mod_type || readlink
      -f /lib/modules/**/kernel/$l_mod_type)' f_module_fix() { l_dl='y' # Set to
      ignore duplicate checks a_showconfig=() # Create array with modprobe output
      while IFS= read -r l_showconfig; do a_showconfig+=('$l_showconfig') done <
      <(modprobe --showconfig | grep -P --
      '\b(install|blacklist)\h+''${l_mod_name//-/_}''\b') if lsmod | grep
      '$l_mod_name' &> /dev/null; then # Check if the module is currently loaded
      a_output2+=(' - unloading kernel module: \'$l_mod_name\'') modprobe -r
      '$l_mod_name' 2>/dev/null; rmmod '$l_mod_name' 2>/dev/null fi if ! grep -Pq --
      '\binstall\h+''${l_mod_name//- /_}''\h+(\/usr)?\/bin\/(true|false)\b' <<<
      '${a_showconfig[*]}'; then a_output2+=(' - setting kernel module:
      \'$l_mod_name\' to \'$(readlink -f /bin/false)\'') printf '%s\n' 'install
      $l_mod_name $(readlink -f /bin/false)' >> /etc/modprobe.d/'$l_mod_name'.conf
      fi if ! grep -Pq -- '\bblacklist\h+''${l_mod_name//-/_}''\b' <<<
      '${a_showconfig[*]}'; then a_output2+=(' - denylisting kernel module:
      \'$l_mod_name\'') printf '%s\n' 'blacklist $l_mod_name' >>
      /etc/modprobe.d/'$l_mod_name'.conf fi } for l_mod_base_directory in
      $l_mod_path; do # Check if the module exists on the system if [ -d
      '$l_mod_base_directory/${l_mod_name/-/\/}' ] && [ -n '$(ls -A
      '$l_mod_base_directory/${l_mod_name/-/\/}')' ]; then a_output3+=(' -
      \'$l_mod_base_directory\'') [[ '$l_mod_name' =~ overlay ]] &&
      l_mod_name='${l_mod_name::-2}' [ '$l_dl' != 'y' ] && f_module_fix else echo -e
      ' - kernel module: \'$l_mod_name\' doesn't exist in \'$l_mod_base_directory\''
      fi done [ '${#a_output3[@]}' -gt 0 ] && printf '%s\n' '' ' -- INFO --' ' -
      module: \'$l_mod_name\' exists in:' '${a_output3[@]}' [ '${#a_output2[@]}' -gt
      0 ] && printf '%s\n' '' '${a_output2[@]}' || printf '%s\n' '' ' - No changes
      needed' printf '%s\n' '' ' - remediation of kernel module: \'$l_mod_name\'
      complete' '' } References: 1. https://cve.mitre.org/cgi-
      bin/cvekey.cgi?keyword=filesystem
    references: >
      1. https://cve.mitre.org/cgi-bin/cvekey.cgi?keyword=filesystem
    impact: >
      This list may be quite extensive and covering all edges cases is difficult.
      Therefore, it's crucial to carefully consider the implications and
      dependencies before making any changes to the filesystem kernel module
      configurations.
    compliance_mappings:
      cis:
        - "CIS_SUSE_15_v2_0_1_1_1_1_9"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_suse_15_v2_0_1_1_1_1_9"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: suse.cis.1.tmp_is_a_separate_partition
    title: "Ensure /tmp is a separate partition"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "1.1.2.1.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      The /tmp directory is a world-writable directory used for temporary storage by
      all users and some applications. Note: If an entry for /tmp exists in
      /etc/fstab it will take precedence over entries in a systemd unit file. There
      is an exception to this when a system is diskless and connected to iSCSI,
      entries in /etc/fstab may not take precedence over a systemd unit file.
    rationale: >
      Making /tmp its own file system allows an administrator to set additional
      mount options such as the noexec option on the mount, making /tmp useless for
      an attacker to install executable code. It would also prevent an attacker from
      establishing a hard link to a system setuid program and wait for it to be
      updated. Once the program was updated, the hard link would be broken, and the
      attacker would have his own copy of the program. If the program happened to
      have a security vulnerability, the attacker could continue to exploit the
      known flaw. This can be accomplished by either mounting tmpfs to /tmp, or
      creating a separate partition for /tmp. Impact: By design files saved to /tmp
      should have no expectation of surviving a reboot of the system. tmpfs is ram
      based and all files stored to tmpfs will be lost when the system is rebooted.
      If files need to be persistent through a reboot, they should be saved to
      /var/tmp not /tmp. Since the /tmp directory is intended to be world-writable,
      there is a risk of resource exhaustion if it is not bound to tmpfs or a
      separate partition. Running out of /tmp space is a problem regardless of what
      kind of filesystem lies under it, but in a configuration where /tmp is not a
      separate file system it will essentially have the whole disk available, as the
      default installation only creates a single / partition. On the other hand, a
      RAM-based /tmp (as with tmpfs) will almost certainly be much smaller, which
      can lead to applications filling up the filesystem much more easily. Another
      alternative is to create a dedicated partition for /tmp from a separate volume
      or disk. One of the downsides of a disk-based dedicated partition is that it
      will be slower than tmpfs which is RAM-based.
    audit_procedure: >
      Run the following command and verify the output shows that /tmp is mounted.
      Particular requirements pertaining to mount options are covered in ensuing
      sections. # findmnt -kn /tmp Example output: /tmp tmpfs tmpfs
      rw,nosuid,nodev,noexec Ensure that systemd will mount the /tmp partition at
      boot time. # systemctl is-enabled tmp.mount Example output: generated Verify
      output is not masked or disabled. Note: By default, systemd will output
      generated if there is an entry in /etc/fstab for /tmp. This just means systemd
      will use the entry in /etc/fstab instead of its default unit file
      configuration for /tmp.
    remediation: >
      First ensure that systemd is correctly configured to ensure that /tmp will be
      mounted at boot time. # systemctl unmask tmp.mount For specific configuration
      requirements of the /tmp mount for your environment, modify /etc/fstab.
      Example of using tmpfs with specific mount options: tmpfs /tmp tmpfs
      defaults,rw,nosuid,nodev,noexec,relatime,size=2G 0 0 Note: the size=2G is an
      example of setting a specific size for tmpfs. Example of using a volume or
      disk with specific mount options. The source location of the volume or disk
      will vary depending on your environment: <device> /tmp <fstype>
      defaults,nodev,nosuid,noexec 0 0 References: 1.
      https://www.freedesktop.org/wiki/Software/systemd/APIFileSystems/ 2.
      https://www.freedesktop.org/software/systemd/man/systemd-fstab-generator.html
      3. https://www.kernel.org/doc/Documentation/filesystems/tmpfs.txt 4. NIST SP
      800-53 Rev. 5: CM-7 5. RHEL 8 STIG Vul ID: V-230295 6. RHEL 8 Rule ID:
      SV-30295r627750 Additional Information: /tmp can be configured to use tmpfs.
      tmpfs puts everything into the kernel internal caches and grows and shrinks to
      accommodate the files it contains and is able to swap unneeded pages out to
      swap space. It has maximum size limits which can be adjusted on the fly via
      mount -o remount. Since tmpfs lives completely in the page cache and on swap,
      all tmpfs pages will be shown as 'Shmem' in /proc/meminfo and 'Shared' in
      free. Notice that these counters also include shared memory. The most reliable
      way to get the count is using df and du. tmpfs has three mount options for
      sizing: • size: The limit of allocated bytes for this tmpfs instance. The
      default is half of your physical RAM without swap. If you oversize your tmpfs
      instances the machine will deadlock since the OOM handler will not be able to
      free that memory. • nr_blocks: The same as size, but in blocks of PAGE_SIZE. •
      nr_inodes: The maximum number of inodes for this instance. The default is half
      of the number of your physical RAM pages, or (on a machine with highmem) the
      number of lowmem RAM pages, whichever is the lower. These parameters accept a
      suffix k, m or g and can be changed on remount. The size parameter also
      accepts a suffix % to limit this tmpfs instance to that percentage of your
      physical RAM. The default, when neither size nor nr_blocks is specified, is
      size=50%.
    references: >
      1. https://www.freedesktop.org/wiki/Software/systemd/APIFileSystems/ 2.
      https://www.freedesktop.org/software/systemd/man/systemd-fstab-generator.html
      3. https://www.kernel.org/doc/Documentation/filesystems/tmpfs.txt 4. NIST SP
      800-53 Rev. 5: CM-7 5. RHEL 8 STIG Vul ID: V-230295 6. RHEL 8 Rule ID:
      SV-30295r627750 Additional Information: /tmp can be configured to use tmpfs.
      tmpfs puts everything into the kernel internal caches and grows and shrinks to
      accommodate the files it contains and is able to swap unneeded pages out to
      swap space. It has maximum size limits which can be adjusted on the fly via
      mount -o remount. Since tmpfs lives completely in the page cache and on swap,
      all tmpfs pages will be shown as 'Shmem' in /proc/meminfo and 'Shared' in
      free. Notice that these counters also include shared memory. The most reliable
      way to get the count is using df and du. tmpfs has three mount options for
      sizing: • size: The limit of allocated bytes for this tmpfs instance. The
      default is half of your physical RAM without swap. If you oversize your tmpfs
      instances the machine will deadlock since the OOM handler will not be able to
      free that memory. • nr_blocks: The same as size, but in blocks of PAGE_SIZE. •
      nr_inodes: The maximum number of inodes for this instance. The default is half
      of the number of your physical RAM pages, or (on a machine with highmem) the
      number of lowmem RAM pages, whichever is the lower. These parameters accept a
      suffix k, m or g and can be changed on remount. The size parameter also
      accepts a suffix % to limit this tmpfs instance to that percentage of your
      physical RAM. The default, when neither size nor nr_blocks is specified, is
      size=50%.
    impact: >
      By design files saved to /tmp should have no expectation of surviving a reboot
      of the system. tmpfs is ram based and all files stored to tmpfs will be lost
      when the system is rebooted. If files need to be persistent through a reboot,
      they should be saved to /var/tmp not /tmp. Since the /tmp directory is
      intended to be world-writable, there is a risk of resource exhaustion if it is
      not bound to tmpfs or a separate partition. Running out of /tmp space is a
      problem regardless of what kind of filesystem lies under it, but in a
      configuration where /tmp is not a separate file system it will essentially
      have the whole disk available, as the default installation only creates a
      single / partition. On the other hand, a RAM-based /tmp (as with tmpfs) will
      almost certainly be much smaller, which can lead to applications filling up
      the filesystem much more easily. Another alternative is to create a dedicated
      partition for /tmp from a separate volume or disk. One of the downsides of a
      disk-based dedicated partition is that it will be slower than tmpfs which is
      RAM-based.
    compliance_mappings:
      cis:
        - "CIS_SUSE_15_v2_0_1_1_1_2_1_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_suse_15_v2_0_1_1_1_2_1_1"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: suse.cis.1.nodev_option_set_on_tmp_partition
    title: "Ensure nodev option set on /tmp partition"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "1.1.2.1.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      The nodev mount option specifies that the filesystem cannot contain special
      devices.
    rationale: >
      Since the /tmp filesystem is not intended to support devices, set this option
      to ensure that users cannot create a block or character special devices in
      /tmp.
    audit_procedure: >
      - IF - a separate partition exists for /tmp, verify that the nodev option is
      set. Run the following command to verify that the nodev mount option is set.
      Example: # findmnt -kn /tmp | grep -v nodev Nothing should be returned
    remediation: >
      - IF - a separate partition exists for /tmp. Edit the /etc/fstab file and add
      nodev to the fourth field (mounting options) for the /tmp partition. Example:
      <device> /tmp <fstype> defaults,rw,nosuid,nodev,noexec,relatime 0 0 Run the
      following command to remount /tmp with the configured options: # mount -o
      remount /tmp References: 1. See the fstab(5) manual page for more information.
      2. NIST SP 800-53 Rev. 5: CM-7 3. NIST SP 800-53 Revision 5 :: CM-7 (2) 4.
      RHEL 8 STIG Vul ID: V-230511 5. RHEL 8 STIG Rule ID: SV-230511r854052
    references: >
      1. See the fstab(5) manual page for more information. 2. NIST SP 800-53 Rev.
      5: CM-7 3. NIST SP 800-53 Revision 5 :: CM-7 (2) 4. RHEL 8 STIG Vul ID:
      V-230511 5. RHEL 8 STIG Rule ID: SV-230511r854052
