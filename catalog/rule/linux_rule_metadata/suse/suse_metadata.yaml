  - rule_id: suse.cis.6.audit_log_files_group_owner_is_configured
    title: "Ensure audit log files group owner is configured"
    severity: medium
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "6.3.4.4"
    cis_section: "6"
    profile_applicability: "Level 2"
    description: >
      Audit log files contain information about the system and system activity.
    rationale: >
      Access to audit records can reveal system and configuration data to attackers,
      potentially compromising its confidentiality.
    audit_procedure: >
      Run the following script to verify: • log_group parameter is set to either
      audit or root in /etc/audit/auditd.conf • audit log files are group owned by
      the group root or audit #!/usr/bin/env bash { l_output='' l_output2='' if [ -e
      '/etc/audit/auditd.conf' ]; then l_audit_log_directory='$(dirname '$(awk -F=
      '/^\s*log_file\s*/{print $2}' /etc/audit/auditd.conf | xargs)')'
      l_audit_log_group='$(awk -F= '/^\s*log_group\s*/{print $2}'
      /etc/audit/auditd.conf | xargs)' if grep -Pq -- '^\h*(root|audit)\h*$' <<<
      '$l_audit_log_group'; then l_output='$l_output\n - Log file group correctly
      set to: \'$l_audit_log_group\' in \'/etc/audit/auditd.conf\'' else
      l_output2='$l_output2\n - Log file group is set to: \'$l_audit_log_group\' in
      \'/etc/audit/auditd.conf\'\n (should be set to group: \'root or audit\')\n' fi
      if [ -d '$l_audit_log_directory' ]; then while IFS= read -r -d $'\0' l_file;
      do l_output2='$l_output2\n - File: \'$l_file\' is group owned by group:
      \'$(stat -Lc '%G' '$l_file')\'\n (should be group owned by group: \'root or
      audit\')\n' done < <(find '$l_audit_log_directory' -maxdepth 1 -type f \( ! -
      group root -a ! -group audit \) -print0) else l_output2='$l_output2\n - Log
      file directory not set in \'/etc/audit/auditd.conf\' please set log file
      directory' fi else l_output2='$l_output2\n - File: \'/etc/audit/auditd.conf\'
      not found.\n - ** Verify auditd is installed **' fi if [ -z '$l_output2' ];
      then l_output='$l_output\n - All files in \'$l_audit_log_directory\' are group
      owned by group: \'root or audit\'\n' echo -e '\n- Audit Result:\n ** PASS **\n
      - * Correctly configured * :$l_output' else echo -e '\n- Audit Result:\n **
      FAIL **\n - * Reasons for audit failure * :$l_output2\n' [ -n '$l_output' ] &&
      echo -e ' - * Correctly configured * :\n$l_output\n' fi }
    remediation: >
      Note The following scripts will set the group to either audit or root based on
      the existence of the group audit. If the group audit doesn't exist, or the
      log_group parameter is already set to root, the appropriate group is
      determined to be the group root Run the following script to configure the
      audit log files to be owned by appropriate group: #!/usr/bin/env bash {
      l_group=''; grep -Pq '^audit:' /etc/group && l_group='audit' [ -z '$l_group' ]
      || [ '$(awk -F= '$1~/^\s*log_group\s*$/{print $2}' /etc/audit/auditd.conf |
      xargs)' = root ] && l_group='root' find $(dirname $(awk -F'='
      '/^\s*log_file\s*=\s*/ {print $2}' /etc/audit/auditd.conf | xargs)) -type f \(
      ! -group root -a ! -group audit \) -exec chgrp '$l_group' {} + } Run the
      following script to configure the audit log files to be owned by the audit
      appropriate group: #!/usr/bin/env bash { l_group=''; grep -Pq '^audit:'
      /etc/group && l_group='audit' [ -z '$l_group' ] || [ '$(awk -F=
      '$1~/^\s*log_group\s*$/{print $2}' /etc/audit/auditd.conf | xargs)' = root ]
      && l_group='root' chgrp '$l_group' /var/log/audit/ } Run the following script
      to set the log_group parameter in the audit configuration file to log_group =
      <appropriate_group>: #!/usr/bin/env bash { l_group=''; grep -Pq '^audit:'
      /etc/group && l_group='audit' [ -z '$l_group' ] || [ '$(awk -F=
      '$1~/^\s*log_group\s*$/{print $2}' /etc/audit/auditd.conf | xargs)' = root ]
      && l_group='root' sed -ri
      's/^\s*#?\s*log_group\s*=\s*\S+(\s*#.*)?.*$/log_group = ''$l_group''\1/'
      /etc/audit/auditd.conf } Run the following command to restart the audit daemon
      to reload the configuration file: # systemctl restart auditd
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_SUSE_15_v2_0_1_6_3_4_4"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_suse_15_v2_0_1_6_3_4_4"
