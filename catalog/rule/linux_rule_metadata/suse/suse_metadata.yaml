  - rule_id: suse.cis.2.a_single_time_synchronization_daemon_is_in_use
    title: "Ensure a single time synchronization daemon is in use"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "2.3.1.1"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      System time should be synchronized between all systems in an environment. This
      is typically done by establishing an authoritative time server or set of
      servers and having all systems synchronize their clocks to them. Note: • On
      virtual systems where host based time synchronization is available consult
      your virtualization software documentation and verify that host based
      synchronization is in use and follows local site policy. In this scenario,
      this section should be skipped • Only one time synchronization method should
      be in use on the system. Configuring multiple time synchronization methods
      could lead to unexpected or unreliable results
    rationale: >
      Time synchronization is important to support time sensitive security
      mechanisms and ensures log files have consistent time records across the
      enterprise, which aids in forensic investigations.
    audit_procedure: >
      On physical systems, and virtual systems where host based time synchronization
      is not available. One of the two time synchronization daemons should be
      available; chrony or systemd- timesyncd Run the following script to verify
      that a single time synchronization daemon is available on the system:
      #!/usr/bin/env bash { active_enabled_service=() services=('systemd-
      timesyncd.service' 'chrony.service' 'chronyd.service') # Determine which time
      synchronization daemon is in use for service in '${services[@]}'; do if
      systemctl is-enabled $service 2>/dev/null | grep -q '^enabled' && systemctl
      is-active $service 2>/dev/null | grep -q '^active'; then
      active_enabled_service+=('$service') fi done # Display audit results if [
      ${#active_enabled_service[@]} -eq 1 ]; then printf '%s\n' '' 'Audit Results:'
      ' ** PASS **' ' - A single time synchronization daemon is in use follow the
      recommendation in ${active_enabled_service[0]} subsection ONLY' elif [
      ${#active_enabled_service[@]} -eq 0 ]; then printf '%s\n' '' ' Audit Results:'
      ' ** FAIL **' '- No time synchronization daemon in use or unable to determine
      time synchronization daemon status' else printf '%s\n' '' ' Audit Results:' '
      ** FAIL **' ' - Multiple services are in use: ${active_enabled_service[*]}' fi
      } Note: Follow the guidance in the subsection for the time synchronization
      daemon available on the system and skip the other time synchronization daemon
      subsection.
    remediation: >
      On physical systems, and virtual systems where host based time synchronization
      is not available. Select one of the two time synchronization daemons; chrony
      (1) or systemd- timesyncd (2) and following the remediation procedure for the
      selected daemon. Note: enabling more than one synchronization daemon could
      lead to unexpected or unreliable results: 1. chrony Run the following command
      to install chrony: # zypper install chrony Run the following commands to stop
      and mask the systemd-timesyncd daemon: # systemctl stop systemd-
      timesyncd.service # systemctl mask systemd-timesyncd.service Note: •
      Subsection: Configure chrony should be followed • Subsection: Configure
      systemd-timesyncd should be skipped 2. systemd-timesyncd Run the following
      command to remove the chrony package: # zypper remove chrony Note: •
      Subsection: Configure systemd-timesyncd should be followed • Subsection:
      Configure chrony should be skipped References: 1. NIST SP 800-53 Rev. 5: AU-3,
      AU-12
    references: >
      1. NIST SP 800-53 Rev. 5: AU-3, AU-12
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_SUSE_15_v2_0_1_2_3_1_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_suse_15_v2_0_1_2_3_1_1"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: suse.cis.2.systemd_timesyncd_configured_with_authorized
    title: "Ensure systemd-timesyncd configured with authorized timeserver"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "2.3.2.1"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      NTP= • A space-separated list of NTP server host names or IP addresses. During
      runtime this list is combined with any per-interface NTP servers acquired from
      systemd-networkd.service(8). systemd-timesyncd will contact all configured
      system or per-interface servers in turn, until one responds. When the empty
      string is assigned, the list of NTP servers is reset, and all prior
      assignments will have no effect. This setting defaults to an empty list.
      FallbackNTP= • A space-separated list of NTP server host names or IP addresses
      to be used as the fallback NTP servers. Any per-interface NTP servers obtained
      from systemd- networkd.service(8) take precedence over this setting, as do any
      servers set via NTP= above. This setting is hence only relevant if no other
      NTP server information is known. When the empty string is assigned, the list
      of NTP servers is reset, and all prior assignments will have no effect. If
      this option is not given, a compiled-in list of NTP servers is used.
    rationale: >
      Time synchronization is important to support time sensitive security
      mechanisms and to ensure log files have consistent time records across the
      enterprise to aid in forensic investigations
    audit_procedure: >
      Run the following command to verify the NTP and/or FallbackNTP option is set
      to local site approved authoritative time server(s): #!/usr/bin/env bash {
      a_output=() a_output2=() a_output3=() a_out=() a_out2=()
      a_parlist=('NTP=[^#\n\r]+' 'FallbackNTP=[^#\n\r]+') l_analyze_cmd='$(readlink
      -f /usr/bin/systemd-analyze)'
      l_systemd_config_file='/etc/systemd/timesyncd.conf'
      f_config_file_parameter_chk() { l_used_parameter_setting='' while IFS= read -r
      l_file; do l_file='$(tr -d '# ' <<< '$l_file')'
      l_used_parameter_setting='$(grep -PHs -- '^\h*''$l_parameter_name''\b'
      '$l_file' | tail -n 1)' [ -n '$l_used_parameter_setting' ] && break done <
      <($l_analyze_cmd cat-config '$l_systemd_config_file' | tac | grep -Pio
      '^\h*#\h*\/[^#\n\r\h]+\.conf\b') if [ -n '$l_used_parameter_setting' ]; then
      while IFS=: read -r l_file_name l_file_parameter; do while IFS='=' read -r
      l_file_parameter_name l_file_parameter_value; do if grep -Pq --
      '$l_parameter_value' <<< '$l_file_parameter_value'; then a_out+=(' -
      Parameter: \'${l_file_parameter_name// /}\'' \ ' correctly set to:
      \'${l_file_parameter_value// /}\'' \ ' in the file: \'$l_file_name\'') else
      a_out2+=(' - Parameter: \'${l_file_parameter_name// /}\'' \ ' incorrectly set
      to: \'${l_file_parameter_value// /}\'' \ ' in the file: \'$l_file_name\'' \ '
      Should be set to: \'$l_value_out\'') fi done <<< '$l_file_parameter' done <<<
      '$l_used_parameter_setting' else a_out2+=(' - Parameter: \'$l_parameter_name\'
      is not set in an included file' \ ' *** Note: \'$l_parameter_name\' May be set
      in a file that's ignored by load procedure ***') fi } while IFS='=' read -r
      l_parameter_name l_parameter_value; do # Assess and check parameters
      l_parameter_name='${l_parameter_name// /}';
      l_parameter_value='${l_parameter_value// /}'
      l_value_out='${l_parameter_value//-/ through }';
      l_value_out='${l_value_out//|/ or }' l_value_out='$(tr -d '(){}' <<<
      '$l_value_out')' f_config_file_parameter_chk done < <(printf '%s\n'
      '${a_parlist[@]}') if [ '${#a_out[@]}' -gt 0 ]; then
      a_output+=('${a_out[@]}'); [ '${#a_out2[@]}' -gt 0 ] && a_output3+=(' ** INFO:
      **' '${a_out2[@]}') else a_output2+=('${a_out2[@]}') fi if [
      '${#a_output2[@]}' -le 0 ]; then printf '%s\n' '' '- Audit Result:' ' ** PASS
      **' '${a_output[@]}' '' [ '${#a_output3[@]}' -gt 0 ] && printf '%s\n'
      '${a_output3[@]}' else printf '%s\n' '' '- Audit Result:' ' ** FAIL **' ' -
      Reason(s) for audit failure:' '${a_output2[@]}' [ '${#a_output[@]}' -gt 0 ] &&
      printf '%s\n' '' '- Correctly set:' '${a_output[@]}' '' fi } Note: Please
      ensure the output for NTP and/or FallbackNTP is in accordance with local site
      policy. The timeservers in the example output are provided as an example of
      possible timeservers and they may not follow local site policy.
    remediation: >
      Set NTP and/or FallbackNPT parameters to local site approved authoritative
      time server(s) in /etc/systemd/timesyncd.conf or a file in
      /etc/systemd/timesyncd.conf.d/ ending in .conf in the [Time] section: Example
      file: [Time] NTP=time.nist.gov # Uses the generic name for NIST's time servers
      FallbackNTP=time-a-g.nist.gov time-b-g.nist.gov time-c-g.nist.gov # Space
      separated list of NIST time servers Example script to create systemd drop-in
      configuration file: #!/usr/bin/env bash { a_settings=('NTP=time.nist.gov'
      'FallbackNTP=time-a-g.nist.gov time-b- g.nist.gov time-c-g.nist.gov') [ ! -d
      /etc/systemd/timesyncd.conf.d/ ] && mkdir /etc/systemd/timesyncd.conf.d/ if
      grep -Psq -- '^\h*\[Time\]' /etc/systemd/timesyncd.conf.d/60- timesyncd.conf;
      then printf '%s\n' '' '${a_settings[@]}' >>
      /etc/systemd/timesyncd.conf.d/60-timesyncd.conf else printf '%s\n' '' '[Time]'
      '${a_settings[@]}' >> /etc/systemd/timesyncd.conf.d/60-timesyncd.conf fi }
      Note: If this setting appears in a canonically later file, or later in the
      same file, the setting will be overwritten Run to following command to update
      the parameters in the service: # systemctl reload-or-restart systemd-timesyncd
      Default Value: #NTP= #FallbackNTP= References: 1.
      https://www.freedesktop.org/software/systemd/man/timesyncd.conf.html 2.
      https://tf.nist.gov/tf-cgi/servers.cgi 3. NIST SP 800-53 Rev. 5: AU-7, AU-8
    references: >
      1. https://www.freedesktop.org/software/systemd/man/timesyncd.conf.html 2.
      https://tf.nist.gov/tf-cgi/servers.cgi 3. NIST SP 800-53 Rev. 5: AU-7, AU-8
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_SUSE_15_v2_0_1_2_3_2_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_suse_15_v2_0_1_2_3_2_1"
    metadata_source: generated
    generated_by: generate_tech_rules

