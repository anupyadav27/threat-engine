      the discretion of changing the permissions: o Using the chmod command o
      Setting a different default umask by adding the umask command into a User
      Shell Configuration File, (.bashrc), in their home directory o Manually
      changing the umask for the duration of a login session by running the umask
      command
    impact: >
      
