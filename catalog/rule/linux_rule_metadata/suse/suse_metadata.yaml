    automation_type: automated
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "6.2.2.1.1"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Journald systemd-journal-remote supports the ability to send log events it
      gathers to a remote log host or to receive messages from remote hosts, thus
      enabling centralized log management.
    rationale: >
      Storing log data on a remote host protects log integrity from local attacks.
      If an attacker gains root access on the local system, they could tamper with
      or remove log data that is stored on the local system. Note: This
      recommendation only applies if journald is the chosen method for client side
      logging . Do not apply this recommendation if rsyslog is used.
    audit_procedure: >
      - IF - journald will be used for logging on the system: Run the following
      command to verify systemd-journal-remote is installed. # rpm -q systemd-
      journal-remote Verify the output matches: systemd-journal-remote-<version>
    remediation: >
      Run the following command to install systemd-journal-remote: # zypper install
      systemd-journal-remote References: 1. NIST SP 800-53 Rev. 5: AU-2, AU-7 AU-12
