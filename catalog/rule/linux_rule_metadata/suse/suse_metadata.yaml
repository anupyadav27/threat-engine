  - rule_id: suse.cis.5.only_strong_mac_algorithms_are_used
    title: "Ensure only strong MAC algorithms are used"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "5.2.14"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      This variable limits the types of MAC algorithms that SSH can use during
      communication. Notes: • Some organizations may have stricter requirements for
      approved MACs. Ensure that MACs used are in compliance with site policy • The
      only 'strong' MACs currently FIPS 140-2 approved are hmac-sha2-256 and hmac-
      sha2-512 The Supported MACs are: hmac-md5 hmac-md5-96 hmac-sha1 hmac-sha1-96
      hmac-sha2-256 hmac-sha2-512 umac-64@openssh.com umac-128@openssh.com hmac-
      md5-etm@openssh.com hmac-md5-96-etm@openssh.com hmac-sha1-etm@openssh.com
      hmac-sha1-96-etm@openssh.com hmac-sha2-256-etm@openssh.com hmac-
      sha2-512-etm@openssh.com umac-64-etm@openssh.com umac-128-etm@openssh.com
    rationale: >
      MD5 and 96-bit MAC algorithms are considered weak and have been shown to
      increase exploitability in SSH downgrade attacks. Weak algorithms continue to
      have a great deal of attention as a weak spot that can be exploited with
      expanded computing power. An attacker that breaks the algorithm could take
      advantage of a MiTM position to decrypt the SSH tunnel and capture credentials
      and information
    audit_procedure: >
