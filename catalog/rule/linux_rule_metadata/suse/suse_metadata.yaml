  - rule_id: suse.cis.2.ntp_is_configured
    title: "Ensure ntp is configured"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "2.2.1.4"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      ntp is a daemon which implements the Network Time Protocol (NTP). It is
      designed to synchronize system clocks across a variety of systems and use a
      source that is highly accurate. More information on NTP can be found at
      http://www.ntp.org. ntp can be configured to be a client and/or a server.
      Note: • - IF - ntp or systemd-timesyncd are used, chrony should be removed and
      this section skipped. • This recommendation only applies if chrony is in use
      on the system. • Only one time synchronization method should be in use on the
      system.
    rationale: >
      If ntp is in use on the system proper configuration is vital to ensuring time
      synchronization is working properly.
    audit_procedure: >
      Run the following command and verify output matches: # grep '^restrict'
      /etc/ntp.conf restrict -4 default kod limited nomodify notrap nopeer noquery
      restrict -6 default kod limited nomodify notrap nopeer noquery The -4 in the
      first line is optional and options after default can appear in any order.
      Additional restriction lines may exist Run the following command and verify
      remote server is configured properly: # grep -E '^(server|pool)' /etc/ntp.conf
      server <remote-server> Multiple servers may be configured. Run the following
      command and verify that '-u ntp:ntp' is included in NTPD_OPTIONS : # grep
      '^NTPD_OPTIONS' /etc/sysconfig/ntp NTPD_OPTIONS='-u ntp:ntp' Additional
      options may be present.
    remediation: >
      Add or edit restrict lines in /etc/ntp.conf to match the following: restrict
      -4 default kod limited nomodify notrap nopeer noquery restrict -6 default kod
      limited nomodify notrap nopeer noquery Add or edit server or pool lines to
      /etc/ntp.conf as appropriate: server <remote-server> Add or edit the
      NTPD_OPTIONS in /etc/sysconfig/ntp to include '-u ntp:ntp': NTPD_OPTIONS='-u
      ntp:ntp'
