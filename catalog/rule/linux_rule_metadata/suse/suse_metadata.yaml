    cis_version: "15_v2.0.1"
    cis_control: "6.2.2.1.4"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Journald systemd-journal-remote supports the ability to receive messages from
      remote hosts, thus acting as a log server. Clients should not receive data
      from other hosts. Note: • The same package, systemd-journal-remote, is used
      for both sending logs to remote hosts and receiving incoming logs. • With
      regards to receiving logs, there are two services; systemd-journal-
      remote.socket and systemd-journal-remote.service.
    rationale: >
      If a client is configured to also receive data, thus turning it into a server,
      the client system is acting outside it's operational boundary. Note: This
      recommendation only applies if journald is the chosen method for client side
      logging . Do not apply this recommendation if rsyslog is used.
    audit_procedure: >
      Run the following command to verify systemd-journal-remote.socket and systemd-
      journal-remote.service are not enabled: # systemctl is-enabled systemd-
      journal-remote.socket systemd-journal- remote.service | grep -P -- '^enabled'
      Nothing should be returned Run the following command to verify systemd-
      journal-remote.socket and systemd- journal-remote.service are not active: #
      systemctl is-active systemd-journal-remote.socket systemd-journal-
      remote.service | grep -P -- '^active' Nothing should be returned
