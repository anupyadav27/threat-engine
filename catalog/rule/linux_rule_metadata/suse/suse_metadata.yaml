  - rule_id: suse.cis.3.wireless_interfaces_are_not_available
    title: "Ensure wireless interfaces are not available"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "3.1.2"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Wireless networking is used when wired networks are unavailable.
    rationale: >
      - IF - wireless is not to be used, wireless devices can be disabled to reduce
      the potential attack surface. Impact: Many if not all laptop workstations and
      some desktop workstations will connect via wireless requiring these interfaces
      be enabled.
    audit_procedure: >
      Run the following script to verify no wireless interfaces are active on the
      system: #!/usr/bin/env bash { l_output='' l_output2='' module_chk() { # Check
      how module will be loaded l_loadable='$(modprobe -n -v '$l_mname')' if grep
      -Pq -- '^\h*install \/bin\/(true|false)' <<< '$l_loadable'; then
      l_output='$l_output\n - module: \'$l_mname\' is not loadable: \'$l_loadable\''
      else l_output2='$l_output2\n - module: \'$l_mname\' is loadable:
      \'$l_loadable\'' fi # Check is the module currently loaded if ! lsmod | grep
      '$l_mname' > /dev/null 2>&1; then l_output='$l_output\n - module: \'$l_mname\'
      is not loaded' else l_output2='$l_output2\n - module: \'$l_mname\' is loaded'
      fi # Check if the module is deny listed if modprobe --showconfig | grep -Pq --
      '^\h*blacklist\h+$l_mname\b'; then l_output='$l_output\n - module:
      \'$l_mname\' is deny listed in: \'$(grep -Pl -- '^\h*blacklist\h+$l_mname\b'
      /etc/modprobe.d/*)\'' else l_output2='$l_output2\n - module: \'$l_mname\' is
      not deny listed' fi } if [ -n '$(find /sys/class/net/*/ -type d -name
      wireless)' ]; then l_dname=$(for driverdir in $(find /sys/class/net/*/ -type d
      -name wireless | xargs -0 dirname); do basename '$(readlink -f
      '$driverdir'/device/driver/module)';done | sort -u) for l_mname in $l_dname;
      do module_chk done fi # Report results. If no failures output in l_output2, we
      pass if [ -z '$l_output2' ]; then echo -e '\n- Audit Result:\n ** PASS **' if
      [ -z '$l_output' ]; then echo -e '\n - System has no wireless NICs installed'
      else echo -e '\n$l_output\n' fi else echo -e '\n- Audit Result:\n ** FAIL **\n
      - Reason(s) for audit failure:\n$l_output2\n' [ -n '$l_output' ] && echo -e
      '\n- Correctly set:\n$l_output\n' fi }
    remediation: >
      Run the following script to disable any wireless interfaces: #!/usr/bin/env
      bash { module_fix() { if ! modprobe -n -v '$l_mname' | grep -P -- '^\h*install
      \/bin\/(true|false)'; then echo -e ' - setting module: \'$l_mname\' to be un-
      loadable' echo -e 'install $l_mname /bin/false' >>
      /etc/modprobe.d/'$l_mname'.conf fi if lsmod | grep '$l_mname' > /dev/null
      2>&1; then echo -e ' - unloading module \'$l_mname\'' modprobe -r '$l_mname'
      fi if ! grep -Pq -- '^\h*blacklist\h+$l_mname\b' /etc/modprobe.d/*; then echo
      -e ' - deny listing \'$l_mname\'' echo -e 'blacklist $l_mname' >>
      /etc/modprobe.d/'$l_mname'.conf fi } if [ -n '$(find /sys/class/net/*/ -type d
      -name wireless)' ]; then l_dname=$(for driverdir in $(find /sys/class/net/*/
      -type d -name wireless | xargs -0 dirname); do basename '$(readlink -f
      '$driverdir'/device/driver/module)';done | sort -u) for l_mname in $l_dname;
      do module_fix done fi } References: 1. NIST SP 800-53 Rev. 5: CM-7
    references: >
      1. NIST SP 800-53 Rev. 5: CM-7
    impact: >
      Many if not all laptop workstations and some desktop workstations will connect
      via wireless requiring these interfaces be enabled.
