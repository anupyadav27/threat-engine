  - rule_id: suse.cis.5.ssh_idle_timeout_interval_is_configured
    title: "Ensure SSH Idle Timeout Interval is configured"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "5.2.16"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The two options ClientAliveInterval and ClientAliveCountMax control the
      timeout of ssh sessions. • ClientAliveInterval sets a timeout interval in
      seconds after which if no data has been received from the client, sshd will
      send a message through the encrypted channel to request a response from the
      client. The default is 0, indicating that these messages will not be sent to
      the client. • ClientAliveCountMax sets the number of client alive messages
      which may be sent without sshd receiving any messages back from the client. If
      this threshold is reached while client alive messages are being sent, sshd
      will disconnect the client, terminating the session. The default value is 3. o
      The client alive messages are sent through the encrypted channel o Setting
      ClientAliveCountMax to 0 disables connection termination Example: If the
      ClientAliveInterval is set to 15 seconds and the ClientAliveCountMax is set to
      3, the client ssh session will be terminated after 45 seconds of idle time.
    rationale: >
      Having no timeout value associated with a connection could allow an
      unauthorized user access to another user's ssh session (e.g. user walks away
      from their computer and doesn't lock the screen). Setting a timeout value
      reduces this risk. • The recommended ClientAliveInterval setting is 300
      seconds (5 minutes) • The recommended ClientAliveCountMax setting is 3 • The
      ssh session would send three keep alive messages at 5 minute intervals. If no
      response is received after the third keep alive message, the ssh session would
      be terminated after 15 minutes.
    audit_procedure: >
      Run the following commands and verify ClientAliveInterval is between 1 and
      300: # sshd -T | grep clientaliveinterval clientaliveinterval 300 Run the
      following command and verify ClientAliveCountMax is between 1 and 3: # sshd -T
      | grep clientalivecountmax clientalivecountmax 3
    remediation: >
      Edit the /etc/ssh/sshd_config file to set the parameters according to site
      policy. This should include ClientAliveInterval between 1 and 300 and
      ClientAliveCountMax of 3 or less: ClientAliveInterval 300 ClientAliveCountMax
      3 Default Value: ClientAliveInterval 0 ClientAliveCountMax 3 References: 1.
      https://man.openbsd.org/sshd_config
    references: >
      1. https://man.openbsd.org/sshd_config
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_SUSE_12_v3_2_1_5_2_16"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_suse_12_v3_2_1_5_2_16"
