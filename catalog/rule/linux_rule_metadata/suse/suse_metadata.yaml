      dual stack. It is recommended that IPv6 be enabled and configured in
      accordance with Benchmark recommendations. - IF - dual stack and IPv6 are not
      used in your environment, IPv6 may be disabled to reduce the attack surface of
      the system, and recommendations pertaining to IPv6 can be skipped. Note: It is
      recommended that IPv6 be enabled and configured unless this is against local
      site policy Impact: IETF RFC 4038 recommends that applications are built with
      an assumption of dual stack. When enabled, IPv6 will require additional
      configuration to reduce risk to the system.
