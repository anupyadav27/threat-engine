      creat -S open - S openat -S truncate -S ftruncate -F exit=-EACCES -F
      auid>=1000 -F auid!=4294967295 -k access /etc/audit/rules.d/access.rules:-a
      always,exit -F arch=b32 -S creat -S open - S openat -S truncate -S ftruncate
      -F exit=-EACCES -F auid>=1000 -F auid!=4294967295 -k access
      /etc/audit/rules.d/access.rules:-a always,exit -F arch=b64 -S creat -S open -
      S openat -S truncate -S ftruncate -F exit=-EPERM -F auid>=1000 -F
      auid!=4294967295 -k access /etc/audit/rules.d/access.rules:-a always,exit -F
      arch=b32 -S creat -S open - S openat -S truncate -S ftruncate -F exit=-EPERM
      -F auid>=1000 -F auid!=4294967295 -k access Run the following command and
      verify the rules are in the running auditd config: # auditctl -l | grep access
      Verify output matches: -a always,exit -F arch=b64 -S
      open,truncate,ftruncate,creat,openat -F exit=- EACCES -F auid>=1000 -F
      auid!=-1 -F key=access -a always,exit -F arch=b32 -S
      open,creat,truncate,ftruncate,openat -F exit=- EACCES -F auid>=1000 -F
      auid!=-1 -F key=access -a always,exit -F arch=b64 -S
      open,truncate,ftruncate,creat,openat -F exit=- EPERM -F auid>=1000 -F auid!=-1
      -F key=access -a always,exit -F arch=b32 -S
      open,creat,truncate,ftruncate,openat -F exit=- EPERM -F auid>=1000 -F auid!=-1
      -F key=access
    remediation: >
      For 32 bit systems Edit or create a file in the /etc/audit/rules.d/ directory
      ending in .rules Example: vi /etc/audit/rules.d/access.rules and add the
      following lines: -a always,exit -F arch=b32 -S creat -S open -S openat -S
      truncate -S ftruncate -F exit=-EACCES -F auid>=1000 -F auid!=4294967295 -k
      access -a always,exit -F arch=b32 -S creat -S open -S openat -S truncate -S
