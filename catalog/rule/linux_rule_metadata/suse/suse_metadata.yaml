  - rule_id: suse.cis.1.gpg_keys_are_configured
    title: "Ensure GPG keys are configured"
    severity: high
    category: linux
    tech_type: suse
    automation_type: manual
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "1.2.1.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      The RPM Package Manager implements GPG key signing to verify package integrity
      during and after installation.
    rationale: >
      It is important to ensure that updates are obtained from a valid source to
      protect against spoofing that could lead to the inadvertent installation of
      malware on the system. To this end, verify that GPG keys are configured
      correctly for your system.
    audit_procedure: >
      List installed GPG keys Run the following command to list the currently
      installed keys. These are the active keys used for verification and
      installation of RPMs. Example: # for RPM_PACKAGE in $(rpm -q gpg-pubkey); do
      echo 'RPM: ${RPM_PACKAGE}' RPM_SUMMARY=$(rpm -q --queryformat '%{SUMMARY}'
      '${RPM_PACKAGE}') RPM_PACKAGER=$(rpm -q --queryformat '%{PACKAGER}'
      '${RPM_PACKAGE}') RPM_DATE=$(date +%Y-%m-%d -d '1970-1-1+$((0x$(rpm -q
      --queryformat '%{RELEASE}' '${RPM_PACKAGE}') ))sec') RPM_KEY_ID=$(rpm -q
      --queryformat '%{VERSION}' '${RPM_PACKAGE}') echo 'Packager: ${RPM_PACKAGER}
      Summary: ${RPM_SUMMARY} Creation date: ${RPM_DATE} Key ID: ${RPM_KEY_ID} '
      done RPM: gpg-pubkey-39db7c82-5f68629b Packager: SuSE Package Signing Key
      <build@suse.de> Summary: gpg(SuSE Package Signing Key <build@suse.de>)
      Creation date: 2020-09-21 Key ID: 39db7c82 RPM: gpg-pubkey-3fa1d6ce-63c9481c
      Packager: SUSE Package Signing Key <build@suse.de> Summary: gpg(SUSE Package
      Signing Key <build@suse.de>) Creation date: 2023-01-19 Key ID: 3fa1d6ce The
      format of the package (gpg-pubkey-9db62fb1-59920156) is important to
      understand for verification. Using the above example, it consists of three
      parts: 1. The general prefix name for all imported GPG keys: gpg-pubkey- 2.
      The version, which is the GPG key ID: 9db62fb1 3. The release is the date of
      the key in UNIX timestamp in hexadecimal: 59920156 With both the date and the
      GPG key ID, check the relevant repositories public key page to confirm that
      the keys are indeed correct.
    remediation: >
      Update your package manager GPG keys in accordance with site policy.
      References: 1. NIST SP 800-53 Rev. 5: SI-2 Additional Information: Fedora
      public keys: https://getfedora.org/security/
    references: >
      1. NIST SP 800-53 Rev. 5: SI-2 Additional Information: Fedora public keys:
      https://getfedora.org/security/
    impact: >
      
    compliance_mappings:
