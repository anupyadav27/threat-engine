  - rule_id: suse.cis.5.password_unlock_time_is_configured
    title: "Ensure password unlock time is configured"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "5.3.2.1.2"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      unlock_time=<n> - The access will be re-enabled after seconds after the lock
      out. The value 0 has the same meaning as value never - the access will not be
      re-enabled without resetting the faillock entries by the faillock(8) command.
      Notes: • It is usually undesirable to permanently lock out users as they can
      become easily a target of denial of service attack unless the usernames are
      random and kept secret to potential attackers. • The maximum configurable
      value for unlock_time is 604800
    rationale: >
      Locking out user IDs after n unsuccessful consecutive login attempts mitigates
      brute force password attacks against your systems. Impact: Use of
      unlock_time=0 may allow an attacker to cause denial of service to legitimate
      users. This will also require a systems administrator with elevated privileges
      to unlock the account.
    audit_procedure: >
      Run the following command to verify that the time in seconds before the
      account is unlocked is either 0 (never) or 900 (15 minutes) or more and meets
      local site policy: # grep -Pi --
      '^\h*unlock_time\h*=\h*(0|9[0-9][0-9]|[1-9][0-9]{3,})\b'
      /etc/security/faillock.conf unlock_time = 900
    remediation: >
      Set password unlock time to conform to site policy. unlock_time should be 0
      (never), or 900 seconds or greater. Edit /etc/security/faillock.conf file and
      update or add the following line: unlock_time = 900 Default Value: unlock_time
      = 600 Additional Information: If a user has been locked out because they have
      reached the maximum consecutive failure count defined by deny= in the
      pam_faillock.so module, the user can be unlocked by issuing the command
      faillock --user <USERNAME> --reset. This command sets the failed count to 0,
      effectively unlocking the user.
    references: >
      
    impact: >
      Use of unlock_time=0 may allow an attacker to cause denial of service to
      legitimate users. This will also require a systems administrator with elevated
      privileges to unlock the account.
