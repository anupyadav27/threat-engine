  - rule_id: suse.cis.3.disable_ipv6
    title: "Disable IPv6"
    severity: medium
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "3.1.1"
    cis_section: "3"
    profile_applicability: "Level 2"
    description: >
      Although IPv6 has many advantages over IPv4, not all organizations have IPv6
      or dual stack configurations implemented.
    rationale: >
      If IPv6 or dual stack is not to be used, it is recommended that IPv6 be
      disabled to reduce the attack surface of the system. Impact: - IF - IPv6 is
      disabled through sysctl config, SSH X11forwarding may no longer function as
      expected. We recommend that SSH X11forwarding be disabled, but if required,
      the following will allow for SSH X11forwarding with IPv6 disabled through
      sysctl config: Add the following line the /etc/ssh/sshd_config file:
      AddressFamily inet Run the following command to re-start the openSSH server: #
      systemctl restart sshd
    audit_procedure: >
      Run the following commands to verify that one of the following methods has
      been used to disable IPv6: - IF - IPv6 is disabled through the GRUB2 config:
      Run the following command and verify no lines should be returned. # grep
      '^\s*linux' /boot/grub2/grub.cfg | grep -v ipv6.disable=1 - OR/IF - IPv6 is
      disabled through sysctl settings: Run the following commands: # sysctl
      net.ipv6.conf.all.disable_ipv6 net.ipv6.conf.all.disable_ipv6 = 1 # sysctl
      net.ipv6.conf.default.disable_ipv6 net.ipv6.conf.default.disable_ipv6 = 1 #
      grep -E '^\s*net\.ipv6\.conf\.(all|default)\.disable_ipv6\s*=\s*1\b(\s+#.*)?$'
      /etc/sysctl.conf /etc/sysctl.d/*.conf 2> /dev/null | cut -d: -f2
      net.ipv6.conf.all.disable_ipv6 = 1 net.ipv6.conf.default.disable_ipv6 = 1
    remediation: >
      Use one of the two following methods to disable IPv6 on the system: To disable
      IPv6 through the GRUB2 config: Edit /etc/default/grub and add ipv6.disable=1
      to the GRUB_CMDLINE_LINUX parameters: GRUB_CMDLINE_LINUX='ipv6.disable=1' Run
      the following command to update the grub2 configuration: # grub2-mkconfig –o
      /boot/grub2/grub.cfg - OR - To disable IPv6 through sysctl settings: Set the
      following parameters in /etc/sysctl.conf or a /etc/sysctl.d/* file:
      net.ipv6.conf.all.disable_ipv6 = 1 net.ipv6.conf.default.disable_ipv6 = 1 Run
      the following commands to set the active kernel parameters: # sysctl -w
      net.ipv6.conf.all.disable_ipv6=1 # sysctl -w
      net.ipv6.conf.default.disable_ipv6=1 # sysctl -w net.ipv6.route.flush=1
    references: >
      
    impact: >
      - IF - IPv6 is disabled through sysctl config, SSH X11forwarding may no longer
      function as expected. We recommend that SSH X11forwarding be disabled, but if
      required, the following will allow for SSH X11forwarding with IPv6 disabled
      through sysctl config: Add the following line the /etc/ssh/sshd_config file:
      AddressFamily inet Run the following command to re-start the openSSH server: #
      systemctl restart sshd
    compliance_mappings:
      cis:
        - "CIS_SUSE_12_v3_2_1_3_1_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_suse_12_v3_2_1_3_1_1"
    metadata_source: generated
    generated_by: generate_tech_rules

