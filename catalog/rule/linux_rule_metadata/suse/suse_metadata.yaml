      auditctl -l | grep delete Verify output matches: -a always,exit -F arch=b64 -S
      rename,unlink,unlinkat,renameat -F auid>=1000 - F auid!=-1 -F key=delete -a
      always,exit -F arch=b32 -S unlink,rename,unlinkat,renameat -F auid>=1000 - F
      auid!=-1 -F key=delete
    remediation: >
