      a .rules file: # grep logins /etc/audit/rules.d/*.rules Verify output matches:
      /etc/audit/rules.d/logins.rules:-w /var/log/faillog -p wa -k logins
      /etc/audit/rules.d/logins.rules:-w /var/log/lastlog -p wa -k logins
      /etc/audit/rules.d/logins.rules:-w /var/log/tallylog -p wa -k logins Run the
      following command and verify the rules are in the running auditd config: #
      auditctl -l | grep logins Verify output matches: -w /var/log/faillog -p wa -k
      logins -w /var/log/lastlog -p wa -k logins -w /var/log/tallylog -p wa -k
      logins
