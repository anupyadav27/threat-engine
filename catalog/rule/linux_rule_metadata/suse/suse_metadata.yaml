  - rule_id: suse.cis.1.bootloader_password_is_set
    title: "Ensure bootloader password is set"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "1.4.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Setting the boot loader password will require that anyone rebooting the system
      must enter a password before being able to set command line boot parameters.
    rationale: >
      Requiring a boot password upon execution of the boot loader will prevent an
      unauthorized user from entering boot parameters or changing the boot
      partition. This prevents users from weakening security (e.g. turning off
      auditing at boot time). Impact: If password protection is enabled, only the
      designated superuser can edit a GRUB 2 menu item by pressing e or access the
      GRUB 2 command line by pressing c If GRUB 2 is set up to boot automatically to
      a password-protected menu entry the user has no option to back out of the
      password prompt to select another menu entry. Holding the SHIFT key will not
      display the menu in this case. The user must enter the correct username and
      password. If unable, the configuration files will have to be edited via the
      LiveCD or other means to fix the problem
    audit_procedure: >
      Run the following commands to verify the bootloader password has been set: #
      grep '^\s*set superusers' /boot/grub2/grub.cfg set superusers='<username>' #
      grep '^\s*password' /boot/grub2/grub.cfg password_pbkdf2 <username>
      <encrypted-password>
    remediation: >
      Create an encrypted password with grub2-mkpasswd-pbkdf2: # grub2-mkpasswd-
      pbkdf2 Enter password:<password> Reenter password:<password> PBKDF2 hash of
      your password is <encrypted-password> Add the following into
      /etc/grub.d/40_custom set superusers='<username>' password_pbkdf2 <username>
      <encrypted-password> Run the following command to import the changes into the
      main configuration file: # grub2-mkconfig -o /boot/grub2/grub.cfg References:
      1. NIST SP 800-53 Rev. 5: AC-3 2. NIST SP 800-53A :: AC-3.1 3.
      https://documentation.suse.com/sles/15-SP6/html/SLES-all/cha-grub2.html 4.
      https://www.gnu.org/software/grub/manual/grub/grub.html#Security Additional
      Information: This recommendation is designed around the grub2 bootloader, if
      LILO or another bootloader is in use in your environment enact equivalent
      settings.
    references: >
      1. NIST SP 800-53 Rev. 5: AC-3 2. NIST SP 800-53A :: AC-3.1 3.
      https://documentation.suse.com/sles/15-SP6/html/SLES-all/cha-grub2.html 4.
      https://www.gnu.org/software/grub/manual/grub/grub.html#Security Additional
      Information: This recommendation is designed around the grub2 bootloader, if
      LILO or another bootloader is in use in your environment enact equivalent
      settings.
    impact: >
      If password protection is enabled, only the designated superuser can edit a
      GRUB 2 menu item by pressing e or access the GRUB 2 command line by pressing c
      If GRUB 2 is set up to boot automatically to a password-protected menu entry
      the user has no option to back out of the password prompt to select another
      menu entry. Holding the SHIFT key will not display the menu in this case. The
      user must enter the correct username and password. If unable, the
      configuration files will have to be edited via the LiveCD or other means to
      fix the problem
    compliance_mappings:
      cis:
        - "CIS_SUSE_15_v2_0_1_1_4_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
