    description: >
      The grub configuration file contains information on boot settings and
      passwords for unlocking boot options. The grub2 configuration is usually
      grub.cfg stored in /boot/grub2/. Note: • This recommendation is designed
      around the grub2 bootloader. • - IF - LILO or another bootloader is in use in
      your environment: o Enact equivalent settings o Replace /boot/grub2/grub.cfg
      and /boot/grub2/user.cfg with the appropriate boot configuration files for
      your environment
    rationale: >
