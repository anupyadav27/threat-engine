  - rule_id: suse.cis.6.journald_is_configured_to_send_logs_to_rsyslog
    title: "Ensure journald is configured to send logs to rsyslog"
    severity: high
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "6.2.3.4"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Data from systemd-journald may be stored in volatile memory or persisted
      locally on the server. Utilities exist to accept remote export of systemd-
      journald logs, however, use of the rsyslog service provides a consistent means
      of log collection and export.
    rationale: >
      - IF - rsyslog is the preferred method for capturing logs, all logs of the
      system should be sent to it for further processing. Impact: - IF - Journald is
      the preferred method for capturing logs, this section and Recommendation
      should be skipped and the 'Configure Journald' section followed.
    audit_procedure: >
      - IF - rsyslog is the preferred method for capturing logs Run the following
      command to verify that logs are forwarded to rsyslog by setting
      ForwardToSyslog to yes in the systemd-journald configuration: # systemd-
      analyze cat-config systemd/journald.conf systemd/journald.conf.d/* | grep -E
      '^ForwardToSyslog=yes' ForwardToSyslog=yes
    remediation: >
      - IF - rsyslog is the preferred method for capturing logs: Set the following
      parameter in the [Journal] section in /etc/systemd/journald.conf or a file in
      /etc/systemd/journald.conf.d/ ending in .conf: ForwardToSyslog=yes Example:
      #!/usr/bin/env bash { [ ! -d /etc/systemd/journald.conf.d/ ] && mkdir
      /etc/systemd/journald.conf.d/ if grep -Psq -- '^\h*\[Journal\]'
      /etc/systemd/journald.conf.d/60- journald.conf; then printf '%s\n'
      'ForwardToSyslog=yes' >> /etc/systemd/journald.conf.d/60- journald.conf else
      printf '%s\n' '[Journal]' 'ForwardToSyslog=yes' >>
      /etc/systemd/journald.conf.d/60-journald.conf fi } Note: If this setting
      appears in a canonically later file, or later in the same file, the setting
      will be overwritten Run to following command to update the parameters in the
      service: Restart systemd-journald.service: # systemctl reload-or-restart
      systemd-journald.service References: 1. NIST SP 800-53 Rev. 5: AC-3, AU-2,
      AU-4, AU-12, MP-2 2. SYSTEMD-JOURNALD.SERVICE(8) 3. JOURNALD.CONF(5)
      Additional Information: As noted in the systemd-journald man pages, systemd-
      journald logs may be exported to rsyslog either through the process mentioned
      here, or through a facility like systemd-journald.service. There are trade-
      offs involved in each implementation, where ForwardToSyslog will immediately
      capture all events (and forward to an external log server, if properly
      configured), but may not capture all boot-up activities. Mechanisms such as
      systemd-journald.service, on the other hand, will record bootup events, but
      may delay sending the information to rsyslog, leading to the potential for log
      manipulation prior to export. Be aware of the limitations of all tools
      employed to secure a system.
    references: >
      1. NIST SP 800-53 Rev. 5: AC-3, AU-2, AU-4, AU-12, MP-2 2. SYSTEMD-
      JOURNALD.SERVICE(8) 3. JOURNALD.CONF(5) Additional Information: As noted in
      the systemd-journald man pages, systemd-journald logs may be exported to
      rsyslog either through the process mentioned here, or through a facility like
      systemd-journald.service. There are trade-offs involved in each
      implementation, where ForwardToSyslog will immediately capture all events (and
      forward to an external log server, if properly configured), but may not
      capture all boot-up activities. Mechanisms such as systemd-journald.service,
      on the other hand, will record bootup events, but may delay sending the
      information to rsyslog, leading to the potential for log manipulation prior to
      export. Be aware of the limitations of all tools employed to secure a system.
    impact: >
      - IF - Journald is the preferred method for capturing logs, this section and
      Recommendation should be skipped and the 'Configure Journald' section
      followed.
    compliance_mappings:
      cis:
        - "CIS_SUSE_15_v2_0_1_6_2_3_4"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_suse_15_v2_0_1_6_2_3_4"
