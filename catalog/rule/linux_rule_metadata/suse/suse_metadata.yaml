      surface of the system. If this filesystem type is not needed, disable it.
      Impact: As Snap packages utilize squashfs as a compressed filesystem,
      disabling squashfs will cause Snap packages to fail. Snap application packages
      of software are self-contained and work across a range of Linux distributions.
      This is unlike traditional Linux package management approaches, like APT or
      RPM, which require specifically adapted packages per Linux distribution on an
      application update and delay therefore application deployment from developers
      to their software's end-user. Snaps themselves have no dependency on any
      external store ('App store'), can be obtained from any source and can be
      therefore used for upstream software deployment.
