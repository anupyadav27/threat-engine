      following system calls and tags them with the identifier 'delete': • unlink -
      remove a file • unlinkat - remove a file attribute • rename - rename a file •
      renameat - rename a file attribute Note: • Systems may have been customized to
      change the default UID_MIN. To confirm the UID_MIN for your system, run the
      following command: # awk '/^\s*UID_MIN/{print $2}' /etc/login.defs • - IF -
      your systems' UID_MIN is not 1000, replace audit>=1000 with audit>=<UID_MIN
      for your system> in the Audit and Remediation procedures. • At a minimum,
      configure the audit system to collect file deletion events for all users and
      root. • Reloading the auditd config to set active settings may require a
      system reboot.
    rationale: >
      Monitoring these calls from non-privileged users could provide a system
      administrator with evidence that inappropriate removal of files and file
      attributes associated with protected files is occurring. While this audit
      option will look at all events, system administrators will want to look for
      specific privileged files that are being deleted or altered.
    audit_procedure: >
