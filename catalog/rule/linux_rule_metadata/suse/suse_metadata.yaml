  - rule_id: suse.cis.4.remote_rsyslog_messages_are_only_accepted_on
    title: "Ensure remote rsyslog messages are only accepted on designated log hosts."
    severity: high
    category: linux
    tech_type: suse
    automation_type: manual
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "4.2.1.6"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      By default, rsyslog does not listen for log messages coming in from remote
      systems. The ModLoad tells rsyslog to load the imtcp.so module so it can
      listen over a network via TCP. The InputTCPServerRun option instructs rsyslogd
      to listen on the specified TCP port. Note: The $ModLoad imtcp line can have
      the .so extension added to the end of the module, or use the full path to the
      module.
    rationale: >
      The guidance in the section ensures that remote log hosts are configured to
      only accept rsyslog data from hosts within the specified domain and that those
      systems that are not designed to be log hosts do not accept any remote rsyslog
      messages. This provides protection from spoofed log data and ensures that
      system administrators are reviewing reasonably complete syslog data in a
      central location.
    audit_procedure: >
      Run the following commands and verify the resulting lines are uncommitted on
      designated log hosts and commented or removed on all others: # grep '$ModLoad
      imtcp' /etc/rsyslog.conf /etc/rsyslog.d/*.conf $ModLoad imtcp # grep
      '$InputTCPServerRun' /etc/rsyslog.conf /etc/rsyslog.d/*.conf
      $InputTCPServerRun 514
    remediation: >
      For hosts that are designated as log hosts, edit the /etc/rsyslog.conf file
      and un- comment or add the following lines: $ModLoad imtcp $InputTCPServerRun
      514 For hosts that are not designated as log hosts, edit the /etc/rsyslog.conf
      file and comment or remove the following lines: # $ModLoad imtcp #
      $InputTCPServerRun 514 Run the following command to reload the rsyslogd
      configuration: # systemctl restart rsyslog References: 1. See the rsyslog(8)
      man page for more information.
    references: >
      1. See the rsyslog(8) man page for more information.
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_SUSE_12_v3_2_1_4_2_1_6"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_suse_12_v3_2_1_4_2_1_6"
