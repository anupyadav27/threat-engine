  - rule_id: suse.cis.4.session_initiation_information_is_collected
    title: "Ensure session initiation information is collected"
    severity: medium
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 12_v3.2.1"
    cis_version: "12_v3.2.1"
    cis_control: "4.1.8"
    cis_section: "4"
    profile_applicability: "Level 2"
    description: >
      Monitor session initiation events. The parameters in this section track
      changes to the files associated with session events. The file /var/run/utmp
      tracks all currently logged in users. All audit records will be tagged with
      the identifier 'session.' The /var/log/wtmp file tracks logins, logouts,
      shutdown, and reboot events. The file /var/log/btmp keeps track of failed
      login attempts and can be read by entering the command /usr/bin/last -f
      /var/log/btmp . All audit records will be tagged with the identifier 'logins.'
      Note: • The last command can be used to read /var/log/wtmp (last with no
      parameters) and /var/run/utmp (last -f /var/run/utmp) • Reloading the auditd
      config to set active settings requires the auditd service to be restarted, and
      may require a system reboot.
    rationale: >
      Monitoring these files for changes could alert a system administrator to
      logins occurring at unusual hours, which could indicate intruder activity
      (i.e. a user logging in at a time when they do not normally log in).
    audit_procedure: >
      Run the following commands: Run the following command and verify rules are in
      a .rules file: # grep -E '(session|logins)' /etc/audit/rules.d/*.rules Verify
      output includes: /etc/audit/rules.d/session.rules:-w /var/run/utmp -p wa -k
      session /etc/audit/rules.d/session.rules:-w /var/log/wtmp -p wa -k logins
      /etc/audit/rules.d/session.rules:-w /var/log/btmp -p wa -k logins Run the
      following command and verify the rules are in the running auditd config: #
      auditctl -l | grep -E '(session|logins)' Verify output includes: -w
      /var/run/utmp -p wa -k session -w /var/log/wtmp -p wa -k logins -w
      /var/log/btmp -p wa -k logins
    remediation: >
      Edit or create a file in the /etc/audit/rules.d/ directory ending in .rules
      Example: vi /etc/audit/rules.d/session.rules and add the following lines: -w
      /var/run/utmp -p wa -k session -w /var/log/wtmp -p wa -k logins -w
      /var/log/btmp -p wa -k logins
