  - rule_id: suse.cis.6.audit_configuration_is_immutable
    title: "Ensure the audit configuration is immutable"
    severity: medium
    category: linux
    tech_type: suse
    automation_type: automated
    cis_benchmark: "CIS_SUSE 15_v2.0.1"
    cis_version: "15_v2.0.1"
    cis_control: "6.3.3.20"
    cis_section: "6"
    profile_applicability: "Level 2"
    description: >
      Set system audit so that audit rules cannot be modified with auditctl .
      Setting the flag '-e 2' forces audit to be put in immutable mode. Audit
      changes can only be made on system reboot. Note: This setting will require the
      system to be rebooted to update the active auditd configuration settings.
    rationale: >
      In immutable mode, unauthorized users cannot execute changes to the audit
      system to potentially hide malicious activity and then put the audit rules
      back. Users would most likely notice a system reboot and that could alert
      administrators of an attempt to make unauthorized audit changes.
    audit_procedure: >
      Run the following command and verify output matches: # grep -Ph --
      '^\h*-e\h+2\b' /etc/audit/rules.d/*.rules | tail -1 -e 2
    remediation: >
      Edit or create the file /etc/audit/rules.d/99-finalize.rules and add the line
      -e 2 at the end of the file: Example: # printf '\n%s\n' '-e 2' >>
      /etc/audit/rules.d/99-finalize.rules Load audit rules Merge and load the rules
      into active configuration: # augenrules --load Check if reboot is required. #
      if [[ $(auditctl -s | grep 'enabled') =~ '2' ]]; then printf 'Reboot required
      to load rules\n'; fi References: 1. NIST SP 800-53 Rev. 5: AC-3, AU-3,
      AU-3(1), MP-2
    references: >
      1. NIST SP 800-53 Rev. 5: AC-3, AU-3, AU-3(1), MP-2
