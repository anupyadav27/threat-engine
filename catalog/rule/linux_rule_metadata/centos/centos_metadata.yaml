  - rule_id: centos.cis.1.separate_partition_exists_for_tmp
    title: "Ensure separate partition exists for /tmp"
    severity: medium
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v2.0.0"
    cis_version: "7_v2.0.0"
    cis_control: "1.1.2"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      The /tmp directory is a world-writable directory used for temporary storage by
      all users and some applications.
    rationale: >
      Since the /tmp directory is intended to be world-writable, there is a risk of
      resource exhaustion if it is not bound to a separate partition. In addition,
      making /tmp its own file system allows an administrator to set the noexec
      option on the mount, making /tmp useless for an attacker to install executable
      code. It would also prevent an attacker from establishing a hardlink to a
      system setuid program and wait for it to be updated. Once the program was
      updated, the hardlink would be broken and the attacker would have his own copy
      of the program. If the program happened to have a security vulnerability, the
      attacker could continue to exploit the known flaw.
    audit_procedure: >
      Run the following command and verify output shows /tmp is mounted: # mount |
      grep /tmp tmpfs on /tmp type tmpfs (rw,nosuid,nodev,noexec,relatime)
    remediation: >
      For new installations, during installation create a custom partition setup and
      specify a separate partition for /tmp. For systems that were previously
      installed, create a new partition for /tmp if not using tmpfs. Run the
      following commands to enable systemd /tmp mounting: systemctl unmask tmp.mount
      systemctl enable tmp.mount 27 | P a g e Edit /etc/systemd/system/local-
      fs.target.wants/tmp.mount to configure the /tmp mount: [Mount] What=tmpfs
      Where=/tmp Type=tmpfs Options=mode=1777,strictatime,noexec,nodev,nosuid
      Impact: Resizing filesystems is a common activity in cloud-hosted servers.
      Separate filesystem partitions may prevent successful resizing, or may require
      the installation of additional tools solely for the purpose of resizing
      operations. The use of these additional tools may introduce their own security
      considerations. References: 1. AJ Lewis, 'LVM HOWTO',
      http://tldp.org/HOWTO/LVM-HOWTO/ 28 | P a g e
    references: >
      1. AJ Lewis, 'LVM HOWTO', http://tldp.org/HOWTO/LVM-HOWTO/ 28 | P a g e
    impact: >
      Resizing filesystems is a common activity in cloud-hosted servers. Separate
      filesystem partitions may prevent successful resizing, or may require the
      installation of additional tools solely for the purpose of resizing
      operations. The use of these additional tools may introduce their own security
      considerations.
    compliance_mappings:
      cis:
        - "CIS_CENTOS_7_v2_0_0_1_1_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_centos_7_v2_0_0_1_1_2"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: centos.cis.1.nodev_option_set_on_tmp_partition
    title: "Ensure nodev option set on /tmp partition"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v2.0.0"
    cis_version: "7_v2.0.0"
    cis_control: "1.1.3"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      The nodev mount option specifies that the filesystem cannot contain special
      devices.
    rationale: >
      Since the /tmp filesystem is not intended to support devices, set this option
      to ensure that users cannot attempt to create block or character special
      devices in /tmp.
    audit_procedure: >
      If a /tmp partition exists run the following command and verify that the nodev
      option is set on /tmp: # mount | grep /tmp tmpfs on /tmp type tmpfs
      (rw,nosuid,nodev,noexec,relatime)
    remediation: >
      Edit /etc/systemd/system/local-fs.target.wants/tmp.mount to add nodev to the
      /tmp mount options: [Mount] Options=mode=1777,strictatime,noexec,nodev,nosuid
      Run the following command to remount /tmp: # mount -o remount,nodev /tmp
      Notes: systemd includes the tmp.mount service which should be used instead of
      configuring /etc/fstab. Mounting options are configured in the Options setting
      in /etc/systemd/system/tmp.mount. 29 | P a g e
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CENTOS_7_v2_0_0_1_1_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_centos_7_v2_0_0_1_1_3"
    metadata_source: generated
    generated_by: generate_tech_rules

