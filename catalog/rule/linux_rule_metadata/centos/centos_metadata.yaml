    cis_section: "9"
    profile_applicability: "Level 1"
    description: >
      Although the useradd program will not let you create a duplicate User ID
      (UID), it is possible for an administrator to manually edit the /etc/passwd
      file and change the UID field.
    rationale: >
      Users must be assigned unique UIDs for accountability and to ensure
      appropriate access protections.
    audit_procedure: >
      This script checks to make sure all UIDs in the /etc/passwd file are unique.
      #!/bin/bash echo 'The Output for the Audit of Control 9.2.15 - Check for
      Duplicate UIDs is' /bin/cat /etc/passwd | /bin/cut -f3 -d':' | /bin/sort -n |
      /usr/bin/uniq -c |\ while read x ; do [ -z '${x}' ] && break set - $x if [ $1
      -gt 1 ]; then users=`/bin/gawk -F: '($3 == n) { print $1 }' n=$2 \ /etc/passwd
      | /usr/bin/xargs` echo 'Duplicate UID ($2): ${users}' fi done
    remediation: >
      165 | P a g e Based on the results of the script, establish unique UIDs and
      review all files owned by the shared UID to determine which UID they are
      supposed to belong to.
