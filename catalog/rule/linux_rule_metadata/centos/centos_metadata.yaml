  - rule_id: centos.cis.5.record_events_that_modify_the_system_s_network
    title: "Record Events That Modify the System's Network Environment"
    severity: medium
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v1.1.0"
    cis_version: "7_v1.1.0"
    cis_control: "5.2.6"
    cis_section: "5"
    profile_applicability: "Level 2"
    description: >
      Record changes to network environment files or system calls. The below
      parameters monitor the sethostname (set the system's host name) or
      setdomainname (set the system's domainname) system calls, and write an audit
      event on system call exit. The other parameters monitor the /etc/issue and
      /etc/issue.net files (messages displayed pre- login), /etc/hosts (file
      containing host names and associated IP addresses) and /etc/sysconfig/network
      (directory containing network interface scripts and configurations) files.
    rationale: >
      Monitoring sethostname and setdomainname will identify potential unauthorized
      changes to host and domainname of a system. The changing of these names could
      potentially break security parameters that are set based on those names. The
      /etc/hosts file is monitored for changes in the file that can indicate an
      unauthorized intruder is trying to change machine associations with IP
      addresses and trick users and processes into connecting to unintended
      machines. Monitoring /etc/issue and /etc/issue.net is important, as intruders
      could put disinformation into those files and trick users into providing
      information to the intruder. Monitoring /etc/sysconfig/network is important as
      it can show if network interfaces or scripts are being modified in a way that
      can lead to the machine becoming unavailable or compromised. All audit records
      will be tagged with the identifier 'system-locale.'
    audit_procedure: >
      95 | P a g e On a 64 bit system, perform the following command and ensure the
      output is as shown to determine if events that modify the system's environment
      are recorded. Note: '-a always,exit' may be specified as '-a exit,always'. #
      grep system-locale /etc/audit/audit.rules -a always,exit -F arch=b64 -S
      sethostname -S setdomainname -k system-locale -a always,exit -F arch=b32 -S
      sethostname -S setdomainname -k system-locale -w /etc/issue -p wa -k system-
      locale -w /etc/issue.net -p wa -k system-locale -w /etc/hosts -p wa -k system-
      locale -w /etc/sysconfig/network -p wa -k system-locale For 32 bit systems,
      perform the following command and ensure the output is as shown to determine
      if events that modify the system's environment are recorded. Note: '-a
      always,exit' may be specified as '-a exit,always'. # grep system-locale
      /etc/audit/audit.rules -a always,exit -F arch=b32 -S sethostname -S
      setdomainname -k system-locale -w /etc/issue -p wa -k system-locale -w
      /etc/issue.net -p wa -k system-locale -w /etc/hosts -p wa -k system-locale -w
      /etc/sysconfig/network -p wa -k system-locale
    remediation: >
      For 64 bit systems, add the following lines to the /etc/audit/audit.rules
      file. -a always,exit -F arch=b64 -S sethostname -S setdomainname -k system-
      locale -a always,exit -F arch=b32 -S sethostname -S setdomainname -k system-
      locale -w /etc/issue -p wa -k system-locale -w /etc/issue.net -p wa -k system-
      locale -w /etc/hosts -p wa -k system-locale -w /etc/sysconfig/network -p wa -k
      system-locale # Execute the following command to restart auditd # pkill -P
      1-HUP auditd For 32 bit systems, add the following lines to the
      /etc/audit/audit.rules file. -a always,exit -F arch=b32 -S sethostname -S
      setdomainname -k system-locale -w /etc/issue -p wa -k system-locale -w
      /etc/issue.net -p wa -k system-locale -w /etc/hosts -p wa -k system-locale -w
      /etc/sysconfig/network -p wa -k system-locale # Execute the following command
      to restart auditd # pkill -P 1-HUP auditd
