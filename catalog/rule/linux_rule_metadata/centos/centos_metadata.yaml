  - rule_id: centos.cis.6.restrict_access_to_the_su_command
    title: "Restrict Access to the su Command"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v1.1.0"
    cis_version: "7_v1.1.0"
    cis_control: "6.5"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      The su command allows a user to run a command or shell as another user. The
      program has been superseded by sudo, which allows for more granular control
      over privileged access. Normally, the su command can be executed by any user.
      By uncommenting the pam_wheel.so statement in /etc/pam.d/su, the su command
      will only allow users in the wheel group to execute su.
    rationale: >
      Restricting the use of su, and using sudo in its place, provides system
      administrators better control of the escalation of user privileges to execute
      privileged commands. The sudo utility also provides a better logging and audit
      mechanism, as it can log each command executed via sudo, whereas su can only
      record that a user executed the su program.
    audit_procedure: >
      # grep pam_wheel.so /etc/pam.d/su auth required pam_wheel.so use_uid # grep
      wheel /etc/group wheel:x:10:root, <user list>
    remediation: >
      Set the pam_wheel.so parameters as follows in /etc/pam.d/su: auth required
      pam_wheel.so use_uid Set the proper list of users to be included in the wheel
      group in /etc/groups. 135 | P a g e 7 User Accounts and Environment This
      section provides guidance on setting up secure defaults for system and user
      accounts and their environment. Guidance for monitoring these settings and
      others that may change over time is provided in Section 10 System Maintenance.
      7.1 Set Shadow Password Suite Parameters (/etc/login.defs) While a majority of
      the password control parameters have been moved to PAM, some parameters are
      still available through the shadow password suite. Any changes made to
      /etc/login.defs will only be applied if the usermod command is used. If
      userIDs are added a different way, use the chage command to effect changes to
      individual userIDs.
    references: >
      
    impact: >
      
