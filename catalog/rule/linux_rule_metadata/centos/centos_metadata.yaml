  - rule_id: centos.cis.1.core_dumps_are_restricted
    title: "Ensure core dumps are restricted"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v2.0.0"
    cis_version: "7_v2.0.0"
    cis_control: "1.5.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      A core dump is the memory of an executable program. It is generally used to
      determine why a program aborted. It can also be used to glean confidential
      information from a core file. The system provides the ability to set a soft
      limit for core dumps, but this can be overridden by the user.
    rationale: >
      Setting a hard limit on core dumps prevents users from overriding the soft
      variable. If core dumps are required, consider setting limits for user groups
      (see limits.conf(5)). In addition, setting the fs.suid_dumpable variable to 0
      will prevent setuid programs from dumping core.
    audit_procedure: >
      Run the following commands and verify output matches: # grep 'hard core'
      /etc/security/limits.conf /etc/security/limits.d/* * hard core 0 # sysctl
      fs.suid_dumpable fs.suid_dumpable = 0
    remediation: >
      Add the following line to the /etc/security/limits.conf file or a
      /etc/security/limits.d/* file: * hard core 0 Set the following parameter in
      the /etc/sysctl.conf file: fs.suid_dumpable = 0 Run the following command to
      set the active kernel parameter: 60 | P a g e # sysctl -w fs.suid-dumpable=1
      61 | P a g e
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
