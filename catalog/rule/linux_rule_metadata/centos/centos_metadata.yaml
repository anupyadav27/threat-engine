    profile_applicability: "Level 2"
    description: >
      Monitor login and logout events. The parameters below track changes to files
      associated with login/logout events. The file /var/log/lastlog maintain
      records of the last time a user successfully logged in. The /var/run/failock
      directory maintains records of login failures via the pam_faillock module.
