  - rule_id: centos.cis.3.packet_redirect_sending_is_disabled
    title: "Ensure packet redirect sending is disabled"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v2.0.0"
