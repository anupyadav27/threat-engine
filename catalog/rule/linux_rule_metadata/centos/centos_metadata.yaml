  - rule_id: centos.cis.7.set_default_umask_for_users
    title: "Set Default umask for Users"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v1.1.0"
    cis_version: "7_v1.1.0"
    cis_control: "7.4"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      The default umask determines the permissions of files created by users. The
      user creating the file has the discretion of making their files and
      directories readable by others via the chmod command. Users who wish to allow
      their files and directories to be readable by others by default may choose a
      different default umask by inserting the umask command into the standard shell
      configuration files (.profile, .cshrc, etc.) in their home directories.
    rationale: >
      Setting a very secure default value for umask ensures that users make a
      conscious choice about their file permissions. A default umask setting of 077
      causes files and directories created by users to not be readable by any other
      user on the system. A umask of 027 would make files and directories readable
      by users in the same Unix group, while a umask of 022 would make files
      readable by every user on the system. Note: The directives in this section
      apply to bash and shell. If other shells are supported on the system, it is
      recommended that their configuration files also are checked.
    audit_procedure: >
      # grep '^umask 077' /etc/bashrc umask 077 # grep '^umask 077' /etc/profile.d/*
      umask 077
    remediation: >
      Edit the /etc/bashrc and /etc/profile.d/cis.sh files (and the appropriate
      files for any other shell supported on your system) and add the following the
      UMASK parameter as shown: umask 77
    references: >
      
