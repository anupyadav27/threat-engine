      000: # stat /etc/shadow Access: (0000/----------) Uid: ( 0/ root) Gid: ( 0/
      root)
    remediation: >
      Run the following commands to set permissions on /etc/shadow: # chown
      root:root /etc/shadow # chmod 000 /etc/shadow 265 | P a g e
