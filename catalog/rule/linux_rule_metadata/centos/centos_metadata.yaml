  - rule_id: centos.cis.9.for_duplicate_user_names
    title: "Check for Duplicate User Names"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v1.1.0"
    cis_version: "7_v1.1.0"
    cis_control: "9.2.17"
    cis_section: "9"
    profile_applicability: "Level 1"
    description: >
      Although the useradd program will not let you create a duplicate user name, it
      is possible for an administrator to manually edit the /etc/passwd file and
      change the user name.
    rationale: >
      If a user is assigned a duplicate user name, it will create and have access to
      files with the first UID for that username in /etc/passwd. For example, if
      'test4' has a UID of 1000 and a subsequent 'test4' entry has a UID of 2000,
      logging in as 'test4' will use UID 1000. Effectively, the UID is shared, which
      is a security problem.
    audit_procedure: >
      This script checks to make sure all user names in the /etc/passwd file are
      unique. #!/bin/bash echo 'The Output for the Audit of Control 9.2.18 - Check
      for Duplicate User Names is' cat /etc/passwd | cut -f1 -d':' | /bin/sort -n |
      /usr/bin/uniq -c |\ while read x ; do [ -z '${x}' ] && break set - $x if [ $1
      -gt 1 ]; then uids=`/bin/gawk -F: '($1 == n) { print $3 }' n=$2 \ /etc/passwd
      | xargs` echo 'Duplicate User Name ($2): ${uids}' fi done
    remediation: >
      Based on the results of the script, establish unique user names for the users.
      File ownerships will automatically reflect the change as long as the users
      have unique UIDs.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CENTOS_7_v1_1_0_9_2_17"
      nist_800_53: []
