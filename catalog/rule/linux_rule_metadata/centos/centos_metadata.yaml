  - rule_id: centos.cis.1.set_permissions_on_etc_grub_conf
    title: "Set Permissions on /etc/grub.conf"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 6_v1.1.0"
    cis_version: "6_v1.1.0"
    cis_control: "1.5.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Set permission on the /etc/grub.conf file to read and write for root only.
    rationale: >
      Setting the permissions to read and write for root only prevents non-root
      users from seeing the boot parameters or changing them. Non-root users who
      read the boot parameters may be able to identify weaknesses in security upon
      boot and be able to exploit them. 36 | P a g e
    audit_procedure: >
      Perform the following to determine if the /etc/grub.conf file permissions are
      correct: # stat -L -c '%a' /etc/grub.conf | egrep '.00' If the above command
      emits no output then the system is not configured as recommended.
    remediation: >
      # chmod og-rwx /etc/grub.conf
    references: >
      
    impact: >
      
