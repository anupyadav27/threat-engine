  - rule_id: centos.cis.2.tftp_server_is_not_enabled
    title: "Ensure tftp server is not enabled"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v2.0.0"
    cis_version: "7_v2.0.0"
    cis_control: "2.1.9"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Trivial File Transfer Protocol (TFTP) is a simple file transfer protocol,
      typically used to automatically transfer configuration or boot machines from a
      boot server. The packages tftp and atftp are both used to define and support a
      TFTP server.
    rationale: >
