  - rule_id: centos.cis.5.collect_kernel_module_loading_and_unloading
    title: "Collect Kernel Module Loading and Unloading"
    severity: medium
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v1.1.0"
    cis_version: "7_v1.1.0"
    cis_control: "5.2.17"
    cis_section: "5"
    profile_applicability: "Level 2"
    description: >
      Monitor the loading and unloading of kernel modules. The programs insmod
      (install a kernel module), rmmod (remove a kernel module), and modprobe (a
      more sophisticated program to load and unload modules, as well as some other
      features) control loading and unloading of modules. The init_module (load a
      module) and delete_module (delete a module) system calls control loading and
      unloading of modules. Any execution of the loading and unloading module
      programs and system calls will trigger an audit record with an identifier of
      'modules'.
    rationale: >
      107 | P a g e Monitoring the use of insmod, rmmod and modprobe could provide
      system administrators with evidence that an unauthorized user loaded or
      unloaded a kernel module, possibly compromising the security of the system.
      Monitoring of the init_module and delete_module system calls would reflect an
      unauthorized user attempting to use a different program to load and unload
      modules.
    audit_procedure: >
      Perform the following to determine if kernel module loading and unloading is
      recorded. Note: '-a always,exit' may be specified as '-a exit,always'. # grep
      modules /etc/audit/audit.rules -w /sbin/insmod -p x -k modules -w /sbin/rmmod
      -p x -k modules -w /sbin/modprobe -p x -k modules For 32 bit systems -a
      always,exit -F arch=b32 -S init_module -S delete_module -k modules For 64 bit
      systems -a always,exit -F arch=b64 -S init_module -S delete_module -k modules
    remediation: >
      Add the following lines to the /etc/audit/audit.rules file. -w /sbin/insmod -p
      x -k modules -w /sbin/rmmod -p x -k modules -w /sbin/modprobe -p x -k modules
      For 32 bit systems, add -a always,exit -F arch=b32 -S init_module -S
      delete_module -k modules For 64 bit systems, add -a always,exit -F arch=b64 -S
      init_module -S delete_module -k modules
    references: >
      
