  - rule_id: centos.cis.6.set_user_group_owner_and_permission_on_etc
    title: "Set User/Group Owner and Permission on /etc/anacrontab"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v1.1.0"
    cis_version: "7_v1.1.0"
    cis_control: "6.1.3"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      The /etc/anacrontab file is used by anacron to control its own jobs. The
      commands in this item make sure that root is the user and group owner of the
      file and is the only user that can read and write the file.
    rationale: >
      This file contains information on what system jobs are run by anacron. Write
      access to these files could provide unprivileged users with the ability to
      elevate their privileges. Read 111 | P a g e access to these files could
      provide users with the ability to gain insight on system jobs that run on the
      system and could provide them a way to gain unauthorized privileged access.
    audit_procedure: >
      Perform the following to determine if the /etc/anacrontab file has the correct
      permissions. # stat -L -c '%a %u %g' /etc/anacrontab | egrep '.00 0 0' If the
      above command emits no output then the system is not configured as
      recommended.
    remediation: >
      # chown root:root /etc/anacrontab # chmod og-rwx /etc/anacrontab
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CENTOS_7_v1_1_0_6_1_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_centos_7_v1_1_0_6_1_3"
    metadata_source: generated
    generated_by: generate_tech_rules

