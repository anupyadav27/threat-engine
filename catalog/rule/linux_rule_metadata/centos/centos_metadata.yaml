  - rule_id: centos.cis.5.system_accounts_are_non_login
    title: "Ensure system accounts are non-login"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v2.0.0"
    cis_version: "7_v2.0.0"
    cis_control: "5.4.2"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      There are a number of accounts provided with CentOS 7 that are used to manage
      applications and are not intended to provide an interactive shell.
    rationale: >
      It is important to make sure that accounts that are not being used by regular
      users are prevented from being used to provide an interactive shell. By
      default CentOS 7 sets the password field for these accounts to an invalid
      string, but it is also recommended that the shell field in the password file
      be set to /sbin/nologin. This prevents the account from potentially being used
      to run any commands.
    audit_procedure: >
      Run the following script and verify no results are returned: egrep -v '^\+'
      /etc/passwd | awk -F: '($1!='root' && $1!='sync' && $1!='shutdown' &&
      $1!='halt' && $3<1000 && $7!='/sbin/nologin' && $7!='/bin/false') {print}'
    remediation: >
      Set the shell for any accounts returned by the audit script to /sbin/nologin:
      # usermod -s /sbin/nologin <user> The following script will automatically set
      all user shells required to /sbin/nologin and lock the sync, shutdown, and
      halt users: #!/bin/bash for user in `awk -F: '($3 < 1000) {print $1 }'
      /etc/passwd`; do if [ $user != 'root' ]; then usermod -L $user if [ $user !=
      'sync' ] && [ $user != 'shutdown' ] && [ $user != 'halt' ]; then usermod -s
      /sbin/nologin $user fi fi done 255 | P a g e
