  - rule_id: centos.cis.6.set_user_group_owner_and_permission_on_etc_cron
    title: "Set User/Group Owner and Permission on /etc/cron.hourly"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v1.1.0"
    cis_version: "7_v1.1.0"
    cis_control: "6.1.5"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      This directory contains system cron jobs that need to run on an hourly basis.
      The files in this directory cannot be manipulated by the crontab command, but
      are instead edited by system administrators using a text editor. The commands
      below restrict read/write and search access to user and group root, preventing
      regular users from accessing this directory.
    rationale: >
      Granting write access to this directory for non-privileged users could provide
      them the means for gaining unauthorized elevated privileges. Granting read
      access to this directory could give an unprivileged user insight in how to
      gain elevated privileges or circumvent auditing controls.
    audit_procedure: >
      Perform the following to determine if the /etc/cron.hourly file has the
      correct permissions. # stat -L -c '%a %u %g' /etc/cron.hourly | egrep '.00 0
      0' If the above command emits no output then the system is not configured as
      recommended.
    remediation: >
      # chown root:root /etc/cron.hourly # chmod og-rwx /etc/cron.hourly
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
