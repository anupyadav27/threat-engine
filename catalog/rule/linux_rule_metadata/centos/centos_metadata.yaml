  - rule_id: centos.cis.3.set_daemon_umask
    title: "Set Daemon umask"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v1.1.0"
    cis_version: "7_v1.1.0"
    cis_control: "3.1"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Set the default umask for all processes started at boot time. The settings in
      umask selectively turn off default permission when a file is created by a
      daemon process.
    rationale: >
      Setting the umask to 027 will make sure that files created by daemons will not
      be readable, writable or executable by any other than the group and owner of
      the daemon process and will not be writable by the group of the daemon
      process. The daemon process can manually override these settings if these
      files need additional permission.
    audit_procedure: >
      Perform the following to determine if the daemon umask is set. # grep umask
      /etc/sysconfig/init umask 027 52 | P a g e
    remediation: >
      Add the following line to the /etc/sysconfig/init file. umask 027
    references: >
      
