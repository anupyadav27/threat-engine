  - rule_id: centos.cis.5.collect_discretionary_access_control_permission
    title: "Collect Discretionary Access Control Permission Modification Events"
    severity: medium
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v1.1.0"
    cis_version: "7_v1.1.0"
    cis_control: "5.2.10"
    cis_section: "5"
    profile_applicability: "Level 2"
    description: >
      Monitor changes to file permissions, attributes, ownership and group. The
      parameters in this section track changes for system calls that affect file
      permissions and attributes. The chmod, fchmod and fchmodat system calls affect
      the permissions associated with a file. The chown, fchown, fchownat and lchown
      system calls affect owner and group attributes on a file. The setxattr,
      lsetxattr, fsetxattr (set extended file attributes) and removexattr,
      lremovexattr, fremovexattr (remove extended file attributes) control extended
      file attributes. In all cases, an audit record will only be written for non-
      system userids (auid >= 1000) and will ignore Daemon events (auid =
      4294967295). All audit records will be tagged with the identifier 'perm_mod.'
    rationale: >
      Monitoring for changes in file attributes could alert a system administrator
      to activity that could indicate intruder activity or policy violation.
    audit_procedure: >
      For 64 bit systems, perform the following command and ensure the output is as
      shown to determine if permission modifications are being recorded. Note: '-a
      always,exit' may be specified as '-a exit,always'. 99 | P a g e # grep
      perm_mod /etc/audit/audit.rules -a always,exit -F arch=b64 -S chmod -S fchmod
      -S fchmodat -F auid>=1000 \ -F auid!=4294967295 -k perm_mod -a always,exit -F
      arch=b32 -S chmod -S fchmod -S fchmodat -F auid>=1000 \ -F auid!=4294967295 -k
      perm_mod -a always,exit -F arch=b64 -S chown -S fchown -S fchownat -S lchown
      -F auid>=1000 \ -F auid!=4294967295 -k perm_mod -a always,exit -F arch=b32 -S
      chown -S fchown -S fchownat -S lchown -F auid>=1000 \ -F auid!=4294967295 -k
      perm_mod -a always,exit -F arch=b64 -S setxattr -S lsetxattr -S fsetxattr -S
      removexattr -S \ lremovexattr -S fremovexattr -F auid>=1000 -F
      auid!=4294967295 -k perm_mod -a always,exit -F arch=b32 -S setxattr -S
      lsetxattr -S fsetxattr -S removexattr -S \ lremovexattr -S fremovexattr -F
      auid>=1000 -F auid!=4294967295 -k perm_mod For 32 bit systems, perform the
      following command and ensure the output is as shown to determine if permission
      modifications are being recorded. Note: '-a always,exit' may be specified as
      '-a exit,always'. # grep perm_mod /etc/audit/audit.rules -a always,exit -F
      arch=b32 -S chmod -S fchmod -S fchmodat -F auid>=1000 \ -F auid!=4294967295 -k
      perm_mod -a always,exit -F arch=b32 -S chown -S fchown -S fchownat -S lchown
      -F auid>=1000 \ -F auid!=4294967295 -k perm_mod -a always,exit -F arch=b32 -S
      setxattr -S lsetxattr -S fsetxattr -S removexattr -S \ lremovexattr -S
      fremovexattr -F auid>=1000 -F auid!=4294967295 -k perm_mod
    remediation: >
      For 64 bit systems, add the following lines to the /etc/audit/audit.rules
      file. -a always,exit -F arch=b64 -S chmod -S fchmod -S fchmodat -F auid>=1000
      \ -F auid!=4294967295 -k perm_mod -a always,exit -F arch=b32 -S chmod -S
      fchmod -S fchmodat -F auid>=1000 \ -F auid!=4294967295 -k perm_mod -a
      always,exit -F arch=b64 -S chown -S fchown -S fchownat -S lchown -F auid>=1000
      \ -F auid!=4294967295 -k perm_mod -a always,exit -F arch=b32 -S chown -S
      fchown -S fchownat -S lchown -F auid>=1000 \ -F auid!=4294967295 -k perm_mod
      -a always,exit -F arch=b64 -S setxattr -S lsetxattr -S fsetxattr -S
