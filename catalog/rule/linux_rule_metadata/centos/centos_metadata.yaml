  - rule_id: centos.cis.5.make_the_audit_configuration_immutable
    title: "Make the Audit Configuration Immutable"
    severity: medium
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v1.1.0"
    cis_version: "7_v1.1.0"
    cis_control: "5.2.18"
    cis_section: "5"
    profile_applicability: "Level 2"
    description: >
      Set system audit so that audit rules cannot be modified with auditctl. Setting
      the flag '-e 2' forces audit to be put in immutable mode. Audit changes can
      only be made on system reboot.
    rationale: >
      In immutable mode, unauthorized users cannot execute changes to the audit
      system to potential hide malicious activity and then put the audit rules back.
      Users would most likely 108 | P a g e notice a system reboot and that could
      alert administrators of an attempt to make unauthorized audit changes.
    audit_procedure: >
      Perform the following to determine if the audit configuration is immutable. #
      grep '^-e 2' /etc/audit/audit.rules -e 2
    remediation: >
      Add the following lines to the /etc/audit/audit.rules file. -e 2 Note: This
      must be the last entry in the /etc/audit/audit.rules file
    references: >
      
