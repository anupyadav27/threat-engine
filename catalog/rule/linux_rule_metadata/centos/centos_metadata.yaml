  - rule_id: centos.cis.6.limit_access_via_ssh
    title: "Limit Access via SSH"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v1.1.0"
    cis_version: "7_v1.1.0"
    cis_control: "6.2.13"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      There are several options available to limit which users and group can access
      the system via SSH. It is recommended that at least of the following options
      be leveraged: AllowUsers 127 | P a g e The AllowUsers variable gives the
      system administrator the option of allowing specific users to ssh into the
      system. The list consists of comma separated user names. Numeric userIDs are
      not recognized with this variable. If a system administrator wants to restrict
      user access further by only allowing the allowed users to log in from a
      particular host, the entry can be specified in the form of user@host.
      AllowGroups The AllowGroups variable gives the system administrator the option
      of allowing specific groups of users to ssh into the system. The list consists
      of comma separated user names. Numeric groupIDs are not recognized with this
      variable. DenyUsers The DenyUsers variable gives the system administrator the
      option of denying specific users to ssh into the system. The list consists of
      comma separated user names. Numeric userIDs are not recognized with this
      variable. If a system administrator wants to restrict user access further by
      specifically denying a user's access from a particular host, the entry can be
      specified in the form of user@host. DenyGroups The DenyGroups variable gives
      the system administrator the option of denying specific groups of users to ssh
      into the system. The list consists of comma separated group names. Numeric
      groupIDs are not recognized with this variable.
    rationale: >
      Restricting which users can remotely access the system via SSH will help
      ensure that only authorized users access the system.
    audit_procedure: >
      To verify the correct SSH setting, run the following command and verify that
      the output is as shown: # grep '^AllowUsers' /etc/ssh/sshd_config AllowUsers
      <userlist> # grep '^AllowGroups' /etc/ssh/sshd_config AllowGroups <grouplist>
      # grep '^DenyUsers' /etc/ssh/sshd_config DenyUsers <userlist> # grep
      '^DenyGroups' /etc/ssh/sshd_config DenyGroups <grouplist>
    remediation: >
      128 | P a g e Edit the /etc/ssh/sshd_config file to set one or more of the
      parameter as follows: AllowUsers <userlist> AllowGroups <grouplist> DenyUsers
