  - rule_id: centos.cis.8.set_warning_banner_for_standard_login_services
    title: "Set Warning Banner for Standard Login Services"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v1.1.0"
    cis_version: "7_v1.1.0"
    cis_control: "8.1"
    cis_section: "8"
    profile_applicability: "Level 1"
    description: >
      The contents of the /etc/issue file are displayed prior to the login prompt on
      the system's console and serial devices, and also prior to logins via telnet.
      The contents of the /etc/motd file is generally displayed after all successful
      logins, no matter where the user is 141 | P a g e logging in from, but is
      thought to be less useful because it only provides notification to the user
      after the machine has been accessed.
    rationale: >
      Warning messages inform users who are attempting to login to the system of
      their legal status regarding the system and must include the name of the
      organization that owns the system and any monitoring policies that are in
      place. Consult with your organization's legal counsel for the appropriate
      wording for your specific organization.
    audit_procedure: >
      Run the following commands and ensure that the files exist and have the
      correct permissions. # /bin/ls -l /etc/motd -rw-r--r-- 1 root root 2055 Jan 30
      16:30 /etc/motd # ls /etc/issue -rw-r--r-- 1 root root 2055 Jan 30 16:30
      /etc/issue # ls /etc/issue.net -rw-r--r-- 1 root root 2055 Jan 30 16:30
      /etc/issue.net The commands above simply validate the presence of the
      /etc/motd, /etc/issue and /etc/issue.net files. Review the contents of these
      files with the 'cat' command and ensure that it is appropriate for your
      organization.
    remediation: >
      # touch /etc/motd # echo 'Authorized uses only. All activity may be \
      monitored and reported.' > /etc/issue # echo 'Authorized uses only. All
      activity may be \ monitored and reported.' > /etc/issue.net # chown root:root
      /etc/motd # chmod 644 /etc/motd # chown root:root /etc/issue # chmod 644
      /etc/issue # chown root:root /etc/issue.net # chmod 644 /etc/issue.net
