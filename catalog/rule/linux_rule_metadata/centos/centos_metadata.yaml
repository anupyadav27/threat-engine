  - rule_id: centos.cis.6.no_duplicate_uids_exist
    title: "Ensure no duplicate UIDs exist"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v2.0.0"
    cis_version: "7_v2.0.0"
    cis_control: "6.2.16"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Although the useradd program will not let you create a duplicate User ID
      (UID), it is possible for an administrator to manually edit the /etc/passwd
      file and change the UID field.
    rationale: >
      Users must be assigned unique UIDs for accountability and to ensure
      appropriate access protections.
    audit_procedure: >
      Run the following script and verify no results are returned: #!/bin/bash cat
      /etc/passwd | cut -f3 -d':' | sort -n | uniq -c | while read x ; do [ -z
      '${x}' ] && break set - $x if [ $1 -gt 1 ]; then users=`awk -F: '($3 == n) {
      print $1 }' n=$2 /etc/passwd | xargs` echo 'Duplicate UID ($2): ${users}' fi
      done
    remediation: >
      Based on the results of the audit script, establish unique UIDs and review all
      files owned by the shared UIDs to determine which UID they are supposed to
      belong to. 294 | P a g e
