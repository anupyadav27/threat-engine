      install tipc /bin/true 152 | P a g e 3.6 Firewall Configuration IPtables is an
      application that allows a system administrator to configure the IPv4 tables,
      chains and rules provided by the Linux kernel firewall. While several methods
      of configuration exist this section is intended only to ensure the resulting
      IPtables rules are in place, not how they are configured. If IPv6 is in use in
      your environment, similar settings should be applied to the IP6tables as well.
      Note: This section broadly assumes starting with an empty IPtables firewall
      ruleset (established by flushing the rules with iptables -F). Remediation
      steps included only affect the live system, you will also need to configure
      your default firewall configuration to apply on boot. Configuration of a live
      systems firewall directly over a remote connection will often result in being
      locked out. It is advised to have a known good firewall configuration set to
      run on boot and to configure an entire firewall structure in a script that is
      then run and tested before saving to boot. The following script will implement
      the firewall rules of this section and open port 22(ssh) from anywhere:
      #!/bin/bash # Flush IPtables rules iptables -F # Ensure default deny firewall
      policy iptables -P INPUT DROP iptables -P OUTPUT DROP iptables -P FORWARD DROP
      # Ensure loopback traffic is configured iptables -A INPUT -i lo -j ACCEPT
      iptables -A OUTPUT -o lo -j ACCEPT iptables -A INPUT -s 127.0.0.0/8 -j DROP #
