  - rule_id: centos.cis.6.upgrade_password_hashing_algorithm_to_sha_512
    title: "Upgrade Password Hashing Algorithm to SHA-512"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v1.1.0"
    cis_version: "7_v1.1.0"
    cis_control: "6.3.1"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      The commands below change password encryption from md5 to sha512 (a much
      stronger hashing algorithm). All existing accounts will need to perform a
      password change to upgrade the stored hashes to the new algorithm.
    rationale: >
      The SHA-512 algorithm provides much stronger hashing than MD5, thus providing
      additional protection to the system by increasing the level of effort for an
      attacker to successfully determine passwords. Note that these change only
      apply to accounts configured on the local system.
    audit_procedure: >
      Perform the following to determine if the password-hashing algorithm is set to
      SHA-512: # authconfig --test | grep hashing | grep sha512 If the above command
      emits no output then the system is not configured as recommended
    remediation: >
      Perform the following to configure the system as recommended: # authconfig
      --passalgo=sha512 --update Note: If it is determined that the password
      algorithm being used is not SHA-512, once it is changed, it is recommended
      that all userID's be immediately expired and forced to change their passwords
      on next login. To accomplish that, the following commands can be used. 130 | P
      a g e Any system accounts that need to be expired should be carefully done
      separately by the system administrator to prevent any potential problems. #
      cat /etc/passwd | awk -F: '( $3 >=1000 && $1 != 'nfsnobody' ) { print $1 }' |
      xargs -n 1 chage -d 0
