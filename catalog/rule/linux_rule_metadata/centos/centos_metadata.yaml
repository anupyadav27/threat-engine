  - rule_id: centos.cis.5.password_creation_requirements_are_configured
    title: "Ensure password creation requirements are configured"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v2.0.0"
    cis_version: "7_v2.0.0"
    cis_control: "5.3.1"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The pam_pwquality.so module checks the strength of passwords. It performs
      checks such as making sure a password is not a dictionary word, it is a
      certain length, contains a mix of characters (e.g. alphabet, numeric, other)
      and more. The following are definitions of the pam_pwquality.so options. 
      try_first_pass - retrieve the password from a previous stacked PAM module. If
      not available, then prompt the user for a password.  retry=3 - Allow 3 tries
      before sending back a failure. The following options are set in the
