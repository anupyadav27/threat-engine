  - rule_id: centos.cis.4.login_and_logout_events_are_collected
    title: "Ensure login and logout events are collected"
    severity: medium
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v2.0.0"
