  - rule_id: centos.cis.3.icmp_redirects_are_not_accepted
    title: "Ensure ICMP redirects are not accepted"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v2.0.0"
    cis_version: "7_v2.0.0"
    cis_control: "3.2.2"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      ICMP redirect messages are packets that convey routing information and tell
      your host (acting as a router) to send packets via an alternate path. It is a
      way of allowing an outside routing device to update your system routing
      tables. By setting net.ipv4.conf.all.accept_redirects to 0, the system will
      not accept any ICMP redirect messages, and therefore, won't allow outsiders to
