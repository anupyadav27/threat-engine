  - rule_id: centos.cis.1.implement_periodic_execution_of_file_integrity
    title: "Implement Periodic Execution of File Integrity"
    severity: medium
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v1.1.0"
    cis_version: "7_v1.1.0"
    cis_control: "1.3.2"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      Implement periodic file checking, in compliance with site policy.
    rationale: >
      Periodic file checking allows the system administrator to determine on a
      regular basis if critical files have been changed in an unauthorized fashion.
    audit_procedure: >
      Perform the following to determine if there is a cron job scheduled to run the
      aide check. # crontab -u root -l | grep aide 0 5 * * * /usr/sbin/aide --check
    remediation: >
      Execute the following command: # crontab -u root -e Add the following line to
      the crontab: 0 5 * * * /usr/sbin/aide --check Note: The checking in this
      instance occurs every day at 5am. Alter the frequency and time of the checks
      in compliance with site policy. 30 | P a g e 1.4 Configure SELinux SELinux
      provides a Mandatory Access Control (MAC) system that greatly augments the
      default Discretionary Access Control (DAC) model. Under SELinux, every process
      and every object (files, sockets, pipes) on the system is assigned a security
      context, a label that includes detailed type information about the object. The
      kernel allows processes to access objects only if that access is explicitly
      allowed by the policy in effect. The policy defines transitions, so that a
      user can be allowed to run software, but the software can run under a
      different context than the user's default. This automatically limits the
      damage that the software can do to files accessible by the calling user. The
      user does not need to take any action to gain this benefit. For an action to
      occur, both the traditional DAC permissions must be satisfied as well as the
      SELinux MAC rules. The action will not be allowed if either one of these
      models does not permit the action. In this way, SELinux rules can only make a
      system's permissions more restrictive and secure. SELinux requires a complex
      policy to allow all the actions required of a system under normal operation.
      Three such policies have been designed for use with CentOS 7 and are included
      with the system: targeted, strict, and mls. These are described as follows: 
      targeted: consists mostly of Type Enforcement (TE) rules, and a small number
      of Role-Based Access Control (RBAC) rules. Targeted restricts the actions of
      many types of programs, but leaves interactive users largely unaffected. 
      strict: also uses TE and RBAC rules, but on more programs and more
      aggressively.  mls: implements Multi-Level Security (MLS), which introduces
      even more kinds of labels (sensitivity and category) and rules that govern
      access based on these. This section provides guidance for the configuration of
      the targeted policy. References: 1. NSA SELinux resources: 1.
      http://www.nsa.gov/research/selinux 2.
      http://www.nsa.gov/research/selinux/list.shtml 2. Fedora SELinux resources: 1.
      FAQ: http://docs.fedoraproject.org/selinux-faq 2. User Guide:
      http://docs.fedoraproject.org/selinux-user-guide 3. Managing Services Guide:
      http://docs.fedoraproject.org/selinux-managing- confined-services-guide 3.
      SELinux Project web page and wiki: 1. http://www.selinuxproject.org 4.
      Chapters 43-45 of Red Hat Enterprise Linux 5: Deployment Guide (Frank Mayer,
      Karl MacMillan and David Caplan), 5. SELinux by Example: Using Security
      Enhanced Linux (Prentice Hall, August 6, 2006) 31 | P a g e
    references: >
