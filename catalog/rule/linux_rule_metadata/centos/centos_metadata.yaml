  - rule_id: centos.cis.1.prelink_is_disabled
    title: "Ensure prelink is disabled"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v2.0.0"
    cis_version: "7_v2.0.0"
    cis_control: "1.5.4"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      prelink is a program that modifies ELF shared libraries and ELF dynamically
      linked binaries in such a way that the time needed for the dynamic linker to
      perform relocations at startup significantly decreases.
    rationale: >
      The prelinking feature can interfere with the operation of AIDE, because it
      changes binaries. Prelinking can also increase the vulnerability of the system
      if a malicious user is able to compromise a common library such as libc.
    audit_procedure: >
      Run the following command and verify prelink is not installed: # rpm -q
      prelink package prelink is not installed
    remediation: >
      Run the following commands to restore binaries to normal and uninstall
      prelink: # prelink -ua # yum remove prelink 65 | P a g e 1.6 Mandatory Access
      Control Mandatory Access Control (MAC) provides an additional layer of access
      restrictions to processes on top of the base Discretionary Access Controls. By
      restricting how processes can access files and resources on a system the
      potential impact from vulnerabilities in the processes can be reduced. Impact:
      Mandatory Access Control limits the capabilities of applications and daemons
      on a system, while this can prevent unauthorized access the configuration of
      MAC can be complex and difficult to implement correctly preventing legitimate
      access from occurring. 66 | P a g e 1.6.1 Configure SELinux SELinux provides a
      Mandatory Access Control (MAC) system that greatly augments the default
      Discretionary Access Control (DAC) model. Under SELinux, every process and
      every object (files, sockets, pipes) on the system is assigned a security
      context, a label that includes detailed type information about the object. The
      kernel allows processes to access objects only if that access is explicitly
      allowed by the policy in effect. The policy defines transitions, so that a
      user can be allowed to run software, but the software can run under a
      different context than the user's default. This automatically limits the
      damage that the software can do to files accessible by the calling user. The
      user does not need to take any action to gain this benefit. For an action to
      occur, both the traditional DAC permissions must be satisfied as well as the
      SELinux MAC rules. The action will not be allowed if either one of these
      models does not permit the action. In this way, SELinux rules can only make a
      system's permissions more restrictive and secure. SELinux requires a complex
      policy to allow all the actions required of a system under normal operation.
      Three such policies have been designed for use with RHEL7 and are included
      with the system: targeted, strict, and mls. These are described as follows: 
      targeted: consists mostly of Type Enforcement (TE) rules, and a small number
      of Role-Based Access Control (RBAC) rules. Targeted restricts the actions of
      many types of programs, but leaves interactive users largely unaffected. 
      strict: also uses TE and RBAC rules, but on more programs and more
      aggressively.  mls: implements Multi-Level Security (MLS), which introduces
      even more kinds of labels (sensitivity and category) and rules that govern
      access based on these. This section provides guidance for the configuration of
      the targeted policy. Note: This section only applies if SELinux is in use on
      the system. Recommendations for AppArmor are included in the Distribution
