      '{}' -xdev -type f - perm -4000 -print
    remediation: >
      Ensure that no rogue set-UID programs have been introduced into the system.
      Review the files returned by the action in the Audit section and confirm the
      integrity of these binaries as described below: # rpm -V `rpm -qf
      /usr/bin/sudo` .......T /usr/bin/sudo SM5....T /usr/bin/sudoedit
