  - rule_id: centos.cis.5.record_events_that_modify_date_and_time
    title: "Record Events That Modify Date and Time Information"
    severity: medium
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v1.1.0"
    cis_version: "7_v1.1.0"
    cis_control: "5.2.4"
    cis_section: "5"
    profile_applicability: "Level 2"
    description: >
      Capture events where the system date and/or time has been modified. The
      parameters in this section are set to determine if the adjtimex (tune kernel
      clock), settimeofday (Set time, using timeval and timezone structures) stime
      (using seconds since 1/1/1970) or clock_settime (allows for the setting of
      several internal clocks and timers) system calls have been executed and always
      write an audit record to the /var/log/audit.log file upon exit, tagging the
      records with the identifier 'time-change'
    rationale: >
      Unexpected changes in system date and/or time could be a sign of malicious
      activity on the system.
    audit_procedure: >
      Perform the following to determine if events where the system date and/or time
      has been modified are captured. On a 64 bit system, perform the following
      command and ensure the output is as shown. Note: '-a always,exit' may be
      specified as '-a exit,always'. # grep time-change /etc/audit/audit.rules -a
      always,exit -F arch=b64 -S adjtimex -S settimeofday -k time-change -a
      always,exit -F arch=b32 -S adjtimex -S settimeofday -S stime -k time-change -a
      always,exit -F arch=b64 -S clock_settime -k time-change -a always,exit -F
      arch=b32 -S clock_settime -k time-change -w /etc/localtime -p wa -k time-
      change On a 32 bit system, perform the following command and ensure the output
      is as shown. Note: '-a always,exit' may be specified as '-a exit,always'. #
      grep time-change /etc/audit/audit.rules -a always,exit -F arch=b32 -S adjtimex
      -S settimeofday -S stime -k time-change -a always,exit -F arch=b32 -S
      clock_settime -k time-change -w /etc/localtime -p wa -k time-change
    remediation: >
      For 64 bit systems, add the following lines to the /etc/audit/audit.rules
