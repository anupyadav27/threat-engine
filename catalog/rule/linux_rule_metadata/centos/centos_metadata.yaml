  - rule_id: centos.cis.3.ip_forwarding_is_disabled
    title: "Ensure IP forwarding is disabled"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v2.0.0"
    cis_version: "7_v2.0.0"
    cis_control: "3.1.1"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The net.ipv4.ip_forward flag is used to tell the system whether it can forward
      packets or not.
    rationale: >
      Setting the flag to 0 ensures that a system with multiple interfaces (for
      example, a hard proxy), will never be able to forward packets, and therefore,
      never serve as a router.
    audit_procedure: >
      Run the following command and verify output matches: # sysctl
      net.ipv4.ip_forward net.ipv4.ip_forward = 0
    remediation: >
      Set the following parameter in the /etc/sysctl.conf file: net.ipv4.ip_forward
      = 0 Run the following commands to set the active kernel parameters: # sysctl
      -w net.ipv4.ip_forward=0 # sysctl -w net.ipv4.route.flush=1 129 | P a g e
    references: >
      
    impact: >
      
    compliance_mappings:
