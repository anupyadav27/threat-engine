  - rule_id: centos.cis.6.enable_anacron_daemon
    title: "Enable anacron Daemon"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v1.1.0"
    cis_version: "7_v1.1.0"
    cis_control: "6.1.1"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      The anacron daemon is used on systems that are not up 24x7. The anacron daemon
      will execute jobs that would have normally been run had the system not been
      down.
    rationale: >
      Cron jobs may include critical security or administrative functions that need
      to run on a regular basis. Use this daemon on machines that are not up 24x7,
      or if there are jobs that need to be executed after the system has been
      brought back up after a maintenance window.
    audit_procedure: >
      Perform the following to determine if anacron is enabled. # rpm -q cronie-
      anacron cronie-anacron.<package version>.<hardware platform>
    remediation: >
      # yum install cronie-anacron Note: NSA Guidance recommends disabling anacron
      for systems that are intended to be up 24X7, with the rationale that
      unnecessary software should be disabled to reduce risk. However, even systems
      that are designed to be up at all times can experience downtime 110 | P a g e
      that could prevent important system maintenance jobs from running. Review the
      requirements for your site to determine your appropriate risk level.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CENTOS_7_v1_1_0_6_1_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_centos_7_v1_1_0_6_1_1"
    metadata_source: generated
    generated_by: generate_tech_rules

