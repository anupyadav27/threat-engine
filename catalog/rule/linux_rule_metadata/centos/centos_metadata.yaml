  - rule_id: centos.cis.4.disable_icmp_redirect_acceptance
    title: "Disable ICMP Redirect Acceptance"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v1.1.0"
    cis_version: "7_v1.1.0"
    cis_control: "4.2.2"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      ICMP redirect messages are packets that convey routing information and tell
      your host (acting as a router) to send packets via an alternate path. It is a
      way of allowing an outside routing device to update your system routing
      tables. By setting net.ipv4.conf.all.accept_redirects to 0, the system will
      not accept any ICMP redirect messages, and therefore, won't allow outsiders to
      update the system's routing tables.
    rationale: >
      Attackers could use bogus ICMP redirect messages to maliciously alter the
      system routing tables and get them to send packets to incorrect networks and
      allow your system packets to be captured.
    audit_procedure: >
      Perform the following to determine if ICMP redirect messages will be rejected.
      # /sbin/sysctl net.ipv4.conf.all.accept_redirects
      net.ipv4.conf.all.accept_redirects = 0 # /sbin/sysctl
      net.ipv4.conf.default.accept_redirects net.ipv4.conf.default.accept_redirects
      = 0
    remediation: >
      Set the net.ipv4.conf.all.accept_redirects and
      net.ipv4.conf.default.accept_redirects parameters to 0 in /etc/sysctl.conf:
      net.ipv4.conf.all.accept_redirects=0 net.ipv4.conf.default.accept_redirects=0
      Modify active kernel parameters to match: 67 | P a g e # /sbin/sysctl -w
      net.ipv4.conf.all.accept_redirects=0 # /sbin/sysctl -w
