  - rule_id: centos.cis.9.permissions_on_user_home_directories
    title: "Check Permissions on User Home Directories"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v1.1.0"
    cis_version: "7_v1.1.0"
    cis_control: "9.2.7"
    cis_section: "9"
    profile_applicability: "Level 1"
    description: >
      While the system administrator can establish secure permissions for users'
      home directories, the users can easily override these.
    rationale: >
      Group or world-writable user home directories may enable malicious users to
      steal or modify other users' data or to gain another user's system privileges.
    audit_procedure: >
      159 | P a g e #!/bin/bash for dir in `/bin/cat /etc/passwd | /bin/egrep -v
      '(root|halt|sync|shutdown)' |\ /bin/awk -F: '($8 == 'PS' && $7 !=
      '/sbin/nologin') { print $6 }'`; do dirperm=`/bin/ls -ld $dir | /bin/cut -f1
      -d' '` if [ `echo $dirperm | /bin/cut -c6 ` != '-' ]; then echo 'Group Write
      permission set on directory $dir' fi if [ `echo $dirperm | /bin/cut -c8 ` !=
      '-' ]; then echo 'Other Read permission set on directory $dir' fi if [ `echo
      $dirperm | /bin/cut -c9 ` != '-' ]; then echo 'Other Write permission set on
      directory $dir' fi if [ `echo $dirperm | /bin/cut -c10 ` != '-' ]; then echo
      'Other Execute permission set on directory $dir' fi done
    remediation: >
      Making global modifications to user home directories without alerting the user
      community can result in unexpected outages and unhappy users. Therefore, it is
      recommended that a monitoring policy be established to report user file
      permissions and determine the action to be taken in accordance with site
      policy.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CENTOS_7_v1_1_0_9_2_7"
      nist_800_53: []
      soc2: []
