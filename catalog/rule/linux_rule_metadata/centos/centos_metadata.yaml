  - rule_id: centos.cis.7.disable_system_accounts
    title: "Disable System Accounts"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v1.1.0"
    cis_version: "7_v1.1.0"
    cis_control: "7.2"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      There are a number of accounts provided with the CentOS that are used to
      manage applications and are not intended to provide an interactive shell.
    rationale: >
      It is important to make sure that accounts that are not being used by regular
      users are locked to prevent them from being used to provide an interactive
      shell. By default, CentOS sets the password field for these accounts to an
      invalid string, but it is also recommended that the shell field in the
      password file be set to /sbin/nologin. This prevents the account from
      potentially being used to run any commands.
    audit_procedure: >
      Run the following script to determine if any system accounts can be accessed:
      egrep -v '^\+' /etc/passwd | awk -F: '($1!='root' && $1!='sync' &&
      $1!='shutdown' && $1!='halt' && $3<1000 && $7!='/sbin/nologin') {print}' There
      should be no results returned. 138 | P a g e
    remediation: >
      Accounts that have been locked are prohibited from running commands on the
      system. Such accounts are not able to login to the system nor are they able to
      use scheduled execution facilities such as cron. To make sure system accounts
      cannot be accessed, using the following script: #!/bin/bash for user in `awk
      -F: '($3 < 1000) {print $1 }' /etc/passwd`; do if [ $user != 'root' ] then
      /usr/sbin/usermod -L $user if [ $user != 'sync' ] && [ $user != 'shutdown' ]
      && [ $user != 'halt' ] then /usr/sbin/usermod -s /sbin/nologin $user fi fi
      done
