  - rule_id: centos.cis.5.access_to_the_su_command_is_restricted
    title: "Ensure access to the su command is restricted"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v2.0.0"
    cis_version: "7_v2.0.0"
    cis_control: "5.6"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The su command allows a user to run a command or shell as another user. The
      program has been superseded by sudo, which allows for more granular control
      over privileged access. Normally, the su command can be executed by any user.
      By uncommenting the pam_wheel.so statement in /etc/pam.d/su, the su command
      will only allow users in the wheel group to execute su.
    rationale: >
      Restricting the use of su, and using sudo in its place, provides system
      administrators better control of the escalation of user privileges to execute
      privileged commands. The sudo utility also provides a better logging and audit
      mechanism, as it can log each command executed via sudo, whereas su can only
      record that a user executed the su program.
    audit_procedure: >
      Run the following command and verify output includes matching line: # grep
      pam_wheel.so /etc/pam.d/su auth required pam_wheel.so use_uid Run the
      following command and verify users in wheel group match site policy: # grep
      wheel /etc/group wheel:x:10:root, <user list>
    remediation: >
      Add the following line to the /etc/pam.d/su file: auth required pam_wheel.so
      use_uid Create a comma separated list of users in the wheel statement in the
      /etc/group file: wheel:x:10:root, <user list> 260 | P a g e 6 System
      Maintenance Recommendations in this section are intended as maintenance and
      are intended to be checked on a frequent basis to ensure system stability.
      Many recommendations do not have quick remediations and require investigation
      into the cause and best fix available and may indicate an attempted breach of
      system security. 261 | P a g e 6.1 System File Permissions This section
      provides guidance on securing aspects of system files and directories.
