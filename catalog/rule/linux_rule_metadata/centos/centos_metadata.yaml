  - rule_id: centos.cis.5.accept_remote_rsyslog_messages_only_on_designated
    title: "Accept Remote rsyslog Messages Only on Designated Log Hosts"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v1.1.0"
    cis_version: "7_v1.1.0"
    cis_control: "5.1.6"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      By default, rsyslog does not listen for log messages coming in from remote
      systems. The ModLoad tells rsyslog to load the imtcp.so module so it can
      listen over a network via TCP. The InputTCPServerRun option instructs rsyslogd
      to listen on the specified TCP port.
    rationale: >
      The guidance in the section ensures that remote log hosts are configured to
      only accept rsyslog data from hosts within the specified domain and that those
      systems that are not designed to be log hosts do not accept any remote rsyslog
      messages. This provides protection from spoofed log data and ensures that
      system administrators are reviewing reasonably complete syslog data in a
      central location.
    audit_procedure: >
      Run the following to determine if rsyslog is listening for remote messages: #
      grep '$ModLoad imtcp.so' /etc/rsyslog.conf $ModLoad imtcp.so # grep
      '$InputTCPServerRun' /etc/rsyslog.conf $InputTCPServerRun 514
    remediation: >
      88 | P a g e On hosts that are designated as log hosts edit the
      /etc/rsyslog.conf file and un-comment the following lines: $ModLoad imtcp.so
      $InputTCPServerRun 514 Note: On hosts that are not designated log hosts these
      lines should be commented out instead. Execute the following command to
      restart rsyslogd: # pkill -HUP rsyslogd References: 1. See the rsyslog(8) man
      page for more information. 5.2 Configure System Accounting (auditd) System
      auditing, through auditd, allows system administrators to monitor their
      systems such that they can detect unauthorized access or modification of data.
      By default, auditd will audit SELinux AVC denials, system logins, account
      modifications, and authentication events. Events will be logged to
      /var/log/audit/audit.log. The recording of these events will use a modest
      amount of disk space on a system. If significantly more events are captured,
      additional on system or off system storage may need to be allocated. Note: For
      64 bit systems that have arch as a rule parameter, you will need two rules:
      one for 64 bit and one for 32 bit systems. For 32 bit systems, only one rule
      is needed. 5.2.1 Configure Data Retention When auditing, it is important to
      carefully configure the storage requirements for audit logs. By default,
      auditd will max out the log files at 5MB and retain only 4 copies of them.
      Older versions will be deleted. It is possible on a system that the 20 MBs of
      audit logs may fill up the system causing loss of audit data. While the
      recommendations here provide guidance, check your site policy for audit
      storage requirements.
    references: >
      1. See the rsyslog(8) man page for more information. 5.2 Configure System
