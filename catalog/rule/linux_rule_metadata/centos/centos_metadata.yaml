  - rule_id: centos.cis.1.use_the_latest_os_release
    title: "Use the Latest OS Release"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v1.1.0"
    cis_version: "7_v1.1.0"
    cis_control: "1.7"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      39 | P a g e Periodically, CentOS releases updates to the CentOS operating
      system to support new hardware platforms, deliver new functionality as well as
      the bundle together a set of patches that can be tested as a unit.
    rationale: >
      Newer updates may contain security enhancements that would not be available
      through the standard patching process. As a result, it is recommended that the
      latest update of the CentOS software be used to take advantage of the latest
      functionality. As with any software installation, organizations need to
      determine if a given update meets their requirements and verify the
      compatibility and supportability of any additional software against the update
      revision that is selected.
    audit_procedure: >
      Run the following command to determine the current OS level: # uname -r or #
      cat /etc/centos-release
    remediation: >
      Use the latest update when installing new systems and upgrade to or reinstall
      with the latest update as appropriate for existing systems. 40 | P a g e 2 OS
      Services While applying system updates and patches helps correct known
      vulnerabilities, one of the best ways to protect the system against as yet
      unreported vulnerabilities is to disable all services that are not required
      for normal system operation. This prevents the exploitation of vulnerabilities
      discovered at a later date. If a service is not enabled, it cannot be
      exploited. The actions in this section of the document provide guidance on
      what services can be safely disabled and under which circumstances, greatly
      reducing the number of possible threats to the resulting system. 2.1 Remove
      Legacy Services The items in this section are intended to ensure that legacy
      services are not installed on the system. Some guidance includes directives to
      both disable and remove the service. There is no good reason to have these
      services on the system, even in a disabled state. Note: The audit items in the
      section check to see if the packages are listed in the yum database and
      installed using rpm. It could be argued that someone may have installed them
      separately. However, this is also true for any other type of rogue software.
      It is beyond the scope of this benchmark to address software that is installed
      using non-standard methods and installation directories.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CENTOS_7_v1_1_0_1_7"
      nist_800_53: []
      soc2: []
      pci_dss: []
