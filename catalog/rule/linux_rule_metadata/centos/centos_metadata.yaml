  - rule_id: centos.cis.2.time_synchronization_is_in_use
    title: "Ensure time synchronization is in use"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v2.0.0"
    cis_version: "7_v2.0.0"
    cis_control: "2.2.1.1"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      System time should be synchronized between all systems in an environment. This
      is typically done by establishing an authoritative time server or set of
      servers and having all systems synchronize their clocks to them.
    rationale: >
      Time synchronization is important to support time sensitive security
      mechanisms like Kerberos and also ensures log files have consistent time
      records across the enterprise, which aids in forensic investigations.
    audit_procedure: >
      On physical systems or virtual systems where host based time synchronization
      is not available run the following commands and verify either ntp or chrony is
      installed: # rpm -q ntp # rpm -q chrony On virtual systems where host based
      time synchronization is available consult your virtualization software
      documentation and verify that host based synchronization is in use.
    remediation: >
      On physical systems or virtual systems where host based time synchronization
      is not available run one of the following commands to install either ntp or
      chrony: # yum install ntp # yum install chrony On virtual systems where host
      based time synchronization is available consult your virtualization software
      documentation and setup host based synchronization. 102 | P a g e
    references: >
      
    impact: >
      
