      file, perform the following commands: # touch <logfile> # chown root:root
      <logfile> # chmod og-rwx <logfile> For sites that have implemented a secure
      admin group: Create the /var/log/ directory and for each <logfile> listed in
      the /etc/rsyslog.conf file, perform the following commands (where is the name
      of the security group): # touch <logfile> # chown root: <securegrp> <logfile>
      # chmod g-wx,o-rwx <logfile> References: 1. See the rsyslog.conf(5) man page
