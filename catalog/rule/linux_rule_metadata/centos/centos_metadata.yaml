    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v2.0.0"
    cis_version: "7_v2.0.0"
    cis_control: "3.7"
    cis_section: "3"
    profile_applicability: "Level 1 + Level 2"
    description: >
      Wireless networking is used when wired networks are unavailable. CentOS Linux
      7 contains a wireless tool kit to allow system administrators to configure and
      use wireless networks.
    rationale: >
      If wireless is not to be used, wireless devices can be disabled to reduce the
      potential attack surface.
    audit_procedure: >
      Run the following command to determine wireless interfaces on the system: #
      iwconfig Run the following command and verify wireless interfaces are active:
      # ip link show up
    remediation: >
      Run the following command to disable any wireless interfaces: # ip link set
      <interface> down Disable any wireless interfaces in your network
      configuration. Impact: Many if not all laptop workstations and some desktop
      workstations will connect via wireless requiring these interfaces be enabled.
      161 | P a g e 4 Logging and Auditing The items in this section describe how to
      configure logging, log monitoring, and auditing, using tools included in most
      distributions. It is recommended that rsyslog be used for logging (with
      logwatch providing summarization) and auditd be used for auditing (with
      aureport providing summarization) to automatically monitor logs for intrusion
      attempts and other suspicious system behavior. In addition to the local log
      files created by the steps in this section, it is also recommended that sites
      collect copies of their system logs on a secure, centralized log server via an
      encrypted connection. Not only does centralized logging help sites correlate
      events that may be occurring on multiple systems, but having a second copy of
      the system log information may be critical after a system compromise where the
      attacker has modified the local log files on the affected system(s). If a log
      correlation system is deployed, configure it to process the logs described in
      this section. Because it is often necessary to correlate log information from
      many different systems (particularly after a security incident) it is
      recommended that the time be synchronized among systems and devices connected
      to the local network. The standard Internet protocol for time synchronization
      is the Network Time Protocol (NTP), which is supported by most network-ready
      devices. See the ntpd(8) manual page for more information on configuring NTP.
      It is important that all logs described in this section be monitored on a
      regular basis and correlated to determine trends. A seemingly innocuous entry
      in one log could be more significant when compared to an entry in another log.
      Note on log file permissions: There really isn't a 'one size fits all'
      solution to the permissions on log files. Many sites utilize group permissions
      so that administrators who are in a defined security group, such as 'wheel' do
      not have to elevate privileges to root in order to read log files. Also, if a
      third party log aggregation tool is used, it may need to have group
      permissions to read the log files, which is preferable to having it run setuid
      to root. Therefore, there are two remediation and audit steps for log file
      permissions. One is for systems that do not have a secured group method
      implemented that only permits root to read the log files (root:root 600). The
      other is for sites that do have such a setup and are designated as
      root:securegrp 640 where securegrp is the defined security group (in some
      cases wheel). 162 | P a g e 4.1 Configure System Accounting (auditd) System
      auditing, through auditd, allows system administrators to monitor their
      systems such that they can detect unauthorized access or modification of data.
      By default, auditd will audit SELinux AVC denials, system logins, account
      modifications, and authentication events. Events will be logged to
      /var/log/audit/audit.log. The recording of these events will use a modest
      amount of disk space on a system. If significantly more events are captured,
      additional on system or off system storage may need to be allocated. The
      recommendations in this section implement an audit policy that produces large
      quantities of logged data. In some environments it can be challenging to store
      or process these logs and as such they are marked as Level 2 for both Servers
      and Workstations. Note: For 64 bit systems that have arch as a rule parameter,
      you will need two rules: one for 64 bit and one for 32 bit systems. For 32 bit
      systems, only one rule is needed. Note: Once all configuration changes have
      been made to /etc/audit/audit.rules, the auditd configuration must be
      reloaded: # service auditd reload 163 | P a g e 4.1.1 Configure Data Retention
      When auditing, it is important to carefully configure the storage requirements
      for audit logs. By default, auditd will max out the log files at 5MB and
      retain only 4 copies of them. Older versions will be deleted. It is possible
      on a system that the 20 MBs of audit logs may fill up the system causing loss
      of audit data. While the recommendations here provide guidance, check your
      site policy for audit storage requirements.
    references: >
      
    impact: >
      Many if not all laptop workstations and some desktop workstations will connect
      via wireless requiring these interfaces be enabled. 161 | P a g e 4 Logging
      and Auditing The items in this section describe how to configure logging, log
      monitoring, and auditing, using tools included in most distributions. It is
      recommended that rsyslog be used for logging (with logwatch providing
      summarization) and auditd be used for auditing (with aureport providing
      summarization) to automatically monitor logs for intrusion attempts and other
      suspicious system behavior. In addition to the local log files created by the
      steps in this section, it is also recommended that sites collect copies of
      their system logs on a secure, centralized log server via an encrypted
      connection. Not only does centralized logging help sites correlate events that
      may be occurring on multiple systems, but having a second copy of the system
      log information may be critical after a system compromise where the attacker
      has modified the local log files on the affected system(s). If a log
      correlation system is deployed, configure it to process the logs described in
      this section. Because it is often necessary to correlate log information from
      many different systems (particularly after a security incident) it is
      recommended that the time be synchronized among systems and devices connected
      to the local network. The standard Internet protocol for time synchronization
      is the Network Time Protocol (NTP), which is supported by most network-ready
      devices. See the ntpd(8) manual page for more information on configuring NTP.
      It is important that all logs described in this section be monitored on a
      regular basis and correlated to determine trends. A seemingly innocuous entry
      in one log could be more significant when compared to an entry in another log.
      Note on log file permissions: There really isn't a 'one size fits all'
      solution to the permissions on log files. Many sites utilize group permissions
      so that administrators who are in a defined security group, such as 'wheel' do
      not have to elevate privileges to root in order to read log files. Also, if a
      third party log aggregation tool is used, it may need to have group
      permissions to read the log files, which is preferable to having it run setuid
      to root. Therefore, there are two remediation and audit steps for log file
      permissions. One is for systems that do not have a secured group method
      implemented that only permits root to read the log files (root:root 600). The
      other is for sites that do have such a setup and are designated as
      root:securegrp 640 where securegrp is the defined security group (in some
      cases wheel). 162 | P a g e 4.1 Configure System Accounting (auditd) System
      auditing, through auditd, allows system administrators to monitor their
      systems such that they can detect unauthorized access or modification of data.
      By default, auditd will audit SELinux AVC denials, system logins, account
      modifications, and authentication events. Events will be logged to
      /var/log/audit/audit.log. The recording of these events will use a modest
      amount of disk space on a system. If significantly more events are captured,
      additional on system or off system storage may need to be allocated. The
      recommendations in this section implement an audit policy that produces large
      quantities of logged data. In some environments it can be challenging to store
      or process these logs and as such they are marked as Level 2 for both Servers
      and Workstations. Note: For 64 bit systems that have arch as a rule parameter,
      you will need two rules: one for 64 bit and one for 32 bit systems. For 32 bit
      systems, only one rule is needed. Note: Once all configuration changes have
      been made to /etc/audit/audit.rules, the auditd configuration must be
      reloaded: # service auditd reload 163 | P a g e 4.1.1 Configure Data Retention
      When auditing, it is important to carefully configure the storage requirements
      for audit logs. By default, auditd will max out the log files at 5MB and
      retain only 4 copies of them. Older versions will be deleted. It is possible
      on a system that the 20 MBs of audit logs may fill up the system causing loss
      of audit data. While the recommendations here provide guidance, check your
      site policy for audit storage requirements.
