  - rule_id: centos.cis.5.collect_file_deletion_events_by_user
    title: "Collect File Deletion Events by User"
    severity: medium
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v1.1.0"
    cis_version: "7_v1.1.0"
    cis_control: "5.2.14"
    cis_section: "5"
    profile_applicability: "Level 2"
    description: >
      Monitor the use of system calls associated with the deletion or renaming of
      files and file attributes. This configuration statement sets up monitoring for
      the unlink (remove a file), unlinkat (remove a file attribute), rename (rename
      a file) and renameat (rename a file attribute) system calls and tags them with
      the identifier 'delete'. 104 | P a g e
    rationale: >
      Monitoring these calls from non-privileged users could provide a system
      administrator with evidence that inappropriate removal of files and file
      attributes associated with protected files is occurring. While this audit
      option will look at all events, system administrators will want to look for
      specific privileged files that are being deleted or altered.
    audit_procedure: >
      For 64 bit systems, perform the following command and ensure the output is as
      shown to determine if file deletion events by user are recorded. # grep delete
      /etc/audit/audit.rules -a always,exit -F arch=b64 -S unlink -S unlinkat -S
      rename -S renameat -F auid>=1000 \ -F auid!=4294967295 -k delete -a
      always,exit -F arch=b32 -S unlink -S unlinkat -S rename -S renameat -F
      auid>=1000 \ -F auid!=4294967295 -k delete For 32 bit systems, perform the
      following command and ensure the output is as shown to determine if file
      deletion events by user are recorded. # grep delete /etc/audit/audit.rules -a
      always,exit -F arch=b32 -S unlink -S unlinkat -S rename -S renameat -F
      auid>=1000 \ -F auid!=4294967295 -k delete
    remediation: >
      At a minimum, configure the audit system to collect file deletion events for
      all users and root. For 64 bit systems, add the following to the
      /etc/audit/audit.rules file. -a always,exit -F arch=b64 -S unlink -S unlinkat
      -S rename -S renameat -F auid>=1000 \ -F auid!=4294967295 -k delete -a
      always,exit -F arch=b32 -S unlink -S unlinkat -S rename -S renameat -F
      auid>=1000 \ -F auid!=4294967295 -k delete # Execute the following command to
      restart auditd # pkill -HUP -P 1 auditd For 32 bit systems, add the following
      to the /etc/audit/audit.rules file. -a always,exit -F arch=b32 -S unlink -S
      unlinkat -S rename -S renameat -F auid>=1000 \ -F auid!=4294967295 -k delete #
      Execute the following command to restart auditd # pkill -P 1-HUP auditd
