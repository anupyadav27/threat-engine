  - rule_id: centos.cis.8.remove_os_information_from_login_warning_banners
    title: "Remove OS Information from Login Warning Banners"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v1.1.0"
    cis_version: "7_v1.1.0"
    cis_control: "8.2"
    cis_section: "8"
    profile_applicability: "Level 1"
    description: >
      142 | P a g e Unix-based systems have typically displayed information about
      the OS release and patch level upon logging in to the system. This information
      can be useful to developers who are developing software for a particular OS
      platform. If mingetty(8) supports the following options, they display
      operating system information: \m - machine architecture (uname -m) \r -
      operating system release (uname -r) \s - operating system name \v - operating
      system version (uname -v)
    rationale: >
      Displaying OS and patch level information in login banners also has the side
      effect of providing detailed system information to attackers attempting to
      target specific exploits of a system. Authorized users can easily get this
      information by running the 'uname -a' command once they have logged in.
    audit_procedure: >
      Perform the following commands to check if OS information is set to be
      displayed in the system login banners: # egrep '(\\v|\\r|\\m|\\s)' /etc/issue
      # egrep '(\\v|\\r|\\m|\\s)' /etc/motd # egrep'(\\v|\\r|\\m|\\s)'
      /etc/issue.net
    remediation: >
      Edit the /etc/motd, /etc/issue and /etc/issue.net files and remove any lines
      containing \m, \r, \s or \v.
