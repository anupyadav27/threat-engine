  - rule_id: centos.cis.1.selinux_is_not_disabled_in_bootloader
    title: "Ensure SELinux is not disabled in bootloader configuration"
    severity: medium
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v2.0.0"
    cis_version: "7_v2.0.0"
    cis_control: "1.6.1.1"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      Configure SELINUX to be enabled at boot time and verify that it has not been
      overwritten by the grub boot parameters.
    rationale: >
      SELinux must be enabled at boot time in your grub configuration to ensure that
      the controls it provides are not overridden.
    audit_procedure: >
      Run the following command and verify that no linux line has the selinux=0 or
      enforcing=0 parameters set: # grep '^\s*linux' /boot/grub/grub.conf
    remediation: >
      Edit /etc/default/grub and remove all instances of selinux=0 and enforcing=0
      from all CMDLINE_LINUX parameters: GRUB_CMDLINE_LINUX_DEFAULT='quiet'
      GRUB_CMDLINE_LINUX='' Run the following command to update the grub2
      configuration: # grub2-mkconfig > /boot/grub/grub.conf Notes: 68 | P a g e
      This recommendation is designed around the grub bootloader, if LILO or another
      bootloader is in use in your environment enact equivalent settings. 69 | P a g
      e
