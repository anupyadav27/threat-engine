  - rule_id: centos.cis.1.create_separate_partition_for_tmp
    title: "Create Separate Partition for /tmp"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v1.1.0"
    cis_version: "7_v1.1.0"
    cis_control: "1.1.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      The /tmp directory is a world-writable directory used for temporary storage by
      all users and some applications.
    rationale: >
      Since the /tmp directory is intended to be world-writable, there is a risk of
      resource exhaustion if it is not bound to a separate partition. In addition,
      making /tmp its own file system allows an administrator to set the noexec
      option on the mount, making /tmp 9 | P a g e useless for an attacker to
      install executable code. It would also prevent an attacker from establishing a
      hardlink to a system setuid program and wait for it to be updated. Once the
      program was updated, the hardlink would be broken and the attacker would have
      his own copy of the program. If the program happened to have a security
      vulnerability, the attacker could continue to exploit the known flaw.
    audit_procedure: >
      Verify that there is a /tmp file partition in the /etc/fstab file. # grep
      '[[:space:]]/tmp[[:space:]]' /etc/fstab
    remediation: >
      For new installations, check the box to 'Review and modify partitioning' and
      create a separate partition for /tmp. For systems that were previously
      installed, use the Logical Volume Manager (LVM) to create partitions.
      References: 1. AJ Lewis, 'LVM HOWTO', http://tldp.org/HOWTO/LVM-HOWTO/
    references: >
      1. AJ Lewis, 'LVM HOWTO', http://tldp.org/HOWTO/LVM-HOWTO/
