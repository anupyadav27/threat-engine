      have multiple windows in which to run programs and various add on. The X
      Window system is typically used on desktops where users login, but not on
      servers where users typically do not login.
    rationale: >
      Unless your organization specifically requires graphical login access via the
      X Window System, remove the server to reduce the potential attack surface.
    audit_procedure: >
      Perform the following to ensure the system is not booting into graphical mode:
      ls -l /etc/systemd/system/default.target | grep graphical.target No results
