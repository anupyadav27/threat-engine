  - rule_id: centos.cis.5.configure_rsyslog_to_send_logs_to_a_remote_log
    title: "Configure rsyslog to Send Logs to a Remote Log Host"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v1.1.0"
    cis_version: "7_v1.1.0"
    cis_control: "5.1.5"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      The rsyslog utility supports the ability to send logs it gathers to a remote
      log host running syslogd(8) or to receive messages from remote hosts, reducing
      administrative overhead.
    rationale: >
      Storing log data on a remote host protects log integrity from local attacks.
      If an attacker gains root access on the local system, they could tamper with
      or remove log data that is stored on the local system
    audit_procedure: >
      Review the /etc/rsyslog.conf file and verify that logs are sent to a central
      host (where logfile.example.com is the name of your central log host). # grep
      '^*.*[^I][^I]*@' /etc/rsyslog.conf *.* @@loghost.example.com
    remediation: >
      87 | P a g e Edit the /etc/rsyslog.conf file and add the following line (where
      logfile.example.com is the name of your central log host). *.*
      @@loghost.example.com # Execute the following command to restart rsyslogd #
      pkill -HUP rsyslogd Note: The double 'at' sign (@@) directs rsyslog to use TCP
      to send log messages to the server, which is a more reliable transport
      mechanism than the default UDP protocol. References: 1. See the
      rsyslog.conf(5) man page for more information.
    references: >
      1. See the rsyslog.conf(5) man page for more information.
