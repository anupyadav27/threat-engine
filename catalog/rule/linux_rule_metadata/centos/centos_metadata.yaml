  - rule_id: centos.cis.9.root_path_integrity
    title: "Ensure root PATH Integrity"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v1.1.0"
    cis_version: "7_v1.1.0"
    cis_control: "9.2.6"
    cis_section: "9"
    profile_applicability: "Level 1"
    description: >
      The root user can execute any command on the system and could be fooled into
      executing programs unintentionally if the PATH is not set correctly.
    rationale: >
      Including the current working directory (.) or other writable directory in
      root's executable path makes it likely that an attacker can gain superuser
      access by forcing an administrator operating as root to execute a Trojan horse
      program.
    audit_procedure: >
      #!/bin/bash if [ '`echo $PATH | /bin/grep :: `' != '' ]; then echo 'Empty
      Directory in PATH (::)' 158 | P a g e fi if [ '`echo $PATH | bin/grep :$`' !=
      '' ]; then echo 'Trailing : in PATH' fi p=`echo $PATH | /bin/sed -e 's/::/:/'
      -e 's/:$//' -e 's/:/ /g'` set -- $p while [ '$1' != '' ]; do if [ '$1' = '.'
      ]; then echo 'PATH contains .' shift continue fi if [ -d $1 ]; then
      dirperm=`/bin/ls -ldH $1 | /bin/cut -f1 -d' '` if [ `echo $dirperm | /bin/cut
      -c6 ` != '-' ]; then echo 'Group Write permission set on directory $1' fi if [
      `echo $dirperm | /bin/cut -c9 ` != '-' ]; then echo 'Other Write permission
      set on directory $1' fi dirown=`ls -ldH $1 | awk '{print $3}'` if [ '$dirown'
      != 'root' ] ; then echo $1 is not owned by root fi else echo $1 is not a
      directory fi shift done
    remediation: >
      Correct or justify any items discovered in the Audit step.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CENTOS_7_v1_1_0_9_2_6"
