  - rule_id: centos.cis.1.message_of_the_day_is_configured_properly
    title: "Ensure message of the day is configured properly"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v2.0.0"
    cis_version: "7_v2.0.0"
    cis_control: "1.7.1.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      The contents of the /etc/motd file are displayed to users after login and
      function as a message of the day for authenticated users. Unix-based systems
      have typically displayed information about the OS release and patch level upon
      logging in to the system. This information can be useful to developers who are
      developing software for a particular OS platform. If mingetty(8) supports the
      following options, they display operating system information: \m - machine
      architecture (uname -m) \r - operating system release (uname -r) \s -
      operating system name \v - operating system version (uname -v)
    rationale: >
      Warning messages inform users who are attempting to login to the system of
      their legal status regarding the system and must include the name of the
      organization that owns the system and any monitoring policies that are in
      place. Displaying OS and patch level information in login banners also has the
      side effect of providing detailed system information to attackers attempting
      to target specific exploits of a system. Authorized users can easily get this
      information by running the 'uname -a' command once they have logged in.
    audit_procedure: >
      Run the following command and verify that the contents match site policy: 77 |
      P a g e # cat /etc/motd Run the following command and verify no results are
      returned: # egrep '(\\v|\\r|\\m|\\s)' /etc/motd
    remediation: >
      Edit the /etc/motd file with the appropriate contents according to your site
      policy, remove any instances of \m, \r, \s, or \v. 78 | P a g e
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CENTOS_7_v2_0_0_1_7_1_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_centos_7_v2_0_0_1_7_1_1"
    metadata_source: generated
    generated_by: generate_tech_rules

