  - rule_id: centos.cis.4.enable_tcp_syn_cookies
    title: "Enable TCP SYN Cookies"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v1.1.0"
    cis_version: "7_v1.1.0"
    cis_control: "4.2.8"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      When tcp_syncookies is set, the kernel will handle TCP SYN packets normally
      until the half-open connection queue is full, at which time, the SYN cookie
      functionality kicks in. SYN cookies work by not using the SYN queue at all.
      Instead, the kernel simply replies to the SYN with a SYN|ACK, but will include
      a specially crafted TCP sequence number that encodes the source and
      destination IP address and port number and the time the packet was sent. A
      legitimate connection would send the ACK packet of the three way handshake
      with the specially crafted sequence number. This allows the server to verify
      that it has received a valid response to a SYN cookie and allow the
      connection, even though there is no corresponding SYN in the queue.
    rationale: >
      Attackers use SYN flood attacks to perform a denial of service attacked on a
      server by sending many SYN packets without completing the three way handshake.
      This will quickly use up slots in the kernel's half-open connection queue and
      prevent legitimate connections from succeeding. SYN cookies allow the server
      to keep accepting valid connections, even if under a denial of service attack.
    audit_procedure: >
      Perform the following to determine if TCP SYN Cookies is enabled. #
      /sbin/sysctl net.ipv4.tcp_syncookies net.ipv4.tcp_syncookies = 1
    remediation: >
      72 | P a g e Set the net.ipv4.tcp_syncookies parameter to 1 in
      /etc/sysctl.conf: net.ipv4.tcp_syncookies=1 Modify active kernel parameters to
      match: # /sbin/sysctl -w net.ipv4.tcp_syncookies=1 # /sbin/sysctl -w
      net.ipv4.route.flush=1 4.3 Wireless Networking
