  - rule_id: centos.cis.4.disable_source_routed_packet_acceptance
    title: "Disable Source Routed Packet Acceptance"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v1.1.0"
    cis_version: "7_v1.1.0"
    cis_control: "4.2.1"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      In networking, source routing allows a sender to partially or fully specify
      the route packets take through a network. In contrast, non-source routed
      packets travel a path determined by routers in the network. In some cases,
      systems may not be routable or reachable from some locations (e.g. private
      addresses vs. Internet routable), and so source routed packets would need to
      be used.
    rationale: >
      Setting net.ipv4.conf.all.accept_source_route and
      net.ipv4.conf.default.accept_source_route to 0 disables the system from
      accepting source routed packets. Assume this server was capable of routing
      packets to Internet routable addresses on one interface and private addresses
      on another interface. Assume that the private addresses were not routable to
      the Internet routable addresses and vice versa. Under normal routing
      circumstances, an attacker from the Internet routable addresses could not use
      the server as a way to reach the private address servers. If, however, source
      routed packets were allowed, they could be used to gain access to the private
      address systems as the route could be specified, rather than rely on routing
      protocols that did not allow this routing.
    audit_procedure: >
      Perform the following to determine if accepting source routed packets is
      disabled. # /sbin/sysctl net.ipv4.conf.all.accept_source_route
      net.ipv4.conf.all.accept_source_route = 0 # /sbin/sysctl
      net.ipv4.conf.default.accept_source_route
      net.ipv4.conf.default.accept_source_route = 0
    remediation: >
      66 | P a g e Set the net.ipv4.conf.all.accept_source_route and
      net.ipv4.conf.default.accept_source_route parameters to 0 in /etc/sysctl.conf:
      net.ipv4.conf.all.accept_source_route=0
      net.ipv4.conf.default.accept_source_route=0 Modify active kernel parameters to
      match: # /sbin/sysctl -w net.ipv4.conf.all.accept_source_route=0 #
      /sbin/sysctl -w net.ipv4.conf.default.accept_source_route=0 # /sbin/sysctl -w
      net.ipv4.route.flush=1
