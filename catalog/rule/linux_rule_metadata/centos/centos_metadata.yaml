  - rule_id: centos.cis.6.set_idle_timeout_interval_for_user_login
    title: "Set Idle Timeout Interval for User Login"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v1.1.0"
    cis_version: "7_v1.1.0"
    cis_control: "6.2.12"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      The two options ClientAliveInterval and ClientAliveCountMax control the
      timeout of ssh sessions. When the ClientAliveInterval variable is set, ssh
      sessions that have no activity for the specified length of time are
      terminated. When the ClientAliveCountMax 126 | P a g e variable is set, sshd
      will send client alive messages at every ClientAliveInterval interval. When
      the number of consecutive client alive messages are sent with no response from
      the client, the ssh session is terminated. For example, if the
      ClientAliveInterval is set to 15 seconds and the ClientAliveCountMax is set to
      3, the client ssh session will be terminated after 45 seconds of idle time.
    rationale: >
      Having no timeout value associated with a connection could allow an
      unauthorized user access to another user's ssh session (e.g. user walks away
      from their computer and doesn't lock the screen). Setting a timeout value at
      least reduces the risk of this happening.. While the recommended setting is
      300 seconds (5 minutes), set this timeout value based on site policy. The
      recommended setting for ClientAliveCountMax is 0. In this case, the client
      session will be terminated after 5 minutes of idle time and no keepalive
