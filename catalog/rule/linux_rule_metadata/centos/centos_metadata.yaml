  - rule_id: centos.cis.6.set_lockout_for_failed_password_attempts
    title: "Set Lockout for Failed Password Attempts"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v1.1.0"
    cis_version: "7_v1.1.0"
    cis_control: "6.3.3"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Lock out userIDs after n unsuccessful consecutive login attempts. The first
      sets of changes are made to the main PAM configuration files
      /etc/pam.d/system-auth and /etc/pam.d/password-auth. The second set of changes
      are applied to the program specific PAM configuration file (in this case, the
      ssh daemon). The second set of changes must be applied to each program that
      will lock out userID's. Set the lockout number to the policy in effect at your
      site.
    rationale: >
      Locking out userIDs after n unsuccessful consecutive login attempts mitigates
      brute force password attacks against your systems. 132 | P a g e
    audit_procedure: >
      Perform the following to determine the current settings for userID lockout. #
      grep 'pam_faillock' /etc/pam.d/password-auth auth required pam_faillock.so
      preauth audit silent deny=5 unlock_time=900 auth [default=die] pam_faillock.so
      authfail audit deny=5 unlock_time=900 auth sufficient pam_faillock.so authsucc
      audit deny=5 unlock_time=900 # grep 'pam_unix.so' /etc/pam.d/password-auth |
      grep success=1 auth [success=1 default=bad] pam_unix.so # grep 'pam_faillock'
      /etc/pam.d/system-auth auth required pam_faillock.so preauth audit silent
      deny=5 unlock_time=900 auth [default=die] pam_faillock.so authfail audit
      deny=5 unlock_time=900 auth sufficient pam_faillock.so authsucc audit deny=5
      unlock_time=900 # grep 'pam_unix.so' /etc/pam.d/system-auth | grep success=1
      auth [success=1 default=bad] pam_unix.so
    remediation: >
      Edit the /etc/pam.d/password-auth and /etc/pam.d/system-auth files and add the
      'auth' lines as highlighted below: # cat /etc/pam.d/password-auth #%PAM-1.0 #
      This file is auto-generated. # User changes will be destroyed the next time
      authconfig is run. auth required pam_env.so auth required pam_faillock.so
      preauth audit silent deny=5 unlock_time=900 auth [success=1 default=bad]
      pam_unix.so auth [default=die] pam_faillock.so authfail audit deny=5
      unlock_time=900 auth sufficient pam_faillock.so authsucc audit deny=5
      unlock_time=900 auth required pam_deny.so # cat /etc/pam.d/system-auth
      #%PAM-1.0 # This file is auto-generated. # User changes will be destroyed the
      next time authconfig is run. auth required pam_env.so auth required
      pam_faillock.so preauth audit silent deny=5 unlock_time=900 auth [success=1
      default=bad] pam_unix.so auth [default=die] pam_faillock.so authfail audit
      deny=5 unlock_time=900 auth sufficient pam_faillock.so authsucc audit deny=5
      unlock_time=900 auth required pam_deny.so Note: If a user has been locked out
      because they have reached the maximum consecutive failure count defined by
      deny= in the pam_faillock.so module, the user can be unlocked by issuing the
      command /usr/sbin/faillock -u --reset. This command sets the failed count to
      0, effectively unlocking the userid.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CENTOS_7_v1_1_0_6_3_3"
