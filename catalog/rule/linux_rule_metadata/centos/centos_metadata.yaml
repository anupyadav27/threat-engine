      Add the following lines to the /etc/audit/audit.rules file: -w
      /var/log/sudo.log -p wa -k actions Notes: The system must be configured with
      su disabled (See Item 5.6 Ensure access to the su command is restricted) to
      force all command execution through sudo. This will not be effective on the
