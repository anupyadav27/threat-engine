  - rule_id: centos.cis.5.at_cron_is_restricted_to_authorized_users
    title: "Ensure at/cron is restricted to authorized users"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v2.0.0"
    cis_version: "7_v2.0.0"
    cis_control: "5.1.8"
    cis_section: "5"
    profile_applicability: "Level 1"
    description: >
      Configure /etc/cron.allow and /etc/at.allow to allow specific users to use
      these services. If /etc/cron.allow or /etc/at.allow do not exist, then
      /etc/at.deny and /etc/cron.deny are checked. Any user not specifically defined
      in those files is allowed to use at and cron. By removing the files, only
      users in /etc/cron.allow and /etc/at.allow are allowed to use at and cron.
      Note that even though a given user is not listed in cron.allow, cron jobs can
      still be run as that user. The cron.allow file only controls administrative
      access to the crontab command for scheduling and modifying cron jobs.
    rationale: >
      On many systems, only the system administrator is authorized to schedule cron
      jobs. Using the cron.allow file to control who can run cron jobs enforces this
      policy. It is easier to manage an allow list than a deny list. In a deny list,
      you could potentially add a user ID to the system and forget to add it to the
      deny files.
    audit_procedure: >
      Run the following commands and ensure /etc/cron.deny and /etc/at.deny do not
      exist: # stat /etc/cron.deny stat: cannot stat `/etc/cron.deny': No such file
      or directory # stat /etc/at.deny stat: cannot stat `/etc/at.deny': No such
      file or directory Run the following command and verify Uid and Gid are both
      0/root and Access does not grant permissions to group or other for both
      /etc/cron.allow and /etc/at.allow: # stat /etc/cron.allow Access:
      (0600/-rw-------) Uid: ( 0/ root) Gid: ( 0/ root) # stat /etc/at.allow Access:
      (0600/-rw-------) Uid: ( 0/ root) Gid: ( 0/ root)
    remediation: >
      Run the following commands to remove /etc/cron.deny and /etc/at.deny and
      create and set permissions and ownership for /etc/cron.allow and
      /etc/at.allow: 218 | P a g e # rm /etc/cron.deny # rm /etc/at.deny # touch
      /etc/cron.allow # touch /etc/at.allow # chmod og-rwx /etc/cron.allow # chmod
      og-rwx /etc/at.allow # chown root:root /etc/cron.allow # chown root:root
      /etc/at.allow 219 | P a g e 5.2 SSH Server Configuration SSH is a secure,
      encrypted replacement for common login services such as telnet, ftp, rlogin,
      rsh, and rcp. It is strongly recommended that sites abandon older clear-text
      login protocols and use SSH to prevent session hijacking and sniffing of
      sensitive data off the network. Note: The recommendations in this section only
      apply if the SSH daemon is installed on the system, if remote access is not
      required the SSH daemon can be removed and this section skipped. Note: Once
      all configuration changes have been made to /etc/ssh/sshd_config, the sshd
      configuration must be reloaded: # service sshd reload
    references: >
      
