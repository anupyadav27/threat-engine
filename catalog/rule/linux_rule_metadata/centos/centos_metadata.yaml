  - rule_id: centos.cis.5.collect_unsuccessful_unauthorized_access_attempts
    title: "Collect Unsuccessful Unauthorized Access Attempts to Files"
    severity: medium
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v1.1.0"
    cis_version: "7_v1.1.0"
    cis_control: "5.2.11"
    cis_section: "5"
    profile_applicability: "Level 2"
    description: >
      Monitor for unsuccessful attempts to access files. The parameters below are
      associated with system calls that control creation (creat), opening (open,
      openat) and truncation (truncate, ftruncate) of files. An audit log record
      will only be written if the user is a non- privileged user (auid > = 1000), is
      not a Daemon event (auid=4294967295) and if the system call returned EACCES
      (permission denied to the file) or EPERM (some other permanent error
      associated with the specific system call). All audit records will be tagged
      with the identifier 'access.'
    rationale: >
      Failed attempts to open, create or truncate files could be an indication that
      an individual or process is trying to gain unauthorized access to the system.
    audit_procedure: >
      On 64 bit systems, perform the following command and ensure the output is as
      shown to determine if there are unsuccessful attempts to access files. Note:
      '-a always,exit' may be specified as '-a exit,always'. # grep access
      /etc/audit/audit.rules -a always,exit -F arch=b64 -S creat -S open -S openat
      -S truncate -S ftruncate \ -F exit=-EACCES -F auid>=1000 -F auid!=4294967295
      -k access -a always,exit -F arch=b32 -S creat -S open -S openat -S truncate -S
      ftruncate \ -F exit=-EACCES -F auid>=1000 -F auid!=4294967295 -k access -a
      always,exit -F arch=b64 -S creat -S open -S openat -S truncate -S ftruncate \
      -F exit=-EPERM -F auid>=1000 -F auid!=4294967295 -k access -a always,exit -F
      arch=b32 -S creat -S open -S openat -S truncate -S ftruncate \ -F exit=-EPERM
      -F auid>=1000 -F auid!=4294967295 -k access On 32 bit systems, perform the
      following command and ensure the output is as shown to determine if there are
      unsuccessful attempts to access files. Note: '-a always,exit' may be specified
      as '-a exit,always'. # grep access /etc/audit/audit.rules -a always,exit -F
      arch=b32 -S creat -S open -S openat -S truncate -S ftruncate \ -F exit=-EACCES
      -F auid>=1000 -F auid!=4294967295 -k access -a always,exit -F arch=b32 -S
      creat -S open -S openat -S truncate -S ftruncate \ -F exit=-EPERM -F
      auid>=1000 -F auid!=4294967295 -k access 101 | P a g e
    remediation: >
      For 64 bit systems, add the following lines to the /etc/audit/audit.rules
      file. -a always,exit -F arch=b64 -S creat -S open -S openat -S truncate -S
      ftruncate \ -F exit=-EACCES -F auid>=1000 -F auid!=4294967295 -k access -a
      always,exit -F arch=b32 -S creat -S open -S openat -S truncate -S ftruncate \
      -F exit=-EACCES -F auid>=1000 -F auid!=4294967295 -k access -a always,exit -F
      arch=b64 -S creat -S open -S openat -S truncate -S ftruncate \ -F exit=-EPERM
      -F auid>=1000 -F auid!=4294967295 -k access -a always,exit -F arch=b32 -S
      creat -S open -S openat -S truncate -S ftruncate \ -F exit=-EPERM -F
      auid>=1000 -F auid!=4294967295 -k access # Execute the following command to
      restart auditd # pkill -HUP -P 1 auditd For 32 bit systems, add the following
      lines to the /etc/audit/audit.rules file. -a always,exit -F arch=b32 -S creat
      -S open -S openat -S truncate -S ftruncate \ -F exit=-EACCES -F auid>=1000 -F
      auid!=4294967295 -k access -a always,exit -F arch=b32 -S creat -S open -S
      openat -S truncate -S ftruncate \ -F exit=-EPERM -F auid>=1000 -F
      auid!=4294967295 -k access # Execute the following command to restart auditd #
      pkill -HUP -P 1 auditd
