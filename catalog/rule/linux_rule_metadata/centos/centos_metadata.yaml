  - rule_id: centos.cis.1.bind_mount_the_var_tmp_directory_to_tmp
    title: "Bind Mount the /var/tmp directory to /tmp"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v1.1.0"
    cis_version: "7_v1.1.0"
    cis_control: "1.1.6"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      The /var/tmp directory is normally a standalone directory in the /var file
      system. Binding /var/tmp to /tmp establishes an unbreakable link to /tmp that
      cannot be removed (even by the root user). It also allows /var/tmp to inherit
      the same mount options that /tmp owns, allowing /var/tmp to be protected in
      the same /tmp is protected. It will also prevent /var from filling up with
      temporary files as the contents of /var/tmp will actually reside in the file
      system containing /tmp.
    rationale: >
      All programs that use /var/tmp and /tmp to read/write temporary files will
      always be written to the /tmp file system, preventing a user from running the
      /var file system out of space or trying to perform operations that have been
      blocked in the /tmp filesystem.
    audit_procedure: >
      Perform the following to determine if the system is configured as recommended:
      # grep -e '^/tmp[[:space:]]' /etc/fstab | grep /var/tmp /tmp /var/tmp none
      none 0 0 # mount | grep -e '^/tmp[[:space:]]' | grep /var/tmp /tmp on /var/tmp
      type none (rw,bind) If the above commands emit no output then the system is
      not configured as recommended.
    remediation: >
      # mount --bind /tmp /var/tmp and edit the /etc/fstab file to contain the
      following line: /tmp /var/tmp none bind 0 0
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CENTOS_7_v1_1_0_1_1_6"
      nist_800_53: []
      soc2: []
      pci_dss: []
