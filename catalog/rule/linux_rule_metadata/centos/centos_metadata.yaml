  - rule_id: centos.cis.5.collect_system_administrator_actions_sudolog
    title: "Collect System Administrator Actions (sudolog)"
    severity: medium
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v1.1.0"
    cis_version: "7_v1.1.0"
    cis_control: "5.2.16"
    cis_section: "5"
    profile_applicability: "Level 2"
    description: >
      Monitor the sudo log file. If the system has been properly configured to
      disable the use of the su command and force all administrators to have to log
      in first and then use sudo to execute privileged commands, then all
      administrator commands will be logged to /var/log/sudo.log. Any time a command
      is executed, an audit event will be triggered as 106 | P a g e the
      /var/log/sudo.log file will be opened for write and the executed
      administration command will be written to the log.
    rationale: >
      Changes in /var/log/sudo.log indicate that an administrator has executed a
      command or the log file itself has been tampered with. Administrators will
      want to correlate the events written to the audit trail with the records
      written to /var/log/sudo.log to verify if unauthorized commands have been
      executed.
    audit_procedure: >
      Perform the following to determine if administrator activity is recorded. #
      grep actions /etc/audit/audit.rules -w /var/log/sudo.log -p wa -k actions
    remediation: >
      Add the following lines to the /etc/audit/audit.rules file. -w
      /var/log/sudo.log -p wa -k actions # Execute the following command to restart
      auditd # pkill -HUP -P 1 auditd Note: The system must be configured with su
      disabled (See Item 7.6 Restrict Access to the su Command) to force all command
      execution through sudo. This will not be effective on the console, as
      administrators can log in as root.
