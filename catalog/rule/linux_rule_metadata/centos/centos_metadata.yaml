  - rule_id: centos.cis.3.configure_network_time_protocol_ntp
    title: "Configure Network Time Protocol (NTP)"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v1.1.0"
    cis_version: "7_v1.1.0"
    cis_control: "3.6"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The Network Time Protocol (NTP) is designed to synchronize system clocks
      across a variety of systems and use a source that is highly accurate. The
      version of NTP delivered with CentOS can be found at http://www.ntp.org. NTP
      can be configured to be a client and/or a server.
    rationale: >
      It is recommended that physical systems and virtual guests lacking direct
      access to the physical host's clock be configured as NTP clients to
      synchronize their clocks (especially to support time sensitive security
      mechanisms like Kerberos). This also ensures log files have consistent time
      records across the enterprise, which aids in forensic investigations.
    audit_procedure: >
      The following script checks for the correct parameters on restrict default and
      restrict -6 default: # grep 'restrict default' /etc/ntp.conf restrict default
      kod nomodify notrap nopeer noquery # grep 'restrict -6 default' /etc/ntp.conf
      restrict -6 default kod nomodify notrap nopeer noquery Perform the following
      to determine if the system is configured to use an NTP Server and that the ntp
      daemon is running as an unprivileged user. # grep '^server' /etc/ntp.conf
      server # grep 'ntp:ntp' /etc/sysconfig/ntpd OPTIONS='-u ntp:ntp -p
      /var/run/ntpd.pid'
    remediation: >
      Set the following restrict parameters in /etc/ntp.conf: restrict default kod
      nomodify notrap nopeer noquery restrict -6 default kod nomodify notrap nopeer
      noquery Also, make sure /etc/ntp.conf has an NTP server specified: 56 | P a g
      e server <ntp-server> Note: <ntp-server> is the IP address or hostname of a
      trusted time server. Configuring an NTP server is outside the scope of this
      benchmark. Ensure -u ntp:ntp in options in /etc/sysconfig/ntpd: OPTIONS='-u
      ntp:ntp' References: 1. For more information on configuring NTP servers, go to
      the NTP homepage at http://www.ntp.org.
    references: >
      1. For more information on configuring NTP servers, go to the NTP homepage at
      http://www.ntp.org.
    impact: >
      
    compliance_mappings:
