      is installed on the system: # rpm -q xorg-x11-server-common package
      xorg-x11-server-common is not installed
    remediation: >
      Change the default runlevel to multi user without X: # cd
      /etc/lib/systemd/system/ # unlink default.target # ln -s
      /usr/lib/systemd/system/multi-user.target default.target Uninstall the X
      Window Server: # yum remove xorg-x11-server-common
