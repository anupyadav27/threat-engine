  - rule_id: centos.cis.9.user_dot_file_permissions
    title: "Check User Dot File Permissions"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v1.1.0"
    cis_version: "7_v1.1.0"
    cis_control: "9.2.8"
    cis_section: "9"
    profile_applicability: "Level 1"
    description: >
      While the system administrator can establish secure permissions for users'
      'dot' files, the users can easily override these.
    rationale: >
      Group or world-writable user configuration files may enable malicious users to
      steal or modify other users' data or to gain another user's system privileges.
    audit_procedure: >
      #!/bin/bash for dir in `/bin/cat /etc/passwd | /bin/egrep -v
