      auid!=4294967295 -k perm_mod -a always,exit -F arch=b32 -S setxattr -S
      lsetxattr -S fsetxattr -S removexattr -S \ lremovexattr -S fremovexattr -F
      auid>=1000 -F auid!=4294967295 -k perm_mod # Execute the following command to
      restart auditd # pkill -HUP -P 1 auditd For 32 bit systems, add the following
      lines to the /etc/audit/audit.rules file. -a always,exit -F arch=b32 -S chmod
      -S fchmod -S fchmodat -F auid>=1000 \ -F auid!=4294967295 -k perm_mod -a
      always,exit -F arch=b32 -S chown -S fchown -S fchownat -S lchown -F auid>=1000
