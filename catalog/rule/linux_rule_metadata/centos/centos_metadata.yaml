  - rule_id: centos.cis.6.users_home_directories_permissions_are_750_or
    title: "Ensure users' home directories permissions are 750 or more restrictive"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v2.0.0"
    cis_version: "7_v2.0.0"
    cis_control: "6.2.8"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      While the system administrator can establish secure permissions for users'
      home directories, the users can easily override these.
    rationale: >
      Group or world-writable user home directories may enable malicious users to
      steal or modify other users' data or to gain another user's system privileges.
    audit_procedure: >
      Run the following script and verify no results are returned: #!/bin/bash for
      dir in `cat /etc/passwd | egrep -v '(root|halt|sync|shutdown)' | awk -F: '($7
      != '/sbin/nologin') { print $6 }'`; do dirperm=`ls -ld $dir | cut -f1 -d' '`
      if [ `echo $dirperm | cut -c6 ` != '-' ]; then echo 'Group Write permission
      set on directory $dir' fi if [ `echo $dirperm | cut -c8 ` != '-' ]; then echo
      'Other Read permission set on directory $dir' fi if [ `echo $dirperm | cut -c9
      ` != '-' ]; then echo 'Other Write permission set on directory $dir' fi if [
      `echo $dirperm | cut -c10 ` != '-' ]; then echo 'Other Execute permission set
      on directory $dir' fi done
    remediation: >
      Making global modifications to user home directories without alerting the user
