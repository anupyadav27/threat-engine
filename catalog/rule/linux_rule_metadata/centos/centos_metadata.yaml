  - rule_id: centos.cis.6.restrict_at_daemon
    title: "Restrict at Daemon"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v1.1.0"
    cis_version: "7_v1.1.0"
    cis_control: "6.1.10"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      116 | P a g e The at daemon works with the cron daemon to allow non-privileged
      users to submit one time only jobs at their convenience. There are two files
      that control at: /etc/at.allow and /etc/at.deny. If /etc/at.allow exists, then
      users listed in the file are the only ones that can create at jobs. If
      /etc/at.allow does not exist and /etc/at.deny does exist, then any user on the
      system, with the exception of those listed in /etc/at.deny, are allowed to
      execute at jobs. An empty /etc/at.deny file allows any user to create at jobs.
      If neither /etc/at.allow nor /etc/at.deny exist, then only superuser can
      create at jobs. The commands below remove the /etc/at.deny file and create an
      empty /etc/at.allow file that can only be read and modified by user and group
      root.
    rationale: >
      Granting write access to this directory for non-privileged users could provide
      them the means to gain unauthorized elevated privileges. Granting read access
      to this directory could give an unprivileged user insight in how to gain
      elevated privileges or circumvent auditing controls. In addition, it is a
      better practice to create a white list of users who can execute at jobs versus
      a blacklist of users who can't execute at jobs as a system administrator will
      always know who can create jobs and does not have to worry about remembering
      to add a user to the blacklist when a new user id is created.
    audit_procedure: >
      Perform the following to determine if at jobs are restricted. # stat -L
      /etc/at.deny > /dev/null # stat -L -c '%a %u %g' /etc/at.allow | egrep '.00 0
      0' If the above command emits no output then the system is not configured as
      recommended.
    remediation: >
      # rm /etc/at.deny # touch /etc/at.allow # chown root:root /etc/at.allow #
      chmod og-rwx /etc/at.allow
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CENTOS_7_v1_1_0_6_1_10"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_centos_7_v1_1_0_6_1_10"
