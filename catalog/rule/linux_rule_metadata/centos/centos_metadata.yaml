  - rule_id: centos.cis.6.all_users_home_directories_exist
    title: "Ensure all users' home directories exist"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v2.0.0"
    cis_version: "7_v2.0.0"
    cis_control: "6.2.7"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      Users can be defined in /etc/passwd without a home directory or with a home
      directory that does not actually exist.
    rationale: >
      If the user's home directory does not exist or is unassigned, the user will be
      placed in '/' and will not be able to write any files or have local
      environment variables set.
    audit_procedure: >
      Run the following script and verify no results are returned: #!/bin/bash cat
      /etc/passwd | awk -F: '{ print $1 ' ' $3 ' ' $6 }' | while read user uid dir;
      do if [ $uid -ge 1000 -a ! -d '$dir' -a $user != 'nfsnobody' ]; then echo 'The
      home directory ($dir) of user $user does not exist.' fi done
    remediation: >
      If any users' home directories do not exist, create them and make sure the
      respective user owns the directory. Users without an assigned home directory
      should be removed or assigned a home directory as appropriate. 284 | P a g e
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CENTOS_7_v2_0_0_6_2_7"
