  - rule_id: centos.cis.6.set_password_creation_requirement_parameters
    title: "Set Password Creation Requirement Parameters Using pam_pwquality"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v1.1.0"
    cis_version: "7_v1.1.0"
    cis_control: "6.3.2"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      The pam_pwquality module checks of the strength of passwords. It performs
      checks such as making sure a password is not a dictionary word, it is a
      certain length, contains a mix of characters (e.g. alphabet, numeric, other)
      and more. The following are definitions of the pam_pwquality.so options. 
      try_first_pass - retrieve the password from a previous stacked PAM module. If
      not available, then prompt the user for a password.  retry=3 - Allow 3 tries
      before sending back a failure. The following options are set in the
      /etc/security/pwquality.conf file:  minlen=14 - password must be 14
      characters or more  dcredit=-1 - provide at least 1 digit  ucredit=-1 -
      provide at least one uppercase character  ocredit=-1 - provide at least one
      special character  lcredit=-1 - provide at least one lowercase character The
      setting shown above is one possible policy. Alter these values to conform to
      your own organization's password policies.
    rationale: >
      Strong passwords protect systems from being hacked through brute force
      methods.
    audit_procedure: >
      Perform the following to determine the current settings in the
      /etc/pam.d/system- auth file. 131 | P a g e # grep pam_pwquality.so
      /etc/pam.d/system-auth password requisite pam_pwquality.so try_first_pass
      local_users_only retry=3 authtok_type= Check settings in
      /etc/security/pwquality.conf: minlen=14 dcredit=-1 ucredit=-1 ocredit=-1
      lcredit=-1
    remediation: >
      Set the pam_pwquality.so parameters as follows in /etc/pam.d/system-auth:
      password requisite pam_pwquality.so try_first_pass local_users_only retry=3
      authtok_type= Set the following settings in /etc/security/pwquality.conf:
      minlen=14 dcredit=-1 ucredit=-1 ocredit=-1 lcredit=-1
