  - rule_id: centos.cis.3.configure_mail_transfer_agent_for_local_only_mode
    title: "Configure Mail Transfer Agent for Local-Only Mode"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v1.1.0"
    cis_version: "7_v1.1.0"
    cis_control: "3.16"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Mail Transfer Agents (MTA), such as sendmail and Postfix, are used to listen
      for incoming mail and transfer the messages to the appropriate user or mail
      server. If the system is not intended to be a mail server, it is recommended
      that the MTA be configured to only process local mail. By default, the MTA is
      set to loopback mode on CentOS.
    rationale: >
      The software for all Mail Transfer Agents is complex and most have a long
      history of security issues. While it is important to ensure that the system
      can process local mail messages, it is not necessary to have the MTA's daemon
      listening on a port unless the server is intended to be a mail server that
      receives and processes mail from other systems.
    audit_procedure: >
      Perform the following command and make sure that the MTA is listening on the
      loopback address (127.0.0.1): # netstat -an | grep LIST | grep
      ':25[[:space:]]' tcp 0 0 127.0.0.1:25 0.0.0.0:* LISTEN
    remediation: >
      Edit /etc/postfix/main.cf and add the following line to the RECEIVING MAIL
      section. If the line already exists, change it to look like the line below.
      inet_interfaces = localhost # Execute the following command to restart postfix
      # service postfix restart 63 | P a g e 4 Network Configuration and Firewalls
      This section provides guidance for secure network and firewall configuration.
      4.1 Modify Network Parameters (Host Only) The following network parameters
      determine if the system is to act as a host only . A system is considered host
      only if the system has a single interface, or has multiple interfaces but will
      not be configured as a router.
