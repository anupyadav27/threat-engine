  - rule_id: centos.cis.9.reserved_uids_are_assigned_to_system_accounts
    title: "Check That Reserved UIDs Are Assigned to System Accounts"
    severity: high
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v1.1.0"
    cis_version: "7_v1.1.0"
    cis_control: "9.2.16"
    cis_section: "9"
    profile_applicability: "Level 1"
    description: >
      Traditionally, UNIX systems establish 'reserved' UIDs (0-999 range) that are
      intended for system accounts.
    rationale: >
      If a user is assigned a UID that is in the reserved range, even if it is not
      presently in use, security exposures can arise if a subsequently installed
      application uses the same UID.
    audit_procedure: >
      This script checks to make sure that 'reserved' UIDs (0-499 range) are not
      assigned to non-system (default) accounts. #!/bin/bash defUsers='root bin
      daemon adm lp sync shutdown halt mail news uucp operator games gopher ftp
      nobody nscd vcsa rpc mailnull smmsp pcap ntp dbus avahi sshd rpcuser nfsnobody
      haldaemon avahi-autoipd distcache apache oprofile webalizer dovecot squid
      named xfs gdm sabayon usbmuxd rtkit abrt saslauth pulse postfix tcpdump'
      /bin/cat /etc/passwd |\ /bin/awk -F: '($3 < 1000) { print $1' '$3 }' |\ while
      read user uid; do found=0 for tUser in ${defUsers} do if [ ${user} = ${tUser}
      ]; then found=1 fi done if [ $found -eq 0 ]; then echo 'User $user has a
      reserved UID ($uid).' fi done
    remediation: >
      Based on the results of the script, change any UIDs that are in the reserved
      range to one that is in the user range. Review all files owned by the reserved
      UID to determine which UID they are supposed to belong to.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_CENTOS_7_v1_1_0_9_2_16"
      nist_800_53: []
