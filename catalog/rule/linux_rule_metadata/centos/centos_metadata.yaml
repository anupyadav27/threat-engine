  - rule_id: centos.cis.5.collect_use_of_privileged_commands
    title: "Collect Use of Privileged Commands"
    severity: medium
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v1.1.0"
    cis_version: "7_v1.1.0"
    cis_control: "5.2.12"
    cis_section: "5"
    profile_applicability: "Level 2"
    description: >
      Monitor privileged programs (those that have the setuid and/or setgid bit set
      on execution) to determine if unprivileged users are running these commands.
    rationale: >
      Execution of privileged commands by non-privileged users could be an
      indication of someone trying to gain unauthorized access to the system.
    audit_procedure: >
      Verify that an audit line for each setuid/setgid program identified in the
      find command appears in the audit file with the above attributes.
    remediation: >
      102 | P a g e To remediate this issue, the system administrator will have to
      execute a find command to locate all the privileged programs and then add an
      audit line for each one of them. The audit parameters associated with this are
      as follows: -F path=' $1 ' - will populate each file name found through the
      find command and processed by awk. -F perm=x - will write an audit record if
      the file is executed. -F auid>=1000 - will write a record if the user
      executing the command is not a privileged user. -F auid!= 4294967295 - will
      ignore Daemon events All audit records will be tagged with the identifier
      'privileged.' # find PART -xdev \( -perm -4000 -o -perm -2000 \) -type f | awk
      '{print \ '-a always,exit -F path=' $1 ' -F perm=x -F auid>=1000 -F
      auid!=4294967295 \ -k privileged' }' Next, add those lines to the
      /etc/audit/audit.rules file.
