  - rule_id: centos.cis.1.separate_partition_exists_for_var_log
    title: "Ensure separate partition exists for /var/log"
    severity: medium
    category: linux
    tech_type: centos
    automation_type: manual
    cis_benchmark: "CIS_CENTOS 7_v2.0.0"
    cis_version: "7_v2.0.0"
    cis_control: "1.1.11"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      The /var/log directory is used by system services to store log data .
    rationale: >
      There are two important reasons to ensure that system logs are stored on a
      separate partition: protection against resource exhaustion (since logs can
      grow quite large) and protection of audit data.
    audit_procedure: >
      Run the following command and verify output shows /var/log is mounted: # mount
      | grep /var/log /dev/xvdh1 on /var/log type ext4 (rw,relatime,data=ordered)
    remediation: >
      For new installations, during installation create a custom partition setup and
      specify a separate partition for /var/log. For systems that were previously
      installed, create a new partition and configure /etc/fstab as appropriate.
      Impact: Resizing filesystems is a common activity in cloud-hosted servers.
      Separate filesystem partitions may prevent successful resizing, or may require
      the installation of additional tools solely for the purpose of resizing
      operations. The use of these additional tools may introduce their own security
      considerations. References: 1. AJ Lewis, 'LVM HOWTO',
      http://tldp.org/HOWTO/LVM-HOWTO/ 37 | P a g e
    references: >
