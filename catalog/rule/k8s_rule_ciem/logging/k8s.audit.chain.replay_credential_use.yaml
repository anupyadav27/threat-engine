rule_id: k8s.audit.chain.replay_credential_use
service: logging
provider: k8s
check_type: log
severity: high
title: Detect behavioral chains of credential reuse across pods/nodes indicating potential
  replay attacks in audit logs.
description: Detects chains of credential reuse across pods/nodes.
rationale: Monitoring this activity is essential for detecting adversary credential
  access against K8S resources. Unauthorized or unexpected API calls may indicate
  account compromise, privilege escalation, or an active attack chain.
threat_category: credential_access
mitre_tactics:
- credential_access
mitre_techniques:
- T1550
- T1212
risk_score: 78
resource: k8s_logging_resource
source: csv_generated
is_active: true
domain: identity_and_access_management
action_category: audit_activity
log_source_type: k8s_audit_log
posture_category: threat_posture
threat_tags:
- T1550
- T1212
- credential_access
- ciem_detection
- attack_chain
risk_indicators:
  actor_type: cloud_principal
  action_type: read
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  nist_800_171:
  - 3.5.4
remediation: '1. Lock the account or invalidate the session immediately if replay
  or brute force confirmed.

  2. Force MFA re-enrollment and rotate all API keys/secrets for the affected principal.

  3. Review all actions taken by the principal in the surrounding time window.

  4. Enforce account lockout policies after N failed attempts.

  5. Enable anomaly detection alerts for repeated authentication failures.'
references:
- https://attack.mitre.org/techniques/T1550/
- https://attack.mitre.org/techniques/T1212/
- https://kubernetes.io/docs/tasks/debug/debug-cluster/audit/
check_config:
  events:
  - conditions:
      all:
      - field: source_type
        op: equals
        value: k8s_audit
      - field: resource
        op: equals
        value: pods
      - field: verb
        op: in
        value:
        - create
        - update
        - delete
  - conditions:
      all:
      - field: source_type
        op: equals
        value: k8s_audit
      - field: resource
        op: equals
        value: pods
      - field: verb
        op: in
        value:
        - create
        - update
        - delete
  type: sequence
  window_seconds: 600
  version: '1.0'
