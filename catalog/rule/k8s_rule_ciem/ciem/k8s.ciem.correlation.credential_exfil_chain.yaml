rule_id: k8s.ciem.correlation.credential_exfil_chain
service: ciem
provider: k8s
check_type: log_correlation
severity: critical
title: 'K8s: Credential Exfiltration Chain — Secret List + External Service'
description: 'Correlated credential exfiltration: bulk Secrets enumeration followed by Service with external IP creation — secrets harvested and an exfiltration channel established.'
rationale: 'Adversaries search local file systems, remote file shares, and cloud storage for files containing insecurely stored credentials — including config files, source code, .env files, and shell history. Cloud-specific targets include ~/.aws/credentials, terraform.tfstate (containing plaintext secrets), and container environment variable dumps. Detected via: file read access to .env/.xml/.ps1/config files, grep commands targeting credential patterns, and container process access to mounted secret paths.'
threat_category: data_exfiltration
mitre_tactics:
- credential_access
- exfiltration
mitre_techniques:
- T1552.001
- T1205
risk_score: 96
resource: k8s_secret
source: default
is_active: true
domain: data_protection_and_privacy
action_category: exfiltration
posture_category: data_security_posture
threat_tags:
- T1552.001
- T1205
- T1552
- data_exfiltration
- data_loss
- ciem_correlation
- attack_chain
risk_indicators:
  actor_type: cloud_principal
  action_type: data_transfer
  target_type: cloud_resource
  blast_radius: tenant_or_account
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: true
  modules:
  - data_loss_prevention
  categories:
  - data_exfiltration
  - unauthorized_access
  priority: critical
  impact:
    pci: PCI DSS Requirement 12.3 — Implement security awareness program and protect systems
    gdpr: GDPR Article 32 — Appropriate technical and organizational measures for data security
    hipaa: §164.306(a) — Ensure confidentiality, integrity, and availability of ePHI
compliance_frameworks:
  cis_k8s_v1:
  - 5.4.1
  - 5.4.2
  - 5.7.4
  nist_800_53_r5:
  - AC-4
  - SC-28
  - SI-4
  pci_dss_v4:
  - 3.1
  - 4.1
  - 7.1
  iso_27001_2022:
  - A.8.12
  - A.5.12
  - A.8.10
detection_events:
- 's3:GetObject on .env / credentials files'
- EC2 metadata API call from unexpected source
- Container exec with grep/find credential patterns
remediation: |
  1. Revoke RBAC access for the principal that performed the unauthorized Secret/ConfigMap read.
  2. Rotate all secrets and credentials that may have been accessed.
  3. Enable K8s audit log alerting on bulk secrets/list or configmaps/list operations.
  4. Restrict data access using RBAC and namespace isolation for sensitive workloads.
  5. Use Vault or external secret stores with dynamic short-lived credentials.
references:
- https://attack.mitre.org/techniques/T1552/001/
- https://kubernetes.io/docs/concepts/configuration/secret/
- https://kubernetes.io/docs/concepts/security/secrets-good-practices/
check_config:
  events:
  - conditions:
      all:
      - field: source_type
        op: equals
        value: k8s_audit
      - field: resource
        op: equals
        value: secrets
      - field: verb
        op: equals
        value: list
  - conditions:
      all:
      - field: source_type
        op: equals
        value: k8s_audit
      - field: resource
        op: equals
        value: services
      - field: verb
        op: in
        value:
        - create
        - patch
  type: sequence
  window_seconds: 300
version: '1.0'
