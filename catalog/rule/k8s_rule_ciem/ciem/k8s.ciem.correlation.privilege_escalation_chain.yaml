rule_id: k8s.ciem.correlation.privilege_escalation_chain
service: ciem
provider: k8s
check_type: log_correlation
severity: critical
title: 'K8s: Privilege Escalation Chain — SA Create + ClusterRoleBinding'
description: 'Correlated privilege escalation: new ServiceAccount created followed immediately by ClusterRoleBinding granting it elevated permissions — classic attacker SA setup.'
rationale: 'Adversaries add roles or permissions to service accounts or workload identities to maintain persistent access to container orchestration systems. Creating Kubernetes RoleBindings or ClusterRoleBindings for attacker-controlled identities enables cluster-wide command execution. Detected via: high-privilege role assignments outside CI/CD automation, bindings from unfamiliar IP addresses, and unexpected ServiceAccount token creation.'
threat_category: privilege_escalation
mitre_tactics:
- privilege_escalation
mitre_techniques:
- T1098.006
- T1136.003
risk_score: 96
resource: k8s_cluster_role_binding
source: default
is_active: true
domain: identity_and_access_management
action_category: privilege_escalation
posture_category: iam_posture
threat_tags:
- T1098.006
- T1136.003
- T1098
- T1136
- cloud_iam
- privilege_escalation
- ciem_correlation
- attack_chain
risk_indicators:
  actor_type: cloud_principal
  action_type: privilege_change
  target_type: cloud_resource
  blast_radius: tenant_or_account
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - role_management
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_k8s_v1:
  - 5.1.1
  - 5.1.2
  - 5.1.3
  - 5.1.5
  nist_800_53_r5:
  - AC-2
  - AC-3
  - AC-6
  - IA-2
  pci_dss_v4:
  - 7.1
  - 7.2
  - 8.2
  iso_27001_2022:
  - A.5.18
  - A.8.2
  - A.8.3
detection_events:
- rolebindings/create
- clusterrolebindings/create
- serviceaccounts/create
remediation: |
  1. Immediately delete the unauthorized ClusterRoleBinding or RoleBinding.
  2. Audit all cluster-admin bindings: `kubectl get clusterrolebindings -o wide | grep cluster-admin`
  3. Enable OPA Gatekeeper or Kyverno policy to prevent cluster-admin binding creation by non-admins.
  4. Use just-in-time (JIT) access for privileged Kubernetes operations.
  5. Configure Falco rules to alert on ClusterRoleBinding creation outside CI/CD service accounts.
references:
- https://attack.mitre.org/techniques/T1098/006/
- https://kubernetes.io/docs/reference/access-authn-authz/rbac/
- https://www.cisa.gov/sites/default/files/2022-03/kubernetes-hardening-guidance-1.2-508c.pdf
check_config:
  events:
  - conditions:
      all:
      - field: source_type
        op: equals
        value: k8s_audit
      - field: resource
        op: equals
        value: serviceaccounts
      - field: verb
        op: equals
        value: create
  - conditions:
      all:
      - field: source_type
        op: equals
        value: k8s_audit
      - field: resource
        op: equals
        value: clusterrolebindings
      - field: verb
        op: equals
        value: create
  type: sequence
  window_seconds: 300
version: '1.0'
