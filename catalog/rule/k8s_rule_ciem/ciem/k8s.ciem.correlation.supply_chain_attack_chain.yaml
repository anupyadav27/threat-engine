rule_id: k8s.ciem.correlation.supply_chain_attack_chain
service: ciem
provider: k8s
check_type: log_correlation
title: 'K8s: Supply Chain Attack — Never-Pull Image → Privileged Container → Exec'
description: 'Correlated supply chain attack: Pod using imagePullPolicy=Never launched as privileged, followed by exec session — tampered local image executed with full host access.'
rationale: 'Adversaries deploy containers into environments using Docker APIs or Kubernetes control planes to facilitate execution or evade defenses by running malicious images outside standard deployment processes. Deployed containers can host C2 infrastructure, cryptomining workloads, or data exfiltration tools. Detected via: container create + start by non-admin principals, images not on an allowlist or using ''latest'' tag, privileged mode or host namespace mount at runtime, and unauthenticated Docker API access.'
threat_category: supply_chain_compromise
mitre_tactics:
- execution
- privilege_escalation
mitre_techniques:
- T1610
- T1611
- T1609
risk_score: 97
resource: k8s_pod
source: default
is_active: true
domain: configuration_and_change_management
action_category: create
posture_category: workload_posture
threat_tags:
- T1610
- T1611
- T1609
- supply_chain
- container_compromise
- ciem_correlation
- attack_chain
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: tenant_or_account
  stealth_risk: medium
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_k8s_v1:
  - 5.2.1
  - 5.5.1
  - 5.6.4
  nist_800_53_r5:
  - SA-12
  - SI-3
  - CM-7
  pci_dss_v4:
  - 6.3
  - 12.8
  iso_27001_2022:
  - A.5.19
  - A.5.20
  - A.8.30
detection_events:
- pods/create (Kubernetes audit)
- 'containers:create via Docker API'
- 'aks:CreatePod by non-CI/CD principal'
- Admission controller deny events (missing context = bypass attempt)
remediation: |
  1. Remove the unauthorized workload and quarantine the image for forensic analysis.
  2. Enable Binary Authorization or Kyverno policy to allowlist approved registries.
  3. Scan all cluster images with Trivy or Snyk for vulnerabilities and malicious code.
  4. Restrict image pull sources to internal registries via OPA/Kyverno admission policies.
  5. Enable Sigstore/Cosign image signing verification for all production deployments.
references:
- https://attack.mitre.org/techniques/T1610/
- https://kubernetes.io/docs/concepts/security/pod-security-admission/
check_config:
  events:
  - conditions:
      all:
      - field: source_type
        op: equals
        value: k8s_audit
      - field: resource
        op: equals
        value: pods
      - field: verb
        op: equals
        value: create
      - field: image_pull_policy
        op: equals
        value: Never
  - conditions:
      all:
      - field: source_type
        op: equals
        value: k8s_audit
      - field: resource
        op: equals
        value: pods
      - field: verb
        op: equals
        value: create
      - field: privileged_container
        op: equals
        value: true
  - conditions:
      all:
      - field: source_type
        op: equals
        value: k8s_audit
      - field: resource
        op: equals
        value: pods
      - field: subresource
        op: equals
        value: exec
      - field: verb
        op: equals
        value: create
  type: sequence
  window_seconds: 300
version: '1.0'
