rule_id: k8s.ciem.correlation.persistence_daemonset_chain
service: ciem
provider: k8s
check_type: log_correlation
severity: critical
title: 'K8s: Cluster-Wide Persistence Chain — DaemonSet + RBAC Grant'
description: 'Correlated cluster-wide persistence: DaemonSet created (cluster-wide execution) followed by ClusterRoleBinding — malicious workload granted ongoing cluster admin access.'
rationale: 'Adversaries add roles or permissions to service accounts or workload identities to maintain persistent access to container orchestration systems. Creating Kubernetes RoleBindings or ClusterRoleBindings for attacker-controlled identities enables cluster-wide command execution. Detected via: high-privilege role assignments outside CI/CD automation, bindings from unfamiliar IP addresses, and unexpected ServiceAccount token creation.'
threat_category: persistence
mitre_tactics:
- persistence
- privilege_escalation
mitre_techniques:
- T1543
- T1098.006
risk_score: 97
resource: k8s_daemonset
source: default
is_active: true
domain: identity_and_access_management
action_category: create
posture_category: iam_posture
threat_tags:
- T1543
- T1098.006
- T1098
- persistence
- backdoor
- ciem_correlation
- attack_chain
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: tenant_or_account
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_k8s_v1:
  - 5.1.1
  - 5.1.4
  - 5.4.1
  nist_800_53_r5:
  - AC-2
  - AC-6
  - CM-7
  pci_dss_v4:
  - 7.1
  - 8.2
  - 6.4
  iso_27001_2022:
  - A.5.18
  - A.8.19
detection_events:
- rolebindings/create
- clusterrolebindings/create
- serviceaccounts/create
remediation: |
  1. Delete the unauthorized DaemonSet, CronJob, or ServiceAccount immediately.
  2. Audit all resources in kube-system: `kubectl get all -n kube-system`
  3. Enable admission control policies restricting resource creation to known CI/CD identities.
  4. Use RBAC least-privilege: restrict create verbs on DaemonSets/CronJobs to dedicated service accounts.
  5. Monitor for new ServiceAccount creation via Falco or audit log alerting.
references:
- https://attack.mitre.org/techniques/T1543/
- https://kubernetes.io/docs/concepts/workloads/controllers/daemonset/
check_config:
  events:
  - conditions:
      all:
      - field: source_type
        op: equals
        value: k8s_audit
      - field: resource
        op: equals
        value: daemonsets
      - field: verb
        op: equals
        value: create
  - conditions:
      all:
      - field: source_type
        op: equals
        value: k8s_audit
      - field: resource
        op: equals
        value: clusterrolebindings
      - field: verb
        op: equals
        value: create
  type: sequence
  window_seconds: 300
version: '1.0'
