rule_id: k8s.rbac.audit.impersonation_used
service: rbac
provider: k8s
check_type: log
severity: high
title: 'RBAC: User Impersonation Detected'
description: Kubernetes user impersonation (--as flag) used — a principal is acting as a different user or service account, bypassing their own permission boundary.
rationale: 'Adversaries abuse Linux privilege escalation mechanisms within Kubernetes containers — including setuid/setgid binaries, Linux capabilities, and missing allowPrivilegeEscalation controls. Without explicit securityContext restrictions, a process inside a container can call execve() on a setuid binary to gain root (UID 0), directly enabling container escape chains (T1611). CIS Kubernetes Benchmark 5.2.5/5.2.6 require these controls to be explicitly set. Detected via: pods created without runAsNonRoot=true, pods created with allowPrivilegeEscalation unset or true, and setuid binary execution.'
threat_category: identity_manipulation
mitre_tactics:
- privilege_escalation
- lateral_movement
mitre_techniques:
- T1548
risk_score: 85
resource: k8s_user
source: default
is_active: true
domain: identity_and_access_management
action_category: create
posture_category: iam_posture
threat_tags:
- T1548
- cloud_iam
- identity_manipulation
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_k8s_v1:
  - 5.1.1
  - 5.1.2
  - 5.1.3
  nist_800_53_r5:
  - AC-2
  - AC-3
  - IA-4
  pci_dss_v4:
  - 7.1
  - 8.2
  iso_27001_2022:
  - A.5.18
  - A.8.2
detection_events:
- pods/create without securityContext.runAsNonRoot=true
- pods/create with allowPrivilegeEscalation unset or true
- pods/create with runAsUser=0
- setuid binary execution inside container namespace
remediation: |
  1. Remove the unauthorized ServiceAccount, Role, or binding immediately.
  2. Audit all service accounts and their bound roles: `kubectl get sa,rolebindings -A`
  3. Apply RBAC policies restricting ServiceAccount and Role creation to CI/CD pipelines.
  4. Enable audit alerting on identity resource creation outside normal deployment windows.
  5. Use Workload Identity (GKE, EKS, AKS) instead of legacy service account tokens.
references:
- https://attack.mitre.org/techniques/T1548/
- https://kubernetes.io/docs/reference/access-authn-authz/authentication/#user-impersonation
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: k8s_audit
    - field: impersonated_user
      op: exists
      value: null
version: '1.0'
