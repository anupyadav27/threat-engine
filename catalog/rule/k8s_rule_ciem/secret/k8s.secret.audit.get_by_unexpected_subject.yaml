rule_id: k8s.secret.audit.get_by_unexpected_subject
service: secret
provider: k8s
check_type: log
severity: high
title: 'Secret: Secret Accessed by Non-Application Subject'
description: Kubernetes Secret directly retrieved (get) by a user or service account outside the owning application — credential theft attempt.
rationale: 'Adversaries search local file systems, remote file shares, and cloud storage for files containing insecurely stored credentials — including config files, source code, .env files, and shell history. Cloud-specific targets include ~/.aws/credentials, terraform.tfstate (containing plaintext secrets), and container environment variable dumps. Detected via: file read access to .env/.xml/.ps1/config files, grep commands targeting credential patterns, and container process access to mounted secret paths.'
threat_category: credential_access
mitre_tactics:
- credential_access
mitre_techniques:
- T1552.001
risk_score: 78
resource: k8s_secret
source: default
is_active: true
domain: cryptography_and_key_management
action_category: read
posture_category: iam_posture
threat_tags:
- T1552.001
- T1552
- credential_access
- secret_exposure
risk_indicators:
  actor_type: cloud_principal
  action_type: read
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: true
  modules:
  - secrets_management
  categories:
  - secrets_exposure
  - credential_theft
  priority: high
  impact:
    pci: PCI DSS Requirement 3.4 — Sensitive authentication data must be protected
    gdpr: GDPR Article 32 — Appropriate technical measures to protect personal data
    hipaa: §164.312(e)(2)(ii) — Encryption of ePHI in transit and at rest
compliance_frameworks:
  cis_k8s_v1:
  - 5.1.6
  - 5.4.1
  - 5.4.2
  nist_800_53_r5:
  - IA-5
  - IA-8
  - SC-28
  pci_dss_v4:
  - 3.1
  - 8.3
  - 8.6
  iso_27001_2022:
  - A.8.5
  - A.8.6
  - A.5.17
detection_events:
- 's3:GetObject on .env / credentials files'
- EC2 metadata API call from unexpected source
- Container exec with grep/find credential patterns
remediation: |
  1. Rotate all secrets that were read by the unauthorized principal.
  2. Enable K8s audit log alerting on secrets/get and secrets/list for non-application subjects.
  3. Use external secret managers (Vault, AWS Secrets Manager) instead of K8s Secrets for sensitive data.
  4. Apply RBAC to restrict secrets access to only the service accounts that need them.
  5. Enable encryption at rest for etcd where K8s Secrets are stored.
references:
- https://attack.mitre.org/techniques/T1552/001/
- https://kubernetes.io/docs/concepts/configuration/secret/
- https://kubernetes.io/docs/concepts/security/secrets-good-practices/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: k8s_audit
    - field: resource
      op: equals
      value: secrets
    - field: verb
      op: equals
      value: get
version: '1.0'
