rule_id: k8s.service.audit.external_ip_added
service: service
provider: k8s
check_type: log
severity: high
title: 'Service: External IP Added to Service'
description: Kubernetes Service patched to add externalIPs or change type to LoadBalancer/NodePort — exposes cluster-internal service to the internet, creating unauthorized ingress.
rationale: Adversaries modify Kubernetes Service objects to add external load balancer IPs or NodePort configurations, exposing internal cluster services to the internet. This creates unauthorized ingress points for C2 traffic or data exfiltration. Detected via K8s audit logs for service patch/update operations adding externalIPs or changing type to NodePort/LoadBalancer.
threat_category: lateral_movement
mitre_tactics:
- command_and_control
- exfiltration
mitre_techniques:
- T1205
risk_score: 80
resource: k8s_service
source: default
is_active: true
domain: network_security_and_connectivity
action_category: create
log_source_type: k8s_audit
posture_category: network_posture
threat_tags:
- T1205
- lateral_movement
- cloud_pivot
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  cis_k8s_v1:
  - 5.2.5
  - 5.2.7
  - 5.7.1
  nist_800_53_r5:
  - AC-4
  - SC-7
  - SI-4
  pci_dss_v4:
  - 1.3
  - 7.2
  iso_27001_2022:
  - A.8.20
  - A.8.22
remediation: |
  1. Terminate the unauthorized kubectl exec or port-forward session immediately.
  2. Audit RBAC permissions: restrict pods/exec and pods/portforward to specific service accounts.
  3. Apply NetworkPolicies to prevent unauthorized pod-to-pod communication.
  4. Enable audit log alerting for exec/portforward operations by non-CI/CD users.
  5. Use Falco rules to detect and alert on interactive exec sessions in production namespaces.
references:
- https://attack.mitre.org/techniques/T1205/
- https://kubernetes.io/docs/concepts/services-networking/service/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: k8s_audit
    - field: resource
      op: equals
      value: services
    - field: verb
      op: in
      value:
      - create
      - update
      - patch
version: '1.0'
