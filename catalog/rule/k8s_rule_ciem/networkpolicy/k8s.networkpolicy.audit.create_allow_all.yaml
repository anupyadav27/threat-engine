rule_id: k8s.networkpolicy.audit.create_allow_all
service: networkpolicy
provider: k8s
check_type: log
severity: high
title: 'NetworkPolicy: Allow-All Policy Created'
description: NetworkPolicy created with empty podSelector and no ingress/egress restrictions — effectively allows all traffic to/from all pods in the namespace.
rationale: Adversaries use kubectl port-forward to establish encrypted tunnels to pods running internal services — exposing cluster-internal databases, APIs, or management interfaces to attacker-controlled endpoints. Port-forward activity by non-operator users outside maintenance windows indicates unauthorized access. Detected via K8s audit logs.
threat_category: lateral_movement
mitre_tactics:
- lateral_movement
mitre_techniques:
- T1572
risk_score: 78
resource: k8s_network_policy
source: default
is_active: true
domain: network_security_and_connectivity
action_category: network
log_source_type: k8s_audit
posture_category: network_posture
threat_tags:
- T1572
- lateral_movement
- cloud_pivot
risk_indicators:
  actor_type: cloud_principal
  action_type: network_change
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  cis_k8s_v1:
  - 5.2.5
  - 5.2.7
  - 5.7.1
  nist_800_53_r5:
  - AC-4
  - SC-7
  - SI-4
  pci_dss_v4:
  - 1.3
  - 7.2
  iso_27001_2022:
  - A.8.20
  - A.8.22
remediation: |
  1. Terminate the unauthorized kubectl exec or port-forward session immediately.
  2. Audit RBAC permissions: restrict pods/exec and pods/portforward to specific service accounts.
  3. Apply NetworkPolicies to prevent unauthorized pod-to-pod communication.
  4. Enable audit log alerting for exec/portforward operations by non-CI/CD users.
  5. Use Falco rules to detect and alert on interactive exec sessions in production namespaces.
references:
- https://attack.mitre.org/techniques/T1572/
- https://kubernetes.io/docs/tasks/access-application-cluster/port-forward-access-application-cluster/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: k8s_audit
    - field: resource
      op: equals
      value: networkpolicies
    - field: verb
      op: equals
      value: create
    - field: allow_all_ingress
      op: equals
      value: true
version: '1.0'
