rule_id: k8s.container.audit.auditd_mount_tamper
service: compute
provider: k8s
check_type: log
severity: high
title: Detect container auditd socket mount tampering and DaemonSet deployments that
  bypass host audit logging
description: Detects audit socket tampering and DaemonSet bypass, behavioral.
rationale: Monitoring this activity is essential for detecting adversary defense evasion
  against K8S resources. Unauthorized or unexpected API calls may indicate account
  compromise, privilege escalation, or an active attack chain.
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1562.001
risk_score: 80
resource: cloud_compute_instance
source: csv_generated
is_active: true
domain: logging_monitoring_and_alerting
action_category: modify
log_source_type: k8s_audit_log
posture_category: threat_posture
threat_tags:
- T1562.001
- T1562
- defense_evasion
- ciem_detection
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: high
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  cis_controls_v8:
  - 5.7.2
remediation: '1. Immediately investigate the principal that performed this action
  — treat as potentially compromised.

  2. Restore any disabled/deleted security controls (logging, agents, scanning).

  3. Review the full session context for lateral movement or data exfiltration following
  this action.

  4. Restrict the ability to disable security tools to break-glass roles with MFA
  enforcement.

  5. Add SCPs/Organization Policies to prevent non-authorized disablement of security
  controls.'
references:
- https://attack.mitre.org/techniques/T1562.001/
- https://kubernetes.io/docs/tasks/debug/debug-cluster/audit/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: k8s_audit
    - field: resource
      op: equals
      value: pods
    - field: verb
      op: in
      value:
      - create
      - update
      - delete
  type: log
  version: '1.0'
