rule_id: k8s.cronjob.audit.create
service: cronjob
provider: k8s
check_type: log
severity: high
title: 'CronJob: CronJob Created'
description: CronJob created outside normal CI/CD pipelines — scheduled recurring workloads used for persistent cryptomining, data exfiltration, or C2 callbacks.
rationale: Adversaries create Kubernetes CronJobs to schedule recurring malicious workloads — cryptomining, data exfiltration, or C2 callbacks — that survive pod restarts and operator intervention. CronJob creation outside normal CI/CD pipelines or with unusual schedules indicates adversary use. Detected via K8s audit logs for cronjobs/create.
threat_category: persistence
mitre_tactics:
- persistence
- execution
mitre_techniques:
- T1053
risk_score: 75
resource: k8s_cronjob
source: default
is_active: true
domain: identity_and_access_management
action_category: create
log_source_type: k8s_audit
posture_category: iam_posture
threat_tags:
- T1053
- persistence
- backdoor
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_k8s_v1:
  - 5.1.1
  - 5.1.4
  - 5.4.1
  nist_800_53_r5:
  - AC-2
  - AC-6
  - CM-7
  pci_dss_v4:
  - 7.1
  - 8.2
  - 6.4
  iso_27001_2022:
  - A.5.18
  - A.8.19
remediation: |
  1. Delete the unauthorized DaemonSet, CronJob, or ServiceAccount immediately.
  2. Audit all resources in kube-system: `kubectl get all -n kube-system`
  3. Enable admission control policies restricting resource creation to known CI/CD identities.
  4. Use RBAC least-privilege: restrict create verbs on DaemonSets/CronJobs to dedicated service accounts.
  5. Monitor for new ServiceAccount creation via Falco or audit log alerting.
references:
- https://attack.mitre.org/techniques/T1053/
- https://kubernetes.io/docs/concepts/workloads/controllers/cron-jobs/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: k8s_audit
    - field: resource
      op: equals
      value: cronjobs
    - field: verb
      op: equals
      value: create
version: '1.0'
