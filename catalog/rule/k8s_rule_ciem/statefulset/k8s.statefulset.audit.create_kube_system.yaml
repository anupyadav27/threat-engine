rule_id: k8s.statefulset.audit.create_kube_system
service: statefulset
provider: k8s
check_type: log
severity: high
title: 'StatefulSet: Created in kube-system Namespace'
description: StatefulSet created in kube-system namespace — persistent workload with stable network identity deployed in sensitive system namespace.
rationale: Adversaries create or modify DaemonSets to run malicious containers on every node in a cluster, achieving persistent code execution across the entire cluster infrastructure. DaemonSet creation in kube-system or with privileged containers is a strong persistence indicator. Detected via K8s audit logs for daemonsets/create in sensitive namespaces.
threat_category: persistence
mitre_tactics:
- persistence
mitre_techniques:
- T1543
risk_score: 80
resource: k8s_statefulset
source: default
is_active: true
domain: identity_and_access_management
action_category: create
log_source_type: k8s_audit
posture_category: iam_posture
threat_tags:
- T1543
- persistence
- backdoor
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_k8s_v1:
  - 5.1.1
  - 5.1.4
  - 5.4.1
  nist_800_53_r5:
  - AC-2
  - AC-6
  - CM-7
  pci_dss_v4:
  - 7.1
  - 8.2
  - 6.4
  iso_27001_2022:
  - A.5.18
  - A.8.19
remediation: |
  1. Delete the unauthorized DaemonSet, CronJob, or ServiceAccount immediately.
  2. Audit all resources in kube-system: `kubectl get all -n kube-system`
  3. Enable admission control policies restricting resource creation to known CI/CD identities.
  4. Use RBAC least-privilege: restrict create verbs on DaemonSets/CronJobs to dedicated service accounts.
  5. Monitor for new ServiceAccount creation via Falco or audit log alerting.
references:
- https://attack.mitre.org/techniques/T1543/
- https://kubernetes.io/docs/concepts/workloads/controllers/daemonset/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: k8s_audit
    - field: resource
      op: equals
      value: statefulsets
    - field: verb
      op: equals
      value: create
    - field: namespace
      op: equals
      value: kube-system
version: '1.0'
