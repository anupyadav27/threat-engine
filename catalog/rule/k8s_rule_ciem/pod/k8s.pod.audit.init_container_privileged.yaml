rule_id: k8s.pod.audit.init_container_privileged
service: pod
provider: k8s
check_type: log
severity: critical
title: 'Pod: Privileged Init Container Created'
description: Pod created with a privileged initContainer — init containers run before main containers and with full node capabilities if privileged=true.
rationale: 'Adversaries escape container or virtualized environment isolation to gain access to the underlying host, circumventing container security boundaries to access other containerized resources or the node''s credentials. Requires privileged container, hostPath mounts, or kernel exploit. Detected via: hostPath mounts to /proc or /sys, privileged container launches, unshare/keyctl/mount syscalls from container processes, and process execution outside container namespaces.'
threat_category: privilege_escalation
mitre_tactics:
- privilege_escalation
mitre_techniques:
- T1611
risk_score: 93
resource: k8s_pod
source: default
is_active: true
domain: identity_and_access_management
action_category: privilege_escalation
posture_category: iam_posture
threat_tags:
- T1611
- cloud_iam
- privilege_escalation
risk_indicators:
  actor_type: cloud_principal
  action_type: privilege_change
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_k8s_v1:
  - 5.1.1
  - 5.1.2
  - 5.1.3
  - 5.1.5
  nist_800_53_r5:
  - AC-2
  - AC-3
  - AC-6
  - IA-2
  pci_dss_v4:
  - 7.1
  - 7.2
  - 8.2
  iso_27001_2022:
  - A.5.18
  - A.8.2
  - A.8.3
detection_events:
- pods/create with securityContext.privileged=true
- pods/create with hostPath mount to /
- seccomp profile disabled or unconfined
- Container process fork outside namespace
remediation: |
  1. Immediately delete the unauthorized ClusterRoleBinding or RoleBinding.
  2. Audit all cluster-admin bindings: `kubectl get clusterrolebindings -o wide | grep cluster-admin`
  3. Enable OPA Gatekeeper or Kyverno policy to prevent cluster-admin binding creation by non-admins.
  4. Use just-in-time (JIT) access for privileged Kubernetes operations.
  5. Configure Falco rules to alert on ClusterRoleBinding creation outside CI/CD service accounts.
references:
- https://attack.mitre.org/techniques/T1611/
- https://kubernetes.io/docs/concepts/security/pod-security-standards/
- https://www.cisa.gov/sites/default/files/2022-03/kubernetes-hardening-guidance-1.2-508c.pdf
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: k8s_audit
    - field: resource
      op: equals
      value: pods
    - field: verb
      op: equals
      value: create
    - field: init_container_privileged
      op: equals
      value: true
version: '1.0'
