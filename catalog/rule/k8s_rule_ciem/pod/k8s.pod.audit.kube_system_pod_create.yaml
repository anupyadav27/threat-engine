rule_id: k8s.pod.audit.kube_system_pod_create
service: pod
provider: k8s
check_type: log
severity: critical
title: 'Pod: Pod Created in kube-system Namespace'
description: Pod created in the kube-system namespace by a non-cluster-admin — privileged namespace creation may inject malicious components into cluster management infrastructure.
rationale: 'Adversaries deploy containers into environments using Docker APIs or Kubernetes control planes to facilitate execution or evade defenses by running malicious images outside standard deployment processes. Deployed containers can host C2 infrastructure, cryptomining workloads, or data exfiltration tools. Detected via: container create + start by non-admin principals, images not on an allowlist or using ''latest'' tag, privileged mode or host namespace mount at runtime, and unauthenticated Docker API access.'
threat_category: persistence
mitre_tactics:
- persistence
- privilege_escalation
mitre_techniques:
- T1610
risk_score: 92
resource: k8s_pod
source: default
is_active: true
domain: identity_and_access_management
action_category: create
posture_category: iam_posture
threat_tags:
- T1610
- persistence
- backdoor
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_k8s_v1:
  - 5.1.1
  - 5.1.4
  - 5.4.1
  nist_800_53_r5:
  - AC-2
  - AC-6
  - CM-7
  pci_dss_v4:
  - 7.1
  - 8.2
  - 6.4
  iso_27001_2022:
  - A.5.18
  - A.8.19
detection_events:
- pods/create (Kubernetes audit)
- 'containers:create via Docker API'
- 'aks:CreatePod by non-CI/CD principal'
- Admission controller deny events (missing context = bypass attempt)
remediation: |
  1. Delete the unauthorized DaemonSet, CronJob, or ServiceAccount immediately.
  2. Audit all resources in kube-system: `kubectl get all -n kube-system`
  3. Enable admission control policies restricting resource creation to known CI/CD identities.
  4. Use RBAC least-privilege: restrict create verbs on DaemonSets/CronJobs to dedicated service accounts.
  5. Monitor for new ServiceAccount creation via Falco or audit log alerting.
references:
- https://attack.mitre.org/techniques/T1610/
- https://kubernetes.io/docs/concepts/security/pod-security-admission/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: k8s_audit
    - field: resource
      op: equals
      value: pods
    - field: verb
      op: equals
      value: create
    - field: namespace
      op: equals
      value: kube-system
version: '1.0'
