rule_id: azure.app_service.sites.deprecated_remote_debugging_should_be_turned_off_for_api_apps
service: app_service
resource: sites
title: '[Deprecated]: Remote debugging should be turned off for API Apps'
description: Remote debugging requires inbound ports to be opened on API apps. Remote debugging should be turned off. We recommend
  all customers who are still using API Apps to implement the built-in policy called 'App Service apps should have remote
  debugging turned off', which is scoped to include API apps in addition to Web Apps.
domain: application_and_api_security
severity: high
scope: app_service.sites
assertion_id: app_service.deprecated_remote_debugging_should_be_turned_off_for_api_apps
effect: AuditIfNotExists
resource_type: Microsoft.Web/sites
policy_id: e9c8d085-d9cc-4b17-9cdc-059f1f01f19e
source: azure_policy_builtin
