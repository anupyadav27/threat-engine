rule_id: azure.app_service.slots.app_service_app_slots_should_disable_ssh
service: app_service
resource: slots
title: App Service app slots should disable SSH
description: 'Azure App Service allows you to open an SSH session to a container running in the service. This feature should
  be disabled to ensure that SSH is not inadvertently left open on App Service apps, reducing the risk of unauthorized access.
  Learn more at: https://aka.ms/app-service-ssh'
domain: application_and_api_security
severity: high
scope: app_service.slots
assertion_id: app_service.app_service_app_slots_should_disable_ssh
effect: Audit
resource_type: Microsoft.Web/sites/slots
policy_id: a88d589f-2b09-4b50-8998-9a4e71d7b746
source: azure_policy_builtin
