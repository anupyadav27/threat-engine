rule_id: azure.app_service.sites.deprecated_ensure_that_http_version_is_the_latest_if_used_to_run_the_api_app
service: app_service
resource: sites
title: '[Deprecated]: Ensure that ''HTTP Version'' is the latest, if used to run the API app'
description: Periodically, newer versions are released for HTTP either due to security flaws or to include additional functionality.
  Using the latest HTTP version for web apps to take advantage of security fixes, if any, and/or new functionalities of the
  newer version. We recommend all customers who are still using API Apps to implement the built-in policy called 'App Service
  apps should use latest 'HTTP Version'', which is scoped to include API apps in addition to Web Apps.
domain: application_and_api_security
severity: high
scope: app_service.sites
assertion_id: app_service.deprecated_ensure_that_http_version_is_the_latest_if_used_to_run_the_api_app
effect: AuditIfNotExists
resource_type: Microsoft.Web/sites
policy_id: 991310cd-e9f3-47bc-b7b6-f57b557d07db
source: azure_policy_builtin
