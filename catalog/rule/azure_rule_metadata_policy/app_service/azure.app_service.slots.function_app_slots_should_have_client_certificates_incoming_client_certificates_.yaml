rule_id: azure.app_service.slots.function_app_slots_should_have_client_certificates_incoming_client_certificates_
service: app_service
resource: slots
title: Function app slots should have Client Certificates (Incoming client certificates)
  enabled
description: Client certificates allow for the app to request a certificate for incoming
  requests. Only clients that have a valid certificate will be able to reach the app.
  This policy applies to apps with Http version set to 1.1.
domain: application_and_api_security
severity: high
scope: app_service.slots
assertion_id: app_service.function_app_slots_should_have_client_certificates_incoming_client_certificates_
effect: AuditIfNotExists
resource_type: Microsoft.Web/sites/slots
policy_id: 153ab4ca-2d58-4b5d-9134-6d8c6bdd321c
source: azure_policy_builtin
mitre_techniques:
- T1190
mitre_tactics:
- initial-access
threat_tags:
- cloud-exposure
threat_category: initial_access
