rule_id: azure.app_service.sites.deprecated_api_app_should_only_be_accessible_over_https
service: app_service
resource: sites
title: '[Deprecated]: API App should only be accessible over HTTPS'
description: Use of HTTPS ensures server/service authentication and protects data
  in transit from network layer eavesdropping attacks. We recommend all customers
  who are still using API Apps to implement the built-in policy called 'App Service
  apps should only be accessible over HTTPS', which is scoped to include API apps
  in addition to Web Apps.
domain: application_and_api_security
severity: high
scope: app_service.sites
