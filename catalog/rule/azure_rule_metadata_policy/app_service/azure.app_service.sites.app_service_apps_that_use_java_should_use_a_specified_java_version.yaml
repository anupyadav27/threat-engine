rule_id: azure.app_service.sites.app_service_apps_that_use_java_should_use_a_specified_java_version
service: app_service
resource: sites
title: App Service apps that use Java should use a specified 'Java version'
description: Periodically, newer versions are released for Java software either due to security flaws or to include additional
  functionality. Using the latest Java version for App Service apps is recommended in order to take advantage of security
  fixes, if any, and/or new functionalities of the latest version. This policy only applies to Linux apps. This policy requires
  you to specify a Java version that meets your requirements.
domain: application_and_api_security
severity: high
scope: app_service.sites
assertion_id: app_service.app_service_apps_that_use_java_should_use_a_specified_java_version
effect: AuditIfNotExists
resource_type: Microsoft.Web/sites
policy_id: 496223c3-ad65-4ecd-878a-bae78737e9ed
source: azure_policy_builtin
