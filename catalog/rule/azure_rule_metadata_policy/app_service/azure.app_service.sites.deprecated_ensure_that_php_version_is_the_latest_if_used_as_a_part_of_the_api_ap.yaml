rule_id: azure.app_service.sites.deprecated_ensure_that_php_version_is_the_latest_if_used_as_a_part_of_the_api_ap
service: app_service
resource: sites
title: '[Deprecated]: Ensure that ''PHP version'' is the latest, if used as a part of the API app'
description: Periodically, newer versions are released for PHP software either due to security flaws or to include additional
  functionality. Using the latest PHP version for API apps is recommended in order to take advantage of security fixes, if
  any, and/or new functionalities of the latest version. We recommend all customers who are still using API Apps to implement
  the built-in policy called 'App Service apps that use PHP should use the latest 'PHP version'', which is scoped to include
  API apps.
domain: application_and_api_security
severity: high
scope: app_service.sites
assertion_id: app_service.deprecated_ensure_that_php_version_is_the_latest_if_used_as_a_part_of_the_api_ap
effect: AuditIfNotExists
resource_type: Microsoft.Web/sites
policy_id: 1bc1795e-d44a-4d48-9b3b-6fff0fd5f9ba
source: azure_policy_builtin
