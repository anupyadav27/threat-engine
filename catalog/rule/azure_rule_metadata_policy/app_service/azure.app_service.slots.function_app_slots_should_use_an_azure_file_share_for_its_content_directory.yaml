title: Function app slots should use an Azure file share for its content directory
description: The content directory of a Function app should be located on an Azure file share. The storage account information
  for the file share must be provided before any publishing activity. To learn more about using Azure Files for hosting app
  service content refer to https://go.microsoft.com/fwlink/?linkid=2151594.
