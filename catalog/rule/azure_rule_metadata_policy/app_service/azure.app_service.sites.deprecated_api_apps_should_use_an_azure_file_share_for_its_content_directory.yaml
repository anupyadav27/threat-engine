rule_id: azure.app_service.sites.deprecated_api_apps_should_use_an_azure_file_share_for_its_content_directory
service: app_service
resource: sites
title: '[Deprecated]: API apps should use an Azure file share for its content directory'
description: The content directory of an API app should be located on an Azure file share. To learn more about using Azure
  Files for hosting app service content refer to https://go.microsoft.com/fwlink/?linkid=2151594. We recommend all customers
  who are still using API Apps to implement the built-in policy called 'App Service apps should use an Azure file shares for
  its content directory', which is scoped to include API apps in addition to Web Apps.
domain: application_and_api_security
severity: high
