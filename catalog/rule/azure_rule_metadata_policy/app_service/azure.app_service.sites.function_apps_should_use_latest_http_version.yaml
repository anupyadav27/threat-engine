rule_id: azure.app_service.sites.function_apps_should_use_latest_http_version
service: app_service
resource: sites
title: Function apps should use latest 'HTTP Version'
description: Periodically, newer versions are released for HTTP either due to security flaws or to include additional functionality.
  Using the latest HTTP version for web apps to take advantage of security fixes, if any, and/or new functionalities of the
  newer version.
domain: application_and_api_security
severity: high
scope: app_service.sites
assertion_id: app_service.function_apps_should_use_latest_http_version
effect: AuditIfNotExists
resource_type: Microsoft.Web/sites
policy_id: e2c1c086-2d84-4019-bff3-c44ccd95113c
source: azure_policy_builtin
