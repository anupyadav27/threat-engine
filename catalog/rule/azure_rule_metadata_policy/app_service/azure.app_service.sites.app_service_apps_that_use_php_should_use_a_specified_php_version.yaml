rule_id: azure.app_service.sites.app_service_apps_that_use_php_should_use_a_specified_php_version
service: app_service
resource: sites
title: App Service apps that use PHP should use a specified 'PHP version'
description: Periodically, newer versions are released for PHP software either due to security flaws or to include additional
  functionality. Using the latest PHP version for App Service apps is recommended in order to take advantage of security fixes,
  if any, and/or new functionalities of the latest version. This policy only applies to Linux apps. This policy requires you
  to specify a PHP version that meets your requirements.
domain: application_and_api_security
severity: high
scope: app_service.sites
assertion_id: app_service.app_service_apps_that_use_php_should_use_a_specified_php_version
effect: AuditIfNotExists
resource_type: Microsoft.Web/sites
policy_id: 7261b898-8a84-4db8-9e04-18527132abb3
source: azure_policy_builtin
