rule_id: azure.app_service.sites.deprecated_ensure_that_java_version_is_the_latest_if_used_as_a_part_of_the_api_a
service: app_service
resource: sites
title: '[Deprecated]: Ensure that ''Java version'' is the latest, if used as a part of the API app'
description: Periodically, newer versions are released for Java either due to security flaws or to include additional functionality.
  Using the latest Python version for API apps is recommended in order to take advantage of security fixes, if any, and/or
  new functionalities of the latest version. We recommend all customers who are still using API apps to implement the built-in
  policy called 'App Service apps that use Java should use the latest 'Java version'', which is scoped to include API apps
  in addition to Web apps.
domain: application_and_api_security
severity: high
scope: app_service.sites
assertion_id: app_service.deprecated_ensure_that_java_version_is_the_latest_if_used_as_a_part_of_the_api_a
effect: AuditIfNotExists
resource_type: Microsoft.Web/sites
policy_id: 88999f4c-376a-45c8-bcb3-4058f713cf39
source: azure_policy_builtin
