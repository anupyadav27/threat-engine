rule_id: azure.app_service.sites.app_service_apps_should_enable_configuration_routing_to_azure_virtual_network
service: app_service
resource: sites
title: App Service apps should enable configuration routing to Azure Virtual Network
description: By default, app configuration like pulling container images and mounting
  content storage is not routed through regional VNET integration. For API versions
  before 2024-11-01, set 'vnetImagePullEnabled' and 'vnetContentShareEnabled' to true.
  For 2024-11-01+, set 'outboundVnetRouting.imagePullTraffic' and 'outboundVnetRouting.contentShareTraffic'
  to true. Learn more at https://aka.ms/appservice-vnet-configuration-routing.
domain: application_and_api_security
severity: high
scope: app_service.sites
assertion_id: app_service.app_service_apps_should_enable_configuration_routing_to_azure_virtual_network
effect: Audit
resource_type: Microsoft.Web/sites
policy_id: 801543d1-1953-4a90-b8b0-8cf6d41473a5
source: azure_policy_builtin
mitre_techniques:
