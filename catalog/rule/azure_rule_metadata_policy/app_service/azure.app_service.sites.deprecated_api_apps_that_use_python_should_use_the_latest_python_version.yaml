rule_id: azure.app_service.sites.deprecated_api_apps_that_use_python_should_use_the_latest_python_version
service: app_service
resource: sites
title: '[Deprecated]: API apps that use Python should use the latest ''Python version'''
description: Periodically, newer versions are released for Python software either due to security flaws or to include additional
  functionality. Using the latest Python version for API apps is recommended in order to take advantage of security fixes,
  if any, and/or new functionalities of the latest version. We recommend all customers who are still using API apps to implement
  the built-in policy called 'App Service apps that use Python should use the latest 'Python version''.
domain: application_and_api_security
severity: high
scope: app_service.sites
assertion_id: app_service.deprecated_api_apps_that_use_python_should_use_the_latest_python_version
effect: AuditIfNotExists
