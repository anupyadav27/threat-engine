rule_id: azure.app_service.slots.deprecated_app_service_app_slots_should_have_client_certificates_incoming_client
service: app_service
resource: slots
title: '[Deprecated]: App Service app slots should have ''Client Certificates (Incoming
  client certificates)'' enabled'
description: Client certificates allow for the app to request a certificate for incoming
  requests. Only clients that have a valid certificate will be able to reach the app.
  This policy has been replaced by a new policy with the same name because Http 2.0
  doesn't support client certificates.
domain: application_and_api_security
severity: high
