rule_id: azure.app_service.sites.function_apps_should_have_client_certificates_incoming_client_certificates_enabl
service: app_service
resource: sites
title: Function apps should have Client Certificates (Incoming client certificates)
  enabled
description: Client certificates allow for the app to request a certificate for incoming
  requests. Only clients that have a valid certificate will be able to reach the app.
  This policy applies to apps with Http version set to 1.1.
domain: application_and_api_security
severity: high
scope: app_service.sites
assertion_id: app_service.function_apps_should_have_client_certificates_incoming_client_certificates_enabl
effect: AuditIfNotExists
resource_type: Microsoft.Web/sites
policy_id: ab6a902f-9493-453b-928d-62c30b11b5a6
source: azure_policy_builtin
mitre_techniques:
- T1556
mitre_tactics:
- credential-access
threat_tags:
- authentication-bypass
threat_category: credential_access
