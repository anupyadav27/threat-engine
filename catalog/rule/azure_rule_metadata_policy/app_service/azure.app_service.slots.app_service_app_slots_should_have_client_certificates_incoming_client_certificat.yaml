rule_id: azure.app_service.slots.app_service_app_slots_should_have_client_certificates_incoming_client_certificat
service: app_service
resource: slots
title: App Service app slots should have Client Certificates (Incoming client certificates) enabled
description: Client certificates allow for the app to request a certificate for incoming requests. Only clients that have
  a valid certificate will be able to reach the app. This policy applies to apps with Http version set to 1.1.
domain: application_and_api_security
severity: high
scope: app_service.slots
