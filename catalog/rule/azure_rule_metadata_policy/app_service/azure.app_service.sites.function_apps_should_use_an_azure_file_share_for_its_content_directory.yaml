rule_id: azure.app_service.sites.function_apps_should_use_an_azure_file_share_for_its_content_directory
service: app_service
resource: sites
title: Function apps should use an Azure file share for its content directory
description: The content directory of a Function app should be located on an Azure
  file share. The storage account information for the file share must be provided
  before any publishing activity. To learn more about using Azure Files for hosting
  app service content refer to https://go.microsoft.com/fwlink/?linkid=2151594.
domain: application_and_api_security
severity: high
scope: app_service.sites
