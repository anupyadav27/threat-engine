rule_id: azure.app_service.slots.deprecated_function_app_slots_should_have_client_certificates_incoming_client_ce
service: app_service
resource: slots
title: '[Deprecated]: Function app slots should have ''Client Certificates (Incoming
  client certificates)'' enabled'
description: Client certificates allow for the app to request a certificate for incoming
  requests. Only clients with valid certificates will be able to reach the app. This
  policy has been replaced by a new policy with the same name because Http 2.0 doesn't
  support client certificates.
domain: application_and_api_security
severity: high
