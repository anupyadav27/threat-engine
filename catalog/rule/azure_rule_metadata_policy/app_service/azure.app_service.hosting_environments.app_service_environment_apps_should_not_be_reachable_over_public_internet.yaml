rule_id: azure.app_service.hosting_environments.app_service_environment_apps_should_not_be_reachable_over_public_internet
service: app_service
resource: hosting_environments
title: App Service Environment apps should not be reachable over public internet
description: To ensure apps deployed in an App Service Environment are not accessible over public internet, one should deploy
  App Service Environment with an IP address in virtual network. To set the IP address to a virtual network IP, the App Service
  Environment must be deployed with an internal load balancer.
