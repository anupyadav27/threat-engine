title: '[Deprecated]: Ensure Function app is using the latest version of TLS encryption'
description: Please use /providers/Microsoft.Authorization/policyDefinitions/f9d614c5-c173-4d56-95a7-b4437057d193 instead.
  The TLS(Transport Layer Security) protocol secures transmission of data over the internet using standard encryption technology.
