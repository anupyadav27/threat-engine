rule_id: azure.app_service.sites.deprecated_cors_should_not_allow_every_resource_to_access_your_api_app
service: app_service
resource: sites
title: '[Deprecated]: CORS should not allow every resource to access your API App'
description: Cross-Origin Resource Sharing (CORS) should not allow all domains to access your API app. Allow only required
  domains to interact with your API app. We recommend all customers who are still using API Apps to implement the built-in
  policy called 'App Service apps should not have CORS configured to allow every resource to access your apps', which is scoped
  to include API apps in addition to Web Apps.
domain: application_and_api_security
severity: high
scope: app_service.sites
assertion_id: app_service.deprecated_cors_should_not_allow_every_resource_to_access_your_api_app
effect: AuditIfNotExists
resource_type: Microsoft.Web/sites
policy_id: 358c20a6-3f9e-4f0e-97ff-c6ce485e2aac
source: azure_policy_builtin
