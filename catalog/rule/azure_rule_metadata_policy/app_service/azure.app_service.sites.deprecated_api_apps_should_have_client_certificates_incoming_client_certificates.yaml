rule_id: azure.app_service.sites.deprecated_api_apps_should_have_client_certificates_incoming_client_certificates
service: app_service
resource: sites
title: '[Deprecated]: API apps should have ''Client Certificates (Incoming client
  certificates)'' enabled'
description: Client certificates allow for the app to request a certificate for incoming
  requests. Only clients that have a valid certificate will be able to reach the app.
  We recommend all customers who are still using API Apps to implement the built-in
  policy called 'App Service apps should have 'Client Certificates (Incoming client
  certificates)' enabled', which is scoped to include API apps in addition to Web
  Apps.
domain: application_and_api_security
severity: high
scope: app_service.sites
assertion_id: app_service.deprecated_api_apps_should_have_client_certificates_incoming_client_certificates
effect: Audit
resource_type: Microsoft.Web/sites
policy_id: 0c192fe8-9cbb-4516-85b3-0ade8bd03886
source: azure_policy_builtin
mitre_techniques:
- T1190
mitre_tactics:
- initial-access
threat_tags:
- cloud-exposure
threat_category: initial_access
