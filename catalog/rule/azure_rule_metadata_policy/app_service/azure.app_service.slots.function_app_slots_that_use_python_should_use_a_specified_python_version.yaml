rule_id: azure.app_service.slots.function_app_slots_that_use_python_should_use_a_specified_python_version
service: app_service
resource: slots
title: Function app slots that use Python should use a specified 'Python version'
description: Periodically, newer versions are released for Python software either
  due to security flaws or to include additional functionality. Using the latest Python
  version for Function apps is recommended in order to take advantage of security
  fixes, if any, and/or new functionalities of the latest version. This policy only
  applies to Linux apps. This policy requires you to specify a Python version that
  meets your requirements.
domain: application_and_api_security
severity: high
scope: app_service.slots
assertion_id: app_service.function_app_slots_that_use_python_should_use_a_specified_python_version
effect: AuditIfNotExists
resource_type: Microsoft.Web/sites/slots
