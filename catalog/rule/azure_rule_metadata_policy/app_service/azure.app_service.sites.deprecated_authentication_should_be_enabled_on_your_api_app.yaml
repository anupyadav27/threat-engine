rule_id: azure.app_service.sites.deprecated_authentication_should_be_enabled_on_your_api_app
service: app_service
resource: sites
title: '[Deprecated]: Authentication should be enabled on your API app'
description: Azure App Service Authentication is a feature that can prevent anonymous
  HTTP requests from reaching the API app, or authenticate those that have tokens
  before they reach the API app. We recommend all customers who are still using API
  apps to implement the built-in policy called 'App Service apps should have authentication
  enabled', which is scoped to include API apps in addition to Web apps.
domain: application_and_api_security
severity: high
scope: app_service.sites
assertion_id: app_service.deprecated_authentication_should_be_enabled_on_your_api_app
effect: AuditIfNotExists
resource_type: Microsoft.Web/sites
policy_id: c4ebc54a-46e1-481a-bee2-d4411e95d828
source: azure_policy_builtin
mitre_techniques:
- T1190
mitre_tactics:
- initial-access
threat_tags:
- cloud-exposure
threat_category: initial_access
