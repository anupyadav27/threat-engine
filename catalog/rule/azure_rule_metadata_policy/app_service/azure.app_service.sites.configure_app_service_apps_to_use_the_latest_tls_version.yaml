rule_id: azure.app_service.sites.configure_app_service_apps_to_use_the_latest_tls_version
service: app_service
resource: sites
title: Configure App Service apps to use the latest TLS version
description: Periodically, newer versions are released for TLS either due to security
  flaws, include additional functionality, and enhance speed. Upgrade to the latest
  TLS version for App Service apps to take advantage of security fixes, if any, and/or
  new functionalities of the latest version.
