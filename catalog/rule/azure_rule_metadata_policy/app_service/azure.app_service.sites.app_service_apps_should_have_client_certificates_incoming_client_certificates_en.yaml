rule_id: azure.app_service.sites.app_service_apps_should_have_client_certificates_incoming_client_certificates_en
service: app_service
resource: sites
title: App Service apps should have Client Certificates (Incoming client certificates)
  enabled
description: Client certificates allow for the app to request a certificate for incoming
  requests. Only clients that have a valid certificate will be able to reach the app.
  This policy applies to apps with Http version set to 1.1.
domain: application_and_api_security
severity: high
scope: app_service.sites
assertion_id: app_service.app_service_apps_should_have_client_certificates_incoming_client_certificates_en
effect: AuditIfNotExists
resource_type: Microsoft.Web/sites
policy_id: 19dd1db6-f442-49cf-a838-b0786b4401ef
source: azure_policy_builtin
mitre_techniques:
- T1556
mitre_tactics:
- credential-access
threat_tags:
- authentication
threat_category: credential_access
