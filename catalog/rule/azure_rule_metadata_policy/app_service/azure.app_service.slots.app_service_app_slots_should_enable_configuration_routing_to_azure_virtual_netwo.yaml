rule_id: azure.app_service.slots.app_service_app_slots_should_enable_configuration_routing_to_azure_virtual_netwo
service: app_service
resource: slots
title: App Service app slots should enable configuration routing to Azure Virtual
  Network
description: By default, app configuration like pulling container images and mounting
  content storage is not routed through regional VNET integration. For API versions
  before 2024-11-01, set 'vnetImagePullEnabled' and 'vnetContentShareEnabled' to true.
  For 2024-11-01+, set 'outboundVnetRouting.imagePullTraffic' and 'outboundVnetRouting.contentShareTraffic'
  to true. Learn more at https://aka.ms/appservice-vnet-configuration-routing.
domain: application_and_api_security
severity: high
scope: app_service.slots
assertion_id: app_service.app_service_app_slots_should_enable_configuration_routing_to_azure_virtual_netwo
effect: Audit
resource_type: Microsoft.Web/sites/slots
policy_id: 5747353b-1ca9-42c1-a4dd-b874b894f3d4
source: azure_policy_builtin
mitre_techniques:
- T1190
mitre_tactics:
- initial-access
threat_tags:
- network-security
threat_category: initial_access
