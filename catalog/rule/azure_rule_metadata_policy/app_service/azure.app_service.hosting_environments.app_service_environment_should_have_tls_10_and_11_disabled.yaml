title: App Service Environment should have TLS 1.0 and 1.1 disabled
description: TLS 1.0 and 1.1 are out-of-date protocols that do not support modern cryptographic algorithms. Disabling inbound
  TLS 1.0 and 1.1 traffic helps secure apps in an App Service Environment.
