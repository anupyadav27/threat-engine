rule_id: azure.app_service.slots.function_app_slots_should_enable_outbound_nonrfc_1918_traffic_to_azure_virtual_n
service: app_service
resource: slots
title: Function app slots should enable outbound non-RFC 1918 traffic to Azure Virtual Network
description: By default, if one uses regional Azure Virtual Network (VNET) integration, the app only routes RFC1918 traffic
  into that respective virtual network. For API versions prior to 2024-11-01, set 'vnetRouteAllEnabled' to true to enable
  all outbound traffic into the Azure Virtual Network. For API version 2024-11-01 and later, set 'outboundVnetRouting.applicationTraffic'
  to true. Note that this policy should only be applied to function apps that are not running on the Flex Consumption or Consumption
  hosting plans.
domain: application_and_api_security
severity: high
scope: app_service.slots
assertion_id: app_service.function_app_slots_should_enable_outbound_nonrfc_1918_traffic_to_azure_virtual_n
effect: Audit
resource_type: Microsoft.Web/sites/slots
policy_id: 75c42c42-dfb3-453d-8fd5-9f978e1b1106
source: azure_policy_builtin
