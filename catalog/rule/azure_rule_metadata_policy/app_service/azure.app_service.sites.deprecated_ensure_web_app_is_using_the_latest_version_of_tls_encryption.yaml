rule_id: azure.app_service.sites.deprecated_ensure_web_app_is_using_the_latest_version_of_tls_encryption
service: app_service
resource: sites
title: '[Deprecated]: Ensure WEB app is using the latest version of TLS encryption '
description: Please use /providers/Microsoft.Authorization/policyDefinitions/f0e6e85b-9b9f-4a4b-b67b-f730d42f1b0b
  instead. The TLS(Transport Layer Security) protocol secures transmission of data
  over the internet using standard encryption technology. Encryption should be set
  with the latest version of TLS. App service allows TLS 1.2 by default, which is
  the recommended TLS level by industry standards, such as PCI DSS.
