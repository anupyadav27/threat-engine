rule_id: azure.app_service.sites.app_service_apps_should_disable_ssh
service: app_service
resource: sites
title: App Service apps should disable SSH
description: 'Azure App Service allows you to open an SSH session to a container running
  in the service. This feature should be disabled to ensure that SSH is not inadvertently
  left open on App Service apps, reducing the risk of unauthorized access. Learn more
  at: https://aka.ms/app-service-ssh'
domain: application_and_api_security
severity: high
scope: app_service.sites
assertion_id: app_service.app_service_apps_should_disable_ssh
effect: Audit
resource_type: Microsoft.Web/sites
