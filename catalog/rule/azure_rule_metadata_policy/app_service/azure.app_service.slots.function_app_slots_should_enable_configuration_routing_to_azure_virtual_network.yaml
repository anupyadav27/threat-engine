rule_id: azure.app_service.slots.function_app_slots_should_enable_configuration_routing_to_azure_virtual_network
service: app_service
resource: slots
title: Function app slots should enable configuration routing to Azure Virtual Network
description: 'By default, app configuration like pulling container images and mounting
  content storage is not routed through regional VNET integration. For API versions
  before 2024-11-01, set ''vnetImagePullEnabled'' and ''vnetContentShareEnabled''
  to true. For 2024-11-01+, set ''outboundVnetRouting.imagePullTraffic'' and ''outboundVnetRouting.contentShareTraffic''
  to true. Not for Flex/Consumption plans. Learn more: https://aka.ms/appservice-vnet-configuration-routing.'
domain: application_and_api_security
severity: high
scope: app_service.slots
assertion_id: app_service.function_app_slots_should_enable_configuration_routing_to_azure_virtual_network
effect: Audit
resource_type: Microsoft.Web/sites/slots
policy_id: f380edf5-de79-4862-bd57-ee407d8bd8b6
source: azure_policy_builtin
mitre_techniques:
- T1190
mitre_tactics:
- initial-access
threat_tags:
- network-security
threat_category: initial_access
