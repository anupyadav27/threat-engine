rule_id: azure.app_service.slots.app_service_app_slots_should_enable_outbound_nonrfc_1918_traffic_to_azure_virtua
service: app_service
resource: slots
title: App Service app slots should enable outbound non-RFC 1918 traffic to Azure
  Virtual Network
description: By default, regional VNET integration only routes RFC1918 traffic into
  the virtual network. For API versions before 2024-11-01, set 'vnetRouteAllEnabled'
  to true to enable all outbound traffic into the Azure Virtual Network. For 2024-11-01+,
  set 'outboundVnetRouting.applicationTraffic' to true. This enables network security
  groups and user defined routes for all outbound traffic.
domain: application_and_api_security
severity: high
scope: app_service.slots
assertion_id: app_service.app_service_app_slots_should_enable_outbound_nonrfc_1918_traffic_to_azure_virtua
