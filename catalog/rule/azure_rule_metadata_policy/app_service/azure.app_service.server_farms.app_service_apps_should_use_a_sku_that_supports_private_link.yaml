rule_id: azure.app_service.server_farms.app_service_apps_should_use_a_sku_that_supports_private_link
service: app_service
resource: server_farms
title: App Service apps should use a SKU that supports private link
description: 'With supported SKUs, Azure Private Link lets you connect your virtual network to Azure services without a public
  IP address at the source or destination. The Private Link platform handles the connectivity between the consumer and services
  over the Azure backbone network. By mapping private endpoints to apps, you can reduce data leakage risks. Learn more about
  private links at: https://aka.ms/private-link.'
domain: application_and_api_security
severity: high
scope: app_service.server_farms
