rule_id: azure.azure_arc.machines.azure_arcenabled_servers_should_be_configured_with_an_azure_arc_private_link_sco
service: azure_arc
resource: machines
title: Azure Arc-enabled servers should be configured with an Azure Arc Private Link Scope
description: 'Azure Private Link lets you connect your virtual networks to Azure services without a public IP address at the
  source or destination. The Private Link platform handles the connectivity between the consumer and services over the Azure
  backbone network. By mapping Azure Arc-enabled servers to an Azure Arc Private Link Scope that is configured with a private
  endpoint, data leakage risks are reduced. Learn more about private links at: https://aka.ms/arc/privatelink.'
domain: configuration_and_change_management
severity: medium
scope: azure_arc.machines
