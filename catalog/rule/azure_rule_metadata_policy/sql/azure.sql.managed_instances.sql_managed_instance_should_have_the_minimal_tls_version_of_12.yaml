rule_id: azure.sql.managed_instances.sql_managed_instance_should_have_the_minimal_tls_version_of_12
service: sql
resource: managed_instances
title: SQL Managed Instance should have the minimal TLS version of 1.2
description: Setting minimal TLS version to 1.2 improves security by ensuring your SQL Managed Instance can only be accessed
  from clients using TLS 1.2. Using versions of TLS less than 1.2 is not recommended since they have well documented security
  vulnerabilities.
domain: storage_and_database_security
severity: high
scope: sql.managed_instances
assertion_id: sql.sql_managed_instance_should_have_the_minimal_tls_version_of_12
effect: Audit
resource_type: Microsoft.Sql/managedInstances
