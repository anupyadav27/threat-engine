rule_id: azure.sql.servers.georedundant_backup_should_be_enabled_for_azure_database_for_mysql
service: sql
resource: servers
title: Geo-redundant backup should be enabled for Azure Database for MySQL
description: Azure Database for MySQL allows you to choose the redundancy option for your database server. It can be set to
  a geo-redundant backup storage in which the data is not only stored within the region in which your server is hosted, but
  is also replicated to a paired region to provide recovery option in case of a region failure. Configuring geo-redundant
  storage for backup is only allowed during server create.
domain: storage_and_database_security
severity: high
scope: sql.servers
assertion_id: sql.georedundant_backup_should_be_enabled_for_azure_database_for_mysql
effect: Audit
resource_type: Microsoft.DBforMySQL/servers
policy_id: 82339799-d096-41ae-8538-b108becf0970
source: azure_policy_builtin
