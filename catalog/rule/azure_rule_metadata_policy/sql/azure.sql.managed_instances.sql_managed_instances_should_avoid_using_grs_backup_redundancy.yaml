rule_id: azure.sql.managed_instances.sql_managed_instances_should_avoid_using_grs_backup_redundancy
service: sql
resource: managed_instances
title: SQL Managed Instances should avoid using GRS backup redundancy
description: 'Managed Instances should avoid using the default geo-redundant storage for backups, if data residency rules
  require data to stay within a specific region. Note: Azure Policy is not enforced when creating a database using T-SQL.
  If not explicitly specified, database with geo-redundant backup storage is created via T-SQL.'
domain: storage_and_database_security
severity: high
scope: sql.managed_instances
assertion_id: sql.sql_managed_instances_should_avoid_using_grs_backup_redundancy
effect: Deny
resource_type: Microsoft.Sql/managedInstances
