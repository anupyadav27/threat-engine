rule_id: azure.sql.servers.public_network_access_should_be_disabled_for_postgresql_servers
service: sql
resource: servers
title: Public network access should be disabled for PostgreSQL servers
description: Disable the public network access property to improve security and ensure
  your Azure Database for PostgreSQL can only be accessed from a private endpoint.
  This configuration disables access from any public address space outside of Azure
  IP range, and denies all logins that match IP or virtual network-based firewall
  rules.
