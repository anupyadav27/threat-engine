rule_id: azure.sql.servers.georedundant_backup_should_be_enabled_for_azure_database_for_postgresql
service: sql
resource: servers
title: Geo-redundant backup should be enabled for Azure Database for PostgreSQL
description: Azure Database for PostgreSQL allows you to choose the redundancy option for your database server. It can be
  set to a geo-redundant backup storage in which the data is not only stored within the region in which your server is hosted,
  but is also replicated to a paired region to provide recovery option in case of a region failure. Configuring geo-redundant
  storage for backup is only allowed during server create.
domain: storage_and_database_security
severity: high
scope: sql.servers
assertion_id: sql.georedundant_backup_should_be_enabled_for_azure_database_for_postgresql
effect: Audit
resource_type: Microsoft.DBforPostgreSQL/servers
policy_id: 48af4db5-9b8b-401c-8e74-076be876a430
source: azure_policy_builtin
