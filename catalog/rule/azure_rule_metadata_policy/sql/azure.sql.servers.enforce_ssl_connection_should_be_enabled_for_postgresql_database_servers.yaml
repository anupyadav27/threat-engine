rule_id: azure.sql.servers.enforce_ssl_connection_should_be_enabled_for_postgresql_database_servers
service: sql
resource: servers
title: Enforce SSL connection should be enabled for PostgreSQL database servers
description: Azure Database for PostgreSQL supports connecting your Azure Database for PostgreSQL server to client applications
  using Secure Sockets Layer (SSL). Enforcing SSL connections between your database server and your client applications helps
  protect against 'man in the middle' attacks by encrypting the data stream between the server and your application. This
  configuration enforces that SSL is always enabled for accessing your database server.
domain: storage_and_database_security
severity: high
scope: sql.servers
assertion_id: sql.enforce_ssl_connection_should_be_enabled_for_postgresql_database_servers
effect: Audit
resource_type: Microsoft.DBforPostgreSQL/servers
policy_id: d158790f-bfb0-486c-8631-2dc6b4e8e6af
source: azure_policy_builtin
