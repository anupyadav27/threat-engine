rule_id: azure.sql.servers.azure_sql_database_should_be_running_tls_version_12_or_newer
service: sql
resource: servers
title: Azure SQL Database should be running TLS version 1.2 or newer
description: Setting TLS version to 1.2 or newer improves security by ensuring your Azure SQL Database can only be accessed
  from clients using TLS 1.2 or newer. Using versions of TLS less than 1.2 is not recommended since they have well documented
  security vulnerabilities.
domain: storage_and_database_security
severity: high
scope: sql.servers
assertion_id: sql.azure_sql_database_should_be_running_tls_version_12_or_newer
effect: Audit
resource_type: Microsoft.Sql/servers
policy_id: 32e6bbec-16b6-44c2-be37-c5b672d103cf
source: azure_policy_builtin
