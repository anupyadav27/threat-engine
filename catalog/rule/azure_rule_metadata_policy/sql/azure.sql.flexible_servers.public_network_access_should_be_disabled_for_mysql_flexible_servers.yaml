rule_id: azure.sql.flexible_servers.public_network_access_should_be_disabled_for_mysql_flexible_servers
service: sql
resource: flexible_servers
title: Public network access should be disabled for MySQL flexible servers
description: Disabling the public network access property improves security by ensuring your Azure Database for MySQL flexible
  servers can only be accessed from a private endpoint. This configuration strictly disables access from any public address
  space outside of Azure IP range and denies all logins that match IP or virtual network-based firewall rules.
