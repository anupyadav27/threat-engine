rule_id: azure.sql.servers.azure_sql_database_should_have_microsoft_entraonly_authentication_enabled_during
service: sql
resource: servers
title: Azure SQL Database should have Microsoft Entra-only authentication enabled
  during creation
description: 'Require Azure SQL logical servers to be created with Microsoft Entra-only
  authentication. This policy doesn''t block local authentication from being re-enabled
  on resources after create. Consider using the ''Microsoft Entra-only authentication''
  initiative instead to require both. Learn more at: https://aka.ms/adonlycreate.'
