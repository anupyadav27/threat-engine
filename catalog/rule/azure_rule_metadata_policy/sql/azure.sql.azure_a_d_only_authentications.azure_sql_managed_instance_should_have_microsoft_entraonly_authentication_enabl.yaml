rule_id: azure.sql.azure_a_d_only_authentications.azure_sql_managed_instance_should_have_microsoft_entraonly_authentication_enable
service: sql
resource: azure_a_d_only_authentications
title: Azure SQL Managed Instance should have Microsoft Entra-only authentication
  enabled
description: 'Require Azure SQL Managed Instance to use Microsoft Entra-only authentication.
  This policy doesn''t block Azure SQL Managed instances from being created with local
  authentication enabled. It does block local authentication from being enabled on
  resources after create. Consider using the ''Microsoft Entra-only authentication''
  initiative instead to require both. Learn more at: https://aka.ms/adonlycreate.'
domain: storage_and_database_security
severity: high
scope: sql.azure_a_d_only_authentications
assertion_id: sql.azure_sql_managed_instance_should_have_microsoft_entraonly_authentication_enable
effect: Audit
