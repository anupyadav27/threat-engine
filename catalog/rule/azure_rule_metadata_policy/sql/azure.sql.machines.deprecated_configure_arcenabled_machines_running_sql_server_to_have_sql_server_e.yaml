rule_id: azure.sql.machines.deprecated_configure_arcenabled_machines_running_sql_server_to_have_sql_server_e
service: sql
resource: machines
title: '[Deprecated]: Configure Arc-enabled machines running SQL Server to have SQL Server extension installed.'
description: To ensure that SQL Server - Azure Arc resources are created by default when SQL Server instance is found on Azure
  Arc enabled Windows/Linux Server, the latter should have the SQL Server extension installed. This policy is deprecated because
  we are migrating to a more streamlined. recommended and automated process of onboarding Arc Servers with SQL installed onto
  the Azure extension for SQL Server. Learn more about the auto-onboarding process at https://aka.ms/SQLServerExtensionPolicyDeprecation
domain: storage_and_database_security
severity: high
scope: sql.machines
