rule_id: azure.elasticsan.volume_groups.elasticsan_volume_group_should_use_customermanaged_keys_to_encrypt_data_at_rest
service: elasticsan
resource: volume_groups
title: ElasticSan Volume Group should use customer-managed keys to encrypt data at rest
description: Use customer-managed keys to manage the encryption at rest of your VolumeGroup. By default, customer data is
  encrypted with platform-managed keys, but CMKs are commonly required to meet regulatory compliance standards. Customer-managed
  keys enable the data to be encrypted with an Azure Key Vault key created and owned by you, with full control and responsibility,
  including rotation and management.
domain: storage_and_database_security
severity: medium
scope: elasticsan.volume_groups
assertion_id: elasticsan.elasticsan_volume_group_should_use_customermanaged_keys_to_encrypt_data_at_rest
effect: Audit
resource_type: Microsoft.ElasticSan/elasticSans/volumeGroups
