rule_id: azure.vm_image_builder.image_templates.vm_image_builder_templates_should_use_private_link
service: vm_image_builder
resource: image_templates
title: VM Image Builder templates should use private link
description: 'Azure Private Link lets you connect your virtual network to Azure services without a public IP address at the
  source or destination. The Private Link platform handles the connectivity between the consumer and services over the Azure
  backbone network. By mapping private endpoints to your VM Image Builder building resources, data leakage risks are reduced.
  Learn more about private links at: https://docs.microsoft.com/azure/virtual-machines/linux/image-builder-networking#deploy-using-an-existing-vnet.'
domain: configuration_and_change_management
severity: medium
scope: vm_image_builder.image_templates
assertion_id: vm_image_builder.vm_image_builder_templates_should_use_private_link
effect: Audit
resource_type: Microsoft.VirtualMachineImages/imageTemplates
