rule_id: azure.monitoring.backupvaults.enable_logging_by_category_group_for_backup_vaults_microsoftdataprotectionbackup
service: monitoring
resource: backupvaults
title: Enable logging by category group for Backup vaults (microsoft.dataprotection/backupvaults)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for Backup vaults (microsoft.dataprotection/backupvaults).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.backupvaults
assertion_id: monitoring.enable_logging_by_category_group_for_backup_vaults_microsoftdataprotectionbackup
effect: DeployIfNotExists
resource_type: microsoft.dataprotection/backupvaults
