rule_id: azure.monitoring.experiments.enable_logging_by_category_group_for_chaos_experiments_microsoftchaosexperiments
service: monitoring
resource: experiments
title: Enable logging by category group for Chaos Experiments (microsoft.chaos/experiments)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for Chaos Experiments (microsoft.chaos/experiments).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.experiments
assertion_id: monitoring.enable_logging_by_category_group_for_chaos_experiments_microsoftchaosexperiments
effect: DeployIfNotExists
resource_type: microsoft.chaos/experiments
policy_id: 1cd30d13-d34c-4cb8-8f9d-4692f7d40d97
source: azure_policy_builtin
mitre_techniques:
- T1562.008
mitre_tactics:
- defense-evasion
threat_tags:
- logging-disabled
threat_category: defense_evasion
