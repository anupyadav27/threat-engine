rule_id: azure.monitoring.mediaservices.enable_logging_by_category_group_for_media_services_microsoftmediamediaservices_
service: monitoring
resource: mediaservices
title: Enable logging by category group for Media Services (microsoft.media/mediaservices)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for Media Services (microsoft.media/mediaservices).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.mediaservices
assertion_id: monitoring.enable_logging_by_category_group_for_media_services_microsoftmediamediaservices_
effect: DeployIfNotExists
resource_type: microsoft.media/mediaservices
policy_id: 0925a080-ab8d-44a1-a39c-61e184b4d8f9
source: azure_policy_builtin
mitre_techniques:
- T1562.008
mitre_tactics:
- defense-evasion
threat_tags:
- logging-disabled
threat_category: defense_evasion
