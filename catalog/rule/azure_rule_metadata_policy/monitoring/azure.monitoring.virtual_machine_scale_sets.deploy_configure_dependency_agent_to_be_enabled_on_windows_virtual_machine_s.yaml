rule_id: azure.monitoring.virtual_machine_scale_sets.deploy_configure_dependency_agent_to_be_enabled_on_windows_virtual_machine_scale
service: monitoring
resource: virtual_machine_scale_sets
title: Deploy - Configure Dependency agent to be enabled on Windows virtual machine scale sets
description: Deploy Dependency agent for Windows virtual machine scale sets if the virtual machine image is in the list defined
  and the agent is not installed. If your scale set upgradePolicy is set to Manual, you need to apply the extension to all
  the virtual machines in the set by updating them.
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.virtual_machine_scale_sets
assertion_id: monitoring.deploy_configure_dependency_agent_to_be_enabled_on_windows_virtual_machine_scale
effect: DeployIfNotExists
resource_type: Microsoft.Compute/virtualMachineScaleSets
