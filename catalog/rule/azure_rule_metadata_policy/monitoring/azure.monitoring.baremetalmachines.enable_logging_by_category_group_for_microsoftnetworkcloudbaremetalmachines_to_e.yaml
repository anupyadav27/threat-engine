rule_id: azure.monitoring.baremetalmachines.enable_logging_by_category_group_for_microsoftnetworkcloudbaremetalmachines_to_e
service: monitoring
resource: baremetalmachines
title: Enable logging by category group for microsoft.networkcloud/baremetalmachines
  to Event Hub
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to an Event Hub for microsoft.networkcloud/baremetalmachines.
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.baremetalmachines
assertion_id: monitoring.enable_logging_by_category_group_for_microsoftnetworkcloudbaremetalmachines_to_e
effect: DeployIfNotExists
resource_type: microsoft.networkcloud/baremetalmachines
