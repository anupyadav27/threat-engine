rule_id: azure.monitoring.extensions.the_legacy_log_analytics_extension_should_not_be_installed_on_azure_arc_enabled_
service: monitoring
resource: extensions
title: The legacy Log Analytics extension should not be installed on Azure Arc enabled
  Windows servers
description: 'Automatically prevent installation of the legacy Log Analytics Agent
  as the final step of migrating from legacy agents to Azure Monitor Agent. After
  you have uninstalled existing legacy extensions, this policy will deny all future
  installations of the legacy agent extension on Azure Arc enabled Windows servers.
  Learn more: https://aka.ms/migratetoAMA'
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.extensions
assertion_id: monitoring.the_legacy_log_analytics_extension_should_not_be_installed_on_azure_arc_enabled_
effect: Audit
resource_type: Microsoft.HybridCompute/machines/extensions
policy_id: df441472-4dae-4e4e-87b9-9205ba46be16
source: azure_policy_builtin
mitre_techniques:
