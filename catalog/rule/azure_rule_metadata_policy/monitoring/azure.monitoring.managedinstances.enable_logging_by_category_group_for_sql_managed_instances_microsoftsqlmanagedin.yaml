rule_id: azure.monitoring.managedinstances.enable_logging_by_category_group_for_sql_managed_instances_microsoftsqlmanagedin
service: monitoring
resource: managedinstances
title: Enable logging by category group for SQL managed instances (microsoft.sql/managedinstances) to Storage
description: Resource logs should be enabled to track activities and events that take place on your resources and give you
  visibility and insights into any changes that occur. This policy deploys a diagnostic setting using a category group to
  route logs to a Storage Account for SQL managed instances (microsoft.sql/managedinstances).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.managedinstances
assertion_id: monitoring.enable_logging_by_category_group_for_sql_managed_instances_microsoftsqlmanagedin
effect: DeployIfNotExists
resource_type: microsoft.sql/managedinstances
