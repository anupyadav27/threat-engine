rule_id: azure.monitoring.resourceproviders.enable_logging_by_category_group_for_microsoftcustomprovidersresourceproviders_t
service: monitoring
resource: resourceproviders
title: Enable logging by category group for microsoft.customproviders/resourceproviders
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for microsoft.customproviders/resourceproviders.
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.resourceproviders
assertion_id: monitoring.enable_logging_by_category_group_for_microsoftcustomprovidersresourceproviders_t
effect: DeployIfNotExists
resource_type: microsoft.customproviders/resourceproviders
policy_id: 7646801f-46d5-48d0-9e18-efb884944f3e
source: azure_policy_builtin
mitre_techniques:
- T1562.008
mitre_tactics:
- defense-evasion
threat_tags:
- logging-disabled
threat_category: defense_evasion
