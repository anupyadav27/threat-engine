rule_id: azure.monitoring.namespaces.enable_logging_by_category_group_for_relays_microsoftrelaynamespaces_to_log_anal
service: monitoring
resource: namespaces
title: Enable logging by category group for Relays (microsoft.relay/namespaces) to Log Analytics
description: Resource logs should be enabled to track activities and events that take place on your resources and give you
  visibility and insights into any changes that occur. This policy deploys a diagnostic setting using a category group to
  route logs to a Log Analytics workspace for Relays (microsoft.relay/namespaces).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.namespaces
