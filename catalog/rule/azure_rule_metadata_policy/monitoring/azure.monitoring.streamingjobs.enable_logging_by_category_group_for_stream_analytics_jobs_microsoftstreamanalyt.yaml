rule_id: azure.monitoring.streamingjobs.enable_logging_by_category_group_for_stream_analytics_jobs_microsoftstreamanalyt
service: monitoring
resource: streamingjobs
title: Enable logging by category group for Stream Analytics jobs (microsoft.streamanalytics/streamingjobs) to Storage
description: Resource logs should be enabled to track activities and events that take place on your resources and give you
  visibility and insights into any changes that occur. This policy deploys a diagnostic setting using a category group to
  route logs to a Storage Account for Stream Analytics jobs (microsoft.streamanalytics/streamingjobs).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.streamingjobs
