rule_id: azure.monitoring.automationaccounts.enable_logging_by_category_group_for_automation_accounts_microsoftautomationauto
service: monitoring
resource: automationaccounts
title: Enable logging by category group for Automation Accounts (microsoft.automation/automationaccounts)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for Automation Accounts (microsoft.automation/automationaccounts).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.automationaccounts
assertion_id: monitoring.enable_logging_by_category_group_for_automation_accounts_microsoftautomationauto
effect: DeployIfNotExists
resource_type: microsoft.automation/automationaccounts
policy_id: 07c818eb-df75-4465-9233-6a8667e86670
source: azure_policy_builtin
mitre_techniques:
- T1562.008
mitre_tactics:
- defense-evasion
threat_tags:
- logging-disabled
threat_category: defense_evasion
