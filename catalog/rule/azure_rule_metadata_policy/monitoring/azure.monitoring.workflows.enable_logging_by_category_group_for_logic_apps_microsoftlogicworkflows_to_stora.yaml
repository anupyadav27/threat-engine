title: Enable logging by category group for Logic apps (microsoft.logic/workflows) to Storage
description: Resource logs should be enabled to track activities and events that take place on your resources and give you
  visibility and insights into any changes that occur. This policy deploys a diagnostic setting using a category group to
  route logs to a Storage Account for Logic apps (microsoft.logic/workflows).
