rule_id: azure.monitoring.botservices.enable_logging_by_category_group_for_bot_services_microsoftbotservicebotservices
service: monitoring
resource: botservices
title: Enable logging by category group for Bot Services (microsoft.botservice/botservices) to Storage
description: Resource logs should be enabled to track activities and events that take place on your resources and give you
  visibility and insights into any changes that occur. This policy deploys a diagnostic setting using a category group to
  route logs to a Storage Account for Bot Services (microsoft.botservice/botservices).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.botservices
assertion_id: monitoring.enable_logging_by_category_group_for_bot_services_microsoftbotservicebotservices
effect: DeployIfNotExists
