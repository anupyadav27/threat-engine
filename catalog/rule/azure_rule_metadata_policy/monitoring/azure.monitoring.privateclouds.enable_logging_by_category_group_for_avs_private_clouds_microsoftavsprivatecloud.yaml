rule_id: azure.monitoring.privateclouds.enable_logging_by_category_group_for_avs_private_clouds_microsoftavsprivatecloud
service: monitoring
resource: privateclouds
title: Enable logging by category group for AVS Private clouds (microsoft.avs/privateclouds)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for AVS Private clouds (microsoft.avs/privateclouds).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.privateclouds
assertion_id: monitoring.enable_logging_by_category_group_for_avs_private_clouds_microsoftavsprivatecloud
effect: DeployIfNotExists
resource_type: microsoft.avs/privateclouds
