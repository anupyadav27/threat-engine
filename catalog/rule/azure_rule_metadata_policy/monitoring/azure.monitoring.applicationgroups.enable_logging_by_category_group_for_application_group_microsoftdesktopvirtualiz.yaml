rule_id: azure.monitoring.applicationgroups.enable_logging_by_category_group_for_application_group_microsoftdesktopvirtualiz
service: monitoring
resource: applicationgroups
title: Enable logging by category group for Application group (microsoft.desktopvirtualization/applicationgroups)
  to Log Analytics
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Log Analytics workspace for Azure Virtual Desktop Application group (microsoft.desktopvirtualization/applicationgroups).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.applicationgroups
assertion_id: monitoring.enable_logging_by_category_group_for_application_group_microsoftdesktopvirtualiz
effect: DeployIfNotExists
resource_type: microsoft.desktopvirtualization/applicationgroups
