rule_id: azure.monitoring.workflows.enable_logging_by_category_group_for_logic_apps_microsoftlogicworkflows_to_log_a
service: monitoring
resource: workflows
title: Enable logging by category group for Logic apps (microsoft.logic/workflows)
  to Log Analytics
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Log Analytics workspace for Logic apps (microsoft.logic/workflows).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.workflows
assertion_id: monitoring.enable_logging_by_category_group_for_logic_apps_microsoftlogicworkflows_to_log_a
effect: DeployIfNotExists
resource_type: microsoft.logic/workflows
policy_id: 63d1a629-735c-448b-b45f-5e3865e84cf5
source: azure_policy_builtin
mitre_techniques:
- T1562.008
mitre_tactics:
- defense-evasion
threat_tags:
- logging-disabled
threat_category: defense_evasion
