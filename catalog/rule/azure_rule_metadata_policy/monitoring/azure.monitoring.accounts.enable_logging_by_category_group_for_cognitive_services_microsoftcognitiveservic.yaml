rule_id: azure.monitoring.accounts.enable_logging_by_category_group_for_cognitive_services_microsoftcognitiveservic
service: monitoring
resource: accounts
title: Enable logging by category group for Cognitive Services (microsoft.cognitiveservices/accounts)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for Cognitive Services (microsoft.cognitiveservices/accounts).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.accounts
assertion_id: monitoring.enable_logging_by_category_group_for_cognitive_services_microsoftcognitiveservic
effect: DeployIfNotExists
resource_type: microsoft.cognitiveservices/accounts
policy_id: 14e81583-c89c-47db-af0d-f9ddddcccd9f
source: azure_policy_builtin
mitre_techniques:
- T1562.008
mitre_tactics:
- defense-evasion
threat_tags:
- logging-disabled
threat_category: defense_evasion
