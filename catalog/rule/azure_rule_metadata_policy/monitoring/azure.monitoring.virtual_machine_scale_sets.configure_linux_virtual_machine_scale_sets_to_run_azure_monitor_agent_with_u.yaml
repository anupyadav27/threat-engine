rule_id: azure.monitoring.virtual_machine_scale_sets.configure_linux_virtual_machine_scale_sets_to_run_azure_monitor_agent_with_usera
service: monitoring
resource: virtual_machine_scale_sets
title: Configure Linux virtual machine scale sets to run Azure Monitor Agent with user-assigned managed identity-based authentication
description: 'Automate the deployment of Azure Monitor Agent extension on your Linux virtual machine scale sets for collecting
  telemetry data from the guest OS. This policy will install the extension and configure it to use the specified user-assigned
  managed identity if the OS and region are supported, and skip install otherwise. Learn more: https://aka.ms/AMAOverview.'
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.virtual_machine_scale_sets
assertion_id: monitoring.configure_linux_virtual_machine_scale_sets_to_run_azure_monitor_agent_with_usera
effect: DeployIfNotExists
