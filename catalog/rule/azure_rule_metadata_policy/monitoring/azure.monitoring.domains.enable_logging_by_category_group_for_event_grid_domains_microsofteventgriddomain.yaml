rule_id: azure.monitoring.domains.enable_logging_by_category_group_for_event_grid_domains_microsofteventgriddomain
service: monitoring
resource: domains
title: Enable logging by category group for Event Grid Domains (microsoft.eventgrid/domains)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for Event Grid Domains (microsoft.eventgrid/domains).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.domains
assertion_id: monitoring.enable_logging_by_category_group_for_event_grid_domains_microsofteventgriddomain
effect: DeployIfNotExists
resource_type: microsoft.eventgrid/domains
policy_id: 03a087c0-b49f-4440-9ae5-013703eccc8c
source: azure_policy_builtin
mitre_techniques:
- T1562.008
mitre_tactics:
- defense-evasion
threat_tags:
- logging-disabled
threat_category: defense_evasion
