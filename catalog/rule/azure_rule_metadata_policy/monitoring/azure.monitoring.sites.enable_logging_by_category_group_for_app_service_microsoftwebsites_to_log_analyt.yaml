rule_id: azure.monitoring.sites.enable_logging_by_category_group_for_app_service_microsoftwebsites_to_log_analyt
service: monitoring
resource: sites
title: Enable logging by category group for App Service (microsoft.web/sites) to Log
  Analytics
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Log Analytics workspace for App Service (microsoft.web/sites).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.sites
assertion_id: monitoring.enable_logging_by_category_group_for_app_service_microsoftwebsites_to_log_analyt
