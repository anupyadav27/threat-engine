rule_id: azure.monitoring.log_profiles.storage_account_containing_the_container_with_activity_logs_must_be_encrypted_wi
service: monitoring
resource: log_profiles
title: Storage account containing the container with activity logs must be encrypted with BYOK
description: 'This policy audits if the Storage account containing the container with activity logs is encrypted with BYOK.
  The policy works only if the storage account lies on the same subscription as activity logs by design. More information
  on Azure Storage encryption at rest can be found here https://aka.ms/azurestoragebyok. '
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.log_profiles
assertion_id: monitoring.storage_account_containing_the_container_with_activity_logs_must_be_encrypted_wi
effect: AuditIfNotExists
resource_type: Microsoft.Insights/logProfiles
