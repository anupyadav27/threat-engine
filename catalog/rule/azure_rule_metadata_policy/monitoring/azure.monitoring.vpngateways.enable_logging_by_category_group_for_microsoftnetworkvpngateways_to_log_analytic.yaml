rule_id: azure.monitoring.vpngateways.enable_logging_by_category_group_for_microsoftnetworkvpngateways_to_log_analytic
service: monitoring
resource: vpngateways
title: Enable logging by category group for microsoft.network/vpngateways to Log Analytics
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Log Analytics workspace for microsoft.network/vpngateways.
