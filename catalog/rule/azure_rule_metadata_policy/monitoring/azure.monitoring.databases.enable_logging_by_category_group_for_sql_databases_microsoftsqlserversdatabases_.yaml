rule_id: azure.monitoring.databases.enable_logging_by_category_group_for_sql_databases_microsoftsqlserversdatabases_
service: monitoring
resource: databases
title: Enable logging by category group for SQL databases (microsoft.sql/servers/databases)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for SQL databases (microsoft.sql/servers/databases).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.databases
assertion_id: monitoring.enable_logging_by_category_group_for_sql_databases_microsoftsqlserversdatabases_
effect: DeployIfNotExists
resource_type: microsoft.sql/servers/databases
policy_id: 8656d368-0643-4374-a63f-ae0ed4da1d9a
source: azure_policy_builtin
mitre_techniques:
- T1562.008
mitre_tactics:
- defense-evasion
threat_tags:
- logging-disabled
threat_category: defense_evasion
