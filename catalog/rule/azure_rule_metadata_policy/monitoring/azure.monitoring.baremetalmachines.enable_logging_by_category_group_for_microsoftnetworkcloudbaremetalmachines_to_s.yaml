rule_id: azure.monitoring.baremetalmachines.enable_logging_by_category_group_for_microsoftnetworkcloudbaremetalmachines_to_s
service: monitoring
resource: baremetalmachines
title: Enable logging by category group for microsoft.networkcloud/baremetalmachines
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for microsoft.networkcloud/baremetalmachines.
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.baremetalmachines
assertion_id: monitoring.enable_logging_by_category_group_for_microsoftnetworkcloudbaremetalmachines_to_s
effect: DeployIfNotExists
resource_type: microsoft.networkcloud/baremetalmachines
policy_id: e6421995-539a-4ce3-854b-1c88534396cf
source: azure_policy_builtin
mitre_techniques:
- T1562.008
mitre_tactics:
- defense-evasion
threat_tags:
- logging-disabled
threat_category: defense_evasion
