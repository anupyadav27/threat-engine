rule_id: azure.monitoring.virtual_machines.linux_virtual_machines_should_have_azure_monitor_agent_installed
service: monitoring
resource: virtual_machines
title: Linux virtual machines should have Azure Monitor Agent installed
description: 'Linux virtual machines should be monitored and secured through the deployed Azure Monitor Agent. The Azure Monitor
  Agent collects telemetry data from the guest OS. This policy will audit virtual machines with supported OS images in supported
  regions. Learn more: https://aka.ms/AMAOverview.'
