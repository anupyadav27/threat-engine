rule_id: azure.monitoring.namespaces.enable_logging_by_category_group_for_event_hubs_namespaces_microsofteventhubname
service: monitoring
resource: namespaces
title: Enable logging by category group for Event Hubs Namespaces (microsoft.eventhub/namespaces)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for Event Hubs Namespaces (microsoft.eventhub/namespaces).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.namespaces
assertion_id: monitoring.enable_logging_by_category_group_for_event_hubs_namespaces_microsofteventhubname
effect: DeployIfNotExists
resource_type: microsoft.eventhub/namespaces
