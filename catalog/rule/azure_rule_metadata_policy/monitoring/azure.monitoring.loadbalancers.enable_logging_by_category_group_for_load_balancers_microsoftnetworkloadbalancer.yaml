rule_id: azure.monitoring.loadbalancers.enable_logging_by_category_group_for_load_balancers_microsoftnetworkloadbalancer
service: monitoring
resource: loadbalancers
title: Enable logging by category group for Load balancers (microsoft.network/loadbalancers) to Storage
description: Resource logs should be enabled to track activities and events that take place on your resources and give you
  visibility and insights into any changes that occur. This policy deploys a diagnostic setting using a category group to
  route logs to a Storage Account for Load balancers (microsoft.network/loadbalancers).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.loadbalancers
