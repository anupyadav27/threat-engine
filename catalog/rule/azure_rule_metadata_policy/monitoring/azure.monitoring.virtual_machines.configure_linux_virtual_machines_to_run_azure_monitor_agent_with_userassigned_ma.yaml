rule_id: azure.monitoring.virtual_machines.configure_linux_virtual_machines_to_run_azure_monitor_agent_with_userassigned_ma
service: monitoring
resource: virtual_machines
title: Configure Linux virtual machines to run Azure Monitor Agent with user-assigned
  managed identity-based authentication
description: 'Automate the deployment of Azure Monitor Agent extension on your Linux
  virtual machines for collecting telemetry data from the guest OS. This policy will
  install the extension and configure it to use the specified user-assigned managed
  identity if the OS and region are supported, and skip install otherwise. Learn more:
  https://aka.ms/AMAOverview.'
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.virtual_machines
assertion_id: monitoring.configure_linux_virtual_machines_to_run_azure_monitor_agent_with_userassigned_ma
effect: DeployIfNotExists
