rule_id: azure.monitoring.service.enable_logging_by_category_group_for_api_management_services_microsoftapimanagem
service: monitoring
resource: service
title: Enable logging by category group for API Management services (microsoft.apimanagement/service)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for API Management services (microsoft.apimanagement/service).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.service
assertion_id: monitoring.enable_logging_by_category_group_for_api_management_services_microsoftapimanagem
effect: DeployIfNotExists
resource_type: microsoft.apimanagement/service
