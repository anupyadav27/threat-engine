rule_id: azure.monitoring.integrationaccounts.enable_logging_by_category_group_for_integration_accounts_microsoftlogicintegrat
service: monitoring
resource: integrationaccounts
title: Enable logging by category group for Integration accounts (microsoft.logic/integrationaccounts)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for Integration accounts (microsoft.logic/integrationaccounts).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.integrationaccounts
assertion_id: monitoring.enable_logging_by_category_group_for_integration_accounts_microsoftlogicintegrat
effect: DeployIfNotExists
resource_type: microsoft.logic/integrationaccounts
policy_id: 8464ded4-af15-4319-950f-a30400d35247
source: azure_policy_builtin
