rule_id: azure.monitoring.managedenvironments.enable_logging_by_category_group_for_container_apps_environments_microsoftappman
service: monitoring
resource: managedenvironments
title: Enable logging by category group for Container Apps Environments (microsoft.app/managedenvironments)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for Container Apps Environments (microsoft.app/managedenvironments).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.managedenvironments
assertion_id: monitoring.enable_logging_by_category_group_for_container_apps_environments_microsoftappman
effect: DeployIfNotExists
resource_type: microsoft.app/managedenvironments
policy_id: a26c842f-bee7-4a1f-9ae1-a973d3a0075a
source: azure_policy_builtin
mitre_techniques:
- T1562.008
mitre_tactics:
- defense-evasion
threat_tags:
- logging-disabled
threat_category: defense_evasion
