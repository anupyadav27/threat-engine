rule_id: azure.monitoring.accounts.enable_logging_by_category_group_for_playwright_testing_microsoftazureplaywright
service: monitoring
resource: accounts
title: Enable logging by category group for Playwright Testing (microsoft.azureplaywrightservice/accounts)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for Playwright Testing (microsoft.azureplaywrightservice/accounts).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.accounts
assertion_id: monitoring.enable_logging_by_category_group_for_playwright_testing_microsoftazureplaywright
effect: DeployIfNotExists
resource_type: microsoft.azureplaywrightservice/accounts
policy_id: 2e3285f9-ae82-4f69-b83f-5b6f1ee69f3a
source: azure_policy_builtin
mitre_techniques:
- T1562.008
mitre_tactics:
- defense-evasion
threat_tags:
- logging-disabled
threat_category: defense_evasion
