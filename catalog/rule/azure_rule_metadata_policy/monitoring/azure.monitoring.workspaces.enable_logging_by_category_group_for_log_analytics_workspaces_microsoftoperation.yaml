rule_id: azure.monitoring.workspaces.enable_logging_by_category_group_for_log_analytics_workspaces_microsoftoperation
service: monitoring
resource: workspaces
title: Enable logging by category group for Log Analytics workspaces (microsoft.operationalinsights/workspaces) to Storage
description: Resource logs should be enabled to track activities and events that take place on your resources and give you
  visibility and insights into any changes that occur. This policy deploys a diagnostic setting using a category group to
  route logs to a Storage Account for Log Analytics workspaces (microsoft.operationalinsights/workspaces).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.workspaces
assertion_id: monitoring.enable_logging_by_category_group_for_log_analytics_workspaces_microsoftoperation
effect: DeployIfNotExists
resource_type: microsoft.operationalinsights/workspaces
policy_id: fe85de62-a656-4b79-9d94-d95c89319bd9
source: azure_policy_builtin
