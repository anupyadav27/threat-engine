rule_id: azure.monitoring.private_link_scopes.azure_monitor_private_link_scope_should_block_access_to_non_private_link_resourc
service: monitoring
resource: private_link_scopes
title: Azure Monitor Private Link Scope should block access to non private link resources
description: 'Azure Private Link lets you connect your virtual networks to Azure resources through a private endpoint to an
  Azure Monitor Private Link scope (AMPLS). Private Link Access modes are set on your AMPLS to control whether ingestion and
  query requests from your networks can reach all resources, or only Private Link resources (to prevent data exfiltration).
  Learn more about private links at: https://docs.microsoft.com/azure/azure-monitor/logs/private-link-security#private-link-access-modes-private-only-vs-open.'
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.private_link_scopes
