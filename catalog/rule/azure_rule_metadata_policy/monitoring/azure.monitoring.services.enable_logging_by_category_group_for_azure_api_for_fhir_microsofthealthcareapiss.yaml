rule_id: azure.monitoring.services.enable_logging_by_category_group_for_azure_api_for_fhir_microsofthealthcareapiss
service: monitoring
resource: services
title: Enable logging by category group for Azure API for FHIR (microsoft.healthcareapis/services)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for Azure API for FHIR (microsoft.healthcareapis/services).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.services
assertion_id: monitoring.enable_logging_by_category_group_for_azure_api_for_fhir_microsofthealthcareapiss
effect: DeployIfNotExists
resource_type: microsoft.healthcareapis/services
