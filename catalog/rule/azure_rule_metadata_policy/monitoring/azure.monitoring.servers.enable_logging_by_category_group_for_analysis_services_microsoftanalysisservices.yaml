rule_id: azure.monitoring.servers.enable_logging_by_category_group_for_analysis_services_microsoftanalysisservices
service: monitoring
resource: servers
title: Enable logging by category group for Analysis Services (microsoft.analysisservices/servers) to Storage
description: Resource logs should be enabled to track activities and events that take place on your resources and give you
  visibility and insights into any changes that occur. This policy deploys a diagnostic setting using a category group to
  route logs to a Storage Account for Analysis Services (microsoft.analysisservices/servers).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.servers
assertion_id: monitoring.enable_logging_by_category_group_for_analysis_services_microsoftanalysisservices
effect: DeployIfNotExists
resource_type: microsoft.analysisservices/servers
