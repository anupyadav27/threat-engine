rule_id: azure.monitoring.namespaces.enable_logging_by_category_group_for_notification_hub_namespaces_microsoftnotifi
service: monitoring
resource: namespaces
title: Enable logging by category group for Notification Hub Namespaces (microsoft.notificationhubs/namespaces) to Storage
description: Resource logs should be enabled to track activities and events that take place on your resources and give you
  visibility and insights into any changes that occur. This policy deploys a diagnostic setting using a category group to
  route logs to a Storage Account for Notification Hub Namespaces (microsoft.notificationhubs/namespaces).
domain: logging_monitoring_and_alerting
severity: medium
