rule_id: azure.monitoring.workspaces.enable_logging_by_category_group_for_microsoftpowerbitenantsworkspaces_to_storag
service: monitoring
resource: workspaces
title: Enable logging by category group for microsoft.powerbi/tenants/workspaces to
  Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for microsoft.powerbi/tenants/workspaces.
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.workspaces
assertion_id: monitoring.enable_logging_by_category_group_for_microsoftpowerbitenantsworkspaces_to_storag
effect: DeployIfNotExists
resource_type: microsoft.powerbi/tenants/workspaces
policy_id: 819c6fd1-432a-4516-a9cb-0c4462af610f
source: azure_policy_builtin
mitre_techniques:
- T1562.008
mitre_tactics:
- defense-evasion
threat_tags:
- logging-disabled
threat_category: defense_evasion
