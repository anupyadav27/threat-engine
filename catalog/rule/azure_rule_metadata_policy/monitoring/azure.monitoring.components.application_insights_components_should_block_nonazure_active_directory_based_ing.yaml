rule_id: azure.monitoring.components.application_insights_components_should_block_nonazure_active_directory_based_ing
service: monitoring
resource: components
title: Application Insights components should block non-Azure Active Directory based
  ingestion.
description: Enforcing log ingestion to require Azure Active Directory authentication
  prevents unauthenticated logs from an attacker which could lead to incorrect status,
  false alerts, and incorrect logs stored in the system.
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.components
assertion_id: monitoring.application_insights_components_should_block_nonazure_active_directory_based_ing
effect: Audit
resource_type: Microsoft.Insights/components
policy_id: 199d5677-e4d9-4264-9465-efe1839c06bd
source: azure_policy_builtin
mitre_techniques:
- T1556
mitre_tactics:
- credential-access
threat_tags:
- auth-weakened
threat_category: credential_access
