rule_id: azure.monitoring.virtual_machine_scale_sets.deploy_dependency_agent_for_linux_virtual_machine_scale_sets
service: monitoring
resource: virtual_machine_scale_sets
title: Deploy Dependency agent for Linux virtual machine scale sets
description: 'Deploy Dependency agent for Linux virtual machine scale sets if the VM Image (OS) is in the list defined and
  the agent is not installed. Note: if your scale set upgradePolicy is set to Manual, you need to apply the extension to the
  all virtual machines in the set by calling upgrade on them. In CLI this would be az vmss update-instances.'
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.virtual_machine_scale_sets
assertion_id: monitoring.deploy_dependency_agent_for_linux_virtual_machine_scale_sets
effect: deployIfNotExists
resource_type: Microsoft.Compute/virtualMachineScaleSets
policy_id: 765266ab-e40e-4c61-bcb2-5a5275d0b7c0
source: azure_policy_builtin
