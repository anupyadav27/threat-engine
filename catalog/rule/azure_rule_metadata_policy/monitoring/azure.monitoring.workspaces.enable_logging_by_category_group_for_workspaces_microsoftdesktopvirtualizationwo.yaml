rule_id: azure.monitoring.workspaces.enable_logging_by_category_group_for_workspaces_microsoftdesktopvirtualizationwo
service: monitoring
resource: workspaces
title: Enable logging by category group for Workspaces (microsoft.desktopvirtualization/workspaces)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for Workspaces (microsoft.desktopvirtualization/workspaces).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.workspaces
assertion_id: monitoring.enable_logging_by_category_group_for_workspaces_microsoftdesktopvirtualizationwo
effect: DeployIfNotExists
resource_type: microsoft.desktopvirtualization/workspaces
policy_id: e6acdfc4-25e3-4b36-9b0c-5c5743edd1b7
source: azure_policy_builtin
mitre_techniques:
- T1562.008
mitre_tactics:
- defense-evasion
threat_tags:
- logging-disabled
threat_category: defense_evasion
