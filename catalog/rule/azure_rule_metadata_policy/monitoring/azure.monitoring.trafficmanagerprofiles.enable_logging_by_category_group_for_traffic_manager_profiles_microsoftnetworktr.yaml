rule_id: azure.monitoring.trafficmanagerprofiles.enable_logging_by_category_group_for_traffic_manager_profiles_microsoftnetworktr
service: monitoring
resource: trafficmanagerprofiles
title: Enable logging by category group for Traffic Manager profiles (microsoft.network/trafficmanagerprofiles)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for Traffic Manager profiles (microsoft.network/trafficmanagerprofiles).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.trafficmanagerprofiles
assertion_id: monitoring.enable_logging_by_category_group_for_traffic_manager_profiles_microsoftnetworktr
effect: DeployIfNotExists
resource_type: microsoft.network/trafficmanagerprofiles
