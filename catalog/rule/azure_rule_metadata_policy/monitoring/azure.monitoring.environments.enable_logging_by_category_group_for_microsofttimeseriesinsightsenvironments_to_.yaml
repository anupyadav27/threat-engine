rule_id: azure.monitoring.environments.enable_logging_by_category_group_for_microsofttimeseriesinsightsenvironments_to_
service: monitoring
resource: environments
title: Enable logging by category group for microsoft.timeseriesinsights/environments to Storage
description: Resource logs should be enabled to track activities and events that take place on your resources and give you
  visibility and insights into any changes that occur. This policy deploys a diagnostic setting using a category group to
  route logs to a Storage Account for microsoft.timeseriesinsights/environments.
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.environments
assertion_id: monitoring.enable_logging_by_category_group_for_microsofttimeseriesinsightsenvironments_to_
effect: DeployIfNotExists
resource_type: microsoft.timeseriesinsights/environments
