rule_id: azure.monitoring.flexibleservers.enable_logging_by_category_group_for_microsoftdbforpostgresqlflexibleservers_to_
service: monitoring
resource: flexibleservers
title: Enable logging by category group for microsoft.dbforpostgresql/flexibleservers
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for microsoft.dbforpostgresql/flexibleservers.
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.flexibleservers
