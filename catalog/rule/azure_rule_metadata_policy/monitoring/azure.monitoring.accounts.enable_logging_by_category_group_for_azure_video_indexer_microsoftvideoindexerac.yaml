rule_id: azure.monitoring.accounts.enable_logging_by_category_group_for_azure_video_indexer_microsoftvideoindexerac
service: monitoring
resource: accounts
title: Enable logging by category group for Azure Video Indexer (microsoft.videoindexer/accounts)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for Azure Video Indexer (microsoft.videoindexer/accounts).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.accounts
assertion_id: monitoring.enable_logging_by_category_group_for_azure_video_indexer_microsoftvideoindexerac
effect: DeployIfNotExists
resource_type: microsoft.videoindexer/accounts
policy_id: 2f6556cb-a2da-4130-a0dd-e5d05dccf9bb
source: azure_policy_builtin
mitre_techniques:
- T1562.008
mitre_tactics:
- defense-evasion
threat_tags:
- logging-disabled
threat_category: defense_evasion
