rule_id: azure.monitoring.machines.windows_arcenabled_machines_should_have_azure_monitor_agent_installed
service: monitoring
resource: machines
title: Windows Arc-enabled machines should have Azure Monitor Agent installed
description: 'Windows Arc-enabled machines should be monitored and secured through
  the deployed Azure Monitor Agent. The Azure Monitor Agent collects telemetry data
  from the guest OS. Windows Arc-enabled machines in supported regions are monitored
  for Azure Monitor Agent deployment. Learn more: https://aka.ms/AMAOverview.'
