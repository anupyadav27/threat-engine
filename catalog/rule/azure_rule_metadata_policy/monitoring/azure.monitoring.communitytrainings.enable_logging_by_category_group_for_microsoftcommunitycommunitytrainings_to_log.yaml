rule_id: azure.monitoring.communitytrainings.enable_logging_by_category_group_for_microsoftcommunitycommunitytrainings_to_log
service: monitoring
resource: communitytrainings
title: Enable logging by category group for microsoft.community/communitytrainings
  to Log Analytics
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Log Analytics workspace for microsoft.community/communitytrainings.
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.communitytrainings
assertion_id: monitoring.enable_logging_by_category_group_for_microsoftcommunitycommunitytrainings_to_log
effect: DeployIfNotExists
resource_type: microsoft.community/communitytrainings
