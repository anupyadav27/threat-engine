rule_id: azure.monitoring.namespaces.enable_logging_by_category_group_for_relays_microsoftrelaynamespaces_to_storage
service: monitoring
resource: namespaces
title: Enable logging by category group for Relays (microsoft.relay/namespaces) to
  Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for Relays (microsoft.relay/namespaces).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.namespaces
assertion_id: monitoring.enable_logging_by_category_group_for_relays_microsoftrelaynamespaces_to_storage
effect: DeployIfNotExists
resource_type: microsoft.relay/namespaces
policy_id: 2853b2ac-3ce0-4e51-a1e3-086591e7028a
source: azure_policy_builtin
mitre_techniques:
- T1562.008
mitre_tactics:
- defense-evasion
threat_tags:
- logging-disabled
threat_category: defense_evasion
