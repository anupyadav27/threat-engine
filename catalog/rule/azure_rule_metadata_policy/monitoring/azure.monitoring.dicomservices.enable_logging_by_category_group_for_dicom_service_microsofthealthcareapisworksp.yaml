rule_id: azure.monitoring.dicomservices.enable_logging_by_category_group_for_dicom_service_microsofthealthcareapisworksp
service: monitoring
resource: dicomservices
title: Enable logging by category group for DICOM service (microsoft.healthcareapis/workspaces/dicomservices)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for DICOM service (microsoft.healthcareapis/workspaces/dicomservices).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.dicomservices
assertion_id: monitoring.enable_logging_by_category_group_for_dicom_service_microsofthealthcareapisworksp
effect: DeployIfNotExists
