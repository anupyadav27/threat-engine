rule_id: azure.monitoring.codesigningaccounts.enable_logging_by_category_group_for_code_signing_accounts_microsoftcodesigningc
service: monitoring
resource: codesigningaccounts
title: Enable logging by category group for Code Signing Accounts (microsoft.codesigning/codesigningaccounts) to Storage
description: Resource logs should be enabled to track activities and events that take place on your resources and give you
  visibility and insights into any changes that occur. This policy deploys a diagnostic setting using a category group to
  route logs to a Storage Account for Code Signing Accounts (microsoft.codesigning/codesigningaccounts).
domain: logging_monitoring_and_alerting
severity: medium
