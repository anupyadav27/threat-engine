rule_id: azure.monitoring.loadtests.enable_logging_by_category_group_for_azure_load_testing_microsoftloadtestservice
service: monitoring
resource: loadtests
title: Enable logging by category group for Azure Load Testing (microsoft.loadtestservice/loadtests) to Storage
description: Resource logs should be enabled to track activities and events that take place on your resources and give you
  visibility and insights into any changes that occur. This policy deploys a diagnostic setting using a category group to
  route logs to a Storage Account for Azure Load Testing (microsoft.loadtestservice/loadtests).
domain: logging_monitoring_and_alerting
severity: medium
