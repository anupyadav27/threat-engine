rule_id: azure.monitoring.virtual_machines.windows_virtual_machines_should_have_azure_monitor_agent_installed
service: monitoring
resource: virtual_machines
title: Windows virtual machines should have Azure Monitor Agent installed
description: 'Windows virtual machines should be monitored and secured through the
  deployed Azure Monitor Agent. The Azure Monitor Agent collects telemetry data from
  the guest OS. Windows virtual machines with supported OS and in supported regions
  are monitored for Azure Monitor Agent deployment. Learn more: https://aka.ms/AMAOverview.'
domain: logging_monitoring_and_alerting
severity: medium
