rule_id: azure.monitoring.iotconnectors.enable_logging_by_category_group_for_medtech_service_microsofthealthcareapiswork
service: monitoring
resource: iotconnectors
title: Enable logging by category group for MedTech service (microsoft.healthcareapis/workspaces/iotconnectors)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for MedTech service (microsoft.healthcareapis/workspaces/iotconnectors).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.iotconnectors
assertion_id: monitoring.enable_logging_by_category_group_for_medtech_service_microsofthealthcareapiswork
effect: DeployIfNotExists
resource_type: microsoft.healthcareapis/workspaces/iotconnectors
