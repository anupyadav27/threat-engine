rule_id: azure.monitoring.hostpools.enable_logging_by_category_group_for_host_pool_microsoftdesktopvirtualizationhos
service: monitoring
resource: hostpools
title: Enable logging by category group for Host pool (microsoft.desktopvirtualization/hostpools)
  to Log Analytics
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Log Analytics workspace for Azure Virtual Desktop Host pool (microsoft.desktopvirtualization/hostpools).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.hostpools
assertion_id: monitoring.enable_logging_by_category_group_for_host_pool_microsoftdesktopvirtualizationhos
effect: DeployIfNotExists
