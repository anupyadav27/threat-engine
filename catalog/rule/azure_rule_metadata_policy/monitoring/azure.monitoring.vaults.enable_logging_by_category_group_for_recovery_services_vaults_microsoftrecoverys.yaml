rule_id: azure.monitoring.vaults.enable_logging_by_category_group_for_recovery_services_vaults_microsoftrecoverys
service: monitoring
resource: vaults
title: Enable logging by category group for Recovery Services vaults (microsoft.recoveryservices/vaults)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for Recovery Services vaults (microsoft.recoveryservices/vaults).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.vaults
assertion_id: monitoring.enable_logging_by_category_group_for_recovery_services_vaults_microsoftrecoverys
effect: DeployIfNotExists
resource_type: microsoft.recoveryservices/vaults
policy_id: b678d84d-9723-4df0-a131-82c730231f1e
source: azure_policy_builtin
mitre_techniques:
- T1562.008
mitre_tactics:
- defense-evasion
threat_tags:
- logging-disabled
threat_category: defense_evasion
