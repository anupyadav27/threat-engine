rule_id: azure.monitoring.accounts.enable_logging_by_category_group_for_data_shares_microsoftdatashareaccounts_to_s
service: monitoring
resource: accounts
title: Enable logging by category group for Data Shares (microsoft.datashare/accounts) to Storage
description: Resource logs should be enabled to track activities and events that take place on your resources and give you
  visibility and insights into any changes that occur. This policy deploys a diagnostic setting using a category group to
  route logs to a Storage Account for Data Shares (microsoft.datashare/accounts).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.accounts
assertion_id: monitoring.enable_logging_by_category_group_for_data_shares_microsoftdatashareaccounts_to_s
effect: DeployIfNotExists
resource_type: microsoft.datashare/accounts
policy_id: 852877d5-b61d-4741-b649-85a324bb3fd4
source: azure_policy_builtin
