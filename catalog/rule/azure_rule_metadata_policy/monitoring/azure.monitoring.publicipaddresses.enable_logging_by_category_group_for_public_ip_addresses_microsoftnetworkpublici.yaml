rule_id: azure.monitoring.publicipaddresses.enable_logging_by_category_group_for_public_ip_addresses_microsoftnetworkpublici
service: monitoring
resource: publicipaddresses
title: Enable logging by category group for Public IP addresses (microsoft.network/publicipaddresses)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for Public IP addresses (microsoft.network/publicipaddresses).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.publicipaddresses
assertion_id: monitoring.enable_logging_by_category_group_for_public_ip_addresses_microsoftnetworkpublici
effect: DeployIfNotExists
