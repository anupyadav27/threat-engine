rule_id: azure.monitoring.catalogs.enable_logging_by_category_group_for_microsoftazurespherecatalogs_to_storage
service: monitoring
resource: catalogs
title: Enable logging by category group for microsoft.azuresphere/catalogs to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for microsoft.azuresphere/catalogs.
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.catalogs
assertion_id: monitoring.enable_logging_by_category_group_for_microsoftazurespherecatalogs_to_storage
effect: DeployIfNotExists
resource_type: microsoft.azuresphere/catalogs
