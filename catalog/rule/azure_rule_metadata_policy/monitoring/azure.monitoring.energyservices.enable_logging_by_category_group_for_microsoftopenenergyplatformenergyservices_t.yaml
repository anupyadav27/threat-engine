rule_id: azure.monitoring.energyservices.enable_logging_by_category_group_for_microsoftopenenergyplatformenergyservices_t
service: monitoring
resource: energyservices
title: Enable logging by category group for microsoft.openenergyplatform/energyservices
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for microsoft.openenergyplatform/energyservices.
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.energyservices
assertion_id: monitoring.enable_logging_by_category_group_for_microsoftopenenergyplatformenergyservices_t
effect: DeployIfNotExists
resource_type: microsoft.openenergyplatform/energyservices
