rule_id: azure.monitoring.networksecuritygroups.enable_logging_by_category_group_for_microsoftclassicnetworknetworksecuritygroup
service: monitoring
resource: networksecuritygroups
title: Enable logging by category group for microsoft.classicnetwork/networksecuritygroups
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for microsoft.classicnetwork/networksecuritygroups.
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.networksecuritygroups
assertion_id: monitoring.enable_logging_by_category_group_for_microsoftclassicnetworknetworksecuritygroup
effect: DeployIfNotExists
resource_type: microsoft.classicnetwork/networksecuritygroups
