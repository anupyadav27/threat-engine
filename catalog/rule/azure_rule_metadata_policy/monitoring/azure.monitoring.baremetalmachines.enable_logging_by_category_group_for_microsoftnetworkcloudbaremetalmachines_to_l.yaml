rule_id: azure.monitoring.baremetalmachines.enable_logging_by_category_group_for_microsoftnetworkcloudbaremetalmachines_to_l
service: monitoring
resource: baremetalmachines
title: Enable logging by category group for microsoft.networkcloud/baremetalmachines
  to Log Analytics
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Log Analytics workspace for microsoft.networkcloud/baremetalmachines.
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.baremetalmachines
assertion_id: monitoring.enable_logging_by_category_group_for_microsoftnetworkcloudbaremetalmachines_to_l
effect: DeployIfNotExists
resource_type: microsoft.networkcloud/baremetalmachines
policy_id: a9725bd4-a2ad-479f-a29b-5e163cada399
source: azure_policy_builtin
mitre_techniques:
- T1562.008
mitre_tactics:
