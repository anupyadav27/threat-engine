rule_id: azure.monitoring.searchservices.enable_logging_by_category_group_for_search_services_microsoftsearchsearchservic
service: monitoring
resource: searchservices
title: Enable logging by category group for Search services (microsoft.search/searchservices)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for Search services (microsoft.search/searchservices).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.searchservices
assertion_id: monitoring.enable_logging_by_category_group_for_search_services_microsoftsearchsearchservic
effect: DeployIfNotExists
resource_type: microsoft.search/searchservices
