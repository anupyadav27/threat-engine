rule_id: azure.monitoring.devcenters.enable_logging_by_category_group_for_dev_centers_microsoftdevcenterdevcenters_to
service: monitoring
resource: devcenters
title: Enable logging by category group for Dev centers (microsoft.devcenter/devcenters)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for Dev centers (microsoft.devcenter/devcenters).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.devcenters
assertion_id: monitoring.enable_logging_by_category_group_for_dev_centers_microsoftdevcenterdevcenters_to
effect: DeployIfNotExists
resource_type: microsoft.devcenter/devcenters
