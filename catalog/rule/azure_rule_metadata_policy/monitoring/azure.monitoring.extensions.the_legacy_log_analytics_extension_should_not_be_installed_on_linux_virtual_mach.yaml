rule_id: azure.monitoring.extensions.the_legacy_log_analytics_extension_should_not_be_installed_on_linux_virtual_mach
service: monitoring
resource: extensions
title: The legacy Log Analytics extension should not be installed on Linux virtual machines
description: 'Automatically prevent installation of the legacy Log Analytics Agent as the final step of migrating from legacy
  agents to Azure Monitor Agent. After you have uninstalled existing legacy extensions, this policy will deny all future installations
  of the legacy agent extension on Linux virtual machines. Learn more: https://aka.ms/migratetoAMA'
