rule_id: azure.monitoring.communicationservices.enable_logging_by_category_group_for_communication_services_microsoftcommunicati
service: monitoring
resource: communicationservices
title: Enable logging by category group for Communication Services (microsoft.communication/communicationservices)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for Communication Services (microsoft.communication/communicationservices).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.communicationservices
assertion_id: monitoring.enable_logging_by_category_group_for_communication_services_microsoftcommunicati
effect: DeployIfNotExists
resource_type: microsoft.communication/communicationservices
