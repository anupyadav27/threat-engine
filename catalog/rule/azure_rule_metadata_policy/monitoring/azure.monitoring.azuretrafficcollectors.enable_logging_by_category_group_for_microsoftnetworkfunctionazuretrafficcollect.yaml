rule_id: azure.monitoring.azuretrafficcollectors.enable_logging_by_category_group_for_microsoftnetworkfunctionazuretrafficcollect
service: monitoring
resource: azuretrafficcollectors
title: Enable logging by category group for microsoft.networkfunction/azuretrafficcollectors
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for microsoft.networkfunction/azuretrafficcollectors.
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.azuretrafficcollectors
assertion_id: monitoring.enable_logging_by_category_group_for_microsoftnetworkfunctionazuretrafficcollect
effect: DeployIfNotExists
resource_type: microsoft.networkfunction/azuretrafficcollectors
