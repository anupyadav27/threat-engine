rule_id: azure.monitoring.machines.linux_arcenabled_machines_should_have_azure_monitor_agent_installed
service: monitoring
resource: machines
title: Linux Arc-enabled machines should have Azure Monitor Agent installed
description: 'Linux Arc-enabled machines should be monitored and secured through the deployed Azure Monitor Agent. The Azure
  Monitor Agent collects telemetry data from the guest OS. This policy will audit Arc-enabled machines in supported regions.
  Learn more: https://aka.ms/AMAOverview.'
