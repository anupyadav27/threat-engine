rule_id: azure.monitoring.virtual_machine_scale_sets.dependency_agent_should_be_enabled_in_virtual_machine_scale_sets_for_listed_virt
service: monitoring
resource: virtual_machine_scale_sets
title: Dependency agent should be enabled in virtual machine scale sets for listed
  virtual machine images
description: Reports virtual machine scale sets as non-compliant if the virtual machine
  image is in the list defined and the agent is not installed. The list of OS images
  is updated over time as support is updated.
