rule_id: azure.monitoring.workspaces.enable_logging_by_category_group_for_azure_machine_learning_microsoftmachinelear
service: monitoring
resource: workspaces
title: Enable logging by category group for Azure Machine Learning (microsoft.machinelearningservices/workspaces)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for Azure Machine Learning (microsoft.machinelearningservices/workspaces).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.workspaces
assertion_id: monitoring.enable_logging_by_category_group_for_azure_machine_learning_microsoftmachinelear
effect: DeployIfNotExists
resource_type: microsoft.machinelearningservices/workspaces
