rule_id: azure.monitoring.onlineendpoints.enable_logging_by_category_group_for_microsoftmachinelearningservicesworkspaceso
service: monitoring
resource: onlineendpoints
title: Enable logging by category group for microsoft.machinelearningservices/workspaces/onlineendpoints
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for microsoft.machinelearningservices/workspaces/onlineendpoints.
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.onlineendpoints
assertion_id: monitoring.enable_logging_by_category_group_for_microsoftmachinelearningservicesworkspaceso
effect: DeployIfNotExists
resource_type: microsoft.machinelearningservices/workspaces/onlineendpoints
