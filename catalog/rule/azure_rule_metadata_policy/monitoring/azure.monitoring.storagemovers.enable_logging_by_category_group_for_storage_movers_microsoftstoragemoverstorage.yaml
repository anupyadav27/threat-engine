rule_id: azure.monitoring.storagemovers.enable_logging_by_category_group_for_storage_movers_microsoftstoragemoverstorage
service: monitoring
resource: storagemovers
title: Enable logging by category group for Storage movers (microsoft.storagemover/storagemovers)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for Storage movers (microsoft.storagemover/storagemovers).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.storagemovers
assertion_id: monitoring.enable_logging_by_category_group_for_storage_movers_microsoftstoragemoverstorage
effect: DeployIfNotExists
resource_type: microsoft.storagemover/storagemovers
