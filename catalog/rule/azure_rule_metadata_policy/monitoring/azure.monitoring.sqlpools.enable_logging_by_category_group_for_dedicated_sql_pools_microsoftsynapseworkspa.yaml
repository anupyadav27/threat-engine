rule_id: azure.monitoring.sqlpools.enable_logging_by_category_group_for_dedicated_sql_pools_microsoftsynapseworkspa
service: monitoring
resource: sqlpools
title: Enable logging by category group for Dedicated SQL pools (microsoft.synapse/workspaces/sqlpools)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for Dedicated SQL pools (microsoft.synapse/workspaces/sqlpools).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.sqlpools
assertion_id: monitoring.enable_logging_by_category_group_for_dedicated_sql_pools_microsoftsynapseworkspa
effect: DeployIfNotExists
resource_type: microsoft.synapse/workspaces/sqlpools
