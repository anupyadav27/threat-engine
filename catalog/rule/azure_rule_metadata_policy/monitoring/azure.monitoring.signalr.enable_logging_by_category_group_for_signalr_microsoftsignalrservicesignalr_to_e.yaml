rule_id: azure.monitoring.signalr.enable_logging_by_category_group_for_signalr_microsoftsignalrservicesignalr_to_e
service: monitoring
resource: signalr
title: Enable logging by category group for SignalR (microsoft.signalrservice/signalr)
  to Event Hub
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to an Event Hub for SignalR (microsoft.signalrservice/signalr).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.signalr
assertion_id: monitoring.enable_logging_by_category_group_for_signalr_microsoftsignalrservicesignalr_to_e
effect: DeployIfNotExists
resource_type: microsoft.signalrservice/signalr
