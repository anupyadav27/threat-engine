rule_id: azure.monitoring.mongoclusters.enable_logging_by_category_group_for_microsoftdocumentdbmongoclusters_to_storage
service: monitoring
resource: mongoclusters
title: Enable logging by category group for microsoft.documentdb/mongoclusters to
  Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for microsoft.documentdb/mongoclusters.
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.mongoclusters
assertion_id: monitoring.enable_logging_by_category_group_for_microsoftdocumentdbmongoclusters_to_storage
effect: DeployIfNotExists
resource_type: microsoft.documentdb/mongoclusters
