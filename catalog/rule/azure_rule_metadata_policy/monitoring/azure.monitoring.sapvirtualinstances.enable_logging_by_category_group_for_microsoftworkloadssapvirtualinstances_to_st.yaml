rule_id: azure.monitoring.sapvirtualinstances.enable_logging_by_category_group_for_microsoftworkloadssapvirtualinstances_to_st
service: monitoring
resource: sapvirtualinstances
title: Enable logging by category group for microsoft.workloads/sapvirtualinstances
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for microsoft.workloads/sapvirtualinstances.
