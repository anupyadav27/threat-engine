rule_id: azure.monitoring.clusters.azure_monitor_logs_clusters_should_be_created_with_infrastructureencryption_enab
service: monitoring
resource: clusters
title: Azure Monitor Logs clusters should be created with infrastructure-encryption
  enabled (double encryption)
description: To ensure secure data encryption is enabled at the service level and
  the infrastructure level with two different encryption algorithms and two different
  keys, use an Azure Monitor dedicated cluster. This option is enabled by default
  when supported at the region, see https://docs.microsoft.com/azure/azure-monitor/platform/customer-managed-keys#customer-managed-key-overview.
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.clusters
