rule_id: azure.monitoring.virtual_machines.preview_configure_systemassigned_managed_identity_to_enable_azure_monitor_assign
service: monitoring
resource: virtual_machines
title: '[Preview]: Configure system-assigned managed identity to enable Azure Monitor assignments on VMs'
description: Configure system-assigned managed identity to virtual machines hosted in Azure that are supported by Azure Monitor
  and do not have a system-assigned managed identity. A system-assigned managed identity is a prerequisite for all Azure Monitor
  assignments and must be added to machines before using any Azure Monitor extension. Target virtual machines must be in a
  supported location.
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.virtual_machines
assertion_id: monitoring.preview_configure_systemassigned_managed_identity_to_enable_azure_monitor_assign
effect: Modify
resource_type: Microsoft.Compute/virtualMachines
