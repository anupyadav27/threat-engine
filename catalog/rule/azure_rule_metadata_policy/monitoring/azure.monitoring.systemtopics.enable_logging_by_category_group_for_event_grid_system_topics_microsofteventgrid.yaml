rule_id: azure.monitoring.systemtopics.enable_logging_by_category_group_for_event_grid_system_topics_microsofteventgrid
service: monitoring
resource: systemtopics
title: Enable logging by category group for Event Grid System Topics (microsoft.eventgrid/systemtopics) to Storage
description: Resource logs should be enabled to track activities and events that take place on your resources and give you
  visibility and insights into any changes that occur. This policy deploys a diagnostic setting using a category group to
  route logs to a Storage Account for Event Grid System Topics (microsoft.eventgrid/systemtopics).
domain: logging_monitoring_and_alerting
severity: medium
