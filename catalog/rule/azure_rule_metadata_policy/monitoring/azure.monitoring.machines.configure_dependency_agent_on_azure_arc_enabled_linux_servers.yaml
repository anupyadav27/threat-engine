rule_id: azure.monitoring.machines.configure_dependency_agent_on_azure_arc_enabled_linux_servers
service: monitoring
resource: machines
title: Configure Dependency agent on Azure Arc enabled Linux servers
description: Enable VM insights on servers and machines connected to Azure through
  Arc enabled servers by installing the Dependency agent virtual machine extension.
  VM insights uses the Dependency agent to collect network metrics and discovered
  data about processes running on the machine and external process dependencies. See
  more - https://aka.ms/vminsightsdocs.
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.machines
assertion_id: monitoring.configure_dependency_agent_on_azure_arc_enabled_linux_servers
effect: DeployIfNotExists
resource_type: Microsoft.HybridCompute/machines
policy_id: deacecc0-9f84-44d2-bb82-46f32d766d43
source: azure_policy_builtin
