rule_id: azure.monitoring.workspaces.enable_logging_by_category_group_for_azure_synapse_analytics_microsoftsynapsewor
service: monitoring
resource: workspaces
title: Enable logging by category group for Azure Synapse Analytics (microsoft.synapse/workspaces)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for Azure Synapse Analytics (microsoft.synapse/workspaces).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.workspaces
assertion_id: monitoring.enable_logging_by_category_group_for_azure_synapse_analytics_microsoftsynapsewor
effect: DeployIfNotExists
resource_type: microsoft.synapse/workspaces
policy_id: 96abcdc6-3c5a-4b0f-b031-9a4c1f36c9a6
source: azure_policy_builtin
