rule_id: azure.monitoring.workspaces.enable_logging_by_category_group_for_workspace_microsoftdesktopvirtualizationwor
service: monitoring
resource: workspaces
title: Enable logging by category group for Workspace (microsoft.desktopvirtualization/workspaces)
  to Log Analytics
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Log Analytics workspace for Azure Virtual Desktop Workspace (microsoft.desktopvirtualization/workspaces).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.workspaces
assertion_id: monitoring.enable_logging_by_category_group_for_workspace_microsoftdesktopvirtualizationwor
effect: DeployIfNotExists
