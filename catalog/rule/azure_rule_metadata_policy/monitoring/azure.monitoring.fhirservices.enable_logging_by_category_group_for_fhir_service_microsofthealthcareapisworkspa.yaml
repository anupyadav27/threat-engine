rule_id: azure.monitoring.fhirservices.enable_logging_by_category_group_for_fhir_service_microsofthealthcareapisworkspa
service: monitoring
resource: fhirservices
title: Enable logging by category group for FHIR service (microsoft.healthcareapis/workspaces/fhirservices)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for FHIR service (microsoft.healthcareapis/workspaces/fhirservices).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.fhirservices
assertion_id: monitoring.enable_logging_by_category_group_for_fhir_service_microsofthealthcareapisworkspa
effect: DeployIfNotExists
resource_type: microsoft.healthcareapis/workspaces/fhirservices
