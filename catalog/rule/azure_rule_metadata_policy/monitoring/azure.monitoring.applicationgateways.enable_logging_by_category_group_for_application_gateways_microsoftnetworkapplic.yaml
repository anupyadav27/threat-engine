rule_id: azure.monitoring.applicationgateways.enable_logging_by_category_group_for_application_gateways_microsoftnetworkapplic
service: monitoring
resource: applicationgateways
title: Enable logging by category group for Application gateways (microsoft.network/applicationgateways)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for Application gateways (microsoft.network/applicationgateways).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.applicationgateways
assertion_id: monitoring.enable_logging_by_category_group_for_application_gateways_microsoftnetworkapplic
effect: DeployIfNotExists
resource_type: microsoft.network/applicationgateways
policy_id: 887d1795-3d3d-4859-9ef4-9447392db2ea
source: azure_policy_builtin
mitre_techniques:
- T1562.008
mitre_tactics:
- defense-evasion
threat_tags:
- logging-disabled
threat_category: defense_evasion
