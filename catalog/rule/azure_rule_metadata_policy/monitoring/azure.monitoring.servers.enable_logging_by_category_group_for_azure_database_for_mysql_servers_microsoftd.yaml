rule_id: azure.monitoring.servers.enable_logging_by_category_group_for_azure_database_for_mysql_servers_microsoftd
service: monitoring
resource: servers
title: Enable logging by category group for Azure Database for MySQL servers (microsoft.dbformysql/servers) to Storage
description: Resource logs should be enabled to track activities and events that take place on your resources and give you
  visibility and insights into any changes that occur. This policy deploys a diagnostic setting using a category group to
  route logs to a Storage Account for Azure Database for MySQL servers (microsoft.dbformysql/servers).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.servers
assertion_id: monitoring.enable_logging_by_category_group_for_azure_database_for_mysql_servers_microsoftd
effect: DeployIfNotExists
resource_type: microsoft.dbformysql/servers
policy_id: 605dd1c9-db6f-496f-ba7f-841ea3e246e0
