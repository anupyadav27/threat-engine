rule_id: azure.monitoring.instances.enable_logging_by_category_group_for_microsoftd365customerinsightsinstances_to_e
service: monitoring
resource: instances
title: Enable logging by category group for microsoft.d365customerinsights/instances
  to Event Hub
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to an Event Hub for microsoft.d365customerinsights/instances.
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.instances
assertion_id: monitoring.enable_logging_by_category_group_for_microsoftd365customerinsightsinstances_to_e
effect: DeployIfNotExists
resource_type: microsoft.d365customerinsights/instances
