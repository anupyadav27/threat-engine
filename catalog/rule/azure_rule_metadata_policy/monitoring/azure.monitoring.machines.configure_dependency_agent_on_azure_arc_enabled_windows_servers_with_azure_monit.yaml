rule_id: azure.monitoring.machines.configure_dependency_agent_on_azure_arc_enabled_windows_servers_with_azure_monit
service: monitoring
resource: machines
title: Configure Dependency agent on Azure Arc enabled Windows servers with Azure
  Monitoring Agent settings
description: Enable VM insights on servers and machines connected to Azure through
  Arc enabled servers by installing the Dependency agent virtual machine extension
  with Azure Monitoring Agent settings. VM insights uses the Dependency agent to collect
  network metrics and discovered data about processes running on the machine and external
  process dependencies. See more - https://aka.ms/vminsightsdocs.
domain: logging_monitoring_and_alerting
severity: medium
