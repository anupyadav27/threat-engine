rule_id: azure.monitoring.accounts.enable_logging_by_category_group_for_data_lake_analytics_microsoftdatalakeanalyt
service: monitoring
resource: accounts
title: Enable logging by category group for Data Lake Analytics (microsoft.datalakeanalytics/accounts) to Storage
description: Resource logs should be enabled to track activities and events that take place on your resources and give you
  visibility and insights into any changes that occur. This policy deploys a diagnostic setting using a category group to
  route logs to a Storage Account for Data Lake Analytics (microsoft.datalakeanalytics/accounts).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.accounts
assertion_id: monitoring.enable_logging_by_category_group_for_data_lake_analytics_microsoftdatalakeanalyt
effect: DeployIfNotExists
resource_type: microsoft.datalakeanalytics/accounts
