rule_id: azure.monitoring.databases.enable_logging_by_category_group_for_caches_microsoftcacheredisenterprisedatabas
service: monitoring
resource: databases
title: Enable logging by category group for Caches (microsoft.cache/redisenterprise/databases)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for Caches (microsoft.cache/redisenterprise/databases).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.databases
assertion_id: monitoring.enable_logging_by_category_group_for_caches_microsoftcacheredisenterprisedatabas
effect: DeployIfNotExists
resource_type: microsoft.cache/redisenterprise/databases
