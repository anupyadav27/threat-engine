rule_id: azure.monitoring.virtual_machine_scale_sets.windows_virtual_machine_scale_sets_should_have_azure_monitor_agent_installed
service: monitoring
resource: virtual_machine_scale_sets
title: Windows virtual machine scale sets should have Azure Monitor Agent installed
description: 'Windows virtual machine scale sets should be monitored and secured through the deployed Azure Monitor Agent.
  The Azure Monitor Agent collects telemetry data from the guest OS. Virtual machine scale sets with supported OS and in supported
  regions are monitored for Azure Monitor Agent deployment. Learn more: https://aka.ms/AMAOverview.'
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.virtual_machine_scale_sets
assertion_id: monitoring.windows_virtual_machine_scale_sets_should_have_azure_monitor_agent_installed
effect: AuditIfNotExists
