rule_id: azure.monitoring.machines.configure_windows_arcenabled_machines_to_run_azure_monitor_agent
service: monitoring
resource: machines
title: Configure Windows Arc-enabled machines to run Azure Monitor Agent
description: 'Automate the deployment of Azure Monitor Agent extension on your Windows
  Arc-enabled machines for collecting telemetry data from the guest OS. This policy
  will install the extension if the OS and region are supported and system-assigned
  managed identity is enabled, and skip install otherwise. Learn more: https://aka.ms/AMAOverview.'
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.machines
assertion_id: monitoring.configure_windows_arcenabled_machines_to_run_azure_monitor_agent
effect: DeployIfNotExists
resource_type: Microsoft.HybridCompute/machines
