rule_id: azure.monitoring.accounts.enable_logging_by_category_group_for_microsoft_purview_accounts_microsoftpurview
service: monitoring
resource: accounts
title: Enable logging by category group for Microsoft Purview accounts (microsoft.purview/accounts) to Storage
description: Resource logs should be enabled to track activities and events that take place on your resources and give you
  visibility and insights into any changes that occur. This policy deploys a diagnostic setting using a category group to
  route logs to a Storage Account for Microsoft Purview accounts (microsoft.purview/accounts).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.accounts
assertion_id: monitoring.enable_logging_by_category_group_for_microsoft_purview_accounts_microsoftpurview
effect: DeployIfNotExists
resource_type: microsoft.purview/accounts
policy_id: fc66c506-9397-485e-9451-acc1525f0070
source: azure_policy_builtin
