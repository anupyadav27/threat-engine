rule_id: azure.monitoring.registries.enable_logging_by_category_group_for_container_registries_microsoftcontainerregi
service: monitoring
resource: registries
title: Enable logging by category group for Container registries (microsoft.containerregistry/registries)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for Container registries (microsoft.containerregistry/registries).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.registries
assertion_id: monitoring.enable_logging_by_category_group_for_container_registries_microsoftcontainerregi
effect: DeployIfNotExists
resource_type: microsoft.containerregistry/registries
policy_id: 106cd3bd-50a1-466c-869f-f9c2d310477b
source: azure_policy_builtin
mitre_techniques:
- T1562.008
mitre_tactics:
- defense-evasion
threat_tags:
- logging-disabled
threat_category: defense_evasion
