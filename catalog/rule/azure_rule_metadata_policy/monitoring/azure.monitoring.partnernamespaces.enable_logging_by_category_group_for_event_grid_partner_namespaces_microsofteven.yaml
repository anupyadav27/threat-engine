rule_id: azure.monitoring.partnernamespaces.enable_logging_by_category_group_for_event_grid_partner_namespaces_microsofteven
service: monitoring
resource: partnernamespaces
title: Enable logging by category group for Event Grid Partner Namespaces (microsoft.eventgrid/partnernamespaces)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for Event Grid Partner Namespaces (microsoft.eventgrid/partnernamespaces).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.partnernamespaces
assertion_id: monitoring.enable_logging_by_category_group_for_event_grid_partner_namespaces_microsofteven
