rule_id: azure.monitoring.bastionhosts.enable_logging_by_category_group_for_bastions_microsoftnetworkbastionhosts_to_lo
service: monitoring
resource: bastionhosts
title: Enable logging by category group for Bastions (microsoft.network/bastionhosts)
  to Log Analytics
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Log Analytics workspace for Bastions (microsoft.network/bastionhosts).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.bastionhosts
assertion_id: monitoring.enable_logging_by_category_group_for_bastions_microsoftnetworkbastionhosts_to_lo
effect: DeployIfNotExists
resource_type: microsoft.network/bastionhosts
