rule_id: azure.monitoring.namespaces.enable_logging_by_category_group_for_service_bus_namespaces_microsoftservicebusn
service: monitoring
resource: namespaces
title: Enable logging by category group for Service Bus Namespaces (microsoft.servicebus/namespaces)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for Service Bus Namespaces (microsoft.servicebus/namespaces).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.namespaces
assertion_id: monitoring.enable_logging_by_category_group_for_service_bus_namespaces_microsoftservicebusn
effect: DeployIfNotExists
resource_type: microsoft.servicebus/namespaces
