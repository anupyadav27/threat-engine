rule_id: azure.monitoring.attestationproviders.enable_logging_by_category_group_for_attestation_providers_microsoftattestationa
service: monitoring
resource: attestationproviders
title: Enable logging by category group for Attestation providers (microsoft.attestation/attestationproviders)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for Attestation providers (microsoft.attestation/attestationproviders).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.attestationproviders
assertion_id: monitoring.enable_logging_by_category_group_for_attestation_providers_microsoftattestationa
effect: DeployIfNotExists
resource_type: microsoft.attestation/attestationproviders
