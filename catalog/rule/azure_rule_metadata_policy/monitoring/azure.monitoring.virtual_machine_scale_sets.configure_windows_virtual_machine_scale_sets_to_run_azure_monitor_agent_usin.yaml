rule_id: azure.monitoring.virtual_machine_scale_sets.configure_windows_virtual_machine_scale_sets_to_run_azure_monitor_agent_using_sy
service: monitoring
resource: virtual_machine_scale_sets
title: Configure Windows virtual machine scale sets to run Azure Monitor Agent using
  system-assigned managed identity
description: 'Automate the deployment of Azure Monitor Agent extension on your Windows
  virtual machine scale sets for collecting telemetry data from the guest OS. This
  policy will install the extension if the OS and region are supported and system-assigned
  managed identity is enabled, and skip install otherwise. Learn more: https://aka.ms/AMAOverview.'
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.virtual_machine_scale_sets
assertion_id: monitoring.configure_windows_virtual_machine_scale_sets_to_run_azure_monitor_agent_using_sy
effect: DeployIfNotExists
