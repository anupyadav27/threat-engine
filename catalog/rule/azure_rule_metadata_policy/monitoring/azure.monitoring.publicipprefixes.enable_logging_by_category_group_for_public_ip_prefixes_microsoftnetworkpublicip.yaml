rule_id: azure.monitoring.publicipprefixes.enable_logging_by_category_group_for_public_ip_prefixes_microsoftnetworkpublicip
service: monitoring
resource: publicipprefixes
title: Enable logging by category group for Public IP Prefixes (microsoft.network/publicipprefixes)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for Public IP Prefixes (microsoft.network/publicipprefixes).
