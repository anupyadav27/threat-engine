rule_id: azure.monitoring.storageappliances.enable_logging_by_category_group_for_microsoftnetworkcloudstorageappliances_to_s
service: monitoring
resource: storageappliances
title: Enable logging by category group for microsoft.networkcloud/storageappliances
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for microsoft.networkcloud/storageappliances.
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.storageappliances
assertion_id: monitoring.enable_logging_by_category_group_for_microsoftnetworkcloudstorageappliances_to_s
effect: DeployIfNotExists
resource_type: microsoft.networkcloud/storageappliances
