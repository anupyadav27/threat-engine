rule_id: azure.monitoring.hostingenvironments.enable_logging_by_category_group_for_app_service_environments_microsoftwebhostin
service: monitoring
resource: hostingenvironments
title: Enable logging by category group for App Service Environments (microsoft.web/hostingenvironments)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for App Service Environments (microsoft.web/hostingenvironments).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.hostingenvironments
assertion_id: monitoring.enable_logging_by_category_group_for_app_service_environments_microsoftwebhostin
effect: DeployIfNotExists
resource_type: microsoft.web/hostingenvironments
