rule_id: azure.monitoring.database_accounts.enable_logging_by_category_group_for_azure_cosmos_db_microsoftdocumentdbdatabase
service: monitoring
resource: database_accounts
title: Enable logging by category group for Azure Cosmos DB (microsoft.documentdb/databaseaccounts) to Log Analytics
description: Resource logs should be enabled to track activities and events that take place on your resources and give you
  visibility and insights into any changes that occur. This policy deploys a diagnostic setting using a category group to
  route logs to a Log Analytics workspace for Azure Cosmos DB (microsoft.documentdb/databaseaccounts).
domain: logging_monitoring_and_alerting
severity: medium
