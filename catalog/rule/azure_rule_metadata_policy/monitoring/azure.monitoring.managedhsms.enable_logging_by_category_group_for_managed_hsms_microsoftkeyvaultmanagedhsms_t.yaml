rule_id: azure.monitoring.managedhsms.enable_logging_by_category_group_for_managed_hsms_microsoftkeyvaultmanagedhsms_t
service: monitoring
resource: managedhsms
title: Enable logging by category group for Managed HSMs (microsoft.keyvault/managedhsms)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for Managed HSMs (microsoft.keyvault/managedhsms).
domain: logging_monitoring_and_alerting
severity: medium
