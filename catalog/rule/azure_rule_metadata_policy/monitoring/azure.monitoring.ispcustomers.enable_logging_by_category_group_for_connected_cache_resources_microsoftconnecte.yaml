rule_id: azure.monitoring.ispcustomers.enable_logging_by_category_group_for_connected_cache_resources_microsoftconnecte
service: monitoring
resource: ispcustomers
title: Enable logging by category group for Connected Cache Resources (microsoft.connectedcache/ispcustomers)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for Connected Cache Resources (microsoft.connectedcache/ispcustomers).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.ispcustomers
assertion_id: monitoring.enable_logging_by_category_group_for_connected_cache_resources_microsoftconnecte
effect: DeployIfNotExists
resource_type: microsoft.connectedcache/ispcustomers
