rule_id: azure.monitoring.virtual_machine_scale_sets.linux_virtual_machine_scale_sets_should_have_azure_monitor_agent_installed
service: monitoring
resource: virtual_machine_scale_sets
title: Linux virtual machine scale sets should have Azure Monitor Agent installed
description: 'Linux virtual machine scale sets should be monitored and secured through the deployed Azure Monitor Agent. The
  Azure Monitor Agent collects telemetry data from the guest OS. This policy will audit virtual machine scale sets with supported
  OS images in supported regions. Learn more: https://aka.ms/AMAOverview.'
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.virtual_machine_scale_sets
assertion_id: monitoring.linux_virtual_machine_scale_sets_should_have_azure_monitor_agent_installed
effect: AuditIfNotExists
