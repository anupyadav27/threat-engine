rule_id: azure.monitoring.databaseaccounts.enable_logging_by_category_group_for_azure_cosmos_db_accounts_microsoftdocumentd
service: monitoring
resource: databaseaccounts
title: Enable logging by category group for Azure Cosmos DB accounts (microsoft.documentdb/databaseaccounts)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for Azure Cosmos DB accounts (microsoft.documentdb/databaseaccounts).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.databaseaccounts
assertion_id: monitoring.enable_logging_by_category_group_for_azure_cosmos_db_accounts_microsoftdocumentd
effect: DeployIfNotExists
resource_type: microsoft.documentdb/databaseaccounts
policy_id: 0fcf2d91-8951-43be-9505-ab43dee2f580
source: azure_policy_builtin
mitre_techniques:
- T1562.008
mitre_tactics:
- defense-evasion
threat_tags:
- logging-disabled
threat_category: defense_evasion
