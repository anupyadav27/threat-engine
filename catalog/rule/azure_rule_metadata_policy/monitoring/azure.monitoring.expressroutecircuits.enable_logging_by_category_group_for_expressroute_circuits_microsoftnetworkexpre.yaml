rule_id: azure.monitoring.expressroutecircuits.enable_logging_by_category_group_for_expressroute_circuits_microsoftnetworkexpre
service: monitoring
resource: expressroutecircuits
title: Enable logging by category group for ExpressRoute circuits (microsoft.network/expressroutecircuits)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for ExpressRoute circuits (microsoft.network/expressroutecircuits).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.expressroutecircuits
assertion_id: monitoring.enable_logging_by_category_group_for_expressroute_circuits_microsoftnetworkexpre
effect: DeployIfNotExists
