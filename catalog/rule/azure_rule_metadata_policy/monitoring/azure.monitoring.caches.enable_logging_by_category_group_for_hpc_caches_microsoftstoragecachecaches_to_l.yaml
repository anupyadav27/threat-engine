rule_id: azure.monitoring.caches.enable_logging_by_category_group_for_hpc_caches_microsoftstoragecachecaches_to_l
service: monitoring
resource: caches
title: Enable logging by category group for HPC caches (microsoft.storagecache/caches)
  to Log Analytics
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Log Analytics workspace for HPC caches (microsoft.storagecache/caches).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.caches
assertion_id: monitoring.enable_logging_by_category_group_for_hpc_caches_microsoftstoragecachecaches_to_l
effect: DeployIfNotExists
resource_type: microsoft.storagecache/caches
