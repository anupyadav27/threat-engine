rule_id: azure.monitoring.workspaces.log_analytics_workspaces_should_block_nonazure_active_directory_based_ingestion
service: monitoring
resource: workspaces
title: Log Analytics Workspaces should block non-Azure Active Directory based ingestion.
description: Enforcing log ingestion to require Azure Active Directory authentication
  prevents unauthenticated logs from an attacker which could lead to incorrect status,
  false alerts, and incorrect logs stored in the system.
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.workspaces
assertion_id: monitoring.log_analytics_workspaces_should_block_nonazure_active_directory_based_ingestion
effect: Audit
resource_type: Microsoft.OperationalInsights/workspaces
policy_id: e15effd4-2278-4c65-a0da-4d6f6d1890e2
source: azure_policy_builtin
mitre_techniques:
- T1556
mitre_tactics:
- credential-access
threat_tags:
- auth-bypass
threat_category: credential_access
