rule_id: azure.monitoring.accounts.enable_logging_by_category_group_for_data_shares_microsoftdatashareaccounts_to_e
service: monitoring
resource: accounts
title: Enable logging by category group for Data Shares (microsoft.datashare/accounts)
  to Event Hub
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to an Event Hub for Data Shares (microsoft.datashare/accounts).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.accounts
assertion_id: monitoring.enable_logging_by_category_group_for_data_shares_microsoftdatashareaccounts_to_e
effect: DeployIfNotExists
resource_type: microsoft.datashare/accounts
policy_id: 77c56019-5c71-4d33-9ce3-7a817f2bc7fa
source: azure_policy_builtin
mitre_techniques:
- T1562.008
mitre_tactics:
- defense-evasion
threat_tags:
- logging-disabled
threat_category: defense_evasion
