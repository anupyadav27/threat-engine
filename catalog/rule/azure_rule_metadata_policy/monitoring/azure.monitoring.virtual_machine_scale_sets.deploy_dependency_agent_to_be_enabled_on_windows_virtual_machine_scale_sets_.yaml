rule_id: azure.monitoring.virtual_machine_scale_sets.deploy_dependency_agent_to_be_enabled_on_windows_virtual_machine_scale_sets_with
service: monitoring
resource: virtual_machine_scale_sets
title: Deploy Dependency agent to be enabled on Windows virtual machine scale sets with Azure Monitoring Agent settings
description: Deploy Dependency agent for Windows virtual machine scale sets with Azure Monitoring Agent settings if the virtual
  machine image is in the list defined and the agent is not installed. If your scale set upgradePolicy is set to Manual, you
  need to apply the extension to all the virtual machines in the set by updating them.
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.virtual_machine_scale_sets
assertion_id: monitoring.deploy_dependency_agent_to_be_enabled_on_windows_virtual_machine_scale_sets_with
effect: DeployIfNotExists
resource_type: Microsoft.Compute/virtualMachineScaleSets
policy_id: af0082fd-fa58-4349-b916-b0e47abb0935
source: azure_policy_builtin
