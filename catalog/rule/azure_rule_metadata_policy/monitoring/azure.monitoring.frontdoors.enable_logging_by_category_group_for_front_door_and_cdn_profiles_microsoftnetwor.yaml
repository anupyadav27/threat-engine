rule_id: azure.monitoring.frontdoors.enable_logging_by_category_group_for_front_door_and_cdn_profiles_microsoftnetwor
service: monitoring
resource: frontdoors
title: Enable logging by category group for Front Door and CDN profiles (microsoft.network/frontdoors)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for Front Door and CDN profiles (microsoft.network/frontdoors).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.frontdoors
assertion_id: monitoring.enable_logging_by_category_group_for_front_door_and_cdn_profiles_microsoftnetwor
effect: DeployIfNotExists
resource_type: microsoft.network/frontdoors
