rule_id: azure.monitoring.components.azure_monitor_logs_for_application_insights_should_be_linked_to_a_log_analytics_
service: monitoring
resource: components
title: Azure Monitor Logs for Application Insights should be linked to a Log Analytics workspace
description: Link the Application Insights component to a Log Analytics workspace for logs encryption. Customer-managed keys
  are commonly required to meet regulatory compliance and for more control over the access to your data in Azure Monitor.
  Linking your component to a Log Analytics workspace that's enabled with a customer-managed key, ensures that your Application
  Insights logs meet this compliance requirement, see https://docs.microsoft.com/azure/azure-monitor/platform/customer-managed-keys.
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.components
assertion_id: monitoring.azure_monitor_logs_for_application_insights_should_be_linked_to_a_log_analytics_
effect: Audit
resource_type: Microsoft.Insights/components
