rule_id: azure.monitoring.virtual_machines.configure_windows_virtual_machines_to_run_azure_monitor_agent_using_systemassign
service: monitoring
resource: virtual_machines
title: Configure Windows virtual machines to run Azure Monitor Agent using system-assigned managed identity
description: 'Automate the deployment of Azure Monitor Agent extension on your Windows virtual machines for collecting telemetry
  data from the guest OS. This policy will install the extension if the OS and region are supported and system-assigned managed
  identity is enabled, and skip install otherwise. Learn more: https://aka.ms/AMAOverview.'
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.virtual_machines
assertion_id: monitoring.configure_windows_virtual_machines_to_run_azure_monitor_agent_using_systemassign
effect: DeployIfNotExists
resource_type: Microsoft.Compute/virtualMachines
