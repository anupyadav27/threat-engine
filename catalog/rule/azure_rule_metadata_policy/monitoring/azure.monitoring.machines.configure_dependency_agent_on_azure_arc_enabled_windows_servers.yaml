rule_id: azure.monitoring.machines.configure_dependency_agent_on_azure_arc_enabled_windows_servers
service: monitoring
resource: machines
title: Configure Dependency agent on Azure Arc enabled Windows servers
description: Enable VM insights on servers and machines connected to Azure through Arc enabled servers by installing the Dependency
  agent virtual machine extension. VM insights uses the Dependency agent to collect network metrics and discovered data about
  processes running on the machine and external process dependencies. See more - https://aka.ms/vminsightsdocs.
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.machines
assertion_id: monitoring.configure_dependency_agent_on_azure_arc_enabled_windows_servers
effect: DeployIfNotExists
resource_type: Microsoft.HybridCompute/machines
policy_id: 91cb9edd-cd92-4d2f-b2f2-bdd8d065a3d4
source: azure_policy_builtin
