rule_id: azure.monitoring.components.enable_logging_by_category_group_for_application_insights_microsoftinsightscompo
service: monitoring
resource: components
title: Enable logging by category group for Application Insights (Microsoft.Insights/components)
  to Log Analytics (Virtual Enclaves)
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Log Analytics workspace for Application Insights (Microsoft.Insights/components).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.components
assertion_id: monitoring.enable_logging_by_category_group_for_application_insights_microsoftinsightscompo
effect: DeployIfNotExists
resource_type: microsoft.insights/components
policy_id: 244bcb20-b194-41f3-afcc-63aef382b64c
source: azure_policy_builtin
mitre_techniques:
- T1562.008
mitre_tactics:
- defense-evasion
threat_tags:
- logging-disabled
threat_category: defense_evasion
