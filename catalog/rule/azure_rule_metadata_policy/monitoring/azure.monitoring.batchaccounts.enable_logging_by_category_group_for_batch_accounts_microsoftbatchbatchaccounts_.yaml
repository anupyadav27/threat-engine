rule_id: azure.monitoring.batchaccounts.enable_logging_by_category_group_for_batch_accounts_microsoftbatchbatchaccounts_
service: monitoring
resource: batchaccounts
title: Enable logging by category group for Batch accounts (microsoft.batch/batchaccounts) to Storage
description: Resource logs should be enabled to track activities and events that take place on your resources and give you
  visibility and insights into any changes that occur. This policy deploys a diagnostic setting using a category group to
  route logs to a Storage Account for Batch accounts (microsoft.batch/batchaccounts).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.batchaccounts
assertion_id: monitoring.enable_logging_by_category_group_for_batch_accounts_microsoftbatchbatchaccounts_
effect: DeployIfNotExists
resource_type: microsoft.batch/batchaccounts
policy_id: 40f0d036-d73d-45a9-8c3d-f3f84d227193
source: azure_policy_builtin
