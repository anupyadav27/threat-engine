rule_id: azure.monitoring.factories.enable_logging_by_category_group_for_data_factories_v2_microsoftdatafactoryfacto
service: monitoring
resource: factories
title: Enable logging by category group for Data factories (V2) (microsoft.datafactory/factories)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for Data factories (V2) (microsoft.datafactory/factories).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.factories
assertion_id: monitoring.enable_logging_by_category_group_for_data_factories_v2_microsoftdatafactoryfacto
effect: DeployIfNotExists
resource_type: microsoft.datafactory/factories
policy_id: 271ccc7b-8334-48c5-b90b-edf37dfb2d00
source: azure_policy_builtin
mitre_techniques:
- T1562.008
mitre_tactics:
- defense-evasion
threat_tags:
- logging-disabled
threat_category: defense_evasion
