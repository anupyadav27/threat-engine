rule_id: azure.monitoring.scheduledqueryrules.azure_log_search_alerts_over_log_analytics_workspaces_should_use_customermanaged
service: monitoring
resource: scheduledqueryrules
title: Azure Log Search Alerts over Log Analytics workspaces should use customer-managed keys
description: Ensure that Azure Log Search Alerts are implementing customer-managed keys, by storing the query text using the
  storage account that the customer had provided for the queried Log Analytics workspace. For more information, visit https://docs.microsoft.com/azure/azure-monitor/platform/customer-managed-keys#customer-managed-key-overview.
