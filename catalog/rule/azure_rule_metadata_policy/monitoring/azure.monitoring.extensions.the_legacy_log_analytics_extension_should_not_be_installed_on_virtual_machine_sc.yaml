rule_id: azure.monitoring.extensions.the_legacy_log_analytics_extension_should_not_be_installed_on_virtual_machine_sc
service: monitoring
resource: extensions
title: The legacy Log Analytics extension should not be installed on virtual machine
  scale sets
description: 'Automatically prevent installation of the legacy Log Analytics Agent
  as the final step of migrating from legacy agents to Azure Monitor Agent. After
  you have uninstalled existing legacy extensions, this policy will deny all future
  installations of the legacy agent extension on Windows virtual machine scale sets.
  Learn more: https://aka.ms/migratetoAMA'
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.extensions
assertion_id: monitoring.the_legacy_log_analytics_extension_should_not_be_installed_on_virtual_machine_sc
effect: Audit
