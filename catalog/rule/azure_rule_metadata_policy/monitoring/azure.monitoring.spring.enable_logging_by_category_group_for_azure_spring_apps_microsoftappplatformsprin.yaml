rule_id: azure.monitoring.spring.enable_logging_by_category_group_for_azure_spring_apps_microsoftappplatformsprin
service: monitoring
resource: spring
title: Enable logging by category group for Azure Spring Apps (microsoft.appplatform/spring)
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for Azure Spring Apps (microsoft.appplatform/spring).
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.spring
assertion_id: monitoring.enable_logging_by_category_group_for_azure_spring_apps_microsoftappplatformsprin
effect: DeployIfNotExists
resource_type: microsoft.appplatform/spring
