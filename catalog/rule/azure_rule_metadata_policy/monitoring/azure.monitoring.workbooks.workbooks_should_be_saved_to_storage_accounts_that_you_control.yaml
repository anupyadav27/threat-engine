rule_id: azure.monitoring.workbooks.workbooks_should_be_saved_to_storage_accounts_that_you_control
service: monitoring
resource: workbooks
title: Workbooks should be saved to storage accounts that you control
description: With bring your own storage (BYOS), your workbooks are uploaded into a storage account that you control. That
  means you control the encryption-at-rest policy, the lifetime management policy, and network access. You will, however,
  be responsible for the costs associated with that storage account. For more information, visit https://aka.ms/workbooksByos
domain: logging_monitoring_and_alerting
severity: medium
