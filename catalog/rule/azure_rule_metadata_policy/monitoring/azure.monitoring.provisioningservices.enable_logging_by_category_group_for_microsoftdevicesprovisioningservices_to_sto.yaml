rule_id: azure.monitoring.provisioningservices.enable_logging_by_category_group_for_microsoftdevicesprovisioningservices_to_sto
service: monitoring
resource: provisioningservices
title: Enable logging by category group for microsoft.devices/provisioningservices
  to Storage
description: Resource logs should be enabled to track activities and events that take
  place on your resources and give you visibility and insights into any changes that
  occur. This policy deploys a diagnostic setting using a category group to route
  logs to a Storage Account for microsoft.devices/provisioningservices.
domain: logging_monitoring_and_alerting
severity: medium
scope: monitoring.provisioningservices
assertion_id: monitoring.enable_logging_by_category_group_for_microsoftdevicesprovisioningservices_to_sto
effect: DeployIfNotExists
resource_type: microsoft.devices/provisioningservices
policy_id: 3534c358-8a1c-4601-b6ff-43d378d65efa
source: azure_policy_builtin
mitre_techniques:
- T1562.008
mitre_tactics:
- defense-evasion
threat_tags:
- logging-disabled
threat_category: defense_evasion
