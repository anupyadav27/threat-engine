rule_id: azure.azure_data_explorer.clusters.double_encryption_should_be_enabled_on_azure_data_explorer
service: azure_data_explorer
resource: clusters
title: Double encryption should be enabled on Azure Data Explorer
description: Enabling double encryption helps protect and safeguard your data to meet your organizational security and compliance
  commitments. When double encryption has been enabled, data in the storage account is encrypted twice, once at the service
  level and once at the infrastructure level, using two different encryption algorithms and two different keys.
domain: storage_and_database_security
severity: medium
