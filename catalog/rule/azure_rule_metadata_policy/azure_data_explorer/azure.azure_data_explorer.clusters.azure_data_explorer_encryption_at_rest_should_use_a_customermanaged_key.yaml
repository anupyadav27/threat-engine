title: Azure Data Explorer encryption at rest should use a customer-managed key
description: Enabling encryption at rest using a customer-managed key on your Azure Data Explorer cluster provides additional
  control over the key being used by the encryption at rest. This feature is oftentimes applicable to customers with special
  compliance requirements and requires a Key Vault to managing the keys.
