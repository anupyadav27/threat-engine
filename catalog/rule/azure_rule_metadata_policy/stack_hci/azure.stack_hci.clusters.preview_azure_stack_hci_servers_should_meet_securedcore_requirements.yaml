rule_id: azure.stack_hci.clusters.preview_azure_stack_hci_servers_should_meet_securedcore_requirements
service: stack_hci
resource: clusters
title: '[Preview]: Azure Stack HCI servers should meet Secured-core requirements'
description: 'Ensure that all Azure Stack HCI servers meet the Secured-core requirements. To enable the Secured-core server
  requirements: 1. From the Azure Stack HCI clusters page, go to Windows Admin Center and select Connect. 2. Go to the Security
  extension and select Secured-core. 3. Select any setting that is not enabled and click Enable.'
