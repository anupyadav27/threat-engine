rule_id: azure.communication.communication_services.communication_services_should_have_local_authentication_disabled
service: communication
resource: communication_services
title: Communication services should have local authentication disabled
description: This policy ensures that local authentication methods are disabled for
  Communication services, requiring Microsoft Entra ID identities for authentication.
  Enforcing this policy helps improve security by preventing the use of less secure
  local authentication.
