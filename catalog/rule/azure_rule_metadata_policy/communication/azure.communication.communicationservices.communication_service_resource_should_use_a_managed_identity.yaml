rule_id: azure.communication.communicationservices.communication_service_resource_should_use_a_managed_identity
service: communication
resource: communicationservices
title: Communication service resource should use a managed identity
description: Assigning a managed identity to your Communication service resource helps
  ensure secure authentication. This identity is used by this Communication service
  resource to communicate with other Azure services, like Azure Storage, in a secure
  way without you having to manage any credentials.
