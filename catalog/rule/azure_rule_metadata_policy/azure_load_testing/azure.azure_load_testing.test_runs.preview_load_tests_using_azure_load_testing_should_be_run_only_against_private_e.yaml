rule_id: azure.azure_load_testing.test_runs.preview_load_tests_using_azure_load_testing_should_be_run_only_against_private_e
service: azure_load_testing
resource: test_runs
title: '[Preview]: Load tests using Azure Load Testing should be run only against private endpoints from within a virtual
  network.'
description: 'Azure Load Testing engine instances should use virtual network injection for the following purposes: 1. Isolate
  Azure Load Testing engines to a virtual network. 2. Enable Azure Load Testing engines to interact with systems in either
  on premises data centers or Azure service in other virtual networks. 3. Empower customers to control inbound and outbound
  network communications for Azure Load Testing engines.'
domain: configuration_and_change_management
severity: medium
scope: azure_load_testing.test_runs
