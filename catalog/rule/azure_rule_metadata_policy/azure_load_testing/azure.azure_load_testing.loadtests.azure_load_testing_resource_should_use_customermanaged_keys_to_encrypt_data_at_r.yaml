rule_id: azure.azure_load_testing.loadtests.azure_load_testing_resource_should_use_customermanaged_keys_to_encrypt_data_at_r
service: azure_load_testing
resource: loadtests
title: Azure load testing resource should use customer-managed keys to encrypt data at rest
description: Use customer-managed keys(CMK) to manage the encryption at rest for your Azure Load Testing resource. By default
  the encryptio is done using Service managed keys, customer-managed keys enable the data to be encrypted with an Azure Key
  Vault key created and owned by you. You have full control and responsibility for the key lifecycle, including rotation and
  management. Learn more at https://docs.microsoft.com/azure/load-testing/how-to-configure-customer-managed-keys?tabs=portal.
domain: configuration_and_change_management
severity: medium
scope: azure_load_testing.loadtests
