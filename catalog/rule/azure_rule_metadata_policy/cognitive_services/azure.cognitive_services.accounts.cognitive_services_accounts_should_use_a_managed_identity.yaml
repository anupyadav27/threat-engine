rule_id: azure.cognitive_services.accounts.cognitive_services_accounts_should_use_a_managed_identity
service: cognitive_services
resource: accounts
title: Cognitive Services accounts should use a managed identity
description: Assigning a managed identity to your Cognitive Service account helps
  ensure secure authentication. This identity is used by this Cognitive service account
  to communicate with other Azure services, like Azure Key Vault, in a secure way
  without you having to manage any credentials.
