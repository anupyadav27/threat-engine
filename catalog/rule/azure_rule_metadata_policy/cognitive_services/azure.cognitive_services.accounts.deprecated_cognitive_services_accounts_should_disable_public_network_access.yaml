rule_id: azure.cognitive_services.accounts.deprecated_cognitive_services_accounts_should_disable_public_network_access
service: cognitive_services
resource: accounts
title: '[Deprecated]: Cognitive Services accounts should disable public network access'
description: To improve the security of Cognitive Services accounts, ensure that it isn't exposed to the public internet and
  can only be accessed from a private endpoint. Disable the public network access property as described in https://go.microsoft.com/fwlink/?linkid=2129800.
  This option disables access from any public address space outside the Azure IP range, and denies all logins that match IP
  or virtual network-based firewall rules. This reduces data leakage risks.
domain: ai_ml_and_model_security
severity: high
scope: cognitive_services.accounts
assertion_id: cognitive_services.deprecated_cognitive_services_accounts_should_disable_public_network_access
effect: Disabled
resource_type: Microsoft.CognitiveServices/accounts
policy_id: 0725b4dd-7e76-479c-a735-68e7ee23d5ca
source: azure_policy_builtin
