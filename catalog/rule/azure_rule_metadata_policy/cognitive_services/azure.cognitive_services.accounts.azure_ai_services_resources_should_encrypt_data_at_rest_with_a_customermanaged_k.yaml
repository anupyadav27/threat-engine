rule_id: azure.cognitive_services.accounts.azure_ai_services_resources_should_encrypt_data_at_rest_with_a_customermanaged_k
service: cognitive_services
resource: accounts
title: Azure AI Services resources should encrypt data at rest with a customer-managed key (CMK)
description: Using customer-managed keys to encrypt data at rest provides more control over the key lifecycle, including rotation
  and management. This is particularly relevant for organizations with related compliance requirements. This is not assessed
  by default and should only be applied when required by compliance or restrictive policy requirements. If not enabled, the
  data will be encrypted using platform-managed keys. To implement this, update the 'Effect' parameter in the Security Policy
  for the applicable scope.
domain: ai_ml_and_model_security
severity: high
scope: cognitive_services.accounts
assertion_id: cognitive_services.azure_ai_services_resources_should_encrypt_data_at_rest_with_a_customermanaged_k
effect: Audit
resource_type: Microsoft.CognitiveServices/accounts
