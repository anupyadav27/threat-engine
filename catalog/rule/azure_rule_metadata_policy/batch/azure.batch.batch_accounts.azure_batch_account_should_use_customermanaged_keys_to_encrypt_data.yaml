rule_id: azure.batch.batch_accounts.azure_batch_account_should_use_customermanaged_keys_to_encrypt_data
service: batch
resource: batch_accounts
title: Azure Batch account should use customer-managed keys to encrypt data
description: Use customer-managed keys to manage the encryption at rest of your Batch account's data. By default, customer
  data is encrypted with service-managed keys, but customer-managed keys are commonly required to meet regulatory compliance
  standards. Customer-managed keys enable the data to be encrypted with an Azure Key Vault key created and owned by you. You
  have full control and responsibility for the key lifecycle, including rotation and management. Learn more at https://aka.ms/Batch-CMK.
domain: configuration_and_change_management
severity: medium
scope: batch.batch_accounts
assertion_id: batch.azure_batch_account_should_use_customermanaged_keys_to_encrypt_data
effect: Audit
resource_type: Microsoft.Batch/batchAccounts
policy_id: 99e9ccd8-3db9-4592-b0d1-14b1715a4d8a
source: azure_policy_builtin
