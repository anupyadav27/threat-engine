rule_id: azure.service_fabric.clusters.service_fabric_clusters_should_have_the_clusterprotectionlevel_property_set_to_e
service: service_fabric
resource: clusters
title: Service Fabric clusters should have the ClusterProtectionLevel property set to EncryptAndSign
description: Service Fabric provides three levels of protection (None, Sign and EncryptAndSign) for node-to-node communication
  using a primary cluster certificate. Set the protection level to ensure that all node-to-node messages are encrypted and
  digitally signed
domain: configuration_and_change_management
severity: medium
scope: service_fabric.clusters
