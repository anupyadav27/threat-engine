title: Azure Front Door Standard and Premium should be running minimum TLS version of 1.2
description: Setting minimal TLS version to 1.2 improves security by ensuring your custom domains are accessed from clients
  using TLS 1.2 or newer. Using versions of TLS less than 1.2 is not recommended since they are weak and do not support modern
  cryptographic algorithms.
