rule_id: azure.app_configuration.configuration_stores.app_configuration_should_use_a_sku_that_supports_private_link
service: app_configuration
resource: configuration_stores
title: App Configuration should use a SKU that supports private link
description: 'When using a supported SKU, Azure Private Link lets you connect your
  virtual network to Azure services without a public IP address at the source or destination.
  The private link platform handles the connectivity between the consumer and services
  over the Azure backbone network. By mapping private endpoints to your app configuration
  instances instead of the entire service, you''ll also be protected against data
  leakage risks. Learn more at: https://aka.ms/appconfig/private-endpoint.'
domain: configuration_and_change_management
severity: medium
scope: app_configuration.configuration_stores
assertion_id: app_configuration.app_configuration_should_use_a_sku_that_supports_private_link
