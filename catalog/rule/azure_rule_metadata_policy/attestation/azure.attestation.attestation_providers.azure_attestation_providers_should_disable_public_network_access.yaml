rule_id: azure.attestation.attestation_providers.azure_attestation_providers_should_disable_public_network_access
service: attestation
resource: attestation_providers
title: Azure Attestation providers should disable public network access
description: To improve the security of Azure Attestation Service, ensure that it
  isn't exposed to the public internet and can only be accessed from a private endpoint.
  Disable the public network access property as described in aka.ms/azureattestation.
  This option disables access from any public address space outside the Azure IP range,
  and denies all logins that match IP or virtual network-based firewall rules. This
  reduces data leakage risks.
domain: identity_and_access_management
severity: medium
scope: attestation.attestation_providers
assertion_id: attestation.azure_attestation_providers_should_disable_public_network_access
effect: Audit
