rule_id: azure.data_factory.linkedservices.azure_data_factory_linked_services_should_use_key_vault_for_storing_secrets
service: data_factory
resource: linkedservices
title: Azure Data Factory linked services should use Key Vault for storing secrets
description: To ensure secrets (such as connection strings) are managed securely,
  require users to provide secrets using an Azure Key Vault instead of specifying
  them inline in linked services.
