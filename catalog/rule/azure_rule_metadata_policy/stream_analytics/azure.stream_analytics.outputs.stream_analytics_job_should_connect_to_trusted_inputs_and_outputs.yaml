rule_id: azure.stream_analytics.outputs.stream_analytics_job_should_connect_to_trusted_inputs_and_outputs
service: stream_analytics
resource: outputs
title: Stream Analytics job should connect to trusted inputs and outputs
description: Ensure that Stream Analytics jobs do not have arbitrary Input or Output
  connections that are not defined in the allow-list. This checks that Stream Analytics
  jobs don't exfiltrate data by connecting to arbitrary sinks outside your organization.
domain: configuration_and_change_management
severity: medium
scope: stream_analytics.outputs
