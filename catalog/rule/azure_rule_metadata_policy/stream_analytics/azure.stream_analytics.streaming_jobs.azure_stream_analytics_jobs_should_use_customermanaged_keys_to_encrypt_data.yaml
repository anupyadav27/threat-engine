title: Azure Stream Analytics jobs should use customer-managed keys to encrypt data
description: Use customer-managed keys when you want to securely store any metadata
  and private data assets of your Stream Analytics jobs in your storage account. This
  gives you total control over how your Stream Analytics data is encrypted.
