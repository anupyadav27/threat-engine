rule_id: azure.automation.automation_accounts.azure_automation_accounts_should_use_customermanaged_keys_to_encrypt_data_at_res
service: automation
resource: automation_accounts
title: Azure Automation accounts should use customer-managed keys to encrypt data at rest
description: Use customer-managed keys to manage the encryption at rest of your Azure Automation Accounts. By default, customer
  data is encrypted with service-managed keys, but customer-managed keys are commonly required to meet regulatory compliance
  standards. Customer-managed keys enable the data to be encrypted with an Azure Key Vault key created and owned by you. You
  have full control and responsibility for the key lifecycle, including rotation and management. Learn more at https://aka.ms/automation-cmk.
domain: configuration_and_change_management
severity: medium
scope: automation.automation_accounts
assertion_id: automation.azure_automation_accounts_should_use_customermanaged_keys_to_encrypt_data_at_res
effect: Audit
resource_type: Microsoft.Automation/automationAccounts
