rule_id: azure.automation.automation_accounts.automation_account_should_have_managed_identity
service: automation
resource: automation_accounts
title: Automation Account should have Managed Identity
description: Use Managed Identities as the recommended method for authenticating with
  Azure resources from the runbooks. Managed identity for authentication is more secure
  and eliminates the management overhead associated with using RunAs Account in your
  runbook code .
