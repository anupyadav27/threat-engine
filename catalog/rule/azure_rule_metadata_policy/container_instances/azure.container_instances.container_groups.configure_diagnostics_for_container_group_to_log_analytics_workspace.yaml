rule_id: azure.container_instances.container_groups.configure_diagnostics_for_container_group_to_log_analytics_workspace
service: container_instances
resource: container_groups
title: Configure diagnostics for container group to log analytics workspace
description: Appends the specified log analytics workspaceId and workspaceKey when any container group which is missing these
  fields is created or updated. Does not modify the fields of container groups created before this policy was applied until
  those resource groups are changed.
domain: container_and_kubernetes_security
severity: medium
scope: container_instances.container_groups
assertion_id: container_instances.configure_diagnostics_for_container_group_to_log_analytics_workspace
effect: Append
resource_type: Microsoft.ContainerInstance/containerGroups
policy_id: 21c469fa-a887-4363-88a9-60bfd6911a15
source: azure_policy_builtin
