rule_id: azure.azure_active_directory.domain_services.azure_active_directory_domain_services_managed_domains_should_use_tls_12_only_mo
service: azure_active_directory
resource: domain_services
title: Azure Active Directory Domain Services managed domains should use TLS 1.2 only mode
description: Use TLS 1.2 only mode for your managed domains. By default, Azure AD Domain Services enables the use of ciphers
  such as NTLM v1 and TLS v1. These ciphers may be required for some legacy applications, but are considered weak and can
  be disabled if you don't need them. When TLS 1.2 only mode is enabled, any client making a request that is not using TLS
  1.2 will fail. Learn more at https://docs.microsoft.com/azure/active-directory-domain-services/secure-your-domain.
domain: identity_and_access_management
severity: medium
scope: azure_active_directory.domain_services
assertion_id: azure_active_directory.azure_active_directory_domain_services_managed_domains_should_use_tls_12_only_mo
effect: Audit
resource_type: Microsoft.AAD/domainServices
policy_id: 3aa87b5a-7813-4b57-8a43-42dd9df5aaa7
source: azure_policy_builtin
