rule_id: azure.storage.storage_accounts.configure_secure_transfer_of_data_on_a_storage_account
service: storage
resource: storage_accounts
title: Configure secure transfer of data on a storage account
description: Secure transfer is an option that forces storage account to accept requests
  only from secure connections (HTTPS). Use of HTTPS ensures authentication between
  the server and the service and protects data in transit from network layer attacks
  such as man-in-the-middle, eavesdropping, and session-hijacking
domain: data_protection_and_privacy
severity: high
