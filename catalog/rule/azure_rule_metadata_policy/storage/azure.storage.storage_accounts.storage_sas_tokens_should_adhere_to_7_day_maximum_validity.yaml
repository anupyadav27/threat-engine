rule_id: azure.storage.storage_accounts.storage_sas_tokens_should_adhere_to_7_day_maximum_validity
service: storage
resource: storage_accounts
title: Storage SAS tokens should adhere to 7 day maximum validity
description: This policy ensures that Shared Access Signature (SAS) tokens for storage
  accounts are configured with a maximum validity period of 7 days or less. It denies
  or audits storage accounts that allow longer SAS token lifetimes or don't have appropriate
  expiration actions configured.
domain: data_protection_and_privacy
severity: high
scope: storage.storage_accounts
assertion_id: storage.storage_sas_tokens_should_adhere_to_7_day_maximum_validity
effect: Deny
