rule_id: azure.storage.caches.hpc_cache_accounts_should_use_customermanaged_key_for_encryption
service: storage
resource: caches
title: HPC Cache accounts should use customer-managed key for encryption
description: Manage encryption at rest of Azure HPC Cache with customer-managed keys. By default, customer data is encrypted
  with service-managed keys, but customer-managed keys are commonly required to meet regulatory compliance standards. Customer-managed
  keys enable the data to be encrypted with an Azure Key Vault key created and owned by you. You have full control and responsibility
  for the key lifecycle, including rotation and management.
domain: data_protection_and_privacy
severity: high
scope: storage.caches
assertion_id: storage.hpc_cache_accounts_should_use_customermanaged_key_for_encryption
effect: Audit
resource_type: Microsoft.StorageCache/caches
