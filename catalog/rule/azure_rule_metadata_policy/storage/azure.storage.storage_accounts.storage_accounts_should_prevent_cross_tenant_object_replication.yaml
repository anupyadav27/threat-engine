rule_id: azure.storage.storage_accounts.storage_accounts_should_prevent_cross_tenant_object_replication
service: storage
resource: storage_accounts
title: Storage accounts should prevent cross tenant object replication
description: Audit restriction of object replication for your storage account. By default, users can configure object replication
  with a source storage account in one Azure AD tenant and a destination account in a different tenant. It is a security concern
  because customer's data can be replicated to a storage account that is owned by the customer. By setting allowCrossTenantReplication
  to false, objects replication can be configured only if both source and destination accounts are in the same Azure AD tenant.
domain: data_protection_and_privacy
severity: high
scope: storage.storage_accounts
assertion_id: storage.storage_accounts_should_prevent_cross_tenant_object_replication
effect: Audit
resource_type: Microsoft.Storage/storageAccounts
policy_id: 92a89a79-6c52-4a7e-a03f-61306fc49312
source: azure_policy_builtin
