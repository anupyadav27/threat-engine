rule_id: azure.storage.storage_accounts.configure_your_storage_account_public_access_to_be_disallowed
service: storage
resource: storage_accounts
title: Configure your Storage account public access to be disallowed
description: Anonymous public read access to containers and blobs in Azure Storage is a convenient way to share data but might
  present security risks. To prevent data breaches caused by undesired anonymous access, Microsoft recommends preventing public
  access to a storage account unless your scenario requires it.
