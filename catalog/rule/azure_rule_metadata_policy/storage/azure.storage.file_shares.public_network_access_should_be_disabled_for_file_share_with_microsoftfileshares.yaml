rule_id: azure.storage.file_shares.public_network_access_should_be_disabled_for_file_share_with_microsoftfileshares
service: storage
resource: file_shares
title: Public network access should be disabled for file share with Microsoft.FileShares
description: Disabling the public endpoint allows you to restrict access to your Microsoft.FileShares resource to requests
  destined to approved private endpoints or service endpoints on your organization's network. You can disable the public endpoint
  for a file share with Microsoft.FileShares by setting the FileShare publicNetworkAccess of the resource to Disabled.
domain: data_protection_and_privacy
severity: high
scope: storage.file_shares
assertion_id: storage.public_network_access_should_be_disabled_for_file_share_with_microsoftfileshares
effect: Audit
resource_type: Microsoft.FileShares/fileShares
