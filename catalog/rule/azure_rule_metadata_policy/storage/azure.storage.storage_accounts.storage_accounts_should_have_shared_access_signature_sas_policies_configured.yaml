rule_id: azure.storage.storage_accounts.storage_accounts_should_have_shared_access_signature_sas_policies_configured
service: storage
resource: storage_accounts
title: Storage accounts should have shared access signature (SAS) policies configured
description: Ensure storage accounts have shared access signature (SAS) expiration policy enabled. Users use a SAS to delegate
  access to resources in Azure Storage account. And SAS expiration policy recommend upper expiration limit when a user creates
  a SAS token.
