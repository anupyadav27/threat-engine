title: Storage accounts should restrict network access
description: Network access to storage accounts should be restricted. Configure network
  rules so only applications from allowed networks can access the storage account.
  To allow connections from specific internet or on-premises clients, access can be
  granted to traffic from specific Azure virtual networks or to public internet IP
  address ranges
