rule_id: azure.storage.storage_sync_services.public_network_access_should_be_disabled_for_azure_file_sync
service: storage
resource: storage_sync_services
title: Public network access should be disabled for Azure File Sync
description: Disabling the public endpoint allows you to restrict access to your Storage Sync Service resource to requests
  destined to approved private endpoints on your organization's network. There is nothing inherently insecure about allowing
  requests to the public endpoint, however, you may wish to disable it to meet regulatory, legal, or organizational policy
  requirements. You can disable the public endpoint for a Storage Sync Service by setting the incomingTrafficPolicy of the
  resource to AllowVirtualNetworksOnly.
domain: data_protection_and_privacy
severity: high
scope: storage.storage_sync_services
assertion_id: storage.public_network_access_should_be_disabled_for_azure_file_sync
effect: Audit
resource_type: Microsoft.StorageSync/storageSyncServices
