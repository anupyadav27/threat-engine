rule_id: azure.storage.storage_accounts.configure_storage_accounts_to_disable_public_network_access
service: storage
resource: storage_accounts
title: Configure storage accounts to disable public network access
description: To improve the security of Storage Accounts, ensure that they aren't
  exposed to the public internet and can only be accessed from a private endpoint.
  Disable the public network access property as described in https://aka.ms/storageaccountpublicnetworkaccess.
  This option disables access from any public address space outside the Azure IP range,
  and denies all logins that match IP or virtual network-based firewall rules. This
  reduces data leakage risks.
domain: data_protection_and_privacy
severity: high
scope: storage.storage_accounts
assertion_id: storage.configure_storage_accounts_to_disable_public_network_access
effect: Modify
resource_type: Microsoft.Storage/storageAccounts
