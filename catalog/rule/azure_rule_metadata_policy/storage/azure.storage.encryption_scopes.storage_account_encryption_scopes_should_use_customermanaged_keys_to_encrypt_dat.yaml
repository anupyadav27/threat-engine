rule_id: azure.storage.encryption_scopes.storage_account_encryption_scopes_should_use_customermanaged_keys_to_encrypt_dat
service: storage
resource: encryption_scopes
title: Storage account encryption scopes should use customer-managed keys to encrypt data at rest
description: Use customer-managed keys to manage the encryption at rest of your storage account encryption scopes. Customer-managed
  keys enable the data to be encrypted with an Azure key-vault key created and owned by you. You have full control and responsibility
  for the key lifecycle, including rotation and management. Learn more about storage account encryption scopes at https://aka.ms/encryption-scopes-overview.
domain: data_protection_and_privacy
severity: high
scope: storage.encryption_scopes
assertion_id: storage.storage_account_encryption_scopes_should_use_customermanaged_keys_to_encrypt_dat
effect: Audit
resource_type: Microsoft.Storage/storageAccounts/encryptionScopes
