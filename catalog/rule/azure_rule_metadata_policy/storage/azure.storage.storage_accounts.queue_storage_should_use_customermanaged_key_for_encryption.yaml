rule_id: azure.storage.storage_accounts.queue_storage_should_use_customermanaged_key_for_encryption
service: storage
resource: storage_accounts
title: Queue Storage should use customer-managed key for encryption
description: Secure your queue storage with greater flexibility using customer-managed keys. When you specify a customer-managed
  key, that key is used to protect and control access to the key that encrypts your data. Using customer-managed keys provides
  additional capabilities to control rotation of the key encryption key or cryptographically erase data.
