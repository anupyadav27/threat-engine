rule_id: azure.storage.storage_accounts.storage_accounts_should_prevent_shared_key_access_excluding_storage_accounts_cre
service: storage
resource: storage_accounts
title: Storage accounts should prevent shared key access (excluding storage accounts created by Databricks)
description: Audit requirement of Azure Active Directory (Azure AD) to authorize requests for your storage account. By default,
  requests can be authorized with either Azure Active Directory credentials, or by using the account access key for Shared
  Key authorization. Of these two types of authorization, Azure AD provides superior security and ease of use over Shared
  Key, and is recommended by Microsoft.
domain: data_protection_and_privacy
severity: high
scope: storage.storage_accounts
assertion_id: storage.storage_accounts_should_prevent_shared_key_access_excluding_storage_accounts_cre
effect: Audit
resource_type: Microsoft.Storage/storageAccounts
