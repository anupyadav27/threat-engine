rule_id: azure.storage.blob_services.modify_configure_your_storage_account_to_enable_blob_versioning
service: storage
resource: blob_services
title: Modify - Configure your Storage account to enable blob versioning
description: You can enable Blob storage versioning to automatically maintain previous
  versions of an object. When blob versioning is enabled, you can access earlier versions
  of a blob to recover your data if it's modified or deleted.  Please note existing
  storage accounts will not be modified to enable Blob storage versioning. Only newly
  created storage accounts will have Blob storage versioning enabled
domain: data_protection_and_privacy
severity: high
scope: storage.blob_services
assertion_id: storage.modify_configure_your_storage_account_to_enable_blob_versioning
effect: Modify
