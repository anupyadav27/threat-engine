rule_id: azure.storage.storage_accounts.secure_transfer_to_storage_accounts_should_be_enabled
service: storage
resource: storage_accounts
title: Secure transfer to storage accounts should be enabled
description: Audit requirement of Secure transfer in your storage account. Secure transfer is an option that forces your storage
  account to accept requests only from secure connections (HTTPS). Use of HTTPS ensures authentication between the server
  and the service and protects data in transit from network layer attacks such as man-in-the-middle, eavesdropping, and session-hijacking
domain: data_protection_and_privacy
severity: high
scope: storage.storage_accounts
assertion_id: storage.secure_transfer_to_storage_accounts_should_be_enabled
effect: Audit
resource_type: Microsoft.Storage/storageAccounts
policy_id: 404c3081-a854-4457-ae30-26a93ef643f9
