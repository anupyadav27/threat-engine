rule_id: azure.cache.redis_enterprise.azure_cache_for_redis_enterprise_should_use_customermanaged_keys_for_encrypting_
service: cache
resource: redis_enterprise
title: Azure Cache for Redis Enterprise should use customer-managed keys for encrypting
  disk data
description: Use customer-managed keys (CMK) to manage the encryption at rest of your
  on-disk data. By default, customer data is encrypted with platform-managed keys
  (PMK), but customer-managed keys are commonly required to meet regulatory compliance
  standards. Customer-managed keys enable the data to be encrypted with an Azure Key
  Vault key created and owned by you. You have full control and responsibility for
  the key lifecycle, including rotation and management. Learn more at https://aka.ms/RedisCMK.
domain: storage_and_database_security
severity: high
