rule_id: azure.cache.redis.deprecated_azure_cache_for_redis_should_reside_within_a_virtual_network
service: cache
resource: redis
title: '[Deprecated]: Azure Cache for Redis should reside within a virtual network'
description: Azure Virtual Network deployment provides enhanced security and isolation
  for your Azure Cache for Redis, as well as subnets, access control policies, and
  other features to further restrict access.When an Azure Cache for Redis instance
  is configured with a virtual network, it is not publicly addressable and can only
  be accessed from virtual machines and applications within the virtual network.
