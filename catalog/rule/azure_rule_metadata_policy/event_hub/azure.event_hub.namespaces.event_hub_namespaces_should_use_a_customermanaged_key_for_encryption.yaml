rule_id: azure.event_hub.namespaces.event_hub_namespaces_should_use_a_customermanaged_key_for_encryption
service: event_hub
resource: namespaces
title: Event Hub namespaces should use a customer-managed key for encryption
description: Azure Event Hubs supports the option of encrypting data at rest with either Microsoft-managed keys (default)
  or customer-managed keys. Choosing to encrypt data using customer-managed keys enables you to assign, rotate, disable, and
  revoke access to the keys that Event Hub will use to encrypt data in your namespace. Note that Event Hub only supports encryption
  with customer-managed keys for namespaces in dedicated clusters.
domain: configuration_and_change_management
severity: medium
scope: event_hub.namespaces
assertion_id: event_hub.event_hub_namespaces_should_use_a_customermanaged_key_for_encryption
effect: Audit
resource_type: Microsoft.EventHub/namespaces
policy_id: a1ad735a-e96f-45d2-a7b2-9a4932cab7ec
source: azure_policy_builtin
