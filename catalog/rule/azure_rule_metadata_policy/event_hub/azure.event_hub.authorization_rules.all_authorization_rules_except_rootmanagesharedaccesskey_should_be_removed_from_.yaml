rule_id: azure.event_hub.authorization_rules.all_authorization_rules_except_rootmanagesharedaccesskey_should_be_removed_from_
service: event_hub
resource: authorization_rules
title: All authorization rules except RootManageSharedAccessKey should be removed from Event Hub namespace
description: Event Hub clients should not use a namespace level access policy that provides access to all queues and topics
  in a namespace. To align with the least privilege security model, you should create access policies at the entity level
  for queues and topics to provide access to only the specific entity
domain: configuration_and_change_management
severity: medium
scope: event_hub.authorization_rules
assertion_id: event_hub.all_authorization_rules_except_rootmanagesharedaccesskey_should_be_removed_from_
effect: Audit
