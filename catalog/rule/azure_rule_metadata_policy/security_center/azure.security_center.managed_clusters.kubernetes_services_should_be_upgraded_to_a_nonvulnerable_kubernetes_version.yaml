rule_id: azure.security_center.managed_clusters.kubernetes_services_should_be_upgraded_to_a_nonvulnerable_kubernetes_version
service: security_center
resource: managed_clusters
title: Kubernetes Services should be upgraded to a non-vulnerable Kubernetes version
description: Upgrade your Kubernetes service cluster to a later Kubernetes version
  to protect against known vulnerabilities in your current Kubernetes version. Vulnerability
  CVE-2019-9946 has been patched in Kubernetes versions 1.11.9+, 1.12.7+, 1.13.5+,
  and 1.14.0+
domain: threat_detection_and_incident_response
severity: high
scope: security_center.managed_clusters
