rule_id: azure.security_center.extensions.preview_virtual_machines_guest_attestation_status_should_be_healthy
service: security_center
resource: extensions
title: '[Preview]: Virtual machines guest attestation status should be healthy'
description: Guest attestation is performed by sending a trusted log (TCGLog) to an attestation server. The server uses these
  logs to determine whether boot components are trustworthy. This assessment is intended to detect compromises of the boot
  chain which might be the result of a bootkit or rootkit infection. This assessment only applies to Trusted Launch enabled
  virtual machines that have Guest Attestation extension installed.
domain: threat_detection_and_incident_response
severity: high
scope: security_center.extensions
assertion_id: security_center.preview_virtual_machines_guest_attestation_status_should_be_healthy
effect: AuditIfNotExists
resource_type: Microsoft.Compute/virtualMachines/extensions
policy_id: f6358610-e532-4236-b178-4c65865eb262
source: azure_policy_builtin
