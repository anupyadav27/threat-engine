rule_id: azure.security_center.managed_clusters.authorized_ip_ranges_should_be_defined_on_kubernetes_services
service: security_center
resource: managed_clusters
title: Authorized IP ranges should be defined on Kubernetes Services
description: Restrict access to the Kubernetes Service Management API by granting API access only to IP addresses in specific
  ranges. It is recommended to limit access to authorized IP ranges to ensure that only applications from allowed networks
  can access the cluster.
domain: threat_detection_and_incident_response
severity: high
scope: security_center.managed_clusters
