rule_id: azure.security_center.virtual_machines.guest_configuration_extension_should_be_installed_on_your_machines
service: security_center
resource: virtual_machines
title: Guest Configuration extension should be installed on your machines
description: To ensure secure configurations of in-guest settings of your machine, install the Guest Configuration extension.
  In-guest settings that the extension monitors include the configuration of the operating system, application configuration
  or presence, and environment settings. Once installed, in-guest policies will be available such as 'Windows Exploit guard
  should be enabled'. Learn more at https://aka.ms/gcpol.
domain: threat_detection_and_incident_response
severity: high
scope: security_center.virtual_machines
assertion_id: security_center.guest_configuration_extension_should_be_installed_on_your_machines
effect: AuditIfNotExists
resource_type: Microsoft.Compute/virtualMachines
policy_id: ae89ebca-1c92-4898-ac2c-9f63decb045c
source: azure_policy_builtin
