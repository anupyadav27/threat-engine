description: 'This policy is deprecated as part of Microsoft Defender for Cloud updated
  strategy. As part of this strategy, Azure Monitor agent is no longer required to
  receive Defender for Servers security features, but is required for Defender for
  SQL Server on machines. For more information visit: https://aka.ms/MdcAgentStrategy.
