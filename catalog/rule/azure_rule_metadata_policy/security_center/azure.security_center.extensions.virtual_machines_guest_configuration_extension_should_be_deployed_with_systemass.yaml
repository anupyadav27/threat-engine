rule_id: azure.security_center.extensions.virtual_machines_guest_configuration_extension_should_be_deployed_with_systemass
service: security_center
resource: extensions
title: Virtual machines' Guest Configuration extension should be deployed with system-assigned managed identity
description: The Guest Configuration extension requires a system assigned managed identity. Azure virtual machines in the
  scope of this policy will be non-compliant when they have the Guest Configuration extension installed but do not have a
  system assigned managed identity. Learn more at https://aka.ms/gcpol
domain: threat_detection_and_incident_response
severity: high
scope: security_center.extensions
assertion_id: security_center.virtual_machines_guest_configuration_extension_should_be_deployed_with_systemass
effect: AuditIfNotExists
resource_type: Microsoft.Compute/virtualMachines/extensions
policy_id: d26f7642-7545-4e18-9b75-8c9bbdee3a9a
source: azure_policy_builtin
