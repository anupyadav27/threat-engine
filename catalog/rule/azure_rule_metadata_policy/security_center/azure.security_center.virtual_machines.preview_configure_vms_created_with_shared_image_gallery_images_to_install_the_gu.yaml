title: '[Preview]: Configure VMs created with Shared Image Gallery images to install the Guest Attestation extension'
description: Configure virtual machines created with Shared Image Gallery images to automatically install the Guest Attestation
  extension to allow Azure Security Center to proactively attest and monitor the boot integrity. Boot integrity is attested
  via Remote Attestation.
