rule_id: azure.security_center.extensions.preview_configure_azure_defender_for_sql_agent_on_virtual_machine
service: security_center
resource: extensions
title: '[Preview]: Configure Azure Defender for SQL agent on virtual machine'
description: Configure Windows machines to automatically install the Azure Defender
  for SQL agent where the Azure Monitor Agent is installed. Security Center collects
  events from the agent and uses them to provide security alerts and tailored hardening
  tasks (recommendations). Creates a resource group and Log Analytics workspace in
  the same region as the machine. Target virtual machines must be in a supported location.
domain: threat_detection_and_incident_response
severity: high
scope: security_center.extensions
assertion_id: security_center.preview_configure_azure_defender_for_sql_agent_on_virtual_machine
effect: DeployIfNotExists
resource_type: Microsoft.Compute/virtualMachines/extensions
