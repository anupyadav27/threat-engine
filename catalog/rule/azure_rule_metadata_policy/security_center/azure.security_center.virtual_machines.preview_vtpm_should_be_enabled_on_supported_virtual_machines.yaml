rule_id: azure.security_center.virtual_machines.preview_vtpm_should_be_enabled_on_supported_virtual_machines
service: security_center
resource: virtual_machines
title: '[Preview]: vTPM should be enabled on supported virtual machines'
description: Enable virtual TPM device on supported virtual machines to facilitate
  Measured Boot and other OS security features that require a TPM. Once enabled, vTPM
  can be used to attest boot integrity. This assessment only applies to trusted launch
  enabled virtual machines.
