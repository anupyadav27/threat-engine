rule_id: azure.security_center.virtual_machines.preview_guest_attestation_extension_should_be_installed_on_supported_windows_vir
service: security_center
resource: virtual_machines
title: '[Preview]: Guest Attestation extension should be installed on supported Windows virtual machines'
description: Install Guest Attestation extension on supported virtual machines to allow Azure Security Center to proactively
  attest and monitor the boot integrity. Once installed, boot integrity will be attested via Remote Attestation. This assessment
  applies to Trusted Launch and Confidential Windows virtual machines.
domain: threat_detection_and_incident_response
severity: high
scope: security_center.virtual_machines
assertion_id: security_center.preview_guest_attestation_extension_should_be_installed_on_supported_windows_vir
effect: AuditIfNotExists
resource_type: Microsoft.Compute/virtualMachines
