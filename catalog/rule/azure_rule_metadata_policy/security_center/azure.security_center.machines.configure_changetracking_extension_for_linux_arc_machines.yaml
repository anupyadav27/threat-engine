rule_id: azure.security_center.machines.configure_changetracking_extension_for_linux_arc_machines
service: security_center
resource: machines
title: Configure ChangeTracking Extension for Linux Arc machines
description: Configure Linux Arc machines to automatically install the ChangeTracking Extension to enable File Integrity Monitoring(FIM)
  in Azure Security Center. FIM examines operating system files, Windows registries, application software, Linux system files,
  and more, for changes that might indicate an attack. The extension can be installed in virtual machines and locations supported
  by Azure Monitor Agent.
domain: threat_detection_and_incident_response
severity: high
scope: security_center.machines
assertion_id: security_center.configure_changetracking_extension_for_linux_arc_machines
effect: DeployIfNotExists
resource_type: Microsoft.HybridCompute/machines
policy_id: 10caed8a-652c-4d1d-84e4-2805b7c07278
source: azure_policy_builtin
