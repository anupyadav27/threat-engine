title: '[Preview]: Guest Attestation extension should be installed on supported Linux virtual machines'
description: Install Guest Attestation extension on supported Linux virtual machines to allow Azure Security Center to proactively
  attest and monitor the boot integrity. Once installed, boot integrity will be attested via Remote Attestation. This assessment
  applies to Trusted Launch and Confidential Linux virtual machines.
