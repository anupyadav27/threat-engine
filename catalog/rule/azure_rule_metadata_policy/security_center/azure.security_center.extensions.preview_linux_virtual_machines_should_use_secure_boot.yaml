rule_id: azure.security_center.extensions.preview_linux_virtual_machines_should_use_secure_boot
service: security_center
resource: extensions
title: '[Preview]: Linux virtual machines should use Secure Boot'
description: To protect against the installation of malware-based rootkits and boot kits, enable Secure Boot on supported
  Linux virtual machines. Secure Boot ensures that only signed operating systems and drivers will be allowed to run. This
  assessment only applies to Linux virtual machines that have the Azure Monitor Agent installed.
domain: threat_detection_and_incident_response
severity: high
scope: security_center.extensions
assertion_id: security_center.preview_linux_virtual_machines_should_use_secure_boot
effect: AuditIfNotExists
resource_type: Microsoft.Compute/virtualMachines/extensions
policy_id: b1bb3592-47b8-4150-8db0-bfdcc2c8965b
source: azure_policy_builtin
