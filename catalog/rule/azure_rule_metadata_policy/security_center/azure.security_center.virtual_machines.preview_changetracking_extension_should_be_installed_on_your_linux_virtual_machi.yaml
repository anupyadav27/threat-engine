rule_id: azure.security_center.virtual_machines.preview_changetracking_extension_should_be_installed_on_your_linux_virtual_machi
service: security_center
resource: virtual_machines
title: '[Preview]: ChangeTracking extension should be installed on your Linux virtual machine'
description: Install ChangeTracking Extension on Linux virtual machines to enable File Integrity Monitoring(FIM) in Azure
  Security Center. FIM examines operating system files, Windows registries, application software, Linux system files, and
  more, for changes that might indicate an attack. The extension can be installed in virtual machines and locations supported
  by Azure Monitoring Agent.
domain: threat_detection_and_incident_response
severity: high
scope: security_center.virtual_machines
