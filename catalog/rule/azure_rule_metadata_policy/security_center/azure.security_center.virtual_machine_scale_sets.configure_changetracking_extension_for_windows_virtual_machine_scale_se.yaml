rule_id: azure.security_center.virtual_machine_scale_sets.configure_changetracking_extension_for_windows_virtual_machine_scale_sets
service: security_center
resource: virtual_machine_scale_sets
title: Configure ChangeTracking Extension for Windows virtual machine scale sets
description: Configure Windows virtual machine scale sets to automatically install
  the ChangeTracking Extension to enable File Integrity Monitoring(FIM) in Azure Security
  Center. FIM examines operating system files, Windows registries, application software,
  Linux system files, and more, for changes that might indicate an attack. The extension
  can be installed in virtual machines and locations supported by Azure Monitor Agent.
domain: threat_detection_and_incident_response
severity: high
scope: security_center.virtual_machine_scale_sets
assertion_id: security_center.configure_changetracking_extension_for_windows_virtual_machine_scale_sets
effect: DeployIfNotExists
resource_type: Microsoft.Compute/virtualMachineScaleSets
