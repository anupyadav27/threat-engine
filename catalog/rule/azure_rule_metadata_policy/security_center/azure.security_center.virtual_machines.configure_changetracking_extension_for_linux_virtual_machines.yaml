rule_id: azure.security_center.virtual_machines.configure_changetracking_extension_for_linux_virtual_machines
service: security_center
resource: virtual_machines
title: Configure ChangeTracking Extension for Linux virtual machines
description: Configure Linux virtual machines to automatically install the ChangeTracking
  Extension to enable File Integrity Monitoring(FIM) in Azure Security Center. FIM
  examines operating system files, Windows registries, application software, Linux
  system files, and more, for changes that might indicate an attack. The extension
  can be installed in virtual machines and locations supported by Azure Monitor Agent.
domain: threat_detection_and_incident_response
severity: high
scope: security_center.virtual_machines
assertion_id: security_center.configure_changetracking_extension_for_linux_virtual_machines
effect: DeployIfNotExists
resource_type: Microsoft.Compute/virtualMachines
policy_id: ec88097d-843f-4a92-8471-78016d337ba4
source: azure_policy_builtin
