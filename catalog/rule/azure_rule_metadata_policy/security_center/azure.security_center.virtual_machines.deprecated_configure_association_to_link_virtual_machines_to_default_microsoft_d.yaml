rule_id: azure.security_center.virtual_machines.deprecated_configure_association_to_link_virtual_machines_to_default_microsoft_d
service: security_center
resource: virtual_machines
title: '[Deprecated]: Configure Association to link virtual machines to default Microsoft
  Defender for Cloud Data Collection Rule'
description: 'This policy is deprecated as part of Microsoft Defender for Cloud updated
  strategy. As part of this strategy, Azure Monitor agent is no longer required to
  receive Defender for Servers security features, but is required for Defender for
  SQL Server on machines. For more information visit: https://aka.ms/MdcAgentStrategy.
  Configure machines to automatically create an association with the default data
  collection rule for Microsoft Defender for Cloud.'
