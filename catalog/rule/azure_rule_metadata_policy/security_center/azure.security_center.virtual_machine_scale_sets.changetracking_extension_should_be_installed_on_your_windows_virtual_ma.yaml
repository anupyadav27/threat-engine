rule_id: azure.security_center.virtual_machine_scale_sets.changetracking_extension_should_be_installed_on_your_windows_virtual_machine_sca
service: security_center
resource: virtual_machine_scale_sets
title: ChangeTracking extension should be installed on your Windows virtual machine scale sets
description: Install ChangeTracking Extension on Windows virtual machine scale sets to enable File Integrity Monitoring(FIM)
  in Azure Security Center. FIM examines operating system files, Windows registries, application software, Linux system files,
  and more, for changes that might indicate an attack. The extension can be installed in virtual machines and locations supported
  by Azure Monitoring Agent.
domain: threat_detection_and_incident_response
severity: high
scope: security_center.virtual_machine_scale_sets
