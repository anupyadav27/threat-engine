rule_id: azure.security_center.virtual_machines.preview_linux_virtual_machines_should_use_only_signed_and_trusted_boot_component
service: security_center
resource: virtual_machines
title: '[Preview]: Linux virtual machines should use only signed and trusted boot components'
description: All OS boot components (boot loader, kernel, kernel drivers) must be signed by trusted publishers. Defender for
  Cloud has identified untrusted OS boot components on one or more of your Linux machines. To protect your machines from potentially
  malicious components, add them to your allow list or remove the identified components.
domain: threat_detection_and_incident_response
severity: high
scope: security_center.virtual_machines
assertion_id: security_center.preview_linux_virtual_machines_should_use_only_signed_and_trusted_boot_component
effect: AuditIfNotExists
resource_type: Microsoft.Compute/virtualMachines
