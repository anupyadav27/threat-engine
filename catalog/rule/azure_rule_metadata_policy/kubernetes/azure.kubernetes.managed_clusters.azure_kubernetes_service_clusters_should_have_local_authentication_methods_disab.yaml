rule_id: azure.kubernetes.managed_clusters.azure_kubernetes_service_clusters_should_have_local_authentication_methods_disab
service: kubernetes
resource: managed_clusters
title: Azure Kubernetes Service Clusters should have local authentication methods
  disabled
description: 'Disabling local authentication methods improves security by ensuring
  that Azure Kubernetes Service Clusters should exclusively require Azure Active Directory
  identities for authentication. Learn more at: https://aka.ms/aks-disable-local-accounts.'
