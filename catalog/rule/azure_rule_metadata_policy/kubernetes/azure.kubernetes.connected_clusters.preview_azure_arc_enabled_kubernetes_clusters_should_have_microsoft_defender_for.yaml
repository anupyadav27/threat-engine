rule_id: azure.kubernetes.connected_clusters.preview_azure_arc_enabled_kubernetes_clusters_should_have_microsoft_defender_for
service: kubernetes
resource: connected_clusters
title: '[Preview]: Azure Arc enabled Kubernetes clusters should have Microsoft Defender
  for Cloud extension installed'
description: Microsoft Defender for Cloud extension for Azure Arc provides threat
  protection for your Arc enabled Kubernetes clusters. The extension collects data
  from all nodes in the cluster and sends it to the Azure Defender for Kubernetes
  backend in the cloud for further analysis. Learn more in https://docs.microsoft.com/azure/defender-for-cloud/defender-for-containers-enable?pivots=defender-for-container-arc.
domain: container_and_kubernetes_security
severity: high
scope: kubernetes.connected_clusters
assertion_id: kubernetes.preview_azure_arc_enabled_kubernetes_clusters_should_have_microsoft_defender_for
effect: AuditIfNotExists
resource_type: Microsoft.Kubernetes/connectedClusters
policy_id: 8dfab9c4-fe7b-49ad-85e4-1e9be085358f
source: azure_policy_builtin
mitre_techniques:
- T1562.001
mitre_tactics:
- defense-evasion
threat_tags:
- logging-disabled
threat_category: defense_evasion
