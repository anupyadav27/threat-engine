rule_id: azure.kubernetes.managed_clusters.azure_kubernetes_service_clusters_should_have_defender_profile_enabled
service: kubernetes
resource: managed_clusters
title: Azure Kubernetes Service clusters should have Defender profile enabled
description: Microsoft Defender for Containers provides cloud-native Kubernetes security capabilities including environment
  hardening, workload protection, and run-time protection. When you enable the SecurityProfile.AzureDefender on your Azure
  Kubernetes Service cluster, an agent is deployed to your cluster to collect security event data. Learn more about Microsoft
  Defender for Containers in https://docs.microsoft.com/azure/defender-for-cloud/defender-for-containers-introduction?tabs=defender-for-container-arch-aks
domain: container_and_kubernetes_security
severity: high
scope: kubernetes.managed_clusters
assertion_id: kubernetes.azure_kubernetes_service_clusters_should_have_defender_profile_enabled
effect: Audit
resource_type: Microsoft.ContainerService/managedClusters
policy_id: a1840de2-8088-4ea8-b153-b4c723e9cb01
source: azure_policy_builtin
