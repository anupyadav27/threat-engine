rule_id: azure.api_for_fhir.services.azure_api_for_fhir_should_use_a_customermanaged_key_to_encrypt_data_at_rest
service: api_for_fhir
resource: services
title: Azure API for FHIR should use a customer-managed key to encrypt data at rest
description: Use a customer-managed key to control the encryption at rest of the data stored in Azure API for FHIR when this
  is a regulatory or compliance requirement. Customer-managed keys also deliver double encryption by adding a second layer
  of encryption on top of the default one done with service-managed keys.
domain: application_and_api_security
severity: medium
