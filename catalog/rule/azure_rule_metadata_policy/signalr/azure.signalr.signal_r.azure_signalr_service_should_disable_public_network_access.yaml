rule_id: azure.signalr.signal_r.azure_signalr_service_should_disable_public_network_access
service: signalr
resource: signal_r
title: Azure SignalR Service should disable public network access
description: To improve the security of Azure SignalR Service resource, ensure that
  it isn't exposed to the public internet and can only be accessed from a private
  endpoint. Disable the public network access property as described in https://aka.ms/asrs/networkacls.
  This option disables access from any public address space outside the Azure IP range,
  and denies all logins that match IP or virtual network-based firewall rules. This
  reduces data leakage risks.
domain: configuration_and_change_management
severity: medium
scope: signalr.signal_r
