rule_id: azure.signalr.signal_r.azure_signalr_service_should_use_a_private_link_enabled_sku
service: signalr
resource: signal_r
title: Azure SignalR Service should use a Private Link enabled SKU
description: 'Azure Private Link lets you connect your virtual network to Azure services
  without a public IP address at the source or destination which protect your resources
  against public data leakage risks. The policy limits you to Private Link enabled
  SKUs for Azure SignalR Service. Learn more about private link at: https://aka.ms/asrs/privatelink.'
