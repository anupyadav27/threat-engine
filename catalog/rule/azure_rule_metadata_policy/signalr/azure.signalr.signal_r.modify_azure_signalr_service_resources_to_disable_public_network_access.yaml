rule_id: azure.signalr.signal_r.modify_azure_signalr_service_resources_to_disable_public_network_access
service: signalr
resource: signal_r
title: Modify Azure SignalR Service resources to disable public network access
description: To improve the security of Azure SignalR Service resource, ensure that it isn't exposed to the public internet
  and can only be accessed from a private endpoint. Disable the public network access property as described in https://aka.ms/asrs/networkacls.
  This option disables access from any public address space outside the Azure IP range, and denies all logins that match IP
  or virtual network-based firewall rules. This reduces data leakage risks.
domain: configuration_and_change_management
severity: medium
scope: signalr.signal_r
assertion_id: signalr.modify_azure_signalr_service_resources_to_disable_public_network_access
effect: Modify
resource_type: Microsoft.SignalRService/SignalR
policy_id: 62a3ae95-8169-403e-a2d2-b82141448092
source: azure_policy_builtin
