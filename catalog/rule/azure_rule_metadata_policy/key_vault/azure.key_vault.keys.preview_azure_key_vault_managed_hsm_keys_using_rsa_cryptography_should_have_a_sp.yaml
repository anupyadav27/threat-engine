rule_id: azure.key_vault.keys.preview_azure_key_vault_managed_hsm_keys_using_rsa_cryptography_should_have_a_sp
service: key_vault
resource: keys
title: '[Preview]: Azure Key Vault Managed HSM keys using RSA cryptography should
  have a specified minimum key size'
description: 'To use this policy in preview, you must first follow these instructions
  at https://aka.ms/mhsmgovernance. Set the minimum allowed key size for use with
  your key vaults. Use of RSA keys with small key sizes is not a secure practice and
  doesn''t meet many industry certification requirements.

  '
