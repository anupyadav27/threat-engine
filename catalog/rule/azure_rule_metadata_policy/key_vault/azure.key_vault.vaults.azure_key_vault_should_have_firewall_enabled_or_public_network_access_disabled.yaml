rule_id: azure.key_vault.vaults.azure_key_vault_should_have_firewall_enabled_or_public_network_access_disabled
service: key_vault
resource: vaults
title: Azure Key Vault should have firewall enabled or public network access disabled
description: 'Enable the key vault firewall so that the key vault is not accessible
  by default to any public IPs or disable public network access for your key vault
  so that it''s not accessible over the public internet. Optionally, you can configure
  specific IP ranges to limit access to those networks. Learn more at: https://docs.microsoft.com/azure/key-vault/general/network-security
  and https://aka.ms/akvprivatelink'
domain: secrets_and_key_management
severity: high
