rule_id: azure.key_vault.keys.preview_azure_key_vault_managed_hsm_keys_using_elliptic_curve_cryptography_shoul
service: key_vault
resource: keys
title: '[Preview]: Azure Key Vault Managed HSM keys using elliptic curve cryptography should have the specified curve names'
description: To use this policy in preview, you must first follow these instructions at https://aka.ms/mhsmgovernance. Keys
  backed by elliptic curve cryptography can have different curve names. Some applications are only compatible with specific
  elliptic curve keys. Enforce the types of elliptic curve keys that are allowed to be created in your environment.
domain: secrets_and_key_management
severity: high
scope: key_vault.keys
