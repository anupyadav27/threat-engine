rule_id: azure.key_vault.secrets.key_vault_secrets_should_have_an_expiration_date
service: key_vault
resource: secrets
title: Key Vault secrets should have an expiration date
description: Secrets should have a defined expiration date and not be permanent. Secrets that are valid forever provide a
  potential attacker with more time to compromise them. It is a recommended security practice to set expiration dates on secrets.
domain: secrets_and_key_management
severity: high
scope: key_vault.secrets
assertion_id: key_vault.key_vault_secrets_should_have_an_expiration_date
effect: Audit
resource_type: Microsoft.KeyVault.Data/vaults/secrets
