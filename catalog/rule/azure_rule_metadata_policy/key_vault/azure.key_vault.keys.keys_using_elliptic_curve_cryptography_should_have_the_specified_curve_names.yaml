title: Keys using elliptic curve cryptography should have the specified curve names
description: Keys backed by elliptic curve cryptography can have different curve names.
  Some applications are only compatible with specific elliptic curve keys. Enforce
  the types of elliptic curve keys that are allowed to be created in your environment.
