rule_id: azure.key_vault.keys.azure_key_vault_managed_hsm_keys_using_aes_cryptography_should_have_a_specified_
service: key_vault
resource: keys
title: Azure Key Vault Managed HSM keys using AES cryptography should have a specified minimum key size
description: To use this policy, you must first follow these instructions at https://aka.ms/mhsmgovernance. Set the minimum
  allowed key size for use with your Managed HSM. Use of AES keys with small key sizes is not a secure practice and doesn't
  meet many industry certification requirements.
domain: secrets_and_key_management
severity: high
scope: key_vault.keys
assertion_id: key_vault.azure_key_vault_managed_hsm_keys_using_aes_cryptography_should_have_a_specified_
effect: Audit
resource_type: Microsoft.ManagedHSM.Data/managedHsms/keys
