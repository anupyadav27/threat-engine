rule_id: azure.key_vault.managed_hsms.azure_key_vault_managed_hsm_should_have_purge_protection_enabled
service: key_vault
resource: managed_hsms
title: Azure Key Vault Managed HSM should have purge protection enabled
description: Malicious deletion of an Azure Key Vault Managed HSM can lead to permanent data loss. A malicious insider in
  your organization can potentially delete and purge Azure Key Vault Managed HSM. Purge protection protects you from insider
  attacks by enforcing a mandatory retention period for soft deleted Azure Key Vault Managed HSM. No one inside your organization
  or Microsoft will be able to purge your Azure Key Vault Managed HSM during the soft delete retention period.
domain: secrets_and_key_management
severity: high
scope: key_vault.managed_hsms
assertion_id: key_vault.azure_key_vault_managed_hsm_should_have_purge_protection_enabled
effect: Audit
resource_type: Microsoft.KeyVault/managedHsms
policy_id: c39ba22d-4428-4149-b981-70acb31fc383
source: azure_policy_builtin
