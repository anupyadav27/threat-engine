rule_id: azure.key_vault.keys.preview_azure_key_vault_managed_hsm_keys_should_have_more_than_the_specified_num
service: key_vault
resource: keys
title: '[Preview]: Azure Key Vault Managed HSM Keys should have more than the specified number of days before expiration'
description: To use this policy in preview, you must first follow these instructions at https://aka.ms/mhsmgovernance. If
  a key is too close to expiration, an organizational delay to rotate the key may result in an outage. Keys should be rotated
  at a specified number of days prior to expiration to provide sufficient time to react to a failure.
domain: secrets_and_key_management
severity: high
scope: key_vault.keys
assertion_id: key_vault.preview_azure_key_vault_managed_hsm_keys_should_have_more_than_the_specified_num
effect: Audit
resource_type: Microsoft.ManagedHSM.Data/managedHsms/keys
policy_id: ad27588c-0198-4c84-81ef-08efd0274653
source: azure_policy_builtin
