rule_id: azure.key_vault.secrets.secrets_should_have_more_than_the_specified_number_of_days_before_expiration
service: key_vault
resource: secrets
title: Secrets should have more than the specified number of days before expiration
description: If a secret is too close to expiration, an organizational delay to rotate the secret may result in an outage.
  Secrets should be rotated at a specified number of days prior to expiration to provide sufficient time to react to a failure.
domain: secrets_and_key_management
severity: high
scope: key_vault.secrets
assertion_id: key_vault.secrets_should_have_more_than_the_specified_number_of_days_before_expiration
effect: Audit
resource_type: Microsoft.KeyVault.Data/vaults/secrets
