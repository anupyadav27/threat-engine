rule_id: azure.key_vault.keys.keys_should_have_more_than_the_specified_number_of_days_before_expiration
service: key_vault
resource: keys
title: Keys should have more than the specified number of days before expiration
description: If a key is too close to expiration, an organizational delay to rotate the key may result in an outage. Keys
  should be rotated at a specified number of days prior to expiration to provide sufficient time to react to a failure.
domain: secrets_and_key_management
severity: high
scope: key_vault.keys
assertion_id: key_vault.keys_should_have_more_than_the_specified_number_of_days_before_expiration
effect: Audit
resource_type: Microsoft.KeyVault.Data/vaults/keys
policy_id: 5ff38825-c5d8-47c5-b70e-069a21955146
source: azure_policy_builtin
