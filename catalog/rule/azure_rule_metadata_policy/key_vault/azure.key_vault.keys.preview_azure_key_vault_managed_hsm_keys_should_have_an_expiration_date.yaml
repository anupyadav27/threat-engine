rule_id: azure.key_vault.keys.preview_azure_key_vault_managed_hsm_keys_should_have_an_expiration_date
service: key_vault
resource: keys
title: '[Preview]: Azure Key Vault Managed HSM keys should have an expiration date'
description: To use this policy in preview, you must first follow these instructions at https://aka.ms/mhsmgovernance. Cryptographic
  keys should have a defined expiration date and not be permanent. Keys that are valid forever provide a potential attacker
  with more time to compromise the key. It is a recommended security practice to set expiration dates on cryptographic keys.
domain: secrets_and_key_management
severity: high
scope: key_vault.keys
assertion_id: key_vault.preview_azure_key_vault_managed_hsm_keys_should_have_an_expiration_date
effect: Audit
resource_type: Microsoft.ManagedHSM.Data/managedHsms/keys
policy_id: 1d478a74-21ba-4b9f-9d8f-8e6fced0eec5
source: azure_policy_builtin
