rule_id: azure.key_vault.keys.keys_should_be_backed_by_a_hardware_security_module_hsm
service: key_vault
resource: keys
title: Keys should be backed by a hardware security module (HSM)
description: An HSM is a hardware security module that stores keys. An HSM provides
  a physical layer of protection for cryptographic keys. The cryptographic key cannot
  leave a physical HSM which provides a greater level of security than a software
  key.
domain: secrets_and_key_management
severity: high
scope: key_vault.keys
