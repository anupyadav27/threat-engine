rule_id: azure.network.network_interfaces.network_interfaces_should_disable_ip_forwarding
service: network
resource: network_interfaces
title: Network interfaces should disable IP forwarding
description: This policy denies the network interfaces which enabled IP forwarding.
  The setting of IP forwarding disables Azure's check of the source and destination
  for a network interface. This should be reviewed by the network security team.
domain: network_security_and_connectivity
severity: high
