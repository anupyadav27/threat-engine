rule_id: azure.network.virtual_networks.deploy_a_flow_log_resource_with_target_virtual_network
service: network
resource: virtual_networks
title: Deploy a Flow Log resource with target virtual network
description: Configures flow log for specific virtual network. It will allow to log
  information about IP traffic flowing through an virtual network. Flow log helps
  to identify unknown or undesired traffic, verify network isolation and compliance
  with enterprise access rules, analyze network flows from compromised IPs and network
  interfaces.
domain: network_security_and_connectivity
severity: high
scope: network.virtual_networks
assertion_id: network.deploy_a_flow_log_resource_with_target_virtual_network
effect: DeployIfNotExists
