rule_id: azure.network.frontdoors.azure_web_application_firewall_should_be_enabled_for_azure_front_door_entrypoint
service: network
resource: frontdoors
title: Azure Web Application Firewall should be enabled for Azure Front Door entry-points
description: Deploy Azure Web Application Firewall (WAF) in front of public facing web applications for additional inspection
  of incoming traffic. Web Application Firewall (WAF) provides centralized protection of your web applications from common
  exploits and vulnerabilities such as SQL injections, Cross-Site Scripting, local and remote file executions. You can also
  restrict access to your web applications by countries, IP address ranges, and other http(s) parameters via custom rules.
domain: network_security_and_connectivity
severity: high
scope: network.frontdoors
