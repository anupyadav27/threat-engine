rule_id: azure.network.subnets.gateway_subnets_should_not_be_configured_with_a_network_security_group
service: network
resource: subnets
title: Gateway subnets should not be configured with a network security group
description: This policy denies if a gateway subnet is configured with a network security group. Assigning a network security
  group to a gateway subnet will cause the gateway to stop functioning.
domain: network_security_and_connectivity
severity: high
