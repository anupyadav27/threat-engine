rule_id: azure.network.application_gateway_web_application_firewall_policies.azure_web_application_firewall_on_azure_application_gateway_should_have_request_
service: network
resource: application_gateway_web_application_firewall_policies
title: Azure Web Application Firewall on Azure Application Gateway should have request
  body inspection enabled
description: Ensure that Web Application Firewalls associated to Azure Application
  Gateways have Request body inspection enabled. This allows the WAF to inspect properties
  within the HTTP body that may not be evaluated in the HTTP headers, cookies, or
  URI.
domain: network_security_and_connectivity
severity: high
