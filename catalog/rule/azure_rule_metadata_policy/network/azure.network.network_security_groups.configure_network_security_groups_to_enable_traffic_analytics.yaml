rule_id: azure.network.network_security_groups.configure_network_security_groups_to_enable_traffic_analytics
service: network
resource: network_security_groups
title: Configure network security groups to enable traffic analytics
description: Traffic analytics can be enabled for all network security groups hosted
  in a particular region with the settings provided during policy creation. If it
  already has Traffic analytics enabled, then policy does not overwrite its settings.
  Flow Logs are also enabled for the Network security groups that do not have it.
  Traffic analytics is a cloud-based solution that provides visibility into user and
  application activity in cloud networks.
domain: network_security_and_connectivity
severity: high
