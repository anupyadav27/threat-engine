resource: frontdoor_web_application_firewall_policies
title: Azure Web Application Firewall on Azure Front Door should have request body inspection enabled
description: Ensure that Web Application Firewalls associated to Azure Front Doors have request body inspection enabled. This
  allows the WAF to inspect properties within the HTTP body that may not be evaluated in the HTTP headers, cookies, or URI.
