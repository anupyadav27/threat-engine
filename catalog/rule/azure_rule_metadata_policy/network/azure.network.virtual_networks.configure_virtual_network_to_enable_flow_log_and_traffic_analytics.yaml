rule_id: azure.network.virtual_networks.configure_virtual_network_to_enable_flow_log_and_traffic_analytics
service: network
resource: virtual_networks
title: Configure virtual network to enable Flow Log and Traffic Analytics
description: Traffic analytics and Flow logs can be enabled for all virtual networks hosted in a particular region with the
  settings provided during policy creation. This policy does not overwrite current setting for virtual networks that already
  have these feature enabled. Traffic analytics is a cloud-based solution that provides visibility into user and application
  activity in cloud networks.
