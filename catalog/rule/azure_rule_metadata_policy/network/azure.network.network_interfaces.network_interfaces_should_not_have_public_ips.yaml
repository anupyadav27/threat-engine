rule_id: azure.network.network_interfaces.network_interfaces_should_not_have_public_ips
service: network
resource: network_interfaces
title: Network interfaces should not have public IPs
description: This policy denies the network interfaces which are configured with any public IP. Public IP addresses allow
  internet resources to communicate inbound to Azure resources, and Azure resources to communicate outbound to the internet.
  This should be reviewed by the network security team.
domain: network_security_and_connectivity
severity: high
scope: network.network_interfaces
assertion_id: network.network_interfaces_should_not_have_public_ips
effect: deny
resource_type: Microsoft.Network/networkInterfaces
policy_id: 83a86a26-fd1f-447c-b59d-e51f44264114
source: azure_policy_builtin
