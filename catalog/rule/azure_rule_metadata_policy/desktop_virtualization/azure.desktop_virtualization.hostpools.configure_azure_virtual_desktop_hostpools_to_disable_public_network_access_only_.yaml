rule_id: azure.desktop_virtualization.hostpools.configure_azure_virtual_desktop_hostpools_to_disable_public_network_access_only_
service: desktop_virtualization
resource: hostpools
title: Configure Azure Virtual Desktop hostpools to disable public network access
  only for session hosts
description: 'Disable public network access for your Azure Virtual Desktop hostpool
  session hosts, but allow public access for end users. This allows users to still
  access AVD service while ensuring the session host is only accessible through private
  routes. Learn more at: https://aka.ms/avdprivatelink.'
