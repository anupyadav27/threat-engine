rule_id: azure.guest_configuration.virtual_machines.audit_windows_machines_that_do_not_have_the_minimum_password_age_set_to_specifie
service: guest_configuration
resource: virtual_machines
title: Audit Windows machines that do not have the minimum password age set to specified
  number of days
description: Requires that prerequisites are deployed to the policy assignment scope.
  For details, visit https://aka.ms/gcpol. Machines are non-compliant if Windows machines
  that do not have the minimum password age set to specified number of days. Default
  value for minimum password age is 1 day
