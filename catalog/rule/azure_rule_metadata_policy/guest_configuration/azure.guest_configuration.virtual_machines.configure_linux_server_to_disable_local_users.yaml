rule_id: azure.guest_configuration.virtual_machines.configure_linux_server_to_disable_local_users
service: guest_configuration
resource: virtual_machines
title: Configure Linux Server to disable local users.
description: Creates a Guest Configuration assignment to configure disabling local users on Linux Server. This ensures that
  Linux Servers can only be accessed by AAD (Azure Active Directory) account or a list of explicitly allowed users by this
  policy, improving overall security posture.
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.configure_linux_server_to_disable_local_users
effect: DeployIfNotExists
resource_type: Microsoft.Compute/virtualMachines
policy_id: cd22fc48-f2c9-4b86-98d3-ec1268b46a8a
