rule_id: azure.guest_configuration.virtual_machines.deprecated_deploy_prerequisites_to_audit_linux_vms_that_do_not_have_the_passwd_f
service: guest_configuration
resource: virtual_machines
title: '[Deprecated]: Deploy prerequisites to audit Linux VMs that do not have the
  passwd file permissions set to 0644'
description: This policy creates a Guest Configuration assignment to audit Linux virtual
  machines that do not have the passwd file permissions set to 0644. It also creates
  a system-assigned managed identity and deploys the VM extension for Guest Configuration.
  This policy should only be used along with its corresponding audit policy in an
  initiative. For more information on Guest Configuration policies, please visit https://aka.ms/gcpol
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.deprecated_deploy_prerequisites_to_audit_linux_vms_that_do_not_have_the_passwd_f
effect: deployIfNotExists
