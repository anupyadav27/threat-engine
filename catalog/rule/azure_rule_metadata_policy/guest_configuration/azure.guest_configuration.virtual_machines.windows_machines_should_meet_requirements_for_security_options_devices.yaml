rule_id: azure.guest_configuration.virtual_machines.windows_machines_should_meet_requirements_for_security_options_devices
service: guest_configuration
resource: virtual_machines
title: Windows machines should meet requirements for 'Security Options - Devices'
description: Windows machines should have the specified Group Policy settings in the category 'Security Options - Devices'
  for undocking without logging on, installing print drivers, and formatting/ejecting media. This policy requires that the
  Guest Configuration prerequisites have been deployed to the policy assignment scope. For details, visit https://aka.ms/gcpol.
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.windows_machines_should_meet_requirements_for_security_options_devices
effect: AuditIfNotExists
resource_type: Microsoft.Compute/virtualMachines
policy_id: 8794ff4f-1a35-4e18-938f-0b22055067cd
source: azure_policy_builtin
