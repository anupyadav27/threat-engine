rule_id: azure.guest_configuration.virtual_machines.deprecated_deploy_prerequisites_to_audit_windows_vms_if_the_administrators_group
service: guest_configuration
resource: virtual_machines
title: '[Deprecated]: Deploy prerequisites to audit Windows VMs if the Administrators group doesn''t contain only specified
  members'
description: This policy creates a Guest Configuration assignment to audit Windows virtual machines in which the Administrators
  group does not contain only the specified members. It also creates a system-assigned managed identity and deploys the VM
  extension for Guest Configuration. This policy should only be used along with its corresponding audit policy in an initiative.
  For more information on Guest Configuration policies, please visit https://aka.ms/gcpol
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.deprecated_deploy_prerequisites_to_audit_windows_vms_if_the_administrators_group
effect: deployIfNotExists
resource_type: Microsoft.Compute/virtualMachines
policy_id: b821191b-3a12-44bc-9c38-212138a29ff3
source: azure_policy_builtin
