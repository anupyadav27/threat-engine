rule_id: azure.guest_configuration.virtual_machines.audit_windows_machines_that_allow_reuse_of_the_passwords_after_the_specified_num
service: guest_configuration
resource: virtual_machines
title: Audit Windows machines that allow re-use of the passwords after the specified
  number of unique passwords
description: Requires that prerequisites are deployed to the policy assignment scope.
  For details, visit https://aka.ms/gcpol. Machines are non-compliant if Windows machines
  that allow re-use of the passwords after the specified number of unique passwords.
  Default value for unique passwords is 24
