rule_id: azure.guest_configuration.virtual_machines.audit_windows_machines_that_contain_certificates_expiring_within_the_specified_n
service: guest_configuration
resource: virtual_machines
title: Audit Windows machines that contain certificates expiring within the specified number of days
description: Requires that prerequisites are deployed to the policy assignment scope. For details, visit https://aka.ms/gcpol.
  Machines are non-compliant if certificates in the specified store have an expiration date out of range for the number of
  days given as parameter. The policy also provides the option to only check for specific certificates or exclude specific
  certificates, and whether to report on expired certificates.
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.audit_windows_machines_that_contain_certificates_expiring_within_the_specified_n
effect: auditIfNotExists
resource_type: Microsoft.Compute/virtualMachines
policy_id: 1417908b-4bff-46ee-a2a6-4acc899320ab
source: azure_policy_builtin
