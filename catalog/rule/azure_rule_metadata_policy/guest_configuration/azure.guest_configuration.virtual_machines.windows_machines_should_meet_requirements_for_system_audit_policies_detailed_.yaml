rule_id: azure.guest_configuration.virtual_machines.windows_machines_should_meet_requirements_for_system_audit_policies_detailed_tra
service: guest_configuration
resource: virtual_machines
title: Windows machines should meet requirements for 'System Audit Policies - Detailed Tracking'
description: Windows machines should have the specified Group Policy settings in the category 'System Audit Policies - Detailed
  Tracking' for auditing DPAPI, process creation/termination, RPC events, and PNP activity. This policy requires that the
  Guest Configuration prerequisites have been deployed to the policy assignment scope. For details, visit https://aka.ms/gcpol.
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.windows_machines_should_meet_requirements_for_system_audit_policies_detailed_tra
effect: AuditIfNotExists
