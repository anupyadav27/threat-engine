rule_id: azure.guest_configuration.virtual_machines.windows_machines_should_meet_requirements_for_administrative_templates_system
service: guest_configuration
resource: virtual_machines
title: Windows machines should meet requirements for 'Administrative Templates - System'
description: Windows machines should have the specified Group Policy settings in the
  category 'Administrative Templates - System' for settings that control the administrative
  experience and Remote Assistance. This policy requires that the Guest Configuration
  prerequisites have been deployed to the policy assignment scope. For details, visit
  https://aka.ms/gcpol.
domain: configuration_and_change_management
severity: medium
