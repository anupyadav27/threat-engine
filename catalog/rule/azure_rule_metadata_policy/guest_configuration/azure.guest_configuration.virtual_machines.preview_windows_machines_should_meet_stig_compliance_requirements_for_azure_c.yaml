rule_id: azure.guest_configuration.virtual_machines.preview_windows_machines_should_meet_stig_compliance_requirements_for_azure_comp
service: guest_configuration
resource: virtual_machines
title: '[Preview]: Windows machines should meet STIG compliance requirements for Azure
  compute'
description: Requires that prerequisites are deployed to the policy assignment scope.
  For details, visit https://aka.ms/gcpol. Machines are non-compliant if the machine
  is not configured correctly for one of the recommendations in STIG compliance requirements
  for Azure compute. DISA (Defense Information Systems Agency) provides technical
  guides STIG (Security Technical Implementation Guide) to secure compute OS as required
  by Department of Defense (DoD). For more details, https://public.cyber.mil/stigs/.
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
