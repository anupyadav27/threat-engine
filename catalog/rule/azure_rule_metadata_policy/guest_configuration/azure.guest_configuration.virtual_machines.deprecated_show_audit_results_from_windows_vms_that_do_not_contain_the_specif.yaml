rule_id: azure.guest_configuration.virtual_machines.deprecated_show_audit_results_from_windows_vms_that_do_not_contain_the_specified
service: guest_configuration
resource: virtual_machines
title: '[Deprecated]: Show audit results from Windows VMs that do not contain the specified certificates in Trusted Root'
description: This policy should only be used along with its corresponding deploy policy in an initiative. This definition
  allows Azure Policy to process the results of auditing Windows VMs that do not contain the specified certificates in the
  Trusted Root Certification Authorities certificate store (Cert:\LocalMachine\Root). For more information on Guest Configuration
  policies, please visit https://aka.ms/gcpol
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.deprecated_show_audit_results_from_windows_vms_that_do_not_contain_the_specified
effect: auditIfNotExists
resource_type: Microsoft.Compute/virtualMachines
policy_id: f3b9ad83-000d-4dc1-bff0-6d54533dd03f
source: azure_policy_builtin
