rule_id: azure.guest_configuration.virtual_machines.audit_windows_machines_on_which_windows_serial_console_is_not_enabled
service: guest_configuration
resource: virtual_machines
title: Audit Windows machines on which Windows Serial Console is not enabled
description: Requires that prerequisites are deployed to the policy assignment scope. For details, visit https://aka.ms/gcpol.
  Machines are non-compliant if the machine does not have the Serial Console software installed or if the EMS port number
  or baud rate are not configured with the same values as the policy parameters.
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.audit_windows_machines_on_which_windows_serial_console_is_not_enabled
effect: auditIfNotExists
resource_type: Microsoft.Compute/virtualMachines
policy_id: 58c460e9-7573-4bb2-9676-339c2f2486bb
source: azure_policy_builtin
