rule_id: azure.guest_configuration.virtual_machines.windows_machines_should_meet_requirements_for_windows_components
service: guest_configuration
resource: virtual_machines
title: Windows machines should meet requirements for 'Windows Components'
description: Windows machines should have the specified Group Policy settings in the
  category 'Windows Components' for basic authentication, unencrypted traffic, Microsoft
  accounts, telemetry, Cortana, and other Windows behaviors. This policy requires
  that the Guest Configuration prerequisites have been deployed to the policy assignment
  scope. For details, visit https://aka.ms/gcpol.
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.windows_machines_should_meet_requirements_for_windows_components
effect: AuditIfNotExists
resource_type: Microsoft.Compute/virtualMachines
