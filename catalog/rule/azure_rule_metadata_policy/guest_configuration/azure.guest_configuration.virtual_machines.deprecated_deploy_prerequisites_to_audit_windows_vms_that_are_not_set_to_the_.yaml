rule_id: azure.guest_configuration.virtual_machines.deprecated_deploy_prerequisites_to_audit_windows_vms_that_are_not_set_to_the_spe
service: guest_configuration
resource: virtual_machines
title: '[Deprecated]: Deploy prerequisites to audit Windows VMs that are not set to the specified time zone'
description: This policy creates a Guest Configuration assignment to audit Windows virtual machines that are not set to the
  specified time zone. It also creates a system-assigned managed identity and deploys the VM extension for Guest Configuration.
  This policy should only be used along with its corresponding audit policy in an initiative. For more information on Guest
  Configuration policies, please visit https://aka.ms/gcpol
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.deprecated_deploy_prerequisites_to_audit_windows_vms_that_are_not_set_to_the_spe
effect: deployIfNotExists
resource_type: Microsoft.Compute/virtualMachines
