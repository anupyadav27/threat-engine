rule_id: azure.guest_configuration.virtual_machines.windows_machines_should_meet_requirements_for_administrative_templates_network
service: guest_configuration
resource: virtual_machines
title: Windows machines should meet requirements for 'Administrative Templates - Network'
description: Windows machines should have the specified Group Policy settings in the
  category 'Administrative Templates - Network' for guest logons, simultaneous connections,
  network bridge, ICS, and multicast name resolution. This policy requires that the
  Guest Configuration prerequisites have been deployed to the policy assignment scope.
  For details, visit https://aka.ms/gcpol.
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.windows_machines_should_meet_requirements_for_administrative_templates_network
effect: AuditIfNotExists
