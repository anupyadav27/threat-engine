title: Audit Windows machines that do not have the specified Windows PowerShell execution policy
description: Requires that prerequisites are deployed to the policy assignment scope. For details, visit https://aka.ms/gcpol.
  Machines are non-compliant if  the Windows PowerShell command Get-ExecutionPolicy returns a value other than what was selected
  in the policy parameter.
