title: Windows machines should be configured to use secure communication protocols
description: To protect the privacy of information communicated over the Internet, your machines should use the latest version
  of the industry-standard cryptographic protocol, Transport Layer Security (TLS). TLS secures communications over a network
  by encrypting a connection between machines.
