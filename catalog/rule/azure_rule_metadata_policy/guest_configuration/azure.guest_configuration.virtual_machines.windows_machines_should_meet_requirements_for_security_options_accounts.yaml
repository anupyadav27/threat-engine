rule_id: azure.guest_configuration.virtual_machines.windows_machines_should_meet_requirements_for_security_options_accounts
service: guest_configuration
resource: virtual_machines
title: Windows machines should meet requirements for 'Security Options - Accounts'
description: Windows machines should have the specified Group Policy settings in the category 'Security Options - Accounts'
  for limiting local account use of blank passwords and guest account status. This policy requires that the Guest Configuration
  prerequisites have been deployed to the policy assignment scope. For details, visit https://aka.ms/gcpol.
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.windows_machines_should_meet_requirements_for_security_options_accounts
effect: AuditIfNotExists
resource_type: Microsoft.Compute/virtualMachines
policy_id: ee984370-154a-4ee8-9726-19d900e56fc0
source: azure_policy_builtin
