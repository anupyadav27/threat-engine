rule_id: azure.guest_configuration.virtual_machines.windows_machines_should_meet_requirements_for_security_settings_account_policies
service: guest_configuration
resource: virtual_machines
title: Windows machines should meet requirements for 'Security Settings - Account
  Policies'
description: Windows machines should have the specified Group Policy settings in the
  category 'Security Settings - Account Policies' for password history, age, length,
  complexity, and storing passwords using reversible encryption. This policy requires
  that the Guest Configuration prerequisites have been deployed to the policy assignment
  scope. For details, visit https://aka.ms/gcpol.
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.windows_machines_should_meet_requirements_for_security_settings_account_policies
effect: AuditIfNotExists
resource_type: Microsoft.Compute/virtualMachines
policy_id: f2143251-70de-4e81-87a8-36cee5a2f29d
source: azure_policy_builtin
mitre_techniques:
- T1110
mitre_tactics:
- credential-access
threat_tags:
- credential-access
threat_category: credential_access
