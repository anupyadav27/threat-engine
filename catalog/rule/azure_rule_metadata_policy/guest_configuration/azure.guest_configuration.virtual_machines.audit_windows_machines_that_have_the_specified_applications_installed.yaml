rule_id: azure.guest_configuration.virtual_machines.audit_windows_machines_that_have_the_specified_applications_installed
service: guest_configuration
resource: virtual_machines
title: Audit Windows machines that have the specified applications installed
description: 'Requires that prerequisites are deployed to the policy assignment scope. For details, visit https://aka.ms/gcpol.
  Machines are non-compliant if the application name is found in any of the following registry paths: HKLM:SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall,
  HKLM:SOFTWARE\Wow6432node\Microsoft\Windows\CurrentVersion\Uninstall, HKCU:Software\Microsoft\Windows\CurrentVersion\Uninstall.'
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.audit_windows_machines_that_have_the_specified_applications_installed
effect: auditIfNotExists
resource_type: Microsoft.Compute/virtualMachines
policy_id: c5b85cba-6e6f-4de4-95e1-f0233cd712ac
source: azure_policy_builtin
