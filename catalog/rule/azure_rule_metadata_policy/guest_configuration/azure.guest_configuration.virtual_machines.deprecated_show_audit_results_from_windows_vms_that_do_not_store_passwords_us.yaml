rule_id: azure.guest_configuration.virtual_machines.deprecated_show_audit_results_from_windows_vms_that_do_not_store_passwords_using
service: guest_configuration
resource: virtual_machines
title: '[Deprecated]: Show audit results from Windows VMs that do not store passwords
  using reversible encryption'
description: This policy should only be used along with its corresponding deploy policy
  in an initiative. This definition allows Azure Policy to process the results of
  auditing Windows virtual machines that do not store passwords using reversible encryption.
  For more information on Guest Configuration policies, please visit https://aka.ms/gcpol
