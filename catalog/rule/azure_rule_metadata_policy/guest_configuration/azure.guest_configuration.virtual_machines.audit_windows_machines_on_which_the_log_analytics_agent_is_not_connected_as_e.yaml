rule_id: azure.guest_configuration.virtual_machines.audit_windows_machines_on_which_the_log_analytics_agent_is_not_connected_as_expe
service: guest_configuration
resource: virtual_machines
title: Audit Windows machines on which the Log Analytics agent is not connected as
  expected
description: Requires that prerequisites are deployed to the policy assignment scope.
  For details, visit https://aka.ms/gcpol. Machines are non-compliant if the agent
  is not installed, or if it is installed but the COM object AgentConfigManager.MgmtSvcCfg
  returns that it is registered to a workspace other than the ID specified in the
  policy parameter.
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.audit_windows_machines_on_which_the_log_analytics_agent_is_not_connected_as_expe
effect: auditIfNotExists
resource_type: Microsoft.Compute/virtualMachines
policy_id: 6265018c-d7e2-432f-a75d-094d5f6f4465
source: azure_policy_builtin
mitre_techniques:
