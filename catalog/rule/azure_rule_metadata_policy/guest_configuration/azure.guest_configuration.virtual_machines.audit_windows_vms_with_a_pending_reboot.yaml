rule_id: azure.guest_configuration.virtual_machines.audit_windows_vms_with_a_pending_reboot
service: guest_configuration
resource: virtual_machines
title: Audit Windows VMs with a pending reboot
description: 'Requires that prerequisites are deployed to the policy assignment scope. For details, visit https://aka.ms/gcpol.
  Machines are non-compliant if the machine is pending reboot for any of the following reasons: component based servicing,
  Windows Update, pending file rename, pending computer rename, configuration manager pending reboot. Each detection has a
  unique registry path.'
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.audit_windows_vms_with_a_pending_reboot
effect: auditIfNotExists
resource_type: Microsoft.Compute/virtualMachines
policy_id: 4221adbc-5c0f-474f-88b7-037a99e6114c
source: azure_policy_builtin
