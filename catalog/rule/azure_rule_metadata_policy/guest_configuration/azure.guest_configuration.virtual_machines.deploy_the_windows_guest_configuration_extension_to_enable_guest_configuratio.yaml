rule_id: azure.guest_configuration.virtual_machines.deploy_the_windows_guest_configuration_extension_to_enable_guest_configuration_a
service: guest_configuration
resource: virtual_machines
title: Deploy the Windows Guest Configuration extension to enable Guest Configuration assignments on Windows VMs
description: This policy deploys the Windows Guest Configuration extension to Windows virtual machines hosted in Azure that
  are supported by Guest Configuration. The Windows Guest Configuration extension is a prerequisite for all Windows Guest
  Configuration assignments and must be deployed to machines before using any Windows Guest Configuration policy definition.
  For more information on Guest Configuration, visit https://aka.ms/gcpol.
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.deploy_the_windows_guest_configuration_extension_to_enable_guest_configuration_a
effect: deployIfNotExists
resource_type: Microsoft.Compute/virtualMachines
policy_id: 385f5831-96d4-41db-9a3c-cd3af78aaae6
source: azure_policy_builtin
