rule_id: azure.guest_configuration.virtual_machines.windows_machines_should_meet_requirements_for_security_options_audit
service: guest_configuration
resource: virtual_machines
title: Windows machines should meet requirements for 'Security Options - Audit'
description: Windows machines should have the specified Group Policy settings in the
  category 'Security Options - Audit' for forcing audit policy subcategory and shutting
  down if unable to log security audits. This policy requires that the Guest Configuration
  prerequisites have been deployed to the policy assignment scope. For details, visit
  https://aka.ms/gcpol.
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.windows_machines_should_meet_requirements_for_security_options_audit
effect: AuditIfNotExists
resource_type: Microsoft.Compute/virtualMachines
policy_id: 33936777-f2ac-45aa-82ec-07958ec9ade4
source: azure_policy_builtin
mitre_techniques:
- T1562.008
