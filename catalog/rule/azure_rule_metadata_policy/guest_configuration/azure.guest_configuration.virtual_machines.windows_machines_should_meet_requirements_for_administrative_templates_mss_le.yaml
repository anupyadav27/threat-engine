rule_id: azure.guest_configuration.virtual_machines.windows_machines_should_meet_requirements_for_administrative_templates_mss_legac
service: guest_configuration
resource: virtual_machines
title: Windows machines should meet requirements for 'Administrative Templates - MSS (Legacy)'
description: Windows machines should have the specified Group Policy settings in the category 'Administrative Templates -
  MSS (Legacy)' for automatic logon, screen saver, network behavior, safe DLL, and event log. This policy requires that the
  Guest Configuration prerequisites have been deployed to the policy assignment scope. For details, visit https://aka.ms/gcpol.
