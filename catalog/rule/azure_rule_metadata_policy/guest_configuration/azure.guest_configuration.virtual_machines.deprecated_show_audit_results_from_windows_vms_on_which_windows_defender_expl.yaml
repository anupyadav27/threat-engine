rule_id: azure.guest_configuration.virtual_machines.deprecated_show_audit_results_from_windows_vms_on_which_windows_defender_exploit
service: guest_configuration
resource: virtual_machines
title: '[Deprecated]: Show audit results from Windows VMs on which Windows Defender
  Exploit Guard is not enabled'
description: This policy should only be used along with its corresponding deploy policy
  in an initiative. This definition allows Azure Policy to process the results of
  auditing Windows virtual machines on which Windows Defender Exploit Guard is not
  enabled. For more information on Guest Configuration policies, please visit https://aka.ms/gcpol
