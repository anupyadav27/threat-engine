service: guest_configuration
resource: virtual_machines
title: '[Deprecated]: Deploy prerequisites to audit Linux VMs that have the specified applications installed'
description: This policy creates a Guest Configuration assignment to audit Linux virtual machines that have the specified
  applications installed. It also creates a system-assigned managed identity and deploys the VM extension for Guest Configuration.
  This policy should only be used along with its corresponding audit policy in an initiative. For more information on Guest
  Configuration policies, please visit https://aka.ms/gcpol
