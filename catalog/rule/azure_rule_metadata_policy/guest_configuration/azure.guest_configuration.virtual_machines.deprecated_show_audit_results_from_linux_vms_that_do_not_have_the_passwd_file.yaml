rule_id: azure.guest_configuration.virtual_machines.deprecated_show_audit_results_from_linux_vms_that_do_not_have_the_passwd_file_pe
service: guest_configuration
resource: virtual_machines
title: '[Deprecated]: Show audit results from Linux VMs that do not have the passwd file permissions set to 0644'
description: This policy should only be used along with its corresponding deploy policy in an initiative. This definition
  allows Azure Policy to process the results of auditing Linux virtual machines that do not have the passwd file permissions
  set to 0644. For more information on Guest Configuration policies, please visit https://aka.ms/gcpol
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.deprecated_show_audit_results_from_linux_vms_that_do_not_have_the_passwd_file_pe
effect: auditIfNotExists
