rule_id: azure.guest_configuration.virtual_machines.preview_official_cis_security_benchmarks_for_linux_workloads
service: guest_configuration
resource: virtual_machines
title: '[Preview]: Official CIS Security Benchmarks for Linux Workloads'
description: This policy provides you the ability to customize and deploy CIS Security
  Benchmarks for audit purposes to your Linux workloads across Azure, on-premises
  and hybrid environments. The contents of the CIS Security Benchmarks are in parity
  with the benchmarks published at https://cisecurity.org. The policy is powered by
  azure-osconfig. Requires that prerequisites are deployed to the policy assignment
  scope. For details, visit https://aka.ms/gcpol.
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.preview_official_cis_security_benchmarks_for_linux_workloads
effect: AuditIfNotExists
resource_type: Microsoft.Compute/virtualMachines
