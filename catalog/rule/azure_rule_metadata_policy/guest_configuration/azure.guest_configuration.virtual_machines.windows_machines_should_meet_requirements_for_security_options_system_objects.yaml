rule_id: azure.guest_configuration.virtual_machines.windows_machines_should_meet_requirements_for_security_options_system_objects
service: guest_configuration
resource: virtual_machines
title: Windows machines should meet requirements for 'Security Options - System objects'
description: Windows machines should have the specified Group Policy settings in the category 'Security Options - System objects'
  for case insensitivity for non-Windows subsystems and permissions of internal system objects. This policy requires that
  the Guest Configuration prerequisites have been deployed to the policy assignment scope. For details, visit https://aka.ms/gcpol.
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.windows_machines_should_meet_requirements_for_security_options_system_objects
effect: AuditIfNotExists
resource_type: Microsoft.Compute/virtualMachines
policy_id: 2f262ace-812a-4fd0-b731-b38ba9e9708d
source: azure_policy_builtin
