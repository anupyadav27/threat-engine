rule_id: azure.guest_configuration.virtual_machines.windows_virtual_machines_should_enable_azure_disk_encryption_or_encryptionathost
service: guest_configuration
resource: virtual_machines
title: Windows virtual machines should enable Azure Disk Encryption or EncryptionAtHost.
description: Although a virtual machine's OS and data disks are encrypted-at-rest by default using platform managed keys;
  resource disks (temp disks), data caches, and data flowing between Compute and Storage resources are not encrypted. Use
  Azure Disk Encryption or EncryptionAtHost to remediate. Visit https://aka.ms/diskencryptioncomparison to compare encryption
  offerings. This policy requires two prerequisites to be deployed to the policy assignment scope. For details, visit https://aka.ms/gcpol.
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.windows_virtual_machines_should_enable_azure_disk_encryption_or_encryptionathost
effect: AuditIfNotExists
resource_type: Microsoft.Compute/virtualMachines
policy_id: 3dc5edcd-002d-444c-b216-e123bbfa37c0
source: azure_policy_builtin
