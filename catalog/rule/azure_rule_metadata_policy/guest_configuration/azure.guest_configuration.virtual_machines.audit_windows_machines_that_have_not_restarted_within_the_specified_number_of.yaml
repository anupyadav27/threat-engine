rule_id: azure.guest_configuration.virtual_machines.audit_windows_machines_that_have_not_restarted_within_the_specified_number_of_da
service: guest_configuration
resource: virtual_machines
title: Audit Windows machines that have not restarted within the specified number
  of days
description: Requires that prerequisites are deployed to the policy assignment scope.
  For details, visit https://aka.ms/gcpol. Machines are non-compliant if the WMI property
  LastBootUpTime in class Win32_Operatingsystem is outside the range of days provided
  by the policy parameter.
