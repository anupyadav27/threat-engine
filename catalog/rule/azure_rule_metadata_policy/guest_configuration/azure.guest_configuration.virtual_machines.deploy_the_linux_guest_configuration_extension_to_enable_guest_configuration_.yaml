rule_id: azure.guest_configuration.virtual_machines.deploy_the_linux_guest_configuration_extension_to_enable_guest_configuration_ass
service: guest_configuration
resource: virtual_machines
title: Deploy the Linux Guest Configuration extension to enable Guest Configuration assignments on Linux VMs
description: This policy deploys the Linux Guest Configuration extension to Linux virtual machines hosted in Azure that are
  supported by Guest Configuration. The Linux Guest Configuration extension is a prerequisite for all Linux Guest Configuration
  assignments and must be deployed to machines before using any Linux Guest Configuration policy definition. For more information
  on Guest Configuration, visit https://aka.ms/gcpol.
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.deploy_the_linux_guest_configuration_extension_to_enable_guest_configuration_ass
effect: deployIfNotExists
resource_type: Microsoft.Compute/virtualMachines
policy_id: 331e8ea8-378a-410f-a2e5-ae22f38bb0da
source: azure_policy_builtin
