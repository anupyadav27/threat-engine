rule_id: azure.guest_configuration.virtual_machines.add_systemassigned_managed_identity_to_enable_guest_configuration_assignments_on
service: guest_configuration
resource: virtual_machines
title: Add system-assigned managed identity to enable Guest Configuration assignments on VMs with a user-assigned identity
description: This policy adds a system-assigned managed identity to virtual machines hosted in Azure that are supported by
  Guest Configuration and have at least one user-assigned identity but do not have a system-assigned managed identity. A system-assigned
  managed identity is a prerequisite for all Guest Configuration assignments and must be added to machines before using any
  Guest Configuration policy definitions. For more information on Guest Configuration, visit https://aka.ms/gcpol.
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.add_systemassigned_managed_identity_to_enable_guest_configuration_assignments_on
effect: modify
resource_type: Microsoft.Compute/virtualMachines
policy_id: 497dff13-db2a-4c0f-8603-28fa3b331ab6
source: azure_policy_builtin
