rule_id: azure.guest_configuration.virtual_machines.deprecated_deploy_prerequisites_to_audit_windows_vms_that_have_not_restarted_wit
service: guest_configuration
resource: virtual_machines
title: '[Deprecated]: Deploy prerequisites to audit Windows VMs that have not restarted within the specified number of days'
description: This policy creates a Guest Configuration assignment to audit Windows virtual machines that have not restarted
  within the specified number of days. It also creates a system-assigned managed identity and deploys the VM extension for
  Guest Configuration. This policy should only be used along with its corresponding audit policy in an initiative. For more
  information on Guest Configuration policies, please visit https://aka.ms/gcpol
