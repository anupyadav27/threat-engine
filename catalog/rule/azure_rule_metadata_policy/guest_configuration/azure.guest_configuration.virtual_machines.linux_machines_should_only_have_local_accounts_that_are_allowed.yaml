rule_id: azure.guest_configuration.virtual_machines.linux_machines_should_only_have_local_accounts_that_are_allowed
service: guest_configuration
resource: virtual_machines
title: Linux machines should only have local accounts that are allowed
description: Requires that prerequisites are deployed to the policy assignment scope. For details, visit https://aka.ms/gcpol.
  Managing user accounts using Azure Active Directory is a best practice for management of identities. Reducing local machine
  accounts helps prevent the proliferation of identities managed outside a central system. Machines are non-compliant if local
  user accounts exist that are enabled and not listed in the policy parameter.
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.linux_machines_should_only_have_local_accounts_that_are_allowed
effect: AuditIfNotExists
resource_type: Microsoft.Compute/virtualMachines
policy_id: 73db37c4-f180-4b0f-ab2c-8ee96467686b
source: azure_policy_builtin
