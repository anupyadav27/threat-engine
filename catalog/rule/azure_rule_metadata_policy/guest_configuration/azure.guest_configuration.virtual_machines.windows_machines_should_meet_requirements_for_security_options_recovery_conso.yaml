rule_id: azure.guest_configuration.virtual_machines.windows_machines_should_meet_requirements_for_security_options_recovery_console
service: guest_configuration
resource: virtual_machines
title: Windows machines should meet requirements for 'Security Options - Recovery
  console'
description: Windows machines should have the specified Group Policy settings in the
  category 'Security Options - Recovery console' for allowing floppy copy and access
  to all drives and folders. This policy requires that the Guest Configuration prerequisites
  have been deployed to the policy assignment scope. For details, visit https://aka.ms/gcpol.
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
