rule_id: azure.guest_configuration.virtual_machines.windows_machines_should_meet_requirements_for_administrative_templates_control_p
service: guest_configuration
resource: virtual_machines
title: Windows machines should meet requirements for 'Administrative Templates - Control
  Panel'
description: Windows machines should have the specified Group Policy settings in the
  category 'Administrative Templates - Control Panel' for input personalization and
  prevention of enabling lock screens. This policy requires that the Guest Configuration
  prerequisites have been deployed to the policy assignment scope. For details, visit
  https://aka.ms/gcpol.
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.windows_machines_should_meet_requirements_for_administrative_templates_control_p
effect: AuditIfNotExists
resource_type: Microsoft.Compute/virtualMachines
