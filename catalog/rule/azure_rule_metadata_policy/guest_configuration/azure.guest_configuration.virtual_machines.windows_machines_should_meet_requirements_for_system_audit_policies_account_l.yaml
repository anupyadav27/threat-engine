rule_id: azure.guest_configuration.virtual_machines.windows_machines_should_meet_requirements_for_system_audit_policies_account_logo
service: guest_configuration
resource: virtual_machines
title: Windows machines should meet requirements for 'System Audit Policies - Account Logon'
description: Windows machines should have the specified Group Policy settings in the category 'System Audit Policies - Account
  Logon' for auditing credential validation and other account logon events. This policy requires that the Guest Configuration
  prerequisites have been deployed to the policy assignment scope. For details, visit https://aka.ms/gcpol.
