rule_id: azure.guest_configuration.virtual_machines.windows_machines_should_meet_requirements_for_system_audit_policies_logonlogoff
service: guest_configuration
resource: virtual_machines
title: Windows machines should meet requirements for 'System Audit Policies - Logon-Logoff'
description: Windows machines should have the specified Group Policy settings in the category 'System Audit Policies - Logon-Logoff'
  for auditing IPSec, network policy, claims, account lockout, group membership, and logon/logoff events. This policy requires
  that the Guest Configuration prerequisites have been deployed to the policy assignment scope. For details, visit https://aka.ms/gcpol.
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.windows_machines_should_meet_requirements_for_system_audit_policies_logonlogoff
effect: AuditIfNotExists
resource_type: Microsoft.Compute/virtualMachines
policy_id: 19be9779-c776-4dfa-8a15-a2fd5dc843d6
source: azure_policy_builtin
