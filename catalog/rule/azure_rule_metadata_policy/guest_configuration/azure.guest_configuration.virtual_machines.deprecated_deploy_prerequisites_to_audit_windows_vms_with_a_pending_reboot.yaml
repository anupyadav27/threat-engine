title: '[Deprecated]: Deploy prerequisites to audit Windows VMs with a pending reboot'
description: This policy creates a Guest Configuration assignment to audit Windows virtual machines with a pending reboot.
  It also creates a system-assigned managed identity and deploys the VM extension for Guest Configuration. This policy should
  only be used along with its corresponding audit policy in an initiative. For more information on Guest Configuration policies,
  please visit https://aka.ms/gcpol
