rule_id: azure.guest_configuration.virtual_machines.preview_linux_machines_with_omi_installed_should_have_version_1681_or_later
service: guest_configuration
resource: virtual_machines
title: '[Preview]: Linux machines with OMI installed should have version 1.6.8-1 or later'
description: Requires that prerequisites are deployed to the policy assignment scope. For details, visit https://aka.ms/gcpol.
  Due to a security fix included in version 1.6.8-1 of the OMI package for Linux, all machines should be updated to the latest
  release. Upgrade apps/packages that use OMI to resolve the issue. For more information, see https://aka.ms/omiguidance.
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.preview_linux_machines_with_omi_installed_should_have_version_1681_or_later
effect: AuditIfNotExists
resource_type: Microsoft.Compute/virtualMachines
policy_id: e79ffbda-ff85-465d-ab8e-7e58a557660f
source: azure_policy_builtin
