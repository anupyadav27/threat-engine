rule_id: azure.guest_configuration.virtual_machines.deprecated_deploy_prerequisites_to_audit_windows_web_servers_that_are_not_using_
service: guest_configuration
resource: virtual_machines
title: '[Deprecated]: Deploy prerequisites to audit Windows web servers that are not using secure communication protocols'
description: This policy creates a Guest Configuration assignment to audit Windows web servers that are not using secure communication
  protocols (TLS 1.1 or TLS 1.2). It also creates a system-assigned managed identity and deploys the VM extension for Guest
  Configuration. This policy should only be used along with its corresponding audit policy in an initiative. For more information
  on Guest Configuration policies, please visit https://aka.ms/gcpol
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.deprecated_deploy_prerequisites_to_audit_windows_web_servers_that_are_not_using_
effect: deployIfNotExists
