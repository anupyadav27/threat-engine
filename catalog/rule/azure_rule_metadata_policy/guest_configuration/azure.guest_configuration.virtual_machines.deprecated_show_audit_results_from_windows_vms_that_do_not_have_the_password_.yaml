rule_id: azure.guest_configuration.virtual_machines.deprecated_show_audit_results_from_windows_vms_that_do_not_have_the_password_com
service: guest_configuration
resource: virtual_machines
title: '[Deprecated]: Show audit results from Windows VMs that do not have the password
  complexity setting enabled'
description: This policy should only be used along with its corresponding deploy policy
  in an initiative. This definition allows Azure Policy to process the results of
  auditing Windows virtual machines that do not have the password complexity setting
  enabled. For more information on Guest Configuration policies, please visit https://aka.ms/gcpol
