rule_id: azure.guest_configuration.virtual_machines.deprecated_show_audit_results_from_windows_vms_on_which_the_dsc_configuration_is
service: guest_configuration
resource: virtual_machines
title: '[Deprecated]: Show audit results from Windows VMs on which the DSC configuration is not compliant'
description: This policy should only be used along with its corresponding deploy policy in an initiative. This definition
  allows Azure Policy to process the results of auditing Windows VMs on which the Desired State Configuration (DSC) configuration
  is not compliant. This policy is only applicable to machines with WMF 4 and above. For more information on Guest Configuration
  policies, please visit https://aka.ms/gcpol
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.deprecated_show_audit_results_from_windows_vms_on_which_the_dsc_configuration_is
effect: auditIfNotExists
resource_type: Microsoft.Compute/virtualMachines
policy_id: 7227ebe5-9ff7-47ab-b823-171cd02fb90f
source: azure_policy_builtin
