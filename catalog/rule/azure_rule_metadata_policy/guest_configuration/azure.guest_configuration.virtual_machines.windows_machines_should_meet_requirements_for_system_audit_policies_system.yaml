rule_id: azure.guest_configuration.virtual_machines.windows_machines_should_meet_requirements_for_system_audit_policies_system
service: guest_configuration
resource: virtual_machines
title: Windows machines should meet requirements for 'System Audit Policies - System'
description: Windows machines should have the specified Group Policy settings in the category 'System Audit Policies - System'
  for auditing IPsec driver, system integrity, system extension, state change, and other system events. This policy requires
  that the Guest Configuration prerequisites have been deployed to the policy assignment scope. For details, visit https://aka.ms/gcpol.
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.windows_machines_should_meet_requirements_for_system_audit_policies_system
effect: AuditIfNotExists
resource_type: Microsoft.Compute/virtualMachines
policy_id: 8316fa92-d69c-4810-8124-62414f560dcf
source: azure_policy_builtin
