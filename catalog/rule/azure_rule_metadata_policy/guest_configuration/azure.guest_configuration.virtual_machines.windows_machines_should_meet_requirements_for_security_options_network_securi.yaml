rule_id: azure.guest_configuration.virtual_machines.windows_machines_should_meet_requirements_for_security_options_network_security
service: guest_configuration
resource: virtual_machines
title: Windows machines should meet requirements for 'Security Options - Network Security'
description: Windows machines should have the specified Group Policy settings in the
  category 'Security Options - Network Security' for including Local System behavior,
  PKU2U, LAN Manager, LDAP client, and NTLM SSP. This policy requires that the Guest
  Configuration prerequisites have been deployed to the policy assignment scope. For
  details, visit https://aka.ms/gcpol.
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.windows_machines_should_meet_requirements_for_security_options_network_security
effect: AuditIfNotExists
resource_type: Microsoft.Compute/virtualMachines
