rule_id: azure.guest_configuration.virtual_machines.deprecated_show_audit_results_from_windows_vms_that_allow_reuse_of_the_previous_
service: guest_configuration
resource: virtual_machines
title: '[Deprecated]: Show audit results from Windows VMs that allow re-use of the
  previous 24 passwords'
description: This policy should only be used along with its corresponding deploy policy
  in an initiative. This definition allows Azure Policy to process the results of
  auditing Windows virtual machines that allow re-use of the previous 24 passwords.
