rule_id: azure.guest_configuration.virtual_machines.local_authentication_methods_should_be_disabled_on_windows_servers
service: guest_configuration
resource: virtual_machines
title: Local authentication methods should be disabled on Windows Servers
description: Requires that prerequisites are deployed to the policy assignment scope. For details, visit https://aka.ms/gcpol.
  Machines are non-compliant if Windows servers don't have local authentication methods disabled. This is to validate that
  Windows Servers can only be accessed by AAD (Azure Active Directory) account or a list of explicitly allowed users by this
  policy, improving overall security posture.
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.local_authentication_methods_should_be_disabled_on_windows_servers
effect: AuditIfNotExists
resource_type: Microsoft.Compute/virtualMachines
policy_id: 5fe81c49-16b6-4870-9cee-45d13bf902ce
source: azure_policy_builtin
