rule_id: azure.guest_configuration.virtual_machines.deprecated_show_audit_results_from_windows_vms_if_the_administrators_group_conta
service: guest_configuration
resource: virtual_machines
title: '[Deprecated]: Show audit results from Windows VMs if the Administrators group
  contains any of the specified members'
description: This policy should only be used along with its corresponding deploy policy
  in an initiative. This definition allows Azure Policy to process the results of
  auditing Windows virtual machines in which the Administrators group contains any
  of the specified members. For more information on Guest Configuration policies,
  please visit https://aka.ms/gcpol
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.deprecated_show_audit_results_from_windows_vms_if_the_administrators_group_conta
effect: auditIfNotExists
