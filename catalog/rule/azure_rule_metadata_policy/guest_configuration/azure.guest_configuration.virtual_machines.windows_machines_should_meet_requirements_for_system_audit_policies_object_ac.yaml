rule_id: azure.guest_configuration.virtual_machines.windows_machines_should_meet_requirements_for_system_audit_policies_object_acces
service: guest_configuration
resource: virtual_machines
title: Windows machines should meet requirements for 'System Audit Policies - Object Access'
description: Windows machines should have the specified Group Policy settings in the category 'System Audit Policies - Object
  Access' for auditing file, registry, SAM, storage, filtering, kernel, and other system types. This policy requires that
  the Guest Configuration prerequisites have been deployed to the policy assignment scope. For details, visit https://aka.ms/gcpol.
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.windows_machines_should_meet_requirements_for_system_audit_policies_object_acces
effect: AuditIfNotExists
