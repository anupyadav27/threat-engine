rule_id: azure.guest_configuration.virtual_machines.preview_add_userassigned_managed_identity_to_enable_guest_configuration_assignme
service: guest_configuration
resource: virtual_machines
title: '[Preview]: Add user-assigned managed identity to enable Guest Configuration assignments on virtual machines'
description: This policy adds a user-assigned managed identity to virtual machines hosted in Azure that are supported by Guest
  Configuration. A user-assigned managed identity is a prerequisite for all Guest Configuration assignments and must be added
  to machines before using any Guest Configuration policy definitions. For more information on Guest Configuration, visit
  https://aka.ms/gcpol.
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.preview_add_userassigned_managed_identity_to_enable_guest_configuration_assignme
effect: DeployIfNotExists
