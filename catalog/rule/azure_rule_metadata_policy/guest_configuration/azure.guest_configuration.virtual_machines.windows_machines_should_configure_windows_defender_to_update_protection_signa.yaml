rule_id: azure.guest_configuration.virtual_machines.windows_machines_should_configure_windows_defender_to_update_protection_signatur
service: guest_configuration
resource: virtual_machines
title: Windows machines should configure Windows Defender to update protection signatures within one day
description: To provide adequate protection against newly released malware, Windows Defender protection signatures need to
  be updated regularly to account for newly released malware. This policy is not applied to Arc connected servers and it requires
  that the Guest Configuration prerequisites have been deployed to the policy assignment scope. For more information on Guest
  Configuration, visit https://aka.ms/gcpol.
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.windows_machines_should_configure_windows_defender_to_update_protection_signatur
effect: AuditIfNotExists
resource_type: Microsoft.Compute/virtualMachines
