rule_id: azure.guest_configuration.virtual_machines.audit_windows_machines_that_are_not_set_to_the_specified_time_zone
service: guest_configuration
resource: virtual_machines
title: Audit Windows machines that are not set to the specified time zone
description: Requires that prerequisites are deployed to the policy assignment scope.
  For details, visit https://aka.ms/gcpol. Machines are non-compliant if the value
  of the property StandardName in WMI class Win32_TimeZone does not match the selected
  time zone for the policy parameter.
