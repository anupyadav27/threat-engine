rule_id: azure.guest_configuration.virtual_machines.windows_machines_should_meet_requirements_for_user_rights_assignment
service: guest_configuration
resource: virtual_machines
title: Windows machines should meet requirements for 'User Rights Assignment'
description: Windows machines should have the specified Group Policy settings in the
  category 'User Rights Assignment' for allowing log on locally, RDP, access from
  the network, and many other user activities. This policy requires that the Guest
  Configuration prerequisites have been deployed to the policy assignment scope. For
  details, visit https://aka.ms/gcpol.
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.windows_machines_should_meet_requirements_for_user_rights_assignment
effect: AuditIfNotExists
resource_type: Microsoft.Compute/virtualMachines
policy_id: e068b215-0026-4354-b347-8fb2766f73a2
source: azure_policy_builtin
mitre_techniques:
- T1548.005
mitre_tactics:
- privilege-escalation
threat_tags:
- privilege-escalation
threat_category: privilege_escalation
