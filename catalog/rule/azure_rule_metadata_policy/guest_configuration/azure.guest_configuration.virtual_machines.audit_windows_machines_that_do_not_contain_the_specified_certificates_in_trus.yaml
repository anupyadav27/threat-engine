rule_id: azure.guest_configuration.virtual_machines.audit_windows_machines_that_do_not_contain_the_specified_certificates_in_trusted
service: guest_configuration
resource: virtual_machines
title: Audit Windows machines that do not contain the specified certificates in Trusted
  Root
description: Requires that prerequisites are deployed to the policy assignment scope.
  For details, visit https://aka.ms/gcpol. Machines are non-compliant if the machine
  Trusted Root certificate store (Cert:\LocalMachine\Root) does not contain one or
  more of the certificates listed by the policy parameter.
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.audit_windows_machines_that_do_not_contain_the_specified_certificates_in_trusted
effect: auditIfNotExists
resource_type: Microsoft.Compute/virtualMachines
policy_id: 934345e1-4dfb-4c70-90d7-41990dc9608b
source: azure_policy_builtin
mitre_techniques:
- T1556
mitre_tactics:
- credential-access
threat_tags:
- certificate-misconfiguration
threat_category: credential_access
