rule_id: azure.guest_configuration.virtual_machines.windows_machines_should_enable_windows_defender_realtime_protection
service: guest_configuration
resource: virtual_machines
title: Windows machines should enable Windows Defender Real-time protection
description: Windows machines should enable the Real-time protection in the Windows
  Defender to provide adequate protection against newly released malware. This policy
  is not applicable to arc connected servers and it requires that the Guest Configuration
  prerequisites have been deployed to the policy assignment scope. For more information
  on Guest Configuration, visit https://aka.ms/gcpol.
domain: configuration_and_change_management
severity: medium
