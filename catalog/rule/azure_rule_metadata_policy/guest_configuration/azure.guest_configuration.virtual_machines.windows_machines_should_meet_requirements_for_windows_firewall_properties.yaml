rule_id: azure.guest_configuration.virtual_machines.windows_machines_should_meet_requirements_for_windows_firewall_properties
service: guest_configuration
resource: virtual_machines
title: Windows machines should meet requirements for 'Windows Firewall Properties'
description: Windows machines should have the specified Group Policy settings in the category 'Windows Firewall Properties'
  for firewall state, connections, rule management, and notifications. This policy requires that the Guest Configuration prerequisites
  have been deployed to the policy assignment scope. For details, visit https://aka.ms/gcpol.
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
