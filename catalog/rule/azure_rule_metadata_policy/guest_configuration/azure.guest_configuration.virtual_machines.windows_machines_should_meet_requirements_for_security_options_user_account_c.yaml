rule_id: azure.guest_configuration.virtual_machines.windows_machines_should_meet_requirements_for_security_options_user_account_cont
service: guest_configuration
resource: virtual_machines
title: Windows machines should meet requirements for 'Security Options - User Account
  Control'
description: Windows machines should have the specified Group Policy settings in the
  category 'Security Options - User Account Control' for mode for admins, behavior
  of elevation prompt, and virtualizing file and registry write failures. This policy
  requires that the Guest Configuration prerequisites have been deployed to the policy
  assignment scope. For details, visit https://aka.ms/gcpol.
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.windows_machines_should_meet_requirements_for_security_options_user_account_cont
effect: AuditIfNotExists
resource_type: Microsoft.Compute/virtualMachines
