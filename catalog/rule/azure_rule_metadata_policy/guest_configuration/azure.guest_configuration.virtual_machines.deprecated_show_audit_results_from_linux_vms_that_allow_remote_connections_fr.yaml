rule_id: azure.guest_configuration.virtual_machines.deprecated_show_audit_results_from_linux_vms_that_allow_remote_connections_from_
service: guest_configuration
resource: virtual_machines
title: '[Deprecated]: Show audit results from Linux VMs that allow remote connections
  from accounts without passwords'
description: This policy should only be used along with its corresponding deploy policy
  in an initiative. This definition allows Azure Policy to process the results of
  auditing Linux virtual machines that allow remote connections from accounts without
  passwords. For more information on Guest Configuration policies, please visit https://aka.ms/gcpol
domain: configuration_and_change_management
severity: medium
