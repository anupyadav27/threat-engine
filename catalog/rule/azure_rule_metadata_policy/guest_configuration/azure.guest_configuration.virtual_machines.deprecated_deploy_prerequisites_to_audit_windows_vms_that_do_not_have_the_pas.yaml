rule_id: azure.guest_configuration.virtual_machines.deprecated_deploy_prerequisites_to_audit_windows_vms_that_do_not_have_the_passwo
service: guest_configuration
resource: virtual_machines
title: '[Deprecated]: Deploy prerequisites to audit Windows VMs that do not have the password complexity setting enabled'
description: This policy creates a Guest Configuration assignment to audit Windows virtual machines that do not have the password
  complexity setting enabled. It also creates a system-assigned managed identity and deploys the VM extension for Guest Configuration.
  This policy should only be used along with its corresponding audit policy in an initiative. For more information on Guest
  Configuration policies, please visit https://aka.ms/gcpol
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
