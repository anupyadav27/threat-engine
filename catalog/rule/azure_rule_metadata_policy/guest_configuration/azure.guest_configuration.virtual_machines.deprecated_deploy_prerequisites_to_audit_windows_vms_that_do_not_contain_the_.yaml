rule_id: azure.guest_configuration.virtual_machines.deprecated_deploy_prerequisites_to_audit_windows_vms_that_do_not_contain_the_spe
service: guest_configuration
resource: virtual_machines
title: '[Deprecated]: Deploy prerequisites to audit Windows VMs that do not contain the specified certificates in Trusted
  Root'
description: This policy creates a Guest Configuration assignment to audit Windows VMs that do not contain the specified certificates
  in the Trusted Root Certification Authorities certificate store (Cert:\LocalMachine\Root). It also creates a system-assigned
  managed identity and deploys the VM extension for Guest Configuration. This policy should only be used along with its corresponding
  audit policy in an initiative. For more information on Guest Configuration policies, please visit https://aka.ms/gcpol
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.deprecated_deploy_prerequisites_to_audit_windows_vms_that_do_not_contain_the_spe
effect: deployIfNotExists
resource_type: Microsoft.Compute/virtualMachines
policy_id: 106ccbe4-a791-4f33-a44a-06796944b8d5
source: azure_policy_builtin
