rule_id: azure.guest_configuration.virtual_machines.windows_machines_should_only_have_local_accounts_that_are_allowed
service: guest_configuration
resource: virtual_machines
title: Windows machines should only have local accounts that are allowed
description: Requires that prerequisites are deployed to the policy assignment scope.
  For details, visit https://aka.ms/gcpol. This definition is not supported on Windows
  Server 2012 or 2012 R2. Managing user accounts using Azure Active Directory is a
  best practice for management of identities. Reducing local machine accounts helps
  prevent the proliferation of identities managed outside a central system. Machines
  are non-compliant if local user accounts exist that are enabled and not listed in
  the policy parameter.
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.windows_machines_should_only_have_local_accounts_that_are_allowed
effect: AuditIfNotExists
resource_type: Microsoft.Compute/virtualMachines
policy_id: f79fef0d-0050-4c18-a303-5babb9c14ac7
source: azure_policy_builtin
mitre_techniques:
- T1078.004
mitre_tactics:
- initial-access
threat_tags:
- unauthorized-accounts
threat_category: initial_access
