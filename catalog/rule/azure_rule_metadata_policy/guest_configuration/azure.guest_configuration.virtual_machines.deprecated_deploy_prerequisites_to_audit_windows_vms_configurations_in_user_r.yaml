rule_id: azure.guest_configuration.virtual_machines.deprecated_deploy_prerequisites_to_audit_windows_vms_configurations_in_user_righ
service: guest_configuration
resource: virtual_machines
title: '[Deprecated]: Deploy prerequisites to audit Windows VMs configurations in
  ''User Rights Assignment'''
description: 'This policy creates a Guest Configuration assignment to audit Windows
  virtual machines with non-compliant settings in Group Policy category: ''User Rights
  Assignment''. It also creates a system-assigned managed identity and deploys the
  VM extension for Guest Configuration. This policy should only be used along with
  its corresponding audit policy in an initiative. For more information on Guest Configuration
  policies, please visit https://aka.ms/gcpol'
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
