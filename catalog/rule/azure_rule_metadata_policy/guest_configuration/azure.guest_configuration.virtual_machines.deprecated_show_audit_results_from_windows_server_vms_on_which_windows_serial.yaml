rule_id: azure.guest_configuration.virtual_machines.deprecated_show_audit_results_from_windows_server_vms_on_which_windows_serial_co
service: guest_configuration
resource: virtual_machines
title: '[Deprecated]: Show audit results from Windows Server VMs on which Windows Serial Console is not enabled'
description: This policy should only be used along with its corresponding deploy policy in an initiative. This definition
  allows Azure Policy to process the results of auditing Windows Server virtual machines on which Windows Serial Console is
