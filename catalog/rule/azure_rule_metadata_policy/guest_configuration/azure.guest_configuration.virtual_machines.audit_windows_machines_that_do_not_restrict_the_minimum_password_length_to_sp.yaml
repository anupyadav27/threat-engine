rule_id: azure.guest_configuration.virtual_machines.audit_windows_machines_that_do_not_restrict_the_minimum_password_length_to_speci
service: guest_configuration
resource: virtual_machines
title: Audit Windows machines that do not restrict the minimum password length to
  specified number of characters
description: Requires that prerequisites are deployed to the policy assignment scope.
  For details, visit https://aka.ms/gcpol. Machines are non-compliant if Windows machines
  that do not restrict the minimum password length to specified number of characters.
  Default value for minimum password length is 14 characters
