rule_id: azure.guest_configuration.virtual_machines.deprecated_show_audit_results_from_windows_web_servers_that_are_not_using_secure
service: guest_configuration
resource: virtual_machines
title: '[Deprecated]: Show audit results from Windows web servers that are not using secure communication protocols'
description: This policy should only be used along with its corresponding deploy policy in an initiative. This definition
  allows Azure Policy to process the results of auditing Windows web servers that are not using secure communication protocols
  (TLS 1.1 or TLS 1.2). For more information on Guest Configuration policies, please visit https://aka.ms/gcpol
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.deprecated_show_audit_results_from_windows_web_servers_that_are_not_using_secure
effect: auditIfNotExists
resource_type: Microsoft.Compute/virtualMachines
