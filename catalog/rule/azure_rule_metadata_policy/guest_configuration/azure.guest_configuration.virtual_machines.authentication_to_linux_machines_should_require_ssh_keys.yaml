rule_id: azure.guest_configuration.virtual_machines.authentication_to_linux_machines_should_require_ssh_keys
service: guest_configuration
resource: virtual_machines
title: Authentication to Linux machines should require SSH keys
description: 'Although SSH itself provides an encrypted connection, using passwords
  with SSH still leaves the VM vulnerable to brute-force attacks. The most secure
  option for authenticating to an Azure Linux virtual machine over SSH is with a public-private
  key pair, also known as SSH keys. Learn more: https://docs.microsoft.com/azure/virtual-machines/linux/create-ssh-keys-detailed.'
domain: configuration_and_change_management
severity: medium
scope: guest_configuration.virtual_machines
assertion_id: guest_configuration.authentication_to_linux_machines_should_require_ssh_keys
effect: AuditIfNotExists
resource_type: Microsoft.Compute/virtualMachines
policy_id: 630c64f9-8b6b-4c64-b511-6544ceff6fd6
source: azure_policy_builtin
mitre_techniques:
- T1110
mitre_tactics:
- credential-access
threat_tags:
- brute-force
threat_category: credential_access
