rule_id: azure.guest_configuration.virtual_machines.deprecated_deploy_prerequisites_to_audit_windows_vms_configurations_in_system_au
service: guest_configuration
resource: virtual_machines
title: '[Deprecated]: Deploy prerequisites to audit Windows VMs configurations in ''System Audit Policies - System'''
description: 'This policy creates a Guest Configuration assignment to audit Windows virtual machines with non-compliant settings
  in Group Policy category: ''System Audit Policies - System''. It also creates a system-assigned managed identity and deploys
  the VM extension for Guest Configuration. This policy should only be used along with its corresponding audit policy in an
  initiative. For more information on Guest Configuration policies, please visit https://aka.ms/gcpol'
