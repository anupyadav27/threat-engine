rule_id: azure.guest_configuration.virtual_machines.windows_machines_should_meet_requirements_for_security_options_microsoft_network
service: guest_configuration
resource: virtual_machines
title: Windows machines should meet requirements for 'Security Options - Microsoft Network Server'
description: Windows machines should have the specified Group Policy settings in the category 'Security Options - Microsoft
  Network Server' for disabling SMB v1 server. This policy requires that the Guest Configuration prerequisites have been deployed
  to the policy assignment scope. For details, visit https://aka.ms/gcpol.
