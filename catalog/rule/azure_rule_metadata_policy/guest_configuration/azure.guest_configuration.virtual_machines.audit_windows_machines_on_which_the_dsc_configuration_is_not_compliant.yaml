rule_id: azure.guest_configuration.virtual_machines.audit_windows_machines_on_which_the_dsc_configuration_is_not_compliant
service: guest_configuration
resource: virtual_machines
title: Audit Windows machines on which the DSC configuration is not compliant
description: Requires that prerequisites are deployed to the policy assignment scope.
  For details, visit https://aka.ms/gcpol. Machines are non-compliant if the Windows
  PowerShell command Get-DSCConfigurationStatus returns that the DSC configuration
  for the machine is not compliant.
