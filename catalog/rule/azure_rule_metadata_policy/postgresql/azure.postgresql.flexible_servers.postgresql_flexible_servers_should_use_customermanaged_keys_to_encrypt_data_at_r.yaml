rule_id: azure.postgresql.flexible_servers.postgresql_flexible_servers_should_use_customermanaged_keys_to_encrypt_data_at_r
service: postgresql
resource: flexible_servers
title: PostgreSQL flexible servers should use customer-managed keys to encrypt data
  at rest
description: Use customer-managed keys to manage the encryption at rest of your PostgreSQL
  flexible servers. By default, the data is encrypted at rest with service-managed
  keys, but customer-managed keys are commonly required to meet regulatory compliance
  standards. Customer-managed keys enable the data to be encrypted with an Azure Key
  Vault key created and owned by you. You have full control and responsibility for
  the key lifecycle, including rotation and management.
domain: storage_and_database_security
severity: medium
scope: postgresql.flexible_servers
