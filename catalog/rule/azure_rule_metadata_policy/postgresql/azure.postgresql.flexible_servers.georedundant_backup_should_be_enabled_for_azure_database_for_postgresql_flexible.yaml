rule_id: azure.postgresql.flexible_servers.georedundant_backup_should_be_enabled_for_azure_database_for_postgresql_flexible
service: postgresql
resource: flexible_servers
title: Geo-redundant backup should be enabled for Azure Database for PostgreSQL flexible servers
description: Azure Database for PostgreSQL flexible servers allows you to choose the redundancy option for your database server.
  It can be set to a geo-redundant backup storage in which the data is not only stored within the region in which your server
  is hosted, but is also replicated to a paired region to provide recovery option in case of a region failure. Configuring
  geo-redundant storage for backup is only allowed during server create.
domain: storage_and_database_security
severity: medium
scope: postgresql.flexible_servers
