rule_id: azure.health_bot.health_bots.azure_health_bots_should_use_azure_rbac_as_their_access_control_method
service: health_bot
resource: health_bots
title: Azure Health Bots should use Azure RBAC as their access control method
description: Have a more precise and robust control over access control for your healthcare
  agents, by setting Azure RBAC as your access control method. Roles are assigned
  through the Access Control blade in your resource page, groups can be leveraged
  to share permissions, and custom roles can be authored to cater for specific use
  cases. Learn more at https://docs.microsoft.com/azure/health-bot/cmk
