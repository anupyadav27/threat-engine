rule_id: azure.health_bot.health_bots.azure_health_bots_should_use_customermanaged_keys_to_encrypt_data_at_rest
service: health_bot
resource: health_bots
title: Azure Health Bots should use customer-managed keys to encrypt data at rest
description: Use customer-managed keys (CMK) to manage the encryption at rest of the data of your healthbots. By default,
  the data is encrypted at rest with service-managed keys, but CMK are commonly required to meet regulatory compliance standards.
  CMK enable the data to be encrypted with an Azure Key Vault key created and owned by you. You have full control and responsibility
  for the key lifecycle, including rotation and management. Learn more at https://docs.microsoft.com/azure/health-bot/cmk
domain: application_and_api_security
severity: medium
scope: health_bot.health_bots
assertion_id: health_bot.azure_health_bots_should_use_customermanaged_keys_to_encrypt_data_at_rest
effect: Audit
resource_type: Microsoft.HealthBot/healthBots
