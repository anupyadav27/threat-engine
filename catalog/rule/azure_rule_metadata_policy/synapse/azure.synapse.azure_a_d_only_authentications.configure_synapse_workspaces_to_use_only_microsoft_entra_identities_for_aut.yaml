rule_id: azure.synapse.azure_a_d_only_authentications.configure_synapse_workspaces_to_use_only_microsoft_entra_identities_for_authenti
service: synapse
resource: azure_a_d_only_authentications
title: Configure Synapse Workspaces to use only Microsoft Entra identities for authentication
description: 'Require and reconfigure Synapse Workspaces to use Microsoft Entra-only authentication. This policy doesn''t
  block workspaces from being created with local authentication enabled. It does block local authentication from being enabled
  and re-enables Microsoft Entra-only authentication on resources after create. Consider using the ''Microsoft Entra-only
  authentication'' initiative instead to require both. Learn more at: https://aka.ms/Synapse.'
domain: storage_and_database_security
severity: medium
