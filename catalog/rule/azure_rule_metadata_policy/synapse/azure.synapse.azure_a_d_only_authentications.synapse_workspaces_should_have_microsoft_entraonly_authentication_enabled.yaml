rule_id: azure.synapse.azure_a_d_only_authentications.synapse_workspaces_should_have_microsoft_entraonly_authentication_enabled
service: synapse
resource: azure_a_d_only_authentications
title: Synapse Workspaces should have Microsoft Entra-only authentication enabled
description: 'Require Synapse Workspaces to use Microsoft Entra-only authentication. This policy doesn''t block workspaces
  from being created with local authentication enabled. It does block local authentication from being enabled on resources
  after create. Consider using the ''Microsoft Entra-only authentication'' initiative instead to require both. Learn more
  at: https://aka.ms/Synapse.'
domain: storage_and_database_security
severity: medium
scope: synapse.azure_a_d_only_authentications
