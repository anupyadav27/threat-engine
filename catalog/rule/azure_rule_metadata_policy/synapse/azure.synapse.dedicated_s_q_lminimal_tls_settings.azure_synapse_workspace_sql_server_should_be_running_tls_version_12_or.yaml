rule_id: azure.synapse.dedicated_s_q_lminimal_tls_settings.azure_synapse_workspace_sql_server_should_be_running_tls_version_12_or_newer
service: synapse
resource: dedicated_s_q_lminimal_tls_settings
title: Azure Synapse Workspace SQL Server should be running TLS version 1.2 or newer
description: Setting TLS version to 1.2 or newer improves security by ensuring your
  Azure Synapse workspace SQL server can only be accessed from clients using TLS 1.2
  or newer. Using versions of TLS less than 1.2 is not recommended since they have
  well documented security vulnerabilities.
