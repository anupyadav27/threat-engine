rule_id: azure.container_registry.registries.configure_container_registries_to_disable_arm_audience_token_authentication
service: container_registry
resource: registries
title: Configure container registries to disable ARM audience token authentication.
description: 'Disable Azure Active Directory ARM audience tokens for authentication
  to your registry. Only Azure Container Registry (ACR) audience tokens will be used
  for authentication. This will ensure only tokens meant for usage on the registry
  can be used for authentication. Disabling ARM audience tokens does not affect admin
  user''s or scoped access tokens'' authentication. Learn more at: https://aka.ms/acr/authentication.'
domain: container_and_kubernetes_security
severity: high
scope: container_registry.registries
assertion_id: container_registry.configure_container_registries_to_disable_arm_audience_token_authentication
effect: Modify
resource_type: Microsoft.ContainerRegistry/registries
