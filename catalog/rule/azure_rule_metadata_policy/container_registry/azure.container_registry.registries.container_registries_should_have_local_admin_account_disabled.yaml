rule_id: azure.container_registry.registries.container_registries_should_have_local_admin_account_disabled
service: container_registry
resource: registries
title: Container registries should have local admin account disabled.
description: 'Disable admin account for your registry so that it is not accessible by local admin. Disabling local authentication
  methods like admin user, repository scoped access tokens and anonymous pull improves security by ensuring that container
  registries exclusively require Azure Active Directory identities for authentication. Learn more at: https://aka.ms/acr/authentication.'
domain: container_and_kubernetes_security
severity: high
scope: container_registry.registries
assertion_id: container_registry.container_registries_should_have_local_admin_account_disabled
effect: Audit
resource_type: Microsoft.ContainerRegistry/registries
policy_id: dc921057-6b28-4fbe-9b83-f7bec05db6c2
source: azure_policy_builtin
