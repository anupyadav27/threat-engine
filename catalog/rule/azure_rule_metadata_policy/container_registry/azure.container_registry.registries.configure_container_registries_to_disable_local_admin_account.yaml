rule_id: azure.container_registry.registries.configure_container_registries_to_disable_local_admin_account
service: container_registry
resource: registries
title: Configure container registries to disable local admin account.
description: 'Disable admin account for your registry so that it is not accessible
  by local admin. Disabling local authentication methods like admin user, repository
  scoped access tokens and anonymous pull improves security by ensuring that container
  registries exclusively require Azure Active Directory identities for authentication.
  Learn more at: https://aka.ms/acr/authentication.'
domain: container_and_kubernetes_security
severity: high
scope: container_registry.registries
assertion_id: container_registry.configure_container_registries_to_disable_local_admin_account
effect: Modify
resource_type: Microsoft.ContainerRegistry/registries
policy_id: 79fdfe03-ffcb-4e55-b4d0-b925b8241759
source: azure_policy_builtin
mitre_techniques:
