rule_id: azure.container_registry.registries.container_registries_should_have_anonymous_authentication_disabled
service: container_registry
resource: registries
title: Container registries should have anonymous authentication disabled.
description: 'Disable anonymous pull for your registry so that data is not accessible
  by unauthenticated user. Disabling local authentication methods like admin user,
  repository scoped access tokens and anonymous pull improves security by ensuring
  that container registries exclusively require Azure Active Directory identities
  for authentication. Learn more at: https://aka.ms/acr/authentication.'
domain: container_and_kubernetes_security
severity: high
scope: container_registry.registries
assertion_id: container_registry.container_registries_should_have_anonymous_authentication_disabled
effect: Audit
resource_type: Microsoft.ContainerRegistry/registries
