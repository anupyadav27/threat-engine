rule_id: azure.container_registry.registries.container_registries_should_have_skus_that_support_private_links
service: container_registry
resource: registries
title: Container registries should have SKUs that support Private Links
description: 'Azure Private Link lets you connect your virtual network to Azure services
  without a public IP address at the source or destination. The private link platform
  handles the connectivity between the consumer and services over the Azure backbone
  network. By mapping private endpoints to your container registries instead of the
  entire service, data leakage risks are reduced. Learn more at: https://aka.ms/acr/private-link.'
domain: container_and_kubernetes_security
severity: high
scope: container_registry.registries
assertion_id: container_registry.container_registries_should_have_skus_that_support_private_links
effect: Audit
