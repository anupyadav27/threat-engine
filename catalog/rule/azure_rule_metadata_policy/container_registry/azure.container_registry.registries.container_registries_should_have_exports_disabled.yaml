rule_id: azure.container_registry.registries.container_registries_should_have_exports_disabled
service: container_registry
resource: registries
title: Container registries should have exports disabled
description: 'Disabling exports improves security by ensuring data in a registry is accessed solely via the dataplane (''docker
  pull''). Data cannot be moved out of the registry via ''acr import'' or via ''acr transfer''. In order to disable exports,
  public network access must be disabled. Learn more at: https://aka.ms/acr/export-policy.'
domain: container_and_kubernetes_security
severity: high
scope: container_registry.registries
assertion_id: container_registry.container_registries_should_have_exports_disabled
effect: Audit
resource_type: Microsoft.ContainerRegistry/registries
policy_id: 524b0254-c285-4903-bee6-bb8126cde579
source: azure_policy_builtin
