rule_id: azure.container_registry.registries.configure_container_registries_to_disable_anonymous_authentication
service: container_registry
resource: registries
title: Configure container registries to disable anonymous authentication.
description: 'Disable anonymous pull for your registry so that data not accessible by unauthenticated user. Disabling local
  authentication methods like admin user, repository scoped access tokens and anonymous pull improves security by ensuring
  that container registries exclusively require Azure Active Directory identities for authentication. Learn more at: https://aka.ms/acr/authentication.'
domain: container_and_kubernetes_security
severity: high
scope: container_registry.registries
assertion_id: container_registry.configure_container_registries_to_disable_anonymous_authentication
effect: Modify
resource_type: Microsoft.ContainerRegistry/registries
policy_id: cced2946-b08a-44fe-9fd9-e4ed8a779897
source: azure_policy_builtin
