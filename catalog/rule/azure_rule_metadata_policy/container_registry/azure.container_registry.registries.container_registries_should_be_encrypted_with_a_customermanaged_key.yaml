rule_id: azure.container_registry.registries.container_registries_should_be_encrypted_with_a_customermanaged_key
service: container_registry
resource: registries
title: Container registries should be encrypted with a customer-managed key
description: Use customer-managed keys to manage the encryption at rest of the contents of your registries. By default, the
  data is encrypted at rest with service-managed keys, but customer-managed keys are commonly required to meet regulatory
  compliance standards. Customer-managed keys enable the data to be encrypted with an Azure Key Vault key created and owned
  by you. You have full control and responsibility for the key lifecycle, including rotation and management. Learn more at
  https://aka.ms/acr/CMK.
domain: container_and_kubernetes_security
severity: high
scope: container_registry.registries
assertion_id: container_registry.container_registries_should_be_encrypted_with_a_customermanaged_key
effect: Audit
resource_type: Microsoft.ContainerRegistry/registries
policy_id: 5b9159ae-1701-4a6f-9a7a-aa9c8ddd0580
source: azure_policy_builtin
