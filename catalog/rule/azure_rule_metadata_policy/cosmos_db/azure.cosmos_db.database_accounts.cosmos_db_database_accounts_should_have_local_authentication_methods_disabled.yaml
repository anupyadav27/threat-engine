title: Cosmos DB database accounts should have local authentication methods disabled
description: 'Disabling local authentication methods improves security by ensuring
  that Cosmos DB database accounts exclusively require Azure Active Directory identities
  for authentication. Learn more at: https://docs.microsoft.com/azure/cosmos-db/how-to-setup-rbac#disable-local-auth.'
