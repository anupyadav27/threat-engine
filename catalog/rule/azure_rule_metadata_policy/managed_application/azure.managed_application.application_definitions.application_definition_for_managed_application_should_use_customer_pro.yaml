rule_id: azure.managed_application.application_definitions.application_definition_for_managed_application_should_use_customer_provided_stor
service: managed_application
resource: application_definitions
title: Application definition for Managed Application should use customer provided storage account
description: Use your own storage account to control the application definition data when this is a regulatory or compliance
  requirement. You can choose to store your managed application definition within a storage account provided by you during
  creation, so that its location and access can be fully managed by you to fulfill regulatory compliance requirements.
domain: configuration_and_change_management
severity: medium
