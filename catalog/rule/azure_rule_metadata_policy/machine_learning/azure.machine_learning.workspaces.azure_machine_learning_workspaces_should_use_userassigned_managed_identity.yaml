rule_id: azure.machine_learning.workspaces.azure_machine_learning_workspaces_should_use_userassigned_managed_identity
service: machine_learning
resource: workspaces
title: Azure Machine Learning workspaces should use user-assigned managed identity
description: Manange access to Azure ML workspace and associated resources, Azure Container Registry, KeyVault, Storage, and
  App Insights using user-assigned managed identity. By default, system-assigned managed identity is used by Azure ML workspace
  to access the associated resources. User-assigned managed identity allows you to create the identity as an Azure resource
  and maintain the life cycle of that identity. Learn more at https://docs.microsoft.com/azure/machine-learning/how-to-use-managed-identities?tabs=python.
domain: ai_ml_and_model_security
severity: medium
scope: machine_learning.workspaces
assertion_id: machine_learning.azure_machine_learning_workspaces_should_use_userassigned_managed_identity
effect: Audit
resource_type: Microsoft.MachineLearningServices/workspaces
