rule_id: azure.machine_learning.workspaces.azure_machine_learning_workspaces_should_be_encrypted_with_a_customermanaged_key
service: machine_learning
resource: workspaces
title: Azure Machine Learning workspaces should be encrypted with a customer-managed key
description: Manage encryption at rest of Azure Machine Learning workspace data with customer-managed keys. By default, customer
  data is encrypted with service-managed keys, but customer-managed keys are commonly required to meet regulatory compliance
  standards. Customer-managed keys enable the data to be encrypted with an Azure Key Vault key created and owned by you. You
  have full control and responsibility for the key lifecycle, including rotation and management. Learn more at https://aka.ms/azureml-workspaces-cmk.
domain: ai_ml_and_model_security
severity: medium
scope: machine_learning.workspaces
assertion_id: machine_learning.azure_machine_learning_workspaces_should_be_encrypted_with_a_customermanaged_key
effect: Audit
resource_type: Microsoft.MachineLearningServices/workspaces
