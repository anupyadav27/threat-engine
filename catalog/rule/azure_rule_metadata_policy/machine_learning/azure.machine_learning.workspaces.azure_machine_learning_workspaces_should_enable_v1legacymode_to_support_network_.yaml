rule_id: azure.machine_learning.workspaces.azure_machine_learning_workspaces_should_enable_v1legacymode_to_support_network_
service: machine_learning
resource: workspaces
title: Azure Machine Learning workspaces should enable V1LegacyMode to support network isolation backward compatibility
description: 'Azure ML is making a transition to a new V2 API platform on Azure Resource Manager and you can control API platform
  version using V1LegacyMode parameter. Enabling the V1LegacyMode parameter will enable you to keep your workspaces in the
  same network isolation as V1, though you won''t have use of the new V2 features. We recommend turning on V1 Legacy Mode
  only when you  want to keep the AzureML control plane data inside your private networks. Learn more at: https://aka.ms/V1LegacyMode.'
domain: ai_ml_and_model_security
severity: medium
scope: machine_learning.workspaces
