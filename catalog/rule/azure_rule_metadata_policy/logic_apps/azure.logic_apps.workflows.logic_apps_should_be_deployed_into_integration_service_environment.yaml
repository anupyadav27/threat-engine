rule_id: azure.logic_apps.workflows.logic_apps_should_be_deployed_into_integration_service_environment
service: logic_apps
resource: workflows
title: Logic Apps should be deployed into Integration Service Environment
description: 'Deploying Logic Apps into Integration Service Environment in a virtual
  network unlocks advanced Logic Apps networking and security features and provides
  you with greater control over your network configuration. Learn more at: https://aka.ms/integration-service-environment.
  Deploying into Integration Service Environment also allows encryption with customer-managed
  keys which provides enhanced data protection by allowing you to manage your encryption
  keys. This is often to meet compliance requirements.'
