rule_id: azure.logic_apps.integration_service_environments.logic_apps_integration_service_environment_should_be_encrypted_with_customermana
service: logic_apps
resource: integration_service_environments
title: Logic Apps Integration Service Environment should be encrypted with customer-managed keys
description: Deploy into Integration Service Environment to manage encryption at rest of Logic Apps data using customer-managed
  keys. By default, customer data is encrypted with service-managed keys, but customer-managed keys are commonly required
  to meet regulatory compliance standards. Customer-managed keys enable the data to be encrypted with an Azure Key Vault key
  created and owned by you. You have full control and responsibility for the key lifecycle, including rotation and management.
domain: application_and_api_security
severity: medium
scope: logic_apps.integration_service_environments
assertion_id: logic_apps.logic_apps_integration_service_environment_should_be_encrypted_with_customermana
effect: Audit
resource_type: Microsoft.Logic/integrationServiceEnvironments
