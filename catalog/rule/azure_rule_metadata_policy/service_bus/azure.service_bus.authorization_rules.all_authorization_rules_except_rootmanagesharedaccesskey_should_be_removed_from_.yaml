rule_id: azure.service_bus.authorization_rules.all_authorization_rules_except_rootmanagesharedaccesskey_should_be_removed_from_
service: service_bus
resource: authorization_rules
title: All authorization rules except RootManageSharedAccessKey should be removed from Service Bus namespace
description: Service Bus clients should not use a namespace level access policy that provides access to all queues and topics
  in a namespace. To align with the least privilege security model, you should create access policies at the entity level
  for queues and topics to provide access to only the specific entity
domain: configuration_and_change_management
severity: medium
scope: service_bus.authorization_rules
assertion_id: service_bus.all_authorization_rules_except_rootmanagesharedaccesskey_should_be_removed_from_
effect: Audit
