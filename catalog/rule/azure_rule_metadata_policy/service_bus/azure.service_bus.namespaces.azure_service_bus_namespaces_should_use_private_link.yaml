rule_id: azure.service_bus.namespaces.azure_service_bus_namespaces_should_use_private_link
service: service_bus
resource: namespaces
title: Azure Service Bus namespaces should use private link
description: 'Azure Private Link lets you connect your virtual network to Azure services without a public IP address at the
  source or destination. The Private Link platform handles the connectivity between the consumer and services over the Azure
  backbone network. By mapping private endpoints to Service Bus namespaces, data leakage risks are reduced. Learn more at:
  https://docs.microsoft.com/azure/service-bus-messaging/private-link-service.'
domain: configuration_and_change_management
severity: medium
scope: service_bus.namespaces
assertion_id: service_bus.azure_service_bus_namespaces_should_use_private_link
effect: AuditIfNotExists
resource_type: Microsoft.ServiceBus/namespaces
