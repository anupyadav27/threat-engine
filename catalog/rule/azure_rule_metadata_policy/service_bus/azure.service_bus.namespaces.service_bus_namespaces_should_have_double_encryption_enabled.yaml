rule_id: azure.service_bus.namespaces.service_bus_namespaces_should_have_double_encryption_enabled
service: service_bus
resource: namespaces
title: Service Bus namespaces should have double encryption enabled
description: Enabling double encryption helps protect and safeguard your data to meet
  your organizational security and compliance commitments. When double encryption
  has been enabled, data in the storage account is encrypted twice, once at the service
  level and once at the infrastructure level, using two different encryption algorithms
  and two different keys.
