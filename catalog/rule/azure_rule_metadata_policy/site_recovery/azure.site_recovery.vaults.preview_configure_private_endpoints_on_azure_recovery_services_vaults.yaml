rule_id: azure.site_recovery.vaults.preview_configure_private_endpoints_on_azure_recovery_services_vaults
service: site_recovery
resource: vaults
title: '[Preview]: Configure private endpoints on Azure Recovery Services vaults'
description: 'Private endpoints connect your virtual network to Azure services without
  a public IP address at the source or destination. By mapping private endpoints to
  your site recovery resources of Recovery Services vaults, you can reduce data leakage
  risks. To use private links, managed service identity must be assigned to Recovery
  Services Vaults. Learn more about private links at: https://docs.microsoft.com/azure/site-recovery/azure-to-azure-how-to-enable-replication-private-endpoints.'
domain: resilience_and_disaster_recovery
severity: medium
scope: site_recovery.vaults
assertion_id: site_recovery.preview_configure_private_endpoints_on_azure_recovery_services_vaults
effect: DeployIfNotExists
resource_type: Microsoft.RecoveryServices/vaults
