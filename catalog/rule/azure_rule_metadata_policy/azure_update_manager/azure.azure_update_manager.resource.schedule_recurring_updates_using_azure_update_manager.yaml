rule_id: azure.azure_update_manager.resource.schedule_recurring_updates_using_azure_update_manager
service: azure_update_manager
resource: resource
title: Schedule recurring updates using Azure Update Manager
description: 'You can use Azure Update Manager in Azure to save recurring deployment
  schedules to install operating system updates for your Windows Server and Linux
  machines in Azure, in on-premises environments, and in other cloud environments
  connected using Azure Arc-enabled servers. This policy will also change the patch
  mode for the Azure Virtual Machine to ''AutomaticByPlatform''. See more: https://aka.ms/umc-scheduled-patching'
