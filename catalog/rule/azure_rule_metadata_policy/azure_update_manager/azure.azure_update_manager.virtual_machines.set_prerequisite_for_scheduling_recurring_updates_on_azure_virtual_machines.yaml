rule_id: azure.azure_update_manager.virtual_machines.set_prerequisite_for_scheduling_recurring_updates_on_azure_virtual_machines
service: azure_update_manager
resource: virtual_machines
title: Set prerequisite for Scheduling recurring updates on Azure virtual machines.
description: This policy will set the prerequisite needed to schedule recurring updates
  on Azure Update Manager by configuring patch orchestration to 'Customer Managed
  Schedules'. This change will automatically set the patch mode to 'AutomaticByPlatform'
  and enables 'BypassPlatformSafetyChecksOnUserSchedule' to 'True' on Azure VMs. The
  prerequisite is not applicable for Arc-enabled servers. Learn more - https://learn.microsoft.com/en-us/azure/update-manager/dynamic-scope-overview?tabs=avms#prerequisites
domain: configuration_and_change_management
severity: medium
scope: azure_update_manager.virtual_machines
assertion_id: azure_update_manager.set_prerequisite_for_scheduling_recurring_updates_on_azure_virtual_machines
effect: DeployIfNotExists
resource_type: Microsoft.Compute/virtualMachines
