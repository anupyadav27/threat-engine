title: Configure periodic checking for missing system updates on azure virtual machines
description: 'Configure auto-assessment (every 24 hours) for OS updates on native
  Azure virtual machines. You can control the scope of assignment according to machine
  subscription, resource group, location or tag. Learn more about this for Windows:
  https://aka.ms/computevm-windowspatchassessmentmode, for Linux: https://aka.ms/computevm-linuxpatchassessmentmode.'
