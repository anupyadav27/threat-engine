rule_id: azure.automatic_update.virtual_machine_scale_sets.preview_virtual_machine_scale_sets_with_more_than_2_availability_zones_should_ha
service: automatic_update
resource: virtual_machine_scale_sets
title: '[Preview]: Virtual Machine Scale Sets with more than 2 availability zones
  should have automatic AZ rebalancing enabled'
description: This policy enables automatic AZ rebalancing for Virtual Machine Scale
  Sets that are otherwise zone resilient. Automatic zone rebalancing helps to ensure
  that your Virtual Machine Scale Sets are evenly distributed across the zones in
  the region.
