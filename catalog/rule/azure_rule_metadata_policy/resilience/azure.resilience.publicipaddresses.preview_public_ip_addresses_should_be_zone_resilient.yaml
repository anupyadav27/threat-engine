rule_id: azure.resilience.publicipaddresses.preview_public_ip_addresses_should_be_zone_resilient
service: resilience
resource: publicipaddresses
title: '[Preview]: Public IP addresses should be Zone Resilient'
description: Public IP addresses can be configured to be either Zone Aligned, Zone
  Redundant, or neither. Public IP addresses that are regional, with exactly one entry
  in their zones array are considered Zone Aligned. In contrast, Public IP addresses
  that are regional, with 3 or more entries in their zones array are recognized as
  Zone Redundant. This policy helps identify and enforce these resilience configurations.
domain: resilience_and_disaster_recovery
severity: medium
