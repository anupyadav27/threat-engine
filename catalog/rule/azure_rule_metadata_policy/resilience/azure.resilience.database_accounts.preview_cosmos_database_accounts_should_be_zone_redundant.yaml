rule_id: azure.resilience.database_accounts.preview_cosmos_database_accounts_should_be_zone_redundant
service: resilience
resource: database_accounts
title: '[Preview]: Cosmos Database Accounts should be Zone Redundant'
description: Cosmos Database Accounts can be configured to be Zone Redundant or not.
  If the 'enableMultipleWriteLocations' is set to 'true' then all locations must have
  a 'isZoneRedundant' property and it must be set to 'true'. If the 'enableMultipleWriteLocations'
  is set to 'false' then the primary location ('failoverPriority' set to 0) must have
  a 'isZoneRedundant' property and it must be set to 'true'. Enforcing this policy
  ensures Cosmos Database Accounts are appropriately configured for zone redundancy.
domain: resilience_and_disaster_recovery
severity: medium
scope: resilience.database_accounts
assertion_id: resilience.preview_cosmos_database_accounts_should_be_zone_redundant
effect: Audit
resource_type: Microsoft.DocumentDB/databaseAccounts
