rule_id: azure.resilience.flexible_servers.preview_azure_database_for_postgresql_flexible_server_should_be_zone_resilient
service: resilience
resource: flexible_servers
title: '[Preview]: Azure Database for PostgreSQL Flexible Server should be Zone Resilient'
description: Azure Database for PostgreSQL Flexible Server can be configured to be either Zone Aligned, Zone Redundant, or
  neither. PostgreSQL Server that has a standby server selected in same zone for high availability is considered Zone Aligned.
  In contrast, PostgreSQL Server that has a standby server selected to be in a different zone for high availability is recognized
  as Zone Redundant. This policy helps identify and enforce these resilience configurations.
domain: resilience_and_disaster_recovery
severity: medium
scope: resilience.flexible_servers
assertion_id: resilience.preview_azure_database_for_postgresql_flexible_server_should_be_zone_resilient
effect: Audit
resource_type: Microsoft.DBForPostgreSql/flexibleServers
policy_id: 493c215d-2553-4976-bc81-57d2c04fc8c1
source: azure_policy_builtin
