rule_id: azure.resilience.virtual_network_gateways.preview_virtual_network_gateways_should_be_zone_redundant
service: resilience
resource: virtual_network_gateways
title: '[Preview]: Virtual network gateways should be Zone Redundant'
description: Virtual network gateways can be configured to be Zone Redundant or not.
  Virtual network gateways whose SKU name or tier does not end with 'AZ' are not Zone
  Redundant. This policy identifies Virtual network gateways lacking the redundancy
  needed to withstand a zone outage.
