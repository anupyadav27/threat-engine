rule_id: azure.resilience.disks.preview_managed_disks_should_be_zone_resilient
service: resilience
resource: disks
title: '[Preview]: Managed Disks should be Zone Resilient'
description: Managed Disks can be configured to be either Zone Aligned, Zone Redundant,
  or neither. Managed Disks with exactly one zone assignment are Zone Aligned. Managed
  Disks with a sku name that ends in ZRS are Zone Redundant. This policy assists in
  identifying and enforcing these resilience configurations for Managed Disks.
domain: resilience_and_disaster_recovery
severity: medium
scope: resilience.disks
