title: '[Preview]: Azure AI Search Service should be Zone Redundant'
description: Azure AI Search Service can be configured to be Zone Redundant or not.
  Availability zones are used when you add two or more replicas to your search service.
  Each replica is placed in a different availability zone within the region.
