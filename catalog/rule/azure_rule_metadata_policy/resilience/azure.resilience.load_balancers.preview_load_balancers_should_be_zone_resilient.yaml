title: '[Preview]: Load Balancers should be Zone Resilient'
description: Load Balancers with a sku other than Basic inherit the resilience of the Public IP addresses in their frontend.
  When combined with the 'Public IP addresses should be Zone Resilient' policy, this approach ensures the necessary redundancy
  to withstand a zone outage.
