rule_id: azure.resilience.managed_environments.preview_container_app_should_be_zone_redundant
service: resilience
resource: managed_environments
title: '[Preview]: Container App should be Zone Redundant'
description: Container App can be configured to be Zone Redundant or not. A Container App is Zone Redundant if its managed
  environment's 'ZoneRedundant' property is set to true. This policy identifies Container App lacking the redundancy needed
  to withstand a zone outage.
