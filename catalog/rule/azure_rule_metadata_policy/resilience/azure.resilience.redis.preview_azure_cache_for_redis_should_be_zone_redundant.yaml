rule_id: azure.resilience.redis.preview_azure_cache_for_redis_should_be_zone_redundant
service: resilience
resource: redis
title: '[Preview]: Azure Cache for Redis should be Zone Redundant'
description: Azure Cache for Redis can be configured to be Zone Redundant or not. Azure Cache for Redis instances with fewer
  than 2 entries in their zones array or zonalAllocationPolicy is set to 'NoZones' or the sku is 'Basic' are not Zone Redundant.
  This policy identifies Azure Cache for Redis instances lacking the redundancy needed to withstand a zone outage.
domain: resilience_and_disaster_recovery
severity: medium
scope: resilience.redis
assertion_id: resilience.preview_azure_cache_for_redis_should_be_zone_redundant
effect: Audit
resource_type: Microsoft.Cache/Redis
policy_id: 1bf67da8-b100-45bf-b89d-e4669fc54411
source: azure_policy_builtin
