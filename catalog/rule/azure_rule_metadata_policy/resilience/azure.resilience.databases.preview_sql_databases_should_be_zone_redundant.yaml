rule_id: azure.resilience.databases.preview_sql_databases_should_be_zone_redundant
service: resilience
resource: databases
title: '[Preview]: SQL Databases should be Zone Redundant'
description: SQL Databases can be configured to be Zone Redundant or not. Databases
  with the 'zoneRedundant' setting set to 'false' are not configured for zone redundancy.
  This policy helps identify SQL databases that need zone redundancy configuration
  to enhance availability and resilience within Azure.
