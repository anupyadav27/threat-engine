rule_id: azure.resilience.backup_vaults.preview_backup_vaults_should_be_zone_redundant
service: resilience
resource: backup_vaults
title: '[Preview]: Backup Vaults should be Zone Redundant'
description: Backup Vaults can be configured to be Zone Redundant or not. Backup Vaults
  are Zone Redundant if it's storage settings type is set to 'ZoneRedundant' and they
  are considered to be resilient. Geo Redundant or Locally Redundant Backup Vaults
  are not considered resilient. Enforcing this policy helps ensure that Backup Vaults
  are appropriately configured for zone resilience, reducing the risk of downtime
  during zone outages.
domain: resilience_and_disaster_recovery
severity: medium
scope: resilience.backup_vaults
