rule_id: azure.resilience.service.preview_api_management_service_should_be_zone_redundant
service: resilience
resource: service
title: '[Preview]: API Management Service should be Zone Redundant'
description: API Management Service can be configured to be Zone Redundant or not. An API Management Service is Zone Redundant
  if its sku name is 'Premium' and it has at least two entries in it's zones array. This policy identifies API Management
  Services lacking the redundancy needed to withstand a zone outage.
domain: resilience_and_disaster_recovery
severity: medium
scope: resilience.service
assertion_id: resilience.preview_api_management_service_should_be_zone_redundant
effect: Audit
resource_type: Microsoft.ApiManagement/service
policy_id: 42daa904-5969-47ef-92cb-b75df946195a
source: azure_policy_builtin
