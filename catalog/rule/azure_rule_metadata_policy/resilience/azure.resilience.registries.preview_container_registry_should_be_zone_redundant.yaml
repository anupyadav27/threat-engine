rule_id: azure.resilience.registries.preview_container_registry_should_be_zone_redundant
service: resilience
resource: registries
title: '[Preview]: Container Registry should be Zone Redundant'
description: Container Registry can be configured to be Zone Redundant or not. When
  the zoneRedundancy property for a Container Registry is set to 'Disabled', it means
  the registry is not Zone Redundant. Enforcing this policy helps ensure that your
  Container Registry is appropriately configured for zone resilience, reducing the
  risk of downtime during zone outages.
domain: resilience_and_disaster_recovery
severity: medium
