rule_id: azure.resilience.vaults.preview_backup_and_site_recovery_should_be_zone_redundant
service: resilience
resource: vaults
title: '[Preview]: Backup and Site Recovery should be Zone Redundant'
description: Backup and Site Recovery can be configured to be Zone Redundant or not. Backup and Site Recovery is Zone Redundant
  if it's 'standardTierStorageRedundancy' property is set to 'ZoneRedundant'. Enforcing this policy helps ensure that Backup
  and Site Recovery is appropriately configured for zone resilience, reducing the risk of downtime during zone outages.
domain: resilience_and_disaster_recovery
severity: medium
scope: resilience.vaults
assertion_id: resilience.preview_backup_and_site_recovery_should_be_zone_redundant
effect: Audit
resource_type: Microsoft.RecoveryServices/Vaults
policy_id: ae243d87-5cf3-4dce-90bd-6d62be328de3
source: azure_policy_builtin
