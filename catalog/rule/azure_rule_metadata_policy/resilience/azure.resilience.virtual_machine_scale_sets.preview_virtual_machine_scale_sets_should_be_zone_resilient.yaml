rule_id: azure.resilience.virtual_machine_scale_sets.preview_virtual_machine_scale_sets_should_be_zone_resilient
service: resilience
resource: virtual_machine_scale_sets
title: '[Preview]: Virtual Machine Scale Sets should be Zone Resilient'
description: Virtual Machine Scale Sets can be configured to be either Zone Aligned, Zone Redundant, or neither. Virtual Machine
  Scale Sets that have exactly one entry in their zones array are considered Zone Aligned. In contrast, Virtual Machine Scale
  Sets with 3 or more entries in their zones array and a capacity of at least 3 are recognized as Zone Redundant. This policy
  helps identify and enforce these resilience configurations.
domain: resilience_and_disaster_recovery
severity: medium
scope: resilience.virtual_machine_scale_sets
assertion_id: resilience.preview_virtual_machine_scale_sets_should_be_zone_resilient
effect: Audit
resource_type: Microsoft.Compute/virtualMachineScaleSets
