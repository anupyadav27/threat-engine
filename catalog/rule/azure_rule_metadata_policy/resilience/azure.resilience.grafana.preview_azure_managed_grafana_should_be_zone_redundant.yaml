rule_id: azure.resilience.grafana.preview_azure_managed_grafana_should_be_zone_redundant
service: resilience
resource: grafana
title: '[Preview]: Azure Managed Grafana should be Zone Redundant'
description: Azure Managed Grafana can be configured to be Zone Redundant or not.
  An Azure Managed Grafana instance is Zone Redundant is it's 'zoneRedundancy' property
  is set to 'Enabled'. Enforcing this policy helps ensure that your Azure Managed
  Grafana is appropriately configured for zone resilience, reducing the risk of downtime
  during zone outages.
domain: resilience_and_disaster_recovery
severity: medium
