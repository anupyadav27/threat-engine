rule_id: azure.resilience.namespaces.preview_event_hubs_should_be_zone_redundant
service: resilience
resource: namespaces
title: '[Preview]: Event Hubs should be Zone Redundant'
description: Event Hubs can be configured to be Zone Redundant or not. Event Hubs
  are Zone Redundant if it's 'zoneRedundant' property is set to 'true'. Enforcing
  this policy helps ensure that Event Hubs are appropriately configured for zone resilience,
  reducing the risk of downtime during zone outages.
