rule_id: azure.resilience.elasticpools.preview_sql_elastic_database_pools_should_be_zone_redundant
service: resilience
resource: elasticpools
title: '[Preview]: SQL Elastic database pools should be Zone Redundant'
description: SQL Elastic database pools can be configured to be Zone Redundant or
  not. SQL Elastic database pools are Zone Redundant if it's 'zoneRedundant' property
  is set to 'true'. Enforcing this policy helps ensure that Event Hubs are appropriately
  configured for zone resilience, reducing the risk of downtime during zone outages.
