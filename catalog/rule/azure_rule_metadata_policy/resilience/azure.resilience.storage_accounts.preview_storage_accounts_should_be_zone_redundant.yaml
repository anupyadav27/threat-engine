rule_id: azure.resilience.storage_accounts.preview_storage_accounts_should_be_zone_redundant
service: resilience
resource: storage_accounts
title: '[Preview]: Storage Accounts should be Zone Redundant'
description: Storage Accounts can be configured to be Zone Redundant or not. If a Storage Account's SKU name does not end
  with 'ZRS' or its kind is 'Storage,' it is not Zone Redundant. This policy ensures that your Storage Accounts use ae Zone
  Redundant configuration.
