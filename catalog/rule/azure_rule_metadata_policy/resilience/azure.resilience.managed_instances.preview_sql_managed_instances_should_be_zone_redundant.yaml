rule_id: azure.resilience.managed_instances.preview_sql_managed_instances_should_be_zone_redundant
service: resilience
resource: managed_instances
title: '[Preview]: SQL Managed Instances should be Zone Redundant'
description: SQL Managed Instances can be configured to be Zone Redundant or not.
  Instances with the 'zoneRedundant' setting set to 'false' are not configured for
  zone redundancy. This policy helps identify SQL managedInstances that need zone
  redundancy configuration to enhance availability and resilience within Azure.
