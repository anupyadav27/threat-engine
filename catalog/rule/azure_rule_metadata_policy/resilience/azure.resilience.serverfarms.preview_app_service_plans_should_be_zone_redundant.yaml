rule_id: azure.resilience.serverfarms.preview_app_service_plans_should_be_zone_redundant
service: resilience
resource: serverfarms
title: '[Preview]: App Service Plans should be Zone Redundant'
description: App Service Plans can be configured to be Zone Redundant or not. When the 'zoneRedundant' property is set to
  'false' for an App Service Plan, it is not configured for Zone Redundancy. This policy identifies and enforces the Zone
  Redundancy configuration for App Service Plans.
