rule_id: azure.api_management.service.api_management_services_should_use_a_virtual_network
service: api_management
resource: service
title: API Management services should use a virtual network
description: Azure Virtual Network deployment provides enhanced security, isolation and allows you to place your API Management
  service in a non-internet routable network that you control access to. These networks can then be connected to your on-premises
  networks using various VPN technologies, which enables access to your backend services within the network and/or on-premises.
  The developer portal and API gateway, can be configured to be accessible either from the Internet or only within the virtual
  network.
domain: application_and_api_security
severity: medium
scope: api_management.service
assertion_id: api_management.api_management_services_should_use_a_virtual_network
effect: Audit
resource_type: Microsoft.ApiManagement/service
