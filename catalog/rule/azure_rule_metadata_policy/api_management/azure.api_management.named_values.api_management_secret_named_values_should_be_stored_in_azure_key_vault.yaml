rule_id: azure.api_management.named_values.api_management_secret_named_values_should_be_stored_in_azure_key_vault
service: api_management
resource: named_values
title: API Management secret named values should be stored in Azure Key Vault
description: Named values are a collection of name and value pairs in each API Management
  service. Secret values can be stored either as encrypted text in API Management
  (custom secrets) or by referencing secrets in Azure Key Vault. To improve security
  of API Management and secrets, reference secret named values from Azure Key Vault.
  Azure Key Vault supports granular access management and secret rotation policies.
domain: application_and_api_security
severity: medium
scope: api_management.named_values
assertion_id: api_management.api_management_secret_named_values_should_be_stored_in_azure_key_vault
effect: Audit
