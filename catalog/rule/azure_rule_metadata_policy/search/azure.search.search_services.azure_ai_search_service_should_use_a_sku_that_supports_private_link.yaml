rule_id: azure.search.search_services.azure_ai_search_service_should_use_a_sku_that_supports_private_link
service: search
resource: search_services
title: Azure AI Search service should use a SKU that supports private link
description: 'With supported SKUs of Azure AI Search, Azure Private Link lets you
  connect your virtual network to Azure services without a public IP address at the
  source or destination. The private link platform handles the connectivity between
  the consumer and services over the Azure backbone network. By mapping private endpoints
  to your Search service, data leakage risks are reduced. Learn more at: https://aka.ms/azure-cognitive-search/inbound-private-endpoints.'
domain: configuration_and_change_management
severity: medium
