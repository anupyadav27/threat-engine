rule_id: azure.search.search_services.azure_ai_search_services_should_have_local_authentication_methods_disabled
service: search
resource: search_services
title: Azure AI Search services should have local authentication methods disabled
description: 'Disabling local authentication methods improves security by ensuring that Azure AI Search services exclusively
  require Azure Active Directory identities for authentication. Learn more at: https://aka.ms/azure-cognitive-search/rbac.
  Note that while the disable local authentication parameter is still in preview, the deny effect for this policy may result
  in limited Azure AI Search portal functionality since some features of the Portal use the GA API which does not support
  the parameter.'
domain: configuration_and_change_management
severity: medium
scope: search.search_services
assertion_id: search.azure_ai_search_services_should_have_local_authentication_methods_disabled
effect: Audit
resource_type: Microsoft.Search/searchServices
policy_id: 6300012e-e9a4-4649-b41f-a85f5c43be91
source: azure_policy_builtin
