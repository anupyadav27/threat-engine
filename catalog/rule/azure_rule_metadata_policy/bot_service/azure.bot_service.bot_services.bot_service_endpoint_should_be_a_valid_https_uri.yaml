rule_id: azure.bot_service.bot_services.bot_service_endpoint_should_be_a_valid_https_uri
service: bot_service
resource: bot_services
title: Bot Service endpoint should be a valid HTTPS URI
description: 'Data can be tampered with during transmission. Protocols exist that
  provide encryption to address problems of misuse and tampering. To ensure your bots
  are communicating only over encrypted channels, set the endpoint to a valid HTTPS
  URI. This ensures the HTTPS protocol is used to encrypt your data in transit and
  is also often a requirement for compliance with regulatory or industry standards.
  Please visit: https://docs.microsoft.com/azure/bot-service/bot-builder-security-guidelines.'
domain: application_and_api_security
severity: medium
scope: bot_service.bot_services
assertion_id: bot_service.bot_service_endpoint_should_be_a_valid_https_uri
effect: Audit
resource_type: Microsoft.BotService/botServices
policy_id: 6164527b-e1ee-4882-8673-572f425f5e0a
source: azure_policy_builtin
mitre_techniques:
