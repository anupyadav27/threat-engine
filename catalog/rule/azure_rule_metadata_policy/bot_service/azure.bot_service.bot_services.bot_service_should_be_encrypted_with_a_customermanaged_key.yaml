rule_id: azure.bot_service.bot_services.bot_service_should_be_encrypted_with_a_customermanaged_key
service: bot_service
resource: bot_services
title: Bot Service should be encrypted with a customer-managed key
description: 'Azure Bot Service automatically encrypts your resource to protect your data and meet organizational security
  and compliance commitments. By default, Microsoft-managed encryption keys are used. For greater flexibility in managing
  keys or controlling access to your subscription, select customer-managed keys, also known as bring your own key (BYOK).
  Learn more about Azure Bot Service encryption: https://docs.microsoft.com/azure/bot-service/bot-service-encryption.'
domain: application_and_api_security
severity: medium
scope: bot_service.bot_services
assertion_id: bot_service.bot_service_should_be_encrypted_with_a_customermanaged_key
effect: Audit
resource_type: Microsoft.BotService/botServices
policy_id: 51522a96-0869-4791-82f3-981000c2c67f
source: azure_policy_builtin
