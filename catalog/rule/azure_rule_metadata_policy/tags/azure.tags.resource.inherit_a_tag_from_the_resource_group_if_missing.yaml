rule_id: azure.tags.resource.inherit_a_tag_from_the_resource_group_if_missing
service: tags
resource: resource
title: Inherit a tag from the resource group if missing
description: Adds the specified tag with its value from the parent resource group when any resource missing this tag is created
  or updated. Existing resources can be remediated by triggering a remediation task. If the tag exists with a different value
  it will not be changed.
domain: compliance_and_governance
severity: low
scope: tags.resource
assertion_id: tags.inherit_a_tag_from_the_resource_group_if_missing
effect: modify
