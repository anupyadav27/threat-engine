rule_id: azure.tags.resource.append_a_tag_and_its_value_from_the_resource_group
service: tags
resource: resource
title: Append a tag and its value from the resource group
description: Appends the specified tag with its value from the resource group when any resource which is missing this tag
  is created or updated. Does not modify the tags of resources created before this policy was applied until those resources
  are changed. New 'modify' effect policies are available that support remediation of tags on existing resources (see https://aka.ms/modifydoc).
domain: compliance_and_governance
severity: low
scope: tags.resource
assertion_id: tags.append_a_tag_and_its_value_from_the_resource_group
effect: append
