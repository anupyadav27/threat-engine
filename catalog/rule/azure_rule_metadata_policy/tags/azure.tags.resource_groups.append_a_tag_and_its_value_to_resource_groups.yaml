rule_id: azure.tags.resource_groups.append_a_tag_and_its_value_to_resource_groups
service: tags
resource: resource_groups
title: Append a tag and its value to resource groups
description: Appends the specified tag and value when any resource group which is missing this tag is created or updated.
  Does not modify the tags of resource groups created before this policy was applied until those resource groups are changed.
  New 'modify' effect policies are available that support remediation of tags on existing resources (see https://aka.ms/modifydoc).
domain: compliance_and_governance
severity: low
scope: tags.resource_groups
assertion_id: tags.append_a_tag_and_its_value_to_resource_groups
effect: append
resource_type: Microsoft.Resources/subscriptions/resourceGroups
policy_id: 49c88fc8-6fd1-46fd-a676-f12d1d3a4c71
source: azure_policy_builtin
