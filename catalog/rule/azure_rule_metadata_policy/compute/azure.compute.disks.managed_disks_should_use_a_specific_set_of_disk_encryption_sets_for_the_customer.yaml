rule_id: azure.compute.disks.managed_disks_should_use_a_specific_set_of_disk_encryption_sets_for_the_customer
service: compute
resource: disks
title: Managed disks should use a specific set of disk encryption sets for the customer-managed key encryption
description: Requiring a specific set of disk encryption sets to be used with managed disks give you control over the keys
  used for encryption at rest. You are able to select the allowed encrypted sets and all others are rejected when attached
  to a disk. Learn more at https://aka.ms/disks-cmk.
