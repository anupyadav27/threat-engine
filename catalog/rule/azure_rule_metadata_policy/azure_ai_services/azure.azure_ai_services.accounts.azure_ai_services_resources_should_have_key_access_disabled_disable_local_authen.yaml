rule_id: azure.azure_ai_services.accounts.azure_ai_services_resources_should_have_key_access_disabled_disable_local_authen
service: azure_ai_services
resource: accounts
title: Azure AI Services resources should have key access disabled (disable local
  authentication)
description: 'Key access (local authentication) is recommended to be disabled for
  security. Azure OpenAI Studio, typically used in development/testing, requires key
  access and will not function if key access is disabled. After disabling, Microsoft
  Entra ID becomes the only access method, which allows maintaining minimum privilege
  principle and granular control. Learn more at: https://aka.ms/AI/auth'
domain: ai_ml_and_model_security
severity: medium
scope: azure_ai_services.accounts
assertion_id: azure_ai_services.azure_ai_services_resources_should_have_key_access_disabled_disable_local_authen
effect: Audit
resource_type: Microsoft.CognitiveServices/accounts
