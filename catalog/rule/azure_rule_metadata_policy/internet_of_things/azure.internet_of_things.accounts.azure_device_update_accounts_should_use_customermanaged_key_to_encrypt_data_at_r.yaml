rule_id: azure.internet_of_things.accounts.azure_device_update_accounts_should_use_customermanaged_key_to_encrypt_data_at_r
service: internet_of_things
resource: accounts
title: Azure Device Update accounts should use customer-managed key to encrypt data
  at rest
description: 'Encryption of data at rest in Azure Device Update with customer-managed
  key adds a second layer of encryption on top of the default service-managed keys,
  enables customer control of keys, custom rotation policies, and ability to manage
  access to data through key access control. Learn more at:https://learn.microsoft.com/azure/iot-hub-device-update/device-update-data-encryption. '
domain: network_security_and_connectivity
severity: medium
scope: internet_of_things.accounts
