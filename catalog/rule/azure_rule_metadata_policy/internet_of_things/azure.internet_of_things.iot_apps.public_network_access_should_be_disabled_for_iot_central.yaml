rule_id: azure.internet_of_things.iot_apps.public_network_access_should_be_disabled_for_iot_central
service: internet_of_things
resource: iot_apps
title: Public network access should be disabled for IoT Central
description: To improve the security of IoT Central, ensure that it isn't exposed
  to the public internet and can only be accessed from a private endpoint. Disable
  the public network access property as described in https://aka.ms/iotcentral-restrict-public-access.
  This option disables access from any public address space outside the Azure IP range,
  and denies all logins that match IP or virtual network-based firewall rules. This
  reduces data leakage risks.
domain: network_security_and_connectivity
severity: medium
scope: internet_of_things.iot_apps
