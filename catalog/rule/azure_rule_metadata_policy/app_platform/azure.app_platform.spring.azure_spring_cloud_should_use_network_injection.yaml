rule_id: azure.app_platform.spring.azure_spring_cloud_should_use_network_injection
service: app_platform
resource: spring
title: Azure Spring Cloud should use network injection
description: 'Azure Spring Cloud instances should use virtual network injection for the following purposes: 1. Isolate Azure
  Spring Cloud from Internet. 2. Enable Azure Spring Cloud to interact with systems in either on premises data centers or
  Azure service in other virtual networks. 3. Empower customers to control inbound and outbound network communications for
  Azure Spring Cloud.'
domain: application_and_api_security
severity: medium
scope: app_platform.spring
assertion_id: app_platform.azure_spring_cloud_should_use_network_injection
effect: Audit
