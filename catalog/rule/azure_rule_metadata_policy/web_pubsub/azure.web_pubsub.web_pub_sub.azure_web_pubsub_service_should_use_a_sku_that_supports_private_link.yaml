rule_id: azure.web_pubsub.web_pub_sub.azure_web_pubsub_service_should_use_a_sku_that_supports_private_link
service: web_pubsub
resource: web_pub_sub
title: Azure Web PubSub Service should use a SKU that supports private link
description: 'With supported SKU, Azure Private Link lets you connect your virtual
  network to Azure services without a public IP address at the source or destination.
  The Private Link platform handles the connectivity between the consumer and services
  over the Azure backbone network. By mapping private endpoints to Azure Web PubSub
  service, you can reduce data leakage risks. Learn more about private links at: https://aka.ms/awps/privatelink.'
