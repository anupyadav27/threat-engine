rule_id: azure.healthcare_apis.fhirservices.fhir_service_should_use_a_customermanaged_key_to_encrypt_data_at_rest
service: healthcare_apis
resource: fhirservices
title: FHIR Service should use a customer-managed key to encrypt data at rest
description: Use a customer-managed key to control the encryption at rest of the data
  stored in Azure Health Data Services FHIR Service when this is a regulatory or compliance
  requirement. Customer-managed keys also deliver double encryption by adding a second
  layer of encryption on top of the default one done with service-managed keys.
domain: application_and_api_security
severity: medium
