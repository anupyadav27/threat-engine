rule_id: azure.container_apps.container_apps.container_apps_should_only_be_accessible_over_https
service: container_apps
resource: container_apps
title: Container Apps should only be accessible over HTTPS
description: Use of HTTPS ensures server/service authentication and protects data
  in transit from network layer eavesdropping attacks. Disabling 'allowInsecure' will
  result in the automatic redirection of requests from HTTP to HTTPS connections for
  container apps.
domain: container_and_kubernetes_security
severity: medium
