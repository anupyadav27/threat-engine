rule_id: azure.container_apps.managed_environments.container_apps_environment_should_disable_public_network_access
service: container_apps
resource: managed_environments
title: Container Apps environment should disable public network access
description: Disable public network access to improve security by exposing the Container Apps environment through an internal
  load balancer. This removes the need for a public IP address and prevents internet access to all Container Apps within the
  environment.
