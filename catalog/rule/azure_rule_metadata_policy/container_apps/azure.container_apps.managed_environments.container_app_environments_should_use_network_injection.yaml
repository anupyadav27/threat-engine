rule_id: azure.container_apps.managed_environments.container_app_environments_should_use_network_injection
service: container_apps
resource: managed_environments
title: Container App environments should use network injection
description: 'Container Apps environments should use virtual network injection to: 1.Isolate Container Apps from the public
  internet 2.Enable network integration with resources on-premises or in other Azure virtual networks 3.Achieve more granular
  control over network traffic flowing to and from the environment.'
