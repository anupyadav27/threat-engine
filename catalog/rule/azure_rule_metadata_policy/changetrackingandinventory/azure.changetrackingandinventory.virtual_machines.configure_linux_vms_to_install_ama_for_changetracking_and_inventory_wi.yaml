rule_id: azure.changetrackingandinventory.virtual_machines.configure_linux_vms_to_install_ama_for_changetracking_and_inventory_with_userass
service: changetrackingandinventory
resource: virtual_machines
title: Configure Linux VMs to install AMA for ChangeTracking and Inventory with user-assigned
  managed identity
description: 'Automate the deployment of Azure Monitor Agent extension on your Linux
  virtual machines for enabling ChangeTracking and Inventory. This policy will install
  the extension and configure it to use the specified user-assigned managed identity
  if the OS and region are supported, and skip install otherwise. Learn more: https://aka.ms/AMAOverview.'
