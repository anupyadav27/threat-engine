rule_id: azure.identity.entra_audit.conditional_access_create
service: identity
provider: azure
check_type: log
severity: high
title: 'Identity: Conditional Access Create'
description: Conditional access policy created — new access rule applied to user sign-in flow.
rationale: MFA bypass or manipulation allows attackers to authenticate without the second factor, significantly reducing authentication security for targeted accounts.
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1556.006
risk_score: 70
resource: entra_conditional_access
source: default
is_active: true
domain: logging_monitoring_and_alerting
action_category: create
log_source_type: entra_audit
posture_category: security_posture
threat_tags:
- T1556.006
- T1556
- defense_evasion
- log_tampering
- cloud_iam
- conditional_access
risk_indicators:
  actor_type: user_or_service_principal
  action_type: write
  target_type: entra_id_identity
  blast_radius: tenant
  stealth_risk: critical
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 3.1
  - 3.2
  - 3.3
  - 3.4
  cis_azure_v2:
  - 5.1
  - 5.2
  - 5.3
  nist_800_53_r5:
  - AU-2
  - AU-6
  - AU-12
  - SI-4
  pci_dss_v4:
  - 10.1
  - 10.2
  - 10.3
  iso_27001_2022:
  - A.8.15
  - A.8.16
  - A.5.28
remediation: |
  1. Investigate and revert MFA method changes for all affected accounts.
  2. Force re-enrollment of MFA for affected accounts.
  3. Enable Conditional Access policies requiring phishing-resistant MFA (FIDO2).
  4. Alert on all MFA method changes, especially for privileged accounts.
references:
- https://attack.mitre.org/techniques/T1556/006/
- https://learn.microsoft.com/en-us/azure/active-directory/authentication/concept-mfa-howitworks
- https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_mfa.html
check_config:
  conditions:
    all:
    - field: operation
      op: equals
      value: microsoft.directory/conditionalAccessPolicies/create
  log_source_type: entra_audit
version: '1.0'
