rule_id: azure.identity.activity_log.managed_identity_write
service: identity
provider: azure
check_type: log
severity: medium
title: 'Identity: Managed Identity Write'
description: User-assigned managed identity created or updated — new workload identity provisioned.
rationale: OAuth token abuse allows attackers to access cloud resources as the token owner for extended periods without needing credentials, until token expiry.
threat_category: persistence
mitre_tactics:
- persistence
mitre_techniques:
- T1550.001
risk_score: 55
resource: azure_managed_identity
source: default
is_active: true
domain: identity_and_access_management
action_category: create
log_source_type: activity_log
posture_category: iam_posture
threat_tags:
- T1550.001
- T1550
- persistence
- backdoor
- cloud_iam
- conditional_access
risk_indicators:
  actor_type: user_or_service_principal
  action_type: write
  target_type: entra_id_identity
  blast_radius: tenant
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 1.1
  - 1.4
  - 1.16
  cis_azure_v2:
  - 1.1
  - 2.1
  - 2.9
  nist_800_53_r5:
  - AC-2
  - AC-6
  - IA-2
  - SC-7
  pci_dss_v4:
  - 7.1
  - 8.2
  - 10.2
  iso_27001_2022:
  - A.8.2
  - A.9.2
  - A.5.18
remediation: |
  1. Revoke the compromised application token immediately.
  2. Audit all OAuth consent grants and remove unauthorized application registrations.
  3. Enable Microsoft Entra ID risky sign-in detection.
  4. Reduce token lifetimes for high-privilege applications.
references:
- https://attack.mitre.org/techniques/T1550/001/
- https://learn.microsoft.com/en-us/azure/active-directory/develop/access-tokens
check_config:
  conditions:
    all:
    - field: operation
      op: equals
      value: Microsoft.ManagedIdentity/userAssignedIdentities/write
  log_source_type: activity_log
version: '1.0'
