rule_id: azure.identity.activity_log.managed_identity_assign
service: identity
provider: azure
check_type: log
severity: high
title: 'Identity: Managed Identity Assign'
description: Managed identity assigned to resource — resource gains access to Azure services via identity permissions.
rationale: 'Adversaries add additional roles or permissions to adversary-controlled cloud accounts to maintain persistent access to a tenant. Attackers target Global Administrator, Owner, and Contributor roles — granting full control over subscription resources without deploying remote access tools. Detected via: IAM role attachment events, privilege grant events in Entra ID/Okta, and admin role assignment in Microsoft 365.'
threat_category: privilege_escalation
mitre_tactics:
- privilege_escalation
mitre_techniques:
- T1098.003
risk_score: 72
resource: azure_managed_identity
source: default
is_active: true
domain: identity_and_access_management
action_category: create
log_source_type: activity_log
posture_category: iam_posture
threat_tags:
- T1098.003
- T1098
- cloud_iam
- privilege_escalation
- conditional_access
risk_indicators:
  actor_type: user_or_service_principal
  action_type: write
  target_type: entra_id_identity
  blast_radius: tenant
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 1.1
  - 1.16
  - 1.17
  cis_azure_v2:
  - 1.1
  - 2.1
  - 3.1
  nist_800_53_r5:
  - AC-2
  - AC-3
  - AC-6
  - IA-2
  pci_dss_v4:
  - 7.1
  - 7.2
  - 8.2
  iso_27001_2022:
  - A.5.18
  - A.8.2
  - A.8.3
detection_events:
- Microsoft.Authorization/roleAssignments/write
- 'iam:AttachUserPolicy'
- 'iam:PutRolePolicy'
- Add member to role (Entra ID audit)
remediation: |
  1. Remove the unauthorized role assignment immediately.
  2. Review all role assignments for the affected principal.
  3. Enable just-in-time privileged access using PIM / AWS IAM Identity Center.
  4. Require approval workflows for Owner/Contributor/privileged role assignments.
  5. Alert on all role assignments at subscription or tenant scope.
references:
- https://attack.mitre.org/techniques/T1098/003/
- https://learn.microsoft.com/en-us/azure/role-based-access-control/overview
- https://learn.microsoft.com/en-us/azure/active-directory/privileged-identity-management/pim-configure
check_config:
  conditions:
    all:
    - field: operation
      op: equals
      value: Microsoft.ManagedIdentity/userAssignedIdentities/assign/action
  log_source_type: activity_log
version: '1.0'
