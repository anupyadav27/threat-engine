rule_id: azure.identity.entra_audit.emergency_account_used
service: identity
provider: azure
check_type: log
severity: critical
title: 'Identity: Emergency Account Used'
description: Break-glass emergency account sign-in detected — highly privileged emergency account used outside of authorized incident.
rationale: 'Cloud account compromise enables access to all resources within the account''s permission scope. Attackers leverage valid credentials to avoid detection and pivot across cloud services.'
threat_category: initial_access
mitre_tactics:
- initial_access
mitre_techniques:
- T1078.004
risk_score: 92
resource: entra_user
source: default
is_active: true
domain: threat_detection
action_category: create
log_source_type: entra_audit
posture_category: threat_posture
threat_tags:
- T1078.004
- T1078
- cloud_iam
- conditional_access
risk_indicators:
  actor_type: user_or_service_principal
  action_type: write
  target_type: entra_id_identity
  blast_radius: tenant
  stealth_risk: medium
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 1.14
  - 2.1
  cis_azure_v2:
  - 1.2
  - 2.1
  nist_800_53_r5:
  - AC-17
  - IA-2
  - SI-3
  pci_dss_v4:
  - 8.3
  - 11.5
  iso_27001_2022:
  - A.8.5
  - A.9.4
remediation: |
  1. Immediately suspend the compromised account and revoke active sessions.
  2. Reset credentials and enforce MFA enrollment.
  3. Review all API calls and resource accesses made by the account.
  4. Investigate sign-in logs for source IP and geolocation anomalies.
  5. Enable Microsoft Entra ID Protection / AWS GuardDuty credential anomaly alerts.
references:
- https://attack.mitre.org/techniques/T1078/004/
- https://docs.aws.amazon.com/IAM/latest/UserGuide/best-practices.html
- https://learn.microsoft.com/en-us/azure/active-directory/identity-protection/overview-identity-protection
check_config:
  conditions:
    all:
    - field: operation
      op: equals
      value: microsoft.directory/signIns/breakGlassAccount/action
  log_source_type: entra_audit
version: '1.0'
