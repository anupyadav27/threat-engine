rule_id: azure.sql.activity_log.sql_tde_write
service: sql
provider: azure
check_type: log
severity: high
title: 'SQL: SQL TDE Write'
description: SQL Transparent Data Encryption settings changed — database encryption configuration modified.
rationale: Weakening encryption on cloud network communications enables interception of otherwise protected data in transit between services.
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1600
risk_score: 70
resource: azure_sql
source: default
is_active: true
domain: logging_monitoring_and_alerting
action_category: create
log_source_type: activity_log
posture_category: security_posture
threat_tags:
- T1600
- defense_evasion
- log_tampering
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: critical
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 3.1
  - 3.2
  - 3.3
  - 3.4
  cis_azure_v2:
  - 5.1
  - 5.2
  - 5.3
  nist_800_53_r5:
  - AU-2
  - AU-6
  - AU-12
  - SI-4
  pci_dss_v4:
  - 10.1
  - 10.2
  - 10.3
  iso_27001_2022:
  - A.8.15
  - A.8.16
  - A.5.28
remediation: |
  1. Enforce TLS 1.2+ for all connections; disable TLS 1.0 and 1.1.
  2. Apply Azure Policy / AWS Config rules to enforce minimum TLS settings.
  3. Use Certificate Manager / Key Vault for automated certificate lifecycle management.
references:
- https://attack.mitre.org/techniques/T1600/
check_config:
  conditions:
    all:
    - field: operation
      op: equals
      value: Microsoft.Sql/servers/databases/transparentDataEncryption/write
  log_source_type: activity_log
version: '1.0'
