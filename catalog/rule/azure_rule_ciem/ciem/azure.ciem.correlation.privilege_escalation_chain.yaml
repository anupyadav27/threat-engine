rule_id: azure.ciem.correlation.privilege_escalation_chain
service: ciem
provider: azure
check_type: log_correlation
severity: critical
title: 'Correlation: Privilege Escalation Chain'
description: 'Correlated privilege escalation: RBAC role assigned + conditional access deleted + MFA disabled by same principal within 30 minutes.'
rationale: 'Adversaries circumvent elevation control mechanisms to gain higher-level permissions. In cloud environments this includes SAML assertion manipulation, IAM role privilege boundary modifications, and STS:AssumeRole chaining to escalate from limited to administrative access. Detected via: privilege boundary removal events, STS role chaining with unusually broad permissions, and unexpected policy attachments.'
threat_category: privilege_escalation
mitre_tactics:
- privilege_escalation
mitre_techniques:
- T1548
- T1098.003
risk_score: 95
resource: multi_resource
source: default
is_active: true
domain: identity_and_access_management
action_category: privilege_escalation
log_source_type: activity_log
posture_category: iam_posture
threat_tags:
- T1548
- T1098.003
- T1098
- cloud_iam
- privilege_escalation
- ciem_correlation
- attack_chain
risk_indicators:
  actor_type: cloud_principal
  action_type: privilege_change
  target_type: cloud_resource
  blast_radius: tenant_or_account
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - role_management
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 1.1
  - 1.16
  - 1.17
  cis_azure_v2:
  - 1.1
  - 2.1
  - 3.1
  nist_800_53_r5:
  - AC-2
  - AC-3
  - AC-6
  - IA-2
  pci_dss_v4:
  - 7.1
  - 7.2
  - 8.2
  iso_27001_2022:
  - A.5.18
  - A.8.2
  - A.8.3
detection_events:
- 'iam:CreateRole with permissive trust'
- 'sts:AssumeRole with cross-account escalation'
- Microsoft.Authorization/elevateAccess/action
remediation: |
  1. Revoke the elevated permissions immediately.
  2. Enable Privileged Identity Management with approval workflows.
  3. Audit all elevation events and correlate with other suspicious activity.
  4. Enforce time-limited privilege elevations with justification requirements.
references:
- https://attack.mitre.org/techniques/T1548/
- https://attack.mitre.org/techniques/T1098/003/
check_config:
  for_each: log_events
  log_source_type: activity_log
  match_by: actor.principal
  min_events: 3
  sequence:
  - rule_id: azure.authorization.activity_log.role_assignment_write
  - rule_id: azure.identity.entra_audit.conditional_access_delete
  - rule_id: azure.iam.entra_audit.user_mfa_update
  time_window_minutes: 30
  type: correlation
version: '1.0'
