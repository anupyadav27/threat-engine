rule_id: azure.ciem.correlation.credential_exfil_chain
service: ciem
provider: azure
check_type: log_correlation
severity: critical
title: 'Correlation: Credential Exfiltration Chain'
description: 'Credential mass-harvest: Key Vault secrets read + Storage keys listed + SQL admin added by same principal.'
rationale: 'Adversaries search local file systems, remote file shares, and cloud storage for files containing insecurely stored credentials — including config files, source code, .env files, and shell history. Cloud-specific targets include ~/.aws/credentials, terraform.tfstate (containing plaintext secrets), and container environment variable dumps. Detected via: file read access to .env/.xml/.ps1/config files, grep commands targeting credential patterns, and container process access to mounted secret paths.'
threat_category: data_exfiltration
mitre_tactics:
- collection
- exfiltration
mitre_techniques:
- T1552.001
- T1567
risk_score: 95
resource: multi_resource
source: default
is_active: true
domain: data_protection_and_privacy
action_category: exfiltration
log_source_type: activity_log
posture_category: data_security_posture
threat_tags:
- T1552.001
- T1567
- T1552
- data_exfiltration
- data_loss
- ciem_correlation
- attack_chain
risk_indicators:
  actor_type: cloud_principal
  action_type: data_transfer
  target_type: cloud_resource
  blast_radius: tenant_or_account
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: true
  modules:
  - data_loss_prevention
  categories:
  - data_exfiltration
  - unauthorized_access
  priority: critical
  impact:
    pci: PCI DSS Requirement 12.3 — Implement security awareness program and protect systems
    gdpr: GDPR Article 32 — Appropriate technical and organizational measures for data security
    hipaa: §164.306(a) — Ensure confidentiality, integrity, and availability of ePHI
compliance_frameworks:
  cis_aws_v3:
  - 2.7
  - 3.7
  cis_azure_v2:
  - 3.1
  - 5.2
  nist_800_53_r5:
  - SC-7
  - SC-28
  - AC-4
  pci_dss_v4:
  - 3.2
  - 4.1
  - 10.2
  iso_27001_2022:
  - A.8.12
  - A.8.20
  - A.5.14
detection_events:
- 's3:GetObject on .env / credentials files'
- EC2 metadata API call from unexpected source
- Container exec with grep/find credential patterns
remediation: |
  1. Rotate all credentials that may have been exposed.
  2. Use AWS Secrets Manager / Azure Key Vault for all credential storage.
  3. Scan repositories and container images for embedded credentials.
  4. Implement DLP policies to prevent credential file exfiltration.
references:
- https://attack.mitre.org/techniques/T1552/001/
- https://docs.aws.amazon.com/secretsmanager/latest/userguide/intro.html
- https://learn.microsoft.com/en-us/azure/key-vault/general/best-practices
- https://attack.mitre.org/techniques/T1567/
check_config:
  for_each: log_events
  log_source_type: activity_log
  match_by: actor.principal
  min_events: 3
  sequence:
  - rule_id: azure.keyvault.activity_log.keyvault_secret_read
  - rule_id: azure.storage.activity_log.storage_list_keys
  - rule_id: azure.sql.activity_log.sql_admin_write
  time_window_minutes: 30
  type: correlation
version: '1.0'
