rule_id: azure.ciem.correlation.lateral_movement_chain
service: ciem
provider: azure
check_type: log_correlation
severity: critical
title: 'Correlation: Lateral Movement Chain'
description: 'Cross-resource lateral movement: VNet peered + RBAC role assigned + AKS admin credentials retrieved.'
rationale: 'Adversaries add additional roles or permissions to adversary-controlled cloud accounts to maintain persistent access to a tenant. Attackers target Global Administrator, Owner, and Contributor roles — granting full control over subscription resources without deploying remote access tools. Detected via: IAM role attachment events, privilege grant events in Entra ID/Okta, and admin role assignment in Microsoft 365.'
threat_category: lateral_movement
mitre_tactics:
- lateral_movement
mitre_techniques:
- T1021.007
- T1098.003
risk_score: 90
resource: multi_resource
source: default
is_active: true
domain: network_security_and_connectivity
action_category: network
log_source_type: activity_log
posture_category: network_posture
threat_tags:
- T1021.007
- T1098.003
- T1021
- T1098
- lateral_movement
- cloud_pivot
- ciem_correlation
- attack_chain
risk_indicators:
  actor_type: cloud_principal
  action_type: network_change
  target_type: cloud_resource
  blast_radius: tenant_or_account
  stealth_risk: medium
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 5.1
  - 5.2
  - 5.3
  cis_azure_v2:
  - 6.1
  - 6.2
  nist_800_53_r5:
  - SC-7
  - AC-4
  - SI-3
  pci_dss_v4:
  - 1.2
  - 1.3
  - 7.2
  iso_27001_2022:
  - A.8.20
  - A.8.22
  - A.5.14
detection_events:
- Microsoft.Authorization/roleAssignments/write
- 'iam:AttachUserPolicy'
- 'iam:PutRolePolicy'
- Add member to role (Entra ID audit)
remediation: |
  1. Review all VPC/VNet peering connections and remove unauthorized peerings.
  2. Apply network ACLs to restrict cross-VPC traffic to required flows only.
  3. Use AWS Transit Gateway / Azure Virtual WAN with strict routing policies.
  4. Enable VPC Flow Logs / NSG Flow Logs to detect lateral movement patterns.
references:
- https://attack.mitre.org/techniques/T1021/007/
- https://docs.aws.amazon.com/vpc/latest/peering/what-is-vpc-peering.html
- https://attack.mitre.org/techniques/T1098/003/
check_config:
  for_each: log_events
  log_source_type: activity_log
  match_by: actor.principal
  min_events: 3
  sequence:
  - rule_id: azure.network.activity_log.vnet_peering_write
  - rule_id: azure.authorization.activity_log.role_assignment_write
  - rule_id: azure.container.activity_log.aks_admin_credential_list
  time_window_minutes: 30
  type: correlation
version: '1.0'
