rule_id: azure.network.activity_log.vnet_peering_write
service: network
provider: azure
check_type: log
severity: high
title: 'Network: Vnet Peering Write'
description: Virtual network peering created — lateral movement path established between VNets.
rationale: Cloud service lateral movement via VPC peering, service-to-service calls, or shared credentials enables attackers to pivot between cloud accounts and regions.
threat_category: lateral_movement
mitre_tactics:
- lateral_movement
mitre_techniques:
- T1021.007
risk_score: 78
resource: azure_vnet
source: default
is_active: true
domain: network_security_and_connectivity
action_category: network
log_source_type: activity_log
posture_category: network_posture
threat_tags:
- T1021.007
- T1021
- lateral_movement
- cloud_pivot
- network_security
risk_indicators:
  actor_type: cloud_principal
  action_type: network_change
  target_type: network_resource
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 5.1
  - 5.2
  - 5.3
  cis_azure_v2:
  - 6.1
  - 6.2
  nist_800_53_r5:
  - SC-7
  - AC-4
  - SI-3
  pci_dss_v4:
  - 1.2
  - 1.3
  - 7.2
  iso_27001_2022:
  - A.8.20
  - A.8.22
  - A.5.14
remediation: |
  1. Review all VPC/VNet peering connections and remove unauthorized peerings.
  2. Apply network ACLs to restrict cross-VPC traffic to required flows only.
  3. Use AWS Transit Gateway / Azure Virtual WAN with strict routing policies.
  4. Enable VPC Flow Logs / NSG Flow Logs to detect lateral movement patterns.
references:
- https://attack.mitre.org/techniques/T1021/007/
- https://docs.aws.amazon.com/vpc/latest/peering/what-is-vpc-peering.html
check_config:
  conditions:
    all:
    - field: operation
      op: equals
      value: Microsoft.Network/virtualNetworks/virtualNetworkPeerings/write
  log_source_type: activity_log
version: '1.0'
