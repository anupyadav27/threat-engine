rule_id: azure.network.activity_log.bastion_write
service: network
provider: azure
check_type: log
severity: medium
title: 'Network: Bastion Write'
description: Azure Bastion host created or modified — browser-based RDP/SSH access point provisioned.
rationale: External remote service access (VPN, Citrix, cloud portals) is a common initial access vector; unexpected access may indicate compromised credentials.
threat_category: initial_access
mitre_tactics:
- initial_access
mitre_techniques:
- T1133
risk_score: 55
resource: azure_bastion
source: default
is_active: true
domain: network_security_and_connectivity
action_category: create
log_source_type: activity_log
posture_category: threat_posture
threat_tags:
- T1133
- network_security
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: network_resource
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 1.14
  - 2.1
  cis_azure_v2:
  - 1.2
  - 2.1
  nist_800_53_r5:
  - AC-17
  - IA-2
  - SI-3
  pci_dss_v4:
  - 8.3
  - 11.5
  iso_27001_2022:
  - A.8.5
  - A.9.4
remediation: |
  1. Apply Conditional Access policies to require MFA for all external access.
  2. Enable sign-in risk detection and session controls.
  3. Monitor for unusual remote access patterns (new location, device, timing).
references:
- https://attack.mitre.org/techniques/T1133/
check_config:
  conditions:
    all:
    - field: operation
      op: equals
      value: Microsoft.Network/bastionHosts/write
  log_source_type: activity_log
version: '1.0'
