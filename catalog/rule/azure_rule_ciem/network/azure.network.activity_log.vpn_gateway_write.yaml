rule_id: azure.network.activity_log.vpn_gateway_write
service: network
provider: azure
check_type: log
severity: medium
title: 'Network: VPN Gateway Write'
description: VPN gateway created or modified — site-to-site or point-to-site VPN configuration changed.
rationale: External remote service access (VPN, Citrix, cloud portals) is a common initial access vector; unexpected access may indicate compromised credentials.
threat_category: lateral_movement
mitre_tactics:
- lateral_movement
mitre_techniques:
- T1133
risk_score: 60
resource: azure_network
source: default
is_active: true
domain: network_security_and_connectivity
action_category: create
log_source_type: activity_log
posture_category: network_posture
threat_tags:
- T1133
- lateral_movement
- cloud_pivot
- network_security
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: network_resource
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 5.1
  - 5.2
  - 5.3
  cis_azure_v2:
  - 6.1
  - 6.2
  nist_800_53_r5:
  - SC-7
  - AC-4
  - SI-3
  pci_dss_v4:
  - 1.2
  - 1.3
  - 7.2
  iso_27001_2022:
  - A.8.20
  - A.8.22
  - A.5.14
remediation: |
  1. Apply Conditional Access policies to require MFA for all external access.
  2. Enable sign-in risk detection and session controls.
  3. Monitor for unusual remote access patterns (new location, device, timing).
references:
- https://attack.mitre.org/techniques/T1133/
check_config:
  conditions:
    all:
    - field: operation
      op: equals
      value: Microsoft.Network/virtualNetworkGateways/write
  log_source_type: activity_log
version: '1.0'
