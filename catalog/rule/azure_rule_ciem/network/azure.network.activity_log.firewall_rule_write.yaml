rule_id: azure.network.activity_log.firewall_rule_write
service: network
provider: azure
check_type: log
severity: high
title: 'Network: Firewall Rule Write'
description: Azure Firewall policy created or modified — network traffic filtering rules changed.
rationale: Disabling network-level security controls (NSG rules, firewall rules, WAF) removes barriers for lateral movement and exfiltration, exposing internal resources to attack.
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1562.004
risk_score: 75
resource: azure_firewall
source: default
is_active: true
domain: network_security_and_connectivity
action_category: network
log_source_type: activity_log
posture_category: security_posture
threat_tags:
- T1562.004
- T1562
- defense_evasion
- log_tampering
- network_security
risk_indicators:
  actor_type: cloud_principal
  action_type: network_change
  target_type: network_resource
  blast_radius: resource_group
  stealth_risk: critical
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 3.1
  - 3.2
  - 3.3
  - 3.4
  cis_azure_v2:
  - 5.1
  - 5.2
  - 5.3
  nist_800_53_r5:
  - AU-2
  - AU-6
  - AU-12
  - SI-4
  pci_dss_v4:
  - 10.1
  - 10.2
  - 10.3
  iso_27001_2022:
  - A.8.15
  - A.8.16
  - A.5.28
remediation: |
  1. Revert the network security rule changes immediately.
  2. Use Azure Policy / AWS Config to enforce baseline network security rules.
  3. Implement change management approval for all network security modifications.
  4. Enable VPC Flow Logs / NSG Flow Logs to audit network traffic.
references:
- https://attack.mitre.org/techniques/T1562/004/
- https://learn.microsoft.com/en-us/azure/network-watcher/nsg-flow-logs-overview
- https://docs.aws.amazon.com/vpc/latest/userguide/VPC_SecurityGroups.html
check_config:
  conditions:
    all:
    - field: operation
      op: equals
      value: Microsoft.Network/azureFirewalls/write
  log_source_type: activity_log
version: '1.0'
