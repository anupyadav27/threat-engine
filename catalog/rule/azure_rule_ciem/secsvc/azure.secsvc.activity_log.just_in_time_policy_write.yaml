rule_id: azure.secsvc.activity_log.just_in_time_policy_write
service: secsvc
provider: azure
check_type: log
severity: high
title: 'Security: Just In Time Policy Write'
description: Just-In-Time VM access policy modified — controlled management port access policy changed.
rationale: External remote service access (VPN, Citrix, cloud portals) is a common initial access vector; unexpected access may indicate compromised credentials.
threat_category: initial_access
mitre_tactics:
- initial_access
mitre_techniques:
- T1133
risk_score: 75
resource: azure_defender
source: default
is_active: true
domain: logging_monitoring_and_alerting
action_category: create
log_source_type: activity_log
posture_category: threat_posture
threat_tags:
- T1133
- security_service
- audit_log
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: security_service
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: true
  modules:
  - data_access_governance
  categories:
  - sensitive_data_access
  priority: high
  impact:
    pci: PCI DSS Requirement 12.3 — Implement security awareness program and protect systems
    gdpr: GDPR Article 32 — Appropriate technical and organizational measures for data security
    hipaa: §164.306(a) — Ensure confidentiality, integrity, and availability of ePHI
  sensitive_data_context: |
  Unauthorized initial access on secsvc resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks:
  cis_aws_v3:
  - 1.14
  - 2.1
  cis_azure_v2:
  - 1.2
  - 2.1
  nist_800_53_r5:
  - AC-17
  - IA-2
  - SI-3
  pci_dss_v4:
  - 8.3
  - 11.5
  iso_27001_2022:
  - A.8.5
  - A.9.4
remediation: |
  1. Apply Conditional Access policies to require MFA for all external access.
  2. Enable sign-in risk detection and session controls.
  3. Monitor for unusual remote access patterns (new location, device, timing).
references:
- https://attack.mitre.org/techniques/T1133/
check_config:
  conditions:
    all:
    - field: operation
      op: equals
      value: Microsoft.Security/locations/jitNetworkAccessPolicies/write
  log_source_type: activity_log
version: '1.0'
