rule_id: azure.keyvault.activity_log.keyvault_write
service: keyvault
provider: azure
check_type: log
severity: medium
title: 'Key Vault: Keyvault Write'
description: Key Vault created or updated — vault properties or network rules changed.
rationale: Group Policy modifications can disable security controls, deploy malware, or modify access rights across all systems in an organizational unit simultaneously.
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1484.001
risk_score: 50
resource: azure_key_vault
source: default
is_active: true
domain: cryptography_and_key_management
action_category: create
log_source_type: activity_log
posture_category: security_posture
threat_tags:
- T1484.001
- T1484
- defense_evasion
- log_tampering
- secrets
- cryptography
risk_indicators:
  actor_type: service_principal_or_app
  action_type: write
  target_type: secret_or_key
  blast_radius: resource_group
  stealth_risk: critical
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: true
  modules:
  - secrets_management
  categories:
  - sensitive_data_access
  priority: medium
  impact:
    pci: PCI DSS Requirement 3.4 — Sensitive authentication data must be protected
    gdpr: GDPR Article 32 — Appropriate technical measures to protect personal data
    hipaa: §164.312(e)(2)(ii) — Encryption of ePHI in transit and at rest
  sensitive_data_context: |
  Unauthorized defense evasion on keyvault resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks:
  cis_aws_v3:
  - 3.1
  - 3.2
  - 3.3
  - 3.4
  cis_azure_v2:
  - 5.1
  - 5.2
  - 5.3
  nist_800_53_r5:
  - AU-2
  - AU-6
  - AU-12
  - SI-4
  pci_dss_v4:
  - 10.1
  - 10.2
  - 10.3
  iso_27001_2022:
  - A.8.15
  - A.8.16
  - A.5.28
remediation: |
  1. Identify and revert unauthorized GPO changes.
  2. Restrict GPO modification rights to domain admin accounts with approval workflows.
  3. Enable audit logging for all Group Policy changes.
  4. Use Microsoft Defender for Identity to detect GPO tampering.
references:
- https://attack.mitre.org/techniques/T1484/001/
- https://learn.microsoft.com/en-us/defender-for-identity/security-assessment-edit-vulnerable-group-policy
check_config:
  conditions:
    all:
    - field: operation
      op: equals
      value: Microsoft.KeyVault/vaults/write
  log_source_type: activity_log
version: '1.0'
