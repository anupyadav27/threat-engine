rule_id: azure.keyvault.activity_log.keyvault_key_read
service: keyvault
provider: azure
check_type: log
severity: high
title: 'Key Vault: Keyvault Key Read'
description: Key Vault encryption key read — cryptographic key accessed, potential exfiltration path.
rationale: Private keys embedded in code repositories, CI/CD pipelines, or cloud storage can be harvested to authenticate as services or users.
threat_category: credential_access
mitre_tactics:
- credential_access
mitre_techniques:
- T1552.004
risk_score: 75
resource: azure_key_vault
source: default
is_active: true
domain: cryptography_and_key_management
action_category: read
log_source_type: activity_log
posture_category: iam_posture
threat_tags:
- T1552.004
- T1552
- credential_access
- secret_exposure
- secrets
- cryptography
risk_indicators:
  actor_type: service_principal_or_app
  action_type: read
  target_type: secret_or_key
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: true
  modules:
  - secrets_management
  categories:
  - secrets_exposure
  - credential_theft
  priority: high
  impact:
    pci: PCI DSS Requirement 3.4 — Sensitive authentication data must be protected
    gdpr: GDPR Article 32 — Appropriate technical measures to protect personal data
    hipaa: §164.312(e)(2)(ii) — Encryption of ePHI in transit and at rest
  sensitive_data_context: |
  Unauthorized credential access on keyvault resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks:
  cis_aws_v3:
  - 1.14
  - 1.19
  - 2.1
  cis_azure_v2:
  - 1.3
  - 1.4
  - 8.1
  nist_800_53_r5:
  - IA-5
  - IA-8
  - SC-28
  pci_dss_v4:
  - 8.2
  - 8.3
  - 8.6
  iso_27001_2022:
  - A.8.5
  - A.9.4
  - A.9.2
remediation: |
  1. Rotate all affected private keys immediately.
  2. Scan source code and build artifacts for private key patterns.
  3. Use HSM-backed key storage (AWS KMS / Azure Key Vault HSM).
  4. Enforce automated secret scanning in all CI/CD pipelines.
references:
- https://attack.mitre.org/techniques/T1552/004/
- https://docs.aws.amazon.com/kms/latest/developerguide/overview.html
check_config:
  conditions:
    all:
    - field: operation
      op: equals
      value: Microsoft.KeyVault/vaults/keys/read
  log_source_type: activity_log
version: '1.0'
