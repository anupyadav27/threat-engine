rule_id: azure.keyvault.activity_log.keyvault_secret_write
service: keyvault
provider: azure
check_type: log
severity: medium
title: 'Key Vault: Keyvault Secret Write'
description: Key Vault secret written — new or updated secret stored in vault.
rationale: 'Adversaries search local file systems, remote file shares, and cloud storage for files containing insecurely stored credentials — including config files, source code, .env files, and shell history. Cloud-specific targets include ~/.aws/credentials, terraform.tfstate (containing plaintext secrets), and container environment variable dumps. Detected via: file read access to .env/.xml/.ps1/config files, grep commands targeting credential patterns, and container process access to mounted secret paths.'
threat_category: persistence
mitre_tactics:
- persistence
mitre_techniques:
- T1552.001
risk_score: 55
resource: azure_key_vault
source: default
is_active: true
domain: cryptography_and_key_management
action_category: create
log_source_type: activity_log
posture_category: iam_posture
threat_tags:
- T1552.001
- T1552
- persistence
- backdoor
- secrets
- cryptography
risk_indicators:
  actor_type: service_principal_or_app
  action_type: write
  target_type: secret_or_key
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: true
  modules:
  - secrets_management
  categories:
  - sensitive_data_access
  priority: medium
  impact:
    pci: PCI DSS Requirement 3.4 — Sensitive authentication data must be protected
    gdpr: GDPR Article 32 — Appropriate technical measures to protect personal data
    hipaa: §164.312(e)(2)(ii) — Encryption of ePHI in transit and at rest
compliance_frameworks:
  cis_aws_v3:
  - 1.1
  - 1.4
  - 1.16
  cis_azure_v2:
  - 1.1
  - 2.1
  - 2.9
  nist_800_53_r5:
  - AC-2
  - AC-6
  - IA-2
  - SC-7
  pci_dss_v4:
  - 7.1
  - 8.2
  - 10.2
  iso_27001_2022:
  - A.8.2
  - A.9.2
  - A.5.18
detection_events:
- 's3:GetObject on .env / credentials files'
- EC2 metadata API call from unexpected source
- Container exec with grep/find credential patterns
remediation: |
  1. Rotate all credentials that may have been exposed.
  2. Use AWS Secrets Manager / Azure Key Vault for all credential storage.
  3. Scan repositories and container images for embedded credentials.
  4. Implement DLP policies to prevent credential file exfiltration.
references:
- https://attack.mitre.org/techniques/T1552/001/
- https://docs.aws.amazon.com/secretsmanager/latest/userguide/intro.html
- https://learn.microsoft.com/en-us/azure/key-vault/general/best-practices
check_config:
  conditions:
    all:
    - field: operation
      op: equals
      value: Microsoft.KeyVault/vaults/secrets/write
  log_source_type: activity_log
version: '1.0'
