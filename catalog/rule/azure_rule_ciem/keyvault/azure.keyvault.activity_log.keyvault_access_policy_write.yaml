rule_id: azure.keyvault.activity_log.keyvault_access_policy_write
service: keyvault
provider: azure
check_type: log
severity: high
title: 'Key Vault: Keyvault Access Policy Write'
description: Key Vault access policy modified — principal granted read/write/delete access to vault contents.
rationale: 'Adversaries add additional roles or permissions to adversary-controlled cloud accounts to maintain persistent access to a tenant. Attackers target Global Administrator, Owner, and Contributor roles — granting full control over subscription resources without deploying remote access tools. Detected via: IAM role attachment events, privilege grant events in Entra ID/Okta, and admin role assignment in Microsoft 365.'
threat_category: privilege_escalation
mitre_tactics:
- privilege_escalation
mitre_techniques:
- T1098.003
risk_score: 78
resource: azure_key_vault
source: default
is_active: true
domain: cryptography_and_key_management
action_category: create
log_source_type: activity_log
posture_category: iam_posture
threat_tags:
- T1098.003
- T1098
- cloud_iam
- privilege_escalation
- secrets
- cryptography
risk_indicators:
  actor_type: service_principal_or_app
  action_type: write
  target_type: secret_or_key
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - policy_analysis
  - access_control
data_security:
  applicable: true
  modules:
  - secrets_management
  categories:
  - sensitive_data_access
  priority: high
  impact:
    pci: PCI DSS Requirement 3.4 — Sensitive authentication data must be protected
    gdpr: GDPR Article 32 — Appropriate technical measures to protect personal data
    hipaa: §164.312(e)(2)(ii) — Encryption of ePHI in transit and at rest
compliance_frameworks:
  cis_aws_v3:
  - 1.1
  - 1.16
  - 1.17
  cis_azure_v2:
  - 1.1
  - 2.1
  - 3.1
  nist_800_53_r5:
  - AC-2
  - AC-3
  - AC-6
  - IA-2
  pci_dss_v4:
  - 7.1
  - 7.2
  - 8.2
  iso_27001_2022:
  - A.5.18
  - A.8.2
  - A.8.3
detection_events:
- Microsoft.Authorization/roleAssignments/write
- 'iam:AttachUserPolicy'
- 'iam:PutRolePolicy'
- Add member to role (Entra ID audit)
remediation: |
  1. Remove the unauthorized role assignment immediately.
  2. Review all role assignments for the affected principal.
  3. Enable just-in-time privileged access using PIM / AWS IAM Identity Center.
  4. Require approval workflows for Owner/Contributor/privileged role assignments.
  5. Alert on all role assignments at subscription or tenant scope.
references:
- https://attack.mitre.org/techniques/T1098/003/
- https://learn.microsoft.com/en-us/azure/role-based-access-control/overview
- https://learn.microsoft.com/en-us/azure/active-directory/privileged-identity-management/pim-configure
check_config:
  conditions:
    all:
    - field: operation
      op: equals
      value: Microsoft.KeyVault/vaults/accessPolicies/write
  log_source_type: activity_log
version: '1.0'
