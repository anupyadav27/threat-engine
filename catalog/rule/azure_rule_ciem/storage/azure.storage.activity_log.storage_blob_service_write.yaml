rule_id: azure.storage.activity_log.storage_blob_service_write
service: storage
provider: azure
check_type: log
severity: medium
title: 'Storage: Storage Blob Service Write'
description: Blob service properties modified — soft delete, versioning, or CORS settings changed.
rationale: Group Policy modifications can disable security controls, deploy malware, or modify access rights across all systems in an organizational unit simultaneously.
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1484.001
risk_score: 50
resource: azure_storage
source: default
is_active: true
domain: data_protection_and_privacy
action_category: create
log_source_type: activity_log
posture_category: security_posture
threat_tags:
- T1484.001
- T1484
- defense_evasion
- log_tampering
- storage_access
- data
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: storage_account
  blast_radius: resource_group
  stealth_risk: critical
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: true
  modules:
  - data_access_governance
  categories:
  - sensitive_data_access
  priority: medium
  impact:
    pci: PCI DSS Requirement 3.1 — Minimize cardholder data storage
    gdpr: GDPR Article 25 — Data protection by design; minimize data exposure
    hipaa: §164.312(a)(1) — Access controls on data repositories containing ePHI
  sensitive_data_context: |
  Unauthorized defense evasion on storage resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks:
  cis_aws_v3:
  - 3.1
  - 3.2
  - 3.3
  - 3.4
  cis_azure_v2:
  - 5.1
  - 5.2
  - 5.3
  nist_800_53_r5:
  - AU-2
  - AU-6
  - AU-12
  - SI-4
  pci_dss_v4:
  - 10.1
  - 10.2
  - 10.3
  iso_27001_2022:
  - A.8.15
  - A.8.16
  - A.5.28
remediation: |
  1. Identify and revert unauthorized GPO changes.
  2. Restrict GPO modification rights to domain admin accounts with approval workflows.
  3. Enable audit logging for all Group Policy changes.
  4. Use Microsoft Defender for Identity to detect GPO tampering.
references:
- https://attack.mitre.org/techniques/T1484/001/
- https://learn.microsoft.com/en-us/defender-for-identity/security-assessment-edit-vulnerable-group-policy
check_config:
  conditions:
    all:
    - field: operation
      op: equals
      value: Microsoft.Storage/storageAccounts/blobServices/write
  log_source_type: activity_log
version: '1.0'
