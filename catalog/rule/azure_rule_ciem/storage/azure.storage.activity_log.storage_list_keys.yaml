rule_id: azure.storage.activity_log.storage_list_keys
service: storage
provider: azure
check_type: log
severity: critical
title: 'Storage: Storage List Keys'
description: Storage account keys listed — full read/write/delete access keys to storage account retrieved.
rationale: 'Adversaries search local file systems, remote file shares, and cloud storage for files containing insecurely stored credentials — including config files, source code, .env files, and shell history. Cloud-specific targets include ~/.aws/credentials, terraform.tfstate (containing plaintext secrets), and container environment variable dumps. Detected via: file read access to .env/.xml/.ps1/config files, grep commands targeting credential patterns, and container process access to mounted secret paths.'
threat_category: credential_access
mitre_tactics:
- credential_access
mitre_techniques:
- T1552.001
risk_score: 88
resource: azure_storage
source: default
is_active: true
domain: data_protection_and_privacy
action_category: read
log_source_type: activity_log
posture_category: iam_posture
threat_tags:
- T1552.001
- T1552
- credential_access
- secret_exposure
- storage_access
- data
risk_indicators:
  actor_type: cloud_principal
  action_type: read
  target_type: storage_account
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: true
  modules:
  - secrets_management
  - data_access_governance
  categories:
  - secrets_exposure
  - credential_theft
  priority: critical
  impact:
    pci: PCI DSS Requirement 3.1 — Minimize cardholder data storage
    gdpr: GDPR Article 25 — Data protection by design; minimize data exposure
    hipaa: §164.312(a)(1) — Access controls on data repositories containing ePHI
compliance_frameworks:
  cis_aws_v3:
  - 1.14
  - 1.19
  - 2.1
  cis_azure_v2:
  - 1.3
  - 1.4
  - 8.1
  nist_800_53_r5:
  - IA-5
  - IA-8
  - SC-28
  pci_dss_v4:
  - 8.2
  - 8.3
  - 8.6
  iso_27001_2022:
  - A.8.5
  - A.9.4
  - A.9.2
detection_events:
- 's3:GetObject on .env / credentials files'
- EC2 metadata API call from unexpected source
- Container exec with grep/find credential patterns
remediation: |
  1. Rotate all credentials that may have been exposed.
  2. Use AWS Secrets Manager / Azure Key Vault for all credential storage.
  3. Scan repositories and container images for embedded credentials.
  4. Implement DLP policies to prevent credential file exfiltration.
references:
- https://attack.mitre.org/techniques/T1552/001/
- https://docs.aws.amazon.com/secretsmanager/latest/userguide/intro.html
- https://learn.microsoft.com/en-us/azure/key-vault/general/best-practices
check_config:
  conditions:
    all:
    - field: operation
      op: equals
      value: Microsoft.Storage/storageAccounts/listKeys/action
  log_source_type: activity_log
version: '1.0'
