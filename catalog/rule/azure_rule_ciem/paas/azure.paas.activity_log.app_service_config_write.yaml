rule_id: azure.paas.activity_log.app_service_config_write
service: paas
provider: azure
check_type: log
severity: high
title: 'PaaS: App Service Config Write'
description: App Service configuration modified — app settings, connection strings, or auth config changed.
rationale: Event-triggered execution via cloud automation rules can establish persistent code execution that activates on specific events, surviving credential rotation.
threat_category: persistence
mitre_tactics:
- persistence
mitre_techniques:
- T1546
risk_score: 72
resource: azure_app_service
source: default
is_active: true
domain: compute_and_workload_security
action_category: create
log_source_type: activity_log
posture_category: iam_posture
threat_tags:
- T1546
- persistence
- backdoor
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 1.1
  - 1.4
  - 1.16
  cis_azure_v2:
  - 1.1
  - 2.1
  - 2.9
  nist_800_53_r5:
  - AC-2
  - AC-6
  - IA-2
  - SC-7
  pci_dss_v4:
  - 7.1
  - 8.2
  - 10.2
  iso_27001_2022:
  - A.8.2
  - A.9.2
  - A.5.18
remediation: |
  1. Review and remove unauthorized automation rules or event subscriptions.
  2. Restrict creation of automation rules to authorized principals.
  3. Audit all event-triggered execution configurations regularly.
  4. Enable alerts on automation rule creation and modification.
references:
- https://attack.mitre.org/techniques/T1546/
check_config:
  conditions:
    all:
    - field: operation
      op: equals
      value: Microsoft.Web/sites/config/write
  log_source_type: activity_log
version: '1.0'
