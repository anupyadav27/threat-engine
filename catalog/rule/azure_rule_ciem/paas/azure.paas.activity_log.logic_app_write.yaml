rule_id: azure.paas.activity_log.logic_app_write
service: paas
provider: azure
check_type: log
severity: medium
title: 'PaaS: Logic App Write'
description: Logic App workflow created or modified — automated business process or integration flow changed.
rationale: 'Adversaries abuse cloud management services such as AWS Systems Manager (Run Command), Azure VM RunCommand, or Automation Runbooks to execute commands within virtual machines via installed agents — achieving remote code execution through the cloud control plane without requiring network access to the instance. Detected via: SSM RunCommand / Azure RunCommand API calls by unexpected users, command execution outside maintenance windows, and service account-initiated script execution atypical for admin tasks.'
threat_category: persistence
mitre_tactics:
- persistence
- execution
mitre_techniques:
- T1546
- T1651
risk_score: 55
resource: azure_logic_app
source: default
is_active: true
domain: compute_and_workload_security
action_category: create
log_source_type: activity_log
posture_category: iam_posture
threat_tags:
- T1546
- T1651
- persistence
- backdoor
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 1.1
  - 1.4
  - 1.16
  cis_azure_v2:
  - 1.1
  - 2.1
  - 2.9
  nist_800_53_r5:
  - AC-2
  - AC-6
  - IA-2
  - SC-7
  pci_dss_v4:
  - 7.1
  - 8.2
  - 10.2
  iso_27001_2022:
  - A.8.2
  - A.9.2
  - A.5.18
detection_events:
- 'ssm:SendCommand'
- Microsoft.Compute/virtualMachines/runCommand/action
- Microsoft.Automation/automationAccounts/runbooks/publish/action
- 'ec2:GetConsoleOutput (post-execution evidence gathering)'
remediation: |
  1. Review and remove unauthorized automation rules or event subscriptions.
  2. Restrict creation of automation rules to authorized principals.
  3. Audit all event-triggered execution configurations regularly.
  4. Enable alerts on automation rule creation and modification.
references:
- https://attack.mitre.org/techniques/T1546/
- https://attack.mitre.org/techniques/T1651/
check_config:
  conditions:
    all:
    - field: operation
      op: equals
      value: Microsoft.Logic/workflows/write
  log_source_type: activity_log
version: '1.0'
