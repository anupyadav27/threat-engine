rule_id: azure.devops.activity_log.arm_deployment_delete
service: devops
provider: azure
check_type: log
severity: medium
title: 'DevOps: ARM Deployment Delete'
description: ARM deployment history deleted — infrastructure deployment record removed.
rationale: Indicator removal techniques (log deletion, history clearing) obstruct forensic investigation by destroying evidence of attacker activity.
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1070
risk_score: 45
resource: azure_resource
source: default
is_active: true
domain: configuration_and_change_management
action_category: delete
log_source_type: activity_log
posture_category: security_posture
threat_tags:
- T1070
- defense_evasion
- log_tampering
- cicd
- devops_security
risk_indicators:
  actor_type: cicd_service_principal
  action_type: destructive
  target_type: cicd_pipeline
  blast_radius: resource_group
  stealth_risk: critical
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 3.1
  - 3.2
  - 3.3
  - 3.4
  cis_azure_v2:
  - 5.1
  - 5.2
  - 5.3
  nist_800_53_r5:
  - AU-2
  - AU-6
  - AU-12
  - SI-4
  pci_dss_v4:
  - 10.1
  - 10.2
  - 10.3
  iso_27001_2022:
  - A.8.15
  - A.8.16
  - A.5.28
remediation: |
  1. Enable log immutability (S3 Object Lock, Azure Immutable Blob Storage).
  2. Ship logs to a separate, write-protected security account in real time.
  3. Alert on log deletion or purge operations immediately.
  4. Investigate all log deletion events as potential incident indicators.
references:
- https://attack.mitre.org/techniques/T1070/
- https://docs.aws.amazon.com/awscloudtrail/latest/userguide/cloudtrail-log-file-validation-intro.html
check_config:
  conditions:
    all:
    - field: operation
      op: equals
      value: Microsoft.Resources/deployments/delete
  log_source_type: activity_log
version: '1.0'
