rule_id: azure.threat.entra_audit.mfa_reset_by_admin
service: threat
provider: azure
check_type: log
severity: critical
title: 'Threat: MFA Reset By Admin'
description: 'Admin reset user MFA authenticator app — user''s second factor cleared, account may be accessible with only password.'
rationale: MFA bypass or manipulation allows attackers to authenticate without the second factor, significantly reducing authentication security for targeted accounts.
threat_category: credential_access
mitre_tactics:
- credential_access
mitre_techniques:
- T1556.006
risk_score: 88
resource: entra_user
source: default
is_active: true
domain: identity_and_access_management
action_category: read
log_source_type: entra_audit
posture_category: iam_posture
threat_tags:
- T1556.006
- T1556
- credential_access
- secret_exposure
- threat_detection
risk_indicators:
  actor_type: cloud_principal
  action_type: read
  target_type: cloud_resource
  blast_radius: multi_resource
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - mfa
  - access_control
data_security:
  applicable: true
  modules:
  - data_access_governance
  categories:
  - secrets_exposure
  - credential_theft
  priority: critical
  impact:
    pci: PCI DSS Requirement 12.3 — Implement security awareness program and protect systems
    gdpr: GDPR Article 32 — Appropriate technical and organizational measures for data security
    hipaa: §164.306(a) — Ensure confidentiality, integrity, and availability of ePHI
  sensitive_data_context: |
  Unauthorized credential access on threat resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks:
  cis_aws_v3:
  - 1.14
  - 1.19
  - 2.1
  cis_azure_v2:
  - 1.3
  - 1.4
  - 8.1
  nist_800_53_r5:
  - IA-5
  - IA-8
  - SC-28
  pci_dss_v4:
  - 8.2
  - 8.3
  - 8.6
  iso_27001_2022:
  - A.8.5
  - A.9.4
  - A.9.2
remediation: |
  1. Investigate and revert MFA method changes for all affected accounts.
  2. Force re-enrollment of MFA for affected accounts.
  3. Enable Conditional Access policies requiring phishing-resistant MFA (FIDO2).
  4. Alert on all MFA method changes, especially for privileged accounts.
references:
- https://attack.mitre.org/techniques/T1556/006/
- https://learn.microsoft.com/en-us/azure/active-directory/authentication/concept-mfa-howitworks
- https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_mfa.html
check_config:
  conditions:
    all:
    - field: operation
      op: equals
      value: microsoft.directory/users/strongAuthenticationPhoneAppDetail/update
  log_source_type: entra_audit
version: '1.0'
