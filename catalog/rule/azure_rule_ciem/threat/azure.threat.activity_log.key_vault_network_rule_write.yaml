rule_id: azure.threat.activity_log.key_vault_network_rule_write
service: threat
provider: azure
check_type: log
severity: high
title: 'Threat: Key Vault Network Rule Write'
description: Key Vault network rules modified — firewall or virtual network access rules for vault changed.
rationale: Weakening or disabling cloud security policies reduces the enforcement surface for compliance controls and may allow prohibited actions to succeed silently.
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1562.007
risk_score: 72
resource: azure_key_vault
source: default
is_active: true
domain: logging_monitoring_and_alerting
action_category: create
log_source_type: activity_log
posture_category: security_posture
threat_tags:
- T1562.007
- T1562
- defense_evasion
- log_tampering
- threat_detection
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: multi_resource
  stealth_risk: critical
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: true
  modules:
  - secrets_management
  categories:
  - sensitive_data_access
  priority: high
  impact:
    pci: PCI DSS Requirement 12.3 — Implement security awareness program and protect systems
    gdpr: GDPR Article 32 — Appropriate technical and organizational measures for data security
    hipaa: §164.306(a) — Ensure confidentiality, integrity, and availability of ePHI
  sensitive_data_context: |
  Unauthorized defense evasion on threat resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks:
  cis_aws_v3:
  - 3.1
  - 3.2
  - 3.3
  - 3.4
  cis_azure_v2:
  - 5.1
  - 5.2
  - 5.3
  nist_800_53_r5:
  - AU-2
  - AU-6
  - AU-12
  - SI-4
  pci_dss_v4:
  - 10.1
  - 10.2
  - 10.3
  iso_27001_2022:
  - A.8.15
  - A.8.16
  - A.5.28
remediation: |
  1. Restore disabled policy assignments and investigate the actor.
  2. Apply RBAC restrictions so only authorized principals can modify security policies.
  3. Enable activity log alerts for all policy assignment changes.
  4. Use Azure Policy / AWS Config mandatory enforcement modes.
references:
- https://attack.mitre.org/techniques/T1562/007/
- https://learn.microsoft.com/en-us/azure/governance/policy/overview
check_config:
  conditions:
    all:
    - field: operation
      op: equals
      value: Microsoft.KeyVault/vaults/networkRuleSet/write
  log_source_type: activity_log
version: '1.0'
