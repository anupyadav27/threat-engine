rule_id: azure.authorization.activity_log.policy_assignment_write
service: authorization
provider: azure
check_type: log
severity: high
title: 'Authorization: Policy Assignment Write'
description: Azure Policy assignment created or modified — security control enforcement changed.
rationale: Group Policy modifications can disable security controls, deploy malware, or modify access rights across all systems in an organizational unit simultaneously.
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1484.001
risk_score: 70
resource: azure_policy
source: default
is_active: true
domain: logging_monitoring_and_alerting
action_category: create
log_source_type: activity_log
posture_category: security_posture
threat_tags:
- T1484.001
- T1484
- defense_evasion
- log_tampering
- rbac
- role_assignment
risk_indicators:
  actor_type: user_or_service_principal
  action_type: write
  target_type: rbac_assignment
  blast_radius: subscription
  stealth_risk: critical
iam_security:
  applicable: true
  modules:
  - policy_analysis
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 3.1
  - 3.2
  - 3.3
  - 3.4
  cis_azure_v2:
  - 5.1
  - 5.2
  - 5.3
  nist_800_53_r5:
  - AU-2
  - AU-6
  - AU-12
  - SI-4
  pci_dss_v4:
  - 10.1
  - 10.2
  - 10.3
  iso_27001_2022:
  - A.8.15
  - A.8.16
  - A.5.28
remediation: |
  1. Identify and revert unauthorized GPO changes.
  2. Restrict GPO modification rights to domain admin accounts with approval workflows.
  3. Enable audit logging for all Group Policy changes.
  4. Use Microsoft Defender for Identity to detect GPO tampering.
references:
- https://attack.mitre.org/techniques/T1484/001/
- https://learn.microsoft.com/en-us/defender-for-identity/security-assessment-edit-vulnerable-group-policy
check_config:
  conditions:
    all:
    - field: operation
      op: equals
      value: Microsoft.Authorization/policyAssignments/write
  log_source_type: activity_log
version: '1.0'
