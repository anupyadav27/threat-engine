rule_id: azure.authorization.activity_log.role_definition_write
service: authorization
provider: azure
check_type: log
severity: high
title: 'Authorization: Role Definition Write'
description: Custom RBAC role created or modified — broad permissions may bypass least-privilege controls.
rationale: Group Policy modifications can disable security controls, deploy malware, or modify access rights across all systems in an organizational unit simultaneously.
threat_category: privilege_escalation
mitre_tactics:
- privilege_escalation
mitre_techniques:
- T1484.001
risk_score: 80
resource: azure_rbac
source: default
is_active: true
domain: identity_and_access_management
action_category: create
log_source_type: activity_log
posture_category: iam_posture
threat_tags:
- T1484.001
- T1484
- cloud_iam
- privilege_escalation
- rbac
- role_assignment
risk_indicators:
  actor_type: user_or_service_principal
  action_type: write
  target_type: rbac_assignment
  blast_radius: subscription
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - role_management
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 1.1
  - 1.16
  - 1.17
  cis_azure_v2:
  - 1.1
  - 2.1
  - 3.1
  nist_800_53_r5:
  - AC-2
  - AC-3
  - AC-6
  - IA-2
  pci_dss_v4:
  - 7.1
  - 7.2
  - 8.2
  iso_27001_2022:
  - A.5.18
  - A.8.2
  - A.8.3
remediation: |
  1. Identify and revert unauthorized GPO changes.
  2. Restrict GPO modification rights to domain admin accounts with approval workflows.
  3. Enable audit logging for all Group Policy changes.
  4. Use Microsoft Defender for Identity to detect GPO tampering.
references:
- https://attack.mitre.org/techniques/T1484/001/
- https://learn.microsoft.com/en-us/defender-for-identity/security-assessment-edit-vulnerable-group-policy
check_config:
  conditions:
    all:
    - field: operation
      op: equals
      value: Microsoft.Authorization/roleDefinitions/write
  log_source_type: activity_log
version: '1.0'
