rule_id: azure.container.activity_log.aks_admin_credential_list
service: container
provider: azure
check_type: log
severity: critical
title: 'Container: Aks Admin Credential List'
description: AKS cluster admin credentials retrieved — kubeconfig with cluster-admin access obtained.
rationale: Container secrets, Kubernetes secrets, and environment variables can expose sensitive credentials to any process with read access to the container environment.
threat_category: credential_access
mitre_tactics:
- credential_access
mitre_techniques:
- T1552.007
risk_score: 92
resource: aks_cluster
source: default
is_active: true
domain: container_and_kubernetes_security
action_category: read
log_source_type: activity_log
posture_category: iam_posture
threat_tags:
- T1552.007
- T1552
- credential_access
- secret_exposure
- kubernetes
- container_security
risk_indicators:
  actor_type: service_account_or_workload
  action_type: read
  target_type: kubernetes_workload
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: true
  modules:
  - data_access_governance
  categories:
  - secrets_exposure
  - credential_theft
  priority: critical
  impact:
    pci: PCI DSS Requirement 12.3 — Implement security awareness program and protect systems
    gdpr: GDPR Article 32 — Appropriate technical and organizational measures for data security
    hipaa: §164.306(a) — Ensure confidentiality, integrity, and availability of ePHI
  sensitive_data_context: |
  Unauthorized credential access on container resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks:
  cis_aws_v3:
  - 1.14
  - 1.19
  - 2.1
  cis_azure_v2:
  - 1.3
  - 1.4
  - 8.1
  nist_800_53_r5:
  - IA-5
  - IA-8
  - SC-28
  pci_dss_v4:
  - 8.2
  - 8.3
  - 8.6
  iso_27001_2022:
  - A.8.5
  - A.9.4
  - A.9.2
remediation: |
  1. Remove sensitive data from container environment variables.
  2. Use Kubernetes Secrets Store CSI Driver or Vault Agent for secrets injection.
  3. Enable encryption for Kubernetes Secrets at rest.
  4. Restrict access to secrets using Kubernetes RBAC least-privilege policies.
references:
- https://attack.mitre.org/techniques/T1552/007/
- https://kubernetes.io/docs/concepts/configuration/secret/
check_config:
  conditions:
    all:
    - field: operation
      op: equals
      value: Microsoft.ContainerService/managedClusters/listClusterAdminCredential/action
  log_source_type: activity_log
version: '1.0'
