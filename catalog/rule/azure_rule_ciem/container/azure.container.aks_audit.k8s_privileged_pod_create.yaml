rule_id: azure.container.aks_audit.k8s_privileged_pod_create
service: container
provider: azure
check_type: log
severity: high
title: 'Container: K8s Privileged Pod Create'
description: Kubernetes privileged pod created — container with host-level access may escape namespace isolation.
rationale: 'Adversaries escape container or virtualized environment isolation to gain access to the underlying host, circumventing container security boundaries to access other containerized resources or the node''s credentials. Requires privileged container, hostPath mounts, or kernel exploit. Detected via: hostPath mounts to /proc or /sys, privileged container launches, unshare/keyctl/mount syscalls from container processes, and process execution outside container namespaces.'
threat_category: privilege_escalation
mitre_tactics:
- privilege_escalation
mitre_techniques:
- T1611
risk_score: 78
resource: k8s_pod
source: default
is_active: true
domain: container_and_kubernetes_security
action_category: create
log_source_type: aks_audit
posture_category: iam_posture
threat_tags:
- T1611
- cloud_iam
- privilege_escalation
- kubernetes
- container_security
risk_indicators:
  actor_type: service_account_or_workload
  action_type: write
  target_type: kubernetes_workload
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 1.1
  - 1.16
  - 1.17
  cis_azure_v2:
  - 1.1
  - 2.1
  - 3.1
  nist_800_53_r5:
  - AC-2
  - AC-3
  - AC-6
  - IA-2
  pci_dss_v4:
  - 7.1
  - 7.2
  - 8.2
  iso_27001_2022:
  - A.5.18
  - A.8.2
  - A.8.3
detection_events:
- pods/create with securityContext.privileged=true
- pods/create with hostPath mount to /
- seccomp profile disabled or unconfined
- Container process fork outside namespace
remediation: |
  1. Prevent privileged container execution via admission controllers.
  2. Enable read-only root filesystems for all container workloads.
  3. Apply Pod Security Standards (restricted profile) cluster-wide.
  4. Use gVisor or Kata Containers for additional hardware-level isolation.
references:
- https://attack.mitre.org/techniques/T1611/
- https://kubernetes.io/docs/concepts/security/pod-security-standards/
check_config:
  conditions:
    all:
    - field: operation
      op: equals
      value: pods/create
  log_source_type: aks_audit
version: '1.0'
