rule_id: azure.container.activity_log.aks_cluster_write
service: container
provider: azure
check_type: log
severity: high
title: 'Container: Aks Cluster Write'
description: AKS cluster created or modified — cluster configuration, RBAC, or network policy changed.
rationale: 'Adversaries create snapshots or data backups within cloud accounts to evade defenses and stage data for exfiltration. Snapshots can be shared with attacker-controlled accounts, mounted to attacker instances to bypass access restrictions on the original volume. Detected via: snapshot creation by unexpected or newly provisioned IAM users, rapid snapshot-create → cross-account share sequences, and snapshots from sensitive volumes without change-control approval.'
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1578.001
risk_score: 70
resource: aks_cluster
source: default
is_active: true
domain: container_and_kubernetes_security
action_category: create
log_source_type: activity_log
posture_category: security_posture
threat_tags:
- T1578.001
- T1578
- defense_evasion
- log_tampering
- kubernetes
- container_security
risk_indicators:
  actor_type: service_account_or_workload
  action_type: write
  target_type: kubernetes_workload
  blast_radius: resource_group
  stealth_risk: critical
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 3.1
  - 3.2
  - 3.3
  - 3.4
  cis_azure_v2:
  - 5.1
  - 5.2
  - 5.3
  nist_800_53_r5:
  - AU-2
  - AU-6
  - AU-12
  - SI-4
  pci_dss_v4:
  - 10.1
  - 10.2
  - 10.3
  iso_27001_2022:
  - A.8.15
  - A.8.16
  - A.5.28
detection_events:
- 'ec2:CreateSnapshot'
- 'ec2:ModifySnapshotAttribute (cross-account share)'
- Microsoft.Compute/snapshots/write
- Microsoft.Compute/disks/beginGetAccess/action
remediation: |
  1. Enforce golden image policies requiring only approved base images.
  2. Restrict CreateImage / image write permissions to CI/CD pipeline roles.
  3. Enable CSPM image scanning via Defender for Servers / Amazon Inspector.
references:
- https://attack.mitre.org/techniques/T1578/001/
check_config:
  conditions:
    all:
    - field: operation
      op: equals
      value: Microsoft.ContainerService/managedClusters/write
  log_source_type: activity_log
version: '1.0'
