rule_id: azure.compute.activity_log.vm_write
service: compute
provider: azure
check_type: log
severity: medium
title: 'Compute: Vm Write'
description: Virtual machine created or modified — new compute instance provisioned or configuration changed.
rationale: 'Adversaries create new instances or VMs within cloud accounts to execute from a clean environment that bypasses existing firewall rules and permissions tied to existing resources. Fresh compute resources are also used for cryptomining, C2 hosting, or as pivot points. Detected via: VM launch by rarely-used or newly-created accounts, instance creation from unexpected geographic locations, and large instance type selection.'
threat_category: execution
mitre_tactics:
- execution
mitre_techniques:
- T1578.002
risk_score: 50
resource: azure_vm
source: default
is_active: true
domain: compute_and_workload_security
action_category: create
log_source_type: activity_log
posture_category: workload_posture
threat_tags:
- T1578.002
- T1578
- remote_execution
- cloud_exec
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: compute_instance
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 3.1
  - 5.1
  cis_azure_v2:
  - 5.1
  - 6.1
  nist_800_53_r5:
  - CM-7
  - SI-3
  - AU-12
  pci_dss_v4:
  - 6.3
  - 10.2
  iso_27001_2022:
  - A.8.19
  - A.8.8
detection_events:
- 'ec2:RunInstances'
- Microsoft.Compute/virtualMachines/write
- 'containers:create with privileged=true'
remediation: |
  1. Restrict snapshot creation permissions to authorized backup roles.
  2. Alert on snapshot exports or cross-account snapshot copy operations.
  3. Enable encryption for all EBS / managed disk snapshots.
references:
- https://attack.mitre.org/techniques/T1578/002/
check_config:
  conditions:
    all:
    - field: operation
      op: equals
      value: Microsoft.Compute/virtualMachines/write
  log_source_type: activity_log
version: '1.0'
