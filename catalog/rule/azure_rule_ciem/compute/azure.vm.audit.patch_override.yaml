rule_id: azure.vm.audit.patch_override
service: compute
provider: azure
check_type: log
severity: medium
title: Identify VM patch state tampering or automated runbook sequences designed to
  bypass update compliance.
description: Identifies patch state tampering or runbooks to bypass updates.
rationale: Monitoring this activity is essential for detecting adversary defense evasion
  against AZURE resources. Unauthorized or unexpected API calls may indicate account
  compromise, privilege escalation, or an active attack chain.
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1562
risk_score: 72
resource: cloud_compute_instance
source: csv_generated
is_active: true
domain: logging_monitoring_and_alerting
action_category: modify
log_source_type: azure_activity_log
posture_category: threat_posture
threat_tags:
- T1562
- defense_evasion
- ciem_detection
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: high
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  cis_azure_v2:
  - '10.7'
remediation: '1. Immediately investigate the principal that performed this action
  — treat as potentially compromised.

  2. Restore any disabled/deleted security controls (logging, agents, scanning).

  3. Review the full session context for lateral movement or data exfiltration following
  this action.

  4. Restrict the ability to disable security tools to break-glass roles with MFA
  enforcement.

  5. Add SCPs/Organization Policies to prevent non-authorized disablement of security
  controls.'
references:
- https://attack.mitre.org/techniques/T1562/
- https://docs.microsoft.com/azure/active-directory/
check_config:
  conditions:
    all:
    - field: operation
      op: in
      value:
      - Microsoft.Compute/virtualMachines/write
      - Microsoft.Automation/automationAccounts/runbooks/publish/action
  type: log
  version: '1.0'
