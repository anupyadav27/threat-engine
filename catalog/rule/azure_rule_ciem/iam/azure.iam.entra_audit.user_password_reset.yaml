rule_id: azure.iam.entra_audit.user_password_reset
service: iam
provider: azure
check_type: log
severity: high
title: 'IAM: User Password Reset'
description: User password reset — attacker may have taken over account via credential reset.
rationale: Adding credentials to accounts enables persistence and lateral movement using existing trusted identities, potentially bypassing MFA and conditional access policies.
threat_category: credential_access
mitre_tactics:
- credential_access
mitre_techniques:
- T1098.001
risk_score: 78
resource: entra_user
source: default
is_active: true
domain: identity_and_access_management
action_category: read
log_source_type: entra_audit
posture_category: iam_posture
threat_tags:
- T1098.001
- T1098
- credential_access
- secret_exposure
- cloud_iam
- identity
risk_indicators:
  actor_type: iam_user_or_role
  action_type: read
  target_type: iam_identity
  blast_radius: account
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - password_policy
  - access_control
data_security:
  applicable: true
  modules:
  - data_access_governance
  categories:
  - secrets_exposure
  - credential_theft
  priority: high
  impact:
    pci: PCI DSS Requirement 12.3 — Implement security awareness program and protect systems
    gdpr: GDPR Article 32 — Appropriate technical and organizational measures for data security
    hipaa: §164.306(a) — Ensure confidentiality, integrity, and availability of ePHI
  sensitive_data_context: |
  Unauthorized credential access on iam resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks:
  cis_aws_v3:
  - 1.14
  - 1.19
  - 2.1
  cis_azure_v2:
  - 1.3
  - 1.4
  - 8.1
  nist_800_53_r5:
  - IA-5
  - IA-8
  - SC-28
  pci_dss_v4:
  - 8.2
  - 8.3
  - 8.6
  iso_27001_2022:
  - A.8.5
  - A.9.4
  - A.9.2
remediation: |
  1. Revoke the newly added credential immediately.
  2. Review all credentials associated with the account.
  3. Investigate the actor's session for additional malicious activity.
  4. Enforce MFA and conditional access policies for all credential operations.
  5. Use Privileged Identity Management (PIM) for just-in-time access.
references:
- https://attack.mitre.org/techniques/T1098/001/
- https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_access-keys.html
check_config:
  conditions:
    all:
    - field: operation
      op: equals
      value: microsoft.directory/users/password/update
  log_source_type: entra_audit
version: '1.0'
