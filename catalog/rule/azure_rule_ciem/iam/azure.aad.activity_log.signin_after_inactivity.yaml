rule_id: azure.aad.activity_log.signin_after_inactivity
service: iam
provider: azure
check_type: log
severity: medium
title: Alert on sign-in for accounts inactive >90 days, and chain where inactive account
  is re-enabled then quickly disabled
description: Detects sign-in after long inactivity and account re-enablement.
rationale: Monitoring this activity is essential for detecting adversary initial access
  against AZURE resources. Unauthorized or unexpected API calls may indicate account
  compromise, privilege escalation, or an active attack chain.
threat_category: initial_access
mitre_tactics:
- initial_access
- persistence
mitre_techniques:
- T1078
- T1078.004
risk_score: 72
resource: cloud_iam_principal
source: csv_generated
is_active: true
domain: identity_and_access_management
action_category: audit_activity
log_source_type: azure_activity_log
posture_category: threat_posture
threat_tags:
- T1078
- T1078.004
- initial_access
- persistence
- ciem_detection
risk_indicators:
  actor_type: cloud_principal
  action_type: read
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks: {}
remediation: '1. Disable the dormant/inactive account immediately after investigation.

  2. Audit all actions taken during the re-activation session.

  3. Enforce automatic account deactivation after 90 days of inactivity.

  4. Require MFA and manager approval for account reactivation.

  5. Alert on first login after extended inactivity periods.'
references:
- https://attack.mitre.org/techniques/T1078/
- https://attack.mitre.org/techniques/T1078.004/
- https://docs.microsoft.com/azure/active-directory/
check_config:
  conditions:
    all:
    - field: operation
      op: in
      value:
      - microsoft.aad/signIn/read
      - microsoft.aad/users/enable/action
  type: log
  version: '1.0'
