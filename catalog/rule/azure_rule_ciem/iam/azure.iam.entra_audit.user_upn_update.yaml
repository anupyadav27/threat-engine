rule_id: azure.iam.entra_audit.user_upn_update
service: iam
provider: azure
check_type: log
severity: medium
title: 'IAM: User Upn Update'
description: User principal name changed — identity renamed, may evade detection based on username.
rationale: 'Cloud account compromise enables access to all resources within the account''s permission scope. Attackers leverage valid credentials to avoid detection and pivot across cloud services.'
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1078.004
risk_score: 55
resource: entra_user
source: default
is_active: true
domain: logging_monitoring_and_alerting
action_category: modify
log_source_type: entra_audit
posture_category: security_posture
threat_tags:
- T1078.004
- T1078
- defense_evasion
- log_tampering
- cloud_iam
- identity
risk_indicators:
  actor_type: iam_user_or_role
  action_type: write
  target_type: iam_identity
  blast_radius: account
  stealth_risk: critical
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_aws_v3:
  - 3.1
  - 3.2
  - 3.3
  - 3.4
  cis_azure_v2:
  - 5.1
  - 5.2
  - 5.3
  nist_800_53_r5:
  - AU-2
  - AU-6
  - AU-12
  - SI-4
  pci_dss_v4:
  - 10.1
  - 10.2
  - 10.3
  iso_27001_2022:
  - A.8.15
  - A.8.16
  - A.5.28
remediation: |
  1. Immediately suspend the compromised account and revoke active sessions.
  2. Reset credentials and enforce MFA enrollment.
  3. Review all API calls and resource accesses made by the account.
  4. Investigate sign-in logs for source IP and geolocation anomalies.
  5. Enable Microsoft Entra ID Protection / AWS GuardDuty credential anomaly alerts.
references:
- https://attack.mitre.org/techniques/T1078/004/
- https://docs.aws.amazon.com/IAM/latest/UserGuide/best-practices.html
- https://learn.microsoft.com/en-us/azure/active-directory/identity-protection/overview-identity-protection
check_config:
  conditions:
    all:
    - field: operation
      op: equals
      value: microsoft.directory/users/userPrincipalName/update
  log_source_type: entra_audit
version: '1.0'
