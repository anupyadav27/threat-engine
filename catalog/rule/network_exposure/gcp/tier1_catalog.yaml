# =============================================================================
# IEDS Tier 1 — GCP always-public resource types
# =============================================================================

rules:

  - rule_id: IEDS-T1-GCP-001
    tier: 1
    csp: gcp
    resource_type: cloudrun.service
    origin_type: internet
    title: "GCP Cloud Run service is internet-accessible by default"
    severity: high

  - rule_id: IEDS-T1-GCP-002
    tier: 1
    csp: gcp
    resource_type: cloudfunctions.function
    origin_type: internet
    title: "GCP Cloud Function is internet-accessible when ingress=all"
    severity: high

  - rule_id: IEDS-T1-GCP-003
    tier: 1
    csp: gcp
    resource_type: appengine.application
    origin_type: internet
    title: "GCP App Engine application is internet-accessible by default"
    severity: medium
