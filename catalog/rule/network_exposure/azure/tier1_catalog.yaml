# =============================================================================
# IEDS Tier 1 — Azure always-public resource types
# resource_type uses short catalog names matching di_resource_catalog.resource_type
# =============================================================================

rules:

  - rule_id: IEDS-T1-AZR-001
    tier: 1
    csp: azure
    resource_type: cdnprofiles
    origin_type: internet
    title: "Azure CDN profile endpoint is internet-accessible by default"
    severity: medium

  - rule_id: IEDS-T1-AZR-002
    tier: 1
    csp: azure
    resource_type: apimanagementservice
    origin_type: internet
    title: "Azure API Management service is internet-accessible by default"
    severity: high

  - rule_id: IEDS-T1-AZR-003
    tier: 1
    csp: azure
    resource_type: sites
    origin_type: internet
    title: "Azure App Service / Function App is internet-accessible by default"
    severity: high

  - rule_id: IEDS-T1-AZR-004
    tier: 1
    csp: azure
    resource_type: frontdoors
    origin_type: internet
    title: "Azure Front Door is internet-accessible by default"
    severity: medium
