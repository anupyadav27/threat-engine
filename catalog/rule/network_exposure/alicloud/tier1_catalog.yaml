# =============================================================================
# IEDS Tier 1 — AliCloud always-public resource types
# =============================================================================

rules:

  - rule_id: IEDS-T1-ALI-001
    tier: 1
    csp: alicloud
    resource_type: apigateway.api
    origin_type: internet
    title: "AliCloud API Gateway API is internet-accessible by default"
    severity: high

  - rule_id: IEDS-T1-ALI-002
    tier: 1
    csp: alicloud
    resource_type: fc.service
    origin_type: internet
    title: "AliCloud Function Compute service is internet-accessible"
    severity: high
