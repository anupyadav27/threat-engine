# =============================================================================
# IEDS Tier 2 — AliCloud ECS and SLB
# =============================================================================

rules:

  - rule_id: IEDS-T2-ALI-001
    tier: 2
    csp: alicloud
    resource_type: ecs.instance
    origin_type: internet
    title: "AliCloud ECS instance has a public IP (internet_charge_type or EIP)"
    severity: high
    required_emitted_fields:
      - public_ip_address
    exposure_conditions:
      - field: public_ip_address
        operator: not_empty

  - rule_id: IEDS-T2-ALI-002
    tier: 2
    csp: alicloud
    resource_type: slb.loadbalancer
    origin_type: internet
    title: "AliCloud SLB is internet-facing"
    severity: high
    required_emitted_fields:
      - internet_facing
    exposure_conditions:
      - field: internet_facing
        operator: eq
        value: true

  - rule_id: IEDS-T2-ALI-003
    tier: 2
    csp: alicloud
    resource_type: rds.dbinstance
    origin_type: internet
    title: "AliCloud RDS instance has a public IP address"
    severity: critical
    required_emitted_fields:
      - public_ip_address
    exposure_conditions:
      - field: public_ip_address
        operator: not_null
