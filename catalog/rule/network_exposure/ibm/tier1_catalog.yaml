# =============================================================================
# IEDS Tier 1 — IBM Cloud always-public resource types
# =============================================================================

rules:

  - rule_id: IEDS-T1-IBM-001
    tier: 1
    csp: ibm
    resource_type: apigw.api
    origin_type: internet
    title: "IBM API Gateway API is internet-accessible by default"
    severity: high

  - rule_id: IEDS-T1-IBM-002
    tier: 1
    csp: ibm
    resource_type: functions.namespace
    origin_type: internet
    title: "IBM Cloud Functions namespace is internet-accessible"
    severity: medium
