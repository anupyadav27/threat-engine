# =============================================================================
# IEDS Tier 2 — IBM Cloud VSI (Virtual Server Instances) and Load Balancers
# =============================================================================

rules:

  - rule_id: IEDS-T2-IBM-001
    tier: 2
    csp: ibm
    resource_type: is.instance
    origin_type: internet
    title: "IBM VPC VSI has a floating IP attached"
    description: >
      IBM VPC Virtual Server Instances with a floating IP (public IP) attached
      are directly reachable from the internet.
      NOTE: IBM VPC instance discovery YAML does not yet emit floating_ips.
      Gap tracked: IEDS-GAP-IBM-001 — add floating_ips to VSI discovery emit.
      Using 'id' as placeholder until floating_ips is emitted.
    severity: high
    required_emitted_fields:
      - id
    exposure_conditions:
      - field: id
        operator: not_null

  - rule_id: IEDS-T2-IBM-002
    tier: 2
    csp: ibm
    resource_type: is.load-balancer
    origin_type: internet
    title: "IBM VPC Load Balancer is public (internet-facing)"
    severity: high
    required_emitted_fields:
      - is_public
    exposure_conditions:
      - field: is_public
        operator: eq
        value: true
