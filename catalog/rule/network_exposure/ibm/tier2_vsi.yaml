# =============================================================================
# IEDS Tier 2 — IBM Cloud VSI (Virtual Server Instances) and Load Balancers
# =============================================================================

rules:

  - rule_id: IEDS-T2-IBM-001
    tier: 2
    csp: ibm
    resource_type: is.instance
    origin_type: internet
    title: "IBM VPC VSI has a floating IP attached"
    description: >
      IBM VPC Virtual Server Instances with a floating IP (public IP) attached to any
      NIC are directly reachable from the internet. The network_interfaces list is checked
      for any entry with a non-empty floating_ips array. GAP IEDS-GAP-IBM-001 resolved —
      network_interfaces now emitted from ibm.vpc.list-instances step6 YAML.
    severity: high
    required_emitted_fields:
      - network_interfaces
    exposure_conditions:
      - field: network_interfaces
        operator: any_has_non_empty
        value: floating_ips

  - rule_id: IEDS-T2-IBM-002
    tier: 2
    csp: ibm
    resource_type: is.load-balancer
    origin_type: internet
    title: "IBM VPC Load Balancer is public (internet-facing)"
    severity: high
    required_emitted_fields:
      - is_public
    exposure_conditions:
      - field: is_public
        operator: eq
        value: true
