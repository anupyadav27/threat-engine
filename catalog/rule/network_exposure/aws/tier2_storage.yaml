# =============================================================================
# IEDS Tier 2 — AWS Storage (S3, OpenSearch, Elasticsearch, Redshift)
# =============================================================================

rules:

  - rule_id: IEDS-T2-AWS-010
    tier: 2
    csp: aws
    resource_type: s3.bucket
    origin_type: internet
    title: "AWS S3 bucket has public access enabled"
    description: >
      S3 buckets with BlockPublicAcls=false can be made public via ACLs.
      The discovery YAML emits BlockPublicAcls / BlockPublicPolicy as top-level fields
      (not wrapped in public_access_block_configuration).
    severity: high
    required_emitted_fields:
      - block_public_acls
    exposure_conditions:
      - field: block_public_acls
        operator: eq
        value: false

  - rule_id: IEDS-T2-AWS-011
    tier: 2
    csp: aws
    resource_type: opensearch.domain
    origin_type: internet
    title: "AWS OpenSearch domain is internet-accessible"
    description: >
      OpenSearch domains with VPC=false (endpoint_options.vpc_endpoint_service_name is null)
      and an internet endpoint are directly reachable from the public internet.
    severity: critical
    required_emitted_fields:
      - endpoint
    exposure_conditions:
      - field: endpoint
        operator: not_null

  - rule_id: IEDS-T2-AWS-012
    tier: 2
    csp: aws
    resource_type: redshift.cluster
    origin_type: internet
    title: "AWS Redshift cluster is publicly accessible"
    severity: critical
    required_emitted_fields:
      - publicly_accessible
    exposure_conditions:
      - field: publicly_accessible
        operator: eq
        value: true
