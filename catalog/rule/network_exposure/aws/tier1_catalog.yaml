# =============================================================================
# IEDS Tier 1 — AWS always-public resource types
# Tier 1 = catalog flag only; exposure is structural (no field check needed).
# These resource types are ALWAYS internet-accessible by design.
# The loader sets network_exposure_tier=1 in di_resource_catalog for each entry.
# =============================================================================
# Schema: rule_id, tier, csp, resource_type, origin_type, title, severity
# Tier 1 rules have empty required_emitted_fields and exposure_conditions.

rules:

  # ---- API Gateway ----
  - rule_id: IEDS-T1-AWS-001
    tier: 1
    csp: aws
    resource_type: apigateway.restapi
    origin_type: internet
    title: "AWS API Gateway REST API is internet-accessible by default"
    severity: high

  - rule_id: IEDS-T1-AWS-002
    tier: 1
    csp: aws
    resource_type: apigateway.httpapi
    origin_type: internet
    title: "AWS API Gateway HTTP API is internet-accessible by default"
    severity: high

  - rule_id: IEDS-T1-AWS-003
    tier: 1
    csp: aws
    resource_type: apigatewayv2.api
    origin_type: internet
    title: "AWS API Gateway v2 API is internet-accessible by default"
    severity: high

  # ---- CloudFront ----
  - rule_id: IEDS-T1-AWS-004
    tier: 1
    csp: aws
    resource_type: cloudfront.distribution
    origin_type: internet
    title: "AWS CloudFront distribution is internet-accessible by default"
    severity: medium

  # ---- Lambda Function URL ----
  - rule_id: IEDS-T1-AWS-005
    tier: 1
    csp: aws
    resource_type: lambda.functionurl
    origin_type: internet
    title: "AWS Lambda Function URL is publicly accessible when auth_type=NONE"
    severity: critical

  # ---- S3 Website Hosting ----
  - rule_id: IEDS-T1-AWS-006
    tier: 1
    csp: aws
    resource_type: s3.bucket
    origin_type: internet
    title: "AWS S3 bucket static website hosting endpoint is publicly accessible"
    severity: high

  # ---- Route53 / DNS ----
  - rule_id: IEDS-T1-AWS-007
    tier: 1
    csp: aws
    resource_type: route53.hostedzone
    origin_type: internet
    title: "AWS Route53 public hosted zone is internet-accessible"
    severity: low

  # ---- Global Accelerator ----
  - rule_id: IEDS-T1-AWS-008
    tier: 1
    csp: aws
    resource_type: globalaccelerator.accelerator
    origin_type: internet
    title: "AWS Global Accelerator is internet-accessible by default"
    severity: medium

  # ---- AppSync / GraphQL ----
  - rule_id: IEDS-T1-AWS-009
    tier: 1
    csp: aws
    resource_type: appsync.graphqlapi
    origin_type: internet
    title: "AWS AppSync GraphQL API is internet-accessible by default"
    severity: high
