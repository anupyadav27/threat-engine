# =============================================================================
# IEDS Tier 1 — OCI always-public resource types
# =============================================================================

rules:

  - rule_id: IEDS-T1-OCI-001
    tier: 1
    csp: oci
    resource_type: apigateway.gateway
    origin_type: internet
    title: "OCI API Gateway is internet-accessible by default"
    severity: high

  - rule_id: IEDS-T1-OCI-002
    tier: 1
    csp: oci
    resource_type: functions.application
    origin_type: internet
    title: "OCI Functions application endpoint is internet-accessible"
    severity: high
