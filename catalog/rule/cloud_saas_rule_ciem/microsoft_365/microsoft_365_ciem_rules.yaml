  - rule_id: tciem.microsoft_365.l2_ensure_anonymous_users_can_t_join_a_meeting
    title: "(L2) Ensure anonymous users can't join a meeting"
    severity: medium
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '8.5.1'
    cis_section: '8'
    log_source: "Microsoft 365 Unified Audit Log"
    detection:
      event_type: resource_access
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft Teams admin center
      https://admin.teams.microsoft.com. 2. Click to expand Meetings select Meeting
      policies. 3. Click Global (Org-wide default) 4. Under meeting join & lobby set
      Anonymous users can join a meeting unverified to Off. To remediate using
      PowerShell: 1. Connect to Teams PowerShell using Connect-MicrosoftTeams 2. Run
      the following command to set the recommended state: Set-CsTeamsMeetingPolicy
      -Identity Global -AllowAnonymousUsersToJoinMeeting $false Default Value: On
      (True) References: 1. https://learn.microsoft.com/en-us/defender-
      office-365/step-by-step- guides/reducing-attack-surface-in-microsoft-
      teams?view=o365- worldwide#configure-meeting-settings 2.
      https://learn.microsoft.com/en-us/microsoftteams/settings-policies-
      reference?WT.mc_id=TeamsAdminCenterCSH#meeting-join--lobby 3.
      https://learn.microsoft.com/en-us/MicrosoftTeams/configure-meetings-sensitive-
      protection 4. https://learn.microsoft.com/en-us/microsoftteams/anonymous-
      users-in-meetings 5. https://learn.microsoft.com/en-us/microsoftteams/plan-
      meetings-external- participants

