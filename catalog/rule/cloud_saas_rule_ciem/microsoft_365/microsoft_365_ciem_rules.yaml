  - rule_id: tciem.microsoft_365.l1_ensure_guest_access_to_a_site_or_onedrive_will
    title: "(L1) Ensure guest access to a site or OneDrive will expire automatically"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '7.2.9'
    cis_section: '7'
    log_source: "Microsoft 365 Unified Audit Log"
    detection:
      event_type: resource_access
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      To remediate using the UI: 1. Navigate to SharePoint admin center
      https://admin.microsoft.com/sharepoint 2. Click to expand Policies > Sharing.
      3. Scroll to and expand More external sharing settings. 4. Set Guest access to
      a site or OneDrive will expire automatically after this many days to 30 To
      remediate using PowerShell: 1. Connect to SharePoint Online service using
      Connect-SPOService. 2. Run the following cmdlet: Set-SPOTenant
      -ExternalUserExpireInDays 30 -ExternalUserExpirationRequired $True Default
      Value: ExternalUserExpirationRequired $false ExternalUserExpireInDays 60 days
      References: 1. https://learn.microsoft.com/en-us/sharepoint/turn-external-
      sharing-on-or- off#change-the-organization-level-external-sharing-setting 2.
      https://learn.microsoft.com/en-us/microsoft-365/community/sharepoint-
      security-a- team-effort

