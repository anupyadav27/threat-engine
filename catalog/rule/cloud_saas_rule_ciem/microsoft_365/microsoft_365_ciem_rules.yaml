      ExchangeOnline. 2. Run the following PowerShell command: Set-
      OrganizationConfig -AuditDisabled $false Default Value: False References: 1.
      https://learn.microsoft.com/en-us/purview/audit-mailboxes?view=o365-worldwide
      2. https://learn.microsoft.com/en-us/powershell/module/exchange/set-
      organizationconfig?view=exchange-ps#-auditdisabled

  - rule_id: tciem.microsoft_365.l1_ensure_mailbox_audit_actions_are_configured
    title: "(L1) Ensure mailbox audit actions are configured"
    severity: high
    mitre_technique: T1562
    mitre_tactic: defense_evasion
    cis_control: '6.1.2'
    cis_section: '6'
    log_source: "Microsoft 365 Unified Audit Log"
    detection:
      event_type: audit_event
      filters:
        change_type: security_relevant
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      For each UserMailbox ensure AuditEnabled is True and the following audit
      actions are included in addition to default actions of each sign-in type. •
      Admin actions: Copy, FolderBind and Move. • Delegate actions: FolderBind and
      Move. • Owner actions: Create, MailboxLogin and Move. Note: The defaults can
      be found in the Default Value section and the combined total can be found in
      the scripts of the Audit/Remediation sections. To remediate using PowerShell:
      1. Connect to Exchange Online using Connect-ExchangeOnline. 2. Run the
      following PowerShell script to remediate every 'UserMailbox' in the
      organization: $AuditAdmin = @( 'ApplyRecord', 'Copy', 'Create', 'FolderBind',
      'HardDelete', 'MailItemsAccessed', 'Move', 'MoveToDeletedItems', 'SendAs',
      'SendOnBehalf', 'Send', 'SoftDelete', 'Update', 'UpdateCalendarDelegation',
      'UpdateFolderPermissions', 'UpdateInboxRules' ) $AuditDelegate = @(
      'ApplyRecord', 'Create', 'FolderBind', 'HardDelete', 'Move',
      'MailItemsAccessed', 'MoveToDeletedItems', 'SendAs', 'SendOnBehalf',
      'SoftDelete', 'Update', 'UpdateFolderPermissions', 'UpdateInboxRules' )
      $AuditOwner = @( 'ApplyRecord', 'Create', 'HardDelete', 'MailboxLogin',
      'Move', 'MailItemsAccessed', 'MoveToDeletedItems', 'Send', 'SoftDelete',
      'Update', 'UpdateCalendarDelegation', 'UpdateFolderPermissions',
      'UpdateInboxRules' ) $MBX = Get-EXOMailbox -ResultSize Unlimited | Where-
      Object { $_.RecipientTypeDetails -eq 'UserMailbox' } $MBX | Set-Mailbox
      -AuditEnabled $true ` -AuditLogAgeLimit 180 -AuditAdmin $AuditAdmin
      -AuditDelegate $AuditDelegate ` -AuditOwner $AuditOwner 3. The script will
      apply the prescribed Audit Actions for each sign-in type (Owner, Delegate,
      Admin) and the AuditLogAgeLimit to each UserMailbox in the organization. Note:
      Mailboxes with Audit (Premium) licenses, which is included with E5, can retain
      audit logs beyond 180 days. Default Value: AuditEnabled: True for all
      mailboxes except below: • Resource Mailboxes • Public Folder Mailboxes •
      DiscoverySearch Mailbox AuditAdmin: ApplyRecord, Create, HardDelete,
      MailItemsAccessed, MoveToDeletedItems, Send, SendAs, SendOnBehalf, SoftDelete,
      Update, UpdateCalendarDelegation, UpdateFolderPermissions, UpdateInboxRules
      AuditDelegate: ApplyRecord, Create, HardDelete, MailItemsAccessed,
      MoveToDeletedItems, SendAs, SendOnBehalf, SoftDelete, Update,
      UpdateFolderPermissions, UpdateInboxRules AuditOwner: ApplyRecord, HardDelete,
      MailItemsAccessed, MoveToDeletedItems, Send, SoftDelete, Update,
      UpdateCalendarDelegation, UpdateFolderPermissions, UpdateInboxRules
      References: 1. https://learn.microsoft.com/en-us/purview/audit-
      mailboxes?view=o365-worldwide

  - rule_id: tciem.microsoft_365.l1_ensure_auditbypassenabled_is_not_enabled_on
    title: "(L1) Ensure 'AuditBypassEnabled' is not enabled on mailboxes"
    severity: high
    mitre_technique: T1562
    mitre_tactic: defense_evasion
    cis_control: '6.1.3'
    cis_section: '6'
    log_source: "Microsoft 365 Unified Audit Log"
    detection:
      event_type: audit_event
      filters:
        change_type: security_relevant
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      To remediate using PowerShell: 1. Connect to Exchange Online using Connect-
      ExchangeOnline. 2. The following example PowerShell script will disable
      AuditBypass for all mailboxes which currently have it enabled: # Get mailboxes
      with AuditBypassEnabled set to $true $MBXAudit = Get-
      MailboxAuditBypassAssociation -ResultSize unlimited | Where- Object {
      $_.AuditBypassEnabled -eq $true } foreach ($mailbox in $MBXAudit) {
      $mailboxName = $mailbox.Name Set-MailboxAuditBypassAssociation -Identity
      $mailboxName - AuditBypassEnabled $false Write-Host 'Audit Bypass disabled for
      mailbox Identity: $mailboxName' - ForegroundColor Green } Default Value:
      AuditBypassEnabled False References: 1. https://learn.microsoft.com/en-
      us/powershell/module/exchange/get-
      mailboxauditbypassassociation?view=exchange-ps

  - rule_id: tciem.microsoft_365.l2_ensure_users_installing_outlook_add_ins_is_not
    title: "(L2) Ensure users installing Outlook add-ins is not allowed"
    severity: medium
    mitre_technique: T1530
    mitre_tactic: collection
    cis_control: '6.3.1'
    cis_section: '6'
    log_source: "Microsoft 365 Unified Audit Log"
    detection:
      event_type: data_access
      threshold: 1
      filters:
        data_classification: sensitive
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      To remediate using the UI: 1. Navigate to Exchange admin center
      https://admin.exchange.microsoft.com. 2. Click to expand Roles select User
      roles. 3. Select Default Role Assignment Policy. 4. In the properties pane on
      the right click on Manage permissions. 5. Under Other roles uncheck My Custom
      Apps, My Marketplace Apps and My ReadWriteMailboxApps. 6. Click Save changes.
      To remediate using PowerShell: 1. Connect to Exchange Online using Connect-
      ExchangeOnline. 2. Run the following command: $policy = 'Role Assignment
      Policy - Prevent Add-ins' $roles = 'MyTextMessaging', 'MyDistributionGroups',
      ` 'MyMailSubscriptions', 'MyBaseOptions', 'MyVoiceMail', `
      'MyProfileInformation', 'MyContactInformation', 'MyRetentionPolicies', `
      'MyDistributionGroupMembership' New-RoleAssignmentPolicy -Name $policy -Roles
      $roles Set-RoleAssignmentPolicy -id $policy -IsDefault # Assign new policy to
      all mailboxes Get-EXOMailbox -ResultSize Unlimited | Set-Mailbox
      -RoleAssignmentPolicy $policy If you have other Role Assignment Policies
      modify the last line to filter out your custom policies Default Value: UI - My
      Custom Apps, My Marketplace Apps, and My ReadWriteMailboxApps are checked
      PowerShell - My Custom Apps My Marketplace Apps and My ReadWriteMailboxApps
      are assigned References: 1. https://learn.microsoft.com/en-
      us/exchange/clients-and-mobile-in-exchange- online/add-ins-for-
      outlook/specify-who-can-install-and-manage-add- ins?source=recommendations 2.
      https://learn.microsoft.com/en-us/exchange/permissions-exo/role-assignment-
      policies

