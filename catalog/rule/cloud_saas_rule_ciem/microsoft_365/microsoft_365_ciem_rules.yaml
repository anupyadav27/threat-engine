# MICROSOFT_365 — CIEM Detection Rules
# Real-time authentication & access event analysis
# Log source: Microsoft 365 Unified Audit Log

tech_type: microsoft_365
category: cloud_saas
log_source: Microsoft 365 Unified Audit Log

rules:

  - rule_id: tciem.microsoft_365.l1_ensure_administrative_accounts_are_cloud_only
    title: "(L1) Ensure Administrative accounts are cloud-only"
    severity: high
    mitre_technique: T1068
    mitre_tactic: privilege_escalation
    cis_control: '1.1.1'
    cis_section: '1'
    log_source: "Microsoft 365 Unified Audit Log"
    detection:
      event_type: privilege_change
      filters:
        action_in: [GRANT, ROLE_ADD, ELEVATION, SUDO]
        target_privilege_in: [admin, superuser, root, dba, wheel]
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Remediation will require first identifying the privileged accounts that are
      synced from on- premises and then creating a new cloud-only account for that
      user. Once a replacement account is established, the hybrid account should
      have its role reduced to that of a non- privileged user or removed depending
      on the need. Default Value: N/A References: 1. https://learn.microsoft.com/en-
      us/microsoft-365/admin/add-users/add- users?view=o365-worldwide 2.
      https://learn.microsoft.com/en-us/microsoft-365/enterprise/protect-your-
      global- administrator-accounts?view=o365-worldwide 3.
      https://learn.microsoft.com/en-us/entra/identity/role-based-access-
      control/best- practices#9-use-cloud-native-accounts-for-microsoft-entra-roles
      4. https://learn.microsoft.com/en-us/entra/fundamentals/whatis 5.
      https://learn.microsoft.com/en-us/entra/identity/role-based-access-
      control/permissions-reference

  - rule_id: tciem.microsoft_365.l1_ensure_administrative_accounts_use_licenses
    title: "(L1) Ensure administrative accounts use licenses with a reduced application footprint"
    severity: high
    mitre_technique: T1068
    mitre_tactic: privilege_escalation
    cis_control: '1.1.4'
    cis_section: '1'
    log_source: "Microsoft 365 Unified Audit Log"
    detection:
      event_type: privilege_change
      filters:
        action_in: [GRANT, ROLE_ADD, ELEVATION, SUDO]
        target_privilege_in: [admin, superuser, root, dba, wheel]
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft 365 admin center
      https://admin.microsoft.com. 2. Click to expand Users select Active users 3.
      Click Add a user. 4. Fill out the appropriate fields for Name, user, etc. 5.
      When prompted to assign licenses select as needed Microsoft Entra ID P1 or
      Microsoft Entra ID P2, then click Next. 6. Under the Option settings screen
      you may choose from several types of privileged roles. Choose Admin center
      access followed by the appropriate role then click Next. 7. Select Finish
      adding. Note: Utilizing PIM to best practices will satisfy this control. CIS
      and Microsoft recommend an organization keep zero permanently active
      assignments for roles other than emergency access accounts. Default Value: N/A
      References: 1. https://learn.microsoft.com/en-
      us/microsoft-365/enterprise/protect-your-global- administrator-
      accounts?view=o365-worldwide 2. https://learn.microsoft.com/en-
      us/entra/fundamentals/whatis#what-are-the- microsoft-entra-id-licenses 3.
      https://learn.microsoft.com/en-us/entra/identity/role-based-access-
      control/permissions-reference 4. https://learn.microsoft.com/en-
      us/microsoft-365/business-premium/m365bp- protect-admin-
      accounts?view=o365-worldwide 5. https://learn.microsoft.com/en-
      us/microsoft-365/enterprise/subscriptions-licenses- accounts-and-tenants-for-
      microsoft-cloud-offerings?view=o365- worldwide#licenses 6.
      https://learn.microsoft.com/en-us/entra/id-governance/privileged-identity-
      management/pim-deployment-plan#principle-of-least-privilege

  - rule_id: tciem.microsoft_365.l2_ensure_that_only_organizationally_managed
    title: "(L2) Ensure that only organizationally managed/approved public groups exist"
    severity: medium
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '1.2.1'
    cis_section: '1'
    log_source: "Microsoft 365 Unified Audit Log"
    detection:
      event_type: resource_access
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft 365 admin center
      https://admin.microsoft.com. 2. Click to expand Teams & groups select Active
      teams & groups.. 3. On the Active teams and groups page , select the group's
      name that is public. 4. On the popup groups name page , Select Settings. 5.
      Under Privacy, select Private. Default Value: Public when created from the
      Administration portal; private otherwise. References: 1.
      https://learn.microsoft.com/en-us/entra/identity/users/groups-self-service-
      management 2. https://learn.microsoft.com/en-us/microsoft-365/admin/create-
      groups/compare- groups?view=o365-worldwide

  - rule_id: tciem.microsoft_365.l1_ensure_sign_in_to_shared_mailboxes_is_blocked
    title: "(L1) Ensure sign-in to shared mailboxes is blocked"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '1.2.2'
    cis_section: '1'
    log_source: "Microsoft 365 Unified Audit Log"
    detection:
      event_type: authentication_success
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft 365 admin center
      https://admin.microsoft.com/ 2. Click to expand Teams & groups and select
      Shared mailboxes. 3. Take note of all shared mailboxes. 4. Click to expand
      Users and select Active users. 5. Select a shared mailbox account to open it's
      properties pane and then select Block sign-in. 6. Check the box for Block this
      user from signing in. 7. Repeat for any additional shared mailboxes. To
      remediate using PowerShell: 1. Connect to Microsoft Graph using Connect-
      MgGraph -Scopes 'User.ReadWrite.All' 2. Connect to Exchange Online using
      Connect-ExchangeOnline. 3. To disable sign-in for a single account: $MBX =
      Get-EXOMailbox -Identity TestUser@example.com Update-MgUser -UserId
      $MBX.ExternalDirectoryObjectId -AccountEnabled:$false 3. The following will
      block sign-in to all Shared Mailboxes. $MBX = Get-EXOMailbox
      -RecipientTypeDetails SharedMailbox $MBX | ForEach-Object { Update-MgUser
      -UserId $_.ExternalDirectoryObjectId - AccountEnabled:$false } Default Value:
      AccountEnabled: True References: 1. https://learn.microsoft.com/en-
      us/microsoft-365/admin/email/about-shared- mailboxes?view=o365-worldwide 2.
      https://learn.microsoft.com/en-us/microsoft-365/admin/email/create-a-shared-
      mailbox?view=o365-worldwide#block-sign-in-for-the-shared-mailbox-account 3.
      https://learn.microsoft.com/en-us/microsoft-365/enterprise/block-user-
      accounts- with-microsoft-365-powershell?view=o365-worldwide#block-individual-
      user- accounts

  - rule_id: tciem.microsoft_365.l2_ensure_idle_session_timeout_is_set_to_3_hours
    title: "(L2) Ensure 'Idle session timeout' is set to '3 hours (or less)' for unmanaged devices"
    severity: medium
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '1.3.2'
    cis_section: '1'
    log_source: "Microsoft 365 Unified Audit Log"
    detection:
      event_type: resource_access
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Step 1 - Configure Idle session timeout: 1. Navigate to the Microsoft 365
      admin center https://admin.microsoft.com/. 2. Click to expand Settings Select
      Org settings. 3. Click Security & Privacy tab. 4. Select Idle session timeout.
      5. Check the box Turn on to set the period of inactivity for users to be
      signed off of Microsoft 365 web apps 6. Set a maximum value of 3 hours. 7.
      Click save. Step 2 - Ensure the Conditional Access policy is in place: 1.
      Navigate to Microsoft Entra admin center https://entra.microsoft.com/ 2.
      Expand Protect > Conditional Access. 3. Click New policy and give the policy a
      name. o Select Users > All users. o Select Cloud apps or actions > Select apps
      and select Office 365 o Select Conditions > Client apps > Yes check only
      Browser unchecking all other boxes. o Select Sessions and check Use app
      enforced restrictions. 4. Set Enable policy to On and click Create. Note: To
      ensure that idle timeouts affect only unmanaged devices, both steps 1 and 2
      must be completed. Otherwise managed devices will also be impacted by the
      timeout policy. Default Value: Not configured. (Idle sessions will not
      timeout.) References: 1. https://learn.microsoft.com/en-
      us/microsoft-365/admin/manage/idle-session- timeout-web-
      apps?view=o365-worldwide Additional Information: According to Microsoft idle
      session timeout isn't supported when third party cookies are disabled in the
      browser. Users won't see any sign-out prompts.

  - rule_id: tciem.microsoft_365.l1_ensure_user_owned_apps_and_services_is
    title: "(L1) Ensure 'User owned apps and services' is restricted"
    severity: high
    mitre_technique: T1530
    mitre_tactic: collection
    cis_control: '1.3.4'
    cis_section: '1'
    log_source: "Microsoft 365 Unified Audit Log"
    detection:
      event_type: data_access
      threshold: 1
      filters:
        data_classification: sensitive
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft 365 admin center
      https://admin.microsoft.com. 2. Click to expand Settings > Org settings. 3. In
      Services select User owned apps and services. 4. Uncheck Let users access the
      Office Store and Let users start trials on behalf of your organization. 5.
      Click Save. To remediate using PowerShell 1. Connect to the Microsoft Graph
      service using Connect-MgGraph -Scopes 'OrgSettings-
      AppsAndServices.ReadWrite.All'. 2. Run the following Microsoft Graph
      PowerShell commands: $uri =
      'https://graph.microsoft.com/beta/admin/appsAndServices' $body = @{ 'Settings'
      = @{ 'isAppAndServicesTrialEnabled' = $false 'isOfficeStoreEnabled' = $false }
      } | ConvertTo-Json Invoke-MgGraphRequest -Method PATCH -Uri $uri -Body $body
      Default Value: Let users access the Office Store is Checked Let users start
      trials on behalf of your organization is Checked References: 1.
      https://learn.microsoft.com/en-us/microsoft-365/admin/manage/manage-addins-
      in-the-admin-center?view=o365-worldwide#manage-add-in-downloads-by- turning-
      onoff-the-office-store-across-all-apps-except-outlook

  - rule_id: tciem.microsoft_365.l2_ensure_the_customer_lockbox_feature_is_enabled
    title: "(L2) Ensure the customer lockbox feature is enabled"
    severity: medium
    mitre_technique: T1562
    mitre_tactic: defense_evasion
    cis_control: '1.3.6'
    cis_section: '1'
    log_source: "Microsoft 365 Unified Audit Log"
    detection:
      event_type: audit_event
      filters:
        change_type: security_relevant
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft 365 admin center
      https://admin.microsoft.com. 2. Click to expand Settings then select Org
      settings. 3. Select Security & privacy tab. 4. Click Customer lockbox. 5.
      Check the box Require approval for all data access requests. 6. Click Save. To
      remediate using PowerShell: 1. Connect to Exchange Online using Connect-
      ExchangeOnline. 2. Run the following PowerShell command: Set-
      OrganizationConfig -CustomerLockBoxEnabled $true Default Value: Require
      approval for all data access requests - Unchecked CustomerLockboxEnabled -
      False References: 1. https://learn.microsoft.com/en-
      us/azure/security/fundamentals/customer-lockbox- overview

  - rule_id: tciem.microsoft_365.l2_ensure_safe_links_for_office_applications_is
    title: "(L2) Ensure Safe Links for Office Applications is Enabled"
    severity: medium
    mitre_technique: T1562
    mitre_tactic: defense_evasion
    cis_control: '2.1.1'
    cis_section: '2'
    log_source: "Microsoft 365 Unified Audit Log"
    detection:
      event_type: audit_event
      filters:
        change_type: security_relevant
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft 365 Defender
      https://security.microsoft.com 2. Under Email & collaboration select Policies
      & rules 3. Select Threat policies then Safe Links 4. Click on +Create 5. Name
      the policy then click Next 6. In Domains select all valid domains for the
      organization and Next 7. Ensure the following URL & click protection settings
      are defined: Email o Checked On: Safe Links checks a list of known, malicious
      links when users click links in email. URLs are rewritten by default o Checked
      Apply Safe Links to email messages sent within the organization o Checked
      Apply real-time URL scanning for suspicious links and links that point to
      files o Checked Wait for URL scanning to complete before delivering the
      message o Unchecked Do not rewrite URLs, do checks via Safe Links API only.
      Teams o Checked On: Safe Links checks a list of known, malicious links when
      users click links in Microsoft Teams. URLs are not rewritten Office 365 Apps o
      Checked On: Safe Links checks a list of known, malicious links when users
      click links in Microsoft Office apps. URLs are not rewritten Click protection
      settings o Checked Track user clicks o Unchecked Let users click through the
      original URL o There is no recommendation for organization branding. 8. Click
      Next twice and finally Submit To remediate using PowerShell: 1. Connect using
      Connect-ExchangeOnline. 2. Run the following PowerShell script to create a
      policy at highest priority that will apply to all valid domains on the tenant:
      # Create the Policy $params = @{ Name = 'CIS SafeLinks Policy'
      EnableSafeLinksForEmail = $true EnableSafeLinksForTeams = $true
      EnableSafeLinksForOffice = $true TrackClicks = $true AllowClickThrough =
      $false ScanUrls = $true EnableForInternalSenders = $true
      DeliverMessageAfterScan = $true DisableUrlRewrite = $false } New-
      SafeLinksPolicy @params # Create the rule for all users in all valid domains
      and associate with Policy New-SafeLinksRule -Name 'CIS SafeLinks'
      -SafeLinksPolicy 'CIS SafeLinks Policy' -RecipientDomainIs (Get-
      AcceptedDomain).Name -Priority 0 References: 1.
      https://learn.microsoft.com/en-us/defender-office-365/safe-links-policies-
      configure?view=o365-worldwide 2. https://learn.microsoft.com/en-
      us/powershell/module/exchange/set- safelinkspolicy?view=exchange-ps 3.
      https://learn.microsoft.com/en-us/defender-office-365/preset-security-
      policies?view=o365-worldwide

  - rule_id: tciem.microsoft_365.l1_ensure_priority_account_protection_is_enabled
    title: "(L1) Ensure Priority account protection is enabled and configured"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '2.4.1'
    cis_section: '2'
    log_source: "Microsoft 365 Unified Audit Log"
    detection:
      event_type: authentication_success
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Remediate with a 3-step process Step 1: Enable Priority account protection in
      Microsoft 365 Defender: 1. Navigate to Microsoft 365 Defender
      https://security.microsoft.com/ 2. Click to expand System select Settings. 3.
      Select E-mail & Collaboration > Priority account protection 4. Ensure Priority
      account protection is set to On Step 2: Tag priority accounts: 5. Select User
      tags 6. Select the PRIORITY ACCOUNT tag and click Edit 7. Select Add members
      to add users, or groups. Groups are recommended. 8. Repeat the previous 2
      steps for any additional tags needed, such as Finance or HR. 9. Next and
      Submit. Step 3: Configure E-mail alerts for Priority Accounts: 10. Expand
      E-mail & Collaboration on the left column. 11. Select Policies & rules > Alert
      policy 12. Select New Alert Policy 13. Enter a valid policy Name &
      Description. Set Severity to High and Category to Threat management. 14. Set
      Activity is to Detected malware in an e-mail message 15. Mail direction is
      Inbound 16. Select Add Condition and User: recipient tags are 17. In the
      Selection option field add chosen priority tags such as Priority account. 18.
      Select Every time an activity matches the rule. 19. Next and verify valid
      recipient(s) are selected. 20. Next and select Yes, turn it on right away.
      Click Submit to save the alert. 21. Repeat steps 12 - 18 to create a 2nd alert
      for the Activity field Activity is: Phishing email detected at time of
      delivery Note: Any additional activity types may be added as needed. Above are
      the minimum recommended. Default Value: By default, priority accounts are
      undefined. References: 1. https://learn.microsoft.com/en-
      us/microsoft-365/admin/setup/priority-accounts 2.
      https://learn.microsoft.com/en-us/defender-office-365/priority-accounts-
      security- recommendations

  - rule_id: tciem.microsoft_365.l1_ensure_microsoft_365_audit_log_search_is
    title: "(L1) Ensure Microsoft 365 audit log search is Enabled"
    severity: high
    mitre_technique: T1562
    mitre_tactic: defense_evasion
    cis_control: '3.1.1'
    cis_section: '3'
    log_source: "Microsoft 365 Unified Audit Log"
    detection:
      event_type: audit_event
      filters:
        change_type: security_relevant
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft Purview
      https://purview.microsoft.com/ 2. Select Solutions and then Audit to open the
      audit search. 3. Click blue bar Start recording user and admin activity. 4.
      Click Yes on the dialog box to confirm. To remediate using PowerShell: 1.
      Connect to Exchange Online using Connect-ExchangeOnline. 2. Run the following
      PowerShell command: Set-AdminAuditLogConfig -UnifiedAuditLogIngestionEnabled
      $true Default Value: 180 days References: 1. https://learn.microsoft.com/en-
      us/purview/audit-log-enable-disable?view=o365- worldwide&tabs=microsoft-
      purview-portal 2. https://learn.microsoft.com/en-
      us/powershell/module/exchange/set- adminauditlogconfig?view=exchange-ps

  - rule_id: tciem.microsoft_365.l2_ensure_devices_without_a_compliance_policy_are
    title: "(L2) Ensure devices without a compliance policy are marked 'not compliant'"
    severity: medium
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '4.1'
    cis_section: '4'
    log_source: "Microsoft 365 Unified Audit Log"
    detection:
      event_type: resource_access
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft Intune admin center
      https://intune.microsoft.com/ 2. Select Devices and then under Manage devices
      click Compliance 3. Click Compliance settings. 4. Set Mark devices with no
      compliance policy assigned as to Not compliant. To remediate using PowerShell:
      1. Connect to Microsoft Graph using Connect-MgGraph -Scopes
      'DeviceManagementConfiguration.ReadWrite.All' 2. Run the following commands:
      $Uri = 'https://graph.microsoft.com/v1.0/deviceManagement' $Body = @{ settings
      = @{ secureByDefault = $true } } | ConvertTo-Json Invoke-MgGraphRequest -Uri
      $Uri -Method PATCH -Body $Body Default Value: UI: 'Compliant' Graph:
      secureByDefault = $false References: 1. https://learn.microsoft.com/en-
      us/mem/intune/protect/device-compliance-get- started

  - rule_id: tciem.microsoft_365.l1_ensure_per_user_mfa_is_disabled
    title: "(L1) Ensure 'Per-user MFA' is disabled"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '5.1.2.1'
    cis_section: '5'
    log_source: "Microsoft 365 Unified Audit Log"
    detection:
      event_type: resource_access
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft Entra admin center
      https://entra.microsoft.com/. 2. Click to expand Identity > Users select All
      users. 3. Click on Per-user MFA on the top row. 4. Click the empty box next to
      Display Name to select all accounts. 5. On the far right under quick steps
      click Disable. Default Value: Disabled References: 1.
      https://learn.microsoft.com/en-us/entra/identity/authentication/howto-mfa-
      userstates#convert-users-from-per-user-mfa-to-conditional-access 2.
      https://learn.microsoft.com/en-us/microsoft-365/admin/security-and-
      compliance/set-up-multi-factor-authentication?view=o365-worldwide#use-
      conditional-access-policies 3. https://learn.microsoft.com/en-
      us/entra/identity/authentication/howto-mfa- userstates#convert-per-user-mfa-
      enabled-and-enforced-users-to-disabled

  - rule_id: tciem.microsoft_365.l1_ensure_restrict_non_admin_users_from_creating
    title: "(L1) Ensure 'Restrict non-admin users from creating tenants' is set to 'Yes'"
    severity: high
    mitre_technique: T1068
    mitre_tactic: privilege_escalation
    cis_control: '5.1.2.3'
    cis_section: '5'
    log_source: "Microsoft 365 Unified Audit Log"
    detection:
      event_type: privilege_change
      filters:
        action_in: [GRANT, ROLE_ADD, ELEVATION, SUDO]
        target_privilege_in: [admin, superuser, root, dba, wheel]
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft Entra admin center
      https://entra.microsoft.com/ 2. Click to expand Identity> Users > User
      settings. 3. Set Restrict non-admin users from creating tenants to Yes then
      Save. To remediate using PowerShell: 1. Connect to Microsoft Graph using
      Connect-MgGraph -Scopes 'Policy.ReadWrite.Authorization' 2. Run the following
      commands: # Create hashtable and update the auth policy $params = @{
      AllowedToCreateTenants = $false } Update-MgPolicyAuthorizationPolicy
      -DefaultUserRolePermissions $params Default Value: No - Non-administrators can
      create tenants. AllowedToCreateTenants is True References: 1.
      https://learn.microsoft.com/en-us/entra/fundamentals/users-default-
      permissions#restrict-member-users-default-permissions

  - rule_id: tciem.microsoft_365.l2_ensure_user_consent_to_apps_accessing_company
    title: "(L2) Ensure user consent to apps accessing company data on their behalf is not allowed"
    severity: medium
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '5.1.5.1'
    cis_section: '5'
    log_source: "Microsoft 365 Unified Audit Log"
    detection:
      event_type: resource_access
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft Entra admin center
      https://entra.microsoft.com/. 2. Click to expand Identity > Applications
      select Enterprise applications. 3. Under Security select Consent and
      permissions > User consent settings. 4. Under User consent for applications
      select Do not allow user consent. 5. Click the Save option at the top of the
      window. Default Value: UI - Allow user consent for apps References: 1.
      https://learn.microsoft.com/en-us/entra/identity/enterprise-apps/configure-
      user- consent?pivots=portal

  - rule_id: tciem.microsoft_365.l1_ensure_the_admin_consent_workflow_is_enabled
    title: "(L1) Ensure the admin consent workflow is enabled"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '5.1.5.2'
    cis_section: '5'
    log_source: "Microsoft 365 Unified Audit Log"
    detection:
      event_type: resource_access
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft Entra admin center
      https://entra.microsoft.com/. 2. Click to expand Identity > Applications
      select Enterprise applications. 3. Under Security select Consent and
      permissions. 4. Under Manage select Admin consent settings. 5. Set Users can
      request admin consent to apps they are unable to consent to to Yes under Admin
      consent requests. 6. Under the Reviewers choose the Roles and Groups that will
      review user generated app consent requests. 7. Set Selected users will receive
      email notifications for requests to Yes 8. Select Save at the top of the
      window. Default Value: • Users can request admin consent to apps they are
      unable to consent to: No • Selected users to review admin consent requests:
      None • Selected users will receive email notifications for requests: Yes •
      Selected users will receive request expiration reminders: Yes • Consent
      request expires after (days): 30 References: 1.
      https://learn.microsoft.com/en-us/entra/identity/enterprise-apps/configure-
      admin- consent-workflow

  - rule_id: tciem.microsoft_365.l1_ensure_that_guest_user_access_is_restricted
    title: "(L1) Ensure that guest user access is restricted"
    severity: high
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '5.1.6.2'
    cis_section: '5'
    log_source: "Microsoft 365 Unified Audit Log"
    detection:
      event_type: authentication_success
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft Entra admin center
      https://entra.microsoft.com/. 2. Click to expand Identity > External
      Identities select External collaboration settings. 3. Under Guest user access
      set Guest user access restrictions to one of the following: o State: Guest
      users have limited access to properties and memberships of directory objects o
      State: Guest user access is restricted to properties and memberships of their
      own directory objects (most restrictive) To remediate using PowerShell: 1.
      Connect to Microsoft Graph using Connect-MgGraph -Scopes
      'Policy.ReadWrite.Authorization' 2. Run the following command to set the guest
      user access restrictions to default: # Guest users have limited access to
      properties and memberships of directory objects Update-
      MgPolicyAuthorizationPolicy -GuestUserRoleId '10dae51f-b6af-4016-8d66-
      8c2a99b929b3' 3. Or, run the following command to set it to the 'most
      restrictive': # Guest user access is restricted to properties and memberships
      of their own directory objects (most restrictive) Update-
      MgPolicyAuthorizationPolicy -GuestUserRoleId '2af84b1e-32c8-42b7-82bc-
      daa82404023b' Note: Either setting allows for a passing state. Default Value:
      • UI: Guest users have limited access to properties and memberships of
      directory objects • PowerShell: 10dae51f-b6af-4016-8d66-8c2a99b929b3
      References: 1. https://learn.microsoft.com/en-us/entra/identity/users/users-
      restrict-guest- permissions 2. https://www.lockheedmartin.com/en-
