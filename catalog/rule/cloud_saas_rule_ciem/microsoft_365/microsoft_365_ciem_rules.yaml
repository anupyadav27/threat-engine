    remediation: >
      To remediate using the UI: 1. Navigate to Microsoft Entra admin center
      https://entra.microsoft.com/ 2. Click to expand Identity Governance and select
      Access reviews 3. Click New access review. 4. Select what to review choose
      Teams + Groups. 5. Review Scope set to All Microsoft 365 groups with guest
      users, do not exclude groups. 6. Scope set to Guest users only then click
      Next: Reviews. 7. Select reviewers an appropriate user that is NOT the guest
