      11. Check Auto apply results to resource. 12. Set If reviewers don't respond
      to Remove access. 13. Check the following: Justification required, E-mail
      notifications, Reminders. 14. Click Next: Review + Create and finally click
      Create. Default Value: By default access reviews are not configured.
      References: 1. https://learn.microsoft.com/en-us/entra/id-governance/access-
      reviews-overview 2. https://learn.microsoft.com/en-us/entra/id-
      governance/create-access-review

