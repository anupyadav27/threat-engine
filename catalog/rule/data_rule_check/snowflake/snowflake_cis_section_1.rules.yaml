tech_type: snowflake
category: data
cis_benchmark: CIS Snowflake 1.0.0
cis_section: '1'

rules:

  - rule_id: snowflake.cis.1.snowflake_scim_integration_is_configured_to
    title: "Ensure Snowflake SCIM integration is configured to automatically provision and deprovision users and groups (i.e. roles)"
    severity: medium
    automation_type: automated
    cis_control: '1.2'
    cis_section: '1'
    profile_applicability: "Level 2"
    scope: snowflake.section_1.snowflake_scim_integration_is_configured_to
    assertion:
      field: port
      operator: exists
      expected: "on"
    remediation: >
      Follow the instructions in the Snowflake documentation to set up SCIM
      configuration for Okta, Azure AD, or configure a custom SCIM integration.
      Default Value: By default, SCIM integration is not set-up for Snowflake.
      References: 1. https://docs.snowflake.com/en/user-guide/scim-intro.html
    compliance:
      - cis_snowflake_1_0_0_1_2

  - rule_id: snowflake.cis.1.service_accounts_use_key_pair_authentication
    title: "Ensure that service accounts use key pair authentication"
    severity: high
    automation_type: automated
    cis_control: '1.6'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: snowflake.section_1.service_accounts_use_key_pair_authentication
    assertion:
      field: row_count
      operator: exists
      expected: "on"
    remediation: >
      Programmatically: For every non-compliant service account: 1. Follow the
      Configuring Key Pair Authentication instructions to generate the key
      <rsa_public_key>. 2. In a Snowsight worksheet or through the SnowSQL CLI, run
      the following command: ALTER USER <service_account_name> SET
      RSA_PUBLIC_KEY='<rsa_public_key>'; 3. Update configuration of the automation
      and services that rely on the service account to use key-based authentication.
      This is going to be specific to the service in question. 4. Disable password-
      based authentication: ALTER USER <service_account_name> SET PASSWORD = null;
      Default Value: To enable key based authentication for a Snowflake user either
      RSA_PUBLIC_KEY or RSA_PUBLIC_KEY_2 parameters must be set on the Snowflake
      user. By default the CREATE USER command does not require setting either of
      the parameters. Also, setting either of the parameters does not prevent from
      additionally setting a password for the same user. References: 1.
      https://docs.snowflake.com/en/user-guide/key-pair-auth.html
    compliance:
      - cis_snowflake_1_0_0_1_6

  - rule_id: snowflake.cis.1.authentication_key_pairs_are_rotated_every_180
    title: "Ensure authentication key pairs are rotated every 180 days"
    severity: high
    automation_type: automated
    cis_control: '1.7'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: snowflake.section_1.authentication_key_pairs_are_rotated_every_180
    assertion:
      field: row_count
      operator: gte
      expected: "180"
    remediation: >
      Programmatically: In a Snowsight worksheet or through the SnowSQL CLI: 1. For
      every Snowflake service account whose authentication key pair age is >= 180
      days, generate a new RSA authentication keypair. 2. Update either
      RSA_PUBLIC_KEY and RSA_PUBLIC_KEY_2 properties of a user, whichever is
      currently unset. ALTER USER <username> SET RSA_PUBLIC_KEY_2='JERUEHtcve...';
      3. Identify all services and automation that authenticate using existing
      keypair and update them to authenticate using freshly generated keypair. 4.
      Unset either RSA_PUBLIC_KEY or RSA_PUBLIC_KEY_2 properties of a user,
      whichever is assigned the old public key. ALTER USER <username> UNSET
      RSA_PUBLIC_KEY; For more information, see Configuring Key Pair Rotation.
      Default Value: No authentication key pairs are rotated automatically.
      References: 1. https://docs.snowflake.com/en/user-guide/key-pair-
      auth.html#configuring-key- pair-rotation
    compliance:
      - cis_snowflake_1_0_0_1_7

  - rule_id: snowflake.cis.1.the_idle_session_timeout_is_set_to_15_minutes_or
    title: "Ensure that the idle session timeout is set to 15 minutes or less for users with the ACCOUNTADMIN and SECURITYADMIN roles"
    severity: high
    automation_type: automated
    cis_control: '1.9'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: snowflake.section_1.the_idle_session_timeout_is_set_to_15_minutes_or
    assertion:
      field: row_count
      operator: lte
      expected: "15"
    remediation: >
      Programmatically: In the Snowsight UI or from the SnowSQL CLI: 1. Create the
      session policy if it does not exist yet. Execute the following commands to
      create and set the idle session timeout for highly privileged users in your
      Snowflake account: CREATE SESSION POLICY <session_policy>
      SESSION_IDLE_TIMEOUT_MINS = 15, SESSION_UI_IDLE_TIMEOUT_MINS = 15; 2. Set
      session policy for every highly privileged user. ALTER USER <username> SET
      SESSION POLICY <session_policy>; Default Value: The default value for
      Snowflake idle session timeout is 4 hours. References: 1.
      https://docs.snowflake.com/en/user-guide/session-policies 2.
      https://docs.snowflake.com/en/user-guide/session-policies#step-3-create-a-new-
      session-policy
    compliance:
      - cis_snowflake_1_0_0_1_9


