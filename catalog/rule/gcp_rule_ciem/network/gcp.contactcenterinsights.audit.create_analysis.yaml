rule_id: gcp.contactcenterinsights.audit.create_analysis
service: network
provider: gcp
check_type: log
severity: low
title: Detect firewall rule creation for VoIP traffic patterns and Contact Center
  AI analysis initiation
description: singleton
rationale: Monitoring this activity is essential for detecting adversary collection
  against GCP resources. Unauthorized or unexpected API calls may indicate account
  compromise, privilege escalation, or an active attack chain.
threat_category: collection
mitre_tactics:
- collection
mitre_techniques:
- T1560
risk_score: 55
resource: gcp_network_resource
source: csv_generated
is_active: true
domain: logging_monitoring_and_alerting
action_category: create
log_source_type: gcp_audit_log
posture_category: threat_posture
threat_tags:
- T1560
- collection
- ciem_detection
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  nist_800_171:
  - 3.13.14
remediation: '1. Audit the newly created resource and its associated network access
  rules.

  2. Verify VoIP/communication resources are authorized and properly scoped.

  3. Apply least-privilege NSG/security group rules for VoIP ports.

  4. Monitor for data collection patterns from the resource.

  5. Ensure communication services are deployed via approved templates only.'
references:
- https://attack.mitre.org/techniques/T1560/
- https://cloud.google.com/iam/docs/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_audit_log
    - field: service
      op: equals
      value: contactcenterinsights.googleapis.com
    - field: operation
      op: in
      value:
      - compute.firewalls.insert
      - contactcenterinsights.conversations.analyze
  type: log
  version: '1.0'
