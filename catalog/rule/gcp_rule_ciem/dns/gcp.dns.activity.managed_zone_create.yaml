rule_id: gcp.dns.activity.managed_zone_create
service: dns
provider: gcp
check_type: log
severity: medium
title: 'DNS: Managed Zone Created'
description: Cloud DNS managed zone created — attacker may establish adversary-controlled DNS infrastructure to support phishing or domain fronting.
rationale: Adversaries create Cloud DNS managed zones or modify DNS records to establish attacker-controlled infrastructure or redirect legitimate traffic. DNS zone creation combined with record modification is a precursor to domain fronting or DNS hijacking. Detected via dns.googleapis.com Admin Activity logs.
threat_category: network_attack
mitre_tactics:
- resource_development
mitre_techniques:
- T1583.002
risk_score: 55
resource: dns_zone
source: default
is_active: true
domain: threat_detection
action_category: create
log_source_type: 
posture_category: threat_posture
threat_tags:
- T1583.002
- T1583
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  cis_gcp_v2:
  - 3.6
  - 3.7
  - 3.8
  nist_800_53_r5:
  - SC-7
  - SI-4
  - AC-4
  pci_dss_v4:
  - 1.3
  - 1.4
  iso_27001_2022:
  - A.8.20
  - A.8.22
remediation: |
  1. Audit and delete the unauthorized VPN tunnel, route, or firewall rule.
  2. Review VPC network topology for unexpected routes or peering connections.
  3. Enable VPC Flow Logs on all subnets and alert on anomalous traffic patterns.
  4. Apply Org Policy firewall constraints to restrict inbound SSH/RDP from 0.0.0.0/0.
  5. Use Cloud Armor security policies to protect public-facing workloads.
references:
- https://attack.mitre.org/techniques/T1583/002/
- https://cloud.google.com/dns/docs/audit-logging
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_audit
    - field: service
      op: equals
      value: dns.googleapis.com
    - field: operation
      op: contains
      value: managedZones.create
version: '1.0'
