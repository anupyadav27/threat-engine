rule_id: gcp.identityplatform.audit.mfa_disabled
service: identityplatform
provider: gcp
check_type: log
severity: critical
title: 'Identity Platform: MFA Disabled for Tenant'
description: Multi-factor authentication enforcement was disabled for an Identity Platform tenant, weakening account takeover protections.
rationale: Adversaries abuse identityplatform operations to achieve defense evasion in GCP environments. Detected via Cloud Admin Activity or Data Access audit logs.
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
- initial_access
mitre_techniques:
- T1556
risk_score: 90
resource: gcp_identityplatform_tenant
source: default
is_active: true
domain: logging_monitoring_and_alerting
action_category: modify
log_source_type: 
posture_category: security_posture
threat_tags:
- T1556
- defense_evasion
- log_tampering
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: critical
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  cis_gcp_v2:
  - 2.1
  - 2.2
  - 2.4
  - 2.5
  nist_800_53_r5:
  - AU-2
  - AU-6
  - AU-12
  - SI-4
  pci_dss_v4:
  - 10.1
  - 10.2
  - 10.3
  iso_27001_2022:
  - A.8.15
  - A.8.16
  - A.5.28
remediation: |
  1. Immediately restore the deleted or modified logging/security configuration.
  2. Apply Org Policy to prevent log sink deletion: `logging.restrictSinkCreation`.
  3. Use Cloud Storage Bucket Lock on log export buckets to prevent deletion.
  4. Configure out-of-band alerting via Pub/Sub → Cloud Functions for audit log changes.
  5. Enable Security Command Center Premium for threat detection on defense evasion events.
references:
- https://attack.mitre.org/techniques/T1556/
- https://cloud.google.com/logging/docs/audit
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_audit
    - field: service
      op: equals
      value: identitytoolkit.googleapis.com
    - field: operation
      op: in
      value:
      - google.cloud.identitytoolkit.admin.v2.ProjectConfigService.UpdateConfig
      - google.cloud.identitytoolkit.admin.v2.TenantManagementService.UpdateTenant
version: '1.0'
