rule_id: gcp.identityplatform.audit.allowed_domains_cleared
service: identityplatform
provider: gcp
check_type: log
severity: high
title: 'Identity Platform: Allowed Domains List Cleared'
description: The authorized domains list was cleared for Identity Platform. Without domain restrictions, any domain can be used for OAuth redirects.
rationale: Adversaries abuse identityplatform operations to achieve initial access in GCP environments. Detected via Cloud Admin Activity or Data Access audit logs.
threat_category: initial_access
mitre_tactics:
- initial_access
mitre_techniques:
- T1078
risk_score: 80
resource: gcp_identityplatform_config
source: default
is_active: true
domain: threat_detection
action_category: create
log_source_type: 
posture_category: threat_posture
threat_tags:
- T1078
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks: {}
remediation: |
  1. Immediately restore the deleted or modified logging/security configuration.
  2. Apply Org Policy to prevent log sink deletion: `logging.restrictSinkCreation`.
  3. Use Cloud Storage Bucket Lock on log export buckets to prevent deletion.
  4. Configure out-of-band alerting via Pub/Sub → Cloud Functions for audit log changes.
  5. Enable Security Command Center Premium for threat detection on defense evasion events.
references:
- https://attack.mitre.org/techniques/T1078/
- https://cloud.google.com/logging/docs/audit
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_audit
    - field: service
      op: equals
      value: identitytoolkit.googleapis.com
    - field: operation
      op: equals
      value: google.cloud.identitytoolkit.admin.v2.ProjectConfigService.UpdateConfig
    - field: request.authorizedDomains
      op: equals
      value: []
version: '1.0'
