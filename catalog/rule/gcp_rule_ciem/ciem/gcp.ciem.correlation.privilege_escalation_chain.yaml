rule_id: gcp.ciem.correlation.privilege_escalation_chain
service: ciem
provider: gcp
check_type: log_correlation
severity: critical
title: 'GCP: Privilege Escalation Chain — SetIamPolicy + Token Generation'
description: 'Correlated GCP privilege escalation: IAM policy change granting elevated role followed by service account token generation — indicates role grant used immediately for impersonation.'
rationale: 'Adversaries add additional roles or permissions to adversary-controlled cloud accounts to maintain persistent access to a tenant. Attackers target Global Administrator, Owner, and Contributor roles — granting full control over subscription resources without deploying remote access tools. Detected via: IAM role attachment events, privilege grant events in Entra ID/Okta, and admin role assignment in Microsoft 365.'
threat_category: privilege_escalation
mitre_tactics:
- privilege_escalation
mitre_techniques:
- T1098.003
- T1548
risk_score: 95
resource: iam_policy
source: default
is_active: true
domain: identity_and_access_management
action_category: privilege_escalation
posture_category: iam_posture
threat_tags:
- T1098.003
- T1548
- T1098
- cloud_iam
- privilege_escalation
- ciem_correlation
- attack_chain
risk_indicators:
  actor_type: cloud_principal
  action_type: privilege_change
  target_type: cloud_resource
  blast_radius: tenant_or_account
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - role_management
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_gcp_v2:
  - 1.1
  - 1.4
  - 1.7
  - 2.4
  nist_800_53_r5:
  - AC-2
  - AC-3
  - AC-6
  - IA-2
  pci_dss_v4:
  - 7.1
  - 7.2
  - 8.2
  iso_27001_2022:
  - A.5.18
  - A.8.2
  - A.8.3
detection_events:
- Microsoft.Authorization/roleAssignments/write
- 'iam:AttachUserPolicy'
- 'iam:PutRolePolicy'
- Add member to role (Entra ID audit)
remediation: |
  1. Immediately audit the modified IAM policy and revoke unauthorized role grants.
  2. Enable Cloud Asset Inventory change notifications for IAM policy updates.
  3. Apply Org Policy constraints to restrict role assignment to approved principals.
  4. Require two-person approval for Owner/Editor role grants via Cloud Identity workflows.
  5. Configure VPC Service Controls to prevent cross-project privilege escalation.
references:
- https://attack.mitre.org/techniques/T1098/003/
- https://cloud.google.com/iam/docs/audit-logging
- https://cloud.google.com/resource-manager/docs/audit-logging
check_config:
  events:
  - conditions:
      all:
      - field: source_type
        op: equals
        value: gcp_audit
      - field: service
        op: equals
        value: cloudresourcemanager.googleapis.com
      - field: operation
        op: contains
        value: SetIamPolicy
  - conditions:
      all:
      - field: source_type
        op: equals
        value: gcp_audit
      - field: service
        op: equals
        value: iamcredentials.googleapis.com
      - field: operation
        op: contains
        value: GenerateAccessToken
  type: sequence
  window_seconds: 300
version: '1.0'
