rule_id: gcp.ciem.correlation.defense_evasion_chain
service: ciem
provider: gcp
check_type: log_correlation
severity: critical
title: 'GCP: Defense Evasion Chain — Log Sink + SCC Finding Mute'
description: 'Correlated defense evasion: Cloud Logging sink deleted or modified followed by SCC findings muted — systematic disabling of both logging and alerting controls.'
rationale: 'Adversaries disable or modify cloud logging capabilities to limit visibility into their activities. With sufficient permissions they can disable CloudTrail, delete Azure diagnostic settings, delete log sinks, or modify audit configurations — blinding defenders to all subsequent actions. Detected via: StopLogging, DeleteTrail, UpdateSink, Delete-DiagnosticSetting, license downgrade events, and SaaS audit log disable events.'
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1562.008
- T1562.001
risk_score: 95
resource: log_sink
source: default
is_active: true
domain: logging_monitoring_and_alerting
action_category: modify
posture_category: security_posture
threat_tags:
- T1562.008
- T1562.001
- T1562
- defense_evasion
- log_tampering
- ciem_correlation
- attack_chain
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: tenant_or_account
  stealth_risk: critical
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_gcp_v2:
  - 2.1
  - 2.2
  - 2.4
  - 2.5
  nist_800_53_r5:
  - AU-2
  - AU-6
  - AU-12
  - SI-4
  pci_dss_v4:
  - 10.1
  - 10.2
  - 10.3
  iso_27001_2022:
  - A.8.15
  - A.8.16
  - A.5.28
detection_events:
- 'cloudtrail:StopLogging'
- 'cloudtrail:DeleteTrail'
- Microsoft.Insights/diagnosticSettings/delete
- microsoft.aadiam/diagnosticSettings/delete
- logging.sinks.delete
remediation: |
  1. Immediately restore the deleted or modified logging/security configuration.
  2. Apply Org Policy to prevent log sink deletion: `logging.restrictSinkCreation`.
  3. Use Cloud Storage Bucket Lock on log export buckets to prevent deletion.
  4. Configure out-of-band alerting via Pub/Sub → Cloud Functions for audit log changes.
  5. Enable Security Command Center Premium for threat detection on defense evasion events.
references:
- https://attack.mitre.org/techniques/T1562/008/
- https://cloud.google.com/logging/docs/audit
- https://cloud.google.com/logging/docs/export/configure_export_v2
check_config:
  events:
  - conditions:
      all:
      - field: source_type
        op: equals
        value: gcp_audit
      - field: service
        op: equals
        value: logging.googleapis.com
      - field: operation
        op: in
        value:
        - DeleteSink
        - UpdateSink
  - conditions:
      all:
      - field: source_type
        op: equals
        value: gcp_audit
      - field: service
        op: equals
        value: securitycenter.googleapis.com
      - field: operation
        op: contains
        value: MuteFindings
  type: sequence
  window_seconds: 600
version: '1.0'
