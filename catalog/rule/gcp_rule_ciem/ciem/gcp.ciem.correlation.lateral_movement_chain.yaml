rule_id: gcp.ciem.correlation.lateral_movement_chain
service: ciem
provider: gcp
check_type: log_correlation
severity: high
title: 'GCP: Lateral Movement Chain — SA Key Creation + Cross-Project Impersonation'
description: 'Correlated lateral movement: service account key created followed by token generation for a different service account — key-based pivot to higher-privileged identity.'
rationale: 'Adversaries circumvent elevation control mechanisms to gain higher-level permissions. In cloud environments this includes SAML assertion manipulation, IAM role privilege boundary modifications, and STS:AssumeRole chaining to escalate from limited to administrative access. Detected via: privilege boundary removal events, STS role chaining with unusually broad permissions, and unexpected policy attachments.'
threat_category: lateral_movement
mitre_tactics:
- lateral_movement
- privilege_escalation
mitre_techniques:
- T1548
- T1136.003
risk_score: 88
resource: service_account
source: default
is_active: true
domain: network_security_and_connectivity
action_category: network
posture_category: network_posture
threat_tags:
- T1548
- T1136.003
- T1136
- lateral_movement
- cloud_pivot
- ciem_correlation
- attack_chain
risk_indicators:
  actor_type: cloud_principal
  action_type: network_change
  target_type: cloud_resource
  blast_radius: tenant_or_account
  stealth_risk: medium
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_gcp_v2:
  - 1.4
  - 1.7
  - 3.1
  nist_800_53_r5:
  - AC-4
  - SC-7
  - SI-4
  pci_dss_v4:
  - 7.2
  - 1.3
  - 1.4
  iso_27001_2022:
  - A.8.20
  - A.8.22
  - A.5.18
detection_events:
- 'iam:CreateRole with permissive trust'
- 'sts:AssumeRole with cross-account escalation'
- Microsoft.Authorization/elevateAccess/action
remediation: |
  1. Revoke the service account impersonation grant (roles/iam.serviceAccountTokenCreator).
  2. Audit all GenerateAccessToken calls in iamcredentials.googleapis.com audit logs.
  3. Restrict service account impersonation using IAM Conditions (resource-based restrictions).
  4. Enable Security Command Center lateral movement threat findings.
  5. Rotate credentials for all service accounts involved in the impersonation chain.
references:
- https://attack.mitre.org/techniques/T1548/
- https://cloud.google.com/iam/docs/impersonating-service-accounts
check_config:
  events:
  - conditions:
      all:
      - field: source_type
        op: equals
        value: gcp_audit
      - field: service
        op: equals
        value: iam.googleapis.com
      - field: operation
        op: contains
        value: CreateServiceAccountKey
  - conditions:
      all:
      - field: source_type
        op: equals
        value: gcp_audit
      - field: service
        op: equals
        value: iamcredentials.googleapis.com
      - field: operation
        op: contains
        value: GenerateAccessToken
  type: sequence
  window_seconds: 300
version: '1.0'
