rule_id: gcp.iam.audit.service_account_key_delete
service: iam
provider: gcp
check_type: log
severity: medium
title: 'GCP IAM: Service Account Key Deleted'
description: A service account key was deleted. This may indicate an attacker covering tracks or disrupting legitimate access.
rationale: Adversaries abuse iam operations to achieve defense evasion in GCP environments. Detected via Cloud Admin Activity or Data Access audit logs.
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1070
risk_score: 62
resource: gcp_iam_service_account_key
source: default
is_active: true
domain: logging_monitoring_and_alerting
action_category: delete
log_source_type: 
posture_category: security_posture
threat_tags:
- T1070
- defense_evasion
- log_tampering
- cloud_iam
- identity
risk_indicators:
  actor_type: iam_user_or_role
  action_type: destructive
  target_type: iam_identity
  blast_radius: account
  stealth_risk: critical
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: true
  modules:
  - secrets_management
  categories:
  - sensitive_data_access
  priority: medium
  impact:
    pci: PCI DSS Requirement 12.3 — Implement security awareness program and protect systems
    gdpr: GDPR Article 32 — Appropriate technical and organizational measures for data security
    hipaa: §164.306(a) — Ensure confidentiality, integrity, and availability of ePHI
  sensitive_data_context: |
  Unauthorized defense evasion on iam resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks:
  cis_gcp_v2:
  - 2.1
  - 2.2
  - 2.4
  - 2.5
  nist_800_53_r5:
  - AU-2
  - AU-6
  - AU-12
  - SI-4
  pci_dss_v4:
  - 10.1
  - 10.2
  - 10.3
  iso_27001_2022:
  - A.8.15
  - A.8.16
  - A.5.28
remediation: |
  1. Immediately restore the deleted or modified logging/security configuration.
  2. Apply Org Policy to prevent log sink deletion: `logging.restrictSinkCreation`.
  3. Use Cloud Storage Bucket Lock on log export buckets to prevent deletion.
  4. Configure out-of-band alerting via Pub/Sub → Cloud Functions for audit log changes.
  5. Enable Security Command Center Premium for threat detection on defense evasion events.
references:
- https://attack.mitre.org/techniques/T1070/
- https://cloud.google.com/logging/docs/audit
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_audit
    - field: service
      op: equals
      value: iam.googleapis.com
    - field: operation
      op: equals
      value: google.iam.admin.v1.DeleteServiceAccountKey
version: '1.0'
