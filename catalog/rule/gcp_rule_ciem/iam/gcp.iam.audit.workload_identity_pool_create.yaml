rule_id: gcp.iam.audit.workload_identity_pool_create
service: iam
provider: gcp
check_type: log
severity: high
title: 'GCP IAM: Workload Identity Pool Created'
description: A Workload Identity Pool was created, allowing external identities to impersonate service accounts. Misconfigured pools can permit unauthorized cross-cloud access.
rationale: Adversaries abuse iam operations to achieve initial access in GCP environments. Detected via Cloud Admin Activity or Data Access audit logs.
threat_category: initial_access
mitre_tactics:
- initial_access
- privilege_escalation
mitre_techniques:
- T1078
risk_score: 80
resource: gcp_iam_workload_identity_pool
source: default
is_active: true
domain: threat_detection
action_category: create
log_source_type: 
posture_category: threat_posture
threat_tags:
- T1078
- cloud_iam
- identity
risk_indicators:
  actor_type: iam_user_or_role
  action_type: write
  target_type: iam_identity
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks: {}
remediation: |
  1. Immediately restore the deleted or modified logging/security configuration.
  2. Apply Org Policy to prevent log sink deletion: `logging.restrictSinkCreation`.
  3. Use Cloud Storage Bucket Lock on log export buckets to prevent deletion.
  4. Configure out-of-band alerting via Pub/Sub → Cloud Functions for audit log changes.
  5. Enable Security Command Center Premium for threat detection on defense evasion events.
references:
- https://attack.mitre.org/techniques/T1078/
- https://cloud.google.com/logging/docs/audit
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_audit
    - field: service
      op: equals
      value: iam.googleapis.com
    - field: operation
      op: equals
      value: google.iam.v1.WorkloadIdentityPools.CreateWorkloadIdentityPool
version: '1.0'
