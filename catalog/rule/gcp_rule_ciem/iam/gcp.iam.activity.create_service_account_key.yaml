rule_id: gcp.iam.activity.create_service_account_key
service: iam
provider: gcp
check_type: log
severity: high
title: 'IAM: Service Account Key Created'
description: User-managed key created for a GCP service account — long-lived credential that persists outside normal rotation cycles.
rationale: 'Adversaries search local file systems, remote file shares, and cloud storage for files containing insecurely stored credentials — including config files, source code, .env files, and shell history. Cloud-specific targets include ~/.aws/credentials, terraform.tfstate (containing plaintext secrets), and container environment variable dumps. Detected via: file read access to .env/.xml/.ps1/config files, grep commands targeting credential patterns, and container process access to mounted secret paths.'
threat_category: credential_access
mitre_tactics:
- credential_access
mitre_techniques:
- T1552.001
risk_score: 75
resource: service_account_key
source: default
is_active: true
domain: identity_and_access_management
action_category: read
posture_category: iam_posture
threat_tags:
- T1552.001
- T1552
- credential_access
- secret_exposure
- cloud_iam
- identity
risk_indicators:
  actor_type: iam_user_or_role
  action_type: read
  target_type: iam_identity
  blast_radius: account
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: true
  modules:
  - secrets_management
  categories:
  - secrets_exposure
  - credential_theft
  priority: high
  impact:
    pci: PCI DSS Requirement 12.3 — Implement security awareness program and protect systems
    gdpr: GDPR Article 32 — Appropriate technical and organizational measures for data security
    hipaa: §164.306(a) — Ensure confidentiality, integrity, and availability of ePHI
compliance_frameworks:
  cis_gcp_v2:
  - 1.6
  - 1.7
  - 1.9
  nist_800_53_r5:
  - IA-5
  - IA-8
  - SC-28
  pci_dss_v4:
  - 8.3
  - 8.6
  - 10.2
  iso_27001_2022:
  - A.8.5
  - A.8.6
  - A.5.17
detection_events:
- 's3:GetObject on .env / credentials files'
- EC2 metadata API call from unexpected source
- Container exec with grep/find credential patterns
remediation: |
  1. Immediately rotate or disable the accessed credential / secret.
  2. Review all Access Context Manager policies for unexpected secret access.
  3. Enable Secret Manager audit logs (Data Access) and alert on AccessSecretVersion.
  4. Apply CMEK to Secret Manager and restrict IAM to least-privilege consumers.
  5. Use Workload Identity Federation instead of long-lived service account keys.
references:
- https://attack.mitre.org/techniques/T1552/001/
- https://cloud.google.com/secret-manager/docs/audit-logging
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_audit
    - field: service
      op: equals
      value: iam.googleapis.com
    - field: operation
      op: contains
      value: CreateServiceAccountKey
version: '1.0'
