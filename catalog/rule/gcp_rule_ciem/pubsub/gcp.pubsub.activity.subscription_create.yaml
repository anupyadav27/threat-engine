rule_id: gcp.pubsub.activity.subscription_create
service: pubsub
provider: gcp
check_type: log
severity: medium
title: 'Pub/Sub: Subscription Created on Sensitive Topic'
description: Pub/Sub subscription created — may establish a collection channel consuming log or event messages from security-critical topics.
rationale: 'Adversaries access data from cloud object storage (S3, Azure Blob, GCS) which may be misconfigured with overly permissive policies exposing PII, medical records, financial data, or credentials. Bulk download followed by external transfer indicates active data theft. Detected via: unusual object access patterns from new IAM users or roles, OAuth token grants to external apps preceding high-volume downloads, and GetObject events from anomalous IPs or user agents.'
threat_category: collection
mitre_tactics:
- collection
mitre_techniques:
- T1530
risk_score: 55
resource: pubsub_subscription
source: default
is_active: true
domain: data_protection_and_privacy
action_category: create
posture_category: data_security_posture
threat_tags:
- T1530
- data_collection
- sensitive_data
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: true
  modules:
  - data_access_governance
  categories:
  - sensitive_data_access
  - unauthorized_access
  priority: medium
  impact:
    pci: PCI DSS Requirement 12.3 — Implement security awareness program and protect systems
    gdpr: GDPR Article 32 — Appropriate technical and organizational measures for data security
    hipaa: §164.306(a) — Ensure confidentiality, integrity, and availability of ePHI
compliance_frameworks:
  cis_gcp_v2:
  - 5.1
  - 5.2
  nist_800_53_r5:
  - AC-4
  - SC-28
  - SI-4
  pci_dss_v4:
  - 3.1
  - 7.1
  iso_27001_2022:
  - A.8.12
  - A.5.12
detection_events:
- 's3:GetObject (high volume from single principal)'
- Microsoft.Storage/storageAccounts/blobServices/containers/blobs/read
- ListObjects followed by bulk GetObject
- Storage access from external/anonymous IP
remediation: |
  1. Audit and revert the snapshot or data access operation.
  2. Review IAM permissions on the affected disk/volume and revoke unauthorized access.
  3. Enable disk snapshot sharing restrictions via Org Policy.
  4. Configure Security Command Center alerts for snapshot cross-project share events.
  5. Encrypt all persistent disks with CMEK to prevent use without key access.
references:
- https://attack.mitre.org/techniques/T1530/
- https://cloud.google.com/storage/docs/audit-logging
- https://cloud.google.com/bigquery/docs/audit-logging
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_audit
    - field: service
      op: equals
      value: pubsub.googleapis.com
    - field: operation
      op: contains
      value: CreateSubscription
version: '1.0'
