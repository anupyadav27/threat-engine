rule_id: gcp.compute.activity.vpn_tunnel_insert
service: compute
provider: gcp
check_type: log
severity: medium
title: 'Compute: VPN Tunnel Created'
description: VPN tunnel created in GCP VPC — may establish encrypted C2 channel bypassing perimeter monitoring.
rationale: Adversaries create VPN tunnels or Cloud Interconnect attachments in GCP to establish encrypted communication channels that bypass network monitoring. New VPN tunnel creation by non-networking team principals indicates adversary-controlled C2 infrastructure. Detected via compute.googleapis.com vpnTunnels.insert audit events.
threat_category: network_attack
mitre_tactics:
- command_and_control
mitre_techniques:
- T1572
risk_score: 62
resource: vpn_tunnel
source: default
is_active: true
domain: compute_and_workload_security
action_category: create
log_source_type: 
posture_category: threat_posture
threat_tags:
- T1572
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: compute_instance
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  cis_gcp_v2:
  - 3.6
  - 3.7
  - 3.8
  nist_800_53_r5:
  - SC-7
  - SI-4
  - AC-4
  pci_dss_v4:
  - 1.3
  - 1.4
  iso_27001_2022:
  - A.8.20
  - A.8.22
remediation: |
  1. Audit and delete the unauthorized VPN tunnel, route, or firewall rule.
  2. Review VPC network topology for unexpected routes or peering connections.
  3. Enable VPC Flow Logs on all subnets and alert on anomalous traffic patterns.
  4. Apply Org Policy firewall constraints to restrict inbound SSH/RDP from 0.0.0.0/0.
  5. Use Cloud Armor security policies to protect public-facing workloads.
references:
- https://attack.mitre.org/techniques/T1572/
- https://cloud.google.com/network-connectivity/docs/vpn/concepts/overview
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_audit
    - field: service
      op: equals
      value: compute.googleapis.com
    - field: operation
      op: contains
      value: vpnTunnels.insert
version: '1.0'
