rule_id: gcp.compute.audit.snapshot_exported
service: compute
provider: gcp
check_type: log
severity: critical
title: 'GCP Compute: Disk Snapshot Exported to External Project'
description: A compute disk snapshot was exported (SetIamPolicy granting external access). Data exfiltration via snapshot copy is a known GCP attack technique.
rationale: Adversaries abuse compute operations to achieve data exfiltration in GCP environments. Detected via Cloud Admin Activity or Data Access audit logs.
threat_category: data_exfiltration
mitre_tactics:
- exfiltration
mitre_techniques:
- T1537
risk_score: 95
resource: gcp_compute_snapshot
source: default
is_active: true
domain: compute_and_workload_security
action_category: exfiltration
log_source_type: 
posture_category: data_security_posture
threat_tags:
- T1537
- data_exfiltration
- data_loss
risk_indicators:
  actor_type: cloud_principal
  action_type: data_transfer
  target_type: compute_instance
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: true
  modules:
  - backup_and_recovery
  - data_loss_prevention
  categories:
  - data_exfiltration
  - unauthorized_access
  priority: critical
  impact:
    pci: PCI DSS Requirement 12.3 — Implement security awareness program and protect systems
    gdpr: GDPR Article 32 — Appropriate technical and organizational measures for data security
    hipaa: §164.306(a) — Ensure confidentiality, integrity, and availability of ePHI
  sensitive_data_context: |
  Unauthorized data exfiltration on compute resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks:
  cis_gcp_v2:
  - 5.1
  - 5.2
  - 7.1
  nist_800_53_r5:
  - AC-4
  - DM-2
  - SI-4
  pci_dss_v4:
  - 3.1
  - 4.1
  - 7.1
  iso_27001_2022:
  - A.8.12
  - A.5.12
  - A.8.10
remediation: |
  1. Audit and revoke the IAM binding granting public or broad access to the resource.
  2. Enable VPC Service Controls to restrict data exfiltration to approved perimeters.
  3. Configure DLP inspection on Cloud Storage and BigQuery for sensitive data.
  4. Set up Cloud Monitoring alerts on bulk data read operations by unexpected principals.
  5. Enable CMEK for storage and BigQuery to prevent data use without key access.
references:
- https://attack.mitre.org/techniques/T1537/
- https://cloud.google.com/logging/docs/audit
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_audit
    - field: service
      op: equals
      value: compute.googleapis.com
    - field: operation
      op: equals
      value: v1.compute.snapshots.setIamPolicy
version: '1.0'
