rule_id: gcp.compute.audit.snapshot_created
service: compute
provider: gcp
check_type: log
severity: high
title: 'GCP Compute: Disk Snapshot Created'
description: A disk snapshot was created. Adversaries create disk snapshots to exfiltrate data by restoring snapshots outside the organization.
rationale: Adversaries abuse compute operations to achieve collection in GCP environments. Detected via Cloud Admin Activity or Data Access audit logs.
threat_category: collection
mitre_tactics:
- collection
- exfiltration
mitre_techniques:
- T1005
risk_score: 72
resource: gcp_compute_snapshot
source: default
is_active: true
domain: compute_and_workload_security
action_category: create
log_source_type: 
posture_category: data_security_posture
threat_tags:
- T1005
- data_collection
- sensitive_data
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: compute_instance
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: true
  modules:
  - backup_and_recovery
  categories:
  - sensitive_data_access
  - unauthorized_access
  priority: high
  impact:
    pci: PCI DSS Requirement 12.3 — Implement security awareness program and protect systems
    gdpr: GDPR Article 32 — Appropriate technical and organizational measures for data security
    hipaa: §164.306(a) — Ensure confidentiality, integrity, and availability of ePHI
  sensitive_data_context: |
  Unauthorized collection on compute resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks:
  cis_gcp_v2:
  - 5.1
  - 5.2
  nist_800_53_r5:
  - AC-4
  - SC-28
  - SI-4
  pci_dss_v4:
  - 3.1
  - 7.1
  iso_27001_2022:
  - A.8.12
  - A.5.12
remediation: |
  1. Audit and revert the snapshot or data access operation.
  2. Review IAM permissions on the affected disk/volume and revoke unauthorized access.
  3. Enable disk snapshot sharing restrictions via Org Policy.
  4. Configure Security Command Center alerts for snapshot cross-project share events.
  5. Encrypt all persistent disks with CMEK to prevent use without key access.
references:
- https://attack.mitre.org/techniques/T1005/
- https://cloud.google.com/logging/docs/audit
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_audit
    - field: service
      op: equals
      value: compute.googleapis.com
    - field: operation
      op: equals
      value: v1.compute.disks.createSnapshot
version: '1.0'
