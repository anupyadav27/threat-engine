rule_id: gcp.compute.audit.startup_script_modified
service: compute
provider: gcp
check_type: log
severity: critical
title: 'GCP Compute: Instance Startup Script Modified'
description: A VM instance startup-script was modified via metadata update. Startup scripts run as root at boot and are a powerful persistence mechanism.
rationale: Adversaries abuse compute operations to achieve persistence in GCP environments. Detected via Cloud Admin Activity or Data Access audit logs.
threat_category: persistence
mitre_tactics:
- persistence
- execution
mitre_techniques:
- T1037
risk_score: 93
resource: gcp_compute_instance
source: default
is_active: true
domain: compute_and_workload_security
action_category: create
log_source_type: 
posture_category: iam_posture
threat_tags:
- T1037
- persistence
- backdoor
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: compute_instance
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_gcp_v2:
  - 1.1
  - 1.4
  - 1.12
  nist_800_53_r5:
  - AC-2
  - AC-6
  - IA-4
  pci_dss_v4:
  - 7.1
  - 8.2
  - 8.3
  iso_27001_2022:
  - A.5.18
  - A.8.2
remediation: |
  1. Audit and disable the newly created service account or Workload Identity Pool.
  2. Review all service account keys and revoke unexpected user-managed keys.
  3. Apply Org Policy `iam.disableServiceAccountCreation` for non-admin projects.
  4. Enable Security Command Center alerts for new service account creation events.
  5. Rotate credentials for any accounts that interacted with the new identity.
references:
- https://attack.mitre.org/techniques/T1037/
- https://cloud.google.com/logging/docs/audit
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_audit
    - field: service
      op: equals
      value: compute.googleapis.com
    - field: operation
      op: equals
      value: v1.compute.instances.setMetadata
    - field: request.items.key
      op: contains
      value: startup-script
version: '1.0'
