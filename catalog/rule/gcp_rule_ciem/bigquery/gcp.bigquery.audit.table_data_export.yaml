rule_id: gcp.bigquery.audit.table_data_export
service: bigquery
provider: gcp
check_type: log
severity: high
title: 'BigQuery: Large Table Export to External Storage'
description: A BigQuery table was exported to an external GCS bucket or location. Bulk data exports can be a data exfiltration vector.
rationale: Adversaries abuse bigquery operations to achieve data exfiltration in GCP environments. Detected via Cloud Admin Activity or Data Access audit logs.
threat_category: data_exfiltration
mitre_tactics:
- exfiltration
mitre_techniques:
- T1537
risk_score: 80
resource: gcp_bigquery_table
source: default
is_active: true
domain: data_protection_and_privacy
action_category: exfiltration
log_source_type: 
posture_category: data_security_posture
threat_tags:
- T1537
- data_exfiltration
- data_loss
risk_indicators:
  actor_type: cloud_principal
  action_type: data_transfer
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: true
  modules:
  - data_access_governance
  - data_loss_prevention
  categories:
  - data_exfiltration
  - unauthorized_access
  priority: high
  impact:
    pci: PCI DSS Requirement 12.3 — Implement security awareness program and protect systems
    gdpr: GDPR Article 32 — Appropriate technical and organizational measures for data security
    hipaa: §164.306(a) — Ensure confidentiality, integrity, and availability of ePHI
  sensitive_data_context: |
  Unauthorized data exfiltration on bigquery resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks:
  cis_gcp_v2:
  - 5.1
  - 5.2
  - 7.1
  nist_800_53_r5:
  - AC-4
  - DM-2
  - SI-4
  pci_dss_v4:
  - 3.1
  - 4.1
  - 7.1
  iso_27001_2022:
  - A.8.12
  - A.5.12
  - A.8.10
remediation: |
  1. Audit and revoke the IAM binding granting public or broad access to the resource.
  2. Enable VPC Service Controls to restrict data exfiltration to approved perimeters.
  3. Configure DLP inspection on Cloud Storage and BigQuery for sensitive data.
  4. Set up Cloud Monitoring alerts on bulk data read operations by unexpected principals.
  5. Enable CMEK for storage and BigQuery to prevent data use without key access.
references:
- https://attack.mitre.org/techniques/T1537/
- https://cloud.google.com/logging/docs/audit
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_audit
    - field: service
      op: equals
      value: bigquery.googleapis.com
    - field: operation
      op: equals
      value: google.cloud.bigquery.v2.JobService.InsertJob
    - field: request.job.configuration.extract
      op: exists
      value: true
version: '1.0'
