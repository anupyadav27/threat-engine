rule_id: gcp.bigquery.audit.cmek_disabled
service: bigquery
provider: gcp
check_type: log
severity: high
title: 'BigQuery: Customer-Managed Encryption Key Removed'
description: Customer-managed encryption (CMEK) was removed from a BigQuery dataset, reverting to Google-managed keys.
rationale: Adversaries abuse bigquery operations to achieve defense evasion in GCP environments. Detected via Cloud Admin Activity or Data Access audit logs.
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1562
risk_score: 72
resource: gcp_bigquery_dataset
source: default
is_active: true
domain: logging_monitoring_and_alerting
action_category: modify
log_source_type: 
posture_category: security_posture
threat_tags:
- T1562
- defense_evasion
- log_tampering
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: critical
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  cis_gcp_v2:
  - 2.1
  - 2.2
  - 2.4
  - 2.5
  nist_800_53_r5:
  - AU-2
  - AU-6
  - AU-12
  - SI-4
  pci_dss_v4:
  - 10.1
  - 10.2
  - 10.3
  iso_27001_2022:
  - A.8.15
  - A.8.16
  - A.5.28
remediation: |
  1. Immediately restore the deleted or modified logging/security configuration.
  2. Apply Org Policy to prevent log sink deletion: `logging.restrictSinkCreation`.
  3. Use Cloud Storage Bucket Lock on log export buckets to prevent deletion.
  4. Configure out-of-band alerting via Pub/Sub → Cloud Functions for audit log changes.
  5. Enable Security Command Center Premium for threat detection on defense evasion events.
references:
- https://attack.mitre.org/techniques/T1562/
- https://cloud.google.com/logging/docs/audit
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_audit
    - field: service
      op: equals
      value: bigquery.googleapis.com
    - field: operation
      op: equals
      value: google.cloud.bigquery.v2.DatasetService.UpdateDataset
    - field: request.dataset.defaultEncryptionConfiguration
      op: equals
      value: null
version: '1.0'
