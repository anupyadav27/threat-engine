rule_id: gcp.kms.activity.set_iam_policy
service: kms
provider: gcp
check_type: log
severity: high
title: 'KMS: Crypto Key IAM Policy Modified'
description: IAM policy modified on a KMS key — may grant decrypt access to unauthorized principals, enabling access to all resources encrypted with this key.
rationale: 'Adversaries add additional roles or permissions to adversary-controlled cloud accounts to maintain persistent access to a tenant. Attackers target Global Administrator, Owner, and Contributor roles — granting full control over subscription resources without deploying remote access tools. Detected via: IAM role attachment events, privilege grant events in Entra ID/Okta, and admin role assignment in Microsoft 365.'
threat_category: privilege_escalation
mitre_tactics:
- privilege_escalation
- credential_access
mitre_techniques:
- T1098.003
risk_score: 82
resource: kms_key
source: default
is_active: true
domain: identity_and_access_management
action_category: privilege_escalation
posture_category: iam_posture
threat_tags:
- T1098.003
- T1098
- cloud_iam
- privilege_escalation
risk_indicators:
  actor_type: cloud_principal
  action_type: privilege_change
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - policy_analysis
  - access_control
data_security:
  applicable: true
  modules:
  - secrets_management
  categories:
  - sensitive_data_access
  priority: high
  impact:
    pci: PCI DSS Requirement 3.4 — Sensitive authentication data must be protected
    gdpr: GDPR Article 32 — Appropriate technical measures to protect personal data
    hipaa: §164.312(e)(2)(ii) — Encryption of ePHI in transit and at rest
compliance_frameworks:
  cis_gcp_v2:
  - 1.1
  - 1.4
  - 1.7
  - 2.4
  nist_800_53_r5:
  - AC-2
  - AC-3
  - AC-6
  - IA-2
  pci_dss_v4:
  - 7.1
  - 7.2
  - 8.2
  iso_27001_2022:
  - A.5.18
  - A.8.2
  - A.8.3
detection_events:
- Microsoft.Authorization/roleAssignments/write
- 'iam:AttachUserPolicy'
- 'iam:PutRolePolicy'
- Add member to role (Entra ID audit)
remediation: |
  1. Immediately audit the modified IAM policy and revoke unauthorized role grants.
  2. Enable Cloud Asset Inventory change notifications for IAM policy updates.
  3. Apply Org Policy constraints to restrict role assignment to approved principals.
  4. Require two-person approval for Owner/Editor role grants via Cloud Identity workflows.
  5. Configure VPC Service Controls to prevent cross-project privilege escalation.
references:
- https://attack.mitre.org/techniques/T1098/003/
- https://cloud.google.com/iam/docs/audit-logging
- https://cloud.google.com/resource-manager/docs/audit-logging
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_audit
    - field: service
      op: equals
      value: cloudkms.googleapis.com
    - field: operation
      op: contains
      value: SetIamPolicy
version: '1.0'
