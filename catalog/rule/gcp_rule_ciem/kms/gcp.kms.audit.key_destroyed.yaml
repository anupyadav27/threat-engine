rule_id: gcp.kms.audit.key_destroyed
service: kms
provider: gcp
check_type: log
severity: critical
title: 'GCP KMS: Cryptographic Key Destroyed'
description: A Cloud KMS key version was scheduled for destruction or destroyed. This renders encrypted data permanently inaccessible and is a critical impact event.
rationale: Adversaries abuse kms operations to achieve impact in GCP environments. Detected via Cloud Admin Activity or Data Access audit logs.
threat_category: impact
mitre_tactics:
- impact
mitre_techniques:
- T1486
risk_score: 98
resource: gcp_kms_crypto_key_version
source: default
is_active: true
domain: impact
action_category: delete
log_source_type: 
posture_category: workload_posture
threat_tags:
- T1486
- impact
- availability
risk_indicators:
  actor_type: cloud_principal
  action_type: destructive
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: low
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: true
  modules:
  - secrets_management
  categories:
  - sensitive_data_access
  priority: critical
  impact:
    pci: PCI DSS Requirement 3.4 — Sensitive authentication data must be protected
    gdpr: GDPR Article 32 — Appropriate technical measures to protect personal data
    hipaa: §164.312(e)(2)(ii) — Encryption of ePHI in transit and at rest
  sensitive_data_context: |
  Unauthorized impact on kms resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks:
  cis_gcp_v2:
  - 2.1
  - 5.1
  - 6.5
  nist_800_53_r5:
  - CP-9
  - CP-10
  - SI-7
  pci_dss_v4:
  - 12.3
  - 10.2
  iso_27001_2022:
  - A.8.13
  - A.8.14
  - A.5.30
remediation: |
  1. Restore the deleted resource from Cloud Storage versioning, BigQuery snapshots, or Persistent Disk snapshot.
  2. Enable Cloud Storage Object Versioning and Bucket Lock for critical buckets.
  3. Apply Org Policy `constraints/gcp.resourceLocations` to restrict deletion regions.
  4. Set up Cloud Asset Inventory change notifications for resource deletion events.
  5. Require two-person approval for project deletion via Resource Manager policy.
references:
- https://attack.mitre.org/techniques/T1486/
- https://cloud.google.com/logging/docs/audit
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_audit
    - field: service
      op: equals
      value: cloudkms.googleapis.com
    - field: operation
      op: in
      value:
      - google.cloud.kms.v1.KeyManagementService.DestroyCryptoKeyVersion
      - google.cloud.kms.v1.KeyManagementService.ScheduleDestroyKeyVersion
version: '1.0'
