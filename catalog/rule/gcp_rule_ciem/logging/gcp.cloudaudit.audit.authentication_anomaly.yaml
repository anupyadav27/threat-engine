rule_id: gcp.cloudaudit.audit.authentication_anomaly
service: logging
provider: gcp
check_type: log
severity: high
title: Monitor for repeated failed authentication events in IAM and Admin Activity
  audit logs.
description: Detects repeated failed auth events (behavioral anomaly)
rationale: Monitoring this activity is essential for detecting adversary credential
  access against GCP resources. Unauthorized or unexpected API calls may indicate
  account compromise, privilege escalation, or an active attack chain.
threat_category: credential_access
mitre_tactics:
- credential_access
mitre_techniques:
- T1110
risk_score: 75
resource: gcp_logging_resource
source: csv_generated
is_active: true
domain: identity_and_access_management
action_category: audit_activity
log_source_type: gcp_audit_log
posture_category: threat_posture
threat_tags:
- T1110
- credential_access
- ciem_detection
risk_indicators:
  actor_type: cloud_principal
  action_type: read
  target_type: cloud_resource
  blast_radius: account
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  nist_800_171:
  - 3.1.8
remediation: '1. Lock the account or invalidate the session immediately if replay
  or brute force confirmed.

  2. Force MFA re-enrollment and rotate all API keys/secrets for the affected principal.

  3. Review all actions taken by the principal in the surrounding time window.

  4. Enforce account lockout policies after N failed attempts.

  5. Enable anomaly detection alerts for repeated authentication failures.'
references:
- https://attack.mitre.org/techniques/T1110/
- https://cloud.google.com/logging/docs/
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_audit_log
    - field: service
      op: equals
      value: cloudresourcemanager.googleapis.com
    - field: operation
      op: in
      value:
      - google.iam.admin.v1.ListServiceAccountKeys
      - google.login.LoginService.loginFailure
  type: log
  version: '1.0'
