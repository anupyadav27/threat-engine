rule_id: gcp.storage.audit.hmac_key_created
service: storage
provider: gcp
check_type: log
severity: high
title: 'GCP Storage: HMAC Key Created for Service Account'
description: An HMAC key was created for a GCS service account. HMAC keys are long-lived credentials used for S3-compatible access and can be exported.
rationale: Adversaries abuse storage operations to achieve credential access in GCP environments. Detected via Cloud Admin Activity or Data Access audit logs.
threat_category: credential_access
mitre_tactics:
- credential_access
mitre_techniques:
- T1552
risk_score: 76
resource: gcp_storage_hmac_key
source: default
is_active: true
domain: data_protection_and_privacy
action_category: create
log_source_type: 
posture_category: iam_posture
threat_tags:
- T1552
- credential_access
- secret_exposure
- storage_access
- data
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: storage_account
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: true
  modules:
  - secrets_management
  - data_access_governance
  categories:
  - secrets_exposure
  - credential_theft
  priority: high
  impact:
    pci: PCI DSS Requirement 3.1 — Minimize cardholder data storage
    gdpr: GDPR Article 25 — Data protection by design; minimize data exposure
    hipaa: §164.312(a)(1) — Access controls on data repositories containing ePHI
  sensitive_data_context: |
  Unauthorized credential access on storage resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks:
  cis_gcp_v2:
  - 1.6
  - 1.7
  - 1.9
  nist_800_53_r5:
  - IA-5
  - IA-8
  - SC-28
  pci_dss_v4:
  - 8.3
  - 8.6
  - 10.2
  iso_27001_2022:
  - A.8.5
  - A.8.6
  - A.5.17
remediation: |
  1. Immediately rotate or disable the accessed credential / secret.
  2. Review all Access Context Manager policies for unexpected secret access.
  3. Enable Secret Manager audit logs (Data Access) and alert on AccessSecretVersion.
  4. Apply CMEK to Secret Manager and restrict IAM to least-privilege consumers.
  5. Use Workload Identity Federation instead of long-lived service account keys.
references:
- https://attack.mitre.org/techniques/T1552/
- https://cloud.google.com/logging/docs/audit
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_audit
    - field: service
      op: equals
      value: storage.googleapis.com
    - field: operation
      op: equals
      value: storage.hmacKeys.create
version: '1.0'
