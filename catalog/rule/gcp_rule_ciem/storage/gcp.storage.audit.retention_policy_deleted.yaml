rule_id: gcp.storage.audit.retention_policy_deleted
service: storage
provider: gcp
check_type: log
severity: critical
title: 'GCP Storage: Bucket Retention Policy Deleted'
description: A retention policy was removed from a GCS bucket. This allows objects to be deleted before their retention period and may be part of a data destruction attack.
rationale: 'Adversaries destroy data and files on cloud storage or databases at scale to interrupt availability, render services inoperable, or destroy evidence. Cloud data destruction is often irreversible without backups. Detected via: bulk S3 object deletion via elevated IAM credentials, EC2/EBS/snapshot mass deletion events, storage account deletion with soft-delete disabled, and database cluster deletion without final snapshot.'
threat_category: impact
mitre_tactics:
- impact
mitre_techniques:
- T1485
risk_score: 90
resource: gcp_storage_bucket
source: default
is_active: true
domain: data_protection_and_privacy
action_category: delete
posture_category: workload_posture
threat_tags:
- T1485
- impact
- availability
- storage_access
- data
risk_indicators:
  actor_type: cloud_principal
  action_type: destructive
  target_type: storage_account
  blast_radius: resource_group
  stealth_risk: low
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: true
  modules:
  - data_access_governance
  categories:
  - sensitive_data_access
  priority: critical
  impact:
    pci: PCI DSS Requirement 3.1 — Minimize cardholder data storage
    gdpr: GDPR Article 25 — Data protection by design; minimize data exposure
    hipaa: §164.312(a)(1) — Access controls on data repositories containing ePHI
compliance_frameworks:
  cis_gcp_v2:
  - 2.1
  - 5.1
  - 6.5
  nist_800_53_r5:
  - CP-9
  - CP-10
  - SI-7
  pci_dss_v4:
  - 12.3
  - 10.2
  iso_27001_2022:
  - A.8.13
  - A.8.14
  - A.5.30
detection_events:
- 's3:DeleteObject (bulk)'
- 's3:DeleteBucket'
- 'ec2:TerminateInstances (mass)'
- Microsoft.Storage/storageAccounts/delete
- 'rds:DeleteDBCluster without SkipFinalSnapshot=false'
remediation: |
  1. Restore the deleted resource from Cloud Storage versioning, BigQuery snapshots, or Persistent Disk snapshot.
  2. Enable Cloud Storage Object Versioning and Bucket Lock for critical buckets.
  3. Apply Org Policy `constraints/gcp.resourceLocations` to restrict deletion regions.
  4. Set up Cloud Asset Inventory change notifications for resource deletion events.
  5. Require two-person approval for project deletion via Resource Manager policy.
references:
- https://attack.mitre.org/techniques/T1485/
- https://cloud.google.com/storage/docs/object-versioning
- https://cloud.google.com/kms/docs/audit-logging
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_audit
    - field: service
      op: equals
      value: storage.googleapis.com
    - field: operation
      op: equals
      value: storage.buckets.update
    - field: request.retentionPolicy
      op: equals
      value: null
version: '1.0'
