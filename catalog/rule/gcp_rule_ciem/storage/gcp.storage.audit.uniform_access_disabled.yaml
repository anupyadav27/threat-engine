rule_id: gcp.storage.audit.uniform_access_disabled
service: storage
provider: gcp
check_type: log
severity: high
title: 'GCP Storage: Uniform Bucket-Level Access Disabled'
description: Uniform bucket-level access was disabled on a GCS bucket, re-enabling ACL-based permissions that can be harder to audit.
rationale: Adversaries abuse storage operations to achieve defense evasion in GCP environments. Detected via Cloud Admin Activity or Data Access audit logs.
threat_category: defense_evasion
mitre_tactics:
- defense_evasion
mitre_techniques:
- T1562
risk_score: 72
resource: gcp_storage_bucket
source: default
is_active: true
domain: data_protection_and_privacy
action_category: modify
log_source_type: 
posture_category: security_posture
threat_tags:
- T1562
- defense_evasion
- log_tampering
- storage_access
- data
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: storage_account
  blast_radius: resource_group
  stealth_risk: critical
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: true
  modules:
  - data_access_governance
  categories:
  - sensitive_data_access
  priority: high
  impact:
    pci: PCI DSS Requirement 3.1 — Minimize cardholder data storage
    gdpr: GDPR Article 25 — Data protection by design; minimize data exposure
    hipaa: §164.312(a)(1) — Access controls on data repositories containing ePHI
  sensitive_data_context: |
  Unauthorized defense evasion on storage resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks:
  cis_gcp_v2:
  - 2.1
  - 2.2
  - 2.4
  - 2.5
  nist_800_53_r5:
  - AU-2
  - AU-6
  - AU-12
  - SI-4
  pci_dss_v4:
  - 10.1
  - 10.2
  - 10.3
  iso_27001_2022:
  - A.8.15
  - A.8.16
  - A.5.28
remediation: |
  1. Immediately restore the deleted or modified logging/security configuration.
  2. Apply Org Policy to prevent log sink deletion: `logging.restrictSinkCreation`.
  3. Use Cloud Storage Bucket Lock on log export buckets to prevent deletion.
  4. Configure out-of-band alerting via Pub/Sub → Cloud Functions for audit log changes.
  5. Enable Security Command Center Premium for threat detection on defense evasion events.
references:
- https://attack.mitre.org/techniques/T1562/
- https://cloud.google.com/logging/docs/audit
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_audit
    - field: service
      op: equals
      value: storage.googleapis.com
    - field: operation
      op: equals
      value: storage.buckets.update
    - field: request.iamConfiguration.uniformBucketLevelAccess.enabled
      op: equals
      value: false
version: '1.0'
