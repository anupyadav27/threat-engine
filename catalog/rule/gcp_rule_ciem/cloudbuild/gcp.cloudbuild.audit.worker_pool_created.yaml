rule_id: gcp.cloudbuild.audit.worker_pool_created
service: cloudbuild
provider: gcp
check_type: log
severity: medium
title: 'Cloud Build: Private Worker Pool Created'
description: A Cloud Build private worker pool was created. Worker pools with excessive VPC access can be used to pivot from build environments into production networks.
rationale: Adversaries abuse cloudbuild operations to achieve lateral movement in GCP environments. Detected via Cloud Admin Activity or Data Access audit logs.
threat_category: lateral_movement
mitre_tactics:
- lateral_movement
mitre_techniques:
- T1021
risk_score: 62
resource: gcp_cloudbuild_worker_pool
source: default
is_active: true
domain: network_security_and_connectivity
action_category: create
log_source_type: 
posture_category: network_posture
threat_tags:
- T1021
- lateral_movement
- cloud_pivot
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  cis_gcp_v2:
  - 1.4
  - 1.7
  - 3.1
  nist_800_53_r5:
  - AC-4
  - SC-7
  - SI-4
  pci_dss_v4:
  - 7.2
  - 1.3
  - 1.4
  iso_27001_2022:
  - A.8.20
  - A.8.22
  - A.5.18
remediation: |
  1. Revoke the service account impersonation grant (roles/iam.serviceAccountTokenCreator).
  2. Audit all GenerateAccessToken calls in iamcredentials.googleapis.com audit logs.
  3. Restrict service account impersonation using IAM Conditions (resource-based restrictions).
  4. Enable Security Command Center lateral movement threat findings.
  5. Rotate credentials for all service accounts involved in the impersonation chain.
references:
- https://attack.mitre.org/techniques/T1021/
- https://cloud.google.com/logging/docs/audit
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_audit
    - field: service
      op: equals
      value: cloudbuild.googleapis.com
    - field: operation
      op: equals
      value: google.devtools.cloudbuild.v1.CloudBuild.CreateWorkerPool
version: '1.0'
