rule_id: gcp.sql.activity.user_insert
service: sql
provider: gcp
check_type: log
severity: medium
title: 'Cloud SQL: New Database User Created'
description: New Cloud SQL user created — unauthorized database account may provide persistent access to database contents.
rationale: 'Adversaries create cloud accounts (IAM users, Entra ID users, service principals) to maintain access to victim systems without deploying persistent remote access tools. Such accounts establish secondary credentialed access that survives password resets of the initially compromised account. Detected via: IAM CreateUser + AttachUserPolicy from non-standard sources, Add User events from unusual IPs, and SaaS account provisioning outside business hours.'
threat_category: persistence
mitre_tactics:
- persistence
mitre_techniques:
- T1136.003
risk_score: 62
resource: sql_user
source: default
is_active: true
domain: identity_and_access_management
action_category: create
posture_category: iam_posture
threat_tags:
- T1136.003
- T1136
- persistence
- backdoor
risk_indicators:
  actor_type: cloud_principal
  action_type: write
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_gcp_v2:
  - 1.1
  - 1.4
  - 1.12
  nist_800_53_r5:
  - AC-2
  - AC-6
  - IA-4
  pci_dss_v4:
  - 7.1
  - 8.2
  - 8.3
  iso_27001_2022:
  - A.5.18
  - A.8.2
detection_events:
- 'iam:CreateUser'
- microsoft.directory/users/create
- 'organizations:CreateAccount'
- New-MsolUser (PowerShell)
remediation: |
  1. Audit and disable the newly created service account or Workload Identity Pool.
  2. Review all service account keys and revoke unexpected user-managed keys.
  3. Apply Org Policy `iam.disableServiceAccountCreation` for non-admin projects.
  4. Enable Security Command Center alerts for new service account creation events.
  5. Rotate credentials for any accounts that interacted with the new identity.
references:
- https://attack.mitre.org/techniques/T1136/003/
- https://cloud.google.com/iam/docs/audit-logging
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_audit
    - field: service
      op: equals
      value: sqladmin.googleapis.com
    - field: operation
      op: contains
      value: users.insert
version: '1.0'
