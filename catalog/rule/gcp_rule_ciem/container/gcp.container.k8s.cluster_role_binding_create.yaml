rule_id: gcp.container.k8s.cluster_role_binding_create
service: container
provider: gcp
check_type: log
severity: high
title: 'GKE K8s: ClusterRoleBinding Created'
description: Kubernetes ClusterRoleBinding created — grants cluster-wide permissions to a subject, potentially providing cluster-admin access to an attacker-controlled identity.
rationale: 'Adversaries add roles or permissions to service accounts or workload identities to maintain persistent access to container orchestration systems. Creating Kubernetes RoleBindings or ClusterRoleBindings for attacker-controlled identities enables cluster-wide command execution. Detected via: high-privilege role assignments outside CI/CD automation, bindings from unfamiliar IP addresses, and unexpected ServiceAccount token creation.'
threat_category: privilege_escalation
mitre_tactics:
- privilege_escalation
mitre_techniques:
- T1098.006
risk_score: 85
resource: k8s_cluster_role_binding
source: default
is_active: true
domain: container_and_kubernetes_security
action_category: create
posture_category: iam_posture
threat_tags:
- T1098.006
- T1098
- cloud_iam
- privilege_escalation
- kubernetes
- container_security
risk_indicators:
  actor_type: service_account_or_workload
  action_type: write
  target_type: kubernetes_workload
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_gcp_v2:
  - 1.1
  - 1.4
  - 1.7
  - 2.4
  nist_800_53_r5:
  - AC-2
  - AC-3
  - AC-6
  - IA-2
  pci_dss_v4:
  - 7.1
  - 7.2
  - 8.2
  iso_27001_2022:
  - A.5.18
  - A.8.2
  - A.8.3
detection_events:
- rolebindings/create
- clusterrolebindings/create
- serviceaccounts/create
remediation: |
  1. Immediately audit the modified IAM policy and revoke unauthorized role grants.
  2. Enable Cloud Asset Inventory change notifications for IAM policy updates.
  3. Apply Org Policy constraints to restrict role assignment to approved principals.
  4. Require two-person approval for Owner/Editor role grants via Cloud Identity workflows.
  5. Configure VPC Service Controls to prevent cross-project privilege escalation.
references:
- https://attack.mitre.org/techniques/T1098/006/
- https://cloud.google.com/kubernetes-engine/docs/how-to/audit-logging
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: k8s_audit
    - field: resource
      op: equals
      value: clusterrolebindings
    - field: verb
      op: equals
      value: create
version: '1.0'
