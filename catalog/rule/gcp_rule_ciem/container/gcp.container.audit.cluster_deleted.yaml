rule_id: gcp.container.audit.cluster_deleted
service: container
provider: gcp
check_type: log
severity: critical
title: 'GKE: Cluster Deleted'
description: A GKE cluster was deleted. Cluster deletion is a destructive impact action that terminates all workloads.
rationale: 'Adversaries destroy data and files on cloud storage or databases at scale to interrupt availability, render services inoperable, or destroy evidence. Cloud data destruction is often irreversible without backups. Detected via: bulk S3 object deletion via elevated IAM credentials, EC2/EBS/snapshot mass deletion events, storage account deletion with soft-delete disabled, and database cluster deletion without final snapshot.'
threat_category: impact
mitre_tactics:
- impact
mitre_techniques:
- T1485
risk_score: 95
resource: gcp_container_cluster
source: default
is_active: true
domain: container_and_kubernetes_security
action_category: delete
posture_category: workload_posture
threat_tags:
- T1485
- impact
- availability
- kubernetes
- container_security
risk_indicators:
  actor_type: service_account_or_workload
  action_type: destructive
  target_type: kubernetes_workload
  blast_radius: resource_group
  stealth_risk: low
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: false
compliance_frameworks:
  cis_gcp_v2:
  - 2.1
  - 5.1
  - 6.5
  nist_800_53_r5:
  - CP-9
  - CP-10
  - SI-7
  pci_dss_v4:
  - 12.3
  - 10.2
  iso_27001_2022:
  - A.8.13
  - A.8.14
  - A.5.30
detection_events:
- 's3:DeleteObject (bulk)'
- 's3:DeleteBucket'
- 'ec2:TerminateInstances (mass)'
- Microsoft.Storage/storageAccounts/delete
- 'rds:DeleteDBCluster without SkipFinalSnapshot=false'
remediation: |
  1. Restore the deleted resource from Cloud Storage versioning, BigQuery snapshots, or Persistent Disk snapshot.
  2. Enable Cloud Storage Object Versioning and Bucket Lock for critical buckets.
  3. Apply Org Policy `constraints/gcp.resourceLocations` to restrict deletion regions.
  4. Set up Cloud Asset Inventory change notifications for resource deletion events.
  5. Require two-person approval for project deletion via Resource Manager policy.
references:
- https://attack.mitre.org/techniques/T1485/
- https://cloud.google.com/storage/docs/object-versioning
- https://cloud.google.com/kms/docs/audit-logging
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_audit
    - field: service
      op: equals
      value: container.googleapis.com
    - field: operation
      op: equals
      value: google.container.v1.ClusterManager.DeleteCluster
version: '1.0'
