rule_id: gcp.container.audit.legacy_abac_enabled
service: container
provider: gcp
check_type: log
severity: critical
title: 'GKE: Legacy ABAC Enabled on Cluster'
description: Legacy Attribute-Based Access Control was enabled on a GKE cluster. Legacy ABAC grants the default service account broad cluster privileges.
rationale: 'Adversaries circumvent elevation control mechanisms to gain higher-level permissions. In cloud environments this includes SAML assertion manipulation, IAM role privilege boundary modifications, and STS:AssumeRole chaining to escalate from limited to administrative access. Detected via: privilege boundary removal events, STS role chaining with unusually broad permissions, and unexpected policy attachments.'
threat_category: privilege_escalation
mitre_tactics:
- privilege_escalation
mitre_techniques:
- T1548
risk_score: 90
resource: gcp_container_cluster
source: default
is_active: true
domain: container_and_kubernetes_security
action_category: create
posture_category: iam_posture
threat_tags:
- T1548
- cloud_iam
- privilege_escalation
- kubernetes
- container_security
risk_indicators:
  actor_type: service_account_or_workload
  action_type: write
  target_type: kubernetes_workload
  blast_radius: resource_group
  stealth_risk: high
iam_security:
  applicable: true
  modules:
  - access_control
data_security:
  applicable: false
compliance_frameworks:
  cis_gcp_v2:
  - 1.1
  - 1.4
  - 1.7
  - 2.4
  nist_800_53_r5:
  - AC-2
  - AC-3
  - AC-6
  - IA-2
  pci_dss_v4:
  - 7.1
  - 7.2
  - 8.2
  iso_27001_2022:
  - A.5.18
  - A.8.2
  - A.8.3
detection_events:
- 'iam:CreateRole with permissive trust'
- 'sts:AssumeRole with cross-account escalation'
- Microsoft.Authorization/elevateAccess/action
remediation: |
  1. Immediately audit the modified IAM policy and revoke unauthorized role grants.
  2. Enable Cloud Asset Inventory change notifications for IAM policy updates.
  3. Apply Org Policy constraints to restrict role assignment to approved principals.
  4. Require two-person approval for Owner/Editor role grants via Cloud Identity workflows.
  5. Configure VPC Service Controls to prevent cross-project privilege escalation.
references:
- https://attack.mitre.org/techniques/T1548/
- https://cloud.google.com/iam/docs/impersonating-service-accounts
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_audit
    - field: service
      op: equals
      value: container.googleapis.com
    - field: operation
      op: in
      value:
      - google.container.v1.ClusterManager.CreateCluster
      - google.container.v1.ClusterManager.UpdateCluster
    - field: request.cluster.legacyAbac.enabled
      op: equals
      value: true
version: '1.0'
