rule_id: gcp.artifactregistry.audit.repository_made_public
service: artifactregistry
provider: gcp
check_type: log
severity: high
title: 'Artifact Registry: Repository Made Publicly Readable'
description: An Artifact Registry repository was made publicly readable. Publicly exposed registries may leak internal container images, including embedded secrets.
rationale: Adversaries abuse artifactregistry operations to achieve collection in GCP environments. Detected via Cloud Admin Activity or Data Access audit logs.
threat_category: collection
mitre_tactics:
- collection
mitre_techniques:
- T1005
risk_score: 78
resource: gcp_artifactregistry_repository
source: default
is_active: true
domain: data_protection_and_privacy
action_category: read
log_source_type: 
posture_category: data_security_posture
threat_tags:
- T1005
- data_collection
- sensitive_data
risk_indicators:
  actor_type: cloud_principal
  action_type: read
  target_type: cloud_resource
  blast_radius: resource_group
  stealth_risk: medium
iam_security:
  applicable: false
  modules: []
data_security:
  applicable: true
  modules:
  - data_access_governance
  categories:
  - sensitive_data_access
  - unauthorized_access
  priority: high
  impact:
    pci: PCI DSS Requirement 12.3 — Implement security awareness program and protect systems
    gdpr: GDPR Article 32 — Appropriate technical and organizational measures for data security
    hipaa: §164.306(a) — Ensure confidentiality, integrity, and availability of ePHI
  sensitive_data_context: |
  Unauthorized collection on artifactregistry resources must be detected to prevent:
      - Data loss and regulatory compliance violations
      - Unauthorized exposure of sensitive and personal data
      - Violation of data residency and retention policies
compliance_frameworks:
  cis_gcp_v2:
  - 5.1
  - 5.2
  nist_800_53_r5:
  - AC-4
  - SC-28
  - SI-4
  pci_dss_v4:
  - 3.1
  - 7.1
  iso_27001_2022:
  - A.8.12
  - A.5.12
remediation: |
  1. Audit and revert the snapshot or data access operation.
  2. Review IAM permissions on the affected disk/volume and revoke unauthorized access.
  3. Enable disk snapshot sharing restrictions via Org Policy.
  4. Configure Security Command Center alerts for snapshot cross-project share events.
  5. Encrypt all persistent disks with CMEK to prevent use without key access.
references:
- https://attack.mitre.org/techniques/T1005/
- https://cloud.google.com/logging/docs/audit
check_config:
  conditions:
    all:
    - field: source_type
      op: equals
      value: gcp_audit
    - field: service
      op: equals
      value: artifactregistry.googleapis.com
    - field: operation
      op: equals
      value: google.devtools.artifactregistry.v1.ArtifactRegistry.SetIamPolicy
    - field: request.policy.bindings.members
      op: contains_any
      value:
      - allUsers
      - allAuthenticatedUsers
version: '1.0'
