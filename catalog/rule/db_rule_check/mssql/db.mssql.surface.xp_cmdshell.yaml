rule_id: db.mssql.cis.2.1.xp_cmdshell_disabled
engine: mssql
category: surface_reduction
cis_section: '2'
cis_control: '2.1'
title: "Ensure 'xp_cmdshell' is disabled"
severity: critical
scope: db.mssql.surface.xp_cmdshell
assertion:
  field: value
  operator: equals
  expected: 0
remediation: >
  EXEC sp_configure 'show advanced options', 1;
  RECONFIGURE;
  EXEC sp_configure 'xp_cmdshell', 0;
  RECONFIGURE;
compliance:
  - cis_mssql_2022_2.1
  - soc2_cc6.6
  - nist_800_53_CM_7
