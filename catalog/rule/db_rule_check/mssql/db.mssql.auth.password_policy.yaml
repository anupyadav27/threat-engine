rule_id: db.mssql.cis.3.2.password_policy
engine: mssql
category: authentication
cis_section: '3'
cis_control: '3.2'
title: "Ensure SQL authentication logins have password policy and expiration enforced"
severity: high
scope: db.mssql.auth.password_policy_enforced
assertion:
  field: row_count
  operator: equals
  expected: 0
remediation: >
  For each affected login:
  ALTER LOGIN <login_name> WITH CHECK_POLICY = ON, CHECK_EXPIRATION = ON;
compliance:
  - cis_mssql_2022_3.2
  - soc2_cc6.1
  - nist_800_53_IA_5
