rule_id: db.postgres.cis.1.1.password_encryption
engine: postgres
category: authentication
cis_section: '1'
cis_control: '1.1'
title: "Ensure 'password_encryption' is set to 'scram-sha-256'"
severity: high
scope: db.postgres.auth.password_encryption
assertion:
  field: value
  operator: equals
  expected: scram-sha-256
remediation: >
  In postgresql.conf set: password_encryption = scram-sha-256
  Then reload: SELECT pg_reload_conf();
compliance:
  - cis_postgres_16_1.1
  - soc2_cc6.1
  - nist_800_53_IA_5
