rule_id: db.postgres.cis.3.2.log_disconnections
engine: postgres
category: logging
cis_section: '3'
cis_control: '3.2'
title: "Ensure 'log_disconnections' is enabled"
severity: medium
scope: db.postgres.logging.log_disconnections
assertion:
  field: value
  operator: equals
  expected: "on"
remediation: >
  In postgresql.conf set: log_disconnections = on
  Then reload: SELECT pg_reload_conf();
compliance:
  - cis_postgres_16_3.2
  - soc2_cc7.2
  - nist_800_53_AU_2
