rule_id: db.postgres.cis.6.7.ssl_enabled
engine: postgres
category: access_control
cis_section: '6'
cis_control: '6.7'
title: "Ensure SSL is enabled for all connections"
severity: high
scope: db.postgres.acl.ssl_enabled
assertion:
  field: value
  operator: equals
  expected: "on"
remediation: >
  In postgresql.conf set: ssl = on
  Ensure ssl_cert_file and ssl_key_file are configured.
  Then reload: SELECT pg_reload_conf();
compliance:
  - cis_postgres_16_6.7
  - soc2_cc6.7
  - pci_dss_v4_4.2.1
  - nist_800_53_SC_8
