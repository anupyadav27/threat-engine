rule_id: db.postgres.cis.3.7.log_statement
engine: postgres
category: logging
cis_section: '3'
cis_control: '3.7'
title: "Ensure 'log_statement' is set to 'ddl' or higher"
severity: medium
scope: db.postgres.logging.log_statement
assertion:
  field: value
  operator: in
  expected: [ddl, mod, all]
remediation: >
  In postgresql.conf set: log_statement = ddl
  Then reload: SELECT pg_reload_conf();
compliance:
  - cis_postgres_16_3.7
  - soc2_cc7.2
  - nist_800_53_AU_3
