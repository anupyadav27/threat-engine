rule_id: db.postgres.cis.3.1.log_connections
engine: postgres
category: logging
cis_section: '3'
cis_control: '3.1'
title: "Ensure 'log_connections' is enabled"
severity: medium
scope: db.postgres.logging.log_connections
assertion:
  field: value
  operator: equals
  expected: "on"
remediation: >
  In postgresql.conf set: log_connections = on
  Then reload: SELECT pg_reload_conf();
compliance:
  - cis_postgres_16_3.1
  - soc2_cc7.2
  - nist_800_53_AU_2
