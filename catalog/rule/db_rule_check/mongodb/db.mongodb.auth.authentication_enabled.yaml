rule_id: db.mongodb.cis.3.1.auth_enabled
engine: mongodb
category: authentication
cis_section: '3'
cis_control: '3.1'
title: "Ensure MongoDB authentication is enabled"
severity: critical
scope: db.mongodb.auth.authentication_enabled
assertion:
  field: value
  operator: equals
  expected: enabled
remediation: >
  In mongod.conf set:
  security:
    authorization: enabled
  Then restart mongod.
compliance:
  - cis_mongodb_7_3.1
  - soc2_cc6.1
  - nist_800_53_IA_2
