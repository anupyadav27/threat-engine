rule_id: db.mongodb.cis.3.7.tls_required
engine: mongodb
category: access_control
cis_section: '3'
cis_control: '3.7'
title: "Ensure TLS/SSL is set to requireTLS"
severity: high
scope: db.mongodb.acl.tls_mode
assertion:
  field: value
  operator: equals
  expected: requireTLS
remediation: >
  In mongod.conf set:
  net:
    tls:
      mode: requireTLS
      certificateKeyFile: /etc/ssl/mongodb.pem
      CAFile: /etc/ssl/ca.pem
  Then restart mongod.
compliance:
  - cis_mongodb_7_3.7
  - soc2_cc6.7
  - pci_dss_v4_4.2.1
  - nist_800_53_SC_8
