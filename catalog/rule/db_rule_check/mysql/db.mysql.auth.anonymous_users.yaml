rule_id: db.mysql.cis.3.1.anonymous_users
engine: mysql
category: authentication
cis_section: '3'
cis_control: '3.1'
title: "Ensure no anonymous accounts exist"
severity: high
scope: db.mysql.auth.anonymous_users
assertion:
  field: row_count
  operator: equals
  expected: 0
remediation: >
  Remove anonymous users:
  DELETE FROM mysql.user WHERE user = '';
  FLUSH PRIVILEGES;
compliance:
  - cis_mysql_8_3.1
  - soc2_cc6.1
  - nist_800_53_IA_2
