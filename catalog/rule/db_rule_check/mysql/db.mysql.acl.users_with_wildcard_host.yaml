rule_id: db.mysql.cis.4.1.wildcard_host
engine: mysql
category: access_control
cis_section: '4'
cis_control: '4.1'
title: "Ensure no users have host set to wildcard '%'"
severity: high
scope: db.mysql.acl.users_with_wildcard_host
assertion:
  field: row_count
  operator: equals
  expected: 0
remediation: >
  Update affected user accounts to use specific hostnames or IP ranges:
  UPDATE mysql.user SET host = '<specific_host>' WHERE host = '%';
  FLUSH PRIVILEGES;
compliance:
  - cis_mysql_8_4.1
  - soc2_cc6.1
  - nist_800_53_AC_3
