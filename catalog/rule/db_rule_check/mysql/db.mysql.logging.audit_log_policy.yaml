rule_id: db.mysql.cis.6.1.audit_log_policy
engine: mysql
category: logging
cis_section: '6'
cis_control: '6.1'
title: "Ensure the audit log plugin is enabled and captures all events"
severity: medium
scope: db.mysql.logging.audit_log_policy
assertion:
  field: value
  operator: equals
  expected: ALL
remediation: >
  Install and configure the audit log plugin:
  INSTALL PLUGIN audit_log SONAME 'audit_log.so';
  SET GLOBAL audit_log_policy = ALL;
compliance:
  - cis_mysql_8_6.1
  - soc2_cc7.2
  - nist_800_53_AU_2
