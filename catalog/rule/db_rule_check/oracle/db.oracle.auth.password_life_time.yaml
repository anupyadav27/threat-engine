rule_id: db.oracle.cis.4.1.password_life_time
engine: oracle
category: authentication
cis_section: '4'
cis_control: '4.1'
title: "Ensure PASSWORD_LIFE_TIME is set to 90 days or less"
severity: medium
scope: db.oracle.auth.password_life_time
assertion:
  field: limit
  operator: lte
  expected: 90
remediation: >
  ALTER PROFILE DEFAULT LIMIT PASSWORD_LIFE_TIME 90;
compliance:
  - cis_oracle_19c_4.1
  - soc2_cc6.1
  - nist_800_53_IA_5
