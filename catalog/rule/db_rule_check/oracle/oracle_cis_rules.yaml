# Oracle Database — CIS Check Rules
# Source benchmark: CIS Oracle Database 19c
# Fill in rules per sprint. Each rule maps to a discovery_id above.

tech_type: oracle
category: db
cis_benchmark: CIS Oracle Database 19c

rules:
  - rule_id: oracle.cis.auth.password_policy_min_length
    title: "Ensure minimum password length is configured"
    severity: medium
    cis_section: '4'
    nist_controls: [IA-5]
    soc2_criteria: [CC6.1]
    scope: oracle.auth.password_policy
    assertion:
      field: min_length
      operator: gte
      expected: 14
    remediation: >
      Configure minimum password length to 14+ characters in the Oracle Database
      password policy settings.

  - rule_id: oracle.cis.logging.audit_enabled
    title: "Ensure audit logging is enabled"
    severity: high
    cis_section: '4'
    nist_controls: [AU-2, AU-3]
    soc2_criteria: [CC7.2]
    scope: oracle.logging.audit_config
    assertion:
      field: audit_enabled
      operator: equals
      expected: "true"
    remediation: >
      Enable audit logging in Oracle Database configuration.
      Refer to CIS Oracle Database 19c for specific settings.

  - rule_id: oracle.cis.encryption.tls_enabled
    title: "Ensure TLS/SSL is enabled for all connections"
    severity: high
    cis_section: '4'
    nist_controls: [SC-8, SC-28]
    soc2_criteria: [CC6.7]
    scope: oracle.encryption.transport
    assertion:
      field: tls_enabled
      operator: equals
      expected: "true"
    remediation: >
      Enable TLS/SSL encryption for Oracle Database connections.
      Refer to CIS Oracle Database 19c for minimum TLS version requirements.

  - rule_id: oracle.cis.acl.admin_count
    title: "Ensure the number of administrative accounts is minimized"
    severity: medium
    cis_section: '4'
    nist_controls: [AC-6]
    soc2_criteria: [CC6.3]
    scope: oracle.acl.admin_privileges
    assertion:
      field: row_count
      operator: lte
      expected: 3
    remediation: >
      Review and reduce administrative accounts in Oracle Database.
      Apply principle of least privilege.
