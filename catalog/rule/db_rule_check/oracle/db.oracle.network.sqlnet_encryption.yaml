rule_id: db.oracle.cis.3.1.sqlnet_encryption
engine: oracle
category: network
cis_section: '3'
cis_control: '3.1'
title: "Ensure SQL*Net encryption is set to REQUIRED or REQUESTED"
severity: high
scope: db.oracle.network.sqlnet_encryption
assertion:
  field: value
  operator: in
  expected: [REQUIRED, REQUESTED]
remediation: >
  In sqlnet.ora set:
  SQLNET.ENCRYPTION_SERVER = REQUIRED
  SQLNET.ENCRYPTION_TYPES_SERVER = (AES256, AES192, AES128)
compliance:
  - cis_oracle_19c_3.1
  - soc2_cc6.7
  - pci_dss_v4_4.2.1
  - nist_800_53_SC_8
