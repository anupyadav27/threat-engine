rule_id: db.oracle.cis.5.1.unified_auditing
engine: oracle
category: logging
cis_section: '5'
cis_control: '5.1'
title: "Ensure Unified Auditing is enabled"
severity: high
scope: db.oracle.logging.unified_auditing
assertion:
  field: value
  operator: equals
  expected: "TRUE"
remediation: >
  Relink Oracle Database with unified auditing:
  cd $ORACLE_HOME/rdbms/lib
  make -f ins_rdbms.mk uniaud_on ioracle
  Then restart the database.
compliance:
  - cis_oracle_19c_5.1
  - soc2_cc7.2
  - nist_800_53_AU_2
