tech_type: ibm_db2
category: database
cis_benchmark: CIS IBM DB2 11 v1.1.0
cis_section: '8'

rules:

  - rule_id: ibm_db2.cis.8.secure_the_configuration_file
    title: "Secure the Configuration File"
    severity: high
    automation_type: automated
    cis_control: '8.2.3'
    cis_section: '8'
    profile_applicability: "Level 1 + Level 2"
    scope: ibm_db2.section_8.secure_the_configuration_file
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      Change the permissions for the file: $ chmod 600 ekeystore.cfg
    compliance:
      - cis_ibm_db2_11_v1_1_0_8_2_3


