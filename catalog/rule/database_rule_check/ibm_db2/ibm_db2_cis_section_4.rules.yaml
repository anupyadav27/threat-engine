tech_type: ibm_db2
category: database
cis_benchmark: CIS IBM DB2 11 v1.1.0
cis_section: '4'

rules:

  - rule_id: ibm_db2.cis.4.set_failed_archive_retry_delay_archretrydelay
    title: "Set Failed Archive Retry Delay (ARCHRETRYDELAY)"
    severity: high
    automation_type: automated
    cis_control: '4.1.2'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: ibm_db2.section_4.set_failed_archive_retry_delay_archretrydelay
    assertion:
      field: row_count
      operator: equals
      expected: "true"
    remediation: >
      1. Connect to the Db2 database db2 => connect to <dbname> 2. To successfully
      set the ARCHRETRYDELAY within the 10-30 range, run the following command: db2
      => update database configuration using archretrydelay *nn* (where *nn* is a
      range between 10-30) Default Value: The default value for ARCHRETRYDELAY is
      20.
    compliance:
      - cis_ibm_db2_11_v1_1_0_4_1_2

  - rule_id: ibm_db2.cis.4.auto_restart_after_abnormal_termination
    title: "Auto-restart After Abnormal Termination (AUTORESTART)"
    severity: high
    automation_type: automated
    cis_control: '4.1.3'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: ibm_db2.section_4.auto_restart_after_abnormal_termination
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      1. Connect to the Db2 database db2 => connect to <dbname> 2. Run the following
      command: db2 => update database configuration using autorestart on Default
      Value: The default value for AUTORESTART is ON.
    compliance:
      - cis_ibm_db2_11_v1_1_0_4_1_3

  - rule_id: ibm_db2.cis.4.disable_database_discovery_discover_db
    title: "Disable Database Discovery (DISCOVER_DB)"
    severity: high
    automation_type: automated
    cis_control: '4.1.4'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: ibm_db2.section_4.disable_database_discovery_discover_db
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      1. Connect to the Db2 database db2 => connect to <dbname> 2. Run the following
      command: db2 => update database configuration using discover_db disable
    compliance:
      - cis_ibm_db2_11_v1_1_0_4_1_4

  - rule_id: ibm_db2.cis.4.set_archive_log_failover_retry_limit_numarchretry
    title: "Set Archive Log Failover Retry Limit (NUMARCHRETRY)"
    severity: high
    automation_type: automated
    cis_control: '4.1.11'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: ibm_db2.section_4.set_archive_log_failover_retry_limit_numarchretry
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      1. Connect to the Db2 database db2 => connect to <dbname> 2. Run the following
      command: db2 => update database configuration using numarchretry 5
    compliance:
      - cis_ibm_db2_11_v1_1_0_4_1_11

  - rule_id: ibm_db2.cis.4.set_maximum_number_of_applications_maxappls
    title: "Set Maximum Number of Applications (MAXAPPLS)"
    severity: high
    automation_type: automated
    cis_control: '4.1.12'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: ibm_db2.section_4.set_maximum_number_of_applications_maxappls
    assertion:
      field: row_count
      operator: lte
      expected: "true"
    remediation: >
      1. Connect to the Db2 database db2 => connect to <dbname> 2. If a single
      database is used in the instance, run the following command: db2 => update
      database configuration using maxappls AUTOMATIC 3. If multiple databases are
      used in the instance, determine appropriate values for each database such that
      the sum of MAXAPPLS values equals the MAX_CONNECTIONS database manager
      configuration parameter value (for example 100 for each of 2 databases when
      MAX_CONNECTIONS is 200), and run the following command: db2 => update database
      configuration using maxappls 200 References: 1.
      https://www.ibm.com/docs/en/db2/11.5?topic=parameters-maxappls-maximum-
      number-active-applications
    compliance:
      - cis_ibm_db2_11_v1_1_0_4_1_12

  - rule_id: ibm_db2.cis.4.disable_database_discoverability_discover_db
    title: "Disable Database Discoverability (DISCOVER_DB)"
    severity: high
    automation_type: automated
    cis_control: '4.1.15'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: ibm_db2.section_4.disable_database_discoverability_discover_db
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      1. Connect to the Db2 database. db2 => connect to <dbname> 2. Run the
      following command: db2 => update database configuration using discover_db
      disable References: 1. https://www.ibm.com/docs/en/db2/11.5?topic=parameters-
      discover-db-discover- database
    compliance:
      - cis_ibm_db2_11_v1_1_0_4_1_15

  - rule_id: ibm_db2.cis.4.remove_unused_schemas
    title: "Remove Unused Schemas"
    severity: high
    automation_type: automated
    cis_control: '4.5.2'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: ibm_db2.section_4.remove_unused_schemas
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Remove unnecessary schemas. 1. Connect to the Db2 database. db2 => connect to
      <dbname> 2. Run the following command: db2 => drop scheme <scheme name>
      restrict
    compliance:
      - cis_ibm_db2_11_v1_1_0_4_5_2

  - rule_id: ibm_db2.cis.4.review_system_tablespaces
    title: "Review System Tablespaces"
    severity: high
    automation_type: automated
    cis_control: '4.5.3'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: ibm_db2.section_4.review_system_tablespaces
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      1. Connect to the Db2 database. db2 => connect to <dbname> 2. Review the
      system tablespaces to identify any user data objects within them. 3. Drop,
      migrate, or otherwise remove all user data objects (tables, schemas, etc.)
      from within the system tablespaces. 4. Revoke write access for the system
      tablespaces from all users. 5 Authentication Considerations
    compliance:
      - cis_ibm_db2_11_v1_1_0_4_5_3


