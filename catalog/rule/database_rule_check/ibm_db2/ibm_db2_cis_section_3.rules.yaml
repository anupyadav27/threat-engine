tech_type: ibm_db2
category: database
cis_benchmark: CIS IBM DB2 11 v1.1.0
cis_section: '3'

rules:

  - rule_id: ibm_db2.cis.3.set_diagnostic_logging_to_capture_errors_and
    title: "Set Diagnostic Logging to Capture Errors and Warnings (DIAGLEVEL)"
    severity: high
    automation_type: automated
    cis_control: '3.1.3'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: ibm_db2.section_3.set_diagnostic_logging_to_capture_errors_and
    assertion:
      field: value
      operator: gte
      expected: "true"
    remediation: >
      1. Attach to the Db2 instance db2 => attach to <db2instance> 2. Run the
      following command: db2 => update database manager configuration using
      diaglevel 3
    compliance:
      - cis_ibm_db2_11_v1_1_0_3_1_3

  - rule_id: ibm_db2.cis.3.disable_client_discovery_requests_discover
    title: "Disable Client Discovery Requests (DISCOVER)"
    severity: high
    automation_type: automated
    cis_control: '3.1.6'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: ibm_db2.section_3.disable_client_discovery_requests_discover
    assertion:
      field: enabled
      operator: equals
      expected: "false"
    remediation: >
      1. Run the following command: db2 => update database manager configuration
      using discover disable References: 1.
      https://www.ibm.com/docs/en/db2/11.5?topic=parameters-discover-discovery- mode
    compliance:
      - cis_ibm_db2_11_v1_1_0_3_1_6

  - rule_id: ibm_db2.cis.3.disable_instance_discoverability_discover_inst
    title: "Disable Instance Discoverability (DISCOVER_INST)"
    severity: high
    automation_type: automated
    cis_control: '3.1.7'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: ibm_db2.section_3.disable_instance_discoverability_discover_inst
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      1. Attach to the Db2 instance: db2 => attach to <db2instance> 2. Run the
      following command: db2 => update database manager configuration using
      discover_inst disable References: 1.
      https://www.ibm.com/docs/en/db2/11.5?topic=parameters-discover-inst-discover-
      server-instance
    compliance:
      - cis_ibm_db2_11_v1_1_0_3_1_7

  - rule_id: ibm_db2.cis.3.set_maximum_connection_limits_max_connections_and
    title: "Set Maximum Connection Limits (MAX_CONNECTIONS and MAX_COORDAGENTS)"
    severity: high
    automation_type: automated
    cis_control: '3.1.8'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: ibm_db2.section_3.set_maximum_connection_limits_max_connections_and
    assertion:
      field: row_count
      operator: lte
      expected: "true"
    remediation: >
      The default value for MAX_COORDAGENTS is AUTOMATIC(200). Allowable range is 1
      to 64,000. The recommended value is 200, without the AUTOMATIC setting. The
      value of 200 is used as an example and is dependent on workload as discussed
      in the Description. The default value for MAX_CONNECTIONS is set to
      AUTOMATIC(-1). Allowable range is 1 to 64,000, or -1 for matching the value of
      MAX_COORDAGENTS. The recommended value is -1 without AUTOMATIC. It is also
      acceptable to have a value for MAX_CONNECTIONS that is greater than
      MAX_COORDAGENTS, such as 300, in order to turn on the Concentrator feature.
      Generally, both MAX_COORDAGENTS and MAX_CONNECTIONS should be configured
      within the same statement, otherwise the error SQL6112N may be encountered.
      The following command will set the MAX_COORDAGENTS to 200, as well as set the
      MAX_CONNECTIONS to -1. 1. Attach to the Db2 instance db2 => attach to
      <db2instance> 2. Run the following command: db2 => update database manager
      configuration using max_coordagents 200 max_connections -1 References: 1.
      https://www.ibm.com/docs/en/db2/11.5?topic=parameters-max-connections-
      maximum-number-client-connections 2.
      https://www.ibm.com/docs/en/db2/11.5?topic=parameters-max-coordagents-
      maximum-number-coordinating-agents
    compliance:
      - cis_ibm_db2_11_v1_1_0_3_1_8

  - rule_id: ibm_db2.cis.3.set_administrative_notification_level_notifylevel
    title: "Set Administrative Notification Level (NOTIFYLEVEL)"
    severity: high
    automation_type: automated
    cis_control: '3.1.9'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: ibm_db2.section_3.set_administrative_notification_level_notifylevel
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      1. Attach to the Db2 instance db2 => attach to <db2instance> 2. Run the
      following command: db2 => update database manager configuration using
      notifylevel 3 Default Value: The default value of NOTIFYLEVEL is 3.
    compliance:
      - cis_ibm_db2_11_v1_1_0_3_1_9

  - rule_id: ibm_db2.cis.3.secure_the_java_development_kit_installation_path
    title: "Secure the Java Development Kit Installation Path (JDK_PATH)"
    severity: high
    automation_type: automated
    cis_control: '3.1.10'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: ibm_db2.section_3.secure_the_java_development_kit_installation_path
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      For Windows and Linux: 1. Attach to the Db2 instance. db2 => attach to
      <db2instance> 2. Run the following command to change the JDK path, if
      necessary: db2 => update database manager configuration using jdk_path <valid
      directory> Additional steps for Windows: 1. Connect to the Db2 host 2. Right-
      click over the directory used as the JDK path 3. Choose Properties 4. Select
      the Security tab 5. Assign ownership of the directory to the Db2 Administrator
      6. Grant all Db2 administrator accounts the Full Control authority 7. Grant
      only read and execute privileges to all other users (revoke all other
      privileges) Additional steps for Linux: 1. Connect to the Db2 host as root 2.
      Change to the directory used as the JDK path 3. Assign bin to be the owner of
      the directory using the chown command 4. Change the permissions for the
      directory $ chmod -R 755 References: 1.
      https://www.ibm.com/docs/en/db2/11.5?topic=parameters-jdk-path-software-
      developer
    compliance:
      - cis_ibm_db2_11_v1_1_0_3_1_10

