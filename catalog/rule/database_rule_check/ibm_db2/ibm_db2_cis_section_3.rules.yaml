  - rule_id: ibm_db2.cis.3.specify_secure_remote_shell_command_db2rshcmd
    title: "Specify Secure Remote Shell Command (DB2RSHCMD)"
    severity: high
    automation_type: automated
    cis_control: '3.2.1'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: ibm_db2.section_3.specify_secure_remote_shell_command_db2rshcmd
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      1. Follow the guidance on this page to create public and private keys for ssh:
      https://www.ibm.com/docs/en/db2/11.5?topic=installation-enabling-execution-
      remote-commands 2. Run the following command to set the DB2_RSHCMD registry
      variable to ssh: db2set DB2RSHCMD=ssh Default Value: In Db2 V11.5 Mod Pack 5
      or earlier, the default value is rsh. In Db2 V11.5 Mod Pack 6 or later, the
      default value is ssh. References: 1.
      https://www.ibm.com/docs/en/db2/11.5?topic=variables-
      communications#r0005660__C_DB2RSHCMD 2.
      https://www.ibm.com/docs/en/db2/11.5?topic=installation-enabling-execution-
      remote-commands
    compliance:
      - cis_ibm_db2_11_v1_1_0_3_2_1

  - rule_id: ibm_db2.cis.3.turn_off_remote_command_legacy_mode_db2rcmd
    title: "Turn Off Remote Command Legacy Mode (DB2RCMD_LEGACY_MODE)"
    severity: high
    automation_type: automated
    cis_control: '3.2.2'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: ibm_db2.section_3.turn_off_remote_command_legacy_mode_db2rcmd
    assertion:
      field: enabled
      operator: equals
      expected: "off"
    remediation: >
      Run the following command to set the DB2RCMD_LEGACY_MODE registry variable to
      OFF: db2set DB2RCMD_LEGACY_MODE=OFF Default Value: The default value of
      DB2RCMD_LEGACY_MODE is OFF. References: 1.
      https://www.ibm.com/docs/en/db2/11.5?topic=variables-system-
      environment#r0005658_%5C_S_DB2RCMD_LEGACY_MODE
    compliance:
      - cis_ibm_db2_11_v1_1_0_3_2_2

