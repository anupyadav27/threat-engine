tech_type: mysql
category: database
cis_benchmark: CIS MySQL 8.4 enterprise v1.0.0
cis_section: '3'

rules:

  - rule_id: mysql.cis.3.datadir_has_appropriate_permissions
    title: "Ensure 'datadir' Has Appropriate Permissions"
    severity: high
    automation_type: automated
    cis_control: '3.1'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: mysql.section_3.datadir_has_appropriate_permissions
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Execute the following commands at a terminal prompt: chmod 750 <datadir> chown
      mysql:mysql <datadir> References: 1. https://dev.mysql.com/doc/mysql-secure-
      deployment-guide/8.4/en/secure- deployment-permissions.html
    compliance:
      - cis_mysql_8_4_enterprise_v1_0_0_3_1

  - rule_id: mysql.cis.3.ssl_key_files_have_appropriate_permissions
    title: "Ensure SSL Key Files Have Appropriate Permissions"
    severity: high
    automation_type: automated
    cis_control: '3.7'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: mysql.section_3.ssl_key_files_have_appropriate_permissions
    assertion:
      field: port
      operator: exists
      expected: "true"
    remediation: >
      Execute the following commands at a terminal prompt to remediate these
      settings using the Value from the audit procedure: chown mysql:mysql
      <ssl_file> chmod 400 <ssl_file> References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/encrypted-connections.html 2.
      https://dev.mysql.com/doc/refman/8.4/en/creating-ssl-rsa-files-using-
      mysql.html Additional Information: If SSL is not configured this
      recommendation is not applicable. By default MySQL enables SSL. Using SSL is
      highly recommended.
    compliance:
      - cis_mysql_8_4_enterprise_v1_0_0_3_7

  - rule_id: mysql.cis.3.plugin_directory_has_appropriate_permissions
    title: "Ensure Plugin Directory Has Appropriate Permissions"
    severity: high
    automation_type: automated
    cis_control: '3.8'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: mysql.section_3.plugin_directory_has_appropriate_permissions
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      To remediate these settings, execute the following commands at a terminal
      prompt using the plugin_dir Value from the audit procedure. MySQL server must
      not be allowed to write to this location. chmod 550 <plugin_dir Value> #(or
      use 554) chown mysql:mysql <plugin_dir Value> References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/install-plugin.html
    compliance:
      - cis_mysql_8_4_enterprise_v1_0_0_3_8

  - rule_id: mysql.cis.3.secure_mysql_keyring
    title: "Secure MySQL Keyring"
    severity: high
    automation_type: automated
    cis_control: '3.10'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: mysql.section_3.secure_mysql_keyring
    assertion:
      field: value
      operator: exists
      expected: "no"
    remediation: >
      If no keyring plugin or keyring file plugin is configured, instructions for
      configuring a keyring plugin or keyring file plugin may found at: • KMIP -
      https://dev.mysql.com/doc/refman/8.0/en/keyring-okv- plugin.html#keyring-okv-
      configuration • OCI Vault - https://dev.mysql.com/doc/refman/8.0/en/keyring-
      oci-plugin.html • Hashicorp - https://dev.mysql.com/doc/refman/8.0/en/keyring-
      hashicorp- plugin.html#keyring-hashicorp-plugin-configuration • AWS -
      https://dev.mysql.com/doc/refman/8.0/en/keyring-aws- plugin.html#keyring-aws-
      plugin-configuration Execute the following command for each Keyring file
      location requiring corrected permissions: chmod 750 <keyring file> chown
      mysql:mysql <keyring file> References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/keyring-system-variables.html
      Additional Information: Use of keyring_file is intended for development and
      testing and will not pass most security regulatory requirements.
    compliance:
      - cis_mysql_8_4_enterprise_v1_0_0_3_10


