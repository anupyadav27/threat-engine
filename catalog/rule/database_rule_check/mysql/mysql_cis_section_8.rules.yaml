tech_type: mysql
category: database
cis_benchmark: CIS MySQL 8.4 enterprise v1.0.0
cis_section: '8'

rules:

  - rule_id: mysql.cis.8.require_secure_transport_is_set_to_on_and_or_have
    title: "Ensure 'require_secure_transport' is Set to 'ON' and/or 'have_ssl' is Set to 'YES'"
    severity: high
    automation_type: automated
    cis_control: '8.1'
    cis_section: '8'
    profile_applicability: "Level 1"
    scope: mysql.section_8.require_secure_transport_is_set_to_on_and_or_have
    assertion:
      field: port
      operator: equals
      expected: "on"
    remediation: >
      Follow the procedures as documented in the MySQL 8.0 Reference Manual to setup
      SSL. Set global policy to force SSL for all connections: set persist
      require_secure_transport=ON; Default Value: DISABLED References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/using-encrypted-connections.html 2.
      https://dev.mysql.com/doc/refman/8.4/en/connection-options.html 3.
      https://dev.mysql.com/doc/refman/8.4/en/server-system-
      variables.html#sysvar_require_secure_transport 4.
      https://dev.mysql.com/doc/refman/8.4/en/server-system-
      variables.html#sysvar_have_openssl
    compliance:
      - cis_mysql_8_4_enterprise_v1_0_0_8_1

  - rule_id: mysql.cis.8.ssl_type_is_set_to_any_x509_or_specified_for_all
    title: "Ensure 'ssl_type' is Set to 'ANY', 'X509', or 'SPECIFIED' for All Remote Users"
    severity: high
    automation_type: automated
    cis_control: '8.2'
    cis_section: '8'
    profile_applicability: "Level 1"
    scope: mysql.section_8.ssl_type_is_set_to_any_x509_or_specified_for_all
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Use the ALTER USER statement to require the use of SSL: ALTER USER
      'my_user'@'app1.example.com' REQUIRE X509; Note: REQUIRE SSL only enforces
      SSL. There are additional options REQUIRE ISSUER, REQUIRE SUBJECT which can be
      used to further restrict the connection. Default Value: On the server-side SSL
      is ON by default --ssl (permits but does not require secure connections) and
      require_secure_transport is OFF (turning ON allows only secure connections)
      References: 1. https://dev.mysql.com/doc/refman/8.4/en/using-encrypted-
      connections.html 2. https://dev.mysql.com/doc/refman/8.4/en/alter-
      user.html#alter-user-tls 3.
      https://dev.mysql.com/doc/refman/8.4/en/connection-
      options.html#option_general_ssl
    compliance:
      - cis_mysql_8_4_enterprise_v1_0_0_8_2


