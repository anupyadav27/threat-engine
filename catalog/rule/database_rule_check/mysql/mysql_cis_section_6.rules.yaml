tech_type: mysql
category: database
cis_benchmark: CIS MySQL 8.4 enterprise v1.0.0
cis_section: '6'

rules:

  - rule_id: mysql.cis.6.log_error_is_configured_correctly
    title: "Ensure 'log_error' is configured correctly"
    severity: high
    automation_type: automated
    cis_control: '6.1'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: mysql.section_6.log_error_is_configured_correctly
    assertion:
      field: value
      operator: exists
      expected: "true"
    remediation: >
      Perform the following actions to remediate this setting: 1. Open the MySQL
      configuration file (my.cnf or my.ini). 2. Set the log-error option to the path
      for the error log. Default Value: ./stderr.err References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/error-log.html
    compliance:
      - cis_mysql_8_4_enterprise_v1_0_0_6_1

  - rule_id: mysql.cis.6.log_files_are_stored_on_a_non_system_partition
    title: "Ensure Log Files are Stored on a Non-System Partition"
    severity: high
    automation_type: automated
    cis_control: '6.2'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: mysql.section_6.log_files_are_stored_on_a_non_system_partition
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Perform the following actions to remediate this setting: 1. Open the MySQL
      configuration file (my.cnf) 2. Locate the log-bin entry and set it to a file
      not on root (/), /var, or /usr References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/binary-log.html 2.
      https://dev.mysql.com/doc/refman/8.4/en/replication-options-binary-log.html
    compliance:
      - cis_mysql_8_4_enterprise_v1_0_0_6_2

  - rule_id: mysql.cis.6.log_error_verbosity_is_set_to_2
    title: "Ensure 'log_error_verbosity' is Set to '2'"
    severity: medium
    automation_type: automated
    cis_control: '6.3'
    cis_section: '6'
    profile_applicability: "Level 2"
    scope: mysql.section_6.log_error_verbosity_is_set_to_2
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Perform the following actions to remediate this setting: • Open the MySQL
      configuration file (my.cnf) • Ensure the following line is found in the mysqld
      section log_error_verbosity = 2 Default Value: The option is enabled (2) -
      errors and warning events are logged - by default. References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/server-system-
      variables.html#sysvar_log_error_verbosity
    compliance:
      - cis_mysql_8_4_enterprise_v1_0_0_6_3

  - rule_id: mysql.cis.6.log_raw_is_set_to_off
    title: "Ensure 'log-raw' is Set to 'OFF'"
    severity: high
    automation_type: automated
    cis_control: '6.4'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: mysql.section_6.log_raw_is_set_to_off
    assertion:
      field: enabled
      operator: equals
      expected: "off"
    remediation: >
      Perform the following actions to remediate this setting: • Open the MySQL
      configuration file (my.cnf) • Find the log-raw entry and set it as follows
      log-raw = OFF Default Value: OFF References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/password-logging.html 2.
      https://dev.mysql.com/doc/refman/8.4/en/server-
      options.html#option_mysqld_log-raw
    compliance:
      - cis_mysql_8_4_enterprise_v1_0_0_6_4


