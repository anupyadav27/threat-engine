tech_type: mysql
category: database
cis_benchmark: CIS MySQL 8.4 enterprise v1.0.0
cis_section: '1'

rules:

  - rule_id: mysql.cis.1.disable_mysql_command_history
    title: "Disable MySQL Command History"
    severity: medium
    automation_type: automated
    cis_control: '1.3'
    cis_section: '1'
    profile_applicability: "Level 2"
    scope: mysql.section_1.disable_mysql_command_history
    assertion:
      field: enabled
      operator: equals
      expected: "false"
    remediation: >
      For MySQL Client perform the following steps to remediate this setting: 1.
      Remove .mysql_history if it exists. 2. Use either of the techniques below to
      prevent it from being created again: o Set the MYSQL_HISTFILE environment
      variable to /dev/null. This will need to be placed in the shell's startup
      script. o Create $HOME/.mysql_history as a symbolic to /dev/null. > ln -s
      /dev/null $HOME/.mysql_history Another way to prevent history from being
      recorded is to use --batch option. For MySQL Shell perform the following steps
      to remediate this setting: 1. Remove $HOME/.mysqlsh/history.* if files exists.
      2. Use either of the techniques below to prevent it from being created again:
      o Start shell and list show options using \option -l o Set to no history using
      the command \option --persist history.autoSave=1 Default Value: By default,
      the MySQL command history file is located in $HOME/.mysql_history. References:
      1. https://dev.mysql.com/doc/refman/8.4/en/mysql-logging.html 2.
      https://bugs.mysql.com/bug.php?id=72158 3. https://dev.mysql.com/doc/mysql-
      shell/8.4/en/mysql-shell-working-with- history.html
    compliance:
      - cis_mysql_8_4_enterprise_v1_0_0_1_3

  - rule_id: mysql.cis.1.the_mysql_pwd_environment_variable_is_not_in_use
    title: "Verify That the MYSQL_PWD Environment Variable is Not in Use"
    severity: high
    automation_type: automated
    cis_control: '1.4'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: mysql.section_1.the_mysql_pwd_environment_variable_is_not_in_use
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Check which users and/or scripts are setting MYSQL_PWD and change them to use
      a more secure method. For unattended logins you should consider 1. MySQL
      Configuration Editor 2. Different authentication methods (e.g., X509
      certificate verification) 3. Use MySQL Enterprise LDAP plugin with Kerberos or
      SASL tokens. Default Value: Not set. References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/environment-variables.html 2.
      https://dev.mysql.com/doc/refman/8.4/en/mysql-config-editor.html 3.
      https://dev.mysql.com/doc/refman/8.4/en/pluggable-authentication.html
    compliance:
      - cis_mysql_8_4_enterprise_v1_0_0_1_4

  - rule_id: mysql.cis.1.mysql_pwd_is_not_set_in_users_profiles
    title: "Verify That 'MYSQL_PWD' is Not Set in Users' Profiles"
    severity: high
    automation_type: automated
    cis_control: '1.6'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: mysql.section_1.mysql_pwd_is_not_set_in_users_profiles
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Check which users and/or scripts are setting MYSQL_PWD and change them to use
      a more secure method. Default Value: Not set. References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/environment-variables.html
    compliance:
      - cis_mysql_8_4_enterprise_v1_0_0_1_6


