tech_type: mysql
category: database
cis_benchmark: CIS MySQL 8.4 enterprise v1.0.0
cis_section: '9'

rules:

  - rule_id: mysql.cis.9.source_ssl_verify_server_cert_is_set_to_yes_or_1
    title: "Ensure 'SOURCE_SSL_VERIFY_SERVER_CERT' is Set to 'YES' or '1'"
    severity: high
    automation_type: automated
    cis_control: '9.2'
    cis_section: '9'
    profile_applicability: "Level 1"
    scope: mysql.section_9.source_ssl_verify_server_cert_is_set_to_yes_or_1
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      To remediate this setting, you must use the CHANGE SOURCE TO command. From
      8.0.23: STOP REPLICA; -- required if replication was already running CHANGE
      REPLICATION SOURCE TO SOURCE_SSL_VERIFY_SERVER_CERT=1; START REPLICA; --
      required if you want to restart replication Prior to 8.0.23: STOP SLAVE; --
      required if replication was already running CHANGE MASTER TO
      MASTER_SSL_VERIFY_SERVER_CERT=1; START SLAVE; -- required if you want to
      restart replication References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/change-replication-source-to.html 2.
      https://dev.mysql.com/doc/refman/8.4/en/change-master-to.html
    compliance:
      - cis_mysql_8_4_enterprise_v1_0_0_9_2

  - rule_id: mysql.cis.9.master_info_repository_is_set_to_table
    title: "Ensure 'master_info_repository' is Set to 'TABLE'"
    severity: medium
    automation_type: automated
    cis_control: '9.3'
    cis_section: '9'
    profile_applicability: "Level 2"
    scope: mysql.section_9.master_info_repository_is_set_to_table
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Perform the following actions to remediate this setting: 1. Open the MySQL
      configuration file (my.cnf) 2. Locate master_info_repository 3. Set the
      master_info_repository value to TABLE Note: If master_info_repository does not
      exist, add it to the configuration file. Default Value: TABLE References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/replication-options-
      replica.html#sysvar_master_info_repository
    compliance:
      - cis_mysql_8_4_enterprise_v1_0_0_9_3


