tech_type: mysql
category: database
cis_benchmark: CIS MySQL 8.4 enterprise v1.0.0
cis_section: '2'

rules:

  - rule_id: mysql.cis.2.point_in_time_recovery
    title: "Point-in-Time Recovery"
    severity: medium
    automation_type: automated
    cis_control: '2.1.5'
    cis_section: '2'
    profile_applicability: "Level 2"
    scope: mysql.section_2.point_in_time_recovery
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Enable binlogs, then create and test a restore procedure. Default Value: The
      default for binlog-expire-logs-seconds is 2592000 seconds, or 30 days.
      References: 1. https://dev.mysql.com/doc/refman/8.4/en/replication-options-
      binary- log.html#sysvar_binlog_expire_logs_seconds 2.
      https://dev.mysql.com/doc/refman/8.4/en/point-in-time-recovery-binlog.html
    compliance:
      - cis_mysql_8_4_enterprise_v1_0_0_2_1_5

  - rule_id: mysql.cis.2.binary_and_relay_logs_are_encrypted
    title: "Ensure Binary and Relay Logs are Encrypted"
    severity: medium
    automation_type: automated
    cis_control: '2.2.1'
    cis_section: '2'
    profile_applicability: "Level 2"
    scope: mysql.section_2.binary_and_relay_logs_are_encrypted
    assertion:
      field: enabled
      operator: exists
      expected: "on"
    remediation: >
      To remediate misconfiguration, run this command: SET GLOBAL
      binlog_encryption=ON; If you receive the error message below, you need to
      install keyring. For instructions see Section 6.4.4, “The MySQL Keyring” in
      the MySQL documentation. ERROR 3794 (HY000): Unable to recover binlog
      encryption master key, please check if keyring plugin is loaded. Default
      Value: The default for binlog_encryption is OFF. References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/replication-binlog-encryption.html 2.
      https://dev.mysql.com/doc/mysql-enterprise-backup/8.4/en/advanced.encrypted-
      binlog-relaylog.html 3. https://dev.mysql.com/doc/refman/8.4/en/replication-
      options-binary- log.html#sysvar_binlog_encryption Additional Information: It
      is necessary to install a keyring plugin prior to configuring encryption.
      Consider implementing MySQL Enterprise Backup which includes support for at
      rest encryption of any MySQL Encrypted data files including the binary and
      relay log files.
    compliance:
      - cis_mysql_8_4_enterprise_v1_0_0_2_2_1

  - rule_id: mysql.cis.2.password_lifetime_is_less_than_or_equal_to_365
    title: "Ensure 'password_lifetime' is Less Than or Equal to '365'"
    severity: high
    automation_type: automated
    cis_control: '2.7'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: mysql.section_2.password_lifetime_is_less_than_or_equal_to_365
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      To configure the global password lifetime to 365 by executing the following
      command: set persist default_password_lifetime = 365; Alternatively, configure
      the password lifetime for each user returned by the audit procedure by
      executing the following command: ALTER USER '<username>'@'<localhost>'
      PASSWORD EXPIRE INTERVAL 365 DAY; Default Value: NULL References: 1.
      https://csrc.nist.gov/csrc/media/publications/sp/800-118/archive/2009-04-
      21/documents/draft-sp800-118.pdf 2.
      https://dev.mysql.com/doc/refman/8.4/en/validate-password.html Additional
      Information: When a user's password_lifetime is set to NULL it takes on the
      value set in global default_password_lifetime variable.
    compliance:
      - cis_mysql_8_4_enterprise_v1_0_0_2_7

  - rule_id: mysql.cis.2.password_resets_require_strong_passwords
    title: "Ensure Password Resets Require Strong Passwords"
    severity: high
    automation_type: automated
    cis_control: '2.8'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: mysql.section_2.password_resets_require_strong_passwords
    assertion:
      field: row_count
      operator: equals
      expected: "on"
    remediation: >
      Set a global policy that passwords may not be reused for a minimum of five
      password changes: SET PERSIST password_history = 5; Set a global policy that
      passwords have a lifetime to approximately one year (in days) SET PERSIST
      password_reuse_interval = 365; Default Value: Both password_history and
      password_reuse_interval are 0 (off) by default. References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/password- management.html#password-
      reuse-policy
    compliance:
      - cis_mysql_8_4_enterprise_v1_0_0_2_8

  - rule_id: mysql.cis.2.require_current_password_for_password_reset
    title: "Require Current Password for Password Reset"
    severity: medium
    automation_type: automated
    cis_control: '2.9'
    cis_section: '2'
    profile_applicability: "Level 2"
    scope: mysql.section_2.require_current_password_for_password_reset
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      Set the value to ON SET PERSIST password_require_current=ON; Default Value:
      The password_require_current is OFF by default. References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/server-system-
      variables.html#sysvar_password_require_current
    compliance:
      - cis_mysql_8_4_enterprise_v1_0_0_2_9

  - rule_id: mysql.cis.2.aes_encryption_mode_for_aes_encrypt_aes_decrypt
    title: "Ensure AES Encryption Mode for AES_ENCRYPT/AES_DECRYPT is Configured Correctly"
    severity: medium
    automation_type: automated
    cis_control: '2.12'
    cis_section: '2'
    profile_applicability: "Level 2"
    scope: mysql.section_2.aes_encryption_mode_for_aes_encrypt_aes_decrypt
    assertion:
      field: length
      operator: exists
      expected: "true"
    remediation: >
      Add the following lines to the MySQL server's /etc/my.cnf: For example, if
      Block Encryption Mode for aes-256 CBC block_encryption_mode=aes-256-cbc Or,
      run the following command: set persist block_encryption_mode='aes-256-cbc';
      Restart the server for this change to take effect. Default Value: aes-128-ecb
      References: 1. https://dev.mysql.com/doc/mysql-secure-deployment-
      guide/8.4/en/secure- deployment-block-encryption-mode.html
    compliance:
      - cis_mysql_8_4_enterprise_v1_0_0_2_12

  - rule_id: mysql.cis.2.mysql_is_bound_to_an_ip_address
    title: "Ensure MySQL is Bound to an IP Address"
    severity: medium
    automation_type: automated
    cis_control: '2.14'
    cis_section: '2'
    profile_applicability: "Level 2"
    scope: mysql.section_2.mysql_is_bound_to_an_ip_address
    assertion:
      field: row_count
      operator: equals
      expected: "no"
    remediation: >
      For example, to have the MySQL server only accept connections on a specific
      IPv4 address, add an entry similar to this under the [mysqld] option group in
      the MySQL /etc/my.cnf: bind_address=192.0.2.24 In this case, clients can
      connect to the server using --host=192.0.2.24. Connections on other server
      host addresses are not permitted. Default Value: Not set. References: 1.
      https://dev.mysql.com/doc/mysql-secure-deployment-guide/8.4/en/secure-
      deployment-secure-connections.html
    compliance:
      - cis_mysql_8_4_enterprise_v1_0_0_2_14

  - rule_id: mysql.cis.2.limit_accepted_transport_layer_security_tls
    title: "Limit Accepted Transport Layer Security (TLS) Versions"
    severity: medium
    automation_type: automated
    cis_control: '2.15'
    cis_section: '2'
    profile_applicability: "Level 2"
    scope: mysql.section_2.limit_accepted_transport_layer_security_tls
    assertion:
      field: version
      operator: equals
      expected: "true"
    remediation: >
      Set the version(s) of TLS you wish to accept in mysql.conf specify TLS and
      Ciphers. For example to only accept TLS 1.3 set tls_version in my.conf:
      tls_version=TLSv1.3 If TLS 1.3 is not supported on the Operating System then
      set to TLS 1.2: tls_version=TLSv1.2 Note: with this setting, only clients that
      support the specified TLS version(s) are able to establish an encrypted
      connection to the server. Default Value: All TLS and cipher versions are
      enabled by default. References: 1. https://dev.mysql.com/doc/mysql-secure-
      deployment-guide/8.4/en/secure- deployment-secure-connections.html 2.
      https://dev.mysql.com/doc/refman/8.4/en/encrypted-connection-protocols-
      ciphers.html#encrypted-connection-protocol-configuration
    compliance:
      - cis_mysql_8_4_enterprise_v1_0_0_2_15

  - rule_id: mysql.cis.2.require_client_side_certificates_x_509
    title: "Require Client-Side Certificates (X.509)"
    severity: medium
    automation_type: automated
    cis_control: '2.16'
    cis_section: '2'
    profile_applicability: "Level 2"
    scope: mysql.section_2.require_client_side_certificates_x_509
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Create or Alter users using the REQUIRE X509. For example: CREATE USER
      'newuser2'@'%' IDENTIFIED BY <password> require x509; For accounts created
      with a REQUIRE X509 clause, clients must specify at least --ssl- cert and
      --ssl-key. In addition, --ssl-ca (or --ssl-capath) is recommended so that the
      public certificate provided by the server can be verified. For example: mysql
      --ssl-ca=ca.pem \ --ssl-cert=client-cert.pem \ --ssl-key=client-key.pem
      References: 1. https://dev.mysql.com/doc/refman/8.4/en/using-encrypted-
      connections.html Additional Information: The audit procedure excludes these
      internal user accounts from evaluation because, by default, they are created
      with an invalid password and are locked to disallow access. •
      ‘mysql.infoschema’@’localhost’ • ‘mysql.session’@’localhost’ •
      ‘mysql.sys’@’localhost’
    compliance:
      - cis_mysql_8_4_enterprise_v1_0_0_2_16

  - rule_id: mysql.cis.2.only_approved_ciphers_are_used
    title: "Ensure Only Approved Ciphers are Used"
    severity: medium
    automation_type: automated
    cis_control: '2.17'
    cis_section: '2'
    profile_applicability: "Level 2"
    scope: mysql.section_2.only_approved_ciphers_are_used
    assertion:
      field: port
      operator: equals
      expected: "true"
    remediation: >
      Set ssl_cipher and tls_ciphersuites in the mysql.conf to an approved cipher
      suite: tls_ciphersuites='TLS_AES_256_GCM_SHA384' ssl_cipher='ECDHE-ECDSA-
      AES128-GCM-SHA256' Or Execute the following commands: set persist
      ssl_cipher='ECDHE-ECDSA-AES128-GCM-SHA256'; set persist
      tls_ciphersuites='TLS_AES_256_GCM_SHA384'; References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/encrypted-connection-protocols-
      ciphers.html#encrypted-connection-cipher-configuration
    compliance:
      - cis_mysql_8_4_enterprise_v1_0_0_2_17


