tech_type: mysql
category: database
cis_benchmark: CIS MySQL 8.4 enterprise v1.0.0
cis_section: '7'

rules:

  - rule_id: mysql.cis.7.passwords_are_not_stored_in_the_global
    title: "Ensure Passwords are Not Stored in the Global Configuration"
    severity: high
    automation_type: automated
    cis_control: '7.2'
    cis_section: '7'
    profile_applicability: "Level 1"
    scope: mysql.section_7.passwords_are_not_stored_in_the_global
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Use the mysql_config_editor to store authentication credentials in
      .mylogin.cnf in encrypted form. If not possible, use the user-specific options
      file, .my.cnf., and restricting file access permissions to the user identity.
      References: 1. https://dev.mysql.com/doc/refman/8.4/en/mysql-config-
      editor.html Additional Information: There must not be a password in any of the
      sections of the global configuration.
    compliance:
      - cis_mysql_8_4_enterprise_v1_0_0_7_2

  - rule_id: mysql.cis.7.set_default_password_lifetime_to_require_a_yearly
    title: "Set 'default_password_lifetime' to Require a Yearly Password Change"
    severity: high
    automation_type: automated
    cis_control: '7.4'
    cis_section: '7'
    profile_applicability: "Level 1"
    scope: mysql.section_7.set_default_password_lifetime_to_require_a_yearly
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      To remediate this recommendation, execute the following command: SET GLOBAL
      default_password_lifetime=365; Default Value: 360 References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/password-management.html 2.
      https://dev.mysql.com/doc/refman/8.4/en/expired-password-handling.html
    compliance:
      - cis_mysql_8_4_enterprise_v1_0_0_7_4

  - rule_id: mysql.cis.7.password_complexity_policies_are_in_place
    title: "Ensure Password Complexity Policies are in Place"
    severity: high
    automation_type: automated
    cis_control: '7.5'
    cis_section: '7'
    profile_applicability: "Level 1"
    scope: mysql.section_7.password_complexity_policies_are_in_place
    assertion:
      field: length
      operator: equals
      expected: "on"
    remediation: >
      Install component_validate_password component: INSTALL COMPONENT
      'file://component_validate_password'; Persist following configuration: SET
      PERSIST validate_password.length=14; SET PERSIST
      validate_password.check_user_name=ON; SET PERSIST
      validate_password.dictionary_file=<path to dictionary file>; SET PERSIST
      validate_password.policy=STRONG; Optionally set one or more of these -
      ensuring complexity is not overly onerous SET PERSIST
      validate_password.mixed_case_count=1; SET PERSIST
      validate_password.number_count=1; SET PERSIST
      validate_password.special_char_count=1; And change passwords for users which
      have passwords which are identical to their username. Default Value: By
      default component_validate_password is not installed.
      validate_password.length=8 validate_password.mixed_case_count=1
      validate_password.number_count=1 validate_password.policy=MEDIUM
      validate_password.special_char_count=1 References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/validate-password.html Additional
      Information: The 'validate password plugin' can be used instead of the
      password validation component to enforce password complexity polices; however,
      it is deprecated and will be removed in a future release.
    compliance:
      - cis_mysql_8_4_enterprise_v1_0_0_7_5

  - rule_id: mysql.cis.7.no_anonymous_accounts_exist
    title: "Ensure No Anonymous Accounts Exist"
    severity: high
    automation_type: automated
    cis_control: '7.7'
    cis_section: '7'
    profile_applicability: "Level 1"
    scope: mysql.section_7.no_anonymous_accounts_exist
    assertion:
      field: row_count
      operator: equals
      expected: "no"
    remediation: >
      Perform the following actions to remediate this setting: 1. Enumerate the
      anonymous users returned from executing the audit procedure. 2. For each
      anonymous user, DROP or assign them a name. Note: As an alternative, you may
      execute the mysql_secure_installation utility. References: 1.
      https://dev.mysql.com/doc/refman/8.4/en/mysql-secure-installation.html 2.
      https://dev.mysql.com/doc/refman/8.4/en/default-privileges.html 3.
      https://dev.mysql.com/doc/refman/8.4/en/proxy-users.html#proxy-users-conflicts
    compliance:
      - cis_mysql_8_4_enterprise_v1_0_0_7_7


