tech_type: cassandra
category: database
cis_benchmark: CIS Cassandra 4.0 v1.1.0
cis_section: '5'

rules:

  - rule_id: cassandra.cis.5.inter_node_encryption
    title: "Inter-node Encryption"
    severity: high
    automation_type: automated
    cis_control: '5.1'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: cassandra.section_5.inter_node_encryption
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      The inter-node encryption should be implemented before anyone accesses the
      Cassandra server. To enable the inter-node encryption mechanism: 1. Stop the
      Cassandra database. 2. If not done so already, build out your keystore and
      truststore. 3. Modify cassandra.yaml file to modify/add entry for
      internode_encryption: set it to all 4. Start the Cassandra database. Default
      Value: internode_encryption: none References: 1.
      http://cassandra.apache.org/doc/latest/operating/security.html
    compliance:
      - cis_cassandra_4_0_v1_1_0_5_1

  - rule_id: cassandra.cis.5.client_encryption
    title: "Client Encryption"
    severity: high
    automation_type: automated
    cis_control: '5.2'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: cassandra.section_5.client_encryption
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      The client encryption should be implemented before anyone accesses the
      Cassandra server. To enable the client encryption mechanism: 1. Stop the
      Cassandra database. 2. If not done so already, build out your keystore and
      truststore. 3. Modify cassandra.yaml file to modify/add entries under
      client_encryption_options: set enabled: true set optional: false This will
      force all connections to be encrypted between client and node on the cluster.
      4. Start the Cassandra database. Default Value: enabled: false optional: false
      References: 1. http://cassandra.apache.org/doc/latest/operating/security.html
    compliance:
      - cis_cassandra_4_0_v1_1_0_5_2


