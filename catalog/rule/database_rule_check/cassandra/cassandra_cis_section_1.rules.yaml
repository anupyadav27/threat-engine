tech_type: cassandra
category: database
cis_benchmark: CIS Cassandra 4.0 v1.1.0
cis_section: '1'

rules:

  - rule_id: cassandra.cis.1.latest_version_of_java_is_installed
    title: "Ensure the latest version of Java is installed"
    severity: high
    automation_type: automated
    cis_control: '1.2'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: cassandra.section_1.latest_version_of_java_is_installed
    assertion:
      field: version
      operator: equals
      expected: "on"
    remediation: >
      1. Uninstall the old/unsupported version of Java, if present. 2. Download the
      latest compatible release of the Java JDK, or OpenJDK. 3. Follow the provided
      installation instructions to complete the install. References: 1.
      http://www.oracle.com/technetwork/java/javase/downloads/index-jsp-
      138363.html#javasejdk 2. http://openjdk.java.net/ 3.
      http://openjdk.java.net/install/index.html 4.
      http://cassandra.apache.org/doc/latest/getting_started/installing.html#prerequisite
      s 5.
      https://www.java.com/en/download/help/index_installing.xml?os=All+Platforms&j
      =8&n=20
    compliance:
      - cis_cassandra_4_0_v1_1_0_1_2

  - rule_id: cassandra.cis.1.latest_version_of_python_is_installed
    title: "Ensure the latest version of Python is installed"
    severity: high
    automation_type: automated
    cis_control: '1.3'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: cassandra.section_1.latest_version_of_python_is_installed
    assertion:
      field: version
      operator: equals
      expected: "true"
    remediation: >
      1. Uninstall the old/unsupported version of Python, if present. 2. Download
      the latest compatible release of the Python: https://www.python.org/downloads/
      3. Follow the provided installation instructions to complete the install.
      References: 1. https://www.python.org/downloads/ 2.
      http://cassandra.apache.org/doc/latest/getting_started/installing.html#prerequisite
      s
    compliance:
      - cis_cassandra_4_0_v1_1_0_1_3

  - rule_id: cassandra.cis.1.latest_version_of_cassandra_is_installed
    title: "Ensure latest version of Cassandra is installed"
    severity: high
    automation_type: automated
    cis_control: '1.4'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: cassandra.section_1.latest_version_of_cassandra_is_installed
    assertion:
      field: version
      operator: equals
      expected: "on"
    remediation: >
      Upgrade to the latest version of the Cassandra software: For each node in the
      cluster: 1. Using the nodetool drain command to push all memtables data to
      SSTables. 2. Stop Cassandra services. 3. Backup the data set and all of your
      Cassandra configuration files. 4. Download/Update Java if needed. 5.
      Download/Update Python if needed. 6. Download the binaries for the latest
      Cassandra revision from the Cassandra Download Page. 7. Install new version of
      Cassandra. 8. Configure new version of Cassandra, taking into account all of
      your previous settings in your config files(cassandra.yml, cassandrea-env.sh,
      etc). 9. Start Cassandra services. 10. Check logs for warnings, errors. 11.
      Using the nodetool to upgrade your SSTables. 12. Using the nodetool command to
      check status of cluster. References: 1.
      http://cassandra.apache.org/doc/latest/getting_started/installing.html#prerequisite
      s
    compliance:
      - cis_cassandra_4_0_v1_1_0_1_4

  - rule_id: cassandra.cis.1.cassandra_service_is_run_as_a_non_root_user
    title: "Ensure the Cassandra service is run as a non-root user"
    severity: high
    automation_type: automated
    cis_control: '1.5'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: cassandra.section_1.cassandra_service_is_run_as_a_non_root_user
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Create a group for cassandra (if it does not already exist) sudo groupadd
      cassandra Create a user which is only used for running Cassandra and its
      related processes. Replacing <DIRECTORY_WHERE_CASSANDRA_INSTALLED> with the
      full path of where Cassandra binaries are installed. Replacing <USERID_NUMBER>
      with a number not already used on the server
    compliance:
      - cis_cassandra_4_0_v1_1_0_1_5


