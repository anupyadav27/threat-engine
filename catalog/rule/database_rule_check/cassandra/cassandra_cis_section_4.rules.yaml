tech_type: cassandra
category: database
cis_benchmark: CIS Cassandra 4.0 v1.1.0
cis_section: '4'

rules:

  - rule_id: cassandra.cis.4.logging_is_enabled
    title: "Ensure that logging is enabled."
    severity: high
    automation_type: automated
    cis_control: '4.1'
    cis_section: '4'
    profile_applicability: "Level 1"
    scope: cassandra.section_4.logging_is_enabled
    assertion:
      field: enabled
      operator: equals
      expected: "off"
    remediation: >
      To remediate this setting: 1. Edit the logback-test.xml if present; otherwise,
      edit the logback.xml <configuration scan='true'> <appender name='STDOUT'
      class='ch.qos.logback.core.ConsoleAppender'> <filter
      class='ch.qos.logback.classic.filter.ThresholdFilter'> <level>INFO</level>
      </filter> <encoder> <pattern>%-5level [%thread] %date{ISO8601} %F:%L -
      %msg%n</pattern> </encoder> </appender> <root level='INFO'> <appender-ref
      ref='STDOUT' /> </root> <logger name='org.cisecurity.workbench' level='WARN'/>
      </configuration> 2. Restart the Apache Cassandra Default Value: INFO
      References: 1.
      http://cassandra.apache.org/doc/latest/troubleshooting/reading_logs.html?highlig
      ht=logging 2. https://logback.qos.ch/manual/configuration.html
    compliance:
      - cis_cassandra_4_0_v1_1_0_4_1


