tech_type: postgresql
category: database
cis_benchmark: CIS PostgreSQL 17 v1.0.0
cis_section: '7'

rules:

  - rule_id: postgresql.cis.7.logging_of_replication_commands_is_configured
    title: "Ensure logging of replication commands is configured"
    severity: high
    automation_type: automated
    cis_control: '7.2'
    cis_section: '7'
    profile_applicability: "Level 1"
    scope: postgresql.section_7.logging_of_replication_commands_is_configured
    assertion:
      field: value
      operator: exists
      expected: "off"
    remediation: >
      To enable the logging of replication commands, execute the following:
      postgres=# ALTER SYSTEM SET log_replication_commands = 'on'; ALTER SYSTEM
      postgres=# SELECT pg_reload_conf(); pg_reload_conf ---------------- t (1 row)
      postgres=# SHOW log_replication_commands ; log_replication_commands
      -------------------------- on (1 row) References: 1.
      https://www.postgresql.org/docs/current/runtime-config-logging.html
    compliance:
      - cis_postgresql_17_v1_0_0_7_2

  - rule_id: postgresql.cis.7.wal_archiving_is_configured_and_functional
    title: "Ensure WAL archiving is configured and functional"
    severity: high
    automation_type: automated
    cis_control: '7.4'
    cis_section: '7'
    profile_applicability: "Level 1"
    scope: postgresql.section_7.wal_archiving_is_configured_and_functional
    assertion:
      field: value
      operator: exists
      expected: "on"
    remediation: >
      Change parameters and restart the server as required. References: 1.
      https://www.postgresql.org/docs/current/static/runtime-config-
      wal.html#RUNTIME-CONFIG-WAL-ARCHIVING
    compliance:
      - cis_postgresql_17_v1_0_0_7_4


