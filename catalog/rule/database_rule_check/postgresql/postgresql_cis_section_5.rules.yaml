tech_type: postgresql
category: database
cis_benchmark: CIS PostgreSQL 17 v1.0.0
cis_section: '5'

rules:

  - rule_id: postgresql.cis.5.per_account_connection_limits_are_used
    title: "Ensure per-account connection limits are used"
    severity: high
    automation_type: automated
    cis_control: '5.5'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: postgresql.section_5.per_account_connection_limits_are_used
    assertion:
      field: row_count
      operator: equals
      expected: "true"
    remediation: >
      Set a per-user connection limit by running: ALTER USER <dbuser> CONNECTION
      LIMIT <reasonable concurrent connection count> ; Default Value: -1
    compliance:
      - cis_postgresql_17_v1_0_0_5_5


