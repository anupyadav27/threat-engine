tech_type: postgresql
category: database
cis_benchmark: CIS PostgreSQL 17 v1.0.0
cis_section: '1'

rules:

  - rule_id: postgresql.cis.1.systemd_service_files_are_enabled
    title: "Ensure systemd Service Files Are Enabled"
    severity: high
    automation_type: automated
    cis_control: '1.3'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: postgresql.section_1.systemd_service_files_are_enabled
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      Irrespective of package source, PostgreSQL services can be identified because
      it typically includes the text string 'postgresql'. PGDG installs do not
      automatically register the service as a 'want' of the default systemd target.
      Multiple instances of PostgreSQL services often distinguish themselves using a
      version number. # whoami root # systemctl enable postgresql-17 Created symlink
      /etc/systemd/system/multi-user.target.wants/postgresql- 17.service →
      /usr/lib/systemd/system/postgresql-17.service. # systemctl is-enabled
      postgresql-17.service enabled References: 1. https://man7.org/linux/man-
      pages/man1/systemctl.1.html 2.
      https://www.freedesktop.org/software/systemd/man/systemd.special.html
    compliance:
      - cis_postgresql_17_v1_0_0_1_3

  - rule_id: postgresql.cis.1.data_cluster_initialized_successfully
    title: "Ensure Data Cluster Initialized Successfully"
    severity: high
    automation_type: automated
    cis_control: '1.4'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: postgresql.section_1.data_cluster_initialized_successfully
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Attempting to instantiate a data cluster to an existing non-empty directory
      will fail: # whoami root # PGSETUP_INITDB_OPTIONS='-k'
      /usr/pgsql-17/bin/postgresql-17-setup initdb Data directory is not empty! In
      the case of a cluster instantiation failure, one must delete/remove the entire
      data cluster directory and repeat the initdb command: # whoami root # rm -rf
      ~postgres/17 # PGSETUP_INITDB_OPTIONS='-k'
      /usr/pgsql-17/bin/postgresql-17-setup initdb Initializing database ... OK
      References: 1. https://www.postgresql.org/docs/current/app-initdb.html
    compliance:
      - cis_postgresql_17_v1_0_0_1_4

  - rule_id: postgresql.cis.1.pgpassword_is_not_set_in_users_profiles
    title: "Verify That 'PGPASSWORD' is Not Set in Users' Profiles"
    severity: high
    automation_type: automated
    cis_control: '1.6'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: postgresql.section_1.pgpassword_is_not_set_in_users_profiles
    assertion:
      field: value
      operator: equals
      expected: "no"
    remediation: >
      Check which users and/or scripts are setting PGPASSWORD and change them to use
      a more secure authentication method. References: 1.
      https://www.postgresql.org/docs/current/libpq-envars.html
    compliance:
      - cis_postgresql_17_v1_0_0_1_6

  - rule_id: postgresql.cis.1.the_pgpassword_environment_variable_is_not_in_use
    title: "Verify That the 'PGPASSWORD' Environment Variable is Not in Use"
    severity: high
    automation_type: automated
    cis_control: '1.7'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: postgresql.section_1.the_pgpassword_environment_variable_is_not_in_use
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Check which users and/or scripts are setting PGPASSWORD and change them to use
      a more secure method. References: 1. https://www.postgresql.org/docs/15/libpq-
      envars.html
    compliance:
      - cis_postgresql_17_v1_0_0_1_7


