tech_type: postgresql
category: database
cis_benchmark: CIS PostgreSQL 17 v1.0.0
cis_section: '3'

rules:

  - rule_id: postgresql.cis.3.log_destinations_are_set_correctly
    title: "Ensure the log destinations are set correctly"
    severity: high
    automation_type: automated
    cis_control: '3.1.2'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: postgresql.section_3.log_destinations_are_set_correctly
    assertion:
      field: port
      operator: equals
      expected: "on"
    remediation: >
      Execute the following SQL statements to remediate this setting (in this
      example, setting the log destination to csvlog): postgres=# alter system set
      log_destination = 'csvlog'; ALTER SYSTEM postgres=# select pg_reload_conf();
      pg_reload_conf ---------------- t (1 row) Note: If more than one log
      destination is to be used, set this parameter to a list of desired log
      destinations separated by commas (e.g. 'csvlog, stderr'). Default Value:
      stderr References: 1. https://www.postgresql.org/docs/current/runtime-config-
      logging.html Additional Information: logging_collector (detailed in the next
      section) must be enabled to generate CSV- format log output.
    compliance:
      - cis_postgresql_17_v1_0_0_3_1_2

  - rule_id: postgresql.cis.3.logging_collector_is_enabled
    title: "Ensure the logging collector is enabled"
    severity: high
    automation_type: automated
    cis_control: '3.1.3'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: postgresql.section_3.logging_collector_is_enabled
    assertion:
      field: enabled
      operator: equals
      expected: "on"
    remediation: >
      Execute the following SQL statement(s) to remediate this setting: postgres=#
      alter system set logging_collector = 'on'; ALTER SYSTEM Unfortunately, this
      setting can only be changed at the server (re)start. As root, restart the
      PostgreSQL service for this change to take effect: # whoami root # systemctl
      restart postgresql-17 # systemctl status postgresql-17|grep 'ago$' Active:
      active (running) since <date> ; <count> s ago Default Value: on References: 1.
      https://www.postgresql.org/docs/current/runtime-config-logging.html
    compliance:
      - cis_postgresql_17_v1_0_0_3_1_3

  - rule_id: postgresql.cis.3.log_file_destination_directory_is_set_correctly
    title: "Ensure the log file destination directory is set correctly"
    severity: high
    automation_type: automated
    cis_control: '3.1.4'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: postgresql.section_3.log_file_destination_directory_is_set_correctly
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Execute the following SQL statement(s) to remediate this setting: postgres=#
      alter system set log_directory='/var/log/postgres'; ALTER SYSTEM postgres=#
      select pg_reload_conf(); pg_reload_conf ---------------- t (1 row) postgres=#
      show log_directory; log_directory --------------- /var/log/postgres (1 row)
      Note: The use of /var/log/postgres, above, is an example. This should be set
      to an appropriate path as defined by your organization's logging requirements.
      Having said that, it is a good idea to have the logs outside of your PGDATA
      directory so that they are not included by things like pg_basebackup or
      pgBackRest. Default Value: log which is relative to the cluster's data
      directory (e.g. /var/lib/pgsql/ <pgmajorversion> /data/log) References: 1.
      https://www.postgresql.org/docs/current/runtime-config-logging.html
    compliance:
      - cis_postgresql_17_v1_0_0_3_1_4

  - rule_id: postgresql.cis.3.filename_pattern_for_log_files_is_set_correctly
    title: "Ensure the filename pattern for log files is set correctly"
    severity: high
    automation_type: automated
    cis_control: '3.1.5'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: postgresql.section_3.filename_pattern_for_log_files_is_set_correctly
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      Execute the following SQL statement(s) to remediate this setting: postgres=#
      alter system set log_filename='postgresql-%Y%m%d.log'; ALTER SYSTEM postgres=#
      select pg_reload_conf(); pg_reload_conf ---------------- t (1 row) postgres=#
      show log_filename; log_filename ------------------- postgresql-%Y%m%d.log (1
      row) Note: In this example, a new log file will be created for each day (e.g.
      postgresql- 20200804.log) Default Value: The default is postgresql-%a.log,
      which creates a new log file for each day of the week (e.g. postgresql-
      Mon.log, postgresql-Tue.log). References: 1. https://man7.org/linux/man-
      pages/man3/strftime.3.html 2. https://www.postgresql.org/docs/current/runtime-
      config-logging.html
    compliance:
      - cis_postgresql_17_v1_0_0_3_1_5

  - rule_id: postgresql.cis.3.log_truncate_on_rotation_is_enabled
    title: "Ensure 'log_truncate_on_rotation' is enabled"
    severity: high
    automation_type: automated
    cis_control: '3.1.7'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: postgresql.section_3.log_truncate_on_rotation_is_enabled
    assertion:
      field: enabled
      operator: equals
      expected: "on"
    remediation: >
      Execute the following SQL statement(s) to remediate this setting: postgres=#
      alter system set log_truncate_on_rotation = 'on'; ALTER SYSTEM postgres=#
      select pg_reload_conf(); pg_reload_conf ---------------- t (1 row) postgres=#
      show log_truncate_on_rotation; log_truncate_on_rotation
      -------------------------- on (1 row) Default Value: on References: 1.
      https://www.postgresql.org/docs/current/static/runtime-config-logging.html
      Additional Information: Be sure to consider your organization's logging
      retention policies and the use of any external log consumption tools before
      deciding if truncation should be enabled or disabled.
    compliance:
      - cis_postgresql_17_v1_0_0_3_1_7

  - rule_id: postgresql.cis.3.maximum_log_file_lifetime_is_set_correctly
    title: "Ensure the maximum log file lifetime is set correctly"
    severity: high
    automation_type: automated
    cis_control: '3.1.8'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: postgresql.section_3.maximum_log_file_lifetime_is_set_correctly
    assertion:
      field: enabled
      operator: gte
      expected: "true"
    remediation: >
      Execute the following SQL statement(s) to remediate this setting (in this
      example, setting it to one hour): postgres=# alter system set
      log_rotation_age='1h'; ALTER SYSTEM postgres=# select pg_reload_conf();
      pg_reload_conf ---------------- t (1 row) Default Value: 1d (one day)
      References: 1. https://www.postgresql.org/docs/current/static/runtime-config-
      logging.html
    compliance:
      - cis_postgresql_17_v1_0_0_3_1_8

  - rule_id: postgresql.cis.3.maximum_log_file_size_is_set_correctly
    title: "Ensure the maximum log file size is set correctly"
    severity: high
    automation_type: automated
    cis_control: '3.1.9'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: postgresql.section_3.maximum_log_file_size_is_set_correctly
    assertion:
      field: value
      operator: lte
      expected: "true"
    remediation: >
      Execute the following SQL statement(s) to remediate this setting (in this
      example, setting it to 1GB): postgres=# alter system set log_rotation_size =
      '1GB'; ALTER SYSTEM postgres=# select pg_reload_conf(); pg_reload_conf
      ---------------- t (1 row) Default Value: 0 References: 1.
      https://www.postgresql.org/docs/current/static/runtime-config-logging.html
    compliance:
      - cis_postgresql_17_v1_0_0_3_1_9

  - rule_id: postgresql.cis.3.syslog_messages_are_not_suppressed
