    compliance:
      - cis_postgresql_17_v1_0_0_3_1_12

  - rule_id: postgresql.cis.3.program_name_for_postgresql_syslog_messages_are
    title: "Ensure the program name for PostgreSQL syslog messages are correct"
    severity: high
    automation_type: automated
    cis_control: '3.1.13'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: postgresql.section_3.program_name_for_postgresql_syslog_messages_are
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Execute the following SQL statement(s) to remediate this setting (in this
      example, assuming a program name of proddb): postgres=# alter system set
      syslog_ident = 'proddb'; ALTER SYSTEM postgres=# select pg_reload_conf();
      pg_reload_conf ---------------- t (1 row) postgres=# show syslog_ident;
      syslog_ident -------------- proddb (1 row) Default Value: postgres References:
      1. https://tools.ietf.org/html/rfc3164#section-4.1.3 2.
      https://www.postgresql.org/docs/current/static/runtime-config-logging.html
    compliance:
      - cis_postgresql_17_v1_0_0_3_1_13

  - rule_id: postgresql.cis.3.correct_messages_are_written_to_the_server_log
    title: "Ensure the correct messages are written to the server log"
    severity: high
    automation_type: automated
    cis_control: '3.1.14'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: postgresql.section_3.correct_messages_are_written_to_the_server_log
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Execute the following SQL statement(s) as superuser to remediate this setting
      (in this example, to set it to warning): postgres=# alter system set
      log_min_messages = 'warning'; ALTER SYSTEM postgres=# select pg_reload_conf();
      pg_reload_conf ---------------- t (1 row) Default Value: WARNING References:
      1. https://www.postgresql.org/docs/current/static/runtime-config-logging.html
    compliance:
      - cis_postgresql_17_v1_0_0_3_1_14

