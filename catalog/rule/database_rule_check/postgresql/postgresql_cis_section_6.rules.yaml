tech_type: postgresql
category: database
cis_benchmark: CIS PostgreSQL 17 v1.0.0
cis_section: '6'

rules:

  - rule_id: postgresql.cis.6.fips_140_2_openssl_cryptography_is_used
    title: "Ensure FIPS 140-2 OpenSSL Cryptography Is Used"
    severity: high
    automation_type: automated
    cis_control: '6.7'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: postgresql.section_6.fips_140_2_openssl_cryptography_is_used
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      Configure OpenSSL to be FIPS compliant as PostgreSQL uses OpenSSL for
      cryptographic modules. To configure OpenSSL to be FIPS 140-2 compliant, see
      the official RHEL Documentation. Below is a general summary of the steps
      required: To switch the system to FIPS mode in RHEL 9: # whoami root # fips-
      mode-setup --enable Kernel initramdisks are being regenerated. This might take
      some time. Setting system policy to FIPS Note: System-wide crypto policies are
      applied on application start-up. It is recommended to restart the system for
      the change of policies to fully take place. FIPS mode will be enabled. Please
      reboot the system for the setting to take effect. Restart your system to allow
      the kernel to switch to FIPS mode: # whoami root # reboot After the restart,
      you can check the current state of FIPS mode: # whoami root # fips-mode-setup
      --check FIPS mode is enabled. References: 1.
      https://access.redhat.com/documentation/en-
      us/red_hat_enterprise_linux/9/html/security_hardening/using-the-system-wide-
      cryptographic-policies_security-hardening#switching-the-system-to-fips-
      mode_using-the-system-wide-cryptographic-policies 2.
      https://csrc.nist.gov/CSRC/media/projects/cryptographic-module-validation-
      program/documents/security-policies/140sp1758.pdf 3.
      https://csrc.nist.gov/publications/fips
    compliance:
      - cis_postgresql_17_v1_0_0_6_7

  - rule_id: postgresql.cis.6.tls_is_enabled_and_configured_correctly
    title: "Ensure TLS is enabled and configured correctly"
    severity: high
    automation_type: automated
    cis_control: '6.8'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: postgresql.section_6.tls_is_enabled_and_configured_correctly
    assertion:
      field: enabled
      operator: exists
      expected: "off"
    remediation: >
      For this example, and ease of illustration, we will be using a self-signed
      certificate (generated via openssl) for the server, and the PostgreSQL
      defaults for file naming and location in the PostgreSQL $PGDATA directory. #
      whoami postgres # # create new certificate and enter details at prompts #
      openssl req -new -text -out server.req Generating a 2048 bit RSA private key
      .....................+++
      ..................................................................+++ writing
      new private key to 'privkey.pem' Enter PEM pass phrase: Verifying - Enter PEM
      pass phrase: ----- You are about to be asked to enter information that will be
      incorporated into your certificate request. What you are about to enter is
      what is called a Distinguished Name or a DN. There are quite a few fields but
      you can leave some blank For some fields there will be a default value, If you
      enter '.', the field will be left blank. ----- Country Name (2 letter code)
      [XX]:US State or Province Name (full name) []:Ohio Locality Name (eg, city)
      [Default City]:Columbus Organization Name (eg, company) [Default Company
      Ltd]:Me Inc Organizational Unit Name (eg, section) []:IT Common Name (eg, your
      name or your server's hostname) []:my.me.inc Email Address []:me@meinc.com
      Please enter the following 'extra' attributes to be sent with your certificate
      request A challenge password []: An optional company name []: # # remove
      passphrase (required for automatic server start up, if not using
      `ssl_passphrase_command`) # openssl rsa -in privkey.pem -out server.key && rm
      privkey.pem Enter pass phrase for privkey.pem: writing RSA key # # modify
      certificate to self signed, generate .key and .crt files # openssl req -x509
      -in server.req -text -key server.key -out server.crt # # copy .key and .crt
      files to appropriate location, here default $PGDATA $ cp server.key server.crt
      $PGDATA # # restrict file mode for server.key $ chmod og-rwx server.key Edit
      the PostgreSQL configuration file postgresql.conf to ensure the following
      items are set. Again, we are using defaults. Note that altering these
      parameters will require restarting the cluster. # (change requires restart)
      ssl = on # force clients to use TLS v1.3 or newer ssl_min_protocol_version =
      'TLSv1.3' # (change requires restart) ssl_cert_file = 'server.crt' # (change
      requires restart) ssl_key_file = 'server.key' Finally, restart PostgreSQL and
      confirm ssl using commands outlined in Audit Procedures: postgres=# show ssl;
      ssl ----- on (1 row) Default Value: Note that server.crt and server.key are
      the default names used by PostgreSQL. These files can be named otherwise, just
      ensure you update the postgresql.conf to use these new names. The current
      names can be found via SQL: postgres=# select name, setting from pg_settings
      where name like 'ssl%file'; ┌────────────────────┬────────────┐ │ name │
      setting │ ├────────────────────┼────────────┤ │ ssl_ca_file │ │ │
      ssl_cert_file │ server.crt │ │ ssl_crl_file │ │ │ ssl_dh_params_file │ │ │
      ssl_key_file │ server.key │ └────────────────────┴────────────┘ (5 rows)
      References: 1. https://www.postgresql.org/docs/current/static/ssl-tcp.html 2.
      https://nvlpubs.nist.gov/nistpubs/SpecialPublications/NIST.SP.800-52r2.pdf 3.
      https://www.postgresql.org/docs/current/static/libpq-ssl.html 4.
      https://www.postgresql.org/docs/current/runtime-config-connection.html
      Additional Information: It is possible to leave the passphrase on privkey.pem
      for additional security if desired. Simply configure postgresql.conf to set:
      ssl_passphrase_command = 'your_command_here' This sets an external command to
      be invoked when a passphrase for decrypting an SSL file such as a private key
      needs to be obtained. By default, this parameter is empty, which means the
      built-in prompting mechanism is used. The command must print the passphrase to
      the standard output and exit with code 0. In the parameter value, %p is
      replaced by a prompt string. (Write %% for a literal %.) Note that the prompt
      string will probably contain whitespace, so be sure to quote adequately. A
      single newline is stripped from the end of the output if present. The command
      does not actually have to prompt the user for a passphrase. It can read it
      from a file, obtain it from a keychain facility, or similar. It is up to the
      user to make sure the chosen mechanism is adequately secure.
    compliance:
      - cis_postgresql_17_v1_0_0_6_8

  - rule_id: postgresql.cis.6.tlsv1_3_or_later_is_configured
    title: "Ensure that TLSv1.3, or later, is configured"
    severity: high
    automation_type: automated
    cis_control: '6.9'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: postgresql.section_6.tlsv1_3_or_later_is_configured
    assertion:
      field: port
      operator: exists
      expected: "true"
    remediation: >
      Adjust the ssl_min_protocol_version to at least TLSv1.3: postgres=# ALTER
      SYSTEM SET ssl_min_protocol_version = 'TLSv1.3'; ALTER SYSTEM Make the change
      active: postgres=# SELECT pg_reload_conf(); pg_reload_conf ---------------- t
      (1 row) postgres=# SHOW ssl_min_protocol_version; ssl_min_protocol_version
      -------------------------- TLSv1.3 (1 row) References: 1. https://ssl-
      config.mozilla.org/
    compliance:
      - cis_postgresql_17_v1_0_0_6_9

  - rule_id: postgresql.cis.6.weak_ssl_tls_ciphers_are_disabled
    title: "Ensure Weak SSL/TLS Ciphers Are Disabled"
    severity: high
    automation_type: automated
    cis_control: '6.10'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: postgresql.section_6.weak_ssl_tls_ciphers_are_disabled
    assertion:
      field: enabled
      operator: equals
      expected: "false"
    remediation: >
      Add or modify the ssl_ciphers directive to the following value in the
      PostgreSQL configuration file (postgresql.conf): ssl_ciphers =
      'TLS_AES_256_GCM_SHA384,TLS_AES_128_GCM_SHA256,TLS_AES_128_CCM_SHA256,TLS_CHA
      CHA20_POLY1305_SHA256,ECDHE-ECDSA-AES256-CCM,ECDHE-ECDSA-AES128-CCM,DHE-RSA-
      AES256-CCM,DHE-RSA-AES128-CCM,ECDHE-RSA-AES256-GCM-SHA384,ECDHE-RSA-AES128-
      GCM-SHA256,ECDHE-ECDSA-AES256-GCM-SHA384,ECDHE-ECDSA-AES128-GCM-SHA256,DHE-
      DSS-AES256-GCM-SHA384,DHE-DSS-AES128-GCM-SHA256,DHE-RSA-AES256-GCM-
      SHA384,DHE-RSA-AES128-GCM-SHA256' References: 1. https://ssl-
      config.mozilla.org/
    compliance:
      - cis_postgresql_17_v1_0_0_6_10

  - rule_id: postgresql.cis.6.pgcrypto_extension_is_installed_and_configured
    title: "Ensure the pgcrypto extension is installed and configured correctly"
    severity: high
    automation_type: automated
    cis_control: '6.11'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: postgresql.section_6.pgcrypto_extension_is_installed_and_configured
    assertion:
      field: length
      operator: gte
      expected: "on"
    remediation: >
      The pgcrypto extension is included with the PostgreSQL contrib package.
      Although included, it needs to be created in the database. As the database
      administrator, run the following: postgres=# CREATE EXTENSION pgcrypto; CREATE
      EXTENSION Verify pgcrypto is installed: postgres=# SELECT * FROM
      pg_available_extensions WHERE name='pgcrypto'; name | default_version |
      installed_version | comment
      ----------+-----------------+-------------------+-------------------------
      pgcrypto | 1.3 | 1.3 | cryptographic functions (1 row) References: 1.
      http://www.postgresql.org/docs/current/static/pgcrypto.html
    compliance:
      - cis_postgresql_17_v1_0_0_6_11

  - rule_id: postgresql.cis.6.tlsv1_0_and_tlsv1_1_protocols_are_disabled
    title: "Ensure the TLSv1.0 and TLSv1.1 Protocols are Disabled"
    severity: high
    automation_type: automated
    cis_control: '6.9'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: postgresql.section_6.tlsv1_0_and_tlsv1_1_protocols_are_disabled
    assertion:
      field: enabled
      operator: equals
      expected: "false"
    remediation: >
      Adjust the ssl_min_protocol_version to at least TLSv1.2: ALTER SYSTEM SET
      ssl_min_protocol_version = 'TLSv1.2'; or (preferred): ALTER SYSTEM SET
      ssl_min_protocol_version = 'TLSv1.3'; In either case, make the change active:
      SELECT pg_reload_conf(); SHOW ssl_min_protocol_version; References: 1.
      https://ssl-config.mozilla.org/
    compliance:
      - cis_postgresql_16_v1_1_0_6_9


