tech_type: oracle_db
category: database
cis_benchmark: CIS Oracle Db 19c v1.2.0
cis_section: '5'

rules:

  - rule_id: oracle_db.cis.5.execute_is_revoked_from_public_on_encryption
    title: "Ensure 'EXECUTE' is revoked from 'PUBLIC' on 'Encryption' Packages"
    severity: high
    automation_type: automated
    cis_control: '5.1.1.3'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: oracle_db.section_5.execute_is_revoked_from_public_on_encryption
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      To remediate this setting, execute the following SQL statement, keeping in
      mind if this is granted in both container and pluggable database, you must
      connect to both places to revoke. REVOKE EXECUTE ON DBMS_CRYPTO FROM PUBLIC;
      REVOKE EXECUTE ON DBMS_OBFUSCATION_TOOLKIT FROM PUBLIC; REVOKE EXECUTE ON
      DBMS_RANDOM FROM PUBLIC;
    compliance:
      - cis_oracle_db_19c_v1_2_0_5_1_1_3

  - rule_id: oracle_db.cis.5.execute_is_revoked_from_public_on_job_scheduler
    title: "Ensure 'EXECUTE' is revoked from 'PUBLIC' on 'Job Scheduler' Packages"
    severity: high
    automation_type: automated
    cis_control: '5.1.1.5'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: oracle_db.section_5.execute_is_revoked_from_public_on_job_scheduler
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      To remediate this setting, execute the following SQL statement, keeping in
      mind if this is granted in both container and pluggable database, you must
      connect to both places to revoke. REVOKE EXECUTE ON DBMS_JOB FROM PUBLIC;
      REVOKE EXECUTE ON DBMS_SCHEDULER FROM PUBLIC;
    compliance:
      - cis_oracle_db_19c_v1_2_0_5_1_1_5

  - rule_id: oracle_db.cis.5.execute_is_revoked_from_public_on_dbms_credential
    title: "Ensure 'EXECUTE' is revoked from 'PUBLIC' on 'DBMS_CREDENTIAL' Package"
    severity: high
    automation_type: automated
    cis_control: '5.1.1.7'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: oracle_db.section_5.execute_is_revoked_from_public_on_dbms_credential
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      To remediate this setting, execute the following SQL statement, keeping in
      mind if this is granted in both container and pluggable database, you must
      connect to both places to revoke. REVOKE EXECUTE ON DBMS_CREDENTIAL FROM
      PUBLIC;
    compliance:
      - cis_oracle_db_19c_v1_2_0_5_1_1_7

  - rule_id: oracle_db.cis.5.execute_is_not_granted_to_public_on_non_default
    title: "Ensure 'EXECUTE' is not granted to 'PUBLIC' on 'Non- default' Packages"
    severity: high
    automation_type: automated
    cis_control: '5.1.2.1'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: oracle_db.section_5.execute_is_not_granted_to_public_on_non_default
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      To remediate this setting, execute the following SQL statement, keeping in
      mind if this is granted in both container and pluggable database, you must
      connect to both places to revoke. REVOKE EXECUTE ON DBMS_BACKUP_RESTORE FROM
      PUBLIC; REVOKE EXECUTE ON DBMS_FILE_TRANSFER FROM PUBLIC; REVOKE EXECUTE ON
      DBMS_SYS_SQL FROM PUBLIC; REVOKE EXECUTE ON DBMS_REPCAT_SQL_UTL FROM PUBLIC;
      REVOKE EXECUTE ON INITJVMAUX FROM PUBLIC; REVOKE EXECUTE ON DBMS_AQADM_SYS
      FROM PUBLIC; REVOKE EXECUTE ON DBMS_STREAMS_RPC FROM PUBLIC; REVOKE EXECUTE ON
      DBMS_PRVTAQIM FROM PUBLIC; REVOKE EXECUTE ON LTADM FROM PUBLIC; REVOKE EXECUTE
      ON DBMS_IJOB FROM PUBLIC; REVOKE EXECUTE ON DBMS_PDB_EXEC_SQL FROM PUBLIC;
    compliance:
      - cis_oracle_db_19c_v1_2_0_5_1_2_1

  - rule_id: oracle_db.cis.5.any_is_revoked_from_unauthorized_grantee
    title: "Ensure '%ANY%' Is Revoked from Unauthorized 'GRANTEE'"
    severity: high
    automation_type: automated
    cis_control: '5.2.1'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: oracle_db.section_5.any_is_revoked_from_unauthorized_grantee
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      To remediate this setting, execute the following SQL statement, keeping in
      mind if this is granted in both container and pluggable database, you must
      connect to both places to revoke. REVOKE ' <ANY Privilege> ' FROM <grantee> ;
      References: 1. https://docs.oracle.com/en/database/oracle/oracle-
      database/19/dbseg/configuring-privilege-and-role-authorization.html
    compliance:
      - cis_oracle_db_19c_v1_2_0_5_2_1

  - rule_id: oracle_db.cis.5.grant_any_role_is_revoked_from_unauthorized
    title: "Ensure 'GRANT ANY ROLE' Is Revoked from Unauthorized 'GRANTEE'"
    severity: high
    automation_type: automated
    cis_control: '5.2.15'
    cis_section: '5'
    profile_applicability: "Level 1"
    scope: oracle_db.section_5.grant_any_role_is_revoked_from_unauthorized
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      To remediate this setting, execute the following SQL statement, keeping in
      mind if this is granted in both container and pluggable database, you must
      connect to both places to revoke. REVOKE GRANT ANY ROLE FROM <grantee> ;
      References: 1. https://docs.oracle.com/en/database/oracle/oracle-
      database/19/dbseg/configuring-privilege-and-role-authorization.html
    compliance:
      - cis_oracle_db_19c_v1_2_0_5_2_15


