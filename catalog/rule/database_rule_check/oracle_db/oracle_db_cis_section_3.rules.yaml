tech_type: oracle_db
category: database
cis_benchmark: CIS Oracle Db 23ai v1.0.0
cis_section: '3'

rules:

  - rule_id: oracle_db.cis.3.password_life_time_password_grace_time_is_less
    title: "Ensure 'PASSWORD_LIFE_TIME + PASSWORD_GRACE_TIME' Is Less Than Or Equal To '365'"
    severity: high
    automation_type: automated
    cis_control: '3.3'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: oracle_db.section_3.password_life_time_password_grace_time_is_less
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Remediate this setting by executing the following SQL statement for each
      PROFILE returned by the audit procedure. ALTER PROFILE <profile_name> LIMIT
      PASSWORD_LIFE_TIME 365; OR ALTER PROFILE <profile_name> LIMIT
      PASSWORD_GRACE_TIME <NEW_VALUE>; Default Value: 180 References: 1.
      https://docs.oracle.com/en/database/oracle/oracle-database/23/sqlrf/CREATE-
      PROFILE.html#d387296e861
    compliance:
      - cis_oracle_db_23ai_v1_0_0_3_3

  - rule_id: oracle_db.cis.3.password_reuse_max_is_set_to_unlimited
    title: "Ensure 'PASSWORD_REUSE_MAX' Is Set To 'UNLIMITED'"
    severity: high
    automation_type: automated
    cis_control: '3.4'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: oracle_db.section_3.password_reuse_max_is_set_to_unlimited
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Remediate this setting by executing the following SQL statement for each
      PROFILE returned by the audit procedure. ALTER PROFILE <profile_name> LIMIT
      PASSWORD_REUSE_MAX 'UNLIMITED'; Default Value: UNLIMITED References: 1.
      https://docs.oracle.com/en/database/oracle/oracle-database/23/sqlrf/CREATE-
      PROFILE.html#d387296e891 Additional Information: The above restriction should
      be applied along with the PASSWORD_REUSE_TIME setting, which should also be
      set to UNLIMITED.
    compliance:
      - cis_oracle_db_23ai_v1_0_0_3_4

  - rule_id: oracle_db.cis.3.password_verify_function_is_set_for_all_profiles
    title: "Ensure 'PASSWORD_VERIFY_FUNCTION' Is Set For All Profiles"
    severity: high
    automation_type: automated
    cis_control: '3.5'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: oracle_db.section_3.password_verify_function_is_set_for_all_profiles
    assertion:
      field: row_count
      operator: equals
      expected: "true"
    remediation: >
      Use the password verification function, or create a custom password
      verification function which fulfills the password requirements of the
      organization. Oracle supplies two password verification functions with the
      database ora12c_verify_function and ora12c_strong_verify_function. You may
      also create your own function if your organization's standards are different
      from the functions Oracle supplies. For a sample of a password verification
      function that you can customize to meet your needs, see
      $ORACLE_HOME/rdbms/admin/catpvf.sql. In most cases, we recommend that
      ora12c_strong_verify_function be used. References: 1.
      https://docs.oracle.com/en/database/oracle/oracle-database/23/sqlrf/CREATE-
      PROFILE.html#d387296e997
    compliance:
      - cis_oracle_db_23ai_v1_0_0_3_5

  - rule_id: oracle_db.cis.3.password_rollover_time_is_set_to_0
    title: "Ensure 'PASSWORD_ROLLOVER_TIME' Is set to '0'"
    severity: high
    automation_type: automated
    cis_control: '3.7'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: oracle_db.section_3.password_rollover_time_is_set_to_0
    assertion:
      field: row_count
      operator: equals
      expected: "true"
    remediation: >
      Remediate this setting by executing the following SQL statement for each
      PROFILE returned by the audit procedure. ALTER PROFILE DEFAULT LIMIT
      PASSWORD_ROLLOVER_TIME 0; Default Value: 0 or NULL References: 1.
      https://docs.oracle.com/en/database/oracle/oracle-
      database/23/dbseg/configuring-authentication.html#d23067e2021
    compliance:
      - cis_oracle_db_23ai_v1_0_0_3_7

  - rule_id: oracle_db.cis.3.password_life_time_is_less_than_or_equal_to_90
    title: "Ensure 'PASSWORD_LIFE_TIME' Is Less than or Equal to '90'"
    severity: high
    automation_type: automated
    cis_control: '3.3'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: oracle_db.section_3.password_life_time_is_less_than_or_equal_to_90
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Remediate this setting by executing the following SQL statement for each
      PROFILE returned by the audit procedure. ALTER PROFILE <profile_name> LIMIT
      PASSWORD_LIFE_TIME 90; References: 1.
      https://docs.oracle.com/en/database/oracle/oracle-database/19/sqlrf/CREATE-
      PROFILE.html#d346953e694
    compliance:
      - cis_oracle_db_19c_v1_2_0_3_3

  - rule_id: oracle_db.cis.3.password_reuse_max_is_greater_than_or_equal_to_20
    title: "Ensure 'PASSWORD_REUSE_MAX' Is Greater than or Equal to '20'"
    severity: high
    automation_type: automated
    cis_control: '3.4'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: oracle_db.section_3.password_reuse_max_is_greater_than_or_equal_to_20
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Remediate this setting by executing the following SQL statement for each
      PROFILE returned by the audit procedure. ALTER PROFILE <profile_name> LIMIT
      PASSWORD_REUSE_MAX 20; References: 1.
      https://docs.oracle.com/en/database/oracle/oracle-database/19/sqlrf/CREATE-
      PROFILE.html#d346953e716 Additional Information: The above restriction should
      be applied along with the PASSWORD_REUSE_TIME setting.
    compliance:
      - cis_oracle_db_19c_v1_2_0_3_4

  - rule_id: oracle_db.cis.3.password_reuse_time_is_greater_than_or_equal_to
    title: "Ensure 'PASSWORD_REUSE_TIME' Is Greater than or Equal to '365'"
    severity: high
    automation_type: automated
    cis_control: '3.5'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: oracle_db.section_3.password_reuse_time_is_greater_than_or_equal_to
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Remediate this setting by executing the following SQL statement for each
      PROFILE returned by the audit procedure. ALTER PROFILE <profile_name> LIMIT
      PASSWORD_REUSE_TIME 365; References: 1.
      https://docs.oracle.com/en/database/oracle/oracle-database/19/sqlrf/CREATE-
      PROFILE.html#d346953e716 Additional Information: The above restriction should
      be applied along with the PASSWORD_REUSE_MAX setting.
    compliance:
      - cis_oracle_db_19c_v1_2_0_3_5

  - rule_id: oracle_db.cis.3.sessions_per_user_is_less_than_or_equal_to_10
    title: "Ensure 'SESSIONS_PER_USER' Is Less than or Equal to '10'"
    severity: high
    automation_type: automated
    cis_control: '3.8'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: oracle_db.section_3.sessions_per_user_is_less_than_or_equal_to_10
    assertion:
      field: row_count
      operator: lte
      expected: "true"
    remediation: >
      To remediate this setting, execute the following SQL statement for each
      PROFILE returned by the audit procedure. ALTER PROFILE <profile_name> LIMIT
      SESSIONS_PER_USER 10; References: 1.
      https://docs.oracle.com/en/database/oracle/oracle-database/19/sqlrf/CREATE-
      PROFILE.html#GUID-ABC7AE4D-64A8-4EA9-857D-BEF7300B64C3__GUID-
      E39008BB-092E-49B2-AAC2-3C4A98FC9A03 Additional Information: The
      SESSIONS_PER_USER profile management capability was created to prevent
      resource(s) exhaustion at a time when resource usage was very expensive. As
      current database design may require much higher limits on this parameter if
      one 'user' handles all processing for specific types of batch/customer
      connections, this must be handled via a new user profile.
    compliance:
      - cis_oracle_db_19c_v1_2_0_3_8


