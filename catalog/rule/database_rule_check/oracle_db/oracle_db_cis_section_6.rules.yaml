tech_type: oracle_db
category: database
cis_benchmark: CIS Oracle Db 23ai v1.0.0
cis_section: '6'

rules:

  - rule_id: oracle_db.cis.6.any_is_revoked_from_unauthorized_grantee
    title: "Ensure '%ANY%' Is Revoked from Unauthorized 'GRANTEE'"
    severity: high
    automation_type: automated
    cis_control: '6.1.1'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: oracle_db.section_6.any_is_revoked_from_unauthorized_grantee
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      To remediate this setting, execute the following SQL statement, keeping in
      mind if this is granted in both container and pluggable database, you must
      connect to both places to revoke. Please ensure proper impact analysis is done
      before revoking the privilege from a role. REVOKE <ANY Privilege> FROM
      <grantee> ; In the case of a grant via a role : REVOKE <rolename> FROM
      <grantee> ; References: 1. https://docs.oracle.com/en/database/oracle/oracle-
      database/23/dbseg/configuring-privilege-and-role-authorization.html
    compliance:
      - cis_oracle_db_23ai_v1_0_0_6_1_1

  - rule_id: oracle_db.cis.6.create_alter_and_drop_public_database_link_is
    title: "Ensure 'CREATE', 'ALTER', And 'DROP' 'PUBLIC DATABASE LINK' Is Revoked From Unauthorized 'GRANTEE'"
    severity: high
    automation_type: automated
    cis_control: '6.1.7'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: oracle_db.section_6.create_alter_and_drop_public_database_link_is
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      To remediate this setting, execute the following SQL statement, keeping in
      mind if this is granted in both container and pluggable database, you must
      connect to both places to revoke. Please ensure proper impact analysis is done
      before revoking the privilege from a role. REVOKE CREATE PUBLIC DATABASE LINK
      FROM <grantee> ; REVOKE ALTER PUBLIC DATABASE LINK FROM <grantee> ; REVOKE
      DROP PUBLIC DATABASE LINK FROM <grantee> ; In the case of a grant via a role:
      REVOKE <rolename> FROM <grantee> ; References: 1.
      https://docs.oracle.com/en/database/oracle/oracle-database/23/dbseg/keeping-
      your-oracle-database-secure.html#GUID-5167857B-7CEC-423B-8A6F- 64569B3A661D
    compliance:
      - cis_oracle_db_23ai_v1_0_0_6_1_7

  - rule_id: oracle_db.cis.6.java_admin_is_revoked_from_unauthorized_grantee
    title: "Ensure 'JAVA_ADMIN' Is Revoked From Unauthorized 'GRANTEE'"
    severity: high
    automation_type: automated
    cis_control: '6.2.10'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: oracle_db.section_6.java_admin_is_revoked_from_unauthorized_grantee
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      To remediate this setting, execute the following SQL statement, keeping in
      mind if this is granted in both container and pluggable database, you must
      connect to both places to revoke. Please ensure proper impact analysis is done
      before revoking the privilege from a role. REVOKE JAVA_ADMIN FROM <grantee> ;
      In the case of a grant via a role: REVOKE <rolename> FROM <grantee> ;
      References: 1. https://docs.oracle.com/en/database/oracle/oracle-
      database/23/dbseg/configuring-privilege-and-role-authorization.html
    compliance:
      - cis_oracle_db_23ai_v1_0_0_6_2_10


