tech_type: sql_server
category: database
cis_benchmark: CIS Microsoft SQL Server 2022 v1.2.0
cis_section: '7'

rules:

  - rule_id: sql_server.cis.7.symmetric_key_encryption_algorithm_is_set_to_aes
    title: "Ensure 'Symmetric Key encryption algorithm' is set to 'AES_128' or higher in non-system databases"
    severity: high
    automation_type: automated
    cis_control: '7.1'
    cis_section: '7'
    profile_applicability: "Level 1"
    scope: sql_server.section_7.symmetric_key_encryption_algorithm_is_set_to_aes
    assertion:
      field: value
      operator: equals
      expected: "no"
    remediation: >
      Refer to Microsoft SQL Server Books Online ALTER SYMMETRIC KEY entry:
      https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-symmetric-key-
      transact-sql Default Value: none References: 1.
      https://learn.microsoft.com/en-us/sql/t-sql/statements/alter-symmetric-key-
      transact-sql 2. https://learn.microsoft.com/en-US/sql/relational-
      databases/security/encryption/choose-an-encryption-algorithm
    compliance:
      - cis_sql_server_2022_v1_2_0_7_1

  - rule_id: sql_server.cis.7.asymmetric_key_size_is_set_to_greater_than_or
    title: "Ensure Asymmetric Key Size is set to 'greater than or equal to 2048' in non-system databases"
    severity: high
    automation_type: automated
    cis_control: '7.2'
    cis_section: '7'
    profile_applicability: "Level 1"
    scope: sql_server.section_7.asymmetric_key_size_is_set_to_greater_than_or
    assertion:
      field: value
      operator: gte
      expected: "no"
    remediation: >
      Refer to Microsoft SQL Server Books Online ALTER ASYMMETRIC KEY entry:
      https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-asymmetric-key-
      transact-sql Default Value: None References: 1.
      https://learn.microsoft.com/en-us/sql/t-sql/statements/alter-symmetric-key-
      transact-sql 2. https://learn.microsoft.com/en-US/sql/relational-
      databases/security/encryption/choose-an-encryption-algorithm
    compliance:
      - cis_sql_server_2022_v1_2_0_7_2

  - rule_id: sql_server.cis.7.database_backups_are_encrypted
    title: "Ensure Database Backups are Encrypted"
    severity: medium
    automation_type: automated
    cis_control: '7.3'
    cis_section: '7'
    profile_applicability: "Level 2"
    scope: sql_server.section_7.database_backups_are_encrypted
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      SQL Server backups need to 'Back up to a new media set', not 'Back up to the
      existing media set' in order to allow for encryption. The backup option to
      Encrypt Backup can be implemented after a Certificate or Asymmetric key has
      been applied to the SQL Server for this purpose. Alternatively, encrypt the
      database with TDE. This automatically encrypts the backups as well. See 7.5
      Additional Information: We recommend you purge backup history prior to the
      date you began using encryption. Use sp_delete_backuphistory to purge old
      records.
    compliance:
      - cis_sql_server_2022_v1_2_0_7_3

  - rule_id: sql_server.cis.7.network_encryption_is_configured_and_enabled
    title: "Ensure Network Encryption is Configured and Enabled"
    severity: medium
    automation_type: automated
    cis_control: '7.4'
    cis_section: '7'
    profile_applicability: "Level 2"
    scope: sql_server.section_7.network_encryption_is_configured_and_enabled
    assertion:
      field: enabled
      operator: exists
      expected: "true"
    remediation: >
      Refer to Microsoft SQL Server Encryption Documentation:
      https://learn.microsoft.com/en-us/sql/relational-
      databases/security/encryption/sql-server- encryption References: 1.
      https://learn.microsoft.com/en-us/sql/database-engine/configure-
      windows/configure-sql-server-encryption 2. https://learn.microsoft.com/en-
      us/sql/relational-databases/security/encryption/sql- server-encryption 3.
      https://learn.microsoft.com/en-us/sql/database-engine/configure-
      windows/certificate-requirements 4. https://learn.microsoft.com/en-
      us/sql/relational-databases/system-dynamic- management-views/sys-dm-exec-
      connections-transact-sql
    compliance:
      - cis_sql_server_2022_v1_2_0_7_4

  - rule_id: sql_server.cis.7.databases_are_encrypted_with_tde
    title: "Ensure Databases are Encrypted with TDE"
    severity: medium
    automation_type: automated
    cis_control: '7.5'
    cis_section: '7'
    profile_applicability: "Level 2"
    scope: sql_server.section_7.databases_are_encrypted_with_tde
    assertion:
      field: value
      operator: equals
      expected: "no"
    remediation: >
      Implement TDE encryption on each user database with sensitive data. More info
      on how to do this is available here: https://learn.microsoft.com/en-
      us/sql/relational-databases/security/encryption/transparent-data-encryption
      References: 1. https://learn.microsoft.com/en-us/sql/relational-
      databases/security/encryption/transparent-data-encryption 2.
      https://learn.microsoft.com/en-us/archive/blogs/sqlsecurity/feature-spotlight-
      transparent-data-encryption-tde
    compliance:
      - cis_sql_server_2022_v1_2_0_7_5


