tech_type: sql_server
category: database
cis_benchmark: CIS Microsoft SQL Server 2022 v1.2.0
cis_section: '2'

rules:

  - rule_id: sql_server.cis.2.ad_hoc_distributed_queries_server_configuration
    title: "Ensure 'Ad Hoc Distributed Queries' Server Configuration Option is set to '0'"
    severity: high
    automation_type: automated
    cis_control: '2.1'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: sql_server.section_2.ad_hoc_distributed_queries_server_configuration
    assertion:
      field: enabled
      operator: equals
      expected: "false"
    remediation: >
      For AWS RDS Instances, please refer to the documentation for using Parameter
      Groups here: Working with parameter groups Run the following T-SQL command:
      EXECUTE sp_configure 'show advanced options', 1; RECONFIGURE; EXECUTE
      sp_configure 'Ad Hoc Distributed Queries', 0; RECONFIGURE; GO EXECUTE
      sp_configure 'show advanced options', 0; RECONFIGURE; Default Value: 0
      (disabled) References: 1. https://learn.microsoft.com/en-us/sql/database-
      engine/configure-windows/ad- hoc-distributed-queries-server-configuration-
      option
    compliance:
      - cis_sql_server_2022_v1_2_0_2_1

  - rule_id: sql_server.cis.2.clr_enabled_server_configuration_option_is_set_to
    title: "Ensure 'CLR Enabled' Server Configuration Option is set to '0'"
    severity: high
    automation_type: automated
    cis_control: '2.2'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: sql_server.section_2.clr_enabled_server_configuration_option_is_set_to
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      For AWS RDS Instances, please refer to the documentation for using Parameter
      Groups here: Working with parameter groups Run the following T-SQL command:
      EXECUTE sp_configure 'clr enabled', 0; RECONFIGURE; Default Value: By default,
      this option is disabled (0). References: 1. https://learn.microsoft.com/en-
      us/sql/t-sql/statements/create-assembly-transact- sql Additional Information:
      If clr strict security is set to 1 this recommendation is not applicable. By
      default, clr strict security is enabled and treats SAFE and EXTERNAL_ACCESS
      assemblies as if they were marked UNSAFE. Though not recommended, the clr
      strict security option can be disabled for backward compatibility. This
      recommendation has been retained for environments configured for backwards
      compatibility.
    compliance:
      - cis_sql_server_2022_v1_2_0_2_2

  - rule_id: sql_server.cis.2.cross_db_ownership_chaining_server_configuration
    title: "Ensure 'Cross DB Ownership Chaining' Server Configuration Option is set to '0'"
    severity: high
    automation_type: automated
    cis_control: '2.3'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: sql_server.section_2.cross_db_ownership_chaining_server_configuration
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      For AWS RDS Instances, please refer to the documentation for using Parameter
      Groups here: Working with parameter groups Run the following T-SQL command:
      EXECUTE sp_configure 'cross db ownership chaining', 0; RECONFIGURE; GO Default
      Value: By default, this option is disabled (0). References: 1.
      https://learn.microsoft.com/en-us/sql/database-engine/configure-windows/cross-
      db-ownership-chaining-server-configuration-option
    compliance:
      - cis_sql_server_2022_v1_2_0_2_3

  - rule_id: sql_server.cis.2.database_mail_xps_server_configuration_option_is
    title: "Ensure 'Database Mail XPs' Server Configuration Option is set to '0'"
    severity: high
    automation_type: automated
    cis_control: '2.4'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: sql_server.section_2.database_mail_xps_server_configuration_option_is
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Run the following T-SQL command: EXECUTE sp_configure 'show advanced options',
      1; RECONFIGURE; EXECUTE sp_configure 'Database Mail XPs', 0; RECONFIGURE; GO
      EXECUTE sp_configure 'show advanced options', 0; RECONFIGURE; Default Value:
      By default, this option is disabled (0). References: 1.
      https://learn.microsoft.com/en-us/sql/relational-databases/database-
      mail/database-mail
    compliance:
      - cis_sql_server_2022_v1_2_0_2_4

  - rule_id: sql_server.cis.2.ole_automation_procedures_server_configuration
    title: "Ensure 'Ole Automation Procedures' Server Configuration Option is set to '0'"
    severity: high
    automation_type: automated
    cis_control: '2.5'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: sql_server.section_2.ole_automation_procedures_server_configuration
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Run the following T-SQL command: EXECUTE sp_configure 'show advanced options',
      1; RECONFIGURE; EXECUTE sp_configure 'Ole Automation Procedures', 0;
      RECONFIGURE; GO EXECUTE sp_configure 'show advanced options', 0; RECONFIGURE;
      Default Value: By default, this option is disabled (0). References: 1.
      https://learn.microsoft.com/en-us/sql/database-engine/configure-windows/ole-
      automation-procedures-server-configuration-option
    compliance:
      - cis_sql_server_2022_v1_2_0_2_5

  - rule_id: sql_server.cis.2.remote_admin_connections_server_configuration
    title: "Ensure 'Remote Admin Connections' Server Configuration Option is set to '0'"
    severity: high
    automation_type: automated
    cis_control: '2.7'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: sql_server.section_2.remote_admin_connections_server_configuration
    assertion:
      field: value
      operator: equals
      expected: "no"
    remediation: >
      Run the following T-SQL command on non-clustered installations: EXECUTE
      sp_configure 'remote admin connections', 0; RECONFIGURE; GO Default Value: By
      default, this option is disabled (0), only local connections may use the DAC.
      References: 1. https://learn.microsoft.com/en-us/sql/database-
      engine/configure- windows/remote-admin-connections-server-configuration-option
      Additional Information: If it's a clustered installation, this option must be
      enabled as a clustered SQL Server cannot bind to localhost and DAC will be
      unavailable otherwise. Enable it for clustered installations. Disable it for
      standalone installations where not required.
    compliance:
      - cis_sql_server_2022_v1_2_0_2_7

  - rule_id: sql_server.cis.2.scan_for_startup_procs_server_configuration
    title: "Ensure 'Scan For Startup Procs' Server Configuration Option is set to '0'"
    severity: high
    automation_type: automated
    cis_control: '2.8'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: sql_server.section_2.scan_for_startup_procs_server_configuration
    assertion:
      field: enabled
      operator: equals
      expected: "true"
    remediation: >
      Run the following T-SQL command: EXECUTE sp_configure 'show advanced options',
      1; RECONFIGURE; EXECUTE sp_configure 'scan for startup procs', 0; RECONFIGURE;
      GO EXECUTE sp_configure 'show advanced options', 0; RECONFIGURE; Restart the
      Database Engine. Default Value: By default, this option is disabled (0).
      References: 1. https://learn.microsoft.com/en-us/sql/database-
      engine/configure- windows/configure-the-scan-for-startup-procs-server-
      configuration-option
    compliance:
      - cis_sql_server_2022_v1_2_0_2_8

  - rule_id: sql_server.cis.2.sql_server_is_configured_to_use_non_standard_ports
    title: "Ensure SQL Server is configured to use non-standard ports"
    severity: high
    automation_type: automated
    cis_control: '2.11'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: sql_server.section_2.sql_server_is_configured_to_use_non_standard_ports
    assertion:
      field: port
      operator: exists
      expected: "true"
    remediation: >
      1. In SQL Server Configuration Manager , in the console pane, expand SQL
      Server Network Configuration , expand Protocols for <InstanceName> , and then
      double-click the TCP/IP protocol 2. In the TCP/IP Properties dialog box, on
      the IP Addresses tab, several IP addresses appear in the format IP1, IP2, up
      to IPAll. One of these is for the IP address of the loopback adapter,
      127.0.0.1. Additional IP addresses appear for each IP Address on the computer.
      3. Under IPAll, change the TCP Port field from 1433 to a non-standard port or
      leave the TCP Port field empty and set the TCP Dynamic Ports value to 0 to
      enable dynamic port assignment and then click OK . 4. In the console pane,
      click SQL Server Services . 5. In the details pane, right-click SQL Server (
      <InstanceName> ) and then click Restart , to stop and restart SQL Server.
      Default Value: By default, default SQL Server instances listen on to TCP/IP
      traffic on TCP port 1433 and named instances use dynamic ports. References: 1.
      https://learn.microsoft.com/en-us/sql/database-engine/configure-
      windows/configure-a-server-to-listen-on-a-specific-tcp-port Additional
      Information: In the case of AWS RDS, this is only configurable during the
      build process.
    compliance:
      - cis_sql_server_2022_v1_2_0_2_11

  - rule_id: sql_server.cis.2.hide_instance_option_is_set_to_yes_for_production
    title: "Ensure 'Hide Instance' option is set to 'Yes' for Production SQL Server instances"
    severity: high
    automation_type: automated
    cis_control: '2.12'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: sql_server.section_2.hide_instance_option_is_set_to_yes_for_production
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      Perform either the GUI or T-SQL method shown: GUI Method 1. In SQL Server 2022
      Configuration Manager , expand SQL Server Network Configuration , right-click
      Protocols for <InstanceName> , and then select Properties . 2. On the Flags
      tab, in the Hide Instance box, select Yes, and then click OK to close the
      dialog box. The change takes effect immediately for new connections. T-SQL
      Method Execute the following T-SQL to remediate: EXEC
      master.sys.xp_instance_regwrite @rootkey = N'HKEY_LOCAL_MACHINE', @key =
      N'SOFTWARE\Microsoft\Microsoft SQL Server\MSSQLServer\SuperSocketNetLib',
      @value_name = N'HideInstance', @type = N'REG_DWORD', @value = 1; Default
      Value: By default, SQL Server instances are not hidden. References: 1.
      https://learn.microsoft.com/en-us/sql/database-engine/configure-windows/hide-
      an-instance-of-sql-server-database-engine
    compliance:
      - cis_sql_server_2022_v1_2_0_2_12

  - rule_id: sql_server.cis.2.auto_close_is_set_to_off_on_contained_databases
    title: "Ensure 'AUTO_CLOSE' is set to 'OFF' on contained databases"
    severity: high
    automation_type: automated
    cis_control: '2.15'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: sql_server.section_2.auto_close_is_set_to_off_on_contained_databases
    assertion:
      field: enabled
      operator: equals
      expected: "no"
    remediation: >
      Execute the following T-SQL, replacing <database_name> with each database name
      found by the Audit Procedure: ALTER DATABASE <database_name> SET AUTO_CLOSE
      OFF; Default Value: By default, the database property AUTO_CLOSE is OFF which
      is equivalent to is_auto_close_on = 0. References: 1.
      https://learn.microsoft.com/en-us/sql/relational-databases/databases/security-
      best-practices-with-contained-databases
    compliance:
      - cis_sql_server_2022_v1_2_0_2_15

  - rule_id: sql_server.cis.2.clr_strict_security_server_configuration_option
    title: "Ensure 'clr strict security' Server Configuration Option is set to '1'"
    severity: high
    automation_type: automated
    cis_control: '2.17'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: sql_server.section_2.clr_strict_security_server_configuration_option
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Run the following T-SQL command: EXECUTE sp_configure 'show advanced options',
      1; RECONFIGURE; EXECUTE sp_configure 'clr strict security', 1; RECONFIGURE; GO
      EXECUTE sp_configure 'show advanced options', 0; RECONFIGURE; Default Value:
      By default, this option is Enabled (1). References: 1.
      https://learn.microsoft.com/en-us/sql/database-engine/configure-windows/clr-
      strict-security
    compliance:
      - cis_sql_server_2022_v1_2_0_2_17


