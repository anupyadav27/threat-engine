tech_type: mariadb
category: database
cis_benchmark: CIS MariaDB 10.6 v1.1.0
cis_section: '1'

rules:

  - rule_id: mariadb.cis.1.the_mysql_pwd_environment_variable_is_not_in_use
    title: "Verify That the MYSQL_PWD Environment Variable is Not in Use"
    severity: high
    automation_type: automated
    cis_control: '1.4'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: mariadb.section_1.the_mysql_pwd_environment_variable_is_not_in_use
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Check which users and/or scripts are setting MYSQL_PWD and change them to use
      a more secure method. For unattended logins, you should consider 2) Different
      authentication methods (e.g., X509 certificate verification) Default Value:
      Not set. References: 1. https://mariadb.com/kb/en/mariadb-environment-
      variables/
    compliance:
      - cis_mariadb_10_6_v1_1_0_1_4

  - rule_id: mariadb.cis.1.mysql_pwd_is_not_set_in_users_profiles
    title: "Verify That 'MYSQL_PWD' is Not Set in Users' Profiles"
    severity: high
    automation_type: automated
    cis_control: '1.6'
    cis_section: '1'
    profile_applicability: "Level 1"
    scope: mariadb.section_1.mysql_pwd_is_not_set_in_users_profiles
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Check which users and/or scripts are setting MYSQL_PWD and change them to use
      a more secure method. Default Value: Not set. References: 1.
      https://mariadb.com/kb/en/mariadb-environment-variables/
    compliance:
      - cis_mariadb_10_6_v1_1_0_1_6


