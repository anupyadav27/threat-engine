tech_type: mariadb
category: database
cis_benchmark: CIS MariaDB 10.6 v1.1.0
cis_section: '8'

rules:

  - rule_id: mariadb.cis.8.require_secure_transport_is_set_to_on_and_have
    title: "Ensure 'require_secure_transport' is Set to 'ON' and 'have_ssl' is Set to 'YES'"
    severity: high
    automation_type: automated
    cis_control: '8.1'
    cis_section: '8'
    profile_applicability: "Level 1"
    scope: mariadb.section_8.require_secure_transport_is_set_to_on_and_have
    assertion:
      field: port
      operator: equals
      expected: "yes"
    remediation: >
      Follow the procedures as documented in the MariaDB KnowledgeBase to setup TLS.
      In your MariaDB configuration file, enable require_secure_transport:
      require_secure_transport=ON; Default Value: require_secure_transport is
      disabled (OFF, 0) by default. have_ssl defaults to DISABLED. References: 1.
      https://mariadb.com/kb/en/secure-connections-overview/ 2.
      https://mariadb.com/kb/en/securing-connections-for-client-and-server/ 3.
      https://mariadb.com/kb/en/server-system-variables/#require_secure_transport 4.
      https://mariadb.com/kb/en/ssltls-system-variables/#have_openssl
    compliance:
      - cis_mariadb_10_6_v1_1_0_8_1

  - rule_id: mariadb.cis.8.ssl_type_is_set_to_any_x509_or_specified_for_all
    title: "Ensure 'ssl_type' is Set to 'ANY', 'X509', or 'SPECIFIED' for All Remote Users"
    severity: high
    automation_type: automated
    cis_control: '8.2'
    cis_section: '8'
    profile_applicability: "Level 1"
    scope: mariadb.section_8.ssl_type_is_set_to_any_x509_or_specified_for_all
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Use the ALTER USER statement to require the use of SSL/TLS: ALTER USER
      'my_user'@'app1.example.com' REQUIRE SSL; Note: REQUIRE SSL only enforces TLS.
      There are additional options REQUIRE X509, REQUIRE ISSUER, REQUIRE SUBJECT and
      REQUIRE CIPHER which can be used to further restrict the connection. Default
      Value: The Value of ssl_type defaults to an empty string, the equivalent
      result of using REQUIRE NONE with an ALTER USER statement. References: 1.
      https://mariadb.com/kb/en/secure-connections-overview/ 2.
      https://mariadb.com/kb/en/ssltls-system-variables/ 3.
      https://mariadb.com/kb/en/alter-user/#tls-options
    compliance:
      - cis_mariadb_10_6_v1_1_0_8_2


