tech_type: mariadb
category: database
cis_benchmark: CIS MariaDB 10.6 v1.1.0
cis_section: '6'

rules:

  - rule_id: mariadb.cis.6.log_error_is_configured_correctly
    title: "Ensure 'log_error' is configured correctly"
    severity: high
    automation_type: automated
    cis_control: '6.1'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: mariadb.section_6.log_error_is_configured_correctly
    assertion:
      field: value
      operator: exists
      expected: "true"
    remediation: >
      Perform the following actions to remediate this setting: 1. Open the MariaDB
      configuration file (mariadb.cnf). 2. Set the log_error option to the path for
      the error log. Default Value: ./stderr.err References: 1.
      https://mariadb.com/docs/server/ref/mdb/system-variables/log_error/ 2.
      https://mariadb.com/kb/en/error-log/
    compliance:
      - cis_mariadb_10_6_v1_1_0_6_1

  - rule_id: mariadb.cis.6.log_files_are_stored_on_a_non_system_partition
    title: "Ensure Log Files are Stored on a Non-System Partition"
    severity: high
    automation_type: automated
    cis_control: '6.2'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: mariadb.section_6.log_files_are_stored_on_a_non_system_partition
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Perform the following actions to remediate this setting: 1. Open the MariaDB
      configuration file (mariadb.cnf) 2. Locate the log_bin entry and set it to a
      file not on root (/), /var, or /usr References: 1.
      https://mariadb.com/docs/server/ref/mdb/system-variables/log_bin/ 2.
      https://mariadb.com/kb/en/binary-log/
    compliance:
      - cis_mariadb_10_6_v1_1_0_6_2

  - rule_id: mariadb.cis.6.log_warnings_is_set_to_2
    title: "Ensure 'log_warnings' is Set to '2'"
    severity: medium
    automation_type: automated
    cis_control: '6.3'
    cis_section: '6'
    profile_applicability: "Level 2"
    scope: mariadb.section_6.log_warnings_is_set_to_2
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Perform the following actions to remediate this setting: • Open the MySQL
      configuration file (mariadb.cnf) • Ensure the following line is found in the
      mariadbd section log_warnings = 2 Default Value: The option is enabled (2) -
      errors and warning events are logged - by default. References: 1.
      https://mariadb.com/docs/server/ref/mdb/system-variables/log_warnings/ 2.
      https://mariadb.com/kb/en/error-log/
    compliance:
      - cis_mariadb_10_6_v1_1_0_6_3

  - rule_id: mariadb.cis.6.binary_and_relay_logs_are_encrypted
    title: "Ensure Binary and Relay Logs are Encrypted"
    severity: medium
    automation_type: automated
    cis_control: '6.6'
    cis_section: '6'
    profile_applicability: "Level 2"
    scope: mariadb.section_6.binary_and_relay_logs_are_encrypted
    assertion:
      field: enabled
      operator: exists
      expected: "on"
    remediation: >
      Encryption of binary logs is configured by the encrypt_binlog system variable.
      To remediate misconfiguration, add encrypt_binlog and restart MariaDB.
      [mariadb] ... # Binary Log Encryption encrypt_binlog=ON Default Value: The
      default Default Value: OFF References: 1.
      https://mariadb.com/kb/en/encrypting-binary-logs/ 2.
      https://mariadb.com/kb/en/activating-the-binary-log/ 3.
      https://mariadb.com/kb/en/key-management-and-encryption-plugins/ 4.
      https://mariadb.com/kb/en/purge-binary-logs/ 5.
      https://mariadb.com/kb/en/reset-master/ Additional Information: It is
      necessary to install a Key Management Encryption plugin prior to configuring
      encryption. After enabling encryption, consider also deleting old, unencrypted
      logs, using the PURGE BINARY LOGS and RESET MASTER commands.
    compliance:
      - cis_mariadb_10_6_v1_1_0_6_6


