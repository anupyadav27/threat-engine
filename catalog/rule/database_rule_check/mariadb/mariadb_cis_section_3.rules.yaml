tech_type: mariadb
category: database
cis_benchmark: CIS MariaDB 10.6 v1.1.0
cis_section: '3'

rules:

  - rule_id: mariadb.cis.3.datadir_has_appropriate_permissions
    title: "Ensure 'datadir' Has Appropriate Permissions"
    severity: high
    automation_type: automated
    cis_control: '3.1'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: mariadb.section_3.datadir_has_appropriate_permissions
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Execute the following commands at a terminal prompt: chmod 750 <datadir> chown
      mysql:mysql <datadir>
    compliance:
      - cis_mariadb_10_6_v1_1_0_3_1

  - rule_id: mariadb.cis.3.ssl_key_files_have_appropriate_permissions
    title: "Ensure SSL Key Files Have Appropriate Permissions"
    severity: high
    automation_type: automated
    cis_control: '3.7'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: mariadb.section_3.ssl_key_files_have_appropriate_permissions
    assertion:
      field: port
      operator: exists
      expected: "true"
    remediation: >
      Execute the following commands at a terminal prompt to remediate these
      settings using the Value from the audit procedure: chown mysql:mysql
      <ssl_file> chmod 400 <ssl_file> References: 1.
      https://mariadb.com/kb/en/secure-connections-overview/ Additional Information:
      If SSL is not configured this recommendation is not applicable. By default
      MariaDB enables SSL. Using SSL is highly recommended.
    compliance:
      - cis_mariadb_10_6_v1_1_0_3_7

  - rule_id: mariadb.cis.3.plugin_directory_has_appropriate_permissions
    title: "Ensure Plugin Directory Has Appropriate Permissions"
    severity: high
    automation_type: automated
    cis_control: '3.8'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: mariadb.section_3.plugin_directory_has_appropriate_permissions
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      To remediate these settings, execute the following commands at a terminal
      prompt using the plugin_dir Value from the audit procedure. MariaDB server
      must not be allowed to write to this location. chmod 550 <plugin_dir Value>
      #(or use 554) chown mysql:mysql <plugin_dir Value> References: 1.
      https://mariadb.com/kb/en/show-plugins-soname/
    compliance:
      - cis_mariadb_10_6_v1_1_0_3_8

  - rule_id: mariadb.cis.3.file_key_management_encryption_plugin_files_have
    title: "Ensure File Key Management Encryption Plugin files have appropriate permissions"
    severity: high
    automation_type: automated
    cis_control: '3.10'
    cis_section: '3'
    profile_applicability: "Level 1"
    scope: mariadb.section_3.file_key_management_encryption_plugin_files_have
    assertion:
      field: value
      operator: equals
      expected: "no"
    remediation: >
      If the File Key Management plugin is not configured, first implement
      recommendation 4.10 from this benchmark. Execute the following command for
      each file location requiring corrected permissions: chmod 750 <file> chown
      mysql:mysql <file> References: 1. https://mariadb.com/kb/en/data-at-rest-
      encryption-overview/ 2. https://mariadb.com/kb/en/file-key-management-
      encryption-plugin/
    compliance:
      - cis_mariadb_10_6_v1_1_0_3_10


