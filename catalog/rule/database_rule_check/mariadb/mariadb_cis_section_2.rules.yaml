tech_type: mariadb
category: database
cis_benchmark: CIS MariaDB 10.6 v1.1.0
cis_section: '2'

rules:

  - rule_id: mariadb.cis.2.point_in_time_recovery
    title: "Point-in-Time Recovery"
    severity: medium
    automation_type: automated
    cis_control: '2.1.5'
    cis_section: '2'
    profile_applicability: "Level 2"
    scope: mariadb.section_2.point_in_time_recovery
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Enable binlogs, then create and test a restore procedure. Default Value: 0
      References: 1. https://mariadb.com/kb/en/replication-and-binary-log-system-
      variables/ 2. https://mariadb.com/kb/en/overview-of-the-binary-log/
    compliance:
      - cis_mariadb_10_6_v1_1_0_2_1_5

  - rule_id: mariadb.cis.2.password_lifetime_is_less_than_or_equal_to_365
    title: "Ensure 'password_lifetime' is Less Than or Equal to '365'"
    severity: high
    automation_type: automated
    cis_control: '2.6'
    cis_section: '2'
    profile_applicability: "Level 1"
    scope: mariadb.section_2.password_lifetime_is_less_than_or_equal_to_365
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      To configure the global password lifetime to 365 by executing the following
      command: SET GLOBAL default_password_lifetime=365; Alternatively, configure
      the password lifetime for each user returned by the audit procedure by
      executing the following command: ALTER USER ' <username> '@' <localhost> '
      PASSWORD EXPIRE INTERVAL 365 DAY; Default Value: 0 References: 1.
      https://csrc.nist.gov/csrc/media/publications/sp/800-118/archive/2009-04-
      21/documents/draft-sp800-118.pdf 2.
      https://mariadb.com/docs/reference/mdb/system-
      variables/default_password_lifetime/ 3. https://mariadb.com/kb/en/user-
      password-expiry/ Additional Information: When a user's password_lifetime is
      set to NULL it takes on the value set in global default_password_lifetime
      variable.
    compliance:
      - cis_mariadb_10_6_v1_1_0_2_6

  - rule_id: mariadb.cis.2.mariadb_is_bound_to_an_ip_address
    title: "Ensure MariaDB is Bound to an IP Address"
    severity: medium
    automation_type: automated
    cis_control: '2.9'
    cis_section: '2'
    profile_applicability: "Level 2"
    scope: mariadb.section_2.mariadb_is_bound_to_an_ip_address
    assertion:
      field: row_count
      operator: equals
      expected: "true"
    remediation: >
      For example, to have the MariaDB server only accept connections on a specific
      IPv4 address, add an entry similar to this under the [mysqld] option group in
      MariaDB configuration files: bind_address=192.0.2.24 This setting typically
      appears in /etc/mysql/mariadb.conf.d/50-server.cnf. In the case above, clients
      can connect to the server using --host=192.0.2.24. Connections on other server
      host addresses are not permitted. Default Value: Not set. On some linux
      variants (Ubuntu, Debian), bind_address is set to 127.0.0.1. References: 1.
      https://mariadb.com/kb/en/server-system-variables/#bind_address
    compliance:
      - cis_mariadb_10_6_v1_1_0_2_9

  - rule_id: mariadb.cis.2.limit_accepted_transport_layer_security_tls
    title: "Limit Accepted Transport Layer Security (TLS) Versions"
    severity: medium
    automation_type: automated
    cis_control: '2.10'
    cis_section: '2'
    profile_applicability: "Level 2"
    scope: mariadb.section_2.limit_accepted_transport_layer_security_tls
    assertion:
      field: version
      operator: equals
      expected: "true"
    remediation: >
      Set the version(s) of TLS you wish to accept by setting the tls_version option
      to a comma-separated (no whitespace) string in MariaDB configuration files.
      For example, to only accept TLS 1.2 or 1.3 connections, set tls_version
      likeso: tls_version=TLSv1.2,TLSv1.3 Note: with this setting, only clients that
      support the specified TLS version(s) are able to establish an encrypted
      connection to the server. Default Value: TLSv1.1,TLSv1.2,TLSv1.3 References:
      1. https://mariadb.com/kb/en/secure-connections-overview/ 2.
      https://mariadb.com/kb/en/ssltls-system-variables/#tls_version
    compliance:
      - cis_mariadb_10_6_v1_1_0_2_10

  - rule_id: mariadb.cis.2.require_client_side_certificates_x_509
    title: "Require Client-Side Certificates (X.509)"
    severity: medium
    automation_type: automated
    cis_control: '2.11'
    cis_section: '2'
    profile_applicability: "Level 2"
    scope: mariadb.section_2.require_client_side_certificates_x_509
    assertion:
      field: value
      operator: equals
      expected: "true"
    remediation: >
      Create or Alter users using the REQUIRE X509. For example: CREATE USER
      'newuser2'@'%' IDENTIFIED BY <password> require x509; For accounts created
      with a REQUIRE X509 clause, clients must specify at least --ssl- cert and
      --ssl-key. In addition, --ssl-ca (or --ssl-capath) is recommended so that the
      public certificate provided by the server can be verified. For example: mysql
      --ssl-ca=ca.pem \ --ssl-cert=client-cert.pem \ --ssl-key=client-key.pem
      References: 1. https://mariadb.com/kb/en/certificate-creation-with-openssl/
      Additional Information: The audit procedure excludes these internal user
      accounts from evaluation because, by default, they are created with an invalid
      password and/or are locked to disallow access. • ‘mysql’@’localhost’ •
      ‘root’@’localhost’ • ‘mariadb.sys’@’localhost’
    compliance:
      - cis_mariadb_10_6_v1_1_0_2_11

  - rule_id: mariadb.cis.2.only_approved_ciphers_are_used
    title: "Ensure Only Approved Ciphers are Used"
    severity: medium
    automation_type: automated
    cis_control: '2.12'
    cis_section: '2'
    profile_applicability: "Level 2"
    scope: mariadb.section_2.only_approved_ciphers_are_used
    assertion:
      field: port
      operator: equals
      expected: "true"
    remediation: >
      Set ssl_cipher to one or more approved cipher suites in your MariaDB
      configuration file, then restart MariaDB. For example, set: ssl_cipher='ECDHE-
      ECDSA-AES128-GCM-SHA256' Default Value: None References: 1.
      https://mariadb.com/kb/en/ssltls-system-variables/#ssl_cipher 2.
      https://mariadb.com/kb/en/secure-connections-overview/ Additional Information:
      The ssl_cipher option implies the ssl option, so you must have SSL/TLS setup
      to utilize this option. ssl_cipher is not a dynamic variable, so it cannot be
      set once MariaDB is running.
    compliance:
      - cis_mariadb_10_6_v1_1_0_2_12

  - rule_id: mariadb.cis.2.mariadb_is_bound_to_one_or_more_specific_ip
    title: "Ensure MariaDB is Bound to One or More Specific IP Addresses"
    severity: medium
    automation_type: automated
    cis_control: '2.9'
    cis_section: '2'
    profile_applicability: "Level 2"
    scope: mariadb.section_2.mariadb_is_bound_to_one_or_more_specific_ip
    assertion:
      field: row_count
      operator: equals
      expected: "true"
    remediation: >
      For example, to have the MariaDB server only accept connections on a specific
      IPv4 address, add an entry similar to this under the [mysqld] option group in
      MariaDB configuration files: bind_address=192.0.2.24 This setting typically
      appears in /etc/mysql/mariadb.conf.d/50-server.cnf. In the case above, clients
      can connect to the server using --host=192.0.2.24. Connections on other server
      host addresses are not permitted. To listen on multiple IP addresses, use a
      comma separated list for this option. For example:
      bind_address=192.0.2.24,10.1.3.100 configures MariaDB to listen on both
      192.0.2.24 and 10.1.3.100. Default Value: Not set. On some linux variants
      (Ubuntu, Debian), bind_address is set to 127.0.0.1. References: 1.
      https://mariadb.com/kb/en/server-system-variables/#bind_address
    compliance:
      - cis_mariadb_10_11_v1_0_0_2_9


