tech_type: mongodb
category: database
cis_benchmark: CIS MongoDB 7 v1.0.0
cis_section: '5'

rules:

  - rule_id: mongodb.cis.5.logging_captures_as_much_information_as_possible
    title: "Ensure that logging captures as much information as possible"
    severity: medium
    automation_type: automated
    cis_control: '5.3'
    cis_section: '5'
    profile_applicability: "Level 2"
    scope: mongodb.section_5.logging_captures_as_much_information_as_possible
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      Set `SystemLog: quiet: false` to false in the /etc/mongod.conf file to disable
      it. References: 1. https://docs.mongodb.com/manual/reference/configuration-
      options/#systemLog.quiet
    compliance:
      - cis_mongodb_7_v1_0_0_5_3

  - rule_id: mongodb.cis.5.new_entries_are_appended_to_the_end_of_the_log
    title: "Ensure that new entries are appended to the end of the log file"
    severity: medium
    automation_type: automated
    cis_control: '5.4'
    cis_section: '5'
    profile_applicability: "Level 2"
    scope: mongodb.section_5.new_entries_are_appended_to_the_end_of_the_log
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      Set `systemLog: logAppend: true` to true in the /etc/mongod.conf file.
      References: 1. https://docs.mongodb.com/manual/reference/configuration-
      options/#systemLog.logAppend
    compliance:
      - cis_mongodb_7_v1_0_0_5_4


