tech_type: mongodb
category: database
cis_benchmark: CIS MongoDB 7 v1.0.0
cis_section: '6'

rules:

  - rule_id: mongodb.cis.6.mongodb_uses_a_non_default_port
    title: "Ensure that MongoDB uses a non-default port"
    severity: high
    automation_type: automated
    cis_control: '6.1'
    cis_section: '6'
    profile_applicability: "Level 1"
    scope: mongodb.section_6.mongodb_uses_a_non_default_port
    assertion:
      field: port
      operator: equals
      expected: "on"
    remediation: >
      Change the port for MongoDB server to a number other than 27017. In
      mongod.conf edit the below lines # network interfaces net: port: $Orginasation
      Defined port bindIp: $Orginasation Defined IP References: 1.
      https://docs.mongodb.com/v5.0/reference/default-mongodb-port/
    compliance:
      - cis_mongodb_7_v1_0_0_6_1


