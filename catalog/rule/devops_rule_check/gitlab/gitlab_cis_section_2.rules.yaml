tech_type: gitlab
category: devops
cis_benchmark: CIS GitLab v1.0.1
cis_section: '2'

rules:

  - rule_id: gitlab.cis.2.scanners_are_in_place_to_identify_and_prevent
    title: "Ensure scanners are in place to identify and prevent sensitive data in pipeline files"
    severity: medium
    automation_type: automated
    cis_control: '2.3.8'
    cis_section: '2'
    profile_applicability: "Level 2"
    scope: gitlab.section_2.scanners_are_in_place_to_identify_and_prevent
    assertion:
      field: value
      operator: equals
      expected: "on"
    remediation: >
      For every pipeline that is in use, set scanners that will identify and prevent
      sensitive data within it. • On the left sidebar, select Search or go to and
      find your project. • Select Build > Pipeline editor. • Copy and paste the
      following to the bottom of the .gitlab-ci.yml file. If an include line already
      exists, add only the template line below it. include: - template: Jobs/Secret-
      Detection.gitlab-ci.yml • Select the Validate tab, then select Validate
      pipeline. The message Simulation completed successfully indicates the file is
      valid. • Select the Edit tab. • Optional. In the Commit message text box,
      customize the commit message. In the Branch text box, enter the name of the
      default branch. • Select Commit changes. References: 1.
      https://docs.gitlab.com/ee/user/application_security/secret_detection/
    compliance:
      - cis_gitlab_v1_0_1_2_3_8


