# TOMCAT — CIEM Detection Rules
# Real-time authentication & access event analysis
# Log source: catalina.out, access_log

tech_type: tomcat
category: web_server
log_source: catalina.out, access_log

rules:

  - rule_id: tciem.tomcat.restrict_access_to_the_web_administration
    title: "Restrict access to the web administration application"
    severity: medium
    mitre_technique: T1078
    mitre_tactic: initial_access
    cis_control: '10.2'
    cis_section: '10'
    log_source: "catalina.out, access_log"
    detection:
      event_type: resource_access
      filters:
        account_type: human
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      

  - rule_id: tciem.tomcat.do_not_run_applications_as_privileged
    title: "Do not run applications as privileged"
    severity: medium
    mitre_technique: T1068
    mitre_tactic: privilege_escalation
    cis_control: '10.13'
    cis_section: '10'
    log_source: "catalina.out, access_log"
    detection:
      event_type: privilege_change
      filters:
        action_in: [GRANT, ROLE_ADD, ELEVATION, SUDO]
        target_privilege_in: [admin, superuser, root, dba, wheel]
      evidence_fields: [source_ip, username, timestamp, action]
    response: alert
    remediation: >
      Set the privileged attribute in all context.xml files to false unless it is
      required as for the manager application: <Context ... privileged=”false” />
      Default Value: By default, privileged has a value of false. References: 1.
      https://tomcat.apache.org/tomcat-9.0-doc/config/context.html CIS Controls:

