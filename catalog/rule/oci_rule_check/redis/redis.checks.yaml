version: '1.0'
provider: oci
service: redis
checks:
- rule_id: oci.redis.cluster.backup_retention
  for_each: oci.redis.list_redis_clusters
  severity: MEDIUM
  conditions:
    var: item.backup_retention
    op: exists
    value: null
- rule_id: oci.redis.cluster.cluster_in_transit_encryption_enabled
  for_each: oci.redis.list_redis_clusters
  severity: HIGH
  conditions:
    var: item.is_in_transit_encryption_enabled
    op: is_true
    value: null
- rule_id: oci.redis.cluster.redis_cluster_automatic_failover_enabled
  for_each: oci.redis.list_redis_clusters
  severity: LOW
  conditions:
    var: item.software_version
    op: exists
    value: null
- rule_id: oci.redis.cluster.redis_cluster_in_transit_encryption_enabled
  for_each: oci.redis.list_redis_clusters
  severity: HIGH
  conditions:
    var: item.in_transit_encryption_enabled
    op: is_true
    value: null
- rule_id: oci.redis.cluster.redis_cluster_multi_az_enabled
  for_each: oci.redis.list_redis_clusters
  severity: LOW
  conditions:
    var: item.node_count
    op: gt
    value: 1
- rule_id: oci.redis.cluster.redis_cluster_rest_encryption_enabled
  for_each: oci.redis.list_redis_clusters
  severity: HIGH
  conditions:
    var: item.rest_encryption_enabled
    op: is_true
    value: null
