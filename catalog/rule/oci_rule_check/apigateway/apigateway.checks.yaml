version: '1.0'
provider: oci
service: apigateway
checks:
- rule_id: oci.apigateway.api.api_endpoint_waf_attached
  for_each: oci.apigateway.list_gateways
  severity: LOW
  conditions:
    var: item.endpoint_type
    op: equals
    value: PUBLIC
- rule_id: oci.apigateway.api.api_key_rotation_policy_defined_required
  for_each: oci.apigateway.list_apis
  severity: HIGH
  conditions:
    var: item.specification_type
    op: equals
    value: API_KEY
- rule_id: oci.apigateway.api.api_key_scopes_least_privilege_required
  for_each: oci.apigateway.list_apis
  severity: HIGH
  conditions:
    all:
    - var: item.specification_type
      op: equals
      value: API_SPECIFICATION
    - var: item.specification.routes[].authentication.verificationPolicy.scopes
      op: not_contains
      value: '*'
- rule_id: oci.apigateway.api.api_security_rate_limiting_quota_limit_configured
  for_each: oci.apigateway.list_apis
  severity: LOW
  conditions:
    var: item.specification_type
    op: exists
    value: null
- rule_id: oci.apigateway.api.api_security_rate_limiting_stage_burst_limit_configured
  for_each: oci.apigateway.list_deployments
  severity: LOW
  conditions:
    var: item.specification.routes[].policies.rateLimiting.burstLimit
    op: exists
    value: null
- rule_id: oci.apigateway.api.api_security_rate_limiting_stage_limit_configured
  for_each: oci.apigateway.list_deployments
  severity: LOW
  conditions:
    var: item.specification.routes[].policies.rateLimiting.rateKey
    op: exists
    value: null
- rule_id: oci.apigateway.api.api_security_rate_limiting_stage_throttle_unbounded
  for_each: oci.apigateway.list_deployments
  severity: LOW
  conditions:
    var: item.specification.routes[].policies.rateLimiting.rateKey
    op: exists
    value: null
- rule_id: oci.apigateway.api.api_security_validation_request_body_size_limit_configured
  for_each: oci.apigateway.list_apis
  severity: LOW
  conditions:
    var: item.specification_type
    op: exists
    value: null
- rule_id: oci.apigateway.api.dev_endpoint_encrypted
  for_each: oci.apigateway.list_gateways
  severity: MEDIUM
  conditions:
    var: item.endpoint_type
    op: not_equals
    value: PUBLIC
- rule_id: oci.apigateway.api.stage_usage_plan_for_api_keys_required
  for_each: oci.apigateway.list_deployments
  severity: HIGH
  conditions:
    var: item.specification.routes[].authentication.type
    op: equals
    value: CUSTOM_AUTHENTICATION
- rule_id: oci.apigateway.certificate.certificate_enabled
  for_each: oci.apigateway.list_gateways
  severity: MEDIUM
  conditions:
    var: item.certificates
    op: exists
    value: null
- rule_id: oci.apigateway.gateway.api_access_logging_enabled
  for_each: oci.apigateway.list_gateways
  severity: MEDIUM
  conditions:
    var: item.access_logging_policy.is_enabled
    op: is_true
    value: null
- rule_id: oci.apigateway.gateway.api_endpoint_authn_required
  for_each: oci.apigateway.list_apis
  severity: LOW
  conditions:
    var: item.specification.routes[].authentication.is_anonymous_access_allowed
    op: is_false
    value: null
- rule_id: oci.apigateway.gateway.api_endpoint_authz_policies_enforced
  for_each: oci.apigateway.list_apis
  severity: LOW
  conditions:
    var: item.specification_type
    op: exists
    value: null
- rule_id: oci.apigateway.gateway.api_endpoint_private_networking_enforced
  for_each: oci.apigateway.list_gateways
  severity: MEDIUM
  conditions:
    var: item.endpoint_type
    op: equals
    value: PRIVATE
- rule_id: oci.apigateway.gateway.api_key_expiration_required
  for_each: oci.apigateway.list_gateways
  severity: HIGH
  conditions:
    var: item.ocid
    op: exists
    value: null
- rule_id: oci.apigateway.gateway.api_security_rate_limiting_usage_plan_keys
  for_each: oci.apigateway.list_gateways
  severity: HIGH
  conditions:
    all:
    - var: item.lifecycle_state
      op: equals
      value: ACTIVE
    - var: item.endpoint_type
      op: exists
      value: null
- rule_id: oci.apigateway.gateway.api_security_validation_content_type_whitelist_enforced
  for_each: oci.apigateway.list_apis
  severity: LOW
  conditions:
    var: item.specification_type
    op: equals
    value: OCI_API_SPECIFICATION
- rule_id: oci.apigateway.gateway.api_security_validation_parameters_enabled
  for_each: oci.apigateway.list_apis
  severity: LOW
  conditions:
    var: item.specification_type
    op: exists
    value: null
- rule_id: oci.apigateway.gateway.api_security_validation_request_schema_enabled
  for_each: oci.apigateway.list_apis
  severity: LOW
  conditions:
    var: item.specification_type
    op: exists
    value: null
- rule_id: oci.apigateway.gateway.api_security_validation_required_headers_enforced
  for_each: oci.apigateway.list_apis
  severity: LOW
  conditions:
    var: item.specification_type
    op: exists
    value: null
- rule_id: oci.apigateway.gateway.api_security_validation_response_schema_enabled
  for_each: oci.apigateway.list_apis
  severity: LOW
  conditions:
    var: item.specification_type
    op: exists
    value: null
- rule_id: oci.apigateway.gateway.authorizer_cache_ttl_configured
  for_each: oci.apigateway.list_gateways
  severity: LOW
  conditions:
    var: item.authorization_cache_ttl_in_seconds
    op: exists
    value: null
- rule_id: oci.apigateway.gateway.authorizer_tls_min_1_2_enforced
  for_each: oci.apigateway.list_gateways
  severity: MEDIUM
  conditions:
    var: item.endpoint_type
    op: in
    value:
    - PUBLIC
    - PRIVATE
- rule_id: oci.apigateway.gateway.authorizer_token_audience_restriction_enforced
  for_each: oci.apigateway.list_gateways
  severity: LOW
  conditions:
    var: item.ocid
    op: exists
    value: null
- rule_id: oci.apigateway.gateway.dev_endpoint_no_public_access_blocked
  for_each: oci.apigateway.list_gateways
  severity: CRITICAL
  conditions:
    all:
    - var: item.endpoint_type
      op: equals
      value: PUBLIC
    - var: item.freeform_tags.DevEndpoint
      op: not_equals
      value: 'true'
- rule_id: oci.apigateway.gateway.dev_endpoint_role_least_privilege_required
  for_each: oci.apigateway.list_gateways
  severity: HIGH
  conditions:
    var: item.endpoint_type
    op: not_equals
    value: PUBLIC
- rule_id: oci.apigateway.gateway.field_level_logging_enabled
  for_each: oci.apigateway.list_gateways
  severity: MEDIUM
  conditions:
    var: item.field_level_logging_enabled
    op: is_true
    value: null
- rule_id: oci.apigateway.gateway.gateway_api_https_required
  for_each: oci.apigateway.list_gateways
  severity: LOW
  conditions:
    var: item.endpoint_type
    op: equals
    value: PUBLIC
- rule_id: oci.apigateway.gateway.gateway_authorization_enabled
  for_each: oci.apigateway.list_gateways
  severity: MEDIUM
  conditions:
    var: item.endpoint_type
    op: equals
    value: PUBLIC
- rule_id: oci.apigateway.gateway.gateway_client_certificate_enabled
  for_each: oci.apigateway.list_gateways
  severity: MEDIUM
  conditions:
    var: item.certificates
    op: exists
    value: null
- rule_id: oci.apigateway.gateway.gateway_restapi_client_certificate_enabled
  for_each: oci.apigateway.list_gateways
  severity: MEDIUM
  conditions:
    var: item.endpoint_type
    op: equals
    value: PUBLIC
- rule_id: oci.apigateway.gateway.gateway_restapi_logging_enabled
  for_each: oci.apigateway.list_gateways
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
    op: is_true
    value: null
- rule_id: oci.apigateway.gateway.gateway_restapi_tracing_enabled
  for_each: oci.apigateway.list_gateways
  severity: LOW
  conditions:
    var: item.tracing_config.is_enabled
    op: is_true
    value: null
- rule_id: oci.apigateway.gateway.gateway_restapi_waf_acl_attached
  for_each: oci.apigateway.list_gateways
  severity: LOW
  conditions:
    var: item.ocid
    op: exists
    value: null
- rule_id: oci.apigateway.gateway.restapi_cache_encrypted
  for_each: oci.apigateway.list_gateways
  severity: MEDIUM
  conditions:
    var: item.specification.response_cache_details.is_private_response_cache
    op: is_true
    value: null
- rule_id: oci.apigateway.gateway.restapi_client_certificate_enabled
  for_each: oci.apigateway.list_gateways
  severity: MEDIUM
  conditions:
    var: item.endpoint_type
    op: equals
    value: PUBLIC
- rule_id: oci.apigateway.gateway.restapi_logging_enabled
  for_each: oci.apigateway.list_gateways
  severity: MEDIUM
  conditions:
    var: item.ocid
    op: exists
    value: null
- rule_id: oci.apigateway.gateway.restapi_public
  for_each: oci.apigateway.list_gateways
  severity: CRITICAL
  conditions:
    var: item.endpoint_type
    op: not_equals
    value: PUBLIC
- rule_id: oci.apigateway.gateway.stage_logging_enabled
  for_each: oci.apigateway.list_gateways
  severity: MEDIUM
  conditions:
    var: item.stage_logging_enabled
    op: is_true
    value: null
- rule_id: oci.apigateway.gateway.stage_throttling_enabled
  for_each: oci.apigateway.list_gateways
  severity: LOW
  conditions:
    var: item.stage_throttling_enabled
    op: is_true
    value: null
- rule_id: oci.apigateway.gateway.usage_plan_quota_limits_configured
  for_each: oci.apigateway.list_gateways
  severity: LOW
  conditions:
    var: item.usage_plans[].quotas[]
    op: not_empty
    value: null
- rule_id: oci.apigateway.gateway.usage_plan_rate_limits_configured
  for_each: oci.apigateway.list_gateways
  severity: LOW
  conditions:
    var: item.usage_plans
    op: not_empty
    value: null
