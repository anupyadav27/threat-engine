version: '1.0'
provider: oci
service: compute
checks:
- rule_id: oci.compute.config_file.permissions_configured
  for_each: oci.compute.get_app_catalog_listing
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.compute.image.signature_validation_enabled
  for_each: oci.compute.list_compute_global_image_capability_schema_versions
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.compute.instance.agent_installed_configured
  for_each: oci.compute.list_compute_capacity_reservation_instance_shapes
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.compute.instance.backup_policy_configured
  for_each: oci.compute.list_compute_capacity_reservation_instance_shapes
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.compute.instance.baseline_image_configured
  for_each: oci.compute.list_compute_capacity_reservation_instance_shapes
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.compute.instance.disaster_recovery_enabled
  for_each: oci.compute.list_compute_capacity_reservation_instance_shapes
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.compute.instance.fault_domain_configured
  for_each: oci.compute.list_compute_capacity_reservation_instance_shapes
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.compute.instance.image_scan_enabled
  for_each: oci.compute.list_compute_capacity_reservation_instance_shapes
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.compute.instance.inventory_enabled
  for_each: oci.compute.list_compute_capacity_reservation_instance_shapes
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.compute.instance.maintenance_behavior_configured
  for_each: oci.compute.list_instance_maintenance_events
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.compute.instance.maintenance_policy_configured
  for_each: oci.compute.list_instance_maintenance_events
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.compute.instance.management_agent_configured
  for_each: oci.compute.list_compute_capacity_reservation_instance_shapes
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.compute.instance.namespace_configured
  for_each: oci.compute.list_compute_capacity_reservation_instance_shapes
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.compute.instance.recovery_attributes_configured
  for_each: oci.compute.list_compute_capacity_reservation_instance_shapes
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.compute.instance.required_tags_configured
  for_each: oci.compute.list_compute_capacity_reservation_instance_shapes
  severity: MEDIUM
  conditions:
    var: item.freeform_tags
    op: is_true
- rule_id: oci.compute.instance.source_details_configured
  for_each: oci.compute.list_compute_capacity_reservation_instance_shapes
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.compute.instance.time_sync_configured
  for_each: oci.compute.list_compute_capacity_reservation_instance_shapes
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.functions.function.dynamic_group_least_privilege_enforced
  for_each: oci.functions.get_pbf_listing
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
