- rule_id: oci.virtual_network.security_list.sg_no_0_ingress_on_db_ports
  for_each: oci.virtual_network.list_security_lists
  severity: LOW
  conditions:
    all:
    - var: item.ingress_security_rules[].source
      op: not_contains
      value: 0.0.0.0/0
    - var: item.ingress_security_rules[].tcp_options.destination_port_range.min
      op: not_in
      value:
      - 1521
      - 1522
      - 1523
      - 1524
      - 1525
      - 1526
      - 1527
      - 1528
      - 1529
      - 1530
      - 3306
      - 1433
      - 5432
      - 27017
      - 6379
    - var: item.ingress_security_rules[].tcp_options.destination_port_range.max
      op: not_in
      value:
      - 1521
      - 1522
      - 1523
      - 1524
      - 1525
      - 1526
      - 1527
      - 1528
      - 1529
      - 1530
      - 3306
      - 1433
      - 5432
      - 27017
      - 6379
