- rule_id: oci.virtual_network.security_list.nacl_no_allow_all_rules
  for_each: oci.virtual_network.list_security_lists
  severity: LOW
  conditions:
    all:
    - var: item.ingress_security_rules
      op: not_empty
      value: null
    - all:
      - var: item.ingress_security_rules[].source
        op: not_equals
        value: 0.0.0.0/0
      - var: item.ingress_security_rules[].source
        op: not_equals
        value: ::/0
