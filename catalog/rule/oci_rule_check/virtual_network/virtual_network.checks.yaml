  for_each: oci.virtual_network.list_security_lists
  severity: MEDIUM
  conditions:
    all:
    - var: item.name
      op: contains
      value: quarantine
    - var: item.name
      op: contains
      value: isolation
- rule_id: oci.virtual_network.security_list.microseg_endpoint_policies_applied
  for_each: oci.virtual_network.list_security_lists
  severity: LOW
