version: '1.0'
provider: oci
service: virtual_network
checks:
- rule_id: oci.virtual_network.ip_sec_connection.vpn_tunnel_health_monitoring_enabled
  for_each: oci.virtual_network.list_ip_sec_connections
  severity: MEDIUM
  conditions:
    var: item.tunnels[].bgpSessionInfo.bgpState
    op: not_equals
    value: DOWN
- rule_id: oci.virtual_network.route_table.route_table_vpc_endpoints_used_for_supported
  for_each: oci.virtual_network.list_route_tables
  severity: LOW
  conditions:
    var: item.route_rules[].network_entity_id
    op: contains
    value: ocid1.servicegateway
- rule_id: oci.virtual_network.route_table.vpc_route_tables_no_unintended_internet_paths
  for_each: oci.virtual_network.list_internet_gateways
  severity: LOW
  conditions:
    var: item.lifecycle_state
    op: not_equals
    value: ACTIVE
- rule_id: oci.virtual_network.security_list.access_control_no_permit_all_restricted
  for_each: oci.virtual_network.list_security_lists
  severity: MEDIUM
  conditions:
    all:
    - var: item.ingress_security_rules[].source
      op: not_contains
      value: 0.0.0.0/0
    - var: item.egress_security_rules[].destination
      op: not_contains
      value: 0.0.0.0/0
- rule_id: oci.virtual_network.security_list.access_control_policies_present_restricted
  for_each: oci.virtual_network.list_security_lists
  severity: MEDIUM
  conditions:
    all:
    - var: item.ingress_security_rules[].source
      op: not_contains
      value: 0.0.0.0/0
    - var: item.egress_security_rules[].destination
      op: not_contains
      value: 0.0.0.0/0
- rule_id: oci.virtual_network.security_list.cgw_ip_addresses_valid_and_owned
  for_each: oci.virtual_network.list_security_lists
  severity: LOW
  conditions:
    all:
    - var: item.ingress_security_rules[].source
      op: not_contains
      value: 0.0.0.0/0
    - var: item.ingress_security_rules[].source
      op: not_contains
      value: ::/0
- rule_id: oci.virtual_network.security_list.cgw_no_public_management_interfaces_exposed_blocked
  for_each: oci.virtual_network.list_security_lists
  severity: CRITICAL
  conditions:
    all:
    - var: item.ingress_security_rules[].source
      op: not_contains
      value: 0.0.0.0/0
    - var: item.ingress_security_rules[].source
      op: not_contains
      value: ::/0
- rule_id: oci.virtual_network.security_list.endpoint_policy_least_privilege_required
  for_each: oci.virtual_network.list_security_lists
  severity: HIGH
  conditions:
    all:
    - var: item.ingress_security_rules[].source
      op: not_contains
      value: 0.0.0.0/0
    - var: item.egress_security_rules[].destination
      op: not_contains
      value: 0.0.0.0/0
- rule_id: oci.virtual_network.security_list.eni_security_groups_present
  for_each: oci.virtual_network.list_security_lists
  severity: LOW
  conditions:
    var: item.ingress_security_rules
    op: not_empty
    value: null
- rule_id: oci.virtual_network.security_list.eni_security_groups_restrictive
  for_each: oci.virtual_network.list_security_lists
