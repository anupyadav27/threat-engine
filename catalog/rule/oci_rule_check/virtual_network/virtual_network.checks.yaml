- rule_id: oci.virtual_network.vcn.encryption_tls_min_1_2_enforced
  for_each: oci.virtual_network.list_security_lists
  severity: HIGH
  conditions:
    all:
    - var: item.ingress_security_rules
      op: exists
      value: null
    - var: item.ingress_security_rules[].tcp_options.destination_port_range.max
      op: gte
      value: 443
    - var: item.ingress_security_rules[].tcp_options.destination_port_range.min
      op: lte
      value: 443
    - var: item.ingress_security_rules[].tls_version
      op: exists
      value: null
    - var: item.ingress_security_rules[].tls_version.min
      op: gte
      value: 1.2
