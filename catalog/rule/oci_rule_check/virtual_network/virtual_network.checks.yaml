  for_each: oci.virtual_network.list_security_lists
  severity: LOW
  conditions:
    var: item.egress_security_rules[].destination
    op: not_contains
    value: 0.0.0.0/0
- rule_id: oci.virtual_network.security_list.sg_ingress_no_0
  for_each: oci.virtual_network.list_security_lists
  severity: LOW
  conditions:
    all:
    - var: item.ingress_security_rules[].source
      op: not_contains
      value: 0.0.0.0/0
- rule_id: oci.virtual_network.security_list.sg_no_0_ingress
  for_each: oci.virtual_network.list_security_lists
  severity: LOW
  conditions:
    var: item.ingress_security_rules
    op: is_empty
