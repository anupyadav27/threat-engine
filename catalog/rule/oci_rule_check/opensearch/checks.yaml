version: '1.0'
provider: oci
service: opensearch
checks:
- rule_id: oci.opensearch.service.domains_access_control_enabled
  for_each: oci.opensearch.list_opensearch_cluster_pipelines
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.opensearch.service.domains_encryption_at_rest_enabled
  for_each: oci.opensearch.list_opensearch_cluster_pipelines
  severity: MEDIUM
  conditions:
    all:
    - var: item.status
      op: not_empty
      value: null
    - var: item.kms_key_id
      op: exists
      value: null
- rule_id: oci.opensearch.service.domains_fault_tolerant_data_nodes_configured
  for_each: oci.opensearch.list_opensearch_cluster_pipelines
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.opensearch.service.domains_fault_tolerant_master_nodes_configured
  for_each: oci.opensearch.list_opensearch_cluster_pipelines
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.opensearch.service.domains_https_communications_enforced
  for_each: oci.opensearch.list_opensearch_cluster_pipelines
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.opensearch.service.domains_monitoring_logging_enabled
  for_each: oci.opensearch.list_opensearch_cluster_pipelines
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.opensearch.service.domains_node_to_node_encryption_enabled
  for_each: oci.opensearch.list_opensearch_cluster_pipelines
  severity: MEDIUM
  conditions:
    all:
    - var: item.status
      op: not_empty
      value: null
    - var: item.kms_key_id
      op: exists
      value: null
