version: '1.0'
provider: oci
service: cloudguard
checks:
- rule_id: oci.cloudguard.detector_recipe.enabled
  for_each: oci.cloud_guard.list_target_detector_recipe_detector_rules
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.cloudguard.target.enabled
  for_each: oci.cloud_guard.list_target_detector_recipe_detector_rules
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
