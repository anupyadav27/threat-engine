  for_each: oci.object_storage.list_buckets
  severity: LOW
  conditions:
    all:
    - var: item.policy_statements[].actions[]
      op: not_contains
      value: '*'
    - var: item.policy_statements[].principals[]
      op: not_contains
      value: '*'
