    - var: item.public_access_type
      op: not_equals
      value: ObjectRead
    - var: item.public_access_type
      op: not_equals
      value: ObjectReadWithoutList
    - var: item.public_access_type
      op: not_equals
      value: ObjectReadWrite
- rule_id: oci.object_storage.bucket.bucket_policy_deny_insecure_transport
  for_each: oci.object_storage.list_buckets
  severity: LOW
