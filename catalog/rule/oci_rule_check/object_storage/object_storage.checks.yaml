version: '1.0'
provider: oci
service: object_storage
checks:
- rule_id: oci.object_storage.bucket.ai_dataset_encrypted_at_rest_cmek
  for_each: oci.object_storage.list_buckets
  severity: MEDIUM
  conditions:
    var: item.kms_key_id
    op: exists
    value: null
- rule_id: oci.object_storage.bucket.ai_dataset_public_access_blocked_blocked
  for_each: oci.object_storage.list_buckets
  severity: CRITICAL
  conditions:
    var: item.public_access_type
    op: not_equals
    value: ObjectRead
- rule_id: oci.object_storage.bucket.ai_services_dataset_access_logging_enabled
  for_each: oci.object_storage.list_buckets
  severity: MEDIUM
  conditions:
    var: item.ai_services_dataset_access_logging_enabled
    op: is_true
    value: null
- rule_id: oci.object_storage.bucket.ai_services_dataset_lifecycle_policy_configured
  for_each: oci.object_storage.list_buckets
  severity: LOW
  conditions:
    var: item.freeform_tags.ai_services_dataset_lifecycle_policy
