    value: null
- rule_id: oci.database.autonomous_database.automation_artifacts_encrypted_and_private
  for_each: oci.database.list_autonomous_databases
  severity: MEDIUM
  conditions:
    all:
    - var: item.automation_artifacts_encrypted
      op: is_true
      value: null
    - var: item.automation_artifacts_private
      op: is_true
      value: null
