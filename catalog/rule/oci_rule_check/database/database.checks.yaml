version: '1.0'
provider: oci
service: database
checks:
- rule_id: oci.database.autonomous_database.account_firewall_use_selected_networks
  for_each: oci.database.list_autonomous_databases
  severity: MEDIUM
  conditions:
    var: item.are_only_whitelisted_ips_used
    op: is_true
    value: null
- rule_id: oci.database.autonomous_database.account_use_private_endpoints
  for_each: oci.database.list_autonomous_databases
  severity: LOW
  conditions:
    var: item.nsg_ids
    op: not_empty
    value: null
- rule_id: oci.database.autonomous_database.auditing_retention_90_days
  for_each: oci.database.list_autonomous_databases
  severity: MEDIUM
  conditions:
    all:
    - var: item.audit_configuration.audit_retention_period_in_days
      op: gte
      value: '90'
    - var: item.audit_configuration.is_audit_enabled
      op: is_true
      value: null
- rule_id: oci.database.autonomous_database.aurora_backup_enabled
  for_each: oci.database.list_autonomous_databases
  severity: MEDIUM
  conditions:
    var: item.aurora_backup_enabled
