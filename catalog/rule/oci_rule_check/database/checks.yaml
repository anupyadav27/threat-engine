version: '1.0'
provider: oci
service: database
checks:
- rule_id: oci.database.connection.credentials_in_vault_configured
  for_each: oci.database.list_console_connections
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.database.autonomous_database.automatic_upgrades_enabled
  for_each: oci.database.list_autonomous_database_backups
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.database.autonomous_database.maintenance_window_configured
  for_each: oci.database.list_autonomous_database_backups
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
