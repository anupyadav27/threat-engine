version: '1.0'
provider: oci
service: nosql
checks:
- rule_id: oci.nosql.table.accelerator_cluster_encryption_enabled
  for_each: oci.nosql.list_work_request_logs
  severity: HIGH
  conditions:
    var: item.lifecycle_state
    op: equals
    value: ACTIVE
- rule_id: oci.nosql.table.accelerator_cluster_in_transit_encryption_enabled
  for_each: oci.nosql.list_work_request_logs
  severity: HIGH
  conditions:
    var: item.lifecycle_state
    op: equals
    value: ACTIVE
- rule_id: oci.nosql.table.accelerator_cluster_multi_az
  for_each: oci.nosql.list_work_request_logs
  severity: LOW
  conditions:
    var: item.lifecycle_state
    op: equals
    value: ACTIVE
- rule_id: oci.nosql.table.autoscaling_enabled
  for_each: oci.nosql.list_work_request_logs
  severity: LOW
  conditions:
    var: item.autoscaling_enabled
    op: exists
    value: null
- rule_id: oci.nosql.table.backup_enabled
  for_each: oci.nosql.list_work_request_logs
  severity: MEDIUM
  conditions:
    var: item.lifecycle_state
    op: equals
    value: ACTIVE
- rule_id: oci.nosql.table.cluster_in_transit_encryption_enabled
  for_each: oci.nosql.list_work_request_logs
  severity: HIGH
  conditions:
    var: item.cluster_in_transit_encryption_enabled
    op: is_true
    value: null
- rule_id: oci.nosql.table.cluster_monitoring_log_export
  for_each: oci.nosql.list_work_request_logs
  severity: MEDIUM
  conditions:
    var: item.lifecycle_state
    op: equals
    value: ACTIVE
- rule_id: oci.nosql.table.cluster_multi_az_enabled
  for_each: oci.nosql.list_work_request_logs
  severity: LOW
  conditions:
    all:
    - var: item.lifecycle_state
      op: equals
      value: ACTIVE
    - var: item.freeform_tags.Environment
      op: exists
      value: null
- rule_id: oci.nosql.table.cluster_storage_encrypted
  for_each: oci.nosql.list_work_request_logs
  severity: MEDIUM
  conditions:
    var: item.lifecycle_state
    op: equals
    value: ACTIVE
- rule_id: oci.nosql.table.encryption_enabled
  for_each: oci.nosql.list_work_request_logs
  severity: HIGH
  conditions:
    var: item.encryption_enabled
    op: is_true
    value: null
- rule_id: oci.nosql.table.global_table_cross_region_replication_encrypted
  for_each: oci.nosql.list_work_request_logs
  severity: MEDIUM
  conditions:
    var: item.lifecycle_state
    op: equals
    value: ACTIVE
- rule_id: oci.nosql.table.global_table_encryption_all_regions_enabled
  for_each: oci.nosql.list_work_request_logs
  severity: HIGH
  conditions:
    var: item.lifecycle_state
    op: equals
    value: ACTIVE
- rule_id: oci.nosql.table.global_table_pitr_enabled
  for_each: oci.nosql.list_work_request_logs
  severity: LOW
  conditions:
    var: item.lifecycle_state
    op: equals
    value: ACTIVE
- rule_id: oci.nosql.table.global_tables_enabled
  for_each: oci.nosql.list_work_request_logs
  severity: LOW
  conditions:
    var: item.lifecycle_state
    op: equals
    value: ACTIVE
- rule_id: oci.nosql.table.pitr_enabled
  for_each: oci.nosql.list_work_request_logs
  severity: LOW
  conditions:
    var: item.lifecycle_state
    op: equals
    value: ACTIVE
- rule_id: oci.nosql.table.table_encryption_enabled
  for_each: oci.nosql.list_tables
  severity: HIGH
  conditions:
    var: item.table_limits.max_read_units
    op: exists
    value: null
- rule_id: oci.nosql.table.table_private_network_only_where_supported_enforced
  for_each: oci.nosql.list_work_request_logs
  severity: MEDIUM
  conditions:
    all:
    - var: item.lifecycle_state
      op: equals
      value: ACTIVE
    - var: item.freeform_tags.Environment
      op: exists
      value: null
- rule_id: oci.nosql.table.table_protected_by_backup_plan
  for_each: oci.nosql.list_work_request_logs
  severity: MEDIUM
  conditions:
    var: item.lifecycle_state
    op: equals
    value: ACTIVE
- rule_id: oci.nosql.table.table_rbac_least_privilege_required
  for_each: oci.nosql.list_work_request_logs
  severity: HIGH
  conditions:
    var: item.lifecycle_state
    op: equals
    value: ACTIVE
- rule_id: oci.nosql.table.tables_kms_cmk_encryption_enabled
  for_each: oci.nosql.list_work_request_logs
  severity: HIGH
  conditions:
    all:
    - var: item.lifecycle_state
      op: equals
      value: ACTIVE
    - var: item.freeform_tags.Environment
      op: exists
      value: null
    - var: item.defined_tags.Environment
      op: exists
      value: null
- rule_id: oci.nosql.table.tables_pitr_enabled
  for_each: oci.nosql.list_work_request_logs
  severity: LOW
  conditions:
    var: item.lifecycle_state
    op: equals
    value: ACTIVE
- rule_id: oci.nosql.table.tables_vault_cmk_encryption_enabled
  for_each: oci.nosql.list_work_request_logs
  severity: HIGH
  conditions:
    var: item.defined_tags.Environment
    op: exists
    value: null
