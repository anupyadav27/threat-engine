version: '1.0'
provider: oci
service: bds
checks:
- rule_id: oci.bds.bds_instance.cluster_account_public_block_enabled
  for_each: oci.bds.list_bds_instances
  severity: CRITICAL
  conditions:
    var: item.cluster_public_access_block_enabled
    op: is_true
    value: null
- rule_id: oci.bds.bds_instance.cluster_admin_access_least_privilege_required
  for_each: oci.bds.list_bds_instances
  severity: CRITICAL
  conditions:
    var: item.cluster_admin_password
    op: not_exists
    value: null
- rule_id: oci.bds.bds_instance.cluster_audit_logging_enabled
  for_each: oci.bds.list_bds_instances
  severity: MEDIUM
  conditions:
    var: item.cluster_audit_logging_enabled
    op: is_true
    value: null
- rule_id: oci.bds.bds_instance.cluster_encryption_cmek_enabled
  for_each: oci.bds.list_bds_instances
  severity: HIGH
  conditions:
    var: item.cluster_public_key
    op: exists
    value: null
- rule_id: oci.bds.bds_instance.cluster_master_nodes_no_public_ip
  for_each: oci.bds.list_bds_instances
  severity: CRITICAL
  conditions:
    var: item.cluster_master_nodes_no_public_ip
    op: is_true
    value: null
- rule_id: oci.bds.bds_instance.cluster_private_networking_enforced
  for_each: oci.bds.list_bds_instances
  severity: MEDIUM
  conditions:
    var: item.network_config.is_private
    op: is_true
    value: null
- rule_id: oci.bds.bds_instance.cluster_publicly_accesible
  for_each: oci.bds.list_bds_instances
  severity: CRITICAL
  conditions:
    all:
    - var: item.is_public
      op: is_false
      value: null
    - var: item.is_highly_available
      op: is_true
      value: null
- rule_id: oci.bds.bds_instance.cluster_tls_min_1_2_enforced
  for_each: oci.bds.list_bds_instances
  severity: MEDIUM
  conditions:
    var: item.cluster_version
    op: gte
    value: '1.2'
- rule_id: oci.bds.bds_instance.data_cluster_master_nodes_no_public_ip
  for_each: oci.bds.list_bds_instances
  severity: CRITICAL
  conditions:
    all:
    - var: item.nodes[].node_type
      op: equals
      value: MASTER
    - var: item.nodes[?node_type == 'MASTER'].subnet_id
      op: not_contains
      value: public
- rule_id: oci.bds.bds_instance.encrypted_with_cmks_disabled
  for_each: oci.bds.list_bds_instances
  severity: MEDIUM
  conditions:
    all:
    - var: item.clusterDetails.nodes[].nodeType
      op: not_contains
      value: ENCRYPTION_DISABLED
    - var: item.clusterDetails.encryptionKeyId
      op: exists
      value: null
