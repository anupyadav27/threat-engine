version: '1.0'
provider: oci
service: loadbalancer
checks:
- rule_id: oci.loadbalancer.policy.failover_configured
  for_each: oci.load_balancer.get_routing_policy
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.loadbalancer.listeners.tls_version_configured
  for_each: oci.load_balancer.list_backend_sets
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
