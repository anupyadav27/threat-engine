  severity: MEDIUM
  conditions:
    var: item.lifecycle_state
    op: equals
    value: ACTIVE
- rule_id: oci.audit.configuration.storage_dataevents_read_enabled
  for_each: oci.audit.get_configuration
  severity: MEDIUM
  conditions:
    var: item.lifecycle_state
    op: equals
    value: ACTIVE
- rule_id: oci.audit.configuration.storage_dataevents_write_enabled
  for_each: oci.audit.get_configuration
  severity: MEDIUM
