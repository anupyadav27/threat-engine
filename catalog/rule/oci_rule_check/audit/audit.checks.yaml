  severity: MEDIUM
  conditions:
    var: item.lifecycle_state
    op: equals
    value: ACTIVE
- rule_id: oci.audit.configuration.logs_s3_bucket_is_public_access_blocked
  for_each: oci.audit.get_configuration
  severity: CRITICAL
  conditions:
    var: item.lifecycle_state
    op: equals
    value: ACTIVE
- rule_id: oci.audit.configuration.monitoring_logging_enabled
