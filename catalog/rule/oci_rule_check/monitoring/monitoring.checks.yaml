version: '1.0'
provider: oci
service: monitoring
checks:
- rule_id: oci.monitoring.alarm.alarm_configured
  for_each: oci.monitoring.list_alarms
  severity: LOW
  conditions:
    var: item.lifecycle_state
    op: equals
    value: ACTIVE
- rule_id: oci.monitoring.alarm.alert_alarm_actions_enabled
  for_each: oci.monitoring.list_alarms
  severity: LOW
  conditions:
    var: item.is_enabled
    op: is_true
    value: null
- rule_id: oci.monitoring.alarm.alert_create_policy_assignment
  for_each: oci.monitoring.list_alarms
  severity: LOW
  conditions:
    var: item.lifecycle_state
    op: equals
    value: ACTIVE
- rule_id: oci.monitoring.alarm.alert_create_update_nsg
  for_each: oci.monitoring.list_alarms
  severity: LOW
  conditions:
    var: item.lifecycle_state
    op: equals
    value: ACTIVE
- rule_id: oci.monitoring.alarm.alert_create_update_public_ip_address_rule
  for_each: oci.monitoring.list_alarms
  severity: CRITICAL
  conditions:
    all:
    - var: item.lifecycle_state
      op: equals
      value: ACTIVE
    - var: item.metric_compartment_id_in_subtree
      op: is_true
      value: null
    - var: item.metric_compartment_id
      op: equals
      value: item.compartment_id
    - var: item.namespace
      op: equals
      value: oci_vcn
    - var: item.query
      op: contains
      value: publicIpAddress
    - var: item.message_format
      op: equals
      value: ONS_OPTIMIZED
    - var: item.destinations
      op: not_empty
      value: null
- rule_id: oci.monitoring.alarm.alert_create_update_security_solution
  for_each: oci.monitoring.list_alarms
  severity: LOW
  conditions:
    var: item.lifecycle_state
    op: equals
    value: ACTIVE
- rule_id: oci.monitoring.alarm.alert_create_update_sqlserver_fr
  for_each: oci.monitoring.list_alarms
  severity: LOW
  conditions:
    var: item.name
    op: contains
    value: sqlserver
- rule_id: oci.monitoring.alarm.alert_critical_alarms_enabled
  for_each: oci.monitoring.list_alarms
  severity: LOW
  conditions:
    var: item.lifecycle_state
    op: equals
    value: ACTIVE
- rule_id: oci.monitoring.alarm.alert_delete_nsg
  for_each: oci.monitoring.list_alarms
  severity: LOW
  conditions:
    all:
    - var: item.metric_compartment_id
      op: exists
      value: null
    - var: item.metric_compartment_id
      op: equals
      value: item.compartment_id
    - var: item.namespace
      op: equals
      value: oci_vcn
    - var: item.query
      op: contains
      value: NetworkSecurityGroupDeleted
- rule_id: oci.monitoring.alarm.alert_delete_policy_assignment
  for_each: oci.monitoring.list_alarms
  severity: LOW
  conditions:
    var: item.lifecycle_state
    op: equals
    value: ACTIVE
- rule_id: oci.monitoring.alarm.alert_delete_public_ip_address_rule
  for_each: oci.monitoring.list_alarms
  severity: CRITICAL
  conditions:
    all:
    - var: item.lifecycle_state
      op: equals
      value: ACTIVE
    - var: item.name
      op: contains
      value: delete_public_ip_address
- rule_id: oci.monitoring.alarm.alert_delete_security_solution
  for_each: oci.monitoring.list_alarms
  severity: LOW
  conditions:
    var: item.name
    op: contains
    value: delete
- rule_id: oci.monitoring.alarm.alert_delete_sqlserver_fr
  for_each: oci.monitoring.list_alarms
  severity: LOW
  conditions:
    var: item.name
    op: contains
    value: delete
- rule_id: oci.monitoring.alarm.alert_destinations_authenticated_enabled
  for_each: oci.monitoring.list_alarms
  severity: LOW
  conditions:
    var: item.destinations[].topicId
    op: exists
    value: null
- rule_id: oci.monitoring.alarm.api_security_monitoring_access_log_fields_restricted
  for_each: oci.monitoring.list_alarms
