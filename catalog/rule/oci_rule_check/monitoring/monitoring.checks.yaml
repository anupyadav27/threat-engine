- rule_id: oci.monitoring.alarm.config_delivery_destination_access_least_privilege_required
  for_each: oci.monitoring.list_alarms
  severity: HIGH
  conditions:
    all:
    - var: item.lifecycle_state
      op: equals
      value: ACTIVE
    - var: item.destinations[].type
      op: not_contains
      value: STREAMING
    - var: item.destinations[].type
      op: not_contains
      value: NOTIFICATIONS
- rule_id: oci.monitoring.alarm.config_delivery_kms_encryption_enabled
  for_each: oci.monitoring.list_alarms
  severity: HIGH
  conditions:
    var: item.config_delivery_kms_encryption_enabled
