  for_each: oci.monitoring.list_alarms
  severity: MEDIUM
  conditions:
    var: item.lifecycle_state
    op: equals
    value: ACTIVE
- rule_id: oci.monitoring.alarm.changes_to_vcns_alarm_configured
  for_each: oci.monitoring.list_alarms
  severity: LOW
  conditions:
    var: item.lifecycle_state
