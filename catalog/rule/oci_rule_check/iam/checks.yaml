version: '1.0'
provider: oci
service: iam
checks:
- rule_id: oci.iam.policy.deny_maintenance_tools_restricted
  for_each: oci.identity.get_authentication_policy
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.iam.policy.statements_external_principals_configured
  for_each: oci.identity.get_authentication_policy
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.iam.policy.system_authenticated_non_default_configured
  for_each: oci.identity.get_authentication_policy
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.iam.policy.temporary_token_expiry_configured
  for_each: oci.identity.get_authentication_policy
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.iam.role.kms_enforce_separation_of_duties_configured
  for_each: oci.identity.list_allowed_domain_license_types
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.iam.role.sa_enforce_separation_of_duties_configured
  for_each: oci.identity.list_allowed_domain_license_types
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.iam.user.allow_customer_secret_keys_restricted
  for_each: oci.identity.list_customer_secret_keys
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.iam.user.anonymous_auth_disabled
  for_each: oci.identity.list_user_group_memberships
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.iam.user.last_successful_login_configured
  for_each: oci.identity.list_user_group_memberships
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.iam.user.name_configured
  for_each: oci.identity.list_user_group_memberships
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.iam.user.security_key_enforcement_configured
  for_each: oci.identity.list_user_group_memberships
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.iam.user.service_account_default_check
  for_each: oci.identity.list_user_group_memberships
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
