version: '1.0'
provider: oci
service: core
checks:
- rule_id: oci.core.local_peering_gateway.route_table_id_configured
  for_each: oci.core.list_drg_route_tables
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.core.security_list.deny_all_ingress_restricted
  for_each: oci.core.get_security_list
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.core.security_list.least_functionality_configured
  for_each: oci.core.get_security_list
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
