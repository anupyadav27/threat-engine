version: '1.0'
provider: oci
service: file_storage
checks:
- rule_id: oci.file_storage.file_system.backup_enabled
  for_each: oci.file_storage.list_file_systems
  severity: MEDIUM
  conditions:
    var: item.lifecycle_state
    op: equals
    value: ACTIVE
- rule_id: oci.file_storage.file_system.encryption_enabled
  for_each: oci.file_storage.list_file_systems
  severity: HIGH
  conditions:
    var: item.kms_key_id
    op: exists
    value: null
- rule_id: oci.file_storage.file_system.file_system_copy_tags_to_backups_enabled
  for_each: oci.file_storage.list_file_systems
  severity: MEDIUM
  conditions:
    var: item.is_tag_copy_enabled
    op: is_true
    value: null
- rule_id: oci.file_storage.file_system.file_system_copy_tags_to_volumes_enabled
  for_each: oci.file_storage.list_file_systems
  severity: LOW
  conditions:
    var: item.defined_tags
    op: exists
    value: null
- rule_id: oci.file_storage.file_system.fileshare_cmk_policy_least_privilege_enabled_enforced
  for_each: oci.file_storage.list_file_systems
  severity: HIGH
  conditions:
    var: item.kms_key_id
    op: exists
    value: null
- rule_id: oci.file_storage.file_system.fileshare_encryption_enabled
  for_each: oci.file_storage.list_file_systems
  severity: HIGH
  conditions:
    var: item.kms_key_id
    op: exists
    value: null
- rule_id: oci.file_storage.file_system.fileshare_private_network_only_enforced
  for_each: oci.file_storage.list_mount_targets
  severity: MEDIUM
  conditions:
    var: item.subnet_id
    op: exists
    value: null
- rule_id: oci.file_storage.file_system.fileshare_snapshots_enabled
  for_each: oci.file_storage.list_file_systems
  severity: LOW
  conditions:
    var: item.snapshot_schedule
    op: exists
    value: null
- rule_id: oci.file_storage.file_system.have_backup_enabled
  for_each: oci.file_storage.list_file_systems
  severity: MEDIUM
  conditions:
    var: item.kms_key_id
    op: exists
    value: null
- rule_id: oci.file_storage.file_system.lifecycle_expiration_rules_defined_required
  for_each: oci.file_storage.list_file_systems
  severity: LOW
  conditions:
    var: item.lifecycle_policy
    op: exists
    value: null
- rule_id: oci.file_storage.file_system.lifecycle_immutable_retention_locked_where_required
  for_each: oci.file_storage.list_file_systems
  severity: LOW
  conditions:
    var: item.lifecycle_state
    op: equals
    value: LOCKED
- rule_id: oci.file_storage.file_system.lifecycle_versioning_enabled
  for_each: oci.file_storage.list_file_systems
  severity: LOW
  conditions:
    var: item.lifecycle_policy
    op: exists
    value: null
- rule_id: oci.file_storage.file_system.multi_az_enabled
  for_each: oci.file_storage.list_file_systems
  severity: LOW
  conditions:
    var: item.availability_domain
    op: exists
    value: null
- rule_id: oci.file_storage.file_system.public_access_blocked
  for_each: oci.file_storage.list_exports
  severity: CRITICAL
  conditions:
    var: item.export_options[].source
    op: not_contains
    value: 0.0.0.0/0
- rule_id: oci.file_storage.file_system.snapshot_cross_region_copy_encrypted
  for_each: oci.file_storage.list_file_systems
  severity: MEDIUM
  conditions:
    var: item.kms_key_id
    op: exists
    value: null
- rule_id: oci.file_storage.file_system.snapshot_encrypted
  for_each: oci.file_storage.list_file_systems
  severity: MEDIUM
  conditions:
    var: item.kms_key_id
    op: exists
    value: null
- rule_id: oci.file_storage.file_system.storage_encryption_enabled
  for_each: oci.file_storage.list_file_systems
  severity: HIGH
  conditions:
    var: item.kms_key_id
    op: exists
    value: null
- rule_id: oci.file_storage.file_system.storage_file_system_cmk_encryption_enabled
  for_each: oci.file_storage.list_file_systems
  severity: HIGH
  conditions:
    var: item.kms_key_id
    op: exists
    value: null
- rule_id: oci.file_storage.file_system.storage_have_backup_enabled
  for_each: oci.file_storage.list_file_systems
  severity: MEDIUM
  conditions:
    var: item.lifecycle_state
    op: equals
    value: ACTIVE
- rule_id: oci.file_storage.file_system.volume_cmk_enabled
  for_each: oci.file_storage.list_file_systems
  severity: MEDIUM
  conditions:
    var: item.kms_key_id
    op: exists
    value: null
- rule_id: oci.file_storage.file_system.volume_encryption_enabled
  for_each: oci.file_storage.list_file_systems
  severity: HIGH
  conditions:
    var: item.kms_key_id
    op: exists
    value: null
- rule_id: oci.file_storage.file_system.volume_snapshots_encrypted
  for_each: oci.file_storage.list_file_systems
  severity: MEDIUM
  conditions:
    var: item.kms_key_id
    op: exists
    value: null
- rule_id: oci.file_storage.file_system.windows_file_system_multi_az_enabled
  for_each: oci.file_storage.list_file_systems
  severity: LOW
  conditions:
    var: item.is_multiaz_enabled
    op: is_true
    value: null
- rule_id: oci.file_storage.snapshot.snapshot_not_public_blocked
  for_each: oci.file_storage.list_exports
  severity: CRITICAL
  conditions:
    var: item.lifecycle_state
    op: equals
    value: ACTIVE
