version: '1.0'
provider: oci
service: objectstorage
checks:
- rule_id: oci.objectstorage.bucket.ssl_enforced
  for_each: oci.object_storage.list_buckets
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.objectstorage.backup.bucket_configured
  for_each: oci.object_storage.list_buckets
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.objectstorage.bucket.anonymous_auth_disabled
  for_each: oci.object_storage.list_buckets
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.objectstorage.bucket.preauthenticated_request_expiry_configured
  for_each: oci.object_storage.list_buckets
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.objectstorage.preauthenticated_request.allowed_protocols_https_only
  for_each: oci.object_storage.list_preauthenticated_requests
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.objectstorage.bucket.cross_tenancy_replication_disabled
  for_each: oci.object_storage.list_buckets
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.objectstorage.bucket.tls_version_configured
  for_each: oci.object_storage.list_buckets
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
