version: '1.0'
provider: oci
service: logging
checks:
- rule_id: oci.logging.log_group.bucket_permission_changes_enabled
  for_each: oci.logging.list_logs
  severity: LOW
  conditions:
    all:
    - var: item.lifecycle_state
      op: equals
      value: ACTIVE
    - var: item.freeform_tags.Environment
      op: exists
      value: null
- rule_id: oci.logging.log_group.firewall_rule_changes_enabled
  for_each: oci.logging.list_logs
  severity: MEDIUM
  conditions:
    var: item.name
    op: equals
    value: firewall_rule_changes
- rule_id: oci.logging.log_group.instance_configuration_changes_enabled
  for_each: oci.logging.list_logs
  severity: LOW
  conditions:
    var: item.name
    op: equals
    value: instance_configuration_changes
- rule_id: oci.logging.log_group.log_analysis_enabled
  for_each: oci.logging.list_logs
  severity: LOW
  conditions:
    var: item.lifecycle_state
    op: equals
    value: ACTIVE
- rule_id: oci.logging.log_group.log_metric_filter_alarm_configured
  for_each: oci.logging.list_logs
  severity: LOW
  conditions:
    var: item.lifecycle_state
    op: equals
    value: ACTIVE
- rule_id: oci.logging.log_group.log_metric_filter_and_alert_for_enabled
  for_each: oci.logging.list_logs
  severity: LOW
  conditions:
    all:
    - var: item.lifecycle_state
      op: equals
      value: ACTIVE
    - var: item.freeform_tags.Environment
      op: exists
      value: null
    - var: item.defined_tags.Environment
      op: exists
      value: null
- rule_id: oci.logging.log_group.monitoring_alerts_for_anomalies_enabled
  for_each: oci.logging.list_logs
  severity: MEDIUM
  conditions:
    var: item.lifecycle_state
    op: equals
    value: ACTIVE
- rule_id: oci.logging.log_group.monitoring_flow_logs_enabled
  for_each: oci.logging.list_logs
  severity: MEDIUM
  conditions:
    all:
    - var: item.name
      op: contains
      value: flow-log
    - var: item.lifecycle_state
      op: equals
      value: ACTIVE
- rule_id: oci.logging.log_group.network_changes_enabled
  for_each: oci.logging.list_logs
  severity: MEDIUM
  conditions:
    var: item.name
    op: contains
    value: network-changes
- rule_id: oci.logging.log_group.network_route_changes_enabled
  for_each: oci.logging.list_logs
  severity: MEDIUM
  conditions:
    var: item.name
    op: contains
    value: network-route-changes
- rule_id: oci.logging.log_group.retention_enforced_on_sensitive_datasets
  for_each: oci.logging.list_logs
  severity: LOW
  conditions:
    var: item.retention_duration
    op: exists
    value: null
- rule_id: oci.logging.log_group.retention_policies_defined_required
  for_each: oci.logging.list_logs
  severity: LOW
  conditions:
    var: item.retention_policies
    op: exists
    value: null
- rule_id: oci.logging.log_group.retention_protected_from_public_override_blocked
  for_each: oci.logging.list_logs
  severity: CRITICAL
  conditions:
    var: item.lifecycle_state
    op: equals
    value: ACTIVE
- rule_id: oci.logging.log_group.role_changes_enabled
  for_each: oci.logging.list_logs
  severity: LOW
  conditions:
    var: item.lifecycle_state
    op: equals
    value: ACTIVE
