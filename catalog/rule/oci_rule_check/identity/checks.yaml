version: '1.0'
provider: oci
service: identity
checks:
- rule_id: oci.identity.dynamic_group.token_rules_configured
  for_each: oci.identity.list_dynamic_groups
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.identity.group.restrict_user_access_features_configured
  for_each: oci.identity.list_user_group_memberships
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.identity.namespace.default_not_used_restricted
  for_each: oci.identity.list_standard_tag_namespaces
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.identity.password_policy.hide_feedback_configured
  for_each: oci.identity.list_allowed_domain_license_types
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.identity.policy.change_control_configured
  for_each: oci.identity.get_authentication_policy
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.identity.policy.condition_configured
  for_each: oci.identity.get_authentication_policy
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.identity.policy.condition_ip_configured
  for_each: oci.identity.get_authentication_policy
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.identity.policy.statement_configured
  for_each: oci.identity.get_authentication_policy
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.identity.policy.statements_external_entities_configured
  for_each: oci.identity.get_authentication_policy
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.identity.policy.token_actions_configured
  for_each: oci.identity.get_authentication_policy
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.identity.support.role_created_configured
  for_each: oci.identity.list_allowed_domain_license_types
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.identity.user.account_management_enabled
  for_each: oci.identity.list_user_group_memberships
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.identity.user.client_certificate_disabled
  for_each: oci.identity.list_user_group_memberships
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.identity.user.inactive_disable_configured
  for_each: oci.identity.list_user_group_memberships
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.identity.user.namespace_configured
  for_each: oci.identity.list_user_group_memberships
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.identity.user.password_policy_enforce_change_configured
  for_each: oci.identity.get_user_ui_password_information
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: oci.identity.user_settings.password_reset_notification_enabled
  for_each: oci.identity.list_swift_passwords
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
