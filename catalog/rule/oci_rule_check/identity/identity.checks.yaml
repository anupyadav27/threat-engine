version: '1.0'
provider: oci
service: identity
checks:
- rule_id: oci.identity.api_key.key_rotated_in_90_days
  for_each: oci.identity.list_users
  severity: HIGH
  conditions:
    all:
    - var: item.api_keys[].time_created
      op: exists
      value: null
    - var: item.api_keys[].time_created
      op: lte
      value: '90'
- rule_id: oci.identity.api_key.tenant_api_access_keys_root_or_restricted
  for_each: oci.identity.list_users
  severity: CRITICAL
  conditions:
    all:
    - var: item.lifecycle_state
      op: equals
      value: ACTIVE
    - any:
      - var: item.capabilities.can_use_api_keys
        op: is_false
        value: null
      - var: item.capabilities.can_use_console_password
        op: is_false
        value: null
      - var: item.capabilities.can_use_smtp_credentials
        op: is_false
        value: null
      - var: item.capabilities.can_use_auth_tokens
        op: is_false
        value: null
      - var: item.capabilities.can_use_customer_secret_keys
        op: is_false
        value: null
      - var: item.capabilities.can_use_o_auth2_client_credentials
        op: is_false
        value: null
- rule_id: oci.identity.compartment.account_part_of_organizations
  for_each: oci.identity.list_users
  severity: MEDIUM
  conditions:
    var: item.is_mfa_activated
    op: is_true
    value: null
- rule_id: oci.identity.compartment.ou_auto_tag_policies_enabled
  for_each: oci.identity.list_policies
  severity: MEDIUM
  conditions:
    all:
    - var: item.statements
      op: contains
      value: allow service tag to manage tag-namespaces
    - var: item.statements
      op: contains
      value: allow service tag to manage tag-defaults
- rule_id: oci.identity.compartment.resource_no_root_compartment
  for_each: oci.identity.list_users
  severity: CRITICAL
  conditions:
    var: item.compartment_id
    op: not_equals
    value: ocid1.tenancy.oc1..aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
