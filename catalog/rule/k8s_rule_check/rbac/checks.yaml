version: '1.0'
provider: k8s
service: rbac
checks:
- rule_id: k8s.rbac.namespace_configured
  for_each: k8s.rbac.list_role_for_all_namespaces
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: k8s.rbac.network_policy_configured
  for_each: k8s.rbac.list_cluster_role
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: k8s.rbac.role_configured
  for_each: k8s.rbac.list_cluster_role
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: k8s.rbac.role.administrators_cannot_update_cluster_role_binding_configured
  for_each: k8s.rbac.list_cluster_role_binding
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: k8s.rbac.role.deny_maintenance_tools_restricted
  for_each: k8s.rbac.list_cluster_role
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: k8s.rbac.role.rules_configured
  for_each: k8s.rbac.list_cluster_role
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: k8s.rbac.role.verbs_configured
  for_each: k8s.rbac.list_cluster_role
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: k8s.rbac.rolebinding.annotations_configured
  for_each: k8s.rbac.list_cluster_role_binding
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: k8s.rbac.rolebinding.external_subjects_configured
  for_each: k8s.rbac.list_cluster_role_binding
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: k8s.rbac.service_account.secret_mounts_configured
  for_each: k8s.rbac.list_cluster_role
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: k8s.rbac.token.review_expiration_configured
  for_each: k8s.rbac.list_cluster_role
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: k8s.rbac.user.account_management_enabled
  for_each: k8s.rbac.list_cluster_role
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
