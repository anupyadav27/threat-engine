version: '1.0'
provider: k8s
service: rbac
checks:
- rule_id: k8s.rbac.access.review_process
  for_each: k8s.rbac.list_cluster_role
  severity: LOW
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/configuration-change-audit-enabled
    op: is_true
    value: null
- rule_id: k8s.rbac.activity.monitoring_configured
  for_each: k8s.rbac.list_cluster_role
  severity: MEDIUM
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/configuration-change-monitoring
    op: exists
    value: null
- rule_id: k8s.rbac.change.control_role_defined
  for_each: k8s.rbac.list_cluster_role
  severity: HIGH
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/change-control-role-defined
    op: exists
    value: null
- rule_id: k8s.rbac.change.management_policy_configured
  for_each: k8s.rbac.list_cluster_role
  severity: MEDIUM
  conditions:
    all:
    - var: item.metadata.annotations.cspm.k8s.io/change-management-policy-configured
      op: exists
      value: null
- rule_id: k8s.rbac.change.management_roles_defined
  for_each: k8s.rbac.list_cluster_role
  severity: HIGH
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/change-management-roles-defined
    op: exists
    value: null
- rule_id: k8s.rbac.cluster.admin_role_access_review
  for_each: k8s.rbac.list_cluster_role_binding
  severity: HIGH
  conditions:
    var: item.roleRef.name
    op: not_equals
    value: cluster-admin
- rule_id: k8s.rbac.cluster.admin_role_usage_check
  for_each: k8s.rbac.list_cluster_role_binding
  severity: HIGH
  conditions:
    var: item.roleRef.name
    op: not_equals
    value: cluster-admin
- rule_id: k8s.rbac.clusterrolebinding.admin_bindings_audited_enforced
  for_each: k8s.rbac.list_cluster_role
  severity: HIGH
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/clusterrolebinding-admin-bindings-audited-enforced
