  for_each: k8s.rbac.list_cluster_role
  severity: HIGH
  conditions:
    var: item.rules[].resources
    op: not_contains
    value: certificatesigningrequests/approval
- rule_id: k8s.rbac.database.access_restricted
  for_each: k8s.rbac.list_cluster_role
  severity: HIGH
  conditions:
    var: item.rules[].verbs
    op: not_contains
    value:
    - create
    - update
    - patch
    - delete
- rule_id: k8s.rbac.default.service_account_audit
  for_each: k8s.rbac.list_cluster_role
  severity: HIGH
