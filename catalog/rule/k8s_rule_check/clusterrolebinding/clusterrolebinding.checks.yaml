version: '1.0'
provider: k8s
service: clusterrolebinding
checks:
- rule_id: k8s.clusterrolebinding.binding.cluster_admin_not_bound_to_service_account
  for_each: k8s.clusterrolebinding.list_cluster_role_bindings
  severity: CRITICAL
  conditions:
    all:
    - var: item.roleRef.name
      op: equals
      value: cluster-admin
    - var: item.subjects[].kind
      op: not_contains
      value: ServiceAccount
- rule_id: k8s.clusterrolebinding.binding.default_namespace_sa_not_admin_bound
  for_each: k8s.clusterrolebinding.list
  severity: HIGH
  conditions:
    all:
    - var: item.subjects[].namespace
      op: not_contains
      value: default
    - var: item.roleRef.name
      op: not_equals
      value: cluster-admin
- rule_id: k8s.clusterrolebinding.binding.subjects_exist
  for_each: k8s.clusterrolebinding.list
  severity: LOW
  conditions:
    all:
    - var: item.subjects[].name
      op: exists
      value: null
    - var: item.subjects[].kind
      op: exists
      value: null
