version: '1.0'
provider: k8s
service: apiserver
checks:
- rule_id: k8s.apiserver.access.logging_enabled
  for_each: k8s.apiserver.list_component_status
  severity: MEDIUM
  conditions:
    var: item.arguments.anonymous-auth
    op: equals
    value: 'false'
- rule_id: k8s.apiserver.admission.plugin_serviceaccount_check
  for_each: k8s.apiserver.list_component_status
  severity: HIGH
  conditions:
    var: item.arguments.admission-control-service-account-check
    op: is_true
    value: null
- rule_id: k8s.apiserver.anonymous.auth_disabled
  for_each: k8s.apiserver.list_component_status
  severity: HIGH
  conditions:
    var: item.arguments.anonymous-auth
    op: equals
    value: 'false'
- rule_id: k8s.apiserver.audit.logging_enabled
  for_each: k8s.apiserver.list_component_status
  severity: MEDIUM
  conditions:
    var: item.arguments.audit-logging-enabled
    op: is_true
    value: null
- rule_id: k8s.apiserver.authentication.enabled
  for_each: k8s.apiserver.list_component_status
  severity: LOW
  conditions:
    var: item.arguments.account-lookup-enabled
    op: is_true
    value: null
- rule_id: k8s.apiserver.authentication.mfa_enabled
  for_each: k8s.apiserver.list_component_status
  severity: LOW
  conditions:
    var: item.arguments.anonymous-auth
    op: equals
    value: 'false'
- rule_id: k8s.apiserver.authentication.strong_mechanism_enabled
  for_each: k8s.apiserver.list_component_status
  severity: LOW
  conditions:
    any:
    - var: item.arguments.token-auth-file
      op: exists
      value: null
    - var: item.arguments.client-ca-file
      op: exists
      value: null
    - var: item.arguments.oidc-issuer-url
      op: exists
      value: null
    - var: item.arguments.authentication-token-webhook-config-file
      op: exists
      value: null
- rule_id: k8s.apiserver.authorization.mode_check
  for_each: k8s.apiserver.list_component_status
  severity: LOW
  conditions:
    var: item.arguments.authorization-mode
    op: contains
    value: RBAC
- rule_id: k8s.apiserver.authorization.mode_rbac
  for_each: k8s.apiserver.list_component_status
  severity: HIGH
  conditions:
    var: item.arguments.authorization-mode
    op: contains
    value: RBAC
- rule_id: k8s.apiserver.configuration.review_scheduled
  for_each: k8s.apiserver.list_component_status
  severity: LOW
  conditions:
    var: item.arguments.admission-control
    op: contains
    value: PodSecurity
- rule_id: k8s.apiserver.ddos.protection_configured
  for_each: k8s.apiserver.list_component_status
  severity: LOW
  conditions:
    var: item.arguments.admission-plugins-event-rate-limit-set
    op: is_true
    value: null
- rule_id: k8s.apiserver.encryption.config_check
  for_each: k8s.apiserver.list_component_status
  severity: LOW
  conditions:
    var: item.arguments.encryption-provider-config
    op: exists
    value: null
- rule_id: k8s.apiserver.high.availability_configured
  for_each: k8s.apiserver.list_component_status
  severity: LOW
  conditions:
    var: item.conditions[].status
    op: equals
    value: 'True'
- rule_id: k8s.apiserver.https.only
  for_each: k8s.apiserver.list_component_status
  severity: LOW
  conditions:
    var: item.arguments.secure-port
    op: exists
    value: null
- rule_id: k8s.apiserver.log.maxsize_check
  for_each: k8s.apiserver.list_component_status
  severity: LOW
  conditions:
    var: item.arguments.audit-log-maxsize
    op: exists
    value: null
- rule_id: k8s.apiserver.policy.captures_metadata
  for_each: k8s.apiserver.list_component_status
  severity: LOW
  conditions:
    var: item.arguments.admission-plugin-namespace-lifecycle-enabled
    op: is_true
    value: null
- rule_id: k8s.apiserver.policy.configured
  for_each: k8s.apiserver.list_component_status
  severity: LOW
  conditions:
    var: item.arguments.audit-policy-file
    op: exists
    value: null
- rule_id: k8s.apiserver.rate.limiting_enabled
  for_each: k8s.apiserver.list_component_status
  severity: LOW
  conditions:
    var: item.arguments.admission-plugins-event-rate-limit-set
    op: is_true
    value: null
- rule_id: k8s.apiserver.secret.authority_validated
  for_each: k8s.apiserver.list_component_status
  severity: HIGH
  conditions:
    var: item.arguments.admission-plugin-namespace-lifecycle-enabled
    op: is_true
    value: null
- rule_id: k8s.apiserver.secure.configuration_applied
  for_each: k8s.apiserver.list_component_status
  severity: LOW
  conditions:
    var: item.arguments.anonymous-auth
    op: equals
    value: 'false'
- rule_id: k8s.apiserver.secure.flags_configured
  for_each: k8s.apiserver.list_component_status
  severity: LOW
  conditions:
    var: item.arguments
    op: exists
    value: null
- rule_id: k8s.apiserver.server.admission_control_policy_check
  for_each: k8s.apiserver.list_component_status
  severity: MEDIUM
  conditions:
    var: item.arguments.audit-policy-file
    op: exists
    value: null
- rule_id: k8s.apiserver.server.admission_control_service_account_check
  for_each: k8s.apiserver.list_component_status
  severity: MEDIUM
  conditions:
    var: item.arguments.admission-control-service-account-check
    op: is_true
    value: null
- rule_id: k8s.apiserver.server.admission_controller_image_policy_webhook_configured
  for_each: k8s.apiserver.list_component_status
  severity: MEDIUM
  conditions:
    var: item.arguments.admission-controller-image-policy-webhook-configured
    op: is_true
    value: null
- rule_id: k8s.apiserver.server.admission_plugin_namespace_lifecycle_enabled
  for_each: k8s.apiserver.list_component_status
  severity: MEDIUM
  conditions:
    var: item.arguments.admission-plugin-namespace-lifecycle-enabled
    op: is_true
    value: null
- rule_id: k8s.apiserver.server.admission_plugins_always_pull_images_set
  for_each: k8s.apiserver.list_component_status
  severity: MEDIUM
  conditions:
    var: item.arguments.admission-plugins-always-pull-images-set
    op: is_true
    value: null
- rule_id: k8s.apiserver.server.admission_plugins_check
  for_each: k8s.apiserver.list_component_status
  severity: MEDIUM
  conditions:
    var: item.arguments.enable-admission-plugins
    op: exists
    value: null
- rule_id: k8s.apiserver.server.admission_plugins_event_rate_limit_set
  for_each: k8s.apiserver.list_component_status
  severity: MEDIUM
  conditions:
    var: item.arguments.admission-plugins-event-rate-limit-set
    op: is_true
    value: null
- rule_id: k8s.apiserver.server.admission_plugins_node_restriction_check
  for_each: k8s.apiserver.list_component_status
  severity: MEDIUM
  conditions:
    var: item.arguments.admission-plugins-node-restriction-check
    op: is_true
    value: null
- rule_id: k8s.apiserver.server.admission_plugins_podsecuritypolicy_check
  for_each: k8s.apiserver.list_component_status
  severity: MEDIUM
  conditions:
    var: item.arguments.admission-plugins-podsecuritypolicy-check
    op: equals
    value: enabled
- rule_id: k8s.apiserver.server.admission_plugins_security_context_deny_check
  for_each: k8s.apiserver.list_component_status
  severity: MEDIUM
  conditions:
    all:
    - var: item.arguments.admission-plugins-security-context-deny-enabled
      op: is_true
      value: null
- rule_id: k8s.apiserver.server.args_profiling_disabled
  for_each: k8s.apiserver.list_component_status
  severity: LOW
  conditions:
    var: item.arguments.profiling
    op: equals
    value: 'false'
- rule_id: k8s.apiserver.server.audit_log_maxage_compliance_check
  for_each: k8s.apiserver.list_component_status
  severity: HIGH
  conditions:
    var: item.arguments.audit-log-maxage
    op: gte
    value: 30
- rule_id: k8s.apiserver.server.audit_log_maxbackup_check
  for_each: k8s.apiserver.list_component_status
  severity: HIGH
  conditions:
    var: item.arguments.audit-log-maxbackup
    op: gte
    value: 10
- rule_id: k8s.apiserver.server.audit_log_maxbackup_retent
  for_each: k8s.apiserver.list_component_status
  severity: HIGH
  conditions:
    var: item.arguments.audit-log-maxbackup
    op: gte
    value: '10'
- rule_id: k8s.apiserver.server.audit_log_path_check
  for_each: k8s.apiserver.list_component_status
  severity: HIGH
  conditions:
    var: item.arguments.audit-log-path
    op: exists
    value: null
- rule_id: k8s.apiserver.server.audit_policy_file_configured
  for_each: k8s.apiserver.list_component_status
  severity: HIGH
  conditions:
    var: item.arguments.audit-policy-file
    op: exists
    value: null
- rule_id: k8s.apiserver.server.audit_policy_verification
  for_each: k8s.apiserver.list_component_status
  severity: HIGH
  conditions:
    var: item.arguments.audit-policy-file
    op: exists
    value: null
- rule_id: k8s.apiserver.server.authorization_mode_includes_node
  for_each: k8s.apiserver.list_component_status
  severity: HIGH
  conditions:
    var: item.arguments.authorization-mode
    op: contains
    value: Node
- rule_id: k8s.apiserver.server.client_ca_configured
  for_each: k8s.apiserver.list_component_status
  severity: LOW
  conditions:
    var: item.arguments.client-ca-file
    op: exists
    value: null
- rule_id: k8s.apiserver.server.client_ca_file_configuration_check
  for_each: k8s.apiserver.list_component_status
  severity: LOW
  conditions:
    var: item.arguments.client-ca-file
    op: exists
    value: null
- rule_id: k8s.apiserver.server.client_ca_file_presence_check
  for_each: k8s.apiserver.list_component_status
  severity: LOW
  conditions:
    var: item.arguments.client-ca-file
    op: exists
    value: null
- rule_id: k8s.apiserver.server.configuration_review_scheduled
  for_each: k8s.apiserver.list_component_status
  severity: LOW
  conditions:
    var: item.arguments.audit-policy-file
    op: exists
    value: null
- rule_id: k8s.apiserver.server.ddos_protection_configured
  for_each: k8s.apiserver.list_component_status
  severity: LOW
  conditions:
    var: item.arguments.admission-plugins-event-rate-limit-set
    op: is_true
    value: null
- rule_id: k8s.apiserver.server.deny_service_external_ips_not_set
  for_each: k8s.apiserver.list_component_status
  severity: MEDIUM
  conditions:
    var: item.arguments.deny-service-external-ips
    op: is_true
    value: null
- rule_id: k8s.apiserver.server.encryption_provider_config_check
  for_each: k8s.apiserver.list_component_status
  severity: HIGH
  conditions:
    var: item.arguments.encryption-provider-config
    op: exists
    value: null
- rule_id: k8s.apiserver.server.encryption_provider_verification
  for_each: k8s.apiserver.list_component_status
  severity: HIGH
  conditions:
    var: item.arguments.encryption-provider-config
    op: exists
    value: null
- rule_id: k8s.apiserver.server.etcd_cafile_tls_verification
  for_each: k8s.apiserver.list_component_status
  severity: HIGH
  conditions:
    var: item.arguments.etcd-cafile
    op: exists
    value: null
- rule_id: k8s.apiserver.server.etcd_cafile_validity_check
  for_each: k8s.apiserver.list_component_status
  severity: LOW
  conditions:
    var: item.arguments.etcd-cafile
    op: exists
    value: null
- rule_id: k8s.apiserver.server.etcd_tls_configured
  for_each: k8s.apiserver.list_component_status
  severity: HIGH
  conditions:
    var: item.arguments.etcd-servers
    op: contains
    value: https://
- rule_id: k8s.apiserver.server.high_availability_enabled
  for_each: k8s.apiserver.list_component_status
  severity: LOW
  conditions:
    var: item.conditions[].type
    op: contains
    value: Healthy
- rule_id: k8s.apiserver.server.https_only_configured
  for_each: k8s.apiserver.list_component_status
  severity: LOW
  conditions:
    var: item.arguments.secure-port
    op: exists
    value: null
- rule_id: k8s.apiserver.server.image_policy_webhook_enabled
  for_each: k8s.apiserver.list_component_status
  severity: MEDIUM
  conditions:
    var: item.arguments.admission-controller-image-policy-webhook-configured
