    value: null
- rule_id: k8s.apiserver.server.insecure_port_disabled
  for_each: k8s.apiserver.list_component_status
  severity: CRITICAL
  conditions:
    var: item.arguments.insecure-port
    op: equals
    value: '0'
- rule_id: k8s.apiserver.server.kubelet_auth_certificates_configured
  for_each: k8s.apiserver.list_component_status
  severity: HIGH
  conditions:
    var: item.arguments.kubelet-client-certificate
    op: exists
    value: null
- rule_id: k8s.apiserver.server.kubelet_client_cert_key_verification
  for_each: k8s.apiserver.list_component_status
  severity: HIGH
  conditions:
    var: item.arguments.kubelet-client-cert-key-verification
    op: is_true
    value: null
- rule_id: k8s.apiserver.server.pod_anonymous_auth_disabled
  for_each: k8s.apiserver.list_component_status
  severity: CRITICAL
  conditions:
    var: item.arguments.anonymous-auth
