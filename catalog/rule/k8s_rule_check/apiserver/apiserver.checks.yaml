  for_each: k8s.apiserver.list_component_status
  severity: LOW
  conditions:
    var: item.arguments.request-timeout
    op: exists
    value: null
- rule_id: k8s.apiserver.server.secure_configuration_enforced
  for_each: k8s.apiserver.list_component_status
  severity: LOW
  conditions:
    var: item.arguments.admission-plugin-namespace-lifecycle-enabled
    op: is_true
    value: null
