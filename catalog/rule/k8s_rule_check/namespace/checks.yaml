version: '1.0'
provider: k8s
service: namespace
checks:
- rule_id: k8s.namespace.default_configured
  for_each: k8s.namespace.list_namespace
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
- rule_id: k8s.namespace.labels_configured
  for_each: k8s.namespace.list_namespace
  severity: MEDIUM
  conditions:
    var: item.metadata.labels
    op: is_true
