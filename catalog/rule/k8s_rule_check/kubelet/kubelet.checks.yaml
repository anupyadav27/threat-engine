version: '1.0'
provider: k8s
service: kubelet
checks:
- rule_id: k8s.kubelet.anonymous.auth_disabled
  for_each: k8s.kubelet.list_node
  severity: HIGH
  conditions:
    var: item.arguments.anonymous-auth
    op: is_false
    value: null
- rule_id: k8s.kubelet.authorization.mode_not_always_allow
  for_each: k8s.kubelet.list_node
  severity: LOW
  conditions:
    var: item.arguments.authorization-mode
    op: not_equals
    value: AlwaysAllow
- rule_id: k8s.kubelet.configmap.file_permissions_check
  for_each: k8s.kubelet.list_node
  severity: HIGH
  conditions:
    var: item.arguments.seccomp-default
    op: is_true
    value: null
- rule_id: k8s.kubelet.read.only_port_disabled
  for_each: k8s.kubelet.list_node
  severity: LOW
  conditions:
    var: item.arguments.read-only-port
    op: not_exists
    value: null
- rule_id: k8s.kubelet.seccomp.default_enabled
  for_each: k8s.kubelet.list_node
  severity: LOW
  conditions:
    var: item.arguments.seccomp-default
    op: is_true
    value: null
