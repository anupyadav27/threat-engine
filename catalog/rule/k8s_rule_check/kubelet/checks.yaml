version: '1.0'
provider: k8s
service: kubelet
checks:
- rule_id: k8s.kubelet.config.cadvisor_port_configured
  for_each: k8s.kubelet.list_node
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: k8s.kubelet.config.cipher_suites_configured
  for_each: k8s.kubelet.list_node
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: k8s.kubelet.config.file_ownership_enforced
  for_each: k8s.kubelet.list_node
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: k8s.kubelet.config.rotate_certificates_configured
  for_each: k8s.kubelet.list_node
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: k8s.kubelet.config.event_qps_configured
  for_each: k8s.kubelet.list_node
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: k8s.kubelet.config.make_iptables_util_chains_configured
  for_each: k8s.kubelet.list_node
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: k8s.kubelet.config.protect_kernel_defaults_configured
  for_each: k8s.kubelet.list_node
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
