version: '1.0'
provider: k8s
service: workload
checks:
- rule_id: k8s.workload.backup_annotation_configured
  for_each: k8s.workload.list_deployment_for_all_namespaces
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: k8s.workload.container.image_baseline_enabled
  for_each: k8s.workload.list_deployment_for_all_namespaces
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: k8s.workload.container.image_digest_configured
  for_each: k8s.workload.list_deployment_for_all_namespaces
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: k8s.workload.replica_high_availability_enabled
  for_each: k8s.workload.list_replica_set_for_all_namespaces
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
