version: '1.0'
provider: k8s
service: workload
checks:
- rule_id: k8s.workload.cronjob.execution_constraints_enforced
  for_each: k8s.workload.list_cron_job_for_all_namespaces
  severity: LOW
  conditions:
    all:
    - var: item.spec.jobTemplate.spec.template.spec.hostNetwork
      op: not_exists
      value: null
    - var: item.spec.jobTemplate.spec.template.spec.hostPID
      op: not_exists
      value: null
- rule_id: k8s.workload.daemonset.daemonset_host_access_controlled_enforced
  for_each: k8s.workload.list_daemonset_for_all_namespaces
  severity: HIGH
  conditions:
    all:
    - var: item.spec.template.spec.hostNetwork
      op: is_false
      value: null
    - var: item.spec.template.spec.hostPID
      op: is_false
      value: null
    - var: item.spec.template.spec.hostIPC
      op: is_false
      value: null
- rule_id: k8s.workload.daemonset.host_pid_restricted
  for_each: k8s.workload.list_daemonset_for_all_namespaces
  severity: LOW
  conditions:
    var: item.spec.template.spec.hostPID
    op: is_false
    value: null
- rule_id: k8s.workload.deployment.resource_limits_enforced
  for_each: k8s.workload.list_deployment_for_all_namespaces
  severity: LOW
  conditions:
    var: item.spec.template.spec.containers[].resources.limits
    op: exists
    value: null
- rule_id: k8s.workload.job.completion_policies_enforced_enabled
  for_each: k8s.workload.list_cron_job_for_all_namespaces
  severity: LOW
  conditions:
    var: item.spec.jobTemplate.spec.template.spec.resources.limits
    op: exists
    value: null
- rule_id: k8s.workload.serviceaccount.service_mesh_cert_auth_enforced
  for_each: k8s.workload.list_deployment_for_all_namespaces
  severity: HIGH
  conditions:
    var: item.metadata.annotations['service-mesh.io/cert-auth']
    op: exists
    value: null
- rule_id: k8s.workload.statefulset.persistence_secured_enforced
  for_each: k8s.workload.list_deployment_for_all_namespaces
  severity: LOW
  conditions:
    var: item.spec.volumeClaimTemplates
    op: exists
    value: null
