version: '1.0'
provider: k8s
service: monitoring
checks:
- rule_id: k8s.monitoring.alerts.configured
  for_each: k8s.monitoring.list_config_map_for_all_namespaces
  severity: LOW
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/alerts-configured
    op: exists
    value: null
- rule_id: k8s.monitoring.daemonset.centralized_logging_enabled
  for_each: k8s.monitoring.list_service_for_all_namespaces
  severity: MEDIUM
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/daemonset-centralized-logging-enabled
    op: is_true
    value: null
- rule_id: k8s.monitoring.deployment.anomaly_detection_enabled
  for_each: k8s.monitoring.list_config_map_for_all_namespaces
  severity: MEDIUM
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/prometheus-alerts-configured
    op: exists
    value: null
- rule_id: k8s.monitoring.deployment.automated_containment_enabled
  for_each: k8s.monitoring.list_service_for_all_namespaces
  severity: LOW
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/deployment-automated-containment-enabled
    op: is_true
    value: null
- rule_id: k8s.monitoring.deployment.forensic_data_collection_enabled
  for_each: k8s.monitoring.list_service_for_all_namespaces
  severity: LOW
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/deployment-forensic-data-collection-enabled
    op: is_true
    value: null
- rule_id: k8s.monitoring.deployment.incident_forensics_enabled
  for_each: k8s.monitoring.list_service_for_all_namespaces
  severity: LOW
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/deployment-incident-forensics-enabled
    op: is_true
    value: null
- rule_id: k8s.monitoring.deployment.playbooks_automated_enabled
  for_each: k8s.monitoring.list_service_for_all_namespaces
  severity: LOW
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/deployment-playbooks-automated-enabled
    op: is_true
    value: null
- rule_id: k8s.monitoring.deployment.proactive_hunting_enabled
  for_each: k8s.monitoring.list_service_for_all_namespaces
  severity: LOW
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/deployment-proactive-hunting-enabled
    op: is_true
    value: null
- rule_id: k8s.monitoring.persistentvolume.retention_policies_enforced_enabled
  for_each: k8s.monitoring.list_service_for_all_namespaces
  severity: LOW
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/persistentvolume-retention-policies-enforced-enabled
    op: is_true
    value: null
- rule_id: k8s.monitoring.pod.alerting_system_configured
  for_each: k8s.monitoring.list_config_map_for_all_namespaces
  severity: MEDIUM
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/pod-alerting-system-configured
    op: exists
    value: null
- rule_id: k8s.monitoring.prometheus.alerts_configured
  for_each: k8s.monitoring.list_config_map_for_all_namespaces
  severity: MEDIUM
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/prometheus-alerts-configured
    op: exists
    value: null
- rule_id: k8s.monitoring.server.audit_policy_comprehensive_enforced
  for_each: k8s.monitoring.list_service_for_all_namespaces
  severity: HIGH
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/server-audit-policy-comprehensive-enforced
    op: exists
    value: null
- rule_id: k8s.monitoring.server.automated_compliance_dashboard_enabled
  for_each: k8s.monitoring.list_config_map_for_all_namespaces
  severity: LOW
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/server-security-alerts-configured-enforced
    op: exists
    value: null
- rule_id: k8s.monitoring.server.behavioral_analysis_enabled
  for_each: k8s.monitoring.list_service_for_all_namespaces
  severity: LOW
  conditions:
    any:
    - var: item.metadata.annotations.cspm.k8s.io/deployment-proactive-hunting-enabled
      op: is_true
      value: null
    - var: item.metadata.annotations.cspm.k8s.io/deployment-incident-forensics-enabled
      op: is_true
      value: null
    - var: item.metadata.annotations.cspm.k8s.io/deployment-forensic-data-collection-enabled
      op: is_true
      value: null
    - var: item.metadata.annotations.cspm.k8s.io/deployment-automated-containment-enabled
      op: is_true
      value: null
    - var: item.metadata.annotations.cspm.k8s.io/deployment-playbooks-automated-enabled
      op: is_true
      value: null
- rule_id: k8s.monitoring.server.compliance_dashboard_automated
  for_each: k8s.monitoring.list_config_map_for_all_namespaces
  severity: LOW
  conditions:
    all:
    - var: item.metadata.annotations.cspm.k8s.io/alerts-configured
      op: exists
      value: null
    - var: item.metadata.annotations.cspm.k8s.io/pod-alerting-system-configured
      op: exists
      value: null
    - var: item.metadata.annotations.cspm.k8s.io/prometheus-alerts-configured
      op: exists
      value: null
    - var: item.metadata.annotations.cspm.k8s.io/server-security-alerts-configured-enforced
      op: exists
      value: null
- rule_id: k8s.monitoring.server.correlation_enabled
  for_each: k8s.monitoring.list_config_map_for_all_namespaces
  severity: LOW
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/server-security-alerts-configured-enforced
    op: exists
    value: null
- rule_id: k8s.monitoring.server.security_alerts_configured_enforced
  for_each: k8s.monitoring.list_config_map_for_all_namespaces
  severity: MEDIUM
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/server-security-alerts-configured-enforced
    op: exists
    value: null
