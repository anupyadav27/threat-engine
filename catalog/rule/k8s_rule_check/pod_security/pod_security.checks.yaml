version: '1.0'
provider: k8s
service: pod_security
checks:
- rule_id: k8s.pod_security.root.containers_restricted
  for_each: k8s.pod_security.list_pod_for_all_namespaces
  severity: LOW
  conditions:
    all:
    - var: item.spec.containers[].securityContext.runAsNonRoot
      op: exists
      value: null
    - var: item.spec.containers[].securityContext.runAsNonRoot
      op: is_true
      value: null
