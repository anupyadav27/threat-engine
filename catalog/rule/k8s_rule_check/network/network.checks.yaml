version: '1.0'
provider: k8s
service: network
checks:
- rule_id: k8s.network.anomaly.detection_enabled
  for_each: k8s.network.list_service_for_all_namespaces
  severity: MEDIUM
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/anomaly-detection-enabled
    op: is_true
    value: null
- rule_id: k8s.network.change.audit_enabled
  for_each: k8s.network.list_service_for_all_namespaces
  severity: HIGH
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/change-audit-enabled
    op: is_true
    value: null
- rule_id: k8s.network.change.monitoring_enabled
  for_each: k8s.network.list_service_for_all_namespaces
  severity: MEDIUM
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/change-monitoring-enabled
    op: is_true
    value: null
- rule_id: k8s.network.changes.alerting_configured
  for_each: k8s.network.list_service_for_all_namespaces
  severity: MEDIUM
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/changes-alerting-configured
    op: exists
    value: null
- rule_id: k8s.network.changes.audit_enabled
  for_each: k8s.network.list_service_for_all_namespaces
  severity: HIGH
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/change-audit-enabled
    op: is_true
    value: null
- rule_id: k8s.network.changes.logged
  for_each: k8s.network.list_service_for_all_namespaces
  severity: MEDIUM
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/changes-logged
    op: exists
    value: null
- rule_id: k8s.network.changes.monitored
  for_each: k8s.network.list_service_for_all_namespaces
  severity: MEDIUM
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/change-monitoring-enabled
    op: is_true
    value: null
- rule_id: k8s.network.default.deny_egress
  for_each: k8s.network.list_network_policy_for_all_namespaces
  severity: MEDIUM
  conditions:
    all:
    - var: item.spec.egress
      op: exists
      value: null
    - var: item.spec.policyTypes
      op: contains
      value: Egress
- rule_id: k8s.network.encryption.in_transit_enabled
  for_each: k8s.network.list_service_for_all_namespaces
  severity: LOW
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/encryption-in-transit-enabled
    op: is_true
    value: null
- rule_id: k8s.network.external.access_restricted
  for_each: k8s.network.list_service_for_all_namespaces
  severity: HIGH
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/external-access-restricted
    op: exists
    value: null
- rule_id: k8s.network.flow.logging_enabled
  for_each: k8s.network.list_service_for_all_namespaces
  severity: MEDIUM
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/flow-logging-enabled
    op: is_true
    value: null
- rule_id: k8s.network.flow.logs_enabled
  for_each: k8s.network.list_service_for_all_namespaces
  severity: MEDIUM
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/flow-logging-enabled
    op: is_true
    value: null
- rule_id: k8s.network.ingress.ingress_controller_secure_enabled
  for_each: k8s.network.list_service_for_all_namespaces
  severity: MEDIUM
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/encryption-in-transit-enabled
    op: is_true
    value: null
- rule_id: k8s.network.ingress.tls_termination_enabled_enforced
  for_each: k8s.network.list_service_for_all_namespaces
  severity: HIGH
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/encryption-in-transit-enabled
    op: is_true
    value: null
- rule_id: k8s.network.internal.traffic_restricted
  for_each: k8s.network.list_network_policy_for_all_namespaces
  severity: MEDIUM
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/networkpolicy-restricted-to-security-services
    op: exists
    value: null
- rule_id: k8s.network.isolate.healthcare_clearinghouse
  for_each: k8s.network.list_network_policy_for_all_namespaces
  severity: LOW
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/networkpolicy-isolate-healthcare-clearinghouse-configured
    op: exists
    value: null
- rule_id: k8s.network.log.enabled
  for_each: k8s.network.list_service_for_all_namespaces
  severity: LOW
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/flow-logging-enabled
    op: is_true
    value: null
- rule_id: k8s.network.monitoring.alerts_configured
  for_each: k8s.network.list_service_for_all_namespaces
  severity: MEDIUM
  conditions:
    any:
    - var: item.metadata.annotations.cspm.k8s.io/anomaly-detection-enabled
      op: is_true
      value: null
    - var: item.metadata.annotations.cspm.k8s.io/change-audit-enabled
      op: is_true
      value: null
    - var: item.metadata.annotations.cspm.k8s.io/change-monitoring-enabled
      op: is_true
      value: null
    - var: item.metadata.annotations.cspm.k8s.io/changes-alerting-configured
      op: exists
      value: null
    - var: item.metadata.annotations.cspm.k8s.io/changes-audit-enabled
      op: is_true
      value: null
    - var: item.metadata.annotations.cspm.k8s.io/changes-logged
      op: exists
      value: null
    - var: item.metadata.annotations.cspm.k8s.io/changes-monitored
      op: exists
      value: null
- rule_id: k8s.network.monitoring.configured
  for_each: k8s.network.list_network_policy_for_all_namespaces
  severity: LOW
  conditions:
    all:
    - var: item.metadata.annotations.cspm.k8s.io/networkpolicy-dns-filtering-enabled
      op: is_true
      value: null
    - var: item.metadata.annotations.cspm.k8s.io/networkpolicy-encryption-in-transit-enabled
      op: is_true
      value: null
    - var: item.metadata.annotations.cspm.k8s.io/networkpolicy-rate-limiting-enabled
      op: is_true
      value: null
- rule_id: k8s.network.monitoring.logged
  for_each: k8s.network.list_service_for_all_namespaces
  severity: MEDIUM
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/flow-logging-enabled
    op: is_true
    value: null
- rule_id: k8s.network.networkpolicy.anomaly_detection_enabled
