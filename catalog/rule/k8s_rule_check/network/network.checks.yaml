    var: item.metadata.annotations.cspm.k8s.io/external-access-restricted
    op: exists
    value: null
- rule_id: k8s.network.restrict.ingress_ports
  for_each: k8s.network.list_service_for_all_namespaces
  severity: MEDIUM
  conditions:
    var: item.spec.ports[].port
    op: not_in
    value:
    - 22
    - 3389
    - 3306
    - 5432
    - 6379
    - 27017
    - 9200
    - 5601
    - 8080
    - 9090
