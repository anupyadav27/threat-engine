version: '1.0'
provider: k8s
service: network
checks:
- rule_id: k8s.network.ingress.tls_secret_configured
  for_each: k8s.network.list_ingress_for_all_namespaces
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: k8s.network.network_policy.ingress_restricted
  for_each: k8s.network.list_network_policy_for_all_namespaces
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: k8s.network.service.external_traffic_policy_configured
  for_each: k8s.network.list_service_for_all_namespaces
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
