version: '1.0'
provider: k8s
service: limitrange
checks:
- rule_id: k8s.limitrange.compute.default_cpu_limit_configured
  for_each: k8s.limitrange.list
  severity: MEDIUM
  conditions:
    var: item.spec.limits[].default.cpu
    op: exists
    value: null
- rule_id: k8s.limitrange.compute.default_memory_limit_configured
  for_each: k8s.limitrange.list
  severity: MEDIUM
  conditions:
    var: item.spec.limits[].default.memory
    op: exists
    value: null
- rule_id: k8s.limitrange.compute.max_cpu_limit_configured
  for_each: k8s.limitrange.list
  severity: LOW
  conditions:
    var: item.spec.limits[].max.cpu
    op: exists
    value: null
