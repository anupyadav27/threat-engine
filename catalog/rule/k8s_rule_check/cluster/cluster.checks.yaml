version: '1.0'
provider: k8s
service: cluster
checks:
- rule_id: k8s.cluster.autoscaler.enabled
  for_each: k8s.cluster.list_namespace
  severity: LOW
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/cluster-autoscaler-enabled
    op: is_true
    value: null
- rule_id: k8s.cluster.backup.and_restore_tested
  for_each: k8s.cluster.list_node
  severity: LOW
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/backup-and-restore-tested
    op: exists
    value: null
- rule_id: k8s.cluster.cluster.autoscaler_enabled
  for_each: k8s.cluster.list_namespace
  severity: LOW
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/cluster-autoscaler-enabled
    op: is_true
    value: null
- rule_id: k8s.cluster.cluster.component_network_isolation_enforced
  for_each: k8s.cluster.list_namespace
  severity: MEDIUM
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/autoscaler-enabled
    op: is_true
    value: null
- rule_id: k8s.cluster.daemonset.proxy_configuration_secured_enabled
  for_each: k8s.cluster.list_daemonset
  severity: LOW
  conditions:
    var: item.spec.template.spec.containers[].securityContext.allowPrivilegeEscalation
    op: is_false
    value: null
- rule_id: k8s.cluster.etcd.backup_encryption_enabled_enforced
  for_each: k8s.cluster.list_node
  severity: HIGH
  conditions:
    var: item.arguments.backup-encryption-enabled-enforced
    op: is_true
    value: null
- rule_id: k8s.cluster.etcd.etcd_peer_tls_enabled_enforced
  for_each: k8s.cluster.list_node
  severity: HIGH
  conditions:
    var: item.arguments.etcd-peer-tls-enabled-enforced
    op: is_true
    value: null
- rule_id: k8s.cluster.high.availability_configured
  for_each: k8s.cluster.list_node
  severity: LOW
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/high-availability-configured
    op: exists
    value: null
- rule_id: k8s.cluster.kubelet.kubelet_authentication_enabled_enforced
  for_each: k8s.cluster.list_node
  severity: HIGH
  conditions:
    var: item.arguments.kubelet-authentication-enabled-enforced
    op: is_true
    value: null
- rule_id: k8s.cluster.namespace.high_availability_enabled
  for_each: k8s.cluster.list_namespace
  severity: LOW
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/autoscaler-enabled
    op: is_true
    value: null
- rule_id: k8s.cluster.namespace.plane_patch_enforced
  for_each: k8s.cluster.list_namespace
  severity: LOW
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/autoscaler-enabled
    op: is_true
    value: null
- rule_id: k8s.cluster.namespace.review_scheduled
  for_each: k8s.cluster.list_namespace
  severity: LOW
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/autoscaler-enabled
    op: is_true
    value: null
- rule_id: k8s.cluster.namespace.supported_version_configured
  for_each: k8s.cluster.list_namespace
  severity: LOW
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/autoscaler-enabled
    op: is_true
    value: null
- rule_id: k8s.cluster.namespace.version_supported_configured
  for_each: k8s.cluster.list_namespace
  severity: LOW
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/autoscaler-enabled
    op: is_true
    value: null
- rule_id: k8s.cluster.node.tpm_verification_enabled_enforced
  for_each: k8s.cluster.list_node
  severity: LOW
  conditions:
    var: item.arguments.tpm-verification-enabled-enforced
    op: is_true
    value: null
- rule_id: k8s.cluster.pod.apiserver_insecure_bind_address_configured
  for_each: k8s.cluster.list_node
  severity: LOW
  conditions:
    var: item.arguments.apiserver-insecure-bind-address-configured
    op: not_exists
    value: null
- rule_id: k8s.cluster.pod.apiserver_profiling_disabled
  for_each: k8s.cluster.list_node
  severity: LOW
  conditions:
    var: item.arguments.apiserver-profiling-disabled
    op: is_true
    value: null
- rule_id: k8s.cluster.pod.plane_auto_upgrade_enabled
  for_each: k8s.cluster.list_node
  severity: LOW
  conditions:
    var: item.arguments.apiserver-profiling-disabled
    op: is_true
    value: null
- rule_id: k8s.cluster.pod.scheduler_profiling_disabled
  for_each: k8s.cluster.list_node
  severity: LOW
  conditions:
    var: item.arguments.scheduler-profiling-disabled
    op: is_true
    value: null
- rule_id: k8s.cluster.resource.monitoring_enabled
  for_each: k8s.cluster.list_namespace
  severity: MEDIUM
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/autoscaler-enabled
    op: is_true
    value: null
- rule_id: k8s.cluster.secret.enabled
  for_each: k8s.cluster.list_secret
  severity: LOW
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/secret-enabled
    op: is_true
    value: null
- rule_id: k8s.cluster.server.anonymous_access_disabled_enforced
  for_each: k8s.cluster.list_node
  severity: CRITICAL
  conditions:
    var: item.arguments.apiserver-insecure-bind-address-configured
    op: not_exists
    value: null
- rule_id: k8s.cluster.server.audit_logging_enabled_enforced
  for_each: k8s.cluster.list_node
  severity: HIGH
  conditions:
    var: item.arguments.apiserver-profiling-disabled
    op: is_true
    value: null
- rule_id: k8s.cluster.service.account_credentials_enabled
  for_each: k8s.cluster.list_node
  severity: LOW
  conditions:
    var: item.arguments.apiserver-insecure-bind-address-configured
    op: not_exists
    value: null
- rule_id: k8s.cluster.supported.version
  for_each: k8s.cluster.list_node
  severity: LOW
  conditions:
    var: item.arguments.apiserver-profiling-disabled
    op: is_true
    value: null
- rule_id: k8s.cluster.version.supported
  for_each: k8s.cluster.list_node
  severity: LOW
  conditions:
    var: item.arguments.k8s-version-supported
    op: is_true
    value: null
- rule_id: k8s.cluster.version.up_to_date
  for_each: k8s.cluster.list_node
  severity: LOW
  conditions:
    var: item.arguments.apiserver-profiling-disabled
    op: is_true
    value: null
