version: '1.0'
provider: k8s
service: cluster
checks:
- rule_id: k8s.cluster.api_server.allow_privileged_restricted
  for_each: k8s.cluster.list_node
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: k8s.cluster.pod_security_policy_configured
  for_each: k8s.cluster.list_node
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
