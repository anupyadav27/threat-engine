version: '1.0'
provider: k8s
service: compute
checks:
- rule_id: k8s.compute.node.rotate_kubelet_server_certificate_configured
  for_each: k8s.compute.list_computes
  severity: MEDIUM
  conditions:
    var: item.ssl_enabled
    op: is_true
- rule_id: k8s.container.image.baseline_approved_enforced
  for_each: k8s.container.list_containers
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
    op: is_true
- rule_id: k8s.container.node_auto_upgrade_enabled
  for_each: k8s.container.list_containers
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
    op: is_true
- rule_id: k8s.node.cni.file_permissions_restricted
  for_each: k8s.node.list_node
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: k8s.node.cni.version_configured
  for_each: k8s.node.list_node
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: k8s.node.file.ownership_configured
  for_each: k8s.node.list_node
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: k8s.node.file_permissions.proxy_configured
  for_each: k8s.node.list_node
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: k8s.node.file_system.client_ca_ownership_enforced
  for_each: k8s.node.list_node
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: k8s.node.file_system.ownership_configured
  for_each: k8s.node.list_node
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: k8s.node.file_system.certificate_authorities_permissions_restricted
  for_each: k8s.node.list_node
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: k8s.node.kubelet.hostname_override_configured
  for_each: k8s.node.list_node
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: k8s.node.kubelet.kubeconfig_ownership_enforced
  for_each: k8s.node.list_node
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: k8s.node.time_sync_configured
  for_each: k8s.node.list_node
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
