version: '1.0'
provider: k8s
service: etcd
checks:
- rule_id: k8s.etcd.auto.tls_check
  for_each: k8s.etcd.list_component_status
  severity: HIGH
  conditions:
    var: item.auto-tls-check
    op: is_false
    value: null
- rule_id: k8s.etcd.ca.uniqueness_check
  for_each: k8s.etcd.list_component_status
  severity: LOW
  conditions:
    var: item.ca-uniqueness-configured
    op: is_true
    value: null
- rule_id: k8s.etcd.encryption.at_rest_enabled
  for_each: k8s.etcd.list_component_status
  severity: LOW
  conditions:
    var: item.encryption-at-rest-enabled
    op: is_true
    value: null
- rule_id: k8s.etcd.encryption.enabled
  for_each: k8s.etcd.list_component_status
  severity: LOW
  conditions:
    var: item.encryption-at-rest-enabled
    op: is_true
    value: null
- rule_id: k8s.etcd.etcd.apiserver_ca_configured
  for_each: k8s.etcd.list_component_status
  severity: LOW
  conditions:
    var: item.arguments.trusted-ca-file
    op: exists
    value: null
- rule_id: k8s.etcd.etcd.auto_tls_configured
  for_each: k8s.etcd.list_component_status
  severity: HIGH
  conditions:
    var: item.arguments.auto-tls
    op: equals
    value: 'false'
- rule_id: k8s.etcd.etcd.ca_uniqueness_configured
  for_each: k8s.etcd.list_component_status
  severity: LOW
  conditions:
    var: item.ca-uniqueness-configured
    op: is_true
    value: null
- rule_id: k8s.etcd.etcd.encryption_at_rest_enabled
  for_each: k8s.etcd.list_component_status
  severity: HIGH
  conditions:
    var: item.encryption-at-rest-enabled
    op: is_true
    value: null
- rule_id: k8s.etcd.etcd.patch_enforced
  for_each: k8s.etcd.list_component_status
  severity: LOW
  conditions:
    var: item.arguments.client-cert-auth
    op: equals
    value: 'true'
- rule_id: k8s.etcd.etcd.peer_client_cert_auth_in_transit_enabled
  for_each: k8s.etcd.list_component_status
  severity: HIGH
  conditions:
    var: item.client-cert-auth-in-transit-enabled
    op: is_true
    value: null
- rule_id: k8s.etcd.etcd.pod_tls_encryption_configuration_configured
  for_each: k8s.etcd.list_component_status
  severity: HIGH
  conditions:
    all:
    - var: item.arguments.cert-file
      op: exists
      value: null
    - var: item.client-cert-auth-in-transit-enabled
      op: is_true
      value: null
- rule_id: k8s.etcd.peer.client_cert_auth_in_transit_enabled
  for_each: k8s.etcd.list_component_status
  severity: HIGH
  conditions:
    var: item.client-cert-auth-in-transit-enabled
    op: is_true
    value: null
- rule_id: k8s.etcd.peer.tls_configuration_check
  for_each: k8s.etcd.list_component_status
  severity: HIGH
  conditions:
    all:
    - var: item.arguments.client-cert-auth
      op: equals
      value: 'true'
    - var: item.arguments.auto-tls
      op: equals
      value: 'false'
- rule_id: k8s.etcd.peer.tls_in_transit_configuration
  for_each: k8s.etcd.list_component_status
  severity: HIGH
  conditions:
    all:
    - var: item.client-cert-auth-in-transit-enabled
      op: is_true
      value: null
    - var: item.arguments.auto-tls
      op: equals
      value: 'false'
- rule_id: k8s.etcd.pod.auto_tls_check
  for_each: k8s.etcd.list_component_status
  severity: HIGH
  conditions:
    var: item.arguments.auto-tls
    op: equals
    value: 'false'
- rule_id: k8s.etcd.pod.client_cert_auth_enabled
  for_each: k8s.etcd.list_component_status
  severity: HIGH
  conditions:
    var: item.client-cert-auth-enabled
    op: is_true
    value: null
- rule_id: k8s.etcd.pod.peer_auto_tls_disabled
  for_each: k8s.etcd.list_component_status
  severity: HIGH
  conditions:
    var: item.arguments.peer-auto-tls
    op: equals
    value: 'false'
- rule_id: k8s.etcd.pod.tls_encryption_configuration_check
  for_each: k8s.etcd.list_component_status
  severity: HIGH
  conditions:
    all:
    - var: item.certificate-configured
      op: is_true
      value: null
    - var: item.client-cert-auth-in-transit-enabled
      op: is_true
      value: null
- rule_id: k8s.etcd.secret.certificate_configured
  for_each: k8s.etcd.list_component_status
  severity: HIGH
  conditions:
    var: item.certificate-configured
    op: is_true
    value: null
- rule_id: k8s.etcd.server.ca_check
  for_each: k8s.etcd.list_component_status
  severity: LOW
  conditions:
    var: item.ca-check
    op: is_true
    value: null
- rule_id: k8s.etcd.snapshot.retention_policy_configured
  for_each: k8s.etcd.list_component_status
  severity: MEDIUM
  conditions:
    all:
    - var: item.arguments.snapshot-count
      op: exists
      value: null
    - var: item.arguments.snapshot-count
      op: gt
      value: '0'
- rule_id: k8s.etcd.tls.enabled
  for_each: k8s.etcd.list_component_status
  severity: LOW
  conditions:
    var: item.client-cert-auth-in-transit-enabled
    op: is_true
    value: null
- rule_id: k8s.etcd.tls.encryption_in_transit_check
  for_each: k8s.etcd.list_component_status
  severity: HIGH
  conditions:
    var: item.client-cert-auth-in-transit-enabled
    op: is_true
    value: null
- rule_id: k8s.etcd.unique.ca_certificate_check
  for_each: k8s.etcd.list_component_status
  severity: HIGH
  conditions:
    var: item.ca-uniqueness-configured
    op: is_true
    value: null
- rule_id: k8s.etcd.backup.encryption_enabled
  for_each: k8s.etcd.list_component_status
  severity: HIGH
  conditions:
    var: item.certificate-configured
    op: is_true
    value: null
