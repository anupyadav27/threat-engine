version: '1.0'
provider: k8s
service: etcd
checks:
- rule_id: k8s.etcd.data_directory.ownership_configured
  for_each: k8s.etcd.list_component_status
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: k8s.etcd.data_directory.permissions_configured
  for_each: k8s.etcd.list_component_status
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
