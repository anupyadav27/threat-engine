version: '1.0'
provider: k8s
service: kube_apiserver
checks:
- rule_id: k8s.kube_apiserver.argument.streaming_connection_idle_timeout_configured
  for_each: k8s.kube_apiserver.list_pods_kube_system
  severity: MEDIUM
  conditions:
    var: item.command
    op: contains
    value: --streaming-connection-idle-timeout
