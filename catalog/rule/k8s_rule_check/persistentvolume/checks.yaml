version: '1.0'
provider: k8s
service: persistentvolume
checks:
- rule_id: k8s.persistentvolume.encryption_enabled
  for_each: k8s.persistentvolume.list_persistent_volume
  severity: MEDIUM
  conditions:
    all:
    - var: item.metadata
      op: not_empty
      value: null
    - var: item.kms_key_id
      op: exists
      value: null
