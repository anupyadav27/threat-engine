version: '1.0'
provider: k8s
service: core
checks:
- rule_id: k8s.core.namespace.backup_label_configured
  for_each: k8s.core.list_cores
  severity: MEDIUM
  conditions:
    var: item.backup_enabled
    op: is_true
- rule_id: k8s.core.node.inventory_enabled
  for_each: k8s.core.list_cores
  severity: MEDIUM
  conditions:
    var: item.logging_enabled
    op: is_true
- rule_id: k8s.core.service_account.name_configured
  for_each: k8s.core.list_cores
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
