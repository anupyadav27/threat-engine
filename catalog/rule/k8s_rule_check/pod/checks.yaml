version: '1.0'
provider: k8s
service: pod
checks:
- rule_id: k8s.pod.required_labels_configured
  for_each: k8s.pod.list_pod_for_all_namespaces
  severity: MEDIUM
  conditions:
    var: item.metadata.labels
    op: is_true
- rule_id: k8s.pod.spec.containers_image_configured
  for_each: k8s.pod.list_pod_for_all_namespaces
  severity: MEDIUM
  conditions:
    var: item.status
    op: equals
    value: Active
