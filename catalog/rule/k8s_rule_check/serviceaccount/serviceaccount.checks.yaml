version: '1.0'
provider: k8s
service: serviceaccount
checks:
- rule_id: k8s.serviceaccount.permission.default_sa_not_used_for_workloads
  for_each: k8s.serviceaccount.list_service_accounts
  severity: MEDIUM
  conditions:
    var: item.metadata.name
    op: not_equals
    value: default
- rule_id: k8s.serviceaccount.token.automount_disabled
  for_each: k8s.core.serviceaccounts.list
  severity: MEDIUM
  conditions:
    var: item.automountServiceAccountToken
    op: is_false
    value: null
- rule_id: k8s.serviceaccount.token.no_long_lived_tokens
  for_each: k8s.core.list_service_accounts
  severity: MEDIUM
  conditions:
    var: item.AutomountServiceAccountToken
    op: is_false
    value: null
