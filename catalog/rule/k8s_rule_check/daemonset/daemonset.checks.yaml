version: '1.0'
provider: k8s
service: daemonset
checks:
- rule_id: k8s.daemonset.container.host_ipc_disabled
  for_each: k8s.daemonset.list
  severity: MEDIUM
  conditions:
    var: item.spec.template.spec.hostIPC
    op: is_false
    value: null
- rule_id: k8s.daemonset.container.host_network_disabled
  for_each: k8s.daemonset.list
  severity: HIGH
  conditions:
    var: item.spec.template.spec.hostNetwork
    op: is_false
    value: null
- rule_id: k8s.daemonset.container.host_pid_disabled
  for_each: k8s.daemonset.list
  severity: HIGH
  conditions:
    var: item.spec.template.spec.hostPID
    op: is_false
    value: null
- rule_id: k8s.daemonset.container.privileged_disabled
  for_each: k8s.daemonset.list
  severity: CRITICAL
  conditions:
    var: item.spec.template.spec.containers[].securityContext.privileged
    op: not_contains
    value: true
- rule_id: k8s.daemonset.container.resource_limits_configured
  for_each: k8s.daemonset.list
  severity: MEDIUM
  conditions:
    var: item.spec.template.spec.containers[].resources.limits
    op: not_empty
    value: null
- rule_id: k8s.daemonset.container.run_as_non_root_enabled
  for_each: k8s.daemonset.list_daemonsets
  severity: HIGH
  conditions:
    all:
    - var: item.spec.template.spec.containers[].securityContext.runAsNonRoot
      op: is_true
      value: null
