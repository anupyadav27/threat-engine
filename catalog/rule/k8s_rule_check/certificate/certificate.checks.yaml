version: '1.0'
provider: k8s
service: certificate
checks:
- rule_id: k8s.certificate.expiration.check
  for_each: k8s.certificate.list_certificate_signing_request
  severity: LOW
  conditions:
    var: item.spec.notAfter
    op: exists
    value: null
- rule_id: k8s.certificate.pod.expiration_configured
  for_each: k8s.certificate.list_certificate_signing_request
  severity: LOW
  conditions:
    var: item.spec.duration
    op: exists
    value: null
