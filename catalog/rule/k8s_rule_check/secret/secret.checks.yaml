version: '1.0'
provider: k8s
service: secret
checks:
- rule_id: k8s.secret.access.control_configured
  for_each: k8s.secret.list
  severity: LOW
  conditions:
    var: item.metadata.annotations."kubernetes.io/service-account.name"
    op: exists
    value: null
- rule_id: k8s.secret.backup.and_recovery_enabled
  for_each: k8s.secret.list_secrets
  severity: LOW
  conditions:
    all:
    - var: item.metadata.annotations.backup_enabled
      op: exists
      value: null
    - var: item.metadata.annotations.backup_enabled
      op: equals
      value: 'true'
    - var: item.metadata.annotations.recovery_enabled
      op: exists
      value: null
    - var: item.metadata.annotations.recovery_enabled
      op: equals
      value: 'true'
- rule_id: k8s.secret.backup.policy_configured
  for_each: k8s.secret.list
  severity: MEDIUM
  conditions:
    var: item.metadata.annotations.backup\.kubernetes\.io/backup-location
    op: exists
    value: null
- rule_id: k8s.secret.certificate.expiration_monitoring_enabled
  for_each: k8s.secret.list_secrets
  severity: MEDIUM
  conditions:
    all:
    - var: item.type
      op: equals
      value: kubernetes.io/tls
    - var: item.annotations."cert-manager.io/certificate-name"
      op: exists
      value: null
- rule_id: k8s.secret.certificate.revocation_list_configured
  for_each: k8s.secret.list
  severity: LOW
  conditions:
    var: item.data["revocation-list.crl"]
    op: exists
    value: null
- rule_id: k8s.secret.configmap.sensitive_data_prohibited_enforced
  for_each: k8s.secret.list_secrets
  severity: LOW
  conditions:
    var: item.Data
    op: not_exists
    value: null
- rule_id: k8s.secret.database.credentials_encrypted
  for_each: k8s.secret.list_secrets
  severity: HIGH
  conditions:
    var: item.type
    op: equals
    value: kubernetes.io/dockerconfigjson
- rule_id: k8s.secret.encryption.at_rest_enabled
  for_each: k8s.apiserver.describe_encryption_configuration
  severity: LOW
  conditions:
    var: item.resources[].resources
    op: contains
    value: secrets
- rule_id: k8s.secret.external.manager_configured
  for_each: k8s.secret.list
  severity: LOW
  conditions:
    var: item.metadata.annotations."external-secrets.io/secret-store-ref"
    op: exists
    value: null
- rule_id: k8s.secret.git.repo_url_no_sensitive_credentials
  for_each: k8s.secret.list_secrets
  severity: LOW
  conditions:
    all:
    - var: item.type
      op: equals
      value: kubernetes.io/dockerconfigjson
    - var: item.data[].dockerconfigjson
      op: not_contains
      value: git-https://
- rule_id: k8s.secret.key.rotation_policy_defined
  for_each: k8s.secret.list
  severity: MEDIUM
  conditions:
    var: item.metadata.annotations."kubernetes.io/secret-rotation-policy"
    op: exists
    value: null
- rule_id: k8s.secret.minimize.key_storage_locations
  for_each: k8s.secret.list_secrets
  severity: LOW
  conditions:
    var: item.metadata.annotations['kubectl.kubernetes.io/last-applied-configuration']
    op: not_exists
    value: null
- rule_id: k8s.secret.networkpolicy.dlp_policies_enforced
  for_each: k8s.networkpolicy.list_policies
  severity: LOW
  conditions:
    var: item.spec.ingress[].from[].namespaceSelector.matchLabels.dlp-policy
    op: exists
    value: null
- rule_id: k8s.secret.networkpolicy.gdpr_compliance_enabled
  for_each: k8s.networkpolicy.list_networkpolicies
  severity: LOW
  conditions:
    var: item.metadata.annotations['gdpr-compliance']
    op: exists
    value: null
- rule_id: k8s.secret.networkpolicy.transfer_controls_enabled
  for_each: k8s.networkpolicy.list_network_policies
  severity: LOW
  conditions:
    var: item.spec.egress[].ports[].port
    op: exists
    value: null
- rule_id: k8s.secret.no.sensitive_data_in_env
  for_each: k8s.secret.list_secrets
  severity: LOW
  conditions:
    var: item.data[].value
    op: not_contains
    value:
    - password
    - secret
    - key
    - token
    - credential
- rule_id: k8s.secret.not.in_env_variables
  for_each: k8s.core.list_pods
  severity: LOW
  conditions:
    all:
    - var: item.spec.containers[].env[].valueFrom.secretKeyRef
      op: not_exists
      value: null
- rule_id: k8s.secret.pod.labels_enforced_enabled
  for_each: k8s.core.list_secrets
  severity: LOW
  conditions:
    var: item.metadata.labels
    op: exists
    value: null
- rule_id: k8s.secret.rotation.policy_configured
  for_each: k8s.secret.list
  severity: MEDIUM
  conditions:
    var: item.metadata.annotations.secret-rotation-policy
    op: exists
    value: null
- rule_id: k8s.secret.secret.access_monitoring_enabled
  for_each: k8s.secret.list_secrets
  severity: MEDIUM
  conditions:
    var: item.metadata.annotations['kubernetes.io/created-by']
    op: exists
    value: null
- rule_id: k8s.secret.secret.auto_rotation_configured
  for_each: k8s.secret.list
  severity: LOW
  conditions:
    var: item.metadata.annotations['kubernetes.io/created-by']
    op: exists
    value: null
- rule_id: k8s.secret.secret.certificate_revocation_list_configured
  for_each: k8s.secret.list
  severity: HIGH
  conditions:
    var: item.data.certificate-revocation-list
    op: exists
    value: null
- rule_id: k8s.secret.secret.encryption_at_rest_enabled_enforced
  for_each: k8s.secret.list_secrets
  severity: HIGH
  conditions:
    var: item.encryptionConfig.resources[0]
    op: exists
    value: null
- rule_id: k8s.secret.secret.etcd_encryption_enabled_enforced
  for_each: k8s.secret.list_secrets
  severity: HIGH
  conditions:
    var: item.encryptionConfiguration.resources[]
    op: contains
    value: secrets
- rule_id: k8s.secret.secret.external_secret_operator_enabled
  for_each: k8s.secret.list_secrets
  severity: HIGH
  conditions:
    var: item.metadata.annotations.external-secrets.io/secret-store-ref
    op: exists
    value: null
- rule_id: k8s.secret.secret.git_repo_url_no_sensitive_credentials_configured
  for_each: k8s.secret.list
  severity: LOW
  conditions:
    all:
    - var: item.data
      op: exists
      value: null
    - var: item.data[].git_repo_url
      op: exists
      value: null
    - any:
      - var: item.data[].git_repo_url
        op: not_contains
        value: ://
      - all:
        - var: item.data[].git_repo_url
          op: contains
          value: ://
        - var: item.data[].git_repo_url
          op: not_contains
          value: '@'
- rule_id: k8s.secret.secret.hardcoded_secrets_scanned_enforced
  for_each: k8s.secret.list_secrets
  severity: HIGH
  conditions:
    var: item.data
    op: not_exists
    value: null
- rule_id: k8s.secret.secret.minimize_key_storage_locations_configured
  for_each: k8s.secret.list
  severity: LOW
  conditions:
    var: item.metadata.annotations['kubernetes.io/created-by']
    op: not_exists
    value: null
- rule_id: k8s.secret.secret.no_sensitive_data_in_env_configured
  for_each: k8s.secret.list
  severity: LOW
  conditions:
    all:
    - var: item.data
      op: exists
      value: null
    - var: item.data
      op: not_contains
      value: password
    - var: item.data
      op: not_contains
      value: secret
    - var: item.data
      op: not_contains
      value: key
    - var: item.data
      op: not_contains
      value: token
- rule_id: k8s.secret.secret.secret_rbac_configured_enforced
  for_each: k8s.rbac.list_role_bindings
  severity: HIGH
  conditions:
    all:
    - var: item.metadata.annotations['kubernetes.io/enforce']
      op: equals
      value: 'true'
    - var: item.rules[].resources
      op: contains
      value: secrets
- rule_id: k8s.secret.secret.secure_injection_enabled
  for_each: k8s.secret.list_secrets
  severity: LOW
  conditions:
    var: item.type
    op: equals
    value: kubernetes.io/tls
- rule_id: k8s.secret.secret.tls_certificates_expiration_configured
  for_each: k8s.secret.list
  severity: HIGH
  conditions:
    all:
    - var: item.type
      op: equals
      value: kubernetes.io/tls
    - var: item.data.tls.crt
      op: exists
      value: null
- rule_id: k8s.secret.secret.transmission_tls_enabled
  for_each: k8s.secret.list
  severity: HIGH
  conditions:
    var: item.type
    op: equals
    value: kubernetes.io/tls
- rule_id: k8s.secret.secret.unused_secrets_cleaned_enabled
  for_each: k8s.secret.list_secrets
  severity: HIGH
  conditions:
    var: item.metadata.annotations.kubernetes.io/created-by
    op: exists
    value: null
- rule_id: k8s.secret.tls.certificates_expiration_check
  for_each: k8s.secret.list_secrets
  severity: HIGH
  conditions:
    all:
    - var: item.type
      op: equals
      value: kubernetes.io/tls
    - var: item.data.tls.crt
      op: exists
      value: null
    - var: item.data.tls.crt
      op: not_expired
      value: 30
- rule_id: k8s.secret.transmission.tls_enabled
  for_each: k8s.secret.list_secrets
  severity: HIGH
  conditions:
    var: item.tls_enabled
    op: is_true
    value: null
