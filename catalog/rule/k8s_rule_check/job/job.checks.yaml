version: '1.0'
provider: k8s
service: job
checks:
- rule_id: k8s.job.container.host_network_disabled
  for_each: k8s.jobs.list
  severity: HIGH
  conditions:
    var: item.spec.template.spec.hostNetwork
    op: is_false
    value: null
- rule_id: k8s.job.container.privileged_disabled
  for_each: k8s.jobs.list
  severity: CRITICAL
  conditions:
    var: item.spec.template.spec.containers[].securityContext.privileged
    op: is_false
    value: null
- rule_id: k8s.job.container.resource_limits_configured
  for_each: k8s.job.list
  severity: MEDIUM
  conditions:
    var: item.spec.template.spec.containers[].resources.limits
    op: not_empty
    value: null
- rule_id: k8s.job.container.run_as_non_root_enabled
  for_each: k8s.job.list_jobs
  severity: HIGH
  conditions:
    var: item.spec.template.spec.containers[].securityContext.runAsNonRoot
    op: is_true
    value: null
