version: '1.0'
provider: k8s
service: control_plane
checks:
- rule_id: k8s.control_plane.kube_apiserver.event_qps_configured
  for_each: k8s.controlplane.list_component_status
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
- rule_id: k8s.control_plane.scheduler.file_ownership_enforced
  for_each: k8s.controlplane.list_component_status
  severity: MEDIUM
  conditions:
    var: item.enabled
    op: is_true
