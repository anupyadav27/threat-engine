version: '1.0'
provider: k8s
service: resourcequota
checks:
- rule_id: k8s.resourcequota.compute.cpu_limit_configured
  for_each: k8s.resourcequota.list
  severity: MEDIUM
  conditions:
    var: item.spec.hard.limits.cpu
    op: exists
    value: null
- rule_id: k8s.resourcequota.compute.memory_limit_configured
  for_each: k8s.resourcequota.list
  severity: MEDIUM
  conditions:
    var: item.spec.hard.limits.memory
    op: exists
    value: null
- rule_id: k8s.resourcequota.object.pod_count_limit_configured
  for_each: k8s.resourcequota.list
  severity: LOW
  conditions:
    var: item.spec.hard.pods
    op: exists
    value: null
