version: '1.0'
provider: k8s
service: policy
checks:
- rule_id: k8s.policy.capabilities.restriction_check
  for_each: k8s.policy.list_network_policy_for_all_namespaces
  severity: LOW
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/podsecuritypolicy-cis-benchmark-compliance-enabled
    op: is_true
    value: null
- rule_id: k8s.policy.control.mechanisms_check
  for_each: k8s.policy.list_network_policy_for_all_namespaces
  severity: LOW
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/control-mechanisms-check
    op: exists
    value: null
- rule_id: k8s.policy.namespace.resource_quotas_enforced
  for_each: k8s.policy.list_resource_quota_for_all_namespaces
  severity: LOW
  conditions:
    var: item.metadata.namespace
    op: exists
    value: null
- rule_id: k8s.policy.net.raw_capability_restricted
  for_each: k8s.policy.list_network_policy_for_all_namespaces
  severity: LOW
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/podsecuritypolicy-compliance-reporting-automated
    op: exists
    value: null
- rule_id: k8s.policy.podsecuritypolicy.automated_compliance_reporting_enabled
  for_each: k8s.policy.list_network_policy_for_all_namespaces
  severity: LOW
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/podsecuritypolicy-automated-compliance-reporting-enabled
    op: is_true
    value: null
- rule_id: k8s.policy.podsecuritypolicy.cis_benchmark_compliance_enabled
  for_each: k8s.policy.list_network_policy_for_all_namespaces
  severity: LOW
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/podsecuritypolicy-cis-benchmark-compliance-enabled
    op: is_true
    value: null
- rule_id: k8s.policy.podsecuritypolicy.compliance_reporting_automated
  for_each: k8s.policy.list_network_policy_for_all_namespaces
  severity: LOW
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/podsecuritypolicy-compliance-reporting-automated
    op: exists
    value: null
- rule_id: k8s.policy.podsecuritypolicy.gitops_integration_enabled
  for_each: k8s.policy.list_network_policy_for_all_namespaces
  severity: LOW
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/podsecuritypolicy-gitops-integration-enabled
    op: is_true
    value: null
- rule_id: k8s.policy.podsecuritypolicy.identity_verification_enabled
  for_each: k8s.policy.list_network_policy_for_all_namespaces
  severity: HIGH
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/podsecuritypolicy-automated-compliance-reporting-enabled
    op: is_true
    value: null
- rule_id: k8s.policy.podsecuritypolicy.risk_assessment_integrated_enabled
  for_each: k8s.policy.list_network_policy_for_all_namespaces
  severity: LOW
  conditions:
    var: item.metadata.annotations.cspm.k8s.io/podsecuritypolicy-risk-assessment-integrated-enabled
    op: is_true
    value: null
