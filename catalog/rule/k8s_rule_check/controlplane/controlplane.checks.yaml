version: '1.0'
provider: k8s
service: controlplane
checks:
- rule_id: k8s.controlplane.controller.manager_args_profiling_disabled
  for_each: k8s.controlplane.list_component_status
  severity: LOW
  conditions:
    var: item.arguments.profiling
    op: equals
    value: 'false'
- rule_id: k8s.controlplane.controller.manager_bind_address_localhost_check
  for_each: k8s.controlplane.list_component_status
  severity: LOW
  conditions:
    var: item.arguments.bind-address
    op: equals
    value: 127.0.0.1
- rule_id: k8s.controlplane.controller.manager_root_ca_file_verification
  for_each: k8s.controlplane.list_component_status
  severity: CRITICAL
  conditions:
    var: item.arguments.root-ca-file
    op: exists
    value: null
- rule_id: k8s.controlplane.controller.manager_rotate_kubelet_server_certificate_enabled
  for_each: k8s.controlplane.list_component_status
  severity: HIGH
  conditions:
    var: item.arguments.rotate-kubelet-server-certificate
    op: equals
    value: 'true'
- rule_id: k8s.controlplane.controller.manager_service_account_private_key_file_check
  for_each: k8s.controlplane.list_component_status
  severity: LOW
  conditions:
    var: item.arguments.service-account-private-key-file
    op: exists
    value: null
- rule_id: k8s.controlplane.controller.manager_terminated_pod_gc_threshold_check
  for_each: k8s.controlplane.list_component_status
  severity: LOW
  conditions:
    var: item.arguments.terminated-pod-gc-threshold
    op: exists
    value: null
- rule_id: k8s.controlplane.plane.patch_compliance
  for_each: k8s.controlplane.list_component_status
  severity: LOW
  conditions:
    var: item.arguments.profiling-disabled
    op: is_true
    value: null
- rule_id: k8s.controlplane.proxy.metrics_bind_address_localhost
  for_each: k8s.controlplane.list_component_status
  severity: LOW
  conditions:
    var: item.arguments.bind-address
    op: equals
    value: 127.0.0.1
- rule_id: k8s.controlplane.scheduler.profiling_disabled
  for_each: k8s.controlplane.list_component_status
  severity: LOW
  conditions:
    var: item.arguments.profiling-disabled
    op: is_true
    value: null
- rule_id: k8s.controlplane.server.audit_log_maxage_check
  for_each: k8s.controlplane.list_component_status
  severity: HIGH
  conditions:
    var: item.arguments.audit-log-maxage
    op: exists
    value: null
- rule_id: k8s.controlplane.server.service_account_key_file_set
  for_each: k8s.controlplane.list_component_status
  severity: LOW
  conditions:
    var: item.arguments.service-account-private-key-file
    op: exists
    value: null
- rule_id: k8s.controlplane.controller.use_service_account_credentials
  for_each: k8s.controlplane.list_component_status
  severity: HIGH
  conditions:
    var: item.arguments.use-service-account-credentials
    op: equals
    value: 'true'
