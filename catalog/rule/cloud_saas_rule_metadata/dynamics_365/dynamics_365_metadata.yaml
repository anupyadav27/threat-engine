  - rule_id: dynamics_365.cis.3.l2_ensure_environments_with_critical_data_are
    title: "(L2) Ensure 'Environments with Critical Data are Encrypted with Customer Managed Keys'"
    severity: medium
    category: cloud_saas
    tech_type: dynamics_365
    automation_type: manual
    cis_benchmark: "CIS_DYNAMICS_365 v1.0.0"
    cis_version: "v1.0.0"
    cis_control: "3.1"
    cis_section: "3"
    profile_applicability: "Level 2"
    description: >
      All environments of Microsoft Dataverse use SQL Server Transparent Data
      Encryption (TDE) to perform real-time encryption of data when written to disk,
      also known as encryption at rest. By default, Microsoft stores and manages the
      database encryption key for environments. The manage keys feature in the
      Microsoft Power Platform admin center gives administrators the ability to
      self-manage the database encryption key that is associated with the Dataverse
      tenant. Enable sensitive data encryption at rest using Customer Managed Keys
      rather than Microsoft Managed keys. Note: This feature is only available in
      tenants with 1,000 or more users. An exception to this recommendation will be
      needed for those tenants that have under 1,000 users.
    rationale: >
      By default, Microsoft stores and manages the database encryption key for
      organizational environments, so administrators don't have to. The manage keys
      feature in the Microsoft Power Platform admin center gives administrators the
      ability to self- manage the database encryption key that is associated with
      the Dataverse tenant. Impact: Using Customer Managed Keys may also incur
      additional man-hour requirements to create, store, manage, and protect the
      keys as needed. Note: It is strongly recommended that a copy of the encryption
      key is made and stored in a safe place. The key may need to be entered again
      to ensure that certain features keep working and the data is retrievable. For
      more information, see Data Encryption. Changing the encryption key can take a
      long time in a large database. Run this operation during off-peak hours if the
      system is busy or when working with a large amount of data. Note #2: This
      feature is only available in tenants with 1,000 or more users. An exception to
      this recommendation will be needed for those tenants that have under 1,000
      users.
    audit_procedure: >
      Ensure that Customer Managed Keys are utilized. In the Power Platform Admin
      Center: 1. Log in to https://admin.powerplatform.microsoft.com and select the
      appropriate environment. 2. Select Settings at the top of the screen. 3.
      Expand Encryption then select Data encryption A new window will open and may
      be slow to load 4. Ensure Encryption status is set to Active 5. Ensure self-
      managed encryption keys are utilized. 6. Click Close (data will not be re-
      encrypted).
    remediation: >
      Configure Customer Managed Keys. In the Power Platform Admin Center: 1. Log in
      to https://admin.powerplatform.microsoft.com and select the appropriate
      environment. 2. Select Settings at the top of the screen. 3. Expand Encryption
      then select Data encryption A new window will open and may be slow to load 4.
      Ensure Encryption status is set to Active 5. Under Change Encryption Key
      insert the new key followed by Change Note: It is important to safeguard the
      encryption key. 6. Click Close References: 1. https://docs.microsoft.com/en-
      us/power-platform/admin/data-encryption 2. https://docs.microsoft.com/en-
      us/power-platform/admin/manage-encryption-key
    references: >
      1. https://docs.microsoft.com/en-us/power-platform/admin/data-encryption 2.
      https://docs.microsoft.com/en-us/power-platform/admin/manage-encryption-key
    impact: >
      Using Customer Managed Keys may also incur additional man-hour requirements to
      create, store, manage, and protect the keys as needed. Note: It is strongly
      recommended that a copy of the encryption key is made and stored in a safe
      place. The key may need to be entered again to ensure that certain features
      keep working and the data is retrievable. For more information, see Data
      Encryption. Changing the encryption key can take a long time in a large
      database. Run this operation during off-peak hours if the system is busy or
      when working with a large amount of data. Note #2: This feature is only
      available in tenants with 1,000 or more users. An exception to this
      recommendation will be needed for those tenants that have under 1,000 users.
