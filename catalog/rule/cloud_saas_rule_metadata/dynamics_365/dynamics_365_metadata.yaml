  - rule_id: dynamics_365.cis.2.l2_ensure_access_to_the_environment_is_restricted
    title: "(L2) Ensure 'Access to the environment is restricted by location'"
    severity: medium
    category: cloud_saas
    tech_type: dynamics_365
    automation_type: manual
    cis_benchmark: "CIS_DYNAMICS_365 v1.0.0"
    cis_version: "v1.0.0"
    cis_control: "2.4"
    cis_section: "2"
    profile_applicability: "Level 2"
    description: >
      Location condition in Azure AD Conditional Access, controls access to cloud
      apps based on the network location of a user. The location condition is
      commonly used to block access from countries/regions where organizations know
      traffic should not come from. Restrict access to users by location to reduce
      unauthorized access.
    rationale: >
      Conditional access policies controls access to cloud apps based on the network
      location of a user. It then blocks access from countries/regions where it
      knows traffic should not come from reducing the risk of a breach. Impact: When
      location restrictions are set in a user’s profile and the user tries to sign
      in from a blocked location, access to customer engagement apps (Dynamics 365
      Sales, Dynamics 365 Customer Service, Dynamics 365 Field Service, Dynamics 365
      Marketing, Dynamics 365 Project Service Automation), and Finance and
      Operations apps are denied. Requirements for using conditional access: • A
      subscription to Azure Active Directory Premium. • A federated Azure Active
      Directory tenant.
    audit_procedure: >
      Verify that access to the environment is restricted by location. In the
      Microsoft 365 Admin Center: 1. Log in to https://admin.microsoft.com as a
      Global Administrator or Conditional Access administrator. 2. Go to Admin
      centers and click on Azure Active Directory. 3. Select Enterprise applications
      then, under Security, select Conditional Access. 4. Ensure a policy exists to
      restrict location.
    remediation: >
      Ensure access to the environment is restricted by location. In the Microsoft
      365 Admin Center: 1. Log in to https://admin.microsoft.com as a Global
      Administrator or Conditional Access administrator. 2. Go to Admin centers and
      click on Azure Active Directory. 3. Select Enterprise applications then, under
      Security, select Conditional Access. 4. Click New policy and create a name. 5.
      Go to Assignments > Users or workload identity > Users and groups > 6. Under
      Include > select All users (and do not exclude any user). 7. Under Exclude,
      select Users and groups, add the organizations emergency access or break-glass
      accounts. 8. Select Cloud apps or actions > Include and click Select apps 9.
      Choose Microsoft Dataverse Application or Microsoft Dynamics ERP for Finance
      and Operations application. 10. Select Conditions > Location configure to Yes
      11. Under Include select Selected locations a. Select the blocked location
      created for the organization. b. Click Select. 12. Select Access controls >
      click Block Access and click Select. 13. Confirm the settings and set Enable
      policy to Report-only. 14. Click Create to create and enable the policy.
      Default Value: N/A References: 1. https://docs.microsoft.com/en-
