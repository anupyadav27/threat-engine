  - rule_id: dynamics_365.cis.4.l1_ensure_system_administrator_security_role
    title: "(L1) Ensure 'System Administrator security role changes are reviewed periodically'"
    severity: high
    category: cloud_saas
    tech_type: dynamics_365
    automation_type: manual
    cis_benchmark: "CIS_DYNAMICS_365 v1.0.0"
    cis_version: "v1.0.0"
    cis_control: "4.1"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      Security roles define how different users access different types of records.
      To control access to data, security roles can be modified to create new
      security roles or change which security roles are assigned to each user. Each
      user can have multiple security roles and are cumulative meaning having more
      than one security role gives a user every privilege available in every role.
    rationale: >
      Illicit role group changes could give an attacker access to data that is
      privileged and perform tasks in the environment. Impact: None - there is no
      impact to users or the system.
    audit_procedure: >
      Verify which users have been added to the System Administrator Security Role.
      In the Power Platform Admin Center: 1. Log in to
      https://admin.powerplatform.microsoft.com and select the appropriate
      environment. 2. Select Edit on the Details pane of the environment. 3. Select
      Settings at the top of the window. 4. Expand Users + permissions then select
      Security roles. 5. Click on System Administrator (not the three dots and edit)
      6. Review the list of users
    remediation: >
      Ensure no unauthorized users have been added to the System Administrator
      Security Role. In the Power Platform Admin Center: 1. Log in to
      https://admin.powerplatform.microsoft.com and select the appropriate
      environment. 2. Select Edit on the Details pane of the environment. 3. Select
      Settings at the top of the window. 4. Expand Users + permissions then select
      Security roles. 5. Click on System Administrator (not the three dots and edit)
