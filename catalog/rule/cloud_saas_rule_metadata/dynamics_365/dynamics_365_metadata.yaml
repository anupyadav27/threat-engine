    profile_applicability: "Level 1"
    description: >
      Activity logging track changes to organizational data and maintain a log of
      those changes.
    rationale: >
      Enabling Power Platform Activity logging helps the security teams to
      investigate activities for regular security operational or forensic purposes.
      The auditing feature is designed to meet the auditing, compliance, security,
      and governance policies of many regulated enterprises. Impact: It is required
      to plan and evaluate the log size for impact to storage/costs.
    audit_procedure: >
      Verify that the Environment Activity logging is Enabled. In the Power Platform
      Admin Center: 1. Log in to https://admin.powerplatform.microsoft.com and
      select the appropriate environment. 2. Click Settings at the top of the
      window. 3. Expand Audit and logs then select Audit settings. 4. Ensure the
      following are set: a. Start Auditing b. Log access c. Read logs 5. Ensure that
      the retention for logs to the appropriate timeframe according to
      organizational policy.
    remediation: >
      Ensure that the Environment Activity logging is Enabled. In the Power Platform
      Admin Center: 1. Log in to https://admin.powerplatform.microsoft.com and
      select the appropriate environment. 2. Select Settings at the top of the
      window. 3. Expand Audit and logs then select Audit settings. 4. Select the
      following: a. Start b. Auditing Log access c. Read logs 5. Set the retention
      for logs to the appropriate timeframe according to organizational policy. 6.
      Click Save. Note: Logs are found in the Security and Compliance Center Default
      Value: Disabled. References: 1. https://docs.microsoft.com/en-us/power-
