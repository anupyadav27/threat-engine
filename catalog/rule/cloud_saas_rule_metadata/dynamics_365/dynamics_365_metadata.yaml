rules:

  - rule_id: dynamics_365.cis.1.l1_ensure_user_access_to_environments_is
    title: "(L1) Ensure 'User access to environments is controlled with Security Groups'"
    severity: high
    category: cloud_saas
    tech_type: dynamics_365
    automation_type: manual
    cis_benchmark: "CIS_DYNAMICS_365 v1.0.0"
    cis_version: "v1.0.0"
    cis_control: "1.1"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      If the organization has multiple Microsoft Dataverse environments, security
      groups can be used to control which licensed users can be a member of a
      particular environment.
    rationale: >
      Limiting the access and permissions for the accounts that needs access to the
      information, reduces the risk of having users with improper access to data in
      the environment. Impact: Users with legitimate needs to an environment might
      not be able to access the environment if they are not part of the correct
      security group.
    audit_procedure: >
      Verify that user access to environments is controlled with security groups. In
      the Power Platform Admin Center: 1. Log in to
      https://admin.powerplatform.microsoft.com and select the appropriate
      environment. 2. Select Edit on the Details pane of the environment. 3. Select
      the pencil icon under Security group. 4. Ensure the appropriate group(s) are
      selected.
    remediation: >
      Ensure that user access to environments is controlled with security groups. In
      the Power Platform Admin Center: 1. Log in to
      https://admin.powerplatform.microsoft.com and select the appropriate
      environment. 2. Select Edit on the Details pane of the environment. 3. Select
      the pencil icon under Security group. 4. Select the appropriate security
      group. 5. Select Done followed by Save. Default Value: N/A References: 1.
      https://docs.microsoft.com/en-us/power-platform/admin/control-user-access
    references: >
      1. https://docs.microsoft.com/en-us/power-platform/admin/control-user-access
    impact: >
      Users with legitimate needs to an environment might not be able to access the
      environment if they are not part of the correct security group.
    compliance_mappings:
      cis:
        - "CIS_DYNAMICS_365_v1_0_0_1_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
