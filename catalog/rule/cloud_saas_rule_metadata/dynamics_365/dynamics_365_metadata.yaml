  - rule_id: dynamics_365.cis.3.l1_ensure_extract_customer_data_privileges_from
    title: "(L1) Ensure 'Extract customer data privileges from Microsoft Dynamics 365 is controlled'"
    severity: high
    category: cloud_saas
    tech_type: dynamics_365
    automation_type: manual
    cis_benchmark: "CIS_DYNAMICS_365 v1.0.0"
    cis_version: "v1.0.0"
    cis_control: "3.2"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Ensure that privileges related to customer data extraction are well tailored
      for the business needs considering the minimum privileges required.
    rationale: >
      When users are able to export data deliberately, data governance and security
      can become an impossible activity and can also lead data leakage. Impact: If
      not configured correctly, users with need-to-know might not have access to the
      data.
    audit_procedure: >
      Ensure that the extract customer data privileges from Microsoft Dynamics 365
      controlled. In the Power Platform Admin Center: 1. Log in to
      https://admin.powerplatform.microsoft.com and select the appropriate
      environment. 2. Select Settings 3. Expand Users + permissions then click
      Security roles. 4. Select Edit under More Actions for each security role 5.
      Select the Business Management tab then review the permissions under Privacy
      Related Privileges. 6. Ensure that the appropriate privileges are assigned
      based on organizational policy.
    remediation: >
      To configure the extract customer data privileges from Microsoft Dynamics 365
      privilege, use the Power Platform Admin Center: 1. Log in to
      https://admin.powerplatform.microsoft.com and select the appropriate
      environment. 2. Select Settings 3. Expand Users + permissions then click
      Security roles. 4. Select Edit under More Actions for each security role 5.
      Select the Business Management tab then review the permissions under Privacy
      Related Privileges. 6. Enable or disable privilege based on organizational
      policy. Note: Enabling these privileges will allow users to extract customer
      data from Microsoft Dynamics 365. For more information, review the
      corresponding user documentation. References: 1.
      https://docs.microsoft.com/en-us/power-platform/admin/create-edit-security-
      role
    references: >
      1. https://docs.microsoft.com/en-us/power-platform/admin/create-edit-security-
      role
    impact: >
