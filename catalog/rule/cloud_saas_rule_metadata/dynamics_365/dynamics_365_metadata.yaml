    severity: high
    category: cloud_saas
    tech_type: dynamics_365
    automation_type: manual
    cis_benchmark: "CIS_DYNAMICS_365 v1.0.0"
    cis_version: "v1.0.0"
    cis_control: "2.3"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      This setting prevents the upload or download of certain attachment types that
      are considered dangerous.
    rationale: >
      Dynamics 365 comes with a predefined extensions list that is blocked in the
      tool; it is required to have it as restricted as possible, allowing just the
      extensions that are required for business purposes. Consider updating the
      blocked extensions periodically. Impact: File types that are legitimate might
      be blocked.
    audit_procedure: >
      Verify the 'Set blocked file extensions' is configured to match the
      organizations block list. In the Power Platform Admin Center: 1. Log in to
      https://admin.powerplatform.microsoft.com and select the appropriate
      environment. 2. Select Settings. 3. Expand Product then select Privacy +
      Security. 4. Review the list extensions to ensure it matches the organizations
      block list.
    remediation: >
      Ensure the 'Set blocked file extensions' is configured to match the
      organizations block list. In the Power Platform Admin Center: 1. Log in to
      https://admin.powerplatform.microsoft.com and select the appropriate
      environment. 2. Select Settings. 3. Expand Product then select Privacy +
      Security. 4. Add extensions as relevant to the organization. Default Value:
