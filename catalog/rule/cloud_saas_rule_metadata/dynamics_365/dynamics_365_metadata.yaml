  - rule_id: dynamics_365.cis.2.l1_ensure_cross_tenant_isolation_is_enabled_for
    title: "(L1) Ensure 'Cross-tenant isolation is enabled for Power Platform Apps and Flows'"
    severity: high
    category: cloud_saas
    tech_type: dynamics_365
    automation_type: manual
    cis_benchmark: "CIS_DYNAMICS_365 v1.0.0"
    cis_version: "v1.0.0"
    cis_control: "2.5"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Microsoft Power Platform has a rich ecosystem of connectors based on Azure
      Active Directory (Azure AD) that allow authorized Azure AD users to build
      compelling apps and flows establishing connections to the business data
      available through these data stores. Tenant isolation makes it easy for
      administrators to ensure that these connectors can be harnessed in a safe and
      secure way within the tenant while minimizing the risk of data exfiltration
      outside the tenant. Tenant isolation allows admins to effectively govern the
      movement of tenant data from Azure AD authorized data sources to and from
      their tenant. With tenant isolation On, all tenants are restricted. Inbound
      (connections to the tenant from external tenants) and outbound (connections
      from the tenant to external tenants) cross-tenant connections are blocked by
      Power Platform even if the user presents valid credentials to the Azure AD-
      secured data source. Rules can be used to add exceptions. Note: Power Platform
      tenant isolation is different from Azure AD-wide tenant restriction. It
      doesn't impact Azure AD-based access outside of Power Platform. Power Platform
      tenant isolation only works for connectors using Azure AD-based authentication
      such as Office 365 Outlook or SharePoint.
    rationale: >
      Cross-tenant isolation restricts how other tenants connect. Applied at the
      connector level, cross-tenant isolation blocks inbound or outbound connections
      for canvas apps and flows. An attacker can compromise an account and create a
      connection in order to maintain persistent access to the user’s account.
      Impact: Restricting outbound connections means that a user is blocked from
      connecting to a third-party tenant. (Restricting outbound cross-tenant
      connections can be done using tenant restrictions that apply to all Azure
      Active Directory (Azure AD) software as a service (SaaS) cloud apps, or at the
      connector level, which would block outbound connections just for canvas apps
      and flows.) Restricting inbound connections means that a user in a third-party
      tenant is blocked from creating a connection to the tenant. (Restricting
      inbound cross-tenant connections requires a support ticket—this restriction
      then only applies to Power Apps and Power Automate.) Enable the configurations
      below will prevent communication with any other tenant. Warning: Perform an
      impact analysis before implementation. Requirements for using cross-tenant
      isolation: • A subscription to Azure Active Directory Premium. • A federated
      Azure Active Directory tenant. Admins can specify an explicit allowlist of
      tenants that they want to enable inbound, outbound, or both, which will bypass
      tenant isolation controls when configured. Admins can use a special pattern
      “*” to allow all tenants in a specific direction when tenant isolation is
      turned on. All other cross-tenant connections except the ones in the allowlist
      are rejected by Power Platform.
    audit_procedure: >
      Verify that cross-tenant isolation is enabled. In the Power Platform Admin
      Center: • Log in to https://admin.powerplatform.microsoft.com and select the
      appropriate environment. • Select Tenant isolation (preview). • Confirm that
      tenant isolation is on.
    remediation: >
      Ensure that tenant restrictions for outbound connections are setup: There are
      two steps to get started with tenant restrictions. First, make sure that
      clients can connect to the right addresses. Second, configure proxy
      infrastructure. 1. URLs and IP addresses: a) To use tenant restrictions,
      clients must be able to connect to the following Azure AD URLs to
      authenticate: login.microsoftonline.com, login.microsoft.com, and
      login.windows.net. b) Additionally, to access Office 365, clients must also be
      able to connect to the fully qualified domain names (FQDNs), URLs, and IP
      addresses defined in Office 365 URLs and IP address ranges. 2. Proxy
      configuration and requirements: a) The following configuration is required to
      enable tenant restrictions through the proxy infrastructure. This guidance is
      generic, refer to the proxy vendor' documentation for specific implementation
      steps. b) Prerequisites: 1. The proxy must be able to perform TLS
      interception, HTTP header insertion, and filter destinations using FQDNs/URLs.
      2. Clients must trust the certificate chain presented by the proxy for TLS
      communications. For example, if certificates from an internal public key
      infrastructure (PKI) are used, the internal issuing root certificate authority
      certificate must be trusted. 3. Azure AD Premium 1 licenses are required for
      use of Tenant Restrictions. c) Configuration: 1. For each outgoing request to
      login.microsoftonline.com, login.microsoft.com, and login.windows.net, insert
      two HTTP headers: Restrict-Access-To-Tenants and Restrict-Access- Context.
      Note: Do not include subdomains under *.login.microsoftonline.com in the proxy
      configuration. Doing so will include device.login.microsoftonline.com and will
      interfere with Client Certificate authentication, which is used in Device
      Registration and Device- based Conditional Access scenarios. Configure the
      proxy server to exclude device.login.microsoftonline.com and
      enterpriseregistration.windows.net from TLS break-and-inspect and header
      injection. 3. The headers should include the following elements: 1. For
      Restrict-Access-To-Tenants, use a value of permitted tenant list, which is a
      comma-separated list of tenants that allow users to access. Any domain that is
      registered with a tenant can be used to identify the tenant in this list, as
      well as the directory ID itself. For an example of all three ways of
      describing a tenant, the name/value pair to allow Contoso, Fabrikam, and
      Microsoft looks like: Restrict-Access-To-Tenants:
      contoso.com,fabrikam.onmicrosoft.com,72f988bf-86f1-41af-91ab- 2d7cd011db47 2.
      For Restrict-Access-Context, use a value of a single directory ID, declaring
      which tenant is setting the tenant restrictions. Example: Declare Contoso as
      the tenant that set the tenant restrictions policy, the name/value pair looks
      like: Restrict-Access-Context: 456ff232-35l2-5h23-b3b3- 3236w0826f3d. Use the
      environments directory ID here to get logs for these authentications. If any
      directory ID other than the environments being set up, those sign-in logs will
      appear in another tenant, with all personal information removed. For more
      information, see Admin experience. To prevent users from inserting their own
      HTTP header with non-approved tenants, the proxy needs to replace the
      Restrict-Access-To-Tenants header if it is already present in the incoming
      request. Clients must be forced to use the proxy for all requests to
      login.microsoftonline.com, login.microsoft.com, and login.windows.net. For
      example, if PAC files are used to direct clients to use the proxy, end users
      shouldn't be able to edit or disable the PAC files. 4. Inbound Connections: 1.
      Browse to the Power Platform admin center, select Help + support. 2. Under the
      New support request option, fill out the information required regarding the
      environment. Default Value: Tenant isolation is not activated by default.
      References: 1. https://docs.microsoft.com/en-us/power-platform/admin/cross-
      tenant-restrictions 2. https://docs.microsoft.com/en-us/azure/active-
      directory/manage-apps/tenant- restrictions 3. https://docs.microsoft.com/en-
      us/azure/active-directory/manage-apps/tenant- restrictions#admin-experience 4.
      https://learn.microsoft.com/en-us/microsoft-365/enterprise/urls-and-ip-
      address- ranges?view=o365-worldwide 3 Data Management
    references: >
      1. https://docs.microsoft.com/en-us/power-platform/admin/cross-tenant-
      restrictions 2. https://docs.microsoft.com/en-us/azure/active-
      directory/manage-apps/tenant- restrictions 3. https://docs.microsoft.com/en-
      us/azure/active-directory/manage-apps/tenant- restrictions#admin-experience 4.
      https://learn.microsoft.com/en-us/microsoft-365/enterprise/urls-and-ip-
      address- ranges?view=o365-worldwide 3 Data Management
    impact: >
      Restricting outbound connections means that a user is blocked from connecting
      to a third-party tenant. (Restricting outbound cross-tenant connections can be
      done using tenant restrictions that apply to all Azure Active Directory (Azure
      AD) software as a service (SaaS) cloud apps, or at the connector level, which
      would block outbound connections just for canvas apps and flows.) Restricting
      inbound connections means that a user in a third-party tenant is blocked from
      creating a connection to the tenant. (Restricting inbound cross-tenant
      connections requires a support ticket—this restriction then only applies to
      Power Apps and Power Automate.) Enable the configurations below will prevent
      communication with any other tenant. Warning: Perform an impact analysis
      before implementation. Requirements for using cross-tenant isolation: • A
      subscription to Azure Active Directory Premium. • A federated Azure Active
      Directory tenant. Admins can specify an explicit allowlist of tenants that
      they want to enable inbound, outbound, or both, which will bypass tenant
      isolation controls when configured. Admins can use a special pattern “*” to
      allow all tenants in a specific direction when tenant isolation is turned on.
      All other cross-tenant connections except the ones in the allowlist are
      rejected by Power Platform.
    compliance_mappings:
      cis:
        - "CIS_DYNAMICS_365_v1_0_0_2_5"
      nist_800_53: []
      soc2: []
      pci_dss: []
