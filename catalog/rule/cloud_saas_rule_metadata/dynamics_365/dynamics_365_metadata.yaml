    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: dynamics_365.cis.1.l1_ensure_user_sessions_are_terminated_upon_time
    title: "(L1) Ensure 'User sessions are terminated upon time limit exceeded and user logoff'"
    severity: high
    category: cloud_saas
    tech_type: dynamics_365
    automation_type: manual
    cis_benchmark: "CIS_DYNAMICS_365 v1.0.0"
    cis_version: "v1.0.0"
    cis_control: "1.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      The Dynamics 365 platform can be configured with a user session expiration
      time and inactivity timeout. The recommended state for this setting is: 120
      minutes.
    rationale: >
      By default, the timeout for a user’s session is set to 24 hours which means
      the user is not required to re-enter their login details for up to 24 hours.
      Whenever a Dynamics 365 user sessions is started, a unique session ID and
      other session information are generated. Such information can be used be a
      malicious user to hijack the session. By terminating sessions upon user logoff
      and idle time limit, the underlying session information is invalidated.
      Therefore, the potential for the session to be hijacked is removed. Impact:
      User session will be terminated after two hours.
    audit_procedure: >
      Verify that user sessions are terminated upon user logoff and when the idle
      time limit is exceeded. In the Power Platform Admin Center: 1. Log in to
      https://admin.powerplatform.microsoft.com and select the appropriate
      environment. 2. Select Settings. 3. Expand Product then select Privacy +
      Security. 4. Under Session Expiration ensure the slider is set to On. Confirm
      the length and timeout as determined by organizational policy. 5. Under
      Inactivity timeout ensure the slider is set to On. Confirm the duration for
      timeout and warning as determined by organizational policy. 6. Click Save.
    remediation: >
      Ensure that user sessions are terminated upon user logoff and when the idle
      time limit is exceeded. In the Power Platform Admin Center: 1. Log in to
      https://admin.powerplatform.microsoft.com and select the appropriate
      environment. 2. Select Settings. 3. Expand Product then select Privacy +
      Security. 4. Under Session Expiration move the slider to On. Enter the session
      length and timeout as determined by organizational policy. 5. Under Inactivity
      timeout move the slider to On. Enter the duration for timeout and warning as
      determined by organizational policy. 6. Click Save. Note: These settings apply
      to all users in the environment. Default Value: • Maximum Session Length: 1440
      minutes • Minimum Session Length: 60 minutes • How long before session expires
      before showing timeout warning: 20 minutes • The updated settings will be
      effective the next time the user signs into the application. References: 1.
      https://docs.microsoft.com/en-us/power-platform/admin/user-session- management
    references: >
      1. https://docs.microsoft.com/en-us/power-platform/admin/user-session-
      management
    impact: >
      User session will be terminated after two hours.
    compliance_mappings:
      cis:
        - "CIS_DYNAMICS_365_v1_0_0_1_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_dynamics_365_v1_0_0_1_2"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: dynamics_365.cis.1.l1_ensure_administrative_accounts_are_separate
    title: "(L1) Ensure 'Administrative accounts are separate, unassigned, and cloud-only'"
    severity: high
    category: cloud_saas
    tech_type: dynamics_365
    automation_type: manual
    cis_benchmark: "CIS_DYNAMICS_365 v1.0.0"
    cis_version: "v1.0.0"
    cis_control: "1.3"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Administrative accounts are special privileged accounts that could have
      varying levels of access to data, users, and settings. Each system
      administrator should utilize two (2) separate accounts, an administrator
      account to perform administrative tasks and a separate account for daily
      activities such as checking email. Users should only sign in with system
      administrator account to perform administrative tasks in the environment.
    rationale: >
      Users with the system administrator role automatically have access to records,
      system, and custom entities. Creating separate administrative accounts can
      reduce the risk of credential theft and other types of attacks. Impact:
      Administrative users will have to switch accounts utilizing the login/logout
      functionality when performing administrative tasks.
    audit_procedure: >
      Verify there are separate administrative accounts being utilized. In the
      Microsoft 365 Admin Center: 1. Log in to https://admin.microsoft.com as a
      Global Administrator. 2. Select Users > Active users then sort by the User
      type column. 3. Verify that Administrators have a dedicated administrative and
      regular user account.
    remediation: >
      Ensure each administrator has an administrative and regular user account. In
      the Microsoft 365 Admin Center: 1. Log in to https://admin.microsoft.com as a
      Global Administrator. 2. Go to Users and then Active users and select Add a
      user. 3. Fill out the appropriate fields for Name, user, domain, password etc.
      4. When prompted to assign licenses select Create user without product license
      (not recommended), then click Next. 5. Under the Option settings choose Admin
      center access followed by the appropriate role then click Next. 6. Select
      Finish adding. Note: Take into account the proper and valid licensing
      requirements and attribute the security roles inside power platform with the
      least privilege approach. Default Value: N/A References: 1.
      https://docs.microsoft.com/en-us/power-platform/admin/create-users#create-a-
      user-account 2. https://docs.microsoft.com/en-us/power-platform/admin/prevent-
      elevation- security-role-privilege 3. https://docs.microsoft.com/en-
      us/microsoft-365/admin/add-users/add- users?view=o365-worldwide Additional
      Information: The following setting should also be considered: • Don’t stay
      signed in with a system administrator account Staying signed in with a system
      administrator account when specific administrative tasks are not being
      performed can increase exposure to phishing attacks. System administrators
      should sign in as needed to do specific tasks and then sign out.
    references: >
      1. https://docs.microsoft.com/en-us/power-platform/admin/create-
      users#create-a- user-account 2. https://docs.microsoft.com/en-us/power-
      platform/admin/prevent-elevation- security-role-privilege 3.
      https://docs.microsoft.com/en-us/microsoft-365/admin/add-users/add-
      users?view=o365-worldwide Additional Information: The following setting should
      also be considered: • Don’t stay signed in with a system administrator account
      Staying signed in with a system administrator account when specific
      administrative tasks are not being performed can increase exposure to phishing
      attacks. System administrators should sign in as needed to do specific tasks
      and then sign out.
    impact: >
      Administrative users will have to switch accounts utilizing the login/logout
      functionality when performing administrative tasks.
    compliance_mappings:
      cis:
        - "CIS_DYNAMICS_365_v1_0_0_1_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_dynamics_365_v1_0_0_1_3"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: dynamics_365.cis.1.l2_ensure_multifactor_authentication_for_all
    title: "(L2) Ensure 'Multifactor authentication for all users' is 'Enabled'"
    severity: medium
    category: cloud_saas
    tech_type: dynamics_365
    automation_type: manual
    cis_benchmark: "CIS_DYNAMICS_365 v1.0.0"
    cis_version: "v1.0.0"
    cis_control: "1.4"
    cis_section: "1"
    profile_applicability: "Level 2"
    description: >
      Enable multifactor authentication (MFA) for all users in the Microsoft 365
      tenant. MFA is an authentication method which requires the user to provide two
      (or more) pieces of information to gain access to the system or application.
      There are several options for MFA within the Microsoft 365 tenant: •
      Authentication code received via text message to a registered mobile phone
      number. • Mobile authentication application like Microsoft Authenticator.
    rationale: >
      Multifactor authentication requires an individual to present a minimum of two
      separate forms of authentication before access is granted. Multifactor
      authentication provides additional assurance that the individual attempting to
      gain access is who they claim to be. With multifactor authentication, an
      attacker would need to compromise at least two different authentication
      mechanisms, increasing the difficulty of compromise and thus reducing the
      risk. Users will be prompted to authenticate with a second factor upon logging
      in to Microsoft 365 services. Impact: Implementation of multifactor
      authentication for all users will necessitate a change to users' routine. All
      users will be required to enroll in multifactor authentication using a mobile
      phone or an authentication application. After enrollment, use of multifactor
      authentication will be required for future authentication to the environment.
    audit_procedure: >
      Verify the multifactor authentication is configured for all users. In the
      Microsoft 365 Admin Center: 1. Log in to https://admin.microsoft.com as a
      Global Administrator. 2. Go to Admin centers and click on Azure Active
      Directory. 3. Select Enterprise applications then, under Security, select
      Conditional Access. 4. Review the list of policies and ensure that there is a
      policy that requires the Grant access control with Require multi-factor
      authentication for All users under Users and groups Verify the multifactor
      authentication configuration for administrators, using the M365 SecureScore
      service: 1. Log in to the Secure Score portal https://security.microsoft.com
      as a Global Administrator or another custom admin role. 2. Click on Require
      MFA for all users policy to check MFA for all users. 3. It will show the
      number of users who do not have MFA configured. This information is also
      available via the Microsoft Graph Security API: GET
      https://graph.microsoft.com/beta/security/secureScores
    remediation: >
      Enable multifactor authentication for all users. In the Microsoft 365 Admin
      Center: 1. Log in to https://admin.microsoft.com as a Global Administrator. 2.
      Go to Admin centers and click on Azure Active Directory. 3. Select Enterprise
      applications then, under Security, select Conditional Access. 4. Click New
      policy 5. Select Cloud apps or actions > All cloud apps (and don't exclude any
      apps) 6. Go to Assignments > Users and groups > Include > select All users
      (and do not exclude any user). 7. Access Controls > Grant > Require multi-
      factor authentication (and nothing else) 8. Conditions > Client Apps >
      Configure (Yes) > Explicitly select Browser, Mobile apps and desktop clients,
      Modern authentication clients, Exchange ActiveSync clients, and Other clients
      9. Leave all other conditions blank 10. Make sure the policy is enabled 11.
      Create Default Value: Disabled References: 1. https://docs.microsoft.com/en-
      us/microsoft-365/admin/security-and- compliance/set-up-multi-factor-
      authentication?view=o365-worldwide
    references: >
      1. https://docs.microsoft.com/en-us/microsoft-365/admin/security-and-
      compliance/set-up-multi-factor-authentication?view=o365-worldwide
    impact: >
      Implementation of multifactor authentication for all users will necessitate a
      change to users' routine. All users will be required to enroll in multifactor
      authentication using a mobile phone or an authentication application. After
      enrollment, use of multifactor authentication will be required for future
      authentication to the environment.
    compliance_mappings:
      cis:
        - "CIS_DYNAMICS_365_v1_0_0_1_4"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_dynamics_365_v1_0_0_1_4"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: dynamics_365.cis.2.l1_ensure_creation_of_new_trial_production_and
    title: "(L1) Ensure 'Creation of new trial, production, and sandbox environments' is restricted to 'Administrators'"
    severity: high
    category: cloud_saas
    tech_type: dynamics_365
    automation_type: manual
    cis_benchmark: "CIS_DYNAMICS_365 v1.0.0"
    cis_version: "v1.0.0"
    cis_control: "2.1"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      An environment is a space to store, manage, and share organizational data,
      apps, and flows. It also serves as a container to separate apps that may have
      different roles, security requirements, or target audiences. Power Apps
      automatically creates a single default environment for each tenant, which is
      shared by all users in that tenant. For managing environments centrally and to
      prevent environment sprawl, it is suggested to limit the ability of
      environment creation to specific users.
    rationale: >
      Any PowerApps licensed user can create an environment. If someone in the
      organization is on a Power Apps or Power Automate per-user plan, they may have
      permission to create their own environment. These environments can be used and
      shared by Dynamics 365, Power Apps portals and apps, and Power Automate flows.
      Environments can store multiple Dataverse tables. Power Platform apps and
      Dynamics 365 can then connect to, read from, and write to these tables, which
      would likely be shared across multiple applications/processes. It is suggested
      to restrict the power platform environment creation for just administrators
      and restrict the access for this feature for a limited number of users.
      Impact: Enabling this feature may slow the user’s individual productivity, but
      could also prevent duplicated efforts, inconsistent data, scattered naming
      conventions, and data leakage. Note: After enabling this feature, only the
      Tenant Admin or members of the Power Platform Admin Group will be able to
      create new environments (if non-admins are disabled). Each environment
      requires 1GB of space before provisioning a new environment.
    audit_procedure: >
      Verify that the creation of new trial, production, and sandbox environment is
      restricted to administrators. In the Power Platform Admin Center: 1. Log in to
      https://admin.powerplatform.microsoft.com and select the appropriate
      environment. 2. Select the gear icon in the top right corner then select Power
      Platform Settings. 3. Under Who can create production and sandbox environments
      ensure that Only specific admins is selected. Note: This restricts creation to
      Global admins, Dynamics 365 service admins, Power Platform service admins, and
      Delegated admins. 4. Under Who can create trial environments ensure that Only
      specific admins is selected. Note: This restricts creation to Global admins,
      Dynamics 365 service admins, Power Platform service admins, and Delegated
      admins.
    remediation: >
      Ensure that the creation of new trial, production, and sandbox environment is
      restricted to administrators. In the Power Platform Admin Center: 1. Log in to
      https://admin.powerplatform.microsoft.com and select the appropriate
      environment. 2. Select the gear icon in the top right corner then select Power
      Platform Settings. 3. Under Who can create production and sandbox environments
      select Only specific admins. Note: This restricts creation to Global admins,
      Dynamics 365 service admins, Power Platform service admins, and Delegated
      admins 4. Under Who can create trial environments select Only specific admins.
      Note: This restricts creation to Global admins, Dynamics 365 service admins,
      Power Platform service admins, and Delegated admins 5. Click Save Default
      Value: Everyone / Unrestricted References: 1. https://docs.microsoft.com/en-
      us/power-platform/admin/control-environment- creation#control-environment-
      creation-through-powershell 2. https://docs.microsoft.com/en-us/power-
      platform/admin/create-environment
    references: >
      1. https://docs.microsoft.com/en-us/power-platform/admin/control-environment-
      creation#control-environment-creation-through-powershell 2.
      https://docs.microsoft.com/en-us/power-platform/admin/create-environment
    impact: >
      Enabling this feature may slow the user’s individual productivity, but could
      also prevent duplicated efforts, inconsistent data, scattered naming
      conventions, and data leakage. Note: After enabling this feature, only the
      Tenant Admin or members of the Power Platform Admin Group will be able to
      create new environments (if non-admins are disabled). Each environment
      requires 1GB of space before provisioning a new environment.
    compliance_mappings:
      cis:
        - "CIS_DYNAMICS_365_v1_0_0_2_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_dynamics_365_v1_0_0_2_1"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: dynamics_365.cis.2.l1_ensure_security_roles_provide_access_to_the
    title: "(L1) Ensure 'Security roles provide access to the minimum amount of business data required'"
    severity: high
    category: cloud_saas
    tech_type: dynamics_365
    automation_type: manual
    cis_benchmark: "CIS_DYNAMICS_365 v1.0.0"
    cis_version: "v1.0.0"
    cis_control: "2.2"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      Users should only have access to data that they really require access to. Make
      use of the predefined security roles whenever possible and assure the minimum
      privileges required for the roles and for the users to perform their
      activities.
    rationale: >
      Microsoft Dynamics 365 makes use of the Dataverse and role-based security
      model to help secure the access. It also comes with predefined security roles
      that can be used for granting user access. If the permission for a predefined
      role requires customization, copy one that exists and work under the copied
      role, keeping the integrity of the original role. It is important to apply the
      least privilege and need-to-know principle when customizing and granting users
      and roles permissions. Details in the reference links. Limiting the access and
      permissions for the accounts that needs access to the information, reduces the
      risk of having users with improper access to data in the environment and
      compromising the integrity/confidentiality of the data. Impact: If not
      configured correctly, users with need-to-know might not have access to
      business data.
    audit_procedure: >
      Ensure that user access to the environment is controlled with security groups.
      In the Power Platform Admin Center: 1. Log in to
      https://admin.powerplatform.microsoft.com and select the appropriate
      environment. 2. Select Settings. 3. Expand Users + permissions then select
      Security roles. 4. Analyze the predefined Security Roles to determine which
      fits the environmental needs. 5. Under the More actions click the 3 dots and
      select copy to audit the roles.
    remediation: >
      Change user roles to meet environment needs via security groups. In the Power
      Platform Admin Center: 1. Log in to https://admin.powerplatform.microsoft.com
      and select the appropriate environment. 2. Select Settings. 3. Expand Users +
      permissions then select Security roles. 4. Edit the Security Role to fit
      environmental needs. References: 1. https://learn.microsoft.com/en-
      us/dynamics365/customerengagement/on- premises/developer/security-dev/how-
      role-based-security-control-access- entities?view=op-9-1
    references: >
      1. https://learn.microsoft.com/en-us/dynamics365/customerengagement/on-
      premises/developer/security-dev/how-role-based-security-control-access-
      entities?view=op-9-1
    impact: >
      If not configured correctly, users with need-to-know might not have access to
      business data.
    compliance_mappings:
      cis:
        - "CIS_DYNAMICS_365_v1_0_0_2_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_dynamics_365_v1_0_0_2_2"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: dynamics_365.cis.2.l1_ensure_set_blocked_file_extensions_is
