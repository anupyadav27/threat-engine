  - rule_id: dynamics_365.cis.4.l1_ensure_app_creation_notification_is_enabled_in
    title: "(L1) Ensure 'App creation notification is enabled in the environment'"
    severity: high
    category: cloud_saas
    tech_type: dynamics_365
    automation_type: manual
    cis_benchmark: "CIS_DYNAMICS_365 v1.0.0"
    cis_version: "v1.0.0"
    cis_control: "4.3"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      App creation alerting can be used to inform admins and stakeholders about
      specific events, or provide a summary of activity in the environment.
    rationale: >
      Alerting on the creation of apps allows for administrators to look for risky
      apps that users have created that could cause data spillage or accidental
      elevation of privilege. Impact: Alerts will be sent to an individual(s) and
      could be high in volume. Note: Audit logging must be enabled.
    audit_procedure: >
      Verify that App creation notifications are set to enabled. In the Microsoft
      365 Security & Compliance Center: • Log in to the Microsoft 365 Security &
      Compliance Center https://compliance.microsoft.com/ as a tenant Administrator.
      • Go to Policies > Alert Policy. • Verify a policy exists for app creation
      notification.
    remediation: >
      Ensure that App creation notifications are set to enabled. In the Microsoft
      365 Security & Compliance Center: • Log in to the Microsoft 365 Security &
      Compliance Center https://compliance.microsoft.com/ as a tenant Administrator.
      • Go to Policies > Alert Policy > +New Alert policy. • Name policy and select
      the Severity and Category for the policy. • In the Activity section scroll
      down to PowerApps app or search for Publish. • Name the alert and select users
      (emails) to send alerts to. Ensure that a notification is triggered when a new
      app is created in the environment. Default Value: N/A References: 1.
