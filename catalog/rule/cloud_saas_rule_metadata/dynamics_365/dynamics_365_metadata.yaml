      rem; scf; scr; sct; shb; shs; shtm; shtml; soap; stm; tmp; url; vb; vbe; vbs;
      vsmacros; vss; vst; vsw; ws; wsc; wsf; wsh References: 1.
      https://docs.microsoft.com/en-us/power-platform/admin/settings-privacy-
      security
    references: >
      1. https://docs.microsoft.com/en-us/power-platform/admin/settings-privacy-
      security
    impact: >
