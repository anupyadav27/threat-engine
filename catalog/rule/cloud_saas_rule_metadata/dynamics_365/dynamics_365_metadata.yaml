  - rule_id: dynamics_365.cis.3.l1_ensure_dynamics_365_restricts_incoming_email
    title: "(L1) Ensure 'Dynamics 365 restricts incoming email actions for public queue mailboxes'"
    severity: high
    category: cloud_saas
    tech_type: dynamics_365
    automation_type: manual
    cis_benchmark: "CIS_DYNAMICS_365 v1.0.0"
    cis_version: "v1.0.0"
    cis_control: "3.3"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Microsoft Dynamics 365 can be used in Outlook to track email messages,
      contacts, tasks, and appointments. When an email message, contact, task, or
      appointment record is tracked, a copy of that record is saved as an activity
      in Dynamics 365 for Customer Engagement and synchronized with the Outlook
      record. This can be viewed and edited in Dynamics 365 for Outlook or Customer
      Engagement. If Outlook is synced to a mobile device, the mobile device will
      also have access to these records. Options to automatically track email
      messages: Email messages from Dynamics 365 apps Leads, Contacts, and Accounts:
      Tracks email messages only if they originate from someone with a Dynamics 365
      for Customer Engagement lead, contact, or account record. The recommended
      state for this setting is: Email messages from Dynamics 365 apps Leads,
      Contacts, and Accounts
    rationale: >
      An unauthenticated attacker can create arbitrary contacts and email activities
      within the Dynamics 365 system. This can lead to several problems of varying
      severity: • Spam and reduction of data quality. • Denial of Service (DoS). •
      Sophisticated attacks aiming at human error. For example, an attacker may
      create a new contact that has the same name as an already existing contact. •
      A Dynamics 365 application user may accidentally choose the attacker-
      controlled contact for communication instead of the legitimate one and thereby
      cause exposure of sensitive information. If possible, emails should only be
      converted to Dynamics 365 entities when the sender address is known or
      considered trustworthy. Impact: Emails from a trustworthy entity might not be
      converted to Dynamics 365.
    audit_procedure: >
      Verify that the option Email messages from Dynamics 365 apps Leads, Contacts,
      and Accounts is selected. In the Power Platform Admin Center: 1. Log in to
      https://admin.powerplatform.microsoft.com and select the appropriate
      environment. 2. Select Settings at the top. 3. Expand Business followed by
      Queues. This will open in a new window. 4. Click on the email boxes to modify.
      5. Under EMAIL SETTINGS ensure that the Email messages from Dynamics 365
      Leads, Contacts, and Accounts options is selected.
    remediation: >
      Ensure that the option Email messages from Dynamics 365 apps Leads, Contacts,
      and Accounts selected. In the Power Platform Admin Center: 1. Log in to
      https://admin.powerplatform.microsoft.com and select the appropriate
      environment. 2. Select Settings at the top. 3. Expand Business followed by
      Queues This will open in a new window. 4. Click on the email boxes to modify.
      5. Under EMAIL SETTINGS set Convert Incoming Email to Activities to Email
      messages from Dynamics 365 Leads, Contacts, and Accounts 6. Click Save. Note:
      Avoid setting the option to All email messages as Dynamics 365 apps will track
      junk mail as well as business conversations. Default Value: By default, email
      in the “Sent Items” folder within Outlook will not automatically appear as
      tracked in Dynamics 365. References: 1. https://docs.microsoft.com/en-
      us/dynamics365/outlook-addin/user-guide/set- option-automatically-track-
      incoming-outlook-email 2. https://docs.microsoft.com/en-
      us/dynamics365/outlook-addin/user- guide/overview-tracking-records
    references: >
      1. https://docs.microsoft.com/en-us/dynamics365/outlook-addin/user-guide/set-
      option-automatically-track-incoming-outlook-email 2.
      https://docs.microsoft.com/en-us/dynamics365/outlook-addin/user-
      guide/overview-tracking-records
    impact: >
      Emails from a trustworthy entity might not be converted to Dynamics 365.
    compliance_mappings:
      cis:
        - "CIS_DYNAMICS_365_v1_0_0_3_3"
      nist_800_53: []
      soc2: []
      pci_dss: []
    source_unique_id: "cis_dynamics_365_v1_0_0_3_3"
    metadata_source: generated
    generated_by: generate_tech_rules

  - rule_id: dynamics_365.cis.3.l1_ensure_dlp_policies_are_enabled_and_restrict
    title: "(L1) Ensure 'DLP policies are enabled and restrict the connectors usage'"
    severity: high
    category: cloud_saas
    tech_type: dynamics_365
    automation_type: manual
    cis_benchmark: "CIS_DYNAMICS_365 v1.0.0"
    cis_version: "v1.0.0"
    cis_control: "3.4"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Power Platform data loss prevention policies (DLP) act as guardrails to help
      prevent users from unintentionally exposing organizational data. These data
      loss prevention policies enforce rules for which connectors can be used
      together in apps and flows. The policies can be scoped to one environment,
      many environments, or tenant-wide
    rationale: >
      Power Apps and automation are becoming increasingly connected across multiple
      data sources and multiple services. Some of these might be external, third-
      party services and might even include some social networks. Users generally
      have good intentions, but they can easily overlook the potential for exposure
      from data leakage to services and audiences that shouldn't have access to the
      data. Categorize the data connectors into one of three data groups, 'Business
      data only', 'No business data allowed' and “Blocked”. Users will be prevented
      from creating flows and apps that combine connectors from the 'Business data
      only' and 'No business data allowed' data groups and also will not have access
      to connectors blocked. Impact: Enabling a Power Platform DLP policy will
      restrict the connectors usage in the environment. Always ensure to follow
      appropriate procedures in regard to testing and implementation of DLP policies
      based on the business needs.
    audit_procedure: >
      Verify DLP policies are enabled. In the Power Platform Admin Center: 1. Log in
      to https://admin.powerplatform.microsoft.com. 2. Expand Policies in the left
      pane then select Data policies 3. Verify that organizational policies are set
      and applied.
    remediation: >
      Ensure DLP policies are enabled. In the Power Platform Admin Center: 1. Log in
      to https://admin.powerplatform.microsoft.com. 2. Expand Policies in the left
      pane then select Data policies. 3. Click New Policy to initiate the policy
      wizard. 4. Name the policy, then click next. 5. At the Custom Connectors
      choose which connectors should fit in every data group: 1. Business 2. Non-
      business (Default) 3. Blocked 4. Ignore. 6. For the Scope ensure to select all
      applicable environments. 7. Click Create policy. Default Value: By default, no
      DLP policies are implemented in the tenant. References: 1.
      https://docs.microsoft.com/en-us/power-platform/guidance/adoption/dlp-strategy
      2. https://docs.microsoft.com/en-us/power-platform/admin/wp-data-loss-
      prevention 3. https://docs.microsoft.com/en-us/power-platform/admin/create-
      dlp-policy
    references: >
      1. https://docs.microsoft.com/en-us/power-platform/guidance/adoption/dlp-
      strategy 2. https://docs.microsoft.com/en-us/power-platform/admin/wp-data-
      loss-prevention 3. https://docs.microsoft.com/en-us/power-
      platform/admin/create-dlp-policy
    impact: >
      Enabling a Power Platform DLP policy will restrict the connectors usage in the
      environment. Always ensure to follow appropriate procedures in regard to
      testing and implementation of DLP policies based on the business needs.
    compliance_mappings:
      cis:
        - "CIS_DYNAMICS_365_v1_0_0_3_4"
