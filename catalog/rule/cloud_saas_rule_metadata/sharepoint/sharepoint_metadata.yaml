  - rule_id: sharepoint.cis.2.sharepoint_setup_account_is_configured_with_the
    title: "Ensure the SharePoint setup account is configured with the minimum privileges in Active Directory."
    severity: high
    category: cloud_saas
    tech_type: sharepoint
    automation_type: manual
    cis_benchmark: "CIS_SHAREPOINT 2019_v1.0.0"
    cis_version: "2019_v1.0.0"
    cis_control: "2.3"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The SharePoint setup account must be configured with the minimum privileges in
      Active Directory.
    rationale: >
      Separation of duties is a prevalent Information Technology control implemented
      at different layers of the information system including the operating system
      and in applications. It serves to eliminate or reduce the possibility that a
      single user may carry out a prohibited action. Separation of duties requires
      the person accountable for approving an action not be the same person who is
      tasked with implementing the action. This requirement is intended to limit
      exposure due to user accounts being used to operate from within a privileged
      account or role. Limiting the access and permissions of privileged accounts to
      the minimum required, reduces exposure if the account is compromised and
      provides forensic history of activity when operating from these accounts. This
      policy limits the setup account privileges in AD. However, default permissions
      for this account are configured by the SharePoint Products Configuration
      Wizard during product installation. This account is referred to during the
      installation as the 'Database Access' account. By default, the account is used
      as the service account for the SharePoint Timer Service and the SharePoint
      Central Administration Web Site Application Pool. These settings should not be
      changed. Furthermore, this account should not be used as the service account
      for non-privileged services, applications, or application pools. NOTE: The
      setup account does need to be a member of the local Administrators group on
      the SharePoint server for installation and configuration.
    audit_procedure: >
      Review the SharePoint server configuration to ensure the setup account is
      configured with the minimum privileges in Active Directory. Verify the account
      has least privilege in Active Directory. 1. Navigate to Active Directory Users
      and Computers > Users. 22 | P a g e 2. Double click on the setup user account
      to view the account properties. 3. Select the Members of tab and verify this
      account is a member of the Domain Users group only. 4. Select the other tabs
      in this area to verify no other services or permissions are configured for
      this account.
    remediation: >
      1. Navigate to Active Directory Users and Computers > Users. 2. Double click
      on the setup user account to view the account properties. 3. Select the
      Members of tab and remove and group that is not Domain Users. 4. Select the
      other tabs in this area to verify no other services or permissions are
      configured for this account. References: 1. https://technet.microsoft.com/en-
      us/library/cc678863(v=office.16).aspx#Section2
