  - rule_id: sharepoint.cis.7.the_maxzoneparts_setting_for_web_parts_is
    title: "Ensure that the MaxZoneParts setting for Web Parts is configured"
    severity: high
    category: cloud_saas
    tech_type: sharepoint
    automation_type: manual
    cis_benchmark: "CIS_SHAREPOINT 2019_v1.0.0"
    cis_version: "2019_v1.0.0"
    cis_control: "7.1"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      Limit the number of web parts in SharePoint to a minimum value that is needed.
    rationale: >
      A user can create too many personal views. With personal views, SharePoint
      actually adds each view as a web part on the page. If a user has 10 personal
      views, there are actually 10 web parts on the page. 9 of those web parts are
      hidden depending on the personal view selected. When SharePoint reaches the
      default maximum of 50 web parts on the page, it will throw an error.
    audit_procedure: >
      Navigate to the IIS Manager on the Web Front End (WFE) servers 1. Click on the
      Sites folder. 2. Highlight the site (web application). 3. On the right-hand
      navigation bar, Click on Explore. 4. Open the web.config file with Notepad. 5.
      Find the following phrase: <WebPartLimits MaxZoneParts='50'
      PropertySize='1048576'/>. 6. Verify the value for MaxZoneParts is configured.
      7. Repeat for the remaining Web Front End servers.
    remediation: >
      Navigate to the IIS Manager on the Web Front End (WFE) servers 1. Click on the
      Sites folder. 2. Highlight the site (web application). 3. On the right-hand
      navigation bar, Click on Explore. 4. Open the web.config file with Notepad. 74
      | P a g e 5. Find the following phrase: <WebPartLimits MaxZoneParts='50'
      PropertySize='1048576'/>. 6. Change the value for MaxZoneParts to a minimum
      allowed value. 7. Save the file. 8. Open a command prompt as Administrator and
      type in iisreset to restart IIS. 9. Repeat for the remaining Web Front End
      servers. Impact: SharePoint will throw errors if the number of web parts is
      not limited. Default Value: 50 web parts per page References: 1.
      https://docs.microsoft.com/en-us/SharePoint/security-for-sharepoint-
      server/security-hardening
    references: >
      1. https://docs.microsoft.com/en-us/SharePoint/security-for-sharepoint-
      server/security-hardening
