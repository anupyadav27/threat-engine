  - rule_id: sharepoint.cis.3.sharepoint_identifies_data_type_specification_and
    title: "Ensure SharePoint identifies data type, specification, and usage when transferring information between different security domains so policy restrictions may be applied."
    severity: high
    category: cloud_saas
    tech_type: sharepoint
    automation_type: manual
    cis_benchmark: "CIS_SHAREPOINT 2019_v1.0.0"
    cis_version: "2019_v1.0.0"
    cis_control: "3.4"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      SharePoint must identify data type, specification, and usage when transferring
      information between different security domains so policy restrictions may be
      applied.
    rationale: >
      Information flow control regulates where information is allowed to travel
      within an information system and between information systems (as opposed to
      who is allowed to access the information) and without explicit regard to
      subsequent accesses to that information. Flow control is based on the
      characteristics of the information and/or the information path. Applications
      providing flow control must identify data type, specification, and usage when
      transferring information between different security domains so policy
      restrictions may be applied. A security domain is defined as a domain
      implementing a security policy and administered by a single authority. Data
      type, specification, and usage includes using file naming to reflect the type
      of data being transferred and limiting data transfer based on file type.
    audit_procedure: >
      Review the SharePoint server configuration to ensure data type, specification,
      and usage when transferring information between different security domains are
      identified so policy restrictions may be applied. An IRM must be enabled in
      SharePoint. The Windows Rights Management Services (RMS) (or a comparable IRM
      product) can either be located through Active Directory or specified. 1. In
      Central Administration, click on Security. 2. On the Security page, in the
      Information policy list, click Configure information rights management. 42 | P
      a g e If Do not use IRM on this server is selected, or if a configuration
      error message is displayed (such as ... IRM will not work until the client is
      configured properly), this is a finding.
    remediation: >
      1. In Central Administration, click on Security. 2. On the Security page, in
      the Information policy list, click Configure information rights management. 3.
      Ensure Do not use IRM on this server is not selected.
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
