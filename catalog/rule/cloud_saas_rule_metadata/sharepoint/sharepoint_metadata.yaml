  - rule_id: sharepoint.cis.2.dbcreator_and_securityadmin_roles_are_only_used
    title: "Ensure Dbcreator and Securityadmin roles are only used as needed"
    severity: high
    category: cloud_saas
    tech_type: sharepoint
    automation_type: manual
    cis_benchmark: "CIS_SHAREPOINT 2019_v1.0.0"
    cis_version: "2019_v1.0.0"
    cis_control: "2.8"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      In certain situations, database administrators (DBAs) may want to operate
      independently from SharePoint 2016 administrators and create and manage all
      the databases. This is typical in IT environments where security requirements
      and company policies require a separation of administrator roles. The farm
      administrator provides SharePoint 2016 database requirements to the DBA, who
      then creates the necessary databases and sets up the logins that are required
      for the farm.
    rationale: >
      The ability to grant access to the database engine and to configure user
      permissions allows the securityadmin to assign most server permissions. You
