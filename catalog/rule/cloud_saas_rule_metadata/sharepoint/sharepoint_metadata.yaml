  - rule_id: sharepoint.cis.2.blocked_file_types_is_configured_to_match_the
    title: "Ensure 'Blocked File Types' is configured to match the enterprise blacklist"
    severity: high
    category: cloud_saas
    tech_type: sharepoint
    automation_type: manual
    cis_benchmark: "CIS_SHAREPOINT 2019_v1.0.0"
    cis_version: "2019_v1.0.0"
    cis_control: "2.1"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      A common tactic of malware is to identify the type of malicious code
      protection software running on the system and deactivate it. Malicious code
      includes viruses, worms, Trojan horses, and Spyware.
    rationale: >
      Malicious code protection software must be protected to prevent a non-
      privileged user or malicious piece of software from disabling the protection
      mechanism.
    audit_procedure: >
      Review the SharePoint server configuration to ensure non-privileged users are
      prevented from circumventing malicious code protection capabilities. Confirm
      that the list of blocked file types configured in Central Administration
      matches the enterprise 'blacklist'. Navigate to Central Administration. 1.
      Click Security, and then click Define blocked file types. 2. To change the web
      application, click the link next to Web Application: and then click Change Web
      Application. 3. In the Select Web Application dialog, click an app. 4. On the
      Blocked File Types page compare the list of blocked file types to those listed
      in the enterprise blacklist. 5. Repeat check for each web application.
    remediation: >
      Navigate to Central Administration. 1. Click Security, and then click Define
      blocked file types. 2. To change the web application, click the link next to
      Web Application: and then click Change Web Application. 18 | P a g e 3. In the
      Select Web Application dialog, click an app. 4. On the Blocked File Types page
      to add a file to block, type a file extension (with the period), one per line.
      5. Add all file types listed in the enterprise blacklist. 6. Repeat check for
      each web application. References: 1. https://support.office.com/en-
      us/article/Types-of-files-that-cannot-be-added-to-a- list-or-
      library-30be234d-e551-4c2a-8de8-f8546ffbf5b3?ui=en-US&rs=en-
