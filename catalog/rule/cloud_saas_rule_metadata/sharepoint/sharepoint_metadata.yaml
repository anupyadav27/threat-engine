  - rule_id: sharepoint.cis.3.sharepoint_implements_an_information_system
    title: "Ensure SharePoint implements an information system isolation boundary that minimizes the number of non-security functions included within the boundary containing security functions."
    severity: high
    category: cloud_saas
    tech_type: sharepoint
    automation_type: manual
    cis_benchmark: "CIS_SHAREPOINT 2019_v1.0.0"
