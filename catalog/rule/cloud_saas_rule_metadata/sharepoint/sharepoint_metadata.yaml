  - rule_id: sharepoint.cis.6.the_sql_server_component_to_sharepoint_is_set_to
    title: "Ensure that the SQL Server component to SharePoint is set to listen on non-default ports, with the defaults (UDP 1434 and TCP 1433) disabled"
    severity: high
    category: cloud_saas
    tech_type: sharepoint
    automation_type: manual
    cis_benchmark: "CIS_SHAREPOINT 2019_v1.0.0"
    cis_version: "2019_v1.0.0"
    cis_control: "6.1"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      The default instance of SQL Server listens for client requests on TCP 1433. By
      default, client computers that connect to SQL Server first connect by using
      TCP 1433. If this communication is unsuccessful, the client computers query
      the SQL Server Resolution Service that is listening on UDP 1434 to determine
      the port on which the database instance is listening.
    rationale: >
      The default port-communication behavior of SQL Server introduces several
      issues that affect server hardening. First, the ports used by SQL Server are
      well-publicized ports and the SQL Server Resolution Service has been the
      target of buffer overrun attacks and denial- of-service attacks, including the
      'Slammer' worm virus. Even if SQL Server is updated to mitigate security
      issues in the SQL Server Resolution Service, the well-publicized ports remain
      a target. Second, if databases are installed on a named instance of SQL
      Server, the corresponding communication port is randomly assigned and can
      change. This behavior can potentially prevent server-to-server communication
      in a hardened environment.
    audit_procedure: >
      1. Verify that the User account that is performing this procedure is a member
      of either the sysadmin or the serveradmin fixed server role. 2. Navigate to
      SQL Server Configuration Manager on the computer that is running SQL Server.
      3. Expand SQL Server Network Configuration in the navigation pane. 4. Click
      the corresponding entry for the instance that you are examining. The default
      instance is listed as Protocols for MSSQLSERVER. Named instances will appear
      as Protocols for named_instance. 5. Right-click TCP/IP in the main window in
      the Protocol Name column, 6. Click on Properties. 67 | P a g e 7. Click on the
      IP Addresses tab. For every IP address that is assigned to the computer that
      is running SQL Server, there is a corresponding entry on this tab. By default,
      SQL Server listens on all IP addresses that are assigned to the computer. To
      globally examine the port that the default instance is listening on, follow
      these steps: 1. For each IP address except IPAll, examine all values for both
      TCP dynamic ports and TCP Port. 2. For IPAll, examine the value for TCP
      dynamic ports. To globally examine the port that a named instance is listening
      on, follow these steps: 1. For each IP address including IPAll, examine all
      values for TCP dynamic ports. A value of 0 for this field indicates that SQL
      Server uses a dynamic TCP port for the IP address. A blank entry for this
      value means that SQL Server will not use a dynamic TCP port for the IP
      address.
    remediation: >
      1. Verify that the User account that is performing this procedure is a member
      of either the sysadmin or the serveradmin fixed server role. 2. Navigate to
      SQL Server Configuration Manager on the computer that is running SQL Server.
      3. Expand SQL Server Network Configuration in the navigation pane. 4. Click
      the corresponding entry for the instance that you are examining. The default
      instance is listed as Protocols for MSSQLSERVER. Named instances will appear
      as Protocols for named_instance. 5. Right-click TCP/IP in the main window in
      the Protocol Name column, 6. Click on Properties. 7. Click on the IP Addresses
      tab. For every IP address that is assigned to the computer that is running SQL
      Server, there is a corresponding entry on this tab. By default, SQL Server
      listens on all IP addresses that are assigned to the computer. To globally
      examine the port that the default instance is listening on, follow these
      steps: 1. For each IP address except IPAll, examine all values for both TCP
      dynamic ports and TCP Port and confirm UDP 1434 and TCP 1433 are blocked. 2.
      For IPAll, examine the value for TCP dynamic ports and confirm UDP 1434 and
      TCP 1433 are blocked. 68 | P a g e Default Value: No ports are blocked.
      References: 1. https://technet.microsoft.com/en-us/library/cc262849.aspx
    references: >
      1. https://technet.microsoft.com/en-us/library/cc262849.aspx
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_SHAREPOINT_2019_v1_0_0_6_1"
      nist_800_53: []
      soc2: []
      pci_dss: []
