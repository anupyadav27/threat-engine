  - rule_id: sharepoint.cis.3.sharepoint_is_set_to_reject_or_delay_network
    title: "Ensure that SharePoint is set to reject or delay network traffic generated above configurable traffic volume thresholds."
    severity: high
    category: cloud_saas
    tech_type: sharepoint
    automation_type: manual
    cis_benchmark: "CIS_SHAREPOINT 2019_v1.0.0"
    cis_version: "2019_v1.0.0"
    cis_control: "3.7"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      SharePoint must reject or delay, as defined by the organization, network
      traffic generated above configurable traffic volume thresholds.
    rationale: >
      It is critical when a system is at risk of failing to process audit logs as
      required; actions are automatically taken to mitigate the failure or risk of
      failure. One method used to thwart the auditing system is for an attacker to
      attempt to overwhelm the auditing system with large amounts of irrelevant
      data. Consequently, either audit logs are being overwritten or disk space is
      being exhausted. In such cases, activity is either being erased from the logs
      or not recorded at all due to the lack of disk space. In many system
      configurations, the disk space allocated to the auditing system is separate
      from the disks allocated for the operating system; therefore, this may not
      result in a system outage.
    audit_procedure: >
      Access the Internet Information Services Manager on the appropriate SharePoint
      server. 1. For each site IIS site subject to user traffic, select the site. 2.
      Click Advanced Settings. 3. Expand Connection Limits. 4. Ensure the following
      settings possess a value: • Connection Time-Out • Maximum Bandwidth • Maximum
      Concurrent Connections 5. Repeat steps for each site subject to user traffic.
      48 | P a g e
    remediation: >
      Access the Internet Information Services Manager on the appropriate SharePoint
      server. 1. For each site IIS site subject to user traffic, select the site. 2.
      Click Advanced Settings. 3. Expand Connection Limits. 4. Ensure the following
      settings possess a value: • Connection Time-Out • Maximum Bandwidth • Maximum
      Concurrent Connections 5. Repeat steps for each site subject to user traffic.
    references: >
      
    impact: >
      
