      page. The available web parts are displayed in the Web Parts Gallery, which is
      a collection of web parts located on the internet. The Online Gallery could
      contain Web Parts from unknown third parties, which could increase the risk of
      a malicious code execution attack. Preventing users from accessing the Online
      Web Part Gallery decreases the system's attack surface.
