  - rule_id: sharepoint.cis.2.sharepoint_farm_service_account_database_access
    title: "Ensure the SharePoint farm service account (database access account) is configured with the minimum privileges for the local server."
    severity: high
    category: cloud_saas
    tech_type: sharepoint
    automation_type: manual
    cis_benchmark: "CIS_SHAREPOINT 2019_v1.0.0"
    cis_version: "2019_v1.0.0"
    cis_control: "2.2"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The SharePoint farm service account (database access account) must be
      configured with the minimum privileges for the local server.
    rationale: >
      Separation of duties is a prevalent Information Technology control implemented
      at different layers of the information system including the operating system
      and in applications. It serves to eliminate or reduce the possibility that a
      single user may carry out a prohibited action. Separation of duties requires
      the person accountable for approving an action not be the same person who is
      tasked with implementing the action. This requirement is intended to limit
      exposure due to user accounts being used to operate from within a privileged
      account or role. Limiting the access and permissions of privileged accounts to
      the minimum required, reduces exposure if the account is compromised and
      provides forensic history of activity when operating from these accounts. This
      policy limits the Farm Account privileges in AD. However, default permissions
      for this account are configured by the SharePoint Products Configuration
      Wizard during product installation. This account is referred to during the
      installation as the Database Access account. By default, the account is used
      as the service account for the SharePoint Timer Service and the SharePoint
      Central Administration Web Site Application Pool. These settings should not be
      changed. Furthermore, this account should not be used as the service account
      for non-privileged services, applications, or application pools.
    audit_procedure: >
      Review the SharePoint server configuration to verify the farm service account
      (database access account) is configured with the minimum privileges for the
      local server. 1. On the server(s) where the SharePoint software is installed,
      navigate to Server Manager > Local Users and Groups. 20 | P a g e 2. Select
      the Member of tab and verify this account is only a member of the
      WSS_RESTRICTED_WP, WSS_ADMIN_WPG, and WSS_WPG groups. 3. Select the other tabs
      in this area to verify no other services or permissions are configured for
      this account. If the farm service account is a member of any other groups than
      WSS_RESTRICTED_WPG, WSS_ADMIN_WPG, or WSS_WPG on the local server where
      SharePoint is installed, this is a finding.
    remediation: >
      1. On the server(s) where the SharePoint software is installed, navigate to
      Server Manager > Local Users and Groups. 2. Select the Member of tab and
      ensure this account is only a member of the WSS_RESTRICTED_WPG, WSS_ADMIN_WPG,
      and WSS_WPG groups. 3. Select the other tabs in this area to ensure there are
      no other services or permissions are configured for this account. References:
      1. https://technet.microsoft.com/en-us/library/cc678863(v=office.16).aspx
    references: >
      1. https://technet.microsoft.com/en-us/library/cc678863(v=office.16).aspx
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_SHAREPOINT_2019_v1_0_0_2_2"
      nist_800_53: []
      soc2: []
      pci_dss: []
