  - rule_id: sharepoint.cis.3.sharepoint_is_configured_with_strict_browser_file
    title: "Ensure that SharePoint is configured with 'Strict' browser file handling settings"
    severity: high
    category: cloud_saas
    tech_type: sharepoint
    automation_type: manual
    cis_benchmark: "CIS_SHAREPOINT 2019_v1.0.0"
    cis_version: "2019_v1.0.0"
    cis_control: "3.6"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      SharePoint must prevent the execution of prohibited mobile code.
    rationale: >
      Decisions regarding the utilization of mobile code within organizational
      information systems need to include evaluations that help determine the
      potential for the code to cause damage to the system if used maliciously.
      Mobile code technologies include, for example, Java, JavaScript, ActiveX, PDF,
      Postscript, Shockwave movies, Flash animations, and VBScript. Usage
      restrictions and implementation guidance apply to both the selection and use
      of mobile code installed on organizational servers and mobile code downloaded
      and executed on individual workstations. Applications can prevent the
      execution of prohibited mobile code by leveraging architectures that provide a
      virtual execution environment sometimes referred to as a 'sandbox'. The mobile
      code is executed within this isolated environment apart from the host's
      indigenous operating environment that allows for mobile code capability
      restrictions and helps to prevent malicious code from accessing system
      resources and data. The application must prevent the execution of prohibited
      mobile code.
    audit_procedure: >
      1. Navigate to Central Administration website. 2. Navigate to Application
      Management > Manage Web Applications. 3. For each Web Application in the Farm:
      • Click on the Web Application to configure. • Click on the drop-down box
      below General Settings. • Click on General Settings in the drop down box. •
      Under Browser File Handling, verify that Strict is selected.
    remediation: >
      1. Navigate to Central Administration website. 46 | P a g e 2. Navigate to
      Application Management > Manage Web Applications. 3. For each Web Application
      in the Farm: • Click on the Web Application to configure. • Click on the drop-
      down box below General Settings. • Click on General Settings in the drop down
      box. • Under Browser File Handling, select Strict.
