      Security For each web application in the web application section, perform the
      following: • Select the correct web application in the web application
      section. • Select the 'Prevents users from accessing the Online Web Part
      Gallery, and helps to improve security and performance' option in the Online
      Web Part Gallery section. References: 1. https://docs.microsoft.com/en-
