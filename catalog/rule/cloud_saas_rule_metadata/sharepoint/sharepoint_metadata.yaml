  - rule_id: sharepoint.cis.2.a_separate_organizational_unit_ou_in_active
    title: "Ensure a separate organizational unit (OU) in Active Directory exists for SharePoint 2019 objects."
    severity: high
    category: cloud_saas
    tech_type: sharepoint
    automation_type: manual
    cis_benchmark: "CIS_SHAREPOINT 2019_v1.0.0"
    cis_version: "2019_v1.0.0"
    cis_control: "2.6"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      SharePoint 2019 includes an internal service, the Microsoft SharePoint
      Directory Management Service, for creating e-mail distribution groups. When
      you configure e-mail integration, you have the option to enable the Directory
      Management Service feature, which lets users create distribution lists. When
      users create a SharePoint group and they select the option to create a
      distribution list, the Microsoft SharePoint Directory Management Service
      creates the corresponding Active Directory distribution list in the Active
      Directory environment.
    rationale: >
      The recommendation is to set up a separate organizational unit (OU) in Active
      Directory for SharePoint 2019 objects. Only this OU should allow write access
      to the account that is used by the Microsoft SharePoint Directory Management
      Service.
    audit_procedure: >
      1. Open Active Directory Users and Computers on a domain controller within the
      Active Directory domain used for SharePoint. 2. Validate there is a separate
      OU created for use only with SharePoint 2019 objects. 3. Validate that only
      the account used for the Microsoft SharePoint Directory Management Servers has
      write access to that OU.
    remediation: >
      1. Open Active Directory Users and Computers on a domain controller within the
      Active Directory domain used for SharePoint. 2. Validate there is a separate
      OU created for use only with SharePoint 2019 objects, if there is not a
      separate OU create one. 3. Modify the separate OU so that only the account
      used for the Microsoft SharePoint Directory Management Servers has write
      access to that OU. References: 1. https://technet.microsoft.com/en-
      us/library/cc262849(v=office.16).aspx 28 | P a g e
