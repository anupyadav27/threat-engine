  - rule_id: sharepoint.cis.7.sharepoint_callstack_and_allowpageleveltrace
    title: "Ensure the SharePoint CallStack and AllowPageLevelTrace 'SafeMode' parameters are set to false"
    severity: high
    category: cloud_saas
    tech_type: sharepoint
    automation_type: manual
    cis_benchmark: "CIS_SHAREPOINT 2019_v1.0.0"
    cis_version: "2019_v1.0.0"
    cis_control: "7.4"
    cis_section: "7"
    profile_applicability: "Level 1"
    description: >
      The CallStack and PageLevelTrace parameters are used when debugging a problem
      and displays detailed additional information.
    rationale: >
      The detailed additional information provided by the CallStack and
      PageLevelTrace parameters can be used by a malicious actor to gain sensitive
      information about the system parameters and application.
    audit_procedure: >
      Locate the Web.configfile in your application root directory and open it.
      Verify the following SafeMode entry in the Web.config file: 1. Verify
      parameter CallStack='false'. 2. Verify parameter AllowPageLevelTrace='false'.
      3. Close the Web.config file without saving it.
    remediation: >
      Locate the Web.configfile in your application root directory and edit it. Edit
      the following SafeMode entry in the Web.config file: 1. Edit parameter
      CallStack='false'. 2. Edit parameter AllowPageLevelTrace='false'. 3. Close the
      Web.config file and save it. Impact: System sensitive information can be
      compromised. References: 1. https://technet.microsoft.com/en-
      us/library/cc262849(v=office.16).aspx 80 | P a g e
    references: >
      1. https://technet.microsoft.com/en-us/library/cc262849(v=office.16).aspx 80 |
      P a g e
    impact: >
      System sensitive information can be compromised.
