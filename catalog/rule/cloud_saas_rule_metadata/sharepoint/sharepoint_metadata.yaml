  - rule_id: sharepoint.cis.3.sharepoint_database_servers_are_segregated_from
    title: "Ensure SharePoint database servers are segregated from application server and placed in a secure zone."
    severity: high
    category: cloud_saas
    tech_type: sharepoint
    automation_type: manual
    cis_benchmark: "CIS_SHAREPOINT 2019_v1.0.0"
    cis_version: "2019_v1.0.0"
    cis_control: "3.10"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Segregating the SharePoint database server from the application server
      provides a layered defense architecture.
    rationale: >
      A layered defense architecture provides additional security and reduces the
      attack vector of an environment. When the SharePoint database server is
      segregated from the application server only specific ports can be opened from
      the application server to the database server reducing the attack vector and
      access to the critical data stored on the SharePoint database.
    audit_procedure: >
      Review the SharePoint server architecture and identify if the SharePoint
      database server is segregated and placed in a secure network zone.
    remediation: >
      Review the SharePoint server architecture and move the SharePoint database
      server in a secure network zone. Only open the specific ports required from
      the application server to the database server. Impact: A malicious actor could
      gain access to the SharePoint database server and extract the sensitive
      information stored in the database. References: 1.
      https://technet.microsoft.com/en-us/library/hh292622.aspx
    references: >
      1. https://technet.microsoft.com/en-us/library/hh292622.aspx
    impact: >
      A malicious actor could gain access to the SharePoint database server and
      extract the sensitive information stored in the database.
