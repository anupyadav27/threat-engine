    cis_control: "3.2"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      Review the SharePoint server configuration to ensure an information system
      isolation boundary that minimizes the number of non-security functions
      included within the boundary containing security functions are implemented.
    rationale: >
      The information system isolates security functions from non-security functions
      by means of an isolation boundary (implemented via partitions and domains)
      controlling access to and protecting the integrity of, the hardware, software,
      and firmware that perform those security functions. The information system
      maintains a separate execution domain (e.g., address space) for each executing
      process.
    audit_procedure: >
      1. Log on to the server that hosts the farm's Central Administration website.
      2. Open IIS Manager. 3. Expand Sites tree view and right-click the web
      application named SharePoint Central Administration. 4. Select Edit Bindings
      .... 5. Confirm the site is bound to an out-of-band (OOB) or non-production IP
      address.
    remediation: >
      1. In the server hosting the farm's Central Administration website Open 'IIS
      Manager'. 2. Expand Sites tree view and right-click the web application named
      SharePoint Central Administration. 3. Select Edit Bindings .... 4. Change the
      site is bound to an out-of-band (OOB) IP address.
