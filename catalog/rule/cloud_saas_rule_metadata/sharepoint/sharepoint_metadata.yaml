  - rule_id: sharepoint.cis.3.the_sharepoint_central_administration_interface
    title: "Ensure that the SharePoint Central Administration interface is not hosted in the DMZ."
    severity: high
    category: cloud_saas
    tech_type: sharepoint
    automation_type: manual
    cis_benchmark: "CIS_SHAREPOINT 2019_v1.0.0"
    cis_version: "2019_v1.0.0"
    cis_control: "3.11"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      The SharePoint Central Administration site should not be installed onto the
      network DMZ, which is exposed to external internet connections.
    rationale: >
      SharePoint installed Central Administrator is a powerful management tool used
      to administer the farm. This server should be installed on a trusted network
      segment. This server should also be used to run services rather than user-
      oriented web applications.
    audit_procedure: >
      On an administrative workstation, open Central Administration and make note of
      the URL (i.e., http://sharepointserver:7040). Try to open the Central
      Administration application on a workstation or server in the DMZ by opening a
      Web browser and type in the URL to Central Administration.
    remediation: >
      For environments requiring an Internet-facing capability, remove the
