  - rule_id: sharepoint.cis.2.sharepoint_central_administration_site_is_not
    title: "Ensure the SharePoint Central Administration site is not accessible from Extranet or Internet connections"
    severity: high
    category: cloud_saas
    tech_type: sharepoint
    automation_type: manual
    cis_benchmark: "CIS_SHAREPOINT 2019_v1.0.0"
    cis_version: "2019_v1.0.0"
    cis_control: "2.7"
    cis_section: "2"
    profile_applicability: "Level 1"
    description: >
      The SharePoint central administration site should be configured so that its
      ports and interfaces are not accessible to untrusted external or internet
      connections.
    rationale: >
      The central administration site is a critical component to the management of
      the SharePoint platform, allowing administrators to perform a variety of
      administration tasks, including creating and managing SharePoint Web
      Applications, Site Collections and Service Applications. Minimizing
      unnecessary exposure to this site would certainly help mitigate risks to the
      SharePoint platform.
    audit_procedure: >
      • On the drive where SharePoint Products and Technologies is installed, open a
      command-line window and type the following command: cd
      %CommonProgramFiles%\Microsoft Shared\Web Server Extensions\16\ISAPI •
      Determine the current port number for the Central Administration Web site, by
      typing the following command: stsadm -o getadminport • Verify through your
      firewall settings that the SharePoint system and the identified port is not
      exposed to the internet or other external connections.
    remediation: >
      • On the system where your SharePoint platform is installed, open a command-
      line window and type the following command: cd %CommonProgramFiles%\Microsoft
      Shared\Web Server Extensions\16\ISAPI • Determine the current port number for
      the Central Administration Web site, by typing the following command: 30 | P a
      g e stsadm -o getadminport • Configure your firewall so that the SharePoint
      system and the identified port is not exposed to external connections.
      References: 1. https://technet.microsoft.com/en-us/library/cc262849.aspx
    references: >
      1. https://technet.microsoft.com/en-us/library/cc262849.aspx
