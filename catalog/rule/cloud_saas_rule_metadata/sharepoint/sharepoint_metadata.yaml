  - rule_id: sharepoint.cis.6.sharepoint_user_sessions_are_terminated_upon_user
    title: "Ensure that SharePoint user sessions are terminated upon user logoff and when the idle time limit is exceeded"
    severity: high
    category: cloud_saas
    tech_type: sharepoint
    automation_type: manual
    cis_benchmark: "CIS_SHAREPOINT 2019_v1.0.0"
    cis_version: "2019_v1.0.0"
    cis_control: "6.3"
    cis_section: "6"
    profile_applicability: "Level 1"
    description: >
      The SharePoint platform should be configured with a user session idle time
      limit of 15 minutes.
    rationale: >
      Whenever a SharePoint user sessions is started, a unique session ID and other
      session information are generated. Such information can be used be a malicious
      user to hijack the session. By terminating sessions upon user logoff and idle
      time limit, the underlying session information is invalidated. Therefore, the
      potential for the session to be hijacked is removed.
    audit_procedure: >
      Review the SharePoint server configuration to ensure user sessions are
      terminated upon user logoff, and when idle time limit is exceeded. Navigate to
      Central Administration website. Click Application Management. Click Manage Web
      Applications. Repeat the following steps for each web application: • Select
      the Web Application. • Click General Settings in the Web Application ribbon. •
      In the Web Page Security Validation section, verify that Security Validation
      is: is set to On and that the Security Validation Expires: setting is set to
      15 minutes.
    remediation: >
      Review the SharePoint server configuration to ensure user sessions are
      terminated upon user logoff, and when idle time limit is exceeded. Navigate to
      Central Administration website. Click Application Management. Click Manage Web
      Applications. Repeat the following steps for each web application: 72 | P a g
      e • Select the Web Application. • Click General Settings in the Web
      Application ribbon. • In the Web Page Security Validation section, verify that
      Security Validation is: is set to On and that the Security Validation Expires:
      setting is set to 15 minutes
    references: >
      
