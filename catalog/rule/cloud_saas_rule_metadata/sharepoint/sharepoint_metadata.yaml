    description: >
      SharePoint-specific malware (i.e. anti-virus) protection software must be
      integrated and configured.
    rationale: >
      Configuring anti-virus settings ensures documents will be scanned for viruses
      upon download from and upload to the SharePoint server. Anti-virus settings
      are not configured by default, therefore leaving the documents downloaded from
      or uploaded to SharePoint open to potential malware.
    audit_procedure: >
      1. Log on to the Central Administration website. 2. Navigate to Security >
      Manage antivirus settings. 3. Validate each of the following boxes are
      selected: o Scan documents on upload. o Scan documents on download. o Attempt
      to clean infected documents.
    remediation: >
      1. Log on to the Central Administration website. 2. Navigate to Security >
      Manage antivirus settings. 3. SharePoint specific malware (i.e. anti-virus)
      protection software must be integrated and configured for each of the
      following: o Scan documents on upload. o Scan documents on download. o Attempt
      to clean infected documents.
