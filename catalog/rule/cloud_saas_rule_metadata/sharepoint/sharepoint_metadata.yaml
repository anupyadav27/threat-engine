  - rule_id: sharepoint.cis.1.the_sharepoint_central_administration_site_is_tls
    title: "Ensure that the SharePoint Central Administration Site is TLS- enabled"
    severity: high
    category: cloud_saas
    tech_type: sharepoint
    automation_type: manual
    cis_benchmark: "CIS_SHAREPOINT 2019_v1.0.0"
    cis_version: "2019_v1.0.0"
    cis_control: "1.2"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      Transport Layer Security (TLS) provides protection when communicating over the
      internet. Traffic is encrypted for portions of information transportation.
      Ensure that the Central Administration site is configured to be used with TLS.
    rationale: >
      The SharePoint Central Administration site allows an administrator to manage
      settings for the Web server and virtual servers. TLS protects this critical
      data by encrypting the traffic that is transmitted over the network.
    audit_procedure: >
      Navigate to Internet Information Services (IIS) Manager. 1. Locate the
      SharePoint Central Administration v4 from the Sites category and verify that
      it is configured with an HTTPS binding. 2. Locate the SharePoint Central
      Administration v4 from the Sites category 3. Double click on the Actions pane,
      in the Edit Site section. 4. Click the Bindings link. 5. In the Site Bindings
      dialog, select the HTTPS binding and click Edit 6. In the Edit Site Binding
      dialog, ensure that the Port, Hostname and SSL Certificate settings field have
      entries.
    remediation: >
      An SSL certificate must be acquired before enabling TLS. For more information
      about SSL certificates, see related topics in IIS Help. The Central
      Administration site must also be first configured to use port 443 and HTTPS.
      To configure this, execute the following Windows PowerShell command: Set-
      SPCentralAdministration -Port <port> -SecureSocketsLayer NOTE: If the server
      certificate is for an FQDN update the AAM URL of the Central Administration
      web site: 12 | P a g e Set-SPAlternateUrl -Identity https://servername:443
      -Url https://fully.qualified.domain.name:443 -Zone Default Navigate to
      Internet Information Services (IIS) Manager. 1. Locate the SharePoint Central
      Administration v4 from the Sites category and verify that it is configured
      with an HTTPS binding. 2. Locate the SharePoint Central Administration v4 from
      the Sites category. 3. Double click on the Actions pane, in the Edit Site
      section. 4. Click the Bindings link. 5. In the Site Bindings dialog, select
      the HTTPS binding and click Edit. 6. In the Edit Site Binding dialog, ensure
      that the Port, Hostname and SSL Certificate settings fields accordingly.
      References: 1. https://technet.microsoft.com/en-us/library/cc262849.aspx
    references: >
      1. https://technet.microsoft.com/en-us/library/cc262849.aspx
