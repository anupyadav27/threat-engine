  - rule_id: sharepoint.cis.4.windows_authentication_uses_kerberos_and_not_the
    title: "Ensure Windows Authentication uses Kerberos and not the NT Lan Manager (NTLM) authentication protocol"
    severity: high
    category: cloud_saas
    tech_type: sharepoint
    automation_type: manual
    cis_benchmark: "CIS_SHAREPOINT 2019_v1.0.0"
    cis_version: "2019_v1.0.0"
    cis_control: "4.3"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      If Windows Authentication mechanisms are used on SharePoint, the system should
      be configured to use the Kerberos authentication protocol rather than the NT
      Lan Manager (NTLM) equivalent.
    rationale: >
      There are a few factors in which Kerberos is superior to NTLM authentication
      and is indeed preferred. First, Kerberos offers faster authentication because
      it does not require multiple servers and components to complete authentication
      tasks, as in the case of NTLM authentication. Second, Kerberos offers mutual
      authentication. Kerberos can authenticate the client to the server and
      importantly, also the server to the client.
    audit_procedure: >
      1. Launch Central Administration. 2. Click on Application Management then
      Manage web applications. 3. In Authentication Providers click each available
      zone. 4. Under Authentication Providers - Zone popup verify Integrated Windows
      authentication is checked and Negotiate (Kerberos) is selected.
    remediation: >
      1. Launch Central Administration. 2. Click on Application Management then
      Manage web applications. 3. In Authentication Providers click each available
      zone. 4. Under Authentication Providers - Zone popup check Integrated Windows
      authentication and select Negotiate (Kerberos).
    references: >
      
    impact: >
      
    compliance_mappings:
      cis:
        - "CIS_SHAREPOINT_2019_v1_0_0_4_3"
      nist_800_53: []
