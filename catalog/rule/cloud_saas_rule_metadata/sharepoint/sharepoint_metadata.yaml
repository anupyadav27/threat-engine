  - rule_id: sharepoint.cis.3.a_secondary_sharepoint_site_collection
    title: "Ensure a secondary SharePoint site collection administrator has been defined on each site collection."
    severity: high
    category: cloud_saas
    tech_type: sharepoint
    automation_type: manual
    cis_benchmark: "CIS_SHAREPOINT 2019_v1.0.0"
    cis_version: "2019_v1.0.0"
    cis_control: "3.1"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      A secondary SharePoint site collection administrator must be defined when
      creating a new site collection.
    rationale: >
      If a site reaches its maximum size, users will be denied access until an
      administrator fixes the problem. Having a secondary administrator reduces the
      risk of having a Denial-of- Service on a site. If the site reaches its maximum
      size, the secondary administrator can fix the problem if the primary
      administrator is not available. In some situations, having a secondary site
      administrator could be inappropriate for reasons of control or
      confidentiality.
    audit_procedure: >
      1. Log on to SharePoint Central Administration as a member of the Farm
      Administration Group. 2. Click on Application Management. 3. Select Site
      Collections > Change Site Collections Administrators. 4. For each site, verify
      if a Secondary Site Collection Administrator has been defined.
    remediation: >
      1. Log on to SharePoint Central Administration as a member of the Farm
      Administration Group. 2. In Central Administration, click Application
      Management. 3. On the Site Collection Administrators page, click the arrow
      next to the site collection name, and then select Change Site Collection if
      the site collection you want is not already selected. 4. Select the URL of the
      site collection, and then click OK. If the site collection is not listed,
      click the arrow next to the web application name, click Change Web
      Application, select the name of the web application that contains the site
      collection, select the URL of the site collection, and then click OK. 36 | P a
      g e 5. In the secondary site collection administrator area, either type the
      name of the user whom you want to add by using the format <domain>\<username>
      or select the user by using the address book. 6. Click OK References: 1.
      https://technet.microsoft.com/en-
      us/library/ff631156(v=office.16).aspx#section1
