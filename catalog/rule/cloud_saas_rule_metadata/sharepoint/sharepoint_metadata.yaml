  - rule_id: sharepoint.cis.1.the_underlying_internet_information_services_iis
    title: "Ensure that the underlying Internet Information Services (IIS) Authentication module is set to use Kerberos as its Authentication Provider"
    severity: high
    category: cloud_saas
    tech_type: sharepoint
    automation_type: manual
    cis_benchmark: "CIS_SHAREPOINT 2019_v1.0.0"
    cis_version: "2019_v1.0.0"
    cis_control: "1.4"
    cis_section: "1"
    profile_applicability: "Level 1"
    description: >
      The Kerberos protocol is a more secure protocol than NTLM and is based on
      ticketing. In this scheme, a user provides a valid user name and password to
      an authentication server. Then, the authentication server grants the user a
      ticket. The ticket can be used on the network to request network resources.
    rationale: >
      The NTLM protocol has a number of vulnerabilities where a malicious attacker
      can use a pass the hash attack to gain access to user credentials. The
      Kerberos protocol is a more secure protocol based on a ticketing system and is
      recommended.
    audit_procedure: >
      Navigate to the Inetpub\Adminscripts folder using a Command Prompt window on
      the server that is running IIS 1. Enter the command cd
      Drive:\inetpub\adminscripts in the command prompt window. Note In this
      command, Drive is the drive where Microsoft Windows is installed. 2. Enter the
      command cscript adsutil.vbs get w3svc/##/root/NTAuthenticationProviders in the
      command prompt window. Note In this command, ## is the virtual server ID
      number. The virtual server ID number of the Default Web site in IIS is 1. 3.
      Enter the command cscript adsutil.vbs get
      w3svc/##/root/NTAuthenticationProviders Note In this command, ## is the
      virtual server ID number. 4. Verify Negotiate,NTLM is set as the
      Authentication Provider
    remediation: >
      Navigate to the Inetpub\Adminscripts folder using a Command Prompt window on
      the server that is running IIS 16 | P a g e 1. Enter the command cd
      Drive:\inetpub\adminscripts in the command prompt window. Note In this
      command, Drive is the drive where Microsoft Windows is installed. 2. Enter the
      command cscript adsutil.vbs get w3svc/##/root/NTAuthenticationProviders in the
      command prompt window. Note In this command, ## is the virtual server ID
      number. The virtual server ID number of the Default Web site in IIS is 1. 3.
      Enter the command cscript adsutil.vbs set
      w3svc/##/root/NTAuthenticationProviders Negotiate,NTLM Note In this command,
      ## is the virtual server ID number. 4. Enter the following command in the
      command prompt window iisreset to reset IIS. Impact: A malicious attacker
      could exploit vulnerabilities in old NTLM protocols and gain access to user
      and administrative credentials. Default Value: NTLM References: 1.
      https://msdn.microsoft.com/en-us/library/cc339532(v=vs.90).aspx
    references: >
      1. https://msdn.microsoft.com/en-us/library/cc339532(v=vs.90).aspx
    impact: >
      A malicious attacker could exploit vulnerabilities in old NTLM protocols and
      gain access to user and administrative credentials. Default Value: NTLM
    compliance_mappings:
      cis:
        - "CIS_SHAREPOINT_2019_v1_0_0_1_4"
      nist_800_53: []
      soc2: []
      pci_dss: []
