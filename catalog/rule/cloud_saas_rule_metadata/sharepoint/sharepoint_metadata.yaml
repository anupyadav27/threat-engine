  - rule_id: sharepoint.cis.3.sharepoint_application_servers_are_protected_by_a
    title: "Ensure that SharePoint application servers are protected by a reverse proxy"
    severity: high
    category: cloud_saas
    tech_type: sharepoint
    automation_type: manual
    cis_benchmark: "CIS_SHAREPOINT 2019_v1.0.0"
    cis_version: "2019_v1.0.0"
    cis_control: "3.9"
    cis_section: "3"
    profile_applicability: "Level 1"
    description: >
      A reverse proxy is server component that sits between the internet and the web
      servers. It accepts HTTPS requests, provides various services, and forwards
      the requests to one or many servers.
    rationale: >
      Having a point at which one can inspect, transform and route HTTPS requests
      before they reach the SharePoint web servers provides significant benefits. A
      reverse proxy can hide the topology and characteristics of the back-end
      SharePoint servers by removing the need for direct internet access. A reverse
      proxy can be placed in an internet facing DMZ, and hide the SharePoint web
      servers inside a non-public subnet.
    audit_procedure: >
      Review the SharePoint server architecture and determine if all HTTPS requests
      are routed through a reverse proxy.
    remediation: >
      Implement a reverse proxy to process all HTTPS requests and route them to the
      SharePoint servers. Impact: A malicious attacker can directly attack a
      SharePoint server that is placed in the DMZ. References: 1.
      https://technet.microsoft.com/en-us/library/dn607304.aspx
    references: >
      1. https://technet.microsoft.com/en-us/library/dn607304.aspx
    impact: >
      A malicious attacker can directly attack a SharePoint server that is placed in
      the DMZ.
    compliance_mappings:
      cis:
        - "CIS_SHAREPOINT_2019_v1_0_0_3_9"
      nist_800_53: []
      soc2: []
      pci_dss: []
