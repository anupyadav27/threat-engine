  - rule_id: sharepoint.cis.4.anonymous_authentication_is_denied
    title: "Ensure Anonymous authentication is denied"
    severity: high
    category: cloud_saas
    tech_type: sharepoint
    automation_type: manual
    cis_benchmark: "CIS_SHAREPOINT 2019_v1.0.0"
    cis_version: "2019_v1.0.0"
    cis_control: "4.4"
    cis_section: "4"
    profile_applicability: "Level 1"
    description: >
      SharePoint web applications should be configured to disallow anonymous
      authentication, which would allow users to authenticate and use the
      applications without confirming their identity.
    rationale: >
      Allowing anonymous authentication to SharePoint web applications will nullify
      the effectiveness of the authentication control. Furthermore, any activity
      performed in the anonymous session would also not be linkable to a particular
      account. Such linkages are often critical in post-incident investigations and
      audits.
    audit_procedure: >
      1. Navigate to Central Administration website. 2. Click on Manage web
      applications. 3. Click the web application name. 4. Click the Authentication
      Providers button in the Web Applications ribbon. 5. Click each Zone, and
      verify that the Enable anonymous access check box is not selected. 6. Repeat
      for each web application.
    remediation: >
      1. Navigate to Central Administration website. 2. Click on Manage web
      applications. 3. Click the web application name. 4. Click the Authentication
      Providers button in the Web Applications ribbon. 5. Click each Zone, and
      uncheck Enable anonymous access. 6. Repeat for each web application.
    references: >
      
